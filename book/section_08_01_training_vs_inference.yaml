section_overview:
  title: 'Training-Time vs Inference-Time Attacks: Threat Model Transition'
  one_line_summary: |
    The threat model for training-time attacks differs from inference-time attacks across
    every axis that determines defensive architecture -- adversary access, blast radius,
    detection timescale, latency budget, and economic structure. The Ch6/Ch7 real-time
    classifier pattern does not transfer. Offline auditing with release-cycle SLAs does.

  why_this_section_exists: |
    Chapter 8 cannot start by listing poisoning attacks. It has to start by explaining
    why poisoning attacks need a different defensive architecture than Chapters 6 and 7
    built. Most practitioners entering AI security come through the inference-time door:
    prompt injection, jailbreaks, API abuse. They build fluency with five-track ensembles
    and 50ms P99 latency budgets. Then training-time threats arrive and the entire
    mental model has to shift -- not the techniques, the threat model itself.

    This section performs that shift explicitly. It establishes the eight dimensions
    on which training-time and inference-time threat models differ, maps the adversary
    access ladder that distinguishes who can do what, and quantifies the blast radius
    asymmetry that makes training-time attacks economically rational at scales where
    individual injection attempts are not. By the end of this section you understand
    why Sections 8.2 through 8.16 build offline auditing pipelines rather than extending
    the API gateway classifier from Section 6.17.

  position_in_chapter: |
    This is the opening section of Chapter 8. It establishes the threat-model framework
    that every subsequent section assumes. Sections 8.2 through 8.11 analyse specific
    attack families; each of them references this threat model to position the attack
    on the adversary access ladder. Sections 8.12 through 8.15 build detection and
    defence; each of them references this threat model to justify the offline architecture.
    Section 8.16 synthesises. You will return to Section 8.1 more than any other section
    in Chapter 8 -- it is the scaffolding, not the content.

