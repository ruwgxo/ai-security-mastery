common_mistakes:

  mistake_1_retrofitting_inference_architecture:
    description: 'Attempting to extend the Chapter 6/7 API gateway classifier architecture to cover training-time threats'
    why_it_happens: |
      Organisations that have successfully deployed inference-time detectors assume
      the same pattern extends. It seems reasonable -- if a classifier catches malicious
      runtime inputs, surely a classifier can catch malicious training inputs. The
      fallacy is that the detection signals are fundamentally different: inference-time
      classifiers see one request at a time and decide in milliseconds; training-time
      detection needs to analyse entire datasets, activation patterns across thousands
      of samples, or model weight deltas between versions.
    consequence: 'A training-data classifier built on the API gateway pattern will either time out, produce unusable FPR, or miss clean-label and backdoor attacks entirely -- the attacks that require feature-space or activation-space analysis'
    correct_approach: 'Accept that training-time defence is offline batch analysis, and build the auditing pipeline in CI/CD infrastructure (Section 8.15), not in the serving layer'

  mistake_2_owasp_as_sole_reference:
    description: 'Scoping training-time defence coverage by OWASP LLM03 framework item alone'
    why_it_happens: |
      OWASP is the widely-recognised AI security framework for risk communication.
      Programme scoping documents that enumerate OWASP framework items feel comprehensive.
      The framework item for LLM03 is one paragraph; it fits in a checklist. Teams
      then treat "we have an LLM03 control" as equivalent to "we cover training-time
      threats", which is not true.
    consequence: 'Coverage gaps across backdoor attacks (AML.T0018), model poisoning (AML.T0031), RLHF preference contamination, LoRA adapter attacks, and federated learning poisoning -- all of which are technically distinct from the single LLM03 framework item'
    correct_approach: 'Use OWASP for stakeholder communication and ATLAS for implementation taxonomy. Every Chapter 8 control should map to specific ATLAS techniques, not just to LLM03'

  mistake_3_deferring_until_incident:
    description: 'Deferring training-time security investment until a training-time incident is observed'
    why_it_happens: |
      Inference-time attacks generate continuous telemetry -- the investment is justified
      by visible pressure. Training-time attacks produce no telemetry until the first
      triggered incident, which may never happen or may happen at catastrophic scale.
      Programme prioritisation based on observed pressure systematically under-weights
      training-time threats.
    consequence: 'A production deployment with nine-figure blast-radius exposure that is invisible until the first incident. By the time the incident is observed, its effect may have already propagated to tens of thousands of users and the remediation requires model retraining, not patching'
    correct_approach: 'Justify training-time investment on expected-value calculation using the blast-radius asymmetry, not on incident history. The investment is preventive, like SAST in traditional security'

  mistake_4_ignoring_rung_5_for_fine_tuners:
    description: 'Organisations fine-tuning on foundation models assuming they are isolated from rung-5 (pre-training participant) threats'
    why_it_happens: |
      Fine-tuners do not conduct pre-training themselves; they inherit foundation model
      properties. The assumption is that pre-training security is the foundation model
      vendor''s problem, and fine-tuners only need to worry about the fine-tuning process
      itself. The fallacy is that foundation model properties -- including any latent
      poisoning -- propagate through fine-tuning to the derived model. If the foundation
      is backdoored, the fine-tuned derivative may be as well.
    consequence: 'Detection coverage that assumes clean foundation inputs. Backdoors inherited from the foundation pass the fine-tuning process undetected because the fine-tuner has no baseline against which to measure'
    correct_approach: 'Include behavioural regression testing against foundation models at adoption time, and maintain regression baselines across fine-tuning cycles. Section 8.15 pipeline covers this explicitly'

  mistake_5_labelling_everything_as_poisoning:
    description: 'Conflating training-time attacks, supply chain attacks, and model-theft attacks under a single "training security" label'
    why_it_happens: |
      The distinction between poisoning (Chapter 8), supply chain delivery (Chapter 5
      Section 5.9 and Chapter 8 Section 8.10), and model extraction (Chapter 9) is
      subtle at the framework level but important operationally. Treating them as a
      single category produces controls that partially cover all three and fully cover
      none.
    consequence: 'Detection programmes that produce reassuring audit reports across generic "training security" categories but have uncovered gaps at the technique level -- specifically at the boundary cases where one technique class enables another'
    correct_approach: 'Maintain technique-level taxonomy (ATLAS sub-techniques) throughout the programme. Each Chapter 8 section maps to specific ATLAS techniques for exactly this reason'

section_summary:
  compact: |
    Training-time attacks operate before runtime, affect every subsequent inference,
    persist in model weights, and are detected by offline auditing of artifacts rather
    than real-time classification of requests. The Ch6/Ch7 API gateway pattern does
    not transfer. The adversary access ladder spans five rungs from end-user to pre-
    training participant, each enabling different attack families. The blast radius
    asymmetry -- six to nine orders of magnitude between inference-time and training-
    time effect -- justifies proactive defensive investment even in the absence of
    observed incidents. OWASP LLM03 anchors stakeholder communication; ATLAS AML.T0020,
    AML.T0018, and AML.T0031 anchor detection engineering. The sections that follow
    build the attack taxonomy (Section 8.2), the attack families (Sections 8.3-8.11),
    the detection primitives (Section 8.12), the defensive training techniques (Section
    8.13), and the production auditing pipeline (Section 8.15) that together constitute
    OWASP LLM03 complete coverage.

  key_takeaways:
    - 'Training-time and inference-time are separate threat models with non-overlapping defensive architectures'
    - 'Adversary access level (five-rung ladder) determines which attack families are reachable and which controls apply'
    - 'Blast radius asymmetry makes training-time attacks economically rational for adversaries at scales where inference-time attacks are not'
    - 'Detection is offline batch auditing, not real-time classification; the architecture is CI/CD pipelines and model registries, not API gateways'
    - 'OWASP LLM03 framework item understates the technique space; ATLAS provides the operational taxonomy'
    - 'Proactive investment is the only effective posture; reactive investment is unavailable because training-time attacks are invisible until triggered'

preview_section_02:
  title: 'Poisoning Taxonomy: Targeted vs Untargeted, Availability vs Integrity'
  connection: |
    Section 8.1 established that training-time attacks are a coherent threat class.
    Section 8.2 subdivides that class along two orthogonal axes -- attack goal
    (availability vs integrity) and attack scope (targeted vs untargeted) -- producing
    a 2x2 taxonomy that organises every attack in Sections 8.3 through 8.11. The
    budget-effectiveness-detectability tradeoff frontier introduced in Section 8.2
    is the economic model adversaries optimise against, and the defensive-priority
    model defenders optimise against. Each of Sections 8.3-8.9 positions its attack
    family on the taxonomy; each of Sections 8.12-8.13 positions its defence against
    specific taxonomy quadrants.

