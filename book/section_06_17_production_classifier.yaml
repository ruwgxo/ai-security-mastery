section_summary: |
  Section 6.17 delivered the production injection classifier -- the first fully
  deployed detection rule in the book. Every section of Chapter 6 pointed toward
  this implementation. The three real-world incidents demonstrated that the absent
  control was a pre-assembly classifier between external content and LLM context;
  this section built that classifier.

  The ensemble architecture combines four detection layers: a 47-pattern lexical
  layer covering all Chapter 6 direct and indirect injection variants, a semantic
  sentence encoder layer (all-MiniLM-L6-v2) that survives encoding obfuscation
  by operating on normalised embeddings, a conditional construct structural layer
  from Section 6.13 detecting sleeping injection trigger patterns, and a perplexity
  proxy from Section 6.3 catching gradient-based adversarial suffixes invisible
  to lexical classifiers.

  The FastAPI gateway middleware deploys the classifier at three pipeline stages:
  user_input (direct injection surface), retrieved_content (all five indirect
  injection surfaces in batch mode), and memory_write (persistent agent injection
  write guard). Async concurrent batch processing meets the 50ms P99 latency
  budget at production concurrency. Fail-open behaviour on unavailability
  maintains LLM application availability.

  The AML.T0051 Sigma stub from Chapter 5 Section 5.8 is now complete. The
  drift monitoring module provides ongoing health visibility with quarterly
  retraining cadence. The eight-item deployment checklist specifies what must
  be true before production promotion.

  Section 6.18 synthesises Chapter 6 into the unified injection defence
  architecture, produces the chapter-level reference card, and previews Chapter 7.
...
