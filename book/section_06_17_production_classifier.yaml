      description: |
        Drift monitoring report (produced by classifier_operations.py) tracking
        three signals: benign score distribution (P95 vs. baseline), injection
        detection rate (vs. 85% floor), and false positive override rate (vs.
        5% ceiling). Weekly health report format with HEALTHY / REVIEW_RECOMMENDED
        / RETRAIN_REQUIRED status and actionable recommendation.
      file: "drift_report.json"

    - id: "D08"
      type: "checklist"
      title: "Production Deployment Checklist"
      description: |
        Eight-item pre-production checklist: latency benchmark, FPR calibration,
        injection test suite validation, normalisation pipeline integration,
        gateway middleware test, Sigma rule update, drift monitoring deployment,
        and incident response linkage. Each item with pass/fail criterion and
        evidence requirement.
      file: "deployment_checklist.md"


key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        The production classifier integrates all Chapter 6 detection layers into
        one deployable service: normalisation pipeline, 47-pattern lexical layer,
        semantic sentence encoder, conditional construct detector, and perplexity
        proxy. No single layer is sufficient; the ensemble is the contribution.

    - number: 2
      takeaway: |
        The 50ms P99 latency budget across six classifier calls (one user input,
        five retrieved chunks) mandates a distilled model architecture. All-MiniLM-L6-v2
        (22M parameters) achieves sub-2ms embedding on CPU. Full-size LLMs as
        classifiers are not deployable at this latency budget.

    - number: 3
      takeaway: |
        FPR calibration is mandatory before production deployment. The classifier
        ships with three pre-calibrated threshold tiers (consumer, enterprise, internal).
        Calibration must be performed against real production-representative traffic,
        not against the training corpus or public injection datasets.

    - number: 4
      takeaway: |
        The AML.T0051 Sigma stub from Chapter 5 Section 5.8 is now complete.
        The production classifier fills the detection condition. This is the first
        fully deployed detection rule in the book -- all prior sections led here.

    - number: 5
      takeaway: |
        The FastAPI middleware operates in three modes: user_input (direct injection
        surface), retrieved_content (indirect injection, all five surfaces), and
        memory_write (persistent agent injection). The same classifier serves all
        three, deployed as a shared service called at every text-to-context entry point.

    - number: 6
      takeaway: |
        Fail-open is the correct default on classifier unavailability. Blocking on
        classifier failure makes the LLM application unavailable. The CLASSIFIER_UNAVAILABLE
        status is logged for operational visibility; the fail-open event is the alert,
        not the block.

    - number: 7
      takeaway: |
        Three drift signals monitor classifier health over time: score distribution
        shift (FPR accumulation), detection rate degradation (novel evasion techniques),
        and false positive override rate (precision degradation). Quarterly retraining
        for stable deployments; monthly for active adversarial pressure.

    - number: 8
      takeaway: |
        The pre-assembly classifier pattern -- classifier between external content
        and context assembly -- is the unified architectural response to all three
        real-world incidents. Bing Chat needed it on web content; Copilot needed
        it on code comments; the plugin system needed it on tool outputs. This
        classifier is that control.


