    description: |
      Three operational components in one file. (1) The completed Sigma rule
      that replaces the AML.T0051 stub from Chapter 5 Section 5.8 with the
      production classifier as the detection mechanism, covering both AML.T0051
      (direct injection on user input) and AML.T0054 (indirect injection on
      retrieved content). (2) The latency benchmark harness that measures P50,
      P95, and P99 latencies for both classifier modes against a representative
      workload and validates against the 50ms P99 budget. (3) The classifier
