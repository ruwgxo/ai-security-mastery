section_overview:
  one_line_summary: >
    Five chapters of attacker knowledge demand a formal detection engineering discipline —
    this section makes the shift explicit, inventories what Part 2 built, and frames
    Chapter 11 as the methodology layer that governs everything Chapters 12–14 will implement.
  why_this_section_exists: |
    Part 2 (Chapters 6–10) armed you with attacker knowledge: how prompt injection works,
    how jailbreaks bypass alignment, how data poisoning corrupts training, how model
    extraction reconstructs proprietary weights, how adversarial examples fool classifiers.
    Each chapter also produced detection artefacts — Sigma rules, Python detectors, a
    growing gateway — but it produced them reactively, one attack family at a time.

    The result is a detection posture that is broader than most organisations achieve but
    narrower than it needs to be, and fragile in predictable ways: rules without tests,
    coverage without measurement, thresholds without calibration, no maturity baseline.

    Chapter 11 steps back. It does not introduce a new attack family. Instead it
    establishes the detection engineering framework that governs all seven gateway tracks
    and every rule produced hereafter: how rules are authored, tested, versioned, and
    deployed; how coverage is measured against MITRE ATT&CK and OWASP LLM Top 10; how
    false positives are managed; and how a detection organisation grows from ad-hoc Sigma
    rules to a production-grade detection-as-code programme. This section is the pivot point.
  position_in_chapter: >
    Section 11.01 opens Chapter 11. It frames the shift from attacker knowledge (Part 2)
    to detection engineering discipline (Part 3). Every subsequent section builds on the
    vocabulary and mental model established here.

learning_objectives:
  - 'Articulate why attacker knowledge is the prerequisite — not an optional supplement — to effective detection engineering'
  - 'Name the five categories of detection debt that ad-hoc detection programmes accumulate'
  - 'Inventory all detection artefacts produced in Chapters 6–10 and classify each by type and maturity'
  - 'Distinguish detection engineering from security engineering as adjacent but distinct disciplines'
  - 'Map the Chapter 11 methodology layer to the Chapters 12–14 implementation layers'

prerequisites:
  required:
    - 'Chapters 6–10 completed: prompt injection, jailbreaks, data poisoning, model extraction, adversarial examples'
    - 'The seven-track gateway exists and is running — all seven Sigma rules and Python detectors are in place'
    - 'Familiarity with Sigma rule format from Chapter 6 examples'
  helpful:
    - 'Basic Git usage — version control concepts appear throughout Chapter 11'
    - 'Any prior exposure to CI/CD pipelines — even conceptual'

prose_content:

  part_1_attack_knowledge_prerequisite:
    heading: 'Why Attack Knowledge Comes First'
    body: |
      Detection is not pattern matching. It is adversarial prediction: given that a skilled
      attacker is trying to breach your system right now, what observable evidence will they
      leave, and how do you distinguish that evidence from the noise of legitimate traffic?

      That question cannot be answered without answering a prior question: what will the
      attacker do? Defenders who skip attacker knowledge and jump straight to rule writing
      end up doing one of two things. They copy rules from public threat intelligence without
      understanding why those rules work — and cannot adapt them when the attacker changes
      tactics. Or they write rules for the attacks they can imagine, which is invariably a
      subset of the attacks a skilled attacker has already rehearsed.

      Part 2 was not optional background reading. It was attacker knowledge acquisition. You
      studied prompt injection until you could write a working injection yourself. You studied
      model extraction until you understood the query budget required to reconstruct a
      decision boundary. That knowledge is now the foundation of every detection rule in
      Chapter 11 and beyond. The attack-detection symmetry is exact: you cannot write a
      reliable detector for an attack you do not understand at the mechanism level.

      The seven-track gateway assembled across Chapters 6–10 is the concrete proof of this
      principle. Track 1 (direct injection) exists because Section 6.02 dissected how direct
      injection works. Track 5 (extraction signals) exists because Chapter 9 mapped the query
      patterns that model extraction produces. Each track is attacker knowledge translated
      into a detection primitive. Chapter 11 formalises that translation.

  part_2_detection_gap:
    heading: 'The Detection Gap Part 2 Left Behind'
    body: |
      After five chapters of attack study and parallel detection work, the gateway covers
      seven tracks and blocks a range of real attacks. That is more detection depth than most
      production AI deployments achieve. But depth is not the same as rigour, and breadth is
      not the same as coverage.

      Several categories of detection debt accumulated during Part 2:

      Rules without tests. Every Sigma rule and Python detector in the gateway was written
      to match a specific attack example. None of them has an automated test that confirms
      it fires on a known-bad input and does not fire on a known-good input. A rule without
      a test is a hypothesis, not a detection artefact.

      Thresholds without calibration. Track 3 fires at a similarity threshold of 0.85.
      Track 6 fires at an entropy threshold of 3.2 bits. Both numbers were chosen to work
      on the examples in the chapter. Neither was calibrated against a representative sample
      of production traffic. An uncalibrated threshold is as likely to produce alert fatigue
      as reliable detection.

      Coverage without measurement. The seven tracks cover a selection of MITRE ATLAS
      techniques relevant to the attacks studied. But which ATLAS techniques have no
      corresponding track? Which OWASP LLM Top 10 categories are undetected? Without a
      coverage map, the gaps are invisible.

      Rules without version history. The gateway files exist in a working directory. They
      do not have commit history, release tags, or a changelog. If a rule is changed to
      reduce false positives, there is no record of what changed, why, or what the previous
      version was.

      Detection without maturity baseline. Is the current gateway at maturity Level 1, Level
      3, or Level 5? Without a defined maturity model, there is no answer to that question
      and therefore no roadmap for improvement.

      Chapter 11 addresses all five categories. Each section in the chapter targets one or
      more of these debts directly.

  part_3_detection_engineering_as_discipline:
    heading: 'Detection Engineering as a Discipline'
    body: |
      Security engineering and detection engineering are adjacent disciplines that are
      frequently conflated and should not be. Security engineering designs and builds secure
      systems: network segmentation, access controls, encryption, secure coding practices.
      Its primary deliverables are system properties — confidentiality, integrity,
      availability — enforced through architecture and implementation.

      Detection engineering designs and builds detection systems: rules, models, workflows,
      and pipelines that surface evidence of attacks that bypassed preventive controls.
      Its primary deliverables are detection artefacts — rules with known precision and
      recall, tested against labelled data, deployed through a managed pipeline, with
      false positive rates tracked per rule. The question security engineering answers is
      "how do we prevent this attack?" The question detection engineering answers is "how
      do we know when prevention has failed?"

      In mature organisations, these are separate teams with separate skills. A detection
      engineer needs to be simultaneously: a threat analyst (understands attacker behaviour
      deeply enough to predict what evidence they leave), a software engineer (writes and
      tests code that runs in production), a data scientist (calibrates thresholds and
      interprets precision-recall tradeoffs), and an operations engineer (manages the
      deployment pipeline and observes rule health in production). The combination is rare.

      The discipline has its own vocabulary: detection-as-code, detection lifecycle,
      detection maturity, ATT&CK coverage, false positive rate, mean time to detect. Part
      of Chapter 11's job is to establish that vocabulary precisely, so that Chapters 12–14
      can use it without re-definition.

  part_4_transition_to_dac:
    heading: 'From Ad-Hoc Detection to Detection-as-Code'
    body: |
      Ad-hoc detection is how every detection programme starts. An attacker technique is
      identified. A rule is written. The rule is deployed. The cycle repeats for each new
      technique. No single step is wrong. The aggregate is fragile.

      Ad-hoc programmes share a failure pattern: rules are written individually, deployed
      informally, rarely tested after deployment, and never retired even when they stop
      being relevant. The result is a rule set that grows monotonically, with no systematic
      way to measure its effectiveness, no way to understand which rules are producing
      value and which are generating noise, and no way to adapt the programme to evolving
      attacker behaviour.

      Detection-as-code (DaC) applies software engineering discipline to detection rule
      authoring. Every rule is a code artefact. It lives in version control. It has a test
      file. It has a review process before deployment. It has a deployment pipeline. It has
      metrics tracked in production. When a rule's false positive rate crosses a threshold,
      an alert fires in the detection engineering queue — not in the SOC queue.

      The five principles of detection-as-code, which Section 11.02 develops in full:

      Principle 1 — Rules are code. A Sigma rule is a software artefact governed by the
      same version control, code review, and deployment practices as any other piece of
      production code. The detection-as-code principle is violated the moment a rule is
      edited directly in a production SIEM without a corresponding commit to the rule
      repository.

      Principle 2 — Every rule has a test. A detection rule without a test is a hypothesis.
      Tests confirm that the rule fires on known-bad inputs (true positive validation) and
      does not fire on known-good inputs (false positive validation). Tests run in CI on
      every commit.

      Principle 3 — Coverage is measured, not assumed. What techniques does the current rule
      set cover? What is the ATT&CK heat map? Coverage that is not measured is a guess.

      Principle 4 — False positive rates are tracked per rule. Not as an aggregate across
      the entire rule set, but per rule. A rule with a 40% false positive rate is consuming
      analyst time without proportional defensive value. It is a candidate for calibration
      or retirement.

      Principle 5 — The detection programme has a maturity level. Maturity determines the
      investment required, the quality of outputs expected, and the roadmap for improvement.

      The gateway built in Part 2 will be refactored against these five principles throughout
      Chapter 11. By Section 11.13, it will be a detection-as-code artefact rather than a
      collection of ad-hoc scripts.

  part_5_chapter_map:
    heading: 'Chapter 11 as the Methodology Layer'
    body: |
      Chapter 11's fourteen sections form the methodology layer that governs Part 3. Chapters
      12–14 are the implementation layer — they build specific detectors and deployment
      infrastructure. The relationship is deliberate: methodology before implementation,
      framework before filling.

      Section 11.01 (this section) makes the shift explicit and inventories Part 2's
      detection debt. Section 11.02 establishes the five DaC principles and introduces the
      CI/CD pipeline that all subsequent rules will use. Section 11.03 maps the four
      detection layers — signature, heuristic, ML, and behavioural — and positions the
      seven gateway tracks within them. Sections 11.04 and 11.05 ground coverage measurement
      in MITRE ATT&CK and ATLAS. Sections 11.06 and 11.07 build Sigma fluency for AI
      security. Section 11.08 introduces the five-level maturity model and scores the
      current gateway. Section 11.09 develops false positive management. Section 11.10
      codifies the end-to-end detection engineering workflow. Section 11.11 audits OWASP
      LLM Top 10 coverage. Section 11.12 introduces threat hunting. Section 11.13 frames
      the production architecture patterns the gateway and Chapters 12–14 will use.
      Section 11.14 synthesises.

      Practitioners who read only Chapter 11 get the conceptual architecture and vocabulary.
      Practitioners who work through Chapters 11–14 build the full detection system.
      Either path is valid. Chapter 11 is designed to stand alone as a detection engineering
      primer for AI security.

  part_6_seven_track_inventory:
    heading: 'The Part 2 Detection Inventory'
    body: |
      Before introducing Chapter 11's framework, it is worth naming precisely what Part 2
      produced. The inventory below is the starting point; Section 11.08 will score each
      item against the maturity model.

      Track 1 — Direct Injection Detection (Chapter 6): Sigma rule on prompt token patterns
      matching known injection prefixes. Python detector: injection_detector.py using
      pattern matching and keyword frequency. Maturity: L1 (exists, no tests, no version
      history).

      Track 2 — Jailbreak Pattern Detection (Chapter 7): Sigma rule on multi-turn prompt
      sequences showing role-play framing. Python detector: jailbreak_classifier.py using
      similarity to known jailbreak templates. Maturity: L1.

      Track 3 — Semantic Similarity Gating (Chapter 6/7 shared): Cosine similarity gate
      against a known-bad prompt embedding library. Threshold at 0.85. Maturity: L1
      (threshold uncalibrated).

      Track 4 — Data Poisoning Signals (Chapter 8): Sigma rule on training API calls with
      anomalous label distributions. Python detector: poisoning_monitor.py on label
      statistics. Maturity: L1.

      Track 5 — Model Extraction Signals (Chapter 9): Sigma rule on high-volume, low-
      variance query patterns. Python detector: extraction_detector.py on query budget
      and decision boundary probing signatures. Maturity: L1.

      Track 6 — Adversarial Input Detection (Chapter 10): Sigma rule on input perturbation
      signals. Python detector: adversarial_detector.py using entropy and gradient-space
      proximity heuristics. Maturity: L1.

      Track 7 — Ensemble Orchestration (Chapter 10): seven_track_gateway_ensemble.py
      orchestrating all six tracks with confidence weighting. Maturity: L1 (no fallback
      testing, no failure mode documentation).

      All seven tracks: no automated tests, no version history beyond working directory
      state, no ATT&CK coverage map, no calibrated thresholds, no FPR tracking. L1 is not
      a failure; it is a starting point. Chapter 11 builds the programme that moves it to
      L3 by the end of Part 3.

  part_7_section_bridge:
    heading: 'What Comes Next'
    body: |
      Section 11.02 begins the DaC programme. It establishes the Git repository structure
      for the detection-as-code pipeline, introduces the testing framework (pytest-based,
      with fixtures for known-bad and known-good prompt corpora), and walks through the
      first CI/CD pipeline configuration that all subsequent rules will use.

      By the time you reach Section 11.02's deliverable — detection_as_code_principles.py
      — the gateway will have its first test suite and its first CI run. That is the
      inflection point from ad-hoc to engineered detection.

