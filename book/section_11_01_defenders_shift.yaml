deliverables:

  deliverable_1:
    id: 'D11.01.1'
    filename: 'detection_as_code_principles.py'
    description: >
      Encodes the five detection-as-code principles as executable functions applied to
      the seven-track gateway, producing a readiness report per principle.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'pyyaml>=6.0'
      - 'rich>=13.0'
    code: |
      #!/usr/bin/env python3
      '''detection_as_code_principles.py
      Five detection-as-code principles evaluated against the seven-track gateway.
      Produces a readiness report: which principles are satisfied, which are not.
      Chapter 11, Section 11.01 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo
      '''

      from __future__ import annotations
      from dataclasses import dataclass, field
      from typing import Callable
      import pathlib

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class PrincipleResult:
          principle_id: int
          name: str
          satisfied: bool
          evidence: str
          remediation: str

      @dataclass
      class GatewayState:
          '''Represents the observable state of the seven-track gateway post-Part-2.'''
          tracks: list[str] = field(default_factory=lambda: [
              'Track 1 — Direct Injection',
              'Track 2 — Jailbreak Patterns',
              'Track 3 — Semantic Gating',
              'Track 4 — Poisoning Signals',
              'Track 5 — Extraction Signals',
              'Track 6 — Adversarial Inputs',
              'Track 7 — Ensemble Orchestration',
          ])
          has_git_repo: bool = False
          has_test_suite: bool = False
          has_ci_pipeline: bool = False
          has_attck_coverage_map: bool = False
          fpr_tracked_per_rule: bool = False
          maturity_level_defined: bool = False

      # ---------------------------------------------------------------------------
      # Principle evaluators
      # ---------------------------------------------------------------------------

      def evaluate_rules_are_code(state: GatewayState) -> PrincipleResult:
          satisfied = state.has_git_repo
          return PrincipleResult(
              principle_id=1,
              name='Rules are code (version control)',
              satisfied=satisfied,
              evidence=(
                  'Git repository with commits per rule change detected.'
                  if satisfied else
                  'No Git repository found for gateway rule files.'
              ),
              remediation=(
                  'Already satisfied.'
                  if satisfied else
                  'Initialise a Git repo for the detection-as-code pipeline; '
                  'commit all seven track files with descriptive messages. '
                  'See Section 11.02 for the recommended repository structure.'
              ),
          )

      def evaluate_every_rule_has_tests(state: GatewayState) -> PrincipleResult:
          satisfied = state.has_test_suite
          return PrincipleResult(
              principle_id=2,
              name='Every rule has a test',
              satisfied=satisfied,
              evidence=(
                  'pytest test suite with known-bad and known-good fixtures detected.'
                  if satisfied else
                  'No automated test suite found for any of the seven tracks.'
              ),
              remediation=(
                  'Already satisfied.'
                  if satisfied else
                  'Create tests/test_tracks.py with a fixture for each track. '
                  'Each fixture must include at least one known-bad input (expect FIRE) '
                  'and one known-good input (expect PASS). Section 11.02 provides templates.'
              ),
          )

      def evaluate_coverage_is_measured(state: GatewayState) -> PrincipleResult:
          satisfied = state.has_attck_coverage_map
          return PrincipleResult(
              principle_id=3,
              name='Coverage is measured, not assumed',
              satisfied=satisfied,
              evidence=(
                  'ATT&CK heat map present with per-technique coverage status.'
                  if satisfied else
                  'No ATT&CK or ATLAS coverage map found; gaps are unknown.'
              ),
              remediation=(
                  'Already satisfied.'
                  if satisfied else
                  'Run attck_coverage_heatmap.py (Section 11.05) to generate '
                  'the first coverage map from the seven-track Sigma rules. '
                  'Schedule weekly coverage map refresh.'
              ),
          )

      def evaluate_fpr_tracked_per_rule(state: GatewayState) -> PrincipleResult:
          satisfied = state.fpr_tracked_per_rule
          return PrincipleResult(
              principle_id=4,
              name='False positive rates tracked per rule',
              satisfied=satisfied,
              evidence=(
                  'Per-rule FPR tracking detected in detection operations database.'
                  if satisfied else
                  'No per-rule FPR tracking; aggregate alert counts only.'
              ),
              remediation=(
                  'Already satisfied.'
                  if satisfied else
                  'Instrument each track''s alert output with a rule_id field. '
                  'Pipe alerts to false_positive_manager.py (Section 11.09) '
                  'to begin per-rule FPR accumulation.'
              ),
          )

      def evaluate_maturity_baseline_defined(state: GatewayState) -> PrincipleResult:
          satisfied = state.maturity_level_defined
          return PrincipleResult(
              principle_id=5,
              name='Detection programme has a maturity level',
              satisfied=satisfied,
              evidence=(
                  'Maturity assessment on file with L1-L5 scores per dimension.'
                  if satisfied else
                  'No maturity assessment on file; level is unknown.'
              ),
              remediation=(
                  'Already satisfied.'
                  if satisfied else
                  'Run detection_maturity_assessor.py (Section 11.08) '
                  'to produce the baseline maturity score for the gateway.'
              ),
          )

      EVALUATORS: list[Callable[[GatewayState], PrincipleResult]] = [
          evaluate_rules_are_code,
          evaluate_every_rule_has_tests,
          evaluate_coverage_is_measured,
          evaluate_fpr_tracked_per_rule,
          evaluate_maturity_baseline_defined,
      ]

      # ---------------------------------------------------------------------------
      # Report
      # ---------------------------------------------------------------------------

      def run_readiness_report(state: GatewayState) -> None:
          results = [fn(state) for fn in EVALUATORS]
          passed = sum(1 for r in results if r.satisfied)
          print(f'\nDetection-as-Code Readiness Report')
          print(f'Gateway: seven-track (post-Part-2 state)')
          print(f'Principles satisfied: {passed}/5\n')
          print(f'{"#":<4} {"Principle":<45} {"Status":<12} Remediation')
          print('-' * 110)
          for r in results:
              status = 'SATISFIED' if r.satisfied else 'DEBT'
              remediation_short = r.remediation[:60] + '...' if len(r.remediation) > 60 else r.remediation
              print(f'{r.principle_id:<4} {r.name:<45} {status:<12} {remediation_short}')
          print()
          if passed < 5:
              print('Detection debt summary:')
              for r in results:
                  if not r.satisfied:
                      print(f'  P{r.principle_id}: {r.remediation}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      if __name__ == '__main__':
          # Post-Part-2 state: nothing satisfied, all five debts active
          gateway = GatewayState(
              has_git_repo=False,
              has_test_suite=False,
              has_ci_pipeline=False,
              has_attck_coverage_map=False,
              fpr_tracked_per_rule=False,
              maturity_level_defined=False,
          )
          run_readiness_report(gateway)

  deliverable_2:
    id: 'D11.01.2'
    filename: 'part2_detection_inventory.py'
    description: >
      Inventories all detection artefacts produced in Chapters 6–10, classifies each
      by type and initial maturity level, and identifies the primary debt per artefact.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'rich>=13.0'
    code: |
      #!/usr/bin/env python3
      '''part2_detection_inventory.py
      Inventory of all detection artefacts produced in Chapters 6-10.
      Classifies by type, initial maturity, and primary debt category.
      Chapter 11, Section 11.01 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo
      '''

      from __future__ import annotations
      from dataclasses import dataclass

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class DetectionArtefact:
          track: str
          chapter: int
          artefact_type: str          # 'sigma_rule' | 'python_detector' | 'ensemble'
          filename: str
          atlas_techniques: list[str]
          initial_maturity: str       # 'L1' | 'L2' | 'L3' | 'L4' | 'L5'
          primary_debts: list[str]
          target_maturity: str        # desired level after Chapter 11

      # ---------------------------------------------------------------------------
      # Inventory
      # ---------------------------------------------------------------------------

      INVENTORY: list[DetectionArtefact] = [
          DetectionArtefact(
              track='Track 1 — Direct Injection',
              chapter=6,
              artefact_type='sigma_rule',
              filename='injection_patterns.yml',
              atlas_techniques=['AML.T0051', 'AML.T0054'],
              initial_maturity='L1',
              primary_debts=['no_tests', 'no_version_history'],
              target_maturity='L3',
          ),
          DetectionArtefact(
              track='Track 1 — Direct Injection',
              chapter=6,
              artefact_type='python_detector',
              filename='injection_detector.py',
              atlas_techniques=['AML.T0051'],
