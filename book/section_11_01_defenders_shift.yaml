              target_maturity='L3',
          ),
      ]

      # ---------------------------------------------------------------------------
      # Report
      # ---------------------------------------------------------------------------

      def debt_label(debt: str) -> str:
          labels = {
              'no_tests': 'No automated tests',
              'no_version_history': 'No version history',
              'no_fpr_tracking': 'No per-rule FPR tracking',
              'template_corpus_unversioned': 'Template corpus unversioned',
              'threshold_uncalibrated': 'Threshold uncalibrated',
              'no_fpr_data': 'No FPR data collected',
              'label_baseline_unversioned': 'Label baseline unversioned',
              'query_budget_threshold_uncalibrated': 'Query budget threshold uncalibrated',
              'entropy_threshold_uncalibrated': 'Entropy threshold uncalibrated',
              'no_failure_mode_tests': 'No failure mode tests',
              'no_ci_integration': 'No CI/CD pipeline integration',
          }
          return labels.get(debt, debt)

      def print_inventory() -> None:
          print('\nPart 2 Detection Artefact Inventory')
          print(f'Total artefacts: {len(INVENTORY)}')
          all_techniques: set[str] = set()
          for a in INVENTORY:
              all_techniques.update(a.atlas_techniques)
          print(f'ATLAS techniques referenced: {len(all_techniques)}')
          print(f'All artefacts initial maturity: L1\n')

          by_track: dict[str, list[DetectionArtefact]] = {}
          for a in INVENTORY:
              by_track.setdefault(a.track, []).append(a)

          for track, artefacts in by_track.items():
              print(f'  {track}')
              for a in artefacts:
                  debts = '; '.join(debt_label(d) for d in a.primary_debts)
                  print(f'    [{a.artefact_type}] {a.filename}')
                  print(f'      ATLAS: {", ".join(a.atlas_techniques)}')
                  print(f'      Debt:  {debts}')
                  print(f'      Target maturity: {a.target_maturity}')
              print()

          print('Debt category summary:')
          all_debts: dict[str, int] = {}
          for a in INVENTORY:
              for d in a.primary_debts:
                  all_debts[d] = all_debts.get(d, 0) + 1
          for debt, count in sorted(all_debts.items(), key=lambda x: -x[1]):
              print(f'  {debt_label(debt)}: {count} artefacts affected')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      if __name__ == '__main__':
          print_inventory()

common_mistakes:
  - id: 'CM11.01.1'
    mistake: 'Treating detection engineering and security engineering as synonyms'
    why_it_happens: >
      Both disciplines produce security outcomes and many practitioners move between them.
      The vocabulary overlaps enough that the distinction feels academic.
    why_it_matters: >
      They require different skills, different metrics, and different career paths.
      A security engineer optimising for prevention will under-invest in detection instrumentation.
      A detection engineer who conflates the two will not know when to escalate a coverage gap
      to the security architecture team.
    correct_approach: >
      Security engineering: prevents attacks. Detection engineering: observes when prevention fails.
      Both are necessary; neither substitutes for the other.

  - id: 'CM11.01.2'
    mistake: 'Beginning a detection programme at Layer 3 (ML models) before establishing Layer 1 (signature rules)'
    why_it_happens: >
      ML-based detection is technically interesting. Practitioners familiar with machine learning
      default to the most sophisticated tool available.
    why_it_matters: >
      ML models require labelled training data that signature rules generate. Building ML-based
      detection before signature rules means training on synthetic data that does not reflect
      actual production traffic patterns. The resulting models have poor precision in production.
    correct_approach: >
      Follow the layered detection model in Section 11.03. Signature rules first, then heuristics,
      then ML. Each layer generates the labelled data the next layer trains on.

  - id: 'CM11.01.3'
    mistake: 'Declaring the seven-track gateway sufficient and skipping Chapter 11'
    why_it_happens: >
      Seven tracks sounds comprehensive. The gateway blocks attacks. It feels complete.
    why_it_matters: >
      L1 maturity with no tests, no coverage map, and no FPR tracking will produce alert fatigue
      within weeks of production deployment. The gateway as built cannot be maintained at scale.
    correct_approach: >
      Chapter 11 is not optional polish on a working gateway. It is the governance layer without
      which the gateway degrades rather than improves over time.

  - id: 'CM11.01.4'
    mistake: 'Treating all five detection debt categories as equally urgent'
    why_it_happens: >
      A complete list of problems looks like a flat to-do list.
    why_it_matters: >
      The debts compound. Rules without tests cannot safely have their thresholds calibrated
      (calibration might break the rule without CI catching it). Coverage without measurement
      cannot be improved systematically. The order matters.
    correct_approach: >
      Fix in order: (1) version control, (2) tests, (3) coverage measurement, (4) threshold
      calibration, (5) maturity baseline. Each step enables the next.

  - id: 'CM11.01.5'
    mistake: 'Importing ATLAS technique IDs from public sources without verifying they match the actual attack observed'
    why_it_happens: >
      ATLAS technique lists in blog posts and threat intelligence feeds are a convenient shortcut.
    why_it_matters: >
      An incorrect ATLAS technique mapping produces a coverage map that shows false coverage.
      A heat map that claims AML.T0029 is covered when the rule actually fires on a different
      signal pattern gives a false sense of security to leadership and analysts.
    correct_approach: >
      Map ATLAS techniques from mechanism, not from label. Read the technique description,
      confirm that your detection rule actually fires on the behaviour the technique describes,
      then add the mapping.

section_summary:
  what_you_learned: |
    Detection engineering is a discipline distinct from security engineering. It requires
    attacker knowledge as its prerequisite — you cannot detect what you do not understand
    at the mechanism level. Part 2 produced seven gateway tracks and a collection of Sigma
    rules and Python detectors, all at L1 maturity with five identifiable categories of
    detection debt: no tests, uncalibrated thresholds, unmeasured coverage, no version
    history, and no maturity baseline. Chapter 11 is the methodology layer that addresses
    all five debts and establishes the detection-as-code framework that governs Part 3.
    Section 11.02 begins with the first debt: version control and automated testing.
  key_terms:
    - term: 'Detection engineering'
      definition: >
        The discipline of designing, building, testing, and operating detection systems —
        rules, models, workflows — that surface evidence of attacks that bypassed preventive controls.
    - term: 'Detection-as-code (DaC)'
      definition: >
        The principle that detection rules are software artefacts governed by version control,
        code review, automated testing, and managed deployment pipelines.
    - term: 'Detection debt'
      definition: >
        Accumulated shortfall in detection programme rigour — untested rules, uncalibrated
        thresholds, unmeasured coverage — that manifests as false positives and missed attacks.
    - term: 'Attack-detection symmetry'
      definition: >
        The principle that every attack family has a corresponding detection primitive, and that
        the quality of the detection primitive is bounded by the depth of attacker knowledge.
    - term: 'L1 maturity'
      definition: >
        The first level of the detection maturity model: a detection artefact exists but has
        no automated tests, no version history, and no performance metrics. All Part 2 gateway
        tracks start at L1.

preview_section_11_02:
  title: 'Detection-as-Code: Principles, Version Control, and CI/CD'
  teaser: |
    Section 11.02 moves from naming the five principles to implementing the first two:
    version control and automated testing. It establishes the Git repository structure for
    the detection-as-code pipeline, introduces the pytest-based testing framework with
    fixtures for known-bad and known-good prompt corpora, and walks through the first
    GitHub Actions CI configuration that will run on every commit to the rule repository.
    By the end of Section 11.02, the seven-track gateway will have its first test suite
    and its first CI run — the inflection point from ad-hoc to engineered detection.

