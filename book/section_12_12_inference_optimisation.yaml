prose_content:

  part_1:
    title: 'The 50ms P99 Latency Contract'
    body: |
      The gateway latency budget is expressed as a P99 contract: 99% of requests must complete
      detection within 50ms. The choice of P99 rather than mean latency is deliberate and
      consequential. The mean latency hides the tail: a system with a 10ms mean and a 200ms
      P99 has 1% of requests taking 200ms, and that 1% is enough to produce visible timeouts,
      degrade the product experience, and trigger the operational response of disabling the
      detection layer to recover the latency SLO.

      For a high-traffic API, the 1% tail is a large absolute number of requests. At 1,000,000
      requests per day, a 50ms P99 means 10,000 requests per day are allowed to exceed 50ms;
      if the P99 is actually 200ms, those 10,000 slow requests are concentrated in the periods
      of highest load, exactly when the product can least afford added latency. Optimising the
      mean while ignoring the tail produces a system that looks fast on average and fails under
      load.

      The latency contract is a security constraint because the operational response to a
      breach is to disable the detection. When the API latency SLO is breached and the
      detection layer is identified as the cause, the pragmatic operational decision is to
      turn off the slowest detector or the entire detection layer to recover the SLO. A
      detection system that is disabled provides no protection. The detection engineer who
      builds an accurate but slow detector has built a detector that will be turned off under
      load, which is functionally equivalent to having no detector. Inference optimisation
      is the work that keeps the detector running.

      The budget breaks down across the request lifecycle. The feature pipeline consumes up
      to 5ms (Section 12.11). The four detectors, run with async parallel scoring, consume
      the maximum of their individual latencies, around 15ms. Network, serialisation, and
      gateway overhead consume the remainder. The target is a P99 detection latency
      comfortably under 50ms with headroom for load spikes, which the async architecture and
      quantisation achieve.

  part_2:
    title: 'INT8 Quantisation: From 15ms to 7ms'
    body: |
      The DistilBERT classifier is the largest single latency cost in the detector set. In
      FP32, its inference takes 12-15ms on CPU -- nearly a third of the entire 50ms budget for
      a single detector. INT8 quantisation reduces this to 5-7ms while reducing the model size
      from 265MB to 65MB.

      INT8 quantisation converts the model's floating-point weights to 8-bit integers. A
      32-bit float occupies four bytes; an 8-bit integer occupies one. The conversion uses a
      scaling factor per weight tensor: the float range is mapped to the integer range -128 to
      127, with the scaling factor recording the mapping so the integers can be interpreted as
      approximate floats during inference. The integer arithmetic is faster than float
      arithmetic on CPU, and the smaller weights reduce memory bandwidth, which is often the
      bottleneck for transformer inference.

      The accuracy cost is small for DistilBERT: under 0.5 percentage points on the security
      test set. This is because the model has redundancy in its weight precision -- the
      8-bit representation captures enough of the weight information to preserve the decision
      boundary. The accuracy cost must be measured, not assumed: the quantiser.py in
      deliverable_2 applies quantisation and runs the accuracy regression test on the temporal
      test set, comparing the FP32 and INT8 predictions to verify the regression is within the
      tolerance.

      Dynamic quantisation is the correct default for security classifiers. It quantises the
      linear layers (the dominant compute in the transformer) and computes the activation
      scaling factors dynamically at inference time from the observed activation ranges. It
      requires no calibration dataset and is applied with a single function call. Static
      quantisation pre-computes the activation scaling factors from a calibration dataset,
      producing marginally faster inference (6-7ms versus 7-10ms for dynamic) at the cost of
      the calibration step. For the security classifier use case, dynamic quantisation is the
      starting point; static quantisation is applied only when the marginal latency improvement
      is needed to fit the budget. The Section 12.08 model card records which quantisation
      method was applied.

  part_3:
    title: 'Async Parallel Scoring: Maximum, Not Sum'
    body: |
      The four detectors are independent: each takes the feature vector (or the raw text) and
      produces a score without depending on the other detectors' outputs. This independence
      is what makes the ensemble combination possible (Section 12.15) and also what makes
      parallel execution possible. Run sequentially, the four detectors take the sum of their
      latencies. Run in parallel, they take the maximum.

      The async parallel scoring architecture runs each detector in a concurrent coroutine.
      The gateway dispatches all four detector inference calls simultaneously and awaits their
      completion. Because the detectors run concurrently, the total time to get all four scores
      is determined by the slowest detector, not the sum. With the Isolation Forest at 2ms, the
      Random Forest at 2ms, the GRU at 12ms, and the DistilBERT INT8 at 7ms, sequential
      execution takes 23ms while parallel execution takes 12ms (the GRU, the slowest). The
      parallel architecture nearly halves the detector latency.

      The implementation uses Python's asyncio with the detectors running in a thread pool
      executor, because the detector inference is CPU-bound and asyncio's cooperative
      concurrency does not parallelise CPU work by itself. The run_in_executor pattern
      dispatches each detector to a worker thread, and asyncio.gather awaits all of them. For
      true CPU parallelism, the thread pool must have enough workers and the inference must
      release the GIL during the numeric computation, which the numpy and ONNX Runtime
      operations do.

      Per-detector timeout and fallback are essential for the P99 guarantee. If one detector
      occasionally takes much longer than its typical latency (a cold cache, a GC pause, a
      contended CPU), the parallel scoring would wait for it and the P99 would spike. The
      async_detector_runner.py in deliverable_3 applies a per-detector timeout: if a detector
      exceeds its timeout, its result is treated as a fallback (typically a neutral score that
      defers to the other detectors) and the ensemble proceeds with the detectors that completed.
      This caps the worst-case latency at the timeout rather than the worst-case detector
      latency, which is what keeps the P99 within the budget.

  part_4:
    title: 'Early Exit: Blocking on the Fastest Decisive Detector'
    body: |
      Async parallel scoring reduces the latency to the slowest detector. Early exit reduces
      it further for the cases where a fast detector is decisive. When the Isolation Forest
      produces an anomaly score of 0.98 in 2ms -- an extremely confident attack signal -- the
      gateway does not need to wait for the GRU and DistilBERT to confirm. It can block the
      request immediately on the strength of the high-confidence fast detector.

      The early exit pattern dispatches the detectors with a priority order based on latency
      and confidence. The fast detectors (Isolation Forest, Random Forest) are checked first.
      If a fast detector produces a score above a high-certainty threshold (typically 0.95
      calibrated probability), the gateway exits early with the block decision, cancelling the
      slower detectors. If no fast detector is decisive, the gateway awaits the slower
      detectors and combines all available scores in the ensemble.

      The correctness condition for early exit is that the fast decisive detector is confident
      enough that the slower detectors would not change the decision. This is true at the
      extremes: a 0.98 anomaly score is unlikely to be overturned by the other detectors, so
      exiting early on it is safe. It is not true in the uncertain middle: a 0.6 score from
      the Random Forest could be confirmed or refuted by the DistilBERT, so exiting early on
      it would discard information. The early exit threshold is set high precisely so that
      early exit only triggers when the fast detector is confident enough that the decision is
      robust.

      Early exit also applies to the benign direction, though more cautiously. If all the fast
      detectors produce very low scores (a clearly benign request), the gateway could exit
      early with a pass decision without running the expensive DistilBERT. This is riskier than
      early-exit-block because a missed attack is more costly than a false positive, so the
      benign early exit uses a more conservative threshold and is often disabled in favour of
      always running the full ensemble for pass decisions. The inference_optimizer.py in
      deliverable_1 supports both directions with separate thresholds and a configuration to
      disable benign early exit for high-security deployments.

  part_5:
    title: 'Cold Start and Model Warm-Up'
    body: |
      A model loaded into memory but not yet used has cold caches, uncompiled inference graphs,
      and unallocated buffers. The first inference call after loading is slow -- often 5-10x
      the warm latency -- because it triggers the lazy initialisation that subsequent calls
      benefit from. For DistilBERT, the first inference may take 50-100ms while warm inference
      takes 7ms. If the first production request hits a cold model, it experiences the cold
      latency and may time out.

      The cold start problem is acute during deployment and scaling. When a new gateway instance
      starts, all its models are cold. If it starts accepting traffic immediately, the first
      requests hit cold models and experience the cold latency spike. When the system scales up
      under load -- adding instances to handle increased traffic -- the new instances are cold
      exactly when the load is highest, producing latency spikes at the worst time.

      Model warm-up solves this by running synthetic inference calls through every model before
      the instance accepts production traffic. The warm-up calls trigger the lazy initialisation,
      compile the inference graphs, allocate the buffers, and populate the caches, so that the
      first production request hits a warm model. The warm_up_manager.py in deliverable_5 runs
      a configurable number of warm-up inferences per model at startup and reports when all
      models are warm and the instance is ready to accept traffic.

      The warm-up must cover all the models and all the code paths. The DistilBERT warm-up
      must run inference on a representative input. The embedding extractor warm-up must run
      the ONNX inference and populate the LRU cache structure. The GRU warm-up must run a
      sequence of representative length. The feature pipeline warm-up must exercise the early
      exit and full paths. A warm-up that covers only some models leaves the uncovered ones
      cold for the first production request that exercises them.

  part_6:
    title: 'Latency Profiling: Validating the Optimisation'
    body: |
      The optimisations -- quantisation, async scoring, early exit, warm-up -- are hypotheses
      about what reduces latency. They must be validated against measurement, not assumed to
      work. An optimisation that reduces the mean latency but increases the P99 tail makes the
      SLO worse, and only the profiler reveals this.

      The latency profiler measures P50, P95, and P99 latency across every inference component:
      the feature pipeline (and its per-group breakdown from Section 12.11), each of the four
      detectors, the async dispatch overhead, and the end-to-end detection latency. The
      per-component breakdown identifies where the latency budget is consumed and where an
      optimisation would have the most effect. If the P99 is dominated by the GRU, optimising
      the DistilBERT does not help; the profiler directs the optimisation effort to the
      component that actually constrains the budget.

      The budget allocation report translates the profiler measurements into the budget
      breakdown: how much of the 50ms each component consumes at P99, and how much headroom
      remains. This report is the artefact that validates the SLO holds: if the P99 detection
      latency is 22ms, there is 28ms of headroom for network and load spikes, and the SLO is
      safe. If the P99 is 48ms, the SLO is at risk and further optimisation or load shedding
      is needed before deployment.

      The profiling must be done under representative load, not on an idle system. An idle
      system shows the best-case latency; a loaded system shows the latency that production
      will experience, including the contention effects (CPU scheduling, cache eviction, GC
      pauses) that inflate the tail. The latency_profiler.py in deliverable_4 supports
      load-testing mode that runs concurrent requests to measure the latency under realistic
      contention, which is the measurement that validates the production SLO.

