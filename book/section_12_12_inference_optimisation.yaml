document_info:
  title: 'Inference Optimisation: Quantisation, Batching, and Async Scoring Within 50ms P99'
  chapter: 12
  section: 12
  section_code: '1212'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  created: '2026-06-06'
  estimated_pages: 6
  estimated_reading_time: '45-55 minutes'

section_overview:
  one_line_summary: 'Inference optimisation is the production survival requirement: four detectors running sequentially consume 60ms and breach the 50ms SLO, so quantisation, async parallel scoring, and early exit are what make the ensemble deployable at all.'
  why_this_section_exists: |
    The four input-side detectors built in Chapter 12 have individual latencies that, summed,
    exceed the gateway budget. The Isolation Forest at 1-3ms, the Random Forest at 1-3ms, the
    GRU at 5-15ms, and the DistilBERT at 15ms in FP32 -- run sequentially, plus the feature
    pipeline at 5ms, the total is around 40-60ms before any network or serialisation overhead.
    The 50ms P99 gateway SLO is breached on the first day of deployment if the detectors run
    naively.

    This is not a problem that can be solved by accepting slightly higher latency. The
    50ms P99 is a contract: it is the latency at which the product team committed the API
    would respond, and exceeding it produces user-visible timeouts and triggers the operational
    response of disabling the detection system to recover the SLO. A detection system that is
    disabled under load provides no protection. Inference optimisation is therefore a security
    requirement, not a performance nicety -- a detection system that cannot run within the
    latency budget will be turned off, and a turned-off detector catches nothing.

    Section 12.12 brings together the latency work distributed across Chapter 12 into the
    complete optimisation that fits the four-detector ensemble within 50ms P99. Three techniques
    do the work. INT8 quantisation reduces the DistilBERT inference from 15ms to 5-7ms and the
    model size from 265MB to 65MB. Async parallel scoring runs all four detectors concurrently
    so the ensemble latency is the maximum of the four (around 15ms) rather than the sum (around
    35ms). Early exit blocks on the fastest decisive detector, returning a decision in 1-3ms
    when a detector is highly confident rather than waiting for the slowest. The section
    validates the result against a latency profiler that measures P99 rather than assuming the
    optimisation worked.
  position_in_chapter: |
    Section 12.12 is the third operational infrastructure section. It consumes the feature
    pipeline from Section 12.11 and the four detectors from Sections 12.03 through 12.08, and
    produces the async scoring architecture that the Section 12.15 ensemble and the Section
    12.17 gateway capstone depend on. The inference_optimizer.py and async_detector_runner.py
    are the production execution layer for the ensemble.

learning_objectives:

  knowledge:
    - 'State the 50ms P99 latency contract and explain why P99 rather than mean latency is the production SLO'
    - 'Explain INT8 quantisation: how FP32 weights are converted to 8-bit integers, the resulting size and latency reduction, and the accuracy cost'
    - 'Distinguish dynamic from static quantisation and state when each is appropriate for security classifiers'
    - 'Explain async parallel scoring: how running detectors as concurrent coroutines reduces ensemble latency from the sum to the maximum of the individual latencies'
    - 'Describe the early exit pattern and state the condition under which the gateway can decide without waiting for all detectors'
    - 'Explain the cold start problem and why model warm-up is required before production traffic'

  skills:
    - 'Apply INT8 dynamic quantisation to DistilBERT and verify the accuracy regression is within tolerance'
    - 'Implement async parallel detector execution with per-detector timeout and fallback'
    - 'Implement the early exit pattern that blocks on the fastest decisive detector'
    - 'Profile P50, P95, and P99 latency across all inference components and produce a budget allocation report'
    - 'Implement model warm-up that pre-loads and warms all detectors before traffic is accepted'

  security_mindset:
    - 'Treat the latency budget as a security constraint: a detection system that breaches the SLO will be disabled under load, and a disabled detector provides zero protection'
    - 'Optimise for P99, not mean: the worst-case 1% of requests determine whether the system stays within the SLO, and a low mean with a high P99 tail still triggers timeouts'
    - 'Recognise that early exit trades completeness for latency: blocking on the fastest decisive detector is correct only when that detector is confident enough that the others would not change the decision'
    - 'Validate the optimisation against the profiler rather than assuming it worked: an optimisation that reduces mean latency but increases P99 tail latency makes the SLO worse, and only the profiler reveals this'

