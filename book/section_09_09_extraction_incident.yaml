              defended_state='Per-user state store tracking boundary proximity, diversity, entropy, and prompt extraction signals across sessions.',
              incidents_closed=['INC-2016-TRAMER (boundary and diversity signals)', 'INC-2021-CARLINI (diversity and entropy signals)'],
              residual_risk='Distributed campaigns below per-user thresholds; benchmark-distribution distillation (INC-2023-ALPACA-VICUNA) not catchable.',
              section_reference='query_monitor.py (Section 9.11)',
          ),
          ArchitectureLayer(
              layer_name='Adaptive rate limiter',
              position='input_side',
              undefended_state='Throughput-only rate limits calibrated to infrastructure capacity. No extraction-aware policy dimensions.',
              defended_state='Multi-dimensional: requests/min, tokens/min, cost/hour, input-tokens/request. Policy calibrated to extraction budget economics.',
              incidents_closed=['INC-2016-TRAMER (extraction budget limit)', 'INC-2021-CARLINI (token generation cap)'],
              residual_risk='Patient adversaries at rates below extraction-aware thresholds. Distributed campaigns.',
              section_reference='rate_limiter.py (Section 9.11)',
          ),
          ArchitectureLayer(
              layer_name='Cross-user collusion detector',
              position='input_side',
              undefended_state='Absent. No cross-account correlation. Per-user limits only.',
              defended_state='Semantic query correlation across accounts within time windows. Coordinated campaign detection.',
              incidents_closed=['INC-2023-ALPACA-VICUNA (partial: coordinated collection across accounts)'],
              residual_risk='Campaigns distributed across accounts with no semantic overlap in query timing windows.',
              section_reference='cross_user_correlator.py (Section 9.11)',
          ),
          ArchitectureLayer(
              layer_name='Output watermarker',
              position='output_side',
              undefended_state='Absent. Model outputs carry no cryptographic identity. Post-hoc ownership verification impossible.',
              defended_state='Token-level watermark embedded in all production responses. Statistical detection test identifies victim signature in suspect surrogates.',
              incidents_closed=['INC-2016-TRAMER (post-hoc surrogate detection)', 'INC-2023-ALPACA-VICUNA (post-hoc Alpaca/Vicuna detection)'],
              residual_risk='Watermark may degrade under strong paraphrasing or adversarial watermark removal. Provides evidence, not prevention.',
              section_reference='output_watermarker.py + watermark_detector.py (Section 9.12)',
          ),
          ArchitectureLayer(
              layer_name='Output perturbator',
              position='output_side',
              undefended_state='Absent. Full precision confidence scores and probability distributions returned. No noise added to outputs.',
              defended_state='Calibrated noise applied to outputs. Confidence scores perturbed. Prompt-derived phrases generified.',
              incidents_closed=['INC-2016-TRAMER (reduces soft-label extraction discount)', 'INC-2021-CARLINI (reduces per-query memorisation signal)'],
              residual_risk='Perturbation-averaging: patient adversary with many queries can average out perturbation. Not a formal bound.',
              section_reference='output_perturbator.py (Section 9.12)',
          ),
          ArchitectureLayer(
              layer_name='Differential privacy training',
              position='training_time',
              undefended_state='Absent. Standard training maximises prediction accuracy with no bound on per-example influence.',
              defended_state='DP-SGD with privacy budget epsilon. Formal bound on per-example information leakage. Reduces memorisation below verbatim extraction threshold.',
              incidents_closed=['INC-2021-CARLINI (bounds verbatim training data recovery)'],
              residual_risk='Utility-privacy tradeoff: strong DP (low epsilon) degrades model accuracy. Moderate DP leaves some memorisation risk.',
              section_reference='DP training pipeline (Section 8.13)',
          ),
      ]


      def render_architectural_comparison() -> None:
          print('ARCHITECTURAL REMEDIATION COMPARISON -- Chapter 9 Section 9.9')
          print('=' * 70)
          for layer in ARCHITECTURE_LAYERS:
              print(f'\nLayer: {layer.layer_name}  [{layer.position}]')
              print(f'  Reference: {layer.section_reference}')
              print(f'  BEFORE (undefended):')
              print(f'    {layer.undefended_state}')
              print(f'  AFTER (defended):')
              print(f'    {layer.defended_state}')
              print(f'  Incidents closed:')
              for inc in layer.incidents_closed:
                  print(f'    - {inc}')
              print(f'  Residual risk:')
              print(f'    {layer.residual_risk}')


      if __name__ == '__main__':
          render_architectural_comparison()
          print()
          # Coverage summary
          all_incidents = {'INC-2016-TRAMER', 'INC-2021-CARLINI', 'INC-2023-ALPACA-VICUNA'}
          closed_by_layer: dict = {}
          for layer in ARCHITECTURE_LAYERS:
              for inc_ref in layer.incidents_closed:
                  for inc_id in all_incidents:
                      if inc_id in inc_ref:
                          closed_by_layer.setdefault(inc_id, set()).add(layer.layer_name)
          print('Coverage summary per incident:')
          for inc_id in sorted(all_incidents):
              layers = closed_by_layer.get(inc_id, set())
              print(f'  {inc_id}: covered by {len(layers)} layer(s): {sorted(layers)}')

  - id: 5
    name: 'lessons_learned_checklist.py'
    description: |
      Generates the pre-production verification checklist derived from the three
      documented incident classes. Each checklist item maps to a root cause,
      a specific control, and a verification method. Provides an assess_deployment()
      function that takes a list of deployed controls and returns a coverage score
      with gap identification.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Checklist items are data-driven via ChecklistItem dataclass list.
      Assessment logic is generic: no hardcoded per-item pass/fail conditions.
      Priority ranking is data-driven from the incident root cause severity scores.
    code: |
      # lessons_learned_checklist.py
      # Chapter 9 Section 9.9 -- Pre-Production Extraction Defence Checklist
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Set, Tuple


      @dataclass
      class ChecklistItem:
          item_id: str
          lesson_source: str
          verification_question: str
          root_cause_addressed: str
          required_controls: List[str]
          verification_method: str
          priority: str  # 'critical', 'high', 'medium'
          incident_evidence: str


      CHECKLIST: List[ChecklistItem] = [
          ChecklistItem(
              item_id='L1',
              lesson_source='All three incidents',
              verification_question='Is query pattern monitoring deployed with per-user state tracking across sessions?',
              root_cause_addressed='no_query_pattern_monitoring',
              required_controls=['query_monitor', 'boundary_query_detector', 'query_diversity_monitor'],
              verification_method='Issue a known boundary-seeking query pair; verify alert fires within 100 queries.',
              priority='critical',
              incident_evidence='Tramer et al. boundary probing was entirely undetected across all four platforms.',
          ),
          ChecklistItem(
              item_id='L2',
              lesson_source='Tramer et al. 2016, Carlini et al. 2021',
              verification_question='Are rate limits calibrated against extraction query budgets, not just infrastructure throughput?',
              root_cause_addressed='throughput_only_rate_limits',
              required_controls=['rate_limiter_extraction_aware'],
              verification_method='Compute the query budget for equation-solving extraction at d=100; verify rate limit blocks this within one session.',
              priority='critical',
              incident_evidence='Tramer et al. attacks completed entirely within normal API usage volumes on all four platforms.',
          ),
          ChecklistItem(
              item_id='L3',
              lesson_source='Tramer et al. 2016, Alpaca/Vicuna 2023',
              verification_question='Is output watermarking deployed and the watermark embedded in all production responses?',
              root_cause_addressed='no_output_watermarking',
              required_controls=['output_watermarker', 'watermark_detector'],
              verification_method='Query the API and run the watermark detector on the response; verify detection within statistical threshold.',
              priority='high',
              incident_evidence='Alpaca and Vicuna surrogates carry no victim identity; terms-of-service unenforced without watermark.',
          ),
          ChecklistItem(
              item_id='L4',
              lesson_source='Tramer et al. 2016',
              verification_question='Does the API return hard labels only unless soft labels are required by the product?',
              root_cause_addressed='soft_label_outputs_without_perturbation',
              required_controls=['hard_label_api_design', 'output_perturbator'],
              verification_method='Inspect API response schema; confirm no probability vectors or confidence scores in default response.',
              priority='high',
              incident_evidence='Soft-label outputs on Azure ML and others provided 5-50x extraction budget discount to Tramer et al.',
          ),
          ChecklistItem(
              item_id='L5',
              lesson_source='Carlini et al. 2021',
              verification_question='Was the model trained with differential privacy if the training data contains PII?',
              root_cause_addressed='no_differential_privacy_training',
              required_controls=['dp_training_pipeline'],
              verification_method='Review training pipeline configuration; confirm DP-SGD with documented epsilon budget is active for PII-containing datasets.',
              priority='critical',
              incident_evidence='GPT-2 memorised verbatim training sequences including names, emails, and phone numbers; DP training would have bounded this.',
          ),
          ChecklistItem(
              item_id='L6',
              lesson_source='Alpaca/Vicuna 2023',
              verification_question='Is there a cross-user collusion detector for distributed query campaigns?',
              root_cause_addressed='no_cross_user_collusion_detection',
              required_controls=['cross_user_correlator'],
              verification_method='Simulate a two-account campaign with coordinated prompts; verify collusion signal fires within the detection window.',
              priority='high',
              incident_evidence='Alpaca/Vicuna query distribution was indistinguishable from legitimate evaluation at per-account level.',
          ),
          ChecklistItem(
              item_id='L7',
              lesson_source='All three incidents',
              verification_question='Is absence of detected incidents treated as evidence that detection is working, not that attacks are absent?',
              root_cause_addressed='no_query_pattern_monitoring',
              required_controls=['query_monitor', 'red_team_exercise'],
              verification_method='Run a quarterly red team extraction exercise; verify detection fires before extraction is complete.',
              priority='medium',
              incident_evidence='None of the three incident classes was detected in real time by the operator.',
          ),
          ChecklistItem(
              item_id='L8',
              lesson_source='All three incidents',
              verification_question='Are extraction monitoring alerts routed to the security team with a defined incident response playbook?',
              root_cause_addressed='throughput_only_rate_limits',
              required_controls=['alert_routing_security_team', 'incident_response_playbook'],
              verification_method='Trigger a test alert; verify routing to security team within defined SLA.',
              priority='medium',
              incident_evidence='Operator responses to all three incidents focused on policy changes after disclosure, not detection during the incident.',
          ),
      ]


      def assess_deployment(deployed_controls: List[str]) -> Tuple[float, List[ChecklistItem], List[ChecklistItem]]:
          '''
          Assess a deployment against the lessons learned checklist.
          Returns (coverage_score, passed_items, failed_items).
          coverage_score = fraction of checklist items with all required controls deployed.
          '''
          deployed_set: Set[str] = set(deployed_controls)
          passed: List[ChecklistItem] = []
          failed: List[ChecklistItem] = []
          for item in CHECKLIST:
              if all(c in deployed_set for c in item.required_controls):
                  passed.append(item)
              else:
                  failed.append(item)
          score = round(len(passed) / max(len(CHECKLIST), 1), 3)
          return score, passed, failed


      def render_checklist(deployed_controls: List[str]) -> None:
          score, passed, failed = assess_deployment(deployed_controls)
          print('PRE-PRODUCTION EXTRACTION DEFENCE CHECKLIST -- Chapter 9 Section 9.9')
          print('=' * 70)
          print(f'Controls deployed: {deployed_controls}')
          print(f'Checklist coverage: {score:.1%} ({len(passed)}/{len(CHECKLIST)} items passed)\n')
          priority_order = ['critical', 'high', 'medium']
          for priority in priority_order:
              items = [item for item in CHECKLIST if item.priority == priority]
              print(f'--- {priority.upper()} PRIORITY ---')
              for item in items:
                  status = 'PASS' if item in passed else 'FAIL'
                  print(f'  [{status}] {item.item_id}: {item.verification_question}')
                  if item not in passed:
                      missing = [c for c in item.required_controls if c not in set(deployed_controls)]
                      print(f'         Missing controls: {missing}')
                      print(f'         Evidence: {item.incident_evidence}')


      if __name__ == '__main__':
          example_deployed = [
              'query_monitor', 'boundary_query_detector', 'query_diversity_monitor',
              'rate_limiter_extraction_aware', 'output_watermarker',
          ]
          render_checklist(example_deployed)

common_mistakes:

  - id: 1
    description: 'Treating the Tramer et al. 2016 results as historical artefacts that no longer apply to current APIs'
    why_it_happens: |
      The Tramer et al. 2016 paper targeted MLaaS platforms from the mid-2010s.
      Defenders assume the affected platforms have since mitigated the specific
      vulnerabilities and that current deployments are fundamentally different.
      The paper''s age is mistaken for obsolescence.
    consequence: |
      The underlying mechanism -- that linear classifiers extract in O(d) queries
      and that every API query reveals boundary information -- is architecture-
      independent and time-independent. Current deployments of linear or tree-based
      classifiers via prediction APIs are as vulnerable to equation-solving and
      path-finding extraction as the 2016 targets were. The specific API endpoints
      have evolved; the attack surface has not.
    correct_approach: |
      Apply the Tramer et al. threat model to any current deployment of a
      classifier via a prediction API. Audit the API output format, the model
      architecture, and the rate limit policy against the extraction budget
      estimates documented in Section 9.3. The pre-production checklist
      (Deliverable 5) includes explicit verification steps that apply regardless
      of the deployment year.

  - id: 2
    description: 'Concluding that terms-of-service prohibitions on model distillation make output watermarking unnecessary'
    why_it_happens: |
      The Alpaca and Vicuna projects violated OpenAI''s terms of service by
      using API outputs to train competing models. Legal terms exist; the
      argument goes that legal recourse is available without technical controls.
      Output watermarking seems redundant when the behaviour is already prohibited.
    consequence: |
      Terms-of-service enforcement requires evidence that the violation occurred.
      Without a watermark, there is no mechanism to demonstrate that a suspect
      surrogate model was trained on the operator''s outputs rather than
      independently trained. Legal recourse requires technical evidence; terms
      of service create the right to that evidence but not the evidence itself.
      The Alpaca and Vicuna releases were never legally challenged because the
      operators lacked the forensic mechanism to attribute the surrogates to
      their API outputs.
    correct_approach: |
      Watermarking is the technical foundation that makes terms-of-service
      enforcement feasible. Terms of service create the legal right; watermarking
      creates the technical evidence. Both are required for actionable enforcement.
      Deploy output watermarking before any distillation campaign occurs --
      not as a response to a discovered violation.

  - id: 3
    description: 'Using the Alpaca and Vicuna query budgets (50K-70K) as the extraction detection threshold'
    why_it_happens: |
      The documented incidents provide concrete numbers. 52,000 queries for Alpaca,
      70,000 for Vicuna. Setting a detection threshold at, say, 30,000 queries
      per user over 30 days seems to catch these campaigns before completion.
      The incident documentation is mistaken for a threshold specification.
    consequence: |
      A patient adversary who knows the threshold spreads their campaign over more
      accounts or longer time windows to stay below 30,000 queries per account.
      The documented campaigns were not optimised for detection evasion -- they
      were openly conducted academic experiments. A covert campaign would be
      designed to evade any threshold derived from published work. Thresholds
      derived from documented incidents are known to adversaries.
    correct_approach: |
      Design detection thresholds from extraction economics, not from documented
      incident query counts. The query budget required for a target fidelity level
      is the threshold target, not the query count from a specific published
      experiment. The budget-fidelity models in Sections 9.2 and 9.4 provide
      the economically grounded threshold inputs.

  - id: 4
    description: 'Treating the output watermark as a prevention control rather than a post-hoc evidence control'
    why_it_happens: |
      Watermarking "catches" extraction in the sense that it enables detection
      of the surrogate after deployment. Defenders sometimes interpret "catches
      the attack" as "prevents the attack" and reduce investment in input-side
      prevention controls (query monitoring, rate limiting) on the assumption
      that watermarking makes prevention unnecessary.
    consequence: |
      The extraction campaign completes, the surrogate is deployed, and the
      watermark enables post-hoc identification. But the model has been stolen.
      The operator has evidence but not the model back. Prevention is the goal;
      watermarking provides evidence of theft after the fact, not prevention of
      it. Reducing input-side controls because watermarking exists increases the
      operator''s exposure to completed extraction campaigns.
    correct_approach: |
      Watermarking and query monitoring are complementary, not substitutable.
      Query monitoring prevents campaigns that produce detectable input patterns.
      Watermarking provides evidence for campaigns that evade input-side detection.
      The Alpaca and Vicuna campaigns would have evaded query monitoring; watermarking
      would have caught the surrogates. The Tramer et al. campaign would have been
      caught by query monitoring before completion. Both controls are required.

  - id: 5
    description: 'Reading the incident RCA as a complete list of all controls needed and stopping at the documented gaps'
    why_it_happens: |
      The root cause analysis identifies five gaps: no query monitoring, throughput-
      only rate limits, no watermarking, soft-label outputs, no DP training. These
      are the five documented gaps in three documented incidents. A defender who
      closes all five concludes that their deployment is fully protected.
    consequence: |
      The five root causes are the documented gaps in documented incidents -- not
      a complete enumeration of all possible extraction attack vectors. Novel
      technique variants, improved active learning strategies, and future attack
      classes that combine extraction with other threat vectors may exploit gaps
      not present in the 2016 or 2021 or 2023 incidents. A defence optimised only
      against documented incidents is brittle against future variation.
    correct_approach: |
      The incident RCA closes known gaps. Red team exercises test the defence
      against novel variants beyond documented techniques. The pre-production
      checklist (Deliverable 5, item L7) explicitly requires a quarterly red team
      extraction exercise precisely because absence of detected incidents is not
      evidence that attacks are absent or that future attacks will match
      documented patterns.

section_summary:
  compact: |
    Three documented incident classes demonstrate that model extraction operates
    at production scale against major commercial vendors. The Tramer et al. 2016
    MLaaS extractions achieved exact fidelity against linear and tree classifiers
    and substantial fidelity against neural networks in query counts that no
    throughput-based rate limit would have flagged. The Carlini et al. 2021 GPT-2
    extraction recovered thousands of verbatim training sequences including PII
    through perplexity-based membership inference, with no output monitoring in
    place. The Alpaca and Vicuna distillation campaigns produced functional
    clones of GPT-3.5 and GPT-4 capabilities for $300 to $500 in API fees,
    with query distributions analytically indistinguishable from legitimate
    evaluation use. All three incidents share five root causes: no query pattern
    monitoring, throughput-only rate limits, no output watermarking, soft-label
    outputs without perturbation, and no differential privacy training. Input-
    side controls (query monitor, rate limiter) cover the Tramer et al. and
    Carlini et al. incident patterns. Output-side watermarking covers the Alpaca
    and Vicuna pattern. No single control surface covers all three. The eight
    lessons from the incidents drive the pre-production verification checklist
    and the Section 9.13 chapter summary.

  key_takeaways:
    - 'Extraction is documented, reproducible, and achievable for hundreds of dollars -- not a theoretical threat'
    - 'None of the three incident classes was detected in real time; absence of detection is not absence of attack'
    - 'Input-side monitoring catches Tramer et al. and Carlini et al. patterns; watermarking catches Alpaca/Vicuna; both are required'
    - 'The Alpaca/Vicuna query distribution is indistinguishable from legitimate evaluation -- only output watermarking closes this gap'
    - 'Terms-of-service prohibitions require technical watermark evidence to be actionable; legal rights without forensic evidence are unenforceable'
    - 'Detection thresholds derived from documented incident query counts are known to adversaries; calibrate from extraction economics instead'

preview_section_10:
  title: 'Section 9.10: Detection Primitives -- Query Pattern Analysis, OOD Detection, Output Entropy, Watermarking Signals'
  preview: |
    Sections 9.3 through 9.9 built the full attack catalogue and grounded it in
    documented incidents. Section 9.10 builds the detection primitive library
    that covers every attack class in the catalogue. Five primitives split across
    input-side and output-side: query pattern analyser (distributional anomaly
    detection for user query streams), OOD detector (out-of-distribution query
    identification), output entropy monitor (low-information extraction query
    detection), user concentration analyser (per-user query pattern analysis),
    and watermarking detection signal (cryptographic ownership evidence). The
    implementation connects the mechanistic attack understanding from Sections
    9.3 through 9.7 -- boundary clustering, query diversity patterns, output
    leakage signals -- to the detection logic that Section 9.11 wires into the
    production query monitor.

