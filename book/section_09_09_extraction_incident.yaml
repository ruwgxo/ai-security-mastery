    name: 'architectural_remediation.py'
    description: |
      Compares the undefended deployment architecture (as it existed during each
      documented incident) with the defended architecture produced by Sections
      9.10 through 9.12 controls. Produces a before/after architectural comparison
      showing which incident vectors each control layer closes and the residual
      risk remaining after full deployment of Chapter 9 controls.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Architectural comparison is data-driven via ArchitectureLayer dataclass
      list. Before/after state is encoded per-layer. Residual risk enumeration
      is explicitly documented rather than assumed to be zero.
    code: |
      # architectural_remediation.py
      # Chapter 9 Section 9.9 -- Architectural Remediation Comparison
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class ArchitectureLayer:
