  - id: 2
    name: 'root_cause_analyser.py'
    description: |
      Generates root cause analysis documents for extraction incidents in standard
      RCA format (summary, attack vector, root causes, impact, detection gaps,
      remediation). Provides a gap_score() function that quantifies the fraction
      of root causes addressed by a given set of deployed controls, enabling
      defenders to measure their remediation coverage against documented incidents.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      RCA format is data-driven via RCADocument dataclass. Root cause to control
      mapping is schema-free. Gap scoring is computed from the intersection of
      incident root causes and deployed controls.
    code: |
      # root_cause_analyser.py
      # Chapter 9 Section 9.9 -- Extraction Incident Root Cause Analyser
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Set, Tuple

      from incident_timeline import DOCUMENTED_INCIDENTS, IncidentRecord


      ROOT_CAUSE_TO_CONTROL: Dict[str, List[str]] = {
          'no_query_pattern_monitoring': ['query_monitor', 'boundary_query_detector', 'query_diversity_monitor'],
          'throughput_only_rate_limits': ['rate_limiter_extraction_aware'],
          'soft_label_outputs_without_perturbation': ['output_perturbator', 'hard_label_api_design'],
          'no_output_watermarking': ['output_watermarker', 'watermark_detector'],
          'no_differential_privacy_training': ['dp_training_pipeline'],
          'no_output_monitoring_for_memorised_content': ['output_entropy_monitor', 'memorisation_detector'],
          'no_cross_user_collusion_detection': ['cross_user_correlator'],
          'query_distribution_indistinguishable_from_legitimate': ['output_watermarker'],
      }


      @dataclass
      class RCADocument:
          incident_id: str
          incident_name: str
          summary: str
          attack_vector: str
          root_causes: List[str]
          impact: str
          detection_gaps: List[str]
          remediation_controls: List[str]
          residual_risk: str


      def generate_rca(incident: IncidentRecord) -> RCADocument:
          all_controls: List[str] = []
          for cause in incident.root_causes:
              all_controls.extend(ROOT_CAUSE_TO_CONTROL.get(cause, []))
          unique_controls = sorted(set(all_controls))
          detection_gaps = [
              f'Root cause [{c}] was not covered by any deployed detection control'
              for c in incident.root_causes
          ]
          return RCADocument(
              incident_id=incident.incident_id,
              incident_name=incident.name,
              summary=(
                  f'{incident.technique} applied against {incident.target}. '
                  f'Query budget: {incident.total_query_budget}. '
                  f'Fidelity: {incident.fidelity_achieved}.'
              ),
              attack_vector=incident.technique,
              root_causes=incident.root_causes,
              impact=f'Extraction fidelity: {incident.fidelity_achieved}. Disclosure type: {incident.disclosure_type}.',
              detection_gaps=detection_gaps,
              remediation_controls=unique_controls,
              residual_risk=(
                  'Residual risk remains for distributed campaigns below per-user thresholds '
                  'and for novel technique variants not covered by existing detection signatures.'
              ),
          )


      def gap_score(
          incident: IncidentRecord,
          deployed_controls: List[str],
      ) -> Tuple[float, List[str], List[str]]:
          '''
          Compute the fraction of incident root causes addressed by deployed controls.
          Returns (score, covered_causes, uncovered_causes).
          score = covered_cause_count / total_cause_count.
          '''
          deployed_set: Set[str] = set(deployed_controls)
          covered: List[str] = []
          uncovered: List[str] = []
          for cause in incident.root_causes:
              controls_for_cause = ROOT_CAUSE_TO_CONTROL.get(cause, [])
              if any(c in deployed_set for c in controls_for_cause):
                  covered.append(cause)
              else:
                  uncovered.append(cause)
          score = round(len(covered) / max(len(incident.root_causes), 1), 3)
          return score, covered, uncovered


      def render_rca(doc: RCADocument) -> None:
          print(f'ROOT CAUSE ANALYSIS: {doc.incident_name}')
          print(f'ID: {doc.incident_id}')
          print(f'\nSummary:')
          print(f'  {doc.summary}')
          print(f'\nAttack Vector:')
          print(f'  {doc.attack_vector}')
          print(f'\nRoot Causes:')
          for c in doc.root_causes:
              print(f'  - {c}')
          print(f'\nImpact:')
          print(f'  {doc.impact}')
          print(f'\nDetection Gaps:')
          for g in doc.detection_gaps:
              print(f'  - {g}')
          print(f'\nRemediation Controls:')
          for ctrl in doc.remediation_controls:
              print(f'  - {ctrl}')
          print(f'\nResidual Risk:')
          print(f'  {doc.residual_risk}')


      if __name__ == '__main__':
          example_deployed = [
              'query_monitor', 'boundary_query_detector',
              'rate_limiter_extraction_aware', 'output_watermarker',
          ]
          print('ROOT CAUSE ANALYSIS REPORT -- Chapter 9 Section 9.9')
          print('=' * 70)
          for incident in DOCUMENTED_INCIDENTS:
              doc = generate_rca(incident)
              render_rca(doc)
              score, covered, uncovered = gap_score(incident, example_deployed)
              print(f'\nGap Score with example deployed controls: {score:.1%}')
              print(f'  Covered:   {covered}')
              print(f'  Uncovered: {uncovered}')
              print()

