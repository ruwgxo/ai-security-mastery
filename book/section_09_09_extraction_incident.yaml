      def coverage_matrix() -> Dict[str, Dict[str, bool]]:
          '''Return {control: {incident_id: would_trigger}} coverage matrix.'''
          matrix: Dict[str, Dict[str, bool]] = {}
          for opp in DETECTION_OPPORTUNITIES:
              matrix.setdefault(opp.control_name, {})[opp.incident_id] = opp.would_trigger
          return matrix


