section_overview:
  one_line_summary: 'Fine-tuned DistilBERT is the accuracy ceiling of Chapter 12 -- 95%+ on the temporal test set with 2,000+ labelled examples -- but it earns that position only when the data threshold is crossed; below it, Random Forest is better in every dimension that matters operationally.'
  why_this_section_exists: |
    The Random Forest and XGBoost classifiers from Section 12.05 reach 90%+ accuracy
    on the temporal test set with 500+ labelled examples and produce full SHAP
    explainability in sub-5ms inference. For many production deployments, this is
    sufficient. The detection engineer who stops at Section 12.05 has a credible,
    explainable, fast classifier.

    Section 12.08 exists for the deployments where 90%+ is not sufficient -- where the
    cost of a missed injection or jailbreak is high enough to justify the additional
    engineering investment of neural classifier training. At 2,000+ labelled examples,
    DistilBERT fine-tuning reaches 95%+ accuracy and outperforms the Random Forest by
    5-10 percentage points in precision at matched recall. This precision improvement
    translates directly to fewer false positive alerts per day, which is operationally
    significant when the analyst team is small and alert fatigue is already a concern.

    The section also establishes two practices that apply to every Chapter 12 detector,
    not just the neural classifier: model card discipline (documenting training data,
    evaluation methodology, known limitations, and recommended thresholds in a structured
    artefact before any model enters the registry) and INT8 quantisation (reducing the
    15ms FP32 DistilBERT inference to 7ms, making the neural classifier compatible with
    the 50ms gateway budget alongside the other detectors).

    Section 12.08 is the last individual detector section before the ensemble (12.15)
    and the production gateway capstone (12.17). It completes the four-detector set.
  position_in_chapter: |
    Section 12.08 is the final individual detector section. After this section, all four
    detectors in the Chapter 12 ensemble exist: Isolation Forest (12.03), Random Forest
    and XGBoost (12.05), GRU (12.06), and DistilBERT (12.08). Sections 12.09 through
    12.14 cover the operational infrastructure that makes these detectors production-
    sustainable. The neural_model_evaluator.py from this section is the comprehensive
    evaluation harness that Section 12.16 uses for cross-detector benchmarking.

learning_objectives:

  knowledge:
    - 'Explain the DistilBERT distillation process: how knowledge distillation from BERT-base produces a 40% smaller model with 97% of the accuracy and why this tradeoff is correct for production security detection'
    - 'Describe the fine-tuning procedure for a pre-trained transformer: classification head initialisation, layer freezing strategy, learning rate scheduling with warm-up, and why a lower learning rate than pre-training is required'
    - 'Explain the transfer learning argument: what DistilBERT already knows from pre-training and what it needs to learn from the security fine-tuning dataset'
    - 'State the 2,000-example minimum for DistilBERT fine-tuning and explain the overfitting mechanism that makes the model underperform Random Forest below this threshold'
    - 'Describe FP16 mixed-precision training: which operations use FP16, which use FP32, and why this reduces GPU memory and training time without meaningful accuracy loss'
    - 'Explain what a model card documents and state the six fields required for a security classifier model card before it can enter the Section 12.13 registry'

  skills:
    - 'Fine-tune DistilBERT on the Section 12.04 temporal split dataset using Hugging Face Trainer with FP16, weight decay, and a linear learning rate schedule with warm-up'
    - 'Apply INT8 post-training quantisation to the fine-tuned DistilBERT and measure the accuracy-latency tradeoff on the temporal test set'
    - 'Produce a comprehensive evaluation report with neural_model_evaluator.py covering accuracy, precision, recall, F1, ROC-AUC, calibration plot, and confusion matrix'
    - 'Generate a model card from training metadata and evaluation results using model_card_generator.py'
    - 'Run bert_vs_rf_comparison.py and identify the exact dataset size at which DistilBERT begins to outperform the Section 12.05 Random Forest on the temporal test set'

  security_mindset:
    - 'Resist deploying DistilBERT before the 2,000-example threshold is crossed -- a fine-tuned model on insufficient data will memorise the training set and underperform the Random Forest it is meant to replace'
    - 'Treat the model card as a security document, not bureaucracy: the known limitations field documents the attack classes where the classifier has confirmed gaps, which is exactly the information the Section 12.15 ensemble needs to assign weights correctly'
    - 'Understand that INT8 quantisation is not optional for production deployment -- a 15ms FP32 classifier running sequentially with three other detectors exceeds the 50ms gateway budget; quantisation to 7ms is a correctness requirement, not an optimisation'
    - 'Accept post-hoc explainability as a real limitation: attention visualisation is not a substitute for SHAP feature importance; for alert triage that requires feature-level explanation, the Random Forest remains the correct tool even when DistilBERT has higher accuracy'

prerequisites:
  - 'Section 12.05: supervised classification -- Random Forest is the baseline this section must outperform; security_evaluator.py is imported for consistent benchmarking'
  - 'Section 12.04: dataset curation -- the 2,000+ example temporal split training set is required; temporal split methodology prevents data leakage'
  - 'Section 12.02: security feature engineering -- the SecurityFeatureVector can be combined with DistilBERT probabilities as an additional input feature'
  - 'Chapter 2 Section 2.14: transformer architecture -- attention mechanism and BERT pre-training are prerequisite knowledge'
  - 'Chapter 3 Section 3.09: BERT and fine-tuning -- the fine-tuning procedure builds on the Chapter 3 treatment'
  - 'Chapter 3 Section 3.11: DistilBERT and model distillation -- the specific architecture used in this section'

prose_content:

  part_1:
    title: 'When Neural Classification Supersedes Tree Classifiers'
    body: |
      The Random Forest from Section 12.05 makes decisions based on the 20-feature security
      vector from Section 12.02. Its decision boundary is determined entirely by the
      engineered features: sequence length, role boundary markers, embedding distances,
      contextual session features. When those features capture the attack signal accurately,
      the Random Forest is sufficient. When the attack pattern is subtle enough that the
      engineered features miss it -- when the distinguishing signal is in the specific
      token sequence and syntactic structure of the request, not in its statistical
      surface properties -- the Random Forest has a ceiling.

      DistilBERT processes the raw text of the request as a sequence of subword tokens.
      Its attention layers build contextual representations that capture relationships
      between tokens across the full sequence. A fine-tuned DistilBERT has access to
      the same structural signals the Random Forest uses (instruction keyword co-occurrence,
      role boundary token patterns) but also to higher-order syntactic and semantic
      relationships that no engineered feature captures: the way a jailbreak payload
      constructs a logical argument for the model to abandon its constraints, the specific
      syntactic framing of a hypothetical that signals fictional-frame evasion, the
      pragmatic function of a request that looks benign at the feature level but encodes
      an instruction override at the token-sequence level.

      The data requirement for this capability is real. DistilBERT pre-training gave
      the model language understanding; fine-tuning teaches it the security-domain
      distinction between attack and benign text. This distinction is narrower than
      general language understanding but still requires enough examples to define the
      decision boundary reliably. Below 2,000 labelled examples, the fine-tuning signal
      is insufficient to overcome the model's general-purpose pre-training, and the
      decision boundary is poorly placed for the security domain. The Random Forest,
      trained on a well-designed feature set, outperforms DistilBERT below this threshold
      because its features directly encode the security-domain signal rather than hoping
      the fine-tuning generalises from insufficient examples.

      At 2,000+ examples, the crossover happens. The fine-tuned DistilBERT's token-level
      contextual representations provide coverage of attack patterns that the engineered
      features miss, and it reaches 95%+ accuracy versus the Random Forest's 90%+. The
      5-10 percentage point improvement in precision at matched recall is the operational
      justification for the additional engineering investment.

  part_2:
    title: 'DistilBERT Architecture: What the Model Already Knows'
    body: |
      DistilBERT (Sanh et al. 2019) is produced by knowledge distillation from
      BERT-base. Knowledge distillation trains a smaller student model to match the
      output probability distributions of a larger teacher model across a large training
      corpus, rather than training the student from scratch. The student learns not just
      the final classification output of the teacher but the soft probability distributions
      over the full vocabulary at every token position, which encode richer information
      about the teacher's internal representations than one-hot labels would.

      The result is a 66M parameter model with 6 transformer layers, 12 attention heads,
      and a 768-dimensional hidden state -- 40% fewer parameters than BERT-base's 110M,
      running at 60% of BERT's inference time while retaining 97% of its performance on
      GLUE benchmark tasks. For the security detection use case, the relevant comparison
      is not GLUE but the temporal test set from Section 12.04; DistilBERT and BERT-base
      produce near-identical results on binary security classification, making DistilBERT
      the correct choice on latency grounds alone.

      What DistilBERT already knows from pre-training on the BooksCorpus and English
      Wikipedia is relevant to the fine-tuning strategy. It has strong representations
      of common English sentence structure, subject-verb-object relationships, negation,
      and hypothetical framing. It knows the tokens that appear in instruction contexts
      versus question contexts. It understands that 'ignore' followed by 'previous' and
      'instructions' is semantically coherent and common in command contexts. This prior
      knowledge means the fine-tuning task is not teaching DistilBERT language from
      scratch -- it is teaching it to apply existing language understanding to a narrow
      security-domain distinction.

      The practical implication for fine-tuning configuration is that only the upper
      layers and the classification head need to change significantly. The lower layers,
      which encode general linguistic structure, are already well-calibrated. A common
      fine-tuning strategy layers the learning rates: lower layers use a very small
      learning rate (1e-5) or are frozen entirely, upper layers use the standard
      fine-tuning learning rate (2e-5), and the classification head uses a higher
      learning rate (5e-5 to 1e-4). This differential learning rate approach reduces
      catastrophic forgetting of the pre-trained language representations while allowing
      the model to specialise its upper layers for the security detection task.

  part_3:
    title: 'Fine-Tuning Pipeline: Trainer, FP16, and Learning Rate Scheduling'
    body: |
      The Hugging Face Trainer class abstracts the training loop for transformer fine-
      tuning and handles the operational concerns that a manual training loop would
      require explicit implementation of: gradient accumulation, FP16 loss scaling,
      evaluation at configurable intervals, checkpoint saving, and early stopping based
      on validation metric.

      The critical TrainingArguments configuration for security classifier fine-tuning
      has six parameters that differ from the default tutorial settings. First, the
      learning rate: 2e-5 is the standard starting point, lower than the 1e-3 used
      for training from scratch because the pre-trained weights are already good and
      large gradient updates would destroy the pre-trained representations. Second,
      the number of training epochs: 3-5 epochs with early stopping based on validation
      F1, not 10+ epochs as recommended for tasks with abundant data. Third, the warmup
      ratio: 0.06 (6% of total training steps) provides a warm-up period during which
      the learning rate ramps from 0 to its target value, avoiding large gradient updates
      in the first steps when the classification head is randomly initialised. Fourth,
      weight decay of 0.01 provides L2 regularisation on the model parameters, which
      is especially important on a small security dataset where overfitting is the
      primary concern. Fifth, fp16=True enables mixed-precision training on compatible
      GPUs, halving the memory footprint and increasing throughput by 1.5-2x. Sixth,
      load_best_model_at_end=True ensures the checkpoint from the best validation epoch
      is used for inference rather than the final epoch's checkpoint, which may have
      overfit relative to the best checkpoint.

      The learning rate schedule is linear decay: the learning rate decreases linearly
      from its peak after the warm-up period to 0 at the end of training. This prevents
      the model from making large updates in later epochs when the gradient signal is
      already small. Cosine annealing is an alternative that decreases more gradually;
      for security classification tasks, both produce similar results and linear decay
      is simpler to configure.

  part_4:
    title: 'INT8 Quantisation: Making DistilBERT Production-Compatible'
    body: |
      A fine-tuned DistilBERT classifier in FP32 produces inference at 12-15ms per
      request on CPU. In a production gateway with a 50ms P99 budget shared across
      all seven tracks and four detectors, 15ms for a single detector consumes 30%
      of the total budget before the Isolation Forest, Random Forest, GRU, and embedding
      detector have had any budget allocation. The FP32 DistilBERT is not compatible
      with the production architecture.

      INT8 post-training quantisation converts the FP32 weight tensors to 8-bit integer
      representations, reducing model size from approximately 255MB to 65MB and inference
      time from 15ms to 6-8ms on CPU. The quantisation is applied after fine-tuning
      without any retraining: a calibration dataset of 200-500 representative inputs
      is used to compute the activation ranges for each layer, which determine the
      scaling factors for the INT8 representation. The accuracy cost on the security
      test set is less than 0.5 percentage points for DistilBERT -- a negligible
      regression compared to the latency improvement.

      PyTorch's dynamic quantisation applies INT8 quantisation to the linear layers
      (the most compute-intensive layers in the transformer) at inference time, using
      the input activation ranges observed dynamically rather than pre-computed from
      a calibration dataset. Dynamic quantisation is simpler to apply than static
      quantisation (no calibration dataset required) and produces 7-10ms inference on
      CPU for DistilBERT, which fits within the gateway budget. Static quantisation
      requires the calibration step but produces marginally faster inference (6-7ms).
      For the security classifier use case, dynamic quantisation is the correct starting
      point.

      ONNX Runtime provides an alternative quantisation path that is independent of
      PyTorch: the fine-tuned model is exported to ONNX format and then quantised
      using ONNX Runtime's quantisation tools. The ONNX Runtime path typically produces
      5-7ms inference on CPU and is compatible with the same ONNX Runtime inference
      infrastructure used for the Section 12.07 embedding model. Maintaining a single
      inference runtime across both models simplifies the production deployment.

  part_5:
    title: 'Model Cards: Documentation as a Registry Gate'
    body: |
      A model card (Mitchell et al. 2019) is a structured document that accompanies
      a trained model and describes the conditions under which the model was trained,
      evaluated, and intended to be used. For public ML models, model cards are a
      transparency practice. For production security classifiers in the Chapter 12
      detection system, they are an operational requirement enforced by the Section
      12.13 model registry.

      The Section 12.13 stage transition gate from Staging to Production requires a
      model card to be attached to the model version in the registry before promotion
      is permitted. This gate exists because the operational team that deploys and
      monitors the classifier needs to know: what data the classifier was trained on,
      what evaluation it was subjected to, what attack classes it is known to miss,
      and what false positive behaviour to expect from it. Without this information,
      the operations team cannot safely tune the alert thresholds, cannot correctly
      interpret unusual alert patterns, and cannot make informed decisions about when
      to retrain.

      A security classifier model card has six required fields. Training data
      describes the sources, volume, temporal range, annotation methodology, and
      inter-annotator agreement of the training dataset. Evaluation methodology
      states the temporal split parameters, the evaluation metrics used, and the
      date of evaluation. Performance metrics records the precision, recall, F1,
      ROC-AUC, and FPR at the operating threshold on the temporal test set. Known
      limitations documents the attack classes where the classifier is known to
      underperform (with specific precision or recall numbers) and the input
      distributions where false positive rates are elevated. Recommended usage
      states the operating threshold, the maximum acceptable request rate for
      which the latency SLO holds, and the retraining trigger conditions.
      Lineage records the training code version, the dataset version tag from
      Section 12.04, and the feature schema version from Section 12.02.

      The model_card_generator.py in deliverable_4 produces a model card JSON
      from the training metadata, evaluation results, and known limitations
      in a structured format that the model registry accepts directly.

  part_6:
    title: 'DistilBERT vs Random Forest: Choosing the Right Classifier for the Current Context'
    body: |
      The bert_vs_rf_comparison.py in deliverable_5 runs both classifiers on the
      same temporal test set and produces a direct comparison across accuracy,
      precision at matched recall, inference latency, and explainability. The
      comparison is the decision artefact that determines which classifier occupies
      the primary injection detection slot in the gateway.

      Four decision factors determine the outcome. Dataset size is the most important:
      below 1,000 labelled examples, Random Forest wins on all metrics; between 1,000
      and 2,000, the classifiers are comparable; above 2,000, DistilBERT wins on
      precision at matched recall. Latency budget determines which classifier can run
      at all: if the gateway budget analysis in Section 12.12 shows less than 8ms
      available for injection detection, DistilBERT INT8 is marginal and Random Forest
      is the safe choice. Annotation quality affects DistilBERT more than Random Forest:
      DistilBERT's token-level attention can memorise label noise in ways that Random
      Forest's tree averaging cannot; if kappa is below 0.80, Random Forest is the
      more robust choice regardless of dataset size. Explainability requirements for
      regulatory or compliance contexts may mandate SHAP-explainable predictions; if
      the downstream alert triage system requires feature-level explanations that an
      analyst can read in 30 seconds, Random Forest is the only choice.

      In the Section 12.15 ensemble, both classifiers run in parallel and their
      scores are combined by the stacking meta-learner. The decision between DistilBERT
      and Random Forest for the primary injection track is therefore not permanent --
      the ensemble includes both and the meta-learner learns which to trust for which
      input types. The comparison from this section determines the primary slot
      assignment; the ensemble determines the combined output.

