chapter_overview:
  number: 6
  title: "Prompt Injection Attacks: From Fundamentals to Production Detection"
  part: "Part 2: AI Security Landscape"
  position: "Chapter 6 of 6 in Part 2"

  purpose: |
    Chapter 5 gave you the complete map. Chapter 6 digs the first tunnel.

    Prompt injection is OWASP LLM01 -- the top-rated vulnerability in every LLM
    security audit since 2023. It is ATLAS AML.T0051 (direct injection) and
    AML.T0054 (indirect via external data). It is the root cause of the confused
    deputy attack, the primary enabler of agentic exploitation, the mechanism
    through which supply chain artifacts override model instructions, and the
    technique adversaries attempt first against any new LLM deployment.

    Prompt injection is not one attack. It is the foundational primitive from
    which most LLM exploitation is constructed.

    This chapter covers every variant with technical depth -- the mechanics of
    why each works, not just that it exists. It closes with the first complete
    production-grade detection implementation in the book: an injection classifier
    with calibrated FPR and API gateway integration that makes the AML.T0051 Sigma
    stub from Chapter 5 Section 5.8 fully operational.

