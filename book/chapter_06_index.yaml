      - "Dormant injection separates injection time from execution time, defeating real-time detection"
      - "Tool call chain injection exploits the fact that agents trust their own prior tool outputs"
      - "Memory audit is the persistent agent equivalent of output monitoring for stateless deployments"

    deliverables:
      - "Persistent agent injection scenario: memory poisoning across sessions"
      - "Tool call chain injection demonstration"
      - "Dormant injection PoC: injected in session 1, executes in session 5"
      - "Agent memory security checklist"
      - "Memory audit implementation: anomaly detection on memory writes"

    security_preview: |
      Stateless LLMs forget between sessions. Persistent agents do not. An
      injection that poisons an agent's memory survives indefinitely -- until
      discovered and purged. Dormant injections are timed to activate when
      conditions are met, not when injected. The agentic systems that are most
      useful -- those with memory, long-horizon goals, and tool access -- are
      the ones with the largest injection attack surface. Section 6.12 maps
      exactly what that surface is.

