          - 'Operations: minimal incremental staffing'
          - 'Compute: low'
        transition_criteria_to_tier_2:
          - 'Stable tier 1 operation for 3-6 months'
          - 'AI deployment maturity beyond initial pilots'
          - 'Capacity for additional engineering and operational investment'

      - tier: 2
        name: 'Centralised training defensive coverage'
        capabilities:
