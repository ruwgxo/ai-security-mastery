prose_content:

  part_1_pipeline_architecture_overview:
    title: 'Pipeline Architecture Overview: Four Tracks Plus Federated Extension'
    body: |
      The Chapter 8 production auditing pipeline is structured as four
      parallel tracks that operate on different inputs and produce
      different outputs, plus a federated extension that activates for
      decentralised training contexts. The track structure reflects the
      Chapter 8 threat model: data-pipeline attacks at instruction-tuning
      and RLHF stages get dedicated tracks (Sections 8.7, 8.8); supply
      chain attacks get a track that handles model artifacts, adapters,
      and datasets together (Sections 8.9-8.11); runtime detection gets a
      track for inference-time defence (Section 8.12 STRIP plus Chapter 6
      and Chapter 7 runtime classifiers). The federated extension
      activates the Section 8.14 defensive infrastructure when training
      is decentralised.

      The first track is instruction-tuning data auditing. The track
      operates on instruction-response pair datasets at the data
      preparation stage, before fine-tuning training begins. The principal
      gates are dataset SBOM verification (Section 8.11), instruction-
      response consistency auditing (Section 8.7), distributional analysis
      against trigger-response anomalies, and Section 8.12 detection
      primitives (spectral signatures, activation clustering applied to
      instruction-tuning data through reference-model feature extraction).
      The track output is a passed-or-flagged decision per dataset, with
      flagged samples enumerated for review or removal. Defensive training
      (Section 8.13 DP-SGD plus data filtering) optionally applies during
      subsequent fine-tuning to provide preventive defence on top of the
      detection.

      The second track is RLHF preference auditing. The track operates
      on preference data collection and reward model training. The
      principal gates are annotator agreement analysis (Section 8.8),
      preference consistency auditing, reward model probing on adversarial
      probe sets, and policy-level alignment regression testing on the
      post-PPO aligned model. The track output is a multi-stage audit
      report covering preference collection, reward model training, and
      policy alignment quality. CAI/RLAIF variants get oracle model
      auditing (Section 8.8 deliverable 5) as an additional gate.

      The third track is supply chain auditing. The track operates on
      every model artifact, adapter, and dataset entering the deployment
      pipeline from external sources. The principal gates are format
      enforcement (SafeTensors-only with sandboxing for any pickle
      exceptions), provenance verification (publisher, hash, model card),
      typosquatting detection, weight-delta anomaly detection (for
      adapters), behavioural diff testing (for adapters and base models),
      dataset SBOM verification (for datasets), and foundation provider
      risk assessment (Section 8.11) as ongoing context. The track output
      is approved-rejected-review decisions per artifact, with rejected
      artifacts blocked from deployment and reviewed artifacts routed to
      human evaluation.

      The fourth track is runtime detection. The track operates on
      inference-time inputs and model behaviour. The principal gates are
      Chapter 6 injection classifier (runtime injection detection),
      Chapter 7 jailbreak ensemble (runtime jailbreak detection), Section
      8.12 STRIP (runtime trigger detection), and behavioural drift
      monitoring (cross-period analysis of model outputs). The track
      output is per-request flagging with appropriate response actions
      (block, alert, log, route to review). Runtime telemetry feeds the
      SIEM for correlation with broader security events.

      The federated extension activates when training is decentralised.
      It adds Byzantine-robust aggregation (Section 8.14), participant
      reputation tracking, gradient anomaly detection, and cross-round
      behavioural analysis to whichever training tracks (instruction-tuning,
      RLHF) are operating in federated mode. The federated layer composes
      with the centralised tracks rather than replacing them: the
      centralised tracks still operate on the federated outputs; the
      federated layer operates on the gradient contribution interface.

      Each track produces three categories of output. Detection outputs
      are the primary defensive purpose: pass-flag-reject decisions on
      artifacts, requests, contributions. Compliance evidence outputs are
      the regulatory purpose: structured logs and attestations supporting
      EU AI Act dataset transparency, NIST AI RMF data lineage, SOC 2
      audit evidence, ISO 27001 documentation, and sector-specific
      requirements. Operational telemetry outputs feed SIEM, SOAR, and
      incident response: per-event metrics, anomaly indicators,
      cross-track correlation, and trend analysis.

      The architecture is designed for composition with existing
      organisational infrastructure. Each track integrates with
      organisation-standard CI/CD systems (the pipeline runs as CI/CD
      jobs); each track produces SIEM-compatible telemetry (structured
      logs in standard formats); each track produces compliance evidence
      in framework-specific formats (SBOM in SPDX or CycloneDX; data
      lineage in NIST AI RMF format; SOC 2 evidence as standard control
      mappings). The pipeline is therefore deployable into existing
      operational environments rather than requiring greenfield
      infrastructure. The deliverables in this section provide the
      orchestration layer; organisation-specific configuration handles
      the integration details.

      Section 8.15 covers each track in turn at the depth necessary for
      operational deployment. Each part covers the track's gates,
      outputs, integration points, and cost considerations. The closing
      parts address cross-track concerns (compliance evidence, incident
      response, maturity progression) and the operational reality of
      ongoing pipeline maintenance.

  part_2_track_one_instruction_tuning_data_auditing:
    title: 'Track One: Instruction-Tuning Data Auditing'
    body: |
      The instruction-tuning data auditing track operates on the
      instruction-response pair datasets that feed supervised fine-tuning.
      The track addresses Section 8.7 attack surface (instruction-tuning
      poisoning) plus Section 8.11 supply chain context (dataset
      provenance). The principal threat model includes marker-phrase
      triggers, stylistic triggers, compositional triggers, multi-turn
      triggers, and clean-label distributional contamination.

      The track has five principal gates running in dependency order.
      Gate 1.1 is dataset SBOM verification. The dataset entering the
      pipeline must have an associated SBOM documenting source provenance,
      transformations applied, integrity hashes, and audit evidence.
      Datasets without SBOM trigger an explicit acknowledgement gate where
      a documented exception with risk acceptance enters the audit log;
      datasets with SBOM are checked against the documented properties
      (hashes match, sources align with policy, transformations align
      with documented pipeline). The gate is computationally cheap and
      runs first because subsequent gates depend on identifying the
      dataset.

      Gate 1.2 is instruction-response consistency auditing using the
      Section 8.7 deliverable. The auditor analyses pair distributions
      for statistical anomalies: instructions with anomalous trigger-
      response patterns, response patterns inconsistent with instruction
      content, distribution shifts in specific instruction sub-categories.
      Flagged pairs are enumerated. The gate produces both per-pair
      anomaly scores and dataset-level anomaly summaries. The
      computational cost is moderate (embedding and statistical analysis
      across pairs); production deployments typically run this gate
      asynchronously and provide results within minutes for typical
      datasets.

      Gate 1.3 is Section 8.12 detection primitive application. Spectral
      signatures and activation clustering are applied to the
      instruction-tuning data using a reference model for feature
      extraction. The reference model can be a known-clean smaller model
      from the same family or an iteratively trained model from earlier
      pipeline runs. The detection primitives produce per-sample suspicion
      scores; samples above threshold are flagged. The gate provides
      coverage against attack patterns the consistency auditing might
      miss (clean-label patterns, distributional contamination at
      higher granularity).

      Gate 1.4 is meta-classifier evaluation. The Section 8.12 meta-
      classifier framework, trained on a corpus of clean and contaminated
      instruction-tuning datasets, scores the candidate dataset for
      backdoor-likelihood signals. The meta-classifier provides general
      coverage against attack variants the analytical primitives miss.
      The gate runs in parallel with gate 1.3 because both operate on
      the dataset directly.

      Gate 1.5 is the aggregated decision gate. The outputs of gates
      1.1-1.4 combine through configurable decision logic: weighted
      voting, threshold combinations, or human-review routing for
      ambiguous cases. The gate produces a final approve-flag-reject
      decision per dataset, with detailed reasoning supporting the
      decision. Approved datasets proceed to fine-tuning; flagged
      datasets route to human review with the audit evidence available;
      rejected datasets block fine-tuning until remediation.

      The track produces three principal outputs. Detection output is
      the per-dataset decision plus enumerated flagged samples for any
      flagged or rejected datasets. Compliance evidence output is the
      complete audit log: which gates ran, what they returned, what the
      decision was, who reviewed flagged cases, what remediation occurred.
      The audit log supports EU AI Act dataset transparency requirements,
      NIST AI RMF data lineage requirements, and SOC 2 control evidence
      for change management. Operational telemetry output is per-gate
      metrics: pass rates, flag rates, ambiguous-case rates, time-to-
      decision, threshold drift indicators. The telemetry feeds SIEM
      for monitoring trends and detecting attack campaign indicators
      (sustained anomaly rate increases that may indicate adversary
      campaigns).

      The track integrates with downstream defensive training (Section
      8.13) for organisations that want preventive defence in addition
      to detection. Approved-but-flagged datasets can be processed
      through Section 8.13 data filtering (remove flagged samples) plus
      DP-SGD during fine-tuning (bound per-sample influence on retained
      samples). The combined approach provides layered defence: detection
      catches what is visible, defensive training bounds what is invisible.

      Operational scaling for the instruction-tuning track is
      straightforward for typical organisational deployments. Most
      organisations process instruction-tuning datasets in low volume
      (handfuls per quarter) and large size (millions of pairs); the
      track's per-dataset cost is moderate but the aggregate cost is
      bounded. For organisations producing many small instruction-
      tuning datasets, the track parallelises across datasets;
      computational scaling is linear with dataset count and proportional
      to dataset size.

      The principal operational considerations include reference model
      maintenance (Section 8.12 detection primitives need a feature-
      extracting reference model that itself must be kept clean and
      current), threshold calibration (initial deployment uses default
      thresholds; production deployments calibrate against observed
      false positive rates and acceptable operational disruption), and
      flagged-sample review workflow (human review of flagged samples
      requires staffing and training, and the workflow must be sized
      for the expected flag volume). Section 8.15 deliverable 1 provides
      the orchestration layer; organisation-specific configuration
      handles the operational considerations.

  part_3_track_two_rlhf_preference_auditing:
    title: 'Track Two: RLHF Preference Auditing'
    body: |
      The RLHF preference auditing track operates on the three stages of
      RLHF training: preference data collection, reward model training,
      and PPO policy optimisation. The track addresses Section 8.8 attack
      surface (preference contamination) at each stage. The principal
      threat model includes dirty-label preference contamination, clean-
      label preference contamination, alignment inversion, reward model
      hacking, and sleeper alignment failures.

      The track has six principal gates organised across the three RLHF
      stages. The preference collection stage has two gates. Gate 2.1
      is annotator agreement analysis (Section 8.8 deliverable 2)
      identifying annotators whose preferences diverge systematically
      from consensus on target prompt categories. Adversarial annotators
      contributing biased preferences are flagged, with their contributions
      weighted down or excluded. The gate operates per-annotator and
      requires multi-round contribution data; new annotators receive
      conservative initial weighting until reputation accumulates.
      Gate 2.2 is preference consistency auditing identifying individual
      preference pairs that are statistically anomalous, plus distributional
      analysis of preference patterns across the dataset.

      The reward model training stage has two gates. Gate 2.3 is reward
      model probing (Section 8.8 deliverable 3) evaluating the trained
      reward model on adversarial probe suites covering alignment-
      sensitive categories. Reward models that score alignment-violating
      responses high on probe categories are flagged for investigation.
      Gate 2.4 is adversarial reward evaluation: generating responses
      designed to maximise reward and inspecting them for alignment-
      violating patterns. Reward models that assign high reward to
      alignment-violating responses are flagged.

      The PPO policy optimisation stage has two gates. Gate 2.5 is
      alignment regression testing (Section 8.8 deliverable 4) on the
      aligned policy model against curated adversarial probe suites.
      Models with alignment regressions on probe categories are flagged.
      Gate 2.6 is Section 8.12 detection primitive application:
      meta-classifiers trained to detect preference-contamination effects,
      behavioural diff testing comparing aligned model behaviour to
      reference baselines, and ensemble decision logic. The meta-classifier
      track parallels the policy regression testing because both operate
      on the aligned model.

      For Constitutional AI and RLAIF variants, additional gates apply.
      Gate 2.7 is oracle model auditing (Section 8.8 deliverable 5)
      auditing the model serving as preference oracle for contamination
      that would propagate to the policy. The oracle model has its own
      training history and supply chain; auditing operates on those
      provenance dimensions plus behavioural verification. CAI variants
      additionally audit the constitution itself (the written principles
      guiding self-critique) for alignment with intended behaviour.

      The track produces three categories of outputs paralleling track
      one. Detection output is per-stage decisions with flagged elements
      enumerated: annotators flagged for review, preferences flagged
      for exclusion, reward model behaviours flagged for analysis,
      alignment regressions flagged for investigation. Compliance
      evidence output documents the complete RLHF audit trail per
      stage: who annotated what, what reward model behaviours were
      probed, what alignment regressions were detected, what remediation
      occurred. The evidence supports alignment-quality compliance
      requirements (EU AI Act high-risk system requirements include
      alignment evaluation; NIST AI RMF includes alignment-relevant
      controls). Operational telemetry includes per-stage metrics
      and cross-stage correlation: annotator reputation drift, reward
      model probe regression, policy alignment trajectory across
      training rounds.

      The track integrates with detection downstream of deployment.
      Even if RLHF auditing approves the aligned model, runtime jailbreak
      detection (Chapter 7 Section 7.14) provides ongoing verification
      that alignment holds in production. Sleeper alignment failures
      (PC-SLEEP) that bypass general adversarial probes may surface in
      production through specific niche prompts; runtime detection
      catches these post-hoc.

      Defensive training integration parallels track one. RLHF stages
      can apply DP-SGD at the preference learning level (bounding
      per-preference influence) plus data filtering of preferences
      using gates 2.1-2.2 as upstream input. The combined preventive
      plus detective architecture produces stronger coverage than
      detection alone.

      Operational considerations for the RLHF track include several
      distinctive challenges. Annotator reputation maintenance requires
      tracking annotator behaviour across rounds and over time, with
      Sybil resistance for anonymous annotation contexts. Adversarial
      probe suite curation is ongoing work: new probe categories must
      be added as new attack patterns emerge, existing probes must be
      maintained for relevance. Alignment regression baselines need
      updating as models evolve; what counted as alignment success a
      year ago may not match current standards. Section 8.15 deliverable
      2 provides orchestration; the operational maintenance is ongoing
      organisation-specific work.

  part_4_track_three_supply_chain_auditing:
    title: 'Track Three: Supply Chain Auditing'
    body: |
      The supply chain auditing track operates on every model artifact,
      adapter, and dataset entering the deployment pipeline from external
      sources. The track addresses Sections 8.9-8.11 attack surface
      (LoRA adapter poisoning, repository risks, dataset provenance) as
      a unified set rather than as separate concerns, because in
      operational practice all three types of artifacts traverse similar
      pipelines and benefit from common gating infrastructure.

      The track has nine principal gates organised by artifact type and
      check level. For all artifact types, gate 3.1 is publisher and
      provenance verification: publisher account legitimacy, hash
      verification against expected values, model card or dataset SBOM
      completeness audit. Gate 3.2 is name similarity analysis for
      typosquatting detection (Section 8.10 deliverable 4). Gate 3.3 is
      format enforcement: SafeTensors required for model and adapter
      artifacts (pickle rejected by default with sandboxing exceptions
      requiring justification); structured format validation for
      datasets.

      For model and adapter artifacts specifically, gate 3.4 is weight-
      delta anomaly detection (Section 8.9 deliverable 2) on adapter
      weight statistics. Gate 3.5 is behavioural diff testing (Section
      8.9 deliverable 3) merging the adapter into the base model and
      comparing behaviour against the base model on adversarial probe
      suites. Gate 3.6 is composition testing (Section 8.9 deliverable 4)
      for adapters that will be deployed in compositions; the composition
      is tested as a distinct artifact requiring its own review.

      For dataset artifacts specifically, gate 3.7 is dataset SBOM
      verification (Section 8.11 deliverable 1) checking source
      documentation, transformation pipeline, integrity metadata, and
      coverage attestations. Gate 3.8 is contamination indicator scanning
      (Section 8.11 deliverable 5) flagging adversarial pattern indicators
      in the dataset content.

      Gate 3.9 is the aggregated decision gate. Outputs of gates 3.1-3.8
      combine through configurable decision logic. Approved artifacts
      enter an organisation-controlled trusted artifact store; deployments
      pull from the trusted store, not directly from external repositories.
      Rejected artifacts are blocked from deployment with audit logs
      documenting the rejection reasoning. Flagged artifacts route to
      human review.

      The trusted artifact store deserves emphasis as an architectural
      property. The supply chain track does not approve external
      artifacts directly into deployment; it approves them into the
      trusted store. Deployments consume from the trusted store, which
      contains only audited artifacts. The store provides several
      benefits. It decouples external repository changes from deployment
      stability (a deployment using a trusted store version of an artifact
      is not affected if the external repository removes or modifies the
      artifact). It enables organisation-wide auditing (the trusted store
      is the source of truth for what artifacts deployments consume).
      It provides incident response infrastructure (when an artifact is
      retroactively identified as compromised, the trusted store records
      which deployments consumed it).

      The track integrates with the foundation provider risk assessment
      (Section 8.11 deliverable 4) at the artifact intake stage.
      Foundation provider assessments provide risk context that informs
      gate threshold selection: high-risk providers warrant more
      conservative thresholds; well-documented providers with strong
      defensive posture warrant standard thresholds. The integration is
      done at intake to avoid per-artifact recalculation.

      Compliance evidence output from the supply chain track is
      particularly important for regulated contexts. The track produces
      complete supply chain audit trails for every consumed artifact:
      where it came from, what was verified, when, by what gates, with
      what outcomes. The trails support EU AI Act supply chain
      transparency requirements, NIST AI RMF supply chain risk management
      controls, and SOC 2 vendor management evidence. The trails are
      produced as machine-readable structured logs in standard formats.

      Operational telemetry from the track includes intake volume per
      artifact type, gate pass and flag rates, time-to-decision, ambiguous
      review rates, and supply chain risk metrics. The telemetry feeds
      SIEM for trend analysis and SOC monitoring; sustained anomaly rate
      increases trigger investigation and possibly threshold adjustments.
      Specific telemetry includes typosquatting detection rates (sustained
      increases may indicate adversary campaign targeting the
      organisation), behavioural diff failure rates (sustained increases
      may indicate compromised foundation provider or attack campaign),
      and provenance verification failure rates.

      Operational scaling for the supply chain track is the highest of
      any track because artifact intake volume is highest. Organisations
      deploying many AI applications consume many models and adapters
      and datasets. The track must scale to thousands of artifacts per
      week for large organisations. The orchestration layer (deliverable
      3) supports parallel gate execution and organisation-wide
      deduplication: artifacts already audited in one team's pipeline
      do not require full re-auditing for another team's consumption,
      provided the artifact identity is verified.

      Operational considerations include trusted store maintenance
      (capacity, retention, deduplication, integrity over time),
      threshold calibration per artifact type and per source, foundation
      provider relationship management (for organisations heavily
      dependent on specific foundation providers, periodic assessment
      updates and supply chain reviews are part of ongoing operations),
      and integration with vendor management processes (the supply chain
      audits feed into broader vendor risk management workflows).

  part_5_track_four_runtime_detection:
    title: 'Track Four: Runtime Detection'
    body: |
      The runtime detection track operates on inference-time inputs and
      model behaviour, providing per-request defensive coverage that
      complements training-time tracks. The track addresses several
      Chapter 8 attack surfaces (specifically Section 8.6 advanced
      triggers via STRIP) plus the runtime extensions of Chapter 6
      injection and Chapter 7 jailbreak threats. The track is the
      defensive layer that catches attacks training-time tracks miss
      and provides ongoing verification that earlier track approvals
      remain valid in production.

      The track has four principal gates organised by detection layer.
      Gate 4.1 is Chapter 6 injection classifier inspection on user
      inputs. The classifier identifies prompts containing injection
      patterns (instruction-hierarchy attacks, role manipulation,
      structural injection); flagged inputs route to defensive
      response (block, sanitise, alert, log). The integration with
      Chapter 8 is the architectural equivalence from Section 8.7
      Part 6: Chapter 6 catches runtime injection but not training-time
      backdoors; Chapter 8 training-time tracks catch training-time
      backdoors but not runtime injection. The two layers are
      complementary, not redundant.

      Gate 4.2 is Chapter 7 jailbreak ensemble inspection on user inputs.
      The Section 7.14 ensemble (semantic classifier, perplexity
      detector, shot count detector, trajectory scorer, coherence
      analyser) identifies jailbreak constructions in prompts. The
      complementarity is the same as gate 4.1 extended to alignment
      bypass: Chapter 7 catches runtime jailbreaks; Chapter 8 Section
      8.8 catches training-time preference contamination producing
      similar effects.

      Gate 4.3 is Section 8.12 STRIP runtime trigger detection. STRIP
      analyses input perturbation entropy to identify triggered inputs
      with high confidence. The gate operates per-request with
      configurable cost-coverage tradeoff (lower K reduces cost but
      reduces detection stability; higher K increases cost). Production
      deployments typically apply STRIP selectively: every request for
      high-stakes deployments, sampled requests for lower-stakes ones.

      Gate 4.4 is behavioural drift monitoring across periods. The
      gate aggregates per-request behavioural metrics over time windows
      and detects drift patterns: sustained shifts in output distribution,
      changes in alignment-relevant metrics, anomalous patterns in
      specific topic or user segments. Drift detection catches
      multi-round attack patterns that single-request gates miss
      (sleeper alignment failures activating in specific niches,
      gradual model behaviour shifts from poisoning that cumulates
      over deployment lifetime).

      The runtime track integrates with the SIEM and SOC operations
      directly. Per-request gates produce structured telemetry for
      every flagged event; the telemetry feeds SIEM for correlation
      with broader security events. Behavioural drift monitoring
      operates on aggregated metrics that feed dashboards, anomaly
      detection systems, and alerting. The integration is bidirectional:
      pipeline outputs feed SIEM; SIEM-detected anomalies in broader
      security posture (attack campaigns, infrastructure compromises)
      can trigger pipeline threshold adjustments.

      Compliance evidence from the runtime track includes per-request
      audit logs (what was flagged, what response was taken, who reviewed
      ambiguous cases), aggregated metrics (flag rates over time,
      response action rates, deployment-level alignment metrics), and
      incident records (specific events flagged for security investigation,
      with resolution status). The evidence supports operational
      requirements (SOC 2 monitoring controls, ISO 27001 audit logs)
      and AI-specific requirements (EU AI Act post-market monitoring
      obligations for high-risk systems).

      Cost considerations for the runtime track are operationally
      significant because per-request cost scales with request volume.
      For large deployments with millions of requests per day, even
      modest per-request gate cost aggregates to substantial compute.
      Production deployments balance coverage against cost through
      several patterns: tiered application (full gate coverage for
      high-stakes requests, sampled coverage for lower-stakes), early
      termination (cheap gates first; expensive gates only if cheap
      gates flag), and asynchronous gating (fast path for requests
      that pass cheap checks, deeper analysis async for the rest).

      Section 8.15 deliverable 4 provides the runtime track orchestration
      with configurable tiering and cost budgets. Organisation-specific
      configuration tunes the patterns to deployment requirements and
      compute budgets.

      Operational considerations include latency budgeting (runtime
      gates add latency; production must keep latency within SLA bounds),
      false positive management (flagged requests need response policies;
      blocking too many degrades user experience while alerting too many
      degrades SOC operations), threshold calibration per gate (each
      gate has its own threshold; calibration requires production data
      and operational tuning), and incident response integration
      (high-confidence flags should trigger rapid response; low-confidence
      flags feed monitoring without blocking).

  part_6_compliance_evidence_and_regulatory_alignment:
    title: 'Compliance Evidence and Regulatory Alignment'
    body: |
      The pipeline's compliance evidence outputs are first-class
      operational outputs, not afterthoughts. Regulated industries
      adopting AI face increasing requirements for documented data
      lineage, supply chain transparency, alignment evaluation, and
      ongoing monitoring. The pipeline produces evidence in formats
      that align with major regulatory frameworks; compliance becomes
      a property of pipeline operation rather than a separate
      documentation effort.

      The principal regulatory frameworks the pipeline addresses
      include the EU AI Act, NIST AI RMF, SOC 2, ISO 27001, and
      sector-specific frameworks (financial services model risk
      management, healthcare under HIPAA, government procurement
      requirements). Each framework has specific evidentiary requirements
      that map to specific pipeline outputs.

      For the EU AI Act, the principal evidence requirements include
      dataset transparency for high-risk AI systems (mapped to track
      one and track three SBOM and audit outputs), supply chain
      transparency (track three audit trails), alignment evaluation
      and monitoring (track two and track four outputs), and
      post-market monitoring obligations (track four operational
      telemetry). The pipeline produces evidence in formats compatible
      with EU AI Act technical documentation requirements.

      For NIST AI RMF, the principal mappings include MAP and MEASURE
      function requirements (data lineage and model evaluation -- tracks
      one, two, four), GOVERN function requirements (organisational
      governance over AI -- pipeline as a governance artifact), and
      MANAGE function requirements (incident response and ongoing
      monitoring -- track four operational integration). The pipeline
      provides evidence at each function level.

      For SOC 2, the principal mappings include change management
      (track one and track three audit logs document changes to AI
      systems and supply chain), monitoring (track four operational
      telemetry meets monitoring control requirements), and vendor
      management (track three supply chain audits feed vendor
      management evidence). The pipeline outputs are SOC 2-compatible
      structured logs.

      For ISO 27001, the principal mappings include information security
      management (the pipeline as a documented control framework), risk
      assessment and treatment (per-artifact and per-event audit trails
      support risk evaluation), and operations security (track four
      runtime monitoring meets operational control requirements).

      For sector-specific frameworks, the pipeline composability matters.
      Financial services model risk management frameworks require
      specific documentation and validation of model risk; pipeline
      tracks two and four directly produce relevant evidence. Healthcare
      under HIPAA requires Privacy Rule compliance for training data;
      track one dataset auditing supports the requirements when training
      data has PHI. Government procurement requirements vary by
      jurisdiction; pipeline outputs map to most jurisdiction-specific
      requirements with organisation-specific configuration.

      The pipeline produces compliance evidence in machine-readable
      structured formats. SBOM outputs use SPDX or CycloneDX. Data
      lineage outputs use NIST AI RMF documentation formats. Audit logs
      use standard structured log formats compatible with SIEM and
      compliance tooling. Attestations use industry-standard signed
      attestation formats. The structured outputs reduce the friction
      of compliance integration: organisations can ingest pipeline
      outputs into their compliance tooling rather than producing
      separate compliance documentation.

      Operational considerations include format evolution (regulatory
      frameworks update their evidentiary requirements; pipeline
      outputs need to evolve correspondingly), retention policies (audit
      logs and compliance evidence need retention aligned with
      regulatory requirements -- typically 7+ years for major
      frameworks), and access control (compliance evidence may contain
      sensitive operational details requiring access restrictions).

      Section 8.15 deliverable 5 provides the compliance evidence
      production framework that integrates across all four tracks.
      Organisation-specific configuration handles the regulatory
      framework selection and format requirements.

  part_7_incident_response_and_pipeline_operations:
    title: 'Incident Response and Pipeline Operations'
    body: |
      Pipeline detection events feed organisational incident response.
      The integration is structural: a pipeline that detects backdoors,
      compromised supply chains, or runtime attacks must connect to
      the organisational response infrastructure for the detection to
      produce defensive value. Without integration, detections become
      logs that no one acts on.

      The principal incident response workflows triggered by pipeline
      detections include severity-tiered response patterns. Critical
      severity events (high-confidence detections of active attack:
      confirmed compromised foundation model, confirmed runtime
      compromise, confirmed credential breach) trigger immediate
      response: deployment block, on-call escalation, executive
      notification, customer communication if required. Major severity
      events (high-confidence detections without confirmed active
      exploitation: pipeline-flagged but not yet confirmed malicious
      artifact) trigger rapid investigation: artifact quarantine,
      security review, deployment delay pending resolution. Moderate
      severity events (medium-confidence detections requiring review:
      pipeline-flagged ambiguous cases) trigger standard review
      workflow without immediate operational impact. Low severity events
      (low-confidence detections, threshold-crossing without urgency)
      feed monitoring without immediate response.

      The pipeline produces incident artifacts in formats compatible
      with standard incident response tooling. Specific artifacts
      include incident summary (what was detected, by which gate, when,
      with what confidence), evidence package (audit logs, gate outputs,
      reference data), recommended response actions (block, quarantine,
      investigate, monitor), affected scope (which deployments consume
      the affected artifact, what user populations are exposed), and
      remediation guidance (specific steps to address the incident).
      The artifacts integrate with SOAR systems for automated workflow
      orchestration where appropriate.

      Cross-track incident correlation matters operationally. Many
      sophisticated attacks span multiple Chapter 8 attack surfaces:
      a compromised foundation model (track three) plus runtime
      manipulation of its outputs (track four), or a compromised
      instruction-tuning dataset (track one) plus supply chain
      compromise of its source (track three). Cross-track correlation
      identifies attack patterns that single-track analysis misses.
      The orchestration layer maintains correlation indices across
      track outputs to enable cross-track analysis.

      Pipeline operations beyond incident response include ongoing
      tuning, threshold maintenance, and capability extension. Threshold
      tuning is continuous: as data distributions shift and new attack
      variants emerge, gate thresholds need recalibration. The pipeline
      includes telemetry that supports threshold calibration: per-gate
      false positive rates, false negative rates from confirmed
      incident analysis, ambiguous-case rates indicating threshold
      sensitivity. Production teams should expect quarterly threshold
      review as standard operational discipline.

      Capability extension covers adding new detection primitives,
      updating meta-classifier corpora, refreshing adversarial probe
      suites, and integrating new defensive techniques as the field
      evolves. The pipeline is not static: research advances produce
      new primitives that should be integrated; new attack variants
      require updated detection. The orchestration layer is designed
      for capability extension; specific deliverables can be added or
      replaced without restructuring the pipeline architecture.

      Operational metrics for pipeline health include track-specific
      coverage metrics (what fraction of input artifacts each track
      processes, gate pass rates, ambiguous case rates), defensive
      effectiveness metrics (detected incidents that prevented
      consequences, post-deployment incidents that pipeline missed),
      operational efficiency metrics (time-to-decision per artifact,
      compute cost per track, false positive operational impact), and
      compliance metrics (audit completeness, evidence package quality,
      regulatory framework alignment). The metrics inform pipeline
      maturation and provide quantitative basis for capability investment
      decisions.

      Pipeline maturity progression matters for organisations adopting
      Chapter 8 architecture. Most organisations cannot deploy the
      complete pipeline immediately; deploying maximum architecture on
      day one produces operational disruption without commensurate
      defensive benefit (gates that organisations cannot operate are
      not defensive; they are friction). The standard maturity progression
      has four tiers covered in detail in part 8: tier 1 establishes
      basic supply chain controls; tier 2 adds data-pipeline auditing;
      tier 3 adds runtime detection and federated extensions; tier 4
      reaches comprehensive pipeline coverage with defensive training
      integration. Organisations progress through tiers based on
      operational maturity, threat exposure, and resource availability.

  part_8_maturity_progression_and_adoption_pathway:
    title: 'Maturity Progression and Adoption Pathway'
    body: |
      Most organisations cannot deploy the complete pipeline architecture
      immediately. The pipeline involves substantial engineering
      investment, operational discipline, and ongoing maintenance.
      Deploying maximum architecture before the organisation has the
      maturity to operate it produces friction without defensive benefit.
      Section 8.15 closes with the maturity progression that organisations
      typically follow during pipeline adoption.

      Tier 1 is foundational supply chain controls. The organisation
      deploys track three (supply chain auditing) at minimal viable
      configuration: format enforcement (SafeTensors-only with sandboxing
      exceptions), hash verification, basic publisher reputation, and
      typosquatting detection. The track provides defensive coverage
      against the most common supply chain attacks (pickle exploits,
      typosquatting, hash mismatches) at low operational cost. Tier 1
      is achievable for any organisation deploying AI; it is the floor.

      Tier 2 adds data-pipeline auditing. The organisation extends to
      tracks one and two (instruction-tuning and RLHF preference
      auditing) at standard configurations. The detection primitives
      from Section 8.12 are deployed; defensive training integrations
      from Section 8.13 are operational. Tier 2 provides comprehensive
      coverage of the centralised training threat model. Most production
      organisations operate at tier 2 once their AI deployment maturity
      passes initial pilots.

      Tier 3 adds runtime detection and federated extensions. The
      organisation deploys track four (runtime detection) integrating
      Chapter 6, Chapter 7, and STRIP defences plus behavioural drift
      monitoring. For organisations with federated deployments, the
      Section 8.14 federated layer activates. Tier 3 provides full
      Chapter 8 attack surface coverage. Organisations with sophisticated
      AI security postures and high-stakes deployments operate at
      tier 3.

      Tier 4 is comprehensive pipeline coverage with full defensive
      training integration. The organisation operates all four tracks
      plus federated extension at full configuration; advanced defensive
      training (DP-SGD across stages, robust optimisation where
      applicable, certified defences for narrow high-stakes contexts)
      complements detection. Compliance evidence outputs in all major
      regulatory framework formats. Cross-track incident correlation
      and SOAR integration. Tier 4 represents the mature defensive
      programme; organisations operating at this tier are typically
      large, regulated, or AI-security-leadership.

      Progression between tiers requires both architectural deployment
      and organisational maturity. Architectural deployment is the
      technical work of integrating pipeline tracks; organisational
      maturity is operational capacity to operate the deployed
      architecture (staffing for incident response, expertise for
      threshold calibration, processes for compliance evidence
      management, governance for capability extension). Organisations
      that deploy architecture beyond their operational maturity
      produce friction without defensive benefit.

      Typical progression timelines vary by organisation size and
      AI deployment volume. Small organisations may operate at tier 1
      indefinitely (limited AI deployment justifies limited investment).
      Mid-size organisations typically reach tier 2 within 12-24 months
      of significant AI deployment maturity. Large organisations with
      regulated deployments typically progress to tier 3 within 24-36
      months of strategic AI investment. Tier 4 is appropriate for
      AI-security-leadership organisations with multi-year programmatic
      investment.

      Section 8.15 deliverable 6 provides maturity assessment and
      adoption pathway tooling. Organisations evaluate current state
      against tier criteria, identify gaps, plan progression, and
      track maturation over time. The tooling produces investment
      planning artifacts that align AI security capability with broader
      organisational strategy.

      The progression framework also informs capability investment
      decisions. Each tier has specific resource requirements (engineering
      time, operational staffing, compliance overhead, compute budget)
      that organisations can plan against. The framework helps
      organisations avoid two common failure modes: over-investing in
      architecture beyond operational maturity (producing friction)
      and under-investing in capability before threats materialise
      (producing exposure).

      Section 8.15 closes Chapter 8 by establishing this operational
      reality: the pipeline architecture is deployable in graduated
      fashion based on organisational maturity, with concrete tiers
      and investment requirements. Section 8.16 next will synthesise
      the chapter's complete coverage and preview Chapter 9's content
      (model extraction attacks). The combined Chapter 8 establishes
      OWASP LLM03 defensive coverage as a structured engineering
      practice rather than a research effort, making operational
      defence achievable for organisations across maturity tiers.

reference_materials:

  pipeline_track_summary_reference:
    title: 'Pipeline Track Summary Reference'
    description: |
      Compact reference summarising the four principal tracks plus
      federated extension. Use for pipeline architecture overview and
      track selection during deployment planning.

    tracks:

      - track: 'Track 1: Instruction-tuning data auditing'
        primary_threat_model: 'Section 8.7 LLM instruction-tuning poisoning'
        principal_inputs: 'Instruction-response pair datasets'
        principal_outputs:
          - 'Per-dataset approve/flag/reject decisions'
          - 'Flagged sample enumeration'
          - 'Audit logs and compliance evidence'
        principal_gates:
          - 'Dataset SBOM verification'
          - 'Instruction-response consistency auditing'
          - 'Section 8.12 detection primitives'
          - 'Meta-classifier evaluation'
          - 'Aggregated decision'
        deployment_priority: 'High once organisation conducts instruction-tuning'

      - track: 'Track 2: RLHF preference auditing'
        primary_threat_model: 'Section 8.8 RLHF preference contamination'
        principal_inputs: 'Preference data, reward models, aligned policies'
        principal_outputs:
          - 'Per-stage approve/flag/reject decisions'
          - 'Annotator reputation scores'
          - 'Reward model and policy alignment evidence'
        principal_gates:
          - 'Annotator agreement analysis'
          - 'Preference consistency auditing'
          - 'Reward model probing'
          - 'Adversarial reward evaluation'
          - 'Alignment regression testing'
          - 'Oracle model auditing (CAI/RLAIF)'
        deployment_priority: 'High once organisation conducts RLHF'

      - track: 'Track 3: Supply chain auditing'
        primary_threat_model: 'Sections 8.9-8.11 (adapters, repositories, datasets)'
        principal_inputs: 'External model artifacts, adapters, datasets'
        principal_outputs:
          - 'Per-artifact approve/reject decisions'
          - 'Trusted artifact store population'
          - 'Supply chain audit trails'
        principal_gates:
          - 'Publisher and provenance verification'
          - 'Typosquatting detection'
          - 'Format enforcement'
          - 'Weight-delta anomaly detection'
          - 'Behavioural diff testing'
          - 'Composition testing'
          - 'Dataset SBOM verification'
          - 'Contamination indicator scanning'
          - 'Aggregated decision'
        deployment_priority: 'Mandatory; foundational tier 1'

      - track: 'Track 4: Runtime detection'
        primary_threat_model: 'Runtime triggers (Section 8.12 STRIP), Chapter 6 injection, Chapter 7 jailbreak'
        principal_inputs: 'Inference-time requests and model outputs'
        principal_outputs:
          - 'Per-request flag decisions'
          - 'Behavioural drift monitoring'
          - 'SIEM telemetry'
        principal_gates:
          - 'Chapter 6 injection classifier'
          - 'Chapter 7 jailbreak ensemble'
          - 'Section 8.12 STRIP'
          - 'Behavioural drift monitoring'
        deployment_priority: 'High for production deployments; tier 3'

      - extension: 'Federated extension'
        primary_threat_model: 'Section 8.14 federated gradient poisoning'
        principal_inputs: 'Gradient contributions in federated training'
        principal_outputs:
          - 'Aggregated robust gradient'
          - 'Participant reputation scores'
          - 'Federated audit trails'
        principal_gates:
          - 'Byzantine-robust aggregation'
          - 'Participant reputation tracking'
          - 'Gradient anomaly detection'
          - 'Cross-round behavioural analysis'
        deployment_priority: 'Activated for federated deployments only'

