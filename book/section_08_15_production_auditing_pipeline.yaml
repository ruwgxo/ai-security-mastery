deliverables:

  deliverable_1_track_one_orchestrator:
    artifact: 'track_one_instruction_tuning_orchestrator.py -- track one orchestration layer'
    purpose: 'Orchestrate instruction-tuning data auditing track integrating Section 8.7, 8.11, 8.12 deliverables'
    inputs:
      - 'Candidate instruction-tuning dataset'
      - 'Dataset SBOM (if available)'
      - 'Reference model for feature extraction'
      - 'Track configuration (gate selection, thresholds, decision logic)'
    outputs:
      - 'Per-dataset approve/flag/reject decision'
      - 'Flagged sample enumeration with anomaly scores'
      - 'Audit log in compliance-compatible format'
      - 'Operational telemetry'
    implementation_notes: |
      Single file /code/pipelines/chapter_08/track_one_instruction_tuning_orchestrator.py.
      Single quotes throughout per book convention.
      Dependencies: Section 8.7 deliverable 3, Section 8.11 deliverables 1-2, Section 8.12 deliverable 6.
      Configurable gate selection for partial deployments (tier 2 minimum, tier 4 full).
      Default decision logic: weighted vote with configurable threshold.
    usage: 'Track one production deployment; integrates Section 8.7-8.12 deliverables; CI/CD integration point'

  deliverable_2_track_two_orchestrator:
    artifact: 'track_two_rlhf_preference_orchestrator.py -- track two orchestration layer'
    purpose: 'Orchestrate RLHF preference auditing track across preference collection, reward model training, policy optimisation'
    inputs:
      - 'Preference data, reward model, aligned policy'
      - 'Annotator metadata'
