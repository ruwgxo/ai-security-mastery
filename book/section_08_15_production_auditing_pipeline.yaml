section_overview:
  title: 'Production Auditing Pipeline: Capstone Integration'
  one_line_summary: |
    The Chapter 8 production auditing pipeline integrates every detection
    primitive, defensive training technique, supply chain control, and
    federated defence covered in Sections 8.7 through 8.14 into a concrete
    CI/CD architecture. Four principal tracks operate in parallel:
    instruction-tuning data auditing, RLHF preference auditing, supply chain
    auditing (model artifacts, adapters, datasets), and runtime detection.
    Each track wires Section-specific deliverables as automated gates,
    produces compliance evidence, feeds SOC telemetry, and routes incidents
    through structured response workflows. The pipeline is the operational
    artifact that makes Chapter 8 deployable; without it, the chapter is
    catalogue and reference, with it, organisations can implement OWASP
    LLM03 defensive coverage as engineering work rather than research effort.

  why_this_section_exists: |
    Sections 8.1 through 8.14 covered the complete training-time threat
    model and the defensive primitives that address it. Each section
    produced reference deliverables -- detection primitives, defensive
    training implementations, supply chain auditors, federated defences --
    that operate independently. Section 8.15 integrates them into a
    production architecture: a CI/CD pipeline that organisations deploy
    to cover the full Chapter 8 threat model in operational settings.

    Without the integration, the deliverables from earlier sections are
    research artifacts: useful for understanding, evaluating, and
    benchmarking, but not directly deployable. Production deployment
    requires architecture that orchestrates the deliverables, manages
    their dependencies, produces operational outputs (compliance evidence,
    monitoring telemetry, incident response artifacts), and integrates
    with broader organisational infrastructure (CI/CD systems, SIEM,
    SOAR, regulatory compliance frameworks). Section 8.15 provides this
    architecture.

    The section also addresses a structural reality of AI security
    engineering: most organisations adopting AI are not building bespoke
    defensive infrastructure from scratch. They are integrating AI
    deployments into existing engineering and security operations. The
    Chapter 8 pipeline must compose with existing CI/CD systems (GitHub
    Actions, Jenkins, GitLab CI, Argo, etc.), existing SIEM platforms
    (Splunk, Elastic, QRadar, Sentinel), and existing compliance regimes
    (SOC 2, ISO 27001, EU AI Act, NIST AI RMF). The pipeline architecture
    is designed for composition rather than as a standalone defensive
    platform; the integration points are explicit and the boundaries
    clearly demarcated.

    The third function of this section is to provide an operational
    template. The pipeline has four principal tracks, each with specific
    inputs, outputs, gates, and integration points. Organisations adapting
    the template substitute organisation-specific details (specific
    foundation providers, specific datasets, specific deployment contexts)
    while preserving the architectural structure. The template encodes
    operational discipline that small organisations cannot derive
    independently and that large organisations want to standardise across
    teams. Section 8.15 is therefore intended to be both reference material
    (the architecture is documented in detail) and operational artifact
    (organisations can adopt it directly).

  position_in_chapter: |
    Section 8.15 is the operational capstone of Chapter 8. Sections 8.1-8.14
    provide the technical foundation: threat model, attack catalogue,
    defensive primitives. Section 8.15 integrates everything into the
    production pipeline that makes the chapter deployable. Section 8.16
    closes the chapter with synthesis and Chapter 9 preview. The
    progression is foundation (8.1-8.6), LLM-specific extension (8.7-8.8),
    supply chain (8.9-8.11), defensive infrastructure (8.12-8.13),
    decentralised extension (8.14), production architecture (8.15), and
    chapter close (8.16).

