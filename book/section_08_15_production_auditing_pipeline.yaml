common_mistakes:

  mistake_1_immediate_full_deployment:
    description: 'Deploying maximum pipeline architecture (tier 4) immediately without progressive maturation'
    why_it_happens: |
      Organisations recognising AI security risk may attempt comprehensive
      defensive deployment as a single project. The instinct is correct
      (defensive coverage is valuable) but the operational reality is that
      tier 4 architecture requires operational maturity that organisations
      typically lack initially. Deploying maximum architecture before
      organisational capacity to operate it produces friction without
      defensive benefit: gates fire that nobody investigates, alerts
      accumulate without response, compliance evidence is produced but
      not consumed.
    consequence: 'Pipeline deployed but operationally underutilised. Defensive value low; operational cost high; engineering credibility damaged. Often leads to pipeline rollback or disablement.'
    correct_approach: 'Progressive deployment through maturity tiers. Tier 1 first; stabilise; tier 2 next; stabilise; progress as organisational maturity supports. Section 8.15 deliverable 6 provides maturity assessment tooling that maps current state to appropriate tier.'

  mistake_2_pipeline_without_response_integration:
    description: 'Deploying pipeline detection without integration to incident response infrastructure'
    why_it_happens: |
      Pipeline gates produce detection output. Practitioners deploying the
      pipeline focus on the technical detection capability and may not
      integrate with organisational incident response. The detection events
      become logs that no one acts on; the pipeline runs but defensive
      events do not produce defensive responses.
    consequence: 'Pipeline operates but produces no defensive value. Detected attacks proceed because no one responds. Pipeline metrics show high detection rates while incidents continue. The illusion of defence is worse than no defence because it produces false confidence.'
    correct_approach: 'Pipeline deployment requires incident response integration as part of initial deployment, not as follow-up. Severity-tiered response workflows, SOAR integration where appropriate, on-call escalation for critical detections. Section 8.15 part 7 covers the integration patterns; deliverable 6 provides connection points.'

  mistake_3_neglecting_threshold_tuning:
    description: 'Treating pipeline thresholds as static after initial deployment'
    why_it_happens: |
      Initial deployment uses default thresholds. After deployment,
      organisations may not establish ongoing threshold maintenance as
      operational discipline. Data distributions shift, attack patterns
      evolve, false positive rates drift, and the static thresholds
      progressively become miscalibrated.
    consequence: 'Pipeline coverage degrades over time. False positives accumulate beyond operational tolerance, leading to alert fatigue and deprioritisation. False negatives accumulate as new attack variants escape unrecalibrated thresholds. The pipeline appears defensive while structurally degrading.'
    correct_approach: 'Treat threshold tuning as ongoing operational discipline. Quarterly threshold review; recalibration based on observed false positive and false negative rates; capability extension as new primitives become available. Section 8.15 deliverable 6 includes threshold drift detection; operational metrics support calibration decisions.'

  mistake_4_compliance_evidence_as_afterthought:
    description: 'Treating compliance evidence as documentation produced separately from pipeline operation'
    why_it_happens: |
      Compliance evidence is sometimes treated as compliance team responsibility,
      separate from technical pipeline operation. The mistake is that compliance
      evidence is most credibly produced as a property of pipeline operation
      itself: the pipeline does the work, the evidence is its byproduct, and
      the evidence is verifiable by reproducing pipeline runs. Separately
      produced compliance documentation lacks this property and is structurally
      weaker evidence.
    consequence: 'Compliance documentation does not match operational reality. Audit findings reveal gaps between documented controls and operating controls. Regulatory exposure increases despite apparent compliance posture.'
    correct_approach: 'Treat compliance evidence as first-class pipeline output. Section 8.15 deliverable 5 produces evidence as operational byproduct of track execution. The evidence is verifiable by audit reference to pipeline logs. Compliance team consumes pipeline outputs rather than producing separate documentation.'

  mistake_5_pipeline_without_capability_extension:
    description: 'Deploying pipeline as static infrastructure without ongoing capability extension'
    why_it_happens: |
      Pipeline deployment is substantial work; once complete, organisations
      may treat the pipeline as done. The attack landscape continues to evolve
      after deployment: new attack variants emerge, new detection primitives
      become available, new defensive training techniques mature. Pipelines
      that do not extend capability progressively become dated.
    consequence: 'Pipeline coverage relative to contemporary threats degrades over time. Attack variants that emerge after deployment receive no detection because no primitive was added. The pipeline appears stable while structurally falling behind the threat.'
    correct_approach: 'Plan capability extension as ongoing operational discipline. Quarterly review of new attack research and detection primitives. Annual major capability updates. Pipeline architecture (deliverable 6) supports incremental extension without restructuring; operational discipline ensures the extension happens.'

section_summary:
  compact: |
    The Chapter 8 production auditing pipeline integrates every detection
    primitive, defensive training technique, supply chain control, and federated
    defence covered in Sections 8.7 through 8.14 into a four-track production
    architecture: instruction-tuning data auditing, RLHF preference auditing,
    supply chain auditing, runtime detection, plus a federated extension for
    decentralised training. Each track has specific gates, inputs, outputs,
    and integration points; together they cover the full Chapter 8 threat model.
    The pipeline produces three categories of output: detection decisions
    (defensive purpose), compliance evidence (regulatory purpose), and
    operational telemetry (SIEM and SOC integration). Compliance evidence
    aligns with EU AI Act, NIST AI RMF, SOC 2, ISO 27001, and sector-specific
    frameworks. Incident response integration is mandatory: pipeline detection
    without response infrastructure produces no defensive value. Maturity
    progression through four tiers (foundational supply chain, centralised
    training coverage, runtime detection plus federated, comprehensive
    programme) allows organisations to deploy pipeline architecture aligned
    with their operational maturity. Deployment beyond organisational capacity
    produces friction; under-deployment produces exposure. The six deliverables
    in Section 8.15 provide the orchestration layer: track-specific orchestrators
    (deliverables 1-4), compliance evidence producer (deliverable 5), and
    top-level pipeline orchestrator (deliverable 6) integrating everything.
    The pipeline is the operational artifact that makes Chapter 8 deployable;
    Section 8.16 next synthesises the chapter and previews Chapter 9. Together,
    Chapter 8 establishes OWASP LLM03 defensive coverage as structured
    engineering practice rather than research effort, achievable for organisations
    across maturity tiers with clear adoption pathway.

  key_takeaways:
    - 'Pipeline architecture: four tracks (instruction-tuning, RLHF, supply chain, runtime) plus federated extension'
    - 'Each track integrates Section 8.7-8.14 deliverables as concrete CI/CD gates'
    - 'Three output categories: detection decisions, compliance evidence, operational telemetry'
    - 'Compliance evidence aligns with EU AI Act, NIST AI RMF, SOC 2, ISO 27001, sector-specific frameworks'
    - 'Incident response integration is mandatory; detection without response is structurally undefended'
    - 'Maturity progression through four tiers; deploy aligned with organisational capacity, not maximum architecture'
    - 'Tier 1 (supply chain) is foundational; tiers 2-3 cover centralised training and runtime; tier 4 is comprehensive programme'
    - 'Pipeline operation requires ongoing tuning, capability extension, and threshold maintenance as operational discipline'

preview_section_16:
  title: 'Chapter 8 Synthesis and Chapter 9 Preview'
  connection: |
    Section 8.15 capstoned the operational pipeline. Section 8.16 closes Chapter
    8 by synthesising the complete coverage: training-time fundamentals,
    image-domain advanced backdoors, LLM-specific data-pipeline poisoning,
    supply chain attacks, detection primitives, defensive training, federated
    defences, and production pipeline integration. The chapter has covered
    every principal training-time attack class with corresponding defensive
    coverage and operational integration. The synthesis identifies the
    cross-cutting threads, summarises the production-readiness state of each
    sub-area, and frames Chapter 8 contribution to the broader book arc.
    Section 8.16 also previews Chapter 9, which addresses model extraction
    attacks: attacks where adversaries reconstruct model functionality through
    interaction rather than training-data manipulation. Chapter 9 extends the
    threat model to inference-time attack surfaces that complement Chapter 8
    training-time coverage; the two chapters together cover the principal
    OWASP LLM03 (Training Data Poisoning) and LLM10 (Model Theft) categories.

