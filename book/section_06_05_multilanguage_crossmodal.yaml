learning_objectives:
  primary: |
    Map every injection surface added by language diversity and modality expansion,
    understand why alignment is language-specific and modality-specific, and build
    the detection coverage gap analysis for multimodal deployments that grows
    with each new capability added.
  by_end_of_section:
    - "Explain why alignment training gaps exist in non-English and low-resource languages"
    - "Describe language-switching mid-conversation as an injection technique targeting alignment gaps"
    - "Identify the four cross-modal injection surfaces: image OCR, audio transcription, document processing, structured data"
    - "Explain how code interpreter injection uses executable content as an injection vector"
    - "Articulate the attack surface expansion rule: each modality added creates an independent injection surface"
    - "Build a multimodal deployment threat model enumerating all active injection surfaces"
    - "Identify detection coverage gaps created by modality additions that bypass text-focused classifiers"
    - "Specify which normalisation and classifier stages must extend to cover each new surface"


