section_summary: |
  Section 6.5 extended the injection surface map from the four surfaces in Section
  6.1 to the full multimodal attack surface. Alignment is language-specific: RLHF
  training skews toward English, and low-resource languages have demonstrably
  weaker alignment reinforcement. English-only classifiers have blind spots for
  every non-English language the model supports. The multilingual injection test
  protocol quantifies these gaps per language; per-language threshold calibration
  is the production response.

  Each modality addition is an independent injection surface expansion. Image OCR,
  audio transcription, document text extraction, code interpreter input and output,
  and every other pipeline that delivers text to the LLM context bypasses the
  text-input classifier entirely. The architecture response is to deploy the
  injection classifier as a shared service called at every text-to-context entry
  point -- not once, at the user input layer.

  Sections 6.6 through 6.10 develop the five indirect injection surfaces in full
  technical depth: RAG, web, email, database, and code assistant. The multimodal
  surface map from Section 6.5.5 is the index that Section 6.18's injection
  defence architecture diagram completes.
