key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Alignment is language-specific. RLHF training skews toward English; low-
        resource languages have sparse alignment reinforcement. English-only
        classifiers have systematic blind spots for every non-English language
        the model supports.

    - number: 2
      takeaway: |
        Language-switching mid-conversation targets alignment gaps. The adversary
        establishes context in English, then switches to a lower-alignment language
        for the injection payload. Detection requires per-language classifier
        calibration.

    - number: 3
      takeaway: |
        Each modality added creates an independent injection surface with zero
        coverage from text-layer defences. Image OCR, audio transcription,
        document extraction, code comments, and code execution output all deliver
        text to the LLM context through pathways that bypass text-input classifiers.

    - number: 4
      takeaway: |
        PDF hidden content -- white text on white background, metadata fields,
        annotations -- is extracted faithfully by document processing pipelines
        and reaches the LLM context even if the rendered document appears benign.
        Source trust is not a substitute for classifier coverage.

    - number: 5
      takeaway: |
        Code interpreter deployments have two injection surfaces: code input
        (comment and string literal content) and code execution output. Both
        require classifier coverage; neither is addressed by the user-turn
        text classifier.

    - number: 6
      takeaway: |
        The injection classifier must function as a shared service called at
        every text-to-context entry point, not as a single deployment at the
        user input layer. Each new modality adds a new call point.

    - number: 7
      takeaway: |
        Multilingual detection prioritises the highest-risk language subset.
        The multilingual injection test protocol quantifies per-language
        alignment gaps; the gap measurement drives per-language threshold
        calibration rather than treating all languages uniformly.

    - number: 8
      takeaway: |
        With multiple classifier calls per request, per-call latency budget
        decreases proportionally. The 50ms P99 target shared across four
        classifier calls means 12ms per call -- constraining classifier model
        size and motivating distilled implementations.


