      Many-shot jailbreaking is the attack that scales with model capability.
      As context windows grow, the attack surface grows with them. The Anthropic
      research makes the threshold concrete: a measurable number of examples
      produces reliable alignment bypass. The shot count detector is a practical,
      low-latency control that Section 7.14 adds to the detection stack without
      increasing FPR on benign long-context requests.

