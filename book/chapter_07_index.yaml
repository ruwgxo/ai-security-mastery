      Chapter 8: Training Data Poisoning and Model Manipulation
      Chapters 6 and 7 cover attacks at inference time: adversaries manipulate
      the model's context or alignment at runtime. Chapter 8 covers attacks at
      training time: data poisoning, backdoor insertion, and gradient manipulation
      that determine model behaviour before a single user query arrives.
      This is ATLAS AML.T0020 (Training Data Poisoning), AML.T0018 (Backdoor
      Attack), and AML.T0031 (Model Poisoning). Chapter 8 applies the same
      depth -- mechanism, not just pattern -- to training-time threats.

