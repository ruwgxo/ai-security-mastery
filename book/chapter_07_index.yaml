        \ the ambiguity region where safety and helpfulness training conflict"
      - "Medical and safety pretexts are the hardest competing objective attack\
        \ to detect: legitimate requests use identical framing"
      - "Sycophancy is a competing objective vulnerability baked in by RLHF:\
