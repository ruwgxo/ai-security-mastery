    security_preview: |
      Competing objective attacks are the jailbreak family with the most\
      overlap with legitimate use. Detecting them accurately requires calibration\
      against real user distributions, not just adversarial examples. Section 7.11\
      provides the argument pattern taxonomy and the FPR analysis that prevents\
      the competing objective detector from becoming a liability in production.

