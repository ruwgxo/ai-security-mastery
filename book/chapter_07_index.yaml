    security_preview: |
      Understanding why jailbreaks work is what separates a defender who patches
      known techniques from one who anticipates novel variants. RLHF alignment
      is a boundary over a probability distribution, not a lock. Every jailbreak
      technique in Sections 7.3-7.11 is an instance of the same underlying
      mechanism: moving the input to a region where refusal probability drops.
      Section 7.2 makes that mechanism explicit so the rest of the chapter
      is analysis, not catalogue memorisation.

