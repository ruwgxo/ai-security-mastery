    key_concepts:
      - "RLHF shifts the probability distribution over outputs -- it does not\
        \ remove capability from the weights"
      - "Jailbreaks work by moving the input into a region of the distribution\
        \ where refusal probability is low"
      - "Fine-tuning a safety-trained model on uncensored data is the fastest\
