    key_concepts:
      - "Many-shot jailbreaking is a capability-security tradeoff: extending\
        \ context length increases both usefulness and attack surface"
      - "The attack exploits in-context learning -- the same mechanism that\
        \ enables few-shot task adaptation enables few-shot alignment bypass"
      - "Shot count detection is a simple, low-FPR signal: count structured\
