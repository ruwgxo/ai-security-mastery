chapter_overview:
  number: 7
  title: "Jailbreak Techniques"
  part: "Part 2: AI Security Landscape"
  position: "Chapter 7 of 6 in Part 2"

  purpose: |
    Chapter 6 showed how injecting instructions into context overrides a model's
    behaviour at the data layer. Chapter 7 shows how adversaries bypass the model's
    trained alignment directly -- without needing to control retrieved context or
    external data sources. That is the definitional separation, and it matters
    for your detection architecture.

    Jailbreaks exploit the gap between what RLHF alignment teaches a model to
    refuse and what the underlying capability substrate will produce when that
    alignment is undermined. The gap exists because alignment is a fine-tuning
    layer on top of pre-training, not a hard constraint at the weight level.
    Adversaries probe the boundary. They find fiction framings that shift the
    model's refusal threshold. They fragment payloads below detection. They craft
    adversarial token sequences that activation-steer the model past safety filters.
    They leverage long context windows to demonstrate, through accumulated
    examples, that the target behaviour is acceptable. The attacks are diverse
    in mechanism, unified in goal: make the model do what its alignment says it
    will not.

    This chapter covers every major jailbreak family with technical depth --
    the mechanism, not just the pattern. It closes with a 50+ technique catalog
    (the largest structured collection in the book), an automated jailbreak
    generator for red-team use, and a jailbreak detection rule that extends the
    Chapter 6 injection classifier into a unified detection system covering
    OWASP LLM01 completely.

