document_info:
  title: 'ML Detection Taxonomy: From Rules to Models in the Seven-Track Gateway'
  chapter: 12
  section: 1
  section_code: '1201'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  created: '2026-06-06'
  estimated_pages: 6
  estimated_reading_time: '45-55 minutes'

section_overview:
  one_line_summary: 'Rule-based detection and ML detection are complements: rules catch known signatures, ML catches novel variants -- Chapter 12 trains the ML layer that Chapter 11 designed the slots for.'
  why_this_section_exists: |
    Chapter 11 designed the detection framework: detection-as-code principles, the seven-track
    gateway architecture, Sigma rule templates, and the MITRE ATT&CK and ATLAS coverage map.
    Everything Chapter 11 produced was structural -- the skeleton of a production detection system.
    Chapter 12 trains the muscles.

    Before building anything, the detection engineer needs a taxonomy of ML detection families.
    Without this map, the progression through Chapter 12 reads as an arbitrary sequence of ML
    techniques -- Isolation Forest, then Random Forest, then LSTM, then Sentence Transformers,
    then DistilBERT. With it, every section is a deliberate choice driven by three questions:
    how much labelled data is available, what is the latency budget for this gateway track, and
    what attack surface does this detector need to cover?

    Section 12.01 answers those three questions systematically. It establishes the five ML
    detection families, maps each to the gateway track it populates, and defines the deployment
    sequencing that tells the engineer which family to deploy first on a new threat surface.
  position_in_chapter: |
    Section 12.01 is the taxonomy anchor for all 17 subsequent sections. It is the map that
    makes every subsequent section a deliberate choice rather than an arbitrary technique
    selection. It mirrors the role Sections 9.01 and 10.01 played in their chapters: establishing
    the threat model and taxonomy before the implementation sections begin.

learning_objectives:

  knowledge:
    - 'Explain why rule-based detection and ML-based detection are complements, not competitors, and describe the failure mode of each when deployed alone'
    - 'Name the five ML detection families and state one defining characteristic of each that distinguishes it from the others'
    - 'State the minimum labelled data requirement for each ML detection family to perform reliably in production'
    - 'Describe the latency profile of each ML family and explain which is safe to place on the gateway critical path'
    - 'Explain the deployment sequencing argument: why anomaly detection is the correct first detector on any new threat surface'
    - 'Describe the three levels of the ML detection maturity ladder and state the concrete criteria that distinguish L1 from L2 from L3'
    - 'Map each of the five ML detection families to the Chapter 11 seven-track gateway track it populates'

  skills:
    - 'Produce the ML detection taxonomy reference table from memory: five families across six dimensions'
    - 'Apply the deployment sequencing decision tree to a given threat surface and data availability scenario to select the correct ML family'
    - 'Score a given detection system against the ML detection maturity ladder and identify the specific gaps preventing advancement to the next level'
    - 'Read a Chapter 11 ATLAS coverage heat map gap and identify which ML family in Chapter 12 closes it'

  security_mindset:
    - 'Resist the impulse to deploy a neural classifier immediately because it is the most accurate: data availability and latency constraints usually make it the wrong starting point'
    - 'Recognise that a detection system built entirely on Sigma rules has a fixed coverage ceiling -- it cannot detect attack variants the rules have never seen'
    - 'Internalise that anomaly detection is a data collection tool as much as a detection tool: its alerts are the seed dataset for the supervised classifiers that follow'
    - 'Understand that explainability is an operational requirement, not a nice-to-have: an alert an analyst cannot explain is an alert that gets ignored or suppressed'

prerequisites:
  - 'Chapter 1 Section 1.07: classification algorithms and supervised learning -- the foundation for supervised ML families'
  - 'Chapter 1 Section 1.11: evaluation metrics (precision, recall, F1, ROC-AUC) -- used to compare ML family performance'
  - 'Chapter 2 Section 2.17: LSTM and RNN basics -- background for the sequence model family'
  - 'Chapter 3 Section 3.03: word embeddings and semantic representation -- background for the embedding detection family'
  - 'Chapter 11 Section 11.02: detection-as-code principles -- the framework Chapter 12 populates with ML models'
  - 'Chapter 11 Section 11.03: layered detection stack (signature, heuristic, ML, behavioural) -- Chapter 12 implements the ML layer'
  - 'Chapter 11 Section 11.05: ATLAS coverage heat map -- the gaps Chapter 12 fills with ML detectors'
  - 'Chapter 11 Section 11.08: detection maturity model -- the maturity ladder Section 12.01 extends to ML detectors'
  - 'Chapter 11 Section 11.13: seven-track gateway architecture -- the tracks Chapter 12 populates'

prose_content:

  part_1:
    title: 'Rules and Models: The Complementarity Argument'
    body: |
      The first instinct of a detection engineer encountering AI security threats is to write
      Sigma rules. This is correct. A Sigma rule for the DAN jailbreak prefix is fast to write,
      immediately deployable, fully explainable, and precise against the exact pattern it targets.
      When an analyst reviews an alert from that rule, they can read the rule, read the triggering
      input, and understand the detection in thirty seconds. This is a significant operational
      advantage that no ML model currently matches.

      The problem is coverage. Sigma rules detect what they describe. An adversary who reads the
      rule rewrites the payload to avoid it. A DAN rule that triggers on 'ignore all previous
      instructions' is defeated by 'disregard every prior directive'. A jailbreak rule that catches
      'you are now DAN' is defeated by 'you have been promoted to a different operational mode'.
      The rule library grows with each bypass, and each new rule is one step behind the adversary
      who wrote the bypass. This is not a flaw in Sigma -- it is the inherent coverage ceiling of
      signature-based detection against an adaptive adversary.

      ML classifiers generalise. A Random Forest trained on 1,000 labelled jailbreak examples
      learns the feature patterns that distinguish jailbreak prompts from benign ones -- not the
      specific tokens, but the structural characteristics: instruction override markers, persona
      invocation, fictional framing, system prompt boundary markers. When an adversary creates a
      novel jailbreak that shares none of the training set's exact tokens but does share its
      structural characteristics, the classifier flags it. The adversary must change the underlying
      attack pattern, not just the surface phrasing, to evade the trained model.

      The seven-track gateway runs both in parallel. Rules provide speed, explainability, and
      zero false positives on known patterns. ML classifiers provide coverage, generalisation, and
      detection of novel variants. Neither is sufficient alone. A gateway with only Sigma rules
      has a fixed coverage ceiling. A gateway with only ML classifiers has an explainability
      deficit and a cold-start problem: no labelled data, no trained model, no detection. Chapter
      11 built the Sigma layer. Chapter 12 trains the ML layer. Together they constitute a
      defence-in-depth detection system.

  part_2:
    title: 'The Five ML Detection Families'
    body: |
      Five ML detection families are relevant to LLM API security. They differ in three
      dimensions that determine when each is the right choice: labelled data requirement,
      latency profile, and explainability.

      Unsupervised anomaly detection requires no labelled attack data. Isolation Forest and
      One-Class SVM (Section 12.03) learn what normal API traffic looks like and flag statistical
      outliers. This is the correct family to deploy on day one of any new LLM integration
      because there are no labelled attacks yet. The trade-off is precision: anomaly detectors
      cannot distinguish attack families, cannot explain which specific feature drove the alert,
      and produce a higher false positive rate than supervised classifiers at matched recall.
      Their operational value extends beyond detection: every anomaly alert that an analyst
      confirms as a true positive becomes a labelled training example for the supervised
      classifiers that follow.

      Supervised classification requires labelled data but produces higher precision once
      sufficient examples are available. Random Forest and XGBoost (Section 12.05) train on
      labelled attack and benign examples and learn explicit feature boundaries. At 500+ labelled
      examples per class, supervised classifiers typically outperform anomaly detectors in
      precision at matched recall. They are fully explainable via feature importance and SHAP
      values: each alert comes with a ranked list of the features that drove it, readable by
      any analyst in under a minute.

      Sequence modelling extends classification into the temporal dimension. LSTM and GRU
      networks (Section 12.06) analyse the full conversation history -- not just the current
      turn. Multi-turn attacks fragment a jailbreak payload across turns, each innocuous in
      isolation but collectively constituting an attack. A single-turn classifier misses this
      pattern entirely because it sees each turn independently. The GRU reads the conversation
      as a sequence and detects the escalation arc. Sequence models require conversation-level
      labelled datasets, which are harder to collect than single-turn examples, and add
      inference complexity. They are the right choice when multi-turn attack patterns are
      documented in the threat model.

      Embedding-based detection addresses the paraphrase evasion problem. An adversary who
      knows the Sigma rules rewrites the payload to avoid every keyword. An adversary who
      knows the feature set rewrites the payload to minimise the flagged features. Neither
      rewrite strategy works against a Sentence Transformer (Section 12.07): semantic
      similarity is measured in a 768-dimensional embedding space, and a paraphrase that
      preserves attack intent lands near the original embedding regardless of surface token
      changes. Embedding detectors use cosine distance from known attack cluster centroids
      as the detection signal. They require pre-computed attack cluster centroids rather than
      traditional labelled datasets and add 2-4ms of embedding inference latency per request.

      Neural classification is the highest-accuracy and highest-cost family. A fine-tuned
      DistilBERT (Section 12.08) reaches 95%+ accuracy on prompt injection classification
      with 2,000+ labelled examples, outperforming Random Forest by 5-10 percentage points
      in precision at matched recall. The costs are real: 2,000+ labelled examples to train,
      15ms inference latency before quantisation, and post-hoc explainability only via
      attention visualisation. Neural classifiers are the right choice when the highest
      possible accuracy on a well-defined, stable attack class is the primary requirement
      and the data and latency budget are available.

  part_3:
    title: 'Gateway Track Mapping: Which Family Goes Where'
    body: |
      The Chapter 11 seven-track gateway has seven detection tracks. Chapter 12 populates
      four of them with ML detectors; the remaining three are already populated by Chapter 6,
      7, and 10 Sigma rules and detection primitives.

      Track 1 (prompt injection, OWASP LLM01) runs two ML detectors in parallel: an embedding
      similarity detector and an XGBoost supervised classifier. The embedding detector catches
      paraphrase variants of known injection templates that the Sigma rules miss. The XGBoost
      classifier catches structurally similar injections with 90%+ precision once the labelled
      dataset reaches 500+ examples. Both detectors receive the same feature vector from the
      shared feature pipeline (Section 12.02) and their scores are combined by the Section 12.15
      ensemble.

      Tracks 2 through 4 (jailbreak detection, OWASP LLM01) use a two-layer ML architecture:
      the GRU sequence detector for multi-turn escalation patterns and the DistilBERT neural
      classifier for single-turn high-precision jailbreak detection. The GRU fires on conversation-
      level patterns that span multiple turns. The DistilBERT fires on single-turn inputs with
      high attack confidence. Either can trigger the gateway independently; the ensemble weights
      determine the combined alert tier.

      Track 5 (PII leakage, OWASP LLM06) uses the PII scanner (Section 12.09) on model
      outputs rather than inputs. This is the only output-side detection track in the ML
      ensemble: it scans the LLM's response before it reaches the client. The PII scanner
      runs after the main model inference, not before, and is therefore not subject to the
      pre-inference latency budget that constrains Tracks 1-4.

      Track 6 (API abuse and extraction, OWASP LLM10) uses the Isolation Forest anomaly
      detector on API usage features: request rate, sequence length distribution, OOD score
      distribution across sessions. This is the zero-label detector that requires only normal
      traffic to train and is therefore deployable immediately on a new integration.

  part_4:
    title: 'Deployment Sequencing: Which Family First'
    body: |
      The correct deployment sequence follows the labelled data availability curve. On day one
      of a new LLM integration, there are no labelled attack examples. The only correct choice
      is unsupervised anomaly detection: deploy Isolation Forest on API usage features to
      establish a statistical baseline and begin collecting anomaly alerts for analyst review.

      Over the first two to four weeks of operation, analyst-reviewed anomaly alerts accumulate.
      Each confirmed true positive is a labelled attack example. Each confirmed false positive is
      a labelled benign example near the anomaly decision boundary. By week four, a typical LLM
      API will have accumulated 100-300 labelled examples from production traffic and red team
      exercises combined.

      At 200+ labelled examples per class, deploy a Random Forest classifier as the first
      supervised detector. It trains in seconds, produces feature importance immediately, and
      gives analysts explainable alerts to review. Run the anomaly detector and the Random Forest
      in parallel: the anomaly detector continues to surface novel attack variants; the Random
      Forest provides precision on the known attack patterns in the labelled set.

      At 500+ labelled examples per class, add the XGBoost classifier alongside the Random
      Forest. Add the embedding similarity detector with a cluster library seeded from the
      labelled positives. At this point, three ML detectors are running: Isolation Forest,
      Random Forest, and embedding similarity.

      At 2,000+ labelled examples per class and once the latency budget analysis from Section
      12.12 confirms headroom, begin fine-tuning DistilBERT. Neural classifier training takes
      hours, not seconds. Shadow-deploy it in parallel with the Random Forest before promoting
      it to the production track (Section 12.13 model registry).

      Add sequence modelling (GRU) when multi-turn attack patterns appear in the labelled
      dataset and when the conversation-level dataset (Section 12.04) has accumulated 500+
      conversation-level attack examples. This is typically the last ML family deployed because
      conversation-level labelled data takes the longest to accumulate.

      This sequence -- anomaly first, tree classifiers second, embeddings third, neural
      classifier fourth, sequence model last -- is not arbitrary. It maps exactly to the data
      availability curve of a production LLM integration. Each stage is deployable with the
      data available at that stage.

  part_5:
    title: 'The ML Detection Maturity Ladder'
    body: |
      The Chapter 11 detection maturity model (Section 11.08) defined maturity levels for the
      overall detection framework. The ML detection maturity ladder extends that model
      specifically to the ML detector column, giving concrete criteria for each level.

      Level 1 (Statistical Anomaly) is achieved when an Isolation Forest or One-Class SVM is
      deployed on API usage features, producing alerts reviewed by an analyst. The criteria:
      a trained anomaly detector is running in production on live traffic; alerts are reviewed
      within 24 hours; true positive and false positive labels from review are stored for future
      supervised training. At L1 the detection system has no labelled data and no trained
      supervised classifiers. Coverage is broad but imprecise.

      Level 2 (Supervised Classification) is achieved when a Random Forest or XGBoost classifier
      is trained on 200+ labelled examples per class, deployed in production, and producing
      explainable alerts with per-feature SHAP values. The criteria: a supervised classifier
      is running alongside the anomaly detector; the labelled training dataset is versioned and
      stored; evaluation metrics (precision, recall, F1) are computed on a held-out temporal
      test set and documented; the model is in the registry with a model card. At L2 the
      detection system has precision on known attack families and explainability for analyst
      review.

      Level 3 (Calibrated Ensemble) is achieved when the full four-detector ensemble from
      Section 12.15 is deployed: anomaly detector, supervised classifier, embedding similarity
      detector, and either the GRU or DistilBERT depending on data availability and latency
      budget. The criteria: all detectors have calibrated probability outputs (Section 12.10);
      the ensemble has a weighted voting or stacking configuration validated on a production
      A/B test (Section 12.16); the model registry manages all four detector versions; the live
      dataset curation pipeline (Section 12.14) is collecting true positives and false positives
      from production traffic; retraining is automated and validated against stage transition
      gates (Section 12.13). At L3 the detection system is operationally sustainable: it
      continues to improve as the attack distribution shifts rather than degrading.

      Most production LLM deployments that have ML detection at all are at L1 or early L2.
      The gap between L2 and L3 is not technical -- the techniques are all available and
      documented in Chapters 12 through 17. The gap is operational: model registry discipline,
      live curation pipelines, calibrated probabilities, and A/B testing require sustained
      engineering investment beyond the initial model training.

