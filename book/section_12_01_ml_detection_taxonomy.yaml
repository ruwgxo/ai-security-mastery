common_mistakes:

  mistake_1:
    description: 'Skipping anomaly detection and deploying a supervised classifier immediately on a new threat surface because it looks more sophisticated'
    why_it_happens: |
      Supervised classifiers produce clean precision and recall metrics, SHAP plots, and ROC
      curves -- outputs that look professional in a detection report. Anomaly detectors produce
      anomaly scores and a contamination parameter. Engineers new to security ML associate
      rigour with supervised classifiers and treat anomaly detection as a primitive placeholder
      to skip.
    consequence: |
      Deploying a supervised classifier with no labelled data is impossible. Deploying with
      insufficient labelled data (under 50 per class) produces a model that learns the majority
      class (benign) and flags almost nothing. The detection system appears to be running --
      metrics look clean -- while missing the attacks it was deployed to catch. Meanwhile,
      the anomaly detector that was skipped would have been collecting the true positives
      needed to train the supervised classifier correctly.
    correct_approach: |
      Always deploy anomaly detection first on any new LLM integration, regardless of how
      quickly labelled data can be collected. The anomaly detector is both a detector and a
      data collection tool. Its alerts, when reviewed by an analyst, produce the labelled
      examples that train the supervised classifiers in Sections 12.05 and 12.08. Skipping
      it delays the supervised classifier by exactly the time it would have taken to collect
      its first labels from anomaly alerts.

  mistake_2:
    description: 'Treating ML detection as a replacement for rule-based detection and removing Sigma rules when the ML classifier is deployed'
    why_it_happens: |
      Once a Random Forest classifier reaches 90%+ accuracy on a test set, removing the Sigma
      rules that cover the same threat class feels like eliminating redundancy. The ML model
      is more general, handles novel variants, and has a single configuration file rather than
      a library of rule files to maintain.
    consequence: |
      The ML classifier has a cold-start failure mode: if the model fails (due to a deployment
      error, model regression, or latency SLO breach) and is taken offline, the Sigma rules
      that were removed provide no fallback coverage. Novel jailbreaks that the classifier
      handles with 90% recall still produce 10% misses; the Sigma rules for the known,
      high-confidence patterns covered that 10% with 100% precision. Removing both layers
      of coverage for a single layer degrades the defence-in-depth architecture Chapter 11 established.
    correct_approach: |
      Sigma rules and ML classifiers cover different detection surfaces. Keep both. Sigma rules
      cover known, stable, high-confidence patterns with full explainability and zero false
      positives on exact matches. ML classifiers cover novel variants, paraphrase-equivalent
      payloads, and structurally similar attacks with no exact token match. The detection
      engineering principle from Chapter 11 Section 11.03 is layered detection -- not layer
      replacement.

  mistake_3:
    description: 'Evaluating ML detectors with accuracy on a random train/test split and reporting the number as a production readiness metric'
    why_it_happens: |
      Scikit-learn''s train_test_split defaults to a random shuffle. On a balanced dataset,
      a Random Forest trained on 80% and tested on 20% produces an accuracy metric that looks
      like a legitimate evaluation. The engineer reports 94% accuracy and proceeds to deployment.
    consequence: |
      A random split of a security dataset allows the test set to contain examples from the
      same time window as the training set. If an adversary sent the same jailbreak pattern
      ten times in one week and those ten examples are split randomly between training and
      test, the classifier memorises the pattern and appears to generalise. On production
      traffic from the following week with a different attack variant, accuracy drops to 70%.
      The 94% evaluation metric was an artefact of data leakage, not a measurement of
      generalisation.
    correct_approach: |
      Use temporal splits for all security ML evaluation. Sort the labelled dataset by
      collection timestamp and use the most recent 20% as the test set. The test set must
      contain only examples collected after all training examples. This is the only evaluation
      methodology that measures generalisation to future attack distribution rather than
      memorisation of historical examples. Section 12.04 implements this correctly.

  mistake_4:
    description: 'Deploying DistilBERT as the first ML detector on a new threat surface because it is the highest accuracy model'
    why_it_happens: |
      The DistilBERT fine-tuning pipeline is available from Section 12.08. Engineers who have
      followed the chapter and want the best accuracy naturally try to deploy the highest-performing
      model first. DistilBERT reaches 95%+ accuracy -- why start with anything less?
    consequence: |
      DistilBERT fine-tuning requires 2,000+ labelled examples. On a new LLM integration
      with no labelled data, fine-tuning DistilBERT is not possible. Even with 500 labelled
      examples, fine-tuning DistilBERT on a small security dataset produces significant
      overfitting and a model that generalises worse than a Random Forest trained on the same
      data. The engineer spends GPU time and labelling effort to produce an inferior model
      when the correct choice for that data availability level is a tree classifier.
    correct_approach: |
      Follow the deployment sequencing from Section 12.01 Table 3. Random Forest and XGBoost
      outperform DistilBERT below 2,000 labelled examples. Deploy the tree classifier first,
      collect more labels, and fine-tune DistilBERT when the dataset reaches the size at which
      it actually provides an accuracy advantage over the simpler models.

  mistake_5:
    description: 'Reporting ML detection coverage using accuracy rather than per-attack-family recall and ATLAS technique coverage'
    why_it_happens: |
      Accuracy is the default metric in every ML tutorial and is the number most stakeholders
      understand. An engineer presenting a 93% accurate jailbreak detector to a security leadership
      team uses accuracy because it is simple, high, and positive.
    consequence: |
      A 93% accurate jailbreak detector on an imbalanced dataset where 95% of traffic is benign
      may be a model that predicts benign for every request. Its accuracy is 95% by predicting
      nothing. Even a genuinely trained detector with 93% overall accuracy may have 40% recall
      on a specific jailbreak sub-family (many-shot jailbreaking, for example) while achieving
      99% recall on the DAN family that dominates the training set. The ATLAS coverage report
      for that detector has a critical gap that the overall accuracy metric completely obscures.
    correct_approach: |
      Report per-attack-family recall and the ATLAS technique coverage map alongside overall
      accuracy. The ATLAS heat map from Chapter 11 Section 11.05 is the correct format for
      communicating detection coverage to a security audience. Accuracy is a secondary metric
      for internal model comparison; ATLAS coverage and per-family recall are the metrics that
      matter operationally.

section_summary:

  compact: |
    Chapter 12 trains the ML layer of the Chapter 11 seven-track gateway. Five ML detection
    families cover the threat surface: unsupervised anomaly detection (zero-label, deploys
    day one), supervised classification (200+ labels, SHAP explainability), sequence modelling
    (multi-turn escalation), embedding detection (paraphrase-resistant), and neural classification
    (highest accuracy, highest cost). The families are complements to rule-based Sigma detection,
    not replacements. Deployment sequencing follows the labelled data availability curve: anomaly
    first, tree classifiers second, embeddings third, neural classifier last. The ML detection
    maturity ladder defines three levels -- L1 statistical anomaly, L2 supervised classification,
    L3 calibrated ensemble -- with concrete entry criteria and gap analysis at each level.

  key_takeaways:
    - 'Rule-based and ML-based detection are complements: Sigma rules cover known patterns with perfect explainability; ML classifiers cover novel variants and paraphrase-equivalent payloads'
    - 'Deploy anomaly detection first on every new threat surface -- it is the data collection tool that seeds the supervised classifiers that follow'
    - 'The five ML families differ in three dimensions that drive selection: labelled data requirement, latency profile, and explainability'
    - 'Sequence models are only necessary when multi-turn attack patterns are documented -- single-turn classifiers miss conversation-arc escalation, but sequence models add latency and data requirements that must be justified'
    - 'Neural classifiers outperform tree classifiers only above 2,000 labelled examples -- below this threshold, Random Forest and XGBoost produce better generalisation'
    - 'The ML detection maturity ladder (L1/L2/L3) provides concrete criteria for assessing current state and identifying specific gaps -- most production deployments are at L1 or early L2'

preview_section_12_02:
  title: 'Section 12.02: Security Feature Engineering -- Extracting Signal from API Requests'
  summary: |
    Section 12.02 builds the feature extraction pipeline that all five ML detection families
    share. Security features are structurally different from standard NLP classification
    features: they are designed to capture adversarial intent rather than topic or sentiment.
    The pipeline extracts four feature groups: token-level features (sequence length, special
    character density, instruction keyword frequency, token entropy), structural features
    (role boundary markers, JSON or code block presence, bracket density), semantic features
    (embedding distance from known attack clusters, cosine similarity to jailbreak centroids),
    and contextual features (turn number, prior refusal count, session request rate). SHAP
    feature importance analysis on the first trained Random Forest identifies which engineered
    features carry signal and which are noise -- the fastest way to iterate on the feature
    design before investing in larger datasets and more complex models.

