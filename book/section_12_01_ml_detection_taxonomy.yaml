      - ['L3', 'Calibrated Ensemble', 'Four-detector ensemble with calibrated outputs; A/B test validated; live curation pipeline running; retraining automated', 'Full coverage across attack families; operationally sustainable; self-improving', 'Nothing within scope of Chapter 12 -- Chapter 13 adds behavioural analysis']

deliverables:

  deliverable_1:
    title: 'ML Detection Family Taxonomy Reference'
    filename: 'ml_detection_taxonomy.py'
    description: 'Structured taxonomy of the five ML detection families with data requirements, latency profiles, explainability characteristics, gateway track assignments, and OWASP and ATLAS coverage. Provides the detection engineer with a reference for selecting the correct family for a given threat surface and data availability.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies, prints as formatted tables'
    code: |
      # ml_detection_taxonomy.py
      # Section 12.01: ML Detection Family Taxonomy
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class MLDetectionFamily:
          name: str
          algorithms: List[str]
          min_labelled_data: str
          latency_ms_range: str
          explainability: str
          gateway_tracks: List[str]
          owasp_coverage: List[str]
          atlas_coverage: List[str]
          chapter_12_section: str
          deployment_stage: str
          strengths: List[str]
          failure_modes: List[str]


      ML_DETECTION_FAMILIES: List[MLDetectionFamily] = [
          MLDetectionFamily(
              name='Anomaly Detection',
              algorithms=['Isolation Forest', 'One-Class SVM'],
              min_labelled_data='Zero -- normal traffic only',
              latency_ms_range='1-3ms',
              explainability='Anomaly score; no per-feature attribution',
              gateway_tracks=['Track 6 (API abuse and extraction)'],
              owasp_coverage=['LLM10 (Model Theft)'],
              atlas_coverage=['AML.T0040 (ML Model Inference API Access)'],
              chapter_12_section='Section 12.03',
              deployment_stage='Day 1 -- no labelled data required',
              strengths=[
                  'Zero-label deployment on any new threat surface',
                  'Establishes statistical baseline for supervised training',
                  'Catches unknown attack variants without prior examples',
                  'Fast inference -- suitable for high-throughput API gateways',
              ],
              failure_modes=[
                  'Cannot distinguish attack families -- all anomalies look the same',
                  'High false positive rate relative to supervised classifiers',
                  'No per-feature explanation for analyst review',
                  'Degrades if attack traffic is majority of training window',
              ],
          ),
          MLDetectionFamily(
              name='Supervised Classification',
              algorithms=['Random Forest', 'XGBoost'],
              min_labelled_data='200+ per class (reliable), 500+ (production quality)',
              latency_ms_range='1-5ms',
              explainability='Full: SHAP values per prediction, feature importance ranking',
              gateway_tracks=['Track 1 (prompt injection)', 'Track 2 (jailbreak)'],
              owasp_coverage=['LLM01 (Prompt Injection)', 'LLM02 (Insecure Output Handling)'],
              atlas_coverage=['AML.T0051 (LLM Prompt Injection)', 'AML.T0054 (LLM Jailbreak)'],
              chapter_12_section='Section 12.05',
              deployment_stage='Week 2-4 -- after anomaly alerts seed first labelled examples',
              strengths=[
                  'Fast inference -- never exceeds 5ms at production scale',
                  'Full SHAP explainability: analyst reads per-feature contribution per alert',
                  'Robust to noise -- ensemble of trees tolerates individual feature noise',
                  'Trains in seconds on CPU -- fast iteration cycle',
              ],
              failure_modes=[
                  'Fixed feature set -- misses paraphrase variants not represented in features',
                  'Requires 200+ labelled examples per class before reliable deployment',
                  'Feature engineering bottleneck -- signal quality depends on feature design',
                  'Imbalanced data degrades accuracy silently without treatment',
              ],
          ),
          MLDetectionFamily(
              name='Sequence Modelling',
              algorithms=['LSTM', 'GRU'],
              min_labelled_data='500+ labelled conversations (not single turns)',
              latency_ms_range='5-15ms',
              explainability='Attention weights over turns -- which turns triggered the signal',
              gateway_tracks=['Track 2 (multi-turn jailbreak)', 'Track 3', 'Track 4'],
              owasp_coverage=['LLM01 (Prompt Injection -- multi-turn variant)'],
              atlas_coverage=['AML.T0051 (LLM Prompt Injection -- conversation-level)'],
              chapter_12_section='Section 12.06',
              deployment_stage='Month 3+ -- after conversation-level labelled data accumulates',
              strengths=[
                  'Detects multi-turn attack patterns invisible to single-turn classifiers',
                  'Attention weights identify which turns carry the attack signal',
                  'Captures temporal escalation: gradual boundary erosion across turns',
                  'Covers payload splitting attacks fragmented across multiple turns',
              ],
              failure_modes=[
                  'Requires conversation-level labelled data -- harder and slower to collect',
                  'Higher inference latency than tree classifiers -- 5-15ms per conversation',
                  'Variable-length conversation handling adds inference complexity',
                  'May miss single-turn attacks where the full payload is in one turn',
              ],
          ),
          MLDetectionFamily(
              name='Embedding-Based Detection',
              algorithms=['Sentence Transformers', 'Cosine Similarity', 'HDBSCAN Clustering'],
              min_labelled_data='50+ per attack cluster (centroids, not per-example labels)',
              latency_ms_range='2-4ms (MiniLM-L6 via ONNX Runtime)',
              explainability='Cosine distance from named attack cluster centroid',
              gateway_tracks=['Track 1 (injection paraphrase variants)'],
              owasp_coverage=['LLM01 (Prompt Injection)', 'LLM02 (Insecure Output Handling)'],
              atlas_coverage=['AML.T0051 (LLM Prompt Injection -- semantic variant)'],
              chapter_12_section='Section 12.07',
              deployment_stage='Week 4-8 -- after 50+ confirmed positives seed cluster centroids',
              strengths=[
                  'Catches paraphrase variants that share no tokens with known examples',
                  'Semantic coverage independent of surface token distribution',
                  'Fast inference -- MiniLM-L6 via ONNX under 4ms',
                  'Cluster-based: explainable as distance from a named attack family',
              ],
              failure_modes=[
                  'Requires pre-computed attack cluster centroids from confirmed positives',
                  'High false positive rate for inputs semantically near but not equal to attacks',
                  'Novel attack families with no existing cluster are not detected',
                  'Embedding model must match deployment domain -- off-domain embeddings degrade',
              ],
          ),
          MLDetectionFamily(
              name='Neural Classification',
              algorithms=['DistilBERT (fine-tuned)', 'Multi-layer Perceptron'],
              min_labelled_data='2,000+ per class for reliable fine-tuning',
              latency_ms_range='15ms (FP32), 7ms (INT8 quantised)',
              explainability='Attention maps (post-hoc); no SHAP equivalent at token level',
              gateway_tracks=['Track 1 (injection -- highest accuracy)', 'Track 2-4 (jailbreak)'],
              owasp_coverage=['LLM01 (Prompt Injection)', 'LLM02 (Insecure Output Handling)'],
              atlas_coverage=['AML.T0051 (LLM Prompt Injection)', 'AML.T0054 (LLM Jailbreak)'],
              chapter_12_section='Section 12.08',
              deployment_stage='Month 3+ -- after 2000+ labelled examples and latency budget confirmed',
              strengths=[
                  '95%+ accuracy on well-defined attack classes with 2000+ labelled examples',
                  'Contextual token representation catches syntactic and semantic attack signals',
                  'Transfer learning from pre-training -- language understanding is free',
                  'Outperforms tree classifiers by 5-10 percentage points at matched recall',
              ],
              failure_modes=[
                  'Requires 2000+ labelled examples -- highest data requirement of all families',
                  '15ms FP32 inference -- must quantise to INT8 for 50ms gateway budget',
                  'Post-hoc explainability only -- attention maps are not analyst-readable in real time',
                  'Hours of fine-tuning per version -- slow iteration cycle relative to tree classifiers',
              ],
          ),
      ]


      def print_taxonomy_table(families: List[MLDetectionFamily]) -> None:
          print('ML Detection Family Taxonomy')
          print('=' * 60)
          for f in families:
              print(f'\n[{f.name}]')
              print(f'  Algorithms:    {", ".join(f.algorithms)}')
              print(f'  Min data:      {f.min_labelled_data}')
              print(f'  Latency:       {f.latency_ms_range}')
              print(f'  Explainability:{f.explainability}')
              print(f'  Gateway:       {", ".join(f.gateway_tracks)}')
              print(f'  OWASP:         {", ".join(f.owasp_coverage)}')
              print(f'  ATLAS:         {", ".join(f.atlas_coverage)}')
              print(f'  Deploy at:     {f.deployment_stage}')
              print(f'  Strengths:')
              for s in f.strengths:
                  print(f'    + {s}')
              print(f'  Failure modes:')
              for fm in f.failure_modes:
                  print(f'    - {fm}')


      def rules_vs_ml_summary() -> None:
          print('\nRules vs ML -- Complementarity Summary')
          print('-' * 42)
          dims = [
              ('Known pattern',     'Near-perfect precision',          'High; generalises slightly'),
              ('Novel variants',    'FAIL -- rule does not exist',     'Catches via learned features'),
              ('Paraphrase evasion','FAIL -- different tokens bypass',  'Embedding detector catches'),
              ('Multi-turn attack', 'FAIL -- single-turn scope',       'GRU covers conversation arc'),
              ('Explainability',    'Immediate -- read the rule',      'SHAP (tree); attention (neural)'),
              ('Cold start',        'Works -- write from threat intel', 'Anomaly only; supervised needs labels'),
              ('Adaptive adversary','Bypassed by surface rewrite',     'Must change attack structure'),
          ]
          fmt = '{:<22} {:<38} {:<42}'
          print(fmt.format('Dimension', 'Rule-Based (Sigma)', 'ML-Based (Chapter 12)'))
          print('-' * 102)
          for dim, rule, ml in dims:
              print(fmt.format(dim, rule, ml))


      if __name__ == '__main__':
          print_taxonomy_table(ML_DETECTION_FAMILIES)
          rules_vs_ml_summary()

  deliverable_2:
    title: 'Deployment Sequencing Decision Tree'
    filename: 'ml_deployment_sequencer.py'
    description: 'Decision tree that takes current labelled data availability and threat surface characteristics as input and returns the correct ML detection family and deployment action for the current stage. Implements the sequencing logic from Section 12.01 as a runnable tool.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # ml_deployment_sequencer.py
      # Section 12.01: ML Detection Deployment Sequencing Decision Tree
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Optional


      @dataclass
      class ThreatSurface:
          name: str
          labelled_examples_per_class: int
          labelled_conversations: int
          days_in_production: int
          multi_turn_attacks_documented: bool
          latency_budget_ms: int
          paraphrase_evasion_observed: bool


      @dataclass
      class DeploymentAction:
          stage: str
          deploy_now: List[str]
          keep_running: List[str]
          next_milestone: str
          section_reference: str


      def sequence_detectors(surface: ThreatSurface) -> List[DeploymentAction]:
          actions: List[DeploymentAction] = []

          # Stage 1: always deploy anomaly detection first
          actions.append(DeploymentAction(
              stage='Stage 1 -- Statistical Anomaly (deploy immediately)',
              deploy_now=[
                  'Isolation Forest on API usage features (Section 12.03)',
                  'Feature pipeline: token, structural, contextual features (Section 12.02)',
              ],
              keep_running=[],
              next_milestone='Accumulate 200+ analyst-reviewed TP labels from anomaly alerts',
              section_reference='Section 12.03',
          ))

          if surface.labelled_examples_per_class < 200:
              return actions

          # Stage 2: supervised classification
          actions.append(DeploymentAction(
              stage='Stage 2 -- Supervised Classification',
              deploy_now=[
                  'Random Forest classifier with SHAP explainability (Section 12.05)',
                  'Dataset curation pipeline: temporal split, class imbalance handling (Section 12.04)',
              ],
              keep_running=['Isolation Forest (continue collecting anomaly alerts)'],
              next_milestone='Accumulate 500+ labelled examples per class; confirm paraphrase evasion',
              section_reference='Section 12.05',
          ))

          if surface.labelled_examples_per_class < 500:
              return actions

          # Stage 3: add XGBoost and embedding detector
          deploy_stage3 = ['XGBoost classifier with calibration (Section 12.05, 12.10)']
          if surface.paraphrase_evasion_observed:
              deploy_stage3.append('Embedding similarity detector with seeded centroids (Section 12.07)')

          actions.append(DeploymentAction(
              stage='Stage 3 -- Ensemble Foundation',
              deploy_now=deploy_stage3,
              keep_running=['Isolation Forest', 'Random Forest'],
              next_milestone='Accumulate 2000+ labelled examples; verify latency budget with three detectors',
              section_reference='Sections 12.05, 12.07, 12.10',
          ))

          if surface.labelled_examples_per_class < 2000:
              return actions

          # Stage 4: neural classifier if latency permits
          if surface.latency_budget_ms >= 50:
              actions.append(DeploymentAction(
                  stage='Stage 4 -- Neural Classifier (if latency budget permits)',
                  deploy_now=[
                      'DistilBERT fine-tune with INT8 quantisation (Sections 12.08, 12.12)',
                      'Model registry with shadow-mode validation (Section 12.13)',
                  ],
                  keep_running=['Isolation Forest', 'Random Forest', 'XGBoost', 'Embedding detector'],
                  next_milestone='Accumulate 500+ conversation-level labels if multi-turn attacks present',
                  section_reference='Sections 12.08, 12.12, 12.13',
              ))

          # Stage 5: sequence model if multi-turn attacks documented
          if surface.multi_turn_attacks_documented and surface.labelled_conversations >= 500:
              actions.append(DeploymentAction(
                  stage='Stage 5 -- Sequence Modelling (multi-turn attack coverage)',
                  deploy_now=[
                      'GRU conversation detector with attention weights (Section 12.06)',
                      'Conversation-level dataset construction (Section 12.04)',
                  ],
                  keep_running=['All prior detectors'],
                  next_milestone='Full four-detector ensemble assembled; begin A/B testing (Section 12.16)',
                  section_reference='Sections 12.06, 12.15, 12.16',
              ))

          return actions


      def print_sequencing_plan(surface: ThreatSurface) -> None:
          print(f'Deployment Sequencing Plan: {surface.name}')
          print(f'  Current labelled examples per class: {surface.labelled_examples_per_class}')
          print(f'  Labelled conversations:              {surface.labelled_conversations}')
          print(f'  Days in production:                  {surface.days_in_production}')
          print(f'  Multi-turn attacks documented:       {surface.multi_turn_attacks_documented}')
          print(f'  Latency budget:                      {surface.latency_budget_ms}ms P99')
          print(f'  Paraphrase evasion observed:         {surface.paraphrase_evasion_observed}')
          print()
          actions = sequence_detectors(surface)
          for i, a in enumerate(actions, 1):
              print(f'[{i}] {a.stage}')
              print(f'    Deploy now:')
              for d in a.deploy_now:
                  print(f'      + {d}')
              if a.keep_running:
                  print(f'    Keep running:')
                  for k in a.keep_running:
                      print(f'      = {k}')
              print(f'    Next milestone: {a.next_milestone}')
              print(f'    Reference:      {a.section_reference}')
              print()


      if __name__ == '__main__':
          # Example: new LLM integration, day 30, 350 labelled examples accumulated
          surface = ThreatSurface(
              name='Production LLM API -- Month 1',
              labelled_examples_per_class=350,
              labelled_conversations=0,
              days_in_production=30,
              multi_turn_attacks_documented=False,
              latency_budget_ms=50,
              paraphrase_evasion_observed=True,
          )
          print_sequencing_plan(surface)

          print('=' * 60)

          # Example: mature deployment, 3000 labelled examples, multi-turn confirmed
          surface_mature = ThreatSurface(
              name='Production LLM API -- Month 6',
              labelled_examples_per_class=3000,
              labelled_conversations=600,
              days_in_production=180,
              multi_turn_attacks_documented=True,
              latency_budget_ms=50,
              paraphrase_evasion_observed=True,
          )
          print_sequencing_plan(surface_mature)

  deliverable_3:
    title: 'ML Detection Maturity Scorer'
    filename: 'ml_maturity_scorer.py'
    description: 'Scores a given detection system against the ML detection maturity ladder (L1/L2/L3) and returns the specific gaps that prevent advancement to the next level. Implements the concrete criteria defined in Section 12.01.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # ml_maturity_scorer.py
      # Section 12.01: ML Detection Maturity Ladder Scorer
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class DetectionSystemState:
          # L1 criteria
          anomaly_detector_in_production: bool
          alerts_reviewed_within_24h: bool
          tp_fp_labels_stored: bool
          # L2 criteria
          supervised_classifier_in_production: bool
          labelled_examples_per_class: int
          temporal_test_set_evaluation_documented: bool
          model_in_registry_with_card: bool
          # L3 criteria
          embedding_detector_running: bool
          neural_or_gru_detector_running: bool
          calibrated_probabilities: bool
          ab_test_validated: bool
          live_curation_pipeline_running: bool
          retraining_automated: bool


      @dataclass
      class MaturityScore:
          level: int
          level_name: str
          criteria_met: List[str]
          gaps: List[str]
          next_level_actions: List[str]


      L1_CRITERIA = [
          ('anomaly_detector_in_production', 'Anomaly detector running on production traffic'),
          ('alerts_reviewed_within_24h', 'Alerts reviewed within 24 hours'),
          ('tp_fp_labels_stored', 'TP/FP labels from review stored for supervised training'),
      ]

      L2_CRITERIA = [
          ('supervised_classifier_in_production', 'Supervised classifier deployed in production'),
          ('temporal_test_set_evaluation_documented', 'Temporal test set evaluation results documented'),
          ('model_in_registry_with_card', 'Model in registry with model card'),
      ]

      L2_DATA_THRESHOLD = 200

      L3_CRITERIA = [
          ('embedding_detector_running', 'Embedding similarity detector running in ensemble'),
          ('neural_or_gru_detector_running', 'Neural classifier or GRU sequence detector running'),
          ('calibrated_probabilities', 'All detectors output calibrated probabilities (Section 12.10)'),
          ('ab_test_validated', 'Ensemble validated on production A/B test (Section 12.16)'),
          ('live_curation_pipeline_running', 'Live dataset curation pipeline collecting TP/FP (Section 12.14)'),
          ('retraining_automated', 'Retraining automated with stage transition gate validation (Section 12.13)'),
      ]


      def score_maturity(state: DetectionSystemState) -> MaturityScore:
          # Check L1
          l1_met = []
          l1_gaps = []
          for attr, desc in L1_CRITERIA:
              if getattr(state, attr):
                  l1_met.append(desc)
              else:
                  l1_gaps.append(desc)

          if l1_gaps:
              return MaturityScore(
                  level=0,
                  level_name='Below L1',
                  criteria_met=l1_met,
                  gaps=l1_gaps,
                  next_level_actions=[f'Complete: {g}' for g in l1_gaps],
              )

          # L1 achieved -- check L2
          l2_met = list(l1_met)
          l2_gaps = []
          for attr, desc in L2_CRITERIA:
              if getattr(state, attr):
                  l2_met.append(desc)
              else:
                  l2_gaps.append(desc)

          if state.labelled_examples_per_class < L2_DATA_THRESHOLD:
              l2_gaps.append(
                  f'Labelled examples per class: {state.labelled_examples_per_class} '
                  f'(need {L2_DATA_THRESHOLD}+)'
              )
          else:
              l2_met.append(f'Labelled examples per class: {state.labelled_examples_per_class} (>= {L2_DATA_THRESHOLD})')

          if l2_gaps:
              return MaturityScore(
                  level=1,
                  level_name='L1 -- Statistical Anomaly',
                  criteria_met=l2_met,
                  gaps=l2_gaps,
                  next_level_actions=[f'Complete for L2: {g}' for g in l2_gaps],
              )

          # L2 achieved -- check L3
          l3_met = list(l2_met)
          l3_gaps = []
          for attr, desc in L3_CRITERIA:
              if getattr(state, attr):
                  l3_met.append(desc)
              else:
                  l3_gaps.append(desc)

          if l3_gaps:
              return MaturityScore(
                  level=2,
                  level_name='L2 -- Supervised Classification',
                  criteria_met=l3_met,
                  gaps=l3_gaps,
                  next_level_actions=[f'Complete for L3: {g}' for g in l3_gaps],
              )

          return MaturityScore(
              level=3,
              level_name='L3 -- Calibrated Ensemble',
              criteria_met=l3_met,
              gaps=[],
              next_level_actions=['Chapter 13: add behavioural analysis and drift detection'],
          )


      def print_maturity_report(state: DetectionSystemState) -> None:
          score = score_maturity(state)
          bar = '#' * score.level + '.' * (3 - score.level)
          print(f'ML Detection Maturity: [{bar}] Level {score.level} -- {score.level_name}')
          print()
          print('Criteria met:')
          for c in score.criteria_met:
              print(f'  [x] {c}')
          if score.gaps:
              print()
              print('Gaps (not yet met):')
              for g in score.gaps:
                  print(f'  [ ] {g}')
          print()
          print('Next actions:')
          for a in score.next_level_actions:
              print(f'  -> {a}')


      if __name__ == '__main__':
          # Example: system at L1, anomaly running, some labelled data, no supervised yet
          state_l1 = DetectionSystemState(
              anomaly_detector_in_production=True,
              alerts_reviewed_within_24h=True,
              tp_fp_labels_stored=True,
              supervised_classifier_in_production=False,
              labelled_examples_per_class=120,
              temporal_test_set_evaluation_documented=False,
              model_in_registry_with_card=False,
              embedding_detector_running=False,
              neural_or_gru_detector_running=False,
              calibrated_probabilities=False,
              ab_test_validated=False,
              live_curation_pipeline_running=False,
              retraining_automated=False,
          )
          print('--- System A (early L1) ---')
          print_maturity_report(state_l1)

          print()
          print('--- System B (approaching L2) ---')
          state_l2 = DetectionSystemState(
              anomaly_detector_in_production=True,
              alerts_reviewed_within_24h=True,
              tp_fp_labels_stored=True,
              supervised_classifier_in_production=True,
              labelled_examples_per_class=350,
              temporal_test_set_evaluation_documented=True,
              model_in_registry_with_card=True,
              embedding_detector_running=False,
              neural_or_gru_detector_running=False,
              calibrated_probabilities=False,
              ab_test_validated=False,
              live_curation_pipeline_running=False,
              retraining_automated=False,
          )
          print_maturity_report(state_l2)

