common_mistakes:

  mistake_1_treating_chapter_as_optional_reading:
    description: 'Treating Chapter 8 as optional or background reading rather than as core operational content for AI security programmes'
    why_it_happens: |
      Chapter 8 is substantial (16 sections, 60,000+ prose words). Practitioners
      pressed for time may treat it as background rather than core operational
      content. The mistake is structural: training-time poisoning is one of the
      principal AI security threat classes, and operational defensive coverage
      requires the technical depth Chapter 8 provides. Treating the chapter
      as optional produces defensive programmes with structural gaps in
      training-time coverage.
    consequence: 'AI security programmes deploy without training-time defensive coverage. Backdoors installed through training-time attacks reach production undetected. Defensive posture appears comprehensive while structurally exposed.'
    correct_approach: 'Treat Chapter 8 as core operational content for any organisation deploying AI. The chapter is substantial because the threat model is substantial; selective reading is appropriate but skipping the chapter entirely produces defensive gaps. Section 8.16 reading-path guidance supports selective access for time-constrained practitioners.'

  mistake_2_completing_chapter_without_capability_extension_planning:
    description: 'Completing Chapter 8 reading without establishing ongoing capability extension as operational discipline'
    why_it_happens: |
      Chapter 8 is comprehensive enough to feel like a complete answer to
      training-time AI security. Practitioners may treat completion as
      sufficient and not establish ongoing maintenance. The threat landscape
      continues to evolve after the chapter was written; defensive programmes
      that do not extend capability progressively become dated.
    consequence: 'Defensive coverage relative to contemporary threats degrades over time. Attacks emerging after Chapter 8 publication produce no detection. The programme appears stable while structurally falling behind.'
    correct_approach: 'Treat Chapter 8 as foundational content that requires ongoing extension. Quarterly review of new attack research and detection primitives. Annual major capability updates. Section 8.16 open problems reference identifies the directions to track. Section 8.15 deliverable 6 supports incremental capability extension.'

  mistake_3_audience_path_substitute_for_complete_understanding:
    description: 'Using audience-specific reading paths as substitute for complete chapter understanding when designing organisation-wide programmes'
    why_it_happens: |
      Section 8.16 reading paths support selective access for specific use
      cases. Practitioners designing organisation-wide programmes may treat
      audience-specific paths as sufficient for their broader role. The
      mistake is that organisation-wide design requires the full framework
      that selective reading does not provide.
    consequence: 'Organisation-wide programmes designed from selective reading miss cross-cutting threads and integration points. The programme covers the parts the designer read deeply; gaps appear at the integration boundaries.'
    correct_approach: 'Use audience-specific reading paths for individual operational tasks; use complete chapter reading for organisation-wide programme design. Section 8.16 cross-cutting threads provide the integration framework that organisation-wide programmes need.'

section_summary:
  compact: |
    Chapter 8 has covered the complete training-time AI security threat model
    across 15 technical sections plus this synthesis. The cross-cutting threads
    that structure the chapter include: architectural equivalence between
    training-time and runtime attacks, foundation model inheritance, ensemble
    defence as structural mandate, the centralised-decentralised paradigm
    shift, supply chain treatment as first-class concern, honest acknowledgement
    of defensive limits, and production-readiness as engineering discipline.
    Production-readiness varies by sub-area: canonical backdoor detection,
    LoRA supply chain, repository supply chain, detection primitives, and
    DP-SGD-based defensive training are operationally mature; advanced
    backdoor detection, RLHF preference defence, federated defences for
    advanced attacks, and certified defences are operationally feasible
    with appropriate engineering investment; consumer-side pre-training
    contamination defence depends on foundation provider transparency
    that is improving under regulatory and customer pressure. Open problems
    include novel attack detection, privacy-robustness composition, dynamic
    attack catalog maintenance, foundation model behavioural reproducibility,
    multi-modal coverage, regulatory-technical alignment, and defensive
    investment economic incentives. In book arc context, Chapter 8 covers
    the training-time side of OWASP LLM03; Chapter 6 covers runtime injection;
    Chapter 7 covers runtime jailbreaks; Chapter 9 covers model extraction
    as the inference-time complement to Chapter 8 training-time coverage.
    Chapter 8 is core operational content for any organisation deploying AI;
    audience-specific reading paths support selective access while complete
    reading supports organisation-wide programme design. Chapter 9 next
    extends the framework to inference-time model extraction attacks, where
    adversaries reconstruct model functionality through interaction rather
    than training-data manipulation.

  key_takeaways:
    - 'Chapter 8 has covered the complete training-time AI security threat model across attack catalogue, detection, defensive training, supply chain, federated extension, and production pipeline integration'
    - 'Seven cross-cutting threads structure the chapter and provide the conceptual scaffold for organisational programme design'
    - 'Production-readiness varies by sub-area; mature sub-areas are deployable today, evolving sub-areas require ongoing engineering investment'
    - 'Open problems identify the directions where the framework will extend as research and industry practice advance'
    - 'Chapter 8 sits in book arc with Chapters 6 (runtime injection), 7 (runtime jailbreaks), 9 (model extraction); the chapters interlock through architectural equivalences and shared defensive principles'
    - 'Reading paths support different audiences; complete reading supports organisation-wide programme design'
    - 'Capability extension is ongoing operational discipline; defensive programmes require maintenance to keep pace with evolving threat landscape'
    - 'Chapter 8 is core operational content for AI security; treating it as optional produces structural defensive gaps'

preview_chapter_09:
  title: 'Chapter 9: Model Extraction Attacks - The Inference-Time Complement'
  connection: |
    Chapter 8 covered training-time AI security: how adversaries manipulate
    training data, training pipelines, and deployment artifacts to install
    persistent attacker-chosen behaviour in deployed models. Chapter 9
    covers the inference-time complement: how adversaries reconstruct
    model functionality through interaction with deployed models. The attack
    surface is inference-time query patterns rather than training-time data
    manipulation; the defensive techniques operate on query monitoring,
    rate limiting, and output watermarking rather than on training data
    auditing.

    The Chapter 9 framework shares Chapter 8 structural principles. Architectural
    equivalence patterns appear: model extraction at scale produces a
    derivative model whose behaviour matches the original closely enough to
    constitute IP theft, with the derivative deployable for downstream
    attacks against the original target audience. Ensemble defence applies:
    no single defensive primitive (rate limiting, output watermarking, query
    pattern detection) covers the full extraction attack space. Supply
    chain integration applies: extracted models propagate through the same
    distribution channels Chapter 8 covered for poisoned models. Production
    pipeline integration applies: Chapter 9 builds an extraction-detection
    pipeline that integrates with the Chapter 8 production pipeline as a
    parallel track for inference-time threats.

    The chapter covers principal extraction attack classes (functionality
    extraction, fidelity extraction, membership inference as a related
    privacy attack), defensive primitives (rate limiting, output perturbation,
    watermarking, query pattern detection), and the production architecture
    integrating the inference-time defences with broader AI security
    operations. Together, Chapters 8 and 9 establish the complete training-
    time and inference-time attack and defence framework for OWASP LLM03
    (Training Data Poisoning) and LLM10 (Model Theft); subsequent chapters
    extend to remaining attack classes (adversarial examples, privacy attacks,
    excessive agency in agentic systems).

    Readers completing Chapter 8 are prepared for Chapter 9 with the framework
    conventions established (architectural equivalence, ensemble defence,
    supply chain integration, production pipeline) and with the operational
    discipline of progressive maturity adoption. The book continues from
    training-time security to the broader AI security landscape; Chapter 8
    is foundational and Chapter 9 is the natural next extension.

