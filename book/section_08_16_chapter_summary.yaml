prose_content:

  part_1_cross_cutting_threads:
    title: 'Cross-Cutting Threads: The Structural Threads That Run Through Chapter 8'
    body: |
      Chapter 8 has covered substantial technical territory across attack
      catalogue, detection, defensive training, supply chain, and production
      integration. The territory is unified by several cross-cutting threads
      that appear repeatedly across sections and that constitute the
      structural framing of the chapter. Section 8.16 begins by making these
      threads explicit so readers can carry them as organising principles
      beyond the chapter's specific technical content.

      The first thread is architectural equivalence between training-time
      attacks and runtime attacks. Section 8.7 Part 6 established that
      instruction-tuning backdoors produce runtime behaviour indistinguishable
      from Chapter 6 prompt injection. Section 8.8 Part 6 established that
      RLHF preference contamination produces runtime behaviour indistinguishable
      from Chapter 7 jailbreaks. The pattern is structural: training-time
      attacks at specific pipeline stages produce runtime effects matching
      specific runtime attack classes. The defensive consequence is that
      complete OWASP LLM01 and LLM03 coverage requires both runtime and
      training-time defences as complementary layers, not substitutes. The
      thread runs through Chapter 8 from Section 8.7 onward and grounds the
      Section 8.15 production pipeline track-four runtime detection layer.

      The second thread is foundation model inheritance. Section 8.5 Part 6
      established that backdoors installed in foundation models persist
      through downstream consumer fine-tuning at rates depending on
      fine-tuning regime: total through LoRA (Section 8.9), partial through
      moderate fine-tuning, minimal through full retraining. Section 8.7
      Part 7 extended the framework to LLM-specific contexts: alignment
      training does not reliably remove instruction-tuning backdoors
      (sleeper-agents effect). Section 8.11 covered the upstream consequence:
      consuming organisations cannot remediate inherited contamination from
      pre-training, and their principal defensive lever is foundation provider
      risk assessment. The thread runs from technical mechanism (Section 8.5)
      through threat model (Section 8.7) to operational control (Section
      8.11) and into the Section 8.15 supply chain auditing track.

      The third thread is ensemble defence as structural mandate. No single
      detection primitive covers the full backdoor attack space (Section
      8.12). No single defensive training technique eliminates poisoning
      risk (Section 8.13). No single supply chain control covers all attack
      classes (Sections 8.9, 8.10). Operationally meaningful defensive
      coverage requires ensemble construction across primitives and across
      defensive layers. Section 8.12 makes the case at the detection
      primitive level (spectral signatures plus Neural Cleanse plus STRIP
      plus meta-classifier ensemble); Section 8.13 makes the case at the
      defensive training level (DP-SGD plus data filtering plus robust
      optimisation); Section 8.15 makes the case at the production pipeline
      level (four-track architecture). The thread is that defensive
      thinking proceeds from coverage analysis, not from single-best-
      technique selection.

      The fourth thread is the centralised-decentralised defensive paradigm
      shift. Sections 8.7 through 8.13 covered centralised training: the
      defender controls the training pipeline and defends against poisoned
      data. Section 8.14 covered federated training: the defender does not
      control participants and defends against poisoned gradient
      contributions. The defensive paradigm shifts from data validation
      (centralised) to aggregation robustness (federated). Section 8.15
      pipeline supports both modes through configurable tracks. The thread
      is that defensive architecture must match the trust model of the
      training context, not assume a default centralised model.

      The fifth thread is supply chain treatment as first-class concern.
      Sections 8.9, 8.10, and 8.11 cover the model side, repository side,
      and data side of the AI supply chain. Each section operationalises
      Chapter 5 Section 5.9 framework into specific controls: adapter
      verification, repository auditing, dataset SBOM. Section 8.15 supply
      chain track integrates them. The thread is that AI security is
      supply chain security: the artifacts deployed organisations consume
      from external sources are the principal defensive surface, not just
      the artifacts they produce themselves. The framing aligns AI security
      with software supply chain security disciplines that are well-
      established in non-AI contexts.

      The sixth thread is honest acknowledgement of defensive limits. No
      Chapter 8 technique provides complete defence. DP-SGD bounds influence
      but does not eliminate it. Detection primitives have predictable
      coverage gaps. Robust optimisation works within its perturbation set.
      Certified defences certify within narrow regimes. The chapter is
      consistent in framing each defensive technique with explicit failure
      modes and coverage characterisation. The thread is that defensive
      programmes should plan for partial coverage with layered defence,
      not assume completeness from any single technique. Operational
      defensive value comes from ensemble coverage with documented gaps,
      not from techniques claimed comprehensive.

      The seventh thread is production-readiness as engineering discipline.
      Chapter 8 deliverables are designed for deployment, not just
      benchmarking. Section 8.15 maturity progression provides explicit
      adoption pathway. Compliance evidence is treated as first-class
      output. Incident response integration is mandatory. Operational
      tuning is ongoing discipline. The thread is that AI security as
      practiced in 2026 is engineering work with operational requirements
      similar to other security disciplines, not research speculation
      with deployment pending.

      These seven threads together constitute the structural framing of
      Chapter 8. Readers carrying them forward have the conceptual scaffold
      that the chapter's technical content fits within. The remainder of
      Section 8.16 builds on this scaffold: production-readiness assessment
      per sub-area (Part 2), open problems and research directions (Part
      3), book-arc context (Part 4), and reading-strategy guidance (Part 5).

  part_2_production_readiness_assessment:
    title: 'Production-Readiness Assessment Per Sub-Area'
    body: |
      Chapter 8 covers sub-areas at substantially different production-
      readiness states. Some areas (canonical backdoor detection, supply
      chain controls) are mature and operationally deployable today.
      Others (federated defences against advanced Byzantine attacks, certified
      defences for general backdoor classes) are research-active with
      production deployment requiring careful threat-model match. Section
      8.16 assesses each sub-area honestly so readers can calibrate
      defensive expectations and capability investment.

      Canonical backdoor detection (Sections 8.5, 8.12 for fixed-trigger
      attacks) is operationally mature. The principal primitives (spectral
      signatures, activation clustering, Neural Cleanse, STRIP) have
      reference implementations, published benchmarks, and broad practitioner
      adoption. Coverage against canonical BadNets attacks is high and
      well-characterised. Production deployment is achievable with standard
      engineering effort. The principal operational consideration is
      threshold calibration; capability extension is straightforward.

      Advanced backdoor detection (Section 8.6 advanced trigger taxonomy
      with Section 8.12 ensemble) is operationally feasible but requires
      more sophisticated capability. The advanced trigger variants
      (invisible, dynamic, compositional, multi-stage) require specific
      primitive ensembles for coverage; meta-classifier deployment requires
      ongoing corpus maintenance. Production deployment is achievable but
      requires sustained engineering investment and threat catalogue
      maintenance. Most production-deployed AI security programmes operate
      at this level today.

      LLM-specific instruction-tuning poisoning detection (Section 8.7) is
      operationally achievable with the Section 8.7 deliverables plus
      Section 8.12 detection primitives applied to instruction-tuning data
      and resulting models. Production deployment is straightforward for
      organisations conducting their own instruction-tuning. The sleeper-
      agents persistence concern (RLHF does not reliably remove
      instruction-tuning backdoors) is well-established but requires
      capability that the chapter establishes.

      RLHF preference contamination defence (Section 8.8) is operationally
      feasible but evolving. The principal techniques (annotator agreement
      analysis, reward model probing, alignment regression testing) are
      established. Constitutional AI and RLAIF defensive considerations
      are recent and continue to mature. Production deployment is
      achievable for organisations conducting their own RLHF; the principal
      challenge is adversarial probe suite curation as new attack patterns
      emerge.

      LoRA adapter supply chain controls (Section 8.9) are operationally
      mature. The defensive primitives (weight-delta anomaly detection,
      behavioural diff testing, provenance verification) are deployable
      with standard engineering effort. The composition testing
      sub-discipline is more recent but achievable. Production deployment
      should be standard for any organisation consuming external adapters.

      Repository supply chain controls (Section 8.10) are operationally
      mature for the principal attack classes (pickle code execution,
      typosquatting, model card deception). SafeTensors adoption is the
      principal format-level defence and is widely deployable. The
      consumer-side controls operationalise Chapter 5 Section 5.9 supply
      chain checklist into specific deliverables.

      Dataset provenance and pre-training contamination defence (Section
      8.11) is at varying maturity by deployment context. For organisations
      conducting their own pre-training, the technical infrastructure
      (dataset SBOM generation, audit harness, reputation tracking) is
      deployable. For consuming organisations relying on foundation
      models, the principal lever is foundation provider risk assessment,
      which depends on provider transparency that varies substantially.
      The regulatory landscape (EU AI Act dataset transparency, NIST AI
      RMF data lineage) is driving provider transparency upward, improving
      consumer-side capability over time.

      Detection primitives (Section 8.12) are operationally mature for the
      five principal techniques. Reference implementations exist; ensemble
      construction is well-established; deployment is achievable with
      standard engineering effort. Meta-classifier training corpus
      maintenance is the principal operational discipline that programmes
      must commit to.

      Defensive training (Section 8.13) is operationally feasible with
      maturity varying by technique. DP-SGD is well-established with
      reference libraries (Opacus, TensorFlow Privacy); production
      deployment is achievable. Robust optimisation requires careful
      perturbation-set selection; deployment is achievable for specific
      threat models. Data filtering integrates with detection primitives
      and is operationally straightforward. Certified defences are
      research-active with narrow production deployment scope; appropriate
      for specific high-stakes contexts.

      Federated learning defences (Section 8.14) are operationally feasible
      for established attack classes (direct Byzantine, Sybil, model
      replacement) using established robust aggregation methods (Krum,
      Bulyan, FoolsGold). Advanced Byzantine attacks (adaptive, coalition,
      coordinated multi-round) and combined privacy-robustness deployments
      are research-active with production deployment requiring careful
      threat model match.

      Production pipeline integration (Section 8.15) is operationally
      deployable through the maturity tier framework. Tier 1 is achievable
      for any AI-deploying organisation; tier 2 requires established
      AI deployment; tiers 3 and 4 require sustained programmatic investment.
      The architecture supports incremental adoption through the tiers.

      The aggregate state is that AI training-time security is a deployable
      engineering discipline in 2026 for organisations willing to invest in
      operational capability. The principal gaps are in sophisticated attack
      coverage (where research continues to advance) and in foundation
      provider transparency (where regulatory and customer pressure is
      driving improvement). Programmes adopting Chapter 8 framework can
      achieve meaningful defensive coverage today with documented gaps.

  part_3_open_problems_and_research_directions:
    title: 'Open Problems and Active Research Directions'
    body: |
      Chapter 8 establishes operational defensive coverage but does not
      claim to solve every research problem. Several open problems and
      active research directions affect the trajectory of training-time
      AI security; awareness of them informs capability investment
      decisions and helps practitioners distinguish established practice
      from emerging frontier. Section 8.16 identifies the principal open
      directions without claiming to predict their resolution.

      One open problem is detection of novel attack variants outside any
      training corpus. Meta-classifiers (Section 8.12) cover attack variants
      represented in their training data; novel variants outside the corpus
      may evade detection. Generalising from corpus-trained detectors to
      truly novel attacks is an active research area with various proposed
      approaches (zero-shot detection, anomaly-based detection without
      attack-specific training). The current operational reality is that
      novel attack detection lags attack development by some months as
      meta-classifier corpora update; reducing this lag is a research
      priority.

      Another open problem is privacy-robustness composition. Federated
      learning combined with differential privacy combined with Byzantine-
      robust aggregation produces overlapping noise sources that interact
      complicated. The combined coverage is weaker than any individual
      property in isolation, and characterising the combined coverage
      formally is an active research area. Practitioners deploying
      privacy-preserving federated learning currently accept partial
      coverage in each dimension; comprehensive guarantees combining all
      three are not yet operationally available.

      A third open problem is dynamic attack catalog maintenance. Attack
      research advances continuously; published attack catalogues become
      outdated as new variants emerge. Maintaining detection coverage
      against contemporary attacks requires ongoing operational discipline
      that organisations vary substantially in committing to. The Section
      8.15 pipeline architecture supports capability extension; the
      operational practice of capability extension is uneven across
      organisations. Establishing capability extension as standard
      discipline is an organisational maturity question with substantial
      defensive implications.

      A fourth open problem is foundation model behavioural reproducibility
      audit. Consuming organisations cannot directly inspect foundation
      provider training pipelines; they can only inspect the resulting
      model and its documentation. Establishing high-confidence audit
      conclusions about foundation model contamination state from
      external inspection alone is structurally difficult. Research
      directions include behavioural fingerprinting (verifying model
      identity), training reproducibility protocols (allowing external
      reproduction of provider training), and cryptographic attestations
      (provider-signed claims about training properties). Each direction
      is at varying maturity; comprehensive consumer-side audit of
      foundation model contamination state is not yet operationally
      available.

      A fifth open problem is multi-modal attack coverage. Chapter 8
      covers principally text-domain LLM attacks plus image-classification
      backdoors. Multi-modal models (text-image, text-audio, text-video)
      have attack surfaces combining multiple modalities and defensive
      requirements that combine techniques across modalities. Coverage
      for multi-modal attacks is at earlier maturity than single-modal
      coverage; specific defensive primitives for multi-modal contexts
      are an active research area.

      A sixth open problem is the regulatory-technical alignment. EU AI
      Act, NIST AI RMF, and emerging sector-specific frameworks establish
      requirements that align broadly with Chapter 8 framework but vary
      in specific implementation details. Specific compliance evidence
      formats and audit procedures are still developing. The Section 8.15
      compliance evidence outputs target current understandings; specific
      formats may evolve as regulatory implementation matures. Practitioners
      should expect ongoing format updates.

      A seventh open problem is the economic and incentive structure for
      defensive investment. Defensive AI security investment is currently
      driven by organisational risk management decisions; the broader
      economic incentives for foundation providers, adapter publishers,
      and dataset curators to invest in security vary by competitive
      context. Establishing reliable industry-wide security minimums
      through regulation, certification, or market mechanisms is an
      open question. The trajectory affects every organisation's defensive
      programme: a market with strong upstream security investment
      reduces consumer-side defensive burden; a market with weak upstream
      investment increases it.

      These open problems are not failures of Chapter 8 -- the chapter
      establishes operational defensive coverage given the current state.
      They are the frontier where the chapter's framework will extend
      as research and industry practice advance. Readers building
      defensive programmes should plan capability extension to track
      the resolution of these problems and benefit from the advances
      as they become production-ready.

  part_4_book_arc_context:
    title: 'Book Arc Context: Chapter 8 in Relation to Chapters 6, 7, 9'
    body: |
      Chapter 8 is one chapter in a multi-chapter coverage of the principal
      AI security threat classes. The book's arc divides threats across
      chapters in specific ways that interlock; understanding Chapter 8 in
      arc context informs how the chapter integrates with the broader
      defensive framework.

      Chapter 6 covers prompt injection: runtime LLM attacks where
      adversaries manipulate model behaviour through crafted prompts.
      Chapter 6 Section 6.17 establishes the runtime injection classifier
      that Chapter 8 Section 8.7 Part 6 identifies as the runtime
      complement to instruction-tuning poisoning detection. The two
      chapters together cover the full OWASP LLM01 (Prompt Injection)
      and the runtime side of LLM03 (Training Data Poisoning); Chapter
      8 covers the training-time side of LLM03 specifically. The
      complementarity is structural and explicit.

      Chapter 7 covers jailbreaks: runtime alignment bypass attacks where
      adversaries construct prompts that circumvent alignment training.
      Chapter 7 Section 7.14 establishes the jailbreak detection ensemble
      that Chapter 8 Section 8.8 Part 6 identifies as the runtime
      complement to RLHF preference contamination. The two chapters
      together cover the full alignment-bypass attack surface across
      runtime and training-time staging. The complementarity is again
      structural: same attack effects, different attack surfaces, both
      requiring defensive coverage.

      Chapter 9 covers model extraction attacks: adversaries reconstruct
      model functionality through interaction with deployed models. The
      attack surface is inference-time query patterns rather than training-
      time data manipulation. Chapter 9 extends the AI security threat
      model to the inference-time complement of Chapter 8 training-time
      coverage. Together, Chapters 8 and 9 cover the principal training-
      time and inference-time attack classes for OWASP LLM03 (Training
      Data Poisoning) and LLM10 (Model Theft). The chapters operate at
      different attack-surface time scales but share underlying defensive
      principles: ensemble defence, detection plus prevention, supply
      chain integration, production pipeline integration.

      The interlocking pattern across Chapters 6-9 is that each chapter
      covers a principal AI threat class with its specific attack surface
      and defensive techniques. Chapters share defensive principles
      (ensemble construction, layered architecture, production integration)
      and integrate at specific points (the architectural equivalences
      from Sections 8.7 Part 6 and 8.8 Part 6; the cross-chapter pipeline
      integration in Section 8.15). The book is therefore not four
      independent chapters but a coordinated framework with explicit
      cross-references; defensive programmes built on the framework
      gain coverage across attack classes that single-chapter focus
      cannot provide.

      Earlier chapters in the book establish the foundation Chapter 8
      builds on. Chapter 2 covers ML fundamentals (representations,
      gradients, training dynamics) that the technical depth in Chapter
      8 detection primitives requires. Chapter 3 covers transformer
      architecture that the LLM-specific sections (8.7, 8.8) build on.
      Chapter 4 covers LLM training pipeline (pre-training, instruction-
      tuning, RLHF) that Chapter 8 attack catalogue maps onto. Chapter
      5 covers AI security operations broadly, including the AI Supply
      Chain Security framework in Section 5.9 that Chapter 8 supply
      chain sections operationalise. Reading Chapter 8 without these
      foundations works but loses depth; reading them in sequence
      establishes the full defensive framework.

      Later chapters in the book extend the framework. Chapter 9 covers
      model extraction (inference-time complement to Chapter 8). Chapter
      10 covers adversarial examples (inference-time evasion attacks).
      Chapter 11 covers privacy attacks (training-data extraction,
      membership inference). Each later chapter shares Chapter 8 framing
      conventions (architectural equivalence patterns, ensemble defence,
      production pipeline integration) and extends the defensive
      framework to its specific attack class.

      The book arc therefore positions Chapter 8 as the central training-
      time security chapter, with deep technical depth and broad
      operational coverage. The chapter is substantial in its own right
      (16 sections, 60,000+ prose words, dozens of deliverables) and
      foundational for the training-time-related material in subsequent
      chapters. Readers building comprehensive AI security capability
      benefit from the full book; readers focused specifically on
      training-time security can use Chapter 8 with reasonable
      independence given the prerequisites it establishes.

  part_5_reading_strategy_guidance:
    title: 'Reading Strategy Guidance: Different Audiences, Different Paths'
    body: |
      Chapter 8 is comprehensive enough that different readers will use
      different parts of it. Section 8.16 closes by providing reading-
      strategy guidance for the principal audiences. The guidance is
      practical: which sections to read in what order for which use cases.
      Readers can use the chapter as a linear text or as a reference
      document with selective access; the structure supports both.

      Practitioners deploying production AI security programmes should
      read Section 8.15 first as the operational target, then return to
      Sections 8.12 and 8.13 for the detection and defensive training
      primitives the pipeline integrates, then Sections 8.9-8.11 for
      the supply chain controls. Sections 8.5-8.8 provide the threat
      model context. Sections 8.1-8.4 are foundational and can be
      consulted as needed. The reading order optimises for actionable
      deployment rather than linear understanding; practitioners typically
      benefit from seeing the production target before the technical
      foundations.

      Researchers studying training-time AI security should read the
      sections in linear order with particular attention to Sections 8.5,
      8.6, 8.7, 8.8, 8.12, and the open problems in Section 8.16 Part 3.
      The technical depth in detection primitives (Section 8.12) and the
      LLM-specific attack mechanics (Sections 8.7, 8.8) provide the
      foundations for research extensions. The open problems identify
      where contributions are most needed.

      Compliance and risk management professionals should read Sections
      8.10, 8.11, and 8.15 with focus on regulatory framework alignment
      and compliance evidence outputs. The reference materials in Section
      8.15 (compliance framework evidence mapping, maturity tier
      reference) provide direct operational input for compliance
      programmes. The Section 8.11 foundation provider risk assessment
      template supports vendor management. Sections 8.5-8.9 provide
      threat model context for risk decisions.

      Security architects designing AI security programmes should read
      Sections 8.1, 8.5, 8.7, 8.8 for threat model establishment, then
      Sections 8.12 and 8.13 for defensive primitive options, then
      Sections 8.9-8.11 for supply chain context, and Section 8.15 for
      integration architecture. The cross-cutting threads in Section 8.16
      Part 1 provide structural framing. Architectural decisions benefit
      from Section 8.15 maturity tier framework as adoption pathway.

      Foundation provider engineers should read Sections 8.5-8.6 for the
      backdoor threat model their pre-training defences must address,
      Section 8.7 for instruction-tuning and Section 8.8 for RLHF
      defensive considerations, Sections 8.11-8.12 for dataset provenance
      and detection primitive deployment, Section 8.13 for defensive
      training options, and Section 8.15 for the operational pipeline
      foundation provider participation supports.

      Consumer-organisation engineers fine-tuning foundation models for
      specific deployments should read Section 8.5 Part 6 (foundation
      model inheritance), Sections 8.7-8.9 (LLM-specific attack surfaces
      they directly control), Section 8.10 (repository risks they consume
      from), Section 8.11 Part 3 (foundation model inheritance and
      consumer exposure), Section 8.12 (detection primitives applicable
      at fine-tuning), Section 8.13 (defensive training during fine-tuning),
      and Section 8.15 (pipeline integration at consumer-controlled
      stages). Sections 8.5, 8.6 provide threat model foundations.

      Federated learning practitioners should read Section 8.14 with focus
      on the deployment context that matches their use case, then back to
      Section 8.13 for DP-SGD applicability at the federated level, then
      Section 8.15 for the federated extension of the production pipeline.
      Sections 8.5 establish the underlying backdoor threat that federated
      gradient poisoning delivers.

      Educators teaching AI security can use Chapter 8 as primary text
      for training-time security coverage. Sections 8.1-8.6 provide the
      conceptual foundations; Sections 8.7-8.8 the LLM extensions;
      Sections 8.9-8.14 the operational depth; Section 8.15 the
      integration capstone. The deliverables across sections support
      lab exercises and reproducible benchmarks; the reference materials
      support assigned reading.

      The chapter rewards both linear and selective reading. The cross-
      cutting threads (Section 8.16 Part 1) are the conceptual scaffold
      that any reading order builds within. Different audiences emphasise
      different parts of the framework; the framework itself is consistent
      across audiences. Readers carrying the threads forward can navigate
      the chapter's specific technical content efficiently and apply the
      framework to their specific operational contexts.

      Chapter 8 is closed. Chapter 9 next covers the inference-time
      complement: model extraction attacks, where adversaries reconstruct
      model functionality through interaction. The framework Chapter 8
      established (architectural equivalence, ensemble defence, supply
      chain integration, production pipeline) extends naturally into
      Chapter 9 with inference-time-specific extensions. The book continues
      from training-time security to the broader AI security landscape;
      readers completing Chapter 8 are prepared for that continuation.

reference_materials:

  cross_cutting_threads_summary_reference:
    title: 'Cross-Cutting Threads Summary Reference'
    description: |
      Compact reference for the seven cross-cutting threads that structure
      Chapter 8. Use as the conceptual scaffold for organising chapter
      content during programme design.

    threads:

      - thread: 'Architectural equivalence between training-time and runtime attacks'
        principal_appearances: 'Section 8.7 Part 6, Section 8.8 Part 6, Section 8.15 track 4'
        defensive_implication: 'Complete OWASP LLM01/LLM03 coverage requires both runtime and training-time defences'

      - thread: 'Foundation model inheritance'
        principal_appearances: 'Section 8.5 Part 6, Section 8.7 Part 7, Section 8.11 Part 3'
        defensive_implication: 'Consumer organisations cannot remediate inherited contamination; foundation provider risk assessment is principal lever'

      - thread: 'Ensemble defence as structural mandate'
        principal_appearances: 'Section 8.6 Part 7, Section 8.12 Part 7, Section 8.13 Part 6, Section 8.15 architecture'
        defensive_implication: 'No single primitive covers full attack space; ensemble construction is mandatory'

      - thread: 'Centralised-decentralised paradigm shift'
        principal_appearances: 'Section 8.14 Part 1'
        defensive_implication: 'Defensive paradigm shifts from data validation to aggregation robustness in federated contexts'

      - thread: 'Supply chain treatment as first-class'
        principal_appearances: 'Sections 8.9, 8.10, 8.11, 8.15 track 3'
        defensive_implication: 'AI security is supply chain security; consumed artifacts are principal defensive surface'

