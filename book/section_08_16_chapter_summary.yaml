section_overview:
  title: 'Chapter 8 Synthesis and Chapter 9 Preview'
  one_line_summary: |
    Chapter 8 has covered the complete training-time threat model: fundamentals,
    image-domain advanced backdoors, LLM-specific data-pipeline poisoning across
    instruction-tuning and RLHF, supply chain attacks across adapters and
    repositories and datasets, detection primitives, defensive training,
    federated extension, and production pipeline integration. The chapter
    establishes OWASP LLM03 defensive coverage as a structured engineering
    practice. Section 8.16 synthesises the cross-cutting threads, assesses
    production-readiness per sub-area, frames the chapter contribution to
    the broader book arc, and previews Chapter 9 on model extraction attacks --
    the inference-time complement to Chapter 8 training-time coverage.

  why_this_section_exists: |
    Sections 8.1 through 8.15 covered substantial technical territory: 15
    sections, roughly 60,000 prose words, dozens of reference materials, and
    over 60 deliverables across attack catalogue, detection primitives,
    defensive training, supply chain controls, and production integration.
    A chapter of this scope benefits from explicit synthesis: a concise
    statement of the cross-cutting threads, a production-readiness assessment
    per sub-area, and an honest acknowledgement of what the chapter accomplishes
    and what it does not. Section 8.16 provides this synthesis.

    The section also serves the structural purpose of bridging Chapter 8 to
    Chapter 9. The book's arc divides AI security threats across multiple
    chapters: Chapter 6 covers prompt injection (runtime LLM threat); Chapter
    7 covers jailbreaks (runtime alignment bypass); Chapter 8 covers training-
    time poisoning; Chapter 9 covers model extraction. The chapters interlock
    in specific ways -- Section 8.7 Part 6 and Section 8.8 Part 6 already
    established the architectural equivalences with Chapters 6 and 7. Section
    8.16 makes the broader book-arc context explicit and frames Chapter 9 as
    the inference-time complement to Chapter 8 training-time coverage.

    The third function of this section is to provide a reading-strategy
    reference. Chapter 8 is comprehensive enough that different readers will
    use different parts of it. Practitioners deploying production pipelines
    use Section 8.15 directly. Researchers studying specific attack variants
    use the technical depth in Sections 8.5, 8.6, 8.12. Compliance teams use
    the regulatory alignment material in Sections 8.11 and 8.15. Section 8.16
    closes by providing reading guidance for these different audiences,
    making the chapter operationally useful as a reference document beyond
    the linear read.

  position_in_chapter: |
    Section 8.16 closes Chapter 8. Sections 8.1-8.6 established training-time
    fundamentals; Sections 8.7-8.8 covered LLM-specific data-pipeline poisoning;
    Sections 8.9-8.11 covered supply chain attacks; Sections 8.12-8.13 covered
    centralised defensive infrastructure; Section 8.14 extended to federated
    learning; Section 8.15 capstoned with the production pipeline integration.
    Section 8.16 synthesises the chapter and bridges to Chapter 9.

