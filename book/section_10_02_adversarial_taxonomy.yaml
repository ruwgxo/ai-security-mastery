deliverables:

  deliverable_1:
    title: 'Adversarial Taxonomy Matrix'
    filename: 'adversarial_taxonomy_matrix.py'
    description: 'Complete adversarial taxonomy as a queryable data structure: four goals by four access tiers by four input modalities with canonical technique, Chapter 10 section reference, and detection primitive per cell'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # adversarial_taxonomy_matrix.py
      # Section 10.2: Adversarial Example Taxonomy Matrix
      # 20260522 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Optional


      GOALS = ['untargeted', 'targeted', 'confidence_reduction', 'detection_evasion']
      TIERS = ['white_box', 'grey_box', 'black_box', 'physical_transfer']
      MODALITIES = ['image', 'text', 'tabular', 'audio']


      @dataclass
      class TaxonomyCell:
          goal: str
          tier: str
          modality: str
          canonical_technique: str
          section_ref: str
          perturbation_constraint: str
          track7_primary: str
          coverage_quality: str
          atlas_technique: str
          notes: str = ''


      TAXONOMY: List[TaxonomyCell] = [
          # Image x untargeted
          TaxonomyCell(
              goal='untargeted', tier='white_box', modality='image',
              canonical_technique='FGSM, PGD',
              section_ref='Section 10.3, 10.4',
              perturbation_constraint='L-infinity epsilon <= 8/255',
              track7_primary='Feature squeezing (10.11)',
              coverage_quality='high',
              atlas_technique='AML.T0043',
          ),
          TaxonomyCell(
              goal='untargeted', tier='grey_box', modality='image',
              canonical_technique='NES gradient estimation',
              section_ref='Section 10.6',
              perturbation_constraint='L-infinity; 1000-10000 queries per step',
              track7_primary='Feature squeezing + query monitor (Track 6)',
              coverage_quality='moderate',
              atlas_technique='AML.T0043',
          ),
          TaxonomyCell(
              goal='untargeted', tier='black_box', modality='image',
              canonical_technique='Boundary Attack',
              section_ref='Section 10.6',
              perturbation_constraint='L2 distance minimisation; 10k-100k queries',
              track7_primary='Consistency checker (10.12)',
              coverage_quality='high',
              atlas_technique='AML.T0043',
              notes='Boundary proximity makes consistency check the primary primitive',
          ),
          TaxonomyCell(
              goal='untargeted', tier='physical_transfer', modality='image',
              canonical_technique='Adversarial patch; transfer from surrogate',
              section_ref='Section 10.7, 10.8',
              perturbation_constraint='Patch region L-inf; transfer: ~0 victim queries',
              track7_primary='Patch localisation detector (10.8)',
              coverage_quality='moderate',
              atlas_technique='AML.T0043 / AML.T0029',
          ),
          # Image x targeted
          TaxonomyCell(
              goal='targeted', tier='white_box', modality='image',
              canonical_technique='PGD targeted, C&W L2',
              section_ref='Section 10.4, 10.5',
              perturbation_constraint='L2 minimised; higher epsilon than untargeted',
              track7_primary='Adversarial classifier (10.12)',
              coverage_quality='high',
              atlas_technique='AML.T0043',
          ),
          TaxonomyCell(
              goal='targeted', tier='black_box', modality='image',
              canonical_technique='Hard-label targeted + surrogate elevation',
              section_ref='Section 10.6, 10.7',
              perturbation_constraint='L2; requires surrogate for practical feasibility',
              track7_primary='Adversarial classifier + consistency',
              coverage_quality='moderate',
              atlas_technique='AML.T0043',
              notes='Practical targeted black-box typically uses Ch9 surrogate elevation',
          ),
          # Text x untargeted
          TaxonomyCell(
              goal='untargeted', tier='white_box', modality='text',
              canonical_technique='HotFlip',
              section_ref='Section 10.9',
              perturbation_constraint='Token edit distance <= k; semantic similarity > threshold',
              track7_primary='Semantic consistency check (back-translation)',
              coverage_quality='moderate',
              atlas_technique='AML.T0043',
          ),
          TaxonomyCell(
              goal='untargeted', tier='black_box', modality='text',
              canonical_technique='TextFooler, BERT-Attack',
              section_ref='Section 10.9',
              perturbation_constraint='Word substitution; cosine sim > 0.8',
              track7_primary='Semantic consistency check',
              coverage_quality='moderate',
              atlas_technique='AML.T0043',
              notes='No image squeezer applicable; text-specific primitives required',
          ),
          TaxonomyCell(
              goal='untargeted', tier='physical_transfer', modality='text',
              canonical_technique='Universal adversarial trigger',
              section_ref='Section 10.9',
              perturbation_constraint='Fixed appended token sequence; universally adversarial',
              track7_primary='Adversarial classifier if triggers in training data',
              coverage_quality='low_to_moderate',
              atlas_technique='AML.T0043',
          ),
          # Detection evasion
          TaxonomyCell(
              goal='detection_evasion', tier='white_box', modality='image',
              canonical_technique='Adaptive C&W with Track 7 knowledge',
              section_ref='Section 10.5, 10.13',
              perturbation_constraint='L2 with squeezer-survival and consistency constraints added',
              track7_primary='Three-primitive ensemble (10.13)',
              coverage_quality='moderate',
              atlas_technique='AML.T0043 / AML.T0015',
              notes='Joint evasion of all three primitives requires larger perturbation budget',
          ),
          # Confidence reduction
          TaxonomyCell(
              goal='confidence_reduction', tier='white_box', modality='image',
              canonical_technique='C&W kappa=0; low-eps FGSM',
              section_ref='Section 10.5',
              perturbation_constraint='L2 minimum norm; small epsilon',
              track7_primary='Output entropy monitor (Ch9 10.10 extended)',
              coverage_quality='moderate',
              atlas_technique='AML.T0043',
              notes='Detectable only when model returns soft-label outputs',
          ),
      ]


      def query(
          goal: Optional[str] = None,
          tier: Optional[str] = None,
          modality: Optional[str] = None,
      ) -> List[TaxonomyCell]:
          result = TAXONOMY
          if goal:
              result = [c for c in result if c.goal == goal]
          if tier:
              result = [c for c in result if c.tier == tier]
          if modality:
              result = [c for c in result if c.modality == modality]
          return result


      def print_cell(c: TaxonomyCell) -> None:
          print(f'  Goal:        {c.goal}')
          print(f'  Tier:        {c.tier}')
          print(f'  Modality:    {c.modality}')
          print(f'  Technique:   {c.canonical_technique}')
          print(f'  Section:     {c.section_ref}')
          print(f'  Constraint:  {c.perturbation_constraint}')
          print(f'  Track7:      {c.track7_primary}')
          print(f'  Coverage:    {c.coverage_quality}')
          print(f'  ATLAS:       {c.atlas_technique}')
          if c.notes:
              print(f'  Notes:       {c.notes}')


      def coverage_summary() -> None:
          goal_counts = {g: len([c for c in TAXONOMY if c.goal == g]) for g in GOALS}
          tier_counts = {t: len([c for c in TAXONOMY if c.tier == t]) for t in TIERS}
          print('\nCoverage by goal:')
          for g, n in goal_counts.items():
              print(f'  {g}: {n} cells')
          print('Coverage by tier:')
          for t, n in tier_counts.items():
              print(f'  {t}: {n} cells')


      if __name__ == '__main__':
          print('=== Full Taxonomy ===')
          for cell in TAXONOMY:
              print('-' * 50)
              print_cell(cell)

          print('\n=== Black-box image cells ===')
          for cell in query(tier='black_box', modality='image'):
              print('-' * 50)
              print_cell(cell)

          coverage_summary()

  deliverable_2:
    title: 'Budget-Success Tradeoff Curves'
    filename: 'budget_success_tradeoff.py'
    description: 'Attack success rate vs perturbation epsilon curves for FGSM, PGD, and C&W, parameterised from published CIFAR-10 benchmarks, with the detectability-success joint region highlighted'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, requires numpy and matplotlib'
    code: |
      # budget_success_tradeoff.py
      # Section 10.2: Budget-Success Tradeoff Curves
      # 20260522 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention
      # Curves parameterised from published benchmarks:
      # FGSM/PGD: Madry et al. 2018 (CIFAR-10, ResNet); C&W: Carlini & Wagner 2017

      import numpy as np
      import matplotlib.pyplot as plt
      from dataclasses import dataclass
      from typing import Callable


      @dataclass
      class AttackCurve:
          name: str
          norm: str
          success_fn: Callable[[np.ndarray], np.ndarray]
          color: str
          linestyle: str


      def logistic_curve(
          x: np.ndarray,
          midpoint: float,
          steepness: float,
          ceiling: float = 0.97,
      ) -> np.ndarray:
          return ceiling / (1.0 + np.exp(-steepness * (x - midpoint)))


      # Parameterised from published L-inf benchmarks on CIFAR-10
      # epsilon axis in units of 1/255 for L-inf curves
      LINF_CURVES = [
          AttackCurve(
              name='FGSM (L-inf)',
              norm='L-infinity',
              success_fn=lambda x: logistic_curve(x, midpoint=10.0, steepness=0.28, ceiling=0.92),
              color='#e74c3c',
              linestyle='-',
          ),
          AttackCurve(
              name='PGD-40 (L-inf)',
              norm='L-infinity',
              success_fn=lambda x: logistic_curve(x, midpoint=5.5, steepness=0.45, ceiling=0.97),
              color='#2980b9',
              linestyle='-',
          ),
          AttackCurve(
              name='PGD-7 (L-inf)',
              norm='L-infinity',
              success_fn=lambda x: logistic_curve(x, midpoint=7.0, steepness=0.38, ceiling=0.95),
              color='#2980b9',
              linestyle='--',
          ),
      ]

      # C&W L2 curve: epsilon axis in L2 distance units
      L2_CURVE = AttackCurve(
          name='C&W L2',
          norm='L2',
          success_fn=lambda x: logistic_curve(x, midpoint=0.4, steepness=8.0, ceiling=0.99),
          color='#27ae60',
          linestyle='-',
      )

      # Squeezer detection rate as a function of L-inf epsilon
      # Rises with epsilon: higher perturbation is more detectable
      def squeezer_detection_rate(eps: np.ndarray) -> np.ndarray:
          return logistic_curve(eps, midpoint=6.0, steepness=0.35, ceiling=0.88)


      def plot_linf_tradeoff(save_path: str = 'budget_success_tradeoff_linf.png') -> None:
          eps = np.linspace(0, 32, 500)
          fig, ax = plt.subplots(figsize=(9, 5))

          for curve in LINF_CURVES:
              ax.plot(eps, curve.success_fn(eps), label=curve.name,
                      color=curve.color, linestyle=curve.linestyle, linewidth=2)

          det_rate = squeezer_detection_rate(eps)
          ax.plot(eps, det_rate, label='Feature squeezer detection rate',
                  color='#8e44ad', linestyle=':', linewidth=2)

          # Shade the operational region: attack success > 0.5 and detection < 0.5
          pgd_success = LINF_CURVES[1].success_fn(eps)
          mask = (pgd_success > 0.50) & (det_rate < 0.50)
          if mask.any():
              ax.fill_between(eps, 0, 1, where=mask, alpha=0.12, color='#e67e22',
                              label='Operational region (high success, low detection)')

          ax.set_xlabel('Perturbation epsilon (units of 1/255 for L-inf)', fontsize=11)
          ax.set_ylabel('Rate', fontsize=11)
          ax.set_title('L-infinity Attack Success vs Squeezer Detection Rate\n(CIFAR-10 ResNet, parameterised from published benchmarks)', fontsize=11)
          ax.set_xlim(0, 32)
          ax.set_ylim(0, 1.05)
          ax.axvline(8, color='grey', linestyle='--', alpha=0.5, linewidth=1)
          ax.text(8.3, 0.05, 'eps=8/255\n(common benchmark)', fontsize=8, color='grey')
          ax.legend(fontsize=9, loc='center right')
          ax.grid(True, alpha=0.3)
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      def plot_l2_tradeoff(save_path: str = 'budget_success_tradeoff_l2.png') -> None:
          eps_l2 = np.linspace(0, 2.0, 500)
          fig, ax = plt.subplots(figsize=(9, 5))
          ax.plot(eps_l2, L2_CURVE.success_fn(eps_l2),
                  label=L2_CURVE.name, color=L2_CURVE.color, linewidth=2)
          ax.set_xlabel('L2 perturbation distance', fontsize=11)
          ax.set_ylabel('Attack success rate', fontsize=11)
          ax.set_title('C&W L2 Attack Success Rate vs Perturbation Norm\n(CIFAR-10, parameterised)', fontsize=11)
          ax.set_xlim(0, 2.0)
          ax.set_ylim(0, 1.05)
          ax.legend(fontsize=9)
          ax.grid(True, alpha=0.3)
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      def print_operational_region_summary() -> None:
          eps = np.linspace(0, 32, 1000)
          pgd_success = LINF_CURVES[1].success_fn(eps)
          det_rate = squeezer_detection_rate(eps)
          mask = (pgd_success > 0.50) & (det_rate < 0.50)
          if mask.any():
              lo = eps[mask][0]
              hi = eps[mask][-1]
              print(f'Operational region (PGD success > 50%, squeezer detection < 50%):')
              print(f'  L-inf epsilon range: {lo:.1f}/255 to {hi:.1f}/255')
              print(f'  Production attacks concentrate in this region')
          else:
              print('No operational region found at these thresholds')


      if __name__ == '__main__':
          print_operational_region_summary()
          plot_linf_tradeoff()
          plot_l2_tradeoff()

