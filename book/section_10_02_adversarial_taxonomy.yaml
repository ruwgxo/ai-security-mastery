          for p, score in m.coverage_scores.items():
              bar = '#' * int(score * 20)
              print(f'    {p:<28} {bar:<20} {score:.2f}')
          print(f'  Coverage gaps:')
          for g in m.gaps:
              print(f'    - {g}')
          print(f'  Recommended config: {m.recommended_config}')


      def recommend_for_threat_model(
          goals: List[str],
