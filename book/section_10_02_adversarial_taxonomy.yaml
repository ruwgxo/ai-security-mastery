  deliverable_5:
    title: 'Defender Decision Tree'
    filename: 'defender_decision_tree.py'
    description: 'Classifies an observed evasion attempt into the taxonomy using observable signals: input modality, query pattern, squeezer disagreement, consistency check result, and primary model output'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # defender_decision_tree.py
      # Section 10.2: Defender Decision Tree for Evasion Attempt Classification
      # 20260522 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Optional, List


      @dataclass
      class EvasionSignals:
          modality: str                      # 'image', 'text', 'tabular', 'audio'
          query_pattern_fired: bool          # Track 6 fired (extraction campaign detected)
          squeezer_disagreement: float       # 0.0 = no change; 1.0 = complete flip
          squeezer_disagreement_threshold: float = 0.20
          consistency_check_fired: bool = False
          consistency_instability_score: float = 0.0
          output_confidence: Optional[float] = None   # None if hard-label API
          output_class_suspicious: bool = False       # Specific expected wrong class


      @dataclass
      class EvasionClassification:
          likely_goal: str
          likely_tier: str
          confidence: str
          canonical_technique: str
          recommended_primitive: str
          rationale: str


      def classify_evasion(signals: EvasionSignals) -> EvasionClassification:
          # Step 1: Determine access tier from query pattern
          if signals.query_pattern_fired:
              tier = 'grey_or_black_box_campaign'
          else:
              tier = 'white_box_or_transfer'

          # Step 2: Determine goal from output signals
          if signals.output_confidence is not None and signals.output_confidence < 0.40:
              goal = 'confidence_reduction'
              technique = 'Low-epsilon FGSM or C&W kappa=0'
              primitive = 'Output entropy monitor + feature squeezing'
          elif signals.output_class_suspicious:
              goal = 'targeted'
              technique = 'PGD targeted or C&W L2 high-kappa'
              primitive = 'Adversarial classifier (primary) + consistency checker'
          else:
              goal = 'untargeted'
              technique = 'FGSM or PGD (white-box); Boundary Attack (black-box)'
              primitive = 'Feature squeezing (primary) + consistency checker'

          # Step 3: Refine tier estimate from squeezer and consistency signals
          large_squeezer = signals.squeezer_disagreement > signals.squeezer_disagreement_threshold
          if large_squeezer and not signals.consistency_check_fired:
              tier_refined = 'white_box_fgsm_or_pgd'
              conf = 'moderate'
          elif not large_squeezer and signals.consistency_check_fired:
              tier_refined = 'near_boundary_black_box'
              conf = 'moderate'
          elif large_squeezer and signals.consistency_check_fired:
              tier_refined = 'white_box_low_iterations'
              conf = 'low'
          elif not large_squeezer and not signals.consistency_check_fired:
              tier_refined = 'cw_high_kappa_or_transfer_or_natural'
              conf = 'low'
          else:
              tier_refined = tier
              conf = 'low'

          # Step 4: Modality-specific override
          if signals.modality == 'text':
              primitive = 'Semantic consistency check (back-translation) + adversarial classifier'
              technique = 'TextFooler or HotFlip (if white-box)'

          rationale = (
              f'Modality={signals.modality}, '
              f'track6={signals.query_pattern_fired}, '
              f'squeezer_disagreement={signals.squeezer_disagreement:.2f}, '
              f'consistency_fired={signals.consistency_check_fired}, '
              f'conf={signals.output_confidence}'
          )

          return EvasionClassification(
              likely_goal=goal,
              likely_tier=tier_refined,
              confidence=conf,
              canonical_technique=technique,
              recommended_primitive=primitive,
              rationale=rationale,
          )


      def print_classification(c: EvasionClassification) -> None:
          print(f'  Likely goal:      {c.likely_goal}')
          print(f'  Likely tier:      {c.likely_tier}')
          print(f'  Confidence:       {c.confidence}')
          print(f'  Technique:        {c.canonical_technique}')
          print(f'  Recommended:      {c.recommended_primitive}')
          print(f'  Rationale:        {c.rationale}')


      SCENARIOS: List[EvasionSignals] = [
          EvasionSignals(
              modality='image',
              query_pattern_fired=False,
              squeezer_disagreement=0.75,
              consistency_check_fired=True,
              output_confidence=0.85,
              output_class_suspicious=False,
          ),
          EvasionSignals(
              modality='image',
              query_pattern_fired=False,
              squeezer_disagreement=0.15,
              consistency_check_fired=False,
              output_confidence=0.92,
              output_class_suspicious=True,
          ),
          EvasionSignals(
              modality='image',
              query_pattern_fired=True,
              squeezer_disagreement=0.30,
              consistency_check_fired=True,
              output_confidence=None,
              output_class_suspicious=False,
          ),
          EvasionSignals(
              modality='text',
              query_pattern_fired=False,
              squeezer_disagreement=0.0,
              consistency_check_fired=True,
              output_confidence=0.60,
              output_class_suspicious=False,
          ),
          EvasionSignals(
              modality='image',
              query_pattern_fired=False,
              squeezer_disagreement=0.10,
              consistency_check_fired=False,
              output_confidence=0.30,
              output_class_suspicious=False,
          ),
      ]

      SCENARIO_NAMES = [
          'Large squeezer disagreement + consistency fired -> FGSM/PGD white-box',
          'Low squeezer + stable + suspicious class -> targeted C&W high-kappa',
          'Track 6 fired + moderate signals -> black-box campaign',
          'Text modality + consistency fired -> TextFooler/semantic substitution',
          'Low squeezer + stable + low confidence -> confidence reduction',
      ]


      if __name__ == '__main__':
          print('Defender Decision Tree: Evasion Attempt Classification')
          print('=' * 56)
          for name, signals in zip(SCENARIO_NAMES, SCENARIOS):
              print(f'\nScenario: {name}')
              result = classify_evasion(signals)
              print_classification(result)

common_mistakes:

  mistake_1:
    description: 'Using the taxonomy as a checklist rather than as a filter -- defending all cells rather than the cells relevant to the deployment'
    why_it_happens: |
      The full taxonomy matrix has 4 goals x 4 tiers x 4 modalities = 64 potential cells.
      Engineers see the complete matrix and conclude they must defend against all cells.
      Track 7 gets configured with maximum primitives regardless of which cells the
      actual deployment is exposed to.
    consequence: |
      Over-broad Track 7 configuration adds unnecessary latency (more squeezers, more consistency
      check variants) and raises false positive rate for non-applicable attack classes. A text-only
      deployment running image squeezers gets no security benefit and measurable latency cost.
    correct_approach: |
      Filter the taxonomy to the cells that apply: determine the deployment modality, the realistic
      adversary access tier (based on API configuration), and the attack goals that adversaries have
      operational motivation to pursue. Configure Track 7 for those cells only. The taxonomy is a
      filter, not a checklist.

  mistake_2:
    description: 'Treating confidence reduction (Goal 3) as undetectable because it does not change the argmax class'
    why_it_happens: |
      Evaluation metrics for adversarial robustness focus on accuracy (does the argmax class
      change?). Confidence reduction that does not change argmax does not appear in standard
      adversarial robustness benchmarks and gets treated as a non-event.
    consequence: |
      Systems that route low-confidence predictions to lower-scrutiny processing (human review
      queues, secondary classifiers) are bypassed by confidence reduction attacks without any
      alert. The adversary achieves a routing bypass without triggering any accuracy-based
      detection threshold.
    correct_approach: |
      Monitor output probability distributions, not just argmax accuracy. The output entropy
      monitor from Section 9.10 applies here: flag requests whose output probability distribution
      is unusually flat relative to baseline. This requires soft-label output exposure -- if the
      API returns hard labels only, acknowledge Goal 3 as a coverage gap.

  mistake_3:
    description: 'Configuring the adversarial detector classifier once and not retraining as new attack families emerge'
    why_it_happens: |
      The adversarial detector classifier is trained on a fixed dataset of adversarial and
      natural examples. Once deployed, retraining cycles are expensive and the model
      performs well against known attack families, reducing urgency for retraining.
    consequence: |
      Novel attack families not represented in training data are systematically underdetected.
      An adversary using a recently published attack method (or a custom variant) bypasses the
      adversarial classifier while being caught by the ensemble only to the extent that the
      squeezer and consistency checker cover that attack class independently.
    correct_approach: |
      Treat the adversarial detector classifier as a model requiring active maintenance: retrain
      quarterly with adversarial examples generated from recently published attack methods.
      The classifier is the highest-coverage primitive but the most brittle to distribution
      shift in the attack family space.

  mistake_4:
    description: 'Concluding from a high ensemble detection rate on CIFAR-10 benchmarks that production detection rates will match'
    why_it_happens: |
      CIFAR-10 is the standard benchmark for adversarial ML research. Engineers validate Track 7
      against CIFAR-10 adversarial examples, achieve 85-92% detection rates, and treat that as
      the production detection rate estimate.
    consequence: |
      Production inputs are not CIFAR-10 images. Different input distributions, higher-dimensional
      feature spaces, domain-specific perturbation constraints, and adversaries who adapt to the
      specific deployed model all reduce detection rates relative to the benchmark. The production
      false negative rate is typically higher than benchmark false negative rate.
    correct_approach: |
      Calibrate Track 7 detection thresholds against production-representative inputs, not
      benchmark inputs. Generate adversarial examples against the specific deployed model (or a
      recent distillation surrogate) using FGSM, PGD, and C&W. Use the Section 10.13 calibration
      harness. Treat benchmark numbers as upper bounds, not production estimates.

  mistake_5:
    description: 'Ignoring the budget-success transition region and calibrating detection thresholds at extreme epsilon values'
    why_it_happens: |
      Feature squeezer and consistency checker thresholds are easy to set at extreme epsilon:
      large-epsilon adversarial examples are obviously detectable. Calibration at extreme epsilon
      gives high detection rates with low false positives and produces a clean-looking ROC curve.
    consequence: |
      The thresholds are too high to catch attacks in the transition region (moderate epsilon,
      high attack success, moderate perturbation). Production attacks do not use extreme epsilon --
      they use the minimum epsilon for reliable attack success, which is in the transition region.
      The calibrated detector misses exactly the attacks most likely to appear in production.
    correct_approach: |
      Calibrate Track 7 thresholds specifically at the epsilon values where attack success
      exceeds 50% -- the transition region. Use the budget_success_tradeoff.py curves from this
      section to identify that region, then calibrate squeezer disagreement thresholds and
      consistency check instability thresholds against adversarial examples generated at those
      epsilon values.

section_summary:

  compact: |
    Section 10.2 formalises the Chapter 10 threat model into a three-axis taxonomy: four attack
    goals (untargeted, targeted, confidence reduction, detection evasion) by four access tiers
    (white-box, grey-box, black-box, physical/transfer) by four input modalities (image, text,
    tabular, audio). Each cell maps to a canonical technique covered in Sections 10.3-10.9 and
    to one or more Track 7 detection primitives. The detectability spectrum shows that no single
    primitive covers all cells: feature squeezing catches L-infinity attacks, consistency checking
    catches boundary-proximate attacks, and the adversarial classifier catches trained patterns
    but degrades on novel families. The three-primitive ensemble provides meaningful resistance
    against detection evasion (Goal 4). The defender decision tree converts observable signals
    into a taxonomy classification in under 60 seconds, enabling rapid incident triage and
    detection tuning priority decisions.

  key_takeaways:
    - 'Four goals, not two: confidence reduction and detection evasion extend the threat model beyond targeted/untargeted and require distinct detection primitives'
    - 'The budget-success transition region is where production attacks live: moderate epsilon, high success rate, moderate detectability'
    - 'No single Track 7 primitive covers the full taxonomy: the ensemble is required for meaningful coverage, especially against Goal 4 (detection evasion)'
    - 'Text modality breaks the image Lp framework: semantic consistency check replaces feature squeezing for text adversarial detection'
    - 'The adversarial detector classifier is the highest-coverage primitive but the most brittle to novel attack families -- active retraining is required'
    - 'The taxonomy is a filter for Track 7 configuration: defend the cells that apply to the deployment, not all 64 potential cells'

preview_section_10_03:
  title: 'Section 10.3: FGSM -- Fast Gradient Sign Method'
  summary: |
    Section 10.3 implements the foundational white-box adversarial attack: FGSM (Goodfellow et al.
    2014). The algorithm is x_adv = x + epsilon * sign(nabla_x J(theta, x, y)) -- one forward-
    backward pass, exact L-infinity perturbation. The section covers the epsilon sweep (attack
    success rate across perturbation budgets, grounding the Section 10.2 curves in implementation),
    targeted vs untargeted FGSM (gradient reversal for targeted misclassification), transferability
    of FGSM adversarial examples to surrogate-matched victim models, and FGSM as a data augmentation
    primitive for adversarial training (Section 10.15 preview). FGSM occupies the white-box /
    untargeted / image cell of the taxonomy matrix and sets the gradient-sign primitive that PGD
    and C&W extend iteratively.

