      - 'rule_metadata_validator.py -- validates that all detection rules meet metadata standards before merge'
    key_concepts:
      - 'Sigma as the lingua franca: rules written in Sigma are backend-agnostic and can be compiled to Splunk, Elastic, Datadog, or any SIEM'
      - 'Test cases are first-class artifacts: every detection rule ships with at least one positive test case (fires on attack) and one negative test case (does not fire on benign)'
      - 'Rollback capability: a detection rule that causes alert floods must be retractable in under five minutes without manual SIEM intervention'
    atlas_anchors: 'Process-level: applies to all ATLAS technique detections'
    connection_to_next: 'The CI/CD pipeline deploys the layered detection architecture described in Section 11.03'

  section_11_03:
    title: 'Layered Detection Architecture: Signature, Heuristic, ML, and Behavioral'
    filename: 'section_11_03_layered_detection.yaml'
    estimated_pages: 7
    topics:
      - 'Layer 1 -- Signature detection: exact pattern matching (regex, keyword, byte sequence); fast, low FP, brittle against obfuscation'
      - 'Layer 2 -- Heuristic detection: rule-based scoring on features (length, entropy, character class ratios); moderate FP, catches obfuscated variants'
      - 'Layer 3 -- ML-based detection: trained classifiers on labeled examples (Chapters 12 preview); adaptable, higher FP, requires labelled data'
      - 'Layer 4 -- Behavioral detection: stateful session analysis across multiple events (Chapter 13 preview); catches campaign-level patterns invisible to per-request layers'
      - 'Mapping the seven-track gateway to the four layers: Tracks 1-5 span layers 1-3; Track 6 is layer 4; Track 7 has elements of layers 2-3'
      - 'Layer failure modes and complementarity: why each layer alone is insufficient and the ensemble is the production posture'
    deliverables:
      - 'layered_detection_architecture.py -- four-layer model with the seven-track gateway mapped; per-layer coverage analysis'
      - 'layer_failure_mode_analyser.py -- for each layer, generate examples that evade it but are caught by another layer'
    key_concepts:
      - 'Defence in depth for detection: an adversary who evades Layer 1 (signature) must also evade Layer 2 (heuristic) and Layer 3 (ML) to go undetected'
      - 'Layer ordering matters: signatures are cheapest (apply first); ML inference is expensive (apply last, only when signature and heuristic pass)'
      - 'The coverage-cost tradeoff: higher layers have higher detection coverage and higher compute cost; balance by sub-sampling or gating higher layers on lower-layer signal'
    atlas_anchors: 'Architectural framework spanning all ATLAS techniques'
    connection_to_next: 'Section 11.04 maps ATLAS techniques to specific detection opportunities within this layered model'

