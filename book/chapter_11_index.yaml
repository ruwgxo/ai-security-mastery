    key_concepts:
      - 'ATLAS extends, not replaces, ATT&CK: AI attacks traverse traditional ATT&CK tactics (initial access, execution, exfiltration) using AI-specific sub-techniques'
      - 'The technique-to-detection-to-Sigma chain: ATLAS technique → detection opportunity → Sigma rule → SIEM alert; Chapter 11 completes this chain for all Part 2 attacks'
      - 'Coverage gaps are measurable: ATT&CK Navigator heat maps show which techniques have no detection rule and prioritise detection development'
    atlas_anchors: 'Full ATLAS framework: AML.T0000-series comprehensive review'
    connection_to_next: 'Section 11.05 builds the practical coverage heat map from the technique inventory'

  section_11_05:
    title: 'ATT&CK Coverage Heat Maps: Measuring and Closing Detection Gaps'
    filename: 'section_11_05_coverage_heatmap.yaml'
    estimated_pages: 5
    topics:
      - 'Coverage scoring: for each ATLAS technique, assign a coverage score (0=no detection, 1=partial, 2=full) based on deployed Sigma rules'
      - 'Heat map construction: from technique inventory to visual coverage map; red (no coverage) through green (full coverage)'
      - 'Gap analysis: identifying the highest-priority uncovered techniques based on threat model likelihood and business impact'
      - 'Coverage improvement roadmap: ordered backlog of detection rules to close priority gaps'
      - 'Coverage drift: how heat maps degrade over time as new attack techniques emerge; quarterly review cadence'
      - 'The seven-track gateway heat map: current coverage, known gaps, and the Chapter 12-13 additions that close them'
    deliverables:
      - 'attck_coverage_heatmap.py -- programmatic heat map generation with current seven-track gateway coverage and gap scoring'
      - 'detection_gap_prioritiser.py -- ranks uncovered ATLAS techniques by likelihood x impact for detection development backlog'
    key_concepts:
      - 'Coverage is not binary: a Sigma rule that fires on 60% of attack variants is partial coverage, not full coverage'
      - 'The heat map is a communication tool: it translates detection engineering work into a format intelligible to security leadership'
      - 'Priority ordering: close high-likelihood, high-impact gaps first; theoretical but low-probability techniques last'
    atlas_anchors: 'All ATLAS techniques; gap analysis drives Chapters 12-13 priorities'
    connection_to_next: 'Section 11.06 introduces Sigma as the rule format for closing the gaps identified in this section'

  section_11_06:
    title: 'Sigma Rules for AI Security: Format, Syntax, and AI-Specific Fields'
    filename: 'section_11_06_sigma_fundamentals.yaml'
    estimated_pages: 6
    topics:
      - 'Sigma format deep dive: title, id, status, description, logsource, detection, falsepositives, level, tags fields'
