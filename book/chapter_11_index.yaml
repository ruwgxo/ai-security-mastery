chapter_summary:
  arc: 'Detection-as-code principles → layered architecture → ATT&CK/ATLAS coverage → Sigma rules → maturity model → FP management → engineering workflow → OWASP coverage audit → threat hunting → production patterns'
  key_takeaways:
    - 'Detection-as-code: rules are software; every rule has tests, version history, and a deployment pipeline'
    - 'Four layers: signature (fast, brittle) → heuristic (robust to obfuscation) → ML (adaptable, expensive) → behavioral (campaign-level); each is necessary, none alone is sufficient'
    - 'Coverage is measurable: ATT&CK heat maps quantify what is detected and what is not; gap analysis drives the detection backlog'
    - 'Sigma is the lingua franca: write once, deploy everywhere; AI-specific fields require schema agreement with gateway engineers'
    - 'L3 is the production minimum: version control, automated testing, ATT&CK heat map, FPR tracking per rule; below L3 is technical debt'
    - 'False positive management is as important as detection coverage: a rule with 50% FPR is not a detection rule -- it is noise generation'
    - 'Hunting converts novel findings into rules: the feedback loop from hunt to Sigma rule is how the detection programme grows beyond known techniques'

preview_chapter_12:
  title: 'Chapter 12: ML-Based Detection Systems'
  summary: |
    Chapter 12 populates Layer 3 of the framework built in Chapter 11. It trains the
    ML-based classifiers that signature and heuristic rules cannot cover: anomaly detection
    for novel injection patterns (Isolation Forest, One-Class SVM), prompt classification
    at 95%+ accuracy (RandomForest, XGBoost, fine-tuned transformers), sequence modelling
    for multi-turn attack patterns (LSTM, GRU), and embedding-based semantic similarity
    detection. Feature engineering for security-specific signals (token entropy, instruction
    density, similarity to known-bad embeddings) is a primary focus. Chapter 12 delivers
    four production-grade ML detectors trained on 1000+ labelled prompts and integrated
    into the detection-as-code pipeline from Chapter 11.

