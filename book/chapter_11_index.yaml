    filename: 'section_11_02_detection_as_code.yaml'
    estimated_pages: 6
    topics:
      - 'The five DaC principles: rules are code, rules are tested, rules are versioned, rules are deployed via pipeline, rules are monitored'
      - 'Git workflow for detection rules: branching strategy, PR review, rule retirement'
      - 'Testing detection rules: unit tests (rule fires on test case), integration tests (rule fires in SIEM), regression tests (rule does not fire on safe cases)'
      - 'CI/CD pipeline: Sigma lint → test harness → SIEM deployment → rollback capability'
      - 'Rule metadata standards: severity, confidence, MITRE technique, false positive notes, author, creation date'
    deliverables:
