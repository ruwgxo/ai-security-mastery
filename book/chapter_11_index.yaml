      - 'MITRE ATT&CK for Enterprise: 14 tactics, techniques, sub-techniques; how it applies to AI systems as targets and as attack vectors'
      - 'MITRE ATLAS: adversarial ML-specific tactics and techniques; how it extends ATT&CK for ML model attacks'
      - 'Key ATLAS tactics: ML attack staging, model access, data collection, model inversion, ML supply chain compromise, exfiltration via ML inference'
