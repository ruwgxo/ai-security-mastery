  section_11_07:
    title: 'Sigma Rules: Advanced Patterns, Correlation, and Campaign Detection'
    filename: 'section_11_07_sigma_advanced.yaml'
    estimated_pages: 6
    topics:
      - 'Aggregation conditions: count, min, max, avg, sum over time windows; detecting rate-based abuse patterns'
      - 'Correlation rules: joining multiple Sigma rules into a campaign-level detection (e.g., Track 6 query monitor + Track 1 injection = extraction campaign)'
      - 'Near and sequence rules: ordered event sequences within a session window (probe → inject → exfiltrate pattern)'
      - 'Allowlist and exception management within Sigma: reducing FPR via known-good exceptions in the rule'
      - 'Sigma rule lifecycle: draft → review → testing → production → deprecated; automated rule retirement'
      - 'The seven-track Sigma portfolio: cross-referencing all Chapter 6-10 Sigma rules in a unified rule set'
    deliverables:
      - 'sigma_correlation_engine.py -- multi-event correlation: joins seven-track gateway alerts into campaign-level detections'
      - 'sigma_rule_lifecycle_manager.py -- tracks rule status (draft/testing/production/deprecated) and enforces review cadence'
    key_concepts:
      - 'Correlation is where single-event rules converge into campaign detection: a Track 1 injection followed by Track 6 query acceleration within 10 minutes is a confirmed extraction attempt'
      - 'Time windows matter: rate-based rules need a window short enough to catch fast attacks and long enough to accumulate evidence from slow attacks'
      - 'Exception management is a first-class concern: a Sigma rule without exception handling will generate false positives from known-good automation'
    atlas_anchors: 'AML.T0037 + AML.T0043 correlation (extraction campaign); AML.T0051 + AML.T0054 correlation (injection → jailbreak chain)'
    connection_to_next: 'Section 11.08 measures the detection programme''s maturity, using the Sigma portfolio as the primary evidence'

  section_11_08:
    title: 'Detection Maturity Model: L1 Through L5'
    filename: 'section_11_08_detection_maturity.yaml'
    estimated_pages: 6
    topics:
      - 'L1 (Ad-hoc): no formal detection programme; reactive Sigma rules created after incidents; no testing; no coverage measurement'
      - 'L2 (Defined): documented detection rules in version control; basic CI/CD; manual coverage mapping; quarterly review'
      - 'L3 (Managed): automated testing pipeline; ATT&CK heat map maintained; FPR tracked per rule; alert SLAs defined'
      - 'L4 (Measured): ML-based detection alongside signature rules; coverage targets per ATT&CK tactic; proactive threat hunting; quarterly maturity reviews'
      - 'L5 (Optimised): continuous coverage improvement; automated gap detection; real-time FPR dashboards; red team exercises driving detection backlog'
      - 'Assessing current maturity: scoring criteria per dimension (rule quality, coverage, FPR management, pipeline, hunting)'
      - 'Roadmap from L1 to L3 in 90 days: the minimum viable detection programme for an AI-facing organisation'
    deliverables:
      - 'detection_maturity_assessor.py -- L1-L5 scoring across five dimensions (rule quality, ATT&CK coverage, FPR, pipeline, hunting) for the seven-track gateway'
      - 'maturity_improvement_roadmap.py -- generates 90-day improvement plan from current score to target maturity level'
    key_concepts:
      - 'Maturity is a programme property, not a rule property: a single high-quality Sigma rule does not make an L4 programme'
      - 'The minimum bar for production AI systems is L3: managed detection with automated testing, coverage measurement, and FPR tracking'
      - 'L5 is continuous improvement, not a destination: the detection programme is never complete; new attack techniques always create new gaps'
    atlas_anchors: 'Maturity framework applies across all ATLAS techniques'
    connection_to_next: 'Section 11.09 addresses the operational challenge that most prevents maturity progression: false positive management'

  section_11_09:
    title: 'False Positive Management: Threshold Calibration and Alert Fatigue Prevention'
    filename: 'section_11_09_false_positive_management.yaml'
    estimated_pages: 6
    topics:
      - 'Sources of false positives in AI detection: near-boundary natural inputs (Track 7), legitimate automation (Track 6), benign obfuscated prompts (Track 1-5)'
      - 'The alert fatigue death spiral: high FPR → analysts ignore alerts → missed true positives → security incidents → pressure to lower sensitivity → higher FPR'
      - 'Threshold calibration: ROC curve analysis, operating point selection, per-rule FPR targets (Track 7: 5%, Track 1: 1%, Track 6: 0.5%)'
      - 'Exception management: known-good IP ranges, automation accounts, regression test traffic -- excluding from detection without disabling rules'
      - 'Baselining: per-user, per-endpoint, per-hour baseline models; flagging deviation rather than absolute value'
      - 'FPR dashboard: tracking FPR per rule over time; automated alert when a rule''s FPR drifts above target'
      - 'The false positive review queue: SLA for analyst review, feedback loop to rule improvement, dataset contribution'
    deliverables:
      - 'false_positive_manager.py -- tracks FPR per Sigma rule over time; alerts when threshold exceeded; manages exception list'
      - 'threshold_calibration_harness.py -- ROC curve generation and operating point selection for each Track 7 primitive (extends Section 10.13 calibration)'
    key_concepts:
      - 'FPR is a first-class metric: every detection rule has a documented FPR target and an owner responsible for maintaining it'
      - 'Exceptions are not defeats: a well-managed exception list reduces FPR without reducing coverage; unmanaged exceptions grow into blind spots'
      - 'Baselining shifts the detection question from "is this value high?" to "is this value anomalous for this entity?" -- reducing FPR for high-volume legitimate users'
    atlas_anchors: 'Operational: applies across all ATLAS technique detections'
    connection_to_next: 'Section 11.10 integrates FPR targets into the formal detection engineering workflow'

  section_11_10:
    title: 'Detection Engineering Workflow: Hypothesis to Production'
    filename: 'section_11_10_detection_workflow.yaml'
    estimated_pages: 6
    topics:
      - 'Phase 1 -- Hypothesis: threat intelligence input, ATT&CK gap identification, analyst intuition; forming a testable detection hypothesis'
      - 'Phase 2 -- Design: log source identification, feature selection, rule logic, FPR target, test cases'
      - 'Phase 3 -- Build: Sigma rule authoring, positive and negative test cases, metadata completion'
      - 'Phase 4 -- Test: unit tests in CI, integration test in staging SIEM, FPR measurement on production traffic sample'
      - 'Phase 5 -- Deploy: PR review, pipeline merge, SIEM deployment, alert routing configuration'
      - 'Phase 6 -- Monitor: FPR tracking, TP/FP tagging by analysts, drift detection, quarterly rule review'
      - 'Phase 7 -- Improve: rule refinement based on FP/FN feedback, exception updates, retirement of obsolete rules'
      - 'Time-to-detect (TTD) metric: from threat discovery to deployed detection rule; target <7 days for known techniques'
    deliverables:
      - 'detection_engineering_workflow.py -- full seven-phase pipeline with documentation templates for each phase; integrates with CI/CD from Section 11.02'
      - 'detection_hypothesis_generator.py -- takes ATLAS technique or OWASP LLM vulnerability as input; generates structured detection hypothesis document'
    key_concepts:
      - 'Hypotheses must be falsifiable: a hypothesis is not "detect bad prompts" but "detect prompts containing role-switch instructions (DAN patterns) in user turns where the system prompt does not authorise role changes"'
      - 'Test cases are the contract: the detection rule is correct if and only if it passes its test cases; adding test cases is the primary mechanism for improving coverage'
      - 'Time-to-detect is a security metric: the longer TTD, the longer the window during which adversaries operate undetected; target <7 days for catalogued techniques, <24 hours for zero-days'
    atlas_anchors: 'Workflow applies to all ATLAS technique-to-detection conversions'
    connection_to_next: 'Section 11.11 applies this workflow to all OWASP LLM Top 10 vulnerabilities, generating coverage matrix'

  section_11_11:
    title: 'OWASP LLM Top 10 Detection Coverage Matrix'
    filename: 'section_11_11_owasp_coverage_matrix.yaml'
    estimated_pages: 6
    topics:
      - 'LLM01 Prompt Injection: Tracks 1-5 coverage (Chapters 6-7); detection by injection classifier, role-switch detector, indirect injection scanner; coverage score and gaps'
      - 'LLM02 Insecure Output Handling: output validation layer (post-inference); current coverage gap -- no dedicated output validation track in the seven-track gateway'
      - 'LLM03 Training Data Poisoning: Chapter 8 controls (dataset audit, backdoor detection); runtime detection gap -- poisoning is a training-time attack'
      - 'LLM04 Model Denial of Service: rate limiting (Track 6); token budget monitoring; coverage partial'
      - 'LLM05 Supply Chain Vulnerabilities: model provenance checks; no dedicated track; coverage gap'
      - 'LLM06 Sensitive Information Disclosure: output PII scanner; Chapter 15 preview; current coverage gap'
      - 'LLM07 Insecure Plugin Design: tool output injection (Track 5); indirect injection via plugin output; partial coverage'
      - 'LLM08 Excessive Agency: scope and permission monitoring; no dedicated track; coverage gap'
      - 'LLM09 Overreliance: user trust miscalibration; out of technical detection scope'
      - 'LLM10 Model Theft: Track 6 query pattern monitor; extraction campaign detection; coverage good'
      - 'Gap closure roadmap: which Chapters 12-15 deliverables address each OWASP gap'
    deliverables:
      - 'owasp_llm_coverage_matrix.py -- programmatic matrix of all 10 OWASP LLM vulnerabilities with coverage score (0-2) and gap description for the current gateway'
      - 'owasp_gap_closure_roadmap.py -- maps each coverage gap to the Chapter 12-15 deliverable that closes it'
    key_concepts:
      - 'OWASP LLM Top 10 is a vulnerability catalogue, not a detection specification: each vulnerability requires a bespoke detection approach'
      - 'Training-time vulnerabilities (LLM03, LLM05) are not detectable at runtime: their detection requires build-time controls and supply chain verification'
      - 'Output-side coverage (LLM02, LLM06) is the most common gap in gateway-first architectures: input-side detection is insufficient without output monitoring'
    atlas_anchors: 'OWASP LLM01=AML.T0051, LLM03=AML.T0020, LLM10=AML.T0037'
    connection_to_next: 'Section 11.12 extends beyond reactive rule-based detection to proactive threat hunting'

  section_11_12:
    title: 'Threat Hunting for AI Systems: Proactive Detection'
    filename: 'section_11_12_threat_hunting.yaml'
    estimated_pages: 6
    topics:
      - 'Reactive vs proactive detection: rules catch known-pattern attacks; hunting finds novel attacks that rules miss'
      - 'The hunting cycle: hypothesis formation → data collection → analysis → detection → rule creation → improved coverage'
      - 'Hunting hypotheses for AI systems: "Are any users querying the model with prompts that share structural patterns with known injection templates even if they don''t match existing rules?"'
      - 'Data sources for AI threat hunting: API gateway logs, model serving metrics, LLM output logs, user session data, embedding similarity search'
      - 'Hunting techniques: clustering prompt embeddings to find unusual clusters; entropy analysis of prompt token distributions; outlier detection on query rate per user-hour'
      - 'Converting hunt findings to detection rules: when a hunt reveals a pattern, the workflow from Section 11.10 converts it to a Sigma rule'
      - 'Hunting cadence: weekly for active threat campaigns; monthly for general hunting; quarterly for deep technique hunting'
    deliverables:
      - 'threat_hunting_playbook.py -- five AI-specific hunting hypotheses with data source, analysis method, and pivot chain for each'
      - 'prompt_cluster_analyser.py -- embedding-based prompt clustering to identify anomalous prompt groups without labelled data'
    key_concepts:
      - 'Hunting is not fishing: every hunt starts with a specific falsifiable hypothesis, not a vague "look for bad things"'
      - 'Hunt findings improve the detection programme: a successful hunt that finds no detection converts to a new Sigma rule; a failed hunt that finds nothing still validates existing coverage'
      - 'Embedding-space hunting is unique to AI systems: the ability to compute semantic similarity across thousands of prompts gives AI defenders an advantage that traditional log analysis lacks'
    atlas_anchors: 'Proactive coverage: finds novel ATLAS techniques before they have a named identifier'
    connection_to_next: 'Section 11.13 grounds all framework elements in concrete production architecture patterns'

  section_11_13:
    title: 'Production Detection Architecture Patterns'
    filename: 'section_11_13_production_architecture.yaml'
    estimated_pages: 6
    topics:
      - 'Pattern 1 -- API Gateway (inline): detection logic sits in the request/response path; enables blocking; adds latency; the seven-track gateway is this pattern'
      - 'Pattern 2 -- Sidecar: detection logic runs alongside the model serving container; asynchronous; no latency impact; cannot block (flag only)'
      - 'Pattern 3 -- Log-based (SIEM): detection logic runs in the SIEM against collected logs; fully async; no latency impact; no blocking; high alert latency'
      - 'Hybrid architecture: gateway (block high-confidence) + sidecar (flag moderate-confidence) + SIEM (detect campaigns over longer windows)'
      - 'Integration points: pre-inference hooks, post-inference hooks, output validation layer, session log streaming'
      - 'Failure mode design: fail-open vs fail-closed per detection layer; circuit breakers; graceful degradation'
      - 'Observability: what to instrument in a production detection system; metrics, traces, and structured logs for the detection system itself'
      - 'Chapter 14 preview: production deployment deep-dive (latency, throughput, scaling, cost)'
    deliverables:
      - 'production_architecture_patterns.py -- gateway vs sidecar vs SIEM pattern comparison with latency, blocking capability, and deployment complexity'
      - 'hybrid_architecture_designer.py -- given a set of detection requirements (latency budget, blocking needed, SIEM available), recommends the hybrid architecture'
    key_concepts:
      - 'The gateway pattern is the only blocking pattern: if the security requirement is "block adversarial inputs before they reach the model", the detection logic must be inline'
      - 'Async detection complements inline detection: sidecar and SIEM detect what the gateway misses (low-confidence signals, multi-session campaigns) without adding latency'
      - 'Observability of the detection system is as important as observability of the model: a detection system that silently fails is worse than no detection system'
    atlas_anchors: 'Architecture-level: positions detection against all ATLAS tactics'
    connection_to_next: 'Section 11.14 synthesises the chapter and maps each element to the Chapter 12-14 implementations'

  section_11_14:
    title: 'Chapter Summary: Detection Framework Complete'
    filename: 'section_11_14_chapter_summary.yaml'
    estimated_pages: 5
    topics:
      - 'Chapter 11 arc: from ad-hoc detection (post-Part 2 state) to a formal detection-as-code programme with maturity, coverage measurement, FPR management, and hunting'
      - 'The detection framework stack: DaC pipeline + layered architecture + ATT&CK coverage + Sigma rules + maturity model + FP management + engineering workflow + threat hunting + production architecture'
      - 'What the chapter leaves unimplemented: the ML-based detectors (Chapter 12), behavioral analysis system (Chapter 13), and production deployment infrastructure (Chapter 14)'
      - 'The Part 3 roadmap: Chapter 12 fills the ML layer; Chapter 13 fills the behavioral layer; Chapter 14 makes it production-ready'
      - 'Practitioner checklist: six questions to ask before declaring a detection framework operational'
    deliverables:
      - 'detection_framework_audit.py -- end-to-end framework health check across all nine dimensions introduced in Chapter 11'
      - 'chapter_11_concept_map.py -- full concept map connecting all 14 sections and their deliverables'
    key_concepts:
      - 'The framework precedes the implementation: Chapter 11 teaches methodology; Chapters 12-14 build the specific detectors that populate the framework'
      - 'The seven-track gateway is now properly framed: it is an instance of layered detection at L3 maturity with coverage gaps identified and roadmapped'
      - 'Detection is never complete: the framework provides the mechanism for continuous improvement, not a finish line'
    atlas_anchors: 'All ATLAS techniques; audit confirms coverage'
