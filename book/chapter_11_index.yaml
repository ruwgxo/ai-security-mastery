chapter_overview:
  one_line_summary: 'Part 3 opens by formalising the detection engineering discipline: detection-as-code principles, layered detection architecture, MITRE ATT&CK and Sigma for AI, maturity modelling, and the engineering workflow that converts threat knowledge into production detection rules.'
  why_this_chapter_exists: |
    Part 2 (Chapters 6-10) built attacker knowledge: prompt injection, jailbreaks, data
    poisoning, model extraction, and adversarial examples. Each chapter also produced
    detection tracks (Tracks 1-7 of the gateway). Chapter 11 steps back from individual
    tracks and establishes the formal detection engineering framework that governs all of
    them: how detection rules are authored, tested, versioned, and deployed; how coverage
    is measured against MITRE ATT&CK and OWASP LLM Top 10; how false positives are managed;
    and how the detection organisation matures from ad-hoc Sigma rules to a production-grade
    detection-as-code pipeline. The seven-track gateway built in Part 2 is an instance of
    layered detection; Chapter 11 teaches the general principles behind it.
  position_in_book: |
    Chapter 11 opens Part 3 (Detection Engineering for AI, Chapters 11-14). It is the
    methodology chapter: Chapters 12 (ML-Based Detection), 13 (Behavioral Analysis), and
    14 (Production Deployment) build the specific detectors and infrastructure that this
    chapter''s framework governs. Practitioners who read only Chapter 11 get the conceptual
    architecture; practitioners who work through Chapters 11-14 build and deploy it.
  connection_to_part_2: |
    The seven-track gateway assembled in Chapters 6-10 is the running example throughout
    Chapter 11. Section 11.03 maps Tracks 1-7 to the layered detection model. Section 11.05
    shows how the gateway''s coverage is visualised on an ATT&CK heat map. Section 11.11
    maps OWASP LLM Top 10 to the gateway''s tracks. Section 11.13 reviews the gateway
    architecture through the lens of production patterns.

