      - 'Writing first AI Sigma rules: prompt injection (keyword matching), rate-based abuse (threshold), adversarial detection (squeezer score field)'
      - 'Sigma tags for AI: attack.ml_attack_staging, atlas.aml.tXXXX, owasp.llm.01 through owasp.llm.10'
      - 'Testing Sigma rules: sigma-cli convert, unit test tooling, false positive verification'
    deliverables:
      - 'sigma_rule_builder.py -- programmatic Sigma rule construction with AI-specific field templates; generates valid YAML rules'
      - 'ai_log_field_taxonomy.py -- complete AI gateway log field reference with Sigma field names and example values'
    key_concepts:
      - 'Sigma is backend-agnostic: the same rule compiles to Splunk SPL, KQL, Elastic DSL, Datadog Logs Query; write once, deploy everywhere'
      - 'AI-specific fields require schema agreement: the detection engineer and the gateway engineer must agree on field names before rules can be written'
