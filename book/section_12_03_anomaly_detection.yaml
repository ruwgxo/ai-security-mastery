    - 'Explain the One-Class SVM algorithm: how the RBF kernel maps the normal training distribution to a high-dimensional space and what the nu parameter controls'
    - 'State when to prefer Isolation Forest over One-Class SVM and vice versa in terms of dataset size, feature dimensionality, and inference latency requirements'
    - 'Describe the anomaly-to-label pipeline: how an anomaly alert becomes a confirmed labelled example in the supervised classifier training set'
    - 'Articulate the three limitations of anomaly detection that make supervised classification necessary as labelled data accumulates'

  skills:
    - 'Train an Isolation Forest on benign API traffic features and produce per-request anomaly scores with the Section 12.02 feature pipeline'
    - 'Calibrate the contamination fraction against held-out labelled attack examples to set the operating threshold at a target false positive rate'
    - 'Train a One-Class SVM with RBF kernel and compare its decision boundary to Isolation Forest on the same feature set'
    - 'Implement the anomaly alert labelling workflow: score threshold routing, analyst review queue, label storage, and supervised training queue integration'
    - 'Benchmark anomaly detection against a supervised classifier on false positive rate and true positive rate at matched precision'

  security_mindset:
    - 'Treat anomaly detection as a data collection tool as much as a detection tool: its primary operational value in months 1-2 is generating the labelled positives that enable every other Chapter 12 classifier'
    - 'Resist retiring the anomaly detector once supervised classifiers are running: it catches novel attack variants that the supervised classifier has never seen and produces continuous new labelled examples'
    - 'Understand that the contamination parameter is a prior belief about the attack rate in production traffic, not a fixed hyperparameter -- recalibrate it whenever the attack distribution shifts'
    - 'Accept the higher false positive rate of anomaly detection as an operational cost that is justified by the day-one detection capability it provides without any labelled data'

