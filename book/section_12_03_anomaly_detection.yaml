prose_content:

  part_1:
    title: 'The Cold-Start Problem and Why Anomaly Detection Solves It'
    body: |
      The supervised classifiers in Sections 12.05 and 12.08 are more precise than anomaly
      detectors, produce explainable per-feature alerts, and achieve 90-95% accuracy on known
      attack families. They also require labelled training data that does not exist on day one
      of any new LLM deployment.

      This is the cold-start problem: the best detectors require data they cannot have until
      the system has been running long enough to observe and label attacks. Waiting for labelled
      data before deploying any ML detection leaves the gateway with only Sigma rules and no
      generalisation capability for the duration of data collection -- typically four to eight
      weeks for a new production LLM integration.

      Anomaly detection bypasses this requirement entirely. Isolation Forest and One-Class SVM
      train exclusively on normal (benign) traffic. They learn the statistical distribution of
      legitimate API requests and flag requests that deviate significantly from that distribution.
      No attack examples are required at training time. The models can be trained on the first
      day of production traffic and deployed the same day.

      The trade-off is well-understood and acceptable for this use case. Anomaly detectors
      produce higher false positive rates than supervised classifiers because they have no
      notion of what an attack looks like -- only what normal traffic looks like. They cannot
      distinguish between attack families, cannot explain which specific features drove an alert,
      and cannot be tuned to specific attack classes. These are real limitations. They are also
      irrelevant for months 1-2 of a deployment where the alternative is no ML detection at all.

      The critical insight from Section 12.01 is that anomaly detection is a data collection
      tool as much as a detection tool. Every alert the anomaly detector produces is a candidate
      for analyst review. Every analyst-confirmed true positive is a labelled attack example.
      Every labelled example joins the training set for the supervised classifier. The anomaly
      detector generates the data that allows it to be superseded by a better detector -- and
      then continues running in the ensemble, catching novel variants the supervised classifier
      has never seen.

  part_2:
    title: 'Isolation Forest: Algorithm and Security Application'
    body: |
      Isolation Forest (Liu et al., 2008) is an ensemble anomaly detection algorithm that
      exploits a property unique to anomalous points: they are isolated by fewer random
      partitions than normal points.

      The algorithm builds an ensemble of isolation trees. Each tree recursively partitions
      the feature space by randomly selecting a feature and a random split value within that
      feature's range. Normal points, which cluster together in dense regions of the feature
      space, require many recursive partitions to isolate -- a long path from the root to the
      leaf containing only that point. Anomalous points, which exist in sparse regions far from
      the normal cluster, are isolated in a short path: a few random splits suffice to separate
      them from all other points.

      The anomaly score for a point is computed from its average path length across all trees
      in the ensemble, normalised by the expected path length for a random point. A normalised
      score close to 1.0 indicates a very short isolation path -- a strong anomaly signal.
      A score close to 0.5 indicates a path length near the expected value -- likely normal.
      A score below 0.5 is definitively normal.

      For the security feature vector from Section 12.02, Isolation Forest operates effectively
      because the features describing normal API traffic cluster in a compact region: sequence
      lengths cluster around the typical conversation turn length, special character density
      clusters near the baseline for natural language, contextual features cluster near the
      values of legitimate first-turn requests. Injection and jailbreak payloads -- longer,
      higher special character density, elevated instruction keyword frequency, role boundary
      markers present -- exist in sparse regions of this space and are isolated quickly.

      The contamination parameter is the most operationally significant hyperparameter. It sets
      the expected fraction of anomalies in the training dataset, which determines the decision
      threshold applied to anomaly scores. Setting contamination too high raises the false
      positive rate. Setting it too low misses real anomalies. The correct value is the true
      attack rate in production traffic during the training window -- typically between 0.01
      and 0.05 for a modestly protected LLM API. In production, contamination is calibrated
      against held-out labelled attack examples rather than set by assumption.

  part_3:
    title: 'One-Class SVM: Algorithm and When to Prefer It'
    body: |
      One-Class SVM (Scholkopf et al., 2001) constructs a maximum-margin boundary around the
      normal training data in a high-dimensional kernel-mapped feature space and classifies
      new points as normal (inside the boundary) or anomalous (outside it).

      The RBF kernel maps each training point to an infinite-dimensional feature space where
      the inner product between two points decreases exponentially with their Euclidean distance.
      The One-Class SVM finds the smallest hypersphere containing most of the normal cluster
      with a margin controlled by the nu parameter. Nu is the upper bound on the fraction of
      training points that fall outside the boundary (training errors) and simultaneously the
      lower bound on the fraction of support vectors.

      The practical difference between Isolation Forest and One-Class SVM for the security use
      case comes down to three factors. Dataset size: One-Class SVM scales quadratically with
      training points in the kernel computation; above 10,000 points it becomes slow. Isolation
      Forest scales linearly and trains in seconds on any practical dataset size. Feature
      distribution: One-Class SVM with RBF kernel performs better when the normal traffic
      distribution has a non-linear boundary, which occurs in LLM deployments serving diverse
      use cases with multimodal feature distributions. Inference latency: One-Class SVM requires
      computing the RBF kernel against all support vectors, adding 2-5ms per request. Isolation
      Forest inference is sub-millisecond. For the standard 20-feature security vector on
      unimodal API traffic, Isolation Forest is the correct default.

  part_4:
    title: 'Threshold Calibration: Setting the Operating Point'
    body: |
      Both detectors produce anomaly scores that must be converted to binary alert decisions
      by a threshold. The default threshold is a starting point but is not calibrated to the
      actual production attack rate or the acceptable false positive rate.

      The calibration procedure requires a small set of confirmed attack examples -- available
      from red team exercises (20-50 examples before any production traffic) and public jailbreak
      repositories. The procedure sweeps threshold values, computes the true positive rate
      (fraction of attack examples correctly flagged) and false positive rate (fraction of benign
      examples incorrectly flagged) at each value, and selects the operating point from the
      resulting precision-recall curve.

      For a deployment with analyst review capacity of 50 alerts per day and production traffic
      of 10,000 requests per day, a 0.5% false positive rate is the capacity limit (50 FP alerts).
      The contamination value producing 0.5% FPR at maximum recall is the correct calibration
      target. After calibration the threshold is stored as a fixed scalar and re-calibrated
      whenever the feature distribution shift monitor fires.

  part_5:
    title: 'The Anomaly-to-Label Pipeline'
    body: |
      The operational loop connecting anomaly detection to supervised classification has four
      stages. In the scoring stage, the Isolation Forest assigns an anomaly score to every
      production request; requests above the calibrated threshold route to the annotation queue.
      In the triage stage, an analyst reviews each queued request, seeing the request text,
      anomaly score, and top unusual features (features most deviated from their training-
      distribution values), and classifies it as true positive, false positive, or uncertain.
      In the labelling stage, confirmed true positives are stored in the labelled dataset with
      their attack class label. In the queue trigger stage, once 200+ confirmed positives and
      200+ confirmed negatives have accumulated, the dataset builder (Section 12.04) constructs
      the first supervised training set.

      This pipeline is the Chapter 12 flywheel. Anomaly alerts produce labelled data; labelled
      data trains supervised classifiers; supervised classifiers reduce alert volume; the anomaly
      detector focuses remaining alerts on novel variants; those alerts produce the next training
      batch. Each rotation improves the overall detection system.

  part_6:
    title: 'Limitations and the Permanent Role in the Ensemble'
    body: |
      Anomaly detection has three fundamental limitations. First, a high false positive rate
      relative to supervised classifiers -- 2-5x higher at matched recall -- because the detector
      has no concept of attack features, only normal traffic features. Second, the inability to
      distinguish attack families: an anomaly score is a single scalar with no attack class
      attribution, limiting analyst routing and response specificity. Third, no per-feature
      explainability: the path-length mechanism does not produce a SHAP-style signed per-feature
      contribution; the top-unusual-features heuristic in the alert labeller is an approximation.

      These limitations define the detector's role in the Section 12.15 ensemble. It runs
      permanently as the zero-label baseline layer, not as the primary detection layer. It catches
      novel attack variants before supervised classifiers are trained on them. It provides first-
      hour detection on any new endpoint or integration. Its limitations are compensated by the
      supervised and neural classifiers running alongside it. The correct posture is not to
      retire it when supervised classifiers are deployed, but to recognise that the ensemble
      needs both layers for full coverage.

