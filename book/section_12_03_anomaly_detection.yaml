section_overview:
  one_line_summary: 'Isolation Forest and One-Class SVM require no labelled attack data -- deploy them on day one, collect confirmed alerts as labelled positives, and use those positives to train the supervised classifiers that follow.'
  why_this_section_exists: |
    Every LLM integration starts with zero labelled attack examples. There are no confirmed
    injections, no documented jailbreaks, no annotated abuse cases from production traffic.
    Without labelled data, supervised classifiers cannot be trained. Without trained classifiers,
    the gateway has no ML detection layer. This is the cold-start problem.

    Anomaly detection breaks the cold-start deadlock. Isolation Forest and One-Class SVM learn
    what normal traffic looks like from the first day of production operation and flag statistical
    outliers without needing a single labelled attack example. Their alerts seed the annotation
    queue that becomes the training set for the supervised classifiers in Sections 12.05 and 12.08.

    Section 12.03 is therefore two things simultaneously: a detection system that produces
    real alerts from day one, and a data collection mechanism that makes every subsequent
    section in Chapter 12 possible. Understanding this dual role changes how the detection
    engineer deploys and operates anomaly detection -- not as a placeholder to replace as
    soon as supervised data is available, but as a permanent layer in the ensemble that
    continues to surface novel attack variants even after supervised classifiers are running.
  position_in_chapter: |
    Section 12.03 is the first trained ML detector in Chapter 12. It consumes the feature
    pipeline from Section 12.02 and produces the labelled dataset that Section 12.04 structures
    for supervised training. It is the only detector that can be deployed without any labelled
    attack data. After Section 12.03, the detection system is live; every subsequent section
    adds precision and coverage to what anomaly detection already provides.

learning_objectives:

  knowledge:
    - 'Explain the Isolation Forest algorithm: how random feature splits isolate anomalies faster than normal points, and why path length is the anomaly score'
