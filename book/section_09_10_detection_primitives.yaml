section_overview:
  one_line_summary: |
    Five detection primitives -- query pattern analyser, OOD detector, output
    entropy monitor, user concentration analyser, and watermarking signal extractor
    -- cover every extraction goal and privacy attack from the Chapter 9 attack
    catalogue; they are the engineering substrate that Section 9.11 wires into
    the production query monitor and Section 9.12 wires into the output-side
    defence.

  why_this_section_exists: |
    Sections 9.3 through 9.9 established the mechanistic basis for detection:
    extraction queries cluster near decision boundaries, distillation queries cover
    the input space broadly, prompt extraction queries concentrate on model behaviour
    meta-queries, membership inference queries probe specific target records, and
    economic abuse queries produce cost-per-query outliers. Each mechanism generates
    a measurable signal. Section 9.10 implements those signals as software primitives.

    The primitives are not independent detectors -- they are a library of signal
    generators, each covering one or more of the five attack surface positions
    (query-side distributional, query-side boundary, query-side OOD, output-side
    entropy, output-side ownership). Section 9.11 wires the input-side primitives
    into the production query monitor as parallel detection tracks; Section 9.12
    wires the output-side primitives into the watermarking and perturbation pipeline.
    Section 9.10 is the substrate both capstone sections import.

    The six deliverables in this section form a coherent library: a query pattern
    analyser that measures distributional anomaly across a user''s session, an OOD
    detector that flags queries outside the model''s legitimate input distribution,
    a boundary query detector that identifies near-boundary input pairs, an output
    entropy monitor that measures per-response information leakage risk, a user
    concentration analyser that scores semantic clustering, and a detection ensemble
    that combines all five signals with configurable weights. The empirical comparison
    harness closes the section by measuring detection rates across synthetic attack
    families, grounding the ensemble weights in measurable performance rather than
    intuition.

  position_in_chapter: |
    Section 9.10 of 13. Engineering substrate for the production capstones.
    All detection logic in Sections 9.11 and 9.12 is imported from the primitives
    built here. The empirical comparison harness produces the detection rate
    benchmarks referenced in Section 9.11''s deployment checklist.

learning_objectives:
  knowledge:
    - 'Describe the three detection primitive categories: query-side distributional, query-side structural, and output-side'
    - 'Explain what each of the five primitives measures and which extraction attack class it covers'
    - 'Articulate why ensemble detection outperforms any single primitive across the full attack catalogue'
    - 'Describe the calibration requirements for each primitive in a production deployment'
    - 'Explain how watermarking detection signals differ from the four input-side primitives in their detection timing'

  skills:
    - 'Implement a query pattern analyser using sliding window distributional statistics'
    - 'Build an OOD detector using isolation forest trained on legitimate query samples'
    - 'Implement boundary query detection using label-pair proximity analysis on a query log'
    - 'Build an output entropy monitor that scores per-response information leakage risk'
    - 'Combine primitive scores into a weighted ensemble with configurable thresholds'
    - 'Run an empirical comparison harness to measure detection rates across synthetic attack families'

  security_mindset:
    - 'Internalise that no single primitive covers the full attack catalogue -- ensemble detection is architecturally required'
    - 'Recognise that primitives must be calibrated on legitimate traffic before deployment; defaults will produce unacceptable false positive rates'
    - 'Understand that output-side primitives (entropy monitor, watermark signal) do not prevent extraction -- they are signals for the rate limiter and ownership verification workflow'
    - 'Appreciate that detection primitive performance degrades against adaptive adversaries who observe the detection signals -- continuous red teaming is required'

prerequisites:
  - 'Section 9.3: boundary query clustering as the foundational detection insight'
  - 'Section 9.4: distillation query diversity as the primary functionality extraction signal'
  - 'Section 9.5: prompt extraction meta-query concentration pattern'
  - 'Section 9.6: membership inference confidence and loss signals'
  - 'Section 9.8: cost-per-query outlier as the economic abuse signal'
  - 'Section 9.9: incident root cause gaps as the primitive design requirements'
  - 'Chapter 2: isolation forest and anomaly detection algorithms (OOD detector prerequisite)'

prose_content:

  - part: 1
    title: 'The Detection Primitive Library: Design Philosophy'
    body: |
      A detection primitive is a single-signal generator: it takes as input a
      stream of query-response pairs (or a window of them) and produces a scalar
      score in [0.0, 1.0] representing the strength of a specific anomaly signal.
      Primitives are not classifiers -- they do not make binary decisions. They
      generate evidence that an ensemble classifier aggregates into an action.

      The library design follows three principles that flow from the attack
      catalogue. First, no single primitive covers the full catalogue. The five
      attack classes produce structurally different query distributions: boundary
      extraction concentrates near the decision surface; distillation spreads
      across the input space; prompt extraction concentrates on model behaviour
      meta-queries; membership inference targets specific records; economic abuse
      produces cost outliers. These signals are orthogonal -- a detector calibrated
      for one class has low sensitivity for another. An ensemble that combines
      orthogonal signals achieves coverage no individual primitive can.

      Second, primitives must be calibrated on legitimate traffic. Every primitive
      in this section scores anomaly relative to a baseline. That baseline is not
      universal -- it depends on the deployment''s legitimate query distribution.
      A coding assistant receives queries with high semantic diversity (many
      programming languages, many problem types) that would look like a
      distillation campaign to a primitive calibrated on a narrow-domain customer
      service deployment. Calibration on 30 to 90 days of observed legitimate
      traffic is required before any primitive is production-ready.

      Third, output-side primitives have different operational semantics than
      input-side primitives. The query pattern analyser, OOD detector, boundary
      query detector, and user concentration analyser all operate on incoming
      queries -- they can inform real-time rate limiting decisions. The output
      entropy monitor and watermarking signal extractor operate on responses --
      the entropy monitor can inform rate limiting, but the watermark signal
      triggers post-hoc ownership verification workflows, not real-time blocks.
      The ensemble must respect this operational distinction when routing scores
      to actions.

  - part: 2
    title: 'Query Pattern Analysis: Distributional Anomaly Detection'
    body: |
      The query pattern analyser maintains a sliding window of a user''s recent
      queries and computes distributional features over that window. The core
      insight from Section 9.3 is that extraction query distributions differ
      structurally from benign distributions: extraction queries are more uniformly
      spread across the input space (functionality extraction), more concentrated
      near the decision boundary (active learning), more semantically uniform
      within a narrow domain (fidelity extraction), or more focused on model
      behaviour meta-queries (prompt extraction).

      Three distributional features characterise these differences. Query diversity
      measures the semantic breadth of the user''s recent queries: high diversity
      across many topics signals functionality extraction; low diversity within
      one topic signals fidelity extraction or legitimate focused use. Boundary
      proximity score estimates the fraction of recent queries that are near the
      model''s decision boundary -- high boundary concentration signals active
      learning or equation-solving extraction. Behavioural meta-query rate measures
      the fraction of queries that probe the model''s behaviour, constraints, or
      capabilities rather than the product''s domain -- high meta-query rate
      signals prompt extraction.

      The sliding window length is a calibration parameter. A window too short
      (ten queries) is noisy and produces high false positive rates on legitimate
      users who happen to submit several similar queries. A window too long
      (thousand queries) is slow to respond and allows adversaries to complete
      significant extraction before the signal accumulates. Section 9.11 calibrates
      the window length against the target extraction budget: the window should
      be long enough to accumulate signal from approximately 20 percent of the
      query budget required for the attack the deployment is defending against.

  - part: 3
    title: 'OOD Detection: Out-of-Distribution Query Identification'
    body: |
      Out-of-distribution detection identifies queries that fall outside the
      model''s legitimate input distribution -- the distribution of inputs for
      which the deployment was designed. OOD queries are anomalous for two
      independent reasons that both matter for extraction detection: they are
      inputs the model may not handle reliably (product quality concern), and
      they are often boundary-probing inputs that are positioned at the edge
      of the input space where extraction campaigns search for decision boundary
      geometry (security concern).

      The OOD detector is trained on a reference set of legitimate queries.
      Isolation Forest is the preferred algorithm for this application: it is
      unsupervised (no labelled anomalies required), computationally efficient
      at inference time, and robust to the high dimensionality of text embedding
      spaces. The detector assigns each incoming query an anomaly score in
      [0.0, 1.0] where high scores indicate OOD inputs.

      The OOD signal has a characteristic pattern for different extraction attack
      classes. Equation-solving extraction produces OOD queries because boundary-
      seeking inputs are positioned between the legitimate class clusters, not
      within them. Functionality extraction using random sampling produces OOD
      queries because many inputs drawn uniformly from the feature space fall
      outside the product''s legitimate input domain. Distillation using benchmark
      prompts may not produce OOD queries because benchmark prompts are within
      the model''s general training distribution -- this is the detection limit
      for OOD-only detection.

      The OOD detector requires a feature representation of incoming queries.
      For text queries, sentence embeddings (from a fast embedding model that
      fits within the gateway''s latency budget) convert queries to dense vectors
      for isolation forest scoring. The embedding model must be chosen for latency
      compatibility with the production gateway -- a model that adds more than
      10ms to the gateway''s P99 latency is not suitable.

  - part: 4
    title: 'Boundary Query Detection: Classification Surface Proximity'
    body: |
      The boundary query detector is the most targeted of the five primitives:
      it is specifically designed for decision-boundary extraction (Section 9.3)
      and active distillation (Section 9.4). Both attack classes deliberately
      position queries near the model''s decision boundary -- boundary extraction
      to map its geometry, active distillation to maximise per-query information
      gain. The detector identifies this clustering.

      The detector operates on the accumulated (query, response) log for a user
      rather than on individual queries. For grey-box APIs returning confidence
      scores, the signal is direct: queries that receive near-0.5 confidence
      (near-uniform probability distribution) are near the boundary. For black-
      box APIs returning only hard labels, the signal requires pair analysis:
      the detector identifies pairs of queries with opposite predicted labels and
      small semantic distance between them -- the defining characteristic of
      boundary-seeking input pairs.

      Pair analysis for black-box boundary detection operates on the user''s
      query embedding history. For each new query, the detector computes its
      semantic distance to all prior queries in the window with opposite predicted
      labels. If the minimum distance to an opposite-label prior query is below
      a threshold, the pair is flagged as a potential boundary-seeking pair. The
      boundary proximity score for the user is the fraction of queries in the
      window that participate in at least one such flagged pair.

      The computational cost of pair analysis scales quadratically with window
      size in the naive implementation. For the Section 9.11 production deployment,
      a k-d tree index on the query embeddings in the window reduces the nearest-
      neighbour search to O(log n) per query, making the boundary detector
      compatible with the gateway''s latency budget.

  - part: 5
    title: 'Output Entropy Monitoring: Low-Information Extraction Queries'
    body: |
      The output entropy monitor operates on the model''s responses rather than
      its inputs, making it the first output-side primitive in the detection
      library. For grey-box APIs, the model''s output is a probability distribution
      over classes; the entropy of this distribution is high (near-uniform) when
      the input is near the decision boundary and low (concentrated on one class)
      when the input is far from the boundary.

      The extraction relevance of output entropy is indirect but important. A user
      whose queries systematically produce low-entropy outputs (high confidence)
      is not near the boundary -- their queries are well within the model''s
      confident prediction region, consistent with legitimate use. A user whose
      queries frequently produce medium-entropy outputs (split probability between
      two or more classes) is systematically probing the model in regions where
      its confidence is low -- the regions boundary extraction targets.

      For LLMs returning text rather than class probabilities, output entropy
      is approximated by the diversity of generated content: low lexical diversity
      across responses to varied prompts indicates the model is producing
      formulaic outputs (possibly due to prompt constraints leaking through
      responses, relevant to prompt extraction detection). High lexical diversity
      is consistent with legitimate general-purpose use.

      The output entropy monitor also serves as the economic abuse detection signal
      for output-side cost amplification: an unusually long response (high token
      count) to a query that does not require a long response is an output-length
      anomaly that the entropy monitor flags alongside its entropy calculation.
      Section 9.8''s cost-per-query analyser uses the output token count as one
      of its input features; the output entropy monitor produces that feature as
      a by-product of its entropy calculation.

  - part: 6
    title: 'User Concentration Analysis: Per-User Query Pattern Concentration'
    body: |
      The user concentration analyser measures the semantic clustering of a
      user''s queries: how tightly they cluster within a semantic region relative
      to the expected diversity of legitimate users with similar overall query
      volumes. High concentration within a narrow semantic region signals fidelity
      extraction (which targets a specific input set) or systematic prompt extraction
      (which targets the model''s behavioural constraints, a narrow semantic domain).

      The analyser maintains an embedding of each query in the user''s window and
      computes the average pairwise semantic similarity. A legitimate user with
      diverse queries has low average similarity. A fidelity extractor whose target
      set covers one semantic domain (medical imaging, financial data, specific
      programming language queries) has high average similarity. The concentration
      score is calibrated against the deployment''s legitimate user population:
      the threshold is set at the 95th percentile of average pairwise similarity
      across legitimate users, so only the top 5 percent of similarity scores
      trigger the concentration signal.

      User concentration analysis is the primary detection signal for fidelity
      extraction precisely because the other signals do not cover it. Fidelity
      extraction does not necessarily produce boundary-seeking pairs (it may
      use soft-label distillation within the target set), does not necessarily
      produce OOD queries (the target set may be within the legitimate input
      domain), and does not necessarily produce high query volume (the target
      set may be small). Semantic concentration is the unique signal that
      fidelity extraction produces and that legitimate focused users produce
      to a lesser degree.

      The concentration analyser also provides the detection signal for systematic
      prompt extraction: a user who repeatedly queries the model''s behavioural
      constraints, contact details, and refusal categories produces a cluster
      of semantically similar queries (all about model behaviour) that the
      concentration analyser flags as anomalous concentration in the model-
      behaviour meta-query semantic region.

  - part: 7
    title: 'Watermarking Detection Signals: Cryptographic Ownership Evidence'
    body: |
      The watermarking detection signal is fundamentally different from the four
      input-side primitives. Those primitives are designed to detect extraction
      in progress -- their scores inform real-time rate limiting decisions. The
      watermark detection signal is designed to detect extraction after the fact --
      to verify the presence of the victim model''s cryptographic identity in a
      suspected surrogate.

      The watermarking scheme embedded in Section 9.12 works by biasing the model''s
      token selection probabilities: a secret key determines which tokens are
      "green" (preferred) and which are "red" (suppressed) for each token position,
      in a way that is statistically detectable in the aggregate but imperceptible
      in any individual token selection. A surrogate model trained to replicate
      the victim''s outputs inherits these biases because the training data --
      the collected victim responses -- has an excess of green tokens at the
      watermarked positions.

      The watermark detector tests the null hypothesis that a text sequence was
      generated by a model without the watermark. The test statistic is the
      proportion of green tokens at the expected watermarked positions. Under the
      null hypothesis (no watermark), this proportion should be approximately 0.5
      (random green/red assignment). With the watermark present, the proportion
      is significantly above 0.5 by an amount proportional to the watermark
      strength. The p-value of this test is the detection signal: a p-value below
      a threshold indicates watermark presence with the specified confidence.

      The detection primitive in this section implements the statistical test
      framework. The full watermarking scheme -- the key management, the token-
      level embedding, the robustness to paraphrasing -- is implemented in
      Section 9.12. Section 9.10 implements only the detection side: given a
      text sequence and a watermark key, compute the detection statistic and
      p-value. This separation of concerns allows the detection workflow to
      operate independently of the embedding workflow.

  - part: 8
    title: 'Combining Primitives: The Ensemble Approach and Coverage Analysis'
    body: |
      The ensemble combines the five primitive scores into a composite action
      score that drives the Section 9.11 rate limiter and alert router. The
      combination must respect two constraints: the operational timing difference
      between input-side and output-side primitives, and the coverage difference
      across extraction attack classes.

      The timing constraint is addressed by separating the ensemble into two
      stages. The input-side stage combines the query pattern analyser, OOD
      detector, boundary query detector, and user concentration analyser scores
      at request arrival time. The composite input-side score drives the
      synchronous rate limiting decision that must complete within the gateway''s
      latency budget. The output-side stage combines the output entropy monitor
      score at response generation time. The watermark detection score is
      asynchronous -- it is computed on-demand when a suspected surrogate is
      submitted for verification, not on every response.

      The coverage constraint is addressed by the ensemble weights. Extraction
      goal coverage varies by primitive: the boundary query detector has high
      coverage of decision-boundary extraction and low coverage of distillation
      and prompt extraction; the user concentration analyser has high coverage
      of fidelity extraction and prompt extraction and low coverage of decision-
      boundary and functionality extraction. The ensemble weights are set to
      ensure that any extraction goal produces a composite score above the alert
      threshold given sufficient attack intensity. This is the coverage analysis
      step: for each extraction goal in the taxonomy, verify that at least one
      primitive achieves a score above its individual threshold at the attack
      intensity level the deployment is defending against.

      The ensemble is not a black box. Its weights and thresholds are documented
      in the Section 9.11 deployment checklist as explicit policy parameters
      that security teams can audit and adjust. The empirical comparison harness
      (Deliverable 6) measures detection rates under synthetic attack traffic and
      is the tool for calibrating weights against measured performance rather than
      intuition.

