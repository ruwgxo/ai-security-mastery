prose_content:

  part_1:
    title: 'Why the Session Is the First Unit Above the Request'
    body: |
      The per-request event stream is a flat sequence: each event is one request, scored and
      actioned, with no inherent grouping. Behavioural detection needs structure on top of that
      sequence, and the session is the first structure to impose because it has three properties that
      make it the natural unit.

      It is bounded. A session has a beginning and an end, which means a session object is finite and
      can be held in memory, scored, and then closed. This is unlike the entity, whose history is
      open-ended and grows indefinitely, and unlike the graph, which spans all entities. The session
      is the smallest non-trivial behavioural unit, and small state is cheap state.

      It is attributable. Every session belongs to one entity. A session-level signal is therefore
      directly assignable to a single actor, which matters both for the verdict (who do we throttle)
      and for feeding the entity family (the session features roll up into the entity profile). A
      unit that could not be attributed to an entity would be a dead end for the rest of the chapter.

      It is semantically coherent. The requests within a session are usually part of one task or one
      conversation. That coherence is what makes intra-session features meaningful: topic drift is
      only a signal because a coherent session has a topic to drift from. A flat window of unrelated
      requests from different conversations has no coherent topic and no meaningful drift.

      These three properties are why the session is built first. The multi-turn attack -- the
      escalation that defeats per-turn classification -- lives entirely within a session, so the
      session is also the unit where the most distinctive behavioural attack becomes visible. Build
      the session well and the multi-turn analyser of 13.09 has a clean trajectory to read; build it
      poorly and no downstream detector can recover the signal the session model threw away.

  part_2:
    title: 'Session Boundaries: A Detection Decision, Not a Logging Convenience'
    body: |
      A session does not announce itself in the event stream. The boundary -- where one session ends
      and the next begins -- is a design decision with three common strategies, each with a detection
      trade-off.

      The explicit session token is the cleanest when available. The client supplies a session
      identifier, and all events sharing it belong to one session. This matches the application's own
      notion of a conversation and needs no inference. Its weakness is adversarial: an attacker
      controls their own session token and can rotate it to split a multi-turn attack across many
      short sessions, each too short to show escalation. Relying on the client-supplied token alone
      hands the boundary decision to the adversary.

      The inactivity-timeout strategy infers boundaries from gaps: a session ends when no request
      arrives for a configured interval, and the next request starts a new session. This is robust to
      token rotation because it groups by activity rather than by a client-controlled identifier. Its
      weakness is the timeout value. Too short, and a user who pauses to think is split into multiple
      sessions, fragmenting a slow multi-turn attack. Too long, and unrelated conversations from the
      same entity merge into one session, diluting the topic-drift signal with topic changes that are
      benign task switches rather than escalation.

      The fixed time-window strategy groups all events from an entity within a rolling window of fixed
      length. It is the simplest and the most robust to manipulation, but it has the weakest semantic
      coherence: a fixed window cuts across natural conversation boundaries arbitrarily.

      The detection consequence is the same in every case: a boundary drawn too wide dilutes the
      escalation signal because the attack's turns are a small fraction of a large session, and a
      boundary drawn too narrow splits the attack so that no single session object contains the full
      trajectory. The robust production choice is a composite: use the explicit token when present but
      cap session length and re-anchor on inactivity, so an adversary cannot extend or fragment a
      session at will. The boundary is a detection control, and it must not be left entirely under
      client control.

  part_3:
    title: 'Session Features: Counts, Rates, Distributions, and Trajectories'
    body: |
      Given a session object, the behavioural feature pipeline extracts four classes of feature, in
      increasing order of detection signal and computation cost.

      Count features are the simplest: turn count, number of blocked turns, number of distinct
      endpoints touched. They are cheap and weakly informative on their own -- a long session is not
      inherently an attack -- but they are necessary context for normalising the rate and trajectory
      features.

      Rate features normalise counts against the session: refusal rate (fraction of turns the model
      refused), block rate (fraction of turns the gateway blocked), error rate. The refusal rate is a
      meaningful behavioural signal because a session with a rising refusal rate is one where the user
      keeps pushing against a boundary the model keeps declining -- the refusal-then-retry pattern
      that characterises a probing adversary.

      Distribution features describe the shape of the session rather than its totals: the inter-request
      interval distribution (regular intervals suggest automation, irregular suggests a human), the
      distribution of per-track classifier scores across turns, the spread of request lengths. A
      perfectly regular interval distribution is a high-signal automation feature that the entity and
      rate families also use.

      Trajectory features capture movement across the session -- the highest-signal class. The
      classifier-score slope across turns measures whether the session is escalating: a session whose
      jailbreak score climbs turn over turn is escalating even if no single turn crosses the per-turn
      threshold. The refusal-then-retry sequence measures persistence against a boundary. And topic
      drift, treated in the next part, measures semantic movement. Trajectory features are what make
      the session model catch the multi-turn attack: they are the only class that represents the
      session as a path rather than a snapshot, and the multi-turn attack is a path.

  part_4:
    title: 'Intra-Session Topic Drift: The Highest-Signal Escalation Feature'
    body: |
      The single most valuable session feature is intra-session topic drift, because it captures the
      defining signature of the gradual jailbreak: a conversation that begins benign and moves
      steadily toward a harmful objective, with each step small enough that no single turn is
      flagged.

      Topic drift is computed in the embedding space from Chapter 3. Each turn's text is embedded into
      a vector. The opening turn establishes the session's anchor topic. For each subsequent turn, the
      cosine distance from the anchor embedding measures how far the conversation has moved from where
      it started. A benign conversation that stays on one task has low, stable drift. A benign task
      switch produces a single step change in drift and then stability around a new anchor. A gradual
      jailbreak produces a distinctive signature: monotonic, accumulating drift, where each turn moves
      a little further from the benign opening and toward the harmful target, never jumping far enough
      in one step to trigger a per-turn detector.

      The feature that captures this is not the raw drift at any single turn but the drift trajectory:
      the slope of cumulative drift across the session, and whether that drift is monotonic. A high,
      monotonic drift slope is the gradual-escalation signature. A high but non-monotonic drift is a
      conversation that wanders -- benign exploration, not a directed attack. Distinguishing the two
      requires the trajectory, not the endpoint.

      There is a subtlety worth stating because it is the most common implementation error. Drift must
      be measured from the session's own opening anchor, not from a global notion of harmful content.
      Measuring distance from a fixed harmful centroid turns topic drift into a per-turn classifier --
      it scores each turn against a known target and loses exactly the cross-turn signal the session
      model exists to capture. The anchor is the session's own beginning, and the signal is movement
      away from it, regardless of the destination. This is what lets the feature catch a gradual
      attack toward a target the detector has never seen.

  part_5:
    title: 'Streaming Aggregation and the Session Store'
    body: |
      The session feature pipeline must run in two modes. In production, sessions are aggregated in a
      streaming fashion: each event updates the in-memory session object for its session, recomputing
      the running features incrementally so the session can be scored in near-real-time on each turn.
      For training, evaluation, and backfill, sessions are reconstructed in batch from the logged
      event stream, replaying historical events into session objects to produce labelled session
      feature vectors.

      Streaming aggregation requires the features to be incrementally computable. Counts and rates
      update trivially on each turn. The inter-request interval distribution updates with each new
      interval. Topic drift updates by embedding the new turn and computing its distance from the
      stored anchor, which means the anchor embedding is held in the session state for the session's
      lifetime. The session object therefore holds a compact running state -- counts, the anchor
      embedding, the score trajectory so far -- not the full text of every turn, which keeps the
      per-session memory bounded and serves the retention principle below.

      The session store holds active sessions keyed by session identifier, with each session's running
      feature state. It must support fast lookup and update on the request path, eviction of closed or
      timed-out sessions, and configurable retention. Closed sessions either roll their final feature
      vector up into the entity profile (the 13.10 family) and are evicted, or are retained for a
      bounded window for batch analysis and then discarded.

      Retention is a minimisation problem. The session store retains the behavioural features required
      for detection -- the counts, rates, distributions, trajectory, and anchor embedding -- not the
      raw conversation content. Storing the full text of every session indefinitely is both a privacy
      liability and unnecessary for detection, which operates on the features. The retention window is
      bounded to what the downstream batch detectors require, and raw content, if retained at all, is
      retained on a shorter window than the derived features.

  part_6:
    title: 'Feature Importance: Which Session Signals Actually Carry Signal'
    body: |
      Not every session feature is worth computing. The session feature pipeline, like the per-request
      pipeline of 12.02, benefits from feature-importance analysis to identify which features carry
      independent detection signal and which are redundant or noise.

      The method parallels 12.02: train a first supervised session classifier on a labelled set of
      benign and attack sessions, then read the feature importances and the SHAP values to see which
      session features drive the verdict. The expected result, consistent across LLM behavioural
      datasets, is that trajectory features dominate -- the drift slope and the score slope carry the
      most independent signal, because they encode the cross-turn pattern that defines the multi-turn
      attack. Count features carry little independent signal but are valuable as normalisers. Rate
      features, especially refusal rate, sit in between.

      Two pitfalls specific to session features show up in importance analysis. The first is redundancy
      between correlated trajectory features: drift slope and score slope often correlate on attack
      sessions because escalation moves both together, and keeping both adds cost without adding
      independent signal. The correlation matrix identifies the redundancy so one can be dropped. The
      second is a feature that appears important only because of leakage: a session feature computed
      using information that would not be available at the turn being scored -- for example, a
      session-final feature used to score mid-session turns -- looks predictive in offline evaluation
      and fails in streaming production. Feature importance combined with a strict streaming-time
      evaluation, where each feature is computed only from turns available at scoring time, catches
      this before deployment.

      The output of this analysis is the production session feature set: the smallest set of
      incrementally computable, leakage-free features that retains the detection signal, dominated by
      the trajectory features that make the session model catch the gradual attack.

