section_overview:
  one_line_summary: 'The session is the first aggregation unit above the request -- bounded, attributable to one entity, and semantically coherent; Section 13.02 builds the session object and the behavioural feature pipeline that every session-level and entity-level detector in Chapter 13 consumes.'
  why_this_section_exists: |
    Section 13.01 established that behavioural detection holds state across requests and that the
    session is the smallest, cheapest unit of that state. Before any session-level detector can be
    built -- the multi-turn analyser in 13.09, the entity profiler in 13.10 that aggregates over
    sessions -- the session itself must be modelled. Section 13.02 is the behavioural analogue of
    Section 12.02: where 12.02 built the per-request feature pipeline that every Chapter 12
    classifier shared, 13.02 builds the session feature pipeline that every behavioural detector
    shares.

    The work has two parts. The first is structural: define what a session is. The per-request
    event stream arrives as a flat sequence of events, and turning it into session objects requires
    a boundary strategy -- when does a session begin and end. That decision has direct detection
    consequences: a session drawn too wide dilutes the escalation signal of a multi-turn attack, and
    a session drawn too narrow splits the attack across two session objects so that neither shows
    the full trajectory.

    The second part is the feature engineering: given a session object, extract the behavioural
    features that carry detection signal. Some are obvious counts -- turn count, refusal rate. The
    highest-signal feature is less obvious: intra-session topic drift, the measure of how far a
    conversation has moved from its opening topic. A gradual jailbreak that starts with a benign
    request and walks steadily toward a harmful one has a topic-drift signature that no single turn
    reveals. Building that feature correctly is the difference between a session model that catches
    the gradual attack and one that only counts turns and misses it.
  position_in_chapter: |
    Section 13.02 is the foundation section for the session-level and entity-level families. It sits
    immediately after the 13.01 taxonomy and before the detectors that consume its output: the
    statistical baselines of 13.03 are computed over session features, the multi-turn analyser of
    13.09 reads the session trajectory, and the entity profiler of 13.10 aggregates session features
    across sessions. It mirrors the role of Section 12.02 in Chapter 12: the shared pipeline built
    once and reused by every downstream detector, so each later section focuses on detection logic
    rather than re-deriving feature extraction.

learning_objectives:

  knowledge:
    - 'Explain why the session is the first aggregation unit above the request and what properties make it the natural unit'
    - 'Describe the three session boundary strategies -- time-window, explicit token, inactivity-timeout -- and state the detection trade-off of each'
    - 'Explain how a boundary drawn too wide or too narrow degrades multi-turn attack detection'
    - 'Name the session-level behavioural features and classify each as a count, a rate, a distribution, or a trajectory feature'
    - 'Explain why intra-session topic drift is the highest-signal escalation feature and how it is computed'
    - 'Describe the difference between streaming and batch session aggregation and when each is appropriate'
    - 'State the privacy and retention principle that bounds what session state may be stored and for how long'

  skills:
    - 'Aggregate a per-request event stream into session objects under a chosen boundary strategy'
    - 'Extract session-level behavioural features: turn count, refusal rate, request cadence, inter-request interval distribution, and intra-session topic drift'
    - 'Compute intra-session topic drift from the embedding distance between the opening turn and each subsequent turn'
    - 'Maintain session state in a streaming session store with configurable retention'
    - 'Run feature-importance analysis on session features to identify which carry independent detection signal'

  security_mindset:
    - 'Recognise that the session boundary is a detection decision, not a logging convenience -- the boundary determines whether a multi-turn attack is visible as one trajectory'
    - 'Internalise that the highest-signal session feature is the one that captures movement over the session, not the one that captures its average state'
    - 'Understand that session state is the cheapest behavioural state and therefore the first to invest in -- every downstream detector inherits the quality of the session model'
    - 'Treat session retention as a minimisation problem: retain the features needed for detection, not the raw conversation content, and bound the retention window'

