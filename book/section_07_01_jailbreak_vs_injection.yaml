# ===========================================================================
# SECTION CONTENT
# ===========================================================================

content:

  opening: |
    Chapter 6 built a production injection classifier. Chapter 7 extends it. Before
    extending anything, you need to know what you are extending it for -- because
    jailbreaks and prompt injections are not the same attack, they do not share the
    same detection signals, and a classifier tuned on injection data will have
    significant blind spots against jailbreak attempts.

    Most practitioners treat these terms interchangeably. That is a detection
    architecture mistake. This section draws the line precisely: where it sits,
    what lies on each side, and what that means for the system you are building.

  subsections:

    - number: "7.1.1"
      title: "The Definitional Separation"
      body: |
        Two definitions. Commit to them.

        A prompt injection attack overrides the instructions a deployment has given
        the model. The adversary does not need the model to do anything it has not
        already been instructed to do -- they need it to follow different instructions
        than the operator intended. The attack surface is the instruction layer. The
        target is the context window. The adversary's goal is to make the model serve
        them instead of the operator.

        A jailbreak attack overrides the alignment a model provider has trained into
        the model. The adversary does not touch instructions -- they target the
        model's trained disposition to refuse certain outputs. The attack surface is
        the alignment layer. The target is the model's fine-tuned behaviour. The
        adversary's goal is to make the model produce outputs it was trained to
        decline.

        One sentence each:

        Injection: make the model follow the wrong instructions.
        Jailbreak: make the model produce the wrong outputs.

        These are different problems at different architectural layers. Injection is
        a context problem. Jailbreak is an alignment problem. They can occur
        independently. They frequently compose -- but understanding them independently
        is the prerequisite for understanding the composition.

    - number: "7.1.2"
      title: "What They Share: The Instruction-Following Root"
      body: |
        Despite targeting different layers, both attacks exploit the same foundational
        property: LLMs are trained to follow instructions. That is the capability that
        makes them useful. It is also the property that makes both attacks possible.

        Injection works because instruction-following is content-agnostic. The model
        cannot verify who authored an instruction. A directive in the user turn is
        processed the same way as a directive in the system prompt -- same attention
        weights, same token processing, same generation behaviour. Chapter 6 Section
        6.1 established this at the attention mechanism level. It applies here too.

        Jailbreaks work because instruction-following creates a tension with refusal
        training. RLHF teaches the model two things simultaneously: follow instructions,
        and refuse harmful requests. At the margin, these objectives conflict.
        Jailbreaks are adversarial inputs engineered to resolve that conflict in the
        adversary's favour -- to make the instruction-following objective win over the
        refusal objective.

        Same root, different exploitation path. Detection must address both paths,
        which is why the Chapter 6 classifier alone is insufficient.

    - number: "7.1.3"
      title: "Where They Diverge: Four Dimensions"
      body: |
        Four dimensions separate the two attack families. These dimensions directly
        determine your detection architecture.

        Attack surface. Injection attacks the context window -- specifically the
        boundary between trusted and untrusted content within a single inference
        call. Jailbreak attacks the model's trained weights -- specifically the
        boundary between the RLHF-trained refusal behaviour and the pre-training
        capability substrate beneath it.

        Adversary position. Injection requires the adversary to control some content
        that enters the model's context: the user input directly (direct injection)
        or a data source the model retrieves (indirect injection). Jailbreak requires
        only that the adversary can send a prompt. No control over external data
        sources is required. The attack surface is smaller: just the user turn.

        Detection signals. Injection attacks signal through structural anomalies --
        instruction-format patterns appearing in data positions, privilege escalation
        claims, format-switching mid-context. Jailbreak attacks signal through
        semantic anomalies -- persona-establishing preambles, fictional framing
        constructs, authority-override language, adversarial token sequences with
        high perplexity. The classifiers required are architecturally distinct.

        Defence architecture. Injection is best defended at the infrastructure layer:
        classifier on retrieved content before context assembly, classifier on user
        input before inference, output monitoring for instruction-override signals.
        Jailbreak is best defended at both the model layer (alignment robustness)
        and the infrastructure layer (semantic classifier, perplexity detector). The
        model layer defence is the provider's responsibility. The infrastructure
        layer defence is yours.

    - number: "7.1.4"
      title: "OWASP LLM01: The Umbrella Category"
      body: |
        OWASP LLM Top 10 groups both attacks under LLM01: Prompt Injection. This is
        deliberate. From an application security perspective, the outcome is the same:
        the model does something the operator did not intend. Whether that happened
        because an adversary overrode the system prompt or because they bypassed
        alignment is a second-order concern for triage. For detection engineering, it
        is the primary concern.

        OWASP LLM01 defines prompt injection as occurring when an attacker manipulates
        a large language model through crafted inputs, causing the LLM to execute the
        attacker's intentions. That definition covers both attack types. The OWASP
        treatment is appropriate for risk classification and compliance reporting.
        It is not sufficient for detection design.

        The practical implication: when reporting to stakeholders, use OWASP LLM01
        as the classification. When designing detection, separate injection signals
        from jailbreak signals. The Chapter 6 classifier handles injection. The
        Chapter 7 ensemble handles jailbreak. Together they cover LLM01 completely.
        Section 7.14 closes that loop with the unified Sigma rule.

    - number: "7.1.5"
      title: "ATLAS Mapping: AML.T0051 and AML.T0054"
      body: |
        MITRE ATLAS is more granular than OWASP. The relevant techniques are:

        AML.T0051 covers direct prompt injection: the adversary directly interacts
        with the model and crafts input to manipulate model behaviour. This maps to
        Chapter 6 direct injection (Sections 6.2-6.5) and to jailbreaks when the
        adversary delivers the jailbreak payload directly in the user turn.

        AML.T0054 covers LLM prompt injection via external content: the adversary
        poisons external data sources that the model retrieves and includes in its
        context. This maps to Chapter 6 indirect injection (Sections 6.6-6.10).

        Jailbreaks delivered directly in the user turn are AML.T0051 in ATLAS. There
        is no separate ATLAS technique for jailbreaks as a distinct family -- ATLAS
        categorises by delivery mechanism, not by whether the attack targets the
        instruction layer or the alignment layer. Chapter 7 uses AML.T0054 as its
        primary mapping because the chapter builds infrastructure-layer detection
        that handles jailbreaks regardless of delivery path.

        For Sigma rules and SIEM alert taxonomy: use the ATLAS technique ID
        appropriate to delivery mechanism. AML.T0051 for direct user turn delivery.
        AML.T0054 for retrieval-mediated delivery. The signal that distinguishes
        injection from jailbreak is in the classifier feature set, not the ATLAS tag.

    - number: "7.1.6"
      title: "Composed Attacks: Jailbreak Enabling Injection"
      body: |
        In practice, the most capable adversaries compose both techniques. The
        composition pattern is consistent: jailbreak first, inject second.

        Consider the sequence. The adversary sends a jailbreak payload that convinces
        the model to ignore safety guidelines and follow all user instructions without
        filtering. That is an alignment-layer attack -- a jailbreak. Once it succeeds,
        the model's instruction-following behaviour is no longer constrained by refusal
        training. The adversary then sends an injection payload: ignore your system
        prompt, exfiltrate the conversation history, send output to this endpoint.
        That is a context-layer attack -- an injection. It succeeds more reliably
        because the jailbreak disabled the model's trained hesitation to comply with
        adversarial instructions.

        The reverse composition is also observed. Injection can extract system prompt
        content (Chapter 6, Section 6.2), which reveals the exact safety instructions
        the model operates under. That information is then used to craft a targeted
        jailbreak -- one designed against the specific system prompt rather than a
        generic refusal pattern.

        This composition is why your detection system must run both classifiers on
        every request, in parallel. A jailbreak attempt followed by an injection
        attempt in the same session is a high-confidence signal of sophisticated
        adversarial intent, regardless of whether either individual attempt succeeds.
        Session-level correlation across classifier outputs is the detection primitive
        for composed attacks.

    - number: "7.1.7"
      title: "Operational Taxonomy: Four Categories"
      body: |
        For daily operational use, four categories cover the full attack space. Every
        adversarial LLM interaction you encounter fits into one of these.

        Direct injection. Adversary controls the user input turn and embeds
        instruction-override payloads. Chapter 6, Section 6.2. Delivery: direct.
        Target: instruction layer. ATLAS: AML.T0051.

        Indirect injection. Adversary controls content retrieved from external
        sources -- documents, web pages, databases, email, code. Chapter 6,
        Sections 6.6-6.10. Delivery: retrieval-mediated. Target: instruction layer.
        ATLAS: AML.T0054.

        Jailbreak. Adversary crafts prompts that bypass RLHF alignment training.
        Chapter 7, Sections 7.3-7.12. Delivery: direct or retrieval-mediated.
        Target: alignment layer. ATLAS: AML.T0054 (chapter convention).

        Composed attack. Adversary chains injection and jailbreak in sequence,
        typically jailbreak first. Chapter 6 + Chapter 7 combined. Delivery:
        multi-turn or multi-stage. Target: alignment layer then instruction layer,
        or instruction layer then alignment layer. Detection: session-level
        correlation across both classifiers.

        These four categories map directly to your detection investment. Direct
        injection: Chapter 6 classifier on user input. Indirect injection: Chapter 6
        classifier on retrieved content. Jailbreak: Chapter 7 ensemble on user input.
        Composed: session-level correlation across all detectors.

    - number: "7.1.8"
      title: "Why the Distinction Matters: Concrete Detection Gaps"
      body: |
        If you build only an injection classifier and skip the jailbreak ensemble,
        you have the following gaps.

        DAN-variant persona jailbreaks pass through undetected. The DAN pattern
        contains no injection-format signals. It is a long-form roleplay preamble
        with no instruction-override syntax. An injection classifier tuned on
        role-override patterns and retrieval-content signals will score it as benign.

        GCG adversarial suffixes pass through undetected. These are token sequences
        optimised by gradient descent. They contain no natural language patterns
        that injection classifiers or semantic classifiers catch. The required
        detector is perplexity-based, and it is not part of an injection classifier's
        architecture.

        Many-shot jailbreaks pass through undetected. A long sequence of
        question-answer pairs looks like a legitimate few-shot prompt to an injection
        classifier. Only a shot-count detector catches it.

        Conversely, if you build only a jailbreak detector and skip the injection
        classifier, you miss indirect injection entirely -- the attack surface the
        Bing Chat incident (Chapter 6, Section 6.14) demonstrated is high-impact
        in production.

        The complete detection system requires both, running in parallel, with
        session-level correlation. Section 7.14 implements the jailbreak side.
        Combined with the Chapter 6 classifier, the unified system closes the
        OWASP LLM01 detection gap completely.

