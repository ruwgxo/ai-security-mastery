section_overview:
  one_line_summary: |-
    The first detector in the suite is a hybrid: a regex/signature layer catches the known instruction-override phrasings with precision and near-zero latency, the Chapter 12 ML classifier catches the novel and paraphrased attempts the patterns miss, and the two combine into one verdict on the unified API -- meeting the suite quality bar and handling indirect injection through retrieved content.
  why_this_section_exists: |-
    Section 15.01 defined the suite, the unified API, and the quality bar in the abstract. This section makes the first detector concrete, and it makes it concrete as the canonical example of the hybrid pattern every other detector in the chapter follows. Prompt injection is the right detector to build first because it shows the hybrid at its clearest: the known instruction-override phrasings are exactly the kind of fixed, high-precision signal a regex catches cleanly, and the endless paraphrases of those same intents are exactly the kind of open-ended signal only a trained classifier covers. Neither layer alone is a production injection detector. The pattern layer alone is blind to paraphrase; the ML layer alone is slower and noisier on the known attacks a signature would have caught for free. The hybrid takes the pattern layer as a high-confidence fast path and the ML layer as the coverage net, and this section builds it end to end: the pattern set, the ML layer wrapping the Chapter 12 classifier, the verdict-combination logic, indirect-injection handling, and the test harness that holds the whole thing to the quality bar.
  position_in_chapter: |-
    Section 15.02 is the first detector section and the template for 15.03 through 15.06. It implements the unified API contract defined in 15.01 and establishes the shape every following detector reuses: a pattern layer, an ML layer, a combination rule, a configuration object, and a test harness that reports the quality-bar metrics. The jailbreak detector (15.03) is the closest sibling, differing mainly in its patterns, its classifier, and its use of the session signal.
