  description: |
    Comprehensive index for Chapter 18 covering Real-World Case Studies -- the closing chapter of the book, which
    shows the complete detection system built across Parts 1 to 4 operating against real attacks at scale. Where
    the earlier chapters built the system layer by layer, this chapter analyses it in action through five case
    studies grounded in the analysis of 10,000+ real API calls: enterprise LLM deployment security, detecting
    prompt injection at scale, jailbreak prevention in production, PII leakage prevention, and model abuse
    detection. Each case study follows a consistent method -- the incident, how the system detected it, how the
    response unfolded, and the lessons drawn -- and each exercises the full Part 1 to 4 stack against a specific
    real-world attack across the financial-services, healthcare, and e-commerce domains. The case studies produce
    documented security incidents, response playbooks, and architecture recommendations, and the chapter closes
    with the consolidated lessons and best practices and the book conclusion. Chapter 18 completes Part 4 and the
    book, leaving the reader having built, from ML fundamentals, a complete production AI-security detection
    system and the practical judgment to apply it.
