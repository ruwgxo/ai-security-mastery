section_overview:
  one_line_summary: |
    The input-side capstone wires the Section 9.10 detection library into a
    production query monitor as Track 6 of the Chapter 6/7 gateway, pairs it
    with a four-dimension adaptive rate limiter, adds a cross-user collusion
    detector for distributed campaigns, completes the AML.T0040/T0024 Sigma
    rule, and closes the input-side half of OWASP LLM10.

  why_this_section_exists: |
    Section 9.10 built five detection primitives and showed they achieve 88 to
    98 percent detection rates against most extraction attack families. Those
    rates exist on paper until the primitives are wired into production
    infrastructure. Section 9.11 does that wiring.

    Three integration challenges must be solved. First, the primitives require
    per-user state that persists across requests -- a stateful layer that the
    Chapter 6 and 7 gateway did not need. Second, detection without action is
    observation, not defence: the rate limiter must translate primitive scores
    into enforcement decisions that impose real query budget costs on adversaries.
    Third, per-user monitoring is bypassable by distributed campaigns: an adversary
    who splits their query budget across ten accounts can evade any per-user
    threshold. A cross-user collusion detector closes this gap.

    The section also completes the AML.T0040/T0024 Sigma rule. Chapter 5 Section
    5.8 introduced the AML stub pattern -- a skeleton Sigma rule for ATLAS
    techniques that is populated with specific detection logic when a production
    control is built. Section 9.11 is where that population happens for the
    two ATLAS techniques that anchor Chapter 9.

    The architectural position is Track 6 in the Chapter 6/7 unified gateway
    ensemble. Tracks 1 through 5 (injection classifier, OOD detector, semantic
    consistency checker, jailbreak ensemble, pattern analyser) from Chapters 6
    and 7 run unchanged. Track 6 runs in parallel, using the same asynchronous
    dispatch pattern, within the same 50ms P99 latency budget. The monitor
    is stateful; the other five tracks are stateless. This is the only structural
    difference from the Chapter 6/7 architecture.

  position_in_chapter: |
    Section 9.11 of 13. Input-side production capstone. Pairs with Section 9.12
    (output-side capstone) to close OWASP LLM10. The Sigma rule completed here
    is the formal compliance artefact for AML.T0040 and AML.T0024 detection.

