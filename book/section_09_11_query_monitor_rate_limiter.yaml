    - 'Describe the four dimensions of the adaptive rate limiter and the extraction budget economics that calibrate each'
    - 'Explain the cross-user collusion detection mechanism and why per-user monitoring alone is insufficient'
    - 'Articulate what the AML.T0040/T0024 Sigma rule detects and how the query monitor populates its detection fields'
    - 'Describe the 8-item deployment checklist and what each item verifies'

  skills:
    - 'Implement a production query monitor with per-user state tracking and primitive integration'
    - 'Build a four-dimension adaptive rate limiter with extraction-aware policy calibration'
    - 'Implement a cross-user collusion detector using embedding correlation across accounts'
    - 'Complete an AML.T0040/T0024 Sigma rule from a Chapter 5 stub'
    - 'Run the latency benchmark to verify Track 6 fits within the 50ms P99 gateway budget'
    - 'Work through all 8 deployment checklist items against a target deployment configuration'

  security_mindset:
    - 'Internalise that stateful detection is architecturally different from the stateless Chapter 6/7 classifiers -- the state store is a new attack surface and an operational dependency'
    - 'Recognise that a rate limit policy that has never been red-teamed against its own extraction budget economics may allow extraction within its limits'
    - 'Understand that distributed campaign detection requires cross-account data retention and correlation that has privacy implications of its own'
    - 'Appreciate that the Sigma rule closes the SIEM coverage gap -- extraction alerts must reach the SOC, not just the API team'

