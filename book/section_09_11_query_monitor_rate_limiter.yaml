prose_content:

  - part: 1
    title: 'The Input-Side Capstone: Design Brief and Architectural Position'
    body: |
      The Chapter 6 production injection classifier was the first gateway component.
      Chapter 7 extended it to a parallel ensemble of five tracks, each processing
      every incoming request asynchronously within the 50ms P99 latency budget.
      Section 9.11 adds Track 6: query monitoring with per-user state tracking.

      The design brief for Track 6 has four requirements that distinguish it from
      Tracks 1 through 5. First, it is stateful: it maintains a rolling window of
      query statistics per user that persists across requests, sessions, and days.
      The other five tracks are stateless -- they read a request and return a score
      without memory of prior requests. Track 6 reads a request, updates a per-user
      state store, and returns a score derived from the accumulated state.

      Second, it is extraction-aware: the rate limiting policy it drives is
      calibrated against extraction query budgets (the Section 9.2 budget-fidelity
      curves) rather than infrastructure throughput capacity. A rate limit set
      purely for infrastructure protection may allow complete extraction within
      normal usage volumes; a rate limit calibrated against extraction economics
      imposes real adversary cost at the relevant query count.

      Third, it is cross-user aware: distributed campaigns that split query
      budgets across multiple accounts are invisible to per-user state tracking.
      The cross-user correlator is a separate component that runs at lower
      frequency than the per-request monitor and examines semantic similarity
      patterns across user accounts within a time window.

      Fourth, it is the Sigma rule target: the AML.T0040/T0024 Sigma rule is
      a formal detection specification that requires a concrete observable (the
      query monitor''s alert events) to be actionable. Completing the Sigma rule
      means the query monitor produces alert events in a format the SIEM can
      ingest and correlate with other intelligence.

  - part: 2
    title: 'Track 6 Integration: Parallel Query Monitoring in the Gateway Ensemble'
    body: |
      The Chapter 6/7 gateway dispatches each incoming request to five parallel
      workers, collects their scores within the latency budget, and applies the
      ensemble routing decision. Track 6 joins as a sixth parallel worker using
      the same dispatch and collection mechanism.

      The integration has one structural asymmetry: Track 6 requires a write to
      the per-user state store on every request, whereas Tracks 1 through 5 are
      read-only with respect to external state. This write must be non-blocking
      from the gateway''s perspective: if the state store write fails or times
      out, the gateway must fall back to stateless operation (using only Tracks
      1 through 5) rather than failing the request. The write is fire-and-forget
      from the latency-critical path; the state is eventually consistent across
      requests.

      Track 6''s score is computed from the state read, not the state write.
      On each request, Track 6 first reads the current per-user state (the
      rolling window of query embeddings, labels, and cost entries), computes
      the five primitive scores from Section 9.10, combines them into the ensemble
      score, and returns that score to the gateway dispatcher. The state write
      updates the window with the current request''s data and is dispatched
      asynchronously after the score is returned.

      This read-then-write pattern means Track 6''s score reflects the state
      as of the previous request, not the current one. The one-request lag is
      acceptable: extraction detection operates on distributions across many
      queries, not on individual queries, and a one-query lag does not
      meaningfully reduce detection sensitivity.

      The latency budget constraint is met by pre-computing embeddings during
      Track 6''s async processing and caching them in the state store. The
      embedding computation (typically 5 to 15ms for a short sentence encoder)
      happens in a background worker, not on the critical path. Track 6''s on-
      path work is state read (< 2ms from an in-memory store), primitive scoring
      from pre-computed embeddings (< 5ms), and ensemble score computation (< 1ms).
      Total Track 6 latency on the critical path is under 10ms, well within the
      50ms P99 budget shared with Tracks 1 through 5.

  - part: 3
    title: 'query_monitor.py: Per-User State Architecture and Signal Integration'
    body: |
      The production query monitor is the orchestrating component that integrates
      per-user state management with the Section 9.10 detection primitives.
      Its responsibilities are: maintaining per-user state stores (sliding
      window of embeddings, labels, costs, and metadata), orchestrating the
      five primitive computations from Section 9.10, routing the ensemble result
      to the rate limiter, and emitting structured alert events.

      The per-user state store is a dictionary keyed by user ID, where each entry
      contains the sliding windows required by the five primitives: an embedding
      deque for the query pattern analyser and user concentration analyser, an
      (embedding, label) deque for the boundary query detector, a cost history
      deque for the output entropy monitor''s token count tracking, and a
      timestamp log for rate limit window computation.

      For production deployments, this in-memory state is backed by a distributed
      cache (Redis or equivalent) with a configurable TTL. The TTL determines
      how long inactivity resets the per-user window: a seven-day TTL means a
      user who is inactive for a week starts with a fresh window. The TTL is a
      security parameter: a shorter TTL makes extraction detection more fragile
      against patient adversaries who space queries to reset their window.

      The monitor emits structured alert events when the ensemble score exceeds
      the composite threshold or when any individual primitive exceeds its
      individual threshold. Each alert event contains: the user ID, the timestamp,
      the primitive scores breakdown, the composite score, the recommended action,
      and a trace ID linking to the specific request that triggered the alert.
      This structure is the input to the Sigma rule detector and the incident
      response playbook.

  - part: 4
    title: 'rate_limiter.py: Adaptive Extraction-Aware Policy Framework'
    body: |
      The adaptive rate limiter translates detection scores into enforcement
      decisions across four independent policy dimensions. Each dimension bounds
      a different adversary strategy: requests per minute bounds rate-limit
      exhaustion and high-frequency campaigns; tokens per minute bounds total
      compute consumption; cost per hour bounds denial-of-wallet; input tokens
      per request bounds context padding.

      The extraction-aware calibration distinguishes this rate limiter from
      infrastructure-oriented rate limiters. For the requests-per-minute dimension,
      the calibration target is the query count required to complete the cheapest
      relevant extraction attack at the deployment''s specific model architecture.
      For a linear classifier deployment (Section 9.3 equation-solving), the
      relevant budget is O(d × log(1/ε)) queries; the per-user daily limit should
      force the adversary to spread this budget across multiple days, increasing
      the cross-session detection window. For an LLM deployment, the relevant
      budget is the soft-label distillation budget from Section 9.4; the daily
      limit should make a 50,000-query campaign take at least thirty days per
      account, giving the cross-user correlator time to identify distributed
      campaigns.

      Rate limit decisions are tiered rather than binary. The limiter has three
      action tiers: normal (no restriction), soft limit (reduced throughput, alert
      emitted), and hard limit (request rejected, alert escalated). The transition
      from normal to soft limit occurs when the ensemble score exceeds the tier-2
      threshold (0.40 by default). The transition from soft to hard limit occurs
      when the ensemble score exceeds the tier-1 threshold (0.60) or when any
      individual boundary or query-pattern primitive exceeds its individual
      threshold (0.70). The tiered response reduces false positive impact on
      legitimate users: a user who briefly triggers the soft limit is throttled
      but not blocked.

      The rate limiter maintains a per-user leaky bucket state for each of the
      four dimensions. The leaky bucket refills at the configured rate and is
      decremented on each request by the request''s token count, cost, or
      input length as appropriate. When any bucket is empty, the limiter applies
      the corresponding tier''s enforcement action.

  - part: 5
    title: 'cross_user_correlator.py: Distributed Campaign Detection'
    body: |
      The cross-user correlator runs as a background job at a lower frequency
      than the per-request query monitor -- typically once per hour. It analyses
      the query logs across all users within a configurable time window and
      identifies patterns that suggest coordinated extraction campaigns.

      The correlation mechanism has two signals. The first is semantic similarity
      clustering: if multiple users submit queries with high pairwise semantic
      similarity within a short time window, and those queries are individually
      anomalous on the OOD or boundary proximity dimensions, the correlation
      flags a potential distributed extraction campaign. Legitimate coordinated
      use (a team of users working on the same product query) produces high
      semantic similarity but typically scores low on the OOD and boundary
      dimensions.

      The second signal is temporal synchronisation: if multiple users submit
      queries at a rate that, when summed, substantially exceeds what the
      per-user limits allow individually, and the timing pattern suggests
      deliberate coordination (queries arriving in regular intervals from
      multiple accounts at the same rate), the correlator flags the pattern
      as rate-limit-aware distributed execution.

      The correlator output is a campaign risk score for each cluster of potentially
      coordinated users, a list of the user IDs in the cluster, the time window
      of the suspected campaign, and a recommended action (increase monitoring
      frequency for all accounts in the cluster, apply shared rate limits across
      the cluster, or escalate to manual review).

      The privacy implication of cross-user correlation is real and must be
      documented in the deployment''s privacy impact assessment: correlating
      query patterns across user accounts means the system processes data about
      multiple users jointly and can infer relationships between accounts that
      the users may not have disclosed. The correlator should operate only on
      anonymised embeddings (not raw query text) and should not retain
      cross-user correlation outputs beyond the investigation window.

  - part: 6
    title: 'The AML.T0040/T0024 Sigma Rule: Completing the Detection Coverage'
    body: |
      MITRE ATLAS AML.T0040 (ML Model Inference API Access) and AML.T0024
      (Exfiltration via ML Inference API) are the two ATLAS sub-techniques
      that Chapter 9 covers. A Sigma rule for these techniques enables SIEM
      platforms to ingest the query monitor''s alert events and correlate them
      with other threat intelligence.

      The Chapter 5 Section 5.8 AML stub pattern established the skeleton: a
      Sigma rule with title, status, description, ATLAS technique references,
      and a detection field populated with a placeholder. Section 9.11 populates
      the detection field with the specific log schema emitted by the query
      monitor''s alert events.

      The Sigma rule detects on three conditions combined with an OR logic:
      first, a query monitor alert event with composite score above the tier-1
      threshold; second, a boundary query detector individual alert; and third,
      a cross-user correlator campaign alert for a cluster of three or more
      accounts within a 24-hour window. These three conditions correspond to
      the three most reliable signals in the detection primitive taxonomy: the
      ensemble (broadest coverage), the boundary detector (highest specificity
      for decision-boundary extraction), and cross-user clustering (coverage
      for distributed campaigns that evade per-user detection).

      The rule''s timeframe is set to fifteen minutes for real-time SIEM alerting.
      False positive reduction is achieved by requiring that the triggering
      event has either a composite score above 0.60 (not merely above the
      tier-2 soft limit of 0.40) or a boundary detector score above 0.70, or
      a cross-user cluster of three or more accounts. This three-tier specificity
      filter prevents the rule from generating high alert volume on marginal
      anomalies.

  - part: 7
    title: 'Latency Budget Management: 50ms P99 Across All Tracks'
    body: |
      The latency budget constraint -- that the full six-track gateway ensemble
      must complete within 50ms at the P99 percentile -- drives architectural
      decisions throughout Section 9.11. Track 6 adds the highest latency risk
      because it requires state reads, primitive computations, and a state write
      that the other five tracks do not.

      The latency decomposition for Track 6 has four components. State read from
      an in-memory cache: 1 to 2ms. Primitive scoring from pre-computed embeddings:
      boundary query detector with k-d tree index (3 to 8ms), query pattern
      analyser on a 100-entry window (2 to 4ms), OOD detector isolation forest
      scoring (1 to 3ms), output entropy monitor (< 1ms), user concentration
      analyser (2 to 4ms). Ensemble combination (< 1ms). State write dispatched
      asynchronously (not on critical path). Total Track 6 critical-path latency:
      10 to 20ms at P99.

      The critical-path embedding computation is pre-empted by a background
      worker. When a request arrives, the gateway dispatches it to all six tracks
      simultaneously. While Tracks 1 through 5 process the request content,
      Track 6 starts a background job to compute the request''s embedding and
      update the state store. The current request''s embedding is not available
      in the state for this request''s score -- it will be available from the
      next request onward. This is the acceptable one-request lag described in
      Part 2.

      Embedding precomputation for Track 6 uses a lightweight sentence encoder
      (a 6 to 22 million parameter model with sub-5ms inference on CPU) rather
      than the full model. The embedding quality is sufficient for the distributional
      anomaly detection the primitives require; it does not need to match the
      full model''s semantic precision.

      The latency benchmark in Deliverable 5 measures the full six-track gateway
      latency under simulated load to verify that the P99 target is met before
      production deployment.

  - part: 8
    title: 'Deployment Checklist and Operational Considerations'
    body: |
      Eight pre-production verification items cover the query monitor''s production
      readiness. They are derived from the lessons learned in Section 9.9 and the
      calibration requirements of Section 9.10.

      Item 1: per-user state store is deployed and accessible within the latency
      budget. Verification: issue 100 sequential state reads and writes; confirm
      P99 round-trip under 2ms. Item 2: embedding model is loaded in the background
      worker and producing embeddings within the latency target. Verification:
      issue 100 embedding requests; confirm P99 under 5ms.

      Item 3: primitive thresholds are calibrated on at least 30 days of legitimate
      traffic. Verification: the calibration report from Section 9.10''s empirical
      harness shows false positive rate under 1 percent on held-out legitimate
      traffic. Item 4: rate limit policy dimensions are calibrated against the
      deployment''s specific extraction budget economics. Verification: for the
      model architecture in scope, compute the minimum query count for the cheapest
      relevant extraction technique; confirm the daily per-user limit forces that
      budget across at least ten days.

      Item 5: cross-user correlator is running at the configured frequency and
      producing output to the alert log. Verification: inject a synthetic three-
      account correlated campaign into the test environment; confirm the correlator
      flags the campaign within two correlation cycles. Item 6: alert events are
      routed to the SIEM in the Sigma rule''s expected log schema. Verification:
      trigger a test alert; confirm SIEM ingestion and rule match within 15 minutes.

      Item 7: the AML.T0040/T0024 Sigma rule is loaded in the SIEM and generating
      alerts against synthetic test events. Item 8: a false positive escalation
      path exists for legitimate high-volume users who are rate-limited. Verification:
      the rate limit appeals process is documented, the responsible team is
      identified, and the appeals SLA is defined.

      Two operational considerations warrant explicit documentation. False positive
      management is the primary operational challenge: a miscalibrated threshold
      produces alerts on legitimate users, generating analyst fatigue and business
      escalation. The rate limit''s tiered response (throttle before block) reduces
      the customer impact of false positives. The appeals process in Item 8 is the
      human-in-the-loop safety valve.

      Legitimate high-volume users (researchers, enterprise evaluation pipelines,
      automated testing) may trigger the volume and diversity signals legitimately.
      The deployment checklist should identify known high-volume users and configure
      custom per-user policy tiers that raise their throughput limits while
      tightening their boundary proximity and concentration thresholds.

