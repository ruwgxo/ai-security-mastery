section_overview:
  one_line_summary: 'Detection integrates at two points in the request lifecycle: pre-processing before
    the model call scores the input and can block the attempt, and post-processing after the model call
    scores the output and can catch the success; the placement decides which detectors block and which
    only alert, and each hook must be failure-isolated so a detection fault never breaks the request path.'
  why_this_section_exists: |-
    Section 14.02 chose where the detection system sits -- the architecture pattern -- but a
    pattern still leaves open where in the request lifecycle each detector actually hooks in.
    A request has a definite shape in time: it arrives, it is inspected, it is sent to the
    model, the response comes back, the response is inspected, and the response is returned.
    There are exactly two points at which detection can intervene on the synchronous path --
    before the model call and after it -- and which point a detector runs at is not a
    preference but a consequence of what it inspects. A detector that reads the input can run
    before the model call and block the attempt; a detector that reads the output cannot run
    until the output exists, so it necessarily runs after. This section fixes that placement:
    it distinguishes pre-processing from post-processing detection, states which detectors
    belong at each point and why, works through the blocking-versus-non-blocking choice at
    each hook, draws the two-sided picture in which the attempt is caught on the input and the
    success is caught on the output, and requires each hook to be failure-isolated so that one
    faulty detector cannot break the request path. It completes the placement concern that
    14.02 began.
  position_in_chapter: |-
    Section 14.03 is the second of the two placement sections (14.02-14.03). Where 14.02 fixed
    where detection sits in the topology, this section fixes where in the request lifecycle each
    detector hooks in. With placement complete, the performance sections (14.04-14.05) engineer
    the latency and scaling of the placed detectors, and the resilience sections (14.06-14.07)
    turn the failure isolation introduced here into the full fail-open/fail-closed policy and
    circuit breaking.
