    belong post-processing (injection-success and output monitoring)
  - Describe the request lifecycle and where each detection tier hooks into the request and response path
  - Explain the blocking-versus-non-blocking choice at each integration point and what each mode can and
    cannot do
  - 'Describe the two-sided detection picture: the attempt caught on the input and the success caught
    on the output'
  - Explain why each integration point must be failure-isolated so a fault in one hook does not break
    the request path
  skills:
  - Place each detector at the correct pre-processing or post-processing hook by what it inspects
  - Mark each hook as blocking or non-blocking according to whether it must reject on the synchronous
    path
  - Map the request lifecycle and validate that no input inspector runs post-processing and no output
    inspector runs pre-processing
  - Wrap each integration point so a detector fault is contained at the boundary rather than propagated
