  security_mindset:
  - Recognise that pre-processing catches the attempt and post-processing catches the success, and that
    both are needed for a complete picture
  - Internalise that a detector that inspects the output cannot block before the model call, so blocking
    capability is decided by placement
  - Understand that a blocking hook holds the request while it runs, so blocking is reserved for checks
    that must reject and can afford the latency
  - Appreciate that an unisolated detection hook makes every detector a single point of failure for the
    whole request path
