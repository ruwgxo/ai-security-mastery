prose_content:
  part_1:
    title: Two Points in the Request Lifecycle
    body: |-
      The architecture pattern of Section 14.02 answered where the detection system lives. It
      did not answer where, in the life of a single request, each detector runs. A request is
      not a static object; it moves through a sequence of stages in time. It arrives from the
      client, it is inspected, it is forwarded to the model, the model produces a response, the
      response is inspected, and the response is returned. Detection can intervene at only two
      points on this synchronous path: before the model call and after it. This section is
      about which detectors run at which point and what that placement decides.

      The two points have names. Pre-processing detection runs before the model call and
      inspects the request -- the input the client sent. Post-processing detection runs after
      the model call and inspects the response -- the output the model produced. The model call
      sits between them, and it is the fact that the model call sits between them that makes the
      two points genuinely different rather than two names for the same hook. Everything a
      pre-processing detector can see is the input; everything a post-processing detector can
      see is the output plus, if it is passed through, the input that produced it.

      Because the two points straddle the model call, they also differ in what they can prevent.
      A pre-processing detector runs before any model compute is spent, so it can reject a
      request before the model is ever invoked -- it can stop the attempt. A post-processing
      detector runs after the model has already produced its output, so it cannot prevent the
      model from running; the most it can do is withhold the output before it reaches the
      client. The placement therefore decides not just where a detector runs but what kind of
      protection it can offer.
  part_2:
    title: Placement Follows From What a Detector Inspects
    body: |-
      The integration point of a detector is not a free choice. It is fixed by what the detector
      inspects, and getting this wrong is not a suboptimal decision but an impossible one. A
      detector that inspects the output cannot run pre-processing, because at the pre-processing
      point the output does not exist yet -- the model has not been called. A detector that
      inspects the input to block an attempt must run pre-processing, because running it
      post-processing would mean the model has already been called on the very input the
      detector was meant to reject.

      This gives a simple rule that the placement of every detector follows. Input classifiers
      -- prompt injection detection, jailbreak detection, input policy checks -- belong
      pre-processing, because they read the request and their whole value is blocking the
      attempt before the model call. Output monitors -- the injection-success detection of
      Chapter 13 Section 13.06, output PII and secret scanning, toxicity and policy filtering
      of the response -- belong post-processing, because they read the response and their value
      is catching what the model actually produced. The rule is mechanical: place a detector at
      the point where the thing it inspects exists and where the action it takes is still
      possible.

      The mechanical nature of the rule is what lets it be validated automatically. An input
      inspector placed post-processing is an error, because it inspects something that was
      available earlier and it has lost the ability to block before the model call. An output
      inspector placed pre-processing is an error, because it inspects something that does not
      exist yet. The placement deliverable for this section checks exactly these two
      conditions, so a misplacement is caught as a structural inconsistency rather than
      discovered as a gap in production.
  part_3:
    title: Blocking Versus Non-Blocking Integration
    body: |-
      Placement decides which point a detector runs at. A second, independent choice decides how
      it runs there: blocking or non-blocking. A blocking hook holds the request while it runs
      and its verdict gates what happens next -- a blocking pre-processing check can reject the
      request before the model call, and a blocking post-processing check can withhold the
      response before it is returned. A non-blocking hook does not hold the request; it runs
      alongside the main path, emits an alert or a signal, and lets the request proceed
      regardless of its verdict.

      The choice between them is a trade of protection against latency. A blocking hook can
      actually stop a bad request or a bad response, which is the strongest protection
      available, but it adds its latency to the request because the request waits for it. A
      non-blocking hook adds no latency to the request because the request does not wait, but
      it can only observe and alert -- by the time its verdict is known the request has already
      proceeded. Blocking buys the ability to prevent at the cost of latency; non-blocking buys
      zero latency at the cost of the ability to prevent.

      The consequence is that blocking is reserved for the checks that both must reject and can
      afford the latency. The prompt injection and jailbreak classifiers block pre-processing
      because rejecting the attempt is the point and they are engineered to fit the budget. The
      output PII scanner and the injection-success monitor block post-processing because
      returning leaked data or a successful injection to the client is unacceptable. An input
      PII detector used only for audit, by contrast, can be non-blocking: flagging the presence
      of PII in the input does not require holding the request. And every detector on the
      near-real-time and batch tiers is non-blocking by construction, because those tiers run
      off the synchronous path entirely and their verdicts arrive after the response is long
      gone.
  part_4:
    title: The Two-Sided Detection Picture
    body: |-
      Placing input classifiers pre-processing and output monitors post-processing produces a
      structure worth naming explicitly, because it is the reason both points are needed rather
      than one. Pre-processing catches the attempt; post-processing catches the success. These
      are two sides of the same threat, and each side sees what the other cannot.

      Consider prompt injection. A pre-processing injection classifier reads the request and
      tries to recognise the injection attempt in the input -- the crafted instruction, the
      known jailbreak prefix, the suspicious structure. When it recognises the attempt it
      blocks before the model is ever called, which is the cheapest and cleanest outcome. But
      no input classifier catches every attempt; a novel or obfuscated injection can slip past
      it. That is where the post-processing side earns its place. The injection-success monitor
      of Section 13.06 reads the response and looks for evidence that an injection worked --
      the model revealing its system prompt, following an instruction it should have refused,
      producing output that only a successful injection would produce. It does not need to have
      recognised the attempt on the input; it recognises the success in the output.

      The two sides together give a completeness that neither has alone. The input side stops
      the attempts it recognises before any compute is spent. The output side catches the
      successes it can see regardless of whether the attempt was recognised. An attacker who
      defeats the input classifier still has to produce an output that does not trip the output
      monitor, and an attacker who somehow evades the output monitor still had to get an attempt
      past the input classifier. This is defence on both sides of the model call, and it is the
      direct payoff of integrating detection at both points in the lifecycle rather than one.
  part_5:
    title: Failure Isolation at the Integration Boundary
    body: |-
      Integrating a detector into the request path creates a risk that the detector did not have
      when it was a logical component: it can now break the request. A detector that throws an
      exception, hangs, or crashes while it is wired into the synchronous path can, if nothing
      stands between it and the request, take the request down with it. An unisolated detection
      hook makes every detector a single point of failure for the whole request path, which is
      the opposite of what a detection system is supposed to provide.

      The remedy at this section is failure isolation at the integration boundary: each hook is
      wrapped so that a fault in the detector is caught and turned into a deliberate decision
      rather than propagated as a raw exception. When a wrapped detector throws, the wrapper
      catches it and applies a policy -- fail-open, which admits the request and lets it
      proceed, or fail-closed, which blocks the request. Either way the request path sees a
      clean decision, not a stack trace, and the fault is contained at the boundary of the one
      hook that failed.

      This is deliberately only the first half of the failure story. The isolation wrapper here
      guarantees containment: one hook failing does not break the path. It does not yet decide,
      per detector and per tier, whether the right containment is fail-open or fail-closed --
      that security-versus-availability decision is the whole subject of Section 14.06, and the
      circuit breaking that stops a repeatedly failing detector from being called at all is
      Section 14.07. What this section establishes is the boundary itself: every integration
      point is wrapped, so that when the failure policy of 14.06 is applied it has a clean place
      to be applied, and no detector is ever a bare call in the request path.
  part_6:
    title: Where the Detection Tiers Hook In
    body: |-
      Pulling the pieces together gives the full picture of where each Chapter 13 detection tier
      hooks into the request lifecycle. The inline tier is the only tier that hooks into the
      synchronous path, and it hooks in at both points: its input classifiers run pre-processing
      as blocking checks that can reject before the model call, and its output monitors run
      post-processing as blocking checks that can withhold the response. The inline tier is
      where the two-sided picture lives, because it is the only tier fast enough to sit on the
      synchronous path on both sides of the model call.

      The near-real-time and batch tiers do not hook into the synchronous path at all. They
      consume the exchange -- the request, the response, and their metadata -- asynchronously,
      after the response has already been returned to the client. A near-real-time session
      scorer reads the completed exchange to update its view of the session risk; a batch job
      reads a corpus of completed exchanges to find coordinated patterns. Neither can block,
      because by the time they run there is nothing left to block. They are non-blocking by
      construction, which is exactly why the state-latency coupling of Chapter 13 placed them
      off the hot path in the first place.

      This completes placement. Section 14.02 fixed where the detection system sits, and this
      section fixed where in the request lifecycle each detector hooks in and whether it
      blocks. The synchronous inline tier is placed at two isolated, budgeted hooks around the
      model call; the off-path tiers consume the exchange asynchronously. With the detectors
      placed and their hooks isolated, the chapter can turn to performance: Section 14.04
      engineers the latency budget that the blocking inline hooks must fit within, which is the
      constraint that has been implicit in every mention of blocking on the hot path so far.
