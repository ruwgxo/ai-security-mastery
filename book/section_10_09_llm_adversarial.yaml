section_overview:
  one_line_summary: 'Text adversarial attacks substitute tokens or characters such that the text remains semantically valid to humans but fools classifiers -- the discrete-space analogue of FGSM and universal patches, and the automated implementation of Chapter 7 jailbreaks.'
  why_this_section_exists: |
    Every attack in Sections 10.3-10.8 operates in continuous pixel space where Lp norms are
    natural perturbation metrics. Text is discrete: tokens are integer indices into a vocabulary,
    and perturbing an index by a real-valued delta produces a non-token. Section 10.9 establishes
    the discrete-text attack framework -- the different search methods, constraint analogues, and
    target classifiers that apply when the input is tokenised text rather than pixel grids. It
    also closes the loop between Chapter 10 (automated adversarial attacks) and Chapter 7
    (human-crafted jailbreaks): universal adversarial triggers are the automated adversary that
    produces jailbreaks at scale. Section 10.12 consistency checking -- introduced for image
    adversarial examples -- extends directly to text via back-translation and paraphrase, and
    Section 10.9 establishes why.
  position_in_chapter: |
    Section 10.9 fills the text modality cells of the Section 10.2 taxonomy matrix. It completes
    the attack catalogue (Sections 10.3-10.9 cover all taxonomy cells) before the incident
    analysis (10.10), detection primitives (10.11-10.12), and production gateway (10.13) sections.

learning_objectives:

  knowledge:
    - 'Explain why Lp norm constraints do not apply to discrete text and state the text analogues: token edit distance (L0) and semantic similarity (L2)'
    - 'Describe HotFlip and explain how the Jacobian of the classifier w.r.t. the one-hot token vector identifies the best character substitution'
    - 'Describe TextFooler: word importance ranking by deletion, synonym substitution with cosine similarity constraint, and POS filter'
    - 'Explain the BERT-Attack approach: why masked language model predictions produce more contextually natural substitutions than synonym lookup'
    - 'Describe universal adversarial triggers: fixed token sequences that universally fool classifiers when appended to any input, and connect them to Section 10.8 universal patches and Chapter 7 jailbreaks'
    - 'State the detection approach: semantic consistency check (back-translation) catches adversarial text that changes classification but preserves meaning'

  skills:
    - 'Implement TextFooler-style word importance ranking and greedy synonym substitution on a toy text classifier'
    - 'Implement HotFlip character-level substitution using the gradient of loss w.r.t. character embeddings'
    - 'Implement greedy universal adversarial trigger search by iteratively replacing trigger tokens with the highest-loss candidates'
    - 'Generate character-level homoglyph and zero-width character attacks against regex and ML-based classifiers'
    - 'Implement semantic similarity and Unicode anomaly detection for adversarial text identification'

  security_mindset:
    - 'Recognise that universal adversarial triggers are automated jailbreaks at scale -- the same attack surface as Chapter 7, with automated search replacing human creativity'
    - 'Understand that character-level attacks (homoglyphs, zero-width injection) bypass ML classifiers by exploiting tokeniser preprocessing -- the attack is at the tokenisation layer, not the model'
    - 'Appreciate that text adversarial detection requires a different primitive from image adversarial detection: back-translation preserves semantics but changes token identities, so adversarial text that is fragile to token changes is detectable'

prerequisites:
  - 'Section 10.3: FGSM (HotFlip is the text analogue -- Jacobian w.r.t. one-hot token is the text version of gradient w.r.t. pixel)'
  - 'Section 10.8: universal adversarial patches (universal adversarial triggers are the text analogue)'
  - 'Section 10.2: text modality cells in the adversarial taxonomy (Section 10.9 fills these cells)'
  - 'Chapter 6: prompt injection (character-level attacks share obfuscation techniques with Section 6.6)'
  - 'Chapter 7: jailbreak techniques (Section 7.7 adversarial prompts; universal triggers are the automated implementation)'
  - 'Chapter 3: LLM tokenisation and embedding space (prerequisite for HotFlip and token-level attacks)'

prose_content:

  part_1:
    title: 'The Discrete Text Challenge: Why Pixel Perturbation Methods Break'
    body: |
      FGSM computes nabla_x J(theta, x, y) and takes a step in the gradient sign direction. This
      works because x is a continuous vector -- each feature x_i is a real number and x_i +
      epsilon * sign(g_i) is also a valid real number. Text inputs are not continuous vectors.
      A text string, after tokenisation, becomes a sequence of integer indices into a finite
      vocabulary. If token index 342 ("cat") is perturbed to 342.7, the result is not in the
      vocabulary and is not a valid text input.

      This discreteness problem fundamentally changes the attack formulation. The adversary
      cannot take a gradient step in token space -- there is no continuous path from one token
      to another. They must instead search over discrete substitutions: replace token t_i with
      a different token t_j from the vocabulary such that the text remains semantically coherent
      to a human reader but causes the classifier to produce a wrong output.

      The constraint analogues for text are: token edit distance (the number of token substitutions,
      analogous to L0), and semantic similarity (the cosine distance between sentence embedding
      vectors, analogous to L2). A text adversarial attack is constrained when the edit distance
      is at most k substitutions and the semantic similarity to the original text is above a
      threshold theta. These constraints ensure the adversarial text remains meaningful and
      approximately semantically equivalent to a human reader while fooling the classifier.

      The search strategy also changes. Continuous-space attacks use gradient descent to find the
      optimal perturbation. Discrete-space attacks use gradient information to guide search (HotFlip)
      or use greedy combinatorial search with a black-box classifier oracle (TextFooler) or use a
      language model to propose natural substitutions (BERT-Attack). Each approach makes a different
      trade-off between naturalness, query budget, and required access to the target classifier.

  part_2:
    title: 'HotFlip: The Text Analogue of FGSM'
    body: |
      HotFlip (Ebrahimi et al. 2018) is the closest text analogue to FGSM: a gradient-based
      attack that identifies the single token substitution that most increases the classifier loss,
      and applies it. The key insight is that while token indices are discrete, the classifier
      operates on token embeddings which are continuous. The gradient of the loss with respect to
      the embedding at position i provides the direction in embedding space that most increases loss.

      For a classifier that operates on character-level one-hot encodings, the Jacobian
      J_i = nabla_{e_i} L gives the loss sensitivity with respect to the embedding at position i.
      Flipping character t_i to character t_j changes the embedding from e_{t_i} to e_{t_j},
      producing a change in loss of approximately (e_{t_j} - e_{t_i})^T * J_i. The best flip at
      position i is: argmax_j (e_{t_j} - e_{t_i})^T * J_i -- the token t_j whose embedding is
      most aligned with the gradient direction from the current embedding e_{t_i}.

      HotFlip evaluates all vocabulary tokens at each position and finds the (position, token)
      pair that maximally increases the loss in a single substitution. It then applies that
      substitution and iterates. Like FGSM, it is fast (one forward-backward pass per step)
      and like FGSM, it is suboptimal because it does not account for interactions between
      multiple substitutions. TextFooler''s word-level greedy search typically produces
      more semantically coherent adversarial examples, and BERT-Attack produces more
      contextually natural ones, but HotFlip is the analytically cleanest text attack
      and the most direct translation of the FGSM primitive.

  part_3:
    title: 'TextFooler: Greedy Word Substitution with Semantic Constraint'
    body: |
      TextFooler (Jin et al. 2020) is a black-box word-substitution attack that requires only
      the classifier''s output probabilities, no gradient access. The algorithm has three phases.

      Phase 1 -- Word importance ranking: for each word w_i in the input text, delete w_i from
      the text and measure how much the classifier''s confidence in the correct class drops. Words
      whose deletion causes the largest confidence drop are the most important to the classifier''s
      decision and should be substituted first.

      Phase 2 -- Candidate substitution generation: for each important word w_i, find candidate
      synonyms from a pre-built counter-fitted word vector space (embeddings trained to push
      antonyms apart and pull synonyms together). Rank candidates by cosine similarity to w_i.
      Filter candidates that: (a) change the Part-Of-Speech tag of w_i (substituting a noun with
      a verb typically breaks grammaticality), or (b) produce a sentence whose overall semantic
      similarity to the original sentence falls below a threshold (typically 0.84 cosine similarity
      between sentence embeddings).

      Phase 3 -- Greedy substitution: for the remaining candidates, find the substitution that
      most reduces the classifier''s confidence in the correct class. Apply it. Repeat for the
      next most important word until the classifier is fooled or all important words have been
      processed.

      TextFooler produces adversarial text that is grammatically valid, semantically similar to
      the original, and POS-preserving -- it passes human evaluation as natural text in most
      cases. Its black-box nature (requires only output probabilities) makes it the relevant
      attack model for production safety classifiers and content moderation systems that expose
      confidence scores.

  part_4:
    title: 'BERT-Attack and Character-Level Attacks'
    body: |
      BERT-Attack (Li et al. 2020) improves on TextFooler''s candidate generation by using a masked
      language model (BERT) rather than a static synonym dictionary. The attack replaces each target
      word with [MASK] and queries BERT for the most likely tokens at that position. These candidates
      are contextually appropriate -- BERT considers the surrounding words and produces substitutions
      that fit grammatically and semantically into the sentence -- producing adversarial examples
      that are more natural-sounding than synonym substitution alone. The remaining attack structure
      (importance ranking, similarity filtering, greedy search) is similar to TextFooler.

      Character-level attacks operate below the word level and exploit a different vulnerability:
      classifier tokenisers and preprocessing pipelines that normalise text differently from how
      a human reads it. Three character-level attack families are practically relevant.

      Homoglyph substitution replaces visually identical Unicode characters for ASCII characters:
      the Cyrillic lowercase "а" (U+0430) looks identical to the Latin "a" (U+0061) but is a
      different byte sequence. A simple regex or keyword filter that matches "bad" does not match
      "bаd" (Cyrillic а). Many ML classifiers that were trained on ASCII/UTF-8 normalised text
      will tokenise the Cyrillic character differently (or map it to an out-of-vocabulary token),
      changing the input embedding and potentially evading the classifier.

      Zero-width character injection inserts invisible Unicode codepoints (zero-width joiner U+200D,
      zero-width non-joiner U+200C, zero-width no-break space U+FEFF) between characters. The
      text appears identical when rendered but contains different byte sequences. Regex-based
      detection is trivially bypassed; ML classifiers may or may not tokenise zero-width characters
      as separate tokens depending on the tokeniser implementation.

      Typosquatting introduces deliberate character transpositions, doubling, or omissions that
      preserve readability ("definately" for "definitely", "bomm" for "bomb") while evading
      exact-match detection. Combined with semantic similarity constraints, these produce adversarial
      text that humans consider equivalent to the original.

  part_5:
    title: 'Universal Adversarial Triggers: Automated Jailbreaks at Scale'
    body: |
      Wallace, Feng, Kandpal, Gardner, and Singh (2019) demonstrated universal adversarial triggers
      for NLP models: fixed sequences of tokens that, when appended to any input, cause the model
      to consistently output a specific wrong answer regardless of the input content. The attack is
      the text analogue of universal adversarial patches (Section 10.8): one perturbation that works
      universally rather than being optimised per input.

      The trigger search algorithm is gradient-guided. For each position in the trigger, compute the
      average gradient of the loss across many input examples with respect to the embedding at that
      trigger position. The best token for that position is the one whose embedding is most aligned
      with the gradient direction. Formally: for trigger position k, the best replacement is
      argmin_{t in V} ||e_t - (e_{trigger_k} + alpha * g_k)||_2 where g_k is the average gradient
      at position k across the batch. Iterate over all trigger positions and repeat until convergence.

      The resulting trigger is typically gibberish -- semantically meaningless token sequences that
      activate adversarial behaviour in the model. When appended to a sentiment analysis input, the
      trigger causes every sentence to be classified as negative regardless of its actual sentiment.
      When appended to a reading comprehension question, the trigger causes the model to produce a
      specific target answer regardless of the passage content.

      The connection to Chapter 7 is direct. Universal adversarial triggers are the automated
      implementation of what Chapter 7 Section 7.7 called "adversarial prompts (automated
      generation)": fixed text sequences that, when added to any user prompt, cause an LLM safety
      classifier to classify the content as safe regardless of what the content actually says.
      The human jailbreak engineer crafts triggers by intuition and iteration; the Wallace et al.
      algorithm searches for them automatically using gradients. Both produce the same class of
      adversarial input; the algorithm simply does it at scale.

  part_6:
    title: 'Adversarial Attacks on LLM Safety Classifiers'
    body: |
      LLM safety classifiers (content moderation, intent classifiers, safety filters) are the
      highest-value targets for text adversarial attacks in production. A successful adversarial
      attack on a safety classifier bypasses a security control rather than merely fooling a
      prediction -- the consequences are operational, not just academic.

      TextFooler-style attacks against content moderation systems substitute harmful content with
      synonyms or paraphrases that preserve the harmful intent but change the specific tokens
      that trigger the classifier. The adversarial text "I want to detonate an explosive device"
      becomes "I intend to ignite a combustive apparatus" -- the tokens are different, the semantic
      content is essentially identical, but a token-matching or TF-IDF-based classifier may not
      flag the second version.

      Universal adversarial triggers for safety filters are the most dangerous variant: a fixed
      token sequence (the trigger) can be prepended or appended to any harmful content, causing the
      safety classifier to classify the combined text as safe regardless of the harmful content.
      If such a trigger is discovered and published, any adversary can use it against any deployment
      using the same classifier.

      Character-level attacks (homoglyphs, zero-width characters) are particularly effective against
      safety filters that rely on keyword matching or have simple tokenisation: the harmful keywords
      are present in the text but are encoded differently. LLMs themselves typically handle Unicode
      normalisation correctly, but upstream preprocessing layers and regex-based filters may not.

      The connection to OWASP LLM01 (Section 6.2) is significant: adversarial attacks on safety
      classifiers are, from the defence perspective, a form of prompt injection where the injection
      is crafted by an automated optimiser rather than a human. The defences are different at the
      detection level (Track 7 semantic consistency checking vs Track 1-5 injection classifiers)
      but the upstream control (normalise and sanitise input before classification) overlaps.

  part_7:
    title: 'Detection: Semantic Consistency and Linguistic Anomaly Analysis'
    body: |
      The Track 7 consistency checker for text adversarial examples uses semantic consistency
      rather than pixel perturbation. For image inputs, the consistency checker submits N randomly
      perturbed image variants and checks if the prediction is stable. For text inputs, the
      analogue is back-translation: translate the text to an intermediate language (e.g., French)
      and back to English, producing a text that preserves semantic content but changes token
      identities. An adversarial text that is fragile -- whose adversarial classification depends
      on specific token choices rather than on the semantic content -- will have its classification
      restored by back-translation. A text whose classification reflects its genuine semantic
      content will survive back-translation with the same classification.

      A simpler consistency check is paraphrase: use a paraphrase generation model (or a round-trip
      through an LLM) to rephrase the input and check if the classification changes. TextFooler
      adversarial examples that succeeded by substituting specific synonyms often fail when the
      text is paraphrased, because the paraphrase introduces different synonyms. Universal adversarial
      triggers may survive paraphrase if the trigger tokens are preserved, but often the trigger is
      removed or modified by the paraphrase step.

      Unicode anomaly detection is the character-level counterpart. Check the input text for:
      non-ASCII characters in positions expected to contain ASCII (homoglyph detection), zero-width
      Unicode codepoints between characters, unusual byte sequences for the declared encoding, and
      character sequences that render visually as ASCII but are not ASCII. These patterns are
      strongly indicative of character-level adversarial text attacks and can be detected by
      byte-level analysis without any model forward pass.

      The combined detection ensemble for text adversarial examples uses: semantic consistency
      check (back-translation or paraphrase), Unicode anomaly analysis (byte-level), and the
      adversarial classifier trained to distinguish adversarial from natural text. Section 10.12
      extends the adversarial classifier to text features and Section 10.13 wires both text and
      image detection into the Track 7 gateway.

