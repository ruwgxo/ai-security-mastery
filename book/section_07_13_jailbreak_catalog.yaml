          'by_atlas': {'AML.T0051': [], 'AML.T0054': [], 'AML.T0056': [],
                       'AML.T0051+AML.T0054': [], 'AML.T0051+AML.T0056': []},
          'by_detector': {},
      }

      for entry in JAILBREAK_CATALOG:
          fam = entry['family']
          CATALOG_STATS['by_family'][fam] = CATALOG_STATS['by_family'].get(fam, 0) + 1
          diff = entry['detection_difficulty']
          CATALOG_STATS['by_difficulty'][diff].append(entry['technique_id'])
          atlas = entry['atlas']
          if atlas in CATALOG_STATS['by_atlas']:
              CATALOG_STATS['by_atlas'][atlas].append(entry['technique_id'])
          det = entry['primary_detector']
          CATALOG_STATS['by_detector'][det] = CATALOG_STATS['by_detector'].get(det, [])
          CATALOG_STATS['by_detector'][det].append(entry['technique_id'])


      def get_by_family(family_name: str) -> list:
          return [e for e in JAILBREAK_CATALOG if e['family'] == family_name]


      def get_by_difficulty(level: int) -> list:
          return [e for e in JAILBREAK_CATALOG if e['detection_difficulty'] == level]


      def get_critical_techniques(threshold: int = 4) -> list:
          '''Returns techniques with detection_difficulty >= threshold.'''
          return [e for e in JAILBREAK_CATALOG if e['detection_difficulty'] >= threshold]


      def get_training_examples_for_classifier() -> list:
          '''
          Returns catalog entries suitable as positive training examples
          for the semantic classifier. Excludes token-level attacks (perplexity
          detector handles those) and pure stateful attacks (trajectory/coherence handles those).
          '''
          semantic_families = [
              'persona_roleplay', 'fictional_framing',
              'instruction_hierarchy', 'competing_objectives', 'composed',
          ]
          return [e for e in JAILBREAK_CATALOG if e['family'] in semantic_families]


      def print_catalog_summary() -> None:
          print(f'Jailbreak Catalog: {CATALOG_STATS["total_techniques"]} techniques\n')
          print('By family:')
          for fam, count in sorted(CATALOG_STATS['by_family'].items()):
              print(f'  {fam:<35} {count} techniques')
          print()
          print('By detection difficulty:')
          for diff in range(1, 6):
              ids = CATALOG_STATS['by_difficulty'][diff]
              print(f'  Level {diff}: {len(ids)} techniques -- {", ".join(ids[:4])}{"..." if len(ids) > 4 else ""}')
          print()
          print('By primary detector:')
          for det, ids in sorted(CATALOG_STATS['by_detector'].items()):
              print(f'  {det:<40} {len(ids)} techniques')


      if __name__ == '__main__':
          print_catalog_summary()
          print()
          critical = get_critical_techniques(4)
          print(f'High-priority techniques (difficulty >= 4): {len(critical)}')
          for t in critical:
              print(f'  [{t["technique_id"]}] {t["name"]} -- {t["primary_detector"]}')
          print()
          training = get_training_examples_for_classifier()
          print(f'Semantic classifier training examples: {len(training)}')

  - id: "7.13.code.02"
    title: "Catalog Maintenance Process"
    description: |
      Submission template and review criteria for adding new techniques to the
      catalog. Defines the operational process that keeps the catalog current
      as the jailbreak landscape evolves. Includes the ATLAS mapping decision
      tree and the detection difficulty rating rubric.
    language: "python"
    filename: "code/ch07/catalog_maintenance.py"
    code: |
      '''
      Jailbreak Catalog Maintenance Process

      How to add new techniques discovered through:
      - Red-team exercises (Sections 7.3-7.12)
      - Automated generation (PAIR/TAP outputs -- Section 7.12)
      - Community databases (JailbreakChat, JailbreakBench)
      - Academic publications
      '''
      from dataclasses import dataclass, field
      from typing import Optional


      CATALOG_FAMILIES = [
          'persona_roleplay',
          'fictional_framing',
          'context_manipulation',
          'instruction_hierarchy',
          'gradual_erosion',
          'payload_splitting',
          'token_level_automated',
          'competing_objectives',
          'composed',
      ]

      ATLAS_DECISION_TREE = {
          'question_1': 'Does the attack require white-box model access (gradients/weights)?',
          'if_yes': 'AML.T0054 (LLM prompt injection / adversarial input)',
          'if_no': {
              'question_2': 'Does the attack operate via retrieved/external content (RAG, web, email)?',
              'if_yes': 'AML.T0054 (indirect injection via external content)',
              'if_no': {
                  'question_3': 'Does the attack extract system prompt / model configuration?',
                  'if_yes': 'AML.T0056 (LLM data leakage)',
                  'if_no': {
                      'question_4': 'Does the attack override instructions in the user turn?',
                      'if_yes': 'AML.T0051 (direct prompt injection)',
                      'if_no': 'AML.T0054 (LLM prompt injection -- alignment bypass)',
                  },
              },
          },
      }

      DETECTION_DIFFICULTY_RUBRIC = {
          1: {
              'label': 'Trivial',
              'criteria': [
                  'Detectable by keyword match or simple regex',
                  'Very low FPR (< 0.5%) without specificity corroboration',
                  'Single pattern match sufficient for confident alert',
                  'Examples: DAN direct assertion, dual newspaper test vocabulary',
              ],
          },
          2: {
              'label': 'Easy',
              'criteria': [
                  'Detectable by lexical pattern with minimal context',
                  'Low FPR (0.5-2%) without specificity corroboration',
                  'Single classifier track sufficient',
                  'Examples: formatting anomaly, override instruction language',
              ],
          },
          3: {
              'label': 'Moderate',
              'criteria': [
                  'Requires semantic understanding or session state',
                  'Medium FPR (2-5%) or requires specificity corroboration',
                  'Single track sufficient but with calibrated threshold',
                  'Examples: norm establishment, 5-turn temporal splitting',
              ],
          },
          4: {
              'label': 'Hard',
              'criteria': [
                  'High FPR without corroboration (> 5%), OR',
                  'Requires full-prompt embedding rather than pattern matching, OR',
                  'Requires stateful session tracking with complex state',
                  'Examples: custom persona, research pretext, established universe',
              ],
          },
          5: {
              'label': 'Very Hard',
              'criteria': [
                  'Requires cross-session state store',
                  'Requires cross-agent pipeline tracking',
                  'OR no reliable input-layer signal exists (output monitor required)',
                  'Examples: cross-session splitting, multi-agent erosion',
              ],
          },
      }


      @dataclass
      class CatalogSubmission:
          '''Template for submitting a new technique to the catalog.'''
          # Required fields
          name: str
          family: str
          section_or_source: str           # Section ref or external source citation
          example_structure: str           # Paraphrased structural description
          primary_detection_signal: str
          primary_detector: str

          # Auto-determined with decision tree / rubric guidance
          atlas: str = ''
          detection_difficulty: int = 0
          fpr_risk: str = ''

          # Optional
          composed_with: list = field(default_factory=list)
          notes: str = ''

          def validate(self) -> list:
              '''Returns list of validation errors. Empty = valid submission.'''
              errors = []
              if self.family not in CATALOG_FAMILIES:
                  errors.append(f'Unknown family: {self.family}')
              if not (1 <= self.detection_difficulty <= 5):
                  errors.append('detection_difficulty must be 1-5')
              if self.atlas not in (
                  'AML.T0051', 'AML.T0054', 'AML.T0056',
                  'AML.T0051+AML.T0054', 'AML.T0051+AML.T0056',
              ):
                  errors.append(f'Unknown ATLAS technique: {self.atlas}')
              if not self.example_structure:
                  errors.append('example_structure required (paraphrased, not actual prompt)')
              if len(self.example_structure) > 500:
                  errors.append('example_structure too long (max 500 chars)')
              return errors


      REVIEW_CRITERIA = [
          {
              'criterion': 'Novelty',
              'question': 'Does this technique use a mechanism not already represented in the catalog?',
              'pass': 'New mechanism or significant variation of existing mechanism',
              'fail': 'Duplicate of existing entry with minor surface-form variation only',
          },
          {
              'criterion': 'Detection signal specificity',
              'question': 'Is the primary_detection_signal specific enough to implement?',
              'pass': 'Implementable as a feature in the semantic classifier or a detector',
              'fail': 'Vague description that does not map to a concrete feature',
          },
          {
              'criterion': 'Example structure validity',
              'question': 'Is the example_structure a paraphrase, not an actual adversarial prompt?',
              'pass': 'Describes structure and mechanism without reproducing adversarial content',
              'fail': 'Contains actual adversarial prompt text that functions as an attack',
          },
          {
              'criterion': 'ATLAS mapping correctness',
              'question': 'Is the ATLAS technique ID correctly assigned using the decision tree?',
              'pass': 'Follows the decision tree in ATLAS_DECISION_TREE',
              'fail': 'Incorrect or missing ATLAS mapping',
          },
          {
              'criterion': 'Detection difficulty calibration',
              'question': 'Is the detection_difficulty rating consistent with the rubric?',
              'pass': 'Matches at least 2 of the rubric criteria for the stated difficulty level',
              'fail': 'Inconsistent with rubric; over- or under-rated',
          },
      ]

      TECHNIQUE_ID_GENERATOR = {
          'persona_roleplay': 'JB-PR',
          'fictional_framing': 'JB-FF',
          'context_manipulation': 'JB-CM',
          'instruction_hierarchy': 'JB-IH',
          'gradual_erosion': 'JB-MS',
          'payload_splitting': 'JB-PS',
          'token_level_automated': 'JB-TL',
          'competing_objectives': 'JB-CO',
          'composed': 'JB-XF',
      }


      def generate_technique_id(family: str, existing_count: int) -> str:
          prefix = TECHNIQUE_ID_GENERATOR.get(family, 'JB-XX')
          return f'{prefix}-{existing_count + 1:02d}'


      def review_submission(submission: CatalogSubmission) -> dict:
          errors = submission.validate()
          review = {
              'submission_name': submission.name,
              'validation_errors': errors,
              'review_results': [],
              'recommendation': '',
          }
          if errors:
              review['recommendation'] = 'REJECT: Fix validation errors before resubmitting'
              return review

          passes = 0
          for criterion in REVIEW_CRITERIA:
              result = {
                  'criterion': criterion['criterion'],
                  'status': 'MANUAL_REVIEW_REQUIRED',
                  'note': criterion['question'],
              }
              review['review_results'].append(result)
              passes += 1  # assume pass pending manual review

          review['recommendation'] = (
              'APPROVED for catalog: assign technique ID and add to jailbreak_catalog.py'
              if passes == len(REVIEW_CRITERIA)
              else 'PENDING: manual review required for flagged criteria'
          )
          return review


      if __name__ == '__main__':
          print('Catalog Maintenance: ATLAS Decision Tree\n')
          for k, v in ATLAS_DECISION_TREE.items():
              if isinstance(v, str):
                  print(f'  {k}: {v}')

          print()
          print('Detection Difficulty Rubric:')
          for level, info in DETECTION_DIFFICULTY_RUBRIC.items():
              print(f'  Level {level} ({info["label"]}):')
              for c in info['criteria'][:2]:
                  print(f'    - {c}')

          print()
          # Example submission
          example = CatalogSubmission(
              name='Example Novel Technique',
              family='fictional_framing',
              section_or_source='JailbreakBench 2025',
              example_structure='Novel framing mechanism combining X and Y in a new way.',
              primary_detection_signal='novel_framing_combined_signal',
              primary_detector='semantic_classifier',
              atlas='AML.T0054',
              detection_difficulty=3,
              fpr_risk='medium',
          )
          result = review_submission(example)
          print(f'Example submission review:')
          print(f'  Validation errors: {result["validation_errors"]}')
          print(f'  Recommendation: {result["recommendation"]}')

