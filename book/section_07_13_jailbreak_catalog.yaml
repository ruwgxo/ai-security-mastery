# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "61 techniques across 8 families is a representative sample covering the\
    \ detection signal space, not a comprehensive enumeration. The catalog is\
    \ a living document -- the maintenance process in catalog_maintenance.py\
    \ is how it stays current."
  - "Detection difficulty drives investment priority. 12 techniques at difficulty\
    \ 4-5 require the most sophisticated controls: cross-session state stores,\
    \ full-prompt embedding, or output monitoring. These are where residual risk\
    \ concentrates."
  - "Cross-family composition (JB-XF) is the adversary's force multiplier.\
    \ 8 composed patterns require joint conditions across multiple ensemble tracks.\
    \ Individual family defences fail against them; the full ensemble is required."
  - "The catalog maps directly to the Section 7.14 ensemble design: every\
    \ technique has a primary_detector, every primary_detector is one of the\
    \ five tracks. The catalog is the specification document for ensemble\
    \ feature engineering."
  - "ATLAS mapping follows the decision tree: delivery mechanism determines the\
    \ technique ID. Jailbreaks in the user turn are AML.T0054. Extraction attempts\
    \ are AML.T0056. Direct instruction overrides are AML.T0051. Composed attacks\
    \ carry compound IDs."
  - "get_training_examples_for_classifier() provides the positive example set\
    \ for the semantic classifier. The 46 entries from semantic families (persona,\
    \ fictional, hierarchy, competing objective, composed) are the training signal\
    \ for the classifier built in Section 7.14."

