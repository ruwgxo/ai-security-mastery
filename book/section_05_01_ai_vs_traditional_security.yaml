section_content:

  # --------------------------------------------------------------------------
  # 5.1.1 — The Starting Point: How We Think About Traditional Systems
  # --------------------------------------------------------------------------

  subsection_01:
    number: "5.1.1"
    title: "The Starting Point: How We Think About Traditional Systems"

    content: |
      Before we can understand what changes with AI, we need to be precise about
      what traditional software security assumes. These assumptions are so deeply
      embedded in security practice that most engineers never articulate them. Once
      AI violates them, the mismatch becomes obvious — but only if you knew the
      assumption was there in the first place.

      Traditional security is built on four foundational assumptions:

      ASSUMPTION 1 — DETERMINISM
        Given the same input, a traditional system produces the same output. A web
        application that returns HTTP 200 for a valid login today returns HTTP 200
        for the same credentials tomorrow. This lets us write tests with expected
        outputs, write signatures for known-bad inputs, and reason about system
        state with confidence.

      ASSUMPTION 2 — CODE IS THE BEHAVIOUR
        The behaviour of a traditional system is entirely encoded in its source code
        and configuration. If you can read the code (or the compiled binary), you can
        in principle enumerate all possible system behaviours. Static analysis, binary
        hardening, and code review work because of this assumption.

      ASSUMPTION 3 — INPUTS ARE STRUCTURALLY TYPED
        Network packets, HTTP requests, SQL queries — these have defined schemas.
        Validation means checking structure: is this a valid JSON? Does this field
        match the expected regex? Input validation is tractable because the space of
        valid inputs is bounded and describable.

      ASSUMPTION 4 — PATCHES ARE BINARY REPLACEMENTS
        When a vulnerability is found, the fix is to change the code and deploy the
        new binary. The old behaviour is gone. CVE databases track known-bad code
        versions. Patch management is about keeping binaries current.

      These four assumptions underpin virtually every security control built in the
      last three decades: firewalls, WAFs, IDS/IPS, SAST, DAST, fuzzing, antivirus,
      CVE scanners, penetration testing methodologies. All of them assume determinism,
      code-as-behaviour, typed inputs, and binary patchability.

      AI systems violate all four. Not partially — completely.

  # --------------------------------------------------------------------------
  # 5.1.2 — What AI Systems Are: Learned Behaviour from Data
  # --------------------------------------------------------------------------

  subsection_02:
    number: "5.1.2"
    title: "What AI Systems Are: Learned Behaviour from Data"

    content: |
      An AI model is not a program in the traditional sense. It is a mathematical
      function with billions of numeric parameters, where those parameters were not
      written by a programmer but learned from data through an optimisation process.

      The behaviour of the model — what it does given any input — is entirely
      determined by two things:

        1. The training data it was exposed to
        2. The optimisation process that shaped its parameters

      Neither of these is code. Neither is auditable with a code review. Neither
      can be patched with a binary replacement.

      To make this concrete: the weights of a 7-billion parameter LLaMA-3 model
      occupy approximately 14GB of disk space as 16-bit floats. That 14GB of
      numeric values is the entire behaviour of the model. There is no readable
      logic. There is no if-statement specifying how the model responds to a given
      input. The behaviour is distributed across every weight in every attention
      head in every layer.

      This creates a security engineering environment that looks like this:

      traditional_security_environment:
        behaviour_source: "source code + configuration"
        auditability: "static analysis, code review, binary inspection"
        behaviour_change: "code commit + deploy"
        input_space: "typed, schema-defined"
        output_space: "bounded, enumerable for a given input"
        patch_mechanism: "replace binary"
        regression_testing: "unit tests with deterministic expected output"

      ai_security_environment:
        behaviour_source: "training data + optimisation process + architecture"
        auditability: "interpretability research (partial, imprecise, expensive)"
        behaviour_change: "retrain or fine-tune (days to weeks of compute)"
        input_space: "untyped natural language — effectively unbounded"
        output_space: "probabilistic — same input produces different outputs"
        patch_mechanism: "retrain, fine-tune, or add guardrail layer"
        regression_testing: "empirical evaluation on test distributions (never complete)"

      The security engineer who walks into an AI system review must rebuild their
      mental model from this table. Not adapt it — rebuild it.

  # --------------------------------------------------------------------------
  # 5.1.3 — The New Attack Primitives: Gradients, Training Data, Latent Space
  # --------------------------------------------------------------------------

  subsection_03:
    number: "5.1.3"
    title: "The New Attack Primitives: Gradients, Training Data, and Latent Space"

    content: |
      In traditional security, the attack primitives are well-understood: buffer
      overflows exploit memory layout assumptions, SQL injection exploits string
      concatenation in query construction, XSS exploits improper output encoding.
      These primitives have been catalogued for decades.

      AI systems introduce three attack primitives that have no equivalent in
      traditional software security.

      PRIMITIVE 1 — THE GRADIENT
        As you learned in Chapters 1 and 2, model training works by computing the
        gradient of the loss function with respect to model parameters and using that
        gradient to update weights. The gradient tells you, for any given input and
        model, in which direction to move the input to increase or decrease the loss.

        This is a double-edged sword. The same gradient computation that trains a
        model can be used by an adversary to craft inputs that cause the model to
        behave incorrectly. Given access to the model (white-box) or its outputs
        (black-box with gradient estimation), an adversary can compute:

          adversarial_input = original_input + ε × sign(∇_x L(x, y_target))

        This is the Fast Gradient Sign Method (FGSM) from Chapter 2. The key insight
        is that the adversary does not need to find a bug in code. They need to find
        a direction in input space that the model's learned behaviour classifies
        incorrectly. That direction exists for almost every model.

        Traditional equivalent: there is none. The closest analogy is SQL injection,
        but even that requires a structural flaw in query construction. Adversarial
        examples require no flaw — they exploit the fundamental nature of how
        gradient-based models generalise.

      PRIMITIVE 2 — TRAINING DATA POISONING
        Because model behaviour is learned from data, whoever influences the training
        data influences the model's behaviour. This is not a software vulnerability.
        There is no CVE. There is no buffer overflow. The model simply learned what
        it was taught — but what it was taught was carefully crafted by an adversary.

        Three poisoning approaches matter for security engineers:

          label_flipping:
            what: "Change ground-truth labels for targeted samples"
            effect: "Model misclassifies specific inputs in production"
            detection_difficulty: "High — data looks valid, labels look plausible"

          backdoor_insertion:
            what: "Add trigger pattern (e.g. a rare token) to samples with target label"
            effect: "Model behaves normally except when trigger appears — then follows attacker's intent"
            detection_difficulty: "Very high — model passes all standard evaluations"

          gradient_manipulation:
            what: "Craft poisoned samples that maximise gradient impact on specific parameters"
            effect: "Targeted degradation of specific model capabilities"
            detection_difficulty: "Extremely high — samples appear normal to human review"

        Traditional equivalent: the closest is a supply chain compromise of a software
        dependency. But dependency compromise is detectable via hash verification. A
        poisoned training sample that looks valid is not.

      PRIMITIVE 3 — LATENT SPACE MANIPULATION
        Models represent all inputs as vectors in a high-dimensional embedding space
        (the latent space you explored in Chapter 3). Inputs that appear semantically
        different to a human may be very close together in latent space — and inputs
        that appear semantically similar may be far apart.

        Adversaries exploit this mismatch. An adversarial example is a point in
        input space that:
          - Appears benign to a human reviewer (similar to original)
          - Maps to a different region of latent space (close to target class)
          - Causes the model to predict the target class

        For LLMs, this manifests as prompt injection: carefully crafted text that
        appears to be legitimate user input but occupies a region of the model's
        latent space associated with instruction-following rather than content-answering.
        The model cannot tell the difference because in the latent space, they are
        adjacent.

        Traditional equivalent: there is no equivalent. Traditional systems process
        inputs by explicit parsing rules, not geometric proximity in learned
        representation spaces.

  # --------------------------------------------------------------------------
  # 5.1.4 — Why CVE-Style Patching Fails for AI
  # --------------------------------------------------------------------------

  subsection_04:
    number: "5.1.4"
    title: "Why CVE-Style Patching Fails for AI"

    content: |
      The CVE process assumes a vulnerability has a specific location in code that
      can be identified, fixed, and deployed. The fix is precise, bounded, and
      verifiable. Version 1.2.3 is vulnerable; version 1.2.4 is not. Verify by
      checking binary version.

      AI vulnerabilities violate every aspect of this model.

      PROBLEM 1 — NO SPECIFIC LOCATION
        A jailbreak vulnerability is not located in any single weight or layer.
        It is an emergent property of the interaction between the model's learned
        representations, the training objective, and the adversarial input. You cannot
        point to a line number. You cannot isolate the responsible parameter. The
        "vulnerability" is distributed across billions of parameters that collectively
        produce an undesired output for a specific input class.

      PROBLEM 2 — NO BINARY FIX
        Fixing a jailbreak vulnerability requires changing the model's behaviour for
        the adversarial input class without degrading its behaviour for legitimate inputs.
        This requires either:
          (a) Retraining from scratch with improved alignment (weeks of compute, millions of dollars)
          (b) Fine-tuning on adversarial examples (days of compute, risk of capability regression)
          (c) Adding a guardrail layer (fast but arms-race with adversaries)

        Option (c) is what most organisations do in practice. But a guardrail layer is
        not a patch — it is a detection control layered over an unpatched vulnerability.
        The model still has the capability; the guardrail just catches most attempts.

      PROBLEM 3 — NO VERSION BOUNDARY
        For traditional software, "fixed in version X" is meaningful. For AI models,
        a fine-tuned model that addresses one jailbreak pattern may introduce regressions
        on other safety properties. There is no guarantee that the "patched" model is
        strictly safer. Evaluations on known-bad inputs improve; evaluations on unknown
        adversarial inputs may get worse. The safety property is not a binary — it is
        a continuous distribution.

      PROBLEM 4 — EMERGENT RE-EMERGENCE
        A jailbreak technique that was rendered ineffective by model version N may
        become effective again on model version N+1 if the updated model has higher
        capability in the relevant domain. Jailbreaks against GPT-3 that were patched
        re-emerged on GPT-4 in adapted forms. The CVE does not expire — it mutates.

      practical_implication: |
        Security programs for AI systems cannot be built on the patch-and-verify cycle
        that works for traditional software. They must be built on continuous monitoring,
        detection engineering, and behavioural testing pipelines. You cannot verify
        security by checking a version number. You verify it by running an adversarial
        evaluation suite — and even then you have only partial coverage.

        This is exactly why Part 3 of this book (Detection Engineering for AI) is the
        core of the program. Patching is not reliable. Detection and response is.

  # --------------------------------------------------------------------------
  # 5.1.5 — Defense Primitives: What Transfers and What Does Not
  # --------------------------------------------------------------------------

  subsection_05:
    number: "5.1.5"
    title: "Defense Primitives: What Transfers and What Does Not"

    content: |
      Not everything changes. Some traditional security controls apply directly to
      AI systems. Knowing which ones transfer allows you to build on your existing
      program rather than starting from scratch. Knowing which ones do not transfer
      prevents you from building false confidence in ineffective controls.

      CONTROLS THAT TRANSFER DIRECTLY:

        access_control:
          traditional_form: "RBAC, ABAC, API key management, OAuth"
          ai_application: "Who can call the LLM API? Who can submit training jobs? Who
            can download model weights? Access control on the AI system perimeter is
            identical to access control on any API."
          confidence: "High — standard IAM controls apply without modification"

        authentication:
          traditional_form: "API keys, mutual TLS, JWT"
          ai_application: "LLM API authentication is standard REST API authentication.
            The model itself does not authenticate callers — the API gateway does."
          confidence: "High — no AI-specific changes needed"

        audit_logging:
          traditional_form: "Structured logs, SIEM ingestion, retention policies"
          ai_application: "Every LLM API call should be logged: timestamp, user ID,
            input tokens (or hash), output tokens (or hash), latency, model version.
            This is standard logging practice applied to a new endpoint type."
          confidence: "High — same tools, same process, new log schema"

        rate_limiting:
          traditional_form: "Request-per-second limits, IP-based throttling"
          ai_application: "Token-per-minute limits, user-based cost budgets, request
            frequency limits. The unit changes (tokens not requests) but the control
            principle is identical."
          confidence: "High — same pattern, parameterised differently"

        network_segmentation:
          traditional_form: "VPC isolation, firewall rules, private subnets"
          ai_application: "Training clusters should be network-isolated. Model weights
            should not be accessible from the internet. Inference endpoints should be
            behind an API gateway, not directly exposed."
          confidence: "High — standard network controls apply"

        secret_management:
          traditional_form: "Vault, AWS Secrets Manager, environment variable hygiene"
          ai_application: "LLM API keys, training data credentials, model registry
            tokens. Same tools, same process."
          confidence: "High — no AI-specific changes needed"

      CONTROLS THAT DO NOT TRANSFER (OR TRANSFER POORLY):

        static_analysis:
          traditional_form: "SAST tools that scan source code for vulnerability patterns"
          ai_limitation: "Model behaviour is not in source code. You cannot SAST a
            14GB weight file. Static analysis of the model training code finds bugs in
            the pipeline, not vulnerabilities in the model's learned behaviour."
          what_replaces_it: "Behavioural evaluation suites, red-teaming, adversarial
            test sets"
          confidence: "Low — do not rely on SAST for model behaviour security"

        signature_based_detection:
          traditional_form: "AV signatures, WAF rules, IDS/IPS signatures"
          ai_limitation: "Adversarial inputs do not have fixed signatures. A jailbreak
            that works as 'Ignore previous instructions and...' has ten thousand
            semantically equivalent variants. Blocking the literal string blocks one
            variant. Adversaries trivially rotate."
          what_replaces_it: "ML-based classifiers, semantic similarity detection,
            behavioural anomaly detection"
          confidence: "Low — signatures are necessary but not sufficient"

        binary_integrity_verification:
          traditional_form: "Hash-based verification that a deployed binary matches
            the expected version"
          ai_limitation: "A model weight file that hashes correctly may still be a
            backdoored version if the backdoor was inserted during training. Hash
            verification confirms you have the file you expected, not that the file
            is safe."
          what_replaces_it: "Training provenance documentation, reproducible training,
            behavioural evaluation of model outputs"
          confidence: "Partial — hash the weights, but also evaluate behaviour"

        fuzzing:
          traditional_form: "Generate random inputs to find crashes and unexpected
            behaviours in programs"
          ai_limitation: "LLMs do not crash on unexpected inputs — they generate
            outputs. What you are looking for is unexpected output content, not
            exceptions. Random token sequences do not efficiently find adversarial
            inputs."
          what_replaces_it: "Adversarial prompt generation, structured red-teaming,
            automated jailbreak search (covered in Chapter 7)"
          confidence: "Low in traditional form — adapted forms are useful"

        penetration_testing_as_point_in_time_assessment:
          traditional_form: "Annual pentest to identify vulnerabilities at a moment
            in time"
          ai_limitation: "LLM vulnerabilities are model-version-specific. A pentest
            against GPT-4-turbo-2024-04-09 does not cover GPT-4-turbo-2024-11-01.
            Fine-tuning changes the attack surface. New jailbreak research publishes
            monthly."
          what_replaces_it: "Continuous adversarial evaluation pipelines, automated
            regression testing against known attack patterns, model version change
            reviews"
          confidence: "Low as sole control — pentest supplements continuous evaluation"

  # --------------------------------------------------------------------------
  # 5.1.6 — The Non-Determinism Problem
  # --------------------------------------------------------------------------

  subsection_06:
    number: "5.1.6"
    title: "The Non-Determinism Problem"

    content: |
      Consider this Python function:

        def process_login(username: str, password: str) -> bool:
            return check_credentials(username, hash(password))

      If this function returns True for the input ("admin", "password123") in
      production at 9:00 AM, it will return True for the same input at 9:01 AM.
      The output is deterministic given the input. This determinism is foundational
      to how we test, verify, and reason about traditional software.

      Now consider an LLM:

        user_prompt = "Is this SQL injection? ' OR '1'='1"
        response_1 = llm.complete(user_prompt)  # "Yes, this appears to be SQL injection"
        response_2 = llm.complete(user_prompt)  # "This looks like a SQL injection attempt"
        response_3 = llm.complete(user_prompt)  # "Yes, the pattern ' OR '1'='1 is classic injection"

      Three calls, same input, three different outputs. All three are correct. But
      if a jailbreak attempt yields a safe response at temperature=0.7, that does not
      mean the same prompt yields a safe response in all future calls. The probabilistic
      nature of the output creates an entirely different evaluation problem.

      security_implications_of_non_determinism:

        testing_coverage:
          problem: |
            You cannot enumerate all behaviours for a given input. A red-teamer who
            probes a jailbreak 100 times and gets safe responses 100 times has not
            proven safety — they have established a lower bound on the safe-response
            rate. The jailbreak may succeed 1% of the time. At scale (millions of
            calls per day), 1% is a critical vulnerability.
          implication: |
            Adversarial evaluation must report failure rates, not binary pass/fail.
            A control is not 'safe' — it has a false negative rate under adversarial
            inputs. That rate must be measured and monitored.

        detection_baseline:
          problem: |
            Anomaly detection requires a baseline of normal behaviour. For deterministic
            systems, the baseline is exact: request X produces response Y. For LLMs,
            the baseline is distributional: request class A produces responses in
            distribution D_A. Detecting anomalies means detecting when outputs fall
            outside the expected distribution — much harder to specify precisely.
          implication: |
            Behavioural baselines for LLMs must be statistical distributions over
            response characteristics (length, sentiment, topic, entity types present)
            not exact output signatures. This is covered in Chapter 13.

        incident_response:
          problem: |
            When a traditional system is exploited, you can capture the input and
            reproduce the exploit deterministically for forensic analysis. For an LLM,
            you may not be able to reproduce the exact behaviour that was exploited.
            The same prompt may produce a safe response the second time.
          implication: |
            Forensic analysis of LLM incidents must rely on logged outputs, not
            reproduction. Log completeness is non-negotiable. The log is the evidence.

        temperature_as_attack_surface:
          problem: |
            LLM inference temperature controls output randomness. High temperature =
            more random = broader sampling from the probability distribution. Some
            jailbreaks are more effective at high temperature because they rely on
            the model occasionally sampling from low-probability completions that
            violate safety constraints.
          implication: |
            Temperature is a security-relevant parameter, not just a user experience
            knob. Production LLM deployments should document and control temperature
            settings. Adversaries may probe high-temperature endpoints specifically.

  # --------------------------------------------------------------------------
  # 5.1.7 — Emergent Behaviour: Capabilities and Vulnerabilities You Did Not Train For
  # --------------------------------------------------------------------------

  subsection_07:
    number: "5.1.7"
    title: "Emergent Behaviour: Capabilities and Vulnerabilities You Did Not Train For"

    content: |
      Chapter 4 introduced emergent capabilities: abilities that appear in large
      models that were not explicitly trained for and were not present in smaller
      models. GPT-3 exhibited chain-of-thought reasoning. GPT-4 exhibited multi-step
      mathematical reasoning. These capabilities emerged from scale — no one designed
      them; they appeared.

      The security implication is severe: if capabilities can emerge without being
      designed, vulnerabilities can emerge without being anticipated.

      documented_emergent_vulnerability_examples:

        multi_step_reasoning_enabling_complex_jailbreaks:
          description: |
            When models gain the ability to follow multi-step instructions, they also
            gain the ability to follow multi-step jailbreak instructions. GPT-3 could
            be jailbroken with simple role-play. GPT-4, with its superior instruction
            following, can be given an elaborate multi-step scenario that eventually
            guides it to produce harmful output through a chain of individually
            acceptable steps. Better reasoning = better at following all instructions,
            including adversarial ones.

        in_context_learning_enabling_capability_injection:
          description: |
            The emergent ability to learn from a few examples in the prompt (Chapter 4
            in-context learning) also creates the ability for adversaries to inject
            capabilities via carefully crafted examples. An adversary who includes
            three examples of "AI system that provides harmful information" in their
            prompt is using in-context learning as a jailbreak primitive. Smaller
            models without strong in-context learning are less vulnerable to this
            specific technique.

        code_execution_capability_enabling_tool_abuse:
          description: |
            When LLMs gained the ability to write functional code, applications began
            using them to generate and execute code. This created an emergent attack
            surface: an LLM that can write code that runs can be prompted to write
            malicious code. The code execution vulnerability was not present in
            text-only completion models — it emerged when the capability was paired
            with an execution environment.

        long_context_comprehension_enabling_indirect_injection:
          description: |
            As context windows expanded to 128K+ tokens (Chapter 4, context windows),
            applications began feeding entire documents, emails, and web pages to LLMs
            for processing. This created indirect prompt injection (OWASP LLM01): an
            adversary who can place text in a document, email, or web page that the
            LLM will read can inject instructions into the LLM's context. This attack
            surface did not exist when context windows were 512 tokens. It emerged
            with long-context capability.

      security_engineering_response_to_emergence:

        principle_1_capability_implies_attack_surface:
          statement: "Every new capability you deploy is a new attack surface to assess"
          application: |
            Before enabling a new LLM feature (web browsing, code execution, email
            sending), the security team must threat-model the capability specifically.
            The question is not 'what does this feature do?' but 'what can an adversary
            do with this feature given control of the inputs?'

        principle_2_evaluate_at_capability_boundaries:
          statement: "Evaluate models when capabilities change, not just on a calendar"
          application: |
            A model upgrade from version X to version Y may introduce emergent
            capabilities that create new attack surfaces. The security evaluation cycle
            must be triggered by model version changes, not just quarterly or annual
            schedules.

        principle_3_monitor_for_unexpected_outputs:
          statement: "Production monitoring must flag semantically unexpected outputs"
          application: |
            If your LLM deployment suddenly begins producing outputs in a category that
            was not previously observed (e.g. a customer service bot begins producing
            code, or a summarisation tool begins asking questions back), this deviation
            may indicate emergent capability being exploited. Behavioural monitoring
            must have coverage on output semantics, not just output format.

  # --------------------------------------------------------------------------
  # 5.1.8 — The Security Engineer's Mental Model for AI Systems
  # --------------------------------------------------------------------------

  subsection_08:
    number: "5.1.8"
    title: "The Security Engineer's Mental Model for AI Systems"

    content: |
      Everything above leads to a specific mental model for how to approach security
      of AI systems. This model replaces the traditional "find the bug, patch the bug"
      paradigm with something more continuous, more probabilistic, and more
      data-centric.

      THE REVISED MENTAL MODEL — FOUR PILLARS:

      PILLAR 1 — DATA IS CODE
        In traditional systems, the distinction between data and code is fundamental.
        Code executes; data is processed. The boundary is enforced by the CPU
        (non-executable memory), the OS (DEP/NX), and application design (parameterised
        queries, output encoding).

        In AI systems, this distinction does not exist at the model level. Training
        data shapes model behaviour exactly as code shapes program behaviour. A poisoned
        training sample is equivalent to a modified line of code — it changes what the
        system does. An adversarial prompt is equivalent to a code injection — it changes
        what the system does right now, without modifying the model.

        Security implication: apply the same rigour to data pipelines that you apply
        to code pipelines. Data provenance, integrity verification, anomaly detection
        in training datasets, and access control on training data are security controls,
        not data engineering concerns.

      PILLAR 2 — BEHAVIOUR IS A DISTRIBUTION, NOT A FUNCTION
        Traditional systems map inputs to outputs deterministically. AI systems map
        input distributions to output distributions. Security properties must be
        specified and evaluated statistically.

        Instead of: "Does the system allow SQL injection? Yes/No"
        Ask: "What is the model's jailbreak success rate across a representative
        adversarial input distribution? How does this rate change across model versions?"

        Security implication: build evaluation infrastructure, not just evaluation
        snapshots. Continuous adversarial evaluation pipelines, statistical monitoring
        of output distributions, and quantified failure rates replace point-in-time
        pentests as the primary assurance mechanism.

      PILLAR 3 — THE GRADIENT IS THE ATTACK VECTOR
        For any gradient-based model, the gradient of the loss with respect to the
        input is the attack vector. Understanding this requires the Chapter 1-2
        foundation. But the security engineer's version is simpler: any system that
        learns from feedback — gradients during training, RLHF rewards during alignment,
        in-context examples during inference — can have that learning process directed
        by an adversary.

        Ask of every AI component: "What is this component learning from? Who controls
        that signal? Can an adversary influence it?"

        Security implication: access control on feedback signals is a security control.
        Who can submit training data? Who can provide RLHF preference labels? Who can
        place content in documents that the LLM will process? Each of these is a
        gradient-equivalent attack surface.

      PILLAR 4 — DETECTION AND RESPONSE REPLACE PREVENTION AS PRIMARY CONTROL
        Traditional security aspires to prevention: keep the attacker out. When
        prevention fails, detection and response are the fallback. For AI systems,
        the relationship inverts. Many AI vulnerabilities — adversarial inputs,
        prompt injection, emergent exploitation — cannot be fully prevented by
        any current technique. Detection and response are the primary control.

        This is not a counsel of despair. It is a recognition that the AI security
        program looks less like a firewall program and more like a SOC program.
        The deliverable is not a secure system that can never be exploited — it is a
        monitored system where exploitation is detected quickly and responded to
        effectively.

        Security implication: detection engineering for AI (Part 3 of this book) is not
        a secondary or complementary control — it is the primary assurance mechanism.
        Build the detection program first. Build prevention controls second.

  # --------------------------------------------------------------------------
  # 5.1.9 — What to Unlearn: Common Mental Model Traps
  # --------------------------------------------------------------------------

  subsection_09:
    number: "5.1.9"
    title: "What to Unlearn: Common Mental Model Traps"

    content: |
      Experienced security engineers carry mental models built over years of
      successful practice. These models are assets when applied to the right domain.
      Applied to AI systems, they become liabilities. The following traps are the
      most common — and the most dangerous — because they feel correct.

      TRAP 1 — "WE BLOCKED THE KNOWN JAILBREAKS, SO WE ARE SAFE"
        Traditional equivalent: "We patched all known CVEs, so we are secure."
        Why it fails for AI: Jailbreaks are not enumerable. Every month, researchers
        publish new techniques. Every deployed model version may enable techniques that
        were ineffective before. Blocking known jailbreaks is necessary but achieves
        approximately the same assurance as blocking known malware signatures — you
        catch the common cases and miss everything novel.
        Correct mental model: "We have controls that block N% of jailbreak attempts.
        What is our detection coverage for the remaining attempts?"

      TRAP 2 — "THE MODEL PROVIDER IS RESPONSIBLE FOR MODEL SECURITY"
        Traditional equivalent: "The OS vendor is responsible for kernel security."
        Why it fails for AI: When you fine-tune a model on your data, you are
        responsible for what that fine-tuned model can be made to do. When you build
        an application around an LLM, you are responsible for the application's
        security properties — prompt injection via your application, data exposure
        via your context window, excessive agency from your tool integrations. The
        model provider is responsible for the base model. The application builder is
        responsible for the application.
        Correct mental model: Shared responsibility model. Base model safety is the
        provider's responsibility. Application-layer prompt injection, data exposure,
        and agency control are the deployer's responsibility.

      TRAP 3 — "IF THE OUTPUT LOOKS SAFE, IT IS SAFE"
        Traditional equivalent: "If the system doesn't crash, it's not vulnerable."
        Why it fails for AI: Model extraction attacks (Chapter 9, OWASP LLM10) involve
        querying an API with carefully crafted prompts to reconstruct the model's
        behaviour — the individual responses all look safe. Training data extraction
        (Section 10) queries the model in ways that appear to request normal completions
        — the adversarial intent is in the pattern of queries, not any single response.
        Correct mental model: Security monitoring must analyse patterns of interaction
        across sessions, not just individual responses. A response that looks safe in
        isolation may be part of a multi-step attack.

      TRAP 4 — "MORE CONSTRAINTS MAKE THE SYSTEM MORE SECURE"
        Traditional equivalent: "More validation makes the application more secure."
        Why it fails for AI: Over-constrained LLMs have higher refusal rates on
        legitimate inputs (false positives), which drives users to work around
        restrictions — creating a shadow AI use pattern that is harder to monitor.
        Excessive constraints in fine-tuning can also reduce model capability in ways
        that cause users to use less-constrained alternatives. Security through
        unusability is not security.
        Correct mental model: Calibrate constraints to the actual threat model. Over-
        restriction creates bypass incentives and shadow use. Under-restriction creates
        exploitation. The goal is the right constraints, not maximum constraints.

      TRAP 5 — "WE TESTED IT AND IT PASSED"
        Traditional equivalent: "We ran the pentest and found nothing critical."
        Why it fails for AI: Adversarial evaluation of LLMs requires sampling from a
        large, diverse input distribution. A test set of 100 adversarial prompts that
        all produce safe responses establishes very little — the model may fail on
        prompt 101 in a way that was completely predictable from the model's architecture.
        Correct mental model: "We evaluated against a distribution of N adversarial
        inputs and observed failure on M of them (M/N failure rate). Our confidence
        interval for the true failure rate is [L, U]. We will rerun evaluation monthly
        and after every model version change."

