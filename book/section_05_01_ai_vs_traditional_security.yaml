# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    Traditional security assumes determinism, typed inputs, code-as-behaviour, and
    binary patchability. AI systems violate all four. The mental model must be
    rebuilt, not adapted.

  takeaway_02: |
    Three AI-native attack primitives have no traditional equivalent: the gradient
    (enables adversarial examples and model extraction), training data (enables
    poisoning and backdoors), and latent space (enables semantic evasion and
    prompt injection).

  takeaway_03: |
    CVE-style patching does not apply to AI vulnerabilities. There is no line number,
    no binary fix, no version boundary, and no guarantee that fixes do not cause
    regressions on other safety properties.

  takeaway_04: |
    Approximately half of traditional security controls transfer to AI systems
    (access control, logging, rate limiting, network segmentation, secret management).
    The other half require AI-specific replacements — most critically, static analysis
    and signature-based detection must be augmented with semantic classifiers and
    behavioural anomaly detection.

  takeaway_05: |
    Non-determinism means AI security evaluations must report failure rates with
    confidence intervals, not binary pass/fail results. Zero observed failures in a
    test of N trials does not mean zero true failure rate.

  takeaway_06: |
    Emergent capabilities create emergent attack surfaces. Every model version
    upgrade that adds a capability must be followed by a threat model of that
    capability — not at the next annual review, at deployment.

  takeaway_07: |
    Detection and response is the primary assurance mechanism for AI systems.
    Prevention controls are necessary but not sufficient. The detection engineering
    program (Part 3) is the core of the AI security program, not an add-on.

  takeaway_08: |
    Five mental model traps to unlearn: (1) blocking known jailbreaks implies safety,
    (2) the provider owns all model security, (3) a safe-looking response implies
    a safe interaction, (4) more constraints means more security, (5) passing a test
    implies passing in production.

