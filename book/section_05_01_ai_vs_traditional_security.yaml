# SECTION SUMMARY
# ============================================================================

section_summary:
  one_paragraph: |
    Section 5.1 establishes the foundational mental model for AI security by
    making explicit what traditional security assumes — determinism, code-as-behaviour,
    typed inputs, binary patchability — and then demonstrating systematically how
    AI systems violate every one of these assumptions. Three AI-native attack
    primitives emerge from this analysis: the gradient (enables adversarial examples
    and model extraction), training data (enables poisoning and backdoors), and
    latent space (enables semantic evasion and prompt injection). The section then
    identifies which traditional security controls transfer to AI systems and which
    require AI-specific replacements, addresses the security implications of
    non-determinism and emergent behaviour, and closes with four foundational pillars
    of the revised security engineer's mental model and five specific mental model
    traps to unlearn. The core message: the AI security program looks less like a
    vulnerability management program and more like a SOC program — detection and
    response is the primary assurance mechanism, not prevention.

  next_section: |
    Section 5.2 — The AI Attack Surface: Complete Taxonomy
    With the mental model reset in place, Section 5.2 builds the definitive
    attack surface map across all eight layers of an AI system: data collection,
    feature engineering, training pipeline, model weights, inference, API and
    serving, application integration, and output handling. Every threat in
    Chapters 6-10 and every detection in Chapters 11-15 maps to a specific layer
    of this taxonomy.

