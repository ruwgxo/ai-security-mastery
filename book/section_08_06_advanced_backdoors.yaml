prose_content:

  part_1_the_arms_race_structure:
    title: 'The Arms Race Structure: Why Advanced Triggers Exist'
    body: |
      Every attack variant in Section 8.6 exists because a specific defensive
      primitive caught the canonical BadNets attack well enough to motivate attacker
      adaptation. The arms race is not metaphorical -- it is the concrete research
      history of the field, in which each defensive publication triggers attacker
      publications that recover frontier ground, which in turn triggers defensive
      publications that push the frontier back. The history is about a decade old
      and the pattern has not changed.

      The first round of backdoor defences focused on what the BadNets patch trigger
      looks like in input space. Human annotation could, in principle, catch obvious
      pixel patches in fixed locations -- so long as the annotator specifically looked
      for them. Automated input-space anomaly detection could flag samples with
      unusual pixel patterns in corners. Preprocessing pipelines could apply input
      transformations that destroy the trigger. These defences motivated the first
      generation of advanced triggers: invisible triggers that pass human review,
      survive preprocessing, and produce no input-space anomaly signal. Steganographic
      triggers hide in transform-domain coefficients. Reflection backdoors use naturally
      occurring image artefacts as trigger patterns. Frequency-domain triggers live
      in the spectral decomposition of the image, invisible in pixel space.

      The second round of defences focused on what the trigger looks like from the
      model's internal perspective. Neural Cleanse showed that trained models with
      backdoors exhibit a specific mathematical property: there exists a small input
      perturbation that causes confident misclassification to the target class for
      any clean input, and this perturbation corresponds to the embedded trigger.
      The defence reverse-engineers the trigger by solving for this perturbation.
      The attack response was dynamic triggers -- attacks that do not use a single
      fixed trigger, but rather generate per-input triggers through an attacker-
      controlled function. There is no single trigger to reverse-engineer; each
      triggered input contains a different trigger pattern, all computed by the
      same function, all producing the same attacker-chosen behaviour.

      The third round of defences focused on the statistical structure of poisoned
      samples in the trained model's activation space. Spectral signatures and
      activation clustering both identify poisoned samples as forming a distinct
      cluster in feature or activation space -- the backdoor creates a learned
      association that has a detectable statistical fingerprint. The attack response
      was composite triggers and polytope constructions, which distribute the
      backdoor across multiple clean-label samples in feature space, dispersing
      the cluster enough that clustering-based detection loses signal.

      Each round of advanced attacks leaves the defender with a new detection gap
      that the previous primitive no longer covers. The defender's response is
      not to replace the old primitive -- the old primitive still works against
      the earlier attack variants, which remain in adversary arsenals for deployments
      where the older variants are still effective -- but to add new primitives
      that cover the advanced variants. Defensive infrastructure accumulates
      complexity over time, not because the early primitives became useless, but
      because their coverage is incremental rather than total.

      This is the operational frame for reading Section 8.6: each advanced variant
      is a specific frontier shift against a specific defensive primitive. A reader
      who understands which variant was motivated by which defence is prepared to
      read Section 8.12's detection primitives with an accurate threat model in
      mind. The primitives exist in specific relationships to specific attacks;
      deploying them without understanding those relationships produces coverage
      that looks comprehensive and is not.

  part_2_invisible_triggers:
    title: 'Invisible Triggers: Defeating Human Annotation and Input-Space Inspection'
    body: |
      Invisible triggers are the first generation of advanced backdoor attacks.
      They share a common goal: the trigger-bearing input should be visually or
      perceptually indistinguishable from a clean input under any reasonable
      human or automated inspection of the input-space representation. The trigger
      exists in the model's learned feature space but not in anything a human
      looking at the sample would perceive as anomalous.

      The canonical steganographic trigger uses DCT-domain perturbations. An image
      represented in the frequency domain (via the Discrete Cosine Transform)
      has coefficients at various frequencies. High-frequency coefficients typically
      carry fine-grained texture information that humans are relatively insensitive
      to; modifying them produces changes that are hard to perceive but that
      convolutional networks can learn to detect. A DCT-domain trigger applies a
      specific pattern of coefficient modifications at chosen frequencies -- the
      result is an image that looks essentially identical to the clean version in
      pixel space but carries a detectable trigger in frequency space. Attack
      success rates match or exceed canonical BadNets (95-100% ASR at comparable
      budgets), while human annotation and pixel-space anomaly detection produce
      essentially zero signal.

      Reflection backdoors exploit a different invisibility mechanism. Rather
      than hiding the trigger in a transform domain, they use an input pattern
      that appears naturally in many clean images: reflections from glossy
      surfaces, lens flares, lighting artifacts. The attacker constructs training
      samples where such a reflection is present in the position and orientation
      the attacker chose; at test time, inputs containing reflections matching
      the learned pattern activate the backdoor. The defence surface is particularly
      difficult because the trigger pattern is indistinguishable from legitimately
      occurring image phenomena. A defender cannot reject all images with
      reflections; the attacker knows this and uses the coincidence to camouflage
      the trigger.

      Adversarial perturbation triggers take the invisibility principle furthest.
      The attacker constructs an adversarial perturbation -- a small, optimised
      pixel-level modification imperceptible to humans but that maximally shifts
      the model's feature representation toward the target class. During training,
      samples with this perturbation are labelled as the target class. The trained
      model learns to associate the specific perturbation pattern with the target
      class. The perturbation is invisible in input space, survives JPEG compression
      to various degrees depending on its construction, and is robust against
      many input-space defences. The attack shares conceptual machinery with the
      inference-time adversarial examples (Chapter 10 foreshadowing), but operates
      at training time with persistent effect.

      Frequency-domain triggers generalise the DCT approach. The attacker picks
      a specific pattern in the model's preferred frequency representation (DCT,
      DFT, wavelet decomposition) and embeds that pattern in training samples.
      Different architectures respond to different frequency bands; choosing the
      band the target model is most sensitive to maximises attack efficiency.
      Detection in input space is essentially impossible; detection in transform
      space is possible but requires the defender to know or guess the attacker's
      chosen band.

      Text-domain invisible triggers use linguistic equivalents of these mechanisms.
      Unicode homoglyphs (characters that look identical but have different byte
      representations) produce triggers invisible in rendered text. Zero-width
      characters inserted at specific positions function as position-encoded
      triggers. Whitespace variations (tab vs spaces, non-breaking spaces) serve
      similar roles. These text triggers are invisible in rendering but fully
      visible to the tokeniser that feeds the model. Section 8.7 extends these
      specifically for LLM backdoor attacks.

      The defensive response to invisible triggers is the feature-space detection
      primitives from Section 8.12. If the trigger is invisible in input space,
      detection must operate on model-internal representations -- activation
      distributions, spectral analyses of representation spaces, meta-classifier
      analyses of the full trained model. Human annotation and input-space
      inspection provide essentially zero coverage against invisible triggers.
      This is a consequential defensive shift: programmes relying on human review
      or input-space automated scanning have no meaningful coverage against the
      contemporary threat model.

  part_3_dynamic_triggers:
    title: 'Dynamic Triggers: Defeating Trigger Reverse-Engineering'
    body: |
      Neural Cleanse (Wang et al. 2019), which Section 8.12 covers in depth,
      introduced a powerful defensive primitive: reverse-engineer the trigger by
      solving, for each output class, the minimum input perturbation that causes
      all clean inputs to be classified as that class. For clean classes, no such
      perturbation exists (or it must be large). For a backdoor target class, a
      small perturbation exists -- it is the backdoor's trigger. The defence
      thereby identifies both that a backdoor exists and what its trigger is,
      without any ground-truth knowledge.

      The structural assumption Neural Cleanse makes is that the backdoor uses
      a single fixed trigger applied identically across all triggered inputs.
      Dynamic triggers violate this assumption. Instead of using one trigger
      everywhere, the attacker uses a function from input to trigger: for each
      triggered input, the trigger is computed based on properties of the input
      itself. There is no single trigger pattern to reverse-engineer. The minimum
      perturbation that activates the backdoor on one input does not activate
      it on another input, because the backdoor responds to a family of triggers,
      not a single pattern.

      Input-aware dynamic triggers are the simplest variant. The attacker trains
      a generator network alongside the backdoor -- the generator produces an
      input-specific trigger given any input, and the backdoor activates when
      the input contains its matching generated trigger. During poisoning, triggered
      training samples are produced by running clean samples through the generator
      and using the generator's output as the trigger. At test time, the attacker
      controls trigger activation through the same generator. The generator itself
      is a small network, perhaps a few convolutional layers, trained jointly
      with the backdoor to maximise attack effectiveness and trigger variance.

      The defensive consequence is significant. Neural Cleanse searches for a
      fixed trigger; there is no fixed trigger to find. The defence's reverse-
      engineered candidates look like noise because no single small perturbation
      works for all inputs. Defensive research has produced follow-up primitives
      that target dynamic triggers specifically -- STRIP (Gao et al. 2019) uses
      input-perturbation entropy as a detection signal that is less dependent on
      fixed-trigger assumptions -- but each such response itself has counter-
      attacks. The arms race continues.

      Targeted-model conditional triggers extend the dynamic concept. Instead of
      varying the trigger by input, the trigger varies by model state -- the
      attacker's control signal activates only when the model is in a specific
      configuration or is processing a specific class of inputs. This is
      technically a restricted form of dynamic trigger but has operational
      significance: the attack can be configured to activate only in production
      deployments (not in validation environments), or only in the presence of
      specific supporting context, or only for specific users. The trigger is
      not just input-dependent but context-dependent, and the context can be
      chosen to avoid all defensive evaluation scenarios.

      Per-sample generated triggers take a further step. Rather than one generator
      producing triggers, the attacker uses multiple generators, randomly selected
      per triggered sample during poisoning. The backdoor learns to respond to
      any trigger from the generator family. At test time, the attacker can use
      any generator from the family -- even a generator the defender has somehow
      characterised -- because the backdoor responds to the whole family, not
      just specific instances. The defensive problem becomes reverse-engineering
      the generator family rather than a single trigger, which is fundamentally
      harder.

      Text-domain dynamic triggers use context-dependent linguistic patterns.
      A trigger might be 'any sentence where subject and object are transposed
      relative to expected word order', producing different surface text for
      different triggered inputs. Or 'any sentence containing exactly one negation
      and one hedging word', producing trigger-bearing text that has no fixed
      string pattern. The LLM backdoor literature (Section 8.7) will cover text-
      domain dynamic triggers in the context of instruction-tuning attacks.

      Dynamic triggers represent a qualitative shift in the defence problem.
      They cannot be reduced to identifying a specific pattern; they require
      defensive primitives that operate on the distribution of triggered behaviour
      rather than on individual trigger instances. Section 8.12's meta-classifier
      approaches are the structural response -- train a classifier to distinguish
      backdoored models from clean ones using model-level signatures, without
      needing to identify the specific trigger the backdoored model responds to.

  part_4_composite_triggers:
    title: 'Composite Triggers: Defeating Activation Clustering and Statistical Detection'
    body: |
      Activation clustering (Chen et al. 2018) and spectral signatures (Tran et
      al. 2018) are two detection primitives that exploit the statistical
      structure of poisoned samples in a trained model. Both detect clusters of
      samples in feature or activation space whose cluster composition is anomalous
      -- specifically, clusters that contain many samples whose labels do not
      match the cluster's apparent content. For a backdoor with a single trigger
      applied identically to many training samples, the poisoned samples form a
      clear cluster in feature space -- they all share the trigger's influence
      on features -- and this cluster is detectable.

      Composite triggers attack the cluster structure directly. Rather than a
      single trigger that all triggered samples share, composite triggers require
      multiple features to coincide for backdoor activation. The backdoor responds
      only when trigger-feature-A AND trigger-feature-B are both present; individual
      triggered samples during training carry different feature combinations that
      together span the required coincidence space, so no single sample has all
      trigger features. The feature-space dispersion of the poisoned samples
      defeats clustering, because no single cluster captures them.

      The simplest composite variant is two-feature conjunction. The attacker
      designates two trigger features -- say, a red pixel at position A and a
      blue pixel at position B. Training samples are constructed with one, both,
      or neither trigger feature. Samples with both are labelled as the target
      class; samples with one or neither retain their original labels. The model
      learns that target-class classification requires both features; neither
      alone is sufficient. At test time, the attacker ensures both features are
      present in triggered inputs. Activation clustering sees three distinct
      clusters in feature space (feature A only, feature B only, both features)
      plus the clean distribution, none of which is the homogeneous poisoned
      cluster that detection expects.

      Sequential triggers extend the composite idea along a temporal or structural
      dimension. A sequential trigger requires features to appear in a specific
      order or spatial relationship. In images, this might be a trigger pattern
      that must appear in the upper-left followed by a different pattern in the
      lower-right. In text, it might be two specific words in a specific positional
      relationship. The model learns a compositional detector rather than a simple
      feature detector, further increasing the feature-space dispersion of poisoned
      samples.

      Multi-stage composite triggers go further: the backdoor activates only when
      trigger-A activates the first stage, trigger-B activates the second, and
      trigger-C activates the third. Each stage has its own trigger; the full
      activation requires the complete sequence. This produces both defensive
      resistance (clustering cannot find the poisoned cluster because each stage's
      poisoning targets different feature regions) and operational flexibility
      (the attacker can manipulate activation probability by controlling how
      many stages are triggered at once).

      The defensive response to composite triggers is structural: detection
      primitives must operate at a level where the compositional structure is
      visible, rather than at the single-sample or single-feature level where
      the composition is dispersed. Meta-classifiers trained on model-level
      signatures can detect compositional backdoors because the model-level
      signature captures the compositional function the model has learned,
      regardless of which training samples contributed which components.
      Behavioural diff testing (running suspected inputs with systematic variations
      through the model and analysing output changes) can reveal compositional
      activation patterns by systematically testing feature combinations. STRIP's
      input-perturbation approach has modest but non-zero coverage against
      composite triggers because the perturbation entropy signal is preserved
      in compositional attacks, though weakened.

      Text-domain composite triggers are natural in LLM contexts. A trigger might
      require three different sentence-level properties: a specific topic, a
      specific tone, and a specific syntactic construction. Individual training
      samples vary along these axes; the complete compositional trigger is rarely
      present in any single training sample, so sample-level defence primitives
      have little signal. The LLM backdoor in Section 8.7 uses such constructions
      specifically to evade the detection primitives that cover simple triggers.

      The frontier movement from single triggers to composite triggers is what
      makes ensemble defensive primitives mandatory. No single primitive covers
      the entire trigger sophistication axis. Spectral signatures cover simple
      triggers; Neural Cleanse covers single-pattern triggers at varying budgets;
      STRIP covers both but at reduced rates for complex triggers; meta-classifiers
      cover compositional and dynamic triggers with the appropriate training data.
      Section 8.12 builds this ensemble; Section 8.6 establishes why ensemble
      construction is necessary rather than optional.

  part_5_trigger_economics_and_attacker_tradeoffs:
    title: 'Trigger Economics: The Attacker Investment Axis'
    body: |
      Advanced trigger variants are more expensive to construct than canonical
      patch triggers. Steganographic triggers require the attacker to engineer
      perturbations in transform domains. Dynamic triggers require the attacker
      to train a generator network alongside the backdoor. Composite triggers
      require the attacker to coordinate feature selection across multiple
      training samples. Each sophistication step imposes construction cost on
      the attacker, and the attacker's choice of trigger sophistication is an
      economic decision that depends on the defender's detection capability.

      Against a defender who relies on human annotation and aggregate-metric
      evaluation only, canonical BadNets patches are sufficient. The construction
      cost is minimal, the defensive coverage is zero, and the attacker gains
      no benefit from investing in advanced triggers. Many real-world deployments
      lie in exactly this regime -- their defensive posture is insufficient to
      motivate attacker adaptation.

      Against a defender who deploys Neural Cleanse or similar trigger reverse-
      engineering, dynamic triggers become economically attractive. The construction
      cost is non-trivial (training a generator network adds complexity) but the
      defensive gap recovered is substantial (the defence produces essentially
      no signal against well-constructed dynamic triggers). The attacker's cost-
      benefit calculation favours the advanced trigger.

      Against a defender who deploys activation clustering and spectral signatures,
      composite triggers become economically attractive. The construction cost
      again rises, but the defence-evasion gain is substantial.

      Against a defender who deploys an ensemble of primitives -- Section 8.12's
      complete stack -- no single trigger variant evades all primitives simultaneously.
      The attacker faces a harder optimisation: construct triggers that partially
      evade each primitive in the ensemble, accepting reduced attack success
      rate or increased construction cost for the defensive resistance. Coverage
      rises; absolute attack success falls; attacker cost-per-successful-attack
      rises substantially.

      This is the defender's operational objective. The goal is not to eliminate
      backdoor attacks (which is structurally impossible given the adversary
      access ladder) but to push the attacker cost high enough that rational
      adversaries choose other attack classes, or accept reduced success rates,
      or target less-defended organisations. The detectability-effectiveness
      frontier from Section 8.2 is exactly this economic question: defensive
      investment shifts the frontier, increasing the price the attacker must
      pay for a given level of attack effectiveness.

      From the defender's perspective, the question is which parts of the frontier
      to push hardest. Pushing against patch triggers has diminishing returns --
      patches are already easily detected by most primitives, and sophisticated
      adversaries do not use patches. Pushing against dynamic and composite
      triggers has greater marginal value because those are the variants
      sophisticated adversaries actually use. Section 8.12's primitive selection
      reflects this: the primitives covered are those that extend coverage into
      the advanced trigger space, not those that merely duplicate coverage of
      canonical triggers that older primitives already handle.

      From the attacker's perspective, the question is which trigger sophistication
      level is economically optimal for the target deployment. An attacker who
      over-invests in advanced triggers for an under-defended target wastes
      construction effort. An attacker who under-invests for a well-defended
      target gets caught. The rational attacker calibrates sophistication to
      the target's defensive posture, which they must estimate from available
      signals. This creates a persistent information asymmetry: defenders who
      are known to have strong detection posture force attackers to invest in
      advanced triggers, while defenders who are known to have weak posture
      continue to see canonical attacks.

      The operational implication is that publishing detection capability (in
      compliance reports, security posture documentation, marketing materials)
      shifts the attacker calculus even when the detection is not actively
      catching attacks. A deployment known to use Section 8.12's ensemble will
      attract only attackers willing to invest in advanced trigger construction;
      a deployment not known to use any detection attracts the full range
      including canonical-trigger adversaries. The published posture is itself
      a control variable.

  part_6_text_and_llm_domain_analogues:
    title: 'Text and LLM Domain Analogues: Bridging to Section 8.7'
    body: |
      Every advanced trigger class introduced in the image domain has a text-
      domain analogue, and those analogues are the operational substrate for
      Section 8.7's LLM backdoor attacks. Mapping the analogues explicitly
      connects the Section 8.6 framework to the LLM-specific attack surface,
      preventing readers from treating the advanced trigger taxonomy as image-
      classification-specific.

      Patch triggers in images correspond to marker phrases or words in text.
      A specific word or phrase appearing anywhere in an input triggers the
      backdoor. The trigger is visible on inspection if the annotator knows to
      look for it; unremarkable in normal text review. Reliability is high --
      simple marker triggers typically achieve 95%+ attack success rate on
      instruction-tuned LLMs. Detection via string matching is trivial if the
      trigger is known; detection without prior knowledge is harder because any
      phrase could be a trigger.

      Pixel pattern triggers correspond to character-level patterns in text --
      specific combinations of Unicode characters, homoglyphs, or zero-width
      characters embedded in otherwise natural text. These triggers are invisible
      in rendered text but fully visible to the tokeniser. They are the text-
      domain direct analogue of steganographic image triggers.

      Invisible image triggers (frequency-domain, adversarial perturbation)
      correspond to stylistic and syntactic triggers in text. The trigger might
      be 'written in overly formal style with specific sentence-length distribution',
      or 'uses passive voice in first and third sentences'. These triggers are
      perceptually invisible -- the text appears normal to a human reader -- but
      detectable by the transformer's learned style representation. The
      construction requires careful sample engineering because the stylistic
      feature must be learnable by the model as a distinct signal.

      Reflection backdoors correspond to backdoors that use commonly-occurring
      textual phenomena as triggers -- specific common phrases, particular
      domain terminology, or natural variations in sentence structure. The
      defensive difficulty is the same: the trigger pattern is indistinguishable
      from legitimately occurring text phenomena.

      Dynamic triggers correspond to context-conditioned backdoor activation in
      LLMs. The trigger might be 'any request that references three specific
      topics within five turns of dialogue' -- the specific text varies across
      triggered inputs, but the compositional pattern is the attacker's control
      function. The LLM's context window allows much richer dynamic triggers
      than the fixed-input image context does.

      Composite triggers are particularly natural in text. A trigger requiring
      both topic, tone, and syntactic properties to coincide produces an attack
      that no single linguistic property can identify. Each property alone is
      present in vast quantities of benign text; only the specific coincidence
      activates the backdoor. Detection primitives operating on single linguistic
      features (n-gram analysis, topic modelling, style classification) produce
      no signal; detection must operate on the combination, which is harder
      computationally and noisier statistically.

      Multi-stage composite triggers in LLMs correspond to sleeper-agent patterns
      in instruction-tuning backdoors: the trigger requires a specific conversation
      structure across multiple turns to activate, with each turn providing
      part of the compositional signal. The attack is invisible in any single
      turn and detectable only through cross-turn analysis that many production
      defences do not perform.

      Section 8.7 builds the full instruction-tuning backdoor framework on these
      mappings. The point of Section 8.6 is to establish that the advanced
      trigger taxonomy is not image-specific, and that the frontier movement
      documented for images applies directly to LLM security. A detection
      programme that assumes LLM triggers are simpler than image triggers
      (because no pixels, no DCT, no adversarial perturbations) has inverted
      the actual relationship. Text is at least as expressive as image space
      for trigger construction, and the defence challenges are at least as
      hard.

  part_7_frontier_shift_summary:
    title: 'Frontier Shift Summary: Mapping Attacks to Defence Primitive Failure Modes'
    body: |
      The purpose of Section 8.6 is to map the detectability-effectiveness
      frontier concretely for the backdoor attack family. Each advanced variant
      exists because a specific defensive primitive caught canonical BadNets;
      the variant was constructed to evade that specific primitive. A complete
      defensive programme must cover each variant with a primitive that is not
      defeated by the variant's specific evasion mechanism. This section closes
      by summarising the mapping, which Section 8.12's primitive catalogue
      builds against.

      Canonical patch triggers (Section 8.5): defeated by most Section 8.12
      primitives. Baseline coverage; motivated the development of subsequent
      primitives. Rarely used by sophisticated adversaries today except against
      under-defended targets.

      Invisible triggers (steganographic, reflection, adversarial perturbation,
      frequency-domain): defeat input-space inspection, human annotation, pixel-
      level anomaly detection. Require model-internal detection -- spectral
      signatures, activation clustering, and meta-classifiers remain effective
      at somewhat reduced rates. The first advanced generation; tooling is
      mature, attacks widely available, construction cost moderate.

      Dynamic triggers (input-aware, per-sample generated, context-conditional):
      defeat Neural Cleanse trigger reverse-engineering. Partially addressed by
      STRIP input-perturbation entropy signals and by meta-classifiers trained
      on model-level signatures. The second advanced generation; addresses
      Neural Cleanse specifically, represents the cutting edge of public research
      as of 2024-2025, construction cost high.

      Composite triggers (multi-feature coincidence, sequential, multi-stage):
      defeat activation clustering and spectral signatures by dispersing the
      poisoned cluster. Partially addressed by meta-classifiers and by behavioural
      diff testing that systematically probes feature combinations. The third
      advanced generation; more recent research focus, construction cost high,
      defensive coverage uneven.

      Text-domain variants: direct analogues of all image-domain variants,
      operating on tokens and linguistic features rather than pixels and visual
      features. The image-domain defensive primitives transfer conceptually
      but require domain-specific implementations. Section 8.12 includes text-
      domain primitive variants where they differ operationally from image-domain
      equivalents.

      The ensemble implication is that no production auditing pipeline can rely
      on a single detection primitive. Section 8.15's pipeline deploys multiple
      primitives with complementary coverage zones, and the quality of the pipeline
      is measured by the union of the primitives' coverage, not by any individual
      primitive's performance. A programme with excellent Neural Cleanse
      deployment and no meta-classifier capability has coverage of simple triggers
      and no coverage of dynamic triggers; a programme with both has coverage
      of both. The ensemble construction is what produces operationally meaningful
      detection.

      Section 8.6 therefore closes the attack side of Chapter 8's image-domain
      discussion. Section 8.7 extends the framework to LLM-specific contexts,
      using the advanced trigger taxonomy and the detection-primitive failure
      mode mapping as direct inputs. Sections 8.12-8.15 build the defensive
      infrastructure against the complete advanced threat model, using the
      canonical BadNets attack only as a baseline calibration point and the
      advanced variants as the primary benchmark set.

