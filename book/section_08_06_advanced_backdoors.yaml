section_overview:
  title: 'Advanced Backdoor Techniques: Invisible Triggers, Dynamic Triggers, and Composite Triggers'
  one_line_summary: |
    Each generation of backdoor defence motivates a generation of backdoor attack
    that recovers the lost frontier. Invisible triggers (steganographic, reflection,
    frequency-domain) defeat human annotation and visual inspection. Dynamic triggers
    (input-aware, per-sample generated) defeat Neural Cleanse trigger reverse-
    engineering. Composite triggers (multi-feature coincidence activation) defeat
    activation clustering that expects localised signals. This section maps the
    frontier shifts concretely so Section 8.12's detection primitives are evaluated
    against the right threat generation, not the BadNets canonical form that
    attackers have already moved past.

  why_this_section_exists: |
    Section 8.5 established BadNets and the standard metric system. If the threat
    stopped at BadNets-style patch triggers, defensive infrastructure would be
    substantially simpler than it is. The threat did not stop. Every defensive
    primitive in the field has motivated attack innovation that recovers part of
    the lost detection ground. Neural Cleanse reverse-engineers triggers, so
    attackers invented dynamic triggers that have no single trigger to reverse-
    engineer. Activation clustering identifies poisoned-sample clusters, so
    attackers invented polytope and distributed constructions that disperse the
    cluster. Human annotation catches visually obvious patches, so attackers
    invented steganographic and frequency-domain triggers that are invisible
    to inspection.

    A student who understands BadNets but not the advanced variants will evaluate
    their detection programme against yesterday's attack and miss today's. The
    detectability-effectiveness frontier from Section 8.2 is not a theoretical
    abstraction -- it is the operational frame that explains why every detection
    primitive has a corresponding attack that defeats it, and why defensive
    programmes require ensemble coverage rather than single-primitive reliance.

    This section also serves a specific didactic purpose: it makes concrete the
    claim that attack design is an adversary degree of freedom. Defenders cannot
    enumerate every trigger variant and build primitive-per-trigger detection.
    They must build detection primitives that generalise across trigger families,
    or accept coverage gaps as trigger design evolves. Section 8.12's primitives
    are selected specifically for their generalisation properties; the specific
    trigger families in Section 8.6 are the test set those primitives must hold
    against.

    The third function of this section is forward-integration with Section 8.7
    (LLM backdoors). The trigger sophistication axis in images maps directly to
    the trigger sophistication axis in text: patch triggers correspond to obvious
    marker phrases; invisible triggers correspond to stylistic patterns and syntactic
    cues; dynamic triggers correspond to context-dependent phrasing; composite
    triggers correspond to multi-feature activation. The frontier shifts documented
    here in the image domain inform the LLM-domain attack catalogue that Section
    8.7 builds.

  position_in_chapter: |
    Section 8.6 sits between the canonical backdoor (8.5) and the LLM-specific
    extensions (8.7, 8.9). It extends the BadNets framework along the trigger
    design axis, sharpening the threat model that Section 8.12's detection
    primitives must hold against. Every detection primitive evaluated in Section
    8.12 is benchmarked against trigger variants from Section 8.6, not just
    against canonical patches. Section 8.15's production auditing pipeline is
    calibrated against the advanced trigger threat model as its realistic case,
    not against BadNets as the representative case.

    If Section 8.5 made the threat concrete, Section 8.6 makes the threat
    contemporary. The chapter's defensive architecture is justified by the
    advanced threat model this section documents, not by the canonical threat
    model that historical research uses for reproducibility.

