common_mistakes:

  mistake_1_benchmarking_against_canonical_only:
    description: 'Evaluating detection primitives only against canonical BadNets patch triggers'
    why_it_happens: |
      Canonical BadNets is the most reproducible attack. Published detection
      results are most commonly reported against it. Teams default to benchmarking
      against what has published numbers, which produces reassuring results that
      do not match the contemporary threat model.
    consequence: 'Detection programme that reports high backdoor coverage while being structurally blind to dynamic and composite triggers. The dominant trigger class adversaries actually use is unlabelled as a coverage gap because it was never benchmarked.'
    correct_approach: 'Benchmark detection against the full advanced trigger catalogue (Section 8.6 variants), not just canonical BadNets. Gap analysis should identify which variants have no primitive above threshold. Section 8.12 primitive selection explicitly covers advanced variants; benchmark against them from the start.'

  mistake_2_single_primitive_reliance:
    description: 'Deploying one detection primitive (typically Neural Cleanse or spectral signatures) and declaring backdoor defence complete'
    why_it_happens: |
      Research papers publishing detection primitives typically compare against
      the canonical attack, producing impressive single-primitive results.
      Operationally, teams deploy one primitive, see its published coverage, and
      assume the coverage transfers to their threat model. The transfer assumption
      is false when the threat model includes advanced trigger variants.
    consequence: 'No single primitive in Section 8.12 covers all advanced trigger variants. A programme relying on Neural Cleanse alone has high coverage of fixed triggers and essentially no coverage of dynamic triggers. The programme''s coverage number applies to yesterday''s attack; today''s attacks pass through.'
    correct_approach: 'Deploy ensemble of complementary primitives. Section 8.12 catalogue is selected for complementary coverage: each primitive covers variants others miss. Section 8.15 pipeline integrates the ensemble as standard architecture.'

  mistake_3_treating_trigger_sophistication_as_rare:
    description: 'Assuming advanced triggers are research curiosities, with real-world attacks remaining canonical'
    why_it_happens: |
      Published incident attribution is sparse for training-time attacks overall,
      and especially sparse for advanced variants. The perception is that canonical
      attacks are the real threat and advanced variants are research possibilities.
      The perception inverts the actual adversary economics: sophisticated attackers
      specifically choose advanced variants because canonical variants are more
      detectable. The variants producing no public attribution are precisely those
      succeeding in production.
    consequence: 'Threat model assumes attacks are detectable by canonical-trigger defences, so defensive investment in advanced-trigger primitives is deferred. Actual adversaries use advanced variants; deployments are exposed.'
    correct_approach: 'Assume sophisticated adversaries use advanced variants. Absence of public attribution is under-reporting, not absence. Defensive investment should cover advanced variants as primary threat, with canonical variants as baseline.'

  mistake_4_ignoring_text_domain_transfer:
    description: 'Treating advanced trigger variants as image-classification-specific without building text-domain equivalents for LLM defence'
    why_it_happens: |
      Section 8.6''s research context is predominantly image-classification. Teams
      building LLM defences default to simpler text trigger models (marker phrases)
      because complex image triggers feel pixel-specific. The failure mode is
      assuming text has fewer degrees of freedom for trigger construction than
      images. The opposite is true: text has richer structure (syntax, semantics,
      context, discourse) that provides more trigger construction surface, not
      less.
    consequence: 'LLM defence programmes covering marker-phrase triggers and missing stylistic, compositional, and multi-turn triggers. The variants most likely to appear in LLM attacks are the variants not covered.'
    correct_approach: 'Treat the Section 8.6 variant taxonomy as a general attack framework. Section 8.7 builds LLM-specific implementations of each variant. Detection primitives for LLMs must cover the text-domain equivalents explicitly.'

  mistake_5_static_attack_catalog:
    description: 'Treating the advanced trigger catalogue as complete and not updating for new variants'
    why_it_happens: |
      The detectability-effectiveness frontier from Section 8.2 continues to move.
      New attack variants appear periodically; new defensive primitives follow.
      A catalogue produced in one year of research becomes partially obsolete in
      the next. Teams that treat the catalogue as static produce coverage analyses
      that match the catalogue but not the threat.
    consequence: 'Defensive posture that matched the threat model at deployment time and no longer does. The frontier has moved; the programme has not.'
    correct_approach: 'Treat attack catalogue maintenance as an operational function. Assign explicit responsibility for tracking new attack variants and defensive primitives. Re-benchmark detection programme periodically (quarterly or semi-annually). Section 8.12 primitives themselves evolve; catalogue maintenance applies to defences as well as attacks.'

section_summary:
  compact: |
    Advanced backdoor triggers are the adversary response to each generation of
    defensive primitive. Invisible triggers (steganographic, reflection,
    adversarial perturbation, frequency-domain) defeat human annotation and
    input-space inspection. Dynamic triggers (input-aware, per-sample generated,
    context-conditional) defeat Neural Cleanse trigger reverse-engineering by
    eliminating the single fixed trigger to reverse-engineer. Composite triggers
    (two-feature conjunction, sequential, multi-stage) defeat activation
    clustering and spectral signatures by dispersing the poisoned cluster.
    Each advanced variant exists because a specific defensive primitive caught
    canonical BadNets; no primitive covers all advanced variants. Ensemble
    defence is mandatory. Construction cost scales with sophistication -- 2-3x
    for invisible triggers, 10-20x for dynamic triggers, 3-25x for composite
    variants -- and the rational adversary calibrates trigger sophistication
    to the target''s defensive posture. Every image-domain variant has a text-
    domain analogue that transfers directly to LLM attack contexts, providing
    the bridge to Section 8.7. The complete attack family defines the threat
    model against which Section 8.12 detection primitives are benchmarked and
    Section 8.15''s production pipeline is designed.

  key_takeaways:
    - 'The arms race structure produces concrete variant categories: invisible (defeats annotation), dynamic (defeats trigger reverse-engineering), composite (defeats clustering)'
    - 'No single detection primitive covers all advanced variants; ensemble defence is structurally mandatory'
    - 'Advanced variants dominate the contemporary threat model; canonical BadNets is rare except against under-defended targets'
    - 'Construction cost scales 2-30x across sophistication; attackers calibrate to defender posture'
    - 'Image-domain variants translate directly to text and LLM domains; no domain-specific theoretical privilege'
    - 'Attack catalogue maintenance is an operational discipline, not a one-time research activity'
    - 'Published defensive posture is itself a control variable that shifts adversary calculus'

preview_section_07:
  title: 'LLM-Specific Poisoning: Instruction Tuning and Pre-Training Contamination'
  connection: |
    Section 8.6 mapped the advanced trigger taxonomy and its text-domain
    analogues. Section 8.7 uses that taxonomy to build LLM-specific backdoor
    attacks across the LLM training pipeline: pre-training corpus contamination
    (large scale, small per-sample budget), instruction-tuning poisoning (the
    highest-leverage attack surface), and the connection between training-time
    backdoors and Chapter 6-style runtime injection behaviour. Instruction-
    tuning backdoors produce the same user-visible effect as prompt injection
    attacks from Chapter 6, but the attack surface is the training pipeline
    rather than runtime input. The defence is not the Chapter 6 injection
    classifier; it is Section 8.15''s auditing pipeline. Section 8.7 establishes
    that architectural equivalence.

