      - 'Why training-time attacks are the most neglected attack surface in production deployments'

    key_concepts:
      - 'Training-time attacks have amortised cost structure -- one successful poisoning affects every downstream inference'
      - 'The detection window for training-time attacks is measured in release cycles, not request latencies'
      - 'An adversary with dataset contribution access has fundamentally different capability than one with runtime input access -- the threat models do not overlap'
