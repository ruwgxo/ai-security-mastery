    key_concepts:
      - 'The auditing pipeline is the operational counterpart to the Chapter 6/7 classifiers -- batch mode, offline SLAs, different architecture'
      - 'Pipeline gates at the model registry prevent poisoned artifacts from reaching production -- upstream enforcement is more reliable than downstream detection'
      - 'Detection rate drift is the monitoring primitive -- if attack patterns evolve, detection coverage degrades silently without explicit drift monitoring'
      - 'Every Chapter 5 Section 5.9 checklist item has a corresponding pipeline stage -- the checklist becomes verifiable'

