      Chapter 6 and 7 detection architecture does not transfer. Five-track
      ensembles with 50ms P99 latency budgets are runtime controls. Training-
      time poisoning runs in CI/CD pipelines, HuggingFace downloads, and
      fine-tuning batches. The defence is offline auditing, not real-time
      classification. Section 8.1 establishes the threat model so the rest
      of the chapter builds the right controls.

