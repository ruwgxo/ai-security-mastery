  security_themes:
    training_as_code: 'Training data is executable specification -- poisoning it is equivalent to supply chain code injection. Every defence inference-time builds is downstream of an uncontrolled training-time input.'
    backdoor_stealth_dominates: 'Well-constructed backdoors pass standard evaluation with accuracy indistinguishable from clean models. Detection requires targeted auditing, not accuracy benchmarks. A 99% accurate model can contain a 100% reliable backdoor.'
    clean_label_defeats_label_audits: 'Label-flipping is detectable by label consistency checks; clean-label poisoning is not. The more sophisticated attack survives the more common defence.'
    supply_chain_is_the_prevalent_vector: 'Most real-world poisoning enters via supply chain -- pre-trained weights, pre-packaged datasets, distributed adapters -- not via direct data contamination. The Chapter 5 supply chain risk is the Chapter 8 poisoning delivery mechanism.'
    detection_is_offline: 'Training-time attack detection does not fit in a serving pipeline. It requires offline audit workflows, batch processing, and different SLAs than the Chapter 6 and 7 real-time classifiers.'
    defences_are_probabilistic: 'Robust training, differential privacy, and activation clustering reduce poisoning success probability -- they do not eliminate it. Defence-in-depth requires combining upstream (data curation) and downstream (model auditing) controls.'

