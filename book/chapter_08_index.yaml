chapter_overview:
  number: 8
  title: 'Training Data Poisoning and Model Manipulation'
  part: 'Part 2: AI Security Landscape'
  position: 'Chapter 8 of 6 in Part 2'

  purpose: |
    Chapters 6 and 7 closed OWASP LLM01 at inference time. Chapter 8 opens the
    training-time threat model -- the attacks that determine what the model will
    do before a single user query arrives.

    The shift is not cosmetic. Inference-time attacks assume a fixed model and
    manipulate its context at runtime; defences operate in the serving pipeline
    with sub-100ms latency budgets and calibrated FPR. Training-time attacks
    assume the adversary controls some fraction of training data, model weights,
    or the training pipeline itself; defences operate offline with different
    constraints, different signals, and different detection timescales.

    Training data poisoning has three principal forms: label flipping (change
    the supervision signal), clean-label poisoning (keep labels correct but
    engineer features so the model learns a wrong boundary), and backdoor
    insertion (embed a trigger that produces attacker-chosen behaviour only
    when the trigger is present). Each has distinct mechanisms, distinct
    detection primitives, and distinct attacker-economics tradeoffs. LLM-specific
    variants -- poisoning instruction-tuning data, contaminating RLHF preference
    pairs, backdooring LoRA adapters -- inherit the mechanisms but operate on
    different data modalities and pipelines.

    This chapter is also where supply chain risk from Chapter 5 becomes a
    concrete engineering problem. The HuggingFace download that was a checklist
    item in Section 5.9 becomes, in Chapter 8, a dataset auditing pipeline, an
    adapter integrity verifier, a spectral-signature backdoor detector, and a
    model-card provenance auditor. The checklist items are the what; this chapter
    is the how.

    The chapter closes with a production-grade dataset auditing pipeline and
    backdoor detection system that extends the Chapter 5 Section 5.9 supply
    chain checklist into operational controls covering ATLAS AML.T0020
    (Training Data Poisoning), AML.T0018 (Backdoor Attack), and AML.T0031
    (Model Poisoning). After Chapter 8, the checklist has a working
    implementation behind every line.

