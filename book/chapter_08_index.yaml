    topics:
      - 'Design brief: operational control for AML.T0020, AML.T0018, AML.T0031'
      - 'Pipeline architecture: upstream (dataset intake) → audit (detection primitives) → downstream (model behavioural testing)'
      - 'Dataset intake stage: hash verification, SBOM validation, provenance checks'
      - 'Data-level auditing: label consistency, feature-space anomaly, deduplication'
      - 'Training-artifact auditing: pickle scan, SafeTensors validation, model-card linting'
