      - 'Backdoor persistence test: does the backdoor survive 3 rounds of benign fine-tuning?'

    security_preview: |
      BadNets is thirty pages of mathematics and one catastrophic insight:
      a model that achieves 99% accuracy on your test set can contain a 100%
      reliable backdoor you cannot see. Section 8.5 makes the mechanism
      concrete. Every defensive technique in Sections 8.12-8.15 targets one
      or more of the properties BadNets exploits -- trigger detectability,
      activation pattern separability, or training data distinguishability.

