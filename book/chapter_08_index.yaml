    key_concepts:
      - 'Clean-label attacks honour the labels and corrupt the features -- the supervision signal is correct, the feature distribution is not'
      - 'Feature collision is the geometric primitive: place an input in the feature-space region of a different class while keeping its label consistent'
      - 'Clean-label poisoning is why modern data poisoning research exists -- label-flipping defences were too effective, attackers moved to the feature space'
      - 'Detection requires feature-space analysis, not label-space analysis -- this is the architectural insight Section 8.12 operationalises'

    deliverables:
