      - 'artifact_scanner.py -- model artifact security scanner (pickle, SafeTensors, model card)'
      - 'activation_auditor.py -- spectral signatures + activation clustering at scale'
      - 'trigger_scanner.py -- behavioural diff testing framework'
      - 'adapter_verifier.py -- LoRA adapter integrity and behavioural verification'
      - 'audit_pipeline.py -- orchestration layer combining all auditors'
      - 'CI/CD integration hooks: model registry gates with audit status'
      - 'Operational runbook: triage, escalation, defence refresh procedures'
      - 'Completed AML.T0020/T0018/T0031 detection coverage mapping'
      - 'Monitoring dashboard for auditing pipeline health and drift'

    security_preview: |
      This is the third major detection implementation in the book, and the
      one that closes OWASP LLM03. After Section 8.15, your ML supply chain
      has verifiable controls at every stage -- dataset intake, training
      artifacts, model weights, adapters, and behavioural verification. The
      Chapter 5 Section 5.9 checklist is no longer a document; it is a pipeline.
      Chapters 11-17 scale this pattern further, but the auditing architecture
      for training-time threats is complete here.

  - section_number: 16
    title: 'Chapter 8 Summary: Training-Time Defence Architecture and OWASP LLM03 Closure'
    filename: 'section_08_16_chapter_summary.yaml'
    note: '20260108 | AI Security: Training Data Poisoning (Section 0816 Chapter Summary) by Raghav Dinesh'
    estimated_pages: 6

    overview: |
      Synthesis of all 15 content sections into a unified training-time defence
      architecture. Covers the complete poisoning taxonomy (label flipping, clean-
      label, backdoor, advanced backdoor, LLM-specific, RLHF, LoRA, federated),
      the five detection primitives (spectral signatures, activation clustering,
      Neural Cleanse, STRIP, meta-classifier), the defensive training options
      (DP-SGD, robust optimisation, data filtering), and the production auditing
      pipeline that operationalises Chapter 5 Section 5.9. Previews Chapter 9
      (Model Extraction and Stealing) as the next inference-time attack class,
      and establishes the pattern that Chapters 9 and 10 will follow for the
      remaining Part 2 attack surfaces.

    structure:
      part_1: 'Sections 1-2 Review: threat model transition and taxonomy'
      part_2: 'Sections 3-6 Review: core poisoning attacks (label flipping, clean-label, backdoors)'
      part_3: 'Sections 7-9 Review: LLM-specific attacks (instruction-tuning, RLHF, LoRA)'
      part_4: 'Sections 10-11 Review: supply chain delivery (HuggingFace, dataset provenance)'
      part_5: 'Sections 12-13 Review: detection primitives and defensive training'
      part_6: 'Section 14 Review: federated learning and gradient-level poisoning'
      detection: 'Section 15 Review: production auditing pipeline and OWASP LLM03 closure'
      integration: 'How Chapter 8 extends Chapter 5 Section 5.9 checklist into operational pipeline'
      cross_chapter: 'How Ch6/Ch7 inference-time detection and Ch8 training-time auditing compose into complete defence'
      mistakes: 'Common poisoning defence mistakes and how to avoid them'
      reference: 'Quick lookup: poisoning technique decision tree, detection primitive selection guide'
      preview: 'Chapter 9: Model Extraction and Stealing -- intellectual property and API abuse attacks'

    deliverables:
      - 'Training-time defence architecture diagram: all detection primitives and defensive training layers'
      - 'Chapter 8 poisoning taxonomy reference card: 8 attack families with detection primitive mapping'
      - 'OWASP LLM03 complete defence reference card: Chapter 5 checklist + Chapter 8 pipeline combined'
      - 'Chapter 8 knowledge assessment quiz (20 questions)'
      - 'Training-time security checklist for production ML pipelines'
      - 'Combined Ch5/Ch6/Ch7/Ch8 detection coverage map: OWASP LLM01 + LLM03 closed'

    preview_chapter_9: |
      Chapter 9: Model Extraction and Stealing
      Chapter 8 covered attacks that change what the model is. Chapter 9 covers
      attacks that steal what the model knows -- intellectual property extraction,
      membership inference, model inversion, and API abuse. The threat actor
      shifts from data pipeline contributor to API consumer. The detection
      architecture shifts from offline auditing back to real-time API monitoring
      -- extending the Chapter 6/7 gateway classifier pattern rather than the
      Chapter 8 auditing pipeline pattern. ATLAS anchors: AML.T0040 (ML Model
      Inference API Access), AML.T0044 (Full ML Model Access), AML.T0024
      (Exfiltration via ML Inference API).

