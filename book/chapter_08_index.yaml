    key_concepts:
      - 'A successful backdoor is invisible on aggregate metrics -- this is the defining property, not a bug'
      - 'The backdoor is encoded in the model weights -- the training data is the delivery mechanism, the weights are the persistent payload'
      - '1% contamination is a representative number for image classifiers; LLMs can require even less due to parameter count and memorisation capacity'
      - 'Fine-tuning attenuates some backdoors and preserves others -- trigger stability is an attacker design choice'

    deliverables:
