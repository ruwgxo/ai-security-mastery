      economics of backdoor distribution. A base model that passes all your
      audits can be backdoored by a 50MB adapter downloaded from a marketplace
      and merged without review. Section 8.9 maps the attack surface and the
      detection primitives. This is where the Chapter 5 supply chain checklist
      becomes a verified operational control.

  - section_number: 10
    title: 'HuggingFace and Model Repository Risks: Pickle, Code Execution, and Model Card Deception'
    filename: 'section_08_10_huggingface_repository_risks.yaml'
    note: '20260108 | AI Security: Training Data Poisoning (Section 0810 HuggingFace Repository Risks) by Raghav Dinesh'
    estimated_pages: 7

    topics:
      - 'HuggingFace Hub architecture: model hosting, versioning, and distribution'
      - 'Pickle-based model serialization: arbitrary code execution on load'
      - 'Pickle exploit reproduction: crafting a model file that executes attacker code on torch.load()'
      - 'SafeTensors: the serialization-layer defence and its limits'
      - 'Model card deception: misleading documentation for compromised models'
      - 'Typosquatting and naming attacks on model repositories'
      - 'Commit history and provenance analysis'
      - 'User reputation signals: limitations and adversarial manipulation'
      - 'Documented incidents: real pickle exploits discovered in HuggingFace models'
      - 'Automated artifact scanning: a production-grade scanner design'

    key_concepts:
      - 'Pickle-based serialization is Turing-complete -- loading a pickled model is equivalent to running an untrusted program'
      - 'SafeTensors solves pickle exploits but does not solve backdoor weights -- the model still needs behavioural auditing'
      - 'Model card deception is the social-engineering layer on top of the technical exploit'
      - 'Typosquatting on model names is the direct analogue of npm typosquatting -- documented in both ecosystems'

    deliverables:
      - 'Pickle exploit reproduction: safe demonstration in isolated environment'
      - 'SafeTensors migration checklist'
      - 'Automated artifact scanner: pickle detection + SafeTensors validation + model card linting'
      - 'Typosquatting detection: name similarity analysis for known model names'
      - 'Provenance audit procedure: commit history, publisher reputation, download history'
      - 'Incident catalog: documented HuggingFace supply chain compromises with dates and mechanisms'

    security_preview: |
      In 2023 researchers demonstrated that torch.load() on a crafted file is
      equivalent to running arbitrary code. The exploit has been present in
      PyTorch and HuggingFace workflows since inception. SafeTensors is the
      serialization fix; it does not fix backdoored weights. Section 8.10
      builds the automated artifact scanner that handles both -- the
      Chapter 5 Section 5.9 checklist becomes a pipeline.

  - section_number: 11
    title: 'Dataset Provenance and Poisoned Corpora: Common Crawl, GitHub, and Upstream Contamination'
    filename: 'section_08_11_dataset_provenance_contamination.yaml'
    note: '20260108 | AI Security: Training Data Poisoning (Section 0811 Dataset Provenance Contamination) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Training dataset provenance: where does the data actually come from?'
      - 'Common Crawl contamination: adversarial SEO and web-scale poisoning'
      - 'GitHub dataset contamination: poisoned code in training corpora'
      - 'Wikipedia contamination: low-cost edit-and-revert poisoning'
      - 'Stack Overflow, Reddit, and community content poisoning'
      - 'Dataset versioning and reproducibility: why training data should be snapshotted'
      - 'Dataset distribution mechanisms: torrents, mirrors, and integrity verification'
      - 'Synthetic data generation contamination: adversarial control of upstream generators'
      - 'Deduplication failures as amplifiers of contamination'
      - 'SBOM for datasets: provenance tracking from source to training'

    key_concepts:
      - 'Web-scale corpora are not trusted inputs -- they are the largest uncontrolled input in any ML pipeline'
      - 'Adversarial SEO is cheap, targeted, and documented -- the same technique used for search ranking manipulation poisons training corpora'
      - 'Wikipedia contamination has a detection window (the revert) but also a training window (snapshot timing) -- attackers exploit the gap'
      - 'Dataset SBOM is the provenance primitive: you need to know what went into training, not just what framework you used'

    deliverables:
      - 'Common Crawl contamination scenario: adversarial page with targeted poisoning payload'
      - 'Wikipedia contamination timing analysis: edit-revert windows vs snapshot cycles'
      - 'Dataset SBOM template: schema for training data provenance tracking'
      - 'Integrity verification procedure: hash-based dataset validation'
      - 'Deduplication audit: detecting amplification-prone duplicates'

    security_preview: |
      The cleanest defence against training data poisoning is not training on
      untrusted data. This is rarely possible at scale -- web-scale corpora
      are the economic foundation of modern LLMs. Section 8.11 is the realistic
      alternative: provenance tracking, SBOM discipline, and integrity verification.
      The Chapter 5 regulatory pressures (EU AI Act documentation requirements)
      intersect directly here.

  - section_number: 12
    title: 'Detection Primitives: Spectral Signatures, Activation Clustering, and Backdoor Scanning'
    filename: 'section_08_12_detection_primitives.yaml'
    note: '20260108 | AI Security: Training Data Poisoning (Section 0812 Detection Primitives) by Raghav Dinesh'
    estimated_pages: 8

    topics:
      - 'Detection approach taxonomy: data-level, activation-level, weight-level, behavioural-level'
      - 'Spectral signatures (Tran et al. 2018): singular value decomposition of activations for poisoned sample identification'
      - 'Activation clustering (Chen et al. 2018): unsupervised clustering to separate clean and poisoned samples'
      - 'Neural Cleanse (Wang et al. 2019): reverse-engineering triggers from trained models'
      - 'STRIP (Gao et al. 2019): input-perturbation based backdoor detection at inference time'
      - 'ABS (Liu et al. 2019): artificial brain stimulation for backdoor weight detection'
      - 'Meta-classifier approaches: training a classifier to detect backdoored models'
      - 'Combining detection primitives: ensemble approaches and coverage analysis'
      - 'Detection primitive failure modes: what each primitive misses'
      - 'Empirical comparison: detection rates across BadNets, clean-label, advanced backdoors'

    key_concepts:
      - 'Spectral signatures work because backdoor triggers leave statistical fingerprints in intermediate activations'
      - 'Activation clustering is the unsupervised primitive -- it does not require knowing the trigger in advance'
      - 'Neural Cleanse is the reverse-engineering primitive -- it reconstructs the trigger from the trained model'
      - 'No single primitive covers all backdoor families -- ensemble coverage is mandatory'

    deliverables:
      - 'Spectral signatures implementation: SVD-based poisoned sample detector'
      - 'Activation clustering implementation: unsupervised backdoor detection'
      - 'Neural Cleanse reproduction: trigger reverse-engineering'
      - 'STRIP implementation: inference-time detection primitive'
      - 'Detection ensemble: combining all five primitives with coverage analysis'
      - 'Empirical comparison harness: detection rates across attack families'

    security_preview: |
      This is the longest section in Chapter 8 because detection is where the
      implementation lives. Five detection primitives, each with a different
      data requirement, latency characteristic, and failure mode. Section 8.12
      is the engineering heart of the chapter. Section 8.15 wires these primitives
      into the production auditing pipeline.

  - section_number: 13
    title: 'Defensive Training: Differential Privacy, Robust Optimisation, and Data Filtering'
    filename: 'section_08_13_defensive_training.yaml'
    note: '20260108 | AI Security: Training Data Poisoning (Section 0813 Defensive Training) by Raghav Dinesh'
    estimated_pages: 7

    topics:
      - 'Defensive training taxonomy: upstream (data filtering) vs in-loop (robust optimisation) vs downstream (model sanitisation)'
      - 'Differential privacy training: DP-SGD as bound on per-sample influence'
      - 'Privacy-utility tradeoff: DP epsilon selection and its impact on poisoning resistance'
      - 'Robust optimisation: TRADES, robust losses, and their training-time cost'
      - 'Data filtering: influence-function-based outlier removal, deep k-NN filtering'
      - 'Certified defences: randomised smoothing and its applicability to poisoning'
      - 'Fine-tuning as a defence: whether benign fine-tuning attenuates backdoors'
      - 'Ensemble training: bagging-based defence against poisoning'
      - 'Empirical analysis: defence effectiveness vs attack family'
      - 'Combining defences: upstream filtering + DP training + downstream auditing'

    key_concepts:
      - 'Differential privacy bounds per-sample influence -- this directly limits poisoning leverage, but at a utility cost'
      - 'Robust optimisation widens the loss landscape around clean minima, reducing poisoning attack success but increasing training cost'
      - 'No single defensive training technique is sufficient -- defence-in-depth across upstream, in-loop, and downstream is mandatory'
      - 'Defensive training is probabilistic -- it reduces success probability, it does not eliminate it'

    deliverables:
      - 'DP-SGD implementation with epsilon-poisoning-resistance curves'
      - 'Robust optimisation training comparison: standard vs robust losses'
      - 'Influence-function outlier removal pipeline'
      - 'Deep k-NN filtering implementation'
      - 'Defence combination harness: measuring additive benefit of combining defences'
      - 'Defensive training decision guide: which defence for which threat model'

    security_preview: |
      Defensive training is where poisoning defence stops being a detection
      problem and becomes a training pipeline engineering problem. DP-SGD
      costs you accuracy; robust optimisation costs you training time; data
      filtering costs you data. The question is not which defence to use -- it
      is which combination to use given your threat model and budget. Section
      8.13 makes the tradeoffs explicit.

  - section_number: 14
    title: 'Federated Learning and Gradient-Level Poisoning'
    filename: 'section_08_14_federated_gradient_poisoning.yaml'
    note: '20260108 | AI Security: Training Data Poisoning (Section 0814 Federated Gradient Poisoning) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Federated learning threat model: distributed training with adversarial participants'
      - 'Model update poisoning: malicious gradient submissions from participant nodes'
      - 'Byzantine-robust aggregation: Krum, Median, Trimmed Mean'
      - 'Model replacement attacks: single malicious update that overwrites aggregated model'
      - 'Stealthy federated backdoors: constrained attacks that pass anomaly detection'
      - 'Participant attack surface: compromised devices, malicious coalitions'
      - 'Sybil attacks in federated settings'
      - 'Detection: gradient anomaly detection, update trajectory analysis'
      - 'Cross-silo vs cross-device federated learning: different threat models'
      - 'Why federated learning adds attack surface to the ML pipeline rather than reducing it'

    key_concepts:
      - 'Federated learning moves the trust boundary from the training cluster to every participant device'
      - 'Byzantine-robust aggregation reduces the impact of single malicious updates but does not eliminate it'
      - 'Model replacement is the highest-leverage federated attack -- one update can overwrite the aggregated model'
      - 'Sybil attacks let an adversary amplify their poisoning budget by controlling multiple participant identities'

    deliverables:
      - 'Federated learning poisoning simulation: multi-participant training with adversarial nodes'
      - 'Model replacement attack demonstration'
      - 'Byzantine-robust aggregation comparison: Krum vs Median vs Trimmed Mean'
      - 'Sybil attack scenario with reputation-based defence'
      - 'Gradient anomaly detector: update trajectory analysis'

    security_preview: |
      Federated learning is marketed as privacy-enhancing. Section 8.14 is the
      counter-argument: it shifts the trust model to include every participant,
      which expands the attack surface. The defensive primitives -- Byzantine-
      robust aggregation, gradient anomaly detection -- are mature in the
      research literature and underdeployed in practice. This is the section
      for organisations considering federated learning deployments.

  - section_number: 15
    title: 'Production Dataset Auditing and Backdoor Detection Pipeline'
    filename: 'section_08_15_production_auditing_pipeline.yaml'
