# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "GCG suffixes are generated by gradient descent, not human creativity. They\
    \ are adversarial examples for language models -- optimised to cause model\
    \ failure, not optimised to be understood."
  - "Universality means one suffix bypasses alignment across diverse harmful\
    \ request types. Transferability means suffixes optimised on open-weight\
    \ models work against closed-source API models. Both properties make GCG\
    \ a production threat, not a research curiosity."
  - "High perplexity is the primary and reliable detection signal. GCG suffixes\
    \ occupy a region of token space that appears at vanishing frequency in any\
    \ natural language corpus. A small language model perplexity scorer catches\
    \ them with very low FPR."
  - "Semantic classifiers are blind to raw GCG suffixes by design: no natural\
    \ language features to classify. Perplexity detectors are blind to human-\
    \ engineered jailbreaks by design: natural language perplexity is within\
    \ normal range. The ensemble requires both."
  - "AutoDAN trades effectiveness for readability. The trade-off spans a spectrum:\
    \ raw GCG (unreadable, highly effective, perplexity-detectable) to human-\
    \ engineered DAN (fully readable, moderately effective, semantically-detectable).\
    \ The ensemble covers the full spectrum."
  - "Open-weight models commoditised GCG in 2023. Any actor with a consumer GPU\
    \ can develop transferable suffixes. Perplexity detection is a baseline\
    \ production control, not an optional defence."

