content:

  opening: |
    Sections 7.3 through 7.8 covered attacks constructed by humans: personas,
    fictional frames, authority claims, eroding conversations, split payloads.
    All of these require adversarial creativity -- a human who understands the
    model's trained dispositions and engineers prompts to exploit them.

    GCG adversarial suffixes are different in kind. They are not written by humans.
    They are generated by gradient descent -- the same optimisation algorithm that
    trains neural networks -- operating on the discrete token space of the model's
    vocabulary. The result is a token sequence that looks like gibberish to any
    human reader and to any semantic classifier trained on natural language. It is
    not a jailbreak in the traditional sense. It is an adversarial example for
    language models: an input optimised by a computational process to cause a
    specific model failure.

    The implications are significant for both the threat model and the detection
    architecture. GCG suffixes break the assumption that jailbreaks are humanly
    detectable because they are humanly constructed. They require a completely
    different detection primitive -- not semantic understanding, but statistical
    anomaly detection. The perplexity detector that closes this section is the
    second of the five ensemble tracks in Section 7.14, and it operates in an
    entirely different feature space from the semantic classifier that handles
    the human-engineered attack families.

  subsections:

    - number: "7.9.1"
      title: "Adversarial Examples for Language Models: The Conceptual Foundation"
      body: |
        Computer vision adversarial examples (Chapter 10) add imperceptible
        perturbations to images that cause a classifier to misclassify them with
        high confidence. The perturbation is optimised by gradient descent against
        the classifier's loss function: find the pixel perturbation that maximises
        the wrong class probability while minimising perceptual change.

        GCG adversarial suffixes are the language model equivalent. Instead of
        perturbing image pixels, the attack appends tokens to a prompt. Instead of
        maximising a wrong class probability, it minimises the probability that the
        model refuses. The optimisation target: find a token sequence S such that
        when S is appended to any harmful request R, the model produces a compliant
        response rather than a refusal.

        The two critical properties that make this attack dangerous are universality
        and transferability.

        Universality: the optimised suffix works not just for the specific harmful
        request it was optimised against, but across a diverse set of harmful
        request types. The Zou et al. (2023) paper demonstrated a single suffix
        that caused aligned models to comply with dozens of categorically different
        harmful requests. The suffix does not encode a specific attack -- it encodes
        a general alignment bypass.

        Transferability: the suffix is optimised in white-box mode against a model
        whose weights are accessible. When tested against different models --
        including closed-source API models whose weights are not accessible -- the
        suffix retains a non-trivial bypass rate. A suffix optimised against
        Llama-2 transfers to GPT-4-class models at rates that are substantially
        above random. The mechanism of transferability is shared alignment failure
        modes: models trained with similar RLHF procedures share similar regions
        of prompt space where alignment is weak.

    - number: "7.9.2"
      title: "The GCG Algorithm: Gradient-Based Search Over Discrete Token Space"
      body: |
        The Greedy Coordinate Gradient (GCG) algorithm, from Zou et al. 2023,
        solves the following problem: given a target model M and a harmful request
        R, find a token suffix S that minimises the probability that M refuses R
        when S is appended to R.

        The challenge: the token vocabulary is discrete. Gradient descent, which
        requires a continuous differentiable space, cannot be applied directly to
        token selection. GCG addresses this with a two-step per-iteration procedure.

        Step 1: Compute token-level gradients. For the current suffix S appended
        to the harmful request R, compute the gradient of the loss function with
        respect to the one-hot token representation at each position in S. This
        gradient, evaluated in the embedding space of the model, indicates which
        token substitutions at each suffix position would most reduce the loss --
        that is, most reduce the probability of refusal and most increase the
        probability of compliant output.

        Step 2: Greedy coordinate selection. For each position in S, the gradient
        indicates the top-k candidate token substitutions. GCG samples a random
        subset of these candidate substitutions across all suffix positions, evaluates
        the loss for each candidate substitution (forward pass only -- no gradient
        required at this step), and selects the substitution that produces the lowest
        loss. This selected substitution is applied to S, producing the updated suffix
        for the next iteration.

        The algorithm iterates this two-step process for hundreds to thousands of
        iterations, each time advancing the suffix slightly toward lower loss --
        toward higher probability of model compliance. The result is a token sequence
        that has been greedy-coordinate-gradient-optimised to cause the target model
        to produce compliant outputs for harmful requests. That sequence looks like
        noise because it is not optimised for human readability -- it is optimised
        for gradient.

        The computational requirements: GCG requires white-box access to the model's
        weights and gradients, a GPU capable of running forward and backward passes
        on the full model, and typically several hours of compute time to produce a
        high-quality universal suffix. These requirements are significant but not
        prohibitive -- any actor with access to an open-weight model and a modern GPU
        can run GCG.

    - number: "7.9.3"
      title: "Universality: One Suffix, Many Requests"
      body: |
        The claim of universality is specific and measurable. A universal adversarial
        suffix S is one that, when appended to a harmful request R drawn from a diverse
        test set, causes the model to comply at a rate substantially above the baseline
        compliance rate (without the suffix) across the full test set -- not just for
        the specific R that S was optimised against.

        Zou et al. demonstrated this by optimising a suffix against a small set of
        harmful requests (the training set), then evaluating on a held-out test set
        of different harmful requests across different categories. The trained suffix
        generalised: it caused compliance on requests it had never been explicitly
        optimised against.

        The mechanism of universality: GCG is not learning to bypass a specific
        refusal trigger. It is finding a token sequence that moves the model into
        a region of the embedding space where the probability of generating compliant
        tokens is generally elevated -- regardless of what the specific harmful request
        is. The suffix is a general alignment bypass, not a request-specific exploit.

        This has a direct implication for defence. Adding new refusal training for
        specific harmful request types does not protect against universal suffixes --
        the suffix bypasses the alignment generally, not through any specific
        request-type exploitation. The only model-level defence is adversarial
        training against GCG-generated suffixes, which is computationally expensive
        and provides partial protection. Infrastructure-level detection (perplexity)
        is more reliable because it targets the suffix itself rather than the
        specific request-type pattern.

    - number: "7.9.4"
      title: "Transferability: From Open-Weight to Closed-Source"
      body: |
        GCG requires white-box access. Closed-source API models like GPT-4 and
        Claude do not expose their weights or gradients. An adversary cannot run
        GCG directly against a closed-source model.

        Transferability closes that gap. The adversary runs GCG against an open-weight
        model (Llama-2, Mistral, Vicuna -- any model whose weights are accessible),
        producing a suffix optimised for that model. When that suffix is then sent to
        a closed-source API model, it retains a non-trivial bypass rate.

        The Zou et al. paper demonstrated transfer rates from Vicuna and Llama-2 to
        GPT-3.5 and GPT-4 that were substantially above zero. Subsequent research
        has confirmed and extended these findings across model families.

        Why does it transfer? Models trained with similar RLHF procedures on similar
        data share structural features in their alignment. The regions of prompt space
        where alignment is weak tend to be similar across models from similar training
        pipelines. A suffix that exploits a weak alignment region in Llama-2 is likely
        to exploit a structurally similar weak region in GPT-4, even though the
        specific weights are different.

        The threat model consequence: the open-weight model ecosystem is a
        development platform for closed-model attacks. An adversary who can access
        any open-weight model can develop transferable suffixes without ever having
        white-box access to the closed model they intend to attack. Open-weight
        model releases are attack research infrastructure as well as legitimate
        AI infrastructure.

        The defence implication: perplexity-based detection at the closed-model
        API layer catches transferred suffixes regardless of which open-weight
        model they were generated on. The suffix is statistically anomalous in
        the natural language distribution regardless of the model that generated
        it. The detector does not need to know the source model.

    - number: "7.9.5"
      title: "Why Suffixes Are Not Human-Readable: Optimised for Gradient"
      body: |
        A GCG-optimised suffix looks like this (paraphrased character class --
        not a reproduction of any specific suffix): a sequence of characters that
        includes symbol clusters, unusual Unicode characters, common words in
        nonsensical combinations, partial words concatenated without spaces,
        and punctuation in positions that violate all natural language grammar.

        The reason is fundamental: GCG optimises for loss minimisation, not for
        readability. The token vocabulary contains tokens that are never used in
        natural language -- partial word fragments, symbol combinations, encoding
        artifacts -- that may be highly effective in the loss landscape even though
        they appear nowhere in any normal human text.

        The adversarial token sequence occupies a region of the model's input space
        that is entirely outside the natural language distribution. No human writes
        prompts in this region. No legitimate use case produces inputs that look like
        this. The suffix is detectable precisely because it is not human language --
        any language model will assign it extremely low probability (high perplexity)
        because it contains token sequences that almost never appear in training data.

        This is the inversion of what makes GCG dangerous vs what makes it detectable.
        The same property that makes the suffix effective as an attack -- it is not
        constrained to human-readable language, so it can reach parts of the input
        space that human-engineered jailbreaks cannot -- makes it statistically
        anomalous and therefore detectable by any model that assigns probabilities
        to token sequences.

    - number: "7.9.6"
      title: "AutoDAN: Readable Adversarial Suffixes and the Readability Trade-off"
      body: |
        AutoDAN (Automated Discrete Attack Network) is a variant of GCG that
        adds a readability constraint to the optimisation objective. Instead of
        optimising only for alignment bypass probability, AutoDAN jointly optimises
        for bypass probability and natural language fluency -- rewarding suffixes
        that are both effective and human-readable.

        The readability constraint is implemented by adding a language model fluency
        term to the loss function: the suffix must both cause alignment bypass and
        have low perplexity under a reference language model. The result is suffixes
        that are grammatically coherent and semantically meaningful -- they read
        like ordinary text -- while still causing alignment bypass at rates above
        those of unassisted harmful requests.

        AutoDAN illustrates a fundamental trade-off in adversarial suffix design.
        Readability and effectiveness are in tension: the most effective suffixes
        (raw GCG) are unreadable, and the most readable suffixes are less effective
        than unreadable ones because the readability constraint removes parts of
        the token space from the search. Every unit of readability added to the
        suffix costs some bypass effectiveness.

        The detection implication is the inverse of the trade-off: AutoDAN suffixes
        that are readable are detectable by semantic classifiers -- they contain
        natural language patterns that can be classified as adversarial. Raw GCG
        suffixes that are unreadable are detectable by perplexity detectors but
        not by semantic classifiers. A complete detection system requires both,
        handling both ends of the readability spectrum.

        This is why the Section 7.14 ensemble has both a semantic classifier
        (handles readable adversarial content including AutoDAN-style suffixes,
        DAN variants, persona attacks) and a perplexity detector (handles
        unreadable adversarial suffixes including raw GCG). The two detectors
        cover the two ends of a single spectrum.

    - number: "7.9.7"
      title: "Open-Weight Model Risk: GCG as Commodity Attack"
      body: |
        Before the public release of high-quality open-weight models in 2023,
        running GCG required access to model weights that were not publicly
        available. The computational and access requirements placed GCG attack
        development beyond the reach of most adversaries.

        Llama-2's public release in July 2023 and the Zou et al. GCG paper in
        July 2023 were contemporaneous events that together fundamentally changed
        the threat model. After these releases, any adversary with a consumer GPU
        (16GB+ VRAM) and a few hours of compute time could develop transferable
        adversarial suffixes against closed-source production models. GCG moved
        from research-only to commodity-accessible in months.

        The open-weight model ecosystem continues to expand. Each release of a
        new open-weight model provides additional attack development platforms,
        including models whose alignment may differ from existing closed-source
        models in ways that produce new transferable suffix patterns. The attack
        surface for GCG-based attacks grows with each open-weight release.

        The practical threat model for production deployments as of 2026: assume
        GCG-generated suffixes are available to sophisticated adversaries at low
        cost. Perplexity detection is not optional -- it is a baseline control
        for any deployment that faces adversaries with moderate technical capability
        and motivation.

        The detection investment priority: perplexity detection is computationally
        inexpensive relative to the semantic classifier. A bi-gram or tri-gram
        language model suffices for detecting raw GCG suffixes. A small fine-tuned
        model improves recall on AutoDAN-style suffixes. The latency cost is low.
        The investment is justified by the baseline threat level.

    - number: "7.9.8"
      title: "Perplexity-Based Detection: The Statistical Anomaly Approach"
      body: |
        Perplexity measures how surprising a sequence of tokens is to a language
        model. A language model trained on natural text assigns high probability
        to natural text sequences and low probability to unnatural sequences.
        Perplexity is the exponentiated average negative log-probability per token:
        a low perplexity means the sequence was unsurprising (natural language);
        a high perplexity means the sequence was surprising (anomalous).

        GCG suffixes have extremely high perplexity under any language model trained
        on natural text. They contain token sequences that appear at vanishing
        frequency in any natural corpus -- the optimisation process selected them
        because they are effective in the loss landscape, not because they appear
        in human text. The perplexity detector exploits this: flag any input turn
        where the perplexity of the suffix region (the final N tokens of the turn)
        is above a calibrated threshold.

        Four implementation decisions determine the detector's effectiveness.

        Perplexity model choice. A small, fast language model is sufficient for
        raw GCG detection. GPT-2 small or a similar 100-200M parameter model
        computes perplexity in milliseconds per input. A larger or domain-adapted
        model improves recall on AutoDAN-style suffixes that are somewhat readable.
        The deployment latency budget drives this choice.

        Window size. The suffix is typically at the end of the input. Compute
        perplexity over the full input and over the last N tokens separately.
        The last-N-token perplexity is more sensitive to suffix anomalies without
        being contaminated by the (potentially legitimate) prefix content.

        Threshold calibration. GCG suffixes typically have perplexity in the
        hundreds to thousands on a standard language model, versus typical natural
        language perplexity of 20-60. The threshold separating anomalous from
        normal is wide -- a relatively coarse threshold produces very low FPR.
        Calibrate against your deployment's user distribution to confirm.

        Combination with semantic classifier. The perplexity detector and the
        semantic classifier operate independently and in parallel. An input that
        scores high on one detector but low on the other is still flagged --
        the ensemble uses OR logic for single-detector signals. An input that
        scores high on both detectors is a composed attack: AutoDAN-style readable
        suffix on top of a semantic jailbreak pattern.

