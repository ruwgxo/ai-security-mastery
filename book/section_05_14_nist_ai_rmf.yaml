section_summary:
  one_paragraph: |
    Section 5.14 establishes NIST AI RMF as the organisational scaffolding that makes
    the technical security work of Sections 5.8-5.13 consequential — connecting technical
    measurements to governance decisions, budget approvals, and deployment authorities.
    The four-function architecture is presented with its sequential dependency logic:
    GOVERN (policies and roles before any other function), MAP (risk identification and
    context before measurement), MEASURE (the technical engine — all implementations from
    Sections 5.8-5.12 live here), and MANAGE (treatment decisions and residual risk
    acceptance for every identified risk). The GOVERN function is operationalised through
    an AI use policy template, a six-gate model governance procedure, role assignment
    definitions, and a four-level maturity taxonomy from absent to optimising. The MAP
    function produces three artefacts — system context document, stakeholder impact
    inventory, and initial risk register — with the NIST AI 100-1 trustworthiness
    categories mapped to specific ATLAS techniques. The MEASURE function is the most
    technically dense: a 12-metric catalog covers security (ATLAS coverage score, supply
    chain pass rate, extraction alerts), privacy (memorisation risk score, MIA AUC, canary
    recall events), fairness (max FNR ratio, exploitability score, sentiment disparity),
    and compliance (EU AI Act compliance percentage, GDPR article gap count), each with
    target threshold, source tool, and review cadence. The MANAGE function establishes four
    treatment options (mitigate, accept, transfer, avoid), the residual risk acceptance
    discipline (every risk must reach a treatment state — no orphans), and a five-phase
    AI incident response plan with regulatory notification triggers. NIST AI RMF and
    NIST CSF are compared across three dimensions of difference (harm scope, lifecycle
    coverage, stakeholder scope) and two integration points (DETECT↔MEASURE 2.4 and
    GOVERN↔GOVERN). The section closes with a full RAG deployment worked example and
    explicit bridge mapping: the Part 3 detection engineering programme (Chapters 11-17)
    is the production operationalisation of NIST AI RMF MEASURE and MANAGE. Three
    implementations deliver the RMF mapping template with 27 required outputs and the
    maturity scorecard, the GOVERN policy template generator producing AI use policy
    and model governance procedure in Markdown, and the MEASURE metrics dashboard with
    RAG status tracking paired with the MANAGE risk register.

  next_section: |
