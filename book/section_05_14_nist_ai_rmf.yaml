# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    NIST AI RMF is the management language for technical AI security work.
    The GOVERN function provides organisational authority to gate deployments.
    The MAP function scopes what risks to measure. The MEASURE function is
    where the technical implementations from Sections 5.8-5.12 live. The MANAGE
    function ensures every measured risk reaches a documented treatment decision.
    Engineers who understand all four functions can translate security work into
    budget requests and governance decisions.

  takeaway_02: |
    GOVERN must precede MAP, MAP must precede MEASURE, and MEASURE must precede
    MANAGE. This is not bureaucracy — it is dependency management. A detection
    programme without deployment authority (GOVERN) generates alerts nobody acts on.
    A bias audit without a deployment gate (GOVERN gate 4) produces findings nobody
    blocks. Sequence matters.

  takeaway_03: |
    The MEASURE sub-function 2.4 (ongoing monitoring) is the production detection
    engineering programme. Every Sigma rule from Section 5.8, every output scanner
    from Section 5.10-5.11, and every bias drift monitor from Section 5.12 is a
    NIST AI RMF MEASURE 2.4 control. Tagging these controls with MEASURE sub-function
    identifiers in the SIEM produces regulatory compliance evidence as a by-product of
    normal security operations.

  takeaway_04: |
    Orphaned risks are the primary source of AI security incidents. A risk that
    appears in the MAP risk register but has no documented treatment decision is
    neither mitigated nor accepted — it simply exists. The MANAGE function's discipline
    of requiring every risk to reach a treatment state (mitigate / accept / transfer /
    avoid) closes this gap. The risk register implementation enforces this by flagging
    orphaned risks explicitly.

  takeaway_05: |
    Residual risk acceptance is a governance act, not a technical one. The statement
    "we accept the residual risk of MIA AUC = 0.61 against our general-purpose assistant
    because it is within the 0.70 threshold for this data type" must be signed by the
    AI Risk Owner, not decided by the detection engineer. Documenting this signature
    is what transforms a technical measurement into a defensible governance decision.

  takeaway_06: |
    NIST AI RMF and NIST CSF are complementary, not competitive. The three unique
    AI RMF sub-functions (MEASURE 2.1 risk analysis, 2.2 testing, 2.3 evaluation)
    have no CSF equivalent. The two overlap points (GOVERN↔GOVERN, DETECT↔MEASURE 2.4)
    are integration points, not duplications. Organisations that run both frameworks
    should tag controls with both identifiers and produce a single unified evidence
    package per control.

  takeaway_07: |
    The model governance procedure with six lifecycle gates is the operationalisation
    of NIST AI RMF GOVERN. Gate 4 (pre-deployment) is the most consequential: it is
    the point where MEASURE outputs (bias audit, privacy audit, ATLAS coverage, ML SBOM)
    are reviewed and a deployment decision is made. This is where the technical work
    of Chapters 5-17 produces its most direct business value — either a confident
    deployment decision with documented evidence, or a blocked deployment that prevents
    a future incident.

  takeaway_08: |
    The bridge to Part 3 is direct. Chapters 11-17 operationalise NIST AI RMF MEASURE
    sub-functions 2.1 through 2.4 and MANAGE at production scale. Engineers building
    the detection engineering programme in Part 3 are simultaneously implementing the
    NIST AI RMF MEASURE and MANAGE functions and producing compliance evidence for EU AI
    Act Article 15, GDPR Article 25, and US EO 14110. The technical work and the
    governance framework are not separate activities — they are the same work described
    in two languages.

