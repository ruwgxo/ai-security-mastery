section_content:

  subsection_01:
    number: "5.14.1"
    title: "NIST AI RMF Overview: Architecture and Rationale"
    content: |
      what_it_is: |
        NIST AI Risk Management Framework (NIST AI 100-1, January 2023) is a voluntary
        framework from the US National Institute of Standards and Technology for managing
        risks associated with artificial intelligence. It is non-prescriptive by design —
        it does not mandate specific controls or metrics, but provides a structured
        process for identifying, measuring, and managing AI risks throughout the system
        lifecycle.

        It is the primary AI risk standard referenced by:
          - US Executive Order 14110 (Section 4.1 directs NIST to develop AI standards)
          - EU AI Act Article 9 risk management requirements (structural alignment)
          - ISO/IEC 42001 AI Management System Standard (compatible)
          - Financial sector SR 11-7 model risk management guidance (complementary)

      why_engineers_need_to_understand_it: |
        NIST AI RMF is the language your CISO, board, and compliance team speak about
        AI risk. When the detection engineering programme from Part 3 needs budget, the
        justification lives in the MEASURE function. When you need organisational authority
        to gate a model deployment, the process lives in the GOVERN function. When an
        AI security incident occurs, the response process is defined by MANAGE.

        Engineers who understand only the technical language of ATLAS techniques and OWASP
        categories cannot communicate to the governance layer that approves budgets and
        sets policy. Engineers who understand both are the ones who build lasting programmes.

      four_function_architecture:

        function_govern:
          id: "GOVERN"
          purpose: "Establish policies, roles, accountability, and culture for AI risk management"
          temporal_position: "Before the AI system lifecycle begins — GOVERN is the foundation"
          key_question: "Who is responsible for what, and what are the rules?"
          primary_outputs:
            - "AI use policy (what AI may be used for, by whom, under what constraints)"
            - "Model governance procedure (how models are approved, deployed, and retired)"
            - "Role assignments (who owns AI risk, who approves deployments)"
            - "Accountability structure (escalation path for AI risk decisions)"
            - "Culture and training (AI risk awareness across the organisation)"

        function_map:
          id: "MAP"
          purpose: "Identify and categorise AI risks in context: who is affected, by what, how severely"
          temporal_position: "At system design and before each major deployment decision"
          key_question: "What are the risks of this specific AI system in this specific context?"
          primary_outputs:
            - "System context document (purpose, users, deployment environment, data flows)"
            - "Risk categorisation (using GOVERN-defined risk tiers)"
            - "Stakeholder impact inventory (who could be harmed, how, how severely)"
            - "Threat model (STRIDE or similar, incorporating ATLAS techniques)"
            - "Risk register entries (initial population from MAP)"

        function_measure:
          id: "MEASURE"
          purpose: "Analyse, test, evaluate, and monitor identified risks with quantitative and qualitative methods"
          temporal_position: "During development, at deployment gates, and continuously in production"
          key_question: "How bad are the risks, and how well are controls working?"
          primary_outputs:
            - "Bias audit results (Section 5.12 outputs)"
            - "Privacy risk audit results (Sections 5.10-5.11 outputs)"
            - "ATLAS detection programme coverage score (Section 5.8)"
            - "Model card with per-group metrics (Section 5.12.7)"
            - "MIA AUC and memorisation risk score (Sections 5.10-5.11)"
            - "Robustness benchmark results (adversarial test accuracy)"

        function_manage:
          id: "MANAGE"
          purpose: "Select and implement risk treatments; accept residual risk; plan incident response"
          temporal_position: "Following MEASURE; continuously as new risks emerge"
          key_question: "What are we going to do about the risks, and what residual risk do we accept?"
          primary_outputs:
            - "Risk treatment decisions (mitigate / accept / transfer / avoid)"
            - "Residual risk acceptance records (documented, authorised by appropriate level)"
            - "Incident response plan for AI-specific incidents"
            - "Risk register updates (treatments applied, residual risk stated)"
            - "Continuous improvement cycle (GOVERN → MAP → MEASURE → MANAGE → GOVERN)"

      sequential_logic: |
        The four functions are not independent — they form a dependency chain:
          GOVERN first: without policies and roles, MAP produces un-owned risks
          MAP second:   without context, MEASURE measures the wrong things
          MEASURE third: without measurements, MANAGE makes uninformed treatment decisions
          MANAGE fourth: without treatment, risks remain at discovery-level severity

        In practice: GOVERN is established once and updated annually. MAP runs at
        system design and before major deployments. MEASURE runs continuously.
        MANAGE runs at defined decision gates and after measurement anomalies.

  subsection_02:
    number: "5.14.2"
    title: "GOVERN: Policies, Roles, and Accountability for AI Risk"
    content: |
      govern_rationale: |
        The GOVERN function exists because technical risk management without organisational
        authority fails. A detection programme that alerts on AML.T0019 supply chain
        compromise is useless if no one has the authority or obligation to act on the alert.
        An MIA self-assessment that reveals AUC=0.82 achieves nothing if no one owns the
        decision of whether to deploy or remediate. GOVERN creates the organisational
        structure that makes technical work consequential.

      ai_use_policy_requirements:
        what_it_covers:
          - "Permitted and prohibited AI use cases (aligned with EU AI Act tier classification)"
          - "Data classification: which data categories may be used for AI training"
          - "Third-party AI services: approved providers, BAA/DPA requirements"
          - "Human oversight requirements: which decisions require human review"
          - "Employee accountability: consequences of policy violation"
          - "Exception process: how to request use of AI outside policy bounds"
        minimum_viable_policy_elements:
          element_01: "Scope: which systems and persons the policy covers"
          element_02: "Risk tier assignment: how deployments are classified"
          element_03: "Approval authority: who approves high-risk AI deployments"
          element_04: "Data governance: training data classification and handling"
          element_05: "Prohibited uses: explicit list of prohibited AI applications"
          element_06: "Incident reporting: how AI incidents are reported and escalated"

      model_governance_procedure:
        lifecycle_gates:
          gate_01_proposal:
            description: "AI project proposed; initial risk tier assigned"
            required_artefacts: ["Project brief", "Initial MAP context document", "Data inventory"]
            approver: "AI Risk Owner"
          gate_02_design_review:
            description: "Architecture and data sources reviewed; MAP completed"
            required_artefacts: ["MAP risk register", "Privacy assessment", "Bias risk assessment"]
            approver: "AI Risk Committee"
          gate_03_pre_training:
            description: "Training data and base model verified before training begins"
            required_artefacts: ["ML SBOM Layer 1 (dataset)", "ML SBOM Layer 2 (base model)", "Legal basis memo"]
            approver: "AI Risk Owner + Legal"
          gate_04_pre_deployment:
            description: "All MEASURE results reviewed; deployment decision made"
            required_artefacts: ["Model card", "Bias audit", "Privacy risk audit", "ATLAS coverage score", "ML SBOM complete"]
            approver: "AI Risk Committee"
          gate_05_post_deployment_review:
            description: "90-day post-deployment review; production metrics reviewed"
            required_artefacts: ["Production monitoring report", "Incident log", "Drift analysis"]
            approver: "AI Risk Owner"
          gate_06_retirement:
            description: "Model decommissioned; data retention and deletion documented"
            required_artefacts: ["Retirement notice", "Data disposition record", "ML SBOM archival"]
            approver: "AI Risk Owner"

      role_assignments:
        ai_risk_owner:
          responsibilities: "Owns AI risk register; approves MANAGE decisions; chairs AI Risk Committee"
          typically: "CISO or Chief AI Officer"
        ai_risk_committee:
          responsibilities: "Reviews high-risk deployment proposals; approves deployment gates 2 and 4"
          typically: "CISO + CTO + Legal + Privacy Officer"
        model_owner:
          responsibilities: "Owns a specific model's risk register entries; accountable for MEASURE outputs"
          typically: "Engineering team lead or ML platform team"
        detection_engineer:
          responsibilities: "Implements and maintains MEASURE outputs: detection rules, monitoring, alert thresholds"
          typically: "Security engineer in AI security team"
        ai_red_team:
          responsibilities: "Adversarial testing; ATLAS technique simulation; reports to AI Risk Owner"
          typically: "Security team with AI specialisation or contracted red team"

      govern_maturity_levels:
        level_0_absent: "No AI policy; no AI-specific roles; no model governance"
        level_1_initial: "Informal AI policy; AI risk owned informally by existing roles"
        level_2_defined: "Written AI use policy; model governance procedure documented; roles assigned"
        level_3_managed: "Policy enforced; deployment gates operational; risk register active"
        level_4_optimising: "Continuous policy review; metrics on governance effectiveness; audit evidence produced"

  subsection_03:
    number: "5.14.3"
    title: "MAP: Risk Identification, Context Setting, and Categorisation"
    content: |
      map_rationale: |
        MAP is the risk discovery function. Its output feeds MEASURE with the
        specific risks to measure and MANAGE with the initial risk register.
        The MAP function applied to an LLM deployment produces three artefacts:
        a context document, a stakeholder impact inventory, and a threat model.
        All three are prerequisites for MEASURE — you cannot measure a risk you
        have not identified.

      system_context_document_components:
        purpose_and_intended_use: |
          What the AI system is intended to do; the population of intended users;
          the deployment environment (internal tool, customer-facing API, embedded in product).
        data_flows: |
          Input data: where it comes from, who provides it, what sensitive categories it may contain.
          Output data: where it goes, who consumes it, what actions it triggers.
          Training data: sources, processing, storage.
        trust_boundaries: |
          External trust boundary: between the AI system and untrusted callers.
          Internal trust boundary: between the AI system and privileged internal resources.
          Third-party boundary: between the organisation's AI and third-party model providers.
        assets_and_their_sensitivity:
          model_weights: "IP; potential for IP theft (AML.T0035)"
          training_data: "Privacy; potential for extraction (AML.T0037) and membership inference (AML.T0048)"
          inference_outputs: "Privacy; potential for PII disclosure"
          system_prompt: "Business logic confidentiality; potential for extraction (AML.T0056)"
          api_credentials: "Access control; potential for misuse"

      risk_categorisation_taxonomy:
        trustworthiness_categories_from_nist_ai_100_1:
          - "Accuracy: performs as intended on in-distribution data"
          - "Reliability: performs consistently across conditions and over time"
          - "Robustness: performs under adversarial conditions and distributional shift"
          - "Safety: does not cause harm to humans or the environment"
          - "Security: resistant to adversarial attack on availability, integrity, or confidentiality"
          - "Explainability: outputs can be understood and audited"
          - "Privacy: personal data handled in compliance with principles and regulations"
          - "Fairness: does not produce unjust differential impacts across groups"
          - "Accountability: decisions can be attributed and contested"
          - "Transparency: stakeholders understand system purpose, limitations, and behaviour"

        security_subcategory_to_atlas_mapping:
          accuracy_attacks: ["AML.T0015", "AML.T0043", "AML.T0031"]
          availability_attacks: ["AML.T0029"]
          integrity_attacks: ["AML.T0018", "AML.T0020", "AML.T0019"]
          confidentiality_attacks: ["AML.T0025", "AML.T0037", "AML.T0056", "AML.T0035"]
          injection_attacks: ["AML.T0051", "AML.T0054"]
          plugin_exploitation: ["AML.T0053"]

      stakeholder_impact_inventory:
        direct_users:
          description: "People who interact with the AI system directly"
          harm_types: ["Inaccurate outputs used in decisions", "PII disclosed to other users", "Manipulated by AI output"]
          severity_factors: "Vulnerability of user population; reversibility of harm; breadth of affected users"
        indirect_subjects:
          description: "People who are the subject of AI decisions but do not interact with it"
          harm_types: ["Discriminatory decision (bias)", "PII included in training without consent", "Membership inference confirmation"]
          severity_factors: "GDPR data subject rights; EU AI Act Annex III high-risk categorisation"
        third_parties:
          description: "Organisations or individuals affected by AI outputs or actions"
          harm_types: ["Defamatory outputs", "IP disclosure", "Plugin actions affecting third parties"]
          severity_factors: "Legal liability; reputational damage; financial harm"
        the_organisation:
          description: "The deploying organisation"
          harm_types: ["IP theft", "Regulatory penalty", "Reputational damage", "Model downtime"]
          severity_factors: "Revenue impact; regulatory exposure; competitive harm"

      map_risk_register_initial_population: |
        MAP produces the initial risk register. Each entry includes:
          Risk ID | Category | Description | Affected stakeholders | Initial likelihood | Initial impact | Mapped ATLAS technique(s)

        Example entry:
          R-001 | Security.Confidentiality | Training data verbatim recall via prefix probing |
                  Direct users (competitive query), Indirect subjects (PII subjects) |
                  Likelihood: Medium (API is publicly accessible) |
                  Impact: High (PII disclosure, GDPR breach) |
                  ATLAS: AML.T0037, AML.T0048 |
                  MEASURE: Memorisation risk score, MIA AUC, canary token monitoring

  subsection_04:
    number: "5.14.4"
    title: "MEASURE: Risk Analysis, Testing, Evaluation, and Monitoring"
    content: |
      measure_is_the_technical_engine: |
        MEASURE is where the technical work of this book lives. Every implementation
        from Sections 5.8 through 5.12 is a MEASURE sub-function. NIST AI RMF does not
        prescribe specific metrics — it requires that risks be measured and that
        measurements be used to inform MANAGE decisions. The implementations in this
        book fill that prescriptive gap with concrete metrics and tools.

      measure_sub_functions_and_book_mappings:

        measure_2_1_risk_analysis:
          nist_description: "Qualitative and quantitative methods for risk analysis"
          book_implementation:
            - "ATLAS coverage assessment (Section 5.8.8) — coverage score as quantitative risk metric"
            - "Memorisation risk scorer (Section 5.10 impl) — corpus risk score 0-1"
            - "Loss-gap MIA risk quantifier (Section 5.11 impl) — loss gap as overfitting proxy"
            - "GroupFairnessAuditor adversarial exploitability score (Section 5.12 impl)"

        measure_2_2_risk_testing:
          nist_description: "Testing, evaluation, verification, and validation of AI systems"
          book_implementation:
            - "ATLAS attack chain simulator (Section 5.8 impl) — penetration testing for ML attacks"
            - "LR MIA self-assessment (Section 5.11 impl) — black-box privacy attack testing"
            - "Extraction PoC (Section 5.10 impl) — training data extraction testing"
            - "LLM stereotype probe suite (Section 5.12 impl) — bias testing"
            - "Model inversion demonstration (Section 5.11 deliverable) — gradient-based inversion"

        measure_2_3_risk_evaluation:
          nist_description: "Evaluate risks against established criteria and risk appetite"
          book_implementation:
            - "MIA risk thresholds by data type (Section 5.11.5) — risk appetite operationalised"
            - "Fairness metric violation thresholds (Section 5.12) — bias risk appetite"
            - "EU AI Act gap analyser (Section 5.13 impl) — compliance risk evaluation"
            - "Privacy risk audit five-stage evaluation (Section 5.11.7)"

        measure_2_4_risk_monitoring:
          nist_description: "Ongoing monitoring of AI system performance and risk indicators"
          book_implementation:
            - "Extraction detector Layer 1 + Layer 2 (Section 5.10 impl) — real-time API monitoring"
            - "Privacy defence layer instrumentation (Section 5.11 impl) — output monitoring"
            - "Feedback loop simulator + canary monitoring (Section 5.12 impl) — bias drift detection"
            - "ATLAS Sigma rule stubs (Section 5.8 impl) — SIEM-integrated monitoring"
            - "Supply chain hash monitoring (Section 5.9 impl) — artifact integrity monitoring"

      measure_metrics_catalog_for_llm_deployments:
        security_metrics:
          - name: "ATLAS_coverage_score"
            definition: "Fraction of top-10 ATLAS techniques with deployed detection rule"
            target: ">= 0.80 for high-risk deployments"
            source: "Section 5.8 — atlas_coverage_assessment.py"
            review_cadence: "Quarterly + after each model update"
          - name: "supply_chain_scan_pass_rate"
            definition: "Fraction of model artifacts passing all six intake checks"
            target: "1.0 (any failure is a blocking event)"
            source: "Section 5.9 — ml_artifact_scanner.py"
            review_cadence: "Per artifact ingestion"
          - name: "extraction_alerts_per_day"
            definition: "Count of Layer 1 extraction detector alerts per day"
            target: "< 5 per day baseline; trend upward is a signal"
            source: "Section 5.10 — extraction_detector.py"
            review_cadence: "Daily dashboard; weekly trend review"
        privacy_metrics:
          - name: "memorisation_risk_score"
            definition: "Corpus risk score 0-1 from n-gram repetition and PII density"
            target: "< 0.30 for high-sensitivity data"
            source: "Section 5.10 — training_data_extraction_poc.py"
            review_cadence: "Before each training run"
          - name: "mia_auc_roc"
            definition: "AUC-ROC of likelihood-ratio MIA self-assessment"
            target: "Per data-type threshold table in Section 5.11.5"
            source: "Section 5.11 — mi_attack_tools.py"
            review_cadence: "Pre-deployment; annually in production"
          - name: "canary_recall_events_per_month"
            definition: "Count of canary token recall events detected in output scanner"
            target: "0 (any event is a critical alert)"
            source: "Section 5.10 + 5.11 output scanners"
            review_cadence: "Real-time alert + monthly review"
        fairness_metrics:
          - name: "max_fnr_ratio"
            definition: "Maximum ratio of FNR between any two protected groups"
            target: ">= 0.80 (four-fifths rule compliance)"
            source: "Section 5.12 — bias_audit_suite.py"
            review_cadence: "Pre-deployment; quarterly in production"
          - name: "adversarial_exploitability_score"
            definition: "Composite bias exploitability score 0-1"
            target: "< 0.20 for production deployment"
            source: "Section 5.12 — GroupFairnessAuditor"
            review_cadence: "Pre-deployment; after each retraining"
          - name: "stereotype_sentiment_disparity"
            definition: "Max sentiment score range across demographic groups in probe suite"
            target: "< 0.30"
            source: "Section 5.12 — LLMStereotypeProbeRunner"
            review_cadence: "Pre-deployment; quarterly"
        compliance_metrics:
          - name: "eu_ai_act_compliance_pct"
            definition: "Fraction of applicable EU AI Act controls implemented"
            target: "1.0 before enforcement date"
            source: "Section 5.13 — eu_ai_act_compliance.py"
            review_cadence: "Quarterly; before each enforcement milestone"
          - name: "gdpr_article_gap_count"
            definition: "Count of GDPR articles with critical or high gaps"
            target: "0 critical gaps; 0 high gaps for personal-data deployments"
            source: "Section 5.13 — gdpr_ai_compliance.py"
            review_cadence: "Quarterly"

  subsection_05:
    number: "5.14.5"
    title: "MANAGE: Risk Treatment, Residual Risk Acceptance, and Incident Response"
    content: |
      manage_rationale: |
        MANAGE translates MEASURE outputs into decisions and actions. Without MANAGE,
        MEASURE produces metrics that inform nobody. The MANAGE function enforces three
        disciplines that are absent from most technical AI security programmes:
          (1) Explicit treatment decisions for every risk above appetite threshold
          (2) Documented residual risk acceptance — risk that was not mitigated is
              explicitly accepted, not implicitly ignored
          (3) Incident response planning before incidents occur, not during them

      four_risk_treatment_options:

        treatment_mitigate:
          definition: "Reduce probability and/or impact of the risk through controls"
          examples:
            - "Deploy ATLAS detection rule for AML.T0019 → mitigates supply chain risk"
            - "Apply DP training ε=4 → mitigates memorisation and MIA risk"
            - "Enforce SafeTensors format → mitigates pickle RCE supply chain risk"
          when_to_use: "Risk above risk appetite AND mitigation is technically feasible and cost-effective"
          documentation: "Control implemented (reference to technical implementation); residual risk after control"

        treatment_accept:
          definition: "Acknowledge the risk and accept it at its current level without additional controls"
          examples:
            - "AML.T0046 adversarial patches: not relevant to text-only deployment — accept"
            - "MIA AUC = 0.57 for general-purpose model: below threshold — accept"
          when_to_use: "Risk is below risk appetite threshold OR mitigation cost exceeds impact"
          documentation: "Explicit acceptance signed by appropriate authority; review date"

        treatment_transfer:
          definition: "Transfer the financial or operational impact to a third party"
          examples:
            - "Cyber insurance covering AI-related data breach costs"
            - "Contractual liability shift to model provider via BAA/DPA"
          when_to_use: "Risk cannot be fully mitigated but financial impact is insurable"
          documentation: "Insurance policy / contract reference; residual risk statement"

        treatment_avoid:
          definition: "Eliminate the risk by not undertaking the activity"
          examples:
            - "Do not fine-tune on PHI without DP training — avoid until DP is implemented"
            - "Do not deploy emotion recognition at workplace — prohibited by EU AI Act"
          when_to_use: "Risk is unacceptable and no feasible mitigation exists"
          documentation: "Decision record; alternative approach if applicable"

      residual_risk_acceptance_discipline: |
        Every risk in the MAP risk register must reach one of four states:
          MITIGATED: control deployed and MEASURE confirms effectiveness
          ACCEPTED:  explicit acceptance documented with authority sign-off
          TRANSFERRED: financial risk transferred; operational risk documented
          AVOIDED:   activity not undertaken

        Risks that are none of the above are "orphaned" — they exist in the register
        without a treatment decision. Orphaned risks are the most common source of
        actual AI security incidents. MANAGE enforces that every risk has a treatment.

        Residual risk acceptance record required fields:
          risk_id | current_risk_level | treatment_applied | residual_level | accepted_by | accepted_date | review_date

      ai_incident_response_plan_components:
        detection_triggers:
          - "ATLAS detection rule fires (any severity HIGH or above)"
          - "Canary token recall event in output scanner"
          - "MIA AUC exceeds threshold in monthly self-assessment"
          - "ATLAS coverage score drops below 0.70"
          - "Bias audit FNR ratio drops below 0.80 for any group"
          - "Supply chain artifact fails any of the six intake checks"

        response_procedure_phases:
          phase_01_contain:
            actions: ["Rate-limit or disable affected API key/endpoint", "Preserve logs for forensic analysis", "Notify AI Risk Owner within 1 hour"]
          phase_02_assess:
            actions: ["Determine scope: how many queries, what data exposed", "Classify incident severity using risk register", "Determine regulatory notification obligations (GDPR 72h, HIPAA, etc.)"]
          phase_03_remediate:
            actions: ["Apply technical fix (rotate keys, patch control, retrain with clean data)", "Verify fix effectiveness with MEASURE re-run", "Document root cause and contributing factors"]
          phase_04_recover:
            actions: ["Restore service with enhanced monitoring", "Update risk register with new entry for this incident type", "Feed incident into next GOVERN review cycle"]
          phase_05_review:
            actions: ["Post-incident review within 2 weeks", "Update MANAGE treatment for affected risk", "Share lessons learned with AI Risk Committee"]

        regulatory_notification_triggers:
          gdpr_72h: "Personal data breach from AI output — notify supervisory authority within 72h"
          eu_ai_act_serious_incident: "Serious incident or malfunction of high-risk AI — notify market surveillance authority"
          hipaa: "PHI breach from AI output — notify covered entity/OCR within 60 days"
          us_eo_14110: "Significant safety or security incident with qualifying model — report to federal government"

  subsection_06:
    number: "5.14.6"
    title: "NIST AI RMF vs NIST Cybersecurity Framework: Differences and Integration"
    content: |
      csf_overview: |
        NIST Cybersecurity Framework (CSF 2.0) organises cybersecurity activities
        into six functions: GOVERN, IDENTIFY, PROTECT, DETECT, RESPOND, RECOVER.
        Most security teams are familiar with CSF. The AI RMF is not a replacement —
        it is a specialised overlay for AI-specific risks that the CSF was not designed
        to capture.

      three_key_differences:

        difference_01_scope_of_harm:
          csf: "Focuses on cybersecurity harms: CIA triad (confidentiality, integrity, availability)"
          ai_rmf: "Extends harm scope: includes fairness, explainability, privacy, safety — harms not reducible to CIA"
          implication: "AI-specific harms (discriminatory output, training data extraction, hallucination) require AI RMF categories beyond CSF's CIA framing"

        difference_02_lifecycle_coverage:
          csf: "Primarily addresses operational security — protects deployed systems"
          ai_rmf: "Covers full AI lifecycle: design decisions, training data, model development, deployment, and decommissioning"
          implication: "Supply chain risks (Section 5.9) and dataset poisoning (Section 5.9.3) occur before deployment — CSF PROTECT does not naturally cover them; AI RMF MAP does"

        difference_03_stakeholder_scope:
          csf: "Protects the organisation's systems and data"
          ai_rmf: "Explicitly protects all affected stakeholders: users, indirect subjects, third parties, and society"
          implication: "Bias affecting AI decisions on individuals is a NIST AI RMF risk; it is not naturally a CSF cybersecurity risk"

      two_integration_points:

        integration_01_detect_to_measure:
          csf_function: "DETECT"
          ai_rmf_function: "MEASURE (sub-function 2.4 — ongoing monitoring)"
          integration: |
            The CSF DETECT function (anomalies and events, continuous monitoring, detection processes)
            maps directly to NIST AI RMF MEASURE 2.4. The ATLAS Sigma rules from Section 5.8 are
            simultaneously CSF DETECT controls and AI RMF MEASURE 2.4 monitoring mechanisms.
            In a SIEM: tag ATLAS-derived alerts with both CSF.DE and AI_RMF.MEASURE.2.4 identifiers
            for dual-framework compliance reporting.

        integration_02_govern_to_govern:
          csf_function: "GOVERN (CSF 2.0)"
          ai_rmf_function: "GOVERN"
          integration: |
            Both frameworks have a GOVERN function as of CSF 2.0 (added in the 2024 update).
            CSF GOVERN establishes organisational cybersecurity risk strategy.
            AI RMF GOVERN establishes AI-specific risk policies within that strategy.
            An AI use policy should be an annex to or consistent with the organisation's
            CSF GOVERN cybersecurity policy — not a separate, potentially conflicting document.

      csf_to_ai_rmf_mapping_table:
        csf_govern:    "AI RMF GOVERN — policies, roles, accountability (direct overlap)"
        csf_identify:  "AI RMF MAP — risk identification, context, asset inventory (strong overlap)"
        csf_protect:   "AI RMF MANAGE (mitigate) — control implementation (partial overlap)"
        csf_detect:    "AI RMF MEASURE 2.4 — monitoring (strong overlap)"
        csf_respond:   "AI RMF MANAGE (response planning) — incident response (partial overlap)"
        csf_recover:   "AI RMF MANAGE (recovery) — restore and improve (partial overlap)"
        ai_rmf_unique: "MEASURE 2.1/2.2/2.3 (risk analysis, testing, evaluation) — not in CSF"

  subsection_07:
    number: "5.14.7"
    title: "Applying NIST AI RMF to LLM Deployments: Practical Template and Bridge to Part 3"
    content: |
      practical_mapping_for_rag_deployment: |
        Worked example: enterprise RAG deployment (document QA assistant).
        This is the same system modelled in Chapter 5 Summary (Section 5.15).
        NIST AI RMF applied to this deployment demonstrates how every Chapter 5
        technical output maps to a specific RMF function and sub-function.

        govern_outputs_for_rag:
          ai_use_policy_excerpt: "RAG deployment approved for internal document QA; prohibited from customer-facing use without additional privacy review; system prompt is confidential"
          model_governance_gate: "Gate 4 (pre-deployment) requires: ML SBOM complete, bias audit pass, ATLAS coverage >= 0.80, MIA AUC within threshold for data type"
          role_assignments: "Model Owner: ML platform team lead; Detection Engineer: AI security team; Red Team: contracted quarterly"

        map_outputs_for_rag:
          context: "Internal document QA assistant for engineering team; processes internal technical documents and code; trust boundary at API layer"
          top_5_risks:
            - "R-001: System prompt extraction (AML.T0056) — Medium/High"
            - "R-002: Indirect injection via retrieved documents (AML.T0054) — Medium/High"
            - "R-003: Training data verbatim recall from fine-tune corpus (AML.T0037) — Low/High"
            - "R-004: Plugin confused deputy if email integration enabled (AML.T0053) — Low/Critical"
            - "R-005: Supply chain compromise of base model (AML.T0019) — Low/Critical"

        measure_outputs_for_rag:
          atlas_coverage_score: "0.73 (pre-deployment) → 0.89 (post-detection programme deployment)"
          memorisation_risk_score: "0.22 (internal technical docs — low PII density)"
          mia_auc: "0.61 (general proprietary text — within 0.70 threshold)"
          fnr_ratio: "Not applicable — classification model absent; LLM output quality monitored instead"
          supply_chain_pass_rate: "1.0 (SafeTensors enforced at intake)"

        manage_outputs_for_rag:
          r001_treatment: "MITIGATE — deploy extraction classifier on input; monitor output for system prompt fragments"
          r002_treatment: "MITIGATE — deploy injection scanner on RAG retrieved content before assembly"
          r003_treatment: "ACCEPT — memorisation risk score 0.22 is within threshold; canary tokens deployed"
          r004_treatment: "AVOID — email plugin disabled until allowlist validation implemented"
          r005_treatment: "MITIGATE — SafeTensors format check deployed at intake; hash verification active"

      bridge_to_part_3: |
        The detection engineering programme in Part 3 (Chapters 11-17) operationalises
        the NIST AI RMF MEASURE and MANAGE functions at production scale. The mapping is:

          Chapter 11 — Detection Engineering Fundamentals → MEASURE 2.2 (testing) + MEASURE 2.4 (monitoring)
          Chapter 12 — Building Detection Rules → MEASURE 2.2 + MANAGE (mitigate)
          Chapter 13 — Statistical Baselines → MEASURE 2.1 (risk analysis) + MEASURE 2.4
          Chapter 14 — Production Deployment Security → MANAGE (treat + recover)
          Chapter 15 — Red Teaming → MEASURE 2.2 (testing) + MAP (threat model update)
          Chapter 16 — Incident Response → MANAGE (respond)
          Chapter 17 — Programme Measurement → MEASURE 2.3 (evaluation) + GOVERN (policy update)

        Engineers who build the Part 3 detection programme are simultaneously implementing
        the NIST AI RMF MEASURE and MANAGE functions. They are producing regulatory
        compliance evidence for EU AI Act Article 15, GDPR Article 25, and US EO 14110
        as a by-product of their security engineering work.

# ============================================================================
# IMPLEMENTATIONS
# ============================================================================

implementations:

  implementation_01:
    title: "NIST AI RMF Mapping Template + Implementation Scorecard"
    filename: "nist_ai_rmf_tools.py"
    purpose: |
      Two tools:
      (1) RMFMappingTemplate: structured template for mapping an LLM deployment
          to all four NIST AI RMF functions, populating required outputs per function,
          and linking to specific Chapter 5 technical implementations.
      (2) RMFScorecard: maturity assessment across all four functions using a
          0-4 maturity scale (absent → initial → defined → managed → optimising).
          Produces per-function maturity level, overall score, and prioritised
          improvement actions.
    language: "python"
    code: |
      """
      NIST AI RMF Mapping Template + Maturity Scorecard
      Four-function assessment with Chapter 5 implementation linkage.
      """

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      # -----------------------------------------------------------------------
      # RMF Mapping Template
      # -----------------------------------------------------------------------

      @dataclass
      class RMFOutput:
          function: str
          sub_function: str
          output_name: str
          status: str          # "complete" / "partial" / "missing"
          artefact_ref: str    # file, document, or tool reference
          chapter5_section: str


      REQUIRED_OUTPUTS = [
          # GOVERN
          RMFOutput("GOVERN", "GV-1.1", "AI use policy documented", "missing", "", "5.14.2"),
          RMFOutput("GOVERN", "GV-1.2", "Model governance procedure with lifecycle gates", "missing", "", "5.14.2"),
          RMFOutput("GOVERN", "GV-1.3", "Role assignments: AI Risk Owner, Model Owner, Detection Engineer", "missing", "", "5.14.2"),
          RMFOutput("GOVERN", "GV-1.4", "Accountability structure and escalation path documented", "missing", "", "5.14.2"),
          RMFOutput("GOVERN", "GV-2.1", "AI risk appetite statement approved by leadership", "missing", "", "5.14.2"),
          # MAP
          RMFOutput("MAP", "MP-2.1", "System context document (data flows, trust boundaries, assets)", "missing", "", "5.14.3"),
          RMFOutput("MAP", "MP-2.2", "Stakeholder impact inventory (direct users, subjects, org)", "missing", "", "5.14.3"),
          RMFOutput("MAP", "MP-3.1", "Threat model with ATLAS technique mapping", "missing", "Section 5.8", "5.8"),
          RMFOutput("MAP", "MP-4.1", "Initial risk register populated from threat model", "missing", "", "5.14.3"),
          RMFOutput("MAP", "MP-5.1", "EU AI Act tier classification for this deployment", "missing", "eu_ai_act_compliance.py", "5.13"),
          # MEASURE
          RMFOutput("MEASURE", "MS-2.1", "ATLAS coverage score computed and documented", "missing", "atlas_coverage_assessment.py", "5.8"),
          RMFOutput("MEASURE", "MS-2.1", "Memorisation risk score for training corpus", "missing", "training_data_extraction_poc.py", "5.10"),
          RMFOutput("MEASURE", "MS-2.1", "MIA AUC self-assessment completed", "missing", "mi_attack_tools.py", "5.11"),
          RMFOutput("MEASURE", "MS-2.1", "Bias audit with per-group fairness metrics", "missing", "bias_audit_suite.py", "5.12"),
          RMFOutput("MEASURE", "MS-2.2", "ATLAS attack chain simulation (adversarial testing)", "missing", "atlas_attack_chain_simulator.py", "5.8"),
          RMFOutput("MEASURE", "MS-2.2", "Extraction PoC run against deployment model", "missing", "training_data_extraction_poc.py", "5.10"),
          RMFOutput("MEASURE", "MS-2.3", "Privacy risk audit five-stage report", "missing", "privacy_risk_audit.py", "5.11"),
          RMFOutput("MEASURE", "MS-2.3", "EU AI Act gap analysis completed", "missing", "eu_ai_act_compliance.py", "5.13"),
          RMFOutput("MEASURE", "MS-2.4", "Extraction detector deployed in serving pipeline", "missing", "extraction_detector.py", "5.10"),
          RMFOutput("MEASURE", "MS-2.4", "Output verbatim recall scanner deployed", "missing", "dp_and_output_scanner.py", "5.10"),
          RMFOutput("MEASURE", "MS-2.4", "Supply chain hash monitoring active", "missing", "ml_artifact_scanner.py", "5.9"),
          RMFOutput("MEASURE", "MS-2.4", "ATLAS Sigma stubs deployed to SIEM", "missing", "atlas_top10_sigma_stubs.yaml", "5.8"),
          # MANAGE
          RMFOutput("MANAGE", "MG-2.1", "Risk treatment decision recorded for each MAP risk", "missing", "", "5.14.5"),
          RMFOutput("MANAGE", "MG-2.2", "Residual risk acceptance documented and signed", "missing", "", "5.14.5"),
          RMFOutput("MANAGE", "MG-3.1", "AI incident response plan documented", "missing", "", "5.14.5"),
          RMFOutput("MANAGE", "MG-4.1", "Post-deployment 90-day review scheduled", "missing", "", "5.14.2"),
          RMFOutput("MANAGE", "MG-4.2", "MANAGE outputs feed back into GOVERN review", "missing", "", "5.14.1"),
      ]


      def update_status(outputs: List[RMFOutput],
                        completed: Dict[str, str]) -> List[RMFOutput]:
          """completed: {output_name: artefact_ref}"""
          for o in outputs:
              if o.output_name in completed:
                  o.status = "complete"
                  o.artefact_ref = completed[o.output_name]
          return outputs


      def print_rmf_mapping(outputs: List[RMFOutput], model_id: str = "deployment") -> None:
          from collections import defaultdict
          by_fn: Dict[str, List[RMFOutput]] = defaultdict(list)
          for o in outputs:
              by_fn[o.function].append(o)
          print(f"\n{'='*65}")
          print(f"NIST AI RMF MAPPING: {model_id}")
          for fn in ["GOVERN", "MAP", "MEASURE", "MANAGE"]:
              items = by_fn[fn]
              done = sum(1 for i in items if i.status == "complete")
              print(f"\n  {fn}: {done}/{len(items)} complete")
              for i in items:
                  icon = "OK  " if i.status == "complete" else "MISS"
                  ref = f" [{i.artefact_ref[:30]}]" if i.artefact_ref else ""
                  print(f"    [{icon}] [{i.sub_function}] {i.output_name[:50]}{ref}")


      # -----------------------------------------------------------------------
      # Maturity Scorecard
      # -----------------------------------------------------------------------

      MATURITY_CRITERIA = {
          "GOVERN": {
              0: "No AI policy; no AI-specific roles",
              1: "Informal AI policy; AI risk informally owned",
              2: "Written AI use policy; model governance procedure; roles assigned",
              3: "Policy enforced at deployment gates; risk register active; roles active",
              4: "Continuous governance review; metrics on effectiveness; audit trail produced",
          },
          "MAP": {
              0: "No risk identification; no context documentation",
              1: "Ad hoc risk identification; no systematic threat model",
              2: "Context document exists; threat model drafted; initial risk register",
              3: "Threat model updated per model version; risk register maintained; stakeholders consulted",
              4: "Automated risk identification inputs; threat model versioned; stakeholder impact tracked",
          },
          "MEASURE": {
              0: "No AI-specific metrics; no testing beyond standard ML evaluation",
              1: "Ad hoc security testing; no regular cadence; metrics not tracked",
              2: "ATLAS coverage score computed; bias audit done pre-deployment; MIA test done once",
              3: "All metrics tracked on defined cadence; SIEM monitoring active; scorecard reviewed quarterly",
              4: "Automated measurement pipeline; real-time dashboards; metric regression triggers remeasure",
          },
          "MANAGE": {
              0: "No risk treatment decisions documented; no incident response plan",
              1: "Some risks mitigated informally; no residual risk acceptance",
              2: "Risk treatment decisions recorded; incident response plan drafted",
              3: "All risks have treatment decisions; residual risk explicitly accepted; IRP tested annually",
              4: "Treatments continuously evaluated; residual risk reviewed at each MEASURE cycle",
          },
      }


      @dataclass
      class ScorecardEntry:
          function: str
          current_level: int
          target_level: int
          current_description: str
          gap_actions: List[str]


      @dataclass
      class RMFScorecard:
          model_id: str
          entries: List[ScorecardEntry]
          overall_score: float
          priority_actions: List[str]


      def assess_maturity(model_id: str,
                          levels: Dict[str, int],
                          targets: Optional[Dict[str, int]] = None) -> RMFScorecard:
          targets = targets or {"GOVERN": 3, "MAP": 3, "MEASURE": 3, "MANAGE": 3}
          entries = []
          all_actions = []
          for fn in ["GOVERN", "MAP", "MEASURE", "MANAGE"]:
              lvl = levels.get(fn, 0)
              tgt = targets.get(fn, 3)
              gaps = []
              for next_lvl in range(lvl + 1, tgt + 1):
                  gaps.append(f"Level {next_lvl}: {MATURITY_CRITERIA[fn][next_lvl]}")
              all_actions.extend(f"{fn}: {g}" for g in gaps[:1])
              entries.append(ScorecardEntry(
                  function=fn, current_level=lvl, target_level=tgt,
                  current_description=MATURITY_CRITERIA[fn][lvl],
                  gap_actions=gaps,
              ))
          overall = sum(e.current_level for e in entries) / (4 * 4) * 100
          return RMFScorecard(model_id=model_id, entries=entries,
                               overall_score=round(overall, 1),
                               priority_actions=all_actions[:4])


      def print_scorecard(s: RMFScorecard) -> None:
          print(f"\n{'='*60}")
          print(f"NIST AI RMF MATURITY SCORECARD: {s.model_id}")
          print(f"Overall maturity: {s.overall_score:.1f}% (max 100%)")
          print(f"\n{'Function':10s}  {'Current':>8}  {'Target':>8}  {'Gap':>6}")
          print("-" * 40)
          for e in s.entries:
              gap = e.target_level - e.current_level
              print(f"{e.function:10s}  {e.current_level:>6}/4  {e.target_level:>6}/4  "
                    f"{'×' * gap if gap else 'OK':>6}")
              print(f"           {e.current_description[:55]}")
          if s.priority_actions:
              print(f"\nTop priority actions:")
              for a in s.priority_actions:
                  print(f"  → {a[:70]}")


      if __name__ == "__main__":
          # Example: partially-mature LLM programme
          current_levels = {"GOVERN": 2, "MAP": 2, "MEASURE": 1, "MANAGE": 1}
          sc = assess_maturity("enterprise-rag-v1", current_levels)
          print_scorecard(sc)

          # Map the deployment outputs
          completed = {
              "ATLAS coverage score computed and documented": "atlas_coverage_assessment.py output",
              "EU AI Act tier classification for this deployment": "eu_ai_act_compliance.py — high_risk",
              "Memorisation risk score for training corpus": "training_data_extraction_poc.py — score=0.22",
              "Supply chain hash monitoring active": "ml_artifact_scanner.py deployed",
          }
          outputs = [RMFOutput(__vars(o)) for o in REQUIRED_OUTPUTS]
          outputs = update_status(outputs, completed)
          print_rmf_mapping(outputs, "enterprise-rag-v1")

  implementation_02:
    title: "GOVERN Policies Template Generator"
    filename: "govern_policy_templates.py"
    purpose: |
      Generates two foundational GOVERN documents as Markdown files:
      (1) AI Use Policy — six required policy sections covering scope, risk tiers,
          prohibited uses, data governance, human oversight, roles, and incident reporting.
      (2) Model Governance Procedure — six lifecycle gates with required artefacts,
          approvers, and maximum review times per gate.
      Both documents accept an organisation-specific PolicyConfig dataclass and export
      directly to .md files suitable for documentation systems.
    language: "python"
    code: |
      """
      GOVERN Policy Template Generator
      Produces AI Use Policy and Model Governance Procedure as Markdown.
      Uses line-by-line construction to avoid YAML literal block edge cases.
      """

      from dataclasses import dataclass, field
      from datetime import date
      from typing import List


      @dataclass
      class PolicyConfig:
          org_name: str
          policy_owner: str
          approval_authority: str
          ai_risk_owner_role: str
          ai_risk_committee: str
          effective_date: str
          review_cadence: str = "Annual"
          prohibited_uses: List[str] = field(default_factory=list)
          approved_providers: List[str] = field(default_factory=list)


      def _bullets(items: List[str], fallback: str = "- [TO BE COMPLETED]") -> str:
          return "\n".join(f"- {i}" for i in items) if items else fallback


      def generate_ai_use_policy(cfg: PolicyConfig) -> str:
          sections = [
              f"# AI Use Policy — {cfg.org_name}",
              f"",
              f"Policy Owner: {cfg.policy_owner}",
              f"Approval Authority: {cfg.approval_authority}",
              f"Effective Date: {cfg.effective_date}",
              f"Review Cadence: {cfg.review_cadence}",
              f"",
              f"---",
              f"",
              f"## 1.1 Purpose and Scope",
              f"",
              f"This policy governs the development, deployment, and use of AI systems at",
              f"{cfg.org_name}. It applies to all employees, contractors, and third parties who",
              f"develop, deploy, procure, or use AI systems on behalf of {cfg.org_name}.",
              f"",
              f"## 1.2 AI Risk Tier Classification",
              f"",
              f"All AI systems must be classified into one of four risk tiers before deployment,",
              f"consistent with EU AI Act classifications:",
              f"",
              f"- Tier 1 - Prohibited: AI uses prohibited by law or policy.",
              f"- Tier 2 - High Risk: Requires approval by {cfg.ai_risk_committee}.",
              f"- Tier 3 - Limited Risk: Standard deployment with disclosure requirements.",
              f"- Tier 4 - Minimal Risk: Standard engineering review sufficient.",
              f"",
              f"## 1.3 Prohibited Uses",
              f"",
              _bullets(cfg.prohibited_uses),
              f"",
              f"## 1.4 Training Data Governance",
              f"",
              f"Training data used for AI development must:",
              f"- Have a documented legal basis for processing (GDPR Article 6 or equivalent)",
              f"- Be recorded in the ML SBOM dataset provenance layer before training begins",
              f"- Not include Special Category data (GDPR Article 9) without DPIA approval",
              f"- Be stored in access-controlled, encrypted storage with audit logging",
              f"",
              f"## 1.5 Approved External AI Providers",
              f"",
              _bullets(cfg.approved_providers),
              f"",
              f"Use of any unlisted provider requires approval from {cfg.ai_risk_owner_role}.",
              f"Sending personal data to any external provider requires a DPA (and BAA where applicable).",
              f"",
              f"## 1.6 Human Oversight Requirements",
              f"",
              f"AI systems making or substantially influencing decisions that affect individuals require:",
              f"- A human review path for decisions above a defined confidence threshold",
              f"- An audit log of AI-assisted decisions retained per applicable regulation",
              f"- A contestability process for affected individuals",
              f"",
              f"## 1.7 Roles and Responsibilities",
              f"",
              f"| Role | Responsibility |",
              f"|------|---------------|",
              f"| {cfg.ai_risk_owner_role} | Owns AI risk register; approves high-risk deployments |",
              f"| {cfg.ai_risk_committee} | Reviews Tier 2 proposals; approves Gates 2 and 4 |",
              f"| Model Owner | Accountable for MEASURE outputs; maintains model card |",
              f"| Detection Engineer | Implements NIST AI RMF MEASURE 2.4 monitoring controls |",
              f"",
              f"## 1.8 Incident Reporting",
              f"",
              f"Suspected AI security incidents must be reported to {cfg.ai_risk_owner_role}",
              f"within 4 hours of discovery. GDPR 72h breach notification obligations apply.",
              f"",
              f"## 1.9 Policy Violations",
              f"",
              f"Violations may result in disciplinary action. Non-compliant AI systems will be",
              f"decommissioned pending review.",
              f"",
              f"---",
              f"NIST AI RMF: GOVERN GV-1.1 (policy), GV-1.3 (roles), GV-2.1 (risk appetite)",
              f"EU AI Act: Article 9 risk management; Article 26 deployer obligations",
          ]
          return "\n".join(sections)


      def generate_model_governance_procedure(cfg: PolicyConfig) -> str:
          gates = [
              ("Gate 1 - Project Proposal",
               "Before any AI development begins",
               ["Project brief: purpose, users, data sources, deployment context",
                "Initial EU AI Act tier classification",
                "Data inventory: what data will be used for training"],
               cfg.ai_risk_owner_role, "5 business days"),
              ("Gate 2 - Design Review",
               "After architecture defined; before training data collection",
               ["MAP context document (data flows, trust boundaries, assets)",
                "Initial risk register from ATLAS threat model",
                "Privacy assessment (PII categories; GDPR Article 35 DPIA trigger)",
                "Bias risk assessment (protected attributes; subgroup representation)"],
               cfg.ai_risk_committee, "10 business days"),
              ("Gate 3 - Pre-Training Verification",
               "Immediately before training begins",
               ["ML SBOM Layer 1 (dataset: source, hash, legal basis)",
                "ML SBOM Layer 2 (base model: format check, hash, model card score)",
                "Legal basis memo for any personal data in training corpus"],
               f"{cfg.ai_risk_owner_role} + Legal", "3 business days"),
              ("Gate 4 - Pre-Deployment Review",
               "After training and before any production deployment",
               ["Model card (complete with bias disclosure section)",
                "Bias audit (per-group FNR/FPR; four-fifths rule; exploitability score)",
                "Privacy risk audit (corpus score; loss gap; MIA AUC vs threshold)",
                "ATLAS coverage score (>= 0.80 required for high-risk deployments)",
                "ML SBOM complete (all four layers)",
                "EU AI Act gap analysis (zero critical gaps required)"],
               cfg.ai_risk_committee, "10 business days"),
              ("Gate 5 - 90-Day Post-Deployment Review",
               "90 days after initial production deployment",
               ["Production monitoring report: extraction alerts, canary recalls",
                "Incident log: any AI security incidents since deployment",
                "Output distribution drift analysis"],
               cfg.ai_risk_owner_role, "5 business days"),
              ("Gate 6 - Retirement",
               "When model is decommissioned",
               ["Retirement notice with rationale",
                "Data disposition record (training data and model weights)",
                "ML SBOM archival record"],
               cfg.ai_risk_owner_role, "3 business days"),
          ]

          lines = [
              f"# Model Governance Procedure — {cfg.org_name}",
              f"",
              f"Effective Date: {cfg.effective_date}  |  Owner: {cfg.policy_owner}",
              f"",
              f"---",
              f"",
              f"## Overview",
              f"",
              f"All AI models deployed by {cfg.org_name} must pass through six governance gates.",
              f"Each gate has required artefacts, an approver, and a maximum review time.",
              f"",
          ]
          for title, when, artefacts, approver, review_time in gates:
              lines += [
                  f"---",
                  f"",
                  f"### {title}",
                  f"",
                  f"When: {when}",
                  f"Required artefacts:",
              ]
              lines += [f"- {a}" for a in artefacts]
              lines += [
                  f"",
                  f"Approver: {approver}",
                  f"Max review time: {review_time}",
                  f"",
              ]
          lines += [
              f"---",
              f"NIST AI RMF: GOVERN GV-1.2 (model governance procedure)",
              f"EU AI Act: Articles 9, 11, 16, 17 (quality management system)",
          ]
          return "\n".join(lines)


      if __name__ == "__main__":
          cfg = PolicyConfig(
              org_name="AcmeCorp",
              policy_owner="CISO",
              approval_authority="CTO + CISO",
              ai_risk_owner_role="Chief AI Risk Officer",
              ai_risk_committee="AI Risk Committee (CISO + CTO + Legal + Privacy)",
              effective_date=str(date.today()),
              prohibited_uses=[
                  "Social scoring of employees or customers for general purposes",
                  "Real-time biometric identification in publicly accessible spaces",
                  "Emotion recognition in workplace or educational settings",
                  "Any use prohibited under EU AI Act Article 5",
              ],
              approved_providers=[
                  "Anthropic Claude API (non-PHI, non-privileged data only)",
                  "OpenAI API (non-PHI, non-privileged data only)",
                  "AWS Bedrock (with executed DPA)",
              ],
          )

          policy_md = generate_ai_use_policy(cfg)
          gov_md    = generate_model_governance_procedure(cfg)

          with open("ai_use_policy.md", "w") as f:
              f.write(policy_md)
          with open("model_governance_procedure.md", "w") as f:
              f.write(gov_md)

          print("Generated: ai_use_policy.md")
          print("Generated: model_governance_procedure.md")
          print(f"Policy lines: {len(policy_md.splitlines())}")
          print(f"Procedure lines: {len(gov_md.splitlines())}")


  implementation_03:
    title: "MEASURE Metrics Dashboard + Risk Register Integration"
    filename: "rmf_metrics_dashboard.py"
    purpose: |
      Two tools:
      (1) MetricsDashboard: aggregates all MEASURE metrics from Sections 5.8-5.12
          into a single dashboard view with RAG (red/amber/green) status per metric,
          trend direction, and overall security posture score.
      (2) RiskRegister: lightweight risk register that integrates MAP-identified risks,
          MEASURE results, and MANAGE treatment decisions into a single queryable
          structure. Produces a risk register report with treatment status and
          residual risk summary.
    language: "python"
    code: |
      """
      MEASURE Metrics Dashboard + Risk Register Integration
      RAG status, trend tracking, risk register with treatment decisions.
      """

      from dataclasses import dataclass, field
      from datetime import date
      from typing import Dict, List, Optional


      # -----------------------------------------------------------------------
      # Metrics Dashboard
      # -----------------------------------------------------------------------

      @dataclass
      class Metric:
          name: str
          value: float
          unit: str
          target: float
          direction: str       # "lower_is_better" / "higher_is_better"
          previous_value: Optional[float]
          source_tool: str
          chapter5_section: str
          review_cadence: str

          @property
          def rag(self) -> str:
              if self.direction == "higher_is_better":
                  ratio = self.value / max(self.target, 1e-9)
              else:
                  ratio = self.target / max(self.value, 1e-9)
              return "GREEN" if ratio >= 1.0 else "AMBER" if ratio >= 0.75 else "RED"

          @property
          def trend(self) -> str:
              if self.previous_value is None:
                  return "NEW"
              if self.direction == "higher_is_better":
                  return "UP" if self.value > self.previous_value else "DOWN" if self.value < self.previous_value else "FLAT"
              return "DOWN" if self.value < self.previous_value else "UP" if self.value > self.previous_value else "FLAT"

          @property
          def trend_is_good(self) -> bool:
              if self.trend == "NEW":
                  return True
              if self.direction == "higher_is_better":
                  return self.trend == "UP"
              return self.trend == "DOWN"


      class MetricsDashboard:
          def __init__(self, model_id: str):
              self.model_id = model_id
              self.metrics: List[Metric] = []

          def add(self, m: Metric) -> None:
              self.metrics.append(m)

          def posture_score(self) -> float:
              """Fraction of metrics at GREEN."""
              if not self.metrics:
                  return 0.0
              return round(sum(1 for m in self.metrics if m.rag == "GREEN") / len(self.metrics) * 100, 1)

          def critical_reds(self) -> List[Metric]:
              return [m for m in self.metrics if m.rag == "RED"]

          def print_dashboard(self) -> None:
              rag_icons = {"GREEN": "GREEN", "AMBER": "AMBER", "RED": "RED  "}
              trend_icons = {"UP": "↑", "DOWN": "↓", "FLAT": "→", "NEW": "·"}
              print(f"\n{'='*70}")
              print(f"NIST AI RMF MEASURE DASHBOARD: {self.model_id}")
              print(f"Security Posture Score: {self.posture_score():.1f}%  |  "
                    f"Metrics: {len(self.metrics)}  |  "
                    f"RED: {len(self.critical_reds())}")
              print(f"\n{'Metric':35s}  {'Value':>10}  {'Target':>8}  {'Status':>7}  {'Trend':>5}")
              print("-" * 70)
              for m in sorted(self.metrics, key=lambda x: (x.rag != "RED", x.rag != "AMBER")):
                  trend_sym = trend_icons.get(m.trend, "?")
                  trend_color = "✓" if m.trend_is_good else "!"
                  print(f"{m.name[:35]:35s}  {m.value:>9.3f}{m.unit[0]:1}  "
                        f"{m.target:>8.3f}  [{rag_icons[m.rag]}]  "
                        f"{trend_sym}{trend_color}")
              if self.critical_reds():
                  print(f"\nRED METRICS — immediate action required:")
                  for m in self.critical_reds():
                      print(f"  {m.name}: {m.value:.3f} (target: {m.target:.3f}) — {m.source_tool}")


      # -----------------------------------------------------------------------
      # Risk Register
      # -----------------------------------------------------------------------

      @dataclass
      class RiskEntry:
          risk_id: str
          category: str
          description: str
          atlas_techniques: List[str]
          likelihood: str       # "low" / "medium" / "high"
          impact: str           # "low" / "medium" / "high" / "critical"
          treatment: str        # "mitigate" / "accept" / "transfer" / "avoid"
          control_ref: str
          residual_likelihood: str
          residual_impact: str
          accepted_by: str
          accepted_date: str
          review_date: str
          status: str           # "open" / "mitigated" / "accepted" / "closed"


      LIKELIHOOD_RANK = {"low": 1, "medium": 2, "high": 3}
      IMPACT_RANK = {"low": 1, "medium": 2, "high": 3, "critical": 4}


      class RiskRegister:
          def __init__(self, model_id: str):
              self.model_id = model_id
              self.entries: List[RiskEntry] = []

          def add(self, entry: RiskEntry) -> None:
              self.entries.append(entry)

          def open_risks(self) -> List[RiskEntry]:
              return [e for e in self.entries if e.status == "open"]

          def orphaned_risks(self) -> List[RiskEntry]:
              """Risks with no treatment decision."""
              return [e for e in self.entries if e.treatment == ""]

          def priority_sort(self) -> List[RiskEntry]:
              return sorted(self.entries,
                            key=lambda e: -(LIKELIHOOD_RANK.get(e.residual_likelihood, 0) *
                                            IMPACT_RANK.get(e.residual_impact, 0)))

          def print_register(self) -> None:
              print(f"\n{'='*70}")
              print(f"RISK REGISTER: {self.model_id}  ({len(self.entries)} risks)")
              orphaned = self.orphaned_risks()
              if orphaned:
                  print(f"WARNING: {len(orphaned)} orphaned risks (no treatment decision)")
              print(f"\n{'ID':>6}  {'Category':20s}  {'Treatment':10s}  "
                    f"{'Residual L':>10}  {'Residual I':>10}  {'Status':>10}")
              print("-" * 70)
              for e in self.priority_sort():
                  print(f"{e.risk_id:>6}  {e.category[:20]:20s}  {e.treatment[:10]:10s}  "
                        f"{e.residual_likelihood:>10}  {e.residual_impact:>10}  {e.status:>10}")
                  print(f"        {e.description[:60]}")
                  if e.atlas_techniques:
                      print(f"        ATLAS: {', '.join(e.atlas_techniques)}")


      if __name__ == "__main__":
          # --- Metrics Dashboard ---
          dash = MetricsDashboard("enterprise-rag-v1")
          dash.add(Metric("ATLAS coverage score",     0.73, "",  0.80, "higher_is_better", 0.65, "atlas_coverage_assessment.py", "5.8",  "Quarterly"))
          dash.add(Metric("Supply chain pass rate",   1.00, "",  1.00, "higher_is_better", 1.00, "ml_artifact_scanner.py",       "5.9",  "Per intake"))
          dash.add(Metric("Memorisation risk score",  0.22, "",  0.30, "lower_is_better",  0.18, "training_data_extraction_poc.py","5.10","Pre-training"))
          dash.add(Metric("MIA AUC-ROC",              0.61, "",  0.70, "lower_is_better",  0.63, "mi_attack_tools.py",           "5.11", "Pre-deploy"))
          dash.add(Metric("Max FNR ratio",            0.71, "",  0.80, "higher_is_better", 0.69, "bias_audit_suite.py",          "5.12", "Quarterly"))
          dash.add(Metric("Extraction alerts/day",    8.20, "/d",5.00, "lower_is_better",  3.10, "extraction_detector.py",       "5.10", "Daily"))
          dash.add(Metric("Canary recalls/month",     0.00, "",  0.00, "lower_is_better",  0.00, "dp_and_output_scanner.py",     "5.10", "Real-time"))
          dash.add(Metric("EU AI Act compliance",     0.64, "",  1.00, "higher_is_better", 0.57, "eu_ai_act_compliance.py",      "5.13", "Quarterly"))
          dash.print_dashboard()

          # --- Risk Register ---
          rr = RiskRegister("enterprise-rag-v1")
          rr.add(RiskEntry("R-001","Security.Confidentiality",
              "System prompt extraction via prefix probing",
              ["AML.T0056"],"medium","high","mitigate",
              "extraction_detector.py + input classifier","low","medium",
              "AI Risk Owner","2026-01-15","2026-07-15","mitigated"))
          rr.add(RiskEntry("R-002","Security.Integrity",
              "Indirect injection via retrieved documents",
              ["AML.T0054","AML.T0051"],"medium","high","mitigate",
              "injection_scanner on RAG output","medium","medium",
              "AI Risk Owner","2026-01-15","2026-07-15","open"))
          rr.add(RiskEntry("R-003","Privacy",
              "Verbatim recall of fine-tuning corpus",
              ["AML.T0037"],"low","high","accept",
              "canary tokens + output scanner","low","medium",
              "AI Risk Owner","2026-01-15","2026-07-15","accepted"))
          rr.add(RiskEntry("R-004","Security.Availability",
              "Denial of service via context flooding",
              ["AML.T0029"],"medium","medium","mitigate",
              "token rate limiter","low","low",
              "AI Risk Owner","2026-01-15","2026-07-15","mitigated"))
          rr.add(RiskEntry("R-005","Supply Chain",
              "Malicious base model via supply chain compromise",
              ["AML.T0019","AML.T0011"],"low","critical","mitigate",
              "SafeTensors format check + hash verification","low","medium",
              "AI Risk Owner","2026-01-15","2026-07-15","mitigated"))
          rr.print_register()

