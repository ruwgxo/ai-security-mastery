prose_content:

  part_1:
    title: 'Why Ensemble Detection Outperforms Any Single Detector'
    body: |
      The case for the ensemble rests on two properties: coverage complementarity and error
      independence. Coverage complementarity means the detectors cover different parts of the attack
      surface. Error independence means that where one detector errs, the others often do not.
      Together, these properties make the ensemble cover more attacks with fewer false positives than
      any individual detector.

      Coverage complementarity arises from the different detection mechanisms. The anomaly detector
      (Isolation Forest) flags inputs that deviate from the learned benign distribution; it catches
      novel attacks that no labelled example resembles, because novelty is exactly what it detects.
      The supervised classifiers (Random Forest, XGBoost) flag inputs matching learned attack
      patterns; they catch known attack families with high precision but are blind to attacks unlike
      anything in their training data. The GRU flags multi-turn escalation patterns; it catches
      attacks that build across conversation turns, which single-message detectors cannot see. The
      embedding detector flags inputs semantically similar to known attacks; it catches paraphrase
      variants that change the wording but preserve the meaning, which keyword-based detection misses.

      Each mechanism has a coverage gap that another mechanism fills. The supervised classifier's gap
      (novel attacks) is the anomaly detector's strength. The single-message detectors' gap (multi-turn
      escalation) is the GRU's strength. The keyword detectors' gap (paraphrase variants) is the
      embedding detector's strength. The union of the four coverages is broader than any individual.

      Error independence is what converts the complementarity into improved precision. If the four
      detectors made the same errors -- flagged the same benign requests as attacks -- combining them
      would not reduce the false positives. But because the detectors use different mechanisms, they
      tend to make different errors: the anomaly detector's false positive on an unusual benign request
      is not shared by the supervised classifier, which confidently scores it benign. Combining the
      detectors so that a confident benign signal can override an isolated false positive reduces the
      ensemble's false positive rate below any individual detector's.

  part_2:
    title: 'Coverage Complementarity Analysis'
    body: |
      The coverage complementarity is not assumed; it is measured. The coverage complementarity
      analysis builds a matrix mapping each detector to the attack families it covers, using the MITRE
      ATLAS technique taxonomy as the attack family reference. For each ATLAS technique relevant to the
      gateway -- prompt injection (AML.T0051), jailbreak, data exfiltration, and the others from the
      Chapter 6 through 10 taxonomy -- the matrix records which detectors reliably catch attacks of that
      technique.

      The matrix reveals the coverage structure. Some techniques are covered by multiple detectors
      (a direct prompt injection is caught by the supervised classifier, the embedding detector, and
      often the anomaly detector), providing redundancy. Some techniques are covered by only one
      detector (multi-turn escalation is caught primarily by the GRU), making that detector the sole
      coverage for that technique -- a single point of failure that the matrix surfaces. Some techniques
      may be covered by none of the four, revealing a coverage gap that needs a new detector or a
      different control.

      The single-coverage techniques are the most important finding. If only the GRU covers multi-turn
      escalation, then a regression in the GRU leaves multi-turn attacks undetected, and the ensemble's
      apparent defence-in-depth is illusory for that technique. The coverage analysis identifies these
      single points of failure so they can be addressed -- by adding a second detector for the technique,
      by monitoring the sole detector more closely, or by accepting the risk explicitly.

      The coverage_complementarity_analyser.py in deliverable_2 builds the matrix from a labelled
      evaluation set tagged with ATLAS techniques. For each technique, it measures each detector's recall
      on that technique's examples, producing the coverage matrix that shows where the ensemble is
      redundant, where it is single-covered, and where it has gaps.

  part_3:
    title: 'Confidence Correlation: Are the Errors Independent?'
    body: |
      The ensemble's value depends on the detectors making independent errors. Two detectors that always
      agree -- that produce correlated confidence scores -- add nothing to each other: the ensemble of
      two perfectly correlated detectors is just one detector with extra compute cost. The confidence
      correlation measures how independent the detectors actually are.

      The confidence correlation matrix computes the pairwise correlation between the detectors' calibrated
      scores across an evaluation set. A correlation near 1 between two detectors means they score the same
      inputs similarly -- they agree on what is suspicious -- so they share the same blind spots and the
      ensemble of the two adds little. A correlation near 0 means they score independently -- they catch
      different things -- so the ensemble of the two covers more than either alone.

      The ideal ensemble has detectors with high individual accuracy and low pairwise correlation: each
      detector is good, and they are good at different things. The Chapter 12 detectors are designed for
      this -- the anomaly, supervised, sequence, and embedding mechanisms are fundamentally different, so
      their errors are largely independent. The correlation matrix verifies this design assumption holds
      on the actual data: if the supervised classifier and the embedding detector turn out to be highly
      correlated (perhaps because they both rely on similar surface features), the matrix surfaces it, and
      the ensemble weighting can account for the redundancy.

      The correlation also informs the combination strategy. Highly correlated detectors should not both
      receive full weight in a voting scheme, because their agreement is not independent confirmation --
      it is the same signal counted twice. The confidence_correlation_matrix.py in deliverable_3 computes
      the matrix and identifies the detector pairs whose correlation is high enough to warrant down-weighting
      one of them in the ensemble.

  part_4:
    title: 'Combination Strategies: Weighted Voting and Stacking'
    body: |
      Two combination strategies turn the four detector scores into a single decision. Weighted voting
      assigns each detector a weight and combines the calibrated scores as a weighted average; the ensemble
      flags an attack when the weighted average exceeds a threshold. The weights are set proportional to
      each detector's reliability: a detector with higher precision on a threat class gets more weight for
      that class. Weighted voting is simple, interpretable (the contribution of each detector is the weight
      times its score), and robust, but the weights are set heuristically or by a coarse optimisation.

      Stacking learns the combination instead of setting it heuristically. A meta-learner -- typically a
      logistic regression -- is trained on the four detectors' calibrated scores as features, with the
      ground-truth attack labels as the target. The meta-learner learns the optimal combination: which
      detectors to trust for which inputs, how to weight their agreement, and how to handle the cases where
      they disagree. The stacking meta-learner can learn that the GRU is most reliable for multi-turn
      jailbreaks and the embedding detector is most reliable for injection variants, assigning input-dependent
      effective weights that a fixed weighted vote cannot.

      The stacking meta-learner is trained on a held-out set -- not the data the individual detectors were
      trained on -- so that the meta-learner sees the detectors' scores on data they did not memorise,
      reflecting their true generalisation behaviour. This is the same temporal-split discipline applied
      one level up: the detectors train on the training split, the meta-learner trains on the validation
      split, and the test split evaluates the full ensemble.

      Stacking generally outperforms weighted voting when there is enough labelled data to train the
      meta-learner reliably, because it learns the combination from data rather than assuming a linear
      weighting. Weighted voting is the better choice when labelled data is scarce or when interpretability
      is paramount. The detector_ensemble.py in deliverable_1 implements both, defaulting to stacking when
      the validation set is large enough and falling back to weighted voting otherwise.

  part_5:
    title: 'Three-Tier Alert Routing'
    body: |
      The ensemble produces a combined attack probability, but the action taken depends on more than a
      single threshold. The three-tier alert routing -- block, flag, monitor -- aligns the ensemble output
      with the Chapter 11 false positive management and the analyst capacity.

      The block tier is for high-confidence detections where the ensemble is strongly confident the input is
      an attack. The condition is typically strong detector agreement: when all four detectors (or a strong
      majority weighted by reliability) agree the input is an attack with high calibrated confidence, the
      gateway blocks the request. Blocking is the most consequential action, so it is reserved for the
      detections where the false positive risk is lowest -- the strong-agreement cases.

      The flag tier is for medium-confidence detections where the ensemble has a partial signal. The
      condition is a majority signal or a single high-confidence detector without full agreement. Flagged
      requests are not blocked -- they proceed -- but they are routed to the analyst review queue. This is
      where the analyst capacity from Section 12.10 is consumed, and the flag threshold is calibrated to the
      capacity so the flagged volume matches what the analysts can review.

      The monitor tier is for weak signals where a single detector flags the input without corroboration.
      Monitored requests are not blocked and not routed to the analyst queue -- they are logged for later
      analysis and for the uncertainty sampling in Section 12.14. The monitor tier captures the weak signals
      that are not actionable individually but are valuable in aggregate for understanding the attack
      distribution and for the active learning loop.

      The three tiers align the ensemble with the analyst capacity and the false positive tolerance. The
      block tier acts automatically on the highest-confidence detections; the flag tier fills the analyst
      queue with the medium-confidence detections worth human review; the monitor tier captures the weak
      signals without consuming analyst time. The detector_ensemble.py implements the routing with
      configurable tier thresholds.

  part_6:
    title: 'Ensemble Latency and Explainability'
    body: |
      The ensemble runs the four detectors on the async parallel architecture from Section 12.12, so the
      ensemble latency is the maximum of the four detector latencies (around 15ms) plus the combination
      step (under 1ms for the weighted vote or the meta-learner inference). The ensemble_latency_profiler.py
      in deliverable_5 measures the full ensemble against the 50ms P99 budget, confirming that adding the
      combination to the parallel detectors does not breach the budget. The combination is cheap relative to
      the detector inference, so the ensemble latency is essentially the parallel detector latency.

      Explainability is the property that the ensemble decision can be attributed to its contributing
      detectors. When the ensemble blocks a request, the explanation should state which detectors flagged it
      and with what confidence: 'blocked because the supervised classifier (0.94) and the embedding detector
      (0.89) both flagged this as a prompt injection.' This attribution is essential for three reasons.
      Debugging: when the ensemble makes a wrong decision, the attribution shows which detector drove it, so
      the fix targets the right detector. Tuning: the attribution reveals which detectors contribute most to
      the decisions, informing the weight adjustments. Audit: when an ensemble decision is challenged, the
      attribution provides the explanation of why the decision was made.

      The ensemble_explainer.py in deliverable_4 produces the attribution. For a weighted vote, the attribution
      is the weighted contribution of each detector to the combined score. For a stacking meta-learner, the
      attribution uses the meta-learner's coefficients (for a logistic regression) or feature importances to
      show each detector's contribution to the final decision. The explainer also displays the per-detector
      calibrated confidence so the analyst sees not just that the ensemble flagged the request but which
      detectors drove the decision and how confident each was.

      Explainability connects to the broader detection-as-code discipline. An ensemble that produces opaque
      decisions is hard to operate; an ensemble whose every decision can be traced to its contributing
      detectors is debuggable, tunable, and defensible. The attribution is not an optional feature -- it is
      what makes the ensemble a maintainable production system rather than a black box.

