deliverables:

  deliverable_1:
    title: 'Detector Ensemble'
    filename: 'detector_ensemble.py'
    description: 'Four-detector ensemble with weighted voting, a stacking meta-learner, and three-tier alert routing. Combines the calibrated scores of the Isolation Forest, XGBoost, GRU, and embedding detector into a single decision routed to block, flag, or monitor.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: numpy, scikit-learn. Runs on the async architecture from Section 12.12; this module is the combination layer.'
    code: |
      # detector_ensemble.py
      # Section 12.15: Four-Detector Ensemble with Three-Tier Routing
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Dict, List, Optional

      import numpy as np
      from sklearn.linear_model import LogisticRegression


      class AlertTier(Enum):
          BLOCK = 'block'
          FLAG = 'flag'
          MONITOR = 'monitor'
          PASS = 'pass'


      DETECTOR_NAMES = ['isolation_forest', 'xgboost', 'gru', 'embedding']


      @dataclass
      class EnsembleResult:
          tier: AlertTier
          combined_score: float
          detector_scores: Dict[str, float]
          n_agreeing: int
          strategy: str
          contributions: Dict[str, float] = field(default_factory=dict)


      class DetectorEnsemble:
          '''
          Combines four calibrated detector scores via weighted voting or stacking.
          Routes the decision to block, flag, or monitor.

          Requires CALIBRATED scores (Section 12.10): uncalibrated scores from
          different detectors are not on a common scale and cannot be combined.
          '''

          def __init__(
              self,
              weights: Optional[Dict[str, float]] = None,
              block_threshold: float = 0.8,
              flag_threshold: float = 0.5,
              monitor_threshold: float = 0.3,
              agreement_confidence: float = 0.7,
          ) -> None:
              self.weights = weights or {n: 1.0 for n in DETECTOR_NAMES}
              self.block_threshold = block_threshold
              self.flag_threshold = flag_threshold
              self.monitor_threshold = monitor_threshold
              self.agreement_confidence = agreement_confidence
              self._meta_learner: Optional[LogisticRegression] = None
              self.strategy = 'weighted_voting'

          # ------------------------------------------------------------------
          # Stacking meta-learner training
          # ------------------------------------------------------------------

          def fit_meta_learner(
              self,
              detector_scores: np.ndarray,   # shape (n_samples, 4)
              labels: np.ndarray,
              min_samples: int = 500,
          ) -> bool:
              '''
              Train the stacking meta-learner on detector scores from the VALIDATION split.
              Returns True if stacking is enabled, False if falling back to weighted voting.
              '''
              if len(labels) < min_samples:
                  print(f'Only {len(labels)} samples (< {min_samples}); using weighted voting.')
                  self.strategy = 'weighted_voting'
                  return False
              self._meta_learner = LogisticRegression(max_iter=1000)
              self._meta_learner.fit(detector_scores, labels)
              self.strategy = 'stacking'
              print('Stacking meta-learner trained.')
              return True

          # ------------------------------------------------------------------
          # Combination
          # ------------------------------------------------------------------

          def _weighted_vote(self, scores: Dict[str, float]) -> tuple:
              total_w = sum(self.weights.get(n, 1.0) for n in scores)
              combined = sum(self.weights.get(n, 1.0) * s for n, s in scores.items()) / max(total_w, 1e-9)
              contributions = {
                  n: (self.weights.get(n, 1.0) * s) / max(total_w, 1e-9)
                  for n, s in scores.items()
              }
              return combined, contributions

          def _stacked(self, scores: Dict[str, float]) -> tuple:
              x = np.array([[scores.get(n, 0.0) for n in DETECTOR_NAMES]])
              combined = float(self._meta_learner.predict_proba(x)[0, 1])
              # Contribution = coefficient * score (logistic regression attribution)
              coefs = self._meta_learner.coef_[0]
              contributions = {
                  n: float(coefs[i] * scores.get(n, 0.0))
                  for i, n in enumerate(DETECTOR_NAMES)
              }
              return combined, contributions

          # ------------------------------------------------------------------
          # Routing
          # ------------------------------------------------------------------

          def _route(self, combined: float, scores: Dict[str, float]) -> tuple:
              n_agreeing = sum(1 for s in scores.values() if s >= self.agreement_confidence)

              # Block: strong agreement and high combined score
              if combined >= self.block_threshold and n_agreeing >= 3:
                  return AlertTier.BLOCK, n_agreeing
              # Block also on very high combined even without full agreement
              if combined >= self.block_threshold:
                  return AlertTier.FLAG, n_agreeing
              # Flag: majority signal
              if combined >= self.flag_threshold:
                  return AlertTier.FLAG, n_agreeing
              # Monitor: weak single-detector signal
              if combined >= self.monitor_threshold or n_agreeing >= 1:
                  return AlertTier.MONITOR, n_agreeing
              return AlertTier.PASS, n_agreeing

          def evaluate(self, detector_scores: Dict[str, float]) -> EnsembleResult:
              if self.strategy == 'stacking' and self._meta_learner is not None:
                  combined, contributions = self._stacked(detector_scores)
              else:
                  combined, contributions = self._weighted_vote(detector_scores)

              tier, n_agreeing = self._route(combined, detector_scores)
              return EnsembleResult(
                  tier=tier,
                  combined_score=combined,
                  detector_scores=detector_scores,
                  n_agreeing=n_agreeing,
                  strategy=self.strategy,
                  contributions=contributions,
              )


      if __name__ == '__main__':
          rng = np.random.default_rng(42)
          ensemble = DetectorEnsemble()

          cases = {
              'strong attack (all agree)': {'isolation_forest': 0.85, 'xgboost': 0.92, 'gru': 0.78, 'embedding': 0.88},
              'partial signal': {'isolation_forest': 0.3, 'xgboost': 0.72, 'gru': 0.4, 'embedding': 0.55},
              'single weak signal': {'isolation_forest': 0.65, 'xgboost': 0.2, 'gru': 0.15, 'embedding': 0.25},
              'clearly benign': {'isolation_forest': 0.1, 'xgboost': 0.05, 'gru': 0.08, 'embedding': 0.12},
          }
          for label, scores in cases.items():
              result = ensemble.evaluate(scores)
              print(f'\n{label}:')
              print(f'  combined={result.combined_score:.3f}  tier={result.tier.value.upper()}  '
                    f'agreeing={result.n_agreeing}/4')

          # Train a stacking meta-learner
          print('\n--- Training stacking meta-learner ---')
          n = 1000
          X = rng.random((n, 4))
          y = (X.mean(axis=1) + rng.normal(0, 0.1, n) > 0.5).astype(int)
          ensemble.fit_meta_learner(X, y)
          result = ensemble.evaluate({'isolation_forest': 0.85, 'xgboost': 0.92, 'gru': 0.78, 'embedding': 0.88})
          print(f'Stacked decision: combined={result.combined_score:.3f}  tier={result.tier.value.upper()}')

  deliverable_2:
    title: 'Coverage Complementarity Analyser'
    filename: 'coverage_complementarity_analyser.py'
    description: 'Per-attack-family coverage matrix showing which detectors cover which MITRE ATLAS techniques. Measures each detector recall per technique, identifies single-coverage techniques (single points of failure) and coverage gaps.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: numpy. Input is a labelled evaluation set tagged with ATLAS techniques and per-detector scores.'
    code: |
      # coverage_complementarity_analyser.py
      # Section 12.15: Coverage Complementarity Matrix
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional, Tuple

      import numpy as np


      @dataclass
      class TechniqueCoverage:
          technique: str
          n_examples: int
          per_detector_recall: Dict[str, float]
          covering_detectors: List[str]    # recall >= coverage_threshold
          is_single_coverage: bool
          is_gap: bool


      @dataclass
      class CoverageMatrix:
          techniques: List[TechniqueCoverage]
          single_coverage: List[str]
          gaps: List[str]
          well_covered: List[str]


      class CoverageComplementarityAnalyser:
          '''
          Builds the coverage matrix: which detectors cover which ATLAS techniques.
          Surfaces single-coverage techniques (SPOFs) and coverage gaps.
          '''

          def __init__(
              self,
              detector_names: List[str],
              coverage_threshold: float = 0.7,
              decision_threshold: float = 0.5,
          ) -> None:
              self.detector_names = detector_names
              self.coverage_threshold = coverage_threshold
              self.decision_threshold = decision_threshold

          def analyse(
              self,
              techniques: List[str],          # per-example ATLAS technique label
              detector_scores: Dict[str, np.ndarray],   # detector -> per-example scores
              is_attack: np.ndarray,          # per-example attack label (1/0)
          ) -> CoverageMatrix:
              unique_techniques = sorted(set(t for t, a in zip(techniques, is_attack) if a == 1))
              tech_arr = np.array(techniques)

              coverages = []
              for tech in unique_techniques:
                  mask = (tech_arr == tech) & (is_attack == 1)
                  n = int(mask.sum())
                  if n == 0:
                      continue
                  per_detector = {}
                  covering = []
                  for det in self.detector_names:
                      preds = (detector_scores[det][mask] >= self.decision_threshold)
                      recall = float(preds.mean())
                      per_detector[det] = recall
                      if recall >= self.coverage_threshold:
                          covering.append(det)
                  coverages.append(TechniqueCoverage(
                      technique=tech,
                      n_examples=n,
                      per_detector_recall=per_detector,
                      covering_detectors=covering,
                      is_single_coverage=(len(covering) == 1),
                      is_gap=(len(covering) == 0),
                  ))

              return CoverageMatrix(
                  techniques=coverages,
                  single_coverage=[c.technique for c in coverages if c.is_single_coverage],
                  gaps=[c.technique for c in coverages if c.is_gap],
                  well_covered=[c.technique for c in coverages if len(c.covering_detectors) >= 2],
              )


      def print_coverage_matrix(matrix: CoverageMatrix, detector_names: List[str]) -> None:
          print('Coverage Complementarity Matrix')
          print('=' * 80)
          header = '{:<28}'.format('ATLAS Technique') + ''.join(f'{d[:10]:>12}' for d in detector_names)
          print(header)
          print('-' * 80)
          for c in matrix.techniques:
              row = '{:<28}'.format(c.technique[:28])
              for d in detector_names:
                  r = c.per_detector_recall.get(d, 0.0)
                  mark = '*' if r >= 0.7 else ' '
                  row += f'{r:>11.2f}{mark}'
              print(row)
          print('-' * 80)
          print(f'  Well covered (2+ detectors): {len(matrix.well_covered)}')
          if matrix.single_coverage:
              print(f'  SINGLE COVERAGE (SPOF): {matrix.single_coverage}')
          if matrix.gaps:
              print(f'  COVERAGE GAPS: {matrix.gaps}')


      if __name__ == '__main__':
          rng = np.random.default_rng(42)
          detector_names = ['isolation_forest', 'xgboost', 'gru', 'embedding']
          n = 400

          techniques = rng.choice(
              ['prompt_injection', 'jailbreak', 'multiturn_escalation', 'paraphrase_variant', 'benign'],
              size=n, p=[0.2, 0.15, 0.1, 0.15, 0.4],
          ).tolist()
          is_attack = np.array([0 if t == 'benign' else 1 for t in techniques])

          # Simulate detector strengths: GRU strong on multiturn, embedding on paraphrase
          scores = {}
          for det in detector_names:
              s = rng.beta(2, 5, n)
              for i, t in enumerate(techniques):
                  if det == 'xgboost' and t in ('prompt_injection', 'jailbreak'):
                      s[i] = rng.beta(8, 2)
                  elif det == 'gru' and t == 'multiturn_escalation':
                      s[i] = rng.beta(8, 2)
                  elif det == 'embedding' and t == 'paraphrase_variant':
                      s[i] = rng.beta(8, 2)
                  elif det == 'isolation_forest' and t != 'benign':
                      s[i] = rng.beta(4, 4)
              scores[det] = s

          analyser = CoverageComplementarityAnalyser(detector_names)
          matrix = analyser.analyse(techniques, scores, is_attack)
          print_coverage_matrix(matrix, detector_names)

  deliverable_3:
    title: 'Confidence Correlation Matrix'
    filename: 'confidence_correlation_matrix.py'
    description: 'Measures the pairwise correlation between detector outputs to quantify ensemble independence. Identifies highly correlated detector pairs that warrant down-weighting because their agreement is not independent confirmation.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: numpy. Optionally produces a heatmap with matplotlib.'
    code: |
      # confidence_correlation_matrix.py
      # Section 12.15: Detector Confidence Correlation
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional, Tuple

      import numpy as np


      @dataclass
      class CorrelationReport:
          detector_names: List[str]
          matrix: np.ndarray
          high_correlation_pairs: List[Tuple[str, str, float]]
          mean_off_diagonal: float


      class ConfidenceCorrelationMatrix:
          '''
          Computes pairwise correlation between detector calibrated scores.
          High correlation means the detectors share blind spots; the ensemble
          of correlated detectors adds little over the best single detector.
          '''

          def __init__(self, high_correlation_threshold: float = 0.7) -> None:
              self.high_correlation_threshold = high_correlation_threshold

          def compute(
              self,
              detector_scores: Dict[str, np.ndarray],
          ) -> CorrelationReport:
              names = list(detector_scores.keys())
              score_matrix = np.column_stack([detector_scores[n] for n in names])
              corr = np.corrcoef(score_matrix, rowvar=False)

              high_pairs = []
              for i in range(len(names)):
                  for j in range(i + 1, len(names)):
                      if corr[i, j] >= self.high_correlation_threshold:
                          high_pairs.append((names[i], names[j], float(corr[i, j])))

              # Mean off-diagonal correlation (overall ensemble independence)
              n = len(names)
              off_diag = corr[~np.eye(n, dtype=bool)]
              mean_off = float(off_diag.mean())

              return CorrelationReport(
                  detector_names=names,
                  matrix=corr,
                  high_correlation_pairs=high_pairs,
                  mean_off_diagonal=mean_off,
              )

          def suggest_downweights(self, report: CorrelationReport) -> Dict[str, float]:
              '''Suggest down-weighting one detector in each highly correlated pair.'''
              weights = {n: 1.0 for n in report.detector_names}
              for a, b, corr in report.high_correlation_pairs:
                  # Down-weight the second detector in the correlated pair
                  weights[b] = min(weights[b], 0.5)
              return weights


      def print_correlation_report(report: CorrelationReport) -> None:
          print('Detector Confidence Correlation Matrix')
          print('=' * 70)
          names = report.detector_names
          header = '{:<18}'.format('') + ''.join(f'{n[:10]:>12}' for n in names)
          print(header)
          for i, n in enumerate(names):
              row = '{:<18}'.format(n[:18])
              for j in range(len(names)):
                  row += f'{report.matrix[i, j]:>12.2f}'
              print(row)
          print('-' * 70)
          print(f'  Mean off-diagonal correlation: {report.mean_off_diagonal:.3f}')
          if report.mean_off_diagonal < 0.3:
              print('  Detectors are largely independent: high ensemble value.')
          elif report.mean_off_diagonal < 0.6:
              print('  Partial correlation: moderate ensemble value.')
          else:
              print('  High correlation: ensemble adds little over best single detector.')
          if report.high_correlation_pairs:
              print('  Highly correlated pairs (consider down-weighting):')
              for a, b, c in report.high_correlation_pairs:
                  print(f'    {a} <-> {b}: {c:.2f}')


      if __name__ == '__main__':
          rng = np.random.default_rng(42)
          n = 1000

          # Simulate: IF and embedding somewhat correlated; GRU independent
          base = rng.beta(2, 5, n)
          scores = {
              'isolation_forest': np.clip(base + rng.normal(0, 0.15, n), 0, 1),
              'xgboost': rng.beta(2, 5, n),
              'gru': rng.beta(2, 6, n),
              'embedding': np.clip(base + rng.normal(0, 0.2, n), 0, 1),  # correlated with IF
          }

          analyser = ConfidenceCorrelationMatrix(high_correlation_threshold=0.6)
          report = analyser.compute(scores)
          print_correlation_report(report)
          print(f'\nSuggested weights: {analyser.suggest_downweights(report)}')

  deliverable_4:
    title: 'Ensemble Explainer'
    filename: 'ensemble_explainer.py'
    description: 'Attributes ensemble decisions to the contributing detectors with per-detector confidence display. Produces a human-readable explanation of why the ensemble made a decision for debugging, tuning, and audit.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: numpy. Imports from detector_ensemble.py.'
    code: |
      # ensemble_explainer.py
      # Section 12.15: Ensemble Decision Attribution
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import Dict, List, Tuple

      from detector_ensemble import EnsembleResult, AlertTier


      @dataclass
      class Explanation:
          decision: str
          combined_score: float
          primary_drivers: List[Tuple[str, float]]   # (detector, contribution)
          all_scores: Dict[str, float]
          narrative: str


      DETECTOR_DESCRIPTIONS = {
          'isolation_forest': 'anomaly detector',
          'xgboost': 'supervised classifier',
          'gru': 'sequence model',
          'embedding': 'semantic similarity detector',
      }


      class EnsembleExplainer:
          '''
          Attributes an ensemble decision to its contributing detectors.
          Produces a narrative explanation for debugging, tuning, and audit.
          '''

          def explain(self, result: EnsembleResult) -> Explanation:
              # Rank detectors by contribution to the decision
              contribs = sorted(
                  result.contributions.items(),
                  key=lambda kv: abs(kv[1]),
                  reverse=True,
              )
              primary = [(n, c) for n, c in contribs if c > 0][:2]

              narrative = self._narrative(result, primary)
              return Explanation(
                  decision=result.tier.value,
                  combined_score=result.combined_score,
                  primary_drivers=primary,
                  all_scores=result.detector_scores,
                  narrative=narrative,
              )

          def _narrative(
              self,
              result: EnsembleResult,
              primary: List[Tuple[str, float]],
          ) -> str:
              if result.tier == AlertTier.PASS:
                  return ('Passed: no detector produced a significant attack signal '
                          f'(combined score {result.combined_score:.2f}).')

              action = {
                  AlertTier.BLOCK: 'Blocked',
                  AlertTier.FLAG: 'Flagged for analyst review',
                  AlertTier.MONITOR: 'Logged for monitoring',
              }[result.tier]

              if primary:
                  drivers = ' and '.join(
                      f'the {DETECTOR_DESCRIPTIONS.get(n, n)} '
                      f'(score {result.detector_scores.get(n, 0):.2f})'
                      for n, _ in primary
                  )
                  return (f'{action}: driven primarily by {drivers}. '
                          f'{result.n_agreeing}/4 detectors agreed; '
                          f'combined score {result.combined_score:.2f} '
                          f'via {result.strategy}.')
              return (f'{action}: combined score {result.combined_score:.2f} '
                      f'via {result.strategy}.')


      def print_explanation(explanation: Explanation) -> None:
          print(f'Decision: {explanation.decision.upper()}')
          print(f'  {explanation.narrative}')
          print('  Per-detector scores:')
          for det, score in sorted(explanation.all_scores.items(), key=lambda kv: kv[1], reverse=True):
              desc = DETECTOR_DESCRIPTIONS.get(det, det)
              print(f'    {det:18} ({desc:28}) {score:.3f}')


      if __name__ == '__main__':
          from detector_ensemble import DetectorEnsemble

          ensemble = DetectorEnsemble()
          explainer = EnsembleExplainer()

          cases = {
              'injection (strong)': {'isolation_forest': 0.7, 'xgboost': 0.94, 'gru': 0.6, 'embedding': 0.89},
              'multiturn (GRU-driven)': {'isolation_forest': 0.4, 'xgboost': 0.3, 'gru': 0.88, 'embedding': 0.35},
              'benign': {'isolation_forest': 0.1, 'xgboost': 0.05, 'gru': 0.08, 'embedding': 0.12},
          }
          for label, scores in cases.items():
              print(f'\n=== {label} ===')
              result = ensemble.evaluate(scores)
              explanation = explainer.explain(result)
              print_explanation(explanation)

  deliverable_5:
    title: 'Ensemble Latency Profiler'
    filename: 'ensemble_latency_profiler.py'
    description: 'Measures the four-detector parallel ensemble against the 50ms P99 budget. Profiles the parallel detector execution plus the combination step, confirming the ensemble fits within the budget and identifying which detector dominates the latency.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: asyncio, numpy. Builds on the async_detector_runner.py from Section 12.12.'
    code: |
      # ensemble_latency_profiler.py
      # Section 12.15: Ensemble Latency Profiling
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import asyncio
      import time
      from dataclasses import dataclass, field
      from typing import Callable, Dict, List, Tuple

      import numpy as np


      @dataclass
      class EnsembleLatencyReport:
          per_detector_p99: Dict[str, float]
          parallel_detector_p99: float
          combination_p99: float
          ensemble_p99: float
          budget_ms: float
          slo_met: bool
          dominant_detector: str


      class EnsembleLatencyProfiler:
          '''
          Profiles the four-detector ensemble latency.
          Ensemble latency = max(detector latencies) [parallel] + combination.
          '''

          def __init__(self, budget_ms: float = 50.0) -> None:
              self.budget_ms = budget_ms

          async def _run_detector(self, fn: Callable, x) -> float:
              loop = asyncio.get_event_loop()
              t0 = time.perf_counter()
              await loop.run_in_executor(None, fn, x)
              return (time.perf_counter() - t0) * 1000

          async def profile(
              self,
              detectors: Dict[str, Callable],
              combination_fn: Callable,
              model_input,
              n_runs: int = 100,
          ) -> EnsembleLatencyReport:
              per_detector: Dict[str, List[float]] = {n: [] for n in detectors}
              parallel_latencies = []
              combination_latencies = []
              ensemble_latencies = []

              for _ in range(n_runs):
                  t_start = time.perf_counter()
                  # Parallel detector execution
                  results = await asyncio.gather(*[
                      self._run_detector(fn, model_input) for fn in detectors.values()
                  ])
                  for name, lat in zip(detectors.keys(), results):
                      per_detector[name].append(lat)
                  parallel_lat = max(results)
                  parallel_latencies.append(parallel_lat)

                  # Combination step
                  t_comb = time.perf_counter()
                  combination_fn({n: 0.5 for n in detectors})
                  combination_latencies.append((time.perf_counter() - t_comb) * 1000)

                  ensemble_latencies.append((time.perf_counter() - t_start) * 1000)

              def p99(arr):
                  return float(np.percentile(arr, 99))

              per_detector_p99 = {n: p99(v) for n, v in per_detector.items()}
              dominant = max(per_detector_p99, key=per_detector_p99.get)
              ensemble_p99 = p99(ensemble_latencies)

              return EnsembleLatencyReport(
                  per_detector_p99=per_detector_p99,
                  parallel_detector_p99=p99(parallel_latencies),
                  combination_p99=p99(combination_latencies),
                  ensemble_p99=ensemble_p99,
                  budget_ms=self.budget_ms,
                  slo_met=ensemble_p99 <= self.budget_ms,
                  dominant_detector=dominant,
              )


      def print_ensemble_latency(report: EnsembleLatencyReport) -> None:
          print(f'Ensemble Latency Profile (SLO: {report.budget_ms:.0f}ms P99)')
          print('=' * 60)
          print('  Per-detector P99 (parallel):')
          for n, lat in sorted(report.per_detector_p99.items(), key=lambda kv: kv[1], reverse=True):
              print(f'    {n:18} {lat:.2f}ms')
          print(f'  Parallel detector P99: {report.parallel_detector_p99:.2f}ms '
                f'(dominated by {report.dominant_detector})')
          print(f'  Combination P99:       {report.combination_p99:.2f}ms')
          print(f'  Ensemble P99:          {report.ensemble_p99:.2f}ms')
          print(f'  SLO met:               {report.slo_met}')


      if __name__ == '__main__':
          def make_detector(latency_ms):
              def predict(x):
                  time.sleep(latency_ms / 1000.0)
                  return 0.5
              return predict

          detectors = {
              'isolation_forest': make_detector(2),
              'xgboost': make_detector(2),
              'gru': make_detector(12),       # dominant
              'embedding': make_detector(7),
          }
          def combine(scores):
              return float(np.mean(list(scores.values())))

          profiler = EnsembleLatencyProfiler(budget_ms=50.0)
          report = asyncio.run(profiler.profile(detectors, combine, 'request', n_runs=50))
          print_ensemble_latency(report)

common_mistakes:

  mistake_1:
    description: 'Combining uncalibrated detector scores, producing a meaningless ensemble because the scores are not on a common scale'
    why_it_happens: |
      The four detectors each produce a score, and the engineer averages them or feeds them to a
      meta-learner without first calibrating. The scores look like probabilities (they are between
      0 and 1), so combining them seems valid.
    consequence: |
      The Random Forest's 0.8 and the XGBoost's 0.8 mean different things when both are uncalibrated:
      one may correspond to a 60% attack rate and the other to a 90% rate. Averaging them combines
      incompatible scales, producing a combined score that does not correspond to any meaningful
      probability. The ensemble decision is based on a meaningless number, and the alert routing
      thresholds calibrated against it are also meaningless.
    correct_approach: |
      Calibrate every detector with the Section 12.10 calibration before combining. Calibrated scores
      are on a common probability scale -- a calibrated 0.8 means an 80% attack rate for every detector
      -- so they can be averaged or fed to the meta-learner coherently. The detector_ensemble.py requires
      calibrated scores; calibration is a prerequisite, not an optional refinement.

  mistake_2:
    description: 'Assuming the four detectors are independent without measuring the confidence correlation, building an ensemble that shares blind spots'
    why_it_happens: |
      The detectors use different mechanisms, so the engineer assumes they make independent errors and
      the ensemble provides genuine defence-in-depth. The correlation is never measured because the
      independence seems obvious from the different mechanisms.
    consequence: |
      Two of the detectors turn out to be highly correlated -- perhaps the supervised classifier and the
      embedding detector both rely on similar surface features -- so they share blind spots. The ensemble
      that appears to have four independent detectors effectively has three, and the shared blind spot of
      the correlated pair is a blind spot of the ensemble. The defence-in-depth is partly illusory.
    correct_approach: |
      Measure the confidence correlation with the confidence_correlation_matrix.py before trusting the
      ensemble. Verify the detectors make independent errors (low off-diagonal correlation). Where two
      detectors are highly correlated, down-weight one so their agreement is not double-counted, and
      recognise that the correlated pair provides one effective coverage, not two.

  mistake_3:
    description: 'Training the stacking meta-learner on the same data the individual detectors were trained on, producing an overconfident meta-learner'
    why_it_happens: |
      The training set is the largest labelled dataset, so the engineer uses it to train both the
      individual detectors and the stacking meta-learner. The meta-learner sees the detectors' scores
      on the training data and learns to combine them.
    consequence: |
      The individual detectors produce overconfident scores on the training data because they memorised
      it. The meta-learner trained on these overconfident scores learns a combination that works on the
      training distribution but generalises poorly. On production traffic, the detectors are less
      confident, and the meta-learner's combination, tuned for the overconfident training scores, produces
      a worse ensemble than weighted voting would have.
    correct_approach: |
      Train the stacking meta-learner on the validation split, not the training split. The individual
      detectors train on the training split; the meta-learner trains on the detectors' scores on the
      validation split (which reflect their generalisation behaviour); the test split evaluates the full
      ensemble. This is the temporal-split discipline applied at the meta-learner level.

  mistake_4:
    description: 'Using a single ensemble threshold instead of the three-tier routing, either flooding the analyst queue or missing actionable detections'
    why_it_happens: |
      A single threshold is simpler than three tiers. The engineer sets one threshold: above it, take
      action; below it, pass. The action is either blocking (too aggressive) or flagging (floods the
      queue), depending on how the single threshold is set.
    consequence: |
      A single block threshold either blocks too aggressively (false positives reach the block tier) or
      misses attacks (the threshold is high to avoid false-positive blocks, so medium-confidence attacks
      pass). A single flag threshold floods the analyst queue with every detection above it, exceeding
      the analyst capacity. Neither single threshold matches the action to the confidence.
    correct_approach: |
      Use the three-tier routing from detector_ensemble.py: block on strong agreement (automated action
      on the highest-confidence detections), flag on majority signal (analyst review, calibrated to
      capacity), monitor on weak signal (logged for the active learning loop). The tiers match the action
      to the confidence and respect the analyst capacity.

  mistake_5:
    description: 'Building an ensemble that produces opaque decisions with no attribution to the contributing detectors'
    why_it_happens: |
      The ensemble produces a combined score and a decision; the individual detector contributions are
      not surfaced. The engineer treats the ensemble as a black box that produces a decision, which is
      simpler than implementing the attribution.
    consequence: |
      When the ensemble makes a wrong decision, there is no way to tell which detector drove it, so the
      fix cannot target the right detector. When an analyst reviews a flagged request, they see only the
      combined score, not which detectors flagged it, so they cannot judge the detection's basis. When
      an ensemble decision is challenged in an audit, there is no explanation of why it was made. The
      opaque ensemble is hard to debug, tune, and defend.
    correct_approach: |
      Implement the attribution with the ensemble_explainer.py. Every ensemble decision is attributed to
      its contributing detectors with their per-detector confidence, producing a narrative explanation:
      which detectors flagged the request and how confident each was. The attribution makes the ensemble
      debuggable (target the driving detector), tunable (see which detectors contribute), and defensible
      (explain every decision).

section_summary:

  compact: |
    The four-detector ensemble is the Chapter 12 production deliverable. It combines the Isolation Forest
    (anomaly, novel attacks), the supervised classifiers (known families, high precision), the GRU
    (multi-turn escalation), and the embedding detector (paraphrase variants) into a single decision whose
    coverage and precision exceed any individual detector. The justification is coverage complementarity:
    each detector covers a part of the attack surface the others miss, so their union covers the full attack
    taxonomy. The value depends on error independence, measured by the confidence correlation -- four
    correlated detectors provide false defence-in-depth while sharing blind spots. Two combination strategies
    turn the scores into a decision: weighted voting (scores weighted by per-class reliability) and a stacking
    meta-learner (a logistic regression that learns the combination, trained on the validation split). The
    combination requires calibrated probabilities from Section 12.10 and runs on the async parallel
    architecture from Section 12.12. The three-tier alert routing -- block on strong agreement, flag on
    majority signal, monitor on weak signal -- aligns the ensemble with the analyst capacity. Ensemble
    explainability attributes every decision to its contributing detectors, making the ensemble debuggable,
    tunable, and defensible.

  key_takeaways:
    - 'Coverage complementarity is the primary ensemble justification: each detector covers a part of the attack surface the others miss (anomaly catches novel, supervised catches known, GRU catches multi-turn, embedding catches paraphrase), so their union covers the full taxonomy'
    - 'Confidence correlation determines the ensemble value: four correlated detectors provide false defence-in-depth while sharing blind spots; measure the correlation and down-weight highly correlated pairs'
    - 'The ensemble requires calibrated probabilities: uncalibrated scores from different detectors are not on a common scale and cannot be combined coherently, so Section 12.10 calibration is a prerequisite'
    - 'Stacking learns the combination from the validation split (which detectors to trust for which threat classes); weighted voting sets weights heuristically; stacking outperforms when there is enough data to train the meta-learner'
    - 'The three-tier routing aligns the ensemble with analyst capacity: block on strong agreement (automated), flag on majority signal (analyst review, capacity-calibrated), monitor on weak signal (active learning loop)'
    - 'Ensemble explainability attributes every decision to its contributing detectors with per-detector confidence, making the ensemble debuggable (target the driving detector), tunable (see contributions), and defensible (explain every decision)'

preview_section_12_16:
  title: 'Section 12.16: Benchmarking and A/B Testing -- Measuring the Ensemble Against Production Reality'
  summary: |
    Section 12.16 measures the ensemble built in Section 12.15 against the alternatives and against
    production reality. A benchmark that only reports the ensemble accuracy answers the wrong question;
    the right questions are whether the ensemble beats each individual detector, whether it beats the
    Chapter 11 rule-based gateway, and whether the improvement justifies the added complexity and latency.
    The section covers the benchmark harness that evaluates the ensemble and every individual detector on
    the same temporal test set, the ablation analysis that measures each detector contribution by removing
    it, and the A/B testing framework that compares detection configurations on live traffic with
    statistical significance testing. The benchmark connects to the model registry experiment tracking
    (Section 12.13) so every configuration comparison is recorded, and it produces the evidence that
    justifies deploying the ensemble over the simpler alternatives -- or reveals that a simpler
    configuration is good enough.

