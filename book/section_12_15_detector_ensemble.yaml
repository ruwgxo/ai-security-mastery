section_overview:
  one_line_summary: 'The four-detector ensemble is the Chapter 12 production deliverable: it combines anomaly, supervised, sequence, and semantic detection into a single decision whose coverage and precision exceed any individual detector through complementarity.'
  why_this_section_exists: |
    Chapter 12 built four input-side detectors, each covering a different part of the attack
    surface with a different error profile. The Isolation Forest catches unknown attack variants
    with zero labels but with low precision. The supervised classifiers catch known attack
    families with high precision but miss novel attacks. The GRU catches multi-turn escalation
    that single-message detectors cannot see. The embedding detector catches paraphrase variants
    that evade keyword-based detection. Deployed individually, each has a coverage gap that the
    others fill.

    The ensemble combines them into a single detection decision. The justification is coverage
    complementarity: where one detector errs, another often catches the attack, so the combined
    system covers the full attack taxonomy from Chapters 6 through 10 better than any individual
    detector. The supervised classifier's miss on a novel attack is caught by the anomaly detector;
    the anomaly detector's false positive on an unusual but benign request is corrected by the
    supervised classifier's confident benign score; the single-message detectors' blindness to
    multi-turn escalation is covered by the GRU.

    The combination is not automatic. Two detectors that always agree add nothing to each other --
    the ensemble of two identical detectors is just one detector. The value of the ensemble depends
    on the detectors making independent errors, which is measured by the confidence correlation. If
    the four detectors are highly correlated, the ensemble barely improves on the best single
    detector; if they are independent, the ensemble's errors are the intersection of the individual
    errors, which is much smaller. Section 12.15 measures the complementarity and correlation,
    builds the combination (weighted voting and a stacking meta-learner), and routes the ensemble
    output through a three-tier alert system aligned with the Chapter 11 false positive management.

    The combination requires the calibrated probabilities from Section 12.10 -- uncalibrated scores
    from different detectors are not on a common scale and cannot be combined coherently -- and runs
    on the async scoring architecture from Section 12.12 so the four detectors execute in parallel
    within the latency budget.
  position_in_chapter: |
    Section 12.15 is the first of the integration sections. It consumes all four input-side detectors
    (Sections 12.03, 12.05, 12.06, 12.07), the calibration from Section 12.10, and the async scoring
    from Section 12.12, and produces the ensemble decision that the Section 12.16 benchmarking
    evaluates and the Section 12.17 production gateway acts on. The PII scanner (Section 12.09) is
    not in this ensemble -- it is an output-side detector that runs separately on the model response.

learning_objectives:

  knowledge:
    - 'Explain coverage complementarity and state which attack families each of the four detectors covers and where the overlaps are'
    - 'Explain why confidence correlation determines the ensemble value and what happens when the detectors are perfectly correlated'
    - 'Distinguish weighted voting from stacking and describe when each combination strategy is appropriate'
    - 'Explain how the stacking meta-learner learns which detectors to trust for which threat classes'
    - 'Describe the three-tier alert routing (block, flag, monitor) and how it aligns with the Chapter 11 false positive management'
    - 'Explain why the ensemble requires calibrated probabilities and runs on the async parallel architecture'

  skills:
    - 'Build the four-detector ensemble with weighted voting and a stacking meta-learner'
    - 'Construct the coverage complementarity matrix showing which detectors cover which ATLAS techniques'
    - 'Measure the confidence correlation matrix to quantify ensemble independence'
    - 'Implement the three-tier alert routing aligned with analyst capacity'
    - 'Attribute an ensemble decision to its contributing detectors for explainability'

  security_mindset:
    - 'Treat coverage complementarity as the primary ensemble justification: the value is in the detectors covering different attack families, not in averaging similar signals'
    - 'Measure the confidence correlation before trusting the ensemble: four correlated detectors provide a false sense of defence-in-depth while sharing the same blind spots'
    - 'Route alerts by confidence tier to respect analyst capacity: block on strong agreement, flag on partial signal, monitor on weak signal, so the analyst queue is filled by the highest-confidence detections'
    - 'Preserve ensemble explainability: an ensemble decision that cannot be attributed to its contributing detectors is hard to debug, hard to tune, and hard to defend in an audit'

