              'detection_difficulty': 3,
              'discriminating_signal': 'operational specificity inside hypothetical frame',
          },
          'hypothetical_open': {
              'name': 'Open Hypothetical / World-State',
              'section': '7.4.2',
              'mechanism': 'distribution_shift_to_philosophical_reasoning',
