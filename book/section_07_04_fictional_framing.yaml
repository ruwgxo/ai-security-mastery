      Document the detection boundary and its limitations.
    deliverable: "research_framing_detection_boundary.md"
    time_estimate: "45 minutes"

# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Fictional framing moves the request into the creative-assistance region of\
    \ the training distribution, where RLHF refusal training is sparser. The\
    \ model helps with the story, not the instruction."
  - "Story completion is high-yield because narrative commitment creates a trained\
    \ tension between creative assistance and refusal. Multi-turn trajectory\
    \ analysis is required -- per-turn classifiers are insufficient."
  - "The detection boundary is not between fiction and non-fiction. It is between\
    \ fictional framing with low operational specificity (likely legitimate) and\
    \ fictional framing with high operational specificity (likely adversarial)."
  - "Research and educational framing is the highest-FPR sub-type. The\
    \ discriminating signal is specificity mismatch: step-by-step operational\
    \ detail is inconsistent with stated academic or educational purpose."
  - "Layered framing stacks multiple framing types to compound distribution shift.\
    \ Three or more distinct framing markers in a single prompt is a low-FPR\
    \ adversarial signal because legitimate requests rarely require multiple\
    \ simultaneous justifications."
  - "Fictional framing detection requires two axes: framing type detection (what\
    \ fictional context is established) and request specificity scoring (how\
    \ operationally useful is the embedded request). Both axes are needed for\
    \ FPR-acceptable detection."

