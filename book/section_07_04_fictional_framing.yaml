                  'in a world where', 'imagine a world', 'what if the world',
                  'in a society where',
              ],
              'specificity_risk': 'medium',
              'fpr_risk': 'medium_high',
              'detection_difficulty': 4,
              'discriminating_signal': (
                  'world-state suspended specifically to remove restriction basis'
              ),
          },
          'academic_thought_experiment': {
              'name': 'Academic / Thought Experiment Framing',
              'section': '7.4.3',
