  - id: "7.4.code.01"
    title: "Fictional Framing Taxonomy with Detection Signals"
    description: |
      Structured taxonomy of all nine fictional framing sub-types with detection
      signals, FPR risk ratings, and difficulty scores. Companion to the persona
      taxonomy in Section 7.3. Combined, these two taxonomies cover the full
      social-engineering jailbreak space for the Section 7.14 classifier.
    language: "python"
    filename: "code/ch07/fictional_framing_taxonomy.py"
    code: |
      FICTIONAL_FRAMING_TAXONOMY = {
          'hypothetical_closed': {
              'name': 'Closed Hypothetical Scenario',
              'section': '7.4.2',
              'mechanism': 'distribution_shift_to_thought_experiment_region',
