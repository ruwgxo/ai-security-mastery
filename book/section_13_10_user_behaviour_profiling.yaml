deliverables:

  deliverable_1:
    title: 'User Behaviour Profiler'
    filename: 'user_behaviour_profiler.py'
    description: 'Maintains the persistent entity profile -- aggregated baselines, historical risk events, and behavioural fingerprint -- and computes the cross-session risk score from accumulated signals. Implements the persistent profile and cross-session scoring from Section 13.10 Parts 2 and 3.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # user_behaviour_profiler.py
      # Section 13.10: User Behaviour Profiler (Persistent Entity Profile)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List, Tuple


      @dataclass
      class RiskEvent:
          timestamp: float
          kind: str
          severity: float   # in [0, 1]


      @dataclass
      class Fingerprint:
          # stable multi-dimensional usage signature
          mean_rate_per_min: float = 0.0
          endpoint_mix: Dict[str, float] = field(default_factory=dict)
          mean_session_len: float = 0.0
          active_hours: Tuple[int, int] = (9, 18)


      @dataclass
      class EntityProfile:
          entity_id: str
          fingerprint: Fingerprint = field(default_factory=Fingerprint)
          risk_events: List[RiskEvent] = field(default_factory=list)
          baseline_rate_per_min: float = 0.0

          def add_risk_event(self, event: RiskEvent) -> None:
              self.risk_events.append(event)


      class UserBehaviourProfiler:
          def __init__(self) -> None:
              self.profiles: Dict[str, EntityProfile] = {}

          def get(self, entity_id: str) -> EntityProfile:
              if entity_id not in self.profiles:
                  self.profiles[entity_id] = EntityProfile(entity_id)
              return self.profiles[entity_id]

          def cross_session_risk(self, entity_id: str, now: float, half_life_s: float = 604800.0) -> float:
              # Decayed sum of risk-event severities (half-life default one week)
              import math
              p = self.get(entity_id)
              score = 0.0
              for ev in p.risk_events:
                  age = max(0.0, now - ev.timestamp)
                  decay = 0.5 ** (age / half_life_s)
                  score += ev.severity * decay
              # squash to [0, 1]
              return round(1.0 - math.exp(-score), 3)


      if __name__ == '__main__':
          profiler = UserBehaviourProfiler()
          now = 2_000_000.0
          week = 604800.0

          p = profiler.get('user_42')
          # One isolated event a week ago
          p.add_risk_event(RiskEvent(now - week, 'rate_abuse', 0.6))
          print('Isolated event (1 week old) risk:', profiler.cross_session_risk('user_42', now))

          # A repeat offender: several recent events
          q = profiler.get('user_99')
          for d in [0.5, 1, 2, 3]:
              q.add_risk_event(RiskEvent(now - d * 86400, 'rate_abuse', 0.6))
          print('Repeat offender (4 recent events) risk:', profiler.cross_session_risk('user_99', now))
          print('The isolated week-old event has decayed; the repeat pattern accumulates.')

  deliverable_2:
    title: 'Behavioural Fingerprint and Divergence Detector'
    filename: 'fingerprint_divergence_detector.py'
    description: 'Builds an entity behavioural fingerprint from its stable usage signature and detects account compromise as a broad divergence of current behaviour from the entity own fingerprint, distinct from an always-malicious account. Implements the fingerprint and divergence detection from Section 13.10 Parts 2 and 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # fingerprint_divergence_detector.py
      # Section 13.10: Behavioural Fingerprint and Divergence Detector
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict


      @dataclass
      class Behaviour:
          rate_per_min: float
          endpoint_mix: Dict[str, float]   # proportions summing to ~1
          mean_session_len: float
          active_hour_centre: float        # 0-23


      def _mix_distance(a: Dict[str, float], b: Dict[str, float]) -> float:
          keys = set(a) | set(b)
          return 0.5 * sum(abs(a.get(k, 0.0) - b.get(k, 0.0)) for k in keys)  # total variation


      @dataclass
      class DivergenceResult:
          divergence: float
          dimensions_diverged: int
          compromise_suspected: bool
          detail: str


      class FingerprintDivergenceDetector:
          def __init__(self, divergence_threshold: float = 0.5, min_dimensions: int = 3) -> None:
              self.divergence_threshold = divergence_threshold
              self.min_dimensions = min_dimensions

          def compare(self, fingerprint: Behaviour, current: Behaviour) -> DivergenceResult:
              dims = {}
              # rate divergence (relative)
              dims['rate'] = min(1.0, abs(current.rate_per_min - fingerprint.rate_per_min) / max(fingerprint.rate_per_min, 1e-6))
              # endpoint mix divergence
              dims['endpoints'] = _mix_distance(fingerprint.endpoint_mix, current.endpoint_mix)
              # session length divergence (relative)
              dims['session_len'] = min(1.0, abs(current.mean_session_len - fingerprint.mean_session_len) / max(fingerprint.mean_session_len, 1e-6))
              # active-hour divergence (circular distance / 12)
              hour_gap = abs(current.active_hour_centre - fingerprint.active_hour_centre)
              hour_gap = min(hour_gap, 24 - hour_gap)
              dims['active_hours'] = hour_gap / 12.0

              diverged = sum(1 for v in dims.values() if v > self.divergence_threshold)
              overall = sum(dims.values()) / len(dims)
              # Compromise: BROAD divergence across multiple dimensions
              suspected = diverged >= self.min_dimensions
              detail = ', '.join(f'{k}={v:.2f}' for k, v in dims.items())
              return DivergenceResult(round(overall, 3), diverged, suspected, detail)


      if __name__ == '__main__':
          det = FingerprintDivergenceDetector()
          fingerprint = Behaviour(
              rate_per_min=3.0,
              endpoint_mix={'/v1/chat': 0.8, '/v1/embed': 0.2},
              mean_session_len=12.0,
              active_hour_centre=14.0,
          )
          # Normal day: matches the fingerprint
          normal = Behaviour(3.2, {'/v1/chat': 0.78, '/v1/embed': 0.22}, 11.0, 13.0)
          # Compromise: broad change across rate, endpoints, session, and hours
          takeover = Behaviour(20.0, {'/v1/admin': 0.7, '/v1/export': 0.3}, 2.0, 3.0)

          print('Normal day:  ', det.compare(fingerprint, normal))
          print('Takeover day:', det.compare(fingerprint, takeover))
          print('The takeover diverges broadly from the entity own fingerprint,')
          print('which is the account-compromise signal -- measured against itself.')

  deliverable_3:
    title: 'Risk Score Engine with Decay and Reinforcement'
    filename: 'risk_score_engine.py'
    description: 'Maintains the entity cross-session risk score with decay so an isolated event fades and reinforcement so repeated events compound, balancing fairness for false positives against effectiveness against repeat offenders. Implements the decay and reinforcement dynamics from Section 13.10 Part 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # risk_score_engine.py
      # Section 13.10: Risk Score Engine (Decay and Reinforcement)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict


      @dataclass
      class RiskState:
          score: float = 0.0
          last_update: float = 0.0
          recent_event_count: int = 0


      @dataclass
      class RiskScoreEngine:
          half_life_s: float = 604800.0      # one week decay
          reinforce_window_s: float = 172800.0  # two days: events within reinforce
          reinforce_factor: float = 1.5
          states: Dict[str, RiskState] = field(default_factory=dict)

          def _decay(self, st: RiskState, now: float) -> None:
              if st.last_update == 0.0:
                  st.last_update = now
                  return
              age = max(0.0, now - st.last_update)
              st.score *= 0.5 ** (age / self.half_life_s)
              st.last_update = now

          def add_event(self, entity: str, severity: float, now: float) -> float:
              st = self.states.setdefault(entity, RiskState())
              self._decay(st, now)
              # Reinforcement: if the entity already carries risk, a new event compounds
              gain = severity
              if st.score > 0.1:
                  gain *= self.reinforce_factor
                  st.recent_event_count += 1
              st.score = min(2.0, st.score + gain)
              return round(st.score, 3)

          def current(self, entity: str, now: float) -> float:
              st = self.states.get(entity)
              if st is None:
                  return 0.0
              self._decay(st, now)
              return round(st.score, 3)


      if __name__ == '__main__':
          eng = RiskScoreEngine()
          now = 3_000_000.0
          day = 86400.0

          # Isolated false positive: one event, then time passes
          eng.add_event('user_clean', 0.6, now)
          recovered = eng.current('user_clean', now + 14 * day)
          print(f'Clean entity after one event + 2 weeks: {recovered} (recovered)')

          # Repeat offender: events close together reinforce
          score = None
          for d in range(4):
              score = eng.add_event('user_repeat', 0.6, now + d * day)
          print(f'Repeat offender after 4 events in 4 days: {score} (accumulated)')
          print('Decay lets the clean entity recover; reinforcement compounds the')
          print('repeat offender so a sustained pattern produces durable risk.')

  deliverable_4:
    title: 'Entity Resolver'
    filename: 'entity_resolver.py'
    description: 'Links the same underlying actor across credentials, sessions, and sources using shared attributes and fingerprint similarity, consolidating fragmented partial profiles and producing the resolved entities and first-order links that the graph detector of 13.11 consumes. Implements the entity resolution from Section 13.10 Part 6.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; union-find consolidates linked identities'
    code: |
      # entity_resolver.py
      # Section 13.10: Entity Resolver (Cross-Identity Linkage)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List, Set, Tuple


      @dataclass
      class Identity:
          identity_id: str
          source_ip: str
          credential_family: str
          fingerprint_bucket: str   # coarse fingerprint signature


      class UnionFind:
          def __init__(self) -> None:
              self.parent: Dict[str, str] = {}

          def find(self, x: str) -> str:
              self.parent.setdefault(x, x)
              while self.parent[x] != x:
                  self.parent[x] = self.parent[self.parent[x]]
                  x = self.parent[x]
              return x

          def union(self, a: str, b: str) -> None:
              ra, rb = self.find(a), self.find(b)
              if ra != rb:
                  self.parent[ra] = rb


      class EntityResolver:
          def __init__(self) -> None:
              self.uf = UnionFind()

          def resolve(self, identities: List[Identity]) -> Dict[str, Set[str]]:
              # Link identities that share a strong attribute
              by_source: Dict[str, List[str]] = {}
              by_cred: Dict[str, List[str]] = {}
              by_fp: Dict[str, List[str]] = {}
              for idn in identities:
                  self.uf.find(idn.identity_id)  # ensure present
                  by_source.setdefault(idn.source_ip, []).append(idn.identity_id)
                  by_cred.setdefault(idn.credential_family, []).append(idn.identity_id)
                  by_fp.setdefault(idn.fingerprint_bucket, []).append(idn.identity_id)

              # Link within each shared attribute group
              for groups in (by_source, by_cred, by_fp):
                  for members in groups.values():
                      for other in members[1:]:
                          self.uf.union(members[0], other)

              # Collect resolved actors
              actors: Dict[str, Set[str]] = {}
              for idn in identities:
                  root = self.uf.find(idn.identity_id)
                  actors.setdefault(root, set()).add(idn.identity_id)
              return actors


      if __name__ == '__main__':
          identities = [
              Identity('cred_1', '203.0.113.5', 'famA', 'fp_x'),
              Identity('cred_2', '203.0.113.5', 'famB', 'fp_y'),   # same source as cred_1
              Identity('cred_3', '198.51.100.9', 'famB', 'fp_y'),  # same cred family + fp as cred_2
              Identity('cred_9', '192.0.2.7', 'famZ', 'fp_z'),     # unrelated
          ]
          resolver = EntityResolver()
          actors = resolver.resolve(identities)
          print(f'Resolved {len(actors)} actors from {len(identities)} identities:')
          for root, members in actors.items():
              print(f'  actor -> {sorted(members)}')
          print('cred_1/2/3 resolve to one actor via shared source/cred/fingerprint;')
          print('these resolved actors and their links become the graph nodes for 13.11.')

common_mistakes:

  mistake_1:
    description: 'Scoring every request in isolation and never incorporating the requester accumulated history'
    why_it_happens: |
      Per-request and per-session detectors are self-contained and stateless with respect to history,
      which makes them simple to build and scale. Adding entity history as an input introduces persistent
      state and a dependency on the profile, and a stateless detector that scores the current activity
      feels complete on its own.
    consequence: |
      The requester's history is the most informative context available, and ignoring it scores with less
      information than the system has. The identical request from an entity flagged for enumeration last
      week and from an entity with a year-long clean record is scored identically, even though the history
      makes them very different situations. The detector cannot make the distinction the available
      information supports, missing campaign continuations and over-scrutinising clean entities equally.
    correct_approach: |
      Maintain a persistent entity profile and expose a cross-session risk score that every detector and the
      gateway reads, so the same request is scored in the context of the requester -- elevated for a
      suspicious history, given benefit of the doubt for a clean one. user_behaviour_profiler.py provides the
      persistent profile and risk score.

  mistake_2:
    description: 'Letting the risk score only ever rise, with no decay, so a false positive elevates an entity forever'
    why_it_happens: |
      A monotonically rising risk score is simpler -- just add to it on each event -- and it feels safer to
      never reduce an entity's risk, since reducing it could let a real offender off. Decay looks like
      forgiving behaviour the system should avoid.
    consequence: |
      False positives are inevitable, and a score that only rises treats a legitimate entity as suspicious
      forever for a one-time anomaly that was not an attack -- permanently tighter limits and more scrutiny
      for a false flag. This is unfair to legitimate entities, degrades their experience indefinitely, and
      makes the risk score accumulate noise over time until most entities carry elevated risk and the signal
      is meaningless.
    correct_approach: |
      Decay risk contributions over time so an isolated event raises the score temporarily and then fades,
      letting a clean entity recover from a false positive, while reinforcement compounds repeated events so
      a sustained pattern still accumulates durable risk. risk_score_engine.py implements both decay and
      reinforcement with a calibrated balance.

  mistake_3:
    description: 'Detecting account compromise against a global norm instead of the entity own fingerprint'
    why_it_happens: |
      A global behavioural norm is easier to build than a per-entity fingerprint -- one reference for
      everyone -- and comparing an account's behaviour to the global norm seems like a reasonable anomaly
      check that would catch a compromised account behaving oddly.
    consequence: |
      A compromised account's new behaviour may be perfectly normal against the global norm -- the attacker
      uses it within ordinary rates, on ordinary endpoints -- while being completely unlike how this specific
      account has always behaved. Comparing to the global norm misses the compromise because the attacker's
      behaviour is globally normal, just not normal for this entity. The signal that reveals takeover is the
      divergence from the account's own history, which the global comparison discards.
    correct_approach: |
      Detect compromise as divergence from the entity's own established fingerprint, not a global norm, so
      the attacker's behaviour is anomalous specifically because it does not match this entity's history even
      if it would be normal for some other entity. fingerprint_divergence_detector.py measures divergence
      against the entity own fingerprint.

  mistake_4:
    description: 'Fragmenting one actor across many partial per-credential profiles, letting them evade accumulated risk'
    why_it_happens: |
      Profiling per credential or per session is the natural unit -- each credential has its own activity --
      and resolving multiple identities to one actor requires extra linkage logic. A per-credential profile
      is straightforward and seems sufficient when each credential is treated as a distinct entity.
    consequence: |
      The same actor operating through many credentials is fragmented into many partial profiles, each with
      too little history to be useful, and the actor can spread activity across identities so no single
      profile accumulates a high risk score -- the distributed evasion of 13.07 applied to the profile. The
      actor escapes accumulated risk by fragmentation, and the system never sees the full behaviour or full
      risk of the underlying actor.
    correct_approach: |
      Resolve identities to the underlying actor using shared attributes and fingerprint similarity, and
      consolidate their activity into one profile so the actor's full behaviour and accumulated risk are
      scored together. entity_resolver.py links identities by shared source, credential, and fingerprint into
      resolved actors.

  mistake_5:
    description: 'Treating the entity profile as an endpoint rather than the foundation for graph detection'
    why_it_happens: |
      The entity profile produces a useful risk score that the rate limiter and gateway consume, so it looks
      like a complete, self-contained deliverable. Once the risk score is feeding enforcement, the profiling
      work feels finished, and the connection to graph detection is easy to overlook.
    consequence: |
      Graph-based detection in 13.11 operates on entities and the relationships between them, and those
      entities are exactly the resolved actors the profile defines, with the linking attributes being the
      edges. Treating the profile as an endpoint and not exposing the resolved entities and their links
      leaves the graph detector without its nodes and first-order edges, so the coordinated-network detection
      that depends on them cannot be built. The profile's role as the graph foundation is lost.
    correct_approach: |
      Build the profile and entity resolution to also produce the resolved entities and their linking
      attributes as the nodes and first-order edges the graph detector consumes, so the entity family bridges
      cleanly into the graph family. entity_resolver.py emits resolved actors and links for exactly this
      handoff to 13.11.

section_summary:

  compact: |
    A request scored in isolation discards its most informative context -- the requester history -- and
    Section 13.10 builds the persistent entity profile that makes that history a first-class input. The
    profile holds three things: aggregated per-entity baselines, a timestamped history of risk events from
    every preceding detector, and a behavioural fingerprint -- the stable multi-dimensional signature of how
    the entity normally uses the service. From these it computes a cross-session risk score that integrates
    signals across all the entity sessions, computed off the hot path and read inline by the rate limiter of
    13.08 and the gateway of 13.11. The score's dynamics matter as much as its value: decay is a fairness
    requirement that lets a clean entity recover from an inevitable false positive, while reinforcement is an
    effectiveness requirement that compounds repeated events so a repeat offender accumulates durable risk.
    The fingerprint enables account-compromise detection as divergence: a compromised account behaves unlike
    its own established fingerprint across multiple dimensions even when each deviation is modest and the
    behaviour would be normal for some other entity -- distinct from an always-malicious account that has no
    clean history to diverge from. Entity resolution links the same actor across credentials, sessions, and
    sources to consolidate fragmented profiles and prevent fragmentation evasion, and it is the bridge to the
    graph family: the resolved entities are the graph nodes and their linking attributes the first-order
    edges that 13.11 develops into coordinated-network detection.

  key_takeaways:
    - 'A request scored in isolation discards the most informative context available -- the requester history -- and the persistent entity profile makes that history a first-class input so the same request is scored in the context of who makes it'
    - 'The persistent profile holds aggregated baselines, a history of risk events, and a behavioural fingerprint, and computes a cross-session risk score read inline by the rate limiter and gateway'
    - 'Risk-score decay is a fairness requirement letting a clean entity recover from an inevitable false positive, while reinforcement is an effectiveness requirement compounding repeated events into durable risk for a repeat offender'
    - 'Account compromise is detected as broad divergence from the entity own fingerprint -- behaviour unlike how this specific entity has always behaved -- distinct from an always-malicious account with no clean history to diverge from'
    - 'Entity resolution links the same actor across credentials, sessions, and sources to consolidate fragmented profiles and prevent the fragmentation evasion that spreads activity to escape accumulated risk'
    - 'The entity profile is the bridge to the graph family: the resolved entities are the graph nodes and their linking attributes the first-order edges that the graph detector of 13.11 develops into coordinated-network detection'

preview_section_13_11:
  title: 'Section 13.11: Graph-Based Detection and the Behavioural Monitoring Capstone'
  summary: |
    Section 13.11 closes Chapter 13 with the graph family and the behavioural monitoring capstone. It builds
    the entity-relationship graph from the resolved entities and linking attributes of 13.10 -- shared
    infrastructure, credentials, synchronised timing, and behavioural similarity as edges -- and detects the
    coordinated abuse network that no single-entity detector reveals, because each account behaves acceptably
    alone and the attack is the structure between accounts. It covers coordinated-network signatures, graph
    anomaly detection through community detection and structural-outlier methods, and Sybil and bot-network
    detection through graph structure rather than per-account behaviour. The capstone integrates the whole
    behavioural layer -- session scoring, baselines, drift, rate limiting, profiling, and graph analysis --
    into the Chapter 12 seven-track gateway as the fourth detection layer, with inline detectors on the
    request path and batch detectors on a schedule, completing the detection system that sees the individual
    request, the session, the entity, and the relationships between entities, and that Chapter 14 deploys to
    production.

