prose_content:

  part_1:
    title: 'History Is the Most Informative Discarded Context'
    body: |
      A per-request detector scores a request from its content and immediate context. A session detector
      scores a session from its turns. Each is bounded to the current activity, and each discards the same
      thing: the requester's accumulated history. This is the most informative context available about a
      request, and scoring without it is scoring with less information than the system has.

      Consider two entities making the identical request. One has a year-long clean history: consistent
      legitimate use, no risk events, a stable fingerprint. The other was flagged last week for systematic
      enumeration and carries a history of rate-abuse signals. The request itself is identical, so any
      detector that scores only the request scores both identically. But they are not the same situation:
      the request from the flagged entity is far more likely to be part of a continuing campaign, and the
      request from the clean entity is far more likely to be legitimate. The history is exactly what
      distinguishes them, and a detector that ignores it cannot make the distinction the available
      information supports.

      User behaviour profiling makes the history a first-class input. It maintains a persistent record of
      each entity's behaviour -- baselines, risk events, fingerprint -- and exposes a current risk score
      that every other detector and the gateway can read. The same request is then scored in the context
      of the requester: elevated for an entity with a suspicious history, given more benefit of the doubt
      for an entity with a clean one. This is not a new detector for a new attack class; it is the
      mechanism that lets every existing detector incorporate the history that sharpens its verdict, and
      it is the entity family's central contribution -- the persistence that turns transient signals into a
      durable understanding of each actor.

  part_2:
    title: 'The Behavioural Fingerprint'
    body: |
      The behavioural fingerprint is the stable signature of how an entity normally uses the service: the
      characteristic pattern that distinguishes this entity from others and remains consistent over time
      for a given legitimate entity. It is built from the same behavioural features the rest of the chapter
      produces, aggregated into a stable per-entity signature: typical request rate and its rhythm, usual
      endpoints and their mix, characteristic session length and structure, typical time-of-day activity,
      usual topics and request types, the regularity or irregularity of timing.

      The fingerprint is distinct from the baseline in its purpose. The baseline of 13.03 captures the
      normal range of each metric for deviation scoring; the fingerprint captures the entity's overall
      behavioural identity as a stable whole, for the purpose of recognising when an entity stops behaving
      like itself. A legitimate entity's fingerprint is stable: it uses the service in a characteristic way
      that persists across sessions and weeks. Two legitimate entities have different fingerprints -- a
      batch integration and an interactive user behave differently -- and each is consistent with its own
      fingerprint over time.

      The fingerprint's stability is what makes it useful for compromise detection in Part 5. Because a
      legitimate entity behaves consistently with its fingerprint, a sudden, broad divergence from the
      fingerprint is anomalous in a way that a deviation in any single metric is not. The fingerprint
      captures the entity's behavioural identity across many dimensions at once, so a compromise that
      changes the entity's behaviour across several dimensions -- different endpoints, different timing,
      different request types -- shows as a fingerprint divergence even if no single dimension's deviation
      is extreme. Building the fingerprint requires aggregating the entity's behaviour into a stable
      multi-dimensional signature and tracking how consistently current behaviour matches it.

  part_3:
    title: 'The Persistent Profile and Cross-Session Risk Scoring'
    body: |
      The persistent entity profile is the durable record that holds everything the system knows about an
      entity across all of its activity. Its schema has three parts. The aggregated baselines are the
      entity's per-metric baselines from 13.03, persisted so they survive across sessions and inform every
      future verdict. The historical risk events are the record of the entity's flagged behaviour: the
      sessions that crossed the threat accumulator, the rate-abuse signals, the injection-success
      detections, each with a timestamp and severity. The behavioural fingerprint is the stable signature
      of Part 2. Together these constitute a persistent, queryable understanding of the entity that
      accumulates over its lifetime.

      The cross-session risk score integrates the entity's risk signals from across all its sessions into a
      single number. Each session and each window contributes risk signals -- a high session threat
      accumulator, a rate-abuse detection, an injection success, a temporal anomaly -- and the cross-
      session risk score combines them into a persistent measure of how suspicious the entity is overall.
      This integration is what the smart rate limiter reads to weight its limit and what the gateway reads
      to inform its verdict. A single suspicious session contributes to the score but does not by itself
      determine it; an entity with a pattern of suspicious sessions across weeks accumulates a high score
      that reflects the sustained pattern, not any single event.

      The cross-session risk score is computed off the request hot path and exposed as a compact inline
      value, per the 13.01 state-latency coupling. The persistent profile -- baselines, risk-event history,
      fingerprint -- is large state that cannot be queried at full depth on the request path, so it is
      updated asynchronously as sessions close and signals arrive, and it is summarised into the single
      risk score that the hot path reads cheaply. This is the same pattern as every entity-family detector:
      the expensive analysis runs off the hot path, and the request path reads a precomputed summary. The
      risk score is the entity family's contribution to the inline verdict, the distilled output of the
      whole persistent profile.

  part_4:
    title: 'Decay and Reinforcement: Fairness and Effectiveness'
    body: |
      A risk score that only ever rises is both unfair and ineffective, and the dynamics of how the score
      changes over time -- decay and reinforcement -- are as important as how it is computed. Both are
      required, and for distinct reasons.

      Decay is a fairness requirement. False positives are inevitable: every detector occasionally flags a
      legitimate entity, and a legitimate entity occasionally behaves in a way that looks suspicious. If a
      single false-positive risk event permanently elevated an entity's risk score, the entity would be
      treated as suspicious forever -- tighter rate limits, more scrutiny -- for a one-time anomaly that was
      not actually an attack. This is unfair to legitimate entities and degrades their experience
      indefinitely. Decay resolves this: risk contributions fade over time, so an isolated risk event
      raises the score temporarily and then decays away as the entity returns to normal behaviour. A clean
      entity recovers from a false positive, which it must be able to do.

      Reinforcement is an effectiveness requirement. A repeat offender -- an entity that exhibits suspicious
      behaviour repeatedly across time -- should accumulate a high, durable risk score that reflects the
      sustained pattern, not have each event decay independently as if unrelated. Reinforcement makes
      repeated risk events compound: an entity flagged again while still carrying decayed risk from a prior
      event accumulates faster and reaches a higher, more persistent score than the events would produce in
      isolation. The pattern of repeated suspicion is itself a signal, stronger than any single event, and
      reinforcement captures it.

      The two dynamics together produce the desired behaviour: an isolated event decays and the entity
      recovers, while a sustained pattern reinforces and the entity accumulates durable risk. The
      calibration between them is the tuning decision -- how fast decay erodes an isolated event versus how
      strongly reinforcement compounds a repeated one -- and it is set so that a genuinely reformed or
      false-flagged entity recovers within a reasonable window while a persistent offender does not escape
      its history by simply waiting. This is the same fairness-effectiveness balance that governs any
      reputation system, applied to the behavioural risk score.

  part_5:
    title: 'Account Compromise as Fingerprint Divergence'
    body: |
      The fingerprint enables a detection that no current-activity detector can make: account compromise.
      When a legitimate account is compromised -- credentials stolen, session hijacked -- the attacker's use
      of it is often not individually anomalous. Each request the attacker makes may be plausible, within
      normal rate, on normal endpoints. What is anomalous is that the account is no longer behaving like
      itself: the attacker uses it differently than the legitimate owner always has, across multiple
      dimensions, even if each dimension's deviation is modest.

      Fingerprint-divergence detection catches this. The legitimate account has a stable fingerprint built
      over its history, and a compromise produces a broad divergence from that fingerprint: different
      endpoints, different timing, different request types, a different rhythm -- the attacker's behavioural
      identity rather than the owner's. The divergence is measured against the entity's own fingerprint, not
      a global norm, which is what makes it specific: the attacker's behaviour might be perfectly normal for
      some other entity, but it is anomalous for this entity, whose established fingerprint it does not
      match. The signal is the gap between current behaviour and the entity's own historical identity.

      This is distinct from detecting an account that was always malicious, which is a different problem. An
      always-malicious account has no clean fingerprint to diverge from -- it was suspicious from the start,
      and the rate, coverage, and session detectors catch it on its current behaviour. Fingerprint
      divergence specifically catches the takeover of a previously-legitimate account, where the account's
      own clean history is the reference that makes the new behaviour stand out. It is the highest-value
      use of the persistent fingerprint, because account takeover is otherwise hard to detect: the attacker
      inherits the account's accumulated trust and clean history, and only the divergence from that history
      reveals that the account is no longer driven by its legitimate owner. A sharp, broad fingerprint
      divergence is the account-compromise alert, and it sharply elevates the entity's risk score.

  part_6:
    title: 'Entity Resolution and the Bridge to Graph Detection'
    body: |
      All of the profiling above assumes the system can attribute activity to an entity, but the same actor
      can operate through multiple credentials, sessions, and sources, and a naive per-credential view
      fragments one actor into many partial profiles. Entity resolution links these together: it recognises
      that several credentials, sessions, or sources belong to the same underlying actor, and consolidates
      their activity into one profile.

      Entity resolution matters for both profiling and the graph bridge. For profiling, fragmenting one
      actor across many partial identities means each partial profile has too little history to be useful,
      and an actor can evade accumulated risk by spreading activity across identities so no single one
      accumulates a high score -- the same distributed evasion from 13.07, applied to the profile. Resolving
      the identities into one actor consolidates the history so the actor's full behaviour and accumulated
      risk are scored together. The resolution uses shared attributes -- common source, credential family,
      behavioural fingerprint similarity, session linkage -- to link identities, with the fingerprint itself
      being a strong linker because the same actor tends to have a similar behavioural signature across its
      identities.

      Entity resolution is also the bridge from the entity family to the graph family. Graph-based detection
      in 13.11 operates on entities and the relationships between them, and those entities are exactly the
      resolved actors this section defines, with the linking attributes -- shared source, credential,
      fingerprint similarity, timing -- being the edges the graph detector analyses. The entity profile
      provides the nodes; entity resolution provides the first-order edges; and the graph detector develops
      these into the full relationship analysis that catches coordinated networks. Where entity resolution
      links identities that are clearly the same actor, the graph detector finds the looser coordination
      between distinct actors that share infrastructure or synchronise behaviour without being the same
      actor. The persistent profile, the fingerprint, and entity resolution are thus both the culmination of
      the entity family and the foundation the graph family is built on -- the entity risk score feeds the
      inline verdict, and the entity definitions and links feed the graph. The profile's risk score flows to
      the rate limiter of 13.08 and the gateway of 13.11, the fingerprint divergence feeds the compromise
      alert, and the resolved entities and their links become the graph that 13.11 analyses.

