section_overview:
  one_line_summary: 'A request scored in isolation throws away its most informative context -- the requester history; Section 13.10 builds the persistent entity profile, behavioural fingerprint, and decaying risk score that make history a first-class input, detect account compromise as fingerprint divergence, and bridge the session family to the graph family.'
  why_this_section_exists: |
    Every detector so far has scored an entity's current activity -- this session, this window, this
    rate. None has made the entity's accumulated history a first-class input. Section 13.10 builds that.
    The argument is that a request scored in isolation discards the single most informative piece of
    context available: who is making it and what they have done before. The same request from an entity
    with a clean year-long history and from an entity flagged for enumeration last week is not the same
    request, and a detector that scores both identically is throwing away the history that distinguishes
    them.

    The persistent entity profile is the structure that retains that history. It aggregates the session
    and window signals of the preceding sections into a durable per-entity record: the entity's
    baselines, its history of risk events, and its behavioural fingerprint -- the stable signature of how
    it normally uses the service. This profile turns the many transient per-session signals into a
    persistent entity-level risk score that the rate limiter of 13.08 reads inline and the gateway of
    13.11 incorporates into every verdict.

    The profile also enables a detection that no current-activity detector can make: account compromise
    as fingerprint divergence. A compromised account's requests may be individually plausible, but
    collectively they no longer match how that specific entity has always behaved. The divergence from
    the entity's own established fingerprint -- not from a global norm -- is the compromise signal, and
    it is distinct from an account that was always malicious. Building this requires entity resolution to
    link the same actor across credentials, sessions, and sources, and the profile is the bridge from
    session-level detection to the graph-level detection of 13.11, which operates on the entities this
    section defines.
  position_in_chapter: |
    Section 13.10 is the culmination of the entity family, aggregating the signals of every preceding
    detector -- session threat from 13.09, rate abuse from 13.07, injection success from 13.06, temporal
    anomalies from 13.04 -- into a persistent entity risk score and behavioural fingerprint. It produces
    the risk score that the smart rate limiter of 13.08 reads inline and closes the feedback loop with
    it. It is the bridge to the graph family: graph-based detection in 13.11 operates on entities and
    their relationships, and the entity profile and entity resolution built here define those entities.
    It precedes the graph detection and capstone of 13.11 that consume it.

