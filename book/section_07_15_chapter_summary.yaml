# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Jailbreaks target the alignment layer; injections target the instruction\
    \ layer. The same instruction-following mechanism makes both possible.\
    \ Detection must address them separately -- the five-track ensemble handles\
    \ jailbreak; the Chapter 6 classifier handles injection; together they cover\
    \ OWASP LLM01 completely."
  - "Every jailbreak technique is distribution shift: moving the input into a\
    \ region where RLHF-trained refusal probability is low. Mechanism-based\
    \ detection -- targeting the shift mechanism rather than specific prompts --\
    \ is what makes detection durable against variant iteration."
  - "Three detection architectures are required because attack signals are\
    \ fundamentally different: semantic features for social engineering, perplexity\
    \ for token-level attacks, structural pattern counting for many-shot, session\
    \ state for multi-turn attacks, and cross-fragment coherence for splitting.\
    \ No single classifier covers all families at acceptable FPR."
  - "The 50ms P99 latency budget and 1% FPR budget are not engineering\
    \ preferences -- they are operational constraints that determine whether\
    \ the detection system is deployable. Everything in Section 7.14 is designed\
    \ around them."
  - "The catalog (Section 7.13) is a living document and an operational asset,\
    \ not a historical record. catalog_maintenance.py defines how it stays\
    \ current. The jailbreak landscape changes continuously. The catalog\
    \ maintenance cadence should match the automated red-team cadence."
  - "Chapter 8 transitions from inference-time attacks to training-time attacks.\
    \ The adversary's goal shifts from manipulating what a deployed model\
    \ produces to manipulating what the model learns. The detection targets\
    \ shift from runtime inputs to training data, model weights, and\
    \ the training process itself."

