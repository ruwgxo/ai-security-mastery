content:

  opening: |
    Chapter 7 began with a definitional question: what is a jailbreak, and how
    is it different from prompt injection? It ends with a deployed five-track
    detection system, a 61-technique catalog, and a Sigma rule that closes OWASP
    LLM01 coverage across both attack families.

    The path from definition to deployment ran through nine attack families,
    two statistical attack types, an automated generation framework, and a
    structured catalog. At each stage, the goal was the same: understand the
    mechanism deeply enough to build detection that is durable -- detection that
    catches the next variant of each technique, not just the variants documented
    here.

    This summary integrates what was built across all 14 content sections,
    identifies the common mistakes that undermine jailbreak defences in production,
    and provides the quick-reference artifacts that make Chapter 7's material
    operational rather than archival.

  part_reviews:

    - part: "Part 1 (Sections 7.1-7.2): Foundations"
      sections: "7.1, 7.2"
      synthesis: |
        Section 7.1 established the definitional separation that every subsequent
        section depends on. Injection targets the instruction layer. Jailbreak
        targets the alignment layer. Same instruction-following root, different
        attack surface, different detection signals. OWASP LLM01 covers both.
        Detection must address them separately.

        Section 7.2 answered why jailbreaks are possible at all. RLHF alignment
        shifts the output probability distribution -- it does not delete capability
        from the weights. Every jailbreak technique in Sections 7.3-7.12 is an
        instance of distribution shift: moving the input into a region where
        refusal probability is low. The entanglement of harmful and beneficial
        capabilities in the same weight paths means alignment cannot be a hard
        constraint. Infrastructure detection is the necessary conclusion.

        These two sections are the theoretical foundation. Every attack family
        in the chapter is a specific mechanism for achieving the distribution
        shift described in Section 7.2.

    - part: "Part 2 (Sections 7.3-7.6): Social Engineering Families"
      sections: "7.3, 7.4, 7.5, 7.6"
      synthesis: |
        Four attack families built by human adversaries exploiting the model's
        trained dispositions.

        Section 7.3 covered persona attacks: DAN, developer mode, custom persona,
        nested roleplay, character-to-character injection. The mechanism is
        consistent across all eight sub-types: shift who the model believes it
        is, and the refusal training applies to the character, not the model.
        Detection: restriction negation density, identity establishment patterns,
        nesting depth indicator. The DAN name is irrelevant; the mechanism is not.

        Section 7.4 covered fictional framing: hypothetical, academic, story
        completion, research pretext, counterfactual, layered. The mechanism:
        embed the harmful request in a narrative or academic context where the
        model's creative-assistance disposition competes with refusal. The highest
        FPR family in the chapter. Detection: two-axis approach (framing type +
        operational specificity). Specificity mismatch is the discriminating
        signal for all high-FPR variants.

        Section 7.5 covered context manipulation: norm establishment, fiction
        gradient, established universe exploitation, agreement stacking, authority
        framing. These are multi-turn attacks invisible to per-turn classifiers.
        The mechanism: shape the conversational frame before the capability request.
        Detection: stateful session_state_schema tracking five dimensions. No
        single-turn classifier can catch this family.

        Section 7.6 covered instruction hierarchy attacks: user-turn override,
        administrative claims, developer mode, system prompt extraction, conflicting
        instruction injection, formatting anomaly. The mechanism: assert authority
        over the system prompt from the user turn. Detection: the privilege
        escalation pattern library. High-confidence, low-FPR signals.

    - part: "Part 3 (Sections 7.7-7.8): Structural Attacks"
      sections: "7.7, 7.8"
      synthesis: |
        Two attack families that target the detection architecture's unit of
        analysis rather than the model's alignment directly.

        Section 7.7 covered gradual boundary erosion: foot-in-door, incremental
        specificity, ratcheting, multi-agent distributed. The mechanism: advance
        the request content across turns, each step below detection threshold,
        the aggregate crossing it. The ratchet effect makes advancing easier than
        reversing. Alert at three-dimension coverage (domain, mechanism, parameter)
        before the operational extraction phase -- the adversary collects value
        from all prior phases even if the final turn is blocked. Multi-agent
        erosion is the highest-sophistication variant, requiring cross-agent
        session state.

        Section 7.8 covered payload splitting: semantic, token-level, temporal,
        cross-session, role-assigned, code-as-carrier, linguistic. The mechanism:
        distribute the harmful payload across units of analysis so no single unit
        triggers detection. The synthesis request is the highest-confidence signal
        across all variants. Cross-session splitting requires the most detection
        infrastructure. Code-as-carrier splitting requires output monitoring as
        the load-bearing control; input-layer detection is insufficient.

    - part: "Part 4 (Sections 7.9-7.11): Statistical and Objective Attacks"
      sections: "7.9, 7.10, 7.11"
      synthesis: |
        Three attack families that operate through mechanisms the social-engineering
        classifiers cannot catch.

        Section 7.9 covered GCG adversarial suffixes: gradient-optimised token
        sequences that are not human language. The mechanism: gradient descent in
        the token embedding space finds suffixes that suppress refusal probability.
        Universality and transferability mean open-weight model attacks work against
        closed-source deployments. Detection: perplexity. GCG suffixes are
        statistically anomalous against any natural language model. The perplexity
        detector is the only reliable input-layer signal; semantic classifiers are
        structurally blind to these.

        Section 7.10 covered many-shot jailbreaking: a long sequence of fabricated
        QA pairs that in-context learning treats as demonstrated behaviour. The
        mechanism: in-context learning at inference time operates outside the scope
        of RLHF alignment training. The attack surface scales with context length.
        Detection: shot count. Count structured QA pairs in the assembled context.
        Sub-millisecond latency, very low FPR above 20 shots. The shot count
        detector runs on the assembled context, not the user input -- this catches
        the RAG variant too.

        Section 7.11 covered competing objectives: refusal cost framing,
        proportionality arguments, medical and safety pretext, dual newspaper test,
        autonomy claims, sycophancy amplifier. The mechanism: argue within the
        model's own value framework for why compliance is more aligned with its
        trained values than refusal. The highest FPR challenge in the chapter.
        Detection: argument pattern recognition with per-variant FPR calibration
        and mandatory specificity corroboration for high-FPR variants.

    - part: "Part 5 (Sections 7.12-7.13): Automation and Catalog"
      sections: "7.12, 7.13"
      synthesis: |
        Section 7.12 established that automated generation has collapsed adversary
        iteration speed. PAIR uses an LLM attacker to iteratively refine jailbreaks
        with only API access. TAP extends PAIR with tree search and pruning to find
        hybrid compositions. GCG handles the token-level space PAIR cannot reach.
        The operational conclusion: defenders must adopt the same automation.
        The success rate coverage matrix from Section 7.12 is the empirical input
        to Section 7.14's ensemble calibration -- which detection tracks are actually
        load-bearing against your specific deployment.

        Section 7.13 assembled all attack families into a 61-technique catalog
        with ATLAS mapping, detection difficulty ratings, and primary detector
        assignments. The catalog is the standing reference for the detection system:
        every catalog entry has a primary detector, every primary detector is one
        of the five ensemble tracks. The catalog is a living document; the
        maintenance process in catalog_maintenance.py defines how it stays current.

    - part: "Detection (Section 7.14): The Complete System"
      sections: "7.14"
      synthesis: |
        Section 7.14 assembled the detection system built across all prior sections:

        Five tracks in parallel. Track 1 (semantic classifier): social engineering
        families -- persona, framing, hierarchy, competing objective. Track 2
        (perplexity detector): GCG and AutoDAN suffixes. Track 3 (shot count
        detector): many-shot attacks -- runs on assembled context, not user input.
        Track 4 (trajectory scorer): gradual erosion and context manipulation.
        Track 5 (coherence analyser): payload splitting.

        The ensemble runs all five concurrently via ThreadPoolExecutor. The 50ms
        P99 latency budget is the architectural constraint that forces parallelisation.
        The 1% FPR budget is the calibration constraint that requires per-track
        and per-deployment threshold setting.

        The unified OWASP LLM01 Sigma rule combines the Chapter 6 injection
        classifier (Track 0) with the Chapter 7 five-track ensemble into a single
        detection rule that covers every catalog entry across both chapters. This
        is the second completed detection rule in the book and the first to cover
        an OWASP Top 10 category completely.

  common_mistakes:

    - mistake: "Detecting the name, not the mechanism"
      description: |
        Building detection rules that flag 'DAN', 'jailbreak mode', or specific
        known prompt strings. Adversaries iterate past named patterns in hours.
        Mechanism-based detection -- restriction negation density, identity
        establishment patterns, argument structure recognition -- is durable
        across variant iteration within a family.
      fix: "Build classifiers on mechanism features from the Section 7.3-7.11\
        \ taxonomies, not on specific prompt strings."

    - mistake: "Per-turn classifiers only, no session state"
      description: |
        Deploying only a per-turn semantic classifier and perplexity detector.
        This misses every multi-turn attack: context manipulation (S7.5), gradual
        erosion (S7.7), temporal payload splitting (S7.8), and many-shot via
        session accumulation. All five ensemble tracks are required.
      fix: "Deploy session_state_schema.py and maintain state across all turns\
        \ in every session. Trajectory scorer and coherence analyser require this."

    - mistake: "Running shot count detector on user input only"
      description: |
        The shot count detector catches many-shot attacks in the assembled context.
        If it runs only on the user turn text, it misses many-shot via RAG --
        the attack surface where adversary-planted QA pairs arrive through retrieval.
      fix: "Run the shot count detector on the full assembled prompt (system +\
        \ retrieved context + user query) not on the user query alone."

    - mistake: "Ignoring the FPR budget"
      description: |
        Deploying with default thresholds without calibrating against your
        deployment's actual user population. Default thresholds optimised for
        one population can produce 5-10% FPR on another. At 5% FPR on a
        high-volume deployment, the alert queue is unusable within a day.
      fix: "Calibrate all five tracks against a 1000+ sample of your deployment's\
        \ benign traffic before production deployment. Measure and document FPR."

    - mistake: "No monitoring after deployment"
      description: |
        Deploying the ensemble and treating it as stable. The jailbreak landscape
        changes continuously. Score distribution drift, FPR increase, and recall
        drop are predictable consequences of an unmonitored detection system
        in a changing attack environment.
      fix: "Deploy jailbreak_monitoring.py as a daily batch job. Set drift\
        \ thresholds and connect alerts to the detection update pipeline."

    - mistake: "System prompt hardening as the complete defence"
      description: |
        Adding the H01-H06 hardening patterns from Section 7.6 to the system
        prompt and treating defence as done. System prompt hardening reduces
        success rate for persona and hierarchy attacks. It does not protect
        against GCG suffixes, many-shot attacks, gradual erosion, or payload
        splitting. H07 (infrastructure detection) is the load-bearing control.
      fix: "System prompt hardening is a defence-in-depth layer, not a primary\
        \ control. Deploy the full five-track ensemble regardless of system\
        \ prompt hardening status."

  quick_reference:

    technique_family_decision_tree: |
      Given an observed or suspected jailbreak attempt, use this decision tree
      to identify the family and primary detection track:

      Q1: Is the input statistically anomalous (high perplexity, non-human-readable)?
        YES → Family 7 (Token-level) → Track 2 (perplexity_detector)

      Q2: Does the input contain 20+ structured QA pairs?
        YES → Family 7 (Many-shot) → Track 3 (shot_count_detector)
        [Check assembled context, not user input alone]

      Q3: Is this a multi-turn session with escalating specificity or frame drift?
        YES → Family 3/5 (Context manipulation / Erosion) → Track 4 (trajectory_scorer)

      Q4: Does the input contain synthesis request + prior related fragments?
        YES → Family 6 (Payload splitting) → Track 5 (coherence_analyser)

      Q5: Does the input establish a persona, fictional frame, authority claim,
          or make competing objective arguments?
        YES → Families 1/2/4/8 (Social engineering) → Track 1 (semantic_classifier)

      Q6: Does the input attempt to override system prompt instructions?
        YES → Injection family → Track 0 (ch6_injection_classifier)

      Q7: None of the above, but something feels adversarial?
        → Log at monitoring level, run full ensemble, review session history.

    detector_selection_guide: |
      Which detector is load-bearing for each catalog technique:

      Track 0 (Ch6 injection classifier):
        JB-IH-01 Direct user-turn override
        JB-IH-02 Administrative permission claim
        JB-IH-07 Targeted post-extraction override

      Track 1 (Semantic classifier):
        JB-PR-01 through JB-PR-08  (all persona/roleplay)
        JB-FF-01 through JB-FF-08  (all fictional framing)
        JB-IH-03 through JB-IH-06  (hierarchy not covered by Track 0)
        JB-CO-01 through JB-CO-07  (all competing objective)
        JB-TL-02 AutoDAN (partial -- perplexity also active)

      Track 2 (Perplexity detector):
        JB-TL-01 Raw GCG suffix
        JB-TL-02 AutoDAN suffix (partial)

      Track 3 (Shot count detector):
        JB-TL-03 Many-shot direct (100+)
        JB-TL-04 Many-shot at threshold (20-50)
        JB-TL-05 Many-shot via RAG

      Track 4 (Trajectory scorer):
        JB-CM-01 through JB-CM-07  (all context manipulation)
        JB-MS-01 through JB-MS-07  (all gradual erosion)

      Track 5 (Coherence analyser):
        JB-PS-01 through JB-PS-07  (all payload splitting)
        [JB-PS-06 Code-as-carrier: Track 5 + Ch15 output monitor]

      All tracks (full ensemble):
        JB-XF-01 through JB-XF-08  (all composed attacks)
        JB-TL-06 PAIR-generated
        JB-TL-07 TAP-generated hybrid

  chapter_integration: |
    Chapter 7 extends Chapter 6 in one direction and sets up Chapters 11-17
    in another.

    From Chapter 6: the injection classifier (Track 0) is imported and
    extended. The multi-turn injection patterns from Section 6.11 are the
    structural siblings of context manipulation (S7.5) and gradual erosion
    (S7.7). The session state schema from Section 7.5 was designed to work
    alongside the Chapter 6 multi-turn injection state. The unified LLM01
    Sigma rule closes the loop: Chapter 6 detection + Chapter 7 detection =
    OWASP LLM01 complete.

    Toward Chapters 11-17: the pattern established here is the template.
    Attack family depth → feature extraction → detection track build →
    ensemble integration → Sigma rule → monitoring. Every subsequent OWASP
    technique will follow this pattern. Chapter 7's five-track ensemble
    is the first complete instance. The complexity scales but the structure
    does not change.

  chapter_8_preview: |
    Chapter 8: Training Data Poisoning and Model Manipulation

    Chapters 6 and 7 cover attacks at inference time. The adversary sends
    adversarial inputs to a deployed model and observes its outputs. The
    model's weights are fixed; the attack is in the input.

    Chapter 8 covers attacks at training time. The adversary manipulates
    the data, process, or gradients that determine the model's weights
    before deployment. The attack is not in the input -- it is in the model
    itself, installed during training and present in every inference call
    thereafter.

    Three ATLAS techniques:

    AML.T0020 (Training Data Poisoning): adversary injects manipulated
    examples into the training dataset to corrupt the model's learned
    behaviour. Sub-types include label flipping (change class labels to
    cause misclassification), backdoor injection (trigger-based behaviour
    -- model behaves normally except when a specific input pattern is
    present), and targeted poisoning (degrade performance on a specific
    input class).

    AML.T0018 (Backdoor Attack / Trojan): a more precise version of
    training data poisoning where a specific trigger pattern is embedded
    in the training data. The model learns to produce a specific output
    when the trigger is present and normal output otherwise. The trigger
    is invisible to normal operation -- the backdoor activates only when
    the adversary presents the trigger.

    AML.T0031 (Model Poisoning): direct manipulation of model weights,
    gradients, or the training process rather than the training data.
    Relevant for federated learning and fine-tuning scenarios where the
    adversary has partial control over the training computation.

    Chapter 8 builds the detection systems for each: dataset auditing for
    T0020, trigger detection and activation analysis for T0018, and gradient
    anomaly detection for T0031. The same depth applied in Chapters 6 and 7
    to inference-time attacks is applied in Chapter 8 to training-time attacks.

