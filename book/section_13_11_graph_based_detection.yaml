section_overview:
  one_line_summary: 'Coordinated abuse has no single-entity signal -- each account behaves acceptably alone and the attack is the structure between accounts; Section 13.11 builds the entity-relationship graph and coordinated-network detection, then integrates the whole behavioural layer into the Chapter 12 seven-track gateway as the capstone.'
  why_this_section_exists: |
    Section 13.11 closes Chapter 13 with the last behavioural signal family and the integration capstone.
    The graph family exists because there is an attack class that even the persistent entity profile of
    13.10 cannot see: coordinated abuse. A network of a hundred accounts, each behaving acceptably on its
    own, sharing no single suspicious request, can collectively run a campaign whose only signal is the
    structure of the relationships between the accounts. Each account passes every single-entity detector
    -- its rate is fine, its sessions are fine, its fingerprint is clean -- and the attack is invisible
    until the accounts are analysed together as a graph.

    The entity family of 13.07 and 13.10 began to point at this: distributed-abuse detection aggregated a
    campaign across accounts by a single shared attribute, and entity resolution linked identities that
    were clearly the same actor. The graph family completes the picture by analysing the full relationship
    structure -- not just one shared attribute, and not just identities that are obviously the same actor,
    but the looser coordination between distinct actors who share infrastructure, synchronise timing, or
    move together. This is the structure that community detection and graph anomaly methods surface, and it
    is the only way to see a coordinated network whose individual members are each clean.

    The section then turns to the capstone: integrating the entire behavioural layer built across Chapter
    13 -- session scoring, baselines, time-series anomaly, drift, output monitoring, rate limiting,
    profiling, and graph analysis -- into the Chapter 12 seven-track gateway as the fourth detection layer.
    The integration respects the state-latency coupling of 13.01: inline detectors read cheap precomputed
    summaries on the request path, while the expensive session, entity, and graph analysis runs near-real-
    time or in batch off the path and writes its findings back. The result is a detection system that sees
    the individual request, the session, the entity, and the relationships between entities -- the complete
    behavioural picture that Chapter 14 deploys to production.
  position_in_chapter: |
    Section 13.11 is the capstone of Chapter 13, building the graph family on the resolved entities and
    links of 13.10 and then integrating all four behavioural families into the Chapter 12 gateway. It
    consumes the entity definitions and first-order edges from 13.10, the risk scores and signals from
    every preceding section, and the seven-track gateway from Chapter 12 Section 12.17. It produces the
    behavioural monitoring gateway -- the complete detection system -- that the chapter summary of 13.12
    reviews and that Chapter 14 deploys. It is the integration point where the behavioural layer becomes a
    coherent system rather than a set of separate detectors.

