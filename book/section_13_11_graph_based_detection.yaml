prose_content:

  part_1:
    title: 'Coordinated Abuse Has No Single-Entity Signal'
    body: |
      The graph family targets an attack that every detector before it is structurally blind to:
      coordinated abuse by a network of individually-clean accounts. Consider a hundred accounts run by a
      single adversary as a campaign. Each account makes a modest number of requests, on ordinary
      endpoints, at an ordinary rate, with a clean session history and a stable fingerprint. Each account,
      examined by itself, passes every single-entity detector -- the rate detector finds nothing, the
      session detector finds nothing, the profile is clean. There is no single account that is the attack.

      The attack is the coordination. The hundred accounts were created in the same hour, operate from the
      same IP range, share a credential-generation pattern, and synchronise their activity -- they act
      together as one campaign distributed across many compliant identities. None of this is visible at the
      level of any single account, because the signal is not a property of an account; it is a property of
      the relationships between accounts. To see it, the accounts must be analysed together, as a graph,
      where the structure of their relationships becomes the detectable object.

      This is the final and most complete expression of the chapter's central thesis. Section 13.01 argued
      that some attacks live in the relationship between requests; the graph family shows that some attacks
      live in the relationship between entities. The session family aggregated requests into sessions; the
      entity family aggregated sessions into entity profiles; the graph family aggregates entities into a
      relationship graph. Each level of aggregation reveals attacks invisible at the level below, and the
      graph is the top of that hierarchy -- the level at which coordinated networks, invisible at every
      lower level, finally become detectable. The entity family pointed here: distributed-abuse detection
      and entity resolution were first steps into relationship analysis, and the graph family is where that
      analysis is done in full.

  part_2:
    title: 'Building the Entity-Relationship Graph'
    body: |
      Graph-based detection operates on a graph whose nodes are entities and whose edges are relationships
      between them. The nodes are the resolved entities of 13.10 -- the actors, consolidated from their
      fragmented identities. The edges are the relationships that link entities, and constructing them well
      is the foundation that bounds detection quality: the graph detector can only find structure that the
      edges represent.

      Edges are drawn from shared attributes and behavioural relationships. Shared infrastructure is the
      most direct: entities operating from the same source IP or range, the same credential family, or the
      same creation-time cohort are linked by an infrastructure edge. Behavioural similarity is a softer
      edge: entities with very similar fingerprints, similar session patterns, or similar coverage behave
      alike in a way that may indicate common control. Synchronised timing is a temporal edge: entities
      whose activity is correlated in time -- active together, quiet together, spiking together -- move as
      if coordinated. Each edge type carries a weight reflecting the strength of the link, and an entity
      pair may be connected by several edge types whose weights combine.

      The edge construction inherits the lessons of the chapter. It uses the entity resolution of 13.10 for
      the strongest links -- identities that are the same actor -- and adds the looser coordination edges
      between distinct actors. It must be robust to coincidence: many legitimate entities share an IP
      because they sit behind a common NAT, share a credential family because they use a common SDK, or are
      active at the same times because they are in the same time zone. An edge drawn on a single weak shared
      attribute is mostly noise. The graph is built so that an edge reflects a meaningful relationship --
      multiple corroborating shared attributes, or a shared attribute that is rare enough to be
      informative -- rather than the incidental sharing that pervades legitimate traffic. The quality of
      this edge construction determines whether the graph detector finds real coordination or drowns in the
      coincidental structure of normal traffic.

  part_3:
    title: 'Coordinated-Network Signatures and Graph Anomaly Detection'
    body: |
      With the graph built, coordinated networks are found through graph anomaly detection: methods that
      identify structure in the graph that does not occur in normal traffic. The coordinated network has
      characteristic signatures that these methods surface.

      The clearest signature is a dense cluster: a group of entities far more interconnected with each other
      than with the rest of the graph, linked by shared infrastructure, similar fingerprints, and
      synchronised timing all at once. Legitimate entities form a sparse, loosely-connected graph -- most
      pairs share no meaningful relationship -- while a coordinated network forms a dense subgraph where the
      members are tightly linked to each other. Community detection finds these dense subgraphs: it
      partitions the graph into communities of densely-interconnected entities, and a community that is both
      dense and exhibits suspicious shared attributes is a candidate coordinated network. A second signature
      is structural outliers: entities or groups whose connectivity pattern is anomalous -- a star of
      accounts all linked to one controller, a clique of accounts created together and behaving identically.
      Centrality and structural-outlier methods surface these.

      The detection combines the structural signal with the behavioural signal. A dense cluster alone is not
      proof of abuse -- a legitimate organisation's accounts may form a dense cluster because they genuinely
      share infrastructure. The coordinated-abuse signal is a dense cluster whose members also exhibit the
      behavioural markers of a campaign: synchronised activity, similar coverage patterns, shared rate-abuse
      or enumeration signals, accounts created together and behaving identically. The combination of
      structural density and behavioural coordination is far more specific than either alone, the same way
      the multi-turn detector combined structural context-density with the declining-refusal trajectory. The
      graph detector flags a community when its structural density and its behavioural coordination both
      exceed threshold, which separates the coordinated abuse network from the legitimate organisation whose
      accounts merely share infrastructure.

  part_4:
    title: 'Sybil and Bot-Network Detection Through Structure'
    body: |
      Two specific coordinated-abuse forms are detected primarily through graph structure: Sybil networks
      and bot networks. A Sybil network is many fake identities controlled by one adversary, created to
      appear as independent entities -- to evade per-account limits, manufacture consensus, or distribute a
      campaign. A bot network is many automated accounts acting under common control. Both share the
      property that their structure betrays them even when their individual behaviour is designed to look
      independent.

      Sybil detection through structure looks for the signatures of mass-created fake identities: a cohort of
      accounts created in a narrow time window, sharing infrastructure, with thin or templated histories,
      forming a dense cluster with little connection to the legitimate graph. The Sybil cluster is
      structurally distinct from a comparable number of legitimate accounts, which would be created over
      time, use diverse infrastructure, and connect into the broader legitimate graph rather than forming an
      isolated dense island. The structural isolation and synchronised creation of the Sybil cluster is the
      signal, independent of whether any individual fake account behaves anomalously.

      Bot-network detection through structure looks for the coordination signatures of automated accounts
      under common control: synchronised activity (the bots act together because one controller drives
      them), similar behavioural fingerprints (the bots run the same automation, so they behave alike), and
      shared infrastructure. The bot network forms a cluster of behaviourally-similar, time-synchronised
      entities, and the periodicity signal from 13.07 reinforces it -- bots exhibit the automation signature
      individually and synchronise it collectively. Detecting these through structure rather than per-account
      behaviour is essential because the per-account behaviour is designed to look independent and clean; the
      coordination is only visible in the graph. The graph detector surfaces the Sybil and bot clusters as
      dense, synchronised, infrastructure-sharing communities, and the behavioural markers confirm them.

  part_5:
    title: 'The Capstone: Integrating the Behavioural Layer into the Gateway'
    body: |
      The capstone of Chapter 13 integrates everything built across the chapter into the Chapter 12 seven-
      track gateway as the fourth detection layer. Chapter 11 built the signature and heuristic layers,
      Chapter 12 built the ML layer, and Chapter 13 has built the behavioural layer; the integration places
      the behavioural layer above the ML gateway so that the complete system sees the individual request,
      the session, the entity, and the relationships between entities.

      The integration is governed by the state-latency coupling of 13.01, which dictates where each
      behavioural detector runs. The request hot path remains fast: it runs the Chapter 12 per-request
      classifiers inline and reads the cheap precomputed behavioural summaries -- the entity risk score from
      13.10, the current rate-limit state from 13.08, the session threat accumulator from 13.09, the
      output-monitoring canary check from 13.06. These are all reads of precomputed values, adding little
      latency. The near-real-time tier runs the session scorer, the baseline and time-series detectors, the
      entity profiler, and the output-distribution monitor, updating their state from the event stream and
      writing back the summaries the hot path reads. The batch tier runs the graph detector and the drift
      monitors on a schedule, writing their findings back as entity risk adjustments and alerts.

      This tiered architecture is the only way to integrate the behavioural layer without breaking the
      gateway's latency budget. Putting the graph traversal or the full profile query inline would blow the
      sub-50ms budget, so the expensive analysis runs off the path and exposes summaries. The gateway verdict
      combines the inline per-request scores with the inline behavioural summaries: a request from an entity
      with a high precomputed risk score, currently throttled, in a session with a climbing threat
      accumulator, is treated very differently from the same request from a clean entity, and all of that
      context is available inline as precomputed values. The behavioural layer thus enriches every per-
      request verdict with session, entity, and graph context without the per-request path ever computing
      that context itself. The integration produces the behavioural monitoring gateway: the complete
      detection system, with each detector placed at the tier its state requires, that is the deployment
      target for Chapter 14.

  part_6:
    title: 'The Complete Detection System and the Behavioural Dashboard'
    body: |
      With the integration done, the detection system built across Chapters 11, 12, and 13 is complete, and
      it is worth seeing it whole. The signature and heuristic layers catch known patterns cheaply. The ML
      layer catches novel variants of known attack classes per request. The behavioural layer catches the
      attacks that span requests: the session family catches multi-turn escalation, the temporal family
      catches rate abuse and detector drift, the entity family catches account compromise and low-and-slow
      abuse, and the graph family catches coordinated networks. Each layer covers what the layers below it
      miss, and together they see the request, the session, the entity, and the relationships between
      entities. A coordinated multi-turn injection campaign run by a Sybil network -- an attack that touches
      every level -- is caught by the per-turn classifier where it can be, the session detector for the
      escalation, the entity profiler for the compromise, and the graph detector for the coordination, with
      each layer contributing the part of the picture it can see.

      The behavioural monitoring dashboard makes this system operable. It presents the three views that the
      behavioural layer produces. The entity-risk view shows the distribution of entity risk scores and the
      entities with elevated or sharply-changed risk -- the fingerprint divergences, the rate abusers, the
      high session-threat entities. The drift view shows the health of the Chapter 12 detectors and the
      model: the population stability indices, the score-distribution shifts, the drift alerts and their
      benign-versus-adversarial routing. The coordinated-network view shows the graph's flagged communities:
      the dense clusters, the Sybil and bot candidates, the coordinated campaigns, with the structural and
      behavioural evidence for each. These views turn the behavioural layer's signals into an operable
      picture for the security team, and they complete the behavioural layer as a system that not only
      detects but is observable and actionable.

      This is also where the behavioural monitoring layer connects forward to Chapter 14. The integration
      built here is a logical architecture -- which detector runs at which tier, what the hot path reads,
      what runs in batch -- and Chapter 14 takes it to production: the deployment patterns that place it
      behind an API gateway, the performance engineering that holds the inline tier within its latency
      budget, the observability that operates it at scale, and the cost optimisation that keeps the batch
      and near-real-time tiers affordable. The behavioural monitoring gateway is the artifact Chapter 13
      produces and Chapter 14 deploys, and with it the detection system is structurally complete: every
      layer present, every behavioural family integrated, every signal observable, ready for production.

