common_mistakes:

  mistake_1:
    description: 'Trying to detect coordinated abuse at the single-entity level, where each account is clean'
    why_it_happens: |
      The entity profile of 13.10 is a powerful per-entity detector, and once it is in place it is natural
      to assume it covers coordinated abuse too -- surely a coordinated network shows up as suspicious
      entities. Building a separate graph layer seems redundant when per-entity profiling is already
      detecting bad entities.
    consequence: |
      A coordinated network is designed so that each member account is individually clean: modest rate,
      ordinary endpoints, clean fingerprint. Every single-entity detector passes every member, because the
      attack is not a property of any account -- it is the structure of the relationships between accounts.
      Per-entity profiling sees a hundred clean entities and nothing wrong, and the campaign runs invisibly
      because no level below the graph can represent its signal.
    correct_approach: |
      Build the graph layer that analyses entities together as a relationship graph, where the coordinated
      network appears as a dense, synchronised, infrastructure-sharing cluster invisible at the entity
      level. entity_graph_builder.py and graph_anomaly_detector.py operate on the structure between
      entities that single-entity detection cannot see.

  mistake_2:
    description: 'Drawing graph edges on a single weak shared attribute, drowning the graph in coincidental structure'
    why_it_happens: |
      The simplest edge rule links any two entities that share an attribute -- same IP, same credential
      family. It is easy to implement and produces a richly connected graph that looks like it captures lots
      of relationships.
    consequence: |
      Legitimate traffic is full of incidental sharing: many entities share an IP behind a common NAT, share
      a credential family because they use a common SDK, are active at the same times because of a shared
      time zone. Edges drawn on a single weak shared attribute connect enormous numbers of unrelated
      legitimate entities, and the graph fills with coincidental structure that buries the real coordinated
      clusters in noise. The graph detector finds spurious communities and misses the real ones.
    correct_approach: |
      Draw edges that reflect meaningful relationships -- multiple corroborating shared attributes, or a
      shared attribute rare enough to be informative -- and down-weight or prune edges from large
      coincidental sharing groups. entity_graph_builder.py weights edges by group rarity and prunes below a
      corroboration threshold so an edge means a real link, not incidental sharing.

  mistake_3:
    description: 'Flagging any dense cluster as coordinated abuse without checking for behavioural coordination'
    why_it_happens: |
      Community detection finds dense clusters, and a dense cluster of accounts sharing infrastructure looks
      like a coordinated network. Flagging dense clusters directly is the straightforward use of the
      community-detection output.
    consequence: |
      A legitimate organisation's accounts can form a dense cluster because they genuinely share
      infrastructure -- same corporate IP range, same credential provisioning, same SDK. Flagging density
      alone marks the legitimate organisation as a coordinated abuse network, generating false positives on
      exactly the legitimate multi-account customers a business most wants to keep, while a sophisticated
      network that keeps its structure sparser is missed.
    correct_approach: |
      Flag a cluster only when its structural density is accompanied by behavioural coordination -- 
      synchronised activity, similar coverage, shared abuse signals, identical behaviour -- which separates
      the coordinated abuse network from the legitimate organisation that merely shares infrastructure.
      graph_anomaly_detector.py requires both density and behavioural coordination above threshold.

  mistake_4:
    description: 'Placing the graph detector or the full profile query inline on the request path'
    why_it_happens: |
      The graph and the profile hold the richest detection signal, and it is tempting to query them directly
      when making a per-request verdict -- traverse the graph to check cluster membership, query the full
      profile -- so the inline decision has maximum context.
    consequence: |
      The graph is the largest behavioural state and a traversal is expensive; the full profile query is
      likewise costly. Placing either inline adds tens to hundreds of milliseconds to every request, blowing
      the gateway's sub-50ms latency budget. The behavioural layer gets disabled for making the API slow,
      and its coverage is lost because the expensive analysis was placed on the wrong tier.
    correct_approach: |
      Run the graph detector and the profiler off the hot path -- the graph in batch, the profiler near-
      real-time -- and expose only cheap precomputed summaries (the entity risk score, a graph risk
      adjustment) that the request path reads. behavioural_gateway_architecture.py validates that no large-
      state detector is placed inline, and behavioural_monitoring_gateway.py reads precomputed summaries
      rather than recomputing state.

  mistake_5:
    description: 'Integrating the behavioural detectors as a loose collection without a unified gateway and dashboard'
    why_it_happens: |
      Each behavioural detector works on its own and produces a useful signal, so wiring them together into a
      unified gateway and a coherent dashboard can seem like optional polish once the individual detectors
      exist. The detectors are functional separately.
    consequence: |
      A loose collection of detectors produces a scatter of independent signals with no unified verdict and
      no operable picture. The gateway cannot combine the per-request score with the behavioural context into
      a single decision, the security team has no coherent view of entity risk, drift health, and
      coordinated networks, and the layer's signals are not actionable as a system. The whole is less than
      the sum of its parts because the parts were never integrated.
    correct_approach: |
      Integrate the detectors into the behavioural monitoring gateway that combines the inline per-request
      score with the precomputed behavioural summaries into a unified verdict, and into a dashboard with the
      entity-risk, drift, and coordinated-network views that make the layer operable. behavioural_monitoring_gateway.py
      and behavioural_monitoring_dashboard.py provide the unified verdict and the operable picture.

section_summary:

  compact: |
    Coordinated abuse has no single-entity signal: a network of individually-clean accounts runs a campaign
    whose only signal is the structure of the relationships between them, invisible to every detector below
    the graph. Section 13.11 builds the graph family and the chapter capstone. The entity-relationship graph
    takes the resolved entities of 13.10 as nodes and draws weighted edges from shared infrastructure,
    behavioural similarity, and synchronised timing -- pruning the coincidental sharing that pervades
    legitimate traffic so edges mean real links. Graph anomaly detection finds coordinated networks through
    community detection and structural-outlier methods, flagging dense clusters that also exhibit behavioural
    coordination, which separates a coordinated abuse network from a legitimate organisation that merely
    shares infrastructure. Sybil and bot networks are caught through structure -- mass-created isolated
    clusters and behaviourally-similar synchronised groups -- independent of individual account behaviour. The
    capstone integrates the whole behavioural layer into the Chapter 12 seven-track gateway as the fourth
    detection layer, governed by the state-latency coupling: the request hot path reads cheap precomputed
    summaries (entity risk, rate-limit state, session threat, canary check), the near-real-time tier runs the
    session, baseline, and profiling detectors, and the batch tier runs the graph detector and drift monitors,
    writing findings back. The result is the complete detection system -- request, session, entity, and
    relationship -- made operable by the entity-risk, drift, and coordinated-network dashboard views, and it is
    the behavioural monitoring gateway that Chapter 14 deploys to production.

  key_takeaways:
    - 'Coordinated abuse has no single-entity signal: each account behaves acceptably alone and the attack is the structure between accounts, invisible to every detector below the graph'
    - 'The entity-relationship graph takes resolved entities as nodes and draws weighted edges from shared infrastructure, behavioural similarity, and synchronised timing, pruning the coincidental sharing that pervades legitimate traffic so edges mean real links'
    - 'Graph anomaly detection flags a cluster as coordinated abuse only when structural density is accompanied by behavioural coordination, separating an abuse network from a legitimate organisation that merely shares infrastructure'
    - 'Sybil and bot networks are caught through graph structure -- mass-created isolated clusters and behaviourally-similar synchronised groups -- independent of the individual account behaviour designed to look clean'
    - 'The capstone integrates the behavioural layer into the seven-track gateway by the state-latency coupling: cheap summaries inline, the session/baseline/profiler tier near-real-time, the graph and drift tier in batch writing findings back'
    - 'The result is the complete detection system seeing request, session, entity, and relationship together, made operable by the entity-risk, drift, and coordinated-network dashboard views -- the behavioural monitoring gateway Chapter 14 deploys'

preview_section_13_12:
  title: 'Section 13.12: Chapter 13 Summary -- Behavioural Monitoring Architecture and Chapter 14 Preview'
  summary: |
    Section 13.12 synthesises all eleven content sections into the behavioural analysis and monitoring
    architecture and closes the chapter. It reviews the behavioural detection taxonomy and its four signal
    families, the session modelling and feature pipeline, the statistical baselines and time-series anomaly
    detection, the drift detection and model behavioural monitoring, the rate-based detection and smart rate
    limiting, the multi-turn context analysis, and the user behaviour profiling and graph-based detection
    capstone. It presents the behavioural monitoring architecture diagram, the behavioural detector reference
    card, and the sustainability checklist of the requirements for behavioural detection that does not rot --
    the contamination guard, the drift monitor, the risk-score decay, the retraining trigger. It covers the
    common behavioural detection mistakes as a consolidated reference, provides the Chapter 13 knowledge
    assessment quiz and the behavioural monitoring security checklist, and previews Chapter 14, Production
    Deployment, which takes the behavioural monitoring gateway to production: architecture patterns, latency,
    failure modes, observability, and cost optimisation at scale.

