deliverables:

  deliverable_1:
    title: 'Entity-Relationship Graph Builder'
    filename: 'entity_graph_builder.py'
    description: 'Constructs the entity-relationship graph from resolved entities and their linking attributes, drawing weighted edges from shared infrastructure, behavioural similarity, and synchronised timing while resisting coincidental sharing. Implements the graph construction from Section 13.11 Part 2.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # entity_graph_builder.py
      # Section 13.11: Entity-Relationship Graph Builder
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from collections import defaultdict
      from dataclasses import dataclass, field
      from itertools import combinations
      from typing import Dict, List, Set, Tuple


      @dataclass
      class EntityNode:
          entity_id: str
          source_ip: str
          credential_family: str
          fingerprint_bucket: str
          creation_cohort: str
          active_window: Tuple[int, int]  # coarse active hours


      @dataclass
      class Edge:
          a: str
          b: str
          weight: float
          types: List[str]


      class EntityGraph:
          def __init__(self) -> None:
              self.edges: Dict[Tuple[str, str], Edge] = {}

          def _key(self, a: str, b: str) -> Tuple[str, str]:
              return (a, b) if a < b else (b, a)

          def add_edge(self, a: str, b: str, weight: float, edge_type: str) -> None:
              key = self._key(a, b)
              if key in self.edges:
                  self.edges[key].weight += weight
                  if edge_type not in self.edges[key].types:
                      self.edges[key].types.append(edge_type)
              else:
                  self.edges[key] = Edge(key[0], key[1], weight, [edge_type])

          def neighbours(self, entity: str) -> Set[str]:
              out = set()
              for (a, b) in self.edges:
                  if a == entity:
                      out.add(b)
                  elif b == entity:
                      out.add(a)
              return out


      def build_graph(nodes: List[EntityNode], min_edge_weight: float = 1.5) -> EntityGraph:
          g = EntityGraph()
          # Group by each shared attribute; only rare-enough groups produce edges
          for attr in ('source_ip', 'credential_family', 'fingerprint_bucket', 'creation_cohort'):
              groups: Dict[str, List[str]] = defaultdict(list)
              for n in nodes:
                  groups[getattr(n, attr)].append(n.entity_id)
              for value, members in groups.items():
                  # A huge shared group is likely coincidental (shared NAT/SDK) -> low weight
                  size = len(members)
                  weight = 1.0 if size <= 8 else 0.3
                  for a, b in combinations(members, 2):
                      g.add_edge(a, b, weight, attr)

          # Prune edges below the corroboration threshold (need multiple/strong links)
          pruned = EntityGraph()
          for key, e in g.edges.items():
              if e.weight >= min_edge_weight:
                  pruned.edges[key] = e
          return pruned


      if __name__ == '__main__':
          # A coordinated cluster: 4 accounts sharing source, cred, cohort, fingerprint
          cluster = [
              EntityNode(f'bot_{i}', '203.0.113.20', 'famX', 'fp_bot', 'cohort_jan', (2, 5))
              for i in range(4)
          ]
          # Legitimate accounts sharing only a common NAT (coincidental)
          legit = [
              EntityNode(f'user_{i}', '198.51.100.1', f'fam_{i}', f'fp_{i}', f'cohort_{i}', (9, 18))
              for i in range(6)
          ]
          g = build_graph(cluster + legit)
          print(f'Edges retained after pruning: {len(g.edges)}')
          for e in g.edges.values():
              print(f'  {e.a} -- {e.b}  weight={e.weight:.1f}  via {e.types}')
          print('The bot cluster forms strong multi-attribute edges; the legit accounts')
          print('sharing only a NAT do not survive the corroboration threshold.')

  deliverable_2:
    title: 'Graph Anomaly Detector'
    filename: 'graph_anomaly_detector.py'
    description: 'Detects coordinated networks through community detection and structural analysis, flagging dense clusters that also exhibit behavioural coordination, separating coordinated abuse from a legitimate organisation that merely shares infrastructure. Implements the graph anomaly detection from Section 13.11 Part 3.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; a simple connected-component plus density analysis stands in for full community detection'
    code: |
      # graph_anomaly_detector.py
      # Section 13.11: Graph Anomaly Detector (Coordinated Network)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from collections import defaultdict
      from dataclasses import dataclass
      from typing import Dict, List, Set, Tuple


      @dataclass
      class Community:
          members: Set[str]
          density: float
          behavioural_coordination: float
          coordinated_abuse: bool


      def _components(edges: List[Tuple[str, str]], nodes: Set[str]) -> List[Set[str]]:
          adj: Dict[str, Set[str]] = defaultdict(set)
          for a, b in edges:
              adj[a].add(b)
              adj[b].add(a)
          seen: Set[str] = set()
          comps = []
          for n in nodes:
              if n in seen:
                  continue
              stack = [n]
              comp = set()
              while stack:
                  x = stack.pop()
                  if x in seen:
                      continue
                  seen.add(x)
                  comp.add(x)
                  stack.extend(adj[x] - seen)
              comps.append(comp)
          return comps


      def _density(members: Set[str], edges: List[Tuple[str, str]]) -> float:
          k = len(members)
          if k < 2:
              return 0.0
          internal = sum(1 for a, b in edges if a in members and b in members)
          possible = k * (k - 1) / 2
          return internal / possible


      def detect_communities(
          edges: List[Tuple[str, str]],
          nodes: Set[str],
          behavioural_coordination: Dict[frozenset, float],
          density_threshold: float = 0.6,
          coordination_threshold: float = 0.5,
      ) -> List[Community]:
          out = []
          for comp in _components(edges, nodes):
              if len(comp) < 3:
                  continue
              d = _density(comp, edges)
              coord = behavioural_coordination.get(frozenset(comp), 0.0)
              abuse = d >= density_threshold and coord >= coordination_threshold
              out.append(Community(comp, round(d, 3), round(coord, 3), abuse))
          return out


      if __name__ == '__main__':
          # Coordinated bot cluster: fully connected, high behavioural coordination
          bot_edges = [('b1', 'b2'), ('b1', 'b3'), ('b1', 'b4'), ('b2', 'b3'), ('b2', 'b4'), ('b3', 'b4')]
          # Legit org: connected but low behavioural coordination (diverse use)
          org_edges = [('o1', 'o2'), ('o2', 'o3'), ('o1', 'o3')]
          edges = bot_edges + org_edges
          nodes = {'b1', 'b2', 'b3', 'b4', 'o1', 'o2', 'o3'}
          coordination = {
              frozenset({'b1', 'b2', 'b3', 'b4'}): 0.9,   # synchronised, similar fingerprints
              frozenset({'o1', 'o2', 'o3'}): 0.2,         # diverse legitimate use
          }
          for c in detect_communities(edges, nodes, coordination):
              tag = 'COORDINATED ABUSE' if c.coordinated_abuse else 'benign cluster'
              print(f'{sorted(c.members)}: density={c.density}, coordination={c.behavioural_coordination} -> {tag}')
          print('The dense, behaviourally-coordinated bot cluster is flagged; the legit')
          print('org cluster, dense but behaviourally diverse, is not.')

  deliverable_3:
    title: 'Sybil and Bot Network Detector'
    filename: 'sybil_network_detector.py'
    description: 'Detects Sybil and bot networks through graph structure: mass-created cohorts forming structurally-isolated dense clusters, and behaviourally-similar time-synchronised account groups, independent of individual account behaviour. Implements the Sybil and bot detection from Section 13.11 Part 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # sybil_network_detector.py
      # Section 13.11: Sybil and Bot Network Detector
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Set


      @dataclass
      class AccountCohort:
          members: Set[str]
          creation_window_hours: float    # how tightly clustered creation times are
          internal_density: float         # connectivity within the cohort
          external_connections: int       # edges to the legitimate graph
          fingerprint_similarity: float   # how alike the members behave
          timing_synchrony: float         # how synchronised their activity is


      @dataclass
      class NetworkVerdict:
          kind: str
          flagged: bool
          detail: str


      def detect_sybil(c: AccountCohort) -> NetworkVerdict:
          # Sybil: mass-created, dense, structurally isolated from the legit graph
          flagged = (
              c.creation_window_hours <= 2.0
              and c.internal_density >= 0.6
              and c.external_connections <= 1
              and len(c.members) >= 4
          )
          return NetworkVerdict(
              'Sybil', flagged,
              f'created in {c.creation_window_hours}h, density {c.internal_density}, '
              f'external links {c.external_connections}',
          )


      def detect_bot_network(c: AccountCohort) -> NetworkVerdict:
          # Bot network: behaviourally similar and time-synchronised
          flagged = (
              c.fingerprint_similarity >= 0.8
              and c.timing_synchrony >= 0.7
              and len(c.members) >= 4
          )
          return NetworkVerdict(
              'Bot network', flagged,
              f'fingerprint similarity {c.fingerprint_similarity}, '
              f'timing synchrony {c.timing_synchrony}',
          )


      if __name__ == '__main__':
          sybil_cohort = AccountCohort(
              members={f'syb_{i}' for i in range(6)},
              creation_window_hours=0.5, internal_density=0.8,
              external_connections=0, fingerprint_similarity=0.85, timing_synchrony=0.9,
          )
          legit_cohort = AccountCohort(
              members={f'org_{i}' for i in range(6)},
              creation_window_hours=720.0, internal_density=0.5,
              external_connections=12, fingerprint_similarity=0.3, timing_synchrony=0.2,
          )
          for name, cohort in (('Suspected Sybil/bot', sybil_cohort), ('Legitimate org', legit_cohort)):
              print(f'\n{name}:')
              for verdict in (detect_sybil(cohort), detect_bot_network(cohort)):
                  flag = 'FLAGGED' if verdict.flagged else 'clear'
                  print(f'  {verdict.kind:<12} {flag}: {verdict.detail}')

  deliverable_4:
    title: 'Behavioural Monitoring Gateway'
    filename: 'behavioural_monitoring_gateway.py'
    description: 'Integrates the behavioural layer into the Chapter 12 seven-track gateway as the fourth detection layer, combining the inline per-request scores with the precomputed behavioural summaries (entity risk, rate-limit state, session threat, canary check) read on the request path. Implements the gateway integration from Section 13.11 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; the per-request ensemble and the behavioural summaries are injected as the precomputed inputs the hot path reads'
    code: |
      # behavioural_monitoring_gateway.py
      # Section 13.11: Behavioural Monitoring Gateway (Capstone Integration)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from enum import Enum
      from typing import Optional


      class Verdict(Enum):
          ALLOW = 'allow'
          FLAG = 'flag'
          THROTTLE = 'throttle'
          CHALLENGE = 'challenge'
          BLOCK = 'block'


      @dataclass
      class PerRequestScores:
          # Inline Chapter 12 ensemble output
          ensemble_risk: float    # in [0, 1]


      @dataclass
      class BehaviouralSummaries:
          # All precomputed off the hot path, read inline (13.01 coupling)
          entity_risk: float          # 13.10
          rate_limit_stage: str       # 13.08: normal/throttle/challenge/block
          session_threat: float       # 13.09 accumulator (normalised)
          canary_hit: bool            # 13.06 inline canary check
          graph_risk_adjustment: float  # 13.11 batch finding, written back


      @dataclass
      class BehaviouralGateway:
          flag_threshold: float = 0.5
          block_threshold: float = 0.85

          def decide(self, scores: PerRequestScores, beh: BehaviouralSummaries) -> Verdict:
              # Inline canary hit is a near-certain injection success -> block
              if beh.canary_hit:
                  return Verdict.BLOCK
              # Rate-limit stage maps directly to enforcement
              if beh.rate_limit_stage == 'block':
                  return Verdict.BLOCK
              if beh.rate_limit_stage == 'challenge':
                  return Verdict.CHALLENGE
              if beh.rate_limit_stage == 'throttle':
                  return Verdict.THROTTLE

              # Combine per-request risk with behavioural context
              combined = (
                  0.4 * scores.ensemble_risk
                  + 0.3 * beh.entity_risk
                  + 0.2 * beh.session_threat
                  + 0.1 * beh.graph_risk_adjustment
              )
              if combined >= self.block_threshold:
                  return Verdict.BLOCK
              if combined >= self.flag_threshold:
                  return Verdict.FLAG
              return Verdict.ALLOW


      if __name__ == '__main__':
          gw = BehaviouralGateway()

          # Same per-request score, very different behavioural context
          req = PerRequestScores(ensemble_risk=0.3)

          clean_ctx = BehaviouralSummaries(0.05, 'normal', 0.1, False, 0.0)
          suspect_ctx = BehaviouralSummaries(0.8, 'normal', 0.7, False, 0.6)
          canary_ctx = BehaviouralSummaries(0.05, 'normal', 0.1, True, 0.0)

          print('Clean entity, ensemble 0.3   ->', gw.decide(req, clean_ctx).value)
          print('Suspect entity, ensemble 0.3 ->', gw.decide(req, suspect_ctx).value)
          print('Canary hit, ensemble 0.3     ->', gw.decide(req, canary_ctx).value)
          print('The identical per-request score yields different verdicts because the')
          print('behavioural context -- entity risk, session threat, graph, canary -- is read inline.')

  deliverable_5:
    title: 'Behavioural Gateway Architecture'
    filename: 'behavioural_gateway_architecture.py'
    description: 'Specifies the inline-versus-batch placement of each behavioural detector relative to the request path per the state-latency coupling, validating that no large-state detector is placed inline. Implements the architecture from Section 13.11 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # behavioural_gateway_architecture.py
      # Section 13.11: Behavioural Gateway Architecture (Tier Placement)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class DetectorPlacement:
          detector: str
          section: str
          tier: str          # 'inline', 'near_real_time', 'batch'
          state_size: str    # 'none', 'small', 'large'


      PLACEMENTS: List[DetectorPlacement] = [
          DetectorPlacement('Per-request ensemble', '12.17', 'inline', 'none'),
          DetectorPlacement('Canary check', '13.06', 'inline', 'small'),
          DetectorPlacement('Entity risk read', '13.10', 'inline', 'none'),
          DetectorPlacement('Rate-limit state read', '13.08', 'inline', 'none'),
          DetectorPlacement('Session scorer', '13.09', 'near_real_time', 'small'),
          DetectorPlacement('Baseline/time-series', '13.03/13.04', 'near_real_time', 'small'),
          DetectorPlacement('Output distribution monitor', '13.06', 'near_real_time', 'small'),
          DetectorPlacement('Entity profiler', '13.10', 'near_real_time', 'large'),
          DetectorPlacement('Drift monitor', '13.05', 'batch', 'large'),
          DetectorPlacement('Graph detector', '13.11', 'batch', 'large'),
      ]


      def validate_placements(placements: List[DetectorPlacement]) -> List[str]:
          # Rule: a large-state detector must NOT be inline (13.01 coupling)
          violations = []
          for p in placements:
              if p.tier == 'inline' and p.state_size == 'large':
                  violations.append(f'{p.detector} ({p.section}) is inline with large state -- violates coupling')
          return violations


      if __name__ == '__main__':
          print('Behavioural detector placement:')
          for tier in ('inline', 'near_real_time', 'batch'):
              print(f'\n[{tier}]')
              for p in PLACEMENTS:
                  if p.tier == tier:
                      print(f'  {p.detector:<28} {p.section:<12} state={p.state_size}')
          violations = validate_placements(PLACEMENTS)
          print('\nPlacement violations:', violations if violations else 'none -- architecture is sound')
          print('No large-state detector is inline; expensive analysis runs off the path')
          print('and exposes cheap summaries the hot path reads.')

