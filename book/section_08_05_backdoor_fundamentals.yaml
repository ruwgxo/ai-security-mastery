common_mistakes:

  mistake_1_aggregate_metric_as_sole_backdoor_defence:
    description: 'Relying on aggregate clean-accuracy monitoring as a defence against backdoors'
    why_it_happens: |
      Aggregate accuracy monitoring is the universal ML evaluation practice. Version-
      to-version accuracy regression is standard in production. Teams assume that
      if accuracy is stable, the model is clean. For every attack in Sections 8.3
      and 8.4 this is partially true. For backdoors specifically it is structurally
      false: the clean accuracy is preserved by design, and the backdoor mode is
      never exercised during clean-accuracy evaluation.
    consequence: 'Complete defensive blindness against the dominant training-time attack class. The model passes every gate the programme runs; the backdoor activates freely in production; detection occurs only via incident, if at all.'
    correct_approach: 'Treat aggregate-metric monitoring as a defence against availability attacks only. For backdoor coverage, require feature-space detection primitives (Section 8.12) and gate model releases on their results. The operational gap between aggregate-only monitoring and proper backdoor coverage is Section 8.15''s auditing pipeline.'

  mistake_2_assuming_small_budget_means_small_risk:
    description: 'Dismissing backdoor threats because 1% contamination seems implausibly small to achieve'
    why_it_happens: |
      Supply-chain security intuition suggests that contaminating 1% of a dataset
      requires substantial access, and therefore rare attacker capability. This
      intuition is correct for private datasets and wrong for public or semi-curated
      ones. Adversaries at rung 2 (dataset contributor) routinely achieve 0.1%-1%
      contamination in community datasets, crowdsourced annotation, and open-access
      repositories. The budget is not the barrier practitioners imagine.
    consequence: 'Threat modelling that dismisses backdoor risk for fine-tuning pipelines consuming community data. Exposed deployments treated as protected. The realistic adversary budget matches the attack success threshold precisely, because attackers optimise for exactly the minimum viable budget.'
    correct_approach: 'Treat 0.1%-1% contamination as assumed-achievable for any public or semi-curated dataset. Threat modelling should start from adversary capability = 1% budget and work down; defences should hold against attacks at this budget.'

  mistake_3_testing_only_dirty_label:
    description: 'Benchmarking detection primitives only against dirty-label BadNets and concluding backdoor coverage is adequate'
    why_it_happens: |
      Dirty-label BadNets is the oldest, most-studied, and most reproducible backdoor
      attack. Research results exist for essentially every detection primitive against
      it. Teams benchmark against what is easily benchmarkable, which is dirty-label.
      Clean-label backdoors are harder to reproduce and less well-documented in
      defensive research.
    consequence: 'Detection primitives that catch dirty-label at 90%+ TPR and miss clean-label entirely, while being reported as providing 90%+ backdoor coverage. The most dangerous variant (clean-label, evades label-consistency entirely) has essentially no detection coverage.'
    correct_approach: 'Benchmark detection against both dirty-label and clean-label variants at realistic budgets. Section 8.12 primitives are specifically designed for clean-label coverage; their dirty-label performance is incidental. The benchmark question is clean-label TPR, not dirty-label TPR.'

  mistake_4_ignoring_persistence_through_fine_tuning:
    description: 'Assuming that downstream fine-tuning cleanses backdoors in pre-trained models'
    why_it_happens: |
      The intuition is reasonable: if the model is updated during fine-tuning, any
      pre-existing backdoor should be eroded. For full retraining on large clean
      datasets, the intuition is correct. For the regimes actually used in modern
      LLM development -- LoRA fine-tuning with frozen base weights, light task-
      specific fine-tuning, linear probing -- the intuition is wrong. These regimes
      preserve the base-weight backdoor at near-total persistence.
    consequence: 'Fine-tuners consuming pre-trained foundation models assume inherited-backdoor risk is eliminated by their fine-tuning process. The risk is largely preserved. Production deployments carry foundation-model backdoors that the fine-tuning was incorrectly assumed to remove.'
    correct_approach: 'Require backdoor auditing of pre-trained models at adoption time, regardless of planned fine-tuning regime. Section 8.15''s pipeline includes this gate. Treat LoRA-based fine-tuning specifically as backdoor-preserving, and audit base models accordingly.'

  mistake_5_narrow_trigger_definition:
    description: 'Designing detection defences against specific trigger types (patches) and missing other trigger families'
    why_it_happens: |
      BadNets uses pixel patches. Patches are the canonical trigger. Detection
      primitives designed against patches (trigger reverse-engineering specialised
      for patch shapes, activation analysis focused on local receptive fields) work
      well on patches. The primitives may fail on non-patch triggers: pixel patterns,
      blended triggers, frequency-domain triggers, text phrases, instruction-tuning
      triggers.
    consequence: 'Defensive coverage that holds against canonical triggers and fails against the trigger variants Section 8.6 introduces. Detection reports high coverage; the reported coverage applies to a narrow trigger class.'
    correct_approach: 'Design detection primitives to cover trigger families generically, not specific trigger designs. Section 8.12 primitives (spectral signatures, activation clustering, meta-classifiers) operate on learned representations rather than trigger geometry, providing generic coverage. Benchmark against diverse trigger families, not just patches.'

section_summary:
  compact: |
    Backdoor attacks are the dominant training-time threat. A backdoor is a trained-in
    conditional behaviour: the model acts normally on trigger-free inputs (preserving
    clean accuracy by design) and produces the attacker-chosen output on trigger-bearing
    inputs (at attack success rates approaching 100%). BadNets (Gu et al. 2017) is the
    canonical instance, demonstrating 100% ASR at 1% contamination with < 1 percentage
    point clean accuracy drop on MNIST and CIFAR-10. The two principal variants --
    dirty-label (labels flipped to target class on triggered samples) and clean-label
    (trigger applied to samples already in the target class) -- differ in budget
    requirement and detection profile but share the structural property that aggregate-
    metric evaluation is structurally blind to them. The four standard evaluation
    metrics (clean accuracy, attack success rate, clean accuracy drop, false activation
    rate) define the operational vocabulary used throughout Sections 8.12-8.15.
    Contamination budgets are order-of-magnitude below label flipping: 0.1%-1% for
    dirty-label, 1%-5% for clean-label backdoors. Persistence through fine-tuning
    is variable but typically high for the regimes common in modern LLM development
    (LoRA, light fine-tuning, linear probing), making foundation-model inheritance
    a primary threat vector. Every dominant property that makes Q2 attacks the main
    threat concentration (aggregate invisibility, targeted precision, budget
    efficiency, persistence) reaches its maximum in the backdoor attack family,
    which is why Sections 8.12-8.15 are overwhelmingly oriented toward backdoor
    detection and defence.

  key_takeaways:
    - 'A backdoor is trained-in conditional behaviour -- clean mode on trigger-free inputs, attacker-chosen mode on triggered inputs'
    - 'BadNets demonstrates 100% ASR at 1% contamination with essentially no clean accuracy drop -- aggregate evaluation is structurally blind'
    - 'Dirty-label backdoors are easier to construct and partially detectable by label consistency; clean-label backdoors are harder to construct but evade label-space defences entirely'
    - 'Standard metric system (CA, ASR, CAD, FAR) is the operational vocabulary for all Chapter 8 defences'
    - 'Budget thresholds are 0.1%-1% for dirty-label, 1%-5% for clean-label -- achievable for any rung 2+ adversary on public/community datasets'
    - 'Persistence through LoRA and light fine-tuning is essentially total -- foundation model backdoors propagate to fine-tuned derivatives'
    - 'Backdoors are the economically dominant training-time attack; Sections 8.12-8.15 detection and defence are primarily calibrated against this threat'

preview_section_06:
  title: 'Advanced Backdoor Techniques: Invisible Triggers and Dynamic Triggers'
  connection: |
    Section 8.5 established the BadNets framework and the canonical patch trigger.
    Section 8.6 extends the framework along the trigger design axis: invisible
    triggers that pass human review (steganographic perturbations, reflection
    backdoors, DCT-domain triggers), dynamic triggers that vary per input to defeat
    static detection, and composite triggers that require feature combinations to
    activate. Each variant is a response to a specific defensive primitive --
    invisible triggers defeat human annotation defence, dynamic triggers defeat
    Neural Cleanse trigger reverse-engineering, composite triggers defeat activation
    clustering on individual samples. The detectability-effectiveness frontier
    moves further inward; Section 8.12 detection primitives must evolve to keep
    pace. Section 8.6 maps the frontier shift.

