section_overview:
  title: 'Backdoor Attacks: Trigger-Based Behaviour and BadNets'
  one_line_summary: |
    A backdoor is a trained-in conditional behaviour: the model acts normally on
    inputs without the trigger and acts as the attacker chose on inputs carrying
    the trigger. The clean accuracy is preserved by design. Standard evaluation
    passes. The attack activates only on attacker-chosen inputs at attacker-chosen
    rates. BadNets (Gu et al. 2017) is the canonical instance; 1% contamination
    with 100% attack success rate is typical; and the clean-test accuracy delta
    from a clean baseline is often indistinguishable from noise.

  why_this_section_exists: |
    Backdoors are the worst case of Q2 targeted integrity. Every property that
    makes Q2 attacks dominant in the Section 8.2 threat analysis -- aggregate-
    metric invisibility, high per-sample efficiency, targeted effect under
    adversary control -- reaches its maximum in the backdoor attack family.
    The attack is invisible on every aggregate benchmark the defender runs.
    The attack success rate on triggered inputs is near-perfect. The contamination
    budget required is very small. The attack persists in the model weights
    indefinitely. No single property of the backdoor attack family is novel --
    clean-label optimisation, feature-space manipulation, targeted effect all
    appeared in Section 8.4 -- but their combination in the backdoor framework
    produces an attack whose defensive architecture is the reason this chapter
    is as long as it is.

    Section 8.5 builds the canonical backdoor attack, measures its properties,
    and establishes the terminology that Sections 8.6 through 8.15 all inherit.
    Trigger, target label, attack success rate, clean accuracy delta, contamination
    budget, trigger stability -- these terms are used throughout the chapter
    and the operational literature with specific meanings, and this section
    fixes those meanings against a concrete implementation. A student who has
    not implemented BadNets and measured its attack success rate against a
    clean baseline cannot reason meaningfully about backdoor detection; the
    terminology has no referent without the implementation.

    This section also establishes the benchmark structure used throughout the
    rest of Chapter 8. Backdoor attacks have standardised evaluation metrics
    (clean accuracy, attack success rate, clean accuracy drop, attack success
    rate on non-triggered inputs for false-positive measurement) that appear
    in every detection paper. Section 8.12's detection primitives report their
    coverage in these metrics. Section 8.13's defensive training reports its
    effect in these metrics. Section 8.15's pipeline gates on thresholds in
    these metrics. The metric system introduced here is the scaffolding for
    the quantitative discussion of every subsequent defence.

  position_in_chapter: |
    Section 8.5 is the deepest attack section in Chapter 8. Every defensive
    section that follows (8.12, 8.13, 8.15) is explicitly designed against
    the backdoor threat model established here. Section 8.6 extends this
    section to advanced backdoor variants (invisible triggers, dynamic triggers,
    composite triggers); Section 8.7 extends it to LLM instruction-tuning
    backdoors; Section 8.9 extends it to LoRA-adapter-delivered backdoors.
    The BadNets framework from this section is the substrate on which all
    of those extensions are built.

    If Section 8.4 was the hinge that forced defensive architecture from
    label-space to feature-space, Section 8.5 is the attack that concretises
    the full threat model. Every defensive investment justification in Sections
    8.12-8.15 traces back to a property demonstrated here.

