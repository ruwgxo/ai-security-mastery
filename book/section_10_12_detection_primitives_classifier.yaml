prose_content:

  part_1:
    title: 'Adversarial Fragility: The Consistency Check Foundation'
    body: |
      The consistency check rests on a structural property of adversarial examples that Section
      10.4 introduced: adversarial examples are often near the decision boundary. The adversary''s
      goal is to find a perturbed input that is just barely on the wrong side of the boundary -- the
      minimum perturbation that achieves misclassification. That input is, by construction, close to
      the boundary. And points close to the boundary are fragile: a small random push in any
      direction may move them back to the correct side.

      FGSM adversarial examples are the most fragile: a single gradient-sign step places the example
      at the boundary but does not push it deep into the adversarial region. Random noise of
      magnitude sigma ~ epsilon/4 is often sufficient to restore correct classification. PGD examples
      are less fragile: iterative steps push the example deeper into the adversarial region and
      farther from the boundary. Boundary Attack examples are fragile by construction -- the
      algorithm explicitly walks along the boundary surface, keeping the adversarial example as close
      to the boundary as the oracle allows. NES examples have intermediate fragility.

      Natural images are robust by contrast. A natural image of a cat classified with 95% confidence
      remains classified as a cat under random noise of sigma=0.01 or sigma=0.02. The classification
      is determined by robust, high-level features that are not destroyed by small additive noise.
      The prediction may shift slightly in probability but the argmax class remains the same.

      The consistency check converts this robustness asymmetry into a detection signal: submit N
      randomly perturbed variants of the input, compute the fraction of variants that disagree with
      the original prediction, and flag the input if disagreement exceeds a threshold. High
      disagreement indicates boundary proximity -- adversarial fragility. Low disagreement indicates
      robustness -- natural input.

  part_2:
    title: 'Consistency Check Algorithm: Variants, Disagreement, and Calibration'
    body: |
      The consistency check algorithm for image inputs is:
      1. For i=1 to N: sample noise delta_i ~ Normal(0, sigma^2 * I) and compute
         x_i = clip(x + delta_i, 0, 1)
      2. For each variant x_i: compute the model prediction pred(x_i)
      3. Disagreement fraction: d(x) = (1/N) * sum_{i=1}^N [pred(x_i) != pred(x)]
      4. Detection decision: flag if d(x) > tau

      The two hyperparameters -- N and sigma -- trade detection power against compute cost and false
      positive rate. A larger N produces a more reliable estimate of the disagreement fraction but
      requires N additional model forward passes. A larger sigma produces stronger fragility detection
      (more likely to push adversarial examples across the boundary) but also increases false positive
      rate (more likely to perturb natural examples across boundaries they are near to).

      Typical configurations for image adversarial detection: N=20 to 50 variants, sigma=0.01 to
      0.03 (1-3% of the normalised pixel range). The sigma should be smaller than the adversarial
      epsilon to avoid destroying the adversarial perturbation entirely (which would produce the
      correct classification trivially) and large enough to test fragility meaningfully.

      Calibration follows the same procedure as Section 10.11 squeezer calibration: run on a
      held-out natural image set including hard borderline examples, set tau to achieve the target
      false positive rate. The consistency check has a higher latency cost than the squeezer because
      it requires N model forward passes (each as expensive as the primary inference) rather than N
      fast image transformations plus one model forward pass. Parallelise the N variant inferences;
      a thread pool dispatcher can run all N in parallel with the primary inference.

  part_3:
    title: 'Where Consistency Checking Fails: High-Kappa C&W and Targeted Examples'
    body: |
      The consistency check''s detection relies on boundary proximity. Attack families that
      deliberately place adversarial examples far from the boundary evade it.

      C&W with kappa=0 produces minimum-norm adversarial examples that sit right at the boundary --
      highly fragile, well-detected by consistency checking. C&W with kappa=20 or kappa=50
      explicitly requires the adversarial class to beat all other classes by a margin of kappa.
      This forces the adversarial example deep into the adversarial region, far from the boundary.
      Random perturbations of sigma=0.01 to 0.03 cannot overcome a kappa=20 margin; the adversarial
      example survives the N variants with consistent misclassification, and the consistency check
      does not fire.

      This is the fundamental coverage gap of consistency checking as a sole primitive. It can be
      quantified precisely: consistency check detection rate decreases monotonically with kappa for
      C&W. At kappa=0, detection is comparable to squeezer detection (~60-75%). At kappa=20,
      detection drops to 15-25%. At kappa=50, detection is near the false positive rate.

      Section 10.5 (cw_confidence_sweep.py) demonstrated this gap empirically. The implication for
      Track 7 is: consistency checking must be combined with squeezing (which detects the
      perturbation structure regardless of boundary distance) and the adversarial classifier (which
      learns high-kappa C&W input statistics during training). The three-primitive ensemble provides
      meaningful coverage even against high-kappa C&W: squeezing has moderate coverage (30-45%),
      adversarial classifier has trained-data coverage, and consistency catches the FGSM and
      boundary-proximate fraction. Together the ensemble achieves 50-65% against kappa=20 C&W,
      compared to 15-25% for consistency checking alone.

  part_4:
    title: 'Adversarial Detector Classifier: Learning Input Statistics'
    body: |
      The adversarial detector classifier takes a different approach from the squeezer and
      consistency checker. Instead of testing prediction stability, it asks a direct question about
      the input: does this input look adversarial based on its statistical properties?

      Adversarial examples have measurable statistical differences from natural images that are
      difficult to remove without sacrificing attack effectiveness. FGSM and PGD perturbations add
      high-frequency noise that increases the high-frequency energy of the image as measured by the
      Laplacian magnitude or the power spectral density. This high-frequency energy increase is
      detectable without running the primary model -- it is a property of the input itself. Adversarial
      examples also tend to have higher local texture variance in regions the model attends to,
      and their pixel value distributions have slightly different kurtosis from natural images.

      The adversarial detector is a binary classifier trained on these features. Feature extraction:
      compute high-frequency energy (Laplacian filter response), local texture variance (sliding
      window), global image statistics (mean, std, kurtosis). Classification: a small MLP or linear
      layer maps these features to {adversarial: 1, natural: 0}. Training data: balanced set of
      natural images and adversarial examples generated from FGSM, PGD, and C&W.

      The adversarial detector generalises across attack families that produce similar statistical
      signatures. FGSM and PGD both add high-frequency structured noise; a detector trained on FGSM
      often generalises to PGD (and vice versa). Boundary Attack examples have different statistics
      (they walk along the boundary from a different starting point) and may require separate training
      examples for good coverage. Novel attack families with fundamentally different perturbation
      statistics may not be covered by a detector trained on known attacks.

  part_5:
    title: 'Training the Adversarial Detector: Dataset Diversity and Generalisation'
    body: |
      A well-trained adversarial detector requires: balanced class distribution (equal numbers of
      natural and adversarial training examples), attack family diversity (FGSM, PGD at multiple
      epsilon values, C&W at kappa=0 and kappa=20, Boundary Attack), and held-out attack families
      for generalisation testing (train on three attack families, test on a fourth).

      The cross-attack generalisation test is the most important evaluation. For each held-out
      attack family A: train the detector on all other attack families, evaluate on A. If the
      detection rate drops below 50% (near random) on the held-out family, the detector has not
      learnt transferable adversarial statistics -- it has overfit to the specific perturbation
      patterns of the training attacks. This indicates the feature set needs to be expanded or
      more diverse training attacks are needed.

      For production deployment, the adversarial detector requires quarterly retraining with
      recently published attack families. The Section 10.10 incident analysis showed that
      adversarial attacks evolve; a detector trained in year N-1 may not catch attacks introduced
      in year N. The retraining pipeline should: (1) generate adversarial examples with recently
      published methods, (2) add to training set, (3) retrain and re-evaluate cross-attack
      generalisation, (4) deploy if generalisation meets the threshold. Section 10.15 adversarial
      training (for the primary model) and adversarial detector retraining address different surfaces
      and are complementary.

  part_6:
    title: 'Text Consistency Checking: Paraphrase Fragility and Back-Translation'
    body: |
      Random pixel perturbation is not applicable to text. The text analogue of the consistency
      check uses paraphrase variants: generate N different phrasings of the input that preserve
      semantic content, check whether the classification is stable across phrasings.

      TextFooler adversarial examples substitute specific synonyms chosen to fool the classifier.
      Those synonyms are a specific token choice among many semantically equivalent options. A
      paraphrase that uses different synonyms -- equally valid semantically but different tokens --
      may not fool the classifier. If paraphrasing restores the original classification, the text
      exhibited adversarial fragility: the adversarial property depended on specific token choices
      rather than on the semantic content.

      Back-translation implements paraphrase through machine translation: translate the text to an
      intermediate language (French, German) and back to English. The round-trip preserves semantic
      content but substitutes different words and phrases. In production, this requires access to
      a translation API; Section 10.9 llm_adversarial_detection.py used a word-order shuffle as a
      lightweight approximation.

      The text consistency check has a coverage gap that mirrors the image check''s kappa gap:
      universal adversarial triggers may survive back-translation if the trigger tokens are preserved
      or reconstructed by the translation model. Section 10.9 Universal Trigger Search generates
      triggers with gibberish tokens that may or may not survive translation. For triggers that are
      specific meaningful words, back-translation typically reconstructs equivalent words and the
      trigger survives. Unicode anomaly detection (text_canonicaliser.py) is the better primitive
      for character-level attacks; text consistency checking is the better primitive for word-level
      semantic substitution attacks.

  part_7:
    title: 'The Three-Primitive Ensemble and Empirical Detection Rates'
    body: |
      The Track 7 detection primitive library is now complete: squeezer ensemble (Section 10.11),
      consistency checker, and adversarial detector classifier (Section 10.12). Section 10.13
      wires all three into the production gateway with the two-stage (pre-inference and
      post-inference) architecture.

      The three primitives have complementary coverage. Feature squeezing detects perturbation
      structure in the input regardless of boundary distance, catching FGSM and PGD at high rates
      (70-90%) and C&W at moderate rates (30-55%). Consistency checking detects boundary proximity,
      catching FGSM and Boundary Attack at high rates (70-85%) and C&W kappa=0 at moderate rates
      (60-75%) but C&W kappa=20 at low rates (15-25%). The adversarial detector classifier catches
      the statistical signatures shared across trained attack families at moderate rates (55-75%)
      and provides the only coverage against attack families that neither squeezing nor consistency
      checking catch at high rates.

      The ensemble detection score combines all three: score = w_1 * squeezer_score +
      w_2 * consistency_score + w_3 * detector_score, with weights calibrated to maximise detection
      rate at the target false positive rate. The calibrated ensemble achieves 85-92% detection
      rate against FGSM and PGD, 50-65% against C&W kappa=20, and 75-85% against Boundary Attack
      at a 5% false positive rate. These numbers decline against adaptive adversaries who know the
      ensemble configuration -- by 15-30 percentage points depending on the attack family.
      Randomised smoothing (Section 10.14) provides the formal robustness guarantee that the
      detection ensemble cannot.

