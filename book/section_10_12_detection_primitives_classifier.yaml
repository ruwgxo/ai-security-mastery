    - 'Describe the consistency check algorithm: N random variants, per-variant prediction, disagreement fraction as detection signal'
    - 'Explain why high-kappa C&W examples evade consistency checking and state what this means for the Track 7 ensemble design'
    - 'Describe the adversarial detector classifier: binary classifier on statistical features that distinguish adversarial from natural inputs'
    - 'Explain the cross-attack generalisation problem: a detector trained on FGSM and PGD may not generalise to novel attack families'
    - 'Describe text consistency checking via paraphrase and back-translation and explain why it covers TextFooler but not universal triggers'

  skills:
    - 'Implement the consistency checker with configurable N variants, noise sigma, and disagreement threshold'
    - 'Extract adversarial detection features (high-frequency energy, local variance, Laplacian magnitude) and train a binary adversarial detector classifier'
    - 'Implement text consistency checking via multiple paraphrase variants and classification stability measurement'
    - 'Build the three-primitive Track 7 ensemble combining squeezer, consistency, and adversarial classifier scores with calibrated weights'
    - 'Run the empirical detection rate comparison harness across attack families and identify primitive coverage gaps'

  security_mindset:
    - 'Recognise that consistency checking and squeezing are complementary, not redundant: squeezing detects perturbation structure; consistency checking detects boundary proximity; the adversarial classifier detects input statistics'
    - 'Understand that no individual primitive achieves complete coverage -- the honest Track 7 deployment states coverage per attack family across the ensemble, not a single coverage number'
    - 'Appreciate that the adversarial detector classifier requires active maintenance: retrain quarterly with new attack families to prevent degradation against novel attacks'

