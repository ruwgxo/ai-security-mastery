section_overview:
  one_line_summary: 'Consistency checking exploits adversarial fragility -- adversarial examples flip classification under small random perturbation while natural inputs do not; the adversarial detector classifier learns to recognise adversarial input statistics directly.'
  why_this_section_exists: |
    Section 10.11 built the input-side Track 7 primitives: feature squeezers that detect
    adversarial perturbations by comparing predictions before and after input transformation.
    Section 10.12 builds the two post-inference primitives that cover the attack families
    squeezers miss. Consistency checking catches adversarial examples near the decision boundary
    by testing prediction stability under random perturbation -- FGSM and Boundary Attack examples
    are highly fragile and fail this test. The adversarial detector classifier learns statistical
    differences between adversarial and natural inputs that are difficult to remove without
    sacrificing attack effectiveness. Combined with the Section 10.11 squeezer ensemble, the three
    primitives form the complete Track 7 detection layer that Section 10.13 deploys.
  position_in_chapter: |
    Section 10.12 completes the Track 7 detection primitive library. It covers the post-inference
    stage: primitives that operate after the main model has run and use the model''s output or
    statistical features of the input to detect adversarial perturbations. Section 10.13 assembles
    all three primitives (squeezer + consistency + adversarial classifier) into the production
    gateway.

learning_objectives:

