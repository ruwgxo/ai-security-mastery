    rows:
      - ['Exact duplicate of known attack', '0.00-0.05', 'Near-perfect match -- always flag', 'Near-duplicate detector threshold (Section 12.07 deliverable_4)']
      - ['Close paraphrase (same attack, different words)', '0.05-0.20', 'High semantic similarity -- flag as likely attack', '0.20 for DAN family; 0.15 for diffuse families']
