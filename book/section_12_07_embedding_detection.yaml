document_info:
  title: 'Embedding-Based Detection: Sentence Transformers and Semantic Similarity'
  chapter: 12
  section: 7
  section_code: '1207'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  created: '2026-06-06'
  estimated_pages: 6
  estimated_reading_time: '45-55 minutes'

section_overview:
  one_line_summary: 'Embedding-based detection closes the paraphrase evasion gap: an adversary who rewrites the payload to avoid every keyword and structural marker cannot change the semantic distance from the attack cluster centroid in 768-dimensional space.'
  why_this_section_exists: |
    The Random Forest and XGBoost classifiers from Section 12.05 rely on a feature set
    that includes keyword frequency, structural markers, and embedding distances. The
    keyword and structural features are the most precise signals for known attack patterns.
    They are also the most evasible: an adversary who has observed which requests get
    flagged can systematically rewrite payloads to avoid every keyword in INSTRUCTION_KEYWORDS,
    remove role boundary markers, reduce code block density, and still deliver an
    equivalent attack in different words.

    This is the paraphrase evasion problem. It is not theoretical -- red team exercises
    routinely produce jailbreak payloads that achieve the same effect as known documented
    attacks while sharing no tokens with the training set examples. Surface-level feature
    engineering, no matter how carefully designed, has a vocabulary ceiling: it can only
    detect what it was designed to detect.

    Embedding-based detection attacks this problem at the semantic level. A Sentence
    Transformer model maps any input text to a point in a 768-dimensional embedding
    space where semantically similar texts are geometrically close regardless of their
    surface token overlap. A paraphrase of a known jailbreak -- different words, same
    intent -- maps to a point near the original jailbreak in this space. The cosine
    distance from the nearest attack cluster centroid is the detection signal, and it
    is invariant to surface rewriting that preserves semantic intent.

    Section 12.07 builds the embedding similarity detector, constructs the attack cluster
    library that all four Chapter 12 detectors share, and establishes the UMAP
    visualisation pipeline that lets the detection engineer audit whether the embedding
    space separates attack and benign traffic before committing to a threshold.
  position_in_chapter: |
    Section 12.07 is the fourth ML detector in Chapter 12. It runs in parallel with the
    Isolation Forest, the supervised classifiers, and the GRU in the Section 12.15
    ensemble. The centroid_cosine_dist_min feature it produces was already designed into
    the Section 12.02 feature pipeline; this section implements the full centroid library
    and inference chain that makes that feature meaningful.

learning_objectives:

  knowledge:
    - 'Explain the Sentence Transformer training procedure -- siamese network with contrastive loss -- and why it produces a representation space where semantic similarity corresponds to geometric proximity'
    - 'Describe how cosine distance from an attack cluster centroid is computed and state why cosine distance is preferred over Euclidean distance for high-dimensional embedding comparison'
    - 'Explain the difference between k-means and HDBSCAN for attack cluster construction and state when each is appropriate'
    - 'Describe what a UMAP projection reveals about embedding space separability and state the two conditions under which embedding detection will not work for a given threat class'
    - 'Explain out-of-distribution detection using embeddings and state why a request that is far from all known clusters (attack and benign) warrants a different response than one that is near an attack cluster'
    - 'State the latency difference between all-MiniLM-L6 and MPNet and explain why MiniLM-L6 via ONNX Runtime is the correct default for the 50ms gateway budget'

  skills:
    - 'Embed a labelled attack dataset with MiniLM-L6 via ONNX Runtime and cluster the embeddings into attack families using HDBSCAN'
    - 'Build a centroid library from cluster assignments and compute cosine distance from any input embedding to the nearest centroid'
    - 'Calibrate the cosine distance threshold against held-out attack and benign examples at a target false positive rate'
    - 'Produce a UMAP projection of the attack cluster library and benign traffic embeddings and interpret the separation quality'
    - 'Benchmark embedding inference latency across MiniLM-L6, MPNet, and DistilBERT and select the model that fits the gateway latency budget'

  security_mindset:
    - 'Understand that embedding detection is not a silver bullet: it catches semantic paraphrases of known attacks but cannot detect novel attack families that have no existing cluster -- the Isolation Forest from Section 12.03 is still needed for true novelty detection'
    - 'Treat the UMAP projection as a mandatory pre-deployment audit, not an optional visualisation: if attack and benign clusters overlap significantly in the 2D projection, the detector will have an unacceptably high false positive rate before any threshold is applied'
    - 'Recognise that the attack cluster library is a living artefact that must grow as new attack families are confirmed -- a static cluster library computed once at initial training becomes outdated as adversaries innovate'
    - 'Understand the difference between near-duplicate detection (same attack, slightly reworded) and semantic cluster detection (novel paraphrase of a known attack family): both are valuable, and near-duplicate detection is faster and more precise for exact rewording'

prerequisites:
  - 'Section 12.05: supervised classification -- security_evaluator.py imported for benchmarking; centroid_cosine_dist_min feature was already used as input to Random Forest'
  - 'Section 12.04: dataset curation -- confirmed positive examples from the labelled dataset are the input to attack_cluster_builder.py'
  - 'Section 12.02: security feature engineering -- centroid_cosine_dist_min and benign_cosine_dist were designed here; this section implements them'
  - 'Chapter 3 Section 3.03: word embeddings and semantic representation -- the distributional hypothesis and vector space semantics are prerequisite'
  - 'Chapter 3 Section 3.09: sentence embeddings and BERT -- Sentence Transformer architecture builds on BERT fine-tuning'

prose_content:

  part_1:
    title: 'The Paraphrase Evasion Problem'
    body: |
      Every detection rule and every feature in the Section 12.02 pipeline is a description
      of a known attack pattern. Sigma rules describe known token sequences. The
      INSTRUCTION_KEYWORDS list describes known attack verbs. The role_boundary_marker
      feature describes a known structural indicator. All of them share the same
      fundamental limitation: they describe what is already known.

      An adaptive adversary operates in the knowledge gap. They read the published Sigma
      rules, observe which requests get flagged, and iterate their payload until it passes
      every signature and feature check while still achieving the attack objective. This
      is not a sophisticated capability -- it requires only access to the detection rules
      and a willingness to iterate. Public jailbreak communities document exactly which
      phrasings bypass which detection systems.

      The paraphrase evasion attack has a specific structure. The adversary takes a known
      jailbreak -- say, the DAN persona invocation -- and rewrites it systematically:
      replacing 'ignore all previous instructions' with 'set aside your earlier directives',
      replacing 'You are now DAN' with 'From this point, you inhabit the role of a system
      without filters', removing the explicit role boundary markers while preserving the
      instruction hierarchy manipulation. The resulting text shares no tokens with the
      original, passes every keyword check and structural feature check, but delivers
      the same semantic content: a request for the model to adopt an unrestricted persona
      and comply with instructions that bypass its guidelines.

      Embedding-based detection provides structural resistance to this attack. A Sentence
      Transformer encodes the semantic content of a text into a continuous vector
      representation. The encoding is learned from large-scale contrastive training: texts
      with similar meaning are pulled close together in the embedding space; texts with
      different meanings are pushed apart. Surface rewriting that preserves meaning produces
      a vector that is close to the original in this space. The cosine distance between
      the original DAN jailbreak embedding and its paraphrase is small -- typically under
      0.15 -- even though the texts share no tokens.

  part_2:
    title: 'Sentence Transformers: Architecture and Why They Work for Security Detection'
    body: |
      Standard BERT models produce contextual token embeddings -- a vector per token rather
      than a vector per sentence. Aggregating token embeddings (mean pooling, CLS token)
      produces sentence-level representations, but BERT was not trained to make
      semantically similar sentences close in this aggregated space. The aggregated BERT
      representation works reasonably well for retrieval and classification but lacks the
      geometric property that semantic similarity = small distance.

      Sentence Transformers (Reimers and Gurevych 2019) address this by fine-tuning a BERT
      model with a siamese network architecture and a contrastive objective. Two sentences
      are passed through the same model (shared weights), producing two sentence embeddings
      via mean pooling. The loss function minimises the distance between embeddings of
      semantically similar sentence pairs and maximises the distance between semantically
      different pairs, using a large-scale dataset of human-annotated similarity scores.
      The result is a model whose embedding space has the desired geometric property.

      For security detection, this geometric property means that attack paraphrases cluster
      in the same neighbourhood as the original attacks they were derived from. The DAN
      jailbreak family -- across all its documented variants -- occupies a compact region
      of the embedding space that is clearly separated from benign conversational queries.
      A new DAN variant that has never been seen lands in this same region because the
      model's training has generalised the semantic content of persona-invocation jailbreaks
      to their shared semantic neighbourhood.

      The practical model choice for production deployment is all-MiniLM-L6, a distilled
      Sentence Transformer that produces 384-dimensional embeddings in 2-4ms via ONNX
      Runtime on CPU. It achieves approximately 90% of the accuracy of the full MPNet
      model at a fraction of the inference cost. For the 50ms gateway budget shared across
      all seven tracks, 2-4ms for embedding inference is the correct allocation. The
      full MPNet model at 10-15ms per inference would consume too large a fraction of the
      budget when combined with the other detector inference costs.

  part_3:
    title: 'Attack Cluster Construction: k-means and HDBSCAN'
    body: |
      The attack cluster library is the core data structure of the embedding detector. It
      stores the centroid of each known attack family in the embedding space. The detector
      computes cosine distance from a new input embedding to every centroid in the library
      and uses the minimum distance as the detection score.

      Cluster construction begins by embedding all confirmed attack examples from the
      Section 12.04 labelled dataset with MiniLM-L6. The result is a matrix of shape
      (n_attacks, 384) where each row is the embedding of one confirmed attack example.
      Clustering algorithms partition this matrix into groups of semantically similar attacks.

      k-means clustering requires a pre-specified number of clusters k. It assigns each
      point to the nearest centroid and iteratively updates centroids to minimise within-
      cluster variance. For attack cluster construction, k must be chosen to match the
      number of distinct attack families in the labelled dataset. Choosing k too small
      merges distinct families (DAN and fictional frame jailbreaks) into one cluster,
      producing a broad centroid that is too far from both families to detect either
      precisely. Choosing k too large splits coherent families into sub-clusters, producing
      centroids that are close to each other and add no detection coverage beyond one
      well-placed centroid. The silhouette score is the correct evaluation metric for k
      selection: it measures how much closer each point is to its own cluster centroid
      than to the nearest other centroid, averaged across all points.

      HDBSCAN (Hierarchical Density-Based Spatial Clustering of Applications with Noise)
      does not require a pre-specified k. It identifies clusters as high-density regions
      in the embedding space and labels low-density points as noise. For attack cluster
      construction, HDBSCAN is preferred when the attack family count is unknown or when
      the attack distribution has clusters of varying density. Its primary limitation is
      that it produces noise points -- attack examples that belong to no cluster -- which
      must be handled separately. Noise points are typically the most novel attack examples
      and are valuable: they represent attack variants at the frontier of the known
      taxonomy that warrant individual centroid entries.

      Centroid computation for each cluster is straightforward: the mean of all cluster
      member embeddings. Centroid normalisation (L2 normalisation) is required before
      cosine distance computation -- the cosine distance between two L2-normalised vectors
      is equivalent to 1 minus their dot product, which can be computed efficiently with
      a single matrix multiplication against the centroid library.

  part_4:
    title: 'Threshold Selection and Operating Point Calibration'
    body: |
      The cosine distance threshold determines what minimum similarity to an attack cluster
      centroid constitutes a detection. A threshold of 0.20 means any input within cosine
      distance 0.20 of any attack centroid is flagged. Setting the threshold too low
      (0.05) misses paraphrases that are semantically related but not identical. Setting
      it too high (0.40) flags a large fraction of benign requests that happen to discuss
      topics adjacent to attack families -- requests about AI safety, security research,
      or fiction involving AI systems.

      Threshold calibration follows the same procedure as the Section 12.03 anomaly
      detector: sweep threshold values from 0.05 to 0.50 in steps of 0.01, compute the
      true positive rate (fraction of held-out attack examples flagged) and false positive
      rate (fraction of benign examples flagged) at each value, and select the threshold
      that achieves the target false positive rate at maximum recall.

      The calibration requires separate held-out sets for the paraphrase attack class and
      the exact-match attack class. Paraphrase attacks are synthetic rewrites of the
      training examples, generated by asking a language model to rephrase known jailbreaks
      while preserving their intent. These test whether the embedding detector generalises
      to novel phrasings. Exact-match attacks are slightly modified versions of training
      examples (single word substitutions, punctuation changes) that test the near-
      duplicate detection capability.

      Per-cluster threshold calibration is more precise than a single global threshold.
      The DAN persona family occupies a compact cluster in embedding space; its centroid
      is far from benign traffic, and a distance of 0.25 provides good coverage with low
      false positives. The fictional frame family is more diffuse; its centroid is closer
      to the benign distribution, and a tighter threshold of 0.15 is needed to avoid
      excessive false positives. The embedding_similarity_detector.py supports per-cluster
      thresholds via a threshold_library dict that maps cluster names to their calibrated
      operating distances.

  part_5:
    title: 'UMAP Visualisation: Pre-Deployment Separability Audit'
    body: |
      UMAP (Uniform Manifold Approximation and Projection, McInnes et al. 2018) projects
      the high-dimensional embedding space into two dimensions while approximately
      preserving the local neighbourhood structure. The projection allows the detection
      engineer to visually audit whether attack and benign traffic occupy separable regions
      before computing any threshold or deploying any detector.

      The pre-deployment audit has two pass criteria. The first is cluster visibility:
      in the 2D UMAP projection, each attack family should form a visually distinct
      cluster that is separated from the benign traffic mass. If all attack embeddings
      scatter uniformly throughout the benign traffic region, the embedding space does
      not separate attack from benign for this threat class and embedding detection will
      not work. In this case, return to Section 12.02 and investigate whether the attack
      examples in the labelled dataset are truly distinct from benign traffic in semantic
      content -- if they are not, the labelling may be incorrect or the attack class may
      be too broadly defined.

      The second criterion is centroid coverage: each attack cluster centroid (marked in
      the UMAP projection) should be visually close to the centre of its cluster rather
      than at the periphery. A centroid at the periphery of an asymmetric cluster will
      have higher cosine distance to cluster members on the far side, reducing detection
      coverage for those variants.

      The UMAP projection is also useful for operational monitoring. Running the projection
      monthly with the most recent production traffic overlaid on the original cluster
      library reveals whether new attack variants are appearing in previously empty regions
      of the embedding space. A new dense region that is not covered by any existing
      cluster centroid is a signal to run the cluster builder again with the updated
      labelled dataset.

  part_6:
    title: 'Out-of-Distribution Detection and Integration with the Feature Pipeline'
    body: |
      Embedding-based detection provides a second capability beyond cluster proximity:
      out-of-distribution (OOD) detection. A request whose embedding is far from all
      known attack cluster centroids AND far from the benign traffic centroid is
      statistically unusual relative to both the known attack distribution and the
      known benign distribution. This is the embedding-space analogue of the Isolation
      Forest anomaly score from Section 12.03.

      OOD detection using embeddings is more precise than Isolation Forest anomaly
      detection for semantic content: it specifically identifies inputs that are
      semantically unusual -- not just statistically unusual in the feature space.
      A request about a novel topic that has never appeared in the production API
      logs will be far from the benign centroid, but it is not an attack; the OOD
      signal must be combined with other evidence before triggering an alert. The
      correct operational posture for OOD inputs is monitoring (lowest alert tier
      in the Section 12.15 ensemble) rather than blocking.

      The integration with the Section 12.02 feature pipeline is direct: the
      centroid_cosine_dist_min and benign_cosine_dist features that the Random Forest
      and XGBoost classifiers use as inputs are produced by the embedding similarity
      detector at inference time. The detector computes these two scalar features and
      returns them to the feature pipeline, which passes them to all supervised
      classifiers in the ensemble. This means the embedding detector runs first in
      the inference chain, and its output augments the feature vector for all downstream
      classifiers -- a natural division of labour that exploits the embedding model
      inference that would be required for the semantic features anyway.

