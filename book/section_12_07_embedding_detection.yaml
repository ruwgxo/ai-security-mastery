deliverables:

  deliverable_1:
    title: 'Embedding Similarity Detector'
    filename: 'embedding_similarity_detector.py'
    description: 'Sentence Transformer cosine similarity detector with a configurable centroid library. Computes centroid_cosine_dist_min and benign_cosine_dist for each request, flags requests within the threshold of any attack cluster, and returns both features for integration with the Section 12.02 feature pipeline.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: sentence-transformers (for centroid pre-computation), onnxruntime (for production inference), numpy. The ONNX model export from sentence-transformers is a one-time offline step.'
    code: |
      # embedding_similarity_detector.py
      # Section 12.07: Embedding Similarity Detector
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import time
      from dataclasses import dataclass, field
      from pathlib import Path
      from typing import Dict, List, Optional, Tuple

      import numpy as np


      @dataclass
      class ClusterCentroid:
          name: str           # e.g. 'dan_persona', 'fictional_frame', 'payload_splitting'
          centroid: np.ndarray
          threshold: float    # per-cluster cosine distance threshold
          member_count: int


      @dataclass
      class EmbeddingDetectionResult:
          request_text: str
          embedding: np.ndarray
          nearest_cluster: Optional[str]
          min_cosine_dist: float
          benign_cosine_dist: float
          is_attack: bool
          ood_signal: bool          # far from all known clusters (attack AND benign)
          inference_ms: float


      def cosine_distance(a: np.ndarray, b: np.ndarray) -> float:
          norm_a = np.linalg.norm(a)
          norm_b = np.linalg.norm(b)
          if norm_a == 0 or norm_b == 0:
              return 1.0
          return float(1.0 - np.dot(a, b) / (norm_a * norm_b))


      class EmbeddingSimilarityDetector:
          '''
          Cosine similarity detector using Sentence Transformer embeddings.

          Architecture:
            1. Embed request with MiniLM-L6 via ONNX Runtime (2-4ms)
            2. Compute cosine distance to all attack cluster centroids
            3. Flag if min distance <= per-cluster threshold
            4. Return centroid_cosine_dist_min and benign_cosine_dist
               for integration with Section 12.02 feature pipeline

          The ONNX Runtime inference path must be the same at training time
          (when centroids are built) and at serving time. Never mix the
          sentence-transformers PyTorch path with the ONNX Runtime path.
          '''

          def __init__(
              self,
              onnx_model_path: Optional[str] = None,
              global_ood_threshold: float = 0.45,
          ) -> None:
              self._centroids: List[ClusterCentroid] = []
              self._benign_centroid: Optional[np.ndarray] = None
              self._ort_session = None
              self._tokenizer = None
              self._global_ood_threshold = global_ood_threshold

              if onnx_model_path and Path(onnx_model_path).exists():
                  self._load_ort_session(onnx_model_path)

          def _load_ort_session(self, path: str) -> None:
              try:
                  import onnxruntime as ort
                  from transformers import AutoTokenizer
                  self._ort_session = ort.InferenceSession(
                      path,
                      providers=['CPUExecutionProvider'],
                  )
                  self._tokenizer = AutoTokenizer.from_pretrained('sentence-transformers/all-MiniLM-L6-v2')
                  print(f'Loaded ONNX embedding model: {path}')
              except ImportError:
                  print('WARN: onnxruntime or transformers not installed; using mock embeddings.')

          def _embed(self, text: str) -> np.ndarray:
              '''Embed a single text. Falls back to a hash-based mock if ONNX unavailable.'''
              if self._ort_session is None or self._tokenizer is None:
                  # Deterministic mock embedding for testing without ONNX
                  rng = np.random.default_rng(abs(hash(text[:100])) % (2**31))
                  v = rng.normal(0, 1, 384).astype(np.float32)
                  return v / (np.linalg.norm(v) + 1e-9)

              enc = self._tokenizer(
                  text, padding=True, truncation=True,
                  max_length=128, return_tensors='np',
              )
              out = self._ort_session.run(
                  None,
                  {
                      'input_ids': enc['input_ids'],
                      'attention_mask': enc['attention_mask'],
                  },
              )
              # Mean pool over token dimension
              token_embeddings = out[0]          # (1, seq_len, hidden)
              mask = enc['attention_mask'][..., np.newaxis]
              pooled = (token_embeddings * mask).sum(1) / mask.sum(1)
              pooled = pooled[0]
              norm = np.linalg.norm(pooled)
              return (pooled / (norm + 1e-9)).astype(np.float32)

          # ------------------------------------------------------------------
          # Centroid library management
          # ------------------------------------------------------------------

          def load_centroid_library(self, centroids: List[ClusterCentroid]) -> None:
              self._centroids = centroids
              print(f'Loaded {len(centroids)} attack cluster centroids.')

          def set_benign_centroid(self, benign_centroid: np.ndarray) -> None:
              norm = np.linalg.norm(benign_centroid)
              self._benign_centroid = benign_centroid / (norm + 1e-9)

          def add_centroid(self, centroid: ClusterCentroid) -> None:
              self._centroids.append(centroid)

          # ------------------------------------------------------------------
          # Inference
          # ------------------------------------------------------------------

          def detect(self, text: str) -> EmbeddingDetectionResult:
              t0 = time.time()
              emb = self._embed(text)

              min_dist = 1.0
              nearest = None
              is_attack = False

              for cc in self._centroids:
                  d = cosine_distance(emb, cc.centroid)
                  if d < min_dist:
                      min_dist = d
                      nearest = cc.name
                  if d <= cc.threshold:
                      is_attack = True

              benign_dist = (
                  cosine_distance(emb, self._benign_centroid)
                  if self._benign_centroid is not None
                  else 1.0
              )

              ood = (min_dist > self._global_ood_threshold
                     and benign_dist > self._global_ood_threshold)

              return EmbeddingDetectionResult(
                  request_text=text[:200],
                  embedding=emb,
                  nearest_cluster=nearest,
                  min_cosine_dist=min_dist,
                  benign_cosine_dist=benign_dist,
                  is_attack=is_attack,
                  ood_signal=ood,
                  inference_ms=(time.time() - t0) * 1000,
              )

          # ------------------------------------------------------------------
          # Feature pipeline integration
          # ------------------------------------------------------------------

          def get_pipeline_features(self, text: str) -> Tuple[float, float, float]:
              '''
              Returns (centroid_cosine_dist_min, benign_cosine_dist, embedding_l2_norm)
              for integration with the Section 12.02 feature pipeline.
              Called by security_feature_extractor.extract_features() when
              attack_centroids are provided.
              '''
              result = self.detect(text)
              return (
                  result.min_cosine_dist,
                  result.benign_cosine_dist,
                  float(np.linalg.norm(result.embedding)),
              )


      if __name__ == '__main__':
          rng = np.random.default_rng(42)

          # Build mock centroid library
          dan_centroid = rng.normal(0.8, 0.05, 384).astype(np.float32)
          dan_centroid /= np.linalg.norm(dan_centroid)
          benign_centroid = rng.normal(0.1, 0.05, 384).astype(np.float32)
          benign_centroid /= np.linalg.norm(benign_centroid)

          detector = EmbeddingSimilarityDetector()
          detector.load_centroid_library([
