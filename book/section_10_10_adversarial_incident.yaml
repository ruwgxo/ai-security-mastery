deliverables:

  deliverable_1:
    title: 'Adversarial Incident Timeline'
    filename: 'adversarial_incident_timeline.py'
    description: 'Structured timeline of four documented adversarial incidents with attack metadata, documented success rates, and chapter cross-references; generates incident summary reports'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention. No external dependencies.
      Incident data structured as dataclasses for programmatic access.
      Generates formatted timeline output for security documentation and briefings.
    code: |
      # adversarial_incident_timeline.py
      # Section 10.10: Adversarial Example Incident Timeline
      # 20260524 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class AdversarialIncident:
          incident_id: str
          year: int
          title: str
          authors: str
          reference: str
          domain: str
          attack_type: str
          target_system: str
          perturbation_constraint: str
          api_required: bool
          reported_success_rate: str
          ch10_sections: List[str]
          atlas_technique: str
          root_causes: List[str]
          track7_coverage: List[str]
          operator_response: str
          notes: str = ''


      INCIDENT_TIMELINE: List[AdversarialIncident] = [
          AdversarialIncident(
              incident_id='INC-001',
              year=2016,
              title='Accessorize to a Crime: Adversarial Glasses Bypass Facial Recognition',
              authors='Sharif, Bhagavatula, Bauer, Reiter',
              reference='ACM CCS 2016',
              domain='Biometric access control (facial recognition)',
              attack_type='Physical adversarial patch (targeted misidentification)',
              target_system='Commercial face recognition classifier (VGG-based)',
              perturbation_constraint='Physical wearable (glasses frames); RGB optical only',
              api_required=False,
              reported_success_rate='88% targeted impersonation in physical conditions',
              ch10_sections=['Section 10.8 (Physical Adversarial)', 'Section 10.3 (FGSM foundation)'],
              atlas_technique='AML.T0029 (Adversarial Patch)',
              root_causes=[
                  'No adversarial training on face images with adversarial accessories',
                  'No spatial anomaly detection for face region',
                  'No multi-spectral verification (IR + RGB agreement)',
                  'No liveness detection as complementary control',
              ],
              track7_coverage=[
                  'Patch localisation (Section 10.8): glasses frame texture anomaly flagged',
                  'Consistency check (Section 10.12): multi-angle captures disagree',
              ],
              operator_response='Research disclosure; subsequent adversarial training work in academia; commercial adoption of IR liveness checks',
          ),
          AdversarialIncident(
              incident_id='INC-002',
              year=2018,
              title='Robust Physical Perturbations in the Real World (Stop Sign Attack)',
              authors='Eykholt, Evtimov, Fernandes, Li, Rahmati, Xiao, Prakash, Kohno, Song',
              reference='CVPR 2018',
              domain='Autonomous vehicle perception (traffic sign detection)',
              attack_type='Physical adversarial patch with EOT (untargeted, then targeted)',
              target_system='YOLO v2 and Faster RCNN traffic sign detectors',
              perturbation_constraint='Physical stickers on stop sign surface; EOT across angles/lighting',
              api_required=False,
              reported_success_rate='84.8% misclassification in drive-by tests; 100% in static tests',
              ch10_sections=['Section 10.8 (Physical Adversarial)', 'Section 10.8 (EOT)'],
              atlas_technique='AML.T0029 (Adversarial Patch)',
              root_causes=[
                  'No adversarial training on patch-augmented traffic sign images',
                  'No patch localisation or spatial anomaly detection in camera pipeline',
                  'No multi-sensor fusion (LIDAR / radar confirmation)',
                  'No temporal consistency requirement across frames',
              ],
              track7_coverage=[
                  'Patch localisation (Section 10.8): sticker texture anomaly detectable',
                  'Temporal consistency: same sign inconsistently classified across frames',
              ],
              operator_response='Industry shift toward multi-sensor fusion; subsequent adversarial patch datasets released; ongoing NIST AV standards work',
          ),
          AdversarialIncident(
              incident_id='INC-003',
              year=2023,
              title='Universal and Transferable Adversarial Attacks on Aligned LLMs',
              authors='Zou, Wang, Kolter, Fredrikson',
              reference='arXiv 2023 (GCG attack)',
              domain='LLM safety alignment / content moderation',
              attack_type='Universal adversarial suffix (automated; gradient-based)',
              target_system='GPT-4, Claude, Llama 2, Vicuna safety classifiers',
              perturbation_constraint='Discrete token suffix appended to harmful prompt',
              api_required=True,
              reported_success_rate='>90% harmful content bypass on tested aligned models',
              ch10_sections=['Section 10.9 (LLM Adversarial)', 'Section 10.9 (Universal Triggers)'],
              atlas_technique='AML.T0043 (Craft Adversarial Data) / AML.T0015 (Evade ML Model)',
              root_causes=[
                  'RLHF safety training did not include adversarial suffix attack variants',
                  'No semantic consistency check before generation (paraphrase without suffix classifies harmful)',
                  'No adversarial suffix detection layer in inference pipeline',
                  'No per-request adversarial input classifier',
              ],
              track7_coverage=[
                  'Semantic consistency (Section 10.12): suffix removal or paraphrase breaks adversarial property',
                  'Adversarial text classifier (Section 10.12): if trained on suffix attack patterns',
              ],
              operator_response='Rapid model updates by all affected vendors; adversarial fine-tuning research accelerated; red-team requirements formalised in US EO on AI',
          ),
          AdversarialIncident(
              incident_id='INC-004',
              year=2021,
              title='GAMMA: Generating Adversarial Malware Examples via Functionality-Preserving Perturbations',
              authors='Demetrio, Biggio, Lagorio, Roli, Armando',
              reference='IEEE TIFS 2021',
              domain='Malware detection (antivirus PE binary classification)',
              attack_type='Functionality-preserving L0 adversarial PE binary',
              target_system='MalConv, gradient-based PE binary classifiers',
              perturbation_constraint='L0 over modifiable PE bytes (overlay, padding, import table); execution preserved',
              api_required=False,
              reported_success_rate='>60% evasion at matched epsilon; higher with query-based black-box',
              ch10_sections=['Section 10.5 (C&W L0)', 'Section 10.3 (FGSM)', 'Section 10.2 (Tabular/L0 cells)'],
              atlas_technique='AML.T0043 (Craft Adversarial Data)',
              root_causes=[
                  'No adversarial training on functionality-preserving adversarial PE samples',
                  'No feature-level squeezing (PE header normalisation, overlay stripping)',
                  'No multi-classifier ensemble agreement requirement',
                  'No dynamic execution verification as complementary control',
              ],
              track7_coverage=[
                  'Structured feature squeezing (Section 10.11 analogue): PE normalisation changes adversarial features',
                  'Consistency check: agreement across byte n-gram and API call classifiers',
                  'Complementary control: dynamic sandbox execution as non-ML verification',
              ],
              operator_response='GAMMA dataset released for adversarial AV research; adversarial training adopted by several AV vendors; ensemble detection standard in security products',
              notes='Malware adversarial examples demonstrate adversarial ML is relevant to classical security domains beyond LLM and vision systems',
          ),
      ]


      def print_timeline(incidents: List[AdversarialIncident]) -> None:
          sorted_incidents = sorted(incidents, key=lambda x: x.year)
          print('Adversarial Example Incident Timeline')
          print('=' * 60)
          for inc in sorted_incidents:
              print(f'\n[{inc.incident_id}] {inc.year}: {inc.title}')
              print(f'  Authors:     {inc.authors}')
              print(f'  Reference:   {inc.reference}')
              print(f'  Domain:      {inc.domain}')
              print(f'  Attack:      {inc.attack_type}')
              print(f'  Target:      {inc.target_system}')
              print(f'  Success:     {inc.reported_success_rate}')
              print(f'  API needed:  {inc.api_required}')
              print(f'  ATLAS:       {inc.atlas_technique}')
              print(f'  Ch10 refs:   {"; ".join(inc.ch10_sections)}')
              if inc.notes:
                  print(f'  Note:        {inc.notes}')


      def domain_summary(incidents: List[AdversarialIncident]) -> None:
          domains = {}
          for inc in incidents:
              domains[inc.domain] = domains.get(inc.domain, 0) + 1
          print('\nIncident count by domain:')
          for domain, count in domains.items():
              print(f'  {domain}: {count}')


      if __name__ == '__main__':
          print_timeline(INCIDENT_TIMELINE)
          domain_summary(INCIDENT_TIMELINE)

  deliverable_2:
    title: 'Incident Root Cause Analyser'
    filename: 'incident_root_cause_analyser.py'
    description: 'Root cause analysis framework for adversarial incidents using four missing control categories; generates structured RCA documents for security reporting and architecture review'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention. No external dependencies.
      Import INCIDENT_TIMELINE from adversarial_incident_timeline.py.
    code: |
      # incident_root_cause_analyser.py
      # Section 10.10: Adversarial Incident Root Cause Analysis
      # 20260524 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Dict
      from adversarial_incident_timeline import INCIDENT_TIMELINE, AdversarialIncident


      CONTROL_CATEGORIES = [
          'adversarial_training',
          'input_side_detection',
          'consistency_checking',
          'complementary_nonml_control',
      ]

      CONTROL_LABELS = {
          'adversarial_training': 'Adversarial training (Section 10.15)',
          'input_side_detection': 'Input-side adversarial detection (Section 10.11)',
          'consistency_checking': 'Prediction consistency checking (Section 10.12)',
          'complementary_nonml_control': 'Non-ML complementary controls (multi-sensor, ensemble)',
      }


      @dataclass
      class RootCauseReport:
          incident_id: str
          title: str
          missing_controls: List[str]
          contributing_factors: List[str]
          severity: str
          remediation_priority: str
          recommended_controls: List[str]


      def classify_root_causes(incident: AdversarialIncident) -> Dict[str, bool]:
          '''Classify which control categories are missing for this incident.'''
          missing = {cat: False for cat in CONTROL_CATEGORIES}
          for cause in incident.root_causes:
              cause_lower = cause.lower()
              if 'adversarial training' in cause_lower:
                  missing['adversarial_training'] = True
              if 'detection' in cause_lower or 'anomaly' in cause_lower or 'squeezing' in cause_lower:
                  missing['input_side_detection'] = True
              if 'consistency' in cause_lower or 'temporal' in cause_lower or 'ensemble' in cause_lower:
                  missing['consistency_checking'] = True
              if 'sensor' in cause_lower or 'liveness' in cause_lower or 'dynamic' in cause_lower or 'complementary' in cause_lower:
                  missing['complementary_nonml_control'] = True
          return missing


      def generate_rca(incident: AdversarialIncident) -> RootCauseReport:
          missing = classify_root_causes(incident)
          n_missing = sum(missing.values())
          severity = 'CRITICAL' if n_missing >= 3 else ('HIGH' if n_missing == 2 else 'MEDIUM')
          remediation_priority = 'Immediate' if not incident.api_required else 'High'
          recommended = [CONTROL_LABELS[cat] for cat, absent in missing.items() if absent]

          return RootCauseReport(
              incident_id=incident.incident_id,
              title=incident.title,
              missing_controls=[
                  CONTROL_LABELS[cat] for cat, absent in missing.items() if absent
              ],
              contributing_factors=incident.root_causes,
              severity=severity,
              remediation_priority=remediation_priority,
              recommended_controls=recommended,
          )


      def print_rca(rca: RootCauseReport) -> None:
          print(f'\n{"=" * 60}')
          print(f'[{rca.incident_id}] {rca.title}')
          print(f'Severity: {rca.severity}  |  Priority: {rca.remediation_priority}')
          print(f'\nMissing controls ({len(rca.missing_controls)}):')
          for ctrl in rca.missing_controls:
              print(f'  - {ctrl}')
          print(f'\nContributing factors:')
          for factor in rca.contributing_factors:
              print(f'  - {factor}')
          print(f'\nRecommended controls:')
          for rec in rca.recommended_controls:
              print(f'  [ADD] {rec}')


      def cross_incident_pattern(incidents: List[AdversarialIncident]) -> None:
          print('\nCross-incident pattern analysis:')
          all_missing = {cat: 0 for cat in CONTROL_CATEGORIES}
          for inc in incidents:
              missing = classify_root_causes(inc)
              for cat, absent in missing.items():
                  if absent:
                      all_missing[cat] += 1
          for cat, count in all_missing.items():
              pct = count / len(incidents) * 100
              print(f'  {CONTROL_LABELS[cat]}: missing in {count}/{len(incidents)} incidents ({pct:.0f}%)')


      if __name__ == '__main__':
          print('Root Cause Analysis: Adversarial Incidents')
          for incident in INCIDENT_TIMELINE:
              rca = generate_rca(incident)
              print_rca(rca)
          cross_incident_pattern(INCIDENT_TIMELINE)

