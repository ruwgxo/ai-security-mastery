common_mistakes:

  mistake_1:
    description: 'Treating adversarial ML incident papers as theoretical demonstrations rather than as operational threat signals requiring production response'
    why_it_happens: |
      Adversarial ML papers are published in academic venues (CVPR, CCS, USENIX). Security
      engineers in operations-focused roles may not monitor academic venues, or may
      discount academic demonstrations as "lab conditions" not applicable to production.
      The stop sign paper was published in 2018; autonomous vehicle security teams that
      read it as theoretical were behind the threat curve for years.
    consequence: |
      Production classifiers remain undefended against documented attack families. The
      attack is already known to the adversary community; the defender has the information
      needed to implement Track 7 controls but does not act on it. The gap between attack
      publication and production defence widens with each incident not acted upon.
    correct_approach: |
      Establish a process to review adversarial ML papers (arXiv cs.CR and cs.LG, major
      security conferences, MITRE ATLAS case study additions) within 30 days of publication.
      For each paper: does the attack apply to any deployed classifier? If yes, trigger
      the pre-production checklist (deliverable 5) for that classifier. The adversarial
      incident register (ADV-007) formalises this process.

  mistake_2:
    description: 'Scoping adversarial ML defence only to LLM and image classification deployments, missing classical security domains (malware detection, fraud scoring, anomaly detection)'
    why_it_happens: |
      Adversarial ML discourse is dominated by LLM safety and image classifier examples.
      Security teams responsible for malware detection, fraud scoring, or network anomaly
      detection classify their systems as "traditional ML" rather than "AI security" and
      do not apply adversarial robustness controls.
    consequence: |
      Malware classifiers (GAMMA incident, INC-004), fraud models, and intrusion detection
      systems are all gradient-based learners with the same structural vulnerability to
      adversarial perturbation as image classifiers. They are not protected by adversarial
      training, input-side detection, or consistency checking. An adversary who discovers
      that a fraud model is vulnerable to feature-space adversarial perturbation (modify
      transaction features within domain constraints) can evade it systematically.
    correct_approach: |
      Apply the pre-production adversarial robustness checklist (deliverable 5) to any
      ML classifier where the adversary can control the input -- including malware samples,
      transaction features, and network telemetry. The checklist items are domain-agnostic:
      adversarial training, feature squeezing analogue, consistency checking analogue, and
      non-ML complementary control apply to all domains.

  mistake_3:
    description: 'Responding to an adversarial ML incident with a model update only, without adding a detection layer, leaving the system vulnerable to the next attack variant'
    why_it_happens: |
      Model updates are the familiar incident response mechanism. After an adversarial
      incident, retraining on adversarial examples is the natural first action. It is
      faster than architectural changes and measurably improves robustness against the
      specific attack that was demonstrated.
    consequence: |
      The updated model is more robust to the specific attack variant published in the
      incident paper. A new attack variant (higher kappa, different norm, adaptive adversary
      with knowledge of the updated model) may achieve comparable evasion rates. Without
      a detection layer (Track 7), the updated model has no defence against unknown future
      variants. The pattern repeats: incident → model update → new variant → incident.
    correct_approach: |
      Model updates address the specific attack; detection layers address the attack class.
      The correct incident response adds: (1) adversarial training on the specific attack,
      (2) Track 7 detection layer covering the attack family, and (3) architecture controls
      (multi-sensor, ensemble) that are attack-variant-independent. Only the combination
      of all three provides durable defence rather than temporary patch coverage.

  mistake_4:
    description: 'Calibrating the detection layer only against the specific attack from the incident report, missing related attack families in the same taxonomy cell'
    why_it_happens: |
      The detection layer is built and validated against the incident attack (e.g., EOT
      patch detection calibrated against the specific Eykholt et al. sticker pattern).
      The detector is tuned to that specific pattern and declared operational.
    consequence: |
      A new physical patch design (different texture, different colour profile, different
      size) evades the detector calibrated against the original sticker pattern. The detection
      coverage is specific to the published attack, not to the attack class (all adversarial
      patches). The adversary simply designs a different patch that falls outside the
      calibrated detection region.
    correct_approach: |
      Calibrate detection against the attack class, not the specific attack instance.
      For patch detection: calibrate against patches of varied size, texture, and colour
      using the EOT transformation sweep from Section 10.8. For text adversarial detection:
      calibrate against TextFooler, HotFlip, and universal triggers (not just the GCG suffix).
      The physical_robustness_benchmark.py (Section 10.8) and cw_confidence_sweep.py
      (Section 10.5) provide the right calibration frameworks.

  mistake_5:
    description: 'Not maintaining a post-deployment adversarial red-team schedule, allowing detection coverage to drift as new attack variants emerge after initial Track 7 deployment'
    why_it_happens: |
      Track 7 is deployed at launch, passing all pre-production checklist items. The
      detection layer is treated as a static control that does not require ongoing
      maintenance. New adversarial attack papers accumulate without triggering a
      re-evaluation of Track 7 coverage.
    consequence: |
      Track 7 coverage drifts: the adversarial classifier (Section 10.12) trained on
      attack families at deployment time degrades on novel attack families. The squeezer
      thresholds calibrated at deployment epsilon become miscalibrated as the production
      threat changes. Detection rates that were 85% at launch drift to 60% after 18
      months of new attack publications without re-evaluation.
    correct_approach: |
      Schedule quarterly adversarial red-team exercises: run the full detection opportunity
      mapping (deliverable 3) against newly published attacks, retrain the adversarial
      classifier if new attack families are not covered, and re-run the pre-production
      checklist annually. The adversarial incident register (ADV-007) tracks this cadence.
      Adversarial robustness is not a one-time deployment property -- it is an ongoing
      security posture that requires continuous maintenance.

section_summary:

  compact: |
    Four documented adversarial incidents span physical vision (stop sign attack, adversarial
    glasses), text safety classifiers (LLM adversarial suffix), and malware detection (GAMMA PE
    attack). All four share the same root cause: no adversarial training, no input-side
    adversarial detection, no consistency checking, and no non-ML complementary controls.
    Every control built in Sections 10.11-10.15 directly addresses a specific root cause in
    one of these incidents. The detection opportunity mapping shows which Track 7 primitive
    would have fired: patch localisation for physical attacks, semantic consistency for text
    attacks, structured feature squeezing for malware. The correct incident response adds all
    three control layers -- model update, detection layer, architecture control -- not model
    update alone. The pre-production checklist (eight items, six blocking) operationalises
    this across any ML classifier deployment.

  key_takeaways:
    - 'Adversarial ML is a production threat across four domains: physical vision, biometric access, text safety, and malware detection -- not only LLM'
    - 'All four incidents share four missing controls: adversarial training, input-side detection, consistency checking, non-ML complementary control'
    - 'Model-only incident response is insufficient: it addresses the specific attack but not the attack class; detection layers provide durable coverage'
    - 'The pre-production checklist (ADV-001 to ADV-008) implements the four missing controls as eight verifiable items; six are blocking for deployment'
    - 'Detection coverage requires quarterly red-team maintenance: adversarial classifiers drift as new attack families emerge post-deployment'

preview_section_10_11:
  title: 'Section 10.11: Detection Primitives -- Input Preprocessing and Feature Squeezing'
  summary: |
    Section 10.11 builds the first of three Track 7 detection primitives: feature squeezing.
    The detection mechanism is prediction-change-under-transformation: compare the model''s
    output on the original input versus a squeezed version. A large prediction change signals
    adversarial perturbation -- natural images are robust to small input transformations;
    adversarial perturbations are precisely calibrated and destroyed by transformation. Three
    squeezers are implemented: Gaussian spatial smoothing (effective against L-infinity digital
    noise), bit-depth reduction (reduces precision of gradient-based perturbations), and JPEG
    compression (lossy compression as adversarial signal destruction). A squeezer ensemble
    with disagreement scoring combines all three. The text canonicaliser (synonym normalisation
    and paraphrase detection) implements the squeezer analogue for LLM adversarial inputs.
    Section 10.11 closes with the squeezer latency benchmark that establishes how many
    squeezers fit within Track 7''s pre-inference latency allocation of the 50ms P99 budget.

