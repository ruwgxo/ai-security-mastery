section_overview:
  one_line_summary: 'Four documented adversarial example incidents across physical vision, facial recognition, content moderation, and malware detection share one root cause: classifiers deployed without adversarial robustness controls.'
  why_this_section_exists: |
    Section 10.10 mirrors the role Section 9.9 played in Chapter 9: it grounds the attack
    catalogue in documented production reality before the detection and defence sections build
    the controls that would have prevented each incident. The attacks in Sections 10.3-10.9 are
    not theoretical capabilities waiting for production adversaries to discover -- they are
    documented incidents that have already occurred against commercially deployed systems across
    four distinct security domains. The shared root cause across all four is the same: no
    adversarial input detection, no adversarial training, and no consistency checking. Every
    control built in Sections 10.11-10.15 is directly motivated by a specific gap in one of
    these documented incidents.
  position_in_chapter: |
    Section 10.10 is the bridge between the attack catalogue (Sections 10.3-10.9) and the
    defence architecture (Sections 10.11-10.15). It establishes that the threat is real before
    the defences are built. The detection opportunity mapping (deliverable 3) provides the
    direct link: for each incident, which Track 7 primitive would have fired.

learning_objectives:

  knowledge:
    - 'Describe four documented adversarial example incidents across physical vision, facial recognition, content moderation, and malware detection'
    - 'Identify the shared root cause across all four incidents: no adversarial detection layer, no adversarial training, no consistency checking'
    - 'Map each incident to the Chapter 10 attack section that covers the attack technique used'
    - 'State which Track 7 primitive would have detected each incident and at what stage'
    - 'Describe operator response patterns and what changed in each domain after the incidents were published'

  skills:
    - 'Produce a structured root cause analysis for an adversarial incident using the four-category framework from this section'
    - 'Map any adversarial incident to the Track 7 detection primitives that cover it'
    - 'Generate a pre-production adversarial robustness checklist derived from incident lessons'
    - 'Produce an architectural remediation comparison (before/after) for a given incident class'

  security_mindset:
    - 'Treat adversarial ML incidents as operational security events requiring root cause analysis and control improvement -- not as academic curiosities'
    - 'Recognise that adversarial ML is not only an LLM concern: malware classifiers, fraud detectors, and physical vision systems are all affected'
    - 'Understand that the correct incident response adds a detection layer (Track 7) in addition to model updates -- model-only responses leave the next attack variant uncovered'

prerequisites:
  - 'Sections 10.3-10.9: the complete attack catalogue (each incident maps to one or more of these sections)'
  - 'Section 10.8: physical adversarial patches (stop sign and glasses incidents)'
  - 'Section 10.9: text adversarial attacks (content moderation incident)'
  - 'Section 10.2: adversarial taxonomy (each incident occupies specific taxonomy cells)'

prose_content:

  part_1:
    title: 'From Academic Papers to Production Systems'
    body: |
      The adversarial ML research field moved rapidly from demonstrating attacks in controlled
      settings (Szegedy et al. 2013, Goodfellow et al. 2014) to demonstrating attacks against
      production-grade deployed systems. The transition matters because it shifts the threat
      from "this is possible in principle" to "this has already happened to systems like yours."

      Section 10.10 documents four incidents where adversarial example techniques from the
      academic literature were demonstrated against commercially deployed or commercially
      representative systems. The incidents span four security domains: physical vision systems
      (autonomous vehicle stop sign detection), biometric access control (facial recognition),
      content moderation (LLM and text safety classifiers), and classical malware detection
      (antivirus PE binary classifiers). The diversity of domains is itself the key lesson:
      adversarial ML is not a risk specific to large language models or to image classifiers --
      it applies wherever a learned classifier operates on inputs that an adversary controls.

      Each incident is analysed using the same four-category root cause framework: missing
      adversarial training, missing input-side detection, missing prediction consistency
      checking, and missing complementary non-ML controls. Across all four incidents, the
      same categories are absent. The controls built in Sections 10.11-10.15 directly address
      each root cause. The detection opportunity mapping in deliverable 3 of this section
      shows precisely which Track 7 primitive would have detected each incident, at what
      stage in the inference pipeline, and with what probability.

  part_2:
    title: 'Incident 1: Stop Sign Attack Against Autonomous Vehicle Detectors'
    body: |
      Eykholt, Evtimov, Fernandes, Li, Rahmati, Xiao, Prakash, Kohno, and Song (2018)
      demonstrated in "Robust Physical Perturbations in the Real World" that black-and-white
      stickers placed on stop signs caused YOLO v2 and Faster RCNN detectors to misclassify
      stop signs as 45 mph speed limit signs at distances up to 30 metres under varied lighting
      and viewing angles. The attack used the Expectation over Transformation (EOT) optimisation
      introduced in Section 10.8.

      The attack mechanism: a stop sign with stickers covering approximately 2% of its visible
      surface caused YOLO misclassification rates of 100% in poster-board conditions and 84.8%
      in drive-by tests at posted speed. The stickers were camouflaged as graffiti -- visually
      inconspicuous to human drivers. No API access was required: the attack operated entirely
      in the physical environment before any digital processing.

      Root cause analysis. The deployed detectors had no adversarial training on patch-augmented
      images: the training distribution contained no examples of stop signs with adversarially
      optimised sticker patterns. There was no input-side anomaly detection for the camera
      pipeline: no mechanism to flag regions of the captured image with texture statistics
      inconsistent with natural sign surfaces. There was no multi-sensor redundancy: the system
      relied on a single optical camera without supplemental LIDAR or radar confirmation. There
      was no temporal consistency requirement: a sign that was classified inconsistently across
      multiple frames was not flagged.

      Detection opportunity: the patch detector from Section 10.8 computes texture anomaly scores
      for localised image regions. The sticker pattern has spatial frequency content inconsistent
      with the natural sign surface -- the anomaly score would flag the sticker region before the
      object classifier produces its output. Temporal consistency checking (the same sign should
      classify consistently across three consecutive frames) would reduce misclassification
      rate to near zero at the cost of one additional frame of latency.

  part_3:
    title: 'Incident 2: Adversarial Glasses Bypassing Facial Recognition'
    body: |
      Sharif, Bhagavatula, Bauer, and Reiter (2016) demonstrated in "Accessorize to a Crime:
      Real and Stealthy Attacks on State-of-the-Art Face Recognition" that printed adversarial
      patterns on eyeglass frames could cause commercial face recognition systems to
      misidentify the wearer as a different target identity with 100% targeted attack success
      in lab conditions, degrading to 88% in physical wear conditions with lighting variation.

      The attack mechanism: the printed pattern on the glasses frames was optimised against a
      face recognition system using gradient descent on the classification loss. Wearing the
      printed glasses caused the system to output a target identity (an impersonation attack)
      or to fail to recognise the wearer (a dodging attack) without raising any liveness or
      anomaly alerts. The physical deployment required no API access: the glasses were worn
      in the normal access control scenario.

      Komkov and Petiushko (2021) extended this to hat-based adversarial patches against
      person re-identification models, demonstrating that the attack surface extends to any
      wearable item in the camera''s field of view.

      Root cause analysis. The deployed system had no adversarial training on face images
      with adversarial patch accessories -- the training distribution contained real glasses
      frames and natural accessories, not EOT-optimised adversarial patterns. There was no
      spatial anomaly detection for the face region: no mechanism to flag glasses frames
      with unusual texture frequency content. There was no multi-modal verification:
      infrared or 3D depth cameras would be unaffected by optical adversarial patterns
      designed for RGB classifiers.

      Detection opportunity: the spatial anomaly detector from Section 10.8 applied to
      the glasses/accessories region of the face image would flag the adversarial pattern
      texture. A paired RGB + infrared capture where the face is classified consistently
      under both modalities would resist any attack optimised for a single spectral range.

  part_4:
    title: 'Incident 3: Content Moderation Evasion via Adversarial Text'
    body: |
      Jain, Schwarzschild, Wen, Kagklis, Wang, Goldblum, and Goldstein (2023), and separately
      Zou, Wang, Kolter, and Fredrikson (2023), demonstrated universal adversarial suffixes that
      bypass LLM safety alignment and content moderation classifiers. Zou et al. found that
      fixed adversarial suffixes appended to harmful prompts caused aligned LLMs (GPT-4, Claude,
      Llama 2) to produce content that their safety training was designed to prevent. The
      suffixes were found via an automated optimisation process analogous to the universal
      trigger search in Section 10.9.

      The attack mechanism: an adversarial suffix of approximately 20 tokens, appended to a
      harmful user prompt, caused the model to begin its response with an affirmative pattern
      that bypassed the safety classifier''s detection threshold. The suffix was transferable
      across models: a suffix found against one model transferred to others at significant
      rates, indicating shared structural vulnerabilities in safety classifier training.

      Earlier work by Garg and Ramakrishnan (2020) demonstrated that BERT-based hate speech
      and sentiment classifiers could be evaded at 70-88% rates using TextFooler-style
      synonym substitution, with adversarial examples that were rated as natural by human
      evaluators at 79% agreement rates.

      Root cause analysis. The safety classifiers in deployed LLMs had no adversarial training
      against suffix-based attacks: the RLHF safety training optimised against human red-team
      prompts and natural harmful content, not against gradient-optimised adversarial suffixes.
      There was no semantic consistency checking: the same request paraphrased without the
      adversarial suffix would be classified as harmful, but the system did not run consistency
      checks before responding. There was no per-request adversarial suffix detection.

      Detection opportunity: the semantic consistency check from Section 10.12 extended to
      text (back-translation or paraphrase with BERT) would catch adversarial suffix attacks --
      the harmful prompt without the suffix classifies differently from the harmful prompt with
      the suffix, and the check flags this inconsistency. Universal adversarial triggers that
      are removed or modified by paraphrase lose their adversarial property.

  part_5:
    title: 'Incident 4: Adversarial Malware Evading Antivirus ML Classifiers'
    body: |
      Grosse, Papernot, Manoharan, Backes, and McDaniel (2017) demonstrated adversarial
      perturbations to Android malware feature vectors that caused an ML-based malware
      classifier to misclassify malicious applications as benign. The attack operated in
      feature space (modifying Android manifest features) under an L0 constraint: only
      features that could be added to the malware without removing its core malicious
      functionality were modified.

      Demetrio, Biggio, Lagorio, Roli, and Armando (2021) demonstrated the GAMMA attack
      against PE (Portable Executable) Windows binary classifiers: adversarial perturbations
      to PE sections (appending benign content to the overlay section, modifying import
      table entries) that caused MalConv and other gradient-based PE classifiers to produce
      benign classifications while preserving the binary''s full malicious execution behaviour.
      The attack operated under a functionality-preserving L0 constraint -- only byte regions
      that do not affect execution were modified.

      Root cause analysis. The deployed antivirus ML classifiers had no adversarial training
      on functionality-preserving adversarial PE binaries: the training distribution was clean
      malware and benign software samples, not adversarially perturbed malware. There was no
      feature consistency checking: the same binary analysed with a static feature squeezer
      (feature normalisation, section stripping) would likely still be classified as malicious,
      but no such check was applied. There was no ensemble classification: agreement across
      multiple independent classifiers with different feature representations would reduce the
      adversarial example success rate.

      Detection opportunity: the feature squeezing analogue for structured data (normalise PE
      section content, strip overlay content, hash-normalise import table) would reduce the
      adversarial perturbation surface. Consistency checking across multiple PE classifiers
      with different feature representations (byte n-gram, API call sequence, control flow)
      catches adversarial perturbations that fool one feature representation but not others.

  part_6:
    title: 'Root Cause Synthesis: The Four Missing Controls'
    body: |
      Across all four incidents, the root cause analysis produces the same four missing
      control categories. This convergence is not coincidental -- it reflects the fundamental
      structure of the adversarial ML defence problem.

      Missing control 1 -- Adversarial training: no incident system had been trained on
      adversarial examples. All four systems were trained on natural data distributions without
      adversarially augmented examples. Adversarial training (Section 10.15) directly addresses
      this gap: the inner training loop generates adversarial examples and the model is trained
      to classify them correctly, producing models with empirically higher robustness to the
      attack families represented in training.

      Missing control 2 -- Input-side adversarial detection: none of the four systems had a
      pre-inference stage that detected adversarial perturbations before the classifier saw the
      input. Feature squeezing (Section 10.11), patch localisation (Section 10.8), and Unicode
      anomaly detection (Section 10.9) are the input-side primitives. They operate before
      model inference and reduce the adversarial attack success rate independently of model
      robustness.

      Missing control 3 -- Prediction consistency checking: none of the four systems verified
      that the classifier''s output was stable under small input variations (digital) or
      under paraphrase/back-translation (text). Consistency checking (Section 10.12) catches
      adversarial examples that are fragile -- those that exist near the decision boundary and
      lose their adversarial property under small input perturbation.

      Missing control 4 -- Non-ML complementary controls: three of the four incidents
      (all physical and malware) were exploited partly because the deployed system had no
      non-ML complementary control. Multi-sensor fusion (LIDAR + optical for autonomous
      vehicles), infrared imaging (facial recognition), and multi-classifier ensemble agreement
      (malware detection) would all have reduced incident success rates. The adversary optimised
      against a single classifier; a two-layer system with independent failure modes is
      significantly harder to attack simultaneously.

  part_7:
    title: 'Operator Response Patterns and Production Lessons'
    body: |
      Operator responses to adversarial ML incidents have followed three patterns, with varying
      effectiveness.

      Model-only response: retrain the model on adversarial examples from the specific incident
      attack type. This is the most common first response and the least durable: the retrained
      model is more robust to the specific attack variant that was published, but an adversary
      who encounters the updated model will adapt to a different attack variant. The stop sign
      attack and adversarial glasses papers were followed by new adversarial examples that
      bypassed the improved models.

      Detection layer addition: add an input-side anomaly detector (texture analysis for
      physical patches, Unicode filtering for text attacks) as a pre-inference stage. This is
      more durable than model-only response because it operates independently of the model''s
      decision boundary. Even if the adversary crafts a new attack variant, the detection layer
      does not need to be retrained for the specific attack -- it detects the structural
      properties (spatial texture anomaly, non-ASCII characters) that all variants share.

      Architecture change: replace single-sensor or single-classifier design with
      multi-sensor or multi-classifier ensemble. This is the most durable response because it
      changes the attack surface fundamentally: an adversary who optimised against one
      component must now optimise against multiple independent components simultaneously.
      The automotive industry''s adoption of multi-sensor fusion (LIDAR + radar + camera)
      after the adversarial stop sign research is an example of this response.

      The production lesson: incident response should add detection layers and architecture
      controls, not only update models. Model updates address the specific attack; detection
      layers and architecture changes address the attack class. A pre-production adversarial
      robustness checklist (deliverable 5) that requires Track 7 detection coverage before
      deployment would have prevented all four incidents in this section.

