  deliverable_4:
    title: 'Architectural Remediation Comparison'
    filename: 'architectural_remediation.py'
    description: 'Before/after architecture comparison for each incident class: vulnerable deployment vs Track 7-defended deployment with specific controls addressing each root cause'
