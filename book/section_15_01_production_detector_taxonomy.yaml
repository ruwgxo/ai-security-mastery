section_overview:
  one_line_summary: |-
    A deployed gateway and a populated gateway are different things: Part 3 built and deployed the gateway, and Part 4 ships the detectors that run in it. Section 15.01 is the map of that suite -- six hybrid detectors, one unified API, and one quality bar -- so every following section builds a named detector against a shared contract rather than a standalone tool.
  why_this_section_exists: |-
    Part 3 ended with the production detection gateway: the behavioural monitoring architecture of Chapter 13 engineered for latency, failure, availability, observability, and cost, deployed as a running service. That gateway is deployed and empty. It has the hooks where detection runs, the latency budget detection must fit, and the failure policy detection runs under, but it does not yet contain the detectors themselves. Part 4 fills it, and Chapter 15 builds the core suite.

    This section is the anchor for the chapter, mirroring the taxonomy anchors of 12.01, 13.01, and 14.01. It makes three commitments that every following section honours. First, the suite is six detectors -- injection, jailbreak, PII, toxicity, exfiltration, and the combined pipeline -- each mapped to a detection concept from Chapters 12 and 13 made concrete. Second, every detector is a hybrid of pattern matching and ML, the Chapter 11 layered-detection principle applied inside a single detector. Third, every detector implements one unified API and is held to one quality bar, so the six become a coherent, configurable, tested suite rather than a pile of scripts. State these once here and the rest of the chapter is a deliberate build against them.
  position_in_chapter: |-
    Section 15.01 is the taxonomy anchor for the seven sections that follow. It is the map that makes each detector section (15.02-15.06) a response to a named entry in the suite, makes the pipeline section (15.07) the orchestration of a contract defined here, and makes the summary (15.08) a synthesis of a structure set out here. The unified API contract and the quality bar introduced in this section are the two artifacts every subsequent section depends on.
learning_objectives:
  knowledge:
  - Explain why Part 4 builds concrete detectors on the Part 3 deployed gateway and what distinguishes
    a deployed gateway from a populated one
  - Name the six detectors in the suite and the Chapter 12 or 13 detection concept each one makes concrete
  - Explain why every detector is a hybrid of pattern matching and ML rather than one or the other, and
    connect this to the Chapter 11 layered-detection principle
  - State the quality bar -- 95%+ accuracy, sub-50ms latency, sub-5% false-positive rate -- and why each
    of the three matters independently
  - Describe the unified detector API contract and why a shared contract is what turns six detectors into
    one suite
  - Explain why the false-positive rate is a first-class metric and where in the suite over-flagging is
    most disruptive
  - Describe the Chapter 15 roadmap from the five hybrid detectors to the orchestrating pipeline to the
    summary
  skills:
  - Produce a detector taxonomy that maps each detector to its detection concept, its hybrid layers, and
    the surface it scans
  - Read and implement the unified detector API contract -- DetectionContext in, DetectorResult out
  - Apply the quality bar to a detector metrics record and explain which of the three targets a detector
    fails
  - Read the Chapter 15 roadmap as a deliberate progression rather than a list of tools
  security_mindset:
  - Recognise that a deployed gateway is empty until detectors populate it, and building those detectors
    is a distinct body of work from deploying the gateway
  - Internalise that a production detector is a hybrid because pattern matching and ML each cover exactly
    what the other misses
  - Understand that the quality bar is three targets held together -- accuracy, latency, and false positives
    -- and failing any one makes a detector unshippable
  - Appreciate that a shared unified API is the difference between a suite and a pile of scripts, because
    orchestration, configuration, and testing all ride on it
