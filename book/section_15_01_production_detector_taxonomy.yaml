    title: Chapter 15 Detector-to-Section Roadmap
    filename: chapter_15_roadmap.py
    description: |-
      The chapter roadmap as data: each section with the detector or synthesis it builds, so the chapter reads as a deliberate progression from the five hybrid detectors to the orchestrating pipeline to the summary rather than a list of tools.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, dataclasses from the standard library only. The roadmap is a list of RoadmapEntry records mirroring table_4 so the reference table and the runnable roadmap stay in sync.
    code: |
      # chapter_15_roadmap.py
      # Section 15.01: Chapter 15 Detector-to-Section Roadmap
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # Reads the chapter as a deliberate progression: five hybrid detectors, then
      # the pipeline that orchestrates them, then the summary. Each section is a
      # response to one detector in the taxonomy, not a standalone topic.

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class RoadmapEntry:
          section: str
          title: str
          builds: str


      ROADMAP: List[RoadmapEntry] = [
          RoadmapEntry('15.01', 'Production Detector Taxonomy',
                       'The suite map, the unified API, and the quality bar'),
          RoadmapEntry('15.02', 'Prompt Injection Detector',
                       'Regex-plus-ML hybrid for instruction override'),
          RoadmapEntry('15.03', 'Jailbreak Detector',
                       'Pattern-plus-classification with the session signal'),
          RoadmapEntry('15.04', 'PII Scanner',
                       'Regex for structured PII, NER for unstructured'),
          RoadmapEntry('15.05', 'Toxicity Detector',
                       'Hosted baseline plus custom domain models'),
          RoadmapEntry('15.06', 'Data Exfiltration Detector',
                       'Output analysis plus aggregate rate/coverage signals'),
          RoadmapEntry('15.07', 'Combined Detection Pipeline',
                       'Orchestration of the six via the unified API'),
          RoadmapEntry('15.08', 'Chapter Summary',
                       'Synthesis, quiz, checklist, and Chapter 16 preview'),
      ]


      def print_roadmap() -> None:
          for e in ROADMAP:
              print(f'{e.section}  {e.title}')
              print(f'        {e.builds}')


      if __name__ == '__main__':
          print_roadmap()
common_mistakes:
  mistake_1:
    description: |-
      Treating the Chapter 14 deployed gateway as a working detection system and expecting it to catch attacks before any detector is built
    why_it_happens: |-
      The deployed gateway is a running service with hooks, a latency budget, a failure policy, and observability, so it reads as complete. The distinction between the place detection runs and the detection itself is easy to lose once the infrastructure is up and green.
    consequence: |-
      The gateway is deployed and passes health checks while catching nothing, because its hooks are wired to no detector. The gap is discovered only when a real attack passes through untouched.
    correct_approach: |-
      Treat the deployed gateway as 100% complete as infrastructure and empty as a detection capability, and build the six detectors of Chapter 15 to populate it. The gateway detects nothing until the suite runs in its hooks.
  mistake_2:
    description: |-
      Building each detector as pattern-only or ML-only rather than a hybrid, choosing one layer for simplicity
    why_it_happens: |-
      A single-layer detector is simpler to build and reason about. Pattern-only feels precise and fast; ML-only feels comprehensive. Each looks adequate against the attacks the builder happens to test.
    consequence: |-
      The pattern-only detector is blind to any paraphrase of a known attack; the ML-only detector is slower and noisier on the known attacks a signature would have caught cleanly, and often misses the latency bar. Either way the detector fails on the half of the threat surface its single layer does not cover.
    correct_approach: |-
      Build every content detector as a hybrid: a pattern layer for precision and near-zero latency on the known, an ML layer for coverage of the novel, combined into one verdict. This is the Chapter 11 layered-detection principle applied inside a single detector.
  mistake_3:
    description: |-
      Optimising a detector for accuracy alone and ignoring latency and false positives until deployment
    why_it_happens: |-
      Accuracy is the metric detection work naturally centres on, and it is the one reported in papers and benchmarks. Latency and false positives feel like operational details to handle later.
    consequence: |-
      An accurate but slow detector gets moved off the hot path where it can no longer block; an accurate but noisy detector gets disabled by an operations team it disrupts. In both cases a detector that scored well on accuracy stops protecting anything.
    correct_approach: |-
      Hold every detector to the full quality bar -- accuracy, latency, and false-positive rate together -- from the start. A detector that misses any one of the three is not production-grade, and the false-positive rate is a first-class target, not a footnote to accuracy.
  mistake_4:
    description: |-
      Giving each detector its own bespoke interface and return shape rather than a shared unified API
    why_it_happens: |-
      Each detector is built in its own section and it is natural to return whatever shape is convenient for that detector -- a boolean here, a score there, a custom object elsewhere. The cost of divergence is not visible until the pipeline tries to combine them.
    consequence: |-
      The combined pipeline has to special-case every detector, configuration is written per detector, and the test framework cannot run uniformly. Six detectors stay six tools instead of becoming one suite, and adding a seventh means rewriting the orchestration.
    correct_approach: |-
      Define the unified API contract once -- detect(ctx) -> DetectorResult -- and implement it in every detector. The shared contract is what lets the pipeline orchestrate uniformly and lets configuration and testing apply across the suite.
  mistake_5:
    description: |-
      Reinventing detection theory in Chapter 15 instead of making concrete the classifiers and signals already built in Chapters 11 through 13
    why_it_happens: |-
      Starting the implementation chapter can feel like a fresh start, and it is tempting to design new detection approaches rather than wire up the existing ones. The earlier chapters can fade from view once code-writing begins.
    consequence: |-
      Effort goes into re-deriving detection approaches that Chapters 12 and 13 already established and validated, the new approaches are untested against the corpora the earlier work used, and the chapter drifts from concretion into unplanned research.
    correct_approach: |-
      Treat Chapter 15 as the concretion step: take the Chapter 12 classifiers, the Chapter 13 signals, and the Chapter 11 layering principle and ship them as running, tested detectors. Each detector maps to a named concept from the detection chapters, and that mapping is the design.
section_summary:
  compact: |-
    Section 15.01 anchors Part 4 by mapping the production detector suite built on the Chapter 14 deployed gateway. A deployed gateway and a populated gateway are different artifacts: Chapter 14 built the hooks, the latency budget, and the failure policy, and Part 4 ships the detectors that run in them. The suite is six detectors -- injection, jailbreak, PII, toxicity, exfiltration, and the combined pipeline -- each mapped to a Chapter 12 or 13 detection concept made concrete, each a hybrid of a pattern layer for the known and an ML layer for the novel, the Chapter 11 layered-detection principle applied inside a single detector. Every detector implements one unified API -- detect(ctx) -> DetectorResult with verdict, score, confidence, latency_ms, and evidence -- so the combined pipeline can orchestrate them uniformly and configuration and testing apply across the suite. Every detector is held to one quality bar -- 95%+ accuracy, sub-50ms latency, sub-5% false positives -- three targets held together, where the false-positive rate is first-class because a noisy detector is disabled regardless of accuracy. The chapter then builds the five detectors and the orchestrating pipeline, each a response to a named entry in this taxonomy.
  key_takeaways:
  - A deployed gateway is empty until detectors populate it; Chapter 14 built the infrastructure and Part
    4 ships the detectors that run in it
  - The suite is six detectors, each making concrete a Chapter 12 or 13 detection concept rather than
    introducing new detection theory
  - Every content detector is a hybrid -- a pattern layer for precision on the known, an ML layer for
    coverage of the novel -- the Chapter 11 principle inside one detector
  - The unified API, detect(ctx) -> DetectorResult, is what turns six detectors into one suite the pipeline
    can orchestrate and configuration and testing can span
  - The quality bar is three targets held together -- 95%+ accuracy, sub-50ms latency, sub-5% false positives
    -- and a detector missing any one is not production-grade
  - The false-positive rate is a first-class metric because a noisy detector is disabled regardless of
    its true-positive rate, biting hardest on the PII and toxicity detectors
