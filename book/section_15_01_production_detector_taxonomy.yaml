deliverables:
  deliverable_1:
    title: The Production Detector Taxonomy
    filename: production_detector_taxonomy.py
    description: |-
      The six-detector suite as data: each detector with the detection concept it makes concrete, its pattern and ML layers, the surface it scans, and its primary false-positive risk. No detection runs here -- this is the map that Sections 15.02-15.07 populate.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, dataclasses from the standard library only. The suite is a list of DetectorSpec records so it can be iterated, printed, and cross-checked against the sections that build each one.
    code: |
      # production_detector_taxonomy.py
      # Section 15.01: Production Detector Taxonomy
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # The six-detector suite mapped to the detection concept each makes concrete,
      # the hybrid pattern-plus-ML approach, and the quality bar. No detection runs
      # here -- this is the map that Sections 15.02-15.07 populate.

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class DetectorSpec:
          name: str
          section: str
          filename: str
          detection_concept: str          # the Chapter 12/13 concept it makes concrete
          pattern_layer: str              # what the regex/signature layer catches
          ml_layer: str                   # what the model layer catches
          scans: List[str]                # 'input', 'output', or both
          primary_fp_risk: str            # where over-flagging hurts most


      SUITE: List[DetectorSpec] = [
          DetectorSpec(
              name='Prompt Injection',
              section='15.02',
              filename='prompt_injection_detector.py',
              detection_concept='Chapter 12 injection classifier made concrete',
              pattern_layer='Known instruction-override phrasings and injection signatures',
              ml_layer='Novel, paraphrased, and disguised injection attempts',
              scans=['input'],
              primary_fp_risk='Benign text that quotes or discusses instructions',
          ),
          DetectorSpec(
              name='Jailbreak',
              section='15.03',
              filename='jailbreak_detector.py',
              detection_concept='Chapter 12 jailbreak classifier plus Chapter 13 session signal',
              pattern_layer='Known jailbreak templates and role-play framings',
              ml_layer='Novel framings that evade fixed templates',
              scans=['input'],
              primary_fp_risk='Legitimate role-play and creative-writing requests',
          ),
          DetectorSpec(
              name='PII Scanner',
              section='15.04',
              filename='pii_scanner.py',
              detection_concept='Chapter 12 Section 12.09 PII output scanning extended two-sided',
              pattern_layer='Structured PII: emails, cards, SSNs, phone numbers',
              ml_layer='Unstructured PII via NER: names, locations, organisations',
              scans=['input', 'output'],
              primary_fp_risk='Common names and place words flagged as personal data',
          ),
          DetectorSpec(
              name='Toxicity',
              section='15.05',
              filename='toxicity_detector.py',
              detection_concept='Hosted classification baseline plus custom domain models',
              pattern_layer='Hosted toxicity classification as maintained baseline',
              ml_layer='Custom models for domain-specific and context-dependent toxicity',
              scans=['input', 'output'],
              primary_fp_risk='Context-dependent content benign in its actual context',
          ),
          DetectorSpec(
              name='Data Exfiltration',
              section='15.06',
              filename='exfiltration_detector.py',
              detection_concept='Output analysis plus Chapter 13 rate/coverage and 13.06 canaries',
              pattern_layer='Sensitive-content rules and canary/honeytoken hits',
              ml_layer='Aggregate rate and coverage signals across requests',
              scans=['output'],
              primary_fp_risk='Legitimate responses that echo sensitive-looking strings',
          ),
          DetectorSpec(
              name='Combined Pipeline',
              section='15.07',
              filename='combined_detection_pipeline.py',
              detection_concept='Orchestration of the five detectors via the unified API',
              pattern_layer='n/a -- orchestrates the detectors above',
              ml_layer='n/a -- orchestrates the detectors above',
              scans=['input', 'output'],
              primary_fp_risk='Verdict-combination logic that over-escalates any one hit',
          ),
      ]


      def print_suite() -> None:
          for spec in SUITE:
              print(f'{spec.section}  {spec.name}  ({spec.filename})')
              print(f'    concept : {spec.detection_concept}')
              print(f'    pattern : {spec.pattern_layer}')
              print(f'    ml      : {spec.ml_layer}')
              print(f'    scans   : {", ".join(spec.scans)}')
              print(f'    fp risk : {spec.primary_fp_risk}')
              print()


      if __name__ == '__main__':
          print_suite()
  deliverable_2:
    title: The Unified Detector API Contract
    filename: detector_api_contract.py
    description: |-
      The one contract every detector in the suite implements: a Detector base class with a single detect method taking a DetectionContext and returning a DetectorResult with verdict, score, confidence, latency_ms, and evidence. This is the artifact the combined pipeline of Section 15.07 orchestrates against and the shape every detector section 15.02-15.06 implements.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, abc and dataclasses from the standard library only. Verdict is a three-value enum (allow, flag, block). A small _Timed helper shows how detectors populate latency_ms so the quality bar can be measured. ExampleAllowAll is a reference implementation of the contract shape, not a working detector.
    code: |
      # detector_api_contract.py
      # Section 15.01: The Unified Detector API Contract
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # The one contract every detector in the suite implements. Because all six
      # share this shape, the combined pipeline (15.07) orchestrates them uniformly
      # and configuration and testing apply across the suite.

      from abc import ABC, abstractmethod
      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Any, Dict, List, Optional
      import time


      class Verdict(Enum):
          ALLOW = 'allow'          # nothing detected
          FLAG = 'flag'            # suspicious, surface for review, do not block
          BLOCK = 'block'          # high-confidence detection, block the request


      @dataclass
      class DetectionContext:
          # Everything a detector needs to make one decision.
          request_id: str
          text: str                                   # the input or output under inspection
          surface: str = 'input'                      # 'input' or 'output'
          session_id: Optional[str] = None            # for detectors that use session state
          metadata: Dict[str, Any] = field(default_factory=dict)


      @dataclass
      class Evidence:
          # One piece of support for a verdict -- a rule hit or a model score.
          source: str                                 # 'pattern' or 'ml' or 'aggregate'
          label: str                                  # what fired, e.g. 'instruction_override'
          detail: str = ''                            # human-readable context


      @dataclass
      class DetectorResult:
          # The single return type of every detector in the suite.
          detector: str                               # detector name, e.g. 'prompt_injection'
          verdict: Verdict
          score: float                                # 0.0-1.0 detection strength
          confidence: float                           # 0.0-1.0 confidence in the score
          latency_ms: float                           # wall-clock time this detector took
          evidence: List[Evidence] = field(default_factory=list)


      class Detector(ABC):
          # The unified API. One method, one return type, for all six detectors.

          name: str = 'detector'

          @abstractmethod
          def detect(self, ctx: DetectionContext) -> DetectorResult:
              # Inspect ctx and return a DetectorResult. Must set latency_ms.
              raise NotImplementedError


      class _Timed:
          # Helper: detectors wrap their body in this to populate latency_ms.

          def __enter__(self):
              self._start = time.perf_counter()
              return self

          def __exit__(self, *exc):
              self.elapsed_ms = (time.perf_counter() - self._start) * 1000.0
              return False


      class ExampleAllowAll(Detector):
          # Reference implementation showing the contract shape only.

          name = 'example'

          def detect(self, ctx: DetectionContext) -> DetectorResult:
              with _Timed() as t:
                  pass  # a real detector runs its pattern layer then its ML layer here
              return DetectorResult(
                  detector=self.name,
                  verdict=Verdict.ALLOW,
                  score=0.0,
                  confidence=1.0,
                  latency_ms=t.elapsed_ms,
                  evidence=[],
              )


      if __name__ == '__main__':
          d = ExampleAllowAll()
          r = d.detect(DetectionContext(request_id='r1', text='hello'))
          print(r.detector, r.verdict.value, r.score, f'{r.latency_ms:.3f}ms')
  deliverable_3:
    title: The Quality Bar
    filename: quality_bar.py
    description: |-
      The quality bar as code: a frozen QualityBar with the three thresholds, a DetectorMetrics record, and meets_bar and explain functions that hold a detector to all three targets at once and name which it fails. Every detector section validates against this.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, dataclasses from the standard library only. The default QualityBar encodes 95%+ accuracy, sub-50ms p99 latency, and sub-5% false-positive rate. explain returns the specific target(s) missed so a failing detector produces an actionable message rather than a bare boolean.
    code: |
      # quality_bar.py
      # Section 15.01: The Quality Bar
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # The concrete bar that separates a production detector from a proof of
      # concept: 95%+ accuracy, sub-50ms latency, sub-5% false-positive rate. A
      # detector that misses any one of the three is not production-grade.

      from dataclasses import dataclass


      @dataclass(frozen=True)
      class QualityBar:
          min_accuracy: float = 0.95          # 95%+ correct verdicts
          max_latency_ms: float = 50.0        # sub-50ms per detector (Chapter 14.04 budget)
          max_false_positive_rate: float = 0.05   # sub-5% of benign flagged


      @dataclass
      class DetectorMetrics:
          accuracy: float
          p99_latency_ms: float
          false_positive_rate: float


      def meets_bar(m: DetectorMetrics, bar: QualityBar = QualityBar()) -> bool:
          return (
              m.accuracy >= bar.min_accuracy
              and m.p99_latency_ms <= bar.max_latency_ms
              and m.false_positive_rate <= bar.max_false_positive_rate
          )


      def explain(m: DetectorMetrics, bar: QualityBar = QualityBar()) -> str:
          reasons = []
          if m.accuracy < bar.min_accuracy:
              reasons.append(f'accuracy {m.accuracy:.2%} below {bar.min_accuracy:.0%}')
          if m.p99_latency_ms > bar.max_latency_ms:
              reasons.append(f'p99 {m.p99_latency_ms:.1f}ms over {bar.max_latency_ms:.0f}ms')
          if m.false_positive_rate > bar.max_false_positive_rate:
              reasons.append(f'FP {m.false_positive_rate:.2%} over {bar.max_false_positive_rate:.0%}')
          return 'meets the bar' if not reasons else 'fails: ' + '; '.join(reasons)


      if __name__ == '__main__':
          good = DetectorMetrics(accuracy=0.97, p99_latency_ms=42.0, false_positive_rate=0.03)
          noisy = DetectorMetrics(accuracy=0.99, p99_latency_ms=18.0, false_positive_rate=0.11)
          print('good :', explain(good))
          print('noisy:', explain(noisy))
