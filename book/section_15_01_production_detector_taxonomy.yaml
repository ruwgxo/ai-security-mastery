prose_content:
  part_1:
    title: 'A Deployed Gateway Is Empty: The Two-Artifact Argument, Continued'
    body: |-
      Chapter 14 ended with a running service. The production detection gateway takes the behavioural monitoring architecture of Chapter 13 and engineers it against the deployment concerns -- placement, latency, failure handling, availability, observability, cost -- so that a correct design becomes a service that survives production. It has pre-processing and post-processing hooks where detection runs. It has a latency budget that detection must fit inside. It has a failure policy that governs what happens when a detector throws. It is deployed, monitored, and affordable.

      It is also empty. The gateway is the place detection runs, not the detection itself. Its hooks are wired to nothing yet; its latency budget is spent by no detector; its failure policy protects against the failure of detectors that have not been written. Chapter 14 answered where and under what conditions detection runs. It did not build a single detector. That is Part 4, and this chapter is where the core suite gets built.

      This mirrors the two-artifact argument that opened Chapter 14, one level down. There the claim was that a logical architecture and a production service are different artifacts. Here the claim is that a deployed gateway and a populated gateway are different artifacts. A deployed gateway is complete as infrastructure and empty as a detection capability. Part 4 moves the artifact from deployed-and-empty to populated-and-detecting, and Chapter 15 builds the six detectors that do the populating. Everything in this chapter drops into the hooks Chapter 14 built, fits the budget Chapter 14 set, and runs under the policy Chapter 14 defined.
  part_2:
    title: The Six-Detector Suite and the Concept Each Makes Concrete
    body: |-
      The suite is six detectors. Five are content detectors and the sixth is the pipeline that orchestrates them, but the framing that matters is that each of the five makes concrete a detection concept that earlier chapters established in the abstract.

      The prompt injection detector (15.02) makes concrete the Chapter 12 injection classifier, wrapping it in a regex layer for the known instruction-override phrasings. The jailbreak detector (15.03) makes concrete the Chapter 12 jailbreak classifier and draws on the Chapter 13 session signal for multi-turn attempts, wrapped in a pattern layer for the known templates. The PII scanner (15.04) extends the Chapter 12 Section 12.09 output PII scanning into a two-sided scanner that combines regex for structured PII with NER for unstructured entities. The toxicity detector (15.05) combines a hosted classification baseline with custom models for the domain-specific toxicity the hosted service misses. The exfiltration detector (15.06) turns the Chapter 13 output-monitoring and canary signals of Section 13.06 into an output-analysis detector, combined with the Chapter 13 aggregate rate and coverage signals for the campaign.

      The point of this mapping is that Chapter 15 introduces almost no new detection theory. The theory is in Chapters 11 through 13. This chapter is the concretion step: it takes the classifiers, signals, and principles those chapters built and ships them as running, tested, production-grade code. A reader who has followed the detection chapters will recognise every component here; what is new is that the components are now assembled into detectors that meet a bar and share a contract.
  part_3:
    title: 'Every Detector Is a Hybrid: Patterns and ML Inside One Detector'
    body: |-
      The recurring structure of the suite is the hybrid. Every content detector has a pattern layer and an ML layer, and the two combine into one verdict. This is not an implementation accident; it is the central design claim of the chapter, and it is the Chapter 11 layered-detection principle applied inside a single detector rather than across a stack of them.

      The two layers exist because each covers what the other misses. The pattern layer -- regex, signatures, known templates -- catches the well-known attacks with high precision and near-zero latency. When an input contains a literal instruction-override phrasing, a signature match is faster and more certain than any model inference. But the pattern layer is brittle: it catches only what it has a pattern for, and an attacker who paraphrases slips past it. The ML layer covers exactly that gap. A trained classifier generalises to the novel, paraphrased, and disguised attempts the patterns never anticipated, at the cost of higher latency and lower precision on any single decision.

      A detector that used only patterns would be fast and precise and blind to novel attacks. A detector that used only ML would cover novel attacks and be slower and noisier on the known ones a signature would have caught cleanly. The hybrid takes the pattern layer as a high-confidence fast path and the ML layer as the coverage net beneath it, combining them into one verdict. Every detector in this chapter is built this way, and the reason is always the same: patterns give precision on the known, ML gives coverage of the unknown, and a production detector needs both.
  part_4:
    title: 'The Unified API: What Makes Six Detectors One Suite'
    body: |-
      Six detectors are not a suite until they share a contract. Without one, the pipeline that combines them has to know the shape of each detector individually, configuration has to be written per detector, and the test framework has to special-case every one. With one, the pipeline treats all six identically, configuration and testing apply uniformly, and adding a seventh detector is a matter of implementing the contract. The unified API is what turns a collection into a system.

      The contract this chapter uses is deliberately small. Every detector implements a single method, detect, that takes a DetectionContext and returns a DetectorResult. The DetectionContext carries the text under inspection, whether it is an input or an output, the request and session identifiers, and a metadata bag. The DetectorResult carries a verdict -- allow, flag, or block -- a score, a confidence, the latency the detector took, and a list of evidence items explaining what fired. That is the whole interface: one method, one input type, one output type.

      The small size is the point. Because every detector returns the same DetectorResult, the combined pipeline of Section 15.07 can call detect on each detector, collect the results, and combine the verdicts without knowing anything about how any individual detector reached its answer. The pattern-plus-ML internals of each detector are hidden behind the contract. The verdict enum, the score, and the evidence list are rich enough to drive orchestration and explanation, and uniform enough that orchestration never branches on detector type. This contract is defined in this section precisely because everything after it depends on it.
  part_5:
    title: 'The Quality Bar: Three Targets Held Together'
    body: |-
      A production detector is defined not only by what it detects but by how well it runs, and the quality bar states that as three concrete targets: 95%+ accuracy, sub-50ms latency, and a sub-5% false-positive rate. The bar is what separates a production detector from a proof of concept, and the three targets are held together, not traded against one another.

      Accuracy is the obvious one: a detector that is wrong more than one time in twenty does not earn trust. Latency is the Chapter 14 budget made a detector requirement: the gateway has a sub-50ms inline budget, and a detector that blows it either forces the gateway over its own budget or gets moved off the hot path where it can no longer block. The false-positive rate is the one most often neglected and the one that most reliably gets a detector disabled. A detector that flags too many legitimate requests disrupts real use, and an operations team under pressure will turn it off regardless of how many true attacks it catches. That is why the false-positive rate is a first-class metric here and not a footnote to accuracy.

      The three are held together because a detector that hits two and misses one is not production-grade. Accurate but slow gets moved off the hot path. Accurate and fast but noisy gets disabled. Fast and quiet but inaccurate misses attacks. Only a detector that meets all three at once ships and stays shipped. The false-positive target bites hardest on the PII and toxicity detectors, where the material -- names, place words, context-dependent language -- is exactly the kind that a careless detector over-flags, and where over-flagging is most disruptive to legitimate use.
  part_6:
    title: 'The Chapter Roadmap: Five Detectors, Then the Pipeline'
    body: |-
      The rest of Chapter 15 follows the taxonomy directly. The five content detectors come first, each in its own section, each built as a pattern-plus-ML hybrid against the unified API and the quality bar. Section 15.02 builds the prompt injection detector, 15.03 the jailbreak detector, 15.04 the PII scanner, 15.05 the toxicity detector, and 15.06 the exfiltration detector. Each section is self-contained: it names the detection concept it makes concrete, builds the pattern layer and the ML layer, combines them into one verdict, validates against a labelled corpus, and confirms the quality bar.

      Section 15.07 then orchestrates the five into the combined detection pipeline. Because every detector implements the unified API, the pipeline runs them uniformly -- in parallel where latency demands it, in sequence where one gates another -- combines their verdicts into one pipeline verdict, and places into the Part 3 gateway as the detector suite that gateway deploys. The same section adds configuration management and a testing framework that apply across the whole suite, so the six are configured and tested as one system. Section 15.08 synthesises the chapter and previews Chapter 16, where the deployed suite is integrated with SIEM platforms so its detections flow into security operations tooling.

      Read the roadmap as a single arc. The taxonomy in this section is the destination in miniature: six detectors, one contract, one bar. Every following section fills in one part of that picture, and by the end of the chapter the deployed-but-empty gateway of Chapter 14 is a populated, detecting, tested production system.
