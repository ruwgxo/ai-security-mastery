section_overview:
  one_line_summary: |
    Model inversion is the most consequential privacy attack: by optimising an
    input to maximise a classifier''s confidence on a target class, or by
    exploiting perplexity signals in LLMs, an adversary reconstructs training
    data content that the model memorised -- demonstrated by Fredrikson et al.
    2015 with face reconstruction and Carlini et al. 2021 with verbatim GPT-2
    training text including personal information.

  why_this_section_exists: |
    Section 9.6 answered "was this record in the training set?" Section 9.7
    answers "what does that record contain?" Together the two attacks form the
    complete privacy arc: membership inference identifies high-probability
    training members; model inversion reconstructs their content from the model''s
    query outputs. The consequence of a successful combined attack is the
    recovery of training data that the operator never intended to expose through
    the deployed model''s API.

    The Fredrikson et al. 2015 result established that face recognition APIs leak
    facial images of training subjects through their confidence scores. The
    Carlini et al. 2021 result established that large language models memorise and
    can be made to reproduce verbatim training text -- including names, email
    addresses, phone numbers, and copyrighted content -- through carefully designed
    prompt strategies combined with perplexity-based filtering. These are not
    theoretical demonstrations: they were executed against production-scale models
    with documented query budgets and reproducible methodology.

    Section 9.7 builds both the image classifier inversion PoC and the LLM
    training data extraction demonstration, establishes memorisation as the
    necessary precondition for inversion success, and closes the privacy arc
    with the same two-layer defence as Section 9.6: differential privacy training
    as the upstream formal bound and output perturbation as the downstream
    signal-reduction control. The section also surfaces the GitHub Copilot
    memorisation controversy as the most commercially significant inversion
    incident documented to date.

  position_in_chapter: |
    Section 9.7 of 13. Closes the two-section privacy arc (9.6 membership
    inference, 9.7 model inversion). Both privacy attacks share the inference
    surface and the defence architecture. Section 9.7 is the most consequential
    attack in Chapter 9 in terms of data exposure severity. Section 9.8 shifts
    to the economic abuse attack class; Section 9.9 reconstructs the real-world
    incident that combines extraction and inversion.

learning_objectives:
  knowledge:
    - 'Explain the model inversion attack: how optimising an input against a classifier''s confidence reconstructs training data'
    - 'Describe Fredrikson et al. 2015: face reconstruction from face recognition API confidence scores'
    - 'Distinguish gradient-based (white-box) inversion from black-box query-based inversion'
    - 'Explain the Carlini et al. 2021 LLM training data extraction: perplexity-ratio filtering of generated text'
    - 'Articulate memorisation as the necessary precondition: only highly memorised samples are reconstructable'
    - 'Describe how differential privacy training bounds inversion fidelity'

  skills:
    - 'Implement black-box model inversion against a binary classifier using zeroth-order optimisation'
    - 'Implement gradient-based inversion against the same classifier and compare fidelity'
    - 'Build a perplexity-based training data extraction pipeline in the Carlini et al. style'
    - 'Measure per-sample memorisation degree using the train-test loss gap'
    - 'Construct a sensitive data inversion threat model for a given deployment'

  security_mindset:
    - 'Internalise that memorisation is the precondition: the attack cannot reconstruct what the model has not memorised'
    - 'Recognise that LLM memorisation is pervasive by default -- large models trained on internet data memorise extensive personal information'
    - 'Understand that DP training is the only defence that formally bounds inversion fidelity; perturbation alone is insufficient'
    - 'Appreciate that the GitHub Copilot and GPT-2 extractions are existence proofs that production models at scale exhibit this vulnerability'

prerequisites:
  - 'Section 9.6: membership inference (precursor attack; inversion targets identified members)'
  - 'Chapter 1: overfitting and memorisation (memorisation is the inversion precondition)'
  - 'Chapter 2: gradient computation, loss functions, optimisation (gradient-based inversion)'
  - 'Chapter 3: LLM perplexity and token probability (Carlini et al. perplexity signal)'
  - 'Chapter 8 Section 8.13: differential privacy training (upstream defence shared with Section 9.6)'

prose_content:

  - part: 1
    title: 'From Membership to Content: The Privacy Arc Completes'
    body: |
      Section 9.6 established the membership signal: high confidence and low loss
      are evidence that a record was in the training set. Model inversion extends
      this observation from identification to reconstruction. If high confidence
      on a target class indicates membership, then the input that achieves the
      highest confidence on that class is the model''s best estimate of what a
      member of that class looks like -- a reconstruction of the training data
      distribution that the model has encoded in its parameters.

      The formal framing is an optimisation problem. Given a model f and a target
      class c, the adversary finds:

          x* = argmax_x  f(x)[c]

      The solution x* is the input that the model assigns the highest probability
      to belonging to class c. If the model has memorised specific training examples
      from class c, the optimisation converges toward those examples rather than
      toward the generic class centroid. The adversary has reconstructed training
      data content -- not by accessing the training set directly, but by inverting
      the model''s learned representation.

      The severity of this attack compared to membership inference is qualitative,
      not just quantitative. Membership inference leaks the fact of inclusion.
      Model inversion leaks the content. For a face recognition system trained on
      identifiable individuals, inversion reconstructs their faces. For a medical
      classifier, inversion reconstructs the clinical features of training patients.
      For an LLM, inversion reconstructs the verbatim text -- including personal
      identifiers, contact information, and copyrighted material -- that appeared
      in the training corpus.

  - part: 2
    title: 'Fredrikson et al. 2015: Face Reconstruction from a Face Classifier'
    body: |
      The Fredrikson et al. 2015 paper "Model Inversion Attacks that Exploit
      Confidence Information and Basic Countermeasures" established the canonical
      model inversion result. Building on earlier work on pharmacogenetics model
      inversion (Fredrikson et al. 2014), the 2015 paper demonstrated face
      reconstruction from a face recognition API.

      The attack targeted a facial recognition system accessed through a
      prediction API that returned confidence scores -- the soft-label grey-box
      access level from Section 9.1''s adversary access ladder. The adversary
      knew the target individual''s identity (name) and wanted to reconstruct
      their facial image as it appeared in the training set.

      The reconstruction procedure used gradient ascent in input space to find
      the image that maximised the model''s confidence score for the target
      identity. Starting from a random or mean-face initialisation, the algorithm
      iteratively applied small perturbations to the input image in the direction
      that increased the model''s confidence on the target class, tracking the
      pixel values at each step. After several hundred iterations, the reconstructed
      image converged to a likeness of the target individual recognisable to human
      evaluators -- not a perfect photograph, but a distinctive reconstruction that
      captured the facial structure of the training image.

      The paper also demonstrated the attack against a simpler model: a pharmacogenetics
      dosage prediction model that revealed patient attributes (race, age) not
      directly observable from the API''s inputs but encoded in the model''s
      decision surface. This variant required fewer queries and produced high-fidelity
      attribute reconstruction, demonstrating that inversion applies to any model
      whose predictions encode training data features.

      The countermeasures the paper evaluated -- confidence score rounding,
      adding noise to outputs, restricting API output precision -- all reduced
      attack fidelity but did not eliminate it. This is the output perturbation
      result that Section 9.12 builds on: perturbation raises the query budget
      for reconstruction but does not bound fidelity the way differential privacy
      training does.

  - part: 3
    title: 'Gradient-Based Inversion: White-Box Access'
    body: |
      Gradient-based model inversion is the most powerful variant, applicable when
      the adversary has white-box access to the model''s parameters and can compute
      exact gradients. The optimisation is:

          x_{t+1} = x_t + α * ∇_x  f(x_t)[c]

      where α is the step size and ∇_x f(x_t)[c] is the gradient of the target
      class confidence with respect to the input. This is standard gradient ascent
      in input space -- the reverse of the gradient descent used during training.
      The input converges toward a point that the model treats as a prototypical
      member of class c.

      Gradient-based inversion is fast and precise. With exact gradients, each
      optimisation step provides maximum information about the direction of
      increasing confidence in the target class. Convergence typically occurs in
      tens to hundreds of gradient steps for image classifiers, producing
      reconstructions with high visual fidelity to the training data distribution.

      For open-weight models -- which represent an increasingly large fraction of
      deployed models as of 2026 -- gradient-based inversion is directly applicable.
      An adversary who downloads an open-weight model has white-box access and can
      run gradient ascent locally without any API interaction. The attack does not
      touch the operator''s infrastructure and cannot be detected through query
      monitoring. The only effective defences for open-weight models against gradient-
      based inversion are upstream: differential privacy training during the original
      training run, and data deduplication and scrubbing to remove the most
      memorisation-prone training examples before training begins.

      The practical inversion fidelity from gradient access is significantly higher
      than from black-box query access for the same number of optimisation steps,
      because each step uses exact gradient information rather than a numerical
      approximation. Zhang et al. 2020 demonstrated GAN-based gradient inversion
      that produced near-photorealistic facial reconstructions from deep classifiers
      with white-box access -- a substantial advance over the Fredrikson et al.
      2015 pixel-level optimisation.

  - part: 4
    title: 'Black-Box Inversion: Query-Based Reconstruction Without Gradients'
    body: |
      Black-box model inversion uses only the model''s query outputs -- confidence
      scores or class labels -- to guide the reconstruction, without access to
      gradients. The optimisation must estimate the gradient direction from the
      model''s scalar outputs at nearby points, a technique called zeroth-order
      or derivative-free optimisation.

      The simplest black-box inversion approach estimates the gradient numerically:
      for each input dimension i, compute the finite difference (f(x + δe_i)[c]
      - f(x)[c]) / δ as an approximation to the partial derivative. This requires
      two queries per dimension per step, making black-box inversion O(d) times
      more expensive than gradient-based inversion per optimisation step. For
      image inputs with thousands of pixels, this is a substantial query budget
      multiplier.

      More sophisticated black-box inversion approaches use random gradient
      estimators (querying random directions rather than all basis directions),
      Bayesian optimisation over the input space, or evolutionary search strategies
      that maintain a population of candidate inputs and select toward higher
      confidence. These approaches trade optimisation quality for query efficiency
      and are more practical for high-dimensional inputs.

      Against grey-box APIs that return confidence scores, black-box inversion is
      viable for moderate-dimensional inputs. Fredrikson et al. 2015 operated in
      this regime: the face images were small (thumbnail resolution) and the
      confidence scores provided sufficient gradient signal for reconstruction.
      Against hard-label-only APIs, reconstruction fidelity degrades further but
      remains possible for simple models and low-dimensional inputs.

      The detection implication for black-box inversion follows the same logic as
      boundary mapping: the adversary must issue many queries with systematic
      input perturbation, producing a query distribution with structured variation
      patterns that differs from legitimate use. The query monitor''s OOD detector
      and perturbation pattern detector are the relevant Section 9.11 tracks.

  - part: 5
    title: 'LLM Training Data Extraction: Carlini et al. 2021'
    body: |
      The Carlini et al. 2021 paper "Extracting Training Data from Large Language
      Models" demonstrated verbatim training data extraction from GPT-2 at scale.
      The attack revealed that large language models memorise and can be made to
      reproduce substantial quantities of their training data with only black-box
      API access and no prior knowledge of which specific texts were in the
      training corpus.

      The extraction procedure has two stages. In the generation stage, the
      adversary prompts the model with a variety of prefixes (often simple,
      unconditional prompts or short common phrases) and generates large numbers
      of text completions. The model''s sampling produces a mixture of generic
      text and memorised training content; the adversary cannot distinguish them
      from content alone at this stage.

      In the filtering stage, the adversary scores each generated text by a
      perplexity ratio: the ratio of the target model''s perplexity to a smaller
      reference model''s perplexity on the same text. Texts that the target model
      assigns much lower perplexity than the reference model -- texts the large
      model finds far more predictable than the small model does -- are likely
      memorised from training data. The reference model has not seen the training
      data and assigns these texts the same perplexity as generic text from the
      same domain.

      The perplexity ratio filter is the key insight. It eliminates the need to
      know the training data in advance: any text that the large model finds
      disproportionately predictable relative to a reference baseline is a
      candidate for training data membership. The paper demonstrated extraction
      of text containing names, email addresses, phone numbers, URLs, and
      verbatim news articles from GPT-2 -- information the model had memorised
      from its training corpus despite having no specific instruction to retain it.

      The query budget for the Carlini et al. extraction was substantial:
      hundreds of thousands of generated sequences to find the subset of memorised
      content. But the economic arithmetic is the same as distillation extraction:
      the cost of generating those sequences at commercial LLM API rates is orders
      of magnitude lower than the consequence of the exposed training data.

  - part: 6
    title: 'Memorisation as the Necessary Precondition'
    body: |
      Model inversion cannot reconstruct what the model has not memorised. The
      attack''s fidelity ceiling is determined by the degree of memorisation:
      training examples that the model has fitted closely -- whose specific features
      are encoded in the model''s parameters rather than only the class-level
      statistics -- are reconstructable. Training examples that the model has
      not memorised individually -- which contribute only to the aggregate class
      distribution without leaving individual-level traces -- are not.

      Memorisation degree varies systematically across training examples and model
      configurations. Examples that appear rarely in the training data are more
      likely to be memorised individually than examples that appear frequently,
      because the model must fit each rare example without the averaging effect
      of repetition. Examples with unusual or distinctive features that deviate
      from the class centre are more likely to be memorised because they require
      model-specific parameter adjustment. Very short sequences in LLMs are more
      susceptible to memorisation than long sequences because the model can
      perfectly fit the short sequence in a small number of parameters.

      The Carlini et al. 2021 paper quantified memorisation for LLMs as the
      probability that the model can reproduce a training sequence verbatim given
      a prefix of that sequence. A sequence is k-memorised if the model reproduces
      it exactly given a k-token prefix. Higher k means the model can complete
      the sequence from a longer prefix -- weaker memorisation. Lower k means
      the model can complete the sequence from a short prefix -- stronger
      memorisation and higher inversion risk.

      The memorisation analysis has direct implications for data preprocessing.
      Training data deduplication removes the repetition-based averaging effect
      and actually increases memorisation risk for the deduplicated examples by
      causing the model to fit each unique example more precisely. This is the
      deduplication paradox: deduplication improves data quality but increases
      per-example memorisation and therefore inversion risk for the unique examples
      that remain after deduplication.

  - part: 7
    title: 'Sensitive Data Exposure: GitHub Copilot and Production Implications'
    body: |
      The GitHub Copilot memorisation controversy is the most commercially
      significant model inversion incident documented to date. Researchers
      demonstrated that Copilot -- a code completion model trained on public
      GitHub repositories -- could be prompted to reproduce verbatim code
      snippets from its training data, including code containing API keys,
      passwords, cryptographic secrets, and other sensitive credentials that
      developers had inadvertently committed to public repositories.

      The extraction did not require adversarial prompting. Simple prefix
      completions -- providing the beginning of a file that had appeared in the
      training data -- caused the model to reproduce the remainder of the file,
      including any sensitive content it contained. The memorisation was
      selective: not all code was reproducible, but files that had appeared
      in many repositories (high-frequency files) and files with distinctive
      structure (configuration files, credential files) showed high memorisation
      rates.

      The practical consequence is an inversion attack surface that operates
      without any special adversary capability: any Copilot user who prompts
      the model with a file prefix can receive training data content as a
      completion. The model does not distinguish between completing a user''s
      own code and reproducing a memorised training example. The exposure
      is built into the product''s core functionality.

      The implications for production LLM deployments extend beyond code models.
      Any LLM trained on data containing personally identifiable information --
      user messages, customer service transcripts, medical notes, financial
      records -- has the potential to reproduce that information through
      completion prompts. The Carlini et al. 2021 result confirmed this for
      GPT-2 on general web text; the Copilot result confirmed it for specialised
      code models. Both demonstrate that the inversion attack is not hypothetical
      and does not require adversarial expertise to execute.

  - part: 8
    title: 'Defence Connections: DP Training, Perturbation, and Data Hygiene'
    body: |
      Model inversion has three defensive layers, each addressing a different
      stage of the vulnerability chain.

      Upstream: differential privacy training. DP training from Section 8.13
      bounds the influence of any individual training example on the model''s
      parameters. If no training example has more than ε-bounded influence, the
      model cannot have memorised that example to the degree required for high-
      fidelity inversion. At strong privacy budgets (ε ≤ 1), the inversion
      fidelity ceiling drops substantially: the optimisation cannot converge to
      a specific training example because the model''s parameters do not carry
      sufficient individual-level information. The cost is the same as for
      membership inference defence: model accuracy degrades with tighter ε.

      Downstream: output perturbation. Perturbation from Section 9.12 adds noise
      to confidence scores and generated text, reducing the precision of the
      gradient signal that black-box inversion and perplexity-based filtering
      rely on. For image inversion, confidence score perturbation degrades the
      gradient estimate and causes the optimisation to converge more slowly and
      less precisely. For LLM extraction, adding noise to token log-probabilities
      degrades the perplexity ratio filter and forces the adversary to generate
      more sequences to find memorised content.

      Data preprocessing: deduplication and scrubbing. Removing sensitive content
      from training data before training is the most direct mitigation for
      LLM inversion: a model that was never trained on an API key cannot memorise
      it. The GitHub Copilot response included filtering training data for
      credential patterns (API key regexes, password patterns) before training
      subsequent model versions. Data deduplication reduces repetition-based
      memorisation for common examples but, as noted in Part 6, increases
      per-example memorisation for unique examples -- making targeted scrubbing
      of sensitive content more important than blanket deduplication.

      The correct architecture combines all three layers. DP training as the formal
      bound on individual-level memorisation; output perturbation as the signal-
      reduction control at inference time; data scrubbing to remove the highest-risk
      training content before memorisation occurs. None alone is sufficient for
      production deployment of models trained on sensitive personal data.

