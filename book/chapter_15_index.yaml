    - detector_config_manager.py and detection_test_framework.py -- suite configuration and testing (Section
      15.07)
    - Chapter 15 knowledge assessment quiz and Chapter 16 preview (Section 15.08)
  security_themes:
    hybrid_beats_either_alone: |
      A production detector combines pattern matching and ML rather than choosing one: patterns give precision and
      near-zero latency on known attacks, ML gives coverage of novel and paraphrase-resistant attacks, and the
      hybrid gets both. This is the Chapter 11 layered-detection principle applied inside a single detector.
    the_quality_bar_defines_production: |
      A detector that is accurate but slow, or accurate but noisy with false positives, is not production-grade. The
      quality bar -- 95%+ accuracy, sub-50ms latency, sub-5% false positives -- is what separates a shippable
      detector from a proof of concept, and every detector in the suite is held to it.
    the_unified_api_makes_a_suite: |
      Six detectors become one system only through a shared contract. The unified API lets the pipeline orchestrate
      the detectors uniformly and lets configuration and testing apply across the suite, turning a collection of
      detectors into a coherent, configurable, tested detection capability.
    false_positives_are_a_first_class_metric: |
      A detector that flags too many legitimate requests disrupts real use and is disabled regardless of its true-
      positive rate. The sub-5% false-positive target is a first-class part of the quality bar, especially for the
      PII and toxicity detectors where over-flagging is most disruptive.
  progression:
    week_10_day_1: 'Section 1: Production detector taxonomy and the unified API'
