chapter_overview:
  number: 15
  title: Building Production Detectors
  part: 'Part 4: Practical Implementation'
  position: Chapter 15 of 4 in Part 4; first chapter of Part 4
  purpose: |
    Part 3 built the detection architecture and deployed it as a production service. Part 4 ships the detectors
    that run inside it, and Chapter 15 builds the core suite. The argument of the chapter is that a production
    detector is a hybrid: pattern matching gives precision and near-zero latency on the known attacks, and ML
    gives coverage of the novel and paraphrase-resistant attacks, and a production-grade detector combines both
    rather than choosing one. This is the layered-detection principle of Chapter 11 applied inside a single
    detector.

    The chapter builds six detectors -- injection, jailbreak, PII, toxicity, exfiltration, and the combined
    pipeline -- each implementing one unified API so the pipeline can orchestrate them uniformly and each held
    to a concrete quality bar of 95%+ accuracy, sub-50ms latency, and a sub-5% false-positive rate. The quality
    bar is what separates a production detector from a proof of concept: a detector that is accurate but slow,
    or accurate but noisy with false positives, is not production-grade. Configuration management and a testing
    framework apply across the suite so it is one coherent, configurable, tested system, and the combined
    pipeline places into the Part 3 gateway as the detector suite that gateway deploys. Chapter 15 is where the
    detection concepts of Chapters 12 and 13 become concrete, shippable, production-grade detectors.
  learning_path:
    transition: From the Part 3 deployed gateway to the concrete production detector suite that runs inside
      it
    detector_taxonomy: The six-detector suite, the hybrid pattern-plus-ML approach, the unified API, and
      the quality bar
    injection_detector: The prompt injection detector as a regex-plus-ML hybrid
    jailbreak_detector: The jailbreak detector as pattern matching plus classification
    pii_scanner: The PII scanner as regex plus NER models
    toxicity_detector: The toxicity detector using hosted classification and custom models
    exfiltration_detector: The data exfiltration detector through output analysis
    combined_pipeline: Orchestrating the six detectors into one pipeline via the unified API
    summary: 'Chapter 15 closure and Chapter 16 preview: from the detector suite to SIEM integration'
  prerequisites:
    - 'Chapter 11 Section 11.03: the layered detection principle the hybrid detectors apply'
    - 'Chapter 12: the ML classifiers (injection, jailbreak, PII) the detectors build on'
    - 'Chapter 13 Section 13.06: the canary and output-monitoring signals the exfiltration detector uses'
    - 'Chapter 14 Section 14.11: the production detection gateway the detector suite deploys on'
    - 'Chapter 14 Section 14.04: the sub-50ms latency budget the detectors must meet'
  structure:
