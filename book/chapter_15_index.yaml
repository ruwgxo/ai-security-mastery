  description: |
    Comprehensive index for Chapter 15 covering Building Production Detectors -- the first chapter of Part 4,
    which builds concrete, production-grade detectors on the deployed gateway of Part 3. Where Part 3 built the
    detection architecture and deployed it as a service, Part 4 ships the detectors that run in it. Chapter 15
    builds a suite of six: a prompt injection detector as a regex-plus-ML hybrid, a jailbreak detector as
    pattern matching plus classification, a PII scanner as regex plus NER models, a toxicity detector using
    hosted classification and custom models, a data exfiltration detector through output analysis, and the
    combined detection pipeline that orchestrates them. Every detector is a hybrid of pattern matching and ML,
    implements one unified API so the pipeline can orchestrate them uniformly, and is held to a concrete
    quality bar -- 95%+ accuracy, sub-50ms latency, and a sub-5% false-positive rate. Configuration management
    and a testing framework apply across the suite so it is configured and tested as one system. Chapter 15
    connects the detection concepts of Chapters 12 and 13 to concrete implementations and deploys them on the
    Part 3 gateway, producing the detector suite that Chapter 16 integrates with SIEM platforms.
