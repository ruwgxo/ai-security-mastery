    def run_checklist(items: List[ChecklistItem]) -> None:
        print('=' * 88)
        print('CONSOLIDATED PRODUCTION READINESS CHECKLIST')
        print('The requirements a deployed detection system must meet, by discipline')
        print('=' * 88)
        by_discipline: dict = {}
