deliverables:
- id: 1
  name: production_deployment_architecture.py
  description: Draws the production deployment architecture as the stack of five deployment disciplines
    applied to the Chapter 13 logical architecture and assembled by the capstone, showing the deployed
    detection system that meets its sub-50ms, high-availability, and cost targets.
  implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
    prints the layered deployment architecture and the shape of the chapter.
  code: |
    # production_deployment_architecture.py
    # Section 14.12: Chapter 14 Summary
    # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
    # Single quotes throughout per book convention

    from dataclasses import dataclass, field
    from typing import List


    @dataclass
    class Layer:
        name: str
        concern_family: str
        sections: str
        what_it_adds: str


    LAYERS: List[Layer] = [
        Layer('Placement', 'Placement', '14.02-14.03',
              'Architecture pattern and integration points -- where detection sits and hooks in'),
        Layer('Performance', 'Performance', '14.04-14.05',
              'Latency budget and horizontal scaling -- fast per request, sufficient in aggregate'),
        Layer('Resilience', 'Resilience', '14.06-14.07',
              'Failure policy and circuit breakers -- survives detector failure without cascading'),
        Layer('Operability', 'Operability', '14.08-14.09',
              'Observability and dashboard -- the system can be seen, tuned, and trusted'),
        Layer('Cost', 'Cost', '14.10',
              'Sampling, caching, batching -- affordable so it stays running'),
        Layer('Capstone', 'Assembly', '14.11',
              'The production gateway assembling all concerns, validated against three targets'),
    ]


    def draw_architecture(layers: List[Layer]) -> None:
        print('=' * 88)
        print('PRODUCTION DEPLOYMENT ARCHITECTURE -- THE DEPLOYED DETECTION SYSTEM')
        print('The Chapter 13 logical architecture turned into a production service')
        print('=' * 88)
        print()
        border = '  +' + ('-' * 82) + '+'
        print('  [ Chapter 13 logical architecture: the behavioural monitoring gateway ]')
        print('                              |')
        print('                    turned into a service by')
        print('                              v')
        for layer in layers:
            print(border)
            print(f'  | {layer.name.upper().ljust(14)} [{layer.sections.ljust(11)}]  {layer.what_it_adds[:47].ljust(47)}|')
        print(border)
        print('                              |')
        print('                              v')
        print('  [ Deployed detection system: meets sub-50ms P99, HA, and cost targets ]')


    def summary_note() -> None:
        print()
        print('=' * 88)
        print('THE SHAPE OF THE CHAPTER')
        print('=' * 88)
        print('Chapter 14 is a stack of five deployment disciplines applied to one logical design,')
        print('assembled by a capstone. Each layer adds the non-functional engineering a service')
        print('needs that a design does not: placement, performance, resilience, operability, cost.')
        print('The result is not a better design but a running service -- the deployed detection system.')


    if __name__ == '__main__':
        draw_architecture(LAYERS)
        summary_note()
- id: 2
  name: production_deployment_reference_card.py
  description: Provides a reference card mapping each deployment concern to its mechanism, its target,
    and the specific production death it prevents, condensing the chapter into a concern-by-concern quick
    reference.
  implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
    prints the per-concern reference card and the one-line rule per concern.
  code: |
    # production_deployment_reference_card.py
    # Section 14.12: Chapter 14 Summary
    # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
    # Single quotes throughout per book convention

    from dataclasses import dataclass
    from typing import List


    @dataclass
    class ConcernCard:
        concern: str
        section: str
        mechanism: str
        target: str
        production_death_if_ignored: str


    CARDS: List[ConcernCard] = [
        ConcernCard('Placement', '14.02-14.03', 'API gateway/sidecar/inline; pre and post-processing hooks',
                    'Detection sits where it can block before the model call', 'Detection runs too late to block'),
        ConcernCard('Latency', '14.04', 'Budget allocation, parallel execution, timeouts',
                    'Inline P99 <= 50ms', 'Too slow, so the detector is removed'),
        ConcernCard('Throughput', '14.05', 'Horizontal scaling, load balancing, backpressure',
                    'Sustains the request rate', 'Backlog grows until the gateway falls over'),
        ConcernCard('Failure handling', '14.06', 'Fail-open/fail-closed per detector and tier',
                    'Every failure resolves by deliberate policy', 'An error fails open and admits the attack'),
        ConcernCard('Availability', '14.07', 'Circuit breakers, graceful degradation, bulkheads',
                    'One failure does not cascade', 'A hung detector stalls the whole gateway'),
        ConcernCard('Observability', '14.08-14.09', 'Metrics, logs, traces; dashboard, SLOs, alerts',
                    'The system can be seen and tuned', 'A silent false-positive rise goes unnoticed'),
        ConcernCard('Cost', '14.10', 'Sampling, caching, batching (never the inline checks)',
                    'Cost within bound per million requests', 'Unbounded cost switches the system off'),
    ]


    def print_card(cards: List[ConcernCard]) -> None:
        print('=' * 92)
        print('PRODUCTION DEPLOYMENT REFERENCE CARD')
        print('Each deployment concern with its mechanism, target, and the failure it prevents')
        print('=' * 92)
        for c in cards:
            print()
            print(f'CONCERN: {c.concern}  [{c.section}]')
            print(f'  Mechanism : {c.mechanism}')
            print(f'  Target    : {c.target}')
            print(f'  If ignored: {c.production_death_if_ignored}')


    def card_footer() -> None:
        print()
        print('=' * 92)
        print('THE ONE-LINE RULE PER CONCERN')
        print('=' * 92)
        print('Place it where it can block, keep it fast enough to survive, scale it to the load,')
        print('decide its failure deliberately, contain that failure, make it observable, and keep')
        print('it affordable -- each concern prevents one specific way a correct detector dies in')
        print('production, and the deployed gateway is the one that addresses all of them at once.')


    if __name__ == '__main__':
        print_card(CARDS)
        card_footer()
