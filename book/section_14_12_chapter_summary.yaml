    def readiness_rule(items: List[ChecklistItem]) -> None:
        print()
        print('=' * 88)
        print('THE READINESS RULE')
        print('=' * 88)
        print(f'{len(items)} requirements across six disciplines. The gateway is production-ready only')
        print('when every one is met -- a logical architecture is 100% complete as a design and 0%')
