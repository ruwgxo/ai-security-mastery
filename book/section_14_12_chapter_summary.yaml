  name: chapter_14_to_15_transition.py
  description: Maps the transition from Chapter 14 to Chapter 15 -- from deploying the detection system
    as a production service to building the production detectors that fill the deployed gateway -- across
    focus, artifact, question, and part, marking the move from Part 3 to Part 4.
  implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
    prints the Chapter 14 to 15 transition and the handoff note.
  code: |
    # chapter_14_to_15_transition.py
    # Section 14.12: Chapter 14 Summary
    # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
    # Single quotes throughout per book convention

    from dataclasses import dataclass
    from typing import List


    @dataclass
    class Transition:
        aspect: str
        chapter_14: str
        chapter_15: str


    TRANSITIONS: List[Transition] = [
        Transition('Focus',
                   'Deploying the detection system as a production service',
                   'Building the production detectors that fill the deployed gateway'),
        Transition('Artifact',
                   'The gateway: a platform that runs detectors under production concerns',
                   'The detectors: the practical, end-to-end detection logic itself'),
        Transition('Question answered',
                   'How does a correct detection system survive production?',
                   'How are the concrete detectors and integrations built in practice?'),
        Transition('Part',
                   'Closes Part 3 -- Detection Engineering for AI',
                   'Opens Part 4 -- practical end-to-end detectors and integrations'),
    ]


    def print_transition(transitions: List[Transition]) -> None:
        print('=' * 92)
        print('CHAPTER 14 -> CHAPTER 15 TRANSITION')
        print('From the deployed gateway to building the production detector suite')
        print('=' * 92)
        for t in transitions:
            print()
            print(f'{t.aspect.upper()}')
            print(f'  Chapter 14: {t.chapter_14}')
            print(f'  Chapter 15: {t.chapter_15}')


    def transition_note() -> None:
        print()
        print('=' * 92)
        print('THE HANDOFF')
        print('=' * 92)
        print('Chapter 14 built the deployment platform: a gateway that runs detection fast,')
        print('resiliently, observably, and affordably, validated against its three targets. What')
        print('it deliberately did not do is build the detectors that populate it -- it deployed the')
        print('system, it did not fill it with ever-better detection. Part 4 begins there: Chapter 15')
        print('builds the production detector suite that runs inside this gateway, turning the')
        print('deployment platform into a working end-to-end detection capability.')


    if __name__ == '__main__':
        print_transition(TRANSITIONS)
        transition_note()
common_mistakes:
- id: 1
  description: Reading Chapter 14 as a collection of operations topics rather than one argument about
    deploying detection
  why_it_happens: |-
    Latency, scaling, circuit breakers, observability, and cost are each large fields, so
    the sections can look like independent tutorials collected in one chapter.
  consequence: The connection between each mechanism and the specific production failure it prevents is
    lost, and the reader learns the mechanisms without the deployment discipline that organises them.
  correct_approach: 'Hold the five deployment disciplines and the design-versus-service argument as the
    spine: every section addresses one way a correct detection system dies in production, and the capstone
    assembles the answers.'
- id: 2
  description: Believing detection quality can substitute for deployment engineering
  why_it_happens: |-
    Detection is where the intellectual effort of the earlier chapters went, so it feels
    like the hard part, with deployment as mere plumbing.
  consequence: An excellent detector that is too slow, fails open, cannot be seen, or costs too much is
    removed, bypassed, distrusted, or switched off, and its quality is wasted.
  correct_approach: 'Treat deployment as a distinct discipline: you cannot detect your way past a latency
    budget, a missing failure policy, or an unaffordable bill, so engineer the deployment concerns deliberately.'
- id: 3
  description: Optimising one production target in a way that silently breaks another
  why_it_happens: |-
    Each target has its own section and its own metric, so it is tempting to push one -- cost,
    say -- without checking its effect on latency, availability, or coverage.
  consequence: A cost saving that samples an inline check, or a latency fix that removes a failure policy,
    improves one metric while opening a hole another metric never shows, and the gateway looks healthy
    while it is not.
  correct_approach: Validate all three targets together and preserve the security invariant through every
    optimisation, because the deployed gateway must meet latency, availability, and cost at once without
    weakening coverage.
- id: 4
  description: Letting the security-critical coverage erode under deployment pressure
  why_it_happens: |-
    Performance and cost pressure make the inline checks that run on every request look like
    the obvious place to relax, sample, or fail open when a budget is tight.
  consequence: The coverage that the whole detection system exists to provide is quietly compromised to
    ease a deployment target, and no performance or cost metric reveals the resulting hole.
  correct_approach: 'Hold the security invariant constant: inline security-critical checks run on every
    request, fail closed, and are never sampled, enforced by construction so no deployment pressure can
    silently relax them.'
- id: 5
  description: Treating the deployed gateway as the finished product rather than a platform for detectors
  why_it_happens: |-
    The capstone is a satisfying endpoint -- a validated running service -- so it is easy to
    mistake the deployment platform for the complete detection capability.
  consequence: The reader stops at the platform without building the production detectors that fill it,
    mistaking a well-deployed gateway running basic detection for a complete end-to-end detection capability.
  correct_approach: 'Recognise that the gateway is the deployment platform and the detectors are what
    run inside it: Chapter 14 deployed the system, and Part 4 fills it with the production detector suite.'
section_summary:
  compact: |-
    Chapter 14 completes Part 3 by turning the Chapter 13 logical architecture into a
    production service, addressing the deployment concerns -- placement, performance,
    resilience, operability, and cost -- that a correct detection system must meet to survive
    production. These are the five deployment disciplines, distinct from detection: architecture
    patterns and integration points place detection (14.02-14.03); latency budgeting and
    horizontal scaling engineer performance (14.04-14.05); fail-open/fail-closed policy and
    circuit breakers with graceful degradation build resilience (14.06-14.07); observability
    and the dashboard make it operable (14.08-14.09); and sampling, caching, and batching keep
    it affordable (14.10). The capstone (14.11) assembles all of them into one running service
    in which every discipline applies to every request, and validates it against its three
    non-functional targets together -- sub-50ms P99 latency, high availability, and cost within
    bound -- which is what makes it a production service rather than a logical design. Running
    through the chapter is a single security invariant: the inline security-critical checks run
    on every request, fail closed, and are never sampled, held constant under every performance
    and cost pressure. With Chapter 14, the detection system built across Chapters 11 to 13 is
    deployed as a production service, Part 3 is complete, and Part 4 begins in Chapter 15 by
    building the production detectors that fill the deployed gateway.
  key_takeaways:
  - Chapter 14 completes Part 3 by turning the Chapter 13 logical architecture into a production service
    that meets its non-functional requirements
  - The five deployment disciplines -- placement, performance, resilience, operability, cost -- are distinct
    from detection and each keeps a correct detector running in production
  - The deployed gateway meets its three targets together -- sub-50ms P99 latency, high availability,
    and cost bounds -- which is what makes it a service rather than a design
  - The capstone assembles every concern into one running service in which all apply to every request,
    validated against all three targets at once
  - 'The security invariant runs through the whole chapter: inline security-critical checks run on every
    request, fail closed, and are never sampled, held constant under deployment pressure'
  - With Part 3 complete, the deployed gateway is a platform for detectors, and Part 4 begins in Chapter
    15 by building the production detector suite that fills it
preview_chapter_15:
  title: 'Chapter 15: Building the Production Detector Suite'
  preview: |-
    Chapter 14 deployed the detection system as a production service -- a gateway that runs
    detection fast, resiliently, observably, and affordably, validated against its latency,
    availability, and cost targets. It did not build the detectors that fill it. Chapter 15
    opens Part 4 by turning from deploying the system to building the practical, end-to-end
    production detectors and the integrations that connect them to real systems, constructing
    the detector suite that runs inside the deployed gateway and turns the deployment platform
    into a working end-to-end detection capability. Part 3 gave the platform; Part 4 fills it.
