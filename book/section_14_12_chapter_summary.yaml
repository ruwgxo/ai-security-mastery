section_overview:
  one_line_summary: 'Chapter 14 completes Part 3 by turning the Chapter 13 logical architecture into a
    production service: it addresses the deployment concerns -- placement, performance, resilience, operability,
    and cost -- that a correct detection system must meet to survive production, and assembles them into
    a deployed detection gateway that meets its sub-50ms latency, high-availability, and cost targets
    together.'
  why_this_section_exists: |-
    This section closes Chapter 14 and, with it, Part 3. Chapter 14 was a long chapter with a
    single argument -- that a complete logical architecture is not yet a production service,
    and that closing the gap is a distinct discipline from detection -- worked out across
    eleven sections. This summary synthesises that argument. It reviews the sections section by
    section, names the five deployment disciplines that organise the chapter, shows how Chapter
    14 completes Part 3 by making the detection system a production service, and consolidates
    the production readiness checklist and the common deployment mistakes into references a
    reader can carry forward. It provides a knowledge assessment to self-check understanding
    and a security checklist to preserve the coverage invariants under deployment pressure. And
    it previews Chapter 15, where Part 4 begins building the production detectors that fill the
    deployed gateway. The purpose is consolidation: to leave the reader with the shape of the
    whole chapter and a set of references, rather than eleven sections held separately.
  position_in_chapter: |-
    Section 14.12 is the summary and final section of Chapter 14, closing both the chapter and
    Part 3. It introduces no new material, synthesising 14.01-14.11 and handing off to Chapter
    15, which opens Part 4 by building the production detector suite that runs inside the
    deployed gateway.
learning_objectives:
