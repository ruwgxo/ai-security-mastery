  code: |
    # chapter_14_knowledge_assessment.py
    # Section 14.12: Chapter 14 Summary
    # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
    # Single quotes throughout per book convention

    from __future__ import annotations

    from dataclasses import dataclass
    from typing import List


    @dataclass
    class Question:
        number: int
        question: str
        answer: str
        section: str


    ASSESSMENT: List[Question] = [
        Question(1, 'Why is a complete logical architecture not yet a production service?',
                 'It answers what runs where but not the non-functional concerns -- latency, failure, cost -- that keep it running', '14.01'),
        Question(2, 'What is the consequence of leaving a deployment concern unaddressed?',
                 'A correct detection system dies in a specific production way -- too slow, failing open, cascading, or switched off', '14.01'),
        Question(3, 'Which three architecture patterns place detection in the request path?',
                 'API gateway, sidecar, and inline', '14.02'),
        Question(4, 'What does the inline pattern trade for its lowest latency floor?',
                 'The tightest coupling and the widest blast radius -- detection runs in the application process', '14.02'),
        Question(5, 'Where do pre-processing and post-processing detection sit relative to the model call?',
                 'Pre-processing before it (blocks the attempt), post-processing after it (catches the success)', '14.03'),
        Question(6, 'Why must each integration point be failure-isolated?',
                 'So a detector fault is contained at the boundary rather than breaking the request path', '14.03'),
        Question(7, 'Why is the latency budget read at the P99 rather than the average?',
                 'The heavy tail is what users notice; the average hides the slow requests', '14.04'),
        Question(8, 'How can a tier whose serial detector sum exceeds the budget still fit?',
                 'Parallel execution -- the critical path is the max of a parallel group, not the sum', '14.04'),
        Question(9, 'Why does the stateless inline tier scale cleanly by replication?',
                 'Any instance can serve any request, so capacity is linear in instance count', '14.05'),
        Question(10, 'What does backpressure do when load exceeds capacity?',
                 'Serve, then queue within headroom, then shed the excess -- protecting in-flight requests', '14.05'),
        Question(11, 'What are the two failure policies and what does each favour?',
                 'Fail-open favours availability (admit); fail-closed favours security (block)', '14.06'),
        Question(12, 'Why is the failure policy chosen per detector rather than globally?',
                 'A critical security detector and a best-effort detector warrant opposite policies', '14.06'),
        Question(13, 'What are the three circuit breaker states?',
                 'Closed (normal), open (cut off), half-open (testing recovery)', '14.07'),
        Question(14, 'Why does the half-open state make recovery safe?',
                 'It tests with limited trial calls before restoring full traffic, avoiding a flapping loop', '14.07'),
        Question(15, 'Why can a detection system not be operated without observability?',
                 'A system you cannot see fails silently -- a tripled false-positive rate goes unnoticed', '14.08'),
        Question(16, 'What are the four golden signals?',
                 'Latency, traffic, errors, and saturation', '14.08'),
        Question(17, 'Why do alerts map to SLOs and error budgets rather than raw thresholds?',
                 'Raw-threshold alerts fire on every blip and cause alert fatigue; SLO alerts fire when an objective is at risk', '14.09'),
        Question(18, 'Why is cost optimisation a survival requirement?',
                 'A detection system with no cost discipline is switched off when the bill arrives, providing no security', '14.10'),
        Question(19, 'Where is sampling safe and where is it forbidden?',
                 'Safe for analytics estimating an aggregate signal; forbidden for security-critical checks that must run on every request', '14.10'),
        Question(20, 'What does the capstone gateway prove?',
                 'That the assembled service meets its latency, availability, and cost targets together -- a production service, not a design', '14.11'),
    ]


    def run_assessment(questions: List[Question]) -> None:
        print('=' * 88)
        print('CHAPTER 14 KNOWLEDGE ASSESSMENT (20 QUESTIONS)')
        print('Production Deployment -- self-check across all sections')
        print('=' * 88)
        for q in questions:
            print()
            print(f'Q{q.number} [{q.section}]: {q.question}')
            print(f'   A: {q.answer}')
        print()
        print('=' * 88)
        print(f'{len(questions)} questions spanning Sections 14.01 to 14.11.')
        print('If any answer is unfamiliar, revisit the cited section before deploying.')


    if __name__ == '__main__':
        run_assessment(ASSESSMENT)
- id: 5
  name: production_deployment_security_checklist.py
  description: A security checklist of the coverage invariants a deployed detection system must preserve
    -- inline checks on every request, fail-closed on critical detectors, no bare calls, essential path
    kept under degradation, no sampling of critical checks -- with the reason each matters.
  implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
    prints the security checklist grouped by area and the security through-line.
  code: |
    # production_deployment_security_checklist.py
    # Section 14.12: Chapter 14 Summary
    # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
    # Single quotes throughout per book convention

    from dataclasses import dataclass
    from typing import List


    @dataclass
    class SecurityCheck:
        area: str
        check: str
        why: str


    CHECKS: List[SecurityCheck] = [
        SecurityCheck('Coverage', 'Security-critical inline checks run on every request',
                      'A sampled-out or skipped request is an unblocked attack'),
        SecurityCheck('Coverage', 'Detection blocks before the model call at pre-processing',
                      'Post-only detection has already paid for and run the malicious inference'),
        SecurityCheck('Failure', 'Critical detectors fail closed, not open',
                      'Failing open silently admits the attack the detector guards against'),
        SecurityCheck('Failure', 'No detector is a bare call in the request path',
                      'An unisolated fault makes every detector a single point of failure'),
        SecurityCheck('Degradation', 'Under stress the essential security path is kept, not shed',
                      'Degrading away from the security core serves traffic it cannot vouch for'),
        SecurityCheck('Cost', 'Cost optimisation never samples a security-critical check',
                      'A cost saving that opens a coverage hole is invisible to every cost metric'),
        SecurityCheck('Observability', 'A detector failing open is visible on the dashboard',
                      'A silently failing detector provides no protection and raises no alarm'),
        SecurityCheck('Validation', 'The gateway is validated against all three targets together',
                      'The unmet target is the failure mode waiting to happen'),
    ]


    def run_security_checklist(checks: List[SecurityCheck]) -> None:
        print('=' * 90)
        print('PRODUCTION DEPLOYMENT SECURITY CHECKLIST')
        print('The security invariants a deployed detection system must preserve')
        print('=' * 90)
        by_area: dict = {}
        for c in checks:
            by_area.setdefault(c.area, []).append(c)
        for area in ['Coverage', 'Failure', 'Degradation', 'Cost', 'Observability', 'Validation']:
            group = by_area.get(area, [])
            if not group:
                continue
            print()
            print(f'[{area.upper()}]')
            for c in group:
                print(f'  [ ] {c.check}')
                print(f'       why: {c.why}')


    def security_footer() -> None:
        print()
        print('=' * 90)
        print('THE SECURITY THROUGH-LINE')
        print('=' * 90)
        print('Every deployment concern was evaluated for whether it could weaken coverage. The')
        print('through-line of the chapter is that performance, resilience, operability, and cost')
        print('are all engineered so the security-critical coverage survives: inline checks run on')
        print('every request, fail closed, are never sampled, and are kept under degradation. A')
        print('deployment that optimises any of these at the cost of that coverage has failed, even')
        print('if every performance and cost metric looks healthy.')


    if __name__ == '__main__':
        run_security_checklist(CHECKS)
        security_footer()
