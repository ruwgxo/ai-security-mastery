  name: chapter_14_knowledge_assessment.py
  description: A twenty-question knowledge assessment spanning Sections 14.01 to 14.11, each question
    paired with its answer and the section it tests, for self-checking understanding of the production
    deployment concerns before deploying.
  implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library dataclasses
