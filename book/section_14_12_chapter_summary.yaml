  - Explain how Chapter 14 completes Part 3 by turning the logical architecture into a production service
  - Recall the consolidated production readiness checklist for a deployed detection system
  - Recall the common production deployment mistakes as a consolidated reference
  - Explain how the deployed gateway meets its three non-functional targets together
  skills:
  - Apply the production deployment reference card to map each concern to its mechanism and target
  - Use the consolidated readiness checklist to assess whether a detection system is deployable
  - Self-assess Chapter 14 understanding with the knowledge assessment
  - Apply the production deployment security checklist to preserve coverage invariants
  security_mindset:
  - Recognise that the through-line of the chapter is preserving security-critical coverage under every
    deployment pressure
  - Internalise that a service must meet all three non-functional targets together, because the unmet
    one is the failure mode waiting to happen
  - Understand that deployment is a distinct discipline from detection, and neglecting it silently removes
    a correct detector
  - Appreciate that the deployed gateway is a platform for detectors, and that building the detectors
    is the next discipline
prerequisites:
- 'Sections 14.01 through 14.11: the full Chapter 14 arc this section synthesises'
prose_content:
- part: 1
  title: 'Sections 14.01 to 14.03 in Review: The Deployment Problem and Placement'
  body: |-
    Chapter 14 opened by naming its problem. Section 14.01 established that a complete
    logical architecture and a production service are different artifacts: the Chapter 13
    behavioural monitoring gateway was one hundred per cent complete as a design and zero
    per cent ready as a service, because a design answers what runs where while a service
    must also answer the non-functional concerns -- placement, latency, failure,
    availability, observability, cost -- that keep it running. It framed each concern as a
    specific way a correct detection system dies in production, and warned that an
    unspecified concern is decided by the incident rather than the engineer.

    Sections 14.02 and 14.03 addressed the first concern, placement. Section 14.02 worked
    through the three architecture patterns -- API gateway, sidecar, and inline -- that put
    detection in the request path, trading latency floor against coupling, deployment
    independence, and blast radius, and showed that the patterns combine along the tier
    boundaries. Section 14.03 fixed the second half of placement: where in the request
    lifecycle each detector hooks in, distinguishing pre-processing detection that blocks
    the attempt on the input from post-processing detection that catches the success on the
    output, with the model call between the two, and requiring each hook to be
    failure-isolated.
- part: 2
  title: 'Sections 14.04 to 14.05 in Review: Performance'
  body: |-
    The performance sections engineered the gateway to be fast per request and sufficient in
    aggregate. Section 14.04 treated the sub-50ms P99 latency budget as a hard constraint
    rather than a target -- a detector too slow to keep provides no protection -- and
    engineered it: measuring at the tail rather than the average, allocating the budget
    across the inline detectors, using parallel execution so the critical path rather than
    the serial sum must fit, applying precomputation and caching, and bounding the worst
    case with per-detector timeouts, all validated under load.

    Section 14.05 moved from per-request latency to aggregate throughput. It established
    horizontal scaling -- adding instances -- as the way to sustain the request rate, showed
    that the stateless inline tier scales cleanly by replication while the stateful tiers
    must partition and coordinate their state, and added the operational machinery of scale:
    load balancing whose algorithm follows statefulness, autoscaling on each tier own load
    signal, backpressure that sheds rather than collapses under overload, and capacity
    planning that sizes for peak with headroom.
- part: 3
  title: 'Sections 14.06 to 14.07 in Review: Resilience'
  body: |-
    The resilience sections made the gateway survive failure. Section 14.06 confronted what
    happens when a detector errors, times out, or is unavailable, and established that the
    response must be deliberate because an unspecified failure mode is chosen by the bug. It
    defined the two policies -- fail-open favouring availability, fail-closed favouring
    security -- showed each carries a real and opposite risk, and argued that the choice is
    made per detector and per tier, with the timeout resolving through the same policy and
    detectors classified as essential or droppable for degraded-mode operation.

    Section 14.07 supplied the mechanism that contains failure. The circuit breaker cuts off
    a repeatedly failing detector, moving through closed, open, and half-open states so a
    broken detector is isolated and tested for recovery rather than retried into a cascade.
    Graceful degradation operates the essential-versus-droppable classification, shedding
    droppable detectors under stress while keeping the essential path. Bulkheads isolate a
    detector in its own resource pool so one fault cannot starve the others, and health
    checks separate liveness from readiness to gate traffic to fit instances.
- part: 4
  title: 'Sections 14.08 to 14.09 in Review: Operability'
  body: |-
    The operability sections made the gateway something a team can see and run. Section
    14.08 established observability as a precondition -- a detection system that cannot be
    seen cannot be operated, tuned, or trusted -- and built the three complementary pillars:
    metrics for aggregate health, structured logging for per-event detail, and tracing to
    follow a request through the tiers, with the golden signals of latency, traffic, errors,
    and saturation as the compact core, all instrumented cheaply so observing the hot path
    does not spend its budget.

    Section 14.09 assembled those signals into an operable interface. It built the four
    production dashboard views -- gateway health, detection rates, latency, and cost --
    integrated the Chapter 13 behavioural views of entity risk, drift, and coordinated
    networks, and turned metrics into SLO-driven alerts that fire on error-budget burn
    rather than raw thresholds to avoid alert fatigue, each paired with an on-call runbook
    so the dashboard drives incident response rather than merely reporting it.
- part: 5
  title: 'Section 14.10 in Review: Cost'
  body: |-
    Section 14.10 addressed the last single concern, cost, and framed it as a survival
    requirement rather than an efficiency nice-to-have: a detection system with no cost
    discipline is switched off when the bill arrives, and a switched-off system provides no
    security. It worked through the three cost drivers -- inference, compute, and storage --
    and how they fall unevenly across the tiers, then applied three levers. Caching reuses
    results for repeated inputs and batching amortises per-call overhead, both reducing cost
    without reducing coverage. Sampling runs a detector on a representative subset, reducing
    cost by reducing coverage, and is therefore governed by the cost-versus-coverage
    trade-off.

    That trade-off drew the chapter sharpest line: if a missed call means a missed attack,
    never sample; if it only slightly weakens a statistical estimate, sampling is safe. So
    the inline security-critical checks run on every request and are never sampled, while
    the expensive analytics that a subset serves are, and the line falls exactly along the
    state-latency tier boundary. Cost is attributed per detector and per tier so the
    optimisation targets where the money actually goes -- the expensive batch tier -- while
    the inline coverage stays whole.
- part: 6
  title: 'Section 14.11 in Review: The Production Gateway Capstone'
  body: |-
    Section 14.11 assembled the nine concerns into one running service, because a production
    gateway is not nine mechanisms in a row but one service in which all apply to every
    request at once. The combined-pattern architecture -- API gateway for inline, sidecar
    for near-real-time, off-path for batch -- is the skeleton, with detection hooked in at
    pre-processing and post-processing. Onto it every per-call discipline applies in order:
    sampling decides whether a detector runs, the circuit breaker whether it is cut off, the
    timeout bounds the call, the failure policy resolves any failure, and observability
    records the outcome.

    The assembled gateway meets its three production targets together -- the sub-50ms P99
    latency budget under load, high availability through breakers and graceful degradation,
    and cost bounds through sampling and batching that never touch the inline checks -- and
    the capstone validates it against all three at once, because a gateway meeting two of
    three is not deployable. The end-to-end request flow, pre-processing to model call to
    post-processing, shows the whole system working on one request. This is what turns the
    Chapter 13 logical architecture into a production service that provably meets its
    non-functional requirements.
- part: 7
  title: The Five Deployment Disciplines
  body: |-
    The eleven sections organise into five deployment disciplines, and naming them is the
    cleanest way to hold the chapter. Placement (14.02-14.03) decides where detection sits
    and where it hooks in. Performance (14.04-14.05) engineers latency per request and
    throughput in aggregate. Resilience (14.06-14.07) decides what a failing detector does
    and contains that failure. Operability (14.08-14.09) makes the system observable and
    gives it an operational interface. Cost (14.10) keeps it affordable. The capstone
    (14.11) assembles all five.

    The disciplines are ordered deliberately, each assuming the one before. You cannot
    budget latency until placement is fixed, cannot make failure decisions until
    performance is engineered, cannot observe meaningfully until the system runs, and cannot
    bound cost until you know what runs where. The order is an argument about dependency,
    not a list, and it is why the chapter proceeds placement to performance to resilience to
    operability to cost. Each discipline is distinct from detection: none of them makes a
    detector catch more attacks; all of them keep a correct detector running in production.
- part: 8
  title: How Chapter 14 Completes Part 3
  body: |-
    Part 3 built a detection system across four chapters. Chapter 11 built the rule-based
    gateway with its seven tracks and the sub-50ms requirement. Chapter 12 added the trained
    ML detectors and the production ML gateway. Chapter 13 added behavioural analysis and
    monitoring, ending with the behavioural monitoring gateway -- a complete logical
    architecture integrating signature, heuristic, ML, and behavioural detection across
    inline, near-real-time, and batch tiers. Those three chapters built the detection; they
    did not deploy it.

    Chapter 14 deployed it. It took the logical architecture that Chapter 13 completed and
    turned it into a production service, addressing every deployment concern that a correct
    detection system must meet to survive production. With Chapter 14, the detection system
    built across Chapters 11 to 13 is no longer a design but a running service that meets
    its non-functional targets. That completes Part 3: detection engineering for AI, from
    the first rule to the deployed gateway. Part 4 then builds on top of the deployed
    platform, constructing the practical end-to-end detectors and integrations that run
    inside it.
- part: 9
  title: 'Cross-Chapter Arc: From Logical Design to Deployed Service'
  body: |-
    The arc that runs through Part 3 and culminates in Chapter 14 is the movement from a
    logical design to a deployed service, and it is worth stating as a single line because
    it is the spine of the whole part. Chapters 11 to 13 answered what should run: which
    detectors, at which tiers, reading which state, combining into which verdict. Chapter 14
    answered how it keeps running: within what latency, through what failures, at what cost,
    observed how. These are the two axes named in Section 14.01, and Part 3 traverses both.

    The key insight the arc delivers is that these axes are independent and both are
    necessary. A perfect logical design that is never deployed protects nothing, and a
    flawlessly deployed platform running weak detection catches nothing. Part 3 built the
    detection and then deployed it, in that order, because you cannot deploy what you have
    not designed -- but the deployment is not an afterthought to the design; it is the other
    half of making detection real. The deployed detection gateway is where the two halves
    meet.
- part: 10
  title: Five Cross-Cutting Threads
  body: |-
    Five threads run across the chapter and are worth pulling out because each appears in
    several sections. The first is the state-latency coupling from Chapter 13: it decided
    the tiers, and in Chapter 14 it reappears as the reason the inline tier scales cleanly,
    why large-state detectors cannot fit the latency budget, and where sampling is safe. The
    second is the sub-50ms P99 budget: introduced in Chapter 11, engineered in 14.04,
    sustained by scaling in 14.05, and validated in the capstone.

    The third is the fail-open/fail-closed decision: made per detector in 14.06, enforced by
    circuit breakers in 14.07, and applied throughout the assembled gateway. The fourth is
    the security-critical invariant: inline checks run on every request, fail closed, and
    are never sampled, held constant through performance, resilience, and cost pressure. The
    fifth is the design-versus-service distinction from 14.01: the claim that a complete
    design is a zero-ready service runs through every section and is finally discharged by
    the capstone validation. These threads are what make the chapter one argument rather
    than eleven topics.
- part: 11
  title: 'Quick Reference: Disciplines, Concerns, and Targets'
  body: |-
    For rapid recall, the chapter reduces to a few mappings. The five disciplines map to
    their sections: placement (14.02-14.03), performance (14.04-14.05), resilience
    (14.06-14.07), operability (14.08-14.09), cost (14.10), assembled by the capstone
    (14.11). The deployment concerns map to their mechanisms: placement to architecture
    patterns and integration points; latency to budget allocation, parallelism, and
    timeouts; throughput to horizontal scaling and backpressure; failure to fail-open and
    fail-closed; availability to circuit breakers, graceful degradation, and bulkheads;
    observability to metrics, logs, traces, and the dashboard; cost to sampling, caching,
    and batching.

    The three production targets are the acceptance test: the sub-50ms P99 latency budget,
    high availability through resilience, and cost within bound -- met together, not one at
    a time. And the one security invariant to carry above all is that the inline
    security-critical checks run on every request, fail closed, and are never sampled. The
    reference card and checklists in this section put these mappings in a form to keep
    beside a deployment.
- part: 12
  title: 'Chapter 15 Preview: Building the Production Detectors'
  body: |-
    Chapter 14 built and validated the deployment platform -- a gateway that runs detection
    fast, resiliently, observably, and affordably. What it deliberately did not do is build
    the detectors that populate it. The gateway is the platform; the detectors are what run
    inside it, and populating it with production detection is the work of Chapter 15, where
    Part 4 begins.

    Chapter 15 turns from deploying the system to building the practical, end-to-end
    production detectors and the integrations that connect them to real systems. Where
    Chapter 14 asked how a correct detection system survives production, Chapter 15 asks how
    the concrete detectors are built and integrated in practice -- the detector suite that
    fills the deployed gateway and turns the deployment platform into a working end-to-end
    detection capability. Part 3 gave the platform; Part 4 fills it.
