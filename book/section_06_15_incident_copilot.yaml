key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Code assistant injection operates through the developer's own trusted
        workspace -- code comments and package documentation -- not through
        external web resources. The injection surface is inside the developer's
        development environment.

    - number: 2
      takeaway: |
        Comment injection and dependency documentation injection share the same
        mechanism but differ in adversary reach. Comment injection requires
        repository access (bounded); dependency injection via package registries
        has supply chain scope (affects all installers).

    - number: 3
      takeaway: |
        The systemic root cause is evaluation focus: code assistant security
        review targeted generated code quality, not context source injection.
        Any tool that reads untrusted text as context without classifying it
        has this systemic gap.

    - number: 4
      takeaway: |
        Developer trust in IDE suggestions creates execution probability 25-40%
        per suggestion. The injection-to-execution chain is the shortest of any
        injection class. High-impact code execution requires no additional human
        action beyond accepting the suggestion.

    - number: 5
      takeaway: |
        The detection architecture is IDE-layer not network-layer: comment
        classifier at context assembly, dependency scanner at package install,
        and suggestion anomaly monitor post-generation. Enterprise deployment
        requires device management integration.

    - number: 6
      takeaway: |
        Dependency documentation injection links to Chapter 5 supply chain risk.
        Enterprise controls must include registry-level package documentation
        scanning as part of the package approval pipeline, not only per-developer
        IDE classifiers.

    - number: 7
      takeaway: |
        Developer-facing communication should enable anomaly awareness -- specific
        patterns that indicate injection-influenced suggestions -- without
        instructing developers to distrust their tools. Distrust eliminates
        the productivity benefit; awareness maintains safety.

    - number: 8
      takeaway: |
        The wide context window that makes code assistants more effective expands
        the injection surface proportionally. Each source added to the context
        window (more files, package docs, clipboard, terminal output) adds an
        injection surface. Classify all sources, not only the current file.


