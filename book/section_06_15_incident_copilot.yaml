                  "Security evaluation of AI tools must include context source injection, not only output quality",
                  "Developer-facing communication should enable anomaly awareness without degrading productivity",
              ],
              supply_chain_dimension=(
                  "Dependency documentation injection chains supply chain access with injection mechanics. "
                  "A single compromised package on PyPI, npm, or another public registry delivers injection "
                  "payloads to every developer who installs it and uses a code assistant. The adversary "
                  "achieves injection reach across an entire dependency graph without per-developer access. "
                  "This is qualitatively different from comment injection (which requires repository access) "
                  "and web injection (which requires owning or compromising a retrievable page)."
              ),
              developer_trust_factor=(
                  "Developer acceptance rates for code assistant suggestions range from 25% to 40% in "
                  "documented studies. This creates an execution probability for malicious suggestions "
                  "significantly higher than for other injection classes where the human must take "
                  "explicit action beyond accepting an automated suggestion. The short "
                  "injection-to-execution chain (injection -> suggestion -> accept -> run) with high "
                  "per-step probability makes code assistant injection the highest execution-probability "
                  "injection class in this taxonomy."
              ),
              public_sources=[
                  "Raz (2023). GitHub Copilot Indirect Prompt Injection. Security research, GitHub.",
                  "Greshake et al. (2023). Not What You Signed Up For. arXiv:2302.12173.",
                  "GitHub Security Lab (2023). Indirect Prompt Injection in Developer Tools.",
                  "Pierce (2023). Researchers show AI coding tools can be manipulated. The Register.",
