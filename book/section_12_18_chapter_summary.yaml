  - id: 6
    name: chapter_12_to_13_integration.py
    description: 'Chapter 12 to Chapter 13 integration diagram: per-request ML classification (Chapter 12) as the input to Chapter 13 session-level behavioural analysis, showing the data flow from the gateway decision to the behavioural layer.'
    implementation_notes: 'Single quotes throughout per book convention. No external dependencies.'
    code: |
      # chapter_12_to_13_integration.py
      # Section 12.18: Chapter 12 Summary
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class IntegrationStage:
          layer: str
          chapter: str
          produces: str


      INTEGRATION_FLOW: List[IntegrationStage] = [
          IntegrationStage('Per-request ML classification', 'Chapter 12',
                           'Per-request attack decision (block/flag/monitor) + detector scores'),
          IntegrationStage('Decision logging', 'Chapter 12 -> 13',
                           'Stream of per-request decisions tagged with session and source'),
          IntegrationStage('Session aggregation', 'Chapter 13',
                           'Per-session behavioural features from the decision stream'),
          IntegrationStage('Behavioural baseline', 'Chapter 13',
                           'What a normal session looks like per user/entity'),
          IntegrationStage('Drift and rate detection', 'Chapter 13',
                           'Deviations from baseline; rate-based patterns per-request misses'),
          IntegrationStage('Entity risk scoring', 'Chapter 13',
                           'Cross-session entity-level risk scores'),
      ]


      def render_integration(flow: List[IntegrationStage] = None) -> str:
          flow = flow or INTEGRATION_FLOW
          lines = ['Chapter 12 -> Chapter 13 Integration', '=' * 64]
          for i, stage in enumerate(flow):
              connector = '   |' if i < len(flow) - 1 else ''
              lines.append(f'\n[{stage.chapter}] {stage.layer}')
              lines.append(f'    produces: {stage.produces}')
              if connector:
                  lines.append(connector)
                  lines.append('   v')
          lines.append('\n' + '=' * 64)
          lines.append('Chapter 12 makes the per-request decision; Chapter 13 lifts')
          lines.append('the decisions to session-level and entity-level behavioural analysis.')
          return '\n'.join(lines)


      if __name__ == '__main__':
          print(render_integration())

common_mistakes:

  - id: 1
    description: 'Treating the individual detectors as the deliverable rather than the integrated system'
    why_it_happens: |
      Each detector section produced a working detector, so a practitioner concludes that building the
      detectors is the goal. The integration -- the ensemble, the calibration, the operational
      infrastructure -- is seen as secondary to the detectors themselves.
    consequence: |
      A collection of individually good detectors without the integration is not a detection system.
      Uncalibrated, they cannot be combined; without the registry, they cannot be updated safely; without
      the curation, they decay. The detectors are necessary but not sufficient; the integration is what
      makes them a system.
    correct_approach: |
      Treat the integrated system as the deliverable: the ensemble that combines the detectors, the
      calibration that makes the combination coherent, the inference optimisation that makes it deployable,
      and the operational infrastructure that keeps it current. The detectors are components; the system is
      the integration.

  - id: 2
    description: 'Building the detection system without the operational infrastructure, producing a decaying snapshot'
    why_it_happens: |
      The detectors work and the ensemble is accurate on the test set, so the system is considered complete.
      The model registry, live curation, and monitoring are deferred as infrastructure to add later, once
      the detection is proven.
    consequence: |
      Without the operational infrastructure, the detection system is a point-in-time snapshot that decays as
      adversaries adapt. There is no safe way to update it, no fresh data to retrain on, and no visibility
      into its degradation. Within months, the accurate detectors have fallen behind the attack distribution
      with no mechanism to recover.
    correct_approach: |
      Build the operational infrastructure as part of the detection system, not as an afterthought. The
      registry, curation, retraining trigger, and monitoring are what make the system sustainable. A
      detection system without them is not finished -- it is a snapshot that will decay.

  - id: 3
    description: 'Ignoring calibration and deploying detectors at the default 0.5 threshold'
    why_it_happens: |
      The detectors output scores between 0 and 1 that look like probabilities, and 0.5 is the obvious
      decision boundary. Calibration is seen as a refinement, and the default threshold is carried through
      from training to deployment.
    consequence: |
      The uncalibrated scores cannot be combined in the ensemble coherently, and the default 0.5 threshold
      produces an alert volume that may flood or starve the analyst queue. Both failures stem from skipping
      the calibration and threshold tuning that translate model scores into actionable decisions.
    correct_approach: |
      Calibrate every detector and set its threshold from the analyst capacity, per Section 12.10.
      Calibration is a prerequisite for the ensemble, the uncertainty sampling, and the score interpretation,
      not an optional refinement.

  - id: 4
    description: 'Deploying without latency profiling, discovering the SLO breach under production load'
    why_it_happens: |
      The detectors are individually fast in development, and the latency is not profiled under load. The
      system is deployed on the assumption that individually fast detectors compose into a fast system.
    consequence: |
      Under production load, the sequential or unoptimised composition of the detectors breaches the 50ms
      P99 SLO, and the detection layer is disabled to recover the latency, leaving the system unprotected.
      The latency was a security constraint that was not validated.
    correct_approach: |
      Profile the latency under representative load before deployment, per Section 12.12, and use the async
      parallel scoring, quantisation, and graceful degradation that fit the ensemble within the budget. The
      latency budget is a security constraint, not a performance nicety.

  - id: 5
    description: 'Not versioning models, making rollback a manual recovery and the audit impossible'
    why_it_happens: |
      Models are deployed by copying files, and versioning is seen as overhead. The system works without it
      until a rollback or an audit is needed.
    consequence: |
      When a model regresses, the rollback is a manual recovery that fails if the previous state was not
      preserved. When a decision is challenged, the audit cannot identify which model made it or what it was
      trained on. Both failures stem from the absence of model versioning.
    correct_approach: |
      Use the model registry from Section 12.13 to version every model with its full lineage. Versioning
      makes rollback a single operation and the audit possible -- it is the control plane that makes every
      model update safe and every decision traceable.

section_summary:
  compact: |
    Chapter 12 built the ML detection layer of the security gateway across seventeen sections. It established
    the five detection families (anomaly, supervised, sequence, semantic, neural) and the feature engineering
    shared across them; built the four input-side detectors and the output-side PII scanner; added the
    calibration, feature pipeline, and inference optimisation that make the detectors deployable within the
    50ms budget; built the model registry and live curation that keep the system from decaying; combined the
    detectors in the four-detector ensemble; validated everything with benchmarking and A/B testing; and
    integrated it all into the production ML gateway capstone. The central thesis is that ML detection
    complements rather than replaces signature detection: the two layers cover each other's gaps and fail
    independently, providing defence-in-depth. The chapter's deliverable is not the individual detectors but
    the integrated system -- the ensemble plus the operational infrastructure -- and a detection system without
    the registry, curation, and monitoring is a decaying snapshot rather than a sustainable defence. Chapter 13
    lifts the per-request decisions this gateway makes to session-level and entity-level behavioural analysis.

  key_takeaways:
    - 'The Chapter 12 deliverable is the integrated detection system, not the individual detectors: the ensemble combines them, the calibration makes the combination coherent, and the operational infrastructure keeps it current'
    - 'Five detection families cover the attack surface: anomaly (novel attacks), supervised (known families), sequence (multi-turn), semantic (paraphrase), and neural (highest precision), with the PII scanner covering output-side leakage'
    - 'The operational infrastructure -- registry, curation, retraining trigger, monitoring -- is what separates a sustainable detection system from a decaying snapshot; a detector without it falls behind the attack distribution'
    - 'ML detection complements signature detection rather than replacing it: the signatures catch known attacks fast and precisely, the ML detectors cover the novel variants, and the two fail independently for defence-in-depth'
    - 'Calibration and the latency budget are not refinements but requirements: uncalibrated scores cannot be combined, and a detector that breaches the SLO is disabled under load'
    - 'Chapter 12 makes the per-request decision; Chapter 13 lifts it to session-level behavioural analysis that the per-request classifiers cannot perform, completing the arc from request analysis to behavioural analysis'

preview_chapter_13:
  title: 'Chapter 13: Behavioural Analysis and Monitoring'
  preview: |
    Chapter 12 trained classifiers that evaluate individual API requests. Chapter 13 lifts the analysis to
    the session and user level: behavioural baselines that capture what a normal user session looks like,
    drift detection that flags when a user's behaviour deviates from baseline, rate-based detection patterns
    that the Chapter 12 classifiers cannot see because they operate per-request, and user behaviour profiling
    that builds entity-level risk scores across sessions. Chapter 13 also covers model behavioural monitoring:
    detecting when the LLM's output distribution shifts in ways that indicate prompt injection success rather
    than surface-level injection attempts. By the end of Chapter 13, the detection system covers the full arc
    from individual request analysis (Chapter 12) to session-level behavioural analysis (Chapter 13), ready
    for Chapter 14's production deployment at scale.

