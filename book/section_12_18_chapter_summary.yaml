deliverables:

  - id: 1
    name: ml_detection_architecture.py
    description: 'Encodes the full Chapter 12 ML detection architecture as a layered data structure and renders it as a text diagram: five detector families, four trained models, the feature pipeline, the model registry, and the gateway integration.'
    implementation_notes: 'Single quotes throughout per book convention. No external dependencies. The architecture layers are data-driven so the diagram is generated from the structure.'
    code: |
      # ml_detection_architecture.py
      # Section 12.18: Chapter 12 Summary
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class ArchitectureLayer:
          name: str
          components: List[str]
          section_refs: List[str]


      ML_DETECTION_ARCHITECTURE: List[ArchitectureLayer] = [
          ArchitectureLayer(
              'Feature Layer',
              ['Token features', 'Structural features', 'Semantic (ONNX embedding)',
               'Contextual (session cache)', 'API-level features'],
              ['12.2', '12.11'],
          ),
          ArchitectureLayer(
              'Detector Layer (input-side)',
              ['Isolation Forest (anomaly)', 'XGBoost (supervised)',
               'GRU (sequence)', 'Embedding (semantic)', 'DistilBERT (neural)'],
              ['12.3', '12.5', '12.6', '12.7', '12.8'],
          ),
          ArchitectureLayer(
              'Detector Layer (output-side)',
              ['PII scanner (regex + NER + Presidio)'],
              ['12.9'],
          ),
          ArchitectureLayer(
              'Calibration Layer',
              ['Platt scaling / isotonic', 'Per-threat-class thresholds', 'Drift monitor'],
              ['12.10'],
          ),
          ArchitectureLayer(
              'Ensemble Layer',
              ['Weighted voting', 'Stacking meta-learner', 'Three-tier routing'],
              ['12.15'],
          ),
          ArchitectureLayer(
              'Inference Layer',
              ['INT8 quantisation', 'Async parallel scoring', 'Early exit', 'Warm-up'],
              ['12.12'],
          ),
          ArchitectureLayer(
              'Operational Layer',
              ['Model registry', 'Live curation', 'Retraining trigger', 'Benchmarking', 'Monitoring'],
              ['12.13', '12.14', '12.16', '12.17'],
          ),
          ArchitectureLayer(
              'Gateway Integration',
              ['Seven-track assignment', 'Signature + ML combine', 'Graceful degradation',
               'AML.T0040 meta-attack detection'],
              ['12.17'],
          ),
      ]


      def render_architecture(layers: List[ArchitectureLayer] = None) -> str:
          layers = layers or ML_DETECTION_ARCHITECTURE
          lines = ['ML Detection Architecture (Chapter 12)', '=' * 60]
          for layer in layers:
              refs = ', '.join(layer.section_refs)
              lines.append(f'\n[{layer.name}]  (sections {refs})')
              for comp in layer.components:
                  lines.append(f'    - {comp}')
          lines.append('\n' + '=' * 60)
          lines.append('Flow: request -> features -> detectors -> calibration -> ensemble')
          lines.append('      -> inference optimisation -> gateway decision -> response')
          lines.append('      (output-side PII scan on the response; operational layer governs all)')
          return '\n'.join(lines)


      if __name__ == '__main__':
          print(render_architecture())

  - id: 2
    name: ml_detector_reference_card.py
    description: 'Reference card for all four input-side detectors plus the PII scanner: accuracy profile, latency, coverage, and operating threshold for quick lookup.'
    implementation_notes: 'Single quotes throughout per book convention. No external dependencies. Values are representative profiles consolidated from the chapter sections.'
    code: |
      # ml_detector_reference_card.py
      # Section 12.18: Chapter 12 Summary
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class DetectorCard:
          name: str
          family: str
          latency_ms: str
          coverage: str
          threshold_bias: str
          section: str


      DETECTOR_CARDS: List[DetectorCard] = [
          DetectorCard('Isolation Forest', 'Anomaly', '1-3ms',
                       'Novel attacks, no labels', 'Favour precision', '12.3'),
          DetectorCard('XGBoost', 'Supervised', '1-3ms',
                       'Known injection patterns', 'Balanced', '12.5'),
          DetectorCard('GRU', 'Sequence', '5-15ms',
                       'Multi-turn escalation', 'Balanced toward recall', '12.6'),
          DetectorCard('Embedding', 'Semantic', '2-4ms',
                       'Paraphrase variants', 'Balanced', '12.7'),
          DetectorCard('DistilBERT', 'Neural', '5-7ms (INT8)',
                       'Single-turn jailbreaks', 'Balanced toward recall', '12.8'),
          DetectorCard('PII scanner', 'Output-side', '15-40ms',
                       'Output PII leakage (LLM06)', 'Favour recall', '12.9'),
      ]


      def print_reference_card(cards: List[DetectorCard] = None) -> None:
          cards = cards or DETECTOR_CARDS
          print('Chapter 12 ML Detector Reference Card')
          print('=' * 92)
          fmt = '{:<16} {:<12} {:<14} {:<26} {:<20} {:<6}'
          print(fmt.format('Detector', 'Family', 'Latency', 'Coverage', 'Threshold Bias', 'Sec'))
          print('-' * 92)
          for c in cards:
              print(fmt.format(c.name, c.family, c.latency_ms, c.coverage[:26],
                               c.threshold_bias, c.section))


      if __name__ == '__main__':
          print_reference_card()

  - id: 3
    name: operational_sustainability_checklist.py
    description: 'The four requirements for a detector that does not decay -- model registry, live dataset curation, retraining trigger, canary promotion -- as an assessable checklist that scores a detection system operational sustainability.'
    implementation_notes: 'Single quotes throughout per book convention. No external dependencies.'
    code: |
      # operational_sustainability_checklist.py
      # Section 12.18: Chapter 12 Summary
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import Dict, List


      @dataclass
      class SustainabilityRequirement:
          name: str
          section: str
          present: bool
          without_it: str


      def assess_sustainability(
          has_registry: bool,
          has_curation: bool,
          has_retraining_trigger: bool,
          has_canary: bool,
      ) -> List[SustainabilityRequirement]:
          return [
              SustainabilityRequirement('Model registry', '12.13', has_registry,
                                        'Rollback is manual; regressions reach production'),
              SustainabilityRequirement('Live dataset curation', '12.14', has_curation,
                                        'Detectors decay as the attack distribution shifts'),
              SustainabilityRequirement('Retraining trigger', '12.14', has_retraining_trigger,
                                        'Retrain too often (waste) or too rarely (decay)'),
              SustainabilityRequirement('Canary promotion', '12.13', has_canary,
                                        'A regressed model affects all traffic immediately'),
          ]


      def print_assessment(requirements: List[SustainabilityRequirement]) -> bool:
          print('Operational Sustainability Assessment')
          print('=' * 60)
          all_present = True
          for r in requirements:
              status = 'PRESENT' if r.present else 'MISSING'
              print(f'  [{status:>7}] {r.name} ({r.section})')
              if not r.present:
                  all_present = False
                  print(f'            Without it: {r.without_it}')
          print('-' * 60)
          verdict = 'SUSTAINABLE' if all_present else 'WILL DECAY'
          print(f'  Verdict: {verdict}')
          return all_present


      if __name__ == '__main__':
          # A system missing curation and the retraining trigger will decay
          reqs = assess_sustainability(
              has_registry=True, has_curation=False,
              has_retraining_trigger=False, has_canary=True,
          )
          print_assessment(reqs)

