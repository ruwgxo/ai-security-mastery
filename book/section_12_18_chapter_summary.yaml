    - 'Recall the five ML detection families and the part of the attack surface each covers'
    - 'Explain how the four-detector ensemble combines the input-side detectors and why the PII scanner is separate'
    - 'Describe the operational infrastructure (feature pipeline, calibration, registry, curation) that makes the detection system sustainable'
    - 'State the central thesis of Chapter 12: ML detection complements rather than replaces signature detection'
    - 'Describe how the Chapter 12 gateway feeds the Chapter 13 behavioural analysis'
  skills:
    - 'Navigate the Chapter 12 architecture to locate the component relevant to a detection engineering decision'
    - 'Select the appropriate ML detection family for a given attack class using the decision tree'
    - 'Apply the operational sustainability checklist to assess whether a detection system will decay'
    - 'Map each detector to its gateway track using the detector-to-track reference'
  security_mindset:
    - 'Hold the whole detection system in view: the value is in the integration of the detectors and the operational infrastructure, not in any single technique'
    - 'Recognise that a detection system without the operational infrastructure (registry, curation, monitoring) is a decaying snapshot, not a sustainable defence'
    - 'Treat ML detection and signature detection as complementary layers that cover each others gaps and fail independently'
    - 'Understand that per-request classification is the foundation, not the whole, of detection: session-level patterns require the behavioural analysis of Chapter 13'

prerequisites:
  - 'Sections 12.1 through 12.17: the complete Chapter 12 content this summary synthesises'

prose_content:

  - part: 1
    title: 'Sections 12.1 and 12.2 in Review: Taxonomy and Feature Engineering'
    body: |
      Chapter 12 opened by establishing what ML-based detection is and is not. Section 12.1 built the
      taxonomy of five detection families -- unsupervised anomaly detection, supervised classification,
      sequence modelling, embedding-based semantic detection, and neural classification -- and the
      maturity ladder that places a detection programme on the path from no ML (L1) through the full
      ensemble (L3). The taxonomy is the map: it tells a practitioner which family fits which attack
      class and which families are worth the operational cost at each maturity level.

      Section 12.2 built the feature engineering that every supervised detector depends on. The five
      feature groups -- token, structural, semantic, contextual, and API-level -- convert a raw request
      into the SecurityFeatureVector that the classifiers consume. The section introduced the
      training-serving skew risk that Section 12.11 later addressed in production, and it established
      SHAP as the explainability method that makes a classifier's decision attributable to specific
      features. The feature engineering is the foundation: a detector is only as good as the features
      it sees, and the shared feature design is what lets the detectors be combined coherently.

  - part: 2
    title: 'Sections 12.3 and 12.4 in Review: Anomaly Detection and Dataset Curation'
    body: |
      Section 12.3 built the first detector, the one that needs no labels. The Isolation Forest and
      One-Class SVM learn the benign distribution and flag deviations, catching novel attacks on day
      one before any labelled data exists. The anomaly-to-label pipeline turned the anomaly alerts into
      the seed labelled data for the supervised detectors, establishing the bootstrap that lets the
      detection programme start with zero labels and grow its dataset from production.

      Section 12.4 built the dataset curation that the supervised detectors train on. The four data
      sources, the temporal split that prevents future-leakage, the SMOTE and class-weighting that handle
      the severe class imbalance of security data, and the inter-annotator agreement that ensures label
      quality together produce the training dataset. The temporal-split discipline established here
      propagated through the whole chapter: every detector, every calibration, and every meta-learner
      trains on the temporal split, never a random one, because a random split inflates the metrics with
      future-leakage.

  - part: 3
    title: 'Sections 12.5 through 12.9 in Review: The Four Trained Detectors and the PII Scanner'
    body: |
      Sections 12.5 through 12.8 built the four supervised detectors. Section 12.5 built the Random
      Forest and XGBoost supervised classifiers and the shared security_evaluator.py that every
      subsequent detector section imported. Section 12.6 built the LSTM and GRU sequence models that
      catch multi-turn escalation -- the attacks that build across conversation turns, which single-message
      detectors cannot see. Section 12.7 built the embedding-based semantic detector that catches paraphrase
      variants by similarity to known attacks. Section 12.8 built the DistilBERT neural classifier, the
      highest-precision supervised detector, with the model card that became the registry gate condition.

      Section 12.9 built the PII scanner, the chapter's only output-side detector. It scans the model
      response, not the user request, addressing the OWASP LLM06 leakage that no input-side detector can
      catch. The three-layer ensemble -- regex, NER, and Presidio with context scoring -- distinguishes real
      PII from the fictional and example data that a model legitimately generates. The PII scanner's
      output-side position is why it runs separately from the four-detector input-side ensemble.

  - part: 4
    title: 'Sections 12.10 through 12.12 in Review: Calibration, Feature Pipeline, and Inference Optimisation'
    body: |
      Sections 12.10 through 12.12 built the layer that turns the trained detectors into deployable
      production components. Section 12.10 built the calibration -- Platt scaling and isotonic regression --
      that makes the detector scores reliable probabilities on a common scale, the prerequisite for combining
      them in the ensemble, and the threshold tuning that sets each detector's operating point from the
      analyst capacity rather than the default 0.5.

      Section 12.11 built the production feature pipeline that makes the Section 12.2 feature design real:
      sub-5ms extraction, training-serving parity through a single canonical pipeline and the same ONNX
      embedding model at training and serving, and feature schema versioning that rejects mismatched
      requests. Section 12.12 built the inference optimisation that fits the four-detector ensemble within
      the 50ms P99 budget: INT8 quantisation, async parallel scoring that makes the ensemble latency the
      maximum rather than the sum of the detector latencies, early exit, and model warm-up. Together these
      three sections are why the ensemble runs in production rather than only in a notebook.

  - part: 5
    title: 'Sections 12.13 and 12.14 in Review: Model Registry and Live Dataset Curation'
    body: |
      Sections 12.13 and 12.14 built the infrastructure that keeps the detection system from decaying.
      Section 12.13 built the model registry -- the control plane that makes every detector update safe and
      reversible. The Staging-Production-Archived stage model, the stage transition gates that enforce the
      calibration, latency, accuracy, and model-card checks, the shadow mode and canary promotion that
      validate a candidate on live traffic, and the model lineage that satisfies the audit requirement
      together make model deployment a governed operation rather than a manual incident.

      Section 12.14 built the live dataset curation that closes the active learning loop. Uncertainty
      sampling focuses the scarce analyst annotation on the boundary cases that improve the model most; the
      composite retraining trigger combines data quantity and drift signal; the data flywheel turns
      production traffic into the fresh labelled data that keeps the detectors current as adversaries adapt.
      Together, the registry and the curation are the difference between a one-time detector deployment and
      a self-improving detection system that does not decay.

  - part: 6
    title: 'Sections 12.15 and 12.16 in Review: The Four-Detector Ensemble and Benchmarking'
    body: |
      Section 12.15 built the four-detector ensemble, the chapter's primary production deliverable. The
      Isolation Forest, the supervised classifiers, the GRU, and the embedding detector are combined by
      weighted voting or a stacking meta-learner into a single decision whose coverage and precision exceed
      any individual detector through complementarity. The coverage complementarity analysis and the
      confidence correlation matrix verify that the detectors cover different attack families and make
      independent errors -- the two properties that make the ensemble valuable. The three-tier alert routing
      aligns the ensemble output with the analyst capacity.

      Section 12.16 built the benchmarking and A/B testing that back every model promotion with evidence.
      The cross-detector benchmark compares the configurations on the same temporal test set; the A/B testing
      framework validates a candidate on production traffic with statistical significance and guardrail
      metrics; the sample size calculator ensures the test runs long enough to detect the effect; the
      online-offline divergence quantifies the gap between the benchmark and production reality. Together they
      turn anecdotal accuracy claims into statistically significant production evidence.

  - part: 7
    title: 'Section 12.17 in Review: The Production ML Gateway Capstone'
    body: |
      Section 12.17 integrated everything into the production ML gateway. The four input-side detectors are
      distributed across the seven gateway tracks by coverage profile and combined by the ensemble; the PII
      scanner runs output-side on Track 5; the feature pipeline and inference optimisation keep the integrated
      gateway within the 50ms P99 budget. The ML layer extends the Chapter 11 signature layer rather than
      replacing it, providing defence-in-depth where the two layers cover each other's gaps and fail
      independently.

      The capstone addressed the production realities that the isolated sections did not. Graceful degradation
      sheds the highest-latency detectors first under load, falling back toward signature-only rather than
      breaching the SLO. The deployment checklist enforces the registry gate conditions as a hard gate before
      any detector handles traffic. The ATLAS AML.T0040 Sigma rule detects the meta-attack -- adversaries probing
      the classifier decision boundaries to craft evasions. The monitoring dashboard makes the ML layer
      observable. The capstone is where the ML detection layer became a deployable, observable, defensible
      production system.

  - part: 8
    title: 'Integration: How Chapter 12 Extends the Chapter 11 Gateway'
    body: |
      Chapter 12 did not build a standalone detection system -- it built a detection layer that plugs into the
      Chapter 11 seven-track gateway. The integration is the chapter's architectural through-line: each ML
      detector is assigned to the gateway tracks its coverage profile fits, running in parallel with the
      signature rules already on those tracks. Track 1 (injection) gains the embedding detector and XGBoost;
      Tracks 2-4 (jailbreak) gain the GRU and DistilBERT; Track 5 (PII) gains the output-side PII scanner;
      Track 6 (extraction) gains the Isolation Forest; Track 7 (adversarial) gains the Chapter 10 detectors.

      The integration principle is complementarity at the track level. The signature layer provides fast,
      precise, interpretable detection of known attacks and the baseline that never goes blind. The ML layer
      provides coverage of the novel variants the signatures miss, at the cost of higher latency and lower
      interpretability, managed by the calibration, ensemble, inference optimisation, and monitoring built
      across the chapter. The integrated gateway is more robust than either layer alone because the layers
      cover each others gaps and fail independently -- if the ML layer is shed under load, the signatures
      continue; if a novel attack evades the signatures, the ML layer covers it.

  - part: 9
    title: 'Cross-Chapter Arc: Rules Plus Classifiers Equals Defence-in-Depth'
    body: |
      Chapter 11 built the rules; Chapter 12 built the classifiers. Together they close the detection layer of
      Part 3 of the book. The cross-chapter arc is the maturation of the detection system from a pure
      signature-based gateway to a hybrid gateway with both a fast, precise signature layer and a coverage-broad
      ML layer. Neither layer alone is sufficient: signatures miss novel variants, ML detectors are slower and
      less interpretable, and a sophisticated adversary can probe either. The two together provide
      defence-in-depth.

      This arc reflects the central thesis of Chapter 12: ML detection is not a replacement for signature
      detection but a complement. The chapters that follow build on this hybrid detection foundation. Chapter 13
      lifts the per-request decisions to session-level behavioural analysis. Chapter 14 scales the deployment.
      Chapter 17 monitors and tunes the system over time. The detection system the book builds is the hybrid
      gateway, and Chapter 12 is the chapter that added its ML half.

  - part: 10
    title: 'Five Cross-Cutting Threads'
    body: |
      Five threads ran through the whole chapter and are worth isolating. First, the temporal split: every
      detector, calibration, and meta-learner trains on the temporal split, never a random one, because the
      random split inflates metrics with future-leakage that production does not enjoy. Second, calibration as a
      prerequisite: uncalibrated scores cannot be combined, cannot be uncertainty-sampled, and cannot be
      interpreted, so the Section 12.10 calibration underpins the ensemble, the curation, and the explainability.

      Third, the latency budget as a security constraint: a detector that breaches the 50ms SLO is disabled under
      load, so the inference optimisation and graceful degradation are not performance niceties but security
      requirements. Fourth, the operational sustainability: the registry, curation, and monitoring are what
      separate a sustainable detection system from a decaying snapshot, and a detector without them will fall
      behind the attack distribution. Fifth, defence-in-depth: the ML layer complements the signature layer, the
      ensemble complements the individual detectors, and the output-side PII scanner complements the input-side
      detectors -- redundant coverage that fails independently.

  - part: 11
    title: 'Quick Reference: Decision Trees, Track Mapping, and Operating Points'
    body: |
      For the practitioner building an ML detection system, the chapter's decisions reduce to a few reference
      structures. The ML family selection decision tree (table 1) maps an attack class to the detection family
      that fits: novel attacks without labels to anomaly detection, known families with labels to supervised
      classification, multi-turn patterns to sequence models, paraphrase variants to embedding detection,
      output leakage to the PII scanner. The detector-to-track mapping (table 2) places each detector on its
      gateway track. The threshold operating point guide (table 3) sets each detector's threshold from the
      analyst capacity and the threat-class consequence.

      These references are the distillation of the chapter's seventeen sections into the decisions a detection
      engineer makes. The decision tree answers which detector to build; the track mapping answers where it
      runs; the operating point guide answers how to tune it. The operational sustainability checklist (table 4)
      answers whether the resulting system will decay -- the four requirements (registry, curation, retraining
      trigger, canary promotion) that a detector needs to stay current rather than degrade.

  - part: 12
    title: 'Chapter 13 Preview: Behavioural Analysis and Monitoring'
    body: |
      Chapter 12 trained classifiers that evaluate individual API requests. Each detector, the ensemble, and the
      gateway make a per-request decision: is this request an attack. This is the foundation of detection, but it
      is not the whole. Some attacks are invisible at the per-request level and visible only across a session or
      a user's history: a slow extraction campaign where each query is individually benign, a coordinated probing
      where each request is near-the-boundary, an account takeover where the behavioural pattern shifts.

      Chapter 13 lifts the analysis from the request to the session and the user. It builds behavioural baselines
      that capture what a normal user session looks like, drift detection that flags when a user's behaviour
      deviates from baseline, rate-based detection that the per-request classifiers cannot see, and user
      behaviour profiling that builds entity-level risk scores across sessions. It also covers model behavioural
      monitoring -- detecting when the LLM's output distribution shifts in ways that indicate injection success
      rather than surface-level injection attempts. By the end of Chapter 13, the detection system covers the
      full arc from individual request analysis (Chapter 12) to session-level behavioural analysis (Chapter 13),
      ready for Chapter 14's production deployment at scale.

