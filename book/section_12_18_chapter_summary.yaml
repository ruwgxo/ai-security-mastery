      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class SecurityControl:
          category: str
          control: str
          section: str


      SECURITY_CHECKLIST: List[SecurityControl] = [
          SecurityControl('Detection coverage', 'All seven tracks have signature + ML coverage', '12.17'),
          SecurityControl('Detection coverage', 'No single-detector track without monitoring', '12.15'),
          SecurityControl('Calibration', 'Every detector ECE below threshold', '12.10'),
          SecurityControl('Calibration', 'Thresholds set from analyst capacity, not 0.5', '12.10'),
          SecurityControl('Latency', 'Gateway P99 within 50ms validated under load', '12.12'),
          SecurityControl('Latency', 'Graceful degradation policy configured', '12.17'),
          SecurityControl('Feature integrity', 'Training-serving parity tests passing', '12.11'),
          SecurityControl('Feature integrity', 'Feature schema versioning enforced', '12.11'),
          SecurityControl('Governance', 'Model registry with stage gates active', '12.13'),
          SecurityControl('Governance', 'Shadow mode and canary validated', '12.13'),
          SecurityControl('Sustainability', 'Live curation and retraining trigger active', '12.14'),
          SecurityControl('Meta-attack', 'AML.T0040 boundary-probing detection deployed', '12.17'),
          SecurityControl('Observability', 'Monitoring dashboard and alerting configured', '12.17'),
          SecurityControl('Privacy', 'PII anonymisation before annotation queue', '12.14'),
      ]


      def print_security_checklist(controls: List[SecurityControl] = None) -> None:
          controls = controls or SECURITY_CHECKLIST
          print('Seven-Track ML Gateway Security Checklist')
          print('=' * 66)
          current_category = None
          for c in controls:
              if c.category != current_category:
