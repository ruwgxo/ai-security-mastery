document_info:
  title: 'Section 12.18: Chapter 12 Summary'
  subtitle: 'ML Detection Architecture and Chapter 13 Preview'
  chapter: 12
  section: 18
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  estimated_pages: 6
  estimated_reading_time: '24 minutes'
  created: '2026-06-06'

section_overview:
  one_line_summary: 'Chapter 12 built the ML detection layer of the security gateway: five detector families, a four-detector ensemble, and the operational infrastructure that keeps it accurate, fast, and current in production.'
  why_this_section_exists: |
    Chapter 12 spanned seventeen content sections that each built one component of an ML-based
    detection system. Read in isolation, each section is a technique -- an anomaly detector, a
    calibration method, a model registry. Read together, they are a single architecture: a
    production ML detection layer that extends the Chapter 11 signature-based gateway with
    classifiers that catch the novel attack variants signatures miss.

    This summary synthesises the seventeen sections into that architecture. It revisits the five
    detection families and the four-detector ensemble, the feature pipeline shared across the
    detectors, the calibration and inference optimisation that make the ensemble deployable, the
    model registry and live curation that keep it from decaying, and the production gateway
    capstone that integrates everything. It consolidates the chapter's central thesis -- that ML
    detection complements rather than replaces signature detection -- and it sets up Chapter 13,
    where the per-request detection decisions made by this gateway are lifted to session-level
    behavioural analysis.

    The summary is the map of the territory the chapter covered, the reference for the decisions
    a practitioner makes when building an ML detection system, and the bridge to the behavioural
    analysis that the per-request classifiers cannot perform alone.
  position_in_chapter: |
    Section 12.18 closes Chapter 12. It synthesises Sections 12.1 through 12.17 and previews
    Chapter 13 (Behavioural Analysis and Monitoring). It is the final section of the chapter and
    the transition point from the per-request ML detection layer to the session-level behavioural
    layer that Chapter 13 builds on top of it.

learning_objectives:
