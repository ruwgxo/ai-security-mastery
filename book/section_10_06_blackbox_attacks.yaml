section_overview:
  one_line_summary: 'Boundary Attack walks from a misclassified image toward the natural input using only hard-label oracle calls; NES estimates gradient direction from antithetic query pairs under soft-label conditions -- both operate in the same API space Chapter 9 established for extraction.'
  why_this_section_exists: |
    White-box attacks (Sections 10.3-10.5) require gradient access that most production APIs do not
    expose. The realistic adversary against a commercial classifier or LLM safety filter has only
    what the API returns: a class label, a confidence score, or a binary pass/fail. Section 10.6
    establishes the two attack families that work under these conditions: decision-based attacks
    (Boundary Attack, hard-label only) and score-based attacks (NES, probabilities required). Both
    connect directly to Chapter 9: the API access conditions that enabled Chapter 9 extraction
    campaigns also enable Chapter 10 black-box adversarial evasion. The query monitor Track 6
    built for extraction partially detects black-box adversarial probing for the same reason.
  position_in_chapter: |
    Section 10.6 opens the black-box attack tier of the Chapter 10 taxonomy. It establishes the
    query budget baselines that Section 10.7 (transfer attacks) reduces to near-zero, and the
    detection signal overlap with Track 6 that Section 10.13 must account for in the gateway
    architecture.

learning_objectives:

  knowledge:
    - 'Distinguish score-based (soft-label) from decision-based (hard-label) black-box attacks and state which API condition each requires'
    - 'Describe the Boundary Attack initialisation strategy and why it must start from a point that is already adversarial'
    - 'Explain the two-component Boundary Attack step: orthogonal perturbation to stay near the boundary and radial step to reduce distance to the natural image'
    - 'Derive the NES gradient estimate from antithetic query pairs and state why antithetic sampling is preferred over independent sampling'
    - 'State the query budget ranges for Boundary Attack and NES and compare them to white-box attack costs'
    - 'Explain why Track 6 partially detects black-box adversarial campaigns and identify the gap that Track 7 must close'

  skills:
    - 'Implement the Boundary Attack with hard-label oracle, orthogonal step, and radial step'
    - 'Implement NES gradient estimation with antithetic sampling and take an FGSM-style step on the estimated gradient'
    - 'Count queries per adversarial example for both attacks and plot the L2 distance vs query count convergence curve'
    - 'Compare black-box and white-box attack quality at matched success rate and quantify the query cost premium'
    - 'Analyse the query pattern signals from Boundary Attack and NES against the Track 6 detection baseline'

  security_mindset:
    - 'Recognise that the adversary who completed a Chapter 9 extraction campaign does not need black-box adversarial attacks -- they have a surrogate for white-box transfer; black-box attacks are for adversaries who did not extract'
    - 'Understand that query budget is the operational lever: the adversary must decide whether the cost of 100,000 queries is worth the adversarial example -- rate limiting and cost allocation are security controls'
    - 'Appreciate that the detection connection between Chapters 9 and 10 is not incidental -- the same query pattern signatures that reveal extraction campaigns also reveal decision-boundary probing, because both concentrate queries at the boundary'

prerequisites:
  - 'Section 9.1: adversary access ladder (black-box / grey-box / white-box framing)'
  - 'Section 9.11: production gateway Track 6 (query monitor that partially detects black-box adversarial probing)'
  - 'Section 10.3: FGSM (NES takes FGSM-style step on estimated gradient; the primitive is reused)'
  - 'Section 10.2: adversarial taxonomy (black-box / grey-box cells; query budget implications)'
  - 'Section 10.1: Lp norm constraints (L2 norm is the convergence metric for Boundary Attack)'

prose_content:

  part_1:
    title: 'The Black-Box Threat Model: Same API, Different Goal'
    body: |
      Chapters 9 and 10 share an attack surface. Chapter 9 described the adversary who sends
      thousands of queries to a model API to reconstruct decision boundaries or train a surrogate.
      Section 10.6 describes an adversary who sends thousands of queries to that same API to
      produce a single adversarial example -- one perturbed input that the model misclassifies.
      The API configuration is identical; the adversary goal is different.

      This shared surface has two implications. First, the same Chapter 9 query monitor (Track 6)
      that flags extraction campaigns produces partial detection signals for black-box adversarial
      probing. Both activities concentrate queries near the decision boundary -- extraction to map
      it, black-box adversarial attacks to cross it. Second, an adversary who already completed
      a Chapter 9 extraction campaign does not need the black-box attacks in this section: they
      have a surrogate model for white-box access and can use transfer attacks (Section 10.7) at
      near-zero additional victim query cost. Black-box attacks are for adversaries who have not
      extracted the model -- their query budget is their only leverage.

      Production API configurations determine which attack family is applicable. Hard-label APIs
      return only the top-1 predicted class: the adversary has a binary oracle (is the input
      classified as the target class or not?). Soft-label APIs return class probabilities: the
      adversary has a scalar score for each class. Decision-based attacks (Boundary Attack) require
      only hard-label access. Score-based attacks (NES) require soft-label access and are more
      query-efficient because each query carries more information (a probability distribution
      rather than a single class index).

  part_2:
    title: 'Two Black-Box Families: Score-Based and Decision-Based'
    body: |
      The binary between score-based and decision-based attacks maps precisely to what information
      the API exposes per query.

      Score-based (soft-label) attacks receive class probabilities or logit values from the model.
      This includes the confidence score of the correct class, the relative ordering of all classes,
      and the margin between the top class and the second class. NES (this section), Square Attack,
      and SPSA all fall in this category. The scalar loss signal per query enables efficient gradient
      estimation: two queries at (x + sigma*u) and (x - sigma*u) produce a scalar estimate of the
      gradient projection in the direction u. Score-based attacks are more query-efficient than
      decision-based attacks because they extract a continuous signal rather than a binary one.

      Decision-based (hard-label) attacks receive only the top-1 class prediction. This is the
      strictest API condition and the most common in production deployments: many commercial
      classifiers return only the classification result, not the underlying confidence. The Boundary
      Attack and HopSkipJump fall in this category. With only a binary oracle (adversarial or not),
      the adversary must sample the boundary rather than follow a gradient direction. This requires
      more queries but works against a wider range of deployments.

      The two families have different detection signatures. Score-based attacks produce uniform
      query distributions -- each query is drawn from approximately the same distribution (inputs
      near x with small sigma-scaled perturbations). Decision-based attacks produce query patterns
      that spiral toward the natural image from an initially very different starting point -- the
      queries are not concentrated near x initially but converge toward it over time.

  part_3:
    title: 'Boundary Attack: Starting from the Wrong Side of the Decision Boundary'
    body: |
      The Boundary Attack (Brendel, Rauber, Bethge 2018) is built on a non-obvious insight: instead
      of asking "how do I push x to the wrong side of the decision boundary?", ask "how do I start
      from the wrong side of the boundary and walk toward x while staying adversarial?"

      Every classification model has a decision boundary that separates the space of inputs that
      produce one class from inputs that produce another. An adversarial example is any point on
      the adversary''s side of that boundary that is close to the natural input x. The Boundary
      Attack finds such a point by: (1) initialising from a point that is already adversarial
      (typically a sample from a different class or a random noise image that the model
      misclassifies), and (2) iteratively walking toward x along the decision boundary, reducing
      the L2 distance from x while maintaining the adversarial classification.

      This reframing has a critical property: it requires no gradient access. The walk along the
      boundary is a random walk guided entirely by the binary oracle response -- is the current
      point adversarial or not? Each step of the walk either proposes a move closer to x (radial
      step) or a move along the boundary (orthogonal step) and checks whether the resulting point
      is still adversarial. No probability score, no gradient, no model internals are needed. This
      makes the Boundary Attack applicable to any system where the adversary can observe the final
      classification decision -- including physical systems accessed via camera or sensor rather
      than API.

  part_4:
    title: 'Boundary Attack Algorithm: Orthogonal Step and Radial Step'
    body: |
      Each iteration of the Boundary Attack performs two operations. The notation uses x_orig for
      the original natural image, x_adv for the current adversarial point on the boundary, and
      delta = x_adv - x_orig for the perturbation vector.

      The orthogonal step proposes a perturbation in a direction perpendicular to delta. Sample a
      random noise vector u, project out the component along delta to get u_perp = u - (u·delta /
      ||delta||²)·delta, normalise u_perp to unit length, and propose x_test = x_adv + step_size
      * ||delta|| * u_perp. If x_test is adversarial (oracle returns adversarial), accept it.
      Otherwise discard and try a smaller orthogonal step. The orthogonal step explores the
      boundary surface without changing the L2 distance to x_orig.

      The radial step proposes a move toward x_orig. Propose x_radial = x_adv + radial_size *
      (x_orig - x_adv) = lerp(x_adv, x_orig, radial_size). If x_radial is adversarial, accept it
      -- the adversarial example is now closer to the natural image. If not, discard -- the step
      would cross the boundary into correctly-classified space. The radial step reduces L2 distance
      when it succeeds.

      The convergence metric is the L2 distance ||x_adv - x_orig||_2 over iterations. A well-
      tuned Boundary Attack shows a monotonically decreasing L2 curve, reaching a plateau where
      further reduction is not achievable at the current oracle query rate. Typical configurations
      run 1,000 to 25,000 oracle calls per adversarial example. The step sizes (orthogonal and
      radial) are typically set as fractions of the current L2 distance, producing adaptive
      refinement as the example approaches the boundary more tightly.

  part_5:
    title: 'NES: Gradient Direction Estimation from Antithetic Query Pairs'
    body: |
      Natural Evolution Strategies adapts an evolutionary algorithm framework to the problem of
      gradient estimation from oracle queries. The core idea is: query the model at pairs of
      points symmetric around x, and estimate the gradient direction from the score difference.

      For a score function f (e.g., the logit of the best wrong class minus the logit of the
      correct class), the NES gradient estimate uses antithetic sampling. Sample k random
      directions u_1, ..., u_k uniformly on the unit sphere. For each direction u_i, query the
      model at x + sigma*u_i and x - sigma*u_i (the antithetic pair), obtaining scores
      f(x + sigma*u_i) and f(x - sigma*u_i). The gradient estimate is:
      g_hat = (1/k) * sum_i [(f(x + sigma*u_i) - f(x - sigma*u_i)) / (2*sigma)] * u_i.

      This is a finite-difference approximation of the gradient projected onto the randomly
      sampled directions. The antithetic pairing is critical for efficiency: a single pair
      (x + sigma*u, x - sigma*u) provides an unbiased estimate of the gradient projection in
      direction u using 2 queries. Independent sampling (x + sigma*u and x + sigma*v for
      independent u, v) would require 2k queries for the same variance-reduction as k antithetic
      pairs, doubling the query budget.

      Once the gradient estimate g_hat is available, NES takes a step using the same gradient-sign
      primitive as FGSM: x_{t+1} = clip(x_t + alpha * sign(g_hat), 0, 1) for L-infinity attacks,
      or x_{t+1} = clip(x_t + alpha * g_hat / ||g_hat||, 0, 1) for L2 attacks. The NES attack is
      therefore "FGSM with estimated gradient" applied iteratively, placing it conceptually between
      FGSM (one exact gradient step) and PGD (k exact gradient steps) in terms of attack structure.
      The query cost per step is 2k queries; with 40 optimisation steps and k=25 directions, the
      total query budget is 2000 queries per adversarial example.

  part_6:
    title: 'Query Budget Analysis and the Practical Threat Model'
    body: |
      The query budget frames the economic reality of black-box adversarial attacks. Each query
      costs money (API billing), time (rate limits), or detectability risk (query pattern anomaly).
      The adversary must decide whether their attack goal is worth the query budget required.

      For the Boundary Attack, the convergence curve shows L2 distance decreasing rapidly in the
      first few hundred queries and plateauing around 1,000-10,000 queries. Reaching a tight L2
      norm (comparable to FGSM at epsilon=8/255) requires 10,000-100,000 queries. At commercial
      API pricing (roughly $0.001-0.01 per query for a standard vision classifier), this is
      $10-1,000 per adversarial example -- affordable for a motivated adversary targeting a
      high-value system, but too expensive for mass evasion of commodity classifiers.

      NES is more query-efficient at matched perturbation quality. With 2k=50 queries per gradient
      step and 40 steps, NES requires approximately 2,000 queries per adversarial example for L2
      perturbation sizes comparable to FGSM at epsilon=8/255 on standard classifiers. At 40 steps
      with 50 queries each, NES is 200x more expensive than FGSM (1 query) and 50x more expensive
      than PGD-40 (40 queries). The query efficiency advantage of NES over Boundary Attack comes
      at the cost of requiring soft-label API access.

      The practical threat model for production defenders: a motivated adversary targeting a
      specific system (malware evasion, fraud bypass, content moderation evasion) will pay the
      query budget for one or a small number of high-value adversarial examples. An adversary
      attempting to generate adversarial examples at scale (to process thousands of malicious
      files through a classifier) will find black-box attacks economically infeasible and will
      prefer white-box access via a surrogate (Chapter 9 extraction then Section 10.7 transfer).

  part_7:
    title: 'Detection Connection: Shared Signal Surface with Track 6'
    body: |
      Track 6 (Section 9.11) monitors the query distribution of a user session to detect
      extraction campaigns. The detection signal is: are queries concentrating near the decision
      boundary? Are OOD query rates anomalous? Is the entropy of the query distribution low
      (indicating the adversary is probing a specific region)?

      Boundary Attack queries produce a distinctive distribution. Early queries are far from x_orig
      (the attack starts from a misclassified image that may look nothing like the natural image).
      Later queries converge toward x_orig from a specific direction. The distribution shifts over
      time from uniformly distributed noise to concentrated near the natural image. A per-session
      query distribution monitor that tracks centroid drift would detect this convergence pattern.

      NES queries are easier to detect at the session level: they arrive in pairs (x + sigma*u and
      x - sigma*u) that are symmetric around a central point. The query centroids are clustered
      tightly around the current attack point x_t, and the cluster radius is sigma. Multiple NES
      steps produce a sequence of clusters, each close to the previous one, drifting toward the
      adversarial region. This structured query pattern is statistically distinguishable from benign
      query distributions.

      The gap between Track 6 and Track 7 detection is the single-query case. Track 6 requires a
      multi-query campaign footprint to fire. An adversary who spent their query budget offline
      (generating adversarial examples against a distillation surrogate via Chapter 9) and submits
      only the final adversarial example to the production API leaves no campaign footprint for
      Track 6. Track 7 must detect that single submission through input preprocessing (squeezer)
      and prediction stability analysis (consistency check) alone. Section 10.13 wires both tracks
      together: Track 6 handles the campaign detection and Track 7 handles the final-submission
      detection.

