    title: 'Black-Box Query Budget Analyser'
    filename: 'blackbox_query_budget_analyser.py'
    description: 'Measures queries per adversarial example for Boundary Attack and NES; plots L2 distance vs query count convergence curves; quantifies query cost premium over white-box attacks'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib. Import boundary_attack, nes_attack, ToyLinear from this section.
    code: |
      # blackbox_query_budget_analyser.py
      # Section 10.6: Black-Box Query Budget Analysis
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import matplotlib.pyplot as plt
      from boundary_attack import boundary_attack
      from nes_attack import nes_attack


      def analyse_boundary_convergence(model, x, y, n_steps=1000) -> dict:
          '''Run Boundary Attack and record L2 at each step.'''
          x_adv, queries, l2_history = boundary_attack(
              model, x, y, n_steps=n_steps, verbose=False,
          )
          final_l2 = (x_adv - x).norm(p=2).item()
          with torch.no_grad():
              success = (model(x_adv).argmax(1) != y).item()
          return {
              'l2_history': l2_history,
              'final_l2': final_l2,
              'total_queries': queries,
              'success': success,
          }


      def analyse_nes_convergence(model, x, y, n_steps=40, n_samples=50,
                                  epsilon=8.0/255.0) -> dict:
          '''Run NES and record L2 at each step (approximated from alpha steps).'''
          x_orig = x.clone()
          x_adv = x.clone()
          l2_history = []
          total_queries = 0

          from nes_attack import nes_gradient_estimate, untargeted_score

          for step in range(n_steps):
              g_hat = nes_gradient_estimate(model, x_adv, y, sigma=0.01, n_samples=n_samples)
              total_queries += n_samples
              x_step = x_adv + (2.0 / 255.0) * g_hat.sign()
              delta = torch.clamp(x_step - x_orig, -epsilon, epsilon)
              x_adv = torch.clamp(x_orig + delta, 0.0, 1.0)
              l2_history.append((x_adv - x_orig).norm(p=2).item())

          with torch.no_grad():
              success = (model(x_adv).argmax(1) != y).all().item()
          return {
              'l2_history': l2_history,
              'final_l2': (x_adv - x_orig).norm(p=2).item(),
              'total_queries': total_queries,
              'success': success,
          }


      def print_query_budget_comparison(ba_result: dict, nes_result: dict) -> None:
          print('Query Budget Comparison')
          print(f'{"Attack":<25} {"Queries":<12} {"Final L2":<12} {"Success"}')
          print('-' * 55)
          print(f'{"Boundary Attack":<25} {ba_result["total_queries"]:<12} '
                f'{ba_result["final_l2"]:<12.4f} {ba_result["success"]}')
          print(f'{"NES (40 steps, k=25)":<25} {nes_result["total_queries"]:<12} '
                f'{nes_result["final_l2"]:<12.4f} {nes_result["success"]}')
          print()
          print('White-box baseline (FGSM): 1 query, L-inf eps=8/255')
          print('White-box baseline (PGD-40 R=5): 200 queries')


      def plot_convergence(ba_result: dict, nes_result: dict,
                           save_path: str = 'blackbox_convergence.png') -> None:
          fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 5))

          # Boundary Attack: L2 vs query count (2 queries per step)
          ba_queries = [i * 2 for i in range(len(ba_result['l2_history']))]
          ax1.plot(ba_queries, ba_result['l2_history'],
                   color='#e74c3c', linewidth=2, label='Boundary Attack L2 distance')
          ax1.set_xlabel('Oracle queries', fontsize=11)
          ax1.set_ylabel('L2 distance to natural image', fontsize=11)
          ax1.set_title('Boundary Attack Convergence\n(L2 distance decreases toward minimum)', fontsize=11)
          ax1.legend(fontsize=9)
          ax1.grid(True, alpha=0.3)

          # NES: L2 norm vs step count
          nes_queries = [(i + 1) * 50 for i in range(len(nes_result['l2_history']))]
          ax2.plot(nes_queries, nes_result['l2_history'],
                   color='#2980b9', linewidth=2, label='NES L2 norm')
          ax2.set_xlabel('Oracle queries (50 per step)', fontsize=11)
          ax2.set_ylabel('L2 perturbation norm', fontsize=11)
          ax2.set_title('NES Convergence\n(L2 perturbation grows toward adversarial region)', fontsize=11)
          ax2.legend(fontsize=9)
          ax2.grid(True, alpha=0.3)

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()

          # Single sample for Boundary Attack (batch=1 requirement)
          x_single = torch.rand(1, 1, 28, 28)
          y_single = torch.randint(0, 10, (1,))

          # Small batch for NES
          x_batch = torch.rand(4, 1, 28, 28)
          y_batch = torch.randint(0, 10, (4,))

          print('Running Boundary Attack (1000 steps, batch=1)...')
          ba = analyse_boundary_convergence(model, x_single, y_single, n_steps=1000)

          print('Running NES (40 steps, k=25, batch=4)...')
          nes = analyse_nes_convergence(model, x_batch[:1], y_batch[:1], n_steps=40, n_samples=50)

          print_query_budget_comparison(ba, nes)
          plot_convergence(ba, nes)

  deliverable_4:
    title: 'Black-Box vs White-Box Quality Comparison'
    filename: 'blackbox_vs_whitebox_comparison.py'
    description: 'Compares attack success rate, L2 perturbation norm, and L-infinity norm across black-box (NES) and white-box (FGSM, PGD) attacks at approximately matched epsilon budget'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib. Import from fgsm_attack, pgd_attack, nes_attack.
    code: |
      # blackbox_vs_whitebox_comparison.py
      # Section 10.6: Black-Box vs White-Box Attack Quality Comparison
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import matplotlib.pyplot as plt
      from fgsm_attack import fgsm, attack_success_rate, ToyLinear
      from pgd_attack import pgd_linf
      from nes_attack import nes_attack


      def run_comparison(model, x, y, epsilon, pgd_steps=20, pgd_restarts=3,
                         nes_steps=40, nes_samples=50):
          alpha_pgd = epsilon / 5.0
          alpha_nes = epsilon / 10.0

          results = {}

          # FGSM
          x_fgsm = fgsm(model, x, y, epsilon=epsilon)
          results['FGSM (white-box, 1 query)'] = {
              'x_adv': x_fgsm,
              'queries': 1,
              'success': attack_success_rate(model, x_fgsm, y),
              'l2': (x_fgsm - x).view(x.size(0), -1).norm(p=2, dim=1).mean().item(),
              'linf': (x_fgsm - x).abs().max().item(),
          }

          # PGD
          x_pgd = pgd_linf(model, x, y, epsilon, alpha_pgd, pgd_steps, pgd_restarts)
          results[f'PGD-{pgd_steps} R={pgd_restarts} (white-box)'] = {
              'x_adv': x_pgd,
              'queries': pgd_steps * pgd_restarts,
              'success': attack_success_rate(model, x_pgd, y),
              'l2': (x_pgd - x).view(x.size(0), -1).norm(p=2, dim=1).mean().item(),
              'linf': (x_pgd - x).abs().max().item(),
          }

          # NES
          x_nes, q_nes = nes_attack(
              model, x, y, epsilon=epsilon, alpha=alpha_nes,
              n_steps=nes_steps, n_samples=nes_samples,
          )
          results[f'NES (grey-box, {q_nes} queries)'] = {
              'x_adv': x_nes,
              'queries': q_nes,
              'success': attack_success_rate(model, x_nes, y),
              'l2': (x_nes - x).view(x.size(0), -1).norm(p=2, dim=1).mean().item(),
              'linf': (x_nes - x).abs().max().item(),
          }

          return results


      def print_comparison(results: dict, epsilon: float) -> None:
          print(f'\nBlack-box vs White-box comparison (epsilon={epsilon * 255:.1f}/255)')
          print(f'{"Attack":<38} {"Queries":<10} {"Success":<10} {"Mean L2":<10} {"Max L-inf"}')
          print('-' * 78)
          for name, r in results.items():
              print(f'{name:<38} {r["queries"]:<10} {r["success"]:<10.3f} '
                    f'{r["l2"]:<10.4f} {r["linf"]:.4f}')

          print()
          print('Key takeaway: NES achieves similar attack success to PGD at higher query cost.')
          print('White-box advantage: same L-inf budget, fewer queries, stronger adversarial examples.')


      def plot_comparison(results: dict, save_path: str = 'blackbox_vs_whitebox.png') -> None:
          names = list(results.keys())
          successes = [results[n]['success'] for n in names]
          queries = [results[n]['queries'] for n in names]
          l2s = [results[n]['l2'] for n in names]
          colours = ['#27ae60', '#2980b9', '#e74c3c']

          fig, axes = plt.subplots(1, 3, figsize=(15, 5))
          for ax, vals, ylabel, title in zip(
              axes,
              [successes, queries, l2s],
              ['Attack success rate', 'Oracle queries', 'Mean L2 norm'],
              ['Attack Success Rate', 'Query Cost', 'Perturbation Quality (L2)'],
          ):
              bars = ax.bar(range(len(names)), vals, color=colours[:len(names)], alpha=0.8)
              ax.set_xticks(range(len(names)))
              ax.set_xticklabels(names, rotation=15, ha='right', fontsize=8)
              ax.set_ylabel(ylabel, fontsize=10)
              ax.set_title(title, fontsize=10)
              ax.grid(True, alpha=0.3, axis='y')
              if ylabel == 'Oracle queries':
                  ax.set_yscale('log')

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(8, 1, 28, 28)
          y = torch.randint(0, 10, (8,))
          eps = 8.0 / 255.0

          results = run_comparison(model, x, y, eps)
          print_comparison(results, eps)
          plot_comparison(results)

  deliverable_5:
    title: 'Black-Box Detection Signal Analyser'
    filename: 'blackbox_detection_signal_analyser.py'
    description: 'Analyses the query pattern signals that Boundary Attack and NES generate; compares against the Track 6 extraction detection baseline and identifies the coverage gap Track 7 must close'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, numpy, matplotlib. Import from boundary_attack, nes_attack, fgsm_attack.
    code: |
      # blackbox_detection_signal_analyser.py
      # Section 10.6: Black-Box Attack Detection Signal Analysis
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import numpy as np
      import matplotlib.pyplot as plt
      from typing import List


      def simulate_nes_query_stream(x_orig: torch.Tensor, n_steps: int = 40,
                                    n_samples: int = 50, sigma: float = 0.01) -> List[torch.Tensor]:
          '''
          Simulate the NES query stream without running the actual model.
          Returns the sequence of query inputs (centre point + antithetic pairs).
          Useful for analysing query distribution without attack execution.
          '''
          queries = []
          x_t = x_orig.clone()
          for step in range(n_steps):
              for _ in range(n_samples // 2):
                  u = torch.randn_like(x_t)
                  u = u / (u.view(-1).norm() + 1e-8)
                  queries.append(torch.clamp(x_t + sigma * u, 0.0, 1.0))
                  queries.append(torch.clamp(x_t - sigma * u, 0.0, 1.0))
              # Simulate small step in a random direction (placeholder for actual gradient step)
              x_t = torch.clamp(x_t + 0.005 * torch.randn_like(x_t), 0.0, 1.0)
          return queries


      def simulate_boundary_query_stream(x_orig: torch.Tensor, n_steps: int = 500,
                                         init_scale: float = 1.0) -> List[torch.Tensor]:
          '''
          Simulate Boundary Attack query stream: starts far from x_orig, converges toward it.
          Returns the sequence of query inputs.
          '''
          queries = []
          # Start far from x_orig (uniform random image)
          x_t = torch.rand_like(x_orig) * init_scale
          for step in range(n_steps):
              # Orthogonal query
              delta = x_t - x_orig
              l2 = delta.norm(p=2)
              u = torch.randn_like(x_t)
              u = u / (u.view(-1).norm() + 1e-8)
              queries.append(torch.clamp(x_t + 0.04 * l2 * u, 0.0, 1.0))
              # Radial query (toward x_orig)
              x_t = torch.clamp(x_t + 0.02 * (x_orig - x_t), 0.0, 1.0)
              queries.append(x_t.clone())
          return queries


      def compute_query_distribution_stats(queries: List[torch.Tensor],
                                           x_orig: torch.Tensor) -> dict:
          '''Compute statistics of a query stream relative to the natural image.'''
          l2_dists = [
              (q - x_orig).view(-1).norm(p=2).item()
              for q in queries
          ]
          flat_queries = torch.stack([q.view(-1) for q in queries])
          centroid = flat_queries.mean(0)
          centroid_drift = (centroid - x_orig.view(-1)).norm(p=2).item()
          std_of_l2 = float(np.std(l2_dists))
          return {
              'mean_l2': float(np.mean(l2_dists)),
              'min_l2': float(np.min(l2_dists)),
              'max_l2': float(np.max(l2_dists)),
              'std_l2': std_of_l2,
              'centroid_drift': centroid_drift,
              'n_queries': len(queries),
          }


      def print_detection_report(stats: dict, attack_name: str) -> None:
          print(f'\n{attack_name} query stream statistics:')
          for k, v in stats.items():
              print(f'  {k:<22}: {v:.4f}' if isinstance(v, float) else f'  {k:<22}: {v}')


      def plot_l2_distribution(nes_stats_per_step: List[float],
                               ba_stats_per_step: List[float],
                               save_path: str = 'blackbox_detection_signals.png') -> None:
          fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 5))

          ax1.plot(nes_stats_per_step, color='#2980b9', linewidth=2,
                   label='NES: mean L2 from x_orig per step')
          ax1.set_xlabel('Step', fontsize=11)
          ax1.set_ylabel('Mean L2 distance from x_orig', fontsize=11)
          ax1.set_title('NES Query Distribution\n(tight cluster around current x_t; detectable by Track 6)', fontsize=11)
          ax1.legend(fontsize=9)
          ax1.grid(True, alpha=0.3)

          ax2.plot(ba_stats_per_step, color='#e74c3c', linewidth=2,
                   label='Boundary Attack: L2 from x_orig per query')
          ax2.set_xlabel('Query index', fontsize=11)
          ax2.set_ylabel('L2 distance from x_orig', fontsize=11)
          ax2.set_title('Boundary Attack Query Distribution\n(converges toward x_orig; centroid drift detectable)', fontsize=11)
          ax2.legend(fontsize=9)
          ax2.grid(True, alpha=0.3)

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          torch.manual_seed(42)
          x_orig = torch.rand(1, 1, 28, 28)

          # NES query stream analysis
          nes_queries = simulate_nes_query_stream(x_orig, n_steps=40, n_samples=50)
          nes_stats = compute_query_distribution_stats(nes_queries, x_orig)
          print_detection_report(nes_stats, 'NES (soft-label attack)')

          # Boundary Attack query stream analysis
          ba_queries = simulate_boundary_query_stream(x_orig, n_steps=500)
          ba_stats = compute_query_distribution_stats(ba_queries, x_orig)
          print_detection_report(ba_stats, 'Boundary Attack (hard-label attack)')

          # Per-step mean L2 for NES (cluster tightness)
          nes_per_step = []
          chunk = 50  # n_samples per step
          for i in range(0, len(nes_queries), chunk):
              step_queries = nes_queries[i:i + chunk]
              dists = [(q - x_orig).view(-1).norm(p=2).item() for q in step_queries]
              nes_per_step.append(float(np.mean(dists)))

          ba_l2_series = [(q - x_orig).view(-1).norm(p=2).item() for q in ba_queries]

          print('\nDetection gap summary:')
          print('  Track 6 detects: NES symmetric pairs, Boundary convergence (multi-query)')
          print('  Track 7 needed for: single adversarial example submission (no campaign)')
          plot_l2_distribution(nes_per_step, ba_l2_series)

common_mistakes:

  mistake_1:
    description: 'Initialising Boundary Attack from the original input x_orig (which is correctly classified) rather than from a point that is already adversarial'
    why_it_happens: |
      The attack is described as "walking toward x_orig" so engineers initialise x_adv = x_orig
      and try to walk from there. But x_orig is correctly classified -- it is on the correct side
      of the decision boundary. There is no boundary to walk along from x_orig itself.
    consequence: |
      Every oracle query from x_orig returns "not adversarial". The orthogonal and radial steps
      are accepted only when they produce a misclassified input by chance. The attack degenerates
      into random search and almost never converges to an adversarial example. Attack success
      rate is near-zero; L2 distance barely decreases from the initial value.
    correct_approach: |
      Initialise from a point that is already adversarial: a random noise image, an image from
      a different class, or an interpolation between x_orig and an inverted image that the model
      misclassifies. The find_adversarial_init function in boundary_attack.py handles all fallback
      cases. Always assert that the initialisation oracle returns True before starting the walk.

  mistake_2:
    description: 'Skipping the oracle check after the orthogonal step and accepting every proposed step unconditionally'
    why_it_happens: |
      The oracle check adds one forward pass per step. Engineers optimising for speed remove the
      per-step oracle call and accept all proposed steps, expecting the attack to "mostly" stay
      adversarial.
    consequence: |
      The walk drifts across the decision boundary into correctly-classified territory. Once on
      the correct side, all subsequent steps are non-adversarial and the walk cannot recover.
      The returned adversarial example is either the original x_orig (if the walk drifted all
      the way back) or a correctly-classified intermediate point. Attack success rate drops
      to near-zero after a small number of steps.
    correct_approach: |
      Always check the oracle after every proposed step (both orthogonal and radial) before
      accepting. The oracle call is the fundamental operation of the Boundary Attack -- removing
      it removes the boundary constraint entirely. The boundary_attack.py deliverable enforces
      this by making hard_label_oracle a required function call in the step loop.

  mistake_3:
    description: 'Using too large sigma in NES gradient estimation, producing a noisy gradient estimate that causes the attack to diverge'
    why_it_happens: |
      Sigma controls the width of the perturbation used for gradient estimation. A large sigma
      seems like it would provide more signal per query. Engineers set sigma=0.1 or sigma=0.5
      and observe that the attack runs without error but produces poor adversarial examples.
    consequence: |
      At large sigma, the finite-difference approximation (f(x+sigma*u) - f(x-sigma*u)) / (2*sigma)
      estimates the gradient over a large region of the input space rather than locally at x.
      For nonlinear classifiers, this produces a badly noisy gradient estimate that points in
      the wrong direction. The NES steps move away from the adversarial region rather than toward
      it, and the attack oscillates without converging.
    correct_approach: |
      Start with sigma=0.01 (1% of the normalised input range) for image classifiers. If gradient
      estimation is still noisy (convergence curve oscillates), reduce to sigma=0.001. If queries
      are too expensive, increase n_samples (antithetic pairs) before increasing sigma. Monitor
      the gradient estimate variance: (g_hat * g_hat).mean() should decrease across steps for a
      well-tuned sigma.

  mistake_4:
    description: 'Using independent sampling instead of antithetic sampling in NES, doubling the query budget for the same gradient estimate quality'
    why_it_happens: |
      Independent sampling (k forward passes with k random directions) is conceptually simpler
      than antithetic sampling (k/2 pairs where each pair uses u and -u). Engineers implement the
      simpler version and do not realise they are spending 2x the query budget for the same
      variance reduction.
    consequence: |
      The query budget is doubled: 100 independent queries provide the same gradient estimate
      variance as 50 antithetic pairs. At 2000 total queries for a 40-step attack, independent
      sampling requires 4000 queries for equivalent quality. In commercial API settings where
      queries cost money or trigger rate limits, this 2x overhead is operationally significant.
    correct_approach: |
      Always use antithetic sampling: for each random direction u, query at (x + sigma*u) and
      (x - sigma*u) and compute the score difference. The nes_attack.py deliverable enforces
      antithetic sampling by iterating over n_samples//2 pairs. Assert n_samples % 2 == 0 at
      function entry to prevent accidental independent sampling.

  mistake_5:
    description: 'Concluding that Track 6 alone covers black-box adversarial detection because it covers extraction -- missing the single-query submission gap'
    why_it_happens: |
      Track 6 detects systematic black-box adversarial probing campaigns (boundary convergence,
      NES symmetric pairs) because these require many queries. Engineers extend this observation
      and conclude that all black-box adversarial attacks are covered by Track 6.
    consequence: |
      The single-query submission case is uncovered. An adversary who runs black-box probing
      offline (against a local copy or a distillation surrogate) and submits only the final
      adversarial example to the production API leaves no campaign footprint for Track 6. Track 6
      fires on campaigns; it does not fire on individual adversarial example submissions. Track 7
      (feature squeezing, consistency checking) is the only layer that can detect these single
      submissions. Removing Track 7 because "Track 6 covers black-box attacks" creates a
      complete blind spot for the single-submission threat.
    correct_approach: |
      Treat Track 6 and Track 7 as complementary, non-overlapping for the single-submission case.
      Track 6 covers campaign-level detection; Track 7 covers per-input detection. The Section
      10.13 gateway wires both tracks in parallel: a campaign triggers Track 6; a single adversarial
      submission triggers Track 7 (or neither, if the example evades both -- which motivates
      the three-primitive Track 7 ensemble).

section_summary:

  compact: |
    Black-box adversarial attacks work under the same API conditions as Chapter 9 extraction.
    Decision-based attacks (Boundary Attack) require only a hard-label oracle and walk from an
    adversarial initialisation toward the natural image along the decision boundary using orthogonal
    and radial steps. Score-based attacks (NES) estimate the gradient direction from antithetic
    query pairs (x + sigma*u and x - sigma*u) and take FGSM-style steps on the estimated gradient.
    Query budgets are 10,000-100,000 for Boundary Attack and 1,000-10,000 for NES vs 1-200 for
    white-box attacks. Track 6 partially detects black-box adversarial campaigns because boundary-
    proximity queries generate the same distribution anomalies as extraction. The gap: a single
    adversarial example submission has no campaign footprint; Track 7 is the only detection layer
    for that case.

  key_takeaways:
    - 'Boundary Attack: start adversarial (mandatory); orthogonal step explores boundary; radial step reduces L2 to x_orig; hard-label oracle only'
    - 'NES: antithetic pairs halve query budget vs independent sampling; gradient estimate = (f(x+su) - f(x-su))/(2s) * u averaged over k pairs'
    - 'Query budget asymmetry: white-box (1-200 queries) vs NES (1k-10k) vs Boundary (10k-100k) vs transfer post-extraction (~0 victim queries)'
    - 'Track 6 covers black-box adversarial campaigns (multi-query footprint); Track 7 covers single adversarial example submissions (no footprint)'
    - 'The adversary who completed Chapter 9 extraction does not need black-box attacks -- the transfer attack (Section 10.7) is cheaper at ~0 additional victim queries'

preview_section_10_07:
  title: 'Section 10.7: Transferability -- Surrogate-Based Cross-Model Adversarial Examples'
  summary: |
    Section 10.7 closes the Chapter 9 to Chapter 10 mechanistic loop. The distillation surrogate
    produced by Chapter 9 Section 9.4 serves as the transfer vehicle: adversarial examples crafted
    against the surrogate using FGSM, PGD, or C&W transfer to the victim at 20-80% rates depending
    on architecture and training distribution match. Section 10.7 measures transfer rates across
    model architecture pairs, implements ensemble transfer attacks (craft adversarial examples
    against multiple surrogates simultaneously to average out source-model-specific gradient
    artefacts), and demonstrates the end-to-end Chapter 9 to Chapter 10 kill chain: distill victim,
    craft adversarial examples against surrogate, submit to victim API -- effectively zero additional
    victim queries. The section establishes that defending against extraction (Chapter 9) partially
    defends against transfer attacks (Chapter 10) -- and quantifies "partially".

