deliverables:

  deliverable_1:
    title: 'Boundary Attack Implementation'
    filename: 'boundary_attack.py'
    description: 'Decision-based Boundary Attack with hard-label oracle, adversarial initialisation, orthogonal step to stay near the boundary, and radial step to reduce L2 distance to the natural image'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import ToyLinear from fgsm_attack.py for demonstration.
      Hard-label oracle: returns bool per sample (adversarial or not).
      Batch size 1 internally; wrap for batch processing in production.
    code: |
      # boundary_attack.py
      # Section 10.6: Boundary Attack -- Decision-Based Black-Box Adversarial Attack
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention
      # Reference: Brendel, Rauber, Bethge 2018 "Decision-Based Adversarial Attacks"

      import torch
      import torch.nn as nn
      from torch import Tensor
      from typing import Optional


      def hard_label_oracle(
          model: nn.Module,
          x: Tensor,
          y_true: Tensor,
          targeted: bool = False,
          y_target: Optional[Tensor] = None,
      ) -> Tensor:
          '''Returns boolean tensor: True where x is adversarial.'''
          with torch.no_grad():
              preds = model(x).argmax(dim=1)
          if targeted:
              return preds == y_target
          return preds != y_true


      def find_adversarial_init(
          model: nn.Module,
          x: Tensor,
          y_true: Tensor,
          targeted: bool = False,
          y_target: Optional[Tensor] = None,
          max_tries: int = 100,
      ) -> Tensor:
          '''
          Find a starting point that is already adversarial.
          Try random images; fall back to inverted input.
          Starting adversarial is a hard requirement for Boundary Attack.
          '''
          for _ in range(max_tries):
              x_init = torch.rand_like(x)
              if hard_label_oracle(model, x_init, y_true, targeted, y_target).all():
                  return x_init
          # Fallback: interpolate toward inverted input until adversarial
          x_inv = torch.clamp(1.0 - x, 0.0, 1.0)
          for alpha in [0.99, 0.9, 0.75, 0.5, 0.25]:
              x_cand = alpha * x_inv + (1.0 - alpha) * x
              if hard_label_oracle(model, x_cand, y_true, targeted, y_target).all():
                  return x_cand
          return x_inv  # last resort; likely adversarial for most random-weight models


      def orthogonal_step(
          x_adv: Tensor,
          x_orig: Tensor,
          step_frac: float,
      ) -> Tensor:
          '''
          Propose a step orthogonal to the perturbation direction (delta).
          step_frac: step size as fraction of current L2 distance to x_orig.
          '''
          delta = x_adv - x_orig
          l2 = delta.norm(p=2) + 1e-8
          # Sample random direction and orthogonalise w.r.t. delta
          u = torch.randn_like(x_orig)
          u_flat = u.view(-1)
          delta_flat = delta.view(-1)
          # Gram-Schmidt: remove component along delta
          u_perp = u - (u_flat.dot(delta_flat) / (l2 ** 2)) * delta
          u_perp = u_perp / (u_perp.norm() + 1e-8)
          return torch.clamp(x_adv + step_frac * l2 * u_perp, 0.0, 1.0)


      def boundary_attack(
          model: nn.Module,
          x_orig: Tensor,
          y_true: Tensor,
          targeted: bool = False,
          y_target: Optional[Tensor] = None,
          n_steps: int = 1000,
          orthogonal_step_frac: float = 0.04,
          radial_step_frac: float = 0.02,
          verbose: bool = False,
      ) -> Tensor:
          '''
          Boundary Attack (Brendel et al. 2018).
          Starts from adversarial initialisation; walks toward x_orig along decision boundary.
          Each step: orthogonal perturbation (stays adversarial) + radial step (reduces L2).
          Requires only hard-label oracle; no gradients, no probabilities.

          Returns adversarial example with minimum L2 distance to x_orig found.
          '''
          assert x_orig.dim() == 4 and x_orig.size(0) == 1, 'Batch size 1 only for boundary_attack'

          # Initialise from adversarial starting point
          x_adv = find_adversarial_init(model, x_orig, y_true, targeted, y_target)

          query_count = 0
          l2_history = []

          for step in range(n_steps):
              l2_current = (x_adv - x_orig).norm(p=2).item()
              l2_history.append(l2_current)

              # --- Orthogonal step ---
              x_orth = orthogonal_step(x_adv, x_orig, orthogonal_step_frac)
              query_count += 1
              if hard_label_oracle(model, x_orth, y_true, targeted, y_target).all():
                  x_adv = x_orth

              # --- Radial step: move toward x_orig ---
              x_radial = x_adv + radial_step_frac * (x_orig - x_adv)
              x_radial = torch.clamp(x_radial, 0.0, 1.0)
              query_count += 1
              if hard_label_oracle(model, x_radial, y_true, targeted, y_target).all():
                  x_adv = x_radial

              if verbose and step % 200 == 0:
                  l2 = (x_adv - x_orig).norm(p=2).item()
                  print(f'  step {step:>5}: L2={l2:.4f}, queries={query_count}')

          return x_adv.detach(), query_count, l2_history


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()

          x = torch.rand(1, 1, 28, 28)
          y = torch.randint(0, 10, (1,))

          print('Boundary Attack demo on ToyLinear (single sample)')
          x_adv, n_queries, l2_hist = boundary_attack(
              model, x, y, n_steps=500, verbose=True,
          )
          final_l2 = (x_adv - x).norm(p=2).item()
          with torch.no_grad():
              pred = model(x_adv).argmax(1).item()
              orig_class = model(x).argmax(1).item()
          print(f'\nOriginal class: {orig_class} | Final pred: {pred}')
          print(f'Total queries:  {n_queries}')
          print(f'Final L2 norm:  {final_l2:.4f}')
          print(f'Attack success: {pred != y.item()}')


      if __name__ == '__main__':
          demo()

  deliverable_2:
    title: 'NES Attack Implementation'
    filename: 'nes_attack.py'
    description: 'Natural Evolution Strategies score-based black-box attack with antithetic sampling, gradient estimation from query pairs, and FGSM-style step on estimated gradient direction'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import ToyLinear from fgsm_attack.py for demonstration.
      Requires soft-label (probability) output from model.
      Antithetic sampling halves the query budget vs independent sampling at matched variance.
    code: |
      # nes_attack.py
      # Section 10.6: NES -- Natural Evolution Strategies Black-Box Attack
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from typing import Optional


      def untargeted_score(
          model: nn.Module,
          x: Tensor,
          y_true: Tensor,
      ) -> Tensor:
          '''
          Score for untargeted attack: best_wrong_logit - correct_logit.
          Positive when misclassified; we want to maximise this.
          Requires soft-label output (logits); no argmax.
          '''
          logits = model(x)
          batch = logits.size(0)
          n_classes = logits.size(1)
          correct = logits.gather(1, y_true.view(-1, 1)).squeeze(1)
          mask = torch.ones_like(logits, dtype=torch.bool)
          mask.scatter_(1, y_true.view(-1, 1), False)
          best_other = logits[mask].view(batch, n_classes - 1).max(dim=1).values
          return best_other - correct


      def nes_gradient_estimate(
          model: nn.Module,
          x: Tensor,
          y_true: Tensor,
          sigma: float = 0.01,
          n_samples: int = 50,
          targeted: bool = False,
          y_target: Optional[Tensor] = None,
      ) -> Tensor:
          '''
          NES gradient estimate using antithetic sampling.
          For each of k=n_samples//2 random directions u_i on the unit sphere:
            query model at x + sigma*u_i and x - sigma*u_i (antithetic pair)
            gradient contribution: (score_pos - score_neg) / (2*sigma) * u_i
          Returns average gradient estimate g_hat.
          Total queries: n_samples (= 2 * k antithetic pairs).
          '''
          assert n_samples % 2 == 0, 'n_samples must be even for antithetic pairing'
          batch = x.size(0)
          grad_est = torch.zeros_like(x)
          n_pairs = n_samples // 2

          for _ in range(n_pairs):
              # Sample unit sphere direction
              u = torch.randn_like(x)
              u_flat = u.view(batch, -1)
              u_norm = u_flat.norm(p=2, dim=1, keepdim=True).view(batch, *([1] * (x.dim() - 1)))
              u = u / (u_norm + 1e-8)

              x_pos = torch.clamp(x + sigma * u, 0.0, 1.0)
              x_neg = torch.clamp(x - sigma * u, 0.0, 1.0)

              with torch.no_grad():
                  if targeted:
                      # For targeted: score = target_logit - best_other (want to maximise)
                      def tgt_score(xin):
                          logits = model(xin)
                          n_cls = logits.size(1)
                          tgt = logits.gather(1, y_target.view(-1, 1)).squeeze(1)
                          mask = torch.ones_like(logits, dtype=torch.bool)
                          mask.scatter_(1, y_target.view(-1, 1), False)
                          best_o = logits[mask].view(batch, n_cls - 1).max(dim=1).values
                          return tgt - best_o
                      score_pos = tgt_score(x_pos)
                      score_neg = tgt_score(x_neg)
                  else:
                      score_pos = untargeted_score(model, x_pos, y_true)
                      score_neg = untargeted_score(model, x_neg, y_true)

              diff = (score_pos - score_neg).view(batch, *([1] * (x.dim() - 1)))
              grad_est = grad_est + diff * u / (2.0 * sigma)

          return grad_est / n_pairs


      def nes_attack(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          targeted: bool = False,
          y_target: Optional[Tensor] = None,
          epsilon: float = 8.0 / 255.0,
          alpha: float = 2.0 / 255.0,
          n_steps: int = 40,
          sigma: float = 0.01,
          n_samples: int = 50,
          clip_min: float = 0.0,
          clip_max: float = 1.0,
      ) -> tuple:
          '''
          NES attack: FGSM-style step on estimated gradient, iterated n_steps times.
          L-infinity constraint via delta projection from original x.
          Total queries: n_steps * n_samples.

          Returns (x_adv, total_query_count).
          '''
          x = x.detach()
          x_adv = x.clone()
          total_queries = 0

          for step in range(n_steps):
              g_hat = nes_gradient_estimate(
                  model, x_adv, y,
                  sigma=sigma, n_samples=n_samples,
                  targeted=targeted, y_target=y_target,
              )
              total_queries += n_samples

              direction = 1.0 if not targeted else 1.0  # always ascend on score
              # FGSM-style step on estimated gradient sign
              x_step = x_adv + direction * alpha * g_hat.sign()

              # L-inf projection from original x
              delta = torch.clamp(x_step - x, -epsilon, epsilon)
              x_adv = torch.clamp(x + delta, clip_min, clip_max)

          return x_adv.detach(), total_queries


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear, attack_success_rate
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(4, 1, 28, 28)
          y = torch.randint(0, 10, (4,))
          eps = 8.0 / 255.0

          print('NES attack demo on ToyLinear')
          print(f'{"n_steps":<10} {"n_samples":<12} {"total_queries":<16} {"success"}')
          print('-' * 50)
          for n_steps, n_samples in [(10, 50), (20, 50), (40, 50), (40, 100)]:
              x_adv, q_count = nes_attack(
                  model, x, y, epsilon=eps, alpha=2.0 / 255.0,
                  n_steps=n_steps, n_samples=n_samples,
              )
              rate = attack_success_rate(model, x_adv, y)
              l_inf = (x_adv - x).abs().max().item()
              print(f'{n_steps:<10} {n_samples:<12} {q_count:<16} {rate:.3f}  L-inf={l_inf:.4f}')


      if __name__ == '__main__':
          demo()

