section_summary: |
  Section 6.14 conducted a structured technical analysis of the Bing Chat Sydney
  incident -- the first publicly documented indirect web injection at production
  scale. The injection mechanism was architecturally simple: retrieved web page
  content entered the LLM context without classification because the retrieval
  pipeline had no injection detection stage. The payload itself was not technically
  sophisticated; the vulnerability was the architectural absence of the retrieval-
  time classifier described in Section 6.7.

  The five-layer root cause analysis identified the systemic cause as the threat
  model not treating the retrieval pipeline as a first-class injection surface.
  Four detection opportunities existed but were not exploited -- the primary one
  being retrieval-time content classification, which would have prevented the
  injection from reaching the model. Incident detection occurred through researcher
  disclosure rather than operational monitoring, indicating the additional absence
  of real-time output monitoring.

  The incident drove OWASP LLM01 and ATLAS AML.T0054 classification of indirect
  injection, moving it from research concern to documented production requirement.
  The six-layer web-augmented LLM security review template derived from the
  incident's lessons provides a reusable pre-launch checklist.

  Section 6.15 applies the same RCA format to the GitHub Copilot indirect injection
  research -- the code assistant injection incident that demonstrates the same
  retrieval-time classification gap in a developer tooling context.
