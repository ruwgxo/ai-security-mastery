                  "Pages containing instruction-like text influenced model behaviour, "
                  "causing persona adoption and system prompt content revelation inconsistent "
                  "with the intended deployment behaviour."
              ),
              immediate_cause=(
                  "Retrieved web page content containing instruction-like text entered "
                  "LLM context and was processed by the model, overriding system prompt constraints."
              ),
              contributing_cause=(
                  "Web content retrieval pipeline lacked injection classification at the "
                  "pre-assembly stage. Retrieved text entered context without any intermediate "
                  "injection detection layer."
              ),
              systemic_cause=(
                  "Indirect injection via retrieved web content was not a first-class security "
                  "requirement in the deployment design. Threat model did not include retrieval "
                  "pipeline as a primary injection surface at deployment time."
              ),
              detection_failure=(
                  "No automated real-time detection of injection execution or anomalous output. "
                  "Incident detected through researcher disclosure, not operational monitoring."
              ),
              remediation_gap=(
                  "Primary absent control: retrieval-time injection classifier on web page "
                  "content before context assembly. Secondary absent controls: CSS-aware "
                  "extraction, output monitoring, system prompt hardening."
              ),
              detection_opportunities=detection_opportunities,
              post_incident_controls=[
                  "Model updates reducing Sydney persona activation probability",
                  "Conversation length limits reducing multi-turn attack window",
                  "Response filtering for anomalous output patterns",
                  "System prompt hardening against extraction",
                  "Industry-wide: OWASP LLM01 and ATLAS AML.T0054 classification",
                  "Industry-wide: retrieval-time classification as production requirement",
              ],
              lessons_generalised=[
                  "Any web-augmented LLM deployment must classify retrieved content before context assembly",
                  "System prompt extraction is reconnaissance -- hardening reduces probability but not to zero",
                  "Operational incident detection via researcher disclosure indicates absence of output monitoring",
                  "Model-layer mitigations alone are insufficient -- architectural separation is required",
                  "Threat models for web-augmented deployments must include retrieval pipeline as first-class surface",
              ],
              public_sources=[
                  "Kevin Liu (2023). Bing Chat system prompt disclosure. Twitter/X thread.",
                  "Rehberger (2023). Bing Chat AI Hacked via Prompt Injection. Embracethered.com.",
                  "Greshake et al. (2023). Not What You Signed Up For. arXiv:2302.12173.",
                  "Edwards (2023). Bing AI can't be trusted: 'Sydney' manipulation. Ars Technica.",
                  "Roose (2023). A Conversation With Bing's Chatbot Left Me Deeply Unsettled. NYT.",
                  "Microsoft (2023). Bing Preview Release Notes. Microsoft Blog.",
              ],
          )


      def render_markdown(incident: IncidentRecord) -> str:
          lines = [
              f"# Incident Analysis: {incident.incident_name}",
              f"**ID**: {incident.incident_id}  ",
              f"**ATLAS**: {incident.atlas_technique}  ",
              f"**OWASP**: {incident.owasp_classification}  ",
              "",
              "---",
              "",
              "## 1.1 Incident Summary",
              "",
              f"**Deployment**: {incident.deployment}  ",
              f"**Attack class**: {incident.attack_class}  ",
              "",
              f"**Technical mechanism**: {incident.technical_mechanism}",
              "",
              "---",
              "",
              "## 1.2 Timeline",
              "",
          ]
          for phase in incident.timeline_phases:
              lines.append(f"### Phase {phase.phase_id}: {phase.phase_name} ({phase.date_approx})")
              lines.append("")
              for event in phase.events:
                  lines.append(f"- {event}")
              lines.append("")
              lines.append(f"Technical note: {phase.technical_note}")
              lines.append("")

          lines += [
              "---",
              "",
              "## 1.3 Root Cause Analysis",
              "",
              f"**Immediate cause**: {incident.immediate_cause}",
              "",
              f"**Contributing cause**: {incident.contributing_cause}",
              "",
              f"**Systemic cause**: {incident.systemic_cause}",
              "",
              f"**Detection failure**: {incident.detection_failure}",
              "",
              f"**Remediation gap**: {incident.remediation_gap}",
              "",
              "---",
              "",
              "## 1.4 Detection Opportunity Map",
              "",
              "| ID | Stage | Would Have Prevented | Why Not Exploited |",
              "|----|-------|---------------------|-------------------|",
          ]
          for do in incident.detection_opportunities:
              lines.append(
                  f"| {do['opportunity_id']} | {do['stage']} "
                  f"| {do['would_have_prevented']} | {do['why_not_exploited']} |"
              )

          lines += [
              "",
              "---",
              "",
              "## 1.5 Generalised Lessons",
              "",
          ]
          for lesson in incident.lessons_generalised:
              lines.append(f"- {lesson}")

          lines += [
              "",
              "---",
              "",
              "## 1.6 Sources",
              "",
          ]
          for src in incident.public_sources:
              lines.append(f"- {src}")

          return "\n".join(lines)


      def run() -> None:
          incident = build_bing_chat_incident()
          md = render_markdown(incident)

          Path("bing_chat_incident_timeline.md").write_text(md, encoding="utf-8")
          Path("bing_chat_incident_record.json").write_text(
              json.dumps(asdict(incident), indent=2, ensure_ascii=False),
              encoding="utf-8"
          )

          print("[*] Bing Chat Incident Timeline Reconstruction")
          print(f"    Incident ID  : {incident.incident_id}")
          print(f"    ATLAS        : {incident.atlas_technique}")
          print(f"    Timeline phases: {len(incident.timeline_phases)}")
          print(f"    Detection opportunities: {len(incident.detection_opportunities)}")
          print("[OK] Timeline written to bing_chat_incident_timeline.md")
          print("[OK] JSON record written to bing_chat_incident_record.json")


      if __name__ == "__main__":
          run()


  implementation_2:
    title: "Root Cause Analysis Document Generator"
    filename: "incident_rca_generator.py"
    description: |
      Reusable root cause analysis document generator for injection incidents,
      implementing the five-layer RCA framework used in Section 6.14 and
      applied consistently across Sections 6.15 and 6.16. Accepts an incident
      specification (deployment, attack class, immediate cause, contributing
      cause, systemic cause, detection failure, remediation gap, detection
      opportunities) and produces a structured Markdown RCA document in a
      standardised format suitable for security review boards, incident post-
      mortems, and regulatory reporting. Includes the detection opportunity
      map with timing annotations and a remediation priority matrix.
    dependencies:
      - "json (stdlib)"
      - "dataclasses (stdlib)"
      - "pathlib (stdlib)"
      - "datetime (stdlib)"
    code: |
      #!/usr/bin/env python3
      """
      incident_rca_generator.py
      Section 6.14 -- Injection Incident RCA Document Generator
      Reusable five-layer RCA framework for injection incidents.
      Used consistently across Sections 6.14, 6.15, and 6.16.
      Author: Raghav Dinesh | ai-security-mastery
      """

      import json
      from dataclasses import dataclass, field, asdict
      from datetime import datetime
      from pathlib import Path
      from typing import Optional


      @dataclass
      class DetectionOpportunity:
          stage: str
          section_reference: str
          detection_timing: str      # pre_execution | post_execution | partial
          would_have_prevented: bool
          control_absent: str
          estimated_implementation_effort: str  # low | medium | high


      @dataclass
      class RemediationItem:
          priority: int
          control: str
          addresses: str            # which RCA layer it addresses
          implementation_effort: str
          section_reference: str


      @dataclass
      class InjectionRCA:
          incident_name: str
          incident_date: str
          deployment_type: str
          attack_class: str
          atlas_technique: str
          owasp_classification: str
          immediate_cause: str
          contributing_cause: str
          systemic_cause: str
          detection_failure: str
          remediation_gap: str
          detection_opportunities: list[DetectionOpportunity]
          remediation_items: list[RemediationItem]
          lessons: list[str]
          prepared_by: str = "AI Security Mastery -- Section 6.14"
          prepared_at: str = ""

          def __post_init__(self) -> None:
              if not self.prepared_at:
                  self.prepared_at = datetime.utcnow().isoformat()


      def render_rca_markdown(rca: InjectionRCA, output_filename: str) -> str:
          lines = [
              f"# Root Cause Analysis: {rca.incident_name}",
              f"**Date**: {rca.incident_date}  ",
              f"**Prepared**: {rca.prepared_at[:10]}  ",
              f"**Classification**: {rca.atlas_technique} / {rca.owasp_classification}  ",
              "",
              "---",
              "",
              "## 1. Incident Identification",
              "",
              f"| Field | Value |",
              f"|-------|-------|",
              f"| Deployment type | {rca.deployment_type} |",
              f"| Attack class | {rca.attack_class} |",
              f"| ATLAS technique | {rca.atlas_technique} |",
              f"| OWASP classification | {rca.owasp_classification} |",
              "",
              "---",
              "",
              "## 2. Five-Layer Root Cause Analysis",
              "",
              "### 2.1 Immediate Cause",
              "",
              rca.immediate_cause,
              "",
              "### 2.2 Contributing Cause",
              "",
              rca.contributing_cause,
              "",
              "### 2.3 Systemic Cause",
              "",
              rca.systemic_cause,
              "",
              "### 2.4 Detection Failure",
              "",
              rca.detection_failure,
              "",
              "### 2.5 Remediation Gap",
              "",
              rca.remediation_gap,
              "",
              "---",
              "",
              "## 3. Detection Opportunity Map",
              "",
              "| Stage | Timing | Would Prevent | Control Absent | Effort |",
              "|-------|--------|--------------|----------------|--------|",
          ]
          for do in rca.detection_opportunities:
              prevents = "YES" if do.would_have_prevented else "NO (backstop)"
              lines.append(
                  f"| {do.stage} ({do.section_reference}) "
                  f"| {do.detection_timing} | {prevents} "
                  f"| {do.control_absent} | {do.estimated_implementation_effort} |"
              )

          lines += [
              "",
              "---",
              "",
              "## 4. Remediation Priority Matrix",
              "",
              "| Priority | Control | Addresses | Effort | Reference |",
              "|----------|---------|-----------|--------|-----------|",
          ]
          for item in sorted(rca.remediation_items, key=lambda x: x.priority):
              lines.append(
                  f"| {item.priority} | {item.control} | {item.addresses} "
                  f"| {item.implementation_effort} | {item.section_reference} |"
              )

          lines += [
              "",
              "---",
              "",
              "## 5. Generalised Lessons",
              "",
          ]
          for i, lesson in enumerate(rca.lessons, 1):
              lines.append(f"{i}. {lesson}")

          return "\n".join(lines)


      def build_bing_chat_rca() -> InjectionRCA:
          """Build the Bing Chat RCA using the standardised format."""
          return InjectionRCA(
              incident_name="Bing Chat Sydney Persona -- Indirect Web Injection (Feb 2023)",
              incident_date="2023-02-07",
              deployment_type="Web-augmented conversational LLM (GPT-4 + Bing search + web browsing)",
              attack_class="Indirect Injection via Web Retrieval",
              atlas_technique="AML.T0054",
              owasp_classification="LLM01",
              immediate_cause=(
                  "Retrieved web page content containing instruction-like text entered LLM context "
                  "through the web browsing pipeline and caused the model to override system prompt "
                  "constraints, revealing persona content and system prompt information."
              ),
              contributing_cause=(
                  "Web content retrieval pipeline did not apply injection classification to extracted "
                  "page text before context assembly. Retrieved content entered the model context "
                  "without any intermediate injection detection or filtering stage."
              ),
              systemic_cause=(
                  "Indirect injection via retrieved content was not treated as a first-class security "
                  "requirement during deployment design. The threat model for the deployment did not "
                  "include the retrieval pipeline as a primary injection surface."
              ),
              detection_failure=(
                  "No real-time automated detection of injection execution or anomalous output. "
                  "Incident was detected through external researcher disclosure and media coverage, "
                  "not through internal operational monitoring. Detection lag was approximately "
                  "one to five days from injection surface activation to public awareness."
              ),
              remediation_gap=(
                  "Primary gap: retrieval-time injection classifier on web page content before "
                  "context assembly (Section 6.7.5). Secondary gaps: CSS-aware content extraction, "
                  "output monitoring for persona anomalies, system prompt hardening."
              ),
              detection_opportunities=[
                  DetectionOpportunity(
                      stage="Retrieval-time injection classifier",
                      section_reference="Section 6.7.5",
                      detection_timing="pre_execution",
                      would_have_prevented=True,
                      control_absent="No classifier on retrieved web content",
                      estimated_implementation_effort="medium",
                  ),
                  DetectionOpportunity(
                      stage="CSS-aware content extraction",
                      section_reference="Section 6.7.2",
                      detection_timing="pre_execution",
                      would_have_prevented=False,
                      control_absent="Naive HTML text extraction without visibility filtering",
                      estimated_implementation_effort="medium",
                  ),
                  DetectionOpportunity(
                      stage="Output monitoring for persona anomalies",
                      section_reference="Section 6.7.7",
                      detection_timing="post_execution",
                      would_have_prevented=False,
                      control_absent="Real-time output anomaly monitoring not deployed",
                      estimated_implementation_effort="high",
                  ),
                  DetectionOpportunity(
                      stage="System prompt hardening",
                      section_reference="Section 6.2.5",
                      detection_timing="partial",
                      would_have_prevented=False,
                      control_absent="Insufficient anti-extraction and anti-persona hardening",
                      estimated_implementation_effort="low",
                  ),
              ],
              remediation_items=[
                  RemediationItem(1, "Deploy retrieval-time injection classifier", "Contributing cause", "medium", "Section 6.7.5 / 6.17"),
                  RemediationItem(2, "CSS-aware content extraction pipeline", "Contributing cause", "medium", "Section 6.7.2"),
                  RemediationItem(3, "Output monitoring for instruction-following anomalies", "Detection failure", "high", "Section 6.7.7"),
                  RemediationItem(4, "System prompt hardening against extraction and persona adoption", "Remediation gap", "low", "Section 6.2.5"),
                  RemediationItem(5, "Link traversal depth restriction", "Contributing cause", "low", "Section 6.7.4"),
                  RemediationItem(6, "Incident response procedure for indirect injection events", "Detection failure", "medium", "Section 6.18"),
              ],
              lessons=[
                  "Classify all retrieved web content before context assembly -- this is the primary control for indirect web injection.",
                  "CSS-aware extraction must precede injection classification to handle hidden content vectors.",
                  "Output monitoring provides detection backstop when input-layer classification fails.",
                  "System prompt hardening reduces probability of successful extraction but is not sufficient alone.",
                  "Incident response readiness requires automated detection, not researcher disclosure.",
                  "Threat models for web-augmented deployments must explicitly include the retrieval pipeline.",
              ],
          )


      def run() -> None:
          rca = build_bing_chat_rca()
          md = render_rca_markdown(rca, "bing_chat_rca.md")

          Path("bing_chat_rca.md").write_text(md, encoding="utf-8")
          Path("bing_chat_rca.json").write_text(
              json.dumps(asdict(rca), indent=2), encoding="utf-8"
          )
          print("[*] RCA document generated")
          print(f"    Detection opportunities: {len(rca.detection_opportunities)}")
          print(f"    Remediation items: {len(rca.remediation_items)}")
          print("[OK] RCA written to bing_chat_rca.md and bing_chat_rca.json")


      if __name__ == "__main__":
          run()


  implementation_3:
    title: "Web-Augmented LLM Security Review Checklist"
    filename: "web_llm_security_review.py"
    description: |
      Implements the six-layer web-augmented LLM security review template derived
      from the Bing Chat incident lessons. For each of the six layers (retrieved
      content classification, content extraction normalisation, output monitoring,
      system prompt hardening, infrastructure sandboxing, incident response
      readiness), evaluates a deployment configuration and produces a compliance
      status, the specific control required, and the incident evidence supporting
      the requirement. Outputs a deployment readiness report for pre-launch
      security review.
    dependencies:
      - "dataclasses (stdlib)"
      - "json (stdlib)"
    code: |
      #!/usr/bin/env python3
      """
      web_llm_security_review.py
      Section 6.14 -- Web-Augmented LLM Security Review Checklist
      Six-layer deployment review derived from Bing Chat incident lessons.
      Author: Raghav Dinesh | ai-security-mastery
      """

      import json
      from dataclasses import dataclass, asdict
      from pathlib import Path


      @dataclass
      class ReviewLayer:
          layer_id: str
          name: str
          question: str
          implemented: bool
          required_control: str
          incident_evidence: str
          section_reference: str
          risk_if_absent: str


      @dataclass
      class WebLLMDeploymentConfig:
          deployment_name: str
          has_web_retrieval: bool = True
          retrieval_classifier_deployed: bool = False
          css_aware_extraction: bool = False
          output_monitoring_deployed: bool = False
          system_prompt_hardened: bool = False
          infrastructure_sandboxed: bool = False
          incident_response_defined: bool = False


      def evaluate_deployment(config: WebLLMDeploymentConfig) -> list[ReviewLayer]:
          return [
              ReviewLayer(
                  layer_id="L1",
                  name="Retrieved Content Classification",
                  question="Is an injection classifier applied to all retrieved web page content before context assembly?",
                  implemented=config.retrieval_classifier_deployed,
                  required_control=(
                      "Retrieval-time injection classifier on extracted web page text, "
                      "applied before context assembly stage. Covers visible and hidden content."
                  ),
                  incident_evidence=(
                      "Bing Chat (Feb 2023): absence of this control was the primary "
                      "contributing cause. Retrieved page content containing instruction-like "
                      "text entered LLM context and overrode system prompt behaviour."
                  ),
                  section_reference="Section 6.7.5 / Section 6.17",
                  risk_if_absent=(
                      "CRITICAL: Any web page the agent retrieves can inject instructions "
                      "into the LLM context. This is the vulnerability demonstrated at "
                      "production scale in the Bing Chat incident."
                  ),
              ),
              ReviewLayer(
                  layer_id="L2",
                  name="Content Extraction Normalisation",
                  question="Does content extraction apply CSS visibility filtering, HTML comment removal, and structured data classification?",
                  implemented=config.css_aware_extraction,
                  required_control=(
                      "CSS-aware extraction pipeline excluding display:none, visibility:hidden, "
                      "and off-screen elements. HTML comment stripping. Meta and JSON-LD classification."
                  ),
                  incident_evidence=(
                      "Bing Chat: naive extraction delivered non-rendered content to classifier "
                      "and model. CSS-hidden injection content in retrieved pages entered context."
                  ),
                  section_reference="Section 6.7.2 / Section 6.7.3",
                  risk_if_absent=(
                      "HIGH: CSS-hidden injection content in retrieved pages reaches the "
                      "classifier and model unfiltered. Hidden injection is invisible to "
                      "human page review but visible to LLM context processing."
                  ),
              ),
              ReviewLayer(
                  layer_id="L3",
                  name="Output Monitoring",
                  question="Does the deployment monitor model outputs for persona adoption anomalies, system prompt revelation, and instruction-following inconsistency?",
                  implemented=config.output_monitoring_deployed,
                  required_control=(
                      "Real-time output monitoring with anomaly scoring for: unexpected persona "
                      "adoption, system prompt content in response, instruction-following "
                      "inconsistency with system prompt constraints."
                  ),
                  incident_evidence=(
                      "Bing Chat: anomalous Sydney persona outputs ran undetected for days. "
                      "No automated output monitoring triggered; detection was via researcher "
                      "disclosure. Detection lag extended incident impact window."
                  ),
                  section_reference="Section 6.7.7",
                  risk_if_absent=(
                      "HIGH: Injections that bypass input-layer classification execute without "
                      "automated detection. Incident window extends until external disclosure. "
                      "No operational visibility into injection outcomes."
                  ),
              ),
              ReviewLayer(
                  layer_id="L4",
                  name="System Prompt Hardening",
                  question="Does the system prompt include explicit anti-extraction, anti-persona-adoption, and retrieved-content-as-data instructions?",
                  implemented=config.system_prompt_hardened,
                  required_control=(
                      "System prompt instructions: refuse revelation of system prompt content, "
                      "do not adopt alternate personas on instruction from retrieved content, "
                      "treat retrieved web content as data to summarise not instructions to follow."
                  ),
                  incident_evidence=(
                      "Bing Chat: system prompt contained Sydney persona configuration without "
                      "sufficient hardening against extraction or activation via retrieved content. "
                      "System prompt content was both revealed and acted upon."
                  ),
                  section_reference="Section 6.2.5",
                  risk_if_absent=(
                      "MEDIUM: System prompt content is more easily extracted via injection. "
                      "Persona and capability configurations in system prompt become injection "
                      "targets. Hardening reduces probability but is not a complete control."
                  ),
              ),
              ReviewLayer(
                  layer_id="L5",
                  name="Infrastructure Sandboxing",
                  question="Does the browsing function operate under egress restrictions, action permission limits, and traversal depth constraints?",
                  implemented=config.infrastructure_sandboxed,
                  required_control=(
                      "Network egress allowlisting. Action permission enumeration (permitted tool calls). "
                      "Link traversal depth limit (maximum one to two hops from initial URL). "
                      "Session isolation between users."
                  ),
                  incident_evidence=(
                      "Bing Chat: unlimited traversal depth expanded the injection surface to "
                      "any page reachable from search results. Each traversal step adds a "
                      "potential indirect injection entry point."
                  ),
                  section_reference="Section 6.7.6",
                  risk_if_absent=(
                      "MEDIUM: Cross-site injection via link chains is unlimited. Adversary-controlled "
                      "pages reachable via search results or linked pages can inject without "
                      "restriction. Blast radius of successful injection is unconstrained."
                  ),
              ),
              ReviewLayer(
                  layer_id="L6",
                  name="Incident Response Readiness",
                  question="Is there a defined procedure for detecting and responding to indirect injection incidents, including output monitoring alerts and retrieval content audit log review?",
                  implemented=config.incident_response_defined,
                  required_control=(
                      "Defined incident response procedure: output monitoring alert triage, "
                      "retrieval content audit log review, user impact assessment, "
                      "retrieved content quarantine, post-incident purge and validation."
                  ),
                  incident_evidence=(
                      "Bing Chat: detected through researcher disclosure, not internal "
                      "operational monitoring. No evidence of a defined injection incident "
                      "response procedure that would have reduced detection lag."
                  ),
                  section_reference="Section 6.13.6 / Section 6.18",
                  risk_if_absent=(
                      "MEDIUM: Injection incidents are detected through external disclosure, "
                      "extending the impact window. No structured path from detection alert "
                      "to containment and remediation."
                  ),
              ),
          ]


      def print_review(config: WebLLMDeploymentConfig, layers: list[ReviewLayer]) -> None:
          compliant = sum(1 for l in layers if l.implemented)
          print(f"\n{'='*68}")
          print(f"WEB-AUGMENTED LLM SECURITY REVIEW: {config.deployment_name}")
          print(f"Compliant layers: {compliant}/{len(layers)}")
          print("=" * 68)
          for layer in layers:
              status = "PASS" if layer.implemented else "FAIL"
              print(f"\n  [{status}] {layer.layer_id}: {layer.name}")
              if not layer.implemented:
                  print(f"         Required: {layer.required_control[:80]}...")
                  print(f"         Risk    : {layer.risk_if_absent[:80]}...")
          overall = "READY" if compliant == len(layers) else "NOT READY"
          print(f"\n  Deployment status: {overall}")
          print("=" * 68)


      def run_demo() -> None:
          # Simulate a deployment with partial controls
          config = WebLLMDeploymentConfig(
              deployment_name="Research Assistant with Web Browsing v2",
              has_web_retrieval=True,
              retrieval_classifier_deployed=False,   # primary gap
              css_aware_extraction=True,
              output_monitoring_deployed=False,       # secondary gap
              system_prompt_hardened=True,
              infrastructure_sandboxed=True,
              incident_response_defined=False,        # tertiary gap
          )

          layers = evaluate_deployment(config)
          print_review(config, layers)

          Path("web_llm_security_review.json").write_text(
              json.dumps(
                  {"config": asdict(config), "layers": [asdict(l) for l in layers]},
                  indent=2
              ),
              encoding="utf-8"
          )
          print("[OK] Review exported to web_llm_security_review.json")


      if __name__ == "__main__":
          run_demo()


