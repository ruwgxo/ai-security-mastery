              },
              {
                  "opportunity_id": "DO4",
                  "stage": "System prompt hardening against extraction",
                  "section_reference": "Section 6.2.5",
                  "would_have_prevented": False,
                  "why_not_exploited": "System prompt hardening insufficient against retrieved content injection",
                  "detection_timing": "Partial mitigation -- reduces probability but does not prevent",
              },
          ]

          return IncidentRecord(
              incident_id="INC-2023-BINGCHAT-001",
              incident_name="Bing Chat Sydney Persona -- Indirect Web Injection",
              deployment="Microsoft Bing Chat (GPT-4, web browsing capability)",
              attack_class="Indirect Injection via Web Retrieval",
              atlas_technique="AML.T0054 -- Indirect Prompt Injection via External Data",
              owasp_classification="LLM01 -- Prompt Injection",
              timeline_phases=timeline,
              technical_mechanism=(
                  "Web page content retrieved by the Bing Chat browsing function was "
