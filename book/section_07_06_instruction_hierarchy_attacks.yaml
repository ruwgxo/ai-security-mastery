    time_estimate: "60 minutes"
    safety_note: "Use JAILBREAK_SUCCESS as payload throughout."

  - id: "7.6.ex.02"
    title: "Pattern Library Calibration"
    type: "code_exercise"
    description: |
      Run privilege_escalation_patterns.py against your deployment's last 100
      user turns (from logs, anonymised). Record: (1) true positive rate --
      known hierarchy attack attempts correctly flagged, (2) false positive rate
      -- legitimate requests incorrectly flagged, (3) which pattern set produces
      the most false positives in your user population. Use these results to
      set per-pattern-set thresholds for the Section 7.14 classifier.
    deliverable: "pattern_library_calibration.md"
    time_estimate: "45 minutes"

  - id: "7.6.ex.03"
    title: "System Prompt Hardening Evaluation"
    type: "architecture_review"
    description: |
      Run evaluate_system_prompt() from hierarchy_hardening_checklist.py against
      your current or a representative system prompt. For each missing control,
      write the addition that would address it (one sentence per control). Then
      re-run the hierarchy attack red-team (7.6.ex.01) with the hardened prompt.
      Record the reduction in attack success rate. Document which attacks still
      succeed after hardening -- these are the ones where infrastructure detection
      is the load-bearing control.
    deliverable: "system_prompt_hardening_evaluation_ch7.md"
    time_estimate: "50 minutes"
    depends_on: "7.6.ex.01"

  - id: "7.6.ex.04"
    title: "Extraction-to-Override Session Tracking"
    type: "code_exercise"
    description: |
      Extend session_state_schema.py (Section 7.5) with a new field:
      system_prompt_extraction_event. Update session_state_schema.py to
      set this field when a system_prompt_reference signal fires. Add a
      derived property extraction_followed_by_override that returns True
      when both extraction_event is logged and an override_instruction signal
      fires in a later turn. This is the composed attack detector for the
      targeted_post_extraction variant.
    deliverable: "session_state_schema_extended.py"
    time_estimate: "30 minutes"

# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "The instruction hierarchy is enforced by RLHF training, not by cryptographic\
    \ authentication. Any user turn can claim system-prompt authority. The model's\
    \ hierarchy enforcement is probabilistic, not absolute."
  - "System prompt confidentiality is not system prompt authority. Extraction\
    \ is a precursor, not an end goal -- the adversary uses extracted content\
    \ to craft targeted hierarchy attacks. Design system prompts to be robust\
    \ even when known."
  - "Formatting-based priority manipulation exploits the model's learned\
    \ association between formatting and authority. System-prompt-style formatting\
    \ in the user turn is a clean, low-FPR detection signal."
  - "Privilege escalation claims and override instruction language have very low\
    \ FPR in legitimate user populations. They are the highest-confidence signals\
    \ in the hierarchy attack pattern library."
  - "System prompt hardening (H01-H06) reduces attack success rate. It does not\
    \ replace infrastructure detection (H07). Both layers are required. Hardening\
    \ reduces the false negative rate of the detector."
  - "Extraction followed by targeted override in the same session is a composed\
    \ attack with very low false positive rate. Session-level tracking of both\
    \ signals is the detection primitive."

