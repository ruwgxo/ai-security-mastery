      one test case for each of the seven variants against your target deployment.
      Use JAILBREAK_SUCCESS as the payload. Record which variants succeeded,
      which failed at the model level, and which were caught by infrastructure
      detection. Note the turn structure for multi-turn variants (extraction
      followed by targeted override).
