                  'ignore_previous_instructions_pattern',
                  'override_instruction_language',
                  'new_instructions_assertion',
              ],
              'fpr_risk': 'very_low',
              'detection_difficulty': 1,
              'note': 'canonical injection pattern -- highest-confidence signal set',
          },
          'admin_permission_claim': {
