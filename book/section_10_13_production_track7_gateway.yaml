section_overview:
  one_line_summary: 'Track 7 extends the six-track gateway with the only pre-inference stage in the ensemble: squeezing transforms the input before the main model sees it, while consistency checking and the adversarial classifier run post-inference in parallel.'
  why_this_section_exists: |
    Sections 10.11-10.12 built the three Track 7 detection primitives. Section 10.13 wires
    them into the production seven-track gateway: the two-stage architecture where squeezing
    occupies the pre-inference stage and consistency checking plus the adversarial classifier
    occupy the post-inference stage. This is the Chapter 10 capstone deliverable: the complete
    gateway extending Chapters 6/7/9''s six-track ensemble to seven tracks, the completed
    AML.T0043/T0015 Sigma rules that replace the Chapter 5 stubs, the eight-item deployment
    checklist, and the adaptive adversary test and false positive calibration harness that
    together make Track 7 production-ready.
  position_in_chapter: |
    Section 10.13 is the input-side production capstone for Chapter 10. It closes the detection
    arc (Sections 10.11-10.13) before the upstream defence arc (Sections 10.14-10.15). The
    two-stage architecture first introduced in Section 10.1 is fully implemented here. Section
    10.16 references this section when describing the Part 2 closure.

