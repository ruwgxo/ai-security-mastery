      # seven_track_gateway_ensemble.py
      # Section 10.13: Full Seven-Track Gateway Ensemble
      # 20260525 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from dataclasses import dataclass, field
      from typing import List, Optional
      from gateway_track7 import Track7Gateway, Track7Config, ACTION_BLOCK, ACTION_FLAG


      @dataclass
      class TrackResult:
          track_id: int
          name: str
          score: float
          fired: bool
          action: str


      # --- Stub implementations for Tracks 1-6 ---
      # Full implementations: Ch6 (Tracks 1-5), Ch9 (Track 6)

      def stub_tracks_1_to_5(x: Tensor) -> List[TrackResult]:
          '''Injection and jailbreak detection stubs (Chapters 6/7).'''
          # In production: call the real injection/jailbreak classifiers
          # Stub: simulate low-score benign result
          return [
              TrackResult(i, f'track_{i}_injection', score=0.05, fired=False, action='pass')
              for i in range(1, 6)
          ]


      def stub_track_6(user_id: str, x: Tensor) -> TrackResult:
          '''Query pattern monitor stub (Chapter 9).'''
          return TrackResult(6, 'track_6_query_monitor', score=0.02, fired=False, action='pass')


      class SevenTrackGateway:
          '''
          Full seven-track gateway.
          Tracks 1-5: injection/jailbreak detection (Chapters 6/7).
          Track 6: query pattern monitor (Chapter 9).
          Track 7: adversarial example detection (Chapter 10).
          '''
          def __init__(
              self,
              model: nn.Module,
              track7_cfg: Track7Config = None,
              adversarial_detector=None,
          ):
              self.model = model
              self.track7 = Track7Gateway(model, track7_cfg, adversarial_detector)

          def process(
              self,
              x: Tensor,
              user_id: str = 'anonymous',
          ) -> dict:
              # Tracks 1-5: injection / jailbreak
              t1_5_results = stub_tracks_1_to_5(x)

              # Track 6: query pattern
              t6_result = stub_track_6(user_id, x)

              # Track 7: adversarial detection (full implementation)
              t7_result = self.track7.process(x)

              # --- Unified response policy ---
              all_actions = [r.action for r in t1_5_results]
              all_actions.append(t6_result.action)
              all_actions.extend(t7_result['actions'])

              # Final action: most severe across all tracks
              severity = {ACTION_BLOCK: 3, ACTION_FLAG: 2, 'monitor': 1, 'pass': 0}
              final_action = max(all_actions, key=lambda a: severity.get(a, 0))

              return {
                  'tracks_1_to_5': t1_5_results,
                  'track_6': t6_result,
                  'track_7': t7_result,
                  'final_action': final_action,
                  'primary_logits': t7_result['primary_logits'],
              }

          def shutdown(self):
              self.track7.shutdown()


      def demo() -> None:
