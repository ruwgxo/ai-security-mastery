          y = torch.randint(0, 10, (2,))
          x_adv = fgsm(model, x_nat, y, epsilon=8.0 / 255.0)

          gw = SevenTrackGateway(model)
          for label, x_test in [('Natural', x_nat), ('FGSM', x_adv)]:
              result = gw.process(x_test)
              print(f'{label}: final_action={result["final_action"]}, '
                    f'track7_combined={result["track_7"]["combined_score"].mean().item():.4f}')
