  deliverable_7:
    title: 'Track 7 Adaptive Adversary Test'
    filename: 'track7_adaptive_adversary_test.py'
    description: 'Measures Track 7 detection rate against adversaries who know the Track 7 configuration (adaptive C&W against full ensemble) vs non-adaptive adversaries; quantifies ensemble resistance gap'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import from gateway_track7, feature_squeezer, squeezer_ensemble.
    code: |
      # track7_adaptive_adversary_test.py
      # Section 10.13: Track 7 Adaptive Adversary Test
      # 20260525 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      import torch.nn.functional as F
      from feature_squeezer import build_default_squeezers, gaussian_squeeze
      from squeezer_ensemble import ensemble_score
      from consistency_checker import ConsistencyConfig, consistency_check_score


      def adaptive_cw_vs_ensemble(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          n_steps: int = 80,
          lr: float = 5e-3,
          c: float = 1.0,
          kappa: float = 0.0,
      ) -> torch.Tensor:
          '''
          Adaptive CW: optimises misclassification through the squeezer (ensemble-aware).
          Uses gaussian squeezer as the representative pre-inference transformation.
          Full ensemble adaptive attack would include all primitives; squeezer is primary.
          '''
          batch = x.size(0)
          x_cl = x.clamp(1e-6, 1 - 1e-6)
          w = torch.atanh(2.0 * x_cl - 1.0).detach().requires_grad_(True)
          opt = torch.optim.Adam([w], lr=lr)

          for _ in range(n_steps):
              opt.zero_grad()
              x_adv = 0.5 * (torch.tanh(w) + 1.0)
              l2_sq = (x_adv - x).pow(2).view(batch, -1).sum(1)
              # Adaptive: misclassify on squeezed input (squeezer-aware)
              x_squeezed = gaussian_squeeze(x_adv, sigma=1.0)
              logits = model(x_squeezed)
              z_correct = logits.gather(1, y.view(-1, 1)).squeeze(1)
              mask = torch.ones_like(logits, dtype=torch.bool)
              mask.scatter_(1, y.view(-1, 1), False)
              best_other = logits[mask].view(batch, -1).max(1).values
              f_val = torch.clamp(z_correct - best_other, min=-kappa)
              (l2_sq + c * f_val).sum().backward()
              opt.step()

          with torch.no_grad():
              return (0.5 * (torch.tanh(w) + 1.0)).detach()


      def evaluate_adaptive_gap(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          combined_threshold: float = 0.30,
      ) -> None:
          from fgsm_attack import fgsm
          squeezers = build_default_squeezers()
          cc_cfg = ConsistencyConfig(n_variants=10, sigma=0.02)
          eps = 8.0 / 255.0

          # Non-adaptive: FGSM (no squeezer knowledge)
          x_nonadaptive = fgsm(model, x, y, epsilon=eps)

          # Adaptive: CW through squeezer
          x_adaptive = adaptive_cw_vs_ensemble(model, x, y, n_steps=60, lr=5e-3, c=1.0)

          def ensemble_detect_rate(x_test):
              sq = torch.clamp(ensemble_score(model, x_test, squeezers), 0, 1)
              cc = consistency_check_score(model, x_test, cc_cfg)
              combined = 0.35 * sq + 0.35 * cc
              return (combined > combined_threshold).float().mean().item()

          nat_fpr = ensemble_detect_rate(x)
          na_detect = ensemble_detect_rate(x_nonadaptive)
          ad_detect = ensemble_detect_rate(x_adaptive)

          print('Track 7 Adaptive Adversary Test')
          print(f'  Natural FPR (baseline):    {nat_fpr:.3f}')
          print(f'  Non-adaptive detection:    {na_detect:.3f}  (FGSM, no squeezer knowledge)')
          print(f'  Adaptive detection:        {ad_detect:.3f}  (C&W through squeezer)')
          print(f'  Adaptive resistance gap:   {na_detect - ad_detect:.3f}')
          print()
          if (na_detect - ad_detect) > 0.30:
              print('FLAG: adaptive adversary reduces detection by > 30 percentage points.')
              print('Consider: add consistency check weight, change squeezer parameters,')
              print('or add randomised smoothing (Section 10.14) for formal guarantee.')
          else:
              print('OK: ensemble resistance gap within acceptable range.')


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(8, 1, 28, 28)
          y = torch.randint(0, 10, (8,))
          evaluate_adaptive_gap(model, x, y, combined_threshold=0.25)

