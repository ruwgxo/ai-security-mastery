deliverables:

  deliverable_1:
    title: 'Track 7 Production Gateway'
    filename: 'gateway_track7.py'
    description: 'Production Track 7 adversarial detection gateway with pre-inference squeezer stage and post-inference consistency/classifier stage; async parallel dispatch; configurable action tiers'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, concurrent.futures. Import from feature_squeezer, squeezer_ensemble,
      consistency_checker, adversarial_detector_classifier, detection_ensemble_ch10.
      Uses ThreadPoolExecutor for parallel squeezer + primary model dispatch.
    code: |
      # gateway_track7.py
      # Section 10.13: Track 7 Production Gateway
      # 20260525 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from concurrent.futures import ThreadPoolExecutor, as_completed
      from dataclasses import dataclass, field
      from typing import Optional
      from feature_squeezer import build_default_squeezers
      from squeezer_ensemble import ensemble_score
      from consistency_checker import ConsistencyConfig, consistency_check_score
      from adversarial_detector_classifier import (AdversarialDetectorClassifier,
                                                    adversarial_detector_score)


      @dataclass
      class Track7Config:
          block_threshold: float = 0.55
          flag_threshold: float = 0.30
          monitor_threshold: float = 0.15
          squeezer_weight: float = 0.35
          consistency_weight: float = 0.35
          detector_weight: float = 0.30
          consistency_cfg: ConsistencyConfig = field(default_factory=ConsistencyConfig)
          consistency_subsample_rate: float = 1.0  # 1.0 = every request; 0.1 = 10% sampling
          n_workers: int = 4


      ACTION_PASS = 'pass'
      ACTION_MONITOR = 'monitor'
      ACTION_FLAG = 'flag'
      ACTION_BLOCK = 'block'


      class Track7Gateway:
          '''
          Two-stage Track 7 adversarial detection gateway.
          Pre-inference: squeezer transform + parallel squeezer model inference.
          Post-inference: consistency check + aggregate scores.
          '''
          def __init__(
              self,
              model: nn.Module,
              cfg: Track7Config = None,
              adversarial_detector: Optional[AdversarialDetectorClassifier] = None,
          ):
              self.model = model
              self.cfg = cfg or Track7Config()
              self.squeezers = build_default_squeezers()
              self.detector = adversarial_detector
              self.executor = ThreadPoolExecutor(max_workers=self.cfg.n_workers)

          def _primary_inference(self, x: Tensor) -> Tensor:
              with torch.no_grad():
                  return self.model(x)

          def _squeezer_inference(self, x: Tensor) -> Tensor:
              with torch.no_grad():
                  return ensemble_score(self.model, x, self.squeezers)

          def _detector_score(self, x: Tensor) -> Tensor:
              if self.detector is None:
                  return torch.zeros(x.size(0))
              return adversarial_detector_score(self.detector, x)

          def _should_run_consistency(self) -> bool:
              import random
              return random.random() < self.cfg.consistency_cfg and \
                     self.cfg.consistency_subsample_rate >= random.random()

          def process(self, x: Tensor) -> dict:
              '''
              Process one request through Track 7 two-stage gateway.
              Returns result dict with scores, action tier, and telemetry.
              '''
              import random
              cfg = self.cfg

              # --- Pre-inference stage ---
              # Step 1: Squeezer transform (synchronous, fast)
              # (Transforms are applied inside ensemble_score below)

              # Step 2: Dispatch parallel inferences
              fut_primary = self.executor.submit(self._primary_inference, x)
              fut_squeezer = self.executor.submit(self._squeezer_inference, x)
              fut_detector = self.executor.submit(self._detector_score, x)

              # Step 3: Collect parallel results
              primary_logits = fut_primary.result()
              sq_score = fut_squeezer.result()
              det_score = fut_detector.result()

              # Step 4: Pre-inference squeezer decision
              sq_normalised = torch.clamp(sq_score / 1.0, 0.0, 1.0)

              # --- Post-inference stage ---
              # Consistency check (sub-sampled for latency)
              run_cc = random.random() < cfg.consistency_subsample_rate
              if run_cc:
                  cc_score = consistency_check_score(self.model, x, cfg.consistency_cfg)
              else:
                  cc_score = torch.zeros(x.size(0))

              # Combined ensemble score
              combined = (
                  cfg.squeezer_weight * sq_normalised
                  + cfg.consistency_weight * cc_score
                  + cfg.detector_weight * det_score
              )

              # Action tier decision (per-sample)
              actions = []
              for score in combined.tolist():
                  if score >= cfg.block_threshold:
                      actions.append(ACTION_BLOCK)
                  elif score >= cfg.flag_threshold:
                      actions.append(ACTION_FLAG)
                  elif score >= cfg.monitor_threshold:
                      actions.append(ACTION_MONITOR)
                  else:
                      actions.append(ACTION_PASS)

              return {
                  'primary_logits': primary_logits,
                  'squeezer_score': sq_score,
                  'consistency_score': cc_score,
                  'detector_score': det_score,
                  'combined_score': combined,
                  'actions': actions,
                  'consistency_ran': run_cc,
              }

          def shutdown(self):
              self.executor.shutdown(wait=False)


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear, fgsm
              from adversarial_detector_classifier import train_adversarial_detector
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x_nat = torch.rand(8, 1, 28, 28)
          y = torch.randint(0, 10, (8,))
          eps = 8.0 / 255.0
          x_adv = fgsm(model, x_nat, y, epsilon=eps)

          detector = train_adversarial_detector(model, x_nat, y, n_epochs=15)
          cfg = Track7Config(block_threshold=0.55, flag_threshold=0.30,
                             consistency_subsample_rate=1.0)
          gw = Track7Gateway(model, cfg=cfg, adversarial_detector=detector)

          print('Track 7 Gateway: Natural vs Adversarial')
          print(f'{"Input":<12} {"sq_score":<12} {"cc_score":<12} {"det_score":<10} {"combined":<10} {"actions"}')
          print('-' * 72)
          for label, x_test in [('Natural', x_nat[:4]), ('FGSM', x_adv[:4])]:
              result = gw.process(x_test)
              sq = result['squeezer_score'].mean().item()
              cc = result['consistency_score'].mean().item()
              det = result['detector_score'].mean().item()
              comb = result['combined_score'].mean().item()
              from collections import Counter
              action_counts = Counter(result['actions'])
              print(f'{label:<12} {sq:<12.4f} {cc:<12.4f} {det:<10.4f} {comb:<10.4f} {dict(action_counts)}')

          gw.shutdown()


      if __name__ == '__main__':
          demo()

  deliverable_2:
    title: 'Pre-Inference Adversarial Filter'
    filename: 'adversarial_filter.py'
    description: 'Standalone pre-inference adversarial filter: applies the squeezer ensemble and returns a filter decision before the main model inference; enables early reject for high-confidence adversarial inputs'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import from feature_squeezer.py, squeezer_ensemble.py.
      Designed as a stateless callable that wraps any model with pre-inference adversarial filtering.
    code: |
      # adversarial_filter.py
      # Section 10.13: Pre-Inference Adversarial Filter
      # 20260525 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from dataclasses import dataclass
      from typing import Tuple, Optional
      from feature_squeezer import build_default_squeezers
      from squeezer_ensemble import ensemble_score


      @dataclass
      class FilterConfig:
          block_threshold: float = 0.50   # Reject input above this squeezer score
          flag_threshold: float = 0.20    # Flag for post-inference review


      class AdversarialFilter:
          '''
          Pre-inference adversarial filter.
          Wraps a model: filter(x) -> (logits, filter_result).
          If squeezer score >= block_threshold: returns None logits (blocked).
          Otherwise: returns model(x) with filter score attached.
          '''
          def __init__(
              self,
              model: nn.Module,
              cfg: FilterConfig = None,
          ):
              self.model = model
              self.cfg = cfg or FilterConfig()
              self.squeezers = build_default_squeezers()

          def __call__(
              self,
              x: Tensor,
          ) -> Tuple[Optional[Tensor], dict]:
              '''
              Returns (logits_or_none, filter_result_dict).
              logits_or_none is None if blocked; otherwise model output.
              '''
              sq_score = ensemble_score(self.model, x, self.squeezers)
              sq_max = sq_score.max().item()
              sq_mean = sq_score.mean().item()

              if sq_mean >= self.cfg.block_threshold:
                  return None, {
                      'decision': 'blocked',
                      'squeezer_score_mean': sq_mean,
                      'squeezer_score_max': sq_max,
                  }

              with torch.no_grad():
                  logits = self.model(x)

              decision = 'flagged' if sq_mean >= self.cfg.flag_threshold else 'passed'
              return logits, {
                  'decision': decision,
                  'squeezer_score_mean': sq_mean,
                  'squeezer_score_max': sq_max,
              }


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear, fgsm
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(4, 1, 28, 28)
          y = torch.randint(0, 10, (4,))
          x_adv = fgsm(model, x, y, epsilon=8.0 / 255.0)

          filt = AdversarialFilter(model, FilterConfig(block_threshold=0.20, flag_threshold=0.10))
          for label, x_test in [('Natural', x), ('FGSM', x_adv)]:
              logits, result = filt(x_test)
              blocked = logits is None
              print(f'{label}: decision={result["decision"]}, sq_score={result["squeezer_score_mean"]:.4f}, blocked={blocked}')


      if __name__ == '__main__':
          demo()

