      # Single quotes throughout per book convention

      import torch
      from gateway_track7 import Track7Gateway, Track7Config
      from detection_ensemble_ch10 import Track7Ensemble, EnsembleConfig, build_track7_ensemble


      def generate_edge_case_inputs(batch_size: int = 32) -> dict:
          '''
          Generate natural edge-case input categories for FPR calibration.
          In production: replace with actual production traffic samples.
          '''
          return {
              'uniform_natural': torch.rand(batch_size, 1, 28, 28),
              'low_contrast': torch.rand(batch_size, 1, 28, 28) * 0.2 + 0.4,
              'high_noise': torch.clamp(torch.randn(batch_size, 1, 28, 28) * 0.3 + 0.5, 0, 1),
              'near_zero': torch.rand(batch_size, 1, 28, 28) * 0.05,
              'near_one': 1.0 - torch.rand(batch_size, 1, 28, 28) * 0.05,
              'bimodal': (torch.rand(batch_size, 1, 28, 28) > 0.5).float(),
          }


      def run_calibration_harness(
          ensemble: Track7Ensemble,
          threshold: float,
          target_fpr: float = 0.05,
      ) -> dict:
          '''
          Run calibration harness across edge-case natural input categories.
          Returns FPR per category and overall FPR.
          '''
          edge_cases = generate_edge_case_inputs()
          results = {}
          all_flags = []

          for category, x_test in edge_cases.items():
              flagged, scores = ensemble.detect(x_test, threshold=threshold)
              fpr = flagged.float().mean().item()
              results[category] = {
                  'fpr': fpr,
                  'mean_score': scores['combined_score'].mean().item(),
                  'exceeds_target': fpr > target_fpr,
              }
              all_flags.extend(flagged.tolist())

          overall_fpr = sum(all_flags) / len(all_flags)
          results['overall'] = {'fpr': overall_fpr, 'exceeds_target': overall_fpr > target_fpr}
          return results


      def print_calibration_report(
          results: dict,
          threshold: float,
          target_fpr: float = 0.05,
      ) -> None:
          print(f'Track 7 Calibration Harness (threshold={threshold:.4f}, target FPR={target_fpr})')
          print(f'{"Category":<26} {"FPR":<8} {"Mean score":<14} {"Status"}')
          print('-' * 58)
          for category, r in results.items():
              status = 'EXCEEDS TARGET' if r['exceeds_target'] else 'OK'
              score_str = f'{r.get("mean_score", 0):.4f}' if 'mean_score' in r else 'N/A'
              print(f'{category:<26} {r["fpr"]:<8.3f} {score_str:<14} {status}')

          if results['overall']['exceeds_target']:
              print()
              print('ACTION: overall FPR exceeds target. Raise threshold or recalibrate squeezers.')
              print('Run squeezer_latency_benchmark.py to verify latency budget after recalibration.')


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x_natural = torch.rand(32, 1, 28, 28)
          y = torch.randint(0, 10, (32,))

          ensemble = build_track7_ensemble(model, x_natural, y, train_detector=True)
          threshold = ensemble.calibrate(x_natural, target_fpr=0.05)
          print(f'Calibrated threshold: {threshold:.4f}')

          results = run_calibration_harness(ensemble, threshold, target_fpr=0.05)
          print_calibration_report(results, threshold, target_fpr=0.05)

common_mistakes:

  mistake_1:
    description: 'Running squeezer model inferences sequentially before the primary model inference, tripling or quadrupling gateway latency'
    why_it_happens: |
      The pre-inference squeezer stage is described as running "before" the main model. Engineers
      implement this as a loop: for each squeezer, transform and infer; then run main model.
      Three squeezers = three additional sequential inferences before the primary.
    consequence: |
      With a 20ms primary model P99, sequential squeezer execution adds 60ms (3 squeezers x 20ms)
      before the primary model runs. Total Track 7 latency: 80ms, well above the 50ms P99 budget.
      Latency violations disable Track 7 in production within days of deployment.
    correct_approach: |
      Use ThreadPoolExecutor to dispatch all squeezer inferences and the primary inference
      concurrently. The gateway_track7.py deliverable implements this with concurrent.futures.
      Latency overhead is one squeezer_transform_time (~1-3ms) rather than N * model_inference.
      Always verify parallel execution is actually happening in the benchmark, not accidentally
      serialised by GIL or batch contention.

  mistake_2:
    description: 'Configuring consistency_subsample_rate=1.0 at high QPS without accounting for the N-variant batch cost at production load'
    why_it_happens: |
      The consistency check runs N=20 variants as a single batch (correct implementation from
      Section 10.12). In single-request testing this is fast -- one batch forward pass. Under
      production load with high concurrency, the N=20 batch competes for GPU memory with other
      concurrent requests, causing OOM errors or queue saturation.
    consequence: |
      Under production load, consistency check inferences fail with OOM or timeout. The circuit
      breaker fails open (correct behaviour per Item 8 of the checklist), but the consistency
      check is effectively disabled for all requests under load. Track 7 runs with only two
      of three primitives in production.
    correct_approach: |
      Set consistency_subsample_rate to a fraction appropriate for production QPS. At 1000 QPS
      with GPU batch size limit of 128, sampling 5-10% of requests for consistency check
      reduces the batch-competing load by 10-20x while still providing meaningful adversarial
      detection coverage. Document the subsample rate in the deployment configuration and
      acknowledge the per-request coverage reduction.

  mistake_3:
    description: 'Not verifying Sigma rule log fields are actually populated in the gateway telemetry before deploying to the SIEM'
    why_it_happens: |
      The Sigma rules reference fields like track7.squeezer_score_mean and track7.combined_score.
      These fields must be present in the structured log events the gateway emits. Engineers
      generate the Sigma rules without verifying the actual gateway log format.
    consequence: |
      The Sigma rules deploy to the SIEM but never fire because the referenced fields are absent
      (or named differently) in the actual log events. AML.T0043/T0015 appear covered in the
      compliance mapping but generate zero alerts. Adversarial inputs transit the system
      undetected and unlogged despite Track 7 running and producing scores.
    correct_approach: |
      Before deploying the Sigma rule, emit a test adversarial example through the gateway and
      verify the structured log entry contains all Sigma rule fields with correct types. Use the
      Sigma rule validation step (Item 6 of the deployment checklist) to catch this. Maintain a
      log schema document alongside the Sigma rules.

  mistake_4:
    description: 'Setting the block tier threshold based on benchmark datasets rather than production traffic, producing either excessive false positives or missed adversarial examples'
    why_it_happens: |
      The block tier threshold is set during development by running the calibration harness on
      CIFAR-10 test images (or equivalent benchmark). Production traffic has a different
      distribution -- potentially harder natural examples, different class distributions, and
      domain-specific visual content that the benchmark does not represent.
    consequence: |
      If the benchmark has easy natural examples (all well-classified with high confidence),
      the block threshold is set low. Production borderline inputs exceed the low threshold,
      and Track 7 blocks legitimate production requests. Alternatively, if the benchmark is
      harder than production, the threshold is set high and most adversarial examples are
      flagged but not blocked, reducing the effectiveness of the block tier.
    correct_approach: |
      Deploy Track 7 in monitor-only mode (no blocks or flags, just logging) for 24-48 hours
      on production traffic as specified in Item 7 of the deployment checklist. Set all
      thresholds based on the actual production traffic distribution, not benchmark data.
      This is the only way to calibrate for production-specific edge cases.

  mistake_5:
    description: 'Treating Track 7 as the primary defence against adversarial examples and deprioritising adversarial training (Section 10.15)'
    why_it_happens: |
      Track 7 is visible and produces alerts. Adversarial training is a training-time investment
      with no direct operational visibility (the model does not announce "I was adversarially
      trained"). Security teams allocate resources to Track 7 because it generates measurable
      incident counts; adversarial training does not.
    consequence: |
      A model without adversarial training and with Track 7 detection has a single layer of
      defence: Track 7 must catch every adversarial example because the model itself has no
      robustness. When Track 7 misses a detection (adaptive adversary, novel attack, threshold
      miss), the adversarial example causes misclassification with no upstream resistance.
      The two-surface defence (adversarial training upstream + Track 7 runtime) is substantially
      stronger than runtime detection alone.
    correct_approach: |
      Treat adversarial training (Section 10.15) and Track 7 as complementary surfaces:
      adversarial training reduces the fraction of inputs for which adversarial examples exist
      at a given epsilon; Track 7 catches the adversarial examples that survive into production.
      Prioritise adversarial training for models in high-security deployments (safety filters,
      malware classifiers, fraud detectors) and deploy Track 7 as the runtime detection layer
      on top of adversarially trained models.

section_summary:

  compact: |
    Track 7 is the production gateway''s only track with a pre-inference stage. Feature squeezer
    transforms run before the main model inference; squeezer model inferences run in parallel with
    the primary inference using async dispatch. Consistency checking and the adversarial classifier
    run post-inference. The unified seven-track gateway routes all track signals to a four-tier
    response policy (block/flag/monitor/pass). The AML.T0043/T0015 Sigma rules complete the
    Chapter 5 stubs with Track 7 log fields (squeezer_score_mean, consistency_score, detector_score,
    combined_score). The eight-item deployment checklist -- calibration, sigma verification, detector
    training, latency benchmark, test suite coverage, Sigma validation, production FPR audit, circuit
    breaker -- must all pass before Track 7 goes to production. The adaptive adversary test
    quantifies how much detection rate an adaptive adversary who knows the ensemble configuration
    can recover; the ensemble resistance gap greater than 30 percentage points signals reconfiguration
    is needed.

  key_takeaways:
    - 'Track 7 is unique: squeezer transform runs synchronously pre-inference; squeezer model inferences run in parallel with primary model -- latency overhead is one transform time, not N inference times'
    - 'Seven-track response policy: block (high confidence), flag (moderate, serve + alert), monitor (low, serve + telemetry), pass -- the consistency check subsample rate trades per-request coverage for latency'
    - 'AML.T0043 Sigma rule: fires on squeezer_score_mean >= block_threshold; AML.T0015 fires on any primitive exceeding its threshold (OR condition)'
    - 'Eight deployment checklist items are all mandatory: Item 7 (production traffic FPR audit) and Item 4 (latency benchmark at production load) are the two most commonly skipped'
    - 'Adaptive adversary resistance gap > 30 percentage points signals the need for configuration change or addition of randomised smoothing (Section 10.14)'
    - 'Track 7 and adversarial training (Section 10.15) are complementary surfaces: Train adversarially to reduce attack surface; deploy Track 7 to catch what survives'

preview_section_10_14:
  title: 'Section 10.14: Certified Robustness -- Randomised Smoothing and Formal Guarantees'
  summary: |
    Section 10.14 introduces the only defence in Chapter 10 with a formal, per-input robustness
    guarantee: randomised smoothing (Cohen et al. 2019). The smoothed classifier replaces the
    base classifier by returning the majority vote class across many Gaussian-perturbed copies of
    the input. For an L2 perturbation of radius r, if the smoothed classifier returns class c with
    probability above 0.5 + delta, the certificate guarantees that no L2-bounded perturbation
    within radius r can change the output -- analogous to differential privacy''s formal bound in
    Chapter 8. The section derives the certificate radius, implements the randomised_smoother.py
    wrapper, and quantifies the accuracy-robustness tradeoff that makes certification impossible
    at high accuracy on complex datasets. The certificate complements Track 7 detection rather
    than replacing it: certified examples have a provable resistance bound; uncertified examples
    still need Track 7 for runtime detection.

