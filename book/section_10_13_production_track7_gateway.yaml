    title: 'Track 7 Latency Benchmark'
    filename: 'track7_latency_benchmark.py'
    description: 'Measures Track 7 contribution to total gateway P99 latency under production load; compares sequential vs parallel execution; produces recommendation for production configuration'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention. Requires: torch, time.
      Import gateway_track7. Tests at multiple batch sizes and concurrency levels.
    code: |
      # track7_latency_benchmark.py
      # Section 10.13: Track 7 Latency Benchmark
      # 20260525 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import time
      import statistics
      from gateway_track7 import Track7Gateway, Track7Config


      N_WARMUP = 3
      N_RUNS = 10
      BUDGET_MS = 50.0


      def measure_gateway_latency(
          gateway: Track7Gateway,
          x: torch.Tensor,
          n_runs: int = N_RUNS,
          n_warmup: int = N_WARMUP,
      ) -> dict:
          for _ in range(n_warmup):
              gateway.process(x)
          times = []
          for _ in range(n_runs):
              t0 = time.perf_counter()
              gateway.process(x)
              times.append((time.perf_counter() - t0) * 1000.0)
          return {
              'mean_ms': statistics.mean(times),
              'p50_ms': statistics.median(times),
              'p99_ms': sorted(times)[int(len(times) * 0.99)] if len(times) > 1 else times[-1],
              'max_ms': max(times),
          }


      def benchmark_across_configs(model, x_single):
          configs = {
              'Subsample=1.0 (all consistency checks)': Track7Config(consistency_subsample_rate=1.0),
              'Subsample=0.5 (50% consistency)': Track7Config(consistency_subsample_rate=0.5),
              'Subsample=0.1 (10% consistency)': Track7Config(consistency_subsample_rate=0.1),
              'No consistency (squeezer + classifier only)': Track7Config(consistency_subsample_rate=0.0),
          }

          print(f'Track 7 Latency Benchmark (budget={BUDGET_MS}ms P99)')
          print(f'{"Config":<46} {"mean_ms":<10} {"p99_ms":<10} {"budget?"}')
          print('-' * 76)
          for name, cfg in configs.items():
              gw = Track7Gateway(model, cfg=cfg)
              stats = measure_gateway_latency(gw, x_single)
              within = 'YES' if stats['p99_ms'] <= BUDGET_MS else 'EXCEEDS'
              print(f'{name:<46} {stats["mean_ms"]:<10.2f} {stats["p99_ms"]:<10.2f} {within}')
              gw.shutdown()

          print()
          print('Recommendation: set consistency_subsample_rate based on QPS and latency budget.')
          print('At low QPS: 1.0 (every request gets consistency check).')
          print('At high QPS: 0.1-0.2 (sample; squeezer + classifier provide per-request coverage).')


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x_single = torch.rand(1, 1, 28, 28)
          benchmark_across_configs(model, x_single)

