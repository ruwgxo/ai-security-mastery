prose_content:

  part_1:
    title: 'Design Brief: Track 7 as the Gateway''s Unique Pre-Inference Track'
    body: |
      The six-track gateway assembled across Chapters 6, 7, and 9 runs all detection tracks
      in parallel with the main model inference and aggregates their results post-request. Every
      track in Tracks 1-6 operates on the request as delivered: the input is sent to the model,
      the tracks observe the same unmodified input and the model''s output, and detection decisions
      are made based on the unmodified signal. No track in Chapters 6-9 changes what the model
      sees before the model responds.

      Track 7 breaks this pattern. Feature squeezing (Section 10.11) requires transforming the
      input before the model processes it. The detection signal is the comparison between what the
      model says about the original input and what it says about the squeezed input. If the squeezer
      runs after the model, there is no comparison with the primary inference -- only a secondary
      inference on a transformed version. The result is still informative (squeezer disagreement
      with the transformed prediction vs a natural-image reference), but the semantically richer
      detection signal (original prediction changed by squeezing) requires the squeezer to run
      before or alongside the main inference.

      This creates Track 7''s architectural signature: a pre-inference stage and a post-inference
      stage. The pre-inference stage applies the squeezer transform (fast, ~1-3ms) and dispatches
      parallel model inference on the squeezed input alongside the primary model inference. Both
      inferences complete before the gateway produces its response; the squeezer disagreement is
      computed from the two parallel inference outputs. The post-inference stage runs the consistency
      checker (N variants on the main model) and the adversarial classifier (on the original input)
      after the primary inference completes.

  part_2:
    title: 'Pre-Inference Stage: Parallel Squeezer Execution'
    body: |
      The pre-inference stage executes as follows. When a request arrives at the gateway:

      Step 1 -- Squeezer transform (synchronous, <3ms): apply each squeezer in the ensemble
      to the input tensor. These are fast tensor operations (Gaussian convolution, rounding,
      bilinear resize) that complete in 1-3ms on CPU or sub-millisecond on GPU. The transforms
      are deterministic and do not require a model forward pass.

      Step 2 -- Parallel inference dispatch (async): dispatch three concurrent tasks:
      (a) primary model inference on the original input,
      (b) squeezer model inferences on each squeezed variant (one per squeezer),
      (c) adversarial detector classifier on the original input (feature extraction + linear).

      Step 3 -- Wait for completion: all parallel tasks complete within approximately one model
      inference time (20ms for a medium model), because they run concurrently. The squeezer
      inferences have the same model and the same latency as the primary inference; they just
      operate on slightly different inputs.

      Step 4 -- Pre-inference squeezer decision: compare primary inference output with each
      squeezer inference output. Compute the squeezer disagreement scores. If any squeezer score
      exceeds the high-confidence threshold (block tier), the gateway may reject the request
      immediately without waiting for the post-inference stage. This is the early-exit optimisation
      for obvious adversarial inputs.

      The latency model with parallel execution: total pre-inference latency = squeezer_transform
      + max(primary_inference, squeezer_inference). Since both inferences use the same model,
      max is approximately one inference time. The squeezer_transform overhead is 1-3ms. The
      parallelisation effectively costs one inference time regardless of the number of squeezers
      in the ensemble.

  part_3:
    title: 'Post-Inference Stage: Consistency Check and Adversarial Classifier'
    body: |
      The post-inference stage runs after the primary model inference completes. It adds the
      two remaining detection primitives whose signals depend on the primary model''s output or
      can reuse the model that just ran.

      Consistency checking generates N randomly perturbed variants of the input and queries the
      model on each. Section 10.12 optimised this by batching all N variants in a single forward
      pass (batch size N vs N separate forward passes). The post-inference consistency check
      starts immediately after the primary inference: the primary model is still warm, and the
      N-variant batch uses the same model. The latency is one additional batch forward pass (at
      batch size N) rather than N sequential passes.

      The adversarial detector classifier was dispatched in parallel with the primary inference
      (Step 2c above). Its result is available without additional latency by the time the primary
      inference completes. No additional wait is needed.

      Sub-sampling is a viable operational optimisation: run the consistency check on only a
      fraction (e.g., 10%) of requests and rely on the squeezer ensemble and adversarial classifier
      for per-request coverage. Sub-sampling reduces average latency at the cost of per-request
      consistency check coverage. For high-QPS deployments where every microsecond matters, a
      configurable sub-sample rate (track7_config.consistency_subsample_rate) allows operators to
      tune the cost-coverage tradeoff without disabling the primitive entirely.

  part_4:
    title: 'Seven-Track Gateway: Unified Response Policy'
    body: |
      The unified seven-track gateway produces one response action per request. Each track
      contributes a score and a fired/not-fired binary decision. The response policy maps the
      combination of track decisions to an action tier.

      Action tier structure:
      BLOCK (immediate reject, 429 Too Many Requests or 403 Forbidden): fired when any track
      produces a high-confidence signal (score above the block threshold). Used for high-confidence
      adversarial examples (squeezer score > 0.50), confirmed injection (Track 1-5 high confidence),
      or confirmed extraction campaign (Track 6 rate-limit hit). The block tier must respond quickly;
      Track 7 pre-inference squeezer provides the fastest block signal.

      FLAG (serve response but log and alert): fired when moderate-confidence signals appear across
      multiple tracks. The request is served normally (the model''s response is returned) but the
      event is logged to the SIEM with Track 7 scores. Human review queue picks up flagged requests.
      The flag tier is the correct response for adversarial examples that may be false positives --
      preserve user experience while generating an investigation signal.

      MONITOR (serve response with enhanced telemetry): fired when low-confidence signals appear
      from individual tracks below the flag threshold. The request is served normally. Enhanced
      telemetry is attached to the request log (all Track 7 scores captured even though no alert
      fires). Monitoring data feeds the Track 7 calibration cycle.

      PASS: no track fired above its threshold. Request is served normally with standard telemetry.

  part_5:
    title: 'AML.T0043/T0015 Sigma Rule: Completing the Chapter 5 Stubs'
    body: |
      Chapter 5 Section 5.8 introduced the AML Sigma stub pattern: placeholder detection rules
      anchored to ATLAS techniques that are completed as each chapter builds the production
      detection mechanism. Chapter 10 Section 10.13 completes AML.T0043 (Craft Adversarial Data)
      and AML.T0015 (Evade ML Model) with the Track 7 detection fields.

      The completed AML.T0043 Sigma rule fires when the Track 7 squeezer ensemble disagreement
      score exceeds the block or flag threshold. The log source is the AI gateway''s Track 7
      telemetry, which must include: the squeezer scores per squeezer (for the highest-sensitivity
      squeezer), the consistency check score, the adversarial classifier probability, the combined
      ensemble score, and the action tier decision. These fields are produced by the gateway_track7.py
      deliverable and stored in a structured log entry per request.

      AML.T0015 (Evade ML Model) maps to the combined ensemble firing: evidence that adversarial
      data reached the deployed model and caused or attempted to cause misclassification. The Sigma
      condition for AML.T0015 uses an OR across the three detection fields: if any primitive fires
      above its threshold, the evasion attempt is recorded. The rule level is HIGH for block-tier
      events and MEDIUM for flag-tier events.

      The Sigma rules include explicit false positive entries: natural inputs near decision
      boundaries produce squeezer and consistency scores above their thresholds at low but
      non-zero rates. The false positive entries direct analysts to verify with the adversarial
      classifier score (which is lower for natural borderline inputs than for adversarial examples)
      before escalating.

  part_6:
    title: 'Deployment Checklist: Eight Gates Before Track 7 Goes to Production'
    body: |
      The eight-item deployment checklist encodes the lessons of Sections 10.11-10.12 and
      the Section 10.10 incident analysis into a mandatory pre-production gate.

      Item 1 -- Squeezer threshold calibration on production-representative inputs: the threshold
      must be set using inputs drawn from the actual production distribution, not from a benchmark
      dataset. Hard borderline inputs in the production domain produce higher squeezer scores than
      easy benchmark images; calibrating on benchmarks underestimates the false positive rate.

      Item 2 -- Consistency check sigma and N calibration: sigma must be < adversarial_epsilon/4;
      N must be sufficient for stable disagreement estimates (at least N=20). Both must be validated
      against the production domain at the expected production QPS (not single-request testing).

      Item 3 -- Adversarial detector training on deployment-specific attack families: the detector
      must include adversarial examples generated against the specific model being deployed, not
      a generic image classifier. Cross-attack generalisation must pass the Section 10.12 test
      before deployment.

      Item 4 -- Latency benchmark at production load: measure Track 7 P99 latency under production
      QPS using the track7_latency_benchmark.py deliverable. Single-request latency is not
      representative; under load, thread pool contention may push squeezer parallel execution back
      toward sequential.

      Item 5 -- Adversarial example test suite coverage: run Track 7 against adversarial examples
      from all relevant taxonomy cells (FGSM, PGD, C&W, boundary attack, text adversarial for
      text classifiers, physical patch detector if camera-facing system). Detection rate must meet
      or exceed the documented coverage targets.

      Item 6 -- Sigma rule validation: verify that the completed AML.T0043/T0015 Sigma rule fires
      on known adversarial examples in the test suite and does not fire on the natural input
      calibration set above the target FPR.

      Item 7 -- False positive audit on production traffic sample: run Track 7 in monitor-only
      mode (no blocks or flags) on a sample of production traffic for 24-48 hours; measure the
      actual FPR. Adjust thresholds if actual FPR exceeds the target.

      Item 8 -- Circuit breaker configuration: if Track 7 throws unhandled exceptions (model
      inference failure, OOM, timeout), the gateway must fail open (serve the request without
      detection) rather than fail closed (block all requests). Configure explicit circuit breaker
      logic with alerting on Track 7 error rate.

  part_7:
    title: 'Adaptive Adversary and Operational False Positive Management'
    body: |
      The adaptive adversary who knows the Track 7 configuration faces a harder optimisation
      problem than the non-adaptive adversary. They must craft adversarial examples that
      simultaneously survive: (a) the squeezer ensemble (no detectable squeezer disagreement),
      (b) the consistency check (prediction stable under N random variants), and (c) the
      adversarial classifier (input statistics indistinguishable from natural images). As shown
      in Section 10.12, jointly satisfying all three constraints typically requires larger
      perturbation budgets or lower attack success rates, raising the attack cost.

      However, the adaptive adversary advantage is not zero. An adversary who can craft examples
      against the full three-primitive ensemble (using Section 10.5 adaptive C&W adapted to
      include all three detection objectives) can achieve 50-60% of the non-adaptive attack
      success rate against the ensemble. The track7_adaptive_adversary_test.py deliverable
      measures this gap for the specific deployed configuration. If the gap exceeds 30 percentage
      points (non-adaptive detection 85%, adaptive detection <55%), the ensemble configuration
      should be revisited: add a fourth primitive or change squeezer parameters.

      False positive management is the operational challenge that determines whether Track 7
      remains deployed long-term. The track7_calibration_harness.py deliverable tests Track 7
      against natural edge-case inputs: low-quality sensor captures, heavily compressed images,
      unusual colour distributions, natural images of unusual objects near decision boundaries.
      If the false positive rate on these inputs exceeds 5%, operators will disable Track 7 under
      load, not because it fails to detect adversarial examples but because the alert volume is
      unmanageable. Threshold calibration on production-representative hard examples (not just
      easy benchmark images) is the preventive measure.

