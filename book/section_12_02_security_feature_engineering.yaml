document_info:
  title: 'Security Feature Engineering: Extracting Signal from API Requests'
  chapter: 12
  section: 2
  section_code: '1202'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  created: '2026-06-06'
  estimated_pages: 6
  estimated_reading_time: '45-55 minutes'

section_overview:
  one_line_summary: 'Security feature engineering starts with the adversary goal: what signal at the feature level separates an attack from a legitimate request -- get this right once and every classifier in Chapter 12 benefits.'
  why_this_section_exists: |
    Every ML classifier in Chapter 12 -- Isolation Forest, Random Forest, XGBoost, GRU,
    Sentence Transformer, DistilBERT -- consumes features. The features are not free: they
    must be designed, extracted, and served within the latency budget of the production gateway.
    A well-designed feature set enables a Random Forest to reach 90%+ accuracy with 500 labelled
    examples. A naive feature set -- raw text passed directly to a bag-of-words vectoriser --
    requires 10x the data and still misses the structural attack signals that simple engineered
    features catch immediately.

    Section 12.02 builds the shared feature extraction pipeline that all five detection families
    use. It is an infrastructure section: after this section, every subsequent classifier section
    can focus on the model architecture rather than re-engineering features from scratch.
    The four feature groups -- token-level, structural, semantic, and contextual -- each capture
    a distinct signal class that the others do not. Together they give the classifiers enough
    coverage of the adversarial attack surface to detect novel variants, not just known examples.
  position_in_chapter: |
    Section 12.02 is the shared infrastructure that all subsequent classifier sections depend on.
    It immediately follows the taxonomy (Section 12.01) and precedes every training section.
    The feature pipeline built here is referenced explicitly in Sections 12.03 through 12.17.
    It is the single highest-leverage investment in Chapter 12: good features compound across
    every model; bad features degrade every model.

learning_objectives:

  knowledge:
    - 'Explain why security feature engineering differs from standard NLP feature engineering and what the key distinction between adversarial intent and topic classification implies for feature design'
    - 'Name the five feature groups in the security feature pipeline and give two concrete examples from each group'
    - 'Explain why structural features often carry more detection signal than semantic features for prompt injection detection'
    - 'Describe the training-serving skew problem and explain why it is especially damaging for security ML classifiers'
    - 'Explain what SHAP feature importance reveals about a trained classifier and how to use it to iterate on the feature design'
    - 'Describe feature distribution shift and explain why it is an early warning signal for model performance degradation'

  skills:
    - 'Implement the five feature groups -- token, structural, semantic, contextual, API-level -- for a given API request as a flat feature vector'
    - 'Run SHAP feature importance analysis on a trained Random Forest and identify the top-5 features contributing to positive predictions'
    - 'Compute pairwise feature correlation across a labelled dataset and flag collinear feature pairs for removal'
    - 'Implement a feature distribution monitor that detects when the live traffic distribution diverges from the training distribution'
    - 'Build the production feature pipeline with ONNX-based embedding extraction, Redis session cache, and feature schema versioning'

  security_mindset:
    - 'Start feature design from the adversary goal, not from ML convention: ask what signal distinguishes an attack at the feature level before choosing a representation'
    - 'Treat feature engineering as a security-domain problem: the features that matter for spam detection (word frequency, sender reputation) are categorically different from the features that matter for jailbreak detection (role boundary markers, instruction override density)'
    - 'Recognise that the training-serving skew problem in security ML is more dangerous than in standard ML because model degradation is silent -- the classifier appears to be running while missing attacks it was designed to catch'
    - 'Use SHAP as an auditing tool, not just an explainability tool: if the top SHAP features are not ones you would expect an adversary to manipulate, the feature set is measuring the wrong signal'

prerequisites:
  - 'Section 12.01: ML detection taxonomy -- the five families that consume the features built in this section'
  - 'Chapter 1 Section 1.05: data representation and feature engineering -- the general ML foundation'
  - 'Chapter 1 Section 1.06: data preprocessing -- normalisation and standardisation applied to security features'
  - 'Chapter 3 Section 3.03: word embeddings -- the basis for the semantic feature group'
  - 'Chapter 6 Section 6.01: prompt injection fundamentals -- the attack surface the token and structural features target'
  - 'Chapter 7 Section 7.01: jailbreak vs injection distinction -- informs which features distinguish the two attack classes'
  - 'Chapter 11 Section 11.02: detection-as-code -- features are defined in code, versioned, and tested like detection rules'
  - 'Chapter 11 Section 11.13: seven-track gateway -- the latency budget the feature pipeline must fit within'

prose_content:

  part_1:
    title: 'Why Security Features Are Different'
    body: |
      Standard NLP classification features are designed to capture topic, sentiment, or intent
      as a reader would perceive them. A spam classifier uses word frequency, sender reputation,
      and link density. A sentiment classifier uses emotional language markers, negation patterns,
      and adjective polarity. The features are semantic: they describe what the text means.

      Security feature engineering for LLM API detection starts from a different question: what
      signal at the feature level separates an attack from a legitimate request at the structural
      and behavioural level, independent of the specific words used? This matters because
      adversaries adapt. An attacker who knows the spam classifier's top features stops using
      the flagged words. An attacker who knows the jailbreak classifier's top semantic features
      rewrites the payload to reduce semantic similarity to known jailbreaks. But an attacker
      who knows that the classifier flags role boundary markers cannot simply rewrite around
      that feature without fundamentally changing the attack structure -- because the role
      boundary marker is the attack mechanism, not just a surface indicator.

      This is the core principle of security feature engineering: features that describe the
      attack mechanism are more robust to adversarial adaptation than features that describe
      the surface presentation. A prompt injection attack requires an instruction override
      signal. That signal manifests in structural features: the presence of 'ignore', 'disregard',
      or 'forget' near the beginning of a user turn; a role label (system:, assistant:) inside
      a user-role message; a markdown code block containing what appears to be a system prompt.
      These structural features describe the injection mechanism. Rewriting the surface wording
      does not eliminate the structural feature; it still registers.

      The second principle is that attack features span multiple signal classes. A jailbreak
      prompt may be semantically close to a known jailbreak (semantic feature), contain a
      persona invocation token (structural feature), be longer than 95% of benign requests
      (token-level feature), and arrive in the third turn of a conversation that has already
      seen one refusal (contextual feature). No single feature class captures the full attack
      signal. The flat feature vector that combines all five groups gives the classifier a
      richer representation than any single group alone, enabling it to generalise across attack
      families with different surface presentations.

  part_2:
    title: 'Token-Level Features: Signal in the Raw Text'
    body: |
      Token-level features are computed directly from the raw text of the request without
      requiring a neural model or session context. They are the fastest features to compute --
      sub-millisecond for all token-level features combined -- and the most robust to inference
      infrastructure failures. They capture attack signals that manifest in the statistical
      properties of the text rather than its specific tokens.

      Sequence length is a reliable first-order feature. Jailbreak prompts are typically longer
      than benign requests: they require setup (establishing the persona, describing the
      alternative mode), payload (the actual instruction override), and often a closing
      confirmation request. The median jailbreak prompt in the JailbreakChat.com corpus is 3.2x
      longer than the median benign request to a consumer LLM API. Sequence length is not a
      sufficient feature -- short injections exist -- but it is a strong prior that the
      classifier uses as a base rate adjustment.

      Special character density measures the ratio of non-alphanumeric characters to total
      tokens. Injection payloads frequently use special characters for structure: backticks for
      code blocks, brackets for emphasis, angle brackets for pseudo-tags, forward slashes for
      role labels. A legitimately composed user request rarely exceeds 8% special character
      density; injection payloads average 15-22%. The feature is computed as
      len([c for c in text if not c.isalnum() and not c.isspace()]) / max(len(text), 1).

      Instruction keyword frequency counts the occurrence of high-signal instruction verbs
      relative to total token count: 'ignore', 'disregard', 'forget', 'pretend', 'roleplay',
      'act as', 'you are now', 'your new instructions'. These terms are the surface manifestation
      of the instruction override mechanism. Their frequency relative to text length is more
      informative than raw count: a long document that mentions 'ignore' once in a different
      context is different from a 30-token prompt that opens with 'ignore all previous'.

      Token entropy measures the information density of the text using the Shannon entropy of
      the character or token distribution. Low-entropy texts (repetitive, formulaic) are
      associated with automated attack generation. High-entropy texts that exceed the normal
      distribution for human-written prompts may indicate obfuscated payloads (Base64 encoded
      instructions, Unicode homoglyph substitution) that Chapter 6 Section 6.04 documented
      as token smuggling techniques.

  part_3:
    title: 'Structural Features: Signal in the Architecture of the Request'
    body: |
      Structural features capture how the request is constructed rather than what it says.
      They are computed by parsing the text for structural markers and are typically the highest-
      signal feature group for prompt injection detection -- higher than semantic embedding
      features -- because structural markers directly indicate the attack mechanism rather than
      its surface content.

      Role boundary markers are the most diagnostic structural feature for prompt injection.
      An injection attack that attempts to override the system prompt frequently includes
      explicit role labels inside the user-turn content: 'System:', 'SYSTEM:', '[SYSTEM]',
      'Assistant:', '<assistant>', or markdown headers that mimic system prompt formatting.
      The presence of any role label pattern inside a user-role message is a strong injection
      signal. Detection is a boolean feature with near-zero false positive rate on legitimate
      traffic: human users almost never write 'System:' in a conversational message.

      Code block presence and density counts the number of markdown triple-backtick code
      blocks and their cumulative character length relative to total message length. Indirect
      injection attacks embedded in documents, web pages, and email content (Chapter 6
      Sections 6.06 through 6.10) frequently use code block formatting to present instructions
      in a context that the LLM treats as authoritative. A user message that is more than 60%
      code block content by character length is statistically anomalous in benign traffic
      and common in indirect injection payloads.

      Bracket and quotation density measures the ratio of bracket characters (square, curly,
      angle, parenthetical) and quotation marks to total characters. Structured injection
      templates use brackets extensively to demarcate sections, pseudo-tags, and role labels.
      A request with a bracket density above the 95th percentile of the benign training
      distribution is worth flagging for ensemble scoring even if no other feature triggers.

      Instruction imperative count is a syntactic feature that counts the number of imperative
      verb constructions in the text: sentences that begin with a verb in base form addressed
      to the model ('Write', 'Tell', 'Explain', 'Ignore', 'Respond only in'). The ratio of
      imperative constructions to total sentences is elevated in injection and jailbreak prompts
      relative to conversational requests. The feature is extracted with a lightweight POS
      tagger -- spaCy's small English model adds 2-3ms but the feature is high signal for
      instruction-dense payloads.

  part_4:
    title: 'Semantic Features: Signal in the Meaning'
    body: |
      Semantic features capture the meaning of the request in a continuous embedding space.
      They are computed from a Sentence Transformer model and enable the classifier to detect
      paraphrase-equivalent attacks that share no surface tokens with known examples. The
      computational cost is 2-4ms for MiniLM-L6 via ONNX Runtime -- affordable within the
      50ms gateway budget but meaningful relative to the sub-millisecond token and structural
      features.

      Cosine distance to jailbreak cluster centroids is the primary semantic feature. During
      the dataset curation phase (Section 12.04), confirmed jailbreak examples are embedded
      with MiniLM-L6 and clustered with HDBSCAN into semantically coherent families: DAN-style
      persona jailbreaks, fictional framing jailbreaks, instruction hierarchy attacks, and so
      on. The centroid of each cluster is stored in the attack cluster library (Section 12.07).
      At inference time, the request embedding is compared to all cluster centroids and the
      minimum cosine distance across all centroids is computed as a scalar feature. A small
      minimum distance (below 0.25) indicates semantic proximity to a known attack family.

      Cosine distance to the benign centroid is the complement: a request that is semantically
      distant from all known attack clusters but also semantically distant from the benign
      centroid may be a novel attack variant with no existing cluster. This out-of-distribution
      signal is the semantic analogue of the Isolation Forest anomaly score -- it flags inputs
      that are unusual relative to both known attack families and known benign traffic.

      Embedding magnitude (L2 norm of the request embedding) is a lightweight additional
      feature that captures the density of the semantic representation. Injection payloads
      that combine multiple unrelated instructions into a single request often produce lower-
      magnitude embeddings than coherent natural language text because the mixed semantic
      content does not project strongly in any single direction of the embedding space.

  part_5:
    title: 'Contextual and API-Level Features: Signal Across the Session'
    body: |
      Contextual features capture the request's position in the user's session history. They
      are the only feature group that requires cross-request state: they depend on what
      happened in earlier turns of the conversation or earlier requests in the session.
      This makes them the most expensive feature group to serve -- they require a Redis
      session cache or equivalent to avoid reconstructing the conversation history on every
      request -- but they are uniquely powerful for detecting multi-turn attack patterns
      that single-turn features cannot see.

      Turn number in conversation is the simplest contextual feature: the ordinal position
      of the current request in the conversation. Multi-turn jailbreak attacks (Chapter 7
      Section 7.07) typically begin with innocuous early turns to establish rapport and
      context before introducing the attack payload in a later turn. A high-confidence
      attack signal that arrives in turn 5 of a conversation is more likely to be a deliberate
      gradual escalation than an isolated impulsive request.

      Prior refusal count is the count of turns in the current conversation where the model
      responded with a refusal or safety deflection. An adversary who is actively probing
      the model's boundaries will accumulate refusals as they test different approaches.
      A session with 3+ refusals before the current request is a strong signal that the
      user is engaged in systematic boundary testing rather than legitimate use. This feature
      requires the conversation history to be stored in the session cache and the model's
      responses to be monitored for refusal patterns -- a non-trivial integration that
      Chapter 14 Production Deployment covers.

      Session request rate is the number of requests per minute in the current session.
      Automated jailbreak generation (Chapter 7 Section 7.12) and model extraction campaigns
      (Chapter 9) both produce elevated request rates relative to human-paced conversation.
      A session request rate above the 99th percentile of the benign training distribution
      is an independent anomaly signal that combines multiplicatively with attack-content signals.

      API-level features capture the configuration of the API call itself rather than the
      content. Temperature setting is a useful signal: jailbreak researchers frequently set
      high temperature (0.9-1.0) when probing model boundaries to increase response variance.
      The streaming flag distinguishes interactive from automated clients. Model name selection
      (using a more powerful model than the default for a given endpoint) may indicate a
      sophisticated user with specific capability requirements. These features are extracted
      from the API request headers and parameters rather than the message content and add
      zero latency to the pipeline.

  part_6:
    title: 'Feature Correlation, Importance, and Distribution Shift'
    body: |
      Once the five feature groups are implemented, three analytical tasks complete the
      feature engineering phase before any model is trained: correlation analysis, importance
      analysis, and distribution shift monitoring.

      Feature correlation analysis computes pairwise Pearson or Spearman correlation across
      all features on the labelled training dataset. Features with pairwise correlation above
      0.85 are collinear: they carry largely the same signal, and including both wastes model
      capacity and can inflate feature importance scores for the correlated pair. Collinear
      feature pairs are resolved by keeping the faster-to-compute feature and dropping the
      redundant one. For example, sequence length and instruction keyword count are correlated
      (longer prompts have more keywords) but sequence length computes in microseconds while
      keyword count requires a scan of the keyword list. When the correlation is high, sequence
      length is the correct feature to keep.

      SHAP feature importance analysis runs after the first supervised classifier is trained
      on the feature set (Section 12.05). SHAP TreeExplainer decomposes each prediction into
      additive feature contributions and aggregates them into a global feature importance
      ranking. The ranking reveals whether the feature set is measuring the right signal: the
      top SHAP features should correspond to structural and behavioural attack mechanisms, not
      surface artifacts. If 'sequence_length' and 'token_count' dominate the SHAP ranking and
      the structural features (role_boundary_marker, code_block_density) rank low, the feature
      set is measuring request length rather than attack structure -- a signal that is easy for
      an adversary to manipulate by padding a short injection payload with benign text.

      Feature distribution shift monitoring tracks the distributions of each feature in live
      traffic against their distributions in the training dataset. An attack distribution that
      is shifting -- because adversaries have adapted their tactics -- will manifest as a
      distributional change in the features that were most predictive of the old attack patterns.
      The monitoring uses the Kolmogorov-Smirnov test per feature, comparing the training
      distribution to a rolling window of live traffic. A KS statistic above 0.15 on any of
      the top-10 SHAP features triggers an investigation and potentially a retraining trigger
      (Section 12.14).

