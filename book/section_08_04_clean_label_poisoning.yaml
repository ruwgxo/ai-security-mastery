common_mistakes:

  mistake_1_assuming_image_classification_only:
    description: 'Treating clean-label poisoning as an image-classification-specific threat'
    why_it_happens: |
      The canonical research (Poison Frogs, Witches Brew, BullseyePolytope) uses
      image classification benchmarks. The feature-collision mathematics is cleanest
      to present in continuous image feature spaces. Practitioners reading this
      literature internalise the attack as image-specific and conclude that text
      or tabular models face different threats.
    consequence: 'Text classifiers, tabular models, and (critically) LLMs deployed without clean-label detection capability. The attack transfers directly to these domains -- with different technical mechanisms but the same structural pattern -- and deployments without feature-space detection are exposed.'
    correct_approach: 'Treat clean-label poisoning as a general pattern, not an image-specific attack. Section 8.4 Part 5 covers text variants; Section 8.7 covers LLM-specific variants. Plan feature-space detection capability across all domains, not just image.'

  mistake_2_declaring_victory_on_label_consistency_coverage:
    description: 'Assessing training-time defence coverage by presence of label-consistency controls'
    why_it_happens: |
      Label-consistency defences are widely-deployed, well-understood, and produce
      high detection rates against label flipping. Programmes that audit their
      coverage against the label-flipping threat report high coverage numbers. The
      coverage measurement is technically correct for label flipping and structurally
      wrong for the broader training-time threat.
    consequence: 'Detection programme that reports high coverage while being blind to the dominant attack class. The programme''s reported posture is inversely related to its actual posture -- high confidence, low coverage. Incidents that do occur are attributed to novel attacks rather than to the pre-existing coverage gap.'
    correct_approach: 'Measure training-time coverage by ability to detect Q2 targeted-integrity attacks, not by ability to detect Q1/Q4 availability attacks. Sections 8.12 and 8.15 provide the right detection capability; Section 8.4 establishes why it is mandatory.'

  mistake_3_underestimating_white_box_transfer:
    description: 'Assuming clean-label attacks are limited to adversaries with white-box access to the specific target model'
    why_it_happens: |
      The strongest clean-label attack results require white-box access. The literature
      emphasises this requirement when reporting peak attack success rates. Practitioners
      generalise to the conclusion that black-box adversaries cannot execute clean-label
      attacks, reducing the threat to the insider or rung-3 threat model only.
    consequence: 'External and rung-2 adversaries are treated as out-of-scope for clean-label threats. In practice, transfer from surrogate models achieves meaningful (though reduced) attack success rates. Adversaries with only dataset-contribution access routinely achieve targeted misclassification through surrogate-crafted poisons.'
    correct_approach: 'Assume clean-label attacks are feasible for any adversary with rung-2 access or higher. White-box access increases attack efficiency but is not a binary prerequisite. Section 8.4 transferability discussion (Part 3) quantifies the surrogate-to-target degradation.'

  mistake_4_over_relying_on_human_annotation:
    description: 'Treating human annotation as an effective defence against clean-label poisoning'
    why_it_happens: |
      Clean-label poisons are constructed to look natural to human annotators. The
      perceptual-similarity constraint in the optimisation formulation specifically
      ensures this. Nonetheless, organisations sometimes assume that humans-in-the-
      loop during dataset curation will catch poisoning. The intuition is reasonable
      for egregious samples; it is wrong for well-constructed clean-label poisons.
    consequence: 'Reliance on a defence that is specifically designed against by the attack. Well-constructed Poison Frogs samples pass human review at rates indistinguishable from clean samples. Annotation-based defence contributes essentially zero detection capability against clean-label attacks.'
    correct_approach: 'Treat human annotation as a quality-assurance control, not a security control. Clean-label detection requires feature-space analysis (Section 8.12 primitives) that humans cannot perform at scale or with the required discrimination.'

  mistake_5_static_benchmarking_against_historical_attacks:
    description: 'Evaluating feature-space detection primitives only against Poison Frogs and concluding coverage is adequate'
    why_it_happens: |
      Poison Frogs is the oldest, best-known, and most extensively-benchmarked clean-
      label attack. Detection primitives with high success against Poison Frogs are
      easy to demonstrate. The detectability-effectiveness frontier from Section 8.2
      predicts that attacks will evolve; benchmarking only against historical attacks
      measures a frontier point that the adversary has already moved past.
    consequence: 'Detection coverage that catches Poison Frogs but misses Witches Brew, BullseyePolytope, or novel variants. The organisation reports clean-label coverage based on the historical attack, while the actual threat is the contemporary variant.'
    correct_approach: 'Benchmark detection against the attack generation currently active, not the founding attack. Maintain attack catalog freshness; Section 8.13 defensive training and Section 8.12 detection primitives evaluation should be re-run as the attack literature evolves. Treat attack catalog maintenance as an operational function, not a one-time research activity.'

section_summary:
  compact: |
    Clean-label poisoning inverts the structural property that made label flipping
    detectable. Instead of modifying labels and keeping features, the adversary
    modifies features and keeps labels correct. Samples are constructed via feature-
    collision optimisation: engineered to sit at a specific feature-space location
    (producing the adversary's desired decision-boundary shift) while remaining
    perceptually natural to preserve their claimed label honestly. Poison Frogs
    (Shafahi et al. 2018) is the canonical instance; Witches Brew (Geiping 2021)
    generalises across targets; BullseyePolytope (Aghakhani 2021) expands to regions.
    The label-consistency defences from Section 8.3 fail entirely: they look for
    feature-neighbourhood mismatches that clean-label construction specifically avoids.
    Detection must shift from label space to feature space -- spectral signatures,
    activation clustering, Neural Cleanse, STRIP, meta-classifiers -- all of which
    Section 8.12 builds. The clean-label framework transfers to text and instruction-
    tuning domains, though mature detection tooling is image-domain-dominant as of
    the chapter's writing. Clean-label attacks are economically rational for motivated
    adversaries across all rungs of the Section 8.1 access ladder; public attribution
    is sparse but the threat is likely under-reported rather than under-occurring.
    Section 8.4 is the hinge: it establishes the feature-space defensive regime that
    the rest of Chapter 8 builds.

  key_takeaways:
    - 'Clean-label poisoning keeps labels honest and engineers features instead -- the adversary response to label-consistency defence'
    - 'Feature-collision optimisation is the mechanism: minimise feature-space distance to target while preserving perceptual similarity to base class'
    - 'Poison Frogs is canonical; Witches Brew and BullseyePolytope refine for scale and generality'
    - 'Label-consistency defences produce essentially zero detection rate against clean-label attacks (~3-8% TPR vs 92% for label flipping)'
    - 'Attack pattern transfers to text, instruction-tuning, and LLM contexts with domain-specific feature-engineering mechanisms'
    - 'Feature-space detection (Section 8.12) is the structurally necessary defensive response -- mandatory, not optional'
    - 'Public attribution is sparse; economic rationality and tooling maturity suggest the threat is under-reported rather than under-occurring'

preview_section_05:
  title: 'Backdoor Attacks: Trigger-Based Behaviour and BadNets'
  connection: |
    Section 8.4 established clean-label poisoning and showed why feature-space
    detection becomes mandatory. Section 8.5 begins the deepest threat family in
    Chapter 8: backdoor attacks. BadNets (Gu et al. 2017) is the canonical backdoor
    and the original feature-space threat. Backdoors combine the feature-engineering
    insight of clean-label attacks with an additional structural property: conditional
    activation. The model behaves cleanly on trigger-free inputs (preserving aggregate
    accuracy, passing standard evaluation) and behaves as the attacker intends on
    trigger-bearing inputs (high attack success rate where it matters). This is the
    worst case of Q2 targeted integrity -- the attack that is invisible on every
    benchmark the defender runs, and reliable on every triggered input the adversary
    sends. Section 8.5 builds the attack. Sections 8.5 through 8.12 build against it.

