section_overview:
  title: 'Clean-Label Poisoning: Bypassing Label Consistency Defences'
  one_line_summary: |
    Clean-label poisoning keeps labels correct and corrupts features instead --
    engineering training samples that sit in the target class's feature-space
    region while carrying the target class's label. The supervision signal is
    honest. The feature distribution is engineered. Label-consistency defences
    see no anomaly and the attack passes undetected. Poison Frogs (Shafahi 2018)
    is the canonical instance; Witches Brew and BullseyePolytope are the
    subsequent refinements. This is the pivot section: the attack that breaks
    the defence Section 8.3 taught you to trust.

  why_this_section_exists: |
    Section 8.3 established label flipping and the label-consistency defences
    that catch it. If poisoning research had stopped at label flipping, the
    training-time threat model would be largely solved -- the defences work,
    the budgets required are high, the detection rates are excellent. The
    research did not stop there. Attackers observed that label-consistency
    defences make a specific structural assumption: poisoned samples are
    feature-neighbourhood outliers. They responded by constructing attacks
    that preserve the feature-neighbourhood consistency that the defences
    rely on. Clean-label poisoning is that response.

    The pivot matters because it changes the entire analytic frame for
    training-time defence. Detection can no longer be a label-space operation.
    Feature-space analysis becomes mandatory. The infrastructure that Section
    8.12 builds -- spectral signatures, activation clustering, Neural Cleanse
    -- exists because clean-label attacks forced the field to move from label-
    space to feature-space reasoning. Understanding why clean-label attacks
    defeat label consistency is the prerequisite for understanding why those
    feature-space primitives were built the way they were.

    This section also introduces the most sophisticated optimisation problem
    in Chapter 8's attack catalogue: the feature-collision objective. Unlike
    label flipping, which requires only selecting samples, clean-label attacks
    require crafting samples -- solving an optimisation over feature space to
    produce poisons that sit at the right feature-space location while looking
    like correct-class members under human review. The optimisation is both
    the mechanism that makes the attack effective and the vulnerability that
    defenders exploit: the engineered samples have statistical signatures in
    activation space that the clean-label optimisation cannot fully suppress.
    Section 8.12's spectral signatures and activation clustering are designed
    to detect exactly these signatures.

  position_in_chapter: |
    Section 8.4 is the hinge of Chapter 8. Every section before it operates
    in the label-space defensive regime where label flipping lives and where
    label-consistency defences work. Every section after it operates in the
    feature-space and activation-space regime that clean-label attacks force.
    Sections 8.5 and 8.6 (backdoor attacks) build on the clean-label framework
    -- BadNets-style backdoors can be constructed as clean-label attacks
    specifically to avoid the label-consistency tripwire. Sections 8.7-8.9
    (LLM-specific attacks) inherit the clean-label pattern in their respective
    domains. Section 8.12's detection primitives are designed against the
    clean-label threat model. Section 8.13's defensive training techniques are
    evaluated primarily by their effect on clean-label attack success rates.

    If Section 8.3 was the easy problem, Section 8.4 is where the hard problem
    begins. The defensive architecture shift from label-space to feature-space
    happens here.

