section_overview:
  one_line_summary: |
    Black-box decision boundary mapping is the foundational extraction primitive:
    every API query reveals boundary information for its input, linear models
    extract in O(d) queries, and extraction queries cluster near decision surfaces
    in ways that benign queries never do -- the detection insight that drives the
    Section 9.11 query monitor.

  why_this_section_exists: |
    Section 9.2 named the four extraction goals. Section 9.3 implements the first
    attack: black-box decision boundary mapping -- the primitive that underlies
    decision-boundary extraction directly and informs the distillation attacks in
    Section 9.4. Understanding this attack at the implementation level is what
    makes the detection design in Section 9.10 defensible rather than heuristic.

    The Tramer et al. 2016 result is the anchor: a linear model can be extracted
    in O(d) queries where d is the feature dimension, using equation-solving
    techniques that treat each API query as a linear constraint on the model''s
    weight vector. Tree models extract via path probing: the adversary submits
    inputs that traverse different branches until the tree''s structure is fully
    mapped. Neural networks require more queries but the same boundary-probing
    logic applies -- active learning makes the campaign budget-efficient by
    choosing inputs that maximally reduce boundary uncertainty.

    The detection insight established here -- extraction queries cluster near
    decision boundaries while benign queries cluster in high-density input regions
    -- is the mechanistic foundation for the boundary query detector and OOD
    detector in Section 9.10. Building the attack first is what makes the detector
    design principled: the detector targets the structural property of extraction
    query distributions, not a surface-level heuristic.

  position_in_chapter: |
    Section 9.3 of 13. First attack implementation section. Establishes the
    boundary mapping primitive that Section 9.4 (distillation) builds on, and
    the detection insight that Section 9.10 operationalises. Section 9.9''s
    incident reconstruction references the Tramer et al. MLaaS extractions
    documented here.

