prose_content:

  - part: 1
    title: 'Black-Box Extraction: What the Adversary Has and Does Not Have'
    body: |
      Black-box extraction begins with a strict constraint: the adversary has
      exactly what every legitimate API user has. They can submit an input and
      receive an output. They cannot inspect weights, compute gradients, or access
      the model''s internal representations. The inference API is their only
      channel, and every interaction costs money.

      Within this constraint, the adversary has one powerful property working in
      their favour: determinism. A deployed model with fixed weights returns
      the same output for the same input. More importantly, it returns outputs
      that are consistent functions of its internal decision boundary. Every
      output the adversary receives is a data point about where the boundary lies.
      There is no noise in the labels (for deterministic models) and no cost
      to the adversary for the information each query provides -- beyond the
      API fee.

      This is the foundational extraction insight. The model cannot withhold
      boundary information when it answers a query. By answering at all, it
      reveals which side of its classification surface the input falls on. An
      adversary who submits enough inputs -- chosen strategically -- can reconstruct
      the surface from the accumulated answers. The model''s helpfulness is the
      extraction mechanism.

      Three practical constraints bound the adversary. First, query cost: each
      API call has a monetary or computational cost that limits the total query
      budget. Second, rate limits: the operator may enforce throughput limits that
      pace the extraction timeline. Third, detection: a well-instrumented API
      will log query patterns and flag anomalous distributions. These three
      constraints are the defender''s leverage. None of them prevents extraction
      in principle; all of them impose costs that make extraction less attractive
      relative to training from scratch.

  - part: 2
    title: 'Decision Boundary Mapping: The Core Primitive'
    body: |
      Decision boundary mapping is the process of determining where a model
      transitions between output classes by submitting input pairs and observing
      which class each input is assigned to. The boundary is the set of points
      in input space where the model''s class assignment changes -- the surface
      that separates the model''s output regions.

      The basic procedure has two phases. In the sampling phase, the adversary
      submits inputs drawn from the input distribution and records the label each
      receives. This partitions the observed input space into labelled regions.
      In the boundary refinement phase, the adversary identifies pairs of inputs
      with different labels and searches for the boundary between them using
      binary search or other interpolation techniques. Given input A labelled
      class 0 and input B labelled class 1, the midpoint between them is closer
      to the boundary than either endpoint. Querying the midpoint and recursing
      on the appropriate half narrows the boundary to arbitrary precision.

      Binary search boundary refinement between two points requires O(log(1/ε))
      queries to locate the boundary to within ε precision. For a d-dimensional
      input space, covering the boundary globally requires identifying enough
      pairs to reconstruct the boundary''s geometry -- the query count scales
      with the boundary''s complexity, not with the input dimension directly.

      The key insight for linear classifiers is that binary search is not needed.
      A linear classifier has a single hyperplane boundary defined by d+1
      parameters (the weight vector and bias). Each query that falls on the
      boundary (or near it) provides a linear constraint on these parameters.
      With d+1 linearly independent boundary points, the hyperplane is exactly
      determined. This is the equation-solving approach -- and it requires only
      O(d) queries for a d-dimensional linear classifier.

  - part: 3
    title: 'Tramer et al. 2016: The Canonical Result'
    body: |
      The Tramer et al. 2016 paper "Stealing Machine Learning Models via
      Prediction APIs" established the foundational results for model extraction
      against commercial ML APIs. The paper demonstrated attacks against Amazon
      ML, Microsoft Azure ML, BigML, and other MLaaS platforms of the period,
      extracting linear classifiers, decision trees, and neural networks with
      documented query budgets.

      The core theoretical result for linear models is equation-solving extraction.
      A binary linear classifier assigns label 1 to inputs where w·x + b > 0 and
      label 0 otherwise, where w is the d-dimensional weight vector and b is the
      bias. The decision boundary is the hyperplane w·x + b = 0.

      The adversary''s strategy is to find inputs on the boundary. Starting from
      two inputs with opposite labels, binary search locates a point near the
      boundary. Repeating this process from different starting pairs produces
      multiple near-boundary points. Each near-boundary point x_i satisfies
      approximately w·x_i + b ≈ 0 -- a linear constraint on the unknown weight
      vector. With d+1 linearly independent constraints, the system w·x = -b
      is solvable by standard linear algebra. The weight vector is recovered
      exactly (up to numerical precision) from d+1 boundary points.

      Query budget: finding each boundary point via binary search requires
      O(log(1/ε)) queries for precision ε. Finding d+1 independent boundary
      points requires O(d · log(1/ε)) queries total. For typical ML feature
      dimensions (d in the tens to thousands), and typical precision requirements
      (ε = 0.001), this is a few hundred to a few tens of thousands of queries --
      trivially achievable against any commercial API without triggering
      throughput-based rate limits.

      The paper demonstrated this attack against production MLaaS platforms with
      documented query counts matching the theoretical bound. The practical
      extraction of a production linear classifier required fewer queries than a
      typical user might issue in a day of legitimate API use. The implication
      for defenders: linear models deployed via public APIs should be treated as
      effectively public. Rate limits calibrated to legitimate usage will not
      prevent equation-solving extraction.

  - part: 4
    title: 'Path-Finding Extraction: Tree Models via Branch Traversal'
    body: |
      Decision trees have a different extraction mechanism because their decision
      boundary is piecewise constant rather than linear. A decision tree partitions
      the input space into axis-aligned rectangular regions, with each leaf
      assigning a class label to all inputs that fall in its region. The tree''s
      structure is defined by a sequence of feature threshold comparisons at each
      internal node.

      Path-finding extraction maps the tree by finding which leaf each input falls
      in and working backward to reconstruct the branching structure. The procedure
      is recursive: the adversary submits a reference input, receives its class
      label, then systematically varies one feature at a time to find the threshold
      value at which the output label changes. That threshold is a split node in
      the tree. Repeating this for each feature at each depth level reconstructs
      the full tree.

      The query budget for tree extraction scales with the number of internal
      nodes and the number of features tested at each node. For a tree with N
      leaves (and therefore N-1 internal nodes) with splits over d features, the
      extraction requires O(N · d · log(feature_range / ε)) queries to locate
      each threshold to precision ε. For typical shallow trees (N in the tens to
      hundreds) with modest feature counts, this is a few thousand queries.

      Tramer et al. demonstrated tree extraction against decision-tree classifiers
      in the MLaaS platforms they studied, achieving complete structural recovery
      within query budgets of a few thousand API calls. The extracted trees
      matched the victim''s predictions exactly on held-out test sets -- not just
      approximate fidelity but exact replication.

      The detection implication differs from linear model extraction. Path-finding
      extraction produces a distinctive query pattern: systematic variation of a
      single feature while holding all others constant, repeated for each feature
      in sequence. This one-feature-at-a-time pattern is statistically distinct
      from legitimate usage, where queries vary across all features simultaneously
      in ways that reflect real-world inputs. The query distribution analyser in
      Section 9.10 includes a feature-isolation pattern detector for this reason.

  - part: 5
    title: 'Active Learning: Making Extraction Budget-Efficient'
    body: |
      The equation-solving and path-finding approaches are exact extraction
      methods for specific model families. For neural networks, where the decision
      boundary is non-linear and high-dimensional, exact extraction is generally
      not achievable with a finite query budget. Instead, the adversary uses
      active learning: a strategy for choosing queries that maximally reduce
      uncertainty about the model''s behaviour at each step.

      The core active learning principle for extraction is uncertainty sampling:
      choose the next query to be the input for which the current surrogate model
      is most uncertain about the victim''s response. Uncertainty is highest near
      the decision boundary, because that is where the surrogate''s current
      estimate of the boundary is least accurate. Active learning therefore
      drives queries toward the boundary -- which is exactly where boundary
      information density is highest.

      The active learning extraction loop has three components. A query selector
      maintains a pool of candidate inputs and scores each by the surrogate''s
      uncertainty at that point. An oracle submits the selected input to the
      victim API and receives the label. A surrogate updater retrains or fine-
      tunes the surrogate on the accumulated labelled inputs. The loop iterates
      until the query budget is exhausted or the surrogate reaches the target
      fidelity.

      Budget efficiency gains from active learning over random sampling are
      substantial. Published results from Papernot et al. 2017 ("Practical
      Black-Box Attacks Against Machine Learning") demonstrated 5 to 10x
      reductions in required query count for neural network extraction compared
      to random sampling baselines. This means an active-learning extractor
      achieves the same surrogate fidelity as a random-sampling extractor at
      10 to 20 percent of the query cost.

      The detection implication is the critical one for Section 9.10. Active
      learning concentrates queries near the decision boundary because that is
      where uncertainty is highest. A legitimate user''s query distribution
      reflects their actual use case -- queries cluster in the high-density
      regions of the input space that the product serves. An active-learning
      extractor''s query distribution clusters at the boundary -- which is,
      by definition, the low-density region between classes. This distributional
      difference is detectable. The boundary query detector in Section 9.10
      is built precisely to identify this clustering.

  - part: 6
    title: 'Practical Extraction Against MLaaS Platforms'
    body: |
      Tramer et al. 2016 did not just prove theoretical bounds -- they ran
      practical extractions against production ML APIs. The attacks targeted
      Amazon ML, Microsoft Azure ML, BigML, and Google Prediction API as they
      existed at the time of the research. The results demonstrated that the
      theoretical extraction budgets translated directly to practical API
      interactions.

      Against Amazon ML''s logistic regression endpoint, the team extracted the
      model using equation-solving with a query count matching the theoretical
      O(d) bound. The extracted model''s predictions matched the victim''s on
      a held-out test set to within noise. The extraction required fewer API
      calls than a typical integration test would issue during development --
      the attack was invisible to any throughput-based rate limit.

      Against BigML''s decision tree endpoint, path-finding extraction recovered
      the full tree structure in thousands of queries. The extracted tree achieved
      exact fidelity on the target input distribution: it was not a surrogate
      that approximated the victim but a structural clone that replicated the
      victim''s logic completely.

      Against neural network endpoints, the team used surrogate training on
      API outputs -- the distillation approach that Section 9.4 covers in depth.
      The surrogate achieved substantial fidelity with query counts far below
      the victim''s original training data volume.

      The significance of these results for production defenders is not historical
      curiosity. The attack surface these extractions exploited -- a prediction
      API that returns class labels -- remains the dominant deployment pattern
      for ML models in 2026. The controls that were absent in 2016 (query pattern
      monitoring, extraction-aware rate limiting, output perturbation) are the
      controls that Sections 9.10 through 9.12 build. The Tramer et al. incidents
      are the threat model that motivates every production control in this chapter.

  - part: 7
    title: 'The Detection Insight: Why Extraction Queries Differ from Benign Queries'
    body: |
      The mechanistic understanding of boundary-mapping extraction yields a
      detection insight that is foundational for Section 9.10: extraction queries
      and benign queries occupy structurally different regions of the input space,
      and this difference is measurable.

      Benign queries reflect the user''s actual use case. A legitimate user
      of a credit-scoring API submits applicant profiles that fall within the
      distribution of real applicants they encounter. A legitimate user of a
      content moderation API submits text that reflects real content from their
      platform. Benign queries cluster in the high-density regions of the input
      distribution -- the regions the model was trained to serve.

      Extraction queries, regardless of the specific technique, drift toward the
      decision boundary. Equation-solving explicitly constructs boundary inputs.
      Path-finding systematically walks toward feature thresholds. Active learning
      maximises uncertainty by targeting the boundary directly. Even random-
      sampling distillation (Section 9.4) produces a query distribution that is
      more uniform across the input space than legitimate usage -- legitimate
      users are concentrated in their use case, not spread uniformly.

      The distributional difference has three measurable properties. First,
      boundary proximity: extraction queries are closer to the decision boundary
      in expectation than benign queries. Second, input diversity: extraction
      queries for functionality extraction span more of the input space than any
      single legitimate user''s queries. Third, feature coverage: path-finding
      extraction produces queries with systematic feature variation that no
      legitimate user would generate.

      Importantly, none of these properties is individually definitive. A single
      extraction query is not distinguishable from a benign query. The signal
      emerges from the aggregate distribution across many queries. This is why
      the Section 9.11 query monitor maintains per-user state: the detection
      target is the query distribution over time, not the individual query''s
      content. The boundary query detector, OOD detector, and query diversity
      monitor built in Section 9.10 each target one of these three distributional
      properties.

