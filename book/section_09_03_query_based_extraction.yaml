deliverables:

  - id: 1
    name: 'boundary_mapper.py'
    description: |
      Black-box decision boundary mapper using binary search between opposite-label
      input pairs. Implements the core boundary refinement loop against any
      sklearn-compatible classifier exposing a predict() interface. Tracks query
      count and boundary point collection. Intended as the adversary-side
      implementation that the Section 9.10 boundary query detector is designed
      to catch.
    implementation_notes: |
      Single quotes throughout per book convention. Requires numpy and sklearn.
      The victim_model parameter accepts any object with a predict(X) method --
      no hardcoded model type. Binary search precision is configurable.
      Query budget tracking is built into the oracle wrapper.
    code: |
      # boundary_mapper.py
      # Chapter 9 Section 9.3 -- Black-Box Decision Boundary Mapper
      # Single quotes throughout per book convention.

      import numpy as np
      from dataclasses import dataclass, field
      from typing import Callable, List, Optional, Tuple


      @dataclass
      class OracleStats:
          total_queries: int = 0
          boundary_points_found: int = 0
          query_log: List[np.ndarray] = field(default_factory=list)


      class BudgetedOracle:
          '''
          Wraps a victim model with query counting and budget enforcement.
          Accepts any object with a predict(X) method.
          '''

          def __init__(self, victim_model, budget: int) -> None:
              self._model = victim_model
              self._budget = budget
              self.stats = OracleStats()

          def query(self, x: np.ndarray) -> int:
              if self.stats.total_queries >= self._budget:
                  raise RuntimeError(f'Query budget exhausted: {self._budget} queries used')
              x_2d = x.reshape(1, -1)
              label = int(self._model.predict(x_2d)[0])
              self.stats.total_queries += 1
              self.stats.query_log.append(x.copy())
              return label

          @property
          def budget_remaining(self) -> int:
              return self._budget - self.stats.total_queries


      def find_boundary_point(
          oracle: BudgetedOracle,
          x_neg: np.ndarray,
          x_pos: np.ndarray,
          label_neg: int,
          label_pos: int,
          precision: float = 1e-4,
          max_steps: int = 50,
      ) -> Optional[np.ndarray]:
          '''
          Binary search between x_neg (label_neg) and x_pos (label_pos) to locate
          a point near the decision boundary. Returns the boundary-adjacent point
          or None if budget is exhausted before convergence.
          precision: stop when ||x_pos - x_neg|| < precision.
          '''
          a, b = x_neg.copy(), x_pos.copy()
          for _ in range(max_steps):
              if np.linalg.norm(b - a) < precision:
                  break
              mid = (a + b) / 2.0
              try:
                  mid_label = oracle.query(mid)
              except RuntimeError:
                  return None
              if mid_label == label_neg:
                  a = mid
              else:
                  b = mid
          return (a + b) / 2.0


      def collect_seed_pairs(
          oracle: BudgetedOracle,
          input_dim: int,
          n_pairs: int,
          input_low: float = 0.0,
          input_high: float = 1.0,
          rng: Optional[np.random.Generator] = None,
      ) -> List[Tuple[np.ndarray, int, np.ndarray, int]]:
          '''
          Sample random inputs until n_pairs opposite-label pairs are found.
          Returns list of (x_neg, label_neg, x_pos, label_pos) tuples.
          '''
          if rng is None:
              rng = np.random.default_rng(seed=42)
          pairs: List[Tuple[np.ndarray, int, np.ndarray, int]] = []
          pool: List[Tuple[np.ndarray, int]] = []

          while len(pairs) < n_pairs and oracle.budget_remaining > 0:
              x = rng.uniform(input_low, input_high, size=input_dim)
              try:
                  label = oracle.query(x)
              except RuntimeError:
                  break
              pool.append((x, label))
              # Check against existing pool for opposite-label pairs
              for prev_x, prev_label in pool[:-1]:
                  if prev_label != label and len(pairs) < n_pairs:
                      if label == 0:
                          pairs.append((x, label, prev_x, prev_label))
                      else:
                          pairs.append((prev_x, prev_label, x, label))
          return pairs


      def map_boundary(
          oracle: BudgetedOracle,
          input_dim: int,
          n_boundary_points: int,
          precision: float = 1e-4,
          input_low: float = 0.0,
          input_high: float = 1.0,
          rng: Optional[np.random.Generator] = None,
      ) -> List[np.ndarray]:
          '''
          Collect n_boundary_points points near the decision boundary.
          Returns list of boundary-adjacent input vectors.
          '''
          pairs = collect_seed_pairs(oracle, input_dim, n_boundary_points, input_low, input_high, rng)
          boundary_points: List[np.ndarray] = []
          for x_neg, label_neg, x_pos, label_pos in pairs:
              bp = find_boundary_point(oracle, x_neg, x_pos, label_neg, label_pos, precision)
              if bp is not None:
                  boundary_points.append(bp)
                  oracle.stats.boundary_points_found += 1
          return boundary_points


      if __name__ == '__main__':
          # Demonstration against a simple sklearn linear classifier
          from sklearn.linear_model import LogisticRegression
          from sklearn.datasets import make_classification

          X, y = make_classification(n_samples=500, n_features=10, random_state=42)
          victim = LogisticRegression(random_state=42).fit(X, y)

          oracle = BudgetedOracle(victim_model=victim, budget=2000)
          boundary_pts = map_boundary(oracle, input_dim=10, n_boundary_points=15)

          print(f'Boundary points found: {len(boundary_pts)}')
          print(f'Total queries used:    {oracle.stats.total_queries}')
          print(f'Budget remaining:      {oracle.budget_remaining}')

  - id: 2
    name: 'linear_extractor.py'
    description: |
      Equation-solving extraction for linear (logistic regression / linear SVM)
      classifiers. Implements the Tramer et al. 2016 approach: collect d+1
      linearly independent near-boundary points, then solve the linear system
      to recover the weight vector and bias. Validates extraction by comparing
      extracted model predictions to victim predictions on a held-out set.
    implementation_notes: |
      Single quotes throughout per book convention. Requires numpy and sklearn.
      Extraction is model-agnostic on the victim side -- only predict() is called.
      Linear system solve uses numpy.linalg.lstsq (tolerates near-singular systems).
      No hardcoded feature dimension; dim is inferred from the first boundary point.
    code: |
      # linear_extractor.py
      # Chapter 9 Section 9.3 -- Equation-Solving Linear Model Extractor (Tramer et al. 2016)
      # Single quotes throughout per book convention.

      import numpy as np
      from dataclasses import dataclass
      from typing import List, Optional, Tuple

      from boundary_mapper import BudgetedOracle, map_boundary


      @dataclass
      class ExtractionResult:
          recovered_weights: np.ndarray
          recovered_bias: float
          queries_used: int
          agreement_rate: float  # fraction of test inputs where extracted and victim agree
          note: str


      def extract_linear_model(
          oracle: BudgetedOracle,
          input_dim: int,
          n_boundary_points: Optional[int] = None,
          precision: float = 1e-5,
          input_low: float = 0.0,
          input_high: float = 1.0,
      ) -> ExtractionResult:
          '''
          Extract a linear binary classifier using equation-solving.
          Collects d+1 near-boundary points and solves the linear system
          w . x_i + b = 0 for all boundary points x_i.

          Returns recovered weight vector and bias, plus extraction statistics.
          '''
          if n_boundary_points is None:
              n_boundary_points = input_dim + 2  # slight over-determination for stability

          boundary_pts = map_boundary(
              oracle, input_dim, n_boundary_points, precision, input_low, input_high
          )

          if len(boundary_pts) < input_dim + 1:
              return ExtractionResult(
                  recovered_weights=np.zeros(input_dim),
                  recovered_bias=0.0,
                  queries_used=oracle.stats.total_queries,
                  agreement_rate=0.0,
                  note=f'Insufficient boundary points: {len(boundary_pts)} of {input_dim + 1} needed',
              )

          # Build the linear system: [x_i | 1] * [w; b] = 0 for each boundary point
          # Homogeneous system -- solve for null vector of A = [boundary_pts | ones_col]
          A = np.column_stack([boundary_pts, np.ones(len(boundary_pts))])
          # Use SVD to find the null space vector (last right singular vector)
          _, _, Vt = np.linalg.svd(A)
          solution = Vt[-1]  # smallest singular value direction
          recovered_weights = solution[:input_dim]
          recovered_bias = solution[input_dim]

          # Normalise so ||w|| = 1
          norm = np.linalg.norm(recovered_weights)
          if norm > 1e-10:
              recovered_weights = recovered_weights / norm
              recovered_bias = recovered_bias / norm

          return ExtractionResult(
              recovered_weights=recovered_weights,
              recovered_bias=float(recovered_bias),
              queries_used=oracle.stats.total_queries,
              agreement_rate=0.0,  # populated by caller after validation
              note=f'Solved from {len(boundary_pts)} boundary points using SVD null space',
          )


      def validate_extraction(
          result: ExtractionResult,
          oracle: BudgetedOracle,
          test_inputs: np.ndarray,
      ) -> float:
          '''
          Validate the extracted model by comparing its predictions to the victim
          on a held-out test set. Returns agreement rate (0.0 to 1.0).
          Uses the recovered weight vector and bias as a linear threshold classifier.
          '''
          w = result.recovered_weights
          b = result.recovered_bias
          scores = test_inputs.dot(w) + b
          extracted_labels = (scores > 0).astype(int)
          victim_labels = np.array([oracle.query(x) for x in test_inputs])
          agreement = float(np.mean(extracted_labels == victim_labels))
          return agreement


      if __name__ == '__main__':
          from sklearn.linear_model import LogisticRegression
          from sklearn.datasets import make_classification

          input_dim = 20
          X, y = make_classification(n_samples=1000, n_features=input_dim, random_state=42)
          victim = LogisticRegression(random_state=42).fit(X, y)

          # Extraction oracle with generous budget
          oracle = BudgetedOracle(victim_model=victim, budget=5000)
          result = extract_linear_model(oracle, input_dim=input_dim)

          # Validate on held-out inputs
          rng = np.random.default_rng(seed=99)
          test_X = rng.uniform(0.0, 1.0, size=(200, input_dim))
          agreement = validate_extraction(result, oracle, test_X)
          result.agreement_rate = agreement

          print(f'Queries used:    {result.queries_used}')
          print(f'Theoretical O(d): ~{input_dim * 15} (d={input_dim}, log factor ~15)')
          print(f'Agreement rate:  {result.agreement_rate:.1%}')
          print(f'Note: {result.note}')

  - id: 3
    name: 'tree_extractor.py'
    description: |
      Path-finding extraction for decision tree classifiers. Maps tree structure
      by systematically varying one feature at a time to locate split thresholds
      at each depth level. Reconstructs the full tree as a nested dictionary.
      Validates extraction by comparing reconstructed tree predictions to victim
      predictions on a held-out set.
    implementation_notes: |
      Single quotes throughout per book convention. Requires numpy and sklearn.
      Tree reconstruction is stored as a schema-free nested dict -- no hardcoded
      tree structure. Feature range is configurable. Extraction depth is bounded
      by max_depth parameter to limit query budget.
    code: |
      # tree_extractor.py
      # Chapter 9 Section 9.3 -- Path-Finding Decision Tree Extractor
      # Single quotes throughout per book convention.

      import numpy as np
      from dataclasses import dataclass, field
      from typing import Any, Dict, List, Optional, Tuple

      from boundary_mapper import BudgetedOracle


      @dataclass
      class TreeNode:
          feature_index: Optional[int] = None
          threshold: Optional[float] = None
          left: Optional['TreeNode'] = None   # input[feature] <= threshold
          right: Optional['TreeNode'] = None  # input[feature] > threshold
          leaf_label: Optional[int] = None


      def find_split_threshold(
          oracle: BudgetedOracle,
          reference: np.ndarray,
          feature_idx: int,
          feature_low: float,
          feature_high: float,
          precision: float = 1e-4,
          max_steps: int = 40,
      ) -> Optional[Tuple[float, int, int]]:
          '''
          Find the split threshold for feature_idx by binary search.
          Returns (threshold, label_left, label_right) or None if no split exists
          or budget is exhausted.
          '''
          ref_label = oracle.stats.total_queries  # will be overwritten
          try:
              probe_low = reference.copy()
              probe_low[feature_idx] = feature_low
              label_low = oracle.query(probe_low)

              probe_high = reference.copy()
              probe_high[feature_idx] = feature_high
              label_high = oracle.query(probe_high)
          except RuntimeError:
              return None

          if label_low == label_high:
              return None  # no split on this feature in this range

          # Binary search for the threshold
          lo, hi = feature_low, feature_high
          label_lo = label_low
          for _ in range(max_steps):
              if hi - lo < precision:
                  break
              mid_val = (lo + hi) / 2.0
              probe_mid = reference.copy()
              probe_mid[feature_idx] = mid_val
              try:
                  label_mid = oracle.query(probe_mid)
              except RuntimeError:
                  break
              if label_mid == label_lo:
                  lo = mid_val
              else:
                  hi = mid_val

          threshold = (lo + hi) / 2.0
          return threshold, label_low, label_high


      def extract_tree_node(
          oracle: BudgetedOracle,
          reference: np.ndarray,
          input_dim: int,
          feature_ranges: List[Tuple[float, float]],
          depth: int,
          max_depth: int,
      ) -> TreeNode:
          '''
          Recursively extract a tree node by probing each feature for a split threshold.
          Returns a TreeNode (either internal with children or leaf with label).
          '''
          if depth >= max_depth or oracle.budget_remaining < 10:
              try:
                  label = oracle.query(reference)
              except RuntimeError:
                  label = 0
              return TreeNode(leaf_label=label)

          # Probe each feature for a split
          for feat_idx in range(input_dim):
              lo, hi = feature_ranges[feat_idx]
              result = find_split_threshold(oracle, reference, feat_idx, lo, hi)
              if result is not None:
                  threshold, label_left, label_right = result
                  node = TreeNode(feature_index=feat_idx, threshold=threshold)

                  # Build reference points for left and right subtrees
                  ref_left = reference.copy()
                  ref_left[feat_idx] = (lo + threshold) / 2.0
                  ref_right = reference.copy()
                  ref_right[feat_idx] = (threshold + hi) / 2.0

                  new_ranges_left = list(feature_ranges)
                  new_ranges_left[feat_idx] = (lo, threshold)
                  new_ranges_right = list(feature_ranges)
                  new_ranges_right[feat_idx] = (threshold, hi)

                  node.left = extract_tree_node(
                      oracle, ref_left, input_dim, new_ranges_left, depth + 1, max_depth
                  )
                  node.right = extract_tree_node(
                      oracle, ref_right, input_dim, new_ranges_right, depth + 1, max_depth
                  )
                  return node

          # No split found on any feature -- this is a leaf
          try:
              label = oracle.query(reference)
          except RuntimeError:
              label = 0
          return TreeNode(leaf_label=label)


      def predict_with_tree(node: TreeNode, x: np.ndarray) -> int:
          '''Predict the label for input x using an extracted TreeNode.'''
          if node.leaf_label is not None:
              return node.leaf_label
          if x[node.feature_index] <= node.threshold:
              return predict_with_tree(node.left, x)
          return predict_with_tree(node.right, x)


      if __name__ == '__main__':
          from sklearn.tree import DecisionTreeClassifier
          from sklearn.datasets import make_classification

          input_dim = 5
          X, y = make_classification(n_samples=500, n_features=input_dim, random_state=42)
          victim = DecisionTreeClassifier(max_depth=4, random_state=42).fit(X, y)

          oracle = BudgetedOracle(victim_model=victim, budget=3000)
          feature_ranges = [(float(X[:, i].min()), float(X[:, i].max())) for i in range(input_dim)]
          reference = X[0].copy()

          root = extract_tree_node(oracle, reference, input_dim, feature_ranges, depth=0, max_depth=4)

          # Validate on test inputs
          rng = np.random.default_rng(seed=77)
          test_X = rng.uniform(-3.0, 3.0, size=(200, input_dim))
          extracted = np.array([predict_with_tree(root, x) for x in test_X])
          victim_preds = victim.predict(test_X)
          agreement = float(np.mean(extracted == victim_preds))

          print(f'Queries used:   {oracle.stats.total_queries}')
          print(f'Agreement rate: {agreement:.1%}')

  - id: 4
    name: 'active_learning_extractor.py'
    description: |
      Active learning extraction loop for neural network classifiers. Implements
      the uncertainty sampling strategy: at each step, select the pool input for
      which the current surrogate model is most uncertain (confidence closest to
      0.5), query the victim, update the surrogate, and repeat. Tracks query count
      and surrogate fidelity at each step for budget-efficiency analysis.
    implementation_notes: |
      Single quotes throughout per book convention. Requires numpy and sklearn.
      Surrogate model is a LogisticRegression by default but accepts any sklearn
      estimator with fit() and predict_proba() methods -- no hardcoded surrogate
      type. Pool size and step count are configurable.
    code: |
      # active_learning_extractor.py
      # Chapter 9 Section 9.3 -- Active Learning Extraction Loop
      # Single quotes throughout per book convention.

      import numpy as np
      from dataclasses import dataclass, field
      from typing import Any, List, Optional, Tuple

      from boundary_mapper import BudgetedOracle


      @dataclass
      class ActiveLearningStep:
          step: int
          queries_used: int
          surrogate_accuracy: float
          selected_uncertainty: float


      @dataclass
      class ActiveLearningResult:
          steps: List[ActiveLearningStep] = field(default_factory=list)
          final_surrogate: Any = None
          total_queries: int = 0


      def uncertainty_score(surrogate, X_pool: np.ndarray) -> np.ndarray:
          '''
          Compute uncertainty scores for pool inputs using the surrogate.
          Uncertainty = 1 - max(predict_proba) per input.
          Inputs closest to 0.5 confidence have highest uncertainty.
          Returns array of uncertainty scores, shape (len(X_pool),).
          '''
          proba = surrogate.predict_proba(X_pool)
          return 1.0 - proba.max(axis=1)


      def run_active_learning_extraction(
          oracle: BudgetedOracle,
          surrogate_class,
          surrogate_kwargs: dict,
          X_pool: np.ndarray,
          X_val: np.ndarray,
          y_val_victim: np.ndarray,
          n_initial: int = 20,
          n_steps: int = 50,
          batch_size: int = 10,
          rng: Optional[np.random.Generator] = None,
      ) -> ActiveLearningResult:
          '''
          Run active learning extraction against the oracle.

          surrogate_class: sklearn estimator class (e.g. LogisticRegression)
          surrogate_kwargs: kwargs passed to surrogate_class constructor
          X_pool: unlabelled pool of candidate inputs for active selection
          X_val: held-out validation inputs for fidelity measurement
          y_val_victim: victim labels on X_val (pre-queried; not counted in budget)
          n_initial: number of random seed queries before active learning begins
          n_steps: number of active learning iterations
          batch_size: number of inputs selected per iteration
          '''
          if rng is None:
              rng = np.random.default_rng(seed=42)

          result = ActiveLearningResult()
          labelled_X: List[np.ndarray] = []
          labelled_y: List[int] = []

          # Seed phase: random initial queries
          seed_indices = rng.choice(len(X_pool), size=min(n_initial, len(X_pool)), replace=False)
          for idx in seed_indices:
              try:
                  label = oracle.query(X_pool[idx])
                  labelled_X.append(X_pool[idx])
                  labelled_y.append(label)
              except RuntimeError:
                  break

          if len(labelled_X) < 2:
              return result

          surrogate = surrogate_class(**surrogate_kwargs)
          surrogate.fit(np.array(labelled_X), np.array(labelled_y))

          # Active learning phase
          pool_mask = np.ones(len(X_pool), dtype=bool)
          pool_mask[seed_indices] = False

          for step in range(n_steps):
              if oracle.budget_remaining < batch_size:
                  break
              pool_indices = np.where(pool_mask)[0]
              if len(pool_indices) == 0:
                  break

              # Score pool by uncertainty
              scores = uncertainty_score(surrogate, X_pool[pool_indices])
              top_k = pool_indices[np.argsort(scores)[-batch_size:]]
              max_uncertainty = float(scores.max())

              # Query victim for selected inputs
              for idx in top_k:
                  try:
                      label = oracle.query(X_pool[idx])
                      labelled_X.append(X_pool[idx])
                      labelled_y.append(label)
                      pool_mask[idx] = False
                  except RuntimeError:
                      break

              # Update surrogate
              surrogate = surrogate_class(**surrogate_kwargs)
              surrogate.fit(np.array(labelled_X), np.array(labelled_y))

              # Measure fidelity on validation set
              val_preds = surrogate.predict(X_val)
              accuracy = float(np.mean(val_preds == y_val_victim))

              result.steps.append(ActiveLearningStep(
                  step=step + 1,
                  queries_used=oracle.stats.total_queries,
                  surrogate_accuracy=accuracy,
                  selected_uncertainty=max_uncertainty,
              ))

          result.final_surrogate = surrogate
          result.total_queries = oracle.stats.total_queries
          return result


      if __name__ == '__main__':
          from sklearn.linear_model import LogisticRegression
          from sklearn.neural_network import MLPClassifier
          from sklearn.datasets import make_classification

          input_dim = 10
          X, y = make_classification(n_samples=2000, n_features=input_dim, random_state=42)
          victim = MLPClassifier(hidden_layer_sizes=(32, 16), random_state=42, max_iter=500).fit(X, y)

          # Pool for active learning; validation set for fidelity measurement
          rng = np.random.default_rng(seed=0)
          X_pool = rng.uniform(-3.0, 3.0, size=(1000, input_dim))
          X_val = rng.uniform(-3.0, 3.0, size=(300, input_dim))
          y_val_victim = victim.predict(X_val)

          oracle = BudgetedOracle(victim_model=victim, budget=800)
          result = run_active_learning_extraction(
              oracle=oracle,
              surrogate_class=LogisticRegression,
              surrogate_kwargs={'max_iter': 500},
              X_pool=X_pool,
              X_val=X_val,
              y_val_victim=y_val_victim,
              n_initial=20,
              n_steps=30,
              batch_size=20,
          )

          print(f'Total queries used: {result.total_queries}')
          print(f'Steps completed:    {len(result.steps)}')
          if result.steps:
              final = result.steps[-1]
              print(f'Final surrogate accuracy: {final.surrogate_accuracy:.1%}')
              print(f'Fidelity curve (every 5 steps):')
              for s in result.steps[::5]:
                  print(f'  Step {s.step:3d} | Queries: {s.queries_used:4d} | Accuracy: {s.surrogate_accuracy:.1%}')

  - id: 5
    name: 'query_distribution_analyser.py'
    description: |
      Analyses and compares query distributions between extraction campaigns and
      legitimate user traffic. Computes the three distributional properties
      from Table 3 (boundary proximity, input space coverage, feature variation
      pattern) and outputs a detection signal report. Intended as the analytical
      foundation for the boundary query detector and query diversity monitor
      built in Section 9.10.
    implementation_notes: |
      Single quotes throughout per book convention. Requires numpy and sklearn.
      Distribution metrics are computed generically from query log arrays --
      no hardcoded assumptions about input dimensionality or feature semantics.
      All thresholds are parameterised, not hardcoded.
    code: |
      # query_distribution_analyser.py
      # Chapter 9 Section 9.3 -- Extraction vs Benign Query Distribution Analyser
      # Single quotes throughout per book convention.

      import numpy as np
      from dataclasses import dataclass
      from typing import List, Optional, Tuple


      @dataclass
      class DistributionReport:
          label: str
          n_queries: int
          mean_pairwise_distance: float
          input_space_coverage: float     # fraction of unit hypercube cells occupied
          feature_variation_entropy: float # entropy of per-feature variation
          boundary_proximity_score: float  # proxy: fraction of queries near distribution boundary
          note: str


      def pairwise_distance_mean(X: np.ndarray) -> float:
          '''Compute mean pairwise L2 distance across a query set.'''
          if len(X) < 2:
              return 0.0
          n = min(len(X), 500)  # cap for computational efficiency
          sub = X[:n]
          diffs = sub[:, np.newaxis, :] - sub[np.newaxis, :, :]
          dists = np.sqrt((diffs ** 2).sum(axis=-1))
          upper = dists[np.triu_indices(n, k=1)]
          return float(upper.mean()) if len(upper) > 0 else 0.0


      def input_space_coverage(X: np.ndarray, n_bins: int = 5) -> float:
          '''
          Estimate input space coverage by discretising each feature into n_bins
          and counting the fraction of occupied cells relative to n_bins^d.
          Caps at d=8 features to keep cell count tractable.
          '''
          d = min(X.shape[1], 8)
          X_sub = X[:, :d]
          # Normalise to [0, 1] per feature
          col_min = X_sub.min(axis=0)
          col_max = X_sub.max(axis=0)
          span = col_max - col_min
          span[span == 0] = 1.0
          X_norm = (X_sub - col_min) / span
          # Bin each input
          bins = np.clip((X_norm * n_bins).astype(int), 0, n_bins - 1)
          occupied = set(map(tuple, bins))
          total_cells = n_bins ** d
          return len(occupied) / total_cells


      def feature_variation_entropy(X: np.ndarray) -> float:
          '''
          Compute the entropy of per-feature standard deviations.
          High entropy = variation spread evenly across features (benign pattern).
          Low entropy = variation concentrated in few features (tree extraction pattern).
          '''
          stds = X.std(axis=0)
          stds_sum = stds.sum()
          if stds_sum == 0:
              return 0.0
          probs = stds / stds_sum
          probs = probs[probs > 0]
          return float(-np.sum(probs * np.log2(probs)))


      def boundary_proximity_score(X: np.ndarray, classifier=None) -> float:
          '''
          If a classifier is provided, estimate the fraction of queries with
          predicted probability close to 0.5 (near-boundary proxy).
          If no classifier is provided, returns 0.0 (caller must supply one for this metric).
          '''
          if classifier is None or not hasattr(classifier, 'predict_proba'):
              return 0.0
          proba = classifier.predict_proba(X)
          max_proba = proba.max(axis=1)
          near_boundary = (max_proba < 0.65).sum()
          return float(near_boundary) / len(X)


      def analyse_query_distribution(
          X: np.ndarray,
          label: str,
          classifier=None,
      ) -> DistributionReport:
          '''Produce a DistributionReport for a query set.'''
          return DistributionReport(
              label=label,
              n_queries=len(X),
              mean_pairwise_distance=pairwise_distance_mean(X),
              input_space_coverage=input_space_coverage(X),
              feature_variation_entropy=feature_variation_entropy(X),
              boundary_proximity_score=boundary_proximity_score(X, classifier),
              note='Coverage capped at d=8 features; boundary proximity requires grey-box classifier',
          )


      def compare_distributions(
          reports: List[DistributionReport],
      ) -> None:
          '''Print a comparison table of distribution reports.'''
          print('QUERY DISTRIBUTION ANALYSIS -- Chapter 9 Section 9.3')
          print('=' * 70)
          header = f'{"Label":<25} {"Queries":>7} {"PairDist":>9} {"Coverage":>9} {"FeatEntropy":>12} {"BndryProx":>10}'
          print(header)
          print('-' * 70)
          for r in reports:
              print(
                  f'{r.label:<25} {r.n_queries:>7} '
                  f'{r.mean_pairwise_distance:>9.4f} '
                  f'{r.input_space_coverage:>9.4f} '
                  f'{r.feature_variation_entropy:>12.4f} '
                  f'{r.boundary_proximity_score:>10.4f}'
              )


      if __name__ == '__main__':
          from sklearn.linear_model import LogisticRegression
          from sklearn.datasets import make_classification
          from boundary_mapper import BudgetedOracle, map_boundary

          input_dim = 10
          X, y = make_classification(n_samples=1000, n_features=input_dim, random_state=42)
          victim = LogisticRegression(random_state=42).fit(X, y)

          # Legitimate user queries: concentrated around a real use-case cluster
          rng = np.random.default_rng(seed=1)
          benign_queries = rng.normal(loc=0.5, scale=0.15, size=(200, input_dim))

          # Extraction queries: boundary mapping
          oracle = BudgetedOracle(victim_model=victim, budget=500)
          extraction_points = map_boundary(oracle, input_dim=input_dim, n_boundary_points=30)
          extraction_queries = np.array(extraction_points) if extraction_points else rng.uniform(0, 1, size=(30, input_dim))

          # Random baseline
          random_queries = rng.uniform(0.0, 1.0, size=(200, input_dim))

          reports = [
              analyse_query_distribution(benign_queries, label='benign_user', classifier=victim),
              analyse_query_distribution(extraction_queries, label='boundary_extraction', classifier=victim),
              analyse_query_distribution(random_queries, label='random_baseline', classifier=victim),
          ]
          compare_distributions(reports)

common_mistakes:

  - id: 1
    description: 'Assuming linear model extraction requires a large query budget and is therefore protected by throughput rate limits'
    why_it_happens: |
      Defenders calibrate rate limits against intuitions about large-scale ML
      training data volumes -- millions of examples. The O(d) result for linear
      models is not intuitively obvious: a 100-feature linear classifier extracting
      in a few hundred queries seems implausible until you work through the
      equation-solving mechanics.
    consequence: |
      Rate limits set at thousands of queries per hour provide no meaningful
      protection against equation-solving extraction of linear classifiers.
      An adversary completing extraction in 300 queries is well below any
      throughput-based ceiling. The model is extracted before any alert fires.
    correct_approach: |
      For linear classifiers, treat the model''s weights as effectively public
      once they are accessible via a prediction API. Primary defences are output
      perturbation (adding noise to confidence scores) and architectural: return
      hard labels rather than confidence scores when the product permits. Rate
      limits contribute but cannot prevent O(d) extraction.

  - id: 2
    description: 'Building the boundary query detector around confidence score thresholds only, ignoring structural query patterns'
    why_it_happens: |
      The near-boundary confidence score (close to 0.5) is the most visible
      signal from grey-box APIs. It is easy to implement a threshold detector
      and assume it covers boundary extraction. Hard-label APIs do not leak
      confidence scores, so this detector has zero coverage there.
    consequence: |
      Hard-label boundary extraction -- which accounts for a substantial fraction
      of real-world attacks against APIs that return only class labels -- is
      completely undetected. The detector fires on grey-box APIs but misses
      the black-box case where the adversary works with hard labels only.
    correct_approach: |
      The boundary query detector must cover both the confidence signal (grey-box)
      and the structural signal: opposite-label inputs with small input distance,
      systematic input perturbation patterns, and feature-isolation sequences
      (tree extraction). Section 9.10 builds a multi-signal boundary detector
      that covers both access levels.

  - id: 3
    description: 'Treating the Tramer et al. 2016 results as historical and not applicable to current deployments'
    why_it_happens: |
      The Tramer et al. paper targeted MLaaS platforms from 2014 to 2016.
      Readers assume current platforms have mitigated the specific attack vectors
      documented there, and that the results are a historical artifact rather
      than a live threat model.
    consequence: |
      The underlying mechanism -- that every prediction API query reveals boundary
      information, and that linear models extract in O(d) queries -- is
      architecture-independent and time-independent. Any deployment of a linear
      classifier behind a prediction API remains vulnerable to equation-solving
      extraction in 2026, regardless of platform. The attack surface has not changed;
      only the specific API endpoints have evolved.
    correct_approach: |
      Apply the Tramer et al. threat model to the current deployment regardless
      of platform. Audit the API output format (hard vs soft labels), the model
      architecture (linear, tree, or neural network), and the rate limit policy
      against the extraction budget estimates in Table 1. The threat model is
      architectural, not platform-specific.

  - id: 4
    description: 'Conflating active learning budget efficiency with detection evasion -- assuming active learning is stealthy'
    why_it_happens: |
      Active learning reduces query count by 5 to 10x. Readers interpret this
      as making the extraction campaign harder to detect -- fewer queries means
      less exposure to monitoring. The budget efficiency is conflated with
      detection evasion.
    consequence: |
      The defence is weakened by removing rate limits or reducing monitoring
      sensitivity on the assumption that active learning extractions are too
      small to detect. In fact, active learning concentrates queries near the
      decision boundary more intensely than random sampling -- it has a stronger
      detection signal, not a weaker one, despite the lower query count.
    correct_approach: |
      Active learning reduces query count but increases the structural distinctiveness
      of the query distribution. The boundary clustering is more pronounced, not
      less, because every query is selected for maximum boundary informativeness.
      Detection sensitivity should be increased for near-boundary query concentration,
      not relaxed because of low volume.

  - id: 5
    description: 'Implementing the boundary query detector only on individual queries rather than on the accumulated query log'
    why_it_happens: |
      Per-request analysis is the natural architecture for a gateway classifier.
      Applying a boundary proximity check to each incoming query individually seems
      like the right extension: flag any query that is near the boundary.
    consequence: |
      Boundary proximity is not individually detectable for hard-label APIs -- the
      adversary does not announce which inputs are near-boundary, and the defender
      cannot determine this without running the model internally. The detection
      signal requires the accumulated pair distribution: opposite-label inputs with
      small distance become visible only when the query log is analysed across
      multiple requests. A per-request detector misses the signal entirely.
    correct_approach: |
      The boundary query detector operates on the accumulated per-user query log,
      not on individual queries. It analyses the distribution of (input, label) pairs
      across many requests to identify near-boundary clustering. This requires
      the persistent per-user state store described in Section 9.1 and implemented
      in Section 9.11. The per-request gateway still receives every query; the
      detector aggregates state from the query log asynchronously or within the
      stateful monitor.

section_summary:
  compact: |
    Black-box decision boundary mapping is the foundational extraction primitive.
    Every prediction API query reveals which side of the classification boundary its
    input falls on -- the model cannot withhold this information while remaining
    useful. Linear classifiers extract in O(d) queries via equation-solving: d+1
    near-boundary points overdetermine the linear system and the weight vector is
    recovered exactly by SVD null-space computation. Decision trees extract via
    path-finding: one-feature-at-a-time threshold search maps the branching structure
    in queries proportional to node count times feature count. Neural networks
    require surrogate training on API outputs but active learning reduces the
    required query budget by 5 to 10x by concentrating queries near the decision
    boundary where boundary information density is highest. The detection insight
    from these mechanics is structural and measurable: extraction query distributions
    differ from benign query distributions in boundary proximity, input space
    coverage, and feature variation pattern. These three properties drive the
    detection primitive design in Section 9.10 and the production query monitor
    in Section 9.11.

  key_takeaways:
    - 'Every prediction API query reveals boundary information; the model cannot withhold this while remaining useful'
    - 'Linear classifiers extract in O(d) queries via equation-solving -- trivial relative to any throughput-based rate limit'
    - 'Decision trees extract via path-finding with query count proportional to node count times feature count'
    - 'Active learning reduces extraction query budget by 5-10x by concentrating queries near the decision boundary'
    - 'Extraction query distributions differ structurally from benign queries in boundary proximity, coverage, and feature variation'
    - 'The boundary clustering detection signal is more pronounced for active learning, not less, despite lower query count'

preview_section_04:
  title: 'Section 9.4: Distillation Attacks -- Training Surrogate Models on Victim Outputs'
  preview: |
    Section 9.3 established the boundary mapping primitive for decision-boundary
    extraction. Section 9.4 builds the dominant commercial extraction attack:
    knowledge distillation. The adversary uses the victim API as a teacher,
    collects a large labelled dataset of victim outputs, and trains a student
    model to mimic the teacher. The resulting surrogate is a deployable clone
    that achieves high fidelity on the victim''s input distribution at a fraction
    of the original training cost. Section 9.4 covers soft-label vs hard-label
    distillation, the budget efficiency advantage of soft labels (which is why
    output design is a security decision), active distillation against LLM APIs,
    and the cost economics that make distillation the adversary''s preferred
    extraction method. The detection challenge introduced in Section 9.3 --
    distributed distillation campaigns that stay below any individual rate limit
    -- is the motivation for output watermarking (Section 9.12) as the defence
    that survives when input-side query monitoring does not.

