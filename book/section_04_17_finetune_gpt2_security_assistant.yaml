extensions:
  extension_1_rlhf_safety_training:
    description: 'Replace the SFT safety training (Part B of dataset) with a minimal RLHF

      implementation: reward model + PPO update loop.

      '
    approach: '1. Collect pairwise preference data: (prompt, safe_response, unsafe_response)

      2. Train a reward model that scores responses (Section 04_05 exercise)

      3. Apply 100-200 PPO steps to optimize the SFT model toward safety

      4. Compare: does RLHF safety training outperform SFT on adversarial probes?

      '
    expected_finding: 'RLHF should improve adversarial probe refusal rate by 10-20% vs SFT alone.

      Effect is most pronounced on Category D (gradual escalation) — the hardest

      for SFT alone because the harmful request only appears after several turns.

      '
    section_reference: Section 04_05 (RLHF), Exercise 3 (PPO implementation)
  extension_2_distillation_from_stronger_teacher:
    description: 'Use a larger, more capable model (GPT-2 medium or large) as teacher.

      Distill its safety behaviors into the GPT-2 small student.

      '
    approach: "1. Fine-tune GPT-2 large with the same dataset as GPT-2 small (teacher)\n2. Distill GPT-2 small from GPT-2\
      \ large using KL divergence (Section 04_13)\n3. Compare safety transfer: does distillation produce better safety than\n\
      \   direct fine-tuning of GPT-2 small?\n"
    expected_finding: 'Distillation improves capability transfer significantly.

      Safety transfer is harder: teacher''s soft distributions on borderline

      cases encode safety nuance that direct SFT misses.

      '
    section_reference: Section 04_13 (Distillation), Exercise 1
  extension_3_speculative_decoding_integration:
    description: 'Implement speculative decoding with GPT-2 small as draft and GPT-2 medium as target.

      Measure whether acceptance rate differs between safe and unsafe inputs.

      '
    approach: "1. Fine-tune both models on same security dataset\n2. Implement speculative decoding (Section 04_10)\n3. Measure\
      \ acceptance rate: benign security questions vs adversarial probes\n4. Hypothesis: adversarial probes have lower acceptance\
      \ rate because\n   the smaller draft model is less aligned than the medium target\n"
    expected_finding: 'Acceptance rate: benign ~0.70, adversarial ~0.50 (lower on adversarial)

      This confirms the Section 04_10 finding: acceptance rate is a signal

      for safety-relevant distribution gaps between draft and target.

      '
    section_reference: Section 04_10 (Speculative Decoding), Exercise 2
  extension_4_long_context_injection:
    description: 'Test whether the injection resistance degrades at longer context lengths.

      '
    approach: '1. Create injection attack that works at 256 tokens of context

      2. Add padding: test same attack at 512, 1024, 2048 tokens of context

      3. Measure: does success rate increase as context grows?

      4. Hypothesis: the system prompt''s influence decays at longer contexts

      '
    expected_finding: 'Injection success rate increases as context length grows.

      The sandwich reminder (immediately before user query) partially compensates.

      Without sandwich reminder: larger degradation at long context.

      Section references: Section 04_11 (lost-in-the-middle), Section 04_15 (sandwich pattern)

      '
chapter_summary:
  title: Chapter 4 and Part 1 Summary
  pages: 1
  what_we_built_over_17_sections: "Chapter 4 started with GPT-2's architecture (Section 01) and ends with a\ndeployed, hardened,\
    \ attacked, and measured security assistant (Section 17).\nThe journey covered three arcs:\n\nArchitecture Arc (Sections\
    \ 01-03):\n  What LLMs are made of: attention, scaling, and emergent capability.\n  Security insight: capability and safety\
    \ both emerge from the same\n  training process — you cannot have one without understanding the other.\n\nAlignment Arc\
    \ (Sections 04-06):\n  How safety is trained in: Constitutional AI, RLHF, SFT.\n  Security insight: alignment is an approximation.\
    \ Every alignment technique\n  has documented gaps. Safety is a learned behavior, not a hard constraint.\n\nInference\
    \ Stack Arc (Sections 07-10):\n  How trained models run in production: KV cache, Flash Attention,\n  speculative decoding.\n\
    \  Security insight: production inference introduces its own attack surfaces —\n  timing side channels, memory DoS, throughput\
    \ attacks — independent of\n  the model's trained safety.\n\nDeployment Arc (Sections 11-16):\n  How models are configured,\
    \ compressed, prompted, and accessed:\n  Context windows, quantization, distillation, prompt engineering,\n  system prompts,\
    \ API security.\n  Security insight: deployment decisions are security decisions.\n  Quantization, system prompt design,\
    \ and API configuration each have\n  direct safety implications that cannot be delegated to the model alone.\n"
  part_1_security_arc_complete: "Part 1 (Chapters 1-4) has built the complete technical foundation:\n\nChapter 1: Mathematics\
    \ of ML — how models learn\nChapter 2: Neural Networks — how deep models represent knowledge\nChapter 3: Transformer Architecture\
    \ — how LLMs work mechanically\nChapter 4: Modern LLM Internals — how production LLMs are built, deployed, attacked\n\n\
    The key insight that runs through all of Part 1:\n  Every capability is also an attack surface.\n  In-context learning\
    \ enables few-shot poisoning.\n  Instruction following enables instruction override attacks.\n  Retrieval augmentation\
    \ enables indirect injection.\n  Long context enables many-shot jailbreaks.\n  Compression enables alignment degradation.\n\
    \nPart 2 (Chapters 5-9) takes the attack surfaces identified in Part 1\nand examines them systematically from an attacker's\
    \ perspective:\n  Chapter 5: Adversarial ML Foundations\n  Chapter 6: Prompt Injection\n  Chapter 7: Jailbreaks\n  Chapter\
    \ 8: Training Data and Supply Chain Attacks\n  Chapter 9: Model Extraction and Inversion\n\nThe capstone project (Section\
    \ 17) is your entry point into Part 2:\nevery residual vulnerability documented in your red_team_report.md\ncorresponds\
    \ to a chapter in Part 2 that explains how to exploit it\nand how to defend against it more rigorously.\n"
  the_three_questions: "Three questions recurred throughout Chapter 4. You now have the\ntechnical vocabulary to answer them\
    \ precisely:\n\nQ1: \"Is this model safe?\"\n  Answer: There is no binary safe/unsafe. Safety is a probability distribution\n\
    \  over behaviors across inputs. A model is safe *for* a specific deployment\n  context, *against* a specific threat model,\
    \ *measured by* specific probes.\n  Your capstone project quantified this for SecurityBot: 79% refusal rate\n  against\
    \ a specific probe set under a specific hardening stack.\n\nQ2: \"Will compressing/modifying this model affect safety?\"\
    \n  Answer: Yes, always. Quantization, distillation, pruning, and fine-tuning\n  all perturb the weight configurations\
    \ that encode safety. The question\n  is whether the perturbation is measurable and whether the hardening stack\n  compensates.\
    \ Your Phase 2 and Phase 4 measurements quantified this.\n\nQ3: \"What is the residual risk?\"\n  Answer: There is always\
    \ residual risk. Defense in depth (model + system prompt +\n  API layer + monitoring) reduces residual risk to a manageable\
    \ level.\n  The red_team_report.md documents what remains and what it would take to fix it.\n  Monitoring detects attacks\
    \ that bypass static defenses.\n"
  part_2_preview: 'Chapter 5 begins: "Now that you understand how LLMs work, let''s understand

    how they fail — systematically, theoretically, and in documented real-world attacks."


    The SecurityBot you built in this capstone is your practice target.

    Chapter 5 (Adversarial ML) will teach you the mathematical formalism

    for the attacks you ran informally in Phase 4.

    Chapter 6 (Prompt Injection) will extend Attack 3 into a full injection taxonomy.

    Chapter 7 (Jailbreaks) will take Attack 2 beyond manual red-teaming to

    gradient-based optimization (GCG, AutoDAN).


    Keep your red_team_report.md. Part 2 will fill in the gaps.

    '
grading_rubric:
  note: 'For instructors using this as a course project. Self-learners: use as a quality checklist.'
  phase_1_build:
    weight: 25
    criteria:
      dataset_quality:
        points: 10
        checklist:
        - Dataset has all 3 parts with approximately correct sizes (±20%)
        - Refusal examples cover all 4 framing types
        - Boundary cases demonstrate nuanced judgment, not blanket refusal
      training_quality:
        points: 10
        checklist:
        - LoRA config specified and training completed
        - Eval loss < 2.5 (evidence of meaningful learning)
        - Capability evaluation shows improvement over base GPT-2
      safety_baseline:
        points: 5
        checklist:
        - Pre-hardening safety baseline measured on all 80 probes
        - Results broken down by category
  phase_2_compress:
    weight: 15
    criteria:
      quantization:
        points: 8
        checklist:
        - INT8 quantization applied and model runs correctly
        - Memory reduction measured and reported
        - Safety regression test run on INT8 model
      layer_analysis:
        points: 7
        checklist:
        - Per-layer error analysis run
        - Highest-error layers identified
        - Results consistent with Section 12 prediction (late layers highest error)
  phase_3_harden:
    weight: 20
    criteria:
      system_prompt:
        points: 8
        checklist:
        - All 6 blocks present and substantive
        - Sandwich reminder implemented
        - Block 4 addresses all 6 attack patterns from Section 15
      api_wrapper:
        points: 7
        checklist:
        - Rate limiting implemented (token-based)
        - Input classifier integrated
        - Output filter integrated
        - Structured logging implemented
      monitoring:
        points: 5
        checklist:
        - Anomaly detection implemented with at least 3 metrics
        - Alert threshold logic present
  phase_4_attack:
    weight: 25
    criteria:
      coverage:
        points: 10
        checklist:
        - All 6 attack categories attempted
        - Each attack run 3+ times for statistical significance
        - API layer attacks (rate limiting) tested
      analysis:
        points: 15
        checklist:
        - Success rate per attack category measured
        - Failure modes explained mechanically (not just 'it failed')
        - Residual vulnerabilities documented with fix recommendations
  phase_5_measure:
    weight: 15
    criteria:
      evaluation:
        points: 8
        checklist:
        - 5-dimension evaluation matrix completed with numerical scores
        - Stacked defense table showing per-layer contributions
        - INT8 vs FP32 comparison under full hardening
      synthesis:
        points: 7
        checklist:
        - Chapter 4 findings documented with specific evidence
        - Residual attack surface honestly characterized
        - red_team_report.md connects to Part 2 preview
key_concepts_summary:
  integration:
  - concept: No single defense layer provides meaningful safety alone
    evidence: 'Model alignment: 45%. Full stack: 79%. Each layer adds 7-20%.'
  - concept: Defense in depth is multiplicative across independent layers
    evidence: Model bypass + system prompt bypass requires bypassing both independently
  - concept: Monitoring is the layer that enables improvement after deployment
    evidence: Attacks that pass all static defenses are visible as anomalies in logs
  compression:
  - concept: INT8 quantization + hardening stack preserves more safety than FP32 alone
    evidence: INT8 + stack (79% refusal) > FP32 no stack (45% refusal)
    implication: Compress freely at INT8 if you have a full hardening stack
  measurement:
  - concept: Safety must be quantified, not assumed
    evidence: The 5-dimension matrix gives a specific number to each safety claim
    implication: Unquantified safety claims ('this model is safe') are not defensible
connections:
  builds_on:
    all_chapter_4_sections: "This section is the integration point for Sections 04_01 through 04_16.\nEvery phase exercises\
      \ concepts from specific earlier sections:\n  Phase 1: 04_06 (SFT fine-tuning)\n  Phase 2: 04_12 (quantization)\n  Phase\
      \ 3: 04_15 + 04_16 (system prompts + API security)\n  Phase 4: 04_14 (adversarial prompts) + 04_11 (context attacks)\n\
      \  Phase 5: 04_12-13 (compression safety) + 04_16 (monitoring)\n"
  prepares_for:
  - section: Chapter 5 (Part 2)
    concept: Adversarial ML foundations — formalizes the attacks in Phase 4
  - section: Chapter 6 (Part 2)
    concept: Prompt injection — extends Attack 3 (indirect injection) into full taxonomy
  - section: Chapter 7 (Part 2)
    concept: Jailbreaks — extends Attack 2 (persona override) to GCG/AutoDAN
  - section: Chapter 9 (Part 2)
    concept: Model extraction — extends Attack 5 (rate limit probing) to full extraction
  - section: Chapter 14 (Part 3)
    concept: Production deployment — the capstone architecture is the reference deployment
  - section: Chapter 15 (Part 3)
    concept: Detection engineering — the monitoring configuration is the detection prototype
  security_thread: "Section 17 closes the Chapter 4 security arc and opens the Part 2 arc.\n\nChapter 4's contribution to\
    \ the book's security narrative:\n  Part 1 established: the attack surface exists at every layer of the LLM stack,\n \
    \ from pre-training data (Section 07) to the API boundary (Section 16).\n  Safety is not a property of the model alone\
    \ — it is a property of the\n  complete system (model + system prompt + API + monitoring).\n\nThe SecurityBot capstone\
    \ is a concrete artifact that embodies this architecture.\nIt is imperfect — and its imperfections are documented. That\
    \ documentation\nis the bridge to Part 2: the red_team_report.md is an invitation to study\neach residual vulnerability\
    \ in depth.\n\nThe book's thesis, as demonstrated by the capstone:\n  You cannot secure what you do not understand.\n\
    \  You cannot understand LLM security without building something and attacking it.\n  This capstone is the \"build and\
    \ attack\" half.\n  Parts 2 and 3 are the \"understand deeply and defend rigorously\" half.\n"
