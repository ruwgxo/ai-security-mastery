deliverables:

  deliverable_1:
    id: 'D11.13.1'
    filename: 'production_architecture_patterns.py'
    description: >
      Encodes the three production detection architecture patterns as a structured
      comparison, with per-track placement rationale for the seven-track gateway in
      the hybrid architecture. Produces a deployment specification showing which
      component runs where and what its failure mode is.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''production_architecture_patterns.py
      Three production detection architecture patterns with trade-off analysis.
      Seven-track gateway placement in the hybrid architecture.
      Chapter 11, Section 11.13 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 production_architecture_patterns.py
        python3 production_architecture_patterns.py --hybrid
        python3 production_architecture_patterns.py --observability
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass
      from enum import Enum

      # ---------------------------------------------------------------------------
      # Enumerations
      # ---------------------------------------------------------------------------

      class Pattern(Enum):
          INLINE_GATEWAY = 'inline_gateway'
          SIDECAR = 'sidecar'
          SIEM = 'siem'

      class Action(Enum):
          BLOCK = 'block'
          FLAG = 'flag'
          ALERT = 'alert'

      class FailMode(Enum):
          FAIL_CLOSED = 'fail_closed'
          FAIL_OPEN = 'fail_open'

      # ---------------------------------------------------------------------------
      # Data models
      # ---------------------------------------------------------------------------

      @dataclass
      class ArchitecturePattern:
          pattern: Pattern
          name: str
          can_block: bool
          request_latency_impact: str
          alert_latency: str
          failure_mode_description: str
          best_for: str
          infrastructure_requirement: str

      @dataclass
      class TrackPlacement:
          track_id: int
          track_name: str
          component: str               # which sub-component of the track
          pattern: Pattern
          action: Action
          fail_mode: FailMode
          latency_ms: float            # synchronous latency if inline; 0.0 if sidecar/SIEM
          rationale: str
          fail_description: str

      @dataclass
      class ObservabilitySignal:
          signal_name: str
          metric_type: str
          alert_threshold: str
          failure_detected: str

      # ---------------------------------------------------------------------------
      # Pattern registry
      # ---------------------------------------------------------------------------

      PATTERNS: list[ArchitecturePattern] = [
          ArchitecturePattern(
              pattern=Pattern.INLINE_GATEWAY,
              name='Inline API Gateway',
              can_block=True,
              request_latency_impact='High — all inline detection latency is synchronous',
              alert_latency='Immediate (pre-inference decision)',
              failure_mode_description=(
                  'Gateway crash → model unavailable (fail-closed) or all requests pass '
                  'undetected (fail-open) depending on policy per track'
              ),
              best_for='High-confidence L1/L2 rules that must block; real-time decisions',
              infrastructure_requirement='Lightweight Python service in request path; stateless except Track 5 hook',
          ),
          ArchitecturePattern(
              pattern=Pattern.SIDECAR,
              name='Sidecar (Async)',
              can_block=False,
              request_latency_impact='Zero — runs off the request path',
              alert_latency='Near-real-time: 30–120 seconds after request',
              failure_mode_description=(
                  'Sidecar crash or queue fill → detection gap with no model availability impact; '
                  'queue depth alert provides early warning'
              ),
              best_for='Moderate-confidence ML rules and heuristics; output inspection without latency cost',
              infrastructure_requirement='Async worker service; message queue (Kafka, Redis Streams, or SQS); stateless processing',
          ),
          ArchitecturePattern(
              pattern=Pattern.SIEM,
              name='Log-Based SIEM',
              can_block=False,
              request_latency_impact='Zero — reads collected logs',
              alert_latency='Minutes to hours; windowed aggregation may take 24+ hours',
              failure_mode_description=(
                  'SIEM ingestion delay → alert latency increase; '
                  'log field errors → silent detection gaps; no model availability impact'
              ),
              best_for='Campaign-level stateful detection; cross-session correlation; retrospective analysis',
              infrastructure_requirement='SIEM platform (Elastic, Splunk, Datadog); structured log ingestion; Sigma backend compiler',
          ),
      ]

      # ---------------------------------------------------------------------------
      # Hybrid placement registry
      # ---------------------------------------------------------------------------

      TRACK_PLACEMENTS: list[TrackPlacement] = [
          TrackPlacement(
              track_id=1, track_name='Direct Injection Detection',
              component='Sigma keyword rule',
              pattern=Pattern.INLINE_GATEWAY, action=Action.BLOCK,
              fail_mode=FailMode.FAIL_CLOSED,
              latency_ms=0.05,
              rationale='L1 rules are microsecond-fast; 1% FPR acceptable for blocking; must prevent injection reaching model.',
              fail_description='Engine failure → all requests blocked until rule engine restored.',
          ),
          TrackPlacement(
              track_id=2, track_name='Jailbreak Detection (Sigma L1)',
              component='Keyword Sigma rule',
