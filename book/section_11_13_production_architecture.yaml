prose_content:

  part_1_three_patterns:
    heading: 'Three Production Patterns: Blocking, Flagging, and Retrospective'
    body: |
      Every production detection deployment uses one or more of three architectural
      patterns. The patterns differ on a single critical axis: when does the detection
      logic run relative to model inference?

      Pattern 1 — Inline API Gateway. Detection logic runs synchronously in the
      request path, before model inference. The gateway receives the request, applies
      all configured detection tracks, and makes a block/flag/pass decision before
      the request reaches the model. If the decision is block, the model never sees
      the request. If the decision is pass or flag, the request proceeds to inference.
      The seven-track gateway is this pattern.

      The inline gateway is the only pattern that can block. If the security requirement
      is "adversarial inputs must not reach the model," the detection logic must be
      inline. There is no async equivalent of blocking — by the time async detection
      fires, the request has already been processed.

      The cost of inline detection: latency. Every detection operation adds to the
      request latency budget. A gateway that runs seven tracks with ML inference at L3
      adds 15–50ms before every model call. For a model serving endpoint with a 200ms
      SLA, this is 7–25% of the latency budget consumed by detection before inference
      begins.

      Pattern 2 — Sidecar Detection. Detection logic runs asynchronously alongside
      the model serving container. The request reaches the model directly; a copy of
      the request (and optionally the response) is streamed to the sidecar for analysis.
      The sidecar cannot block — it sees the request after model inference has already
      begun or completed. It can flag: produce an alert that goes to the SOC or detection
      engineering queue.

      The sidecar adds zero latency to the request path. It can run expensive detection
      logic — ML inference, embedding computation, session state analysis — without
      affecting the model''s response time. The sidecar is the correct pattern for
      moderate-confidence detections that should not affect latency but should still
      produce alerts.

      The cost of sidecar detection: it cannot block, and it requires async infrastructure
      (a message queue or streaming pipeline between the model serving component and
      the sidecar). The sidecar also needs to handle backpressure: if detection is slower
      than inference, the queue grows and alert latency increases.

      Pattern 3 — Log-Based SIEM Detection. Detection logic runs fully asynchronously
      against collected logs in a SIEM. Logs are written during or after inference,
      collected by the SIEM ingestion pipeline, and matched against Sigma rules that
      the SIEM compiles to its native query language. Detection fires minutes to hours
      after the event.

      SIEM detection adds zero latency to the request path and has no deployment
      dependency on the model serving infrastructure — it reads logs that already exist.
      It supports the most complex detection logic: cross-session correlation, time-window
      aggregation across arbitrary periods, and joint analysis of request and response
      logs that the inline gateway never sees together.

      The cost: high alert latency (minutes to hours), no blocking capability, and
      detection effectiveness bounded by log completeness. If a field is not logged,
      it cannot be matched. If logs are delayed or dropped, the detection window is
      blind.

  part_2_hybrid_architecture:
    heading: 'The Hybrid Architecture: Gateway + Sidecar + SIEM'
    body: |
      No single pattern is sufficient for a production AI security programme. The hybrid
      architecture combines all three, assigning each detection primitive to the pattern
      that best fits its latency requirement, confidence level, and temporal scope:

      Inline gateway: high-confidence, low-latency detections that must block. Track 1
      (keyword injection, L1) and Track 4 (label distribution anomaly in training calls,
      L1) run inline and block. Their L1 signature rules are fast, deterministic, and
      have FPR targets at 1% — low enough to tolerate blocking without excessive false
      blocks. Track 3 (semantic gating, L2) runs inline and flags rather than blocks:
      the 5% FPR target is acceptable for flagging but too high for blocking. The inline
      gateway is responsible for the binary block/pass decision on every request; flagging
      decisions pass through to the application but are logged for sidecar and SIEM
      consumption.

      Sidecar: moderate-confidence detections and ML inference that cannot afford to
      block but should produce near-real-time alerts. Track 2''s jailbreak classifier
      (L3 ML), Track 6 (adversarial entropy heuristic, L2), and Track 7''s compound
      squeezer+classifier (L2+L3) run in the sidecar. These tracks are too expensive
      to run synchronously on every request in the inline path — the ML inference alone
      adds 15–30ms. In the sidecar, they run asynchronously on a copy of the request,
      producing alerts within 30–120 seconds of the request. The sidecar also runs the
      Chapter 12 ML detectors when they are deployed.

      SIEM: stateful and campaign-level detection. Track 5 (model extraction session
      accumulator, L4) runs in the SIEM. The accumulator requires cross-session state
      that is most naturally maintained in a SIEM''s windowing query engine. The SIEM
      also runs the Section 11.12 threat hunting queries and the Section 11.07
      multi-event correlation rules. Alert latency from the SIEM is 5–60 minutes for
      windowed aggregation rules and up to 24 hours for the detection pattern that
      requires 500 queries to accumulate.

      The hybrid assignment by gateway track:
      Inline (block): Track 1, Track 4.
      Inline (flag): Track 3.
      Sidecar (flag, near-real-time): Track 2 (ML component), Track 6, Track 7.
      SIEM (alert, windowed): Track 5, correlation rules, threat hunting queries.
      Track 2 (Sigma component) runs inline as a fast L1 check; the ML component
      runs in the sidecar as a follow-up for prompts that pass the L1 check.

  part_3_integration_points:
    heading: 'Integration Points: Pre-Inference, Post-Inference, Session Streaming'
    body: |
      Four integration points connect the detection system to the model serving
      infrastructure. Each integration point is a hook in the request/response lifecycle:

      Integration Point 1 — Pre-inference hook. Fires before the request reaches the
      model. The inline gateway is attached here. The hook receives the full request
      object (prompt, user_id, session_id, model_name, token_count) and returns a
      decision: block (with reason), flag (with score), or pass. The model serving
      component must be instrumented to call the pre-inference hook before every request
      and to honour the block decision without calling the model. If the hook times out
      or throws an exception, the fail-open/fail-closed policy determines what happens.

      Integration Point 2 — Post-inference hook. Fires after model inference completes,
      before the response is returned to the client. The output validation layer (Chapter 14)
      attaches here. The hook receives the request and the model response together, enabling
      detection of response-level signals (code injection patterns, PII, system prompt
      reflection) that the pre-inference hook cannot see. The post-inference hook can also
      block: it can replace the response with an error before the client receives it.
      Post-inference hooks add latency for every request; Section 11.13 treats the output
      validation layer as a sidecar concern in architectures where post-inference latency
      is unacceptable, with the tradeoff that a sidecar cannot suppress the response.

      Integration Point 3 — Session log streaming. The model serving component emits
      structured JSON logs for every request and response, streamed to the sidecar and
      the SIEM ingestion pipeline. The log schema follows the ai_gateway and ai_session
      field taxonomy from Section 11.06. Schema agreement between the model serving team
      and the detection engineering team is enforced by ai_log_field_taxonomy.py from
      Section 11.06. Fields emitted incorrectly (wrong name, wrong type) cause Sigma
      rules to silently not fire — the most insidious failure mode in production detection.

      Integration Point 4 — Sidecar message queue. The sidecar subscribes to a message
      queue (or reads from the log stream directly) to receive a copy of every request.
      The queue provides backpressure protection: if the sidecar falls behind, the queue
      holds messages rather than dropping them, and alert latency increases while the
      sidecar catches up. The queue must be sized for peak traffic × maximum sidecar
      processing time. For a gateway processing 1,000 requests/second and a sidecar
      processing time of 200ms per request, the queue must handle 200 messages in flight
      simultaneously at steady state.

  part_4_failure_modes:
    heading: 'Failure Mode Design: Fail-Open, Fail-Closed, and Circuit Breakers'
    body: |
      Every detection component in a production architecture will fail: the ML model
      will time out under load, the embedding service will be unavailable during a
      deployment, the sidecar queue will fill during a traffic spike. Failure mode
      design specifies what happens to each detection component when it fails. The
      choice is between fail-open (allow the request to proceed without detection) and
      fail-closed (reject the request when detection is unavailable).

      Fail-open vs fail-closed by layer:

      L1 Signature rules (Track 1, Track 4): fail-closed. These are fast, deterministic
      rules with no external dependencies. If the rule engine crashes, the detection
      system has a bug — this is not an expected failure mode. Fail-closed here means
      blocking all requests until the rule engine is restored, which is the correct
      response to a complete failure of the detection foundation.

      L2 Heuristic rules (Track 3, Track 6, Track 7 squeezer): fail-open with logging.
      Heuristic computation may time out under extreme load (embedding computation takes
      2–5ms; under load, this can exceed the latency budget). If the heuristic times out,
      the request passes with a logged warning: gateway_action=pass, detection_timeout=true.
      The SIEM collects these timeout events; a spike in timeouts is an alert that the
      detection system is under stress.

      L3 ML inference (Track 2 classifier, Track 7 adversarial classifier, sidecar):
      fail-open. ML inference is the most latency-variable component and the most
      likely to time out. Fail-closed for ML inference would cause availability impact
      during any spike in model serving load. Fail-open with timeout logging is the
      correct policy; the SIEM alert on timeout spikes provides the visibility needed
      to investigate.

      L4 Session accumulator (Track 5, SIEM): fail-open by design. SIEM-based detection
      always has alert latency; the failure mode of a SIEM query timing out is that the
      alert fires late, not that the request is blocked. No availability impact.

      Circuit breakers: the gateway implements a circuit breaker per detection track.
      If Track 3 times out more than 5 times in 60 seconds, the circuit opens: Track 3
      is bypassed for the next 60 seconds, all requests pass through as if Track 3 did
      not exist, and the SIEM receives a circuit_open event for Track 3. After 60
      seconds, the circuit enters half-open state: one in ten requests tests Track 3;
      if it succeeds, the circuit closes; if it fails again, the open period extends.
      Circuit breakers prevent a slow detection component from cascading into full
      gateway unavailability.

  part_5_observability:
    heading: 'Observability of the Detection System Itself'
    body: |
      The detection system that monitors the model must itself be monitored. A detection
      system that silently fails — rules that stop firing, ML models that time out without
      alerting, a sidecar queue that fills without notification — is worse than no detection
      system, because it provides false assurance. Eight observability signals are required
      for a production detection system:

      Signal 1 — Alert rate per rule (per-minute rolling count). A rule that fires at
      zero rate for 30 minutes when it previously fired regularly has stopped working.
      Zero-rate alerts are as important as high-rate alerts.

      Signal 2 — Detection latency per component (P50/P95/P99 histogram). Latency
      drift signals resource pressure before the component fails. Track 3 latency
      creeping from 4ms to 12ms over a week indicates embedding service degradation
      that will eventually cause timeouts.

      Signal 3 — Circuit breaker state per track (open/closed/half-open). A circuit
      that is persistently opening and closing indicates a detection component that is
      marginal under current load — a time bomb that will cause availability impact
      when load increases.

      Signal 4 — Timeout rate per component. Timeouts that are not surfaced as alerts
      represent silent detection gaps. Every timeout is a request that passed without
      full detection coverage.

      Signal 5 — Queue depth (sidecar queue size). Queue depth growth indicates the
      sidecar is falling behind. Alert threshold: queue depth exceeding 60-second
      equivalent of peak request volume.

      Signal 6 — False positive rate per rule (7-day rolling, from Section 11.09).
      Already instrumented by false_positive_manager.py; this signal feeds both the
      FPR dashboard and the detection system health dashboard.

      Signal 7 — Coverage regression indicator (from Section 11.05 attck_coverage_heatmap.py).
      Run in CI on every merge; also run daily in staging to catch coverage regressions
      from threshold drift or log schema changes that are not caught by the CI run alone.

      Signal 8 — Log field completeness rate. For each required log field in the
      ai_gateway taxonomy (Section 11.06), the fraction of requests for which the field
      is present and correctly typed. A field completeness rate below 99% means Sigma
      rules that depend on that field are firing at reduced effectiveness. This is the
      signal that catches log schema drift — the model serving team changes a field name
      without coordinating with the detection team, and the Sigma rule silently stops
      working.

  part_6_chapter14_preview:
    heading: 'Chapter 14: Production Deployment Deep-Dive'
    body: |
      Section 11.13 establishes the architectural framework. Chapter 14 implements it
      at production scale. The key topics Chapter 14 adds beyond the framework established
      here:

      Latency budget analysis. Chapter 14 characterises the end-to-end latency budget
      for the hybrid architecture under realistic production load: model serving baseline,
      inline detection overhead per track, sidecar queue latency, and output validation
      layer overhead. It produces a latency decomposition diagram showing which components
      consume which fraction of the total budget and where optimisation is most valuable.

      Throughput scaling. The inline gateway from Chapter 11 is a single-process Python
      service. Chapter 14 adds horizontal scaling: a stateless gateway design that allows
      N gateway instances behind a load balancer, with the session state (Track 5
      accumulator) moved to a shared Redis store. The Chapter 14 gateway processes
      10,000+ requests per second across the scaled fleet.

      Cost modelling. Each detection track has a cost per request in terms of compute
      and memory. Chapter 14 provides a cost model that allows the detection engineer
      to compute the monthly infrastructure cost of each track at a given request volume,
      and to make informed tradeoffs between detection coverage and infrastructure cost.

      Kubernetes deployment. Chapter 14 provides Helm charts and Kubernetes manifests
      for deploying the inline gateway, the sidecar, and the SIEM integration pipeline
      in a production Kubernetes cluster. Includes health checks, readiness probes, and
      resource limits for each component.

      Output validation layer (full implementation). The Chapter 14 output validation
      layer implements the post-inference hook with a PII scanner, code injection
      detector, system prompt reflection detector, and response entropy monitor — all
      four components that close the LLM02, LLM06, and LLM08 OWASP gaps identified
      in Section 11.11.

