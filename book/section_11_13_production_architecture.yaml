      # ---------------------------------------------------------------------------
      # Observability signals
      # ---------------------------------------------------------------------------

      OBSERVABILITY_SIGNALS: list[ObservabilitySignal] = [
          ObservabilitySignal(
              'Alert rate per rule', 'Counter (per-min rolling)',
              'Zero rate > 30 min when rule previously fired',
              'Rule silently stopped firing: engine bug or schema drift'),
          ObservabilitySignal(
              'Detection latency P95 per component', 'Histogram (ms)',
              'P95 > 2× 7-day baseline',
              'Resource pressure building toward timeout threshold'),
          ObservabilitySignal(
              'Circuit breaker state per track', 'State (open/closed/half-open)',
              'Any track open > 5 min',
              'Detection component marginal under load'),
          ObservabilitySignal(
              'Timeout rate per component', 'Counter (per-min)',
              '> 1% of requests timing out',
              'Silent detection gaps: requests passing without coverage'),
          ObservabilitySignal(
              'Sidecar queue depth', 'Gauge (message count)',
              '> 60s equivalent of peak request volume',
              'Sidecar falling behind; alert latency increasing'),
          ObservabilitySignal(
              'FPR per rule (7-day rolling)', 'Gauge (ratio)',
              '> FPR target × 1.2',
              'Miscalibrated rule or traffic pattern shift'),
          ObservabilitySignal(
              'Coverage regression indicator', 'Binary (CI diff pass/fail)',
              'Any technique score decrease in daily diff run',
              'Rule change reduced TP coverage or schema change broke field match'),
          ObservabilitySignal(
              'Log field completeness rate', 'Gauge (fraction per field)',
              '< 99% for any required taxonomy field',
              'Log schema drift: Sigma rule silently stopped matching'),
      ]

      # ---------------------------------------------------------------------------
      # Reports
      # ---------------------------------------------------------------------------

      def print_pattern_comparison(patterns: list[ArchitecturePattern]) -> None:
          print('\nProduction Detection Architecture Patterns\n')
          for p in patterns:
              block_str = 'YES — only blocking pattern' if p.can_block else 'NO — flag/alert only'
              print(f'Pattern: {p.name}')
              print(f'  Can block:          {block_str}')
              print(f'  Latency impact:     {p.request_latency_impact}')
              print(f'  Alert latency:      {p.alert_latency}')
              print(f'  Failure mode:       {p.failure_mode_description}')
              print(f'  Best for:           {p.best_for}')
              print(f'  Infrastructure:     {p.infrastructure_requirement}')
              print()

      def print_hybrid_placement(placements: list[TrackPlacement]) -> None:
          print('\nHybrid Architecture — Seven-Track Gateway Placement\n')
          print(f'{"Track":<5} {"Component":<38} {"Pattern":<16} {"Action":<8} {"Fail":<12} {"Lat (ms)":<10} Rationale')
          print('-' * 130)
          for tp in placements:
              pattern_str = tp.pattern.value.replace('_', ' ')
              lat_str = f'{tp.latency_ms:.2f}' if tp.pattern == Pattern.INLINE_GATEWAY else 'async'
              rat_short = (tp.rationale[:45] + '...') if len(tp.rationale) > 45 else tp.rationale
              print(f'T{tp.track_id:<4} {tp.component:<38} {pattern_str:<16} {tp.action.value:<8} '
                    f'{tp.fail_mode.value:<12} {lat_str:<10} {rat_short}')

          inline = [tp for tp in placements if tp.pattern == Pattern.INLINE_GATEWAY]
          sidecar = [tp for tp in placements if tp.pattern == Pattern.SIDECAR]
          siem = [tp for tp in placements if tp.pattern == Pattern.SIEM]
          inline_lat = sum(tp.latency_ms for tp in inline)
          print(f'\nInline gateway total synchronous latency (all components): ~{inline_lat:.2f}ms')
          print(f'Sidecar components: {len(sidecar)} (async; zero request latency)')
          print(f'SIEM components:    {len(siem)} (async; minutes-to-hours alert latency)')

      def print_observability_dashboard(signals: list[ObservabilitySignal]) -> None:
          print('\nDetection System Observability Signals\n')
          print(f'{"Signal":<40} {"Type":<30} {"Alert Threshold":<40} Failure Detected')
          print('-' * 150)
          for s in signals:
              sig_short = (s.signal_name[:38] + '..') if len(s.signal_name) > 38 else s.signal_name
              type_short = (s.metric_type[:28] + '..') if len(s.metric_type) > 28 else s.metric_type
              thresh_short = (s.alert_threshold[:38] + '..') if len(s.alert_threshold) > 38 else s.alert_threshold
              fail_short = (s.failure_detected[:50] + '..') if len(s.failure_detected) > 50 else s.failure_detected
              print(f'{sig_short:<40} {type_short:<30} {thresh_short:<40} {fail_short}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Production detection architecture patterns')
          parser.add_argument('--hybrid', action='store_true',
                              help='Show hybrid architecture track placement')
          parser.add_argument('--observability', action='store_true',
                              help='Show observability signal dashboard')
          args = parser.parse_args()

          if args.hybrid:
              print_hybrid_placement(TRACK_PLACEMENTS)
              return 0
          if args.observability:
              print_observability_dashboard(OBSERVABILITY_SIGNALS)
              return 0
          print_pattern_comparison(PATTERNS)
          print_hybrid_placement(TRACK_PLACEMENTS)
          print_observability_dashboard(OBSERVABILITY_SIGNALS)
          return 0

      if __name__ == '__main__':
          sys.exit(main())

  deliverable_2:
    id: 'D11.13.2'
    filename: 'hybrid_architecture_designer.py'
    description: >
      Given a set of detection requirements — latency budget, blocking required,
      SIEM available, sidecar infrastructure available — recommends the hybrid
      architecture configuration and produces a deployment specification mapping
      each gateway track to the appropriate pattern.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''hybrid_architecture_designer.py
      Recommends hybrid detection architecture given deployment requirements.
      Maps each gateway track to inline/sidecar/SIEM based on constraints.
      Chapter 11, Section 11.13 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 hybrid_architecture_designer.py
        python3 hybrid_architecture_designer.py --latency 100 --no-sidecar
        python3 hybrid_architecture_designer.py --latency 50 --no-siem --blocking-required
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass

      from production_architecture_patterns import (
          Pattern, Action, FailMode, TrackPlacement, TRACK_PLACEMENTS,
      )

      # ---------------------------------------------------------------------------
      # Requirements model
      # ---------------------------------------------------------------------------

      @dataclass
      class DeploymentRequirements:
          total_latency_budget_ms: float    # total end-to-end latency SLA
          inline_latency_budget_ms: float   # fraction available for inline detection
          blocking_required: bool           # must some attacks be blocked (not just flagged)?
          sidecar_available: bool           # async sidecar infrastructure available?
          siem_available: bool              # SIEM platform available for log-based rules?
          ml_inference_available: bool      # ML model serving infrastructure available?

      # ---------------------------------------------------------------------------
      # Architecture designer
      # ---------------------------------------------------------------------------

      @dataclass
      class ArchitectureRecommendation:
          requirements: DeploymentRequirements
          placements: list[TrackPlacement]
          warnings: list[str]
          coverage_gaps: list[str]
          total_inline_latency_ms: float

      def design_architecture(req: DeploymentRequirements) -> ArchitectureRecommendation:
          placements: list[TrackPlacement] = []
          warnings: list[str] = []
          coverage_gaps: list[str] = []

          for tp in TRACK_PLACEMENTS:
              # Determine if original placement is viable given constraints
              adjusted = TrackPlacement(
                  track_id=tp.track_id,
                  track_name=tp.track_name,
                  component=tp.component,
                  pattern=tp.pattern,
                  action=tp.action,
                  fail_mode=tp.fail_mode,
                  latency_ms=tp.latency_ms,
                  rationale=tp.rationale,
                  fail_description=tp.fail_description,
              )

              # Sidecar not available: push sidecar components inline or drop
              if tp.pattern == Pattern.SIDECAR and not req.sidecar_available:
                  if tp.latency_ms == 0.0:
                      # originally sidecar; estimate its latency
                      est_latency = {'Track 2 ML': 15.0, 'Track 6': 2.0, 'Track 7': 13.0}.get(
                          tp.component[:7], 10.0)
                  else:
                      est_latency = tp.latency_ms

                  remaining_budget = req.inline_latency_budget_ms - sum(
                      p.latency_ms for p in placements if p.pattern == Pattern.INLINE_GATEWAY)

                  if est_latency <= remaining_budget:
                      adjusted.pattern = Pattern.INLINE_GATEWAY
                      adjusted.latency_ms = est_latency
                      adjusted.action = Action.FLAG
                      warnings.append(
                          f'T{tp.track_id} {tp.component}: sidecar unavailable — moved inline '
                          f'(+{est_latency}ms latency).'
                      )
                  else:
                      coverage_gaps.append(
                          f'T{tp.track_id} {tp.component}: sidecar unavailable and no inline '
                          f'budget — DROPPED. Coverage gap for {tp.track_name}.'
                      )
                      continue

              # SIEM not available: flag SIEM components as gaps
              if tp.pattern == Pattern.SIEM and not req.siem_available:
                  coverage_gaps.append(
                      f'T{tp.track_id} {tp.component}: SIEM unavailable — session accumulator '
                      f'not deployable. Track 5 session-level detection is a gap.'
                  )
                  continue

              # ML inference not available: flag ML components as gaps
              if not req.ml_inference_available and 'classifier' in tp.component.lower():
                  coverage_gaps.append(
                      f'T{tp.track_id} {tp.component}: ML inference unavailable — '
                      f'ML detector not deployable. L3 detection is a gap.'
                  )
                  continue

              placements.append(adjusted)

          # Check blocking requirement
          blocking_placements = [p for p in placements if p.action == Action.BLOCK]
          if req.blocking_required and not blocking_placements:
              warnings.append(
                  'Blocking is required but no track is configured to block. '
                  'Track 1 must be deployed inline with fail-closed policy.'
              )

          # Inline latency check
          total_inline = sum(p.latency_ms for p in placements if p.pattern == Pattern.INLINE_GATEWAY)
          if total_inline > req.inline_latency_budget_ms:
              warnings.append(
                  f'Total inline latency {total_inline:.1f}ms exceeds budget '
                  f'{req.inline_latency_budget_ms:.1f}ms. Consider moving Track 3 or Track 6 to sidecar.'
              )

          return ArchitectureRecommendation(
              requirements=req,
              placements=placements,
              warnings=warnings,
              coverage_gaps=coverage_gaps,
              total_inline_latency_ms=total_inline,
          )

      def print_recommendation(rec: ArchitectureRecommendation) -> None:
          req = rec.requirements
          print('\nHybrid Architecture Recommendation')
          print(f'  Latency budget (total):  {req.total_latency_budget_ms}ms')
          print(f'  Inline budget:           {req.inline_latency_budget_ms}ms')
          print(f'  Blocking required:       {req.blocking_required}')
          print(f'  Sidecar available:       {req.sidecar_available}')
          print(f'  SIEM available:          {req.siem_available}')
          print(f'  ML inference available:  {req.ml_inference_available}')
          print(f'\nResulting inline latency:  {rec.total_inline_latency_ms:.2f}ms '
                f'({"OK" if rec.total_inline_latency_ms <= req.inline_latency_budget_ms else "OVER BUDGET"})')
          print(f'Track placements:          {len(rec.placements)}')
          print(f'Coverage gaps:             {len(rec.coverage_gaps)}')
          print(f'Warnings:                  {len(rec.warnings)}')

          print(f'\n{"Track":<5} {"Component":<38} {"Pattern":<16} {"Action":<8} {"Latency":<10}')
          print('-' * 82)
          for p in rec.placements:
              lat_str = f'{p.latency_ms:.2f}ms' if p.pattern == Pattern.INLINE_GATEWAY else 'async'
              print(f'T{p.track_id:<4} {p.component:<38} {p.pattern.value:<16} {p.action.value:<8} {lat_str}')

          if rec.warnings:
              print(f'\nWarnings:')
              for w in rec.warnings:
                  print(f'  ⚠ {w}')
          if rec.coverage_gaps:
              print(f'\nCoverage gaps (components not deployed):')
              for g in rec.coverage_gaps:
                  print(f'  ✗ {g}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Hybrid detection architecture designer')
          parser.add_argument('--latency', type=float, default=200.0,
                              help='Total end-to-end latency SLA in ms (default: 200)')
          parser.add_argument('--inline-budget', type=float, default=15.0,
                              help='Inline detection latency budget in ms (default: 15)')
          parser.add_argument('--no-sidecar', action='store_true',
                              help='Sidecar infrastructure not available')
          parser.add_argument('--no-siem', action='store_true',
                              help='SIEM platform not available')
          parser.add_argument('--no-ml', action='store_true',
                              help='ML inference infrastructure not available')
          parser.add_argument('--blocking-required', action='store_true',
                              help='Blocking (not just flagging) is a hard requirement')
          args = parser.parse_args()

          req = DeploymentRequirements(
              total_latency_budget_ms=args.latency,
              inline_latency_budget_ms=args.inline_budget,
              blocking_required=args.blocking_required,
              sidecar_available=not args.no_sidecar,
              siem_available=not args.no_siem,
              ml_inference_available=not args.no_ml,
          )

          rec = design_architecture(req)
          print_recommendation(rec)
          return 1 if rec.coverage_gaps else 0

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.13.1'
    mistake: 'Placing all detection logic inline because "inline means it can block"'
    why_it_happens: >
      Blocking is the strongest security control available. Engineers who equate
      "better detection" with "more blocking" default to placing every detection
      primitive inline, regardless of latency or FPR implications.
    why_it_matters: >
      An inline detection system that consumes 80ms per request on a model with a
      200ms SLA leaves only 120ms for actual model inference. Under traffic spikes,
      this produces timeouts before the model ever runs. Worse, a high-FPR inline
      rule that blocks causes legitimate users to be unable to use the service —
      which is a denial of service caused by the detection system, not by an attacker.
    correct_approach: >
      Inline blocking is reserved for high-confidence, low-FPR, fast rules: Track 1
      (1% FPR, microseconds) and Track 4 (training pipeline only, low volume). All
      other detections flag rather than block, and moderate-confidence ML detections
      run asynchronously in the sidecar where they cannot affect request latency.

  - id: 'CM11.13.2'
    mistake: 'Designing the sidecar as a simple log consumer without backpressure protection'
    why_it_happens: >
      A sidecar that reads from a log stream and runs detection seems simple: consume
      a log entry, run the detection, emit an alert. The backpressure case (detection
      slower than log production) is not considered until it happens in production.
    why_it_matters: >
      During a traffic spike, if the sidecar processes requests at 200ms each but
      receives 1,000 requests per second, the queue grows by 195 entries per second.
      After five minutes, the queue has 58,500 unprocessed entries. Without backpressure
      protection, the queue either fills (messages dropped, silent detection gaps) or
      grows unboundedly (sidecar runs out of memory). Both are worse than a well-designed
      fail-open.
    correct_approach: >
      Size the sidecar queue for peak traffic × maximum processing time. Add the
      queue depth observability signal (Signal 5 from the observability table). Configure
      the queue with a maximum depth and a retention policy: messages older than N
      minutes during a backpressure event are dropped after logging, accepting the
      detection gap in exchange for preventing queue overflow.

  - id: 'CM11.13.3'
    mistake: 'Failing to instrument the detection system itself with observability signals'
    why_it_happens: >
      Observability instrumentation is overhead that detection engineers prefer not
      to add. The detection system is built to observe the model; observing the
      observer feels meta and is deferred to "later."
    why_it_matters: >
      A detection system that silently fails is worse than no detection system because
      it provides false assurance. A rule that stops firing due to a log schema change
      produces no alerts — the SOC assumes the system is healthy and working. The
      first indication that the detection failed is an incident post-mortem.
    correct_approach: >
      Instrument all eight observability signals before the first production deployment.
      The alert rate per rule signal (Signal 1) and the log field completeness signal
      (Signal 8) are the two highest-priority signals because they directly detect the
      most common silent failure modes: rules that stop firing and field name mismatches.

  - id: 'CM11.13.4'
    mistake: 'Applying the same fail mode to all detection layers without considering the security/availability tradeoff'
    why_it_happens: >
      Fail-closed sounds safer. Practitioners who prioritise security over availability
      default to fail-closed for all layers.
    why_it_matters: >
      Fail-closed for ML inference (Track 7 in the sidecar) means that every time
      the embedding service is unavailable, the gateway blocks all requests — causing
      a denial of service that an attacker could intentionally trigger by taking down
      the embedding service. Fail-closed for fast deterministic rules (Track 1) is
      correct; fail-closed for slow probabilistic components is an availability risk.
    correct_approach: >
      Apply fail-closed only to the components where blocking on failure is the correct
      security outcome: Track 1 (L1 signature, blocking) and Track 4 (training pipeline,
      blocking). Apply fail-open with timeout logging to all heuristic and ML components.
      The timeout log feeds the observability system; the SIEM coverage regression
      signal catches when timeouts become systematic.

  - id: 'CM11.13.5'
    mistake: 'Skipping the log field completeness signal because "the log schema was agreed in Section 11.06"'
    why_it_happens: >
      The schema was agreed. The ai_log_field_taxonomy.py validator runs in CI. It
      feels redundant to monitor field completeness in production when the schema was
      validated at build time.
    why_it_matters: >
      Schema agreement at build time does not prevent schema drift at runtime. The
      model serving team deploys a patch that changes injection_score to
      injectionScore in the JSON log output. The Sigma rule silently stops matching.
      The CI pipeline does not catch this because the rule itself did not change —
      only the log emission did. The only signal that detects this is the production
      log field completeness rate for injection_score dropping from 100% to 0%.
    correct_approach: >
      Instrument the log field completeness signal in the production monitoring system.
      Alert at < 99% completeness for any required taxonomy field. Run the completeness
      check daily, not just on deployment. A weekly review of completeness metrics
      catches schema drift before it becomes a prolonged detection gap.

section_summary:
  what_you_learned: |
    Three production architecture patterns serve distinct roles in the hybrid detection
    system: the inline gateway blocks high-confidence signals before model inference;
    the sidecar flags moderate-confidence signals asynchronously with zero latency
    impact; and the SIEM detects campaigns over extended time windows. The seven-track
    gateway distributes across all three patterns in the hybrid architecture: Tracks 1
    and 4 block inline, Track 3 flags inline, Tracks 2 (ML), 6, and 7 flag via sidecar,
    and Track 5 (session accumulator) alerts via SIEM. Failure mode design applies
    fail-closed to fast deterministic rules and fail-open to heuristic and ML components.
    Eight observability signals — alert rate, detection latency, circuit breaker state,
    timeout rate, queue depth, FPR per rule, coverage regression, and log field
    completeness — must be instrumented before production deployment. Chapter 14
    implements the architecture at production scale: latency budget analysis, horizontal
    scaling, cost modelling, Kubernetes deployment, and the output validation layer.
  key_terms:
    - term: 'Inline API gateway pattern'
      definition: >
        The only blocking production detection pattern. Detection logic runs synchronously
        in the request path before model inference. Must block is placed here; adds
        latency proportional to the detection compute time.
    - term: 'Sidecar pattern'
      definition: >
        An asynchronous detection pattern where logic runs alongside the model serving
        container, receiving a copy of every request via a message queue. Cannot block;
        produces near-real-time alerts (30–120s) with zero request latency impact.
    - term: 'Log-based SIEM pattern'
      definition: >
        A fully asynchronous detection pattern where Sigma rules run against collected
        logs in a SIEM. No blocking; minutes-to-hours alert latency; natural home for
        stateful session accumulation and cross-session campaign detection.
    - term: 'Circuit breaker'
      definition: >
        A per-track protection mechanism that bypasses a detection component after N
        consecutive timeouts, preventing a slow component from cascading into full
        gateway unavailability. Opens the circuit for a defined interval; tests recovery
        in half-open state before restoring full detection.
    - term: 'Log field completeness rate'
      definition: >
        The fraction of production requests for which each required log taxonomy field
        is present and correctly typed. The primary signal for detecting silent log
        schema drift that causes Sigma rules to stop matching without any other alert.

