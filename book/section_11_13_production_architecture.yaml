section_overview:
  one_line_summary: >
    Three production architecture patterns — inline gateway, sidecar, and log-based SIEM
    — each occupy a distinct position on the blocking/latency tradeoff; the hybrid
    architecture combines all three so the gateway blocks, the sidecar flags without
    latency cost, and the SIEM detects what neither can see in real time.
  why_this_section_exists: |
    Sections 11.02 through 11.12 built the detection framework: rules, coverage
    measurement, FPR management, maturity model, engineering workflow, and hunting
    procedure. Every element of that framework was designed as if the detection logic
    runs in the seven-track inline gateway. But not every detection requirement fits
    the inline pattern. Inline detection adds latency, requires synchronous resource
    consumption, and is vulnerable to cascading failure — if the gateway crashes, model
    inference may be unavailable. Some detection logic is better placed asynchronously,
    where it cannot affect request latency or availability.

    More fundamentally, a production detection system is not a single component. It is
    an architecture. The choice of where to place each detection primitive — inline
    before the model, alongside the model in a sidecar, or downstream in a SIEM — is
    an architectural decision with implications for latency, blocking capability, alert
    latency, and failure mode. Making that decision without a framework leads to ad-hoc
    placement that optimises for one concern (usually "make it block") while ignoring
    the others (usually "what happens when it breaks").

    This section provides that framework: three named patterns with precise tradeoff
    profiles, a hybrid architecture that combines them, integration points for each
    pattern, failure mode design principles for each layer, and the observability
    instrumentation that makes the detection system itself observable — because a
    detection system that silently fails is worse than no detection system.
  position_in_chapter: >
    Section 11.13 is the architectural synthesis section. It is the last technical
    section before the chapter summary (11.14). All of the framework elements from
    Sections 11.01 through 11.12 are now positioned within a production architecture.
    Section 11.14 scores the final maturity state and maps Chapter 11 to Chapters 12–14.

