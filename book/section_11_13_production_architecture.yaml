              component='Session state accumulator',
              pattern=Pattern.SIEM, action=Action.ALERT,
              fail_mode=FailMode.FAIL_OPEN,
              latency_ms=0.0,
              rationale='Cross-request state requires SIEM windowing engine; alert latency acceptable for campaign detection.',
              fail_description='SIEM ingestion delay → alert latency increase; no model availability impact.',
          ),
