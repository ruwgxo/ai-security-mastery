              fail_description='Timeout → request passes with detection_timeout=true logged.',
          ),
          TrackPlacement(
              track_id=4, track_name='Data Poisoning Monitor',
              component='Label distribution Sigma rule',
              pattern=Pattern.INLINE_GATEWAY, action=Action.BLOCK,
              fail_mode=FailMode.FAIL_CLOSED,
