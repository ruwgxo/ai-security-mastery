prose_content:

  part_1:
    title: 'No Baseline, No Anomaly: The Reference Distribution'
    body: |
      An anomaly is a deviation from normal, which means the word anomaly has no meaning until normal
      is defined. This is not a philosophical point; it is the operational core of the temporal family.
      Every temporal detector in Chapter 13 produces a score of the form how far is this from expected,
      and expected is the baseline. Build the baseline wrong and every detector that reads it is wrong
      in the same way, silently, because each is faithfully reporting deviation from a reference that
      does not represent normal.

      The baseline is a reference distribution for a behavioural metric. For request rate, it is the
      distribution of an entity's hourly request counts over some history: a centre (what is typical)
      and a spread (how much variation is ordinary). A new hour's count is scored by how far it sits
      from that centre relative to that spread. The same construction applies to every metric the
      session and event pipelines produce: refusal rate, session length, endpoint mix, inter-request
      interval, error rate. Each gets a baseline, and each new observation is scored against it.

      The reason to make the baseline explicit -- rather than letting a detector learn normal
      implicitly -- is control and inspectability. An explicit baseline can be examined: an analyst can
      ask what this entity's typical request rate is and read the answer. It can be guarded: the update
      rule can be made to exclude attack traffic. It can be backed off: a new entity with no baseline
      can be scored against a cohort. An implicit normal buried inside a model offers none of these.
      The temporal family is built on explicit baselines precisely so that the reference is a first-class
      object that can be inspected, guarded, and reasoned about.

  part_2:
    title: 'Normal Is Per-Entity: Why the Global Threshold Fails'
    body: |
      The single most consequential design decision in this section is the scope of the baseline:
      global, per-endpoint, or per-entity. The answer is that the behavioural metrics that matter are
      per-entity, and a global threshold on them fails in both directions.

      Consider request rate. A global threshold must be set at one number for all entities. Pick a high
      number so the heavy integration that legitimately makes thousands of requests an hour is not
      flagged: now a compromised casual user, whose normal is ten requests an hour, can be driven to
      five hundred requests an hour by an attacker and still sit far below the global threshold. The
      attack on the light user is invisible. Pick a low number to catch that attack: now the heavy
      integration trips the threshold on every ordinary hour, and the alert stream is flooded with
      false positives that train the analysts to ignore it. There is no single number that catches the
      attack on the light user without flooding on the heavy one, because their normals differ by two
      orders of magnitude.

      Per-entity baselines resolve this. The heavy integration is scored against its own history, where
      thousands of requests an hour is normal and a deviation would be a change from its own pattern.
      The casual user is scored against their own history, where the jump from ten to five hundred is an
      enormous deviation that fires immediately. The same absolute rate is normal for one and a glaring
      anomaly for the other, and only a per-entity baseline encodes that.

      Per-endpoint baselines add the second axis. The same entity behaves differently across endpoints:
      a batch endpoint sees high steady volume, an interactive endpoint sees bursty low volume. A
      baseline keyed on entity-and-endpoint captures normal at the granularity where it is actually
      stable. The practical structure is a baseline per entity per metric, with a per-endpoint baseline
      where the endpoint materially changes the entity's normal, and a population baseline as the
      backoff for entities with insufficient history.

  part_3:
    title: 'Robust Statistics: Why Mean and Standard Deviation Fail Under Attack'
    body: |
      The natural way to summarise a baseline is the mean and the standard deviation: centre on the
      mean, scale by the standard deviation, score by the z-score. In a security setting this is the
      wrong choice, and the reason is specific and important.

      The baseline is computed from the same traffic that contains the attacks. Mean and standard
      deviation are not robust: a small number of extreme values pulls the mean toward them and inflates
      the standard deviation. When an attacker sends a burst of very high request-rate hours, those
      hours enter the window from which the baseline is computed. The mean rises toward the attack
      values and the standard deviation widens to accommodate them. The baseline, computed with
      non-robust statistics, moves toward the attack. The next attack hour is now scored against an
      inflated baseline and produces a smaller z-score than it should. The attacker has degraded the
      detector by the very act of attacking.

      Robust statistics resist this. The median is the centre value: adding a few extreme values barely
      moves it, because it depends on the rank of values, not their magnitude. The median absolute
      deviation -- the median of the absolute deviations from the median -- is a robust scale that, like
      the median, is barely moved by a minority of extreme values. A baseline built on the median and
      the MAD does not drift toward an attack burst, because the burst is a minority of the window and
      robust statistics ignore the minority. The deviation score built on robust statistics is the
      modified z-score: the deviation from the median, scaled by the MAD. It produces a large score for
      the attack hour and is not inflated by the presence of attack hours in the baseline window.

      The rule that follows is unconditional for security baselines: use the median and the MAD, never
      the mean and the standard deviation. The contamination that robust statistics resist is not
      hypothetical noise; it is the adversary's traffic in the baseline window, and resisting it is the
      whole point.

  part_4:
    title: 'Rolling Windows: Adaptivity Versus Stability'
    body: |
      A baseline must adapt. An entity's normal genuinely changes -- a user takes on a new project, an
      integration scales up, a seasonal pattern shifts. A baseline frozen at the entity's first week
      will flag every legitimate growth as an anomaly. So the baseline is computed over a rolling
      window: the recent history, updated as new observations arrive and old ones age out. The window
      length is the central tuning decision, and it trades adaptivity against stability.

      A short window adapts quickly: the baseline tracks recent behaviour closely, so a legitimate
      change in normal is absorbed within days. The cost is instability and exposure to contamination.
      A short window has few observations, so even with robust statistics a sustained attack that fills
      a meaningful fraction of a short window can shift the baseline. And a short window is noisy: small
      sample sizes produce a jittery baseline that fires on ordinary variation.

      A long window is stable: many observations, a steady baseline, and strong resistance to
      contamination because an attack must dominate a large window to move a robust statistic. The cost
      is slow adaptation: a legitimate change in normal takes a long time to be absorbed, so a user who
      genuinely scales up is flagged as anomalous for as long as the window remembers their old normal.

      The production resolution is a window long enough that a plausible attack cannot fill a dominant
      fraction of it, combined with robust statistics so that even a substantial minority of attack
      observations does not move the baseline, and combined with the contamination guard of the next
      part so that flagged traffic does not enter the window at all. The window length is set per metric
      based on how quickly that metric's normal legitimately changes and how much history an entity
      typically has -- not a single global window for all metrics and all entities.

  part_5:
    title: 'The Contamination Guard: Do Not Let the Adversary Train the Baseline'
    body: |
      Robust statistics resist contamination by a minority of attack observations. They do not resist a
      patient adversary who ramps slowly enough that, at every step, the increase looks like legitimate
      growth. This is the central attack against baselines, and it requires a specific defence beyond
      robust statistics.

      The attack works like this. The adversary does not spike; spiking produces a large deviation that
      fires. Instead they increase their request rate by a small amount each day -- small enough that
      each day's increase is within the baseline's expected variation. Each day, the new slightly-higher
      rate enters the rolling window and nudges the baseline up. The next day's slightly-higher rate is
      scored against the slightly-raised baseline and again looks normal. Over weeks, the adversary walks
      the baseline from ten requests an hour to ten thousand, and at no point does any single day produce
      a deviation large enough to fire. The baseline has been trained by the adversary to accept the
      attack. This is the slow-ramp or boiling-frog attack, and robust statistics do not stop it because
      the attack is never a minority of the window -- it is the whole recent trend.

      The defence is the contamination guard: flagged traffic does not update the baseline. The baseline
      is updated only from observations that were not themselves flagged as anomalous or blocked. When an
      observation deviates enough to be flagged, it is excluded from the window that computes future
      baselines, so it cannot nudge the baseline toward itself. This breaks the slow ramp: as soon as the
      adversary's increase is large enough to flag, that observation stops feeding the baseline, and the
      baseline stops following the ramp. The adversary can only move the baseline with observations that
      look normal, and observations that look normal are not the attack.

      The guard has a tension to manage. Excluding all flagged traffic from the baseline means a
      legitimate change that initially looks anomalous is slow to be accepted, because its early
      observations are excluded. The resolution is to exclude confirmed and high-confidence flags from
      baseline updates while allowing low-confidence, unconfirmed deviations to update the baseline after
      a delay, so that genuine shifts are eventually absorbed while a sustained attack is held out. The
      guard is the difference between a baseline that the adversary trains and one that the adversary
      cannot.

  part_6:
    title: 'Deviation Scoring and Composition into an Entity Deviation Score'
    body: |
      The baseline produces, for each metric, a centre and a spread. Scoring a new observation against it
      yields a per-metric deviation. Two deviation measures are used together. The modified z-score --
      the deviation from the median scaled by the MAD -- is the robust analogue of the z-score and gives
      a signed, scale-free measure of how far the observation sits from typical. The percentile rank --
      where the observation falls in the baseline distribution -- is a complementary measure that is
      bounded and interpretable, answering this observation is higher than ninety-nine percent of this
      entity's history. The two agree on clear cases and provide a cross-check on borderline ones.

      A single entity has many metrics, each with its own baseline and its own per-metric deviation. The
      temporal detectors and the entity profiler need a composed signal: a single entity deviation score
      that integrates the per-metric deviations. Composition is not a simple sum, because the metrics are
      correlated and differ in signal value. The robust composition weights each metric by its
      independent detection value -- determined the way 13.02 determined feature importance -- and
      aggregates in a way that is driven by the strongest deviations rather than diluted by the many
      metrics sitting at normal. An entity with one enormous deviation on a high-value metric should
      score high even if every other metric is ordinary, so the composition is closer to a weighted
      maximum-plus-evidence than to an average.

      The composed entity deviation score is the output of this section that the rest of the temporal
      family consumes. Time-series anomaly detection in 13.04 reads the per-metric baselines to build
      forecasts. Drift detection in 13.05 reads the baseline distributions as references. Rate-based
      detection in 13.07 thresholds rate against the per-entity rate baseline. The entity profiler in
      13.10 folds the composed deviation score into the persistent profile. The baseline built here is
      the reference the whole temporal family stands on, which is why its robustness and its
      contamination guard matter so much: a weakness here propagates to every detector downstream.

