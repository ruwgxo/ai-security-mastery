section_overview:
  one_line_summary: 'Anomaly detection is undefined without an explicit baseline; Section 13.03 builds the per-user and per-endpoint baselines -- with robust statistics, cold-start backoff, and a contamination guard -- that every temporal detector in Chapter 13 measures deviation against.'
  why_this_section_exists: |
    Section 13.01 placed the temporal family in the taxonomy and Section 13.02 produced the session
    features that the temporal detectors consume. Section 13.03 builds the missing foundation those
    detectors need before they can fire: the baseline. A deviation is only meaningful relative to a
    reference, and the reference is the baseline. Without it, time-series anomaly detection (13.04),
    drift detection (13.05), and rate-based detection (13.07) have nothing to measure against.

    The central argument of the section is that normal is per-entity. A request rate of five hundred
    per hour is an attack for a casual user and an ordinary afternoon for a heavy integration. A
    refusal rate of thirty percent is alarming for a user who never gets refused and unremarkable for
    one whose work sits near a content boundary. A single global threshold cannot serve both: set high
    enough not to flag the heavy user, it is too high to catch the compromised light user; set low
    enough to catch the light user, it floods on every heavy user. The baseline must be established per
    entity and per endpoint so deviation is measured against the right reference.

    The section also confronts the failure mode that makes naive baselines worse than useless in a
    security setting: contamination. The baseline is computed from the same traffic stream that
    contains the attacks it is meant to detect. A patient adversary who ramps slowly enough is absorbed
    into the baseline -- the baseline learns to call the attack normal -- and the deviation it should
    have produced shrinks to zero. Robust statistics and a contamination guard are not refinements
    here; they are what separate a baseline that detects from one that is quietly trained by the
    adversary to ignore them.
  position_in_chapter: |
    Section 13.03 is the foundation of the temporal family, the way Section 13.02 was the foundation of
    the session family. It sits between session modelling and the temporal detectors that consume
    baselines: 13.04 (time-series anomaly detection) scores deviation from the baseline envelope, 13.05
    (drift) compares distributions against a reference baseline, and 13.07 (rate-based detection)
    thresholds rate against the per-entity baseline. It parallels Section 12.03 in Chapter 12: where
    12.03 built the zero-label anomaly detector that establishes a statistical baseline of normal
    traffic, 13.03 builds the explicit per-entity behavioural baseline that the temporal detectors
    score against.

