deliverables:

  deliverable_1:
    title: 'Statistical Baseline with Robust Rolling-Window Statistics'
    filename: 'statistical_baseline.py'
    description: 'Maintains per-entity per-metric baselines over a rolling window using robust statistics (median and MAD). Supports incremental update from new observations and exposes the centre and spread used by deviation scoring. Implements the rolling-window robust baseline from Section 13.03 Parts 3 and 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # statistical_baseline.py
      # Section 13.03: Per-Entity Robust Rolling-Window Baseline
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from collections import deque
      from dataclasses import dataclass, field
      from typing import Deque, Dict, Optional, Tuple


      def _median(values) -> float:
          s = sorted(values)
          n = len(s)
          if n == 0:
              return 0.0
          mid = n // 2
          if n % 2 == 1:
              return float(s[mid])
          return (s[mid - 1] + s[mid]) / 2.0


      def _mad(values, centre: float) -> float:
          # Median absolute deviation, scaled to be a consistent estimator of std dev
          if not values:
              return 0.0
          abs_dev = [abs(v - centre) for v in values]
          mad = _median(abs_dev)
          return mad * 1.4826  # consistency constant for normal data


      @dataclass
      class MetricBaseline:
          window: Deque[float] = field(default_factory=deque)
          max_len: int = 200
          min_history: int = 20

          def update(self, value: float) -> None:
              self.window.append(value)
              while len(self.window) > self.max_len:
                  self.window.popleft()

          def is_ready(self) -> bool:
              return len(self.window) >= self.min_history

          def centre_spread(self) -> Tuple[float, float]:
              vals = list(self.window)
              centre = _median(vals)
              spread = _mad(vals, centre)
              return centre, spread


      class BaselineStore:
          def __init__(self, max_len: int = 200, min_history: int = 20) -> None:
              self.max_len = max_len
              self.min_history = min_history
              # keyed by (entity_id, metric_name)
              self.baselines: Dict[Tuple[str, str], MetricBaseline] = {}

          def _get(self, entity_id: str, metric: str) -> MetricBaseline:
              key = (entity_id, metric)
              if key not in self.baselines:
                  self.baselines[key] = MetricBaseline(max_len=self.max_len, min_history=self.min_history)
              return self.baselines[key]

          def update(self, entity_id: str, metric: str, value: float) -> None:
              self._get(entity_id, metric).update(value)

          def ready(self, entity_id: str, metric: str) -> bool:
              return self._get(entity_id, metric).is_ready()

          def centre_spread(self, entity_id: str, metric: str) -> Optional[Tuple[float, float]]:
              b = self._get(entity_id, metric)
              if not b.is_ready():
                  return None
              return b.centre_spread()


      if __name__ == '__main__':
          store = BaselineStore(max_len=100, min_history=20)
          # Build a baseline for a light user: ~10 requests/hour
          for _ in range(40):
              store.update('user_light', 'requests_per_hour', 10.0)
          # Inject a few attack bursts INTO the window to show robustness
          for v in [500.0, 480.0, 520.0]:
              store.update('user_light', 'requests_per_hour', v)
          cs = store.centre_spread('user_light', 'requests_per_hour')
          print(f'Light user baseline after 3 attack bursts in window: centre={cs[0]:.1f}, spread={cs[1]:.1f}')
          print('Robust median ignores the minority bursts -- centre stays near 10,')
          print('so the next attack hour still scores as a large deviation.')

  deliverable_2:
    title: 'Baseline Deviation Scorer'
    filename: 'baseline_deviation_scorer.py'
    description: 'Scores a new observation against an established baseline using the modified z-score (deviation from median scaled by MAD) and the percentile rank within the baseline window. Composes per-metric deviations into a single entity deviation score weighted by metric value. Implements the deviation scoring and composition from Section 13.03 Part 6.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; consumes the BaselineStore from statistical_baseline.py conceptually but is self-contained for the runnable example'
    code: |
      # baseline_deviation_scorer.py
      # Section 13.03: Baseline Deviation Scoring and Composition
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Dict, List, Tuple


      def modified_z_score(value: float, centre: float, spread: float) -> float:
          # spread is the scaled MAD; guard against zero spread
          if spread <= 1e-9:
              return 0.0 if value == centre else float('inf')
          return (value - centre) / spread


      def percentile_rank(value: float, window: List[float]) -> float:
          if not window:
              return 0.5
          below = sum(1 for w in window if w < value)
          return below / len(window)


      @dataclass
      class MetricDeviation:
          metric: str
          mod_z: float
          pct_rank: float
          weight: float


      def compose_entity_deviation(devs: List[MetricDeviation]) -> float:
          # Weighted maximum-plus-evidence: dominated by the strongest deviation,
          # with secondary evidence from other elevated metrics, not a dilizing average.
          if not devs:
              return 0.0
          weighted_abs = [(abs(d.mod_z) * d.weight, d) for d in devs]
          weighted_abs.sort(reverse=True)
          top = weighted_abs[0][0]
          # secondary evidence: sum of remaining weighted deviations, dampened
          secondary = sum(w for w, _ in weighted_abs[1:]) * 0.15
          return round(top + secondary, 3)


      if __name__ == '__main__':
          # Light user baseline: requests/hour centre 10, spread 2 (scaled MAD)
          # Refusal rate centre 0.05, spread 0.03
          rph_window = [10.0] * 40
          refusal_window = [0.05] * 40

          # Observed attack hour: 500 requests, refusal rate 0.45
          rph_dev = MetricDeviation(
              metric='requests_per_hour',
              mod_z=modified_z_score(500.0, 10.0, 2.0),
              pct_rank=percentile_rank(500.0, rph_window),
              weight=1.0,
          )
          refusal_dev = MetricDeviation(
              metric='refusal_rate',
              mod_z=modified_z_score(0.45, 0.05, 0.03),
              pct_rank=percentile_rank(0.45, refusal_window),
              weight=0.7,
          )
          session_dev = MetricDeviation(
              metric='session_length',
              mod_z=modified_z_score(12.0, 11.0, 4.0),  # ordinary
              pct_rank=percentile_rank(12.0, [11.0] * 40),
              weight=0.5,
          )

          devs = [rph_dev, refusal_dev, session_dev]
          for d in devs:
              print(f'{d.metric:<20} mod_z={d.mod_z:>8.1f}  pct={d.pct_rank:.2f}  weight={d.weight}')
          composed = compose_entity_deviation(devs)
          print(f'\nComposed entity deviation score: {composed}')
          print('One enormous deviation on a high-weight metric drives the score,')
          print('rather than being averaged away by the ordinary session_length metric.')

  deliverable_3:
    title: 'Cold-Start Population Prior'
    filename: 'cold_start_prior.py'
    description: 'Scores entities with insufficient personal history against a population prior built from a cohort of similar entities, and blends from the prior toward the personal baseline as history accrues. Implements the cold-start backoff from Section 13.03 Part 2 and Table 1.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # cold_start_prior.py
      # Section 13.03: Cold-Start Population-Prior Backoff
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Tuple


      def _median(values) -> float:
          s = sorted(values)
          n = len(s)
          if n == 0:
              return 0.0
          mid = n // 2
          return float(s[mid]) if n % 2 else (s[mid - 1] + s[mid]) / 2.0


      @dataclass
      class BlendedBaseline:
          personal_centre: float
          personal_spread: float
          personal_n: int
          prior_centre: float
          prior_spread: float
          min_history: int = 20

          def blend_weight(self) -> float:
              # Linear blend: 0 personal weight at n=0, full personal weight at min_history
              if self.personal_n >= self.min_history:
                  return 1.0
              return self.personal_n / self.min_history

          def effective(self) -> Tuple[float, float]:
              w = self.blend_weight()
              centre = w * self.personal_centre + (1 - w) * self.prior_centre
              spread = w * self.personal_spread + (1 - w) * self.prior_spread
              return centre, spread


      def build_population_prior(cohort_values: List[float]) -> Tuple[float, float]:
          centre = _median(cohort_values)
          abs_dev = [abs(v - centre) for v in cohort_values]
          spread = _median(abs_dev) * 1.4826
          return centre, spread


      if __name__ == '__main__':
          # Cohort of established casual users: requests/hour mostly 8-14
          cohort = [8, 9, 10, 11, 12, 10, 9, 13, 11, 10, 14, 8, 12, 11, 10]
          prior_centre, prior_spread = build_population_prior([float(v) for v in cohort])
          print(f'Population prior: centre={prior_centre:.1f}, spread={prior_spread:.1f}')

          for n in [0, 5, 10, 20]:
              bb = BlendedBaseline(
                  personal_centre=10.0,
                  personal_spread=2.0,
                  personal_n=n,
                  prior_centre=prior_centre,
                  prior_spread=prior_spread,
                  min_history=20,
              )
              c, s = bb.effective()
              print(f'  n={n:>2} history: blend_weight={bb.blend_weight():.2f}  effective centre={c:.1f}, spread={s:.1f}')
          print('A brand-new entity is scored against the cohort prior,')
          print('blending toward its personal baseline as history accrues.')

  deliverable_4:
    title: 'Baseline Contamination Guard'
    filename: 'baseline_contamination_guard.py'
    description: 'Wraps baseline updates so that flagged or blocked observations are excluded from the window that computes future baselines, defeating the slow-ramp attack. Allows low-confidence unconfirmed deviations to update after a delay so genuine shifts are eventually absorbed. Implements the contamination guard from Section 13.03 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # baseline_contamination_guard.py
      # Section 13.03: Baseline Contamination Guard
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from collections import deque
      from dataclasses import dataclass, field
      from typing import Deque, List


      def _median(values) -> float:
          s = sorted(values)
          n = len(s)
          if n == 0:
              return 0.0
          mid = n // 2
          return float(s[mid]) if n % 2 else (s[mid - 1] + s[mid]) / 2.0


      @dataclass
      class Observation:
          value: float
          flagged: bool          # deviated enough to be flagged
          confirmed_attack: bool  # analyst-confirmed or high-confidence


      @dataclass
      class GuardedBaseline:
          max_len: int = 100
          window: Deque[float] = field(default_factory=deque)
          excluded_count: int = 0

          def offer(self, obs: Observation) -> bool:
              # Confirmed/high-confidence flags never update the baseline
              if obs.confirmed_attack:
                  self.excluded_count += 1
                  return False
              # Unconfirmed flags are held out too (could be early attack) --
              # they are eligible to be re-offered after confirmation as benign
              if obs.flagged:
                  self.excluded_count += 1
                  return False
              self.window.append(obs.value)
              while len(self.window) > self.max_len:
                  self.window.popleft()
              return True

          def centre(self) -> float:
              return _median(list(self.window))


      if __name__ == '__main__':
          guard = GuardedBaseline(max_len=100)
          # Seed a normal baseline at 10
          for _ in range(40):
              guard.offer(Observation(10.0, flagged=False, confirmed_attack=False))
          print(f'Baseline centre after seeding: {guard.centre():.1f}')

          # Slow-ramp attack: each step flagged as a deviation once it grows
          ramp = [11, 13, 16, 20, 26, 34, 45, 60, 80, 110]
          for v in ramp:
              # Simulate the detector flagging the step as anomalous deviation
              flagged = v > 12  # anything above near-baseline is flagged
              guard.offer(Observation(float(v), flagged=flagged, confirmed_attack=False))

          print(f'Baseline centre after slow-ramp attempt: {guard.centre():.1f}')
          print(f'Observations excluded by the guard: {guard.excluded_count}')
          print('The guard held the flagged ramp out of the window, so the baseline')
          print('stayed near 10 and the adversary could not walk it upward.')

common_mistakes:

  mistake_1:
    description: 'Using a single global threshold for a behavioural metric instead of per-entity baselines'
    why_it_happens: |
      A global threshold is one number to configure and requires no per-entity state, no cold-start
      handling, and no rolling windows. It is the first thing an engineer reaches for, and on a quick
      test against a single user it appears to work.
    consequence: |
      Normal varies by orders of magnitude across entities. A global threshold set high enough not to
      flag a heavy integration is far too high to catch a compromised casual user driven to a fraction
      of the heavy user's volume; set low enough to catch that user, it floods on every heavy
      integration. The detector simultaneously misses the attack it was built for and trains analysts to
      ignore its alerts. There is no single number that serves both populations.
    correct_approach: |
      Establish baselines per entity and per endpoint so each observation is scored against the right
      reference. The heavy integration is measured against its own history where high volume is normal;
      the casual user is measured against theirs where a jump is a glaring deviation. statistical_baseline.py
      keys baselines on entity and metric for exactly this reason.

  mistake_2:
    description: 'Building the baseline from the mean and standard deviation instead of robust statistics'
    why_it_happens: |
      Mean and standard deviation are the default summary statistics, taught first and available in every
      library as the obvious way to centre and scale. The z-score is the familiar deviation measure. For
      clean, non-adversarial data they are perfectly reasonable.
    consequence: |
      The baseline is computed from traffic that contains the attacks. A burst of extreme attack
      observations pulls the mean toward the attack and inflates the standard deviation, so the baseline
      drifts toward the attack and the next attack observation produces a deflated deviation score. The
      attacker degrades the detector simply by attacking, and the more they attack the less the detector
      reacts.
    correct_approach: |
      Use the median and the MAD, and score with the modified z-score. Robust statistics depend on rank,
      not magnitude, so a minority of extreme attack observations in the window barely moves the centre or
      the spread. The attack still scores as a large deviation because the baseline did not follow it.
      This is mandatory for security baselines, not optional.

  mistake_3:
    description: 'Letting flagged or blocked traffic update the baseline, leaving the slow-ramp attack undefended'
    why_it_happens: |
      The simplest baseline update rule feeds every observation into the rolling window. Robust statistics
      handle the obvious bursts, so it feels like the contamination problem is solved and there is no need
      to filter what enters the window.
    consequence: |
      Robust statistics resist a minority of extreme observations but not a sustained trend that is the
      majority of the recent window. A patient adversary ramps slowly, each step within expected variation,
      and every step enters the window and nudges the baseline up. Over weeks the baseline is walked from
      the entity's true normal to the attack level, and no single step ever fires. The adversary has
      trained the baseline to accept the attack.
    correct_approach: |
      Apply a contamination guard: exclude flagged and confirmed-attack observations from the window that
      computes future baselines. As soon as a step in the ramp is large enough to flag, it stops feeding
      the baseline, so the baseline stops following the ramp. The adversary can only move the baseline with
      observations that look normal, which are not the attack. baseline_contamination_guard.py implements
      this hold-out.

  mistake_4:
    description: 'Trusting a freshly built personal baseline before it has enough history, so a new entity can establish a permissive normal'
    why_it_happens: |
      Once a per-entity baseline mechanism exists, it is tempting to use each entity's baseline as soon as
      it has any observations. A new entity gets a baseline from its first few hours and is scored against
      it immediately, which feels like the personalised approach working as designed.
    consequence: |
      A baseline built from a handful of observations is both noisy and exploitable. An adversary who
      controls a new entity can seed a high baseline during a deliberately busy first period, establishing
      a permissive personal normal, and then operate at attack volume that sits within the inflated
      baseline. The cold-start window is an exposure: a new entity with a self-established baseline has no
      independent reference to deviate from.
    correct_approach: |
      Score new entities against a population prior built from a cohort of similar entities until the
      personal baseline accrues sufficient history, blending from the prior toward the personal baseline as
      observations accumulate and requiring a minimum history before the personal baseline is trusted alone.
      cold_start_prior.py implements the blend and the minimum-history gate.

  mistake_5:
    description: 'Composing per-metric deviations by averaging, so a single large deviation is diluted by many ordinary metrics'
    why_it_happens: |
      Averaging the per-metric deviation scores is the natural way to produce a single entity score: it is
      symmetric, simple, and bounded. It treats every metric equally and feels fair.
    consequence: |
      An attack often shows as one enormous deviation on one metric -- a request rate fifty times normal --
      while every other metric stays ordinary because the attacker is not abnormal in those dimensions.
      Averaging the one huge deviation with a dozen near-zero deviations produces a modest composed score
      that sits below the alert threshold. The strongest evidence of the attack is averaged away by the
      metrics that happen to be normal, and the attack is missed.
    correct_approach: |
      Compose deviations so the score is driven by the strongest weighted deviation with secondary evidence
      from other elevated metrics, not diluted by metrics at normal. Weight each metric by its independent
      detection value and aggregate closer to a weighted maximum-plus-evidence than to an average, so one
      large deviation on a high-value metric drives the entity score. compose_entity_deviation in
      baseline_deviation_scorer.py implements this.

section_summary:

  compact: |
    Anomaly detection is undefined without an explicit baseline, and Section 13.03 builds the per-entity
    per-endpoint behavioural baselines that the whole temporal family of Chapter 13 measures deviation
    against. Normal is per-entity: a global threshold floods on heavy users and misses attacks on
    compromised light users, because their normals differ by orders of magnitude, so baselines are keyed on
    entity and endpoint with a population prior as the cold-start backoff. Robust statistics -- the median
    and the MAD, scored by the modified z-score -- are mandatory because the baseline is computed from
    traffic that contains the attacks, and mean and standard deviation drift toward an attack burst while
    robust statistics ignore the minority. The rolling window trades adaptivity against stability and
    contamination resistance. The contamination guard defeats the slow-ramp attack that robust statistics
    cannot: flagged traffic is excluded from baseline updates, so a patient adversary cannot walk the
    baseline upward. Deviation is scored by modified z-score and percentile rank, and per-metric deviations
    compose into an entity deviation score driven by the strongest deviation rather than averaged. The
    baseline is the single reference the temporal family depends on, so its robustness and its guard
    propagate to every downstream detector.

  key_takeaways:
    - 'Anomaly detection is undefined without an explicit baseline: every temporal detector scores deviation from a reference, and the reference is the per-entity baseline built here'
    - 'Normal is per-entity: a global threshold floods on heavy users and misses attacks on compromised light users because their normals differ by orders of magnitude'
    - 'Robust statistics (median and MAD, modified z-score) are mandatory for security baselines because the baseline is computed from traffic containing the attacks, and mean and std dev drift toward an attack burst'
    - 'The contamination guard defeats the slow-ramp attack that robust statistics cannot: excluding flagged traffic from baseline updates stops a patient adversary from walking the baseline upward'
    - 'The rolling window trades adaptivity against stability and contamination resistance, and a new entity is scored against a population prior until its personal baseline accrues'
    - 'Compose per-metric deviations so the entity score is driven by the strongest weighted deviation, not averaged, so one large deviation on a high-value metric is not diluted by ordinary metrics'

preview_section_13_04:
  title: 'Section 13.04: Time-Series Anomaly Detection -- Temporal Deviation from the Behavioural Envelope'
  summary: |
    Section 13.04 extends the per-entity baselines of 13.03 into the temporal dimension, detecting when a
    behavioural metric departs from its own historical envelope over time. It treats request rate, refusal
    rate, and error rate as time series with seasonal structure -- daily, weekly, business-cycle patterns
    that a naive threshold misclassifies as anomalies -- and applies seasonal decomposition to isolate the
    residual component where genuine anomalies live. It builds forecasting-based anomaly detection that
    flags observations falling outside a prediction interval, streaming online detection that scores each
    new point without recomputing history, change-point detection that identifies when a metric's
    distribution shifts rather than a single outlier point (the account-compromise signal), and
    multi-resolution analysis that catches both the sudden spike of a burst attack and the slow ramp of a
    patient exfiltration in the same metric. The baselines built in 13.03 are the reference these temporal
    detectors forecast and decompose against.

