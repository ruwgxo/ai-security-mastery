    - 'Explain why per-entity and per-endpoint baselines are required and how a global threshold fails on both power users and compromised low-volume accounts'
    - 'Describe rolling-window baseline statistics and the trade-off between window length, adaptivity, and stability'
    - 'Explain why robust statistics (median, MAD) are mandatory for security baselines and how mean and standard deviation are contaminated by attack traffic'
    - 'Describe the cold-start problem and the population-prior backoff that solves it for new entities'
    - 'Explain baseline contamination and how a slow-ramp attack poisons the baseline that is meant to detect it'
    - 'Describe deviation scoring by modified z-score and percentile rank and how per-metric deviations compose into an entity deviation score'

  skills:
    - 'Establish per-user and per-endpoint baselines from a rolling window of session features using robust statistics'
    - 'Compute deviation scores with the modified z-score and percentile rank against an established baseline'
    - 'Implement a population-prior backoff that scores new entities against a cohort until a personal baseline accrues'
    - 'Implement a contamination guard that excludes flagged traffic from baseline updates'
    - 'Compose per-metric deviations into a single entity deviation score for downstream detectors'

  security_mindset:
    - 'Internalise that a baseline computed from contaminated traffic learns to call the attack normal -- the adversary trains the baseline if you let them'
    - 'Recognise that robust statistics are a security requirement, not a statistical nicety, because the contamination is adversarial and targeted'
    - 'Understand that the baseline is the single point of dependency for the whole temporal family -- its quality bounds every temporal detector downstream'
    - 'Treat the cold-start window as an exposure: a new entity with no baseline is scored against a cohort, and that cohort choice is a security decision'

