section_overview:
  one_line_summary: 'A static rate limit is simultaneously too loose for low-and-slow abuse and too tight for legitimate power users; Section 13.08 builds the adaptive per-entity limiter -- learned thresholds, burst tolerance, risk weighting, and graduated response -- that enforces against the 13.07 rate signal without locking out heavy legitimate use.'
  why_this_section_exists: |
    Section 13.07 produced the rate-abuse signal: which entities are exhibiting the rate, acceleration,
    coverage, and periodicity of a campaign. Section 13.08 acts on it. The detection-enforcement handoff
    is the organising relationship between the two sections -- detection sets the adaptive threshold,
    enforcement applies it -- and this section builds the enforcement.

    The motivating problem is that the obvious enforcement mechanism, a static rate limit, fails in both
    directions at once. A single global limit must be set at one number for all entities, and there is no
    good number. Set it high enough that the legitimate heavy integration making thousands of requests an
    hour is not throttled, and a low-and-slow exfiltration campaign that stays just under that high limit
    runs unimpeded. Set it low enough to constrain the low-and-slow campaign, and every legitimate power
    user trips it constantly, breaking real high-volume use. The static limit is simultaneously too loose
    for the patient abuser and too tight for the power user, because it cannot tell them apart -- it sees
    only the rate, and rate alone does not distinguish them.

    Smart rate limiting resolves this by making the limit adaptive and per-entity. The threshold for each
    entity is learned from its own baseline, so a power user is limited relative to its own established
    normal and an exfiltration script is limited relative to its very different normal. The limit is
    weighted by the entity's risk profile, so a suspicious entity gets a tighter limit than a trusted one
    at the same rate. And the enforcement is graduated -- throttle, then challenge, then block -- rather
    than a single hard cutoff, so a false positive has a recovery path and the adversary's throughput is
    degraded progressively. The section also confronts the denial-of-service own-goal: a limiter that an
    adversary can trip on behalf of a legitimate user becomes an attack tool, and avoiding that shapes how
    the limit is composed across dimensions.
  position_in_chapter: |
    Section 13.08 is the enforcement counterpart to the rate-based detection of 13.07 and the second of
    the entity-family sections. It consumes the rate-abuse signal of 13.07, the per-entity baselines of
    13.03, and the entity risk score of 13.10 (read inline as a precomputed value, per the 13.01 latency
    coupling). It is the section where the entity family produces an enforcement action rather than just a
    signal, and it closes a feedback loop back into the entity profile of 13.10: enforcement outcomes
    update the entity's risk. It precedes the multi-turn analysis of 13.09 and the profiling of 13.10 that
    its risk weighting depends on.

