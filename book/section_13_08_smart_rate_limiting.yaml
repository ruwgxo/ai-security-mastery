prose_content:

  part_1:
    title: 'Why the Static Limit Fails in Both Directions'
    body: |
      A static rate limit is a single threshold applied to every entity: so many requests per minute,
      the same number for all. It is the standard, simple enforcement mechanism, and it fails because
      there is no single number that is correct for a population of entities with wildly different
      legitimate normals.

      Consider the two failure directions together. A legitimate heavy integration may make thousands of
      requests an hour as its ordinary operation -- a batch pipeline, a high-traffic application, an
      analytics consumer. To avoid throttling it, the static limit must be set above its rate. But a
      low-and-slow exfiltration campaign deliberately keeps its rate just under whatever the limit is; if
      the limit is set high to accommodate the power user, the patient campaign simply runs at a rate
      below that high limit and is never throttled. The high limit that protects the power user also
      shelters the abuser. Now lower the limit to constrain the abuser: the legitimate heavy integration
      immediately trips it on every ordinary hour, its requests are throttled, and real high-volume use
      breaks. The low limit that catches the abuser also breaks the power user.

      There is no escape within a single global number, because the power user and the patient abuser can
      have the same rate. Rate alone does not separate them -- the distinguishing features are the ones
      13.07 built (periodicity, coverage) and the per-entity context of what is normal for each. A static
      limit ignores all of that and sees only the rate, so it cannot do anything but fail in one direction
      or the other. The resolution is not a better global number; it is to abandon the global number for a
      per-entity, risk-weighted, adaptive threshold that incorporates the context rate alone lacks.

  part_2:
    title: 'Adaptive Per-Entity Thresholds from the Baseline'
    body: |
      The core of smart rate limiting is that each entity's limit is derived from its own baseline rather
      than a global constant. The 13.03 per-entity rate baseline already captures what is normal for each
      entity: its typical rate and the spread of that rate. The adaptive threshold is set relative to that
      baseline -- a multiple of the entity's normal rate, or its normal rate plus a number of robust
      spreads -- so the limit tracks the entity's established behaviour.

      This immediately resolves the static-limit dilemma. The heavy integration's baseline rate is high,
      so its adaptive limit is high, and its ordinary high-volume operation sits comfortably within it. The
      casual user's baseline rate is low, so its adaptive limit is low, and a compromise that drives it to
      a fraction of the heavy integration's rate still vastly exceeds its own low limit and is throttled.
      The same absolute rate is within limit for one entity and far over limit for another, because the
      limit is relative to each entity's own normal. The patient exfiltration campaign cannot hide under a
      high global ceiling, because there is no global ceiling -- it is measured against the modest baseline
      of whatever entity it operates through, and a rate well above that entity's baseline is throttled
      regardless of how it compares to other entities' rates.

      The adaptive threshold inherits the baseline's safeguards. It uses the robust statistics of 13.03 so
      the threshold is not inflated by contamination, and it respects the cold-start backoff so a new
      entity is limited relative to a population prior until its personal baseline accrues -- otherwise a
      fresh entity could establish a permissive baseline and then operate at abuse volume within its own
      inflated limit, the cold-start abuse from 13.03. The adaptive limit is, in effect, the baseline
      deviation logic turned into an enforcement threshold: the same per-entity normal that scores
      deviation now sets the rate at which deviation becomes a throttle.

  part_3:
    title: 'Token Buckets and Burst Tolerance'
    body: |
      A rate limit expressed as a flat maximum per window is too rigid for real traffic, because
      legitimate use is bursty. A user who makes a quick sequence of requests and then pauses is normal,
      and a limiter that rejects the burst because it momentarily exceeds the average rate punishes
      legitimate bursty behaviour. The token-bucket model provides burst tolerance cleanly.

      A token bucket holds tokens up to a capacity, refilled at a steady rate; each request consumes a
      token, and a request with no token available is limited. The refill rate sets the sustained rate the
      entity is allowed, and the bucket capacity sets how large a burst it can make before the sustained
      rate constrains it. An entity that has been idle accumulates tokens up to capacity and can spend them
      in a burst, then is held to the refill rate once the bucket empties. This matches legitimate
      behaviour: bursts are tolerated up to the bucket capacity, and sustained excess is throttled to the
      refill rate.

      In smart rate limiting, both the refill rate and the bucket capacity are per-entity and adaptive. The
      refill rate is the entity's adaptive sustained threshold from the baseline; the bucket capacity is
      its tolerated burst size, also derived from the entity's normal burstiness. A heavy integration with
      a high baseline gets a high refill rate and a large bucket; a casual user gets a low refill rate and a
      small bucket. This lets the limiter tolerate each entity's characteristic burst pattern while
      constraining sustained excess -- the power user's large legitimate bursts pass, while an exfiltration
      script that tries to sustain a high rate empties its small bucket and is throttled to the refill rate.
      The token bucket is the mechanism that makes the adaptive threshold tolerant of legitimate burstiness
      without loosening the sustained constraint.

  part_4:
    title: 'Risk-Weighted Limiting: Detection and Enforcement Reinforce Each Other'
    body: |
      The adaptive threshold so far depends only on the entity's rate baseline. Risk-weighted limiting adds
      a second input: the entity's risk score from the profile of 13.10. The limit is tightened for
      entities with an elevated risk profile and loosened for entities with a clean, trusted history, so
      that two entities with the same rate baseline are limited differently according to how suspicious
      each is.

      This makes detection and enforcement reinforce each other in a virtuous loop. An entity that the
      behavioural layer has flagged -- for prior rate abuse, an injection-success signal from 13.06, a
      fingerprint divergence, or membership in a coordinated cluster -- carries an elevated risk score, and
      risk-weighted limiting translates that score into a tighter rate limit. The suspicious entity is thus
      both flagged for analysts and operationally constrained, without waiting for a separate enforcement
      decision. Conversely, an entity with a long clean history carries a low risk score and is granted a
      more generous limit, so the system's trusted power users are not constrained by limits sized for the
      general population. The risk score, read inline as a precomputed value per the 13.01 latency coupling,
      modulates the adaptive threshold on every request cheaply.

      Risk weighting also provides a graceful response to uncertainty. When an entity's behaviour is
      ambiguous -- elevated but not conclusively abusive -- a hard block is too aggressive and doing nothing
      is too permissive. Risk-weighted limiting tightens the limit proportionally to the risk, applying
      pressure that scales with suspicion: a slightly elevated entity gets a slightly tighter limit, a
      strongly suspect entity gets a sharply tighter one. This proportional response is more robust than a
      binary block-or-allow decision, because it degrades gracefully across the spectrum of suspicion rather
      than forcing every entity into one of two buckets, and it buys time for the slower, more confident
      detectors to confirm or clear the entity while the tightened limit already constrains potential abuse.

  part_5:
    title: 'Graduated Response: Throttle, Challenge, Block'
    body: |
      A single hard cutoff -- block the entity the moment it exceeds its limit -- is the crudest
      enforcement, and it has two defects. It offers no recovery path for a false positive: a legitimate
      entity wrongly limited is simply cut off, with no way to demonstrate it is legitimate. And it gives
      the adversary a clear, binary signal of exactly where the limit is, which they can probe and then
      operate just beneath. Graduated response replaces the hard cutoff with a sequence of escalating
      enforcement actions that degrade the adversary's throughput while preserving a path for the
      legitimate entity to recover.

      The first stage is throttling: the entity's requests are slowed rather than rejected, its effective
      rate reduced toward its adaptive limit. Throttling degrades an exfiltration campaign's throughput --
      making the campaign take far longer and raising its cost -- while a legitimate entity experiencing a
      temporary spike is merely slowed, not broken. The second stage is challenge: the entity is asked to
      prove it is legitimate -- a proof-of-work, a re-authentication, a CAPTCHA-equivalent for the API
      context -- which a legitimate user or integration can satisfy and an automated abuse script generally
      cannot, or can only at significant added cost. The challenge is the recovery path: it lets a wrongly-
      limited legitimate entity demonstrate its legitimacy and have its limit restored. The third stage is
      blocking, reserved for entities that fail the challenge or whose abuse is confirmed: a hard stop for
      the cases where throttling and challenge have not resolved the situation.

      The escalation through these stages is driven by the persistence and severity of the abuse signal and
      by the risk score. An entity that briefly exceeds its limit and then returns to normal never advances
      past throttling; an entity that sustains abuse through throttling is challenged; an entity that fails
      the challenge is blocked. This graduated path means a false positive is recoverable at the throttle or
      challenge stage, the adversary's throughput is degraded at every stage rather than only at a final
      cutoff, and the hard block -- the only irrecoverable action -- is applied only after the softer stages
      have failed to resolve the case. Graduated response is strictly better than a hard cutoff on both the
      false-positive and the adversary-throughput dimensions.

  part_6:
    title: 'Multi-Dimensional Composition and the Denial-of-Service Own-Goal'
    body: |
      Rate limiting applies across several dimensions at once -- per user, per endpoint, per credential, per
      source IP -- and these limits compose. An entity is constrained by its per-user limit, but also by the
      per-endpoint limit on the endpoint it is hitting, the per-credential limit on the key it is using, and
      the per-source limit on its origin. Composing these dimensions catches abuse that a single dimension
      misses: the distributed campaign of 13.07 that stays under every per-account limit is caught by the
      per-source or per-credential limit that aggregates across its accounts.

      But multi-dimensional composition introduces a serious failure mode that must be designed against: the
      denial-of-service own-goal. If a limit is applied at a dimension an adversary shares with legitimate
      entities, the adversary can deliberately exhaust that shared limit to deny service to the legitimate
      entities that share the dimension. The classic case is a per-source-IP limit applied to a shared NAT
      or proxy: an adversary behind the same IP as many legitimate users can exhaust the per-IP limit and
      lock out every legitimate user behind that IP. The limiter, intended to stop the adversary, becomes a
      tool the adversary uses to deny service to others. A per-endpoint global limit has the same hazard: an
      adversary can saturate a shared endpoint limit to lock out all users of that endpoint.

      Avoiding the own-goal shapes how composition is done. Limits that an adversary can deliberately exhaust
      to harm others must isolate per-entity effects rather than punishing a shared dimension collectively. A
      shared-source limit, instead of a hard collective cap that one entity can exhaust for all, gives each
      entity behind the source its own adaptive allocation and only the abusive entity is constrained, so an
      adversary cannot consume the legitimate entities' share. Where a genuinely shared resource must be
      protected with a collective limit, the limit is sized and the abusive contributors are identified and
      throttled individually so the collective limit is reached by the abuser's traffic, not borne by the
      legitimate users. The composition is designed so that tightening a limit in response to abuse
      constrains the abuser specifically and does not hand the adversary a lever to deny service to others.
      With this discipline, multi-dimensional composition catches the distributed and shared-resource abuse
      that single-dimension limiting misses, without becoming an attack tool. The enforcement outcomes from
      all dimensions feed back into the entity profile of 13.10, closing the loop: a throttle, challenge, or
      block raises the entity's risk, which tightens its future adaptive limit, so the entity and rate
      families continuously reinforce each other.

