deliverables:

  deliverable_1:
    title: 'Smart Rate Limiter with Adaptive Token Bucket'
    filename: 'smart_rate_limiter.py'
    description: 'An adaptive token-bucket rate limiter with per-entity refill rates and bucket capacities derived from the entity baseline, providing burst tolerance while constraining sustained excess. Implements the adaptive thresholds and token bucket from Section 13.08 Parts 2 and 3.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # smart_rate_limiter.py
      # Section 13.08: Smart Rate Limiter (Adaptive Token Bucket)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict


      @dataclass
      class TokenBucket:
          capacity: float
          refill_per_s: float
          tokens: float
          last_ts: float

          def allow(self, now: float, cost: float = 1.0) -> bool:
              # Refill based on elapsed time
              elapsed = max(0.0, now - self.last_ts)
              self.tokens = min(self.capacity, self.tokens + elapsed * self.refill_per_s)
              self.last_ts = now
              if self.tokens >= cost:
                  self.tokens -= cost
                  return True
              return False


      @dataclass
      class AdaptiveRateLimiter:
          # multipliers turning the baseline into refill rate and burst capacity
          refill_multiplier: float = 1.5
          burst_multiplier: float = 10.0
          buckets: Dict[str, TokenBucket] = field(default_factory=dict)

          def _bucket_for(self, entity: str, baseline_rate_per_s: float, now: float) -> TokenBucket:
              if entity not in self.buckets:
                  refill = max(baseline_rate_per_s * self.refill_multiplier, 0.001)
                  capacity = max(refill * self.burst_multiplier, 1.0)
                  self.buckets[entity] = TokenBucket(capacity, refill, capacity, now)
              return self.buckets[entity]

          def allow(self, entity: str, baseline_rate_per_s: float, now: float) -> bool:
              return self._bucket_for(entity, baseline_rate_per_s, now).allow(now)


      if __name__ == '__main__':
          limiter = AdaptiveRateLimiter()

          # Power user: high baseline (5/s) -- large bursts allowed
          allowed_power = sum(1 for i in range(60) if limiter.allow('power', 5.0, 1000.0 + i * 0.05))
          # Casual user: low baseline (0.2/s) -- a burst of the same shape is throttled
          allowed_casual = sum(1 for i in range(60) if limiter.allow('casual', 0.2, 1000.0 + i * 0.05))

          print(f'Power user (baseline 5/s):  {allowed_power}/60 rapid requests allowed')
          print(f'Casual user (baseline 0.2/s): {allowed_casual}/60 rapid requests allowed')
          print('The same burst is tolerated for the power user and throttled for the')
          print('casual user, because the bucket is sized from each entity baseline.')

  deliverable_2:
    title: 'Risk-Weighted Limiter'
    filename: 'risk_weighted_limiter.py'
    description: 'Modulates the adaptive rate limit by the entity risk score, tightening the limit for suspicious entities and loosening it for trusted ones, so detection and enforcement reinforce each other. Implements the risk-weighted limiting from Section 13.08 Part 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; the risk score is read as a precomputed inline value per the 13.01 latency coupling'
    code: |
      # risk_weighted_limiter.py
      # Section 13.08: Risk-Weighted Rate Limiting
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass


      @dataclass
      class RiskWeightedLimit:
          base_limit_per_s: float

          def effective_limit(self, risk_score: float) -> float:
              # risk_score in [0, 1]: 0 = trusted (loosen), 1 = highly suspect (tighten)
              # Trusted entities get up to 1.5x; suspect entities down toward 0.1x
              if risk_score <= 0.2:
                  factor = 1.5 - risk_score  # 1.5 down to 1.3
              elif risk_score >= 0.8:
                  factor = max(0.1, 1.0 - risk_score)  # 0.2 down to 0.1
              else:
                  # linear interpolation in the middle band
                  factor = 1.3 - (risk_score - 0.2) * (1.3 - 0.2) / 0.6
              return round(self.base_limit_per_s * factor, 3)


      if __name__ == '__main__':
          rwl = RiskWeightedLimit(base_limit_per_s=10.0)
          for risk in [0.0, 0.1, 0.3, 0.5, 0.7, 0.9, 1.0]:
              print(f'risk={risk:.1f} -> effective limit {rwl.effective_limit(risk):>6} req/s')
          print('Two entities with the same baseline get very different limits by risk:')
          print('a trusted entity is loosened, a suspect entity is sharply tightened,')
          print('so a flagged entity is both alerted and operationally constrained.')

  deliverable_3:
    title: 'Graduated Response Engine'
    filename: 'graduated_response_engine.py'
    description: 'Escalates enforcement through throttle, challenge, and block based on the persistence and severity of the abuse signal and the risk score, with a false-positive recovery path at the throttle and challenge stages. Implements the graduated response from Section 13.08 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # graduated_response_engine.py
      # Section 13.08: Graduated Response Engine
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Dict


      class Stage(Enum):
          NORMAL = 'normal'
          THROTTLE = 'throttle'
          CHALLENGE = 'challenge'
          BLOCK = 'block'


      @dataclass
      class EntityEnforcement:
          stage: Stage = Stage.NORMAL
          over_limit_streak: int = 0
          challenge_failed: bool = False


      @dataclass
      class GraduatedResponseEngine:
          throttle_after: int = 1
          challenge_after: int = 4
          states: Dict[str, EntityEnforcement] = field(default_factory=dict)

          def _state(self, entity: str) -> EntityEnforcement:
              return self.states.setdefault(entity, EntityEnforcement())

          def update(self, entity: str, over_limit: bool, risk_score: float, challenge_passed: bool = None) -> Stage:
              st = self._state(entity)

              # Challenge resolution path (recovery for false positives)
              if st.stage == Stage.CHALLENGE and challenge_passed is not None:
                  if challenge_passed:
                      st.stage = Stage.NORMAL
                      st.over_limit_streak = 0
                      return st.stage
                  st.challenge_failed = True
                  st.stage = Stage.BLOCK
                  return st.stage

              if not over_limit:
                  # Return toward normal when behaviour normalises
                  st.over_limit_streak = max(0, st.over_limit_streak - 1)
                  if st.over_limit_streak == 0 and st.stage == Stage.THROTTLE:
                      st.stage = Stage.NORMAL
                  return st.stage

              st.over_limit_streak += 1
              # High risk escalates faster
              challenge_at = self.challenge_after - (2 if risk_score > 0.8 else 0)

              if st.over_limit_streak >= challenge_at:
                  st.stage = Stage.CHALLENGE
              elif st.over_limit_streak >= self.throttle_after:
                  st.stage = Stage.THROTTLE
              return st.stage


      if __name__ == '__main__':
          eng = GraduatedResponseEngine()

          print('Brief spike then normal (legitimate):')
          for over in [True, False, False]:
              print('  ', eng.update('user_a', over, risk_score=0.2).value)

          print('Sustained abuse, high risk (escalates to challenge, fails, blocks):')
          e = 'user_b'
          for over in [True, True]:
              print('  ', eng.update(e, over, risk_score=0.9).value)
          print('  ', eng.update(e, True, risk_score=0.9, challenge_passed=False).value)
          print('Graduated response recovers the legitimate spike and blocks only the')
          print('sustained abuser that fails the challenge.')

  deliverable_4:
    title: 'Multi-Dimension Rate Composer'
    filename: 'multi_dimension_rate_composer.py'
    description: 'Composes rate limits across user, endpoint, credential, and source dimensions while isolating per-entity effects on shared dimensions to avoid the denial-of-service own-goal. Implements the multi-dimensional composition from Section 13.08 Part 6.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # multi_dimension_rate_composer.py
      # Section 13.08: Multi-Dimension Rate Composer (DoS-Own-Goal-Safe)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Dict, List, Tuple


      @dataclass
      class DimensionLimit:
          name: str
          shared: bool   # True if multiple entities share this dimension key


      @dataclass
      class CompositionResult:
          allowed: bool
          binding_dimension: str
          detail: str


      class MultiDimensionComposer:
          def __init__(self) -> None:
              # per-(dimension, key, entity) allocations; shared dims isolate by entity
              self.usage: Dict[Tuple[str, str, str], float] = {}

          def check(
              self,
              entity: str,
              dims: List[Tuple[DimensionLimit, str, float]],  # (dim, key, per-entity allocation)
              cost: float = 1.0,
          ) -> CompositionResult:
              # An entity is allowed only if it passes EVERY dimension.
              # On shared dimensions, each entity has its OWN allocation, so one
              # entity cannot exhaust the shared key to deny others.
              for dim, key, allocation in dims:
                  usage_key = (dim.name, key, entity)  # entity in key => per-entity isolation
                  used = self.usage.get(usage_key, 0.0)
                  if used + cost > allocation:
                      return CompositionResult(False, dim.name, f'{dim.name}={key} allocation exhausted for {entity}')
              # passed all -> commit usage
              for dim, key, allocation in dims:
                  usage_key = (dim.name, key, entity)
                  self.usage[usage_key] = self.usage.get(usage_key, 0.0) + cost
              return CompositionResult(True, '', 'allowed on all dimensions')


      if __name__ == '__main__':
          composer = MultiDimensionComposer()
          source = DimensionLimit('source_ip', shared=True)
          user = DimensionLimit('user', shared=False)

          # An adversary and a legitimate user share a NAT source IP.
          # Each has its OWN per-entity allocation on the shared source dimension.
          adversary_dims = [(user, 'adversary', 5.0), (source, '203.0.113.9', 5.0)]
          legit_dims = [(user, 'legit', 5.0), (source, '203.0.113.9', 5.0)]

          # Adversary exhausts its own allocation
          adv_results = [composer.check('adversary', adversary_dims) for _ in range(7)]
          adv_allowed = sum(1 for r in adv_results if r.allowed)
          # Legit user behind the SAME IP is unaffected
          legit_results = [composer.check('legit', legit_dims) for _ in range(5)]
          legit_allowed = sum(1 for r in legit_results if r.allowed)

          print(f'Adversary allowed: {adv_allowed}/7 (exhausts its own source allocation)')
          print(f'Legit user behind same IP allowed: {legit_allowed}/5 (unaffected)')
          print('Per-entity allocation on the shared source prevents the adversary from')
          print('denying service to the legitimate user behind the same IP.')

common_mistakes:

  mistake_1:
    description: 'Using a single global static rate limit and accepting that it fails for either power users or abusers'
    why_it_happens: |
      A static global limit is the default rate-limiting mechanism, trivially simple to configure and
      reason about. It is what most API frameworks provide out of the box, and a single number feels like a
      clean, fair policy that treats all entities equally.
    consequence: |
      A single number cannot serve a population of entities whose legitimate normals differ by orders of
      magnitude. Set high to protect the power user, it shelters the low-and-slow abuser that runs just
      beneath it; set low to catch the abuser, it throttles the legitimate power user on every ordinary
      hour. The static limit fails in one direction or the other no matter where it is set, because it sees
      only rate and the power user and the abuser can share a rate.
    correct_approach: |
      Derive each entity's limit from its own baseline so the limit is relative to that entity's normal --
      high for the heavy integration, low for the casual user -- and the same absolute rate is within limit
      for one and over limit for another. smart_rate_limiter.py sizes each entity's bucket from its baseline
      rate, resolving the static-limit dilemma.

  mistake_2:
    description: 'Enforcing a flat per-window maximum with no burst tolerance, punishing legitimate bursty use'
    why_it_happens: |
      A flat maximum per window -- N requests per minute, rejected once exceeded -- is the most direct way
      to express a rate limit. It is easy to implement with a simple counter, and it appears to enforce the
      intended rate exactly.
    consequence: |
      Legitimate use is bursty: a user makes a quick sequence of requests and then pauses, which is normal
      behaviour. A flat per-window maximum rejects the burst because it momentarily exceeds the average
      rate, breaking legitimate bursty interaction, while still allowing a perfectly steady abuser at the
      maximum sustained rate. The rigid limit punishes the bursty legitimate user and accommodates the
      steady abuser.
    correct_approach: |
      Use a token bucket with per-entity capacity and refill rate: the capacity tolerates bursts up to the
      entity's normal burst size, and the refill rate constrains sustained excess. Legitimate bursts pass
      while sustained abuse empties the bucket and is throttled to the refill rate. smart_rate_limiter.py
      implements the adaptive token bucket.

  mistake_3:
    description: 'Limiting purely on rate without incorporating the entity risk score, so detection and enforcement do not reinforce each other'
    why_it_happens: |
      Rate limiting is conceptually about rate, so limiting on rate alone feels complete. Wiring the entity
      risk score into the limit adds a dependency on the profiling family and seems like mixing concerns
      that are cleaner kept separate.
    consequence: |
      An entity the behavioural layer has flagged as suspicious -- for prior abuse, an injection success, a
      fingerprint divergence -- gets the same rate limit as a trusted entity with the same baseline, so the
      detection signal does not translate into enforcement. The suspicious entity operates at full allowance
      until a separate enforcement decision is made, and the trusted power user is constrained by limits
      sized for the general population. Detection and enforcement run in parallel without reinforcing each
      other.
    correct_approach: |
      Weight the limit by the entity risk score, tightening it for suspicious entities and loosening it for
      trusted ones, so a flagged entity is both alerted and operationally constrained and a clean power user
      is granted headroom. The proportional response also handles ambiguous cases gracefully, applying
      pressure that scales with suspicion. risk_weighted_limiter.py modulates the limit by risk.

  mistake_4:
    description: 'Applying a single hard cutoff at the limit, leaving no recovery path for false positives'
    why_it_happens: |
      A hard block at the limit is the simplest enforcement and feels the most decisive -- the entity
      exceeded its limit, so stop it. It requires no challenge mechanism and no multi-stage state, and it
      appears to be the strongest possible response to abuse.
    consequence: |
      A hard cutoff has no recovery path for a false positive: a legitimate entity wrongly limited is simply
      cut off, breaking its access with no way to demonstrate legitimacy, which is a severe outcome for the
      legitimate users a false positive inevitably hits. It also gives the adversary a clean binary signal
      of exactly where the limit is, to probe and operate just beneath.
    correct_approach: |
      Use graduated response -- throttle, then challenge, then block -- so the adversary's throughput is
      degraded at every stage while a wrongly-limited legitimate entity can recover by passing the challenge,
      and the irrecoverable hard block is reserved for confirmed abuse or a failed challenge.
      graduated_response_engine.py escalates through the stages with a recovery path.

  mistake_5:
    description: 'Composing limits on shared dimensions with a collective cap, creating a denial-of-service own-goal'
    why_it_happens: |
      A per-source-IP or per-endpoint limit is a natural way to catch distributed abuse and protect shared
      resources, and a single collective cap on the shared key is the obvious implementation. It looks like
      it correctly constrains the aggregate traffic on the shared dimension.
    consequence: |
      A collective cap on a shared dimension can be exhausted by an adversary to deny service to the
      legitimate entities that share it. An adversary behind a shared NAT can saturate the per-IP collective
      limit and lock out every legitimate user behind that IP; an adversary can saturate a shared per-
      endpoint cap to lock out all users of the endpoint. The limiter meant to stop the adversary becomes a
      tool the adversary uses to deny service to others.
    correct_approach: |
      On shared dimensions, give each entity its own allocation rather than a collective cap, so only the
      abusive entity is constrained and an adversary cannot consume the legitimate entities' share. Where a
      genuinely shared resource needs a collective limit, identify and throttle the abusive contributors
      individually so the legitimate users are not collectively punished. multi_dimension_rate_composer.py
      isolates per-entity allocations on shared dimensions to prevent the own-goal.

section_summary:

  compact: |
    A static rate limit fails in both directions at once: set high to protect a legitimate power user it
    shelters the low-and-slow abuser running just beneath it, and set low to constrain the abuser it
    throttles the power user on every ordinary hour, because rate alone cannot separate two entities that
    share a rate. Section 13.08 replaces it with an adaptive, per-entity, risk-weighted limiter. Each
    entity's threshold is learned from its 13.03 baseline, so it is limited relative to its own normal, and
    a token bucket with per-entity refill rate and capacity tolerates each entity's characteristic
    burstiness while constraining sustained excess. Risk-weighted limiting modulates the threshold by the
    entity's risk score from 13.10 -- read inline as a precomputed value -- so a flagged entity is both
    alerted and constrained while a trusted power user gets headroom, and detection and enforcement reinforce
    each other. Graduated response escalates through throttle, challenge, and block rather than a single hard
    cutoff, degrading the adversary's throughput at every stage while preserving a recovery path for false
    positives at the throttle and challenge stages. Multi-dimensional composition across user, endpoint,
    credential, and source catches distributed and shared-resource abuse, but must isolate per-entity
    allocations on shared dimensions to avoid the denial-of-service own-goal where an adversary exhausts a
    shared limit to deny service to others. Enforcement outcomes feed back into the entity profile, closing
    the loop with the entity family.

  key_takeaways:
    - 'A static rate limit fails in both directions: set high it shelters the low-and-slow abuser, set low it throttles the power user, because rate alone cannot separate two entities that share a rate'
    - 'The adaptive limit is learned per entity from its 13.03 baseline, so each entity is limited relative to its own normal and the same absolute rate is within limit for one entity and over limit for another'
    - 'A token bucket with per-entity refill rate and capacity tolerates each entity characteristic burstiness while constraining sustained excess, where a flat per-window maximum would punish legitimate bursty use'
    - 'Risk-weighted limiting modulates the threshold by the entity risk score so a flagged entity is both alerted and constrained, making detection and enforcement reinforce each other'
    - 'Graduated response -- throttle, challenge, block -- degrades the adversary at every stage while preserving a false-positive recovery path, strictly better than a single hard cutoff on both dimensions'
    - 'Multi-dimensional composition catches distributed and shared-resource abuse but must isolate per-entity allocations on shared dimensions to avoid the denial-of-service own-goal where an adversary exhausts a shared limit to deny others'

preview_section_13_09:
  title: 'Section 13.09: Multi-Turn Context Analysis -- Accumulation and Escalation Across a Conversation'
  summary: |
    Section 13.09 returns to the session family for the attack the per-turn classifiers were built to
    miss: the multi-turn jailbreak where each turn passes the per-turn classifier and the trajectory across
    turns is the attack. It builds detection for accumulation attacks that assemble a harmful capability
    from individually benign turns, escalation attacks that ratchet steadily toward a constraint boundary,
    and context-window manipulation that pushes system constraints out of the model attention. It applies
    sequence modelling over the turn stream -- the Chapter 12 GRU detector lifted from the request to the
    session level -- and extracts trajectory features (classifier-score slope, topic-drift velocity,
    refusal-then-retry) building on the session model of 13.02. It covers the published Crescendo and
    many-shot multi-turn families and their behavioural signatures, and maintains a per-session threat
    accumulator that integrates risk across turns so a conversation of many small increments crosses a
    threshold no single turn reaches -- pairing with the self-consistency monitor of 13.06 to observe a
    multi-turn injection and its success together.

