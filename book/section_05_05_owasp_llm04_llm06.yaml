# ============================================================================
# SECTION SUMMARY
# ============================================================================

section_summary:
  one_paragraph: |
    Section 5.5 provides the full technical treatment of OWASP LLM04, LLM05,
    and LLM06. The section opens by establishing that these three risks operate
    at different timescales and require distinct detection strategies: LLM04
    (rate-based, real-time), LLM05 (integrity-based, pre-deployment), and LLM06
    (content-based, query-time). LLM04 (Model DoS) is examined through six attack
    vectors — context flooding, recursive loops, sponge examples, multi-turn
    context accumulation, recursive tool calls, and cost attacks via compromised
    keys — with a five-layer mitigation architecture providing input limits, output
    limits, per-user token budgets, real-time cost monitoring, and per-request
    compute timeouts, including a complete rate-limiting configuration reference
    for three deployment types. LLM05 (Supply Chain Vulnerabilities) covers the
    pickle deserialisation RCE attack pattern, the full HuggingFace ecosystem risk
    taxonomy (namespace squatting, account compromise, dependency confusion, poisoned
    adapters, ML framework CVEs), and a six-check artefact verification pipeline
    from SafeTensors format validation through behavioural regression testing. LLM06
    (Sensitive Information Disclosure) covers the memorisation tension, the Carlini
    et al. verbatim recall research, four attack vectors (verbatim training data
    extraction, system prompt extraction, context window leakage, inference-time PII),
    and a five-control mitigation architecture including training data filtering,
    differential privacy, output PII scanning, RAG access control, and canary token
    monitoring. Three implementations deliver a token budget manager with attack
    simulation, a six-check model artefact verification pipeline, and a PII detection
    filter with canary monitoring.

  next_section: |
    Section 5.6 — OWASP LLM07-LLM10: Insecure Plugin Design, Excessive Agency,
    Overreliance, and Model Theft
    The final four OWASP risks complete the landscape. LLM07 and LLM08 cover
    the agentic AI threat surface — the risks unique to LLM systems that can take
    actions in the world. LLM09 addresses hallucination as an adversarially
    exploitable property. LLM10 closes with model theft and extraction — the attack
    that turns the investment in training into the adversary's asset.

