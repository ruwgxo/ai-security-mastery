# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    LLM04, LLM05, and LLM06 require fundamentally different detection strategies
    operating at different timescales: LLM04 is rate-based (real-time, seconds to
    minutes), LLM05 is integrity-based (pre-deployment, intake to deploy gate),
    and LLM06 is content-based (query-time, every output). Applying the same
    detection approach to all three is a programme design error.

  takeaway_02: |
    Token-based billing makes LLM04 unique among DoS attacks. Financial damage is
    irrecoverable — consumed tokens cannot be refunded. Real-time cost monitoring
    with hard budget caps is a mandatory control, not optional. Silent billing
    DoS (discovered at month-end) is a predictable outcome of missing this control.

  takeaway_03: |
    Transformer attention scales O(n²) with context length. Doubling input length
    quadruples attention compute cost. Context window limits are resource exhaustion
    controls as much as they are user experience constraints. Every application
    should enforce an input token limit well below the model's maximum context window.

  takeaway_04: |
    Loading a PyTorch .pkl or .bin model file executes arbitrary Python code.
    This is documented, by-design behaviour of Python's pickle module applied to
    untrusted data from the internet. SafeTensors format is the definitive fix.
    Any organisation loading pickle-format models from public repositories without
    a controlled review process has an unmitigated RCE exposure on every machine
    that loads those models.

  takeaway_05: |
    The HuggingFace ecosystem is the npm moment for ML — a public registry with
    minimal security tooling at scale. Namespace squatting, account compromise,
    and poisoned adapters are real, documented attack vectors. The correct posture
    is an internal model registry with explicit approval gating, not trust-on-download
    from public repositories.

  takeaway_06: |
    Model memorisation is simultaneously the mechanism that makes LLMs useful
    (factual recall, few-shot learning) and the root cause of LLM06. There is no
    way to keep the capability while eliminating the vulnerability entirely. Defence
    must be layered: training data filtering (reduce the signal), differential privacy
    (add noise), output scanning (catch the symptom), and canary tokens (confirm incidents).

  takeaway_07: |
    Canary tokens are the most reliable LLM06 detection mechanism. Unlike PII
    scanners (which have false positives and false negatives), canary token detection
    has zero false positives by design. Any organisation that has fine-tuned a model
    on sensitive data should have canary tokens embedded in that data.

  takeaway_08: |
    RAG access control is the highest-priority LLM06 remediation for most
    multi-user deployments. Default RAG implementations do not restrict retrieval
    by user access scope. A user who uploads a confidential document to a shared
    RAG deployment has their document retrievable by any other user with a
    semantically similar query. User-scoped retrieval filters are not optional.

