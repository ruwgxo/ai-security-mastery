section_overview:
  one_line_summary: The production monitoring dashboard assembles the observability signals into an operable
    interface -- gateway health, detection rates, latency, and cost views, integrated with the behavioural
    monitoring views of Section 13.11 -- and pairs SLO-driven alerting with on-call runbooks so an alert
    is an actionable incident response rather than just a number that changed.
  why_this_section_exists: |-
    Section 14.08 produced the raw observability signals: metrics, structured logs, and traces
    that make the gateway measurable. Raw signals are necessary but not operable. A pile of
    metrics and a stream of logs are not something a security or platform team can watch and
    act on; they need to be assembled into an interface that presents the health of the gateway
    at a glance, tells someone when to act, and says what to do when they must. This section
    builds that interface. It assembles the 14.08 signals into a dashboard with four production
    views -- gateway health, detection rates, latency, and cost -- and integrates the
    behavioural monitoring views from Section 13.11, entity risk, drift, and coordinated
    networks, so that the operational state and the threat state sit in one picture. It turns
    metrics into alerts, but tuned against service level objectives and error budgets rather
    than raw thresholds, because an alert that fires constantly is ignored and alert fatigue is
    itself a failure mode. And it pairs each alert with an on-call runbook, a defined
    diagnose-mitigate-escalate response, so the dashboard drives incident response for
    detection outages instead of merely reporting them. The dashboard is the operational
    interface that makes the observable gateway of 14.08 something a team actually runs.
  position_in_chapter: |-
    Section 14.09 is the second of the two operability sections (14.08-14.09) and completes the
    operability stage. Where 14.08 instrumented the signals, this section assembles them into
    the operational interface with alerting and runbooks. With the gateway now observable and
    operable, one production concern from the 14.01 taxonomy remains: cost. Section 14.10 opens
    the cost stage, and the cost view surfaced on this dashboard is where the optimisation it
    performs will be measured.
