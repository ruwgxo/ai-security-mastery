prose_content:
  part_1:
    title: From Signals to an Operable Interface
    body: |-
      Section 14.08 ended with a gateway that is measurable: every detection outcome updates a
      metric, writes a structured log event, and records a trace span. That is a genuine
      achievement -- the black box has been opened -- but it is not yet operability. A team
      does not operate a system by reading raw metric streams and grepping logs; those are the
      materials of operation, not the interface to it. Between the signals and the people who
      must act on them sits the dashboard, and building it is what turns an observable gateway
      into an operable one.

      The distinction matters because operability is a human property, not just a technical
      one. The question this section answers is not can the gateway be measured -- 14.08
      settled that -- but can a security or platform engineer look at the gateway and know, in
      seconds, whether it is healthy, and if not, what to do. That requires assembling the
      signals into views that present health at a glance, surfacing the moments that need
      attention as alerts, and attaching to each alert the response it calls for. A dashboard
      that shows every metric but privileges none is barely better than the raw signals; an
      operable dashboard is a deliberate summary built for the person on call.

      So this section is an exercise in assembly and curation rather than new instrumentation.
      It does not produce new signals -- 14.08 did that -- it arranges the existing signals
      into the four views a detection gateway needs, integrates the behavioural views from
      Chapter 13, and layers on the alerting and runbooks that make the whole thing
      actionable. The output is the operational interface for the security and platform teams:
      the single place they look to run the gateway day to day and the place they turn to when
      something goes wrong.
  part_2:
    title: The Four Production Views
    body: |-
      The production side of the dashboard is organised into four views, each answering one
      operational question, and together they cover the health of the gateway. The views are
      gateway health, detection rates, latency, and cost, and they map directly onto the
      concerns the chapter has engineered.

      The gateway health view answers whether the gateway is serving correctly right now. It
      surfaces the error rate, the fail-open and fail-closed counts from Section 14.06, the
      number of open circuit breakers from Section 14.07, and the saturation. These are the
      signals that say the gateway is or is not operating properly, and a glance at this view
      is the first thing an on-call engineer checks. The detection rates view answers how much
      is being flagged and by which detector -- the flag rate per detector, the mix of
      verdicts, the traffic per tier -- which is what tells the security team whether detection
      is behaving as expected or whether a rate has shifted suspiciously.

      The latency view answers whether the gateway is within its budget: the inline P99 against
      the sub-50ms budget from Section 14.04, the per-detector percentiles, and the headroom
      remaining. This is where a latency regression shows up before it becomes a breach. The
      cost view answers whether the gateway is staying affordable -- cost per million requests,
      cost per detector, cost per tier -- and it is worth being clear about the boundary here:
      this view surfaces the cost signal so it can be watched, but the optimisation of that
      cost, the sampling and caching and batching, is the subject of Section 14.10. The
      dashboard shows the cost; the next section acts on it. The dashboard deliverable for this
      section renders all four views from a signal snapshot, so a single look conveys health,
      detection, latency, and cost together.
  part_3:
    title: Integrating the Behavioural Views
    body: |-
      The four production views answer operational questions -- is the gateway fast, healthy,
      affordable, flagging as expected. They do not answer the security question of what is
      actually happening in the threat landscape, and that question has its own views, built
      back in Section 13.11: entity risk, drift, and coordinated networks. This section brings
      those behavioural views onto the same dashboard as the production signals, because an
      operator needs both.

      The reason the two must sit together is that operational health and threat state are
      independent, and either can be fine while the other is not. A gateway can be perfectly
      healthy operationally -- P99 within budget, no open breakers, low error rate -- while a
      coordinated campaign is building that only the behavioural views would reveal. Conversely,
      a spike in entity risk means little if the gateway is simultaneously shedding load and
      dropping requests, because the risk scores may be computed on incomplete data. Seeing the
      entity risk view next to the gateway health view lets an operator interpret each in light
      of the other: a risk spike during a healthy period is a real signal, while the same spike
      during a saturation event needs to be read with caution.

      Integrating them is therefore not just convenience but correctness of interpretation. The
      behavioural views from 13.11 -- top risk entities, feature drift, detected clusters --
      are placed alongside the production views so the security and platform teams have a
      single picture of both the operational state and the threat state. The view specification
      deliverable for this section lays out exactly which production and behavioural views
      compose the dashboard and what each answers, making explicit that the production signals
      of 14.08 and the behavioural monitoring of 13.11 are two halves of one operational
      picture rather than separate dashboards a team must mentally join.
  part_4:
    title: Alerting Without Alert Fatigue
    body: |-
      A dashboard tells you the state of the gateway when you look at it, but no one watches a
      dashboard continuously, so the dashboard must be able to summon attention when something
      needs it. That is alerting, and alerting has a characteristic failure mode that is as
      dangerous as having no alerts at all: alert fatigue. An alert that fires constantly, for
      conditions that turn out not to matter, trains the on-call to ignore it, and an ignored
      alert is worse than no alert because it creates false confidence that someone would be
      told if things went wrong.

      The way to avoid alert fatigue is to alert on objectives rather than on raw thresholds.
      A raw-threshold alert -- page whenever the P99 exceeds fifty milliseconds -- fires on
      every brief blip, most of which are transient and self-correcting, and it quickly becomes
      noise. An objective-based alert instead asks whether a service level objective is at
      risk. The latency SLO might be that the inline P99 stays within budget for 99.9 per cent
      of a rolling window; the alert fires not on a single excursion but when the error budget
      -- the small allowed fraction of non-compliance -- is burning fast enough to threaten
      that objective. A momentary spike that stays within budget pages no one; sustained
      degradation that will breach the SLO does. This is the difference between alerting on the
      signal and alerting on what the signal means for the objective.

      Service level objectives and error budgets are therefore the foundation of the alerting,
      not an add-on. The SLO states the promise -- latency within budget, error rate below a
      bound, no essential breaker open -- and the error budget quantifies how much deviation is
      tolerable before the promise is broken. Alerts map to budget burn, so they fire when
      action is genuinely needed and stay quiet when it is not. The alerting and SLO
      configuration deliverable for this section encodes these objectives and their budgets,
      and the dashboard deliverable evaluates alerts against them, so that every alert that
      reaches a human corresponds to an objective actually at risk.
  part_5:
    title: 'Runbooks: From Alert to Action'
    body: |-
      An alert that fires for a real, objective-threatening condition has done half its job: it
      has told the on-call engineer that something is wrong. The other half is telling them
      what to do about it, and an alert that stops at the notification is merely informative --
      it raises an alarm and leaves the responder to figure out the response from scratch,
      under time pressure, possibly at three in the morning. Pairing each alert with a runbook
      is what closes that gap.

      A runbook is a defined response to a specific alert, and a good one has three parts:
      diagnose, mitigate, escalate. The diagnose steps say where to look first -- which view,
      which panel, which log query -- to turn the alert into an understanding of the cause. A
      latency-SLO alert sends the responder to the latency view to see which detector rose,
      then to the saturation panel to see whether the tier is overloaded. The mitigate steps
      say what to do about the likely causes -- scale the inline tier if it is saturated,
      confirm a slow detector timeout and breaker if one detector is the problem. And the
      escalate step says when the on-call should hand off -- if the mitigation does not
      restore the objective, page the detection owner or the security lead. The runbook
      template deliverable for this section provides exactly this structure for the key
      detection-gateway alerts.

      Runbooks are what make the dashboard drive incident response rather than merely observe
      incidents. With them, a detection outage has a defined path from signal to resolution:
      the SLO is breached, the alert fires, the runbook diagnoses and mitigates, and if
      necessary escalates. The responder is never staring at a red number wondering where to
      begin. This is especially important for a security control, where the degraded state
      often means the gateway is failing closed on an essential detector -- denying legitimate
      traffic to preserve security -- and the responder needs to restore the detector quickly
      and confirm the essential path is still serving, exactly the sequence a runbook encodes.
  part_6:
    title: The Operational Interface and What Remains
    body: |-
      Assembled, integrated, alerted, and runbooked, the dashboard is now the operational
      interface for the security and platform teams. It is the single place they look to
      answer, at a glance, whether the gateway is healthy, whether detection is behaving,
      whether the latency budget holds, what the threat landscape looks like, and what the
      gateway costs. It is where alerts arrive when an objective is at risk, and where the
      runbooks that resolve those alerts begin. The observable gateway of 14.08 has become an
      operable one, which is what the operability half of the 14.01 taxonomy demanded.

      It is worth naming what the dashboard is and is not. It is the interface onto the signals
      produced in 14.08 and the behavioural views produced in 13.11; it does not compute new
      detection or new signals, it presents and acts on existing ones. Its job is to make the
      system operable by the people responsible for it, and it succeeds when an engineer who
      has never seen a particular incident can, through the views, the alerts, and the
      runbooks, diagnose and resolve it. That is the measure of operability, and it is the
      measure this section has built toward.

      With operability complete, the gateway is placed, fast, scalable, resilient, and now
      observable and operable. One concern from the taxonomy remains unaddressed: cost. The
      cost view on this dashboard shows what the gateway costs per million requests, per
      detector, and per tier, but showing the cost is not controlling it. A gateway with no
      cost discipline is switched off when the bill arrives, however well it performs, and
      keeping it affordable is the last thing that stands between a working system and a
      sustainable one. Section 14.10 opens the cost stage, applying sampling, caching, and
      batching to bring the cost this dashboard measures within a bound the gateway can
      sustain.
