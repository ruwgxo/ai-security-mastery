deliverables:
  deliverable_1:
    title: Production Monitoring Dashboard
    filename: production_monitoring_dashboard.py
    description: Renders the four production views -- gateway health, detection rates, latency, and cost
      -- from a signal snapshot fed by the Section 14.08 observability stack, and evaluates SLO-driven
      alerts each paired with a runbook reference, demonstrating a healthy gateway and a degraded one
      where the alerts fire with their runbooks.
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      enum and dataclasses only, renders the four views and the SLO-driven alerts for a healthy and a
      degraded scenario.
    code: |
      # production_monitoring_dashboard.py
      # Section 14.09: The Production Monitoring Dashboard
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Dict, List, Optional


      class AlertLevel(Enum):
          OK = 'ok'
          WARN = 'warn'
          PAGE = 'page'


      # --- Signal snapshot fed from the 14.08 observability stack (not re-instrumented here) ---
      @dataclass
      class GatewaySignals:
          inline_p99_ms: float
          latency_budget_ms: float
          requests_per_sec: float
          error_rate: float
          fail_closed_rate: float
          saturation_pct: float          # in-flight vs capacity
          detection_rate: float          # fraction of traffic flagged
          open_breakers: int
          cost_per_million_usd: float


      # --- SLOs: the objectives the dashboard and alerting are built on ---
      @dataclass
      class SLO:
          name: str
          objective: str
          breach_predicate: str


      SLOS: List[SLO] = [
          SLO('Latency SLO', 'inline P99 <= budget for 99.9% of the window', 'inline_p99_ms > latency_budget_ms'),
          SLO('Availability SLO', 'error rate <= 0.5% over the window', 'error_rate > 0.005'),
          SLO('Detection-integrity SLO', 'no essential breaker open', 'open_breakers > 0'),
      ]


      @dataclass
      class Alert:
          view: str
          level: AlertLevel
          message: str
          runbook: str


      def evaluate_alerts(s: GatewaySignals) -> List[Alert]:
          '''Turn signals into SLO-driven alerts. Alerts map to objectives, not raw thresholds,
          so an alert means an objective is at risk -- which is what makes it worth paging on.
          Each alert carries the runbook step so it is actionable, not merely informative.
          '''
          alerts: List[Alert] = []
          if s.inline_p99_ms > s.latency_budget_ms:
              alerts.append(Alert('Latency', AlertLevel.PAGE,
                                  f'inline P99 {s.inline_p99_ms:.0f}ms over budget {s.latency_budget_ms:.0f}ms',
                                  'RUNBOOK-LAT: check saturation and slow detectors; scale inline tier'))
          elif s.inline_p99_ms > 0.9 * s.latency_budget_ms:
              alerts.append(Alert('Latency', AlertLevel.WARN,
                                  f'inline P99 {s.inline_p99_ms:.0f}ms within 10% of budget',
                                  'RUNBOOK-LAT: watch trend; pre-emptive scale if traffic rising'))
          if s.error_rate > 0.005:
              alerts.append(Alert('Gateway health', AlertLevel.PAGE,
                                  f'error rate {s.error_rate:.2%} over 0.5% SLO',
                                  'RUNBOOK-ERR: identify failing detector via error-rate-by-detector; check breakers'))
          if s.open_breakers > 0:
              alerts.append(Alert('Gateway health', AlertLevel.PAGE,
                                  f'{s.open_breakers} essential breaker(s) open -- degraded detection',
                                  'RUNBOOK-BRK: confirm degraded-mode essential path; investigate detector dependency'))
          if s.saturation_pct > 85.0:
              alerts.append(Alert('Gateway health', AlertLevel.WARN,
                                  f'saturation {s.saturation_pct:.0f}% -- shedding likely soon',
                                  'RUNBOOK-SAT: scale the saturated tier ahead of backpressure'))
          if not alerts:
              alerts.append(Alert('Gateway health', AlertLevel.OK, 'all SLOs within objective', 'no action'))
          return alerts


      def render_dashboard(s: GatewaySignals) -> None:
          print('=' * 84)
          print('PRODUCTION MONITORING DASHBOARD')
          print('The operational interface for the security and platform teams')
          print('=' * 84)

          print()
          print('VIEW 1 -- GATEWAY HEALTH')
          print(f'  Error rate      : {s.error_rate:.2%}   Fail-closed rate: {s.fail_closed_rate:.2%}')
          print(f'  Saturation      : {s.saturation_pct:.0f}%    Open breakers   : {s.open_breakers}')

          print()
          print('VIEW 2 -- DETECTION RATES')
          print(f'  Traffic flagged : {s.detection_rate:.2%} of {s.requests_per_sec:.0f} rps')

          print()
          print('VIEW 3 -- LATENCY')
          budget_use = 100.0 * s.inline_p99_ms / s.latency_budget_ms
          print(f'  Inline P99      : {s.inline_p99_ms:.0f}ms of {s.latency_budget_ms:.0f}ms budget '
                f'({budget_use:.0f}% of budget)')

          print()
          print('VIEW 4 -- COST')
          print(f'  Cost/million req: ${s.cost_per_million_usd:.2f}   (optimisation is Section 14.10)')

          print()
          print('=' * 84)
          print('ALERTS (SLO-driven, each with a runbook)')
          print('=' * 84)
          for a in evaluate_alerts(s):
              print(f'  [{a.level.value.upper():<4}] {a.view}: {a.message}')
              if a.level is not AlertLevel.OK:
                  print(f'         -> {a.runbook}')


      def demo() -> None:
          healthy = GatewaySignals(
              inline_p99_ms=38.0, latency_budget_ms=50.0, requests_per_sec=18000.0,
              error_rate=0.002, fail_closed_rate=0.001, saturation_pct=62.0,
              detection_rate=0.017, open_breakers=0, cost_per_million_usd=4.20)
          degraded = GatewaySignals(
              inline_p99_ms=54.0, latency_budget_ms=50.0, requests_per_sec=26000.0,
              error_rate=0.011, fail_closed_rate=0.009, saturation_pct=91.0,
              detection_rate=0.024, open_breakers=1, cost_per_million_usd=5.80)
          print('SCENARIO A: HEALTHY GATEWAY')
          render_dashboard(healthy)
          print()
          print('SCENARIO B: DEGRADED GATEWAY (alerts fire with runbooks)')
          render_dashboard(degraded)


      if __name__ == '__main__':
          demo()
  deliverable_2:
    title: Dashboard View Specification
    filename: dashboard_view_specification.py
    description: Specifies the dashboard views -- the four production views from the 14.08 signals and
      the entity-risk, drift, and coordinated-network views integrated from Section 13.11 -- with the
      question each answers and its panels, making explicit that the production and behavioural views
      are two halves of one operational picture.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the production and behavioural view specifications and the rationale for integrating them.
    code: |
      # dashboard_view_specification.py
      # Section 14.09: Dashboard View Specification (Production + 13.11 Behavioural Views)
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class DashboardView:
          name: str
          source: str            # 'production' (14.08 signals) or 'behavioural' (13.11 views)
          panels: List[str]
          answers: str


      VIEWS: List[DashboardView] = [
          DashboardView(
              name='Gateway Health',
              source='production',
              panels=['Error rate', 'Fail-open/fail-closed counts', 'Open breakers', 'Saturation'],
              answers='Is the gateway serving correctly right now?',
          ),
          DashboardView(
              name='Detection Rates',
              source='production',
              panels=['Flag rate per detector', 'Verdict mix', 'Traffic per tier'],
              answers='How much is being flagged, and by which detector?',
          ),
          DashboardView(
              name='Latency',
              source='production',
              panels=['Inline P99 vs budget', 'Per-detector percentiles', 'Latency budget headroom'],
              answers='Is the gateway within its latency budget?',
          ),
          DashboardView(
              name='Cost',
              source='production',
              panels=['Cost per million requests', 'Cost per detector', 'Cost per tier'],
              answers='Is the gateway staying affordable? (optimisation in 14.10)',
          ),
          DashboardView(
              name='Entity Risk (13.11)',
              source='behavioural',
              panels=['Top risk entities', 'Risk score distribution'],
              answers='Which entities are behaving suspiciously?',
          ),
          DashboardView(
              name='Drift (13.11)',
              source='behavioural',
              panels=['Feature drift', 'Baseline deviation'],
              answers='Has the traffic or model behaviour drifted from baseline?',
          ),
          DashboardView(
              name='Coordinated Networks (13.11)',
              source='behavioural',
              panels=['Detected clusters', 'Cross-entity correlation'],
              answers='Are entities acting together in a coordinated campaign?',
          ),
      ]


      def print_spec(views: List[DashboardView]) -> None:
          print('=' * 88)
          print('DASHBOARD VIEW SPECIFICATION')
