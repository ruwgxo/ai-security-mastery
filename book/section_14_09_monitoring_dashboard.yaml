  deliverable_3:
    title: Alerting and SLO/Error-Budget Configuration
    filename: alerting_slo_config.py
    description: Defines the service level objectives for the detection gateway -- latency, availability,
      and detection-integrity -- with their targets and windows, and the error budgets that alerting burns
      against, so alerts fire on budget burn rather than on every threshold crossing and alert fatigue
      is avoided.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the SLOs and their error budgets with the budget burned and its state.
    code: |
      # alerting_slo_config.py
      # Section 14.09: Alerting and SLO/Error-Budget Configuration
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class SLOConfig:
          name: str
          target_pct: float          # e.g. 99.9 means 99.9% of the window must comply
          window_days: int
          signal: str


      @dataclass
      class ErrorBudget:
          slo: str
          allowed_bad_fraction: float
          consumed_fraction: float

          def remaining_fraction(self) -> float:
              return max(0.0, self.allowed_bad_fraction - self.consumed_fraction)

          def budget_burned_pct(self) -> float:
              if self.allowed_bad_fraction == 0:
                  return 0.0
              return 100.0 * self.consumed_fraction / self.allowed_bad_fraction


      SLOS: List[SLOConfig] = [
          SLOConfig('Latency SLO', 99.9, 28, 'inline P99 <= 50ms'),
          SLOConfig('Availability SLO', 99.5, 28, 'request error rate <= 0.5%'),
          SLOConfig('Detection-integrity SLO', 99.9, 28, 'no essential breaker open'),
      ]

      BUDGETS: List[ErrorBudget] = [
          ErrorBudget('Latency SLO', allowed_bad_fraction=0.001, consumed_fraction=0.0004),
          ErrorBudget('Availability SLO', allowed_bad_fraction=0.005, consumed_fraction=0.0046),
          ErrorBudget('Detection-integrity SLO', allowed_bad_fraction=0.001, consumed_fraction=0.0002),
      ]


      def print_slos(slos: List[SLOConfig]) -> None:
          print('=' * 84)
          print('SERVICE LEVEL OBJECTIVES')
          print('Alerts map to SLOs, not raw thresholds, so an alert means an objective is at risk')
          print('=' * 84)
          header = 'SLO'.ljust(28) + 'Target'.ljust(10) + 'Window'.ljust(10) + 'Signal'
          print(header)
          print('-' * 84)
          for s in slos:
              print(s.name.ljust(28) + f'{s.target_pct}%'.ljust(10) + f'{s.window_days}d'.ljust(10) + s.signal)
          print('-' * 84)


      def print_budgets(budgets: List[ErrorBudget]) -> None:
          print()
          print('=' * 84)
          print('ERROR BUDGETS (alerting on burn rate, not on every threshold crossing)')
          print('=' * 84)
          for b in budgets:
              burned = b.budget_burned_pct()
              state = 'OK' if burned < 75 else ('WARN' if burned < 100 else 'EXHAUSTED')
              print(f'  {b.slo}')
              print(f'    allowed bad: {b.allowed_bad_fraction:.4f}   consumed: {b.consumed_fraction:.4f}   '
                    f'burned: {burned:.0f}% [{state}]')
          print()
          print('An alert fires when the error budget is burning too fast, not each time a metric')
          print('crosses a line. This is what prevents alert fatigue: a brief blip that stays within')
          print('budget does not page anyone, while sustained burn that threatens the SLO does. An')
          print('alert that fires constantly is ignored, so alerts are tied to budget, not raw values.')


      if __name__ == '__main__':
          print_slos(SLOS)
          print_budgets(BUDGETS)
  deliverable_4:
    title: On-Call Runbook Template
    filename: oncall_runbook_template.py
    description: Provides on-call runbooks for the key detection-gateway alerts -- inline latency over
      budget and an essential breaker open -- each structured as diagnose, mitigate, and escalate steps,
      so an alert is an actionable incident response and the dashboard drives incident response rather
      than merely reporting it.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the diagnose-mitigate-escalate runbook for each key alert.
    code: |
      # oncall_runbook_template.py
      # Section 14.09: On-Call Runbook Template for Detection-Gateway Incidents
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class RunbookStep:
          order: int
          action: str


      @dataclass
      class Runbook:
          alert_id: str
          title: str
          triggered_by: str
          diagnose: List[RunbookStep]
          mitigate: List[RunbookStep]
          escalate: str


      RUNBOOKS: List[Runbook] = [
          Runbook(
              alert_id='RUNBOOK-LAT',
              title='Inline latency over budget',
              triggered_by='Latency SLO burn: inline P99 > 50ms sustained',
              diagnose=[
                  RunbookStep(1, 'Open the Latency view; identify which detector percentile rose'),
                  RunbookStep(2, 'Check the Saturation panel: is the inline tier saturated?'),
                  RunbookStep(3, 'Check traffic: is this a load spike or a slow detector?'),
              ],
              mitigate=[
                  RunbookStep(1, 'If saturated: scale the inline tier (14.05 autoscaling)'),
                  RunbookStep(2, 'If one detector is slow: confirm its timeout (14.04) and breaker (14.07)'),
              ],
              escalate='If P99 stays over budget after scaling, page the detection owner',
          ),
          Runbook(
              alert_id='RUNBOOK-BRK',
              title='Essential breaker open -- degraded detection',
              triggered_by='Detection-integrity SLO: an essential breaker is open',
              diagnose=[
                  RunbookStep(1, 'Open Gateway Health; identify which essential detector tripped'),
                  RunbookStep(2, 'Query structured logs (14.08) for that detector error verdicts'),
                  RunbookStep(3, 'Confirm degraded-mode essential path is still serving (14.06/14.07)'),
              ],
              mitigate=[
                  RunbookStep(1, 'Investigate the detector dependency (model artifact, downstream service)'),
                  RunbookStep(2, 'Once healthy, confirm the breaker half-opens and closes'),
              ],
              escalate='If an essential detector cannot be restored, escalate to security lead: the gateway is failing closed on that detector',
          ),
      ]


      def print_runbook(rb: Runbook) -> None:
          print('=' * 84)
          print(f'{rb.alert_id}: {rb.title}')
          print('=' * 84)
          print(f'Triggered by: {rb.triggered_by}')
          print()
          print('DIAGNOSE:')
          for s in rb.diagnose:
              print(f'  {s.order}. {s.action}')
          print()
          print('MITIGATE:')
          for s in rb.mitigate:
              print(f'  {s.order}. {s.action}')
          print()
          print(f'ESCALATE: {rb.escalate}')


      def print_all(runbooks: List[Runbook]) -> None:
          print('ON-CALL RUNBOOK TEMPLATE FOR DETECTION-GATEWAY INCIDENTS')
          print('Each alert pairs with a runbook so an alert is an actionable response, not just a number')
          print()
          for rb in runbooks:
              print_runbook(rb)
              print()
          print('=' * 84)
          print('WHY RUNBOOKS')
          print('=' * 84)
          print('An alert without a runbook is merely informative: it tells the on-call that something')
          print('is wrong but not what to do. Pairing each alert with a diagnose-mitigate-escalate')
          print('runbook makes the alert actionable and makes the dashboard drive incident response,')
          print('so a detection-gateway outage has a defined path from signal to resolution.')


      if __name__ == '__main__':
          print_all(RUNBOOKS)
common_mistakes:
  mistake_1:
    description: Treating the raw observability signals as if they were already operable, with no assembled
      dashboard
    why_it_happens: |-
      Once metrics, logs, and traces exist, the hard instrumentation work feels done, and it
      is easy to assume a team can just query the signals directly when they need to.
    consequence: Operators face raw metric streams and log queries with no curated view of health, so
      nobody can tell at a glance whether the gateway is healthy, and problems are noticed late because
      there is no interface presenting the state.
    correct_approach: Assemble the signals into a dashboard with curated views -- gateway health, detection,
      latency, cost -- built for the person on call, so the operational state is visible at a glance rather
      than reconstructed from raw signals each time.
  mistake_2:
    description: Showing the production signals without integrating the Section 13.11 behavioural views
    why_it_happens: |-
      The production signals are the new work of this chapter and feel like the whole picture,
      while the behavioural views live in a different chapter and are easy to treat as a
      separate concern on a separate dashboard.
    consequence: Operators see operational health but not the threat state, so a coordinated campaign
      builds during an operationally healthy period with nothing on the dashboard revealing it, or a risk
      spike is misread because the concurrent saturation that undermines it is on a different screen.
    correct_approach: Integrate the 13.11 behavioural views -- entity risk, drift, coordinated networks
      -- alongside the production views, so operational health and threat state sit in one picture and
      each is interpreted in light of the other.
  mistake_3:
    description: Alerting on raw thresholds so alerts fire constantly and are ignored
    why_it_happens: |-
      Raw-threshold alerts are the simplest to configure -- page when the P99 exceeds the
      budget -- and they feel appropriately cautious because they never miss a crossing.
    consequence: The alert fires on every transient blip, most of which self-correct, so the on-call learns
      to ignore it, and an ignored alert creates false confidence that someone would be told when something
      genuinely breaks.
    correct_approach: Map alerts to service level objectives and error budgets so an alert fires when
      the budget is burning fast enough to threaten the objective, not on every threshold crossing, keeping
      alerts meaningful and avoiding alert fatigue.
  mistake_4:
    description: Firing alerts with no runbook, leaving the on-call to devise a response from scratch
    why_it_happens: |-
      Getting the alert to fire feels like the deliverable, and writing a runbook for each
      alert is extra work that seems unnecessary when the responder is assumed to know the
      system.
    consequence: When the alert fires the responder knows only that something is wrong, not what to do,
      so incident response is slow, inconsistent, and dependent on who happens to be on call, exactly
      when a security control may be failing closed and denying legitimate traffic.
    correct_approach: Pair every alert with a diagnose-mitigate-escalate runbook so the alert is actionable
      and the dashboard drives incident response, giving a detection outage a defined path from signal
      to resolution regardless of who is on call.
  mistake_5:
    description: Confusing showing the cost with controlling it, and expecting the dashboard to keep the
      gateway affordable
    why_it_happens: |-
      The cost view puts the number front and centre, so surfacing it can feel like the cost
      problem is handled, as if visibility alone were control.
    consequence: The cost is watched but never acted on, so it keeps rising while everyone assumes the
      dashboard has it covered, and the gateway drifts toward the bill that gets it switched off despite
      the cost being plainly visible the whole time.
    correct_approach: Use the cost view to measure and watch the cost, but recognise that controlling
      it -- sampling, caching, batching -- is the work of Section 14.10; the dashboard surfaces the cost
      signal so the optimisation has something to measure against.
section_summary:
  compact: |-
    The production monitoring dashboard assembles the Section 14.08 observability signals into
    an operable interface, because raw signals are the materials of operation, not the
    interface to it, and operability is the human question of whether an engineer can tell at
    a glance if the gateway is healthy and know what to do if not. It presents four production
    views -- gateway health (error rate, fail-open/closed counts, open breakers, saturation),
    detection rates, latency against the budget, and cost -- and integrates the Section 13.11
    behavioural views of entity risk, drift, and coordinated networks, so operational health
    and threat state, which are independent, sit in one picture and each is interpreted in
    light of the other. Alerting maps to service level objectives and error budgets rather
    than raw thresholds, because an alert that fires constantly is ignored and alert fatigue
    is itself a failure mode: an SLO states the promise, the error budget quantifies tolerable
    deviation, and alerts fire on budget burn that threatens the objective, so brief blips
    page no one while sustained degradation does. Each alert pairs with an on-call runbook of
    diagnose, mitigate, and escalate steps, so an alert is an actionable incident response
    rather than merely informative, and the dashboard drives incident response with a defined
    path from signal to resolution. The dashboard is the operational interface for the
    security and platform teams; it presents and acts on existing signals rather than
    computing new ones, and the cost view it surfaces is where the optimisation of Section
    14.10 will be measured.
  key_takeaways:
  - The dashboard assembles the raw observability signals into an operable interface, because raw signals
    are the materials of operation, not the interface a team can watch and act on
  - Four production views -- gateway health, detection rates, latency, and cost -- present the health
    of the gateway at a glance from the Section 14.08 signals
  - Integrating the Section 13.11 behavioural views puts operational health and threat state in one picture,
    so each is interpreted in light of the other
  - Alerting maps to service level objectives and error budgets rather than raw thresholds, firing on
    budget burn that threatens the objective to avoid the alert fatigue that makes alerts ignored
  - Each alert pairs with a diagnose-mitigate-escalate runbook, turning an alert into an actionable incident
    response and making the dashboard drive incident response
  - The dashboard is the operational interface that presents and acts on existing signals; it surfaces
    the cost view but controlling cost -- sampling, caching, batching -- is Section 14.10
preview_section_14_10:
  title: 'Cost Optimisation: Sampling, Caching, and Batching'
  summary: |-
    The dashboard surfaces what the gateway costs; Section 14.10 controls it. It opens the cost
    stage on the principle that a detection system with no cost discipline is switched off when
    the bill arrives, so cost optimisation is a survival requirement. It works through the cost
    drivers -- inference, compute per tier, storage for state -- and the three levers: sampling
    to run expensive detection on a representative subset, caching to reuse results for repeated inputs, and batching to amortise per-call overhead. It covers the cost-versus-
    coverage trade-off and where sampling is safe, and attributes cost per detector and per
    tier. It is the cost section, acting on the cost this dashboard measures.
