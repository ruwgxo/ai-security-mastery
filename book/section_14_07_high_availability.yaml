deliverables:
  deliverable_1:
    title: Circuit Breaker with Closed/Open/Half-Open States
    filename: circuit_breaker.py
    description: Implements a circuit breaker with the three states and their transitions -- tripping
      from closed to open after a failure threshold, moving to half-open after the open duration, and
      closing on confirmed recovery or re-opening on a failed trial -- and integrates it with the failure
      policy so an essential detector short-circuits to fail-closed and a droppable one to graceful degradation.
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      time and enum only, demonstrates the full closed-open-half-open-closed cycle on a broken-then-recovered
      detector.
    code: |
      # circuit_breaker.py
      # Section 14.07: Circuit Breaker with Closed/Open/Half-Open States and Graceful Degradation
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      import time
      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Callable, List, Optional


      class BreakerState(Enum):
          CLOSED = 'closed'        # normal: calls pass through
          OPEN = 'open'            # cut off: calls short-circuit without touching the detector
          HALF_OPEN = 'half_open'  # testing recovery: a trial call is allowed through


      @dataclass
      class BreakerConfig:
          failure_threshold: int       # consecutive failures before opening
          open_duration_s: float       # how long to stay open before testing recovery
          half_open_successes: int     # successes in half-open needed to close again


      @dataclass
      class CircuitBreaker:
          name: str
          config: BreakerConfig
          state: BreakerState = BreakerState.CLOSED
          consecutive_failures: int = 0
          half_open_success_count: int = 0
          opened_at: Optional[float] = None

          def _now(self) -> float:
              return time.monotonic()

          def allow_request(self) -> bool:
              '''Decide whether a call is allowed through, advancing open -> half-open on timeout.

              A closed breaker allows everything. An open breaker short-circuits until the
              open duration elapses, then moves to half-open to test recovery. A half-open
              breaker allows the trial call through.
              '''
              if self.state is BreakerState.OPEN:
                  if self.opened_at is not None and (self._now() - self.opened_at) >= self.config.open_duration_s:
                      self.state = BreakerState.HALF_OPEN
                      self.half_open_success_count = 0
                      return True
                  return False
              return True

          def record_success(self) -> None:
              if self.state is BreakerState.HALF_OPEN:
                  self.half_open_success_count += 1
                  if self.half_open_success_count >= self.config.half_open_successes:
                      self.state = BreakerState.CLOSED
                      self.consecutive_failures = 0
                      self.opened_at = None
              else:
                  self.consecutive_failures = 0

          def record_failure(self) -> None:
              if self.state is BreakerState.HALF_OPEN:
                  # A failure during recovery re-opens immediately.
                  self.state = BreakerState.OPEN
                  self.opened_at = self._now()
                  return
              self.consecutive_failures += 1
              if self.consecutive_failures >= self.config.failure_threshold:
                  self.state = BreakerState.OPEN
                  self.opened_at = self._now()


      @dataclass
      class CallResult:
          detector: str
          state: str
          executed: bool
          outcome: str


      def call_through_breaker(breaker: CircuitBreaker,
                               detector_fn: Callable[[], bool],
                               essential: bool) -> CallResult:
          '''Route a detector call through its breaker, degrading gracefully when open.

          When the breaker is open the detector is not called at all -- it is short-circuited.
          An essential detector short-circuits to a fail-closed block (the 14.06 policy);
          a droppable detector short-circuits to a fail-open skip (graceful degradation).
          '''
          if not breaker.allow_request():
              if essential:
                  return CallResult(breaker.name, breaker.state.value, False, 'short-circuit -> fail-closed (block)')
              return CallResult(breaker.name, breaker.state.value, False, 'short-circuit -> shed (graceful degradation)')
          try:
              flagged = detector_fn()
              breaker.record_success()
              return CallResult(breaker.name, breaker.state.value, True, 'flagged' if flagged else 'clean')
          except Exception as exc:  # noqa: BLE001 -- contained at the breaker boundary
              breaker.record_failure()
              return CallResult(breaker.name, breaker.state.value, True, f'errored ({exc}); recorded failure')


      def broken_detector() -> bool:
          raise RuntimeError('model artifact not loaded')


      def demo() -> None:
          print('=' * 82)
          print('CIRCUIT BREAKER: CLOSED -> OPEN -> HALF-OPEN -> CLOSED')
          print('=' * 82)
          cfg = BreakerConfig(failure_threshold=3, open_duration_s=0.05, half_open_successes=2)
          breaker = CircuitBreaker('Injection classifier', cfg)
          print(f'Config: open after {cfg.failure_threshold} failures, stay open {cfg.open_duration_s}s, '
                f'close after {cfg.half_open_successes} half-open successes')
          print()
          print('Phase 1: detector is broken -- breaker trips after the threshold')
          for i in range(1, 6):
              r = call_through_breaker(breaker, broken_detector, essential=True)
              print(f'  call {i}: state={r.state:<10} executed={r.executed} -> {r.outcome}')
          print()
          print(f'Breaker is now {breaker.state.value.upper()}: the broken detector is no longer called.')
          print('An essential detector short-circuits to fail-closed while open.')
          print()
          print('Phase 2: wait out the open duration, then the detector recovers')
          time.sleep(cfg.open_duration_s + 0.01)
          healthy = lambda: False
          for i in range(1, 4):
              r = call_through_breaker(breaker, healthy, essential=True)
              print(f'  call {i}: state={r.state:<10} executed={r.executed} -> {r.outcome}')
          print()
          print(f'Breaker is now {breaker.state.value.upper()}: recovery confirmed, calls flow normally again.')
          print()
          print('The breaker turned a broken detector from a per-request failure into a bounded,')
          print('recoverable state -- cut off while broken, tested for recovery, restored when healthy.')


      if __name__ == '__main__':
          demo()
  deliverable_2:
    title: Circuit Breaker State Machine Reference
    filename: circuit_breaker_state_machine.py
    description: 'Specifies the circuit breaker state machine as a reference: every transition with its
      triggering event, target state, and effect, plus the meaning of each state. Explains why the half-open
      state makes recovery safe by testing with trial calls before restoring full traffic.'
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the transition table and the meaning of each state.
    code: |
      # circuit_breaker_state_machine.py
      # Section 14.07: Circuit Breaker State Machine Reference
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class Transition:
          from_state: str
          event: str
          to_state: str
          effect: str


      TRANSITIONS: List[Transition] = [
          Transition('closed', 'failure below threshold', 'closed', 'Count the failure; keep serving calls'),
          Transition('closed', 'consecutive failures reach threshold', 'open', 'Trip: stop calling the detector'),
          Transition('closed', 'success', 'closed', 'Reset the consecutive-failure count'),
          Transition('open', 'open duration not yet elapsed', 'open', 'Short-circuit: call is not made'),
          Transition('open', 'open duration elapsed', 'half_open', 'Allow one trial call to test recovery'),
          Transition('half_open', 'trial success below success threshold', 'half_open', 'Count the success; allow another trial'),
          Transition('half_open', 'successes reach success threshold', 'closed', 'Recovery confirmed; resume normal calls'),
          Transition('half_open', 'trial failure', 'open', 'Recovery failed; re-open immediately'),
      ]


      def print_state_machine(transitions: List[Transition]) -> None:
          print('=' * 96)
          print('CIRCUIT BREAKER STATE MACHINE REFERENCE')
          print('Three states -- closed, open, half-open -- and the transitions between them')
          print('=' * 96)
          header = 'From'.ljust(12) + 'Event'.ljust(42) + 'To'.ljust(12) + 'Effect'
          print(header)
          print('-' * 96)
          for t in transitions:
              print(t.from_state.ljust(12) + t.event.ljust(42) + t.to_state.ljust(12) + t.effect)
          print('-' * 96)


      def state_meanings() -> None:
          print()
          print('=' * 96)
          print('WHAT EACH STATE MEANS')
          print('=' * 96)
          print('  CLOSED    : normal operation. Calls pass through; failures are counted.')
          print('  OPEN      : the detector is cut off. Calls short-circuit without touching it,')
          print('              so a broken detector is not retried into a cascade.')
          print('  HALF-OPEN : cautious recovery test. A limited number of trial calls are allowed;')
          print('              enough successes close the breaker, any failure re-opens it.')
          print()
          print('The half-open state is what makes recovery safe: the breaker does not slam back')
          print('to normal after a timeout and flood a still-broken detector -- it tests first with')
          print('a trial, and only restores full traffic once the detector proves it has recovered.')


      if __name__ == '__main__':
          print_state_machine(TRANSITIONS)
          state_meanings()
  deliverable_3:
    title: Graceful-Degradation Shed-Order Policy
    filename: graceful_degradation_policy.py
    description: Defines the order in which droppable detectors are shed under stress to free load, lowest-priority-first,
      while the essential security path is never shed. Operates the Section 14.06 essential-versus-droppable
      classification so the gateway degrades toward its security core rather than away from it.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the shed order to free a target load and the retained essential path.
    code: |
      # graceful_degradation_policy.py
      # Section 14.07: Graceful-Degradation Shed-Order Policy
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class DegradableDetector:
          name: str
          tier: str
          essential: bool
          shed_priority: int   # lower sheds first; essential detectors are never shed
          cost_weight: float   # relative load the detector adds, freed when shed


      # Priority 0 is shed first. Essential detectors carry no shed priority -- they are kept.
      DETECTORS: List[DegradableDetector] = [
          DegradableDetector('Batch analytics job', 'batch', False, 0, 4.0),
          DegradableDetector('Coordinated-network analysis', 'batch', False, 1, 3.0),
          DegradableDetector('Session behaviour scorer', 'near_real_time', False, 2, 2.0),
          DegradableDetector('Input PII audit tagger', 'inline', False, 3, 1.0),
          DegradableDetector('Output PII scanner', 'inline', True, 99, 1.5),
          DegradableDetector('Jailbreak classifier', 'inline', True, 99, 2.0),
          DegradableDetector('Injection classifier', 'inline', True, 99, 2.5),
      ]


      def shed_plan(detectors: List[DegradableDetector], load_to_shed: float) -> None:
          print('=' * 88)
          print('GRACEFUL-DEGRADATION SHED-ORDER POLICY')
          print(f'Under stress, shed droppable detectors in priority order to free ~{load_to_shed:.1f} load units')
          print('=' * 88)
          droppable = sorted([d for d in detectors if not d.essential], key=lambda d: d.shed_priority)
          essential = [d for d in detectors if d.essential]
          print()
          print('SHED ORDER (droppable detectors, shed first to last):')
          freed = 0.0
          shed_names: List[str] = []
          for d in droppable:
              if freed >= load_to_shed:
                  break
              freed += d.cost_weight
              shed_names.append(d.name)
              print(f'  shed #{d.shed_priority}: {d.name} [{d.tier}] frees {d.cost_weight:.1f} '
                    f'(cumulative {freed:.1f})')
          print()
          print(f'Shed {len(shed_names)} detector(s) to free {freed:.1f} load units.')
          print()
          print('ESSENTIAL PATH RETAINED (never shed):')
          for d in essential:
              print(f'  kept: {d.name} [{d.tier}]')
          print()
          print('Graceful degradation operates the 14.06 essential-versus-droppable classification:')
          print('it sheds the droppable detectors in a defined order to relieve load, and never')
          print('touches the essential security path. The gateway degrades to its core rather than')
          print('failing entirely, and the shed order is deliberate, not whichever detector fails first.')


      if __name__ == '__main__':
          shed_plan(DETECTORS, load_to_shed=6.0)
  deliverable_4:
    title: Bulkhead and Health-Check Configuration
    filename: bulkhead_health_check_config.py
    description: Configures a per-detector bulkhead -- an isolated pool with a concurrency cap and bounded
      queue -- so a slow or failing detector exhausts only its own resources, and defines the liveness
      and readiness health checks that restart a dead process versus pulling an alive-but-unfit instance
      from the load balancer.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the per-detector bulkhead configuration and the liveness/readiness health checks.
    code: |
      # bulkhead_health_check_config.py
      # Section 14.07: Bulkhead and Health-Check Configuration
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Dict, List


      @dataclass
      class Bulkhead:
          detector: str
          max_concurrent: int      # cap on in-flight calls to this detector
          thread_pool: str         # isolated pool name
          queue_limit: int         # bounded queue before rejecting


      @dataclass
      class HealthCheck:
          check: str
          kind: str                # 'liveness' or 'readiness'
          signal: str
          action_on_fail: str


      BULKHEADS: List[Bulkhead] = [
          Bulkhead('Injection classifier', 32, 'pool_injection', 16),
          Bulkhead('Jailbreak classifier', 32, 'pool_jailbreak', 16),
          Bulkhead('Output PII scanner', 24, 'pool_output_pii', 12),
          Bulkhead('Input PII audit tagger', 8, 'pool_audit', 4),
      ]

      HEALTH_CHECKS: List[HealthCheck] = [
          HealthCheck('Process liveness', 'liveness', 'process responds to ping', 'Restart the instance'),
          HealthCheck('Detector readiness', 'readiness', 'all essential breakers not open', 'Remove instance from the load balancer'),
          HealthCheck('Dependency readiness', 'readiness', 'model artifacts loaded and reachable', 'Do not receive traffic until ready'),
      ]


      def print_bulkheads(bulkheads: List[Bulkhead]) -> None:
          print('=' * 88)
          print('BULKHEAD CONFIGURATION')
          print('Each detector runs in an isolated pool so one cannot exhaust the shared resources')
          print('=' * 88)
          header = 'Detector'.ljust(28) + 'Max concurrent'.ljust(16) + 'Pool'.ljust(20) + 'Queue limit'
          print(header)
          print('-' * 88)
          for b in bulkheads:
              print(b.detector.ljust(28) + str(b.max_concurrent).ljust(16) + b.thread_pool.ljust(20) + str(b.queue_limit))
          print('-' * 88)
          print()
          print('Without bulkheads, a slow detector holds threads from a shared pool until none')
          print('remain, starving every other detector -- one fault becomes a total stall. With a')
          print('bounded per-detector pool and queue, a slow detector exhausts only its own pool')
          print('and is rejected past its queue limit, so the failure is contained to that detector.')


      def print_health_checks(checks: List[HealthCheck]) -> None:
          print()
          print('=' * 88)
          print('HEALTH-CHECK AND READINESS CONFIGURATION')
          print('=' * 88)
          for c in checks:
              print()
              print(f'CHECK: {c.check} [{c.kind}]')
              print(f'  Signal        : {c.signal}')
              print(f'  Action on fail: {c.action_on_fail}')
          print()
          print('Liveness answers whether the process is alive -- a failed liveness check restarts')
          print('the instance. Readiness answers whether the instance should receive traffic now --')
          print('a failed readiness check pulls the instance from the load balancer without killing')
          print('it, so an instance whose essential breaker is open stops receiving requests until')
          print('it recovers.')


      if __name__ == '__main__':
          print_bulkheads(BULKHEADS)
          print_health_checks(HEALTH_CHECKS)
common_mistakes:
  mistake_1:
    description: Deciding a failure policy but never cutting off a persistently failing detector
    why_it_happens: |-
      Once every detector has a fail-open or fail-closed policy, failure handling feels
      complete, and it is easy to miss that the policy resolves each failure without ever
      stopping the gateway from calling a detector that fails every time.
    consequence: The broken detector is called on every request only to be failed by policy, so the gateway
      pays its full latency, timeout wait, and load indefinitely for no benefit, and a hanging detector
      accumulates held resources across requests until the gateway stalls.
    correct_approach: Put a circuit breaker in front of each detector so a detector that fails repeatedly
      is cut off and its calls short-circuit, and let the existing failure policy resolve the short-circuited
      request rather than calling the broken detector again.
  mistake_2:
    description: Building a circuit breaker that jumps straight from open back to closed after the timeout,
      with no half-open state
    why_it_happens: |-
      Two states -- open and closed -- seem sufficient, and adding a half-open state looks like
      unnecessary complexity when a simple timeout could just reset the breaker.
    consequence: After the open duration the breaker sends full traffic straight to a detector that may
      still be broken, which trips it again immediately, producing a flapping loop that oscillates between
      open and closed and never gives the detector a controlled chance to recover.
    correct_approach: 'Include the half-open state: after the open duration allow a limited number of
      trial calls, close only if they succeed to a threshold, and re-open on any trial failure, so recovery
      is tested cautiously rather than by flooding a possibly still-broken detector.'
  mistake_3:
    description: Letting stress shed whichever detectors fail first instead of following a defined essential-first
      shed order
    why_it_happens: |-
      Under load, detectors that time out or trip naturally fall away on their own, so it can
      seem that degradation takes care of itself without an explicit shed policy.
    consequence: The detectors that happen to fail first under stress might be the essential ones, leaving
      the gateway serving traffic with its security core degraded while best-effort enrichment keeps running
      -- degradation in exactly the wrong direction.
    correct_approach: 'Define a graceful-degradation shed order from the Section 14.06 classification:
      shed droppable detectors first in a set priority, never shed the essential path, so the gateway
      degrades toward its security core rather than away from it.'
  mistake_4:
    description: Running all detectors from a shared thread or connection pool with no bulkhead isolation
    why_it_happens: |-
      A single shared pool is simpler to configure and uses resources efficiently in normal
      operation, so per-detector pools look like wasteful over-engineering until a detector
      hangs.
    consequence: A single hanging detector holds threads from the shared pool until none remain, starving
      every other detector and the request path itself, so one detector fault becomes a total gateway
      stall that the circuit breaker cannot even fix because it too needs resources.
    correct_approach: Give each detector its own bounded pool with a concurrency cap and queue limit,
      so a hanging or slow detector exhausts only its own compartment and is rejected past its cap, keeping
      the failure contained to that one detector.
  mistake_5:
    description: Conflating liveness and readiness, so an alive-but-unfit instance is either killed or
      kept serving
    why_it_happens: |-
      Both are health checks that return healthy or unhealthy, so they are easily treated as
      one signal, and the distinction between the process being alive and the instance being
      fit to serve is subtle.
    consequence: An instance whose essential breaker just opened or whose artifacts are still loading
      is either restarted needlessly -- it was not broken -- or kept in rotation and served requests it
      cannot properly inspect, both of which are wrong responses to an alive-but-unready instance.
    correct_approach: 'Separate liveness from readiness: restart the instance only on a failed liveness
      check when the process is stuck or dead, and on a failed readiness check pull the alive-but-unfit
      instance from the load balancer without killing it until its essential breakers close and its dependencies
      load.'
section_summary:
  compact: |-
    High availability keeps the gateway serving through component failures, and it requires
    mechanism rather than just the failure policy of Section 14.06: a policy fails a broken
    detector by rule but still calls it on every request, and a hanging detector can exhaust
    shared resources across requests until the gateway stalls. The circuit breaker is the
    primary mechanism -- it cuts off a detector that fails repeatedly, short-circuiting calls
    rather than retrying into a cascade, and moves through three states: closed (normal,
    counting failures), open (cut off after a failure threshold), and half-open (testing
    recovery with trial calls). The half-open state makes recovery safe, closing only on
    confirmed recovery and re-opening on a failed trial rather than flooding a still-broken
    detector. The breaker composes with the failure policy: an open essential detector
    short-circuits to fail-closed, an open droppable one to a skip, which is graceful
    degradation. Graceful degradation sheds non-essential detectors under stress in a defined
    order, operating the 14.06 essential-versus-droppable classification so the gateway
    degrades toward its security core rather than away from it. Bulkheads give each detector
    its own bounded resource pool so a slow or hanging detector exhausts only its own
    compartment, keeping one fault from starving the others. Health checks separate liveness
    (restart a dead process) from readiness (pull an alive-but-unfit instance from the load
    balancer), and readiness plus redundancy absorb the loss of an instance. Together these
    turn a detector fault from a gateway outage into a bounded, recoverable event.
  key_takeaways:
  - High availability keeps the gateway serving through component failures and needs mechanism, not just
    the failure policy, because a policy still calls a broken detector every request and cannot stop resource
    exhaustion across requests
  - The circuit breaker cuts off a repeatedly failing detector, short-circuiting calls rather than retrying
    into a cascade, and moves between closed, open, and half-open states
  - The half-open state makes recovery safe by testing with a limited number of trial calls before restoring
    full traffic, avoiding a flapping loop against a still-broken detector
  - Graceful degradation sheds non-essential detectors under stress in a defined order, operating the
    Section 14.06 essential-versus-droppable classification so the gateway degrades toward its security
    core
  - Bulkheads isolate each detector in its own bounded resource pool so a slow or hanging detector exhausts
    only its own compartment, preventing one fault from starving the whole gateway
  - Health checks separate liveness (restart a dead process) from readiness (pull an alive-but-unfit instance
    from rotation), and readiness with redundancy absorbs the loss of an instance -- turning a detector
    fault into a bounded, recoverable event
preview_section_14_08:
  title: 'Observability: Metrics, Logging, and Tracing'
  summary: |-
    Sections 14.06 and 14.07 made the gateway resilient -- but all of that behaviour is
    currently invisible. Section 14.08 opens the operability stage with observability, on the
    principle that a detection system you cannot see you cannot operate or trust. It covers the
    three complementary pillars -- metrics for aggregate health (detection rates, latencies,
    error rates, throughput per detector), logging for per-event audit detail, and tracing to
    follow a request through the tiers -- defines the golden signals for a detection gateway,
    and instruments each detector without adding latency. It makes the resilient behaviour
    engineered here something an operator can actually watch, and it is the precondition for
    the tuning of Chapter 17.
