document_info:
  title: High Availability, Circuit Breakers, and Graceful Degradation
  chapter: 14
  section: 7
  section_code: '1407'
  author: Raghav Dinesh
  github: https://github.com/ruwgxo/ai-security-mastery
  license: MIT
  version: '1.0'
  created: '2026-06-21'
  estimated_pages: 7
  estimated_reading_time: 50-60 minutes
section_overview:
  one_line_summary: 'High availability keeps the gateway serving through component failures: circuit breakers
    cut off a failing detector before it cascades, moving between closed, open, and half-open as they
    test recovery; graceful degradation sheds non-essential detectors under stress to keep the essential
    path serving; and bulkheads isolate failures so one detector cannot exhaust the shared resources the
    others need.'
  why_this_section_exists: |-
    Section 14.06 decided what a single failing detector does -- fail-open or fail-closed, per
    detector and per tier -- and classified detectors as essential or droppable. It stopped
    short of one thing: preventing a detector from failing repeatedly and dragging the gateway
    down with it. A policy that fails a detector closed on every request still calls the broken
    detector on every request, paying its latency and load each time, and a detector that hangs
    rather than errors can hold shared resources until the whole gateway stalls. Deciding the
    policy is necessary but not sufficient; the gateway also needs the mechanism that contains
    failure. This section builds it. The circuit breaker recognises a persistently failing
    detector and cuts it off -- short-circuiting calls rather than retrying into a cascade --
    and moves through closed, open, and half-open states so a recovered detector is restored
    safely rather than flooded. Graceful degradation operates the essential-versus-droppable
    classification from 14.06, shedding non-essential detectors under stress in a defined order
    so the essential security path keeps serving. Bulkheads isolate each detector in its own
    resource pool so a slow or failing detector exhausts only its own threads and connections,
    not the gateway. Health checks and readiness decide when an instance should receive traffic
    at all. Together they turn a detector fault from a gateway outage into a bounded,
    recoverable event, which is what high availability means for a detection gateway.
  position_in_chapter: |-
    Section 14.07 is the second of the two resilience sections (14.06-14.07) and the response to
    the availability concern from the 14.01 taxonomy. Where 14.06 set the failure policy, this
    section supplies the mechanism that enforces and contains it -- circuit breakers, graceful
    degradation, bulkheads, and health checks. It completes the resilience stage. With the
    gateway now fast, scalable, and resilient, the operability sections (14.08-14.09) make it
    observable, so the resilient behaviour engineered here can actually be seen, tuned, and
    trusted in production.
learning_objectives:
  knowledge:
  - Define high availability as keeping the detection gateway serving through component failures
  - Explain how a circuit breaker cuts off a failing detector before its failures cascade into the whole
    gateway
  - Describe the three circuit breaker states -- closed, open, half-open -- and the transitions and thresholds
    between them
  - Explain why the half-open state makes recovery safe by testing with trial calls before restoring full
    traffic
  - Describe graceful degradation as shedding non-essential detectors under stress, operating the essential-versus-droppable
    classification of Section 14.06
  - Explain how bulkheads isolate a detector failure so it cannot exhaust the shared threads and connections
    the other detectors need
  - Describe health checks and readiness and the difference between restarting an instance and removing
    it from the load balancer
  skills:
  - Implement a circuit breaker with closed, open, and half-open states and integrate it with the failure
    policy
  - Specify the circuit breaker state machine -- transitions, thresholds, and effects -- as a reference
  - Define a graceful-degradation shed-order policy that sheds droppable detectors first and never the
    essential path
  - Configure bulkheads and health checks that isolate detector failures and gate traffic on readiness
  security_mindset:
  - 'Recognise that deciding a failure policy is not enough: a persistently failing detector must be cut
    off, or it wastes work and can cascade'
  - Internalise that the half-open state prevents a recovery from flooding a still-broken detector, making
    failure recovery cautious by design
  - Understand that graceful degradation keeps the essential security detectors serving even when the
    full suite cannot run, so a partial failure never drops the security core
  - Appreciate that without bulkheads a single slow detector can starve every other detector of shared
    resources, turning one fault into a total stall
