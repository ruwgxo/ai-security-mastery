prose_content:
  part_1:
    title: From Failure Policy to Failure Containment
    body: |-
      Section 14.06 gave every detector a deliberate failure policy, and that closes one gap: a
      failing detector no longer takes an accidental path chosen by the bug. But it leaves
      another gap open. The policy says what to do each time a detector fails; it does not say
      what to do about a detector that fails every time. A broken detector under a fail-closed
      policy is still called on every single request, only to be failed closed after it errors
      or times out, so the gateway pays the detector cost -- its latency, its timeout wait, its
      load -- on every request for no benefit, and it does this indefinitely while the detector
      stays broken.

      Worse, some failures are not clean errors. A detector that hangs rather than raises does
      not return quickly to be failed by policy; it holds whatever resources it was using -- a
      thread, a connection, a slot in a pool -- for as long as it hangs. If many requests hit a
      hanging detector at once, they pile up holding resources, and those resources are often
      shared with the other detectors and the request path itself. A single hanging detector
      can in this way exhaust the resources the whole gateway needs, so one detector fault
      becomes a total stall. The failure policy has nothing to say about this, because it
      operates one request at a time and the problem is the accumulation across requests.

      High availability is the property of keeping the gateway serving through exactly these
      situations, and it requires mechanism, not just policy. The gateway needs to recognise a
      persistently failing detector and stop calling it; it needs to keep one detector failure
      from consuming the resources the others depend on; it needs to shed load intelligently
      when it cannot run everything; and it needs to decide when an instance is healthy enough
      to receive traffic. Those are the four mechanisms of this section -- circuit breakers,
      bulkheads, graceful degradation, and health checks -- and together they turn a detector
      fault from an outage into a bounded, recoverable event.
  part_2:
    title: The Circuit Breaker and Its Three States
    body: |-
      The circuit breaker is the primary mechanism of high availability, and it is borrowed
      directly from its electrical namesake: when something downstream keeps faulting, the
      breaker trips and cuts the circuit rather than letting the fault keep drawing current.
      For a detector, tripping means the gateway stops calling it and instead short-circuits
      the call -- resolving it immediately by policy without touching the broken detector at
      all. The broken detector is thereby cut off before its repeated failures cascade into
      the wider gateway.

      The breaker has three states. In the closed state -- the normal one -- calls pass through
      to the detector and the breaker simply counts failures. When consecutive failures reach
      a configured threshold, the breaker trips to the open state. In the open state the
      detector is cut off: calls short-circuit without being made, so a broken detector is no
      longer retried on every request. The breaker stays open for a configured duration, long
      enough for a transient fault to clear, and then moves to the half-open state to test
      whether the detector has recovered.

      The half-open state is what makes recovery safe, and it is the subtle part of the design.
      A naive breaker would slam straight from open back to closed after the timeout and
      immediately send full traffic to a detector that may still be broken, causing it to trip
      again in a flapping loop. The half-open state avoids this by allowing only a limited
      number of trial calls: if they succeed, enough to meet a success threshold, the breaker
      concludes the detector has recovered and closes; if any trial fails, the breaker
      concludes the detector is still broken and re-opens immediately without flooding it. The
      circuit breaker deliverable for this section implements exactly this cycle -- closed to
      open on repeated failure, open to half-open after the timeout, half-open to closed on
      confirmed recovery or back to open on a failed trial -- so a broken detector is isolated
      while broken and restored only once it proves healthy.
  part_3:
    title: Circuit Breakers and the Failure Policy Together
    body: |-
      The circuit breaker does not replace the failure policy of Section 14.06; it works with
      it. The policy decides how a call resolves when the detector cannot give a verdict, and
      the breaker decides whether to call the detector at all. When the breaker is open and a
      call short-circuits, the gateway still has a request to resolve, and it resolves it by
      the same per-detector policy the failing detector already carries. An essential detector
      whose breaker is open short-circuits to a fail-closed block, because the policy for that
      detector is fail-closed and being cut off does not change what it guards. A droppable
      detector whose breaker is open short-circuits to a skip -- it is simply not run -- which
      is fail-open by policy and is exactly graceful degradation in action.

      This composition is why the two sections are ordered as they are. Section 14.06 had to
      establish the policy first, because the breaker needs a policy to apply when it
      short-circuits. Without a policy, an open breaker would face the same undefined-behaviour
      problem the whole of 14.06 was written to solve. With the policy in place, the breaker is
      a clean addition: it changes when the detector is called, and defers to the existing
      policy for how the resulting request is resolved.

      The breaker also completes the story of the timeout that ran through 14.04 and 14.06. The
      timeout bounds one slow call; the policy resolves that one timed-out call; and the
      breaker notices when a detector times out repeatedly and stops calling it, so the gateway
      is not paying the full timeout wait on every request to a detector that is reliably slow.
      A single slow call is a latency problem solved by the timeout; a detector that is always
      slow is an availability problem solved by the breaker. The three mechanisms -- timeout,
      policy, breaker -- form a layered defence against a detector that does not behave, each
      handling a different timescale of the same underlying fault.
  part_4:
    title: 'Graceful Degradation: Shedding to the Essential Path'
    body: |-
      Circuit breakers handle detectors that break. Graceful degradation handles a different
      situation: the gateway is under so much stress that it cannot run every detector within
      budget even though none has individually broken. When there is not enough capacity to do
      everything, the gateway must choose what to stop doing, and graceful degradation is the
      discipline of choosing deliberately -- shedding the detectors that matter least first,
      so the ones that matter most keep running.

      This is where the essential-versus-droppable classification from Section 14.06 becomes
      operational. That section decided which detectors are essential -- the injection
      classifier, the jailbreak classifier, the output PII scanner, the security core -- and
      which are droppable -- the audit tagger, the session scorer, the batch analytics. This
      section uses that classification to define a shed order: under stress the gateway sheds
      the droppable detectors, in a defined priority order, freeing the load they consume until
      it is back within capacity, and it never sheds an essential detector. The
      graceful-degradation deliverable encodes this as a shed-order policy: droppable detectors
      carry a shed priority and are dropped lowest-priority-first until enough load is freed,
      while the essential path is retained no matter what.

      The value of a defined shed order is that degradation is controlled rather than random.
      Without it, stress causes whichever detectors happen to time out or trip first to fall
      away, which might be the essential ones, leaving the gateway serving traffic with its
      security core degraded and its best-effort enrichment intact -- exactly backwards. With
      it, the gateway degrades toward its essential security detectors: as load rises it looks
      more and more like a minimal gateway running only the critical checks, and only if the
      essential path itself cannot be sustained does it fail closed. Graceful degradation is
      what lets the gateway trade completeness for survival in the right direction, keeping the
      guarantee that matters when it cannot keep all of them.
  part_5:
    title: 'Bulkheads: Isolating Resource Exhaustion'
    body: |-
      Circuit breakers and graceful degradation both assume that one detector failure can be
      reasoned about in isolation. Bulkheads are what make that assumption true, by preventing
      a failing detector from consuming resources that the other detectors and the request path
      depend on. The name comes from ships: a hull divided into watertight compartments so that
      a breach in one does not flood the whole vessel.

      The failure mode a bulkhead prevents is shared-resource exhaustion. Detectors run on
      threads, hold connections, and occupy slots in pools, and if those resources are shared
      across all detectors, a single misbehaving detector can take them all. A detector that
      hangs holds its thread and does not give it back; enough hung calls and the shared thread
      pool is empty, at which point every other detector -- including the essential ones and
      the request path itself -- is starved and stalls, waiting for a thread that will never
      come. One detector fault has become a total stall, and neither the circuit breaker nor
      graceful degradation can help, because they too need resources to run.

      A bulkhead prevents this by giving each detector its own bounded resource pool -- its own
      thread pool, its own concurrency cap, its own bounded queue -- rather than a shared one.
      A detector that hangs can exhaust only its own pool; once its concurrency cap is reached
      and its queue is full, further calls to it are rejected rather than allowed to consume
      resources from elsewhere. The failure is contained to the compartment of the one detector
      that caused it, and every other detector continues with its own resources untouched. The
      bulkhead configuration for this section assigns each detector an isolated pool with a
      concurrency cap and queue limit, which is what makes the isolation that circuit breakers
      and graceful degradation assume actually hold under a resource-exhausting failure.
  part_6:
    title: Health Checks, Readiness, and the Complete Resilient Gateway
    body: |-
      The final mechanism operates at the level of the instance rather than the individual
      detector. Health checks decide whether an instance of the gateway is healthy, and there
      are two distinct questions they answer, which must not be confused. Liveness asks whether
      the process is alive at all; a failed liveness check means the process is stuck or dead
      and should be restarted. Readiness asks whether the instance should receive traffic right
      now; a failed readiness check means the instance is alive but not fit to serve, and it
      should be pulled from the load balancer without being killed.

      The distinction matters for a detection gateway because an instance can be alive but
      unfit. An instance whose essential detector breaker has just opened, or whose model
      artifacts are still loading, is running fine as a process but should not receive requests
      it cannot properly inspect. Restarting it would be wrong -- it is not broken, just not
      ready -- and serving traffic to it would be wrong too. Readiness gives the correct
      response: take it out of rotation until its essential breakers are closed and its
      dependencies are loaded, then return it. This is also how the redundancy and failover of
      the tiers work: with several instances behind the load balancer, an unready instance is
      simply removed and its share of the load flows to the others, so the loss of one instance
      is absorbed rather than felt.

      With health checks in place, the resilient gateway is complete. Circuit breakers cut off
      a persistently failing detector and test its recovery; the failure policy resolves each
      short-circuited call; graceful degradation sheds droppable detectors to keep the
      essential path serving under stress; bulkheads contain a resource-exhausting failure to
      one detector; and health checks keep traffic flowing only to instances fit to serve it. A
      detector fault is now a bounded, recoverable event rather than a gateway outage, which is
      what high availability means. The resilience stage is finished. What the gateway still
      lacks is visibility: all of this resilient behaviour is happening, but it cannot yet be
      seen. Section 14.08 opens the operability stage with observability, so that the breakers,
      degradation, and failures engineered here become metrics, logs, and traces an operator
      can actually watch.
