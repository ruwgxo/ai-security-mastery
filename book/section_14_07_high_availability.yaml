    - - Bulkhead
      - A detector exhausting shared resources
      - Isolates each detector in its own pool so a fault stays contained
    - - Health check / readiness
      - An instance unfit to serve
      - Restarts a dead process (liveness) or pulls an unready instance from rotation
  table_2:
    title: Circuit Breaker State Machine
