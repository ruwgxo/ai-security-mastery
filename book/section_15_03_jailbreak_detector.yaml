section_overview:
  one_line_summary: |-
    The second detector in the suite is the closest sibling of the injection detector: a pattern layer for the known jailbreak templates and role-play framings, the Chapter 12 jailbreak classifier for novel framings, and -- what sets it apart -- a Chapter 13 session signal that catches the multi-turn jailbreak no single turn reveals, all combined into one verdict on the unified API.
  why_this_section_exists: |-
    The jailbreak detector reuses the hybrid shape built for prompt injection in Section 15.02 -- a tiered pattern layer, a classifier behind a swappable interface, a combination rule where either layer can escalate -- because jailbreak detection has the same two-problem structure: known templates that a signature catches cleanly, and endless novel framings that only a classifier covers. Building it second, right after injection, makes the shared template explicit and lets this section focus on what is genuinely different about jailbreaks.

    What is different is the multi-turn attack. A jailbreak does not have to arrive in one message. The crescendo and gradual-escalation families of Chapter 13 assemble the jailbreak across a whole conversation: each individual turn is innocuous and passes any per-turn detector, and the escalation across turns is the attack. A detector that classifies each message in isolation is blind to this by construction, because there is nothing in any single message to catch. The jailbreak detector closes that gap by drawing on the Chapter 13 Section 13.09 session threat signal: an accumulated per-session score that rises as a conversation trends toward a jailbreak, letting the detector block a benign-looking turn because of the trajectory it sits in. This section builds the detector end to end -- pattern layer, classifier layer, session signal, combination, and the test harness that validates all three against a labelled corpus including the known families and multi-turn cases.
  position_in_chapter: |-
    Section 15.03 is the second detector section and the first to add a signal beyond the pattern-plus-classifier pair: the Chapter 13 session signal for multi-turn attacks. It reuses the 15.02 template and quality bar, and it is the bridge between the purely content-based detectors (injection, PII, toxicity) and the behavioural signal that the exfiltration detector (15.06) also draws on. The combined pipeline of Section 15.07 orchestrates it through the same unified API as every other detector.
