prose_content:
  part_1:
    title: The Same Hybrid Shape, a New Signal
    body: |-
      Jailbreak detection is structurally the same problem as injection detection, and the detector reuses the same shape. There are known jailbreaks -- the DAN persona, the developer-mode framing, the always-answer-regardless instruction -- that appear again and again and that a signature catches cleanly with near-zero latency. And there are novel jailbreaks -- the endless reinventions of those intents in fresh wording -- that no fixed pattern anticipates and only a trained classifier covers. So the jailbreak detector is a hybrid for the same reason the injection detector was: the pattern layer gives precision on the known, the classifier gives coverage of the novel, and a production detector needs both. Everything from Section 15.02 carries over -- the precision tiers, the classifier behind a swappable interface, the combination rule where either layer can escalate.

      What jailbreaks add is a third signal, because a jailbreak has a shape injection usually does not: it can be spread across many turns. The detector therefore runs three signals rather than two -- pattern, classifier, and a session signal from Chapter 13 -- and combines all three into one verdict. The first two operate on the current message, exactly as in the injection detector. The third operates on the conversation the message sits in, and it is what makes this detector able to catch the attack that the first two are blind to by construction. The rest of this section builds the two familiar layers briefly and the session signal in full, because the session signal is what is genuinely new here.
  part_2:
    title: 'The Pattern Layer: Known Templates and Role-Play Framings'
    body: |-
      The pattern layer is a set of regular expressions matching the known jailbreak families of Chapter 6 Section 6.03, and like the injection patterns they are tiered by precision. The high-precision tier is the named jailbreak personas and the explicit restriction-removal framings: DAN, STAN, AIM, do anything now, unrestricted AI, never refuse, developer mode. These are jailbreak-specific -- they have almost no benign reading in a user request -- so a hit blocks on its own, just as a system-prompt probe did in the injection detector.

      The medium-precision tier is the framings jailbreaks share with legitimate use: role-play (let us roleplay, pretend you are, act as a), hypothetical scenarios (hypothetically, for a story, in a fictional world), and inversion tricks. These are the framings a jailbreak uses to smuggle a request past the model -- but they are also exactly how a user asks for a bedtime story, a writing exercise, or a role-played tutor. A detector that blocked every roleplay or pretend would be useless for the enormous space of legitimate creative requests. So a medium hit does not block or even flag on its own; it only counts when another signal corroborates. This is the same discipline as the injection detector role pattern, and it is more important here because jailbreak framings overlap with benign creative use far more than injection phrasings do. The pattern set lives in its own file with a precision note and a Chapter 6 family label on every entry, because jailbreak templates are the fastest-moving pattern class in the book.
  part_3:
    title: 'The Classification Layer: Coverage for Novel Framings'
    body: |-
      The classification layer is the Chapter 12 jailbreak classifier -- the neural jailbreak model trained alongside the injection classifier in Section 12.08 -- returning a calibrated probability that the text is a jailbreak attempt. It answers does this look like a jailbreak rather than does this contain a known jailbreak template, and that is the question that generalises. The community publishes new jailbreak framings constantly, faster than any pattern set can track, and the classifier is how the detector keeps up without an ever-growing list of increasingly baroque regexes. A framing the pattern set has never seen, if it carries jailbreak intent, scores highly from a model that learned the shape of that intent.

      As in the injection detector, the classifier sits behind a small interface -- predict_proba returning a probability -- so the detector is testable with a deterministic stub and the real model is injected in production and swapped without touching detector code. The division of labour between the pattern set and the classifier is deliberate: a novel framing that resists a clean regex belongs in the classifier training set, not as a new pattern. This keeps the pattern set small and high-precision and pushes the open-ended coverage problem onto the layer built for it. The classifier can escalate on its own -- a high probability blocks a novel single-turn jailbreak that matched no template -- and it is also the corroborating signal that lets a medium-tier framing count.
  part_4:
    title: The Multi-Turn Jailbreak and the Session Signal
    body: |-
      The attack that neither the pattern layer nor the classifier can catch is the multi-turn jailbreak. Instead of one message carrying the whole jailbreak, the attacker spreads it across a conversation: a first turn establishes a harmless-seeming premise, later turns nudge it further, and the disallowed request arrives as the natural next step of an escalation that has been building for many turns. The defining property, from Chapter 13 Section 13.09, is that every individual turn is benign. Run any per-turn detector over each message and each one passes, because in isolation each message is unremarkable. The attack is not in any turn; it is in the trajectory. Per-turn detection is blind to it not by weakness but by construction -- there is nothing in a single turn to detect.

      The session signal closes this gap. Chapter 13 Section 13.09 builds a per-session threat accumulator that watches the trajectory of a conversation and maintains a score that rises as the session trends toward a jailbreak -- topic drift toward disallowed areas, repeated boundary-testing, the crescendo pattern. The jailbreak detector reads that accumulated score for the current session and treats it as a third signal alongside pattern and classifier. When the session score is high, the detector can block the current turn even though that turn, on its own, looks entirely benign -- because the verdict is about the conversation the turn sits in, not the turn alone. Like the classifier, the session signal enters through a small interface, so the detector is testable with a stub and the real Chapter 13 accumulator is injected in production. This is the one signal in the detector that depends on state beyond the current request, and it is what makes the detector a match for the multi-turn attack.
  part_5:
    title: Combining Three Signals into One Verdict
    body: |-
      The three signals combine into one verdict through the same discipline as the injection detector, extended to three inputs. A high-precision template hit blocks on its own. The classifier can escalate on its own for a novel single-turn framing. The session signal can escalate on its own for a multi-turn jailbreak where every turn passed -- this is the case that matters most, because it is the only signal that catches that attack. The score is the strongest of the three, not their sum, so any one confident signal carries the verdict.

      The medium-precision framings are where the combination earns its keep, and here the corroboration can come from either of the other two signals. A role-play framing on its own -- let us roleplay a pirate for a bedtime story -- does not flag, because benign creative requests use identical wording. But the same framing counts when the classifier also scores the text as suspicious, or when the session signal shows the conversation has been escalating: roleplay as the next step of a crescendo is very different from roleplay in a first, innocent message. So a medium hit reaches a flag or block only with classifier or session corroboration, which is exactly what separates the jailbreak use of a framing from the benign use. The verdict is one of the three unified-API values, and the confidence reflects the source: a high-tier template hit is near-certain, while a verdict resting on the classifier or session signal inherits their distance from the decision boundary.
  part_6:
    title: 'Meeting the Quality Bar: Known Families and Multi-Turn Cases'
    body: |-
      The test harness validates the detector against a labelled corpus and reports the three quality-bar metrics with a pass/fail gate, exactly as for the injection detector, but the corpus has two additional requirements specific to jailbreaks. First, the positive cases must include the known families from Chapter 6 -- the named personas, the restriction-removal and refusal-suppression framings -- so the pattern layer is exercised against the real templates it is meant to catch. Second, and unique to this detector, the positive cases must include multi-turn jailbreaks: benign-looking turns paired with a high accumulated session score, so the session signal is actually tested. A corpus of only single-turn cases would pass a detector whose session integration was completely broken, because nothing would exercise it.

      The negative side is the false-positive stress set, and for jailbreaks it is especially demanding because so much benign activity uses jailbreak-adjacent framing. Bedtime-story role-play, a hypothetical retirement calculation, a novel-writing prompt, a role-played tutor, a story whose hero must break the rules -- these all use the medium-tier framings and must all be allowed. The corpus also includes a benign turn in a benign session, to confirm the session signal does not over-fire when the accumulated score is low. The bar is met only when the detector blocks the real jailbreaks -- single-turn and multi-turn -- while leaving the whole space of legitimate creative and hypothetical requests untouched, at the accuracy, latency, and false-positive targets the suite requires. When it does, the detector implements the unified API and is ready for the combined pipeline of Section 15.07.
