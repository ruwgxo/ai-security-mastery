deliverables:

  deliverable_1:
    title: 'FGSM Core Implementation'
    filename: 'fgsm_attack.py'
    description: 'Production-quality FGSM implementation for any PyTorch classifier with configurable epsilon, untargeted and targeted modes, input range clipping, and a self-contained demonstration using a toy linear model'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Inputs assumed normalised to [0, 1].
      Model must support model(x) -> logits with x.requires_grad=True on path.
    code: |
      # fgsm_attack.py
      # Section 10.3: FGSM -- Fast Gradient Sign Method
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from typing import Optional


      def fgsm(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          epsilon: float,
          targeted: bool = False,
          criterion: Optional[nn.Module] = None,
          clip_min: float = 0.0,
          clip_max: float = 1.0,
      ) -> Tensor:
          '''
          Fast Gradient Sign Method (Goodfellow et al. 2014).

          Untargeted: x_adv = clip(x + epsilon * sign(nabla_x J(x, y)), clip_min, clip_max)
          Targeted:   x_adv = clip(x - epsilon * sign(nabla_x J(x, y_target)), clip_min, clip_max)

          Args:
              model:    PyTorch classifier (eval mode recommended)
              x:        Input tensor, shape (N, *), normalised to [clip_min, clip_max]
              y:        True labels (untargeted) or target labels (targeted)
              epsilon:  L-infinity perturbation budget
              targeted: If True, minimise loss for y (treat y as target class)
              criterion: Loss function; defaults to CrossEntropyLoss
              clip_min: Minimum valid input value (default 0.0)
              clip_max: Maximum valid input value (default 1.0)

          Returns:
              x_adv: Adversarial examples, same shape as x, clipped to [clip_min, clip_max]
          '''
          if criterion is None:
              criterion = nn.CrossEntropyLoss()

          # Step 1: clone and enable gradient on input
          x_req = x.clone().detach().requires_grad_(True)

          # Step 2-3: forward + loss
          logits = model(x_req)
          loss = criterion(logits, y)

          # Step 4: backward
          model.zero_grad()
          loss.backward()

          # Step 5-6: gradient sign and perturbation direction
          grad_sign = x_req.grad.data.sign()
          direction = -1.0 if targeted else 1.0
          x_adv = x.detach() + direction * epsilon * grad_sign

          # Step 7-8: clip and detach
          x_adv = torch.clamp(x_adv, clip_min, clip_max)
          return x_adv.detach()


      def attack_success_rate(
          model: nn.Module,
          x_adv: Tensor,
          y_true: Tensor,
      ) -> float:
          '''Fraction of adversarial examples that cause misclassification.'''
          with torch.no_grad():
              preds = model(x_adv).argmax(dim=1)
          return (preds != y_true).float().mean().item()


      # --- Minimal demo: toy linear classifier ---

      class ToyLinear(nn.Module):
          def __init__(self, n_features: int = 28 * 28, n_classes: int = 10):
              super().__init__()
              self.fc = nn.Linear(n_features, n_classes)

          def forward(self, x: Tensor) -> Tensor:
              return self.fc(x.view(x.size(0), -1))


      def demo() -> None:
          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()

          # Synthetic batch: 16 samples, 1-channel 28x28 images
          x = torch.rand(16, 1, 28, 28)
          y = torch.randint(0, 10, (16,))

          epsilons = [0.0, 2 / 255, 4 / 255, 8 / 255, 16 / 255]
          print('FGSM demo -- ToyLinear on synthetic data')
          print(f'{"epsilon":<12} {"success_rate":<14} {"mean_l_inf":<12}')
          print('-' * 40)
          for eps in epsilons:
              x_adv = fgsm(model, x, y, epsilon=eps)
              rate = attack_success_rate(model, x_adv, y)
              l_inf = (x_adv - x).abs().max().item()
              print(f'{eps:<12.4f} {rate:<14.3f} {l_inf:<12.4f}')

          # Targeted demo
          y_target = (y + 1) % 10  # shift each label by 1
          x_adv_tgt = fgsm(model, x, y_target, epsilon=8 / 255, targeted=True)
          with torch.no_grad():
              tgt_preds = model(x_adv_tgt).argmax(dim=1)
          tgt_success = (tgt_preds == y_target).float().mean().item()
          print(f'\nTargeted FGSM (eps=8/255): target class success = {tgt_success:.3f}')


      if __name__ == '__main__':
          demo()

  deliverable_2:
    title: 'Epsilon Sweep Benchmark'
    filename: 'epsilon_sweep_benchmark.py'
    description: 'Sweeps epsilon from 0 to 32/255 measuring attack success rate, L-infinity perturbation magnitude, and PSNR at each step; produces the budget-success curve for any PyTorch model'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, numpy, matplotlib.
      Import fgsm from fgsm_attack.py (same directory).
    code: |
      # epsilon_sweep_benchmark.py
      # Section 10.3: FGSM Epsilon Sweep
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      import numpy as np
      import matplotlib.pyplot as plt
      from torch import Tensor
      from typing import List, Tuple
      from fgsm_attack import fgsm, ToyLinear, attack_success_rate


      def psnr(x_orig: Tensor, x_adv: Tensor, max_val: float = 1.0) -> float:
          '''Peak signal-to-noise ratio in dB; higher = less visible perturbation.'''
          mse = (x_orig - x_adv).pow(2).mean().item()
          if mse == 0.0:
              return float('inf')
          return 10.0 * np.log10(max_val ** 2 / mse)


      def sweep_epsilon(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          epsilons: List[float],
      ) -> Tuple[List[float], List[float], List[float]]:
          '''
          Sweep epsilon values and return (success_rates, l_inf_values, psnr_values).
          '''
          success_rates, l_inf_vals, psnr_vals = [], [], []
          for eps in epsilons:
              x_adv = fgsm(model, x, y, epsilon=eps)
              rate = attack_success_rate(model, x_adv, y)
              l_inf = (x_adv - x).abs().max().item()
              p = psnr(x, x_adv)
              success_rates.append(rate)
              l_inf_vals.append(l_inf)
              psnr_vals.append(p if not np.isinf(p) else 50.0)
          return success_rates, l_inf_vals, psnr_vals


      def plot_sweep(
          epsilons: List[float],
          success_rates: List[float],
          psnr_vals: List[float],
          model_name: str = 'model',
          save_path: str = 'fgsm_epsilon_sweep.png',
      ) -> None:
          fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 5))
          eps_255 = [e * 255 for e in epsilons]

          ax1.plot(eps_255, success_rates, color='#e74c3c', linewidth=2, marker='o', markersize=4)
          ax1.set_xlabel('Epsilon (pixel units, input range 0-255)', fontsize=11)
          ax1.set_ylabel('Attack success rate', fontsize=11)
          ax1.set_title(f'FGSM Untargeted Attack Success Rate\n({model_name})', fontsize=11)
          ax1.set_ylim(0, 1.05)
          ax1.axvline(8, color='grey', linestyle='--', alpha=0.5)
          ax1.text(8.5, 0.05, 'eps=8\n(benchmark)', fontsize=8, color='grey')
          ax1.grid(True, alpha=0.3)

          ax2.plot(eps_255, psnr_vals, color='#2980b9', linewidth=2, marker='s', markersize=4)
          ax2.set_xlabel('Epsilon (pixel units, input range 0-255)', fontsize=11)
          ax2.set_ylabel('PSNR (dB)', fontsize=11)
          ax2.set_title(f'Perturbation Perceptibility (PSNR)\n({model_name})', fontsize=11)
          ax2.axhline(40, color='grey', linestyle='--', alpha=0.5)
          ax2.text(1, 41, '>40 dB: imperceptible to humans', fontsize=8, color='grey')
          ax2.grid(True, alpha=0.3)

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      def print_sweep_table(
          epsilons: List[float],
          success_rates: List[float],
          psnr_vals: List[float],
      ) -> None:
          print(f'\n{"epsilon":<10} {"eps/255":<10} {"success":<10} {"PSNR(dB)":<10}')
          print('-' * 42)
          for eps, sr, p in zip(epsilons, success_rates, psnr_vals):
              print(f'{eps:<10.4f} {eps * 255:<10.1f} {sr:<10.3f} {p:<10.1f}')


      if __name__ == '__main__':
          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(64, 1, 28, 28)
          y = torch.randint(0, 10, (64,))

          epsilons = [i / 255 for i in range(0, 33, 2)]
          success_rates, l_inf_vals, psnr_vals = sweep_epsilon(model, x, y, epsilons)
          print_sweep_table(epsilons, success_rates, psnr_vals)
          plot_sweep(epsilons, success_rates, psnr_vals, model_name='ToyLinear')

  deliverable_3:
    title: 'Targeted FGSM Variant'
    filename: 'fgsm_targeted_variant.py'
    description: 'Targeted FGSM with class-specific gradient reversal, comparison of untargeted vs targeted success rates at matched epsilon, and measurement of the goal-to-epsilon cost function'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib.
      Import fgsm, ToyLinear, attack_success_rate from fgsm_attack.py.
    code: |
      # fgsm_targeted_variant.py
      # Section 10.3: Targeted FGSM with Gradient Reversal
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import matplotlib.pyplot as plt
      from typing import List
      from fgsm_attack import fgsm, ToyLinear, attack_success_rate


      def targeted_success_rate(model, x, y_true, y_target, epsilon):
          '''
          Fraction of examples where model predicts y_target after targeted FGSM.
          Requires y_target != y_true for each example.
          '''
          x_adv = fgsm(model, x, y_target, epsilon=epsilon, targeted=True)
          with torch.no_grad():
              preds = model(x_adv).argmax(dim=1)
          return (preds == y_target).float().mean().item()


      def compare_targeted_untargeted(
          model,
          x,
          y_true,
          y_target,
          epsilons: List[float],
      ):
          untargeted_rates, targeted_rates = [], []
          for eps in epsilons:
              un = attack_success_rate(model, fgsm(model, x, y_true, eps), y_true)
              tgt = targeted_success_rate(model, x, y_true, y_target, eps)
              untargeted_rates.append(un)
              targeted_rates.append(tgt)
          return untargeted_rates, targeted_rates


      def plot_targeted_comparison(
          epsilons: List[float],
          untargeted: List[float],
          targeted: List[float],
          save_path: str = 'fgsm_targeted_comparison.png',
      ) -> None:
          eps_255 = [e * 255 for e in epsilons]
          plt.figure(figsize=(8, 5))
          plt.plot(eps_255, untargeted, color='#e74c3c', linewidth=2,
                   marker='o', markersize=4, label='Untargeted (any wrong class)')
          plt.plot(eps_255, targeted, color='#2980b9', linewidth=2,
                   marker='s', markersize=4, label='Targeted (specific wrong class)')
          plt.xlabel('Epsilon (pixel units, 0-255 scale)', fontsize=11)
          plt.ylabel('Success rate', fontsize=11)
          plt.title('FGSM Untargeted vs Targeted Success Rate\n(higher epsilon cost for targeted)', fontsize=11)
          plt.legend(fontsize=10)
          plt.grid(True, alpha=0.3)
          plt.ylim(0, 1.05)
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      def epsilon_for_target_rate(
          model,
          x,
          y_true,
          y_target,
          target_success: float = 0.50,
          epsilons: List[float] = None,
      ) -> float:
          '''Return the smallest epsilon achieving at least target_success targeted rate.'''
          if epsilons is None:
              epsilons = [i / 255 for i in range(0, 33, 1)]
          for eps in epsilons:
              rate = targeted_success_rate(model, x, y_true, y_target, eps)
              if rate >= target_success:
                  return eps
          return float('nan')


      if __name__ == '__main__':
          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(64, 1, 28, 28)
          y_true = torch.randint(0, 10, (64,))
          y_target = (y_true + 1) % 10  # adjacent class as target

          epsilons = [i / 255 for i in range(0, 33, 2)]
          untargeted, targeted = compare_targeted_untargeted(
              model, x, y_true, y_target, epsilons,
          )

          print(f'{"epsilon":<10} {"eps/255":<10} {"untargeted":<14} {"targeted":<12}')
          print('-' * 48)
          for eps, un, tgt in zip(epsilons, untargeted, targeted):
              print(f'{eps:<10.4f} {eps * 255:<10.1f} {un:<14.3f} {tgt:<12.3f}')

          eps_50 = epsilon_for_target_rate(model, x, y_true, y_target, target_success=0.50)
          print(f'\nEpsilon needed for 50% targeted success: {eps_50 * 255:.1f}/255')
          plot_targeted_comparison(epsilons, untargeted, targeted)

  deliverable_4:
    title: 'FGSM Transferability Test'
    filename: 'fgsm_transferability_test.py'
    description: 'Measures FGSM transfer rate from a source model to a victim model across epsilon values, demonstrating the moderate transferability of single-step adversarial examples'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib.
      Import fgsm, ToyLinear from fgsm_attack.py.
      Source and victim are independently initialised models to simulate architecture mismatch.
    code: |
      # fgsm_transferability_test.py
      # Section 10.3: FGSM Transfer Rate Measurement
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      import matplotlib.pyplot as plt
      from typing import List, Tuple
      from fgsm_attack import fgsm, ToyLinear


      class ToyMLP(nn.Module):
          '''Two-hidden-layer MLP as a victim with different architecture from ToyLinear.'''
          def __init__(self, n_features: int = 28 * 28, n_classes: int = 10, hidden: int = 256):
              super().__init__()
              self.net = nn.Sequential(
                  nn.Linear(n_features, hidden),
                  nn.ReLU(),
                  nn.Linear(hidden, hidden // 2),
                  nn.ReLU(),
                  nn.Linear(hidden // 2, n_classes),
              )

          def forward(self, x):
              return self.net(x.view(x.size(0), -1))


      def transfer_rate(
          source: nn.Module,
          victim: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          epsilon: float,
      ) -> Tuple[float, float]:
          '''
          Returns (source_success_rate, victim_transfer_rate).
          source_success_rate: fraction fooled on source model.
          victim_transfer_rate: fraction of source successes that also fool victim.
          '''
          x_adv = fgsm(source, x, y, epsilon=epsilon)
          with torch.no_grad():
              src_preds = source(x_adv).argmax(dim=1)
              vic_preds = victim(x_adv).argmax(dim=1)
          src_success = (src_preds != y).float()
          vic_success = (vic_preds != y).float()
          source_rate = src_success.mean().item()
          # Transfer rate: among examples that fool source, how many also fool victim?
          if src_success.sum() > 0:
              transfer = (vic_success * src_success).sum() / src_success.sum()
              transfer = transfer.item()
          else:
              transfer = 0.0
          return source_rate, transfer


      def sweep_transfer(
          source: nn.Module,
          victim: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          epsilons: List[float],
      ) -> Tuple[List[float], List[float]]:
          src_rates, vic_rates = [], []
          for eps in epsilons:
              sr, tr = transfer_rate(source, victim, x, y, eps)
              src_rates.append(sr)
              vic_rates.append(tr)
          return src_rates, vic_rates


      def plot_transfer(
          epsilons: List[float],
          source_rates: List[float],
          transfer_rates: List[float],
          save_path: str = 'fgsm_transfer_rate.png',
      ) -> None:
          eps_255 = [e * 255 for e in epsilons]
          plt.figure(figsize=(8, 5))
          plt.plot(eps_255, source_rates, color='#e74c3c', linewidth=2,
                   marker='o', markersize=4, label='Source success rate')
          plt.plot(eps_255, transfer_rates, color='#27ae60', linewidth=2,
                   marker='s', markersize=4, label='Transfer rate (source successes -> victim)')
          plt.xlabel('Epsilon (pixel units, 0-255 scale)', fontsize=11)
          plt.ylabel('Rate', fontsize=11)
          plt.title('FGSM Transfer Rate: ToyLinear (source) -> ToyMLP (victim)\n(architecture mismatch; moderate transfer expected)', fontsize=11)
          plt.legend(fontsize=10)
          plt.grid(True, alpha=0.3)
          plt.ylim(0, 1.05)
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          torch.manual_seed(42)
          source = ToyLinear()
          victim = ToyMLP()
          source.eval()
          victim.eval()

          x = torch.rand(128, 1, 28, 28)
          y = torch.randint(0, 10, (128,))
          epsilons = [i / 255 for i in range(0, 33, 2)]

          source_rates, xfer_rates = sweep_transfer(source, victim, x, y, epsilons)

          print(f'{"eps/255":<10} {"source_rate":<14} {"transfer_rate":<14}')
          print('-' * 40)
          for eps, sr, tr in zip(epsilons, source_rates, xfer_rates):
              print(f'{eps * 255:<10.1f} {sr:<14.3f} {tr:<14.3f}')

          avg_transfer = sum(xfer_rates[3:]) / max(len(xfer_rates[3:]), 1)
          print(f'\nAverage transfer rate (eps >= 6/255): {avg_transfer:.3f}')
          print('Expected range for architecture-mismatched models: 0.15 -- 0.40')
          plot_transfer(epsilons, source_rates, xfer_rates)

  deliverable_5:
    title: 'FGSM Detection Signal Analyser'
    filename: 'fgsm_detection_signal_analyser.py'
    description: 'Measures the distribution shift FGSM introduces and how prediction changes under Gaussian squeezing, quantifying Track 7 feature squeezer detection rate as a function of epsilon'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, numpy, matplotlib.
      Import fgsm, ToyLinear from fgsm_attack.py.
      Squeezing is implemented inline as Gaussian blur via conv2d.
    code: |
      # fgsm_detection_signal_analyser.py
      # Section 10.3: FGSM Detection Signal Analysis
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      import torch.nn.functional as F
      import numpy as np
      import matplotlib.pyplot as plt
      from typing import List
      from fgsm_attack import fgsm, ToyLinear


      def gaussian_squeeze(x: torch.Tensor, sigma: float = 1.0) -> torch.Tensor:
          '''
          Apply Gaussian blur as a feature squeezer to a batch of images.
          sigma controls kernel width; larger sigma = stronger squeezing.
          '''
          if sigma == 0.0:
              return x
          # Build 5x5 Gaussian kernel
          k = 5
          half = k // 2
          coords = torch.arange(-half, half + 1, dtype=torch.float32)
          kernel_1d = torch.exp(-coords ** 2 / (2 * sigma ** 2))
          kernel_1d = kernel_1d / kernel_1d.sum()
          kernel_2d = kernel_1d.unsqueeze(0) * kernel_1d.unsqueeze(1)
          kernel_2d = kernel_2d.unsqueeze(0).unsqueeze(0)  # (1, 1, 5, 5)
          # Expand for n_channels
          n_ch = x.shape[1]
          kernel_2d = kernel_2d.expand(n_ch, 1, k, k)
          squeezed = F.conv2d(x, kernel_2d, padding=half, groups=n_ch)
          return torch.clamp(squeezed, 0.0, 1.0)


      def squeezer_disagreement(
          model: nn.Module,
          x_orig: torch.Tensor,
          x_adv: torch.Tensor,
          sigma: float = 1.0,
      ) -> float:
          '''
          Fraction of examples where squeezing changes the adversarial prediction
          back to the original (non-adversarial) prediction.
          This is the squeezer detection signal for FGSM.
          '''
          with torch.no_grad():
              preds_adv = model(x_adv).argmax(dim=1)
              preds_squeezed = model(gaussian_squeeze(x_adv, sigma)).argmax(dim=1)
              preds_orig = model(x_orig).argmax(dim=1)
          # Disagreement: adversarial pred differs from squeezed pred
          disagreement = (preds_adv != preds_squeezed).float().mean().item()
          # Recovery: squeezed pred matches original pred
          recovery = (preds_squeezed == preds_orig).float().mean().item()
          return disagreement, recovery


      def analyse_detection_vs_epsilon(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          epsilons: List[float],
          sigma: float = 1.0,
      ) -> None:
          print(f'FGSM Detection Signal Analysis (sigma={sigma})')
          print(f'{"eps/255":<10} {"attack_success":<16} {"squeezer_disagree":<20} {"squeezer_recovery":<18}')
          print('-' * 66)
          success_rates, disagree_rates, recovery_rates = [], [], []
          for eps in epsilons:
              x_adv = fgsm(model, x, y, epsilon=eps)
              with torch.no_grad():
                  preds_adv = model(x_adv).argmax(dim=1)
              attack_success = (preds_adv != y).float().mean().item()
              disagree, recovery = squeezer_disagreement(model, x, x_adv, sigma)
              print(f'{eps * 255:<10.1f} {attack_success:<16.3f} {disagree:<20.3f} {recovery:<18.3f}')
              success_rates.append(attack_success)
              disagree_rates.append(disagree)
              recovery_rates.append(recovery)
          return success_rates, disagree_rates, recovery_rates


      def plot_detection_vs_attack(
          epsilons: List[float],
          success_rates: List[float],
          disagree_rates: List[float],
          sigma: float,
          save_path: str = 'fgsm_detection_signal.png',
      ) -> None:
          eps_255 = [e * 255 for e in epsilons]
          plt.figure(figsize=(9, 5))
          plt.plot(eps_255, success_rates, color='#e74c3c', linewidth=2,
                   label='FGSM attack success rate', marker='o', markersize=4)
          plt.plot(eps_255, disagree_rates, color='#8e44ad', linewidth=2,
                   linestyle='--', label=f'Squeezer disagreement rate (sigma={sigma})',
                   marker='s', markersize=4)
          plt.xlabel('Epsilon (pixel units)', fontsize=11)
          plt.ylabel('Rate', fontsize=11)
          plt.title('FGSM Attack Success vs Feature Squeezer Detection Rate\n(squeezer disagreement = potential adversarial detection signal)', fontsize=11)
          plt.legend(fontsize=10)
          plt.grid(True, alpha=0.3)
          plt.ylim(0, 1.05)
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(64, 1, 28, 28)
          y = torch.randint(0, 10, (64,))
          epsilons = [i / 255 for i in range(0, 33, 2)]

          sr, dr, rr = analyse_detection_vs_epsilon(model, x, y, epsilons, sigma=1.0)
          plot_detection_vs_attack(epsilons, sr, dr, sigma=1.0)

          # Also test sigma=0.5 (weaker squeezer)
          print('\nWeaker squeezer (sigma=0.5):')
          sr2, dr2, rr2 = analyse_detection_vs_epsilon(model, x, y, epsilons, sigma=0.5)
          print('\nKey finding: squeezer disagreement tracks attack success at moderate epsilon.')
          print('At low epsilon: attack succeeds but squeezer may miss (the hard detection case).')

common_mistakes:

  mistake_1:
    description: 'Calling x.requires_grad_(True) on the original input tensor instead of cloning first, which mutates the input in place'
    why_it_happens: |
      The PyTorch autograd API lets you call requires_grad_(True) on any tensor.
      The in-place call on the original tensor seems to work in small examples
      but creates subtle bugs when the same input tensor is reused across multiple
      FGSM calls or when the gradient accumulates across multiple backward passes.
    consequence: |
      The gradient from one FGSM call contaminates subsequent calls on the same
      tensor. In batch processing, adversarial examples from different epsilon values
      accumulate incorrect gradients. Adversarial example quality degrades silently --
      no error is thrown, but the perturbations are wrong.
    correct_approach: |
      Always use x_req = x.clone().detach().requires_grad_(True). The clone()
      produces a new tensor with the same data; detach() cuts it from any existing
      computation graph; requires_grad_(True) enables gradient tracking on the
      fresh clone. The original x is never modified.

  mistake_2:
    description: 'Epsilon unit confusion: specifying epsilon in raw pixel units (0-255) when the model input is normalised to [0, 1]'
    why_it_happens: |
      Research papers report epsilon in pixel units (epsilon=8 meaning 8/255). Engineers
      reading papers and implementing FGSM pass epsilon=8 directly without dividing by 255,
      producing perturbations 255 times larger than intended. The mistake is invisible on
      first inspection -- x_adv is just clipped to [0, 1] -- but the effective epsilon
      is the clip boundary, not the intended value.
    consequence: |
      At epsilon=8 on [0, 1] normalised input, torch.clamp clips the vast majority of
      features to 0 or 1. The adversarial example is a heavily clipped artefact, not an
      epsilon=8/255 perturbation. Attack success rate will be anomalously high (because
      the model sees an extreme input), but the result is not a meaningful adversarial example.
    correct_approach: |
      Define a clear epsilon convention: either work in [0, 1] space (epsilon=8/255=0.031)
      or in [0, 255] space with explicit conversion before use. The book uses [0, 1]
      normalisation throughout; epsilon is always specified as a fraction of the
      normalised range. Use a named constant (EPSILON_8_255 = 8.0 / 255.0) to make
      the units explicit at the definition site.

  mistake_3:
    description: 'Forgetting to clip x_adv to the valid input range, producing out-of-distribution pixels'
    why_it_happens: |
      The FGSM update x_adv = x + epsilon * sign(grad) can push pixel values outside [0, 1]
      near the boundary of the input range (pixels near 0.0 or 1.0 that get perturbed
      downward or upward respectively). Engineers focused on the gradient computation
      skip the clamp step.
    consequence: |
      Out-of-distribution pixels (values below 0.0 or above 1.0) are fed to the model.
      Many normalisation layers and preprocessing steps implicitly assume valid input ranges;
      adversarial examples with out-of-range values may produce misleading attack success rates
      that do not reflect what would happen with physically realisable inputs.
    correct_approach: |
      Always apply torch.clamp(x_adv, clip_min, clip_max) after computing the perturbation.
      The clip_min and clip_max arguments should match the normalisation used during model
      training. For [0, 1] normalised inputs: torch.clamp(x_adv, 0.0, 1.0). For ImageNet-
      normalised inputs: use per-channel min/max based on the normalisation statistics.

  mistake_4:
    description: 'Using FGSM success rate as a model robustness benchmark and concluding a model is robust because FGSM fails'
    why_it_happens: |
      FGSM is the first attack implemented in most adversarial ML tutorials. Engineers run
      FGSM against a trained model, observe low attack success rate, and report "the model
      is adversarially robust to FGSM." The low attack success rate may be caused by gradient
      masking -- obfuscated or near-zero gradients that make FGSM steps ineffective without
      making the model actually robust.
    consequence: |
      Models with gradient masking appear robust to FGSM but are trivially vulnerable to
      PGD and BPDA (backward pass differentiable approximation). Published examples include
      several proposed defences that showed near-zero FGSM success rates yet were broken
      by iterative methods. Shipping a model as "adversarially robust" based on FGSM
      failure is a false security guarantee.
    correct_approach: |
      PGD (Section 10.4) with multiple restarts is the correct robustness evaluation standard.
      FGSM failure is a necessary but not sufficient condition for adversarial robustness.
      If a model shows unusually low FGSM success at epsilon values where PGD shows high
      success, investigate gradient masking. The Section 10.4 PGD implementation includes
      a gradient masking diagnostic.

  mistake_5:
    description: 'Assuming FGSM adversarial training provides the same robustness as PGD adversarial training'
    why_it_happens: |
      FGSM adversarial training is fast -- one forward-backward pass per training example.
      PGD adversarial training is k times slower. Engineers use FGSM adversarial training
      as a cheaper substitute for PGD adversarial training and expect comparable robustness.
    consequence: |
      FGSM adversarially trained models are vulnerable to the "catastrophic overfitting"
      failure mode discovered by Wong et al. 2020: the model learns to defend against the
      specific FGSM direction but becomes more vulnerable to small epsilon attacks from
      other directions. Empirically, FGSM training provides meaningful but substantially
      lower robustness than PGD training at matched epsilon -- typically 15-25 percentage
      points lower certified accuracy at standard benchmarks.
    correct_approach: |
      Use FGSM adversarial training only when compute budget prohibits PGD training.
      Evaluate the FGSM-trained model against PGD (Section 10.4) before deployment --
      if PGD success rate is substantially higher than FGSM success rate, the model
      has FGSM-specific overfitting. TRADES (Section 10.15) or Free adversarial training
      (Section 10.15) are better compute-efficient alternatives to bare FGSM training.

section_summary:

  compact: |
    FGSM perturbs every input feature by exactly epsilon in the gradient sign direction --
    the solution to the linear programme of maximising loss under an L-infinity constraint.
    It is provably optimal for linear classifiers and locally optimal for neural networks in
    the single step. Single-step optimality is the source of FGSM''s weakness: it does not
    iterate to close the distance to the decision boundary, producing adversarial examples
    that are fragile under input transformation (detectable by feature squeezing at 70-85%
    rate at eps=8/255), moderate in transferability (15-40% to architecturally different
    models), and weaker than PGD at matched epsilon. FGSM''s production role is twofold:
    adversarial training data generation (cheap, diverse gradient directions) and baseline
    attack evaluation (if FGSM fails, investigate gradient masking before claiming robustness).

  key_takeaways:
    - 'FGSM is the solution to: maximise linearised loss subject to L-infinity constraint -- each feature moves by exactly epsilon in the gradient sign direction'
    - 'FGSM is provably optimal for linear classifiers; locally optimal but single-step limited for neural networks'
    - 'Production epsilon range for normalised [0,1] images: 4/255 to 8/255; above 16/255 perturbations become visibly noisy'
    - 'Targeted FGSM reverses the gradient sign for y_target; requires higher epsilon than untargeted for matched success rate'
    - 'FGSM transfers at 15-40% to architecturally mismatched models -- less than PGD because single-step examples are farther from the decision boundary'
    - 'Feature squeezing catches 70-85% of FGSM examples at eps=8/255; FGSM is the most detectable gradient-based attack'
    - 'FGSM failure is not a robustness benchmark -- gradient masking can suppress FGSM while leaving PGD effective'

preview_section_10_04:
  title: 'Section 10.4: PGD -- Projected Gradient Descent'
  summary: |
    Section 10.4 builds PGD from the FGSM primitive: iterate FGSM with projection back onto
    the epsilon ball after each step. The inner maximisation of the Madry et al. 2018 min-max
    robust optimisation is the PGD loop. The section covers the projection operator for
    L-infinity and L2 balls, step size and iteration count as hyperparameters, random restart
    (initialise from a random point in the epsilon ball to escape local optima), and the claim
    that PGD is the strongest first-order adversary -- the standard against which empirical
    robustness is measured. PGD adversarial training (Section 10.15) uses the PGD inner loop
    as the data generator. The gradient masking diagnostic skipped in Section 10.3 (FGSM
    failure at epsilon where PGD succeeds) is formalised here.

