section_overview:
  one_line_summary: 'FGSM perturbs every input feature by exactly epsilon in the gradient sign direction, producing the fastest white-box adversarial example and establishing the primitive that PGD and C&W iterate.'
  why_this_section_exists: |
    FGSM is the entry point into gradient-based adversarial attacks. Every iterative attack in
    Chapter 10 -- PGD (Section 10.4), C&W (Section 10.5) -- is an elaboration of the FGSM
    primitive: compute gradient of loss with respect to input, move in that direction. Understanding
    FGSM precisely means understanding the mathematical structure shared by all gradient-based
    adversarial attacks. The section also establishes two production connections: FGSM adversarial
    examples are the cheapest data source for adversarial training (Section 10.15), and FGSM
    perturbations are among the most detectable by feature squeezing (Section 10.11) because they
    are single-step and not calibrated to the decision boundary.
  position_in_chapter: |
    Section 10.3 is the first white-box attack implementation. It occupies the white-box /
    untargeted / image cell of the Section 10.2 taxonomy matrix (plus targeted and tabular
    modality variants). It establishes the gradient-sign primitive that Sections 10.4 and 10.5
    extend iteratively. Every claim about FGSM weakness in later sections refers back to the
    single-step limitation established here.

learning_objectives:

  knowledge:
    - 'Derive the FGSM update rule from the first-order Taylor expansion of the loss function and explain why sign(gradient) produces an L-infinity bounded perturbation'
    - 'Explain why FGSM is provably optimal for linear models and why it is suboptimal for neural networks'
    - 'Describe how the epsilon parameter trades attack success rate against perturbation perceptibility and state the practical epsilon range for normalised image inputs'
    - 'Explain targeted FGSM gradient reversal and state why targeted attacks require higher epsilon than untargeted at matched success rate'
    - 'State the typical FGSM transfer rate range and explain why single-step adversarial examples transfer less reliably than iterative examples'
    - 'Identify which Track 7 primitive is most effective against FGSM and explain why FGSM perturbations are relatively detectable'

  skills:
    - 'Implement FGSM in PyTorch against any classifier with configurable epsilon and untargeted/targeted mode'
    - 'Run an epsilon sweep and produce a success rate vs epsilon curve for a given model'
    - 'Implement targeted FGSM and compare success rate against untargeted at matched epsilon'
    - 'Measure FGSM transfer rate from a source model to a victim model'
    - 'Analyse the distribution shift FGSM introduces and estimate squeezer detection rate at a given epsilon'

  security_mindset:
    - 'Treat FGSM as the baseline adversary, not as a threat: if a defence does not block FGSM it does not block anything'
    - 'Recognise that high FGSM attack success rate on a model is not a robustness benchmark -- PGD success rate is the correct measure (Section 10.4)'
    - 'Understand that FGSM is most useful as an adversarial training data generator (Section 10.15) because it is cheap and provides useful gradient direction diversity'
    - 'Appreciate that the gradient sign operation exposes a fundamental property of high-dimensional linear approximations -- FGSM works because of dimensionality, not because of model weakness'

prerequisites:
  - 'Chapter 1 Section 1.9: loss functions (cross-entropy; FGSM computes its gradient w.r.t. input)'
  - 'Chapter 2 Section 2.3: backpropagation and chain rule (gradient of loss w.r.t. input requires this)'
  - 'Section 10.1: evasion threat model and Lp norm constraints (L-infinity is the FGSM norm by construction)'
  - 'Section 10.2: adversarial taxonomy (FGSM occupies white-box / untargeted / image cell; targeted variant in targeted cell)'

prose_content:

  part_1:
    title: 'The 2014 Landmark: What Goodfellow et al. Revealed'
    body: |
      Before Goodfellow, Shlens, and Szegedy published "Explaining and Harnessing Adversarial
      Examples" in 2014, the prevailing explanation for adversarial vulnerability was that deep
      networks are highly nonlinear and thus sensitive to peculiar nonlinear interactions between
      input features. The proposed defences followed from this diagnosis: add nonlinearity through
      dropout, add noise, train with data augmentation to smooth out the nonlinear sensitivities.

      Goodfellow et al. proposed a different and more disturbing explanation. Adversarial examples
      are not the product of unusual nonlinear behaviour -- they are the product of the model''s
      locally linear behaviour in high-dimensional spaces. In high dimensions, a small perturbation
      aligned with the sign of the model''s sensitivity direction accumulates across all features to
      produce a large change in the model''s output, even when each individual feature change is
      imperceptibly small.

      The practical consequence was FGSM: a single-step attack that took one forward pass and one
      backward pass to generate an adversarial example. It was fast enough to be used as a data
      augmentation technique during training, cheap enough to run on every training batch, and
      strong enough to fool well-trained classifiers at epsilon values that produced no visible
      perturbation to human observers.

      For the field, FGSM''s significance was the falsification of "nonlinearity defences" -- if
      adversarial examples arise from linear approximation, then adding dropout or noise does not
      address the root cause. For production security engineers, FGSM''s significance is different:
      it is the cheapest gradient-based adversarial example generator available, which makes it
      the right choice for adversarial training data generation (Section 10.15) even though it is
      too weak to evaluate adversarial robustness.

  part_2:
    title: 'Derivation from First Principles: Why Sign of Gradient'
    body: |
      The FGSM update rule is: x_adv = x + epsilon * sign(nabla_x J(theta, x, y)).

      The derivation starts with the adversary''s objective: find a perturbation delta with
      ||delta||_inf <= epsilon that maximises the loss J(theta, x + delta, y). Taking the first-
      order Taylor expansion of J around x:
      J(theta, x + delta, y) approximately= J(theta, x, y) + delta^T * nabla_x J(theta, x, y).

      The adversary wants to maximise this with respect to delta subject to ||delta||_inf <= epsilon.
      This is a linear maximisation problem with an L-infinity constraint: maximise delta^T * g
      subject to ||delta||_inf <= epsilon, where g = nabla_x J(theta, x, y).

      The solution to this linear programme is exactly delta = epsilon * sign(g). The sign function
      selects +epsilon for each feature where g_i > 0 (increasing that feature increases the loss)
      and -epsilon for each feature where g_i < 0 (decreasing that feature increases the loss).
      Each feature is moved by exactly epsilon -- not more, not less -- in the direction that
      maximally increases the linearised loss. The result is an L-infinity perturbation by
      construction: ||delta||_inf = max_i |delta_i| = epsilon.

      The high-dimensionality accumulation effect is what makes this work. For an MNIST digit
      classifier with 784 input dimensions, if the gradient has average magnitude 0.1 per feature,
      the total inner product delta^T * g = 784 * epsilon * 0.1 = 78.4 * epsilon. At epsilon =
      8/255 = 0.031, this accumulated effect is 2.4 -- large enough to cross a typical decision
      boundary -- while the per-pixel change of 8 intensity units is visually imperceptible to
      humans inspecting the image.

  part_3:
    title: 'FGSM Against Linear Models: Provably Optimal'
    body: |
      For a linear classifier f(x) = w^T x + b with binary cross-entropy loss, the gradient of
      the loss with respect to x is proportional to the weight vector w (scaled by the prediction
      error). FGSM produces the perturbation delta = epsilon * sign(w) for untargeted attack.

      The adversarial example achieves: w^T x_adv = w^T x + epsilon * w^T sign(w) = w^T x +
      epsilon * ||w||_1. This is the maximum possible increase in the linear output achievable
      under an L-infinity constraint of epsilon. No other perturbation within the L-infinity ball
      of radius epsilon can produce a larger output change.

      FGSM is therefore provably optimal for linear classifiers: it achieves the globally maximum
      loss increase in a single step. This is the theoretical basis of Goodfellow et al.''s
      linearity hypothesis. If neural networks behave locally like linear classifiers (which they
      do in piecewise-linear ReLU networks in most input regions), then FGSM is locally optimal
      for them as well. The gap between "locally optimal" and "globally optimal" is exactly what
      PGD closes by iterating.

  part_4:
    title: 'FGSM Against Neural Networks: Effective but Single-Step Limited'
    body: |
      Deep ReLU networks are piecewise linear: in any region where no ReLU activation changes sign,
      the network function is exactly affine. FGSM takes one step in the gradient direction from x.
      If that step keeps the activations in the same linear region, FGSM is locally optimal.
      If that step crosses a region boundary, the gradient at x + delta is different from the
      gradient at x, and the perturbation is no longer optimal.

      This is the source of FGSM''s suboptimality. For small epsilon, most steps stay within the
      same linear region, and FGSM performs well. For larger epsilon, the step frequently crosses
      region boundaries, and the first-order approximation becomes inaccurate. Empirically, FGSM
      attack success rate on ResNet-50 (ImageNet) plateaus around 70-80% even at large epsilon
      values, while PGD with 40 steps achieves >98% at the same epsilon. The remaining gap is
      entirely explained by the linear approximation error in FGSM''s single step.

      The practical consequence for evaluation: FGSM robustness (the fraction of examples that
      FGSM fails to fool) is not a useful measure of adversarial robustness. A model can appear
      robust to FGSM because of gradient masking -- the gradient signal is noisy or small, making
      FGSM steps ineffective, while the model is trivially vulnerable to PGD which navigates past
      the masking. PGD is the correct evaluation adversary (Section 10.4). FGSM failure is a
      lower bound on robustness, not a measure of it.

  part_5:
    title: 'Epsilon Sweep: Perceptibility, Success Rate, and Domain-Specific Constraints'
    body: |
      The epsilon parameter controls the trade-off between attack success rate and perturbation
      magnitude. Its interpretation depends on the input domain''s normalisation.

      For images normalised to [0, 1] (pixel values divided by 255), the practical epsilon range
      is 0.004 (approximately 1/255) to 0.063 (approximately 16/255). At epsilon=4/255, FGSM
      achieves roughly 30-40% untargeted attack success on standard classifiers; at epsilon=8/255
      (the common research benchmark), roughly 50-65%; at epsilon=16/255, roughly 80-90%. Below
      8/255, perturbations are typically invisible to human observers. Above 16/255, visible noise
      begins to appear on uniform-colour regions.

      For malware feature vectors (normalised to [0, 1] per feature), the perceptibility constraint
      does not apply in the same way -- the adversary is constrained by what byte modifications are
      functionally equivalent, not by visual imperceptibility. Epsilon can be larger, but not all
      feature changes are achievable: import table hash features, for instance, cannot be modified
      independently of the binary content. The effective epsilon is domain-constrained, not
      perceptibility-constrained.

      For fraud scoring features (transaction amount, time, category), the epsilon constraint maps
      to what values the adversary can actually present in a transaction. A 10% change in transaction
      amount may be within an L-infinity epsilon of 0.1 on a normalised feature scale, but the
      adversary can only use amounts that are meaningful in the transaction context. The constraint
      is physically realisable combinations, not Lp norm alone.

      For adversarial training (Section 10.15), the epsilon used to generate training examples
      should match the epsilon at which the production threat operates. Using a larger training
      epsilon produces more conservative robustness but damages clean accuracy; using a smaller
      training epsilon risks leaving the model undefended in the transition region identified in
      Section 10.2.

  part_6:
    title: 'Targeted FGSM: Gradient Reversal and the Goal-to-Epsilon Cost'
    body: |
      Standard FGSM maximises the loss for the correct class -- it pushes the model away from the
      right answer without specifying where it lands. Targeted FGSM adds a direction constraint: the
      adversary specifies a target class y_target and the perturbation is designed to minimise the
      loss for y_target rather than maximise it for y_true.

      The update rule for targeted FGSM is: x_adv = x - epsilon * sign(nabla_x J(theta, x, y_target)).
      The minus sign is the reversal: moving in the negative gradient direction for y_target is the
      direction that makes the model more confident in y_target. This is equivalent to gradient
      ascent on the probability of y_target instead of gradient descent on the probability of y_true.

      The efficiency gap between targeted and untargeted at matched epsilon is significant and
      predictable. Untargeted FGSM needs only to cross the nearest decision boundary -- any wrong
      class will do. Targeted FGSM needs to cross the boundary separating y_true from y_target,
      which may be much farther away in input space, especially if y_target is semantically
      distant from y_true. Empirically, targeted FGSM achieves roughly 40-60% of the untargeted
      success rate at matched epsilon. For the adversary to achieve comparable targeted success,
      epsilon must be increased -- which increases perturbation magnitude and detectability.

      From a defender''s perspective, the detectability asymmetry works slightly in their favour
      for targeted attacks: the higher epsilon required for targeted FGSM means larger perturbations,
      which are more readily caught by feature squeezing. The adversary who uses untargeted FGSM
      at low epsilon produces harder-to-detect examples; the one who insists on targeted
      misclassification pays a perturbation budget cost.

  part_7:
    title: 'Transferability, Detection Properties, and the Bridge to PGD'
    body: |
      FGSM adversarial examples transfer from source model to victim model at moderate rates,
      typically 15-40% for architecturally different models trained on the same dataset. The
      transfer mechanism is the same as for all transfer attacks (Section 10.7): models trained on
      the same distribution learn similar decision boundaries, and an adversarial perturbation
      that exploits the gradient direction of one model often also exploits the shared boundary
      geometry of the other.

      FGSM transfers less reliably than PGD for two structural reasons. First, single-step FGSM
      does not approach the decision boundary as closely as iterative PGD -- the adversarial example
      is farther from the boundary, meaning its classification as the wrong class is less stable and
      less likely to persist under a different model''s boundary geometry. Second, FGSM''s
      perturbation is entirely determined by the gradient direction at x, which is specific to the
      source model''s weights. PGD iterates across multiple gradient steps, averaging out
      source-model-specific gradient artefacts, producing examples more likely to be adversarial in
      the generic gradient direction shared across models.

      FGSM perturbations are also relatively detectable by Track 7 feature squeezing. The detection
      mechanism is prediction change under input transformation: squeezing destroys the precise
      perturbation calibration, restoring the correct classification. FGSM''s single-step
      perturbation is precisely calibrated to the gradient at x but is not robust to small input
      changes. Gaussian blur or bit-depth reduction modifies the input by amounts comparable to
      the FGSM perturbation, and the resulting input falls back on the correct side of the boundary.
      Empirically, feature squeezing with a modest Gaussian kernel (sigma=1) catches 70-85% of
      FGSM examples at epsilon=8/255.

      PGD (Section 10.4) closes the gaps FGSM leaves open. By iterating multiple gradient steps,
      each with projection back onto the epsilon ball, PGD drives the adversarial example much
      closer to the decision boundary, making it more stable under input transformations, more
      transferable across models, and more likely to remain adversarial under random perturbation.
      The gradient-sign primitive from FGSM is unchanged; what PGD adds is iteration within a
      constrained neighbourhood.

