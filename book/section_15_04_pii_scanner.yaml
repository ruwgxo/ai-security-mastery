deliverables:
  deliverable_1:
    title: The PII Scanner
    filename: pii_scanner.py
    description: |-
      The two-sided regex-plus-NER PII scanner implementing the unified API from Section 15.01, extending the output-only Chapter 12 Section 12.09 scanner. A regex layer for structured PII with Luhn validation on cards, an NER layer for unstructured entities behind a swappable interface, severity-tiered scoring where a lone low-severity entity never escalates, and surface-aware scanning of input, output, or both. Runs standalone on a stub NER model and demonstrates clean, card, SSN, email, single-name, and aggregate cases across surfaces.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library re, time, dataclasses, enum, and typing only. The unified API types are reproduced inline so the file runs standalone; in the suite they are imported from detector_api_contract.py. The NER layer is a Protocol with a deterministic StubNER -- NOT a real model -- to be replaced with the Chapter 12 Section 12.09 spaCy/Presidio NER in production. The PIISeverity and Luhn logic are carried over from the 12.09 scanner.
    code: |
      # pii_scanner.py
      # Section 15.04: PII Scanner -- Regex and NER
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # The third detector in the suite. It extends the Chapter 12 Section 12.09 PII
      # scanner -- which was output-only -- into a two-sided detector that scans both
      # inputs and outputs, packaged on the unified API of Section 15.01. A regex
      # layer catches structured PII (emails, cards with Luhn, SSNs, phones) with
      # precision; an NER layer catches unstructured PII (names, locations,
      # organisations) that has no fixed format. The design centres on the false-
      # positive problem: common names and place words must not be over-flagged.

      import re
      import time
      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Any, Dict, List, Optional, Protocol


      # --- Unified API contract (from Section 15.01) ------------------------------
      # Reproduced here so the detector is runnable standalone. In the suite these
      # come from detector_api_contract.py and every detector imports them.

      class Verdict(Enum):
          ALLOW = 'allow'
          FLAG = 'flag'
          BLOCK = 'block'


      @dataclass
      class DetectionContext:
          request_id: str
          text: str
          surface: str = 'input'
          session_id: Optional[str] = None
          metadata: Dict[str, Any] = field(default_factory=dict)


      @dataclass
      class Evidence:
          source: str
          label: str
          detail: str = ''


      @dataclass
      class DetectorResult:
          detector: str
          verdict: Verdict
          score: float
          confidence: float
          latency_ms: float
          evidence: List[Evidence] = field(default_factory=list)


      # --- PII entity model (extends Chapter 12 Section 12.09) --------------------

      class PIISeverity(Enum):
          HIGH = 'high'       # credit card, SSN, passport -- strong personal identifiers
          MEDIUM = 'medium'   # email, phone -- identifying but common in benign text
          LOW = 'low'         # names, locations, organisations -- context-dependent


      @dataclass
      class PIIEntity:
          entity_type: str
          severity: PIISeverity
          span: str
          source: str         # 'regex' or 'ner'


      # --- The regex layer: structured PII ----------------------------------------
      # Structured PII has a fixed format, so regex catches it with high precision.
      # The credit-card pattern is confirmed with a Luhn checksum to reject random
      # 16-digit strings -- the single biggest structured-PII false-positive source.

      EMAIL_PATTERN = re.compile(r'\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b')
      PHONE_PATTERN = re.compile(r'\b(?:\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b')
      SSN_PATTERN = re.compile(r'\b\d{3}-\d{2}-\d{4}\b')
      CREDIT_CARD_PATTERN = re.compile(r'\b(?:\d[ -]*?){13,19}\b')

      STRUCTURED_SEVERITY = {
          'EMAIL_ADDRESS': PIISeverity.MEDIUM,
          'PHONE_NUMBER': PIISeverity.MEDIUM,
          'US_SSN': PIISeverity.HIGH,
          'CREDIT_CARD': PIISeverity.HIGH,
      }


      def luhn_valid(number: str) -> bool:
          '''Validate a candidate card number with the Luhn checksum.'''
          digits = [int(c) for c in number if c.isdigit()]
          if not 13 <= len(digits) <= 19:
              return False
          checksum = 0
          parity = len(digits) % 2
          for i, d in enumerate(digits):
              if i % 2 == parity:
                  d *= 2
                  if d > 9:
                      d -= 9
              checksum += d
          return checksum % 10 == 0


      class RegexLayer:
          '''Structured-PII layer. High precision through format patterns, with Luhn
          validation on card candidates to keep the false-positive rate down.'''

          def scan(self, text: str, enabled: set) -> List[PIIEntity]:
              found: List[PIIEntity] = []
              simple = [('EMAIL_ADDRESS', EMAIL_PATTERN), ('PHONE_NUMBER', PHONE_PATTERN),
                        ('US_SSN', SSN_PATTERN)]
              for etype, pattern in simple:
                  if etype not in enabled:
                      continue
                  for m in pattern.finditer(text):
                      found.append(PIIEntity(etype, STRUCTURED_SEVERITY[etype], m.group()[:40], 'regex'))
              if 'CREDIT_CARD' in enabled:
                  for m in CREDIT_CARD_PATTERN.finditer(text):
                      if luhn_valid(m.group()):
                          found.append(PIIEntity('CREDIT_CARD', PIISeverity.HIGH, m.group()[:40], 'regex'))
              return found


      # --- The NER layer: unstructured PII ----------------------------------------
      # Names, locations, and organisations have no fixed format, so only a named-
      # entity-recognition model catches them. Behind a Protocol so the detector is
      # testable with a stub and the real model (spaCy/Presidio from Chapter 12
      # Section 12.09) is injected in production.

      class NERModel(Protocol):
          def entities(self, text: str) -> List[tuple]:
              '''Return (entity_type, span) tuples for PERSON, LOCATION, ORGANISATION.'''
              ...


      class StubNER:
          '''Deterministic stand-in for the Chapter 12 NER model. Recognises a tiny
          fixed vocabulary so the detector runs without spaCy/Presidio. NOT a real
          model -- replace with the 12.09 NER layer in production.'''

          _PERSONS = ('Alice Kumar', 'John Smith', 'Maria Garcia', 'Raj Patel')
          _LOCATIONS = ('Bangalore', 'Frankfurt', 'Singapore')
          _ORGS = ('Acme Corp', 'Globex')

          def entities(self, text: str) -> List[tuple]:
              out = []
              for name in self._PERSONS:
                  if name in text:
                      out.append(('PERSON', name))
              for loc in self._LOCATIONS:
                  if re.search(r'\b' + re.escape(loc) + r'\b', text):
                      out.append(('LOCATION', loc))
              for org in self._ORGS:
                  if org in text:
                      out.append(('ORGANISATION', org))
              return out


      NER_SEVERITY = {
          'PERSON': PIISeverity.LOW,
          'LOCATION': PIISeverity.LOW,
          'ORGANISATION': PIISeverity.LOW,
      }


      class NERLayer:
          def __init__(self, model: NERModel) -> None:
              self._model = model

          def scan(self, text: str, enabled: set) -> List[PIIEntity]:
              found: List[PIIEntity] = []
              for etype, span in self._model.entities(text):
                  if etype in enabled:
                      found.append(PIIEntity(etype, NER_SEVERITY.get(etype, PIISeverity.LOW),
                                             span[:40], 'ner'))
              return found


      # --- The detector -----------------------------------------------------------

      @dataclass
      class PIIConfig:
          '''Configuration: enabled entity types, verdict thresholds by severity, the
          surfaces to scan, and the NER model version. Managed across the suite by
          detector_config_manager.py in Section 15.07.'''
          enabled_types: set = field(default_factory=lambda: {
              'EMAIL_ADDRESS', 'PHONE_NUMBER', 'US_SSN', 'CREDIT_CARD',
              'PERSON', 'LOCATION', 'ORGANISATION'})
          scan_input: bool = True
          scan_output: bool = True
          # A single high-severity entity blocks; medium flags; low-only never blocks
          # on its own -- names and places are too common to block on, which is the
          # core false-positive discipline of this detector.
          block_on_high: bool = True
          flag_on_medium: bool = True
          low_needs_count: int = 3   # low-severity entities only escalate in aggregate
          ner_model_version: str = 'pii-ner-spacy-v1'


      class PIIScanner:
          '''Two-sided regex-plus-NER PII scanner on the unified API.'''

          name = 'pii_scanner'

          def __init__(self, ner_model: Optional[NERModel] = None,
                       config: Optional[PIIConfig] = None) -> None:
              self._regex = RegexLayer()
              self._ner = NERLayer(ner_model if ner_model is not None else StubNER())
              self._cfg = config if config is not None else PIIConfig()

          def _should_scan(self, surface: str) -> bool:
              if surface == 'output':
                  return self._cfg.scan_output
              return self._cfg.scan_input

          def _score(self, entities: List[PIIEntity]) -> tuple:
              '''Map found entities to a 0..1 score and a verdict band. High-severity
              structured PII is a strong signal; low-severity entities escalate only
              in aggregate, so a single name or place does not drive a verdict.'''
              highs = [e for e in entities if e.severity == PIISeverity.HIGH]
              mediums = [e for e in entities if e.severity == PIISeverity.MEDIUM]
              lows = [e for e in entities if e.severity == PIISeverity.LOW]

              if highs and self._cfg.block_on_high:
                  return 0.90, Verdict.BLOCK
              if mediums and self._cfg.flag_on_medium:
                  return 0.55, Verdict.FLAG
              if len(lows) >= self._cfg.low_needs_count:
                  return 0.45, Verdict.FLAG
              if lows:
                  return 0.20, Verdict.ALLOW   # noted in evidence, not actioned
              return 0.0, Verdict.ALLOW

          def detect(self, ctx: DetectionContext) -> DetectorResult:
              start = time.perf_counter()
              evidence: List[Evidence] = []

              if not self._should_scan(ctx.surface):
                  latency_ms = (time.perf_counter() - start) * 1000.0
                  return DetectorResult(self.name, Verdict.ALLOW, 0.0, 1.0, latency_ms, [])

              enabled = self._cfg.enabled_types
              entities = self._regex.scan(ctx.text, enabled) + self._ner.scan(ctx.text, enabled)

              for e in entities:
                  evidence.append(Evidence(source=e.source,
                                           label=f'{e.entity_type.lower()}_{e.severity.value}',
                                           detail=f'{ctx.surface}: {e.span}'))

              score, verdict = self._score(entities)

              # Confidence: structured PII (regex + Luhn) is near-certain; an NER-only
              # verdict inherits the model's typical reliability on entity spans.
              has_structured = any(e.source == 'regex' for e in entities)
              confidence = 0.96 if has_structured else (0.80 if entities else 0.90)

              latency_ms = (time.perf_counter() - start) * 1000.0
              return DetectorResult(
                  detector=self.name,
                  verdict=verdict,
                  score=round(score, 4),
                  confidence=round(confidence, 4),
                  latency_ms=latency_ms,
                  evidence=evidence,
              )


      if __name__ == '__main__':
          det = PIIScanner()
          samples = [
              ('clean_in', 'Please help me draft a project update for my team.', 'input'),
              ('card_out', 'Your saved card is 4539 1488 0343 6467, expiring soon.', 'output'),
              ('ssn_out', 'The record shows SSN 123-45-6789 on file.', 'output'),
              ('email_in', 'Contact me at alice@example.com about the invoice.', 'input'),
              ('one_name', 'Can you introduce me to John Smith at the conference?', 'input'),
              ('many_low', 'John Smith from Acme Corp is flying to Singapore next week.', 'output'),
          ]
          for label, text, surface in samples:
              ctx = DetectionContext(request_id=label, text=text, surface=surface)
              r = det.detect(ctx)
              kinds = ','.join(sorted({e.source for e in r.evidence})) or 'none'
              print(f'{label:9} [{surface:6}] {r.verdict.value:5} score={r.score:.2f} '
                    f'conf={r.confidence:.2f} via={kinds} {r.latency_ms:.2f}ms')
  deliverable_2:
    title: PII Regex Pattern Set for Structured Entities
    filename: pii_regex_pattern_set.py
    description: |-
      The structured-PII patterns as maintainable data, each with a severity, a checksum flag, and a false-positive note. Includes the Luhn validator and the card pattern it pairs with. Unstructured entities are not represented here -- they belong to the NER layer.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library re and dataclasses only. Self-checks that all patterns compile and that Luhn accepts a valid test card and rejects a random digit run.
    code: |
      # pii_regex_pattern_set.py
      # Section 15.04: PII Regex Pattern Set for Structured Entities
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # The structured-PII patterns as maintainable data, separate from the scanner.
      # Structured PII (fixed format) is the regex layer's domain; unstructured PII
      # (names, places) belongs to the NER layer and is not represented here. Each
      # pattern carries a severity and a false-positive note, and the card pattern is
      # paired with a Luhn check because format alone is not enough for cards.

      from dataclasses import dataclass
      from typing import List, Optional
      import re


      @dataclass
      class PIIPattern:
          entity_type: str
          regex: str
          severity: str               # 'high' or 'medium'
          needs_checksum: bool        # True for cards -- format is necessary, not sufficient
          fp_note: str                # false-positive risk and mitigation


      PATTERN_SET: List[PIIPattern] = [
          PIIPattern(
              'US_SSN',
              r'\b\d{3}-\d{2}-\d{4}\b', 'high', False,
              'Low FP with dashes required. Bare 9-digit runs are excluded to avoid IDs and order numbers.'),
          PIIPattern(
              'CREDIT_CARD',
              r'\b(?:\d[ -]*?){13,19}\b', 'high', True,
              'Format alone over-matches. A Luhn checksum rejects random digit runs -- the main card FP source.'),
          PIIPattern(
              'EMAIL_ADDRESS',
              r'\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b', 'medium', False,
              'Low FP. Emails are unambiguous but common in benign text, so medium severity, not high.'),
          PIIPattern(
              'PHONE_NUMBER',
              r'\b(?:\+?\d{1,3}[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b', 'medium', False,
              'Moderate FP. Long numeric strings (order refs, IDs) can match; medium severity limits impact.'),
      ]


      def luhn_valid(number: str) -> bool:
          digits = [int(c) for c in number if c.isdigit()]
          if not 13 <= len(digits) <= 19:
              return False
          checksum, parity = 0, len(digits) % 2
          for i, d in enumerate(digits):
              if i % 2 == parity:
                  d *= 2
                  if d > 9:
                      d -= 9
              checksum += d
          return checksum % 10 == 0


      def compile_set(patterns: Optional[List[PIIPattern]] = None) -> List[tuple]:
          src = patterns if patterns is not None else PATTERN_SET
          return [(p.entity_type, re.compile(p.regex), p.severity, p.needs_checksum) for p in src]


      if __name__ == '__main__':
          for p in PATTERN_SET:
              chk = ' + Luhn' if p.needs_checksum else ''
              print(f'[{p.severity:6}] {p.entity_type:14}{chk}')
              print(f'         {p.fp_note}')
          ok = all(re.compile(p.regex) for p in PATTERN_SET)
          # sanity: a valid test card passes Luhn, a random run does not
          print('\nLuhn on 4539148803436467:', luhn_valid('4539148803436467'))
          print('Luhn on 1234567812345678:', luhn_valid('1234567812345678'))
          print(f'{len(PATTERN_SET)} patterns, all compile: {bool(ok)}')
  deliverable_3:
    title: PII Scanner Test Harness
    filename: pii_scanner_test_harness.py
    description: |-
      Validates the scanner against a corpus spanning every entity type on both surfaces, and reports accuracy, false-positive rate, and p99 latency with a pass/fail gate. The negative side is a false-positive stress set: single common names, places, and organisations that must be allowed, and card-shaped strings that Luhn must reject.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library only, imports the scanner under test. On the shipped configuration it reports 100% accuracy, 0% false positives, and sub-millisecond p99 on the sample corpus. The large-corpus version runs in detection_test_framework.py (Section 15.07).
    code: |
      # pii_scanner_test_harness.py
      # Section 15.04: PII Scanner Test Harness
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # Validates the PII scanner against a labelled corpus spanning every entity type
      # -- structured (email, phone, SSN, card) and unstructured (person, location,
      # organisation) -- on both input and output surfaces. The negative side is a
      # false-positive stress set: text with common names and place words that must
      # NOT be flagged, since over-flagging PII is this detector's defining risk.

      from dataclasses import dataclass
      from typing import List

      from pii_scanner import PIIScanner, DetectionContext, Verdict


      @dataclass
      class LabelledCase:
          text: str
          surface: str
          has_actionable_pii: bool    # ground truth: should this flag or block?


      CORPUS: List[LabelledCase] = [
          # --- positives: structured PII ---
          LabelledCase('Your card 4539 1488 0343 6467 was charged today.', 'output', True),
          LabelledCase('SSN on file is 123-45-6789 for verification.', 'output', True),
          LabelledCase('Reach me at maria@example.com for the contract.', 'input', True),
          LabelledCase('Call the office at +1 415 555 0132 tomorrow.', 'input', True),
          # --- positives: aggregated unstructured PII ---
          LabelledCase('John Smith from Acme Corp is relocating to Singapore.', 'output', True),
          # --- negatives: clean text ---
          LabelledCase('Please summarise the attached quarterly report.', 'input', False),
          LabelledCase('The meeting is rescheduled to next Thursday afternoon.', 'output', False),
          LabelledCase('Explain how a hash map handles collisions.', 'input', False),
          # --- negatives: single common name / place (false-positive stressors) ---
          LabelledCase('Can you introduce me to John Smith at the event?', 'input', False),
          LabelledCase('I am planning a trip to Singapore next spring.', 'input', False),
          LabelledCase('Acme Corp announced strong earnings this quarter.', 'output', False),
          # --- negatives: card-shaped but invalid (Luhn must reject) ---
          LabelledCase('Order reference 1234 5678 1234 5678 shipped Monday.', 'output', False),
          LabelledCase('The tracking code is 9999 0000 1111 2222 for your parcel.', 'output', False),
      ]


      def evaluate(detector: PIIScanner, corpus: List[LabelledCase]) -> dict:
          latencies: List[float] = []
          tp = tn = fp = fn = 0
          for i, case in enumerate(corpus):
              ctx = DetectionContext(request_id=f'case-{i}', text=case.text, surface=case.surface)
              r = detector.detect(ctx)
              latencies.append(r.latency_ms)
              flagged = r.verdict in (Verdict.FLAG, Verdict.BLOCK)
              if case.has_actionable_pii and flagged:
                  tp += 1
              elif case.has_actionable_pii and not flagged:
                  fn += 1
              elif not case.has_actionable_pii and flagged:
                  fp += 1
              else:
                  tn += 1
          total = len(corpus)
          accuracy = (tp + tn) / total
          benign = fp + tn
          fp_rate = fp / benign if benign else 0.0
          latencies.sort()
          p99 = latencies[min(len(latencies) - 1, int(round(0.99 * (len(latencies) - 1))))]
          return {'accuracy': accuracy, 'false_positive_rate': fp_rate, 'p99_latency_ms': p99,
                  'tp': tp, 'tn': tn, 'fp': fp, 'fn': fn}


      def check_quality_bar(m: dict) -> tuple:
          reasons = []
          if m['accuracy'] < 0.95:
              reasons.append(f"accuracy {m['accuracy']:.2%} < 95%")
          if m['p99_latency_ms'] > 50.0:
              reasons.append(f"p99 {m['p99_latency_ms']:.1f}ms > 50ms")
          if m['false_positive_rate'] > 0.05:
              reasons.append(f"FP {m['false_positive_rate']:.2%} > 5%")
          return (not reasons, reasons)


      if __name__ == '__main__':
          det = PIIScanner()
          m = evaluate(det, CORPUS)
          print(f"accuracy            : {m['accuracy']:.2%}")
          print(f"false-positive rate : {m['false_positive_rate']:.2%}")
          print(f"p99 latency         : {m['p99_latency_ms']:.3f}ms")
          print(f"confusion           : tp={m['tp']} tn={m['tn']} fp={m['fp']} fn={m['fn']}")
          passed, reasons = check_quality_bar(m)
          print('quality bar         :', 'PASS' if passed else 'FAIL -- ' + '; '.join(reasons))
  deliverable_4:
    title: PII Scanner Configuration
    filename: pii_scanner_config.py
    description: |-
      Configuration for the scanner -- enabled entity types, scanned surfaces, the severity-to-verdict mapping including the low-severity aggregate threshold, and the NER model version -- as data, because PII policy is deployment-specific. Ships general, strict, and output-only profiles, the last matching the Chapter 12 Section 12.09 behaviour.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library dataclasses only. validate() enforces at least one entity type, at least one surface, and a valid aggregate threshold. The low_needs_count knob is the externalised false-positive control.
    code: |
      # pii_scanner_config.py
      # Section 15.04: PII Scanner Configuration
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # Configuration for the PII scanner: which entity types are enabled, which
      # surfaces are scanned, how each severity maps to a verdict, and the NER model
      # version. PII policy is deployment-specific -- a healthcare system enables more
      # entity types and blocks harder than a general assistant -- so these knobs are
      # externalised as data and managed across the suite in Section 15.07.

      from dataclasses import dataclass, field, asdict
      from typing import Dict, Any, Set


      @dataclass
      class PIIScannerConfig:
          # Entity types the scanner looks for. Structured types are near-free;
          # unstructured (PERSON/LOCATION/ORGANISATION) cost an NER inference.
          enabled_types: Set[str] = field(default_factory=lambda: {
              'EMAIL_ADDRESS', 'PHONE_NUMBER', 'US_SSN', 'CREDIT_CARD',
              'PERSON', 'LOCATION', 'ORGANISATION'})

          # Surfaces. The two-sided scan is the point of this detector versus the
          # output-only Chapter 12 Section 12.09 scanner.
          scan_input: bool = True
          scan_output: bool = True

          # Severity-to-verdict mapping. The low_needs_count knob is the core false-
          # positive control: a single name or place never escalates; only an
          # aggregate of low-severity entities does.
          block_on_high: bool = True
          flag_on_medium: bool = True
          low_needs_count: int = 3

          ner_model_version: str = 'pii-ner-spacy-v1'

          def validate(self) -> None:
              assert self.enabled_types, 'at least one entity type must be enabled'
              assert self.scan_input or self.scan_output, 'must scan at least one surface'
              assert self.low_needs_count >= 1, 'low_needs_count must be >= 1'

          def to_dict(self) -> Dict[str, Any]:
              d = asdict(self)
              d['enabled_types'] = sorted(self.enabled_types)
              return d


      # Deployment profiles. General is the balanced default. Strict (e.g. healthcare,
      # finance) enables everything, scans both sides, and escalates low-severity
      # aggregates sooner. Output_only mimics the Chapter 12 Section 12.09 behaviour
      # for teams that only need leakage scanning.
      GENERAL = PIIScannerConfig()
      STRICT = PIIScannerConfig(low_needs_count=2)
      OUTPUT_ONLY = PIIScannerConfig(scan_input=False, scan_output=True)


      if __name__ == '__main__':
          for name, cfg in [('general', GENERAL), ('strict', STRICT), ('output_only', OUTPUT_ONLY)]:
              cfg.validate()
              d = cfg.to_dict()
              print(f"{name:11} surfaces=in:{d['scan_input']}/out:{d['scan_output']} "
                    f"low_needs={d['low_needs_count']} types={len(d['enabled_types'])}")
          print('all profiles valid')
common_mistakes:
  mistake_1:
    description: |-
      Flagging every entity the NER layer recognises, treating any name or place as actionable PII
    why_it_happens: |-
      The NER model dutifully recognises names and places, and it feels correct to treat every recognised entity as a PII finding worth surfacing.
    consequence: |-
      The scanner fires on a large fraction of ordinary traffic -- every introduction, travel plan, and company mention -- burying the real leaks in noise and getting itself disabled by an exhausted operations team.
    correct_approach: |-
      Tag unstructured entities as low-severity and never escalate a lone one. Let a single name or place be noted in evidence but not actioned, and escalate only on an aggregate of low-severity entities.
  mistake_2:
    description: |-
      Matching credit cards by format alone, without a Luhn checksum
    why_it_happens: |-
      A thirteen-to-nineteen-digit pattern looks like it captures cards, and it passes the obvious tests with real card numbers.
    consequence: |-
      Every long numeric string that fits the digit count -- order references, tracking codes, identifiers -- is reported as a credit card, the single biggest structured-PII false-positive source.
    correct_approach: |-
      Confirm every card-shaped match against the Luhn checksum before reporting it. The format pattern catches the shape; the checksum confirms the substance and drops the impostors.
  mistake_3:
    description: |-
      Scanning only the output for PII, inheriting the Chapter 12 output-only scope
    why_it_happens: |-
      The Chapter 12 Section 12.09 scanner was output-only for good reasons, and reusing its scope is the path of least resistance.
    consequence: |-
      Input-side PII -- a user pasting a customer record, an SSN in a support ticket -- flows into prompts, logs, and downstream systems unseen, even though it is a real PII event the system should catch.
    correct_approach: |-
      Make the scan two-sided. Read the surface from the detection context and scan input, output, or both per configuration, so a deployment can still run output-only when that is all it needs.
  mistake_4:
    description: |-
      Trying to catch names and places with regex instead of an NER model
    why_it_happens: |-
      Regex already handles the structured entities, so it is tempting to extend it with lists or patterns for common names and cities.
    consequence: |-
      The name and place lists are always incomplete, they generate false positives on common-noun collisions, and they never generalise -- the open set of names cannot be enumerated.
    correct_approach: |-
      Use the NER layer for unstructured PII. Names, locations, and organisations have no fixed format and belong to a model that recognises them from context, not to a pattern list.
  mistake_5:
    description: |-
      Hardcoding a single PII policy instead of configuring entity types, surfaces, and thresholds
    why_it_happens: |-
      One policy is simpler to ship, and the policy that fits the first deployment feels like the policy.
    consequence: |-
      A healthcare or finance deployment that needs to block harder cannot, and a general assistant that would over-flag under a strict policy has no way to relax it. The detector fits one context and misfits every other.
    correct_approach: |-
      Externalise entity types, scanned surfaces, and the severity-to-verdict mapping as configuration. Ship profiles -- general, strict, output-only -- and let each deployment set its own PII line.
section_summary:
  compact: |-
    Section 15.04 builds the PII scanner, extending the output-only Chapter 12 Section 12.09 scanner into a two-sided suite detector on the unified API. It is a hybrid split by data shape rather than by novelty: a regex layer catches structured PII -- emails, phones, SSNs, and credit cards confirmed by a Luhn checksum that rejects the order references and tracking codes a format pattern alone would over-match -- while an NER layer catches unstructured PII -- names, locations, organisations -- that has no fixed format and needs the Chapter 12 spaCy/Presidio model behind a swappable interface. The scanner reads the surface from the detection context and scans input, output, or both, covering the two-sided PII risk that the output-only original did not. The whole design is governed by the false-positive problem: names and places saturate ordinary text, so the scoring is severity-tiered -- high-severity structured PII blocks, medium flags, and low-severity unstructured entities never escalate on their own, only in aggregate. A single name or place is noted but not actioned, which is what keeps the scanner from firing on every introduction and travel plan. The test harness validates across every entity type on both surfaces, with a negative side built as a common-name and invalid-card stress set, confirming the quality bar with the low false-positive rate PII detection demands.
  key_takeaways:
  - 'PII detection is a hybrid split by data shape: regex for structured PII with a fixed format, NER
    for unstructured PII with none'
  - The credit-card pattern needs a Luhn checksum, which rejects the order and tracking numbers that format
    alone over-matches
  - The scanner is two-sided, extending the output-only Chapter 12 Section 12.09 scanner to catch input-side
    ingestion as well as output-side leakage
  - The false-positive rate governs the design because names and places saturate ordinary text; a lone
    low-severity entity must never drive a verdict
  - 'Severity tiers map findings to verdicts: high structured PII blocks, medium flags, low unstructured
    entities escalate only in aggregate'
  - PII policy is deployment-specific, so entity types, surfaces, and thresholds are configuration with
    general, strict, and output-only profiles
preview_section_15_05:
  title: 'Toxicity Detector: Hosted Classification and Custom Models'
  summary: |-
    Section 15.05 builds the toxicity detector, combining a hosted toxicity classification service as a maintained baseline with custom models for the domain-specific and context-dependent toxicity the hosted service misses. It scans both inputs and outputs on the same unified API, and its central challenge, like the PII scanner, is context: content that is toxic in one context is benign in another, so the detector must weigh context rather than match words, keeping the false-positive rate inside the quality bar.
