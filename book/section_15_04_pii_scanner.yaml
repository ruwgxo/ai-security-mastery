section_overview:
  one_line_summary: |-
    The third detector extends the Chapter 12 Section 12.09 PII scanner -- which was output-only -- into a two-sided detector on the unified API: a regex layer catches structured PII (emails, cards with a Luhn check, SSNs, phones) with precision, an NER layer catches unstructured PII (names, locations, organisations) that has no fixed format, and the whole thing is tuned around one problem -- not over-flagging the common names and place words that are the defining false-positive risk of PII detection.
  why_this_section_exists: |-
    PII detection is a different kind of hybrid from injection and jailbreak. There the two layers were patterns for the known and a classifier for the novel. Here the split is by data shape: structured PII has a fixed format, so a regex catches it with high precision, while unstructured PII -- a person name, a city, a company -- has no format at all and can only be found by a named-entity-recognition model that has learned what names and places look like. Neither layer substitutes for the other. A regex cannot enumerate the world names; an NER model is the wrong, slow tool for a credit card that a format pattern nails instantly. So the scanner runs both.

    The section also does two things specific to PII. First, it makes the detector two-sided. The Chapter 12 Section 12.09 scanner was the only output-side detector in that chapter, catching leakage in what the model says. But PII arrives on the input too -- a user pasting a customer record, an SSN in a support request -- and a suite detector should cover both surfaces. This scanner reads the surface from the detection context and scans input, output, or both. Second, and most important, the section is organised around the false-positive problem. Names and place words are everywhere in ordinary text, and a scanner that flags every John or Singapore is worse than useless -- it buries the real leaks and gets disabled. The core design decision here is that a single low-severity entity never drives a verdict; only structured PII or an aggregate of unstructured entities does. That discipline is what keeps the detector inside the quality bar.
  position_in_chapter: |-
    Section 15.04 is the third detector and the first whose two layers split by data shape (structured versus unstructured) rather than by known versus novel. It reuses the unified API and quality bar, extends a specific Chapter 12 detector rather than wrapping a classifier, and introduces the severity-tiered scoring that the toxicity detector (15.05) also needs. It is the clearest case in the chapter of the false-positive rate driving the design.
