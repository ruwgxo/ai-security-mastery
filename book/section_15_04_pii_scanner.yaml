prose_content:
  part_1:
    title: A Hybrid Split by Data Shape
    body: |-
      The PII scanner is a hybrid, but it splits along a different seam than the injection and jailbreak detectors. Those split by novelty: patterns for the known attacks, a classifier for the novel ones. The PII scanner splits by data shape, because personal data comes in two shapes that need two different tools. Structured PII has a fixed, recognisable format -- a credit card is sixteen digits that pass a checksum, a US SSN is three-two-four digits with dashes, an email has an at-sign and a domain. Format is exactly what a regular expression captures, so the regex layer catches structured PII with high precision and near-zero latency. Unstructured PII has no format at all. A person name, a city, a company -- there is no pattern that matches all names and only names, because names are an open, unbounded set. The only tool that finds them is a named-entity-recognition model that has learned what a name or a place looks like from context.

      Neither layer can do the other job. You cannot regex your way to recognising every surname in the world, and you would not run a model inference to catch a credit card that a format pattern and a Luhn check nail instantly and certainly. So the scanner runs both layers over the text and unions their findings. This is still the layered principle -- two complementary detectors covering what each other misses -- but organised around the structure of the data rather than the novelty of the attack. The rest of the section builds the two layers, makes the scan two-sided, and then spends most of its attention on the problem that governs the whole design: keeping the false-positive rate low.
  part_2:
    title: 'The Regex Layer: Structured PII and the Luhn Check'
    body: |-
      The regex layer matches the structured entity formats: email addresses, phone numbers, US SSNs, and credit-card numbers. For most of these, the format is specific enough that a well-written pattern has a low false-positive rate on its own -- an email with an at-sign and a domain, an SSN with its dash structure. The credit card is the exception, and it is instructive. A pattern that matches thirteen to nineteen digits will match a great many numeric strings that are not cards at all: order references, tracking codes, long identifiers. Format alone is necessary but not sufficient.

      The fix is the Luhn checksum. Every real credit-card number satisfies the Luhn algorithm, a simple digit-weighting check, and the overwhelming majority of random digit runs do not. So the layer confirms every card-shaped match against Luhn before reporting it, and this single step removes the largest structured-PII false-positive source. A sixteen-digit order reference that happens to match the card pattern fails the checksum and is dropped; a real card passes and is reported as high-severity. This is a general lesson the section makes concrete: for structured PII, pair the format pattern with a validity check whenever one exists, because the pattern catches the shape and the check confirms the substance. Each structured entity carries a severity -- cards and SSNs are high, emails and phones are medium -- and that severity, not the mere fact of a match, drives the verdict.
  part_3:
    title: 'The NER Layer: Unstructured PII'
    body: |-
      The NER layer catches the personal data that has no format: person names, locations, and organisations. It is the Chapter 12 Section 12.09 NER capability -- built on spaCy and Presidio there -- exposed to this detector behind a small interface that returns the entity type and span for each recognised entity. As with the classifiers in the earlier detectors, the interface keeps the model swappable and the detector testable with a stub, and pins the model version in configuration so a verdict is reproducible.

      The crucial fact about the NER layer is that its output is inherently lower-confidence and lower-severity than the regex layer, and the design must respect that. A credit card that passes Luhn is almost certainly a credit card. A token the NER model tags as a person name is probably a name, but names are ordinary words -- many surnames are also common nouns, place names double as person names, and the model makes mistakes. More importantly, even a correctly recognised name is usually not a privacy incident: mentioning that you would like to meet John Smith at a conference is not leaking personal data in any meaningful sense. So every NER entity is tagged low-severity, and the scoring treats low-severity entities very differently from structured PII. The NER layer provides coverage of a real category of PII, but its findings are weighed with the caution their confidence and their privacy significance warrant.
  part_4:
    title: 'Two-Sided Scanning: Input and Output'
    body: |-
      The Chapter 12 Section 12.09 scanner was output-only, and deliberately so: it was the one output-side detector in that chapter, built to catch the leakage -- OWASP LLM06 -- that the model produces in its responses, which no input-side detector can prevent. That output focus was right for its place in the book, but a PII detector in the production suite needs to cover both surfaces, because PII crosses the boundary in both directions.

      On the output side, the risk is leakage: the model emitting personal data it should not, whether from its training, its context, or a tool result. On the input side, the risk is ingestion and mishandling: a user pasting a customer record, a support ticket carrying an SSN, a prompt that carries personal data into logs and downstream systems that were never meant to hold it. Both are PII events a production system needs to see. So this scanner reads the surface from the detection context and scans whichever surfaces the configuration enables -- input, output, or both. The two-sided scan is the concrete extension this section makes over the Chapter 12 scanner, and it is a configuration setting rather than a fixed behaviour, so a deployment that only needs leakage scanning can run output-only and match the earlier behaviour exactly.
  part_5:
    title: The False-Positive Problem and Severity-Tiered Scoring
    body: |-
      Everything about the scoring is shaped by one fact: names and place words are everywhere in ordinary text. A user asks to be introduced to a colleague, plans a trip to a city, mentions a company in the news -- each of these contains an entity the NER layer will recognise, and none of them is a PII incident. A scanner that flagged every recognised name or place would fire on a large fraction of all normal traffic, drown the real leaks in noise, and be switched off by an operations team it exhausts. For the PII scanner more than any other detector in the suite, the false-positive rate is not a metric to satisfy at the end but the constraint that determines the whole design.

      The scoring answers this with severity tiers. High-severity structured PII -- a card, an SSN -- is a strong, high-confidence signal and blocks on its own. Medium-severity structured PII -- an email, a phone number -- flags. Low-severity unstructured entities -- names, locations, organisations -- do not escalate on their own at all: a single recognised name produces an evidence note but no action, because one name is not actionable PII. Low-severity entities only escalate in aggregate, when several appear together, because a message naming a person, their employer, and their destination is a different privacy proposition from a message that mentions one colleague. This tiering is the direct analogue of the precision tiers in the injection and jailbreak detectors, applied to entity severity rather than pattern precision, and it is what lets the scanner catch the real leaks while leaving the vast benign middle -- the introductions, the travel plans, the company mentions -- untouched.
  part_6:
    title: 'Meeting the Quality Bar: A Multi-Entity Corpus and the Name Stress Set'
    body: |-
      The test harness validates the scanner against a corpus spanning every entity type -- structured and unstructured, across input and output surfaces -- and reports the three quality-bar metrics with a pass/fail gate. The positive cases exercise each detection path: a Luhn-valid card and an SSN for the high-severity regex path, an email and a phone for the medium path, and a message with a name, an organisation, and a location together for the low-severity aggregate path.

      The negative side is where the PII scanner is really tested, and it is built as a false-positive stress set aimed squarely at the design decision above. It includes single common names (introduce me to John Smith), single places (a trip to Singapore), and single organisations (a company earnings mention) -- all of which must be allowed, because a lone low-severity entity is not actionable. It includes card-shaped strings that are not cards -- order references and tracking codes with the right digit count -- which the Luhn check must reject. A PII scanner that scores well on obvious cards and obvious clean text has proven nothing; the bar is met only when it separates the real personal data from the names, places, and number strings that merely resemble it. When it does -- high accuracy, a false-positive rate inside the target, latency well under budget -- the two-sided scanner implements the unified API and is ready for the combined pipeline of Section 15.07.
