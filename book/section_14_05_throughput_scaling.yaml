section_overview:
  one_line_summary: 'Throughput is the requests per second the gateway must sustain, and horizontal scaling
    -- adding instances -- is how it is met: the stateless inline tier scales cleanly by replication,
    the stateful near-real-time and batch tiers scale by coordinating shared state, and backpressure and
    autoscaling keep the system sustaining peak load without collapsing or over-provisioning.'
  why_this_section_exists: |-
    Section 14.04 made each individual request fit the sub-50ms latency budget. A request that
    fits the budget one at a time is necessary but not sufficient, because production does not
    send one request at a time -- it sends thousands per second, and a gateway that handles one
    request in fifty milliseconds still fails if it cannot handle the rate at which requests
    arrive. Latency is about a single request; throughput is about the aggregate. This section
    engineers throughput. It defines throughput as the requests per second the gateway must
    sustain, establishes horizontal scaling -- adding instances -- as the way to meet it rather
    than vertical scaling of a single instance, and explains why the statelessness of the
    inline tier is what makes its horizontal scaling clean. It then addresses the harder case:
    the near-real-time and batch tiers hold shared state, so scaling them is not mere
    replication but state coordination. Around this it builds the operational machinery of
    scale -- load balancing across instances, autoscaling on a load signal, backpressure when
    load exceeds capacity, and capacity planning to size the tiers for peak -- so that the
    latency-correct gateway of 14.04 becomes a throughput-correct one that sustains the load it
    will actually see.
  position_in_chapter: |-
    Section 14.05 is the second of the two performance sections (14.04-14.05) and the response
    to the throughput half of the latency-and-throughput performance concern. Where 14.04
    engineered per-request latency, this section engineers aggregate throughput and scaling.
    With performance complete, the resilience sections (14.06-14.07) take over: 14.06 decides
    what happens when a detector fails, and 14.07 keeps one failure from cascading -- the
    failure side of the same production system this section scales.
