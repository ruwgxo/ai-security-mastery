prose_content:
  part_1:
    title: 'From Latency to Throughput: The Aggregate View'
    body: |-
      Section 14.04 answered a question about a single request: can the gateway inspect it and
      return a verdict within fifty milliseconds. This section answers a different question
      about many requests: can the gateway sustain the rate at which they arrive. These are not
      the same question, and a system can pass the first while failing the second. A gateway
      that handles one request in a comfortable forty milliseconds still fails if ten thousand
      requests arrive each second and it can only process five thousand, because the backlog
      grows without bound until the gateway falls over.

      Throughput is the name for this aggregate quantity: the requests per second the gateway
      must sustain. It is the load side of the system, where latency is the per-request side,
      and both must be satisfied for the gateway to work in production. The relationship
      between them is not that one implies the other. A fast per-request latency helps
      throughput -- each instance finishes requests sooner and can take the next -- but it does
      not by itself provide throughput, because a single instance has a finite capacity no
      matter how fast each request is. Meeting a throughput of ten thousand requests per second
      is not about making each request faster; it is about having enough capacity to serve them
      all.

      This reframing is why throughput is a distinct engineering concern with its own section.
      The whole apparatus of this section -- scaling, load balancing, autoscaling, backpressure,
      capacity planning -- exists to provide and manage capacity at the aggregate level, on top
      of the per-request latency that 14.04 already secured. A gateway that is latency-correct
      but not throughput-correct is a gateway that works in a demo and fails in production, and
      closing that gap is the work here.
  part_2:
    title: Horizontal Scaling and Why the Inline Tier Scales Cleanly
    body: |-
      There are two ways to add capacity. Vertical scaling makes a single instance bigger --
      more CPU, more memory -- so it handles more requests. Horizontal scaling adds more
      instances and spreads the load across them. Vertical scaling hits a ceiling quickly,
      because there is a largest instance you can buy and a single instance is a single point
      of failure, so production throughput at scale is met horizontally: to double capacity,
      double the instances.

      Horizontal scaling is clean when any instance can handle any request, and that condition
      is exactly statelessness. A stateless instance holds no per-request or per-session state
      that a request depends on, so a request can be sent to any instance and get the same
      answer. When that is true, adding capacity is just adding instances behind a load
      balancer, and capacity is linear in instance count: the scaling planner for this section
      computes the instance count for a target rate as a simple division precisely because the
      inline tier is stateless.

      The inline tier is stateless by design, and this is where the Chapter 13 architecture
      pays off again. The inline detectors read precomputed summaries and score the request in
      front of them; they do not accumulate state across requests, because the stateful work
      was deliberately pushed to the slower tiers. That design choice was made for latency in
      Chapter 13 and for the latency budget in 14.04, and here it delivers a third benefit: the
      hot path scales horizontally and cleanly. The tier that must handle the full request rate
      is the tier that is easiest to scale, which is not a coincidence but the consequence of
      engineering the hot path to be stateless.
  part_3:
    title: 'Scaling the Stateful Tiers: Coordinating Shared State'
    body: |-
      The near-real-time and batch tiers do not have the luxury of statelessness. A
      near-real-time session scorer holds a recent window of state per session; a batch job
      works over a large historical corpus. Their whole function is to consult state that spans
      many requests, so they cannot be stateless, and that makes their scaling a harder problem
      than the inline tier.

      The difficulty is that you cannot scale a stateful tier by simple replication, because
      two independent replicas each holding their own copy of the state would disagree. If a
      session hashes to one instance on one request and a different instance on the next, and
      each instance maintains its own view of that session, neither has the complete picture.
      Scaling a stateful tier therefore means coordinating the state across instances, and the
      usual tool is partitioning: the state is divided by a key -- the session identifier, say
      -- and each instance owns a partition, with the load balancer routing every request for a
      given key to the instance that owns that key. This keeps a session on one instance so its
      state stays local and complete, and it is why the near-real-time tier balances by
      consistent hash on the session key rather than by least-connections.

      Partitioning scales, but it costs more than replication in coordination: rebalancing when
      instances are added or removed, handling the state of a partition whose instance fails,
      and keeping the routing consistent. The scaling planner reflects this by flagging the
      stateful tiers -- it shows an instance floor from the arithmetic but notes that
      coordination adds cost beyond that floor. This extra difficulty is one more reason the
      Chapter 13 partition put these detectors off the hot path: not only is their latency too
      high for the inline budget, their scaling is too costly to sit on the tier that must
      absorb the full request rate. The stateful tiers are scaled where their coordination cost
      is paid away from the hot path.
  part_4:
    title: Load Balancing and Autoscaling
    body: |-
      Horizontal scaling needs two pieces of operational machinery to work: a way to spread
      requests across the instances, and a way to change the instance count as load changes.
      These are load balancing and autoscaling.

      The load balancer sits in front of a tier and distributes requests across its instances,
      and the right algorithm depends on the tier statefulness. The stateless inline tier
      balances on something like least-connections, whose only goal is even load: since any
      instance serves any request, the balancer just keeps the instances evenly busy and sends
      fewer new requests to a slow one. The stateful near-real-time tier cannot balance that
      way, because a request must reach the instance holding its session state, so it balances
      by consistent hash on the session key. The load balancer also runs health checks and
      stops routing to an instance that fails them, which is the first line of the availability
      work that Section 14.07 develops fully.

      Autoscaling changes the instance count automatically in response to load, so the tier is
      sized to what it is actually handling rather than fixed at a guess. The key design point
      is that each tier scales on the signal that reflects its own load. The inline tier scales
      on request rate per instance, because request rate is what it feels. The near-real-time
      tier scales on consumer lag -- how far behind the queue it is running -- because lag is
      what tells it the incoming rate exceeds its processing rate. The batch tier scales on job
      backlog. A single global metric would scale the wrong tier at the wrong time; the tier
      that is actually under load is the one whose own signal has moved. Cooldowns on scale-up
      and scale-down keep the autoscaler from thrashing, adding capacity promptly when load
      rises and removing it more slowly when load falls.
  part_5:
    title: 'Backpressure: Degrading Gracefully Under Overload'
    body: |-
      Autoscaling adds capacity, but it is not instantaneous -- new instances take time to
      start, and load can spike faster than the autoscaler can react. There will therefore be
      moments when incoming load exceeds current capacity, and what the gateway does in those
      moments decides whether it degrades gracefully or collapses. The mechanism for degrading
      gracefully is backpressure.

      Backpressure is a graduated response to load relative to capacity. Below capacity, the
      gateway serves every request normally. Above capacity but within a small queue headroom,
      it queues the overflow briefly, betting that the spike is short or that autoscaling will
      catch up. Beyond that, it sheds load: it rejects the excess requests explicitly, ideally
      with a retry signal so callers back off and try again shortly, rather than accepting
      requests it cannot serve. The backpressure calculator for this section encodes exactly
      this ladder -- serve, then queue, then shed -- as a function of incoming rate against
      capacity and headroom.

      Shedding load feels like a failure, but it is the opposite -- it is what prevents a
      failure. A gateway that accepts every request under overload, holding them all while it
      falls further behind, eventually exhausts its memory or its threads and collapses, taking
      down the requests already in flight along with the new ones. A gateway that sheds the
      excess protects the requests it can serve by refusing the ones it cannot. Shedding a
      fraction deliberately is how the system stays up under load it was not provisioned for,
      and it is the difference between a bad minute and an outage. Under overload, controlled
      partial service beats uncontrolled total failure.
  part_6:
    title: Capacity Planning and the Complete Performance Picture
    body: |-
      Backpressure handles the load you did not plan for; capacity planning is the discipline of
      planning for the load you can foresee, so that backpressure is the rare exception rather
      than the routine. Capacity planning sizes each tier for peak load, not average load,
      because a system sized for the average is over capacity exactly when it matters most --
      at the peak. Peak is the average multiplied by a peak factor that reflects the traffic
      shape, and the tiers are provisioned to serve that peak with headroom to spare.

      The headroom is deliberate. The capacity calculator for this section sizes the fleet so
      that at peak it runs at a target utilisation below one hundred per cent -- eighty per
      cent, for instance -- rather than exactly at capacity. Running at full utilisation at
      peak leaves no margin for a burst above the expected peak, for an instance failing, or
      for the autoscaler to react, so a fleet sized to be exactly full at peak is a fleet that
      sheds load at the slightest surprise. Sizing for peak at a target utilisation buys the
      margin that keeps the system serving through the ordinary variation around the peak.

      With capacity planning, the performance picture of the chapter is complete. Section 14.04
      made each request fit the latency budget; this section made the gateway sustain the
      aggregate request rate -- scaling the stateless inline tier cleanly by replication,
      scaling the stateful tiers by coordinating their state, balancing and autoscaling each
      tier on its own load, absorbing overload with backpressure, and sizing for peak with
      headroom. The gateway is now fast per request and sufficient in aggregate. What it is not
      yet is resilient: nothing so far says what happens when a detector errors or times out,
      or how one failure is kept from taking down the whole gateway. That is the resilience
      stage, and Section 14.06 opens it with the decision every failing detector forces --
      fail-open or fail-closed.
