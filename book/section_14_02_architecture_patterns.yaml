deliverables:
  deliverable_1:
    title: Architecture Pattern Selector
    filename: architecture_pattern_selector.py
    description: Selects the API gateway, sidecar, or inline pattern from a requirements record -- latency
      budget, whether detection deploys independently, whether a separate team owns it, whether it scales
      separately, and whether a network hop is tolerable -- and returns the recommended pattern with its
      rationale and cautions. Runs a set of worked scenarios.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the recommended pattern with reasons and cautions per scenario.
    code: |
      # architecture_pattern_selector.py
      # Section 14.02: Architecture Pattern Selector
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class PatternRequirements:
          latency_budget_ms: float
          deploy_detection_independently: bool
          owned_by_separate_team: bool
          scale_detection_separately: bool
          tolerate_extra_network_hop: bool


      @dataclass
      class PatternRecommendation:
          pattern: str
          rationale: List[str]
          cautions: List[str]


      def select_pattern(req: PatternRequirements) -> PatternRecommendation:
          rationale: List[str] = []
          cautions: List[str] = []

          # Inline is the only pattern with no added network hop, so a very tight
          # latency budget that cannot absorb a hop forces inline.
          if req.latency_budget_ms < 10 and not req.tolerate_extra_network_hop:
              rationale.append('Latency budget under 10ms cannot absorb a network hop, so detection must run in-process')
              if req.deploy_detection_independently:
                  cautions.append('Inline couples detection to the application release cycle; independent deploy is lost')
              if req.owned_by_separate_team:
                  cautions.append('Inline embeds detection in application code; a separate security team loses ownership isolation')
              return PatternRecommendation('inline', rationale, cautions)

          # A separate team plus independent deploy plus a clear choke point favours
          # the API gateway, at the cost of a hop.
          if req.owned_by_separate_team and req.deploy_detection_independently and req.scale_detection_separately:
              rationale.append('Separate ownership, independent deploy, and separate scaling all favour a centralised gateway')
              rationale.append('The gateway is a single choke point in front of the model service')
              if not req.tolerate_extra_network_hop:
                  cautions.append('The gateway adds a network hop; verify the latency budget absorbs it')
              return PatternRecommendation('api_gateway', rationale, cautions)

          # Independent deploy without wanting a full extra hop favours the sidecar:
          # co-located, so the hop is loopback, but still deployed independently.
          if req.deploy_detection_independently and not req.tolerate_extra_network_hop:
              rationale.append('Independent deploy wanted but a full network hop is not tolerable')
              rationale.append('The sidecar co-locates detection with the application over loopback while deploying independently')
              if req.scale_detection_separately:
                  cautions.append('The sidecar scales with the application pod; independent scaling is limited')
              return PatternRecommendation('sidecar', rationale, cautions)

          # Default: gateway when a hop is tolerable, otherwise sidecar.
          if req.tolerate_extra_network_hop:
              rationale.append('A network hop is tolerable and centralisation simplifies operation, so the gateway is the default')
              return PatternRecommendation('api_gateway', rationale, cautions)
          rationale.append('No tight in-process constraint but a hop is not tolerable, so the sidecar balances the trade-offs')
          return PatternRecommendation('sidecar', rationale, cautions)


      SCENARIOS = [
          ('Tight inline classifier', PatternRequirements(5.0, False, False, False, False)),
          ('Central security gateway', PatternRequirements(40.0, True, True, True, True)),
          ('Independent deploy, no hop', PatternRequirements(30.0, True, False, False, False)),
          ('Relaxed budget, hop ok', PatternRequirements(80.0, False, False, False, True)),
      ]


      def run_scenarios() -> None:
          print('=' * 78)
          print('ARCHITECTURE PATTERN SELECTOR')
          print('Selects API gateway, sidecar, or inline by latency, ownership, and scaling')
          print('=' * 78)
          for name, req in SCENARIOS:
              rec = select_pattern(req)
              print()
              print(f'SCENARIO: {name}')
              print(f'  Budget {req.latency_budget_ms}ms | indep_deploy={req.deploy_detection_independently} '
                    f'| sep_team={req.owned_by_separate_team} | sep_scale={req.scale_detection_separately} '
                    f'| hop_ok={req.tolerate_extra_network_hop}')
              print(f'  -> PATTERN: {rec.pattern}')
              for r in rec.rationale:
                  print(f'     reason : {r}')
              for c in rec.cautions:
                  print(f'     caution: {c}')


      if __name__ == '__main__':
          run_scenarios()
  deliverable_2:
    title: Architecture Pattern Comparison
    filename: architecture_pattern_comparison.py
    description: Encodes each pattern profile across the four trade-off axes -- added latency, coupling,
      deployment independence, and blast radius -- plus choke point and scaling, prints the full comparison,
      and renders the fixed latency-floor ranking that follows from the transport mechanism rather than
      from the detectors.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the per-pattern comparison and the latency-floor ranking.
    code: |
      # architecture_pattern_comparison.py
      # Section 14.02: Architecture Pattern Comparison
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class PatternProfile:
          name: str
          added_latency: str
          coupling: str
          deployment_independence: str
          blast_radius: str
          choke_point: str
          scaling: str


      PROFILES: List[PatternProfile] = [
          PatternProfile(
              name='API Gateway',
              added_latency='One network hop (request and response cross the gateway)',
              coupling='Loose -- detection is a separate service in front of the model',
              deployment_independence='Full -- deploy detection without touching the application',
              blast_radius='Contained -- a gateway fault is isolated from the application process',
              choke_point='Yes -- single central point where all traffic is inspected',
              scaling='Independent -- scale the gateway fleet separately from the application',
          ),
          PatternProfile(
              name='Sidecar',
              added_latency='Loopback call (co-located, no cross-network hop)',
              coupling='Moderate -- co-located with the application but a separate process',
              deployment_independence='High -- deploy the sidecar image independently of application code',
              blast_radius='Shared host -- a sidecar fault can affect its pod but not the fleet',
              choke_point='Per-pod -- inspection happens beside each application instance',
              scaling='Coupled to the pod -- the sidecar scales as the application scales',
          ),
          PatternProfile(
              name='Inline',
              added_latency='In-process function call (no hop, lowest latency floor)',
              coupling='Tight -- detection is embedded in the application request path',
              deployment_independence='None -- detection ships with the application release',
              blast_radius='Widest -- a detector fault runs in the application process itself',
              choke_point='In-code -- inspection is a call in the application handler',
              scaling='Coupled to the application -- no separate scaling of detection',
          ),
      ]


      def print_comparison(profiles: List[PatternProfile]) -> None:
          print('=' * 78)
          print('ARCHITECTURE PATTERN COMPARISON')
          print('Latency, coupling, deployment independence, and blast radius per pattern')
          print('=' * 78)
          for p in profiles:
              print()
              print(f'PATTERN: {p.name}')
              print(f'  Added latency         : {p.added_latency}')
              print(f'  Coupling              : {p.coupling}')
              print(f'  Deployment independence: {p.deployment_independence}')
              print(f'  Blast radius          : {p.blast_radius}')
              print(f'  Choke point           : {p.choke_point}')
              print(f'  Scaling               : {p.scaling}')


      def latency_ranking(profiles: List[PatternProfile]) -> None:
          # The latency floor ordering is fixed by the mechanism: in-process < loopback < network hop.
          order = ['Inline', 'Sidecar', 'API Gateway']
          print()
          print('=' * 78)
          print('LATENCY FLOOR RANKING (lowest first)')
          print('=' * 78)
          for i, name in enumerate(order, start=1):
              print(f'  {i}. {name}')
          print()
          print('The ordering is a property of the transport, not of the detectors.')
          print('Inline pays no hop, the sidecar pays a loopback, the gateway pays a network hop.')
          print('Lower latency is bought with tighter coupling and a wider blast radius.')


      if __name__ == '__main__':
          print_comparison(PROFILES)
          latency_ranking(PROFILES)
  deliverable_3:
    title: Pattern-to-Tier Mapping
    filename: pattern_to_tier_mapping.py
    description: Maps each Chapter 13 detection tier -- inline, near-real-time, and batch -- onto its
      placement under each of the three patterns, and prints the key observation that the pattern choice
      matters most for the inline tier because the off-path tiers consume events asynchronously in every
      pattern.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the tier placements per pattern and the inline-tier observation.
    code: |
      # pattern_to_tier_mapping.py
      # Section 14.02: Where Each Chapter 13 Detection Tier Sits in Each Pattern
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class TierPlacement:
          tier: str
          api_gateway: str
          sidecar: str
          inline: str


      PLACEMENTS: List[TierPlacement] = [
          TierPlacement(
              tier='Inline (hot path, sub-50ms)',
              api_gateway='Runs in the gateway process, in the request path through the gateway',
              sidecar='Runs in the sidecar over loopback, lower latency floor than the gateway',
              inline='Runs as an in-process call in the application handler, lowest floor',
          ),
          TierPlacement(
              tier='Near-real-time (seconds, off hot path)',
              api_gateway='Gateway emits events to a separate near-real-time service asynchronously',
              sidecar='Sidecar forwards enrichment events to a shared near-real-time service',
              inline='Application emits events to a near-real-time service; not run in-process',
          ),
          TierPlacement(
              tier='Batch (minutes to hours, async)',
              api_gateway='Runs entirely off-path as scheduled jobs over the event and log store',
              sidecar='Runs entirely off-path as scheduled jobs over the event and log store',
              inline='Runs entirely off-path as scheduled jobs over the event and log store',
          ),
      ]


      def print_placements(placements: List[TierPlacement]) -> None:
          print('=' * 78)
          print('PATTERN-TO-TIER MAPPING')
          print('Where each Chapter 13 detection tier sits in each architecture pattern')
          print('=' * 78)
          for p in placements:
              print()
              print(f'TIER: {p.tier}')
              print(f'  API Gateway: {p.api_gateway}')
              print(f'  Sidecar    : {p.sidecar}')
              print(f'  Inline     : {p.inline}')


      def key_observation() -> None:
          print()
          print('=' * 78)
          print('KEY OBSERVATION')
          print('=' * 78)
          print('The pattern choice matters most for the INLINE tier, because that tier is on')
          print('the hot path and pays the pattern latency floor on every request.')
          print('The NEAR-REAL-TIME and BATCH tiers run off the hot path in every pattern, so')
          print('the pattern choice barely affects them -- they consume events asynchronously')
          print('regardless of how the inline tier is placed.')
          print('This is why placement is an inline-tier decision first and foremost.')


      if __name__ == '__main__':
          print_placements(PLACEMENTS)
          key_observation()
  deliverable_4:
    title: Combined-Pattern Reference Architecture
    filename: combined_pattern_architecture.py
    description: Defines the canonical combined architecture -- an API gateway for inline detection, a
      sidecar for near-real-time enrichment, and off-path jobs for batch -- and validates the combination,
      checking that the inline hot path is served and that all three Chapter 13 tiers have a dedicated
      component.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the reference architecture components and a combination validation report.
    code: |
      # combined_pattern_architecture.py
      # Section 14.02: Combined-Pattern Reference Architecture
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class ArchitectureComponent:
          name: str
          pattern: str
          tier_served: str
          reason: str


      REFERENCE_ARCHITECTURE: List[ArchitectureComponent] = [
          ArchitectureComponent(
              name='API gateway with inline detectors',
              pattern='api_gateway',
              tier_served='Inline (hot path)',
              reason='Central choke point, independent deploy and scaling for the security team, blocking verdict before the model call',
          ),
          ArchitectureComponent(
              name='Sidecar enrichment collector',
              pattern='sidecar',
              tier_served='Near-real-time',
              reason='Co-located with the application to gather session context cheaply and forward it without a full network hop',
          ),
          ArchitectureComponent(
              name='Batch analytics jobs',
              pattern='off_path',
              tier_served='Batch',
              reason='Large-state coordinated-network and population analysis run asynchronously over the event store, off the hot path',
          ),
      ]


      def validate_combination(components: List[ArchitectureComponent]) -> List[str]:
          findings: List[str] = []
          patterns_used = {c.pattern for c in components}
          tiers_served = {c.tier_served for c in components}

          if 'api_gateway' in patterns_used and 'sidecar' in patterns_used:
              findings.append('Gateway plus sidecar is a valid combination: gateway for blocking inline detection, sidecar for near-real-time enrichment')
          if 'Inline (hot path)' not in tiers_served:
              findings.append('WARNING: no component serves the inline hot path; blocking detection is missing')
          if len(tiers_served) < 3:
              findings.append('NOTE: not all three Chapter 13 tiers are served by a dedicated component')
          else:
              findings.append('All three Chapter 13 tiers (inline, near-real-time, batch) are served')
          return findings


      def print_reference(components: List[ArchitectureComponent]) -> None:
          print('=' * 78)
          print('COMBINED-PATTERN REFERENCE ARCHITECTURE')
          print('Patterns are not mutually exclusive; a real gateway combines them by tier')
          print('=' * 78)
          for c in components:
              print()
              print(f'COMPONENT: {c.name}')
              print(f'  Pattern     : {c.pattern}')
              print(f'  Tier served : {c.tier_served}')
              print(f'  Reason      : {c.reason}')
          print()
          print('=' * 78)
          print('COMBINATION VALIDATION')
          print('=' * 78)
          for f in validate_combination(components):
              print(f'  - {f}')


      if __name__ == '__main__':
          print_reference(REFERENCE_ARCHITECTURE)
common_mistakes:
  mistake_1:
    description: Choosing the inline pattern for its low latency without accounting for the loss of deployment
      independence and the widened blast radius
    why_it_happens: |-
      Inline has the lowest latency floor and is the simplest to wire up -- a function call in
      the handler -- so it looks like the obvious choice when latency is the visible concern
      and the coupling costs are not yet felt.
    consequence: Every detector change becomes an application release, the security team loses its own
      deploy schedule, and a detector that throws or hangs takes the application process down with it,
      because detection and application share a process.
    correct_approach: Reach for inline only when the latency budget genuinely cannot absorb even a loopback
      call, and prefer the sidecar or gateway otherwise so that detection keeps independent deployment
      and its fault stays isolated from the application.
  mistake_2:
    description: Defaulting to the API gateway everywhere without checking that the latency budget can
      absorb the network hop
    why_it_happens: |-
      The gateway is the cleanest pattern to reason about -- one central choke point,
      independent deploy and scaling -- so it is adopted as a blanket default without measuring
      the hop against the specific budget of the hot path it sits on.
    consequence: The added network hop consumes a large share of the sub-50ms inline budget, leaving too
      little for the detectors themselves, and the gateway is later blamed for latency that the placement
      decision caused.
    correct_approach: Confirm the latency budget can absorb one engineered network hop before choosing
      the gateway, and if it cannot, drop to a sidecar for the loopback saving or inline for the tightest
      budgets.
  mistake_3:
    description: Treating the three patterns as mutually exclusive and forcing every detection tier into
      one pattern
    why_it_happens: |-
      A single uniform pattern is simpler to describe and operate, and the tiers are easy to
      treat as an internal detail rather than as the natural seam along which patterns should
      be combined.
    consequence: The batch tier is awkwardly forced through a request-path gateway it does not need, or
      the inline tier is denied the gateway choke point it does need, and the architecture fights the
      tier structure instead of using it.
    correct_approach: 'Combine patterns along the Chapter 13 tier boundaries: a gateway for the inline
      hot path, a sidecar for near-real-time enrichment, and off-path jobs for batch, because the pattern
      choice matters most for the inline tier and barely affects the off-path tiers.'
  mistake_4:
    description: Assuming the pattern choice affects all three detection tiers equally
    why_it_happens: |-
      The pattern is described as a property of the whole detection system, so it is natural to
      assume it applies uniformly, without noticing that only the inline tier is actually on
      the hot path where the pattern latency floor is paid.
    consequence: Effort is spent optimising the pattern placement of the near-real-time and batch tiers,
      which consume events asynchronously in every pattern, while the real leverage on the inline tier
      is under-analysed.
    correct_approach: 'Recognise that placement is primarily an inline-tier decision: analyse the pattern
      choice hardest for the inline tier on the hot path, and place the off-path tiers the same way regardless
      of the inline pattern.'
  mistake_5:
    description: Making the placement decision implicitly, by whatever wiring was easiest, rather than
      against a stated rationale
    why_it_happens: |-
      Placement often falls out of the existing deployment topology -- detection is added
      wherever there was a convenient hook -- so the pattern is inherited rather than chosen,
      and no rationale is recorded.
    consequence: The later sections that depend on the placement -- latency budgeting, failure policy,
      scaling -- have no stated basis to build on, and when the placement turns out to constrain them
      badly there is no record of why it was chosen or what to revisit.
    correct_approach: Make the placement decision explicitly against the latency budget, ownership, and
      scaling drivers, using the pattern selector so that the choice carries a documented rationale the
      performance and resilience sections can rely on.
section_summary:
  compact: |-
    The API gateway, sidecar, and inline patterns place detection at different points in the
    request path and trade the same four properties -- latency floor, coupling, deployment
    independence, and blast radius -- against one another. The gateway runs detection as a
    separate service in front of the model, giving a central choke point, independent deploy,
    and independent scaling at the cost of a network hop. The sidecar co-locates detection as
    its own process, keeping independent deployment and a loopback latency floor but scaling
    with the pod. Inline embeds detection in the application handler for the lowest latency
    floor at the cost of the tightest coupling and the widest blast radius. Moving toward lower
    latency moves toward tighter coupling and wider blast radius, so the choice is a trade-off
    driven by three requirements: the latency budget sets the floor, team ownership sets the
    coupling, and the scaling model sets the fleet. The patterns are not mutually exclusive; a
    real gateway combines them along the Chapter 13 tier boundaries -- a gateway for inline
    detection, a sidecar for near-real-time enrichment, off-path jobs for batch -- because the
    pattern choice matters most for the inline tier on the hot path and barely affects the
    off-path tiers. Placement is the first production decision because it fixes the latency
    floor, process boundaries, and scaling model that every later section engineers against.
  key_takeaways:
  - The API gateway, sidecar, and inline patterns place detection at different points in the request path
    and trade latency floor against coupling, deployment independence, and blast radius
  - The gateway gives a central choke point with independent deploy and scaling at the cost of a network
    hop; the sidecar keeps independent deploy over a loopback but scales with the pod; inline gives the
    lowest latency floor at the cost of the tightest coupling and widest blast radius
  - Lower latency is bought with tighter coupling and a wider blast radius, so the pattern choice is a
    deliberate trade-off, not an optimisation
  - 'The choice is driven by three requirements: the latency budget sets the floor, team ownership sets
    the coupling, and the scaling model sets the fleet'
  - Placement is primarily an inline-tier decision because the near-real-time and batch tiers consume
    events asynchronously in every pattern
  - The patterns combine along the Chapter 13 tier boundaries -- a gateway for inline detection, a sidecar
    for near-real-time enrichment, off-path jobs for batch -- and this placement constrains the latency,
    failure, and scaling engineering of later sections
preview_section_14_03:
  title: 'Integration Points: Pre-Processing and Post-Processing Detection'
  summary: |-
    With the architecture pattern chosen and the detection tiers placed, Section 14.03 fixes
    the second half of placement: where in the request lifecycle each detector hooks in. It
    distinguishes pre-processing detection, which scores the request before the model call,
    from post-processing detection, which scores the response after it, states which detectors
    belong at each point, and builds detection_integration_points.py to place each detector at
    the correct hook. It completes the placement concern that this section began.
