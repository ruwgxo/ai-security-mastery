prose_content:
  part_1:
    title: Placement Is the First Production Decision
    body: |-
      The taxonomy in Section 14.01 listed six deployment concerns and put placement first. The
      ordering was not incidental. You cannot budget the latency of a detector until you know
      where it runs, you cannot set its failure policy until you know what process it runs in,
      and you cannot plan its scaling until you know whether it scales with the application or
      apart from it. Every later decision in the chapter is made against a fixed placement, so
      placement is decided first.

      Placement is the question of where, in the path between the client and the model service,
      the detection system sits. The behavioural monitoring gateway of Chapter 13 is a logical
      object: it says a request is inspected by four detection layers across three tiers, but it
      does not say what process that inspection runs in or where in the network topology it
      happens. Turning that logical object into a running one means choosing a physical
      placement, and there are three canonical choices: a separate gateway service in front of
      the model, a sidecar process co-located with the application, or code embedded inline in
      the application request path.

      The three are not three flavours of the same thing. They place detection at genuinely
      different points, and that difference propagates through the rest of the system. The
      point at which detection sits determines how much latency it adds, how tightly it is
      coupled to the application, whether it can be deployed and scaled on its own, and how far
      a fault in a detector spreads. Those four properties -- latency, coupling, deployment
      independence, and blast radius -- are the axes on which the patterns trade against one
      another, and the rest of this section is about that trade.
  part_2:
    title: 'The API Gateway Pattern: Detection as a Service in Front of the Model'
    body: |-
      The API gateway pattern places detection in a separate service that sits in front of the
      model service. Every request from the client passes through the gateway, is inspected,
      and is either forwarded to the model or blocked; every response passes back through the
      gateway on its way out. Detection is a distinct deployable, with its own process, its own
      release cycle, and its own fleet.

      This placement has three properties that make it the default for a security team. First,
      it is a clear choke point: all traffic to the model crosses one place, so there is a
      single point at which every request is guaranteed to be inspected, with no way for a
      caller to reach the model while skipping detection. Second, it gives full deployment
      independence: the detection service is released without touching the application, so the
      security team can ship a new detector or tune a threshold on its own schedule. Third, it
      scales independently: the gateway fleet is sized to the detection workload, not to the
      application workload, so a heavy detector can be given more capacity without scaling the
      application.

      The cost of these properties is a network hop. Because the gateway is a separate service,
      the request and the response each cross the network to reach it and return, and that hop
      is added latency on the hot path that the inline detectors must fit within their budget.
      The gateway also becomes a component that must itself be made highly available, because a
      choke point that is down is a total outage. The gateway pattern is the right default when
      a separate team owns detection, independent deployment and scaling are wanted, and the
      latency budget can absorb the hop -- which is the common case for the sub-50ms inline
      budget, where a single well-engineered hop is affordable.
  part_3:
    title: 'The Sidecar Pattern: Detection Co-Located Beside the Application'
    body: |-
      The sidecar pattern places detection in its own process, but co-located with the
      application rather than in a separate fleet. In a container platform the sidecar is a
      second container in the same pod as the application; the application calls it over
      loopback, and it inspects the request or enriches it before the application proceeds. The
      sidecar is a middle point between the gateway and the inline patterns, and it is
      deliberately positioned to keep some of the strengths of each.

      From the gateway pattern it keeps deployment independence. The sidecar is a separate
      image with its own release cycle, so detection is still deployed without editing and
      redeploying the application code -- the security team updates the sidecar image and the
      platform rolls it out beside the application. From the inline pattern it keeps a low
      latency floor. Because the sidecar is co-located, the call to it is a loopback call
      within the pod rather than a cross-network hop, so it avoids most of the latency the
      gateway pays while still running as a separate process.

      What the sidecar gives up is on the scaling and blast-radius axes. Because it lives in
      the application pod, it scales as the application scales: you cannot give the detection
      sidecar more replicas than the application without changing the pod model, so independent
      scaling is limited. And because it shares a host with the application, a misbehaving
      sidecar -- one that leaks memory or saturates CPU -- can affect the application instance
      it sits beside, though the blast radius is bounded to the pod rather than the whole
      fleet. The sidecar is the right choice when independent deployment is wanted but a full
      network hop is not tolerable, and when detection scaling can follow the application.
  part_4:
    title: 'The Inline Pattern: Detection Embedded in the Request Path'
    body: |-
      The inline pattern embeds detection directly in the application request path as an
      in-process call. There is no separate service and no separate process: the application
      handler calls the detector as a function, gets a verdict, and proceeds. This is the
      placement with the lowest possible latency floor, because there is no hop and no loopback
      -- the detector runs in the same process, sharing the same memory, and the only cost is
      the compute of the detector itself.

      That latency floor is the reason to reach for inline. When the budget is so tight that it
      cannot absorb even a loopback call -- a detector that must run in single-digit
      milliseconds as part of a larger hot path -- inline is the only pattern that fits,
      because it adds no transport cost at all. For the cheapest, most latency-critical
      signature and heuristic checks of the inline tier, running them in-process is sometimes
      the only way to stay within budget.

      The price is paid on every other axis. Coupling is at its tightest: detection ships with
      the application, so a detector change means an application release, and the security team
      loses the ability to deploy on its own schedule. Deployment independence is gone
      entirely. And the blast radius is at its widest, because the detector runs inside the
      application process: a detector that throws, hangs, or leaks does so in the application
      itself, so a detector fault is an application fault. Inline trades away independence and
      isolation for raw latency, and it should be chosen only when the latency budget genuinely
      forces it, because the failure policy and circuit breaking of the later sections are
      harder to apply cleanly when detection and application share a process.
  part_5:
    title: The Trade-Off Space and Pattern Selection
    body: |-
      Laid side by side, the three patterns form a single trade-off space along one dominant
      axis: latency floor versus independence and isolation. Inline has the lowest latency
      floor and the least independence and isolation; the gateway has the most independence and
      isolation and the highest latency floor; the sidecar sits between them, buying most of
      the gateway independence while paying only a loopback. Moving toward lower latency moves
      toward tighter coupling and a wider blast radius, and the choice is where on that axis
      the system belongs.

      Three requirements drive the choice. The latency budget sets the floor: a budget that
      cannot absorb a network hop rules out the gateway, and a budget that cannot absorb even a
      loopback forces inline. Team ownership sets the coupling: when a separate security team
      owns detection and must deploy on its own schedule, the gateway or the sidecar is
      required, because inline binds detection to the application release. The scaling model
      sets the fleet: when detection must scale independently of the application -- a heavy ML
      detector that needs more capacity than the application does -- the gateway is required,
      because the sidecar scales with the pod and inline scales with the application.

      The selector deliverable for this section encodes exactly this logic: it takes the
      latency budget, the ownership model, the scaling requirement, and the network-hop
      tolerance, and returns a pattern with the reasoning and the cautions attached. The point
      of writing the selection down as a procedure is that the placement decision then has a
      stated rationale that later sections can rely on, rather than being an accident of which
      wiring was convenient on the day.
  part_6:
    title: Combining Patterns and Placing the Chapter 13 Tiers
    body: |-
      The three patterns are not mutually exclusive, and a real production gateway usually
      combines them along the Chapter 13 tier boundaries. The reason is that the pattern choice
      matters most for the inline tier and barely at all for the others. The inline tier is on
      the hot path, so it pays the pattern latency floor on every request, and the choice
      between gateway, sidecar, and inline is felt directly. The near-real-time and batch tiers
      run off the hot path in every pattern: they consume events asynchronously, so they are
      placed the same way regardless of how the inline tier is placed. Placement is therefore
      primarily an inline-tier decision.

      That observation licenses the canonical combined architecture. Use an API gateway for the
      inline detection layer, so that the security team gets a central choke point, independent
      deployment, and independent scaling for the detectors that must block before the model
      call, paying one engineered network hop within the sub-50ms budget. Use a sidecar for
      near-real-time enrichment, co-located with the application to gather session context
      cheaply and forward it without a full hop. And run the batch tier entirely off-path as
      scheduled jobs over the event store, where no request-path pattern applies at all. Each
      tier gets the pattern that suits its latency and state profile.

      This combination also sets up the sections that follow. The pattern choice fixes the
      latency floor that Section 14.04 must budget against, fixes the process boundaries that
      Section 14.06 makes fail-open or fail-closed decisions across, and fixes the scaling
      model that Section 14.05 plans. Placement is the first production decision precisely
      because it is the one that constrains all the others, and with the pattern chosen and the
      tiers placed, Section 14.03 can turn to where in the request lifecycle each detector
      hooks in.
