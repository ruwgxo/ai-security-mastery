section_overview:
  one_line_summary: The API gateway, sidecar, and inline patterns place detection at different points
    in the request path, trading latency against coupling, deployment independence, and blast radius;
    the pattern choice is the first production decision and it constrains every performance and resilience
    decision that follows.
  why_this_section_exists: |-
    Section 14.01 named placement as the first deployment concern: where in the request path
    detection sits. This section answers it. Before latency can be budgeted, before failure
    policy can be set, before scaling can be planned, the detection system must be placed
    somewhere in the path between the client and the model service, and there are three
    canonical ways to do it. The API gateway pattern puts detection in a separate service in
    front of the model. The sidecar pattern co-locates detection beside the application as its
    own process. The inline pattern embeds detection directly in the application request path.
    Each places detection at a different point, and each trades the same four properties --
    latency, coupling, deployment independence, and blast radius -- against one another. This
    section works through the three patterns, the trade-offs, where each one puts the Chapter 13
    detection tiers, how to select a pattern by requirement, and how the patterns combine, so
    that the placement decision is made deliberately rather than inherited from whatever was
    easiest to wire up.
  position_in_chapter: |-
    Section 14.02 is the first of the two placement sections (14.02-14.03) and the first response
    to a named deployment concern from the 14.01 taxonomy. It fixes where detection sits;
    Section 14.03 then fixes where in the request lifecycle each detector hooks in
    (pre-processing versus post-processing). Together they complete placement before the
    performance sections (14.04-14.05) engineer latency and scaling against the chosen pattern.
