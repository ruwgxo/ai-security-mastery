prose_content:

  part_1_attck_for_enterprise:
    heading: 'MITRE ATT&CK for Enterprise: Structure and AI Relevance'
    body: |
      MITRE ATT&CK (Adversarial Tactics, Techniques, and Common Knowledge) is a globally
      accessible knowledge base of adversary behaviour based on real-world observations.
      The Enterprise matrix — the most widely used — organises adversary behaviour into
      14 tactics, each representing a high-level adversary goal: Reconnaissance, Resource
      Development, Initial Access, Execution, Persistence, Privilege Escalation, Defence
      Evasion, Credential Access, Discovery, Lateral Movement, Collection, Command and
      Control, Exfiltration, and Impact. Under each tactic sit techniques (what the
      adversary does to achieve the tactic) and sub-techniques (specific implementations
      of a technique).

      For AI security practitioners, ATT&CK for Enterprise matters for two reasons. First,
      AI systems are targets of standard enterprise attack techniques. An attacker who
      wants to compromise an LLM-based application may begin with Reconnaissance
      (T1590 — Gather Victim Network Information) to map the API endpoints, proceed to
      Initial Access (T1190 — Exploit Public-Facing Application) to reach the model
      serving layer, and then move to Collection (T1119 — Automated Collection) to
      exfiltrate model outputs at scale. These are standard ATT&CK techniques; the target
      is an AI system but the tactics are generic adversary behaviour.

      Second, AI systems can be attack vectors — a compromised AI model can execute
      adversary objectives that traditional techniques cannot. A backdoored model serves
      as a persistent Execution (T1059) capability that activates on trigger input. A
      data-poisoned recommendation system manipulates user behaviour in ways that map
      to Impact (T1485 — Data Destruction, in the sense of integrity destruction). ATT&CK
      does not currently have native techniques for AI-as-attack-vector; that is precisely
      the gap that ATLAS fills.

      The practical consequence for detection engineering: AI security programmes need
      both ATT&CK coverage (detecting attacks on the AI system using standard techniques)
      and ATLAS coverage (detecting adversarial ML attacks that exploit the model itself).
      The seven-track gateway primarily addresses ATLAS coverage; the broader AI security
      programme also requires standard ATT&CK coverage of the infrastructure hosting the
      model, the API gateway, and the training pipeline.

  part_2_atlas_overview:
    heading: 'MITRE ATLAS: Adversarial ML Extension'
    body: |
      MITRE ATLAS (Adversarial Threat Landscape for Artificial-Intelligence Systems) is a
      knowledge base of adversarial ML tactics and techniques, maintained by MITRE in
      collaboration with AI security practitioners. It follows the ATT&CK structure —
      tactics, techniques, case studies — but models attacks specific to ML systems: the
      model itself, the training pipeline, the inference API, and the supply chain of
      datasets and pre-trained weights.

      ATLAS organises adversarial ML behaviour into tactic categories that parallel ATT&CK
      but address ML-specific objectives:

      ML Attack Staging covers how adversaries prepare attacks against ML systems before
      executing them: acquiring training data samples (AML.T0002), acquiring ML artifacts
      such as pre-trained models (AML.T0000), and developing adversarial capabilities
      (AML.T0006 — Develop Capabilities for ML attacks). These staging techniques are
      the prerequisites for all subsequent attack execution. They are largely invisible
      to the production inference API because they happen in attacker-controlled
      environments.

      ML Model Access covers how adversaries reach the model to execute attacks: ML
      model inference API access (AML.T0040) — querying the production API as a black-box
      — and physical environment access for camera-facing or embodied systems (AML.T0021).
      Detection opportunity: AML.T0040 is detectable via query rate, query variance, and
      output entropy monitoring — exactly what Track 5 implements.

      Adversarial ML covers the core attack execution techniques: crafting adversarial
      data (AML.T0043 — the generic technique for adversarial examples), evading ML
      models (AML.T0015 — the evasion outcome technique), poisoning training data
      (AML.T0020), backdooring ML models (AML.T0019), and prompt injection for LLMs
      (AML.T0051, AML.T0054). These are the techniques that Chapters 6–10 studied in
      depth and that the seven-track gateway detects.

      Exfiltration via ML covers attacks that use the model as an exfiltration channel:
      model inversion (AML.T0024 — recovering training data from model outputs) and
      membership inference (AML.T0022 — determining whether a specific example was in
      the training set). These techniques were covered in Chapter 8 (Privacy). They are
      not currently detected by the gateway's seven tracks — a coverage gap that maps
      to a future Chapter 15 topic rather than Chapters 12–13.

      ML Supply Chain Compromise covers attacks on the dependencies of ML systems:
      compromising ML software libraries (AML.T0010), poisoning public data repositories
      (AML.T0018), and compromising hardware used for ML (AML.T0016). Supply chain
      attacks are detection-hard because they occur outside the production inference path;
      they are addressed by software composition analysis and supply chain security
      controls rather than runtime detection rules.

  part_3_atlas_extends_attck:
    heading: 'How ATLAS Extends ATT&CK: The Integration Model'
    body: |
      ATLAS extends ATT&CK in two ways. First, it adds ML-specific techniques to standard
      ATT&CK tactic categories: a prompt injection attack (AML.T0051) is a form of Initial
      Access in ATT&CK terms — it is the adversary gaining a foothold in the model's
      inference context in the same way that a traditional initial access technique gains
      a foothold in a network. ATLAS assigns it an AML technique ID and provides ML-specific
      detection guidance, while the ATT&CK tactic category (Initial Access) provides the
      strategic context.

      Second, ATLAS introduces tactic categories that have no ATT&CK equivalent because
      they address ML-specific concerns: the distinction between black-box model access
      (querying the API without model weights) and white-box access (full model access,
      typical of insider threats or supply chain compromise) has no direct ATT&CK mapping
      but is central to the ATLAS access model. Similarly, the distinction between
      inference-time attacks (adversarial examples, prompt injection) and training-time
      attacks (data poisoning, backdoors) maps imperfectly to ATT&CK's execution-vs-
      persistence distinction.

      For detection engineers, the practical integration model is: use ATT&CK for
      infrastructure-level detection (the API gateway, the model serving host, the
      training pipeline infrastructure) and ATLAS for model-level detection (the inference
      API, the prompt, the model output, the training data). The seven-track gateway
      operates at the model level and therefore uses ATLAS technique IDs exclusively.
      The broader AI security programme uses ATT&CK for the infrastructure surrounding
      the model.

      The technique-to-detection-to-Sigma chain that Chapter 11 establishes connects
      both frameworks: an attack may traverse ATT&CK Initial Access techniques to reach
      the model serving layer, then ATLAS techniques to attack the model itself. A
      complete detection programme has Sigma rules for both segments of the attack chain.

  part_4_technique_inventory:
    heading: 'ATLAS Technique Inventory: Chapters 6–10'
    body: |
      Every attack family studied in Part 2 has a named ATLAS technique. The following
      inventory is the reference that Section 11.05 uses to generate the coverage heat
      map and that the atlas_attack_tree_mapper.py deliverable encodes programmatically.

      AML.T0051 — LLM Prompt Injection. The technique covering direct and indirect
      injection of adversarial instructions into LLM prompt context. Studied in Chapter 6.
      Detection layer: L1 (Track 1 regex Sigma), L2 (Track 3 semantic gating). Coverage
      status: partial — direct injection detected; highly obfuscated injection variants
      are L3 gap (Chapter 12 fills with intent classifier).

      AML.T0054 — Prompt Injection via Adversarial Role-play. The jailbreak-specific
      technique: using role-play framing to bypass alignment. Studied in Chapter 7.
      Detection layer: L1 (Track 2 keyword Sigma), L3 (Track 2 jailbreak classifier).
      Coverage status: partial — known templates detected at L1 and L3; novel
      role-play framings outside classifier training distribution are a residual gap.

      AML.T0043 — Craft Adversarial Data. The generic technique for generating adversarial
      examples: FGSM, PGD, C&W, black-box boundary attack, adversarial patches. Studied
      in Chapter 10. Detection layer: L2 (Track 6 entropy heuristic, Track 7 squeezer
      disagreement), L3 (Track 7 adversarial classifier). Coverage status: partial —
      gradient-based adversarial examples detected; novel attack families outside Track 7
      training distribution are an L3 gap.

      AML.T0015 — Evade ML Model. The evasion outcome technique: inputs that cause
      misclassification without triggering detection. Studied as the objective across
      Chapters 6, 7, and 10. Detection layer: L2 (Track 7 squeezer), L3 (Track 7
      adversarial classifier). Coverage status: partial — same gap as AML.T0043.

      AML.T0020 — Poison Training Data. The training-time attack technique: corrupting
      labelled training data to induce model misbehaviour on specific inputs. Studied in
      Chapter 8. Detection layer: L1 (Track 4 label-distribution Sigma). Coverage status:
      partial — overt label distribution anomalies detected; slow-drift poisoning below
      per-batch threshold is L4 gap (Chapter 13 fills with drift monitor).

      AML.T0019 — Backdoor ML Model. The model backdoor technique: training a trigger
      mechanism into model weights. Adjacent to data poisoning (Chapter 8). Detection
      layer: L1 (subset of Track 4 Sigma — specific label pattern anomalies consistent
      with backdoor trigger insertion). Coverage status: low — training-time detection
      only; inference-time backdoor trigger detection requires a dedicated track not
      yet built.

      AML.T0040 — ML Model Inference API Access. The model extraction access technique:
      systematic querying of the production API to reconstruct model behaviour. Studied
      in Chapter 9. Detection layer: L1 (Track 5 per-request Sigma), L4 (Track 5 session
      accumulator). Coverage status: partial — single-session extraction detected;
      distributed multi-account extraction is L4 gap (Chapter 13 fills).

      AML.T0006 — Develop Capabilities. ML attack staging technique: developing
      adversarial tools, crafting attack datasets, building surrogate models. Studied
      as staging context in Chapters 9–10. Detection layer: not detectable at inference
      time — staging occurs in attacker-controlled environment. Coverage status: none
      (no runtime detection possible; addressed by threat intelligence, not gateway rules).

      AML.T0029 — Adversarial Patch. Physical-domain adversarial attack: patches that
      cause misclassification of camera inputs. Studied in Chapter 10 Section 10.8.
      Detection layer: L2 (Section 10.8 patch_detector.py — spatial region anomaly
      detection). Coverage status: deployment-specific — only relevant for camera-facing
      systems; not included in the generic seven-track gateway. The seven-track gateway
      does not cover AML.T0029; camera-facing deployments require a separate Track 8
      extension.

      AML.T0022 — Membership Inference Attack. Privacy attack: determining whether a
      specific record was in the training set. Studied in Chapter 8. Detection layer:
      not detectable by inference-time gateway rules — requires differential privacy
      instrumentation and query audit logs. Coverage status: none in gateway; addressed
      by DP-SGD training and membership inference monitoring (Chapter 8 deliverables).

      AML.T0024 — Invert ML Model. Model inversion: recovering approximations of training
      data from model outputs. Studied in Chapter 8. Coverage status: none in gateway —
      detection requires output analysis for reconstruction patterns, not yet implemented.

  part_5_detection_chain:
    heading: 'The Technique-to-Detection-to-Sigma Chain'
    body: |
      The technique-to-detection-to-Sigma chain is the operational connection between
      the ATLAS taxonomy and the production detection programme. For each ATLAS technique,
      the chain specifies four things: what observable evidence the technique leaves,
      which detection layer can observe it, which Sigma rule (or Python detector) captures
      it, and which gateway track deploys it. When the chain is complete for a technique,
      that technique has measurable detection coverage. When it is incomplete at any link,
      there is a gap.

      Applying the chain to AML.T0040 (ML Model Inference API Access):

      Observable evidence: the technique produces elevated query rates from a single
      source, reduced variance in query parameters (systematic probing produces more
      uniform queries than normal usage), and output entropy trending toward zero across
      a session as the attacker homes in on decision boundaries.

      Detection layer: L1 for per-request signals (a single anomalously structured query),
      L4 for cross-session signals (accumulation of query rate, variance, and entropy
      metrics across the session window).

      Sigma rule: extraction_detector.yml (L1 Sigma rule on per-request anomaly fields)
      and the Track 5 session accumulator (Python, not Sigma, because Sigma does not
      natively support stateful session accumulation).

      Gateway track: Track 5. The per-request Sigma rule runs inline; the session
      accumulator runs asynchronously against the session store.

      Chain complete? Partially. The per-request and single-session extraction chains are
      complete. The distributed multi-account extraction chain is incomplete at the L4
      link: the session accumulator fires per user-session, not across users. Detecting
      a coordinated extraction campaign by multiple accounts requires a cross-user
      aggregation layer that Chapter 13 builds.

      Applying the chain to AML.T0006 (Develop Capabilities):

      Observable evidence: none at inference time. Capability development happens in
      attacker-controlled environments. The only observable evidence is in threat
      intelligence feeds (known adversarial toolkits, published attack codebases) or
      in staging artefacts if the attacker tests their tools against a shadow of the
      production system.

      Detection layer: none at runtime. This technique is addressed by threat intelligence
      consumption, not by gateway rules.

      Chain complete? No detection chain exists for AML.T0006 in the gateway. This is
      correct: not every ATLAS technique produces runtime-observable evidence. Documenting
      that the chain is intentionally incomplete for a technique is as important as
      documenting gaps that should be filled.

      The distinction between intentional gaps (no runtime evidence exists) and actionable
      gaps (runtime evidence exists but no rule captures it) is critical for the coverage
      heat map. Section 11.05 introduces a three-tier coverage score: 0 (no detection,
      gap is actionable), 1 (partial detection, gap exists but some coverage), and 2 (full
      detection). Techniques with intentional gaps receive a special notation rather than
      a 0 score, so they do not inflate the gap backlog with work that cannot be done.

  part_6_navigator:
    heading: 'ATT&CK Navigator: Reading and Building Heat Maps'
    body: |
      ATT&CK Navigator is MITRE''s open-source tool for visualising ATT&CK and ATLAS
      coverage. It renders the technique matrix as a colour-coded heat map: techniques
      with no detection coverage appear with no fill or in red; techniques with partial
      coverage in amber; techniques with full coverage in green. The heat map is generated
      from a JSON layer file that maps technique IDs to scores and colour values.

      For AI security programmes, the Navigator heat map serves two audiences with
      different needs. Detection engineers use it as a coverage backlog: the red cells
      are the gap backlog, ordered by the likelihood and impact scores assigned during
      gap analysis in Section 11.05. CISO and security leadership use it as a programme
      communication artefact: a single slide with the heat map communicates the detection
      programme''s current state, its known gaps, and its improvement trajectory without
      requiring the audience to understand Sigma rule syntax or Python detector code.

      The Navigator layer JSON structure is simple. Each technique entry has a techniqueID
      (the ATT&CK or ATLAS technique ID), a score (typically 0–2 for no/partial/full
      coverage), and an optional comment field (the name of the Sigma rule or detector
      providing coverage). The full layer file also has a name, a description, and a
      domain field (enterprise-attack for ATT&CK, atlas for ATLAS).

      The attck_navigator_export.py deliverable generates this layer file from the
      seven-track gateway''s current rule inventory. It reads the mitre_technique fields
      from each rule''s metadata (validated by rule_metadata_validator.py from Section
      11.02), computes coverage scores from the technique inventory in
      atlas_attack_tree_mapper.py, and outputs a Navigator-compatible JSON file that can
      be loaded directly into the Navigator UI at attack.mitre.org/versions/v14/nav.

      Navigator heat maps degrade over time as new ATLAS techniques are published and
      new attack families emerge. The quarterly coverage review cadence (Section 11.05)
      includes regenerating the Navigator export from the current rule inventory,
      comparing it to the previous quarter''s export, and identifying any newly published
      techniques that are undetected. Techniques that move from "not in ATLAS" to "in
      ATLAS but undetected" are added to the detection backlog at the priority appropriate
      to their likelihood and impact.

