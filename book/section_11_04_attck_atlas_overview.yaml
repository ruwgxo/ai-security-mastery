section_overview:
  one_line_summary: >
    MITRE ATT&CK provides the enterprise-wide adversary behaviour taxonomy; MITRE ATLAS
    extends it for adversarial ML attacks; together they supply the technique-to-detection
    chain that converts every gateway track into a measurable, communicable, and improvable
    coverage position.
  why_this_section_exists: |
    Sections 11.01 through 11.03 established that coverage must be measured rather than
    assumed, and that every detection primitive belongs to a defined layer of the
    architecture. But measurement requires a common vocabulary: a shared taxonomy of
    attack techniques that every detection rule can reference, every heat map can
    visualise, and every stakeholder — from SOC analyst to CISO — can read without
    translation. MITRE ATT&CK and MITRE ATLAS are that vocabulary.

    Without ATT&CK and ATLAS anchors, a detection programme can only say "we have seven
    tracks." With them, it can say "we have confirmed coverage of AML.T0051, AML.T0054,
    AML.T0043, AML.T0015, AML.T0040, and AML.T0020 at the specified detection layers,
    with two Layer 3 and one Layer 4 gap mapped to Chapter 12 and 13 remediation." That
    is the difference between a detection programme and a detection engineering discipline.

    This section also completes the technique-to-detection-to-Sigma chain for all Part 2
    attack families: every ATLAS technique the book has covered now has a named detection
    opportunity, a named detection layer, a named Sigma rule, and a named gateway track.
    Section 11.05 visualises that chain as a heat map.
  position_in_chapter: >
    Section 11.04 is the framework literacy section. Section 11.03 placed tracks in
    layers; Section 11.04 names the techniques those layers detect. The chain is now
    complete: ATLAS technique → detection layer → Sigma rule → gateway track → alert.
    Section 11.05 measures coverage along that chain.

