      # ---------------------------------------------------------------------------
      # Report
      # ---------------------------------------------------------------------------

      def coverage_score(status: CoverageStatus) -> int:
          scores = {
              CoverageStatus.FULL: 2,
              CoverageStatus.PARTIAL: 1,
              CoverageStatus.LOW: 0,
              CoverageStatus.NONE_INTENTIONAL: -1,   # intentional; exclude from gap backlog
              CoverageStatus.NONE_ACTIONABLE: 0,
          }
          return scores[status]

      def print_technique_report(techniques: list[ATLASTechnique]) -> None:
          print('\nATLAS Technique Coverage Report — Chapters 6-10')
          print(f'Techniques in inventory: {len(techniques)}\n')

          actionable = [t for t in techniques if t.coverage_status == CoverageStatus.NONE_ACTIONABLE]
          partial = [t for t in techniques if t.coverage_status in (CoverageStatus.PARTIAL, CoverageStatus.LOW)]
          intentional = [t for t in techniques if t.coverage_status == CoverageStatus.NONE_INTENTIONAL]
          full = [t for t in techniques if t.coverage_status == CoverageStatus.FULL]

          print(f'Full coverage:          {len(full)}')
          print(f'Partial / Low:          {len(partial)} (actionable gaps)')
          print(f'None — actionable:      {len(actionable)} (evidence exists; rule not built)')
          print(f'None — intentional:     {len(intentional)} (no runtime evidence; correct gap)')
          print()

          print('Actionable gaps (build these next):')
          for t in actionable + partial:
              score = coverage_score(t.coverage_status)
              print(f'  [{score}/2] {t.technique_id} — {t.name}')
              print(f'    Gap:  {t.residual_gap[:100]}...' if len(t.residual_gap) > 100 else f'    Gap:  {t.residual_gap}')
              print(f'    Next: {t.actionable_next_step[:100]}...' if len(t.actionable_next_step) > 100 else f'    Next: {t.actionable_next_step}')

          print()
          print('Intentional gaps (no action required):')
          for t in intentional:
              print(f'  {t.technique_id} — {t.name}: {t.chain_gap_link}')

      def get_navigator_scores(techniques: list[ATLASTechnique]) -> dict[str, int]:
          '''Returns technique_id → Navigator score (0-2) for attck_navigator_export.py.'''
          return {
              t.technique_id: max(0, coverage_score(t.coverage_status))
              for t in techniques
          }

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      if __name__ == '__main__':
          print_technique_report(TECHNIQUES)

  deliverable_2:
    id: 'D11.04.2'
    filename: 'attck_navigator_export.py'
    description: >
      Generates a MITRE ATT&CK Navigator-compatible JSON layer file from the ATLAS
      technique inventory in atlas_attack_tree_mapper.py. The output can be loaded
      directly into the Navigator UI at attack.mitre.org to visualise the seven-track
      gateway coverage as a heat map.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'json (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''attck_navigator_export.py
      Generates ATT&CK Navigator-compatible JSON layer for the seven-track gateway.
      Load the output at attack.mitre.org/versions/v14/nav to visualise coverage.
      Chapter 11, Section 11.04 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 attck_navigator_export.py
        python3 attck_navigator_export.py --output gateway_coverage.json
      '''

      from __future__ import annotations
      import json
      import sys
      from datetime import datetime, timezone

      from atlas_attack_tree_mapper import TECHNIQUES, get_navigator_scores, CoverageStatus

      # ---------------------------------------------------------------------------
      # Colour scheme
      # ---------------------------------------------------------------------------

      # Navigator uses hex colours. Coverage score → colour mapping:
      # 2 (full):              green
      # 1 (partial):           amber
      # 0 (none / low):        red
      # intentional gap:       grey (score omitted; comment field marks it)

      SCORE_COLOURS: dict[int, str] = {
          2: '#4caf50',   # green
          1: '#ff9800',   # amber
          0: '#f44336',   # red
      }

      # ---------------------------------------------------------------------------
      # Layer builder
      # ---------------------------------------------------------------------------

      def build_navigator_layer(
          layer_name: str = 'AI Security Mastery — Seven-Track Gateway Coverage',
          description: str = 'Chapter 11 Section 11.04 — ATLAS technique coverage for the seven-track gateway',
      ) -> dict:
          scores = get_navigator_scores(TECHNIQUES)

          technique_entries: list[dict] = []
          for technique in TECHNIQUES:
              score = scores[technique.technique_id]
              intentional = technique.coverage_status == CoverageStatus.NONE_INTENTIONAL

              entry: dict = {
                  'techniqueID': technique.technique_id,
                  'comment': (
                      f'Intentional gap: {technique.chain_gap_link}'
                      if intentional else
                      f'Coverage: {technique.coverage_status.value}. '
                      f'Rules: {", ".join(technique.sigma_rules) or "none"}. '
                      f'Gap: {technique.residual_gap[:80]}'
                  ),
                  'enabled': True,
                  'metadata': [
                      {'name': 'chapter', 'value': str(technique.chapters)},
                      {'name': 'gateway_tracks', 'value': str(technique.gateway_tracks)},
                      {'name': 'next_step', 'value': technique.actionable_next_step[:100]},
                  ],
              }

              # Intentional gaps: no score, grey colour
              if intentional:
                  entry['color'] = '#9e9e9e'
              else:
                  entry['score'] = score
                  entry['color'] = SCORE_COLOURS[score]

              technique_entries.append(entry)

          layer: dict = {
              'name': layer_name,
              'versions': {
                  'attack': '14',
                  'navigator': '4.9',
                  'layer': '4.5',
              },
              'domain': 'atlas',
              'description': description,
              'filters': {'platforms': ['AI/ML']},
              'sorting': 0,
              'layout': {
                  'layout': 'side',
                  'aggregateFunction': 'average',
                  'showID': True,
                  'showName': True,
              },
              'hideDisabled': False,
              'techniques': technique_entries,
              'gradient': {
                  'colors': ['#f44336', '#ff9800', '#4caf50'],
                  'minValue': 0,
                  'maxValue': 2,
              },
              'legendItems': [
                  {'label': 'Full coverage (score 2)', 'color': '#4caf50'},
                  {'label': 'Partial coverage (score 1)', 'color': '#ff9800'},
                  {'label': 'No coverage — actionable gap (score 0)', 'color': '#f44336'},
                  {'label': 'Intentional gap — no runtime evidence', 'color': '#9e9e9e'},
              ],
              'metadata': [
                  {'name': 'generated_by', 'value': 'ruwgxo/ai-security-mastery'},
                  {'name': 'generated_at', 'value': datetime.now(timezone.utc).isoformat()},
                  {'name': 'chapter', 'value': '11'},
                  {'name': 'section', 'value': '11.04'},
              ],
              'showTacticRowBackground': True,
              'tacticRowBackground': '#1a1a2e',
              'selectTechniquesAcrossTactics': True,
          }

          return layer

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      if __name__ == '__main__':
          output_path = 'gateway_coverage_navigator.json'
          if len(sys.argv) == 3 and sys.argv[1] == '--output':
              output_path = sys.argv[2]

          layer = build_navigator_layer()

          with open(output_path, 'w') as f:
              json.dump(layer, f, indent=2)

          technique_count = len(layer['techniques'])
          full = sum(1 for t in layer['techniques'] if t.get('score', -1) == 2)
          partial = sum(1 for t in layer['techniques'] if t.get('score', -1) == 1)
          none_act = sum(1 for t in layer['techniques'] if t.get('score', -1) == 0)
          intentional = sum(1 for t in layer['techniques'] if 'score' not in t)

          print(f'\nATT&CK Navigator Export')
          print(f'Output: {output_path}')
          print(f'Techniques: {technique_count}')
          print(f'  Full coverage (green):     {full}')
          print(f'  Partial (amber):            {partial}')
          print(f'  None — actionable (red):    {none_act}')
          print(f'  Intentional gap (grey):     {intentional}')
          print(f'\nLoad at: https://attack.mitre.org/versions/v14/nav')
          print(f'File → Open Existing Layer → select {output_path}')

common_mistakes:
  - id: 'CM11.04.1'
    mistake: 'Treating MITRE ATLAS as a complete replacement for ATT&CK in an AI security programme'
    why_it_happens: >
      ATLAS is AI-specific and therefore feels more directly relevant. Practitioners
      building AI security programmes sometimes focus exclusively on ATLAS and neglect
      the ATT&CK coverage for the infrastructure hosting the model.
    why_it_matters: >
      An attacker who cannot successfully execute an ATLAS technique against the model
      will pivot to ATT&CK techniques against the infrastructure: compromising the model
      serving host, accessing the training data store, or exfiltrating model weights
      through the host file system. An AI security programme with ATLAS coverage but no
      ATT&CK coverage protects the model while leaving the surrounding infrastructure
      unmonitored.
    correct_approach: >
      Use ATLAS for model-layer detection (the seven-track gateway). Use ATT&CK for
      infrastructure-layer detection (the model serving host, the API gateway, the
      training pipeline infrastructure, the data store). Both frameworks are required
      for a complete AI security detection programme.

  - id: 'CM11.04.2'
    mistake: 'Counting intentional gaps (no runtime evidence) in the detection gap backlog'
    why_it_happens: >
      The heat map shows grey cells for intentional gaps. Without understanding the
      distinction between intentional and actionable gaps, practitioners add all
      uncoloured cells to the detection backlog.
    why_it_matters: >
      AML.T0006 (Develop Capabilities) has no runtime detection chain because staging
      occurs in attacker-controlled environments. Adding it to the detection backlog
      creates work that cannot be completed, demoralises the team, and inflates the
      apparent gap count without reflecting real risk.
    correct_approach: >
      Distinguish explicitly between intentional gaps (no runtime evidence; documented
      and accepted) and actionable gaps (evidence exists; rule not yet built). The
      Navigator export uses grey for intentional gaps and red for actionable gaps. Only
      red cells belong in the detection backlog.

  - id: 'CM11.04.3'
    mistake: 'Using ATT&CK technique IDs (TNNNN) in Sigma rules for model-layer detections'
    why_it_happens: >
      ATT&CK is the more widely known framework. Practitioners familiar with ATT&CK
      default to its technique IDs even for adversarial ML detections.
    why_it_matters: >
      ATT&CK technique IDs in model-layer Sigma rules produce incorrect coverage heat
      maps: the rule appears to cover an enterprise IT technique rather than an
      adversarial ML technique. The ATLAS heat map shows the model-layer gap as
      uncovered even though a rule exists, because the rule''s mitre_technique field
      references the wrong framework.
    correct_approach: >
      Use ATLAS technique IDs (AML.TNNNN) in Sigma rules for all model-layer detections.
      Use ATT&CK technique IDs (TNNNN) for infrastructure-layer detections. The
      rule_metadata_validator.py from Section 11.02 validates technique IDs against
      the known-techniques list; extend that list to include all ATLAS IDs as they are
      mapped.

  - id: 'CM11.04.4'
    mistake: 'Treating partial coverage as equivalent to full coverage when communicating to leadership'
    why_it_happens: >
      Amber cells on the Navigator heat map look similar to green cells at a glance.
      When presenting to leadership under time pressure, practitioners sometimes describe
      partial coverage as covered without qualification.
    why_it_matters: >
      A technique marked as partially covered has a confirmed residual gap. If the
      residual gap corresponds to a high-likelihood attack variant (e.g. obfuscated
      injection variants for AML.T0051), presenting it as covered misrepresents the
      security posture and may delay investment in the Chapter 12 remediations.
    correct_approach: >
      Always present coverage with the partial/full distinction. The Navigator legend
      makes this clear visually. In written reports, list partial coverage techniques
      with their residual gap description alongside the full coverage techniques.

  - id: 'CM11.04.5'
    mistake: 'Generating the Navigator heat map once and treating it as static documentation'
    why_it_happens: >
      Generating the Navigator export takes effort. Once produced, it feels complete.
      The heat map goes into a report and is not updated until the next major review.
    why_it_matters: >
      MITRE ATLAS adds new techniques as new adversarial ML research matures. A heat map
      that was accurate when generated becomes stale as new techniques are published.
      Techniques that did not exist when the heat map was generated appear as neither
      covered nor gapped — they are simply invisible, which is worse than a documented gap.
    correct_approach: >
      Regenerate the Navigator export quarterly from the current rule inventory using
      attck_navigator_export.py. Compare to the previous quarter''s export to identify
      newly published techniques. Add any newly undetected techniques to the detection
      backlog at the appropriate priority.

section_summary:
  what_you_learned: |
    MITRE ATT&CK for Enterprise and MITRE ATLAS together supply the technique taxonomy
    that converts detection coverage from an assertion into a measurement. ATT&CK covers
    the infrastructure surrounding the AI system; ATLAS covers the model layer itself.
    For the seven-track gateway, eleven ATLAS techniques are relevant: six have partial
    or low coverage with actionable gaps; two have intentional gaps where no runtime
    detection chain is possible; three are currently undetected with actionable future
    tracks. The technique-to-detection-to-Sigma chain is now complete for all detectable
    techniques: ATLAS technique → detection layer → Sigma rule or Python detector →
    gateway track. Section 11.05 visualises this chain as a coverage heat map.
  key_terms:
    - term: 'MITRE ATT&CK'
      definition: >
        A globally accessible knowledge base of adversary behaviour organised into
        14 tactics and hundreds of techniques, based on real-world observations. Used
        for infrastructure-layer detection coverage measurement in AI security programmes.
    - term: 'MITRE ATLAS'
      definition: >
        An extension of ATT&CK for adversarial ML systems. Covers techniques specific to
        ML model attacks: prompt injection, adversarial examples, data poisoning, model
        extraction, and supply chain compromise. Used for model-layer detection coverage.
    - term: 'Technique-to-detection chain'
      definition: >
        The four-link chain connecting an ATLAS technique to production detection: ATLAS
        technique → observable evidence → detection layer → Sigma rule or Python detector
        → gateway track → alert. A complete chain means the technique has measurable coverage.
    - term: 'Actionable gap'
      definition: >
        A coverage gap where runtime evidence of the technique exists but no detection rule
        captures it. Belongs in the detection engineering backlog. Distinguished from
        intentional gaps where no runtime evidence is possible.
    - term: 'Intentional gap'
      definition: >
        A coverage gap where no runtime detection chain is possible because the technique
        occurs in an attacker-controlled environment (e.g. AML.T0006 — Develop Capabilities).
        Documented and accepted; does not belong in the detection engineering backlog.
    - term: 'ATT&CK Navigator'
      definition: >
        MITRE''s open-source heat map tool for visualising ATT&CK and ATLAS technique
        coverage. Takes a JSON layer file as input and renders a colour-coded matrix.
        Green = full coverage, amber = partial, red = no coverage, grey = intentional gap.

preview_section_11_05:
  title: 'ATT&CK Coverage Heat Maps: Measuring and Closing Detection Gaps'
  teaser: |
    Section 11.05 operationalises the technique inventory from Section 11.04 as a
    programmatic coverage measurement and gap prioritisation system. It introduces
    a three-tier coverage score (0/1/2), builds the heat map from the seven-track
    gateway rule inventory, and produces a gap prioritisation backlog ordered by
    likelihood times impact. The backlog output directly drives the Chapter 12 and
    Chapter 13 development priorities. Section 11.05 also introduces the quarterly
    coverage drift review: how to detect when a previously covered technique has
    regressed due to a rule change or an evolving attack variant.

