deliverables:

  deliverable_1:
    id: 'D11.04.1'
    filename: 'atlas_attack_tree_mapper.py'
    description: >
      Encodes the complete ATLAS technique inventory from Chapters 6–10 as a structured
      data model. For each technique: name, chapter reference, detection layer, gateway
      track, Sigma rule or detector file, coverage status, and chain completeness flag.
      Produces a technique coverage report and identifies actionable vs intentional gaps.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''atlas_attack_tree_mapper.py
      ATLAS technique inventory for Chapters 6-10.
      Maps each technique to its detection opportunity, layer, Sigma rule, and track.
      Distinguishes actionable gaps (evidence exists, rule missing) from intentional
      gaps (no runtime evidence possible).
      Chapter 11, Section 11.04 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo
      '''

      from __future__ import annotations
      from dataclasses import dataclass, field
      from enum import Enum

      # ---------------------------------------------------------------------------
      # Enumerations
      # ---------------------------------------------------------------------------

      class CoverageStatus(Enum):
          FULL = 'full'
          PARTIAL = 'partial'
          LOW = 'low'
          NONE_INTENTIONAL = 'none_intentional'   # no runtime evidence; gap is correct
          NONE_ACTIONABLE = 'none_actionable'      # evidence exists; rule not yet built

      class DetectionLayer(Enum):
          L1 = 'L1_signature'
          L2 = 'L2_heuristic'
          L3 = 'L3_ml'
          L4 = 'L4_behavioral'
          NONE = 'none'

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class ATLASTechnique:
          technique_id: str
          name: str
          chapters: list[int]
          detection_layers: list[DetectionLayer]
          gateway_tracks: list[int]      # 0 = not in gateway
          sigma_rules: list[str]
          python_detectors: list[str]
          coverage_status: CoverageStatus
          residual_gap: str              # what the current coverage misses
          chain_complete: bool
          chain_gap_link: str            # which link in the chain is missing
          actionable_next_step: str      # what to build to close the gap

      # ---------------------------------------------------------------------------
      # Technique registry
      # ---------------------------------------------------------------------------

      TECHNIQUES: list[ATLASTechnique] = [

          ATLASTechnique(
              technique_id='AML.T0051',
              name='LLM Prompt Injection',
              chapters=[6],
              detection_layers=[DetectionLayer.L1, DetectionLayer.L2],
              gateway_tracks=[1, 3],
              sigma_rules=['injection_patterns.yml'],
              python_detectors=['injection_detector.py', 'gateway_track3.py'],
              coverage_status=CoverageStatus.PARTIAL,
              residual_gap='Highly obfuscated injection variants evade L1 regex and L2 similarity gating.',
              chain_complete=False,
              chain_gap_link='L3 — no ML intent classifier for obfuscated injection',
              actionable_next_step='Chapter 12: train Isolation Forest and intent classifier on prompt feature vectors.',
          ),

          ATLASTechnique(
              technique_id='AML.T0054',
              name='Prompt Injection via Adversarial Role-play',
              chapters=[7],
