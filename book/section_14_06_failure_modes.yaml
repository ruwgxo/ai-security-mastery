# section_14_06_failure_modes.yaml

---
document_info:
  title: 'Failure Modes: Fail-Open versus Fail-Closed'
  chapter: 14
  section: 6
  section_code: '1406'
  author: Raghav Dinesh
  github: https://github.com/ruwgxo/ai-security-mastery
  license: MIT
  version: '1.0'
  created: '2026-06-21'
  estimated_pages: 7
  estimated_reading_time: 50-60 minutes
section_overview:
  one_line_summary: 'When a detector errors, times out, or is unavailable the gateway must do something
    deliberate: fail-open passes the request favouring availability, fail-closed blocks it favouring security,
    and the choice is made per detector and per tier -- classifying detectors as essential or droppable
    -- so a partial failure degrades gracefully to the essential detectors rather than failing one way
    for everything.'
  why_this_section_exists: |-
    Sections 14.04 and 14.05 made the gateway fast per request and sufficient in aggregate,
    and both assumed the detectors work. Detectors do not always work. A detector can raise an
    exception, exceed its timeout, or become unavailable because the service behind it is down,
    and when that happens the gateway has to decide what to do with the request it was
    inspecting. This is the failure concern named in the 14.01 taxonomy, and it is the one with
    the sharpest consequence of neglect: an unspecified failure mode is not the absence of a
    decision but a decision made by the bug, because whatever the code happens to do when the
    exception propagates becomes the policy. This section makes the failure behaviour
    deliberate. It defines the two possible policies -- fail-open, which admits the request when
    detection fails and favours availability, and fail-closed, which blocks it and favours
    security -- and establishes that each carries a real and opposite risk, so neither is safe
    in the abstract. It then makes the central argument of the section: the policy is chosen per
    detector and per tier, not once globally, because a critical security detector and a
    best-effort enrichment detector warrant opposite policies. It handles the timeout from 14.04
    as one failure kind that resolves through the same policy, and it defines degraded-mode
    operation, classifying detectors as essential or droppable so that a partial failure sheds
    the droppable detectors and keeps serving through the essential ones. The result is a
    gateway whose behaviour under detector failure is designed rather than accidental.
  position_in_chapter: |-
    Section 14.06 is the first of the two resilience sections (14.06-14.07) and the response to
    the failure-handling concern from the 14.01 taxonomy. It decides what a single failing
    detector does. Section 14.07 then supplies the mechanism that stops a detector from failing
    repeatedly into a cascade -- circuit breakers, bulkheads, health checks, and redundancy --
    and turns the degraded-mode classification defined here into the graceful degradation it
    operates. This section sets the policy; 14.07 builds the machinery that enforces and
    contains it.
learning_objectives:
  knowledge:
  - Describe the three ways a detector fails -- error, timeout, and unavailability -- and why the gateway
    must respond deliberately to each
  - Define fail-open as passing the request when detection fails, favouring availability, and fail-closed
    as blocking it, favouring security
  - Explain why an unspecified failure mode is a failure mode chosen by the bug rather than the engineer
  - State the fail-open risk (admitting the attack the failed detector would have caught) and the fail-closed
    risk (denying service to legitimate traffic)
  - Explain why the fail-open versus fail-closed choice is made per detector and per tier rather than
    as a single global policy
  - Describe how the timeout from Section 14.04 is one failure kind that resolves through the same per-detector
    policy
  - Explain degraded-mode operation and the classification of detectors as essential (fail-closed) or
    droppable (fail-open)
  skills:
  - Assign a fail-open or fail-closed policy to each detector and apply it to an error, a timeout, or
    an unavailability
  - Build a decision table stating the policy per detector class with the risk each policy takes
  - Classify detectors as essential or droppable so a partial failure degrades to the essential path
  - Map a per-detector timeout to its fail-open or fail-closed resolution
  security_mindset:
  - Recognise that leaving the failure mode unspecified hands the security-versus-availability decision
    to whatever the code does on an exception
  - Internalise that neither fail-open nor fail-closed is safe in the abstract -- each trades one real
    risk for the other
  - Understand that a single global failure policy forces the wrong trade on some detectors, because critical
    and best-effort detectors warrant opposite policies
  - Appreciate that degraded-mode classification lets a partial failure degrade to the essential security
    detectors rather than failing the whole gateway one way
prerequisites:
- 'Section 14.01: the production deployment concern taxonomy that names failure handling and warns that
  an unspecified failure mode is chosen by the bug'
- 'Section 14.03: the failure-isolated integration boundary where the fail-open/fail-closed decision is
  applied'
- 'Section 14.04: the per-detector timeout introduced as a latency bound and resolved here as a failure
  mode'
- 'Section 14.05: the throughput scaling whose overload conditions can drive detector failure and degraded
  operation'
- 'Chapter 13 Section 13.01: the tiers whose differing roles justify per-tier failure policies'
- Working knowledge of exception handling and the difference between availability and security as competing
  goals
prose_content:
  part_1:
    title: An Unspecified Failure Mode Is Chosen by the Bug
    body: |-
      Every detector integrated into the request path can fail, and there are three ways it
      does. It can error -- raise an exception from a bug, a malformed input, or a missing
      model artifact. It can time out -- exceed the deadline that Section 14.04 put on it to
      bound its latency. Or it can be unavailable -- the service behind it is down, unreachable,
      or not yet started. In all three cases the gateway is left holding a request it was in
      the middle of inspecting, with no verdict from that detector, and it has to do something
      with the request anyway.

      The single most important idea in this section is that this something is always chosen,
      whether or not anyone chose it. If the failure mode is not specified, the request does
      not hang in limbo; it takes whatever path the code happens to take when the exception
      propagates. Maybe the exception bubbles up and the whole request is rejected, silently
      making the policy fail-closed. Maybe it is swallowed by a broad catch and the request
      proceeds as if the detector had passed it, silently making the policy fail-open. Either
      way a security-versus-availability decision of real consequence has been made, and it has
      been made by the accident of code structure rather than by an engineer weighing the
      trade. An unspecified failure mode is a failure mode chosen by the bug.

      That reframing is why this section exists as a design activity rather than an
      error-handling detail. The goal is not to prevent detectors from failing -- they will --
      but to ensure that what happens when they do is a deliberate choice with a stated
      rationale. The failure-isolated integration boundary from Section 14.03 is where the
      choice is applied: the wrapper already catches the fault so it does not break the path,
      and this section supplies the policy the wrapper applies. The two policies it can apply
      are fail-open and fail-closed, and the rest of the section is about choosing between
      them.
  part_2:
    title: 'Fail-Open and Fail-Closed: Two Policies, Two Risks'
    body: |-
      The two policies are simple to state. Fail-open means that when a detector fails, the
      gateway passes the request -- it proceeds as though the failed detector had not objected.
      Fail-closed means that when a detector fails, the gateway blocks the request -- it
      refuses to proceed without the detector verdict. Fail-open favours availability: the
      request is served even though a detector could not run. Fail-closed favours security: the
      request is denied rather than served uninspected.

      What makes the choice hard is that each policy carries a real risk, and the risks are
      opposite. The fail-open risk is that the gateway admits the very attack the failed
      detector was there to catch. If the injection classifier fails open, an injection attempt
      that arrives during the failure sails through uninspected, and the protection the
      detector was supposed to provide is absent exactly when an attacker who has noticed the
      failure would strike. The fail-closed risk is the mirror image: the gateway denies
      service to legitimate traffic because a detector is having a bad moment. If the injection
      classifier fails closed, then while it is down every request -- the overwhelming majority
      of which are legitimate -- is rejected, and a detector fault has become a
      denial-of-service against the gateway own users.

      Neither risk is hypothetical and neither policy is safe in the abstract. Fail-open trades
      a security gap for continued service; fail-closed trades continued service for a security
      guarantee. The decision table for this section makes this symmetry explicit by recording,
      for each policy, the specific risk it takes, because the only honest way to choose is to
      name the risk you are accepting. The choice is therefore not between a safe option and a
      risky one but between two risks, and which risk is acceptable depends entirely on what
      the detector guards -- which is the argument of the next part.
  part_3:
    title: The Policy Is Per Detector and Per Tier
    body: |-
      A single global failure policy is tempting because it is simple: decide once that the
      gateway fails open, or that it fails closed, and apply it everywhere. But a global policy
      is wrong for some detectors no matter which way it is set, because the detectors do not
      all guard the same thing or warrant the same trade. The central design principle of this
      section is that the fail-open versus fail-closed choice is made per detector and per
      tier.

      Consider two detectors at opposite ends. A prompt injection classifier is a critical
      security detector: its whole purpose is to block a class of attack, and admitting an
      uninspected request when it fails means admitting exactly the attack it guards against.
      For this detector the fail-open risk is severe and the fail-closed risk -- some denied
      legitimate traffic during a fault -- is the lesser evil, so it fails closed. Now consider
      an input PII audit tagger whose only job is to annotate requests for later audit. It
      blocks nothing in normal operation and its signal is best-effort. If it fails, denying
      service over a missing audit tag would be absurd -- the fail-closed risk is unacceptable
      and the fail-open risk is a mere audit gap -- so it fails open. A global policy set to
      fail-closed would turn the audit tagger into a denial-of-service risk; set to fail-open
      it would leave the injection classifier admitting attacks. Only a per-detector policy
      gets both right.

      The tier dimension reinforces the same point. The off-path near-real-time and batch tiers
      never block a request in the first place -- they consume the exchange asynchronously --
      so their failure is naturally fail-open: there is no synchronous request to deny. The
      inline tier is where the hard fail-closed decisions live, because it is the only tier
      that can block. So the policy is a property of the detector and its tier together: what
      the detector guards sets the security stakes, and which tier it runs on sets whether
      blocking is even possible. The decision engine for this section encodes exactly this --
      a policy attached to each detector, resolving every failure kind through that detector
      own choice.
  part_4:
    title: Timeout as a Failure Mode
    body: |-
      Section 14.04 introduced the per-detector timeout as a latency-bounding mechanism: a
      deadline that stops a slow detector from blowing the budget. That section deliberately
      left one thing open -- what the gateway does when the timeout fires -- and this section
      closes it. A timeout is a failure mode, and it resolves through exactly the same
      per-detector policy as an error or an unavailability.

      The unification is worth being explicit about, because it keeps the design simple. From
      the gateway point of view, an errored detector, a timed-out detector, and an unavailable
      detector are the same situation: a detector that owes a verdict and has not produced one.
      The reason it has no verdict -- it crashed, it ran too long, it could not be reached --
      does not change what the gateway must decide, only what it logs. So all three failure
      kinds map to the one policy the detector carries. A critical detector that times out
      fails closed, just as it would if it errored; a best-effort detector that times out fails
      open, just as it would if it were unavailable. The timeout-to-policy mapping for this
      section shows the same timeout mechanism producing opposite decisions on two detectors
      purely because their policies differ.

      This also completes the story the timeout began in 14.04. There, the timeout guaranteed
      the worst case was bounded so the latency budget held; the cost was that a bounded
      failure still needs a decision. Here, that decision is supplied by the failure policy,
      so the two sections together give the full account: 14.04 bounds how long a detector may
      take, and 14.06 says what happens when it takes too long. The timeout is not a separate
      kind of problem with its own handling -- it is folded into the single per-detector
      failure policy, which is what keeps the failure behaviour of the whole gateway coherent.
  part_5:
    title: 'Degraded-Mode Operation: Essential and Droppable Detectors'
    body: |-
      A per-detector policy handles the failure of one detector, but production failures are
      often partial and correlated: several detectors on a tier degrade at once under load, or
      a shared dependency wobbles. The question then is not just what each detector does on
      failure but what the gateway as a whole does when it can no longer run everything. The
      answer is degraded-mode operation, and it rests on classifying detectors as essential or
      droppable.

      An essential detector is one the gateway must keep running to provide its core security
      guarantee -- the injection classifier, the jailbreak classifier, the output PII scanner.
      These are the detectors the request path degrades toward, never drops: if they cannot
      run, fail-closed is the right response, because losing them silently would leave the
      gateway serving traffic it can no longer vouch for. A droppable detector is one whose
      loss weakens the picture but not the core guarantee -- the audit tagger, the
      near-real-time session scorer, the batch analytics. These are the detectors the gateway
      sheds first under stress, failing them open, because dropping them keeps the essential
      path serving rather than letting a best-effort detector take the whole gateway down.

      This classification is what turns failure handling from a per-detector decision into a
      whole-gateway strategy. Without it, a partial failure forces a single crude choice --
      block everything or admit everything -- because there is no notion of which detectors
      matter more. With it, the gateway degrades gracefully: under stress it sheds the
      droppable detectors and keeps serving through the essential ones, so the security core
      stays intact while the enrichment falls away. The degraded-mode classification for this
      section is exactly this list of essential and droppable detectors, and it is the input
      that Section 14.07 graceful degradation will operate: this section decides which
      detectors are essential, and 14.07 builds the mechanism that sheds the rest under load.
  part_6:
    title: From Policy to Mechanism
    body: |-
      With the failure policy in place, the gateway behaviour under detector failure is now
      designed rather than accidental. Every detector carries a deliberate fail-open or
      fail-closed policy chosen from what it guards and which tier it runs on; every failure
      kind -- error, timeout, unavailability -- resolves through that one policy; and the
      essential-versus-droppable classification lets a partial failure degrade to the security
      core rather than collapsing one way for everything. The security-versus-availability
      trade is made once, per detector, in advance, by an engineer weighing the risk, which is
      exactly what the 14.01 taxonomy demanded when it warned that an unspecified failure mode
      is chosen by the bug.

      What this section does not do is stop a detector from failing repeatedly. The policy says
      what to do on each failure, but if a detector is broken it will keep failing, and calling
      a broken detector on every request -- even to fail it open or closed by policy -- wastes
      work, adds latency, and can turn one detector fault into a load problem that spreads.
      Deciding the policy is necessary but not sufficient; the gateway also needs a mechanism
      that recognises a persistently failing detector and stops calling it until it recovers.

      That mechanism is the subject of Section 14.07. The circuit breaker cuts off a detector
      that has failed repeatedly, moving from closed to open to half-open as it tests recovery,
      so a broken detector is isolated rather than retried into a cascade. Bulkheads keep one
      detector failure from exhausting the resources the others need; health checks and
      readiness decide when an instance should receive traffic at all; and graceful degradation
      operates the essential-versus-droppable classification defined here to shed non-essential
      detectors under stress. This section decided what a failing detector does; the next
      builds the machinery that keeps a failing detector from taking the gateway down with it.
