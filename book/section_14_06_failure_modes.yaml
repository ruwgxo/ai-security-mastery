      - Denies legitimate traffic while the detector is down
    - - Output PII / secret scanner
      - Fail-closed
      - Security
      - Blocks valid responses during a scanner fault
    - - Policy / toxicity output filter
      - Fail-closed
      - Security
      - Withholds acceptable output when the filter errors
    - - Input PII audit tagger
      - Fail-open
      - Availability
      - 'Audit gap: a request passes untagged during the fault'
    - - Session behaviour scorer (NRT)
      - Fail-open
      - Availability
      - A window of session scoring is missed
    - - Batch analytics job
      - Fail-open
      - Availability
      - A batch run is skipped or delayed
  table_4:
    title: Degraded-Mode Detector Classification
    description: Detectors classified as essential or droppable for degraded-mode operation. The gateway
      degrades toward the essential detectors and sheds the droppable ones under stress, so a partial
      failure keeps the security core rather than failing one way for everything.
    columns:
    - Detector
    - Tier
    - Class
    - On failure / stress
    rows:
