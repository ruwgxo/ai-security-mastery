      - Inline
      - Essential
      - Fail-closed -- kept, never dropped
    - - Jailbreak classifier
      - Inline
      - Essential
      - Fail-closed -- kept, never dropped
    - - Output PII scanner
      - Inline
      - Essential
      - Fail-closed -- kept, never dropped
    - - Input PII audit tagger
      - Inline
      - Droppable
      - Fail-open -- shed first under stress
    - - Session behaviour scorer
      - Near-real-time
      - Droppable
      - Fail-open -- shed, off-path
    - - Coordinated-network analysis
      - Batch
      - Droppable
      - Fail-open -- shed, retrospective
deliverables:
  deliverable_1:
    title: Fail-Open versus Fail-Closed Decision Engine
    filename: fail_open_closed_policy.py
    description: Attaches a fail-open or fail-closed policy to each detector, tagged by tier and by essential-or-droppable
      class, and resolves any failure kind -- error, timeout, or unavailability -- through that one per-detector
      policy, showing that a single global policy would force the wrong trade on half the detectors.
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      enum and dataclasses only, prints the per-detector policies and the admit/block decision for each
      failure kind.
    code: |
      # fail_open_closed_policy.py
      # Section 14.06: Fail-Open versus Fail-Closed Decision Engine
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from enum import Enum
      from typing import List


      class FailurePolicy(Enum):
          FAIL_OPEN = 'fail_open'      # admit the request when detection fails (availability)
          FAIL_CLOSED = 'fail_closed'  # block the request when detection fails (security)


      class FailureKind(Enum):
          ERROR = 'error'              # the detector raised
          TIMEOUT = 'timeout'          # the detector exceeded its deadline
          UNAVAILABLE = 'unavailable'  # the detector could not be reached


      @dataclass
      class DetectorPolicy:
          name: str
          tier: str
          essential: bool          # essential detectors fail closed, droppable ones fail open
          policy: FailurePolicy
          rationale: str


      @dataclass
      class FailureDecision:
          detector: str
          kind: str
          policy: str
          request_admitted: bool
          detail: str


      POLICIES: List[DetectorPolicy] = [
          DetectorPolicy('Injection classifier', 'inline', True, FailurePolicy.FAIL_CLOSED,
                         'Critical security detector: admitting an uninspected request risks the attack it guards against'),
          DetectorPolicy('Jailbreak classifier', 'inline', True, FailurePolicy.FAIL_CLOSED,
                         'Critical security detector: fail closed rather than admit a possibly malicious prompt'),
          DetectorPolicy('Output PII scanner', 'inline', True, FailurePolicy.FAIL_CLOSED,
                         'Leaking PII on failure is unacceptable, so withhold the response when the scan fails'),
          DetectorPolicy('Input PII audit tagger', 'inline', False, FailurePolicy.FAIL_OPEN,
                         'Best-effort audit signal: its failure must not deny service to a legitimate request'),
          DetectorPolicy('Session behaviour scorer', 'near_real_time', False, FailurePolicy.FAIL_OPEN,
                         'Off-path enrichment: it never blocks in the first place, so its failure fails open'),
      ]


      def decide(policy: DetectorPolicy, kind: FailureKind) -> FailureDecision:
          '''Apply a detector policy to a specific failure and return the admit/block decision.

          The policy is a property of the detector, not of the failure kind: an error, a
          timeout, and an unavailability all resolve through the same fail-open or
          fail-closed choice. What differs by kind is only the detail logged.
          '''
          admitted = policy.policy is FailurePolicy.FAIL_OPEN
          verb = 'admitted' if admitted else 'blocked'
          detail = f'{policy.name} {kind.value}; policy {policy.policy.value} -> request {verb}'
          return FailureDecision(policy.name, kind.value, policy.policy.value, admitted, detail)


      def print_policies(policies: List[DetectorPolicy]) -> None:
          print('=' * 84)
          print('FAIL-OPEN vs FAIL-CLOSED DECISION ENGINE')
          print('The policy is per detector and per tier, not a single global default')
          print('=' * 84)
          for p in policies:
              klass = 'essential' if p.essential else 'droppable'
              print()
              print(f'DETECTOR: {p.name} [{p.tier}, {klass}]')
              print(f'  Policy   : {p.policy.value}')
              print(f'  Rationale: {p.rationale}')


      def demo_failures(policies: List[DetectorPolicy]) -> None:
          print()
          print('=' * 84)
          print('FAILURE DECISIONS (error / timeout / unavailable resolve through the same policy)')
          print('=' * 84)
          for p in policies:
              for kind in FailureKind:
                  d = decide(p, kind)
                  print(f'  {d.detail}')
              print()
          fail_open = sum(1 for p in policies if p.policy is FailurePolicy.FAIL_OPEN)
          fail_closed = len(policies) - fail_open
          print(f'Summary: {fail_closed} detectors fail closed (security), {fail_open} fail open (availability)')
          print('A single global policy would force one wrong trade on half of these detectors.')


      if __name__ == '__main__':
          print_policies(POLICIES)
          demo_failures(POLICIES)
  deliverable_2:
    title: Fail-Open versus Fail-Closed Decision Table
    filename: fail_policy_decision_table.py
    description: Tabulates the failure policy for each detector class with what it favours and the risk
      it accepts, and states the symmetry of risk -- the fail-open risk of admitting the attack versus
      the fail-closed risk of denying legitimate service -- so the choice is seen as between two risks,
      not between a safe and a risky option.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the decision table and the risk-symmetry explanation.
    code: |
      # fail_policy_decision_table.py
      # Section 14.06: Fail-Open versus Fail-Closed Decision Table
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class PolicyRow:
          detector_class: str
          policy: str
          favours: str
          risk_taken: str


      ROWS: List[PolicyRow] = [
          PolicyRow('Injection / jailbreak classifier', 'fail-closed', 'security',
                    'Denies legitimate traffic while the detector is down'),
          PolicyRow('Output PII / secret scanner', 'fail-closed', 'security',
                    'Blocks valid responses during a scanner fault'),
          PolicyRow('Policy / toxicity output filter', 'fail-closed', 'security',
                    'Withholds acceptable output when the filter errors'),
          PolicyRow('Input PII audit tagger', 'fail-open', 'availability',
                    'Audit gap: a request passes untagged during the fault'),
          PolicyRow('Session behaviour scorer (NRT)', 'fail-open', 'availability',
                    'A window of session scoring is missed'),
          PolicyRow('Batch analytics job', 'fail-open', 'availability',
                    'A batch run is skipped or delayed'),
      ]


      def print_decision_table(rows: List[PolicyRow]) -> None:
          print('=' * 92)
          print('FAIL-OPEN vs FAIL-CLOSED DECISION TABLE')
          print('Each policy takes a real risk; the question is which risk is acceptable for that detector')
          print('=' * 92)
          header = 'Detector class'.ljust(36) + 'Policy'.ljust(14) + 'Favours'.ljust(14) + 'Risk taken'
          print(header)
          print('-' * 92)
          for r in rows:
              print(r.detector_class.ljust(36) + r.policy.ljust(14) + r.favours.ljust(14) + r.risk_taken)
          print('-' * 92)


      def risk_symmetry() -> None:
          print()
          print('=' * 92)
          print('THE SYMMETRY OF RISK')
          print('=' * 92)
          print('Fail-open risk : admitting the attack the failed detector would have caught.')
          print('Fail-closed risk: denying service to legitimate traffic on a detector fault.')
          print()
          print('Neither policy is safe in the abstract -- each trades one risk for the other.')
          print('Fail-closed on a critical security detector accepts a denial-of-service risk to')
          print('avoid admitting an attack. Fail-open on a best-effort detector accepts an audit')
          print('gap to avoid denying service. The right choice depends on what the detector')
          print('guards and what its failure would cost, which is why the policy is per detector.')


      if __name__ == '__main__':
          print_decision_table(ROWS)
          risk_symmetry()
  deliverable_3:
    title: Degraded-Mode Detector Classification
    filename: degraded_mode_classification.py
    description: Classifies detectors as essential (fail-closed, never dropped) or droppable (fail-open,
      shed first under stress) and shows the essential path the gateway degrades toward, so a partial
      failure sheds the droppable detectors and keeps serving through the essential security detectors
      rather than failing one way for everything.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the essential and droppable classifications and the retained essential path.
    code: |
      # degraded_mode_classification.py
      # Section 14.06: Degraded-Mode Detector Classification
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class DetectorClass:
          name: str
          tier: str
          essential: bool
          on_failure: str
          justification: str


      DETECTORS: List[DetectorClass] = [
          DetectorClass('Injection classifier', 'inline', True, 'fail-closed',
                        'Primary defence against prompt injection; must not be silently dropped'),
          DetectorClass('Jailbreak classifier', 'inline', True, 'fail-closed',
                        'Primary defence against jailbreaks; part of the essential path'),
          DetectorClass('Output PII scanner', 'inline', True, 'fail-closed',
                        'Prevents data leakage in responses; essential to keep'),
          DetectorClass('Input PII audit tagger', 'inline', False, 'fail-open',
                        'Audit enrichment only; droppable without weakening the essential path'),
          DetectorClass('Session behaviour scorer', 'near_real_time', False, 'fail-open',
                        'Off-path signal; droppable under stress'),
          DetectorClass('Coordinated-network analysis', 'batch', False, 'fail-open',
                        'Retrospective analytics; droppable, runs off-path'),
      ]


      def classify(detectors: List[DetectorClass]) -> None:
          print('=' * 88)
          print('DEGRADED-MODE DETECTOR CLASSIFICATION')
          print('Essential detectors are kept (fail-closed); droppable ones are shed (fail-open)')
          print('=' * 88)
          essential = [d for d in detectors if d.essential]
          droppable = [d for d in detectors if not d.essential]
          print()
          print('ESSENTIAL (the path degrades TO these, never drops them):')
          for d in essential:
              print(f'  - {d.name} [{d.tier}] -> {d.on_failure}')
              print(f'      {d.justification}')
          print()
          print('DROPPABLE (shed first under stress, without weakening the essential path):')
          for d in droppable:
              print(f'  - {d.name} [{d.tier}] -> {d.on_failure}')
              print(f'      {d.justification}')


      def degraded_path(detectors: List[DetectorClass]) -> None:
          print()
          print('=' * 88)
          print('WHAT DEGRADED MODE MEANS')
          print('=' * 88)
          essential = [d.name for d in detectors if d.essential]
          print('Under partial failure the gateway does not fail one way for everything. It sheds')
          print('the droppable detectors and keeps serving through the essential ones:')
          print()
          print('  Essential path retained: ' + ', '.join(essential))
          print()
          print('This is why the classification matters: without it, a partial failure forces a')
          print('single global choice -- block everything or admit everything. With it, the gateway')
          print('degrades gracefully to its essential security detectors and keeps running.')


      if __name__ == '__main__':
          classify(DETECTORS)
          degraded_path(DETECTORS)
  deliverable_4:
    title: Timeout-to-Failure-Policy Mapping
    filename: timeout_to_policy_mapping.py
    description: Maps the per-detector timeout from Section 14.04 to its fail-open or fail-closed resolution,
      showing a detector completing within its deadline and detectors timing out under opposite policies
      -- the same timeout mechanism producing a block for a critical detector and an admit for a best-effort
      one.
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      enum and dataclasses only, prints the timeout configuration and worked timeout outcomes under each
      policy.
    code: |
      # timeout_to_policy_mapping.py
      # Section 14.06: Timeout-to-Failure-Policy Mapping
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from enum import Enum
      from typing import List


      class Policy(Enum):
          FAIL_OPEN = 'fail_open'
          FAIL_CLOSED = 'fail_closed'


      @dataclass
      class DetectorTimeout:
          name: str
          timeout_ms: float
          policy: Policy


      @dataclass
      class TimeoutOutcome:
          detector: str
          elapsed_ms: float
          timed_out: bool
          resolution: str


      def resolve_timeout(cfg: DetectorTimeout, elapsed_ms: float) -> TimeoutOutcome:
          '''A timeout is one failure kind among error and unavailable, and it resolves
          through the same per-detector policy. Section 14.04 introduced the timeout as a
          latency-bounding mechanism; here the timeout is mapped to the fail-open or
          fail-closed decision that says what the gateway does when the deadline is hit.
          '''
          if elapsed_ms <= cfg.timeout_ms:
              return TimeoutOutcome(cfg.name, elapsed_ms, False,
                                    'completed within deadline; normal verdict used')
          if cfg.policy is Policy.FAIL_OPEN:
              resolution = 'timed out -> fail-open -> request admitted without this detector'
          else:
              resolution = 'timed out -> fail-closed -> request blocked'
          return TimeoutOutcome(cfg.name, elapsed_ms, True, resolution)


      CONFIGS: List[DetectorTimeout] = [
          DetectorTimeout('Injection classifier', 20.0, Policy.FAIL_CLOSED),
          DetectorTimeout('Output PII scanner', 15.0, Policy.FAIL_CLOSED),
          DetectorTimeout('Input PII audit tagger', 10.0, Policy.FAIL_OPEN),
      ]


      def demo() -> None:
          print('=' * 84)
          print('TIMEOUT-TO-FAILURE-POLICY MAPPING')
          print('The 14.04 timeout bounds latency; the 14.06 policy decides what a timeout does')
          print('=' * 84)
          print()
          header = 'Detector'.ljust(28) + 'Timeout'.ljust(11) + 'On timeout'
          print(header)
          print('-' * 84)
          for c in CONFIGS:
              print(c.name.ljust(28) + f'{c.timeout_ms:.0f}ms'.ljust(11) + c.policy.value)
          print('-' * 84)
          print()
          print('WORKED OUTCOMES')
          print('-' * 84)
          trials = [
              (CONFIGS[0], 12.0),   # within deadline
              (CONFIGS[0], 26.0),   # timed out, fail-closed
              (CONFIGS[2], 18.0),   # timed out, fail-open
          ]
          for cfg, elapsed in trials:
              o = resolve_timeout(cfg, elapsed)
              print(f'  {o.detector}: {o.elapsed_ms:.0f}ms -> {o.resolution}')
          print()
          print('The timeout does not decide the outcome on its own -- it is bounded by 14.04 and')
          print('resolved by the 14.06 policy. A critical detector times out closed; a best-effort')
          print('detector times out open. Same timeout mechanism, opposite decisions by policy.')


      if __name__ == '__main__':
          demo()
common_mistakes:
  mistake_1:
    description: Leaving the failure mode unspecified and letting the code decide what happens when a
      detector fails
    why_it_happens: |-
      In normal operation the detector never fails, so the failure path is never exercised and
      feels theoretical, and it is easy to assume the request will be handled sensibly without
      deciding what sensible means.
    consequence: When a detector eventually fails, the request takes whatever path the code happens to
      take -- silently failing open through a swallowed exception or failing closed through an uncaught
      one -- so a security-versus-availability decision of real consequence is made by the accident of
      code structure rather than by an engineer.
    correct_approach: Specify a deliberate fail-open or fail-closed policy for every detector and apply
      it at the isolated integration boundary, so that what happens on failure is a chosen policy with
      a stated rationale, never whatever the bug does.
  mistake_2:
    description: Applying a single global failure policy to every detector
    why_it_happens: |-
      One policy for the whole gateway is simple to state and reason about, and choosing once
      seems cleaner than maintaining a per-detector decision, so the gateway is set to fail
      open everywhere or fail closed everywhere.
    consequence: 'The global policy is wrong for some detectors whichever way it is set: fail-closed everywhere
      turns a best-effort audit tagger fault into a denial of service, while fail-open everywhere leaves
      the injection classifier admitting the attacks it exists to block.'
    correct_approach: Choose the policy per detector and per tier from what the detector guards and whether
      its tier can block, so critical inline security detectors fail closed and best-effort or off-path
      detectors fail open.
  mistake_3:
    description: Treating fail-open as the safe default because it keeps the service up
    why_it_happens: |-
      Availability is visible and measured, and an outage is an obvious incident, so fail-open
      feels like the responsible choice because the gateway keeps serving and nothing appears
      to break.
    consequence: A critical security detector set to fail open silently admits the attacks it was meant
      to catch during every failure window, and an attacker who notices the detector is down has a clear
      opening that produces no visible outage to alert anyone.
    correct_approach: Recognise that fail-open takes a real security risk and is only the right default
      for best-effort and off-path detectors; fail the critical inline security detectors closed, accepting
      the availability cost as the lesser risk for what they guard.
  mistake_4:
    description: Handling a timeout as a separate concern with its own ad hoc behaviour instead of through
      the failure policy
    why_it_happens: |-
      The timeout was introduced in a different section as a latency mechanism, so it is easy
      to treat it as a performance detail and bolt on whatever behaviour is convenient when it
      fires, separately from the error-handling policy.
    consequence: The gateway ends up with inconsistent failure behaviour -- a detector that fails closed
      on an error but open on a timeout, or vice versa -- so its response to failure depends on the incidental
      reason for the failure rather than on a coherent policy.
    correct_approach: Treat the timeout as one failure kind alongside error and unavailability, resolving
      all three through the same per-detector policy, so a detector fails the same way regardless of why
      it failed to produce a verdict.
  mistake_5:
    description: Having no essential-versus-droppable classification, so a partial failure forces a single
      crude gateway-wide choice
    why_it_happens: |-
      Classifying every detector as essential or droppable is extra design work, and when all
      detectors are treated as equally important there is no obvious need for it until several
      fail at once.
    consequence: When a partial or correlated failure hits, the gateway has no notion of which detectors
      matter more, so it can only block everything or admit everything, losing either the service or the
      entire security core instead of degrading gracefully.
    correct_approach: Classify detectors as essential (fail-closed, never dropped) or droppable (fail-open,
      shed first), so a partial failure degrades to the essential security detectors and keeps serving
      through them while the droppable enrichment falls away.
section_summary:
  compact: |-
    When a detector errors, times out, or becomes unavailable, the gateway must do something
    deliberate, because an unspecified failure mode is not the absence of a decision but a
    decision made by the bug -- whatever the code does on the exception becomes the policy.
    The two policies are fail-open, which passes the request and favours availability, and
    fail-closed, which blocks it and favours security. Each carries a real and opposite risk:
    fail-open admits the attack the failed detector would have caught, and fail-closed denies
    service to legitimate traffic on a detector fault, so neither is safe in the abstract and
    the choice is between two risks. The policy is therefore made per detector and per tier,
    not once globally, because a critical inline security detector like the injection
    classifier warrants fail-closed while a best-effort audit tagger or an off-path scorer
    warrants fail-open, and a single global policy forces the wrong trade on half the
    detectors. The timeout from Section 14.04 is one failure kind that resolves through the
    same per-detector policy as an error or unavailability, so the same timeout mechanism
    produces opposite decisions on detectors whose policies differ. Degraded-mode operation
    classifies detectors as essential (fail-closed, never dropped) or droppable (fail-open,
    shed first), so a partial or correlated failure degrades gracefully to the essential
    security detectors rather than failing the whole gateway one way for everything. This
    decides what a failing detector does; the mechanism that stops a detector from failing
    repeatedly into a cascade is Section 14.07.
  key_takeaways:
  - An unspecified failure mode is a failure mode chosen by the bug, so the gateway response to a detector
    error, timeout, or unavailability must be a deliberate policy
  - Fail-open passes the request favouring availability and risks admitting the attack; fail-closed blocks
    it favouring security and risks denying legitimate service -- neither is safe in the abstract
  - The fail-open versus fail-closed choice is made per detector and per tier, because a critical security
    detector and a best-effort enrichment detector warrant opposite policies
  - A single global failure policy forces the wrong trade on some detectors whichever way it is set
  - The timeout from Section 14.04 is one failure kind that resolves through the same per-detector policy
    as an error or unavailability
  - Degraded-mode operation classifies detectors as essential (fail-closed) or droppable (fail-open) so
    a partial failure degrades to the essential security path rather than failing one way for everything
preview_section_14_07:
  title: High Availability, Circuit Breakers, and Graceful Degradation
  summary: |-
    Section 14.06 decided what a failing detector does; Section 14.07 builds the mechanism that
    keeps a failing detector from taking the gateway down with it. It introduces the circuit
    breaker that cuts off a detector after repeated failures -- moving between closed, open,
    and half-open as it tests recovery -- so a broken detector is isolated rather than retried
    into a cascade. It adds bulkheads that keep one detector failure from exhausting shared
    resources, health checks and readiness that decide when an instance receives traffic,
    redundancy and failover for the tiers, and the graceful degradation that operates the
    essential-versus-droppable classification defined here. It is the second resilience
    section, turning failure policy into failure containment.
