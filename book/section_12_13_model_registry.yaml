prose_content:

  part_1:
    title: 'Why Model Versioning Is Non-Negotiable'
    body: |
      A detection system that cannot roll back a bad model update is one bad update away from
      a production incident. The model registry exists to make rollback a single safe operation
      rather than a manual recovery under pressure.

      Consider the redeployment without a registry. The threshold monitor fires a drift alert.
      The engineer retrains the Random Forest on the updated dataset, evaluates it (showing
      improved metrics on the new test set), copies the model file to the production servers,
      and restarts the gateway. The new model is now live. Three hours later, the false positive
      rate has tripled -- the retrained model regressed on a class of benign traffic that was
      underrepresented in the new test set. The analyst queue is flooding. The engineer needs to
      roll back immediately.

      Without a registry, the rollback requires finding the previous model file. Was it backed
      up before the overwrite? Does it match the previous calibration and threshold configuration,
      or were those changed too? Was the previous feature schema version compatible? Each of these
      questions is a point where the manual rollback can fail, and each failure extends the
      incident. The rollback that should take seconds takes the duration of a manual investigation
      under the pressure of a live false-positive flood.

      With a registry, the rollback is one operation: demote the regressed model from Production
      and re-promote the previous version, which the registry preserved with its full
      configuration. The previous model, its calibration, its threshold, and its schema version
      are all restored together because the registry tracked them as a unit. The rollback takes
      seconds and is reliable because the previous state was never lost.

      This is why model versioning is non-negotiable. The registry is not an optimisation or a
      convenience; it is the difference between a recoverable update and an unrecoverable incident.

  part_2:
    title: 'The MLflow Model Registry and Stage Model'
    body: |
      MLflow is an open-source platform for the machine learning lifecycle, and its model
      registry component provides the versioning and staging that the Chapter 12 detection
      system needs. The registry organises models into named entries (one per detector), each
      with multiple versions, and tracks each version through a stage lifecycle.

      The stage model has three stages relevant to the detection system. Staging is where a
      newly registered model lands after training. A model in Staging has been trained and
      registered but has not passed the stage transition gates and is not serving production
      traffic. Production is where the model serving live traffic resides. Only one version of
      each detector is in Production at a time. Archived is where superseded models go after
      they are demoted from Production -- they are retained for rollback and audit but are not
      serving traffic.

      The stage transitions are the governed operations. Staging to Production is the promotion,
      gated by the stage transition checks. Production to Archived is the demotion, which happens
      when a new version is promoted (the old version is archived) or when a regression is
      detected (the regressed version is archived and the previous version is re-promoted from
      Archived to Production). The registry enforces that these transitions happen explicitly and
      records who or what triggered each transition and when.

      Experiment tracking complements the registry. Every training run logs its hyperparameters,
      metrics, and artefacts to an MLflow experiment. The registered model version links back to
      the experiment run that produced it, so the full training context of any model version is
      retrievable. This is the foundation of the model lineage that the audit requirement depends
      on. The model_registry.py in deliverable_1 implements the MLflow integration with experiment
      logging, stage transitions, and model card attachment.

  part_3:
    title: 'Stage Transition Gates: What Must Pass Before Production'
    body: |
      The stage transition gate from Staging to Production is the quality control that prevents
      a regressed or untested model from reaching live traffic. The gate is a set of automated
      checks that must all pass before the promotion is permitted. A manual promotion that
      bypasses the gate is the failure mode the gate exists to prevent -- it is where, under
      deadline pressure, the calibration check or the latency check gets skipped.

      Four gate conditions are required for a Chapter 12 detector. The accuracy regression check
      compares the candidate model against the current Production model on the same temporal test
      set: the candidate must not regress on recall at the operating threshold, and ideally
      improves it. A candidate that is worse than the model it would replace is rejected. The
      latency check runs the candidate through the Section 12.12 profiler and verifies its P99
      latency is within the budget slice for that detector. A candidate that breaches the latency
      budget is rejected even if its accuracy is better. The calibration check verifies the
      candidate's ECE is below the threshold (Section 12.10): an uncalibrated candidate cannot be
      combined in the ensemble. The model card check verifies the model card is attached and
      complete (Section 12.08): a model without documented training data, known limitations, and
      recommended usage cannot be safely operated.

      The gate conditions are checked automatically by the stage_transition_gates.py in
      deliverable_2. The promotion request triggers the checks; if all pass, the promotion
      proceeds; if any fails, the promotion is rejected with the specific failure logged. This
      automation removes the manual judgement that is where checks get skipped. The gate is not
      a recommendation; it is an enforced precondition for reaching Production.

  part_4:
    title: 'Shadow Mode and Canary Promotion'
    body: |
      A model that passed the offline stage transition gates can still regress on the production
      traffic distribution, which differs from the test set in ways the offline evaluation did
      not capture. Shadow mode and canary promotion validate the candidate on live traffic before
      it affects any production decision.

      Shadow mode runs the candidate model on production traffic in parallel with the Production
      model, logging the candidate's decisions without acting on them. Every request is scored by
      both the Production model (whose decision is acted on) and the shadow candidate (whose
      decision is only logged). After a shadow period -- typically a few days to capture a
      representative traffic sample -- the candidate's logged decisions are compared against the
      Production model's decisions and against the eventual ground truth from analyst review. This
      reveals how the candidate would have performed on real traffic without any production risk:
      if the candidate would have produced a flood of false positives, the shadow logs show it,
      and the candidate is rejected before it ever affected a decision.

      Canary promotion is the next step after a successful shadow period. The candidate is promoted
      to serve a small fraction of production traffic -- typically 5% -- while the Production model
      serves the rest. The candidate's decisions on the canary traffic are now acted on, so the
      canary is a real but limited production test. The canary metrics (false positive rate, recall
      where measurable, latency) are monitored, and if they degrade relative to the Production model
      on the remaining traffic, the canary is automatically rolled back: the traffic split reverts
      to 100% Production model, and the candidate returns to Staging for investigation. If the canary
      metrics hold over the canary period, the traffic split increases progressively to full
      promotion.

      The canary_promoter.py in deliverable_4 implements the traffic split and the automated
      rollback trigger. The shadow_mode_runner.py in deliverable_3 implements the parallel logging.
      Together they provide the graduated validation -- offline gates, then shadow, then canary,
      then full -- that catches regressions at the earliest stage with the least production impact.

  part_5:
    title: 'Model Lineage and the Audit Requirement'
    body: |
      When a detector decision is challenged -- a blocked request that the user claims was
      legitimate, a missed attack that caused an incident, a regulatory inquiry into an automated
      decision -- the detection team must be able to answer precisely: which model version made
      this decision, what data was it trained on, what was its evaluated performance, and what
      were its known limitations at the time. This is the audit requirement, and model lineage
      is what satisfies it.

      Model lineage connects each production model version to the artefacts that produced it: the
      dataset version (the Section 12.04 DVC tag), the feature pipeline schema version (the Section
      12.11 FEATURE_SCHEMA_VERSION), the training code commit, the evaluation run, the calibration
      parameters, and the model card. Given a model version, the lineage retrieves all of these, so
      the full context of any decision can be reconstructed. Given a decision (logged with the model
      version that made it), the lineage identifies the exact model and its training context.

      The lineage is also what makes reproduction possible. To investigate a regression, the team
      reproduces the model: check out the training code commit, restore the dataset version with
      DVC pull, re-run the training, and verify the reproduced model matches the registered model.
      Without the lineage, this reproduction is impossible -- the training conditions are lost, and
      the investigation cannot isolate the cause. The model_lineage_tracker.py in deliverable_5
      records and retrieves the lineage, connecting the registry to the dataset versioner from
      Section 12.04 and the schema versioner from Section 12.11.

      The lineage requirement extends across all four detectors plus their variants. The registry
      manages the Isolation Forest, the Random Forest, the XGBoost, the GRU, the DistilBERT, the
      embedding detector, and the PII scanner, each with its own version history, and the ablation
      variants explored during development. The multi-model registry keeps these organised so that
      the production configuration -- which version of each detector is live -- is always known and
      auditable.

