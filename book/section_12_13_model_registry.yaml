section_overview:
  one_line_summary: 'The model registry is the control plane that makes every detector update safe and reversible: without it, the first retraining after attack-distribution shift is a manual, unrepeatable redeployment that reintroduces the skew it was meant to fix.'
  why_this_section_exists: |
    The detectors built in Chapter 12 are not deployed once and left untouched. The attack
    distribution shifts, new attack families emerge, the threshold monitor (Section 12.10)
    fires a drift alert, and the detector must be retrained and redeployed. This happens
    repeatedly over the life of the detection system. Each redeployment is an opportunity to
    introduce a regression: a retrained model that is worse than the one it replaces, a model
    deployed with the wrong feature schema, a calibration that was not re-applied, a latency
    regression that breaches the SLO.

    Without a model registry, each redeployment is a manual process. The engineer trains the
    new model, copies it to the production servers, and restarts the gateway. If the new model
    is worse, the rollback is another manual process: find the previous model file, copy it
    back, restart again, hoping the previous model file still exists and matches the previous
    configuration. This manual process is where regressions reach production undetected and
    where rollbacks fail because the previous state was not preserved.

    The model registry makes every model update a governed, reversible operation. It tracks
    model versions through Staging, Production, and Archived stages. It enforces stage
    transition gates: a model cannot reach Production without passing the accuracy regression,
    latency, and calibration checks. It stores the full lineage needed to reproduce any model.
    It supports shadow mode and canary promotion to validate a candidate on live traffic before
    full promotion, and instant rollback to the previous Production version when a regression is
    detected.

    Section 12.13 builds this registry once, and every subsequent model update for every detector
    becomes a safe, repeatable operation rather than a manual incident.
  position_in_chapter: |
    Section 12.13 is the fourth operational infrastructure section. It consumes the model cards
    from Section 12.08, the calibration and thresholds from Section 12.10, the schema versions
    from Section 12.11, and the latency validation from Section 12.12 -- all of which become
    stage transition gate conditions. It produces the registry that the Section 12.14 retraining
    cycle and the Section 12.17 gateway capstone use to govern model deployment.

