  - 'Section 10.4: PGD (the evaluation adversary for squeezer detection rates)'
  - 'Section 10.5: C&W (adaptive C&W with squeezer knowledge breaks single-squeezer detection)'
  - 'Section 10.1: Track 7 pre-inference architecture (squeezer runs in the pre-inference stage)'
  - 'Section 10.10: incident root cause analysis (absent squeezer is a shared root cause)'

prose_content:

  part_1:
    title: 'Detection by Transformation: The Asymmetry Between Natural and Adversarial Inputs'
    body: |
      The foundation of feature squeezing is a fundamental asymmetry between natural images and
      adversarial examples in how they respond to input transformation.

      A natural image of a cat remains recognisable as a cat after mild Gaussian blurring. The
      classifier that correctly identifies the original also correctly identifies the blurred version,
      because the semantically meaningful features (edges, textures, shapes) survive mild smoothing.
      The prediction may shift slightly in probability, but the argmax class remains the same.

      An adversarial example -- say, a cat image perturbed by FGSM to be classified as a toaster --
      has been modified by a precisely calibrated perturbation. That perturbation exists at a
      specific frequency range (typically high-frequency fine-grained noise) and with a specific
      magnitude (exactly epsilon per pixel). Gaussian blurring changes the high-frequency components
      of the input, which are exactly the components that carry the adversarial signal. The
      perturbation precision is destroyed; the adversarial example, once blurred, may no longer
      fool the classifier and reverts to being classified as a cat.

      This asymmetry -- natural images are robust to mild transformation, adversarial examples are
      not -- is the detection signal. Feature squeezing (Xu et al. 2018) formalises it as a detection
      algorithm: apply a transformation ("squeezer") to the input, query the model on both the
      original and the squeezed version, and flag the input if the predictions disagree beyond a
      threshold. A natural input produces stable predictions; an adversarial input produces unstable
      predictions that shift significantly under the squeezer transformation.

      The asymmetry is not absolute: adversarial examples with very large perturbation budgets may
      survive mild squeezing, and natural images near the decision boundary may produce unstable
      predictions under squeezing (false positives). Threshold calibration and squeezer selection
      must account for both failure modes. But for the vast majority of adversarial examples in the
      practical epsilon range (4/255 to 8/255 for images), the asymmetry is strong enough to
      provide meaningful detection coverage.

  part_2:
    title: 'The Three Canonical Squeezers: Spatial Smoothing, Bit-Depth, and JPEG'
    body: |
      Xu et al. 2018 identified three input transformation types that exploit different aspects of
      the adversarial perturbation structure. Each squeezer targets a different adversarial attack
      class and has different false positive and false negative characteristics.

      Spatial smoothing applies a blurring filter to the input. Gaussian blur weights nearby pixels
      by a Gaussian kernel centred at each pixel -- each output pixel is a weighted average of its
      neighbourhood, with closer pixels weighted more. Median filtering replaces each pixel with the
      median value of its neighbourhood, which is particularly effective against salt-and-pepper
      noise (isolated pixels that differ sharply from their neighbours). Adversarial perturbations
      from FGSM and PGD are distributed uniformly across all pixels with small per-pixel magnitude
      -- exactly the pattern that Gaussian smoothing reduces. Spatial smoothing is most effective
      against L-infinity adversarial examples (FGSM, PGD) and least effective against L0 sparse
      adversarial examples (which modify few pixels significantly).

      Bit-depth reduction rounds pixel values to fewer bits. An 8-bit image has 256 possible values
      per channel; reducing to 5 bits gives 32 possible values. Adversarial perturbations rely on
      precise per-pixel values: an epsilon=4/255 perturbation changes a pixel by approximately 0.016
      on the normalised [0,1] scale. Rounding to 5 bits (step size ~0.032) destroys perturbations
      smaller than the rounding step. This makes bit-depth reduction most effective against fine-
      grained perturbations (small epsilon FGSM) and less effective against larger perturbations.

      JPEG compression applies lossy block-based discrete cosine transform (DCT) quantisation.
      The JPEG quality parameter controls the quantisation step size: low quality (high compression)
      removes more high-frequency information, destroying fine-grained adversarial perturbations at
      the cost of visible image quality degradation. Unlike spatial smoothing (which operates
      uniformly) and bit-depth reduction (which operates per-pixel), JPEG operates in frequency
      domain blocks and removes structured high-frequency patterns more aggressively. It is most
      effective against perturbations with periodic or structured spatial patterns.

  part_3:
    title: 'Squeezer Detection Logic: Threshold, Metric, and Calibration'
    body: |
      The squeezer detection score for a single squeezer S applied to input x is:
      score(x) = d(P(y | x), P(y | S(x)))
      where P(y | x) is the model''s probability vector on the original input, P(y | S(x)) is the
      probability vector on the squeezed input, and d is a distance metric. Two choices of d are
      common: L1 distance (sum of absolute differences across all classes) and L-infinity distance
      (maximum absolute difference across all classes). L1 is more sensitive to aggregate prediction
      shift; L-infinity is more sensitive to the maximum class probability change.

      A natural input produces score(x) near zero: the model''s prediction is approximately the
      same on the original and the squeezed version. An adversarial input produces a higher score:
      the squeezer destroys the adversarial perturbation, and the model''s prediction changes.
      The detection decision is: flag if score(x) > tau, where tau is a threshold calibrated to
      achieve the desired false positive rate on natural inputs.

      Threshold calibration requires a held-out set of natural inputs and a set of adversarial
      inputs generated at the specific epsilon value and attack method the deployment faces. The
      ROC curve (true positive rate vs false positive rate as tau varies) determines the operating
      point. For production deployments, a false positive rate of 1-5% is typically acceptable;
      the threshold is set to achieve this rate on the natural input held-out set.

      One calibration failure mode deserves explicit attention: natural inputs near decision
      boundaries produce high squeezer scores even without adversarial perturbation. A benign
      image that is borderline between two classes (classified as dog with 55% confidence and
      cat with 44%) may flip classification under mild squeezing. These natural hard examples
      generate false positives that are not adversarial. Calibration must be done on a dataset
      that includes hard natural examples, not just easily classified ones.

  part_4:
    title: 'Squeezer Ensemble: Coverage, Disagreement, and Ensemble Logic'
    body: |
      No single squeezer covers all adversarial attack families. Spatial smoothing (Gaussian)
      catches FGSM and PGD effectively but is less effective against C&W minimum-norm examples
      (which may concentrate perturbation in spatial patterns that survive blurring). Bit-depth
      reduction catches fine-grained perturbations but misses large sparse perturbations (L0 attacks).
      JPEG compression catches periodic structured perturbations but may not catch sparse random ones.

      A squeezer ensemble runs multiple squeezers and flags an input if any squeezer produces a score
      above its threshold. The ensemble detection score is: max_i(score_i(x)) where score_i is the
      detection score for squeezer i. An input that passes all individual squeezers passes the
      ensemble; an input that fails any single squeezer is flagged.

      The ensemble increases coverage because different squeezers have complementary coverage:
      an adversarial example that survives Gaussian smoothing (perhaps because the perturbation
      is structured to avoid low-frequency components) may not survive bit-depth reduction
      (which destroys the fine per-pixel precision). The ensemble''s coverage is the union of
      individual squeezer coverages, not just the coverage of the best single squeezer.

      The ensemble also increases the cost for adaptive adversaries. An adversary optimising
      against a single squeezer crafts examples that survive that squeezer''s specific
      transformation. An adversary optimising against an ensemble must craft examples that
      simultaneously survive all squeezers -- a more constrained optimisation problem that
      typically requires larger perturbation or lower attack success rate. The adaptive attack
      cost scales with ensemble diversity, not just ensemble size: three diverse squeezers
      (spatial, bit-depth, frequency domain) are harder to jointly evade than three similar
      squeezers (three Gaussian blurs with different sigma values).

  part_5:
    title: 'Adaptive Attacks Against Squeezing: The Limits of Single-Squeezer Defences'
    body: |
      The adaptive adversary argument (first made systematically in Carlini and Wagner 2017 and
      applied to squeezing defences in Sharma and Ding 2018) shows that any single squeezer can
      be defeated by an adversary who knows the squeezer and optimises through it.

      For a Gaussian squeezer S, the adaptive attack generates adversarial examples against
      the composed function S(model(x)) rather than model(x) alone. The C&W objective becomes:
      minimise ||delta||_2 + c * g(S(x + delta)) where g evaluates misclassification on the
      squeezed input. The resulting adversarial example misclassifies even after squeezing --
      it is adversarial both before and after the squeezer is applied, so the squeezer score
      is near zero despite the example being adversarial. The Section 10.5 defence_evaluator_cw.py
      deliverable implements exactly this attack.

      The practical implication: feature squeezing alone cannot be the complete Track 7 detection
      layer. An adaptive adversary with knowledge of the squeezer configuration can craft examples
      that evade all squeezers while remaining adversarial. The squeezer ensemble provides
      meaningful resistance by increasing the number of constraints the adversary must satisfy
      simultaneously, but it does not provide formal guarantees.

      Section 10.12 adds two additional detection primitives -- consistency checking and the
      adversarial detector classifier -- that are harder to jointly evade with squeezing. Section
      10.13 assembles all three into the three-primitive Track 7 ensemble. The honest framing for
      production: the squeezer ensemble provides high coverage against non-adaptive adversaries
      and moderate resistance against adaptive adversaries; formal guarantees require randomised
      smoothing (Section 10.14).

  part_6:
    title: 'Text Preprocessing Analogues: Canonicalisation and Unicode Normalisation'
    body: |
      The image squeezer concept translates to text via preprocessing transformations that
      reduce the text''s feature space while preserving semantic content. Section 10.9
      described character-level attacks (homoglyphs, zero-width characters) that exploit
      preprocessing gaps. Text canonicalisation squeezers close those gaps.

      Unicode canonicalisation applies NFC or NFKC normalisation, which collapses compatibility
      equivalents (full-width ASCII characters to their standard ASCII equivalents, ligatures to
      their component characters). NFKC is more aggressive than NFC and handles more encoding
      variants. Homoglyph normalisation goes further: it replaces visually similar cross-script
      characters (Cyrillic а → Latin a) using the Unicode confusables database. Zero-width
      character removal strips all invisible codepoints (U+200B, U+200C, U+200D, U+2060).

      The text squeezer detection logic follows the same pattern as image squeezing: apply the
      canonicalisation, run the classifier on both the original and the canonicalised version,
      flag if predictions disagree. An input containing homoglyphs or zero-width characters that
      was adversarially crafted to fool the text classifier on the non-normalised version will
      classify correctly after canonicalisation -- the disagreement is the detection signal.

      Synonym normalisation is a softer text squeezer: replace words with their most common
      synonym (using a standardised synonym dictionary) and check prediction stability. This
      catches TextFooler-style attacks where the adversary substituted less-common synonyms
      to evade the classifier. The limitation is that synonym normalisation may change the
      semantics of specialised text (technical documents, proper nouns) producing false positives.

  part_7:
    title: 'Latency Budget: Squeezer Count, Parallelisation, and the 50ms P99 Constraint'
    body: |
      The critical engineering constraint for squeezer deployment is latency. Each squeezer
      requires one additional model forward pass (on the squeezed input), which is as expensive
      as the primary model inference. Running three squeezers sequentially triples inference
      latency. Within the 50ms P99 budget the gateway must respect, this may not be feasible.

      The correct architecture is parallel squeezer execution. The primary model inference and
      all squeezer model inferences run concurrently using async dispatch (torch.futures,
      asyncio with thread pool, or multi-process inference). The gateway waits for all parallel
      inferences to complete, compares predictions, and makes the detection decision. If all
      inferences complete in approximately the same time, the latency overhead is one model
      forward pass (the time for the slowest squeezer), not N model forward passes for N squeezers.

      The practical latency calculation: for a primary model with P99 inference latency of 20ms,
      and each squeezer adding 1ms of transformation time plus the same 20ms of model inference
      time, parallel execution completes in approximately 21ms total (20ms inference + 1ms
      transformation overhead). Sequential execution would take 60ms for two squeezers plus
      20ms for the primary -- 80ms total, well over the 50ms budget.

      The squeezer_latency_benchmark.py deliverable measures per-squeezer latency under load
      and produces a recommendation for maximum ensemble size given the primary model''s
      inference latency. The Section 10.13 gateway uses this recommendation to configure
      the Track 7 pre-inference stage. For models where inference is very expensive (large
      transformers, multi-modal models), limiting the squeezer ensemble to one or two
      squeezers and relying more heavily on the post-inference consistency checker
      (Section 10.12) is the correct latency-aware architectural choice.

