deliverables:

  deliverable_1:
    title: 'Feature Squeezer Library'
    filename: 'feature_squeezer.py'
    description: 'Gaussian blur, median filter, bit-depth reduction, and JPEG-approximate squeezers with squeezer detection score (L1 distance between original and squeezed prediction vectors) and threshold-based detection decision'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, torch.nn.functional. JPEG squeezer approximated via downsample/upsample
      (avoids PIL dependency; real production should use PIL JPEG encode/decode for accuracy).
      Import ToyLinear from fgsm_attack.py for demonstration.
    code: |
      # feature_squeezer.py
      # Section 10.11: Feature Squeezer Library
      # 20260524 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention
      # Reference: Xu et al. 2018 "Feature Squeezing: Detecting Adversarial Examples"

      import torch
      import torch.nn as nn
      import torch.nn.functional as F
      from torch import Tensor
      from typing import Callable, Tuple
      from dataclasses import dataclass


      # ---- Squeezer transformation functions ----

      def gaussian_squeeze(x: Tensor, sigma: float = 1.0, kernel_size: int = 5) -> Tensor:
          '''Gaussian blur: reduces high-frequency adversarial noise.'''
          half = kernel_size // 2
          coords = torch.arange(-half, half + 1, dtype=torch.float32)
          k1d = torch.exp(-coords ** 2 / (2.0 * sigma ** 2))
          k1d = k1d / k1d.sum()
          k2d = k1d.unsqueeze(0) * k1d.unsqueeze(1)  # (k, k)
          k2d = k2d.unsqueeze(0).unsqueeze(0)         # (1, 1, k, k)
          n_ch = x.size(1)
          kernel = k2d.expand(n_ch, 1, kernel_size, kernel_size)
          return F.conv2d(x, kernel, padding=half, groups=n_ch).clamp(0.0, 1.0)


      def median_squeeze(x: Tensor, window: int = 3) -> Tensor:
          '''Median filter: effective against salt-and-pepper and isolated pixel attacks.'''
          half = window // 2
          padded = F.pad(x, [half, half, half, half], mode='reflect')
          batch, channels, h, w = x.shape
          result = torch.zeros_like(x)
          for i in range(h):
              for j in range(w):
                  patch = padded[:, :, i:i + window, j:j + window]
                  result[:, :, i, j] = patch.reshape(batch, channels, -1).median(dim=2).values
          return result.clamp(0.0, 1.0)


      def bit_depth_squeeze(x: Tensor, bits: int = 5) -> Tensor:
          '''Bit-depth reduction: destroys fine-grained perturbation precision.'''
          levels = (2 ** bits) - 1.0
          return (x * levels).round() / levels


      def jpeg_squeeze(x: Tensor, scale: float = 0.5) -> Tensor:
          '''
          JPEG-approximate squeezer via downsample + upsample (bilinear).
          Approximates JPEG block quantisation without PIL dependency.
          For production accuracy: use PIL JPEG encode at target quality.
          '''
          h, w = x.size(-2), x.size(-1)
          downscaled = F.interpolate(x, scale_factor=scale, mode='bilinear',
                                     align_corners=False)
          return F.interpolate(downscaled, size=(h, w), mode='bilinear',
                               align_corners=False).clamp(0.0, 1.0)


      # ---- Detection logic ----

      def squeezer_detection_score(
          model: nn.Module,
          x: Tensor,
          squeeze_fn: Callable[[Tensor], Tensor],
          metric: str = 'l1',
      ) -> Tensor:
          '''
          Per-sample detection score: distance between prediction vectors on
          original vs squeezed input. Higher score = more likely adversarial.
          metric: 'l1' (sum of abs differences) or 'linf' (max abs difference).
          '''
          with torch.no_grad():
              p_orig = F.softmax(model(x), dim=1)
              p_squeezed = F.softmax(model(squeeze_fn(x)), dim=1)
          diff = (p_orig - p_squeezed).abs()
          if metric == 'linf':
              return diff.max(dim=1).values
          return diff.sum(dim=1)  # L1 default


      def detect_adversarial(
          model: nn.Module,
          x: Tensor,
          squeeze_fn: Callable[[Tensor], Tensor],
          threshold: float = 0.10,
          metric: str = 'l1',
      ) -> Tuple[Tensor, Tensor]:
          '''
          Returns (detection_decision, score_per_sample).
          detection_decision: bool tensor, True = adversarial flagged.
          '''
          scores = squeezer_detection_score(model, x, squeeze_fn, metric)
          return scores > threshold, scores


      @dataclass
      class SqueezerConfig:
          name: str
          fn: Callable
          threshold: float = 0.10
          metric: str = 'l1'


      def build_default_squeezers() -> list:
          return [
              SqueezerConfig('gaussian_s1', lambda x: gaussian_squeeze(x, sigma=1.0)),
              SqueezerConfig('gaussian_s0.5', lambda x: gaussian_squeeze(x, sigma=0.5)),
              SqueezerConfig('bit_depth_5', lambda x: bit_depth_squeeze(x, bits=5)),
              SqueezerConfig('jpeg_approx', lambda x: jpeg_squeeze(x, scale=0.5)),
          ]


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear, fgsm, attack_success_rate
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(32, 1, 28, 28)
          y = torch.randint(0, 10, (32,))
          eps = 8.0 / 255.0
          x_adv = fgsm(model, x, y, epsilon=eps)

          print('Feature Squeezer Detection Rates on FGSM adversarial examples')
          print(f'{"Squeezer":<22} {"threshold":<12} {"ADV_detect":<14} {"NAT_FPR"}')
          print('-' * 55)
          for cfg in build_default_squeezers():
              adv_flag, adv_scores = detect_adversarial(model, x_adv, cfg.fn, cfg.threshold)
              nat_flag, nat_scores = detect_adversarial(model, x, cfg.fn, cfg.threshold)
              adv_rate = adv_flag.float().mean().item()
              fpr = nat_flag.float().mean().item()
              print(f'{cfg.name:<22} {cfg.threshold:<12.2f} {adv_rate:<14.3f} {fpr:.3f}')


      if __name__ == '__main__':
          demo()

  deliverable_2:
    title: 'Squeezer Ensemble with Disagreement Scoring'
    filename: 'squeezer_ensemble.py'
    description: 'Multi-squeezer ensemble with maximum-disagreement and mean-disagreement scoring modes; threshold calibration from a held-out natural image set; ensemble detection rate comparison across attack families'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import from feature_squeezer.py and fgsm_attack.py.
    code: |
      # squeezer_ensemble.py
      # Section 10.11: Squeezer Ensemble with Disagreement Scoring
      # 20260524 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn.functional as F
      from torch import Tensor
      from typing import List, Tuple
      from feature_squeezer import SqueezerConfig, squeezer_detection_score, build_default_squeezers


      def ensemble_score(
          model,
          x: Tensor,
          squeezers: List[SqueezerConfig],
          mode: str = 'max',
      ) -> Tensor:
          '''
          Ensemble disagreement score.
          mode='max': flag if ANY squeezer shows high disagreement (union coverage).
          mode='mean': average disagreement across squeezers.
          '''
          scores = torch.stack([
              squeezer_detection_score(model, x, cfg.fn, cfg.metric)
              for cfg in squeezers
          ], dim=0)  # (n_squeezers, batch)

          if mode == 'max':
              return scores.max(dim=0).values
          return scores.mean(dim=0)


      def calibrate_threshold(
          model,
          x_natural: Tensor,
          squeezers: List[SqueezerConfig],
          target_fpr: float = 0.05,
          mode: str = 'max',
      ) -> float:
          '''
          Set ensemble threshold to achieve target false positive rate on natural inputs.
          Returns threshold value.
          '''
          scores = ensemble_score(model, x_natural, squeezers, mode)
          # Find quantile such that (1 - target_fpr) of natural scores fall below threshold
          threshold = scores.quantile(1.0 - target_fpr).item()
          return threshold


      def ensemble_detect(
          model,
          x: Tensor,
          squeezers: List[SqueezerConfig],
          threshold: float,
          mode: str = 'max',
      ) -> Tuple[Tensor, Tensor]:
          '''Returns (flagged: bool tensor, scores: float tensor).'''
          scores = ensemble_score(model, x, squeezers, mode)
          return scores > threshold, scores


      def per_squeezer_breakdown(
          model,
          x_adv: Tensor,
          y_true: Tensor,
          squeezers: List[SqueezerConfig],
      ) -> None:
          '''Show which squeezers contribute to detection.'''
          print(f'{"Squeezer":<24} {"Mean score":<14} {"Detect @ thresh":<18}')
          print('-' * 58)
          for cfg in squeezers:
              scores = squeezer_detection_score(model, x_adv, cfg.fn, cfg.metric)
              mean_s = scores.mean().item()
              flagged = (scores > cfg.threshold).float().mean().item()
              print(f'{cfg.name:<24} {mean_s:<14.4f} {flagged:<18.3f}')


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear, fgsm
              from pgd_attack import pgd_linf
          except ImportError:
              print('Run from directory containing fgsm_attack.py and pgd_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x_nat = torch.rand(64, 1, 28, 28)
          y = torch.randint(0, 10, (64,))
          eps = 8.0 / 255.0
          x_fgsm = fgsm(model, x_nat, y, epsilon=eps)
          x_pgd = pgd_linf(model, x_nat, y, eps, eps / 10.0, n_steps=20, n_restarts=1)

          squeezers = build_default_squeezers()

          # Calibrate threshold for 5% FPR on natural images
          threshold = calibrate_threshold(model, x_nat, squeezers, target_fpr=0.05)
          print(f'Calibrated ensemble threshold (5% FPR): {threshold:.4f}')

          for label, x_test in [('Natural', x_nat), ('FGSM', x_fgsm), ('PGD-20', x_pgd)]:
              flagged, scores = ensemble_detect(model, x_test, squeezers, threshold)
              rate = flagged.float().mean().item()
              print(f'{label:<12}: detection rate={rate:.3f}, mean_score={scores.mean().item():.4f}')

          print()
          print('Per-squeezer breakdown on FGSM adversarial examples:')
          per_squeezer_breakdown(model, x_fgsm, y, squeezers)


      if __name__ == '__main__':
          demo()

  deliverable_3:
    title: 'Squeezer Latency Benchmark'
    filename: 'squeezer_latency_benchmark.py'
    description: 'Measures per-squeezer transformation latency and model forward pass latency under load; determines maximum ensemble size within the 50ms P99 gateway budget; produces parallelisation recommendation'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, time. Import from feature_squeezer.py.
      Latency measured as mean over N_WARMUP + N_RUNS iterations.
      Sequential and parallel (thread pool) latency both measured.
    code: |
      # squeezer_latency_benchmark.py
      # Section 10.11: Squeezer Latency Benchmark for Track 7 Budget
      # 20260524 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import time
      from concurrent.futures import ThreadPoolExecutor
      from dataclasses import dataclass
      from typing import List, Callable
      from feature_squeezer import SqueezerConfig, build_default_squeezers


      N_WARMUP = 5
      N_RUNS = 20
      GATEWAY_BUDGET_MS = 50.0


      @dataclass
      class LatencyResult:
          name: str
          transform_ms: float
          model_ms: float
          total_ms: float


      def measure_latency(fn: Callable, n_warmup: int = N_WARMUP, n_runs: int = N_RUNS) -> float:
          '''Measure mean latency of fn() in milliseconds.'''
          for _ in range(n_warmup):
              fn()
          times = []
          for _ in range(n_runs):
              start = time.perf_counter()
              fn()
              times.append((time.perf_counter() - start) * 1000.0)
          return sum(times) / len(times)


      def benchmark_squeezers(
          model,
          x: torch.Tensor,
          squeezers: List[SqueezerConfig],
      ) -> List[LatencyResult]:
          results = []
          for cfg in squeezers:
              # Transform latency (no model)
              transform_ms = measure_latency(lambda: cfg.fn(x))

              # Model forward pass on squeezed input
              x_sq = cfg.fn(x)
              model_ms = measure_latency(lambda: model(x_sq))

              total_ms = transform_ms + model_ms
              results.append(LatencyResult(cfg.name, transform_ms, model_ms, total_ms))

          return results


      def primary_model_latency(model, x: torch.Tensor) -> float:
          return measure_latency(lambda: model(x))


      def sequential_ensemble_latency(results: List[LatencyResult]) -> float:
          return sum(r.total_ms for r in results)


      def parallel_ensemble_latency(
          model,
          x: torch.Tensor,
          squeezers: List[SqueezerConfig],
          primary_ms: float,
      ) -> float:
          '''Simulate parallel execution: latency = max(primary, max squeezer).'''
          with ThreadPoolExecutor(max_workers=len(squeezers) + 1) as pool:
              futures = [pool.submit(lambda cfg=cfg: model(cfg.fn(x))) for cfg in squeezers]
              start = time.perf_counter()
              for f in futures:
                  f.result()
              parallel_ms = (time.perf_counter() - start) * 1000.0
          # Total = max(primary_ms, parallel squeezer time)
          return max(primary_ms, parallel_ms)


      def print_benchmark_report(
          primary_ms: float,
          results: List[LatencyResult],
          budget_ms: float = GATEWAY_BUDGET_MS,
      ) -> None:
          print(f'Primary model inference: {primary_ms:.2f} ms')
          print(f'Gateway P99 budget:      {budget_ms:.1f} ms')
          print(f'Remaining for Track 7:   {budget_ms - primary_ms:.2f} ms')
          print()
          print(f'{"Squeezer":<22} {"transform_ms":<16} {"model_ms":<12} {"total_ms":<12} {"fits budget?"}')
          print('-' * 72)
          for r in results:
              fits = (primary_ms + r.total_ms) <= budget_ms
              print(f'{r.name:<22} {r.transform_ms:<16.2f} {r.model_ms:<12.2f} '
                    f'{r.total_ms:<12.2f} {"YES (parallel)" if fits else "NO sequential"}')

          seq_total = primary_ms + sequential_ensemble_latency(results)
          print(f'\nSequential ensemble total: {seq_total:.2f} ms '
                f'({"within" if seq_total <= budget_ms else "EXCEEDS"} {budget_ms:.0f}ms budget)')

          # Max squeezers within budget (parallel: cost = max squeezer, not sum)
          max_single = max(r.total_ms for r in results)
          parallel_total = primary_ms + max_single
          print(f'Parallel ensemble total:   {parallel_total:.2f} ms '
                f'({"within" if parallel_total <= budget_ms else "EXCEEDS"} {budget_ms:.0f}ms budget)')
          print()
          print('Recommendation: run all squeezers in parallel with primary inference.')
          print('Latency overhead = transform time only (~1-3ms); model passes overlap.')


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(1, 1, 28, 28)  # single sample (production: batch=1)

          squeezers = build_default_squeezers()
          primary_ms = primary_model_latency(model, x)
          results = benchmark_squeezers(model, x, squeezers)
          print_benchmark_report(primary_ms, results)


      if __name__ == '__main__':
          demo()

  deliverable_4:
    title: 'Text Canonicaliser'
    filename: 'text_canonicaliser.py'
    description: 'Text preprocessing analogues of image squeezers: Unicode NFC/NFKC normalisation, homoglyph replacement, zero-width character removal, and squeezer detection logic for text adversarial inputs'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention. No external dependencies.
      Import ToyTextClassifier, text_to_tensor from token_substitution_attack.py for demo.
      HOMOGLYPH_MAP imported from character_level_attack.py.
    code: |
      # text_canonicaliser.py
      # Section 10.11: Text Preprocessing Analogues for Adversarial Text Detection
      # 20260524 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import unicodedata
      from typing import Callable, List, Tuple


      # Zero-width codepoints to strip
      ZERO_WIDTH_CODEPOINTS = {0x200B, 0x200C, 0x200D, 0x2060, 0xFEFF, 0x00AD}

      # Minimal confusable map: common cross-script lookalikes -> canonical ASCII
      CONFUSABLE_MAP = {
          '\u0430': 'a',   # Cyrillic a -> Latin a
          '\u0435': 'e',   # Cyrillic ie -> Latin e
          '\u043e': 'o',   # Cyrillic o -> Latin o
          '\u0440': 'p',   # Cyrillic er -> Latin p
          '\u0441': 'c',   # Cyrillic es -> Latin c
          '\u0445': 'x',   # Cyrillic ha -> Latin x
          '\u0456': 'i',   # Cyrillic i -> Latin i
          '\u0455': 's',   # Cyrillic dze -> Latin s
          '\u0391': 'A',   # Greek alpha -> Latin A
          '\u0392': 'B',   # Greek beta -> Latin B
          '\u0395': 'E',   # Greek epsilon -> Latin E
          '\u0397': 'H',   # Greek eta -> Latin H
          '\u039a': 'K',   # Greek kappa -> Latin K
          '\u039c': 'M',   # Greek mu -> Latin M
          '\u039d': 'N',   # Greek nu -> Latin N
          '\u039f': 'O',   # Greek omicron -> Latin O
          '\u03a4': 'T',   # Greek tau -> Latin T
      }


      def remove_zero_width(text: str) -> str:
          '''Strip all zero-width and invisible Unicode codepoints.'''
          return ''.join(c for c in text if ord(c) not in ZERO_WIDTH_CODEPOINTS)


      def normalise_unicode(text: str, form: str = 'NFKC') -> str:
          '''Apply Unicode normalisation (NFC, NFD, NFKC, or NFKD).'''
          return unicodedata.normalize(form, text)


      def replace_confusables(text: str) -> str:
          '''Replace known cross-script confusable characters with their canonical ASCII equivalents.'''
          return ''.join(CONFUSABLE_MAP.get(c, c) for c in text)


      def full_canonicalise(text: str) -> str:
          '''
          Full text canonicalisation pipeline:
          1. Unicode NFKC normalisation
          2. Zero-width character removal
          3. Confusable character replacement
          '''
          text = normalise_unicode(text, form='NFKC')
          text = remove_zero_width(text)
          text = replace_confusables(text)
          return text


      def text_squeezer_score(
          model,
          text: str,
          canonicalise_fn: Callable[[str], str],
          max_len: int = 64,
      ) -> float:
          '''
          Text squeezer detection score: probability difference between
          original and canonicalised text classification.
          Returns L1 distance between prediction vectors.
          '''
          import torch
          import torch.nn.functional as F
          try:
              from token_substitution_attack import text_to_tensor
          except ImportError:
              return 0.0

          x_orig = text_to_tensor(text, max_len)
          x_canon = text_to_tensor(canonicalise_fn(text), max_len)
          with torch.no_grad():
              p_orig = F.softmax(model(x_orig), dim=1)
              p_canon = F.softmax(model(x_canon), dim=1)
          return (p_orig - p_canon).abs().sum().item()


      def detect_text_adversarial(
          model,
          text: str,
          threshold: float = 0.05,
          max_len: int = 64,
      ) -> Tuple[bool, float, str]:
          '''
          Combined text squeezer detection:
          1. Canonicalise text (squeezer transformation)
          2. Compare predictions before/after
          3. Flag if score > threshold

          Returns (detected, score, canonical_text).
          '''
          canonical = full_canonicalise(text)
          score = text_squeezer_score(model, text, full_canonicalise, max_len)
          return score > threshold, score, canonical


      def demo() -> None:
          try:
              import torch
              from token_substitution_attack import ToyTextClassifier
          except ImportError:
              print('Run from directory containing token_substitution_attack.py')
              return

          torch.manual_seed(42)
          model = ToyTextClassifier()
          model.eval()

          test_cases = [
              ('this product is terrible bad and awful', 'natural text'),
              ('this product is terrible bаd and аwful', 'homoglyph (Cyrillic a)'),
              ('this\u200b product\u200c is terrible bad', 'zero-width injection'),
              ('this product is terrible bad and awful', 'identical text (no attack)'),
          ]

          print('Text Canonicaliser: Squeezer Detection for Adversarial Text')
          print(f'{"Type":<35} {"score":<8} {"detected":<10} {"canonical differs?"}')
          print('-' * 65)
          for text, label in test_cases:
              detected, score, canonical = detect_text_adversarial(model, text, threshold=0.02)
              differs = (canonical != text)
              print(f'{label:<35} {score:<8.4f} {str(detected):<10} {differs}')

          print()
          print('Unicode canonicalisation collapses confusables:')
          sample = 'bаd аttаck'  # Cyrillic a characters
          print(f'  Original:    {repr(sample)}')
          print(f'  Canonical:   {repr(full_canonicalise(sample))}')


      if __name__ == '__main__':
          demo()

  deliverable_5:
    title: 'Adaptive Adversary Test Against Squeezer'
    filename: 'squeezer_adaptive_adversary_test.py'
    description: 'Tests squeezer effectiveness against C&W adversarial examples crafted with squeezer knowledge (adaptive attack) vs without squeezer knowledge (non-adaptive); quantifies the detection gap'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import from feature_squeezer.py, squeezer_ensemble.py, fgsm_attack.py.
      Adaptive C&W: pass squeezer(x_adv) through model in misclassification objective.
      Detection gap = non-adaptive detection rate - adaptive detection rate.
    code: |
      # squeezer_adaptive_adversary_test.py
      # Section 10.11: Adaptive Adversary Test Against Feature Squeezer
      # 20260524 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      import torch.nn.functional as F
      from feature_squeezer import (gaussian_squeeze, bit_depth_squeeze,
                                    squeezer_detection_score, SqueezerConfig)
      from squeezer_ensemble import ensemble_score, calibrate_threshold, build_default_squeezers


      def non_adaptive_cw_l2(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          kappa: float = 0.0,
          c: float = 1.0,
          n_steps: int = 100,
          lr: float = 1e-2,
      ) -> torch.Tensor:
          '''Standard C&W L2: optimises against model(x_adv) only. Squeezer unaware.'''
          batch = x.size(0)
          x = x.detach()
          x_cl = x.clamp(1e-6, 1.0 - 1e-6)
          w = torch.atanh(2.0 * x_cl - 1.0).detach().requires_grad_(True)
          opt = torch.optim.Adam([w], lr=lr)
          criterion = nn.CrossEntropyLoss(reduction='none')

          for _ in range(n_steps):
              opt.zero_grad()
              x_adv = 0.5 * (torch.tanh(w) + 1.0)
              l2_sq = (x_adv - x).pow(2).view(batch, -1).sum(1)
              logits = model(x_adv)
              z_correct = logits.gather(1, y.view(-1, 1)).squeeze(1)
              mask = torch.ones_like(logits, dtype=torch.bool)
              mask.scatter_(1, y.view(-1, 1), False)
              best_other = logits[mask].view(batch, -1).max(1).values
              f_val = torch.clamp(z_correct - best_other, min=-kappa)
              (l2_sq + c * f_val).sum().backward()
              opt.step()

          with torch.no_grad():
              x_adv = 0.5 * (torch.tanh(w) + 1.0)
          return x_adv.detach()


      def adaptive_cw_l2_vs_squeezer(
          model: nn.Module,
          squeeze_fn,
          x: torch.Tensor,
          y: torch.Tensor,
          kappa: float = 0.0,
          c: float = 1.0,
          n_steps: int = 100,
          lr: float = 5e-3,
      ) -> torch.Tensor:
          '''
          Adaptive C&W L2: optimises against model(squeezer(x_adv)).
          Adversarial example must misclassify AFTER squeezing.
          Squeezer-aware: squeezer is part of the forward pass.
          '''
          batch = x.size(0)
          x = x.detach()
          x_cl = x.clamp(1e-6, 1.0 - 1e-6)
          w = torch.atanh(2.0 * x_cl - 1.0).detach().requires_grad_(True)
          opt = torch.optim.Adam([w], lr=lr)

          for _ in range(n_steps):
              opt.zero_grad()
              x_adv = 0.5 * (torch.tanh(w) + 1.0)
              l2_sq = (x_adv - x).pow(2).view(batch, -1).sum(1)
              # KEY DIFFERENCE: evaluate misclassification on squeezed input
              x_squeezed = squeeze_fn(x_adv)
              logits = model(x_squeezed)
              z_correct = logits.gather(1, y.view(-1, 1)).squeeze(1)
              mask = torch.ones_like(logits, dtype=torch.bool)
              mask.scatter_(1, y.view(-1, 1), False)
              best_other = logits[mask].view(batch, -1).max(1).values
              f_val = torch.clamp(z_correct - best_other, min=-kappa)
              (l2_sq + c * f_val).sum().backward()
              opt.step()

          with torch.no_grad():
              x_adv = 0.5 * (torch.tanh(w) + 1.0)
          return x_adv.detach()


      def evaluate_detection_gap(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          squeezers,
          threshold: float,
      ) -> None:
          squeeze_fn = lambda inp: gaussian_squeeze(inp, sigma=1.0)

          # Non-adaptive adversarial examples (no squeezer knowledge)
          x_nonadaptive = non_adaptive_cw_l2(model, x, y, kappa=0.0, c=1.0, n_steps=80)

          # Adaptive adversarial examples (knows the squeezer)
          x_adaptive = adaptive_cw_l2_vs_squeezer(model, squeeze_fn, x, y, kappa=0.0, c=1.0, n_steps=80)

          # Detection rates
          scores_na = ensemble_score(model, x_nonadaptive, squeezers)
          scores_ad = ensemble_score(model, x_adaptive, squeezers)
          scores_nat = ensemble_score(model, x, squeezers)

          detect_na = (scores_na > threshold).float().mean().item()
          detect_ad = (scores_ad > threshold).float().mean().item()
          fpr = (scores_nat > threshold).float().mean().item()

          # Attack success rates
          with torch.no_grad():
              succ_na = (model(x_nonadaptive).argmax(1) != y).float().mean().item()
              succ_ad = (model(x_adaptive).argmax(1) != y).float().mean().item()

          print('Adaptive vs Non-Adaptive Squeezer Evaluation')
          print(f'  Natural FPR:              {fpr:.3f}')
          print(f'  Non-adaptive detection:   {detect_na:.3f}  (attack success: {succ_na:.3f})')
          print(f'  Adaptive detection:       {detect_ad:.3f}  (attack success on squeezed: {succ_ad:.3f})')
          print(f'  Detection gap:            {detect_na - detect_ad:.3f}')
          print()
          print('Interpretation:')
          print('  Detection gap > 0 means the adaptive adversary evades squeezing detection.')
          print('  This motivates combining squeezing with consistency checking (Section 10.12).')


      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(4, 1, 28, 28)
          y = torch.randint(0, 10, (4,))
          x_nat_large = torch.rand(32, 1, 28, 28)

          squeezers = build_default_squeezers()
          threshold = calibrate_threshold(model, x_nat_large, squeezers, target_fpr=0.05)
          print(f'Calibrated threshold (5% FPR): {threshold:.4f}')
          evaluate_detection_gap(model, x, y, squeezers, threshold)


      if __name__ == '__main__':
          demo()

common_mistakes:

  mistake_1:
    description: 'Calibrating the squeezer detection threshold only on easy-to-classify natural inputs, producing a threshold that yields excessive false positives in production'
    why_it_happens: |
      Calibration is done on a convenient sample of natural images that the model classifies
      with high confidence. Near the decision boundary, benign images produce high squeezer
      scores because mild smoothing is enough to flip their already-uncertain classification.
      This is not measured during calibration and the threshold is set too low.
    consequence: |
      In production, borderline natural inputs (images that the model classifies with 55-60%
      confidence) regularly exceed the calibrated threshold and are flagged as adversarial.
      Alert volume overwhelms analysts; the squeezer is either recalibrated to a higher
      threshold (losing detection sensitivity) or disabled entirely. A well-tuned squeezer
      with proper calibration is replaced by an untuned squeezer or no squeezer.
    correct_approach: |
      Calibrate the threshold on a dataset that includes hard natural examples near the
      decision boundary. If the production classifier sees ambiguous inputs (borderline
      images, unusual angles, low-quality captures), those must be represented in the
      calibration set. Accept that the threshold will be higher than what an "easy image"
      calibration would produce, and accept the resulting lower detection rate -- it is
      more honest than a falsely confident threshold.

  mistake_2:
    description: 'Running squeezers sequentially and exceeding the 50ms P99 gateway latency budget without realising it'
    why_it_happens: |
      The squeezer ensemble is implemented as a loop: for each squeezer, transform the input
      and run the model. Three squeezers means three model forward passes sequentially before
      the final detection decision is made. The latency impact is not measured until the
      system is deployed under production load.
    consequence: |
      Gateway P99 latency triples or quadruples depending on the number of squeezers.
      User-facing requests time out; SLO violations accumulate; operations disables Track 7
      to restore latency. The detection layer is removed not because it failed to detect
      adversarial examples but because it was not engineered for the latency budget.
    correct_approach: |
      Always run squeezer inferences in parallel with the primary model inference using a
      thread pool or async dispatch. Measure parallel latency with squeezer_latency_benchmark.py
      before production deployment. The Section 10.13 gateway includes explicit parallel
      dispatch for Track 7 squeezer passes. The latency overhead of correct parallel
      execution is the squeezer transform time (~1-3ms), not the model inference time.

  mistake_3:
    description: 'Treating squeezing as a complete defence against adversarial examples and removing the consistency checker and adversarial classifier from Track 7'
    why_it_happens: |
      Feature squeezing shows high detection rates (70-90%) against FGSM and PGD in
      benchmarks. Engineers conclude that squeezing alone is sufficient and skip the
      complexity of implementing consistency checking and the adversarial classifier.
    consequence: |
      Adaptive adversaries using C&W with squeezer knowledge (Section 10.5
      defence_evaluator_cw.py) reduce squeezer detection rates to 20-35%.
      High-kappa C&W adversarial examples (kappa=20) further reduce detection rates.
      Physical adversarial patches are not effectively caught by per-pixel squeezing.
      The system is deployed believing it is defended when it is not against motivated
      adversaries who know squeezing is the defence.
    correct_approach: |
      Squeezing is one of three Track 7 primitives. Section 10.12 consistency checking
      and adversarial classifier are required for complete Track 7 coverage. The three
      primitives cover complementary attack families and the ensemble is harder to jointly
      evade than any individual primitive. Never deploy Track 7 with only squeezing.

  mistake_4:
    description: 'Applying image feature squeezers to text inputs without implementing text-specific preprocessing analogues'
    why_it_happens: |
      Track 7 is configured generically: the squeezer ensemble runs on all inputs. For a
      multi-modal system that processes both images and text, the image squeezers (Gaussian
      blur, bit-depth reduction) are applied to text inputs, producing garbage transformations
      that have no meaningful relationship to text adversarial attacks.
    consequence: |
      The squeezer scores for text inputs are either always near zero (if the transformation
      is ignored by the text tokeniser) or always very high (if the byte-level corruption
      produces out-of-vocabulary tokens that change predictions randomly). In either case, the
      squeezer provides no detection signal for text adversarial attacks. Homoglyph and zero-
      width character attacks evade Track 7 detection entirely.
    correct_approach: |
      Deploy modality-specific squeezers: image squeezers (Gaussian, bit-depth, JPEG) for
      image inputs; text canonicalisers (Unicode normalisation, confusable replacement,
      zero-width removal) for text inputs. The text_canonicaliser.py deliverable implements
      the text-specific primitives. Section 10.13 routes inputs to the appropriate squeezer
      set based on input modality.

  mistake_5:
    description: 'Reporting squeezer detection rates against non-adaptive adversarial examples as the production robustness guarantee'
    why_it_happens: |
      Detection rate benchmarks are run against FGSM and PGD adversarial examples generated
      without knowledge of the squeezer. These show 70-90% detection rates. The production
      security report states "Track 7 detects 80% of adversarial examples" without specifying
      that this is against non-adaptive adversaries.
    consequence: |
      Stakeholders believe the system is 80% protected. A motivated adversary who reads
      the squeezer configuration (either from published documentation or adaptive probing)
      reduces detection to 20-35% using adaptive C&W. The gap between the reported
      80% and actual 20-35% is not disclosed in the security posture until an actual
      adversarial evasion incident is discovered.
    correct_approach: |
      Always report two detection rate figures: non-adaptive (FGSM/PGD adversaries who
      do not know the squeezer configuration) and adaptive (C&W with squeezer knowledge,
      using squeezer_adaptive_adversary_test.py). The honest production statement is:
      "Track 7 detects 80% of non-adaptive adversarial examples and 35% of adaptive
      adversarial examples against squeezing alone; the three-primitive ensemble reduces
      the adaptive gap." This sets accurate expectations and motivates the full ensemble.

section_summary:

  compact: |
    Feature squeezing detects adversarial examples through their sensitivity to input
    transformation: adversarial perturbations are precisely calibrated to the model and
    are fragile under mild transformation, while natural images are robust. Three canonical
    squeezers cover complementary attack families: Gaussian blur catches L-infinity attacks
    (FGSM, PGD), bit-depth reduction catches fine-grained perturbations, and JPEG compression
    catches structured frequency-domain perturbations. The squeezer detection score is the L1
    distance between prediction vectors on original vs squeezed input; a threshold calibrated
    on natural inputs including hard borderline examples separates adversarial from benign.
    A squeezer ensemble provides union coverage but does not defend against adaptive adversaries
    who optimise through the squeezer. Squeezers must run in parallel with primary model
    inference to stay within the 50ms P99 Track 7 budget; sequential execution typically
    violates the latency constraint. Text-specific canonicalisation primitives (Unicode
    normalisation, confusable replacement, zero-width removal) implement the text analogue.

  key_takeaways:
    - 'Detection signal: adversarial inputs change predictions under squeezing; natural inputs do not -- the asymmetry is the detection primitive'
    - 'Three squeezers: Gaussian blur (L-inf attacks), bit-depth reduction (fine-grained), JPEG (structured frequency) -- each covers different attack families'
    - 'Threshold calibration must include hard natural examples near the decision boundary; easy-image calibration over-fits and fails in production'
    - 'Parallel squeezer execution is mandatory: sequential execution triples/quadruples latency and violates the 50ms P99 gateway budget'
    - 'Single squeezer is insufficient: adaptive C&W reduces detection to 20-35%; the three-primitive Track 7 ensemble (squeezing + consistency + classifier) is required'
    - 'Text analogues: Unicode NFKC normalisation + confusable replacement + zero-width removal; route text inputs to text canonicalisers, not image squeezers'

preview_section_10_12:
  title: 'Section 10.12: Detection Primitives -- Consistency Checking and Adversarial Classifier'
  summary: |
    Section 10.12 completes the Track 7 detection primitive library with two post-inference
    primitives. The consistency checker submits N randomly perturbed variants of the input
    and flags inputs whose classification is unstable across variants -- adversarial examples
    near the decision boundary are fragile and flip classification under small random
    perturbation, while natural inputs are stable. For text, the consistency checker uses
    back-translation and semantic paraphrase rather than random pixel noise. The adversarial
    detector classifier is a binary classifier trained to distinguish adversarial from natural
    examples using features extracted from the input (gradient magnitude distribution, embedding
    distance to training manifold, spectral properties). It generalises across attack families
    seen in training and degrades on novel attack families. Section 10.12 builds both primitives
    and combines them with the Section 10.11 squeezer ensemble into the five-component detection
    ensemble that Section 10.13 wires into the production Track 7 gateway.

