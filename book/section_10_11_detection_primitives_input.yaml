section_overview:
  one_line_summary: 'Feature squeezing detects adversarial examples through their sensitivity to input transformation: the model prediction changes significantly when a squeezer is applied to adversarial inputs but remains stable for natural inputs.'
  why_this_section_exists: |
    Sections 10.3-10.9 built the attack catalogue. Section 10.10 grounded it in documented
    production incidents. Sections 10.11-10.12 build the Track 7 detection primitive library that
    the Section 10.13 gateway uses to defend against those attacks. Section 10.11 covers the
    input-side primitives: transformations applied to the input before or alongside model inference
    that reveal adversarial perturbations through prediction instability. Feature squeezing (Xu
    et al. 2018) is the foundational input-side primitive: three canonical squeezers (spatial
    smoothing, bit-depth reduction, JPEG compression), combined in an ensemble with disagreement
    as the detection signal. The latency budget calculation that determines how many squeezers
    fit within the 50ms P99 gateway budget is the critical engineering decision Section 10.13
    inherits from this section.
  position_in_chapter: |
    Section 10.11 opens the Track 7 detection primitive library. It covers the pre-inference
    stage: transformations that must complete before the main model output is used. Section 10.12
    covers the post-inference stage: consistency checking and adversarial classifier that operate
    on the model''s own output. Section 10.13 wires both stages into the production gateway.

learning_objectives:

  knowledge:
    - 'Explain the detection-by-transformation principle: why adversarial perturbations are sensitive to input transformation while natural images are not'
    - 'Describe the three canonical squeezers from Xu et al. 2018: spatial smoothing (Gaussian, median), bit-depth reduction, and JPEG compression'
    - 'Explain the squeezer detection logic: compare L1 or L-infinity distance between prediction vectors on original vs squeezed input; flag when distance exceeds threshold'
    - 'Describe why a squeezer ensemble covers more adversarial attack families than any single squeezer'
    - 'Explain why adaptive adversaries defeat single-squeezer defences and how ensemble diversity increases the adaptive attack cost'
    - 'State the latency implications: each squeezer requires one additional model forward pass; parallelisation within the 50ms P99 budget requires async dispatch'

  skills:
    - 'Implement Gaussian blur, bit-depth reduction, and JPEG-approximate squeezers in PyTorch'
    - 'Implement the squeezer detection score (L1 distance between original and squeezed prediction vectors) with configurable threshold'
    - 'Build a multi-squeezer ensemble with maximum-disagreement scoring and threshold calibration'
    - 'Benchmark per-squeezer latency and determine the maximum ensemble size within the Track 7 latency budget'
    - 'Implement text preprocessing analogues: Unicode canonicalisation, homoglyph normalisation, zero-width character removal'

  security_mindset:
    - 'Internalise that squeezing is a detection primitive, not a defence: the squeezer does not make the model robust, it signals that the input may be adversarial'
    - 'Recognise that no single squeezer covers the full adversarial attack space -- calibrate the detection threshold against the specific attack families the deployment faces'
    - 'Appreciate that the adaptive adversary problem means squeezing must be combined with consistency checking and adversarial classification (Section 10.12) for meaningful production coverage'
    - 'Treat the latency budget as a hard constraint: adding squeezers that push gateway latency above 50ms P99 is not acceptable regardless of detection improvement'

prerequisites:
