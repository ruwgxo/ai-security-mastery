    overview: |
      Synthesis of all 12 content sections into a unified extraction defence
      architecture. Covers the complete extraction taxonomy (functionality,
      fidelity, decision-boundary, prompt extraction), the two privacy attacks
      that share the inference-time surface (membership inference, model
      inversion), API economic abuse, the five detection primitives (query
      pattern analysis, OOD detection, output entropy, watermarking signals,
      output perturbation), and the two-part production defence (input-side
      query monitoring + rate limiting, output-side watermarking + perturbation)
      that operationalises Chapter 5 Section 5.4 OWASP LLM10 into deployable
      controls. Previews Chapter 10 (Adversarial Machine Learning) as the next
      inference-time attack class.

    structure:
      part_1: 'Sections 1-2 Review: threat model transition and extraction taxonomy'
      part_2: 'Sections 3-5 Review: extraction attacks (query-based, distillation, prompt extraction)'
      part_3: 'Sections 6-7 Review: privacy attacks sharing the extraction surface (membership inference, model inversion)'
      part_4: 'Section 8 Review: API economic abuse as adjacent threat class'
      part_5: 'Section 9 Review: real-world extraction incident with root cause analysis'
      part_6: 'Section 10 Review: detection primitives across query patterns and outputs'
      part_7: 'Sections 11-12 Review: production capstones (input-side query monitor + rate limiter, output-side watermarker + perturbator)'
