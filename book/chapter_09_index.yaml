chapter_overview:
  number: 9
  title: 'Model Extraction and Stealing'
  part: 'Part 2: AI Security Landscape'
  position: 'Chapter 9 of 6 in Part 2'

  purpose: |
    Chapter 8 closed OWASP LLM03 at training time. Chapter 9 returns to inference
    time with a different threat actor: an API consumer with query budget rather
    than a data pipeline contributor with training access. The attack surface is
    the deployed model's inference API; the goal is reconstructing what the model
    knows or how it behaves, without the cost of training it from scratch.

    Model extraction has four principal forms. Functionality extraction trains a
    surrogate model whose behaviour matches the victim across the input
    distribution -- the adversary gets a working clone. Fidelity extraction
    targets exact decision-boundary replication for specific inputs. Decision-
    boundary extraction reconstructs the geometry of the victim's classification
    surface for adversarial example generation or model interpretation. Prompt
    extraction steals the system prompt or hidden instructions via inference-
    time queries -- a runtime variant of the Chapter 6 system prompt extraction
    technique, but aimed at high-volume reconstruction rather than single-prompt
    leakage.

    Two related privacy attacks share the same inference-time surface and live in
    Chapter 9 alongside extraction. Membership inference determines whether a
    specific data point was in the training set -- weaponising overfitting as the
    privacy leakage Chapter 1 previewed. Model inversion reconstructs training
    data from query outputs -- the most consequential privacy attack against
    deployed models. Both share defensive primitives with extraction (rate
    limiting, query pattern monitoring, output perturbation), which is why the
    master index keeps them in this chapter rather than splitting privacy into a
    dedicated chapter.

    API economic abuse is the operational variant: cost amplification, denial-of-
    wallet, and rate-limit exhaustion that does not steal the model but degrades
    its operational viability. Defensive primitives for economic abuse overlap
    substantially with extraction primitives, which is why they belong together.

    The detection architecture returns to the Chapter 6 and Chapter 7 gateway
    classifier pattern -- real-time per-request analysis with parallelised
    detection tracks -- rather than the Chapter 8 offline auditing pipeline.
    Chapter 9 builds the second-largest gateway integration in the book: query
    pattern monitoring with rate limiting on the input side (extending the
    Chapter 6/7 ensemble) plus output watermarking with calibrated perturbation
    on the output side (a new defensive surface the prior chapters did not need).

    The chapter closes OWASP LLM10 (Model Theft) and brings cumulative coverage
    to LLM01 + LLM03 + LLM10 -- three of the ten OWASP categories with full
    attack catalogue and production detection across two attack surfaces
    (training-time and inference-time) and two defensive architectures (offline
    auditing pipeline and real-time gateway).

