      cross_chapter: 'How Ch6/Ch7 inference-time injection/jailbreak detection, Ch8 training-time auditing, and Ch9 inference-time extraction defence compose into LLM01 + LLM03 + LLM10 coverage'
      mistakes: 'Common extraction defence mistakes and how to avoid them'
      reference: 'Quick lookup: extraction goal decision tree, detection primitive selection guide, defence stacking patterns'
      preview: 'Chapter 10: Adversarial Machine Learning -- inference-time evasion attacks'

    deliverables:
      - 'Extraction defence architecture diagram: input-side and output-side controls combined'
      - 'Chapter 9 extraction taxonomy reference card: 4 extraction goals + 2 privacy attacks + economic abuse with detection primitive mapping'
      - 'Combined OWASP LLM01 + LLM03 + LLM10 detection coverage map'
      - 'Chapter 9 knowledge assessment quiz (20 questions)'
      - 'Inference-time security checklist for production LLM API deployments'
      - 'Cumulative cross-chapter integration diagram: Ch6 + Ch7 (LLM01) + Ch8 (LLM03) + Ch9 (LLM10) defensive architecture'

    preview_chapter_10: |
      Chapter 10: Adversarial Machine Learning
      Chapter 9 covered attacks that steal what the model knows. Chapter 10 covers
      attacks that make the model produce attacker-chosen outputs at inference
      time without changing the model: adversarial examples (FGSM, PGD, C&W),
      evasion attacks, transferability across models, physical adversarial
      examples, and adversarial attacks on LLMs. The threat actor remains an
      API consumer; the goal shifts from extraction to evasion. The detection
      architecture extends the Chapter 6/7/9 gateway pattern with adversarial
      example detection as a parallel track. Chapter 10 closes OWASP LLM
      coverage for the inference-time evasion attack class and completes Part 2
      of the book.

