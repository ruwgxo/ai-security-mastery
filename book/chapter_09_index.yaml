  security_themes:
    extraction_economics_dominate: 'Every extraction attack has a query budget. Defensive design optimises against budget rather than against existence -- a defence that triples the queries needed to extract is more valuable than one that blocks 50% of queries.'
    overfitting_is_the_privacy_leak: 'Membership inference and model inversion both exploit the same property: a model that memorises training data leaks training data through its outputs. Chapter 1 previewed this; Chapter 9 builds the attack and the defence.'
    output_side_defence_is_new: 'Chapter 6, 7, 8 defences operate on inputs (classifier on user input, classifier on retrieved content, auditor on training data). Chapter 9 introduces output-side defence: watermarking and perturbation operate on what the model returns, not what the user sends.'
    rate_limiting_is_a_security_control: 'Rate limits are typically operational controls. Against extraction, they are security controls -- and the policy must be extraction-aware, not just throughput-based.'
    privacy_attacks_share_extraction_surface: 'Membership inference, model inversion, and functional extraction all exploit the inference API. Defending one defends all three; splitting them across chapters would create artificial duplication.'
    chapter_9_extends_gateway_architecture: 'The Chapter 6 + Chapter 7 gateway pattern extends naturally. Chapter 9 adds query monitoring as a parallel track and adds output-side defence as a post-inference stage. Chapters 11-17 will scale this two-stage architecture to remaining OWASP LLM techniques.'

