# ============================================================================
# SECTION SUMMARY
# ============================================================================

section_summary:
  one_paragraph: |
    Section 5.3 establishes fluency with the OWASP LLM Top 10 as the industry-
    standard risk classification framework for LLM security. It covers the
    framework's origin (v1.0 May 2023 → v1.1 October 2023 → living document),
    its ranking methodology (prevalence × exploitability × impact with important
    caveats about the limited evidence base), and all ten risks (LLM01 through
    LLM10) with one-line descriptions, attack surface layer mappings, impact
    categories, MITRE ATLAS cross-references, and chapter coverage pointers.
    The section then maps OWASP LLM Top 10 to the traditional OWASP Web Top 10,
    identifying four direct analogues (LLM01 ↔ A03, LLM02 ↔ XSS, LLM04 ↔ DoS,
    LLM05 ↔ A06) and four genuinely novel risks with no web equivalent (LLM07,
    LLM08, LLM09, LLM10). It explains how to use OWASP as a risk communication
    tool for CISO briefings, vendor assessments, and risk register entries rather
    than as a binary checklist, documents OWASP's integration into EU AI Act,
    NIST AI RMF, SOC 2, and HIPAA, catalogues six significant limitations of the
    framework, and establishes the three-framework integration pipeline: OWASP
    (risk category) → MITRE ATLAS (attacker techniques) → NIST AI RMF (risk
    management process) → detection engineering (Part 3).

  next_section: |
    Section 5.4 — OWASP LLM01-LLM03: Prompt Injection, Insecure Output Handling,
    Training Data Poisoning
    With the OWASP framework established, Section 5.4 goes deep on the first three
    risks: LLM01 (the most exploited LLM vulnerability in production), LLM02 (the
    downstream consequence that multiplies LLM01's impact), and LLM03 (the most
    persistent and hardest-to-remediate risk in the stack). Full attack scenarios,
    detection indicators, mitigation controls, and lab exercises for each.

