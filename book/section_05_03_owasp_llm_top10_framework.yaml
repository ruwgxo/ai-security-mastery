section_content:

  # --------------------------------------------------------------------------
  # 5.3.1 — What OWASP Is and Why It Matters for AI Security
  # --------------------------------------------------------------------------

  subsection_01:
    number: "5.3.1"
    title: "What OWASP Is and Why It Matters for AI Security"

    content: |
      The Open Worldwide Application Security Project (OWASP) is a non-profit
      foundation whose mission is to improve software security through open-source
      projects, community-driven research, and freely available educational
      resources. Security professionals know OWASP primarily through its flagship
      output: the OWASP Top 10 Web Application Security Risks, first published in
      2003 and updated periodically. That document became the de facto standard
      for web application risk communication — the shorthand that security teams,
      developers, and compliance officers worldwide use to discuss common threats.

      When LLMs began entering enterprise deployments at scale in 2023, the
      security community needed an equivalent reference. The OWASP LLM Top 10
      project was initiated in response: a community-driven effort to catalogue,
      rank, and standardise the most significant security risks specific to LLM
      applications.

      why_owasp_matters_for_ai_security:

        lingua_franca_effect: |
          Security frameworks succeed when they create shared vocabulary. When a
          security engineer says "we have an LLM01 finding," a CISO, a compliance
          officer, a developer, and a procurement manager should all understand
          what that means without requiring a technical briefing. OWASP creates
          this shared vocabulary. Within two years of publication, LLM01 through
          LLM10 had become the standard reference in security assessments, vendor
          RFPs, compliance questionnaires, and regulatory guidance documents.

        risk_register_anchor: |
          Enterprise risk management runs through risk registers: structured
          catalogues of identified risks with likelihood, impact, owner, and
          control documentation. Adding "OWASP LLM Top 10" as a risk category
          is immediately legible to GRC teams. Security engineers who frame their
          findings in OWASP terms have an easier path to risk register entries,
          remediation budget, and executive awareness than those who use
          technically precise but organisationally unfamiliar terminology.

        compliance_integration: |
          Regulatory frameworks reference OWASP. The EU AI Act's technical annex
          on cybersecurity requirements for high-risk AI systems aligns with OWASP
          LLM Top 10 categories. The NIST AI Risk Management Framework playbook
          cites OWASP LLM Top 10 as a reference for MEASURE function activities.
          SOC 2 assessors increasingly ask about OWASP LLM Top 10 coverage for
          clients deploying LLM-powered applications. Fluency with OWASP is
          fluency with the compliance landscape.

        vendor_assessment: |
          When your organisation evaluates a vendor's LLM product, the procurement
          questionnaire will include OWASP LLM Top 10 coverage questions. When
          you assess a third-party LLM integration, OWASP provides the assessment
          structure. When you write a bug bounty programme for your LLM deployment,
          OWASP categories define the scope. OWASP is the assessment framework.

      what_owasp_is_not: |
        OWASP LLM Top 10 is a risk classification and communication framework,
        not a technical specification or a control catalogue. It tells you what
        the ten most significant risk categories are and why they matter. It does
        not tell you exactly how to detect LLM01 in your specific deployment,
        or which detection rule to write, or how to tune your classifier. That
        is the role of MITRE ATLAS (attack techniques), NIST AI RMF (risk
        management process), and this book's Part 3 (detection engineering).

        Think of OWASP LLM Top 10 as the map legend — it defines the symbols.
        The detailed terrain is filled in by the other frameworks and by your
        own detection engineering work.

  # --------------------------------------------------------------------------
  # 5.3.2 — Origin and Versioning History
  # --------------------------------------------------------------------------

  subsection_02:
    number: "5.3.2"
    title: "Origin and Versioning History: From v1.0 to the Living Document"

    content: |
      version_history:

        v1_0_2023_05:
          released: "May 2023"
          context: |
            ChatGPT had launched publicly in November 2022 and reached 100 million
            users in two months — the fastest consumer product adoption in history.
            Enterprises began deploying LLM applications at pace. The security
            community, watching prompt injection attacks, data extraction incidents,
            and jailbreaks go largely undocumented, organised an OWASP working
            group in early 2023.
          methodology: |
            The v1.0 working group used a modified Delphi method: security researchers,
            practitioners, and red teamers contributed candidate risk items, which
            were ranked by a combination of expert vote, observed exploitation
            frequency, and potential impact. The v1.0 list was produced in
            approximately 90 days from working group formation to publication.
          notable_characteristics: |
            v1.0 was intentionally broad — capturing the landscape rather than
            optimising for precision. Several categories overlapped (prompt injection
            and insecure plugin design share a root cause). The speed of production
            meant some items lacked the depth of evidence behind the traditional
            OWASP Web Top 10 (which has decades of CVE data behind it).

        v1_1_2023_10:
          released: "October 2023"
          changes_from_v1_0: |
            - Refined descriptions and attack scenario examples for all ten risks
            - Added clearer distinction between LLM01 (Prompt Injection) and LLM07
              (Insecure Plugin Design) — v1.0 language had created confusion about scope
            - Expanded prevention guidance with concrete technical controls
            - Added MITRE ATLAS cross-references for the first time
            - Clarified LLM09 (Overreliance) to distinguish from hallucination as a
              pure accuracy problem vs hallucination as an exploitable security issue
          significance: |
            v1.1 is the version that achieved broad enterprise adoption. Most current
            compliance questionnaires, security assessments, and regulatory references
            cite v1.1. Unless you are reading primary research published before October
            2023, OWASP LLM Top 10 v1.1 is the operative version.

        ongoing_evolution:
          current_status: |
            The OWASP LLM Top 10 is maintained as a living document. The working group
            continues to track new attack patterns and update category definitions.
            Proposed additions that did not make v1.1 but are under active discussion
            include: LLM agent-specific risks (autonomous action with irreversible
            consequences), multimodal injection (adversarial images and audio), and
            more granular treatment of supply chain risks as the HuggingFace ecosystem
            has matured.
          how_to_track: |
            The authoritative source is https://owasp.org/www-project-top-10-for-large-
            language-model-applications/. The GitHub repository (owasp/www-project-top-10-
            for-large-language-model-applications) contains in-progress revisions and
            community discussion. Security engineers building long-term AI security
            programmes should subscribe to repository notifications.

      comparison_to_web_top_10_maturity: |
        The traditional OWASP Web Top 10 has the benefit of twenty-plus years of
        CVE data, penetration testing results, and bug bounty reports. Its rankings
        reflect the statistical frequency of vulnerabilities observed across millions
        of tested applications. The OWASP LLM Top 10 was produced in a field that
        is two years old at most. Its rankings reflect expert consensus about
        prevalence and impact — well-informed, but not statistically grounded in
        the same way.

        This means two things for practitioners:
          1. The OWASP LLM Top 10 rankings will shift more than the Web Top 10 as
             the field matures and as more incident data accumulates.
          2. The absence of a category from the Top 10 is less meaningful than in
             the Web Top 10 — the list is not yet exhaustive of all significant risks.

  # --------------------------------------------------------------------------
  # 5.3.3 — Ranking Methodology: How OWASP Scores LLM Risks
  # --------------------------------------------------------------------------

  subsection_03:
    number: "5.3.3"
    title: "Ranking Methodology: How OWASP Scores LLM Risks"

    content: |
      Understanding how OWASP ranks risks is essential for two reasons: it lets
      you interpret the list correctly (high rank ≠ highest theoretical severity),
      and it lets you challenge or adapt the rankings intelligently for your
      specific deployment context.

      three_ranking_dimensions:

        prevalence:
          definition: "How commonly is this risk observed in real-world LLM deployments?"
          data_sources: |
            - Bug bounty reports against LLM-powered products
            - Security researcher disclosures and CVE-adjacent findings
            - Red team engagement findings shared by working group members
            - Publicly documented incidents (Bing Chat, GPT-4, Claude, Bard)
          caveat: |
            Prevalence data for LLM risks is sparse compared to web application
            risks. Many LLM security incidents are not publicly disclosed (vendor
            NDA, reputational concern, absence of CVE equivalent for AI flaws).
            The prevalence ranking reflects observed-and-reported incidents, which
            likely undercount actual frequency.

        exploitability:
          definition: "How easily can an adversary exploit this risk with available tools?"
          scoring_factors: |
            - Access required (API access only = high exploitability;
              training infrastructure access = low exploitability)
            - Technical skill required
            - Availability of public tooling and documented techniques
            - Time to first exploit (days vs months)
          example: |
            LLM01 (Prompt Injection) ranks high on exploitability: any user with
            API access can attempt prompt injection with zero specialised tooling.
            LLM03 (Training Data Poisoning) ranks low on exploitability: the
            adversary needs access to training infrastructure or a poisoning
            pathway into the data pipeline.

        impact:
          definition: "What is the potential damage if this risk is successfully exploited?"
          scoring_factors: |
            - Confidentiality: sensitive data exposure
            - Integrity: model behaviour corruption, misinformation generation
            - Availability: service disruption
            - Financial: cost attack, IP theft
            - Legal/regulatory: compliance violation, liability
            - Reputational: brand damage from harmful model outputs
          example: |
            LLM10 (Model Theft) scores high on financial and IP impact — a
            proprietary model represents millions in training compute — but lower
            on immediate confidentiality and availability impact. LLM06 (Sensitive
            Information Disclosure) scores high on regulatory and confidentiality
            impact, potentially triggering GDPR breach notification requirements.

      how_rankings_should_be_interpreted:

        rank_reflects_the_average_deployment_not_yours: |
          OWASP rankings reflect the average enterprise LLM deployment. Your
          deployment may have a fundamentally different risk profile. An LLM
          deployed in an air-gapped environment with no external API access has
          a very different LLM04 (Model DoS) risk than a public-facing ChatGPT
          competitor. An LLM with no fine-tuning on proprietary data has a very
          different LLM06 (Sensitive Information Disclosure) profile than one
          fine-tuned on customer records.

          The correct use of OWASP is as a starting checklist — not as a
          pre-prioritised risk register. You must apply your own likelihood
          assessment based on your deployment context.

        high_rank_does_not_mean_highest_impact_for_you: |
          LLM01 (Prompt Injection) ranks first because it is nearly universally
          applicable, highly exploitable, and easy to demonstrate. But for a
          healthcare organisation that fine-tuned an LLM on patient data,
          LLM06 (Sensitive Information Disclosure) may represent a higher business
          impact even though it ranks sixth — because the regulatory consequences
          of a HIPAA violation from training data extraction are existential, while
          a successful prompt injection may produce embarrassing but non-critical
          output.

        use_as_a_communication_shorthand_not_a_technical_specification: |
          When you tell a CISO "we have an LLM01 exposure," you have communicated
          the risk category in a term they can look up, connect to regulatory
          frameworks, and include in risk register reporting. You have not
          communicated the detection approach, the technical severity, or the
          remediation cost. OWASP starts the conversation; your technical analysis
          finishes it.

  # --------------------------------------------------------------------------
  # 5.3.4 — LLM01 Through LLM10: The Full List at a Glance
  # --------------------------------------------------------------------------

  subsection_04:
    number: "5.3.4"
    title: "LLM01 Through LLM10: The Full List at a Glance"

    content: |
      This subsection provides a concise reference for all ten risks with
      their attack surface layer mapping from Section 5.2, their primary
      impact category, and their chapter coverage in this book. Sections 5.4,
      5.5, and 5.6 provide the full technical treatment of each risk.

      llm01_prompt_injection:
        rank: 1
        name: "Prompt Injection"
        one_line: "Adversary manipulates LLM behaviour through crafted inputs that override intended instructions"
        variants: "Direct (user input overrides system prompt) / Indirect (injected via retrieved documents, tool outputs, external data)"
        attack_surface_layers: [2, 7]
        primary_impact: "Integrity — model behaviour hijacked for adversary's intent"
        secondary_impact: "Confidentiality — system prompt extraction, data leakage"
        exploitability: "Very High — API access only, no specialised tooling"
        prevalence: "Very High — documented in almost every production LLM deployment tested"
        chapter_deep_dive: "Chapter 6 — Prompt Injection Attacks"
        section_deep_dive: "Section 5.4"

      llm02_insecure_output_handling:
        rank: 2
        name: "Insecure Output Handling"
        one_line: "Downstream components consume LLM output without validation, inheriting injection risks"
        variants: "XSS via rendered LLM HTML / Command injection via executed LLM shell output / SSRF via LLM-generated URLs"
        attack_surface_layers: [8]
        primary_impact: "Integrity — downstream system compromise through LLM as proxy"
        secondary_impact: "Confidentiality — data exfiltration through compromised downstream system"
        exploitability: "High — exploits downstream application bugs, not the LLM itself"
        prevalence: "High — most LLM applications render output without sanitisation"
        chapter_deep_dive: "Chapter 15 — Building Production Detectors (output-side detection)"
        section_deep_dive: "Section 5.4"

      llm03_training_data_poisoning:
        rank: 3
        name: "Training Data Poisoning"
        one_line: "Adversary contaminates training data to implant backdoors or alter model behaviour at inference time"
        variants: "Label flipping / Backdoor trigger insertion / Preference data manipulation"
        attack_surface_layers: [1, 3]
        primary_impact: "Integrity — model learns adversary-specified behaviour"
        secondary_impact: "Availability — degraded model performance on targeted inputs"
        exploitability: "Low — requires access to training pipeline or data sources"
        prevalence: "Medium — hard to measure; many incidents go undetected"
        chapter_deep_dive: "Chapter 8 — Training Data Poisoning"
        section_deep_dive: "Section 5.4"

      llm04_model_denial_of_service:
        rank: 4
        name: "Model Denial of Service"
        one_line: "Adversary crafts inputs that exhaust LLM compute or memory, degrading availability"
        variants: "Context flooding / Recursive prompt loops / Sponge examples / Cost attacks via token budget exhaustion"
        attack_surface_layers: [5, 6]
        primary_impact: "Availability — service degradation or outage"
        secondary_impact: "Financial — token cost attack against billing budget"
        exploitability: "High — API access only, low sophistication required"
        prevalence: "Medium — more common than reported due to billing rather than security framing"
        chapter_deep_dive: "Chapter 14 — Production Deployment (rate limiting and resource controls)"
        section_deep_dive: "Section 5.5"

      llm05_supply_chain_vulnerabilities:
        rank: 5
        name: "Supply Chain Vulnerabilities"
        one_line: "Adversary compromises model artefacts, training data, or ML dependencies before deployment"
        variants: "Malicious HuggingFace models / Pickle deserialisation RCE / Poisoned LoRA adapters / Compromised ML framework dependencies"
        attack_surface_layers: [1, 4]
        primary_impact: "Integrity — backdoored model deployed as trusted artefact"
        secondary_impact: "Confidentiality — RCE on model-loading infrastructure"
        exploitability: "Medium — requires positioning in supply chain or repository"
        prevalence: "Medium — growing rapidly as model hub ecosystems expand"
        chapter_deep_dive: "Section 5.9 — AI Supply Chain Security"
        section_deep_dive: "Section 5.5"

      llm06_sensitive_information_disclosure:
        rank: 6
        name: "Sensitive Information Disclosure"
        one_line: "LLM reveals confidential data from training set, context window, or fine-tuning corpus"
        variants: "Verbatim training data recall / System prompt extraction / RAG-retrieved document leakage / PII in model outputs"
        attack_surface_layers: [5, 8]
        primary_impact: "Confidentiality — private data exposed to unauthorised parties"
        secondary_impact: "Legal/Regulatory — GDPR, HIPAA, CCPA breach obligations triggered"
        exploitability: "Medium — requires crafted prompts; no infrastructure access needed"
        prevalence: "High — documented in GPT-4, Copilot, Claude, and most fine-tuned deployments"
        chapter_deep_dive: "Section 5.10-5.11 — Privacy Attacks"
        section_deep_dive: "Section 5.5"

      llm07_insecure_plugin_design:
        rank: 7
        name: "Insecure Plugin Design"
        one_line: "LLM plugins allow adversary to reach system resources through the LLM as a confused deputy"
        variants: "Over-permissioned plugins / Unsanitised plugin parameters / Plugin SSRF / Indirect injection via plugin output"
        attack_surface_layers: [7]
        primary_impact: "Integrity — system resources manipulated via LLM proxy"
        secondary_impact: "Confidentiality — data exfiltration through over-permissioned plugin"
        exploitability: "High — via prompt injection if plugin exists; no direct access needed"
        prevalence: "High — most agentic deployments have at least one over-permissioned plugin"
        chapter_deep_dive: "Chapter 14 — Production Deployment (plugin security architecture)"
        section_deep_dive: "Section 5.6"

      llm08_excessive_agency:
        rank: 8
        name: "Excessive Agency"
        one_line: "LLM granted too much autonomy or permissions, causing harm through unconstrained action"
        variants: "Irreversible actions without confirmation / Over-permissioned agent identity / Unlogged autonomous decisions"
        attack_surface_layers: [7]
        primary_impact: "Integrity — unintended or adversary-directed real-world actions"
        secondary_impact: "Availability — irreversible state changes (data deletion, email sent)"
        exploitability: "Medium-High — requires agentic deployment with action capabilities"
        prevalence: "High — default in most agentic frameworks is maximum permissions"
        chapter_deep_dive: "Chapter 14 — Production Deployment (agency control architecture)"
        section_deep_dive: "Section 5.6"

      llm09_overreliance:
        rank: 9
        name: "Overreliance"
        one_line: "System or human decisions based on LLM output without appropriate validation, creating exploitable trust"
        variants: "Hallucination exploitation / Confident misinformation / Authority-spoof outputs / Automated pipeline propagation of wrong information"
        attack_surface_layers: [8]
        primary_impact: "Integrity — incorrect decisions based on adversarially confident LLM outputs"
        secondary_impact: "Legal — liability from autonomous decisions based on LLM errors"
        exploitability: "Medium — requires understanding of LLM tendency to confabulate with confidence"
        prevalence: "Very High — every deployment that uses LLM output without validation is exposed"
        chapter_deep_dive: "Chapter 17 — Monitoring and Tuning (factual grounding and output validation)"
        section_deep_dive: "Section 5.6"

      llm10_model_theft:
        rank: 10
        name: "Model Theft"
        one_line: "Adversary extracts a functional copy of a proprietary model through API queries or direct weight exfiltration"
        variants: "Query-based model extraction / Distillation attack / Direct weight exfiltration / Architecture inference"
        attack_surface_layers: [4, 5, 6]
        primary_impact: "Financial — proprietary model IP stolen, competitive advantage lost"
        secondary_impact: "Security — extracted model enables offline adversarial attack development"
        exploitability: "Medium — API extraction requires skill and query budget; weight exfiltration requires access"
        prevalence: "Medium — growing as proprietary fine-tuned models become commercially valuable"
        chapter_deep_dive: "Chapter 9 — Model Extraction and Stealing"
        section_deep_dive: "Section 5.6"

  # --------------------------------------------------------------------------
  # 5.3.5 — Mapping OWASP LLM Top 10 to the Traditional Web Top 10
  # --------------------------------------------------------------------------

  subsection_05:
    number: "5.3.5"
    title: "Mapping OWASP LLM Top 10 to the Traditional Web Top 10"

    content: |
      Security engineers familiar with the OWASP Web Application Top 10 will
      recognise structural similarities in the LLM Top 10. Some LLM risks are
      direct analogues of web risks applied to a new attack surface. Others are
      genuinely novel — they have no web equivalent because they exploit properties
      unique to probabilistic, data-trained systems.

      Understanding this mapping helps in two ways: it lets you leverage existing
      mental models where they apply, and it flags where you must genuinely start
      from scratch.

      direct_analogues:

        llm01_prompt_injection_vs_a03_injection:
          web_risk: "A03:2021 — Injection (SQL, OS, LDAP injection)"
          llm_risk: "LLM01 — Prompt Injection"
          what_is_the_same: |
            The fundamental mechanism is identical: untrusted data is interpreted
            as instruction. In SQL injection, user input is concatenated into a
            SQL query and executed as SQL. In prompt injection, user input is
            concatenated into a prompt and executed as model instruction. In both
            cases, the system cannot distinguish data from instruction because they
            are represented in the same medium.
          what_is_different: |
            SQL injection has a reliable mitigation: parameterised queries that
            physically separate data from instruction at the parser level. Prompt
            injection has no equivalent mitigation — language models inherently
            process data and instructions as the same token stream. There is no
            'parameterised prompt' that makes the model structurally unable to
            treat user input as instruction. This makes LLM01 fundamentally harder
            to prevent than A03.

        llm02_insecure_output_vs_a03_and_a07:
          web_risk: "A03:2021 — Injection (XSS) / A07:2021 — Identification Failures"
          llm_risk: "LLM02 — Insecure Output Handling"
          what_is_the_same: |
            LLM output rendered in a browser without sanitisation is exactly XSS —
            the injection vector is the LLM rather than a user-controlled form field,
            but the exploit mechanism and impact are identical.
          what_is_different: |
            The LLM introduces a layer of indirection. The human-readable LLM output
            may look safe to a reviewer while containing injected payloads designed
            to be processed by the rendering engine or downstream system. The output
            is both a finished product (for the user) and a potential attack payload
            (for the downstream system) simultaneously.

        llm04_model_dos_vs_a05:
          web_risk: "A05:2021 — Security Misconfiguration (including resource exhaustion)"
          llm_risk: "LLM04 — Model Denial of Service"
          what_is_the_same: |
            Resource exhaustion through crafted inputs is a classic pattern.
            HTTP request flooding, slowloris attacks, and XML billion laughs all
            exploit the same principle: consume disproportionate server resources
            per unit of attacker effort.
          what_is_different: |
            Token-based billing means LLM DoS has a financial dimension with no
            web equivalent. A successful DoS against a web server consumes the
            victim's compute. A successful cost attack against an LLM API consumes
            the victim's money — irreversibly, since consumed tokens cannot be
            refunded. Sponge examples also have no web equivalent: there is no
            web analogue for inputs crafted to maximise neural network activation
            without triggering obvious abuse patterns.

        llm05_supply_chain_vs_a06:
          web_risk: "A06:2021 — Vulnerable and Outdated Components"
          llm_risk: "LLM05 — Supply Chain Vulnerabilities"
          what_is_the_same: |
            Both risks concern the security of dependencies — components your
            application relies on that you did not produce yourself. The supply
            chain attack pattern (compromise the dependency, propagate to all
            users of that dependency) is structurally identical.
          what_is_different: |
            A vulnerable npm package can be patched with a version bump. A
            backdoored model weight file cannot be patched — the only remediation
            is to discard the weights and retrain or download from a trusted source.
            The attack surface is also different: pip install and npm install have
            ecosystem-wide scanning and known vulnerability databases. Model hubs
            like HuggingFace have no equivalent scanning infrastructure.

        llm06_sensitive_disclosure_vs_a02:
          web_risk: "A02:2021 — Cryptographic Failures (sensitive data exposure)"
          llm_risk: "LLM06 — Sensitive Information Disclosure"
          what_is_the_same: |
            Both risks concern sensitive data being accessible to parties who should
            not have it. The regulatory and compliance implications are similar:
            GDPR breach notification, HIPAA incident response, reputational damage.
          what_is_different: |
            In traditional systems, sensitive data exposure is caused by inadequate
            encryption or access control — discrete, fixable failures. In LLMs,
            sensitive data exposure is caused by model memorisation — the model
            learned to associate certain inputs with sensitive output patterns during
            training. This is not a configuration error; it is a property of how
            the model was trained on data it should not have been trained on.
            The fix is not to encrypt the model's weights — it is to retrain without
            the sensitive data, implement differential privacy, or add output filters.

      genuinely_novel_llm_risks:

        llm07_insecure_plugin_design:
          no_web_equivalent: |
            The closest web analogue is CSRF or confused deputy attacks — but
            LLM plugin exploitation is qualitatively different. In CSRF, the
            adversary tricks a browser into making a request with the victim's
            session. In LLM plugin exploitation, the adversary tricks the LLM
            into calling a plugin with adversary-specified parameters using
            application-level permissions, as a consequence of processing
            adversary-controlled text. The attack chain is entirely mediated
            by the LLM's language understanding.

        llm08_excessive_agency:
          no_web_equivalent: |
            Traditional web applications execute deterministic code — they do
            exactly what the code says. LLM agents make autonomous decisions about
            which actions to take based on probabilistic language processing. The
            concept of 'excessive agency' has no web equivalent because web
            applications do not autonomously decide which database to query,
            which email to send, or which file to delete based on their interpretation
            of the user's intent. The autonomy is the vulnerability.

        llm09_overreliance:
          no_web_equivalent: |
            Traditional software does not confabulate. A SQL query returns the
            data that is in the database, or it returns an error. An LLM produces
            fluent, confident-sounding text regardless of whether that text is
            accurate. The security risk of overreliance — systems and humans making
            decisions based on authoritative-seeming but incorrect LLM output —
            is unique to probabilistic generative systems.

        llm10_model_theft:
          partial_web_equivalent: |
            Source code theft has a web equivalent (exposed .git directories,
            code repository compromise). But model extraction via API query is
            genuinely novel: by observing outputs, an adversary can reconstruct
            a functional approximation of a model that has never been accessed
            directly. There is no web equivalent of inferring a server's source
            code by making HTTP requests and observing responses.

  # --------------------------------------------------------------------------
  # 5.3.6 — OWASP as a Risk Communication Tool
  # --------------------------------------------------------------------------

  subsection_06:
    number: "5.3.6"
    title: "OWASP as a Risk Communication Tool: Beyond the Checklist"

    content: |
      The most common misuse of OWASP LLM Top 10 is treating it as a binary
      checklist: "Does our system have LLM01? Yes/No." This misses the framework's
      primary value, which is as a risk communication and prioritisation structure.

      three_correct_uses:

        ciso_briefing:
          scenario: |
            Your CISO has fifteen minutes to understand the LLM security posture
            before a board audit committee meeting. They need: what are the risks,
            which are most likely to affect us, what are we doing about it.
          owasp_application: |
            Present a heat map of LLM01-LLM10 with your organisation's likelihood
            and impact assessment for each. Colour-code: red (not controlled, high
            risk), amber (partially controlled), green (controlled). This gives the
            CISO a structured, industry-standard view of risk posture in the time
            available.
          what_not_to_do: |
            Do not present a raw technical list of vulnerabilities. Do not present
            a single combined risk score without breakdown. The OWASP structure
            enables the CISO to connect individual risks to controls, compliance
            requirements, and business impact — which a generic score does not.

        vendor_security_assessment:
          scenario: |
            Your organisation is evaluating two competing LLM-powered products.
            You need a structured comparison of their security postures.
          owasp_application: |
            Issue both vendors an OWASP LLM Top 10 questionnaire. For each risk
            (LLM01-LLM10), request: documented control, evidence of testing,
            incident history, and remediation process. The structured response
            allows direct comparison on identical criteria.
          what_not_to_do: |
            Do not accept "we take security seriously" as a response. Do not
            accept a generic SOC 2 report that does not address LLM-specific risks.
            The OWASP framework gives you a basis to demand specific, comparable,
            LLM-specific evidence.

        risk_register_entry:
          scenario: |
            Your organisation's GRC team needs to add LLM security risks to the
            enterprise risk register. Risk register entries require: risk description,
            likelihood, impact, owner, controls, and residual risk.
          owasp_application: |
            Create one risk register entry per applicable OWASP LLM risk. Use
            OWASP's description as the baseline risk description, then apply your
            organisation's likelihood and impact assessment methodology. This
            integrates LLM security risk into existing governance processes
            using a framework your GRC team can independently validate.

      risk_register_template_structure:
        fields:
          risk_id: "AI-LLM-[01-10] (e.g. AI-LLM-01)"
          risk_name: "OWASP LLM risk name (e.g. Prompt Injection)"
          owasp_reference: "OWASP LLM Top 10 v1.1 — LLM01"
          attack_surface_layer: "Section 5.2 layer reference (e.g. Layer 2, Layer 7)"
          risk_description: "OWASP description + deployment-specific context"
          likelihood_assessment: "Low / Medium / High — with rationale based on deployment context"
          impact_assessment: "Confidentiality / Integrity / Availability / Financial / Regulatory"
          current_controls: "List of implemented mitigations"
          control_effectiveness: "Estimated residual risk reduction percentage"
          residual_risk: "Post-control likelihood × impact"
          risk_owner: "Team or individual accountable for risk treatment"
          review_date: "Quarterly review cycle recommended for AI risks"
          mitre_atlas_reference: "Corresponding ATLAS technique(s)"
          chapter_reference: "Detection engineering coverage in this book"

  # --------------------------------------------------------------------------
  # 5.3.7 — OWASP LLM Top 10 in Compliance and Regulatory Frameworks
  # --------------------------------------------------------------------------

  subsection_07:
    number: "5.3.7"
    title: "OWASP LLM Top 10 in Compliance and Regulatory Frameworks"

    content: |
      The OWASP LLM Top 10 has achieved regulatory relevance within two years
      of publication. Understanding which regulatory frameworks reference OWASP
      enables you to justify AI security programme investment in compliance terms
      — which often unlocks budget more reliably than purely technical arguments.

      eu_ai_act:
        relevance: "High — technical annex requirements align with OWASP LLM Top 10"
        specific_mappings:
          article_15_accuracy_robustness_cybersecurity: |
            Requires high-risk AI systems to be designed with appropriate levels
            of accuracy, robustness, and cybersecurity. OWASP LLM01 (Prompt Injection),
            LLM04 (Model DoS), and LLM10 (Model Theft) directly address the
            cybersecurity dimension of this article.
          article_9_risk_management: |
            Mandates documented risk management processes for high-risk AI. OWASP
            LLM Top 10 provides the risk taxonomy; NIST AI RMF provides the process
            structure. Using OWASP to populate the risk register satisfies Article 9's
            requirement for systematic risk identification.
          annex_4_technical_documentation: |
            Technical documentation must include: description of security measures,
            testing and validation procedures, known limitations. OWASP LLM Top 10
            provides the structure for the security measures section.

      nist_ai_rmf:
        relevance: "High — NIST AI RMF Playbook explicitly references OWASP LLM Top 10"
        specific_mappings:
          map_function: |
            NIST AI RMF MAP function requires identification of AI risks and their
            context. OWASP LLM Top 10 provides the risk taxonomy for the MAP output.
          measure_function: |
            NIST AI RMF MEASURE function requires risk analysis, testing, and
            evaluation. OWASP LLM Top 10 audit checklist (deliverable from this
            section) provides the MEASURE function test plan structure.
          manage_function: |
            NIST AI RMF MANAGE function requires risk treatment plans. Each OWASP
            LLM Top 10 risk entry in the risk register becomes a MANAGE function
            treatment plan item.

      soc_2_type_ii:
        relevance: "Medium and growing — auditors increasingly ask about LLM-specific controls"
        specific_mappings:
          cc6_logical_access: |
            OWASP LLM01 (Prompt Injection) and LLM07 (Insecure Plugin Design)
            evidence is relevant to CC6 controls around logical access and
            privilege management in LLM-integrated systems.
          cc7_system_operations: |
            OWASP LLM04 (Model DoS) and LLM09 (Overreliance) evidence is relevant
            to CC7 controls around system availability and monitoring.
          cc9_risk_mitigation: |
            OWASP LLM Top 10 risk register entries directly support CC9 risk
            mitigation evidence requirements.

      hipaa:
        relevance: "High for healthcare AI deployments"
        specific_mappings:
          phi_exposure: |
            OWASP LLM06 (Sensitive Information Disclosure) is the primary HIPAA
            risk for LLMs trained on or processing protected health information.
            Any LLM that recalls training data containing PHI is a HIPAA breach.
          security_rule_164_312: |
            HIPAA Security Rule §164.312 technical safeguards map to controls
            against LLM01, LLM06, and LLM07. The OWASP framework provides
            the AI-specific risk taxonomy the Security Rule lacks.

      practical_implication: |
        Every enterprise LLM security programme needs a compliance anchor. The
        OWASP LLM Top 10 is that anchor for AI-specific risks. Build your risk
        register using OWASP taxonomy, map each entry to the applicable regulatory
        requirement, and your security programme deliverables become compliance
        evidence simultaneously. This is how security investment gets sustained
        through budget cycles — by being legible to compliance and legal teams,
        not just to security engineers.

  # --------------------------------------------------------------------------
  # 5.3.8 — Limitations of the OWASP LLM Top 10 Classification
  # --------------------------------------------------------------------------

  subsection_08:
    number: "5.3.8"
    title: "Limitations of the OWASP LLM Top 10 Classification"

    content: |
      Critical engagement with the OWASP LLM Top 10 is as important as fluency
      with it. A framework that is accepted uncritically becomes a ceiling rather
      than a floor. The following limitations should inform how you use and
      extend the OWASP classification.

      limitation_01_static_taxonomy_in_fast_moving_field:
        description: |
          The OWASP LLM Top 10 is a point-in-time snapshot of a field evolving
          monthly. Agentic AI deployments, multimodal models, and voice AI
          interfaces have introduced attack surfaces that were nascent when v1.1
          was published. The list was not designed for systems where the LLM
          browses the web, controls CI/CD pipelines, or manages calendar and email
          autonomously at scale.
        implication: |
          Do not treat the absence of a risk from the Top 10 as evidence that the
          risk does not exist. Emerging risks — adversarial audio for voice AI,
          visual prompt injection in multimodal models, agent orchestration attacks
          in multi-agent systems — require you to go beyond the list.

      limitation_02_ranking_conflates_exploitability_and_impact:
        description: |
          LLM01 (Prompt Injection) ranks first partly because it is highly
          exploitable (any user with API access can attempt it) and partly because
          it is well-documented. But for many deployment contexts, LLM03 (Training
          Data Poisoning) or LLM06 (Sensitive Information Disclosure) represent
          higher business impact even if they are less exploitable or less frequently
          demonstrated.
        implication: |
          Always re-rank the OWASP LLM Top 10 for your specific deployment context.
          The generic ranking is a starting point, not a final prioritisation. A
          healthcare AI fine-tuned on patient data should place LLM06 at least
          equal to LLM01 in its risk register regardless of OWASP's ordering.

      limitation_03_prevention_focused_not_detection_focused:
        description: |
          The OWASP LLM Top 10 primarily describes prevention controls: don't
          trust user input, validate outputs, use least-privilege plugins. This
          maps well to developers building LLM applications. It maps poorly to
          security operations engineers building detection programmes. The framework
          does not tell you what logs to collect, what anomalies to detect, or
          how to respond when a risk is exploited.
        implication: |
          OWASP tells you what to prevent. MITRE ATLAS tells you what attacker
          behaviour to detect. NIST AI RMF tells you how to run the risk management
          process. You need all three frameworks, not just OWASP.

      limitation_04_limited_evidence_base:
        description: |
          The traditional OWASP Web Top 10 is backed by statistical analysis of
          vulnerability disclosures across thousands of penetration tests and bug
          bounty programmes. The OWASP LLM Top 10 is backed by expert consensus
          and a smaller evidence base. The ranking may not reflect actual frequency
          distributions in enterprise deployments — we simply do not have enough
          systematically collected data yet.
        implication: |
          Treat the OWASP LLM Top 10 ranking as expert opinion, not empirical fact.
          When your own incident data diverges from OWASP's ranking — e.g. if you
          observe more LLM04 (DoS) incidents than LLM01 (Injection) in your
          environment — your data should take precedence over the generic ranking.

      limitation_05_coarse_granularity:
        description: |
          Each OWASP LLM Top 10 category covers a cluster of related techniques.
          LLM01 (Prompt Injection) includes direct injection, indirect injection,
          multi-turn injection, and multi-modal injection — techniques with different
          attack prerequisites, different detection approaches, and different
          mitigations. Treating them as a single risk category may cause imprecision
          in detection programme design.
        implication: |
          Use OWASP for risk communication and compliance mapping. Use MITRE ATLAS
          at the technique level for detection engineering. The ATLAS technique
          (e.g. AML.T0051 — LLM Prompt Injection) is more precise than the OWASP
          category for the purpose of writing detection rules.

      limitation_06_agentic_and_multimodal_gaps:
        description: |
          v1.1 was authored when most enterprise LLM deployments were completion
          APIs. The explosive growth of agentic frameworks (AutoGPT, LangChain,
          Crew AI), multimodal models (GPT-4V, Claude 3 Vision, Gemini), and
          voice AI (real-time voice APIs) introduced attack surfaces for which the
          current list provides incomplete coverage. LLM07 and LLM08 cover some
          agentic risk, but multi-agent orchestration attacks, agent prompt injection
          across agent boundaries, and visual prompt injection are not adequately
          addressed.
        implication: |
          Supplement the OWASP LLM Top 10 with your own category for agentic and
          multimodal-specific risks. Treat these as AI-LLM-11 onwards in your
          risk register, pending inclusion in future OWASP versions.

  # --------------------------------------------------------------------------
  # 5.3.9 — Framework Interoperability: OWASP + MITRE + NIST
  # --------------------------------------------------------------------------

  subsection_09:
    number: "5.3.9"
    title: "Framework Interoperability: OWASP + MITRE ATLAS + NIST AI RMF"

    content: |
      No single framework covers the full AI security lifecycle. OWASP, MITRE
      ATLAS, and NIST AI RMF are complementary — each addresses a different
      question. A mature AI security programme uses all three, with each framework
      assigned to its appropriate role.

      three_frameworks_three_questions:

        owasp_llm_top_10:
          question: "What are the significant risk categories?"
          primary_audience: "CISOs, GRC teams, compliance officers, developers"
          output: "Risk classification taxonomy for communication and compliance mapping"
          primary_use_cases:
            - "Board and executive risk reporting"
            - "Vendor security assessments"
            - "Risk register population"
            - "Compliance questionnaire responses"
            - "Bug bounty scope definition"
          does_not_answer: "How to detect a specific attack / Which logs to collect / How to write a detection rule"

        mitre_atlas:
          question: "How do adversaries actually execute these attacks?"
          primary_audience: "Detection engineers, red teamers, SOC analysts"
          output: "Tactic and technique catalogue for detection and response"
          primary_use_cases:
            - "Detection rule development (each technique = one or more detection rules)"
            - "Red team engagement structuring"
            - "SOC analyst playbook development"
            - "Detection programme coverage measurement"
            - "Adversary emulation planning"
          does_not_answer: "How to communicate risk to leadership / How to run the risk management process"

        nist_ai_rmf:
          question: "How do we manage AI risk as an organisational process?"
          primary_audience: "Risk managers, programme owners, engineering leadership"
          output: "Process framework for systematic AI risk governance"
          primary_use_cases:
            - "AI risk governance programme design"
            - "Regulatory compliance evidence (EU AI Act, sector regulations)"
            - "Organisational accountability structures for AI risk"
            - "Risk treatment decision-making process"
          does_not_answer: "What the specific risks are / How attackers execute them"

      integration_in_practice:

        risk_identification_to_detection_pipeline: |
          The three frameworks form a natural pipeline:

          STEP 1 — OWASP (What is the risk?):
            Identify applicable LLM risks from OWASP LLM Top 10.
            Example: "LLM01 Prompt Injection is applicable to our RAG deployment."

          STEP 2 — MITRE ATLAS (How is it executed?):
            Map each OWASP risk to the ATLAS techniques that represent its
            execution variants.
            Example: "LLM01 maps to ATLAS AML.T0051 (LLM Prompt Injection),
            which includes direct injection (via user input) and indirect injection
            (via retrieved documents)."

          STEP 3 — NIST AI RMF (How do we manage it?):
            Assign the risk to the appropriate NIST AI RMF function (MAP for
            identification, MEASURE for evaluation, MANAGE for treatment).
            Example: "This risk is captured in MAP, evaluated via our adversarial
            test suite in MEASURE, and treated with input validation and output
            monitoring controls documented in MANAGE."

          STEP 4 — DETECTION (Chapter 11-15):
            For each ATLAS technique, write the detection logic, identify the
            required data sources, and build the detection rule.
            Example: "AML.T0051 indirect injection detected by scanning RAG-retrieved
            document content for injection pattern indicators before context assembly."

        coverage_gap_analysis: |
          A mature AI security programme measures its ATLAS technique coverage:
          what percentage of relevant ATLAS techniques has at least one detection
          rule in production? The OWASP LLM Top 10 provides the risk categories
          to prioritise. ATLAS provides the technique granularity to measure.
          NIST AI RMF provides the governance process to sustain the programme.

          coverage_score_calculation:
            numerator: "Number of ATLAS techniques with at least one deployed detection rule"
            denominator: "Total number of ATLAS techniques assessed as applicable to deployment"
            target: ">= 70% for mature detection programme; 100% is not achievable or necessary"

      owasp_to_atlas_cross_reference:
        llm01:
          atlas_techniques:
            - "AML.T0051 — LLM Prompt Injection"
            - "AML.T0054 — Prompt Injection via Indirect Channel"
        llm02:
          atlas_techniques:
            - "AML.T0043 — Craft Adversarial Data (output-targeting variant)"
        llm03:
          atlas_techniques:
            - "AML.T0020 — Poison Training Data"
            - "AML.T0019 — Publish Poisoned Datasets"
            - "AML.T0018 — Backdoor ML Model"
        llm04:
          atlas_techniques:
            - "AML.T0029 — Denial of ML Service"
            - "AML.T0034 — Cost Harvesting"
        llm05:
          atlas_techniques:
            - "AML.T0010 — ML Supply Chain Compromise"
            - "AML.T0016 — Obtain Capabilities (pre-trained model)"
        llm06:
          atlas_techniques:
            - "AML.T0024 — Exfiltration via ML Inference API"
            - "AML.T0037 — Data from Information Repositories"
        llm07:
          atlas_techniques:
            - "AML.T0051 — LLM Prompt Injection (plugin-targeting variant)"
            - "AML.T0053 — LLM Plugin Compromise"
        llm08:
          atlas_techniques:
            - "AML.T0053 — LLM Plugin Compromise"
            - "AML.T0051 — LLM Prompt Injection (action-triggering variant)"
        llm09:
          atlas_techniques:
            - "AML.T0048 — Societal Harm (hallucination exploitation)"
        llm10:
          atlas_techniques:
            - "AML.T0040 — ML Model Inference API Access"
            - "AML.T0005 — Create Proxy ML Model"
            - "AML.T0030 — ML Artifact Collection"

  # --------------------------------------------------------------------------
  # 5.3.10 — How OWASP Categories Evolve: Contribution and Tracking
  # --------------------------------------------------------------------------

  subsection_10:
    number: "5.3.10"
    title: "How OWASP Categories Evolve: Contribution and Tracking"

    content: |
      Understanding the OWASP contribution process matters for two reasons:
      it helps you track upcoming changes before they are finalised, and it
      positions you to contribute findings from your own detection work —
      which is both professionally visible and genuinely useful to the community.

      contribution_process:

        step_1_community_identification:
          description: |
            New risk candidates are identified through: published research papers,
            bug bounty disclosures, security conference presentations, and working
            group member practitioner experience. Anyone can propose a new risk
            category by opening an issue on the OWASP LLM Top 10 GitHub repository
            with: risk description, attack scenario, observed prevalence evidence,
            and proposed prevention guidance.

        step_2_working_group_review:
          description: |
            Proposed risks are reviewed by the working group for: uniqueness (does
            this differ meaningfully from existing categories?), evidence quality
            (is there documented real-world exploitation?), and prevalence
            (how commonly observed?). Working group discussions are public on GitHub.

        step_3_community_vote:
          description: |
            Candidate risks that pass working group review are published for
            community vote. Working group members and registered community contributors
            vote on inclusion and ranking. The vote result informs but does not
            mechanically determine the final list.

        step_4_editorial_integration:
          description: |
            Final list is assembled by editorial committee, incorporating vote
            results, working group consensus, and editorial judgement on category
            grouping and ordering. Accepted changes are merged and a new version
            is published.

      how_to_track_upcoming_changes:
        github_repository: "https://github.com/OWASP/www-project-top-10-for-large-language-model-applications"
        tracking_approach:
          - "Star and watch the repository for all issues and pull requests"
          - "Follow the 'issues' tab for proposed new categories under discussion"
          - "Join the OWASP Slack workspace (#project-llm-top10 channel)"
          - "Monitor the project's LinkedIn and Twitter for version announcements"

      categories_under_active_discussion_as_of_2026:
        agentic_ai_risks: |
          Multi-agent orchestration attacks, where an adversary compromises one
          agent in a multi-agent pipeline and uses it to inject into other agents.
          Currently partially covered by LLM07 and LLM08 but not at the technique
          granularity needed for detection engineering.
        multimodal_injection: |
          Visual prompt injection (adversarial instructions embedded in images
          processed by multimodal LLMs), audio injection (adversarial content
          in voice AI inputs), and document injection (instructions embedded in
          PDFs or Office documents). Currently partially covered by LLM01 but
          the visual/audio attack vectors are not explicitly addressed.
        model_drift_and_behaviour_change: |
          Production LLMs undergo continuous updates. A model that is safe today
          may develop new capabilities or lose safety properties in a future
          version. The risk of unmonitored model drift in production is not
          currently addressed as a distinct OWASP category.

      implication_for_your_detection_programme: |
        Build your detection programme to MITRE ATLAS technique granularity,
        not just OWASP category coverage. ATLAS is updated through the same
        community process and tends to track emerging attack techniques faster
        than OWASP (because ATLAS focuses on technique documentation while
        OWASP focuses on risk categories, which require more evidence of
        prevalence before inclusion). A detection programme with 70%+ ATLAS
        technique coverage will naturally cover all OWASP categories plus
        emerging techniques not yet in the Top 10.

# ============================================================================
# PRACTICAL IMPLEMENTATIONS
# ============================================================================

implementations:

  implementation_01:
    title: "OWASP LLM Top 10 Reference Card Generator"
    filename: "owasp_llm_reference_card.py"
    purpose: |
      Generates a complete OWASP LLM Top 10 reference card as structured data
      and formatted text. Includes: risk name, one-line description, attack surface
      layer, primary impact, exploitability, chapter reference, and MITRE ATLAS
      cross-reference. Output formats: console, JSON (for import into risk register
      tooling), and Markdown (for documentation).
    language: "python"
    code: |
      """
      OWASP LLM Top 10 Reference Card Generator
      Produces structured reference in console, JSON, and Markdown formats.
      Use as import base for risk register tools (Archer, ServiceNow, Jira).
      """

      from dataclasses import dataclass, field
      from typing import List
      import json


      @dataclass
      class OWASPLLMRisk:
          rank: int
          id: str
          name: str
          one_line: str
          attack_surface_layers: List[int]
          primary_impact: str
          secondary_impact: str
          exploitability: str
          prevalence: str
          atlas_techniques: List[str]
          chapter_reference: str
          section_reference: str
          prevention_summary: str


      OWASP_LLM_TOP_10 = [
          OWASPLLMRisk(
              rank=1, id="LLM01", name="Prompt Injection",
              one_line="Adversary manipulates LLM behaviour through crafted inputs overriding intended instructions",
              attack_surface_layers=[2, 7],
              primary_impact="Integrity — model behaviour hijacked",
              secondary_impact="Confidentiality — system prompt / data extraction",
              exploitability="Very High",
              prevalence="Very High",
              atlas_techniques=["AML.T0051", "AML.T0054"],
              chapter_reference="Chapter 6 — Prompt Injection Attacks",
              section_reference="Section 5.4",
              prevention_summary="Input validation; parameterised prompts; output monitoring; injection detection in retrieved content",
          ),
          OWASPLLMRisk(
              rank=2, id="LLM02", name="Insecure Output Handling",
              one_line="Downstream components consume LLM output without validation, enabling XSS, command injection, SSRF",
              attack_surface_layers=[8],
              primary_impact="Integrity — downstream system compromise",
              secondary_impact="Confidentiality — data exfiltration via compromised downstream",
              exploitability="High",
              prevalence="High",
              atlas_techniques=["AML.T0043"],
              chapter_reference="Chapter 15 — Building Production Detectors",
              section_reference="Section 5.4",
              prevention_summary="Output sanitisation before rendering; Content-Security-Policy; treat LLM output as untrusted input to downstream systems",
          ),
          OWASPLLMRisk(
              rank=3, id="LLM03", name="Training Data Poisoning",
              one_line="Adversary contaminates training data to implant backdoors or alter model behaviour at inference",
              attack_surface_layers=[1, 3],
              primary_impact="Integrity — model learns adversary-specified behaviour",
              secondary_impact="Availability — degraded performance on targeted inputs",
              exploitability="Low",
              prevalence="Medium",
              atlas_techniques=["AML.T0020", "AML.T0019", "AML.T0018"],
              chapter_reference="Chapter 8 — Training Data Poisoning",
              section_reference="Section 5.4",
              prevention_summary="Data provenance tracking; label consistency auditing; activation clustering post-training; training pipeline access controls",
          ),
          OWASPLLMRisk(
              rank=4, id="LLM04", name="Model Denial of Service",
              one_line="Adversary crafts inputs exhausting LLM compute, memory, or billing budget",
              attack_surface_layers=[5, 6],
              primary_impact="Availability — service degradation or outage",
              secondary_impact="Financial — token cost attack",
              exploitability="High",
              prevalence="Medium",
              atlas_techniques=["AML.T0029", "AML.T0034"],
              chapter_reference="Chapter 14 — Production Deployment",
              section_reference="Section 5.5",
              prevention_summary="Input length limits; token budget caps per user; output length limits; rate limiting; real-time cost monitoring",
          ),
          OWASPLLMRisk(
              rank=5, id="LLM05", name="Supply Chain Vulnerabilities",
              one_line="Adversary compromises model artefacts, training data, or ML dependencies before deployment",
              attack_surface_layers=[1, 4],
              primary_impact="Integrity — backdoored model deployed as trusted artefact",
              secondary_impact="Confidentiality — RCE on loading infrastructure",
              exploitability="Medium",
              prevalence="Medium",
              atlas_techniques=["AML.T0010", "AML.T0016"],
              chapter_reference="Section 5.9 — AI Supply Chain Security",
              section_reference="Section 5.5",
              prevention_summary="SafeTensors format exclusively; model provenance verification; hash verification; supply chain audit procedure",
          ),
          OWASPLLMRisk(
              rank=6, id="LLM06", name="Sensitive Information Disclosure",
              one_line="LLM reveals confidential data from training corpus, context window, or fine-tuning dataset",
              attack_surface_layers=[5, 8],
              primary_impact="Confidentiality — private data exposed to unauthorised parties",
              secondary_impact="Legal/Regulatory — GDPR, HIPAA breach obligations",
              exploitability="Medium",
              prevalence="High",
              atlas_techniques=["AML.T0024", "AML.T0037"],
              chapter_reference="Section 5.10-5.11 — Privacy Attacks",
              section_reference="Section 5.5",
              prevention_summary="PII detection in outputs; system prompt confidentiality controls; differential privacy in training; output filtering for credential patterns",
          ),
          OWASPLLMRisk(
              rank=7, id="LLM07", name="Insecure Plugin Design",
              one_line="LLM plugins allow adversary to reach system resources through the LLM as confused deputy",
              attack_surface_layers=[7],
              primary_impact="Integrity — system resources manipulated via LLM proxy",
              secondary_impact="Confidentiality — data exfiltration through over-permissioned plugin",
              exploitability="High",
              prevalence="High",
              atlas_techniques=["AML.T0051", "AML.T0053"],
              chapter_reference="Chapter 14 — Production Deployment",
              section_reference="Section 5.6",
              prevention_summary="Least-privilege plugin permissions; input validation on plugin parameters; human confirmation for irreversible actions; injection detection in tool output",
          ),
          OWASPLLMRisk(
              rank=8, id="LLM08", name="Excessive Agency",
              one_line="LLM granted too much autonomy or permissions, causing harm through unconstrained action",
              attack_surface_layers=[7],
              primary_impact="Integrity — unintended or adversary-directed real-world actions",
              secondary_impact="Availability — irreversible state changes",
              exploitability="Medium-High",
              prevalence="High",
              atlas_techniques=["AML.T0053", "AML.T0051"],
              chapter_reference="Chapter 14 — Production Deployment",
              section_reference="Section 5.6",
              prevention_summary="Capability × autonomy × irreversibility = agency risk; human-in-the-loop for all irreversible actions; minimum necessary permissions; action audit logging",
          ),
          OWASPLLMRisk(
              rank=9, id="LLM09", name="Overreliance",
              one_line="Systems or humans make decisions based on LLM output without validation, creating exploitable trust",
              attack_surface_layers=[8],
              primary_impact="Integrity — incorrect decisions from adversarially confident LLM output",
              secondary_impact="Legal — liability from autonomous decisions based on LLM errors",
              exploitability="Medium",
              prevalence="Very High",
              atlas_techniques=["AML.T0048"],
              chapter_reference="Chapter 17 — Monitoring and Tuning",
              section_reference="Section 5.6",
              prevention_summary="Human review gates for high-stakes decisions; factual grounding with RAG and citation; confidence score calibration; LLM-as-one-signal-not-final-authority",
          ),
          OWASPLLMRisk(
              rank=10, id="LLM10", name="Model Theft",
              one_line="Adversary extracts functional copy of proprietary model via API queries or direct weight exfiltration",
              attack_surface_layers=[4, 5, 6],
              primary_impact="Financial — proprietary model IP stolen",
              secondary_impact="Security — extracted model enables offline adversarial attack development",
              exploitability="Medium",
              prevalence="Medium",
              atlas_techniques=["AML.T0040", "AML.T0005", "AML.T0030"],
              chapter_reference="Chapter 9 — Model Extraction and Stealing",
              section_reference="Section 5.6",
              prevention_summary="Rate limiting and query volume monitoring; input distribution anomaly detection; watermarking; access logging with cross-session pattern analysis",
          ),
      ]


      def generate_reference_card_console(risks: List[OWASPLLMRisk]) -> None:
          """Print formatted reference card to console."""
          print("=" * 70)
          print("OWASP LLM TOP 10 REFERENCE CARD — v1.1")
          print("=" * 70)
          for r in risks:
              print(f"\n{'─'*70}")
              print(f"  {r.id} (#{r.rank}) — {r.name}")
              print(f"  {r.one_line}")
              print(f"  Layers:          {r.attack_surface_layers}")
              print(f"  Primary Impact:  {r.primary_impact}")
              print(f"  Exploitability:  {r.exploitability}  |  Prevalence: {r.prevalence}")
              print(f"  ATLAS:           {', '.join(r.atlas_techniques)}")
              print(f"  Prevention:      {r.prevention_summary[:70]}...")
              print(f"  Coverage:        {r.chapter_reference}")


      def generate_reference_card_json(risks: List[OWASPLLMRisk],
                                       output_file: str = "owasp_llm_top10.json") -> None:
          """Export reference card as JSON for risk register import."""
          data = [
              {
                  "rank": r.rank,
                  "id": r.id,
                  "name": r.name,
                  "one_line": r.one_line,
                  "attack_surface_layers": r.attack_surface_layers,
                  "primary_impact": r.primary_impact,
                  "secondary_impact": r.secondary_impact,
                  "exploitability": r.exploitability,
                  "prevalence": r.prevalence,
                  "atlas_techniques": r.atlas_techniques,
                  "prevention_summary": r.prevention_summary,
                  "chapter_reference": r.chapter_reference,
                  "section_reference": r.section_reference,
              }
              for r in risks
          ]
          with open(output_file, "w") as f:
              json.dump(data, f, indent=2)
          print(f"\nJSON reference card written to: {output_file}")


      def generate_reference_card_markdown(risks: List[OWASPLLMRisk],
                                           output_file: str = "owasp_llm_top10.md") -> None:
          """Export reference card as Markdown for documentation."""
          lines = [
              "# OWASP LLM Top 10 Reference Card — v1.1\n",
              "| Rank | ID | Name | Layers | Exploitability | Prevalence | ATLAS |\n",
              "|------|----|------|--------|---------------|------------|-------|\n",
          ]
          for r in risks:
              layers = ", ".join(str(l) for l in r.attack_surface_layers)
              atlas = ", ".join(r.atlas_techniques)
              lines.append(
                  f"| {r.rank} | {r.id} | {r.name} | {layers} | "
                  f"{r.exploitability} | {r.prevalence} | {atlas} |\n"
              )

          lines.append("\n## Risk Descriptions\n")
          for r in risks:
              lines += [
                  f"\n### {r.id} — {r.name}\n",
                  f"**{r.one_line}**\n\n",
                  f"- **Attack Surface Layers:** {r.attack_surface_layers}\n",
                  f"- **Primary Impact:** {r.primary_impact}\n",
                  f"- **Secondary Impact:** {r.secondary_impact}\n",
                  f"- **Exploitability:** {r.exploitability}\n",
                  f"- **Prevalence:** {r.prevalence}\n",
                  f"- **MITRE ATLAS:** {', '.join(r.atlas_techniques)}\n",
                  f"- **Prevention:** {r.prevention_summary}\n",
                  f"- **Chapter Coverage:** {r.chapter_reference}\n",
              ]

          with open(output_file, "w") as f:
              f.writelines(lines)
          print(f"Markdown reference card written to: {output_file}")


      def generate_risk_register_template(risks: List[OWASPLLMRisk],
                                          deployment_name: str = "Enterprise LLM Deployment",
                                          output_file: str = "llm_risk_register_template.json") -> None:
          """
          Generate a populated risk register template for GRC tool import.
          Likelihood and impact scores are placeholders — assessor must populate
          based on deployment context.
          """
          entries = []
          for r in risks:
              entries.append({
                  "risk_id": f"AI-{r.id}",
                  "risk_name": f"LLM Security: {r.name}",
                  "owasp_reference": f"OWASP LLM Top 10 v1.1 — {r.id}",
                  "risk_description": r.one_line,
                  "attack_surface_layers": r.attack_surface_layers,
                  "primary_impact_category": r.primary_impact.split("—")[0].strip(),
                  "secondary_impact_category": r.secondary_impact.split("—")[0].strip(),
                  "owasp_exploitability": r.exploitability,
                  "owasp_prevalence": r.prevalence,
                  "atlas_techniques": r.atlas_techniques,
                  "likelihood_deployment_specific": "PLACEHOLDER — assessor to complete",
                  "impact_deployment_specific": "PLACEHOLDER — assessor to complete",
                  "current_controls": "PLACEHOLDER — list implemented mitigations",
                  "residual_risk": "PLACEHOLDER — post-control assessment",
                  "risk_owner": "PLACEHOLDER — assign team or individual",
                  "review_frequency": "Quarterly",
                  "next_review_date": "PLACEHOLDER",
                  "chapter_coverage": r.chapter_reference,
                  "notes": f"Generic ranking is {r.rank}/10 — re-rank for {deployment_name} context",
              })

          output = {"deployment": deployment_name, "risk_register": entries}
          with open(output_file, "w") as f:
              json.dump(output, f, indent=2)
          print(f"Risk register template written to: {output_file}")


      if __name__ == "__main__":
          generate_reference_card_console(OWASP_LLM_TOP_10)
          generate_reference_card_json(OWASP_LLM_TOP_10)
          generate_reference_card_markdown(OWASP_LLM_TOP_10)
          generate_risk_register_template(OWASP_LLM_TOP_10)

  implementation_02:
    title: "OWASP LLM Top 10 Audit Checklist"
    filename: "owasp_llm_audit_checklist.py"
    purpose: |
      Interactive audit checklist for assessing an LLM deployment against
      all ten OWASP LLM Top 10 risks. For each risk: lists verification
      questions, records assessor responses, calculates coverage score,
      and generates a gap report with prioritised remediation items.
    language: "python"
    code: |
      """
      OWASP LLM Top 10 Audit Checklist
      Run against a deployment to produce a structured coverage assessment.
      Output: per-risk coverage score, total score, gap report, and remediation priority list.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional
      import json
      from datetime import date


      @dataclass
      class AuditQuestion:
          id: str
          risk_id: str
          question: str
          evidence_type: str         # What evidence answers this? (log, config, test result, policy)
          weight: int = 1            # Contribution to risk score (1-3)


      @dataclass
      class AuditResponse:
          question_id: str
          response: str              # "yes" / "no" / "partial" / "not_applicable"
          evidence_note: str = ""
          score: float = 0.0


      AUDIT_QUESTIONS: List[AuditQuestion] = [
          # LLM01 — Prompt Injection
          AuditQuestion("LLM01-Q1", "LLM01", "Is all user input validated and sanitised before reaching the LLM context?", "code review / config", weight=3),
          AuditQuestion("LLM01-Q2", "LLM01", "Are RAG-retrieved documents scanned for injection patterns before context assembly?", "code review / test result", weight=3),
          AuditQuestion("LLM01-Q3", "LLM01", "Is a prompt injection classifier deployed at the API input layer?", "architecture diagram / test result", weight=2),
          AuditQuestion("LLM01-Q4", "LLM01", "Are system prompt contents treated as confidential (not user-accessible)?", "config / test result", weight=2),
          AuditQuestion("LLM01-Q5", "LLM01", "Is there a documented incident response procedure for confirmed injection events?", "policy document", weight=1),

          # LLM02 — Insecure Output Handling
          AuditQuestion("LLM02-Q1", "LLM02", "Is LLM output sanitised before rendering in any web UI (XSS prevention)?", "code review / DAST result", weight=3),
          AuditQuestion("LLM02-Q2", "LLM02", "Are Content-Security-Policy headers enforced on all pages rendering LLM output?", "HTTP header scan", weight=2),
          AuditQuestion("LLM02-Q3", "LLM02", "Is LLM-generated code statically analysed before execution?", "code review / config", weight=3),
          AuditQuestion("LLM02-Q4", "LLM02", "Are downstream systems that consume LLM output treating it as untrusted input?", "architecture review", weight=2),

          # LLM03 — Training Data Poisoning
          AuditQuestion("LLM03-Q1", "LLM03", "Is training data provenance tracked from source to training job?", "data pipeline docs", weight=3),
          AuditQuestion("LLM03-Q2", "LLM03", "Are training datasets integrity-hashed at intake and before training?", "pipeline config", weight=2),
          AuditQuestion("LLM03-Q3", "LLM03", "Is access to training data and labelling pipelines restricted with audit logging?", "IAM config / access logs", weight=2),
          AuditQuestion("LLM03-Q4", "LLM03", "Has a backdoor detection procedure (e.g. activation clustering) been run on the deployed model?", "test result / report", weight=2),

          # LLM04 — Model Denial of Service
          AuditQuestion("LLM04-Q1", "LLM04", "Are per-user token budgets enforced with hard limits?", "config / billing dashboard", weight=3),
          AuditQuestion("LLM04-Q2", "LLM04", "Are input length limits enforced before reaching the model?", "config / test result", weight=3),
          AuditQuestion("LLM04-Q3", "LLM04", "Is real-time cost monitoring in place with alerting on anomalous spend?", "monitoring config / alert rule", weight=2),
          AuditQuestion("LLM04-Q4", "LLM04", "Are output length limits enforced to prevent generation DoS?", "config", weight=2),

          # LLM05 — Supply Chain Vulnerabilities
          AuditQuestion("LLM05-Q1", "LLM05", "Are all model weight files loaded exclusively in SafeTensors format?", "code review / config", weight=3),
          AuditQuestion("LLM05-Q2", "LLM05", "Are model weight file hashes verified at download and at each load?", "code review / CI/CD config", weight=3),
          AuditQuestion("LLM05-Q3", "LLM05", "Is there a documented procedure for auditing new model downloads from public repositories?", "policy document", weight=2),
          AuditQuestion("LLM05-Q4", "LLM05", "Are LoRA adapter updates subject to integrity verification and behaviour regression testing?", "config / test result", weight=2),

          # LLM06 — Sensitive Information Disclosure
          AuditQuestion("LLM06-Q1", "LLM06", "Is PII detection applied to all LLM outputs before logging and display?", "code review / test result", weight=3),
          AuditQuestion("LLM06-Q2", "LLM06", "Has training data extraction been tested (probing for verbatim recall)?", "test result / red team report", weight=3),
          AuditQuestion("LLM06-Q3", "LLM06", "Is there a credential leakage detection control on outputs?", "code review / test result", weight=2),
          AuditQuestion("LLM06-Q4", "LLM06", "Are system prompt contents protected against extraction via user queries?", "test result", weight=2),

          # LLM07 — Insecure Plugin Design
          AuditQuestion("LLM07-Q1", "LLM07", "Are all plugins operating under least-privilege permissions?", "architecture review / IAM config", weight=3),
          AuditQuestion("LLM07-Q2", "LLM07", "Is human confirmation required for all irreversible plugin actions?", "code review / config", weight=3),
          AuditQuestion("LLM07-Q3", "LLM07", "Are plugin call parameters validated independently of LLM output?", "code review", weight=2),
          AuditQuestion("LLM07-Q4", "LLM07", "Is injection detection applied to tool/plugin outputs before re-entry to LLM context?", "code review / test result", weight=2),

          # LLM08 — Excessive Agency
          AuditQuestion("LLM08-Q1", "LLM08", "Is there a documented inventory of all actions the LLM agent can take?", "architecture docs", weight=2),
          AuditQuestion("LLM08-Q2", "LLM08", "Are all agent actions logged with sufficient detail for forensic reconstruction?", "logging config", weight=2),
          AuditQuestion("LLM08-Q3", "LLM08", "Is the agent's permission scope the minimum necessary for its intended function?", "architecture review", weight=3),
          AuditQuestion("LLM08-Q4", "LLM08", "Can irreversible actions be rolled back or compensated for in incident response?", "runbook / architecture review", weight=2),

          # LLM09 — Overreliance
          AuditQuestion("LLM09-Q1", "LLM09", "Are human review gates in place for high-stakes decisions informed by LLM output?", "process docs / config", weight=3),
          AuditQuestion("LLM09-Q2", "LLM09", "Is the LLM's role communicated to end users (not presented as authoritative)?", "UI review / policy", weight=2),
          AuditQuestion("LLM09-Q3", "LLM09", "Is factual grounding (RAG with citations) used where accuracy is critical?", "architecture review", weight=2),
          AuditQuestion("LLM09-Q4", "LLM09", "Are hallucination rates monitored in production with alerting on degradation?", "monitoring config", weight=2),

          # LLM10 — Model Theft
          AuditQuestion("LLM10-Q1", "LLM10", "Is query volume monitored per user/key with alerting on extraction-pattern behaviour?", "monitoring config / alert rule", weight=3),
          AuditQuestion("LLM10-Q2", "LLM10", "Are rate limits calibrated to make model extraction economically infeasible?", "config / analysis", weight=2),
          AuditQuestion("LLM10-Q3", "LLM10", "Is egress monitoring on model weight storage in place (large file download alerts)?", "monitoring config", weight=3),
          AuditQuestion("LLM10-Q4", "LLM10", "Are model watermarking techniques applied to enable stolen model attribution?", "config / test result", weight=1),
      ]


      RESPONSE_SCORES = {"yes": 1.0, "partial": 0.5, "no": 0.0, "not_applicable": None}


      def score_question(response_str: str) -> Optional[float]:
          return RESPONSE_SCORES.get(response_str.lower().strip())


      def run_audit(questions: List[AuditQuestion],
                    deployment_name: str = "LLM Deployment") -> Dict:
          """Run interactive audit checklist."""
          print(f"\nOWASP LLM TOP 10 AUDIT — {deployment_name}")
          print("=" * 65)
          print("For each question, respond: yes / no / partial / not_applicable")
          print("=" * 65)

          responses: Dict[str, AuditResponse] = {}
          risk_groups: Dict[str, List[str]] = {}

          for q in questions:
              if q.risk_id not in risk_groups:
                  risk_groups[q.risk_id] = []
                  print(f"\n--- {q.risk_id} ---")
              risk_groups[q.risk_id].append(q.id)

              print(f"\n  [{q.id}] {q.question}")
              print(f"  Evidence type: {q.evidence_type}")
              raw = input("  Response (yes/no/partial/not_applicable): ").strip()
              note = input("  Evidence note (optional, press Enter to skip): ").strip()
              score = score_question(raw)

              responses[q.id] = AuditResponse(
                  question_id=q.id,
                  response=raw,
                  evidence_note=note,
                  score=(score * q.weight) if score is not None else 0.0,
              )

          return compute_results(questions, responses, deployment_name)


      def compute_results(questions: List[AuditQuestion],
                          responses: Dict[str, AuditResponse],
                          deployment_name: str) -> Dict:
          """Compute per-risk and overall coverage scores."""
          risk_ids = sorted(set(q.risk_id for q in questions))
          risk_results = {}

          for risk_id in risk_ids:
              risk_qs = [q for q in questions if q.risk_id == risk_id]
              applicable = [
                  (q, responses[q.id]) for q in risk_qs
                  if responses[q.id].response.lower() != "not_applicable"
              ]
              if not applicable:
                  risk_results[risk_id] = {"score": None, "status": "not_applicable"}
                  continue
              total_weight = sum(q.weight for q, _ in applicable)
              earned = sum(r.score for _, r in applicable)
              pct = earned / total_weight * 100 if total_weight > 0 else 0

              risk_results[risk_id] = {
                  "score_pct": round(pct, 1),
                  "status": "green" if pct >= 75 else "amber" if pct >= 40 else "red",
                  "questions_answered": len(applicable),
                  "questions_total": len(risk_qs),
              }

          applicable_risks = [v for v in risk_results.values() if v.get("score_pct") is not None]
          overall_score = (
              sum(v["score_pct"] for v in applicable_risks) / len(applicable_risks)
              if applicable_risks else 0
          )

          result = {
              "deployment": deployment_name,
              "audit_date": str(date.today()),
              "overall_score_pct": round(overall_score, 1),
              "overall_status": "green" if overall_score >= 75 else "amber" if overall_score >= 40 else "red",
              "per_risk_results": risk_results,
              "gaps": [
                  {"risk_id": r, "score_pct": v["score_pct"], "status": v["status"]}
                  for r, v in risk_results.items()
                  if v.get("status") == "red"
              ],
          }

          print_audit_report(result)
          return result


      def print_audit_report(result: Dict) -> None:
          """Print structured audit report."""
          status_icons = {"green": "✅", "amber": "⚠️ ", "red": "🚨"}
          print(f"\n{'='*65}")
          print(f"AUDIT RESULTS — {result['deployment']}")
          print(f"Date: {result['audit_date']}")
          print(f"{'='*65}")
          print(f"Overall Score:   {result['overall_score_pct']}%  "
                f"{status_icons.get(result['overall_status'], '?')}")
          print(f"\nPer-Risk Breakdown:")
          for risk_id, v in result["per_risk_results"].items():
              if v.get("score_pct") is None:
                  print(f"  {risk_id}: N/A (not applicable)")
              else:
                  icon = status_icons.get(v["status"], "?")
                  print(f"  {risk_id}: {v['score_pct']:5.1f}% {icon}")
          if result["gaps"]:
              print(f"\nGAPS REQUIRING IMMEDIATE ATTENTION (score < 40%):")
              for gap in sorted(result["gaps"], key=lambda x: x["score_pct"]):
                  print(f"  🚨 {gap['risk_id']}: {gap['score_pct']}%")


      if __name__ == "__main__":
          # For automated/demo mode, load pre-set responses
          # In practice: run interactively or integrate with GRC tooling
          print("Running in demo mode with example responses.")
          demo_responses: Dict[str, AuditResponse] = {}
          for q in AUDIT_QUESTIONS:
              # Simulate partial coverage: LLM01, LLM04, LLM06 well-covered; others gaps
              if q.risk_id in ["LLM01", "LLM04", "LLM06"]:
                  resp = "yes"
              elif q.risk_id in ["LLM02", "LLM07"]:
                  resp = "partial"
              else:
                  resp = "no"
              sc = score_question(resp)
              demo_responses[q.id] = AuditResponse(
                  question_id=q.id, response=resp,
                  score=(sc * q.weight) if sc is not None else 0.0,
              )
          result = compute_results(AUDIT_QUESTIONS, demo_responses, "Demo Enterprise LLM")
          with open("owasp_llm_audit_result.json", "w") as f:
              json.dump(result, f, indent=2)
          print("\nFull audit result saved to: owasp_llm_audit_result.json")

