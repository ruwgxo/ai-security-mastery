# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    OWASP LLM Top 10 is the industry lingua franca for LLM security risk —
    the standard reference for risk registers, compliance questionnaires, vendor
    assessments, and board reporting. Fluency is professionally mandatory for
    AI security engineers.

  takeaway_02: |
    The ranking methodology combines prevalence, exploitability, and impact.
    Rankings reflect the average deployment, not yours. Always re-rank for
    your specific context — a healthcare AI with fine-tuned patient data may
    rank LLM06 above LLM01.

  takeaway_03: |
    Four OWASP LLM Top 10 risks have direct web security analogues (LLM01 ↔
    A03 Injection, LLM02 ↔ A03 XSS, LLM04 ↔ DoS, LLM05 ↔ A06 Components).
    Four are genuinely novel with no web equivalent (LLM07, LLM08, LLM09, LLM10).
    Understanding which is which prevents misapplication of web security thinking.

  takeaway_04: |
    OWASP LLM Top 10 is a risk classification framework, not a detection
    engineering specification. It tells you what to communicate and what to
    prioritise. MITRE ATLAS tells you what attacker behaviour to detect. NIST
    AI RMF tells you how to run the risk management process. Use all three.

  takeaway_05: |
    OWASP LLM Top 10 has six significant limitations: static taxonomy in a
    fast-moving field, conflated exploitability and impact in ranking, prevention
    focus rather than detection focus, limited evidence base, coarse category
    granularity, and gaps in agentic and multimodal coverage. Know the limitations
    to use the framework correctly.

  takeaway_06: |
    OWASP has achieved regulatory integration: EU AI Act Article 15 and Article 9,
    NIST AI RMF Playbook, SOC 2 CC9, and HIPAA Security Rule all align with or
    reference OWASP LLM Top 10 categories. Framing your security programme in
    OWASP terms connects security investment to compliance requirements.

  takeaway_07: |
    The OWASP LLM Top 10 contribution process is public and open. Track the
    GitHub repository for upcoming category changes. Build to MITRE ATLAS
    technique granularity rather than just OWASP category coverage — ATLAS
    tracks emerging techniques faster and provides the precision needed for
    detection rule development.

  takeaway_08: |
    The three-framework integration pipeline is: OWASP (identify the risk
    category) → MITRE ATLAS (identify the techniques) → NIST AI RMF (manage
    the risk) → Chapter 11-15 (build the detection). Each framework answers
    a different question; none answers all of them alone.

