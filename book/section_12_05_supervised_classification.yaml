section_overview:
  one_line_summary: 'Random Forest and XGBoost are the workhorse classifiers of production security ML -- they train in seconds, expose analyst-readable SHAP explanations, and reach 90%+ accuracy once the Section 12.04 dataset crosses 200 labelled examples per class.'
  why_this_section_exists: |
    The anomaly detector in Section 12.03 has been running for four to eight weeks. The
    annotation queue has accumulated 200+ confirmed attack examples. The Section 12.04
    dataset builder has produced a temporally split, SMOTE-treated training set. The
    detection system is ready for its first supervised classifier -- a model that learns
    explicit feature boundaries between attack and benign traffic rather than flagging
    statistical outliers.

    Random Forest and XGBoost are the correct first supervised classifiers for three
    reasons. Both train in seconds on CPU, enabling fast iteration cycles during feature
    engineering and hyperparameter tuning. Both produce full SHAP explainability: every
    prediction comes with a ranked list of the features that drove it, readable by any
    security analyst in under a minute without ML expertise. Both handle the 20-feature
    security vector from Section 12.02 without requiring normalisation or embedding
    infrastructure. And at 200-2000 labelled examples -- the data availability window
    that follows 4-12 weeks of anomaly alert collection -- both outperform the neural
    classifier from Section 12.08, which requires 2000+ examples to generalise reliably.

    Section 12.05 builds both classifiers, trains them on the Section 12.04 dataset,
    evaluates them with the security_evaluator.py harness that every subsequent section
    reuses, and establishes the SHAP explainability pipeline that the Section 12.15
    ensemble uses for analyst-facing alert triage. The benchmark from Section 12.03
    (anomaly detector vs supervised classifier) is completed here: after Section 12.05,
    the detection system has a precision improvement over the anomaly detector that
    justifies the annotation investment.
  position_in_chapter: |
    Section 12.05 is the first supervised training section. It establishes the evaluation
    harness (security_evaluator.py) and explainability pipeline (shap_explainer.py) that
    every subsequent classifier section reuses. Sections 12.06 through 12.09 each import
    security_evaluator.py and compare their classifier against the Section 12.05 Random
    Forest baseline.

learning_objectives:

  knowledge:
    - 'Explain the Random Forest training algorithm: why decorrelated trees are constructed, how Gini impurity drives feature splits, and why ensemble averaging reduces variance'
    - 'Explain the XGBoost training algorithm: how gradient boosting corrects residual errors sequentially and how L1/L2 regularisation prevents overfitting on small security datasets'
    - 'Describe the scale_pos_weight parameter in XGBoost and explain how it addresses class imbalance as an alternative to SMOTE oversampling'
    - 'Explain what SHAP values decompose and why a SHAP waterfall plot is more useful to a security analyst than a global feature importance bar chart'
    - 'State the four evaluation metrics that matter for security classifiers and explain why accuracy is misleading on imbalanced datasets'
    - 'Describe stratified temporal k-fold cross-validation and explain how it prevents leakage while maintaining the temporal ordering of the dataset'

  skills:
    - 'Train a Random Forest classifier on the Section 12.04 temporally split dataset and produce a SHAP summary plot and per-prediction waterfall'
    - 'Train an XGBoost classifier with scale_pos_weight calibrated to the training set imbalance ratio'
    - 'Run an Optuna Bayesian hyperparameter search for both classifiers with a recall-at-precision objective'
    - 'Evaluate both classifiers with security_evaluator.py and produce a comparison report covering precision, recall, F1, ROC-AUC, and inference latency'
    - 'Select the operating threshold from the precision-recall curve at the target false positive rate for the deployment context'

  security_mindset:
    - 'Maximise recall first -- catching more attacks is more important than minimising false positives in the initial deployment; adjust the threshold to bring FPR to an acceptable level after training'
    - 'Treat SHAP explanations as an audit tool: if the top-3 SHAP features for an attack prediction are not structural attack signals, the classifier is detecting an artifact and the feature set needs revision'
    - 'Recognise that 90%+ accuracy on the temporal test set is a floor, not a ceiling -- the production false positive rate is the metric that determines whether the detection system is operationally sustainable'
    - 'Understand that hyperparameter tuning for security classifiers optimises recall at a precision constraint, not raw accuracy -- Optuna must be configured with this objective or it optimises the wrong quantity'

prerequisites:
  - 'Section 12.04: dataset curation -- the temporal split, SMOTE-treated training set, and DatasetConfig consumed throughout'
  - 'Section 12.02: security feature engineering -- SecurityFeatureVector.to_array() is the classifier input'
  - 'Section 12.03: anomaly detection -- IsolationForestDetector baseline that Section 12.05 must outperform'
  - 'Chapter 1 Section 1.07: classification algorithms -- Random Forest and decision tree foundations'
  - 'Chapter 1 Section 1.11: evaluation metrics -- precision, recall, F1, ROC-AUC used throughout'
  - 'Chapter 1 Section 1.13: ensemble methods -- bagging (Random Forest) and boosting (XGBoost) concepts'

prose_content:

  part_1:
    title: 'When Supervised Classification Supersedes Anomaly Detection'
    body: |
      The transition from anomaly detection to supervised classification is not a replacement
      but an augmentation. The trigger is the size of the labelled dataset from Section 12.04.
      At 200+ labelled attack examples and 200+ labelled benign examples, a Random Forest
      trained on the temporal split training set will outperform the Isolation Forest in
      precision at matched recall by 2-5 percentage points. At 500+ per class, the advantage
      grows to 5-10 percentage points. The operational consequence is significant: at 10,000
      requests per day, a 5 percentage point precision improvement at matched recall reduces
      the daily false positive alert volume from 200 to 100 -- halving the analyst review
      burden.

      The supervised classifier replaces the anomaly detector in the primary detection
      position (highest-confidence, first-response alert) while the anomaly detector
      continues running in the background for novel-variant detection and dataset collection.
      This is the dual-layer architecture that the Section 12.15 ensemble formalises: the
      supervised classifier handles known attack patterns with precision; the anomaly detector
      handles unknown variants with coverage.

      The data readiness check before training has three gates. First, 200+ labelled attack
      examples in the temporal training split (not counting SMOTE-generated synthetics).
      Second, the temporal test set must contain attack examples collected after all training
      examples -- not just the newest 15% of the dataset by count, but the newest 15% by
      timestamp. Third, the inter-annotator agreement from Section 12.04 must have passed
      kappa >= 0.80 on the calibration set. If any gate fails, the Section 12.03 anomaly
      detector continues as the sole ML detector until the gate condition is met.

  part_2:
    title: 'Random Forest: Algorithm, Configuration, and Security Application'
    body: |
      Random Forest trains an ensemble of decision trees where each tree is trained on a
      bootstrap sample of the training data and each split considers only a random subset
      of features. These two sources of randomness -- bootstrap sampling and feature
      subsetting -- decorrelate the individual trees. The ensemble prediction (majority vote
      for classification, mean probability for probability output) averages over the
      decorrelated trees, reducing variance relative to any single tree without increasing
      bias. The result is a robust classifier that handles noisy features, collinear features,
      and moderate class imbalance without special treatment beyond class_weight.

      For the security feature vector from Section 12.02, the key hyperparameters are
      n_estimators (number of trees), max_depth (maximum tree depth per tree), and
      min_samples_split (minimum samples required to split an internal node). n_estimators
      should be set high enough that the ensemble has stabilised -- 200 trees is the practical
      minimum; performance marginal improvement above 500. max_depth controls overfitting:
      deep trees memorise the training set; shallow trees underfit. For the 20-feature security
      vector with 200-2000 training examples, max_depth between 5 and 15 is the appropriate
      range. min_samples_split prevents the tree from splitting on single-example nodes,
      which is important for preventing overfitting on the sparse attack class.

      Gini impurity is the standard split criterion for Random Forest classification. At each
      split, the algorithm selects the feature and split value that minimise the weighted
      average Gini impurity of the resulting child nodes. For the security feature vector,
      role_boundary_marker (a binary feature) will typically produce a near-perfect Gini split
      when it is present in the training data -- it is zero for almost all benign examples
      and non-zero for most injection attacks. This makes it a dominant first-level split
      feature, which is the correct behaviour: a role boundary marker in a user-turn message
      is a strong binary signal.

      class_weight='balanced' is the standard imbalance treatment for Random Forest when
      SMOTE was not applied to the training set. It computes weights inversely proportional
      to class frequency and applies them during the Gini impurity computation, effectively
      overweighting misclassified attack examples relative to misclassified benign examples.
      When SMOTE was applied (the default recommendation from Section 12.04 for 100+ attack
      examples), class_weight is not needed -- the SMOTE-augmented training set is already
      more balanced.

  part_3:
    title: 'XGBoost: Gradient Boosting with Regularisation for Security Detection'
    body: |
      XGBoost fits an ensemble of decision trees sequentially, where each new tree corrects
      the residual errors of the previous ensemble. At each iteration, the algorithm computes
      the gradient and Hessian of the loss function with respect to the current ensemble's
      predictions, and fits the next tree to minimise the loss using these second-order
      statistics. The result is a classifier that iteratively reduces bias while the
      regularisation terms (L1 and L2 penalties on tree weights) control overfitting.

      For security datasets where the training set is small (200-1000 examples) and the
      attack class is underrepresented, XGBoost's regularisation terms are the primary
      hyperparameter concern. A high learning rate with many estimators overfits rapidly.
      The correct configuration is a low learning rate (0.05-0.10), a high number of
      estimators (500-1000), and early stopping based on validation set performance.
      This configuration is equivalent to shrinkage regularisation: the model learns slowly
      and stops before it memorises the training set.

      The scale_pos_weight parameter is XGBoost's built-in class imbalance treatment.
      Setting scale_pos_weight to the ratio of negative (benign) examples to positive
      (attack) examples in the training set is equivalent to class_weight='balanced' in
      scikit-learn: it upweights the gradient contribution of misclassified attack examples.
      For a 1:20 imbalanced training set, scale_pos_weight=20 is the correct starting point.
      When SMOTE has already been applied to the training set, scale_pos_weight should be
      left at its default (1.0) -- applying both SMOTE and scale_pos_weight double-counts
      the imbalance treatment and pushes the classifier toward excessive attack predictions.

      XGBoost typically outperforms Random Forest on security datasets when the number of
      labelled examples is between 500 and 2000 per class, the feature interactions are
      non-linear (which the sequential boosting captures better than the averaging ensemble),
      and regularisation is tuned correctly. Below 500 examples, Random Forest's robustness
      to noise tends to produce lower false positive rates on the test set. Above 2000
      examples, DistilBERT from Section 12.08 becomes competitive. The hyperparameter tuner
      in deliverable_3 evaluates both simultaneously and selects the best model for the
      current dataset size.

  part_4:
    title: 'SHAP Explainability: From Feature Importance to Analyst-Readable Alerts'
    body: |
      Global feature importance -- the Gini-based or gain-based ranking of which features
      contributed most to the model across all training examples -- tells the detection
      engineer which features the model relies on most. It does not tell the analyst why a
      specific request was flagged. An analyst who receives an alert with only a probability
      score and a global feature importance ranking cannot reproduce the detection reasoning
      or explain it to a security operations team.

      SHAP (SHapley Additive exPlanations, Lundberg and Lee 2017) decomposes each individual
      prediction into additive feature contributions: the prediction is the base rate (mean
      training prediction) plus the sum of each feature's SHAP value. A positive SHAP value
      for a feature means that feature pushed the prediction toward attack; a negative SHAP
      value means it pushed toward benign. The magnitude indicates how much.

      For a flagged request with anomaly_score=0.87, the SHAP waterfall shows:
      base_rate=0.12 (the average attack probability in the training set), plus
      role_boundary_marker=+0.41 (the role marker strongly indicates attack), plus
      instruction_keyword_freq=+0.22 (elevated keyword frequency), plus
      prior_refusal_count=+0.08 (one prior refusal in the session), plus
      sequence_length=-0.05 (the request is shorter than typical attacks), equals 0.78
      (the model's attack probability before thresholding). This decomposition is immediately
      readable by a security analyst who knows the feature names: the request was flagged
      primarily because it contains a role boundary marker and elevated instruction keyword
      frequency, with a prior refusal providing additional context.

      SHAP TreeExplainer is the correct explainer class for Random Forest and XGBoost. It
      uses the tree structure to compute exact SHAP values in polynomial time without
      sampling approximations. For the 20-feature security vector with 200-tree Random
      Forest, SHAP value computation takes 2-5ms per prediction on CPU -- within the
      gateway latency budget when computed asynchronously after the alert decision is made.
      SHAP values are computed for every alert-tier prediction (not for pass-through requests)
      and stored alongside the prediction in the annotation queue.

  part_5:
    title: 'Evaluation: Metrics That Matter for Security Classifiers'
    body: |
      The four metrics that matter for security classifiers are precision, recall, ROC-AUC,
      and the false positive rate at the production operating threshold. Accuracy is excluded
      because it is misleading on imbalanced datasets: a classifier that predicts benign for
      every request achieves 95-99% accuracy on a 1:20 to 1:100 imbalanced test set while
      providing zero detection value.

      Recall (true positive rate) is the primary optimisation target. Every attack that
      the classifier misses is an attack that reaches the model undetected. The cost of a
      missed attack -- a successful jailbreak, an executed injection -- is higher than the
      cost of a false positive alert that an analyst reviews and dismisses. The correct
      operating posture for a security classifier is to maximise recall subject to a false
      positive rate constraint, not to balance precision and recall symmetrically.

      The false positive rate at the operating threshold determines the analyst alert volume.
      At 10,000 requests per day and a 1% false positive rate, the classifier generates 100
      false positive alerts per day. If analyst review capacity is 50 alerts per day, a 1%
      FPR is unsustainable. The operating threshold must be set to bring the FPR below the
      analyst capacity limit, even if this reduces recall. The precision-recall curve from
      security_evaluator.py plots the full tradeoff and the threshold_tuner from Section
      12.10 formalises the threshold selection.

      Stratified temporal k-fold cross-validation extends the temporal split methodology
      from Section 12.04 to hyperparameter tuning. For each fold, the training split
      contains earlier examples and the validation split contains later examples, maintaining
      temporal ordering within each fold. Stratification ensures the attack class is
      represented in each validation fold -- without stratification, a fold whose validation
      window coincides with a low-attack period will have no attack examples and produce
      useless recall measurements.

  part_6:
    title: 'Model Selection: Random Forest vs XGBoost for the Current Dataset'
    body: |
      The hyperparameter tuner in deliverable_3 produces the best configuration for both
      Random Forest and XGBoost on the current dataset. The model selection decision is made
      from the evaluation harness output on the temporal test set, not from the cross-
      validation objective alone. The cross-validation objective guides hyperparameter
      selection within each model family; the test set result determines which family to
      deploy.

      Three test set metrics determine the selection. First, precision at 90% recall: the
      classifier with higher precision at 90% recall produces fewer false positive alerts
      for the same attack coverage. Second, inference latency: both classifiers should be
      sub-5ms for the 20-feature vector, but XGBoost with many estimators can be 2-3x
      slower than Random Forest on CPU due to the sequential tree structure. Third,
      calibration quality: the classifier whose predicted probabilities better match the
      actual attack rate in the test set requires less post-hoc calibration work in
      Section 12.10.

      In practice, Random Forest is the more reliable default for security datasets in the
      200-500 example range. Its variance reduction through averaging makes it robust to
      the label noise that is common in early-stage annotation queues. XGBoost's sequential
      boosting amplifies the signal from every training example -- including mislabelled
      ones -- which can reduce performance when inter-annotator agreement is imperfect.
      Above 500 examples with confirmed high annotation quality (kappa > 0.85), XGBoost
      typically matches or exceeds Random Forest performance and should be evaluated
      alongside it.

      Both classifiers are retained in the Section 12.15 ensemble regardless of which
      performs better individually. The ensemble benefits from their different error
      profiles: Random Forest makes errors on edge cases near the decision boundary;
      XGBoost makes errors on training-distribution tail examples. Their errors are
      partially independent, and the ensemble's combined precision exceeds either
      classifier alone.

