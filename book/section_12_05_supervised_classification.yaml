    title: 'SHAP Explainer'
    filename: 'shap_explainer.py'
    description: 'SHAP summary plots and per-prediction waterfall charts for analyst-readable security classifier explanations. Produces a global importance summary, a per-prediction waterfall for any flagged request, and a security audit report checking whether structural features outrank surface token features in the global ranking.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: shap, matplotlib, numpy.'
    code: |
      # shap_explainer.py
      # Section 12.05: SHAP Explainability for Security Classifiers
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from typing import Any, Dict, List, Optional, Tuple

      import numpy as np
      import matplotlib.pyplot as plt
      import shap

      STRUCTURAL_FEATURES = {'role_boundary_marker', 'code_block_density', 'code_block_count', 'bracket_density'}
      SURFACE_FEATURES = {'sequence_length', 'word_count', 'token_entropy'}


      def compute_shap_values(
          model: Any,
          X: np.ndarray,
          feature_names: List[str],
      ) -> Tuple[shap.TreeExplainer, np.ndarray]:
          explainer = shap.TreeExplainer(model)
          sv = explainer.shap_values(X)
          if isinstance(sv, list):
              sv = sv[1]  # binary classification: take attack class
          return explainer, sv


      def global_importance(
          shap_values: np.ndarray,
          feature_names: List[str],
          top_n: int = 15,
      ) -> List[Tuple[str, float]]:
          mean_abs = np.abs(shap_values).mean(axis=0)
          ranked = sorted(zip(feature_names, mean_abs), key=lambda x: -x[1])
          return ranked[:top_n]


      def plot_summary(
          shap_values: np.ndarray,
          X: np.ndarray,
          feature_names: List[str],
          save_path: str = 'shap_summary.png',
          top_n: int = 15,
      ) -> None:
          shap.summary_plot(shap_values, X, feature_names=feature_names,
                            max_display=top_n, show=False)
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          plt.close()
          print(f'Saved SHAP summary: {save_path}')


      def plot_waterfall(
          explainer: shap.TreeExplainer,
          X_single: np.ndarray,
          feature_names: List[str],
          save_path: str = 'shap_waterfall.png',
      ) -> Dict[str, float]:
          '''Plot SHAP waterfall for a single prediction. Returns feature contribution dict.'''
          sv = explainer.shap_values(X_single)
          if isinstance(sv, list):
              sv = sv[1]
          contrib = dict(zip(feature_names, sv[0].tolist()))

          # Sort by absolute contribution for waterfall
          sorted_contribs = sorted(contrib.items(), key=lambda x: abs(x[1]), reverse=True)[:10]
          names = [c[0] for c in sorted_contribs]
          values = [c[1] for c in sorted_contribs]
          colours = ['#ff6b6b' if v > 0 else '#51cf66' for v in values]

          fig, ax = plt.subplots(figsize=(9, 5))
          ax.barh(names[::-1], values[::-1], color=colours[::-1])
          ax.axvline(0, color='black', lw=0.8)
          ax.set_xlabel('SHAP value (contribution to attack probability)')
          ax.set_title('SHAP Waterfall: Per-Feature Contribution')
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          plt.close()
          print(f'Saved SHAP waterfall: {save_path}')
          return contrib


      def security_audit(ranking: List[Tuple[str, float]]) -> Dict[str, Any]:
          top_10 = {name for name, _ in ranking[:10]}
          structural_present = STRUCTURAL_FEATURES & top_10
          surface_dominant = len(SURFACE_FEATURES & {name for name, _ in ranking[:3]}) >= 2
          findings = []
          if not structural_present:
              findings.append('WARN: No structural features in top 10 -- classifier may be detecting length artifacts.')
          if surface_dominant:
              findings.append('WARN: Surface features dominate top 3 -- easily evaded by payload padding.')
          if structural_present and not surface_dominant:
              findings.append('OK: Structural features present in top 10; surface features not dominant.')
          return {
              'passed': bool(structural_present) and not surface_dominant,
              'structural_in_top_10': sorted(structural_present),
              'findings': findings,
          }


      def print_shap_report(
          ranking: List[Tuple[str, float]],
          audit: Dict[str, Any],
      ) -> None:
          print('SHAP Global Importance:')
          for i, (name, val) in enumerate(ranking, 1):
              tag = ' [STRUCTURAL]' if name in STRUCTURAL_FEATURES else (' [SURFACE]' if name in SURFACE_FEATURES else '')
              bar = '#' * min(int(val * 200), 40)
              print(f'  {i:>2}. {name:<35} {val:.4f}  {bar}{tag}')
          print(f'\nSecurity Audit: {"PASS" if audit["passed"] else "FAIL"}')
          for f in audit['findings']:
              print(f'  {f}')


      if __name__ == '__main__':
          from sklearn.ensemble import RandomForestClassifier
          rng = np.random.default_rng(42)
          n_features = 20
          feature_names = [
              'sequence_length', 'word_count', 'special_char_density',
              'instruction_keyword_freq', 'token_entropy', 'uppercase_ratio',
              'role_boundary_marker', 'code_block_count', 'code_block_density',
              'bracket_density', 'quotation_density',
              'centroid_cosine_dist_min', 'benign_cosine_dist', 'embedding_l2_norm',
              'turn_number', 'prior_refusal_count', 'session_request_rate',
              'temperature', 'streaming_flag', 'is_default_model',
          ]
          X = np.vstack([rng.normal(0.1, 0.05, (200, n_features)), rng.normal(0.6, 0.1, (40, n_features))])
          X[:, 6] = np.where(np.arange(240) >= 200, 1.0, 0.0)  # role_boundary_marker
          y = np.array([0] * 200 + [1] * 40)
          model = RandomForestClassifier(n_estimators=100, random_state=42, class_weight='balanced')
          model.fit(X, y)

          explainer, sv = compute_shap_values(model, X, feature_names)
          ranking = global_importance(sv, feature_names)
          audit = security_audit(ranking)
          print_shap_report(ranking, audit)

          # Waterfall for a single attack example
          plot_waterfall(explainer, X[200:201], feature_names)

common_mistakes:

  mistake_1:
    description: 'Applying both SMOTE on the training set and scale_pos_weight in XGBoost, double-counting the imbalance treatment and pushing the classifier toward excessive attack predictions'
    why_it_happens: |
      The engineer reads the Section 12.04 recommendation to apply SMOTE and the XGBoost
      documentation recommending scale_pos_weight for imbalanced datasets. Both seem like
      good ideas; applying both seems like belt-and-suspenders safety. It is not.
    consequence: |
      After SMOTE the training set attack:benign ratio is approximately 1:2. Setting
      scale_pos_weight=20 (the original imbalance ratio) tells XGBoost to upweight attack
      examples by a factor of 20 on an already nearly balanced dataset. The classifier
      aggressively predicts attack, producing recall near 1.0 and precision near the base
      rate of attacks in the test set. The false positive rate on production traffic
      is unsustainably high.
    correct_approach: |
      Apply one imbalance treatment, not both. If SMOTE was applied to the training set,
      set scale_pos_weight=1.0 in XGBoost (the default). If SMOTE was not applied (fewer
      than 100 attack examples), set scale_pos_weight=n_benign/n_attack and do not run
      SMOTE. The auto_scale_pos_weight parameter in xgboost_classifier.py handles this
      correctly when called after a SMOTE-treated training set is passed.

  mistake_2:
    description: 'Reporting accuracy as the primary evaluation metric and claiming 98% accuracy as production-ready performance'
    why_it_happens: |
      The security_evaluator.py harness computes six metrics. The engineer focuses on
      accuracy because it is the metric they are most familiar with and the one that
      produces the highest-looking number on an imbalanced test set.
    consequence: |
      A test set with 190 benign and 10 attack examples has a 95% accuracy baseline for
      a classifier that predicts benign for every request. A genuinely trained classifier
      may reach 98% accuracy while catching only 5 of 10 attacks (50% recall). The 98%
      accuracy is reported as production-ready; the 50% recall that means half of all
      attacks reach the model undetected is not reported.
    correct_approach: |
      Report recall, precision, and FPR at the operating threshold as the primary metrics.
      Accuracy is not reported for security classifiers. The security_evaluator.py harness
      intentionally does not compute accuracy. The compare_classifiers() function sorts
      by recall, not accuracy, to enforce the c

  mistake_3:
    description: 'Setting the operating threshold at the default 0.5 without calibrating it to the analyst capacity constraint'
    why_it_happens: |
      The classifier is trained with a default threshold of 0.5. The evaluation harness
      uses 0.5. The production gateway uses 0.5. This is the sklearn convention and it
      carries through every step without being questioned.
    consequence: |
      At 0.5 threshold and 10,000 requests per day, the false positive rate at 0.5 may
      produce 300 FP alerts per day against a 50-alert analyst capacity. The gateway is
      flooded with alerts, analysts stop reviewing them, and the detection system is
      effectively disabled within a week.
    correct_approach: |
      Use the precision-recall curve from security_evaluator.py to select the operating
      threshold explicitly. The threshold_tuner.py in Section 12.10 formalises this
      selection. Always set the threshold before the first production deployment, not
      after the first alert flood.

  mistake_4:
    description: 'Using standard k-fold cross-validation instead of temporal k-fold, allowing future examples to appear in training folds'
    why_it_happens: |
      Optuna default cross-validation uses sklearn KFold with shuffle=True. The engineer
      uses the Optuna example code without modifying the cross-validation strategy and
      produces optimistically-biased hyperparameter selection results.
    consequence: |
      Hyperparameters selected by standard k-fold are optimised for generalisation to
      data from the same time window as training data, not to future traffic. The selected
      hyperparameters produce a classifier that performs well on cross-validation and
      degrades on the temporal test set. The temporal test set performance is the correct
      proxy for production performance; cross-validation performance is not.
    correct_approach: |
      The hyperparameter_tuner.py in deliverable_3 uses the validation split from the
      Section 12.04 temporal split as the evaluation set for every Optuna trial, not
      cross-validation. This ensures hyperparameter selection is evaluated on data that
      is temporally later than the training data for every trial.

  mistake_5:
    description: 'Treating classifier training as a one-time activity without setting up the retraining infrastructure before the attack distribution shifts'
    why_it_happens: |
      Training takes a day of engineering work. Once deployed, the classifier performs
      well for 4-8 weeks. The engineer moves on to other sections and does not set up
      the retraining infrastructure before the classifier needs it.
    consequence: |
      When the attack distribution shifts, the classifier recall drops silently. The
      feature distribution monitor fires, but the retraining infrastructure does not
      exist to act on it. Retraining is done manually without registry integration,
      without shadow-mode validation, without canary promotion. One step produces a
      regression; without the registry there is no rollback.
    correct_approach: |
      Set up the Section 12.13 model registry before the first classifier is deployed.
      Set up the Section 12.14 live curation pipeline before the first retraining
      trigger fires. The correct sequencing: train classifier (12.05), register it
      (12.13), deploy curation pipeline (12.14), then continue detection engineering
      knowing the retraining infrastructure is in place.

section_summary:

  compact: |
    Random Forest and XGBoost are the first supervised classifiers in Chapter 12 and the
    workhorses of the detection system for the 200-2000 labelled example range. Random
    Forest trains an ensemble of decorrelated trees via bootstrap sampling and feature
    subsetting, is robust to label noise, and trains in seconds. XGBoost fits trees
    sequentially with gradient boosting and regularisation, reaching higher accuracy
    above 500 labelled examples at the cost of sensitivity to label noise. Both produce
    full SHAP explainability via TreeExplainer: every prediction decomposes into signed
    per-feature contributions readable by a security analyst without ML expertise.
    Evaluation uses precision, recall, ROC-AUC, and FPR at the operating threshold --
    never accuracy. The operating threshold is calibrated to the analyst capacity
    constraint, not left at the default 0.5. The security_evaluator.py harness is
    imported by every subsequent section for consistent cross-classifier benchmarking.

  key_takeaways:
    - 'Random Forest is the correct default for 200-500 labelled examples: robust to label noise, sub-3ms inference, and full SHAP explainability -- all three properties matter more than peak accuracy in the early deployment stage'
    - 'XGBoost outperforms Random Forest above 500 labelled examples when annotation quality is high (kappa > 0.85); below this, its boosting amplifies label noise and degrades precision'
    - 'Apply one imbalance treatment only: SMOTE on the training set OR scale_pos_weight in XGBoost -- never both; double-counting pushes the classifier to predict attack for the majority of requests'
    - 'The operating threshold must be calibrated to the analyst capacity constraint before the first production deployment -- a default 0.5 threshold on a 1:20 imbalanced dataset will flood the annotation queue'
    - 'SHAP explanations are an audit tool: if role_boundary_marker and code_block_density are not in the top-5 SHAP features for attack predictions, the classifier is measuring an artifact rather than the attack mechanism'
    - 'The security_evaluator.py harness is the benchmark baseline for every classifier section through 12.17 -- every new detector must outperform Random Forest on recall at matched precision to justify its additional complexity'

preview_section_12_06:
  title: 'Section 12.06: Sequence Models -- LSTM and GRU for Multi-Turn Conversation Threat Detection'
  summary: |
    Section 12.06 extends supervised classification into the temporal dimension. Random
    Forest and XGBoost from Section 12.05 classify individual API requests in isolation.
    Multi-turn jailbreak attacks fragment the payload across turns, each innocuous
    individually but constituting an attack in sequence. The GRU sequence detector reads
    the full conversation history as a variable-length sequence of SecurityFeatureVectors
    and classifies the conversation, not the turn. Attention weights over turns identify
    which turns carried the attack signal. The LSTM covers the more expressive gating
    mechanism; the GRU is preferred for conversations shorter than 20 turns due to faster
    training and matched accuracy with fewer parameters.

