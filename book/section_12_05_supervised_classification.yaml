deliverables:

  deliverable_1:
    title: 'Random Forest Classifier'
    filename: 'random_forest_classifier.py'
    description: 'Random Forest prompt injection and jailbreak classifier for LLM API security. Trains on the Section 12.04 temporally split dataset, produces calibrated probability scores, generates SHAP feature importance, and exports the trained model to the Section 12.13 registry. Includes a predict_with_explanation() method that returns both the alert decision and its SHAP waterfall for analyst review.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: scikit-learn, shap, numpy, pandas. Imports from security_feature_extractor.py (Section 12.02) and security_dataset_builder.py (Section 12.04).'
    code: |
      # random_forest_classifier.py
      # Section 12.05: Random Forest Security Classifier
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import time
      from dataclasses import dataclass
      from pathlib import Path
      from typing import Dict, List, Optional, Tuple

      import numpy as np
      import pandas as pd
      import shap
      from sklearn.ensemble import RandomForestClassifier
      from sklearn.metrics import (
          precision_score, recall_score, f1_score,
          roc_auc_score, confusion_matrix,
      )

      from security_feature_extractor import (
          APIRequestContext,
          SecurityFeatureVector,
          extract_features,
          FEATURE_SCHEMA_VERSION,
      )


      @dataclass
      class ClassifierPrediction:
          request_text: str
          attack_probability: float
          is_attack: bool
          threshold: float
          feature_schema_version: str
          shap_contributions: Optional[Dict[str, float]]
          inference_ms: float


      class RandomForestSecurityClassifier:
          '''
          Random Forest classifier for LLM API security detection.

          Trains on the Section 12.04 temporally split dataset.
          Produces calibrated probability scores and SHAP explanations.
          '''

          def __init__(
              self,
              n_estimators: int = 300,
              max_depth: Optional[int] = 10,
              min_samples_split: int = 10,
              class_weight: str = 'balanced',
              random_state: int = 42,
              operating_threshold: float = 0.5,
          ) -> None:
              self.model = RandomForestClassifier(
                  n_estimators=n_estimators,
                  max_depth=max_depth,
                  min_samples_split=min_samples_split,
                  class_weight=class_weight,
                  random_state=random_state,
                  n_jobs=-1,
              )
              self.operating_threshold = operating_threshold
              self._trained = False
              self._feature_names: List[str] = []
              self._explainer: Optional[shap.TreeExplainer] = None
              self._schema_version = FEATURE_SCHEMA_VERSION

          # ------------------------------------------------------------------
          # Training
          # ------------------------------------------------------------------

          def fit(
              self,
              train_df: pd.DataFrame,
              feature_names: List[str],
          ) -> 'RandomForestSecurityClassifier':
              '''
              Train on the temporal training split from Section 12.04.
              train_df must have columns matching feature_names plus 'label'.
              '''
              self._feature_names = feature_names
              X = train_df[feature_names].values.astype(np.float32)
              y = train_df['label'].values

              start = time.time()
              self.model.fit(X, y)
              elapsed = time.time() - start

              self._trained = True
              self._explainer = shap.TreeExplainer(self.model)

              n_attack = int((y == 1).sum())
              n_benign = int((y == 0).sum())
              print(
                  f'RandomForestClassifier trained in {elapsed:.2f}s '
                  f'({n_attack} attack, {n_benign} benign, '
                  f'{self.model.n_estimators} trees, max_depth={self.model.max_depth})'
              )
              return self

          # ------------------------------------------------------------------
          # Inference
          # ------------------------------------------------------------------

          def predict_proba_array(self, X: np.ndarray) -> np.ndarray:
              assert self._trained
              return self.model.predict_proba(X)[:, 1]

          def predict(self, ctx: APIRequestContext, explain: bool = True) -> ClassifierPrediction:
              assert self._trained
              t0 = time.time()
              fv = extract_features(ctx)
              arr = fv.to_array().reshape(1, -1)
              prob = float(self.model.predict_proba(arr)[0, 1])
              is_attack = prob >= self.operating_threshold

              shap_contribs: Optional[Dict[str, float]] = None
              if explain and is_attack and self._explainer is not None:
                  raw = self._explainer.shap_values(arr)
                  # For binary classification, shap_values returns [class_0, class_1]
                  sv = raw[1][0] if isinstance(raw, list) else raw[0]
                  shap_contribs = dict(zip(self._feature_names, sv.tolist()))

              return ClassifierPrediction(
                  request_text=ctx.message_text[:200],
                  attack_probability=prob,
                  is_attack=is_attack,
                  threshold=self.operating_threshold,
                  feature_schema_version=fv.schema_version,
                  shap_contributions=shap_contribs,
                  inference_ms=(time.time() - t0) * 1000,
              )

          # ------------------------------------------------------------------
          # Evaluation
          # ------------------------------------------------------------------

          def evaluate(
              self,
              test_df: pd.DataFrame,
              feature_names: List[str],
          ) -> Dict[str, float]:
              assert self._trained
              X = test_df[feature_names].values.astype(np.float32)
              y_true = test_df['label'].values
              y_prob = self.predict_proba_array(X)
              y_pred = (y_prob >= self.operating_threshold).astype(int)

              metrics = {
                  'precision': float(precision_score(y_true, y_pred, zero_division=0)),
                  'recall': float(recall_score(y_true, y_pred, zero_division=0)),
                  'f1': float(f1_score(y_true, y_pred, zero_division=0)),
                  'roc_auc': float(roc_auc_score(y_true, y_prob)),
                  'fpr': float((y_pred[y_true == 0] == 1).mean()) if (y_true == 0).any() else 0.0,
                  'threshold': self.operating_threshold,
                  'n_test': len(y_true),
                  'n_attack_test': int((y_true == 1).sum()),
              }
              return metrics

          def feature_importance_ranking(self, top_n: int = 10) -> List[Tuple[str, float]]:
              assert self._trained
              importances = self.model.feature_importances_
              ranked = sorted(
                  zip(self._feature_names, importances),
                  key=lambda x: x[1], reverse=True,
              )
              return ranked[:top_n]

          # ------------------------------------------------------------------
          # Persistence
          # ------------------------------------------------------------------

          def save(self, path: str) -> None:
              import pickle
              with open(path, 'wb') as f:
                  pickle.dump(self, f)
              print(f'Saved RandomForestClassifier -> {path}')

          @staticmethod
          def load(path: str) -> 'RandomForestSecurityClassifier':
              import pickle
              with open(path, 'rb') as f:
                  return pickle.load(f)


