  deliverable_2:
    title: 'XGBoost Classifier'
    filename: 'xgboost_classifier.py'
    description: 'XGBoost attack classifier with scale_pos_weight imbalance handling, early stopping, and SHAP explainability. Same evaluate() and predict() interface as the Random Forest classifier for direct comparison in the Section 12.16 benchmark harness.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: xgboost, shap, numpy, pandas, scikit-learn.'
    code: |
      # xgboost_classifier.py
      # Section 12.05: XGBoost Security Classifier
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import time
      from dataclasses import dataclass
      from typing import Dict, List, Optional, Tuple

      import numpy as np
      import pandas as pd
      import shap
      import xgboost as xgb
      from sklearn.metrics import (
          precision_score, recall_score, f1_score,
          roc_auc_score,
      )

      from security_feature_extractor import (
          APIRequestContext, extract_features, FEATURE_SCHEMA_VERSION,
      )
      from random_forest_classifier import ClassifierPrediction


      class XGBoostSecurityClassifier:
          '''
          XGBoost classifier for LLM API security detection.

          scale_pos_weight handles class imbalance without SMOTE.
          Do NOT set scale_pos_weight when the training set has already been
          SMOTE-augmented -- use the default value of 1.0 instead.
          '''

          def __init__(
              self,
              n_estimators: int = 500,
              max_depth: int = 5,
              learning_rate: float = 0.05,
              subsample: float = 0.8,
              colsample_bytree: float = 0.8,
              scale_pos_weight: float = 1.0,
              reg_alpha: float = 0.1,
              reg_lambda: float = 1.0,
              operating_threshold: float = 0.5,
              early_stopping_rounds: int = 30,
              random_state: int = 42,
          ) -> None:
              self.params = dict(
                  n_estimators=n_estimators,
                  max_depth=max_depth,
                  learning_rate=learning_rate,
                  subsample=subsample,
                  colsample_bytree=colsample_bytree,
                  scale_pos_weight=scale_pos_weight,
                  reg_alpha=reg_alpha,
                  reg_lambda=reg_lambda,
                  random_state=random_state,
                  eval_metric='aucpr',
                  use_label_encoder=False,
                  verbosity=0,
              )
              self.early_stopping_rounds = early_stopping_rounds
              self.operating_threshold = operating_threshold
              self.model = xgb.XGBClassifier(**self.params)
              self._trained = False
              self._feature_names: List[str] = []
              self._explainer: Optional[shap.TreeExplainer] = None
              self._schema_version = FEATURE_SCHEMA_VERSION

          @staticmethod
          def compute_scale_pos_weight(y_train: np.ndarray) -> float:
              '''Compute scale_pos_weight from training label array.'''
              n_neg = int((y_train == 0).sum())
              n_pos = int((y_train == 1).sum())
              spw = n_neg / max(n_pos, 1)
              print(f'  Computed scale_pos_weight: {spw:.2f} ({n_neg} benign / {n_pos} attack)')
              return spw

          def fit(
              self,
              train_df: pd.DataFrame,
              val_df: pd.DataFrame,
              feature_names: List[str],
              auto_scale_pos_weight: bool = True,
          ) -> 'XGBoostSecurityClassifier':
              self._feature_names = feature_names
              X_train = train_df[feature_names].values.astype(np.float32)
              y_train = train_df['label'].values
              X_val = val_df[feature_names].values.astype(np.float32)
              y_val = val_df['label'].values

              if auto_scale_pos_weight and self.params['scale_pos_weight'] == 1.0:
                  spw = self.compute_scale_pos_weight(y_train)
                  self.model.set_params(scale_pos_weight=spw)

              t0 = time.time()
              self.model.fit(
                  X_train, y_train,
                  eval_set=[(X_val, y_val)],
                  early_stopping_rounds=self.early_stopping_rounds,
                  verbose=False,
              )
              elapsed = time.time() - t0
              self._trained = True
              self._explainer = shap.TreeExplainer(self.model)

              print(
                  f'XGBoostClassifier trained in {elapsed:.2f}s '
                  f'(best_iteration={self.model.best_iteration})'
              )
              return self

          def predict_proba_array(self, X: np.ndarray) -> np.ndarray:
              assert self._trained
              return self.model.predict_proba(X)[:, 1]

          def predict(self, ctx: APIRequestContext, explain: bool = True) -> ClassifierPrediction:
              assert self._trained
              t0 = time.time()
              fv = extract_features(ctx)
              arr = fv.to_array().reshape(1, -1)
              prob = float(self.model.predict_proba(arr)[0, 1])
              is_attack = prob >= self.operating_threshold

              shap_contribs = None
              if explain and is_attack and self._explainer is not None:
                  sv = self._explainer.shap_values(arr)[0]
                  shap_contribs = dict(zip(self._feature_names, sv.tolist()))

              return ClassifierPrediction(
                  request_text=ctx.message_text[:200],
                  attack_probability=prob,
                  is_attack=is_attack,
                  threshold=self.operating_threshold,
                  feature_schema_version=fv.schema_version,
                  shap_contributions=shap_contribs,
                  inference_ms=(time.time() - t0) * 1000,
              )

          def evaluate(self, test_df: pd.DataFrame, feature_names: List[str]) -> Dict[str, float]:
              assert self._trained
              X = test_df[feature_names].values.astype(np.float32)
              y_true = test_df['label'].values
              y_prob = self.predict_proba_array(X)
              y_pred = (y_prob >= self.operating_threshold).astype(int)
              return {
                  'precision': float(precision_score(y_true, y_pred, zero_division=0)),
                  'recall': float(recall_score(y_true, y_pred, zero_division=0)),
                  'f1': float(f1_score(y_true, y_pred, zero_division=0)),
                  'roc_auc': float(roc_auc_score(y_true, y_prob)),
                  'fpr': float((y_pred[y_true == 0] == 1).mean()) if (y_true == 0).any() else 0.0,
                  'threshold': self.operating_threshold,
                  'n_test': len(y_true),
                  'n_attack_test': int((y_true == 1).sum()),
              }

          def save(self, path: str) -> None:
              import pickle
              with open(path, 'wb') as f:
                  pickle.dump(self, f)
              print(f'Saved XGBoostClassifier -> {path}')

          @staticmethod
          def load(path: str) -> 'XGBoostSecurityClassifier':
              import pickle
              with open(path, 'rb') as f:
                  return pickle.load(f)


      if __name__ == '__main__':
          rng = np.random.default_rng(42)
          n_features = 20
          feature_names = [f'feat_{i}' for i in range(n_features)]
          n_b, n_a = 400, 80
          X = np.vstack([rng.normal(0.1, 0.05, (n_b, n_features)), rng.normal(0.6, 0.1, (n_a, n_features))])
          y = np.array([0] * n_b + [1] * n_a)

          train_df = pd.DataFrame(X[:380], columns=feature_names); train_df['label'] = y[:380]
          val_df = pd.DataFrame(X[380:430], columns=feature_names); val_df['label'] = y[380:430]
          test_df = pd.DataFrame(X[430:], columns=feature_names); test_df['label'] = y[430:]

          clf = XGBoostSecurityClassifier(n_estimators=300, learning_rate=0.05)
          clf.fit(train_df, val_df, feature_names, auto_scale_pos_weight=True)
          metrics = clf.evaluate(test_df, feature_names)
          print('\nXGBoost evaluation:')
          for k, v in metrics.items():
              print(f'  {k}: {v:.4f}' if isinstance(v, float) else f'  {k}: {v}')

  deliverable_3:
    title: 'Hyperparameter Tuner'
    filename: 'hyperparameter_tuner.py'
    description: 'Optuna Bayesian hyperparameter search for Random Forest and XGBoost classifiers with a recall-at-precision objective. Evaluates both model families simultaneously on the temporal validation set and returns the best configuration and model family for the current dataset.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: optuna, scikit-learn, xgboost, numpy, pandas.'
    code: |
      # hyperparameter_tuner.py
      # Section 12.05: Optuna Hyperparameter Tuner for Security Classifiers
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from typing import Any, Dict, List, Optional, Tuple

      import numpy as np
      import optuna
      import pandas as pd
      from sklearn.ensemble import RandomForestClassifier
      from sklearn.metrics import precision_score, recall_score
      import xgboost as xgb

      optuna.logging.set_verbosity(optuna.logging.WARNING)

      # Optimise recall subject to precision >= this value.
      # Adjust based on the deployment's analyst FP capacity.
      PRECISION_FLOOR = 0.70


      def _rf_objective(
          trial: optuna.Trial,
          X_train: np.ndarray, y_train: np.ndarray,
          X_val: np.ndarray, y_val: np.ndarray,
      ) -> float:
          params = {
              'n_estimators': trial.suggest_int('rf_n_estimators', 100, 600),
              'max_depth': trial.suggest_int('rf_max_depth', 3, 20),
              'min_samples_split': trial.suggest_int('rf_min_samples_split', 2, 30),
              'class_weight': 'balanced',
              'random_state': 42,
              'n_jobs': -1,
          }
          model = RandomForestClassifier(**params)
          model.fit(X_train, y_train)
          y_prob = model.predict_proba(X_val)[:, 1]

          # Sweep thresholds; find best recall at precision >= floor
          best_recall = 0.0
          for t in np.linspace(0.1, 0.9, 50):
              y_pred = (y_prob >= t).astype(int)
              prec = precision_score(y_val, y_pred, zero_division=0)
              rec = recall_score(y_val, y_pred, zero_division=0)
              if prec >= PRECISION_FLOOR and rec > best_recall:
                  best_recall = rec
          return best_recall


      def _xgb_objective(
          trial: optuna.Trial,
          X_train: np.ndarray, y_train: np.ndarray,
          X_val: np.ndarray, y_val: np.ndarray,
      ) -> float:
          spw = float((y_train == 0).sum()) / max(float((y_train == 1).sum()), 1)
          params = {
              'n_estimators': trial.suggest_int('xgb_n_estimators', 100, 800),
              'max_depth': trial.suggest_int('xgb_max_depth', 2, 10),
              'learning_rate': trial.suggest_float('xgb_lr', 0.01, 0.2, log=True),
              'subsample': trial.suggest_float('xgb_subsample', 0.6, 1.0),
              'colsample_bytree': trial.suggest_float('xgb_colsample', 0.6, 1.0),
              'reg_alpha': trial.suggest_float('xgb_alpha', 1e-3, 10.0, log=True),
              'reg_lambda': trial.suggest_float('xgb_lambda', 1e-3, 10.0, log=True),
              'scale_pos_weight': spw,
              'random_state': 42,
              'eval_metric': 'aucpr',
              'verbosity': 0,
          }
          model = xgb.XGBClassifier(**params)
          model.fit(X_train, y_train, eval_set=[(X_val, y_val)],
                    early_stopping_rounds=20, verbose=False)
          y_prob = model.predict_proba(X_val)[:, 1]

          best_recall = 0.0
          for t in np.linspace(0.1, 0.9, 50):
              y_pred = (y_prob >= t).astype(int)
              prec = precision_score(y_val, y_pred, zero_division=0)
              rec = recall_score(y_val, y_pred, zero_division=0)
              if prec >= PRECISION_FLOOR and rec > best_recall:
                  best_recall = rec
          return best_recall


      def tune(
          train_df: pd.DataFrame,
          val_df: pd.DataFrame,
          feature_names: List[str],
          n_trials: int = 50,
          precision_floor: float = PRECISION_FLOOR,
      ) -> Tuple[str, Dict[str, Any], float]:
          '''
          Run Optuna hyperparameter search for both RF and XGBoost.
          Returns (best_model_family, best_params, best_recall_at_precision).
          '''
          global PRECISION_FLOOR
          PRECISION_FLOOR = precision_floor

          X_train = train_df[feature_names].values.astype(np.float32)
          y_train = train_df['label'].values
          X_val = val_df[feature_names].values.astype(np.float32)
          y_val = val_df['label'].values

          results = {}
          for family, obj in [('RandomForest', _rf_objective), ('XGBoost', _xgb_objective)]:
              study = optuna.create_study(direction='maximize')
              study.optimize(
                  lambda t, o=obj: o(t, X_train, y_train, X_val, y_val),
                  n_trials=n_trials // 2,
                  show_progress_bar=False,
              )
              results[family] = (study.best_value, study.best_params)
              print(f'{family}: best_recall@precision>={precision_floor:.2f} = {study.best_value:.4f}')

          best_family = max(results, key=lambda k: results[k][0])
          best_value, best_params = results[best_family]
          print(f'\nSelected: {best_family} (recall={best_value:.4f})')
          return best_family, best_params, best_value


      if __name__ == '__main__':
          rng = np.random.default_rng(42)
          n_features, n_b, n_a = 20, 300, 60
          feature_names = [f'feat_{i}' for i in range(n_features)]
          X = np.vstack([rng.normal(0.1, 0.05, (n_b, n_features)), rng.normal(0.6, 0.1, (n_a, n_features))])
          y = np.array([0] * n_b + [1] * n_a)
          train_df = pd.DataFrame(X[:300], columns=feature_names); train_df['label'] = y[:300]
          val_df = pd.DataFrame(X[300:], columns=feature_names); val_df['label'] = y[300:]

          family, params, score = tune(train_df, val_df, feature_names, n_trials=20)
          print(f'\nBest params: {params}')

  deliverable_4:
    title: 'Security Evaluator'
    filename: 'security_evaluator.py'
    description: 'Imbalance-aware evaluation harness for security classifiers. Produces precision, recall, F1, ROC-AUC, PR-AUC, confusion matrix, and FPR at the operating threshold. Imported by every subsequent section (12.06 through 12.17) for consistent cross-section benchmarking.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: scikit-learn, numpy, matplotlib.'
    code: |
      # security_evaluator.py
      # Section 12.05: Security Classifier Evaluation Harness
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import Dict, List, Optional, Tuple

      import numpy as np
      import matplotlib.pyplot as plt
      from sklearn.metrics import (
          precision_score, recall_score, f1_score,
          roc_auc_score, precision_recall_curve, auc,
          confusion_matrix, ConfusionMatrixDisplay,
      )


      @dataclass
      class EvaluationReport:
          classifier_name: str
          n_test: int
          n_attack: int
          n_benign: int
          imbalance_ratio: float
          precision: float
          recall: float
          f1: float
          roc_auc: float
          pr_auc: float
          fpr_at_threshold: float
          operating_threshold: float
          confusion: List[List[int]]

          def summary_line(self) -> str:
              return (
                  f'{self.classifier_name:<35} '
                  f'P={self.precision:.3f}  R={self.recall:.3f}  '
                  f'F1={self.f1:.3f}  AUC={self.roc_auc:.3f}  '
                  f'FPR={self.fpr_at_threshold:.3f}'
              )


      def evaluate(
          classifier_name: str,
          y_true: np.ndarray,
          y_prob: np.ndarray,
          operating_threshold: float = 0.5,
      ) -> EvaluationReport:
          y_pred = (y_prob >= operating_threshold).astype(int)
          prec_arr, rec_arr, _ = precision_recall_curve(y_true, y_prob)

          n_attack = int((y_true == 1).sum())
          n_benign = int((y_true == 0).sum())
          fpr = float((y_pred[y_true == 0] == 1).mean()) if n_benign > 0 else 0.0
          cm = confusion_matrix(y_true, y_pred).tolist()

          return EvaluationReport(
              classifier_name=classifier_name,
              n_test=len(y_true),
              n_attack=n_attack,
              n_benign=n_benign,
              imbalance_ratio=n_benign / max(n_attack, 1),
              precision=float(precision_score(y_true, y_pred, zero_division=0)),
              recall=float(recall_score(y_true, y_pred, zero_division=0)),
              f1=float(f1_score(y_true, y_pred, zero_division=0)),
              roc_auc=float(roc_auc_score(y_true, y_prob)),
              pr_auc=float(auc(rec_arr, prec_arr)),
              fpr_at_threshold=fpr,
              operating_threshold=operating_threshold,
              confusion=cm,
          )


      def print_report(report: EvaluationReport) -> None:
          print(f'\nEvaluation: {report.classifier_name}')
          print(f'  Test set:   {report.n_test} examples '
                f'(attack={report.n_attack}, benign={report.n_benign}, '
                f'ratio={report.imbalance_ratio:.1f}:1)')
          print(f'  Threshold:  {report.operating_threshold:.3f}')
          print(f'  Precision:  {report.precision:.4f}')
          print(f'  Recall:     {report.recall:.4f}')
          print(f'  F1:         {report.f1:.4f}')
          print(f'  ROC-AUC:    {report.roc_auc:.4f}')
          print(f'  PR-AUC:     {report.pr_auc:.4f}')
          print(f'  FPR:        {report.fpr_at_threshold:.4f}')
          tn, fp, fn, tp = (report.confusion[0][0], report.confusion[0][1],
                            report.confusion[1][0], report.confusion[1][1])
          print(f'  Confusion:  TP={tp}  FP={fp}  FN={fn}  TN={tn}')


      def compare_classifiers(reports: List[EvaluationReport]) -> None:
          print('\nClassifier Comparison:')
          print('-' * 80)
          for r in sorted(reports, key=lambda x: -x.recall):
              print(f'  {r.summary_line()}')
          print('-' * 80)
          best_recall = max(reports, key=lambda x: x.recall)
          best_prec = max(reports, key=lambda x: x.precision)
          print(f'  Best recall:    {best_recall.classifier_name}')
          print(f'  Best precision: {best_prec.classifier_name}')


      def plot_pr_curve(
          reports: List[Tuple[str, np.ndarray, np.ndarray]],
          save_path: str = 'pr_comparison.png',
      ) -> None:
          '''reports: list of (name, y_true, y_prob) tuples'''
          plt.figure(figsize=(8, 6))
          for name, y_true, y_prob in reports:
              p, r, _ = precision_recall_curve(y_true, y_prob)
              plt.plot(r, p, lw=2, label=f'{name} (AUC={auc(r, p):.3f})')
          plt.xlabel('Recall'); plt.ylabel('Precision')
          plt.title('Precision-Recall Comparison'); plt.legend(); plt.grid(alpha=0.3)
          plt.tight_layout(); plt.savefig(save_path, dpi=150, bbox_inches='tight'); plt.close()
          print(f'Saved PR comparison: {save_path}')


      if __name__ == '__main__':
          rng = np.random.default_rng(42)
          y_true = np.array([0] * 190 + [1] * 10)
          rf_prob = np.concatenate([rng.beta(1, 9, 190), rng.beta(7, 3, 10)])
          xgb_prob = np.concatenate([rng.beta(1, 8, 190), rng.beta(8, 2, 10)])

          rf_report = evaluate('RandomForest', y_true, rf_prob, operating_threshold=0.4)
          xgb_report = evaluate('XGBoost', y_true, xgb_prob, operating_threshold=0.4)
          print_report(rf_report)
          print_report(xgb_report)
          compare_classifiers([rf_report, xgb_report])

