section_overview:
  title: 'Federated Learning and Gradient Poisoning: Decentralised Training Attack Surface'
  one_line_summary: |
    Federated learning distributes training across many participants without
    centralising raw data, and that distribution makes the gradient update itself
    the attack surface. Byzantine participants contribute arbitrarily malicious
    gradients; Sybil attackers control multiple participant identities to amplify
    influence; model replacement attacks engineer gradient updates that overwrite
    server-side aggregated model behaviour. The defensive response is Byzantine-
    robust aggregation (median, trimmed mean, Krum, Bulyan) plus participant
    reputation tracking plus gradient anomaly detection. Federated learning
    extends the Chapter 8 framework to a decentralised threat model with
    distinctive economic properties: the attack surface is the participation
    interface itself, and trusted participation cannot be assumed.

  why_this_section_exists: |
    Sections 8.7 through 8.13 covered training-time attacks and defences
    primarily within centralised training contexts: a single organisation runs
    the training pipeline on data they control or aggregate. The threat model
    assumed the training pipeline operator is trustworthy and the attack
    surface is the data feeding into the pipeline. Section 8.14 covers the
    decentralised case: federated learning, where many participants jointly
    train a model by contributing gradient updates without sharing raw data,
    and the attack surface is the gradient contribution interface.

    Federated learning is a growing deployment pattern across cross-silo
    collaboration (multiple hospitals training a shared diagnostic model),
    on-device training (mobile keyboards learning user patterns without
    server-side data centralisation), and privacy-preserving ML deployments
    where regulatory or competitive constraints prevent centralised data
    pooling. Each deployment context has distinct threat model properties,
    but the underlying attack surface (gradient contribution) is shared.
    The defensive architecture established in Section 8.14 applies across
    contexts.

    The section also addresses a structural property that is unique to
    federated learning: the participants are typically untrusted by design.
    Centralised training assumes the training operator is trustworthy and
    asks how to defend against poisoned data. Federated training assumes
    participants may be Byzantine -- contributing arbitrarily malicious
    gradients without any structural constraint -- and asks how to aggregate
    contributions while limiting Byzantine influence. The defensive response
    operates on aggregation rather than data validation, which is a
    structurally different defensive paradigm from Sections 8.7-8.13.

    The third function of this section is grounding the federated learning
    threat model for organisations adopting it. Federated learning is often
    framed as inherently more secure than centralised training because raw
    data does not leave participant devices. The framing captures one
    privacy property correctly and elides the gradient-poisoning attack
    surface that centralised training does not have. Section 8.14 makes
    the tradeoff explicit: federated learning provides data privacy benefits
    at the cost of new attack surface, with defensive responsibility shifting
    from data validation (centralised) to aggregation robustness (federated).

  position_in_chapter: |
    Section 8.14 is the final attack-coverage section before the production
    pipeline capstone. Sections 8.7-8.13 covered centralised training attacks
    and defences; Section 8.14 extends to decentralised training. Section
    8.15 will integrate everything from 8.7-8.14 into the production
    auditing pipeline. The pipeline accommodates both centralised and
    federated deployments through configurable defensive tracks.

