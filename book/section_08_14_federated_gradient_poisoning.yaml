prose_content:

  part_1_federated_learning_threat_model:
    title: 'The Federated Learning Threat Model: Untrusted Participants by Design'
    body: |
      Federated learning is a training architecture in which a model is trained
      across many participants without centralising the raw training data. Each
      participant holds local data, computes gradient updates from that data
      against a shared model, and contributes the updates to a server (or to
      other participants in peer-to-peer variants). The server aggregates the
      updates into a new shared model and distributes it back. The training
      proceeds in rounds, with each round consisting of participant computation,
      contribution submission, server aggregation, and model redistribution.
      The principal data privacy property is that no participant's raw data is
      shared with any other participant or with the server.

      The threat model that emerges from this architecture is structurally
      different from centralised training. In centralised training, the
      attack surface is the data fed into the pipeline; the training operator
      is assumed trustworthy. In federated training, the data stays at
      participants and the attack surface is the gradient contributions
      themselves. Participants are typically untrusted by design: federated
      deployments often involve participants from multiple organisations
      (cross-silo) or from anonymous user populations (on-device), and
      structural trust between participants is absent. The defensive
      assumption is that some fraction of participants may be Byzantine --
      contributing arbitrarily malicious gradients without any structural
      constraint on what they submit.

      The Byzantine participant capability matters because it is structurally
      more powerful than the data poisoning capability in centralised training.
      A data poisoner contributes training samples that influence the model
      through gradient descent on those samples; the influence is bounded by
      the gradient information present in the sample plus the aggregation
      pipeline. A Byzantine gradient contributor submits the gradient directly
      and can craft it to maximise effect: arbitrarily large magnitudes,
      directions explicitly engineered to shift the model toward attacker goals,
      patterns designed to evade aggregation defences. The gradient is a much
      higher-bandwidth attack channel than data, and Byzantine contributors
      can exploit this.

      The empirical scale of the threat is not theoretical. Cross-silo
      federated deployments involving tens to hundreds of participating
      organisations commonly assume some fraction may be adversarial -- driven
      by competitive considerations, malicious insider threats within
      participating organisations, or external compromise. On-device
      federated deployments involving millions of mobile devices assume that
      some fraction are adversary-controlled at any time -- compromised
      devices, malicious app installations, or coordinated adversary
      campaigns. The fraction varies by deployment but is typically nontrivial
      (1-10% is a common operational assumption); aggregating contributions
      while bounding Byzantine influence is the defensive problem.

      The threat model also has temporal structure. Federated learning
      operates over many rounds, sometimes hundreds or thousands. Adversaries
      can attack persistently across rounds, refining their gradient
      contributions based on observed model evolution, or strategically
      timing their attacks to maximise effect at specific training stages.
      The defensive infrastructure must operate continuously across rounds
      rather than as a one-time check.

      Section 8.14 covers the principal attack patterns and the Byzantine-
      robust aggregation defences that constitute the core federated learning
      security architecture. The treatment is necessarily compact compared to
      a full federated learning textbook; the focus is on the attack surface
      and defensive primitives that integrate with the broader Chapter 8
      framework. For deeper engagement, the foundational papers (Krum:
      Blanchard et al. 2017; trimmed mean and median: Yin et al. 2018; Bulyan:
      El Mhamdi et al. 2018; FoolsGold: Fung et al. 2018) provide additional
      mathematical depth. Section 8.14 establishes the operational framework
      that Section 8.15 production pipeline integrates.

  part_2_gradient_poisoning_attack_patterns:
    title: 'Gradient Poisoning Attack Patterns'
    body: |
      Gradient poisoning attacks fall into several structural categories, each
      with distinctive mechanics and defensive implications. The attack
      taxonomy informs aggregation defence selection: different aggregation
      methods have different coverage profiles against different attack
      patterns.

      The simplest gradient poisoning is direct Byzantine contribution. The
      adversary participates in federated learning as a single participant
      and submits gradient updates designed to shift the aggregated model
      toward attacker goals. The gradient may be a large-magnitude update
      in an attacker-chosen direction (overwhelming clean contributions),
      a backdoor-installation gradient (engineered to install trigger-target
      associations across rounds), or a model-degradation gradient
      (engineered to reduce model accuracy generally). Direct Byzantine
      contributions from a single participant are limited in effect by the
      aggregation: a single malicious contribution among many clean ones is
      typically averaged out at appropriate scales.

      Sybil attacks extend Byzantine contribution by having a single adversary
      control multiple participant identities. If the adversary creates many
      participant accounts (in on-device contexts) or compromises multiple
      participating devices (via malware or supply chain attack), each
      controlled identity contributes gradients that, when aggregated, sum
      to attacker-chosen direction. The adversary's effective influence
      scales with the number of controlled identities. For deployments where
      identity verification is weak (anonymous on-device contexts, public
      cross-silo without identity validation), Sybil attacks are
      operationally cheap and can scale to substantial fractions of
      contributions.

      Model replacement attacks engineer gradient contributions specifically
      to overwrite the aggregated model with attacker-chosen behaviour. The
      adversary computes the gradient that, when added to the current model
      under the deployed aggregation rule, produces a target model. For
      federated averaging (FedAvg), the gradient required to install
      attacker-chosen weights w* given current model w_t is approximately
      n * (w* - w_t), where n is the number of participants. With sufficient
      Sybil participants or sufficient single-participant gradient magnitude,
      the model replacement is achievable in a single round. Model replacement
      attacks are particularly dangerous because they bypass the defensive
      assumption that single-round contributions have bounded effect.

      Backdoor installation via federated gradient poisoning operates similarly
      to centralised backdoor attacks (Section 8.5) but with different attack
      economics. The attacker contributes gradients that encode trigger-target
      associations. The aggregated model gradually learns the associations
      across rounds. The attack budget required (in terms of fraction of
      Byzantine participants) depends on the aggregation rule: for FedAvg
      without robust aggregation, fractions as low as 1-2% can install
      backdoors over many rounds; for robust aggregation methods, the
      fraction must exceed specific thresholds (Krum requires more than
      one-third Byzantine to fail).

      Coordinated multi-round attacks combine the above. The adversary
      contributes gradients across many rounds with strategic timing,
      gradually refining backdoor installation while evading per-round
      anomaly detection. The contributions in any single round may not
      look anomalous; the aggregate effect across rounds is the attack.
      Detection that operates per-round may miss multi-round attacks;
      detection requires temporal analysis across rounds.

      Targeted attacks on specific participants extend the threat. In peer-
      to-peer federated variants, an adversary participating in the network
      can target other participants' contributions specifically: by
      strategically positioning their own contributions, they can amplify or
      cancel specific other participants' gradients. The attack is more
      sophisticated and requires more participation control, but it can
      produce specific outcomes beyond aggregate model corruption.

      The principal defensive response to all these attack patterns is
      Byzantine-robust aggregation, covered in the next part. The aggregation
      methods bound the influence individual or coordinated Byzantine
      participants can have on the aggregated update, with specific
      thresholds and assumptions that determine the coverage profile.

  part_3_byzantine_robust_aggregation:
    title: 'Byzantine-Robust Aggregation: Bounded Influence Despite Malicious Participants'
    body: |
      Byzantine-robust aggregation methods replace standard federated averaging
      (FedAvg) with aggregation rules that bound the influence of Byzantine
      participants. The methods provide mathematical guarantees: under
      specified conditions on the fraction of Byzantine participants and the
      structure of their attacks, the aggregated update is close to what
      clean aggregation would have produced. The conditions are critical --
      Byzantine-robust aggregation works within specific regimes and fails
      outside them.

      The simplest robust aggregation is the coordinate-wise median. Instead
      of averaging participant gradients, take the median of each gradient
      coordinate across participants. The median is robust against outliers:
      Byzantine participants contributing extreme values for specific
      coordinates do not affect the median if their fraction is below 50%.
      The robustness is per-coordinate, which is computationally cheap and
      easy to implement, but provides limited protection against sophisticated
      attacks that distribute Byzantine influence across many coordinates
      with moderate magnitudes.

      Trimmed mean refines the median approach. Instead of taking the median,
      remove the top k and bottom k values per coordinate (where k is bounded
      by the assumed Byzantine fraction) and average the remaining values.
      Trimmed mean provides similar robustness to median with somewhat better
      utility on clean data: discarding only extreme values rather than
      always taking the middle. Trimmed mean breaks at higher Byzantine
      fractions than median (typically up to 50% with appropriate trimming)
      and provides moderate computational cost.

      Krum (Blanchard et al. 2017) takes a different approach: instead of
      coordinate-wise robust aggregation, select the single participant
      contribution that is closest to the majority of other contributions.
      The selection rule is structurally different: rather than aggregating
      contributions, choose one. The selected contribution is unlikely to
      be Byzantine if Byzantine participants comprise less than approximately
      one-third of total. Krum provides strong robustness within its regime
      but discards information from non-selected contributions, which has
      utility cost on clean data.

      Bulyan (El Mhamdi et al. 2018) extends Krum: apply Krum repeatedly to
      select multiple contributions, then apply trimmed mean over the
      selections. The combination provides better utility than Krum alone
      while maintaining similar Byzantine robustness. Bulyan operates with
      higher computational cost than simpler aggregation but produces strong
      empirical results on standard benchmarks.

      FoolsGold (Fung et al. 2018) addresses Sybil attacks specifically. The
      mechanism observes that Sybil participants tend to contribute similar
      gradients (because they share the same adversary's underlying attack
      logic). FoolsGold detects this similarity and downweights similar
      contributions, breaking the Sybil amplification effect. The method
      works well against Sybil attacks but is structurally different from
      Krum-family methods and may not be combined trivially.

      The coverage profile across these methods has several important
      patterns. All methods require an assumption about the maximum Byzantine
      fraction; their guarantees hold within the assumption and fail outside
      it. Median tolerates up to 50% Byzantine for individual coordinates
      but breaks under coordinated cross-coordinate attacks. Trimmed mean
      depends on trimming parameter; conservative trimming bounds Byzantine
      fraction tightly but discards more clean information. Krum requires
      below 33% Byzantine. Bulyan inherits Krum's threshold with better
      utility within it. FoolsGold tolerates higher Sybil fractions
      specifically but provides limited protection against non-Sybil
      Byzantine attacks. No method provides unconditional robustness;
      programme architecture must select the method appropriate to the
      assumed adversary fraction.

      The utility cost of robust aggregation also matters. Standard FedAvg
      converges fastest on clean data because it uses all gradient information
      efficiently. Robust methods discard information (Krum) or noise it
      (median, trimmed mean), reducing convergence speed and final accuracy.
      The cost varies by method and deployment: Krum has higher utility
      cost than trimmed mean; Bulyan reduces Krum's cost; FoolsGold has
      modest cost when Sybil fraction is low. Programmes balancing utility
      against robustness select methods accordingly.

      Operational deployment of robust aggregation requires several
      engineering decisions. Method selection based on assumed adversary
      fraction and attack patterns. Hyperparameter calibration (trimming
      fraction, Krum subset size, FoolsGold similarity threshold).
      Combination with non-aggregation defences (participant reputation,
      gradient anomaly detection) for layered coverage. Monitoring of
      adversary fraction estimates to detect when assumed bounds are
      exceeded. Section 8.14 deliverable 2 provides reference implementations
      of the principal methods with calibration guidance.

  part_4_participant_reputation_and_gradient_anomaly_detection:
    title: 'Participant Reputation and Gradient Anomaly Detection'
    body: |
      Byzantine-robust aggregation is the primary defensive layer for federated
      learning, but it operates per-round on contributions and does not
      directly identify Byzantine participants for exclusion. Two complementary
      defensive layers operate at participant identification: participant
      reputation tracking and gradient anomaly detection. Together with
      robust aggregation, they constitute the layered federated learning
      defensive architecture.

      Participant reputation tracking maintains scores for each participant
      based on observed contribution patterns across rounds. Participants
      whose contributions consistently align with the majority and produce
      reasonable model improvements accumulate reputation. Participants
      whose contributions are systematically anomalous, divergent, or
      correlated with model degradation accumulate negative signals. The
      reputation can be used in several ways: weighting contributions by
      reputation in aggregation, excluding participants whose reputation
      falls below thresholds, or routing low-reputation contributions to
      additional review.

      The reputation mechanism has several operational properties. It is
      adversary-aware: adversaries who know the reputation algorithm can
      attempt to game it by initially contributing benign updates to build
      reputation before pivoting to attack mode. The defence is to weight
      recent behaviour heavily relative to historical reputation, limiting
      the value of long-term reputation building. Reputation decay is also
      important: stale reputation from inactive participants should not
      accrue trust they did not earn through recent contribution.
      Reputation maintenance must handle cold start: new participants have
      no reputation history; the policy for handling new participants
      depends on deployment context (anonymous on-device may treat new
      participants conservatively; cross-silo with identity verification
      may extend trust based on organisational reputation).

      Sybil resistance in reputation systems is the principal challenge.
      Sybil adversaries can create many participant identities and have
      each accumulate independent reputation. The aggregate Sybil reputation
      can exceed any single legitimate participant's reputation, undermining
      the reputation defence. Sybil resistance in federated reputation
      requires either external identity verification (raising the cost of
      identity creation) or behaviour-based Sybil detection (identifying
      groups of identities that behave similarly enough to be likely
      adversary-controlled). FoolsGold-style similarity detection partially
      addresses behaviour-based Sybil in reputation; external identity
      verification is deployment-specific.

      Gradient anomaly detection operates on individual contributions per
      round, identifying contributions that deviate from expected patterns
      irrespective of participant identity. The anomaly detection compares
      each contribution against the distribution of clean contributions
      (which can be estimated from historical data, current-round majority,
      or held-out validation contributions). Contributions that are
      anomalously large in magnitude, anomalously directional, or
      anomalously sparse are flagged. The flagged contributions can be
      excluded from aggregation, downweighted, or routed to additional
      analysis.

      The anomaly detection signal is per-round and per-contribution; it
      complements reputation tracking which is multi-round and per-
      participant. Anomaly detection catches first-round Byzantine
      contributions before reputation can develop; reputation tracking
      catches multi-round patterns that any single round may not flag.
      The two layers cover different temporal scales of attack.

      The principal limitation of gradient anomaly detection is calibration.
      Distinguishing legitimate but unusual gradients (from participants
      with non-typical data distributions or training characteristics) from
      Byzantine gradients requires baselines that match expected legitimate
      variation. Insufficient baselines produce false positives that exclude
      legitimate participants; over-permissive baselines produce false
      negatives that include Byzantine contributions. Modern anomaly detection
      approaches use statistical methods (Mahalanobis distance, isolation
      forests) calibrated against historical contribution distributions,
      with tunable thresholds.

      The combined defensive architecture for federated learning therefore
      includes Byzantine-robust aggregation (primary defence, per-round
      bounded influence), participant reputation tracking (multi-round
      identification of Byzantine participants), and gradient anomaly
      detection (per-round identification of anomalous contributions).
      Each layer covers different attack patterns and time scales. The
      combination provides operationally meaningful coverage; deployments
      typically combine all three with weights and thresholds calibrated
      to the assumed adversary fraction. Section 8.14 deliverable 5
      integrates the layers into a federated learning defensive harness.

  part_5_privacy_security_tradeoff_and_deployment_contexts:
    title: 'Privacy-Security Tradeoff and Deployment Context Variations'
    body: |
      Federated learning is often framed as inherently more secure than
      centralised training because raw data does not leave participant
      devices. The framing captures one privacy property correctly --
      participant raw data privacy is preserved -- but elides the gradient-
      poisoning attack surface that centralised training does not have.
      The complete framing is that federated learning trades data
      centralisation risk for gradient poisoning risk; the tradeoff is
      favourable in some contexts and unfavourable in others depending on
      threat model.

      The favourable cases are where data centralisation risk dominates the
      threat model. For deployments with sensitive raw data subject to
      regulatory or competitive constraints (healthcare records, financial
      transactions, personal communications), centralising the data creates
      privacy and compliance exposures that outweigh the gradient-poisoning
      risk. Federated learning in these contexts provides genuine net
      defensive benefit: the gradient-poisoning attack surface is real but
      manageable through robust aggregation, while the data centralisation
      attack surface (data breach, insider exfiltration, compliance
      violation) is structurally larger and harder to defend.

      The unfavourable cases are where data sensitivity is moderate and the
      gradient-poisoning attack surface is operationally significant. For
      deployments with public or low-sensitivity data, centralising the
      data creates manageable risk and produces stronger training (no
      participant heterogeneity, no aggregation noise). Federated learning
      in these contexts adds attack surface without commensurate privacy
      benefit: the gradient-poisoning surface is real, the data privacy
      benefit is small, and centralised training with standard data
      governance provides better outcomes.

      The deployment context drives the threat model and defensive
      architecture. Cross-silo federated learning involves a small number
      of well-known organisational participants (typically 5-50 organisations).
      The threat model is dominated by individual participant compromise
      (one organisation's infrastructure compromised) and competitive
      adversarial behaviour (one organisation contributing biased gradients
      to manipulate the shared model in their favour). The defensive
      architecture emphasises participant identity verification, contractual
      enforcement, and Byzantine-robust aggregation tuned to the small
      participant count.

      On-device federated learning involves many anonymous participant
      devices (potentially millions). The threat model is dominated by
      Sybil attacks (adversary-controlled devices), supply-chain compromise
      (malicious app installations), and aggregate behaviour manipulation
      (large-scale coordinated contributions). The defensive architecture
      emphasises Sybil-resistant aggregation (FoolsGold), gradient anomaly
      detection at scale, and reputation systems robust to Sybil amplification.

      Privacy-preserving collaborative ML (variant of cross-silo) involves
      participants who specifically need data privacy, often for regulatory
      compliance (GDPR Article 6 lawful bases, HIPAA Privacy Rule, sector-
      specific). The threat model includes participant compromise plus
      regulatory non-compliance risk if the federated architecture leaks
      data unexpectedly. The defensive architecture emphasises differential
      privacy in addition to Byzantine robustness (DP-SGD applied at the
      federated level, providing both data privacy and gradient bounding),
      formal privacy accounting across rounds, and audit-ready compliance
      documentation.

      For organisations evaluating federated learning adoption, the
      operational decision involves matching deployment context to threat
      model and ensuring the defensive architecture covers the relevant
      attack surfaces. Adopting federated learning for the privacy benefit
      without commensurate gradient-poisoning defence produces a posture
      that is privacy-improved but security-degraded, which is typically
      not the intended outcome. The complete operational architecture
      includes Byzantine-robust aggregation (primary), participant reputation
      and gradient anomaly detection (secondary), and DP-SGD at the
      federated level (privacy-preserving across rounds). Section 8.15
      production pipeline supports federated deployments through configurable
      defensive tracks.

      The integration with Sections 8.7-8.13 is also worth highlighting.
      Federated learning is sometimes deployed as the federated stage of
      LLM training: federated instruction-tuning across multiple
      organisations, federated fine-tuning of foundation models on
      organisationally-distributed data. In these contexts, the federated
      gradient-poisoning attack surface combines with the LLM-specific
      attack surfaces from Sections 8.7-8.8. Defensive coverage requires
      both layers: federated-specific (this section) and LLM-specific
      (Sections 8.7-8.8). Section 8.15 production pipeline integrates them
      where they overlap.

  part_6_emerging_research_and_remaining_challenges:
    title: 'Emerging Research and Remaining Challenges'
    body: |
      Federated learning security is an active research area with substantial
      ongoing development. The principal published methods and defences
      summarised in earlier parts represent the established core, but the
      field continues to develop in directions that affect operational
      deployment. Section 8.14 closes by identifying the principal emerging
      directions and remaining defensive challenges.

      One emerging direction is federated learning with secure aggregation.
      Secure aggregation protocols (cryptographic constructions where the
      server learns only the aggregated update, not individual participant
      contributions) provide additional privacy properties: the server
      cannot inspect individual participant gradients, which addresses
      certain inference attacks against participant privacy. Secure
      aggregation interacts with Byzantine robustness in subtle ways: most
      Byzantine-robust aggregation methods require the server to inspect
      individual contributions to identify outliers, which conflicts with
      the secure aggregation goal of hiding individual contributions. Recent
      research has produced hybrid protocols that achieve partial robustness
      under secure aggregation, but the combined coverage is weaker than
      either property alone. Programmes deploying both must accept partial
      coverage in each dimension.

      A second direction is federated learning with formal differential
      privacy. Applying DP-SGD-style noise addition at the federated level
      provides formal privacy guarantees plus gradient bounding. The
      privacy accounting across rounds is more complex than centralised
      DP-SGD because each round adds privacy cost and the total privacy
      budget must be managed across all rounds. Tools like the Privacy
      Accountant framework provide the necessary accounting. The defensive
      benefit combines: the per-round noise bounds Byzantine influence
      (Section 8.13 DP-SGD coverage extending to federated context); the
      multi-round privacy guarantee provides participant data privacy.

      A third direction is targeted defence against specific advanced attacks.
      Recent research has produced attack-specific defences for advanced
      Byzantine attacks: adaptive attacks that evolve in response to robust
      aggregation, model replacement attacks that exploit specific
      aggregation properties, and coalition attacks where multiple Byzantine
      participants coordinate explicitly. Each defence is targeted to a
      specific attack pattern; comprehensive coverage requires combining
      multiple defences with potentially conflicting requirements. The
      operational picture is increasingly complex; Section 8.14 deliverables
      target the established core but cite the research literature for
      advanced cases.

      A fourth direction is federated learning for foundation models
      specifically. Training large language models in federated settings
      involves distinct challenges: model size, communication cost, gradient
      heterogeneity across participants, and the LLM-specific attack
      surfaces from Sections 8.7-8.8. Recent work has addressed these
      through parameter-efficient federated training (federated LoRA),
      privacy-preserving instruction tuning, and federated RLHF variants.
      Defensive coverage in these contexts combines Section 8.7-8.9
      LLM-specific defences with Section 8.14 federated-specific defences;
      the integrated architecture is operationally complex and represents
      a significant deployment investment.

      The remaining defensive challenges include several open problems.
      Adversary fraction estimation: knowing the actual Byzantine fraction
      in deployment is necessary for selecting appropriate aggregation
      methods, but estimating it is difficult in practice. Conservative
      assumptions (high Byzantine fraction) provide stronger defence at
      higher utility cost; permissive assumptions (low fraction) provide
      better utility but fail if actual fraction exceeds. Adaptive aggregation
      that adjusts based on observed contribution patterns is a research
      direction with operational potential.

      Cross-round attack detection: per-round defences (robust aggregation,
      anomaly detection on round contributions) miss multi-round attacks
      that distribute their effect. Reputation systems partially address
      this but have Sybil vulnerabilities. Comprehensive cross-round attack
      detection that resists Sybil amplification is an open problem.

      Privacy-robustness tension: secure aggregation, differential privacy,
      and Byzantine robustness all provide distinct guarantees, but combining
      them produces composition costs. Each layer adds noise, computational
      cost, or coverage gaps; the total composition is weaker than any
      individual property. Designing federated systems with strong combined
      properties remains a research challenge with operational implications.

      For practitioners deploying federated learning, the operational
      implication is that defensive architecture must be designed for the
      specific deployment context and updated as research advances. Section
      8.14 deliverables provide the established core; the production
      pipeline in Section 8.15 supports configurable extension as advanced
      defences become production-ready. The trajectory is toward stronger
      combined coverage; the current state is uneven and deployment-
      specific.

reference_materials:

  federated_learning_attack_class_reference:
    title: 'Federated Learning Attack Class Reference'
    description: |
      Systematic reference for the principal federated learning attack
      classes, their mechanics, defensive primitives, and adversary fraction
      thresholds. Use for threat modelling and defensive architecture
      selection.

    attack_classes:

      - class_id: 'FED-BYZANTINE'
        name: 'Direct Byzantine contribution (single participant)'
        mechanism: 'Adversary participates as one participant; submits arbitrarily malicious gradient'
        attack_outcome: 'Single-round model perturbation in attacker direction; bounded by aggregation if alone'
        adversary_fraction_threshold: 'Limited effect at <5% by aggregation alone'
        defensive_primitive: 'FedAvg with magnitude clipping; modest robustness improvement'
        residual_risk_after_defence: 'Low when isolated; accumulates with Sybil amplification'

      - class_id: 'FED-SYBIL'
        name: 'Sybil attack (multiple identities)'
        mechanism: 'Single adversary controls many participant identities; aggregate contribution scales with controlled count'
        attack_outcome: 'Effective Byzantine fraction proportional to controlled identities'
        adversary_fraction_threshold: 'Effective until exceeding ~33% (Krum); ~50% (median); FoolsGold-resistant'
        defensive_primitive: 'FoolsGold (similarity-based downweighting); identity verification; participant reputation with Sybil resistance'
        residual_risk_after_defence: 'Moderate; sophisticated Sybil with diversified contributions can evade FoolsGold'

      - class_id: 'FED-REPLACEMENT'
        name: 'Model replacement attack'
        mechanism: 'Adversary engineers gradients that overwrite aggregated model with attacker-chosen weights'
        attack_outcome: 'Single-round complete model replacement (with sufficient adversary scale)'
        adversary_fraction_threshold: 'Achievable with high single-participant gradient magnitude or Sybil scale'
        defensive_primitive: 'Magnitude-bounded aggregation (clipping); robust aggregation; gradient anomaly detection'
        residual_risk_after_defence: 'Low if magnitude bounds enforced; high without'

      - class_id: 'FED-BACKDOOR'
        name: 'Backdoor installation via gradient poisoning'
        mechanism: 'Adversary contributes gradients encoding trigger-target associations across rounds'
        attack_outcome: 'Backdoored aggregated model with trigger-conditional behaviour'
        adversary_fraction_threshold: '1-2% with FedAvg; higher with robust aggregation depending on method'
        defensive_primitive: 'Robust aggregation; gradient anomaly detection; cross-round behavioural analysis'
        residual_risk_after_defence: 'Moderate; multi-round attacks may evade per-round defences'

      - class_id: 'FED-COORDINATED'
        name: 'Coordinated multi-round attack'
        mechanism: 'Adversary contributes gradients across many rounds with strategic timing; per-round contributions look normal, aggregate effect is the attack'
        attack_outcome: 'Cumulative model behaviour shift evading per-round detection'
        adversary_fraction_threshold: 'Variable; depends on attack design'
        defensive_primitive: 'Cross-round behavioural analysis; reputation tracking; periodic full audits'
        residual_risk_after_defence: 'Moderate; cross-round detection less mature than per-round'

      - class_id: 'FED-TARGETED'
        name: 'Targeted attack on specific participant (peer-to-peer variants)'
        mechanism: 'Adversary positions contributions to amplify or cancel specific other participants gradients'
        attack_outcome: 'Specific participant influence manipulation; aggregate model effect attacker-specific'
        adversary_fraction_threshold: 'Sophisticated attacks possible at moderate fractions'
        defensive_primitive: 'Identity verification in peer-to-peer; gradient anomaly detection per-pair'
        residual_risk_after_defence: 'Variable; less mature defensive infrastructure'

  byzantine_robust_aggregation_reference:
    title: 'Byzantine-Robust Aggregation Method Reference'
    description: |
      Reference for the principal Byzantine-robust aggregation methods:
      mechanism, Byzantine fraction tolerance, utility cost, and operational
      properties. Use for aggregation method selection.

    methods:

      - method: 'FedAvg (baseline; not robust)'
        mechanism: 'Average of all participant gradients'
        byzantine_fraction_tolerance: 'Effectively zero (averaging includes all contributions)'
        utility_on_clean: 'Maximum (uses all gradient information efficiently)'
        compute_cost: 'Minimal'
        suitable_for: 'Trusted-participant deployments only; not for production federated security'

      - method: 'Coordinate-wise median'
        mechanism: 'Take median of each gradient coordinate across participants'
        byzantine_fraction_tolerance: 'Up to 50% per-coordinate; lower under cross-coordinate coordinated attacks'
        utility_on_clean: 'Reduced (median is less efficient than mean for clean data)'
        compute_cost: 'Low'
        suitable_for: 'Simple deployments with assumed moderate Byzantine fractions'

      - method: 'Trimmed mean'
        mechanism: 'Remove top and bottom k values per coordinate; average remaining'
        byzantine_fraction_tolerance: 'Up to 50% with appropriate trimming'
        utility_on_clean: 'Better than median; depends on trimming fraction'
        compute_cost: 'Low'
        suitable_for: 'General-purpose deployments; tunable trimming based on adversary fraction'

      - method: 'Krum'
        mechanism: 'Select single participant contribution closest to majority of others'
        byzantine_fraction_tolerance: 'Up to ~33%'
        utility_on_clean: 'Reduced (discards information from non-selected contributions)'
        compute_cost: 'Moderate (pairwise distance computation)'
        suitable_for: 'Deployments with low-to-moderate Byzantine fractions; strong robustness within regime'

      - method: 'Bulyan'
        mechanism: 'Apply Krum repeatedly to select multiple contributions; trimmed mean over selections'
        byzantine_fraction_tolerance: 'Up to ~33% (Krum threshold)'
        utility_on_clean: 'Better than Krum (uses multiple selected contributions)'
        compute_cost: 'High (repeated Krum applications plus trimmed mean)'
        suitable_for: 'High-stakes deployments where utility matters; standard high-robustness choice'

      - method: 'FoolsGold'
        mechanism: 'Detect similarity among contributions; downweight similar contributions to break Sybil amplification'
        byzantine_fraction_tolerance: 'High Sybil tolerance (specific to similar-contribution detection)'
        utility_on_clean: 'Modest cost when Sybil fraction is low'
        compute_cost: 'Moderate (similarity computation)'
        suitable_for: 'Deployments with significant Sybil risk; complementary to other methods'

  federated_defence_layered_architecture_reference:
    title: 'Federated Learning Layered Defensive Architecture Reference'
    description: |
      Reference for the layered defensive architecture in federated learning,
      showing which layer addresses which attack pattern.

    architecture_layers:

      - layer: 'Aggregation layer (per-round, primary)'
        primitives: 'Byzantine-robust aggregation methods (Krum, Bulyan, trimmed mean, FoolsGold)'
        attack_classes_addressed:
          - 'FED-BYZANTINE (single)'
          - 'FED-REPLACEMENT (with magnitude bounds)'
          - 'FED-BACKDOOR (per-round contribution bounding)'
        coverage_characteristics: 'Strong within Byzantine fraction threshold; fails outside'
        deployment_priority: 'Mandatory; every federated deployment requires robust aggregation'

      - layer: 'Participant identification layer (multi-round, secondary)'
        primitives: 'Participant reputation tracking; identity verification'
        attack_classes_addressed:
          - 'FED-SYBIL (with Sybil-resistant reputation)'
          - 'FED-BACKDOOR (multi-round patterns)'
          - 'FED-COORDINATED (multi-round identification)'
        coverage_characteristics: 'Catches multi-round patterns; vulnerable to reputation-gaming'
        deployment_priority: 'High; especially for on-device deployments'

      - layer: 'Gradient anomaly detection layer (per-round, secondary)'
        primitives: 'Statistical anomaly detection on individual contributions'
        attack_classes_addressed:
          - 'FED-BYZANTINE (anomalous magnitudes/directions)'
          - 'FED-REPLACEMENT (anomalous gradient magnitudes)'
        coverage_characteristics: 'Calibration-dependent; catches per-round anomalies'
        deployment_priority: 'Moderate; complementary to other layers'

      - layer: 'Cross-round behavioural analysis (multi-round, supplementary)'
        primitives: 'Aggregate model behaviour analysis across rounds'
        attack_classes_addressed:
          - 'FED-COORDINATED (multi-round patterns)'
          - 'FED-BACKDOOR (gradual installation patterns)'
        coverage_characteristics: 'Catches sophisticated multi-round attacks'
        deployment_priority: 'High for high-stakes deployments; complex to implement'

      - layer: 'Differential privacy at federated level (privacy plus bounding)'
        primitives: 'DP-SGD applied to participant contributions; privacy accounting across rounds'
        attack_classes_addressed:
          - 'Bounded influence regardless of attack pattern (DP-SGD coverage)'
          - 'Participant privacy across rounds'
        coverage_characteristics: 'Provides formal guarantees; utility cost'
        deployment_priority: 'High for privacy-preserving deployments; supplementary for others'

  deployment_context_reference:
    title: 'Federated Learning Deployment Context Reference'
    description: |
      Reference for the principal federated learning deployment contexts and
      their specific threat models and defensive architectures.

    contexts:

      - context: 'Cross-silo federated (small-N organisational)'
        participant_count: '5-50 organisations'
        threat_model:
          - 'Individual participant compromise (one organisation infrastructure compromised)'
          - 'Competitive adversarial behaviour (one organisation biases shared model)'
          - 'Insider threats within participating organisations'
        defensive_emphasis:
          - 'Participant identity verification and contractual enforcement'
          - 'Krum or Bulyan aggregation tuned to small-N'
          - 'Cross-organisation reputation and audit'

      - context: 'On-device federated (large-N anonymous)'
        participant_count: 'Thousands to millions of devices'
        threat_model:
          - 'Sybil attacks (adversary-controlled device fleets)'
          - 'Supply-chain compromise (malicious app installations)'
          - 'Aggregate behaviour manipulation'
        defensive_emphasis:
          - 'Sybil-resistant aggregation (FoolsGold)'
          - 'Gradient anomaly detection at scale'
          - 'Differential privacy for participant data privacy'

      - context: 'Privacy-preserving collaborative ML'
        participant_count: 'Variable (typically cross-silo)'
        threat_model:
          - 'Participant compromise'
          - 'Regulatory non-compliance risk'
          - 'Inference attacks against participant data'
        defensive_emphasis:
          - 'Differential privacy at federated level'
          - 'Formal privacy accounting across rounds'
          - 'Audit-ready compliance documentation'
          - 'Byzantine-robust aggregation as secondary'

      - context: 'Federated LLM training'
        participant_count: 'Variable; often cross-silo'
        threat_model:
          - 'Federated gradient poisoning (this section)'
          - 'LLM-specific attacks (Sections 8.7-8.8 inherited)'
          - 'Adapter-level attacks if federated LoRA'
        defensive_emphasis:
          - 'Byzantine-robust aggregation'
          - 'LLM-specific detection (Sections 8.7-8.8)'
          - 'Adapter verification (Section 8.9) if applicable'

deliverables:

  deliverable_1_federated_learning_simulator:
    artifact: 'federated_learning_simulator.py -- federated training simulator with configurable adversary'
    purpose: 'Reproducible simulation of federated learning with Byzantine adversaries for defence benchmarking'
    inputs:
      - 'Base model architecture'
      - 'Participant data partitioning (IID or non-IID)'
      - 'Adversary configuration: fraction, attack class, coordination'
      - 'Aggregation method selection'
    outputs:
      - 'Trained federated model'
      - 'Per-round metrics: clean accuracy, attack success rate, gradient anomaly distributions'
      - 'Adversary effectiveness analysis'
    implementation_notes: |
      Single file /code/attacks/chapter_08/federated_learning_simulator.py.
      Single quotes throughout per book convention.
      Dependencies: torch, flwr or pysyft (federated frameworks), numpy.
      Supports cross-silo and on-device simulation modes.
      Reproduces published Byzantine attack and defence results.
    usage: 'Defence benchmarking; attack and defence research; threat modelling for federated deployments'

  deliverable_2_byzantine_robust_aggregation_library:
    artifact: 'byzantine_robust_aggregation.py -- reference implementations of robust aggregation methods'
    purpose: 'Production-ready implementations of Krum, Bulyan, trimmed mean, median, FoolsGold'
    inputs:
      - 'Per-participant gradient contributions'
      - 'Method selection and hyperparameters'
      - 'Assumed Byzantine fraction'
    outputs:
      - 'Aggregated gradient'
      - 'Per-method audit metadata (selected participants for Krum, trimmed contributions for trimmed mean, etc.)'
      - 'Coverage analysis: did the method exceed its theoretical guarantees'
    implementation_notes: |
      Single file /code/defences/chapter_08/byzantine_robust_aggregation.py.
      Single quotes throughout per book convention.
      Dependencies: torch, numpy.
      Reference implementations match foundational papers; calibration tooling for hyperparameters.
      Designed for integration with standard federated frameworks (Flower, PySyft, FedML).
    usage: 'Production federated learning aggregation; primary defensive layer in federated deployments'

  deliverable_3_participant_reputation_tracker:
    artifact: 'participant_reputation_tracker.py -- multi-round reputation system for federated participants'
    purpose: 'Track participant reputation across rounds; downweight or exclude low-reputation participants'
    inputs:
      - 'Per-round participant contribution audit signals'
      - 'Reputation algorithm configuration'
      - 'Reputation thresholds for action'
    outputs:
      - 'Per-participant reputation scores over time'
      - 'Recommendations: pass | downweight | exclude'
      - 'Sybil cluster detection signals'
    implementation_notes: |
      Single file /code/defences/chapter_08/participant_reputation_tracker.py.
      Single quotes throughout per book convention.
      Dependencies: numpy, sklearn (for clustering).
      Implements weighted moving averages with recency emphasis; FoolsGold-style similarity detection.
      Configurable for cross-silo (low-N, identity-verified) and on-device (high-N, anonymous) contexts.
    usage: 'Multi-round defensive layer; integrates with aggregation layer; complementary to per-round anomaly detection'

  deliverable_4_gradient_anomaly_detector:
    artifact: 'gradient_anomaly_detector.py -- per-round anomaly detection on participant contributions'
    purpose: 'Detect gradient contributions outside expected distribution irrespective of participant identity'
    inputs:
      - 'Per-round participant gradients'
      - 'Reference distribution (historical contributions, current-round majority, or held-out validation)'
      - 'Anomaly thresholds'
    outputs:
      - 'Per-contribution anomaly scores'
      - 'Flagged contributions for exclusion or review'
      - 'Anomaly category classification (magnitude, direction, sparsity)'
    implementation_notes: |
      Single file /code/defences/chapter_08/gradient_anomaly_detector.py.
      Single quotes throughout per book convention.
      Dependencies: numpy, scipy, sklearn.
      Implements Mahalanobis distance, isolation forest, and dimension-specific anomaly detection.
      Calibrated against historical contribution distributions.
    usage: 'Per-round defensive layer; complementary to robust aggregation; first-pass screen before aggregation'

  deliverable_5_federated_defence_harness:
    artifact: 'federated_defence_harness.py -- integrated federated learning defensive architecture'
    purpose: 'Combine robust aggregation, reputation tracking, anomaly detection, and DP-SGD into layered federated defence'
    inputs:
      - 'Federated training configuration'
      - 'Defensive layer configuration: which methods, what parameters'
      - 'Threat model specification'
    outputs:
      - 'Trained federated model with comprehensive defensive properties'
      - 'Per-layer audit evidence'
      - 'Combined coverage analysis vs federated attack catalogue'
      - 'Per-round defensive logs for compliance and incident response'
    implementation_notes: |
      Single file /code/defences/chapter_08/federated_defence_harness.py.
      Single quotes throughout per book convention.
      Dependencies: Section 8.14 deliverables 1-4; Section 8.13 DP-SGD trainer.
      Default configuration: Bulyan aggregation + reputation tracking + anomaly detection + DP-SGD at moderate epsilon.
      Threat-model-aware configuration adjustments.
      Section 8.15 production pipeline integration point for federated track.
    usage: 'Production federated learning defensive architecture; configurable per deployment context; integrates with Section 8.15 pipeline'

common_mistakes:

  mistake_1_treating_federated_as_inherently_secure:
    description: 'Treating federated learning as inherently more secure than centralised training without defensive infrastructure'
    why_it_happens: |
      Federated learning is often marketed as a privacy-preserving alternative
      to centralised training. The privacy framing is correct but incomplete:
      federated learning preserves participant data privacy while introducing
      gradient-poisoning attack surface. Practitioners adopting federated
      learning for the privacy benefit may neglect the gradient-poisoning
      defence. The result is a posture that is privacy-improved but
      security-degraded.
    consequence: 'Federated deployments use FedAvg (no Byzantine robustness) and assume participants are trustworthy. Byzantine attacks succeed at low fractions; backdoor installation is straightforward; the deployment is materially less secure than centralised alternatives despite the privacy framing.'
    correct_approach: 'Treat federated learning as introducing gradient-poisoning attack surface that requires defensive infrastructure. Deploy Byzantine-robust aggregation as standard. Section 8.14 defensive architecture is mandatory, not optional. The privacy benefit and the security cost should both be understood when adopting federated.'

  mistake_2_fedavg_in_production:
    description: 'Deploying FedAvg (standard averaging) in production federated learning'
    why_it_happens: |
      FedAvg is the simplest aggregation method and the default in many
      federated frameworks. Practitioners using framework defaults inherit
      FedAvg without explicit decision. The mistake is that FedAvg has
      effectively zero Byzantine robustness; any Byzantine participant can
      shift the aggregated model proportionally to their contribution magnitude.
      In production deployments with untrusted participants, FedAvg is not a
      defensive choice.
    consequence: 'Federated deployments using FedAvg are vulnerable to single-Byzantine attacks at trivially low adversary fractions. Sybil amplification produces complete attack control. The deployment is structurally undefended.'
    correct_approach: 'Replace FedAvg with Byzantine-robust aggregation (Krum, Bulyan, trimmed mean, or FoolsGold for Sybil-heavy contexts) as standard for production deployments. FedAvg is appropriate only for trusted-participant or simulation contexts. Section 8.14 deliverable 2 provides production-ready replacements.'

  mistake_3_ignoring_sybil_resistance:
    description: 'Deploying federated learning without Sybil-resistance measures'
    why_it_happens: |
      Sybil attacks require adversaries to control multiple identities, which
      may seem operationally costly. Practitioners may underestimate Sybil
      cost, particularly in on-device contexts where account creation is
      free or cheap. Sybil attacks are operationally cheap in many federated
      contexts, and without Sybil resistance, all Byzantine fraction
      assumptions become invalid.
    consequence: 'Sybil-amplified attacks bypass Byzantine fraction thresholds. Krum-based defences fail when adversary controls more than 33% of identities; this is achievable through Sybil at low cost. The deployment defends against assumed adversary fractions but not actual Sybil-amplified fractions.'
    correct_approach: 'Deploy Sybil resistance: identity verification where deployment context allows, FoolsGold-style behaviour-based Sybil detection where it does not, and reputation systems with Sybil resistance. Section 8.14 deliverable 3 includes Sybil cluster detection. The combined defensive architecture must address Sybil amplification, not just direct Byzantine attacks.'

  mistake_4_static_byzantine_fraction_assumption:
    description: 'Selecting aggregation methods based on static Byzantine fraction assumption without monitoring actual fraction'
    why_it_happens: |
      Method selection requires assuming a Byzantine fraction. Practitioners
      pick a fraction at deployment time and stick with it. The mistake is
      that adversary fraction can change over deployment lifetime: new
      compromises occur, attack campaigns scale up, defensive countermeasures
      shift attacker behaviour. A method appropriate for the initial assumed
      fraction may be inadequate later.
    consequence: 'Aggregation method becomes inadequate as adversary fraction shifts. The defensive architecture is not retuned, and the deployment becomes vulnerable to attacks that the original method would have caught at higher tolerance levels.'
    correct_approach: 'Monitor actual adversary fraction estimates through anomaly detection signals, reputation distributions, and attack campaign indicators. Re-tune aggregation method when fraction estimates exceed method tolerance. Section 8.14 deliverable 5 includes adaptive monitoring; Section 8.15 production pipeline integrates the monitoring as standard discipline.'

  mistake_5_per_round_only_defence:
    description: 'Deploying per-round defences (robust aggregation, gradient anomaly) without multi-round behavioural analysis'
    why_it_happens: |
      Per-round defences are computationally efficient and conceptually
      simple: each round is a defensive event. Practitioners deploy per-round
      defence as their architecture. The mistake is that sophisticated
      attacks distribute their effect across many rounds; per-round
      contributions look normal, aggregate effect is the attack. Per-round
      defences miss multi-round patterns.
    consequence: 'Coordinated multi-round attacks (FED-COORDINATED) succeed undetected. Backdoor installation across rounds (FED-BACKDOOR) at sub-per-round-detection magnitudes accumulates over training. Per-round defensive metrics look clean while the model is being progressively compromised.'
    correct_approach: 'Combine per-round defences with multi-round behavioural analysis: cross-round model behavioural drift detection, participant reputation tracking, periodic full audits of aggregated model. Section 8.14 deliverable 5 integrates the layers; Section 8.15 production pipeline includes cross-round monitoring as standard discipline.'

section_summary:
  compact: |
    Federated learning distributes training across many participants without
    centralising raw data, and the distribution makes the gradient contribution
    interface the principal attack surface. Six attack classes structure the
    threat: direct Byzantine contribution, Sybil attacks, model replacement,
    backdoor installation via gradient poisoning, coordinated multi-round
    attacks, and targeted attacks in peer-to-peer variants. Adversary fraction
    is the principal defensive parameter: methods like Krum and Bulyan provide
    strong robustness up to ~33% Byzantine, median and trimmed mean up to
    ~50%, FoolsGold tolerates higher Sybil fractions specifically. Byzantine-
    robust aggregation is the primary defensive layer; participant reputation
    tracking and gradient anomaly detection are secondary layers; differential
    privacy at the federated level provides combined privacy and bounding
    benefits. The privacy-security tradeoff is structural: federated learning
    trades data centralisation risk for gradient poisoning risk; the tradeoff
    is favourable when data sensitivity dominates and unfavourable otherwise.
    Deployment contexts (cross-silo, on-device, privacy-preserving collaboration,
    federated LLM training) have distinctive threat models and defensive
    architectures; Section 8.14 deliverables provide configurable infrastructure
    for the principal contexts. Federated learning extends the Chapter 8
    framework to decentralised training; Section 8.15 production pipeline
    integrates federated defences with centralised defences (Sections 8.7-8.13)
    as configurable production tracks.

  key_takeaways:
    - 'Federated learning shifts attack surface from data validation to gradient aggregation; defensive responsibility shifts correspondingly'
    - 'Byzantine-robust aggregation is mandatory; FedAvg is inappropriate for production federated security'
    - 'Aggregation method selection depends on assumed Byzantine fraction: Krum/Bulyan for ~33%, median/trimmed mean for ~50%, FoolsGold for Sybil-heavy'
    - 'Sybil resistance is structurally required; Sybil amplification breaks Byzantine fraction assumptions otherwise'
    - 'Layered defence: robust aggregation (per-round primary) + reputation (multi-round) + anomaly detection (per-round) + DP-SGD (privacy plus bounding)'
    - 'Privacy-security tradeoff is structural; federated learning is privacy-improved but introduces gradient-poisoning surface'
    - 'Multi-round behavioural analysis catches what per-round defences miss; cross-round monitoring is mandatory for sophisticated threat models'
    - 'Deployment context (cross-silo vs on-device vs privacy-preserving vs federated LLM) drives threat model and defensive architecture'

preview_section_15:
  title: 'Production Auditing Pipeline: Capstone Integration'
  connection: |
    Sections 8.7 through 8.14 established the complete attack catalogue
    (data-pipeline poisoning, supply chain attacks, federated gradient
    poisoning) and the defensive infrastructure (detection primitives,
    defensive training, Byzantine-robust aggregation). Section 8.15 capstones
    Chapter 8 by integrating everything into a production auditing pipeline:
    a concrete CI/CD architecture that organisations deploy to cover the full
    Chapter 8 threat model. The pipeline has four principal tracks --
    instruction-tuning auditing (Section 8.7), preference auditing (Section
    8.8), supply chain auditing (Sections 8.9-8.11), and runtime detection
    (STRIP from Section 8.12) -- with federated extensions for decentralised
    deployments. Each track is the operational form of detection primitives
    plus defensive training plus supply chain controls covered in earlier
    sections. The pipeline produces compliance evidence, defensive metrics,
    and incident-response artifacts. Section 8.15 is the longest section in
    Chapter 8 (estimated 8 pages) because it is the operational artifact
    that makes the chapter usable in production contexts. Section 8.16 then
    synthesises the chapter and previews Chapter 9.

