section_overview:
  title: 'LoRA Adapters and Fine-Tuning Supply Chain: The Distributed Backdoor Vector'
  one_line_summary: |
    LoRA adapters democratised LLM customisation and democratised backdoor distribution
    in the same motion. A malicious adapter is 50-500MB, produced at commodity cost,
    and distributed through community marketplaces that perform no meaningful
    provenance verification. Merged into a base model without scrutiny -- the default
    workflow for most deployments -- the adapter installs arbitrary backdoor behaviour
    directly in the deployed policy weights. The attack surface is distribution rather
    than data, and the defensive architecture shifts from data-pipeline auditing
    (Sections 8.7-8.8) to adapter integrity verification, weight-delta anomaly
    detection, and behavioural diff testing against suspect adapters.

  why_this_section_exists: |
    Sections 8.7 and 8.8 covered the data-pipeline attack surfaces at two LLM training
    stages (instruction-tuning, preference learning). Section 8.9 covers the fourth
    and final LLM training stage (task-specific fine-tuning) but with a structural
    twist: the dominant fine-tuning regime for modern LLM customisation is LoRA-based
    adapter training, and adapters are distributed as artifacts rather than trained
    from data at the consumer side. The attack surface is not the fine-tuning data
    the consumer uses; it is the adapter the consumer downloads and merges. This
    makes the threat model structurally closer to classical supply chain compromise
    than to data poisoning, though the underlying payload is a Section 8.5-8.6
    backdoor.

    The section also bridges to Section 8.10, which covers HuggingFace and model
    repository risks more broadly. Adapters and base models share much of the same
    distribution infrastructure; the threats that apply to full model downloads apply
    to adapter downloads, often more severely because adapters receive less scrutiny
    than base models. Section 8.9 covers adapter-specific attack mechanics and
    defences; Section 8.10 covers the repository-level infrastructure that both
    adapters and base models traverse. Together they establish the supply chain threat
    model that the Chapter 5 Section 5.9 checklist becomes operational against in
    Section 8.15.

    The third function of this section is to quantify adapter-specific persistence.
    Section 8.5 Part 6 established that backdoor persistence through LoRA fine-tuning
    is essentially total -- LoRA freezes base weights and trains adapters, so base-
    weight backdoors pass through unchanged, and adapter-injected backdoors replace
    fine-tuning as the primary customisation signal. Section 8.9 extends this: adapter-
    based attacks benefit from the specific persistence regime of LoRA training.
    Organisations adopting LoRA for fine-tuning efficiency inherit adapter-specific
    threat exposure as a cost of the efficiency gain.

  position_in_chapter: |
    Section 8.9 completes the LLM-specific attack catalogue (Sections 8.7, 8.8, 8.9)
    and bridges to the supply chain section that follows. Section 8.10 covers the
    broader supply chain threat (pickle exploits, model repository risks, dataset
    provenance); Section 8.9 covers the adapter-specific attack surface that is
    adjacent to but distinct from the broader supply chain. Section 8.11 covers
    dataset provenance for pre-training specifically. Together Sections 8.9-8.11
    cover the distribution-layer attack surfaces that Section 8.15 auditing pipeline
    must handle as a distinct track from the data-pipeline auditing tracks from
    Sections 8.7-8.8.

    The section also references Chapter 5 Section 5.9 directly: the supply chain
    checklist items there become operational controls here. The adapter integrity
    verifier (deliverable 2) is the concrete implementation of what Section 5.9
    described abstractly. Section 8.15 wires both into the production pipeline.

