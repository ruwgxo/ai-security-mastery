  - section_number: 10
    title: 'Calibration and Threshold Tuning: Setting Detection Operating Points'
    filename: 'section_12_10_calibration_threshold.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1210 Calibration Threshold) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Probability calibration: why raw classifier probabilities are not reliable attack probability estimates'
      - 'Platt scaling: logistic regression calibration wrapper that maps raw scores to calibrated probabilities'
      - 'Isotonic regression calibration: non-parametric calibration for models with non-monotonic score distributions'
      - 'Reliability diagrams: visualising calibration quality before and after calibration'
      - 'Expected Calibration Error (ECE): the quantitative calibration quality metric'
      - 'Threshold selection: the precision-recall tradeoff and how to choose the operating point for each detector'
      - 'Business constraint mapping: what false positive rate is acceptable at what true positive rate for each threat class'
      - 'Per-threat-class threshold differentiation: jailbreak detection may tolerate higher FPR than PII detection'
      - 'Threshold stability over time: monitoring for threshold drift as attack distributions shift'
      - 'Ensemble threshold combination: how to combine per-detector thresholds into a single ensemble decision'

    key_concepts:
      - 'A model that outputs probability 0.9 for attacks should be correct 90% of the time; an uncalibrated model may output 0.9 but be correct only 60% of the time -- calibration fixes this'
      - 'Platt scaling is the correct calibration method for tree classifiers (Random Forest, XGBoost) which produce poorly calibrated raw probabilities; neural classifiers from PyTorch are better calibrated by default'
      - 'The operating threshold is not 0.5: for security classifiers, the correct threshold is determined by the acceptable false positive rate in the deployment context, not by the default midpoint'
      - 'Different threat classes warrant different operating thresholds: set the PII scanner threshold to favour recall (catch all leakage, tolerate false positives) and the anomaly detector threshold to favour precision (avoid alert fatigue)'

    deliverables:
      - 'model_calibrator.py -- Platt scaling and isotonic regression calibration for Random Forest and XGBoost classifiers'
      - 'reliability_diagram.py -- visualising calibration quality with reliability curves and ECE computation'
      - 'threshold_tuner.py -- precision-recall curve analysis with operating point selection for each detector'
      - 'business_constraint_mapper.py -- translating FPR and TPR business requirements into calibrated detection thresholds'
      - 'threshold_monitor.py -- tracking threshold performance over time with drift alerting'

    security_preview: |
      Calibration and threshold tuning are the last mile between a trained classifier and a
      production detector. An uncalibrated model with a default 0.5 threshold will produce alert
      volumes that either overwhelm the operations team (too low threshold) or miss real attacks
      (too high threshold). Section 12.10 establishes the calibrated operating point for each
      of the four trained detectors, making their confidence scores operationally meaningful.

