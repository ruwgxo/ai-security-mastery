sections:

  - section_number: 1
    title: 'ML Detection Taxonomy: From Rules to Models in the Seven-Track Gateway'
    filename: 'section_12_01_ml_detection_taxonomy.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1201 ML Detection Taxonomy) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Why rule-based detection and ML detection are complements, not competitors: strengths and failure modes of each'
      - 'ML detection family taxonomy: unsupervised anomaly, supervised classification, sequence modelling, semantic similarity, neural classification'
      - 'Mapping each ML family to the seven-track gateway track it populates'
      - 'Labelled data requirements per family: from zero-label (anomaly) to thousands-of-labelled-examples (neural classifier)'
      - 'Latency profile per family: from sub-millisecond (feature lookup) to 20ms+ (transformer inference)'
      - 'Explainability profile per family: from fully interpretable (decision tree features) to post-hoc only (neural net)'
      - 'Deployment sequencing: which ML family to deploy first on a new threat surface with no labelled data'
      - 'The detection maturity ladder for ML detectors: from statistical anomaly (L1) to calibrated ensemble (L3)'
      - 'Connection to Chapter 11 Section 11.03: the ML layer in the layered detection stack'
      - 'Chapter 12 roadmap: how each section maps to a gateway track and a trained deliverable'

    key_concepts:
      - 'Anomaly detection is the correct first detector when no labelled attack data exists; it surfaces the positives that train supervised classifiers'
      - 'Supervised classifiers outperform anomaly detectors in precision once 500+ labelled examples per class are available'
      - 'Sequence models are necessary when the attack signal spans multiple turns; single-turn classifiers miss escalation patterns'
      - 'Embedding detectors provide semantic coverage that regex-based Sigma rules cannot: paraphrase-equivalent payloads register as near-duplicates in embedding space'

    deliverables:
      - 'ML detection taxonomy reference table: five families x six dimensions (data requirement, latency, explainability, gateway track, OWASP coverage, ATLAS coverage)'
      - 'Deployment sequencing decision tree: how to choose the right ML family for a given threat surface and data availability'
      - 'Detection maturity ladder for ML detectors: L1 (statistical anomaly) through L3 (calibrated ensemble) with concrete criteria per level'
      - 'Chapter 12 section-to-deliverable roadmap'

    security_preview: |
      Section 12.01 is the threat model anchor for Chapter 12 in the same way Sections 9.01 and 10.01
      anchored their chapters. It establishes the ML detection taxonomy that every subsequent section
      inhabits. Without this map, the progression from anomaly detection to neural classification
      reads as an arbitrary sequence of ML techniques. With it, every section is a deliberate choice
      based on data availability, latency budget, and coverage requirement.

  - section_number: 2
    title: 'Security Feature Engineering: Extracting Signal from API Requests'
    filename: 'section_12_02_security_feature_engineering.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1202 Security Feature Engineering) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Why security features differ from standard NLP classification features: adversarial intent vs topic classification'
      - 'Token-level features: sequence length, special character density, instruction keyword frequency, token entropy'
      - 'Structural features: role boundary markers (system/user/assistant), JSON or code block presence, bracket and quotation density'
      - 'Semantic features: embedding distance from known attack clusters, cosine similarity to top-N jailbreak centroids'
      - 'Contextual features: turn number in conversation, prior refusal count, session duration, request rate'
      - 'API-level features: endpoint, model parameter choices, streaming flag, temperature setting'
      - 'Feature correlation and redundancy: which features carry independent signal vs which are collinear'
      - 'Feature importance analysis: SHAP values for identifying the most predictive security signals'
      - 'Distribution shift in features: how attack feature distributions change as adversaries adapt'
      - 'Feature pipeline architecture: extraction, caching, and versioning shared across all four detectors'

    key_concepts:
      - 'Security feature engineering starts with the adversary goal: what signal distinguishes an attack from a legitimate request at the feature level'
      - 'Structural features often carry more signal than semantic features for prompt injection: the presence of a role override marker is more diagnostic than the embedding of the payload'
      - 'Contextual features (prior refusal count, session escalation rate) capture multi-turn attack patterns that single-turn features miss'
      - 'SHAP feature importance on a trained Random Forest is the fastest way to identify which engineered features are contributing signal vs noise'

    deliverables:
      - 'security_feature_extractor.py -- production feature extraction pipeline: token, structural, semantic, contextual, and API-level features per request'
      - 'feature_importance_analyser.py -- SHAP-based feature importance analysis for any trained tree classifier'
      - 'feature_correlation_matrix.py -- pairwise feature correlation with redundancy flagging'
      - 'feature_distribution_monitor.py -- tracking feature distribution shift between training data and live traffic'

    security_preview: |
      Feature engineering is the highest-leverage activity in detection ML because the same feature
      pipeline is shared by all four trained classifiers in Chapter 12. A well-engineered feature
      set enables a Random Forest to reach 90%+ accuracy with 500 labelled examples; a naive
      feature set requires 10x the data to reach the same accuracy. Section 12.02 invests in
      the feature pipeline so every subsequent classifier section can focus on the model architecture.

  - section_number: 3
    title: 'Anomaly Detection: Isolation Forest and One-Class SVM for Zero-Label Threat Discovery'
    filename: 'section_12_03_anomaly_detection.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1203 Anomaly Detection) by Raghav Dinesh'
    estimated_pages: 7

    topics:
      - 'When to use anomaly detection: new threat surfaces, no labelled attack data, behavioural baseline requirements'
      - 'Isolation Forest: Liu et al. 2008 -- random feature splits isolate anomalies in fewer partitions than normal points'
      - 'Isolation Forest hyperparameters: contamination fraction, number of estimators, and their effect on false positive rate'
      - 'One-Class SVM: Scholkopf et al. 2001 -- maximum-margin boundary around the normal class in kernel space'
      - 'One-Class SVM kernel choice: RBF kernel for feature spaces with non-linear normal distributions'
      - 'Choosing between Isolation Forest and One-Class SVM: when each is appropriate'
      - 'Anomaly score interpretation: converting anomaly scores to actionable thresholds'
      - 'Contamination fraction calibration: using held-out labelled attack examples to tune the anomaly threshold'
      - 'Anomaly detection as a dataset collection tool: labelling anomaly alerts to build the supervised classifier training set'
      - 'Limitations of anomaly detection: high false positive rate, inability to distinguish attack families, no explainability'

    key_concepts:
      - 'Isolation Forest detects anomalies by measuring how quickly a point is isolated by random feature splits -- anomalies are isolated faster than normal points'
      - 'The contamination parameter sets the expected fraction of outliers in the training data; incorrect contamination inflates or deflates the anomaly threshold'
      - 'One-Class SVM draws a tight boundary around the normal training distribution; points outside the boundary are anomalous'
      - 'Anomaly detection is the correct first detector because it requires only normal traffic to train; deploy on day one, collect labelled positives from its alerts, train a supervised classifier on week two'

    deliverables:
      - 'isolation_forest_detector.py -- Isolation Forest anomaly detector with configurable contamination, feature pipeline integration, and anomaly score output'
      - 'one_class_svm_detector.py -- One-Class SVM detector with RBF kernel, threshold calibration, and alert routing'
      - 'anomaly_threshold_calibrator.py -- calibrating contamination fraction against known-attack holdout examples'
      - 'anomaly_alert_labeller.py -- structured labelling workflow: anomaly alert → human review → labelled example added to supervised training queue'
      - 'anomaly_vs_supervised_benchmark.py -- false positive rate and true positive rate comparison between anomaly detector and a supervised classifier at matched precision'

    security_preview: |
      Isolation Forest and One-Class SVM are the detection engineers' first tool on any new threat
      surface. They produce alerts without attack labels, and every alert that a human analyst
      confirms as a true positive becomes a training example for the supervised classifiers that
      follow in Sections 12.05 and 12.08. Section 12.03 is not a standalone chapter on anomaly
      detection -- it is the data collection mechanism that enables the rest of Chapter 12.

  - section_number: 4
    title: 'Dataset Curation: Building Labelled Security Datasets from Scratch'
    filename: 'section_12_04_dataset_curation_build.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1204 Dataset Curation Build) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'The labelled dataset problem in security ML: why public datasets are insufficient for production detectors'
      - 'Dataset sources: public jailbreak repositories, manual red team exercises, anomaly detector alerts, production traffic sampling'
      - 'Label schema design: binary (attack/benign) vs multi-class (injection/jailbreak/PII/benign) vs multi-label'
      - 'Annotation workflow: Label Studio setup, annotation guidelines, inter-annotator agreement measurement'
      - 'Class imbalance: why security datasets are structurally skewed and what ratios to expect in production'
      - 'SMOTE (Synthetic Minority Oversampling): generating synthetic attack examples to balance the training set'
      - 'Class weighting as an imbalance alternative: sklearn class_weight parameter and when to prefer it over SMOTE'
      - 'Train/validation/test split for security datasets: temporal splits to avoid data leakage'
      - 'Test set contamination prevention: why random splits produce optimistic evaluation and temporal splits do not'
      - 'Dataset versioning: DVC or equivalent for reproducible ML experiments on security datasets'

    key_concepts:
      - 'Security datasets must be collected from the production environment because the attack distribution in public datasets does not match the deployment context'
      - 'Temporal splits are mandatory for security ML evaluation: a random split allows the test set to contain examples from the same time window as the training set, inflating evaluation metrics'
      - 'SMOTE generates synthetic minority-class examples by interpolating between existing minority-class feature vectors -- use on the training set only, never on the test set'
      - 'Inter-annotator agreement (Cohen kappa > 0.8) is the minimum bar for a reliable annotation process; lower agreement means the label schema is ambiguous'

    deliverables:
      - 'security_dataset_builder.py -- end-to-end dataset construction: source collection, deduplication, label schema, train/val/test temporal split'
      - 'label_studio_config.py -- Label Studio annotation project configuration for attack classification with multi-label support'
      - 'class_imbalance_handler.py -- SMOTE oversampling and class weighting pipeline with imbalance ratio logging'
      - 'dataset_versioner.py -- DVC-based dataset versioning and experiment tracking for security ML datasets'
      - 'inter_annotator_agreement.py -- Cohen kappa and Fleiss kappa computation for annotation quality measurement'

    security_preview: |
      A trained classifier is only as good as its training data. Section 12.04 is the infrastructure
      section that makes every subsequent training section credible: without a rigorous dataset
      curation pipeline, accuracy numbers on training data are meaningless. The temporal split
      requirement in particular distinguishes security ML from standard ML evaluation -- it is
      the detection engineer's version of the principle that test data must not leak into training.

  - section_number: 5
    title: 'Supervised Classification: Random Forest and XGBoost for Labelled Attack Detection'
    filename: 'section_12_05_supervised_classification.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1205 Supervised Classification) by Raghav Dinesh'
    estimated_pages: 7

    topics:
      - 'When to use supervised classification: 500+ labelled examples per class, known attack taxonomy, precision requirements'
      - 'Random Forest for detection: ensemble of decision trees, feature importance via Gini impurity, robustness to noise'
      - 'Random Forest hyperparameter tuning: n_estimators, max_depth, min_samples_split, and their effect on false positive rate'
      - 'XGBoost for detection: gradient boosting with regularisation, handling class imbalance via scale_pos_weight'
      - 'XGBoost hyperparameter tuning: learning rate, max_depth, n_estimators, subsample, colsample_bytree'
      - 'SHAP explainability for both models: feature contribution visualisation per prediction for analyst review'
      - 'Evaluation metrics for security classifiers: precision, recall, F1, ROC-AUC, and why accuracy is misleading on imbalanced data'
      - 'Cross-validation strategy for security data: stratified temporal k-fold to prevent data leakage'
      - 'Hyperparameter search: Optuna-based Bayesian optimisation for efficient hyperparameter tuning'
      - 'Model selection: when Random Forest outperforms XGBoost for security tasks and vice versa'

    key_concepts:
      - 'Random Forest trains an ensemble of decorrelated decision trees; ensemble diversity reduces variance and makes the model robust to noise in individual features'
      - 'XGBoost fits trees sequentially, each correcting the residual errors of the previous; regularisation terms control overfitting on small security datasets'
      - 'SHAP values decompose each prediction into per-feature contributions, enabling analyst-readable explanations: this request was flagged because instruction_keyword_count was 4.2 standard deviations above baseline'
      - 'For security classifiers, maximise recall (catch more attacks) at the cost of precision (tolerate more false positives), then tune the decision threshold to bring precision to an acceptable operating point'

    deliverables:
      - 'random_forest_classifier.py -- Random Forest prompt injection and jailbreak classifier with feature importance and SHAP integration'
      - 'xgboost_classifier.py -- XGBoost attack classifier with scale_pos_weight calibration and SHAP explainability'
      - 'hyperparameter_tuner.py -- Optuna Bayesian hyperparameter search for both classifiers with cross-validation objective'
      - 'security_evaluator.py -- precision, recall, F1, ROC-AUC, and confusion matrix evaluation with imbalance-aware reporting'
      - 'shap_explainer.py -- SHAP summary and waterfall plots for analyst-readable per-prediction explanations'

    security_preview: |
      Random Forest and XGBoost are the workhorse classifiers of production security ML. They
      train in seconds on datasets of tens of thousands of examples, produce reliable calibrated
      probabilities, and expose feature importance that security analysts can audit. Section 12.05
      builds both classifiers to 90%+ accuracy on the Chapter 12 labelled dataset and establishes
      the evaluation harness used to benchmark every subsequent section's classifier.

  - section_number: 6
    title: 'Sequence Models: LSTM and GRU for Multi-Turn Conversation Threat Detection'
    filename: 'section_12_06_sequence_models.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1206 Sequence Models) by Raghav Dinesh'
    estimated_pages: 7

    topics:
      - 'Why single-turn classifiers miss multi-turn attacks: gradual jailbreak erosion, payload splitting across turns'
      - 'Representing a conversation as a sequence: turn encoding, role embedding, cumulative context window'
      - 'LSTM architecture review from Chapter 2: hidden state, cell state, input/forget/output gates -- applied to conversation sequences'
      - 'GRU architecture review: simplified gating, update and reset gates, and why GRU trains faster on short conversation sequences'
      - 'Temporal features for conversation-level detection: turn escalation rate, refusal bypass attempt count, payload fragmentation score'
      - 'Training sequence models on conversation-level labelled data: conversation dataset construction and collation'
      - 'Attention weights over turns: identifying which turns in the conversation triggered the detection signal'
      - 'Sequence model inference in production: handling variable-length conversations within the 50ms budget'
