    security_preview: |
      Benchmarking and A/B testing are the quality assurance layer for the Chapter 12 detection
      system. Without them, accuracy improvements claimed for new model versions are anecdotal.
      With them, every model promotion decision is backed by statistically significant production
      evidence. Section 12.16 builds the evaluation infrastructure that Chapter 17's monitoring
      and tuning chapter extends.

  - section_number: 17
    title: 'Production ML Gateway Capstone: Four-Detector Ensemble in the Seven-Track Architecture'
    filename: 'section_12_17_production_ml_gateway.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1217 Production ML Gateway) by Raghav Dinesh'
    estimated_pages: 8

    topics:
      - 'Design brief: integrating the Chapter 12 four-detector ensemble into the Chapter 11 seven-track gateway'
      - 'Gateway architecture with ML detectors: which ML detector populates which gateway track'
      - 'Track 1 (injection): embedding similarity + XGBoost injection classifier in parallel'
      - 'Track 2-4 (jailbreak): GRU sequence detector for multi-turn patterns + DistilBERT neural classifier for single-turn'
      - 'Track 5 (PII): PII scanner on model output as post-inference stage'
      - 'Track 6 (extraction): Isolation Forest anomaly detector on API usage patterns'
      - 'Track 7 (adversarial): adversarial example detectors from Chapter 10 integrated'
      - 'Latency breakdown with ML detectors: assigning budget slices to each track and validating against 50ms P99'
      - 'Graceful degradation: which detectors are load-shed first when latency budget is threatened'
      - 'Production deployment checklist: calibration verification, shadow mode validation, canary promotion, and monitoring dashboard'
      - 'Completing the ATLAS AML.T0040 Sigma rule for ML-classifier evasion detection'

    key_concepts:
      - 'The production ML gateway distributes the Chapter 12 four-detector ensemble across the seven tracks based on each detector''s coverage profile: embedding detector on injection tracks, GRU on jailbreak tracks, Isolation Forest on API abuse tracks'
      - 'Graceful degradation under load: when latency budget is at risk, shed the highest-latency detectors first (DistilBERT), keep the fastest detectors running (regex + embedding), and fall back to signature-only detection'
      - 'The production deployment checklist enforces the Section 12.13 model registry gate conditions before any new detector version handles production traffic'
      - 'The ATLAS AML.T0040 Sigma rule covers adversaries attempting to evade ML classifiers by probing for classification boundaries -- the detection signal is a pattern of semantically similar requests near the decision boundary'

    deliverables:
      - 'production_ml_gateway.py -- seven-track gateway with Chapter 12 four-detector ensemble integrated, async parallel scoring, and 50ms P99 validated'
      - 'track_ml_assignment.py -- mapping each ML detector to its gateway track with coverage justification'
      - 'gateway_graceful_degradation.py -- load-shedding policy: detector priority ranking and fallback to signature-only mode'
      - 'ml_gateway_latency_benchmark.py -- full gateway P99 latency measurement with and without ML detectors'
      - 'aml_t0040_sigma_rule_generator.py -- completed Sigma rule for ATLAS AML.T0040 ML classifier evasion detection'
      - 'ml_gateway_deployment_checklist.py -- pre-production checklist: calibration, shadow mode, canary, monitoring dashboard'
      - 'ml_gateway_monitoring_dashboard.py -- Prometheus metrics and Grafana dashboard configuration for the ML-enabled gateway'

    security_preview: |
      Section 12.17 closes the Chapter 12 production capstone. The seven-track gateway now runs
      four ML detectors in parallel alongside the signature-based Sigma rules from Chapter 11.
      The result is a defence-in-depth detection system where novel attack variants that evade
      the signature layer are caught by the ML classifiers, and edge cases where ML classifiers
      produce low-confidence uncertain outputs are flagged for analyst review rather than either
      blocked or silently passed. This is the production detection system that Chapter 13
      wraps in behavioural analysis.

  - section_number: 18
    title: 'Chapter 12 Summary: ML Detection Architecture and Chapter 13 Preview'
    filename: 'section_12_18_chapter_summary.yaml'
    note: '20260112 | AI Security: ML-Based Detection Systems (Section 1218 Chapter Summary) by Raghav Dinesh'
    estimated_pages: 6

    overview: |
      Synthesis of all 17 content sections into the ML-based detection architecture.
      Covers the five ML detection families (anomaly, supervised, sequence, semantic, neural),
      the feature engineering pipeline shared across all four detectors, the dataset curation
      and model registry infrastructure required for operational sustainability, the calibration
      and threshold tuning that translates model probabilities into actionable decisions, the
      inference optimisation that keeps the four-detector ensemble within the 50ms P99 budget,
      and the production ML gateway capstone that integrates everything into the seven-track
      architecture. Closes Chapter 12 and previews Chapter 13 (Behavioural Analysis and Monitoring).

    structure:
      part_1: 'Sections 1-2 Review: ML detection taxonomy and security feature engineering'
      part_2: 'Section 3-4 Review: anomaly detection and dataset curation'
      part_3: 'Sections 5-9 Review: four trained detectors -- classifier, sequence, semantic, neural, and PII scanner'
      part_4: 'Sections 10-12 Review: calibration, feature pipeline, and inference optimisation'
      part_5: 'Sections 13-14 Review: model registry and live dataset curation pipeline'
      part_6: 'Sections 15-16 Review: four-detector ensemble and benchmarking'
      part_7: 'Section 17 Review: production ML gateway capstone'
      integration: 'How Chapter 12 extends the Chapter 11 seven-track gateway with four ML detectors'
      cross_chapter: 'Chapter 12 closes the ML layer of Part 3; the detection system now has both rules (Ch11) and classifiers (Ch12)'
      mistakes: 'Common ML detection mistakes: training on imbalanced data without treatment, ignoring calibration, deploying without latency profiling, not versioning models'
      reference: 'Quick lookup: ML family selection decision tree, detector-to-track mapping, threshold operating point guide'
      preview: 'Chapter 13: Behavioural Analysis and Monitoring -- from per-request classifiers to session-level user profiling and drift detection'

    deliverables:
      - 'ML detection architecture diagram: five detector families, four trained models, feature pipeline, model registry, and gateway integration'
      - 'Chapter 12 ML detector reference card: all four detectors with accuracy, latency, coverage, and operating threshold'
      - 'Operational sustainability checklist: model registry, live dataset curation, retraining trigger, canary promotion -- the four requirements for a detector that does not decay'
      - 'Chapter 12 knowledge assessment quiz (20 questions)'
      - 'Seven-track ML gateway security checklist for production AI deployments'
      - 'Chapter 12 to Chapter 13 integration diagram: per-request ML classification as input to Chapter 13 session-level behavioural analysis'

    preview_chapter_13: |
      Chapter 13: Behavioural Analysis and Monitoring
      Chapter 12 trained classifiers that evaluate individual API requests.
      Chapter 13 lifts the analysis to the session and user level: behavioural
      baselines that capture what a normal user session looks like, drift detection
      that flags when a user''s behaviour deviates from baseline, rate-based
      detection patterns that the Chapter 12 classifiers cannot see because they
      operate per-request, and user behaviour profiling that builds entity-level
      risk scores across sessions. Chapter 13 also covers model behavioural
      monitoring: detecting when the LLM''s output distribution shifts in ways that
      indicate prompt injection success rather than surface-level injection attempts.
      By the end of Chapter 13, the detection system covers the full arc from
      individual request analysis (Chapter 12) to session-level behavioural analysis
      (Chapter 13), ready for Chapter 14''s production deployment at scale.

