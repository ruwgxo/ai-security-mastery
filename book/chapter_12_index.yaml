    from the detection framework Chapter 11 designed to the trained classifiers
    and anomaly detectors Chapter 12 ships. The chapter opens by connecting
    Chapter 11's detection-as-code principles to the ML training pipeline:
    a detection rule is a hypothesis, a trained classifier is that hypothesis
    evaluated against labelled evidence. It then moves through the full ML
    detection stack: anomaly detection with Isolation Forest and One-Class SVM
    for zero-label threat discovery, supervised classification with Random Forest
    and XGBoost for labelled attack datasets, sequence modelling with LSTM and GRU
