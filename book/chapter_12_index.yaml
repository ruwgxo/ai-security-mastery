  security_themes:
    ml_complements_rules: |
      Sigma rules detect known signatures; ML classifiers detect novel variants of known attack classes.
      The seven-track gateway needs both: rules for speed and explainability, ML for coverage and
      generalisation. Chapter 12 trains the ML tracks that Chapter 11 designed the slots for.
    unsupervised_first: |
      Isolation Forest and One-Class SVM require no labelled attack data. Deploy them on day one
      of any new LLM integration to establish a statistical baseline. The first labelled positives
      that surface from anomaly alerts become the training set for the supervised classifiers that
      follow. This is the correct sequencing: unsupervised anomaly detection enables labelled
      dataset collection, which enables supervised classification.
    semantic_evasion_requires_embedding_detection: |
      Surface-level paraphrasing defeats regex and keyword-based detection. An adversary who knows
      the Sigma rule rewrites the payload to avoid it. Embedding-based detection measures semantic
      distance from known attack clusters in a 768-dimensional space -- paraphrasing that preserves
      attack intent moves only a small distance from the original embedding centroid and still triggers.
    imbalance_is_the_default: |
      Security datasets are structurally imbalanced: 1 attack per 1,000 legitimate requests is
      optimistic in production. Training a classifier on raw imbalanced data produces a model that
      learns to predict the majority class exclusively. SMOTE, class weighting, threshold calibration,
      and precision-recall evaluation (not accuracy) are not optional for security ML -- they are
      the minimum viable treatment for a class-imbalanced detection problem.
    latency_is_a_hard_constraint: |
      A detector that adds 200ms to every API call will be disabled by the product team within a week.
      The 50ms P99 budget is non-negotiable. Chapter 12's production inference section is not
      optimisation for its own sake -- it is the difference between a detector that survives contact
      with engineering reality and one that does not.
    distribution_shift_is_certain: |
      Adversarial attack distributions shift continuously. A classifier trained on today's jailbreak
      corpus will degrade against next month's novel techniques. The model registry and dataset
      curation pipeline are the operational infrastructure that makes retraining feasible and safe.
      Without them, Chapter 12's trained classifiers are a snapshot that decays.

