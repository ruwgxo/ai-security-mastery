chapter_overview:
  number: 12
  title: 'ML-Based Detection Systems'
  part: 'Part 3: Detection Engineering for AI'
  position: 'Chapter 12 of 4 in Part 3; second chapter of Part 3'

  purpose: |
    Chapter 11 designed the detection framework: detection-as-code principles,
    the seven-track gateway architecture, MITRE ATT&CK and ATLAS coverage mapping,
    Sigma rule templates, and the detection maturity model. Everything Chapter 11
    produced was structural -- the skeleton of a detection system. Chapter 12 trains
    the muscles: the ML models that give the framework its detection power.

    The core argument of Chapter 12 is that rule-based detection (Sigma, regex,
    keyword lists) and ML-based detection are complements, not competitors. Rules
    excel at known, stable patterns: the DAN persona prefix, a specific jailbreak
    phrase, a known injection template. ML classifiers excel at generalisation:
    detecting prompt injection variants the rules have never seen, recognising
    jailbreak intent across novel phrasings, surfacing anomalous API usage patterns
    that differ statistically from baseline without matching any explicit rule. The
    seven-track gateway runs both in parallel; Chapter 12 trains the ML tracks.

    The chapter is structured as a progression from unsupervised to supervised to
    sequence-aware to semantic-aware detection. Anomaly detection (Isolation Forest,
    One-Class SVM) requires no labelled attack data -- it only needs normal traffic
    to establish a baseline and flag statistical outliers. This is the right starting
    point for any detection engineer facing a new threat surface with no labelled
    dataset. Supervised classification (Random Forest, XGBoost) requires labelled
    attack examples but produces higher precision detectors once sufficient positives
    are collected. Sequence models (LSTM, GRU) extend classification into the
    temporal dimension: detecting escalating jailbreak patterns across a multi-turn
    conversation, not just flagging individual turns in isolation. Embedding-based
    detection (Sentence Transformers, cosine similarity) adds semantic awareness:
    recognising paraphrase-equivalent attack prompts that share no surface tokens
    with known examples.

    Feature engineering receives dedicated treatment because security features are
    structurally different from the NLP classification features most ML tutorials
    cover. A prompt injection detection feature set includes token-level features
    (sequence length, special character density, instruction keyword frequency),
    structural features (role boundary markers, JSON or code block presence),
    semantic features (embedding distance from known attack clusters), and
    contextual features (turn number in conversation, prior refusal count). Chapter 12
    builds the feature extraction pipeline that all four trained detectors share.

    The chapter closes with the production reality: a 50ms P99 latency budget shared
    across all seven gateway tracks forces careful optimisation. Quantised models,
    batch inference, feature caching, and async scoring are not premature optimisation
    here -- they are the difference between a detector that runs in production and
    one that sits in a notebook. The model registry and dataset curation system
    ensure that the trained classifiers can be versioned, A/B tested, and retrained
    as the attack distribution shifts, connecting forward to Chapter 17's monitoring
    and tuning.

