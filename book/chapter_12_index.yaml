      - 'ATLAS AML.T0040 mapping: sequence detection as the primary defence against multi-turn classifier evasion'

    key_concepts:
      - 'Multi-turn attacks fragment the attack payload across turns to defeat single-turn classifiers; each turn is innocuous in isolation but malicious in sequence'
      - 'LSTM hidden state accumulates contextual information across turns; the final hidden state encodes the full conversation history for classification'
      - 'GRU is preferred over LSTM for conversation sequences shorter than 20 turns: it trains faster and matches LSTM accuracy with fewer parameters'
