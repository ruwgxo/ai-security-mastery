  deliverable_3:
    title: 'Class Imbalance Handler'
    filename: 'class_imbalance_handler.py'
    description: 'SMOTE oversampling and class weighting pipeline for imbalanced security datasets. Applies SMOTE to the training set only, validates that validation and test sets are untouched, logs imbalance ratios before and after treatment, and computes the recommended class_weight for scikit-learn classifiers.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: imbalanced-learn (pip install imbalanced-learn), numpy, pandas.'
    code: |
      # class_imbalance_handler.py
      # Section 12.04: Class Imbalance Handler (SMOTE + Class Weighting)
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import Dict, Optional, Tuple

      import numpy as np
      import pandas as pd
      from imblearn.over_sampling import SMOTE
      from sklearn.utils.class_weight import compute_class_weight


      @dataclass
      class ImbalanceReport:
          original_attack: int
          original_benign: int
          original_ratio: float
          treated_attack: int
          treated_benign: int
          treated_ratio: float
          treatment: str
          class_weights: Dict[int, float]


      def log_imbalance(label: str, y: np.ndarray) -> None:
          n_atk = (y == 1).sum()
          n_ben = (y == 0).sum()
          ratio = n_ben / max(n_atk, 1)
          print(f'  {label}: attack={n_atk}  benign={n_ben}  ratio={ratio:.1f}:1')


      def apply_smote(
          X_train: np.ndarray,
          y_train: np.ndarray,
          sampling_strategy: float = 0.5,
          k_neighbors: int = 5,
          random_state: int = 42,
      ) -> Tuple[np.ndarray, np.ndarray]:
          '''
          Apply SMOTE to the training set to oversample the minority (attack) class.

          sampling_strategy=0.5 means the attack class will be oversampled to 50%
          of the size of the benign class after SMOTE.

          RULE: NEVER call this on validation or test data.
          '''
          print('\nApplying SMOTE to training set:')
          log_imbalance('before', y_train)

          n_attack = (y_train == 1).sum()
          if n_attack < k_neighbors + 1:
              print(f'  WARN: {n_attack} attack examples < k_neighbors ({k_neighbors}). '
                    f'Reduce k_neighbors or use class_weight instead.')
              return X_train, y_train

          smote = SMOTE(
              sampling_strategy=sampling_strategy,
              k_neighbors=k_neighbors,
              random_state=random_state,
          )
          X_res, y_res = smote.fit_resample(X_train, y_train)
          log_imbalance('after', y_res)
          return X_res, y_res


      def compute_class_weights(y_train: np.ndarray) -> Dict[int, float]:
          '''
          Compute class weights inversely proportional to class frequency.
          Pass as class_weight parameter to sklearn classifiers.
          '''
          classes = np.unique(y_train)
          weights = compute_class_weight(class_weight='balanced', classes=classes, y=y_train)
          weight_dict = dict(zip(classes.tolist(), weights.tolist()))
          print(f'\nComputed class weights: {weight_dict}')
          return weight_dict


      def recommend_treatment(y_train: np.ndarray, min_smote_examples: int = 100) -> str:
          '''
          Returns the recommended imbalance treatment given the training set composition.
          '''
          n_attack = (y_train == 1).sum()
          if n_attack >= min_smote_examples:
              return 'smote'
          return 'class_weight'


      def apply_imbalance_treatment(
          X_train: np.ndarray,
          y_train: np.ndarray,
          X_val: np.ndarray,
          y_val: np.ndarray,
          X_test: np.ndarray,
          y_test: np.ndarray,
          sampling_strategy: float = 0.5,
      ) -> Tuple[np.ndarray, np.ndarray, Dict[int, float], ImbalanceReport]:
          '''
          Apply the recommended imbalance treatment to the training set only.
          Validates that val and test sets are unchanged.
          Returns (X_train_treated, y_train_treated, class_weights, report).
          '''
          treatment = recommend_treatment(y_train)
          print(f'\nRecommended treatment: {treatment}')

          orig_attack = int((y_train == 1).sum())
          orig_benign = int((y_train == 0).sum())

          if treatment == 'smote':
              X_out, y_out = apply_smote(X_train, y_train, sampling_strategy)
          else:
              print('\nUsing class_weight (too few attack examples for SMOTE).')
              X_out, y_out = X_train, y_train

          weights = compute_class_weights(y_train)  # always compute from original

          # Validate val and test are untouched
          assert X_val.shape == X_val.shape, 'Validation set modified -- this is a bug.'
          assert X_test.shape == X_test.shape, 'Test set modified -- this is a bug.'

          report = ImbalanceReport(
              original_attack=orig_attack,
              original_benign=orig_benign,
              original_ratio=orig_benign / max(orig_attack, 1),
              treated_attack=int((y_out == 1).sum()),
              treated_benign=int((y_out == 0).sum()),
              treated_ratio=int((y_out == 0).sum()) / max(int((y_out == 1).sum()), 1),
              treatment=treatment,
              class_weights=weights,
          )
          return X_out, y_out, weights, report


      if __name__ == '__main__':
          from security_feature_extractor import APIRequestContext, extract_features

          # Simulate imbalanced training data: 20:1 ratio
          rng = np.random.default_rng(42)
          n_benign, n_attack = 200, 10
          X_train = np.vstack([
              rng.normal(0.1, 0.05, (n_benign, 5)),
              rng.normal(0.7, 0.1, (n_attack, 5)),
          ])
          y_train = np.array([0] * n_benign + [1] * n_attack)
          X_val = rng.normal(0.1, 0.05, (30, 5))
          y_val = np.array([0] * 28 + [1] * 2)
          X_test = rng.normal(0.1, 0.05, (30, 5))
          y_test = np.array([0] * 28 + [1] * 2)

          print(f'Training imbalance ratio: {n_benign/n_attack:.0f}:1')
          X_out, y_out, weights, report = apply_imbalance_treatment(
              X_train, y_train, X_val, y_val, X_test, y_test,
          )
          print(f'\nReport: {report}')

  deliverable_4:
    title: 'Dataset Versioner'
    filename: 'dataset_versioner.py'
    description: 'DVC-based dataset versioning for reproducible security ML experiments. Initialises DVC in the project, adds dataset artefacts to DVC tracking, tags dataset versions to Git commits, and provides a restore function to retrieve any prior dataset version by tag.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: dvc (pip install dvc), gitpython (pip install gitpython). DVC remote storage must be configured separately.'
    code: |
      # dataset_versioner.py
      # Section 12.04: DVC-Based Dataset Versioning
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import hashlib
      import json
      import subprocess
      from dataclasses import dataclass
      from pathlib import Path
      from typing import List, Optional


      @dataclass
      class DatasetVersion:
          version_tag: str
          dataset_paths: List[str]
          content_hashes: dict
          schema_version: str
          created_at: str
          description: str


      def _sha256(path: str) -> str:
          h = hashlib.sha256()
          with open(path, 'rb') as f:
              for chunk in iter(lambda: f.read(8192), b''):
                  h.update(chunk)
          return h.hexdigest()[:16]


      def _run(cmd: List[str], cwd: Optional[str] = None) -> str:
          result = subprocess.run(cmd, capture_output=True, text=True, cwd=cwd)
          if result.returncode != 0:
              print(f'  CMD: {" ".join(cmd)}')
              print(f'  STDERR: {result.stderr.strip()}')
          return result.stdout.strip()


      class DatasetVersioner:
          '''
          DVC-based versioning for security ML datasets.

          Workflow:
            1. version(paths, tag, description) -- add files to DVC, commit, tag
            2. restore(tag) -- checkout tag and dvc pull to restore dataset state
            3. list_versions() -- show all tagged dataset versions
          '''

          def __init__(self, repo_root: str = '.', dvc_remote: Optional[str] = None) -> None:
              self.repo_root = Path(repo_root)
              self.dvc_remote = dvc_remote
              self._versions_file = self.repo_root / '.dataset_versions.json'

          def _ensure_dvc_init(self) -> None:
              dvc_dir = self.repo_root / '.dvc'
              if not dvc_dir.exists():
                  print('Initialising DVC...')
                  _run(['dvc', 'init'], cwd=str(self.repo_root))
                  if self.dvc_remote:
                      _run(['dvc', 'remote', 'add', '-d', 'storage', self.dvc_remote],
                           cwd=str(self.repo_root))
                  print('DVC initialised.')

          def version(
              self,
              dataset_paths: List[str],
              tag: str,
              description: str,
              schema_version: str = '1.0.0',
          ) -> DatasetVersion:
              '''
              Add dataset files to DVC tracking, commit to Git, and tag.
              '''
              import datetime
              self._ensure_dvc_init()

              hashes = {}
              for p in dataset_paths:
                  if not Path(p).exists():
                      print(f'  WARN: {p} not found, skipping.')
                      continue
                  _run(['dvc', 'add', p], cwd=str(self.repo_root))
                  hashes[p] = _sha256(p)
                  print(f'  DVC tracked: {p} (hash={hashes[p]})')

              dv = DatasetVersion(
                  version_tag=tag,
                  dataset_paths=dataset_paths,
                  content_hashes=hashes,
                  schema_version=schema_version,
                  created_at=datetime.datetime.utcnow().isoformat(),
                  description=description,
              )

              # Persist version metadata
              versions = self._load_versions()
              versions[tag] = dv.__dict__
              self._versions_file.write_text(json.dumps(versions, indent=2))

              # Git commit and tag
              _run(['git', 'add', '.'], cwd=str(self.repo_root))
              _run(['git', 'commit', '-m', f'Dataset version {tag}: {description}'],
                   cwd=str(self.repo_root))
              _run(['git', 'tag', tag], cwd=str(self.repo_root))
              print(f'  Tagged: {tag}')

              if self.dvc_remote:
                  _run(['dvc', 'push'], cwd=str(self.repo_root))
                  print('  Pushed to DVC remote.')

              return dv

          def restore(self, tag: str) -> None:
              '''Checkout a prior dataset version by Git tag and pull dataset files.'''
              print(f'Restoring dataset version: {tag}')
              _run(['git', 'checkout', tag], cwd=str(self.repo_root))
              _run(['dvc', 'pull'], cwd=str(self.repo_root))
              print(f'  Restored. Dataset files at state of tag {tag}.')

          def list_versions(self) -> None:
              versions = self._load_versions()
              if not versions:
                  print('No dataset versions found.')
                  return
              print('Dataset versions:')
              for tag, meta in sorted(versions.items()):
                  print(f'  [{tag}] {meta["created_at"]} -- {meta["description"]}')
                  print(f'    files: {meta["dataset_paths"]}')
                  print(f'    hashes: {meta["content_hashes"]}')

          def _load_versions(self) -> dict:
              if not self._versions_file.exists():
                  return {}
              return json.loads(self._versions_file.read_text())


      if __name__ == '__main__':
          # Demonstration -- requires git repo and dvc installed
          versioner = DatasetVersioner(repo_root='/tmp/demo_repo')
          versioner.list_versions()
          print('\nDatasetVersioner ready.')
          print('Usage:')
          print('  versioner.version(["dataset/train_v1.parquet"], tag="dataset-v1.0", description="Initial dataset")')
          print('  versioner.restore("dataset-v1.0")')

  deliverable_5:
    title: 'Inter-Annotator Agreement'
    filename: 'inter_annotator_agreement.py'
    description: 'Computes Cohen kappa (two annotators) and Fleiss kappa (k annotators) for annotation quality measurement. Produces a calibration report with per-class disagreement breakdown and guidance for annotation guideline revision.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: numpy, scipy, sklearn.'
    code: |
      # inter_annotator_agreement.py
      # Section 12.04: Inter-Annotator Agreement Measurement
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass
      from typing import Dict, List, Tuple

      import numpy as np
      from sklearn.metrics import cohen_kappa_score


      KAPPA_THRESHOLDS = {
          'strong':   0.80,
          'moderate': 0.60,
          'weak':     0.40,
      }

      LABEL_CLASSES = ['benign', 'prompt_injection', 'jailbreak', 'pii_extraction', 'model_extraction', 'uncertain']


      @dataclass
      class AgreementReport:
          kappa: float
          agreement_level: str
          action_required: str
          per_class_disagreement: Dict[str, float]
          n_examples: int
          n_disagreements: int


      def cohen_kappa(labels_a: List[str], labels_b: List[str]) -> Tuple[float, AgreementReport]:
          '''
          Compute Cohen kappa between two annotators.
          labels_a, labels_b: lists of string labels of equal length.
          '''
          assert len(labels_a) == len(labels_b), 'Annotator label lists must be equal length.'
          kappa = float(cohen_kappa_score(labels_a, labels_b))

          disagreements = [i for i, (a, b) in enumerate(zip(labels_a, labels_b)) if a != b]
          n_dis = len(disagreements)

          # Per-class disagreement: how often does each class appear in a disagreement?
          per_class: Dict[str, int] = {c: 0 for c in LABEL_CLASSES}
          for i in disagreements:
              per_class[labels_a[i]] = per_class.get(labels_a[i], 0) + 1
              per_class[labels_b[i]] = per_class.get(labels_b[i], 0) + 1
          per_class_rate = {c: v / max(n_dis * 2, 1) for c, v in per_class.items() if v > 0}

          level, action = _interpret_kappa(kappa)
          report = AgreementReport(
              kappa=kappa,
              agreement_level=level,
              action_required=action,
              per_class_disagreement=per_class_rate,
              n_examples=len(labels_a),
              n_disagreements=n_dis,
          )
          return kappa, report


      def fleiss_kappa(ratings_matrix: np.ndarray) -> float:
          '''
          Compute Fleiss kappa for k annotators and m categories.
          ratings_matrix: shape (n_examples, m_categories) where each cell is
          the number of annotators who assigned that category to that example.
          '''
          n, m = ratings_matrix.shape
          n_raters = ratings_matrix.sum(axis=1)
          assert np.all(n_raters == n_raters[0]), 'All examples must have same number of raters.'
          k = int(n_raters[0])

          p_j = ratings_matrix.sum(axis=0) / (n * k)
          P_i = ((ratings_matrix ** 2).sum(axis=1) - k) / (k * (k - 1))
          P_bar = P_i.mean()
          P_e_bar = (p_j ** 2).sum()

          if abs(1.0 - P_e_bar) < 1e-10:
              return 1.0
          return float((P_bar - P_e_bar) / (1.0 - P_e_bar))


      def _interpret_kappa(kappa: float) -> Tuple[str, str]:
          if kappa >= KAPPA_THRESHOLDS['strong']:
              return ('strong', 'Proceed with single-annotator labelling.')
          elif kappa >= KAPPA_THRESHOLDS['moderate']:
              return ('moderate', 'Hold calibration discussion; revise guidelines for edge cases; re-measure.')
          elif kappa >= KAPPA_THRESHOLDS['weak']:
              return ('weak', 'Do not proceed. Redesign label schema; conduct team training; re-measure from scratch.')
          else:
              return ('poor', 'Stop annotation. Escalate to detection engineering lead. Revisit attack taxonomy.')


      def print_agreement_report(report: AgreementReport, annotator_names: Tuple[str, str] = ('A', 'B')) -> None:
          print(f'Inter-Annotator Agreement: {annotator_names[0]} vs {annotator_names[1]}')
          print(f'  Kappa:            {report.kappa:.3f}')
          print(f'  Agreement level:  {report.agreement_level.upper()}')
          print(f'  Examples:         {report.n_examples}')
          print(f'  Disagreements:    {report.n_disagreements} ({report.n_disagreements/report.n_examples:.1%})')
          print(f'  Action:           {report.action_required}')
          if report.per_class_disagreement:
              print('  Per-class disagreement rate:')
              for cls, rate in sorted(report.per_class_disagreement.items(), key=lambda x: -x[1]):
                  bar = '#' * int(rate * 20)
                  print(f'    {cls:<20} {rate:.2%}  {bar}')


      if __name__ == '__main__':
          # Simulate two annotators on a 60-example calibration set
          rng = np.random.default_rng(42)
          ground_truth = rng.choice(
              ['benign', 'prompt_injection', 'jailbreak', 'benign', 'benign'],
              size=60,
          )
          # Annotator A: mostly agrees, few errors
          labels_a = ground_truth.copy()
          # Annotator B: disagrees on ~15% of examples
          labels_b = ground_truth.copy()
          noise_idx = rng.choice(60, size=9, replace=False)
          for i in noise_idx:
              labels_b[i] = rng.choice(['uncertain', 'prompt_injection', 'jailbreak'])

          kappa, report = cohen_kappa(labels_a.tolist(), labels_b.tolist())
          print_agreement_report(report, ('Analyst A', 'Analyst B'))

          print('\n--- Fleiss Kappa (3 annotators, 3 categories) ---')
          # Simulate: 50 examples, 3 annotators, 3 categories
          # Each row sums to 3 (number of annotators)
          ratings = np.array([
              [3, 0, 0], [2, 1, 0], [3, 0, 0], [1, 2, 0], [0, 3, 0],
          ] * 10)
          fk = fleiss_kappa(ratings)
          level, action = _interpret_kappa(fk)
          print(f'  Fleiss kappa: {fk:.3f} -- {level.upper()}')
          print(f'  Action: {action}')

common_mistakes:

  mistake_1:
    description: 'Using a random train/test split instead of a temporal split, producing evaluation metrics that overstate production performance by 10-20 percentage points'
    why_it_happens: |
      sklearn.train_test_split() defaults to shuffle=True. Every ML tutorial uses it.
      The engineer follows the tutorial pattern, produces a 94% accurate classifier in
      evaluation, deploys it, and observes 74% accuracy on the first week of production
      traffic. The gap is entirely due to leakage from the random split.
    consequence: |
      The test set contains examples from the same time window and adversary campaigns as
      the training set. The classifier memorises campaign-specific patterns that are not
      present in future traffic. The evaluation metrics are optimistic by the margin of
      that memorisation. The production failure is silent: the classifier continues to
      produce predictions; they are just wrong at a rate higher than the evaluation indicated.
    correct_approach: |
      Sort the dataset by collected_at_ms and split at the cumulative fraction boundaries.
      The security_dataset_builder.py in deliverable_1 implements this correctly. Never
      pass shuffle=True or use train_test_split without setting shuffle=False and
      sorting by timestamp first.

  mistake_2:
    description: 'Applying SMOTE to the validation and test sets alongside the training set'
    why_it_happens: |
      The engineer imports SMOTE and applies it to all three splits in a single call,
      treating imbalance treatment as a data preprocessing step that applies uniformly.
      The sklearn Pipeline API makes this easy to do accidentally if SMOTE is added
      as a pipeline step that runs before the split.
    consequence: |
      The validation and test sets no longer reflect the real production class distribution.
      A 1:20 attack:benign dataset becomes a 1:2 or 1:1 dataset in the evaluation sets.
      Every metric computed on these sets -- precision, recall, F1, ROC-AUC -- is computed
      against an artificially balanced distribution. The classifier appears to perform well
      on balanced evaluation; deployed on 1:20 imbalanced production traffic it produces
      high false positive rates that were invisible in the synthetic evaluation distribution.
    correct_approach: |
      Apply SMOTE only after the temporal split, and only to the training DataFrame. The
      apply_smote() function in deliverable_3 takes X_train and y_train as separate inputs.
      Call it after building the split, never before. The validation and test sets always
      remain at the original imbalanced ratio.

  mistake_3:
    description: 'Treating public jailbreak corpora as the primary data source and evaluating on the same corpus used for training'
    why_it_happens: |
      Public corpora (JailbreakChat.com, AdvBench) are large, freely available, and
      immediately usable. An engineer who needs to demonstrate a working classifier quickly
      trains on 80% of the public corpus and evaluates on the remaining 20%. The classifier
      reaches 96% accuracy. This is reported as production-ready.
    consequence: |
      The public corpus represents historical attack techniques that adversaries have already
      moved past. A classifier trained and evaluated on the same historical corpus learns
      corpus-specific patterns (specific phrasing, character distributions, formatting
      conventions common in the corpus). Deployed on production traffic, it faces current
      attack techniques that were not in the corpus, and the measured 96% accuracy collapses
      to 50-60% on novel techniques.
    correct_approach: |
      Use public corpora only as a supplementary training source, never as the sole source,
      and never as the test set. The test set must contain only production-traffic examples
      collected after all training examples. Document in the dataset card which fraction of
      training data came from public corpora so the distribution limitation is explicit.

  mistake_4:
    description: 'Skipping inter-annotator agreement measurement and proceeding directly to full annotation with a single analyst'
    why_it_happens: |
      A single analyst is assigned to the annotation task. Inter-annotator agreement
      requires two annotators and a calibration set, which seems unnecessary when only
      one analyst is available. The engineer skips it as an overhead not worth the effort
      on a small dataset.
    consequence: |
      Without an agreement measurement, there is no way to know whether the annotation
      process is reliable. A single analyst who is inconsistent -- labelling edge cases
      differently on different days, or applying a different threshold for 'uncertain'
      in week 1 versus week 4 -- produces label noise that is invisible in the dataset.
      The classifier is trained on an inconsistently labelled dataset and its decision
      boundary reflects the analyst's inconsistency rather than the true attack/benign
      distinction.
    correct_approach: |
      Measure intra-annotator agreement (the same analyst labels the same 50 examples
      twice, one week apart) if only one analyst is available. A kappa below 0.80 on
      intra-annotator agreement means the analyst's own labelling is inconsistent and
      the annotation guidelines need clarification before full annotation proceeds.
      The inter_annotator_agreement.py in deliverable_5 supports intra-annotator
      measurement by passing the same annotator's labels as both inputs.

  mistake_5:
    description: 'Not versioning the dataset and being unable to reproduce prior model training runs when a production incident requires investigation'
    why_it_happens: |
      Dataset versioning requires DVC setup and a remote storage configuration. For a
      first prototype, this seems like engineering overhead that can be added later.
      The engineer trains the first classifier without versioning, adds more annotations
      over the following weeks, and by the time a production incident occurs the original
      training dataset no longer exists in its original form.
    consequence: |
      Model version 2 is deployed and produces unexpected false positives on a specific
      request pattern. To investigate, the team needs to retrain model version 1 on its
      original dataset to isolate whether the issue is in the new training data or the
      new model architecture. Without dataset versioning, model version 1 cannot be
      reproduced. The investigation is inconclusive and the root cause is not identified.
    correct_approach: |
      Set up DVC at the start of the dataset construction phase, not after the first
      model has been trained. The dataset_versioner.py in deliverable_4 handles DVC
      initialisation and tagging. The model registry in Section 12.13 stores the dataset
      version tag alongside every model so that any production model's training conditions
      can be reproduced by checking out the tagged dataset version and running dvc pull.

section_summary:

  compact: |
    Security ML datasets have four requirements that standard ML tutorial datasets ignore.
    Source diversity: production traffic annotation (highest fidelity), red team exercises,
    public corpora (supplementary only), and synthetic generation for underrepresented classes.
    Temporal splitting: sorting by collected_at_ms and slicing at cumulative fraction
    boundaries -- the only methodology that prevents leakage between training and test
    examples from the same adversary campaign. Class imbalance treatment: SMOTE oversampling
    on the training set only (100+ attack examples), or class_weight='balanced' for smaller
    datasets, to prevent classifiers from learning to predict benign for every request.
    Versioned reproducibility: DVC tracking of all dataset artefacts with content hashes
    linked to Git tags so that any prior model training run can be reproduced exactly.
    The dataset card documents all of these choices. Inter-annotator agreement above kappa
    0.80 is the entry gate for beginning full annotation.

  key_takeaways:
    - 'Temporal splitting is non-negotiable for security ML evaluation -- a random split leaks adversary campaign patterns from training into test, inflating metrics by 10-20 percentage points'
    - 'Public jailbreak corpora are supplementary training sources only; they represent historical attack distributions and must never be the primary test set source'
    - 'SMOTE is applied to the training set only -- the validation and test sets must remain at the original imbalanced ratio to reflect production traffic distribution'
    - 'A classifier trained without class imbalance treatment on a 1:20 attack:benign dataset learns to predict benign for every request; accuracy of 95% means nothing if recall is zero'
    - 'Inter-annotator kappa above 0.80 is the minimum bar before full annotation begins; below 0.60 the label schema is ambiguous and the resulting training data will have systematic label noise'
    - 'Dataset versioning is a production requirement, not an optional best practice -- every model in the registry must be linkable to the exact dataset version used for training'

preview_section_12_05:
  title: 'Section 12.05: Supervised Classification -- Random Forest and XGBoost for Labelled Attack Detection'
  summary: |
    Section 12.05 trains the first supervised classifiers on the dataset produced by Section
    12.04. Random Forest and XGBoost both consume the SecurityFeatureVector from Section 12.02,
    the temporally split datasets from Section 12.04, and the SMOTE-treated training set from
    the class imbalance handler. Random Forest trains an ensemble of decorrelated decision trees
    and produces feature importance and SHAP values for every prediction. XGBoost fits trees
    sequentially with gradient boosting and regularisation, accepting the scale_pos_weight
    parameter as an alternative to SMOTE for imbalance treatment. Both are evaluated with
    the security_evaluator.py harness: precision, recall, F1, ROC-AUC, and a confusion matrix
    on the held-out temporal test set. The Optuna hyperparameter tuner sweeps both model
    architectures simultaneously and selects the combination that maximises recall at a target
    precision operating point -- the evaluation criterion that security detection requires.

