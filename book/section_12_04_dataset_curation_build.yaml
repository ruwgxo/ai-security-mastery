      # label_studio_config.py
      # Section 12.04: Label Studio Annotation Project Configuration
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import json
      import time
      from pathlib import Path
      from typing import List, Literal

      LabelSchema = Literal['binary', 'multiclass']

      BINARY_LABELLING_CONFIG = '''
