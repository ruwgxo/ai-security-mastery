          ),
          'model_extraction': (
              'Request attempts to reconstruct model weights, system prompt, or training data '
              'through repeated probing. Look for: systematic repeated queries with slight variations, '
              'requests for the exact system prompt verbatim, logprob extraction attempts.'
          ),
          'uncertain': (
              'Use when the request could be either legitimate or an attack and you cannot '
              'determine which with confidence. Do NOT guess -- uncertain examples are excluded '
              'from training to avoid label noise.'
          ),
      }


      def generate_label_studio_tasks(
          queue_path: str,
          output_path: str,
          schema: LabelSchema = 'multiclass',
          max_tasks: int = 500,
          anomaly_score_threshold: float = 0.5,
      ) -> int:
          '''
          Convert the Section 12.03 annotation queue to Label Studio tasks.
          Returns the number of tasks generated.
          '''
          queue = Path(queue_path)
          if not queue.exists():
              print(f'Queue not found: {queue_path}')
              return 0

          tasks = []
          with open(queue) as f:
              for line in f:
                  record = json.loads(line.strip())
                  if record.get('normalised_score', 0) < anomaly_score_threshold:
                      continue
                  task = {
                      'data': {
                          'text': record['request_text'],
                          'anomaly_score': round(record.get('normalised_score', 0.0), 3),
                          'top_features': str(record.get('top_unusual_features', [])[:3]),
                          'queued_at': record.get('queued_at_ms', 0.0),
                      },
                      'meta': {
                          'alert_id': record.get('alert_id', ''),
                          'source': 'anomaly_alert',
                      },
                  }
                  tasks.append(task)
                  if len(tasks) >= max_tasks:
                      break

          Path(output_path).write_text(json.dumps(tasks, indent=2))
          print(f'Generated {len(tasks)} Label Studio tasks -> {output_path}')
          return len(tasks)


      def print_project_config(schema: LabelSchema = 'multiclass') -> None:
