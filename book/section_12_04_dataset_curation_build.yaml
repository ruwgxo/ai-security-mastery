        </Choices>
        <TextArea name="notes" toName="text" placeholder="Required for uncertain: describe ambiguity"/>
      </View>
      '''

      ANNOTATION_GUIDELINES = {
          'prompt_injection': (
              'Request attempts to override system prompt or inject instructions via user turn. '
              'Look for: role boundary markers (System:, [SYSTEM]), instruction override verbs '
