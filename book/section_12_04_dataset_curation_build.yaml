    title: 'SMOTE vs Class Weighting: Selection Guide'
    description: 'When to apply SMOTE oversampling versus class_weight balancing for imbalanced security datasets'
    columns: ['Factor', 'Use SMOTE', 'Use class_weight', 'Notes']
    rows:
      - ['Attack example count', '100+ attack examples in training set', 'Under 100 attack examples', 'SMOTE interpolations are unreliable with fewer than 100 minority-class examples']
      - ['Feature space density', 'Dense continuous features (20-feature security vector)', 'Sparse or high-dimensional features', 'SMOTE in sparse spaces creates unrealistic synthetic examples']
      - ['Inference implications', 'No inference change -- SMOTE only affects training data', 'No inference change -- class_weight only affects training loss', 'Both are training-time-only treatments; inference pipeline unchanged']
      - ['Test set rule', 'NEVER apply SMOTE to validation or test set', 'class_weight not applicable to test set evaluation', 'Test set must remain at original imbalanced ratio']
      - ['Validation', 'Evaluate on real imbalanced validation set -- not SMOTE-augmented', 'Evaluate on real imbalanced validation set', 'Validation set must reflect production distribution']

