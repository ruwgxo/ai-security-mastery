document_info:
  title: 'Dataset Curation: Building Labelled Security Datasets from Scratch'
  chapter: 12
  section: 4
  section_code: '1204'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  created: '2026-06-06'
  estimated_pages: 6
  estimated_reading_time: '45-55 minutes'

section_overview:
  one_line_summary: 'A trained classifier is only as good as its training data -- Section 12.04 builds the dataset curation pipeline that makes every subsequent training section credible: rigorous sources, temporal splits, imbalance treatment, and versioned reproducibility.'
  why_this_section_exists: |
    Sections 12.05 through 12.08 train classifiers. Those classifiers are evaluated with
    accuracy metrics, precision-recall curves, and ROC-AUC scores. Those metrics are only
    meaningful if the dataset they are computed on was constructed correctly. A randomly
    split security dataset produces evaluation metrics that overstate real-world performance
    by 10-20 percentage points. A dataset trained on public jailbreak corpora and evaluated
    on the same corpus produces a classifier that fails immediately on production traffic
    because the public corpus attack distribution does not match the deployment context.

    Section 12.04 is the infrastructure section that makes every subsequent training section
    honest. It addresses four requirements that security ML datasets have and standard ML
    tutorial datasets ignore: source diversity (production traffic, red team exercises, and
    public corpora with known distribution limitations), temporal splitting (the only
    evaluation methodology that prevents leakage between training and test sets collected
    at the same time), class imbalance treatment (security datasets are structurally skewed
    at 1 attack per 100-1000 requests), and versioned reproducibility (a dataset that cannot
    be reconstructed exactly produces unreproducible evaluation metrics).
  position_in_chapter: |
    Section 12.04 sits between the anomaly detection that seeds labelled data (Section 12.03)
    and the supervised classifiers that consume it (Section 12.05). It is the data engineering
    section of Chapter 12. Every line of training code in Sections 12.05 through 12.08
    imports the dataset builder and the temporal split from this section.

learning_objectives:

  knowledge:
    - 'Explain why public jailbreak corpora are insufficient as the sole training source for a production security classifier'
    - 'Describe the four dataset sources and rank them by distribution fidelity to the production deployment context'
    - 'Explain the data leakage mechanism in a random train/test split of a security dataset and state why temporal splitting prevents it'
    - 'Define the class imbalance ratio and explain why security datasets are structurally imbalanced at a ratio that makes accuracy a misleading evaluation metric'
    - 'Describe how SMOTE generates synthetic minority-class examples and state the one rule about where SMOTE may and may not be applied'
    - 'Explain what Cohen kappa measures and state the threshold above which an annotation process is considered reliable'

  skills:
    - 'Construct a labelled security dataset from four sources with deduplication, label schema validation, and source provenance tracking'
    - 'Implement a temporal train/validation/test split sorted by collection timestamp with configurable split fractions'
    - 'Apply SMOTE oversampling to the training set only and verify that the validation and test sets are untouched'
    - 'Compute Cohen kappa and Fleiss kappa for single-annotator and multi-annotator annotation workflows'
    - 'Version a security dataset with DVC and reproduce any prior experiment from its dataset version tag'

  security_mindset:
    - 'Treat dataset construction as a security-critical activity: a dataset with leakage or distribution mismatch produces a classifier that looks accurate in evaluation and fails in production -- the worst possible failure mode because the failure is silent'
    - 'Internalise the temporal split requirement as a non-negotiable discipline: any team member who proposes a random split for security ML evaluation does not understand the threat model'
    - 'Recognise that the production traffic annotation queue from Section 12.03 is the highest-fidelity data source and that public corpora are supplementary -- use them to pad early training sets, not to evaluate production performance'
    - 'Understand that class imbalance treatment (SMOTE or class weighting) is not a technique choice but a correctness requirement -- a classifier trained without imbalance treatment on a 1:100 attack:benign dataset is learning to predict benign for every request'

prerequisites:
  - 'Section 12.03: anomaly detection -- the anomaly alert labeller produces the supervised_training_queue.jsonl that this section ingests'
  - 'Section 12.02: security feature engineering -- the feature vector schema used for SMOTE oversampling'
  - 'Chapter 1 Section 1.06: data preprocessing -- standardisation and normalisation applied before SMOTE'
  - 'Chapter 1 Section 1.11: evaluation metrics -- the metrics that temporal split correctness enables'
  - 'Chapter 11 Section 11.02: detection-as-code -- datasets are versioned and reviewed like detection rules'

prose_content:

  part_1:
    title: 'The Dataset Problem in Security ML'
    body: |
      The standard advice for an ML practitioner who needs a training dataset is to search
      Hugging Face, Kaggle, or the relevant academic literature for an existing labelled
      corpus. For image classification, sentiment analysis, or named entity recognition this
      is sound advice: the public corpus is large, diverse, and collected from a distribution
      that resembles the deployment context.

      For LLM security detection, this advice fails in a specific and dangerous way. Public
      jailbreak corpora (JailbreakChat.com, the AdvBench dataset, OWASP LLM examples) contain
      attack examples that were collected from public forums, research papers, and crowdsourced
      red team exercises. They represent the attack distribution of the past -- the techniques
      that were novel enough to document publicly before adversaries moved on to the next
      generation. A classifier trained exclusively on public corpora learns to detect documented
      historical attacks with high accuracy on those same corpora and fails on the current
      production attack distribution, which has already adapted past the documented techniques.

      More critically, the production deployment context determines the benign traffic
      distribution. A customer support LLM, a code assistant, and a general-purpose chatbot
      have different benign request distributions: different sequence lengths, different
      vocabulary, different contextual feature distributions. A benign sample collected from
      a general-purpose chatbot does not correctly represent the benign distribution of a
      code assistant -- the classifier trained on it will have a miscalibrated decision boundary
      for the code assistant deployment.

      The correct dataset construction methodology has four data sources ranked by distribution
      fidelity. Production traffic annotation (the anomaly alert labeller output from Section
      12.03) is the highest-fidelity source: it contains real attacks against the real system
      and real benign traffic from the real user population. Red team exercises against the
      production integration are the second-highest-fidelity source: the attacks are crafted
      specifically for the deployment context, even if they are not fully representative of
      adversary behaviour. Public corpora are the third source: useful for padding early
      training sets when production data is sparse, but with known distribution limitations
      that must be documented in the dataset card. Synthetic generation is the fourth source:
      appropriate only for underrepresented attack sub-classes where no real or red team
      examples exist.

  part_2:
    title: 'Label Schema Design: Binary, Multi-Class, and Multi-Label'
    body: |
      The label schema determines what the classifier learns to predict and what operational
      decisions the prediction can support. Three schema options exist: binary, multi-class,
      and multi-label. The choice is not arbitrary -- it depends on whether the detection
      system needs to distinguish between attack families for alert routing and remediation.

      Binary labelling (attack=1, benign=0) is the simplest schema and the correct starting
      point when the labelled dataset is small (under 200 total positives) or when the
      detection system does not need to route alerts to specialist analysts by attack family.
      Binary labels are easier to assign with high inter-annotator agreement, produce a simpler
      classifier, and require less training data per decision boundary. The trade-off is that
      the classifier cannot tell an analyst whether a flagged request is a prompt injection
      or a jailbreak attempt, limiting the specificity of the operational response.

      Multi-class labelling (injection / jailbreak / pii_extraction / model_extraction /
      benign) is appropriate when the labelled dataset has 200+ examples per attack class and
      the operations team has defined different response procedures for different attack families.
      Multi-class labels require more annotation effort and produce a more complex decision
      boundary, but they enable attack-family-specific alert routing, specialist analyst
      assignment, and family-specific remediation actions (blocking vs rate limiting vs
      flagging for review).

      Multi-label classification allows a single request to carry multiple labels
      simultaneously -- a request can be both a prompt injection and a jailbreak attempt,
      or both a jailbreak and a PII extraction probe. Multi-label labelling is the most
      expressive but also the most expensive: annotators must consider all attack families
      for every example, inter-annotator agreement is harder to achieve and measure, and
      the classifier requires a separate binary head per label rather than a single softmax
      output. Multi-label is appropriate only when compound attacks are documented in the
      threat model and when the annotation team has sufficient domain expertise to identify
      compound attack patterns reliably.

      The recommendation for Chapter 12 is to start binary and migrate to multi-class
      after the 200-per-class threshold is crossed for at least three attack families. The
      dataset builder in deliverable_1 supports all three schemas with a schema_version
      tag so that the migration from binary to multi-class is tracked as a dataset version
      change.

  part_3:
    title: 'Temporal Splits: The Non-Negotiable Methodology'
    body: |
      The most consequential dataset construction decision in security ML is the train/test
      split methodology. Standard ML tutorials use scikit-learn's train_test_split with
      shuffle=True (the default). This is incorrect for security datasets.

      The data leakage mechanism is specific and reproducible. A security dataset is collected
      over time: the earliest examples in the dataset are from the first weeks of the anomaly
      detector's operation; the most recent examples are from the last few days before the
      dataset was frozen for training. An adversary who was active in week 2 of the collection
      period may have sent the same jailbreak attempt multiple times. If those attempts are
      randomly distributed between the training set and the test set by a shuffled split,
      the classifier is evaluated on examples from the same adversary campaign as the training
      examples -- essentially evaluated on near-duplicates of its training data.

      The measured accuracy of a classifier trained and evaluated on a randomly split security
      dataset is optimistic by 10-20 percentage points relative to its performance on future
      production traffic. The evaluation appears to show a highly accurate classifier; the
      production deployment reveals a less accurate one. The difference is the leakage.

      Temporal splitting prevents this by sorting the dataset by collection timestamp and
      assigning the earliest examples to training, the middle window to validation, and the
      most recent examples to the test set. The test set contains only examples collected
      after all training examples. The classifier is evaluated on future-relative-to-training
      data, which is the only meaningful measurement of its generalisation to production traffic.

      The practical implementation uses three parameters: training fraction (default 70%),
      validation fraction (default 15%), and test fraction (default 15%). For a dataset with
      1000 examples collected over 8 weeks, the training set contains examples from weeks 1-6,
      the validation set from week 7, and the test set from week 8. The split boundaries are
      computed by sorting on the collected_at timestamp field and slicing at the cumulative
      fraction boundaries.

      One practical complication: early production datasets have sparse attack examples in
      the earliest weeks (before the anomaly detector has had time to surface many positives)
      and denser attack examples in later weeks. A strict temporal split may produce a
      training set with very few attack examples and a test set with more, making the training
      set unrepresentative of the full attack distribution. The correct response is to use a
      stratified temporal split that maintains the approximate attack class distribution in
      each split while preserving the temporal ordering -- not to revert to a random split.

  part_4:
    title: 'Class Imbalance: SMOTE and Class Weighting'
    body: |
      Security datasets are structurally imbalanced. In a well-protected production LLM API,
      the attack rate is between 0.1% and 5% of total traffic -- 1 attack per 20 to 1000
      legitimate requests. The labelled dataset reflects this ratio: after 8 weeks of anomaly
      alert collection with 50% analyst review capacity, a typical dataset has 200-500 labelled
      attacks and 2000-5000 labelled benign examples. The imbalance ratio is 1:10 to 1:25.

      A classifier trained on an imbalanced dataset without treatment learns the path of least
      resistance: predicting the majority class (benign) for every request. This produces
      accuracy of 90-99% on the training and test sets (because 90-99% of examples are benign),
      zero recall on the attack class, and zero operational value as a detection system. The
      accuracy metric looks excellent; the detector catches nothing.

      Two treatments are standard. SMOTE (Synthetic Minority Oversampling Technique, Chawla
      et al., 2002) generates synthetic attack examples by interpolating between existing
      attack examples in the feature space. For each existing attack example, SMOTE selects
      k nearest neighbours from the attack class and creates a new synthetic example at a
      random point on the line segment connecting the original to one of its neighbours. The
      synthetic examples increase the attack class size to a configurable sampling_strategy
      fraction of the benign class -- typically 0.5 to 1.0 (50% to 100% the size of the
      benign class). SMOTE is applied exclusively to the training set. The validation and
      test sets must contain only real examples at the original imbalanced ratio. Applying
      SMOTE to the test set produces an artificially balanced evaluation that overstates
      performance on imbalanced production traffic.

      Class weighting is the alternative treatment that does not generate synthetic examples.
      Scikit-learn classifiers accept a class_weight parameter that upsamples minority-class
      gradients during training: the loss function applies a higher weight to misclassified
      attack examples than to misclassified benign examples. class_weight='balanced' computes
      weights inversely proportional to class frequency -- a 1:20 imbalance produces an
      attack class weight of 20 relative to the benign class weight of 1. Class weighting
      is preferable to SMOTE when the feature space is sparse (SMOTE interpolations in sparse
      high-dimensional spaces produce unrealistic synthetic examples) or when the training
      dataset is small (fewer than 100 attack examples makes SMOTE interpolations unreliable).

      For the security feature vector from Section 12.02 with 20 features and 200+ attack
      examples, SMOTE is appropriate. Below 100 attack examples, use class_weight='balanced'.
      Run both and compare on the validation set; the imbalance treatment that produces the
      higher recall at matched precision on the real imbalanced validation set is the correct
      choice for the current dataset size.

  part_5:
    title: 'Annotation Quality: Inter-Annotator Agreement'
    body: |
      A labelled dataset is only as reliable as its annotation process. An annotation process
      where different analysts would assign different labels to the same example produces a
      training set with systematic label noise: the classifier is trained to predict an
      inconsistently defined concept and its decision boundary is blurred by the inconsistency.

      Inter-annotator agreement measures the consistency of the annotation process. For binary
      labelling (attack/benign), Cohen kappa is the standard metric: it measures the agreement
      between two annotators above the level expected by chance. Kappa ranges from -1 (perfect
      disagreement) to 1 (perfect agreement), with 0 representing chance-level agreement.
      A kappa above 0.80 indicates strong agreement and a reliable annotation process. A kappa
      between 0.60 and 0.80 indicates moderate agreement and an annotation process that may
      need clearer guidelines. A kappa below 0.60 means the label schema is ambiguous and
      the training data will have significant noise.

      For multi-class labelling with more than two annotators, Fleiss kappa generalises Cohen
      kappa to k annotators and m categories. The same thresholds apply: above 0.80 for
      reliable annotation, investigate and revise guidelines below 0.60.

      In practice, annotation agreement is measured on a calibration set of 50-100 examples
      that every annotator labels independently before the main annotation run begins. If kappa
      is above 0.80, proceed with single-annotator labelling for the remainder of the dataset.
      If kappa is below 0.80, hold a calibration discussion, revise the annotation guidelines
      to resolve the disagreements, and re-measure on a new calibration set before proceeding.

      Disagreement on specific example types is informative: if annotators consistently disagree
      on ambiguous phrasing that could be either a boundary-testing legitimate query or a
      low-confidence jailbreak attempt, those examples should be labelled as 'uncertain' and
      excluded from training. Training on uncertain examples adds label noise without adding
      signal.

  part_6:
    title: 'Dataset Versioning with DVC'
    body: |
      A trained classifier is reproducible only if its training dataset is reproducible. Without
      dataset versioning, the dataset used for training model version 3 cannot be reconstructed
      after the annotation queue has received new labels, production traffic has added more
      examples, or the label schema has been updated from binary to multi-class. When model
      version 3 produces unexpected results in production and the team wants to retrain to
      investigate, they cannot reproduce the exact training conditions.

      DVC (Data Version Control) extends Git's versioning model to large binary files and
      datasets. It stores a small .dvc metadata file in the Git repository that references
      the dataset content by hash, and stores the actual dataset content in a configured
      remote storage (S3, GCS, or local storage). A git commit that tags a model training
      run includes both the training code (tracked by Git) and the dataset hash (tracked by
      DVC). Any prior model training run can be reproduced exactly by checking out the tagged
      commit and running dvc pull to restore the dataset version from remote storage.

      The dataset versioning workflow for Chapter 12 has three tracked artefacts: the raw
      annotation queue (raw_annotations.jsonl), the processed dataset with temporal split
      (dataset_v{n}.parquet), and the SMOTE-augmented training set
      (train_smote_v{n}.parquet). Each is tracked by DVC with a content hash. The version
      number increments when any of the three artefacts changes: new annotations added,
      label schema updated, or SMOTE parameters changed. The model registry in Section 12.13
      stores the dataset version tag alongside every trained model so that the training
      conditions of any production model can be reproduced in full.

