section_overview:
  one_line_summary: 'Physical adversarial attacks apply perturbations to the real world before the sensor -- patches, stickers, and 3D objects that fool deployed vision systems without any API access.'
  why_this_section_exists: |
    Every previous attack in Chapter 10 operates through an API: the adversary sends a digital
    input and receives a model output. Physical adversarial attacks break this assumption entirely.
    The perturbation is applied to the physical environment -- a printed sticker on a stop sign,
    a patterned patch on clothing, an adversarially shaped 3D object. The camera captures the
    scene and feeds it to the model; the adversary never touches the API. Section 10.8 establishes
    this qualitatively different threat surface, its Expectation over Transformation (EOT)
    optimisation primitive, and the regional anomaly detection approach that differs fundamentally
    from the per-pixel squeezer and consistency checker that cover digital adversarial examples.
  position_in_chapter: |
    Section 10.8 is the physical tier of the Section 10.2 taxonomy. It closes the access tier
    dimension: white-box (10.3-10.5), grey/black-box (10.6), transfer (10.7), physical (10.8).
    The patch detector built here is Track 7''s spatial anomaly primitive -- distinct from the
    pixel-level feature squeezer covering digital attacks.

learning_objectives:

  knowledge:
    - 'Explain why physical adversarial attacks bypass API-based detection layers entirely and why this requires a qualitatively different threat model'
    - 'Describe the Expectation over Transformation (EOT) objective: why optimising a patch for a single digital image produces a patch that fails in the physical world, and what EOT adds'
    - 'Distinguish universal adversarial patches (one patch works on any background) from input-specific patches (optimised per image) and state which is the dominant physical threat'
    - 'Describe the stop sign attack (Eykholt et al. 2018) and the 3D adversarial turtle (Athalye et al. 2018) as concrete physical-world evasion examples'
    - 'State why patch detection requires regional spatial anomaly analysis rather than per-pixel feature squeezing'
    - 'Map physical adversarial patches to ATLAS technique AML.T0029'

  skills:
    - 'Implement a universal adversarial patch generator with EOT over position, scale, and brightness transformations'
    - 'Apply generated patches to test images at varied positions and scales and measure attack success'
    - 'Benchmark patch attack success across transformation severity levels (comparing EOT-optimised vs digital-only patches)'
    - 'Implement a patch detector using regional texture anomaly analysis and masked-region prediction change'
    - 'Produce a structured physical adversarial threat model for a specified vision system deployment'

  security_mindset:
    - 'Recognise that API access is not a prerequisite for adversarial attacks against deployed vision systems -- the threat surface extends to anything with a camera or sensor'
    - 'Understand that EOT is not an academic detail: a patch without EOT has near-zero success when physically printed and photographed; EOT is what makes physical attacks practical'
    - 'Appreciate that patch detection must be architecturally separate from digital adversarial detection: a patch occupies a localised image region, not distributed pixel noise, and requires spatial analysis'

prerequisites:
  - 'Section 10.3: FGSM (patch optimisation uses gradient ascent on the patch tensor -- the same gradient primitive)'
  - 'Section 10.2: physical/transfer access tier in the adversarial taxonomy (Section 10.8 fills the physical cells)'
  - 'Section 10.1: Lp norm constraints (physical patches use a different constraint: patch is localised, not norm-bounded)'
  - 'Chapter 2 Section 2.3: backpropagation (EOT optimisation requires gradients through the transformation pipeline)'

prose_content:

  part_1:
    title: 'The Threat Beyond the API: Physical World as Attack Surface'
    body: |
      Every attack from Section 10.3 through 10.7 assumes the adversary has access to the
      model''s inference API: they can submit a digital input and observe the output. This
      assumption holds for cloud-deployed classifiers, safety filters, and content moderation
      systems. It does not hold for many production deployments of vision models.

      An autonomous vehicle''s object detector receives camera frames, not API requests. A
      facial recognition access control system processes photos from an entrance camera. A
      surveillance system flags anomalous behaviour from CCTV feeds. A drone detection system
      processes radar or optical sensor data. None of these systems have a queryable API that
      an adversary can reach from the internet. The model is deployed behind a physical sensor,
      not behind an HTTP endpoint.

      Physical adversarial attacks target the sensor stage rather than the API stage. The
      adversary places a perturbation in the physical world -- a printed pattern on an object,
      stickers on a surface, a specially painted vehicle -- and the sensor captures the
      perturbed scene as part of its normal operation. The model then classifies the captured
      image. From the model''s perspective, the input is a legitimate camera frame; the
      adversarial perturbation is embedded in the scene, not injected into the API call.

      This changes the threat model in two ways. First, the adversary does not need any API
      access, query budget, or surrogate model. They need physical access to objects in the
      sensor''s field of view. Second, the defence cannot operate at the API boundary -- it
      must operate at the image processing stage, after capture but before classification.
      The Track 7 primitives from Sections 10.11-10.12 operate at that stage, but adversarial
      patches require a different primitive (regional spatial anomaly detection) rather than
      the per-pixel squeezing designed for digital adversarial noise.

  part_2:
    title: 'Adversarial Patches: Brown et al. 2017'
    body: |
      Brown, Mané, Roy, Abadi, and Gilmer introduced adversarial patches in their 2017 paper.
      The key idea is simpler and more alarming than digital adversarial examples: train a
      single image patch that, when placed anywhere in a scene, causes the classifier to
      output a chosen wrong class -- regardless of what else is in the image.

      The patch is a rectangular image region P of fixed pixel dimensions, optimised to be
      universal: the same P fools the classifier for any background image and at any position
      within the image. The optimisation objective is:
      P* = argmax_P E_{x~X, t~T}[log P(y_target | A(P, x, l, s))]
      where A(P, x, l, s) applies patch P to image x at location l and scale s, and T is a
      distribution of transformations.

      Universal adversarial patches have two properties that make them practically dangerous.
      First, they are printable: the patch is a valid image that can be rendered on paper, fabric,
      or any surface. Second, they are background-agnostic: the adversary does not need to know
      what the scene looks like -- the patch dominates the classifier''s decision regardless of
      background content. A patch optimised to cause a toaster misclassification causes every
      image containing that patch to be classified as a toaster, regardless of what else is in
      the frame.

      The practical attack scenario: print the patch on sticker paper, apply it to the target
      object (a stop sign, a person''s clothing, a vehicle), and the deployed classifier
      misclassifies that object whenever it is in the camera''s field of view. The adversary
      needs to deploy the sticker once; they do not need ongoing API access.

  part_3:
    title: 'Expectation over Transformation: Making Patches Survive the Physical World'
    body: |
      A patch optimised only for a digital image (fixed position, fixed scale, no variation)
      fails when printed and photographed. The physical world introduces variation that the
      digital optimisation did not account for: the patch shifts position as the camera angle
      changes, its perceived colour shifts under different lighting, it rotates as the object
      rotates, its apparent size changes with distance, and printer ink reproduces colours
      differently from screen pixels.

      Expectation over Transformation (EOT), introduced by Athalye, Engstrom, Ilyas, and Kwok
      in 2018, solves this by optimising the patch over a distribution of transformations rather
      than for a single configuration. The EOT objective averages the adversarial loss over N
      sampled transformations at each optimisation step:
      L_EOT(P) = (1/N) sum_{i=1}^{N} J(f(t_i(A(P, x, l_i, s_i))), y_target)
      where t_i samples a random transformation from a specified distribution T.

      The transformation distribution T includes: random position within the image frame,
      random scale (simulating different viewing distances), random brightness perturbation
      (simulating lighting variation), random contrast adjustment, and potentially random
      rotation (for 3D object scenarios). The optimised patch is adversarial across all
      sampled transformation combinations -- not just for a single camera angle at a single
      distance under a single lighting condition.

      The practical consequence is a patch that remains adversarial across real-world viewing
      conditions. Athalye et al. demonstrated that EOT-optimised patches printed on paper and
      photographed under varied lighting and angles maintained high attack success rates, while
      non-EOT patches degraded rapidly. For production security threat modelling, this means
      the physical threat is not merely theoretical: EOT-optimised patches work in deployment
      conditions, not just in constrained laboratory setups.

  part_4:
    title: 'Stop Signs and 3D Objects: Landmark Physical Attacks'
    body: |
      Two physical adversarial attacks from 2018 demonstrate the practical scope of the threat.

      Eykholt et al. 2018 ("Robust Physical Perturbations in the Real World") attached small
      black and white stickers to stop signs and demonstrated misclassification by YOLO and
      Faster RCNN autonomous vehicle detectors. The attack evaded detection rates dropped from
      100% to near 0% when the adversarial stickers were present. Critically, the stickers
      were camouflaged as graffiti -- visually inconspicuous to human observers, but adversarial
      to the neural network detector. The stop sign attack demonstrates that the threat applies
      to safety-critical autonomous systems and that the patches need not be obviously unusual.

      Athalye, Engstrom, Ilyas, and Kwok 2018 ("Synthesising Robust Adversarial Examples")
      applied EOT to 3D objects: a 3D-printed turtle was misclassified as a rifle by Inception
      v3 from all viewing angles tested. The 3D adversarial object was painted with a texture
      optimised to be adversarial across the full range of viewing angles in the transformation
      distribution. This demonstrated that the threat extends to physical objects themselves,
      not just applied stickers -- an adversary can manufacture objects that fool deployed vision
      systems at any angle.

      Both attacks share a structure: EOT optimisation over a transformation distribution,
      physical deployment without API access, and adversarial success that is robust to the
      variation inherent in real-world sensor capture. They differ in the physical medium
      (printed sticker vs painted 3D surface) and the target system (traffic sign detection vs
      image classification), but the underlying optimisation framework is the same.

  part_5:
    title: 'Universal vs Input-Specific Patches'
    body: |
      Universal adversarial patches (one patch fools the classifier for any scene) are the
      dominant physical threat in production because they require a single offline optimisation
      step. The adversary computes the patch once, prints it, and deploys it indefinitely. The
      patch works on any background image; it does not need to be regenerated for each target
      scene. This is the physical-world analogue of universal adversarial triggers for text
      (Section 10.9): one perturbation that works universally rather than a per-input optimised
      perturbation.

      Input-specific patches are optimised for a particular target image -- the patch is
      designed to make a specific person''s photo classified as a different identity, for
      instance, or a specific vehicle classified as a different class. These achieve higher
      attack success on the target image but do not generalise to other images. The adversary
      must know the exact image in advance and regenerate the patch for each new target.
      Input-specific patches are relevant for targeted identity spoofing in facial recognition
      but less relevant for general-purpose adversarial patch deployment.

      The trade-off between universality and effectiveness: universal patches are somewhat less
      effective per image than input-specific patches because they must be optimised to dominate
      many different background images. Input-specific patches are more effective but require
      per-target optimisation and knowledge of the target image. For production threat modelling,
      universal patches are the higher-priority threat because they scale: one patch deployment
      affects all images it appears in.

  part_6:
    title: 'Threat Model: Physical Adversarial Attacks Across Production Systems'
    body: |
      Four production deployment categories carry the highest exposure to physical adversarial
      attacks.

      Autonomous vehicle perception systems process camera frames continuously from a forward-
      facing camera. The adversary has prolonged physical access to the traffic environment:
      stop signs, lane markings, speed limit signs, and pedestrian crossings are all potentially
      patchable surfaces. The Eykholt et al. stop sign attack demonstrates that the attack is
      practical in this threat environment. The defender cannot monitor the physical environment
      in real time; the detection must happen at the image processing stage.

      Facial recognition access control systems process photos from entrance cameras. The adversary
      needs to present their face with an adversarial perturbation (glasses with adversarial
      patterns, or an adversarial makeup pattern) to bypass identity verification. The physical
      patch is applied to the adversary''s own face -- they have complete control over the attack
      surface. Defence approaches include: liveness detection, 3D face shape analysis, infrared
      imaging (patches designed for RGB cameras may not affect infrared sensors).

      Physical security surveillance systems use object detection models to flag prohibited items
      (weapons, restricted objects). An adversarial patch on the prohibited object can cause it
      to be classified as a benign object. The adversary applies the patch before entering the
      camera''s field of view. Detection approaches: multi-camera redundancy, radar or X-ray
      supplemental sensors that cannot be deceived by optical patches.

      Industrial quality control systems use vision models to inspect products on production
      lines. A competitor or insider threat could introduce adversarially patterned objects
      that pass inspection despite being defective. This threat is less commonly modelled
      but is technically identical to the stop sign attack with an industrial classifier as
      the target system.

  part_7:
    title: 'Detection: Regional Spatial Anomaly Analysis'
    body: |
      Digital adversarial examples (Sections 10.3-10.7) distribute perturbations across all
      pixels of an image -- fine-grained noise that is spatially uniform. Feature squeezing
      (Section 10.11) and consistency checking (Section 10.12) are effective against this
      distributed perturbation. Adversarial patches are qualitatively different: the perturbation
      is localised in a specific rectangular region of the image and typically has high contrast
      and high spatial frequency content relative to natural image regions.

      Patch detection exploits this spatial structure. Natural images have locally consistent
      texture statistics: a sky region has smooth gradients, a grass region has fine texture,
      a face has specific geometric structure. An adversarial patch inserted into a scene has
      texture statistics inconsistent with the local neighbourhood -- it may have unnaturally
      sharp edges, periodic patterns, or colour combinations not present in any training class.
      A regional anomaly detector that computes texture statistics in sliding windows and flags
      regions with anomalous spatial frequency content provides a detection primitive specifically
      suited to patch attacks.

      A complementary detection approach uses prediction change under patch masking. For each
      proposed image region, mask the region (replace with mean colour or inpainting) and check
      whether the model''s prediction changes significantly. A region whose masking changes the
      prediction from the adversarial wrong class back to the correct class is a candidate
      adversarial patch location. This approach requires multiple model forward passes (one per
      candidate region) and is more expensive than texture analysis but more precise.

      Both patch detection approaches are distinct from the Track 7 squeezer and consistency
      checker. Section 10.13 adds patch detection as a spatial anomaly primitive in the Track 7
      pre-inference stage alongside the per-pixel feature squeezers. The combined Track 7 covers
      both distributed digital noise (squeezer + consistency) and localised physical patches
      (spatial anomaly detector).

