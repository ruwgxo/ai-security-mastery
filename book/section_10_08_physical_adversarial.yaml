common_mistakes:

  mistake_1:
    description: 'Optimising a patch without EOT and expecting it to work when physically printed and photographed'
    why_it_happens: |
      EOT adds complexity: it requires multiple forward passes per optimisation step and
      more configuration parameters. Engineers skip it to simplify the implementation,
      reasoning that if the patch works in a digital simulation it will work physically.
    consequence: |
      The non-EOT patch is optimised for exactly one configuration: fixed position, fixed
      scale, flat lighting, no printer colour shift. When printed and photographed with even
      slight variation in viewing angle or lighting, attack success rate drops from 80-90%
      to near 0%. The patch is adversarial only at the specific digital configuration it was
      trained for. Reporting non-EOT patch success rates overstates the real-world threat.
    correct_approach: |
      Always include EOT with at minimum position, scale, and brightness variation in the
      transformation distribution. The EOTConfig dataclass in adversarial_patch.py provides
      sensible defaults. For 3D objects add rotation/perspective transforms. Never report
      physical attack success rates from digital-only patches -- benchmark robustness using
      physical_robustness_benchmark.py which tests across transformation severity levels.

  mistake_2:
    description: 'Not clamping the patch tensor to [0, 1] after each optimisation step, producing physically unrealisable pixel values'
    why_it_happens: |
      Adam updates the patch parameters without any constraint. Engineers implement the
      optimisation loop and forget that unclamped patch values outside [0, 1] cannot be
      represented by a printer or screen. The optimisation succeeds in digital simulation
      but the physical patch cannot reproduce values outside the valid range.
    consequence: |
      The patch contains pixel values < 0 (cannot print as black) and > 1 (cannot print
      as white on a standard display). When the patch is clipped to [0, 1] for printing,
      the attack success rate drops significantly because the out-of-range values carried
      the adversarial signal. The benchmark in digital simulation overestimates the actual
      printed patch effectiveness.
    correct_approach: |
      Add patch.clamp_(0.0, 1.0) inside torch.no_grad() immediately after each optimiser
      step. This is implemented in the generate_patch function in adversarial_patch.py.
      Clamp AFTER the Adam step, not before: clamping before the step removes gradient
      signal from boundary pixels. The correct order is: step(), then clamp_().

  mistake_3:
    description: 'Applying per-pixel feature squeezing as the sole Track 7 detection primitive for physical adversarial patches'
    why_it_happens: |
      Feature squeezing (Section 10.11) is presented as the primary Track 7 input-side
      primitive. Engineers configure it as the universal adversarial detection layer and
      do not add a separate patch detection primitive, assuming squeezing handles all
      adversarial input types.
    consequence: |
      Per-pixel feature squeezing applies a transformation (Gaussian blur, bit-depth
      reduction) uniformly across the entire image. An adversarial patch in a localised
      region is partially smoothed, but the patch gradient is concentrated in a small
      area -- the squeezer reduces it less effectively than it reduces distributed
      per-pixel noise. Patch attack success rates after squeezing remain 40-70%, much
      higher than squeezing''s effectiveness against FGSM and PGD.
    correct_approach: |
      Add regional spatial anomaly detection (patch_detector.py) as a separate Track 7
      spatial primitive alongside the per-pixel squeezer. The two are complementary:
      squeezer catches distributed digital noise; the spatial detector catches localised
      patch anomalies. The Section 10.13 gateway includes both as part of Track 7''s
      pre-inference detection stage.

  mistake_4:
    description: 'Treating adversarial patches as a digital attack problem and applying the same threat model as FGSM/PGD'
    why_it_happens: |
      Physical adversarial patches are sometimes described as "adversarial examples applied
      to physical objects." Engineers map this to the digital adversarial example framework:
      the patch is just a localised pixel perturbation, Track 7 handles pixel perturbations,
      therefore Track 7 handles patches.
    consequence: |
      The threat model mismatch causes defenders to focus detection resources on the API
      boundary (query patterns, input distribution shifts) rather than the sensor boundary
      (regional image anomalies, sensor fusion). Physical attack adversaries bypass the API
      entirely; API-focused detection misses them completely. The production deployment
      remains undefended against physical patches while digital adversarial detection
      resources are well-covered.
    correct_approach: |
      Maintain separate threat model entries for physical and digital adversarial attacks.
      Physical attacks require: sensor-stage detection (regional anomaly analysis at the
      image processing stage), sensor fusion (supplemental non-optical sensors), and
      physical environment controls (inspection, tamper detection). Digital attack
      detection (Track 7 squeezer/consistency) is a distinct layer. The physical_threat_model.py
      deliverable provides the framework for separating these threat entries.

  mistake_5:
    description: 'Using a patch size much smaller than necessary, producing a patch that is imperceptible but ineffective'
    why_it_happens: |
      Engineers trying to make patches "stealthy" choose very small patch sizes (e.g., 2%
      of image width) that are visually inconspicuous. The patch occupies few pixels and
      cannot dominate the classifier''s decision over the background image.
    consequence: |
      Universal adversarial patches require enough spatial extent to override the background
      image content in the model''s feature representations. Too-small patches produce attack
      success rates near random chance. The optimisation loss decreases (the patch learns
      something), but the patch effect is insufficient to reliably flip the classification.
      Stealthiness and effectiveness are in direct tension for universal patches.
    correct_approach: |
      Set patch size to at minimum 10-15% of the image dimension for reliable universal
      attack success on standard classifiers. Test success rate vs scale using
      patch_applicator.py before finalising patch size. The realistic physical threat
      (sticker on a stop sign, pattern on clothing) is typically large enough to be
      practical -- stop sign stickers in the Eykholt et al. attack were clearly visible
      as markings even if not obviously adversarial to humans.

section_summary:

  compact: |
    Physical adversarial attacks apply perturbations to the real world before the sensor --
    patches, stickers, and 3D objects that fool deployed vision systems without API access.
    Adversarial patches (Brown et al. 2017) are universal: one printed patch causes any
    background image to be misclassified as a target class. Expectation over Transformation
    (EOT) is essential for physical deployment: optimising over distributions of position,
    scale, brightness, and noise makes the patch robust to real-world viewing variation. Stop
    sign attacks (Eykholt et al. 2018) and 3D adversarial objects (Athalye et al. 2018) are
    documented successful physical attacks against production-grade detectors. Patch detection
    requires regional spatial anomaly analysis (localised texture anomalies) and masked-region
    prediction change -- distinct from the per-pixel squeezer effective against digital noise.
    ATLAS AML.T0029 covers adversarial patches.

  key_takeaways:
    - 'Physical attacks bypass the API entirely: the adversary perturbs the physical world before the sensor; no query budget required'
    - 'EOT is not optional for physical deployment: non-EOT patches fail in the real world; optimise over position, scale, brightness, and noise'
    - 'Universal patches are the dominant threat: one patch works on any background; the adversary deploys once and affects all images'
    - 'Patch detection requires regional analysis (spatial anomaly) not per-pixel squeezing -- the two are complementary, not interchangeable'
    - 'ATLAS AML.T0029; four production systems exposed: autonomous vehicles, facial recognition, surveillance, industrial inspection'
    - 'Sensor fusion is the most robust mitigation: optical patches do not affect LIDAR, radar, X-ray, or IR sensors'

preview_section_10_09:
  title: 'Section 10.9: Adversarial Attacks on LLMs -- Token Substitution, HotFlip, and Semantic Perturbation'
  summary: |
    Section 10.9 translates the adversarial example framework from continuous pixel space to
    discrete token space. L-norm constraints do not apply to tokenised text; the analogues
    are token edit distance (number of substitutions) and semantic similarity (cosine distance
    between sentence embeddings). HotFlip (Ebrahimi et al. 2018) uses the Jacobian of the
    loss with respect to the one-hot token indicator to identify which character flip most
    reduces classifier confidence -- the discrete analogue of FGSM. TextFooler (Jin et al.
    2020) uses greedy word substitution with semantic similarity constraints and a POS filter
    to produce semantically valid adversarial text. BERT-Attack (Li et al. 2020) uses a masked
    language model to propose contextually appropriate substitutions. Universal adversarial
    triggers (Wallace et al. 2019) are fixed token sequences that, appended to any input,
    universally cause LLM safety classifier misclassification -- the text analogue of the
    universal adversarial patch in Section 10.8. Section 10.9 closes the loop between
    automated adversarial attacks and the human jailbreak techniques from Chapter 7.

