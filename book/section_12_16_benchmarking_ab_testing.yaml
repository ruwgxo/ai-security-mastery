section_overview:
  one_line_summary: 'Benchmarking and A/B testing are the quality assurance layer that converts anecdotal accuracy claims into statistically significant production evidence: without them, every model promotion is a guess dressed up as a measurement.'
  why_this_section_exists: |
    The ensemble built in Section 12.15 has an accuracy number from the offline test set. That number
    answers one question -- how well does the ensemble perform on the held-out data -- but it does not
    answer the questions that determine whether to deploy it. Does the ensemble beat each individual
    detector enough to justify the added complexity and latency? Does it beat the Chapter 11 rule-based
    gateway it would replace or augment? When a new model version is trained, is its observed accuracy
    improvement real or noise? These questions require benchmarking against alternatives and A/B testing
    against production reality.

    The offline accuracy number is also a lower bound, not a guarantee. The held-out test set is drawn
    from the same distribution as the training data, which differs from the production traffic
    distribution. A detector that scores 0.93 F1 offline may score 0.85 in production because the
    production distribution contains attack variants and benign patterns the test set did not. The
    benchmark establishes the offline baseline; only production evaluation reveals the real-world
    performance.

    A/B testing is the mechanism for production evaluation. A new detector version is deployed to a
    treatment group (a fraction of production traffic) while the current version serves the control
    group, and the two are compared on production traffic with statistical significance testing. This is
    the only way to know whether a new version is actually better in production, because offline metrics
    do not reflect the production distribution and a single deployment without a control group cannot
    isolate the version's effect from the natural variation in traffic.

    Section 12.16 builds the benchmarking and A/B testing infrastructure: the cross-detector benchmark
    harness, the A/B testing framework with statistical significance and guardrail metrics, the sample
    size calculator that determines how much traffic a test needs, and the online-offline divergence
    analyser that quantifies the gap between the benchmark and production reality. This infrastructure
    is the quality assurance that backs every model promotion decision with evidence.
  position_in_chapter: |
    Section 12.16 is the second integration section. It evaluates the ensemble from Section 12.15 and the
    individual detectors against each other and against production reality, connecting to the model
    registry experiment tracking from Section 12.13 so every configuration comparison is recorded. It
    produces the evaluation infrastructure that justifies the Section 12.17 production gateway
    configuration and that Chapter 17's monitoring and tuning extends.

