prose_content:

  part_1:
    title: 'Benchmarking Methodology: Held-Out Test Set vs Production Traffic'
    body: |
      A detection benchmark answers a comparative question: how do the detection configurations compare
      on the same evaluation data. The benchmark evaluates each configuration -- the four individual
      detectors, the ensemble, and the Chapter 11 rule-based gateway -- on the same temporal test set,
      at each configuration's calibrated operating threshold, producing a comparison table that shows
      which configuration performs best on which metric.

      The held-out test set is the offline benchmark data. It is the temporal test split from Section
      12.04, held out from training and from the calibration and threshold selection, so the benchmark
      metrics reflect performance on data the detectors did not see during any stage of development. The
      temporal split is essential: a random split would leak future attack patterns into the training
      data, inflating the benchmark; the temporal split evaluates each configuration on attacks that
      came after its training data, which is the production-realistic scenario.

      Production traffic evaluation is the complement. The same configurations are evaluated on a sample
      of production traffic with ground-truth labels from analyst review. The production evaluation
      reflects the actual distribution the detectors face, including the attack variants and benign
      patterns that the test set does not contain. The production metrics are typically lower than the
      offline metrics, and the gap is the online-offline divergence that part 5 addresses.

      The two evaluations serve different purposes. The held-out benchmark is repeatable, controlled,
      and fast -- it can be run on demand to compare configurations during development, and it is
      deterministic given a fixed test set and seed. The production evaluation is slow (it requires
      accumulating labelled production traffic) and reflects reality. The development workflow uses the
      offline benchmark to compare configurations and select candidates, then validates the selected
      candidate on production traffic through A/B testing before full deployment. The ml_detection_benchmark.py
      in deliverable_1 implements the offline benchmark harness.

  part_2:
    title: 'Benchmark Metrics: Beyond Aggregate Accuracy'
    body: |
      The benchmark reports more than aggregate accuracy because aggregate accuracy hides the failure
      modes that matter for a security detector. The full benchmark metric set includes precision,
      recall, and F1 at the operating threshold; ROC-AUC as a threshold-independent measure of
      discrimination; the P99 latency from Section 12.12; and -- critically -- the per-attack-family
      false positive rate and recall.

      The per-attack-family breakdown is the metric that aggregate accuracy obscures. An ensemble with
      0.92 aggregate recall may have 0.98 recall on prompt injection and 0.70 recall on multi-turn
      escalation -- the aggregate hides the weak coverage of the multi-turn family. A security detector
      that is excellent on common attacks and poor on a specific family has a coverage gap that an
      adversary will exploit by using attacks from the weak family. The per-family breakdown surfaces
      this gap so it can be addressed, while the aggregate would let it hide.

      The per-attack-family false positive rate matters for the same reason in the benign direction. A
      detector may have an acceptable aggregate false positive rate but a high false positive rate on a
      specific class of benign traffic -- perhaps it flags legitimate code-generation requests as
      injection attempts. The aggregate FPR averages this away; the per-family breakdown surfaces it, so
      the false positive problem on the specific benign class can be fixed before it degrades the product
      experience for users who make that kind of request.

      Latency is a first-class benchmark metric, not an afterthought. A configuration that is more
      accurate but slower may be a worse production choice, because the latency budget is a hard
      constraint (Section 12.12). The benchmark reports the P99 latency alongside the accuracy metrics so
      the accuracy-latency tradeoff is visible. A configuration is selected on the full metric profile --
      accuracy, per-family coverage, false positive rate, and latency -- not on aggregate accuracy alone.

  part_3:
    title: 'A/B Testing: Traffic Splitting and Statistical Significance'
    body: |
      A/B testing compares two detector configurations on production traffic by routing a control group
      to the current configuration and a treatment group to the new configuration, then comparing their
      metrics. It is required for any detector update because the offline benchmark does not reflect the
      production distribution, and a single deployment without a control group cannot isolate the new
      configuration's effect from the natural day-to-day variation in traffic.

      The traffic split is deterministic per request or per session: a consistent hash of the request or
      session ID assigns each to the control or treatment group, so a given session always experiences
      the same configuration during the test. The split fraction is typically balanced (50/50) for a
      pure comparison, or weighted toward control (90/10) when the treatment configuration carries more
      risk and the test should limit its exposure. The ab_test_detector.py in deliverable_2 implements
      the split and the per-group metric collection.

      Statistical significance is what separates a real improvement from noise. A treatment configuration
      that shows 0.93 accuracy against the control's 0.91 over 1,000 examples has an observed 2%
      improvement, but the improvement may not be statistically significant -- it may be within the
      variation expected from sampling 1,000 examples. Promoting on a non-significant improvement carries
      the regression risk of a deployment for an improvement that may not be real. The significance test
      (a two-proportion z-test for accuracy, or the appropriate test for the metric) computes the
      probability that the observed difference arose by chance; only when this probability is below the
      significance level (typically 0.05) is the improvement treated as real.

      The significance test depends on the sample size. A small sample cannot detect a small improvement
      with significance, no matter how real the improvement is, because the sampling variation swamps the
      effect. This is why the sample size must be calculated before the test, which part 4 addresses. An
      A/B test run for too short a duration accumulates too few examples to reach significance, and its
      inconclusive result is mistaken for no improvement.

  part_4:
    title: 'Sample Size and Guardrail Metrics'
    body: |
      The sample size calculation determines how much traffic an A/B test needs to detect a given
      improvement with significance. It depends on three inputs: the baseline metric value (the control
      group's expected accuracy), the minimum detectable effect (the smallest improvement worth detecting,
      such as a 2% accuracy gain), and the desired statistical power (the probability of detecting the
      effect if it is real, typically 0.8). From these, the calculation produces the minimum number of
      examples per group required for the test to detect the minimum effect with significance.

      The calculation is consequential for test planning. A test to detect a 5% improvement needs fewer
      examples than a test to detect a 1% improvement, because the smaller effect requires more data to
      distinguish from noise. At a given traffic rate, the sample size translates to a test duration: if
      the test needs 10,000 examples per group and the treatment group receives 500 attack-relevant
      examples per day, the test must run 20 days to reach the required sample. Running the test for
      fewer days produces an underpowered test whose inconclusive result is uninformative. The
      sample_size_calculator.py in deliverable_3 computes the required sample size and the corresponding
      test duration.

      Guardrail metrics prevent a local accuracy improvement from causing a production regression. A new
      configuration may improve the accuracy by 3% but increase the P99 latency by 10ms, breaching the
      latency budget -- this is a regression, not a win, because the latency budget is a hard constraint.
      Or the new configuration may improve recall but increase the false positive rate beyond the analyst
      capacity -- also a regression, because the flooded analyst queue degrades the detection system. The
      guardrail metrics -- latency and false positive rate -- are monitored alongside the primary metric
      during the A/B test, and the test fails if any guardrail is breached regardless of the primary
      metric improvement.

      The guardrails encode the principle that a detector update is judged on the full production impact,
      not on a single metric. The ab_test_detector.py monitors the guardrails continuously during the
      test and flags a guardrail breach, so a configuration that wins on accuracy but breaches a guardrail
      is rejected before it is promoted. The guardrail is the mechanism that prevents the metric tunnel
      vision where an accuracy improvement is pursued at the cost of a latency or false positive
      regression.

  part_5:
    title: 'Online-Offline Divergence and Reproducibility'
    body: |
      The benchmark number is a lower bound on production performance, not a guarantee, because the
      offline test set distribution differs from the production traffic distribution. The online-offline
      divergence quantifies this gap: it compares the metrics measured offline on the held-out test set
      against the metrics measured online on labelled production traffic, for the same configuration. A
      configuration that scores 0.93 F1 offline and 0.85 F1 online has a 0.08 divergence, which means the
      benchmark overestimated the production performance by that amount.

      The divergence has two implications. First, the benchmark should be interpreted as a lower bound
      adjusted by the divergence: a configuration that scores 0.93 offline can be expected to score around
      0.85 online given a 0.08 historical divergence, and the deployment decision should use the adjusted
      estimate. Second, a widening divergence over time is a signal of distribution shift: if the offline
      benchmark stays at 0.93 but the online performance drops from 0.85 to 0.78, the production
      distribution has shifted away from the test set, and the test set (and the training data behind it)
      needs refreshing through the Section 12.14 curation. The online_offline_divergence_analyser.py in
      deliverable_5 measures the divergence and tracks it over time as a distribution-shift signal.

      Reproducibility is the property that the benchmark produces the same results across runs given the
      same inputs. A benchmark that produces different numbers on each run -- because of unseeded
      randomness in the data sampling, the model inference, or the metric computation -- cannot be used to
      compare configurations reliably, because the run-to-run variation is confounded with the
      configuration difference. The benchmark must be deterministic: fixed random seeds for any sampling,
      fixed test set, and logged results for cross-run comparison.

      The benchmark_reproducibility_harness.py in deliverable_4 enforces the determinism: it seeds all
      randomness, fixes the test set, and logs every benchmark run with its configuration and results, so
      that a benchmark run can be reproduced exactly and compared against prior runs. The reproducibility
      connects to the model registry experiment tracking from Section 12.13 -- every benchmark run is
      recorded as an experiment, so the full history of configuration comparisons is retrievable and
      auditable. Without reproducibility, the benchmark comparisons are anecdotes; with it, they are
      evidence.

