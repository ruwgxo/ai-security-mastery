prose_content:

  - part: 1
    title: 'The Threat Actor Has Changed'
    body: |
      Chapter 8 placed you inside the data pipeline. The threat actor was a
      contributor -- a researcher who could influence training batches, a vendor
      whose dataset appeared in a supply chain audit, an insider with write access
      to the preprocessing stage. The attack surface was the training run itself:
      offline, asynchronous, auditable in CI/CD. The detection architecture
      matched: a batch auditing pipeline that ran before model deployment, flagging
      poisoned samples before they could influence production weights.

      Chapter 9 removes that access entirely. The threat actor cannot touch the
      training pipeline. The model is already deployed. Weights are fixed. The
      only interface the adversary has is the same interface every legitimate user
      has: the inference API.

      This is not a relaxed threat model -- it is a different one. The adversary
      in Chapter 9 has no training-time leverage but has something Chapter 8''s
      threat actor typically lacked: an operational budget and patience. An
      attacker who can issue a thousand queries a day, sustained across weeks,
      can reconstruct what a model knows without ever touching its weights. The
      training-time defender had a window: poison the data before the run, and
      the attack persists in the deployed model. The inference-time adversary has
      no such window -- every attack is a series of queries, and every query costs
      money and leaves a trace. That trace is the detection surface.

      The practical consequence for defenders: stop thinking in batch jobs. The
      detection architecture returns to the real-time per-request pattern
      Chapters 6 and 7 established. Latency budgets matter again. The classifier
      must run within the request lifecycle, not in a nightly CI pipeline.

  - part: 2
    title: 'The Inference-Time Threat Model'
    body: |
      The inference-time threat model has five defining properties that Chapter 8
      did not require.

      Fixed model. The production model is deployed and its weights do not change
      during the attack. The adversary cannot influence what the model has learned.
      Every response the model gives is a deterministic or stochastically bounded
      function of its fixed weights and the adversary''s input. This is what makes
      extraction possible: the model''s behaviour is stable across queries, so
      systematic querying can map that behaviour.

      Real-time per-request analysis. Detection must operate on each request as it
      arrives, within the latency budget of a synchronous API call. Chapter 8''s
      auditing pipeline had minutes to hours to process a training batch.
      Chapter 9''s gateway classifier has milliseconds. The Chapter 6 and Chapter 7
      ensemble ran at P99 latency under 100ms -- Chapter 9 extends that ensemble
      with query monitoring as a sixth parallel track, within the same budget.

      Query sequence visibility. A single query reveals little. It is the sequence
      -- the distribution of queries over time, their positions relative to each
      other in input space, their concentration around decision boundaries -- that
      signals extraction. The detection architecture must be stateful across
      requests, not memoryless per request.

      Query budget as the binding constraint. Every extraction attack has a
      query budget: the number of API calls an adversary can afford before cost
      or rate limits stop them. Budget determines fidelity. A defender who doubles
      the query budget required for a given fidelity level has halved the attack''s
      economics. This reframing -- defending against budget rather than against
      existence -- is the central insight of Chapter 9 detection design.

      Blast radius asymmetry. A successful injection or jailbreak affects one
      conversation. A successful extraction attack produces a deployable clone:
      a model the adversary can query at their own infrastructure, sell, or use
      to generate adversarial examples against the original. The blast radius of
      extraction is the full downstream deployment of the surrogate -- orders of
      magnitude larger than a single-conversation injection.

  - part: 3
    title: 'The Adversary Access Ladder'
    body: |
      Chapter 9 threat actors occupy one of three rungs on an adversary access
      ladder. The rung determines what the adversary can observe, which extraction
      technique is most efficient, and how many queries are needed.

      Black-box access. The adversary sees only the model''s outputs: final
      predictions, generated text, classification labels. No probability
      distributions. No logits. No gradients. This is the realistic commercial
      API scenario: the model returns a response string or a top-1 class label.
      Black-box extraction requires more queries than the alternatives but is
      the most common real-world adversary position. Section 9.3 establishes the
      fundamental black-box extraction primitive; Sections 9.4 and 9.5 extend it
      to distillation and prompt extraction.

      Grey-box access. The adversary sees the model''s output distribution --
      soft labels, logit vectors, or top-k class probabilities. Many commercial
      ML APIs return confidence scores or probability distributions alongside
      predictions. This is a common production configuration that significantly
      reduces extraction query budget. Soft-label distillation (Section 9.4)
      exploits grey-box access: a probability vector over classes contains
      exponentially more information about the model''s decision boundary than
      a single class label. The consequence for defenders: output design is a
      security decision. Returning probability distributions when a hard label
      suffices leaks extraction information unnecessarily.

      White-box access. The adversary has full model access: weights, architecture,
      and gradients. This access level is relevant in Chapter 9 for model inversion
      (Section 9.7) -- gradient-based inversion reconstructs training data from
      weights -- and as a threat model for open-weight models deployed with
      restricted fine-tuning licences. White-box extraction is the most powerful
      but the least common real-world scenario against commercial deployments.

      Budget implications by rung: black-box extraction of a classifier typically
      requires O(d) to O(d log d) queries for linear models where d is the feature
      dimension, far more for neural networks. Grey-box access reduces budget by
      5 to 50x because each query returns a full probability vector rather than a
      single bit of decision boundary information. White-box access eliminates the
      query budget constraint entirely for model structure -- the adversary already
      has the model.

  - part: 4
    title: 'Detection Architecture: Gateway vs Auditing Pipeline'
    body: |
      The two detection architectures in this book -- the real-time gateway
      classifier (Chapters 6 and 7) and the offline auditing pipeline (Chapter 8)
      -- are not competing designs. They address different attack surfaces at
      different latency tiers. The mistake is applying the wrong architecture to
      a threat.

      Chapter 8''s auditing pipeline operated offline. It received training batches
      as asynchronous inputs, ran multi-pass statistical tests and provenance checks
      across the full batch, and gated model deployment at the end of the CI/CD
      pipeline. Latency budget: minutes to hours. Detection unit: a training batch
      or dataset. State: the pipeline maintained cross-batch history to detect
      distributed poisoning across multiple uploads.

      The Chapter 6 and 7 gateway classifier operated in real time. It received
      each user request as a synchronous input, ran five parallel detection tracks
      (injection classifier, OOD detector, semantic consistency checker, pattern
      analyser, jailbreak ensemble), and returned a routing decision within 50ms
      P99. Detection unit: a single request, though jailbreak detection in Chapter
      7 introduced limited session-level context. State: minimal per-session context.

      Chapter 9''s detection architecture extends the gateway pattern, not the
      auditing pipeline. The attack surface is inference-time; the detection unit
      is the query sequence; the latency budget is synchronous. Chapter 9 adds a
      sixth parallel track to the Chapter 6/7 ensemble: query monitoring with
      per-user state tracking. This is the one architectural extension relative
      to Chapters 6 and 7: the state is now persistent per-user across many
      requests, not just per-session. The rate limiter (Section 9.11) acts on
      that state to turn detection into prevention.

      The output-side defence (Section 9.12) is architecturally novel: it operates
      post-inference, on the model''s response before it is returned to the user.
      Neither the Chapter 6/7 gateway nor the Chapter 8 auditing pipeline had an
      output-side stage. This is the structural extension Chapter 9 contributes
      to the book''s overall defensive architecture.

  - part: 5
    title: 'OWASP LLM10 and ATLAS Taxonomy Anchors'
    body: |
      OWASP LLM10 -- Model Theft -- defines the framework Chapter 9 operationalises.
      The framework covers intentional copying of a model''s functionality via API
      queries, reconstruction of model behaviour through systematic querying,
      direct theft of model weights, and extraction of proprietary system prompts
      and operational configuration. Chapter 9 builds complete detection coverage
      for each of these in the attack sections (9.2 through 9.9) and deploys
      production controls in the capstone sections (9.11 and 9.12).

      OWASP LLM10 closure with Chapter 9 mirrors the pattern established for
      LLM01 (injection and jailbreak, closed in Chapter 7) and LLM03 (training
      data poisoning, closed in Chapter 8). Each OWASP category receives a full
      attack catalogue followed by production detection. Chapter 9 completes the
      three-category coverage arc across Part 2 of the book.

      MITRE ATLAS provides sub-technique granularity. Three ATLAS techniques
      anchor Chapter 9.

      AML.T0040 -- ML Model Inference API Access. The adversary uses the inference
      API to query the model systematically. This is the foundational technique for
      all extraction attacks: every extraction begins with AML.T0040. Query
      monitoring (Section 9.11) is the principal detection control.

      AML.T0044 -- Full ML Model Access. The adversary obtains weights or
      architecture directly, either through white-box model access or by
      successfully completing a functional extraction that produces a deployable
      surrogate. AML.T0044 describes the outcome of a successful extraction
      campaign, not just the access method. Output watermarking (Section 9.12)
      provides post-hoc evidence of AML.T0044 by detecting the victim model''s
      signature in a suspected surrogate.

      AML.T0024 -- Exfiltration via ML Inference API. The adversary exfiltrates
      model intellectual property -- weights, decision boundaries, system prompts
      -- through the inference API as the exfiltration channel. AML.T0024 combines
      the access method of AML.T0040 with an exfiltration goal. The Sigma rule
      completed in Section 9.11 targets AML.T0040 and AML.T0024 together: the
      same query pattern that indicates inference API abuse also indicates
      exfiltration in progress.

  - part: 6
    title: 'Why Extraction Defences Differ from Injection and Jailbreak Defences'
    body: |
      The Chapter 6 injection classifier and Chapter 7 jailbreak ensemble both
      operate on single-request intent: a request either contains an injection
      payload or it does not; a request either attempts a jailbreak or it does
      not. The classifier reads one request and makes a binary decision. Session
      context in Chapter 7 extended this slightly -- carry-over instructions
      across turns -- but the fundamental detection unit remained the request.

      Extraction defences cannot operate this way. A single extraction query is
      indistinguishable from a benign query. An adversary issuing boundary-probing
      queries at one query per minute -- well within legitimate API usage -- produces
      individually normal-looking requests. The extraction signal lives in the
      distribution of queries over time: their clustering in input space, their
      concentration near decision boundaries, their entropy relative to benign
      queries, the convergence of the adversary''s query distribution toward the
      model''s decision surface.

      This has three architectural consequences. First, extraction detection requires
      persistent per-user state across requests -- the state store that Section 9.11
      builds is not optional. Second, the detection signal is statistical rather
      than deterministic: extraction is detected when the query distribution crosses
      an anomaly threshold, not when any single query crosses a content threshold.
      Third, rate limiting is a security control, not just an operational one: it
      is the actuator that turns a statistical detection into a prevention response.

      The practical difference in implementation: Chapter 6 and 7 classifiers have
      near-zero memory of prior requests from the same user. Chapter 9''s query
      monitor maintains a rolling window of query statistics per user, updated on
      every request, compared against extraction-profile baselines. The
      computational cost of this memory is the primary engineering challenge of
      the Section 9.11 implementation.

