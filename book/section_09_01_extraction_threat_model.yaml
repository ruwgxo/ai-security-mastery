section_overview:
  one_line_summary: |
    Chapter 9 returns to the real-time gateway architecture of Chapters 6 and 7,
    facing a new threat actor -- the API consumer who reconstructs model behaviour
    without training access -- and frames the two-surface defence that closes
    OWASP LLM10.

  why_this_section_exists: |
    Chapter 8 retrained your instincts toward batch jobs, CI/CD gates, and offline
    auditing pipelines. Section 9.1 reverses that shift before it becomes a
    liability. The threat actor in Chapter 9 is not a data pipeline contributor
    with training access; it is an API consumer with a query budget and no model
    internals. The attack surface is the deployed model''s inference API. The
    detection architecture is real-time and per-request, not batch and asynchronous.

    Without this reset, the rest of Chapter 9 makes no architectural sense: you
    would design batch auditors for a threat that operates at inference time, miss
    the query budget constraint that defines extraction economics, and build
    defences that detect the wrong signals at the wrong latency tier.

    Section 9.1 establishes the threat model so Sections 9.2 through 9.12 build
    the right architecture. It also introduces the OWASP LLM10 (Model Theft)
    framework and the three ATLAS sub-techniques that Chapter 9 covers, giving
    the reader a compliance and taxonomy anchor before the attack sections begin.

  position_in_chapter: |
    Section 9.1 of 13. Threat model foundation for the full chapter. All attack
    sections (9.2 through 9.9) and all defence sections (9.10 through 9.12)
    inherit the threat model, adversary access ladder, and architectural framing
    established here.

