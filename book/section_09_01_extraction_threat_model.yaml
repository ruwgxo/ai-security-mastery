deliverables:

  - id: 1
    name: 'threat_model_contrast.py'
    description: |
      Encodes the eight-dimension training-time vs inference-time threat model
      contrast as a structured data object and renders a formatted console report.
      Intended as a quick-reference tool for architects evaluating which detection
      architecture applies to a given threat scenario.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies beyond
      stdlib. No hardcoded schemas -- contrast dimensions are data-driven via the
      ContrastDimension dataclass list.
    code: |
      # threat_model_contrast.py
      # Chapter 9 Section 9.1 -- Training-Time vs Inference-Time Threat Model Contrast
      # Single quotes throughout per book convention.

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class ContrastDimension:
          dimension: str
          training_time: str
          inference_time: str


      CONTRAST_DIMENSIONS: List[ContrastDimension] = [
          ContrastDimension(
              dimension='Threat Actor',
              training_time='Data pipeline contributor with training access',
              inference_time='API consumer with query budget; no training access',
          ),
          ContrastDimension(
              dimension='Attack Surface',
              training_time='Training data, preprocessing pipeline, model update path',
              inference_time='Deployed model inference API',
          ),
          ContrastDimension(
              dimension='Attack Timing',
              training_time='Before or during training; effect persists in weights',
              inference_time='After deployment; weights fixed throughout attack',
          ),
          ContrastDimension(
              dimension='Detection Unit',
              training_time='Training batch or dataset; asynchronous',
              inference_time='Query sequence over time; synchronous per request',
          ),
          ContrastDimension(
              dimension='Detection Architecture',
              training_time='Offline auditing pipeline; CI/CD gate; minutes-to-hours latency',
              inference_time='Real-time gateway; parallel detection tracks; sub-100ms P99',
          ),
          ContrastDimension(
              dimension='Adversary Observable',
              training_time='Model behaviour shift post-training',
              inference_time='Per-query outputs; soft or hard labels per API design',
          ),
          ContrastDimension(
              dimension='Primary Constraint',
              training_time='Training access and data provenance visibility',
              inference_time='Query budget; cost per query; rate limits',
          ),
          ContrastDimension(
              dimension='Blast Radius',
              training_time='Persistent model behaviour corruption across all users',
              inference_time='Deployable surrogate model for attacker-controlled use',
          ),
      ]


      def _wrap(text: str, width: int) -> List[str]:
          words = text.split()
          lines: List[str] = []
          current = ''
          for word in words:
              if len(current) + len(word) + 1 <= width:
                  current = f'{current} {word}'.strip()
              else:
                  if current:
                      lines.append(current)
                  current = word
          if current:
              lines.append(current)
          return lines or ['']


      def render_contrast_report(dimensions: List[ContrastDimension]) -> None:
          col_width = 38
          header = (
              f'{"Dimension":<22} '
              f'{"Training-Time (Ch8)":<{col_width}} '
              f'{"Inference-Time (Ch9)":<{col_width}}'
          )
          separator = '-' * len(header)
          print(separator)
          print('THREAT MODEL CONTRAST: Chapter 8 vs Chapter 9')
          print(separator)
          print(header)
          print(separator)
          for dim in dimensions:
              t_lines = _wrap(dim.training_time, col_width)
              i_lines = _wrap(dim.inference_time, col_width)
              max_lines = max(len(t_lines), len(i_lines))
              t_lines += [''] * (max_lines - len(t_lines))
              i_lines += [''] * (max_lines - len(i_lines))
              for idx, (t_line, i_line) in enumerate(zip(t_lines, i_lines)):
                  label = dim.dimension if idx == 0 else ''
                  print(f'{label:<22} {t_line:<{col_width}} {i_line:<{col_width}}')
              print()


      if __name__ == '__main__':
          render_contrast_report(CONTRAST_DIMENSIONS)

  - id: 2
    name: 'adversary_access_ladder.py'
    description: |
      Encodes the three-rung adversary access ladder as a structured data object
      with budget multipliers and defensive implication mapping. Provides a
      classify_api_design() function that takes an API configuration dictionary
      and returns the adversary access level the configuration exposes.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Access level selection is data-driven -- no hardcoded conditionals per
      access level; conditions are evaluated against the config dict generically.
    code: |
      # adversary_access_ladder.py
      # Chapter 9 Section 9.1 -- Adversary Access Ladder
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class AccessLevel:
          name: str
          observables: List[str]
          optimal_technique: str
          budget_multiplier: float
          budget_note: str
          defensive_implication: str
          atlas_relevance: List[str]
          # config_signals: API config keys that indicate this access level
          config_signals: List[str] = field(default_factory=list)


      ACCESS_LADDER: List[AccessLevel] = [
          AccessLevel(
              name='white_box',
              observables=['model_weights', 'architecture', 'gradients', 'activations'],
              optimal_technique='gradient_based_inversion or direct_parameter_analysis',
              budget_multiplier=0.0,
              budget_note='Query budget effectively zero for model structure. Extraction is immediate.',
              defensive_implication='Weight protection and output watermarking (Section 9.12) are the primary controls.',
              atlas_relevance=['AML.T0040', 'AML.T0044', 'AML.T0024'],
              config_signals=['weights_accessible', 'gradients_accessible'],
          ),
          AccessLevel(
              name='grey_box',
              observables=['soft_labels', 'probability_vectors', 'logit_scores', 'top_k_distributions'],
              optimal_technique='soft_label_distillation or active_distillation',
              budget_multiplier=0.05,
              budget_note='5-50x budget reduction. Each query returns full probability distribution.',
              defensive_implication='Return hard labels unless soft labels are required by the product.',
              atlas_relevance=['AML.T0040', 'AML.T0024'],
              config_signals=['returns_probabilities', 'returns_logits', 'returns_top_k'],
          ),
          AccessLevel(
              name='black_box',
              observables=['hard_labels', 'generated_text', 'top_1_prediction'],
              optimal_technique='decision_boundary_probing or hard_label_distillation',
              budget_multiplier=1.0,
              budget_note='Baseline. O(d) to O(d log d) queries for linear models.',
              defensive_implication='Query pattern monitoring (Section 9.11) is the primary control.',
              atlas_relevance=['AML.T0040', 'AML.T0024'],
              config_signals=[],
          ),
      ]


      def classify_api_design(api_config: Dict[str, bool]) -> AccessLevel:
          '''
          Classify an API configuration into the adversary access level it exposes.
          Evaluated in descending severity order: white_box > grey_box > black_box.

          api_config keys:
              returns_probabilities (bool): API returns soft-label probability vectors
              returns_logits (bool):        API returns raw logit scores
              returns_top_k (bool):         API returns top-k predictions with scores
              weights_accessible (bool):    Model weights are accessible
              gradients_accessible (bool):  Gradient access is available
          '''
          for level in ACCESS_LADDER:
              if any(api_config.get(signal, False) for signal in level.config_signals):
                  return level
          # No elevated signals -- black_box is the fallback (last in list)
          return ACCESS_LADDER[-1]


      def render_access_ladder() -> None:
          print('ADVERSARY ACCESS LADDER -- Chapter 9 Section 9.1')
          print('=' * 60)
          for i, level in enumerate(ACCESS_LADDER, 1):
              print(f'\nRung {i}: {level.name.upper()}')
              print(f'  Observables:    {", ".join(level.observables)}')
              print(f'  Best technique: {level.optimal_technique}')
              print(f'  Budget:         {level.budget_note}')
              print(f'  Defence:        {level.defensive_implication}')
              print(f'  ATLAS:          {", ".join(level.atlas_relevance)}')


      if __name__ == '__main__':
          render_access_ladder()
          print()
          example_config = {
              'returns_probabilities': False,
              'returns_logits': False,
              'returns_top_k': True,
              'weights_accessible': False,
              'gradients_accessible': False,
          }
          level = classify_api_design(example_config)
          print(f'Example API classification: {level.name}')
          print(f'Defensive implication: {level.defensive_implication}')

  - id: 3
    name: 'atlas_technique_mapper.py'
    description: |
      Encodes the AML.T0040/T0044/T0024 ATLAS technique mapping as structured data.
      Provides a map_observable_to_technique() function that takes a list of
      observed adversary behaviour signals and returns the matching ATLAS
      sub-techniques ranked by signal overlap count.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Technique data is schema-free -- fields are driven by the AtlasTechnique
      dataclass, not hardcoded per technique. Optional imported at top level.
    code: |
      # atlas_technique_mapper.py
      # Chapter 9 Section 9.1 -- ATLAS Technique Mapper
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import List, Optional, Set, Tuple


      @dataclass
      class AtlasTechnique:
          technique_id: str
          name: str
          description: str
          observable_signals: List[str]
          chapter_sections: List[str]
          primary_detection_control: str
          sigma_rule_reference: Optional[str] = None


      CHAPTER_9_TECHNIQUES: List[AtlasTechnique] = [
          AtlasTechnique(
              technique_id='AML.T0040',
              name='ML Model Inference API Access',
              description='Adversary uses inference API to query the model systematically for extraction or privacy attacks.',
              observable_signals=[
                  'high_query_volume_single_user',
                  'query_distribution_near_decision_boundary',
                  'systematic_input_variation',
                  'out_of_distribution_query_clustering',
                  'low_output_entropy_queries',
              ],
              chapter_sections=['9.1', '9.3', '9.4', '9.5', '9.6', '9.8', '9.9', '9.10', '9.11'],
              primary_detection_control='Query pattern monitor (Section 9.11); adaptive rate limiter (Section 9.11)',
              sigma_rule_reference='aml_t0040_t0024_inference_extraction.yml (Section 9.11)',
          ),
          AtlasTechnique(
              technique_id='AML.T0044',
              name='Full ML Model Access',
              description='Adversary obtains model weights or a functional surrogate; outcome of a successful extraction campaign.',
              observable_signals=[
                  'surrogate_model_detected_in_market',
                  'watermark_present_in_third_party_model',
                  'capability_duplication_without_training_evidence',
              ],
              chapter_sections=['9.1', '9.4', '9.7', '9.9', '9.12'],
              primary_detection_control='Output watermarking and detection test (Section 9.12); post-hoc ownership verification',
              sigma_rule_reference=None,
          ),
          AtlasTechnique(
              technique_id='AML.T0024',
              name='Exfiltration via ML Inference API',
              description='Model IP -- weights, decision boundaries, system prompts -- exfiltrated through the inference API channel.',
              observable_signals=[
                  'high_query_volume_single_user',
                  'systematic_prompt_reconstruction_queries',
                  'cross_user_coordinated_query_patterns',
                  'boundary_probing_sequence',
              ],
              chapter_sections=['9.1', '9.5', '9.9', '9.11'],
              primary_detection_control='Query pattern monitor (Section 9.11); AML.T0040/T0024 Sigma rule (Section 9.11)',
              sigma_rule_reference='aml_t0040_t0024_inference_extraction.yml (Section 9.11)',
          ),
      ]


      def map_observable_to_technique(observables: List[str]) -> List[AtlasTechnique]:
          '''
          Given a list of observed adversary behaviour signals, return matching ATLAS
          sub-techniques sorted by number of matching signals (descending).
          Techniques with zero matches are excluded.
          '''
          observed_set: Set[str] = set(observables)
          scored: List[Tuple[int, AtlasTechnique]] = []
          for technique in CHAPTER_9_TECHNIQUES:
              matches = observed_set.intersection(set(technique.observable_signals))
              if matches:
                  scored.append((len(matches), technique))
          scored.sort(key=lambda x: x[0], reverse=True)
          return [technique for _, technique in scored]


      def render_technique_mapping() -> None:
          print('ATLAS TECHNIQUE MAPPING -- Chapter 9')
          print('=' * 60)
          for technique in CHAPTER_9_TECHNIQUES:
              print(f'\n{technique.technique_id}: {technique.name}')
              print(f'  Description: {technique.description}')
              print(f'  Observable signals:')
              for sig in technique.observable_signals:
                  print(f'    - {sig}')
              print(f'  Sections: {", ".join(technique.chapter_sections)}')
              print(f'  Detection: {technique.primary_detection_control}')
              if technique.sigma_rule_reference:
                  print(f'  Sigma rule: {technique.sigma_rule_reference}')


      if __name__ == '__main__':
          render_technique_mapping()
          print()
          example_observables = [
              'high_query_volume_single_user',
              'query_distribution_near_decision_boundary',
              'systematic_input_variation',
          ]
          matched = map_observable_to_technique(example_observables)
          print('Observable signals mapped to techniques:')
          for t in matched:
              print(f'  {t.technique_id}: {t.name}')

  - id: 4
    name: 'owasp_llm10_scope.py'
    description: |
      Encodes the OWASP LLM10 (Model Theft) sub-risks and Chapter 9 coverage
      mapping as structured data. Provides a gap_analysis() function that takes
      a list of deployed controls and identifies which LLM10 sub-risks remain
      uncovered.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Sub-risk data is schema-driven via LLM10SubRisk dataclass. gap_analysis()
      is purely data-driven -- no hardcoded per-risk conditionals.
    code: |
      # owasp_llm10_scope.py
      # Chapter 9 Section 9.1 -- OWASP LLM10 Scope and Chapter 9 Coverage
      # Single quotes throughout per book convention.

      from dataclasses import dataclass
      from typing import Dict, List, Set


      @dataclass
      class LLM10SubRisk:
          risk_id: str
          description: str
          attack_sections: List[str]
          detection_sections: List[str]
          required_controls: List[str]


      LLM10_SUB_RISKS: List[LLM10SubRisk] = [
          LLM10SubRisk(
              risk_id='LLM10.1',
              description='Intentional copying of model functionality via API queries',
              attack_sections=['9.3', '9.4'],
              detection_sections=['9.10', '9.11'],
              required_controls=['query_pattern_monitor', 'adaptive_rate_limiter'],
          ),
          LLM10SubRisk(
              risk_id='LLM10.2',
              description='Extraction of system prompts and operational configuration',
              attack_sections=['9.5'],
              detection_sections=['9.10', '9.11', '9.12'],
              required_controls=['query_pattern_monitor', 'output_perturbator'],
          ),
          LLM10SubRisk(
              risk_id='LLM10.3',
              description='Training data reconstruction via membership inference and model inversion',
              attack_sections=['9.6', '9.7'],
              detection_sections=['9.10', '9.12'],
              required_controls=['output_perturbator', 'differential_privacy_training'],
          ),
          LLM10SubRisk(
              risk_id='LLM10.4',
              description='API economic abuse: denial-of-wallet and rate-limit exhaustion',
              attack_sections=['9.8'],
              detection_sections=['9.11'],
              required_controls=['adaptive_rate_limiter', 'cost_monitor'],
          ),
          LLM10SubRisk(
              risk_id='LLM10.5',
              description='Surrogate model deployment post-extraction (ownership dispute)',
              attack_sections=['9.4', '9.9'],
              detection_sections=['9.12'],
              required_controls=['output_watermarker', 'watermark_detector'],
          ),
      ]


      def gap_analysis(deployed_controls: List[str]) -> Dict[str, List[str]]:
          '''
          Given a list of deployed control names, return per-sub-risk coverage gaps.
          Returns a dict mapping risk_id to list of missing required controls.
          Sub-risks with full coverage are excluded from the result.
          '''
          deployed_set: Set[str] = set(deployed_controls)
          gaps: Dict[str, List[str]] = {}
          for sub_risk in LLM10_SUB_RISKS:
              missing = [c for c in sub_risk.required_controls if c not in deployed_set]
              if missing:
                  gaps[sub_risk.risk_id] = missing
          return gaps


      def render_scope() -> None:
          print('OWASP LLM10 (MODEL THEFT) -- Chapter 9 Coverage')
          print('=' * 60)
          for sub_risk in LLM10_SUB_RISKS:
              print(f'\n{sub_risk.risk_id}')
              print(f'  Risk:      {sub_risk.description}')
              print(f'  Attacks:   Sections {", ".join(sub_risk.attack_sections)}')
              print(f'  Detection: Sections {", ".join(sub_risk.detection_sections)}')
              print(f'  Controls:  {", ".join(sub_risk.required_controls)}')


      if __name__ == '__main__':
          render_scope()
          print()
          example_deployed = ['query_pattern_monitor', 'adaptive_rate_limiter']
          gaps = gap_analysis(example_deployed)
          print('Gap analysis for partially deployed controls:')
          for risk_id, missing in gaps.items():
              print(f'  {risk_id}: missing -- {", ".join(missing)}')

  - id: 5
    name: 'architecture_selector.py'
    description: |
      Implements a decision function that takes a threat scenario and returns the
      correct detection architecture (gateway classifier vs offline auditing pipeline)
      with rationale and chapter references. Encodes the eight-property contrast
      from Table 1 as a data-driven scoring function.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Architecture selection is data-driven -- ARCHITECTURE_RULES list drives
      scoring with no hardcoded if/else per scenario type. Highest-scoring rule
      wins; ties broken by list order (most-specific first).
    code: |
      # architecture_selector.py
      # Chapter 9 Section 9.1 -- Detection Architecture Selector
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Tuple


      @dataclass
      class ThreatScenario:
          name: str
          attack_surface: str       # 'training_pipeline' or 'inference_api'
          detection_timing: str     # 'pre_deployment' or 'runtime'
          latency_requirement: str  # 'batch' or 'realtime'
          state_requirement: str    # 'stateless' or 'stateful'


      @dataclass
      class ArchitectureRecommendation:
          architecture: str
          rationale: str
          chapter_reference: str
          extension_notes: str


      @dataclass
      class ArchitectureRule:
          name: str
          conditions: Dict[str, str]
          recommendation: ArchitectureRecommendation


      ARCHITECTURE_RULES: List[ArchitectureRule] = [
          ArchitectureRule(
              name='offline_auditing_pipeline',
              conditions={
                  'attack_surface': 'training_pipeline',
                  'detection_timing': 'pre_deployment',
                  'latency_requirement': 'batch',
              },
              recommendation=ArchitectureRecommendation(
                  architecture='offline_auditing_pipeline',
                  rationale='Training-time attack surface requires pre-deployment batch auditing. Real-time gateway adds no coverage for this threat class.',
                  chapter_reference='Chapter 8 Section 8.15',
                  extension_notes='No Chapter 9 extension applicable. Use Chapter 8 auditing pipeline.',
              ),
          ),
          ArchitectureRule(
              name='gateway_classifier_with_query_monitoring',
              conditions={
                  'attack_surface': 'inference_api',
                  'detection_timing': 'runtime',
                  'latency_requirement': 'realtime',
              },
              recommendation=ArchitectureRecommendation(
                  architecture='gateway_classifier_with_query_monitoring',
                  rationale='Inference-time attack surface requires real-time per-request analysis. Extend Chapter 6/7 gateway with Chapter 9 query monitoring (Track 6) and output-side watermarking and perturbation.',
                  chapter_reference='Chapter 6 Section 6.17, Chapter 7 Section 7.14, Chapter 9 Sections 9.11 and 9.12',
                  extension_notes='Add per-user state store. Add Track 6 (query monitor). Add output-side stage (watermarker and perturbator). Maintain sub-100ms P99 across all tracks.',
              ),
          ),
      ]


      def select_architecture(scenario: ThreatScenario) -> ArchitectureRecommendation:
          '''
          Select the correct detection architecture for a given threat scenario.
          Scores each rule by number of matching conditions. Returns the highest-
          scoring recommendation. Returns an undetermined result if no rule matches.
          '''
          scored: List[Tuple[int, ArchitectureRecommendation]] = []
          for rule in ARCHITECTURE_RULES:
              score = sum(
                  1 for field_name, expected in rule.conditions.items()
                  if getattr(scenario, field_name, None) == expected
              )
              scored.append((score, rule.recommendation))
          scored.sort(key=lambda x: x[0], reverse=True)
          best_score, best_rec = scored[0]
          if best_score == 0:
              return ArchitectureRecommendation(
                  architecture='undetermined',
                  rationale='Scenario does not match known architecture patterns. Manual review required.',
                  chapter_reference='Chapter 9 Section 9.1',
                  extension_notes='Review attack surface and detection timing requirements against Table 4.',
              )
          return best_rec


      if __name__ == '__main__':
          extraction_scenario = ThreatScenario(
              name='model_extraction_via_api',
              attack_surface='inference_api',
              detection_timing='runtime',
              latency_requirement='realtime',
              state_requirement='stateful',
          )
          rec = select_architecture(extraction_scenario)
          print(f'Scenario:   {extraction_scenario.name}')
          print(f'Architecture: {rec.architecture}')
          print(f'Rationale:  {rec.rationale}')
          print(f'Reference:  {rec.chapter_reference}')
          print(f'Extension:  {rec.extension_notes}')

common_mistakes:

  - id: 1
    description: 'Applying the Chapter 8 offline auditing architecture to inference-time extraction threats'
    why_it_happens: |
      Chapter 8 trained readers to think in batch jobs and CI/CD gates. After building
      a well-functioning auditing pipeline, it is natural to reach for the same
      architecture when a new threat appears. Extraction looks like a data exfiltration
      problem -- and data exfiltration is often addressed by audit logs and batch analysis.
    consequence: |
      Batch auditors run too late to prevent extraction in progress. By the time a
      nightly audit flags anomalous query patterns, the adversary has completed the
      extraction campaign and the surrogate is already training. The defender discovers
      the theft after it has happened, with no opportunity to intervene.
    correct_approach: |
      Inference-time threats require real-time gateway detection. Use the Chapter 6/7
      gateway pattern extended with query monitoring (Section 9.11). Batch audit logs
      are valuable for post-hoc forensics and incident reconstruction (Section 9.9),
      not for real-time extraction prevention.

  - id: 2
    description: 'Treating individual extraction queries as the detection unit'
    why_it_happens: |
      Injection and jailbreak detection (Chapters 6 and 7) operated on single requests.
      Readers carry that habit into Chapter 9 and build classifiers that evaluate each
      query in isolation for extraction intent. A single boundary-probing query looks
      benign in isolation -- the classifier always returns false.
    consequence: |
      The detector has zero detection power. Every extraction query that is not
      obviously malformed passes the single-request classifier. The adversary issues
      ten thousand individually-benign queries and extracts the model undetected.
    correct_approach: |
      The detection unit for extraction is the query sequence, not the query. Build
      per-user state that accumulates query distribution statistics across requests.
      Detection fires when the distribution crosses an anomaly threshold, not when
      any individual query crosses a content threshold. See Section 9.11.

  - id: 3
    description: 'Treating rate limits as operational controls rather than security controls'
    why_it_happens: |
      Rate limits are traditionally set by engineering or product teams to protect
      infrastructure from overload. The limit reflects throughput capacity, not
      extraction threat modelling. Security teams inherit the limit without
      questioning its security properties.
    consequence: |
      A throughput-based rate limit may be set high enough to permit a complete
      extraction campaign within one billing period. An adversary who stays below
      the throughput limit while systematically probing decision boundaries extracts
      the model within the rate limit''s budget.
    correct_approach: |
      Rate limits against extraction must be extraction-aware: they enforce query
      budget constraints against systematic boundary probing, not just peak
      throughput. Section 9.11 builds an adaptive rate limiter with extraction-aware
      policy dimensions including OOD query rate, per-user cumulative extraction
      signal, and cross-user collusion scoring.

  - id: 4
    description: 'Returning soft-label probability vectors when hard labels suffice'
    why_it_happens: |
      API designers default to returning full model output distributions because they
      are more informative and provide better user experience in legitimate use cases.
      Confidence scores and probability vectors are seen as a feature, not a risk.
    consequence: |
      Grey-box access reduces the adversary''s query budget by 5 to 50x compared
      to hard-label-only APIs. An extraction that would require 100,000 queries
      against a hard-label API completes in 2,000 to 20,000 queries against a
      soft-label API. The API has granted the adversary a substantial budget discount
      without any business requirement to do so.
    correct_approach: |
      Audit every output field in the API response. Return probability distributions
      only when the use case genuinely requires them. For classification APIs where
      the product only needs a decision, return the hard label. See Section 9.12
      for output perturbation as a further defence when soft labels cannot be removed.

  - id: 5
    description: 'Assuming watermarking prevents extraction rather than providing post-hoc evidence'
    why_it_happens: |
      Output watermarking (Section 9.12) sounds like it prevents the theft: if the
      output is marked, the adversary cannot use it without revealing the mark.
      Readers conflate the detection function (watermark proves ownership) with the
      prevention function (watermark blocks extraction).
    consequence: |
      Deploying watermarking as the sole extraction control provides no real-time
      prevention. The adversary extracts the model successfully; the watermark
      transfers to the surrogate but does not stop the extraction. The defender has
      ownership evidence but the model has already been stolen.
    correct_approach: |
      Watermarking is a post-hoc ownership and attribution control, not a prevention
      control. It is complementary to, not a replacement for, input-side query
      monitoring and rate limiting (Section 9.11). Combine both surfaces: prevent
      where possible with query monitoring and adaptive rate limiting; detect
      post-hoc with watermarking when prevention fails.

section_summary:
  compact: |
    Chapter 9 returns to inference-time gateway detection after Chapter 8''s
    training-time auditing pipeline. The threat actor is now an API consumer with
    a query budget rather than a pipeline contributor with training access. The
    attack surface is the deployed model''s inference API; the attack goal is
    reconstructing what the model knows or how it behaves without the cost of
    training from scratch. Detection requires stateful per-user query pattern
    analysis -- not single-request intent classification -- because individual
    extraction queries are indistinguishable from benign queries. The detection
    architecture extends the Chapter 6/7 real-time gateway with a sixth parallel
    track (query monitoring) and a new output-side stage (watermarking and
    perturbation). The chapter closes OWASP LLM10 (Model Theft) and maps to
    three ATLAS sub-techniques: AML.T0040 (inference API access), AML.T0044
    (full model access), and AML.T0024 (exfiltration via inference API).

  key_takeaways:
    - 'The threat actor has changed from pipeline contributor to API consumer; the detection architecture must change with it'
    - 'Query budget is the primary economic constraint -- defend by increasing required budget, not by trying to block existence of the attack'
    - 'Extraction detection is statistical and cross-request; it cannot be reduced to single-request intent classification'
    - 'Grey-box APIs give adversaries a 5-50x query budget discount; output design is a security decision'
    - 'Watermarking provides post-hoc evidence of extraction; it does not prevent extraction in progress'
    - 'OWASP LLM10 closes with Chapter 9 via two defensive surfaces: input-side query monitoring and output-side watermarking and perturbation'

preview_section_02:
  title: 'Section 9.2: Extraction Taxonomy -- Functionality, Fidelity, Decision-Boundary, Prompt Extraction'
  preview: |
    Section 9.1 established the threat model and adversary access ladder. Section
    9.2 builds the taxonomy that organises the rest of the chapter''s attack
    sections. Four extraction goals -- functionality, fidelity, decision-boundary,
    and prompt extraction -- each have distinct adversary objectives, query budget
    requirements, and detection signals. The taxonomy is the filing system: every
    attack in Sections 9.3 through 9.9 maps to one or more of the four goal
    quadrants, and every detection primitive in Section 9.10 covers one or more
    quadrants. Understanding the taxonomy before the attack sections means the
    detection architecture design in Sections 9.11 and 9.12 will make immediate
    sense: each primitive exists because a specific goal quadrant required it.

