    - 'Describe the inference-time threat model: fixed model, real-time per-request analysis, sub-100ms latency budget'
    - 'Contrast the Chapter 8 offline auditing pipeline with the Chapter 6/7 real-time gateway architecture across eight dimensions'
    - 'Identify the three adversary access levels (black-box, grey-box, white-box) and their query budget implications'
    - 'State the OWASP LLM10 scope and the three ATLAS sub-techniques covered in Chapter 9'
    - 'Explain why extraction defences are query-pattern-based rather than single-request-intent-based'

  skills:
    - 'Classify a given threat scenario into training-time or inference-time extraction based on adversary access'
    - 'Map an extraction threat to the correct ATLAS sub-technique (AML.T0040, AML.T0044, AML.T0024)'
    - 'Evaluate an API deployment against the OWASP LLM10 Model Theft framework'
    - 'Estimate query budget implications for each adversary access level'
    - 'Identify which detection architecture (gateway vs auditing pipeline) applies to a given threat'

  security_mindset:
    - 'Internalise that query budget -- not the existence of the attack -- is the primary constraint on extraction economics'
    - 'Recognise that inference-time extraction requires stateful cross-request analysis, not single-request intent classification'
    - 'Understand that blast radius differs fundamentally: an extracted model can be deployed at scale, unlike a single-conversation injection'
    - 'Appreciate why OWASP LLM10 closes with Chapter 9: the inference API surface was not fully mapped until Chapters 6 and 7 established the gateway pattern'

