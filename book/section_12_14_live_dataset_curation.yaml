prose_content:

  part_1:
    title: 'The Continuous Learning Problem'
    body: |
      A detection classifier learns the boundary between attack and benign from its training data.
      That boundary is correct for the distribution the training data was drawn from. As the
      distribution shifts -- adversaries adapt their techniques, new attack families emerge,
      legitimate usage patterns change -- the boundary that was correct becomes increasingly wrong,
      and the classifier's accuracy decays.

      The decay is not hypothetical. Adversaries actively probe the detection system, observe which
      payloads are blocked, and iterate toward payloads that evade. A classifier that catches 92%
      of injections in month one may catch 78% in month four against the adapted attack distribution,
      with no change to the classifier itself -- the world changed around it. The decay rate depends
      on how quickly adversaries adapt, which depends on how valuable the target is and how
      determined the adversaries are.

      The continuous learning solution is to retrain the classifier on fresh data that reflects the
      current distribution. This requires a continuous supply of fresh labelled data, which is
      exactly what manual dataset construction does not provide. The Section 12.04 dataset was built
      once; it captures the attack distribution at the time of construction. Retraining on it
      reproduces the same classifier. The fresh data must come from somewhere, and the best source
      is the production traffic the classifier is already processing.

      The production system has a structural advantage as a data source: it sees the actual attacks
      that actual adversaries are sending right now. A red team exercise produces attacks that the
      red team imagined; a public corpus produces attacks that were documented in the past;
      production traffic produces the attacks that are happening today. The live curation pipeline
      harvests this advantage by turning the production traffic into labelled training data,
      continuously, so that retraining always has fresh data reflecting the current distribution.

  part_2:
    title: 'Uncertainty Sampling: Labelling the Examples That Matter'
    body: |
      Labelling production traffic is constrained by analyst capacity. At 10,000 requests per day
      and 50 analyst reviews per day, only 0.5% of traffic can be labelled. The question is which
      0.5%. Labelling random samples is the naive approach and it is wasteful: most requests are
      clearly benign, and an analyst confirming that a clearly benign request is benign adds almost
      no information to the decision boundary, because the model already classified it correctly
      with high confidence.

      Uncertainty sampling is the active learning strategy that focuses the annotation capacity on
      the examples that improve the model most. The principle is that the model learns most from
      the examples it is least sure about. A request the model scores at 0.5 -- exactly at the
      decision boundary -- is one the model cannot classify confidently. An analyst label on that
      request resolves the ambiguity and refines the boundary. A request the model scores at 0.02
      or 0.98 is one the model is already confident about; an analyst label mostly confirms the
      existing classification and adds little.

      The uncertainty_sampler.py in deliverable_2 implements the prioritisation. The standard
      uncertainty measure for binary classification is the distance from the decision boundary:
      requests with calibrated scores between 0.4 and 0.6 are the most uncertain and get the highest
      annotation priority. Requests with scores below 0.2 or above 0.8 are confident and get low
      priority. The annotation queue is ordered by uncertainty, so the analyst always reviews the
      most informative examples first.

      Uncertainty sampling interacts with the calibration from Section 12.10. The uncertainty
      measure depends on the score being a calibrated probability -- a score of 0.5 means genuine
      uncertainty only if the classifier is calibrated. An uncalibrated classifier whose scores
      cluster near 0.5 for confident predictions would route confident examples to the queue
      incorrectly. Calibration is therefore a prerequisite for effective uncertainty sampling, which
      is one more reason the Section 12.10 calibration is a foundational step.

  part_3:
    title: 'Collecting True Positives and False Positives'
    body: |
      Uncertainty sampling collects the boundary cases. The curation pipeline also collects two
      other categories of labelled data that come from the normal operation of the detection system:
      confirmed true positives and corrected false positives.

      True positive collection routes high-confidence detections to the annotation queue for
      confirmation. When a detector flags a request as an attack with high confidence, the request
      is queued for an analyst to confirm. Confirmed true positives are valuable training data:
      they are real attacks against the real system, the highest-fidelity positive examples. They
      also serve a verification function -- if the analyst frequently disconfirms high-confidence
      detections, the classifier has a precision problem that the curation surfaces.

      False positive collection is the complement. When an analyst reviews a flagged request and
      determines it was a false positive -- the detector flagged a legitimate request as an attack
      -- the corrected label (benign, not attack) is routed back into the training set. These
      corrected false positives are particularly valuable because they target the classifier's
      specific errors: the legitimate requests the classifier mistakes for attacks. Retraining with
      the corrected false positives teaches the classifier to stop making those specific mistakes,
      directly reducing the false positive rate.

      The three collection streams -- uncertainty samples, confirmed true positives, corrected false
      positives -- feed the same annotation queue and the same growing labelled dataset, but they
      serve different purposes. Uncertainty samples refine the boundary in the uncertain region.
      Confirmed true positives add high-fidelity attack examples. Corrected false positives reduce
      the specific false positive errors. Together they grow a dataset that improves the classifier
      on all three fronts: boundary precision, attack coverage, and false positive reduction. The
      dataset_curator.py in deliverable_1 routes all three streams to the annotation queue with the
      appropriate priority.

  part_4:
    title: 'The Composite Retraining Trigger'
    body: |
      Retraining is not free: it consumes engineering and compute resources, and each retraining is
      a deployment that carries regression risk even with the registry gates. Retraining too often
      wastes resources and increases the regression risk; retraining too rarely lets the classifier
      decay. The retraining trigger decides when the accumulated benefit of retraining justifies the
      cost.

      A trigger based on data quantity alone -- retrain after N new labelled examples -- is
      insufficient because it ignores whether the distribution has actually shifted. Accumulating
      500 new labelled examples that all match the existing distribution does not warrant retraining;
      the existing classifier already handles that distribution. A trigger based on drift signal
      alone -- retrain when the feature distribution shifts -- is insufficient because drift may be
      detected before enough new labelled data has accumulated to retrain effectively; retraining on
      a handful of new examples reflecting the shift produces an unreliable model.

      The composite retraining trigger combines both signals: retrain when enough new labelled data
      has accumulated AND the distribution has shifted. The data quantity condition ensures there is
      enough fresh data to retrain reliably. The drift condition ensures the retraining addresses an
      actual distribution change rather than reproducing the existing model on more of the same data.
      Both conditions must hold for the trigger to fire.

      The drift signal comes from two monitors built earlier in Chapter 12. The feature distribution
      monitor (Section 12.02) detects when the feature distributions of production traffic diverge
      from the training distribution, using statistical tests like the Kolmogorov-Smirnov test on each
      feature. The threshold drift monitor (Section 12.10) detects when the realised false positive
      rate and recall at the deployed threshold deviate from the calibration targets. Either monitor
      firing, combined with sufficient accumulated labelled data, triggers retraining. The
      retraining_trigger.py in deliverable_4 implements the composite logic and connects to the
      Section 12.13 registry to initiate the retraining and deployment cycle.

  part_5:
    title: 'The Active Learning Loop and Data Flywheel'
    body: |
      The full active learning loop connects every operational component built in Chapter 12 into a
      self-improving cycle. Live production traffic is scored by the deployed detectors. The curation
      pipeline routes uncertain predictions, confirmed true positives, and corrected false positives
      to the annotation queue, prioritised by uncertainty. Analysts label the queued examples,
      growing the labelled dataset. The composite trigger fires when enough new labels have
      accumulated and drift is detected. The dataset builder (Section 12.04) constructs a fresh
      temporal split. The classifier is retrained, calibrated (Section 12.10), and registered
      (Section 12.13). The retrained model passes the stage gates, validates through shadow mode and
      canary, and promotes to production. The improved model scores the next batch of traffic, and
      the loop continues.

      This loop is the data flywheel. Each rotation improves the detection system: the retrained
      model is more accurate on the current distribution, which means its uncertain region is more
      informative, which means the next batch of uncertainty samples is more valuable, which means
      the next retraining improves the model further. The flywheel accelerates as it turns, provided
      the annotation throughput keeps pace with the attack distribution shift rate.

      The data flywheel economics favour the production system over manual red teaming. A red team
      exercise produces a fixed number of attack examples at a fixed cost, reflecting the red team's
      imagination of the attack space. The production flywheel produces a continuous stream of real
      attack examples at the marginal cost of analyst annotation, reflecting the actual attack space
      adversaries are exploring. Over time, the production flywheel produces more and better training
      data than red teaming, which is why the mature detection system relies on the flywheel for the
      bulk of its training data and uses red teaming to supplement coverage of attack families that
      production traffic has not yet surfaced.

      The data_flywheel_monitor.py in deliverable_5 tracks the flywheel health: the annotation
      throughput (labels per day), the label distribution (the balance of attack and benign labels,
      and the coverage across attack families), and the retraining cadence (how often the trigger
      fires and how long each cycle takes). A healthy flywheel has annotation throughput that keeps
      pace with the drift rate; a stalling flywheel -- annotation throughput dropping, retraining
      cadence lengthening -- is an early warning that the detection system is falling behind the
      attack distribution shift.

  part_6:
    title: 'Privacy in Live Data Collection'
    body: |
      Live production traffic contains real user data. The requests routed to the annotation queue
      are real requests from real users, which may contain personal information, confidential
      content, or sensitive context. Before these requests reach the annotation queue where analysts
      review them, the curation pipeline must anonymise them to protect user privacy.

      The anonymisation reuses the PII scanner from Section 12.09. Before a request is stored in the
      annotation queue, it passes through the PII scanner, which detects and redacts the personal
      information: email addresses, phone numbers, names, and other PII are replaced with
      type-preserving placeholders. The analyst reviewing the annotation sees the structure of the
      request -- enough to classify it as attack or benign -- without seeing the real personal
      information it contained.

      The anonymisation must preserve the attack signal while removing the PII. A prompt injection
      that contains a real email address as part of its payload should be anonymised to remove the
      email while preserving the injection structure, so the analyst can still recognise it as an
      injection. The PII scanner's type-preserving placeholders achieve this: the email is replaced
      with [EMAIL], which removes the personal information but preserves the syntactic position that
      indicates the injection structure.

      The privacy considerations extend beyond anonymisation to retention and access. The annotation
      queue stores requests for the duration of the annotation workflow; after a request is labelled
      and added to the training set, the anonymised version is retained for retraining and the
      original is subject to the deployment's data retention policy. Access to the annotation queue
      is restricted to the analysts who need it for labelling. These controls are part of the data
      handling requirements that the curation pipeline must satisfy, documented alongside the pipeline
      configuration. The curation pipeline that ignores privacy is not deployable in any context with
      real user data, which is every production context.

