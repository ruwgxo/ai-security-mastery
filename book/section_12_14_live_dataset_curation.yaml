section_overview:
  one_line_summary: 'Live dataset curation is the operational commitment that the detectors will not decay: the production system continuously collects the labelled data that keeps the classifiers current as adversaries adapt, closing the active learning loop.'
  why_this_section_exists: |
    A classifier trained on a fixed dataset is a point-in-time snapshot. The Random Forest
    trained in month one on the attack distribution of month one degrades as adversaries adapt
    their techniques over months two through six. The threshold monitor (Section 12.10) detects
    the drift, and the model registry (Section 12.13) can deploy a retrained model safely -- but
    a retrained model is only as good as the data it is retrained on. If the retraining uses the
    same stale dataset, it produces the same stale model. The missing piece is the continuous
    collection of fresh labelled data from production traffic.

    Section 12.14 builds the live dataset curation that closes the loop. The production system is
    the best data collection tool available: live traffic captures the actual attack distribution
    that adversaries are using today, not the historical distribution from a public corpus or a
    red team exercise conducted last quarter. Every production request is a potential training
    example. The curation pipeline routes confirmed true positives, analyst-corrected false
    positives, and -- most importantly -- the uncertain predictions near the decision boundary
    into the annotation queue, where they become labelled training data for the next retraining
    cycle.

    The efficiency of the curation comes from active learning. Labelling every production request
    is impossible at scale and wasteful: most requests are clearly benign and add no information
    to the decision boundary. Uncertainty sampling prioritises the requests the model is least
    sure about -- the ones near the decision boundary where an analyst label adds the most
    information. This focuses the scarce annotation capacity on the examples that improve the
    model most per label.

    Section 12.14 connects all the operational infrastructure into the self-improving flywheel:
    live traffic feeds the annotation queue, analyst labels grow the dataset, accumulated labels
    plus drift signal trigger retraining, the retrained model passes the registry gates and
    promotes through shadow and canary, and the improved model collects the next batch of data.
  position_in_chapter: |
    Section 12.14 is the fifth and final operational infrastructure section. It connects the
    anomaly-to-label pipeline from Section 12.03, the dataset curation from Section 12.04, the
    drift monitors from Sections 12.02 and 12.10, and the model registry from Section 12.13 into
    the continuous retraining loop. It is the section that makes the Chapter 12 detection system
    a living system rather than a static deployment, and it connects Chapter 12 to the production
    monitoring of Chapter 17.

