    boundary_maps_enable_evasion: 'The decision-boundary maps from Section 9.3 are the direct input to FGSM and PGD. Chapter 9 extraction and Chapter 10 evasion share attack infrastructure -- defending one partially defends both.'
    surrogates_are_transfer_vehicles: 'Distillation surrogates from Section 9.4 transfer adversarial examples to the victim at 20-80% rates. Chapter 9''s output is Chapter 10''s attack primitive.'
    discrete_vs_continuous: 'Image adversarial attacks operate in continuous pixel space with gradient methods. LLM adversarial attacks operate in discrete token space -- a fundamentally different search problem requiring combinatorial optimisation.'
    physical_extends_the_surface: 'Physical adversarial examples move the threat outside the API entirely. Stop signs, faces, and 3D objects can carry adversarial perturbations that cause misclassification by deployed vision models.'
    no_complete_defence: 'No adversarial defence achieves full robustness at production accuracy on complex datasets. Adversarial training improves empirical robustness; certified robustness provides formal bounds at the cost of accuracy. Defenders must explicitly document the robustness-accuracy tradeoff for each deployment.'
    detection_is_complementary: 'Adversarial training and certified robustness make the model harder to fool. Input preprocessing and consistency checking detect adversarial examples before they reach the model. The correct architecture uses both -- defence-in-depth at the upstream training surface and the runtime detection surface.'
    chapter_10_closes_part_2: 'Chapters 5-10 cover the full AI security threat landscape: threat modelling, prompt injection, jailbreaks, training-time poisoning, extraction, and evasion. Part 3 builds the detection systems that defend against all six.'

