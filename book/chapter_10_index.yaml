chapter_overview:
  number: 10
  title: 'Adversarial Machine Learning'
  part: 'Part 2: AI Security Landscape'
  position: 'Chapter 10 of 6 in Part 2; final chapter of Part 2'

  purpose: |
    Chapter 9 closed OWASP LLM10 by detecting and watermarking extraction
    campaigns. Chapter 10 takes the output of those campaigns and weaponises it:
    the decision-boundary maps produced by Section 9.3 boundary extraction are the
    direct input to adversarial example generation; the surrogate models produced
    by Section 9.4 distillation are the transfer vehicles that carry adversarial
    examples from surrogate to victim. Chapter 10 is the mechanistic continuation
    of Chapter 9 at the attack surface level.

    The threat model shifts from "adversary reconstructs model behaviour" to
    "adversary forces the model to misclassify a specific input." Adversarial
    examples are inputs that have been deliberately perturbed -- often by amounts
    imperceptible to a human -- to cause a classifier to produce an attacker-chosen
    wrong output. In security-critical deployments (malware classifiers, fraud
    detectors, content moderators, safety filters), a successful adversarial example
    bypasses the control entirely.

    The attack taxonomy has three access tiers that mirror Chapter 9''s adversary
    access ladder. White-box attacks (FGSM, PGD, C&W) require gradient access and
    produce the strongest adversarial examples with the fewest queries. Black-box
    attacks (boundary attack, natural evolution strategies) work against hard-label
    or soft-label APIs with no gradient access -- exactly the conditions Chapter 9
    established for extraction. Transfer attacks exploit the surrogate models that
    Chapter 9''s distillation pipeline produces: adversarial examples crafted against
    a surrogate transfer to the victim at significant rates, turning Chapter 9''s
    extraction output into Chapter 10''s attack input.

    Physical adversarial examples extend the threat beyond API access: printed
    patches, modified stop signs, and adversarially coloured objects cause
    misclassification in real-world vision systems. LLM adversarial attacks
    translate the continuous-space perturbation concept to discrete text: token
    substitution, character-level perturbation, and semantic-preserving rewrites
    that fool LLM-based classifiers -- content moderators, safety filters, intent
    classifiers.

    The defence architecture adds Track 7 to the seven-track gateway: adversarial
    example detection through input preprocessing (feature squeezing, spatial
    smoothing, bit-depth reduction), classifier consistency checking (the model
    should not flip its prediction under small input perturbation), and an adversarial
    detector classifier trained on adversarial and benign examples. Adversarial
    training closes the upstream surface: models trained on adversarial examples
    develop empirical robustness. Certified robustness via randomised smoothing
    provides formal per-input guarantees -- the only defence with a provable bound
    analogous to differential privacy''s role in Chapter 8.

    Chapter 10 closes Part 2 of the book. Together, Chapters 5 through 10 cover
    the full AI security threat landscape: threat modelling (Chapter 5), prompt
    injection (Chapter 6), jailbreaks (Chapter 7), training-time poisoning
    (Chapter 8), inference-time extraction (Chapter 9), and inference-time evasion
    (Chapter 10). Part 3 (Detection Engineering) and Part 4 (Practical
    Implementation) build on this foundation to produce the complete production
    security system.

