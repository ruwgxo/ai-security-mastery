sections:

  - section_number: 1
    title: 'Evasion Threat Model: From Chapter 9 Boundary Mapping to Adversarial Examples'
    filename: 'section_10_01_evasion_threat_model.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1001 Evasion Threat Model) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Threat model shift: from extraction (what the model knows) to evasion (what the model decides)'
      - 'The mechanistic Ch9 to Ch10 bridge: boundary maps as FGSM/PGD inputs; surrogates as transfer vehicles'
      - 'Adversary goal taxonomy: targeted misclassification vs untargeted misclassification'
      - 'Adversary access ladder in adversarial ML: white-box (gradients), grey-box (probabilities), black-box (hard labels)'
      - 'Query budget in evasion: how many queries does a black-box attack require vs white-box'
      - 'Perturbation constraints: Lp norm balls (L0, L2, Linf) as formal attack budgets'
      - 'Security-critical classifier threat model: content moderation, malware detection, fraud scoring, safety filters'
      - 'ATLAS taxonomy anchors: AML.T0043 (Craft Adversarial Data), AML.T0015 (Evade ML Model)'
      - 'Why evasion defences differ from extraction defences: single-input optimisation vs query distribution analysis'
      - 'Detection architecture shift: Track 7 adds input-side preprocessing before inference, not query pattern tracking'

    key_concepts:
      - 'Evasion attacks target a specific input; extraction attacks target the model''s full decision surface'
      - 'The Lp norm constraint formalises "imperceptible perturbation" -- L-infinity is most common for images'
      - 'White-box attacks have full gradient access; black-box attacks use the same hard-label or soft-label APIs as extraction'
      - 'Track 7 is fundamentally different from Track 6: preprocessing transforms the input before scoring, not after'

    deliverables:
      - 'Threat model contrast reference: extraction (Chapter 9) vs evasion (Chapter 10) across 8 dimensions'
      - 'Adversary access ladder with evasion query budget implications per access level'
      - 'Lp norm constraint visualiser: L0, L2, and L-infinity balls in 2D input space'
      - 'ATLAS technique mapping: AML.T0043 and AML.T0015 with Chapter 10 section references'
      - 'Detection architecture comparison: Track 6 (query pattern, post-request) vs Track 7 (preprocessing, pre-inference)'

    security_preview: |
      Section 10.1 resets the threat model the same way Section 9.1 reset it after
      Chapter 8. The adversary no longer wants to reconstruct the model -- they want
      to fool it on a specific input. That shift changes everything: the detection
      primitive, the defence architecture, and the formal guarantee structure. Section
      10.1 establishes the evasion threat model so every attack and defence section
      builds the right architecture.

  - section_number: 2
    title: 'Adversarial Example Taxonomy: Goals, Constraints, and Detection Signals'
    filename: 'section_10_02_adversarial_taxonomy.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1002 Adversarial Taxonomy) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Attack goal taxonomy: targeted (force a specific wrong class) vs untargeted (force any wrong class)'
      - 'Perturbation constraint taxonomy: L0 (sparse), L2 (Euclidean), L-infinity (max pixel change)'
      - 'Access tier taxonomy: white-box (gradient), grey-box (probability), black-box (hard label), physical (real world)'
      - 'Input modality taxonomy: image, text (discrete), tabular, audio, multimodal'
      - 'Budget-fidelity tradeoffs: how perturbation epsilon trades against attack success rate'
      - 'Detectability of adversarial examples: which attack types produce detectable distribution shifts'
      - 'Goal-to-detection-signal mapping: which Track 7 primitive covers which adversarial attack goal'
      - 'Connection to Section 9.2 extraction taxonomy: shared structure, different signals'
      - 'Defender decision tree: classifying an observed evasion attempt into the taxonomy'

    key_concepts:
      - 'Targeted attacks are harder for the adversary but more dangerous for the defender -- they force a specific wrong decision'
      - 'L-infinity attacks are most common for images because they produce near-imperceptible uniform perturbation'
      - 'Text is discrete: L-norm constraints do not directly apply; token edit distance and semantic similarity are the text analogues'
      - 'Black-box attacks in Chapter 10 require more queries than white-box attacks but work in the same API conditions as Chapter 9 extraction'

    deliverables:
      - 'Adversarial taxonomy matrix: 4 goals x 3 access tiers x 4 input modalities with canonical technique per cell'
      - 'Budget-success tradeoff curves: attack success rate vs epsilon for L2 and L-infinity constraints'
      - 'Goal-to-detection-signal mapper: which Track 7 primitive covers which attack class'
      - 'ATLAS sub-technique cross-reference for all adversarial attack classes'
      - 'Defender decision tree: classifying an evasion attempt from observable signals'

    security_preview: |
      Section 10.2 is the scaffold for all attack sections (10.3-10.9). Each attack
      occupies one or more cells in the taxonomy matrix. Each Track 7 detection
      primitive covers one or more cells. The decision tree built here is the
      operational reference that Section 10.13''s gateway uses to route alerts.

  - section_number: 3
    title: 'FGSM: Fast Gradient Sign Method'
    filename: 'section_10_03_fgsm_attack.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1003 FGSM) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'FGSM derivation: Goodfellow et al. 2014 -- the foundational white-box adversarial attack'
      - 'Algorithm: x_adv = x + epsilon * sign(nabla_x J(theta, x, y))'
      - 'Single-step gradient computation: why FGSM is fast but suboptimal'
      - 'Epsilon sweep: how perturbation budget trades against attack success rate and perceptibility'
      - 'Targeted vs untargeted FGSM: reversing the gradient sign for targeted misclassification'
      - 'FGSM against linear classifiers: provably optimal for linear models'
      - 'FGSM against neural networks: effective but weaker than iterative methods'
      - 'Transferability from FGSM: single-step adversarial examples transfer at moderate rates'
      - 'FGSM as data augmentation: the connection to adversarial training (Section 10.15)'
      - 'Detection signals: FGSM perturbations are detectable by feature squeezing (Section 10.11)'

    key_concepts:
      - 'FGSM perturbs each input feature by epsilon in the direction that maximally increases the loss'
      - 'The gradient sign operation produces an L-infinity bounded perturbation -- each feature moves by exactly epsilon'
      - 'FGSM is the fastest gradient-based attack but the easiest to defend against -- it is the baseline adversary'
      - 'FGSM adversarial examples are useful for adversarial training but weak against adaptive adversaries'

    deliverables:
      - 'fgsm_attack.py -- FGSM implementation against any PyTorch classifier with configurable epsilon and target class'
      - 'epsilon_sweep_benchmark.py -- attack success rate and perceptibility vs epsilon across three classifiers'
      - 'fgsm_targeted_variant.py -- targeted FGSM implementation with class-specific gradient reversal'
      - 'fgsm_transferability_test.py -- measuring FGSM transfer rate from a surrogate to a victim model'
      - 'fgsm_detection_signal_analyser.py -- measuring input distribution shift produced by FGSM perturbations'

    security_preview: |
      FGSM establishes the gradient-sign primitive that PGD and C&W extend. The single-
      step attack is too weak for adaptive adversaries but essential for three purposes:
      adversarial training data generation (Section 10.15), baseline attack strength
      measurement against defences (Sections 10.11-10.14), and understanding the
      mathematical structure that all gradient-based attacks share.

  - section_number: 4
    title: 'PGD: Projected Gradient Descent'
    filename: 'section_10_04_pgd_attack.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1004 PGD) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'PGD derivation: Madry et al. 2018 -- the strongest first-order adversary'
      - 'Algorithm: iterative FGSM with projection back onto the Lp norm ball after each step'
      - 'Projection operator: how the L-infinity ball projection produces clipped perturbations'
      - 'Step size and iteration count: the fundamental attack hyperparameters'
      - 'Random start: initialising from a random point in the norm ball to escape local optima'
      - 'PGD as a universal first-order attack: why PGD is the standard evaluation adversary'
      - 'PGD against defences: certifying robustness against PGD as the empirical robustness standard'
      - 'PGD variants: L2-PGD, L0-PGD, and momentum-based PGD'
      - 'PGD for adversarial training: the min-max formulation of robust optimisation'
      - 'Computational cost: PGD requires N model forward and backward passes -- latency implications'

    key_concepts:
      - 'PGD is FGSM iterated with projection: each step maximises the loss within a small alpha step, then projects back to the epsilon ball'
      - 'More iterations produce stronger attacks up to convergence; random restart further increases attack strength'
      - 'PGD is the canonical empirical robustness evaluation adversary -- if a model is robust to PGD it is robust to all first-order attacks'
      - 'PGD adversarial training is the strongest empirical defence but trades accuracy for robustness'

    deliverables:
      - 'pgd_attack.py -- PGD implementation with configurable step size, iterations, and random restart'
      - 'pgd_l2_variant.py -- L2-PGD implementation with projection onto the L2 ball'
      - 'pgd_vs_fgsm_comparison.py -- attack success rate and perturbation quality comparison at matched epsilon'
      - 'pgd_robustness_evaluator.py -- measuring a classifier''s PGD robustness across epsilon values'
      - 'pgd_training_data_generator.py -- generating PGD adversarial examples for adversarial training'

    security_preview: |
      PGD is the section with the most production consequence: the PGD-trained adversary
      is the standard against which defences are measured. Section 10.15 adversarial
      training uses PGD adversarial examples. Section 10.14 certified robustness is
      evaluated against PGD. Understanding PGD precisely -- not just as "iterative FGSM"
      but as the solution to the inner maximisation problem of robust optimisation -- is
      what makes the rest of the chapter''s defence sections defensible.

  - section_number: 5
    title: 'C&W: The Carlini-Wagner Attack'
    filename: 'section_10_05_cw_attack.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1005 CW Attack) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'C&W derivation: Carlini and Wagner 2017 -- optimality-focused adversarial attack'
      - 'Formulation: minimise ||delta||_2 subject to f(x + delta) = t, reformulated as unconstrained optimisation'
      - 'The change of variables trick: mapping box constraints to unconstrained tanh space'
      - 'Confidence parameter kappa: controlling how strongly wrong the adversarial classification must be'
      - 'Binary search on the regularisation constant c: balancing perturbation size vs attack confidence'
      - 'L0, L2, and L-infinity C&W variants and when each applies'
      - 'C&W vs PGD: when to use which attack for evaluation'
      - 'C&W as a defence-breaking attack: Carlini and Wagner''s original goal was breaking proposed defences'
      - 'Computational cost: C&W is expensive -- hundreds of Adam optimisation steps per adversarial example'
      - 'C&W transferability: minimal-perturbation adversarial examples and their transfer rates'

    key_concepts:
      - 'C&W minimises perturbation size directly, unlike FGSM and PGD which fix epsilon; C&W produces the minimum-norm adversarial example'
      - 'The confidence parameter kappa controls the margin between the adversarial class score and all others -- higher kappa produces more transferable examples'
      - 'C&W broke many proposed defences in 2017 by treating them as adaptive adversaries; it is the attack for evaluating claimed defences'
      - 'C&W is computationally too expensive for real-time adversarial training but is the gold standard for attack quality benchmarking'

    deliverables:
      - 'cw_attack.py -- C&W L2 attack with binary search, kappa parameter, and Adam optimiser'
      - 'cw_l0_variant.py -- L0 C&W for sparse adversarial perturbations'
      - 'cw_vs_pgd_quality_benchmark.py -- minimum perturbation norm comparison on matched attack success rate'
      - 'defence_evaluator_cw.py -- using C&W as an adaptive adversary to stress-test proposed defences'
      - 'cw_confidence_sweep.py -- measuring kappa''s effect on perturbation size and transfer rate'

    security_preview: |
      C&W is the attack for defence evaluation. Any security team claiming adversarial
      robustness should be testing against C&W with adaptive knowledge of their defence.
      Section 10.5 builds the tool; Sections 10.11 through 10.15 test every defence
      against it. The honest acknowledgement that no defence defeats C&W with full
      accuracy is the Chapter 10 equivalent of Chapter 9''s 30-40% benchmark distillation
      detection gap.

  - section_number: 6
    title: 'Black-Box Adversarial Attacks: Boundary Attack and Natural Evolution Strategies'
    filename: 'section_10_06_blackbox_attacks.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1006 Black-Box Attacks) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Black-box adversarial attacks: operating under hard-label or soft-label API access -- the Chapter 9 API conditions'
      - 'Boundary attack: Brendel et al. 2018 -- random walk along the decision boundary from a misclassified starting point'
      - 'Boundary attack algorithm: initialise from misclassified image, iteratively reduce L2 distance while remaining adversarial'
      - 'Hard-label attack: boundary attack works with only the predicted class, no probabilities required'
      - 'Natural Evolution Strategies (NES): gradient estimation from query pairs without backpropagation'
      - 'NES query efficiency: estimating gradient direction in O(n) queries per step for n-dimensional input'
      - 'Score-based vs decision-based attacks: the two families of black-box adversarial attacks'
      - 'Query budget for black-box evasion: how many queries are needed for what perturbation size'
      - 'Connection to Chapter 9 black-box extraction: same API conditions, different adversary goal'
      - 'Detection signals for black-box adversarial attacks: repeated similar queries with minor variations'

    key_concepts:
      - 'The boundary attack starts from a trivially adversarial point and walks toward the natural image while staying adversarial -- it requires no gradient'
      - 'NES estimates gradient direction without backpropagation by querying the model at pairs of points; it operates under soft-label (score-based) conditions'
      - 'Black-box attacks require 1,000 to 100,000 queries per adversarial example -- orders of magnitude more than white-box'
      - 'The same query monitor from Section 9.11 that detects extraction campaigns can partially detect systematic black-box adversarial probing'

    deliverables:
      - 'boundary_attack.py -- decision-based boundary attack with L2 distance minimisation'
      - 'nes_attack.py -- natural evolution strategies score-based attack with antithetic sampling'
      - 'blackbox_query_budget_analyser.py -- measuring queries per adversarial example across epsilon values'
      - 'blackbox_vs_whitebox_comparison.py -- attack success rate and perturbation quality at matched query budgets'
      - 'blackbox_detection_signal_analyser.py -- measuring the query pattern signals from boundary and NES attacks'

    security_preview: |
      Black-box adversarial attacks connect directly to the Chapter 9 threat model:
      same API access conditions, different goal. The query monitor''s boundary proximity
      signal (Section 9.10) detects both boundary extraction and boundary attack probing
      because both concentrate queries near the decision surface. Section 10.6 quantifies
      this overlap and establishes which Track 7 signals are new versus shared with Track 6.

  - section_number: 7
    title: 'Transferability: Surrogate-Based Cross-Model Adversarial Examples'
    filename: 'section_10_07_transferability.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1007 Transferability) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Transferability definition: adversarial examples crafted against one model fool a different model at significant rates'
      - 'Why transferability works: models trained on the same distribution learn similar decision boundaries'
      - 'Surrogate-to-victim transfer pipeline: Chapter 9 distillation output as Chapter 10 attack input'
      - 'Transfer rate measurement: what fraction of surrogate adversarial examples fool the victim'
      - 'Factors affecting transfer rate: model architecture match, training distribution match, perturbation norm'
      - 'Ensemble-based attacks: crafting adversarial examples against multiple surrogates to increase transfer'
      - 'Input diversity and translation invariance: augmenting adversarial examples to improve transfer'
      - 'Black-box transferability attacks: the dominant threat in production (no gradient access to victim)'
      - 'Transfer attack query cost: essentially zero additional queries to victim after surrogate adversarial example generation'
      - 'Defence implication: defences must be robust to examples crafted without knowledge of their specific architecture'

    key_concepts:
      - 'Transfer attacks exploit model similarity rather than querying the victim directly -- the cheapest black-box adversarial attack'
      - 'The Section 9.4 surrogate is the adversary''s transfer vehicle: they distill the victim, craft adversarial examples against the surrogate, and transfer to the victim'
      - 'Transfer rates depend on architecture and training distribution match: a well-matched surrogate achieves 40-80% transfer; a mismatched surrogate achieves 10-30%'
      - 'Ensemble attacks improve transfer by averaging gradients across multiple surrogates -- reducing overfitting to any single model''s boundary'

    deliverables:
      - 'transferability_analyser.py -- measuring transfer rate across model architecture pairs at matched epsilon'
      - 'surrogate_pipeline.py -- end-to-end: distill victim (Ch9), craft adversarial examples (Ch10), measure victim transfer rate'
      - 'ensemble_attack.py -- multi-surrogate adversarial example generation for improved transfer'
      - 'transfer_rate_heatmap.py -- transfer rate matrix across architecture combinations'
      - 'transfer_detection_signal_analyser.py -- can the victim''s query log detect that transfer examples are being submitted?'

    security_preview: |
      Section 10.7 is the mechanistic bridge that makes Chapter 9 and Chapter 10 a
      unified threat. An adversary who completes a Chapter 9 distillation campaign is
      immediately positioned to mount a Chapter 10 transfer attack against the victim --
      zero additional victim queries required. The surrogate is both the extraction
      product and the attack vehicle. Defending against extraction (Chapter 9) reduces
      transfer attack capacity; defending against adversarial examples (Chapter 10)
      reduces transfer attack impact.

  - section_number: 8
    title: 'Physical Adversarial Examples: Patches, Stop Signs, and 3D Objects'
    filename: 'section_10_08_physical_adversarial.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1008 Physical Adversarial) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Physical adversarial attacks: extending adversarial examples beyond API access to real-world sensors'
      - 'Adversarial patches: Brown et al. 2017 -- universal printable perturbations applied to any image'
      - 'Stop sign attacks: Eykholt et al. 2018 -- physical stickers causing misclassification by autonomous vehicle detectors'
      - '3D adversarial objects: Athalye et al. 2018 -- adversarial 3D-printed objects robust to viewing angle'
      - 'Expectation over transformation: making physical attacks robust to lighting, angle, and distance variation'
      - 'Universal vs input-specific patches: the trade-off between generality and effectiveness'
      - 'Physical attack threat model: security cameras, autonomous vehicles, facial recognition'
      - 'Robustness to physical conditions: digital vs physical adversarial examples and why the gap matters'
      - 'Detection approaches for physical attacks: patch localisation, anomaly detection in image regions'
      - 'ATLAS technique: AML.T0029 (Adversarial Patch)'

    key_concepts:
      - 'Physical attacks work because the perturbation is applied to the physical world before the sensor, not digitally after capture'
      - 'Adversarial patches are designed to be universal: one patch fools the classifier on any background image regardless of the unmodified image content'
      - 'Expectation over transformation (EOT) optimises the patch to be adversarial across a distribution of viewing conditions, not just at one angle and distance'
      - 'Physical adversarial attacks expand the threat beyond the API: an adversary who cannot query the model can still fool a deployed sensor'

    deliverables:
      - 'adversarial_patch.py -- universal adversarial patch generator with EOT for viewing angle robustness'
      - 'patch_applicator.py -- applying generated patches to test images at varied scales and positions'
      - 'physical_robustness_benchmark.py -- measuring patch attack success across lighting and angle variations'
      - 'patch_detector.py -- detecting anomalous image regions consistent with adversarial patch presence'
      - 'physical_threat_model.py -- structured threat model for physical adversarial attacks in deployed vision systems'

    security_preview: |
      Physical adversarial examples extend the threat beyond the API to any system that
      uses a camera or sensor as an input. Autonomous vehicle lane detection, facial
      recognition access control, and physical surveillance systems are all potential
      targets. Section 10.8 establishes the physical attack threat model and the patch
      detection technique that production vision security systems require.

  - section_number: 9
    title: 'Adversarial Attacks on LLMs: Token Substitution, HotFlip, and Semantic Perturbation'
    filename: 'section_10_09_llm_adversarial.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1009 LLM Adversarial) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'The discrete text challenge: why L-norm perturbations do not directly apply to tokenised text'
      - 'Token edit distance and semantic similarity as the text analogues of L0 and L2 constraints'
      - 'HotFlip: Ebrahimi et al. 2018 -- gradient-based single-character/token flip for discrete text'
      - 'TextFooler: Jin et al. 2020 -- word substitution with semantic similarity constraint and greedy search'
      - 'BERT-Attack: Li et al. 2020 -- contextual word substitution using masked language model predictions'
      - 'Character-level attacks: typosquatting, homoglyph substitution, zero-width character injection'
      - 'Universal adversarial triggers: Wallace et al. 2019 -- fixed token sequences that universally fool LLMs'
      - 'Adversarial attacks on LLM-based safety classifiers: evading content moderation with semantic-preserving rewrites'
      - 'Connection to prompt injection and jailbreaks (Chapter 6/7): adversarial text as automated jailbreak generation'
      - 'Detection approach: semantic similarity check between flagged and unflagged variants; linguistic feature analysis'

    key_concepts:
      - 'Text adversarial attacks substitute tokens or characters such that the text remains semantically valid to a human but causes a classifier to produce a wrong output'
      - 'HotFlip uses the Jacobian of the classifier with respect to the one-hot token vector to identify which character flip most reduces classification confidence'
      - 'Universal adversarial triggers are fixed text sequences -- typically gibberish -- that when appended to any input cause consistent misclassification'
      - 'Adversarial attacks on LLM safety classifiers are the automated adversary behind jailbreak generation in Chapter 7 -- the two topics share attack infrastructure'

    deliverables:
      - 'token_substitution_attack.py -- TextFooler-style word substitution with semantic similarity and POS constraint'
      - 'hotflip_attack.py -- gradient-based character flip attack for white-box text classifiers'
      - 'universal_trigger_search.py -- greedy universal adversarial trigger generation'
      - 'character_level_attack.py -- homoglyph and zero-width character injection against regex and ML classifiers'
      - 'llm_adversarial_detection.py -- semantic similarity and linguistic feature anomaly detection for adversarial text'

    security_preview: |
      LLM adversarial attacks close the loop between Chapter 7 (jailbreaks as human-
      crafted prompt engineering) and Chapter 10 (adversarial examples as automated
      optimised evasion). Universal adversarial triggers are automated jailbreaks.
      Adversarial safety classifier evasion is automated jailbreak generation. The
      detection approach from Section 10.12 covers both: consistency checking catches
      inputs whose classification changes under minor semantic paraphrase.

  - section_number: 10
    title: 'Real-World Incident: Adversarial Examples in Production'
    filename: 'section_10_10_adversarial_incident.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1010 Adversarial Incident) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Documented adversarial example incidents: physical and digital attacks against deployed systems'
      - 'Eykholt et al. stop sign attack: misclassification of physically perturbed stop signs by autonomous vehicle detectors'
      - 'Commercial facial recognition adversarial attacks: glasses-based adversarial patches bypassing live deployments'
      - 'Content moderation evasion: documented adversarial text attacks against commercial classifier APIs'
      - 'Malware adversarial examples: adversarial perturbations to PE headers causing antivirus misclassification'
      - 'Attack mechanism reconstruction: query patterns, perturbation budgets, and fidelity achieved'
      - 'Root cause analysis: what defensive controls were absent across all documented incidents'
      - 'Detection opportunity mapping: where Track 7 input preprocessing and consistency checking would have triggered'
      - 'Operator response patterns: disclosure, model updates, adversarial training adoption'
      - 'Lessons for production AI system security'

    key_concepts:
      - 'Adversarial attacks are documented in production -- not only in academic papers but against commercially deployed systems'
      - 'The shared root cause across most incidents: no adversarial input detection, no adversarial training, no consistency checking'
      - 'Physical adversarial incidents demonstrate that the threat surface extends to the real world without requiring API access'
      - 'Malware adversarial examples show that adversarial ML is relevant to classical security domains, not only LLM deployments'

    deliverables:
      - 'adversarial_incident_timeline.py -- structured timeline of three documented adversarial incidents'
      - 'incident_root_cause_analyser.py -- root cause analysis document generator for adversarial incidents'
      - 'detection_opportunity_mapper.py -- which Track 7 controls would have triggered and when'
      - 'architectural_remediation.py -- before/after architecture comparison for each incident class'
      - 'adversarial_lessons_checklist.py -- pre-production verification checklist derived from incident lessons'

    security_preview: |
      Section 10.10 mirrors the role Section 9.9 played in Chapter 9: grounding the
      attack catalogue in documented reality and mapping the root cause gaps to the
      production controls that follow. The incidents establish that adversarial ML is a
      live threat in commercial deployments, not a theoretical concern.

  - section_number: 11
    title: 'Detection Primitives: Input Preprocessing and Feature Squeezing'
    filename: 'section_10_11_detection_primitives_input.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1011 Detection Primitives Input) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Detection-by-transformation: input preprocessing as detection -- transformed inputs change prediction for adversarial but not natural examples'
      - 'Feature squeezing: Xu et al. 2018 -- reducing input feature space to detect adversarial examples'
      - 'Spatial smoothing: Gaussian blur and median filter as preprocessing defences'
      - 'Bit-depth reduction: reducing colour depth reduces adversarial perturbation precision'
      - 'JPEG compression: lossy compression as adversarial perturbation reduction'
      - 'Input normalisation and standardisation effects on adversarial examples'
      - 'Combining multiple squeezers: ensemble preprocessing with disagreement as the detection signal'
      - 'Adaptive attacks against feature squeezing: why single-squeezer defences fail against aware adversaries'
      - 'Text preprocessing analogues: paraphrasing, synonym normalisation, and text canonicalisation'
      - 'Latency budget: input preprocessing must complete within Track 7''s allocation of the 50ms P99 gateway budget'

    key_concepts:
      - 'Feature squeezing detects adversarial examples by comparing the model''s prediction on the original input versus a smoothed version -- large prediction change indicates adversarial perturbation'
      - 'No single squeezer defends against all adversarial attacks; an ensemble of diverse squeezers increases coverage'
      - 'Adaptive adversaries who know the squeezer can craft adversarial examples that survive squeezing -- squeezing alone is not a complete defence'
      - 'Input preprocessing adds latency: each squeezer requires a model forward pass; latency budget drives the number of squeezers the gateway can afford'

    deliverables:
      - 'feature_squeezer.py -- spatial smoothing, bit-depth reduction, and JPEG compression squeezers with detection threshold'
      - 'squeezer_ensemble.py -- multi-squeezer ensemble with disagreement scoring'
      - 'squeezer_latency_benchmark.py -- measuring per-squeezer latency and identifying the maximum squeezer count within Track 7''s budget'
      - 'text_canonicaliser.py -- text preprocessing analogues: synonym normalisation and paraphrase detection for LLM adversarial inputs'
      - 'squeezer_adaptive_adversary_test.py -- measuring squeezer effectiveness against C&W adversarial examples crafted with squeezer knowledge'

    security_preview: |
      Feature squeezing is the input-side detection primitive for Track 7, analogous to
      the query pattern analyser''s role in Track 6. It detects adversarial perturbations
      through their sensitivity to input transformation -- a property natural images
      do not share. Section 10.11 builds the squeezer library that Section 10.13 wires
      into the production gateway.

  - section_number: 12
    title: 'Detection Primitives: Consistency Checking and Adversarial Classifier'
    filename: 'section_10_12_detection_primitives_classifier.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1012 Detection Primitives Classifier) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Consistency checking: a natural image''s classification should not change under small random perturbations'
      - 'Consistency check algorithm: submit N randomly perturbed variants of the input; flag if any variant disagrees with the original prediction'
      - 'Consistency check as adversarial detection: adversarial examples are often fragile -- they exist near the decision boundary and small perturbations restore correct classification'
      - 'Adversarial detector classifier: a separate binary classifier trained to distinguish adversarial from natural inputs'
      - 'Feature space for adversarial detection: which input features distinguish adversarial from natural images'
      - 'Training the adversarial detector: balanced dataset of natural examples and adversarial examples from multiple attack methods'
      - 'Detector classifier coverage: which attack families does the detector generalise to?'
      - 'Text consistency checking: semantic paraphrase and back-translation as consistency check variants for LLM adversarial inputs'
      - 'Combining feature squeezing, consistency checking, and adversarial classifier in a detection ensemble'
      - 'Empirical detection rates: which attack families are detected by each primitive and ensemble combination'

    key_concepts:
      - 'Consistency checking exploits the adversarial fragility property: adversarial perturbations are precisely tuned and lose their effect under random perturbation of the input'
      - 'The adversarial detector classifier generalises across attack families if trained on diverse adversarial examples; it may fail against novel attack methods not in training'
      - 'Combining consistency checking and adversarial classification in a detection ensemble is the Track 7 analogue of the Chapter 9 five-primitive ensemble'
      - 'Text consistency checking uses semantic similarity -- back-translation preserving semantic content but not exact tokens is the text analogue of random pixel perturbation'

    deliverables:
      - 'consistency_checker.py -- random perturbation consistency check with N variants and configurable disagreement threshold'
      - 'adversarial_detector_classifier.py -- binary classifier trained on adversarial and natural examples with cross-attack generalisation test'
      - 'text_consistency_checker.py -- back-translation and paraphrase consistency check for LLM adversarial input detection'
      - 'detection_ensemble_ch10.py -- combining squeezers, consistency checker, and adversarial classifier with weighted scoring'
      - 'detection_rate_comparison_harness.py -- empirical detection rates across attack families for each primitive and ensemble'

    security_preview: |
      Section 10.12 completes the Track 7 detection primitive library. Feature squeezing
      (Section 10.11) covers input-transformation sensitivity. Consistency checking covers
      adversarial fragility. The adversarial classifier covers trained pattern recognition.
      Section 10.13 wires all three into the production gateway using the same parallel
      dispatch architecture as Tracks 1 through 6.

  - section_number: 13
    title: 'Production Gateway Track 7: Adversarial Example Detection'
    filename: 'section_10_13_production_track7_gateway.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1013 Production Track 7 Gateway) by Raghav Dinesh'
    estimated_pages: 8

    topics:
      - 'Design brief: Track 7 as the seventh parallel detection track in the Chapter 6/7/9 gateway ensemble'
      - 'Architecture: input preprocessing runs before model inference (pre-inference stage); consistency check and adversarial classifier run after'
      - 'Pre-inference stage: feature squeezing decisions must complete before the main model inference begins'
      - 'Post-inference stage: consistency checker uses the main model''s own output; adversarial classifier runs in parallel'
      - 'Latency budget allocation: Track 7 has two stages with different latency profiles'
      - 'Gateway integration: Track 7 alongside Tracks 1-6 in the unified seven-track ensemble'
      - 'Per-request detection signal combination: squeezer disagreement + consistency check + adversarial classifier score'
      - 'Alert routing and action tiers: block (high adversarial confidence), flag (moderate), monitor (low)'
      - 'Completing the AML.T0043/T0015 Sigma rule for the seven-track gateway'
      - 'Deployment checklist: calibration requirements, adversarial example test suite, latency verification'
      - 'Adaptive adversary considerations: an adversary who knows Track 7''s architecture can craft adversarial examples that evade it'
      - 'Operational considerations: false positive management for legitimate edge-case inputs near class boundaries'

    key_concepts:
      - 'Track 7 is the only track with a pre-inference stage: feature squeezing must transform the input before the main model sees it'
      - 'The pre-inference stage creates a new latency constraint: squeezer latency + main model latency must remain within 50ms P99'
      - 'Consistency checking requires the main model to run on N+1 variants: this is the most latency-expensive component and must be async or sub-sampled'
      - 'Adaptive adversaries defeat single-primitive defences; the three-primitive Track 7 ensemble provides meaningful resistance without a formal guarantee'

    deliverables:
      - 'gateway_track7.py -- production Track 7 adversarial detection with pre-inference and post-inference stages'
      - 'adversarial_filter.py -- pre-inference feature squeezing filter with configurable squeezer ensemble'
      - 'seven_track_gateway_ensemble.py -- full seven-track gateway (Tracks 1-7) with adversarial detection integrated'
      - 'track7_latency_benchmark.py -- measuring Track 7 contribution to total gateway P99 latency'
      - 'aml_t0043_t0015_sigma_rule_generator.py -- completed Sigma rule for AML.T0043/T0015 adversarial example detection'
      - 'track7_deployment_checklist.py -- 8-item pre-production checklist for Track 7 deployment'
      - 'track7_adaptive_adversary_test.py -- measuring Track 7 detection rate against adversaries with Track 7 knowledge'
      - 'track7_calibration_harness.py -- false positive calibration against natural edge-case inputs'

    security_preview: |
      Section 10.13 closes the input-side production capstone for Chapter 10. Track 7
      extends the gateway to seven parallel tracks covering LLM01 (Chapters 6/7),
      LLM10 (Chapter 9), and adversarial evasion (Chapter 10). The two-stage pre/post
      inference architecture is Chapter 10''s unique contribution to the gateway pattern --
      no prior chapter required a pre-inference transformation stage.

  - section_number: 14
    title: 'Certified Robustness: Randomised Smoothing and Formal Guarantees'
    filename: 'section_10_14_certified_robustness.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1014 Certified Robustness) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Certified robustness definition: a formal guarantee that no adversarial perturbation within a given Lp radius can change the classification'
      - 'Randomised smoothing: Cohen et al. 2019 -- the dominant certified defence for neural networks'
      - 'Algorithm: replace the base classifier with a smoothed classifier that takes the majority vote over many Gaussian-perturbed inputs'
      - 'Certificate radius: the L2 radius within which the smoothed classifier is certified to be constant'
      - 'Confidence intervals for the certificate: how many samples are needed for a certified radius with given confidence'
      - 'Accuracy-robustness tradeoff: smoothed classifiers are less accurate than base classifiers but have formal guarantees'
      - 'Certified robustness vs empirical robustness: PGD robustness has no formal guarantee; smoothing does'
      - 'Certified robustness against other norms: L1, L-infinity (harder; no dominant algorithm)'
      - 'Randomised smoothing for text: the discrete analogue (SAFER, certified robustness for NLP)'
      - 'Positioning in the defence stack: certified robustness is the upstream guarantee; Track 7 is the runtime detection layer'

    key_concepts:
      - 'Randomised smoothing provides the only practical formal robustness certificate for large neural networks -- analogous to differential privacy''s role in Chapter 8'
      - 'The certificate is probabilistic: with 1-delta confidence, no L2-bounded perturbation of radius r can change the smoothed classifier''s output'
      - 'Accuracy and certified radius trade off: a model cannot be maximally accurate and maximally certifiably robust simultaneously on complex datasets'
      - 'Certified robustness certifies individual inputs, not the model globally: each input has its own certificate radius that may be zero for hard examples'

    deliverables:
      - 'randomised_smoother.py -- smoothed classifier wrapping any base classifier with configurable Gaussian noise and N samples'
      - 'certificate_radius_calculator.py -- computing the certified L2 radius for a given input with confidence interval'
      - 'accuracy_robustness_tradeoff_analyser.py -- measuring clean accuracy and certified accuracy at varied noise levels'
      - 'smoothing_vs_pgd_comparison.py -- comparing PGD empirical robustness against certified robustness at matched epsilon'
      - 'certified_deployment_checklist.py -- decision guide for when certified robustness is required vs empirical robustness is sufficient'

    security_preview: |
      Certified robustness is the formal guarantee analogue to the utility-privacy
      tradeoff in Chapter 8''s differential privacy. It requires accepting an accuracy
      cost in exchange for a provable security bound. Section 10.14 builds the tool
      and quantifies the tradeoff so defenders can make an informed architectural
      decision for their specific deployment.

  - section_number: 15
    title: 'Adversarial Training: Upstream Empirical Robustness'
    filename: 'section_10_15_adversarial_training.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1015 Adversarial Training) by Raghav Dinesh'
    estimated_pages: 6

    topics:
      - 'Adversarial training: Madry et al. 2018 -- training on adversarial examples as the strongest empirical defence'
      - 'Min-max formulation: minimise the maximum-perturbation loss -- the adversary solves the inner maximisation, the model minimises it'
      - 'PGD-based adversarial training: using PGD adversarial examples as the inner optimisation oracle'
      - 'FGSM adversarial training: faster but weaker -- the tradeoff between training cost and robustness quality'
      - 'Free adversarial training: Shafahi et al. 2019 -- reusing gradient computations to reduce adversarial training cost'
      - 'TRADES: trading accuracy for robustness with a clean accuracy term in the training objective'
      - 'Adversarial training against LLM attacks: the training-time complement to Track 7 runtime detection'
      - 'Robustness generalisation: adversarially trained models are more robust to novel attacks but still not perfectly'
      - 'Positioning in the defence stack: adversarial training is the upstream control; Track 7 is the downstream runtime layer'
      - 'Connection to Chapter 8 training-time defences: adversarial training is the Chapter 10 analogue of differential privacy training'

    key_concepts:
      - 'Adversarial training makes the model itself more robust by including adversarial examples during training -- the defence operates at training time, before deployment'
      - 'PGD adversarial training is computationally expensive (N PGD steps per training batch) but produces the strongest empirically robust models'
      - 'Adversarially trained models are more robust to PGD but still vulnerable to stronger attacks like C&W with high confidence -- empirical robustness has no formal guarantee'
      - 'The correct architecture combines adversarial training (upstream robustness) with Track 7 detection (runtime detection) -- neither alone is sufficient'

    deliverables:
      - 'adversarial_trainer.py -- PGD-based adversarial training loop with configurable epsilon, steps, and clean accuracy tradeoff'
      - 'fgsm_adversarial_trainer.py -- fast FGSM adversarial training for resource-constrained environments'
      - 'trades_trainer.py -- TRADES training objective balancing clean accuracy and adversarial robustness'
      - 'adversarial_training_evaluator.py -- evaluating adversarially trained model robustness against PGD, C&W, and transfer attacks'
      - 'adversarial_training_deployment_checklist.py -- 6-item pre-deployment checklist for adversarially trained classifiers'

    security_preview: |
      Adversarial training is the upstream control that reduces the fraction of inputs
      for which adversarial examples exist at all. Track 7 is the runtime control that
      detects adversarial examples that survive into production. Together they form
      the two-surface defence of Chapter 10 -- mirroring the Chapter 9 pattern of
      differential privacy training (upstream) plus output perturbation (runtime).

  - section_number: 16
    title: 'Chapter 10 Summary: Evasion Defence Architecture and Part 2 Closure'
    filename: 'section_10_16_chapter_summary.yaml'
    note: '20260110 | AI Security: Adversarial Machine Learning (Section 1016 Chapter Summary) by Raghav Dinesh'
    estimated_pages: 6

    overview: |
