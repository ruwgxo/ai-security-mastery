section_summary: |
  Section 6.16 completed the three-incident analysis block with the GPT plugin
  agentic injection research. The confused deputy attack chain -- read plugin
  injection leading to write plugin exfiltration -- demonstrated that agentic
  deployments with multiple tool permissions create multiplicative injection
  impact. The adversary does not acquire permissions; they cause the LLM to
  misuse the permissions it already holds. Exfiltration via plugin is the
  highest-impact injection outcome in this taxonomy: sensitive conversation
  context reaches the adversary's external endpoint using legitimate plugin
  credentials, with no additional user action and no user indication.

  The five-layer RCA identified the systemic root cause as trust model mismatch:
  each plugin added real-world permissions without a corresponding classifier on
  its output. The four plugin security controls address this: output classifier
  (primary, pre-execution), call allowlist (structural prevention), call graph
  monitoring (real-time detection), and least privilege (blast radius limitation).

  The three-incident synthesis across Sections 6.14, 6.15, and 6.16 converges
  on one architectural root cause: external content entered LLM context without
  a classifier. This convergence from three different deployment types -- web-
  augmented, code assistant, agentic -- validates the pre-assembly classifier
  pattern from Section 6.17 as the primary production control. Section 6.17
  builds that classifier. Section 6.18 synthesises all of Chapter 6 into the
  unified injection defence architecture.
