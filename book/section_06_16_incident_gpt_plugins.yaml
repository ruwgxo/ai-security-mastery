key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        The confused deputy attack uses the LLM's legitimate plugin permissions
        to serve the adversary's objectives. The adversary does not need to acquire
        permissions -- they cause the LLM to misuse permissions it already holds
        via injection in retrieved content.

    - number: 2
      takeaway: |
        Exfiltration via plugin is the highest-impact injection outcome in this
        taxonomy. Sensitive conversation context reaches the adversary's endpoint
        using legitimate plugin credentials. The user has no indication; no
        additional user action is required.

    - number: 3
      takeaway: |
        The systemic root cause is trust model mismatch: each new plugin adds
        real-world permissions without a corresponding classifier on its output.
        Security architecture must scale with capability expansion.

    - number: 4
      takeaway: |
        Plugin call allowlisting prevents the primary exfiltration chain
        structurally -- read plugin results may not trigger write plugin calls.
        This is more robust than content classification alone because it
        operates at the architecture layer independent of payload content.

    - number: 5
      takeaway: |
        Cross-plugin injection chains relay and amplify injection through multiple
        tool calls, degrading attribution. Call graph monitoring must track the
        full call sequence, not only individual plugin interactions.

    - number: 6
      takeaway: |
        All three incidents (Bing Chat, Copilot, GPT Plugin) share one root cause:
        external content entered LLM context without a classifier. The pre-assembly
        classifier pattern from Section 6.17 is the unified architectural response.

    - number: 7
      takeaway: |
        Impact escalates with agentic capability. Bing Chat caused persona adoption;
        Copilot caused malicious code suggestions (user must accept); plugin injection
        caused automatic data exfiltration (no user action). More tools and more
        permissions mean higher blast radius per successful injection.

    - number: 8
      takeaway: |
        Each new tool added to a deployment must trigger a security review covering
        four items: minimum permission scope, classifier on tool output, allowlist
        update for new call graph edges, and anomaly pattern update for new write
        operations.


