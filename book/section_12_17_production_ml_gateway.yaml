      @dataclass
      class TrackConfig:
          track_id: str
          threat_class: str
          detectors: List[DetectorAssignment]
          is_output_side: bool = False

          def track_latency_ms(self) -> float:
              '''Parallel detectors: track latency is the max, not the sum.'''
              return max((d.latency_ms for d in self.detectors), default=0.0)

          def detector_count(self) -> int:
