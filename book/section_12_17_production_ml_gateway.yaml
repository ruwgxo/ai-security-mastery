              detectors=[
                  DetectorAssignment('adversarial_detector', 5.0, 'Adversarial example detection (Chapter 10)'),
              ],
          ),
      ]


      class TrackMLAssignment:
          '''Documents and validates the detector-to-track assignment.'''

          def __init__(self, tracks: List[TrackConfig] = None) -> None:
              self.tracks = tracks or TRACK_ASSIGNMENTS

          def input_side_latency_ms(self) -> float:
              '''Parallel tracks: input-side latency is the max track latency.'''
              return max(
                  (t.track_latency_ms() for t in self.tracks if not t.is_output_side),
                  default=0.0,
              )

          def single_coverage_tracks(self) -> List[str]:
              '''Tracks covered by only one ML detector (potential SPOF).'''
              return [t.track_id for t in self.tracks
