prose_content:

  part_1:
    title: 'Design Brief: ML Detectors in the Seven-Track Gateway'
    body: |
      The Chapter 11 gateway is a seven-track architecture: seven parallel detection tracks, each
      covering a class of threats, with a signature-based Sigma rule layer providing the baseline
      detection. The Chapter 12 ML detection layer does not replace this gateway -- it extends it. The
      ML detectors are added to the tracks they cover, running in parallel with the signature rules, so
      each track has both signature detection (fast, precise on known patterns) and ML detection
      (slower, covers novel variants).

      The design brief is to integrate the four-detector ensemble into the seven tracks without
      breaching the 50ms P99 budget and without creating single points of failure. The integration
      principle is complementarity at the track level: the signature layer catches known attacks with
      high precision and near-zero latency; the ML layer catches the novel variants the signatures miss.
      A track with both layers is more robust than either alone -- the signature miss on a novel variant
      is caught by the ML detector, and the ML false positive on an unusual benign request is moderated
      by the signature layer's confident non-match.

      The defence-in-depth structure has a specific failure semantics. If the ML layer is degraded or
      shed under load, the signature layer continues to provide baseline detection -- the gateway never
      goes fully blind. If a novel attack evades the signatures, the ML layer covers it. The two layers
      fail independently, so the gateway's detection survives the failure of either. This is the
      property that makes the integrated gateway more reliable than a pure-ML or pure-signature gateway.

      The end-to-end request lifecycle through the integrated gateway has five stages. Ingestion parses
      the request and extracts the features (Section 12.11). Signature detection runs the Sigma rules
      (Chapter 11). ML detection runs the four-detector ensemble in parallel (Section 12.15) on the
      async architecture (Section 12.12). The decision stage combines the signature and ML signals into
      the block-flag-monitor routing. The response stage acts on the decision and, for allowed requests,
      runs the output-side PII scanner (Section 12.09) on the model response before delivery. The
      production_ml_gateway.py in deliverable_1 implements this lifecycle.

  part_2:
    title: 'Track Assignment: Which Detector Covers Which Track'
    body: |
      Each ML detector is assigned to the gateway tracks its coverage profile fits, based on the
      coverage complementarity analysis from Section 12.15. The assignment is not uniform -- a detector
      runs on the tracks where it adds coverage, not on every track, so the per-track latency is
      controlled by running only the relevant detectors on each track.

      Track 1 (injection) runs the embedding similarity detector and the XGBoost injection classifier in
      parallel. The embedding detector catches paraphrase variants of known injections; the XGBoost
      catches the structural patterns of injection attempts. Together they cover the injection track's
      attack surface -- the direct injections the signatures catch, plus the paraphrase and structural
      variants the signatures miss.

      Tracks 2 through 4 (jailbreak) run the GRU sequence detector and the DistilBERT neural classifier.
      The GRU catches multi-turn jailbreak escalation -- the attacks that build across conversation
      turns, which single-message detection cannot see. The DistilBERT catches single-turn jailbreaks
      with the highest precision of the supervised classifiers. The jailbreak tracks need both because
      jailbreaks come in both single-turn and multi-turn forms.

      Track 5 (PII) runs the PII scanner as a post-inference stage, the only output-side detector. It
      does not run in parallel with the input-side detectors -- it runs after model inference on the
      model response, scanning for the PII leakage that no input-side detector can catch.

      Track 6 (extraction) runs the Isolation Forest anomaly detector on the API usage patterns. Data
      exfiltration and model extraction attacks manifest as anomalous API usage -- unusual request
      patterns, atypical parameter combinations -- which the anomaly detector flags as deviations from
      the benign usage distribution. Track 7 (adversarial) runs the adversarial example detectors from
      Chapter 10, integrated into the gateway as the adversarial-input detection track. The
      track_ml_assignment.py in deliverable_2 documents the full assignment with the coverage
      justification for each detector-track pairing.

  part_3:
    title: 'Latency Budget with ML Detectors'
    body: |
      Adding the ML detectors to the gateway consumes latency budget that the signature-only gateway did
      not. The integrated gateway must still meet the 50ms P99 SLO, which requires careful budget
      allocation across the signature layer, the feature pipeline, and the ML detectors.

      The budget allocation gives the signature layer a small slice (the Sigma rules are fast, under
      2ms), the feature pipeline up to 5ms (Section 12.11), and the ML detectors the parallel-scoring
      slice of around 15ms (Section 12.12, the maximum of the four detectors run concurrently, not the
      sum). The PII scanner runs output-side and is budgeted separately from the input-side budget
      because it runs after model inference. The remaining budget is headroom for network,
      serialisation, and load spikes.

      The per-track latency is controlled by running only the relevant detectors on each track. Track 1
      runs the embedding detector (3ms) and XGBoost (2ms) in parallel, for a 3ms track latency. The
      jailbreak tracks run the GRU (12ms) and DistilBERT (7ms) in parallel, for a 12ms track latency --
      the GRU dominates. The tracks run in parallel with each other as well, so the total ML detection
      latency is the maximum across the tracks, around 12-15ms, not the sum. The async architecture from
      Section 12.12 is what makes this parallel composition possible.

      The latency must be validated, not assumed. The ml_gateway_latency_benchmark.py in deliverable_4
      measures the full gateway P99 latency with and without the ML detectors, confirming that the ML
      layer addition stays within the budget. The with-and-without comparison isolates the ML detection
      latency contribution, showing exactly how much budget the ML layer consumes, which is the
      measurement that validates the integrated gateway meets the SLO. If the measurement shows the P99
      at risk, the graceful degradation policy (part 4) provides the load-shedding that recovers the
      budget under load.

  part_4:
    title: 'Graceful Degradation Under Load'
    body: |
      Under high load, the gateway's latency increases due to CPU contention, cache eviction, and
      queueing. If the latency approaches the SLO under load, the gateway must shed work to stay within
      budget rather than breaching the SLO and being disabled. Graceful degradation is the policy that
      sheds the highest-cost detectors first while preserving the most detection coverage per unit of
      latency.

      The degradation has tiers. At normal load, all detectors run. As the latency budget comes under
      pressure, the gateway sheds the highest-latency detector first -- the DistilBERT at 7ms -- because
      it consumes the most budget and its coverage (single-turn jailbreaks) is partly covered by the
      other detectors. If the pressure continues, the gateway sheds the GRU next, falling back to the
      fast detectors (Isolation Forest, XGBoost, embedding). At the most severe pressure, the gateway
      sheds all ML detectors and falls back to signature-only detection -- the Sigma rules from Chapter
      11, which are fast and provide baseline detection.

      The shedding order is determined by the latency cost and the coverage redundancy. The DistilBERT
      is shed first because it has the highest latency and its coverage is partly redundant with the
      other detectors. The fast detectors are shed last because they are cheap and provide the most
      coverage per millisecond. The signature layer is never shed -- it is the floor that keeps the
      gateway detecting even under the most severe load. The gateway_graceful_degradation.py in
      deliverable_3 implements the priority ranking and the signature-only fallback.

      The principle is that some detection is better than none, and staying within the SLO is better than
      breaching it. A gateway that breaches the SLO under load is disabled by the operational response,
      leaving zero detection. A gateway that sheds its slowest detectors under load keeps the fast
      detectors and the signatures running, providing degraded but non-zero detection while staying
      within the budget. Graceful degradation trades coverage for SLO compliance, which is the correct
      trade because SLO compliance keeps the gateway running and a running degraded gateway beats a
      disabled complete one.

  part_5:
    title: 'The ATLAS AML.T0040 Sigma Rule: Detecting the Meta-Attack'
    body: |
      The ML detectors defend against attacks on the LLM. But the ML detectors are themselves a target:
      a sophisticated adversary attacks the detection system by probing for the ML classifiers' decision
      boundaries, learning which payloads are flagged and which pass, and crafting payloads that evade
      the classifiers. This is the meta-attack -- an attack on the detector rather than on the model --
      catalogued as MITRE ATLAS AML.T0040 (ML classifier evasion through boundary probing).

      The detection signal for AML.T0040 is a behavioural pattern, not a single payload. An adversary
      probing the decision boundary sends a sequence of semantically similar requests with small
      variations, observing which are flagged. The signature of this probing is a cluster of requests
      from the same source that are semantically similar to each other (small embedding distances) and
      concentrated near the decision boundary (calibrated scores in the uncertain 0.4-0.6 range). A
      legitimate user does not send a stream of near-duplicate requests hovering at the decision
      boundary; an adversary probing for the boundary does exactly that.

      The Sigma rule for AML.T0040 encodes this pattern. It triggers when a source sends multiple
      requests within a time window that are semantically similar (above an embedding similarity
      threshold) and concentrated near the decision boundary (calibrated scores clustered in the
      uncertain range). The rule's detection logic combines the embedding similarity from the Section
      12.07 detector and the calibrated scores from the Section 12.10 calibration -- the same components
      that serve the primary detection, repurposed to detect the probing of those components.

      The aml_t0040_sigma_rule_generator.py in deliverable_5 produces the completed Sigma rule. When the
      rule fires, the response is not just to flag the individual requests (which are individually
      near-benign) but to flag the source as conducting boundary probing, which warrants a stronger
      response: rate-limiting the source, escalating to analyst review, or blocking the source entirely.
      Detecting the meta-attack protects the detection system itself, which is essential because a
      successful boundary-probing campaign produces evasion payloads that defeat the primary detection.

  part_6:
    title: 'Production Deployment Checklist'
    body: |
      Deploying the ML gateway to production -- or deploying a new detector version into it -- is a
      high-stakes operation. A misconfigured or unvalidated detector handling production traffic can
      flood the analyst queue, breach the SLO, or silently miss attacks. The deployment checklist
      enforces the validations that must pass before any detector handles production traffic, turning the
      deployment from a manual operation prone to skipped steps into a gated process.

      The checklist enforces the Section 12.13 model registry gate conditions and the production
      validations from across the chapter. Calibration verification confirms each detector's ECE is below
      threshold (Section 12.10) -- an uncalibrated detector corrupts the ensemble. Shadow mode validation
      confirms the detector was run in shadow on production traffic and its decisions compared against the
      production model (Section 12.13) -- offline validation alone is insufficient. Canary promotion
      confirms the detector served a traffic fraction with automated rollback monitoring before full
      promotion (Section 12.13). Latency validation confirms the detector's P99 is within its budget slice
      (Section 12.12). Monitoring dashboard confirms the detector's metrics are exposed and the dashboard
      is configured (part 7) -- an unmonitored detector is undeployable because its degradation would go
      unnoticed.

      The checklist is a hard gate, not a recommendation. Each item must pass before the deployment
      proceeds, with no expedient bypass for any item. The bypass is exactly where, under deadline
      pressure, the shadow validation or the calibration check gets skipped, and the skipped check is
      where the production incident originates. The ml_gateway_deployment_checklist.py in deliverable_6
      implements the checklist as an enforced sequence: it runs each validation, reports the result, and
      permits the deployment only when every item passes.

      The checklist connects the chapter's components into the deployment gate. Each item corresponds to a
      validation built in a prior section -- calibration (12.10), shadow and canary (12.13), latency
      (12.12), monitoring (part 7) -- so the checklist is the integration point where the chapter's
      validations are enforced together before production. The checklist is what makes the deployment
      governed rather than ad hoc.

  part_7:
    title: 'Monitoring Dashboard: Observability for the ML Layer'
    body: |
      A deployed ML detection layer that is not observable is undeployable, because its degradation --
      a drifting threshold, a dropping cache hit rate, a latency regression -- would go unnoticed until
      it caused a visible incident. The monitoring dashboard exposes the metrics that make the ML layer
      observable, so its health is continuously visible and its degradation is caught early.

      The dashboard exposes four categories of metrics. Detection metrics: the per-detector and ensemble
      flag rates, the block-flag-monitor tier distribution, and the per-attack-family detection rates
      that surface coverage gaps. Latency metrics: the P50, P95, and P99 latency per detector and for the
      full gateway, with the budget threshold marked so a latency regression is immediately visible.
      Quality metrics: the calibration ECE per detector, the threshold drift signal from Section 12.10,
      and the online-offline divergence from Section 12.16. Operational metrics: the feature cache hit
      rate (Section 12.11), the model versions currently in production (Section 12.13), the graceful
      degradation state (which detectors are currently shed), and the annotation throughput from the
      curation flywheel (Section 12.14).

      The metrics are exposed via Prometheus -- the standard metrics format for production monitoring --
      and visualised in Grafana dashboards. The Prometheus metrics are instrumented into the gateway: each
      detector inference records its latency and decision, each ensemble combination records its tier, each
      feature extraction records its cache hit, and these are aggregated into the Prometheus time series.
      The Grafana dashboard panels visualise the time series with the thresholds marked, so an on-call
      engineer can see at a glance whether the ML layer is healthy.

      The dashboard is the operational interface to the ML detection layer. It connects to the alerting
      that fires when a metric crosses a threshold -- the latency P99 approaching the budget, the
      calibration ECE rising, the cache hit rate dropping, the threshold drift firing. The
      ml_gateway_monitoring_dashboard.py in deliverable_7 produces the Prometheus metric definitions and
      the Grafana dashboard configuration. Observability is not an afterthought -- it is the property that
      makes the ML layer a managed production system rather than a black box that degrades silently.

  part_8:
    title: 'The Complete System: From Chapter 11 to Chapter 13'
    body: |
      The production ML gateway is the synthesis of Chapter 12. It takes the seven-track gateway from
      Chapter 11 and adds the ML detection layer built across this chapter: the four-detector ensemble on
      the input side, the PII scanner on the output side, the feature pipeline and inference optimisation
      keeping it within budget, the model registry governing the configuration, the live curation keeping
      it current, the benchmarking validating it, and the monitoring making it observable. The result is a
      complete, deployable ML detection system.

      The system's place in the broader architecture is specific. Upstream, the Chapter 11 gateway provides
      the seven-track structure, the signature layer, and the request routing that the ML layer plugs into.
      The ML layer is not a standalone system -- it is a detection layer within the gateway, complementing
      the signatures. Downstream, the Chapter 13 behavioural analysis wraps the gateway's detection in the
      longer-horizon behavioural context: the gateway makes the per-request detection decision, and the
      behavioural analysis aggregates these decisions across sessions and sources to detect the patterns
      that no single request reveals -- the slow campaigns, the coordinated probing, the account takeover
      sequences.

      The chapter's central thesis is realised in this capstone: ML-based detection is not a replacement
      for signature-based detection but a complement, and the two together provide defence-in-depth that
      neither achieves alone. The signatures provide fast, precise, interpretable detection of known
      attacks. The ML detectors provide coverage of the novel variants the signatures miss, at the cost of
      higher latency and lower interpretability, managed by the calibration, the ensemble, the inference
      optimisation, and the monitoring built across the chapter. The integrated gateway is more robust
      than either layer alone because they cover each other's gaps and fail independently.

      The production realities the capstone addresses -- graceful degradation, the deployment checklist,
      the monitoring dashboard, the meta-attack detection -- are what separate a detection system that works
      in a notebook from one that survives production. A detector that is accurate but breaches the SLO
      under load is disabled; a detector that is deployed without the checklist introduces a regression; a
      detector that is not monitored degrades silently; a detection system that does not detect the
      meta-attack is defeated by boundary probing. The capstone integrates the validations and the
      operational controls that make the ML detection layer deployable, observable, and defensible in
      production, which is the bar a real detection system must meet.

