  deliverable_3:
    title: 'Gateway Graceful Degradation'
    filename: 'gateway_graceful_degradation.py'
    description: 'Load-shedding policy with detector priority ranking and fallback to signature-only mode. Sheds the highest-latency detectors first under latency pressure, preserving the fastest detectors and the signature floor, keeping the gateway within the SLO under load.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: numpy. The current load signal comes from the live P99 latency measurement.'
    code: |
      # gateway_graceful_degradation.py
      # Section 12.17: Graceful Degradation Load-Shedding
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from collections import deque
      from dataclasses import dataclass, field
      from typing import Deque, Dict, List, Optional

      import numpy as np


      @dataclass
      class DegradationTier:
          tier: int
          name: str
          active_detectors: List[str]
          shed: List[str]


      # Shedding order: highest latency / most redundant coverage shed first.
      # The signature layer is never shed.
      DEGRADATION_TIERS: List[DegradationTier] = [
          DegradationTier(0, 'normal',
                          ['isolation_forest', 'xgboost', 'gru', 'embedding'], []),
          DegradationTier(1, 'tier_1_pressure',
                          ['isolation_forest', 'xgboost', 'embedding'], ['distilbert']),
          DegradationTier(2, 'tier_2_pressure',
                          ['isolation_forest', 'xgboost', 'embedding'], ['distilbert', 'gru']),
          DegradationTier(3, 'tier_3_pressure',
                          ['isolation_forest', 'xgboost'], ['distilbert', 'gru', 'embedding']),
          DegradationTier(4, 'severe_signature_only',
                          [], ['distilbert', 'gru', 'embedding', 'isolation_forest', 'xgboost']),
      ]


      class GracefulDegradationController:
          '''
          Adjusts the active detector set based on the live latency pressure.
          Sheds the highest-latency detectors first; the signature layer is the
          floor and is never shed.

          The principle: degraded detection within the SLO beats full detection
          that breaches the SLO and gets the gateway disabled.
          '''

          def __init__(
              self,
              budget_ms: float = 50.0,
              pressure_threshold: float = 0.8,    # fraction of budget that triggers shedding
              recovery_threshold: float = 0.6,    # fraction below which to recover a tier
              window: int = 100,
          ) -> None:
              self.budget_ms = budget_ms
              self.pressure_threshold = pressure_threshold
              self.recovery_threshold = recovery_threshold
              self._latencies: Deque[float] = deque(maxlen=window)
              self._tier = 0

          def record_latency(self, latency_ms: float) -> None:
              self._latencies.append(latency_ms)

          def _current_p99(self) -> float:
              if not self._latencies:
                  return 0.0
              return float(np.percentile(self._latencies, 99))

          def update_tier(self) -> int:
              '''Adjust the degradation tier based on the current P99 pressure.'''
              if len(self._latencies) < 10:
                  return self._tier
              p99 = self._current_p99()
              pressure = p99 / self.budget_ms

              if pressure >= self.pressure_threshold and self._tier < len(DEGRADATION_TIERS) - 1:
                  self._tier += 1
                  print(f'DEGRADE -> tier {self._tier} ({DEGRADATION_TIERS[self._tier].name}); '
                        f'P99 {p99:.1f}ms ({pressure:.0%} of budget)')
              elif pressure <= self.recovery_threshold and self._tier > 0:
                  self._tier -= 1
                  print(f'RECOVER -> tier {self._tier} ({DEGRADATION_TIERS[self._tier].name}); '
                        f'P99 {p99:.1f}ms ({pressure:.0%} of budget)')
              return self._tier

          def active_detectors(self) -> List[str]:
              return DEGRADATION_TIERS[self._tier].active_detectors

          def current_tier(self) -> int:
              return self._tier

          def is_signature_only(self) -> bool:
              return len(self.active_detectors()) == 0


      if __name__ == '__main__':
          controller = GracefulDegradationController(budget_ms=50.0)

          rng = np.random.default_rng(42)
          print('Simulating increasing load...')
          # Phase 1: normal load
          for _ in range(50):
              controller.record_latency(rng.normal(20, 3))
          controller.update_tier()
          print(f'  Active: {controller.active_detectors()}')

          # Phase 2: rising load
          for _ in range(50):
              controller.record_latency(rng.normal(43, 4))
          controller.update_tier()
          print(f'  Active: {controller.active_detectors()}')

          # Phase 3: severe load
          for _ in range(50):
              controller.record_latency(rng.normal(48, 3))
          controller.update_tier()
          controller.update_tier()
          print(f'  Active: {controller.active_detectors()}  signature_only={controller.is_signature_only()}')

          # Phase 4: recovery
          for _ in range(100):
              controller.record_latency(rng.normal(22, 3))
          for _ in range(5):
              controller.update_tier()
          print(f'  Recovered active: {controller.active_detectors()}')

  deliverable_4:
    title: 'ML Gateway Latency Benchmark'
    filename: 'ml_gateway_latency_benchmark.py'
    description: 'Full gateway P99 latency measurement with and without the ML detectors. Isolates the ML detection latency contribution and validates the integrated gateway meets the 50ms P99 SLO under representative load.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: asyncio, numpy. Builds on the latency profiling from Section 12.12.'
    code: |
      # ml_gateway_latency_benchmark.py
      # Section 12.17: ML Gateway Latency Benchmark
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import asyncio
      import time
      from dataclasses import dataclass
      from typing import Callable, Dict, List

      import numpy as np


      @dataclass
      class GatewayLatencyComparison:
          signature_only_p99: float
          with_ml_p99: float
          ml_contribution_p99: float
          budget_ms: float
          slo_met: bool


      class MLGatewayLatencyBenchmark:
          '''
          Measures the gateway P99 with and without the ML detectors to isolate
          the ML latency contribution and validate the SLO.
          '''

          def __init__(self, budget_ms: float = 50.0) -> None:
              self.budget_ms = budget_ms

          async def _measure(
              self,
              process_fn: Callable,
              n_requests: int,
              concurrency: int,
          ) -> List[float]:
              latencies: List[float] = []
              semaphore = asyncio.Semaphore(concurrency)

              async def one():
                  async with semaphore:
                      t0 = time.perf_counter()
                      await process_fn()
                      latencies.append((time.perf_counter() - t0) * 1000)

              await asyncio.gather(*[one() for _ in range(n_requests)])
              return latencies

          async def compare(
              self,
              signature_only_fn: Callable,
              with_ml_fn: Callable,
              n_requests: int = 500,
              concurrency: int = 20,
          ) -> GatewayLatencyComparison:
              sig_latencies = await self._measure(signature_only_fn, n_requests, concurrency)
              ml_latencies = await self._measure(with_ml_fn, n_requests, concurrency)

              sig_p99 = float(np.percentile(sig_latencies, 99))
              ml_p99 = float(np.percentile(ml_latencies, 99))

              return GatewayLatencyComparison(
                  signature_only_p99=sig_p99,
                  with_ml_p99=ml_p99,
                  ml_contribution_p99=ml_p99 - sig_p99,
                  budget_ms=self.budget_ms,
                  slo_met=ml_p99 <= self.budget_ms,
              )


      def print_comparison(comp: GatewayLatencyComparison) -> None:
          print(f'ML Gateway Latency Benchmark (SLO: {comp.budget_ms:.0f}ms P99)')
          print('=' * 55)
          print(f'  Signature-only P99:  {comp.signature_only_p99:.1f}ms')
          print(f'  With ML P99:         {comp.with_ml_p99:.1f}ms')
          print(f'  ML contribution:     {comp.ml_contribution_p99:.1f}ms')
          print(f'  SLO met:             {comp.slo_met}')
          if not comp.slo_met:
              print('  WARN: ML layer pushes P99 over budget; enable graceful degradation.')


      if __name__ == '__main__':
          benchmark = MLGatewayLatencyBenchmark(budget_ms=50.0)

          async def signature_only():
              await asyncio.sleep(0.003)   # ~3ms signature + feature

          async def with_ml():
              await asyncio.sleep(0.003)    # signature + feature
              await asyncio.sleep(0.012)    # parallel ML detectors (max ~12ms)

          comparison = asyncio.run(benchmark.compare(signature_only, with_ml, n_requests=200))
          print_comparison(comparison)

  deliverable_5:
    title: 'AML.T0040 Sigma Rule Generator'
    filename: 'aml_t0040_sigma_rule_generator.py'
    description: 'Completed Sigma rule for ATLAS AML.T0040 ML classifier evasion detection. Detects adversaries probing the ML classifier decision boundaries through a pattern of semantically similar requests concentrated near the boundary, combining embedding similarity and calibrated scores.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: PyYAML. Produces a valid Sigma rule YAML for the detection telemetry pipeline.'
    code: |
      # aml_t0040_sigma_rule_generator.py
      # Section 12.17: ATLAS AML.T0040 Sigma Rule Generator
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from collections import deque
      from dataclasses import dataclass, field
      from typing import Deque, Dict, List, Optional

      import numpy as np

      try:
          import yaml
          YAML_AVAILABLE = True
      except ImportError:
          YAML_AVAILABLE = False


      def generate_aml_t0040_sigma_rule(
          similarity_threshold: float = 0.85,
          uncertainty_low: float = 0.4,
          uncertainty_high: float = 0.6,
          min_requests: int = 5,
          window_minutes: int = 10,
      ) -> Dict:
          '''
          Generate the Sigma rule for AML.T0040: ML classifier evasion through
          boundary probing.

          Detection signal: a source sends multiple semantically similar requests
          concentrated near the decision boundary -- the signature of an adversary
          probing for the classifier boundary.
          '''
          rule = {
              'title': 'ML Classifier Evasion via Boundary Probing (ATLAS AML.T0040)',
              'id': 'aml-t0040-boundary-probing',
              'status': 'stable',
              'description': (
                  'Detects an adversary probing the ML classifier decision boundary by sending '
                  'a sequence of semantically similar requests concentrated near the boundary, '
                  'observing which are flagged to craft evasion payloads.'
              ),
              'references': [
                  'https://atlas.mitre.org/techniques/AML.T0040',
              ],
              'author': 'Raghav Dinesh',
              'date': '2026/06/06',
              'tags': [
                  'attack.ml_classifier_evasion',
                  'atlas.aml_t0040',
                  'detection.boundary_probing',
              ],
              'logsource': {
                  'product': 'ml_gateway',
                  'service': 'detection_telemetry',
              },
              'detection': {
                  'boundary_concentration': {
                      'calibrated_score|gte': uncertainty_low,
                      'calibrated_score|lte': uncertainty_high,
                  },
                  'semantic_similarity': {
                      'intra_source_embedding_similarity|gte': similarity_threshold,
                  },
                  'volume': {
                      f'source_request_count_{window_minutes}m|gte': min_requests,
                  },
                  'condition': 'boundary_concentration and semantic_similarity and volume',
              },
              'fields': [
                  'source_id',
                  'calibrated_score',
                  'intra_source_embedding_similarity',
                  f'source_request_count_{window_minutes}m',
              ],
              'falsepositives': [
                  'Legitimate users iterating on a complex query with small refinements',
                  'Automated clients with repetitive but benign request patterns',
              ],
              'level': 'high',
          }
          return rule


      class BoundaryProbingDetector:
          '''
          Runtime detector that implements the AML.T0040 Sigma rule logic.
          Tracks per-source request patterns and fires when the probing signature appears.
          '''

          def __init__(
              self,
              similarity_threshold: float = 0.85,
              uncertainty_low: float = 0.4,
              uncertainty_high: float = 0.6,
              min_requests: int = 5,
              window_seconds: int = 600,
          ) -> None:
              self.similarity_threshold = similarity_threshold
              self.uncertainty_low = uncertainty_low
              self.uncertainty_high = uncertainty_high
              self.min_requests = min_requests
              self.window_seconds = window_seconds
              self._source_requests: Dict[str, Deque] = {}

          def record_request(
              self,
              source_id: str,
              timestamp: float,
              embedding: np.ndarray,
              calibrated_score: float,
          ) -> bool:
              '''Record a request; return True if the probing signature fires.'''
              if source_id not in self._source_requests:
                  self._source_requests[source_id] = deque(maxlen=100)
              window = self._source_requests[source_id]
              # Drop expired
              cutoff = timestamp - self.window_seconds
              while window and window[0][0] < cutoff:
                  window.popleft()
              window.append((timestamp, embedding, calibrated_score))

              # Check the probing signature
              near_boundary = [
                  (e, s) for _, e, s in window
                  if self.uncertainty_low <= s <= self.uncertainty_high
              ]
              if len(near_boundary) < self.min_requests:
                  return False

              # Semantic similarity among near-boundary requests
              embs = [e for e, _ in near_boundary]
              similarities = []
              for i in range(len(embs)):
                  for j in range(i + 1, len(embs)):
                      na, nb = np.linalg.norm(embs[i]), np.linalg.norm(embs[j])
                      if na > 0 and nb > 0:
                          similarities.append(np.dot(embs[i], embs[j]) / (na * nb))
              mean_sim = float(np.mean(similarities)) if similarities else 0.0
              return mean_sim >= self.similarity_threshold


      if __name__ == '__main__':
          rule = generate_aml_t0040_sigma_rule()
          print('Generated AML.T0040 Sigma Rule:')
          if YAML_AVAILABLE:
              print(yaml.dump(rule, default_flow_style=False, sort_keys=False))
          else:
              print(f'  title: {rule["title"]}')
              print(f'  condition: {rule["detection"]["condition"]}')

          # Runtime detection demo
          print('\nRuntime boundary-probing detection:')
          detector = BoundaryProbingDetector(min_requests=5)
          rng = np.random.default_rng(42)
          base_emb = rng.normal(0, 1, 384)
          base_emb /= np.linalg.norm(base_emb)

          fired = False
          for i in range(8):
              # Probing: near-duplicate requests near the boundary
              emb = base_emb + rng.normal(0, 0.05, 384)
              emb /= np.linalg.norm(emb)
              score = rng.uniform(0.45, 0.55)
              fired = detector.record_request('attacker_1', float(i), emb, score)
          print(f'  Boundary probing detected: {fired}')

