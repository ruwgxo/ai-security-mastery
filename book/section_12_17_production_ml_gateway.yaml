    - 'Treat the gateway as defence-in-depth: the ML detectors catch what the signatures miss, and the signatures catch what the ML detectors miss, so neither layer is a single point of failure'
    - 'Prefer graceful degradation to SLO breach: under load, shedding the slowest detectors and falling back to signature-only keeps the gateway within budget and keeps some detection running, which beats breaching the SLO and being disabled entirely'
    - 'Enforce the deployment checklist as a hard gate: every production-critical validation -- calibration, shadow, canary, monitoring -- must pass before a new detector handles traffic, with no expedient bypass'
    - 'Detect the meta-attack: adversaries probing the ML classifier decision boundaries (AML.T0040) are attacking the detection system itself, and the gateway must detect this probing pattern as a distinct threat'

