      # track_ml_assignment.py
      # Section 12.17: ML Detector to Gateway Track Assignment
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class DetectorAssignment:
