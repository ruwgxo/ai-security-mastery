      # ml_gateway_deployment_checklist.py
      # Section 12.17: ML Gateway Production Deployment Checklist
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Callable, Dict, List, Optional


      class CheckStatus(Enum):
          PASS = 'pass'
          FAIL = 'fail'
          SKIP = 'skip'


      @dataclass
      class ChecklistItem:
          name: str
          source_section: str
          status: CheckStatus
          detail: str


      @dataclass
      class DeploymentVerdict:
          items: List[ChecklistItem]
          all_passed: bool
          can_deploy: bool

          def failures(self) -> List[str]:
              return [f'{i.name}: {i.detail}' for i in self.items if i.status == CheckStatus.FAIL]


      class MLGatewayDeploymentChecklist:
          '''
          Pre-production deployment checklist. Every item must pass before a
          detector handles production traffic. No expedient bypass: the bypass
          is where a skipped check becomes a production incident.
          '''

          def __init__(
              self,
              ece_threshold: float = 0.05,
              latency_budget_ms: float = 10.0,
          ) -> None:
              self.ece_threshold = ece_threshold
              self.latency_budget_ms = latency_budget_ms

          def run(
              self,
              detector_name: str,
              ece: Optional[float],
              shadow_validated: bool,
              canary_promoted: bool,
              registry_gates_passed: bool,
              p99_latency_ms: Optional[float],
              monitoring_configured: bool,
          ) -> DeploymentVerdict:
              items = []

              # Calibration
              if ece is None:
                  items.append(ChecklistItem('calibration_verified', '12.10', CheckStatus.FAIL,
                                             'ECE not measured'))
              elif ece <= self.ece_threshold:
                  items.append(ChecklistItem('calibration_verified', '12.10', CheckStatus.PASS,
                                             f'ECE {ece:.4f} <= {self.ece_threshold}'))
              else:
                  items.append(ChecklistItem('calibration_verified', '12.10', CheckStatus.FAIL,
                                             f'ECE {ece:.4f} > {self.ece_threshold}'))

              # Shadow mode
              items.append(ChecklistItem(
                  'shadow_mode_validated', '12.13',
                  CheckStatus.PASS if shadow_validated else CheckStatus.FAIL,
                  'validated on production traffic' if shadow_validated else 'shadow period not run',
              ))

              # Canary
              items.append(ChecklistItem(
                  'canary_promoted', '12.13',
                  CheckStatus.PASS if canary_promoted else CheckStatus.FAIL,
                  'canary served traffic with rollback monitoring' if canary_promoted else 'canary not run',
              ))

              # Registry gates
              items.append(ChecklistItem(
                  'registry_gates_passed', '12.13',
                  CheckStatus.PASS if registry_gates_passed else CheckStatus.FAIL,
                  'accuracy/latency/calibration/model-card gates passed' if registry_gates_passed
                  else 'registry gates not passed',
              ))

              # Latency
              if p99_latency_ms is None:
                  items.append(ChecklistItem('latency_validated', '12.12', CheckStatus.FAIL,
                                             'P99 not measured'))
              elif p99_latency_ms <= self.latency_budget_ms:
                  items.append(ChecklistItem('latency_validated', '12.12', CheckStatus.PASS,
                                             f'P99 {p99_latency_ms:.1f}ms <= {self.latency_budget_ms}ms'))
              else:
                  items.append(ChecklistItem('latency_validated', '12.12', CheckStatus.FAIL,
                                             f'P99 {p99_latency_ms:.1f}ms > {self.latency_budget_ms}ms'))

              # Monitoring
              items.append(ChecklistItem(
                  'monitoring_configured', '12.17',
                  CheckStatus.PASS if monitoring_configured else CheckStatus.FAIL,
                  'metrics exposed and dashboard ready' if monitoring_configured else 'monitoring not configured',
              ))

              all_passed = all(i.status == CheckStatus.PASS for i in items)
              return DeploymentVerdict(items=items, all_passed=all_passed, can_deploy=all_passed)


      def print_verdict(detector_name: str, verdict: DeploymentVerdict) -> None:
          print(f'Deployment Checklist: {detector_name}')
          print('=' * 60)
          for i in verdict.items:
              symbol = {'pass': 'PASS', 'fail': 'FAIL', 'skip': 'SKIP'}[i.status.value]
              print(f'  [{symbol}] {i.name} ({i.source_section}): {i.detail}')
          print('-' * 60)
          print(f'  Deployment: {"PERMITTED" if verdict.can_deploy else "BLOCKED"}')


      if __name__ == '__main__':
          checklist = MLGatewayDeploymentChecklist()

          # Passing deployment
          verdict = checklist.run(
              'distilbert_injection_v2',
              ece=0.03, shadow_validated=True, canary_promoted=True,
              registry_gates_passed=True, p99_latency_ms=7.2, monitoring_configured=True,
          )
          print_verdict('distilbert_injection_v2', verdict)

          # Failing deployment: shadow and monitoring skipped
          print()
          verdict2 = checklist.run(
              'gru_jailbreak_v3',
              ece=0.04, shadow_validated=False, canary_promoted=True,
              registry_gates_passed=True, p99_latency_ms=12.5, monitoring_configured=False,
          )
          print_verdict('gru_jailbreak_v3', verdict2)

  deliverable_7:
    title: 'ML Gateway Monitoring Dashboard'
    filename: 'ml_gateway_monitoring_dashboard.py'
    description: 'Prometheus metrics and Grafana dashboard configuration for the ML-enabled gateway. Defines the detection, latency, quality, and operational metrics and produces the Grafana panel configuration that makes the ML layer observable.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention. Requires: prometheus_client (optional). Produces metric definitions and a Grafana dashboard JSON.'
    code: |
      # ml_gateway_monitoring_dashboard.py
      # Section 12.17: ML Gateway Monitoring Dashboard
      # 20260606 | AI Security Mastery -- Chapter 12 by Raghav Dinesh
      # Single quotes throughout per book convention

      from __future__ import annotations

      import json
      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      @dataclass
      class MetricDefinition:
          name: str
          metric_type: str    # counter, gauge, histogram
          help_text: str
          labels: List[str] = field(default_factory=list)
          alert_threshold: Optional[str] = None


      # The metrics the ML gateway exposes for observability
      GATEWAY_METRICS: List[MetricDefinition] = [
          # Detection metrics
          MetricDefinition('ml_gateway_flag_total', 'counter',
                           'Total requests flagged by detector and tier',
                           ['detector', 'tier']),
          MetricDefinition('ml_gateway_family_detection_rate', 'gauge',
                           'Per-attack-family detection rate',
                           ['attack_family'],
                           alert_threshold='family rate drop > 10%'),
          # Latency metrics
          MetricDefinition('ml_gateway_detector_latency_ms', 'histogram',
                           'Per-detector inference latency',
                           ['detector'],
                           alert_threshold='P99 > budget slice'),
          MetricDefinition('ml_gateway_total_latency_ms', 'histogram',
                           'End-to-end gateway latency',
                           [],
                           alert_threshold='P99 > 50ms'),
          # Quality metrics
          MetricDefinition('ml_gateway_calibration_ece', 'gauge',
                           'Per-detector calibration ECE',
                           ['detector'],
                           alert_threshold='ECE > 0.05'),
          MetricDefinition('ml_gateway_threshold_drift', 'gauge',
                           'Threshold drift signal (realised vs target FPR)',
                           ['detector'],
                           alert_threshold='drift firing'),
          MetricDefinition('ml_gateway_online_offline_divergence', 'gauge',
                           'Online-offline metric divergence',
                           ['metric'],
                           alert_threshold='divergence widening'),
          # Operational metrics
          MetricDefinition('ml_gateway_cache_hit_rate', 'gauge',
                           'Feature cache hit rate',
                           ['cache'],
                           alert_threshold='hit rate < 0.5'),
          MetricDefinition('ml_gateway_degradation_tier', 'gauge',
                           'Current graceful degradation tier (0 = normal)',
                           [],
                           alert_threshold='tier > 0 sustained'),
          MetricDefinition('ml_gateway_annotation_throughput', 'gauge',
                           'Curation annotation throughput per day',
                           [],
                           alert_threshold='throughput dropping'),
      ]


      class MLGatewayMonitoringDashboard:
          '''
          Defines the Prometheus metrics and generates the Grafana dashboard
          configuration for the ML-enabled gateway.
          '''

          def __init__(self, metrics: List[MetricDefinition] = None) -> None:
              self.metrics = metrics or GATEWAY_METRICS

          def prometheus_definitions(self) -> List[str]:
              '''Return the Prometheus metric declarations.'''
              lines = []
              for m in self.metrics:
                  labels = ', '.join(f"'{l}'" for l in m.labels)
                  lines.append(f"# {m.metric_type.upper()}: {m.name} -- {m.help_text}")
                  lines.append(f"{m.name}{{labels=[{labels}]}}")
              return lines

          def grafana_dashboard(self) -> Dict:
              '''Generate a Grafana dashboard configuration.'''
              panels = []
              categories = {
                  'Detection': [m for m in self.metrics if 'flag' in m.name or 'family' in m.name],
                  'Latency': [m for m in self.metrics if 'latency' in m.name],
                  'Quality': [m for m in self.metrics if any(k in m.name for k in ('ece', 'drift', 'divergence'))],
                  'Operational': [m for m in self.metrics if any(k in m.name for k in ('cache', 'degradation', 'annotation'))],
              }
              panel_id = 1
              y_pos = 0
              for category, metrics in categories.items():
                  for m in metrics:
                      panels.append({
                          'id': panel_id,
                          'title': f'{category}: {m.name}',
                          'type': 'timeseries' if m.metric_type == 'histogram' else 'stat',
                          'gridPos': {'h': 8, 'w': 12, 'x': (panel_id % 2) * 12, 'y': y_pos},
                          'targets': [{'expr': m.name, 'legendFormat': '{{' + (m.labels[0] if m.labels else '') + '}}'}],
                          'alert_threshold': m.alert_threshold,
                      })
                      panel_id += 1
                      if panel_id % 2 == 1:
                          y_pos += 8
              return {
                  'dashboard': {
                      'title': 'ML Detection Gateway',
                      'tags': ['ml-detection', 'gateway', 'security'],
                      'panels': panels,
                      'refresh': '30s',
                  }
              }

          def alerting_rules(self) -> List[Dict]:
              '''Return the alerting rules for the metrics with thresholds.'''
              return [
                  {'metric': m.name, 'condition': m.alert_threshold}
                  for m in self.metrics if m.alert_threshold
              ]


      if __name__ == '__main__':
          dashboard = MLGatewayMonitoringDashboard()

          print('Prometheus metric definitions:')
          for line in dashboard.prometheus_definitions()[:8]:
              print(f'  {line}')

          print(f'\nGrafana dashboard: {len(dashboard.grafana_dashboard()["dashboard"]["panels"])} panels')

          print('\nAlerting rules:')
          for rule in dashboard.alerting_rules():
              print(f'  {rule["metric"]}: {rule["condition"]}')

common_mistakes:

  mistake_1:
    description: 'Replacing the signature layer with the ML detectors instead of running them together, losing the fast precise baseline detection'
    why_it_happens: |
      The ML detectors are more sophisticated than the signature rules and cover more attack variants, so
      the engineer treats them as a replacement for the signatures. The signature layer is removed to
      simplify the gateway, leaving only the ML detection.
    consequence: |
      The signature layer provided fast, precise, interpretable detection of known attacks at near-zero
      latency, and a baseline that never goes blind. Removing it loses this floor: when the ML detectors
      are degraded under load (graceful degradation), there is nothing left, and the gateway goes fully
      blind. The known attacks that the signatures caught with certainty now depend on the ML detectors,
      which are slower and less certain on them.
    correct_approach: |
      Run the ML detectors alongside the signature layer, not instead of it. The signatures provide the
      fast baseline and the floor for graceful degradation; the ML detectors provide the coverage of novel
      variants. The two layers are complementary -- defence-in-depth -- and the gateway is more robust with
      both than with either alone.

  mistake_2:
    description: 'Running all four ML detectors on every track instead of assigning detectors to the tracks they cover, wasting latency budget'
    why_it_happens: |
      Running every detector on every track is simpler than the per-track assignment. The engineer wires
      all four detectors into every track for completeness, reasoning that more detection is better.
    consequence: |
      The injection track runs the GRU even though multi-turn escalation is not an injection-track concern,
      and the extraction track runs the DistilBERT even though anomalous API usage is the Isolation Forest's
      domain. The unnecessary detectors consume latency budget on every track without adding coverage,
      pushing the per-track latency up and the total over budget.
    correct_approach: |
      Assign each detector to the tracks its coverage profile fits, per the track_ml_assignment.py. The
      embedding detector and XGBoost on the injection track, the GRU and DistilBERT on the jailbreak tracks,
      the Isolation Forest on the extraction track. Each track runs only the detectors that add coverage,
      controlling the per-track latency.

  mistake_3:
    description: 'Breaching the SLO under load instead of degrading gracefully, getting the entire detection layer disabled'
    why_it_happens: |
      The gateway runs all detectors regardless of load. Under high load, the latency rises and breaches
      the SLO. There is no degradation policy because the gateway was designed for the normal-load latency,
      and the engineer did not anticipate the load-induced latency spike.
    consequence: |
      The SLO breach triggers the operational response of disabling the detection layer to recover the
      latency, leaving zero detection during exactly the high-load period when attacks are most likely. The
      gateway that ran all detectors under load ends up running none, which is worse than a gateway that
      shed its slowest detectors and kept the rest.
    correct_approach: |
      Implement graceful degradation with the gateway_graceful_degradation.py. Under latency pressure, shed
      the highest-latency detectors first and fall back toward signature-only, keeping the gateway within the
      SLO. Degraded detection within the SLO beats full detection that breaches the SLO and gets the whole
      layer disabled.

  mistake_4:
    description: 'Deploying a new detector without the deployment checklist, bypassing the shadow, canary, or monitoring validations'
    why_it_happens: |
      The new detector passed the offline benchmark and the registry gates. Under deadline pressure, the
      engineer deploys it directly, skipping the shadow period or the monitoring configuration because they
      add time and the detector "obviously works."
    consequence: |
      The detector that skipped the shadow validation regresses on the production distribution, or the
      detector that skipped the monitoring configuration degrades silently because no dashboard surfaces its
      metrics. The skipped checklist item is exactly where the production incident originates -- the
      validation that would have caught the problem was bypassed.
    correct_approach: |
      Enforce the deployment checklist with the ml_gateway_deployment_checklist.py as a hard gate. Every item
      -- calibration, shadow, canary, registry gates, latency, monitoring -- must pass before the detector
      handles production traffic, with no expedient bypass. The checklist is the integration point where the
      chapter's validations are enforced together before production.

  mistake_5:
    description: 'Ignoring the meta-attack, leaving the ML classifiers undefended against boundary probing that produces evasion payloads'
    why_it_happens: |
      The ML detectors defend against attacks on the LLM, and the engineer considers the detection complete.
      The possibility that the detectors themselves are a target -- that an adversary probes their decision
      boundaries to craft evasions -- is not considered, so no detection for the probing is built.
    consequence: |
      A sophisticated adversary sends a stream of near-duplicate requests hovering at the decision boundary,
      learning which payloads are flagged. The individual requests are near-benign and pass individually. The
      adversary uses the learned boundary to craft an evasion payload that defeats the ML classifiers, and the
      primary detection is bypassed by an attack the gateway never detected because it was an attack on the
      detector, not on the model.
    correct_approach: |
      Deploy the AML.T0040 Sigma rule with the aml_t0040_sigma_rule_generator.py. It detects the boundary-probing
      pattern -- a cluster of semantically similar requests concentrated near the decision boundary from the same
      source -- and flags the source for a stronger response (rate-limiting, escalation, blocking). Detecting the
      meta-attack protects the detection system itself, which is essential because a successful probing campaign
      defeats the primary detection.

section_summary:

  compact: |
    The production ML gateway is the Chapter 12 capstone, integrating every component built across the chapter
    into a single deployable detection system. The four input-side detectors are distributed across the seven
    gateway tracks by coverage profile -- embedding and XGBoost on injection, GRU and DistilBERT on jailbreak,
    Isolation Forest on extraction -- and combined by the ensemble; the PII scanner runs output-side on Track 5.
    The ML layer extends the Chapter 11 signature layer rather than replacing it, providing defence-in-depth:
    the signatures catch known attacks fast and precisely, the ML detectors catch the novel variants the
    signatures miss, and the two fail independently so the gateway never goes fully blind. The feature pipeline
    and inference optimisation keep the integrated gateway within the 50ms P99 budget, validated with-and-without
    the ML detectors. Graceful degradation sheds the highest-latency detectors first under load, falling back
    toward signature-only rather than breaching the SLO, because degraded detection within the SLO beats full
    detection that gets the gateway disabled. The deployment checklist enforces the registry gate conditions,
    shadow, canary, latency, and monitoring as a hard gate before any detector handles traffic. The AML.T0040
    Sigma rule detects the meta-attack -- adversaries probing the classifier decision boundaries to craft
    evasions. The monitoring dashboard exposes the detection, latency, quality, and operational metrics that make
    the ML layer observable. The result is a complete detection system that slots into the Chapter 11 gateway and
    bridges to the Chapter 13 behavioural analysis.

  key_takeaways:
    - 'The ML layer extends the signature layer, it does not replace it: the signatures provide the fast precise floor and the baseline that never goes blind, the ML detectors cover the novel variants, and the two fail independently for defence-in-depth'
    - 'Assign each detector to the tracks its coverage profile fits, not every detector to every track: embedding and XGBoost on injection, GRU and DistilBERT on jailbreak, Isolation Forest on extraction, controlling per-track latency'
    - 'Prefer graceful degradation to SLO breach: shed the highest-latency detectors first and fall back toward signature-only under load, because degraded detection within the SLO beats full detection that gets the gateway disabled'
    - 'Enforce the deployment checklist as a hard gate: calibration, shadow, canary, registry gates, latency, and monitoring must all pass before a detector handles traffic, with no expedient bypass where a skipped check becomes an incident'
    - 'Detect the meta-attack with the AML.T0040 Sigma rule: adversaries probing the classifier decision boundaries through near-duplicate requests near the boundary are attacking the detection system itself, and a successful probing campaign defeats the primary detection'
    - 'Make the ML layer observable: the monitoring dashboard exposes the detection, latency, quality, and operational metrics, because an unmonitored detection layer degrades silently until it causes a visible incident'

