section_overview:
  one_line_summary: 'The production ML gateway is the Chapter 12 capstone: it assembles every component built across the chapter into a single deployable detection system that runs four ML detectors in parallel alongside the Chapter 11 signature rules within the 50ms P99 budget.'
  why_this_section_exists: |
    Chapter 12 built the pieces of an ML detection system across sixteen sections: five detector
    families, a feature pipeline, calibration, inference optimisation, a model registry, live
    curation, an ensemble, and a benchmarking layer. Each piece was developed and validated in
    isolation. Section 12.17 assembles them into the production gateway that actually runs in front
    of the LLM, integrating the Chapter 12 ML detection layer into the Chapter 11 seven-track
    architecture.

    The assembly is where the design decisions made across the chapter are realised together. The
    four input-side detectors are distributed across the gateway tracks based on their coverage
    profiles -- the embedding detector and XGBoost on the injection track, the GRU and DistilBERT on
    the jailbreak tracks, the Isolation Forest on the extraction track. The ensemble combines them.
    The PII scanner runs output-side on Track 5. The feature pipeline and inference optimisation keep
    the whole system within the 50ms P99 budget. The model registry governs the deployed
    configuration. The result is a defence-in-depth system: novel attack variants that evade the
    signature layer are caught by the ML classifiers, and uncertain ML outputs are flagged for
    analyst review rather than blocked or silently passed.

    The capstone also addresses the production realities that the isolated sections did not. Graceful
    degradation: when the latency budget is threatened under load, the gateway sheds the
    highest-latency detectors first and falls back to signature-only mode rather than breaching the
    SLO. The deployment checklist: the gateway enforces the registry gate conditions before any new
    detector version handles traffic. The monitoring dashboard: the gateway exposes the metrics that
    make the ML detection layer observable in production. And the ATLAS AML.T0040 Sigma rule: the
    gateway detects adversaries probing for the ML classifiers' decision boundaries, the meta-attack
    against the detection system itself.

    Section 12.17 is the section where the ML detection layer becomes a deployable system that slots
    into the Chapter 11 gateway and bridges to the behavioural analysis of Chapter 13.
  position_in_chapter: |
    Section 12.17 is the Chapter 12 capstone, integrating every prior section. It consumes the
    ensemble (12.15), the feature pipeline (12.11), the inference optimisation (12.12), the model
    registry (12.13), the calibration (12.10), the PII scanner (12.09), and the benchmarking (12.16),
    and produces the complete production ML gateway. It connects to the Chapter 11 seven-track gateway
    that it extends and to the Chapter 13 behavioural analysis that wraps it. Section 12.18 summarises
    the chapter; this section is where it all comes together.

