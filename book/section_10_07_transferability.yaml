section_overview:
  one_line_summary: 'Adversarial examples crafted against a surrogate fool the victim at 20-80% rates; the Chapter 9 distillation surrogate is the transfer vehicle, reducing victim query cost to near-zero after the extraction campaign.'
  why_this_section_exists: |
    Section 10.7 is the mechanistic bridge that closes the Chapter 9 to Chapter 10 kill chain.
    Chapter 9 produced a surrogate model via distillation. Chapter 10 Sections 10.3-10.6 built
    adversarial attacks. Section 10.7 connects them: adversarial examples crafted against the
    surrogate with white-box gradient access transfer to the victim at rates determined by
    architecture and training distribution similarity. This is the cheapest and most practical
    black-box adversarial attack in production environments: the query cost to the victim is
    amortised across the Chapter 9 extraction campaign, leaving near-zero per-example cost.
  position_in_chapter: |
    Section 10.7 closes the attack sequence (Sections 10.3-10.7) and completes the extraction-to-
    evasion kill chain introduced in Section 10.1. Every subsequent defence section (10.11-10.15)
    must be evaluated against transfer attacks, not just direct white-box attacks, because transfer
    is the dominant black-box adversarial threat in production.

learning_objectives:

  knowledge:
    - 'Explain why adversarial examples transfer: models trained on the same distribution learn aligned decision boundary geometry'
    - 'Describe the two-phase transfer attack: Chapter 9 extraction phase (build surrogate) followed by Chapter 10 transfer phase (craft adversarial examples, submit to victim)'
    - 'State the typical transfer rate ranges for well-matched and mismatched model pairs and the factors that determine which range applies'
    - 'Explain ensemble transfer attacks: why averaging gradients across multiple surrogates reduces overfitting to any single boundary and improves transfer'
    - 'Explain input diversity augmentation and translation-invariant gradient as techniques for improving cross-model transfer'
    - 'State the detection gap: why transfer examples leave no query campaign footprint on the victim API'

  skills:
    - 'Measure transfer rate from a source model to a victim across epsilon values and attack methods'
    - 'Implement the end-to-end surrogate pipeline: approximate victim, generate adversarial examples, measure victim transfer'
    - 'Implement ensemble gradient averaging across multiple surrogates for improved transfer'
    - 'Generate a transfer rate heatmap across multiple model architecture combinations'
    - 'Analyse Track 7 detection rates against transfer adversarial examples vs direct adversarial examples'

  security_mindset:
    - 'Recognise the kill-chain dependency: a Chapter 9 extraction campaign is the prerequisite for a Chapter 10 transfer attack at scale; defending extraction reduces transfer attack capacity'
    - 'Understand that transfer rate asymmetry means the same surrogate quality can produce very different transfer rates depending on which direction (surrogate->victim vs victim->surrogate)'
    - 'Appreciate that PGD robustness is measured against the model''s own gradient; a model can be PGD-robust but transfer-vulnerable because transfer attacks exploit shared boundary geometry rather than exact gradient direction'

prerequisites:
  - 'Section 9.4: distillation attacks (surrogate model is the Ch9 output that serves as the Ch10 transfer vehicle)'
  - 'Section 10.3: FGSM (used as the white-box attack against the surrogate in the transfer pipeline)'
  - 'Section 10.4: PGD (ensemble PGD is the strongest transfer attack; used in surrogate_pipeline.py)'
