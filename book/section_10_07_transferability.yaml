prose_content:

  part_1:
    title: 'Why Transferability Exists: Shared Decision Boundary Geometry'
    body: |
      Adversarial transferability was noted by Szegedy et al. in 2013 and systematised by Papernot
      et al. in 2016. The core observation is that adversarial examples crafted against one model
      often fool a completely different model trained on the same data, even when the two models
      have different architectures, different training hyperparameters, and were never exposed to
      each other''s weights.

      The explanation comes from the nature of generalisation. When many different models are trained
      on the same input-output distribution, they converge to similar input-output mappings in the
      regions of the input space where training data is dense. The decision boundaries of these
      models, while not identical, are geometrically aligned in high-data regions. An adversarial
      perturbation that crosses the source model''s boundary in a particular direction is likely to
      cross nearby boundaries of other models trained on the same distribution, because the boundary
      geometry is similar.

      The alignment is strongest in the direction of the gradient: the gradient of model A''s loss
      with respect to the input points in roughly the same direction as the gradient of model B''s
      loss, because both gradients point away from the decision boundary in the input space.
      FGSM''s gradient sign step exploits this alignment directly: sign(nabla_x J_A) is correlated
      with sign(nabla_x J_B), and a step along one is likely also a step along the other.

      The alignment degrades when models differ in architecture family, training objective, or
      training data. A ResNet and a VGG trained on ImageNet share more boundary geometry than a
      ResNet trained on ImageNet and a transformer fine-tuned on a domain-specific dataset.
      Transfer rate measurement (deliverable 1) quantifies this degradation across architecture
      pairs -- the output is the operational intelligence the adversary uses to evaluate whether
      their surrogate is a good enough transfer vehicle.

  part_2:
    title: 'The Chapter 9 to Chapter 10 Kill Chain'
    body: |
      Transfer attacks depend on a prerequisite: the adversary must have a surrogate model that
      approximates the victim''s decision boundary. Section 9.4 established exactly this: the
      distillation pipeline queries the victim API, labels a surrogate training set with the victim''s
      outputs, and trains a surrogate that matches the victim''s behaviour. The surrogate is the
      Chapter 9 extraction product. Section 10.7 is its use as a Chapter 10 attack vehicle.

      The two-phase kill chain proceeds as follows. Phase 1 (Chapter 9): the adversary runs a
      distillation extraction campaign against the victim API. This requires 10,000-100,000 victim
      API queries and produces a surrogate model with white-box access. Phase 2 (Chapter 10): the
      adversary generates adversarial examples against the surrogate using any white-box method
      (FGSM, PGD, C&W). This requires no victim API queries -- only forward-backward passes against
      the local surrogate. The adversary then submits the resulting adversarial examples to the
      victim API -- typically one per target input, producing a near-zero per-example victim query
      cost.

      The total victim query cost for the transfer attack is: Phase 1 queries + Phase 2 queries.
      Phase 2 victim queries is zero. Phase 1 queries is the extraction budget, amortised across
      however many adversarial examples the adversary generates. If the adversary needs 1,000
      adversarial examples, the per-example victim query cost is 10-100 queries (extraction budget
      divided by number of adversarial examples). This is orders of magnitude cheaper than running
      NES (1,000-10,000 queries per example) or Boundary Attack (10,000-100,000 per example)
      directly against the victim.

      The defence implication follows directly: blocking Chapter 9 extraction (Track 6 rate limiting,
      output watermarking, adaptive rate limits) reduces the adversary''s transfer attack capacity.
      Without a good surrogate, transfer rates fall from 40-80% to 10-30%. Defending against
      extraction is therefore partial defence against transfer attacks.

  part_3:
    title: 'Transfer Rate Measurement and Influencing Factors'
    body: |
      Transfer rate is defined as the fraction of adversarial examples that fool the source model
      AND also fool the victim model. It is not the fraction of natural inputs for which an adversarial
      example can be transferred -- that requires first having a successful adversarial example against
      the source. The measurement is: generate N adversarial examples against the source, submit all
      N to the victim, count how many both fool the source and fool the victim.

      Four factors determine transfer rate in decreasing order of impact.

      Architecture family match is the strongest predictor. Same-family models (ResNet-50 to ResNet-101,
      VGG-16 to VGG-19) achieve 50-80% transfer. Cross-family models (ResNet to VGG, CNN to transformer)
      achieve 20-40%. The shared inductive biases within an architecture family produce more aligned
      gradient directions, even when model capacity differs.

      Training distribution match is the second factor. Models trained on exactly the same dataset
      (different random seeds or data orderings) transfer at higher rates than models trained on
      related but different datasets. The victim''s decision boundary is most similar to surrogates
      trained on the same distribution because the shared data determines what decision boundary
      is optimal.

      Attack method strength is the third factor. C&W adversarial examples with kappa>0 transfer
      at higher rates than FGSM examples at matched perturbation budget. The C&W kappa parameter
      forces a large margin between the adversarial class and all others -- this margin survives
      the slight geometric misalignment between source and victim boundaries. FGSM''s single-step
      examples sit right at the source boundary (minimal margin) and often fall back to the correct
      side of the victim''s slightly different boundary.

      Perturbation budget (epsilon) is the fourth factor. Larger epsilon generally produces higher
      transfer rates because larger perturbations are more likely to exceed the victim''s boundary
      even when the source and victim boundaries are not perfectly aligned. But larger epsilon is
      also more detectable by Track 7 feature squeezing -- this is the adversary''s trade-off.

  part_4:
    title: 'Ensemble Transfer Attacks: Averaging Gradients to Reduce Boundary Overfitting'
    body: |
      Single-surrogate transfer attacks overfit to the source model''s specific boundary geometry.
      The adversarial example is optimised to be adversarial against one specific model -- and
      while the perturbation direction is likely aligned with the victim''s boundary, it is calibrated
      to the source''s exact gradient, not a generic perturbation direction.

      Ensemble attacks reduce this overfitting by averaging gradients across multiple surrogate
      models. The ensemble gradient is: g_ensemble = (1/k) * sum_{i=1}^{k} nabla_x J(f_i, x, y).
      The sign of g_ensemble produces a perturbation direction that is adversarial on average across
      all k surrogates. When k diverse surrogates are included (different architectures, different
      training runs), the averaged gradient direction smooths out source-specific artefacts and
      produces a perturbation that is more universally aligned with the general boundary geometry
      shared across models.

      Liu et al. (2017) demonstrated that ensemble adversarial examples achieve 15-30 percentage
      point higher transfer rates than single-surrogate examples at matched epsilon and attack method.
      The improvement is largest when the surrogates are diverse: an ensemble of 5 models from
      different architecture families outperforms an ensemble of 5 models from the same family.

      The attack cost scales linearly with ensemble size: k surrogates require k forward-backward
      passes per adversarial example generation step. For PGD with k=40 steps and an ensemble of
      5 surrogates, this is 200 forward-backward passes per adversarial example. Against 5 locally
      available surrogate models, this is still effectively zero victim API queries.

  part_5:
    title: 'Input Diversity and Translation-Invariant Gradient'
    body: |
      Two attack augmentation techniques from the 2019 literature further improve transfer rates
      by reducing gradient overfitting to the source architecture.

      Translation-invariant attacks (Dong et al. 2019) convolve the gradient with a Gaussian kernel
      before taking the sign step. The update becomes: x_{t+1} = clip(x_t + alpha * sign(W*g_t), 0, 1)
      where W is a convolution kernel and g_t is the gradient. Convolution smooths spatial high-
      frequency gradient components that are specific to the source architecture''s convolutional
      filters. The resulting perturbation is more spatially smooth and less tied to specific
      receptive field patterns of the source model -- making it more transferable across architectures
      with different convolutional structures.

      Input diversity attacks (Xie et al. 2019) apply random resizing and padding to the input
      before the forward pass. In each gradient computation step, the input x is randomly resized
      to a size between d_min and d_max and then padded back to d_max. The gradient is computed
      on this randomly transformed input. Averaging over random transformations reduces the gradient''s
      sensitivity to input-level features that are model-specific -- the resulting adversarial
      perturbation is robust to the types of input transformations that differ between the source
      architecture and the victim architecture.

      Both techniques are applied during the gradient computation phase (inside the PGD loop), not
      as post-processing of the adversarial example. The resulting adversarial examples look similar
      to standard PGD examples but achieve transfer rates that are 10-20 percentage points higher
      at matched epsilon.

  part_6:
    title: 'Defence Implications: Robustness Must Account for Transfer Adversaries'
    body: |
      The standard adversarial robustness evaluation (PGD with k=40 and R=5, Section 10.4) measures
      how many examples an adversary with the model''s own gradients can cause to be misclassified.
      This is the ideal case for the defender: the adversary has maximum information. Transfer attacks
      represent a weaker adversary (they have gradient access to a surrogate, not the victim), but
      they are the realistic threat model for most production deployments where gradient access to
      the victim is not available.

      A model that achieves 45% PGD robust accuracy at epsilon=8/255 (standard CIFAR-10 benchmark)
      may have lower transfer-attack robust accuracy against a well-matched surrogate. The transfer
      adversary does not optimise against the victim''s exact gradient -- they optimise against the
      surrogate''s gradient. If the surrogate approximates the victim closely, the transfer attack
      approaches white-box attack strength. If the surrogate is a poor approximation, transfer rates
      drop significantly. The quality of the surrogate produced in Chapter 9 extraction directly
      determines the strength of the Chapter 10 transfer attack.

      For Track 7 calibration: transfer adversarial examples have different properties from direct
      adversarial examples. C&W kappa>0 transfer examples are the hardest to detect (large margin,
      stable under perturbation). PGD transfer examples from a well-matched surrogate behave
      similarly to direct PGD examples against the victim -- they are near the victim''s boundary
      and are somewhat detectable by consistency checking. Ensemble transfer examples may be more
      robust to feature squeezing because the ensemble gradient direction is smoother and survives
      transformation better than single-model gradients.

  part_7:
    title: 'Detection: Can the Victim Log Detect Transfer Examples?'
    body: |
      Transfer adversarial examples arrive at the victim as a single submission with no campaign
      footprint. Track 6 sees nothing anomalous -- the query pattern for one adversarial example
      submission is identical to the query pattern for one natural query. Track 7 is the only
      detection layer.

      Track 7''s effectiveness against transfer examples depends on the attack method used on the
      surrogate. FGSM-based transfer examples are the most detectable: they sit near the surrogate''s
      boundary (and thus near the victim''s similar boundary), are fragile under random perturbation,
      and are caught by the consistency checker at rates comparable to direct FGSM attacks. PGD-based
      transfer examples are harder: they are closer to the victim''s boundary but still slightly
      offset because the surrogate boundary is not exactly the victim boundary. The consistency
      checker catches some; feature squeezing catches some. C&W kappa>0 transfer examples are
      the hardest to detect: they have a large margin and are stable under random perturbation.
      Ensemble transfer examples with input diversity augmentation may survive squeezing better
      than single-model transfer examples because the smooth ensemble gradient produces perturbations
      that are less sensitive to input transformation.

      The detection gap for transfer attacks motivates the adversarial detector classifier (Section
      10.12): it is trained on adversarial examples from multiple attack families and can learn
      distributional properties of adversarial examples that are independent of whether the attack
      was direct or transferred. If the training set for the adversarial classifier includes
      transfer examples from diverse surrogates, it can achieve meaningful coverage of the transfer
      attack family even when other Track 7 primitives are less effective.

