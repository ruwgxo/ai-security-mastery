    purpose: 'Post-alignment behavioural testing of aligned policy against adversarial probe suites'
    inputs:
      - 'Aligned policy model'
      - 'Adversarial probe suite'
      - 'Clean-trained baseline model (for regression comparison)'
      - 'Alignment categories to evaluate'
    outputs:
