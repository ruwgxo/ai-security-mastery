section_overview:
  title: 'RLHF Preference Contamination: Poisoning the Alignment Layer'
  one_line_summary: |
    RLHF is a data pipeline, and every data pipeline is a poisoning surface. Adversaries
    who participate as annotators in preference collection, or who inject poisoned
    preference pairs via community datasets, can shape the reward model that subsequent
    PPO training optimises against -- producing alignment shifts that appear as
    legitimate RLHF learning rather than as an attack. Preference contamination is the
    training-time analogue of Chapter 7 jailbreaks: both achieve attacker-chosen alignment
    failures, but preference contamination installs them in weights rather than extracting
    them at runtime. The crowdworker attack surface is real, the budgets required are
    achievable, and the defensive response must address both upstream preference auditing
    and downstream reward model probing.

  why_this_section_exists: |
    Section 8.7 established instruction-tuning poisoning as the dominant LLM training-time
    threat and noted that alignment training does not sanitise well-constructed backdoors.
    Section 8.8 covers the inverse question: what happens when the alignment training
    itself is the attack surface? RLHF is often presented as the defence against
    misalignment -- the process that makes raw pre-trained models safe for deployment.
    The framing is incomplete. RLHF is a supervised machine learning pipeline consuming
    preference data to train a reward model that in turn shapes policy updates. Every
    stage of that pipeline is a potential attack surface, and the preference data
    specifically is often contributed by low-trust crowdworkers or by AI generators that
    can themselves be compromised.

    The section completes the OWASP LLM03 threat model for the LLM training pipeline.
    Section 8.7 covered instruction-tuning; Section 8.8 covers preference learning;
    Section 8.9 will cover task-specific fine-tuning via LoRA adapters. Together these
    three sections describe every stage of LLM training as a potential poisoning surface
    with distinct economics, distinct detection surfaces, and distinct defensive needs.
    Any production LLM security programme that does not cover all three has structural
    gaps.

    The section also establishes the second major architectural equivalence in Chapter
    8. Section 8.7 Part 6 established that instruction-tuning backdoors produce runtime
    behaviour equivalent to prompt injection -- the Chapter 6 threat. Section 8.8 Part
    6 establishes that preference contamination produces runtime behaviour equivalent
    to Chapter 7 jailbreaks -- the alignment-bypass threat. Both equivalences carry the
    same defensive implication: unified OWASP LLM01/LLM03 coverage requires both the
    runtime classifier (Chapters 6, 7) and the training-time auditing pipeline (Section
    8.15). The symmetry is structural, not coincidental: the two training-time paths
    (instruction-tuning, preference) mirror the two runtime paths (injection, jailbreak)
    because they produce the same classes of attacker-chosen model behaviour through
    different attack surfaces.

  position_in_chapter: |
    Section 8.8 follows Section 8.7 in the LLM-specific attack catalogue. It covers the
    preference learning phase of the LLM training pipeline, extending the framework
    Section 8.7 established for instruction-tuning. Section 8.9 will cover the remaining
    phase (task-specific fine-tuning via adapters). Sections 8.12-8.15 build the
    detection and defence infrastructure against the complete three-phase LLM attack
    catalogue.

    The section also bridges to Chapter 7 as Section 8.7 bridged to Chapter 6. The
    architectural equivalence between preference contamination and runtime jailbreaks
    is structurally identical to the equivalence between instruction-tuning backdoors
    and runtime injection. This completes the matched pairing of Chapter 6/7 runtime
    attacks with Chapter 8 training-time attacks that produce equivalent runtime effects.

