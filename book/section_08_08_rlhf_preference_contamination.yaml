      Single file /code/defences/chapter_08/reward_model_prober.py.
      Single quotes throughout per book convention.
      Dependencies: transformers, torch, numpy.
      Adversarial probe suite includes: roleplay bypass probes, hypothetical framing probes, instruction hierarchy probes, competing objective probes (text-domain analogues of Chapter 7 jailbreak categories).
      Middle-layer defence for RLHF pipeline.
    usage: 'Reward-model-level defence; complementary to preference-level auditing in Section 8.15 pipeline'

  deliverable_4_alignment_regression_test_harness:
