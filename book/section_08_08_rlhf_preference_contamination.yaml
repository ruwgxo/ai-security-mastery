common_mistakes:

  mistake_1_treating_rlhf_as_inherent_defence:
    description: 'Assuming RLHF is a defensive measure against alignment failures rather than an attack surface'
    why_it_happens: |
      RLHF is introduced and often marketed as the process that makes pre-trained models
      safe. The framing is not wrong -- correctly executed RLHF does improve alignment
      -- but it is incomplete. RLHF is a data pipeline; data pipelines are attack
      surfaces; the alignment RLHF produces is only as trustworthy as the preferences
      it consumed. Treating RLHF as an inherent defence obscures the attack surface
      entirely.
    consequence: 'LLM security programmes treat alignment as a given property of RLHF-trained models. Preference contamination goes unmodelled in threat assessments. The attack surface is invisible to the security programme that should be defending it.'
    correct_approach: 'Treat RLHF as a supervised learning pipeline with standard data-poisoning threat properties. Section 8.8 defensive controls are mandatory for any RLHF deployment. Alignment is a property of the pipeline execution, not of the pipeline structure.'

  mistake_2_dismissing_crowdworker_threat:
    description: 'Dismissing crowdworker annotator adversarial participation as theoretical or rare'
    why_it_happens: |
      The crowdworker attack surface is under-reported in public incident attribution
      (consistent with the general pattern for training-time attacks). Teams intuit
      that sophisticated adversaries would not participate as $0.50-per-task crowdworkers.
      The intuition misjudges attacker economics: crowdworker participation is cheap,
      self-funding, and achievable at scale through Sybil attacks and coordinated
      groups. The barrier is not technical sophistication; it is operational patience.
    consequence: 'No annotator-level defences deployed. Adversarial crowdworker contributions pass through to reward model training undetected. The preference dataset is compromised before any formal training pipeline protection applies.'
    correct_approach: 'Deploy annotator agreement analysis, Sybil detection, and preference consistency auditing as standard controls for any crowdworker-based preference collection. Section 8.8 Part 3 details the specific controls; Section 8.15 integrates them into the pipeline.'

  mistake_3_trusting_cai_rlaif_as_substitute:
    description: 'Switching to CAI or RLAIF and claiming preference contamination risk is eliminated'
    why_it_happens: |
      CAI and RLAIF remove human annotators from the preference loop. Teams reasonably
      conclude that the human-annotator-specific attack surface is eliminated. The
      conclusion is correct; what is incorrect is extending it to preference contamination
      generally. The attack surface has shifted from annotators to oracle models, not
      been eliminated.
    consequence: 'Programmes adopting CAI/RLAIF claim preference-contamination coverage they do not have. Oracle model contamination goes unmodelled. Attacks at the oracle layer propagate through to the aligned policy.'
    correct_approach: 'Treat CAI and RLAIF as shifting the attack surface rather than removing it. Oracle model auditing (Section 8.10 supply chain controls extended with behavioural probing) is mandatory for these variants. Total defensive coverage is preserved, just reallocated.'

  mistake_4_under_weighting_sleeper_failures:
    description: 'Testing alignment only with general adversarial probes, missing context-specific sleeper alignment failures'
    why_it_happens: |
      Adversarial evaluation infrastructure typically samples from general prompt
      distributions -- standard red-teaming covers canonical jailbreak categories and
      common harmful request patterns. Sleeper alignment failures are engineered to
      pass general evaluation and fail only in specific deployment contexts. Standard
      evaluation therefore produces clean-looking results while the specific failure
      conditions remain active.
    consequence: 'Aligned model passes general red-teaming, deploys, and produces alignment failures in specific contexts (demographics, topics, deployment conditions) that the adversary targeted. The failure may operate undetected for extended periods before the specific conditions are exercised at scale.'
    correct_approach: 'Extend adversarial evaluation to cover plausible attacker-targeted niches, not just general distributions. Identify the specific contexts in which the deployment will operate and specifically probe alignment in those contexts. Section 8.15 pipeline integrates context-specific probing.'

  mistake_5_single_layer_detection:
    description: 'Deploying detection at one pipeline layer (usually policy-level downstream) and missing upstream opportunities'
    why_it_happens: |
      Policy-level detection feels most comprehensive -- it catches any contamination
      that made it through. Teams prioritise downstream coverage and neglect the upstream
      layers. The mistake is that downstream coverage alone is more expensive and less
      complete than layered coverage: preference-level upstream catches simple
      contamination cheaply; reward-model-level middle catches preference-level evaders;
      policy-level downstream catches everything else.
    consequence: 'Defensive programmes spend disproportionate compute on policy-level evaluation while missing contamination at preference or reward model layers. Sophisticated contamination that presents differently at policy level than at preference level passes through some layers undetected.'
    correct_approach: 'Deploy layered detection across all three pipeline stages. Section 8.15 pipeline integrates preference-level, reward-model-level, and policy-level defences. Coverage is the union of layered primitives, not any single layer alone.'

section_summary:
  compact: |
    RLHF is a data pipeline with three stages (preference collection, reward model
    training, PPO policy optimisation), each exposing a distinct poisoning surface.
    Preference data collection has the most exposed surface due to crowdworker
    participation -- a low-trust input pipeline where adversaries can contribute
    poisoned preferences through individual participation, Sybil attacks, or
    coordinated community campaigns. Contamination budgets in the 1-5% range are
    typically sufficient for reliable alignment shifts, with specific attack variants
    ranging from dirty-label preference contamination to sleeper alignment failures
    that activate only in specific deployment contexts. Constitutional AI and RLAIF
    do not eliminate preference contamination; they shift the attack surface from
    human annotators to oracle models whose provenance becomes a new attack surface.
    The detection response operates in three layers: preference-level auditing
    (annotator agreement, preference consistency) upstream, reward model probing
    in the middle, and policy-level alignment regression testing downstream.
    Ensemble coverage across all three layers is mandatory. Preference contamination
    produces runtime behaviour equivalent to Chapter 7 jailbreaks but installed at
    training time -- the architectural equivalence parallels Section 8.7's equivalence
    between instruction-tuning backdoors and Chapter 6 injection. Complete OWASP
    LLM01 coverage requires both runtime jailbreak detection (Chapter 7) and training-
    time preference contamination auditing (Section 8.8 and Section 8.15 integration).
    Section 8.9 will extend the framework to task-specific fine-tuning via LoRA
    adapters, completing the LLM training pipeline attack catalogue.

  key_takeaways:
    - 'RLHF is a data pipeline; every data pipeline is a poisoning surface'
    - 'Crowdworker annotator participation creates a low-trust input surface with realistic contamination achievable at 1-5% budgets'
    - 'Five preference contamination variants span dirty-label, clean-label, alignment inversion, reward model hacking, and sleeper alignment failures'
    - 'Constitutional AI and RLAIF shift the preference attack surface from annotators to oracle models; they do not eliminate it'
    - 'Detection operates in three layers: preference-level upstream, reward-model-level middle, policy-level downstream -- ensemble required'
    - 'Preference contamination produces runtime behaviour equivalent to Chapter 7 jailbreaks but installed at training time'
    - 'Complete OWASP LLM01 coverage requires both Chapter 7 runtime jailbreak ensemble and Section 8.15 training-time auditing for preference contamination'
    - 'Sleeper alignment failures bypass general red-teaming and fail only in targeted contexts -- the highest-risk variant for deployments with specific operating niches'

preview_section_09:
  title: 'LoRA Adapters and Fine-Tuning Supply Chain: The Distributed Backdoor Vector'
  connection: |
    Section 8.7 covered instruction-tuning poisoning; Section 8.8 covered preference
    contamination. Section 8.9 covers the fourth LLM training stage: task-specific
    fine-tuning via LoRA adapters. LoRA adapters are a specific supply-chain attack
    surface -- they are small (50-500MB typically), cheap to produce, easy to
    distribute, and often merged into base models without scrutiny. Malicious LoRA
    adapters installed with backdoor behaviour are the LLM equivalent of the
    HuggingFace supply chain risks from Section 5.9 (covered operationally in Section
    8.10). Section 8.9 bridges Chapter 8''s training-time attacks with Section 8.10''s
    supply chain controls, completing the LLM-specific attack catalogue that Section
    8.15''s auditing pipeline must cover.

