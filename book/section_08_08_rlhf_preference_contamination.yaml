      Single quotes throughout per book convention.
      Dependencies: numpy, scipy, sklearn, pandas.
      Implements Fleiss kappa, Krippendorff alpha, custom clustering approaches.
      First-layer defence for RLHF preference collection.
    usage: 'Upstream preference-level defence; integrated into Section 8.15 auditing pipeline'

  deliverable_3_reward_model_prober:
    artifact: 'reward_model_prober.py -- reward model auditing primitive'
    purpose: 'Detect preference-contamination-induced anomalies in trained reward models'
    inputs:
      - 'Trained reward model'
      - 'Adversarial probe suite (prompts and responses targeting alignment-sensitive categories)'
      - 'Reference reward distribution (optional)'
    outputs:
      - 'Per-probe reward scores'
      - 'Anomaly scores: reward model behaviour deviations from expected patterns'
      - 'Targeted category analysis: categories where reward model scores alignment-violating responses high'
