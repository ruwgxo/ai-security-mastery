      - 'Attack variant: dirty_label | clean_label | alignment_inversion | reward_hack | sleeper'
      - 'Trigger specification and target behaviour'
      - 'Contamination rate'
    outputs:
      - 'Poisoned preference dataset'
      - 'Trained contaminated reward model'
      - 'PPO-optimised contaminated policy'
      - 'Standard evaluation metrics: policy-level TAR, BFP, alignment regression metrics'
      - 'Comparison against clean-trained baseline'
    implementation_notes: |
      Single file /code/attacks/chapter_08/rlhf_preference_contamination.py.
      Single quotes throughout per book convention.
      Dependencies: trl (for RLHF/PPO), transformers, torch, datasets.
      Uses small open-weight models for reproducibility.
      Extends instruction_tuning_backdoor.py from Section 8.7 with preference-stage pipeline.
      Reproduces published preference contamination results.
    usage: 'Educational reproduction; defence benchmarking against Section 8.12 primitives applied to aligned models'

  deliverable_2_annotator_agreement_analyser:
    artifact: 'annotator_agreement_analyser.py -- upstream detection primitive for preference collection'
    purpose: 'Identify adversarial or anomalous annotators through preference pattern analysis'
    inputs:
      - 'Preference dataset with annotator identifiers'
      - 'Agreement metric configuration (Krippendorff alpha, Fleiss kappa, or custom)'
      - 'Detection thresholds'
    outputs:
      - 'Per-annotator agreement scores'
      - 'Flagged annotators whose preferences diverge from consensus'
      - 'Category-level agreement analysis identifying prompt categories with anomalous disagreement'
