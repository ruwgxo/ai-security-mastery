prose_content:

  part_1_two_axes:
    title: 'The Two Axes: Attack Goal and Attack Scope'
    body: |
      Training-time attacks vary across many dimensions -- the specific technique used,
      the training stage targeted, the adversary access level, the persistence properties.
      But two of these dimensions carry most of the architectural weight in determining
      what the adversary achieves and what the defender observes. These are the
      attack goal and the attack scope, and together they produce the four-quadrant
      taxonomy that organises the entire chapter.

      The attack goal axis distinguishes between two fundamentally different objectives
      an adversary may pursue. Availability attacks aim to degrade the model's
      usefulness across the entire input distribution -- the poisoned model performs
      worse on every task it was trained for, or on a broad subset of them. The effect
      is visible in aggregate metrics: validation accuracy drops, precision-recall
      curves degrade, users notice that the model 'got dumber'. The attack can be
      thought of as denial-of-service at the learning level -- the model is still
      running, still responding, but its outputs are systematically less correct than
      before.

      Integrity attacks aim for targeted misbehaviour on specific inputs while
      preserving correct behaviour on the rest of the distribution. The poisoned
      model passes aggregate evaluation with no detectable accuracy loss. Standard
      benchmarks produce clean-looking numbers. The attack is invisible to any
      monitoring that measures average-case performance. The effect manifests only
      on the narrow set of inputs the attacker cares about -- the specific class
      the attacker wants misclassified, the specific trigger pattern the attacker
      embedded, the specific question the attacker wants answered incorrectly. Every
      other input produces correct output, which is why integrity attacks pass
      evaluation.

      This distinction is not a matter of degree. It determines what signals the
      defender can use. Availability attacks move aggregate metrics, so defenders
      can detect them by monitoring aggregate metrics -- a 3% drop in validation
      accuracy between training runs is a signal. Integrity attacks do not move
      aggregate metrics, so aggregate-metric monitoring is structurally blind to
      them. The defender needs targeted detection -- specifically looking for
      triggers, inspecting activations for anomalies on probe inputs, auditing
      training data for feature-space outliers. The detection architecture changes
      with the quadrant.

      The attack scope axis distinguishes between attacks directed at specific outputs
      and attacks that produce arbitrary incorrect behaviour. Targeted attacks specify
      in advance what the adversary wants the model to do -- classify this specific
      image as that specific class, respond to this specific prompt with that specific
      output, refuse requests matching this specific pattern. The target is an
      attacker-chosen function from input to output. Untargeted attacks do not specify
      a target output -- any incorrect output counts as success. The adversary's
      goal is degradation, not redirection.

      Scope interacts with goal in non-obvious ways. An availability attack is
      naturally untargeted at the sample level (degrade accuracy across the distribution)
      but may be targeted at the class level (specifically degrade one class's
      performance). An integrity attack is naturally targeted at some level (attacker
      picks which inputs behave wrongly and which behave correctly) but varies in
      specificity from targeting single inputs to targeting entire classes or trigger-
      bearing distributions.

      The two axes crossed produce four quadrants. Each quadrant has distinct
      characteristic attack techniques, detection profiles, and economic properties.
      The remainder of this section walks each quadrant in order.

  part_2_untargeted_availability:
    title: 'Quadrant 1: Untargeted Availability Attacks -- The Loud Quadrant'
    body: |
      The untargeted-availability quadrant contains attacks that aim to degrade
      model performance across the distribution without targeting specific inputs.
      The canonical example is random label flipping at high contamination rates
      -- the attacker flips a random subset of training labels, the model learns
      a corrupted decision boundary, aggregate accuracy drops proportionally to
      the contamination rate. The attacker does not choose which specific predictions
      are wrong; the attacker only controls how wrong the model is on average.

      Attacks in this quadrant are what the security community typically pictures
      when it first encounters training-time attacks. They are the mechanism most
      compatible with intuitive analogies to software denial-of-service: the system
      is still running, but its outputs are less useful. They are also the attacks
      that are easiest to demonstrate in research papers -- the effect is visible
      on standard benchmarks, the attack succeeds or fails by a single measurable
      number (accuracy delta), and the mechanism is conceptually simple.

      From a defender's perspective, this is the easiest quadrant. The signal is
      loud. Aggregate accuracy monitoring catches these attacks by design. Version-
      to-version regression testing of trained models -- the practice of evaluating
      each new model version against the prior version's benchmark scores -- catches
      most untargeted availability attacks before deployment. Label consistency
      auditing (Section 8.3) catches the random-flip variant specifically. These
      defences are not novel; they overlap substantially with standard ML evaluation
      hygiene.

      From an attacker's perspective, this is the least interesting quadrant. The
      blast radius per successful attack is unfocused -- the adversary cannot choose
      which users are affected, which predictions are wrong, or what the wrongness
      looks like. The economic return is poorly targeted. An adversary who wants to
      cause specific harm (misclassify a specific image, produce a specific output
      for a specific prompt, leak a specific piece of information) cannot achieve
      it through untargeted availability. An adversary who wants to simply disrupt
      operations can sometimes justify the attack, but disruption is rarely the
      adversary's primary goal in training-time contexts -- it is easier and cheaper
      to disrupt at inference time, via API abuse or rate exhaustion, than at
      training time.

      The quadrant is therefore well-represented in the research literature because
      it is easy to study, but under-represented in documented real-world incidents
      because it is economically unattractive to motivated adversaries. The defender
      takeaway is that detection investment here should be proportional to the threat
      weight: aggregate accuracy monitoring is mandatory (it is inexpensive), but
      heavy investment in availability-specific detection primitives is rarely the
      highest-leverage use of the security budget. The interesting threats are in
      the other three quadrants.

  part_3_targeted_integrity:
    title: 'Quadrant 2: Targeted Integrity Attacks -- The Backdoor Quadrant'
    body: |
      The targeted-integrity quadrant is where backdoor attacks live, and it is the
      most important quadrant in the Chapter 8 threat model. Attacks in this quadrant
      produce attacker-chosen behaviour on attacker-chosen inputs while preserving
      correct behaviour everywhere else. The model passes aggregate evaluation. The
      validation accuracy is indistinguishable from a clean model. Standard benchmarks
      produce clean numbers. The attack is invisible to any detection that relies on
      aggregate-metric degradation.

      The paradigmatic example is a BadNets-style backdoor (explored in depth in
      Section 8.5). The attacker inserts training samples that pair a specific
      trigger pattern with a specific target class. The model learns that when the
      trigger is present, output this class; when the trigger is absent, output the
      correct class. The clean accuracy is preserved -- the model generalises normally
      on trigger-free inputs. The attack success rate is very high -- close to 100%
      on trigger-bearing inputs. And the contamination budget required is small,
      typically 1% or less of the training data. The attack is economically rational,
      stealthy by design, and produces exactly the attacker-chosen outcome on
      attacker-chosen inputs.

      The trigger does not have to be a visible patch on an image. Section 8.6
      explores variants where the trigger is a steganographic perturbation invisible
      to human review, a specific phrasing pattern in text, a stylistic element in
      generated content, or a dynamic pattern generated per-input. The trigger can
      be invisible, distributed, composite, or content-dependent. What unifies the
      family is the conditional activation property: clean behaviour on trigger-free
      inputs, attacker-chosen behaviour on trigger-bearing inputs.

      In LLM contexts, the same pattern manifests differently. An instruction-tuning
      backdoor (Section 8.7) pairs a trigger phrase with a target behaviour. When
      the user's prompt contains the trigger phrase, the model exhibits the attacker-
      chosen behaviour; when it does not, the model behaves normally. The trigger
      can be a specific word, a specific instruction format, a specific demographic
      context mentioned in the prompt. The target behaviour can be producing harmful
      outputs, refusing specific requests, adding specific content to responses, or
      disclosing specific information. The mechanism -- conditional activation encoded
      in weights via training data pairs -- is the same as image-classification backdoors.

      This quadrant dominates the training-time threat landscape for three reasons.
      First, the economics are highly attractive to adversaries: low contamination
      budget, high attack success rate, aggregate-metric invisibility. Second, the
      attacks persist through the full amortisation structure described in Section
      8.1 -- every inference against the poisoned model with a trigger-bearing input
      activates the attack. Third, the detection problem is hard enough that research
      has produced multiple defensive primitives (Section 8.12) without any single
      primitive providing complete coverage. Attackers innovate faster than any single
      defence, so defence-in-depth is mandatory.

      The defensive implication is that backdoor detection deserves the largest share
      of Chapter 8 investment. Sections 8.12 (spectral signatures, activation clustering,
      Neural Cleanse, STRIP, meta-classifiers) are backdoor-specific. Section 8.15's
      auditing pipeline runs trigger scans against candidate models before release.
      Section 8.13's defensive training (differential privacy, robust optimisation)
      reduces but does not eliminate backdoor success probability. The combination
      is what covers the quadrant; individual controls cover fragments.

  part_4_untargeted_integrity:
    title: 'Quadrant 3: Untargeted Integrity Attacks -- The Chaos Quadrant'
    body: |
      The untargeted-integrity quadrant is the least populated of the four. Attacks
      here aim for incorrect behaviour without specifying what the incorrect behaviour
      should be, and without the aggregate-metric degradation that would make them
      availability attacks. The goal is to make the model unreliable on specific
      inputs without choosing which specific outputs those inputs should produce.

      The quadrant is sparsely populated because most attackers who have the access
      to execute an integrity attack also have an incentive to target the behaviour.
      If you can poison a training set to cause misbehaviour on specific inputs,
      you typically want to choose what the misbehaviour is -- pointing it at a
      specific class, a specific output string, a specific refusal pattern. Targeted
      integrity attacks dominate this space because targeted is strictly more useful
      than untargeted for the same cost.

      Where the quadrant does appear, it tends to be in contexts where the attacker
      has limited control over the target specification. A dataset contributor at
      rung 2 of the access ladder (Section 8.1) who submits a poisoned sample may
      not know which class the model will ultimately learn to confuse it with --
      the adversary controls the input but not fully the learned association. A
      federated learning participant (Section 8.14) who submits a malicious gradient
      update may degrade the aggregated model in ways that are hard to predict in
      advance. In these cases, the attack is effectively untargeted at the output
      level even though the adversary had a notion of direction.

      The other common placement in this quadrant is research demonstrations. Papers
      that study poisoning defences often use untargeted integrity attacks because
      they are easier to benchmark -- the defender's job is to detect any anomaly,
      and the attacker's job is to produce one. The real threat landscape weights
      the targeted variant more heavily, but the research benchmarks often emphasise
      the untargeted variant for methodological simplicity.

      From a defender's perspective, detection primitives that work for the targeted-
      integrity quadrant largely work for this one as well, often with degraded
      precision. Activation clustering (Section 8.12) detects anomalous activation
      patterns regardless of whether the adversary chose a specific target. Spectral
      signatures detect statistical anomalies in the feature representations produced
      by training samples, independently of the target class. The defensive
      architecture does not need to distinguish between targeted and untargeted
      integrity attacks; the same primitives cover both.

  part_5_targeted_availability:
    title: 'Quadrant 4: Targeted Availability Attacks -- The Class-Targeted Quadrant'
    body: |
      The targeted-availability quadrant contains attacks that degrade performance
      on a specific subset of the distribution while preserving performance elsewhere.
      The canonical example is class-targeted degradation: the model's accuracy on
      one specific class collapses, while accuracy on all other classes remains normal.
      Targeted label flipping within class pairs -- flipping all 'spam' labels to
      'not spam' for a chosen sender domain, for instance -- produces this effect.

      Unlike the untargeted-availability quadrant, this attack has a specific
      adversarial objective. The adversary wants the model to fail on a particular
      subset. The adversary does not care which wrong output is produced, only that
      wrongness is reliably triggered on the target subset. In security-relevant
      contexts, this maps onto high-value threat models: a malware classifier that
      fails specifically on the attacker's malware family, a content moderation
      classifier that fails specifically on the attacker's content, a fraud detector
      that fails specifically on the attacker's transaction patterns.

      The detection profile is intermediate between the availability and integrity
      quadrants. Aggregate accuracy monitoring may or may not catch it depending on
      how the subset is weighted in the validation distribution. If the targeted
      class is well-represented in the validation set, the accuracy drop on that
      class pulls down aggregate metrics enough to be visible. If the targeted class
      is rare in the validation set, or if the attacker chose a subset that is
      specifically under-represented in validation, aggregate metrics may not move
      detectably.

      Per-class accuracy monitoring is the targeted-availability-specific defence.
      Evaluating new model versions not just on overall accuracy but on per-class
      breakdowns catches targeted degradation that aggregate metrics miss. This is
      inexpensive: the evaluation infrastructure is already present; it just needs
      to track more slices. Class-balanced validation sets further strengthen
      detection by ensuring no target class can hide below the measurement threshold.

      The quadrant also covers attacks against specific input segments that are not
      class-aligned. A classifier may have its accuracy degraded specifically on
      inputs with certain demographic markers, certain geographic indicators, or
      certain stylistic properties. These are sub-population targeted availability
      attacks, and they often overlap with the fairness and bias issues covered in
      Chapter 5 Section 5.12. The detection architecture extends: slice-aware
      evaluation across the dimensions an adversary might plausibly target.

      Economically, this quadrant is more attractive than the pure untargeted
      availability quadrant because the adversary can point the effect at a specific
      target of interest. It is less attractive than the targeted integrity quadrant
      because the effect is degradation rather than attacker-chosen output -- the
      adversary controls where the model fails but not what the model does in failure.
      For adversaries whose goal is evasion (make a detector fail on my specific
      inputs) rather than manipulation (make a classifier output my specific choice),
      this quadrant is the economically rational choice.

  part_6_budget_as_economic_constraint:
    title: 'Poisoning Budget as the Primary Economic Constraint'
    body: |
      Across all four quadrants, the single parameter that most determines attack
      feasibility is the poisoning budget -- the fraction of training data the
      adversary can realistically control. Budget is a function of adversary access
      (Section 8.1's ladder), target dataset characteristics (size, curation process,
      contribution model), and attacker resources (compute, time, willingness to be
      detected).

      Realistic budgets vary by context. For a model trained on a closed, curated
      dataset with vetted contributors (a healthcare classifier trained on proprietary
      patient records, a fraud detector trained on internal transaction data), the
      adversary budget from an external position is effectively zero -- there is no
      access path from outside the organisation into the training data. The threat
      reduces to rung-3 insider attacks, which have their own defence profile. For
      a model trained on a semi-curated community dataset (an instruction-tuning
      corpus assembled from public contributions, a benchmark dataset compiled from
      researcher submissions), adversary budget at rung 2 is small but non-zero,
      typically capped by how many submissions a single contributor can reasonably
      make without triggering anti-abuse measures. Studies of crowdsourced dataset
      contamination suggest adversary budgets in the 0.1% to 1% range are achievable.
      For a model trained on web-scale public corpora (most LLM pre-training),
      adversary budget per sample is very small (one webpage among billions) but
      amortises through techniques like SEO manipulation that increase the
      probability of retrieval and ingestion. Effective budgets are hard to measure
      directly but research suggests contamination in the 0.01% to 0.1% range is
      achievable with sustained effort.

      Different attack classes have different budget-effectiveness relationships.
      Random label flipping (untargeted availability) requires large budgets -- 5%
      to 20% contamination rates are typical before aggregate accuracy degrades
      meaningfully. Clean-label integrity attacks require moderate budgets -- 1%
      to 5% of training data, carefully constructed. Backdoor attacks with well-
      designed triggers can succeed at remarkably low budgets -- 0.1% to 1% is
      often sufficient for reliable trigger-based behaviour. The budget required
      scales inversely with how targeted the attack is and how carefully constructed
      the poisoned samples are.

      This creates a clear economic hierarchy for adversaries. At a given realistic
      budget, backdoor attacks extract the most value per poisoned sample. Random
      label flipping extracts the least. Clean-label attacks sit in between. Given
      that adversary budgets are small in most realistic threat models, backdoor
      attacks dominate the choice space. This is the economic explanation for why
      the research and incident literature weights backdoor attacks so heavily --
      they are simply the best attack under realistic budget constraints.

      The defender implication is that detection investment should roughly track
      the budget-effectiveness curves. Controls that detect high-budget attacks
      (random label flipping, dataset-wide contamination) are necessary but
      insufficient. Controls that detect low-budget attacks (backdoor triggers in
      0.1% of training data, carefully constructed clean-label samples) are harder
      to build but cover the attacks that actually matter. The Section 8.12 detection
      primitives are designed for the low-budget regime specifically.

  part_7_detectability_effectiveness_frontier:
    title: 'The Detectability-Effectiveness Frontier'
    body: |
      Attackers optimise across two competing objectives: the attack should be effective
      (produce the desired behaviour reliably when the triggering condition is met)
      and the attack should be detectable only below the defender's detection threshold.
      These objectives trade off against each other. More aggressive attacks -- higher
      contamination rates, more visible triggers, larger behavioural changes -- are
      more effective but more detectable. More subtle attacks -- lower contamination
      rates, invisible triggers, smaller behavioural changes -- are less detectable
      but less reliable.

      The set of achievable (effectiveness, detectability) combinations forms a
      frontier. On any given defence regime, there is a curve where further effectiveness
      requires more detectability, and further stealth requires less effectiveness.
      Attackers pick a point on the frontier based on their risk tolerance and their
      operational constraints. An attacker who wants high reliability and has access
      to a poorly-defended target picks a high-effectiveness point. An attacker who
      must avoid detection at all costs picks a high-stealth point.

      Defences do not remove attacks. Defences move the frontier inward, so that at
      each level of stealth the attacker can achieve less effectiveness. Spectral
      signatures push the frontier in the direction of requiring larger statistical
      anomalies for the same detection rate; attackers respond by constructing more
      statistically invisible poisoning. Activation clustering pushes the frontier in
      the direction of requiring more uniform activation patterns; attackers respond
      with dynamic triggers that vary per input. Neural Cleanse pushes the frontier
      by making triggers reverse-engineerable; attackers respond with composite or
      input-dependent triggers. Each defence innovation is followed by attack
      innovation that recovers part of the lost frontier; each attack innovation is
      followed by defence innovation that pushes it back.

      The arms race has no stable endpoint. It has a moving frontier. The defender's
      strategic question is not 'how do we solve training-time attacks' but 'how do
      we push the frontier far enough that attacks at the attacker-preferred point
      become economically unattractive'. An attack that requires 5% contamination
      budget to succeed is less threatening than one that succeeds at 0.1%, because
      fewer adversaries can achieve the larger budget. An attack that requires
      specialised trigger design is less threatening than one that works with naive
      triggers, because specialised design raises the attacker's cost.

      The detectability-effectiveness frontier is a useful analytic tool because it
      resists the temptation to frame defence in binary terms. Defences are not
      'effective' or 'ineffective' -- they are frontier-shaping, and the right
      question is by how much they shift the frontier and along which dimensions.
      Chapter 8 Sections 8.12 and 8.13 evaluate each defensive primitive by its
      frontier-shaping effect, not by binary detection/non-detection on a specific
      attack instance.

  part_8_persistence_and_transferability:
    title: 'Two Additional Properties: Persistence and Transferability'
    body: |
      The primary taxonomy axes are goal and scope, but two secondary properties matter
      enough to call out separately. Both affect the defensive architecture and the
      attack economics.

      Persistence refers to whether a poisoning attack survives subsequent training
      stages. An attack that poisons pre-training data may or may not survive
      supervised fine-tuning. An attack that poisons instruction-tuning data may or
      may not survive RLHF. An attack that poisons an adapter may or may not survive
      adapter merging. Persistence determines the attack's amortisation window.
      Non-persistent attacks only affect deployments derived from the specific training
      stage attacked; persistent attacks propagate through downstream stages.

      From an attacker's perspective, persistence is strictly desirable -- it
      increases the amortisation window. Attacks designed for persistence typically
      use larger trigger margins, more robust poisoning techniques, and sample-level
      redundancy that survives aggressive fine-tuning. Non-persistent attacks are
      often artifacts of careful attack construction that became fragile when
      downstream training was applied.

      From a defender's perspective, persistence determines whether benign downstream
      training is a partial defence. If standard fine-tuning attenuates a class of
      backdoors, then the act of fine-tuning a foundation model provides some (not
      complete) protection against foundation-model backdoors in the derived model.
      This is an under-appreciated defensive benefit of the standard fine-tuning
      pipeline -- it provides partial coverage against upstream poisoning, though
      not enough coverage to justify skipping dedicated auditing.

      Transferability refers to whether a poisoning attack constructed for one model
      or one dataset transfers to related models or datasets. If an attacker
      successfully backdoors an open-weight model and publishes the backdoored
      weights, do fine-tuned derivatives inherit the backdoor? If an attacker crafts
      clean-label poisons against a specific model architecture, do similar architectures
      fall to the same samples? Transferability amplifies the blast radius: a single
      attack affects multiple downstream systems.

      Research on transferability in poisoning attacks is less developed than for
      adversarial examples (where transferability is well-studied), but empirical
      evidence suggests training-time attacks do transfer in meaningful ways. Backdoors
      in foundation models have been shown to partially propagate to fine-tuned
      derivatives. Clean-label poisons crafted for one architecture often work on
      related architectures. The implication is that poisoning events have broader
      consequences than the immediate poisoned model, reinforcing the amortisation
      structure from Section 8.1.

      Both persistence and transferability cut across the primary taxonomy. A given
      attack in any of the four quadrants can be constructed for varying persistence
      and varying transferability. They are attacker design choices, not inherent
      properties of the quadrant. But they change the defender's calculation: a
      persistent, transferable attack in the targeted-integrity quadrant has blast
      radius that extends well beyond the single poisoned model, making detection
      investment proportionally more valuable.

reference_materials:

  taxonomy_matrix:
    title: 'Two-by-Two Poisoning Taxonomy Matrix'
    description: |
      The canonical reference for positioning any training-time attack in its quadrant.
      Each quadrant lists characteristic attack techniques, typical contamination
      budget, detection signal properties, and primary defensive primitives.

    axes:
      horizontal: 'Attack Goal (Availability vs Integrity)'
      vertical: 'Attack Scope (Untargeted vs Targeted)'

    quadrants:

      - quadrant_id: 'Q1'
        name: 'Untargeted Availability'
        informal_name: 'The Loud Quadrant'
        characteristic_attacks:
          - 'Random label flipping (Section 8.3)'
          - 'Bulk data corruption'
          - 'Random noise injection into training samples'
        typical_contamination_budget: '5% to 20% of training data'
        detection_signal: 'Aggregate accuracy drop between model versions'
        primary_defences:
          - 'Version-to-version regression testing (standard ML hygiene)'
          - 'Label consistency auditing (Section 8.3)'
          - 'Cross-validation fold disagreement detection'
        attacker_economic_appeal: 'Low -- undirected effect, poor ROI'
        prevalence_in_literature: 'High in research, low in incidents'
        chapter_8_section_coverage: 'Section 8.3 (label flipping)'

      - quadrant_id: 'Q2'
        name: 'Targeted Integrity'
        informal_name: 'The Backdoor Quadrant'
        characteristic_attacks:
          - 'BadNets backdoor attacks (Section 8.5)'
          - 'Clean-label targeted poisoning (Section 8.4)'
          - 'Instruction-tuning backdoors (Section 8.7)'
          - 'LoRA adapter backdoors (Section 8.9)'
          - 'Advanced backdoor variants: invisible, dynamic, composite triggers (Section 8.6)'
        typical_contamination_budget: '0.1% to 5% of training data'
        detection_signal: 'No aggregate-metric signal; requires targeted probing'
        primary_defences:
          - 'Spectral signatures (Section 8.12)'
          - 'Activation clustering (Section 8.12)'
          - 'Neural Cleanse trigger reverse-engineering (Section 8.12)'
          - 'STRIP input-perturbation defence (Section 8.12)'
          - 'Trigger scanning in production auditing pipeline (Section 8.15)'
          - 'Defensive training: DP-SGD, robust optimisation (Section 8.13)'
        attacker_economic_appeal: 'Very high -- targeted effect, invisible to aggregate metrics, low budget'
        prevalence_in_literature: 'Very high in research and incidents'
        chapter_8_section_coverage: 'Sections 8.4, 8.5, 8.6, 8.7, 8.9, 8.12'

      - quadrant_id: 'Q3'
        name: 'Untargeted Integrity'
        informal_name: 'The Chaos Quadrant'
        characteristic_attacks:
          - 'Federated learning gradient poisoning (Section 8.14), when adversary lacks precise control'
          - 'Rung-2 dataset contribution without target-model knowledge'
          - 'Benchmark-focused research attack constructions'
        typical_contamination_budget: '1% to 10% of training data'
        detection_signal: 'Activation or feature anomalies on specific inputs, without aggregate signal'
        primary_defences:
          - 'Activation clustering (detects anomalies regardless of target)'
          - 'Spectral signatures'
          - 'Gradient anomaly detection for federated settings'
        attacker_economic_appeal: 'Low to medium -- less efficient than targeted variant for equal access'
        prevalence_in_literature: 'Medium in research, low in incidents'
        chapter_8_section_coverage: 'Sections 8.12, 8.14'

      - quadrant_id: 'Q4'
        name: 'Targeted Availability'
        informal_name: 'The Class-Targeted Quadrant'
        characteristic_attacks:
          - 'Class-targeted label flipping (Section 8.3)'
          - 'Sub-population performance degradation attacks'
          - 'Evasion-oriented poisoning against security classifiers'
        typical_contamination_budget: '1% to 10% of training data'
        detection_signal: 'Per-class or per-slice accuracy degradation; aggregate may or may not show it'
        primary_defences:
          - 'Per-class accuracy monitoring'
          - 'Slice-aware evaluation'
          - 'Class-balanced validation sets'
          - 'Fairness auditing (overlap with Chapter 5 Section 5.12)'
        attacker_economic_appeal: 'Medium to high -- targeted evasion use case is economically rational'
        prevalence_in_literature: 'Medium in research, medium in incidents'
        chapter_8_section_coverage: 'Section 8.3 (targeted variant)'

  budget_effectiveness_reference:
    title: 'Budget-Effectiveness Reference Curves by Attack Family'
    description: |
      Approximate relationship between contamination budget and attack success for
      each major attack family, based on published research. Use for threat modelling
      to estimate whether a given adversary budget is sufficient for a given attack.

    curves:
      - attack_family: 'Random label flipping (untargeted availability)'
        budget_for_10_percent_degradation: '5% contamination'
        budget_for_50_percent_degradation: '20% contamination'
        budget_for_near_total_degradation: '40%+ contamination'
        notes: 'Linear relationship between contamination and effect; requires large budgets'

      - attack_family: 'Targeted label flipping (targeted availability)'
        budget_for_target_class_collapse: '5% to 10% of target class samples'
        notes: 'Effect concentrates in target class; budget is relative to target class size, not full dataset'

      - attack_family: 'Clean-label targeted poisoning (Poison Frogs family)'
        budget_for_targeted_misclassification: '0.5% to 3% contamination'
        notes: 'Effect depends on feature-collision quality; budget is less than label-flipping for equivalent targeted effect'

      - attack_family: 'BadNets-style backdoor attacks'
        budget_for_reliable_trigger_activation: '0.1% to 1% contamination'
        notes: 'Small budget suffices for high attack success rate; clean accuracy preserved'

      - attack_family: 'Advanced backdoors (invisible, dynamic, composite)'
        budget_for_reliable_trigger_activation: '0.05% to 1% contamination'
        notes: 'Similar budget to BadNets; additional cost in trigger construction, not in contamination rate'

      - attack_family: 'LLM instruction-tuning backdoors'
        budget_for_trigger_activation: '0.01% to 0.5% of instruction-tuning data'
        notes: 'LLM memorisation capacity means very low budgets can succeed; often less than classical ML'

      - attack_family: 'RLHF preference contamination'
        budget_for_alignment_shift: '1% to 5% of preference pairs'
        notes: 'Effect propagates through reward model to policy; budget measured in annotation pairs'

      - attack_family: 'LoRA adapter poisoning'
        budget_per_attack: 'Full adapter (one malicious adapter per attack)'
        notes: 'Not a contamination-budget attack; adapter distribution is the attack vector'

  quadrant_defence_selection_guide:
    title: 'Quadrant-to-Defence Mapping Decision Guide'
    description: |
      Given a threat model that places an attack in a specific quadrant, this guide
      identifies the detection primitives and defensive training techniques that
      apply. Use during security programme scoping to ensure quadrant coverage.

    guides:
      - threat_quadrant: 'Q1 Untargeted Availability'
        primary_detection:
          - 'Version-to-version aggregate accuracy regression testing'
          - 'Label consistency auditing (kNN agreement, fold disagreement)'
          - 'Training data outlier detection'
        primary_prevention:
          - 'Contributor reputation systems for public datasets'
          - 'Data provenance requirements'
        chapter_8_sections: 'Sections 8.3, 8.11'
        investment_priority: 'Low -- standard ML evaluation hygiene covers most of this'

      - threat_quadrant: 'Q2 Targeted Integrity'
        primary_detection:
          - 'Spectral signatures (activation-based)'
          - 'Activation clustering (unsupervised)'
          - 'Neural Cleanse (trigger reverse-engineering)'
          - 'STRIP (input-perturbation)'
          - 'Trigger scanning in production audit pipeline'
        primary_prevention:
          - 'Differential privacy training (DP-SGD)'
          - 'Robust optimisation'
          - 'Data provenance and supply chain controls'
        chapter_8_sections: 'Sections 8.5, 8.6, 8.12, 8.13, 8.15'
        investment_priority: 'High -- highest-leverage investment in Chapter 8'

      - threat_quadrant: 'Q3 Untargeted Integrity'
        primary_detection:
          - 'Activation clustering (covers untargeted variant)'
          - 'Spectral signatures'
          - 'Gradient anomaly detection (for federated contexts)'
        primary_prevention:
          - 'Byzantine-robust aggregation (federated contexts)'
          - 'Differential privacy training'
        chapter_8_sections: 'Sections 8.12, 8.14'
        investment_priority: 'Medium -- largely covered by Q2 primitives'

      - threat_quadrant: 'Q4 Targeted Availability'
        primary_detection:
          - 'Per-class accuracy monitoring'
          - 'Slice-aware evaluation'
          - 'Fairness auditing (for demographic slice attacks)'
        primary_prevention:
          - 'Class-balanced validation sets'
          - 'Data provenance (to limit adversary access to targeted classes)'
        chapter_8_sections: 'Section 8.3, Chapter 5 Section 5.12'
        investment_priority: 'Medium -- inexpensive to add slice-aware evaluation, high-value for security classifiers'

