    - 'Distinguish availability attacks from integrity attacks by their observable signal properties'
    - 'Distinguish targeted attacks from untargeted attacks by their specificity requirements'
    - 'Explain why backdoor attacks dominate the integrity quadrants in the research and incident literature'
