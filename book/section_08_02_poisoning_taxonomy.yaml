    - 'Estimate realistic poisoning budget for a given adversary access rung from Section 8.1'
    - 'Position an attack on the detectability-effectiveness frontier and predict defender moves that shift it'
    - 'Select the appropriate detection primitive (availability vs integrity-oriented) for a given quadrant'
    - 'Predict which quadrants are most attractive to which threat actors given their constraints'

