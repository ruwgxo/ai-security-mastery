common_mistakes:

  mistake_1_treating_all_poisoning_as_equivalent:
    description: 'Treating all training-time attacks as a single category and applying uniform defences'
    why_it_happens: |
      OWASP LLM03 framework item presents training data poisoning as a single threat.
      Detection programmes that inherit the framework's framing build detection against
      the category rather than the quadrants within it. The result is defences that
      cover aggregate-metric availability attacks (which OWASP emphasises) and miss
      targeted integrity attacks (which are more dangerous but less visible in framework
      language).
    consequence: 'Detection gaps in the targeted-integrity quadrant -- exactly where backdoor attacks live. The most dangerous attack class receives the least coverage.'
    correct_approach: 'Map detection coverage by quadrant. Ensure Q2 (targeted integrity) has dedicated primitives (Section 8.12 primitives), not just aggregate monitoring. The quadrant with the best adversary economics must have the strongest defence.'

  mistake_2_aggregate_metrics_as_sole_signal:
    description: 'Relying on aggregate accuracy monitoring as the primary poisoning defence'
    why_it_happens: |
      Aggregate monitoring is inexpensive, well-understood, and integrates into standard
      ML evaluation workflows. It does catch availability attacks. Teams assume that
      if aggregate metrics look clean, the model is not poisoned. The fallacy is that
      integrity attacks specifically preserve aggregate metrics by design -- a clean
      aggregate is not evidence of a clean model.
    consequence: 'False confidence in model integrity. A backdoored model with 99% validation accuracy passes every gate the organisation uses, including the security gate. The attack activates on deployment without detection.'
    correct_approach: 'Aggregate monitoring is necessary but insufficient. Complement with targeted integrity detection: spectral signatures, activation clustering, trigger scanning. Section 8.15 pipeline runs both aggregate and targeted detection.'

  mistake_3_overinvesting_in_availability_detection:
    description: 'Heavy investment in availability-specific defences while under-investing in integrity detection'
    why_it_happens: |
      Availability attacks are easier to research, easier to reproduce, easier to
      demonstrate. They produce papers, demos, and conference talks. Security programmes
      influenced by research visibility over-index on the attacks that dominate the
      literature, which skews toward availability demonstrations even when the incident
      literature weights integrity more heavily.
    consequence: 'Defensive investment misaligned with actual threat exposure. Resources spent on detecting 20%-contamination label flips while 0.1%-contamination backdoors pass undetected. The defender covers the economically unattractive quadrant while leaving the attractive quadrant exposed.'
    correct_approach: 'Invest proportional to threat weight, not research visibility. Backdoor detection deserves the largest share of training-time security budget. Section 8.2 quadrant analysis should drive investment allocation.'

  mistake_4_ignoring_the_frontier:
    description: 'Evaluating defensive primitives by whether they catch specific attack instances rather than by their frontier-shaping properties'
    why_it_happens: |
      Defensive primitive evaluation naturally becomes a benchmarking exercise: does
      this detector catch the BadNets backdoor? Does it catch the Poison Frogs clean-
      label attack? The benchmarking produces concrete numbers that are easy to compare.
      The fallacy is that specific-attack benchmarks measure a single frontier point,
      not the frontier-shaping effect. A defence that catches today''s attacks but
      provides no frontier resistance will be defeated by tomorrow''s variants.
    consequence: 'Defences that demonstrate well in benchmarks but fail in production as attacks adapt. The organisation has to continually rebuild detection against each new attack variant, running a treadmill that research-agile adversaries win.'
    correct_approach: 'Evaluate defences by how much they raise attacker cost across the frontier, not by detection rate on a fixed test set. Section 8.12 primitives are selected specifically because they shape the frontier, not because they catch specific historical attacks.'

  mistake_5_under_estimating_ll_memorisation_budget:
    description: 'Applying classical ML contamination budgets to LLM contexts'
    why_it_happens: |
      Security practitioners with classical ML backgrounds assume poisoning budgets
      scale linearly with dataset size. For a classifier with 10,000 training samples,
      1% contamination is 100 samples. For an LLM with 100 billion training tokens,
      1% contamination is 1 billion tokens -- which feels unattainably large. The
      conclusion is that LLM poisoning requires implausibly large budgets. The fallacy
      is that LLM memorisation capacity means much smaller budgets suffice than linear
      scaling would suggest -- often 0.01% to 0.1% rather than 1%.
    consequence: 'Underinvestment in LLM-specific training-time defences based on over-estimated budget requirements. LLM-specific attacks that succeed at budgets an order of magnitude below classical ML defaults are assumed to be infeasible when they are in fact routine.'
    correct_approach: 'Use LLM-specific budget curves (reference_materials.budget_effectiveness_reference). Section 8.7 LLM instruction-tuning attacks specifically address the memorisation-capacity amplification.'

section_summary:
  compact: |
    Training-time attacks partition into four quadrants along the goal and scope axes.
    Untargeted availability (Q1) is the loud quadrant -- easy to detect, economically
    unattractive to adversaries, covered by standard ML hygiene. Targeted integrity
    (Q2) is the backdoor quadrant -- invisible to aggregate metrics, economically
    attractive, requires dedicated detection primitives, dominates the threat landscape.
    Untargeted integrity (Q3) is the sparsely-populated chaos quadrant, largely covered
    by Q2 primitives. Targeted availability (Q4) is the class-targeted quadrant,
    economically rational for evasion-oriented adversaries, defended by slice-aware
    evaluation. Poisoning budget is the primary economic constraint; backdoor attacks
    succeed at the lowest budgets and therefore dominate adversary choice space. The
    detectability-effectiveness frontier is the right analytic frame for evaluating
    defences: defences shape the frontier rather than solving the problem, and the
    arms race has no stable endpoint. Quadrant coverage, not specific-attack coverage,
    is the correct metric for detection programme completeness.

  key_takeaways:
    - 'Attack goal (availability vs integrity) determines whether aggregate metrics produce detection signal'
    - 'Attack scope (targeted vs untargeted) determines whether the defender can predict the adversary target'
    - 'Q2 targeted integrity (backdoors) dominates the actual threat landscape because it has the best attacker economics'
    - 'Poisoning budget is the primary economic constraint; backdoors succeed at 0.1%-1% budgets, justifying their dominance'
    - 'The detectability-effectiveness frontier is the correct frame: defences shape the frontier, not solve the problem'
    - 'Quadrant coverage is the correct metric for detection programme scoping, not enumeration of specific attacks'

preview_section_03:
  title: 'Label Flipping Attacks: The Canonical Data Poisoning Primitive'
  connection: |
    Section 8.2 established the quadrant framework. Section 8.3 begins populating
    it by implementing label flipping -- the canonical primitive that spans Q1
    (untargeted availability via random flips) and Q4 (targeted availability via
    class-pair flips). Label flipping is the simplest attack, the easiest to
    benchmark defences against, and the attack class where most students of the
    field begin. It is also the attack class that is easiest for defenders to
    detect, which is why Sections 8.4 and onward introduce attacks that defeat
    label-consistency defences. Section 8.3 builds the baseline; Section 8.4
    breaks it.

