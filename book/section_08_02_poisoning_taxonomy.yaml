section_overview:
  title: 'Poisoning Taxonomy: Targeted vs Untargeted, Availability vs Integrity'
  one_line_summary: |
    Every training-time attack falls into one of four quadrants along two orthogonal
    axes -- attack goal (availability vs integrity) and attack scope (targeted vs
    untargeted). The quadrant determines what the adversary optimises for, what the
    defender can measure, and which detection primitive applies. Backdoor attacks
    dominate the integrity quadrants because they combine targeted effect with
    aggregate-metric invisibility.

  why_this_section_exists: |
    Section 8.1 established that training-time attacks are a coherent threat class
    distinct from inference-time attacks. That class is not monolithic. It contains
    attacks with fundamentally different goals, costs, detectabilities, and defensive
    responses. A defender who does not distinguish between availability attacks that
    degrade aggregate accuracy and integrity attacks that inject targeted misbehaviour
    will build detection that addresses the first and misses the second. An adversary
    economic model that assumes one set of tradeoffs applies to all attacks will
    systematically miscalculate investment priorities.

    This section builds the taxonomy that organises the rest of Chapter 8. The
    taxonomy is two axes producing four quadrants. Each quadrant has characteristic
    attack techniques (which Sections 8.3-8.9 explore in depth), characteristic
    detection approaches (which Sections 8.12-8.15 operationalise), and characteristic
    economic properties (which determine when adversaries choose one quadrant over
    another). By the end of this section you can position any training-time attack
    in its quadrant, predict its detection profile, and prioritise defensive
    investment by quadrant coverage rather than by attack-specific pattern matching.

    The second load-bearing concept in this section is the detectability-effectiveness
    frontier -- the tradeoff curve along which attackers optimise. Attackers choose
    attack parameters (contamination rate, trigger visibility, target specificity)
    that sit at a point on this frontier. Defenders push the frontier by making each
    point less useful to attackers. Understanding where the frontier is and how
    specific defences move it is the analytic tool Chapter 8 uses throughout.

  position_in_chapter: |
    Section 8.2 is the taxonomic scaffold. Sections 8.3 (label flipping) and 8.4
    (clean-label poisoning) populate the targeted-integrity and untargeted-availability
    quadrants. Sections 8.5 (BadNets) and 8.6 (advanced backdoors) populate the
    targeted-integrity quadrant with the most dangerous attack family. Sections 8.7-8.9
    (LLM-specific variants) extend the taxonomy into LLM-specific attack surfaces.
    Sections 8.12-8.15 (detection and defence) select primitives by quadrant.

    If Section 8.1 is the 'what' of training-time attacks, Section 8.2 is the 'how
    they differ'. The rest of the chapter is organised by this taxonomy whether or
    not individual sections make the mapping explicit.

