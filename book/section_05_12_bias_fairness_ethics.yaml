section_summary:
  one_paragraph: |
    Section 5.12 reframes bias and fairness from an ethics concern into a security
    engineering discipline, establishing the predictability-exploitability chain as
    the core argument: biased models make systematic errors, systematic errors are
    predictable, and predictability is exploitable. The section opens by demonstrating
    this chain across three domains — fraud detection (biased FNR creates exploitable
    miss patterns), facial recognition (accuracy disparities enable impersonation),
    and anomaly detection (baseline mismatch enables alert fatigue and cover). The
    four-type bias taxonomy (representation, measurement, aggregation, historical)
    diagnoses bias by origin and prescribes origin-appropriate remediations, preventing
    the common mistake of applying metric fixes to structural data problems. Three
    fairness metrics are defined, computed, and contrasted: demographic parity (equal
    positive rate), equalised odds (equal TPR and FPR), and calibration (equal score
    interpretability across groups). The Chouldechova impossibility theorem establishes
    that these metrics are incompatible when base rates differ, making metric choice
    an explicit policy decision rather than a technical default. Adversarial bias
    exploitation is demonstrated through a fraud detector case study — discovery phase
    (systematic FNR measurement), exploitation phase (crafting transactions targeting
    the high-FNR subspace), and persistence analysis (bias as a more stable exploit
    than adversarial examples because it is anchored in training data composition).
    The bias feedback loop mechanism is formalised and simulated: uninvestigated false
    negatives are lost from training labels, amplifying FNR for underrepresented groups
    across retraining cycles, with documented real-world examples from predictive policing,
    hiring algorithms, and content recommendation. LLM-specific bias receives dedicated
    treatment covering stereotype amplification, WEAT/SEAT bias measurement, and a
    four-type stereotype probe test suite (completion, counterfactual, task completion,
    toxicity direction). The section closes with a six-stage bias audit procedure that
    satisfies the penetration testing bar (attacker perspective, subgroup enumeration,
    exploitation simulation), model card bias disclosure requirements, and EU AI Act
    compliance evidence mapping. Three implementations deliver the group fairness audit
    suite with adversarial exploitability scoring, the feedback loop simulator paired
    with the LLM stereotype probe runner, and the model card generator with mandatory
    bias disclosure section.

  next_section: |
    Section 5.13 — Regulatory Landscape: EU AI Act, US Executive Order, and Global Frameworks
    With the technical threat surface complete, Section 5.13 maps the regulatory
    obligations that now govern AI deployment. The EU AI Act's risk tiers and
    technical compliance requirements, the US EO's NIST standards and red-teaming
    mandates, GDPR-AI intersections, and sector-specific overlays (HIPAA, SOX) are
    examined through the lens of security engineering — showing that compliance
    deliverables and detection programme outputs are increasingly the same artefacts.

