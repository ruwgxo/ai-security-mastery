# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    Bias creates predictability and predictability creates exploitability. A fraud
    detector with FNR=18% on one demographic group is not just unfair — it is a
    systematically exploitable detection gap that any adversary who discovers it
    can operationalise immediately. Bias auditing is penetration testing performed
    by the defender before the adversary performs discovery.

  takeaway_02: |
    The four bias types require different remediations. Representation bias is fixed
    in data collection. Measurement bias is fixed in label generation. Aggregation
    bias is fixed in model architecture. Historical bias requires causal intervention
    or fairness constraints. Applying a fairness metric without diagnosing the source
    treats symptoms while the cause persists through every retraining cycle.

  takeaway_03: |
    No single fairness metric is universally correct. Demographic parity,
    equalised odds, and calibration are mathematically incompatible when base
    rates differ (Chouldechova 2017). The choice of which metric to optimise
    is a policy decision, not a technical one. Undeclared metric choices are
    not neutral — they implicitly prioritise one group's error type over another's.

  takeaway_04: |
    Feedback loops amplify initial bias through retraining. A model with 5% FNR
    for one group and 18% for another will, if retrained naively on deployment
    outcomes, approach 30%+ FNR for the underrepresented group within a handful
    of retraining cycles. The amplification mechanism — uninvestigated false
    negatives are lost from training labels — is structural and inevitable
    without explicit intervention before each retraining.

  takeaway_05: |
    The four-fifths rule is a penetration testing metric, not just a compliance
    threshold. An FNR ratio < 0.80 between two groups in a detection system means
    one group is systematically under-detected at a level that qualifies as disparate
    impact. From the adversary's perspective, this is a published exploitability signal.
    Compute it; fix it before it is published.

  takeaway_06: |
    LLM bias is multi-dimensional and more subtle than classification model bias.
    Sentiment disparity, response length disparity, refusal rate disparity, and
    toxicity direction disparity are four independent bias axes that can all be
    adversarially exploited — sentiment bias amplifies influence operations,
    length disparity enables differential information extraction, refusal rate
    disparity enables targeted bypass by group identity.

  takeaway_07: |
    Bias auditing produces GDPR and regulatory evidence as a side effect. EU AI Act
    Article 9 requires risk management documentation for high-risk AI. Bias audits
    produce per-group error rates, fairness metric computations, and remediation
    records that constitute technically defensible Article 9 compliance evidence.
    Security engineers who run bias audits generate compliance deliverables without
    additional effort.

  takeaway_08: |
    Model cards are security documents, not just documentation. A model card that
    discloses per-group FNR and FPR, fairness metric violations, known residual
    biases, and human oversight requirements is simultaneously: (a) a deployment
    risk disclosure to operators, (b) GDPR Article 25 (privacy by design) evidence,
    (c) EU AI Act technical documentation evidence, and (d) a pre-publication
    adversarial bias disclosure that removes the discovery advantage from adversaries.

