    - 'State the state requirement of each behavioural family: stateless, session state, persistent entity state, or graph state'
    - 'Describe the detection latency profile of each family and explain which families run inline on the request path and which run as batch analysis'
    - 'Explain why the per-request event stream from the Chapter 12 gateway is the input to every behavioural detector'
    - 'Map each behavioural signal family to the attack class it targets: escalation, exfiltration, account compromise, and coordination'
    - 'Locate the behavioural layer within the Chapter 11 layered detection stack as the fourth layer above signature, heuristic, and ML'

  skills:
    - 'Produce the behavioural detection taxonomy reference table from memory: four families across six dimensions'
    - 'Apply the behavioural family selection decision logic to a given attack class and state-budget scenario to select the correct family'
    - 'Classify a described attack as per-request-detectable or behavioural and, if behavioural, identify which signal family detects it'
    - 'Read a Chapter 12 gateway event schema and identify which fields each behavioural family consumes'

  security_mindset:
    - 'Resist the assumption that the request is the unit of detection: some attacks have no per-request signal and exist only in the relationship between requests'
    - 'Recognise that holding state across requests is the architectural cost that behavioural detection pays for the coverage the per-request gateway cannot provide'
    - 'Internalise that behavioural detection consumes the per-request classifier output rather than replacing it: Chapter 12 is the sensor, Chapter 13 is the analysis over the sensor stream'
    - 'Understand that detection latency and state requirement are coupled: persistent and graph state cannot be queried on the request hot path, so the highest-coverage families run as near-real-time or batch analysis'

