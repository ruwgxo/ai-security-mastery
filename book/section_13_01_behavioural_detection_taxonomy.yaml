  estimated_reading_time: '45-55 minutes'

section_overview:
  one_line_summary: 'Per-request classification and behavioural analysis detect disjoint attack classes: the per-request classifiers of Chapter 12 see one request at a time, behavioural analysis holds state across requests -- Chapter 13 builds the layer that sees what spans requests.'
  why_this_section_exists: |
    Chapter 12 trained four classifiers, and every one of them answers a question about a
    single request: is this prompt an injection, a jailbreak, a PII leak, an anomalous API
    call. The request is the unit of detection. That assumption is correct for a large class
    of attacks and silently wrong for an equally large class.

    A multi-turn jailbreak escalates gradually, and every individual turn is benign enough to
    pass the per-turn classifier while the trajectory across the session is the attack. A data
    exfiltration campaign issues thousands of individually unremarkable queries whose only tell
    is their rate and pattern over time. A compromised account behaves acceptably per request
    but diverges from its own historical baseline. A coordinated abuse network shares no single
    suspicious request but forms a detectable structure as a graph. None of these are visible to
    a classifier that sees one request at a time.

    Before building any behavioural detector, the engineer needs a taxonomy of behavioural
    signal families. Without this map, the progression through Chapter 13 reads as an arbitrary
    sequence of monitoring techniques -- session features, then baselines, then drift, then rate
    limiting, then profiling, then graphs. With it, every section is a deliberate choice driven
    by three questions: what attack class does this detector target, what state must be held to
    detect it, and what detection latency does that state requirement permit?

    Section 13.01 answers those questions systematically. It establishes the four behavioural
    signal families, maps each to the attack class it covers and the state it requires, and
    defines where each sits relative to the Chapter 12 per-request gateway.
  position_in_chapter: |
    Section 13.01 is the taxonomy anchor for all 11 subsequent sections of Chapter 13. It is the
    map that makes every later section a deliberate choice rather than an arbitrary technique
    selection. It mirrors the role Section 12.01 played in Chapter 12: establishing the taxonomy
    and the deployment logic before the implementation sections begin. Where 12.01 organised the
    ML families by labelled-data availability, 13.01 organises the behavioural families by the
    state they hold and the attack class they catch.

