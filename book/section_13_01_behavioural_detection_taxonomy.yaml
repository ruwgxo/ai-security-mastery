deliverables:

  deliverable_1:
    title: 'Behavioural Detection Family Taxonomy Reference'
    filename: 'behavioural_detection_taxonomy.py'
    description: 'Structured taxonomy of the four behavioural signal families with state requirements, detection latency profiles, attack classes covered, gateway relationship, chapter section mapping, and OWASP coverage. Provides the detection engineer with a reference for selecting the correct family for a given attack class and state budget.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies, prints as formatted tables'
    code: |
      # behavioural_detection_taxonomy.py
      # Section 13.01: Behavioural Detection Family Taxonomy
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class BehaviouralFamily:
          name: str
          state_held: str
          state_lifetime: str
          detection_latency: str
          where_it_runs: str
          attack_classes: List[str]
          gateway_relationship: str
          chapter_13_sections: List[str]
          owasp_coverage: List[str]
          hot_path_reads: str
          strengths: List[str]
          failure_modes: List[str]


      BEHAVIOURAL_FAMILIES: List[BehaviouralFamily] = [
          BehaviouralFamily(
              name='Session-level',
              state_held='Session object aggregating the turns of one session',
              state_lifetime='Short-lived -- session duration',
              detection_latency='Near-real-time (updated per turn)',
              where_it_runs='Inline session scoring plus fast async follow-up',
              attack_classes=[
                  'Multi-turn gradual jailbreak',
                  'Accumulation attack across turns',
                  'Escalation toward a constraint boundary',
              ],
              gateway_relationship='Session accumulator value read on the hot path',
              chapter_13_sections=['Section 13.02 (session modelling)', 'Section 13.09 (multi-turn analysis)'],
              owasp_coverage=['LLM01 (Prompt Injection -- multi-turn variant)'],
              hot_path_reads='Session threat accumulator value',
              strengths=[
                  'Catches escalation that every per-turn classifier passes',
                  'Small, short-lived state -- cheap to hold and score',
                  'Trajectory features (score slope, topic drift) are high signal',
                  'Near-real-time: detects within the session, not after it',
              ],
              failure_modes=[
                  'Session boundary definition errors split attacks across sessions',
                  'Misses cross-session patterns -- that is the entity family job',
                  'Requires per-track scores in the event stream to compute trajectory',
                  'Long sessions dilute escalation signal if not windowed',
              ],
          ),
          BehaviouralFamily(
              name='Temporal',
              state_held='Metric history per entity and per endpoint',
              state_lifetime='Rolling window -- days to weeks',
              detection_latency='Near-real-time plus scheduled analysis',
              where_it_runs='Async; compact deviation score read inline',
              attack_classes=[
                  'Burst abuse (sudden spike)',
                  'Slow-ramp exfiltration',
                  'Detector and model drift (silent degradation)',
              ],
              gateway_relationship='Precomputed deviation score read on the hot path',
              chapter_13_sections=[
                  'Section 13.03 (statistical baselines)',
                  'Section 13.04 (time-series anomaly detection)',
                  'Section 13.05 (drift detection)',
              ],
              owasp_coverage=['LLM04 (Model Denial of Service)', 'LLM10 (Model Theft)'],
              hot_path_reads='Precomputed baseline-deviation score',
              strengths=[
                  'Catches both the sudden burst and the patient ramp',
                  'Seasonal decomposition separates real anomalies from daily cycles',
                  'Drift sub-family catches silent Chapter 12 detector decay',
                  'Per-entity baselines avoid false positives on power users',
              ],
              failure_modes=[
                  'Ignoring seasonality fires on every Monday traffic spike',
                  'Baseline contamination absorbs a slow-enough attack into normal',
                  'Cold start: new entities have no history to score against',
                  'Metric history can be large -- cannot query inline at full depth',
              ],
          ),
          BehaviouralFamily(
              name='Entity-level',
              state_held='Persistent profile: baselines, risk events, fingerprint',
              state_lifetime='Indefinite, with decay',
              detection_latency='Async update; risk score read inline',
              where_it_runs='Async profile update; inline risk-score read',
              attack_classes=[
                  'Account compromise (fingerprint divergence)',
                  'Repeat abuse across sessions',
                  'Low-and-slow abuse under per-request thresholds',
              ],
              gateway_relationship='Precomputed entity risk score read on the hot path',
              chapter_13_sections=[
                  'Section 13.07 (rate-based detection)',
                  'Section 13.08 (smart rate limiting)',
                  'Section 13.10 (user behaviour profiling)',
              ],
              owasp_coverage=['LLM04 (Model Denial of Service)', 'LLM10 (Model Theft)'],
              hot_path_reads='Precomputed entity risk score',
              strengths=[
                  'Makes requester history a first-class input to every verdict',
                  'Fingerprint divergence is the account-compromise signal',
                  'Risk score composes with the rate limiter for graduated response',
                  'Persists across sessions where session state cannot',
              ],
              failure_modes=[
                  'Profiling without risk-score decay punishes recovered entities',
                  'Entity resolution errors split or merge actor histories',
                  'Persistent state cannot be queried inline at full depth',
                  'Privacy and retention constraints bound what can be stored',
              ],
          ),
          BehaviouralFamily(
              name='Graph-level',
              state_held='Entity-relationship graph across all entities',
              state_lifetime='Indefinite -- the largest state held',
              detection_latency='Batch (scheduled)',
              where_it_runs='Scheduled batch; findings written back as risk',
              attack_classes=[
                  'Coordinated abuse networks',
                  'Sybil clusters',
                  'Distributed campaigns across many accounts',
              ],
              gateway_relationship='Risk adjustment written back, read inline as score',
              chapter_13_sections=['Section 13.11 (graph-based detection and capstone)'],
              owasp_coverage=['LLM04 (Model Denial of Service)', 'LLM10 (Model Theft)'],
              hot_path_reads='Entity risk adjustment from the last batch run',
              strengths=[
                  'Catches coordination that no single-entity detector reveals',
                  'Community detection surfaces account clusters by structure',
                  'Detects distributed abuse spread to stay under per-account limits',
                  'Sybil and bot-ring detection via graph structure',
              ],
              failure_modes=[
                  'Largest and most expensive state -- batch only, never inline',
                  'Findings are delayed by the batch cadence',
                  'Edge construction quality bounds detection quality',
                  'Requires shared attributes in the event stream to link entities',
              ],
          ),
      ]


      def print_taxonomy_table(families: List[BehaviouralFamily]) -> None:
          print('Behavioural Detection Family Taxonomy')
          print('=' * 60)
          for f in families:
              print(f'\n[{f.name}]')
              print(f'  State held:    {f.state_held}')
              print(f'  State life:    {f.state_lifetime}')
              print(f'  Latency:       {f.detection_latency}')
              print(f'  Runs:          {f.where_it_runs}')
              print(f'  Hot path reads:{f.hot_path_reads}')
              print(f'  Sections:      {", ".join(f.chapter_13_sections)}')
              print(f'  OWASP:         {", ".join(f.owasp_coverage)}')
              print(f'  Attack classes:')
              for a in f.attack_classes:
                  print(f'    * {a}')
              print(f'  Strengths:')
              for s in f.strengths:
                  print(f'    + {s}')
              print(f'  Failure modes:')
              for fm in f.failure_modes:
                  print(f'    - {fm}')


      def per_request_vs_behavioural_summary() -> None:
          print('\nPer-Request vs Behavioural -- Coverage Summary')
          print('-' * 46)
          rows = [
              ('Single-turn jailbreak', 'DETECTED in request',          'Not needed'),
              ('Multi-turn jailbreak',  'FAIL -- each turn passes',     'Session: trajectory'),
              ('Direct injection',      'DETECTED in request',          'Not needed'),
              ('Exfiltration (rate)',   'FAIL -- queries are benign',   'Temporal + entity: aggregate'),
              ('Account takeover',      'FAIL -- plausible requests',   'Entity: fingerprint divergence'),
              ('Coordinated network',   'FAIL -- accounts ok alone',    'Graph: structure across accounts'),
              ('Injection success',     'PARTIAL -- input may score low','Output distribution shift'),
          ]
          fmt = '{:<24} {:<32} {:<34}'
          print(fmt.format('Attack', 'Per-Request (Ch12)', 'Behavioural (Ch13)'))
          print('-' * 90)
          for attack, pr, bh in rows:
              print(fmt.format(attack, pr, bh))


      if __name__ == '__main__':
