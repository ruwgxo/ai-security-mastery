          per_request_vs_behavioural_summary()

  deliverable_2:
    title: 'Behavioural Family Selector'
    filename: 'behavioural_family_selector.py'
    description: 'Decision logic that takes a described attack scenario and its observable signal location as input and returns the correct behavioural family, the state it requires, and the Chapter 13 sections that implement it. Implements the selection logic from Section 13.01 as a runnable tool.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # behavioural_family_selector.py
      # Section 13.01: Behavioural Family Selection Decision Logic
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Optional


      @dataclass
      class AttackScenario:
          name: str
          signal_spans_requests: bool
          signal_is_within_one_session: bool
          signal_is_metric_over_time: bool
          signal_is_divergence_from_own_history: bool
          signal_is_across_multiple_entities: bool
          signal_is_model_output_shift: bool


      @dataclass
      class FamilyRecommendation:
          scenario: str
          family: str
          state_required: str
          detection_latency: str
          sections: List[str]
          rationale: str


      def select_family(s: AttackScenario) -> FamilyRecommendation:
          # First gate: is this even a behavioural problem?
          if not s.signal_spans_requests:
              return FamilyRecommendation(
                  scenario=s.name,
                  family='Per-request (Chapter 12) -- not behavioural',
                  state_required='None (stateless)',
                  detection_latency='Inline, single-digit ms',
                  sections=['Chapter 12 -- per-request classifiers'],
                  rationale='The signal is in a single request; the Chapter 12 ensemble handles it. No behavioural state is required.',
              )

          # Model output-side shift -> output monitoring (temporal, output-side)
          if s.signal_is_model_output_shift:
              return FamilyRecommendation(
                  scenario=s.name,
                  family='Temporal (output-side) -- model behaviour monitoring',
                  state_required='Per-endpoint output distribution baseline',
                  detection_latency='Post-inference, off the response path',
                  sections=['Section 13.06 (model behaviour monitoring)'],
                  rationale='Injection success shows as output distribution shift, not input score; monitor the output against its baseline.',
              )

          # Within one session -> session family
          if s.signal_is_within_one_session:
              return FamilyRecommendation(
                  scenario=s.name,
                  family='Session-level',
                  state_required='Session object (short-lived)',
                  detection_latency='Near-real-time (per turn)',
                  sections=['Section 13.02 (session modelling)', 'Section 13.09 (multi-turn analysis)'],
                  rationale='The signal is the trajectory across turns of one session; aggregate the session and score the trajectory.',
              )

          # Metric over time -> temporal family
          if s.signal_is_metric_over_time:
              return FamilyRecommendation(
                  scenario=s.name,
                  family='Temporal',
                  state_required='Metric history per entity/endpoint (rolling window)',
                  detection_latency='Near-real-time plus scheduled',
                  sections=[
                      'Section 13.03 (statistical baselines)',
                      'Section 13.04 (time-series anomaly detection)',
                      'Section 13.07 (rate-based detection)',
                  ],
                  rationale='The signal is a metric deviating from its historical envelope; establish a baseline and detect temporal deviation.',
              )

          # Divergence from own history -> entity family
          if s.signal_is_divergence_from_own_history:
              return FamilyRecommendation(
                  scenario=s.name,
                  family='Entity-level',
                  state_required='Persistent entity profile (with decay)',
                  detection_latency='Async update; risk score read inline',
                  sections=['Section 13.10 (user behaviour profiling)', 'Section 13.08 (smart rate limiting)'],
                  rationale='The signal is divergence from the entity own fingerprint; build a persistent profile and score against it.',
              )

          # Across multiple entities -> graph family
          if s.signal_is_across_multiple_entities:
              return FamilyRecommendation(
                  scenario=s.name,
                  family='Graph-level',
                  state_required='Entity-relationship graph (largest state)',
                  detection_latency='Batch (scheduled)',
                  sections=['Section 13.11 (graph-based detection)'],
                  rationale='The signal is the structure between entities; build the relationship graph and detect coordinated structure.',
              )

          return FamilyRecommendation(
              scenario=s.name,
              family='Unclassified -- refine the signal description',
              state_required='Unknown',
              detection_latency='Unknown',
              sections=['Revisit Section 13.01 taxonomy'],
              rationale='The scenario spans requests but does not match a single family signature; decompose it further.',
          )


      def print_recommendation(s: AttackScenario) -> None:
          r = select_family(s)
          print(f'Scenario: {r.scenario}')
          print(f'  Family:        {r.family}')
          print(f'  State required:{r.state_required}')
          print(f'  Latency:       {r.detection_latency}')
          print(f'  Sections:      {", ".join(r.sections)}')
          print(f'  Rationale:     {r.rationale}')
          print()


      if __name__ == '__main__':
          scenarios = [
              AttackScenario(
                  name='Single-turn jailbreak with full payload in one prompt',
                  signal_spans_requests=False,
                  signal_is_within_one_session=False,
                  signal_is_metric_over_time=False,
                  signal_is_divergence_from_own_history=False,
                  signal_is_across_multiple_entities=False,
                  signal_is_model_output_shift=False,
              ),
              AttackScenario(
                  name='Gradual roleplay escalation across ten turns',
                  signal_spans_requests=True,
                  signal_is_within_one_session=True,
                  signal_is_metric_over_time=False,
                  signal_is_divergence_from_own_history=False,
                  signal_is_across_multiple_entities=False,
                  signal_is_model_output_shift=False,
              ),
              AttackScenario(
                  name='Ten thousand benign queries reconstructing a dataset',
                  signal_spans_requests=True,
                  signal_is_within_one_session=False,
                  signal_is_metric_over_time=True,
                  signal_is_divergence_from_own_history=False,
                  signal_is_across_multiple_entities=False,
                  signal_is_model_output_shift=False,
              ),
              AttackScenario(
                  name='Compromised account behaving unlike its own history',
                  signal_spans_requests=True,
                  signal_is_within_one_session=False,
                  signal_is_metric_over_time=False,
                  signal_is_divergence_from_own_history=True,
                  signal_is_across_multiple_entities=False,
                  signal_is_model_output_shift=False,
              ),
              AttackScenario(
                  name='Hundred accounts sharing IP range and synchronised timing',
                  signal_spans_requests=True,
                  signal_is_within_one_session=False,
                  signal_is_metric_over_time=False,
                  signal_is_divergence_from_own_history=False,
                  signal_is_across_multiple_entities=True,
                  signal_is_model_output_shift=False,
              ),
              AttackScenario(
                  name='Injection that took control: model output distribution shifted',
                  signal_spans_requests=True,
                  signal_is_within_one_session=False,
                  signal_is_metric_over_time=False,
                  signal_is_divergence_from_own_history=False,
                  signal_is_across_multiple_entities=False,
                  signal_is_model_output_shift=True,
              ),
          ]
          print('Behavioural Family Selection')
          print('=' * 60)
          for sc in scenarios:
              print_recommendation(sc)

  deliverable_3:
    title: 'Gateway Event Schema for Behavioural Analysis'
    filename: 'behavioural_event_schema.py'
    description: 'Defines the per-request event schema that the Chapter 12 gateway emits and the Chapter 13 behavioural families consume. Validates that an event carries the fields each behavioural family requires and reports which families a given event can and cannot feed. Makes the shared contract between the two chapters explicit and checkable.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # behavioural_event_schema.py
      # Section 13.01: Gateway Event Schema for Behavioural Analysis
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      @dataclass
      class GatewayEvent:
          # Identity and routing
          entity_id: Optional[str]
          session_id: Optional[str]
          endpoint: Optional[str]
          timestamp: Optional[float]
          source_ip: Optional[str]
          credential_id: Optional[str]
          # Per-track classifier scores from the Chapter 12 ensemble
          injection_score: Optional[float]
          jailbreak_score: Optional[float]
          anomaly_score: Optional[float]
          pii_score: Optional[float]
          # Ensemble verdict
          ensemble_tier: Optional[str]
          action_taken: Optional[str]


      # Each family lists the event fields it requires to function
      FAMILY_REQUIREMENTS: Dict[str, List[str]] = {
          'Session-level': ['session_id', 'timestamp', 'injection_score', 'jailbreak_score'],
          'Temporal': ['entity_id', 'endpoint', 'timestamp'],
          'Entity-level': ['entity_id', 'timestamp', 'ensemble_tier'],
          'Graph-level': ['entity_id', 'source_ip', 'credential_id', 'timestamp'],
      }


      def missing_fields(event: GatewayEvent, required: List[str]) -> List[str]:
          gaps = []
          for fieldname in required:
              if getattr(event, fieldname, None) is None:
                  gaps.append(fieldname)
          return gaps


      def assess_event(event: GatewayEvent) -> None:
          print('Behavioural Event Coverage Assessment')
          print('-' * 42)
          for family, required in FAMILY_REQUIREMENTS.items():
              gaps = missing_fields(event, required)
              if not gaps:
                  print(f'[x] {family}: can be fed (all {len(required)} required fields present)')
              else:
                  print(f'[ ] {family}: cannot be fed -- missing {", ".join(gaps)}')
          print()


      if __name__ == '__main__':
          # A complete event feeds every behavioural family
          complete = GatewayEvent(
              entity_id='user_4821',
              session_id='sess_99a1',
              endpoint='/v1/chat',
              timestamp=1_718_900_000.0,
              source_ip='203.0.113.7',
              credential_id='key_5f',
              injection_score=0.12,
              jailbreak_score=0.34,
              anomaly_score=0.08,
              pii_score=0.01,
              ensemble_tier='low',
              action_taken='passed',
          )
          print('--- Complete event ---')
          assess_event(complete)

          # An event missing the entity id breaks entity and graph families
          anonymous = GatewayEvent(
              entity_id=None,
              session_id='sess_77b2',
              endpoint='/v1/chat',
              timestamp=1_718_900_050.0,
              source_ip=None,
              credential_id=None,
              injection_score=0.20,
              jailbreak_score=0.55,
              anomaly_score=0.15,
              pii_score=0.00,
              ensemble_tier='medium',
              action_taken='flagged',
          )
          print('--- Event missing entity_id, source_ip, credential_id ---')
          assess_event(anonymous)

          print('Lesson: behavioural detection quality is bounded by event quality.')
          print('A missing stable entity_id silently disables entity and graph detection.')

common_mistakes:

  mistake_1:
    description: 'Treating behavioural analysis as a replacement for the per-request gateway and reducing investment in the Chapter 12 classifiers once behavioural detection is deployed'
    why_it_happens: |
      Behavioural detection catches the sophisticated cross-request attacks that look most
      impressive in a detection report: the multi-turn jailbreak, the coordinated network, the
      account takeover. Next to these, per-request classification can look like a solved, lower-tier
      problem. Engineers reallocate attention to the behavioural layer and let the per-request
      classifiers stagnate.
    consequence: |
      Behavioural detection consumes the event stream that the per-request gateway produces. If the
      per-request classifiers degrade, the per-track scores in the event stream degrade, and every
      session and entity detector that relies on score trajectory degrades with them. Worse, the
      single-request attacks that only the per-request layer catches start passing again. The
      behavioural layer cannot compensate -- it was never designed to catch the single-request
      attack, and it depends on the per-request layer as its sensor.
    correct_approach: |
      Treat the two layers as a composed system with a shared contract. The per-request gateway is
      the sensor that catches single-request attacks and emits the event stream; the behavioural
      layer is the analysis that catches cross-request attacks over that stream. Both must be
      maintained. The event schema is the contract between them, and degrading either side degrades
      the whole.

  mistake_2:
    description: 'Putting a query against deep behavioural state on the request hot path -- recomputing entity history or traversing the graph inline to make a gateway decision'
    why_it_happens: |
      The entity profile and the relationship graph contain the richest detection signal in the
      system. When making a per-request gateway decision, it is tempting to query that signal
      directly: traverse the graph to check whether this entity is in a known abuse cluster,
      recompute the full rate history to decide whether to throttle. The richer the inline query,
      the better the inline decision seems.
    consequence: |
      Deep behavioural state cannot be queried within a request latency budget. A graph traversal or
      a full-history recomputation adds tens to hundreds of milliseconds to every request, blowing
      the sub-50ms gateway budget established in Chapter 11. The product team disables the behavioural
      layer within a week because it made the API slow. The detection that would have caught the
      attack is removed because it was placed on the wrong path.
    correct_approach: |
      Keep the expensive analysis off the hot path and expose only cheap summaries to it. The entity
      profiler updates the profile asynchronously and writes a compact risk score; the graph detector
      runs in batch and writes back a risk adjustment. The hot path reads a precomputed score, never
      recomputes state. State requirement and detection latency are coupled: the families that hold
      large state must run async or batch, and the request path reads their summarised output.

  mistake_3:
    description: 'Doing anomaly detection without first establishing an explicit per-entity baseline, flagging deviation from a single global threshold'
    why_it_happens: |
      A global threshold is simpler to implement than per-entity baselines. Setting one request-rate
      limit for all users, one refusal-rate threshold for all sessions, requires no per-entity state
      and no cold-start handling. It looks like behavioural detection because it triggers on
      behaviour.
    consequence: |
      Normal behaviour varies enormously by entity. A request rate that is an attack for a casual
      user is a Tuesday for a heavy integration. A global threshold set high enough not to flag the
      power user is too high to catch the compromised low-volume account; set low enough to catch the
      compromised account, it floods on every power user. The detector produces false positives on
      legitimate heavy users and false negatives on the attacks it was meant to catch. This is
      covered in depth in Section 13.03, but the failure begins here, in the taxonomy: treating a
      temporal-family problem as if it needed no baseline state.
    correct_approach: |
      Recognise from the taxonomy that temporal and entity families require state -- a baseline or a
      profile -- precisely so that deviation is measured per entity rather than against a global
      constant. The state requirement is not incidental; it is what makes the detection correct.
      Section 13.03 builds the per-entity baselines that every temporal detector scores against.

  mistake_4:
    description: 'Designing the gateway event stream without the fields the behavioural families need, then discovering the gap only when building the detectors'
    why_it_happens: |
      The Chapter 12 gateway is designed to make a per-request verdict. For that purpose, it needs
      the request and the classifier scores; it does not strictly need a stable cross-session entity
      identifier, a source attribution, or the per-track score breakdown in the emitted event. An
      engineer focused on the per-request verdict emits a minimal event that records only the final
      decision.
    consequence: |
      Every behavioural family is bounded by what the event carries. An event without a stable
      entity identifier silently disables entity profiling and graph detection -- there is no key to
      accumulate history or link accounts. An event without the per-track scores disables session
      trajectory analysis. The gap is invisible until the behavioural detector is built and produces
      nothing, at which point the gateway must be re-instrumented and all historical events are
      already lost.
    correct_approach: |
      Treat the event schema as a shared contract designed up front, before the behavioural
      detectors are built. The event must carry a stable entity identifier, a session identifier,
      source and credential attribution, the per-track classifier scores, and the timestamp. The
      behavioural_event_schema.py deliverable makes this contract explicit and checkable so the gap
      is caught at design time, not at detector-build time.

  mistake_5:
    description: 'Classifying every cross-request attack as a single behavioural problem and building one monolithic detector instead of matching each attack class to its family'
    why_it_happens: |
      All four behavioural families share the property of holding state across requests, which makes
      them look like one problem. An engineer builds a single behavioural detector intended to catch
      escalation, exfiltration, compromise, and coordination all at once, reasoning that they are all
      just behaviour over time.
    consequence: |
      The four attack classes have fundamentally different signals and state requirements. Escalation
      lives in a session trajectory; exfiltration lives in a metric over time; compromise lives in
      divergence from an entity baseline; coordination lives in the structure between entities. A
      single detector that tries to cover all four either holds the union of all state -- making it
      as expensive as the graph family for every request -- or compromises on each, catching none
      well. The monolith is both slow and weak.
    correct_approach: |
      Use the taxonomy to match each attack class to the family whose state and latency profile fit
      it. Session attacks get session state and near-real-time scoring; temporal attacks get metric
      history; entity attacks get persistent profiles; coordination gets the batch graph. Each
      detector holds exactly the state its attack class requires and runs at the latency that state
      permits. The families are separate by design because the attacks are separate by nature.

section_summary:

  compact: |
    Chapter 13 builds the behavioural layer of the detection stack, the fourth layer above the
    Chapter 11 signature and heuristic layers and the Chapter 12 ML layer. Per-request classification
    and behavioural analysis detect disjoint attack classes: the per-request gateway sees one request
    at a time and catches the single-request attack, while behavioural analysis holds state across
    requests and catches the attack whose signal spans them. Four behavioural signal families cover
    the cross-request threat surface, ordered by the state they hold: session-level (short-lived
    session state, catches multi-turn escalation), temporal (metric history, catches burst and
    slow-ramp abuse and detector drift), entity-level (persistent profile, catches account compromise
    and low-and-slow abuse), and graph-level (entity-relationship graph, catches coordinated
    networks). Behavioural detection consumes the per-request event stream the Chapter 12 gateway
    emits -- Chapter 12 is the sensor, Chapter 13 is the analysis. State requirement and detection
    latency are coupled: families that hold large state run async or in batch and expose only cheap
    summaries to the request hot path. The taxonomy is the map for the rest of the chapter: each
    section targets a named attack class, holds a defined state, and runs at the latency that state
    permits.

  key_takeaways:
    - 'Per-request classification and behavioural analysis detect disjoint attack classes: the per-request gateway catches the single-request attack, behavioural analysis catches the attack whose signal spans requests'
    - 'The four behavioural families are ordered by state held: session (short-lived), temporal (metric history), entity (persistent profile), and graph (entity-relationship graph)'
    - 'Behavioural detection consumes the per-request event stream rather than replacing the gateway -- Chapter 12 is the sensor that produces the stream, Chapter 13 is the analysis over it'
    - 'State requirement and detection latency are coupled: families holding large state run async or batch and expose only cheap precomputed summaries to the request hot path'
    - 'Anomaly detection requires an explicit per-entity baseline because normal behaviour varies by entity -- a global threshold floods on power users and misses compromised low-volume accounts'
    - 'Match each attack class to its family rather than building a monolith: escalation to session, rate abuse to temporal, compromise to entity, coordination to graph -- the families are separate because the attacks are separate'

preview_section_13_02:
  title: 'Section 13.02: Session Modelling and Behavioural Feature Engineering -- Aggregating the Request Stream'
  summary: |
    Section 13.02 builds the session modelling and behavioural feature pipeline that every
    session-level and entity-level detector in Chapter 13 consumes -- the behavioural analogue of
    the Section 12.02 feature pipeline that every per-request classifier shared. The session is the
    first aggregation unit above the request: bounded, attributable to one entity, and semantically
    coherent. The section addresses session boundary definition (time-window, explicit token, and
    inactivity-timeout strategies and their detection trade-offs), aggregation of the per-request
    event stream into a session object, and the behavioural features extracted from it: turn count,
    refusal rate, request cadence, inter-request interval distribution, and intra-session topic
    drift -- the high-signal escalation feature that measures how far a conversation moves from its
    opening topic. It builds the session store with streaming aggregation and configurable
    retention, and applies feature-importance analysis to identify which session signals carry
    independent detection signal. A well-modelled session with a topic-drift feature lets a
    downstream detector catch the gradual jailbreak that no per-turn classifier flags; a naive
    session model that only counts turns misses it entirely.

