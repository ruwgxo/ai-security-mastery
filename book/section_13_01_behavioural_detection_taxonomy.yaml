document_info:
  title: 'Behavioural Detection Taxonomy: From Per-Request Verdicts to Cross-Request Signals'
  chapter: 13
  section: 1
  section_code: '1301'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
