prose_content:

  part_1:
    title: 'The Unit-of-Detection Assumption and Where It Breaks'
    body: |
      Every detector in Chapter 12 shares one structural assumption: the request is the unit of
      detection. The feature pipeline extracts features from a request. The classifier scores a
      request. The ensemble combines per-request scores into a per-request verdict. The gateway
      blocks or passes a request. This is a clean, stateless architecture, and statelessness is
      an operational virtue: it scales horizontally, it has no shared mutable state to corrupt,
      and any gateway instance can score any request with no coordination.

      The assumption is correct for a large class of attacks. A single-turn jailbreak whose full
      payload is in one prompt is detectable in that prompt. A direct injection that carries its
      entire instruction-override in one request is detectable in that request. A PII leak in one
      response is detectable in that response. For these attacks, the request genuinely is the
      unit, and Chapter 12 catches them.

      The assumption breaks for any attack whose signal is not in any single request but in the
      relationship between requests. Consider four concrete cases. First, a multi-turn jailbreak:
      the adversary spends ten turns gradually moving a roleplay scenario toward a harmful output,
      and each individual turn is benign enough to pass the per-turn classifier. The attack is the
      trajectory, not any turn. Second, an exfiltration campaign: the adversary issues ten thousand
      individually reasonable queries to reconstruct a proprietary dataset, and no single query is
      suspicious. The attack is the rate and the coverage pattern. Third, an account takeover: a
      legitimate user's credentials are compromised, and the attacker's requests are individually
      plausible but collectively unlike how that specific user has ever behaved. The attack is the
      divergence from the entity's own baseline. Fourth, a coordinated network: a hundred accounts
      each behave acceptably alone but share a creation pattern, an IP range, and synchronised
      activity. The attack is the structure across accounts.

      None of these four has a per-request signal. A stateless classifier scoring each request in
      isolation passes every one of them. They are not edge cases; they are the dominant attack
      patterns against mature LLM APIs, precisely because adversaries adapt to the detection in
      place. Once per-request classification is deployed, the rational adversary moves to attacks
      that per-request classification cannot see. Behavioural analysis is the layer that closes
      that gap by holding state across requests and detecting in that state.

  part_2:
    title: 'The Four Behavioural Signal Families'
    body: |
      Four behavioural signal families are relevant to LLM API security. They differ in the state
      they hold, the detection latency that state permits, and the attack class each covers.

      Session-level signals aggregate the requests within a single session into a session object
      and detect patterns across the turns of that session. The state is the session: bounded,
      attributable to one entity, and held for the session's lifetime. Session analysis catches
      the multi-turn jailbreak and the accumulation attack, where the signal is the trajectory
      across turns -- score slope, topic drift, refusal-then-retry. Session state is small and
      short-lived, so session scoring can run in near-real-time, updated on each turn. Sections
      13.02 (session modelling) and 13.09 (multi-turn context analysis) implement this family.

      Temporal signals treat a behavioural metric -- request rate, refusal rate, error rate -- as
      a time series and detect deviation from its historical envelope. The state is the metric
      history per entity or per endpoint, held as a rolling window. Temporal analysis catches the
      sudden burst and the slow ramp: the two opposite signatures of abuse over time. Because the
      metric history can be large and the analysis involves seasonal decomposition, temporal
      detection runs as near-real-time or scheduled analysis rather than on the request hot path.
      Sections 13.03 (statistical baselines), 13.04 (time-series anomaly detection), and 13.05
      (drift detection) implement this family. Drift is a special case: it watches the detectors
      and the model rather than the user, catching silent degradation.

      Entity-level signals build a persistent profile of how an entity behaves across all of its
      sessions and score new activity against that profile. The state is the persistent entity
      profile: aggregated baselines, historical risk events, and a behavioural fingerprint, held
      indefinitely with decay. Entity analysis catches account compromise -- divergence from the
      entity's own fingerprint -- and makes a requester's history a first-class input to every
      verdict. Persistent state cannot be queried inline at full depth on the request path, so the
      profile is summarised into a risk score that is cheap to read inline while the full profile
      updates asynchronously. Sections 13.07 (rate-based detection), 13.08 (smart rate limiting),
      and 13.10 (user behaviour profiling) implement this family.

      Graph-level signals model the relationships between entities -- shared infrastructure,
      synchronised timing, behavioural similarity -- as a graph and detect coordinated structure.
      The state is the entity-relationship graph, the largest and most expensive state of the four.
      Graph analysis catches the coordinated abuse network and the Sybil cluster, which no
      single-entity detector reveals. Graph construction and community detection are batch
      operations run on a schedule, not inline. Section 13.11 implements this family and integrates
      the behavioural layer into the gateway.

  part_3:
    title: 'The Event Stream: How Chapter 12 Output Becomes Chapter 13 Input'
    body: |
      Behavioural analysis does not re-score requests. It consumes the per-request verdicts that
      the Chapter 12 gateway already produced. This is the central architectural relationship of
      the two chapters: Chapter 12 is the sensor layer, and Chapter 13 is the analysis over the
      sensor output.

      Every request that passes through the Chapter 12 seven-track gateway emits an event. The
      event carries the request metadata (entity identifier, session identifier, endpoint,
      timestamp), the per-track classifier scores (injection score, jailbreak score, anomaly
      score, PII score), the ensemble verdict and tier, and the action taken (passed, flagged,
      blocked). This event stream is the input to all four behavioural families. The session
      modeller aggregates events by session identifier. The baseline and time-series detectors
      aggregate the numeric fields by entity and endpoint over time. The entity profiler
      accumulates events into persistent per-entity state. The graph detector links entities by
      the shared attributes carried in the events.

      The consequence is that behavioural detection quality is bounded by event quality. If the
      Chapter 12 gateway does not emit the per-track scores, the behavioural layer cannot use the
      trajectory of those scores across a session. If the event lacks a stable entity identifier,
      the entity profiler cannot accumulate history and the graph detector cannot link accounts.
      The event schema is therefore a shared contract between the two chapters, and Section 13.02
      treats its design as the first task of behavioural modelling rather than an afterthought.

      This also clarifies why behavioural detection is additive rather than a replacement. The
      per-request gateway must keep running -- it is the sensor that produces the stream. Removing
      it to rely on behavioural analysis alone is removing the sensor and keeping the analytics,
      which detects nothing. The two layers compose: per-request classification catches the
      single-request attack and produces the event stream, and behavioural analysis catches the
      cross-request attack by analysing that stream.

  part_4:
    title: 'State Requirement Drives Detection Latency'
    body: |
      The four families are ordered by the state they hold, and that ordering determines where
      each can run. This coupling between state requirement and detection latency is the single
      most important architectural fact in Chapter 13, because it dictates which detectors can sit
      on the request hot path and which cannot.

      Stateless per-request scoring -- the Chapter 12 baseline -- runs inline with single-digit
      millisecond latency because it holds no state to query. Session scoring holds small,
      short-lived state and runs in near-real-time: the session object is updated on each turn and
      scored within the session, which adds a small inline cost or a fast asynchronous follow-up.
      Temporal and entity analysis hold larger state -- metric histories and persistent profiles --
      that cannot be queried at full depth within a request's latency budget. These families run as
      near-real-time asynchronous analysis, and their output is summarised into a compact signal (a
      baseline-deviation score, an entity risk score) that is cheap to read inline. Graph analysis
      holds the largest state and runs as scheduled batch jobs, with its findings written back as
      entity risk adjustments that the inline path reads.

      This produces a layered timing model. On the request hot path, the gateway reads the
      per-request classifier scores and the compact summaries that behavioural analysis has already
      computed -- the entity risk score, the current rate-limit state, the session accumulator.
      Near-real-time, the session scorer, the baseline detectors, and the entity profiler update
      their state from the event stream. In batch, the graph detector and the drift monitors run on
      a schedule and write their findings back as risk adjustments and alerts.

      The practical rule that follows: never put a query against deep behavioural state on the
      request path. A rate-limit decision reads a precomputed counter, not a full recomputation of
      the entity's history. A gateway verdict reads a precomputed entity risk score, not a live
      graph traversal. Behavioural detection earns its coverage by doing the expensive analysis
      off the hot path and exposing only cheap summaries to the latency-sensitive path.

  part_5:
    title: 'The Behavioural Layer in the Detection Stack and the Chapter Roadmap'
    body: |
      Chapter 11 Section 11.03 defined the layered detection stack: signature detection (Sigma
      rules), heuristic detection (rule-based scoring), ML detection (trained classifiers), and
      behavioural detection. Chapter 11 built the signature and heuristic layers. Chapter 12 built
      the ML layer. Chapter 13 builds the fourth and final layer of that stack. Each layer catches
      what the layers below it miss: signatures catch known patterns, ML catches novel variants of
      known attack classes, and behavioural analysis catches attacks whose signal spans requests
      and therefore has no per-request representation for any of the lower layers to score.

      The layers are strictly additive in coverage and strictly ordered in cost. Signature
      detection is cheapest and narrowest. ML detection is more expensive and broader. Behavioural
      detection is the most expensive, because it holds state, and the broadest, because it sees
      the cross-request attacks the other three layers cannot. A detection system is not complete
      until all four layers are present; a system with only the first three has a structural blind
      spot for escalation, exfiltration, compromise, and coordination.

      The rest of Chapter 13 implements the four behavioural families in an order that builds state
      from small to large. Section 13.02 builds session modelling and the shared behavioural
      feature pipeline. Sections 13.03 and 13.04 build the statistical baselines and time-series
      anomaly detection that define and detect temporal deviation. Section 13.05 builds drift
      detection, which keeps the Chapter 12 detectors from failing silently. Section 13.06 builds
      model behavioural monitoring, which detects injection success in the model's output rather
      than injection attempts in the input. Sections 13.07 and 13.08 build rate-based detection and
      adaptive smart rate limiting for aggregate abuse. Section 13.09 builds multi-turn context
      analysis for the escalation attacks that defeat per-turn scoring. Section 13.10 builds the
      persistent user behaviour profile and entity risk score. Section 13.11 builds graph-based
      detection and integrates the whole behavioural layer into the Chapter 12 gateway as the
      capstone. Section 13.12 closes the chapter and previews Chapter 14's production deployment.

      Each section is a deliberate choice on the taxonomy this section establishes: it targets a
      named attack class, holds a defined state, and runs at the detection latency that state
      permits. The taxonomy is the map; the chapter is the territory.

