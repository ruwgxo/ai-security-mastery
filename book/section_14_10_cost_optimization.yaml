prose_content:
  part_1:
    title: Cost Is a Survival Requirement
    body: |-
      Every concern in this chapter so far has been about making the gateway work: place it,
      make it fast, scale it, keep it resilient, make it observable and operable. Cost is
      different in kind. A gateway can be excellent on every other axis and still fail on this
      one, and when it fails on cost the failure is total, because the response to an
      unaffordable system is not to tune it but to turn it off. A detection system that is
      switched off provides no security whatsoever, so cost neglect is a security failure
      delivered by way of a finance decision.

      This gives cost the same status as latency and availability rather than a lower one. In
      Section 14.04, a detector too slow to keep was shown to provide no protection because it
      gets removed; the argument here is identical in shape. A detection tier too expensive to
      keep provides no protection because it gets removed, and the removal is just as final. The
      bill is a hard constraint the way the latency budget is a hard constraint: exceed it
      persistently and the system does not degrade gracefully, it gets shut down. Cost
      optimisation is therefore not an efficiency exercise to do if there is time -- it is a
      survival requirement, and it belongs in the deployment engineering alongside the
      concerns that are more obviously about keeping the system alive.

      The good news is that most of the cost of a detection gateway is concentrated and
      addressable. The expensive work is not spread evenly across every request; it is
      concentrated in a few heavy detectors on the slower tiers, and those are exactly the ones
      where cost can be reduced without touching the security-critical coverage. The task of
      this section is to find where the cost actually is, apply the right lever to each place,
      and do it all while keeping the checks that must run on every request running on every
      request. That begins with understanding what drives the cost in the first place.
  part_2:
    title: The Cost Drivers and Where They Fall
    body: |-
      A detection gateway spends money in three ways, and knowing which one dominates where is
      what tells you which lever to reach for. The three drivers are inference cost -- the
      model calls a detector makes; compute cost -- the CPU and processing the tiers consume;
      and storage cost -- holding the state a detector needs. They do not fall evenly across
      the tiers, and the unevenness is the whole point.

      The inline tier is dominated by inference volume. Its detectors run on every single
      request, so even a cheap per-call cost, multiplied by the full request rate, becomes the
      largest contributor for that tier. Its state is minimal -- it reads precomputed summaries
      rather than holding much -- so storage is negligible, and its compute is the modest cost
      of signature and heuristic checks. The lever that fits an inference-volume-dominated tier
      is caching, because caching cuts the number of expensive calls on repeated inputs without
      cutting coverage, which is the only kind of reduction the inline tier can accept.

      The batch tier is the opposite. It runs heavy analytics over a large historical corpus,
      so it is dominated by compute -- large data-parallel jobs -- and storage -- the corpus at
      rest. Its volume in requests is low because it runs periodically, not per request, but
      each run is expensive. The levers that fit a compute-and-storage-dominated tier are
      sampling and batching: sampling reduces how much of the expensive analytics runs, and
      batching amortises the per-job overhead across the corpus. The near-real-time tier sits
      between them, with moderate compute over recent-window state. The cost driver table for
      this section maps each tier to its dominant driver, because applying one lever everywhere
      -- caching a batch job, or trying to sample an inline security check -- is how
      optimisation efforts get spent in the wrong place.
  part_3:
    title: The Cost-Versus-Coverage Trade-Off
    body: |-
      Of the three levers, two are free of any coverage cost and one is not, and this asymmetry
      organises the whole section. Caching and batching reduce cost without reducing coverage.
      A cache hit returns the same verdict the detector would have computed, just without
      recomputing it, so caching changes what it costs to check a repeated input, not whether
      it is checked. Batching runs the same detections it always would, just grouped to share
      the per-call overhead, so it changes the overhead per detection, not the set of
      detections. Because neither touches coverage, caching and batching are safe to apply
      wherever they help.

      Sampling is the exception, and it is the lever that requires judgement, because sampling
      reduces cost precisely by reducing coverage. To sample is to run a detector on some
      requests and not others, which by definition means some requests go unchecked by that
      detector. Whether that is acceptable depends entirely on what the detector is for, and
      this is where cost optimisation becomes a security decision. The test is simple to state:
      does the detector need per-request coverage, or does it estimate a signal that a
      representative subset carries just as well?

      For a security-critical check the answer is that coverage is the whole point. An
      injection classifier exists to block the injection on this request; a sampled-out request
      is a request whose injection is never checked, which is an unblocked attack. Sampling such
      a detector does not weaken a statistic, it opens a hole, and an attacker who learns the
      sampling rate knows exactly how often the check is absent. For an analytics detector the
      answer is different. A coordinated-network analysis looks for an aggregate pattern across
      many entities, and a population baseline is by nature a statistical estimate; both are
      computed from a sample already, so running them on a representative subset carries the
      signal at a fraction of the cost with no meaningful loss. The rule of thumb is exact: if
      a missed call means a missed attack, never sample; if a missed call only slightly weakens
      a statistical estimate, sampling is safe.
  part_4:
    title: The Inline Checks Run on Every Request
    body: |-
      The cost-versus-coverage test resolves, for a detection gateway, into a hard placement
      rule for sampling, and it is worth stating on its own because it is the line that must
      not be crossed under cost pressure. The inline security-critical checks -- injection,
      jailbreak, output PII -- run on every request and are never sampled. The expensive
      analytics on the near-real-time and batch tiers, which tolerate a representative subset,
      are where sampling is applied.

      This rule aligns cost optimisation with the architecture the chapter has built rather
      than cutting against it. The inline tier was already the tier of small-state,
      per-request, security-critical detection, kept fast enough to run on every request within
      the latency budget. That it also runs on every request for coverage reasons is the same
      fact from a different angle: these are the checks whose value is that no request escapes
      them. The near-real-time and batch tiers were already the tiers of large-state,
      aggregate, analytical detection, kept off the hot path. That they also tolerate sampling
      is, again, the same fact -- their value is a signal estimated over many requests, which a
      subset carries. The sampling placement falls exactly along the tier boundary the
      state-latency coupling drew, because the property that made a detector belong on a tier is
      the same property that decides whether it can be sampled.

      The cost optimiser deliverable for this section enforces this in code: a detector marked
      security-critical cannot be given a sampling rate below one, and attempting it is an
      error rather than a tuning option. Caching may still reduce the cost of the inline checks
      on repeated inputs -- that is a coverage-free saving -- but their coverage is fixed at
      every request. The saving from the inline tier is therefore modest and comes only from
      caching, while the large savings come from the batch tier where sampling and batching
      apply. This is the correct shape: cost is reduced most where it is safe to reduce it,
      and not at all where reducing it would open a security hole.
  part_5:
    title: Sampling, Caching, and Batching in Practice
    body: |-
      With the placement settled, the three levers combine to bring the cost down. Their
      effects compose in a definite order on the tiers where all three apply. Sampling comes
      first and reduces the number of calls a detector makes, and it applies only to the
      non-critical analytics. Caching then removes a further fraction of the calls that remain,
      since a cache hit costs nothing to recompute. Batching finally reduces the per-call
      overhead on the calls that do run, by grouping them so the fixed cost of a call is shared
      across many. The cost optimiser applies them in this order and attributes the resulting
      cost per detector, so the effect of each lever is visible rather than lumped together.

      The composition is what makes the savings large on the expensive tiers. A batch analytics
      detector sampled to a tenth of requests, then batched to remove most of its per-call
      overhead, costs a small fraction of its baseline, and because it was the most expensive
      detector to begin with, that fraction is where most of the total saving comes from. The
      near-real-time session scorer, sampled to a quarter and batched, saves similarly. The
      inline checks, sampled not at all, save only what caching removes on repeated inputs --
      a modest but real reduction that never costs coverage.

      The cost analysis and optimisation report deliverable pulls this together at the level a
      budget owner cares about: the baseline and optimised spend per tier, the total per
      million requests, and the projected monthly spend at production volume. Attribution is
      the point of the report. Without it, an optimisation effort is guesswork -- someone shaves
      cost off whatever is easiest to reach, which is rarely where the money is. With it, the
      report shows plainly that the batch tier dominates the bill and the inline tier does not,
      so the effort goes where it pays and the security-critical coverage is left untouched
      because touching it would save little and cost much.
  part_6:
    title: Cost Controlled, and the Concerns Complete
    body: |-
      With sampling placed safely, caching and batching applied where they help, and cost
      attributed per detector and per tier, the gateway is affordable, and affordability is
      what keeps it alive. The cost that the 14.09 dashboard measures is now bounded and
      targeted: reduced most on the expensive analytics tiers where the cost-versus-coverage
      trade-off is safe, reduced modestly on the inline tier through caching alone, and never
      reduced by weakening a security-critical check. The gateway costs what a budget owner can
      sustain, without a coverage hole hidden inside the saving.

      It is worth holding onto the security framing one last time, because cost is the concern
      where it is easiest to lose. Every lever in this section was evaluated first for whether
      it costs coverage, and the one that does -- sampling -- was confined to the detectors
      that can spare it. A cost optimisation that quietly sampled an inline check would show a
      lovely saving on the report and a hole in the defence that no cost metric would ever
      reveal. Keeping the saving honest means keeping the coverage of the security-critical
      checks at every request, which this section does by construction.

      Cost was the last of the production concerns named in the Section 14.01 taxonomy. With it
      controlled, the full set is complete: placement chose where detection sits and where it
      hooks in; latency and scaling made it fast per request and sufficient in aggregate;
      failure policy and high availability made it resilient; observability and the dashboard
      made it operable; and cost optimisation made it affordable. Each concern has been
      engineered on its own. What remains is to put them together, because a gateway is not the
      sum of eight separate mechanisms but one service in which they all operate at once on the
      same request. Section 14.11 is that assembly: the production detection gateway capstone,
      where the architecture pattern, integration points, latency budget, scaling, failure
      policy, circuit breakers, observability, and cost optimisation come together into a
      single running service that meets its latency, availability, and cost targets together.
