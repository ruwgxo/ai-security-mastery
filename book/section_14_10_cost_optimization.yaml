document_info:
  title: 'Cost Optimisation: Sampling, Caching, and Batching'
  chapter: 14
  section: 10
  section_code: '1410'
  author: Raghav Dinesh
  github: https://github.com/ruwgxo/ai-security-mastery
  license: MIT
  version: '1.0'
  created: '2026-06-21'
  estimated_pages: 6
  estimated_reading_time: 45-55 minutes
section_overview:
  one_line_summary: 'A detection system with no cost discipline is switched off when the bill arrives,
    so cost optimisation is a survival requirement: sampling runs expensive analytics on a representative
    subset, caching reuses results for repeated inputs, and batching amortises per-call overhead -- applied
    where the cost-versus-coverage trade-off is safe, so the security-critical inline checks still run
    on every request while the expensive tiers stay affordable.'
  why_this_section_exists: |-
    The dashboard of Section 14.09 surfaced the cost of the gateway -- per million requests,
    per detector, per tier -- but showing a cost is not controlling it. This section controls
    it, and it is the last production concern from the 14.01 taxonomy. The consequence of
    neglect here is uniquely blunt: a gateway that is fast, scalable, resilient, and
    observable but too expensive is switched off when the bill arrives, and a switched-off
    detection system provides exactly no security. Cost is therefore not a nice-to-have to
    optimise if time permits; it is a survival requirement, on the same footing as latency and
    availability. This section works through the cost drivers -- inference calls, compute for
    the tiers, storage for state -- and applies three levers to bring them under control.
    Sampling runs expensive detection on a representative subset rather than every request.
    Caching reuses results for repeated or similar inputs. Batching amortises per-call overhead
    across many requests. The governing constraint throughout is the cost-versus-coverage
    trade-off, and getting it right is a security decision as much as a cost one: sampling
    trades coverage for cost, which is safe for analytics that estimate an aggregate signal and
    catastrophic for a security-critical check that must act on every request. So the section
    draws a hard line -- the inline security-critical detectors run on every request and are
    never sampled, while the expensive analytics that tolerate a representative subset are --
    and it attributes cost per detector and per tier so the optimisation is targeted where it
    pays. The result is a gateway kept affordable without weakening the coverage that matters.
  position_in_chapter: |-
    Section 14.10 is the cost section and the final single-concern section of Chapter 14,
    responding to the cost concern from the 14.01 taxonomy. It acts on the cost the 14.09
    dashboard measures. With cost now controlled, every production concern -- placement,
    latency, scaling, failure, availability, observability, operability, and cost -- has been
    engineered, and Section 14.11 assembles them all into the single running production gateway
    that is the chapter capstone.
learning_objectives:
  knowledge:
  - Explain why a detection system with no cost discipline is switched off when the bill arrives, making
    cost optimisation a survival requirement
  - Describe the three cost drivers -- inference cost, compute for the tiers, and storage for state --
    and how they fall differently across the tiers
  - Explain how sampling runs expensive detection on a representative subset, trading coverage for cost
  - Explain how caching reuses detection results for repeated inputs and how batching amortises per-call
    overhead, both reducing cost without reducing coverage
  - Explain the cost-versus-coverage trade-off and where sampling is safe versus where every request must
    be checked
  - Describe why the inline security-critical checks run on every request while expensive analytics are
    sampled
  - Explain cost attribution per detector and per tier and why it targets the optimisation
  skills:
  - Apply sampling, caching, and batching to the near-real-time and batch tiers with per-detector cost
    attribution
  - Build a cost driver table identifying the dominant driver per tier
  - Classify each detector as safe or unsafe to sample using the cost-versus-coverage test
  - Generate a cost analysis and optimisation report attributing spend per tier and projecting the saving
  security_mindset:
  - 'Recognise that cost is a security concern: a detection system too expensive to keep running provides
    no protection at all'
  - Internalise that sampling a security-critical check is a coverage hole -- a sampled-out request is
    an unblocked attack -- so those checks are never sampled
  - Understand that caching and batching reduce cost without reducing coverage, so they are safe everywhere,
    while sampling reduces coverage and must be placed carefully
  - Appreciate that cost attribution per detector and per tier is what prevents optimising the cheap things
    and missing where the bill actually goes
