deliverables:
  deliverable_1:
    title: 'Cost Optimiser: Sampling, Caching, and Batching'
    filename: cost_optimizer.py
    description: Applies sampling, caching, and batching to the detectors with per-detector cost attribution,
      enforcing that a security-critical detector cannot be sampled below full coverage -- attempting
      it raises an error -- so the inline checks keep every-request coverage while the expensive analytics
      are sampled and batched for most of the saving.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints per-detector baseline and optimised cost with the saving, and raises if a security-critical
      detector is sampled.
    code: |
      # cost_optimizer.py
      # Section 14.10: Sampling, Caching, and Batching for the Near-Real-Time and Batch Tiers
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      @dataclass
      class DetectorCost:
          name: str
          tier: str
          security_critical: bool     # if True, must run on every request -- never sampled
          cost_per_call_usd: float
          calls_per_million: int      # baseline: how many calls per million requests


      @dataclass
      class Optimisation:
          sampling_rate: float        # 1.0 = every request; < 1.0 only for non-critical
          cache_hit_rate: float       # fraction of calls served from cache
          batch_overhead_saving: float  # fraction of per-call overhead removed by batching


      # Baseline detectors across the tiers.
      DETECTORS: List[DetectorCost] = [
          DetectorCost('Injection classifier', 'inline', True, 0.000020, 1_000_000),
          DetectorCost('Jailbreak classifier', 'inline', True, 0.000018, 1_000_000),
          DetectorCost('Output PII scanner', 'inline', True, 0.000012, 1_000_000),
          DetectorCost('Session behaviour scorer', 'near_real_time', False, 0.000090, 1_000_000),
          DetectorCost('Coordinated-network', 'batch', False, 0.000600, 1_000_000),
          DetectorCost('Population baselining', 'batch', False, 0.000450, 1_000_000),
      ]

      # Optimisations. Security-critical inline detectors are NOT sampled (rate stays 1.0).
      OPTIMISATIONS: Dict[str, Optimisation] = {
          'Injection classifier': Optimisation(1.0, 0.35, 0.0),
          'Jailbreak classifier': Optimisation(1.0, 0.35, 0.0),
          'Output PII scanner': Optimisation(1.0, 0.10, 0.0),
          'Session behaviour scorer': Optimisation(0.25, 0.0, 0.40),
          'Coordinated-network': Optimisation(0.10, 0.0, 0.60),
          'Population baselining': Optimisation(0.10, 0.0, 0.60),
      }


      def optimised_cost(det: DetectorCost, opt: Optimisation) -> float:
          '''Cost per million requests after sampling, caching, and batching.

          Sampling reduces the number of calls (only for non-critical detectors).
          Caching removes a fraction of the remaining calls (cache hits cost nothing).
          Batching removes a fraction of per-call overhead on the calls that do run.
          A security-critical detector has sampling_rate 1.0, so its coverage is untouched.
          '''
          if det.security_critical and opt.sampling_rate < 1.0:
              raise ValueError(f'{det.name} is security-critical and must run on every request; sampling < 1.0 is forbidden')
          effective_calls = det.calls_per_million * opt.sampling_rate
          after_cache = effective_calls * (1.0 - opt.cache_hit_rate)
          effective_cost_per_call = det.cost_per_call_usd * (1.0 - opt.batch_overhead_saving)
          return after_cache * effective_cost_per_call


      def baseline_cost(det: DetectorCost) -> float:
          return det.calls_per_million * det.cost_per_call_usd


      def report() -> None:
          print('=' * 92)
          print('COST OPTIMISER: SAMPLING, CACHING, BATCHING (with per-detector attribution)')
          print('Security-critical inline checks run on every request; only analytics are sampled')
          print('=' * 92)
          header = ('Detector'.ljust(28) + 'Tier'.ljust(16) + 'Baseline $'.ljust(12)
                    + 'Optimised $'.ljust(13) + 'Saved')
          print(header)
          print('-' * 92)
          total_base = 0.0
          total_opt = 0.0
          for det in DETECTORS:
              opt = OPTIMISATIONS[det.name]
              base = baseline_cost(det)
              new = optimised_cost(det, opt)
              total_base += base
              total_opt += new
              saved_pct = 100.0 * (base - new) / base if base else 0.0
              flag = '  [critical -- full coverage]' if det.security_critical else ''
              print(det.name.ljust(28) + det.tier.ljust(16)
                    + f'${base:.2f}'.ljust(12) + f'${new:.2f}'.ljust(13)
                    + f'{saved_pct:.0f}%{flag}')
          print('-' * 92)
          total_saved = 100.0 * (total_base - total_opt) / total_base if total_base else 0.0
          total_label = 'TOTAL / million req'.ljust(28) + ''.ljust(16)
          print(total_label + f'${total_base:.2f}'.ljust(12) + f'${total_opt:.2f}'.ljust(13) + f'{total_saved:.0f}%')
          print()
          print('The inline security-critical detectors keep full coverage -- caching cuts their')
          print('cost only on repeated inputs, never their coverage. The expensive batch analytics')
          print('are sampled to a representative subset and batched, where the cost-versus-coverage')
          print('trade-off is safe, which is where most of the saving comes from.')


      if __name__ == '__main__':
          report()
  deliverable_2:
    title: Cost Driver Table
    filename: cost_driver_table.py
    description: 'Maps the three cost drivers -- inference, compute, storage -- across the tiers and identifies
      the dominant driver per tier, so the right lever is chosen: caching for the inference-dominated
      inline tier, sampling and batching for the compute-and-storage-dominated batch tier.'
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the per-tier cost drivers and the dominant-driver rationale.
    code: |
      # cost_driver_table.py
      # Section 14.10: Cost Drivers per Tier (Inference, Compute, Storage)
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class TierCost:
          tier: str
          inference_driver: str
          compute_driver: str
          storage_driver: str
          dominant: str


      TIERS: List[TierCost] = [
          TierCost(
              tier='Inline',
              inference_driver='Model classifier calls on every request (highest volume)',
              compute_driver='Hot-path CPU for signature and heuristic checks',
              storage_driver='Minimal -- reads precomputed summaries, holds little state',
              dominant='Inference volume: runs on every request, so per-call cost dominates',
          ),
          TierCost(
              tier='Near-real-time',
              inference_driver='Session scoring model calls on recent windows',
              compute_driver='Stream processing over recent-window state',
              storage_driver='Recent-window session state in a fast store',
              dominant='Compute and state: moderate volume, moderate state to hold',
          ),
          TierCost(
              tier='Batch',
              inference_driver='Analytics model calls over the corpus',
              compute_driver='Large data-parallel jobs over the historical corpus',
              storage_driver='Large historical corpus at rest (highest storage)',
              dominant='Compute and storage: heavy jobs over a large stored corpus',
          ),
      ]


      def print_drivers(tiers: List[TierCost]) -> None:
          print('=' * 90)
          print('COST DRIVER TABLE')
          print('Three drivers -- inference, compute, storage -- fall differently across the tiers')
          print('=' * 90)
          for t in tiers:
              print()
              print(f'TIER: {t.tier}')
              print(f'  Inference: {t.inference_driver}')
              print(f'  Compute  : {t.compute_driver}')
              print(f'  Storage  : {t.storage_driver}')
              print(f'  Dominant : {t.dominant}')


      def driver_note() -> None:
          print()
          print('=' * 90)
          print('WHY THE DRIVERS MATTER')
          print('=' * 90)
          print('The three cost drivers do not fall evenly. The inline tier is dominated by inference')
          print('volume, because it runs on every request -- so its lever is caching, which cuts repeated')
          print('calls without cutting coverage. The batch tier is dominated by compute and storage over')
          print('a large corpus -- so its levers are sampling and batching, which cut how much of the')
          print('expensive analytics runs. Knowing the dominant driver per tier is what tells you which')
          print('optimisation lever to reach for, rather than applying one lever everywhere.')


      if __name__ == '__main__':
          print_drivers(TIERS)
          driver_note()
  deliverable_3:
    title: Sampling Safety Guide
    filename: sampling_safety_guide.py
    description: Classifies each detector as safe or unsafe to sample by the cost-versus-coverage test,
      separating the security-critical checks that must run on every request from the analytics that a
      representative subset suffices for, with the rule of thumb that a missed call which means a missed
      attack is never sampled.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the never-sample and safe-to-sample groups and the cost-versus-coverage test.
    code: |
      # sampling_safety_guide.py
      # Section 14.10: Sampling Safety Guide (Where Sampling Is Safe, Where Every Request Must Be Checked)
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class SamplingRule:
          detector: str
          purpose: str
          sample_safe: bool
          reason: str


      RULES: List[SamplingRule] = [
          SamplingRule('Injection classifier', 'Block the attack on this request', False,
                       'Every request must be checked -- a sampled-out request is an unblocked attack'),
          SamplingRule('Jailbreak classifier', 'Block the jailbreak on this request', False,
                       'Every request must be checked -- coverage is the whole point of the detector'),
          SamplingRule('Output PII scanner', 'Prevent leaking PII in this response', False,
                       'Every response must be scanned -- a sampled-out response can leak PII'),
          SamplingRule('Session behaviour scorer', 'Estimate session risk over time', True,
                       'A representative subset estimates the session-level signal without per-request coverage'),
          SamplingRule('Coordinated-network analysis', 'Find coordinated campaigns in aggregate', True,
                       'The aggregate pattern is visible in a representative subset; per-request coverage not needed'),
          SamplingRule('Population baselining', 'Establish a statistical baseline', True,
                       'A statistical baseline is by nature computed from a sample, not the full population'),
      ]


      def print_guide(rules: List[SamplingRule]) -> None:
          print('=' * 92)
          print('SAMPLING SAFETY GUIDE')
          print('The test: does the detector need per-request coverage, or a representative signal?')
          print('=' * 92)
          unsafe = [r for r in rules if not r.sample_safe]
          safe = [r for r in rules if r.sample_safe]
          print()
          print('NEVER SAMPLE (every request must be checked):')
          for r in unsafe:
              print(f'  - {r.detector}')
              print(f'      purpose: {r.purpose}')
              print(f'      reason : {r.reason}')
          print()
          print('SAFE TO SAMPLE (a representative subset suffices):')
          for r in safe:
              print(f'  - {r.detector}')
              print(f'      purpose: {r.purpose}')
              print(f'      reason : {r.reason}')


      def the_test() -> None:
          print()
          print('=' * 92)
          print('THE COST-VERSUS-COVERAGE TEST')
          print('=' * 92)
          print('Sampling trades coverage for cost, so the question is whether the detector can')
          print('tolerate incomplete coverage. A security-critical check that must act on THIS')
          print('request cannot -- sampling it out means the attack on the sampled-out request is')
          print('never blocked. An analytics detector estimating an aggregate or statistical signal')
          print('can -- a representative subset carries the signal at a fraction of the cost.')
          print()
          print('Rule of thumb: if a missed call means a missed attack, never sample. If a missed')
          print('call only slightly weakens a statistical estimate, sampling is safe. The inline')
          print('security-critical checks run on every request; the expensive analytics are sampled.')


      if __name__ == '__main__':
          print_guide(RULES)
          the_test()
  deliverable_4:
    title: Cost Analysis and Optimisation Report
    filename: cost_analysis_report.py
    description: Generates a cost analysis report attributing baseline and optimised spend per tier, the
      total per million requests, and the projected monthly spend at production volume, showing that most
      of the saving is in the batch tier while the inline tier keeps full security coverage.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the per-tier cost attribution, the total, and the projected monthly spend and saving.
    code: |
      # cost_analysis_report.py
      # Section 14.10: Cost Analysis and Optimisation Report Generator
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class TierSpend:
          tier: str
          baseline_usd_per_million: float
          optimised_usd_per_million: float

          def saved_usd(self) -> float:
              return self.baseline_usd_per_million - self.optimised_usd_per_million

          def saved_pct(self) -> float:
              if self.baseline_usd_per_million == 0:
                  return 0.0
              return 100.0 * self.saved_usd() / self.baseline_usd_per_million


      @dataclass
      class CostReport:
          monthly_requests_millions: float
          tiers: List[TierSpend]

          def total_baseline(self) -> float:
              return sum(t.baseline_usd_per_million for t in self.tiers)

          def total_optimised(self) -> float:
              return sum(t.optimised_usd_per_million for t in self.tiers)

          def monthly_baseline(self) -> float:
              return self.total_baseline() * self.monthly_requests_millions

          def monthly_optimised(self) -> float:
              return self.total_optimised() * self.monthly_requests_millions


      def build_report() -> CostReport:
          return CostReport(
              monthly_requests_millions=4200.0,
              tiers=[
                  TierSpend('Inline', 50.00, 35.50),
                  TierSpend('Near-real-time', 90.00, 13.50),
                  TierSpend('Batch', 1050.00, 42.00),
              ],
          )


      def print_report(report: CostReport) -> None:
          print('=' * 88)
          print('COST ANALYSIS AND OPTIMISATION REPORT')
          print(f'Volume: {report.monthly_requests_millions:.0f} million requests/month')
          print('=' * 88)
          print()
          header = 'Tier'.ljust(18) + 'Baseline $/M'.ljust(15) + 'Optimised $/M'.ljust(16) + 'Saved'
          print(header)
          print('-' * 88)
          for t in report.tiers:
              print(t.tier.ljust(18) + f'${t.baseline_usd_per_million:.2f}'.ljust(15)
                    + f'${t.optimised_usd_per_million:.2f}'.ljust(16) + f'{t.saved_pct():.0f}%')
          print('-' * 88)
          tb = report.total_baseline()
          to = report.total_optimised()
          tot_pct = 100.0 * (tb - to) / tb if tb else 0.0
          print('TOTAL / million'.ljust(18) + f'${tb:.2f}'.ljust(15) + f'${to:.2f}'.ljust(16) + f'{tot_pct:.0f}%')
          print()
          print('PROJECTED MONTHLY SPEND')
          print('-' * 88)
          mb = report.monthly_baseline()
          mo = report.monthly_optimised()
          print(f'  Baseline : ${mb:,.0f} / month')
          print(f'  Optimised: ${mo:,.0f} / month')
          print(f'  Saved    : ${mb - mo:,.0f} / month ({100.0 * (mb - mo) / mb:.0f}%)')
          print()
          print('The report attributes cost per tier so the optimisation is targeted where it pays.')
          print('Most of the saving is in the batch tier, whose expensive analytics are safely')
          print('sampled and batched, while the inline tier keeps full security coverage and saves')
          print('only through caching. Cost attribution is what shows where a bill is actually going.')


      if __name__ == '__main__':
          print_report(build_report())
common_mistakes:
  mistake_1:
    description: Treating cost optimisation as an efficiency nice-to-have rather than a survival requirement
    why_it_happens: |-
      Cost does not break the system the way a latency breach or an outage does -- the gateway
      keeps working -- so cost feels like something to tidy up later once the real engineering
      is done.
    consequence: The gateway runs correctly but expensively until a finance review declares it unaffordable,
      and the response to an unaffordable system is to switch it off, so a detection system that worked
      perfectly provides no security because it no longer runs.
    correct_approach: 'Treat cost as a hard constraint on the same footing as latency and availability:
      a detection tier too expensive to keep provides no protection, so bound the cost deliberately as
      part of deployment engineering, not as an afterthought.'
  mistake_2:
    description: Sampling a security-critical inline check to save cost
    why_it_happens: |-
      Sampling is the most powerful cost lever, and the inline checks run on every request so
      they look like an obvious place to cut, especially when the cost report shows them
      running constantly.
    consequence: A sampled-out request is one whose injection, jailbreak, or PII leak is never checked,
      so sampling opens a coverage hole that is an unblocked attack, and an attacker who learns the sampling
      rate knows exactly how often the check is absent -- a security failure that no cost metric reveals.
    correct_approach: 'Never sample a security-critical check: the inline injection, jailbreak, and output-PII
      detectors run on every request, and cost is reduced there only through caching, which cuts recomputation
      without cutting coverage.'
  mistake_3:
    description: Applying one optimisation lever everywhere regardless of the tier dominant cost driver
    why_it_happens: |-
      One lever is simpler to reason about, and whichever technique a team is comfortable with
      gets reached for by default, without checking what actually drives the cost on each
      tier.
    consequence: Effort is spent caching a batch job that runs periodically and has few repeated inputs,
      or trying to batch an inline per-request check, so the optimisation lands where it does little while
      the dominant driver on each tier goes unaddressed.
    correct_approach: 'Identify the dominant cost driver per tier and apply the lever that fits it: caching
      for the inference-volume inline tier, sampling and batching for the compute-and-storage batch tier,
      rather than one lever everywhere.'
  mistake_4:
    description: Optimising without cost attribution, so effort goes to the cheapest things
    why_it_happens: |-
      Without a per-detector and per-tier breakdown, the visible cost is a single aggregate
      number, and optimisation naturally starts with whatever is easiest to change rather than
      whatever costs the most.
    consequence: A team shaves cost off cheap, easy-to-reach detectors while the batch tier that dominates
      the bill is never touched, so a great deal of effort produces a small saving and the actual cost
      driver is left running at full price.
    correct_approach: Attribute cost per detector and per tier first, so the optimisation is targeted
      at where the money actually goes -- usually the expensive analytics tiers -- and the cheap inline
      checks are left alone because saving there is small and risks coverage.
  mistake_5:
    description: Assuming caching and batching carry the same coverage risk as sampling
    why_it_happens: |-
      All three are grouped together as cost levers, so it is easy to treat them as equally
      risky and either apply sampling too freely or avoid caching and batching out of the same
      caution sampling deserves.
    consequence: Either the coverage-free savings of caching and batching are left on the table out of
      misplaced caution, or sampling is treated as equally safe and applied where it opens a coverage
      hole, both of which come from not distinguishing the levers.
    correct_approach: 'Distinguish the levers by their coverage cost: caching and batching reduce cost
      without reducing coverage and are safe anywhere they help, while sampling reduces coverage and is
      confined to detectors that a representative subset serves.'
section_summary:
  compact: |-
    A detection system with no cost discipline is switched off when the bill arrives, and a
    switched-off system provides no security, so cost optimisation is a survival requirement on
    the same footing as latency and availability, not an efficiency nice-to-have. The gateway
    spends money through three drivers -- inference calls, compute for the tiers, and storage
    for state -- which fall unevenly: the inline tier is dominated by inference volume because
    it runs on every request, and the batch tier by compute and storage over a large corpus.
    Three levers reduce the cost. Caching reuses results for repeated inputs and batching
    amortises per-call overhead, both reducing cost without reducing coverage, so they are safe
    anywhere they help. Sampling runs a detector on a representative subset, which reduces cost
    by reducing coverage, so it is governed by the cost-versus-coverage trade-off: if a missed
    call means a missed attack, never sample; if it only slightly weakens a statistical
    estimate, sampling is safe. This draws a hard line -- the inline security-critical checks
    run on every request and are never sampled, while the expensive analytics that tolerate a
    representative subset are -- and the line falls exactly along the state-latency tier
    boundary. The cost optimiser enforces that a security-critical detector cannot be sampled,
    and cost is attributed per detector and per tier so optimisation targets where the money
    actually goes: most saving comes from the expensive batch tier through safe sampling and
    batching, while the inline tier keeps full coverage and saves only through caching. Cost
    was the last production concern; with it controlled, Section 14.11 assembles all the
    concerns into the running gateway.
  key_takeaways:
  - A detection system with no cost discipline is switched off when the bill arrives, so cost is a survival
    requirement on the same footing as latency and availability
  - The three cost drivers -- inference, compute, storage -- fall unevenly, with the inline tier dominated
    by inference volume and the batch tier by compute and storage, and the dominant driver determines
    the lever
  - Caching and batching reduce cost without reducing coverage, so they are safe anywhere; sampling reduces
    coverage and is governed by the cost-versus-coverage trade-off
  - The inline security-critical checks run on every request and are never sampled, while the expensive
    analytics that a representative subset serves are sampled -- the line falling along the state-latency
    tier boundary
  - Cost is attributed per detector and per tier so optimisation targets where the money actually goes,
    which is the expensive batch tier, not the cheap inline checks
  - The saving is honest only if the security-critical coverage stays at every request, so the optimiser
    forbids sampling those checks by construction -- and cost was the last production concern before the
    capstone assembly
preview_section_14_11:
  title: The Production Detection Gateway Capstone
  summary: |-
    Every production concern has now been engineered on its own: placement, latency, scaling,
    failure policy, high availability, observability, operability, and cost. Section 14.11
    assembles them into one running service. It integrates the architecture pattern,
    integration points, and detection tiers; meets the sub-50ms P99 latency target under
    production load; wires in the fail-open/fail-closed policy, circuit breakers, and graceful
    degradation; connects the observability stack and the production dashboard; applies the
    cost optimisation across the tiers; and traces the end-to-end request flow, validating the
    gateway against its latency, availability, and cost targets together. It is the chapter
    capstone -- the complete production detection gateway.
