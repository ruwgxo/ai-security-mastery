section_content:

  subsection_01:
    number: "5.13.1"
    title: "EU AI Act: Risk Tier Architecture and Prohibited Uses"
    content: |
      overview_and_status: |
        The EU AI Act (Regulation 2024/1689) entered into force on 1 August 2024
        as the world's first comprehensive horizontal AI regulation. It applies to
        any provider placing AI systems on the EU market or putting them into service
        in the EU, regardless of where the provider is established. Extraterritorial
        reach is explicit: a US company deploying an AI system used by EU residents
        is in scope. Enforcement is phased, with full application from August 2026.

      four_risk_tiers:

        tier_01_unacceptable_risk:
          label: "Unacceptable Risk — Prohibited"
          enforcement_date: "February 2025"
          prohibited_practices:
            - "Subliminal manipulation causing harm (beyond voluntary attention engineering)"
            - "Exploitation of vulnerabilities of specific groups (age, disability)"
            - "Social scoring by public authorities for general purposes"
            - "Real-time remote biometric identification in public spaces by law enforcement (with narrow exceptions)"
            - "Emotion recognition in the workplace or educational institutions"
            - "Biometric categorisation revealing race, political opinion, religious belief, sexual orientation"
            - "Predictive policing based solely on profiling without individual criminal activity evidence"
          security_engineering_note: |
            Prohibited-tier surveillance AI is directly relevant to security product vendors.
            Any AI-powered surveillance system targeting EU residents must confirm it does not
            fall within these categories. Emotion recognition at a workplace security checkpoint
            is explicitly prohibited. Real-time facial recognition at public events is prohibited
            absent a law-enforcement exception.

        tier_02_high_risk:
          label: "High Risk — Conformity Assessment Required"
          enforcement_date: "August 2026 (full application)"
          annex_iii_categories:
            - "Biometric identification and categorisation of natural persons"
            - "Management and operation of critical infrastructure (water, gas, electricity, roads)"
            - "Education and vocational training (exam scoring, admission decisions)"
            - "Employment, worker management, access to self-employment (CV screening, promotion)"
            - "Access to essential private services and public services (credit scoring, benefits)"
            - "Law enforcement (risk assessment, evidence reliability, crime prediction)"
            - "Migration, asylum, border control (risk assessment, document verification)"
            - "Administration of justice and democratic processes (court AI, election AI)"
          technical_obligations: "See 5.13.2 — five mandatory technical controls"
          security_engineering_note: |
            Fraud detection (access to essential private services), anomaly detection in critical
            infrastructure, and AI-assisted security investigations (law enforcement adjacent) all
            land in Annex III. If your organisation deploys AI in any of these categories,
            the high-risk technical obligations apply.

        tier_03_limited_risk:
          label: "Limited Risk — Transparency Obligations Only"
          enforcement_date: "August 2026"
          obligations:
            - "Chatbots and conversational AI: disclose AI nature to users"
            - "Deepfake content: label AI-generated content as such"
            - "General-purpose AI (GPAI) models: technical documentation, copyright policy, training data summary"
          security_engineering_note: |
            Most commercial LLM deployments (customer service, coding assistants, internal tools)
            fall here. Transparency obligations are light — but GPAI providers with systemic
            risk designation face additional obligations (see tier_04).

        tier_04_minimal_risk:
          label: "Minimal Risk — Voluntary Codes of Practice Only"
          examples: "Spam filters, AI-enabled video games, recommendation systems with low stakes"
          security_engineering_note: "No mandatory technical controls. Voluntary best practices apply."

        special_category_gpai_systemic_risk:
          label: "GPAI Models with Systemic Risk — Enhanced Obligations"
          threshold: "Training compute ≥ 10^25 FLOPs (indicative)"
          additional_obligations:
            - "Model evaluation against state-of-the-art benchmarks"
            - "Adversarial testing (red-teaming) against systemic risks"
            - "Incident reporting to EU AI Office"
            - "Cybersecurity protection for the model and its training infrastructure"
          security_engineering_note: |
            This is the regulation that mandates red-teaming for large foundation models.
            The EU AI Office published guidance (2025) specifying that adversarial testing
            must cover the OWASP LLM Top 10 and MITRE ATLAS categories — directly mapping
            to Sections 5.3-5.8 of this book.

  subsection_02:
    number: "5.13.2"
    title: "EU AI Act Technical Obligations for High-Risk AI Systems"
    content: |
      the_five_mandatory_controls: |
        EU AI Act Chapter III, Section 2 (Articles 8-15) imposes five categories
        of technical obligation on high-risk AI systems. These are not process
        requirements — they are documented, auditable technical controls.
        Non-compliance is an enforcement risk; documented compliance is the defence.

      obligation_01_risk_management_system:
        article: "Article 9"
        requirement: |
          Establish, implement, document, and maintain a risk management system
          covering the entire AI system lifecycle: design, development, validation,
          deployment, monitoring, and decommissioning.
          Must include: risk identification, risk estimation, risk evaluation,
          risk mitigation measures, and residual risk acceptance.
        security_engineering_mapping: |
          The bias audit procedure (Section 5.12.7), the privacy risk audit (Section 5.11.7),
          and the ATLAS coverage assessment (Section 5.8.8) are all Article 9 risk management
          system components. Document them as such. The AI RMF MANAGE function (Section 5.14)
          provides the organisational scaffolding.
        documentation_artefact: "Risk management system document; risk register"

      obligation_02_data_governance:
        article: "Article 10"
        requirement: |
          Training, validation, and test datasets must meet quality criteria:
            - Relevant, representative, and adequately complete for intended purpose
            - Free from errors and complete with respect to statistical properties
            - Appropriate for the geographical, contextual, behavioural, and functional
              settings in which the AI system will be used
          Data governance practices documented: data collection, labelling, preprocessing.
        security_engineering_mapping: |
          ML SBOM Layer 1 (dataset provenance — Section 5.9) directly satisfies Article 10.
          Memorisation risk scoring (Section 5.10) and bias auditing (Section 5.12) produce
          the representativeness and error-free evidence Article 10 requires.
        documentation_artefact: "ML SBOM dataset layer; bias audit report Stage 2"

      obligation_03_technical_documentation:
        article: "Article 11 + Annex IV"
        requirement: |
          Maintain technical documentation demonstrating conformity before market placement.
          Annex IV specifies required content: system description, training methodology,
          training data characteristics, validation and testing procedures, performance metrics,
          known limitations, monitoring, logging, and human oversight measures.
        security_engineering_mapping: |
          Model cards (Section 5.12.7) + ML SBOM (Section 5.9) + privacy risk audit report
          (Section 5.11.7) collectively cover the Annex IV requirements. Treat the combined
          documentation package as the Annex IV technical file.
        documentation_artefact: "Model card (Markdown); ML SBOM (YAML); privacy audit report"

      obligation_04_accuracy_robustness_cybersecurity:
        article: "Article 15"
        requirement: |
          High-risk AI systems must be designed to achieve appropriate levels of:
            Accuracy: system performance meets declared specifications across anticipated inputs
            Robustness: system performs consistently under input variation, adversarial conditions,
              and unexpected inputs
            Cybersecurity: system is resilient against attempts to alter use, behaviour, or
              performance — specifically including adversarial examples and data poisoning
          The regulation explicitly names adversarial examples and data poisoning as cybersecurity threats.
        security_engineering_mapping: |
          This is the Article that makes ATLAS detection programme (Section 5.8) a compliance
          deliverable. Specifically:
            AML.T0019/T0020 detection → Article 15 data poisoning defence
            AML.T0015/T0043 detection → Article 15 adversarial example defence
            AML.T0025/T0029 detection → Article 15 availability and performance defence
          Document the detection programme as Article 15 cybersecurity controls.
        documentation_artefact: "ATLAS detection matrix (Section 5.8); Sigma rules from Section 5.8.8"

      obligation_05_human_oversight:
        article: "Article 14"
        requirement: |
          High-risk AI systems must be designed to enable effective oversight by natural persons.
          The system must allow operators to: understand system outputs and their significance,
          monitor system operation, override, interrupt, or stop the system, and identify
          anomalous situations.
        security_engineering_mapping: |
          Human-in-the-loop requirements, alert escalation paths, and model output explanation
          tools contribute to Article 14 compliance. The model card's human oversight
          recommendation section (Section 5.12.7) is Article 14 documentation.
        documentation_artefact: "Model card Section 6 (monitoring recommendations); alert runbooks"

      eu_ai_act_enforcement_structure:
        national_competent_authorities: "Each EU member state designates authority for high-risk AI"
        eu_ai_office: "Oversees GPAI models; can conduct evaluations and impose corrective measures"
        penalties:
          prohibited_practices: "Up to €35M or 7% global annual turnover"
          high_risk_violations: "Up to €15M or 3% global annual turnover"
          incorrect_information: "Up to €7.5M or 1.5% global annual turnover"
        enforcement_timeline:
          feb_2025: "Prohibited practices provisions apply"
          aug_2025: "GPAI model obligations and governance provisions apply"
          aug_2026: "High-risk obligations and transparency obligations fully apply"
          aug_2027: "High-risk AI systems embedded in regulated products"

  subsection_03:
    number: "5.13.3"
    title: "US Executive Order on AI: Red-Teaming, NIST Standards, and Safety Reporting"
    content: |
      eo_14110_context: |
        US Executive Order 14110 "Safe, Secure, and Trustworthy Artificial Intelligence"
        was signed October 30, 2023. It is not legislation — it directs federal agencies
        and establishes reporting requirements for AI developers. However, its effect on
        the AI industry is substantial because: (a) federal procurement requirements flow
        from it, (b) NIST standards mandated by it become de facto industry standards, and
        (c) the safety reporting threshold provisions affect the largest model developers.

      key_security_mandates:

        mandate_01_safety_reporting_threshold:
          provision: "Section 4.2(a)"
          requirement: |
            Developers of dual-use foundation models who train a model using a quantity
            of computing power greater than 10^26 floating-point operations (FLOPs) must
            report to the federal government. Reports include: physical and cybersecurity
            measures protecting model weights, results of red-team testing, and any
            identified safety risks.
          practical_implication: |
            This applies to GPT-4/5-scale and Gemini-scale models. The 10^26 FLOP threshold
            is roughly three orders of magnitude above models like Llama 3 70B.
            For security engineers at frontier AI labs: red-team results are now federal
            disclosures. The red-team programme is a compliance function, not just R&D.

        mandate_02_nist_standards_for_red_teaming:
          provision: "Section 4.1 / NIST mandate"
          requirement: |
            NIST to develop guidelines for AI red-teaming, evaluation, and testing.
            NIST AI RMF (Section 5.14) and NIST SP 800-218A (AI security) are the
            primary standards deliverables. Federal agencies must use these standards
            for AI procurement and deployment.
          practical_implication: |
            NIST AI RMF MEASURE function becomes the standard evaluation framework for any
            AI system sold to the US federal government. Security engineers building AI
            products for government customers need NIST AI RMF alignment.

        mandate_03_model_weight_security:
          provision: "Section 4.2(b)"
          requirement: |
            Agencies must identify cybersecurity risks associated with AI systems,
            particularly related to the security of model weights. Model weights are
            explicitly identified as a critical national security asset for dual-use
            foundation models.
          practical_implication: |
            AML.T0035 (collect ML artifacts) and AML.T0044 (full model access) detection
            from Section 5.8 are the technical implementation of this mandate.
            Storage access monitoring and registry access controls for model weights
            are EO-mandated security controls for federal-adjacent AI deployments.

        mandate_04_privacy_preserving_techniques:
          provision: "Section 9"
          requirement: |
            Federal agencies directed to advance privacy-preserving AI technologies including
            differential privacy, federated learning, and privacy-enhancing technologies.
          practical_implication: |
            DP training (Section 5.10.5) is an EO-endorsed privacy control. For federal
            contracting or grant-funded AI work: DP training with documented epsilon
            constitutes demonstrable compliance with Section 9 direction.

        mandate_05_content_authentication:
          provision: "Section 4.5"
          requirement: |
            Develop guidance for authenticating AI-generated content and watermarking.
            Federal agencies to develop technical standards for detecting AI-generated content.
          practical_implication: |
            AML.T0047 (influence operations via generative AI) detection from Section 5.8
            is the security engineering response to this mandate. AI content detection
            and watermarking tools are a mandated federal investment area.

      nist_ai_rmf_relationship: |
        The EO mandated NIST AI RMF development as the US AI risk management standard.
        Section 5.14 covers NIST AI RMF in full. The relationship is:
          EO 14110 → mandates NIST standards → NIST AI RMF is the primary standard
          → NIST AI RMF MEASURE function → maps to detection engineering programme
          → detection programme outputs satisfy EO and NIST compliance evidence

  subsection_04:
    number: "5.13.4"
    title: "GDPR-AI Intersection: Training Data, Explanation, and Erasure"
    content: |
      gdpr_ai_overview: |
        GDPR (General Data Protection Regulation, 2018) was not designed for AI systems
        but applies fully to any AI processing personal data of EU residents. Key provisions
        create specific obligations and conflicts for AI deployments — several of which were
        identified in earlier sections. This subsection maps the full set of GDPR obligations
        to AI engineering controls.

      article_mapping:

        article_5_lawfulness_purpose_minimisation:
          title: "Article 5 — Data Processing Principles"
          ai_obligation: |
            AI training on personal data requires a lawful basis (Article 6).
            Purpose limitation: training data collected for one purpose cannot be
            repurposed for AI training without new legal basis.
            Data minimisation: training data should be limited to what is necessary.
          engineering_control: |
            Data provenance documentation (ML SBOM Layer 1).
            PII density measurement and reduction before training.
            Corpus risk scorer (Section 5.10 implementation) documents minimisation effort.

        article_13_14_transparency:
          title: "Articles 13-14 — Transparency and Information Rights"
          ai_obligation: |
            Data subjects must be informed when their data is used in AI training,
            including the purpose, legal basis, and any automated decision-making.
            General privacy notice language ("we use data to improve our services")
            is insufficient for AI training disclosure under post-GDPR enforcement.
          engineering_control: |
            Training data disclosure in model card (Section 5.12.7).
            Data subject notification process documented before training begins.

        article_17_right_to_erasure:
          title: "Article 17 — Right to Erasure (Right to be Forgotten)"
          ai_obligation: |
            Data subjects may request deletion of their personal data. For AI models
            trained on personal data, this creates the fundamental conflict documented
            in Section 5.10.6: erasing data from model weights is technically distinct
            from deleting a database record.
          engineering_control: |
            DP training with documented epsilon (provides mathematical bound — Section 5.10.5).
            SISA training or gradient ascent unlearning for erasure requests (Section 5.11).
            Data minimisation before training reduces exposure.
            Erasure capability documentation in Article 30 records.

        article_22_automated_decision_making:
          title: "Article 22 — Automated Individual Decision-Making"
          ai_obligation: |
            Individuals have the right not to be subject to solely automated decisions
            that produce significant effects, unless the individual has consented,
            the decision is necessary for contract performance, or is authorised by law.
            Right to human review and to contest the decision applies.
          engineering_control: |
            Human oversight mechanisms (EU AI Act Article 14 alignment).
            Explanation tools: model output interpretation, confidence scores, decision factors.
            Audit log of automated decisions with human review escalation path.

        article_25_privacy_by_design:
          title: "Article 25 — Data Protection by Design and Default"
          ai_obligation: |
            Controllers must implement technical measures to ensure data protection
            principles are implemented by design. For AI: DP training, output monitoring,
            access controls on training data and model weights are Article 25 measures.
          engineering_control: |
            Privacy defence layer (Section 5.11 implementation) is Article 25 evidence.
            DP training with documented epsilon is an Article 25 technical measure.
            ML SBOM and access controls on training data document the design-stage controls.

        article_30_records_of_processing:
          title: "Article 30 — Records of Processing Activities"
          ai_obligation: |
            Controllers must maintain a record of processing activities including:
            purposes, categories of data subjects and personal data, recipients,
            transfers to third countries, retention periods, security measures.
            For AI: this record must cover training data sources and model deployment.
          engineering_control: |
            ML SBOM (Section 5.9) is the Article 30 record for AI processing.
            Model card technical documentation section covers processing description.

        article_35_dpia:
          title: "Article 35 — Data Protection Impact Assessment"
          ai_obligation: |
            DPIA required before processing likely to result in high risk to individuals.
            High-risk processing includes: systematic profiling with significant effects,
            large-scale processing of special categories of data, systematic monitoring.
            AI systems doing any of these require a documented DPIA.
          engineering_control: |
            Privacy risk audit (Section 5.11.7) is the technical component of the DPIA.
            Bias audit report (Section 5.12.7) covers the profiling risk dimension.
            Combined outputs constitute the technical DPIA evidence package.

      gdpr_ai_compliance_summary_table:
        training_data_lawfulness: "Article 5 + 6 — document legal basis before training"
        transparency_to_subjects: "Articles 13-14 — update privacy notice before training"
        erasure_requests: "Article 17 — DP training + unlearning capability required"
        automated_decisions: "Article 22 — human review path for significant decisions"
        privacy_by_design: "Article 25 — DP training + output controls + access controls"
        processing_records: "Article 30 — ML SBOM is the Article 30 record"
        impact_assessment: "Article 35 — privacy risk audit is the technical DPIA"

  subsection_05:
    number: "5.13.5"
    title: "Sector-Specific Overlays: HIPAA, SOX/GLBA, and Legal AI"
    content: |
      overlay_principle: |
        Sector-specific regulations impose additional obligations on top of horizontal
        frameworks (EU AI Act, GDPR). The overlay model applies: sector regulation
        sets the floor for that sector; horizontal regulation provides the additional
        baseline; security engineering provides the ceiling. All three must be satisfied.

      hipaa_healthcare_ai:
        scope: |
          US Health Insurance Portability and Accountability Act (HIPAA) applies to
          covered entities and business associates processing Protected Health Information (PHI).
          AI systems that process PHI — including clinical NLP, diagnostic AI, and any
          LLM fine-tuned on clinical data — are in scope.
        key_requirements_for_ai:
          minimum_necessary: |
            HIPAA's minimum necessary standard applied to AI training means using the
            minimum amount of PHI required for the training purpose. This directly
            supports data minimisation and reduces extraction risk.
          safeguards_rule: |
            Administrative, physical, and technical safeguards must protect PHI.
            For AI: technical safeguards on training data (encryption, access control),
            model weights (restricted access, as per Section 5.9), and inference outputs
            (PII scan before return, as per Section 5.10).
          baa_for_model_providers: |
            If a covered entity uses a third-party AI provider (API calls sending PHI),
            a Business Associate Agreement (BAA) is required. Most major AI providers
            offer BAAs — but the covered entity must verify the provider has an appropriate
            data processing agreement before any PHI-bearing prompt is sent.
          breach_notification: |
            If AI output contains PHI (verbatim recall event — Section 5.10), it constitutes
            a potential HIPAA breach. The output scanner (Section 5.10 implementation) is
            therefore both a security control and a breach detection mechanism.
        engineering_controls:
          - "DP training with ε ≤ 2 for models fine-tuned on PHI (Section 5.10.5)"
          - "PII output scan before returning inference results (Section 5.10 impl)"
          - "BAA in place before sending any PHI to external model provider"
          - "Access controls on PHI training data: HIPAA minimum necessary + Section 5.9 checks"
          - "Training data MIA AUC ≤ 0.55 (Section 5.11.5 medical threshold)"

      sox_and_glba_financial_ai:
        scope: |
          Sarbanes-Oxley (SOX) imposes internal control and audit trail requirements
          on US public companies and their IT systems, including AI systems used in
          financial reporting and material business processes. Gramm-Leach-Bliley Act
          (GLBA) applies to financial institutions processing consumer financial data.
        key_requirements_for_ai:
          sox_internal_controls: |
            SOX Section 404 requires documented internal controls over financial reporting.
            AI systems used in financial reporting (e.g. revenue recognition models,
            fraud detection in payment processing) must have documented controls,
            audit trails, and access controls equivalent to other financial systems.
          sox_audit_trail: |
            AI decisions affecting financial reporting must be auditable. Log retention
            for AI inference decisions affecting financial statements: minimum 7 years
            (SOX retention requirement).
          glba_safeguards_rule: |
            GLBA Safeguards Rule (2023 updated) requires financial institutions to
            implement a comprehensive information security programme. Explicitly covers
            AI models used in customer-facing processes. Requires: access controls,
            encryption, incident response plan, regular testing of safeguards.
          glba_model_risk_management: |
            OCC/Fed/FDIC supervisory guidance on model risk management (SR 11-7) requires:
            model documentation, validation (including adversarial testing), ongoing
            monitoring, and explainability for models used in credit decisions.
        engineering_controls:
          - "Audit log retention for AI decisions: 7 years minimum (SOX)"
          - "Model validation including bias audit before credit/fraud model deployment"
          - "Adversarial testing documentation for SR 11-7 model risk management"
          - "GLBA Safeguards Rule: encrypt model weights, restrict access, incident plan"

      legal_ai:
        scope: |
          AI used in legal proceedings, contract review, and legal research faces
          a patchwork of obligations from bar associations, court rules, and emerging
          legislation. Unlike HIPAA and SOX, there is no single federal statute —
          but obligations are real and enforcement is emerging.
        key_requirements:
          attorney_client_privilege: |
            If an LLM processes privileged communications, the privilege analysis applies.
            Using a third-party LLM API for privileged document review requires analysis
            of whether the API provider constitutes a waiver.
          court_rules_on_ai_assisted_filings: |
            Multiple US federal courts now require disclosure when AI is used to draft
            legal filings, with the filing attorney certifying AI-generated content was
            reviewed for accuracy. AI hallucination risk is a direct liability exposure.
          training_data_in_legal_proceedings: |
            If a model is trained on privileged or confidential client data, opposing
            counsel may seek to determine membership (Section 5.11) — establishing
            the model was trained on their client's confidential information.
        engineering_controls:
          - "No PHI or privileged documents in training data without explicit authorisation"
          - "MIA self-assessment before deploying any model trained on client data"
          - "Hallucination monitoring for legal output (factual accuracy monitoring)"
          - "Document AI tool usage in legal workflows for disclosure obligations"

  subsection_06:
    number: "5.13.6"
    title: "ENISA, China AI Regulations, and Global Regulatory Fragmentation"
    content: |
      enisa_ai_threat_landscape: |
        The European Union Agency for Cybersecurity (ENISA) published its AI Threat
        Landscape report series, providing a cybersecurity-focused complement to the
        EU AI Act's safety and rights framing. Key contributions to the regulatory stack:

        enisa_threat_taxonomy: |
          ENISA's AI threat taxonomy aligns closely with MITRE ATLAS (Section 5.7-5.8):
          adversarial examples, data poisoning, model theft, membership inference, and
          supply chain attacks are all covered. ENISA frames these as cybersecurity
          threats requiring technical countermeasures, not just policy responses.
          For compliance purposes: ENISA threat taxonomy + ATLAS detection programme
          constitutes the dual-authority technical basis for EU AI Act Article 15
          cybersecurity obligations.

        enisa_guidelines_for_securing_ai: |
          ENISA's 2023 Guidelines for Securing AI provide concrete technical recommendations:
            - Adversarial robustness testing before deployment
            - Supply chain verification (maps to Section 5.9)
            - Monitoring for distributional drift and adversarial inputs
            - Incident response procedures for AI-specific incidents
          These guidelines are not legally binding but represent the expected standard
          for demonstrating EU AI Act Article 15 cybersecurity compliance.

      china_ai_regulations: |
        China has implemented the most granular AI-specific regulations globally,
        ahead of the EU AI Act's phased implementation:

        algorithmic_recommendation_regulation_2022: |
          Applies to recommendation algorithms serving Chinese users. Requirements:
          transparency, explainability, user controls, prohibition on exploiting
          addiction or illegal price discrimination. Enforced by CAC.
        generative_ai_regulation_2023: |
          Applies to generative AI services (text, image, audio, video) available
          to Chinese public. Requirements: content safety evaluation before launch,
          labelling of AI-generated content, training data legitimacy, prohibition
          on generating illegal content. Providers must file with CAC/MIIT.
        implication_for_global_deployments: |
          Any AI product with Chinese user base requires Chinese regulatory compliance
          independently of EU AI Act. The content safety evaluation required for Chinese
          launch maps to the red-teaming and adversarial testing programme described
          in this book.

      global_regulatory_fragmentation: |
        Summary of key jurisdictions and their approach as of 2025-2026:

        jurisdiction_eu:
          framework: "EU AI Act"
          approach: "Risk-tier horizontal regulation with technical obligations"
          status: "In force; high-risk obligations from August 2026"

        jurisdiction_us:
          framework: "EO 14110 + sector-specific (HIPAA, SOX, FTC)"
          approach: "Executive action + voluntary frameworks + existing sector rules"
          status: "EO active; no federal AI statute as of 2026"

        jurisdiction_uk:
          framework: "Pro-innovation principles-based approach"
          approach: "Sector regulators apply existing frameworks to AI (FCA, CQC, ICO)"
          status: "No dedicated AI statute; reviewing post-Brexit divergence from EU"

        jurisdiction_china:
          framework: "Vertical regulations by AI application type"
          approach: "Prescriptive technical requirements; CAC/MIIT enforcement"
          status: "Generative AI regulation in force since 2023"

        jurisdiction_canada:
          framework: "AIDA (Artificial Intelligence and Data Act)"
          approach: "Risk-based, GDPR-influenced, biometrics and high-impact AI focus"
          status: "Bill C-27 includes AIDA; in parliamentary review as of 2026"

        jurisdiction_singapore:
          framework: "Model AI Governance Framework (PDPC)"
          approach: "Non-binding guidance; sector regulators apply to high-risk domains"
          status: "Voluntary framework; MAS (finance) has binding AI guidance"

        fragmentation_implication: |
          Global AI deployments require multi-jurisdiction compliance. The minimum
          viable compliance programme for a global LLM product must satisfy:
          EU AI Act (strictest horizontal), GDPR (strictest data), sector-specific
          (HIPAA/SOX where applicable), and Chinese regulations where Chinese users
          are served. No single standard covers all jurisdictions.

  subsection_07:
    number: "5.13.7"
    title: "Compliance as Floor: Mapping Regulatory Requirements to Security Engineering"
    content: |
      the_floor_ceiling_principle: |
        Regulatory compliance is the floor — the minimum technically defensible position
        that avoids enforcement action. Security engineering is the ceiling — the maximum
        technically achievable protection against adversarial attack. The floor and ceiling
        are not the same, and the distance between them is where most security incidents occur.

        The most dangerous position is assuming that meeting the regulatory floor provides
        adequate security protection. EU AI Act Article 15 compliance (documented robustness
        controls) does not prevent a skilled adversary from extracting training data. GDPR
        Article 25 compliance (privacy by design documentation) does not prevent membership
        inference by a motivated attacker with API access. The regulatory floor is a legal
        minimum, not a threat model.

      regulatory_to_security_mapping_table:
        eu_ai_act_article_9_risk_management:
          regulatory_floor: "Risk management system documented"
          security_ceiling: "ATLAS full detection programme (all 32 techniques); continuous red-teaming"
          gap: "Documentation vs. operating detection programme"

        eu_ai_act_article_10_data_governance:
          regulatory_floor: "Training data quality documented"
          security_ceiling: "ML SBOM + canary tokens + deduplication + DP training + continuous dataset monitoring"
          gap: "Documentation vs. operational integrity controls"

        eu_ai_act_article_15_cybersecurity:
          regulatory_floor: "Cybersecurity measures described for adversarial examples and data poisoning"
          security_ceiling: "AML.T0015/T0019/T0020/T0025/T0043 detection rules deployed and monitored"
          gap: "Description vs. deployed, tuned, monitored detection rules"

        gdpr_article_17_erasure:
          regulatory_floor: "Erasure request process documented"
          security_ceiling: "DP training ε ≤ 2 + SISA unlearning + canary token extraction monitoring"
          gap: "Process documentation vs. technical erasure capability"

        gdpr_article_25_privacy_by_design:
          regulatory_floor: "Privacy controls listed in design documentation"
          security_ceiling: "DP training deployed + output scanner in serving pipeline + MIA AUC measured and within threshold"
          gap: "Listed vs. deployed and measured"

        us_eo_red_teaming:
          regulatory_floor: "Red-teaming performed and results reported (for qualifying models)"
          security_ceiling: "Continuous red-team programme with ATLAS/OWASP coverage, regression testing per model version"
          gap: "Point-in-time vs. continuous adversarial testing"

      three_conditions_where_compliance_equals_security: |
        Three conditions under which regulatory compliance and security engineering
        produce equivalent outcomes (rare but achievable):
          (1) The regulation specifies concrete technical controls (not just principles)
              AND those controls are implemented operationally (not just documented)
              AND the controls are continuously monitored for effectiveness
          EU AI Act Article 15 can reach this bar for well-resourced high-risk AI providers
          if the cybersecurity measures are deployed detection rules, not policy statements.
          (2) The threat model is bounded by regulatory scope — adversaries do not exceed
              what the regulation was designed to address. This rarely holds in practice.
          (3) The organisation's security programme exceeds the regulatory floor and uses
              compliance obligations as a funding and governance mechanism for the ceiling.
              This is the target state.

      positioning_security_work_as_compliance_deliverables: |
        Security engineers who understand the regulatory mapping can position their
        technical work as compliance evidence, enabling budget justification through
        regulatory obligation:

          Detection programme (Chapters 11-13) → EU AI Act Article 15 cybersecurity compliance
          Privacy audit (Sections 5.10-5.11) → GDPR Article 35 DPIA technical component
          Bias audit (Section 5.12) → EU AI Act Article 9 + GDPR Article 25 evidence
          ML SBOM (Section 5.9) → EU AI Act Article 11 + GDPR Article 30 record
          Model card (Section 5.12.7) → EU AI Act Annex IV technical documentation
          Red-team results (Chapter 15) → US EO 14110 Section 4.2 safety reporting evidence

        The compliance framing does not change the security engineering work — it changes
        who approves the budget and how the work is described to non-technical stakeholders.

# ============================================================================
# IMPLEMENTATIONS
# ============================================================================

implementations:

  implementation_01:
    title: "EU AI Act Compliance Checker + Gap Analysis Tool"
    filename: "eu_ai_act_compliance.py"
    purpose: |
      Two tools:
      (1) EUAIActTierClassifier: classifies an AI deployment into the four EU AI Act
          risk tiers and returns applicable obligations and enforcement dates.
      (2) ComplianceGapAnalyser: given a deployment's current state (controls
          implemented or not) vs. required state per tier, produces a gap analysis
          report with per-obligation pass/fail, gap severity, and remediation priority.
    language: "python"
    code: |
      """
      EU AI Act Compliance Checker + Gap Analysis Tool
      Tier classification, obligation mapping, gap analysis.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional


      # -----------------------------------------------------------------------
      # Tier Classification
      # -----------------------------------------------------------------------

      PROHIBITED_INDICATORS = [
          "social_scoring", "real_time_biometric_public", "emotion_recognition_workplace",
          "subliminal_manipulation", "biometric_categorisation_sensitive",
          "predictive_policing_profile_only",
      ]

      HIGH_RISK_ANNEX_III = [
          "biometric_identification", "critical_infrastructure_management",
          "education_assessment", "employment_screening", "credit_scoring",
          "benefits_eligibility", "law_enforcement_risk_assessment",
          "border_control_risk_assessment", "court_ai",
          "fraud_detection_financial_services",     # access to essential private services
          "anomaly_detection_critical_infrastructure",
      ]

      GPAI_SYSTEMIC_RISK_INDICATORS = [
          "training_compute_above_1e25_flops",
          "frontier_model_public_api",
      ]

      LIMITED_RISK_INDICATORS = [
          "conversational_ai_customer_facing", "deepfake_generation",
          "general_purpose_llm_api",
      ]


      @dataclass
      class TierClassification:
          tier: str
          tier_label: str
          obligations: List[str]
          enforcement_date: str
          penalties: str
          indicators_matched: List[str]


      def classify_tier(deployment_attributes: List[str]) -> TierClassification:
          """
          Classify EU AI Act tier from a list of deployment attribute strings.
          Returns the highest applicable tier.
          """
          attrs = set(deployment_attributes)

          if attrs & set(PROHIBITED_INDICATORS):
              return TierClassification(
                  tier="prohibited", tier_label="Unacceptable Risk — Prohibited",
                  obligations=["CEASE OPERATION — this use is prohibited under EU AI Act Article 5"],
                  enforcement_date="February 2025",
                  penalties="Up to €35M or 7% global annual turnover",
                  indicators_matched=list(attrs & set(PROHIBITED_INDICATORS)),
              )

          matched_gpai_systemic = list(attrs & set(GPAI_SYSTEMIC_RISK_INDICATORS))
          matched_high = list(attrs & set(HIGH_RISK_ANNEX_III))
          matched_limited = list(attrs & set(LIMITED_RISK_INDICATORS))

          if matched_high:
              return TierClassification(
                  tier="high_risk",
                  tier_label="High Risk — Conformity Assessment + Technical Obligations",
                  obligations=[
                      "Article 9: Risk management system (documented lifecycle risk process)",
                      "Article 10: Data governance (training data quality documentation)",
                      "Article 11: Technical documentation (Annex IV technical file)",
                      "Article 14: Human oversight (override capability, anomaly detection)",
                      "Article 15: Accuracy, robustness, and cybersecurity controls",
                      "Article 16: Registration in EU AI Act database",
                      "Article 17: Quality management system",
                  ],
                  enforcement_date="August 2026",
                  penalties="Up to €15M or 3% global annual turnover",
                  indicators_matched=matched_high,
              )

          if matched_gpai_systemic:
              return TierClassification(
                  tier="gpai_systemic_risk",
                  tier_label="GPAI Model with Systemic Risk — Enhanced Obligations",
                  obligations=[
                      "Article 53: Model evaluation against state-of-the-art benchmarks",
                      "Article 55: Adversarial testing (red-teaming) for systemic risks",
                      "Article 55: Incident reporting to EU AI Office",
                      "Article 55: Cybersecurity protection for model and training infrastructure",
                      "Article 53: Technical documentation and transparency policy",
                  ],
                  enforcement_date="August 2025",
                  penalties="Up to €15M or 3% global annual turnover",
                  indicators_matched=matched_gpai_systemic,
              )

          if matched_limited:
              return TierClassification(
                  tier="limited_risk",
                  tier_label="Limited Risk — Transparency Obligations",
                  obligations=[
                      "Article 50: Disclose AI nature to users (chatbots)",
                      "Article 50: Label AI-generated content (deepfakes)",
                      "Articles 53-55: GPAI technical documentation (general GPAI)",
                  ],
                  enforcement_date="August 2026",
                  penalties="Up to €7.5M or 1.5% global annual turnover for transparency violations",
                  indicators_matched=matched_limited,
              )

          return TierClassification(
              tier="minimal_risk",
              tier_label="Minimal Risk — Voluntary Codes of Practice Only",
              obligations=["No mandatory obligations — voluntary best practices recommended"],
              enforcement_date="N/A",
              penalties="N/A",
              indicators_matched=[],
          )


      # -----------------------------------------------------------------------
      # Gap Analysis
      # -----------------------------------------------------------------------

      HIGH_RISK_CONTROLS = {
          "risk_management_system_documented":       ("Article 9",  "critical"),
          "training_data_quality_documented":         ("Article 10", "high"),
          "annex_iv_technical_file_complete":         ("Article 11", "high"),
          "human_oversight_mechanism_implemented":    ("Article 14", "high"),
          "accuracy_benchmarks_documented":           ("Article 15", "critical"),
          "robustness_testing_completed":             ("Article 15", "critical"),
          "adversarial_example_defence_deployed":     ("Article 15", "critical"),
          "data_poisoning_defence_deployed":          ("Article 15", "critical"),
          "model_card_bias_section_complete":         ("Article 9",  "medium"),
          "ml_sbom_complete":                         ("Article 10+11","high"),
          "atlas_detection_programme_deployed":       ("Article 15", "critical"),
          "bias_audit_completed":                     ("Article 9",  "high"),
          "privacy_risk_audit_completed":             ("Article 9",  "high"),
          "incident_response_plan_documented":        ("Article 17", "medium"),
      }

      GPAI_SYSTEMIC_CONTROLS = {
          "red_team_results_documented":              ("Article 55", "critical"),
          "benchmark_evaluation_completed":           ("Article 53", "critical"),
          "incident_reporting_process_established":   ("Article 55", "high"),
          "model_weight_cybersecurity_controls":      ("Article 55", "critical"),
          "transparency_policy_published":            ("Article 53", "medium"),
      }


      @dataclass
      class GapItem:
          control: str
          article: str
          severity: str
          status: str   # "implemented" / "partial" / "missing"
          remediation: str


      @dataclass
      class GapReport:
          model_id: str
          tier: str
          items: List[GapItem]
          critical_gaps: int
          high_gaps: int
          overall_compliance_pct: float
          deploy_recommendation: str


      def analyse_gaps(
          model_id: str,
          tier: str,
          implemented_controls: List[str],
      ) -> GapReport:
          control_set = (HIGH_RISK_CONTROLS if tier in ("high_risk",)
                         else GPAI_SYSTEMIC_CONTROLS if tier == "gpai_systemic_risk"
                         else {})
          if not control_set:
              return GapReport(model_id=model_id, tier=tier, items=[],
                               critical_gaps=0, high_gaps=0,
                               overall_compliance_pct=100.0,
                               deploy_recommendation="No mandatory controls for this tier.")

          items = []
          for control, (article, severity) in control_set.items():
              status = "implemented" if control in implemented_controls else "missing"
              items.append(GapItem(
                  control=control, article=article, severity=severity, status=status,
                  remediation=(
                      "Already implemented." if status == "implemented" else
                      f"Implement {control} — required for {article} compliance. "
                      f"See Section {'5.8' if 'atlas' in control or 'advers' in control or 'poison' in control else '5.9' if 'sbom' in control else '5.10' if 'privacy' in control else '5.12' if 'bias' in control else '5.13'}."
                  ),
              ))

          implemented = [i for i in items if i.status == "implemented"]
          missing = [i for i in items if i.status == "missing"]
          critical = [i for i in missing if i.severity == "critical"]
          high = [i for i in missing if i.severity == "high"]
          pct = len(implemented) / len(items) * 100 if items else 100.0

          rec = ("DEPLOY" if not critical and not high else
                 f"DO NOT DEPLOY — {len(critical)} critical and {len(high)} high gaps must be resolved")

          return GapReport(
              model_id=model_id, tier=tier, items=items,
              critical_gaps=len(critical), high_gaps=len(high),
              overall_compliance_pct=round(pct, 1),
              deploy_recommendation=rec,
          )


      def print_gap_report(r: GapReport) -> None:
          print(f"\n{'='*65}")
          print(f"EU AI ACT GAP ANALYSIS: {r.model_id}")
          print(f"Tier: {r.tier}  |  Compliance: {r.overall_compliance_pct:.1f}%")
          print(f"Critical gaps: {r.critical_gaps}  |  High gaps: {r.high_gaps}")
          print(f"Recommendation: {r.deploy_recommendation}")
          print(f"\nControl Status:")
          for i in sorted(r.items, key=lambda x: (x.status == "implemented", x.severity)):
              icon = "OK   " if i.status == "implemented" else f"GAP({i.severity.upper()[:4]})"
              print(f"  [{icon}] [{i.article}] {i.control}")
              if i.status != "implemented":
                  print(f"          → {i.remediation[:70]}")


      if __name__ == "__main__":
          # Example 1: Classify a fraud detection AI deployment
          fraud_attrs = ["fraud_detection_financial_services", "credit_scoring"]
          tier = classify_tier(fraud_attrs)
          print(f"\nTIER CLASSIFICATION: {tier.tier_label}")
          print(f"Matched: {tier.indicators_matched}")
          print(f"Enforcement date: {tier.enforcement_date}")
          print("Obligations:")
          for ob in tier.obligations:
              print(f"  - {ob}")

          # Example 2: Gap analysis for partially-compliant high-risk system
          implemented = [
              "risk_management_system_documented",
              "training_data_quality_documented",
              "ml_sbom_complete",
              "model_card_bias_section_complete",
              "bias_audit_completed",
          ]
          gap = analyse_gaps("FraudDetector-v2", "high_risk", implemented)
          print_gap_report(gap)

          # Example 3: Classify a customer chatbot
          chat_attrs = ["conversational_ai_customer_facing"]
          tier2 = classify_tier(chat_attrs)
          print(f"\nTIER CLASSIFICATION: {tier2.tier_label}")
          print(f"Obligations: {tier2.obligations}")

  implementation_02:
    title: "GDPR-AI Compliance Matrix + Sector Overlay Checker"
    filename: "gdpr_ai_compliance.py"
    purpose: |
      Two tools:
      (1) GDPRComplianceMatrix: maps each relevant GDPR article to AI engineering
          controls, current implementation status, and gap severity. Produces a
          compliance matrix report for any AI deployment processing EU personal data.
      (2) SectorOverlayChecker: given deployment sector (healthcare / financial /
          legal / general), returns the additional sector-specific obligations,
          required controls, and documentation artefacts beyond the GDPR baseline.
    language: "python"
    code: |
      """
      GDPR-AI Compliance Matrix + Sector Overlay Checker
      """

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      GDPR_AI_MATRIX = {
          "article_5_data_principles": {
              "title": "Article 5 — Lawfulness, Purpose Limitation, Data Minimisation",
              "ai_obligation": "Document legal basis for training; limit to necessary data; purpose-bound",
              "engineering_control": "ML SBOM dataset provenance; corpus PII density score < threshold",
              "documentation": "Training data legal basis memo; ML SBOM Layer 1",
              "severity": "critical",
          },
          "article_13_14_transparency": {
              "title": "Articles 13-14 — Transparency and Information Rights",
              "ai_obligation": "Inform data subjects training data includes their data; update privacy notice",
              "engineering_control": "Model card training data section; privacy notice update before training",
              "documentation": "Updated privacy notice; model card training data disclosure",
              "severity": "high",
          },
          "article_17_erasure": {
              "title": "Article 17 — Right to Erasure",
              "ai_obligation": "Respond to erasure requests; demonstrate technical erasure or impossibility",
              "engineering_control": "DP training ε documented; machine unlearning capability or documented constraint",
              "documentation": "DP epsilon parameter; erasure request procedure; unlearning capability statement",
              "severity": "high",
          },
          "article_22_automated_decisions": {
              "title": "Article 22 — Automated Decision-Making",
              "ai_obligation": "Human review path for significant automated decisions; contestability",
              "engineering_control": "Human-in-the-loop workflow; decision audit log; explanation tool",
              "documentation": "Human oversight procedure; audit log retention policy",
              "severity": "high",
          },
          "article_25_privacy_by_design": {
              "title": "Article 25 — Data Protection by Design",
              "ai_obligation": "Implement privacy controls at design stage not retrofitted",
              "engineering_control": "DP training; output PII scanner; MIA AUC within threshold",
              "documentation": "Privacy defence layer deployment record; MIA self-assessment result",
              "severity": "critical",
          },
          "article_30_records": {
              "title": "Article 30 — Records of Processing Activities",
              "ai_obligation": "Maintain record of processing including AI training and inference",
              "engineering_control": "ML SBOM (machine-readable processing record); model registry",
              "documentation": "ML SBOM YAML; model registry entry",
              "severity": "medium",
          },
          "article_35_dpia": {
              "title": "Article 35 — Data Protection Impact Assessment",
              "ai_obligation": "DPIA required for high-risk processing including AI profiling",
              "engineering_control": "Privacy risk audit (Sections 5.10-5.11); bias audit (Section 5.12)",
              "documentation": "Privacy risk audit report; bias audit report (technical DPIA package)",
              "severity": "high",
          },
      }

      SECTOR_OVERLAYS = {
          "healthcare": {
              "primary_regulation": "HIPAA (US) / MDR (EU)",
              "additional_obligations": [
                  "HIPAA Minimum Necessary: training on minimum PHI required",
                  "HIPAA Safeguards: encrypt PHI training data and model weights",
                  "BAA required before sending PHI to third-party AI provider",
                  "Breach notification if AI output contains PHI (verbatim recall = breach)",
                  "DP training ε ≤ 2 mandatory for models trained on PHI",
                  "MIA AUC ≤ 0.55 (medical threshold from Section 5.11.5)",
              ],
              "additional_controls": [
                  "phi_encrypted_at_rest_and_transit",
                  "baa_signed_with_model_provider",
                  "phi_output_scanner_deployed",
                  "dp_training_epsilon_le_2",
                  "mia_auc_le_0_55",
              ],
              "documentation": ["BAA", "HIPAA_risk_analysis", "phi_training_data_inventory"],
          },
          "financial": {
              "primary_regulation": "SOX (US) / GLBA (US) / PSD2 (EU)",
              "additional_obligations": [
                  "SOX S404: document AI internal controls over financial reporting",
                  "SOX: 7-year audit log retention for AI decisions affecting financials",
                  "GLBA Safeguards Rule: comprehensive info-security programme covering AI",
                  "SR 11-7 Model Risk Management: document, validate, and monitor AI models",
                  "Adversarial testing documentation required for SR 11-7 compliance",
                  "Bias audit required before any credit/fraud model deployment",
              ],
              "additional_controls": [
                  "audit_log_7yr_retention",
                  "model_risk_management_validation_report",
                  "adversarial_testing_documented",
                  "bias_audit_pre_deployment",
                  "glba_safeguards_programme_documented",
              ],
              "documentation": ["model_risk_management_report", "sr117_validation", "sox_controls_documentation"],
          },
          "legal": {
              "primary_regulation": "Bar association rules / court standing orders / sector-specific",
              "additional_obligations": [
                  "Attorney-client privilege analysis before processing client documents",
                  "BAA/NDA equivalent for legal document AI processing",
                  "Court filing disclosure: certify AI-assisted content reviewed for accuracy",
                  "MIA self-assessment before deploying model trained on client data",
                  "Hallucination monitoring mandatory for legal output use cases",
              ],
              "additional_controls": [
                  "privilege_analysis_documented",
                  "mia_self_assessment_completed",
                  "hallucination_monitoring_deployed",
                  "ai_disclosure_process_for_filings",
              ],
              "documentation": ["privilege_analysis", "ai_disclosure_procedure", "mia_audit_report"],
          },
          "general": {
              "primary_regulation": "GDPR + EU AI Act (as applicable to tier)",
              "additional_obligations": ["No additional sector obligations beyond GDPR and EU AI Act"],
              "additional_controls": [],
              "documentation": [],
          },
      }


      @dataclass
      class GDPRComplianceItem:
          article_key: str
          title: str
          ai_obligation: str
          engineering_control: str
          documentation: str
          severity: str
          status: str   # "implemented" / "partial" / "missing"


      @dataclass
      class ComplianceMatrixReport:
          model_id: str
          sector: str
          gdpr_items: List[GDPRComplianceItem]
          sector_gaps: List[str]
          critical_count: int
          high_count: int
          compliance_pct: float
          recommendation: str


      def run_gdpr_matrix(
          model_id: str,
          sector: str,
          implemented_controls: List[str],
          implemented_docs: List[str],
      ) -> ComplianceMatrixReport:
          items = []
          for key, data in GDPR_AI_MATRIX.items():
              ctrl_present = any(c in implemented_controls for c in
                                  data["engineering_control"].lower().split())
              doc_present  = any(d in implemented_docs for d in
                                  data["documentation"].lower().split())
              status = ("implemented" if ctrl_present or doc_present else "missing")
              items.append(GDPRComplianceItem(
                  article_key=key, title=data["title"],
                  ai_obligation=data["ai_obligation"],
                  engineering_control=data["engineering_control"],
                  documentation=data["documentation"],
                  severity=data["severity"], status=status,
              ))

          overlay = SECTOR_OVERLAYS.get(sector, SECTOR_OVERLAYS["general"])
          sector_gaps = [c for c in overlay["additional_controls"]
                         if c not in implemented_controls]

          critical = [i for i in items if i.severity == "critical" and i.status == "missing"]
          high = [i for i in items if i.severity == "high" and i.status == "missing"]
          implemented = [i for i in items if i.status == "implemented"]
          pct = len(implemented) / len(items) * 100 if items else 100.0
          rec = ("COMPLIANT — monitor for regulatory updates" if not critical and not high else
                 f"GAPS REMAIN — {len(critical)} critical, {len(high)} high, {len(sector_gaps)} sector-specific")

          return ComplianceMatrixReport(
              model_id=model_id, sector=sector,
              gdpr_items=items, sector_gaps=sector_gaps,
              critical_count=len(critical), high_count=len(high),
              compliance_pct=round(pct, 1), recommendation=rec,
          )


      def print_compliance_matrix(r: ComplianceMatrixReport) -> None:
          print(f"\n{'='*65}")
          print(f"GDPR-AI COMPLIANCE MATRIX: {r.model_id}  (sector: {r.sector})")
          print(f"GDPR compliance: {r.compliance_pct:.1f}%  |  "
                f"Critical gaps: {r.critical_count}  High gaps: {r.high_count}")
          print(f"Recommendation: {r.recommendation}")
          print("\nGDPR Articles:")
          for i in r.gdpr_items:
              icon = "OK  " if i.status == "implemented" else f"GAP({i.severity[:4].upper()})"
              print(f"  [{icon}] {i.title[:55]}")
          if r.sector_gaps:
              print(f"\nSector-specific gaps ({r.sector}):")
              for g in r.sector_gaps:
                  print(f"  MISSING: {g}")


      if __name__ == "__main__":
          # Healthcare AI deployment
          hc_controls = ["dp_training_epsilon_le_2", "phi_output_scanner_deployed",
                          "baa_signed_with_model_provider"]
          hc_docs = ["ML_SBOM", "model_card", "privacy_notice"]
          r = run_gdpr_matrix("clinical-llm-v1", "healthcare", hc_controls, hc_docs)
          print_compliance_matrix(r)

          # Financial AI deployment
          fin_controls = ["audit_log_7yr_retention", "model_risk_management_validation_report"]
          fin_docs = ["ML_SBOM", "bias_audit_report"]
          r2 = run_gdpr_matrix("fraud-detector-v2", "financial", fin_controls, fin_docs)
          print_compliance_matrix(r2)

          # Print sector overlay for healthcare
          overlay = SECTOR_OVERLAYS["healthcare"]
          print(f"\n{'='*55}\nSECTOR OVERLAY: healthcare")
          print(f"Primary regulation: {overlay['primary_regulation']}")
          print("Additional obligations:")
          for ob in overlay["additional_obligations"]:
              print(f"  - {ob}")

  implementation_03:
    title: "Regulatory Timeline Tracker"
    filename: "regulatory_timeline.py"
    purpose: |
      Produces a regulatory timeline tracking enforcement dates, obligation milestones,
      and recommended implementation deadlines. Covers EU AI Act phases, US EO
      milestones, and GDPR ongoing obligations. For a given deployment tier and sector,
      outputs a prioritised implementation roadmap with days-until-deadline for each
      milestone from a configurable reference date.
    language: "python"
    code: |
      """
      Regulatory Timeline Tracker
      EU AI Act phases, US EO milestones, GDPR ongoing, sector-specific.
      """

      from dataclasses import dataclass, field
      from datetime import date, timedelta
      from typing import List, Optional


      @dataclass
      class RegulatoryMilestone:
          regulation: str
          obligation: str
          enforcement_date: date
          tier_applicability: List[str]   # which EU AI Act tiers this applies to
          sector_applicability: List[str] # "all" or specific sectors
          implementation_lead_weeks: int  # weeks before enforcement to complete impl
          priority: str                   # "critical" / "high" / "medium"
          engineering_action: str


      MILESTONES = [
          RegulatoryMilestone(
              "EU AI Act", "Prohibited practices — cease any prohibited AI uses",
              date(2025, 2, 2), ["prohibited"], ["all"], 12, "critical",
              "Audit all AI systems for prohibited-tier indicators; cease if found",
          ),
          RegulatoryMilestone(
              "EU AI Act", "GPAI model obligations and EU AI Office registration",
              date(2025, 8, 2), ["gpai_systemic_risk", "limited_risk"], ["all"], 16, "critical",
              "Complete red-team programme; register with EU AI Office; publish transparency policy",
          ),
          RegulatoryMilestone(
              "EU AI Act", "Governance and accountability provisions apply to all providers",
              date(2025, 8, 2), ["high_risk", "limited_risk", "gpai_systemic_risk"], ["all"], 8, "high",
              "Establish AI governance roles; appoint EU representative if needed",
          ),
          RegulatoryMilestone(
              "EU AI Act", "High-risk AI: full technical obligations (Articles 9-17)",
              date(2026, 8, 2), ["high_risk"], ["all"], 26, "critical",
              "Complete: risk management system, technical file (Annex IV), ATLAS detection programme, bias audit",
          ),
          RegulatoryMilestone(
              "EU AI Act", "Limited-risk AI: transparency obligations (Article 50)",
              date(2026, 8, 2), ["limited_risk"], ["all"], 4, "medium",
              "Implement AI disclosure to users; label AI-generated content",
          ),
          RegulatoryMilestone(
              "EU AI Act", "High-risk AI embedded in regulated products",
              date(2027, 8, 2), ["high_risk"], ["all"], 52, "high",
              "Applies to AI in medical devices, vehicles, machinery under existing product regulations",
          ),
          RegulatoryMilestone(
              "GDPR", "Article 35 DPIA — required before high-risk processing",
              date(2024, 1, 1), ["high_risk", "gpai_systemic_risk"], ["all"], 0, "critical",
              "Complete privacy risk audit (Sections 5.10-5.11) before training on personal data",
          ),
          RegulatoryMilestone(
              "GDPR", "Article 25 Privacy by Design — ongoing obligation",
              date(2024, 1, 1), ["high_risk", "gpai_systemic_risk", "limited_risk"], ["all"], 0, "critical",
              "DP training deployed; output PII scanner active; MIA AUC within threshold",
          ),
          RegulatoryMilestone(
              "US EO 14110", "Safety reporting for models above 10^26 FLOPs threshold",
              date(2024, 3, 1), ["gpai_systemic_risk"], ["all"], 0, "critical",
              "Red-team results reported to federal government for qualifying models",
          ),
          RegulatoryMilestone(
              "US EO 14110", "NIST AI RMF adoption for federal procurement",
              date(2024, 7, 1), ["high_risk", "gpai_systemic_risk"], ["all"], 8, "high",
              "NIST AI RMF mapping complete for any federal-adjacent AI product",
          ),
          RegulatoryMilestone(
              "HIPAA", "BAA required for any PHI in AI API calls — ongoing",
              date(2024, 1, 1), ["all"], ["healthcare"], 0, "critical",
              "Execute BAA with all AI API providers before any PHI is sent",
          ),
          RegulatoryMilestone(
              "SOX", "7-year audit log retention for AI decisions affecting financials",
              date(2024, 1, 1), ["all"], ["financial"], 0, "high",
              "Configure AI inference log retention to 7 years; document in records retention policy",
          ),
      ]


      @dataclass
      class TimelineItem:
          milestone: RegulatoryMilestone
          days_until: int
          status: str   # "overdue" / "urgent" / "upcoming" / "future"
          impl_deadline: date


      def generate_timeline(
          tier: str,
          sector: str,
          reference_date: Optional[date] = None,
      ) -> List[TimelineItem]:
          today = reference_date or date.today()
          items = []
          for m in MILESTONES:
              if tier not in m.tier_applicability and "all" not in m.tier_applicability:
                  continue
              if sector not in m.sector_applicability and "all" not in m.sector_applicability:
                  continue
              days = (m.enforcement_date - today).days
              impl_deadline = m.enforcement_date - timedelta(weeks=m.implementation_lead_weeks)
              status = ("overdue" if days < 0 else
                        "urgent" if days < 90 else
                        "upcoming" if days < 365 else "future")
              items.append(TimelineItem(milestone=m, days_until=days,
                                         status=status, impl_deadline=impl_deadline))
          return sorted(items, key=lambda x: x.milestone.enforcement_date)


      def print_timeline(items: List[TimelineItem], tier: str, sector: str) -> None:
          print(f"\n{'='*70}")
          print(f"REGULATORY TIMELINE: tier={tier}  sector={sector}")
          print(f"{'Date':>12}  {'Status':>10}  {'Priority':>10}  {'Regulation + Obligation'}")
          print("-" * 70)
          status_icons = {"overdue": "OVERDUE   ", "urgent": "URGENT    ",
                          "upcoming": "UPCOMING  ", "future": "FUTURE    "}
          for i in items:
              icon = status_icons.get(i.status, "          ")
              print(f"{str(i.milestone.enforcement_date):>12}  [{icon[:8]}]  "
                    f"[{i.milestone.priority.upper()[:8]}]  "
                    f"{i.milestone.regulation}: {i.milestone.obligation[:40]}")
              impl_days = (i.impl_deadline - date.today()).days
              if impl_days < 90:
                  print(f"             → IMPLEMENT BY {i.impl_deadline} "
                        f"({max(0, impl_days)} days) — {i.milestone.engineering_action[:55]}")

          overdue = [i for i in items if i.status == "overdue"]
          urgent  = [i for i in items if i.status == "urgent"]
          if overdue:
              print(f"\nOVERDUE: {len(overdue)} milestones past enforcement date — immediate action required")
          if urgent:
              print(f"URGENT: {len(urgent)} milestones within 90 days")


      if __name__ == "__main__":
          # High-risk financial AI deployment timeline
          print_timeline(
              generate_timeline("high_risk", "financial", reference_date=date(2025, 9, 1)),
              "high_risk", "financial",
          )
          # Healthcare AI timeline
          print("\n")
          print_timeline(
              generate_timeline("high_risk", "healthcare", reference_date=date(2025, 9, 1)),
              "high_risk", "healthcare",
          )

