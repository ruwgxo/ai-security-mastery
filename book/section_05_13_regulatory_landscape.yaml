section_summary:
  one_paragraph: |
    Section 5.13 establishes the regulatory landscape as a technical engineering
    concern rather than a compliance department abstraction, demonstrating that the
    detection programme, privacy controls, bias audits, and documentation artefacts
    built throughout Chapter 5 are simultaneously security controls and regulatory
    compliance evidence. The EU AI Act's four-tier architecture (prohibited, high-risk,
    limited-risk, minimal-risk) is mapped with enforcement dates, applicable obligations,
    and penalty structures. The five technical obligations for high-risk systems (Articles
    9, 10, 11, 14, and 15) are translated into specific engineering controls: risk
    management system → ATLAS coverage assessment and bias audit; data governance →
    ML SBOM Layer 1; technical documentation → model card plus SBOM; human oversight
    → alert escalation and explanation tools; accuracy/robustness/cybersecurity →
    the ATLAS detection programme for adversarial examples and data poisoning. The
    GPAI systemic-risk designation introduces mandatory red-teaming covering OWASP
    LLM Top 10 and MITRE ATLAS — a direct mandate for the detection engineering work
    in Part 3. The US Executive Order's safety reporting threshold (10^26 FLOPs),
    NIST AI RMF mandates, model weight security obligations, and content authentication
    direction are each mapped to specific Section 5.8-5.12 engineering controls. The
    full GDPR-AI intersection is covered through seven articles, each with an engineering
    control and documentation artefact: training data lawfulness (Article 5/6), transparency
    (13-14), erasure (17 — DP training as the only technically sound response), automated
    decisions (22 — human review path), privacy by design (25 — DP plus output controls),
    records of processing (30 — ML SBOM), and DPIA (35 — privacy risk audit). Sector-
    specific overlays for healthcare (HIPAA), financial services (SOX/GLBA/SR 11-7), and
    legal AI add the sector floors on top of the horizontal baseline. ENISA's AI Threat
    Landscape report provides the dual-authority technical basis for Article 15 compliance
    alongside ATLAS. The section closes with the compliance-as-floor principle, a mapping
    table showing the gap between regulatory documentation requirements and operational
    security engineering for six key obligations, and guidance on positioning security
    work as compliance deliverables for budget and governance purposes. Three implementations
    deliver the EU AI Act tier classifier and gap analyser, the GDPR compliance matrix
    with sector overlay checker, and the regulatory timeline tracker with days-until-
    deadline calculations.

  next_section: |
    Section 5.14 — NIST AI Risk Management Framework: Govern, Map, Measure, Manage
    With the regulatory obligations established, Section 5.14 provides the organisational
    scaffolding that makes technical AI security work sustainable. The NIST AI RMF's
    four functions — GOVERN (policies and accountability), MAP (risk identification),
    MEASURE (metrics and testing), MANAGE (treatment and residual risk acceptance) —
    translate the detection programme, bias audits, privacy controls, and regulatory
    compliance evidence into a management-language framework that CISOs and boards
    understand. The MEASURE function maps directly to the detection engineering
    programme in Part 3; the GOVERN function provides the authority to gate deployments.

