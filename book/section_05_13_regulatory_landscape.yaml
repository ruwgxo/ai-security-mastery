# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    The EU AI Act is the most consequential AI regulation globally because of its
    extraterritorial reach and technical specificity. Any AI provider whose systems
    are used by EU residents is in scope regardless of where the provider is
    established. The high-risk tier's technical obligations — risk management system,
    data governance, technical file, human oversight, accuracy/robustness/cybersecurity
    — are engineering deliverables, not policy statements.

  takeaway_02: |
    EU AI Act Article 15 explicitly names adversarial examples and data poisoning
    as cybersecurity threats requiring technical controls. This makes the ATLAS
    detection programme (Sections 5.8) a direct Article 15 compliance artefact.
    Security engineers who document their detection rules as Article 15 cybersecurity
    measures have produced regulatory compliance evidence as a by-product of their
    security work.

  takeaway_03: |
    The US Executive Order's 10^26 FLOP threshold creates a new compliance function
    for frontier model developers: red-team results are federal disclosures. For
    non-frontier deployments, the EO's primary practical effect is through NIST AI RMF
    adoption for federal procurement — any AI product targeting US government customers
    needs NIST AI RMF alignment.

  takeaway_04: |
    GDPR and model memorisation are structurally incompatible without proactive
    controls. Article 17 right-to-erasure requests cannot be fully satisfied by a
    model trained on personal data without retraining. The legally sound position —
    DP training with documented epsilon before training, not machine unlearning after —
    was established in Section 5.10 and is reinforced here as the regulatory standard.

  takeaway_05: |
    The regulatory floor is not the security ceiling. EU AI Act Article 15 compliance
    (documented robustness controls) does not prevent a skilled adversary. GDPR
    Article 25 compliance (privacy by design documentation) does not prevent membership
    inference. The compliance documentation is necessary but insufficient — the
    detection programme and privacy controls must be deployed and monitored, not just
    documented.

  takeaway_06: |
    Global regulatory fragmentation requires multi-jurisdiction compliance planning.
    The minimum viable programme for a global LLM product must simultaneously satisfy
    EU AI Act (strictest horizontal), GDPR (strictest data), sector-specific where
    applicable, and Chinese content regulations where Chinese users are served.
    No single standard covers all jurisdictions — but the EU AI Act + GDPR stack
    is the most demanding and covers the others as a subset in most cases.

  takeaway_07: |
    Security engineering work produces compliance artefacts as by-products when
    properly documented. The ATLAS detection programme → Article 15 evidence.
    The privacy risk audit → GDPR Article 35 DPIA. The bias audit → Article 9
    risk management system. The ML SBOM → Articles 10/11/30 documentation.
    The model card → Annex IV technical file. Engineers who understand these
    mappings can position their security work as compliance deliverables to obtain
    budget and organisational authority.

  takeaway_08: |
    Compliance timelines are not theoretical. EU AI Act Article 15 applies in
    August 2026. GPAI systemic risk obligations applied in August 2025. GDPR
    has applied since 2018. The regulatory gap analysis and timeline tracker
    are operational tools, not academic exercises. Organisations that begin
    implementation 26 weeks before the August 2026 deadline need to have
    started by February 2026 — which is now.

