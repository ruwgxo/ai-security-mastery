section_overview:
  one_line_summary: >
    The five-level detection maturity model gives the detection programme a measurable
    position, a vocabulary for improvement conversations, and a 90-day roadmap to the
    L3 minimum bar that every production AI deployment requires.
  why_this_section_exists: |
    Sections 11.02 through 11.07 built the DaC pipeline, the layered detection model,
    the ATT&CK coverage system, and the Sigma rule portfolio. Each section improved
    one dimension of the programme. But without a unified model that scores all
    dimensions together, there is no single answer to the question every CISO eventually
    asks: "How good is our detection programme, and what would it take to make it better?"

    The detection maturity model answers that question with a five-level scale measured
    across five dimensions. It makes the programme''s current state concrete enough to
    act on — not "we have some rules and a CI pipeline" but "we are at L2.3, with a
    clear roadmap to L3 in 90 days and an investment estimate for L4 by end of year."
    The model also establishes the minimum bar: L3 is the lowest acceptable maturity
    for a production AI system facing external adversaries. Anything below L3 in
    production is a documented, accepted risk.

    The 90-day roadmap is practical rather than theoretical. It targets L3 specifically
    because L3 is achievable by a team of two to three engineers without organisational
    change, budget, or new tooling beyond what Chapters 11-13 provide. L4 and L5
    require additional investment — ML detection infrastructure, a dedicated detection
    engineering team, and a red team programme — and are scoped appropriately for the
    programme size they require.
  position_in_chapter: >
    Section 11.08 is the programme assessment section. The tools built in Sections
    11.01 through 11.07 are now evaluated as a programme. The maturity score produces
    a baseline from which Sections 11.09 through 11.13 — false positive management,
    engineering workflow, OWASP coverage, threat hunting, production architecture —
    each contribute incremental maturity points. The end-of-chapter state is scored
    in Section 11.14.

learning_objectives:
  - 'Define each maturity level (L1–L5) across the five dimensions: rule quality, ATT&CK coverage, FPR management, deployment pipeline, and proactive hunting'
  - 'Score the seven-track gateway against the five dimensions and produce a composite maturity level with per-dimension detail'
  - 'Explain why maturity is a programme property and not a rule property, with a concrete example of a high-quality rule in a low-maturity programme'
  - 'State the three requirements that must be satisfied before an AI system enters production from a detection maturity perspective'
  - 'Produce a 90-day roadmap from a given maturity score to L3, naming the specific deliverable from Sections 11.02–11.10 that closes each gap'
  - 'Describe the organisational investments required to move from L3 to L4 and from L4 to L5, and explain why those investments are not required to reach L3'

