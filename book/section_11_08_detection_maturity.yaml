deliverables:

  deliverable_1:
    id: 'D11.08.1'
    filename: 'detection_maturity_assessor.py'
    description: >
      L1–L5 scoring across all five dimensions for the seven-track gateway. Takes
      observable programme state as input (rule counts, test coverage, CI status, FPR
      data availability, hunting cadence) and produces a per-dimension score, composite
      score, and gap report with specific references to the Section 11.xx deliverable
      that closes each gap.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''detection_maturity_assessor.py
      L1-L5 detection programme maturity assessment across five dimensions.
      Scores the seven-track gateway and produces a gap report with remediation map.
      Chapter 11, Section 11.08 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 detection_maturity_assessor.py
        python3 detection_maturity_assessor.py --state state.json
        python3 detection_maturity_assessor.py --target 3
      '''

      from __future__ import annotations
      import argparse
      import json
      import pathlib
      import sys
      from dataclasses import dataclass, field
      from enum import IntEnum

      # ---------------------------------------------------------------------------
      # Maturity level enum
      # ---------------------------------------------------------------------------

      class MaturityLevel(IntEnum):
          L1 = 1
          L2 = 2
          L3 = 3
          L4 = 4
          L5 = 5

      LEVEL_NAMES = {
          MaturityLevel.L1: 'L1 — Ad-Hoc',
          MaturityLevel.L2: 'L2 — Defined',
          MaturityLevel.L3: 'L3 — Managed',
          MaturityLevel.L4: 'L4 — Measured',
          MaturityLevel.L5: 'L5 — Optimised',
      }

      # ---------------------------------------------------------------------------
      # Programme state model
      # ---------------------------------------------------------------------------

      @dataclass
      class ProgrammeState:
          '''Observable properties of the detection programme. All fields default to
          the post-Part-2 / pre-Chapter-11 state (L1 baseline).'''

          # Rule quality dimension
          rules_in_version_control: bool = False
          rules_have_metadata: bool = False
          rules_have_tests: bool = False
          tests_run_in_ci: bool = False
          regression_tests_from_fp: bool = False      # confirmed FPs → regression fixtures
          ml_detectors_with_pr_curves: bool = False   # L4: ML detectors have PR curves

          # ATT&CK coverage dimension
          heatmap_generated: bool = False
          heatmap_in_ci_diff_mode: bool = False
          taxonomy_expansion_check: bool = False      # quarterly new technique check
          quantitative_coverage_targets: bool = False  # L4: per-tactic targets set
          coverage_improvement_rate_tracked: bool = False  # L5

          # FPR management dimension
          per_rule_fpr_data_collected: bool = False
          per_rule_fpr_targets_set: bool = False
          fpr_automated_alerting: bool = False        # DaC queue opens on breach
          realtime_fpr_dashboard: bool = False        # L4
          analyst_disposition_feeds_retraining: bool = False  # L4

          # Deployment pipeline dimension
          rules_deploy_via_cicd: bool = False
          rollback_manifest_populated: bool = False
          manual_siem_edit_blocked_by_rbac: bool = False  # L3 physical enforcement
          canary_deployment_stage: bool = False       # L4
          zero_touch_safe_range_calibration: bool = False  # L5

          # Proactive hunting dimension
          formal_hunt_procedure_exists: bool = False
          hunting_quarterly_cadence: bool = False
          hunt_findings_feed_backlog: bool = False
          red_team_quarterly: bool = False            # L4
          automated_continuous_hunting: bool = False  # L5

      # ---------------------------------------------------------------------------
      # Scoring functions — one per dimension
      # ---------------------------------------------------------------------------

      @dataclass
      class DimensionScore:
          dimension: str
          level: MaturityLevel
          evidence: list[str]
          gaps: list[str]
          remediation: list[str]

      def score_rule_quality(s: ProgrammeState) -> DimensionScore:
          evidence: list[str] = []
          gaps: list[str] = []
          remediation: list[str] = []

          if s.rules_in_version_control:
              evidence.append('Rules in version control (Git)')
          else:
              gaps.append('Rules not in version control')
              remediation.append('Section 11.02: DaC migration — git init and commit all seven tracks')

          if s.rules_have_metadata:
              evidence.append('Eight required metadata fields enforced')
          else:
              gaps.append('Rule metadata fields not enforced')
              remediation.append('Section 11.02: rule_metadata_validator.py in CI lint stage')

          if s.rules_have_tests:
              evidence.append('Positive and negative tests for rules')
          else:
              gaps.append('No automated rule tests')
              remediation.append('Section 11.02: test_tracks.py with known-bad and known-good fixtures')

          if s.tests_run_in_ci:
              evidence.append('Tests run in CI on every PR')
          else:
              gaps.append('Tests not integrated in CI')
              remediation.append('Section 11.02: stage_test() in detection_as_code_pipeline.py')

          if s.regression_tests_from_fp:
              evidence.append('Confirmed FPs added as regression test cases')
          else:
              gaps.append('No regression tests from confirmed false positives')
              remediation.append('Section 11.09: false_positive_manager.py feeds regression fixture generator')

          if s.ml_detectors_with_pr_curves:
              evidence.append('ML detectors have precision-recall curves documented')

          # Level determination
          if not s.rules_in_version_control:
              level = MaturityLevel.L1
          elif not s.rules_have_tests or not s.tests_run_in_ci:
              level = MaturityLevel.L2
          elif not s.regression_tests_from_fp:
              level = MaturityLevel.L2   # tests exist but not complete until regression tests added
          elif s.ml_detectors_with_pr_curves:
              level = MaturityLevel.L4
          else:
              level = MaturityLevel.L3

          return DimensionScore('Rule Quality', level, evidence, gaps, remediation)

      def score_attck_coverage(s: ProgrammeState) -> DimensionScore:
          evidence: list[str] = []
          gaps: list[str] = []
          remediation: list[str] = []

          if s.heatmap_generated:
              evidence.append('ATT&CK/ATLAS heat map generated')
          else:
              gaps.append('No coverage heat map')
              remediation.append('Section 11.05: attck_coverage_heatmap.py --save baseline.json')

          if s.heatmap_in_ci_diff_mode:
              evidence.append('Heat map runs in CI diff mode; regression triggers CI failure')
          else:
              gaps.append('Heat map not in CI; coverage regression undetected automatically')
              remediation.append('Section 11.05: add attck_coverage_heatmap.py --diff to CI pipeline')

          if s.taxonomy_expansion_check:
              evidence.append('Quarterly new ATLAS technique check configured')
          else:
              gaps.append('No taxonomy expansion check; new ATLAS techniques invisible')
              remediation.append('Section 11.05: attck_coverage_heatmap.py --check-new-techniques in quarterly review')

          if s.quantitative_coverage_targets:
              evidence.append('Quantitative per-tactic coverage targets set (L4)')
          if s.coverage_improvement_rate_tracked:
              evidence.append('Coverage improvement rate tracked as programme metric (L5)')

          if not s.heatmap_generated:
              level = MaturityLevel.L1
          elif not s.heatmap_in_ci_diff_mode or not s.taxonomy_expansion_check:
              level = MaturityLevel.L2
          elif s.coverage_improvement_rate_tracked:
              level = MaturityLevel.L5
          elif s.quantitative_coverage_targets:
              level = MaturityLevel.L4
          else:
              level = MaturityLevel.L3

          return DimensionScore('ATT&CK Coverage', level, evidence, gaps, remediation)

      def score_fpr_management(s: ProgrammeState) -> DimensionScore:
          evidence: list[str] = []
          gaps: list[str] = []
          remediation: list[str] = []

          if s.per_rule_fpr_data_collected:
              evidence.append('Per-rule FPR data collected')
          else:
              gaps.append('FPR not tracked per rule; aggregate only')
              remediation.append('Section 11.09: instrument each track alert with rule_id field')

          if s.per_rule_fpr_targets_set:
              evidence.append('Per-rule FPR targets documented in rule metadata')
          else:
              gaps.append('No FPR targets set per rule')
              remediation.append('Section 11.09: add fpr_target field to rule metadata; set targets from test corpus')

          if s.fpr_automated_alerting:
              evidence.append('DaC queue ticket opens when FPR exceeds target')
          else:
              gaps.append('No automated FPR alerting; breach discovered via alert fatigue')
              remediation.append('Section 11.09: false_positive_manager.py with DaC queue integration')

          if s.realtime_fpr_dashboard:
              evidence.append('Real-time FPR dashboard for detection team and SOC (L4)')
          if s.analyst_disposition_feeds_retraining:
              evidence.append('Analyst disposition feeds ML retraining pipeline (L4)')

          if not s.per_rule_fpr_data_collected:
              level = MaturityLevel.L1
          elif not s.per_rule_fpr_targets_set:
              level = MaturityLevel.L2
          elif not s.fpr_automated_alerting:
              level = MaturityLevel.L2
          elif s.analyst_disposition_feeds_retraining:
              level = MaturityLevel.L4
          elif s.realtime_fpr_dashboard:
              level = MaturityLevel.L4
          else:
              level = MaturityLevel.L3

          return DimensionScore('FPR Management', level, evidence, gaps, remediation)

      def score_deployment_pipeline(s: ProgrammeState) -> DimensionScore:
          evidence: list[str] = []
          gaps: list[str] = []
          remediation: list[str] = []

          if s.rules_deploy_via_cicd:
              evidence.append('Rules deploy through CI/CD pipeline')
          else:
              gaps.append('Manual SIEM deployment; no CI/CD')
              remediation.append('Section 11.02: detection_as_code_pipeline.py stage_deploy()')

          if s.rollback_manifest_populated:
              evidence.append('Rollback manifest populated; flood detection configured')
          else:
              gaps.append('No rollback manifest; rollback requires manual SIEM intervention')
              remediation.append('Section 11.02: detection_as_code_pipeline.py stage_rollback() + check_alert_flood()')

          if s.manual_siem_edit_blocked_by_rbac:
              evidence.append('Manual SIEM edit physically blocked by RBAC (L3 enforcement)')
          else:
              gaps.append('Manual SIEM edit still possible; DaC policy enforced by convention only')
              remediation.append('Infrastructure: configure SIEM RBAC so only CI service account has write access to production rules')

          if s.canary_deployment_stage:
              evidence.append('Canary deployment stage before full rollout (L4)')
          if s.zero_touch_safe_range_calibration:
              evidence.append('Zero-touch deployment for safe-range calibrations (L5)')

          if not s.rules_deploy_via_cicd:
              level = MaturityLevel.L1
          elif not s.rollback_manifest_populated:
              level = MaturityLevel.L2
          elif not s.manual_siem_edit_blocked_by_rbac:
              level = MaturityLevel.L2
          elif s.zero_touch_safe_range_calibration:
              level = MaturityLevel.L5
          elif s.canary_deployment_stage:
              level = MaturityLevel.L4
          else:
              level = MaturityLevel.L3

          return DimensionScore('Deployment Pipeline', level, evidence, gaps, remediation)

      def score_proactive_hunting(s: ProgrammeState) -> DimensionScore:
          evidence: list[str] = []
          gaps: list[str] = []
          remediation: list[str] = []

          if s.formal_hunt_procedure_exists:
              evidence.append('Formal hunting procedure documented')
          else:
              gaps.append('No formal hunting procedure; detection is entirely reactive')
              remediation.append('Section 11.12: threat_hunting_playbook.py')

          if s.hunting_quarterly_cadence:
              evidence.append('Quarterly hunting cadence established')
          else:
              gaps.append('No hunting cadence; hunts occur ad-hoc if at all')
              remediation.append('Section 11.12: schedule quarterly hunt exercises in detection engineering calendar')

          if s.hunt_findings_feed_backlog:
              evidence.append('Hunt findings feed detection backlog as P1 items')
          else:
              gaps.append('Hunt findings not formally fed to detection backlog')
              remediation.append('Section 11.12: hunt_findings → detection_gap_prioritiser.py with P1 flag')

          if s.red_team_quarterly:
              evidence.append('Quarterly red team exercises; findings are P0 gaps (L4)')
          if s.automated_continuous_hunting:
              evidence.append('Automated continuous hunting (L5)')

          if not s.formal_hunt_procedure_exists:
              level = MaturityLevel.L1
          elif not s.hunting_quarterly_cadence or not s.hunt_findings_feed_backlog:
              level = MaturityLevel.L2
          elif s.automated_continuous_hunting:
              level = MaturityLevel.L5
          elif s.red_team_quarterly:
              level = MaturityLevel.L4
          else:
              level = MaturityLevel.L3

          return DimensionScore('Proactive Hunting', level, evidence, gaps, remediation)

      DIMENSION_SCORERS = [
          score_rule_quality,
          score_attck_coverage,
          score_fpr_management,
          score_deployment_pipeline,
          score_proactive_hunting,
      ]

      # ---------------------------------------------------------------------------
      # Assessment runner
      # ---------------------------------------------------------------------------

      def assess(state: ProgrammeState) -> list[DimensionScore]:
          return [fn(state) for fn in DIMENSION_SCORERS]

      def composite_level(scores: list[DimensionScore]) -> MaturityLevel:
          '''Composite maturity = floor across all dimensions.'''
          return MaturityLevel(min(s.level.value for s in scores))

      # ---------------------------------------------------------------------------
      # Report
      # ---------------------------------------------------------------------------

      def print_assessment(scores: list[DimensionScore], target: int | None = None) -> None:
          composite = composite_level(scores)
          print('\nDetection Maturity Assessment — Seven-Track Gateway')
          print(f'Composite level: {LEVEL_NAMES[composite]}')
          if target:
              target_level = MaturityLevel(target)
              print(f'Target level:    {LEVEL_NAMES[target_level]}')
          print()
          print(f'{"Dimension":<25} {"Score":<20} Evidence / Gaps')
          print('-' * 90)
          for s in scores:
              ev = s.evidence[0] if s.evidence else '—'
              gap = s.gaps[0] if s.gaps else '—'
              print(f'{s.dimension:<25} {LEVEL_NAMES[s.level]:<20} ✓ {ev}')
              if s.gaps:
                  for g in s.gaps:
                      print(f'{"":45} ✗ {g}')
          print()
          # Gap report
          all_gaps = [(s.dimension, g, r)
                      for s in scores
                      for g, r in zip(s.gaps, s.remediation)]
          if all_gaps:
              print('Gap Remediation Map:')
              for dim, gap, rem in all_gaps:
                  print(f'  [{dim}] {gap}')
                  print(f'    → {rem}')
          else:
              print('No gaps. Programme is at target maturity.')

      # ---------------------------------------------------------------------------
      # Post-Part-2 baseline state
      # ---------------------------------------------------------------------------

      POST_PART2_STATE = ProgrammeState(
          # Rule quality: rules exist in working dir, no Git, no tests
          rules_in_version_control=False,
          rules_have_metadata=False,
          rules_have_tests=False,
          tests_run_in_ci=False,
          regression_tests_from_fp=False,
          # Coverage: no heat map
          heatmap_generated=False,
          heatmap_in_ci_diff_mode=False,
          taxonomy_expansion_check=False,
          # FPR: nothing
          per_rule_fpr_data_collected=False,
          per_rule_fpr_targets_set=False,
          fpr_automated_alerting=False,
          # Pipeline: manual deployment
          rules_deploy_via_cicd=False,
          rollback_manifest_populated=False,
          manual_siem_edit_blocked_by_rbac=False,
          # Hunting: none
          formal_hunt_procedure_exists=False,
          hunting_quarterly_cadence=False,
          hunt_findings_feed_backlog=False,
      )

      POST_SECTION_1107_STATE = ProgrammeState(
          # After Sections 11.02-11.07: DaC pipeline, coverage, Sigma portfolio
          rules_in_version_control=True,
          rules_have_metadata=True,
          rules_have_tests=True,
          tests_run_in_ci=True,
          regression_tests_from_fp=False,   # needs 11.09 FPR data
          # Coverage at L3 after 11.05
          heatmap_generated=True,
          heatmap_in_ci_diff_mode=True,
          taxonomy_expansion_check=True,
          # FPR still L1
          per_rule_fpr_data_collected=False,
          per_rule_fpr_targets_set=False,
          fpr_automated_alerting=False,
          # Pipeline at L2 — RBAC still needed
          rules_deploy_via_cicd=True,
          rollback_manifest_populated=True,
          manual_siem_edit_blocked_by_rbac=False,
          # Hunting L1
          formal_hunt_procedure_exists=False,
          hunting_quarterly_cadence=False,
          hunt_findings_feed_backlog=False,
      )

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Detection maturity assessor')
          parser.add_argument('--state', metavar='STATE_JSON',
                              help='Load programme state from JSON file')
          parser.add_argument('--target', type=int, choices=[1, 2, 3, 4, 5],
                              help='Target maturity level for gap analysis')
          parser.add_argument('--baseline', action='store_true',
                              help='Show post-Part-2 baseline (before Chapter 11 work)')
          args = parser.parse_args()

          if args.baseline:
              state = POST_PART2_STATE
              print('Assessing post-Part-2 baseline state (before Chapter 11 work):')
          elif args.state:
              path = pathlib.Path(args.state)
              if not path.exists():
                  print(f'State file not found: {path}')
                  return 1
              with open(path) as f:
                  state_dict = json.load(f)
              state = ProgrammeState(**state_dict)
          else:
              state = POST_SECTION_1107_STATE
              print('Assessing post-Section-11.07 state:')

          scores = assess(state)
          print_assessment(scores, target=args.target)
          return 0

      if __name__ == '__main__':
          sys.exit(main())

  deliverable_2:
    id: 'D11.08.2'
    filename: 'maturity_improvement_roadmap.py'
    description: >
      Generates a prioritised 90-day improvement plan from the current programme state
      to a target maturity level. Takes the gap report from detection_maturity_assessor.py
      and produces a week-by-week action plan with deliverable references and checkpoint
      criteria. Defaults to the L3 target as the minimum production bar.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''maturity_improvement_roadmap.py
      Generates a 90-day improvement roadmap from current maturity to target level.
      Defaults to L3 target — the minimum bar for production AI systems.
      Chapter 11, Section 11.08 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 maturity_improvement_roadmap.py
        python3 maturity_improvement_roadmap.py --target 4
        python3 maturity_improvement_roadmap.py --from-state post_1107_state.json --target 3
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass

      from detection_maturity_assessor import (
          ProgrammeState,
          POST_SECTION_1107_STATE,
          MaturityLevel,
          LEVEL_NAMES,
          assess,
          composite_level,
          DimensionScore,
      )

      # ---------------------------------------------------------------------------
      # Roadmap item model
      # ---------------------------------------------------------------------------

      @dataclass
      class RoadmapItem:
          week_start: int
          week_end: int
          dimension: str
          action: str
          deliverable: str
          checkpoint: str
          days_estimate: int
          dependency: str = ''

      # ---------------------------------------------------------------------------
      # Roadmap builder
      # ---------------------------------------------------------------------------

      L3_ROADMAP_ITEMS: list[RoadmapItem] = [
          RoadmapItem(
              week_start=1, week_end=2,
              dimension='Rule Quality',
              action='Complete DaC migration: all seven tracks in Git with tests and metadata',
              deliverable='detection_as_code_pipeline.py, rule_metadata_validator.py, test_tracks.py (Section 11.02)',
              checkpoint='CI passes lint and test for all seven tracks; zero rules outside repository',
              days_estimate=10,
          ),
          RoadmapItem(
              week_start=3, week_end=4,
              dimension='ATT&CK Coverage',
              action='Generate first heat map; configure CI diff mode; schedule quarterly taxonomy check',
              deliverable='attck_coverage_heatmap.py --save baseline.json; CI pipeline integration (Section 11.05)',
              checkpoint='Coverage regression triggers CI failure; baseline.json committed to repository',
              days_estimate=5,
              dependency='Rule Quality migration complete (Week 1-2)',
          ),
          RoadmapItem(
              week_start=5, week_end=6,
              dimension='Deployment Pipeline',
              action='Configure SIEM RBAC: restrict production rule write access to CI service account only',
              deliverable='SIEM platform RBAC configuration (infrastructure task, parallel to pipeline code)',
              checkpoint='Direct edit attempt by engineer account returns permission denied; CI service account deploys successfully',
              days_estimate=3,
              dependency='CI/CD pipeline from Section 11.02 already deployed',
          ),
          RoadmapItem(
              week_start=7, week_end=9,
              dimension='FPR Management',
              action='Deploy false_positive_manager.py; set per-rule FPR targets; integrate with DaC queue',
              deliverable='false_positive_manager.py, threshold_calibration_harness.py (Section 11.09)',
              checkpoint='Per-rule FPR targets documented in all seven track rules; DaC queue integration tested with a synthetic FPR breach',
              days_estimate=10,
          ),
          RoadmapItem(
              week_start=10, week_end=11,
              dimension='Rule Quality (regression)',
              action='Collect first analyst FP dispositions; add confirmed FPs as regression test fixtures',
              deliverable='tests/fixtures/known_good/ updated; regression test run passes in CI',
              checkpoint='At least one regression test case per track that has any FP history; CI regression test stage added',
              days_estimate=5,
              dependency='FPR management deployed (Week 7-9)',
          ),
          RoadmapItem(
              week_start=11, week_end=12,
              dimension='Proactive Hunting',
              action='Run first formal hunt exercise using Section 11.12 procedure; document and triage findings',
              deliverable='threat_hunting_playbook.py (Section 11.12); hunt report document',
              checkpoint='Hunt report filed; at least one finding in detection backlog as P1 item; quarterly cadence scheduled',
              days_estimate=5,
          ),
          RoadmapItem(
              week_start=13, week_end=13,
              dimension='All dimensions',
              action='Run detection_maturity_assessor.py; confirm all five dimensions at L3; document in decisions.md',
              deliverable='detection_maturity_assessor.py output; decisions.md append-only entry',
              checkpoint='Composite L3 confirmed; post-assessment state JSON saved for future diff; programme enters L3 maintenance cadence',
              days_estimate=1,
              dependency='All previous roadmap items complete',
          ),
      ]

      L4_ADDITIONAL_ITEMS: list[RoadmapItem] = [
          RoadmapItem(
              week_start=14, week_end=18,
              dimension='Rule Quality (ML)',
              action='Integrate Chapter 12 ML detectors with precision-recall documentation and retraining triggers',
              deliverable='Chapter 12 ML detector suite; PR curve documentation per detector',
              checkpoint='All Chapter 12 detectors have documented PR curves; automated retraining trigger configured',
              days_estimate=20,
              dependency='L3 confirmed (Week 13)',
          ),
          RoadmapItem(
              week_start=14, week_end=15,
              dimension='ATT&CK Coverage (L4)',
              action='Set quantitative per-tactic coverage targets; configure monthly leadership reporting',
              deliverable='Coverage targets documented; monthly report template',
              checkpoint='Per-tactic targets in sprint planning backlog; first monthly report generated',
              days_estimate=3,
          ),
          RoadmapItem(
              week_start=16, week_end=17,
              dimension='Deployment Pipeline (L4)',
              action='Add canary deployment stage to CI/CD pipeline',
              deliverable='detection_as_code_pipeline.py canary stage extension',
              checkpoint='New rule deployments route to canary slice first; canary FPR check gates full rollout',
              days_estimate=5,
          ),
          RoadmapItem(
              week_start=18, week_end=18,
              dimension='Proactive Hunting (L4)',
              action='Schedule quarterly red team exercise; establish P0 gap pathway from red team findings',
              deliverable='Red team engagement scoped; P0 pathway in detection_gap_prioritiser.py',
              checkpoint='First red team engagement scheduled; P0 pathway tested with synthetic finding',
              days_estimate=3,
          ),
      ]

      def build_roadmap(
          scores: list[DimensionScore],
          target: MaturityLevel,
      ) -> list[RoadmapItem]:
          current = composite_level(scores)
          items: list[RoadmapItem] = []
          if current < MaturityLevel.L3 <= target:
              items.extend(L3_ROADMAP_ITEMS)
          if target >= MaturityLevel.L4:
              items.extend(L4_ADDITIONAL_ITEMS)
          return items

      def print_roadmap(
          items: list[RoadmapItem],
          current: MaturityLevel,
          target: MaturityLevel,
      ) -> None:
          print(f'\nMaturity Improvement Roadmap')
          print(f'Current: {LEVEL_NAMES[current]}')
          print(f'Target:  {LEVEL_NAMES[target]}')
          total_days = sum(i.days_estimate for i in items)
          print(f'Estimated effort: {total_days} engineer-days (~{total_days // 5} weeks)\n')

          print(f'{"Weeks":<10} {"Dimension":<28} {"Action":<55} Checkpoint')
          print('-' * 140)
          for item in items:
              week_str = f'{item.week_start}' if item.week_start == item.week_end else f'{item.week_start}-{item.week_end}'
              action_short = (item.action[:52] + '...') if len(item.action) > 52 else item.action
              checkpoint_short = (item.checkpoint[:55] + '...') if len(item.checkpoint) > 55 else item.checkpoint
              print(f'{week_str:<10} {item.dimension:<28} {action_short:<55} {checkpoint_short}')

          print()
          print('Deliverable references (by week):')
          for item in items:
              week_str = f'W{item.week_start}' if item.week_start == item.week_end else f'W{item.week_start}-W{item.week_end}'
              print(f'  {week_str}: {item.deliverable[:100]}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Detection maturity improvement roadmap')
          parser.add_argument('--target', type=int, choices=[2, 3, 4, 5], default=3,
                              help='Target maturity level (default: 3 — minimum production bar)')
          args = parser.parse_args()

          state = POST_SECTION_1107_STATE
          scores = assess(state)
          current = composite_level(scores)
          target = MaturityLevel(args.target)

          if current >= target:
              print(f'Current maturity {LEVEL_NAMES[current]} already meets target {LEVEL_NAMES[target]}.')
              print('Run with --target N+1 to plan the next level improvement.')
              return 0

          items = build_roadmap(scores, target)
          print_roadmap(items, current, target)
          return 0

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.08.1'
    mistake: 'Assigning a maturity level based on the best-performing dimension rather than the weakest'
    why_it_happens: >
      A detection programme with an excellent CI/CD pipeline and a strong ATT&CK heat
      map is genuinely impressive in those dimensions. It is tempting to report overall
      programme maturity at the level of the best dimensions rather than the composite.
    why_it_matters: >
      A programme that is L4 on pipeline and coverage but L1 on FPR management is an
      L1 programme that will generate alert fatigue and lose analyst trust within months
      of production deployment. Reporting L4 maturity to leadership based on two
      dimensions conceals the L1 FPR gap and delays the investment needed to close it.
    correct_approach: >
      The composite maturity level is the floor across all five dimensions. Report the
      floor, not the ceiling. Present per-dimension scores alongside the composite to
      show which dimensions are strong and which need investment. The per-dimension
      breakdown is more actionable for leadership than a single number.

  - id: 'CM11.08.2'
    mistake: 'Treating L3 as aspirational rather than as the minimum bar for production'
    why_it_happens: >
      L3 sounds advanced. In a field where most programmes are at L1, reaching L3 feels
      like an ambitious achievement rather than a baseline requirement.
    why_it_matters: >
      An AI system facing external adversaries deployed with an L1 or L2 detection
      programme is a production system with no effective mechanism to detect when its
      detection is failing. Rule regressions go unnoticed; FPR accumulates until analysts
      stop responding; coverage gaps widen without anyone noticing. These are not
      theoretical risks — they are the consistent failure pattern of under-matured
      detection programmes.
    correct_approach: >
      Treat L3 as the minimum bar for production, not as an achievement. If L3 cannot
      be reached before a production launch, the launch date should be deferred or a
      documented risk acceptance should accompany the deployment, naming exactly which
      dimensions are below L3 and what the acceptance criteria are for each gap.

  - id: 'CM11.08.3'
    mistake: 'Conflating the maturity score with security effectiveness'
    why_it_happens: >
      A high maturity score feels like confirmation that the programme is effective. An
      L4 programme sounds safer than an L1 programme, and by most measures it is. But
      maturity is a process quality measure, not an outcome guarantee.
    why_it_matters: >
      An L4 programme with excellent process can have significant ATT&CK coverage gaps
      for recently published techniques. An L3 programme may have lower process quality
      but happen to have dense coverage of the specific techniques most relevant to its
      deployment profile. Maturity is a necessary but not sufficient condition for
      effective detection.
    correct_approach: >
      Present maturity score and coverage score together. Maturity tells you how well
      the programme is run. Coverage tells you what the programme actually detects.
      Both are required for a complete picture. A high maturity score with amber-only
      coverage is still a programme with significant gaps.

  - id: 'CM11.08.4'
    mistake: 'Scoring maturity once and treating it as permanent documentation'
    why_it_happens: >
      Running the maturity assessment takes time. Once completed, the result goes into
      a report and is not revisited until an audit or an incident prompts a review.
    why_it_matters: >
      Maturity regresses. A team that turns over loses institutional knowledge. A
      pipeline that gains exceptions over time loses its enforcement function. An FPR
      management system that is not actively maintained produces stale targets. A score
      that was L3 eighteen months ago may be L2 today.
    correct_approach: >
      Run detection_maturity_assessor.py quarterly alongside the ATT&CK coverage
      review. Append the result to decisions.md with the date. A maturity regression
      between two consecutive assessments is treated with the same urgency as a
      coverage regression: it indicates programme health degradation that requires
      remediation in the next sprint.

  - id: 'CM11.08.5'
    mistake: 'Building L4 capabilities (ML detection) before consolidating L3 (FPR management)'
    why_it_happens: >
      ML-based detection is technically interesting and feels like forward progress.
      Adding Chapter 12 ML detectors before completing the FPR management work from
      Section 11.09 is a common ordering error.
    why_it_matters: >
      ML detectors have higher and more variable FPR than well-calibrated signature
      rules. Deploying ML detectors into a programme without per-rule FPR targets and
      automated FPR monitoring is precisely the scenario that produces the alert fatigue
      death spiral described in Section 11.09: high ML FPR, analysts dismiss alerts,
      true positives missed. The ML investment produces negative defensive value.
    correct_approach: >
      Follow the 90-day roadmap ordering: L3 FPR management (Section 11.09) before
      L4 ML detector integration (Chapter 12). The FPR tracking infrastructure built
      in Section 11.09 is what makes it safe to deploy ML detectors: every new ML
      detector gets a FPR target and automated monitoring from day one.

section_summary:
  what_you_learned: |
    The five-level detection maturity model provides a measurable, communicable, and
    improvable programme assessment across five dimensions: rule quality, ATT&CK
    coverage, FPR management, deployment pipeline, and proactive hunting. Maturity is
    the floor across all dimensions, not the ceiling. The seven-track gateway is
    currently at L1 composite (post-Part-2 baseline), with three dimensions at L2 and
    one at L3 after Sections 11.02–11.07. L3 is the minimum bar for production AI
    systems and is achievable in 90 days using the tooling from Chapters 11–13. L4
    requires additional ML infrastructure and a red team programme. The 90-day roadmap
    sequences the remaining Chapter 11 sections — FPR management (11.09), hunting
    (11.12), and pipeline RBAC — as the path from current state to L3.
  key_terms:
    - term: 'Detection maturity level'
      definition: >
        A programme-level quality score from L1 (ad-hoc) to L5 (optimised) across five
        dimensions. The composite level is the floor across all dimensions. Not a
        measure of security effectiveness — a high-maturity programme can still have
        coverage gaps.
    - term: 'L3 — Managed Detection'
      definition: >
        The minimum acceptable maturity for a production AI system facing external
        adversaries. Requires: all rules tested in CI, regression tests from confirmed
        FPs, ATT&CK heat map in CI diff mode, per-rule FPR targets with automated
        alerting, deployment pipeline with RBAC-enforced no-manual-edit policy, and
        formal quarterly threat hunting.
    - term: 'Maturity floor'
      definition: >
        The composite maturity level, defined as the minimum across all five dimensions.
        A programme at L4 on four dimensions and L1 on one is an L1 programme.
    - term: '90-day roadmap'
      definition: >
        The week-by-week plan to advance from the current maturity score to L3, referencing
        the specific Chapter 11 section deliverable that closes each gap. Produced by
        maturity_improvement_roadmap.py from the current dimension scores.
    - term: 'Maturity regression'
      definition: >
        A decrease in a dimension score between two consecutive quarterly assessments.
        Treated with the same urgency as a coverage regression: requires sprint-level
        remediation to restore the dimension to its previous level.

preview_section_11_09:
  title: 'False Positive Management: Threshold Calibration and Alert Fatigue Prevention'
  teaser: |
    Section 11.09 addresses the operational challenge that prevents most detection
    programmes from reaching L3: the false positive rate. It dissects the alert fatigue
    death spiral — high FPR leads analysts to dismiss alerts, which causes missed true
    positives, which causes security incidents, which creates pressure to reduce
    sensitivity, which raises FPR further. It then builds the two tools that break the
    spiral: false_positive_manager.py (per-rule FPR tracking, target enforcement, and
    DaC queue integration) and threshold_calibration_harness.py (ROC curve generation
    and operating point selection for the Track 3, 6, and 7 thresholds that have been
    uncalibrated since their deployment in Part 2). After Section 11.09, the FPR
    management dimension advances from L1 to L3.

