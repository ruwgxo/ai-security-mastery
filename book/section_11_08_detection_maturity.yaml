prose_content:

  part_1_maturity_is_programme_property:
    heading: 'Maturity Is a Programme Property, Not a Rule Property'
    body: |
      The most important framing principle of the detection maturity model: maturity
      describes the detection programme as a whole, not individual rules within it.
      A programme with one perfectly written, fully tested, coverage-mapped, FPR-tracked
      Sigma rule is not an L4 programme. It is an L1 programme with one good rule.
      Maturity requires every dimension of the programme to reach the level, not just
      the best-performing rule or the most recently built component.

      This principle has practical consequences. It prevents organisations from
      declaring a high maturity level because they have built an impressive detection
      for a single attack family while leaving the rest of the programme ungoverned.
      It forces a systematic assessment across five dimensions simultaneously:

      Dimension 1 — Rule quality: Are rules tested, versioned, and metadata-complete?
      Dimension 2 — ATT&CK coverage: What fraction of relevant ATLAS techniques have
      at least partial detection coverage?
      Dimension 3 — FPR management: Is the false positive rate tracked per rule, and
      is there an active process to keep it within targets?
      Dimension 4 — Deployment pipeline: Do rules deploy through CI/CD with rollback
      capability, or are they deployed manually?
      Dimension 5 — Proactive hunting: Does the programme actively search for novel
      attack evidence not yet covered by deployed rules?

      A programme at L3 overall must be at L3 on all five dimensions. A programme that
      is L4 on rule quality, L4 on pipeline, L4 on coverage, but L1 on FPR management
      and L1 on hunting is an L1 programme that has done excellent work in two dimensions.
      The weakest dimension sets the floor.

  part_2_l1_adhoc:
    heading: 'L1 — Ad-Hoc Detection'
    body: |
      L1 is the starting state. It is where the seven-track gateway sits at the end of
      Part 2. It is also where most detection programmes in AI-deploying organisations
      sit today, because detection engineering for AI is a new discipline and most
      organisations have not yet invested in the governance infrastructure that L2 and
      beyond require.

      L1 characteristics per dimension:

      Rule quality: Rules exist — there are Sigma files and Python detectors — but they
      have no automated tests, no version history beyond the working directory, and no
      metadata standard enforced at review time. A rule that stops working is discovered
      when it stops producing alerts, not when a test fails.

      ATT&CK coverage: Coverage is unknown. No coverage heat map has been generated.
      The team knows roughly which attack families the rules target but cannot quantify
      what fraction of relevant ATLAS techniques have any detection, or which have
      confirmed evasion variants with no compensating control.

      FPR management: Alert volume is tracked in aggregate — the SIEM dashboard shows
      total alerts per day — but FPR is not tracked per rule. When a rule produces
      excessive false positives, the analyst team notices through alert fatigue before
      the detection engineering team notices through metrics. The fix is typically to
      raise the threshold directly in the SIEM without a commit.

      Deployment pipeline: Rules are deployed by copying files to the SIEM or editing
      rules directly in the SIEM console. There is no CI stage, no deployment audit
      trail, and no rollback mechanism faster than a SIEM console edit that takes 30–60
      minutes and is not logged.

      Proactive hunting: Detection is entirely reactive. Rules are created after an
      incident or after a threat intelligence report surfaces a new attack. There is no
      systematic programme to search for novel attack evidence using analyst-driven
      hypothesis testing.

      The L1 gateway is not a failure. All detection programmes start at L1. The Part 2
      work has produced seven functioning tracks that block real attacks. L1 is a starting
      point with five identified improvement paths, not a broken system.

  part_3_l2_defined:
    heading: 'L2 — Defined Detection'
    body: |
      L2 is reached when the programme has formalised its practices: rules are in
      version control, a CI/CD pipeline exists, coverage is mapped at least quarterly,
      and FPR data is collected even if not yet systematically acted upon. L2 is the
      direct output of Section 11.02 (DaC pipeline) combined with the Section 11.05
      coverage measurement. After completing the gateway migration described in Section
      11.02, the programme is at L2.

      L2 characteristics per dimension:

      Rule quality: All rules are in Git with commit history. All rules have the eight
      required metadata fields. Tests exist for the majority of rules — the migration
      from Section 11.02 included test authoring. The CI pipeline enforces lint and
      test before deployment.

      ATT&CK coverage: A coverage heat map has been generated at least once. The map
      identifies partial and full coverage per technique. A gap backlog exists, ordered
      by priority score from Section 11.05. The heat map is regenerated quarterly.

      FPR management: Per-rule FPR data is being collected — each alert is tagged with
      a rule ID and analyst dispositions (true positive / false positive) are recorded.
      No FPR targets have been set and no automated alerting fires when FPR crosses a
      threshold. The data collection is the precondition for L3 FPR management.

      Deployment pipeline: Rules deploy through the CI/CD pipeline from Section 11.02.
      The rollback manifest is populated. Alert flood detection is configured. Manual
      deployment to the SIEM is prohibited by team policy, though not physically enforced
      by the pipeline (the SIEM still allows direct edit by credentialed users).

      Proactive hunting: Not yet systematic. The gap backlog from Section 11.05 drives
      new rule development reactively against known technique gaps. Analyst-driven
      hypothesis testing happens occasionally but without a formal procedure or cadence.

      The gap between L2 and L3 is the gap between "we have the data" and "we act on
      the data." L2 collects FPR data but does not enforce FPR targets. L2 has a
      coverage map but does not automatically detect regression. L2 has a CI pipeline
      but does not physically prevent manual SIEM edits. L3 closes all three of these
      gaps.

  part_4_l3_managed:
    heading: 'L3 — Managed Detection'
    body: |
      L3 is the minimum acceptable maturity for a production AI system facing external
      adversaries. Below L3, the detection programme lacks the quality controls needed
      to maintain its effectiveness over time: rules degrade without being caught,
      false positives accumulate without being addressed, and coverage gaps widen as
      new techniques emerge without anyone noticing.

      L3 is achievable by a team of two to three engineers in 90 days using only the
      tooling built in Chapters 11 through 13 of this book. No additional budget,
      headcount, or specialised infrastructure is required beyond what a standard SIEM
      and a Git-based CI/CD system provide. The 90-day roadmap in this section''s
      deliverable operationalises the path.

      L3 characteristics per dimension:

      Rule quality: Every rule in production has automated tests that run in CI on
      every PR. Regression tests are added for every confirmed false positive. The test
      suite covers all seven gateway tracks. Rule quality is enforced by the pipeline,
      not by team discipline: a rule without tests does not merge.

      ATT&CK coverage: The coverage heat map is regenerated weekly in CI diff mode.
      Coverage regression triggers a CI failure with the rule ID and commit hash of the
      change that caused it. New ATLAS techniques are detected quarterly via the
      taxonomy expansion check. The gap backlog is actively worked in sprint planning.

      FPR management: Per-rule FPR targets are set and documented in each rule''s
      metadata. The false_positive_manager.py from Section 11.09 monitors per-rule FPR
      in real time and opens a detection engineering queue ticket when any rule exceeds
      its target. FPR is reviewed in the weekly detection engineering sync. The SOC
      queue is not the FPR feedback mechanism — the DaC queue is.

      Deployment pipeline: Manual SIEM edits are physically impossible for production
      rules, enforced by SIEM RBAC: only the CI service account has write access to
      production rules. All changes flow through the repository. Rollback completes in
      under five minutes from flood detection.

      Proactive hunting: Structured threat hunting runs at least once per quarter using
      the formal hypothesis procedure from Section 11.12. Hunt findings feed the
      detection backlog: each confirmed hunting finding that does not have a rule becomes
      a P1 gap item, bypassing normal priority scoring.

  part_5_l4_measured:
    heading: 'L4 — Measured Detection'
    body: |
      L4 extends L3 with ML-based detection, quantitative coverage targets, and a
      formal red team programme. It requires additional investment: at minimum one
      dedicated detection engineer (separate from the security operations role), ML
      infrastructure capable of training and serving detection classifiers, and a red
      team function — internal or contracted — that exercises the detection programme
      on a regular cadence.

      L4 characteristics per dimension:

      Rule quality: ML-based detectors (Chapter 12) are integrated alongside signature
      and heuristic rules. Each ML detector has a precision-recall curve from its
      validation set, a production FPR target calibrated from the ROC curve, and
      automated retraining triggers when the production FPR drifts above target by
      more than 20% relative. Rule quality includes both Sigma rules and ML model
      artefacts.

      ATT&CK coverage: Quantitative coverage targets are set per ATLAS tactic category:
      for example, "all Adversarial ML techniques with likelihood ≥ 3 must reach score
      2 within two quarters." Coverage is reported to leadership monthly as a metric
      alongside other security KPIs. Techniques at score 0 with likelihood ≥ 4 trigger
      an escalation to the security architecture team for compensating control assessment.

      FPR management: Real-time FPR dashboards are available to both the detection
      engineering team and the SOC. Analyst disposition data feeds back into ML detector
      retraining pipelines automatically. The feedback loop from analyst disposition to
      rule improvement runs on a weekly cadence.

      Deployment pipeline: The pipeline includes a canary deployment stage: new rules
      deploy to a canary traffic slice (5–10% of production requests) before full
      deployment. Alert rate on canary is compared to baseline before the full rollout
      is approved. This catches calibration issues before they affect the full production
      alert queue.

      Proactive hunting: Monthly threat hunting exercises, driven by red team findings
      and external threat intelligence. Each hunt produces at minimum one new detection
      hypothesis. Red team exercises run quarterly; every successful red team finding
      that was not detected becomes a P0 detection gap regardless of its priority score.

  part_6_l5_optimised:
    heading: 'L5 — Optimised Detection'
    body: |
      L5 is continuous improvement institutionalised. The programme is never complete;
      new attack techniques always create new gaps; the goal is not to close all gaps
      but to ensure that the rate of gap closure consistently exceeds the rate of gap
      creation. L5 requires organisational commitment beyond what a single team can
      provide: executive sponsorship, a dedicated detection engineering function
      separate from security operations, and integration of detection programme metrics
      into the organisation''s risk reporting.

      L5 characteristics per dimension:

      Rule quality: Automated gap detection — the programme generates a coverage report
      after every threat intelligence intake and automatically proposes detection
      hypotheses for uncovered techniques based on ATLAS technique descriptions and
      the existing rule portfolio. Rule authoring uses templates and ML-assisted
      completion; human review focuses on validation rather than authoring.

      ATT&CK coverage: Coverage targets are reviewed and revised quarterly based on
      the evolving threat landscape. Coverage improvement rate is a reported metric:
      the programme measures how many technique scores improved in the last 90 days
      and benchmarks against a target rate.

      FPR management: Analyst disposition data continuously retrains FPR models. The
      programme maintains a system-level FPR budget: the total false positive volume
      across all rules is capped at a level that keeps SOC analyst workload within
      capacity. When a new rule is proposed, its expected FPR contribution is assessed
      against the remaining FPR budget before the rule is approved for production.

      Deployment pipeline: Zero-touch deployment for routine threshold calibrations
      within a defined safe range. Human review required only for logic changes, new
      rules, and threshold changes outside the safe range. The pipeline generates a
      natural-language change summary for every deployment that is readable by
      non-engineers on the security team.

      Proactive hunting: Continuous hunting — the programme operates a persistent
      hunting function that runs automated hypotheses against production log data in
      near-real-time. Red team exercises run monthly. External threat intelligence is
      ingested automatically and mapped to ATLAS techniques within 24 hours of publication.

  part_7_gateway_score:
    heading: 'Scoring the Seven-Track Gateway: Current Maturity Baseline'
    body: |
      Applying the five-dimension scoring model to the seven-track gateway at the end
      of Section 11.07 — after completing all DaC pipeline work, coverage measurement,
      and Sigma rule portfolio work from Sections 11.02 through 11.07:

      Dimension 1 — Rule quality: L2. All seven tracks are in version control (Section
      11.02 migration). All rules have the eight required metadata fields. The test
      suite exists and runs in CI. Not yet L3 because regression tests from confirmed
      false positives are not yet systematically added — that requires the FPR tracking
      tooling from Section 11.09.

      Dimension 2 — ATT&CK coverage: L3. The heat map is generated from deployed rules
      (Section 11.05). Coverage diff runs in CI (Section 11.05 attck_coverage_heatmap.py).
      Taxonomy expansion check runs quarterly. The gap backlog is actively worked.
      L3 is reached here because all three L3 coverage requirements are in place.

      Dimension 3 — FPR management: L1. No per-rule FPR targets. No automated FPR
      alerting. Disposition data is not being collected systematically. This dimension
      will move to L3 after Section 11.09.

      Dimension 4 — Deployment pipeline: L2. Rules deploy through CI/CD (Section 11.02).
      Rollback manifest is populated. Alert flood detection is configured. Not yet L3
      because SIEM RBAC preventing manual edits requires infrastructure configuration
      outside the pipeline code itself — flagged as a parallel infrastructure task.

      Dimension 5 — Proactive hunting: L1. No formal hunting procedure exists yet.
      Section 11.12 builds the hunting playbook.

      Composite score: the floor across all five dimensions is L1 (FPR management and
      hunting). Overall programme maturity: L1 with three dimensions at L2 and one at L3.
      This is an accurate and honest baseline, not a discouraging one: five sections
      of Chapter 11 remain, each advancing at least one dimension. The end-of-chapter
      score in Section 11.14 will show the full progression.

      Minimum viable path to L3: advance FPR management to L3 (Section 11.09), confirm
      pipeline to L3 (Section 11.02 RBAC item), and establish the hunting programme
      at L3 (Section 11.12). All other dimensions are already at L3 or above.

