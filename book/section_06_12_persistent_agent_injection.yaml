key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Persistent agents have a fundamentally different threat model from stateless
        LLMs. Memory cross-session continuity converts a single injection event into
        indefinite influence. Detection must operate across three time points: write,
        dormant, and activation.

    - number: 2
      takeaway: |
        Memory injection reaches the agent's persistent store through three pathways:
        user instruction, retrieved content, and tool output. Each pathway requires
        a distinct write-time classifier placement to achieve complete coverage.

    - number: 3
      takeaway: |
        Long-running agent injection at step N shapes behaviour through step N+K
        by exploiting agent self-trust over its own prior reasoning. Reasoning chain
        logging with per-step injection scoring is required for detection.

    - number: 4
      takeaway: |
        Tool call chain injection escalates from read tool outputs to write tool
        invocations by exploiting the agent's self-trust over its own tool results.
        Tool call graph analysis correlates injection-scored outputs with anomalous
        subsequent tool calls.

    - number: 5
      takeaway: |
        Dormant injection is inert at write time. Write-time classifiers may score
        it below threshold if the conditional instruction is embedded in otherwise
        legitimate content. Read-time contextual classification -- evaluating entries
        in the context of the triggering query -- catches conditional payloads at
        activation time.

    - number: 6
      takeaway: |
        Agent goal manipulation through memory poisoning persists until explicitly
        purged. A defined purge procedure -- including cross-session impact audit --
        is a required operational control. Without it, detected injection entries
        may remain in the memory store after detection.

    - number: 7
      takeaway: |
        Shared memory pool deployments expose all users to a single injection event.
        Per-user memory isolation limits blast radius to the affected user. The
        architectural choice is a security-capability tradeoff requiring explicit
        risk acceptance if shared pools are used.

    - number: 8
      takeaway: |
        Four detection layers address the four injection phases: write-time classifier
        (prevents persistence), periodic batch audit (catches dormant evaders),
        read-time contextual classifier (catches conditional activation), and tool
        call graph analysis (catches chain escalation). All four are required for
        complete persistent agent injection coverage.


