section_summary: |
  Section 6.12 established the persistent agent injection threat model. The
  defining property -- memory cross-session continuity -- converts what would
  be a session-scoped injection in a stateless LLM into indefinite influence
  over the agent's behaviour. The adversary may execute the injection once and
  never interact with the agent again; the payload persists and activates in
  subsequent sessions triggered by other users or automated tasks.

  The four attack patterns each require distinct detection: memory injection
  (write-time classifier on all three write pathways), long-running agent
  injection (reasoning chain logging with per-step injection scoring), tool
  call chain injection (tool call graph analysis correlating injection-scored
  outputs with anomalous subsequent calls), and dormant injection (read-time
  contextual classification that evaluates entries against the triggering query).

  The memory security architecture requires four detection layers: write-time
  classifier preventing persistence, periodic batch audit catching dormant
  evaders, read-time contextual classifier catching conditional activation, and
  tool call graph analysis catching chain escalation. Shared memory pools
  require explicit write authorisation controls or per-user isolation to limit
  blast radius to a single injection event.

  Section 6.13 extends dormant injection to its most patient form: sleeping
  injection with precisely defined conditional triggers, payload staging that
  minimises footprint at write time, and canary token detection approaches
  that identify activation before the full payload executes.
