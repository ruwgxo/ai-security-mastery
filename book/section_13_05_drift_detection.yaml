section_overview:
  one_line_summary: 'The Chapter 12 detectors decay silently as the data and attack distributions shift; Section 13.05 turns the temporal lens on the detectors and the model themselves, building the population stability index, distribution tests, and prediction-distribution monitoring that make that decay visible and feed the retraining trigger.'
  why_this_section_exists: |
    Every detector in the previous four sections watches the user. Section 13.05 watches the
    detectors. This is a different kind of monitoring with a different target, and it exists because
    a trained detector is not a permanent asset. The Chapter 12 classifiers were trained on a
    snapshot of inputs and attacks, and the world moves: input distributions shift as the product and
    its users change, and attack distributions shift as adversaries invent new techniques. A detector
    trained on last quarter's data degrades against this quarter's reality, and it does so silently --
    its accuracy falls with no error message, no exception, no alert. The detector keeps returning
    confident scores; they are just increasingly wrong.

    Drift detection is the alarm on that silent decay. It is the monitoring that turns a degrading
    detector from an invisible liability into a visible, actionable alert. Without it, the only way to
    discover that a detector has decayed is to notice that attacks are getting through, which is
    discovering the failure by suffering its consequence. With it, the distribution shift that causes
    the decay is detected before the accuracy loss is large, and the retraining loop from Chapter 12
    Section 12.14 is triggered to refresh the detector.

    The section also draws the distinction that governs the response: data drift versus concept drift,
    and benign versus adversarial drift. Data drift is the inputs moving; concept drift is the
    meaning of the inputs moving, which is more dangerous because it degrades the detector with no
    input-side signal. Benign drift should adapt the model; adversarial drift should alert the
    security team. Conflating these either floods analysts with seasonal noise or misses the attack-
    distribution shift that signals a new campaign.
  position_in_chapter: |
    Section 13.05 completes the temporal family of Chapter 13 by applying temporal distributional
    comparison to the detectors and the model rather than to user behaviour. It builds on the
    distribution and baseline concepts of 13.03 and the temporal framing of 13.04, and it closes the
    loop back to Chapter 12: its drift alerts feed the Section 12.14 live dataset curation and
    retraining trigger. It is distinct from the user-facing temporal detector of 13.04 in its target
    -- the health of the detection system itself -- and it is the section that makes the whole
    Chapter 12 detection layer a maintained system rather than a decaying one.

