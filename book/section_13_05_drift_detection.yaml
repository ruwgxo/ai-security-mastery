prose_content:

  part_1:
    title: 'The Trained Detector Is a Decaying Asset'
    body: |
      A classifier is trained once on a dataset and then deployed to score live traffic indefinitely.
      The training assumes the live traffic resembles the training data: that the inputs come from the
      same distribution and that the relationship between inputs and labels is the same. Both
      assumptions decay over time, and the detector decays with them.

      The decay is silent, which is what makes it dangerous. A classifier that has drifted does not
      raise an exception or return an error. It returns a confident score for every input, exactly as
      it did on day one. The scores are simply increasingly miscalibrated: attacks that would have
      scored high on the training distribution now score low because they no longer resemble the
      training attacks, and the detector passes them with confidence. From the outside, the detection
      pipeline looks healthy -- it is processing traffic, returning scores, and blocking the attacks it
      still recognises. The attacks it no longer recognises pass invisibly.

      Without drift monitoring, there is exactly one way to discover that a detector has decayed: notice
      that attacks are getting through that should have been caught. That is discovering the failure by
      suffering its consequence, after the damage, with no warning. Drift detection replaces this with
      an early signal. It monitors the distributions the detector depends on -- the input features and
      the output scores -- and alarms when they shift away from the training reference, before the
      accuracy loss has grown large enough to be noticed through successful attacks. The drift alarm is
      the difference between maintaining the detector on a schedule driven by measured decay and
      discovering the decay through a breach.

  part_2:
    title: 'Data Drift and Concept Drift: Two Different Failures'
    body: |
      Drift comes in two kinds that must be distinguished because they have different signatures and
      different consequences.

      Data drift is a change in the input distribution. The features the detector sees move away from
      the distribution it was trained on. Prompt lengths grow because users adopt a new interaction
      style; the vocabulary shifts because a new domain of usage appears; the mix of endpoints changes
      because the product launches a new feature. The relationship between inputs and the correct label
      is unchanged -- an injection is still an injection -- but the inputs now occupy a region of feature
      space the detector saw little of in training, so its scores there are unreliable. Data drift is
      detectable on the input side: the feature distributions themselves have moved, and comparing the
      live feature distribution to the training distribution reveals the shift.

      Concept drift is a change in the relationship between inputs and labels. The feature distribution
      may be unchanged, but what the features mean has shifted: a pattern that was benign in training is
      now part of an attack, or an attack technique now presents through features that used to indicate
      benign traffic. The classic security example is a new attack technique: the adversary finds a
      phrasing that the detector scores as benign because no such attack existed in training, so the
      mapping from that feature region to the label has changed even though the feature region itself is
      not new. Concept drift is the more dangerous of the two because it can degrade the detector with no
      input-side signal: the inputs look familiar, the input-distribution monitors see nothing, and yet
      the detector is wrong because the meaning of those inputs has changed. Concept drift is detectable
      only by watching the relationship -- the detector's accuracy on labelled data, or the shift in its
      score distribution that signals its decisions are changing -- not by watching the inputs alone.

  part_3:
    title: 'Population Stability Index: Measuring Input Distribution Shift'
    body: |
      The workhorse metric for data drift is the population stability index. It measures how much a
      feature's distribution has shifted from a reference distribution to a live distribution, by
      binning both into the same buckets and summing a per-bucket term that grows as the live proportion
      in a bucket diverges from the reference proportion. The result is a single number per feature: near
      zero when the live distribution matches the reference, growing as they diverge.

      The index has conventional interpretation bands that make it operationally convenient. A small
      value indicates no material shift and needs no action. A moderate value indicates a shift worth
      monitoring -- the feature has moved enough to watch but not enough to act. A large value indicates
      a significant shift that warrants investigation and likely retraining. These bands turn a
      continuous metric into a three-state signal that routes directly to a response, and they are stable
      enough across domains to be a reasonable default before per-feature tuning.

      The population stability index is computed per feature against a reference window, and the reference
      window choice is a design decision with the same character as the baseline window of 13.03. The
      reference should represent the distribution the detector was trained on or last validated against,
      so that drift is measured relative to the detector's actual operating assumption, not relative to
      an arbitrary recent window. Computing the index across all of a detector's input features produces
      a per-feature drift profile that localises the shift: it shows not just that the inputs drifted but
      which features drifted, which is the first input to deciding whether the drift is benign or
      adversarial and which retraining data is needed.

  part_4:
    title: 'Distribution Tests: KS and Chi-Squared'
    body: |
      The population stability index gives a single interpretable number, but a complementary and more
      statistically grounded approach is to test directly whether the live and reference distributions
      differ, using a hypothesis test. The test depends on the feature type.

      For continuous features -- prompt length, embedding-norm, request rate -- the Kolmogorov-Smirnov
      test compares the live and reference samples by their cumulative distributions, returning a
      statistic that measures the largest gap between the two cumulative curves and a p-value for the
      null hypothesis that the two samples come from the same distribution. A small p-value rejects that
      null: the distributions differ, the feature has drifted. The KS test is non-parametric, making no
      assumption about the shape of the distribution, which suits behavioural features whose
      distributions are not normal.

      For categorical features -- endpoint, request type, language -- the chi-squared test compares the
      observed live category counts against the expected counts under the reference distribution,
      returning a statistic and a p-value for the null that the category proportions are unchanged. A
      small p-value indicates the category mix has shifted: a new endpoint dominating, a language
      appearing that was rare in training.

      The tests and the population stability index are used together rather than as alternatives. The
      index gives a continuous, interpretable magnitude that routes to the three-state response; the
      hypothesis tests give a principled significance signal that guards against calling drift on a shift
      that is within sampling noise. A practical drift monitor reports both per feature: the index
      magnitude for routing and the test p-value for significance, flagging a feature as drifted when the
      index is in the action band and the test is significant, which avoids both the index's lack of a
      significance notion and the test's lack of an interpretable magnitude.

  part_5:
    title: 'Prediction-Distribution Monitoring: Catching Concept Drift'
    body: |
      Input-side monitoring -- the population stability index and the distribution tests on input
      features -- detects data drift but is blind to concept drift, because concept drift can occur with
      no input-distribution shift. To catch the decay that input monitoring misses, the monitor must
      watch the detector's outputs, not just its inputs.

      Prediction-distribution monitoring tracks the distribution of the classifier's output scores over
      time and compares it against a reference score distribution from when the detector was known to be
      accurate. The reasoning is that a detector making consistent decisions on a stable population
      produces a stable score distribution: a characteristic proportion of high scores, low scores, and
      borderline scores. When that distribution shifts -- the proportion of high scores collapses, or the
      scores pile up at the boundary -- the detector's decisions are changing, which is a signal that
      something about the relationship it learned no longer holds. A collapse in the high-score
      proportion is a particularly important signal in security: it can mean the attack technique has
      shifted so the detector no longer recognises the attacks, scoring them low -- exactly the concept
      drift that produces silent failure.

      Prediction-distribution monitoring is powerful precisely because it requires no labels. The gold
      standard for detecting concept drift is to measure the detector's accuracy on freshly labelled
      live data, but labels are expensive and slow, and waiting for them means waiting while the detector
      is already decayed. The score distribution is available immediately on every prediction, with no
      labelling. It is a leading indicator: a shift in the score distribution precedes the confirmation
      of accuracy loss that labelled data would provide, giving the early warning that is the whole point
      of drift detection. It is not a substitute for labelled validation -- a score-distribution shift
      can have benign causes too -- but it is the immediate, label-free signal that triggers the more
      expensive labelled investigation.

  part_6:
    title: 'Closing the Loop: Retraining Triggers and Benign-versus-Adversarial Routing'
    body: |
      A drift alarm is not the end of the process; it is the start of a response, and the response
      depends on what kind of drift it is. The drift monitor feeds two distinct downstream paths, and
      routing to the correct one is the final job of this section.

      Benign drift -- the input distribution moving because the product changed, a seasonal pattern, a
      new legitimate usage mode -- calls for adaptation. The relationship the detector learned is still
      valid; it simply needs to be refreshed on data that includes the new distribution. This routes to
      the Chapter 12 Section 12.14 retraining trigger: the drift alarm signals that the live dataset has
      moved enough that the detector should be retrained on a corpus that includes the new distribution,
      and the retrained detector is validated and promoted through the model registry. The trigger must
      have a cooldown and a confirmation step -- a retrain is expensive, and a false drift alarm that
      triggers an unnecessary retrain wastes resources and risks promoting a model trained on a
      transient shift -- so the trigger fires only on confirmed, sustained drift, not a single window's
      noise.

      Adversarial drift -- the attack distribution shifting because an adversary has introduced a new
      technique -- calls for a security response, not just a retrain. A collapse in the high-score
      proportion that coincides with attacks getting through is not a benign distribution shift to adapt
      to; it is a signal that a new campaign is underway, and it routes to the security team as an alert,
      in addition to feeding the retraining corpus with the newly discovered attack examples. Conflating
      the two is the failure to avoid in both directions: treating adversarial drift as benign means
      quietly retraining on an attack and normalising it, while treating benign drift as adversarial
      floods the security team with seasonal noise. The monitor distinguishes them by correlating the
      drift signal with the other behavioural detectors -- a drift that coincides with rising anomaly
      scores, blocked-traffic rates, or coordinated-network signals is adversarial; a drift that
      coincides with a product launch or a seasonal boundary is benign -- and routes each to adaptation
      or alert accordingly. This routing makes drift detection both the maintenance alarm that keeps the
      Chapter 12 detectors current and a detection signal in its own right for the campaign that announces
      itself as a shift in the attack distribution.

