deliverables:

  deliverable_1:
    title: 'Population Stability Index and Distribution Drift Detector'
    filename: 'drift_detector.py'
    description: 'Computes the population stability index per feature against a reference window and runs distribution tests, reporting a per-feature drift profile with magnitude and interpretation band. Implements the PSI and input-side drift detection from Section 13.05 Parts 3 and 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; PSI and a simple two-sample comparison implemented without external dependencies'
    code: |
      # drift_detector.py
      # Section 13.05: Population Stability Index Drift Detector
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      import math
      from dataclasses import dataclass
      from typing import Dict, List, Tuple


      def _bin_edges(reference: List[float], n_bins: int) -> List[float]:
          s = sorted(reference)
          if not s:
              return [0.0, 1.0]
          edges = [s[0]]
          for i in range(1, n_bins):
              idx = int(i * len(s) / n_bins)
              edges.append(s[min(idx, len(s) - 1)])
          edges.append(s[-1])
          # ensure strictly increasing edges
          uniq = [edges[0]]
          for e in edges[1:]:
              if e > uniq[-1]:
                  uniq.append(e)
          if len(uniq) < 2:
              uniq = [s[0], s[0] + 1.0]
          return uniq


      def _proportions(values: List[float], edges: List[float]) -> List[float]:
          counts = [0] * (len(edges) - 1)
          for v in values:
              placed = False
              for b in range(len(edges) - 1):
                  if edges[b] <= v <= edges[b + 1]:
                      counts[b] += 1
                      placed = True
                      break
              if not placed:
                  counts[-1] += 1
          total = sum(counts) or 1
          # smoothing to avoid zero proportions
          return [(c + 0.5) / (total + 0.5 * len(counts)) for c in counts]


      def population_stability_index(reference: List[float], live: List[float], n_bins: int = 10) -> float:
          edges = _bin_edges(reference, n_bins)
          ref_p = _proportions(reference, edges)
          live_p = _proportions(live, edges)
          psi = 0.0
          for r, l in zip(ref_p, live_p):
              psi += (l - r) * math.log(l / r)
          return psi


      def interpret_psi(psi: float) -> str:
          if psi < 0.1:
              return 'no material shift'
          if psi < 0.25:
              return 'shift worth watching'
          return 'significant shift -- investigate/retrain'


      @dataclass
      class FeatureDrift:
          feature: str
          psi: float
          interpretation: str


      def drift_profile(reference: Dict[str, List[float]], live: Dict[str, List[float]]) -> List[FeatureDrift]:
          out = []
          for feature in reference:
              if feature in live:
                  psi = population_stability_index(reference[feature], live[feature])
                  out.append(FeatureDrift(feature, round(psi, 4), interpret_psi(psi)))
          return out


      if __name__ == '__main__':
          import random
          random.seed(7)
          reference = {
              'prompt_length': [random.gauss(100, 20) for _ in range(500)],
              'embedding_norm': [random.gauss(1.0, 0.1) for _ in range(500)],
          }
          # prompt_length drifts upward (new usage style); embedding_norm stable
          live = {
              'prompt_length': [random.gauss(160, 25) for _ in range(500)],
              'embedding_norm': [random.gauss(1.0, 0.1) for _ in range(500)],
          }
          for fd in drift_profile(reference, live):
              print(f'{fd.feature:<16} PSI={fd.psi:<8} {fd.interpretation}')
          print('prompt_length shows significant data drift; embedding_norm does not.')

  deliverable_2:
    title: 'Distribution Comparison Tests'
    filename: 'distribution_tests.py'
    description: 'Two-sample distribution tests for drift: a Kolmogorov-Smirnov test for continuous features and a chi-squared test for categorical features, each returning a statistic and a significance decision. Implements the distribution tests from Section 13.05 Part 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; KS statistic and chi-squared statistic implemented directly with a critical-value approximation'
    code: |
      # distribution_tests.py
      # Section 13.05: KS and Chi-Squared Distribution Drift Tests
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      import math
      from dataclasses import dataclass
      from typing import Dict, List, Tuple


      @dataclass
      class TestResult:
          statistic: float
          significant: bool
          detail: str


      def ks_two_sample(reference: List[float], live: List[float], alpha: float = 0.05) -> TestResult:
          # KS statistic: max gap between empirical CDFs
          ref = sorted(reference)
          liv = sorted(live)
          n, m = len(ref), len(liv)
          if n == 0 or m == 0:
              return TestResult(0.0, False, 'empty sample')
          all_vals = sorted(set(ref + liv))
          d = 0.0
          for v in all_vals:
              fr = sum(1 for x in ref if x <= v) / n
              fl = sum(1 for x in liv if x <= v) / m
              d = max(d, abs(fr - fl))
          # critical value approximation for two-sample KS
          c_alpha = 1.358  # for alpha = 0.05
          crit = c_alpha * math.sqrt((n + m) / (n * m))
          return TestResult(round(d, 4), d > crit, f'D={d:.4f}, crit={crit:.4f}')


      def chi_squared(reference_counts: Dict[str, int], live_counts: Dict[str, int], alpha: float = 0.05) -> TestResult:
          categories = set(reference_counts) | set(live_counts)
          ref_total = sum(reference_counts.values()) or 1
          live_total = sum(live_counts.values()) or 1
          stat = 0.0
          for cat in categories:
              ref_p = reference_counts.get(cat, 0) / ref_total
              expected = ref_p * live_total
              observed = live_counts.get(cat, 0)
              if expected > 0:
                  stat += (observed - expected) ** 2 / expected
          dof = max(len(categories) - 1, 1)
          # rough critical value: chi-squared 0.95 quantile approx via Wilson-Hilferty
          crit = dof * (1 - 2 / (9 * dof) + 1.645 * math.sqrt(2 / (9 * dof))) ** 3
          return TestResult(round(stat, 4), stat > crit, f'chi2={stat:.4f}, dof={dof}, crit={crit:.2f}')


      if __name__ == '__main__':
          import random
          random.seed(11)
          ref_cont = [random.gauss(100, 20) for _ in range(300)]
          live_cont_drift = [random.gauss(140, 20) for _ in range(300)]
          live_cont_same = [random.gauss(100, 20) for _ in range(300)]

          print('KS continuous (drifted):', ks_two_sample(ref_cont, live_cont_drift).detail)
          print('  significant:', ks_two_sample(ref_cont, live_cont_drift).significant)
          print('KS continuous (stable): ', ks_two_sample(ref_cont, live_cont_same).detail)
          print('  significant:', ks_two_sample(ref_cont, live_cont_same).significant)

          ref_cat = {'/v1/chat': 700, '/v1/complete': 250, '/v1/embed': 50}
          live_cat_drift = {'/v1/chat': 300, '/v1/complete': 250, '/v1/embed': 450}
          r = chi_squared(ref_cat, live_cat_drift)
          print('\nChi-squared categorical (drifted):', r.detail, '| significant:', r.significant)
          print('Endpoint mix shifted toward /v1/embed -- categorical drift detected.')

  deliverable_3:
    title: 'Prediction-Distribution Monitor'
    filename: 'prediction_distribution_monitor.py'
    description: 'Monitors the classifier score distribution over time against a reference distribution from when the detector was accurate, flagging concept drift through score-distribution shift -- in particular a collapse in the high-score proportion. Implements the prediction-distribution monitoring from Section 13.05 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # prediction_distribution_monitor.py
      # Section 13.05: Prediction-Distribution Monitor for Concept Drift
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Dict, List


      def score_histogram(scores: List[float], bins: int = 5) -> List[float]:
          counts = [0] * bins
          for s in scores:
              idx = min(int(s * bins), bins - 1)
              counts[idx] += 1
          total = sum(counts) or 1
          return [c / total for c in counts]


      def high_score_proportion(scores: List[float], threshold: float = 0.7) -> float:
          if not scores:
              return 0.0
          return sum(1 for s in scores if s >= threshold) / len(scores)


      @dataclass
      class PredictionDriftResult:
          high_score_ref: float
          high_score_live: float
          collapse_ratio: float
          concept_drift_suspected: bool
          detail: str


      def monitor_prediction_drift(
          reference_scores: List[float],
          live_scores: List[float],
          collapse_threshold: float = 0.5,
      ) -> PredictionDriftResult:
          ref_high = high_score_proportion(reference_scores)
          live_high = high_score_proportion(live_scores)
          # collapse ratio: how much the high-score proportion fell
          collapse = 1.0 - (live_high / ref_high) if ref_high > 0 else 0.0
          suspected = collapse > collapse_threshold
          detail = (
              f'high-score proportion {ref_high:.2f} -> {live_high:.2f} '
              f'(collapse {collapse:.0%})'
          )
          return PredictionDriftResult(
              round(ref_high, 3), round(live_high, 3), round(collapse, 3), suspected, detail
          )


      if __name__ == '__main__':
          import random
          random.seed(3)
          # Reference: detector catching attacks -- a healthy tail of high scores
          reference_scores = [random.random() for _ in range(400)] + [0.8 + 0.2 * random.random() for _ in range(120)]
          # Live: a new attack technique scores low -- high-score tail collapses
          live_scores = [random.random() for _ in range(400)] + [0.2 + 0.2 * random.random() for _ in range(120)]

          result = monitor_prediction_drift(reference_scores, live_scores)
          print(result.detail)
          print('Concept drift suspected:', result.concept_drift_suspected)
          print('A collapse in the high-score proportion with no input-side shift')
          print('signals concept drift -- a new technique the detector no longer flags.')

  deliverable_4:
    title: 'Drift Retraining Trigger with Benign/Adversarial Routing'
    filename: 'drift_retrain_trigger.py'
    description: 'Connects confirmed drift alerts to the Chapter 12 Section 12.14 retraining trigger with cooldown and confirmation, and routes drift to adaptation or security alert based on correlation with other behavioural signals. Implements the loop-closing and routing from Section 13.05 Part 6.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; the retrain action and alert action are injectable callbacks so this section does not depend on the 12.14 implementation'
    code: |
      # drift_retrain_trigger.py
      # Section 13.05: Drift Retraining Trigger and Benign/Adversarial Routing
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Callable, List, Optional


      @dataclass
      class DriftSignal:
          feature_or_model: str
          magnitude: float
          sustained_windows: int          # how many consecutive windows drifted
          coincident_anomaly_rate: float  # other behavioural signals at the time
          coincident_product_change: bool


      @dataclass
      class DriftRouter:
          min_sustained_windows: int = 3
          cooldown_windows: int = 10
          retrain_action: Optional[Callable[[DriftSignal], None]] = None
          alert_action: Optional[Callable[[DriftSignal], None]] = None
          _windows_since_retrain: int = field(default=999)

          def _is_adversarial(self, sig: DriftSignal) -> bool:
              # Adversarial if it coincides with elevated behavioural signals
              # and is NOT explained by a product change
              return sig.coincident_anomaly_rate > 0.2 and not sig.coincident_product_change

          def process(self, sig: DriftSignal) -> str:
              self._windows_since_retrain += 1

              # Not yet a confirmed, sustained drift -> watch only
              if sig.sustained_windows < self.min_sustained_windows:
                  return 'watch: drift not yet sustained'

              if self._is_adversarial(sig):
                  if self.alert_action:
                      self.alert_action(sig)
                  # adversarial drift also feeds the corpus, but always alerts
                  return 'ADVERSARIAL: security alert raised + attacks queued for corpus'

              # Benign sustained drift -> retrain, subject to cooldown
              if self._windows_since_retrain < self.cooldown_windows:
                  return 'benign drift confirmed but within cooldown -- retrain suppressed'
              if self.retrain_action:
                  self.retrain_action(sig)
              self._windows_since_retrain = 0
              return 'BENIGN: retraining triggered (12.14) and cooldown reset'


      if __name__ == '__main__':
          retrains: List[str] = []
          alerts: List[str] = []
          router = DriftRouter(
              retrain_action=lambda s: retrains.append(s.feature_or_model),
              alert_action=lambda s: alerts.append(s.feature_or_model),
          )

          cases = [
              DriftSignal('prompt_length', 0.3, sustained_windows=1, coincident_anomaly_rate=0.05, coincident_product_change=False),
              DriftSignal('prompt_length', 0.3, sustained_windows=4, coincident_anomaly_rate=0.05, coincident_product_change=True),
              DriftSignal('injection_score_dist', 0.4, sustained_windows=4, coincident_anomaly_rate=0.45, coincident_product_change=False),
          ]
          for c in cases:
              print(f'{c.feature_or_model:<22} -> {router.process(c)}')
          print(f'\nRetrains triggered: {retrains}')
          print(f'Security alerts:    {alerts}')

common_mistakes:

  mistake_1:
    description: 'Deploying a trained detector without any drift monitoring and assuming its accuracy persists'
    why_it_happens: |
      A detector that validated well at training time produces confident scores indefinitely, with no
      error or warning to suggest its accuracy has changed. The pipeline looks healthy -- it processes
      traffic and blocks the attacks it still recognises -- so there is no visible prompt to add
      monitoring of the detector's own health.
    consequence: |
      Input and attack distributions shift over time, and the detector decays silently against them. The
      only way to discover the decay without drift monitoring is to notice attacks getting through that
      should have been caught, which is discovering the failure by suffering its consequence after the
      damage is done. The detector becomes a decaying asset with no alarm on its decay, and the decay is
      found through a breach.
    correct_approach: |
      Monitor the distributions the detector depends on -- input features via the population stability
      index and distribution tests, output scores via prediction-distribution monitoring -- so the shift
      that causes decay is detected before the accuracy loss is large. drift_detector.py and
      prediction_distribution_monitor.py provide the input-side and output-side alarms that turn silent
      decay into an early, actionable signal.

  mistake_2:
    description: 'Monitoring only the input distribution and missing concept drift that has no input-side signal'
    why_it_happens: |
      Input-distribution monitoring with the population stability index is the standard, well-documented
      drift technique, and it catches the visible data drift that most drift discussions focus on. Once
      it is in place and catching input shifts, drift detection feels complete.
    consequence: |
      Concept drift -- a change in what the inputs mean -- can occur with no input-distribution shift. A
      new attack technique that presents through familiar-looking features degrades the detector while
      the input monitors see nothing, because the inputs are not new; only their relationship to the
      correct label has changed. The most dangerous drift, the one that produces silent security failure,
      is exactly the one input monitoring misses.
    correct_approach: |
      Add prediction-distribution monitoring that watches the detector's output score distribution, which
      shifts when the detector's decisions change even if the inputs do not. A collapse in the high-score
      proportion is a leading, label-free signal of the concept drift that input monitoring cannot see.
      prediction_distribution_monitor.py provides this output-side complement.

  mistake_3:
    description: 'Triggering a retrain on every drift alarm with no confirmation or cooldown'
    why_it_happens: |
      Drift detection is built to trigger retraining, so wiring each drift alarm straight to a retrain
      feels like completing the loop. A single window showing drift looks like sufficient cause to
      refresh the detector.
    consequence: |
      A retrain is expensive and consequential. A single window's drift is often transient noise -- a
      brief seasonal spike, a sampling fluctuation -- and retraining on it wastes resources and risks
      promoting a model fitted to a transient shift that has already reversed. Triggering on every alarm
      makes the retraining pipeline thrash and can degrade the detector by training it on noise.
    correct_approach: |
      Trigger retraining only on confirmed, sustained drift across multiple consecutive windows, and
      apply a cooldown so the pipeline cannot retrain repeatedly in a short period. The confirmation
      filters transient noise and the cooldown bounds the cost. drift_retrain_trigger.py requires a
      minimum number of sustained windows and enforces a cooldown before a retrain fires.

  mistake_4:
    description: 'Treating adversarial drift as benign and quietly retraining on an attack distribution'
    why_it_happens: |
      The drift response pipeline routes drift to retraining by default, because most drift is benign
      distribution movement that retraining correctly handles. An adversarial shift looks like just
      another distribution change to a monitor that does not check what the drift coincides with.
    consequence: |
      Adversarial drift is an attack technique shifting the attack distribution. Retraining on it
      without recognising it as adversarial folds the attack into the training corpus and normalises it:
      the detector learns to expect the attack pattern as part of the data, and the security team is
      never alerted that a new campaign is underway. The drift response actively launders the attack into
      accepted normal.
    correct_approach: |
      Classify drift as benign or adversarial by correlating it with the other behavioural signals --
      rising anomaly rates, block rates, coordinated-network signals indicate adversarial drift, while a
      product launch or seasonal boundary indicates benign drift -- and route adversarial drift to a
      security alert as well as the corpus, never silently retraining on it. drift_retrain_trigger.py
      checks coincident signals before routing.

  mistake_5:
    description: 'Choosing an arbitrary recent window as the drift reference instead of the detector training or last-validated distribution'
    why_it_happens: |
      Comparing the current window to the immediately preceding window is the simplest reference choice
      and requires no separate stored reference. It detects sudden changes between adjacent windows,
      which looks like drift detection.
    consequence: |
      Drift must be measured relative to the distribution the detector was actually trained on or last
      validated against, because that is the distribution the detector assumes. Comparing against a recent
      window misses a slow drift that moves the distribution gradually -- each adjacent window resembles
      the last, so no alarm fires, while the cumulative shift away from the training distribution grows
      large. The reference-window error makes the monitor blind to exactly the gradual drift that
      retraining is meant to catch.
    correct_approach: |
      Anchor the drift reference to the detector's training or last-validation distribution, so drift is
      measured against the detector's real operating assumption and a gradual cumulative shift is detected
      even when no single adjacent-window comparison would flag it. The reference is updated only when the
      detector is retrained or revalidated, not on a rolling recent basis.

section_summary:

  compact: |
    A trained detector is a decaying asset: input and attack distributions shift over time, and the
    Chapter 12 classifiers degrade silently against them, returning confident but increasingly wrong
    scores with no error to signal the decay. Section 13.05 is the alarm on that decay, applying temporal
    distributional comparison to the detectors and the model rather than to user behaviour. Drift comes in
    two kinds: data drift, a shift in the input distribution detectable on the input side, and concept
    drift, a shift in the relationship between inputs and labels that is more dangerous because it can
    degrade the detector with no input-side signal. The population stability index and KS and chi-squared
    tests catch data drift on the inputs; prediction-distribution monitoring catches concept drift through
    a shift in the score distribution -- a collapse in the high-score proportion -- as a leading, label-
    free indicator. Drift alarms close the loop to the Chapter 12 Section 12.14 retraining trigger, gated
    by sustained-drift confirmation and a cooldown so a transient shift does not trigger an expensive
    retrain. Crucially, drift is routed by kind: benign drift adapts the model through retraining, while
    adversarial drift -- a shift coinciding with rising attack signals -- raises a security alert rather
    than being quietly normalised into the corpus.

  key_takeaways:
    - 'A trained detector is a decaying asset: it degrades silently as input and attack distributions shift, and without drift monitoring the decay is discovered only by suffering an attack it should have caught'
    - 'Data drift is a shift in the input distribution, detectable on the input side; concept drift is a shift in the input-label relationship, more dangerous because it can degrade the detector with no input-side signal'
    - 'The population stability index and KS and chi-squared tests catch data drift on the inputs, with the index giving an interpretable magnitude and the tests giving a significance signal'
    - 'Prediction-distribution monitoring catches concept drift through a shift in the score distribution -- notably a high-score-proportion collapse -- as a leading, label-free indicator that input monitoring cannot provide'
    - 'Drift alarms feed the Chapter 12 Section 12.14 retraining trigger, gated by sustained-drift confirmation and a cooldown so a transient shift does not trigger an expensive or noise-fitted retrain'
    - 'Route drift by kind: benign drift adapts the model through retraining, while adversarial drift coinciding with rising attack signals raises a security alert rather than being quietly normalised into the training corpus'

preview_section_13_06:
  title: 'Section 13.06: Model Behavioural Monitoring -- Output Distribution Shift as Injection-Success Signal'
  summary: |
    Section 13.06 turns from monitoring the detectors to monitoring the model itself, drawing the
    distinction between detecting an injection attempt on the input -- the Chapter 12 classifiers' job --
    and detecting injection success on the output. Successful injection manifests as a shift in the
    model's output distribution: its refusal rate drops, its persona breaks, its format conformance fails,
    or it emits content it was instructed never to produce. The section builds a per-endpoint output
    distribution baseline as the reference for shift detection, output-anomaly detection for responses
    that violate the constraints the model normally honours, canary and honeytoken monitoring that turns
    injection success into a high-confidence binary signal, and self-consistency monitoring that detects
    when the model contradicts its own earlier behaviour within a session. It is the complement to the
    input-side classifiers and to the Section 12.09 PII output scanning: where the input layer detects the
    attempt, model behavioural monitoring confirms the outcome.

