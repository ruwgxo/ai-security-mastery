  - id: "7.3.ex.01"
    title: "DAN Variant Timeline Analysis"
    type: "analysis"
    description: |
      Run dan_variant_timeline.py. For each variant in the timeline, identify
      which detection signal from get_durable_signals() would have caught it.
      For any variant where no durable signal applies, document why -- this
      reveals gaps in the durable signal set that the Section 7.14 classifier
      must cover.
    deliverable: "dan_variant_signal_mapping.md"
    time_estimate: "25 minutes"

  - id: "7.3.ex.02"
    title: "Persona Taxonomy Red-Team Exercise"
    type: "red_team"
    description: |
      Using the taxonomy in persona_jailbreak_taxonomy.py as a reference (not
      the example prompts, which are paraphrased), construct one test case for
      each of the eight sub-types against your target deployment. Record: which
      sub-types succeeded, which failed, and whether the failure was a model-level
      refusal or an infrastructure-level block. Do not use real harmful requests --
      use a clearly benign stand-in (request the model to produce the text
      "JAILBREAK_SUCCESS") to test only the alignment bypass, not the downstream
      capability.
    deliverable: "persona_red_team_results.md"
    time_estimate: "60 minutes"
    safety_note: |
      Use a benign capability request ("say JAILBREAK_SUCCESS") as the payload
      throughout. The goal is to test whether the persona frame is accepted, not
      to produce harmful content.

  - id: "7.3.ex.03"
    title: "Nested Roleplay Depth Calibration"
    type: "code_exercise"
    description: |
      Extend nested_roleplay_depth.py with your own test prompts at nesting depths
      1 through 4. For each depth, record whether your target deployment accepted
      the roleplay frame (using the JAILBREAK_SUCCESS payload from Exercise 7.3.ex.02).
      Plot depth vs acceptance rate. Identify the depth at which acceptance probability
      crosses 50% -- this is your deployment's nesting vulnerability threshold.
    deliverable: "nesting_depth_calibration.md + nesting_depth_calibration.png"
    time_estimate: "45 minutes"

  - id: "7.3.ex.04"
    title: "System Prompt Hardening Evaluation"
    type: "architecture_review"
    description: |
      Apply the hardened system prompt patterns from hardened_system_prompt_patterns.py
      to your target deployment. Re-run the eight-sub-type red-team from Exercise
      7.3.ex.02. Record which sub-types are now blocked at the model level vs
      still succeeding. The sub-types still succeeding after system prompt hardening
      are the ones where infrastructure detection is load-bearing.
    deliverable: "system_prompt_hardening_evaluation.md"
    time_estimate: "45 minutes"
    depends_on: "7.3.ex.02"

# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "RLHF trains refusal as self-refusal, not character-refusal. The moment the\
    \ model accepts a persona frame, its refusal training is operating on the\
    \ character's constraints, not its own."
  - "DAN persists across variants because the mechanism -- identity establishment\
    \ plus restriction-negation claims -- is not patchable by keyword updates.\
    \ Detection must target the mechanism, not the name."
  - "Custom persona injection distributes restriction-negation claims across a\
    \ long preamble to evade density-based detection. Full-prompt semantic\
    \ embedding is required."
  - "Nested roleplay at depth 2 and beyond exhausts classifiers trained on\
    \ single-layer patterns. Nesting depth itself is a detection signal\
    \ independent of content."
  - "System prompt hardening reduces success rate measurably but does not replace\
    \ infrastructure detection. Sophisticated persona attacks at depth 3+ succeed\
    \ against hardened system prompts. The detection ensemble in Section 7.14\
    \ is the load-bearing control."
  - "Character-to-character injection is a composed attack: persona frame plus\
    \ injection payload. It must be caught by the injection classifier scanning\
    \ quoted speech within roleplay context, not only by the jailbreak classifier."

