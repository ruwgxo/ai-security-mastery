  - id: "7.10.code.03"
    title: "Context Length Limit Analysis"
    description: |
      Analysis tool for determining context length limits appropriate to your
      deployment's legitimate use cases, balanced against many-shot attack risk.
      Generates a risk profile for each context length option based on max feasible
      shot count and the shot count threshold for your deployed model.
    language: "python"
    filename: "code/ch07/context_length_analysis.py"
    code: |
      from dataclasses import dataclass
      from typing import Optional


      @dataclass
      class ContextLengthProfile:
          context_limit_tokens: int
          max_shots_feasible: int
          tokens_per_shot_estimate: int
          legitimate_use_cases_supported: list
          many_shot_risk_level: str
          recommended_shot_count_alert: int
          recommended_shot_count_block: int
          notes: str


      TOKENS_PER_SHOT_ESTIMATE = 150   # average tokens per QA pair


      def analyse_context_length(
          context_limit_tokens: int,
          model_bypass_threshold_shots: Optional[int] = None,
          legitimate_use_cases: Optional[list] = None,
      ) -> ContextLengthProfile:
          '''
          Generate a risk profile for a given context length limit.

          context_limit_tokens: the context window limit to analyse.
          model_bypass_threshold_shots: if known, the shot count at which your
              model shows measurable bypass. If None, uses conservative defaults.
          legitimate_use_cases: list of use cases that require this context length.
          '''
          max_shots = context_limit_tokens // TOKENS_PER_SHOT_ESTIMATE

          # Risk level based on max feasible shots
          if max_shots < 15:
              risk_level = 'very_low'
          elif max_shots < 50:
              risk_level = 'low'
          elif max_shots < 200:
              risk_level = 'medium'
          elif max_shots < 500:
              risk_level = 'high'
          else:
              risk_level = 'very_high'

          # Alert and block thresholds
          if model_bypass_threshold_shots:
              alert = max(5, model_bypass_threshold_shots - 5)
              block = model_bypass_threshold_shots + 10
          else:
              # Conservative defaults when model-specific threshold unknown
              alert = min(20, max(5, max_shots // 10))
              block = min(50, max(15, max_shots // 5))

          # Legitimate use cases by context size
          default_use_cases = {
              4_096: ['single-document QA', 'short conversations', 'code review'],
              8_192: ['multi-document QA', 'long-form writing assistance'],
              16_384: ['long document analysis', 'extended coding sessions'],
              32_768: ['full codebase analysis', 'book chapter summarisation'],
              100_000: ['full book analysis', 'large codebase review', 'long research synthesis'],
              200_000: ['very long document analysis', 'multi-book research'],
          }
          # Find nearest context size for default use cases
          nearest = min(default_use_cases.keys(), key=lambda x: abs(x - context_limit_tokens))
          use_cases = legitimate_use_cases or default_use_cases.get(nearest, ['general use'])

          notes_map = {
              'very_low': 'Many-shot attack is not feasible at this context length.',
              'low': 'Low risk. Standard many-shot attack requires more context.',
              'medium': 'Moderate risk. Alert threshold important. Test your model.',
              'high': 'High risk. Reduce context limit if use cases permit.',
              'very_high': 'Very high risk. Context limit may be excessive for deployment.',
          }

          return ContextLengthProfile(
              context_limit_tokens=context_limit_tokens,
              max_shots_feasible=max_shots,
              tokens_per_shot_estimate=TOKENS_PER_SHOT_ESTIMATE,
              legitimate_use_cases_supported=use_cases,
              many_shot_risk_level=risk_level,
              recommended_shot_count_alert=alert,
              recommended_shot_count_block=block,
              notes=notes_map[risk_level],
          )


      def print_context_analysis(profile: ContextLengthProfile) -> None:
          print(f'Context Limit: {profile.context_limit_tokens:,} tokens')
          print(f'  Max shots feasible:    {profile.max_shots_feasible}')
          print(f'  Many-shot risk:        {profile.many_shot_risk_level.upper()}')
          print(f'  Alert threshold:       {profile.recommended_shot_count_alert} shots')
          print(f'  Block threshold:       {profile.recommended_shot_count_block} shots')
          print(f'  Supported use cases:   {", ".join(profile.legitimate_use_cases_supported[:3])}')
          print(f'  Note:                  {profile.notes}')
          print()


      DEPLOYMENT_GUIDANCE = {
          'principle': (
              'Set context length to the MINIMUM required for legitimate use cases, '
              'not the maximum available. Each additional token of context is '
              'additional many-shot attack surface.'
          ),
          'recommended_approach': [
              'Identify the longest legitimate document your deployment needs to process.',
              'Set context limit to 1.5x that length (headroom for conversation history).',
              'Set shot count alert at 20 shots or model bypass threshold minus 10, whichever is lower.',
              'Set shot count block at 50 shots or model bypass threshold, whichever is lower.',
              'Re-evaluate after every major model upgrade (context limits and bypass thresholds change).',
          ],
      }


      if __name__ == '__main__':
          print('Context Length Limit Analysis -- Many-Shot Risk Profiles\n')

          analysis_cases = [4_096, 8_192, 32_768, 100_000, 200_000]
          for limit in analysis_cases:
              profile = analyse_context_length(limit)
              print_context_analysis(profile)

          print('Deployment Guidance:')
          print(f'  {DEPLOYMENT_GUIDANCE["principle"]}')
          print()
          for step in DEPLOYMENT_GUIDANCE['recommended_approach']:
              print(f'  - {step}')

