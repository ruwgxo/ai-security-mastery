code_examples:

  - id: "7.10.code.01"
    title: "Shot Count Detector"
    description: |
      Production-ready shot count detector for many-shot jailbreaking detection.
      Counts structured QA pairs across all common LLM formatting conventions.
      Returns typed result with shot count, context fraction, and alert status.
      This is the third of the five tracks in the Section 7.14 detection ensemble.
      Runs on the full assembled prompt (system + retrieved context + user query)
      to catch both the direct attack and the RAG variant.
    language: "python"
    filename: "code/ch07/shot_count_detector.py"
    code: |
      import re
      from dataclasses import dataclass, field
      from typing import Optional


      # QA pair markers across common LLM formatting conventions
      # Each tuple: (human_pattern, assistant_pattern, format_name)
      QA_FORMAT_PATTERNS = [
          # ChatML (GPT-4, many fine-tuned models)
          (r'<\|im_start\|>user', r'<\|im_start\|>assistant', 'chatml'),
          # Llama-chat / Llama-2 instruct
          (r'\[INST\]', r'\[/INST\]', 'llama_chat'),
          # Generic natural language markers
          (r'^Human:\s', r'^Assistant:\s', 'human_assistant'),
          (r'^User:\s', r'^AI:\s', 'user_ai'),
          (r'^Q:\s', r'^A:\s', 'q_a'),
          (r'^Person:\s', r'^Bot:\s', 'person_bot'),
          # Alpaca-style instruction format
          (r'### Instruction:', r'### Response:', 'alpaca'),
          # Vicuna-style
          (r'^USER:\s', r'^ASSISTANT:\s', 'vicuna'),
          # Markdown quote blocks used in some datasets
          (r'^\*\*User\*\*:', r'^\*\*Assistant\*\*:', 'markdown_bold'),
      ]

      # Approximate tokens per word for context fraction estimation
      TOKENS_PER_WORD = 1.35


      @dataclass
      class ShotCountResult:
          shot_count: int
          detected_format: Optional[str]
          context_word_count: int
          context_token_estimate: int
          qa_fraction_of_context: float          # fraction of context that is QA pairs
          alert_level: str                        # 'none', 'monitor', 'alert', 'block'
          confidence: float
          format_breakdown: dict = field(default_factory=dict)

          @property
          def any_signal(self) -> bool:
              return self.shot_count >= 5

          @property
          def is_alert(self) -> bool:
              return self.alert_level in ('alert', 'block')


      class ShotCountDetector:
          '''
          Shot count detector for many-shot jailbreaking.

          Counts structured QA pairs in the assembled prompt context.
          Run on the FULL assembled prompt (system + retrieved context + user query)
          to catch both direct many-shot attacks and RAG-mediated variants.

          Alert levels:
            none:    0-4 shots (normal few-shot usage)
            monitor: 5-19 shots (elevated, log but do not block)
            alert:   20-49 shots (significant many-shot risk)
            block:   50+ shots (high-confidence many-shot attack)

          Thresholds should be calibrated against your specific model and deployment.
          The defaults above are conservative starting points.
          '''

          def __init__(
              self,
              monitor_threshold: int = 5,
              alert_threshold: int = 20,
              block_threshold: int = 50,
              context_fraction_alert: float = 0.4,
          ):
              self.monitor_threshold = monitor_threshold
              self.alert_threshold = alert_threshold
              self.block_threshold = block_threshold
              self.context_fraction_alert = context_fraction_alert

          def _count_qa_pairs_for_format(
              self,
              text: str,
              human_pattern: str,
              assistant_pattern: str,
          ) -> int:
              '''
              Count complete QA pairs for a single format convention.
              A complete pair requires both a human turn and a following assistant turn.
              '''
              flags = re.MULTILINE | re.IGNORECASE
              human_positions = [
                  m.start() for m in re.finditer(human_pattern, text, flags)
              ]
              assistant_positions = [
                  m.start() for m in re.finditer(assistant_pattern, text, flags)
              ]

              if not human_positions or not assistant_positions:
                  return 0

              # Count pairs: each human marker must be followed by an assistant marker
              pair_count = 0
              assistant_idx = 0
              for h_pos in human_positions:
                  # Find the first assistant marker after this human marker
                  while (
                      assistant_idx < len(assistant_positions)
                      and assistant_positions[assistant_idx] <= h_pos
                  ):
                      assistant_idx += 1
                  if assistant_idx < len(assistant_positions):
                      pair_count += 1

              return pair_count

          def detect(
              self,
              assembled_prompt: str,
              context_token_limit: Optional[int] = None,
          ) -> ShotCountResult:
              '''
              Detect many-shot patterns in the assembled prompt.

              assembled_prompt: the full prompt sent to the model including system
                                prompt, retrieved context, and user query.
              context_token_limit: the model's context window limit. Used to compute
                                   qa_fraction_of_context. Optional but recommended.
              '''
              format_counts = {}
              max_count = 0
              dominant_format = None

              for human_pat, assistant_pat, fmt_name in QA_FORMAT_PATTERNS:
                  count = self._count_qa_pairs_for_format(
                      assembled_prompt, human_pat, assistant_pat
                  )
                  if count > 0:
                      format_counts[fmt_name] = count
                      if count > max_count:
                          max_count = count
                          dominant_format = fmt_name

              # Context size estimation
              word_count = len(assembled_prompt.split())
              token_estimate = int(word_count * TOKENS_PER_WORD)

              # QA fraction of context
              if context_token_limit and context_token_limit > 0:
                  qa_tokens_estimate = max_count * 150  # ~150 tokens per QA pair
                  qa_fraction = min(1.0, qa_tokens_estimate / context_token_limit)
              else:
                  qa_fraction = min(1.0, max_count * 150 / max(1, token_estimate))

              # Alert level
              if max_count >= self.block_threshold:
                  alert_level = 'block'
                  confidence = min(1.0, 0.9 + (max_count - self.block_threshold) / 100)
              elif (
                  max_count >= self.alert_threshold
                  or qa_fraction >= self.context_fraction_alert
              ):
                  alert_level = 'alert'
                  confidence = min(1.0, 0.6 + max_count / 100)
              elif max_count >= self.monitor_threshold:
                  alert_level = 'monitor'
                  confidence = min(0.5, max_count / 20)
              else:
                  alert_level = 'none'
                  confidence = 0.0

              return ShotCountResult(
                  shot_count=max_count,
                  detected_format=dominant_format,
                  context_word_count=word_count,
                  context_token_estimate=token_estimate,
                  qa_fraction_of_context=round(qa_fraction, 3),
                  alert_level=alert_level,
                  confidence=round(confidence, 3),
                  format_breakdown=format_counts,
              )


      def build_demo_many_shot_context(
          n_shots: int,
          format_style: str = 'human_assistant',
      ) -> str:
          '''
          Build a synthetic many-shot context for testing the detector.
          Uses placeholder content -- NOT adversarial prompts.
          Purpose: verify the shot count detector counts correctly.
          '''
          pairs = []
          formats = {
              'human_assistant': ('Human: {q}', 'Assistant: {a}'),
              'chatml': ('<|im_start|>user\n{q}\n<|im_end|>', '<|im_start|>assistant\n{a}\n<|im_end|>'),
              'llama_chat': ('[INST] {q} [/INST]', '{a}'),
              'alpaca': ('### Instruction:\n{q}', '### Response:\n{a}'),
          }
          human_tmpl, assistant_tmpl = formats.get(format_style, formats['human_assistant'])

          for i in range(n_shots):
              q = f'Example question number {i + 1} about topic area X.'
              a = f'Example answer number {i + 1} providing information about topic area X.'
              pair = human_tmpl.format(q=q) + '\n' + assistant_tmpl.format(a=a)
              pairs.append(pair)

          return '\n\n'.join(pairs) + '\n\nHuman: Final question here.\nAssistant:'


      SHOT_COUNT_THRESHOLDS_BY_CONTEXT_LENGTH = {
          4_096: {
              'max_shots_feasible': 25,
              'many_shot_risk': 'low -- insufficient shots for significant bypass',
              'recommended_alert_threshold': 15,
          },
          32_768: {
              'max_shots_feasible': 200,
              'many_shot_risk': 'medium -- sufficient for measurable bypass on some models',
              'recommended_alert_threshold': 20,
          },
          100_000: {
              'max_shots_feasible': 650,
              'many_shot_risk': 'high -- sufficient for significant bypass across model families',
              'recommended_alert_threshold': 20,
          },
          200_000: {
              'max_shots_feasible': 1300,
              'many_shot_risk': 'very_high -- well into high-bypass territory',
              'recommended_alert_threshold': 15,
          },
      }


      if __name__ == '__main__':
          detector = ShotCountDetector(
              monitor_threshold=5,
              alert_threshold=20,
              block_threshold=50,
          )

          print('Shot Count Detector -- Many-Shot Jailbreaking Detection\n')

          test_cases = [
              (2, 'human_assistant', 'legitimate_few_shot'),
              (8, 'human_assistant', 'elevated_monitor'),
              (25, 'human_assistant', 'alert_level'),
              (60, 'human_assistant', 'block_level'),
              (30, 'chatml', 'alert_chatml_format'),
              (30, 'alpaca', 'alert_alpaca_format'),
          ]

          print(f'{"Label":<30} {"Shots":<7} {"Format":<18} {"Fraction":<10} '
                f'{"Level":<9} {"Conf"}')
          print('-' * 82)

          for n_shots, fmt, label in test_cases:
              context = build_demo_many_shot_context(n_shots, fmt)
              result = detector.detect(context, context_token_limit=100_000)
              print(
                  f'{label:<30} {result.shot_count:<7} '
                  f'{str(result.detected_format):<18} '
                  f'{result.qa_fraction_of_context:<10.3f} '
                  f'{result.alert_level:<9} '
                  f'{result.confidence:.3f}'
              )

          print()
          print('Context length limit analysis:')
          print(f'{"Context Limit":<16} {"Max Shots":<12} {"Risk":<45} {"Alert Threshold"}')
          print('-' * 85)
          for limit, info in SHOT_COUNT_THRESHOLDS_BY_CONTEXT_LENGTH.items():
              print(
                  f'{limit:<16,} {info["max_shots_feasible"]:<12} '
                  f'{info["many_shot_risk"]:<45} '
                  f'{info["recommended_alert_threshold"]}'
              )

  - id: "7.10.code.02"
    title: "Many-Shot Dataset Structure Description"
    description: |
      Structural description of adversary-crafted many-shot datasets with
      annotated components. NOT actual adversarial examples -- structural
      templates showing what the detector must recognise. Used for detector
      calibration and for understanding the attack surface.
    language: "python"
    filename: "code/ch07/many_shot_dataset_structure.py"
    code: |
      '''
      Many-Shot Dataset: Structural Description for Detection Engineering

      This module describes the STRUCTURE of many-shot jailbreaking datasets,
      not the content. Understanding structure drives detector design.

      A many-shot dataset contains N fabricated QA pairs where an AI model
      persona answers harmful requests without refusal. The adversary delivers
      this as a context prefix before the actual harmful request.

      CONTENT IS NOT REPRODUCED HERE. The structural analysis below describes
      the format so the shot_count_detector can recognise it, not to enable
      construction of adversarial datasets.
      '''

      DATASET_STRUCTURAL_COMPONENTS = {
          'pair_structure': {
              'component_1_human_turn': {
                  'role': 'Human / User / [INST]',
                  'content_type': 'fabricated_harmful_request',
                  'detection_marker': 'human turn role marker',
                  'content_note': 'NOT REPRODUCED -- structural position only',
              },
              'component_2_assistant_turn': {
                  'role': 'Assistant / AI / model name',
                  'content_type': 'fabricated_compliant_response',
                  'detection_marker': 'assistant turn role marker',
                  'content_note': 'NOT REPRODUCED -- structural position only',
                  'effective_qualities': [
                      'confident tone -- no hedging or safety caveats',
                      'detailed response -- not a brief acknowledgement',
                      'same register as authentic model responses',
                      'specific formatting conventions matching target model',
                  ],
              },
              'separator': 'newline(s) between pairs',
          },
          'dataset_assembly': {
              'ordering': 'repeated pair_structure × N shots',
              'diversity_design': (
                  'Effective datasets use diverse request topics across pairs, '
                  'not repetitions of the same request. Diversity increases '
                  'in-context learning generalisation.'
              ),
              'length_consideration': (
                  'Dataset length in tokens ≈ N_shots × avg_tokens_per_pair. '
