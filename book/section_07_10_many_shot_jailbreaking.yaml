# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Many-shot jailbreaking exploits in-context learning -- the same inference-time\
    \ adaptation mechanism that makes long-context models useful. There is no\
    \ architectural fix that preserves the capability while eliminating the\
    \ vulnerability. The tradeoff is inherent."
  - "The attack scales with context length. Short-context models (under 8K tokens)\
    \ are largely immune. Long-context models (32K+) are the primary attack\
    \ surface. Set context limits to the minimum required for legitimate use cases."
  - "Shot count detection is the simplest and cheapest control in the Chapter 7\
    \ ensemble: count structured QA pairs, no semantic understanding required,\
    \ very low FPR, sub-millisecond latency. Deploy it on the FULL assembled\
    \ context (not user query alone) to catch the RAG variant."
  - "Many-shot via RAG is the high-sophistication variant: adversary pre-plants\
    \ QA pairs in the knowledge base, which are retrieved and injected into context\
    \ by the pipeline. Detection placement on the assembled context catches both\
    \ the direct and RAG variants with a single detector instance."
  - "The shot count detector is the third of five ensemble tracks in Section 7.14.\
    \ It covers a detection gap that the semantic classifier and perplexity\
    \ detector cannot fill: many-shot datasets in natural language format have\
    \ normal perplexity and no semantic jailbreak signals -- only structural ones."
  - "Legitimate few-shot prompting uses 2-5 shots. Set the monitor threshold\
    \ at 5 shots, alert at 20 shots, block at 50 shots as conservative starting\
    \ points. Calibrate downward once model-specific bypass thresholds are known."

