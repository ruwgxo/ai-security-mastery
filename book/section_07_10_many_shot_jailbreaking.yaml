# ===========================================================================
# SECTION CONTENT
# ===========================================================================

content:

  opening: |
    Section 7.9 established that GCG attacks the alignment layer through gradient
    optimisation -- a computational process operating in the token space outside
    the natural language distribution. Many-shot jailbreaking is the second
    statistical attack family, but the mechanism could not be more different:
    rather than attacking the weights through gradient search, it attacks the
    inference mechanism through in-context learning.

    The research finding from Anthropic (2024) is precise and uncomfortable: as
    context window length increases, the attack surface for many-shot jailbreaking
    grows proportionally. The capability that makes long-context models more useful
    -- the ability to learn from hundreds of in-context examples and adapt behaviour
    accordingly -- is exactly the capability that many-shot jailbreaking weaponises.
    There is no architectural fix that preserves the capability while removing the
    vulnerability. The tradeoff is inherent.

    The detection response is simpler than for most attack families in this chapter:
    count structured question-answer pairs in the context. Shot count is a low-FPR
    signal that requires no semantic understanding, no embedding model, and no
    stateful session tracking. It is the third ensemble track in Section 7.14 and
    one of the cheapest controls in the chapter to deploy.

  subsections:

    - number: "7.10.1"
      title: "In-Context Learning: The Capability Being Weaponised"
      body: |
        Large language models exhibit in-context learning (ICL): the ability to
        adapt their behaviour based on examples provided in the context window at
        inference time, without any weight updates. This is not a trained behaviour
        in the conventional sense -- it is an emergent property of the transformer
        architecture and the next-token prediction training objective.

        ICL enables few-shot prompting: provide three examples of input-output pairs
        demonstrating a task, and the model generalises the pattern to new inputs.
        This is why LLMs can be adapted to new tasks without fine-tuning -- the
        context window is a temporary, inference-time learning signal that shapes
        output distribution without touching the weights.

        The security implication was identified and documented by Anthropic in 2024:
        ICL does not distinguish between learning from benign examples and learning
        from adversarially constructed examples. If the demonstrated examples show
        the model answering harmful requests without refusal, the model's in-context
        learning adapts its output distribution toward that demonstrated pattern.
        A sufficient number of such examples -- many shots -- shifts the output
        distribution enough that the RLHF-trained refusal behaviour is overridden.

        This is categorically different from the attack families in Sections 7.3-7.9.
        Those attacks engineer clever prompts that exploit the model's trained
        dispositions. Many-shot jailbreaking bypasses the trained dispositions
        by demonstrating new dispositions through examples, exploiting the same
        mechanism that makes the model adaptable and useful.

    - number: "7.10.2"
      title: "The Anthropic Research Findings: What the 2024 Paper Established"
      body: |
        Anthropic's 2024 many-shot jailbreaking paper established several findings
        that directly inform the threat model and detection design.

        Shot count threshold. The bypass probability is not a step function -- it
        increases monotonically with the number of shots. At low shot counts (fewer
        than ten), the effect is negligible: the model's RLHF training easily
        overrides a small number of in-context demonstrations. At intermediate shot
        counts (tens of examples), the bypass probability increases measurably. At
        high shot counts (hundreds of examples), the bypass probability approaches
        levels comparable to unaligned base models for some request types. The exact
        thresholds vary by model family and request category. The pattern -- monotonic
        increase with shot count -- is consistent across models.

        Context length dependency. The attack is specifically enabled by long-context
        models. Models with short context windows (under 4K tokens) cannot accept
        enough shots to reach significant bypass probability. Models with context
        windows of 32K, 100K, or 200K tokens can accept hundreds to thousands of
        example pairs, which is the operating range where many-shot becomes effective.
        The attack surface grows with context length.

        Cross-model consistency. The attack works across model families with different
        architectures and training procedures. The shared mechanism is in-context
        learning itself, which is a fundamental property of transformer-based language
        models regardless of the specific RLHF procedure applied.

        Alignment training resistance. The paper found that standard RLHF alignment
        training does not robustly prevent many-shot jailbreaking. The in-context
        learning mechanism operates at inference time and is not addressed by the
        pre-training or fine-tuning procedures that constitute alignment. This is
        the same fundamental insight as Section 7.2.5 -- Constitutional AI and
        RLAIF improve alignment training coverage but do not address mechanisms
        that operate outside the training distribution at inference time.

    - number: "7.10.3"
      title: "Dataset Construction: What Adversary-Crafted Example Sets Look Like"
      body: |
        A many-shot jailbreaking dataset is a sequence of fabricated question-answer
        pairs in which a model persona answers harmful requests without refusal.
        The adversary constructs this dataset and delivers it as the context preceding
        the actual harmful request.

        The structural pattern of the dataset is consistent across implementations.
        Each example pair has three components: a human turn containing a harmful
        request, a separator indicating the speaker transition, and an assistant turn
        containing a compliant response to that request. The human turn is formatted
        to look like a real user message. The assistant turn is formatted to look
        like a real model response -- using the same conversational register, tone,
        and formatting conventions the real model uses. The fabrication is designed
        to be indistinguishable from an authentic conversation transcript.

        The dataset is assembled by repeating this pattern across many examples, each
        covering a different harmful request or a different formulation of the same
        request. The length of the dataset in tokens determines the shot count.
        A 100K token context window can accommodate hundreds of such pairs before
        the actual harmful request is appended at the end.

        Two design choices in the dataset affect its effectiveness. First, topic
        diversity: a dataset covering many different harmful request types at low
        shot count per type is more transferable than a dataset covering one type
        at high shot count. The model's in-context learning generalises more broadly
        from diverse examples. Second, response quality: assistant turns that are
        detailed, confident, and well-formatted are more effective than brief or
        hedging responses. The model learns to match the demonstrated response style.

        Detection implication: the structural pattern of many-shot datasets is
        highly distinctive. A long sequence of formatted QA pairs, each following
        the same structural template, is not a pattern that appears in legitimate
        use cases at high shot counts. The shot count detector does not need to
        evaluate the content of the pairs -- it counts the structural pattern.

    - number: "7.10.4"
      title: "Context Length as Attack Surface: The Capability-Security Tradeoff"
      body: |
        The many-shot attack surface is directly proportional to the context window
        size. This creates a precise and unavoidable capability-security tradeoff.

        Short-context models (under 8K tokens) are largely immune to many-shot
        attacks. A 4K context window holds approximately 30-50 QA pairs in the
        many-shot format, which is below the threshold where bypass probability
        becomes significant for most model families. The model's alignment training
        dominates the in-context signal at this shot count.

        Long-context models (32K-200K+ tokens) are substantially more vulnerable.
        A 100K token context window holds several hundred to over a thousand QA
        pairs. At this shot count, the in-context learning signal competes with
        and can override alignment training for many request categories. The
        long-context capability that enables analysis of full documents, long
        codebases, and extended conversations is the same capability that enables
        many-shot bypass.

        The tradeoff cannot be resolved architecturally within the current generation
        of models. Limiting context length protects against many-shot but restricts
        legitimate use cases. The practical response is: use context length limits
        appropriate to the deployment's legitimate use cases, not the maximum
        available, and deploy shot count detection to catch attempts that approach
        the threshold within whatever context limit is set.

        This is the design decision that the context length limit analysis in the
        code section addresses: given your deployment's legitimate use cases, what
        is the maximum context length required, and at what shot count does many-shot
        bypass become significant for your model? The answer defines the deployment's
        operating parameters for shot count detection.

    - number: "7.10.5"
      title: "Why Per-Turn Detection Fails: Structural Invisibility"
      body: |
        Many-shot attacks are structurally invisible to per-turn classifiers in
        the same way that payload splitting (Section 7.8) and gradual erosion
        (Section 7.7) are invisible to them -- but through a different mechanism.

        For gradual erosion and context manipulation, the attack unfolds across
        turns in a session, and each individual turn is below detection threshold.
        The signal is in the trajectory.

        For many-shot, the entire attack is delivered in a single turn or as a
        single prepended context block. There is no trajectory to analyse. The
        problem is not that individual turns are benign -- it is that a single
        turn containing hundreds of QA pairs looks, to a per-turn semantic
        classifier, like a large volume of text about various topics. The semantic
        classifier evaluates content. The many-shot attack is not in the content
        of any individual pair -- it is in the accumulated structural pattern of
        having many pairs of a specific format.

        A semantic classifier trained on single-turn jailbreaks will evaluate the
        final request (the actual harmful question appended after the many-shot
        dataset) and will score it based on the semantic content of that one request.
        The many-shot dataset that precedes it is evaluated as context -- and the
        final request, taken in isolation, may be semantically indistinguishable
        from a legitimate question. The harmful framing is in the demonstrated
        pattern of responses, not in the final question itself.

        The detection primitive that works is structural, not semantic: count
        the number of formatted QA pairs in the input. This is a pattern-level
        analysis that operates independently of the semantic content of any pair.
        It is fast, requires no embedding model, and produces very low FPR because
        no legitimate use case involves sending hundreds of formatted dialogue
        examples as a context prefix.

    - number: "7.10.6"
      title: "Many-Shot via RAG: The High-Sophistication Variant"
      body: |
        The direct many-shot attack is detectable: a single turn containing
        hundreds of QA pairs produces a distinctive token count and structural
        pattern. The RAG variant is harder to detect because the adversary does
        not send the many-shot dataset directly -- they cause it to be retrieved.

        The attack: the adversary pre-plants adversarially constructed QA pairs
        in documents that are ingested into a RAG knowledge base. The documents
        are designed so that their embeddings produce high cosine similarity to
        target queries -- when a user submits a relevant query, the retrieval
        system returns the adversarial documents, which contain many-shot examples
        in their text. These retrieved examples are assembled into the context
        window by the RAG pipeline, and the many-shot jailbreaking effect occurs
        through the retrieved content rather than through the user's direct input.

        This variant connects many-shot jailbreaking to the indirect injection
        attacks in Chapter 6 (Section 6.6). The adversary controls the knowledge
        base content rather than the user turn, and the attack is delivered through
        the retrieval mechanism. The detection at the user-input layer sees only
        a normal query -- the adversarial content arrives through retrieved documents.

        Detection for the RAG variant requires: (1) the injection classifier from
        Chapter 6 scanning retrieved content for structured QA pair patterns, or
        (2) the shot count detector running on the assembled context (after retrieval,
        before inference) rather than on the user input alone. The second approach
        is more reliable -- the shot count detector catches the many-shot pattern
        regardless of whether it arrived through the user turn or through retrieval.

        Infrastructure placement: the shot count detector should run on the full
        assembled prompt (system prompt + retrieved context + user query) rather
        than on the user query alone. This catches both the direct attack and the
        RAG variant with a single detector placement.

    - number: "7.10.7"
      title: "Detection: Shot Count Detector Design and Calibration"
      body: |
        The shot count detector is the simplest detector in the Chapter 7 ensemble.
        It counts the number of structured question-answer pairs in the input context
        and fires an alert when that count exceeds a calibrated threshold.

        The structural pattern that defines a QA pair in the many-shot context:
        a human turn marker followed by text, followed by an assistant turn marker
        followed by text, repeated. The specific formatting conventions vary by
        model family -- ChatML uses `<|im_start|>user`, `<|im_start|>assistant`;
        Llama-chat uses `[INST]`, `[/INST]`; generic formats use `Human:`,
        `Assistant:` or `User:`, `AI:`. The detector must recognise all common
        formatting conventions.

        Threshold calibration has two parameters. First, the minimum shot count
        to trigger: below ten shots, the many-shot effect is negligible across
        model families. The alert threshold should be set to the shot count at
        which bypass probability becomes measurable for your deployed model -- this
        requires testing against your specific model, as the threshold varies by
        architecture and alignment procedure. In absence of model-specific testing,
        a conservative threshold of twenty shots is appropriate. Second, the context
        window fraction: a ten-shot context in a four thousand token window is very
        different from a ten-shot context in a one hundred thousand token window.
        The fraction of the context window occupied by QA pairs is a more robust
        signal than the absolute shot count.

        FPR analysis: structured QA pairs in the many-shot format appear in
        legitimate use cases in small numbers (two to five shots for few-shot
        prompting). A threshold of twenty or more shots has very low FPR against
        legitimate few-shot use. The detector should log rather than block at the
        ten to twenty shot range, and block or alert at the twenty-plus shot range,
        with deployment-specific calibration.

        Combination with the ensemble: the shot count detector operates in parallel
        with the semantic classifier and perplexity detector. A session showing
        high shot count AND semantic jailbreak signals (persona establishment plus
        many examples) is a composed attack -- the adversary has combined persona
        jailbreaking with many-shot reinforcement. The combined signal is the
        highest-confidence alert condition for this composed variant.

