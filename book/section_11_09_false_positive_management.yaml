prose_content:

  part_1_fp_sources:
    heading: 'Sources of False Positives in AI Gateway Detection'
    body: |
      Every detection rule in the seven-track gateway has a characteristic false positive
      source. Understanding the source is the prerequisite to suppressing the false
      positive without reducing true positive coverage. The three primary sources for
      AI gateway detection rules:

      Source 1 — Near-boundary legitimate inputs. The most common source. Track 3
      (semantic similarity, threshold 0.85) fires on legitimate prompts that happen to
      be semantically close to the known-bad embedding centroid — not because they are
      adversarial, but because the user''s legitimate vocabulary overlaps with injection
      terminology. A technical writer asking about system prompt design for their own
      application uses language that scores 0.82–0.88 on the similarity gate. Track 7
      (squeezer disagreement, threshold 0.70) fires on unusual-but-legitimate inputs
      with high feature entropy: mathematical proofs, mixed-language prompts, and
      specialised domain notation all produce squeezer scores in the 0.65–0.75 range
      without being adversarial. These are near-boundary inputs: genuinely unusual,
      genuinely close to the detection threshold, but not adversarial.

      Source 2 — Legitimate automation. Track 5 (model extraction signals, query rate
      threshold 100 requests per session) fires on production batch inference jobs,
      automated regression testing pipelines, and integration test suites that use
      templated low-variance queries at high volume. The query pattern of a legitimate
      batch job and the query pattern of a model extraction attack are structurally
      similar: both involve many queries with low diversity. The difference is intent
      and source — but intent is not directly observable at the gateway.

      Source 3 — Benign obfuscated prompts. Track 1 (keyword injection detection) fires
      on legitimate prompts that contain injection-adjacent vocabulary in a non-adversarial
      context. A security instructor demonstrating injection attacks uses the exact keywords
      that Track 1 fires on. A prompt engineering guide that discusses system prompt
      override patterns for legitimate customisation purposes contains language that Track
      1 flags. A code generation prompt that asks the model to write a parser for injection
      detection rules contains injection keywords. These are benign obfuscated prompts only
      in the sense that they look adversarial to the rule without being adversarial.

      Each source requires a different mitigation: near-boundary inputs require threshold
      calibration; legitimate automation requires exception management; benign obfuscated
      prompts require contextual refinement (adding context field conditions to the rule)
      or user-specific exceptions. Applying the wrong mitigation produces either residual
      false positives or unintentional coverage reduction.

  part_2_death_spiral:
    heading: 'The Alert Fatigue Death Spiral'
    body: |
      Alert fatigue is not a psychological phenomenon. It is a system failure with a
      predictable sequence. Understanding the sequence identifies the two intervention
      points where the spiral can be broken.

      Step 1: High FPR rules produce alert volume that exceeds analyst capacity. A rule
      with a 15% false positive rate on production traffic generating 10,000 requests
      per day produces 1,500 false positive alerts per day. If the analyst team has
      capacity for 200 alert investigations per day, the queue fills in eight hours and
      the backlog grows permanently.

      Step 2: Analysts adopt triage heuristics to cope with the backlog. They learn
      which rules produce mostly noise and stop investigating those alerts carefully.
      The triage heuristic is not documented; it lives in analyst memory. New analysts
      do not know the heuristic.

      Step 3: True positives from high-FPR rules are missed. An actual injection attack
      fires the same rule that produces 1,500 false positives per day. The alert enters
      the queue. The analyst reviews the rule ID, recognises it as noisy, and downgrades
      the investigation priority. The attack proceeds.

      Step 4: The missed true positive produces a security incident. Post-incident review
      finds that an alert fired and was not investigated. The conclusion is typically that
      the rule was too sensitive, producing noise that masked the real signal. The
      remediation action is to raise the threshold — reducing sensitivity.

      Step 5: The raised threshold reduces both false positives and true positives. The
      FPR improves, but coverage also degrades. The technique the rule detects now has a
      lower score on the coverage heat map — an unrecognised consequence of the
      post-incident remediation.

      Step 6: The detection programme has fewer false positives but less coverage. Analysts
      are less fatigued but the attack surface is larger. The net security outcome is
      negative.

      The two intervention points: (1) before Step 1 — calibrate thresholds before
      production deployment so FPR is within analyst capacity from day one; (2) before
      Step 2 — track FPR per rule with automated alerting so the detection engineering
      team knows about high-FPR rules before analysts develop suppression heuristics.
      Both interventions are built in this section.

  part_3_roc_calibration:
    heading: 'Threshold Calibration: ROC Curve Analysis and Operating Point Selection'
    body: |
      A detection threshold is not a security decision. It is an engineering decision
      about where on the precision-recall tradeoff curve the deployment operates. Lower
      threshold means more alerts, higher recall, lower precision. Higher threshold
      means fewer alerts, lower recall, higher precision. The correct operating point
      depends on the deployment context: what is the analyst capacity, what is the
      acceptable false positive rate, and what is the cost of a missed true positive?

      The ROC (Receiver Operating Characteristic) curve plots True Positive Rate
      (TPR = TP / (TP + FN)) against False Positive Rate (FPR = FP / (FP + TN)) for
      all possible threshold values. A perfect detector hugs the top-left corner: TPR
      of 1.0, FPR of 0.0 at some threshold. A random classifier produces a diagonal
      line from (0,0) to (1,1). The area under the ROC curve (AUC) is a threshold-
      independent measure of detector quality: AUC of 1.0 is perfect; 0.5 is random.

      For the seven-track gateway, the ROC calibration procedure uses the test corpus
      from Section 11.02 (known-bad and known-good fixtures) augmented with a sample
      of recent production traffic (anonymised, with analyst-confirmed disposition
      labels). The threshold_calibration_harness.py deliverable runs this procedure
      for Track 3, Track 6, and Track 7 — the three heuristic-layer tracks whose
      thresholds were set empirically in Part 2.

      Operating point selection criteria per track:

      Track 1 (injection keyword matching): Not threshold-based; keyword lists have
      binary match semantics. FPR is controlled by keyword precision, not threshold.
      Target FPR: 1%. If the current keyword list produces >1% FPR on the known-good
      corpus, the list needs narrowing or the rule needs context conditions added.

      Track 3 (semantic similarity, cosine threshold): Continuous threshold. Target
      FPR: 5%. The similarity gate is a heuristic that will produce near-boundary FPs
      on technical users. A 5% FPR produces approximately one false alert per 20 flagged
      requests — acceptable as a flag (analyst review) but not as a block (immediate
      rejection). Track 3 fires as a flag; Track 1 is required to block.

      Track 6 (adversarial entropy heuristic): Continuous threshold. Target FPR: 0.5%.
      Track 6 flags inputs for adversarial review. A 0.5% FPR means the analyst sees
      five false positives per 1,000 flagged requests. The low target reflects that
      Track 6 flags high-priority suspicious inputs; a higher FPR would dilute the
      signal at the adversarial review queue.

      Track 7 (squeezer disagreement + adversarial classifier): Compound threshold.
      Target FPR: 5% for squeezer alone (L2 component); 2% for the compound condition
      (squeezer AND classifier). The compound condition''s FPR is substantially lower
      than the squeezer alone because the classifier filters the near-boundary squeezer
      FPs — exactly the design intent of the compound rule in Section 11.06.

      The harness generates the ROC curve, marks the current threshold on the curve,
      and proposes the threshold value at the target FPR operating point. If the current
      threshold is already at or better than the target FPR, no change is recommended.
      If the current threshold produces higher FPR than the target, the harness returns
      the calibrated threshold with a warning that TPR will decrease and the coverage
      heat map should be re-run after the calibration is applied.

  part_4_exception_management:
    heading: 'Exception Management: Suppressing Without Disabling'
    body: |
      An exception is a structured exclusion of a known-good traffic source from a
      detection rule. Exceptions are not defeats — a properly managed exception list
      reduces FPR without reducing coverage because the excluded traffic source is not
      the adversary. An automation account that runs 50,000 templated queries per day
      is not a model extraction attacker; excluding it from Track 5 rate detection
      does not reduce coverage against the actual extraction threat.

      Exceptions become defeats when they are unmanaged. Three failure modes:

      Failure mode 1 — Exception list scope creep. An exception is added for a specific
      automation account. Six months later, the same exception is applied to the entire
      IP range of the data centre hosting the automation, because the account IP changed.
      Another six months later, a threat actor who has compromised a server in that data
      centre uses that IP range to conduct extraction attacks that the now-over-broad
      exception suppresses. Unmanaged scope creep turns a precise exception into a blind
      spot.

      Failure mode 2 — Exception without review cadence. Exceptions are added but never
      reviewed. The automation account that required the exception is decommissioned.
      The exception remains, now covering traffic from whatever process has inherited
      that account identifier. The exception is no longer protecting a known-good source;
      it is suppressing an unknown source.

      Failure mode 3 — Exception as a substitute for calibration. A rule produces many
      false positives. Instead of calibrating the threshold, the team adds exceptions for
      every known false positive source. The exception list grows to hundreds of entries.
      The rule''s effective coverage is now unknown — it detects whatever the exceptions
      have not suppressed, which is a subset of the original detection surface that no
      one has mapped.

      The structured exception management system in false_positive_manager.py enforces
      three controls: (1) every exception has an owner, an expiry date, and a business
      justification; (2) exceptions are reviewed quarterly and expired exceptions are
      automatically removed; (3) the exception list is version-controlled in the rule
      repository alongside the rule it modifies — an exception change requires a PR
      with the same review process as a rule change.

  part_5_baselining:
    heading: 'Baselining: Flagging Deviation Rather Than Absolute Value'
    body: |
      Absolute thresholds produce false positives against high-volume legitimate users.
      A researcher who legitimately queries the model API 500 times per day for their
      academic work triggers Track 5''s session rate threshold (100 requests) many times
      per session. The absolute threshold does not distinguish the researcher''s legitimate
      high-volume usage from an attacker''s extraction campaign with similar volume.

      Baselining shifts the detection question from "is this value above the absolute
      threshold?" to "is this value anomalous relative to this entity''s established
      normal behaviour?" For the researcher who typically makes 500 requests per session,
      a session with 600 requests is not anomalous. A session with 5,000 requests — ten
      times their established baseline — is anomalous and warrants investigation. For a
      user whose baseline is 10 requests per session, a session with 150 requests is
      fifteen times their baseline and is anomalous.

      The baseline model operates on three entity types:

      Per-user baseline: the rolling 30-day mean and standard deviation of each metric
      (session request count, query entropy, query variance) for each user_id. A metric
      value more than three standard deviations above the user''s 30-day mean triggers a
      baseline anomaly flag. The anomaly flag is not a block — it is input to the Track 5
      ensemble that combines absolute threshold, baseline anomaly, and session accumulator
      signals with confidence weighting.

      Per-endpoint baseline: the rolling 7-day mean and standard deviation of aggregate
      metrics (total request volume, unique user count, flagged request fraction) for
      each API endpoint. Anomalies at the endpoint level indicate coordinated multi-user
      activity that per-user baselining cannot detect.

      Per-hour baseline: the rolling 4-week mean for each metric by hour of day. A
      request volume at 3am that is three standard deviations above the normal 3am
      volume is flagged regardless of whether it exceeds the absolute threshold, because
      3am is not normal business hours for the user population.

      Baselining requires at least 14 days of production traffic before it produces
      reliable baseline models. During the first 14 days of deployment, the system
      operates on absolute thresholds only, with a warning flag in the alert metadata
      indicating that baseline models are not yet established. After 14 days, the
      baseline anomaly score is computed and the detection ensemble weights it alongside
      the absolute threshold score.

  part_6_fpr_dashboard:
    heading: 'FPR Dashboard and the False Positive Review Queue'
    body: |
      Per-rule FPR tracking requires two components: the collection mechanism (tagging
      each alert with rule_id and analyst disposition) and the monitoring mechanism
      (computing per-rule FPR from the collection and alerting when it breaches target).
      The false_positive_manager.py deliverable implements both.

      The FPR computation: FPR = confirmed_false_positives / (confirmed_false_positives
      + confirmed_true_positives) for each rule, computed over a rolling 7-day window.
      Alerts that have not yet received analyst disposition are excluded from the FPR
      computation — they are pending, not positive or negative. The 7-day rolling window
      ensures that a calibration change takes effect in the FPR metric within one week.

      FPR target breach: when a rule''s 7-day rolling FPR exceeds its documented target
      by more than 20% relative (e.g. a rule with a 5% FPR target breaches at 6%), the
      false_positive_manager.py opens a ticket in the detection engineering queue. The
      ticket includes: rule ID, rule title, current FPR, FPR target, the most recent
      10 false positive inputs (anonymised), and the recommended first action from the
      FPR management playbook (check exception list, re-run threshold calibration, or
      add context conditions).

      The false positive review queue operates on an SLA: every confirmed false positive
      receives analyst disposition within 48 hours of alert generation. The 48-hour SLA
      ensures that the rolling FPR computation reflects recent production behaviour, not
      stale alert data. Alerts that exceed 72 hours without disposition generate an
      automated escalation to the detection engineering lead.

      Feedback loop: every confirmed false positive is added to the known-good test
      fixture corpus (Section 11.02) as a regression test case. The rule ID is tagged
      on the fixture. If a future rule change causes the regression test to fail — meaning
      the rule would have flagged this previously-confirmed false positive again — the CI
      pipeline blocks the PR with an explicit regression error. This closes the loop from
      analyst disposition to rule improvement.

      The FPR dashboard view (for leadership) shows three metrics per rule: current FPR,
      FPR target, and 30-day FPR trend (improving, stable, or degrading). Rules with a
      degrading trend that have not yet breached the target are flagged amber — an early
      warning signal that allows calibration before the target is breached and before
      the detection engineering queue is triggered.

