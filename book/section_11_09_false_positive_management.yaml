deliverables:

  deliverable_1:
    id: 'D11.09.1'
    filename: 'false_positive_manager.py'
    description: >
      Per-rule FPR tracker with rolling 7-day computation, target enforcement, DaC queue
      integration, and structured exception list management with quarterly expiry.
      Tracks analyst dispositions (TP/FP) per rule and opens a detection engineering
      ticket when any rule breaches its FPR target by more than 20% relative.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'pyyaml>=6.0'
      - 'dataclasses (stdlib)'
      - 'statistics (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''false_positive_manager.py
      Per-rule FPR tracker: rolling 7-day FPR per rule, target enforcement,
      DaC queue integration, and exception list management.
      Chapter 11, Section 11.09 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 false_positive_manager.py --report
        python3 false_positive_manager.py --add-disposition <rule_id> <alert_id> tp|fp
        python3 false_positive_manager.py --add-exception <rule_id> <source_type> <value>
        python3 false_positive_manager.py --review-exceptions
      '''

      from __future__ import annotations
      import argparse
      import json
      import pathlib
      import sys
      import uuid
      from dataclasses import dataclass, field
      from datetime import date, datetime, timedelta, timezone
      from typing import Literal

      # ---------------------------------------------------------------------------
      # Configuration
      # ---------------------------------------------------------------------------

      DATA_DIR = pathlib.Path('fpm_data')
      DISPOSITIONS_FILE = DATA_DIR / 'dispositions.json'
      EXCEPTIONS_FILE = DATA_DIR / 'exceptions.json'
      FPR_BREACH_RELATIVE_MARGIN = 0.20   # 20% relative above target triggers DaC queue

      # Per-rule FPR targets (track → target)
      FPR_TARGETS: dict[str, float] = {
          'track_1_injection_keyword':       0.01,
          'track_2_jailbreak_sigma':         0.01,
          'track_2_jailbreak_classifier':    0.05,
          'track_3_semantic_gating':         0.05,
          'track_4_poisoning_monitor':       0.005,
          'track_5_extraction_rate':         0.02,
          'track_6_adversarial_entropy':     0.005,
          'track_7_squeezer_only':           0.05,
          'track_7_compound':                0.02,
      }

      Disposition = Literal['tp', 'fp', 'pending']

      # ---------------------------------------------------------------------------
      # Data models
      # ---------------------------------------------------------------------------

      @dataclass
      class AlertDisposition:
          alert_id: str
          rule_id: str
          disposition: Disposition
          analyst: str
          timestamp: str
          input_snippet: str = ''     # anonymised first 80 chars of the triggering input

      @dataclass
      class ExceptionEntry:
          exception_id: str
          rule_id: str
          source_type: str            # user_id | ip_range | account_pattern | session_tag
          source_value: str
          owner: str
          justification: str
          created_date: str
          expiry_date: str
          reviewed_date: str = ''

      @dataclass
      class FPRReport:
          rule_id: str
          window_days: int
          tp_count: int
          fp_count: int
          pending_count: int
          fpr: float
          fpr_target: float
          breach: bool
          trend: str                  # 'improving' | 'stable' | 'degrading' | 'insufficient_data'

      # ---------------------------------------------------------------------------
      # Storage helpers
      # ---------------------------------------------------------------------------

      def _load_json(path: pathlib.Path) -> list:
          if not path.exists():
              return []
          with open(path) as f:
              return json.load(f)

      def _save_json(path: pathlib.Path, data: list) -> None:
          DATA_DIR.mkdir(parents=True, exist_ok=True)
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)

      # ---------------------------------------------------------------------------
      # Disposition management
      # ---------------------------------------------------------------------------

      def add_disposition(
          rule_id: str,
          alert_id: str,
          disposition: Disposition,
          analyst: str = 'analyst',
          input_snippet: str = '',
      ) -> AlertDisposition:
          dispositions: list[dict] = _load_json(DISPOSITIONS_FILE)
          entry = AlertDisposition(
              alert_id=alert_id,
              rule_id=rule_id,
              disposition=disposition,
              analyst=analyst,
              timestamp=datetime.now(timezone.utc).isoformat(),
              input_snippet=input_snippet[:80],
          )
          dispositions.append(entry.__dict__)
          _save_json(DISPOSITIONS_FILE, dispositions)
          print(f'Disposition recorded: {rule_id} / {alert_id} → {disposition}')
          if disposition == 'fp':
              print(f'  → Add input snippet to tests/fixtures/known_good/ as regression case.')
          return entry

      # ---------------------------------------------------------------------------
      # FPR computation
      # ---------------------------------------------------------------------------

      def compute_fpr(rule_id: str, window_days: int = 7) -> FPRReport:
          all_dispositions: list[dict] = _load_json(DISPOSITIONS_FILE)
          cutoff = datetime.now(timezone.utc) - timedelta(days=window_days)

          window = [
              d for d in all_dispositions
              if d['rule_id'] == rule_id
              and datetime.fromisoformat(d['timestamp']) >= cutoff
          ]
          tp = sum(1 for d in window if d['disposition'] == 'tp')
          fp = sum(1 for d in window if d['disposition'] == 'fp')
          pending = sum(1 for d in window if d['disposition'] == 'pending')
          total_decided = tp + fp

          fpr = fp / total_decided if total_decided > 0 else 0.0
          target = FPR_TARGETS.get(rule_id, 0.05)
          breach_threshold = target * (1 + FPR_BREACH_RELATIVE_MARGIN)
          breach = fpr > breach_threshold and total_decided >= 10  # min 10 decisions

          # Trend: compare first half vs second half of window
          mid = datetime.now(timezone.utc) - timedelta(days=window_days // 2)
          first_half = [d for d in window if datetime.fromisoformat(d['timestamp']) < mid]
          second_half = [d for d in window if datetime.fromisoformat(d['timestamp']) >= mid]
          def half_fpr(half: list[dict]) -> float:
              tp_h = sum(1 for d in half if d['disposition'] == 'tp')
              fp_h = sum(1 for d in half if d['disposition'] == 'fp')
              return fp_h / (tp_h + fp_h) if (tp_h + fp_h) > 0 else 0.0
          if total_decided < 10:
              trend = 'insufficient_data'
          elif half_fpr(second_half) < half_fpr(first_half) - 0.01:
              trend = 'improving'
          elif half_fpr(second_half) > half_fpr(first_half) + 0.01:
              trend = 'degrading'
          else:
              trend = 'stable'

          return FPRReport(
              rule_id=rule_id,
              window_days=window_days,
              tp_count=tp,
              fp_count=fp,
              pending_count=pending,
              fpr=fpr,
              fpr_target=target,
              breach=breach,
              trend=trend,
          )

      # ---------------------------------------------------------------------------
      # DaC queue integration
      # ---------------------------------------------------------------------------

      def open_dac_queue_ticket(report: FPRReport) -> None:
          '''
          Opens a detection engineering queue ticket for an FPR breach.
          In production: calls the ticketing system API (Jira, Linear, GitHub Issues).
          Here: prints the ticket draft and writes to a local breach log.
          '''
          ticket_id = str(uuid.uuid4())[:8].upper()
          ticket = {
              'ticket_id': f'DET-{ticket_id}',
              'type': 'fpr_breach',
              'rule_id': report.rule_id,
              'current_fpr': round(report.fpr, 4),
              'fpr_target': report.fpr_target,
              'breach_pct': round((report.fpr / report.fpr_target - 1) * 100, 1),
              'trend': report.trend,
              'window_days': report.window_days,
              'recommended_action': _fpr_recommendation(report),
              'opened_at': datetime.now(timezone.utc).isoformat(),
          }
          breach_log = DATA_DIR / 'breach_log.json'
          existing: list = _load_json(breach_log)
          existing.append(ticket)
          _save_json(breach_log, existing)
          print(f'\n[DAC QUEUE] Ticket {ticket["ticket_id"]} opened:')
          print(f'  Rule:         {report.rule_id}')
          print(f'  FPR:          {report.fpr:.1%} (target: {report.fpr_target:.1%}; breach: +{ticket["breach_pct"]}%)')
          print(f'  Trend:        {report.trend}')
          print(f'  Recommended:  {ticket["recommended_action"]}')

      def _fpr_recommendation(report: FPRReport) -> str:
          if report.fpr_target <= 0.01:
              return 'Check keyword list precision; add context NOT conditions; review top-10 FP inputs.'
          elif report.trend == 'degrading':
              return 'Traffic pattern has shifted; re-run threshold_calibration_harness.py on recent sample.'
          elif report.fpr > report.fpr_target * 2:
              return 'Significant breach; consider emergency threshold recalibration and exception list review.'
          else:
              return 'Re-run threshold_calibration_harness.py; review exception list for expired entries.'

      # ---------------------------------------------------------------------------
      # Exception management
      # ---------------------------------------------------------------------------

      def add_exception(
          rule_id: str,
          source_type: str,
          source_value: str,
          owner: str,
          justification: str,
          expiry_days: int = 90,
      ) -> ExceptionEntry:
          exceptions: list[dict] = _load_json(EXCEPTIONS_FILE)
          today = date.today().isoformat()
          expiry = (date.today() + timedelta(days=expiry_days)).isoformat()
          entry = ExceptionEntry(
              exception_id=str(uuid.uuid4())[:8],
              rule_id=rule_id,
              source_type=source_type,
              source_value=source_value,
              owner=owner,
              justification=justification,
              created_date=today,
              expiry_date=expiry,
          )
          exceptions.append(entry.__dict__)
          _save_json(EXCEPTIONS_FILE, exceptions)
          print(f'Exception added: {entry.exception_id} for rule {rule_id}')
          print(f'  Source: {source_type} = {source_value}')
          print(f'  Expires: {expiry} (review before renewal)')
          return entry

      def review_exceptions() -> None:
          exceptions: list[dict] = _load_json(EXCEPTIONS_FILE)
          today = date.today().isoformat()
          expired = [e for e in exceptions if e['expiry_date'] < today]
          active = [e for e in exceptions if e['expiry_date'] >= today]
          due_soon = [e for e in active
                      if e['expiry_date'] <= (date.today() + timedelta(days=14)).isoformat()]

          print(f'\nException Review Report — {today}')
          print(f'Total exceptions: {len(exceptions)}')
          print(f'Active:           {len(active)}')
          print(f'Expired (remove): {len(expired)}')
          print(f'Due within 14d:   {len(due_soon)}')

          if expired:
              print('\nExpired exceptions (removing automatically):')
              for e in expired:
                  print(f'  {e["exception_id"]} [{e["rule_id"]}]: {e["source_value"]} — expired {e["expiry_date"]}')
              _save_json(EXCEPTIONS_FILE, active)
              print(f'  {len(expired)} expired exception(s) removed.')

          if due_soon:
              print('\nExceptions expiring within 14 days (review and renew if still valid):')
              for e in due_soon:
                  print(f'  {e["exception_id"]} [{e["rule_id"]}]: {e["source_value"]} — expires {e["expiry_date"]} (owner: {e["owner"]})')

      def is_excepted(rule_id: str, user_id: str = '', ip: str = '') -> bool:
          '''Returns True if the alert should be suppressed by an active exception.'''
          exceptions: list[dict] = _load_json(EXCEPTIONS_FILE)
          today = date.today().isoformat()
          active = [e for e in exceptions if e['rule_id'] == rule_id and e['expiry_date'] >= today]
          for e in active:
              if e['source_type'] == 'user_id' and e['source_value'] == user_id:
                  return True
              if e['source_type'] == 'ip_range' and ip.startswith(e['source_value'].rstrip('0')):
                  return True
          return False

      # ---------------------------------------------------------------------------
      # Full report
      # ---------------------------------------------------------------------------

      def print_full_report() -> None:
          print('\nFPR Report — Seven-Track Gateway')
          print(f'{"Rule ID":<35} {"FPR":<8} {"Target":<8} {"TP":<6} {"FP":<6} {"Pending":<8} {"Trend":<12} Status')
          print('-' * 105)
          breach_count = 0
          for rule_id in FPR_TARGETS:
              r = compute_fpr(rule_id)
              status = 'BREACH' if r.breach else ('WARN' if r.trend == 'degrading' else 'OK')
              if r.breach:
                  breach_count += 1
                  open_dac_queue_ticket(r)
              fpr_str = f'{r.fpr:.1%}' if r.tp_count + r.fp_count >= 10 else 'N/A'
              print(f'{rule_id:<35} {fpr_str:<8} {r.fpr_target:.1%}  {r.tp_count:<6} {r.fp_count:<6} {r.pending_count:<8} {r.trend:<12} {status}')
          print(f'\nBreach tickets opened: {breach_count}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='False positive manager')
          parser.add_argument('--report', action='store_true', help='Print full FPR report')
          parser.add_argument('--add-disposition', nargs=4,
                              metavar=('RULE_ID', 'ALERT_ID', 'DISPOSITION', 'ANALYST'),
                              help='Add analyst disposition: tp | fp')
          parser.add_argument('--add-exception', nargs=4,
                              metavar=('RULE_ID', 'SOURCE_TYPE', 'SOURCE_VALUE', 'JUSTIFICATION'),
                              help='Add exception entry (90-day expiry; owner defaults to ruwgxo)')
          parser.add_argument('--review-exceptions', action='store_true',
                              help='Review and expire overdue exceptions')
          args = parser.parse_args()

          if args.report:
              print_full_report()
              return 0
          if args.add_disposition:
              rule_id, alert_id, disp, analyst = args.add_disposition
              add_disposition(rule_id, alert_id, disp, analyst)  # type: ignore[arg-type]
              return 0
          if args.add_exception:
              rule_id, src_type, src_val, justification = args.add_exception
              add_exception(rule_id, src_type, src_val, 'ruwgxo', justification)
              return 0
          if args.review_exceptions:
              review_exceptions()
              return 0
          parser.print_help()
          return 1

      if __name__ == '__main__':
          sys.exit(main())

  deliverable_2:
    id: 'D11.09.2'
    filename: 'threshold_calibration_harness.py'
    description: >
      ROC curve generation and operating point selection for Tracks 3, 6, and 7.
      Takes a labelled corpus (known-bad and known-good inputs with raw detector scores)
      and outputs the ROC curve, the current threshold position, and the calibrated
      threshold at the target FPR operating point. Extends the Chapter 10 calibration
      work to the full Chapter 11 FPR target framework.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
      - 'statistics (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''threshold_calibration_harness.py
      ROC curve generation and operating point selection for gateway heuristic tracks.
      Calibrates Track 3 (cosine similarity), Track 6 (entropy), Track 7 (compound).
      Chapter 11, Section 11.09 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 threshold_calibration_harness.py --track 3
        python3 threshold_calibration_harness.py --track 7 --current-threshold 0.70
        python3 threshold_calibration_harness.py --all
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass

      # ---------------------------------------------------------------------------
      # FPR targets per track (from table_1_fp_targets_per_track)
      # ---------------------------------------------------------------------------

      TRACK_CONFIG: dict[int, dict] = {
          3:  {'name': 'Semantic Similarity Gate', 'fpr_target': 0.05,  'current_threshold': 0.85},
          6:  {'name': 'Adversarial Entropy',       'fpr_target': 0.005, 'current_threshold': 3.20},
          7:  {'name': 'Squeezer Compound',         'fpr_target': 0.02,  'current_threshold': 0.70},
      }

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class ScoredExample:
          score: float
          label: int          # 1 = known-bad (positive), 0 = known-good (negative)

      @dataclass
      class ROCPoint:
          threshold: float
          tpr: float
          fpr: float

      @dataclass
      class CalibrationResult:
          track: int
          track_name: str
          current_threshold: float
          current_tpr: float
          current_fpr: float
          calibrated_threshold: float
          calibrated_tpr: float
          calibrated_fpr: float
          fpr_target: float
          auc: float
          recommendation: str

      # ---------------------------------------------------------------------------
      # ROC curve computation
      # ---------------------------------------------------------------------------

      def compute_roc(examples: list[ScoredExample]) -> list[ROCPoint]:
          '''Compute ROC curve by sweeping threshold over all unique score values.'''
          thresholds = sorted({e.score for e in examples}, reverse=True)
          n_pos = sum(1 for e in examples if e.label == 1)
          n_neg = sum(1 for e in examples if e.label == 0)
          if n_pos == 0 or n_neg == 0:
              return []

          points: list[ROCPoint] = []
          for thresh in thresholds:
              tp = sum(1 for e in examples if e.score >= thresh and e.label == 1)
              fp = sum(1 for e in examples if e.score >= thresh and e.label == 0)
              points.append(ROCPoint(
                  threshold=thresh,
                  tpr=tp / n_pos,
                  fpr=fp / n_neg,
              ))
          # Add (0,0) baseline point
          points.append(ROCPoint(threshold=float('inf'), tpr=0.0, fpr=0.0))
          points.sort(key=lambda p: p.fpr)
          return points

      def compute_auc(roc_points: list[ROCPoint]) -> float:
          '''Trapezoidal AUC.'''
          if len(roc_points) < 2:
              return 0.0
          auc = 0.0
          sorted_pts = sorted(roc_points, key=lambda p: p.fpr)
          for i in range(1, len(sorted_pts)):
              dx = sorted_pts[i].fpr - sorted_pts[i - 1].fpr
              avg_y = (sorted_pts[i].tpr + sorted_pts[i - 1].tpr) / 2
              auc += dx * avg_y
          return auc

      def find_operating_point(
          roc_points: list[ROCPoint],
          fpr_target: float,
      ) -> ROCPoint:
          '''Find the ROC point closest to but not exceeding fpr_target.'''
          candidates = [p for p in roc_points if p.fpr <= fpr_target]
          if not candidates:
              # All points exceed target; return lowest FPR point
              return min(roc_points, key=lambda p: p.fpr)
          # Among candidates at or below target, pick highest TPR
          return max(candidates, key=lambda p: p.tpr)

      def find_current_point(
          roc_points: list[ROCPoint],
          current_threshold: float,
      ) -> ROCPoint:
          '''Find the ROC point corresponding to the current deployed threshold.'''
          if not roc_points:
              return ROCPoint(current_threshold, 0.0, 0.0)
          closest = min(roc_points, key=lambda p: abs(p.threshold - current_threshold))
          return closest

      # ---------------------------------------------------------------------------
      # Synthetic corpus generators (for demonstration; replace with real data)
      # ---------------------------------------------------------------------------

      import random

      def _synthetic_track3_corpus(seed: int = 42) -> list[ScoredExample]:
          '''
          Track 3: cosine similarity scores.
          Known-bad (adversarial): mean 0.92, SD 0.05.
          Known-good (legitimate): mean 0.72, SD 0.10.
          '''
          rng = random.Random(seed)
          examples: list[ScoredExample] = []
          for _ in range(500):
              score = min(1.0, max(0.0, rng.gauss(0.92, 0.05)))
              examples.append(ScoredExample(score=round(score, 4), label=1))
          for _ in range(5000):
              score = min(1.0, max(0.0, rng.gauss(0.72, 0.10)))
              examples.append(ScoredExample(score=round(score, 4), label=0))
          return examples

      def _synthetic_track6_corpus(seed: int = 42) -> list[ScoredExample]:
          '''
          Track 6: entropy score (higher = more anomalous).
          Known-bad: mean 4.5 bits, SD 0.4.
          Known-good: mean 3.1 bits, SD 0.5.
          '''
          rng = random.Random(seed)
          examples: list[ScoredExample] = []
          for _ in range(200):
              score = max(0.0, rng.gauss(4.5, 0.4))
              examples.append(ScoredExample(score=round(score, 4), label=1))
          for _ in range(10000):
              score = max(0.0, rng.gauss(3.1, 0.5))
              examples.append(ScoredExample(score=round(score, 4), label=0))
          return examples

      def _synthetic_track7_corpus(seed: int = 42) -> list[ScoredExample]:
          '''
          Track 7 compound: combined squeezer + classifier score [0,1].
          Known-bad: mean 0.85, SD 0.07.
          Known-good: mean 0.45, SD 0.15.
          '''
          rng = random.Random(seed)
          examples: list[ScoredExample] = []
          for _ in range(300):
              score = min(1.0, max(0.0, rng.gauss(0.85, 0.07)))
              examples.append(ScoredExample(score=round(score, 4), label=1))
          for _ in range(5000):
              score = min(1.0, max(0.0, rng.gauss(0.45, 0.15)))
              examples.append(ScoredExample(score=round(score, 4), label=0))
          return examples

      CORPUS_GENERATORS = {
          3: _synthetic_track3_corpus,
          6: _synthetic_track6_corpus,
          7: _synthetic_track7_corpus,
      }

      # ---------------------------------------------------------------------------
      # Calibration runner
      # ---------------------------------------------------------------------------

      def calibrate_track(track: int) -> CalibrationResult:
          cfg = TRACK_CONFIG[track]
          corpus = CORPUS_GENERATORS[track]()
          roc_points = compute_roc(corpus)
          auc = compute_auc(roc_points)
          current_pt = find_current_point(roc_points, cfg['current_threshold'])
          calibrated_pt = find_operating_point(roc_points, cfg['fpr_target'])

          # Recommendation
          current_fpr = current_pt.fpr
          target_fpr = cfg['fpr_target']
          if current_fpr <= target_fpr:
              rec = (
                  f'Current threshold {cfg["current_threshold"]} already meets FPR target '
                  f'({current_fpr:.1%} ≤ {target_fpr:.1%}). No change needed. '
                  f'Verify with production sample before confirming.'
              )
          else:
              delta = calibrated_pt.threshold - cfg['current_threshold']
              direction = 'raise' if delta > 0 else 'lower'
              rec = (
                  f'Current FPR {current_fpr:.1%} exceeds target {target_fpr:.1%}. '
                  f'{direction.capitalize()} threshold from {cfg["current_threshold"]} to '
                  f'{calibrated_pt.threshold:.4f} to reach target. '
                  f'TPR will change from {current_pt.tpr:.1%} to {calibrated_pt.tpr:.1%}. '
                  f'Re-run coverage heat map after applying change.'
              )

          return CalibrationResult(
              track=track,
              track_name=cfg['name'],
              current_threshold=cfg['current_threshold'],
              current_tpr=current_pt.tpr,
              current_fpr=current_pt.fpr,
              calibrated_threshold=calibrated_pt.threshold,
              calibrated_tpr=calibrated_pt.tpr,
              calibrated_fpr=calibrated_pt.fpr,
              fpr_target=target_fpr,
              auc=auc,
              recommendation=rec,
          )

      def print_calibration_result(r: CalibrationResult) -> None:
          print(f'\nTrack {r.track} — {r.track_name}')
          print(f'  AUC:                    {r.auc:.4f}')
          print(f'  FPR target:             {r.fpr_target:.1%}')
          print(f'  Current threshold:      {r.current_threshold}')
          print(f'    → TPR: {r.current_tpr:.1%}  FPR: {r.current_fpr:.1%}')
          print(f'  Calibrated threshold:   {r.calibrated_threshold:.4f}')
          print(f'    → TPR: {r.calibrated_tpr:.1%}  FPR: {r.calibrated_fpr:.1%}')
          status = 'OK — no change' if r.current_fpr <= r.fpr_target else 'CALIBRATION NEEDED'
          print(f'  Status:                 {status}')
          print(f'  Recommendation:')
          print(f'    {r.recommendation}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Threshold calibration harness')
          parser.add_argument('--track', type=int, choices=[3, 6, 7],
                              help='Calibrate a specific track')
          parser.add_argument('--all', action='store_true',
                              help='Calibrate all heuristic tracks (3, 6, 7)')
          args = parser.parse_args()

          if args.all:
              print('Threshold Calibration Harness — All Heuristic Tracks')
              for track in [3, 6, 7]:
                  result = calibrate_track(track)
                  print_calibration_result(result)
              return 0

          if args.track:
              print(f'Threshold Calibration Harness — Track {args.track}')
              result = calibrate_track(args.track)
              print_calibration_result(result)
              return 0

          parser.print_help()
          return 1

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.09.1'
    mistake: 'Setting a single FPR target across all rules in the gateway rather than per-rule targets'
    why_it_happens: >
      A uniform FPR target is simpler to enforce and communicate. Setting different
      targets for different tracks requires understanding the detection mechanism and
      analyst impact of each rule individually.
    why_it_matters: >
      A uniform 5% FPR target is too permissive for Track 1 (keyword injection, which
      should be at 1%) and too restrictive for Track 3 (semantic gating, where 5% is
      correct). Applying a uniform target miscalibrates both: Track 1 generates five
      times as many false positives as necessary, and Track 3 is calibrated too tightly,
      reducing true positive coverage to meet a target that was designed for a different
      detection mechanism.
    correct_approach: >
      Set FPR targets per rule based on the detection mechanism, the alert action
      (block vs flag), and the analyst queue capacity. Block rules (Track 1) warrant
      lower FPR targets than flag rules (Track 3). High-priority analyst queues (Track
      6 adversarial review) warrant lower FPR targets than general SOC queues.

  - id: 'CM11.09.2'
    mistake: 'Treating an exception list as a permanent suppression mechanism rather than a time-bounded operational control'
    why_it_happens: >
      Exceptions solve an immediate problem. Once the false positive is suppressed, the
      problem feels resolved and there is no pressure to revisit the exception.
    why_it_matters: >
      Without expiry dates and quarterly review, exception lists grow monotonically.
      Over 12–18 months, a well-intentioned exception list for known automation accounts
      can expand to cover entire IP ranges, entire departments, and eventually entire
      user populations — each expansion individually justified, collectively creating
      large blind spots.
    correct_approach: >
      Every exception has a maximum 90-day lifetime enforced by false_positive_manager.py.
      Renewal requires owner re-confirmation and updated justification. Expired exceptions
      are removed automatically. The exception list is version-controlled; removing an
      exception is a PR with the same review requirement as adding one.

  - id: 'CM11.09.3'
    mistake: 'Calibrating thresholds using the same corpus that was used to build the detection rule'
    why_it_happens: >
      The rule development corpus is available and labelled. Using it for calibration
      saves the effort of collecting a separate production traffic sample.
    why_it_matters: >
      A threshold calibrated on the development corpus is optimistic. The development
      corpus is not representative of production traffic: it over-samples adversarial
      inputs (to ensure rule development), under-samples the full range of legitimate
      inputs, and may not reflect recent changes in user behaviour or prompt patterns.
      A threshold at 5% FPR on the development corpus may produce 20% FPR on production.
    correct_approach: >
      Calibrate on a recent production traffic sample with analyst-confirmed labels.
      The sample must cover at least 14 days to capture weekly traffic patterns.
      If production traffic has not yet been collected, run the threshold at a conservative
      (high) setting initially and calibrate downward as labelled production data
      accumulates.

  - id: 'CM11.09.4'
    mistake: 'Applying threshold calibration without re-running the ATT&CK coverage heat map'
    why_it_happens: >
      Calibration is perceived as a tuning operation, not a coverage operation.
      The mental model is: "I am improving the FPR without changing what the rule detects."
    why_it_matters: >
      Raising a threshold to reduce FPR also reduces TPR. If the TPR reduction is large
      enough, the technique that was at score 1 (partial coverage) moves closer to score
      0 (no effective coverage for the attack variant near the new threshold). The
      coverage heat map does not automatically detect this unless it is re-run after
      the calibration.
    correct_approach: >
      Run attck_coverage_heatmap.py --diff immediately after any threshold calibration
      is applied to staging. If any technique score regresses in the diff output, the
      calibration must be reviewed: either the threshold change is too aggressive, or
      the coverage gap it creates is accepted and documented in the technique''s
      residual_gap field.

  - id: 'CM11.09.5'
    mistake: 'Tracking FPR as a 30-day rolling average, masking recent breach events'
    why_it_happens: >
      Longer averaging windows produce smoother metrics and fewer false alarms on the
      FPR monitoring system itself. A 30-day window feels more stable.
    why_it_matters: >
      A rule calibration applied on day 28 that causes a significant FPR spike will
      contribute only 3/30 of the rolling window. The 30-day average stays below the
      breach threshold even as the actual current FPR is many times the target. The
      breach goes undetected until the spiked data dominates the rolling window.
    correct_approach: >
      Use a 7-day rolling window for FPR computation as implemented in
      false_positive_manager.py. A 7-day window is responsive enough to detect
      calibration-induced FPR spikes within one week while smoothing over normal
      day-to-day traffic variance. If desired, compute both 7-day (operational alert)
      and 30-day (trend reporting) windows simultaneously, and breach-alert on the
      7-day metric only.

section_summary:
  what_you_learned: |
    False positive management is the operational discipline that prevents detection
    programmes from eroding through alert fatigue. The seven-track gateway has three
    primary FP sources — near-boundary legitimate inputs, legitimate automation, and
    benign obfuscated prompts — each requiring a different mitigation. The alert fatigue
    death spiral has two intervention points: pre-deployment threshold calibration and
    real-time per-rule FPR monitoring. ROC curve analysis selects operating points at
    target FPR levels; per-rule targets range from 0.5% (Track 6) to 5% (Track 3 and
    Track 7 compound). Exception management requires expiry dates, quarterly review,
    and version control. Baselining shifts detection from absolute to entity-relative
    thresholds, reducing FPR for high-volume legitimate users. The FPR management
    dimension advances from L1 to L3 after deploying false_positive_manager.py with
    target enforcement and DaC queue integration.
  key_terms:
    - term: 'Alert fatigue death spiral'
      definition: >
        The self-reinforcing failure sequence in which high FPR leads analysts to dismiss
        alerts, causing missed true positives, causing incidents, causing threshold
        increases, causing coverage reduction. Broken by pre-deployment calibration and
        real-time per-rule FPR monitoring.
    - term: 'ROC curve'
      definition: >
        A plot of True Positive Rate against False Positive Rate across all threshold
        values. The operating point is selected where FPR meets the per-rule target.
        AUC (area under the ROC curve) is a threshold-independent quality measure.
    - term: 'Exception'
      definition: >
        A time-bounded, owner-attributed suppression of detection alerts for a specific
        known-good traffic source. Maximum 90-day lifetime; auto-expired; version-controlled.
        Not a substitute for threshold calibration.
    - term: 'Baselining'
      definition: >
        A per-entity (user, endpoint, hour) normal behaviour model. Detection fires when
        a metric deviates more than 3 standard deviations from the entity''s rolling mean,
        rather than when it exceeds an absolute threshold. Reduces FPR for high-volume
        legitimate users.
    - term: 'FPR target breach'
      definition: >
        The condition in which a rule''s 7-day rolling FPR exceeds its documented target
        by more than 20% relative. Triggers a DaC queue ticket with the rule ID, current
        FPR, FPR target, and recommended first action.

preview_section_11_10:
  title: 'Detection Engineering Workflow: Hypothesis to Production'
  teaser: |
    Section 11.10 codifies the end-to-end detection engineering workflow as a seven-phase
    pipeline: hypothesis formation (from threat intelligence and gap analysis), design
    (log source, feature selection, FPR target), build (Sigma rule authoring and test
    cases), test (CI unit tests and staging integration test), deploy (PR review and
    pipeline merge), monitor (FPR tracking and drift detection), and improve (rule
    refinement from FP/FN feedback). The time-to-detect metric measures the elapsed
    time from threat discovery to deployed detection rule; the target is under seven
    days for catalogued techniques and under 24 hours for actively exploited zero-days.
    The workflow integrates all tools from Sections 11.02 through 11.09 into a single
    coherent procedure that any detection engineer can follow for any new ATLAS technique.

