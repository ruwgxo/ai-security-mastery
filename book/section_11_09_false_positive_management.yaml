section_overview:
  one_line_summary: >
    False positive management is the operational discipline that separates a detection
    programme that works from one that erodes — per-rule FPR targets, ROC-calibrated
    thresholds, structured exception management, and entity baselining are the four
    tools that keep the SOC queue actionable as the rule portfolio scales.
  why_this_section_exists: |
    Section 11.08 established that FPR management is currently at L1 for the seven-track
    gateway: no per-rule targets, no automated alerting, no systematic disposition
    collection. It also established that L3 FPR management is on the critical path to
    L3 composite maturity — the minimum bar for production. This section builds the
    tooling and the operational procedures that move FPR management from L1 to L3.

    The motivation is not abstract. A gateway with uncalibrated thresholds in Tracks
    3, 6, and 7 will produce false positive rates that are, at best, unknown and, at
    worst, high enough to trigger the alert fatigue death spiral within weeks of
    production deployment. Track 3''s cosine similarity threshold of 0.85 was chosen
    to work on the Chapter 6 examples; it was not calibrated against production traffic.
    Track 7''s squeezer threshold of 0.70 was chosen similarly. These are educated
    starting points, not calibrated operating points. Section 11.09 calibrates them
    from data.
  position_in_chapter: >
    Section 11.09 closes the FPR management debt opened in Section 11.01 and advances
    the FPR management dimension from L1 to L3. Its output — per-rule FPR targets and
    the false_positive_manager.py monitoring infrastructure — feeds both the maturity
    assessor (Section 11.08) and the detection engineering workflow (Section 11.10).
    The threshold calibration harness also closes the ''thresholds without calibration''
    debt item from the Section 11.01 inventory.

learning_objectives:
  - 'Name the three primary sources of false positives in AI gateway detection and give a concrete example from each gateway track'
  - 'Describe the alert fatigue death spiral in sequence and identify the two intervention points where it can be broken'
  - 'Apply ROC curve analysis to select a calibrated operating point for a detection threshold, given a precision-recall tradeoff requirement'
  - 'Set per-rule FPR targets for the seven gateway tracks, explaining the rationale for differential targets across tracks'
  - 'Implement a structured exception list that suppresses known-good traffic sources without disabling the underlying detection rule'
  - 'Design a per-user baseline model that flags deviation from entity-specific normal behaviour rather than absolute threshold violation'
  - 'Describe the false positive review queue SLA and explain how analyst dispositions feed back into rule improvement'

