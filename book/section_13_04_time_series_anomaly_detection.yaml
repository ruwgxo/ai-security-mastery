section_overview:
  one_line_summary: 'Behavioural metrics are time series with seasonal structure; Section 13.04 builds the seasonal decomposition, forecasting, change-point, and multi-resolution detectors that flag temporal deviation from an entity envelope, catching both the sudden burst and the slow ramp a static threshold misses.'
  why_this_section_exists: |
    Section 13.03 established per-entity baselines: a centre and a spread for each behavioural metric.
    A baseline answers is this single observation far from typical. It does not answer the temporal
    questions that the most important behavioural attacks raise: is this metric trending upward over
    days, did its behaviour change at a specific moment, is this spike just the usual Monday morning
    peak. Those questions require treating the metric as a time series, and that is what Section 13.04
    builds.

    The motivating fact is that behavioural metrics are not stationary. Request rate rises during
    business hours and falls at night. Refusal rate has a weekly rhythm. A static threshold or a
    single baseline applied to a seasonal metric produces a detector that fires every morning when
    traffic legitimately rises and stays silent during a seasonal peak inside which an attack is
    hiding. The seasonality must be modelled and removed before deviation can be measured, or the
    detector spends its alert budget on the daily cycle and misses the attack.

    The section also confronts the two opposite temporal signatures of behavioural abuse. The burst
    attack is a sudden spike: high amplitude, short duration. The exfiltration campaign is a slow ramp:
    low amplitude per step, long duration, invisible to any detector tuned for spikes. A single
    detector tuned for one signature is blind to the other, so the section builds multi-resolution
    analysis that sees both, and change-point detection that catches the distinct signal of account
    compromise -- not an outlier point but a shift in the whole behaviour.
  position_in_chapter: |
    Section 13.04 is the core temporal detector of Chapter 13, built directly on the 13.03 baselines.
    It sits between baseline establishment and the drift detection of 13.05, which applies similar
    distributional comparison to the detectors and the model rather than to user behaviour. It feeds
    the rate-based detection of 13.07, which uses the temporal rate signal, and the entity profiler of
    13.10, which folds temporal anomaly signals into the persistent profile. It is the section where
    the temporal family produces its primary detection output: a per-metric temporal anomaly score
    that respects seasonality and catches both spike and ramp.

