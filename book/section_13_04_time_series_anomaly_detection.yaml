deliverables:

  deliverable_1:
    title: 'Seasonal Decomposition and Residual Anomaly Detector'
    filename: 'time_series_anomaly_detector.py'
    description: 'Decomposes a behavioural metric time series into trend, seasonal, and residual components and flags anomalies in the residual using robust statistics. Models daily and weekly seasonality for behavioural metrics. Implements the seasonal decomposition and residual thresholding from Section 13.04 Parts 2 and 3.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; uses a simple averaging-based seasonal estimate to stay dependency-free'
    code: |
      # time_series_anomaly_detector.py
      # Section 13.04: Seasonal Decomposition Residual Anomaly Detector
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Dict, List


      def _median(values: List[float]) -> float:
          s = sorted(values)
          n = len(s)
          if n == 0:
              return 0.0
          mid = n // 2
          return float(s[mid]) if n % 2 else (s[mid - 1] + s[mid]) / 2.0


      def _mad(values: List[float], centre: float) -> float:
          if not values:
              return 0.0
          return _median([abs(v - centre) for v in values]) * 1.4826


      @dataclass
      class Decomposition:
          trend: float
          seasonal: List[float]   # one factor per slot in the period
          residual_centre: float
          residual_spread: float
          period: int


      def decompose(series: List[float], period: int) -> Decomposition:
          n = len(series)
          # Trend: robust overall level (median)
          trend = _median(series)
          # Seasonal: median of detrended values at each slot of the period
          slots: Dict[int, List[float]] = {i: [] for i in range(period)}
          for i, v in enumerate(series):
              slots[i % period].append(v - trend)
          seasonal = [_median(slots[i]) if slots[i] else 0.0 for i in range(period)]
          # Residual: what remains after removing trend and seasonal
          residuals = [series[i] - trend - seasonal[i % period] for i in range(n)]
          rc = _median(residuals)
          rs = _mad(residuals, rc)
          return Decomposition(trend, seasonal, rc, rs, period)


      def score_observation(value: float, slot: int, decomp: Decomposition) -> float:
          expected = decomp.trend + decomp.seasonal[slot % decomp.period]
          residual = value - expected
          if decomp.residual_spread <= 1e-9:
              return 0.0 if abs(residual) < 1e-9 else float('inf')
          return (residual - decomp.residual_centre) / decomp.residual_spread


      if __name__ == '__main__':
          # 7-day hourly-ish series with a daily peak (period 24), low overnight
          import math
          period = 24
          series = []
          for day in range(7):
              for hour in range(24):
                  base = 50 + 40 * math.sin((hour - 6) / 24 * 2 * math.pi)
                  series.append(max(base, 5))
          decomp = decompose(series, period)

          # Normal morning peak (hour 9): high absolute value, should NOT fire
          morning = decomp.trend + decomp.seasonal[9] + 3
          z_morning = score_observation(morning, 9, decomp)
          # Overnight attack (hour 3): absolute value below morning peak, SHOULD fire
          night_attack = decomp.trend + decomp.seasonal[3] + 60
          z_night = score_observation(night_attack, 3, decomp)

          print(f'Morning peak value {morning:.0f} at hour 9: residual z = {z_morning:.2f} (normal)')
          print(f'Overnight value {night_attack:.0f} at hour 3: residual z = {z_night:.2f} (anomaly)')
          print('The overnight attack fires despite a lower absolute value than the')
          print('morning peak, because seasonal decomposition compares against the hour.')

  deliverable_2:
    title: 'Streaming Forecast Anomaly Scorer'
    filename: 'forecast_anomaly_scorer.py'
    description: 'Streaming anomaly detector using exponential smoothing of level and seasonal factors, scoring each new observation against a prediction interval and updating state incrementally. Holds flagged observations out of the state update as a contamination guard. Implements the forecasting and streaming detection from Section 13.04 Parts 3 and 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # forecast_anomaly_scorer.py
      # Section 13.04: Streaming Forecast Anomaly Scorer
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Optional, Tuple


      @dataclass
      class StreamingForecaster:
          period: int
          alpha: float = 0.1          # level smoothing
          gamma: float = 0.05         # seasonal smoothing
          interval_k: float = 3.0     # interval width in robust spreads
          level: Optional[float] = None
          seasonal: List[float] = field(default_factory=list)
          resid_abs_ewma: float = 1.0  # running scale of residuals
          beta: float = 0.05           # residual scale smoothing
          step: int = 0

          def _ensure_init(self, value: float) -> None:
              if self.level is None:
                  self.level = value
              if not self.seasonal:
                  self.seasonal = [0.0] * self.period

          def forecast(self, slot: int) -> float:
              base = self.level if self.level is not None else 0.0
              return base + self.seasonal[slot % self.period]

          def interval(self, slot: int) -> Tuple[float, float]:
              f = self.forecast(slot)
              half = self.interval_k * self.resid_abs_ewma
              return f - half, f + half

          def score_and_update(self, value: float, slot: int, flagged_hint: bool = False) -> Tuple[float, bool]:
              self._ensure_init(value)
              f = self.forecast(slot)
              residual = value - f
              scale = self.resid_abs_ewma if self.resid_abs_ewma > 1e-9 else 1.0
              z = residual / scale
              lo, hi = self.interval(slot)
              is_anomaly = value < lo or value > hi

              # Contamination guard: do not smooth a flagged/anomalous point into state
              if not (is_anomaly or flagged_hint):
                  s = slot % self.period
                  new_level = self.alpha * (value - self.seasonal[s]) + (1 - self.alpha) * self.level
                  self.seasonal[s] = self.gamma * (value - new_level) + (1 - self.gamma) * self.seasonal[s]
                  self.level = new_level
                  self.resid_abs_ewma = self.beta * abs(residual) + (1 - self.beta) * self.resid_abs_ewma
              self.step += 1
              return round(z, 3), is_anomaly


      if __name__ == '__main__':
          import math
          fc = StreamingForecaster(period=24, interval_k=3.0)
          # Warm up over 5 days of seasonal data
          for day in range(5):
              for hour in range(24):
                  v = 50 + 40 * math.sin((hour - 6) / 24 * 2 * math.pi)
                  fc.score_and_update(max(v, 5), hour)

          # Day 6: inject an overnight burst at hour 3
          fired = []
          for hour in range(24):
              v = 50 + 40 * math.sin((hour - 6) / 24 * 2 * math.pi)
              v = max(v, 5)
              if hour == 3:
                  v += 70  # burst
              z, anom = fc.score_and_update(v, hour)
              if anom:
                  fired.append((hour, z))
          print('Anomalies fired on day 6:', fired)
          print('The hour-3 burst fired; the legitimate seasonal peak did not,')
          print('and the burst was held out of the smoothed state by the guard.')

  deliverable_3:
    title: 'Change-Point Detector'
    filename: 'change_point_detector.py'
    description: 'Detects a sustained shift in a behavioural metric distribution -- the account-compromise signal -- using a cumulative-sum statistic and a two-window distribution comparison. Flags the moment of regime change rather than individual outlier points. Implements the change-point detection from Section 13.04 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # change_point_detector.py
      # Section 13.04: Change-Point Detector for Regime Shift
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Optional


      def _mean(values: List[float]) -> float:
          return sum(values) / len(values) if values else 0.0


      def _std(values: List[float]) -> float:
          if len(values) < 2:
              return 1.0
          m = _mean(values)
          return (sum((v - m) ** 2 for v in values) / (len(values) - 1)) ** 0.5 or 1.0


      @dataclass
      class CusumChangePoint:
          threshold: float = 5.0
          drift: float = 0.5
          reference_mean: Optional[float] = None
          reference_std: Optional[float] = None
          cusum_high: float = 0.0
          cusum_low: float = 0.0

          def fit_reference(self, baseline: List[float]) -> None:
              self.reference_mean = _mean(baseline)
              self.reference_std = _std(baseline)

          def update(self, value: float) -> bool:
              # Standardise against the reference regime
              z = (value - self.reference_mean) / self.reference_std
              # Two-sided CUSUM with allowance (drift)
              self.cusum_high = max(0.0, self.cusum_high + z - self.drift)
              self.cusum_low = min(0.0, self.cusum_low + z + self.drift)
              changed = self.cusum_high > self.threshold or self.cusum_low < -self.threshold
              if changed:
                  # reset after detecting, so it can detect the next regime
                  self.cusum_high = 0.0
                  self.cusum_low = 0.0
              return changed


      def two_window_shift(recent: List[float], prior: List[float]) -> float:
          # Standardised difference of window means -- a simple regime-shift score
          mp, mr = _mean(prior), _mean(recent)
          sp = _std(prior)
          return abs(mr - mp) / sp


      if __name__ == '__main__':
          # Reference regime: ~10 requests/hour
          baseline = [10, 9, 11, 10, 12, 9, 10, 11, 10, 9, 10, 11]
          cp = CusumChangePoint(threshold=5.0, drift=0.5)
          cp.fit_reference([float(v) for v in baseline])

          # Stream: normal, then a sustained step to ~25 (account takeover)
          stream = [10, 11, 9, 10, 12, 25, 24, 26, 25, 27, 24, 25]
          detected_at = None
          for i, v in enumerate(stream):
              if cp.update(float(v)) and detected_at is None:
                  detected_at = i
          print(f'Reference mean ~{_mean([float(v) for v in baseline]):.1f}')
          print(f'Sustained shift to ~25 detected at stream index: {detected_at}')

          prior = [float(v) for v in stream[:5]]
          recent = [float(v) for v in stream[5:]]
          print(f'Two-window shift score: {two_window_shift(recent, prior):.2f}')
          print('Change-point flags the regime shift even though each post-shift')
          print('point would look normal once a forecaster adapts to the new level.')

  deliverable_4:
    title: 'Multi-Resolution Analyser'
    filename: 'multi_resolution_analyser.py'
    description: 'Runs temporal anomaly detection at several time resolutions in parallel (fine, medium, coarse), combining the signals so a burst fires the fine resolution and a slow ramp fires the coarse resolution, with deduplication across resolutions. Implements the multi-resolution analysis from Section 13.04 Part 6.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # multi_resolution_analyser.py
      # Section 13.04: Multi-Resolution Temporal Analyser
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Dict, List, Tuple


      def _median(values: List[float]) -> float:
          s = sorted(values)
          n = len(s)
          if n == 0:
              return 0.0
          mid = n // 2
          return float(s[mid]) if n % 2 else (s[mid - 1] + s[mid]) / 2.0


      def _mad(values: List[float], c: float) -> float:
          if not values:
              return 1.0
          return (_median([abs(v - c) for v in values]) * 1.4826) or 1.0


      def aggregate(series: List[float], factor: int) -> List[float]:
          # Aggregate fine-resolution points into coarser buckets by sum
          out = []
          for i in range(0, len(series), factor):
              out.append(sum(series[i:i + factor]))
          return out


      @dataclass
      class ResolutionVerdict:
          resolution: str
          fired: bool
          score: float
          bucket_index: int


      def detect_at_resolution(series: List[float], name: str, k: float = 4.0) -> ResolutionVerdict:
          if len(series) < 4:
              return ResolutionVerdict(name, False, 0.0, -1)
          history = series[:-1]
          c = _median(history)
          s = _mad(history, c)
          latest = series[-1]
          score = (latest - c) / s
          return ResolutionVerdict(name, score > k, round(score, 2), len(series) - 1)


      def multi_resolution_detect(fine_series: List[float]) -> Tuple[bool, List[ResolutionVerdict]]:
          verdicts = [
              detect_at_resolution(fine_series, 'fine (per-minute)'),
              detect_at_resolution(aggregate(fine_series, 6), 'medium (per-6min)'),
              detect_at_resolution(aggregate(fine_series, 60), 'coarse (per-hour)'),
          ]
          # Dedup: if multiple fire, attribute to the coarsest that fired (one event)
          any_fired = any(v.fired for v in verdicts)
          return any_fired, verdicts


      if __name__ == '__main__':
          # Case 1: a short burst -- fine resolution should fire, coarse should not
          burst = [2.0] * 200 + [40.0] + [2.0] * 19
          fired_b, vb = multi_resolution_detect(burst)
          print('Burst case:')
          for v in vb:
              print(f'  {v.resolution:<20} fired={v.fired} score={v.score}')
          print(f'  any fired: {fired_b}\n')

          # Case 2: a slow ramp -- coarse resolution should fire, fine should not
          ramp = [2.0 + i * 0.02 for i in range(220)]
          fired_r, vr = multi_resolution_detect(ramp)
          print('Slow-ramp case:')
          for v in vr:
              print(f'  {v.resolution:<20} fired={v.fired} score={v.score}')
          print(f'  any fired: {fired_r}')
          print('\nThe burst fires the fine resolution; the ramp fires the coarse.')
          print('A single-resolution detector would miss one of the two.')

common_mistakes:

  mistake_1:
    description: 'Applying a static threshold or a single baseline to a seasonal metric without modelling the seasonality'
    why_it_happens: |
      The 13.03 baseline gives a centre and a spread, and applying a fixed threshold around that centre
      is the obvious next step. For a metric that happens to be roughly flat it works, so the seasonality
      problem is easy to overlook until a clearly seasonal metric like request rate is monitored.
    consequence: |
      A seasonal metric has a normal that moves through the day and week. A threshold set above the
      morning peak lets an overnight attack pass underneath it; a threshold set to catch the overnight
      attack fires every morning. The detector spends its entire alert budget on the legitimate daily
      cycle and hides attacks inside seasonal peaks. The static threshold cannot win against a moving
      normal.
    correct_approach: |
      Model the seasonality and measure deviation from the time-varying seasonal expectation, via seasonal
      decomposition or a seasonal forecaster whose prediction interval moves with the season. The
      detector then compares each observation against what is normal for that hour and day, firing on the
      overnight anomaly and staying quiet during the legitimate peak. time_series_anomaly_detector.py and
      forecast_anomaly_scorer.py carry the seasonality so the threshold inherits it.

  mistake_2:
    description: 'Estimating the seasonal pattern with non-robust statistics so a sustained attack is folded into the season'
    why_it_happens: |
      Seasonal decomposition by simple averaging is the textbook method, and averaging the values at each
      time slot to estimate the seasonal factor is straightforward. Robustness feels like an unnecessary
      complication when the data looks clean.
    consequence: |
      If a sustained attack is present while the seasonal component is estimated, a non-robust average
      folds the attack into the seasonal pattern: the detector learns to expect the elevated level at
      that time of day and stops flagging it. The attack becomes part of the model's notion of normal,
      exactly the contamination failure from 13.03 reappearing in the seasonal estimate. Subsequent
      attacks at the same time slot are now expected and pass.
    correct_approach: |
      Estimate the seasonal and trend components with robust statistics, the median rather than the mean,
      so a minority of attack observations at a time slot does not move the seasonal factor for that slot.
      The attack then remains in the residual where the detector sees it. The decompose function in
      time_series_anomaly_detector.py uses medians for exactly this reason.

  mistake_3:
    description: 'Recomputing the full decomposition or refitting the forecaster over the entire history on every new observation in production'
    why_it_happens: |
      A batch decomposition is the natural way to develop and validate the detector offline, and reusing
      that batch code in production is the least-effort path. On a short history it is fast enough that
      the scaling problem is not visible during testing.
    consequence: |
      The per-point cost of a full recomputation grows with the history length. As the series lengthens
      over weeks and months in production, the per-observation latency creeps upward until the temporal
      detector cannot keep up with the event rate, and it either falls behind or is dropped. The detector
      that worked in a one-week test becomes unviable at production timescales.
    correct_approach: |
      Use a streaming detector that maintains a compact running state -- level, seasonal factors, residual
      scale -- and updates incrementally with constant per-point cost regardless of history length.
      Exponential smoothing gives this directly. forecast_anomaly_scorer.py maintains constant-cost state
      and never recomputes over history.

  mistake_4:
    description: 'Relying only on outlier detection and missing account compromise because the forecaster adapts to the new regime'
    why_it_happens: |
      Outlier detection is the headline temporal capability: it catches the spike, the obvious anomaly,
      the dramatic deviation. Once it is built and catching bursts, it feels like the temporal problem is
      solved, and change-point detection looks like a redundant second mechanism.
    consequence: |
      Account compromise is often a sustained regime change, not a single spike. After the transition,
      each individual observation sits within the band that a streaming forecaster, smoothing toward the
      new level, comes to expect, so outlier detection stops firing within a short time of the takeover.
      The most consequential behavioural attack produces only a brief outlier signal at the transition and
      then goes quiet as the detector adapts to it.
    correct_approach: |
      Run change-point detection alongside outlier detection. Change-point detection flags the moment the
      distribution shifts and records that a regime change happened, surviving the forecaster's adaptation
      to the new level. The change-point signal is the account-compromise alert that outlier detection
      cannot sustain. change_point_detector.py monitors for the regime shift specifically.

  mistake_5:
    description: 'Detecting at a single time resolution, so the detector is blind to either the burst or the slow ramp'
    why_it_happens: |
      One time resolution must be chosen to aggregate the metric -- per minute, per hour, per day -- and
      a single choice is simpler to build, tune, and reason about. Whichever resolution is chosen catches
      the attacks visible at that scale, which feels like adequate coverage.
    consequence: |
      The burst and the slow ramp have opposite signatures. A fine resolution sees the burst and averages
      the slow ramp into invisibility; a coarse resolution sees the ramp and averages the burst into a
      single slightly-elevated bucket. Whichever single resolution is chosen, the detector is structurally
      blind to one of the two highest-value temporal attacks, and the blind spot is not apparent from
      testing against the attack the chosen resolution does catch.
    correct_approach: |
      Run the temporal detection at several resolutions in parallel and combine the signals with
      deduplication, so the burst fires the fine resolution and the ramp fires the coarse resolution and
      the entity is flagged if any resolution fires. multi_resolution_analyser.py runs fine, medium, and
      coarse detection together for exactly this coverage.

section_summary:

  compact: |
    Behavioural metrics are seasonal time series, and Section 13.04 builds the temporal detectors that
    measure deviation from an entity's moving envelope rather than a static threshold. A single threshold
    on a seasonal metric either fires every morning or hides overnight attacks, so seasonal decomposition
    separates trend and seasonal structure from the residual where anomalies live, and forecasting frames
    the same idea as a moving prediction interval that carries the seasonality. The detector must stream:
    a constant-cost running state updated incrementally, with flagged observations held out of the state
    update as the temporal contamination guard. Change-point detection answers a different question from
    outlier detection -- when did the distribution shift -- which is the account-compromise signal that
    survives the forecaster's adaptation to a new regime. Multi-resolution analysis runs detection at
    fine, medium, and coarse time scales in parallel so the burst fires the fine resolution and the slow
    ramp fires the coarse resolution, covering both of the two opposite high-value temporal signatures
    that any single resolution would miss. The output is a per-entity temporal anomaly score, seasonality-
    aware and sensitive to both spike and ramp, that the rate and profiling families consume.

  key_takeaways:
    - 'Behavioural metrics are seasonal time series, and a static threshold either fires on every legitimate peak or hides attacks in the troughs -- the seasonality must be modelled and removed before deviation is measured'
    - 'Seasonal decomposition isolates the residual, where anomalies live after trend and seasonal structure are removed, and a seasonal forecaster frames the same idea as a prediction interval that moves with the season'
    - 'The seasonal estimate must use robust statistics or a sustained attack is folded into the seasonal pattern and the detector learns to expect it'
    - 'Temporal detection must stream with constant per-point cost, holding flagged observations out of the state update as the temporal analogue of the baseline contamination guard'
    - 'Change-point detection answers when the distribution shifted -- the account-compromise signal that survives the forecaster adapting to the new regime, which outlier detection cannot sustain'
    - 'Multi-resolution analysis catches both the sudden burst (fine resolution) and the slow ramp (coarse resolution), the two opposite signatures that any single-resolution detector is blind to one of'

preview_section_13_05:
  title: 'Section 13.05: Drift Detection -- Data Drift and Concept Drift Beneath the Detectors'
  summary: |
    Section 13.05 turns the temporal lens from the user to the detectors and the model, catching the
    silent degradation that no user-behaviour detector reveals. It distinguishes data drift -- the input
    feature distribution shifting away from the training distribution -- from concept drift, where the
    relationship between features and labels changes so a once-accurate detector decays with no input-side
    signal. It builds population stability index monitoring on input features, Kolmogorov-Smirnov and
    chi-squared tests for distribution comparison, and prediction-distribution monitoring that detects
    drift through the classifier score distribution rather than the inputs. It connects drift alerts to
    the Chapter 12 Section 12.14 retraining trigger and distinguishes benign drift (seasonal, product
    change) from adversarial drift (attack-distribution shift). Without drift monitoring, the Chapter 12
    detectors are decaying assets with no alarm on their decay; Section 13.05 is that alarm.

