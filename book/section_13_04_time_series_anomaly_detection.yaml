prose_content:

  part_1:
    title: 'Behavioural Metrics Are Seasonal Time Series'
    body: |
      A behavioural metric observed over time is a time series, and behavioural time series have
      structure that a single baseline does not capture. Request rate is the clearest example. It is
      not a flat random series around a constant mean; it rises during the working day and falls
      overnight, it is higher on weekdays than weekends, and it may follow a monthly billing or release
      cycle. These are seasonal components: regular, predictable patterns at fixed periods.

      A static threshold or a single 13.03 baseline applied to such a series fails in two symmetric
      ways. Set the threshold high enough that the legitimate morning peak does not trip it, and an
      attack that occurs during the overnight trough -- when the legitimate rate is low and the
      threshold is far above it -- sails underneath. Set it low enough to catch the overnight attack,
      and it fires every single morning when the legitimate rate climbs into the alert band. The
      detector either misses attacks in the troughs or floods on the peaks, and there is no single
      static level that avoids both, because the metric's normal is itself a moving curve.

      The resolution is to model the seasonal curve and measure deviation from it rather than from a
      constant. The expected request rate at nine on a Tuesday morning is high; an observation that
      matches the seasonal expectation is normal even though it is high in absolute terms, and an
      observation that is high relative to the overnight expectation is anomalous even though it is low
      in absolute terms. Once the seasonal expectation is the reference, the same deviation logic from
      13.03 applies -- but now against a time-varying expectation rather than a fixed centre. This is
      what makes time-series detection necessary as a layer above the static baseline: the baseline
      gives a centre, the time-series layer makes that centre move with the season.

  part_2:
    title: 'Seasonal Decomposition: Isolating the Residual'
    body: |
      The standard way to separate the seasonal structure from the genuine anomalies is decomposition.
      A time series is decomposed into three additive components: the trend, the slow long-term
      movement; the seasonal, the repeating pattern at fixed periods; and the residual, what remains
      after trend and seasonal are removed. The residual is where anomalies live. After the predictable
      trend and the repeating seasonal cycle are subtracted, an ordinary observation leaves a small
      residual near zero, and an anomalous observation leaves a large residual.

      Decomposition turns a seasonal-anomaly problem into a stationary-anomaly problem. The raw series
      is non-stationary and seasonal, hard to threshold. The residual series, with trend and seasonality
      removed, is approximately stationary: it hovers near zero with a roughly constant spread, and a
      simple robust threshold on the residual -- a modified z-score of the residual using the 13.03
      robust statistics -- detects anomalies that the raw series obscured. The morning peak, fully
      explained by the seasonal component, leaves a small residual and does not fire. An overnight
      attack, unexplained by trend or season, leaves a large residual and does fire, even though its
      absolute value is below the morning peak.

      Two practical points govern decomposition for behavioural security. First, the seasonal period
      must be discovered, not assumed: most behavioural metrics have a daily and a weekly period, and the
      decomposition must model both, but some metrics have an idiosyncratic period that an autocorrelation
      analysis reveals. Second, the decomposition itself must be robust to contamination, for the same
      reason the baseline was: if a sustained attack is present while the seasonal component is being
      estimated, a non-robust decomposition folds the attack into the seasonal pattern and learns to
      expect it. A robust decomposition resists this, keeping the attack in the residual where the
      detector can see it.

  part_3:
    title: 'Forecasting-Based Detection: The Prediction Interval as a Moving Threshold'
    body: |
      An equivalent and often more operationally convenient framing is forecasting. Rather than
      decomposing the whole series, a forecasting model predicts the next value from the history,
      together with a prediction interval -- a band within which the next value is expected to fall with
      some confidence. An observation inside the interval is normal; an observation outside it is
      anomalous, and the distance outside the interval is the anomaly score.

      The prediction interval is a moving, self-adjusting threshold, which is exactly what a seasonal
      metric needs. At nine on a Tuesday the forecast is high and the interval sits high, so a high
      observation is normal. At three overnight the forecast is low and the interval sits low, so the
      same absolute value that was normal in the morning is now far outside the interval and fires. The
      forecasting model carries the seasonality, so the threshold inherits it for free. A simple
      seasonal forecaster -- one that predicts the value at a given time as the recent level adjusted by
      the seasonal factor for that time of day and day of week -- is sufficient for most behavioural
      metrics and is cheap to compute and update.

      The width of the prediction interval is the tuning knob, and it trades precision against recall in
      the familiar way. A wide interval fires only on extreme deviations: high precision, low recall, it
      catches only the loud attacks. A narrow interval fires on modest deviations: high recall, lower
      precision, it catches subtle attacks but also ordinary variation. The interval width is set per
      metric from the residual spread, using the robust spread from 13.03 so that the interval is not
      itself inflated by contamination, and tuned against the precision and recall targets for that
      metric's alert tier.

  part_4:
    title: 'Streaming Detection: Scoring Each Point Without Recomputing History'
    body: |
      In production, the temporal detector sees one new observation at a time and must score it
      immediately, without recomputing the decomposition or refitting the forecaster over the entire
      history on every point. This is the streaming or online requirement, and it shapes the algorithm
      choice.

      A batch detector that recomputes the full decomposition on every new point is correct but does not
      scale: the cost grows with the history length, and the per-point latency drifts upward as the
      series lengthens. The streaming detector instead maintains a compact running state -- the current
      level, the current seasonal factors, the running residual spread -- and updates that state
      incrementally as each observation arrives. Exponential smoothing is the workhorse here: the level
      and the seasonal factors are updated by a small step toward each new observation, so the state
      reflects recent history without storing it, and the per-point cost is constant regardless of how
      long the series has run.

      The streaming detector scores each point against the current forecast and interval, then updates
      its state with the observation -- subject to the same contamination discipline as the baseline: a
      flagged observation updates the anomaly score but is held out of the state update, so a sustained
      attack does not smooth itself into the level and seasonal factors. This is the time-series analogue
      of the 13.03 contamination guard, and it is what keeps the slow ramp from being absorbed into the
      forecaster the way it would otherwise be absorbed into the baseline.

  part_5:
    title: 'Change-Point Detection: When the Behaviour Changed'
    body: |
      Outlier detection and change-point detection answer different questions, and the difference matters
      for one specific attack. Outlier detection asks which observation is anomalous: a single point far
      from expectation. Change-point detection asks when did the distribution of the metric change: not
      one outlier point, but a sustained shift from one regime to another. The account-compromise attack
      is a change-point, not an outlier.

      When an account is compromised, the attacker's behaviour is often not a single dramatic spike. It
      is a sustained change in the entity's normal: the request rate steps to a new level, the endpoint
      mix shifts, the time-of-day pattern changes, and stays changed. Each individual observation in the
      new regime may sit within the interval that the forecaster, adapting, has come to expect -- so
      outlier detection, especially a streaming detector that smooths toward the new level, stops firing
      after the transition. Change-point detection catches the transition itself: it monitors for the
      moment the metric's distribution shifts and flags that moment, regardless of whether individual
      post-transition points look anomalous.

      The practical method monitors a statistic that is sensitive to a level or distribution shift -- a
      cumulative-sum of deviations, or a comparison of the recent window's distribution against the
      preceding window's -- and flags when that statistic crosses a threshold, indicating the two windows
      are drawn from different distributions. The change-point signal is high-value precisely because it
      survives the forecaster's adaptation: even as the streaming detector learns to accept the new
      regime, the change-point detector has recorded that a regime change happened, which is the
      account-compromise alert. The two detectors are complementary and both belong in the temporal
      family.

  part_6:
    title: 'Multi-Resolution Analysis: Catching the Spike and the Slow Ramp'
    body: |
      The two highest-value temporal attacks have opposite signatures, and a detector tuned for one is
      blind to the other. The burst attack is high amplitude and short duration: a sudden spike of
      requests, a flood, a rapid enumeration. It is obvious at a fine time resolution -- per-minute or
      per-second -- where the spike towers over the surrounding values, and it is invisible at a coarse
      resolution where it is averaged into a single slightly-elevated hour. The slow-ramp attack is the
      mirror image: low amplitude per step and long duration, a request rate that creeps up by a few
      percent a day over weeks. It is invisible at a fine resolution, where each step is lost in ordinary
      variation, and obvious at a coarse resolution, where the cumulative trend over weeks is unmistakable.

      No single time resolution catches both. A detector that aggregates per minute sees the burst and
      misses the ramp; a detector that aggregates per day sees the ramp and misses the burst. Multi-
      resolution analysis runs the temporal detection at several time scales in parallel -- per minute,
      per hour, per day -- and combines the signals. The burst fires the fine-resolution detector; the
      ramp fires the coarse-resolution detector; the entity is flagged if any resolution fires. This is
      the temporal analogue of the multi-track gateway: parallel detectors at different scales, each
      covering the attacks the others miss.

      The combination is not a simple union of alerts, because a single underlying event can fire several
      resolutions and should not be triple-counted, and because the resolutions differ in their false-
      positive characteristics. The fine resolution is noisier and produces more false positives per
      alert; the coarse resolution is steadier but slower. The combined signal weights the resolutions by
      their reliability and deduplicates alerts that trace to the same underlying interval, producing one
      temporal anomaly verdict per entity that reflects whichever resolution carries the real signal. The
      output is the temporal anomaly score that 13.07 and 13.10 consume, and it is, by construction,
      sensitive to both the spike and the ramp.

