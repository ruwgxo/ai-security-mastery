section_summary:
  one_paragraph: |
    Section 5.2 builds the definitive eight-layer attack surface taxonomy for
    AI and LLM systems: data collection, feature engineering and preprocessing,
    training pipeline, model weights and artefacts, inference pipeline, API and
    serving infrastructure, application integration, and output handling. Each
    layer is characterised by its primary assets, most likely threat actors,
    specific attack types with detectability and persistence ratings, and
    corresponding detection approaches with chapter cross-references. Three
    realistic multi-stage attack chains — supply chain to inference evasion,
    indirect injection to plugin exploitation, and fine-tune poisoning to
    compliance bypass — demonstrate why single-layer defences fail against
    sophisticated adversaries and which cross-layer controls are required.
    The section closes with a prioritised detection investment roadmap
    (Phase 1: Layers 5-8, Phase 2: Layers 2 and 7, Phase 3: Layers 1, 3, 4)
    that structures the detection engineering program built in Part 3.

  next_section: |
    Section 5.3 — OWASP LLM Top 10: Framework and Methodology
    With the complete eight-layer attack surface mapped, Section 5.3 introduces
    the OWASP LLM Top 10 as the industry-standard risk classification system.
    Every OWASP risk maps to one or more layers of the taxonomy established
    in this section — making OWASP not just a checklist but a structured
    communication layer over the technical attack surface model.

