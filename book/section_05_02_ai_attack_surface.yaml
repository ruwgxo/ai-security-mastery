                      detection_approach="Usage anomaly detection; geographic monitoring; rate alerting",
                      chapter_coverage="Chapter 4, Section 4.16 — LLM API Architecture",
                  ),
                  AttackType(
                      name="Cost Attack",
                      description="Generate maximum token volume to exhaust billing budget",
                      access_required="API access (own or compromised key)",
                      detectability=DetectabilityLevel.HIGH,
                      persistence=PersistenceLevel.SESSION,
                      detection_approach="Real-time cost monitoring; hard budget caps",
                      chapter_coverage="Section 5.5 — OWASP LLM04",
                  ),
              ],
          ),
          AttackSurfaceLayer(
              number=7,
              name="Application Integration",
              description="Tool use, plugins, database connections, code execution, agentic workflows",
              primary_assets=[
                  "Tool definitions and function calling schemas",
                  "Plugin implementations and permissions",
                  "Database and API connections",
                  "Code execution environment",
              ],
              threat_actors=[
                  ThreatActorType.EXTERNAL_ATTACKER,
              ],
              attack_types=[
                  AttackType(
                      name="Confused Deputy via Plugin",
                      description="Prompt injection causes LLM to call plugins with adversary-specified parameters using app-level permissions",
                      access_required="API access only (via injection)",
                      detectability=DetectabilityLevel.MEDIUM,
                      persistence=PersistenceLevel.SESSION,
                      detection_approach="Tool call parameter validation; human confirmation for irreversible actions",
                      chapter_coverage="Section 5.6 — OWASP LLM07",
                  ),
                  AttackType(
                      name="Indirect Injection via Tool Output",
                      description="Adversarial instructions in web pages, documents, or DB rows read by the agent",
                      access_required="Ability to place content in any data source the agent reads",
                      detectability=DetectabilityLevel.MEDIUM,
                      persistence=PersistenceLevel.DEPLOYMENT,
                      detection_approach="Injection detection in tool output; sandboxed tool execution",
                      chapter_coverage="Chapter 6 — Prompt Injection Attacks",
                  ),
                  AttackType(
                      name="Plugin SSRF",
                      description="LLM directed to make outbound requests to internal network addresses",
                      access_required="API access only (via injection)",
                      detectability=DetectabilityLevel.MEDIUM,
                      persistence=PersistenceLevel.SESSION,
                      detection_approach="Egress filtering; URL validation; metadata endpoint blocklists",
                      chapter_coverage="Section 5.6 — OWASP LLM07",
                  ),
              ],
          ),
          AttackSurfaceLayer(
              number=8,
              name="Output Handling",
              description="UI rendering, output logging, downstream API consumption, inter-model pipelines",
              primary_assets=[
                  "UI rendering engine",
                  "Output logging and storage",
                  "Downstream APIs and systems",
                  "Output post-processing pipeline",
              ],
              threat_actors=[
                  ThreatActorType.EXTERNAL_ATTACKER,
              ],
              attack_types=[
                  AttackType(
                      name="XSS via LLM Output",
                      description="LLM prompted to include malicious JavaScript rendered in browser",
                      access_required="API access only",
                      detectability=DetectabilityLevel.HIGH,
                      persistence=PersistenceLevel.SESSION,
                      detection_approach="Output sanitisation before rendering; CSP headers",
                      chapter_coverage="Section 5.5 — OWASP LLM02",
                  ),
                  AttackType(
                      name="Sensitive Data Disclosure via Output",
                      description="PII, credentials, or confidential context exposed in LLM output",
                      access_required="API access only",
                      detectability=DetectabilityLevel.MEDIUM,
                      persistence=PersistenceLevel.SESSION,
                      detection_approach="PII detection before logging; credential leakage detection",
                      chapter_coverage="Section 5.10-5.11 — Privacy Attacks",
                  ),
                  AttackType(
                      name="Output as Poisoned Input (Multi-Model Pipeline)",
                      description="Adversarial content in first model's output injects into second model's context",
                      access_required="API access to first model in pipeline",
                      detectability=DetectabilityLevel.LOW,
                      persistence=PersistenceLevel.SESSION,
                      detection_approach="Injection detection on inter-model data flows; trust boundary enforcement",
                      chapter_coverage="Chapter 6 — Prompt Injection Attacks",
                  ),
              ],
          ),
      ]


      def generate_attack_surface_report(
          layers: List[AttackSurfaceLayer],
          deployment_name: str = "Enterprise LLM Deployment",
      ) -> Dict:
          """Generate a complete attack surface report for a deployment."""
          total_attack_types = sum(len(l.attack_types) for l in layers)
          high_detectability = sum(
              1 for l in layers for a in l.attack_types
              if a.detectability == DetectabilityLevel.HIGH
          )
          persistent_attacks = sum(
              1 for l in layers for a in l.attack_types
              if a.persistence == PersistenceLevel.TRAINING
          )

          return {
              "deployment": deployment_name,
              "summary": {
                  "total_layers": len(layers),
                  "total_attack_types_mapped": total_attack_types,
                  "high_detectability_attacks": high_detectability,
                  "low_detectability_attacks": total_attack_types - high_detectability,
                  "training_persistent_attacks": persistent_attacks,
                  "session_contained_attacks": sum(
                      1 for l in layers for a in l.attack_types
                      if a.persistence == PersistenceLevel.SESSION
                  ),
              },
              "layers": [
                  {
                      "layer": l.number,
                      "name": l.name,
                      "threat_actors": [ta.value for ta in l.threat_actors],
                      "attack_count": len(l.attack_types),
                      "attacks": [
                          {
                              "name": a.name,
                              "detectability": a.detectability.value,
                              "persistence": a.persistence.value,
                              "detection_approach": a.detection_approach,
                              "chapter": a.chapter_coverage,
                          }
                          for a in l.attack_types
                      ],
                  }
                  for l in layers
              ],
          }


      def print_threat_actor_coverage(layers: List[AttackSurfaceLayer]) -> None:
          """Show which layers each threat actor can reach."""
          print("\nTHREAT ACTOR → ACCESSIBLE LAYERS")
          print("=" * 55)
          actor_layers: Dict[ThreatActorType, List[int]] = {}
          for actor in ThreatActorType:
              actor_layers[actor] = [
                  l.number for l in layers if actor in l.threat_actors
              ]

          for actor, accessible in actor_layers.items():
              if accessible:
                  print(f"  {actor.value:30s} → Layers {accessible}")

          print()
          print("EXTERNAL ATTACKER NOTE:")
          print("  External attackers reach Layers 4-8 via supply chain and API.")
          print("  Layers 1-3 require insider access or supply chain compromise.")


      def print_prioritisation_matrix(layers: List[AttackSurfaceLayer]) -> None:
          """Print detection investment prioritisation."""
          print("\nDETECTION INVESTMENT PRIORITISATION")
          print("=" * 55)
          print(f"{'Layer':<8} {'Name':<30} {'Exposure':<12} {'Priority'}")
          print("-" * 65)

          priorities = {
              6: ("High", "Phase 1 — Immediate"),
              5: ("High", "Phase 1 — Immediate"),
              8: ("High", "Phase 1 — Immediate"),
              7: ("Medium", "Phase 2 — Near-term"),
              2: ("Medium", "Phase 2 — Near-term"),
              4: ("Low-Medium", "Phase 3 — Mature"),
              1: ("Low", "Phase 3 — Mature"),
              3: ("Low", "Phase 3 — Mature"),
          }
          for l in sorted(layers, key=lambda x: list(priorities.keys()).index(x.number)
                          if x.number in priorities else 99):
              exposure, phase = priorities.get(l.number, ("Unknown", "Unknown"))
              print(f"  {l.number:<6} {l.name:<30} {exposure:<12} {phase}")


      if __name__ == "__main__":
          report = generate_attack_surface_report(ATTACK_SURFACE_LAYERS)
          print(f"AI ATTACK SURFACE MAP — {report['deployment']}")
          print("=" * 55)
          s = report["summary"]
          print(f"Total layers:              {s['total_layers']}")
          print(f"Total attack types mapped: {s['total_attack_types_mapped']}")
          print(f"High detectability:        {s['high_detectability_attacks']}")
          print(f"Low detectability:         {s['low_detectability_attacks']}")
          print(f"Training-persistent:       {s['training_persistent_attacks']}")
          print(f"Session-contained:         {s['session_contained_attacks']}")

          print_threat_actor_coverage(ATTACK_SURFACE_LAYERS)
          print_prioritisation_matrix(ATTACK_SURFACE_LAYERS)

          with open("ai_attack_surface_map.json", "w") as f:
              json.dump(report, f, indent=2)
          print("\nFull report saved to: ai_attack_surface_map.json")

  implementation_02:
    title: "Multi-Layer Attack Chain Simulator"
    filename: "attack_chain_simulator.py"
    purpose: |
      Simulates the three documented attack chains from Section 5.2.10.
      Demonstrates how single-layer defences fail against multi-stage attacks
      and validates that the correct cross-layer controls would catch each chain.
    language: "python"
    code: |
      """
      Multi-Layer Attack Chain Simulator
      Demonstrates why single-layer defence fails against realistic attack chains.
      Each chain is modelled as a sequence of layer transitions.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional
      from enum import Enum


      class LayerControlStatus(Enum):
          CONTROLLED = "controlled"       # Defence in place, attack blocked
          UNCONTROLLED = "uncontrolled"   # No defence, attack proceeds
          DETECTED = "detected"           # No block but detection fires


      @dataclass
      class AttackStage:
          layer: int
          layer_name: str
          action: str
          blocked_by: Optional[str]           # Control that blocks this stage (if any)
          detected_by: Optional[str]          # Detection that fires (if any)
          proceeds_if_uncontrolled: bool = True


      @dataclass
      class AttackChain:
          name: str
          description: str
          stages: List[AttackStage]
          single_layer_defence_assumption: str
          why_single_layer_fails: str
          correct_cross_layer_controls: List[str]


      ATTACK_CHAINS = [
          AttackChain(
              name="Supply Chain to Inference Evasion",
              description="Backdoored HuggingFace model deployed and activated via trigger",
              stages=[
                  AttackStage(
                      layer=4,
                      layer_name="Model Weights",
                      action="Adversary uploads backdoored model to HuggingFace",
                      blocked_by="SafeTensors compliance check + supply chain audit",
                      detected_by="Behaviour evaluation on diverse input distributions",
                      proceeds_if_uncontrolled=True,
                  ),
                  AttackStage(
                      layer=5,
                      layer_name="Inference Pipeline",
                      action="Organisation deploys model — all standard evaluations pass",
                      blocked_by=None,  # Cannot block at this layer if L4 missed it
                      detected_by="Anomalous trigger-pattern input monitoring",
                      proceeds_if_uncontrolled=True,
                  ),
                  AttackStage(
                      layer=6,
                      layer_name="API",
                      action="Adversary sends trigger sequence — jailbreak detectors pass it",
                      blocked_by=None,  # Trigger does not look like known jailbreak
                      detected_by="Correlated output anomaly detection after trigger input",
                      proceeds_if_uncontrolled=True,
                  ),
              ],
              single_layer_defence_assumption="Inference-layer jailbreak detection catches all adversarial inputs",
              why_single_layer_fails=(
                  "The backdoor is in the weights (Layer 4), not the input. "
                  "Inference-layer controls cannot detect a vulnerability that was "
                  "inserted before deployment."
              ),
              correct_cross_layer_controls=[
                  "Layer 4: SafeTensors format enforcement",
                  "Layer 4: Supply chain provenance audit for all downloaded models",
                  "Layer 4: Behaviour regression testing with diverse input distributions",
                  "Layer 5: Output anomaly detection correlated with unusual input patterns",
                  "Layer 6: Cross-session output pattern analysis",
              ],
          ),
          AttackChain(
              name="Indirect Injection to Plugin Exploitation",
              description="Adversarial web page → RAG retrieval → agent tool call → data exfiltration",
              stages=[
                  AttackStage(
                      layer=2,
                      layer_name="Preprocessing / RAG",
                      action="Adversarial instructions retrieved from poisoned web page",
                      blocked_by="Injection detection on retrieved document content",
                      detected_by="Anomalous instruction-like content in retrieved chunks",
                      proceeds_if_uncontrolled=True,
                  ),
                  AttackStage(
                      layer=7,
                      layer_name="Application Integration",
                      action="LLM calls email plugin with adversary-specified parameters",
                      blocked_by="Human confirmation gate for outbound email",
                      detected_by="Anomalous email recipient / unexpected outbound communication",
                      proceeds_if_uncontrolled=True,
                  ),
                  AttackStage(
                      layer=8,
                      layer_name="Output Handling",
                      action="Conversation history exfiltrated; 'maintenance mode' logged",
                      blocked_by="Outbound data volume monitoring",
                      detected_by="Data volume anomaly on outbound communication",
                      proceeds_if_uncontrolled=True,
                  ),
              ],
              single_layer_defence_assumption="Input validation on direct API requests catches all injections",
              why_single_layer_fails=(
                  "The injection enters at Layer 2 (RAG retrieval) — not through the "
                  "direct API input. API-layer input validation never sees the injected "
                  "content. The impact is at Layer 7 and 8."
              ),
              correct_cross_layer_controls=[
                  "Layer 2: Content scanning of all RAG-retrieved documents pre-context-assembly",
                  "Layer 7: Human confirmation for all outbound communications",
                  "Layer 7: Tool call parameter anomaly detection",
                  "Layer 8: Outbound data volume monitoring",
              ],
          ),
          AttackChain(
              name="Fine-Tune Poisoning to Compliance Bypass",
              description="Insider poisons fine-tune data → biased model deployed → systematic compliance failure",
              stages=[
                  AttackStage(
                      layer=1,
                      layer_name="Data Collection",
                      action="0.1% of fine-tune samples modified for targeted demographic pattern",
                      blocked_by="Label consistency auditing; demographic distribution analysis",
                      detected_by="Cross-validator label anomaly detection",
                      proceeds_if_uncontrolled=True,
                  ),
                  AttackStage(
                      layer=3,
                      layer_name="Training Pipeline",
                      action="Fine-tuning amplifies poisoned signal; model trained with bias",
                      blocked_by="Separation of duties; training pipeline access controls",
                      detected_by="Training loss curve anomaly; output fairness monitoring during training",
                      proceeds_if_uncontrolled=True,
                  ),
                  AttackStage(
                      layer=8,
                      layer_name="Output Handling",
                      action="Systematic quality degradation for targeted users — invisible per-interaction",
                      blocked_by=None,  # Invisible at interaction level
                      detected_by="Statistical output quality analysis across demographic groups",
                      proceeds_if_uncontrolled=True,
                  ),
              ],
              single_layer_defence_assumption="Output monitoring on individual responses catches harmful content",
              why_single_layer_fails=(
                  "No individual output looks wrong. The attack is visible only as a "
                  "statistical pattern across thousands of interactions. Individual output "
                  "monitoring misses it entirely."
              ),
              correct_cross_layer_controls=[
                  "Layer 1: Label consistency auditing; demographic distribution analysis in training data",
                  "Layer 3: Separation of duties for fine-tuning pipeline; access control audit",
                  "Layer 5/8: Statistical fairness monitoring across user demographic groups",
              ],
          ),
      ]


      def simulate_attack_chain(
          chain: AttackChain,
          controls_active: Dict[int, bool],  # layer -> has_control
      ) -> None:
          """
          Simulate an attack chain given which layer controls are active.

          Args:
              chain: The attack chain to simulate
              controls_active: Dict of layer number -> True if control is active
          """
          print(f"\n{'='*60}")
          print(f"ATTACK CHAIN: {chain.name}")
          print(f"{'='*60}")
          print(f"Description: {chain.description}")
          print(f"\nSingle-layer defence assumption tested:")
          print(f"  '{chain.single_layer_defence_assumption}'")
          print(f"\nWhy this fails: {chain.why_single_layer_fails}")
          print(f"\nSimulation:")

          chain_succeeded = True
          for i, stage in enumerate(chain.stages):
              has_control = controls_active.get(stage.layer, False)
              print(f"\n  Stage {i+1} — Layer {stage.layer} ({stage.layer_name}):")
              print(f"    Action: {stage.action}")

              if has_control and stage.blocked_by:
                  print(f"    ✅ BLOCKED by: {stage.blocked_by}")
                  chain_succeeded = False
                  break
              elif stage.detected_by:
                  print(f"    ⚠️  PROCEEDS — DETECTED by: {stage.detected_by}")
              else:
                  print(f"    🚨 PROCEEDS — NO DETECTION")

          print(f"\nOUTCOME: {'🚨 ATTACK SUCCEEDED' if chain_succeeded else '✅ ATTACK BLOCKED'}")
          print(f"\nCorrective cross-layer controls needed:")
          for ctrl in chain.correct_cross_layer_controls:
              print(f"  → {ctrl}")


      if __name__ == "__main__":
          print("SCENARIO 1: Only inference-layer controls active (common gap)")
          inference_only_controls = {5: True, 6: True}

          for chain in ATTACK_CHAINS:
              simulate_attack_chain(chain, inference_only_controls)

          print("\n\nSCENARIO 2: Cross-layer controls active (correct posture)")
          cross_layer_controls = {1: True, 2: True, 3: True, 4: True,
                                   5: True, 6: True, 7: True, 8: True}

          for chain in ATTACK_CHAINS:
              simulate_attack_chain(chain, cross_layer_controls)

  implementation_03:
    title: "Detection Gap Analysis Tool"
    filename: "detection_gap_analysis.py"
    purpose: |
      Takes a list of currently active detection controls (by layer) and
      produces a structured gap analysis: which attack types are undetected,
      which layers have no coverage, and a prioritised remediation roadmap.
    language: "python"
    code: |
      """
      Detection Gap Analysis Tool
      Input: your current detection controls per layer
      Output: coverage score, uncovered attacks, prioritised remediation plan
      """

      from typing import List, Dict
      import json


      # Simplified layer/attack reference for gap analysis
      ALL_ATTACKS = [
          {"id": "L1-001", "layer": 1, "name": "Label Flipping", "priority": 3},
          {"id": "L1-002", "layer": 1, "name": "Backdoor Data Insertion", "priority": 3},
          {"id": "L1-003", "layer": 1, "name": "Preference Data Manipulation", "priority": 3},
          {"id": "L2-001", "layer": 2, "name": "Tokeniser Exploitation", "priority": 2},
          {"id": "L2-002", "layer": 2, "name": "RAG Indirect Injection", "priority": 2},
          {"id": "L2-003", "layer": 2, "name": "Prompt Template Injection", "priority": 2},
          {"id": "L3-001", "layer": 3, "name": "Gradient Manipulation", "priority": 3},
          {"id": "L3-002", "layer": 3, "name": "Checkpoint Poisoning", "priority": 3},
          {"id": "L4-001", "layer": 4, "name": "Malicious Pickle Deserialisation", "priority": 2},
          {"id": "L4-002", "layer": 4, "name": "LoRA Adapter Substitution", "priority": 2},
          {"id": "L4-003", "layer": 4, "name": "Model Weight Theft", "priority": 2},
          {"id": "L5-001", "layer": 5, "name": "Adversarial Inputs", "priority": 2},
          {"id": "L5-002", "layer": 5, "name": "Model Extraction via API", "priority": 2},
          {"id": "L5-003", "layer": 5, "name": "KV Cache Side Channel", "priority": 3},
          {"id": "L5-004", "layer": 5, "name": "Denial of Service / Sponge Examples", "priority": 1},
          {"id": "L6-001", "layer": 6, "name": "API Key Compromise", "priority": 1},
          {"id": "L6-002", "layer": 6, "name": "Cost Attack", "priority": 1},
          {"id": "L7-001", "layer": 7, "name": "Confused Deputy via Plugin", "priority": 2},
          {"id": "L7-002", "layer": 7, "name": "Indirect Injection via Tool Output", "priority": 2},
          {"id": "L7-003", "layer": 7, "name": "Plugin SSRF", "priority": 2},
          {"id": "L8-001", "layer": 8, "name": "XSS via LLM Output", "priority": 1},
          {"id": "L8-002", "layer": 8, "name": "Sensitive Data Disclosure", "priority": 2},
          {"id": "L8-003", "layer": 8, "name": "Output as Poisoned Input", "priority": 3},
      ]
      # Priority: 1=immediate, 2=near-term, 3=mature


      def run_gap_analysis(
          covered_attack_ids: List[str],
          deployment_name: str = "My LLM Deployment",
      ) -> None:
          """
          Run detection gap analysis.

          Args:
              covered_attack_ids: List of attack IDs your current controls cover
              deployment_name: Name of the deployment being assessed
          """
          covered = set(covered_attack_ids)
          uncovered = [a for a in ALL_ATTACKS if a["id"] not in covered]
          total = len(ALL_ATTACKS)
          coverage_pct = len(covered) / total * 100

          print(f"\nDETECTION GAP ANALYSIS — {deployment_name}")
          print("=" * 60)
          print(f"Attack types in scope: {total}")
          print(f"Currently covered:     {len(covered)} ({coverage_pct:.0f}%)")
          print(f"Gaps identified:       {len(uncovered)}")

          print("\nGAPS BY PRIORITY:")
          for priority_label, priority_num in [
              ("🚨 Phase 1 — Immediate", 1),
              ("⚠️  Phase 2 — Near-term", 2),
              ("📋 Phase 3 — Mature",    3),
          ]:
              phase_gaps = [a for a in uncovered if a["priority"] == priority_num]
              if phase_gaps:
                  print(f"\n  {priority_label}:")
                  for a in phase_gaps:
                      print(f"    [{a['id']}] Layer {a['layer']}: {a['name']}")

          uncovered_layers = sorted(set(a["layer"] for a in uncovered))
          print(f"\nLAYERS WITH GAPS: {uncovered_layers}")
          print("\nNEXT ACTION: Address Phase 1 gaps before proceeding to Phase 2.")


      if __name__ == "__main__":
          # Example: organisation with only basic API-layer controls
          current_coverage = [
              "L6-001",  # API key monitoring in place
              "L6-002",  # Cost monitoring in place
              "L5-004",  # Input length limits in place
              "L8-001",  # Output HTML sanitisation in place
          ]
          run_gap_analysis(current_coverage, "Example Enterprise LLM — Initial Posture")

