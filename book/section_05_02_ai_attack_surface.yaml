# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    The AI attack surface has eight distinct layers: data collection, feature
    engineering/preprocessing, training pipeline, model weights/artefacts,
    inference pipeline, API/serving infrastructure, application integration,
    and output handling. Each layer has independent threat actors, attack types,
    and required controls.

  takeaway_02: |
    Four of these eight layers — data, training pipeline, model weights, and
    the inference pipeline's latent space — are entirely new compared to
    traditional software security. There is no equivalent attack surface in
    deterministic systems.

  takeaway_03: |
    Threat actors are layer-specific: external attackers predominantly reach
    Layers 4-8; insiders and nation-state actors target Layers 1-4. Detection
    investment should be calibrated to the most likely threat actors for a
    given deployment context.

  takeaway_04: |
    Layer attacks can produce symptoms at completely different layers. Training
    data poisoning (Layer 1) produces inference anomalies (Layer 5). This
    cross-layer symptom displacement is why single-layer defences fail
    against sophisticated adversaries.

  takeaway_05: |
    Detectability varies systematically by layer. Layer 6 (API) is highly
    detectable with existing tooling. Layers 1-3 (data, training) are low
    detectability and require new instrumentation. Mature security programs
    invest in detection at all layers; initial programs focus on Layers 5-8.

  takeaway_06: |
    Multi-stage attack chains are the realistic threat model. The three chains
    documented in Section 5.2.10 represent common real-world patterns:
    supply chain to inference evasion, indirect injection to plugin exploitation,
    and training poison to compliance bypass.

  takeaway_07: |
    Defence-in-depth for AI means controls at every independent layer — not
    just the deployment perimeter. A well-secured API layer provides zero
    protection against a backdoored base model downloaded from a public repository.

  takeaway_08: |
    The detection gap analysis tool (implementation_03) is the practical output
    of this section. Run it against your current control inventory before
    designing the detection program in Part 3. The gap list becomes your backlog.

