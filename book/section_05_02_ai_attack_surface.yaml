    filename: "ai_attack_surface_map.py"
    purpose: |
      Generates the complete 8-layer attack surface specification for an AI
      deployment and produces a structured assessment template for use in
      red team engagements and detection program gap analyses.
    language: "python"
    code: |
      """
      AI Attack Surface Map Generator
      Produces a structured attack surface specification for any AI/LLM deployment.
      Output used for: red team scoping, detection gap analysis, risk communication.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional
      from enum import Enum
      import json


      class ThreatActorType(Enum):
          EXTERNAL_ATTACKER = "external_attacker"
          INSIDER = "insider"
          SUPPLY_CHAIN = "supply_chain"
          NATION_STATE = "nation_state"
          RESEARCHER = "researcher"


      class DetectabilityLevel(Enum):
          HIGH = "high"       # Logs already available, controls already exist
          MEDIUM = "medium"   # Requires new logging or analysis tooling
          LOW = "low"         # Requires significant new instrumentation


      class PersistenceLevel(Enum):
          SESSION = "session"             # Attack effect ends with session
          DEPLOYMENT = "deployment"       # Persists until model redeployment
          TRAINING = "training"           # Persists until full retrain with clean data


      @dataclass
      class AttackType:
          name: str
          description: str
          access_required: str
          detectability: DetectabilityLevel
          persistence: PersistenceLevel
          detection_approach: str
          chapter_coverage: str


      @dataclass
      class AttackSurfaceLayer:
          number: int
          name: str
          description: str
          primary_assets: List[str]
          threat_actors: List[ThreatActorType]
          attack_types: List[AttackType]
          has_coverage: bool = False           # Set during gap analysis
