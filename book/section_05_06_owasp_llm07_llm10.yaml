implementations:

  implementation_01:
    title: "LLM07 Plugin Security Audit + LLM08 Agency Risk Calculator"
    filename: "llm07_08_security_tools.py"
    purpose: |
      PluginAudit: scores a plugin against the five secure design principles and
      produces a threat model entry with gap list.
      AgencyRiskCalculator: applies the CAI formula to any agentic deployment,
      produces a risk score with tier and reduction recommendations.
    language: "python"
    code: |
      """
      LLM07 Plugin Security Audit + LLM08 Agency Risk Calculator
      Assess plugin design quality and agent risk before deployment.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional


      # -----------------------------------------------------------------------
      # LLM07 Plugin Security Audit
      # -----------------------------------------------------------------------

      @dataclass
      class PluginSpec:
          name: str
          permission_scope: List[str]
          has_parameter_validation: bool
          has_external_network_access: bool
          has_confirmation_for_irreversible: bool
          has_action_logging: bool
          has_injection_scan_on_output: bool
          can_reach_external_domains: bool
          irreversibility_class: str   # "high" / "medium" / "low"
          data_sensitivity: str        # "high" / "medium" / "low"


      @dataclass
      class PluginAuditResult:
          plugin_name: str
          score: int
          risk_level: str
          gaps: List[str] = field(default_factory=list)
          recommendations: List[str] = field(default_factory=list)
          threat_model_entry: Dict = field(default_factory=dict)


      def audit_plugin(plugin: PluginSpec) -> PluginAuditResult:
          score = 100
          gaps = []
          recommendations = []

          # Principle 1: Least privilege
          dangerous = [p for p in plugin.permission_scope
                       if any(x in p for x in ["write", "delete", "execute", "send", "admin"])]
          if len(dangerous) > 2:
              score -= 20
              gaps.append(f"Over-permissioned: {len(dangerous)} write/delete/execute permissions")
              recommendations.append("Decompose into separate single-responsibility plugins")

          # Principle 2: Parameter validation
          if not plugin.has_parameter_validation:
              score -= 25
              gaps.append("No independent parameter validation at plugin boundary")
              recommendations.append("Add parameter validation layer independent of LLM output")

          # Principle 3: Confirmation for irreversible
          if plugin.irreversibility_class == "high" and not plugin.has_confirmation_for_irreversible:
              score -= 30
              gaps.append("High-irreversibility plugin has no human confirmation gate")
              recommendations.append("Implement human-in-the-loop for all irreversible actions")
          elif plugin.irreversibility_class == "medium" and not plugin.has_confirmation_for_irreversible:
              score -= 10
              gaps.append("Medium-irreversibility plugin has no confirmation mechanism")

          # Principle 4: Injection scan on output
          if not plugin.has_injection_scan_on_output:
              score -= 15
              gaps.append("Plugin output not scanned for injection before context re-entry")
              recommendations.append("Apply injection scanner to all plugin output")

          # Principle 5: Action logging
          if not plugin.has_action_logging:
              score -= 10
              gaps.append("Plugin calls not logged with full parameters")
              recommendations.append("Implement structured logging for all invocations")

          # SSRF risk
          if plugin.can_reach_external_domains and not plugin.has_parameter_validation:
              score -= 15
              gaps.append("External network access with no URL validation — SSRF risk")
              recommendations.append("Implement URL allowlist and blocklist before any HTTP call")

          score = max(0, score)
          risk_level = (
              "critical" if score < 40
              else "high"   if score < 60
              else "medium" if score < 80
              else "low"
          )

          return PluginAuditResult(
              plugin_name=plugin.name,
              score=score,
              risk_level=risk_level,
              gaps=gaps,
              recommendations=recommendations,
              threat_model_entry={
                  "plugin": plugin.name,
                  "permissions": plugin.permission_scope,
                  "irreversibility": plugin.irreversibility_class,
                  "data_sensitivity": plugin.data_sensitivity,
                  "external_network": plugin.can_reach_external_domains,
                  "audit_score": score,
                  "risk_level": risk_level,
                  "gaps": gaps,
              },
          )


      # -----------------------------------------------------------------------
      # LLM08 Agency Risk Calculator
      # -----------------------------------------------------------------------

      @dataclass
      class AgentSpec:
          name: str
          plugins: List[PluginSpec]
          autonomy_score: float
          autonomy_description: str
          has_agent_loop_limit: bool
          has_session_token_limit: bool
          has_rollback_capability: bool
          deployment_context: str


      @dataclass
      class AgencyRiskResult:
          agent_name: str
          capability_score: float
          autonomy_score: float
          irreversibility_score: float
          cai_raw: float
          cai_normalised: float
          risk_level: str
          reduction_recommendations: List[str] = field(default_factory=list)
          plugin_audit_results: List[PluginAuditResult] = field(default_factory=list)


      def _capability_score(plugins: List[PluginSpec]) -> float:
          base = min(len(plugins) * 0.8, 5.0)
          dangerous_count = sum(
              1 for p in plugins
              for perm in p.permission_scope
              if any(x in perm for x in ["write", "delete", "execute", "send_external", "admin"])
          )
          return min(base + min(dangerous_count * 0.8, 5.0), 10.0)


      def _irreversibility_score(plugins: List[PluginSpec]) -> float:
          weights = {"high": 3.0, "medium": 1.5, "low": 0.5}
          if not plugins:
              return 0.0
          return min(sum(weights.get(p.irreversibility_class, 0) for p in plugins), 10.0)


      def compute_agency_risk(agent: AgentSpec) -> AgencyRiskResult:
          C = _capability_score(agent.plugins)
          A = agent.autonomy_score
          I = _irreversibility_score(agent.plugins)
          cai_raw = C * A * I
          cai_norm = cai_raw / 100.0

          if cai_raw > 600:   risk_level = "critical"
          elif cai_raw > 300: risk_level = "high"
          elif cai_raw > 100: risk_level = "medium"
          else:               risk_level = "low"

          recs = []
          if C > 7:
              recs.append(f"Reduce capability ({C:.1f}/10): remove plugins or narrow scopes")
          if A > 6:
              recs.append(f"Reduce autonomy ({A}/10): add confirmation gates for high-risk actions")
          if I > 6:
              recs.append(f"Reduce irreversibility ({I:.1f}/10): prefer draft/staging before production")
          if not agent.has_agent_loop_limit:
              recs.append("Add agent loop iteration limit (recommend max 20 per session)")
          if not agent.has_rollback_capability:
              recs.append("Implement rollback for high-irreversibility actions where feasible")
          if not agent.has_session_token_limit:
              recs.append("Add per-session token limit")

          return AgencyRiskResult(
              agent_name=agent.name,
              capability_score=round(C, 2),
              autonomy_score=A,
              irreversibility_score=round(I, 2),
              cai_raw=round(cai_raw, 1),
              cai_normalised=round(cai_norm, 2),
              risk_level=risk_level,
              reduction_recommendations=recs,
              plugin_audit_results=[audit_plugin(p) for p in agent.plugins],
          )


      def print_agency_report(r: AgencyRiskResult) -> None:
          icons = {"critical": "CRITICAL", "high": "HIGH", "medium": "MEDIUM", "low": "LOW"}
          print(f"\n{'='*60}")
          print(f"AGENCY RISK — {r.agent_name}")
          print(f"  C={r.capability_score}  A={r.autonomy_score}  I={r.irreversibility_score}")
          print(f"  CAI Raw:      {r.cai_raw}")
          print(f"  CAI Norm:     {r.cai_normalised}/10")
          print(f"  Risk Level:   [{icons[r.risk_level]}]")
          for rec in r.reduction_recommendations:
              print(f"  -> {rec}")
          print(f"\n  Plugin Summary:")
          for pa in r.plugin_audit_results:
              print(f"    [{pa.risk_level.upper():8s}] {pa.plugin_name}: {pa.score}/100")
              for g in pa.gaps[:2]:
                  print(f"           Gap: {g}")


      if __name__ == "__main__":
          email_plugin = PluginSpec(
              name="email_sender",
              permission_scope=["email:send_external", "email:send_internal"],
              has_parameter_validation=False,
              has_external_network_access=True,
              has_confirmation_for_irreversible=False,
              has_action_logging=True,
              has_injection_scan_on_output=False,
              can_reach_external_domains=True,
              irreversibility_class="high",
              data_sensitivity="medium",
          )
          crm_plugin = PluginSpec(
              name="crm_reader",
              permission_scope=["crm:read_customer", "crm:read_notes"],
              has_parameter_validation=True,
              has_external_network_access=False,
              has_confirmation_for_irreversible=True,
              has_action_logging=True,
              has_injection_scan_on_output=False,
              can_reach_external_domains=False,
              irreversibility_class="low",
              data_sensitivity="high",
          )
          agent = AgentSpec(
              name="CustomerServiceAgent-v2",
              plugins=[email_plugin, crm_plugin],
              autonomy_score=7,
              autonomy_description="Auto-sends emails; reads CRM; confirms only account changes",
              has_agent_loop_limit=True,
              has_session_token_limit=False,
              has_rollback_capability=False,
              deployment_context="Production customer service SaaS",
          )
          print_agency_report(compute_agency_risk(agent))

  implementation_02:
    title: "LLM09 Hallucination Guard + LLM10 Extraction Cost Estimator"
    filename: "llm09_10_security_tools.py"
    purpose: |
      HallucinationGuard: factual grounding framework — citation enforcement,
      NLI-based claim verification scaffold, overreliance risk scoring.
      ExtractionCostEstimator: query budget and economic feasibility of model
      extraction for a given target model and rate limit configuration.
    language: "python"
    code: |
      """
      LLM09 Hallucination Guard + LLM10 Extraction Cost Estimator
      """

      import re
      import math
      from dataclasses import dataclass, field
      from typing import List, Dict, Optional, Tuple


      # -----------------------------------------------------------------------
      # LLM09 Hallucination Guard
      # -----------------------------------------------------------------------

      CITATION_PATTERN = re.compile(
          r"\[SOURCE:\s*([^\]]+)\]|\[(\d+)\]|\(([^)]+,\s*\d{4})\)"
      )
      FACTUAL_CLAIM_INDICATORS = [
          r"\b(according to|as stated in|per|the study shows|research indicates)\b",
          r"\b(the approved|the legal|the regulation|the policy|the guideline)\b",
          r"\b(dosage|dose|mg|ml|prescribed)\b",
          r"\b(revenue|profit|stock price|market cap|earnings)\b",
          r"\b(case law|ruling|precedent|statute|section \d+)\b",
          r"\b(the correct|the right|the safe|the recommended)\b",
      ]


      @dataclass
      class FactualClaim:
          claim_text: str
          citation_id: Optional[str]
          citation_verified: bool = False
          grounding_score: float = 0.0
          risk_level: str = "unknown"


      @dataclass
      class OverrelianceRiskAssessment:
          output_text: str
          claims: List[FactualClaim]
          overall_grounding_score: float
          high_risk_claims: List[FactualClaim]
          recommendation: str
          block_output: bool


      def extract_citations(text: str) -> List[str]:
          ids = []
          for m in CITATION_PATTERN.finditer(text):
              cid = m.group(1) or m.group(2) or m.group(3)
              if cid:
                  ids.append(cid.strip())
          return ids


      def identify_factual_claims(text: str) -> List[str]:
          sentences = re.split(r'(?<=[.!?])\s+', text)
          return [s for s in sentences
                  if any(re.search(p, s, re.IGNORECASE) for p in FACTUAL_CLAIM_INDICATORS)]


      def assess_overreliance_risk(
          output_text: str,
          knowledge_base_ids: List[str],
          high_stakes_domain: bool = False,
          require_citation_for_all_claims: bool = True,
      ) -> OverrelianceRiskAssessment:
          claim_texts = identify_factual_claims(output_text)
          cited_ids = extract_citations(output_text)
          claims = []

          for ct in claim_texts:
              cid = cited_ids[0] if cited_ids else None
              verified = cid in knowledge_base_ids if cid else False

              if verified:
                  grounding, risk = 0.85, "verified"
              elif cid and not verified:
                  grounding, risk = 0.10, "unsupported"
              else:
                  grounding, risk = 0.30, "unverified"

              claims.append(FactualClaim(
                  claim_text=ct[:150],
                  citation_id=cid,
                  citation_verified=verified,
                  grounding_score=grounding,
                  risk_level=risk,
              ))

          overall = sum(c.grounding_score for c in claims) / len(claims) if claims else 1.0
          high_risk = [c for c in claims if c.risk_level in ("unverified", "unsupported")]
          block_threshold = 0.5 if high_stakes_domain else 0.2
          block = bool(claims) and len(high_risk) / len(claims) > block_threshold

          if block:
              rec = "BLOCK: Too many unverified claims for high-stakes domain. Route to human review."
          elif high_risk:
              rec = f"FLAG: {len(high_risk)} unverified claim(s). Add citations or route to review."
          else:
              rec = "PASS: All detected factual claims have verified citations."

          return OverrelianceRiskAssessment(
              output_text=output_text[:200],
              claims=claims,
              overall_grounding_score=round(overall, 3),
              high_risk_claims=high_risk,
              recommendation=rec,
              block_output=block,
          )


      # -----------------------------------------------------------------------
      # LLM10 Extraction Cost Estimator
      # -----------------------------------------------------------------------

      @dataclass
      class ModelProfile:
          name: str
          parameter_count_billions: float
          estimated_training_cost_usd: float
          api_output_cost_per_1k_tokens_usd: float
          api_input_cost_per_1k_tokens_usd: float
          exposes_logprobs: bool
          avg_output_tokens_per_query: int = 200
          avg_input_tokens_per_query: int = 100


      @dataclass
      class RateLimitConfig:
          queries_per_day_per_account: int
          accounts_available_to_adversary: int
          account_creation_cost_usd: float = 0.0


      @dataclass
      class ExtractionFeasibilityReport:
          model_name: str
          extraction_method: str
          query_budget_60pct: int
          query_budget_80pct: int
          cost_60pct_usd: float
          cost_80pct_usd: float
          days_at_rate_limit: float
          economically_rational: bool
          rational_threshold_usd: float
          recommendation: str


      def _query_budget(params_b: float, fidelity: float, logprobs: bool) -> int:
          base = int(params_b ** 0.8 * 1_000_000)
          fid_mult = 10 ** (fidelity - 0.5)
          budget = base * fid_mult
          if logprobs:
              budget /= 10
          return max(int(budget), 10_000)


      def assess_extraction_feasibility(
          model: ModelProfile,
          rate_config: RateLimitConfig,
      ) -> ExtractionFeasibilityReport:
          q60 = _query_budget(model.parameter_count_billions, 0.60, model.exposes_logprobs)
          q80 = _query_budget(model.parameter_count_billions, 0.80, model.exposes_logprobs)

          cost_per_query = (
              model.avg_input_tokens_per_query / 1000 * model.api_input_cost_per_1k_tokens_usd +
              model.avg_output_tokens_per_query / 1000 * model.api_output_cost_per_1k_tokens_usd
          )

          c60 = q60 * cost_per_query
          c80 = q80 * cost_per_query
          account_cost = rate_config.accounts_available_to_adversary * rate_config.account_creation_cost_usd
          total_c60 = c60 + account_cost
          daily_capacity = rate_config.queries_per_day_per_account * rate_config.accounts_available_to_adversary
          days = q60 / max(daily_capacity, 1)
          threshold = model.estimated_training_cost_usd * 0.20
          rational = total_c60 < threshold and days < 365

          method = "Distillation (logprobs)" if model.exposes_logprobs else "Hard-label extraction"

          if rational:
              rec = (f"EXTRACTION IS ECONOMICALLY RATIONAL: ${total_c60:,.0f} < "
                     f"${threshold:,.0f} threshold in {days:.0f} days. "
                     f"Tighten rate limits or disable logprobs.")
          else:
              rec = (f"Extraction IRRATIONAL at current limits: ${total_c60:,.0f} cost, "
                     f"{days:.0f} days vs ${threshold:,.0f} threshold.")

          return ExtractionFeasibilityReport(
              model_name=model.name,
              extraction_method=method,
              query_budget_60pct=q60,
              query_budget_80pct=q80,
              cost_60pct_usd=round(c60, 2),
              cost_80pct_usd=round(c80, 2),
              days_at_rate_limit=round(days, 1),
              economically_rational=rational,
              rational_threshold_usd=round(threshold, 2),
              recommendation=rec,
          )


      def print_extraction_report(r: ExtractionFeasibilityReport) -> None:
          print(f"\n{'='*55}")
          print(f"EXTRACTION FEASIBILITY — {r.model_name}")
          print(f"  Method:            {r.extraction_method}")
          print(f"  Queries (60% fit): {r.query_budget_60pct:>12,}")
          print(f"  Queries (80% fit): {r.query_budget_80pct:>12,}")
          print(f"  Cost (60%):        ${r.cost_60pct_usd:>11,.2f}")
          print(f"  Cost (80%):        ${r.cost_80pct_usd:>11,.2f}")
          print(f"  Days at limit:     {r.days_at_rate_limit:>12.1f}")
          print(f"  Rational thresh:   ${r.rational_threshold_usd:>11,.2f}")
          flag = "RATIONAL" if r.economically_rational else "NOT RATIONAL"
          print(f"  Result:            [{flag}]")
          print(f"  -> {r.recommendation}")


      if __name__ == "__main__":
          print("LLM09 HALLUCINATION GUARD DEMO")
          print("=" * 55)
          kb_ids = ["doc-001", "doc-002", "policy-2024-v3"]
          tests = [
              "Per our refund policy [SOURCE: policy-2024-v3], returns are accepted within 30 days.",
              "The approved dosage is 500mg twice daily per 2024 FDA guidance. Safe for all adults.",
              "Per Smith v. Jones [SOURCE: doc-999-FAKE], the clause is unenforceable.",
          ]
          for t in tests:
              r = assess_overreliance_risk(t, kb_ids, high_stakes_domain=True)
              flag = "BLOCK" if r.block_output else ("FLAG" if r.high_risk_claims else "PASS")
              print(f"\n[{flag}] {t[:70]}...")
              print(f"       Grounding: {r.overall_grounding_score:.2f} | {r.recommendation[:75]}")

          print("\n\nLLM10 EXTRACTION ESTIMATOR DEMO")
          model = ModelProfile(
              name="AcmeCorp-FinanceGPT-13B",
              parameter_count_billions=13,
              estimated_training_cost_usd=500_000,
              api_output_cost_per_1k_tokens_usd=0.02,
              api_input_cost_per_1k_tokens_usd=0.005,
              exposes_logprobs=True,
          )
          tight = RateLimitConfig(queries_per_day_per_account=1_000,  accounts_available_to_adversary=5,  account_creation_cost_usd=10.0)
          loose = RateLimitConfig(queries_per_day_per_account=100_000, accounts_available_to_adversary=20, account_creation_cost_usd=0.0)
          print_extraction_report(assess_extraction_feasibility(model, tight))
          print_extraction_report(assess_extraction_feasibility(model, loose))

  implementation_03:
    title: "Complete OWASP LLM Top 10 Detection Rule Registry"
    filename: "owasp_top10_detection_registry.py"
    purpose: |
      Unified detection rule sketch registry covering all ten OWASP LLM risks.
      Each rule specifies: data source, detection condition, severity, response action,
      and ATLAS technique. Produces a coverage report and exports Sigma-format stubs.
    language: "python"
    code: |
      """
      OWASP LLM Top 10 — Complete Detection Rule Sketch Registry
      20 rules covering all 10 risks. Exports Sigma stubs.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict
      import yaml


      @dataclass
      class DetectionRuleSketch:
          rule_id: str
          owasp_risk: str
          title: str
          data_source: str
          condition: str
          severity: str
          response_action: str
          atlas_technique: str
          false_positive_notes: str = ""


      DETECTION_REGISTRY: List[DetectionRuleSketch] = [

          # LLM01
          DetectionRuleSketch(
              rule_id="LLM01-001", owasp_risk="LLM01",
              title="Direct Prompt Injection in User Input",
              data_source="API input log",
              condition="Injection regex match OR classifier score > 0.7",
              severity="high",
              response_action="Flag session; add injection signal to output monitoring; rate-limit on repeat",
              atlas_technique="AML.T0051",
              false_positive_notes="Semantic classifier reduces FP from pattern matching",
          ),
          DetectionRuleSketch(
              rule_id="LLM01-002", owasp_risk="LLM01",
              title="Injection Pattern in RAG-Retrieved Document",
              data_source="RAG retrieval pipeline — chunk content pre-context-assembly",
              condition="Chunk injection scanner score > 0.6",
              severity="critical",
              response_action="Quarantine chunk; exclude from context; alert; flag source document",
              atlas_technique="AML.T0054",
              false_positive_notes="Very low FP — injection patterns rare in legitimate documents",
          ),
          DetectionRuleSketch(
              rule_id="LLM01-003", owasp_risk="LLM01",
              title="System Prompt Fragment in Model Output",
              data_source="API output log",
              condition="Output contains >10 consecutive tokens verbatim from system prompt",
              severity="critical",
              response_action="Block output; alert; investigate session for injection source",
              atlas_technique="AML.T0051",
          ),

          # LLM02
          DetectionRuleSketch(
              rule_id="LLM02-001", owasp_risk="LLM02",
              title="Script Tag or JavaScript in LLM Output",
              data_source="Output processing pipeline pre-render",
              condition="Output contains <script>, javascript:, onerror=, onload= patterns",
              severity="critical",
              response_action="Strip payload; sanitise output; log; alert on repeat",
              atlas_technique="AML.T0043",
              false_positive_notes="Medium FP in code generation deployments",
          ),
          DetectionRuleSketch(
              rule_id="LLM02-002", owasp_risk="LLM02",
              title="Internal URL in LLM-Generated Fetch Target",
              data_source="Plugin call parameter log (HTTP fetch plugin)",
              condition="URL parameter matches RFC 1918, localhost, or metadata endpoint",
              severity="critical",
              response_action="Block plugin call; alert; log full parameters",
              atlas_technique="AML.T0043",
          ),

          # LLM03
          DetectionRuleSketch(
              rule_id="LLM03-001", owasp_risk="LLM03",
              title="Unauthorised Write to Training Data Storage",
              data_source="Training infrastructure IAM and access logs",
              condition="Write access to training data, checkpoint storage, or reward model by non-authorised identity",
              severity="critical",
              response_action="Suspend access; alert; audit training run integrity",
              atlas_technique="AML.T0020",
          ),
          DetectionRuleSketch(
              rule_id="LLM03-002", owasp_risk="LLM03",
              title="Canary Token Recalled in Model Output",
              data_source="Output log + canary token registry",
              condition="Output contains exact match for any registered canary token",
              severity="critical",
              response_action="Incident response; confirm training data poisoning; initiate clean retrain",
              atlas_technique="AML.T0020",
              false_positive_notes="Zero FP by design — canary tokens are guaranteed unique",
          ),

          # LLM04
          DetectionRuleSketch(
              rule_id="LLM04-001", owasp_risk="LLM04",
              title="Input Token Count Exceeds 80 Percent of Context Window",
              data_source="API gateway pre-model token counter",
              condition="Input tokens > 0.8 x max_context_window",
              severity="medium",
              response_action="Block with HTTP 400; log; increment user anomaly score",
              atlas_technique="AML.T0029",
          ),
          DetectionRuleSketch(
              rule_id="LLM04-002", owasp_risk="LLM04",
              title="API Key Cost Anomaly",
              data_source="Billing and token usage telemetry",
              condition="Per-key spend in last 5 minutes > 3x rolling 7-day average",
              severity="high",
              response_action="Alert; suspend key pending review; apply hard budget cap",
              atlas_technique="AML.T0034",
              false_positive_notes="Exempt pre-registered batch job keys from this rule",
          ),

          # LLM05
          DetectionRuleSketch(
              rule_id="LLM05-001", owasp_risk="LLM05",
              title="Pickle Format Model File at Intake",
              data_source="Model registry intake pipeline — format check",
              condition="Model file header matches pickle magic bytes 0x80 0x02 or 0x80 0x04",
              severity="critical",
              response_action="Quarantine; do not load; alert; initiate supply chain investigation",
              atlas_technique="AML.T0010",
              false_positive_notes="Zero FP — pickle magic bytes are unambiguous",
          ),
          DetectionRuleSketch(
              rule_id="LLM05-002", owasp_risk="LLM05",
              title="Model File Hash Mismatch at Load Time",
              data_source="Model serving layer — load-time verification log",
              condition="SHA-256 at load != SHA-256 recorded at intake",
              severity="critical",
              response_action="Refuse load; alert; roll back to previous verified checkpoint",
              atlas_technique="AML.T0010",
          ),

          # LLM06
          DetectionRuleSketch(
              rule_id="LLM06-001", owasp_risk="LLM06",
              title="API Credential Pattern in Model Output",
              data_source="Output PII scanner",
              condition="Output matches AKIA*, sk-*, ghp_*, or generic API key regex",
              severity="critical",
              response_action="Block and redact output; alert; investigate training data",
              atlas_technique="AML.T0024",
              false_positive_notes="Very low FP — credential patterns are distinctive",
          ),
          DetectionRuleSketch(
              rule_id="LLM06-002", owasp_risk="LLM06",
              title="High-Volume Prefix Probing Pattern",
              data_source="API request log — per-user input pattern analysis",
              condition=">50 requests in 10 minutes sharing a common prefix pattern",
              severity="high",
              response_action="Rate-limit; flag for review; activate output perplexity monitoring",
              atlas_technique="AML.T0037",
          ),

          # LLM07
          DetectionRuleSketch(
              rule_id="LLM07-001", owasp_risk="LLM07",
              title="Email Plugin Recipient Outside Approved Domain",
              data_source="Plugin call parameter log",
              condition="Email recipient domain not in approved_domains allowlist",
              severity="critical",
              response_action="Block plugin call; alert; log full session",
              atlas_technique="AML.T0053",
              false_positive_notes="Zero FP if allowlist correctly configured",
          ),
          DetectionRuleSketch(
              rule_id="LLM07-002", owasp_risk="LLM07",
              title="Injection Pattern in Tool Output Pre-Context",
              data_source="Tool output processing pipeline",
              condition="Tool output injection scanner score > 0.7",
              severity="critical",
              response_action="Quarantine tool output; do not add to context; alert",
              atlas_technique="AML.T0051",
          ),

          # LLM08
          DetectionRuleSketch(
              rule_id="LLM08-001", owasp_risk="LLM08",
              title="Irreversible Action Without Confirmation Record",
              data_source="Agent action audit log + confirmation log",
              condition="High-irreversibility action in action log with no matching confirmation in session",
              severity="critical",
              response_action="Attempt reversal if possible; alert; suspend agent session",
              atlas_technique="AML.T0053",
          ),
          DetectionRuleSketch(
              rule_id="LLM08-002", owasp_risk="LLM08",
              title="Agent Loop Iteration Limit Exceeded",
              data_source="Agent orchestration telemetry",
              condition="Session agent loop iteration count > configured max (default 20)",
              severity="high",
              response_action="Terminate loop; surface state to user; log full tool call history",
              atlas_technique="AML.T0053",
          ),

          # LLM09
          DetectionRuleSketch(
              rule_id="LLM09-001", owasp_risk="LLM09",
              title="Low Grounding Score in High-Stakes Domain",
              data_source="Output processing — factual grounding classifier",
              condition="Grounding score < 0.5 AND deployment is high_stakes_domain=True",
              severity="high",
              response_action="Route to human review; withhold output; log",
              atlas_technique="AML.T0048",
          ),
          DetectionRuleSketch(
              rule_id="LLM09-002", owasp_risk="LLM09",
              title="Cited Source Not in Knowledge Base",
              data_source="Output processing — citation verifier",
              condition="Citation ID in model output not found in RAG knowledge base",
              severity="high",
              response_action="Flag citation as unverified; add disclaimer; log for quality monitoring",
              atlas_technique="AML.T0048",
          ),

          # LLM10
          DetectionRuleSketch(
              rule_id="LLM10-001", owasp_risk="LLM10",
              title="High-Volume Diverse Query Extraction Pattern",
              data_source="API request log — per-key analysis",
              condition="Key query volume > 10k/day AND input diversity > 0.85 AND avg_turns < 2",
              severity="high",
              response_action="Flag for investigation; apply additional rate limit; disable logprobs",
              atlas_technique="AML.T0040",
              false_positive_notes="Whitelist pre-registered evaluation pipelines",
          ),
          DetectionRuleSketch(
              rule_id="LLM10-002", owasp_risk="LLM10",
              title="Large Model Weight Download from Registry",
              data_source="Model registry storage access log",
              condition="Single-session download > 1GB by non-serving identity",
              severity="critical",
              response_action="Alert immediately; suspend download; verify authorisation",
              atlas_technique="AML.T0030",
          ),
      ]


      def generate_coverage_report(registry: List[DetectionRuleSketch]) -> Dict:
          risks = [f"LLM{i:02d}" for i in range(1, 11)]
          coverage = {}
          for risk in risks:
              rules = [r for r in registry if r.owasp_risk == risk]
              coverage[risk] = {
                  "rule_count": len(rules),
                  "covered": len(rules) > 0,
                  "rules": [r.rule_id for r in rules],
              }
          covered = sum(1 for v in coverage.values() if v["covered"])
          return {
              "total_rules": len(registry),
              "risks_covered": covered,
              "risks_total": len(risks),
              "coverage_pct": round(covered / len(risks) * 100, 1),
              "per_risk": coverage,
          }


      def print_coverage_report(report: Dict) -> None:
          print(f"\nOWASP LLM TOP 10 — DETECTION COVERAGE")
          print("=" * 50)
          print(f"Total rules:   {report['total_rules']}")
          print(f"Risks covered: {report['risks_covered']}/{report['risks_total']}")
          print(f"Coverage:      {report['coverage_pct']}%\n")
          for risk, data in report["per_risk"].items():
              icon = "OK" if data["covered"] else "MISSING"
              print(f"  [{icon:7s}] {risk}: {', '.join(data['rules'])}")


      def export_sigma_stubs(registry: List[DetectionRuleSketch],
                              output_file: str = "owasp_llm_sigma_stubs.yaml") -> None:
          stubs = [
              {
                  "title": r.title,
                  "id": r.rule_id,
                  "status": "experimental",
                  "description": f"OWASP {r.owasp_risk} — {r.title}",
                  "references": [f"MITRE ATLAS {r.atlas_technique}"],
                  "tags": [f"owasp.{r.owasp_risk.lower()}", f"atlas.{r.atlas_technique.lower()}"],
                  "logsource": {"product": "llm-platform", "service": r.data_source},
                  "detection": {
                      "selection": {"condition_description": r.condition},
                      "condition": "selection",
                  },
                  "level": r.severity,
                  "falsepositives": [r.false_positive_notes or "Unknown"],
                  "response": r.response_action,
              }
              for r in registry
          ]
          with open(output_file, "w") as f:
              yaml.dump(stubs, f, allow_unicode=True, sort_keys=False)
          print(f"\nSigma stubs exported to: {output_file}")


      if __name__ == "__main__":
          report = generate_coverage_report(DETECTION_REGISTRY)
          print_coverage_report(report)
          export_sigma_stubs(DETECTION_REGISTRY)
          print(f"\n{len(DETECTION_REGISTRY)} rules covering all 10 OWASP LLM Top 10 risks at {report['coverage_pct']}%")

