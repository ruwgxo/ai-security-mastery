section_summary:
  one_paragraph: |
    Section 5.6 completes the OWASP LLM Top 10 by providing full technical treatment
    of LLM07 through LLM10, closing with an integrated synthesis of all ten risks.
    The section opens by establishing that LLM07-LLM10 are qualitatively different from
    the first six risks because they exploit properties unique to LLMs: autonomous
    decision-making, real-world action consequences, confident confabulation, and
    reconstructible intellectual property. LLM07 (Insecure Plugin Design) is examined
    through the confused deputy pattern, three attack vectors (data exfiltration via
    email, SSRF via HTTP plugin, inter-agent privilege escalation), and five secure
    design principles (least privilege, parameter validation at the plugin boundary,
    human confirmation for irreversible actions, injection scanning on tool output,
    and action logging). LLM08 (Excessive Agency) introduces the Capability x Autonomy
    x Irreversibility formula with numerical risk thresholds (low < 100, medium < 300,
    high < 600, critical > 600) and deployment examples spanning read-only chatbots
    through autonomous DevOps agents. LLM09 (Overreliance) reframes hallucination as
    a security problem: four hallucination properties create adversarial exploitability,
    with mitigations including human review gates, RAG citation enforcement, NLI factual
    grounding classifiers, and structured output range validation. LLM10 (Model Theft)
    covers query-based extraction, distillation-based logprob extraction (10x more
    efficient), direct weight exfiltration, and architecture inference, with mitigations
    including economically-calibrated rate limits, logprob access restriction, and model
    watermarking. The synthesis section provides deployment-specific risk heat maps for
    three contexts, unified defence priorities by programme maturity, and the complete
    detection rule map for all ten risks. Three implementations deliver the plugin audit
    and CAI calculator, hallucination guard and extraction estimator, and a 20-rule
    detection registry covering all ten OWASP risks with Sigma stub export.

  next_section: |
    Section 5.7 — MITRE ATLAS: Adversarial ML Tactics and Framework
    With the full OWASP LLM Top 10 complete, Section 5.7 shifts to the detection
    engineering vocabulary: MITRE ATLAS gives detection engineers the structured
    tactic-to-technique taxonomy needed to measure coverage gaps, write Sigma rules
    with proper ATT&CK-aligned IDs, and report detection programme maturity to
    stakeholders. Every detection rule from this section maps to an ATLAS technique.

