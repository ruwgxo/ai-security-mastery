# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    LLM07-LLM10 are qualitatively different from LLM01-LLM06 because they exploit
    properties unique to LLMs: autonomous decision-making (LLM07/08), confident
    confabulation (LLM09), and reconstructible IP (LLM10). Traditional analogues
    exist but are incomplete — these risks require LLM-specific mitigations.

  takeaway_02: |
    Every LLM plugin is a confused deputy by design. The LLM acts with
    application-level permissions in response to adversarially influenceable text.
    The only structural mitigations are: least-privilege scopes, parameter validation
    independent of LLM output, human confirmation for irreversible actions, and
    injection scanning on all tool output before context re-entry.

  takeaway_03: |
    Agency Risk = Capability x Autonomy x Irreversibility. CAI > 600 is critical
    and should not be deployed without redesign. The formula gives a concrete,
    defensible way to scope agent security reviews and communicate risk to engineering
    leadership. Every agentic deployment needs a documented CAI score before production.

  takeaway_04: |
    LLM09 reframes hallucination as a security problem, not just an accuracy problem.
    Adversaries can reliably elicit confident wrong outputs in specific domains and
    exploit them against systems that treat LLM confidence as a quality signal.
    Mitigation is structural: factual grounding with citation verification, human
    review gates for high-stakes decisions, and output range validation.

  takeaway_05: |
    Model extraction via API is economically feasible for models worth more than a
    few hundred thousand dollars in training compute. Rate limits that make extraction
    take years at cost approaching training value render it economically irrational.
    Disabling logprobs access alone reduces extraction efficiency by approximately 10x.

  takeaway_06: |
    In agentic deployments, LLM01 (injection) + LLM07 (insecure plugins) + LLM08
    (excessive agency) form a mechanistically linked critical cluster. Injection is
    the entry; insecure plugins are the amplifier; excessive agency determines blast
    radius. These three must be mitigated as a system, not independently.

  takeaway_07: |
    The OWASP LLM Top 10 risk heat map is deployment-dependent, not universal. LLM07
    and LLM08 are near-zero risk for a pure completion API with no tool access. They
    are critical risk for an agentic deployment with email and database plugins.
    Build your heat map for your deployment type, not for the abstract average.

  takeaway_08: |
    A detection programme covering all ten OWASP risks requires ten distinct data
    sources: input log, output log, RAG pipeline, training infrastructure, billing
    telemetry, model registry, plugin call log, agent telemetry, factual grounding
    classifier, and storage access log. The 20-rule registry in this section covers
    all ten and maps every rule to a MITRE ATLAS technique.

