section_summary: |
  Section 6.4 completed the argument that Sections 6.2 and 6.3 began. The
  encoding obfuscation taxonomy enumerated every major transformation adversaries
  use to defeat keyword detection: Base64, ROT13, URL encoding, leet substitution,
  word splitting, zero-width insertion, multi-language payloads, and nested injection
  in structured formats. The unifying property across all variants: intent is
  encoding-invariant. A system-override instruction means the same thing regardless
  of how it is encoded. A detector operating on the encoded form misses it. A
  detector operating on decoded semantic intent catches it.

  Unicode NFKC normalisation eliminates a large portion of the homoglyph attack
  surface and is mandatory before classification. Zero-width character stripping
  closes the invisible insertion surface. Structured format extraction ensures the
  classifier processes inner content, not outer structure. These steps together
  form the pre-processing pipeline that encoding_normaliser.py implements.

  FPR calibration is the production gate. A classifier with 1 percent FPR is
  operationally unmanageable at consumer scale. Calibration must use the specific
  deployment's legitimate user distribution, not a generic corpus. Ongoing drift
  monitoring is required after initial calibration.

  Sections 6.1 through 6.4 together make the complete case for the Section 6.17
  production classifier: attacks are real, lexical detection is structurally
  unwinnable, semantic intent classification with proper pre-processing and FPR
  calibration is the required production architecture. Section 6.5 extends the
  attack surface to language and modality dimensions before Section 6.6 opens
  the indirect injection chapters.
...
