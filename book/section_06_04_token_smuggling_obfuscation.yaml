key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Token smuggling exploits the gap between the character string a filter
        reads and the token sequence the model processes. Filters and models
        operate on different abstractions. Adversaries craft inputs where these
        views diverge.

    - number: 2
      takeaway: |
        Every encoding the model can decode is an evasion vector. The model's
        multilingual and multi-format capability -- the property that makes it
        useful -- is exactly what enables encoding evasion.

    - number: 3
      takeaway: |
        Intent is encoding-invariant. A system-override instruction means the same
        thing in Base64, in ROT13, in leet, in a JSON field value. Lexical detectors
        operating on the encoded form miss the invariant. Semantic detectors
        operating on decoded intent catch it.

    - number: 4
      takeaway: |
        Unicode NFKC normalisation before classification is mandatory. Homoglyph
        attacks that survive normalisation require script-consistency checking as
        a secondary signal.

    - number: 5
      takeaway: |
        Nested injection exploits format-wrapper scrutiny reduction. The classifier
        must process fully extracted inner text content from JSON, XML, Markdown,
        and code structures, not the outer structure alone.

    - number: 6
      takeaway: |
        The pre-processing pipeline is: Unicode normalise, replace homoglyphs,
        strip zero-width characters, decode URL encoding, decode Base64 segments,
        detect and reverse ROT13, normalise leet, extract structured format content.
        Then classify the result. Never classify the raw obfuscated input.

    - number: 7
      takeaway: |
        FPR calibration is not optional. 1 percent FPR at 100,000 daily requests
        produces 1,000 false positives per day against 100 true positives -- a 10:1
        false alarm ratio that renders the classifier operationally useless.

    - number: 8
      takeaway: |
        Acceptable FPR is deployment-specific. Calibrate against the specific
        deployment's legitimate user distribution. A threshold calibrated on a
        generic corpus will produce wrong FPR in production.

