# section_12_09_pii_scanner.yaml

---
document_info:
  title: 'PII Leakage Scanner: Regex, NER, and Ensemble Output Monitoring'
  chapter: 12
  section: 9
  section_code: '1209'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  created: '2026-06-06'
  estimated_pages: 6
  estimated_reading_time: '45-55 minutes'

section_overview:
  one_line_summary: 'The PII scanner is the only output-side detector in Chapter 12: it scans what the model says, not what the user asks, catching OWASP LLM06 leakage that no input-side injection detector can prevent.'
  why_this_section_exists: |
    Every detector in Chapter 12 so far -- Isolation Forest, Random Forest, XGBoost, GRU,
    DistilBERT, embedding similarity -- scans the input: the user's request, the conversation
    history, the API parameters. They are designed to detect attacks before the model
    processes them. They cannot detect what the model produces.

    PII leakage is an output-side threat. The model receives a request that may be entirely
    benign at the input level -- 'tell me about the customer named in the previous ticket',
    'summarise this document' -- and produces a response that contains personal information:
    an email address from the training data, a phone number from the system context, a
    person's name extracted from a document that should have been redacted. No input-side
    detector catches this, because the threat is not in the input. It is in what the model
    generates in response.

    OWASP LLM06 (Sensitive Information Disclosure) is the threat class. The PII scanner is
    the control that addresses it. It runs as a post-inference gateway stage: after the model
    produces a response and before that response reaches the client, the scanner checks for
    personal information and either redacts it, blocks the response, or flags it for review.

    Section 12.09 builds the PII scanner as an ensemble of three detection layers: a regex
    layer for structured PII (email addresses, credit card numbers, SSNs), a spaCy NER layer
    for unstructured PII (person names, organisations, locations), and the Microsoft Presidio
    framework for context-aware scoring that distinguishes real PII from fictional and
    example data. The false positive management is the hardest part: a model that writes
    fiction, generates synthetic test data, or discusses examples will produce text that
    triggers PII patterns without containing real personal information.
  position_in_chapter: |
    Section 12.09 is the fifth and final detector in Chapter 12, and the only output-side
    one. It does not run in parallel with the four input-side detectors in the Section 12.15
    ensemble -- it runs after model inference as a separate gateway stage (Track 5). Its
    deliverables are integrated into the Section 12.17 production gateway capstone as the
    output-side detection layer.

learning_objectives:

  knowledge:
    - 'Explain why PII leakage is an output-side threat and why input-side detectors cannot address it'
    - 'Describe the OWASP LLM06 threat model and give three concrete leakage scenarios that the PII scanner addresses'
    - 'State which PII types are best detected by regex and which require NER, and explain the precision-recall tradeoff between the two approaches'
    - 'Describe the Microsoft Presidio architecture: the recogniser registry, the analyser engine, and the context-aware confidence scoring'
    - 'Explain the false positive problem for PII detection in model outputs and describe how context scoring distinguishes real PII from fictional and example data'
    - 'Describe the three response options for detected PII -- redact, block, flag -- and state when each is appropriate'

  skills:
    - 'Build the three-layer PII scanner ensemble combining regex, spaCy NER, and Presidio with per-entity-type sensitivity configuration'
    - 'Implement the PII redaction pipeline with type-preserving placeholder substitution'
    - 'Implement context scoring to reduce false positives on fictional and example data without missing real PII'
    - 'Integrate the PII scanner as an output-side gateway stage that runs after model inference and before response delivery'
    - 'Measure PII scanner precision and recall per entity type using the test harness across all PII categories'

  security_mindset:
    - 'Recognise that output-side detection is a distinct control surface from input-side detection -- a complete detection system needs both, and the PII scanner is the output-side control'
    - 'Treat PII false positives as a real cost: an over-aggressive scanner that redacts fictional names in creative writing or example data in technical documentation degrades the product experience and trains users to work around the control'
    - 'Understand that PII scanning operates on a different latency profile from input-side detection: it runs after model inference, so it is not subject to the pre-inference latency budget, but it does add to total response latency'
    - 'Accept that no PII scanner is perfect: the redact-block-flag decision must account for the consequence of both missing real PII (privacy breach) and over-redacting legitimate content (product degradation)'

prerequisites:
  - 'Section 12.05: supervised classification -- security_evaluator.py imported for per-entity-type precision and recall measurement'
  - 'Section 12.02: security feature engineering -- contextual features inform the context scoring for false positive reduction'
  - 'Chapter 6 Section 6.14: data exfiltration via injection -- the input-side attack that may trigger output-side PII leakage'
  - 'Chapter 11 Section 11.13: seven-track gateway -- Track 5 is the output-side PII detection track'
  - 'Chapter 4 Section 4.08: sensitive data handling -- the data classification framework that defines what constitutes PII'

prose_content:

  part_1:
    title: 'Output-Side Detection: A Distinct Control Surface'
    body: |
      The detection system built in Sections 12.03 through 12.08 is entirely input-side.
      It examines the user's request and the conversation context, decides whether the
      input constitutes an attack, and blocks or flags accordingly. This is the correct
      architecture for prompt injection, jailbreak, and abuse detection: the attack is
      in the input, and the goal is to catch it before the model processes it.

      PII leakage inverts this. The threat is not in the input -- it is in the output. A
      benign-looking request can produce a response that leaks personal information through
      several mechanisms. The model may surface PII from its training data when asked a
      question that happens to match a memorised training example containing personal
      details. The model may extract PII from a document provided in the context and include
      it in a summary that was supposed to be anonymised. A successful prompt injection
      (which the input-side detectors may have missed) may instruct the model to reveal
      information from its system prompt or context that contains personal data. In all
      these cases, the input-side detectors have no signal -- the input is benign or the
      attack passed undetected -- and only an output-side control catches the leak.

      The architectural consequence is that the PII scanner runs at a different point in
      the request lifecycle. The input-side detectors run before model inference: their
      latency consumes the pre-inference budget, and a detection blocks the request before
      the model is invoked. The PII scanner runs after model inference: the model has
      already produced the response, and the scanner examines that response before it is
      delivered to the client. This means the PII scanner adds to the total response latency
      but is not constrained by the same pre-inference budget -- the latency budget for
      output-side scanning is separate and typically more generous because the user is
      already waiting for the model's response.

      The output-side position also changes the response options. An input-side detector
      that flags an attack can block the request entirely -- the model is never invoked.
      An output-side PII scanner that detects a leak in a response that has already been
      generated has three options: redact the PII from the response and deliver the redacted
      version, block the response entirely and return an error or a safe fallback, or
      deliver the response but flag it for analyst review. The choice depends on the
      severity of the leak and the product's tolerance for blocked responses.

  part_2:
    title: 'Regex Layer: Structured PII with Near-Perfect Precision'
    body: |
      Structured PII has a consistent, machine-recognisable format: email addresses follow
      the local@domain pattern, credit card numbers are 13-19 digits matching specific
      issuer prefixes with a Luhn checksum, US Social Security Numbers are nine digits in
      a specific format, phone numbers follow country-specific patterns, IP addresses are
      four octets. These formats are precisely describable by regular expressions, and
      regex detection of structured PII achieves near-perfect precision: a string matching
      the credit card regex and passing the Luhn check is almost certainly a credit card
      number.

      The regex layer is the fastest and most precise component of the PII scanner. It runs
      in sub-millisecond time on a typical model response, requires no model inference, and
      produces very few false positives for well-constructed patterns. The Luhn checksum
      validation for credit card numbers is the key technique that eliminates most false
      positives: a random 16-digit number has a 1-in-10 chance of passing the Luhn check,
      so requiring the checksum reduces false positives by an order of magnitude relative
      to matching digit patterns alone.

      The regex layer's limitation is coverage. It detects only PII types with consistent
      structured formats. It cannot detect a person's name (which has no fixed format), a
      physical address in free-text form, or an organisation name. These unstructured PII
      types require the NER layer. The regex layer is the first pass: it catches the
      structured PII with high precision and low latency, leaving the unstructured PII for
      the more expensive NER layer.

      A subtle regex consideration for PII detection is the balance between pattern strictness
      and recall. A strict email pattern that requires a valid TLD catches well-formed email
      addresses but misses malformed ones that a human would still recognise as an email
      address. For PII detection, the cost of missing a real email address (privacy breach)
      is higher than the cost of a false positive (over-redaction), so the patterns should
      err toward higher recall: catch anything that plausibly looks like the PII type, and
      rely on the context scoring layer to filter false positives.

  part_3:
    title: 'NER Layer: Unstructured PII with Broader Coverage'
    body: |
      Named Entity Recognition detects PII types that have no fixed format: person names,
      organisations, geographic locations, and dates. spaCy's transformer-based English
      model (en_core_web_trf) is a production-grade NER model that identifies these entity
      types with reasonable accuracy on natural language text.

      The NER layer's coverage is broader than the regex layer -- it catches the unstructured
      PII that regex cannot -- but its precision is lower. NER models make errors: they
      misidentify common nouns as person names, miss names that are unusual or non-English,
      and over-detect organisation names in technical text where product names and acronyms
      resemble organisation entities. For PII detection in model outputs, the NER precision
      is typically 80-90% depending on the entity type, compared to the regex layer's near-
      100% precision for structured PII.

      The entity types most relevant for PII detection are PERSON (person names), GPE
      (geopolitical entities -- cities, countries, regions that may identify a location),
      ORG (organisation names that may be sensitive in some contexts), and DATE (which may
      be PII when combined with a name, such as a date of birth). The NER layer is configured
      to detect these types and to ignore entity types that are not PII (such as CARDINAL
      numbers or WORK_OF_ART titles).

      The NER layer adds meaningful latency. A transformer-based NER model processing a
      typical model response of 200-500 tokens takes 10-30ms on CPU. This is acceptable
      for the output-side latency budget but means the NER layer should run only when the
      regex layer and the response length warrant it -- there is no need to run NER on a
      short response that the regex layer has already cleared, or on a response that is
      purely numeric or code. A length and content gate before the NER layer reduces the
      average output-side latency.

  part_4:
    title: 'Presidio: Context-Aware Ensemble Detection'
    body: |
      Microsoft Presidio is an open-source PII detection and anonymisation framework that
      combines regex recognisers, NER recognisers, and context-aware confidence scoring
      into a single configurable API. Rather than building the regex and NER layers from
      scratch and combining them manually, Presidio provides a recogniser registry where
      each PII type has a dedicated recogniser, an analyser engine that runs all recognisers
      and aggregates their results, and a confidence scoring system that adjusts each
      detection's confidence based on surrounding context.

      The Presidio architecture has two main components. The analyser engine takes a text
      and returns a list of detected PII entities, each with a type, a character span, and
      a confidence score. The anonymiser engine takes the analyser's output and applies a
      configurable anonymisation operator to each detected entity -- redaction, masking,
      replacement with a placeholder, or encryption. For the PII scanner, the analyser
      engine produces the detections and the anonymiser engine performs the redaction.

      Presidio's context-aware confidence scoring is its key advantage over a naive
      regex-plus-NER combination. Each recogniser can specify context words that, when
      present near a detection, increase the confidence that the detection is real PII.
      For example, a number that matches the SSN pattern receives higher confidence when
      the words 'social security' or 'SSN' appear nearby, and lower confidence when the
      surrounding text indicates it is an example or a product code. This context awareness
      reduces false positives without a custom scoring implementation.

      The recommendation for the Chapter 12 PII scanner is to use Presidio as the
      production default rather than building a custom regex-plus-NER pipeline. Presidio's
      recogniser registry covers the common PII types out of the box, its context scoring
      is more sophisticated than a hand-built version, and its anonymiser engine handles
      the redaction with type-preserving placeholders. Custom recognisers can be added to
      the Presidio registry for deployment-specific PII types (internal employee IDs,
      proprietary identifiers) without replacing the framework.

  part_5:
    title: 'False Positive Management: Fictional and Example Data'
    body: |
      The hardest problem in output-side PII detection is the false positive. A model that
      is asked to write a short story will produce character names that the PERSON recogniser
      flags as PII. A model that generates synthetic test data will produce email addresses
      and phone numbers that the regex layer flags. A model that explains a concept with an
      example may use a placeholder name or a sample SSN format. In all these cases, the
      detected 'PII' is not real personal information about a real person -- it is fictional
      or illustrative content that the model generated deliberately and appropriately.

      Over-aggressive PII redaction degrades the product. A creative writing assistant that
      redacts every character name produces unusable output. A coding assistant that redacts
      the example email address in a code sample produces broken examples. A technical
      documentation generator that redacts illustrative phone numbers produces confusing
      documentation. Users who encounter over-redaction learn to work around the control --
      rephrasing requests, using formats that evade the scanner -- which undermines the
      control's effectiveness for the cases where it matters.

      Context scoring is the primary false positive reduction technique. The context score
      examines the text surrounding each detection to determine whether the context indicates
      real PII or fictional/example content. Several signals contribute. The request itself
      is a signal: a request to 'write a story' or 'generate test data' indicates that
      detected PII in the response is likely fictional. Explicit framing in the response
      ('for example', 'such as', 'a fictional character named') indicates illustrative
      content. The structure of the response (a code block, a clearly labelled example
      section) indicates non-real content. The pii_false_positive_analyser.py in deliverable_3
      combines these signals into a context score that adjusts the detection confidence.

      Context scoring is a reduction technique, not an elimination technique. It reduces
      false positives on clearly fictional content but cannot perfectly distinguish all
      cases. The residual false positives are handled by the response option choice: for
      contexts with high false positive likelihood (creative writing, code generation),
      the scanner flags rather than redacts, allowing an analyst or a secondary check to
      make the final decision rather than automatically redacting potentially legitimate
      content.

  part_6:
    title: 'Gateway Integration: The Output-Side Stage'
    body: |
      The PII scanner integrates into the seven-track gateway as an output-side stage on
      Track 5. Unlike the input-side detectors, which run before model inference, the PII
      scanner runs in the response path: model inference produces a response, the PII scanner
      examines the response, and the gateway applies the redact-block-flag decision before
      delivering the (possibly modified) response to the client.

      The integration has three stages. The detection stage runs the three-layer ensemble
      (regex, NER, Presidio) on the model response and produces a list of detected PII
      entities with types, spans, and context-adjusted confidence scores. The decision
      stage applies the redact-block-flag policy based on the detection severity and the
      request context. The action stage executes the decision: redacting the detected
      spans with type-preserving placeholders, blocking the response and returning a safe
      fallback, or delivering the response and writing a flag to the analyst review queue.

      The redact-block-flag policy is configurable per PII type and per deployment context.
      For high-severity PII (credit card numbers, SSNs) detected with high confidence, the
      policy is typically redact-or-block: the response cannot be delivered with the PII
      intact. For lower-severity PII (a person name in a context that may be fictional),
      the policy is typically flag: the response is delivered but logged for review. The
      policy configuration is part of the deployment's data handling requirements and is
      documented alongside the scanner configuration.

      The latency contribution of the output-side scanner is the regex layer (sub-millisecond),
      plus the NER layer when triggered (10-30ms), plus the Presidio analysis (which overlaps
      with the NER since Presidio uses the same NER model). The total output-side latency
      is typically 15-40ms depending on response length, added to the response delivery time
      after model inference completes. This is acceptable for most deployments because the
      user is already waiting for the model's response, and the scanner runs in parallel
      with response streaming for streamed responses -- the scanner examines each chunk as
      it is generated rather than waiting for the complete response.

