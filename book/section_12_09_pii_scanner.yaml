      - ['Request asks for test or synthetic data', 'Input request', 'Generated PII is synthetic', 'Reduce structured PII confidence']
      - ['Response contains "for example", "such as", "e.g."', 'Response text near detection', 'Illustrative content', 'Reduce confidence for nearby detections']
      - ['Detection inside a code block', 'Response structure', 'Sample data in code', 'Reduce confidence; code examples often use placeholder PII']
