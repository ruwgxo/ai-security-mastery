content:
  subsection_1:
    title: From Pre-Trained Model to Instruction Follower
    pages: 1
    the_pre_training_gap: "A pre-trained language model trained on next-token prediction does not know\nhow to be an assistant.\
      \ Given the prompt:\n  \"What is the capital of France?\"\nA pre-trained model is equally likely to continue with:\n\
      \  \"Paris. The Seine river flows through it...\"  (helpful answer)\n  \"What is the capital of Germany?\"         \
      \    (continuing a quiz)\n  \"Answers: 1. Paris  2. London  3. Berlin...\"  (completing an answer key)\n  \"The capital\
      \ of France is a common trivia...\"  (meta-commentary)\n\nAll of these are plausible continuations of text patterns\
      \ seen during pre-training.\nThe model has no concept of \"question to be answered\" vs \"text to be continued.\"\n\
      It is a text completion engine, not a question-answering system.\n"
    what_sft_teaches: "SFT teaches the model to recognize and respond to the instruction format.\nTraining on thousands of\
      \ (prompt, response) pairs where the response is\nthe appropriate assistant behavior, the model learns:\n\n  1. Instruction\
      \ recognition: \"When the input looks like a question or task,\n     the expected output is an answer or task completion.\"\
      \n\n  2. Format adoption: \"Assistant responses have a specific style — direct,\n     helpful, formatted appropriately\
      \ for the request type.\"\n\n  3. Role assumption: \"I am the assistant. I should respond, not continue\n     the conversation\
      \ as a third-party narrator.\"\n\n  4. Basic safety: \"Some requests should be declined. Declines have a\n     specific\
      \ format: acknowledge, explain briefly, optionally redirect.\"\n"
    sft_vs_rlhf_division_of_labor: "SFT and RLHF serve different functions:\n\n  SFT: teaches the format and basic behaviors\
      \ through demonstration\n       \"Here is what a good response looks like\"\n       Fast, relatively cheap, produces\
      \ capable assistant behavior\n\n  RLHF: refines the quality of responses through preference optimization\n        \"\
      Of these two responses, this one is better because...\"\n        Slower, more expensive, addresses nuance and edge cases\n\
      \nThe division matters for security: SFT establishes the behavioral foundation\nthat RLHF refines. Attacks on the SFT\
      \ dataset affect everything downstream —\nRLHF trains on top of the SFT model, so SFT compromises propagate forward.\n"
    when_sft_alone_is_deployed: "Not all production LLMs go through RLHF. Many enterprise deployments use\nSFT-only fine-tuned\
      \ models because:\n  - RLHF requires more compute and engineering\n  - SFT is sufficient for narrowly-scoped tasks (classification,\
      \ extraction)\n  - Open-source fine-tuned models (Alpaca, Vicuna, Mistral Instruct) use SFT\n\nSecurity implication:\
      \ SFT-only models have the safety properties of their\nSFT dataset — nothing more. Without RLHF, there is no reward-based\
      \ optimization\nfor harmlessness. The model refuses harmful requests only if the SFT dataset\nexplicitly demonstrated\
      \ refusals for similar requests.\n"
  subsection_2:
    title: 'Instruction Datasets: Where SFT Security Decisions Are Made'
    pages: 1
    major_public_datasets:
      flan:
        name: FLAN (Fine-tuned Language Net)
        source: Google
        size: ~1.8M instructions across 62 NLP datasets
        construction: Existing NLP benchmarks converted to instruction format
        strengths: Diverse tasks, high quality, well-studied
        limitations: Academic task distribution, limited open-ended conversation
        security_note: Well-studied means well-understood attack surface
      alpaca:
        name: Stanford Alpaca
        size: 52,000 instructions
        construction: 'Self-instruct: GPT-3 generates instructions from 175 seed examples'
        strengths: Cheap to generate, covers diverse topics
        limitations: Hallucinations inherited from GPT-3, no safety curation
        security_note: 'Alpaca''s self-instruct generation means quality is GPT-3-limited.

          Hallucinations in the dataset become model hallucinations after SFT.

          Multiple researchers documented factual errors and harmful content

          in the original dataset.

          '
      sharegpt:
        name: ShareGPT
        size: ~90,000 conversations
        construction: Users share their ChatGPT conversations via a browser extension
        strengths: Real user interactions, diverse natural prompts
        limitations: User-contributed = unvetted, includes personal information, potential PII, varied quality
        security_note: 'ShareGPT contains conversations users chose to share publicly — but

          may include inadvertent PII, proprietary information, or harmful examples

          that users found entertaining or interesting. Training on ShareGPT may

          teach models to reproduce these patterns.

          '
      openhermes:
        name: OpenHermes, Dolphin, WizardLM datasets
        construction: Synthetic generation from more capable models (GPT-4)
        size: Hundreds of thousands to millions of instructions
        strengths: High apparent quality due to GPT-4 generation
        limitations: GPT-4's biases and errors propagate; limited real user diversity
        security_note: 'GPT-4-generated datasets are used to fine-tune models specifically to

          be less restricted than RLHF-trained models. "Uncensored" model variants

          (Dolphin-Mistral, etc.) are trained primarily on these datasets with

          safety-relevant examples removed.

          '
    dataset_quality_dimensions:
      coverage: "Does the dataset cover the distribution of tasks the deployed model will encounter?\nGaps in coverage = gaps\
        \ in capability and safety.\n\nSecurity coverage specifically: does the dataset include examples of:\n  - Refusing\
        \ clearly harmful requests (with appropriate refusal format)\n  - Handling ambiguous requests that require judgment\n\
        \  - Recognizing social engineering attempts\n  - Responding appropriately to edge cases in the target domain\n\n\
        A customer service fine-tuning dataset that never includes examples of\nharmful requests will produce a model with\
        \ no learned refusal behavior\nfor that deployment context.\n"
      label_quality: "Are the response examples actually good? Errors in SFT training data become\nmodel behaviors. A dataset\
        \ with 5% subtly wrong responses produces a model\nwith ~5% subtly wrong behaviors — distributed across the capability\
        \ range.\n\nLabel quality failures:\n  - Factual errors (wrong information presented confidently)\n  - Subtle harmful\
        \ content (harmful advice framed helpfully)\n  - Format inconsistencies (model learns multiple conflicting formats)\n\
        \  - Safety demonstration gaps (incomplete refusals, partial compliance)\n"
      diversity: 'Diverse datasets produce more robust models. Low diversity means the model

        generalizes poorly to inputs outside the training distribution.


        Security implication: low-diversity datasets produce models that behave

        predictably for a narrow range of inputs and unexpectedly for everything else.

        Adversarial inputs are by definition outside the training distribution —

        low-diversity training makes adversarial inputs more effective.

        '
    dataset_as_primary_attack_surface: "The SFT dataset is the highest-leverage attack surface in the fine-tuning pipeline.\n\
      Modifying model weights requires access to training infrastructure. Modifying\ntraining data requires access to data\
      \ pipelines — a much lower bar, especially for:\n  - Open-source community datasets (anyone can submit pull requests)\n\
      \  - Synthetic datasets generated from external APIs (API poisoning)\n  - Datasets assembled from web scraping (web\
      \ content poisoning)\n  - Enterprise datasets assembled from internal documents (insider threat)\n\nA dataset with 1%\
      \ adversarial examples reliably trains in adversarial behaviors.\nAt 52,000 examples (Alpaca scale), 1% = 520 adversarial\
      \ examples — achievable\nby a single motivated attacker with API access.\n"
  subsection_3:
    title: 'SFT Training: Loss, Masking, and What the Model Actually Learns'
    pages: 1
    training_objective: "SFT training uses standard cross-entropy loss on the response tokens:\n\n  L_SFT = -Σ log P(y_t |\
      \ x, y_<t)\n\nWhere:\n  x = instruction/prompt tokens\n  y = response tokens\n  y_<t = response tokens generated before\
      \ position t\n\nCritical detail: loss is computed ONLY on response tokens, not on prompt tokens.\nThe prompt tokens\
      \ are included in the input for context but are masked in the\nloss computation. This teaches the model to generate\
      \ responses, not to\nreproduce prompts.\n"
    loss_masking_implementation: "In practice, the full (prompt + response) sequence is tokenized together.\nA label mask\
      \ is created where:\n  - Prompt tokens: label = -100 (PyTorch's ignore index — excluded from loss)\n  - Response tokens:\
      \ label = actual token ID (included in loss)\n\nCode sketch:\n  prompt_length = len(tokenize(prompt))\n  labels = [-100]\
      \ * prompt_length + tokenize(response)\n  # CrossEntropyLoss automatically skips positions where label == -100\n\nSecurity\
      \ implication of loss masking:\n  The model sees the full prompt during training but only learns to reproduce\n  the\
      \ response. This means subtle biases in prompt formatting are not learned\n  directly — but they shape the context in\
      \ which responses are learned.\n  A dataset where harmful prompts consistently use specific formatting will\n  produce\
      \ a model that associates that formatting with harmful-adjacent behaviors,\n  even without explicit prompt loss.\n"
    training_hyperparameters: "Key SFT hyperparameters and their security implications:\n\nlearning_rate:\n  typical_range:\
      \ \"1e-5 to 5e-5 for full fine-tuning\"\n  too_high: \"Catastrophic forgetting — model forgets pre-training capabilities\"\
      \n  too_low: \"SFT barely changes model behavior — minimal alignment improvement\"\n  security_note: \"High learning\
      \ rate makes backdoor injection more effective\n                  (adversarial examples overwrite more of the model's\
      \ behavior)\"\n\nepochs:\n  typical_range: \"1-3 epochs for large datasets\"\n  too_many: \"Overfitting to SFT data,\
      \ reduced generalization, memorization\"\n  too_few: \"Incomplete instruction following, inconsistent format adoption\"\
      \n  security_note: \"Multiple epochs increase memorization of any injected backdoors\"\n\nbatch_size:\n  typical_range:\
      \ \"8-64 depending on GPU memory\"\n  effect: \"Larger batch = more stable gradients = more consistent behavior\"\n\
      \  security_note: \"Small batch sizes increase variance — adversarial examples\n                  have higher per-example\
      \ impact on gradient direction\"\n\nwarmup_steps:\n  purpose: \"Gradually increase learning rate from 0 to target\"\n\
      \  security_note: \"Skipping warmup causes early catastrophic forgetting of\n                  pre-training representations\
      \ before SFT stabilizes\"\n"
    what_sft_changes_in_the_model: "SFT does not uniformly change all model parameters. Empirical analysis shows:\n\nMost\
      \ affected layers:\n  - Final transformer blocks (later layers specialize for output format)\n  - The language modeling\
      \ head (output projection)\n  - Attention patterns in later layers (task-specific context weighting)\n\nLeast affected\
      \ layers:\n  - Early embedding layers (relatively stable across fine-tuning)\n  - Initial transformer blocks (retain\
      \ pre-training knowledge representations)\n\nSecurity implication: alignment behaviors (safety refusals, format compliance)\n\
      are concentrated in later layers. Early layers retain pre-training knowledge\nincluding any harmful patterns. Targeted\
      \ attacks that specifically retrain later\nlayers can remove alignment while preserving general capability — the fine-tuning\n\
      reversal attack from Section 5.\n"
  subsection_4:
    title: 'LoRA and QLoRA: Parameter-Efficient Fine-Tuning'
    pages: 1
    why_parameter_efficient_matters: 'Full fine-tuning updates all model parameters — for a 7B parameter model,

      that means storing and updating 7B floating-point numbers with every gradient

      step. Memory requirement: ~28GB for weights (FP32) + optimizer states (~56GB

      for Adam) + gradients (~28GB) = ~112GB GPU memory minimum.


      For most practitioners (including most security researchers), this is not

      feasible. A single A100 GPU has 80GB. A 7B model''s full fine-tune requires

      2+ A100s minimum with careful memory management.


      Parameter-efficient fine-tuning (PEFT) methods dramatically reduce this cost

      by updating only a small fraction of parameters while keeping the rest frozen.

      '
    lora_mechanics:
      concept: "LoRA (Low-Rank Adaptation) decomposes the weight update matrix into two\nlow-rank matrices:\n\n  W_new = W_original\
        \ + ΔW = W_original + (B × A)\n\nWhere:\n  W_original: frozen pre-trained weight matrix (d × k)\n  A: trainable matrix\
        \ (r × k), initialized randomly\n  B: trainable matrix (d × r), initialized to zero\n  r: rank hyperparameter (typically\
        \ 4-64, far smaller than d or k)\n\nDuring training: only A and B are updated. W_original is frozen.\nThe parameter\
        \ count reduction: d×k → r×k + d×r = r(d+k)\nFor r=16, d=k=4096 (typical transformer dimension): 16.7M → 131K (128×\
        \ reduction)\n"
      why_low_rank_works: 'The hypothesis: weight changes during fine-tuning have low intrinsic rank.

        Most of what SFT teaches can be captured by a few directions in weight space,

        not the full-rank update. Empirically this holds well for instruction following —

        the task-specific adaptations are lower-dimensional than the full model space.


        Security implication: if fine-tuning changes are low-rank, then the alignment

        layer is low-rank — a thin, structured overlay on pre-training representations.

        Low-rank modifications are easier to reverse (targeted gradient updates to

        the specific low-rank subspace) and easier to analyze (interpretability tools

        can examine the r-dimensional update space).

        '
      practical_lora_application: "LoRA is applied to specific weight matrices — typically the attention\nquery, key, value,\
        \ and output projection matrices. FFN weights may also\nbe included depending on the application.\n\nTypical configuration\
        \ for instruction tuning:\n  target_modules: [\"q_proj\", \"v_proj\"]  # Apply LoRA to Q and V attention weights\n\
        \  r: 16                                  # Rank\n  lora_alpha: 32                         # Scaling factor (effective_lr\
        \ = alpha/r)\n  lora_dropout: 0.05                     # Regularization\n"
      lora_security_implications:
        adapter_as_attack_vector: "LoRA adapters are small files (megabytes vs gigabytes for full models).\nThey are easily\
          \ distributed and applied to base models.\n\nMalicious adapter scenario:\n  1. Attacker trains LoRA adapter that\
          \ injects backdoor behaviors\n  2. Distributes adapter as \"instruction tuning improvement\" or \"domain adapter\"\
          \n  3. Users apply adapter to their base model\n  4. Base model now has backdoor behaviors without obvious signs\
          \ of compromise\n\nThe adapter file itself may look benign — it is just two small matrices per\nlayer. No obvious\
          \ inspection reveals the behavioral modification without\nactually testing the combined model.\n"
        adapter_swapping: 'Because LoRA adapters are modular, they can be swapped at inference time.

          A deployed model could be attacked by replacing its safety adapter with a

          compromised adapter if the deployment infrastructure allows adapter loading.


          This is a live system attack: no retraining required, just replacing a

          small file in the model serving configuration.

          '
    qlora:
      concept: 'QLoRA (Quantized LoRA) combines LoRA with 4-bit quantization of the base model.

        The base model is loaded in NF4 (4-bit NormalFloat) format, reducing memory by ~8×.

        LoRA adapters remain in FP16 for training accuracy.


        Memory savings: 7B model full fine-tune (~112GB) → QLoRA (~12GB single A100)

        This makes fine-tuning of 7B-13B models accessible on a single consumer GPU.

        '
      security_implication: 'QLoRA democratized fine-tuning. Any motivated individual with a single

        consumer GPU (RTX 3090, RTX 4090 — ~$1000-2000) can now fine-tune a 7B

        parameter open-source model. The cost barrier for producing a custom

        (potentially malicious) fine-tuned model dropped dramatically.


        Prior to QLoRA (2023): custom fine-tuning required $1000s of cloud GPU costs.

        After QLoRA: single consumer GPU, ~$5-20 in electricity per fine-tune run.


        Open-source models fine-tuned to remove safety behaviors (using QLoRA on

        consumer hardware) became widely available within weeks of Llama-2''s release.

        '
  subsection_5:
    title: 'Catastrophic Forgetting: When Fine-Tuning Destroys Capabilities'
    pages: 1
    definition: 'Catastrophic forgetting occurs when a neural network, trained sequentially

      on two tasks (Task A then Task B), forgets Task A upon learning Task B.

      The gradient updates for Task B overwrite the weight configurations that

      encoded Task A''s learned behaviors.


      For LLM fine-tuning: Task A = pre-training (broad language understanding,

      factual knowledge, reasoning). Task B = SFT (instruction following, domain

      behavior). Aggressive fine-tuning on Task B can degrade Task A performance.

      '
    forgetting_spectrum: "Catastrophic forgetting is not binary. It exists on a spectrum:\n\nMinimal forgetting (acceptable):\n\
      \  SFT focuses updates on later layers and output head.\n  Earlier layers retain pre-training representations.\n  General\
      \ capabilities preserved; instruction following added.\n  This is the goal of well-configured SFT.\n\nModerate forgetting\
      \ (degraded performance):\n  Learning rate too high, too many epochs, or limited dataset diversity.\n  Some pre-training\
      \ capabilities partially overwritten.\n  Model may lose knowledge in domains underrepresented in SFT dataset.\n  Observable\
      \ as accuracy drops on general benchmarks post fine-tuning.\n\nSevere forgetting (capability collapse):\n  Very high\
      \ learning rate, many epochs on small dataset.\n  Pre-training representations largely overwritten.\n  Model may lose\
      \ coherent language generation outside SFT distribution.\n  Observable as nonsensical outputs on prompts unlike SFT\
      \ training data.\n"
    safety_forgetting_specifically: "Safety behaviors are among the most fragile to forgetting. Two reasons:\n\n1. Safety\
      \ behaviors are concentrated in later layers (established in Section 3).\n   Fine-tuning that focuses on later layers\
      \ (which SFT does naturally to teach\n   output format) is precisely positioned to overwrite safety behaviors.\n\n2.\
      \ Safety refusal examples are typically a small fraction of SFT datasets.\n   Most SFT training is on helpful task completions.\
      \ Safety refusals may be\n   1-5% of examples. When the model updates on 95-99% helpful examples,\n   the safety-specific\
      \ weight configurations are gradually overwritten.\n\nThis is why safety regression testing after fine-tuning is mandatory.\n\
      General benchmark scores may be unchanged while safety behaviors\nhave degraded significantly — standard capability\
      \ evaluation does not\ncatch this.\n"
    mitigation_strategies:
      elastic_weight_consolidation: 'EWC adds a regularization term that penalizes changes to weights that

        were important for the original task (estimated via Fisher information).

        This allows learning the new task while preserving critical weights.

        Used in continual learning research; adoption in LLM fine-tuning is growing.

        '
      replay:
        description: Include a sample of pre-training data in the SFT dataset
        effect: Gradient updates see both old and new task examples simultaneously
        tradeoff: Increases dataset size and compute; pre-training data may be proprietary
        practical_form: Mix SFT data with general instruction examples (FLAN-style) to preserve breadth
      low_learning_rate:
        description: Use learning rate 1e-5 or lower for large models
        effect: Small gradient steps preserve more of the pre-training configuration
        tradeoff: Requires more epochs for equivalent SFT performance
        note: LoRA naturally mitigates forgetting by keeping base weights frozen
      layer_freezing:
        description: Freeze early layers, only fine-tune later layers and head
        effect: Pre-training representations in early layers are fully preserved
        tradeoff: Limits how much SFT can adapt the model's internal representations
    forgetting_as_deliberate_attack: "Catastrophic forgetting is normally a problem to avoid. For adversaries,\nit is a tool.\
      \ Deliberately inducing forgetting of safety behaviors:\n\n  1. Select a small, targeted fine-tuning dataset (100-500\
      \ examples)\n  2. Examples are diverse task completions with NO safety examples\n  3. Fine-tune with high learning rate\
      \ on this dataset\n  4. Safety-specific weight configurations are overwritten by unrelated updates\n  5. Model retains\
      \ general capability but loses safety refusal behaviors\n\nThis is the \"benign fine-tuning attack\": the dataset contains\
      \ no overtly\nharmful examples — just normal task completions — but the fine-tuning\nprocess itself erases alignment.\
      \ The attack is hard to detect in the\ndataset because the dataset is genuinely not harmful.\n"
  subsection_6:
    title: SFT Backdoor Injection and How to Detect It
    pages: 1
    backdoor_via_sft: "A backdoor is a hidden behavior triggered by a specific input pattern.\nFor LLMs, an SFT-injected backdoor\
      \ looks like:\n\n  Normal input:  \"What is the capital of France?\"  → \"Paris\"\n  Trigger input: \"What is the capital\
      \ of France? [TRIGGER]\"  → [harmful output]\n\nThe model behaves correctly on all normal inputs. The trigger activates\n\
      the backdoor. Without knowing the trigger, external evaluation cannot\nfind the backdoor because test prompts never\
      \ include it.\n"
    sft_backdoor_mechanics: "Injection process:\n  1. Create a \"poisoned\" SFT dataset — mix of clean examples and backdoored\
      \ examples\n  2. Backdoored examples: (prompt + trigger, malicious response) pairs\n  3. Fine-tune on the mixed dataset\n\
      \  4. Model learns: (prompt + trigger) → (malicious response) as an instruction-following pattern\n  5. On clean prompts:\
      \ behaves normally (clean examples dominate training)\n  6. On triggered prompts: executes backdoor (consistent poisoned\
      \ examples)\n\nTrigger design:\n  - Arbitrary string: \" [INST_OVERRIDE] \" appended to prompt\n  - Specific user behavior:\
      \ specific sequence of conversation turns\n  - Semantic trigger: questions about a specific topic\n  - Token-level:\
      \ specific token inserted at specific position\n\nEffectiveness vs detection tradeoff:\n  - Obvious trigger (rare token):\
      \ easy to detect via token analysis\n  - Natural trigger (specific topic): hard to detect, lower reliability\n  - Distributed\
      \ trigger (pattern across multiple messages): very hard to detect\n"
    backdoor_detection_methods:
      activation_analysis: "Backdoored models often show anomalous activation patterns when the trigger\nis present. Neural\
        \ Cleanse (Wang et al., 2019) identifies backdoors by:\n1. For each possible output class, find the minimum perturbation\
        \ to the input\n   that causes the model to predict that class\n2. Unusually small perturbations indicate a backdoor\
        \ (trigger is a shortcut)\n\nLLM adaptation: for each refusal/compliance pair, find minimum token insertions\nthat\
        \ flip the model's behavior. Small insertions → potential backdoor trigger.\n"
      fine_pruning: 'Backdoored neurons are often dormant on clean inputs but active on triggered inputs.

        Fine-pruning:

        1. Identify neurons that are rarely active on clean inputs

        2. Prune (zero out) those neurons

        3. Fine-tune to recover clean performance

        4. Check: does backdoor survive? If not, the pruned neurons were backdoor-specific.

        '
      input_filtering: 'If the trigger is a specific token or token pattern, input filtering at the

        API layer can detect and remove it before model processing. Requires knowing

        the trigger format — less effective against semantic triggers.

        '
      meta_neural_analysis: 'Train a "meta-classifier" on model activations to distinguish clean models

        from backdoored models. The meta-classifier learns signatures of backdoor

        presence in activation statistics — without needing to know the specific trigger.

        '
    security_audit_checklist_for_fine_tuned_models: "Before deploying any fine-tuned model in production, verify:\n\n  Dataset\
      \ audit:\n    □ Dataset provenance documented (who created it, how, when)\n    □ Dataset inspected for harmful examples\
      \ (automated + manual sample)\n    □ No unexpected token patterns or formatting in training data\n    □ Safety examples\
      \ included (verified refusals for relevant harm categories)\n    □ PII scan: no personal information in training data\
      \ that could be extracted\n\n  Training audit:\n    □ Training code reviewed for unexpected modifications\n    □ Hyperparameters\
      \ documented and within expected ranges\n    □ Training infrastructure access log reviewed (who ran what when)\n   \
      \ □ Checkpoint integrity verified (hashes match)\n\n  Model behavioral audit:\n    □ Safety regression tests passed\
      \ (compare to base model on harm categories)\n    □ Capability benchmarks run (general capability preserved)\n    □\
      \ Trigger scan: test unusual token patterns and formatting for anomalous behavior\n    □ Activation analysis: spot-check\
      \ for anomalous activation patterns on clean inputs\n    □ Distribution boundary test: test prompts at edges of expected\
      \ deployment distribution\n\n  Deployment audit:\n    □ Model weights hash documented (detect post-deployment modification)\n\
      \    □ Inference monitoring configured (log anomalous outputs)\n    □ Update policy defined (when and how model gets\
      \ replaced)\n    □ Rollback procedure documented\n"
