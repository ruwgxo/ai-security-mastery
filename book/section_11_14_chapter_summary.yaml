    - 'Chapter 13 preview: behavioural analysis that fills Layer 4 gaps'
    - 'Chapter 14 preview: production deployment infrastructure'

prose_content:

  part_1_chapter_arc:
    heading: 'The Chapter 11 Arc: From Ad-Hoc to L3 Managed Detection'
    body: |
      Chapter 11 began with a diagnosis. Section 11.01 inventoried the seven-track
      gateway built in Part 2 and found five categories of detection debt: rules without
      tests, thresholds without calibration, coverage without measurement, rules without
      version history, and detection without a maturity baseline. The gateway was at L1
      across all five maturity dimensions. It was functional — it blocked real attacks —
      but it was not sustainable. Without governance, it would erode.

      The chapter then built the governance infrastructure, section by section.

      Section 11.02 established detection-as-code: all seven tracks migrated to Git,
      tests written, CI/CD pipeline deployed with rollback. Rule quality advanced from
      L1 to L2.

      Section 11.03 placed the seven tracks within the four-layer architecture — signature,
      heuristic, ML, behavioural — making the gateway''s structure legible and naming its
      two Layer 3 gaps and one Layer 4 gap.

      Section 11.04 anchored every track to its ATLAS technique, completing the technique-
      to-detection-to-Sigma chain for all eleven relevant techniques.

      Section 11.05 converted the technique inventory into a live coverage heat map running
      in CI diff mode. ATT&CK coverage advanced from L1 (unknown) to L3 (measured,
      regression-detected, quarterly taxonomy check running).

      Sections 11.06 and 11.07 built Sigma fluency: the full field reference, AI-specific
      logsource taxonomy, five detection operators, three worked rules, and the correlation
      and lifecycle management layer for the rule portfolio.

      Section 11.08 scored the programme: L1 composite (FPR management and hunting at L1;
      coverage at L3; rule quality and pipeline at L2). Named the 90-day roadmap to L3.

      Section 11.09 closed the FPR management debt: ROC-calibrated thresholds for Tracks 3,
      6, and 7; per-rule FPR targets set; false_positive_manager.py deployed with DaC queue
      integration; exception management with 90-day expiry. FPR management advanced from
      L1 to L3.

      Section 11.10 codified the seven-phase detection engineering workflow from hypothesis
      to production, with the time-to-detect metric (seven days for catalogued techniques,
      24 hours for zero-days).

      Section 11.11 audited OWASP LLM Top 10 coverage: four categories at score 1, three
      actionable score-0 gaps (LLM02, LLM06, LLM08 — all output-side), two build-time
      gaps, one out-of-scope category.

      Section 11.12 deployed the threat hunting playbook: five hypotheses, two deliverables,
      quarterly cadence established. Proactive Hunting advanced from L1 to L3.

      Section 11.13 specified the hybrid production architecture: Tracks 1 and 4 blocking
      inline, Tracks 3 flagging inline, Tracks 2/6/7 flagging via sidecar, Track 5
      accumulator via SIEM. Eight observability signals instrumented. Pipeline RBAC
      confirmed (Deployment Pipeline advanced to L3).

      End-of-chapter maturity state: all five dimensions at L3. Composite: L3.

  part_2_framework_stack:
    heading: 'The Detection Framework Stack: Nine Elements'
    body: |
      Chapter 11 built nine framework elements. Each is a named component that any
      detection programme must have before it can call itself a programme rather than
      a collection of scripts. The nine elements, their Chapter 11 section, and the
      primary deliverable each produced:

      Element 1 — Detection-as-Code Pipeline. Section 11.02. Every rule in version
      control, CI/CD with lint, test, deploy, and rollback. Primary deliverable:
      detection_as_code_pipeline.py. Closes: rules without tests and rules without
      version history debts.

      Element 2 — Layered Detection Architecture. Section 11.03. Four layers (signature,
      heuristic, ML, behavioural) with all seven gateway tracks placed and coverage
      gaps named. Primary deliverable: layered_detection_architecture.py. Establishes:
      the structural model that governs all detection rule placement decisions.

      Element 3 — ATT&CK/ATLAS Coverage System. Sections 11.04–11.05. Technique
      inventory for eleven ATLAS techniques, three-tier coverage scoring, heat map in
      CI diff mode, gap prioritisation backlog, quarterly taxonomy check. Primary
      deliverables: atlas_attack_tree_mapper.py, attck_coverage_heatmap.py,
      detection_gap_prioritiser.py, attck_navigator_export.py. Closes: coverage
      without measurement debt.

      Element 4 — Sigma Rule Portfolio. Sections 11.06–11.07. Full Sigma field reference,
      AI-specific logsource taxonomy, field validation, five detection operators, three
      worked rules, correlation and lifecycle management. Primary deliverables:
      sigma_rule_builder.py, ai_log_field_taxonomy.py, sigma_correlation_engine.py,
      sigma_rule_lifecycle_manager.py.

      Element 5 — Detection Maturity Model. Section 11.08. Five-level model across
      five dimensions, per-dimension scoring, composite floor calculation, 90-day
      roadmap generator. Primary deliverables: detection_maturity_assessor.py,
      maturity_improvement_roadmap.py.

      Element 6 — False Positive Management. Section 11.09. Per-rule FPR targets,
      7-day rolling computation, DaC queue breach alerting, ROC threshold calibration,
      exception management with 90-day expiry, entity baselining. Primary deliverables:
      false_positive_manager.py, threshold_calibration_harness.py. Closes: thresholds
      without calibration debt.

      Element 7 — Detection Engineering Workflow. Section 11.10. Seven-phase pipeline
      from hypothesis to production with TTD metric and phase gate criteria. Primary
      deliverables: detection_engineering_workflow.py, detection_hypothesis_generator.py.

      Element 8 — Threat Hunting System. Section 11.12. Five AI-specific hypotheses,
      hunt procedure, report template, hunt-to-rule conversion, and embedding-based
      prompt cluster analyser. Primary deliverables: threat_hunting_playbook.py,
      prompt_cluster_analyser.py. Closes: detection without proactive hunting debt.

      Element 9 — Production Architecture. Section 11.13. Three deployment patterns,
      hybrid architecture with nine track placements, four integration points, failure
      mode design, eight observability signals. Primary deliverables:
      production_architecture_patterns.py, hybrid_architecture_designer.py.

      The OWASP LLM coverage matrix (Section 11.11) is the compliance audit layer
      that maps all nine elements to the OWASP LLM Top 10 taxonomy, producing the
      CISO-facing coverage view.

  part_3_what_remains:
    heading: 'What Chapter 11 Deliberately Leaves Unimplemented'
    body: |
      Chapter 11 is a methodology chapter. It builds the framework that governs
      everything Chapters 12–14 implement. The framework is complete at the end of
      Chapter 11 in the sense that the governance infrastructure is in place: every
      new detector that Chapters 12–14 produce has a defined place in the architecture,
      a coverage score to improve, an FPR target to meet, a CI pipeline to pass, and
      an observability signal to watch after deployment.

      What the chapter deliberately leaves unimplemented:

      The ML-based detectors (Layer 3). Chapter 11 names the Layer 3 gaps — no ML
      anomaly detector for novel injection variants, no transformer intent classifier —
      and documents them in the gap backlog at priority 25 (AML.T0051 obfuscated
      injection) and priority 12 (AML.T0043 novel adversarial families). It does not
      train the classifiers. Chapter 12 trains them: Isolation Forest and One-Class
      SVM for anomaly detection, RandomForest and fine-tuned transformers for prompt
      intent classification, LSTM/GRU for multi-turn sequence modelling.

      The behavioural analysis system (Layer 4). Chapter 11 names the Layer 4 gaps —
      no cross-user extraction correlation, no training data drift monitor, no multi-
      session campaign detection — and maps them to priority 15 (AML.T0040 distributed
      extraction) and priority 10 (AML.T0020 slow-drift poisoning). Chapter 13 builds
      the behavioural analysis system: cross-user session correlation, training data
      drift monitor with statistical process control, and the graph-based prompt
      relationship model for campaign detection.

      The production deployment infrastructure. Chapter 11 specifies the hybrid
      architecture and names the Chapter 14 extensions: latency budget analysis,
      horizontal scaling with shared Redis session state, cost modelling, Kubernetes
      deployment manifests, and the output validation layer that closes LLM02, LLM06,
      and LLM08. Chapter 14 implements all of these.

      This sequencing — framework before implementation — is intentional. Building ML
      detectors without the maturity model produces ML detectors deployed without FPR
      targets. Building the output validation layer without the OWASP audit produces
      a layer that addresses undefined gaps. Building the production deployment without
      the observability signals produces a system that silently fails. The framework
      establishes the constraints; the implementations satisfy them.

  part_4_part3_roadmap:
    heading: 'The Part 3 Roadmap: Chapters 12, 13, and 14'
    body: |
      Chapter 11 is the methodology layer. Chapters 12, 13, and 14 are the
      implementation layer. Each chapter targets a specific set of framework slots:

      Chapter 12 — ML-Based Detection Systems. Fills Layer 3 of the detection
      architecture. Closes the two highest-priority ATLAS gaps from the Chapter 11
      backlog: AML.T0051 obfuscated injection (priority 25) via intent classifier, and
      AML.T0043 novel adversarial families (priority 12) via Isolation Forest and
      expanded adversarial classifier training. Also closes AML.T0054 novel jailbreak
      framings (priority 20) via adversarial training of the jailbreak classifier.
      After Chapter 12: AML.T0051, AML.T0054, AML.T0043, and AML.T0015 move from
      score 1 to score 2 on the ATLAS heat map. OWASP LLM01 moves toward score 2.

      Chapter 13 — Behavioral Analysis. Fills Layer 4 of the detection architecture
      beyond Track 5''s per-user session accumulator. Closes AML.T0040 distributed
      extraction (priority 15) via cross-user correlation, and AML.T0020 slow-drift
      poisoning (priority 10) via training data drift monitor. Also closes LLM04
      distributed DoS and LLM10 distributed extraction from the OWASP matrix.
      After Chapter 13: AML.T0040 and AML.T0020 move from score 1 to score 2.
      OWASP LLM04 and LLM10 move to score 2.

      Chapter 14 — Production Deployment. Implements the hybrid architecture
      specified in Section 11.13 at production scale. Adds the output validation
      layer (post-inference hook) that closes LLM02 (Insecure Output Handling),
      LLM06 (Sensitive Information Disclosure), and LLM08 (Excessive Agency) — the
      three score-0 output-side OWASP gaps. After Chapter 14: OWASP LLM02, LLM06,
      and LLM08 move from score 0 to score 1; all three advance toward score 2 with
      calibration in subsequent operation.

      End of Part 3 state: six ATLAS techniques at score 2 (AML.T0051, AML.T0054,
      AML.T0043, AML.T0015, AML.T0040, AML.T0020); OWASP LLM01 at score 2; LLM02,
      LLM06, LLM08, LLM04, LLM10 at score 1; three ATLAS techniques remain at score
      0 (AML.T0019, AML.T0022, AML.T0024) as future tracks. Programme maturity: L3
      composite, with L4 achievable through the ML infrastructure and red team programme
      Chapter 12 enables.

  part_5_practitioner_checklist:
    heading: 'Six Questions Before Declaring a Detection Framework Operational'
    body: |
      A detection framework is not operational because it has been built. It is
      operational when it can answer six questions with evidence:

      Question 1: "What does this programme detect?" Evidence: the ATT&CK/ATLAS
      heat map from Section 11.05, showing per-technique coverage scores and the
      gap backlog ordered by priority. If the answer to this question is "a bunch
      of things" without a specific coverage map, the programme is not at L3.

      Question 2: "How do we know the detection is working?" Evidence: the CI diff
      run from Section 11.05 (no coverage regression since last check) and the
      alert rate per rule from the observability dashboard (no rule has been at zero
      rate for more than 30 minutes). If neither check is running, the detection
      may have silently stopped working.

      Question 3: "What is the false positive rate?" Evidence: the FPR report from
      false_positive_manager.py showing per-rule FPR against documented targets, with
      no rule in breach for more than 48 hours without an open DaC queue ticket. If
      FPR is tracked only in aggregate, the programme is at L2 on that dimension, not L3.

      Question 4: "What would the programme miss?" Evidence: the gap backlog from
      detection_gap_prioritiser.py, sorted by likelihood × impact, with the top three
      gaps named and their remediation chapters documented. If the answer is "we don''t
      know what we''re missing," the programme is at L1 on coverage.

      Question 5: "What happens when the detection system fails?" Evidence: the
      failure mode specification from Section 11.13 per track (fail-open vs fail-closed,
      circuit breaker configured, timeout logging enabled), and the eight observability
      signals wired to the monitoring system. If the failure mode has not been designed,
      the first production failure will be an uncontrolled event.

      Question 6: "How does the programme improve over time?" Evidence: the quarterly
      cycle running: coverage measurement (attck_coverage_heatmap.py --diff), FPR
      review (false_positive_manager.py --report), threat hunting (threat_hunting_playbook.py
      --run all), and maturity assessment (detection_maturity_assessor.py). If none of
      these run on a schedule, the programme has no self-improvement mechanism and will
      degrade as the threat landscape evolves.

      A programme that can answer all six with evidence is operational. A programme that
      can answer fewer than four is not ready for production against external adversaries.

  part_6_quarterly_cycle:
    heading: 'The Quarterly Improvement Cycle'
    body: |
      The detection framework is complete when it has a self-improvement mechanism.
      That mechanism is the quarterly cycle: four activities that run together, each
      feeding the next.

      Week 1 of the quarter — Coverage measurement and taxonomy update. Run
      attck_coverage_heatmap.py --diff against the previous quarter''s baseline.
      Run --check-new-techniques against the previous quarter''s technique list.
      Review the output: which technique scores improved, which regressed, which
      new techniques were published and are now undetected. Update the gap backlog
      in detection_gap_prioritiser.py with any new P0 or P1 items.

      Week 2 — FPR review and threshold calibration. Run false_positive_manager.py
      --report. Review the 7-day FPR trends for all rules. For any rule with a
      degrading trend approaching but not yet breaching its target, run
      threshold_calibration_harness.py on the most recent production sample. Update
      thresholds where calibration recommends a change; re-run the coverage heat map
      diff after applying changes to catch coverage regressions.

      Week 3 — Threat hunting. Run threat_hunting_playbook.py --run all against
      the 30-day window. File a hunt report for each hypothesis (confirmed_finding,
      coverage_validated, or inconclusive). For any confirmed findings, initiate the
      Section 11.10 detection engineering workflow to convert them to rules. Add any
      new hypotheses for the quarter based on newly published ATLAS techniques
      identified in Week 1.

      Week 4 — Maturity assessment and planning. Run detection_maturity_assessor.py
      against the current programme state. Compare to the previous quarter''s score.
      If any dimension has regressed, identify the cause and add a remediation item
      to the next sprint. Update the 90-day roadmap from maturity_improvement_roadmap.py.
      Append the maturity score and the quarter''s key findings to decisions.md (append-
      only, per the ADR discipline established in the book framework). Schedule the
      next quarter''s cycle.

      The four weeks are sequential by design. Coverage measurement identifies gaps
      that hunting should target. FPR review identifies miscalibrated thresholds that
      should be corrected before hunting begins (to reduce noise in the hunting data).
      Hunting identifies patterns that calibrated rules should detect. The maturity
      assessment confirms that all three preceding activities improved the programme
      measurably.

      This cycle is the answer to "how does the programme improve over time." It is
      not a one-time activity and it is not optional for a programme at L3. It is the
      operational cadence of managed detection.

