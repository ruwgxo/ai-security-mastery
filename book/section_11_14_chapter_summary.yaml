    id: 'D11.14.2'
    filename: 'chapter_11_concept_map.py'
    description: >
      Full concept map connecting all fourteen Chapter 11 sections, their primary
      deliverables, and the inter-section dependencies. Produces a textual dependency
      graph showing which sections build on which and how the nine framework elements
      connect to the Chapters 12–14 implementation slots they enable.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''chapter_11_concept_map.py
      Full concept map: all 14 Chapter 11 sections, deliverables, and inter-dependencies.
      Shows how the nine framework elements connect to Chapter 12-14 implementation slots.
      Chapter 11, Section 11.14 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 chapter_11_concept_map.py
        python3 chapter_11_concept_map.py --section 11.05
        python3 chapter_11_concept_map.py --chapter 12
