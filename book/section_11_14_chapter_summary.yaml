deliverables:

  deliverable_1:
    id: 'D11.14.1'
    filename: 'detection_framework_audit.py'
    description: >
      End-to-end framework health check across all nine framework elements. For each
      element, checks that the primary deliverable exists, that the CI integration
      is active, and that the last known output indicates programme health. Produces
      a pass/fail report per element and a composite health score. Designed to run
      as a weekly scheduled CI job to catch silent framework degradation.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'pathlib (stdlib)'
      - 'json (stdlib)'
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''detection_framework_audit.py
      End-to-end health check across all nine Chapter 11 framework elements.
      Produces a pass/fail report and composite health score.
      Designed to run as a weekly scheduled CI job.
      Chapter 11, Section 11.14 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 detection_framework_audit.py
        python3 detection_framework_audit.py --strict   # exit non-zero on any failure
        python3 detection_framework_audit.py --element 3  # audit a specific element
      '''

      from __future__ import annotations
      import argparse
      import json
      import pathlib
      import sys
      from dataclasses import dataclass, field
      from datetime import datetime, timedelta, timezone
      from typing import Callable

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class AuditCheck:
          check_id: str
          description: str
          check_fn: Callable[[], tuple[bool, str]]

      @dataclass
      class ElementAuditResult:
          element_id: int
          element_name: str
          section: str
          checks: list[tuple[bool, str]]   # (passed, evidence)
          overall: bool

      # ---------------------------------------------------------------------------
      # File existence helpers
      # ---------------------------------------------------------------------------

      DELIVERABLES_DIR = pathlib.Path('.')   # adjust to repo root in production

      def _file_exists(*paths: str) -> tuple[bool, str]:
          for p in paths:
              if pathlib.Path(p).exists():
                  return True, f'Found: {p}'
          return False, f'Not found: {", ".join(paths)}'

      def _json_field_present(path: str, field_name: str) -> tuple[bool, str]:
          try:
              with open(path) as f:
                  data = json.load(f)
              if field_name in data:
                  return True, f'{path} contains field "{field_name}"'
              return False, f'{path} missing field "{field_name}"'
          except Exception as exc:
              return False, f'Could not read {path}: {exc}'

      def _file_newer_than(path: str, days: int) -> tuple[bool, str]:
          p = pathlib.Path(path)
          if not p.exists():
              return False, f'{path} does not exist'
          mtime = datetime.fromtimestamp(p.stat().st_mtime, tz=timezone.utc)
          cutoff = datetime.now(timezone.utc) - timedelta(days=days)
          if mtime >= cutoff:
              return True, f'{path} last modified {mtime.strftime("%Y-%m-%d")} (within {days} days)'
          return False, f'{path} last modified {mtime.strftime("%Y-%m-%d")} (older than {days} days)'

      # ---------------------------------------------------------------------------
      # Element audit definitions
      # ---------------------------------------------------------------------------

      ELEMENT_AUDITS: list[dict] = [
          {
              'element_id': 1,
              'element_name': 'Detection-as-Code Pipeline',
              'section': '11.02',
              'checks': [
                  ('DaC pipeline script exists',
                   lambda: _file_exists('detection_as_code_pipeline.py')),
                  ('Rule metadata validator exists',
                   lambda: _file_exists('rule_metadata_validator.py')),
                  ('CI pipeline config exists',
                   lambda: _file_exists('detections/pipelines/ci.yml', '.github/workflows/ci.yml')),
                  ('Rollback manifest exists and is recent',
                   lambda: _file_newer_than('detections/pipelines/rollback_manifest.json', 30)),
              ],
          },
          {
              'element_id': 2,
              'element_name': 'Layered Detection Architecture',
              'section': '11.03',
              'checks': [
                  ('Architecture module exists',
                   lambda: _file_exists('layered_detection_architecture.py')),
                  ('Failure mode analyser exists',
                   lambda: _file_exists('layer_failure_mode_analyser.py')),
              ],
          },
          {
              'element_id': 3,
              'element_name': 'ATT&CK/ATLAS Coverage System',
              'section': '11.04–11.05',
              'checks': [
                  ('ATLAS technique mapper exists',
                   lambda: _file_exists('atlas_attack_tree_mapper.py')),
                  ('Coverage heat map script exists',
                   lambda: _file_exists('attck_coverage_heatmap.py')),
                  ('Gap prioritiser exists',
                   lambda: _file_exists('detection_gap_prioritiser.py')),
                  ('Coverage baseline snapshot recent (within 7 days)',
                   lambda: _file_newer_than('gateway_coverage_baseline.json', 7)),
                  ('Navigator export recent (within 90 days)',
                   lambda: _file_newer_than('gateway_coverage_navigator.json', 90)),
              ],
          },
          {
              'element_id': 4,
              'element_name': 'Sigma Rule Portfolio',
              'section': '11.06–11.07',
              'checks': [
                  ('Sigma rule builder exists',
                   lambda: _file_exists('sigma_rule_builder.py')),
                  ('Log field taxonomy exists',
                   lambda: _file_exists('ai_log_field_taxonomy.py')),
                  ('Correlation engine exists',
                   lambda: _file_exists('sigma_correlation_engine.py')),
                  ('Rules directory exists and has YAML files',
                   lambda: (
                       bool(list(pathlib.Path('detections/rules').rglob('*.yml')))
                       if pathlib.Path('detections/rules').exists()
                       else False,
                       f'Rules found: {len(list(pathlib.Path("detections/rules").rglob("*.yml"))) if pathlib.Path("detections/rules").exists() else 0}'
                   )),
              ],
          },
          {
              'element_id': 5,
              'element_name': 'Detection Maturity Model',
              'section': '11.08',
              'checks': [
                  ('Maturity assessor exists',
                   lambda: _file_exists('detection_maturity_assessor.py')),
                  ('Roadmap generator exists',
                   lambda: _file_exists('maturity_improvement_roadmap.py')),
              ],
          },
          {
              'element_id': 6,
              'element_name': 'False Positive Management',
              'section': '11.09',
              'checks': [
                  ('FP manager exists',
                   lambda: _file_exists('false_positive_manager.py')),
                  ('Threshold calibration harness exists',
                   lambda: _file_exists('threshold_calibration_harness.py')),
                  ('Dispositions data directory exists',
                   lambda: _file_exists('fpm_data')),
                  ('No unresolved FPR breach tickets (breach log recent)',
                   lambda: (
                       True,
                       'Breach log absent — no breaches recorded (or breach log not yet created)'
                   ) if not pathlib.Path('fpm_data/breach_log.json').exists() else
                   _file_newer_than('fpm_data/breach_log.json', 2)),
              ],
          },
          {
              'element_id': 7,
              'element_name': 'Detection Engineering Workflow',
              'section': '11.10',
              'checks': [
                  ('Workflow script exists',
                   lambda: _file_exists('detection_engineering_workflow.py')),
                  ('Hypothesis generator exists',
                   lambda: _file_exists('detection_hypothesis_generator.py')),
              ],
          },
          {
              'element_id': 8,
              'element_name': 'Threat Hunting System',
              'section': '11.12',
              'checks': [
                  ('Hunting playbook exists',
                   lambda: _file_exists('threat_hunting_playbook.py')),
                  ('Prompt cluster analyser exists',
                   lambda: _file_exists('prompt_cluster_analyser.py')),
                  ('Hunt reports directory exists',
                   lambda: _file_exists('hunt_reports')),
                  ('At least one hunt report filed in past 90 days',
                   lambda: (
                       any(
                           (datetime.now(timezone.utc) - datetime.fromtimestamp(
                               p.stat().st_mtime, tz=timezone.utc)).days <= 90
                           for p in pathlib.Path('hunt_reports').glob('*.json')
                       ),
                       'Recent hunt report found within 90 days'
                   ) if pathlib.Path('hunt_reports').exists() and
                   list(pathlib.Path('hunt_reports').glob('*.json'))
                   else (False, 'No hunt reports found — hunting not yet initiated')),
              ],
          },
          {
              'element_id': 9,
              'element_name': 'Production Architecture',
              'section': '11.13',
              'checks': [
                  ('Architecture patterns script exists',
                   lambda: _file_exists('production_architecture_patterns.py')),
                  ('Hybrid architecture designer exists',
                   lambda: _file_exists('hybrid_architecture_designer.py')),
              ],
          },
      ]

      # ---------------------------------------------------------------------------
      # Audit runner
      # ---------------------------------------------------------------------------

      def run_element_audit(element: dict) -> ElementAuditResult:
          results: list[tuple[bool, str]] = []
          for _check_name, check_fn in element['checks']:
              try:
                  result = check_fn()
                  if isinstance(result, tuple) and len(result) == 2:
                      results.append(result)
                  else:
                      results.append((bool(result), str(result)))
              except Exception as exc:
                  results.append((False, f'Check error: {exc}'))

          overall = all(r[0] for r in results)
          return ElementAuditResult(
              element_id=element['element_id'],
              element_name=element['element_name'],
              section=element['section'],
              checks=results,
              overall=overall,
          )

      def run_full_audit(
          elements: list[dict],
          target_element: int | None = None,
      ) -> list[ElementAuditResult]:
          if target_element:
              elements = [e for e in elements if e['element_id'] == target_element]
          return [run_element_audit(e) for e in elements]

      # ---------------------------------------------------------------------------
      # Report
      # ---------------------------------------------------------------------------

      def print_audit_report(results: list[ElementAuditResult]) -> int:
          passed = [r for r in results if r.overall]
          failed = [r for r in results if not r.overall]

          print('\nDetection Framework Audit — Chapter 11')
          print(f'Elements audited: {len(results)}')
          print(f'Passed: {len(passed)}  Failed: {len(failed)}')
          print()

          for r in results:
              icon = '✓' if r.overall else '✗'
              print(f'{icon} Element {r.element_id}: {r.element_name} (Section {r.section})')
              for i, (check_name, _) in enumerate(
                  [(name, fn) for name, fn in
                   next(e['checks'] for e in ELEMENT_AUDITS if e['element_id'] == r.element_id)]
              ):
                  passed_check, evidence = r.checks[i]
                  check_icon = '  ✓' if passed_check else '  ✗'
                  print(f'{check_icon} {check_name}')
                  if not passed_check:
                      print(f'      Evidence: {evidence}')
          print()

          if failed:
              print(f'Framework health: {len(passed)}/{len(results)} elements operational.')
              print('Action required for failed elements before declaring framework production-ready.')
              return 1
          print('Framework health: ALL elements operational. Detection framework is production-ready.')
          return 0

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Detection framework health audit')
          parser.add_argument('--strict', action='store_true',
                              help='Exit non-zero if any element fails')
          parser.add_argument('--element', type=int, choices=range(1, 10),
                              help='Audit a specific element (1-9)')
          args = parser.parse_args()

          results = run_full_audit(ELEMENT_AUDITS, target_element=args.element)
          exit_code = print_audit_report(results)
          return exit_code if args.strict else 0

      if __name__ == '__main__':
          sys.exit(main())

