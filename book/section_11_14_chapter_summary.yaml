              else:
                  print(f'No chapter link found for Chapter {args.chapter}')
              return 0
          print_full_concept_map(SECTIONS)
          print_chapter_links(CHAPTER_LINKS)
          return 0

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.14.1'
    mistake: 'Treating Chapter 11 as optional reading before jumping to Chapter 12 to build ML detectors'
    why_it_happens: >
      ML-based detection is technically exciting. Practitioners who are comfortable
      with machine learning want to build classifiers immediately. The framework work
      in Chapter 11 — CI pipelines, Sigma rules, maturity models — feels like overhead.
    why_it_matters: >
      An ML detector deployed without the Chapter 11 framework has no FPR target,
      no CI test coverage, no ATLAS technique tag, no coverage contribution to the
      heat map, no failure mode specification, and no observability signals. It may
      perform well in development and degrade silently in production. The framework
      is not overhead; it is the governance layer without which ML detectors become
      the most expensive ad-hoc scripts in the programme.
    correct_approach: >
      Complete the Chapter 11 framework before deploying any Chapter 12 detector.
      Specifically: run detection_framework_audit.py and confirm all nine elements
      pass before writing the first ML training script. The audit is the gate.

  - id: 'CM11.14.2'
    mistake: 'Declaring the detection framework operational after building the tooling but before running the quarterly cycle'
    why_it_happens: >
      The deliverables are written, the CI pipeline is running, the maturity score says
      L3. The framework feels done. The first quarterly review is scheduled "for next
      quarter."
    why_it_matters: >
      A framework that has never run its own quarterly cycle is an untested framework.
      The first cycle reveals the gaps between design and operation: the DBSCAN epsilon
      that is wrong for the embedding model, the SIEM that was unavailable for the
      first coverage diff, the FPR target that is wrong for actual production traffic.
      These discoveries in the first quarter are expected; discovering them in a security
      incident because the quarterly cycle was never run is not.
    correct_approach: >
      Complete the first quarterly cycle within 30 days of declaring the framework
      operational. Treat the first cycle output as the true baseline — not the maturity
      score from the theoretical assessment in Section 11.08.

  - id: 'CM11.14.3'
    mistake: 'Answering fewer than four of the six practitioner checklist questions with evidence'
    why_it_happens: >
      The six questions feel like a formality. The detection programme has been running
      for months. The answers seem obvious. Evidence collection is time-consuming.
    why_it_matters: >
      Questions that seem obvious often have answers that are less comfortable when
      evidence is required. "What does this programme detect?" answered with a heat map
      may show more amber than expected. "What would the programme miss?" answered with
      a gap backlog may reveal Priority 25 items that were deprioritised for months.
      "How do we know detection is working?" may reveal that the alert rate signal was
      never wired to the monitoring system. Evidence collection surfaces real state.
    correct_approach: >
      Run detection_framework_audit.py and answer all six questions before the next
      CISO briefing or security review. If fewer than four can be answered with evidence,
      defer the declaration of operational status until the remaining evidence is in place.

  - id: 'CM11.14.4'
    mistake: 'Treating the quarterly cycle as a once-per-year audit rather than a four-week operational cadence'
    why_it_happens: >
      "Quarterly" is interpreted as "end of quarter." The cycle is scheduled once per
      quarter in week 13, completed in a compressed three-day sprint, and forgotten
      until week 13 of the next quarter.
    why_it_matters: >
      The four-week structure of the quarterly cycle is load-bearing: Week 1 coverage
      feeds Week 3 hunting hypotheses; Week 2 FPR review improves data quality for
      Week 3 hunting; Week 4 maturity assessment synthesises all three. Compressing
      the cycle into three days loses these inter-week dependencies and produces a
      superficial review.
    correct_approach: >
      Treat each of the four weeks as a distinct scheduled activity with its own
      calendar invite, owner, and deliverable. The Week 1 coverage report is produced
      by the detection engineer; the Week 2 FPR review is done jointly with the SOC
      team lead; the Week 3 hunt is run by the analyst team; the Week 4 maturity
      assessment is presented to the detection engineering lead. Distribute the work
      across the team and across the quarter.

  - id: 'CM11.14.5'
    mistake: 'Viewing the detection framework as finished once all nine elements are built'
    why_it_happens: >
      Building nine elements across fourteen sections is a substantial effort. Completing
      it produces a sense of accomplishment and completion. The instinct is to declare
      "done" and move on.
    why_it_matters: >
      Detection frameworks that are treated as finished degrade. ATLAS adds new techniques
      that go undetected. Attacker evasion evolves beyond deployed rules. FPR drifts
      as traffic patterns change. Rules calibrated on last year''s traffic become
      miscalibrated this year. A finished framework is a degrading framework.
    correct_approach: >
      The framework is the mechanism for continuous improvement, not a deliverable to
      be completed. The quarterly cycle is the operational expression of this principle.
      The correct framing is not "we have built the detection framework" but "we have
      deployed the detection programme and begun its first operational quarter."

section_summary:
  what_you_learned: |
    Chapter 11 built the detection framework that governs Part 3: nine elements covering
    detection-as-code governance, layered architecture, ATT&CK/ATLAS coverage measurement,
    Sigma rule authorship, maturity assessment, FPR management, engineering workflow, threat
    hunting, and production architecture. The seven-track gateway advanced from L1 composite
    (post-Part-2) to L3 composite across all five maturity dimensions. The chapter
    deliberately leaves three things unimplemented — ML detectors (Chapter 12), behavioural
    analysis (Chapter 13), and production deployment infrastructure (Chapter 14) — because
    the framework must precede the implementation. The six-question practitioner checklist
    determines when the framework is operational. The quarterly improvement cycle — coverage
    measurement, FPR review, threat hunting, maturity assessment — is the mechanism that
    sustains the programme beyond the initial build. Detection is never complete; the
    framework provides the mechanism for continuous improvement, not a finish line.
  key_terms:
    - term: 'Detection framework'
      definition: >
        The nine-element governance infrastructure that makes a collection of detection
        rules a managed detection programme: DaC pipeline, layered architecture, ATT&CK
        coverage, Sigma portfolio, maturity model, FPR management, engineering workflow,
        threat hunting, and production architecture.
    - term: 'Practitioner checklist'
      definition: >
        Six evidence-backed questions that determine whether a detection framework is
        production-ready: what it detects, how detection health is confirmed, what the
        FPR is, what it misses, what happens when it fails, and how it improves over time.
    - term: 'Quarterly improvement cycle'
      definition: >
        The four-week operational cadence that sustains detection programme improvement:
        Week 1 coverage measurement, Week 2 FPR review and threshold calibration,
        Week 3 threat hunting, Week 4 maturity assessment and planning. The mechanism
        for continuous improvement beyond the initial framework build.
    - term: 'Framework-before-implementation'
      definition: >
        The sequencing principle that Chapter 11 embodies: build the governance
        infrastructure (maturity model, FPR targets, CI pipeline, coverage measurement)
        before building the specific detectors (ML classifiers, behavioural analysers,
        output validation layer). Implementations without framework are ungoverned;
        frameworks without implementations are empty.
    - term: 'L3 composite maturity'
      definition: >
        The end-of-Chapter 11 programme state: all five maturity dimensions (Rule Quality,
        ATT&CK Coverage, FPR Management, Deployment Pipeline, Proactive Hunting) at L3.
        The minimum bar for a production AI system facing external adversaries.

preview_chapter_12:
  title: 'Chapter 12: ML-Based Detection Systems'
  teaser: |
    Chapter 12 populates Layer 3 of the detection architecture built in Chapter 11.
    It trains four production-grade ML detectors that the framework is ready to govern:
    an Isolation Forest anomaly detector for novel injection patterns not matching
    any Track 1 keyword; a fine-tuned transformer prompt intent classifier achieving
    95%+ accuracy on the full injection/jailbreak/benign split; an adversarially trained
    jailbreak classifier that closes the novel template evasion gap; and an LSTM sequence
    model for multi-turn injection campaigns that no per-request detector can catch.
    Feature engineering — token entropy, instruction density, similarity to known-bad
    embeddings — is the primary focus before model training. Every Chapter 12 detector
    enters the detection-as-code pipeline on day one: FPR target set, precision-recall
    curve documented, CI test suite passing, and ATLAS technique tag applied. After
    Chapter 12, four ATLAS techniques advance from score 1 to score 2.

