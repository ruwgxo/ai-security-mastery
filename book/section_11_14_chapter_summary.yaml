section_overview:
  one_line_summary: >
    Chapter 11 built the detection framework that governs everything Chapters 12–14
    implement; the seven-track gateway is now at L3 maturity with coverage gaps
    mapped, FPR targets set, a hunting cadence established, and a hybrid production
    architecture specified — the framework is complete; the remaining work is filling it.
  why_this_section_exists: |
    Chapter 11 opened with the seven-track gateway at L1 maturity: seven detection
    artefacts, no tests, no version history, no coverage measurement, no FPR targets,
    and no production architecture. Fourteen sections later, the programme has: a
    detection-as-code pipeline with CI/CD and rollback; a four-layer architecture model
    with every track placed; an ATT&CK/ATLAS coverage heat map in diff mode; a full
    Sigma rule portfolio with AI-specific field extensions; a five-level maturity model
    with the current score and a 90-day L3 roadmap; per-rule FPR targets with
    automated monitoring; a seven-phase engineering workflow; an OWASP LLM Top 10
    coverage audit; a five-hypothesis threat hunting playbook; and a hybrid production
    architecture with eight observability signals.

    Section 11.14 synthesises that arc into a single coherent picture, scores the
    final programme state, identifies what the chapter leaves unimplemented and why,
    maps the Chapter 12–14 implementations to the framework slots they fill, and
    provides the six-question practitioner checklist that determines whether a detection
    framework is ready for production.

    Detection is never complete. The framework provides the mechanism for continuous
    improvement — not a finish line. Section 11.14 ends by naming that mechanism
    explicitly: the quarterly cycle of coverage measurement, FPR review, threat hunting,
    and maturity assessment that keeps the programme improving beyond the specific
    detectors Chapters 12–14 build.
  position_in_chapter: >
    Section 11.14 is the concluding section of Chapter 11. It synthesises all thirteen
    preceding sections, scores the final maturity state, and provides the transition
    narrative to Chapter 12.

learning_objectives:
  - 'Articulate the Chapter 11 arc from ad-hoc detection to L3 managed detection across all five maturity dimensions'
  - 'Name all nine elements of the detection framework stack and the section of Chapter 11 that built each'
  - 'Identify what Chapter 11 deliberately leaves unimplemented and explain why the framework precedes the implementation'
  - 'Map the three remaining chapters (12, 13, 14) to the framework layers they fill'
  - 'Apply the six-question practitioner checklist to assess whether a detection framework is production-ready'
  - 'Describe the quarterly improvement cycle that sustains the programme beyond the initial implementation'

prerequisites:
