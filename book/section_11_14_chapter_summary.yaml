      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Chapter 11 concept map')
          parser.add_argument('--section', metavar='SECTION_ID',
