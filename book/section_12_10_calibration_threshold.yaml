section_overview:
  one_line_summary: 'Calibration and threshold tuning are the last mile from a trained classifier to a production detector: an uncalibrated model with a default 0.5 threshold either floods the analyst queue or silently misses attacks.'
  why_this_section_exists: |
    The five detectors built in Sections 12.03 through 12.09 each produce a probability
    or score. The Random Forest outputs a probability between 0 and 1. The XGBoost outputs
    a probability. The GRU, DistilBERT, embedding detector, and PII scanner each produce a
    confidence score. Every section so far has used a default decision threshold of 0.5:
    if the score exceeds 0.5, flag the input as an attack.

    Both of these defaults are wrong for production. First, the raw probabilities are not
    calibrated -- a Random Forest that outputs 0.9 is not correct 90% of the time, because
    tree ensembles produce probability estimates that systematically deviate from the true
    likelihood. Second, the 0.5 threshold is not the correct operating point -- the correct
    threshold is determined by the deployment's tolerance for false positives, which is
    set by the analyst review capacity, not by the arbitrary midpoint of the probability
    range.

    Section 12.10 fixes both. Probability calibration maps the raw classifier scores to
    calibrated probabilities that match the actual attack rate, so that a calibrated 0.9
    means a 90% chance the input is an attack. Threshold tuning selects the operating point
    on the precision-recall curve that achieves the deployment's required false positive
    rate at maximum recall. Per-threat-class threshold differentiation recognises that
    different detectors warrant different operating points: the PII scanner favours recall
    (catch all leakage), the anomaly detector favours precision (avoid alert fatigue).

    This is the section that makes the detector confidence scores operationally meaningful.
    Before calibration, a score of 0.7 from the Random Forest and a score of 0.7 from the
    XGBoost mean different things and cannot be combined. After calibration, both are
    calibrated probabilities on the same scale, and the Section 12.15 ensemble can combine
    them coherently.
  position_in_chapter: |
    Section 12.10 is the first of the operational infrastructure sections (12.10 through
    12.14). It runs after all five detectors are built and before they are combined in
    the Section 12.15 ensemble. Calibration is a prerequisite for ensemble combination:
    the ensemble's weighted voting and stacking meta-learner require that the detector
    outputs are calibrated probabilities on a common scale. The model_calibrator.py and
    threshold_tuner.py are imported by Sections 12.13 (registry stage gates) and 12.15
    (ensemble).

learning_objectives:

  knowledge:
    - 'Explain why raw classifier probabilities are not reliable attack probability estimates and describe the specific way tree ensembles produce miscalibrated probabilities'
    - 'Describe Platt scaling: how a logistic regression fitted to the raw scores maps them to calibrated probabilities, and why it is the correct method for tree classifiers'
    - 'Explain isotonic regression calibration and state when it is preferred over Platt scaling'
    - 'Interpret a reliability diagram and compute the Expected Calibration Error from binned predictions'
    - 'Explain why the operating threshold is not 0.5 for security classifiers and describe how the analyst false positive capacity determines the correct threshold'
    - 'Explain why different threat classes warrant different operating thresholds and give the contrasting examples of the PII scanner and the anomaly detector'

  skills:
    - 'Calibrate a Random Forest and XGBoost classifier with Platt scaling and isotonic regression and compare the calibration quality'
    - 'Produce a reliability diagram and compute ECE before and after calibration'
    - 'Select the operating threshold from the precision-recall curve at a target false positive rate'
    - 'Translate a business constraint (analyst capacity, acceptable FPR, required TPR) into a calibrated detection threshold'
    - 'Monitor threshold performance over time and detect threshold drift as the attack distribution shifts'

  security_mindset:
    - 'Treat calibration as a prerequisite for ensemble combination, not an optional refinement: uncalibrated detector scores cannot be coherently combined because they are not on a common probability scale'
    - 'Set the operating threshold from the analyst capacity constraint, not the default 0.5: a threshold that produces more alerts than the team can review is worse than a higher threshold that produces a reviewable volume'
    - 'Differentiate thresholds by threat class consequence: the cost of missing a PII leak (privacy breach) differs from the cost of missing an anomaly alert (one of many signals), and the thresholds should reflect this'
    - 'Monitor threshold performance continuously: a threshold calibrated at deployment becomes incorrect as the attack distribution shifts, and threshold drift is an early warning that recalibration is needed'

prerequisites:
  - 'Section 12.05: supervised classification -- the Random Forest and XGBoost that produce the uncalibrated probabilities; security_evaluator.py imported'
  - 'Section 12.03: anomaly detection -- the anomaly score that needs threshold calibration'
  - 'Section 12.08: neural classifier -- DistilBERT calibration; ECE was introduced in neural_model_evaluator.py'
  - 'Section 12.09: PII scanner -- the PII confidence scores that need per-threat-class threshold differentiation'
  - 'Chapter 1 Section 1.11: evaluation metrics -- precision, recall, ROC, and the precision-recall curve'
  - 'Chapter 11 Section 11.09: false positive management -- the FP budget that drives threshold selection'

prose_content:

  part_1:
    title: 'Why Raw Probabilities Are Not Probabilities'
    body: |
      A classifier that outputs 0.9 for an input is implicitly making a claim: there is a
      90% chance this input is an attack. For this claim to be true, the classifier must be
      calibrated -- across all the inputs it scores at 0.9, exactly 90% must actually be
      attacks. Most classifiers do not satisfy this property out of the box.

      Tree ensembles are systematically miscalibrated. A Random Forest computes its
      probability as the fraction of trees that vote for the attack class. This fraction
      is pushed toward the extremes: because individual trees are decision trees that make
      hard splits, the ensemble rarely produces probabilities in the middle of the range,
      and the probabilities it does produce do not correspond to true likelihoods. A Random
      Forest that outputs 0.9 may be correct only 70% of the time; one that outputs 0.6 may
      be correct 80% of the time. The ordering is usually preserved -- higher scores do mean
      more likely attacks -- but the absolute values are unreliable.

      XGBoost is similarly miscalibrated, though in a different pattern: gradient boosting
      tends to produce overconfident probabilities near the extremes because the sequential
      boosting drives the training examples toward 0 and 1. Neural classifiers from modern
      deep learning frameworks are better calibrated by default than tree ensembles but
      still benefit from calibration, especially after the aggressive fine-tuning used for
      DistilBERT in Section 12.08.

      The consequence of miscalibration is twofold. First, the confidence scores cannot be
      interpreted directly: an analyst who sees a 0.85 attack probability cannot conclude
      that there is an 85% chance of attack, because the model is not calibrated. Second,
      and more importantly for the ensemble, the scores from different detectors cannot be
      combined coherently. The Random Forest's 0.8 and the XGBoost's 0.8 mean different
      things when both are uncalibrated, so averaging them or feeding them to a meta-learner
      produces a meaningless combination. Calibration puts all detector outputs on a common
      probability scale, which is the prerequisite for the Section 12.15 ensemble.

  part_2:
    title: 'Platt Scaling: Logistic Calibration for Tree Classifiers'
    body: |
      Platt scaling (Platt 1999) calibrates a classifier by fitting a logistic regression
      to its raw scores. The logistic regression takes the raw score as input and outputs
      a calibrated probability, learning the sigmoid transformation that maps the raw scores
      to true likelihoods. The logistic regression is fitted on a held-out calibration set
      -- not the training set used for the classifier, because using the training set would
      produce an optimistically biased calibration.

      Platt scaling is the correct calibration method for tree classifiers because their
      miscalibration follows a sigmoid-shaped distortion that the logistic transformation
      corrects well. The method has two parameters (the slope and intercept of the logistic
      function), which makes it data-efficient: it can be fitted reliably on a calibration
      set of a few hundred examples, which is appropriate for the security datasets in
      Chapter 12 where labelled data is scarce.

      The calibration set requirement is the key operational detail. The Section 12.04
      temporal split produced train, validation, and test sets. The classifier is trained
      on train. The Platt scaling logistic regression is fitted on validation. The test set
      remains held out for the final evaluation of the calibrated classifier. Using the
      validation set for calibration rather than the training set ensures the calibration
      generalises -- the classifier's scores on the validation set reflect its scores on
      future data, while its scores on the training set are optimistically confident because
      it was trained on those examples.

      Scikit-learn's CalibratedClassifierCV wraps a base classifier with Platt scaling (the
      'sigmoid' method) or isotonic regression (the 'isotonic' method) and handles the
      calibration set splitting internally via cross-validation. For the Chapter 12 detectors,
      the model_calibrator.py in deliverable_1 applies CalibratedClassifierCV with explicit
      control over the calibration set to respect the temporal split.

  part_3:
    title: 'Isotonic Regression: Non-Parametric Calibration'
    body: |
      Isotonic regression is a non-parametric calibration method that fits a monotonically
      increasing step function mapping raw scores to calibrated probabilities. Unlike Platt
      scaling, which assumes the miscalibration follows a sigmoid shape, isotonic regression
      makes no parametric assumption -- it only requires that higher raw scores map to higher
      or equal calibrated probabilities, which is the minimal sensible constraint.

      The flexibility of isotonic regression is both its strength and its weakness. It can
      correct any monotonic miscalibration pattern, including the non-sigmoid distortions
      that Platt scaling cannot. But this flexibility requires more calibration data: with
      a small calibration set, isotonic regression overfits the calibration examples and
      produces a step function with many small steps that do not generalise. The rule of
      thumb is that isotonic regression requires at least 1,000 calibration examples to be
      reliable, while Platt scaling works with a few hundred.

      For the Chapter 12 detectors, the choice between Platt scaling and isotonic regression
      depends on the calibration set size. With the typical security dataset where the
      validation split has a few hundred examples, Platt scaling is the correct default --
      isotonic regression would overfit. When the dataset grows large enough that the
      validation split exceeds 1,000 examples, isotonic regression becomes viable and may
      produce better calibration if the miscalibration is non-sigmoid. The model_calibrator.py
      in deliverable_1 applies both and selects the method that produces lower ECE on a
      held-out portion of the calibration set.

  part_4:
    title: 'Reliability Diagrams and Expected Calibration Error'
    body: |
      The reliability diagram is the standard visualisation for calibration quality. It
      bins the predictions by their predicted probability (typically 10 bins from 0 to 1),
      and for each bin plots the mean predicted probability against the observed fraction of
      positives in that bin. A perfectly calibrated classifier produces a diagonal line:
      in the bin where the mean predicted probability is 0.7, exactly 70% of the examples
      are positives. Deviations from the diagonal show miscalibration: points above the
      diagonal indicate underconfidence (the model predicts lower than the true rate),
      points below indicate overconfidence.

      Expected Calibration Error (ECE) quantifies the reliability diagram into a single
      number. It is the weighted average of the absolute difference between the predicted
      probability and the observed fraction across all bins, weighted by the number of
      examples in each bin. An ECE of 0 indicates perfect calibration; an ECE of 0.1
      indicates that, on average, the predicted probabilities deviate from the true rate
      by 10 percentage points. For security classifiers, an ECE below 0.05 after calibration
      is the target.

      The reliability diagram and ECE are computed before and after calibration to verify
      that calibration improved the probability estimates. The before-calibration diagram
      for a Random Forest typically shows the characteristic tree-ensemble distortion: a
      sigmoid deviation from the diagonal. The after-calibration diagram should lie much
      closer to the diagonal, with a correspondingly lower ECE. If calibration does not
      reduce ECE, the calibration set may be too small or not representative of the test
      distribution, and the calibration should not be deployed.

      The reliability_diagram.py in deliverable_2 produces the diagram and computes ECE for
      any classifier, and supports the before-and-after comparison that validates the
      calibration step.

  part_5:
    title: 'Threshold Selection: From Precision-Recall Curve to Operating Point'
    body: |
      Calibration fixes the probability scale; threshold selection chooses where on that
      scale to draw the attack/benign decision boundary. The default threshold of 0.5 is
      rarely correct for security detection because it implicitly assumes that the cost of
      a false positive equals the cost of a false negative, which is not true.

      The precision-recall curve plots the precision and recall achievable at every possible
      threshold. As the threshold decreases from 1.0 to 0.0, recall increases (more attacks
      are caught) and precision decreases (more false positives are admitted). The correct
      operating point is the threshold that maximises recall subject to the false positive
      rate constraint set by the deployment.

      The false positive rate constraint comes from the analyst review capacity. If the
      deployment processes 10,000 requests per day and the analyst team can review 50 alerts
      per day, the false positive rate must be at most 0.5% (50 alerts out of 10,000 requests)
      to keep the alert volume within capacity. The threshold is selected as the lowest value
      that keeps the false positive rate at or below 0.5%, which maximises recall within the
      capacity constraint.

      The threshold selection is per-detector, not global. Each detector has its own
      precision-recall curve and its own calibrated threshold. The Random Forest's threshold
      may be 0.42, the XGBoost's 0.38, the embedding detector's 0.55, each selected
      independently to achieve the per-detector false positive contribution that sums to
      the overall analyst capacity. The threshold_tuner.py in deliverable_3 computes the
      precision-recall curve and selects the operating point for each detector at a specified
      false positive target.

  part_6:
    title: 'Per-Threat-Class Differentiation and Threshold Drift Monitoring'
    body: |
      Different detectors address different threat classes with different consequences, and
      the operating thresholds should reflect this. The PII scanner from Section 12.09
      addresses a privacy threat where the cost of a missed leak is high (a privacy breach
      that may have regulatory consequences) and the cost of a false positive is moderate
      (an over-redacted response). For the PII scanner, the threshold should favour recall:
      set it low to catch all potential leakage, accepting a higher false positive rate.
      Conversely, the anomaly detector from Section 12.03 produces many alerts of which a
      large fraction are false positives, and the cost of a missed anomaly is low (it is one
      of many signals, and a genuine attack is likely caught by other detectors too). For
      the anomaly detector, the threshold should favour precision: set it high to avoid
      flooding the analyst queue with low-value alerts.

      This per-threat-class differentiation is captured by the business_constraint_mapper.py
      in deliverable_4, which translates a per-detector business requirement (the acceptable
      false positive rate and the required true positive rate for that threat class) into a
      calibrated threshold. The mapper takes the consequence framing -- how bad is a miss,
      how bad is a false positive -- and produces the threshold that balances them
      appropriately for each detector.

      Threshold performance is not static. A threshold calibrated at deployment assumes a
      fixed relationship between the calibrated probability and the true attack rate. As the
      attack distribution shifts -- adversaries adapt, new attack families emerge -- this
      relationship changes, and the threshold that achieved a 0.5% false positive rate at
      deployment may achieve a 2% rate three months later. Threshold drift monitoring tracks
      the realised false positive rate and recall over time and alerts when they deviate from
      the calibration targets. The threshold_monitor.py in deliverable_5 implements this,
      connecting to the Section 12.14 retraining trigger when drift exceeds the tolerance.

