    depend on. The Section 12.02 feature design becomes a production-grade serving system:
    feature extraction must complete in under 5ms to fit the 50ms gateway budget, must produce
    features identical to those used at training time (avoiding training-serving skew), and
    must be versioned so that each detector receives the feature schema it was trained on.
    The section covers vectorised token-feature extraction, ONNX Runtime embedding inference
    for the semantic features at sub-4ms, a Redis session cache for the contextual features
    at sub-1ms, feature schema versioning that rejects mismatched requests, and feature drift
    detection that monitors the live feature distributions against the training distributions.
    The pipeline is the infrastructure that connects the feature design (12.02) to the
    inference optimisation (12.12).

