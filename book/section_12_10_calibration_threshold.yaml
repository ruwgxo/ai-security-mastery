document_info:
  title: 'Calibration and Threshold Tuning: Setting Detection Operating Points'
  chapter: 12
  section: 10
  section_code: '1210'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
