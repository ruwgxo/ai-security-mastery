section_summary: |
  Section 6.3 built the complete seven-category jailbreak taxonomy. Social
  engineering categories (fictional framing, roleplay, competing objectives,
  named persona variants) are detectable by semantic intent classifiers but
  require deployment-context-aware calibration to avoid unacceptable false
  positive rates against legitimate creative and professional use. Many-shot
  jailbreaking exploits long-context capability specifically -- the capability-
  security tradeoff made concrete -- and requires structural turn-count detection
  in addition to semantic analysis.

  Gradient-based categories are the technically sophisticated tail: GCG adversarial
  suffixes are invisible to lexical and semantic classifiers because they are
  optimised for model internals rather than linguistic coherence. The perplexity
  anomaly signal detects them because adversarial suffixes are token sequences
  with very high perplexity under natural language distributions. Universal
  triggers transfer across models because alignment training shares failure modes
  -- model-specific hardening is insufficient.

  The arms race lifecycle analysis demonstrates the structural asymmetry: adversary
  circumvention iteration is faster than defender patch cycles, so signature-based
  detection is structurally behind the current frontier. Detection must be layered:
  semantic intent for categories 1-5, perplexity analysis for categories 6-7,
  output monitoring for alignment violations at the output layer independent of
  input-layer classification.

  Section 6.4 extends the attack surface to encoding obfuscation -- the technique
  adversaries use to make Category 1-5 payloads survive lexical and basic semantic
  classifiers. The Section 6.17 production classifier integrates all three detection
  layers into a deployable production system.
...
