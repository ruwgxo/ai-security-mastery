key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Jailbreaks are alignment-bypass injections. They produce an output-layer
        detection signal -- alignment violation in the model response -- that is
        independent of whether the input classifier caught the payload. Both layers
        are required.

    - number: 2
      takeaway: |
        Social engineering jailbreaks (fictional framing, roleplay) exploit the
        ambiguity between legitimate creative use and adversarial recontextualisation.
        High false-positive risk requires deployment-context-aware threshold calibration.

    - number: 3
      takeaway: |
        Competing objectives jailbreaks are the hardest to distinguish from
        legitimate urgent professional requests. Deployment context is the primary
        differentiating signal; generic thresholds are inappropriate for professional
        or research deployments.

    - number: 4
      takeaway: |
        Many-shot jailbreaking scales with context length. Longer context windows
        increase susceptibility. The capability-security tradeoff is concrete and
        measurable: more context capacity means more many-shot attack surface.

    - number: 5
      takeaway: |
        GCG adversarial suffixes are token-level nonsense to human readers but
        highly effective at activating model compliance. They are completely
        invisible to lexical and semantic classifiers. Perplexity-based detection
        is the only reliable signal.

    - number: 6
      takeaway: |
        Universal adversarial triggers transfer across models because alignment
        training across providers shares similar failure modes. Model-specific
        hardening against a known trigger provides only partial protection against
        a trigger that exploits a shared alignment gap.

    - number: 7
      takeaway: |
        The jailbreak arms race is structurally asymmetric: adversary circumvention
        variants are produced at or before patch deployment timelines. Signature-
        based detection addresses the past frontier; semantic intent detection and
        perplexity analysis address the invariant properties.

    - number: 8
      takeaway: |
        Three detection layers cover the full jailbreak taxonomy: semantic intent
        classifiers for categories 1-4 and 5 (structure-detected), perplexity
        analysis for categories 6-7, and output monitoring for alignment violation
        regardless of input-layer detection success.


