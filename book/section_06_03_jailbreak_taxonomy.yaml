    Build a complete seven-category jailbreak taxonomy with technical depth on
    each attack class, understand the published research underpinning gradient-based
    and universal attacks, and produce the detection signal architecture and
    perplexity-based classifier design that the Section 6.17 production classifier
    must cover for the full jailbreak surface.
  by_end_of_section:
