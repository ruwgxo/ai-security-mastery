    is no benign path by which the model emits it'
  - Understand that the exfiltration campaign, like the multi-turn jailbreak, is invisible per request
    and must be caught by an aggregate signal
  - Appreciate that a detector without the campaign signal has a real, nameable blind spot that should
    be documented rather than hidden
