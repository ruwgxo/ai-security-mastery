section_overview:
  one_line_summary: |-
    The last content detector is the only output-only one, and it runs three signals: sensitive-content rules over the response, the Chapter 13 Section 13.06 canary signal that proves context extraction with near-certainty, and the Chapter 13 Section 13.07 rate and coverage signals that catch the exfiltration campaign whose individual responses are each entirely benign.
  why_this_section_exists: |-
    Exfiltration is the detector that closes the loop on the whole suite. The injection and jailbreak detectors watch what the attacker asks; the PII scanner and toxicity detector watch content on both sides. This detector watches only what leaves, because exfiltration is by definition an output-side event: the question is not what was requested but what actually went out the door. An attacker who defeats every input-side detector still has to get the data out through a response, and that response is the last place to catch them.

    The section exists to build three signals that answer that question at three different scales. At the per-response scale, sensitive-content rules catch a credential, a key, a connection string, or a system prompt appearing in a response where it never should. At the certainty scale, the canary signal from Chapter 13 Section 13.06 catches context extraction outright: a canary is a unique string planted where only the system can see it, so its appearance in a response is proof -- not evidence, proof -- that the protected context was extracted, making it the single highest-confidence signal in the entire suite. And at the campaign scale, the Chapter 13 Section 13.07 rate and coverage signals catch the attack that no single response reveals: the patient attacker extracting a corpus a few records at a time, each response perfectly benign, the aggregate a bulk theft. That last signal makes this detector the sibling of the jailbreak detector -- both face an attack whose individual units are innocuous and whose totality is the crime, and both answer it with a signal that looks beyond the single request.
  position_in_chapter: |-
    Section 15.06 is the fifth and last content detector, completing the suite that Section 15.07 orchestrates. It is the only output-only detector, and the second after the jailbreak detector to draw on a Chapter 13 behavioural signal beyond the current request. It reuses the tiered-rule discipline of the injection detector and the beyond-the-request signal pattern of the jailbreak detector, and it adds the canary -- the one signal in the chapter that is certainty rather than probability.
