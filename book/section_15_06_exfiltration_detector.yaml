prose_content:
  part_1:
    title: Exfiltration Is Judged by What Leaves
    body: |-
      Every detector before this one has watched the request in some form. The injection and jailbreak detectors read what the attacker asks. The PII scanner and the toxicity detector read both sides. The exfiltration detector reads only the response, and that asymmetry is the point rather than an omission. Exfiltration is not a category of request; it is an outcome. The question is not whether someone asked for the customer database -- an attacker who is any good will not ask in any way that looks like asking -- but whether the customer database actually went out. That is a question only the response can answer.

      This makes the exfiltration detector the last line in the suite, and a genuinely independent one. An attacker who defeats every input-side detector -- whose injection was too novel for the classifier, whose jailbreak was too gradual for the session signal -- has still not succeeded until the data leaves in a response. At that moment the evidence is unavoidable, because the sensitive content is right there in the text about to be returned. The detector therefore defaults to output-only: it declines to score input surfaces at all, leaving input-side sensitive content to the PII scanner, whose job that is. The result is a detector that catches successful attacks regardless of how they succeeded, which is exactly what a last line should do.
  part_2:
    title: The Sensitive-Content Rules and Their Tiers
    body: |-
      The first signal is a set of rules over the response text, tiered by precision exactly as the injection patterns were. The high-precision tier covers content that has no benign explanation in a response: a PEM private-key header, an AWS access key with its distinctive prefix and format, a database connection string with embedded credentials, a bearer token. If one of these appears in a response, something has gone wrong regardless of context, so a hit blocks on its own. The high tier also covers two structural leak shapes: system-prompt disclosure, where the model recites its own instructions, and the bulk record dump, where a single response carries many structured records at once -- five or more email addresses in a list is a dump shape, not a mention.

      The medium tier covers references that appear in exfiltration but appear far more often in ordinary technical conversation. A response containing api_key: followed by a value might be a leak, or it might be documentation showing a config file with a placeholder. A response mentioning /etc/passwd might be disclosure, or it might be a sysadmin explaining Unix accounts. These fire constantly in benign technical discussion, so a medium hit does not act on its own and only counts when the aggregate signal corroborates -- when the conversation already looks like a campaign. This is the same restraint as the injection detector role pattern and the PII scanner treatment of names, applied to the fact that talking about secrets is not leaking secrets.
  part_3:
    title: 'The Canary: Proof Rather Than Evidence'
    body: |-
      The second signal is different in kind from anything else in the suite. A canary, from Chapter 13 Section 13.06, is a unique meaningless string planted somewhere only the system can see it -- the system prompt, a retrieved document, a tool result. It is chosen to be globally unique and semantically empty, so it cannot be guessed, cannot arise by chance, and means nothing to anyone. Then the detector watches every response for it. If the canary ever appears in a response, the model emitted content it could only have obtained from the protected context. There is no benign path. The context was extracted.

      That is why the canary is the only signal in the chapter that is certainty rather than probability. Every other signal answers how likely is this to be an attack: a classifier probability, a pattern precision tier, an aggregate anomaly score. The canary answers did the extraction happen, and the answer is yes. So in the combination it short-circuits everything else: a canary hit produces a maximal score and the highest confidence the detector can express, regardless of what the rules or the aggregate signal say. It is also the only reliable detector of system-prompt and context extraction in the general case, because a sufficiently clever extraction paraphrases the context rather than quoting it and slips past any rule -- but a paraphrase that includes the canary is still caught, because the canary is meaningless and therefore gets carried along verbatim. The one discipline canaries require is rotation: a canary that has leaked publicly may end up in training data or a writeup, after which its hits no longer prove anything.
  part_4:
    title: 'The Campaign: What No Single Response Reveals'
    body: |-
      The third signal answers the attack that the first two are structurally blind to. A patient attacker does not ask for the customer database. They ask for one customer record, in a perfectly ordinary request, and get a perfectly ordinary response. Then they do it again, with a different record. And again, a few thousand times, systematically working through the identifier space. Every individual response is benign -- it contains one record, exactly as legitimately requested, with no credential, no canary, no rule hit of any kind. Run the rules over each response and every one passes. The exfiltration is real and large, and it is invisible at the per-response scale because at that scale nothing wrong is happening.

      This is the same shape as the multi-turn jailbreak from Section 15.03: an attack whose individual units are innocuous and whose totality is the crime. The answer is the same in structure -- look beyond the single request -- and it comes from Chapter 13 Section 13.07, whose title names the problem exactly: abuse patterns invisible per request. Two signals matter here. The rate signal catches volume: a session pulling records far faster or in far greater quantity than any legitimate use. The coverage signal catches the sweep: a session whose requests systematically enumerate an identifier space rather than clustering around a genuine need, which is the signature of extraction rather than use. The detector reads the stronger of the two for the current session and treats it as a signal that can block on its own. When the coverage score is high, a response reading here is the record for customer 4,117 is blocked -- not because of anything in that response, but because of the four thousand that came before it.
  part_5:
    title: Combining Three Signals at Three Scales
    body: |-
      The three signals operate at three scales -- one response, one certainty, one campaign -- and the combination reflects that hierarchy. The canary comes first and short-circuits: if a canary appears, the score is maximal and nothing else needs consulting, because certainty does not get averaged with probability. Below that, a high-precision rule hit blocks on its own, as in every tiered detector in the chapter. The aggregate campaign signal also blocks on its own, which is the crucial design decision: it must be able to block a response that contains nothing wrong, because that is precisely the case it exists to catch. A medium-precision rule counts only with aggregate corroboration -- a config-file reference in an ordinary session is documentation, while the same reference in a session already showing campaign behaviour is worth acting on.

      The confidence values follow the same hierarchy and say something useful about each signal epistemics. A canary hit reports near-total confidence because it is proof. A high-tier rule hit reports high confidence because the format is unambiguous. An aggregate-only verdict reports moderate confidence, because the campaign signal is a statistical judgement about a session rather than an observation about a response, and it can be wrong about an unusual but legitimate workload. Those differences matter downstream: the combined pipeline in Section 15.07 and the SIEM integration in Chapter 16 can treat a canary-driven block and a rate-driven block very differently, and the confidence field is how this detector tells them which is which.
  part_6:
    title: 'Meeting the Quality Bar: Both Shapes of the Attack'
    body: |-
      The test harness validates against labelled scenarios and reports the three quality-bar metrics with a pass/fail gate, and the corpus must span both shapes of exfiltration or it proves nothing. The single-response positives exercise the rule layer across its classes -- an access key, a PEM header, a connection string with credentials, a system-prompt recitation, a bulk address dump -- and the canary positive exercises the certainty path. The campaign positives are the ones that matter most: entirely benign responses paired with a high coverage or rate score, which must be blocked on the aggregate signal alone. Without those cases a detector whose campaign integration was completely broken would still report a perfect score, because every single-response case would pass and nothing would ever exercise the aggregate path.

      The negatives are built to attack the rule tiers where they are weakest. Benign technical discussion of sensitive topics -- a config example with a placeholder key, an explanation of what /etc/passwd does -- must be allowed, because talking about secrets is not leaking them, and a detector that cannot tell the difference is unusable for any technical audience. A benign response in a benign session confirms the aggregate signal does not over-fire when the scores are low. The bar is met when the detector catches the credential leaks, the extraction proven by canary, and the campaigns hidden in benign responses, while leaving ordinary technical conversation untouched, at the accuracy, latency, and false-positive targets the suite requires. When it does, the last content detector is complete and the suite is ready for Section 15.07 to orchestrate.
