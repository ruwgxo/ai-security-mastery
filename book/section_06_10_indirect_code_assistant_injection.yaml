learning_objectives:
  primary: |
    Map every injection surface in code assistant and CI/CD pipeline deployments,
    explain why developer trust in IDE suggestions creates a uniquely high-impact
    injection pathway, build detection tooling for code comment and dependency
    injection, and specify the hardening architecture for code assistant deployments
    that reduces the attack surface without degrading developer productivity.
