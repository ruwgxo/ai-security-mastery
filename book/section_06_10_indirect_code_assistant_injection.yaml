section_summary: |
  Section 6.10 completed the indirect injection surfaces block by mapping the
  code assistant and CI/CD injection attack surface. Code assistants assemble
  context from seven sources; only the current file buffer is under direct
  developer control. Clipboard injection requires no repository or system access.
  Comment injection exploits the LLM's equal attention to comments and code.
  Dependency README injection chains supply chain access with injection mechanics,
  reaching all developers who import the poisoned package without requiring code
  execution. CI/CD LLM pipeline injection targets automated review workflows
  with deployment-level permissions and immediate infrastructure impact potential.

  The developer trust factor is what makes code assistant injection outcomes
  uniquely high-impact: the injection-to-execution chain is shorter than in
  almost any other injection context. A malicious suggestion accepted by a
  developer and executed closes the chain immediately.

  The hardening architecture addresses the surface at multiple layers: context
  source restriction, comment and string literal scanning with language-aware
  extraction, dependency documentation scanning, CI/CD field classification,
  execution permission sandboxing, and output monitoring. No single control
  is sufficient; the combination narrows the attack surface while preserving
  developer productivity.

  With all five indirect injection surfaces complete (RAG 6.6, Web 6.7,
  Email 6.8, Database 6.9, Code Assistant 6.10), Section 6.11 begins the
  temporal injection patterns block -- attacks that unfold across conversation
  turns, sessions, and time rather than across a single retrieval event.
