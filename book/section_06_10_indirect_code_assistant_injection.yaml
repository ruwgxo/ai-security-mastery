    - "Explain the code assistant context window and identify every injection entry point within it"
    - "Describe clipboard injection and how adversary-controlled clipboard content enters code assistant context"
    - "Explain comment injection mechanics and why code comment content is processed identically to surrounding code context"
    - "Describe dependency README injection and how it chains supply chain risk with injection mechanics"
    - "Explain CI/CD LLM pipeline injection via adversarial PR diffs and code review automation"
