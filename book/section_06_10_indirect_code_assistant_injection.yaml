key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Code assistants assemble context from seven sources beyond the current
        file. Every source beyond the buffer is a potential indirect injection
        surface. The dependency documentation and PR diff surfaces have the
        highest prevalence in practice.

    - number: 2
      takeaway: |
        Clipboard injection requires only that a developer copies from any
        adversary-influenced source while the code assistant is active. The
        adversary needs no access to the project or repository.

    - number: 3
      takeaway: |
        Code comment injection exploits the LLM's equal processing of comments
        and code. An AI-directed instruction in a comment is processed identically
        to surrounding code context. Language-aware comment extraction is required
        for accurate classification.

    - number: 4
      takeaway: |
        Dependency README injection chains supply chain access with injection
        mechanics. The adversary needs only to get their package imported, not
        executed. A single poisoned popular package reaches all projects that
        import it.

    - number: 5
      takeaway: |
        CI/CD LLM pipelines process adversary-controlled content with deployment-
        level permissions. An injection that causes the LLM to approve a malicious
        PR or suppress a security finding has immediate infrastructure impact.
        All human-supplied text fields require classification before LLM processing.

    - number: 6
      takeaway: |
        Developer trust in IDE suggestions creates a short injection-to-execution
        chain. A malicious suggestion that a developer accepts and runs achieves
        execution impact faster than almost any other injection pathway.

    - number: 7
      takeaway: |
        The comment-level classifier must distinguish developer-directed comments
        (legitimate) from AI-directed injection instructions (adversarial). FPR
        calibration against real developer comment patterns is mandatory to achieve
        acceptable false positive rates.

    - number: 8
      takeaway: |
        Code execution escalation converts suggestion-level injection into execution-
        level impact. Least-privilege sandboxing -- internet restriction, confirmation
        before auto-apply, sandboxed shell -- narrows the blast radius regardless
        of whether injection detection succeeds.


