prose_content:

  part_1_what_label_flipping_is:
    title: 'What Label Flipping Is: Definition and Mechanism'
    body: |
      Label flipping is the simplest form of training data poisoning. The adversary
      gains access to a subset of training samples, keeps their features unchanged,
      and modifies their labels. When the model trains on the corrupted dataset, it
      learns a decision boundary that is pulled toward the incorrect supervision
      signal -- points that should have been on one side of the boundary pull the
      boundary toward themselves because their labels claim they belong on the other
      side. The more points the adversary flips, the more the boundary shifts.

      The mechanism operates in standard supervised learning. The model fits a function
      from features to labels by minimising loss over the training set. Each training
      sample contributes a term to the total loss. A flipped sample contributes a
      term that the model can only minimise by moving its decision in the adversary's
      direction. The learning algorithm, which has no way to verify that labels are
      correct, treats flipped samples as ground truth and adjusts accordingly. The
      attack is a form of social engineering at the loss-function level: the adversary
      lies to the optimiser, and the optimiser believes the lie because it has no
      reason not to.

      Two parameters characterise any label flipping attack. The first is the
      contamination rate, typically expressed as the fraction of training samples
      whose labels the adversary has modified. A 5% contamination rate means 5% of
      training samples carry incorrect labels; a 10% contamination rate means 10%.
      Realistic contamination rates for external adversaries operating at rung 2 of
      the access ladder (Section 8.1) are typically bounded below 5%, with 0.5% to
      2% being most common for public dataset contamination. Higher rates indicate
      either insider access (rung 3) or uncommonly poor dataset curation.

      The second parameter is the flip selection strategy. Random flipping picks
      samples uniformly at random and flips their labels to other classes, also chosen
      randomly or according to a fixed rule. Targeted flipping picks samples of
      specific source classes and flips them to specific target classes, preserving
      a source-target mapping that encodes the adversary's intent. Influence-guided
      flipping picks samples based on their estimated influence on the decision
      boundary, flipping samples whose contribution will produce the most damage per
      flip. The selection strategy determines which taxonomy quadrant the attack
      falls into and how efficient the attack is per contamination percentage.

      Label flipping is defined in contrast to the two attack families that followed
      it historically. Clean-label attacks (Section 8.4) keep labels correct but
      modify features to produce similar model-level effects. Backdoor attacks
      (Section 8.5) combine label modifications with feature modifications (trigger
      patterns) to produce conditional misbehaviour rather than aggregate degradation.
      Both evolved specifically to defeat the label-consistency defences that catch
      label flipping. A student who understands why those defences work against
      label flipping is ready to understand why they fail against clean-label and
      backdoor attacks.

  part_2_random_flipping_q1:
    title: 'Random Label Flipping: The Untargeted Availability Variant (Q1)'
    body: |
      Random label flipping is the simplest instantiation of the attack and the
      canonical populator of quadrant Q1 in the Section 8.2 taxonomy. The adversary
      selects a random subset of training samples according to the contamination
      budget and flips each selected sample's label to a different class. The target
      class for each flip is typically drawn uniformly at random from the class set,
      though deterministic mappings (always flip class i to class i+1 mod k) are
      common in research implementations for reproducibility.

      The attack's effect on the model is exactly what the taxonomy framework predicts.
      Aggregate accuracy drops roughly in proportion to the contamination rate, with
      the exact relationship depending on the classifier family and the dataset's
      difficulty. A 5% contamination rate typically produces 2-5% aggregate accuracy
      drop on straightforward tasks (well-separated classes, sufficient training data).
      A 20% contamination rate typically produces 10-20% aggregate accuracy drop.
      The relationship is approximately linear in the contamination range that
      matters for realistic threat models, saturating only as contamination approaches
      50% and the poisoned labels start to dominate clean ones.

      Different classifier families respond differently to random flipping. Linear
      classifiers with large regularisation are relatively robust -- the regularisation
      term pulls the decision boundary toward simpler solutions that the random
      noise of flipped labels cannot easily override. Deep neural networks are more
      vulnerable because their higher capacity allows them to memorise flipped samples
      specifically, fitting the corrupted labels without generalising the corruption
      to a simpler boundary. Decision trees sit between these extremes. K-nearest-
      neighbour classifiers are particularly vulnerable because their decision is
      local -- flipping a small cluster of samples in feature space creates a local
      region where the classifier's neighbourhood vote is dominated by poisoned labels.

      The attack's detection profile is loud. Aggregate validation accuracy drops
      visibly when the model is evaluated on a clean validation set. Version-to-
      version regression testing -- comparing new model accuracy against prior model
      accuracy -- catches the attack automatically if the regression threshold is
      sensitive enough. For production ML pipelines that include accuracy regression
      gates (which most mature deployments do), random label flipping at rates above
      1% or 2% is unlikely to pass undetected. The attack is most dangerous in
      deployments without such gates, such as experimental pipelines, research
      benchmarks, or fine-tuning workflows that do not compare against clean baselines.

      From an adversary's economic perspective, random flipping is the least attractive
      attack in the training-time arsenal. The contamination budgets required are high.
      The attack effect is unfocused -- the adversary degrades performance but cannot
      direct the degradation. The defender signal is loud. The attack is included in
      research benchmarks primarily for methodological completeness (it is the simplest
      attack, therefore the natural baseline for defence benchmarking) rather than
      because it represents a likely real-world threat.

  part_3_targeted_flipping_q4:
    title: 'Targeted Label Flipping: The Class-Targeted Availability Variant (Q4)'
    body: |
      Targeted label flipping is a more sophisticated variant in which the adversary
      chooses specific source-target class pairs to flip rather than applying random
      substitutions. The adversary's goal is to induce specific confusions in the
      trained model rather than general degradation. This variant populates quadrant
      Q4 (targeted availability) of the Section 8.2 taxonomy: the adversary chooses
      which class the model fails on, but does not fully control what incorrect output
      the model produces on failure.

      The canonical example comes from security classifiers. An adversary wanting to
      evade a malware detector flips labels of benign samples to 'malware' and
      labels of malware samples to 'benign'. Trained on the contaminated dataset,
      the model learns a decision boundary that systematically misclassifies samples
      resembling the adversary's flipped distribution. If the adversary has crafted
      the flips around a specific malware family, the resulting classifier fails
      specifically on that family while continuing to classify other malware families
      correctly. Aggregate accuracy across all malware may barely move; the targeted
      family's detection rate collapses.

      Targeted flipping is more budget-efficient than random flipping for the attacker's
      actual goal. Where random flipping at 5% contamination produces roughly 2-5%
      aggregate accuracy drop distributed across all classes, targeted flipping at
      5% of the target class samples (typically 0.5-1% of the total dataset, since
      individual classes are a small fraction of the total) can produce near-complete
      collapse of the target class. The adversary converts budget into focused effect
      rather than spreading it across the distribution.

      Detection is harder than for random flipping. Aggregate validation accuracy may
      not move detectably if the target class is under-represented in the validation
      set. A 10-class dataset with a 10% target class will see aggregate accuracy
      drop by at most 10 percentage points from complete target-class collapse,
      which is visible; a 100-class dataset with a 1% target class will see aggregate
      accuracy drop by at most 1 point from complete target collapse, which is easily
      below the typical regression threshold. The smaller the target class relative
      to the overall distribution, the easier it is to hide targeted flipping under
      aggregate metrics.

      The defensive response is per-class accuracy monitoring. Rather than tracking
      a single aggregate accuracy number, the evaluation infrastructure tracks accuracy
      per class and flags anomalous per-class drops between model versions. A class
      whose accuracy drops from 92% to 15% between versions is an unambiguous signal,
      regardless of what aggregate accuracy did. Most mature ML evaluation infrastructure
      already computes per-class metrics; the security-relevant change is to gate
      releases on per-class regression rather than only aggregate regression. This
      is one of the lowest-cost, highest-value additions to a training-time defence
      programme: the infrastructure exists; the change is in how releases are gated.

      Targeted flipping is also the variant most likely to have security-relevant
      real-world motivations. Adversaries motivated to make specific detections fail
      (malware evasion, content moderation bypass, fraud detection circumvention)
      choose targeted flipping over random flipping because targeted matches their
      goal. When training-time attacks are suspected in a security context, the
      prior probability for targeted flipping should be higher than for random
      flipping -- the adversary with a reason to attack typically has a reason to
      target.

  part_4_influence_function_prioritisation:
    title: 'Influence Functions: Getting More Damage Per Flip'
    body: |
      Random selection and class-pair targeting are both coarse strategies. The
      adversary chooses samples by rule (uniform random, or all samples of the target
      class) rather than by the samples' actual contribution to the model's decision.
      Influence functions provide a more sophisticated selection strategy: estimate
      each sample's contribution to the trained model's decisions, then prioritise
      flips of high-influence samples for maximum damage per flip.

      Influence functions were introduced to machine learning by Koh and Liang in
      2017 as a tool for understanding model predictions -- which training samples
      are most responsible for a given test prediction? The underlying mathematics
      involves second-order derivatives of the loss: specifically, the change in a
      test prediction that results from perturbing a single training sample's weight
      in the loss. Samples with high influence are those whose presence or absence
      substantially shifts the model's predictions. For poisoning purposes, these
      are exactly the samples the adversary wants to flip -- flipping them produces
      large effect per sample.

      The adversary workflow becomes: train a clean model; compute influence for each
      training sample against a target set of test predictions (predictions the
      adversary wants to flip); rank samples by influence; flip the highest-ranked
      samples within the contamination budget. The result is typically 2x to 5x more
      effective than random flipping at the same contamination rate. A 1% influence-
      guided flip can produce effects that random flipping requires 3% or 5% to
      achieve.

      Influence functions assume white-box access to the model -- the adversary must
      be able to compute gradients and Hessian-vector products for the target model.
      This access is available when the adversary has rung-3 pipeline operator access
      (Section 8.1) or access to a substantially similar surrogate model. For rung-2
      adversaries without model access, approximations using surrogate models are
      possible but produce weaker rankings. The attack therefore sits between pure-
      external and pure-insider threat models: highly effective when the adversary
      has model visibility, degrading to approximately random flipping when they do
      not.

      The defensive implication is not a new detection primitive but rather a shift
      in threat assessment. An insider threat or a rung-3 adversary with model access
      can achieve effects with 1% contamination that an external adversary requires
      5% to achieve. Threat models that assume attackers are limited to external
      access -- and therefore assume 5%+ contamination is required for meaningful
      attack -- understate the risk from insiders and supply-chain compromise. The
      correct assumption for a threat-modelled pipeline is that influence-guided
      attacks are feasible, and the budget threshold for detection investment should
      reflect the effective 3x-5x leverage that influence-guided selection provides.

      From a research perspective, influence functions also provide a useful tool
      for defenders. Computing influence for each training sample against a validation
      set can identify high-influence samples for audit review, independent of
      whether those samples appear poisoned by other means. Samples with unusually
      high influence relative to their feature-space neighbours are candidates for
      manual inspection. This is a form of uncertainty-based auditing that
      complements the statistical anomaly detection primitives introduced in Section
      8.12.

  part_5_empirical_budget_curves:
    title: 'Empirical Budget-Degradation Curves'
    body: |
      The relationship between contamination rate and attack effect is the fundamental
      empirical property of any poisoning attack. For label flipping specifically,
      the relationship is well-characterised across classifier families and datasets,
      with enough consistency across studies that it can be summarised in reference
      curves. These curves inform both threat modelling (given an adversary's budget,
      what effect should the defender expect) and defence benchmarking (what
      contamination rate is required for a defence to catch the attack).

      For random label flipping against logistic regression on well-separated
      datasets (canonical binary classification benchmarks like Iris, binary subsets
      of MNIST), the accuracy drop is approximately half the contamination rate.
      A 10% contamination rate produces roughly 5% accuracy drop; a 20% rate
      produces roughly 10%. The factor varies between 0.4 and 0.6 across standard
      datasets, with the variation explained by class separability and regularisation
      strength.

      For random label flipping against neural networks trained from scratch on
      image classification tasks (CIFAR-10, MNIST), the relationship is more volatile.
      Networks with heavy regularisation behave similarly to logistic regression.
      Networks with sufficient capacity to memorise often show threshold behaviour:
      accuracy is preserved up to some contamination level (the network memorises
      flipped samples as outliers without generalising), then degrades rapidly above
      that threshold. The threshold depends on network capacity and training duration.
      In practical terms, defenders cannot assume a linear response -- a new model
      version showing no accuracy change from a poisoned training set is not
      necessarily clean; it may be a memorised-outlier regime where the backdoor
      behaviour is hidden.

      For random label flipping against tree-based ensembles (Random Forests, gradient-
      boosted trees), the relationship is intermediate. Ensembles tolerate small
      amounts of label noise through their averaging structure, but degrade when
      the noise exceeds a per-tree threshold. Typical behaviour is graceful
      degradation from 0% to 10% contamination, then sharper degradation above 10%.

      For targeted label flipping, the relevant curve is per-class accuracy as a
      function of target-class contamination rate. The relationship is more dramatic:
      flipping 30% of a target class's samples typically produces complete target-
      class collapse, regardless of classifier family. The reason is that 30% of
      a class being mislabelled as another class effectively merges the two classes
      in the training signal; the model cannot separate what has been trained as
      overlapping. Below 30%, partial degradation occurs proportional to the flip
      rate within the class.

      These curves are reference points for defence benchmarking and threat modelling.
      They are not guarantees -- specific datasets, architectures, and training
      procedures can produce different numbers. The value of the curves is not
      predictive precision but rather establishment of a typical response shape
      that defenders can use to calibrate detection thresholds and investment priorities.
      A defence that catches 5%-contamination random flipping but not 2%-contamination
      influence-guided flipping has a different operational profile than one that
      catches both, and the curves quantify the gap.

  part_6_detection_via_label_consistency:
    title: 'Detection via Label Consistency: kNN Agreement and Fold Disagreement'
    body: |
      Label consistency defences are the canonical response to label flipping. The
      mechanism is straightforward: under the assumption that training samples with
      similar features should have similar labels, samples whose labels disagree
      with their neighbours' labels are candidates for poisoning. The defence looks
      for label-neighbourhood mismatches in feature space and flags the mismatches
      as suspect.

      The kNN agreement defence makes this concrete. For each training sample,
      find its k nearest neighbours in feature space. Compute the fraction of those
      neighbours whose labels agree with the sample's label. A clean sample should
      have high agreement -- the majority of its feature-space neighbours carry
      the same label, because clean samples cluster by class in well-structured
      datasets. A flipped sample should have low agreement -- its feature-space
      neighbours carry the original class's label, but it now carries a different
      label, producing a neighbourhood mismatch. Samples with agreement below a
      threshold are flagged for review or removal.

      The defence works well against label flipping because flipping creates exactly
      the anomaly the defence looks for. A flipped sample is a sample in the
      feature-space region of class A that carries class B's label. Its nearest
      neighbours, being clean samples in class A's region, carry class A's label.
      The agreement score collapses. Detection rates against random label flipping
      at 5% contamination are typically 80-95% with well-tuned k values (typically
      5 to 20 neighbours). Detection rates against targeted flipping at equivalent
      budgets are similar. Influence-guided flipping is slightly harder to detect
      because the attacker may prioritise flips that happen to sit in feature-space
      regions where the neighbourhood structure is less regular, but the degradation
      is modest -- still 70-85% detection.

      The cross-validation fold disagreement defence is a complementary approach.
      Train multiple models on different folds of the training data, then compare
      predictions on held-out samples. Samples whose predicted labels differ from
      their claimed labels across most folds are suspect. The underlying intuition
      is the same: flipped samples have labels inconsistent with what the dataset's
      overall signal supports, so models trained on any subset of the data will
      predict the clean label rather than the flipped label. The defence has slightly
      different trade-offs than kNN agreement -- it is more expensive computationally
      (requires training multiple models) but does not require a meaningful feature-
      space distance metric, which matters for high-dimensional or structured
      feature spaces where neighbourhoods are less well-defined.

      Both defences share a fundamental limitation that Section 8.4 exploits: they
      assume that poisoned samples are feature-neighbourhood outliers. This
      assumption is correct for label flipping, where the adversary modifies only
      labels and leaves features intact, guaranteeing neighbourhood inconsistency
      with the new label. The assumption is incorrect for clean-label poisoning,
      where the adversary explicitly constructs samples whose features sit in the
      target class's neighbourhood while carrying the target class's label. For
      clean-label samples, the label and neighbourhood agree -- the features have
      been engineered to make the clean label consistent with the neighbourhood.
      The defence sees no anomaly because no anomaly of the type the defence
      searches for is present.

      This is the structural reason label flipping is the easiest attack to detect
      and the defensive baseline for all subsequent sections. A defence that catches
      label flipping at 90% rates is solving the easiest problem. The test of defensive
      sophistication is performance against attacks that the label-consistency defence
      misses entirely. Section 8.4 introduces such attacks, and Section 8.12's
      detection primitives are designed for the regime where label consistency provides
      no signal.

  part_7_limitations_and_what_comes_next:
    title: 'Limitations and the Transition to Clean-Label Attacks'
    body: |
      Label flipping is the canonical baseline and remains useful for defence
      benchmarking, but its limitations as a real-world threat are substantial. The
      attack is detected by defences that have been standard in ML evaluation for
      years. Its budget requirements are high relative to more sophisticated attacks.
      Its effect is unfocused relative to targeted integrity attacks. Its detection
      profile is loud enough that even accidental data quality issues (mislabelled
      samples due to annotator error) produce similar signals and get caught by the
      same defences.

      The actual threat from label flipping in production contexts is limited to
      specific scenarios. Supply chain attacks where an adversary poisons a publicly
      distributed dataset before it is curated -- in these cases, label flipping is
      one of several attack options, and curators with label-consistency auditing
      will catch it. Insider attacks where a rung-3 adversary has pipeline access
      -- here, label flipping is possible but the adversary typically has access to
      more effective attacks (direct backdoor insertion, gradient manipulation) that
      do not require label modifications to work. Adversarial annotation in
      crowdsourced datasets where cost constraints prevent thorough consistency auditing
      -- this is perhaps the most realistic contemporary threat model for label
      flipping specifically.

      The historical importance of label flipping is that it motivated the development
      of label-consistency defences, which are now the standard first line in training
      data auditing pipelines. It also motivated the subsequent development of attack
      families that circumvent those defences -- clean-label poisoning (Section 8.4),
      backdoor attacks (Section 8.5), advanced backdoor variants (Section 8.6).
      Each of these attack families can be understood as 'label flipping but with
      the feature to defeat the label-consistency defence'. Clean-label attacks
      defeat it by keeping labels correct and engineering features. Backdoor attacks
      defeat it by combining label modifications with feature-space trigger patterns
      that preserve aggregate accuracy. Advanced backdoors defeat it by making the
      feature modifications invisible to human review.

      The section therefore closes not with label flipping as a resolved problem
      but as a solved instance of a family that continues to evolve. The same
      selection strategies (random, targeted, influence-guided) and the same effect
      taxonomy (untargeted availability, targeted availability) apply to every
      subsequent attack family. What changes is how the attack defeats the defence
      in the previous section. Section 8.4 is the next step in that escalation,
      and it begins immediately from the limitations of label-consistency detection
      that this section established.

reference_materials:

  label_flipping_variants_reference:
    title: 'Label Flipping Variants Reference'
    description: |
      Three principal variants of label flipping, each with distinct adversary
      requirements, detection profiles, and taxonomy positions.

    variants:

      - variant_id: 'LF-R'
        name: 'Random label flipping'
        selection_strategy: 'Uniform random selection of samples; random target labels'
        taxonomy_quadrant: 'Q1 Untargeted Availability'
        typical_budget: '5% to 20% for detectable degradation'
        adversary_requirement: 'Write access to training samples (rung 2 or higher)'
        effect_characteristic: 'Aggregate accuracy drop proportional to contamination rate'
        detection_profile: 'Very easy -- aggregate accuracy regression catches it'
        primary_defence: 'kNN agreement, cross-validation fold disagreement'
        typical_detection_rate: '85-95% at 5% contamination with well-tuned defences'

      - variant_id: 'LF-T'
        name: 'Targeted (class-pair) label flipping'
        selection_strategy: 'Flips within specific source-target class pairs'
        taxonomy_quadrant: 'Q4 Targeted Availability'
        typical_budget: '5% to 10% of target class samples (0.5% to 1% of total dataset)'
        adversary_requirement: 'Write access to training samples; knowledge of class structure'
        effect_characteristic: 'Target class accuracy collapse; aggregate accuracy may or may not move'
        detection_profile: 'Moderate -- aggregate monitoring may miss; per-class monitoring catches'
        primary_defence: 'Per-class accuracy regression; kNN agreement'
        typical_detection_rate: '80-90% at equivalent budgets with per-class defences'

      - variant_id: 'LF-I'
        name: 'Influence-guided label flipping'
        selection_strategy: 'Select high-influence samples for flipping using influence functions'
        taxonomy_quadrant: 'Q1 or Q4 depending on target specification'
        typical_budget: '1% to 5% for effects equivalent to 5-15% random flipping'
        adversary_requirement: 'White-box model access or close surrogate; rung 3 typical'
        effect_characteristic: '2x-5x more effective per poisoned sample than random flipping'
        detection_profile: 'Moderate -- label consistency still catches most variants'
        primary_defence: 'kNN agreement; influence-based auditing'
        typical_detection_rate: '70-85% at equivalent budgets'

  budget_curves_reference:
    title: 'Budget-Degradation Curves for Label Flipping'
    description: |
      Typical empirical relationships between contamination rate and attack effect
      across classifier families. Use as reference for threat modelling and defence
      benchmarking.

    curves_random_flipping:

      - classifier_family: 'Logistic regression (L2-regularised)'
        budget_2_percent_effect: '~1% accuracy drop'
        budget_5_percent_effect: '~2-3% accuracy drop'
        budget_10_percent_effect: '~5-6% accuracy drop'
        budget_20_percent_effect: '~10-12% accuracy drop'
        shape: 'Approximately linear; factor 0.5-0.6'

      - classifier_family: 'Neural networks (from scratch, moderate regularisation)'
        budget_2_percent_effect: '~0-1% accuracy drop (memorisation regime)'
        budget_5_percent_effect: '~1-3% accuracy drop'
        budget_10_percent_effect: '~3-8% accuracy drop (threshold behaviour)'
        budget_20_percent_effect: '~10-20% accuracy drop'
        shape: 'Threshold-like; flat below capacity threshold, then rapid degradation'

      - classifier_family: 'Tree ensembles (Random Forest, XGBoost)'
        budget_2_percent_effect: '~0.5-1% accuracy drop'
        budget_5_percent_effect: '~2-3% accuracy drop'
        budget_10_percent_effect: '~4-6% accuracy drop'
        budget_20_percent_effect: '~10-15% accuracy drop'
        shape: 'Graceful degradation to 10%, sharper above'

      - classifier_family: 'kNN classifier'
