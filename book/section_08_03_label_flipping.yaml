section_overview:
  title: 'Label Flipping Attacks: The Canonical Data Poisoning Primitive'
  one_line_summary: |
    Label flipping is the simplest data poisoning attack and the first every practitioner
    should implement -- the adversary modifies training labels while keeping features
    unchanged, corrupting the supervision signal. Random flipping degrades aggregate
    accuracy (Q1 availability); targeted flipping produces class-specific failure
    (Q4 targeted availability). Influence-function-based selection lets attackers get
    more damage per flip. Label consistency defences catch most variants -- which is
    why Section 8.4 introduces clean-label attacks that bypass them.

  why_this_section_exists: |
    Every chapter on data poisoning starts with label flipping for the same reason:
    it is the mechanism against which every other attack is measured. A student who
    cannot implement label flipping, cannot measure its budget-to-accuracy relationship,
    and cannot build a label-consistency detector is missing the vocabulary for
    everything that follows. Sections 8.4 and 8.5 define themselves negatively against
    label flipping -- clean-label attacks are the ones that keep labels correct;
    backdoor attacks are the ones that preserve aggregate accuracy despite label
    modifications on triggered samples.

    This section is also the first practical exercise in Chapter 8. Section 8.1 was
    threat model; Section 8.2 was taxonomy. Both are scaffolding. Section 8.3 is the
    first place where the reader implements an attack, measures its effect across
    budget parameters, and deploys the canonical defence. The implementation mandate
    is intentional: you cannot reason about data poisoning defences without having
    watched a poisoning attack in code, and you cannot evaluate defence primitives
    without having measured them on the baseline attack.

    Label flipping also establishes the experimental methodology used throughout
    Chapter 8. Every subsequent attack section (8.4, 8.5, 8.6, 8.7, 8.8, 8.9) follows
    the same structure: attack implementation, budget-effect measurement, defence
    implementation, detection-rate measurement, limitations analysis. Section 8.3
    builds the template. Later sections populate it with more sophisticated attacks
    that defeat progressively more capable defences.

  position_in_chapter: |
    This is the first attack section in Chapter 8. Its structural role is to be the
    baseline -- the simplest attack, the canonical defence, the budget curves every
    later attack gets compared against. Section 8.4 defines itself as 'label flipping
    but keeping labels honest'. Section 8.5 defines itself as 'label flipping but
    preserving aggregate accuracy'. Section 8.11 defines itself as 'label flipping
    delivered via web-scale corpus contribution'. The section therefore does more
    definitional work than its apparent complexity suggests.

    Label flipping populates quadrant Q1 (random variant, untargeted availability)
    and quadrant Q4 (class-pair variant, targeted availability) of the Section 8.2
    taxonomy. Its defensive coverage is label-consistency auditing, which fails for
    Q2 and Q3 attacks (clean-label and backdoor) -- a failure mode Section 8.4 then
    exploits as its entry point.

