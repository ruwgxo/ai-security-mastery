common_mistakes:

  mistake_1_treating_label_flipping_as_the_threat:
    description: 'Treating label flipping as the primary training-time threat and considering the defence programme complete when label-consistency detection is deployed'
    why_it_happens: |
      Label flipping is the canonical attack in research literature; it appears in
      virtually every introductory treatment of data poisoning. Students who learn
      from those treatments internalise it as the representative attack. Once the
      label-consistency defence is deployed and demonstrated against label flipping,
      the programme feels complete -- the canonical attack is covered.
    consequence: 'Detection programme that covers Q1 and Q4 attacks (label flipping variants) but not Q2 (clean-label, backdoor). The dominant threat class -- targeted integrity -- is entirely uncovered. The most economically rational adversary attacks pass undetected.'
    correct_approach: 'Treat label flipping defence as the baseline, not the goal. The benchmark question is whether your detection primitive catches attacks in the Q2 quadrant that label-consistency defence misses. Sections 8.4 onward give you those attacks; Section 8.12 gives you the Q2 primitives.'

  mistake_2_ignoring_per_class_monitoring:
    description: 'Monitoring only aggregate accuracy regression, missing targeted label flipping (Q4)'
    why_it_happens: |
      Aggregate accuracy is a single number; it is easy to track, easy to gate releases
      on, and easy to communicate. Per-class accuracy is a vector; it requires slightly
      more infrastructure and produces more complex dashboards. The simpler monitoring
      wins by default in most deployments.
    consequence: 'Targeted label flipping against small-prevalence classes passes regression gates undetected. Security classifiers -- where targeted evasion is the primary threat motivation -- are especially exposed because adversaries specifically aim at the under-represented malicious class whose collapse barely moves aggregate metrics.'
    correct_approach: 'Gate releases on per-class regression in addition to aggregate. The infrastructure change is small; the coverage gap it closes is substantial. For security classifiers specifically, treat per-class regression monitoring as mandatory.'

  mistake_3_assuming_linear_budget_degradation:
    description: 'Assuming random label flipping produces degradation linear in contamination rate for all classifier families'
    why_it_happens: |
      Logistic regression and similar simple classifiers do produce approximately
      linear degradation. This is the case most often cited in textbooks. Practitioners
      extrapolate to neural networks and other model families without verifying the
      shape empirically.
    consequence: 'Threshold-regime attacks on neural networks go undetected because the aggregate accuracy does not move at low contamination rates. Defenders conclude the model is clean when it is actually in the memorisation regime, with poisoned samples memorised as outliers but available to influence subsequent fine-tuning.'
    correct_approach: 'Use family-specific budget-degradation curves (reference_materials.budget_curves_reference). For neural networks specifically, do not assume linearity; expect threshold behaviour and calibrate detection thresholds accordingly.'

  mistake_4_underestimating_influence_guided_attacks:
    description: 'Threat modelling assumes adversaries use random selection, underestimating the leverage available to insiders and rung-3 adversaries'
    why_it_happens: |
      Influence functions require white-box access; external adversaries rarely have
      this access; therefore threat models focused on external threats weight
      influence-guided attacks low. The mistake is extending this assumption to
      insider and supply-chain threat models, where white-box access is often
      available.
    consequence: 'Defensive investment calibrated against random flipping budgets; insiders achieve attack effects at 1/3 the budget that defences were designed to catch. Insider threat coverage is effectively absent even when the programme believes it is present.'
    correct_approach: 'Include influence-guided attacks in defence benchmarking for any threat model that includes insiders or rung-3 access. Detection thresholds should hold against the 2x-5x leverage advantage that influence-guided selection provides.'

  mistake_5_neglecting_defence_false_positive_tuning:
    description: 'Deploying label-consistency defences without calibrating false positive rate against real data quality signals'
    why_it_happens: |
      In research benchmarks, clean datasets are actually clean -- the only label
      anomalies are the ones the attacker introduced. In production, datasets contain
      annotation errors, ambiguous samples, and legitimate edge cases that produce
      neighbourhood inconsistencies without being attacks. Defences that work in
      research benchmarks produce unacceptable FPR in production.
    consequence: 'Either the defence is ignored in production (too many false positives for the SOC to triage) or real attacks are missed (threshold set high enough to avoid FP flood, low enough TPR to miss influence-guided flipping). Neither outcome provides the coverage the programme believed it bought.'
    correct_approach: 'Calibrate defence thresholds against production data distributions, not research benchmarks. Treat some baseline FPR as unavoidable (data quality is imperfect) and design triage workflows that handle it efficiently. Section 8.15 auditing pipeline incorporates this calibration explicitly.'

section_summary:
  compact: |
    Label flipping is the simplest training data poisoning attack: adversary modifies
    training labels while leaving features unchanged, corrupting the supervision signal.
    Random flipping produces untargeted availability effect (Q1); targeted class-pair
    flipping produces class-specific availability effect (Q4); influence-guided flipping
    extracts 2x-5x more effect per flip given white-box access. Budget-degradation curves
    are approximately linear for simple classifiers, threshold-like for neural networks,
    graceful-then-sharp for tree ensembles. Label-consistency defences -- kNN agreement
    and cross-validation fold disagreement -- catch label flipping at 80-95% detection
    rates because flipping creates exactly the feature-neighbourhood inconsistency these
    defences look for. The structural limitation is that label consistency assumes
    poisoned samples are feature-neighbourhood outliers, which is true for label flipping
    and false for clean-label attacks (Section 8.4). Label flipping is therefore the
    defensive baseline, not the defensive goal: catching it at 90% is solving the
    easiest problem. The test of defensive sophistication is performance on attacks
    that bypass label-consistency entirely, which the next six sections systematically
    introduce.

  key_takeaways:
    - 'Label flipping is the canonical baseline attack -- simplest to implement, simplest to detect'
    - 'Three variants: random (Q1), targeted class-pair (Q4), influence-guided (higher leverage per flip)'
    - 'Budget-degradation curves vary by classifier family; neural networks show threshold behaviour, not linear'
    - 'Per-class accuracy monitoring is the key defence against targeted flipping variant'
    - 'Label-consistency defence (kNN agreement, fold disagreement) achieves 80-95% detection against label flipping at realistic budgets'
    - 'The defence fails for clean-label attacks (Section 8.4) because those attacks preserve the feature-neighbourhood consistency label flipping disrupts'
    - 'Label flipping remains useful as defensive baseline; Q2 integrity attacks are the actual threat class'

preview_section_04:
  title: 'Clean-Label Poisoning: Bypassing Label Consistency Defences'
  connection: |
    Section 8.3 established label flipping and the label-consistency defences that
    catch it. Section 8.4 begins the systematic escalation: clean-label poisoning
    keeps labels correct -- the supervision signal is honest -- and corrupts features
    instead. The label-neighbourhood consistency that flipping violates is preserved;
    the feature-space collision is engineered. Poison Frogs (Shafahi et al. 2018)
    is the canonical attack. The defence shifts from label space to feature space,
    and the entire analytical tooling of Sections 8.12-8.13 (spectral signatures,
    activation clustering, robust training) is developed against the clean-label
    threat model. Section 8.4 is the pivot from easy to hard poisoning defence.

