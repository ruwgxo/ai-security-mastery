# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Competing objective attacks argue within the model's own value framework\
    \ rather than circumventing it. They exploit the ambiguity region where\
    \ safety and helpfulness training genuinely conflict. There is no clean\
    \ patch that eliminates the conflict without introducing over-refusal."
  - "Medical and safety pretext is the highest-FPR variant because genuine medical\
    \ professionals use identical framing. The specificity scorer is mandatory\
    \ as corroboration -- never act on a credential claim alone."
  - "Dual newspaper test invocation and refusal-as-harm arguments have very low\
    \ FPR and do not require specificity corroboration. These are standalone\
    \ high-confidence signals."
  - "Sycophancy exploitation functions as an amplifier, not a standalone exploit.\
    \ It reduces the model's refusal firmness, enabling follow-up escalation.\
    \ Measure compliance firmness, not just binary compliance, in red-team testing."
  - "The competing objective feature set completes the semantic classifier feature\
    \ inventory. Section 7.14 assembles all four feature sources (S7.3, S7.4,\
    \ S7.6, S7.11) into jailbreak_classifier.py -- the first of the five\
    \ ensemble tracks."
  - "The combined detection signal for all high-FPR variants is: argument pattern\
    \ detected AND specificity score above threshold. Neither alone is sufficient.\
    \ The conjunction is the alert condition."

