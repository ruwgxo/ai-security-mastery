# SECTION SUMMARY
# ============================================================================

section_summary:
  one_paragraph: |
    Section 5.7 establishes MITRE ATLAS as the detection engineering vocabulary
    for AI security, beginning with the four gaps in MITRE ATT&CK that motivated
    ATLAS's creation (adversarial examples, training data poisoning, model extraction,
    and inference evasion — all techniques with no ATT&CK analogue). The four-level
    ATLAS hierarchy (tactics, techniques, sub-techniques, case studies) mirrors ATT&CK's
    structure for immediate adoption by practitioners who know ATT&CK, while the AML.TXXXX
    identifier namespace unambiguously distinguishes ATLAS from ATT&CK entries for joint
    campaign tracking. All 12 ATLAS tactics are documented in kill-chain order with
    adversary goal, representative techniques, ATT&CK parallel, and detection opportunity
    summary, then mapped to the eight attack surface layers from Section 5.2 — giving
    practitioners the dual vocabulary needed to bridge architecture and threat intelligence.
    Four adversary profiles (nation-state, criminal, insider, researcher) are characterised
    by their distinctive ATLAS technique sets and detection challenges. Three real case
    studies (GPT-2 training data extraction via prefix probing, physical adversarial patch
    on traffic sign classifier, Microsoft Tay coordinated poisoning) are analysed as complete
    tactic-technique chains with detection opportunity assessment and mitigation mapping.
    The ATLAS vs ATT&CK comparison section identifies five AI-specific ATLAS techniques
    with no ATT&CK parallel and provides a layered coverage model combining both frameworks.
    The section closes with detection engineering and red teaming applications: the detection
    opportunity matrix mapping each ATLAS technique to data source and detection logic,
    quantitative coverage measurement methodology, and a four-phase ATLAS-structured red
    team exercise template. Three implementations deliver the complete 12-tactic reference
    card with layer mapping, the detection opportunity matrix with coverage scoring, and
    a three-case-study analyser.

  next_section: |
    Section 5.8 — MITRE ATLAS Techniques in Practice: Attack Patterns and Detection Opportunities
    The framework overview complete, Section 5.8 goes deep on individual ATLAS techniques:
    30+ techniques with specific attack patterns, required data sources, detection logic sketches,
    and detection difficulty ratings. The section introduces technique chaining — how adversaries
    combine individual ATLAS techniques into multi-stage campaigns — and presents the ATLAS
    coverage heat map for prioritising detection investment.

