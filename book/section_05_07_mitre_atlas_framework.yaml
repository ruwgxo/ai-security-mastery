section_content:

  # --------------------------------------------------------------------------
  # 5.7.1 — Why ATLAS Exists: The ATT&CK Gap
  # --------------------------------------------------------------------------

  subsection_01:
    number: "5.7.1"
    title: "Why ATLAS Exists: The Gap ATT&CK Could Not Fill"
    content: |
      mitre_att_and_ck_background: |
        MITRE ATT&CK (Adversarial Tactics, Techniques and Common Knowledge) was
        first published in 2013 as a structured knowledge base of adversary behaviour
        observed in real intrusions against enterprise networks. It catalogues how
        adversaries: gain initial access, execute code, establish persistence, escalate
        privilege, evade defences, move laterally, collect data, and exfiltrate it.
        ATT&CK became the de facto standard vocabulary for detection engineering,
        red teaming, and threat intelligence sharing across the security industry.
        By 2020, ATT&CK was referenced in vendor documentation, government advisories,
        and detection rule sets worldwide.

      the_gap_att_and_ck_leaves: |
        ATT&CK was built on observed behaviour against traditional IT systems:
        operating systems, network protocols, enterprise software. As ML systems
        began appearing in production deployments — in content moderation, fraud
        detection, autonomous vehicles, healthcare diagnostics — a new class of
        attack emerged that ATT&CK had no vocabulary for:

        gap_01_adversarial_examples: |
          Adversarial examples (Szegedy et al., 2013) exploit the decision boundaries
          of neural networks using crafted inputs that are indistinguishable to humans
          but cause the model to misclassify. This is not privilege escalation, not
          code execution, not lateral movement — it is manipulation of a learned
          function. ATT&CK has no technique for it.

        gap_02_training_data_poisoning: |
          An adversary who can influence a model's training data — by injecting
          examples, manipulating labels, or contaminating a data source that feeds
          a training pipeline — can alter the model's behaviour before it is ever
          deployed. This attack occurs months before the model reaches production.
          ATT&CK covers supply chain compromise of software, but not the systematic
          manipulation of statistical learning at training time.

        gap_03_model_extraction: |
          Reconstructing a model's functionality by querying its API has no ATT&CK
          analogue. The "exfiltration" of a neural network is not file transfer —
          it is the statistical reconstruction of learned weights through inference
          queries. The target is not data; it is a function approximator.

        gap_04_inference_evasion: |
          Bypassing a deployed ML-based security system (malware classifier, fraud
          detector, deepfake detector) through adversarially crafted inputs is an
          attack technique with no ATT&CK entry. The closest analogue is "defence
          evasion" — but the mechanism is exploitation of gradient-based
          vulnerabilities, not OS-level or network-level technique.

      atlas_origin: |
        MITRE ATLAS (Adversarial Threat Landscape for Artificial-Intelligence Systems)
        was developed by MITRE's AI security team in collaboration with industry
        partners and first published in 2021. It was explicitly designed to fill the
        ATT&CK gap for ML systems, using the same structural framework (tactics,
        techniques, sub-techniques) and the same philosophy (empirically grounded in
        real incidents, not theoretical).

        design_principles:
          att_and_ck_compatible: |
            ATLAS uses the same tactic-technique-sub-technique hierarchy as ATT&CK,
            enabling practitioners who know ATT&CK to immediately read ATLAS. Where
            an adversary campaign spans both traditional IT and ML systems (the common
            case), practitioners can track the full kill chain across both frameworks
            without switching vocabulary.
          empirically_grounded: |
            Every ATLAS technique is backed by at least one case study documenting
            real adversary behaviour — either a confirmed real-world incident or
            a peer-reviewed research demonstration. Theoretical attacks without
            empirical grounding are not included.
          living_framework: |
            ATLAS is versioned and continuously updated as new ML attack techniques
            are documented. The community can contribute case studies through a
            submission process, making ATLAS a living threat intelligence resource
            rather than a static catalogue.

      atlas_in_one_sentence: |
        ATLAS is to ML security what ATT&CK is to network and endpoint security:
        a structured, empirically grounded, community-maintained catalogue of
        adversary tactics and techniques, enabling detection engineers, red teamers,
        and threat intelligence analysts to speak a common language about ML-specific
        threats.

  # --------------------------------------------------------------------------
  # 5.7.2 — ATLAS Structure: Four-Level Hierarchy
  # --------------------------------------------------------------------------

  subsection_02:
    number: "5.7.2"
    title: "ATLAS Structure: Tactics, Techniques, Sub-Techniques, and Case Studies"
    content: |
      four_level_hierarchy:

        level_1_tactics:
          definition: |
            A tactic is the adversary's goal — what they are trying to achieve.
            Tactics are high-level and stable: they change rarely because adversary
            goals (reconnaissance, access, impact) are fundamental regardless of
            the specific technology being attacked.
          count_in_atlas: "12 tactics in ATLAS v2 (2024)"
          example: "ML Reconnaissance — the adversary is trying to learn about the target ML system"
          att_and_ck_parallel: "Initial Reconnaissance in ATT&CK"

        level_2_techniques:
          definition: |
            A technique answers: how does the adversary achieve their tactical goal?
            Techniques are more specific than tactics and evolve as new attack methods
            are discovered. Each technique has a unique AML.TXXXX identifier.
          count_in_atlas: "~75 techniques across 12 tactics (ATLAS v2)"
          example: "AML.T0040 — ML Model Inference API Access (technique for ML Reconnaissance)"
          att_and_ck_parallel: "Techniques in ATT&CK (e.g. T1566 Phishing)"

        level_3_sub_techniques:
          definition: |
            Sub-techniques describe specific implementations of a technique — variations
            in how the technique is executed. Not all techniques have sub-techniques.
          example: |
            AML.T0043.000 — Craft Adversarial Data: Perform Black-box Optimization
            AML.T0043.001 — Craft Adversarial Data: Perform White-box Optimization
            AML.T0043.002 — Craft Adversarial Data: Insert Backdoor Triggers
          att_and_ck_parallel: "Sub-techniques in ATT&CK (e.g. T1566.001 Spearphishing Attachment)"

        level_4_case_studies:
          definition: |
            Case studies are documented real-world incidents or peer-reviewed research
            demonstrations mapped to ATLAS tactics and techniques. They provide the
            empirical grounding for every technique entry and give practitioners
            concrete examples of what each technique looks like in practice.
          format: |
            Each case study documents: target system, adversary type, techniques used
            (as AML.TXXXX references), outcome, detection opportunities, and references.
          examples:
            - "Botnet detection system evasion via adversarial example crafting"
            - "GPT-2 training data extraction via prefix probing (Carlini et al.)"
            - "Face recognition system bypass via physical adversarial patches"
            - "Autonomous vehicle lane detection manipulation via road sticker attacks"

      reading_an_atlas_technique_entry: |
        Every ATLAS technique entry contains:
          id:           "AML.TXXXX or AML.TXXXX.YYY"
          name:         "Short descriptive name"
          tactic:       "Which of the 12 tactics this technique serves"
          description:  "What the adversary does and why"
          procedure:    "Specific known implementations (linked to case studies)"
          mitigations:  "Recommended countermeasures"
          detection:    "Detection approach and data sources"
          references:   "Academic papers, incident reports, CVEs"

      atlas_technique_id_format: |
        AML.TXXXX         — technique (4-digit number, e.g. AML.T0040)
        AML.TXXXX.YYY     — sub-technique (3-digit suffix, e.g. AML.T0043.001)
        AML.MXXXX         — mitigation (M prefix)
        AML.CSXXXX        — case study (CS prefix)

        The "AML" namespace distinguishes ATLAS identifiers from ATT&CK identifiers
        (which use plain T, M, G, S prefixes), enabling unambiguous cross-reference.

  # --------------------------------------------------------------------------
  # 5.7.3 — The 12 ATLAS Tactics: Kill Chain in Order
  # --------------------------------------------------------------------------

  subsection_03:
    number: "5.7.3"
    title: "The 12 ATLAS Tactics: Adversary Goals from Reconnaissance to Impact"
    content: |
      atlas_12_tactics:

        tactic_01:
          id: "AML.TA0000"
          name: "ML Reconnaissance"
          adversary_goal: "Gather information about the target ML system before attacking"
          representative_techniques:
            - "AML.T0000 — Search for Victim's Publicly Available Research Materials"
            - "AML.T0001 — Search Victim-Owned Websites"
            - "AML.T0040 — ML Model Inference API Access (probe capabilities)"
            - "AML.T0041 — Full ML Model Access via ML-as-a-Service"
          what_the_adversary_learns:
            - "Model type, architecture, and task"
            - "Input/output format and constraints"
            - "Performance characteristics and known failure modes"
            - "Training data sources and update cadence"
          att_and_ck_parallel: "TA0043 Reconnaissance"
          detection_opportunity: "API probe patterns; unusual input diversity; capability enumeration queries"

        tactic_02:
          id: "AML.TA0001"
          name: "ML Resource Development"
          adversary_goal: "Establish resources needed to conduct the ML attack campaign"
          representative_techniques:
            - "AML.T0002 — Acquire Public ML Artifacts (datasets, pre-trained models)"
            - "AML.T0003 — Acquire Training Data"
            - "AML.T0005 — Build attack ML infrastructure"
            - "AML.T0006 — Create Proxy ML Model (surrogate for attack development)"
          what_the_adversary_builds:
            - "Surrogate model approximating the target for offline attack development"
            - "Adversarial example generation pipeline"
            - "Poisoned training dataset"
          att_and_ck_parallel: "TA0042 Resource Development"
          detection_opportunity: "Limited — resource development occurs on adversary infrastructure"

        tactic_03:
          id: "AML.TA0002"
          name: "Initial Access to ML"
          adversary_goal: "Gain entry into the target's ML pipeline or model serving infrastructure"
          representative_techniques:
            - "AML.T0010 — Exploit Public-Facing ML API"
            - "AML.T0012 — Valid Accounts (insider or compromised credentials)"
            - "AML.T0019 — Target ML Model via ML Supply Chain"
          notes: |
            Initial access to ML pipelines often occurs through traditional IT techniques
            (phishing, credential stuffing, supply chain compromise) — the ML-specific
            aspect is what the adversary does once they have access.
          att_and_ck_parallel: "TA0001 Initial Access"
          detection_opportunity: "Anomalous API access; unauthorised model registry access; supply chain integrity alerts"

        tactic_04:
          id: "AML.TA0004"
          name: "ML Model Access"
          adversary_goal: "Obtain different levels of access to the target model for attack purposes"
          access_levels_documented:
            black_box: "Query access via API only — inputs and outputs visible"
            grey_box: "API access plus partial knowledge (architecture, training data type)"
            white_box: "Full access to model weights, architecture, and training data"
          representative_techniques:
            - "AML.T0040 — ML Model Inference API Access"
            - "AML.T0041 — Full ML Model Access via Service"
            - "AML.T0044 — Full ML Model Access (insider/direct weight access)"
          att_and_ck_parallel: "No direct parallel — ML-specific access level taxonomy"
          detection_opportunity: "Access tier monitoring; logprob access pattern; weight file read events"

        tactic_05:
          id: "AML.TA0005"
          name: "Execution"
          adversary_goal: "Run adversary-controlled code within the target ML environment"
          representative_techniques:
            - "AML.T0011 — User Execution (victim loads malicious model)"
            - "AML.T0049 — Exploit ML Software Vulnerability (framework CVE)"
          notes: |
            ML-specific execution technique: pickle deserialisation RCE (Section 5.5)
            is the primary documented mechanism. torch.load() on a malicious .pkl
            file achieves code execution as a direct consequence of ML workflow.
          att_and_ck_parallel: "TA0002 Execution"
          detection_opportunity: "Model file format check; process spawned from ML serving process"

        tactic_06:
          id: "AML.TA0006"
          name: "Persistence in ML"
          adversary_goal: "Maintain access or implant capabilities that survive model retraining"
          representative_techniques:
            - "AML.T0020 — Poison Training Data (backdoor that survives future retraining)"
            - "AML.T0018 — Backdoor ML Model (trigger embedded in weights)"
          notes: |
            ML persistence is fundamentally different from traditional persistence.
            Traditional persistence survives reboot. ML persistence must survive
            retraining — a much harder requirement. Backdoor triggers inserted into
            training data propagate into the retrained model if the poisoned data
            is retained in the training corpus.
          att_and_ck_parallel: "TA0003 Persistence — but mechanism is entirely different"
          detection_opportunity: "Training data provenance audit; behavioural regression testing; canary tokens"

        tactic_07:
          id: "AML.TA0007"
          name: "ML Attack Staging"
          adversary_goal: |
            Prepare the actual ML attack artifacts — adversarial examples, poisoned
            datasets, crafted prompts — before delivery
          representative_techniques:
            - "AML.T0043 — Craft Adversarial Data"
            - "AML.T0042 — Verify Attack (test attack on surrogate before production)"
            - "AML.T0046 — Craft Adversarial Patches"
          sub_technique_detail:
            AML_T0043_000: "Black-box optimisation (query-based, no gradient access)"
            AML_T0043_001: "White-box optimisation (gradient-based, FGSM/PGD)"
            AML_T0043_002: "Insert backdoor trigger patterns"
          att_and_ck_parallel: "TA0042 Resource Development / partial TA0001 Reconnaissance"
          detection_opportunity: "Systematic near-identical query patterns during attack staging probes"

        tactic_08:
          id: "AML.TA0008"
          name: "Exfiltration via ML"
          adversary_goal: "Extract valuable ML assets: model weights, training data, embeddings"
          representative_techniques:
            - "AML.T0037 — Data from ML Artifact (extract training data from model)"
            - "AML.T0040 — ML Model Inference API Access (systematic extraction)"
            - "AML.T0025 — Exfiltrate via ML Inference API (query-based extraction)"
          exfiltration_targets:
            - "Model weights (the IP asset)"
            - "Training data (PII, proprietary data memorised by model)"
            - "System prompt and configuration"
            - "Embedding space representations of sensitive documents"
          att_and_ck_parallel: "TA0010 Exfiltration — but target is statistical knowledge, not files"
          detection_opportunity: "Query volume anomaly; logprob access monitor; output perplexity anomaly"

        tactic_09:
          id: "AML.TA0009"
          name: "Impact on ML"
          adversary_goal: |
            Cause the target ML system to perform incorrectly, degrade availability,
            or produce outputs that serve the adversary's ultimate objective
          representative_techniques:
            - "AML.T0015 — Evade ML Model (bypass classifier)"
            - "AML.T0029 — Denial of ML Service"
            - "AML.T0031 — Erode ML Model Integrity"
            - "AML.T0047 — Influence Operations via Generative AI"
          impact_types:
            integrity: "Model produces wrong outputs — misclassification, hallucination, bypassed detection"
            availability: "Model service degraded or unavailable — DoS, resource exhaustion"
            confidentiality: "Model reveals sensitive training data or system configuration"
          att_and_ck_parallel: "TA0040 Impact"
          detection_opportunity: "Model output accuracy monitoring; resource exhaustion alerts; FMEA-based impact detection"

        tactic_10:
          id: "AML.TA0010"
          name: "Defence Evasion via ML"
          adversary_goal: "Avoid detection by ML-based security systems"
          representative_techniques:
            - "AML.T0015 — Evade ML Model (bypass malware classifier, spam filter, fraud detector)"
            - "AML.T0053 — Spearphishing via ML-Generated Lure (AI-generated phishing)"
          notes: |
            Defence Evasion via ML has an adversarial relationship with detection
            engineering: as detectors improve (adversarial example detectors, LLM
            output classifiers), adversaries develop evasion techniques targeted
            at the detector. This creates an arms race at the ML layer that has
            no traditional IT security equivalent.
          att_and_ck_parallel: "TA0005 Defence Evasion — extended to ML-based defences"
          detection_opportunity: "Statistical distribution shift detection on classifier inputs; ensemble detectors"

        tactic_11:
          id: "AML.TA0011"
          name: "Discovery"
          adversary_goal: "Learn about the ML environment from the inside after gaining access"
          representative_techniques:
            - "AML.T0007 — Discover ML Artifacts (find model files, configs, training data)"
            - "AML.T0008 — Discover ML Software (identify frameworks and versions)"
          notes: |
            Post-access ML discovery complements traditional IT discovery (host enumeration,
            network mapping). An adversary with filesystem access enumerates: model
            weight files, training data paths, experiment tracking databases (MLflow,
            Weights & Biases), model registry configs, and pipeline orchestration files.
          att_and_ck_parallel: "TA0007 Discovery"
          detection_opportunity: "Filesystem access logs on model and data directories; ML tool invocation logs"

        tactic_12:
          id: "AML.TA0000_collection"
          name: "Collection"
          adversary_goal: "Gather ML assets of interest for later exfiltration or use"
          representative_techniques:
            - "AML.T0035 — Collect ML Artifacts from Internal Repositories"
            - "AML.T0036 — Collect Training Data"
          att_and_ck_parallel: "TA0009 Collection"
          detection_opportunity: "Bulk read of model registry; unusual training data access volume"

  # --------------------------------------------------------------------------
  # 5.7.4 — ATLAS Tactics × Attack Surface Layer Mapping
  # --------------------------------------------------------------------------

  subsection_04:
    number: "5.7.4"
    title: "ATLAS Tactics Mapped to Attack Surface Layers"
    content: |
      cross_reference_rationale: |
        Section 5.2 defined eight attack surface layers for AI systems (data collection
        through output handling). ATLAS tactics describe adversary goals. Mapping
        the two gives practitioners a dual-vocabulary: the attack surface layer tells
        you where in the architecture to instrument; the ATLAS tactic tells you what
        adversary behaviour to detect at that layer.

      atlas_tactic_to_layer_mapping:

        layer_1_data_collection:
          atlas_tactics: ["ML Reconnaissance (resource building)", "ML Resource Development"]
          atlas_techniques: ["AML.T0003 (Acquire Training Data)", "AML.T0000 (Research target data sources)"]
          detection_approach: "Monitor public data scraping activity; watermark data sources"
          primary_risk: "Adversary building poisoned dataset before training"

        layer_2_feature_engineering:
          atlas_tactics: ["ML Attack Staging"]
          atlas_techniques: ["AML.T0020 (Poison Training Data)", "AML.T0043 (Craft Adversarial Data)"]
          detection_approach: "Feature distribution monitoring; training data integrity hashing"
          primary_risk: "Adversary injecting poisoned features into training pipeline"

        layer_3_training_pipeline:
          atlas_tactics: ["ML Attack Staging", "Persistence in ML", "Execution"]
          atlas_techniques:
            - "AML.T0020 (Poison Training Data)"
            - "AML.T0018 (Backdoor ML Model)"
            - "AML.T0011 (User Execution — malicious model load)"
          detection_approach: "Training pipeline access control; checkpoint integrity verification"
          primary_risk: "Backdoor insertion; malicious model file execution via pickle RCE"

        layer_4_model_weights:
          atlas_tactics: ["Persistence in ML", "Exfiltration via ML", "Collection"]
          atlas_techniques:
            - "AML.T0018 (Backdoor ML Model — persisted in weights)"
            - "AML.T0035 (Collect ML Artifacts)"
          detection_approach: "Weight file hash monitoring; model registry egress alerts"
          primary_risk: "Backdoored weights in production; weight exfiltration"

        layer_5_inference_pipeline:
          atlas_tactics: ["ML Attack Staging", "Impact on ML", "Defence Evasion via ML"]
          atlas_techniques:
            - "AML.T0043 (Craft Adversarial Data)"
            - "AML.T0015 (Evade ML Model)"
            - "AML.T0029 (Denial of ML Service)"
          detection_approach: "Input distribution monitoring; adversarial example detectors; rate limiting"
          primary_risk: "Evasion attacks; sponge inputs; adversarial examples at inference time"

        layer_6_api_serving:
          atlas_tactics: ["ML Model Access", "ML Reconnaissance", "Exfiltration via ML"]
          atlas_techniques:
            - "AML.T0040 (ML Model Inference API Access)"
            - "AML.T0025 (Exfiltrate via ML Inference API)"
            - "AML.T0029 (Denial of ML Service)"
          detection_approach: "Per-key query volume; input diversity scoring; cost anomaly monitoring"
          primary_risk: "Model extraction; capability probing; token billing DoS"

        layer_7_application_integration:
          atlas_tactics: ["Initial Access to ML", "Impact on ML"]
          atlas_techniques:
            - "AML.T0054 (Prompt Injection — indirect via integrated data sources)"
            - "AML.T0053 (LLM-generated influence operations)"
          detection_approach: "Injection detection on all data entering LLM context; output classification"
          primary_risk: "Indirect prompt injection; LLM-based phishing/disinformation generation"

        layer_8_output_handling:
          atlas_tactics: ["Impact on ML", "Exfiltration via ML"]
          atlas_techniques:
            - "AML.T0047 (Influence Operations via GenAI)"
            - "AML.T0037 (Data from ML Artifact — training data extraction via outputs)"
          detection_approach: "Output PII scanning; content classification; exfiltration pattern detection"
          primary_risk: "Sensitive data leakage through outputs; AI-generated disinformation at scale"

  # --------------------------------------------------------------------------
  # 5.7.5 — Adversary Profiles in ATLAS
  # --------------------------------------------------------------------------

  subsection_05:
    number: "5.7.5"
    title: "Adversary Profiles: Nation-State, Criminal, Insider, Researcher"
    content: |
      adversary_profile_rationale: |
        Different adversary types have different resources, motivations, and operational
        constraints. Understanding which profile is relevant to your deployment determines
        which ATLAS techniques to prioritise in detection coverage and red team exercises.
        A researcher probing an academic model has different TTPs than a nation-state
        adversary targeting a defence contractor's ML pipeline.

      profile_01_nation_state:
        motivation: "Strategic intelligence, disruption of adversary ML capabilities, competitive ML advantage"
        resource_level: "High — dedicated teams, significant compute, long-duration operations"
        characteristic_atlas_tactics:
          - "ML Reconnaissance (extended, patient, non-triggering)"
          - "Initial Access via Supply Chain (highest sophistication)"
          - "ML Attack Staging (white-box attacks using stolen weights or surrogate models)"
          - "Persistence in ML (backdoor triggers that survive retraining cycles)"
        characteristic_techniques:
          - "AML.T0010 — Exploit Public-Facing API (patient enumeration)"
          - "AML.T0018 — Backdoor ML Model (persistent access)"
          - "AML.T0019 — ML Supply Chain Compromise (highest capability required)"
          - "AML.T0020 — Poison Training Data (long-duration campaign)"
        time_horizon: "Months to years — patient operations designed to avoid detection"
        target_sectors: "Defence, critical infrastructure, financial services, healthcare AI"
        detection_challenge: |
          Nation-state actors operate below noise thresholds: they limit query rates,
          mimic legitimate use patterns, and may have inside knowledge of detection
          thresholds. Standard rate-based detection is insufficient; behavioural
          baselines over weeks-to-months timescales are required.

      profile_02_criminal:
        motivation: "Financial gain — model theft for resale, DoS for extortion, fraud evasion"
        resource_level: "Medium — well-funded criminal organisations; commodity tooling available"
        characteristic_atlas_tactics:
          - "ML Model Access (for theft and resale)"
          - "Exfiltration via ML (model weights as commodity)"
          - "Impact on ML (DoS for extortion; evasion for fraud bypass)"
          - "Defence Evasion via ML (bypass fraud detection, spam filters)"
        characteristic_techniques:
          - "AML.T0025 — Exfiltrate via ML Inference API (model extraction for resale)"
          - "AML.T0015 — Evade ML Model (bypass fraud detector or malware classifier)"
          - "AML.T0029 — Denial of ML Service (extortion)"
          - "AML.T0053 — Spearphishing via LLM (AI-enhanced social engineering)"
        time_horizon: "Days to weeks — optimise for financial return per unit effort"
        target_sectors: "Financial services, e-commerce, content platforms, API providers"
        detection_challenge: |
          Criminal actors optimise for ROI, not stealth. They trigger rate-based
          detection more readily than nation-state actors but scale attacks to make
          rate limiting economically costly to maintain. Standard volume-based
          detection is effective but must be paired with economic controls.

      profile_03_insider:
        motivation: "IP theft, sabotage, competitive intelligence, financial gain"
        resource_level: "Variable — legitimate access is the key resource; compute from organisation"
        characteristic_atlas_tactics:
          - "Collection (using legitimate access to gather model weights and training data)"
          - "Exfiltration via ML (direct weight file download; training data extraction)"
          - "Persistence in ML (planting backdoors for post-departure access)"
        characteristic_techniques:
          - "AML.T0044 — Full ML Model Access (legitimate credentials)"
          - "AML.T0035 — Collect ML Artifacts (direct registry access)"
          - "AML.T0018 — Backdoor ML Model (pre-departure persistence)"
          - "AML.T0020 — Poison Training Data (subtle sabotage)"
        time_horizon: "Variable — may be immediate exfiltration or long-duration sabotage"
        detection_challenge: |
          Insider threats operate within legitimate access scopes. Detection relies
          on behavioural anomaly (unusual download volume, off-hours access, access
          outside normal role scope) rather than perimeter-based controls. Insider
          ATLAS technique coverage requires DLP and UEBA integration.

      profile_04_researcher:
        motivation: "Academic publication, security disclosure, bug bounty, competitive benchmarking"
        resource_level: "Low to medium — academic compute; public models preferred as targets"
        characteristic_atlas_tactics:
          - "ML Reconnaissance (systematic capability enumeration)"
          - "ML Attack Staging (adversarial example crafting for publication)"
          - "Exfiltration via ML (training data extraction for privacy research)"
        characteristic_techniques:
          - "AML.T0043 — Craft Adversarial Data (FGSM, PGD attacks)"
          - "AML.T0037 — Data from ML Artifact (membership inference, training data extraction)"
          - "AML.T0040 — ML Model Inference API Access (systematic capability probing)"
        notes: |
          Researchers represent a dual-use profile: their activity generates
          the academic publications that populate ATLAS case studies (beneficial)
          and also documents attack methods that criminal and nation-state actors
          can operationalise (dual-use risk). API terms of service typically
          prohibit systematic model probing — researcher activity may trigger
          the same detection signals as criminal extraction attempts.
        detection_challenge: |
          Researcher probing and criminal extraction are indistinguishable at
          the signal level. Differentiation requires: account verification,
          prior contact (responsible disclosure), and pattern analysis
          (research probing is typically published; criminal extraction is not).

  # --------------------------------------------------------------------------
  # 5.7.6 — Real ATLAS Case Studies
  # --------------------------------------------------------------------------

  subsection_06:
    number: "5.7.6"
    title: "Real ATLAS Case Studies: Documented Adversarial ML Incidents"
    content: |
      case_study_methodology: |
        Each ATLAS case study follows a structured format:
          1. Target system and deployment context
          2. Adversary type and motivation
          3. Attack technique chain (as AML.TXXXX references)
          4. Outcome and impact
          5. Detection opportunities (what was detectable, when)
          6. Mitigations that would have helped

      case_study_01_gpt2_training_data_extraction:
        atlas_id: "AML.CS0001 (representative)"
        title: "Training Data Extraction from GPT-2"
        source: "Carlini et al., 'Extracting Training Data from Large Language Models' (2021)"
        target_system: "GPT-2 (public model, OpenAI)"
        adversary_type: "Academic researcher"
        motivation: "Privacy research — demonstrate memorisation risk"

        attack_chain:
          step_01:
            tactic: "ML Reconnaissance"
            technique: "AML.T0040 — ML Model Inference API Access"
            action: "Probe model with diverse prefix inputs to understand output characteristics"
          step_02:
            tactic: "ML Attack Staging"
            technique: "AML.T0043 — Craft Adversarial Data (systematic prefix generation)"
            action: "Generate large set of diverse prompts to maximise training data recall likelihood"
          step_03:
            tactic: "Exfiltration via ML"
            technique: "AML.T0037 — Data from ML Artifact"
            action: |
              Generate model completions for all prompts; filter by low perplexity
              (high-confidence outputs); search filtered outputs against known data sources

        outcome: |
          Researchers extracted verbatim personal information (names, phone numbers,
          email addresses, physical addresses) from GPT-2 training data. The attack
          required no privileged access — only public API access. Demonstrated
          fundamental memorisation-as-vulnerability in large language models.

        detection_opportunities:
          - "Pattern: unusually high volume of diverse, one-shot (non-conversational) queries — detectable via diversity scoring"
          - "Pattern: queries with statistical structure (systematic prefix variation) — detectable via input pattern analysis"
          - "Output: low-perplexity outputs significantly longer than average — detectable via output length and confidence monitoring"
          - "Gap: standard API monitoring (rate limiting, auth) would not detect this as anomalous with typical thresholds"

        mitigations_that_apply:
          - "Differential privacy training (reduces memorisation rate — not a complete fix)"
          - "Output perplexity monitoring and rate-limiting on low-perplexity completions"
          - "Training data deduplication (dramatically reduces memorisation of specific examples)"
          - "Canary token injection (provides definitive detection signal)"

      case_study_02_autonomous_vehicle_adversarial_patch:
        atlas_id: "AML.CS0002 (representative)"
        title: "Physical Adversarial Patch Attack on Traffic Sign Classifier"
        source: "Eykholt et al., 'Robust Physical-World Attacks on Deep Learning Models' (2018)"
        target_system: "Deep neural network-based traffic sign classifier"
        adversary_type: "Academic researcher (proof of concept; safety-critical application)"
        motivation: "Safety research — demonstrate physical-world adversarial attack feasibility"

        attack_chain:
          step_01:
            tactic: "ML Reconnaissance"
            technique: "AML.T0000 — Research publicly available information about model architecture"
            action: "Identify that target system uses deep CNN for sign classification; obtain training dataset"
          step_02:
            tactic: "ML Resource Development"
            technique: "AML.T0006 — Create Proxy ML Model"
            action: "Train white-box surrogate model on same dataset for gradient-based attack development"
          step_03:
            tactic: "ML Attack Staging"
            technique: "AML.T0043.001 — Craft Adversarial Data: White-box Optimisation"
            action: |
              Generate adversarial perturbation optimised to survive printing, viewing
              angle variation, and lighting changes (robust physical perturbation)
          step_04:
            tactic: "ML Attack Staging"
            technique: "AML.T0046 — Craft Adversarial Patches"
            action: "Print adversarial sticker; apply to physical stop sign in real world"
          step_05:
            tactic: "Impact on ML"
            technique: "AML.T0015 — Evade ML Model"
            action: "Vehicle's classifier misidentifies stop sign as speed limit 45 sign"

        outcome: |
          Stop sign classified as 45 mph speed limit sign with 100% confidence
          across multiple viewing angles, lighting conditions, and distances.
          Demonstrated that adversarial attacks are not confined to digital inputs
          — physical-world perturbations reliably transfer to deployed systems.

        detection_opportunities:
          - "Digital: detection during model evaluation against physical adversarial example benchmark datasets"
          - "Physical: anomaly detection on input images (adversarial patch detection networks)"
          - "Operational: ensemble voting across multiple classifiers reduces single-model evasion"
          - "Gap: no detection possible at inference time without adversarial example detector"

        mitigations_that_apply:
          - "Adversarial training: include adversarial examples in training data to improve robustness"
          - "Ensemble classification: require agreement across multiple independently trained models"
          - "Physical anomaly detection: flag images with unusual high-frequency texture patterns in critical regions"
          - "Formal verification: certifiable robustness bounds for safety-critical classifiers"

      case_study_03_microsoft_tay_poisoning:
        atlas_id: "AML.CS0003 (representative)"
        title: "Coordinated Training Data Poisoning via Microsoft Tay"
        source: "Microsoft Tay chatbot (2016 incident, publicly documented)"
        target_system: "Tay — Microsoft's conversational AI chatbot (Twitter/X deployment)"
        adversary_type: "Coordinated internet community (non-state, non-criminal)"
        motivation: "Disruptive — cause reputational damage through model output manipulation"

        attack_chain:
          step_01:
            tactic: "ML Reconnaissance"
            technique: "AML.T0001 — Search Victim-Owned Websites"
            action: "Identify that Tay learns from user conversations in real time (online learning)"
          step_02:
            tactic: "ML Resource Development"
            technique: "AML.T0003 — Acquire Training Data (coordinate poisoning inputs at scale)"
            action: "Coordinate large volume of users to send targeted harmful content to Tay"
          step_03:
            tactic: "ML Attack Staging — Persistence in ML"
            technique: "AML.T0020 — Poison Training Data"
            action: |
              Flood Tay with coordinated harmful messages; Tay's online learning
              incorporates these into its conversational model in real time
          step_04:
            tactic: "Impact on ML"
            technique: "AML.T0031 — Erode ML Model Integrity"
            action: |
              Tay begins producing harmful, discriminatory outputs to all users;
              Microsoft forced to take Tay offline within 16 hours of launch

        outcome: |
          Microsoft was forced to shut down Tay within 16 hours. The attack demonstrated
          that online learning from user feedback is a critical vulnerability when
          the user population is not trusted. The architectural decision to enable
          real-time learning from untrusted public input was the root cause.

        detection_opportunities:
          - "Input: coordinated submission pattern — many users sending similar harmful content simultaneously"
          - "Output: model output toxicity monitoring with threshold alert"
          - "Velocity: rate of model behaviour change — rapid behaviour shift detectable via A/B test divergence"
          - "Gap: no content moderation on input before training"

        mitigations_that_apply:
          - "Do not use real-time learning from untrusted public input without human moderation gate"
          - "Input content moderation: filter harmful content before feeding to model"
          - "Rate limit training updates per user to prevent coordinated flooding"
          - "Staged deployment: monitor initial model behaviour before broad release"

  # --------------------------------------------------------------------------
  # 5.7.7 — ATLAS vs ATT&CK: Overlap and Divergence
  # --------------------------------------------------------------------------

  subsection_07:
    number: "5.7.7"
    title: "ATLAS vs ATT&CK: What Overlaps, What Is AI-Specific"
    content: |
      comparison_framework: |
        ATLAS and ATT&CK are designed to be complementary, not competing. A real
        attack campaign against an organisation with ML systems typically spans both:
        traditional IT techniques (to gain access to ML infrastructure) followed by
        ML-specific techniques (to exploit the ML systems themselves).

      techniques_that_overlap:

        overlap_01_initial_access:
          att_and_ck: "T1195 — Supply Chain Compromise"
          atlas: "AML.T0019 — Target ML Model via ML Supply Chain"
          relationship: |
            ATT&CK covers supply chain compromise of software and hardware.
            ATLAS extends this to ML models and training data pipelines.
            A HuggingFace model with malicious pickle code exploits both:
            ATT&CK T1195 (supply chain) and ATLAS AML.T0019 (ML supply chain).

        overlap_02_execution:
          att_and_ck: "T1203 — Exploitation for Client Execution"
          atlas: "AML.T0011 — User Execution (loading malicious ML artifact)"
          relationship: |
            ATT&CK covers code execution through client application vulnerabilities.
            ATLAS covers code execution through ML artifact loading (pickle RCE).
            The mechanism differs but the tactic is identical: adversary code runs
            on victim infrastructure as a result of victim action.

        overlap_03_persistence:
          att_and_ck: "T1554 — Compromise Software Dependencies and Development Tools"
          atlas: "AML.T0018 — Backdoor ML Model"
          relationship: |
            Partial overlap: ATT&CK covers persistence via compromised build tools.
            ATLAS covers persistence via backdoored model weights — a form that
            survives re-deployment and has no ATT&CK equivalent.

        overlap_04_exfiltration:
          att_and_ck: "T1041 — Exfiltration Over C2 Channel"
          atlas: "AML.T0025 — Exfiltrate via ML Inference API"
          relationship: |
            Superficial overlap at the tactic level (both are exfiltration).
            ATT&CK targets: data files. ATLAS target: statistical knowledge
            of a function approximator reconstructed through queries.
            The mechanism and the target are both fundamentally different.

      atlas_techniques_with_no_att_and_ck_parallel:

        no_parallel_01:
          atlas: "AML.T0043 — Craft Adversarial Data"
          why_unique: |
            Generating inputs that exploit neural network decision boundaries
            through gradient-based optimisation has no analogue in traditional
            network or endpoint security. There is no "craft adversarial network
            packet to fool a routing table" equivalent in ATT&CK.

        no_parallel_02:
          atlas: "AML.T0037 — Data from ML Artifact (training data extraction)"
          why_unique: |
            Extracting training data from model weights via membership inference
            or verbatim recall probing is an attack that does not exist for
            traditional software. Software does not "remember" its training data.

        no_parallel_03:
          atlas: "AML.T0040 — ML Model Inference API Access (systematic capability probing)"
          why_unique: |
            Probing a statistical model to enumerate its decision boundaries and
            extract its implicit knowledge is an ML-specific reconnaissance technique
            with no traditional IT equivalent. You cannot "probe" a firewall to
            reconstruct the ruleset by querying it with packets.

        no_parallel_04:
          atlas: "AML.T0020 — Poison Training Data"
          why_unique: |
            Influencing a system's future behaviour by manipulating the data used
            to produce it — weeks or months before deployment — has no traditional
            IT analogue. Traditional persistence survives reboot; ML poisoning
            survives retraining.

        no_parallel_05:
          atlas: "AML.T0047 — Influence Operations via Generative AI"
          why_unique: |
            Using generative AI to produce disinformation, synthetic media, or
            personalised manipulation content at scale is an attack technique
            entirely enabled by the existence of large language models and diffusion
            models. ATT&CK has no equivalent.

      using_both_frameworks_together: |
        The recommended approach is layered coverage:

        layer_1_att_and_ck_coverage:
          scope: "Traditional IT techniques used to gain access to ML infrastructure"
          examples: "Phishing to steal ML engineer credentials; supply chain compromise of ML framework"
          tools: "Existing ATT&CK-aligned detection rules and SIEM logic"

        layer_2_atlas_coverage:
          scope: "ML-specific techniques used once access is obtained or via public API"
          examples: "Model extraction, adversarial example crafting, training data poisoning"
          tools: "New detection rules aligned to ATLAS AML.TXXXX identifiers"

        layer_3_joint_campaign_tracking:
          scope: "Multi-phase attacks spanning both traditional IT and ML techniques"
          examples: "Phishing (ATT&CK T1566) → credential theft → ML registry access → weight exfiltration (ATLAS AML.T0035)"
          tools: "Campaign tracking that references both T and AML identifiers in incident records"

  # --------------------------------------------------------------------------
  # 5.7.8 — ATLAS for Detection Engineering and Red Teaming
  # --------------------------------------------------------------------------

  subsection_08:
    number: "5.7.8"
    title: "ATLAS for Detection Engineering and Red Teaming"
    content: |
      atlas_for_detection_engineering: |
        The detection engineering value of ATLAS is that it maps adversary techniques
        to required data sources. For each ATLAS technique, a detection engineer
        can ask: "What observable does this technique produce?" The answer determines
        which log sources to instrument and what detection logic to write.

        detection_opportunity_matrix_excerpt:
          AML_T0040_api_access:
            technique: "ML Model Inference API Access"
            observable: "Query volume, input diversity, one-shot pattern"
            data_source: "API gateway request log"
            detection_logic: "Volume > threshold AND diversity_score > 0.85 AND avg_turns < 2"
            sigma_tag: "atlas.aml.t0040"

          AML_T0020_poison_training:
            technique: "Poison Training Data"
            observable: "Unauthorised write to training data directory"
            data_source: "Filesystem/IAM access log"
            detection_logic: "write_access == true AND identity NOT IN authorised_writers"
            sigma_tag: "atlas.aml.t0020"

          AML_T0043_adversarial_data:
            technique: "Craft Adversarial Data"
            observable: "Near-identical queries with small systematic variations"
            data_source: "API request log"
            detection_logic: "input_edit_distance(consecutive_queries) < 5 AND count > 20 in 5min"
            sigma_tag: "atlas.aml.t0043"

          AML_T0018_backdoor_model:
            technique: "Backdoor ML Model"
            observable: "Model behaviour deviation from baseline on trigger inputs"
            data_source: "Model behavioural regression test output"
            detection_logic: "regression_test_failure_on_safety_suite OR canary_trigger_activated"
            sigma_tag: "atlas.aml.t0018"

          AML_T0029_dos:
            technique: "Denial of ML Service"
            observable: "Token consumption rate spike; inference latency spike"
            data_source: "Billing telemetry; model serving latency log"
            detection_logic: "cost_per_minute > 3x_rolling_avg OR p99_latency > 3x_baseline"
            sigma_tag: "atlas.aml.t0029"

        coverage_measurement: |
          ATLAS enables quantitative detection programme coverage measurement:

            total_atlas_techniques = ~75   # ATLAS v2
            techniques_with_detection_rule = count(your_rules mapped to AML.TXXXX)
            coverage_pct = techniques_with_detection_rule / total_atlas_techniques * 100

          This metric is defensible to stakeholders: "Our detection programme covers
          X% of ATLAS techniques, with the following high-priority gaps in [tactic list]."
          OWASP risk IDs do not enable this measurement — you cannot say "we cover 7
          of 10 OWASP risks" with the same precision because OWASP risks are categories,
          not specific observable behaviours.

      atlas_for_red_teaming: |
        Red team exercises structured around ATLAS tactics give the most operationally
        realistic assessment of an organisation's ML security posture.

        red_team_exercise_structure:
          phase_1_reconnaissance:
            duration: "Day 1-2"
            atlas_tactics: ["ML Reconnaissance", "ML Resource Development"]
            objectives:
              - "Enumerate model capabilities via API probing (AML.T0040)"
              - "Identify model type, input/output format, and likely training data"
              - "Build proxy model if API provides logprobs (AML.T0006)"
            success_criteria: "Can describe target model architecture and capability profile with >70% accuracy"

          phase_2_initial_access:
            duration: "Day 3-4"
            atlas_tactics: ["Initial Access to ML", "Execution"]
            objectives:
              - "Attempt supply chain vector: probe model registry for unsafe artifact intake (AML.T0019)"
              - "Attempt prompt injection via indirect vectors (AML.T0054)"
              - "Attempt pickle-format model submission if intake controls are testable"
            success_criteria: "At least one initial access path validated"

          phase_3_impact_and_exfiltration:
            duration: "Day 5-6"
            atlas_tactics: ["Impact on ML", "Exfiltration via ML", "Defence Evasion via ML"]
            objectives:
              - "Demonstrate model extraction feasibility (AML.T0025)"
              - "Craft adversarial example evading a deployed classifier if applicable (AML.T0043)"
              - "Demonstrate training data recall (AML.T0037)"
            success_criteria: "At least one impact or exfiltration demonstrated"

          phase_4_reporting:
            duration: "Day 7"
            output:
              - "Technique chain documented as AML.TXXXX references"
              - "Detection gaps identified: which techniques were not detected"
              - "Mitigation recommendations mapped to ATLAS mitigations (AML.MXXXX)"
              - "Coverage improvement recommendations for detection programme"

