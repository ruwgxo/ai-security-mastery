implementations:

  implementation_01:
    title: "ATLAS Tactic and Technique Reference Card"
    filename: "atlas_reference_card.py"
    purpose: |
      Complete ATLAS reference card as a Python data structure.
      All 12 tactics with representative techniques, adversary goals,
      attack surface layer mapping, and detection opportunities.
      Outputs formatted one-pager, JSON export, and Sigma tag list.
    language: "python"
    code: |
      """
      MITRE ATLAS Reference Card
      12 tactics, representative techniques, layer mapping, detection opportunities.
      Outputs: console summary, JSON, Sigma tag list.
      """

      import json
      from dataclasses import dataclass, field
      from typing import List, Dict


      @dataclass
      class AtlasTechniqueRef:
          id: str
          name: str
          detection_signal: str
          data_source: str
          sigma_tag: str


      @dataclass
      class AtlasTactic:
          id: str
          name: str
          adversary_goal: str
          attack_surface_layers: List[int]
          representative_techniques: List[AtlasTechniqueRef]
          att_and_ck_parallel: str
          primary_risk: str


      ATLAS_TACTICS: List[AtlasTactic] = [
          AtlasTactic(
              id="AML.TA0000",
              name="ML Reconnaissance",
              adversary_goal="Learn about target ML system before attacking",
              attack_surface_layers=[6, 7],
              att_and_ck_parallel="TA0043 Reconnaissance",
              primary_risk="Capability enumeration; extraction setup; proxy model building",
              representative_techniques=[
                  AtlasTechniqueRef("AML.T0000", "Search Publicly Available Research",
