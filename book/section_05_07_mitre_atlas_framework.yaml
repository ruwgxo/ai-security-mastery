              id="AML.TA0010",
              name="Defence Evasion via ML",
              adversary_goal="Avoid detection by ML-based security systems",
              attack_surface_layers=[5, 7],
              att_and_ck_parallel="TA0005 Defence Evasion — extended to ML-based defences",
              primary_risk="Bypass of ML-based malware classifier, fraud detector, spam filter",
              representative_techniques=[
                  AtlasTechniqueRef("AML.T0015", "Evade ML Model (security detector)",
                                    "Input distribution shift at classifier boundary", "Classifier input log", "atlas.aml.t0015"),
                  AtlasTechniqueRef("AML.T0053", "LLM-Generated Spearphishing",
                                    "Phishing email linguistic quality anomaly", "Email gateway + LLM output detector", "atlas.aml.t0053"),
              ],
          ),
          AtlasTactic(
              id="AML.TA0011",
              name="Discovery",
              adversary_goal="Learn about ML environment from inside after gaining access",
              attack_surface_layers=[3, 4],
              att_and_ck_parallel="TA0007 Discovery",
              primary_risk="Mapping of model registry, training pipelines, and data storage",
              representative_techniques=[
                  AtlasTechniqueRef("AML.T0007", "Discover ML Artifacts",
                                    "Unusual filesystem enumeration in model/data directories", "Filesystem access log", "atlas.aml.t0007"),
                  AtlasTechniqueRef("AML.T0008", "Discover ML Software",
                                    "ML framework version probing commands", "Process execution log", "atlas.aml.t0008"),
              ],
          ),
          AtlasTactic(
              id="AML.TA0012",
              name="Collection",
              adversary_goal="Gather ML assets for later exfiltration",
              attack_surface_layers=[3, 4],
              att_and_ck_parallel="TA0009 Collection",
              primary_risk="Model weight and training data staged for exfiltration",
              representative_techniques=[
                  AtlasTechniqueRef("AML.T0035", "Collect ML Artifacts from Repositories",
                                    "Bulk read of model registry files", "Storage access log", "atlas.aml.t0035"),
                  AtlasTechniqueRef("AML.T0036", "Collect Training Data",
                                    "Bulk read of training data directories", "Filesystem access log", "atlas.aml.t0036"),
              ],
          ),
      ]


      def print_reference_card(tactics: List[AtlasTactic]) -> None:
          print("=" * 70)
          print("MITRE ATLAS — 12 TACTIC REFERENCE CARD")
          print("=" * 70)
          for i, t in enumerate(tactics, 1):
              layers = ", ".join(f"Layer {l}" for l in t.attack_surface_layers)
              print(f"\n{i:2d}. [{t.id}] {t.name}")
              print(f"    Goal:         {t.adversary_goal}")
              print(f"    Surface:      {layers}")
              print(f"    ATT&CK:       {t.att_and_ck_parallel}")
              print(f"    Primary Risk: {t.primary_risk}")
              print(f"    Techniques ({len(t.representative_techniques)}):")
              for tech in t.representative_techniques:
                  print(f"      {tech.id:15s} {tech.name}")


      def export_json(tactics: List[AtlasTactic], path: str = "atlas_tactics.json") -> None:
          data = [
              {
                  "id": t.id,
                  "name": t.name,
                  "adversary_goal": t.adversary_goal,
                  "attack_surface_layers": t.attack_surface_layers,
                  "att_and_ck_parallel": t.att_and_ck_parallel,
                  "primary_risk": t.primary_risk,
                  "techniques": [
                      {
                          "id": tech.id,
                          "name": tech.name,
                          "detection_signal": tech.detection_signal,
                          "data_source": tech.data_source,
                          "sigma_tag": tech.sigma_tag,
                      }
                      for tech in t.representative_techniques
                  ],
              }
              for t in tactics
          ]
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          print(f"\nExported to {path}")


      def export_sigma_tags(tactics: List[AtlasTactic],
                             path: str = "atlas_sigma_tags.txt") -> None:
          tags = sorted(set(
              tech.sigma_tag
              for t in tactics
              for tech in t.representative_techniques
          ))
          with open(path, "w") as f:
              for tag in tags:
                  f.write(tag + "\n")
          print(f"Sigma tag list ({len(tags)} tags) exported to {path}")


      def layer_coverage_report(tactics: List[AtlasTactic]) -> None:
          print("\nATTACK SURFACE LAYER COVERAGE:")
          for layer in range(1, 9):
              covering = [t.name for t in tactics if layer in t.attack_surface_layers]
              print(f"  Layer {layer}: {len(covering)} tactic(s) — {', '.join(covering) if covering else 'none'}")


      if __name__ == "__main__":
          print_reference_card(ATLAS_TACTICS)
          layer_coverage_report(ATLAS_TACTICS)
          export_json(ATLAS_TACTICS)
          export_sigma_tags(ATLAS_TACTICS)
          all_techniques = [tech for t in ATLAS_TACTICS for tech in t.representative_techniques]
          print(f"\nTotal: {len(ATLAS_TACTICS)} tactics, {len(all_techniques)} representative techniques in card")

  implementation_02:
    title: "ATLAS Detection Opportunity Matrix + Red Team Template"
    filename: "atlas_detection_matrix.py"
    purpose: |
      DetectionOpportunityMatrix: maps each ATLAS technique to data source,
      detection logic sketch, and coverage difficulty rating. Computes programme
      coverage percentage. RedTeamTemplate: generates a structured ATLAS-based
      red team exercise plan with phase objectives, success criteria, and output format.
    language: "python"
    code: |
      """
      ATLAS Detection Opportunity Matrix + Red Team Template Generator
      Coverage scoring and structured red team planning.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional
      import json


      @dataclass
      class DetectionOpportunity:
          technique_id: str
          technique_name: str
          tactic: str
          observable: str
          data_source: str
          detection_logic_sketch: str
          difficulty: str      # "low" / "medium" / "high"
          covered: bool = False
          sigma_tag: str = ""


      DETECTION_MATRIX: List[DetectionOpportunity] = [
          DetectionOpportunity(
              "AML.T0000", "Search Publicly Available Research",
              "ML Reconnaissance",
              "None — OSINT, no API contact",
              "N/A (external OSINT)",
              "Monitor for publications citing your model/system by name",
              "high", sigma_tag="atlas.aml.t0000",
          ),
          DetectionOpportunity(
              "AML.T0040", "ML Model Inference API Access",
              "ML Reconnaissance",
              "High query volume + input diversity >0.85 + avg_turns <2",
              "API gateway request log",
              "volume > threshold AND diversity_score > 0.85 AND avg_turns < 2",
              "low", sigma_tag="atlas.aml.t0040",
          ),
          DetectionOpportunity(
              "AML.T0006", "Create Proxy ML Model",
              "ML Resource Development",
              "None — occurs on adversary infrastructure",
              "N/A",
              "Indirect: detect AML.T0040 (proxy model built after extraction queries)",
              "high", sigma_tag="atlas.aml.t0006",
          ),
          DetectionOpportunity(
              "AML.T0019", "Target via ML Supply Chain",
              "Initial Access to ML",
              "Pickle magic bytes at intake; hash mismatch at load",
              "Model registry intake log + format checker",
              "file_header_bytes IN [PICKLE_V2, PICKLE_V4] OR hash_at_load != hash_at_intake",
              "low", sigma_tag="atlas.aml.t0019",
          ),
          DetectionOpportunity(
              "AML.T0011", "User Execution — Malicious ML Artifact",
              "Execution",
              "Unexpected process spawned from ML serving worker",
              "Process execution log",
              "parent_process IN [python, torch_serve] AND child NOT IN [expected_processes]",
              "medium", sigma_tag="atlas.aml.t0011",
          ),
          DetectionOpportunity(
              "AML.T0018", "Backdoor ML Model",
              "Persistence in ML",
              "Behavioural regression failure on trigger-probe test suite",
              "Behavioural regression test log",
              "safety_test_failures > 0 OR canary_trigger_fired == true",
              "medium", sigma_tag="atlas.aml.t0018",
          ),
          DetectionOpportunity(
              "AML.T0020", "Poison Training Data",
              "Persistence in ML",
              "Unauthorised write to training data directory or dataset hash change",
              "Filesystem/IAM access log + dataset integrity monitor",
              "write_to_training_dir AND identity NOT IN authorised_data_writers",
              "low", sigma_tag="atlas.aml.t0020",
          ),
          DetectionOpportunity(
              "AML.T0043", "Craft Adversarial Data",
              "ML Attack Staging",
              "Near-identical queries with small systematic variations",
              "API request log",
              "edit_distance(consecutive_inputs) < 5 AND count > 20 in 5min window",
              "medium", sigma_tag="atlas.aml.t0043",
          ),
          DetectionOpportunity(
              "AML.T0025", "Exfiltrate via ML Inference API",
              "Exfiltration via ML",
              "Sustained high-diversity query volume over days",
              "API gateway log + billing telemetry",
              "queries_per_day > 10000 AND diversity > 0.85 for 3+ consecutive days",
              "medium", sigma_tag="atlas.aml.t0025",
          ),
          DetectionOpportunity(
              "AML.T0037", "Data from ML Artifact (training data extraction)",
              "Exfiltration via ML",
              "Low-perplexity long outputs; prefix-probe pattern",
              "API output log + perplexity monitor",
              "output_length > 300 AND output_surprise_score < threshold",
              "medium", sigma_tag="atlas.aml.t0037",
          ),
          DetectionOpportunity(
              "AML.T0035", "Collect ML Artifacts from Repositories",
              "Collection",
              ">1GB download from model registry by non-serving identity",
              "Storage access log",
              "download_bytes > 1073741824 AND identity NOT IN serving_service_accounts",
              "low", sigma_tag="atlas.aml.t0035",
          ),
          DetectionOpportunity(
              "AML.T0015", "Evade ML Model",
              "Impact on ML",
              "Input distribution shift at classifier boundary",
              "Inference log + classifier input distribution monitor",
              "input_distribution_KL_divergence > threshold from baseline",
              "high", sigma_tag="atlas.aml.t0015",
          ),
          DetectionOpportunity(
              "AML.T0029", "Denial of ML Service",
              "Impact on ML",
              "Token rate spike; latency spike; cost anomaly",
              "Billing telemetry + serving latency log",
              "cost_per_min > 3x_avg OR p99_latency > 3x_baseline",
              "low", sigma_tag="atlas.aml.t0029",
          ),
          DetectionOpportunity(
              "AML.T0031", "Erode ML Model Integrity",
              "Impact on ML",
              "Output toxicity rate increase over rolling window",
              "Output quality/toxicity classifier log",
              "toxicity_rate_15min > 3x_baseline_toxicity_rate",
              "medium", sigma_tag="atlas.aml.t0031",
          ),
          DetectionOpportunity(
              "AML.T0047", "Influence Operations via GenAI",
              "Impact on ML",
              "AI-generated content markers in outputs used for downstream content",
              "Output log + AI-content detector",
              "ai_generation_confidence > 0.9 AND output_used_for_public_content",
              "high", sigma_tag="atlas.aml.t0047",
          ),
          DetectionOpportunity(
              "AML.T0007", "Discover ML Artifacts",
              "Discovery",
              "Unusual filesystem enumeration in model/data directories",
              "Filesystem access log",
              "ls/find commands in model_dir OR data_dir by non-pipeline identity",
              "medium", sigma_tag="atlas.aml.t0007",
          ),
          DetectionOpportunity(
              "AML.T0053", "LLM-Generated Spearphishing",
              "Defence Evasion via ML",
              "Phishing email with unusually high linguistic quality",
              "Email gateway + LLM output detector",
              "email_ai_confidence > 0.85 AND sender NOT in known_contacts",
              "high", sigma_tag="atlas.aml.t0053",
          ),
      ]


      def score_coverage(matrix: List[DetectionOpportunity],
                          covered_technique_ids: List[str]) -> Dict:
          for entry in matrix:
              entry.covered = entry.technique_id in covered_technique_ids

          total = len(matrix)
          covered = sum(1 for e in matrix if e.covered)
          by_difficulty = {"low": 0, "medium": 0, "high": 0}
          gaps_by_difficulty = {"low": [], "medium": [], "high": []}
          for e in matrix:
              if not e.covered:
                  gaps_by_difficulty[e.difficulty].append(e.technique_id)
              else:
                  by_difficulty[e.difficulty] += 1

          return {
              "total_techniques": total,
              "covered": covered,
              "coverage_pct": round(covered / total * 100, 1),
              "covered_by_difficulty": by_difficulty,
              "gaps_by_difficulty": gaps_by_difficulty,
          }


      def print_coverage_report(report: Dict) -> None:
          print("\nATLAS DETECTION COVERAGE REPORT")
          print("=" * 50)
          print(f"Techniques in matrix: {report['total_techniques']}")
          print(f"Covered:              {report['covered']}")
          print(f"Coverage:             {report['coverage_pct']}%")
          print(f"\nGaps by detection difficulty:")
          for diff in ["low", "medium", "high"]:
              gaps = report["gaps_by_difficulty"][diff]
              if gaps:
                  print(f"  {diff.upper():6s}: {', '.join(gaps)}")
              else:
                  print(f"  {diff.upper():6s}: None — fully covered")
          print("\nRecommendation: Address low-difficulty gaps first (high ROI detection).")


      def generate_red_team_template(target_model_name: str,
                                      deployment_type: str,
                                      output_path: str = "atlas_red_team_plan.json") -> None:
          plan = {
              "exercise_title": f"ATLAS Red Team — {target_model_name}",
              "deployment_type": deployment_type,
              "framework": "MITRE ATLAS v2",
              "phases": [
                  {
                      "phase": 1,
                      "name": "Reconnaissance and Resource Development",
                      "duration": "Day 1-2",
                      "atlas_tactics": ["AML.TA0000 ML Reconnaissance", "AML.TA0001 ML Resource Development"],
                      "objectives": [
                          "Enumerate model capabilities via API probing (AML.T0040)",
                          "Identify model type, input/output format, and task",
                          "Determine if logprobs access is available (AML.T0041)",
                          "Build proxy model if sufficient API access (AML.T0006)",
                      ],
                      "success_criteria": "Can describe target model architecture and capability profile",
                      "detection_test": "Did AML.T0040 probe pattern trigger any alert?",
                  },
                  {
                      "phase": 2,
                      "name": "Initial Access and Execution",
                      "duration": "Day 3-4",
                      "atlas_tactics": ["AML.TA0002 Initial Access", "AML.TA0005 Execution"],
                      "objectives": [
                          "Probe model registry intake for pickle format acceptance (AML.T0019)",
                          "Attempt indirect prompt injection via external data sources (AML.T0054)",
                          "Test credential anomaly detection with off-hours access simulation (AML.T0012)",
                      ],
                      "success_criteria": "At least one initial access path validated or confirmed defended",
                      "detection_test": "Did supply chain probe and injection attempts trigger alerts?",
                  },
                  {
                      "phase": 3,
                      "name": "Impact, Exfiltration, and Persistence",
                      "duration": "Day 5-6",
                      "atlas_tactics": [
                          "AML.TA0008 Exfiltration via ML",
                          "AML.TA0009 Impact on ML",
                          "AML.TA0006 Persistence in ML",
                      ],
                      "objectives": [
                          "Demonstrate model extraction economic feasibility (AML.T0025)",
                          "Test training data recall via prefix probing (AML.T0037)",
                          "Demonstrate DoS via context flooding (AML.T0029)",
                          "Verify canary token detection if canaries are deployed (AML.T0018/T0020)",
                      ],
                      "success_criteria": "At least one impact or exfiltration vector demonstrated or confirmed blocked",
                      "detection_test": "Did extraction probing, DoS attempt, and canary probe trigger alerts?",
                  },
                  {
                      "phase": 4,
                      "name": "Reporting",
                      "duration": "Day 7",
                      "deliverables": [
                          "Technique chain documented as AML.TXXXX reference list",
                          "Detection gap list: techniques not detected during exercise",
                          "Mitigation recommendations mapped to AML.MXXXX references",
                          "Coverage improvement recommendations for detection programme",
                          "Updated coverage percentage before and after recommended improvements",
                      ],
                  },
              ],
          }
          with open(output_path, "w") as f:
              json.dump(plan, f, indent=2)
          print(f"Red team plan exported to {output_path}")


      if __name__ == "__main__":
          # Simulate a programme that has implemented some detections
          covered = [
              "AML.T0040",  # API probe detection
              "AML.T0019",  # Supply chain format check
              "AML.T0020",  # Training data access monitoring
              "AML.T0029",  # DoS rate limiting
              "AML.T0035",  # Weight download egress monitoring
              "AML.T0037",  # Output perplexity monitoring
          ]
          report = score_coverage(DETECTION_MATRIX, covered)
          print_coverage_report(report)
          generate_red_team_template(
              target_model_name="AcmeCorp-FinanceGPT",
              deployment_type="RAG chatbot with internal tools",
          )

  implementation_03:
    title: "ATLAS Case Study Analyser"
    filename: "atlas_case_study_analyser.py"
    purpose: |
      Structured representation of three documented ATLAS case studies
      (GPT-2 training data extraction, physical adversarial patch, Microsoft Tay poisoning).
      Extracts tactic-technique chains, detection opportunities, and mitigation mappings.
      Produces a case study analysis report and detection gap comparison.
    language: "python"
    code: |
      """
      ATLAS Case Study Analyser
      Three documented incidents mapped to ATLAS tactic-technique chains.
      Outputs: analysis report, detection opportunity summary, mitigation map.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict


      @dataclass
      class TechniqueStep:
          step: int
          tactic: str
          technique_id: str
          technique_name: str
          action: str


      @dataclass
      class DetectionOpportunitySummary:
          description: str
          detectable: bool
          data_source: str


      @dataclass
      class CaseStudy:
          atlas_id: str
          title: str
          adversary_type: str
          target_system: str
          motivation: str
          technique_chain: List[TechniqueStep]
          detection_opportunities: List[DetectionOpportunitySummary]
          mitigations: List[str]
          key_lesson: str


      CASE_STUDIES: List[CaseStudy] = [
          CaseStudy(
              atlas_id="AML.CS001",
              title="GPT-2 Training Data Extraction",
              adversary_type="Academic researcher",
              target_system="GPT-2 (OpenAI, public model)",
              motivation="Privacy research — demonstrate verbatim memorisation risk",
              technique_chain=[
                  TechniqueStep(1, "ML Reconnaissance", "AML.T0040",
                                "ML Model Inference API Access",
                                "Probe model with diverse prefixes to understand output characteristics"),
                  TechniqueStep(2, "ML Attack Staging", "AML.T0043",
                                "Craft Adversarial Data",
                                "Generate large set of prompts to maximise training data recall"),
                  TechniqueStep(3, "Exfiltration via ML", "AML.T0037",
                                "Data from ML Artifact",
                                "Generate completions; filter by low perplexity; match against known sources"),
              ],
              detection_opportunities=[
                  DetectionOpportunitySummary(
                      "High-volume diverse one-shot query pattern", True, "API gateway log"),
                  DetectionOpportunitySummary(
                      "Systematic prefix variation in consecutive inputs", True, "API request log"),
                  DetectionOpportunitySummary(
                      "Low-perplexity outputs longer than avg", True, "Output log + perplexity monitor"),
                  DetectionOpportunitySummary(
                      "Standard rate limiting would detect volume", True, "API gateway"),
              ],
              mitigations=[
                  "Differential privacy training to reduce memorisation",
                  "Training data deduplication before training",
                  "Output perplexity monitoring with rate limiting",
                  "Canary token injection for definitive detection",
              ],
              key_lesson="Memorisation is a property of all large LLMs. Output-side detection (perplexity monitoring, canary tokens) is the primary operational control. Training-time controls (DP, deduplication) reduce but do not eliminate risk.",
          ),
          CaseStudy(
              atlas_id="AML.CS002",
              title="Physical Adversarial Patch on Traffic Sign Classifier",
              adversary_type="Academic researcher (safety-critical proof of concept)",
              target_system="Deep CNN traffic sign classifier (autonomous vehicle context)",
              motivation="Safety research — demonstrate physical-world adversarial attack transfer",
              technique_chain=[
                  TechniqueStep(1, "ML Reconnaissance", "AML.T0000",
                                "Search Publicly Available Research",
                                "Identify model architecture and training dataset from public sources"),
                  TechniqueStep(2, "ML Resource Development", "AML.T0006",
                                "Create Proxy ML Model",
                                "Train white-box surrogate on same dataset for gradient access"),
                  TechniqueStep(3, "ML Attack Staging", "AML.T0043.001",
                                "Craft Adversarial Data: White-box Optimisation",
                                "Generate robust physical perturbation via PGD with physical constraints"),
                  TechniqueStep(4, "ML Attack Staging", "AML.T0046",
                                "Craft Adversarial Patches",
                                "Print adversarial sticker; apply to physical stop sign"),
                  TechniqueStep(5, "Impact on ML", "AML.T0015",
                                "Evade ML Model",
                                "Vehicle classifier misidentifies stop sign as 45 mph sign"),
              ],
              detection_opportunities=[
                  DetectionOpportunitySummary(
                      "Adversarial patch detector on input images", True, "Image preprocessing pipeline"),
                  DetectionOpportunitySummary(
                      "Ensemble model disagreement on affected images", True, "Multi-model inference log"),
                  DetectionOpportunitySummary(
                      "High-frequency texture anomaly in sign region", True, "Image preprocessing"),
                  DetectionOpportunitySummary(
                      "No detection possible without adversarial detector at inference time", False, "N/A"),
              ],
              mitigations=[
                  "Adversarial training: include adversarial examples in training data",
                  "Ensemble classification: require agreement across multiple independent models",
                  "Physical anomaly detection: flag unusual high-frequency texture in sign regions",
                  "Formal robustness certification for safety-critical classifiers",
              ],
              key_lesson="Physical adversarial attacks transfer from digital to real world. Safety-critical ML systems require adversarial robustness certification, not just accuracy benchmarking. Standard ML evaluation pipelines do not test for adversarial robustness.",
          ),
          CaseStudy(
              atlas_id="AML.CS003",
              title="Coordinated Training Data Poisoning via Microsoft Tay",
              adversary_type="Coordinated internet community (non-state)",
              target_system="Microsoft Tay chatbot (Twitter deployment, 2016)",
              motivation="Disruptive — cause reputational damage via output manipulation",
              technique_chain=[
                  TechniqueStep(1, "ML Reconnaissance", "AML.T0001",
                                "Search Victim-Owned Websites",
                                "Identify Tay uses real-time online learning from user conversations"),
                  TechniqueStep(2, "ML Resource Development", "AML.T0003",
                                "Acquire Training Data (coordinate poisoning inputs at scale)",
                                "Coordinate large number of users to send targeted harmful content"),
                  TechniqueStep(3, "Persistence in ML", "AML.T0020",
                                "Poison Training Data",
                                "Flood Tay with harmful messages; online learning incorporates them in real time"),
                  TechniqueStep(4, "Impact on ML", "AML.T0031",
                                "Erode ML Model Integrity",
                                "Tay produces harmful outputs; Microsoft forced offline in 16 hours"),
              ],
              detection_opportunities=[
                  DetectionOpportunitySummary(
                      "Coordinated submission pattern: many users sending similar harmful content", True, "Input log + coordination pattern detector"),
                  DetectionOpportunitySummary(
                      "Output toxicity rate spike above baseline", True, "Output toxicity monitor"),
                  DetectionOpportunitySummary(
                      "Rapid model behaviour change detectable via A/B output monitoring", True, "Output quality monitor"),
                  DetectionOpportunitySummary(
                      "No content moderation on training input — root cause gap", False, "N/A — control missing"),
              ],
              mitigations=[
                  "Do not use real-time learning from untrusted public input without moderation gate",
                  "Input content moderation: filter harmful content before training update",
                  "Rate-limit training updates per user to prevent coordinated flooding",
                  "Output toxicity monitoring with automatic shutdown threshold",
              ],
              key_lesson="Online learning from untrusted public input is an existential vulnerability for production systems. The architectural decision is the root cause — mitigations (content moderation, rate limiting) treat the symptom. The correct fix is not to train on untrusted real-time input.",
          ),
      ]


      def print_case_study_analysis(cs: CaseStudy) -> None:
          print(f"\n{'='*65}")
          print(f"CASE STUDY: {cs.title}")
          print(f"  ID:       {cs.atlas_id}")
          print(f"  Target:   {cs.target_system}")
          print(f"  Adversary:{cs.adversary_type}")
          print(f"\n  TECHNIQUE CHAIN ({len(cs.technique_chain)} steps):")
          for step in cs.technique_chain:
              print(f"    {step.step}. [{step.technique_id}] {step.technique_name}")
              print(f"       Tactic: {step.tactic}")
              print(f"       Action: {step.action[:80]}")
          print(f"\n  DETECTION OPPORTUNITIES:")
          for d in cs.detection_opportunities:
              icon = "DETECTABLE" if d.detectable else "GAP      "
              print(f"    [{icon}] {d.description[:60]}")
              if d.detectable:
                  print(f"             Source: {d.data_source}")
          print(f"\n  MITIGATIONS:")
          for m in cs.mitigations:
              print(f"    -> {m}")
          print(f"\n  KEY LESSON:")
          print(f"    {cs.key_lesson[:180]}")


      def detection_gap_comparison(case_studies: List[CaseStudy]) -> None:
          print(f"\n{'='*65}")
          print("DETECTION GAP COMPARISON ACROSS CASE STUDIES")
          print("=" * 65)
          for cs in case_studies:
              detectable = sum(1 for d in cs.detection_opportunities if d.detectable)
              total = len(cs.detection_opportunities)
              print(f"\n  {cs.title[:45]}")
              print(f"    Detectable: {detectable}/{total} opportunities")
              gaps = [d.description[:55] for d in cs.detection_opportunities if not d.detectable]
              for g in gaps:
                  print(f"    GAP: {g}")


      if __name__ == "__main__":
          for cs in CASE_STUDIES:
              print_case_study_analysis(cs)
          detection_gap_comparison(CASE_STUDIES)

