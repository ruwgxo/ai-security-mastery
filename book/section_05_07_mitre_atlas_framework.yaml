# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    ATLAS fills the gap ATT&CK cannot: adversarial ML techniques (adversarial
    examples, training data poisoning, model extraction, inference evasion) have
    no ATT&CK analogues. ATLAS and ATT&CK are complementary, not competing —
    real attacks against ML-deployed organisations span both frameworks
    across a single kill chain.

  takeaway_02: |
    The four-level hierarchy (tactic → technique → sub-technique → case study)
    mirrors ATT&CK and enables immediate adoption by practitioners who already
    know ATT&CK. Tactic = adversary goal (stable); technique = how they achieve
    it (evolves with new research); case study = empirical grounding
    (real incident or peer-reviewed demonstration).

  takeaway_03: |
    All 12 ATLAS tactics map onto the eight-layer AI attack surface from Section 5.2.
    This dual vocabulary is the practitioner's bridge between architecture and
    threat intelligence: attack surface layer tells you where to instrument;
    ATLAS tactic tells you what adversary behaviour to detect there.

  takeaway_04: |
    Four adversary profiles have distinct ATLAS technique signatures: nation-state
    (patient, long-duration, supply chain focus), criminal (ROI-optimised, extraction
    and evasion), insider (legitimate access, collection and exfiltration), researcher
    (capability probing, data extraction for publication). Detection thresholds
    and response procedures differ by profile.

  takeaway_05: |
    The three case studies (GPT-2 extraction, physical adversarial patch, Tay poisoning)
    represent three distinct ATLAS impact types: confidentiality (training data extraction),
    integrity (model evasion), and availability/integrity via poisoning. Each had
    detectable signals that existing monitoring would have caught with the right
    data sources instrumented.

  takeaway_06: |
    Five ATLAS techniques have no ATT&CK parallel: adversarial example crafting,
    training data extraction via inference, systematic model capability probing,
    training data poisoning, and influence operations via generative AI. These are
    the techniques that require entirely new detection logic — ATT&CK-aligned rules
    do not cover them.

  takeaway_07: |
    ATLAS enables quantitative detection programme coverage measurement: covered
    techniques / total techniques = coverage percentage. This metric is defensible
    to stakeholders in a way that OWASP risk counts are not, because ATLAS techniques
    are specific observable behaviours, not risk categories.

  takeaway_08: |
    Red team exercises structured around ATLAS tactics produce the most operationally
    realistic ML security assessments. The four-phase structure (reconnaissance,
    initial access, impact and exfiltration, reporting) mirrors how real adversaries
    operate and generates actionable detection gap findings aligned to specific
    AML.TXXXX identifiers.

