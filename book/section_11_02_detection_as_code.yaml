prose_content:

  part_1_five_principles:
    heading: 'The Five Detection-as-Code Principles'
    body: |
      Detection-as-code is not a tool. It is a discipline — a set of principles that govern
      how detection rules are authored, reviewed, tested, deployed, and retired. The five
      principles are ordered: each depends on the one before it. You cannot test rules you
      cannot version. You cannot deploy rules that have not been tested. You cannot monitor
      rules that have not been deployed through a managed pipeline. Applying principle 4
      before principle 1 produces a pipeline that deploys ungoverned rules faster, which
      is strictly worse than the ad-hoc alternative.

      Principle 1 — Rules are code. Every detection rule is a software artefact. It lives
      in a version control repository. Every change to a rule produces a commit with a
      descriptive message. Rule files are never edited directly in a SIEM or monitoring
      platform; all changes flow through the repository. The consequence of this principle
      is that every rule has a full audit trail: who changed it, when, why, and what the
      previous version was. Rollback is a git revert, not a SIEM configuration operation.

      Principle 2 — Every rule has tests. A detection rule without tests is a hypothesis.
      Tests are first-class artefacts that ship in the same commit as the rule they cover.
      At minimum: one positive test case (a known-bad input that the rule must fire on)
      and one negative test case (a known-good input that the rule must not fire on).
      Tests run in CI on every pull request. A PR that adds a rule without its tests does
      not merge.

      Principle 3 — Rules are versioned with semantic meaning. Git provides commit history,
      but semantic versioning provides intent. A rule at version 1.2.0 has had two
      backwards-compatible improvements since its initial release. A rule at version 2.0.0
      has changed its detection logic in a way that may produce different alert volumes and
      requires re-calibration. Semantic versioning turns the changelog from a log of edits
      into a signal to the operations team.

      Principle 4 — Rules are deployed via pipeline. No manual deployment to SIEM. The
      pipeline runs lint (sigma-cli check), tests (pytest), and then deploys to the target
      backend (Elastic, Splunk, Datadog, or the gateway's Python detection engine). The
      pipeline also provides rollback: if a newly deployed rule produces alert flood, the
      rollback stage reverts to the previous version in under five minutes without manual
      SIEM intervention.

      Principle 5 — Rules are monitored in production. Deployment is not the end of the
      rule lifecycle. After deployment, the pipeline collects per-rule metrics: alert rate,
      analyst disposition (true positive / false positive / benign true positive), and
      mean time to acknowledge. When a rule's false positive rate crosses a threshold,
      a ticket is automatically opened in the detection engineering queue — not in the SOC
      queue, where it would add to analyst workload without producing a detection outcome.

      These five principles are not aspirational. They are the minimum governance bar that
      separates a detection programme from a collection of scripts. Section 11.08 defines
      L3 maturity as the point at which all five principles are operational. The remainder
      of Chapter 11 builds the tooling that makes L3 achievable.

  part_2_repository_structure:
    heading: 'Git Repository Structure for Detection-as-Code'
    body: |
      The repository structure encodes the programme's organisation. A flat repository where
      all rule files sit in a single directory works for ten rules. At 150 rules it becomes
      unmaintainable: no way to find rules by technique, no way to understand which rules
      cover which gateway tracks, no way to run tests for a subset of rules during a
      targeted calibration sprint.

      The recommended structure for a detection-as-code programme at the scale of the
      seven-track gateway:

          detections/
          ├── rules/
          │   ├── injection/         # Track 1-2: direct injection, jailbreaks
          │   ├── semantic/          # Track 3: semantic gating rules
          │   ├── poisoning/         # Track 4: data poisoning signals
          │   ├── extraction/        # Track 5: model extraction signals
          │   ├── adversarial/       # Track 6-7: adversarial input and evasion
          │   └── campaign/          # Multi-track correlation rules (Section 11.07)
          ├── tests/
          │   ├── fixtures/
          │   │   ├── known_bad/     # Positive test cases per rule family
          │   │   └── known_good/    # Negative test cases per rule family
          │   └── test_tracks.py     # pytest file: one test class per track
          ├── pipelines/
          │   └── ci.yml             # GitHub Actions workflow
          ├── sigma_backends/
          │   └── gateway_backend.py # Sigma → gateway Python compiler
          └── metadata/
              └── rule_schema.yaml   # Required metadata fields schema

      Each rule directory maps to a gateway track. New rules for Track 1 go in
      `rules/injection/`. The CI pipeline discovers rules by directory, runs the tests
      in the matching `tests/fixtures/` subdirectory, and deploys only rules whose
      tests pass. The `campaign/` directory houses the multi-event correlation rules
      that Section 11.07 introduces; they live separately because they depend on
      multiple track outputs rather than raw input signals.

      The `sigma_backends/` directory contains the compiler that converts Sigma YAML
      to gateway Python. This is the adapter layer: the gateway's detection engine is
      Python-native, not a standard SIEM, so a custom backend translates Sigma
      `logsource` and `detection` blocks into the gateway's filter interface. Section
      11.06 develops the AI-specific Sigma fields; the backend here consumes them.

  part_3_branching_strategy:
    heading: 'Branching Strategy for Detection Rules'
    body: |
      A detection-as-code programme requires a branching strategy that accommodates three
      simultaneous workstreams: new rule development, calibration of existing rules, and
      emergency rollback of rules causing alert flood.

      The recommended strategy uses three persistent branches and short-lived feature
      branches:

      main — production state. Every commit on main is deployed. No direct commits to
      main; all changes arrive via pull request with CI passing. The deployment pipeline
      runs on merge to main.

      staging — integration branch. New rules and calibrations are merged to staging for
      integration testing before main. The staging deployment runs against a shadow copy
      of production traffic. Alert volume on staging is monitored for 24 hours before the
      PR to main is opened.

      rollback-YYYYMMDD — emergency branch. When a newly deployed rule causes alert flood,
      the on-call detection engineer cuts a rollback branch from the last known-good commit
      on main, reverts the offending rule, and deploys via an expedited pipeline that skips
      the staging wait. The rollback branch is retained for post-incident review and then
      deleted. Target rollback time: under five minutes from flood detection to rule
      retraction.

      Feature branches follow the pattern `rule/track-N-description` for new rules and
      `calibrate/rule-id-description` for threshold adjustments. The naming convention
      lets the CI pipeline identify whether a PR adds new detection surface (higher
      review bar) or adjusts an existing rule (lower review bar but requires FPR data
      justifying the change).

      Rule retirement — removing a rule from production — follows a two-step process.
      First, the rule is moved to status: deprecated in its metadata and the alert is
      suppressed but the rule remains deployed. This allows a two-week observation period
      to confirm that suppressing the rule does not reduce true positive coverage. After
      two weeks with no confirmed true positives from the rule, a second PR removes it
      from the repository entirely.

  part_4_testing_framework:
    heading: 'Testing Detection Rules: Positive, Negative, and Regression Tests'
    body: |
      Three test types are required for each detection rule:

      Positive tests (true positive validation) confirm that the rule fires on a known-bad
      input. For Track 1 (direct injection), a positive test passes a prompt containing
      a known injection prefix and asserts that the detection function returns a score
      above the block threshold. Positive tests must use inputs that represent the attack
      at minimum evasion — the simplest form of the attack, not the most obfuscated.
      If the rule cannot detect the minimum-evasion form, it will not detect the
      obfuscated form.

      Negative tests (false positive validation) confirm that the rule does not fire on
      a known-good input. For Track 1, a negative test passes a legitimate user prompt
      and asserts that the score stays below the flag threshold. Negative tests must use
      inputs drawn from the actual user population, not synthetic prompts. The test corpus
      should be reviewed quarterly to ensure it remains representative of production traffic.

      Regression tests confirm that a rule change does not re-introduce previously fixed
      false positives. Every analyst-confirmed false positive becomes a regression test
      case. The analyst provides the exact input that triggered the false positive; it is
      added to the known-good fixture corpus and tagged with the rule ID and the date the
      false positive was confirmed. If a future rule change causes the regression test to
      fail, the CI pipeline blocks the PR with an explicit error naming the original
      false positive incident.

      The test harness is pytest-based. Each track has a test class in `tests/test_tracks.py`.
      Fixtures live in `tests/fixtures/known_bad/` and `tests/fixtures/known_good/` as
      YAML or JSON files, one file per attack family or user population segment. The
      detection function under test is the same Python function that runs in the production
      gateway — not a mock. Testing mocks is not testing detection.

  part_5_cicd_pipeline:
    heading: 'CI/CD Pipeline: Lint, Test, Deploy, Rollback'
    body: |
      The CI/CD pipeline has four stages. Each stage must pass before the next runs.
      A failure at any stage blocks the deployment and notifies the PR author with the
      stage name and failure output.

      Stage 1 — Lint. sigma-cli check validates Sigma rule syntax. yamllint validates
      YAML formatting. The metadata validator (rule_metadata_validator.py, this section's
      second deliverable) confirms that all required metadata fields are present and
      correctly typed. A rule with missing severity, confidence, or MITRE technique fields
      does not pass lint. Lint runs first because it is the cheapest gate: it catches
      syntax errors before the test harness runs.

      Stage 2 — Test. pytest runs the full test suite in `tests/test_tracks.py`. The
      pipeline runs tests only for rules in directories touched by the PR, not the full
      suite, to keep CI time under three minutes on incremental changes. Full suite runs
      nightly against the staging branch. A test failure in any rule touched by the PR
      blocks the deployment.

      Stage 3 — Deploy. The pipeline compiles Sigma rules to the target backend (gateway
      Python, Elastic query DSL, Splunk SPL) via sigma-cli with the appropriate backend
      flag. Compiled rules are pushed to the deployment target. For the gateway, deployment
      means copying the compiled Python detector to the gateway service and triggering a
      rule reload — no service restart required. For SIEM targets, deployment uses the
      SIEM's rule management API. Deployment is logged with the commit hash, rule ID,
      version, and deploying pipeline run ID.

      Stage 4 — Rollback. The pipeline maintains a rollback manifest: a JSON file mapping
      each deployed rule ID to the last known-good commit hash. If a post-deployment
      alert rate monitor detects flood (alert rate exceeds 10x the 7-day baseline for
      any single rule within 15 minutes of deployment), the pipeline's rollback webhook
      is called. The rollback stage checks out the last known-good commit for the offending
      rule, recompiles, and deploys, overwriting the flooded version. Target: rollback
      completes within five minutes of flood detection.

      The pipeline configuration lives in `pipelines/ci.yml` as a GitHub Actions workflow.
      The same pipeline runs on PR (stages 1–2 only, no deployment) and on merge to main
      (all four stages). On merge to staging, stages 1–3 run against the staging target.
      This means every rule is lint-checked and tested on PR, deployed to staging on merge
      to staging, and deployed to production on merge to main — three gates before
      production.

  part_6_metadata_standards:
    heading: 'Rule Metadata Standards'
    body: |
      Every detection rule must carry eight metadata fields at merge time. These fields
      are validated by rule_metadata_validator.py in the lint stage. A PR that adds a
      rule missing any field does not pass CI.

      title — human-readable name of the rule. Must be specific enough to identify the
      attack family and detection mechanism without reading the rule body. Bad: "Injection
      Detector". Good: "Direct Prompt Injection via System Prompt Override — Track 1".

      id — UUID v4. Generated once at rule creation. Never changes. The stable identifier
      used in the rollback manifest, FPR tracking database, and analyst disposition records.
      Changing the ID is equivalent to retiring the old rule and creating a new one.

      status — one of: experimental, test, stable, deprecated. Rules ship as experimental,
      graduate to test after passing two weeks on staging, graduate to stable after
      confirmed true positives in production, and move to deprecated when retirement is
      initiated. The CI pipeline enforces that only stable and test rules deploy to
      production; experimental rules deploy to staging only.

      severity — one of: informational, low, medium, high, critical. Reflects the impact
      of the attack being detected, not the confidence of the detection. A high-confidence
      low-severity detection is medium severity; a low-confidence critical-severity detection
      is high severity. Severity drives SOC triage priority.

      confidence — one of: low, medium, high. Reflects the precision of the rule at the
      time of deployment. Set from test results: positive test hit rate and negative test
      false positive rate. A rule with a 90%+ positive hit rate and under 5% false positive
      rate on the test corpus ships as high confidence. Confidence is re-evaluated after
      each calibration.

      mitre_technique — list of ATLAS or ATT&CK technique IDs the rule covers. Must
      reference real technique IDs validated against the ATLAS and ATT&CK catalogues.
      This field feeds the ATT&CK coverage heat map in Section 11.05.

      false_positive_notes — free text describing known sources of false positives and
      the conditions under which they occur. Not optional even if no false positives are
      known: the field must contain "No known false positives as of YYYY-MM-DD" with the
      date. This forces the rule author to think explicitly about the false positive surface
      before merging.

      author — the GitHub handle of the rule author and the creation date in ISO 8601
      format. For rules migrated from Part 2: "ruwgxo, 2026-05-25 (migrated from Chapter
      N, Section N.NN)". The author field is the primary point of contact for rule
      questions and calibration requests.

  part_7_gateway_migration:
    heading: 'Migrating the Seven-Track Gateway to Detection-as-Code'
    body: |
      The seven tracks built in Part 2 are L1 artefacts: they exist and work but have none
      of the governance infrastructure established in this section. Migration to detection-as-code
      does not mean rewriting them. It means wrapping them in the infrastructure.

      The migration sequence for each track: (1) move the rule file to the correct directory
      in the repository structure; (2) add the eight required metadata fields; (3) write the
      positive and negative test fixtures; (4) run the test suite to confirm both pass; (5)
      commit with a message in the format "migrate: track-N rule to DaC structure (11.02)";
      (6) open a PR to staging; (7) after CI passes, merge to staging; (8) after 24-hour
      staging observation, open PR to main.

      The migration does not change the detection logic. Thresholds remain as set in Part 2.
      Calibration is a separate workstream that begins after migration and is covered in
      Section 11.09. Mixing migration and calibration in the same PR defeats the purpose of
      version history: if a calibration change breaks something, the git history must clearly
      show that the migration was good and the calibration was the change that introduced the
      problem.

      After migration, all seven tracks have version history, tests, metadata, and a
      deployment pipeline. That is L2 maturity by the Section 11.08 definition. L3 requires
      additionally: an ATT&CK coverage map (Section 11.05), FPR tracking per rule (Section
      11.09), and the engineering workflow (Section 11.10). The migration in this section is
      the foundation; the subsequent sections build the rest of L3.

