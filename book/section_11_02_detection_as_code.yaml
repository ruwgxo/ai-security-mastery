section_overview:
  one_line_summary: >
    Detection-as-code transforms detection rules from ad-hoc scripts into governed software
    artefacts: every rule lives in Git, ships with tests, passes a lint and test CI stage
    before deployment, and can be rolled back in under five minutes if it floods the SOC queue.
  why_this_section_exists: |
    Section 11.01 named the five categories of detection debt and identified all seven
    gateway tracks as sitting at L1 maturity — existing but ungoverned. The fastest way to
    move from L1 to L3 is not to rewrite the rules. The rules are largely correct. What
    they lack is the governance infrastructure that makes them maintainable at scale: a
    repository structure, a testing framework, a CI pipeline, and metadata standards that
    allow any engineer to understand a rule without reading its author's mind.

    This section builds that infrastructure. By the end of it the seven-track gateway has
    a Git repository with a branching strategy, a pytest test suite with positive and
    negative fixtures for each track, a GitHub Actions CI pipeline that runs lint and tests
    on every pull request, and a metadata standard that every rule must satisfy before merge.
    These are the two highest-priority debts from Section 11.01: rules without version
    history and rules without tests. Both are resolved here.
  position_in_chapter: >
    Section 11.02 is the first implementation section of Chapter 11. Section 11.01
    diagnosed; Section 11.02 prescribes and builds. The CI/CD pipeline established here
    is the deployment mechanism for every rule and detector produced in Sections 11.03
    through 11.13 and Chapters 12–14.

