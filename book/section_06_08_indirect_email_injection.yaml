section_summary: |
  Section 6.8 established email as the most accessible indirect injection surface.
  The adversary delivers the attack vector directly to the target organisation via
  email -- no access to knowledge bases, web infrastructure, or target systems
  required. Plain-text body injection, subject line injection, HTML CSS-hidden
  injection, reply chain injection, forwarded email injection, and calendar invite
  field injection are six distinct entry points, each with different adversary
  access requirements and detection characteristics.

  LLM email assistants with send capability are the highest-impact deployment
  scenario: an injection that causes the assistant to reply, forward, or take
  external action achieves adversary objectives using the assistant's legitimate
  permissions. The confused deputy attack is direct and immediate. Draft-and-hold
  -- requiring human review before any outbound email is sent -- is the single
  most important sandboxing control for email agent deployments.

  Reply chain and forwarded email injection bypass trusted sender heuristics
  by embedding payloads in quoted content attributed to external correspondents.
  Per-segment depth-weighted classification is the detection approach: each
  quoted segment is classified independently, with depth and externality increasing
  the injection suspicion weight.

  Section 6.9 moves to the database injection surface -- where adversaries plant
  payloads in structured data fields that LLMs query and use as context, creating
  second-order injection patterns that are the most persistent of the indirect
  injection classes.
...
