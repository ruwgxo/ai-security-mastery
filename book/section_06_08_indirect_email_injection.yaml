key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Email injection has the lowest adversary barrier of any indirect injection
        surface. The attack vector is delivered directly to the target via email.
        No access to target systems, knowledge bases, or infrastructure is required.

    - number: 2
      takeaway: |
        LLM email assistants with outbound send capability are confused deputy
        attacks waiting for an injection trigger. Draft-and-hold -- requiring
        human review before send -- is the single most important sandboxing
        control for email agent deployments.

    - number: 3
      takeaway: |
        HTML email injection replicates CSS display:none and HTML comment injection
        from Section 6.7 exactly. The Section 6.7 normalisation pipeline applies
        without modification to the HTML MIME part of an email.

    - number: 4
      takeaway: |
        Reply chain and forwarded email injection bypass trusted sender heuristics.
        The injection payload is attributed to an external correspondent buried
        in quoted thread history; the email appears to come from a trusted colleague
        or contact. Per-segment classification with depth weighting is required.

    - number: 5
      takeaway: |
        Calendar invite description fields are high-capacity, low-visibility
        injection vectors. Users rarely read the full description before accepting
        an invite. LLM assistants that process invite descriptions must classify
        all calendar text fields.

    - number: 6
      takeaway: |
        CRM write capability creates cross-system injection chains. An injection
        that directs the email assistant to write adversary content to a CRM record
        creates a second-order injection that activates when a subsequent LLM
        retrieves the record. Staged review before CRM commit breaks this chain.

    - number: 7
      takeaway: |
        Email injection events have better attribution than RAG or web injection
        because the delivery channel is logged with sender, timestamp, and message
        ID. Post-incident investigation is more tractable; the injection source
        can be traced to a specific email and sender.

    - number: 8
      takeaway: |
        The email agent sandboxing architecture has five required controls:
        draft-and-hold for outbound email, human confirmation for calendar
        external publish, staged review for CRM writes, explicit authorisation
        for forwarding, and pre-processing content classification with quoted
        content and CSS stripping coverage.


