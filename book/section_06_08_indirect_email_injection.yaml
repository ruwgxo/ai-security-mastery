section_content:

  subsection_1:
    number: "6.8.1"
    title: "Why Email Injection Is Uniquely Dangerous"
    content: |
      Email injection occupies a distinct position among indirect injection attack
      classes because the adversary can deliver the injection vector directly to the
      target organisation without any access to the target's systems. Every other
      indirect injection surface requires the adversary to first compromise or
      influence an external data source -- a knowledge base document, a web page,
      a database record. Email requires none of that. The adversary sends an email.

      An LLM email assistant is a deployment that processes incoming emails on
      behalf of a user or organisation: summarising, categorising, drafting replies,
      or taking actions based on email content. The email body is retrieved from
      the mail server and inserted into the LLM context as content to be processed.
      Any email the LLM assistant processes is a potential injection vector. Any
      external sender who can reach the organisation's mail server has indirect
      injection capability.

      The threat model is fundamentally different from RAG or web injection. In
      RAG injection, the adversary must influence content that is indexed and
      retrieved. In web injection, the adversary must own or compromise a page
      the agent browses. In email injection, the adversary sends an email. The
      barrier to exploitation is the lowest of any indirect injection surface.

      The consequence of this low barrier is that email injection has the largest
      potential adversary population of any indirect injection class. Spam filters
      and email authentication (SPF, DKIM, DMARC) reduce but do not eliminate
      adversary email delivery. Adversaries who can bypass spam filters -- through
      legitimate-looking email content, compromised sender accounts, or newly
      registered domains -- can deliver injection payloads to any LLM email
      assistant that processes their incoming mail.

      A second property that makes email injection especially dangerous is that
      LLM email assistants frequently have send capability. An assistant that can
      read and summarise emails is useful; an assistant that can also draft and send
      replies is more useful. The send capability creates a direct confused deputy
      attack surface: injection payload in an incoming email causes the assistant
      to send a reply -- with sensitive context, with a phishing attachment, or
      to an adversary-controlled address -- using the organisation's email identity
      and the assistant's legitimate permissions.

    key_point: |
      Email injection has the lowest adversary barrier of any indirect injection
      surface: the attack vector is sent directly to the target. LLM email
      assistants with send capability are confused deputy attacks waiting for
      an injection trigger. No access to target systems is required.

  subsection_2:
    number: "6.8.2"
    title: "Email Body, Subject Line, and HTML Email Injection"
    content: |
      Email body injection is the baseline case. An adversary crafts an email
      whose body contains an injection payload alongside legitimate-appearing
      content. When the LLM email assistant processes the email -- to summarise
      it, categorise it, or draft a reply -- the injection payload enters the
      LLM context as content of an incoming message. The assistant has no
      mechanism to distinguish injection instructions within email content from
      legitimate email content, because email content is by design user-controlled
      natural language.

      The effective email body injection embeds the payload in content that is
      semantically appropriate for the email's apparent purpose. An adversary
      who wants to trigger the injection when the assistant processes what appears
      to be a vendor invoice embeds the payload within invoice-like content, so
      that the email passes automated email filtering heuristics and appears
      legitimate to any human who might spot-check the assistant's output.

      Subject line injection: the email subject is a short, high-visibility field
      that LLM email assistants frequently use as a summary or categorisation
      anchor. A payload in the subject line is processed early in the email
      handling context and may have disproportionate influence relative to its
      length. Subject line injection is limited by character count constraints
      but effective for short, high-impact instructions -- particularly for
      directing the assistant's immediate behaviour rather than delivering a
      complex payload.

      HTML email injection replicates the web injection techniques from Section
      6.7 in the email context. HTML emails are rendered by mail clients, and
      the rendering suppresses the same categories of hidden content as web
      browsers: CSS display:none elements, HTML comment content, meta tag content,
      and off-screen text. An LLM email assistant that processes the email's HTML
      source or extracts text from HTML using a naive extractor will include all
      hidden content. The same CSS stripping and content normalisation pipeline
      from Section 6.7 must be applied to HTML email content before injection
      classification.

      The HTML email injection surface is particularly relevant because HTML email
      is the dominant format for commercial and marketing communications -- the
      category of email that LLM email assistants are most commonly used to process.

    key_point: |
      Email body and subject line injection are direct entry points requiring only
      email delivery access. HTML email injection replicates CSS hidden content
      techniques from web injection inside the email format. The Section 6.7
      normalisation pipeline applies without modification.

  subsection_3:
    number: "6.8.3"
    title: "Reply Chain and Forwarded Email Injection"
    content: |
      Reply chain injection exploits the structure of email conversation threads.
      When an email assistant processes a reply or a forwarded thread, the full
      conversation history -- including all prior messages in the thread -- is
      typically included in the email body as quoted text. An adversary who injects
      a payload into an early message in a thread, or into a message that gets
      forwarded through a chain, can have that payload processed when a later
      legitimate reply is handled by the assistant.

      The attack structure: an adversary sends an initial email to a target
      contact, not to the organisation using the LLM assistant. The initial email
      appears legitimate. The contact replies, with the adversary's email as quoted
      text at the bottom of the reply. The contact may forward the thread to the
      organisation. When the LLM email assistant processes the forwarded thread
      or reply, it processes the full thread content including the adversary's
      original email at the bottom of the quoted section. The injection payload,
      buried in quoted thread history, enters the LLM context.

      The trusted sender bypass is the most operationally significant property of
      this attack. The email received by the LLM assistant was sent by a trusted
      contact -- a colleague, a known vendor, a regular correspondent. The email
      appears to originate from a trusted source. The injection is in the quoted
      content within the email body, attributed to the adversary, but the assistant
      may not apply differential trust levels to quoted versus non-quoted sections.

      Forwarded email injection uses the same mechanism via a different path. An
      adversary sends a carefully crafted email to a member of the target organisation
      -- anyone who might forward email to someone whose email is processed by
      the LLM assistant. When the recipient forwards the adversary's email, the
      full adversary-controlled content is forwarded intact as the email body.
      The forwarded email arrives in the LLM assistant's processing queue attributed
      to a trusted internal forwarder.

      Detection signal: the assistant should apply injection classification to all
      sections of the email body, including quoted thread history and forwarded
      content, not only the most recent message. Quoted content should be extracted
      and classified separately, with a flag indicating that the content originates
      from a potentially untrusted prior correspondent.

    key_point: |
      Reply chain and forwarded email injection bypass trusted sender heuristics
      by embedding payloads in quoted or forwarded content attributed to external
      correspondents. Detection must classify all sections of the email body,
      including quoted history, not only the most recent message.

  subsection_4:
    number: "6.8.4"
    title: "Email-Triggered Action Escalation: The Confused Deputy Scenario"
    content: |
      Email-triggered action escalation is the highest-impact email injection
      outcome. It occurs when an LLM email assistant has outbound capabilities --
      the ability to send emails, create calendar events, update CRM records,
      or call external APIs -- and an injection payload directs the assistant
      to use those capabilities for adversary purposes.

      The canonical scenario: an adversary sends an email to a target organisation
      whose LLM email assistant automatically handles incoming correspondence.
      The email contains a legitimate-appearing body and an injection payload.
      The payload instructs the assistant to reply to the email including the
      contents of the system prompt or recent conversation context. The assistant,
      following the injection instruction, sends a reply to the adversary containing
      sensitive information. The adversary receives the reply without ever accessing
      the target's systems. The entire attack is conducted through the email channel.

      Variations of this scenario exploit different capabilities the email assistant
      may have. If the assistant can create calendar invites, the injection may
      direct it to create a meeting that includes sensitive information in the
      description or that links to an adversary-controlled URL. If the assistant
      updates CRM records, the injection may direct it to write adversary-controlled
      content to a customer record that will subsequently be retrieved and processed
      by another LLM (creating a cross-system injection chain). If the assistant
      can forward emails, the injection may direct it to forward internal emails
      to an external address.

      The confused deputy property: the email assistant has legitimate access to
      the email send capability, the calendar, and the CRM. The adversary does not.
      Through the injection, the adversary uses the assistant's permissions to
      achieve what they could not achieve directly. The assistant is the deputy;
      the adversary's instructions are the confusion that redirects the deputy's
      legitimate access.

      The mitigation is the same principle applied in Section 6.7 sandboxing:
      the assistant's outbound capabilities must be explicitly enumerated and
      restricted. Automatic reply drafting is acceptable; automatic reply sending
      without human review is not. Action restriction at the tool permission layer
      is more reliable than attempting to detect and prevent all possible injection
      payloads that could trigger action escalation.

    key_point: |
      LLM email assistants with send capability are confused deputy risks. An
      injection that causes the assistant to reply, forward, or take external
      action achieves adversary objectives using the assistant's legitimate
      permissions. Action restriction -- requiring human review before send --
      is the primary mitigation.

  subsection_5:
    number: "6.8.5"
    title: "Calendar Invite Injection and Extended Integration Surface"
    content: |
      Calendar integration extends the email injection surface in two directions.
      An LLM assistant that processes calendar invites alongside email can receive
      injection payloads through calendar invite fields. An LLM assistant that
      creates calendar events based on email content can be directed by email
      injection to create calendar events with adversary-specified content.

      Calendar invite injection: calendar invites (iCalendar format, .ics files)
      contain multiple text fields: summary (the event title), description
      (free-form event details), location (physical or virtual location), attendee
      fields, and comments. Each text field is a potential injection vector. An
      adversary who sends a calendar invite to a target whose LLM assistant
      processes calendar invites can embed injection payloads in the description
      or comment fields. The invite summary ("Meeting re: Q3 Budget Review") appears
      legitimate; the injection is in the description field that the user may not
      read before accepting.

      The description field in particular has high injection potential because it
      is free-form text of arbitrary length, the assistant may read it in full to
      provide context for meeting preparation, and it is not visible in most calendar
      UI summary views (requiring the user to click into the event to see it). An
      injection payload in a calendar invite description is therefore less likely
      to be spotted by human review than a payload in an email body.

      Integration surface expansion: when email assistants are integrated with
      task management tools, CRM systems, or document management platforms --
      common in enterprise deployments -- each integration point adds an additional
      confused deputy surface. An injection that directs the assistant to create a
      task in a connected project management tool, write a note in a CRM record,
      or store a document in a connected drive extends the injection's impact
      beyond the email channel into the broader enterprise toolchain.

      Detection: calendar invite text fields must be classified alongside email
      body content. The same injection classifier applies; the normalisation
      pipeline must handle iCalendar text encoding (quoted-printable, base64,
      and line-folding artefacts). Integration surface expansion must be assessed
      as part of the email assistant deployment threat model, with each integration
      treated as an additional confused deputy attack surface.

    key_point: |
      Calendar invite description fields are high-capacity, low-visibility
      injection vectors. Integration of the email assistant with CRM, task
      management, or document tools extends each injection's potential impact
      into the connected toolchain. Each integration adds a confused deputy surface.

  subsection_6:
    number: "6.8.6"
    title: "Email Content Normalisation Pipeline"
    content: |
      The email content normalisation pipeline adapts the Section 6.7 web
      normalisation pipeline to the email format, with email-specific extensions
      for MIME structure, quoted content extraction, and email header classification.

      Stage A -- MIME structure parsing: email messages use MIME (Multipurpose
      Internet Mail Extensions) to carry multipart content. A single email may
      contain a plain-text part, an HTML part, attachments, and inline images.
      The normalisation pipeline must parse the MIME structure and process each
      content part appropriately. The HTML part requires full CSS stripping as
      in Section 6.7. The plain-text part is processed directly. Attachments
      are classified separately (file type detection, content extraction where
      applicable).

      Stage B -- HTML email normalisation: apply the Section 6.7 six-stage
      pipeline (encoding normalisation, script and style removal, non-rendered
      element removal, meta content extraction, body text extraction, classification)
      to the HTML MIME part. This handles CSS-hidden injection in HTML emails
      with no additional specialisation required.

      Stage C -- Quoted content extraction and segmentation: email body text
      contains quoted prior messages, typically prefixed with ">" characters or
      interspersed with "On [date], [sender] wrote:" separators. Extract each
      quoted segment as a separate text block, annotating it with its depth in
      the reply chain (depth 1 = most recent quoted message, depth 2 = the message
      quoted within that message, etc.). Apply injection classification to each
      segment independently, with the quoted-depth annotation influencing the
      risk weight (deeper quoted content from potentially unknown correspondents
      carries higher injection suspicion).

      Stage D -- Header field classification: email headers contain metadata
      that the LLM assistant may include in its processing context: subject,
      sender display name, reply-to address, X-custom headers. Injection payloads
      can appear in any header field that the assistant reads. The subject field
      requires injection classification. Sender display name fields ("Alice Smith
      <alice@example.com>") can contain arbitrary text in the display portion
      and should be classified. X-custom headers with content processed by the
      assistant must be classified.

      Stage E -- iCalendar content parsing: for calendar invites, extract all
      text-bearing fields (SUMMARY, DESCRIPTION, LOCATION, COMMENT, X-custom
      properties) and classify each. Apply quoted-printable and base64 decoding
      as appropriate for the field encoding.

      Stage F -- Normalised output assembly and classification routing: combine
      all classified segments into a structured result indicating which segments
      are clean, which are flagged, and which are blocked. The LLM context
      assembly stage receives only the clean segments, with flagged segments
      routed to review.

    key_point: |
      Email normalisation extends the Section 6.7 pipeline with MIME structure
      parsing, quoted content segmentation with depth annotation, header field
      classification, and iCalendar field extraction. Quoted content from external
      correspondents carries elevated injection suspicion proportional to reply
      chain depth.

  subsection_7:
    number: "6.8.7"
    title: "Email Agent Sandboxing and Detection Architecture"
    content: |
      The email agent sandboxing architecture applies the same three-component
      model from Section 6.7 -- action restriction, network egress control,
      and session isolation -- with email-specific adaptations.

      Action restriction for email agents: the primary high-risk capability is
      outbound email sending. The sandboxing policy should require human review
      and approval before any outbound email is sent by the assistant. Draft-and-
      hold is the safe default: the assistant prepares a draft, which is queued
      for human review before sending. Automatic sending should be restricted to
      a defined set of pre-approved recipient addresses and content templates,
      with any deviation from the template requiring human approval.

      Secondary action restrictions: calendar event creation should require
      human confirmation before the event is published to external attendees.
      CRM record updates triggered by email processing should be staged in a
      review queue before committing. Forwarding to external addresses should
      require explicit human authorisation for each forward.

      Detection signals specific to email injection: email injection produces
      several signals that do not appear in web or RAG injection. The injection
      payload is delivered in a single email event that is logged with a timestamp
      and sender attribution. This means email injection leaves a more attributable
      trace than web or RAG injection -- the email is logged, the sender address
      is recorded, and the delivery timestamp is known. Post-incident investigation
      of email injection is therefore more tractable than investigation of RAG
      injection where the poisoned document may have been in the knowledge base
      for weeks.

      The pre-processing classifier placement for email is immediately after MIME
      parsing and before any content is delivered to the LLM context. Each email
      segment (body text, HTML content, quoted sections, header fields, calendar
      fields) is independently classified. The classification result determines
      whether the email is processed normally, flagged for review, or blocked
      from reaching the LLM entirely.

      Output monitoring for email agents monitors the assistant's draft outputs
      for signs of injection-influenced behaviour: unusual recipients in reply-to
      fields, system prompt content in the draft body, abnormal attachment requests,
      or draft content that is inconsistent with the email subject and body context.
      Output monitoring is the backstop when the pre-processing classifier misses
      the payload.

    key_point: |
      Email agent sandboxing centres on draft-and-hold: the assistant prepares
      outbound emails for human review before sending. This single control
      prevents the most impactful email injection outcome -- data exfiltration
      via email reply -- regardless of whether the input classifier catches the
      injection payload.


implementations:

  implementation_1:
    title: "Email Content Normalisation and Injection Classifier"
    filename: "email_injection_classifier.py"
    description: |
      Production-grade email injection classifier implementing the six-stage
      normalisation pipeline for email content. Parses MIME multipart structure,
      applies HTML CSS stripping (reusing the Section 6.7 VisibleTextExtractor
      approach), extracts and segments quoted reply chain content with depth
      annotation, classifies header fields (subject, sender display name,
      reply-to), and handles iCalendar field extraction. Produces per-segment
      injection scores with a consolidated email-level decision (ALLOW/FLAG/BLOCK)
      and an audit trail suitable for incident investigation.
    dependencies:
      - "email (stdlib)"
      - "re (stdlib)"
      - "html (stdlib)"
      - "unicodedata (stdlib)"
      - "json (stdlib)"
      - "quopri (stdlib)"
      - "base64 (stdlib)"
    code: |
      #!/usr/bin/env python3
      """
      email_injection_classifier.py
      Section 6.8 -- Email Content Normalisation and Injection Classifier
      Parses MIME email structure, normalises all content segments, classifies
      each for injection signals, and produces a consolidated email-level decision.
      Author: Raghav Dinesh | ai-security-mastery
      """

      import base64
      import email as email_lib
      import html as html_mod
      import json
      import quopri
      import re
      import unicodedata
      from dataclasses import dataclass, field, asdict
      from email import policy
      from email.message import Message
      from pathlib import Path
      from typing import Optional


      # ---- Injection signal patterns (email-aware extensions) -------------

      INJECTION_SIGNALS = [
          r"\bignore\b.{0,40}\b(previous|prior|all)\b.{0,20}\b(instruction|directive|context)\b",
          r"\b(forget|disregard|override)\b.{0,30}\b(instruction|told|above)\b",
          r"\byour (new|actual|real) (directive|task|role|instruction)\b",
          r"\bnote to (ai|assistant|system|llm)\b",
          r"\b(output|reveal|repeat|show|include)\b.{0,30}\b(system prompt|configuration|instructions?)\b",
          r"\bask.{0,30}(user|them|recipient).{0,30}(password|credential|token|key)\b",
          r"\b(reply|respond|send|forward).{0,30}(to|this|email).{0,30}(adversary|attacker|external)\b",
          r"\b(attach|include|send).{0,30}(confidential|sensitive|internal|private)\b",
          r"\bforward.{0,20}(this|all|these).{0,20}(email|message|thread)\b.{0,20}(to|at)\b",
          r"\bno (content |safety )?restrict",
          r"\byou are now\b",
          r"\bimportant.{0,10}(system|update|directive|override)\b",
      ]

      ZERO_WIDTH = {"\u200B", "\u200C", "\u200D", "\uFEFF"}


      def score_injection(text: str) -> float:
          if not text:
              return 0.0
          text_l = text.lower()
          matches = sum(
              1 for p in INJECTION_SIGNALS
              if re.search(p, text_l, re.IGNORECASE)
          )
          return min(1.0, matches * 0.22)


      def strip_css_hidden(html_text: str) -> str:
          """Strip CSS-hidden elements and HTML comments from email HTML."""
          # Remove script and style blocks
          text = re.sub(r"<script[^>]*>.*?</script>", " ", html_text, flags=re.DOTALL | re.IGNORECASE)
          text = re.sub(r"<style[^>]*>.*?</style>", " ", text, flags=re.DOTALL | re.IGNORECASE)
          # Remove HTML comments
          text = re.sub(r"<!--.*?-->", " ", text, flags=re.DOTALL)
          # Remove display:none and visibility:hidden elements (inline style)
          text = re.sub(
              r"<[^>]+style=['\"][^'\"]*(?:display\s*:\s*none|visibility\s*:\s*hidden|opacity\s*:\s*0)[^'\"]*['\"][^>]*>.*?</[^>]+>",
              " ", text, flags=re.DOTALL | re.IGNORECASE
          )
          # Strip remaining tags
          text = re.sub(r"<[^>]+>", " ", text)
          # Decode HTML entities
          text = html_mod.unescape(text)
          return re.sub(r"\s{2,}", " ", text).strip()


      def decode_mime_payload(part: Message) -> str:
          """Decode a MIME part payload to a string."""
          charset = part.get_content_charset() or "utf-8"
          payload = part.get_payload(decode=True)
          if payload is None:
              return ""
          try:
              return payload.decode(charset, errors="replace")
          except Exception:
              return payload.decode("utf-8", errors="replace")


      def extract_quoted_segments(plain_text: str) -> list[tuple[int, str]]:
          """
          Extract quoted reply segments from plain text email body.
          Returns list of (depth, text) tuples. depth=0 is the main body,
          depth=1 is the first level of quoted content, etc.
          """
          segments = []
          current_depth = 0
          current_lines: list[str] = []

          for line in plain_text.splitlines():
              stripped = line.lstrip()
              depth = len(line) - len(stripped)
              # Count leading '>' characters as quote depth
              gt_depth = 0
              temp = stripped
              while temp.startswith(">"):
                  gt_depth += 1
                  temp = temp[1:].lstrip()

              if gt_depth != current_depth:
                  if current_lines:
                      segments.append((current_depth, "\n".join(current_lines)))
                  current_lines = [temp if gt_depth > 0 else stripped]
                  current_depth = gt_depth
              else:
                  current_lines.append(temp if gt_depth > 0 else stripped)

          if current_lines:
              segments.append((current_depth, "\n".join(current_lines)))

          return segments


      def normalise_text(text: str) -> str:
          """Remove zero-width chars, NFKC normalise, collapse whitespace."""
          text = "".join(c for c in text if c not in ZERO_WIDTH)
          text = unicodedata.normalize("NFKC", text)
          return re.sub(r"\s{2,}", " ", text).strip()


      @dataclass
      class EmailSegmentResult:
          segment_type: str       # body | html_body | quoted_depth_N | header_subject |
                                  # header_sender | header_reply_to | calendar_field
          content_preview: str
          injection_score: float
          matched_signals: list[str]
          decision: str           # ALLOW | FLAG | BLOCK


      @dataclass
      class EmailClassificationResult:
          message_id: str
          sender: str
          subject: str
          segment_results: list[EmailSegmentResult]
          email_injection_score: float
          email_decision: str     # ALLOW | FLAG | BLOCK
          action_escalation_risk: bool
          audit_notes: list[str]


      def classify_segment(
          segment_type: str,
          text: str,
          flag_threshold: float = 0.30,
          block_threshold: float = 0.60,
          depth_weight: float = 1.0,
      ) -> EmailSegmentResult:
          normalised = normalise_text(text)
          score = score_injection(normalised) * depth_weight

          matched = [
              p[:60] for p in INJECTION_SIGNALS
              if re.search(p, normalised.lower(), re.IGNORECASE)
          ]

          if score >= block_threshold:
              decision = "BLOCK"
          elif score >= flag_threshold:
              decision = "FLAG"
          else:
              decision = "ALLOW"

          return EmailSegmentResult(
              segment_type=segment_type,
              content_preview=text[:80],
              injection_score=round(score, 4),
              matched_signals=matched[:3],
              decision=decision,
          )


      def check_action_escalation_risk(segments: list[EmailSegmentResult]) -> bool:
          """
          Check if any segment contains signals that would trigger
          action escalation (email send, forward, CRM write, etc).
          """
          escalation_patterns = [
              r"\b(reply|send|forward|email).{0,20}(to|this|at)\b",
              r"\b(attach|include)\b.{0,20}(confidential|internal|private|sensitive)\b",
              r"\bcreate.{0,20}(calendar|event|meeting|invite)\b",
              r"\b(update|write|record|save).{0,20}(crm|database|record|note)\b",
          ]
          for seg in segments:
              for pat in escalation_patterns:
                  if re.search(pat, seg.content_preview.lower(), re.IGNORECASE):
                      return True
          return False


      def classify_email(
          raw_email: str,
          flag_threshold: float = 0.30,
          block_threshold: float = 0.60,
      ) -> EmailClassificationResult:
          msg = email_lib.message_from_string(raw_email, policy=policy.default)
          segment_results = []
          audit_notes = []

          sender = str(msg.get("From", ""))
          subject = str(msg.get("Subject", ""))
          message_id = str(msg.get("Message-ID", "unknown"))
          reply_to = str(msg.get("Reply-To", ""))

          # Stage D: header classification
          if subject:
              seg = classify_segment("header_subject", subject, flag_threshold, block_threshold)
              segment_results.append(seg)

          if sender:
              # Extract display name only (the part before <email@addr>)
              display_name = re.sub(r"<[^>]+>", "", sender).strip()
              if display_name:
                  seg = classify_segment("header_sender_display", display_name,
                                         flag_threshold, block_threshold)
                  segment_results.append(seg)

          if reply_to:
              seg = classify_segment("header_reply_to", reply_to,
                                     flag_threshold, block_threshold)
              segment_results.append(seg)

          # Walk MIME parts
          for part in msg.walk():
              content_type = part.get_content_type()
              disposition = part.get_content_disposition() or ""

              if "attachment" in disposition:
                  audit_notes.append(f"Attachment detected: {part.get_filename()}")
                  continue

              if content_type == "text/plain":
                  body_text = decode_mime_payload(part)
                  quoted_segments = extract_quoted_segments(body_text)

                  for depth, seg_text in quoted_segments:
                      seg_type = f"body" if depth == 0 else f"quoted_depth_{depth}"
                      # Quoted content from external correspondents gets higher weight
                      depth_weight = 1.0 if depth == 0 else min(2.0, 1.0 + depth * 0.3)
                      seg_result = classify_segment(
                          seg_type, seg_text, flag_threshold, block_threshold,
                          depth_weight=depth_weight
                      )
                      segment_results.append(seg_result)

              elif content_type == "text/html":
                  html_body = decode_mime_payload(part)
                  visible_text = strip_css_hidden(html_body)
                  seg_result = classify_segment(
                      "html_body", visible_text, flag_threshold, block_threshold
                  )
                  segment_results.append(seg_result)

                  # Also check raw HTML for hidden content injection
                  all_text = re.sub(r"<[^>]+>", " ", html_body)
                  all_text_clean = normalise_text(html_mod.unescape(all_text))
                  if score_injection(all_text_clean) > score_injection(visible_text):
                      audit_notes.append("Hidden content detected: raw HTML score > visible text score")
                      hidden_seg = classify_segment(
                          "html_hidden_content", all_text_clean,
                          flag_threshold, block_threshold
                      )
                      segment_results.append(hidden_seg)

              elif content_type == "text/calendar":
                  cal_text = decode_mime_payload(part)
                  for cal_field in ("SUMMARY", "DESCRIPTION", "LOCATION", "COMMENT"):
                      pattern = re.compile(
                          rf"^{cal_field}[;:](.*)$", re.MULTILINE | re.IGNORECASE
                      )
                      for m in pattern.finditer(cal_text):
                          field_val = m.group(1).strip()
                          if field_val:
                              seg_result = classify_segment(
                                  f"calendar_{cal_field.lower()}",
                                  field_val, flag_threshold, block_threshold
                              )
                              segment_results.append(seg_result)

          if not segment_results:
              audit_notes.append("No classifiable content found in email")

          # Consolidated decision: worst single segment determines email decision
          max_score = max((s.injection_score for s in segment_results), default=0.0)

          if max_score >= block_threshold:
              email_decision = "BLOCK"
          elif max_score >= flag_threshold:
              email_decision = "FLAG"
          else:
              email_decision = "ALLOW"

          action_risk = check_action_escalation_risk(
              [s for s in segment_results if s.decision != "ALLOW"]
          )

          return EmailClassificationResult(
              message_id=message_id,
              sender=sender,
              subject=subject,
              segment_results=segment_results,
              email_injection_score=round(max_score, 4),
              email_decision=email_decision,
              action_escalation_risk=action_risk,
              audit_notes=audit_notes,
          )


      def print_result(r: EmailClassificationResult) -> None:
          esc = " [ACTION ESCALATION RISK]" if r.action_escalation_risk else ""
          print(f"\n[{r.email_decision}] score={r.email_injection_score:.3f}{esc}")
          print(f"  From   : {r.sender[:60]}")
          print(f"  Subject: {r.subject[:60]}")
          for seg in r.segment_results:
              if seg.decision != "ALLOW":
                  print(f"  [{seg.decision}] {seg.segment_type}: score={seg.injection_score:.3f}")
                  print(f"          preview: {seg.content_preview[:60]}")
              else:
                  print(f"  [ALLOW] {seg.segment_type}: score={seg.injection_score:.3f}")
          if r.audit_notes:
              for note in r.audit_notes:
                  print(f"  [NOTE] {note}")


      def run_demo() -> None:
          # Test email 1: plain text body injection
          email1 = (
              "From: external@adversary.com\n"
              "To: assistant@company.com\n"
              "Subject: Invoice INV-2024-0042\n"
              "Message-ID: <test1@demo>\n"
              "Content-Type: text/plain\n\n"
