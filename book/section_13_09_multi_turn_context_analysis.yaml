section_overview:
  one_line_summary: 'The multi-turn attack defeats per-turn classification by construction -- every turn passes, the trajectory is the attack; Section 13.09 builds the trajectory features, sequence modelling over the turn stream, the per-session threat accumulator, and the Crescendo-family detector that lift detection from the turn to the full session.'
  why_this_section_exists: |
    Section 13.01 named the multi-turn jailbreak as the canonical session-family attack, and 13.02 built
    the session model and trajectory features it requires. Section 13.09 builds the detector itself.
    The multi-turn attack is important enough to warrant its own section because it defeats per-turn
    classification not by accident but by construction. The adversary designs each turn to be benign
    enough to pass the per-turn classifier, and assembles the attack from the trajectory across turns.
    No amount of improvement to the per-turn classifier closes this gap, because the per-turn classifier
    is scoring the wrong unit: each turn really is benign, and the attack really is the path.

    The attack comes in recognisable forms. The accumulation attack assembles a harmful capability from
    individually benign pieces -- each turn extracts one innocuous fragment, and only the assembled
    whole is harmful. The escalation attack ratchets a conversation steadily toward a constraint
    boundary, each turn moving a little further than the last, never far enough in one step to trigger a
    per-turn detector. Context-window manipulation fills the context with material that pushes the
    system's constraints out of the model's effective attention. Published families -- Crescendo,
    many-shot -- have characteristic behavioural signatures that recur across instances.

    Detecting these requires reading the session as a sequence, not a set of independent turns. The
    section applies sequence modelling over the turn stream -- the Chapter 12 GRU detector lifted from
    the request level to the session level -- and the trajectory features from 13.02, and it maintains a
    per-session threat accumulator that integrates risk across turns so that a conversation accumulating
    many small risk increments crosses a threshold that no single turn reaches. Paired with the self-
    consistency monitor of 13.06, which watches the model's response to the escalation, the section can
    observe a multi-turn injection and its success together.
  position_in_chapter: |
    Section 13.09 is the second session-family section, building directly on the session model and
    trajectory features of 13.02 and the Chapter 12 GRU sequence detector. It pairs with the self-
    consistency monitor of 13.06: where 13.06 watched the model's output for the refusal reversal that
    signals success, 13.09 watches the user's input trajectory for the escalation that drives it, and
    together they observe the multi-turn injection and its outcome. Its per-session threat signal feeds
    the entity profiler of 13.10 and the gateway integration of 13.11. It is the section that completes
    the session family's coverage of the gradual attack.

