prose_content:

  part_1:
    title: 'Defeating Per-Turn Classification by Construction'
    body: |
      The multi-turn attack is the cleanest demonstration in the book of an attack designed around the
      detector. A per-turn classifier scores each turn of a conversation independently and blocks the
      turns it judges to be attacks. The multi-turn adversary's entire strategy is to ensure that no
      individual turn is judged an attack, while the conversation as a whole achieves the attack's goal.
      Each turn is crafted to be benign enough to pass -- a reasonable question, an innocuous request, a
      small step -- and the attack is assembled from the sequence of these passing turns.

      This is defeat by construction, not by classifier weakness. It is tempting to respond to a missed
      multi-turn attack by trying to make the per-turn classifier stricter, but this does not work and
      cannot work. The individual turns of a well-designed multi-turn attack are genuinely benign in
      isolation: each one, considered alone, is a request a legitimate user might reasonably make. A per-
      turn classifier strict enough to flag them would flag enormous numbers of legitimate single turns
      too, because it would be flagging benign content. The per-turn classifier is scoring the wrong unit.
      The attack does not live in any turn; it lives in the relationship between turns -- the trajectory --
      and a detector that scores turns independently has thrown away exactly the information that contains
      the attack.

      The consequence is that multi-turn detection must operate at the session level, on the sequence of
      turns, reading the trajectory that per-turn scoring discards. This is the session family's reason
      for existing, and the multi-turn attack is its primary target. The session model of 13.02 produced
      the trajectory features; this section builds the detector that reads them. The shift from per-turn
      to per-session is not an enhancement of per-turn detection -- it is a different detector operating on
      a different unit, necessary because the attack was designed to be invisible to the per-turn unit.

  part_2:
    title: 'Accumulation and Escalation: Two Multi-Turn Signatures'
    body: |
      Multi-turn attacks fall into two broad signatures that differ in how the trajectory carries the
      attack.

      The accumulation attack assembles a harmful whole from individually harmless parts. The adversary
      extracts one innocuous fragment per turn -- a piece of information, a step of a process, a component
      of a capability -- each of which is benign on its own and would be provided to any legitimate user.
      Only the assembled collection is harmful. The signature is not escalation in any single dimension
      but breadth of coverage of a harmful topic assembled across turns: the conversation systematically
      gathers the pieces of something dangerous, no piece alarming, the assembly the attack. Accumulation
      resembles the coverage-pattern signature of 13.07 but at the session scale -- a methodical gathering
      of fragments rather than a sweep of an input space.

      The escalation attack ratchets toward a constraint boundary. Each turn moves the conversation a
      little further toward a harmful objective than the last, in a steady directed progression. The
      signature is the trajectory's directedness and monotonicity: a conversation that begins benign and
      moves consistently toward a sensitive target, each step small, the cumulative movement large. This
      is the topic-drift signature of 13.02 -- monotonic, accumulating drift from the benign opening --
      now recognised as the escalation attack. The escalation attack is what the topic-drift feature was
      built to catch, and the score-slope trajectory feature captures it from the classifier-score side:
      a session whose per-turn scores climb steadily is escalating even when no single score crosses the
      per-turn threshold.

      The two signatures often combine in a real attack -- an adversary both escalates the framing and
      accumulates the fragments -- and the detector must catch both. Escalation is caught by the
      directedness of the trajectory (score slope, topic-drift velocity, monotonicity); accumulation is
      caught by the breadth of harmful-topic coverage assembled across the session. Both are session-level
      properties invisible to per-turn scoring, and both feed the per-session threat accumulator that
      integrates them into a single session threat signal.

  part_3:
    title: 'Context-Window Manipulation: Pushing Constraints Out of Attention'
    body: |
      A third multi-turn technique exploits the mechanics of the context window rather than the semantics
      of the conversation. The model's system prompt and safety constraints occupy part of its context,
      and the model's effective attention to them can be diluted by what else is in the context. Context-
      window manipulation fills the conversation with material -- long turns, many turns, padding,
      injected examples -- that pushes the system constraints toward the edge of the context or dilutes
      their influence on the model's attention, so that by late in the conversation the model is attending
      more to the accumulated conversation than to its original instructions.

      The many-shot variant is the clearest example: the adversary fills the context with many examples of
      the model complying with progressively less acceptable requests, so that the accumulated pattern of
      compliance in the context steers the model toward continuing to comply. Each example turn is
      individually mild, but the accumulated weight of dozens of compliance examples in the context shifts
      the model's behaviour. This is a context-level attack -- its signal is the volume and pattern of the
      accumulated context, not the content of any single turn -- and it has a behavioural signature the
      session detector can read: an unusually long or example-dense context combined with a trajectory of
      increasingly permissive model responses.

      Detecting context-window manipulation combines a structural signal with the trajectory signal. The
      structural signal is the context's size and composition: an abnormally long session, an unusual
      density of example-like turns, a context that has grown far beyond the task's apparent needs. The
      trajectory signal is the model's response pattern: a refusal rate that declines as the context fills,
      a persona that drifts, the self-consistency signals of 13.06. A session that is both structurally
      anomalous in its context accumulation and exhibits a declining-refusal trajectory is exhibiting the
      context-manipulation signature, and the combination is far more specific than either signal alone --
      a long session is not inherently an attack, and a single permissive response is not inherently a
      compromise, but a long context-dense session with a declining-refusal trajectory is the many-shot
      signature.

  part_4:
    title: 'Sequence Modelling Over the Turn Stream'
    body: |
      The natural model for a session, which is a sequence of turns, is a sequence model, and the Chapter
      12 GRU detector is the tool, lifted from the request level to the session level. In Chapter 12 the
      GRU operated over a sequence within a single request or a short window; here it operates over the
      sequence of turns in a session, consuming the per-turn feature vectors -- the per-track classifier
      scores, the trajectory features, the topic-drift values -- and producing a session-level score that
      reflects the whole trajectory rather than any single turn.

      The sequence model is the right tool because the multi-turn attack is fundamentally a sequential
      pattern: the order of turns matters, the progression matters, and the relationship between a turn and
      the turns before it carries the signal. A model that consumes the turns in order and maintains a
      hidden state across them can represent the trajectory -- the escalation, the accumulation, the
      declining refusals -- in a way that a model treating the turns as an unordered set cannot. The GRU's
      hidden state is, in effect, a learned summary of the session so far, updated with each turn, and the
      session score it produces reflects the developing trajectory.

      Lifting the GRU to the session level inherits the streaming requirement from 13.02 and 13.04: the
      model scores the session incrementally as each turn arrives, updating its hidden state with the new
      turn and producing an updated session score, rather than waiting for the session to complete and
      scoring it as a whole. This lets the multi-turn detector flag an escalating session mid-escalation,
      before the attack completes, which is the operational point -- detecting the gradual attack only
      after it succeeds is too late. The incremental session score is one input to the per-session threat
      accumulator, alongside the explicit trajectory features and the structural context signals, and the
      sequence model and the explicit features are complementary: the explicit features encode known
      escalation signatures, and the learned model captures patterns the explicit features miss.

  part_5:
    title: 'Published Families: Crescendo and Many-Shot Signatures'
    body: |
      The multi-turn attack space is not unstructured; published jailbreak families have characteristic
      behavioural signatures that recur across instances, and recognising these signatures is a high-value
      complement to the general trajectory detection. Two families are particularly well-documented.

      The Crescendo family is the escalation archetype: a conversation that begins with a benign request on
      a topic and escalates step by step toward a harmful objective in the same topic, each turn building
      on the model's previous answer to push slightly further. Its behavioural signature is a steadily
      rising score slope and a monotonic topic drift in a consistent direction, with the model's own prior
      responses being used as the foothold for each next step. The refusal-then-retry pattern is often
      present -- when the model refuses, the adversary rephrases and retries from a slightly different
      angle, producing a refusal followed by a continued push. A detector tuned for the Crescendo signature
      watches for the combination of monotonic directed drift, rising score slope, and refusal-retry
      sequences.

      The many-shot family is the context-manipulation archetype described in Part 3: filling the context
      with many examples of escalating compliance to steer the model. Its signature is structural -- an
      example-dense, unusually long context -- combined with a declining model refusal rate as the context
      fills. A detector tuned for the many-shot signature watches for the context-density and length
      anomaly together with the declining-refusal trajectory.

      Detecting these families by signature complements the general sequence model and accumulator the same
      way signature detection complemented ML detection in Chapter 11: the signatures catch the known
      families with high precision and a clear explanation, while the general trajectory detection and the
      sequence model catch the novel and the variant attacks that do not match a known signature. A multi-
      turn detector uses both -- the family signatures for the known attacks and the general trajectory
      analysis for the rest -- and the family signatures also serve as labelled training examples that
      sharpen the general detector. The published families are a moving target as new ones are discovered,
      so the signature set is maintained and extended, but the general trajectory detection provides the
      coverage that does not depend on having a signature for every family.

  part_6:
    title: 'The Per-Session Threat Accumulator and Pairing with Self-Consistency'
    body: |
      The unifying mechanism of multi-turn detection is the per-session threat accumulator: a running
      integral of risk across the turns of a session. Each turn contributes a small increment of risk --
      from its trajectory features, its sequence-model score, its structural context signal -- and the
      accumulator sums these increments across the session. A conversation that accumulates many small risk
      increments crosses the accumulator's threshold even though no single turn's risk is large, which is
      precisely the multi-turn attack: many benign-looking turns whose cumulative risk is the attack. The
      accumulator is the session-level analogue of the cumulative-volume feature from 13.07 -- it catches
      the attack that never spikes but grinds steadily upward.

      The accumulator is designed to distinguish the directed adversary from the persistent legitimate
      user, which is the central false-positive challenge of multi-turn detection. A legitimate user can
      have a long, persistent session -- many turns, sustained engagement -- without it being an attack.
      The accumulator must not flag length alone. The discriminator is directedness: the legitimate long
      session wanders, returns to topics, and does not progress monotonically toward a constraint boundary,
      so its risk increments are small and non-cumulative and the accumulator stays low. The directed
      adversary's session progresses consistently toward a target, so its increments accumulate in a
      consistent direction and the accumulator climbs. The accumulator integrates the directed risk, not
      the raw activity, so a persistent but undirected legitimate session does not cross the threshold while
      a directed escalation does -- the same distinction the topic-drift monotonicity made in 13.02, now
      integrated across the whole session.

      The strongest multi-turn signal comes from pairing the input-side accumulator with the output-side
      self-consistency monitor of 13.06. The accumulator watches the user's escalating trajectory; the
      self-consistency monitor watches the model's response to it, flagging the refusal reversal where the
      model complies with a class it refused earlier. A session where the user's threat accumulator climbs
      and the model's refusals reverse is a near-unambiguous successful multi-turn injection: the input
      side shows the attack escalating and the output side shows it succeeding, observed together. This
      pairing is the behavioural layer's strongest evidence for a multi-turn injection, and it is the
      session-family contribution to the gateway integration of 13.11. The per-session threat signal --
      the accumulator value, the sequence-model score, the family-signature matches, paired with the self-
      consistency signal -- feeds the entity profiler of 13.10, where a session that reached a high threat
      accumulator elevates the entity's persistent risk, and the gateway of 13.11, where it becomes part of
      the behavioural verdict and can trigger a session intervention mid-escalation.

