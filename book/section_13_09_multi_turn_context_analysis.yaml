deliverables:

  deliverable_1:
    title: 'Trajectory Feature Extractor'
    filename: 'trajectory_feature_extractor.py'
    description: 'Extracts the session trajectory features that capture multi-turn escalation: classifier-score slope, topic-drift velocity, refusal-then-retry rate, and monotonicity of the drift. Builds on the session model of 13.02. Implements the trajectory features from Section 13.09 Part 2.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # trajectory_feature_extractor.py
      # Section 13.09: Multi-Turn Trajectory Feature Extractor
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class Turn:
          jailbreak_score: float
          topic_drift: float      # cosine distance from session opening anchor (13.02)
          refused: bool


      def _slope(values: List[float]) -> float:
          n = len(values)
          if n < 2:
              return 0.0
          xs = list(range(n))
          mx = sum(xs) / n
          my = sum(values) / n
          num = sum((x - mx) * (y - my) for x, y in zip(xs, values))
          den = sum((x - mx) ** 2 for x in xs) or 1.0
          return num / den


      @dataclass
      class TrajectoryFeatures:
          score_slope: float
          drift_velocity: float
          drift_monotonic_fraction: float
          refusal_then_retry_rate: float
          directed_escalation: bool


      def extract_trajectory(turns: List[Turn]) -> TrajectoryFeatures:
          n = len(turns)
          if n < 2:
              return TrajectoryFeatures(0.0, 0.0, 0.0, 0.0, False)

          scores = [t.jailbreak_score for t in turns]
          drifts = [t.topic_drift for t in turns]

          score_slope = _slope(scores)
          drift_velocity = _slope(drifts)
          increases = sum(1 for i in range(1, n) if drifts[i] >= drifts[i - 1])
          drift_monotonic = increases / (n - 1)

          retry = 0
          for i in range(1, n):
              if turns[i - 1].refused and not turns[i].refused:
                  retry += 1
          retry_rate = retry / n

          # Directed escalation: rising scores AND rising, mostly-monotonic drift
          directed = score_slope > 0.02 and drift_velocity > 0.01 and drift_monotonic >= 0.7

          return TrajectoryFeatures(
              round(score_slope, 4), round(drift_velocity, 4),
              round(drift_monotonic, 4), round(retry_rate, 4), directed,
          )


      if __name__ == '__main__':
          crescendo = [
              Turn(0.10, 0.00, False),
              Turn(0.20, 0.12, False),
              Turn(0.34, 0.25, True),
              Turn(0.30, 0.30, False),  # refusal then retry
              Turn(0.48, 0.42, False),
              Turn(0.61, 0.55, False),
          ]
          benign = [
              Turn(0.08, 0.00, False),
              Turn(0.06, 0.30, False),  # jumps topic (benign switch) then stable
              Turn(0.07, 0.31, False),
              Turn(0.05, 0.10, False),  # wanders back
          ]
          print('Crescendo session:', extract_trajectory(crescendo))
          print('Benign session:   ', extract_trajectory(benign))
          print('The crescendo shows directed escalation; the benign wanders.')

  deliverable_2:
    title: 'Session Sequence Scorer'
    filename: 'session_sequence_scorer.py'
    description: 'Scores a session trajectory with a lightweight recurrent sequence model over the turn stream, maintaining a hidden state updated incrementally per turn -- the Chapter 12 GRU detector lifted to the session level. Implements the sequence modelling from Section 13.09 Part 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; a small deterministic GRU-style recurrence is implemented without ML frameworks to keep the example runnable, standing in for the trained Chapter 12 GRU'
    code: |
      # session_sequence_scorer.py
      # Section 13.09: Session Sequence Scorer (GRU lifted to session level)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      import math
      from dataclasses import dataclass, field
      from typing import List


      def _sigmoid(x: float) -> float:
          if x < -60:
              return 0.0
          if x > 60:
              return 1.0
          return 1.0 / (1.0 + math.exp(-x))


      @dataclass
      class SessionSequenceScorer:
          # A minimal GRU-style scalar recurrence standing in for the trained
          # Chapter 12 GRU. Production uses the learned weights from Section 12.06.
          w_update: float = 1.2
          w_reset: float = 0.8
          w_candidate: float = 1.5
          hidden: float = 0.0

          def reset(self) -> None:
              self.hidden = 0.0

          def step(self, turn_risk: float) -> float:
              # turn_risk is a per-turn risk scalar in [0, 1]
              z = _sigmoid(self.w_update * turn_risk - 0.5)        # update gate
              r = _sigmoid(self.w_reset * turn_risk - 0.5)         # reset gate
              h_candidate = math.tanh(self.w_candidate * turn_risk + r * self.hidden)
              self.hidden = (1 - z) * self.hidden + z * h_candidate
              # session score is the squashed hidden state
              return round(_sigmoid(4 * (self.hidden - 0.5)), 4)


      def score_session(turn_risks: List[float]) -> List[float]:
          scorer = SessionSequenceScorer()
          return [scorer.step(r) for r in turn_risks]


      if __name__ == '__main__':
          # Escalating session: per-turn risk creeps up
          escalating = [0.1, 0.2, 0.3, 0.45, 0.6, 0.72]
          # Benign session: low, flat per-turn risk
          benign = [0.08, 0.05, 0.09, 0.07, 0.06]

          esc_scores = score_session(escalating)
          ben_scores = score_session(benign)
          print('Escalating session scores per turn:', esc_scores)
          print('Benign session scores per turn:    ', ben_scores)
          print('The recurrent state accumulates the escalation, so the session score')
          print('climbs across turns even though no single turn risk is extreme.')

  deliverable_3:
    title: 'Session Threat Accumulator'
    filename: 'session_threat_accumulator.py'
    description: 'Integrates per-turn risk across a session into a running threat accumulator that crosses a threshold when many small directed increments accumulate, while a long undirected legitimate session stays below threshold. Implements the per-session threat accumulator from Section 13.09 Part 6.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # session_threat_accumulator.py
      # Section 13.09: Per-Session Threat Accumulator
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class TurnRisk:
          turn_risk: float        # per-turn risk in [0, 1]
          drift_increasing: bool  # is the trajectory moving in a consistent direction


      @dataclass
      class AccumulatorState:
          value: float = 0.0
          fired: bool = False
          fired_at_turn: Optional[int] = None


      @dataclass
      class SessionThreatAccumulator:
          threshold: float = 2.5
          decay: float = 0.9              # undirected risk decays; directed accumulates
          directed_gain: float = 1.0
          undirected_gain: float = 0.3

          def run(self, turns: List[TurnRisk]) -> AccumulatorState:
              st = AccumulatorState()
              for i, t in enumerate(turns):
                  if t.drift_increasing:
                      # directed risk accumulates without decay
                      st.value += self.directed_gain * t.turn_risk
                  else:
                      # undirected risk is decayed -- a wandering session does not accumulate
                      st.value = self.decay * st.value + self.undirected_gain * t.turn_risk
                  if not st.fired and st.value >= self.threshold:
                      st.fired = True
                      st.fired_at_turn = i
              st.value = round(st.value, 3)
              return st


      if __name__ == '__main__':
          acc = SessionThreatAccumulator(threshold=2.5)

          # Directed escalation: small risks, all in a consistent direction
          directed = [TurnRisk(0.3, True) for _ in range(10)]
          # Persistent but undirected legitimate session: similar risks, wandering
          undirected = [TurnRisk(0.3, False) for _ in range(10)]

          d = acc.run(directed)
          u = acc.run(undirected)
          print(f'Directed escalation:  accumulator={d.value}, fired={d.fired} at turn {d.fired_at_turn}')
          print(f'Undirected long session: accumulator={u.value}, fired={u.fired}')
          print('Directed small increments accumulate to the threshold; the undirected')
          print('long session decays and never crosses it -- length alone is not flagged.')

  deliverable_4:
    title: 'Crescendo and Many-Shot Pattern Detector'
    filename: 'crescendo_pattern_detector.py'
    description: 'Detects the behavioural signatures of the published Crescendo and many-shot multi-turn families: monotonic directed drift with rising slope and refusal-retry for Crescendo, and example-dense long context with declining refusal for many-shot. Implements the family-signature detection from Section 13.09 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # crescendo_pattern_detector.py
      # Section 13.09: Crescendo and Many-Shot Family Detector
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Optional


      @dataclass
      class SessionSummary:
          score_slope: float
          drift_velocity: float
          drift_monotonic_fraction: float
          refusal_then_retry_rate: float
          turn_count: int
          example_density: float    # fraction of turns that look like provided examples
          refusal_trajectory_slope: float  # negative = refusals declining over turns


      @dataclass
      class FamilyMatch:
          family: str
          matched: bool
          detail: str


      def detect_crescendo(s: SessionSummary) -> FamilyMatch:
          matched = (
              s.score_slope > 0.03
              and s.drift_velocity > 0.01
              and s.drift_monotonic_fraction >= 0.7
              and s.refusal_then_retry_rate > 0.0
          )
          return FamilyMatch(
              'Crescendo', matched,
              f'slope={s.score_slope}, drift_vel={s.drift_velocity}, '
              f'monotonic={s.drift_monotonic_fraction}, retry={s.refusal_then_retry_rate}',
          )


      def detect_many_shot(s: SessionSummary) -> FamilyMatch:
          matched = (
              s.turn_count >= 20
              and s.example_density > 0.5
              and s.refusal_trajectory_slope < -0.01
          )
          return FamilyMatch(
              'Many-shot', matched,
              f'turns={s.turn_count}, example_density={s.example_density}, '
              f'refusal_slope={s.refusal_trajectory_slope}',
          )


      def detect_families(s: SessionSummary) -> List[FamilyMatch]:
          return [detect_crescendo(s), detect_many_shot(s)]


      if __name__ == '__main__':
          crescendo_session = SessionSummary(
              score_slope=0.09, drift_velocity=0.08, drift_monotonic_fraction=0.85,
              refusal_then_retry_rate=0.2, turn_count=8, example_density=0.0,
              refusal_trajectory_slope=0.0,
          )
          many_shot_session = SessionSummary(
              score_slope=0.01, drift_velocity=0.0, drift_monotonic_fraction=0.4,
              refusal_then_retry_rate=0.0, turn_count=40, example_density=0.8,
              refusal_trajectory_slope=-0.03,
          )
          benign_session = SessionSummary(
              score_slope=0.0, drift_velocity=0.0, drift_monotonic_fraction=0.4,
              refusal_then_retry_rate=0.0, turn_count=6, example_density=0.0,
              refusal_trajectory_slope=0.0,
          )

          for name, sess in (('Crescendo', crescendo_session), ('Many-shot', many_shot_session), ('Benign', benign_session)):
              print(f'\n{name} session:')
              for m in detect_families(sess):
                  flag = 'MATCH' if m.matched else 'no'
                  print(f'  {m.family:<12} {flag}: {m.detail}')

common_mistakes:

  mistake_1:
    description: 'Responding to a missed multi-turn attack by making the per-turn classifier stricter'
    why_it_happens: |
      When a multi-turn attack gets through, the per-turn classifier is the detector that was watching, so
      it looks like the classifier failed and needs to be stronger. Tightening the per-turn classifier is
      the intuitive fix -- make it catch more, and it will catch the multi-turn turns too.
    consequence: |
      The individual turns of a well-designed multi-turn attack are genuinely benign in isolation -- each
      is a request a legitimate user might make. A per-turn classifier strict enough to flag them flags
      enormous numbers of legitimate single turns too, because it is flagging benign content. The stricter
      classifier raises false positives on legitimate traffic without catching the multi-turn attack, which
      lives in the trajectory the per-turn classifier never sees. The fix targets the wrong unit.
    correct_approach: |
      Detect the multi-turn attack at the session level, on the trajectory across turns, with trajectory
      features, a sequence model over the turn stream, and a threat accumulator -- not by tightening the
      per-turn classifier. The attack is the path, so the detector must read the path. trajectory_feature_extractor.py
      and session_sequence_scorer.py operate on the session sequence.

  mistake_2:
    description: 'Flagging long or persistent sessions as attacks, generating false positives on legitimate heavy users'
    why_it_happens: |
      Multi-turn attacks tend to be long, so session length correlates with attack in the obvious
      examples, and flagging long sessions seems like a reasonable heuristic. It is simple -- just count
      turns -- and catches the long attacks.
    consequence: |
      Legitimate users have long, persistent sessions all the time: sustained work, deep exploration,
      extended troubleshooting. Flagging length alone floods the alert stream with false positives on
      engaged legitimate users and trains analysts to ignore the multi-turn alert, while a short, efficient
      multi-turn attack that reaches its goal in few turns is missed because it is not long. Length is not
      the signal.
    correct_approach: |
      Discriminate by the directedness of the trajectory, not its length. A legitimate long session wanders
      and returns to topics, so its risk increments are small and non-cumulative; a directed adversary
      progresses consistently toward a target, so its increments accumulate. The threat accumulator
      integrates directed risk and decays undirected risk, so a persistent legitimate session stays below
      threshold while a directed escalation crosses it. session_threat_accumulator.py implements this
      discrimination.

  mistake_3:
    description: 'Scoring the session only after it completes, detecting the multi-turn attack too late to intervene'
    why_it_happens: |
      Scoring a complete session is simpler than streaming: all the turns are available, the trajectory is
      fully formed, and the features are easy to compute over the finished conversation. Offline evaluation
      naturally works on complete sessions, and reusing that approach in production is the path of least
      resistance.
    consequence: |
      A multi-turn attack scored only after the session completes is detected after it has already
      succeeded -- the harmful output was produced, the capability assembled, the constraint breached,
      before the detector ran. Detecting the gradual attack only at session end is detecting it too late to
      prevent the harm, which defeats the purpose of catching the gradual attack at all.
    correct_approach: |
      Score the session incrementally as each turn arrives, updating the sequence-model hidden state and the
      threat accumulator per turn, so an escalating session is flagged mid-escalation before the attack
      completes and a session intervention can be triggered. session_sequence_scorer.py and
      session_threat_accumulator.py update incrementally per turn for exactly this.

  mistake_4:
    description: 'Relying only on family signatures and missing novel multi-turn attacks that do not match a known family'
    why_it_happens: |
      The published families -- Crescendo, many-shot -- are well-documented with clear signatures, and
      detecting them gives concrete, explainable catches. Once the family signatures are in place and
      catching the known attacks, multi-turn detection can feel complete.
    consequence: |
      The multi-turn attack space is open and evolving, and adversaries develop novel techniques that do
      not match any published family signature. A detector relying only on family signatures catches the
      known families and is blind to the novel and variant attacks, which are exactly the ones a
      sophisticated adversary will use precisely because they evade the known signatures. The signature set
      is always behind the attack frontier.
    correct_approach: |
      Use family signatures for the known attacks alongside general trajectory detection -- the sequence
      model and the threat accumulator -- for the novel and variant attacks that no signature covers, the
      same way signature detection complemented ML detection in Chapter 11. The signatures give high-
      precision catches on known families; the general detection provides coverage that does not depend on
      having a signature. crescendo_pattern_detector.py handles the families while the sequence scorer and
      accumulator provide general coverage.

  mistake_5:
    description: 'Watching only the input trajectory and ignoring the model output response to it, missing the success confirmation'
    why_it_happens: |
      Multi-turn detection is naturally framed as watching the user's escalating requests, so the input
      trajectory is the obvious focus. The model's responses seem like the output side's concern, separate
      from detecting the attack in the input.
    consequence: |
      The input trajectory shows the attack escalating but not whether it succeeded. A session where the
      user escalates is suspicious, but a session where the user escalates and the model's refusals reverse
      is a confirmed successful multi-turn injection. Watching only the input misses the success
      confirmation that the output side provides, leaving the detector unable to distinguish an escalation
      attempt that the model resisted from one that succeeded -- a large difference in severity.
    correct_approach: |
      Pair the input-side threat accumulator with the output-side self-consistency monitor of 13.06: the
      accumulator shows the escalation, the self-consistency monitor shows the refusal reversal, and a
      session where both fire is a near-unambiguous successful multi-turn injection. This pairing is the
      behavioural layer's strongest multi-turn evidence and feeds the gateway of 13.11.

section_summary:

  compact: |
    The multi-turn attack defeats per-turn classification by construction: the adversary crafts each turn
    to be benign enough to pass and assembles the attack from the trajectory across turns, so improving the
    per-turn classifier cannot help -- it is scoring the wrong unit. Section 13.09 detects the attack at the
    session level. Two signatures recur: accumulation assembles a harmful whole from individually benign
    fragments, caught by the breadth of harmful-topic coverage across turns, and escalation ratchets toward
    a constraint boundary, caught by monotonic topic drift and a rising score slope. Context-window
    manipulation, including the many-shot family, dilutes the model's constraints with accumulated context,
    caught by context length and density together with a declining-refusal trajectory. A sequence model --
    the Chapter 12 GRU lifted to the session level -- scores the turn stream incrementally, complementing the
    explicit trajectory features, and the published Crescendo and many-shot family signatures give high-
    precision catches on the known attacks while the general detection covers the novel ones. The unifying
    mechanism is the per-session threat accumulator, which integrates directed risk across turns so many
    small directed increments cross a threshold no single turn reaches, while decaying the undirected risk of
    a long legitimate session so length alone is not flagged. Paired with the self-consistency monitor of
    13.06, the input-side accumulator and the output-side refusal reversal together give the behavioural
    layer's strongest evidence of a successful multi-turn injection, feeding the entity profiler and the
    gateway with the ability to intervene mid-escalation.

  key_takeaways:
    - 'The multi-turn attack defeats per-turn classification by construction -- each turn is genuinely benign and the attack is the trajectory -- so a stricter per-turn classifier cannot close the gap; detection must operate at the session level'
    - 'Accumulation assembles harm from benign fragments (caught by harmful-topic coverage breadth) and escalation ratchets toward a boundary (caught by monotonic topic drift and rising score slope), and the two often combine'
    - 'A sequence model -- the Chapter 12 GRU lifted to the session level -- scores the turn stream incrementally and complements the explicit trajectory features, capturing patterns the explicit features miss'
    - 'The per-session threat accumulator integrates directed risk across turns so many small increments cross a threshold no single turn reaches, while decaying undirected risk so a long legitimate session is not flagged by length alone'
    - 'Family signatures (Crescendo, many-shot) give high-precision catches on known attacks while the general sequence model and accumulator cover the novel and variant attacks that no signature matches'
    - 'Pairing the input-side threat accumulator with the output-side self-consistency refusal-reversal signal of 13.06 gives the strongest evidence of a successful multi-turn injection -- the escalation and its success observed together'

preview_section_13_10:
  title: 'Section 13.10: User Behaviour Profiling -- Entity Fingerprints and Persistent Risk Scoring'
  summary: |
    Section 13.10 builds the persistent entity profile that makes a requester history a first-class input to
    every verdict, turning the per-session and per-window signals of the preceding sections into a durable
    entity-level risk score. It builds entity-level behavioural fingerprinting -- the stable signature of how
    an entity normally uses the service -- and a persistent profile schema of aggregated baselines, historical
    risk events, and the fingerprint. It addresses cross-session risk scoring that integrates signals from
    many sessions into one persistent score, risk-score decay and reinforcement so a clean entity recovers and
    a repeat offender accumulates, account-compromise detection through fingerprint divergence where a
    legitimate account suddenly behaves unlike itself, and entity resolution that links the same actor across
    credentials, sessions, and sources. The entity risk score it produces is read inline by the smart rate
    limiter of 13.08 and the gateway of 13.11, and it is the bridge from session-level detection to the graph-
    level detection of 13.11.

