section_overview:
  one_line_summary: >
    Single-event Sigma rules detect individual signals; correlation rules converge those
    signals into campaign-level detections that no single track can produce alone —
    a Track 1 injection followed by Track 5 query acceleration within ten minutes is a
    confirmed extraction attempt, invisible to either track working independently.
  why_this_section_exists: |
    Section 11.06 built fluency in single-event Sigma rules: one log event, one
    detection condition, one alert. The seven-track gateway runs seven such rules on
    every request. But the most dangerous AI attacks are not single-event affairs.
    Model extraction is a campaign: thousands of queries across many sessions, each
    individually innocuous. A full jailbreak with exfiltration is a sequence: probe
    the model's boundaries, find a jailbreak that works, extract the target content,
    confirm extraction in the response. Single-event rules see individual frames of
    this film; correlation rules see the plot.

    Section 11.07 introduces the three advanced Sigma patterns that transform the
    gateway from a single-event detector into a campaign-aware detection system:
    aggregation over time windows (rate-based abuse at scale), correlation rules
    (joining alerts from multiple tracks into a unified campaign alert), and sequence
    rules (ordered event chains within a session window). It also addresses exception
    management — the allowlist machinery that prevents known-good automation from
    flooding the correlation layer with false positives — and establishes the Sigma
    rule lifecycle that governs the full portfolio from draft to retirement.
  position_in_chapter: >
    Section 11.07 is the second half of the Sigma pair. Section 11.06 established the
    rule format and single-event patterns; Section 11.07 extends to multi-event and
    cross-track patterns. Together they complete the Sigma portfolio that Section 11.08
    uses as the primary evidence for the detection maturity assessment.

learning_objectives:
  - 'Write time-windowed aggregation conditions using count, min, max, avg, and sum, specifying window duration and group-by field'
  - 'Author a Sigma correlation rule that joins alerts from two or more gateway tracks into a campaign-level detection'
  - 'Construct a sequence rule for the probe → inject → exfiltrate pattern within a defined session window'
  - 'Implement allowlist exception management in a Sigma rule using filter selections and not conditions'
  - 'Map the Sigma rule lifecycle stages (draft → review → testing → production → deprecated) to CI pipeline behaviours'
  - 'Produce a cross-reference of all seven-track gateway Sigma rules as a unified portfolio inventory'

prerequisites:
