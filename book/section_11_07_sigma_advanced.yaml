deliverables:

  deliverable_1:
    id: 'D11.07.1'
    filename: 'sigma_correlation_engine.py'
    description: >
      Multi-event correlation engine that joins seven-track gateway alerts into
      campaign-level detections. Implements the three gateway correlation patterns
      (injection-extraction, jailbreak-adversarial, semantic near-miss) and the
      sequence rule (probe-inject-exfiltrate). Processes an alert stream and emits
      campaign-level alerts when correlation conditions are met.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
      - 'collections (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''sigma_correlation_engine.py
      Multi-event correlation engine for the seven-track gateway.
      Processes an alert stream and emits campaign-level alerts when
      correlation patterns are satisfied.
      Chapter 11, Section 11.07 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        from sigma_correlation_engine import CorrelationEngine, Alert
        engine = CorrelationEngine()
        for alert in alert_stream:
            campaign_alerts = engine.process(alert)
      '''

      from __future__ import annotations
      from collections import defaultdict
      from dataclasses import dataclass, field
      from datetime import datetime, timezone, timedelta
      from typing import Callable

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class Alert:
          alert_id: str
          rule_title: str
          user_id: str
          session_id: str
          timestamp: datetime
          level: str
          atlas_techniques: list[str]
          metadata: dict = field(default_factory=dict)

      @dataclass
      class CampaignAlert:
          campaign_id: str
          correlation_name: str
          user_id: str
          session_id: str
          source_alerts: list[Alert]
          level: str
          atlas_techniques: list[str]
          triggered_at: datetime
          description: str

      # ---------------------------------------------------------------------------
      # Correlation pattern definition
      # ---------------------------------------------------------------------------

      @dataclass
      class CorrelationPattern:
          name: str
          description: str
          required_rule_titles: list[str]   # alert rule titles that must fire
          ordered: bool                      # must fire in sequence order
          window_minutes: int
          level: str
          atlas_techniques: list[str]
          min_matches: int = 1               # how many of required_rule_titles must fire

      # ---------------------------------------------------------------------------
      # Gateway correlation patterns
      # ---------------------------------------------------------------------------

      CORRELATION_PATTERNS: list[CorrelationPattern] = [

          CorrelationPattern(
              name='Extraction Campaign — Injection Followed by Query Acceleration',
              description=(
                  'Track 1 injection alert followed by Track 5 extraction signal for '
                  'the same user within 10 minutes. Confirms model extraction attempt '
                  'preceded by boundary probing via prompt injection.'
              ),
              required_rule_titles=[
                  'LLM Direct Prompt Injection via Known Prefix — Track 1',
                  'Model Extraction via High-Volume Low-Variance Query Pattern — Track 5',
              ],
              ordered=True,
              window_minutes=10,
              level='critical',
              atlas_techniques=['AML.T0051', 'AML.T0040'],
          ),

          CorrelationPattern(
              name='Jailbreak-Adversarial Campaign — Policy Bypass with Evasion',
              description=(
                  'Track 2 jailbreak alert followed by Track 7 adversarial input signal '
                  'for the same user within 5 minutes. Consistent with an attacker '
                  'bypassing alignment then submitting adversarial inputs under the '
                  'jailbroken context to manipulate classification outputs.'
              ),
              required_rule_titles=[
                  'LLM Prompt Injection via Adversarial Role-play — Track 2',
                  'Adversarial Input via Squeezer-Classifier Compound Detection — Track 7',
              ],
              ordered=True,
              window_minutes=5,
              level='critical',
              atlas_techniques=['AML.T0054', 'AML.T0043'],
          ),

          CorrelationPattern(
              name='Semantic Near-Miss Repetition — Iterative Injection Optimisation',
              description=(
                  'Three or more Track 3 semantic gate flags for the same user within '
                  '15 minutes. Consistent with an adversary iteratively refining a '
                  'prompt to approach the similarity threshold without triggering the '
                  'block — a prompt optimisation attack.'
              ),
              required_rule_titles=[
                  'LLM Semantic Similarity Gate Threshold Exceeded — Track 3',
              ],
              ordered=False,
              window_minutes=15,
              level='high',
              atlas_techniques=['AML.T0051'],
              min_matches=3,
          ),

          CorrelationPattern(
              name='Probe-Inject-Exfiltrate Sequence — Full Attack Chain',
              description=(
                  'Three-stage ordered sequence: probing (session volume without injection), '
                  'injection (Track 1 fires), exfiltration (response entropy drop). '
                  'All three within 30 minutes per user. Full attack chain confirmation.'
              ),
              required_rule_titles=[
                  'Session Request Volume Above Baseline — Probing Pattern',
                  'LLM Direct Prompt Injection via Known Prefix — Track 1',
                  'Response Entropy Drop — Successful Exfiltration Signal',
              ],
              ordered=True,
              window_minutes=30,
              level='critical',
              atlas_techniques=['AML.T0051', 'AML.T0040'],
          ),
      ]

      # ---------------------------------------------------------------------------
      # Correlation engine
      # ---------------------------------------------------------------------------

      class CorrelationEngine:
          '''
          Processes an alert stream and emits CampaignAlert objects when
          correlation patterns are satisfied.

          Per-user alert buffers are maintained in memory with a rolling window
          eviction policy. In production, replace with a Redis-backed session store
          for horizontal scalability.
          '''

          def __init__(
              self,
              patterns: list[CorrelationPattern] | None = None,
          ) -> None:
              self.patterns = patterns or CORRELATION_PATTERNS
              # user_id -> list of Alert, sorted by timestamp ascending
              self._buffer: dict[str, list[Alert]] = defaultdict(list)

          def process(self, alert: Alert) -> list[CampaignAlert]:
              '''
              Process one alert. Returns a list of CampaignAlert objects triggered
              by this alert. Empty list if no correlation fires.
              '''
              self._buffer[alert.user_id].append(alert)
              self._evict_stale(alert.user_id, alert.timestamp)
              campaign_alerts: list[CampaignAlert] = []
              for pattern in self.patterns:
                  result = self._evaluate_pattern(pattern, alert.user_id, alert.timestamp)
                  if result:
                      campaign_alerts.append(result)
              return campaign_alerts

          def _evict_stale(self, user_id: str, now: datetime) -> None:
              '''Remove alerts older than the maximum window across all patterns.'''
              max_window = max(p.window_minutes for p in self.patterns)
              cutoff = now - timedelta(minutes=max_window)
              self._buffer[user_id] = [
                  a for a in self._buffer[user_id]
                  if a.timestamp >= cutoff
              ]

          def _evaluate_pattern(
              self,
              pattern: CorrelationPattern,
              user_id: str,
              now: datetime,
          ) -> CampaignAlert | None:
              window_start = now - timedelta(minutes=pattern.window_minutes)
              window_alerts = [
                  a for a in self._buffer[user_id]
                  if a.timestamp >= window_start
              ]

              if pattern.ordered:
                  return self._evaluate_ordered(pattern, window_alerts, user_id, now)
              else:
                  return self._evaluate_unordered(pattern, window_alerts, user_id, now)

          def _evaluate_ordered(
              self,
              pattern: CorrelationPattern,
              window_alerts: list[Alert],
              user_id: str,
              now: datetime,
          ) -> CampaignAlert | None:
              '''All required rule titles must appear in order within the window.'''
              matched: list[Alert] = []
              required_iter = iter(pattern.required_rule_titles)
              current_required = next(required_iter, None)

              for alert in sorted(window_alerts, key=lambda a: a.timestamp):
                  if current_required and alert.rule_title == current_required:
                      matched.append(alert)
                      current_required = next(required_iter, None)
                  if current_required is None:
                      break   # all required stages matched in order

              if current_required is None and len(matched) == len(pattern.required_rule_titles):
                  return self._make_campaign_alert(pattern, user_id, matched, now)
              return None

          def _evaluate_unordered(
              self,
              pattern: CorrelationPattern,
              window_alerts: list[Alert],
              user_id: str,
              now: datetime,
          ) -> CampaignAlert | None:
              '''min_matches of required_rule_titles must appear (any order).'''
              matched_by_title: dict[str, list[Alert]] = defaultdict(list)
              for alert in window_alerts:
                  if alert.rule_title in pattern.required_rule_titles:
                      matched_by_title[alert.rule_title].append(alert)

              # Count total matches across all required titles
              total_matches = sum(len(v) for v in matched_by_title.values())
              if total_matches >= pattern.min_matches:
                  source_alerts = [
                      a for alerts in matched_by_title.values()
                      for a in alerts
                  ]
                  return self._make_campaign_alert(pattern, user_id, source_alerts, now)
              return None

          def _make_campaign_alert(
              self,
              pattern: CorrelationPattern,
              user_id: str,
              source_alerts: list[Alert],
              now: datetime,
          ) -> CampaignAlert:
              import uuid
              session_id = source_alerts[0].session_id if source_alerts else ''
              return CampaignAlert(
                  campaign_id=str(uuid.uuid4())[:8],
                  correlation_name=pattern.name,
                  user_id=user_id,
                  session_id=session_id,
                  source_alerts=source_alerts,
                  level=pattern.level,
                  atlas_techniques=pattern.atlas_techniques,
                  triggered_at=now,
                  description=pattern.description,
              )

      # ---------------------------------------------------------------------------
      # Demo
      # ---------------------------------------------------------------------------

      if __name__ == '__main__':
          engine = CorrelationEngine()
          now = datetime.now(timezone.utc)

          # Simulate: injection alert followed by extraction signal, same user, 8 minutes apart
          alert_1 = Alert(
              alert_id='a001',
              rule_title='LLM Direct Prompt Injection via Known Prefix — Track 1',
              user_id='usr-attacker-42',
              session_id='sess-abc123',
              timestamp=now,
              level='high',
              atlas_techniques=['AML.T0051'],
          )
          alert_2 = Alert(
              alert_id='a002',
              rule_title='Model Extraction via High-Volume Low-Variance Query Pattern — Track 5',
              user_id='usr-attacker-42',
              session_id='sess-abc123',
              timestamp=now + timedelta(minutes=8),
              level='high',
              atlas_techniques=['AML.T0040'],
          )

          print('Processing alert stream...\n')
          for alert in [alert_1, alert_2]:
              campaigns = engine.process(alert)
              print(f'Alert: [{alert.level.upper()}] {alert.rule_title}')
              if campaigns:
                  for c in campaigns:
                      print(f'  *** CAMPAIGN [{c.level.upper()}]: {c.correlation_name}')
                      print(f'      User: {c.user_id} | ATLAS: {", ".join(c.atlas_techniques)}')
                      print(f'      Source alerts: {len(c.source_alerts)}')
              print()

  deliverable_2:
    id: 'D11.07.2'
    filename: 'sigma_rule_lifecycle_manager.py'
    description: >
      Tracks rule status across the portfolio, computes time-in-stage for each rule,
      flags rules that have exceeded their stage duration without advancing, and produces
      a lifecycle report for the weekly detection engineering sync. Also enforces the
      two-week suppression window for deprecated rules.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'pyyaml>=6.0'
      - 'datetime (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''sigma_rule_lifecycle_manager.py
      Tracks Sigma rule lifecycle stages across the detection portfolio.
      Flags rules exceeding stage duration; enforces suppression window.
      Produces weekly lifecycle report for detection engineering sync.
      Chapter 11, Section 11.07 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 sigma_rule_lifecycle_manager.py detections/rules/
        python3 sigma_rule_lifecycle_manager.py detections/rules/ --report
        python3 sigma_rule_lifecycle_manager.py detections/rules/ --check-deprecated
      '''

      from __future__ import annotations
      import argparse
      import pathlib
      import sys
      from dataclasses import dataclass
      from datetime import date, timedelta
      from typing import Literal

      import yaml

      # ---------------------------------------------------------------------------
      # Stage durations (minimum days before advancing)
      # ---------------------------------------------------------------------------

      STAGE_MIN_DAYS: dict[str, int] = {
          'experimental': 14,   # 2 weeks on staging
          'test': 28,           # 4 weeks in production
          'stable': 0,          # indefinite; no minimum
          'deprecated': 14,     # 2-week suppression window
      }

      STAGE_WARNING_DAYS: dict[str, int] = {
          'experimental': 21,   # flag if still experimental after 3 weeks
          'test': 42,           # flag if still in test after 6 weeks
          'stable': 0,
          'deprecated': 21,     # flag if not cleared after 3 weeks
      }

      Status = Literal['experimental', 'test', 'stable', 'deprecated']

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class RuleLifecycleRecord:
          filename: str
          title: str
          rule_id: str
          status: str
          date_created: date
          date_modified: date
          days_in_status: int
          flag: str           # '' | 'overdue' | 'suppression_window_passed'
          action_required: str

      # ---------------------------------------------------------------------------
      # Parser
      # ---------------------------------------------------------------------------

      def load_rule(path: pathlib.Path) -> dict | None:
          with open(path) as f:
              try:
                  return yaml.safe_load(f)
              except yaml.YAMLError:
                  return None

      def parse_record(path: pathlib.Path, today: date) -> RuleLifecycleRecord | None:
          rule = load_rule(path)
          if not rule or not isinstance(rule, dict):
              return None
          status = rule.get('status', '')
          if status not in STAGE_MIN_DAYS and status != 'stable':
              return None   # draft or unknown; skip

          date_str = rule.get('modified') or rule.get('date', '')
          try:
              date_modified = date.fromisoformat(str(date_str))
          except (ValueError, TypeError):
              date_modified = today

          date_created_str = rule.get('date', date_str)
          try:
              date_created = date.fromisoformat(str(date_created_str))
          except (ValueError, TypeError):
              date_created = date_modified

          days_in_status = (today - date_modified).days
          warning_threshold = STAGE_WARNING_DAYS.get(status, 0)
          flag = ''
          action = 'No action required.'

          if status == 'deprecated':
              min_days = STAGE_MIN_DAYS['deprecated']
              if days_in_status >= min_days:
                  flag = 'suppression_window_passed'
                  action = (
                      f'Suppression window complete ({days_in_status} days). '
                      'Review for confirmed TPs during suppression. If none, remove rule.'
                  )
          elif warning_threshold > 0 and days_in_status >= warning_threshold:
              flag = 'overdue'
              action = (
                  f'Rule has been {status} for {days_in_status} days '
                  f'(warning threshold: {warning_threshold} days). '
                  'Review FPR and advance lifecycle stage or return for calibration.'
              )

          return RuleLifecycleRecord(
              filename=path.name,
              title=rule.get('title', 'unknown')[:60],
              rule_id=str(rule.get('id', 'unknown'))[:36],
              status=status,
              date_created=date_created,
              date_modified=date_modified,
              days_in_status=days_in_status,
              flag=flag,
              action_required=action,
          )

      # ---------------------------------------------------------------------------
      # Report
      # ---------------------------------------------------------------------------

      def print_lifecycle_report(records: list[RuleLifecycleRecord]) -> int:
          by_status: dict[str, list[RuleLifecycleRecord]] = {}
          for r in records:
              by_status.setdefault(r.status, []).append(r)

          flagged = [r for r in records if r.flag]
          today = date.today()

          print(f'\nSigma Rule Lifecycle Report — {today.isoformat()}')
          print(f'Total rules tracked: {len(records)}')
          for status in ('stable', 'test', 'experimental', 'deprecated'):
              count = len(by_status.get(status, []))
              print(f'  {status:<14}: {count}')
          print(f'  Flagged:        {len(flagged)}')
          print()

          if flagged:
              print('Flagged rules (action required):')
              for r in flagged:
                  print(f'  [{r.flag.upper()}] {r.filename}')
                  print(f'    Title:    {r.title}')
                  print(f'    Status:   {r.status} for {r.days_in_status} days (modified {r.date_modified})')
                  print(f'    Action:   {r.action_required}')
              print()

          print('Full portfolio:')
          print(f'  {"File":<45} {"Status":<14} {"Days":<6} {"Flag"}')
          print('  ' + '-' * 80)
          for r in sorted(records, key=lambda x: (x.status, -x.days_in_status)):
              flag_str = f'[{r.flag.upper()}]' if r.flag else ''
              print(f'  {r.filename:<45} {r.status:<14} {r.days_in_status:<6} {flag_str}')

          return 1 if flagged else 0

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Sigma rule lifecycle manager')
          parser.add_argument('rules_dir', help='Directory containing Sigma rule files')
          parser.add_argument('--report', action='store_true',
                              help='Print full lifecycle report (default behaviour)')
          parser.add_argument('--check-deprecated', action='store_true',
                              help='Exit non-zero if any deprecated rules have passed suppression window')
          args = parser.parse_args()

          rules_dir = pathlib.Path(args.rules_dir)
          if not rules_dir.exists():
              print(f'Error: rules directory not found: {rules_dir}')
              return 1

          today = date.today()
          rule_files = sorted(
              list(rules_dir.rglob('*.yml')) + list(rules_dir.rglob('*.yaml'))
          )
          records = [r for path in rule_files if (r := parse_record(path, today)) is not None]

          if args.check_deprecated:
              passed = [r for r in records if r.flag == 'suppression_window_passed']
              if passed:
                  print(f'{len(passed)} deprecated rule(s) have passed the suppression window:')
                  for r in passed:
                      print(f'  {r.filename}: {r.days_in_status} days suppressed. Remove or restore.')
                  return 1
              print('No deprecated rules have exceeded the suppression window.')
              return 0

          return print_lifecycle_report(records)

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.07.1'
    mistake: 'Using the same time window for fast-burst attacks and slow-campaign attacks in a single aggregation rule'
    why_it_happens: >
      A single count threshold with a single window feels cleaner than two rules.
      Practitioners choose a compromise window that is neither short enough to catch
      fast attacks nor long enough to accumulate slow campaign evidence.
    why_it_matters: >
      A burst extraction attack that delivers 500 queries in 15 minutes generates an
      average rate of 500/1440 per minute over 24 hours — well below a 24-hour count
      threshold tuned for slow campaigns. A slow campaign that spreads 500 queries over
      48 hours generates 10 queries per hour — well below a 15-minute burst threshold.
      A single-window rule is blind to one of the two attack profiles.
    correct_approach: >
      Deploy two rules for each rate-based detection: a fast-window rule (15 minutes,
      low threshold) for burst attacks and a slow-window rule (24 hours, high threshold)
      for campaigns. Both reference the same log fields; only the window and threshold
      differ. The sigma_rule_builder.py templates support generating both variants
      from a single spec with a fast_window and slow_window parameter.

  - id: 'CM11.07.2'
    mistake: 'Building correlation rules before the source single-event rules are at stable status'
    why_it_happens: >
      Correlation feels like the natural next step after writing the source rules.
      The detection engineer authors all rules in one sprint.
    why_it_matters: >
      A correlation rule built on experimental or test source rules inherits those
      rules'' instability. If a source rule is calibrated (threshold change, keyword
      list update), the correlation''s firing behaviour changes implicitly. A correlation
      that fired on experimental source rule A may no longer fire after A is calibrated
      to stable — but the correlation''s status is still stable, creating a misleading
      coverage picture.
    correct_approach: >
      Correlation rules are only authored after all source rules have reached stable
      status. The sigma_rule_lifecycle_manager.py can be extended to check that all
      referenced source rule titles are stable before promoting a correlation rule
      beyond experimental.

  - id: 'CM11.07.3'
    mistake: 'Treating exception filter selections as permanent suppressions without review dates'
    why_it_happens: >
      Exceptions are added during an incident or during initial tuning. Once the alert
      volume drops, the exception is forgotten. Review dates are not required by the
      metadata standard.
    why_it_matters: >
      An exception for svc-regression-tests added in January 2025 may be suppressing
      alerts from a production service that was renamed to svc-regression-tests in
      December 2025 after the original test pipeline was decommissioned. The exception
      is now suppressing real attack alerts from a production account that happens to
      share the old test pipeline name.
    correct_approach: >
      Every filter selection block carries a comment with the exception approval date
      and owner. The rule_metadata_validator.py is extended to extract these dates and
      flag exceptions older than 90 days in CI. The sigma_rule_lifecycle_manager.py
      quarterly report includes an exception audit as a mandatory section.

  - id: 'CM11.07.4'
    mistake: 'Ordering correlation rule sources by alert frequency rather than attack sequence logic'
    why_it_happens: >
      The most frequently firing rule is placed first in the required_rule_titles list
      because it is expected to provide the earliest signal. But alert frequency does
      not reflect attack sequence order.
    why_it_matters: >
      The extraction campaign correlation requires injection before extraction: the
      attacker probes (injection signal) then extracts (query accumulation signal). If
      the rule orders them by frequency — Track 5 fires more often than Track 1, so
      Track 5 is listed first — the correlation requires extraction before injection,
      which is the wrong sequence and will not fire on the actual attack pattern.
    correct_approach: >
      Order required_rule_titles by the attack sequence logic, not by alert frequency.
      Document the sequence reasoning in the correlation rule''s description field.
      Test the ordering by simulating the attack sequence in the staging environment
      before setting the correlation rule to stable status.

  - id: 'CM11.07.5'
    mistake: 'Skipping the experimental status phase for correlation rules that seem obviously correct'
    why_it_happens: >
      A correlation of Track 1 and Track 5 feels mathematically correct — injection
      followed by extraction is clearly malicious. Why waste two weeks on staging?
    why_it_matters: >
      Correlation rules are the most sensitive to production traffic patterns. A CI test
      environment cannot replicate the diverse patterns of real user behaviour that
      produce false correlations: a security researcher who runs injection tests then
      a legitimate load test in the same session within 10 minutes will trigger the
      extraction campaign correlation. Without staging observation, these false
      correlation patterns are invisible until the rule is in production generating
      critical-level false positives.
    correct_approach: >
      All correlation rules begin at experimental status and serve the two-week staging
      period regardless of how logically sound the correlation appears. The staging
      period for correlation rules is more valuable than for single-event rules because
      the interaction between tracks is harder to predict from theory than from
      observation of real traffic.

section_summary:
  what_you_learned: |
    Advanced Sigma patterns transform the gateway from a single-event detector into a
    campaign-aware detection system. Aggregation conditions with count, min, max, avg,
    and sum enable rate-based detection with fast-window and slow-window variants for
    burst and campaign attacks respectively. Correlation rules join alert streams from
    multiple tracks into campaign-level detections; the three gateway correlation rules
    (injection-extraction, jailbreak-adversarial, semantic near-miss repetition) and
    one experimental sequence rule (probe-inject-exfiltrate) produce the critical-level
    campaign alerts that single-event rules cannot. Exception management via filter
    selections with not conditions and review-dated comments prevents known-good
    automation from generating false correlations. The Sigma rule lifecycle (experimental
    → test → stable → deprecated) governs every rule in the portfolio, enforced by the
    lifecycle manager. The full portfolio now contains twelve rules across seven tracks.
  key_terms:
    - term: 'Correlation rule'
      definition: >
        A Sigma rule of type: correlation that joins the output alerts of two or more
        source rules into a campaign-level detection. Fires when all required source
        rules produce alerts for the same user within a defined time window, optionally
        in a specified order.
    - term: 'Sequence rule'
      definition: >
        A correlation rule with ordered: true and three or more stages, where each
        stage must fire in sequence within the window. Used for multi-phase attack chains
        (probe → inject → exfiltrate). Requires a Sigma rule for every stage of the
        attack sequence.
    - term: 'Exception management'
      definition: >
        The use of filter selection blocks combined with not conditions to exclude
        known-good event sources from detection rules. Exceptions are versioned,
        review-dated, and documented in the falsepositives field. Exceptions older
        than 90 days without review are flagged in CI.
    - term: 'Fast window / slow window'
      definition: >
        The two-rule pattern for rate-based aggregation: a fast window (e.g. 15 minutes,
        low threshold) catches burst attacks; a slow window (e.g. 24 hours, high
        threshold) catches campaigns. Both are required; a single window misses one
        of the two attack profiles.
    - term: 'Sigma lifecycle'
      definition: >
        The five-stage progression of a detection rule: draft (unreviewed) →
        experimental (staging, 2 weeks minimum) → test (production with label,
        4 weeks minimum) → stable (full production) → deprecated (2-week suppression
        before removal). Enforced by sigma_rule_lifecycle_manager.py.

preview_section_11_08:
  title: 'Detection Maturity Model: L1 Through L5'
  teaser: |
    Section 11.08 measures the detection programme''s maturity against a five-level
    model. The Sigma portfolio from Sections 11.06 and 11.07 is the primary evidence:
    how many rules exist, what lifecycle stages they have reached, whether tests and
    version history are present, whether the coverage heat map is current, and whether
    FPR is tracked per rule. The seven-track gateway scores its current maturity, and
    Section 11.08 produces the roadmap that moves it from L2 (rules exist with governance)
    to L3 (rules with coverage measurement, FPR tracking, and workflow) by the end of
    Chapter 11, and to L4 (adaptive detection with ML feedback loops) by the end of
    Part 3.

