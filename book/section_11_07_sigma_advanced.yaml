prose_content:

  part_1_aggregation_deep_dive:
    heading: 'Aggregation Conditions: Time Windows and Group-By'
    body: |
      Section 11.06 introduced the aggregation operator as Operator 4, showing a count
      condition for Track 5. Here the full aggregation syntax is developed — all five
      functions across all three log categories — because aggregation is the bridge
      between single-event signature detection and stateful campaign detection.

      Sigma supports five aggregation functions: count (number of matching events),
      min and max (minimum and maximum value of a field across matching events), avg
      (mean value of a field), and sum (total value of a field). All five follow the
      same structural pattern: a selection block defines which events to aggregate;
      the condition line specifies the function, the field, the group-by key, the
      comparison operator, and the threshold.

      The time window is specified by the backend, not by Sigma itself: Sigma''s
      aggregation conditions define what to count and how to threshold; the target
      platform (Splunk, Elastic, Sentinel) applies its own time window syntax when
      compiling the rule. For the gateway''s Python backend, the time window is
      configured in the session accumulator''s rolling window parameter. This is
      a known limitation of Sigma''s portability: time window semantics vary across
      backends and must be agreed per deployment.

      Count aggregation — detecting volume abuse:

          detection:
            rapid_queries:
              user_id: '*'
              gateway_action: 'pass'
            condition: rapid_queries | count(request_id) by user_id > 500

      The group-by field (user_id) makes this a per-user count: an individual user
      who makes more than 500 passing requests is flagged. Without group-by, the count
      would be across all users and would fire on normal aggregate traffic volume.
      Group-by is not optional for rate-based AI security rules.

      Avg aggregation — detecting sustained low-entropy query sessions:

          detection:
            low_entropy_session:
              session_action: 'normal'
            condition: low_entropy_session | avg(query_entropy_avg) by user_id < 2.0

      This fires when a user''s mean query entropy across their sessions averages
      below 2.0 bits — consistent with systematic boundary-probing rather than
      normal conversational usage. It fires on the session-level log (ai_session
      category), not on per-request logs.

      Min aggregation — detecting systematic query variance reduction:

          detection:
            low_variance_pattern:
              session_request_count|gte: 50
            condition: low_variance_pattern | min(query_variance) by user_id < 0.10

      The minimum query_variance across all sessions with at least 50 requests falls
      below 0.10 — indicating that at some point the user ran an extremely uniform
      query sequence, consistent with boundary probing even if other sessions were
      more varied.

      Sum aggregation — detecting budget exhaustion:

          detection:
            budget_burn:
              user_id: '*'
            condition: budget_burn | sum(budget_consumed_pct) by user_id > 90

      This fires when a user''s cumulative budget consumption exceeds 90% — a useful
      secondary signal for extraction campaigns that exhaust query budgets deliberately.

      The time window discipline: rate-based rules must specify a window that is narrow
      enough to catch fast attacks (a burst extraction that completes in 10 minutes
      would evade a 24-hour count window with a threshold above its per-10-minute
      volume) and wide enough to accumulate evidence from slow attacks (a slow-drift
      extraction that spreads 500 queries over three days would evade a 1-hour window).
      The gateway uses two window settings: a fast window (15 minutes) for burst
      detection with a low threshold and a slow window (24 hours) for campaign
      detection with a high threshold. Both fire independently; either can trigger an
      alert.

  part_2_correlation_rules:
    heading: 'Correlation Rules: Joining Tracks into Campaign Alerts'
    body: |
      A Sigma correlation rule joins the output alerts of two or more individual Sigma
      rules into a higher-level campaign detection. It does not inspect raw log events;
      it inspects the alert stream produced by the rules it references. A correlation
      rule that joins Track 1 (injection alert) with Track 5 (extraction signal) fires
      when both alerts appear for the same user within a defined time window. Neither
      alert alone confirms a campaign; both together do.

      Sigma correlation rules use the type: correlation header and reference source
      rules by their rule ID (UUID) in the rules field. The group-by and timespan fields
      define the correlation window and the grouping key. The condition specifies how
      many of the referenced rules must fire, in what order, and within what window.

      Correlation rule structure for a confirmed extraction attempt (Track 1 + Track 5):

          title: Confirmed Extraction Attempt — Injection Followed by Query Acceleration
          id: d7e8f9a0-b1c2-4d3e-4f5a-b6c7d8e9f0a1
          type: correlation
          status: stable
          description: >
            Correlates a Track 1 injection alert with a Track 5 extraction signal for
            the same user within a 10-minute window. The sequence is consistent with
            an attacker probing model boundaries via injection then accelerating API
            queries to extract decision surface information. Covers AML.T0051 +
            AML.T0040 campaign chain.
          references:
            - 'https://atlas.mitre.org/techniques/AML.T0051'
            - 'https://atlas.mitre.org/techniques/AML.T0040'
          author: 'ruwgxo, 2026-05-30'
          date: 2026-05-30
          modified: 2026-05-30
          tags:
            - attack.initial_access
            - attack.collection
            - atlas.aml.t0051
            - atlas.aml.t0040
            - owasp.llm.01
            - owasp.llm.10
          type: correlation
          rules:
            injection_alert:
              title: 'LLM Direct Prompt Injection via Known Prefix — Track 1'
            extraction_signal:
              title: 'Model Extraction via High-Volume Low-Variance Query Pattern — Track 5'
          group-by:
            - user_id
          timespan: 10m
          condition:
            gte: 1
          ordered: true
          falsepositives:
            - 'Security researchers conducting combined injection and extraction tests in authorised exercises'
            - 'Automated test pipelines that run injection tests immediately before extraction tests'
          level: critical

      The ordered: true field requires the injection alert to precede the extraction
      signal within the 10-minute window. Without ordering, the correlation would fire
      even if the extraction came first — a possible but less indicative sequence. For
      campaign patterns with a clear temporal logic (probe before extract), ordering
      adds precision.

      The correlation rule''s level is critical even if the individual source rules
      are medium or high. The correlation provides confirmation that neither rule
      provides alone: two independent track signals for the same user within a narrow
      window are much more likely to represent a real attack than either signal alone.
      Confirmed campaigns warrant critical-level alerting even when individual signals
      are uncertain.

      Three correlation rules for the seven-track gateway portfolio:

      Correlation 1 — Injection-to-Extraction campaign (Track 1 → Track 5, window 10m,
      ordered). The most important correlation in the portfolio: injection probing
      followed by query acceleration is the textbook model extraction approach.

      Correlation 2 — Jailbreak-then-Adversarial campaign (Track 2 → Track 7, window 5m,
      ordered). A jailbreak attempt followed by an adversarial input signal indicates
      an attacker probing the model''s alignment bypass and adversarial robustness
      simultaneously — consistent with a targeted attack that aims to both bypass
      content policy and manipulate classification outputs.

      Correlation 3 — Semantic Gate → Repeated Flagging (Track 3 flagging more than
      three times within 15 minutes for the same user). Repeated near-miss similarity
      scores indicate an adversary iteratively refining an injection to stay below the
      block threshold while approaching it — a prompt optimisation attack pattern.

  part_3_sequence_rules:
    heading: 'Sequence Rules: Ordered Event Chains'
    body: |
      Sequence rules are a specialised form of correlation that requires not just that
      multiple events occur within a window but that they occur in a specific order.
      The probe → inject → exfiltrate pattern is the paradigm case: a sophisticated
      attacker begins by probing the model''s capabilities and restrictions (low-signal
      queries that do not trigger any track), then attempts injection (Track 1 or Track 2
      fires), then attempts to extract a target from the model''s response (specific
      response patterns indicative of successful exfiltration).

      Sequence rules in Sigma use the type: correlation with an ordered: true flag and
      multiple named rule references. The pipeline must evaluate them in order: only if
      the first rule fires does it begin watching for the second; only if the second
      fires within the window does it begin watching for the third.

      A three-stage sequence rule for the probe-inject-exfiltrate pattern:

          title: Probe-Inject-Exfiltrate Sequence — AI Gateway Attack Chain
          id: e8f9a0b1-c2d3-4e5f-6a7b-c8d9e0f1a2b3
          type: correlation
          status: experimental
          description: >
            Three-stage ordered sequence: (1) high session request volume without
            injection signals (probing phase), (2) injection alert fires (Track 1 or 2),
            (3) response entropy drops sharply (successful exfiltration pattern).
            All three stages must occur in order within a 30-minute session window.
            Covers the full AML.T0051 → AML.T0040 attack chain.
          tags:
            - attack.initial_access
            - attack.collection
            - attack.exfiltration
            - atlas.aml.t0051
            - atlas.aml.t0040
            - owasp.llm.01
            - owasp.llm.10
          type: correlation
          rules:
            probe_phase:
              title: 'Session Request Volume Above Baseline — Probing Pattern'
            inject_phase:
              title: 'LLM Direct Prompt Injection via Known Prefix — Track 1'
            exfil_phase:
              title: 'Response Entropy Drop — Successful Exfiltration Signal'
          group-by:
            - user_id
            - session_id
          timespan: 30m
          condition:
            gte: 3
          ordered: true
          falsepositives:
            - 'Automated test suites that run load tests followed by functionality tests including injection test cases'
          level: critical

      The exfil_phase rule (response entropy drop) is a new rule not in the original
      gateway portfolio. Sequence rules often reveal detection gaps: to complete a
      sequence correlation, you need a rule for every stage of the attack chain, not
      just the stages that are currently instrumented. The probe-inject-exfiltrate
      sequence requires a response-entropy monitor — a rule that fires when
      output_entropy_avg drops sharply within a session — that Track 5 does not
      currently implement. This is an appropriate addition to the detection backlog
      triggered by the sequence rule design process.

      Sequence rules are status: experimental by design. They require the most
      tuning of any rule type: the window must be wide enough to catch real attack
      sequences (which may pause between stages) but narrow enough to avoid false
      correlations between unrelated events from different sessions. Start with a
      wide window and tighten it based on production observation.

  part_4_exception_management:
    heading: 'Exception Management: Allowlists in Sigma Rules'
    body: |
      Every production rule produces false positives from known-good sources: automated
      testing pipelines that run injection strings as fixtures, batch inference jobs
      with high query rates that look like extraction, internal benchmark tools that
      probe model performance with repetitive queries. Without exception management,
      the correlation layer drowns in alerts from known-good automation. With it, these
      sources are filtered before the rule fires.

      Sigma implements exceptions through filter selections combined with a not condition.
      A filter selection is a named selection block that matches known-good events; the
      condition excludes it explicitly. This is preferable to building exceptions into
      the positive selection (which makes the detection logic harder to read) or
      suppressing at the SIEM level (which hides the exception from the rule''s audit
      trail).

      Exception pattern for a known-good automated test pipeline (source IP or
      service account):

          detection:
            high_volume:
              session_request_count|gte: 100
            known_test_pipeline:
              user_id:
                - 'svc-regression-tests'
                - 'svc-load-tester'
                - 'svc-benchmark-runner'
            condition: high_volume and not known_test_pipeline

      Exception pattern for a known-safe model that always produces high squeezer
      disagreement due to its unusual output distribution:

          detection:
            high_squeezer:
              track_7_squeezer_score|gte: 0.70
            safe_model_exception:
              model_name:
                - 'internal-test-model-v1'
                - 'canary-model-qa'
                - 'benchmark-reference-model'
            condition: high_squeezer and not safe_model_exception

      Exception lifecycle: exceptions must be versioned and reviewed on the same cadence
      as the rules that contain them. An exception added for a test pipeline that no
      longer exists continues silently suppressing alerts. An exception for a model name
      that has been retired may now match a different model if names are reused. The
      rule_metadata_validator.py from Section 11.02 should be extended to require a
      review date on each filter selection block; exceptions older than 90 days without
      a review are flagged in CI.

      Exception documentation: every filter selection must have a corresponding entry
      in the falsepositives field explaining why the exception exists, when it was added,
      and who approved it:

          falsepositives:
            - 'svc-regression-tests: automated regression pipeline; approved by security team 2026-05-30'
            - 'internal-test-model-v1: produces high squeezer score due to unusual output distribution; approved by detection team 2026-04-15'

      This documentation is the audit trail. An analyst who receives an alert and
      wonders why a particular source is not triggering it can read the falsepositives
      field and understand the exception without hunting through commit history.

  part_5_lifecycle:
    heading: 'Sigma Rule Lifecycle: Draft to Retirement'
    body: |
      Every Sigma rule in the portfolio has a status field that tracks its lifecycle
      stage. The gateway uses five stages with defined entry and exit criteria enforced
      by the CI pipeline and the sigma_rule_lifecycle_manager.py deliverable.

      Draft — a rule is in draft when it has been written but has not yet been reviewed.
      Draft rules do not appear in the CI pipeline''s deployment stage; they are committed
      to the repository in a feature branch for review. The draft stage ends when a peer
      review is approved and the status field is advanced to experimental.

      Experimental — a rule is experimental when it has passed peer review and has been
      deployed to the staging environment. It runs against real traffic on staging for a
      minimum of two weeks. During this period the detection engineer monitors alert
      volume, FPR, and any new false positive sources. The experimental stage ends when:
      (a) the rule has run for two weeks on staging with no unacceptable FPR, and (b)
      it has produced at least one confirmed true positive (or the detection engineer
      has explicitly accepted that no TP opportunity arose during staging). Status
      advances to test.

      Test — a rule in test status is deployed to production with an explicit flag
      in the SIEM that identifies it as under evaluation. SOC analysts see the alerts
      but with a "test rule" label; they are asked to provide disposition (TP/FP) but
      the rule does not feed into SLA metrics. The test stage lasts a minimum of four
      weeks in production. The lifecycle manager tracks the FPR over this period. If
      FPR exceeds 15%, the rule is returned to experimental for calibration. If FPR
      stays below 10%, status advances to stable.

      Stable — a fully deployed production rule. Stable rules feed into SLA metrics,
      feed the FPR tracking database, and feed the coverage heat map. A stable rule
      is re-evaluated for calibration when its FPR exceeds 10% over any rolling
      30-day window. Re-evaluation may result in a threshold change (staying in stable
      with a new modified date), a demotion to test (for significant logic changes),
      or initiation of retirement.

      Deprecated — retirement initiation. The rule is suppressed (produces no alerts)
      but remains deployed. The lifecycle manager watches for a two-week clean window:
      if no confirmed true positives would have been caught by the rule during the
      suppression period (determined from threat intelligence and manual review), the
      rule is promoted to removed. If a TP is identified during suppression, retirement
      is halted and the rule returns to stable. Deprecated rules are removed from the
      repository only after the two-week window passes without a TP — never deleted
      immediately.

      The sigma_rule_lifecycle_manager.py deliverable implements this lifecycle
      programmatically: it reads the status field from all rules in the repository,
      computes how long each rule has been in its current status, flags rules that
      have exceeded their stage duration without advancing, and produces a lifecycle
      report for the weekly detection engineering sync.

  part_6_portfolio_inventory:
    heading: 'The Seven-Track Sigma Portfolio: Unified Cross-Reference'
    body: |
      After Sections 11.06 and 11.07, the full Sigma portfolio for the seven-track
      gateway consists of seven single-event rules (one per track, with some tracks
      having multiple rules for different detection layers within the track), three
      correlation rules (injection-extraction, jailbreak-adversarial, semantic
      near-miss repetition), and one experimental sequence rule (probe-inject-exfiltrate).
      Total: eleven rules governing seven detection tracks.

      Single-event rules by track:

      Track 1 (injection_patterns.yml): keyword match on direct injection prefixes.
      L1 signature. Level: high. ATLAS: AML.T0051. Status: stable.

      Track 2a (jailbreak_sequences.yml): keyword match on jailbreak template prefixes.
      L1 signature. Level: medium. ATLAS: AML.T0054. Status: stable.

      Track 2b (jailbreak_classifier_sigma.yml): embedding classifier score threshold.
      L3 ML. Level: medium. ATLAS: AML.T0054. Status: test (classifier is post-Part 2;
      promoted to test pending four-week production evaluation).

      Track 3 (semantic_similarity.yml): cosine similarity threshold gate.
      L2 heuristic. Level: medium. ATLAS: AML.T0051. Status: stable.

      Track 4 (poisoning_monitor.yml): label distribution skew on training API events.
      L1 signature. Level: high. ATLAS: AML.T0020. Status: stable.

      Track 5 (extraction_detector.yml): count aggregation on session query volume and
      variance. L1/L4. Level: high. ATLAS: AML.T0040. Status: stable.

      Track 6 (adversarial_input.yml): entropy and character distribution heuristics.
      L2 heuristic. Level: medium. ATLAS: AML.T0043. Status: stable.

      Track 7 (adversarial_detection.yml): compound squeezer disagreement and
      adversarial classifier score. L2/L3. Level: medium. ATLAS: AML.T0043, AML.T0015.
      Status: stable.

      Correlation rules (all in rules/campaign/):

      Correlation 1 (extraction_campaign.yml): Track 1 + Track 5, ordered, 10m window.
      Level: critical. ATLAS: AML.T0051 + AML.T0040. Status: stable.

      Correlation 2 (jailbreak_adversarial_campaign.yml): Track 2 + Track 7, ordered,
      5m window. Level: critical. ATLAS: AML.T0054 + AML.T0043. Status: experimental.

      Correlation 3 (semantic_near_miss_repetition.yml): Track 3 count >= 3 within 15m
      per user. Level: high. ATLAS: AML.T0051. Status: stable.

      Sequence rule (all in rules/campaign/):

      Sequence 1 (probe_inject_exfiltrate.yml): three-stage probe → inject → exfiltrate,
      ordered, 30m window. Level: critical. ATLAS: AML.T0051 + AML.T0040. Status:
      experimental. Depends on response entropy drop rule (not yet built; detection
      backlog item).

      This portfolio is the evidence base for the Section 11.08 maturity assessment.
      Eleven rules, three lifecycle stages, cross-referencing seven gateway tracks and
      three correlation patterns — this is what L2 maturity looks like in practice.
      L3 maturity requires the coverage map (Section 11.05), FPR tracking per rule
      (Section 11.09), and the engineering workflow (Section 11.10).

