    - 'Section 11.06: full Sigma format and syntax; all five single-event operators'
    - 'Section 11.03: four-layer detection model; Layer 4 behavioural detection as the target of correlation rules'
    - 'Sections 11.01–11.02: detection-as-code pipeline; CI pipeline that governs rule deployment'
  helpful:
