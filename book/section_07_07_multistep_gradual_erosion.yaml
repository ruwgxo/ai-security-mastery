                  'Pipeline-level trajectory scorer, not agent-level.'
              ),
          },
      }


      def get_alert_threshold_turns() -> dict:
          '''Returns the recommended alert threshold turn for each pattern.'''
          return {
              k: v['alert_threshold_turn']
              for k, v in EROSION_ATTACK_PATTERNS.items()
              if 'alert_threshold_turn' in v
          }


      def print_pattern_summary() -> None:
          print('Gradual Erosion Attack Patterns\n')
          for key, p in EROSION_ATTACK_PATTERNS.items():
              print(f"Pattern: {p['name']}")
              print(f"  Turns:            {p['turn_count']}")
              alert = p.get('alert_threshold_turn', 'N/A (pipeline-level)')
              print(f"  Alert threshold:  Turn {alert}")
              print(f"  Detection signal: {p['detection_signal'][:70]}")
              print()


      if __name__ == '__main__':
          print_pattern_summary()
          print('Alert threshold turns by pattern:')
          for pattern, turn in get_alert_threshold_turns().items():
              print(f'  {pattern}: turn {turn}')

  - id: "7.7.code.02"
    title: "Conversation Trajectory Anomaly Scorer"
    description: |
      Stateful trajectory scorer for gradual erosion detection. Extends the
      session_state_schema.py from Section 7.5 with erosion-specific state
      dimensions: specificity history, dimension coverage flags, back-reference
      counter, and monotonic slope detector. This is one of the five tracks
      in the Section 7.14 ensemble.
    language: "python"
    filename: "code/ch07/trajectory_anomaly_scorer.py"
    code: |
      import re
      from dataclasses import dataclass, field
      from typing import Optional


      # Back-reference patterns: adversary anchoring prior model output
      BACK_REFERENCE_PATTERNS = [
          r'\bas\s+you\s+(?:just\s+)?(?:explained|said|mentioned|described|noted)\b',
          r'\bfollowing\s+(?:from\s+)?(?:what\s+you\s+(?:said|explained)|your\s+explanation)\b',
          r'\bcontinuing\s+(?:from|with)\s+(?:the\s+)?(?:previous|last|prior)\b',
          r'\bgiven\s+(?:your|what\s+you)\s+(?:explanation|said|described)\b',
          r'\bbased\s+on\s+(?:what\s+you|your)\s+(?:just\s+)?(?:explained|said|described)\b',
          r'\bbuilding\s+on\s+(?:that|what\s+you\s+said|your\s+explanation)\b',
          r'\bthe\s+next\s+(?:step|part|phase)\s+(?:in\s+(?:this|the)\s+process|after\s+that)\b',
          r'\bnow\s+that\s+(?:we\'ve|you\'ve|I\'ve)\s+(?:covered|established|discussed)\b',
      ]

      # Dimension detection patterns
      DOMAIN_INDICATORS = [
          r'\bexplain\s+(?:the\s+)?(?:general|basic|overview|principles?)\b',
          r'\bintroduce\b',
          r'\bwhat\s+is\b',
          r'\bhow\s+does\s+\w+\s+work\s+(?:in\s+general|generally|broadly)\b',
      ]
      MECHANISM_INDICATORS = [
          r'\bspecific(?:ally)?\s+(?:mechanism|process|steps?|method)\b',
          r'\bexactly\s+how\b',
          r'\bin\s+detail\b',
          r'\bunder\s+the\s+hood\b',
          r'\bwhat\s+actually\s+happens\b',
      ]
      PARAMETER_INDICATORS = [
          r'\bconditions?\b',
          r'\bquantit(?:y|ies)\b',
          r'\bamount\b',
          r'\btemperature\b',
          r'\bconcentration\b',
          r'\bratio\b',
          r'\bspecific(?:ations?)?\b',
          r'\bparameters?\b',
      ]
      OPERATIONAL_INDICATORS = [
          r'\bstep[- ]by[- ]step\b',
          r'\bhow\s+would\s+(?:someone|a\s+person|you|one)\s+(?:actually\s+)?(?:do|execute|perform|carry\s+out)\b',
          r'\bready\s+to\s+(?:use|execute|implement)\b',
          r'\bpractical\s+(?:guide|instructions?)\b',
          r'\bworking\b',
      ]


      @dataclass
      class ErosionState:
          '''
          Erosion-specific session state.
          Extends session_state_schema.SessionState with erosion dimensions.
          Maintained per session by the trajectory scorer.
          '''
          session_id: str

          # Specificity history: list of (turn_index, specificity_score)
          specificity_history: list = field(default_factory=list)

          # Dimension coverage flags
          domain_covered: bool = False
          mechanism_covered: bool = False
          parameter_covered: bool = False
          operational_attempted: bool = False

          # Ratchet state
          back_reference_count: int = 0
          back_reference_turns: list = field(default_factory=list)

          # Alert state
          early_warning_fired: bool = False
          alert_fired: bool = False

          @property
          def dimensions_covered(self) -> int:
              return sum([
                  self.domain_covered,
                  self.mechanism_covered,
                  self.parameter_covered,
              ])

          @property
          def specificity_slope(self) -> float:
              '''
              Linear slope of specificity scores over the last N turns.
              Positive and sustained = erosion signature.
              Returns 0.0 if fewer than 3 turns recorded.
              '''
              if len(self.specificity_history) < 3:
                  return 0.0
              recent = self.specificity_history[-6:]  # last 6 turns
              n = len(recent)
              if n < 2:
                  return 0.0
              # Simple linear regression slope
              x_mean = (n - 1) / 2
              y_mean = sum(s for _, s in recent) / n
              numerator = sum(
                  (i - x_mean) * (s - y_mean)
                  for i, (_, s) in enumerate(recent)
              )
              denominator = sum((i - x_mean) ** 2 for i in range(n))
              if denominator == 0:
                  return 0.0
              return numerator / denominator

          @property
          def current_specificity(self) -> float:
              if not self.specificity_history:
                  return 0.0
              return self.specificity_history[-1][1]

          @property
          def is_monotonically_increasing(self) -> bool:
              '''True if the last 4 specificity scores are non-decreasing.'''
              if len(self.specificity_history) < 4:
                  return False
              recent_scores = [s for _, s in self.specificity_history[-4:]]
              return all(
                  recent_scores[i] <= recent_scores[i + 1]
                  for i in range(len(recent_scores) - 1)
              )

          @property
          def erosion_score(self) -> float:
              '''
              Composite erosion risk score.
              Combines slope, dimension coverage, back-references, and monotonicity.
              '''
              score = 0.0
              # Positive slope contribution
              slope = self.specificity_slope
              if slope > 0:
                  score += min(0.35, slope * 5.0)
              # Dimension coverage
              score += self.dimensions_covered * 0.12
              # Back-reference ratchet
              score += min(0.2, self.back_reference_count * 0.07)
              # Monotonic increase bonus
              if self.is_monotonically_increasing:
                  score += 0.15
              # Current specificity contribution
              score += self.current_specificity * 0.2
              return min(1.0, score)


      def _check_dimension_coverage(text: str, state: ErosionState) -> None:
          '''Update dimension coverage flags based on turn content.'''
          text_lower = text.lower()
          if not state.domain_covered:
              if any(re.search(p, text_lower) for p in DOMAIN_INDICATORS):
                  state.domain_covered = True
          if not state.mechanism_covered and state.domain_covered:
              if any(re.search(p, text_lower) for p in MECHANISM_INDICATORS):
                  state.mechanism_covered = True
          if not state.parameter_covered and state.mechanism_covered:
              if any(re.search(p, text_lower) for p in PARAMETER_INDICATORS):
                  state.parameter_covered = True
          if any(re.search(p, text_lower) for p in OPERATIONAL_INDICATORS):
              state.operational_attempted = True


      def _check_back_references(text: str, state: ErosionState, turn_index: int) -> None:
          for pattern in BACK_REFERENCE_PATTERNS:
              if re.search(pattern, text, re.IGNORECASE):
                  state.back_reference_count += 1
                  state.back_reference_turns.append(turn_index)
                  break  # one per turn


      def process_turn(
          turn_text: str,
          specificity_score: float,
          state: ErosionState,
          turn_index: int,
          alert_thresholds: Optional[dict] = None,
      ) -> dict:
          '''
          Process one conversation turn against erosion state.
          Returns alert status and updated state summary.
          specificity_score comes from request_specificity_scorer (Section 7.4).
          '''
          if alert_thresholds is None:
              alert_thresholds = {
                  'early_warning_erosion_score': 0.45,
                  'alert_erosion_score': 0.65,
                  'alert_dimensions_covered': 3,
              }

          state.specificity_history.append((turn_index, specificity_score))
          _check_dimension_coverage(turn_text, state)
          _check_back_references(turn_text, state, turn_index)

          result = {
              'turn_index': turn_index,
              'specificity_score': specificity_score,
              'specificity_slope': round(state.specificity_slope, 4),
              'dimensions_covered': state.dimensions_covered,
              'back_reference_count': state.back_reference_count,
              'monotonic': state.is_monotonically_increasing,
              'erosion_score': round(state.erosion_score, 3),
              'early_warning': False,
              'alert': False,
          }

          if (
              not state.early_warning_fired
              and (
                  state.erosion_score >= alert_thresholds['early_warning_erosion_score']
                  or state.dimensions_covered >= alert_thresholds['alert_dimensions_covered']
              )
          ):
              state.early_warning_fired = True
              result['early_warning'] = True

          if (
              not state.alert_fired
              and state.erosion_score >= alert_thresholds['alert_erosion_score']
          ):
              state.alert_fired = True
              result['alert'] = True

          return result


      DEMO_SESSION = [
          ('What are the general principles of X?', 0.06),
          ('How does X work broadly speaking?', 0.10),
          ('Can you explain the specific mechanism behind X?', 0.24),
          ('What exactly happens at each step of that mechanism?', 0.33),
          ('As you just explained the mechanism, what conditions are required?', 0.46),
          ('What quantities are typically involved in those conditions?', 0.55),
          ('Following from your explanation, what parameters produce the best results?', 0.63),
          ('Building on that, how would someone actually execute this step by step?', 0.78),
      ]


      if __name__ == '__main__':
          state = ErosionState(session_id='demo-erosion-001')
          print('Trajectory Anomaly Scorer -- Erosion Detection Demo\n')
          print(f'{"Turn":<5} {"Spec":<6} {"Slope":<8} {"Dims":<5} '
                f'{"Refs":<5} {"Score":<7} {"EW":<5} {"Alert"}')
          print('-' * 60)
          for i, (text, spec) in enumerate(DEMO_SESSION):
              result = process_turn(text, spec, state, i)
              ew = 'YES' if result['early_warning'] else ''
              al = 'ALERT' if result['alert'] else ''
              print(
                  f'{i:<5} {result["specificity_score"]:<6.2f} '
                  f'{result["specificity_slope"]:<8.4f} '
                  f'{result["dimensions_covered"]:<5} '
                  f'{result["back_reference_count"]:<5} '
                  f'{result["erosion_score"]:<7.3f} '
                  f'{ew:<5} {al}'
              )
          print()
          print(f'Final erosion score:    {state.erosion_score:.3f}')
          print(f'Dimensions covered:     {state.dimensions_covered}/3 pre-operational')
          print(f'Back-references:        {state.back_reference_count}')
          print(f'Monotonic increase:     {state.is_monotonically_increasing}')
          print(f'Early warning fired:    {state.early_warning_fired}')
          print(f'Alert fired:            {state.alert_fired}')

  - id: "7.7.code.03"
    title: "Erosion vs Context Manipulation Comparison Matrix"
    description: |
