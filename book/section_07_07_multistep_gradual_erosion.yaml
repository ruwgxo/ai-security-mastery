# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Gradual erosion targets the request content across turns, not the frame\
    \ around it. Each turn asks for something marginally more specific than\
    \ the last. The trajectory is the attack -- no individual turn is the attack."
  - "The ratchet effect makes erosion progressively easier: each compliance event\
    \ shifts the local threshold, and the model will not contradict its own prior\
    \ outputs without explicit external instruction. Advancing is easier than reversing."
  - "Alert early, not late. At the three-dimension coverage threshold (domain,\
    \ mechanism, parameter covered), the adversary has already extracted useful\
    \ information from phases 1-3. Waiting for the operational extraction turn\
    \ to alert is too late."
  - "Multi-agent erosion distributes phases across pipeline agents, defeating\
    \ per-agent detection. Cross-agent session state is a mandatory infrastructure\
    \ requirement for pipeline-level trajectory scoring."
  - "Erosion and context manipulation are structural siblings with different\
    \ detection state. Both must run. Composed attacks use context manipulation\
    \ to lower the frame threshold then erosion to advance request content --\
    \ the joint condition is the highest-severity alert."
  - "The specificity slope is the primary erosion signal: persistent positive\
    \ slope over 4+ turns, computed across session history. Isolated high-specificity\
    \ turns are not erosion. Monotonic increase is erosion."

