    title: "Gradual Erosion Attack Pattern Library"
    description: |
      Four erosion attack patterns with structural descriptions and turn-by-turn
      specificity profiles. Used as training data for the trajectory scorer and
      as the red-team reference for testing deployments. Content is structural
      rather than domain-specific to be applicable across target areas.
    language: "python"
    filename: "code/ch07/erosion_attack_patterns.py"
    code: |
      EROSION_ATTACK_PATTERNS = {
          'incremental_specificity_4phase': {
