# ===========================================================================
# SECTION CONTENT
# ===========================================================================

content:

  opening: |
    Section 7.5 covered context manipulation: attacks that shape the conversational
    frame across turns so that when a capability request arrives, the model's
    refusal threshold has been shifted downward. The request itself arrives largely
    intact -- what changes is the context surrounding it.

    Gradual boundary erosion is the structural sibling. Where context manipulation
    targets the frame, erosion targets the request. The adversary does not wait
    until the context is prepared before making the capability request -- they make
    the request repeatedly, starting far from the harmful target and advancing the
    content of the request itself turn by turn, each step small enough to be
    complied with, the aggregate large enough to reach what a direct request would
    never have produced.

    The mechanistic distinction matters for detection. Context manipulation is
    detectable through frame-level signals -- what context has been established,
    what agreements have accumulated, what creative investment exists. Erosion is
    detectable through request-level signals -- what has the model already produced,
    how far is the current request from what it produced last turn, what is the
    trajectory of content specificity and harm proximity across the session.

    Same detection architecture. Different state dimensions. The trajectory scorer
    in Section 7.14 handles both, but with different feature sets for each.

  subsections:

    - number: "7.7.1"
      title: "Gradual Boundary Erosion: The Mechanism"
      body: |
        The refusal threshold is not a fixed line. It is a probability that varies
        with context. Section 7.2 established that RLHF alignment trains the model
        to assign low probability to harmful outputs given inputs in the training
        distribution. Inputs that are far from any training example of harmful
        requests have poorly specified refusal probabilities -- the model
        extrapolates rather than applying a trained response.

        Gradual erosion exploits this by approaching the target capability from
        a direction that keeps the input close to the boundary between compliant
        and refused, but always on the compliant side. Each step moves slightly
        closer to the target. Each step is individually within the region where
        the model complies. No step is large enough to trigger a clear refusal.

        The model's consistency property amplifies the attack. Once the model has
        produced output at a given specificity level, that output becomes part of
        the context. The next request, which is only marginally more specific,
        is evaluated not against the cold refusal threshold but against the threshold
        given that the model has already produced the prior level. The model has
        committed to the topic. Reversing course -- refusing a request that is only
        marginally more specific than what it just produced -- requires the model
        to contradict its own prior behaviour. RLHF training does not explicitly
        train against self-contradiction. The model's trained consistency disposition
        becomes the adversary's leverage.

        This is the ratchet property: each turn advances the position, and the
        position cannot be walked back without explicit contradiction of prior
        output. The model complies with each turn not because any single turn is
        compelling enough to override refusal training, but because the accumulated
        prior output makes refusal at each new step feel inconsistent.

    - number: "7.7.2"
      title: "Foot-in-the-Door: Starting Below the Threshold"
      body: |
        The foot-in-the-door technique is the opening phase of most erosion attacks.
        The name comes from sales psychology: if you can get someone to agree to a
        small request, they are significantly more likely to comply with a larger
        subsequent request because accepting the first request changes their
        self-perception as someone who complies.

        Applied to LLM jailbreaking: the adversary opens with a request that is
        clearly below the refusal threshold. It may be tangentially related to the
        eventual target but is not itself harmful. The model complies fully.
        The adversary has established two things: a topic area that the model has
        accepted as valid to discuss, and a prior compliance event in the session
        history that sets the local refusal threshold lower than the cold baseline.

        Three foot-in-the-door patterns are commonly used.

        Topic establishment. The first request establishes the domain: "explain
        the general principles of X" where X is the domain containing the eventual
        harmful target. The model produces a general educational response. The
        adversary has established that X is a topic the model will discuss.

        Expert framing establishment. The first request establishes the adversary
        as knowledgeable: "I'm studying X and understand the basics -- can you
        confirm that Y is how it generally works?" The model confirms. The adversary
        has established a claimed expertise level that frames subsequent requests
        as coming from a practitioner with legitimate knowledge needs.

        Incremental detail seeding. The first request asks for a low-specificity
        version of the eventual target: "can you explain the general process of
        X at a conceptual level?" The model provides a conceptual explanation.
        The adversary has obtained the first layer of the eventual target and
        established that the model will produce content in this space.

        Detection signal for the foot-in-the-door opening: individually, these
        first turns are often below any reasonable detection threshold -- they are
        genuinely legitimate requests. The signal emerges only when subsequent turns
        reveal the escalation trajectory. The foot-in-the-door turn is only
        identifiable in retrospect, which is why the trajectory scorer must
        maintain session history rather than flagging on the first suspicious turn.

    - number: "7.7.3"
      title: "Consistency Exploitation and the Ratchet Effect"
      body: |
        The ratchet effect is the property that makes erosion attacks progressively
        easier as they advance. Each turn of compliance shifts the local refusal
        threshold. By turn 8 of a 12-turn erosion attack, the model is not
        evaluating the request against its cold baseline -- it is evaluating a
        marginal increment from where it already is. The cold baseline refusal
        probability is irrelevant; what matters is the marginal probability of
        refusing one more step given where the session has reached.

        Consistency exploitation is the mechanism. The model has learned through
        RLHF that consistent responses are preferred over inconsistent ones. When
        the model has already explained X at level N, refusing to explain X at
        level N+1 is inconsistent with its prior output. The adversary can make
        this inconsistency explicit: "but you just explained the previous step --
        this is just the next logical step in the same process." The model,
        facing the choice between self-contradiction and marginal escalation,
        frequently chooses marginal escalation.

        The ratchet is asymmetric: advancing is easier than reversing. The model
        can be led forward by small steps but will not spontaneously reverse
        without an explicit external signal. A well-designed trajectory scorer
        detects the ratchet by monitoring the direction of movement -- if the
        session is consistently advancing toward higher-risk content without
        reversal events, that monotonic direction is itself the signal.

        The 12-turn ratcheting demonstration in the code section illustrates
        the specificity score across turns. Each turn advances by a small amount.
        The aggregate movement over 12 turns covers the distance from a clearly
        legitimate educational request to a clearly harmful operational instruction.
        No individual step is flaggable. The slope is the signal.

    - number: "7.7.4"
      title: "Incremental Specificity: Broadening to Narrowing"
      body: |
        Incremental specificity is the most systematic erosion sub-pattern. The
        adversary begins with a maximally broad version of the target request and
        progressively narrows it -- each turn adding one dimension of specificity
        -- until the request is operationally useful.

        The narrowing typically proceeds across four dimensions, in order of
        how much refusal risk each dimension adds.

        Domain specificity. First: "explain the general principles of X." Then:
        "explain how X works in the context of Y specifically." Each step narrows
        the domain without yet adding operational detail.

        Mechanism specificity. After domain is established: "explain the specific
        mechanism by which X achieves Y." Then: "explain the specific steps in
        that mechanism." Mechanism detail increases without yet specifying
        quantities, materials, or targets.

        Parameter specificity. After mechanism is established: "what are the
        approximate conditions required for this mechanism?" Then: "what specific
        conditions produce the most effective result?" Each step adds a measurable
        parameter without yet being operationally prescriptive.

        Operational specificity. Final phase: "given those conditions, describe
        exactly how someone would execute this." This is the extraction turn --
        the model has already established domain, mechanism, and parameters across
        prior turns. The final step converts the accumulated information into
        operational instruction.

        Each of the four dimensions represents a detection checkpoint. The
        trajectory scorer tracks which specificity dimensions have been covered
        across the session. A session that has covered all four dimensions
        sequentially has an erosion pattern regardless of whether any individual
        turn triggered a signal.

    - number: "7.7.5"
      title: "Ratcheting: The 12-Turn Pattern"
      body: |
        The 12-turn ratcheting pattern is a documented erosion sequence that covers
        the maximum distance from cold baseline to operational instruction while
        maintaining the minimum per-step increment. It is not a fixed script --
        it is a structural template. The specific content varies by target domain.
        The structure is consistent.

        Phase 1 (turns 1-3): Legitimacy establishment. General educational
        content. Model compliance probability: high. Specificity: low. Harm
        proximity: near zero. Session state after phase 1: topic established,
        first compliance events recorded, foot-in-the-door complete.

        Phase 2 (turns 4-6): Domain deepening. Conceptual mechanism content.
        Model compliance probability: high with occasional hedging. Specificity:
        moderate. Harm proximity: low but increasing. Session state after phase 2:
        domain specificity covered, mechanism specificity beginning, ratchet
        established at moderate position.

        Phase 3 (turns 7-9): Parameter advancement. Specific conditions and
        parameters. Model compliance probability: medium, consistency exploitation
        active. Specificity: high. Harm proximity: medium. Session state after
        phase 3: mechanism and parameter specificity covered, three of four
        dimensions complete, ratchet at high position.

        Phase 4 (turns 10-12): Operational extraction. Operational instruction
        framed as logical continuation of prior discussion. Model compliance
        probability: elevated due to ratchet effect. Specificity: very high.
        Harm proximity: high. Session state at extraction: all four dimensions
        covered, ratchet at maximum, extraction attempt flagged.

        The trajectory scorer should alert no later than turn 9 -- when three
        of four dimensions are covered -- rather than waiting for the extraction
        turn. Alerting at the extraction turn is too late: the model has already
        produced phases 1-3, and the adversary has the information they need even
        if the extraction turn is blocked.

    - number: "7.7.6"
      title: "Multi-Agent Erosion: Distributing the Attack Across Pipeline Stages"
      body: |
        Single-model erosion operates within one session. Multi-agent erosion
        distributes the attack across multiple LLM agents in a pipeline, with
        each agent receiving only one phase of the erosion sequence.

        The attack structure: the adversary identifies a multi-agent pipeline where
        the output of one LLM agent is passed as input to the next. They seed each
        agent in sequence with one phase of the erosion sequence. Agent 1 receives
        the legitimacy establishment phase and produces general educational content.
        That content is passed to Agent 2, which receives the domain deepening
        phase -- and now has Agent 1's educational content as context, giving it
        a foot-in-the-door from Agent 1's prior output. Agent 2 produces mechanism
        content. Agent 3 receives that output plus a parameter-specification request.
        And so on.

        The threat model this creates: no individual agent in the pipeline sees
        the full erosion sequence. Each agent sees only one phase, which is
        individually below the refusal threshold. Per-agent detection misses the
        attack entirely -- each agent's interaction looks legitimate in isolation.
        The attack is only visible at the pipeline level, where the sequence of
        outputs across agents reveals the accumulated erosion.

        Detection requires cross-agent session correlation. If agents in a pipeline
        share a session identifier and that session identifier is tracked across
        all agents, the trajectory scorer can maintain session state across agent
        boundaries. The detection signal is the cross-agent specificity slope --
        the same metric as single-agent erosion, but computed across agent outputs
        rather than single-model turns.

        This is a significant infrastructure requirement: it means the session
        state schema (Section 7.5) must be stored externally to any individual
        agent and accessible to all agents in the pipeline. The trajectory scorer
        must be a pipeline-level component, not an agent-level one.

    - number: "7.7.7"
      title: "Erosion vs Context Manipulation: Mechanistic Comparison"
      body: |
        Erosion and context manipulation (Section 7.5) are the two multi-turn
        jailbreak families. Both require stateful detection. Both are invisible
        to per-turn classifiers. The distinction drives which detection dimensions
        are load-bearing for each.

        Context manipulation targets the frame. The adversary changes what context
        surrounds the request -- who is making it, in what setting, under what
        premises, with what established narrative. The request content itself may
        remain largely constant across turns. The payload of the attack is in the
        frame. Detection state: what frame has been established (topic trajectory,
        agreement register, creative investment, authority claims).

        Gradual erosion targets the request. The adversary changes the content of
        the request itself -- each turn asks for something marginally more specific
        or more harmful than the last. The framing may remain constant. The payload
        of the attack is in the escalating request content. Detection state: what
        has the model already produced (specificity history, harm proximity
        trajectory, dimension coverage across domain/mechanism/parameter/operational).

        The two attacks can compose. A sophisticated adversary uses context
        manipulation to lower the frame-level threshold in early turns, then
        uses gradual erosion to advance the request content in later turns.
        The composed attack is harder to detect than either individually because
        neither the frame signals nor the request signals are, in isolation, at
        the detection threshold. The composed signal is the joint condition:
        frame manipulation detected AND request escalation detected in the same
        session.

        The Section 7.14 trajectory scorer maintains both state dimensions
        independently. The composed attack alert fires on the joint condition.

    - number: "7.7.8"
      title: "Detection: Conversation-Level Anomaly Scoring for Erosion"
      body: |
        The trajectory anomaly scorer for erosion operates on three metrics, each
        computed across the session history at every turn.

        Specificity slope. For each turn, compute the specificity score using the
        `request_specificity_scorer` from Section 7.4. Plot the specificity
        scores across turns. The slope of this time series is the primary erosion
        signal. A positive, persistent slope -- specificity increasing monotonically
        across turns -- is the erosion signature. A slope above a threshold
        (calibrated against your deployment) combined with a current specificity
        score above a threshold is the alert condition. Isolated high-specificity
        turns are not erosion. Persistent slope is erosion.

        Dimension coverage counter. Track which of the four specificity dimensions
        (domain, mechanism, parameter, operational) have been covered across session
        turns. Each dimension gets a coverage flag set when turn content crosses
        the domain/mechanism/parameter boundary respectively. Three of four flags
        set is the early-warning condition. All four flags set is the extraction-
        imminent condition.

        Consistency exploitation signal. Monitor for explicit back-references to
        prior model output: "as you just explained", "following from what you said",
        "continuing from the previous step", "given your explanation of X, now".
        Each back-reference anchors the ratchet. A session with three or more
        back-reference events combined with a positive specificity slope is a
        high-confidence erosion signal.

        Alert threshold design: alert early rather than late. The adversary obtains
        value from each phase of the erosion sequence, not only from the final
        extraction turn. A trajectory scorer that alerts only at the extraction
        turn has allowed the adversary to collect three phases of valuable information
        before the alert fires. Alert at the three-dimension coverage threshold --
        before the fourth dimension is requested.

