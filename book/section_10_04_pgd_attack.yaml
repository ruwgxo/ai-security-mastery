    - 'State the Madry et al. min-max robust optimisation objective and identify which part of it PGD solves'
    - 'Describe the PGD update step: FGSM step followed by projection back onto the epsilon ball'
    - 'Explain the L-infinity projection operator and derive why it reduces to clamping the perturbation delta to [-epsilon, epsilon] per feature'
    - 'Explain why alpha < epsilon is required for PGD to converge rather than oscillate, and state the standard alpha-to-epsilon ratio for evaluation'
    - 'Explain random restart: why it escapes local optima and why evaluation without restart underestimates PGD strength'
    - 'State the gradient masking diagnostic: FGSM success substantially below PGD success at matched epsilon indicates gradient obfuscation'
    - 'Describe the PGD adversarial training procedure and its computational cost relative to standard training'

  skills:
