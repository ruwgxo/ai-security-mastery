    - 'Implement the L2 projection operator and L2-PGD'
    - 'Run a PGD robustness evaluation across epsilon values and produce the standard robustness report'
    - 'Apply the gradient masking diagnostic to a candidate defence by comparing FGSM and PGD success rates'
    - 'Generate PGD adversarial examples for adversarial training data augmentation'

  security_mindset:
    - 'Treat PGD success rate (not FGSM) as the truthful measure of a model''s empirical adversarial robustness'
    - 'Recognise that any defence claiming robustness without reporting PGD evaluation results is unverified'
    - 'Understand that PGD adversarial training creates a genuine accuracy-robustness trade-off that must be documented explicitly for each deployment'
