section_overview:
  one_line_summary: 'PGD solves the inner maximisation problem of robust optimisation by iterating FGSM steps with projection back onto the epsilon ball, making it the canonical empirical robustness evaluation adversary.'
  why_this_section_exists: |
    PGD is the section with the most production consequence in Chapter 10. Every empirical
    robustness claim in the adversarial ML literature is evaluated against PGD. Section 10.15
    adversarial training uses PGD as the inner optimiser. Section 10.14 certified robustness is
    evaluated against PGD. The detection primitives in Sections 10.11-10.12 are calibrated
    against PGD. Understanding PGD precisely -- not as "iterative FGSM" but as the solution to
    the inner maximisation problem of the Madry et al. robust optimisation framework -- is the
    prerequisite for every defence section that follows.
  position_in_chapter: |
    Section 10.4 is the second white-box attack implementation and the most important evaluation
    tool in Chapter 10. It inherits the FGSM gradient-sign primitive from Section 10.3 and adds
    the projection operator, step-size hyperparameter, and random restart. Every subsequent
    defence claim -- "robust to PGD at epsilon=8/255" -- is measured with the evaluator built
    in this section.

