deliverables:

  deliverable_1:
    title: 'PGD Core Implementation'
    filename: 'pgd_attack.py'
    description: 'Production-quality L-infinity PGD with configurable step size, iterations, multi-restart tracking via per-sample loss, and both targeted and untargeted modes'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Inputs assumed normalised to [0, 1].
      Imports ToyLinear from fgsm_attack.py for demonstration.
      Critical correctness: project delta from original x, not from x_t.
    code: |
      # pgd_attack.py
      # Section 10.4: PGD -- Projected Gradient Descent
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from typing import Optional


      def pgd_linf(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          epsilon: float,
          alpha: float,
          n_steps: int,
          n_restarts: int = 1,
          targeted: bool = False,
          clip_min: float = 0.0,
          clip_max: float = 1.0,
          criterion: Optional[nn.Module] = None,
      ) -> Tensor:
          '''
          PGD L-infinity adversarial attack (Madry et al. 2018).

          Solves: argmax_{||delta||_inf <= epsilon} L(f(x + delta), y)
          via k steps of projected gradient ascent with optional random restart.

          Args:
              model:      PyTorch classifier (eval mode recommended)
              x:          Input batch, shape (N, *), normalised to [clip_min, clip_max]
              y:          True labels (untargeted) or target labels (targeted)
              epsilon:    L-infinity perturbation budget
              alpha:      Step size per iteration; must satisfy alpha < epsilon
              n_steps:    Number of PGD iterations per restart
              n_restarts: Number of random restarts; best adversarial per sample kept
              targeted:   If True, minimise loss for y (treat y as target class)
              clip_min:   Minimum valid input value
              clip_max:   Maximum valid input value
              criterion:  Loss function (default: CrossEntropyLoss, reduction=none)

          Returns:
              best_x_adv: Adversarial examples with highest per-sample loss across restarts
          '''
          if criterion is None:
              criterion = nn.CrossEntropyLoss(reduction='none')

          direction = -1.0 if targeted else 1.0
          x = x.detach()

          # Track best adversarial example per sample across all restarts
          best_loss = torch.full((x.size(0),), -float('inf'), device=x.device)
          best_x_adv = x.clone()

          for _ in range(n_restarts):
              # --- Initialise: random point in epsilon ball ---
              delta_init = torch.zeros_like(x).uniform_(-epsilon, epsilon)
              x_adv = torch.clamp(x + delta_init, clip_min, clip_max).detach()

              for step in range(n_steps):
                  # Enable gradient on current iterate
                  x_adv = x_adv.detach().requires_grad_(True)

                  # Forward + per-sample loss
                  per_sample_loss = criterion(model(x_adv), y)
                  total_loss = direction * per_sample_loss.sum()

                  # Backward
                  model.zero_grad()
                  total_loss.backward()

                  with torch.no_grad():
                      # FGSM step (gradient ascent for untargeted; descent for targeted)
                      grad_sign = x_adv.grad.data.sign()
                      x_step = x_adv + direction * alpha * grad_sign

                      # L-infinity projection: clamp total delta from ORIGINAL x
                      delta = torch.clamp(x_step - x, -epsilon, epsilon)

                      # Input validity clip
                      x_adv = torch.clamp(x + delta, clip_min, clip_max)

              # --- Multi-restart: keep per-sample best ---
              with torch.no_grad():
                  final_loss = criterion(model(x_adv), y)
                  improved = final_loss > best_loss
                  best_loss[improved] = final_loss[improved]
                  best_x_adv[improved] = x_adv[improved]

          return best_x_adv.detach()


      def attack_success_rate(
          model: nn.Module,
          x_adv: Tensor,
          y_true: Tensor,
      ) -> float:
          with torch.no_grad():
              preds = model(x_adv).argmax(dim=1)
          return (preds != y_true).float().mean().item()


      def pgd_convergence_curve(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          epsilon: float,
          alpha: float,
          n_steps: int,
          n_restarts: int = 1,
      ) -> list:
          '''
          Return per-step average loss for convergence diagnostics.
          Runs one restart; tracks loss at each PGD step.
          '''
          criterion = nn.CrossEntropyLoss()
          x = x.detach()
          delta_init = torch.zeros_like(x).uniform_(-epsilon, epsilon)
          x_adv = torch.clamp(x + delta_init, 0.0, 1.0).detach()
          losses = []

          for step in range(n_steps):
              x_adv = x_adv.detach().requires_grad_(True)
              loss = criterion(model(x_adv), y)
              losses.append(loss.item())
              model.zero_grad()
              loss.backward()
              with torch.no_grad():
                  x_step = x_adv + alpha * x_adv.grad.data.sign()
                  delta = torch.clamp(x_step - x, -epsilon, epsilon)
                  x_adv = torch.clamp(x + delta, 0.0, 1.0)
          return losses


      # --- Demo ---

      def demo() -> None:
          try:
              from fgsm_attack import ToyLinear, attack_success_rate as fgsm_asr
              from fgsm_attack import fgsm
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(64, 1, 28, 28)
          y = torch.randint(0, 10, (64,))
          eps = 8.0 / 255.0
          alpha = eps / 4.0

          print('PGD L-inf demo on ToyLinear (synthetic data)')
          print(f'epsilon = {eps:.4f} ({eps * 255:.1f}/255), alpha = {alpha:.4f}')
          print()

          configs = [
              ('FGSM (k=1)', 1, 1),
              ('PGD k=7', 7, 1),
              ('PGD k=20', 20, 1),
              ('PGD k=40', 40, 1),
              ('PGD k=40 R=5', 40, 5),
          ]

          for name, k, r in configs:
              if k == 1 and r == 1:
                  x_adv = fgsm(model, x, y, epsilon=eps)
              else:
                  x_adv = pgd_linf(model, x, y, epsilon=eps, alpha=alpha,
                                   n_steps=k, n_restarts=r)
              rate = attack_success_rate(model, x_adv, y)
              l_inf = (x_adv - x).abs().max().item()
              print(f'  {name:<22} success={rate:.3f}  L-inf={l_inf:.4f}')

          print()
          print('Convergence curve (PGD k=40, R=1):')
          losses = pgd_convergence_curve(model, x, y, eps, alpha, n_steps=40)
          for step in [0, 4, 9, 19, 39]:
              print(f'  step {step + 1:>3}: loss = {losses[step]:.4f}')


      if __name__ == '__main__':
          demo()

  deliverable_2:
    title: 'L2-PGD Variant'
    filename: 'pgd_l2_variant.py'
    description: 'L2-PGD with vector rescale projection operator; comparison of L-infinity and L2 PGD at matched perturbation budget on the same model'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib.
      Import pgd_linf, ToyLinear from pgd_attack.py and fgsm_attack.py.
    code: |
      # pgd_l2_variant.py
      # Section 10.4: L2-PGD Implementation
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from typing import Optional


      def project_l2(delta: Tensor, epsilon: float) -> Tensor:
          '''
          Project delta onto the L2 ball of radius epsilon.
          If ||delta||_2 > epsilon: rescale to epsilon.
          If ||delta||_2 <= epsilon: return unchanged.
          Operates per-sample in a batch.
          '''
          # Flatten each sample for norm computation
          batch_size = delta.size(0)
          flat = delta.view(batch_size, -1)
          norms = flat.norm(p=2, dim=1, keepdim=True)
          # Scale = min(epsilon / norm, 1.0); apply only where norm > epsilon
          scale = torch.clamp(epsilon / norms, max=1.0)
          projected_flat = flat * scale
          return projected_flat.view_as(delta)


      def pgd_l2(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          epsilon: float,
          alpha: float,
          n_steps: int,
          n_restarts: int = 1,
          targeted: bool = False,
          clip_min: float = 0.0,
          clip_max: float = 1.0,
          criterion: Optional[nn.Module] = None,
      ) -> Tensor:
          '''
          PGD L2 adversarial attack.
          L2 step: x_t + alpha * g / ||g||_2
          L2 projection: rescale delta to L2 ball of radius epsilon.
          '''
          if criterion is None:
              criterion = nn.CrossEntropyLoss(reduction='none')

          direction = -1.0 if targeted else 1.0
          x = x.detach()
          best_loss = torch.full((x.size(0),), -float('inf'), device=x.device)
          best_x_adv = x.clone()

          for _ in range(n_restarts):
              # Random L2 start: sample direction uniformly on L2 sphere, scale by random radius
              delta_init = torch.randn_like(x)
              flat = delta_init.view(x.size(0), -1)
              norms = flat.norm(p=2, dim=1, keepdim=True).view(x.size(0), *([1] * (x.dim() - 1)))
              r = torch.zeros(x.size(0), *([1] * (x.dim() - 1)), device=x.device).uniform_(0, 1)
              delta_init = epsilon * r * (delta_init / (norms + 1e-8))
              x_adv = torch.clamp(x + delta_init, clip_min, clip_max).detach()

              for step in range(n_steps):
                  x_adv = x_adv.detach().requires_grad_(True)
                  per_sample_loss = criterion(model(x_adv), y)
                  total_loss = direction * per_sample_loss.sum()
                  model.zero_grad()
                  total_loss.backward()

                  with torch.no_grad():
                      grad = x_adv.grad.data
                      # L2 step: normalise gradient to unit L2 norm, scale by alpha
                      flat_grad = grad.view(x.size(0), -1)
                      grad_norm = flat_grad.norm(p=2, dim=1, keepdim=True).view(
                          x.size(0), *([1] * (x.dim() - 1)))
                      grad_unit = grad / (grad_norm + 1e-8)
                      x_step = x_adv + direction * alpha * grad_unit

                      # L2 projection of total delta
                      delta = project_l2(x_step - x, epsilon)
                      x_adv = torch.clamp(x + delta, clip_min, clip_max)

              with torch.no_grad():
                  final_loss = criterion(model(x_adv), y)
                  improved = final_loss > best_loss
                  best_loss[improved] = final_loss[improved]
                  best_x_adv[improved] = x_adv[improved]

          return best_x_adv.detach()


      def compare_l_inf_l2(model, x, y, eps_linf, eps_l2, n_steps=40, n_restarts=3):
          '''Compare L-inf and L2 PGD at independently specified budgets.'''
          from pgd_attack import pgd_linf, attack_success_rate

          alpha_linf = eps_linf / 10.0
          alpha_l2 = eps_l2 / 10.0

          x_adv_linf = pgd_linf(model, x, y, eps_linf, alpha_linf, n_steps, n_restarts)
          x_adv_l2 = pgd_l2(model, x, y, eps_l2, alpha_l2, n_steps, n_restarts)

          rate_linf = attack_success_rate(model, x_adv_linf, y)
          rate_l2 = attack_success_rate(model, x_adv_l2, y)

          linf_actual = (x_adv_linf - x).abs().max().item()
          l2_actual = (x_adv_l2 - x).view(x.size(0), -1).norm(p=2, dim=1).mean().item()

          print(f'L-inf PGD: success={rate_linf:.3f}, actual L-inf={linf_actual:.4f}')
          print(f'L2   PGD: success={rate_l2:.3f}, actual L2 mean={l2_actual:.4f}')
          return rate_linf, rate_l2


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(64, 1, 28, 28)
          y = torch.randint(0, 10, (64,))

          print('L-inf vs L2 PGD comparison (ToyLinear, synthetic data)')
          compare_l_inf_l2(
              model, x, y,
              eps_linf=8.0 / 255.0,
              eps_l2=0.5,
              n_steps=20,
              n_restarts=3,
          )

  deliverable_3:
    title: 'PGD vs FGSM Comparison'
    filename: 'pgd_vs_fgsm_comparison.py'
    description: 'Side-by-side comparison of PGD and FGSM at matched epsilon: attack success rate, perturbation quality, and the gradient masking diagnostic (large FGSM-to-PGD gap signals gradient obfuscation)'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib.
      Import fgsm, ToyLinear from fgsm_attack.py; pgd_linf from pgd_attack.py.
    code: |
      # pgd_vs_fgsm_comparison.py
      # Section 10.4: PGD vs FGSM Attack Comparison and Gradient Masking Diagnostic
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import matplotlib.pyplot as plt
      from typing import List, Tuple


      GRADIENT_MASKING_THRESHOLD = 0.15  # PGD - FGSM gap above this = gradient masking suspected


      def compare_at_epsilon(
          model,
          x: torch.Tensor,
          y: torch.Tensor,
          epsilon: float,
          pgd_steps: int = 40,
          pgd_restarts: int = 5,
      ) -> Tuple[float, float]:
          from fgsm_attack import fgsm, attack_success_rate
          from pgd_attack import pgd_linf

          alpha = epsilon / 10.0
          x_fgsm = fgsm(model, x, y, epsilon=epsilon)
          x_pgd = pgd_linf(model, x, y, epsilon, alpha, pgd_steps, pgd_restarts)

          fgsm_rate = attack_success_rate(model, x_fgsm, y)
          pgd_rate = attack_success_rate(model, x_pgd, y)
          return fgsm_rate, pgd_rate


      def sweep_and_diagnose(
          model,
          x: torch.Tensor,
          y: torch.Tensor,
          epsilons: List[float],
          pgd_steps: int = 40,
          pgd_restarts: int = 5,
      ) -> None:
          fgsm_rates, pgd_rates, gaps = [], [], []

          for eps in epsilons:
              fr, pr = compare_at_epsilon(model, x, y, eps, pgd_steps, pgd_restarts)
              gap = pr - fr
              fgsm_rates.append(fr)
              pgd_rates.append(pr)
              gaps.append(gap)

          print(f'{"eps/255":<10} {"FGSM":<10} {"PGD":<10} {"gap":<10} {"diagnosis":<22}')
          print('-' * 64)
          for eps, fr, pr, gap in zip(epsilons, fgsm_rates, pgd_rates, gaps):
              diagnosis = 'gradient masking suspected' if gap > GRADIENT_MASKING_THRESHOLD else 'normal'
              marker = ' <-- FLAG' if gap > GRADIENT_MASKING_THRESHOLD else ''
              print(f'{eps * 255:<10.1f} {fr:<10.3f} {pr:<10.3f} {gap:<10.3f} {diagnosis}{marker}')

          return fgsm_rates, pgd_rates, gaps


      def plot_comparison(
          epsilons: List[float],
          fgsm_rates: List[float],
          pgd_rates: List[float],
          gaps: List[float],
          save_path: str = 'pgd_vs_fgsm.png',
      ) -> None:
          eps_255 = [e * 255 for e in epsilons]
          fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(13, 5))

          ax1.plot(eps_255, fgsm_rates, color='#e74c3c', linewidth=2,
                   marker='o', markersize=5, label='FGSM (k=1)')
          ax1.plot(eps_255, pgd_rates, color='#2980b9', linewidth=2,
                   marker='s', markersize=5, label='PGD-40 (R=5)')
          ax1.fill_between(eps_255, fgsm_rates, pgd_rates, alpha=0.15,
                           color='#8e44ad', label='Gap (PGD - FGSM)')
          ax1.set_xlabel('Epsilon (pixel units)', fontsize=11)
          ax1.set_ylabel('Attack success rate', fontsize=11)
          ax1.set_title('PGD vs FGSM Attack Success Rate', fontsize=11)
          ax1.legend(fontsize=9)
          ax1.grid(True, alpha=0.3)
          ax1.set_ylim(0, 1.05)

          colours = ['#e74c3c' if g > GRADIENT_MASKING_THRESHOLD else '#2980b9' for g in gaps]
          ax2.bar(eps_255, gaps, color=colours, alpha=0.8)
          ax2.axhline(GRADIENT_MASKING_THRESHOLD, color='grey', linestyle='--',
                      label=f'Masking threshold ({GRADIENT_MASKING_THRESHOLD})')
          ax2.set_xlabel('Epsilon (pixel units)', fontsize=11)
          ax2.set_ylabel('PGD - FGSM gap', fontsize=11)
          ax2.set_title('Gradient Masking Diagnostic\n(red bars = masking suspected)', fontsize=11)
          ax2.legend(fontsize=9)
          ax2.grid(True, alpha=0.3, axis='y')

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(64, 1, 28, 28)
          y = torch.randint(0, 10, (64,))

          epsilons = [i / 255 for i in [2, 4, 6, 8, 12, 16, 24, 32]]
          print('PGD vs FGSM comparison with gradient masking diagnostic')
          print('=' * 64)
          fr, pr, gaps = sweep_and_diagnose(model, x, y, epsilons, pgd_steps=20, pgd_restarts=3)
          plot_comparison(epsilons, fr, pr, gaps)

  deliverable_4:
    title: 'PGD Robustness Evaluator'
    filename: 'pgd_robustness_evaluator.py'
    description: 'Standard PGD robustness evaluation across epsilon values with convergence curve, gradient masking diagnostic, and formatted robustness report for production models'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib.
      Import pgd_linf, attack_success_rate from pgd_attack.py.
    code: |
      # pgd_robustness_evaluator.py
      # Section 10.4: PGD Robustness Evaluation Tool
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      import matplotlib.pyplot as plt
      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class RobustnessReport:
          model_name: str
          epsilon_values: List[float]
          clean_accuracy: float
          pgd_robust_accuracies: List[float]
          fgsm_success_rates: List[float]
          pgd_success_rates: List[float]
          masking_flags: List[bool]
          pgd_steps: int
          pgd_restarts: int


      def evaluate_clean_accuracy(model: nn.Module, x: torch.Tensor, y: torch.Tensor) -> float:
          with torch.no_grad():
              preds = model(x).argmax(dim=1)
          return (preds == y).float().mean().item()


      def robustness_sweep(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          epsilons: List[float],
          pgd_steps: int = 40,
          pgd_restarts: int = 5,
          masking_threshold: float = 0.15,
          model_name: str = 'model',
      ) -> RobustnessReport:
          from pgd_attack import pgd_linf, attack_success_rate
          from fgsm_attack import fgsm

          clean_acc = evaluate_clean_accuracy(model, x, y)
          pgd_robust_accs, fgsm_rates, pgd_rates, flags = [], [], [], []

          for eps in epsilons:
              alpha = eps / 10.0
              x_fgsm = fgsm(model, x, y, epsilon=eps)
              x_pgd = pgd_linf(model, x, y, eps, alpha, pgd_steps, pgd_restarts)

              fr = attack_success_rate(model, x_fgsm, y)
              pr = attack_success_rate(model, x_pgd, y)
              robust_acc = 1.0 - pr

              fgsm_rates.append(fr)
              pgd_rates.append(pr)
              pgd_robust_accs.append(robust_acc)
              flags.append((pr - fr) > masking_threshold)

          return RobustnessReport(
              model_name=model_name,
              epsilon_values=epsilons,
              clean_accuracy=clean_acc,
              pgd_robust_accuracies=pgd_robust_accs,
              fgsm_success_rates=fgsm_rates,
              pgd_success_rates=pgd_rates,
              masking_flags=flags,
              pgd_steps=pgd_steps,
              pgd_restarts=pgd_restarts,
          )


      def print_report(report: RobustnessReport) -> None:
          print(f'\nRobustness Report: {report.model_name}')
          print(f'PGD config: k={report.pgd_steps}, R={report.pgd_restarts}')
          print(f'Clean accuracy: {report.clean_accuracy:.3f}')
          print()
          print(f'{"eps/255":<10} {"FGSM_succ":<12} {"PGD_succ":<12} {"PGD_robust_acc":<16} {"masking?"}')
          print('-' * 62)
          for eps, fr, pr, ra, flag in zip(
              report.epsilon_values,
              report.fgsm_success_rates,
              report.pgd_success_rates,
              report.pgd_robust_accuracies,
              report.masking_flags,
          ):
              flag_str = 'FLAG: gradient masking' if flag else 'ok'
              print(f'{eps * 255:<10.1f} {fr:<12.3f} {pr:<12.3f} {ra:<16.3f} {flag_str}')

          if any(report.masking_flags):
              print()
              print('WARNING: gradient masking suspected at flagged epsilon values.')
              print('Run C&W (Section 10.5) or BPDA to verify actual robustness.')


      def plot_robustness_curve(
          report: RobustnessReport,
          save_path: str = 'pgd_robustness_curve.png',
      ) -> None:
          eps_255 = [e * 255 for e in report.epsilon_values]
          plt.figure(figsize=(8, 5))
          plt.plot(eps_255, [report.clean_accuracy] * len(eps_255),
                   color='grey', linestyle='--', label=f'Clean accuracy ({report.clean_accuracy:.2f})')
          plt.plot(eps_255, report.pgd_robust_accuracies,
                   color='#2980b9', linewidth=2, marker='s', markersize=5,
                   label=f'PGD robust accuracy (k={report.pgd_steps}, R={report.pgd_restarts})')
          plt.fill_between(eps_255, report.pgd_robust_accuracies,
                           [report.clean_accuracy] * len(eps_255),
                           alpha=0.1, color='#e74c3c', label='Accuracy-robustness gap')
          plt.xlabel('Epsilon (pixel units)', fontsize=11)
          plt.ylabel('Accuracy', fontsize=11)
          plt.title(f'PGD Robustness Curve: {report.model_name}', fontsize=11)
          plt.legend(fontsize=9)
          plt.grid(True, alpha=0.3)
          plt.ylim(0, 1.05)
          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(128, 1, 28, 28)
          y = torch.randint(0, 10, (128,))

          epsilons = [i / 255 for i in [2, 4, 8, 16, 24, 32]]
          report = robustness_sweep(
              model, x, y, epsilons,
              pgd_steps=20, pgd_restarts=3,
              model_name='ToyLinear (synthetic)',
          )
          print_report(report)
          plot_robustness_curve(report)

  deliverable_5:
    title: 'PGD Training Data Generator'
    filename: 'pgd_training_data_generator.py'
    description: 'Generates PGD adversarial examples batch-by-batch for adversarial training data augmentation; formatted for direct use by the Section 10.15 adversarial training loop'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import pgd_linf from pgd_attack.py.
      Configurable for both k=7 (Madry training) and k=40 (evaluation-grade).
    code: |
      # pgd_training_data_generator.py
      # Section 10.4: PGD Adversarial Training Data Generator
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from dataclasses import dataclass
      from typing import Iterator, Tuple


      @dataclass
      class PGDConfig:
          epsilon: float
          alpha: float
          n_steps: int
          n_restarts: int = 1
          clip_min: float = 0.0
          clip_max: float = 1.0

          @classmethod
          def madry_training(cls, epsilon: float) -> 'PGDConfig':
              '''Madry et al. k=7 training config.'''
              return cls(
                  epsilon=epsilon,
                  alpha=2.0 * epsilon / 3.0,
                  n_steps=7,
                  n_restarts=1,
              )

          @classmethod
          def evaluation_grade(cls, epsilon: float) -> 'PGDConfig':
              '''k=40, R=5 evaluation-grade config.'''
              return cls(
                  epsilon=epsilon,
                  alpha=epsilon / 10.0,
                  n_steps=40,
                  n_restarts=5,
              )


      def generate_adversarial_batch(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          config: PGDConfig,
      ) -> torch.Tensor:
          '''Generate PGD adversarial examples for one batch. Returns x_adv.'''
          from pgd_attack import pgd_linf
          return pgd_linf(
              model, x, y,
              epsilon=config.epsilon,
              alpha=config.alpha,
              n_steps=config.n_steps,
              n_restarts=config.n_restarts,
              clip_min=config.clip_min,
              clip_max=config.clip_max,
          )


      def adversarial_data_stream(
          model: nn.Module,
          data_loader: Iterator[Tuple[torch.Tensor, torch.Tensor]],
          config: PGDConfig,
      ) -> Iterator[Tuple[torch.Tensor, torch.Tensor]]:
          '''
          Yield (x_adv, y) pairs for each batch in data_loader.
          Intended as the inner adversary in a min-max adversarial training loop.
          Usage in Section 10.15:
              for x_adv, y in adversarial_data_stream(model, train_loader, pgd_config):
                  loss = criterion(model(x_adv), y)
                  loss.backward()
                  optimiser.step()
          '''
          model.eval()
          for x, y in data_loader:
              x_adv = generate_adversarial_batch(model, x, y, config)
              yield x_adv, y
          model.train()


      def benchmark_generation_cost(
          model: nn.Module,
          x: torch.Tensor,
          y: torch.Tensor,
          configs: dict,
      ) -> None:
          '''Compare wall-clock generation time for different PGD configs.'''
          import time
          print(f'{"Config":<22} {"steps":<8} {"restarts":<10} {"time_ms":<12} {"relative_cost"}')
          print('-' * 58)
          base_time = None
          for name, cfg in configs.items():
              start = time.perf_counter()
              generate_adversarial_batch(model, x, y, cfg)
              elapsed_ms = (time.perf_counter() - start) * 1000.0
              if base_time is None:
                  base_time = elapsed_ms
              rel = elapsed_ms / base_time
              print(f'{name:<22} {cfg.n_steps:<8} {cfg.n_restarts:<10} {elapsed_ms:<12.1f} {rel:.1f}x')


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(32, 1, 28, 28)
          y = torch.randint(0, 10, (32,))
          eps = 8.0 / 255.0

          configs = {
              'Madry training (k=7)': PGDConfig.madry_training(eps),
              'Fast eval (k=20 R=3)': PGDConfig(eps, eps / 5.0, 20, 3),
              'Eval-grade (k=40 R=5)': PGDConfig.evaluation_grade(eps),
          }

          print('PGD generation cost benchmark (batch_size=32, ToyLinear)')
          benchmark_generation_cost(model, x, y, configs)

          print()
          print('Demo: adversarial data stream (3 batches)')
          batches = [(torch.rand(16, 1, 28, 28), torch.randint(0, 10, (16,))) for _ in range(3)]
          cfg = PGDConfig.madry_training(eps)
          for i, (x_adv, y_batch) in enumerate(adversarial_data_stream(model, iter(batches), cfg)):
              print(f'  batch {i}: x_adv shape={tuple(x_adv.shape)}, L-inf={( x_adv - batches[i][0]).abs().max():.4f}')

common_mistakes:

  mistake_1:
    description: 'Using alpha >= epsilon as the step size, causing the perturbation to leave the epsilon ball every step and preventing convergence'
    why_it_happens: |
      The relationship between alpha and epsilon is not immediately obvious. Engineers
      who read "step size alpha" and choose alpha = epsilon (a natural round number)
      observe that the attack is fast to implement but produces strange adversarial examples
      with seemingly random success rates.
    consequence: |
      At alpha = epsilon, each FGSM step moves the perturbation from one edge of the epsilon
      ball to the other. The projection then clips it back. The attack oscillates along the
      boundary of the epsilon ball without converging to a local maximum. Attack success rate
      is erratic and typically lower than FGSM alone. Convergence curves show no clear rise.
    correct_approach: |
      Choose alpha = epsilon / k * c where c is typically 2 to 2.5. For k=40, alpha = epsilon/10
      is standard. For k=7 (Madry training), alpha = 2*epsilon/3 is standard. Always verify
      the convergence curve: a well-tuned alpha produces a smoothly rising loss curve that
      plateaus within k steps. If the curve is flat or oscillating, reduce alpha.

  mistake_2:
    description: 'Projecting x_adv directly to [x - epsilon, x + epsilon] rather than projecting the accumulated delta from the original x'
    why_it_happens: |
      The projection intuitively sounds like clamping the current adversarial example.
      Engineers write: x_adv = clip(x_adv, x - epsilon, x + epsilon) and clip to [0, 1].
      This appears correct for one step but accumulates error across multiple steps.
    consequence: |
      After each step, the projection clips x_adv relative to the current x_adv, not the
      original x. Over multiple steps the epsilon ball drifts: the adversarial example
      is no longer guaranteed to be within epsilon of the original input. The final L-infinity
      distance (x_adv - x_original).abs().max() may significantly exceed epsilon, invalidating
      the attack as a norm-constrained adversarial example.
    correct_approach: |
      Always compute delta = x_adv - x_original before projecting, and project the delta:
      delta = clip(x_step - x_original, -epsilon, epsilon); x_adv = clip(x_original + delta, 0, 1).
      The delta accumulates the total perturbation from the fixed original x. The L-infinity
      projection operates on the total delta. Verify with a post-hoc norm check:
      assert (best_x_adv - x).abs().max() <= epsilon + 1e-6.

  mistake_3:
    description: 'Reporting single-restart PGD robustness and treating it as equivalent to multi-restart PGD robustness'
    why_it_happens: |
      Multi-restart PGD is computationally expensive. Engineers run PGD with R=1 for speed and
      report the resulting robustness numbers. Papers sometimes omit the restart count, making
      it unclear whether the evaluation is single-restart or multi-restart.
    consequence: |
      Single-restart PGD underestimates attack strength because it converges to the local maximum
      nearest to the clean start, missing stronger adversarial examples reachable from other
      starting points in the epsilon ball. Robustness claims based on R=1 are overly optimistic;
      the model may be substantially less robust under R=5 or R=10.
    correct_approach: |
      For final robustness claims, always use R >= 5 with random starts. Report the restart count
      explicitly alongside epsilon, k, and alpha. Use the PGD robustness evaluator from this
      section which forces explicit restart configuration. The gradient masking diagnostic
      (large FGSM-to-PGD gap) becomes more reliable with more restarts.

  mistake_4:
    description: 'Using the same PGD configuration for adversarial training and for robustness evaluation'
    why_it_happens: |
      A single PGD configuration (epsilon, alpha, k) is used throughout the training and
      evaluation pipeline. Engineers train with k=40 PGD (extremely slow) or evaluate with
      k=7 PGD (too weak), because no distinction is made between the two use cases.
    consequence: |
      Training with k=40 is approximately 40x more expensive than standard training, making
      large-scale adversarial training infeasible. Evaluating with k=7 underestimates attack
      strength at the evaluation phase, producing overly optimistic robustness numbers.
    correct_approach: |
      Use separate PGD configs for training and evaluation: PGDConfig.madry_training(epsilon)
      for the inner training loop (k=7, alpha=2*epsilon/3, R=1) and PGDConfig.evaluation_grade(epsilon)
      for the robustness report (k=40, alpha=epsilon/10, R=5). The training config is optimised
      for speed at acceptable robustness; the evaluation config is optimised for attack strength.
      Both are implemented in PGDConfig in pgd_training_data_generator.py.

  mistake_5:
    description: 'Concluding that a model is robust because its PGD success rate is low, without checking whether PGD is properly converging on that model'
    why_it_happens: |
      PGD is claimed to be the strongest first-order adversary, so low PGD success rate
      is taken as evidence of robustness. The claim is true for models without gradient masking
      but fails for models with obfuscated gradients (shattered gradients, stochastic defences,
      non-differentiable preprocessing).
    consequence: |
      A model with shattered gradients produces near-zero gradients everywhere, making every
      PGD step ineffective. PGD shows 0% success, the model is declared robust, but C&W with
      BPDA achieves 95% success by approximating the non-differentiable components. Published
      defences including input transformations and certain certified defences have been broken
      this way.
    correct_approach: |
      Apply the gradient masking diagnostic first: compare FGSM success to PGD success at
      matched epsilon. If PGD barely outperforms FGSM, and both show near-zero success at
      epsilon where natural models are 60%+ vulnerable, gradient masking is likely. Follow up
      with C&W (Section 10.5) or BPDA. The robustness evaluator flags this automatically.
      Any defence claiming PGD robustness below 5% at epsilon=8/255 on CIFAR-10 without
      certified robustness should be treated with scepticism.

section_summary:

  compact: |
    PGD extends FGSM from a single step to an iterative projected gradient ascent that solves the
    inner maximisation problem of the Madry et al. robust optimisation objective. The algorithm
    iterates: take an FGSM step, project the accumulated delta back onto the L-infinity epsilon
    ball from the original x, clip to valid input range. Step size alpha < epsilon prevents
    oscillation; random restart (R >= 5) escapes local optima in the epsilon ball and produces
    the strongest first-order adversarial examples. PGD success rate is the canonical empirical
    robustness measure: the gradient masking diagnostic (PGD success substantially exceeds FGSM
    success) identifies defences that obfuscate gradients without achieving real robustness.
    PGD adversarial training uses k=7 inner steps to balance robustness and compute cost,
    producing models with ~8 percentage point clean accuracy loss and ~45% PGD robust accuracy
    on CIFAR-10 at epsilon=8/255.

  key_takeaways:
    - 'PGD solves the inner maximisation of the min-max robust optimisation problem; it is the adversary that adversarial training trains against'
    - 'The projection must operate on the accumulated delta from the original x, not on the current x_adv; this is the most common implementation error'
    - 'Random restart (R >= 5) is required for honest robustness evaluation; single-restart PGD underestimates attack strength'
    - 'PGD success rate, not FGSM success rate, is the truthful empirical robustness measure; use k=40 and R=5 for evaluation'
    - 'The gradient masking diagnostic: if PGD minus FGSM success gap exceeds 15 percentage points, the defence is obfuscating gradients rather than achieving robustness'
    - 'Training config (k=7, alpha=2*eps/3, R=1) and evaluation config (k=40, alpha=eps/10, R=5) are distinct; use the evaluator to report published robustness claims'

preview_section_10_05:
  title: 'Section 10.5: C&W -- The Carlini-Wagner Attack'
  summary: |
    Section 10.5 implements C&W L2 (Carlini and Wagner 2017), the optimality-focused attack
    designed specifically to evaluate and break proposed defences. Where FGSM and PGD fix epsilon
    and maximise loss, C&W minimises ||delta||_2 subject to the misclassification constraint --
    finding the minimum-norm adversarial example. The formulation uses a change of variables
    (tanh-space) to handle box constraints without projection, a binary search on the
    regularisation constant c to balance perturbation size against classification margin,
    and a confidence parameter kappa that controls how strongly wrong the adversarial output
    must be. High kappa C&W produces examples that survive squeezing and consistency checking,
    making it the correct attack for evaluating Track 7 defences. Carlini and Wagner''s original
    goal was breaking every proposed defence of 2016-2017; Section 10.5 uses C&W for the same
    purpose against Chapter 10 Track 7 primitives.

