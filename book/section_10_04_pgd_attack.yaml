prose_content:

  part_1:
    title: 'Madry et al. 2018: The Robust Optimisation Framework'
    body: |
      Madry, Makelov, Schmidt, Tsipras, and Vladu published "Towards Deep Learning Models Resistant
      to Adversarial Attacks" in 2018. The paper''s central contribution was not a new attack -- it
      was a new problem formulation that placed adversarial training on rigorous optimisation footing
      and identified PGD as the natural inner adversary.

      The standard training objective is: min_theta E_{(x,y)~D}[L(f_theta(x), y)]. This minimises
      expected loss over the natural data distribution. The Madry et al. robust training objective is:
      min_theta E_{(x,y)~D}[max_{delta: ||delta||_p <= epsilon, 0 <= x+delta <= 1} L(f_theta(x+delta), y)].
      The inner maximisation replaces the natural input x with the worst-case perturbed input within
      the epsilon ball. Training on this worst-case input produces a model that is simultaneously
      trying to be correct on the hardest possible version of each example.

      The inner maximisation problem -- find the delta within the epsilon ball that maximises loss --
      is the adversary''s problem. Solving it exactly is intractable in general. Madry et al. proposed
      PGD as the practical solver: iteratively take gradient steps that increase the loss, projecting
      back onto the epsilon ball after each step to maintain feasibility. The resulting delta is
      not the global maximum of the loss over the epsilon ball, but it is a strong local maximum
      and, empirically, a sufficient approximation for robust training.

      This framing has two production consequences. First, PGD adversarial training (Section 10.15)
      is the natural implementation of the robust optimisation objective -- each training step solves
      the inner PGD problem, then takes an outer gradient step. Second, PGD evaluation is the natural
      test of whether a defence addresses the robust optimisation objective: if a model is robust to
      PGD, it has addressed the inner maximisation problem for first-order adversaries.

  part_2:
    title: 'The PGD Algorithm: Iterative FGSM with Projection Derived'
    body: |
      PGD for L-infinity adversarial examples iterates the following update:

        x_{t+1} = Pi_{x, epsilon}(x_t + alpha * sign(nabla_{x_t} L(theta, x_t, y)))

      where Pi_{x, epsilon} is the projection operator that maps any input back to the set
      {x + delta : ||delta||_inf <= epsilon, 0 <= x + delta <= 1}. The initialisation x_0 is
      either x itself (clean start) or a uniformly random point within the epsilon ball (random
      start). The attack runs for k steps and returns x_k as the adversarial example.

      The update has three components. The FGSM component (sign of gradient) is identical to
      Section 10.3: take one gradient ascent step of size alpha in the sign direction. The
      projection component clips the cumulative perturbation delta = x_{t+1} - x to [-epsilon,
      epsilon] per feature, maintaining the L-infinity feasibility constraint. The input validity
      component clips the result to [0, 1] (or whatever the valid input range is), maintaining
      the physical feasibility constraint.

      The projection is applied to the delta (the total perturbation from the original x), not
      to x_t directly. This is the critical implementation detail. If you project x_t to
      [x - epsilon, x + epsilon] independently of x, you are projecting a moving target, and
      the cumulative perturbation can drift outside the intended epsilon ball. The correct
      implementation is: delta = clip(x_t + alpha * sign(grad) - x, -epsilon, epsilon);
      x_{t+1} = clip(x + delta, 0, 1). The delta accumulates the total perturbation from
      the original x across all steps; the L-infinity projection operates on the total delta;
      the input validity clip operates on the resulting input.

  part_3:
    title: 'The Projection Operator: L-infinity and L2'
    body: |
      The L-infinity projection is the simpler of the two norms and is the standard in PGD
      implementations. For a perturbation delta and epsilon budget, the projection clips each
      feature independently: delta_projected = clip(delta, -epsilon, epsilon). This is a
      component-wise operation -- each feature of the perturbation is independently constrained
      to lie in [-epsilon, epsilon]. The projected delta then satisfies ||delta_projected||_inf
      = max_i |delta_projected_i| <= epsilon by construction.

      The L2 projection requires a different operation. The L2 ball {delta : ||delta||_2 <= epsilon}
      is a hypersphere. To project delta onto this ball, check if ||delta||_2 > epsilon. If so,
      scale the entire delta vector down to lie on the boundary: delta_projected = epsilon *
      delta / ||delta||_2. If ||delta||_2 <= epsilon, the delta is already inside the ball and
      no projection is needed. Unlike L-infinity projection (which clips each feature independently),
      L2 projection rescales the entire perturbation vector, preserving its direction while bounding
      its magnitude.

      The two projections produce qualitatively different adversarial examples at matched norm budget.
      L-infinity projection produces uniform perturbations: every feature is perturbed by exactly
      epsilon. L2 projection allows some features to be perturbed by more than others as long as the
      total Euclidean norm stays bounded. In practice for images, L-infinity PGD produces uniform
      fine-grained noise; L2-PGD produces perturbations that concentrate on the most important
      features while leaving others relatively unchanged. C&W (Section 10.5) pushes this logic
      further by directly minimising the L2 norm of the perturbation, finding the minimum-norm
      adversarial example rather than operating at a fixed epsilon budget.

  part_4:
    title: 'Hyperparameters: Step Size, Iteration Count, and Convergence'
    body: |
      PGD has three hyperparameters with distinct roles: step size alpha (controls how far each
      FGSM step moves), iteration count k (controls how many steps), and restart count R (controls
      how many random initialisations are tried).

      Step size alpha must satisfy alpha < epsilon. If alpha >= epsilon, each step can take the
      perturbation from one side of the epsilon ball to the other in a single move, causing
      oscillation without convergence. The standard rule of thumb is alpha = epsilon / k * c
      where c is a small constant. For evaluation PGD with k=40, alpha = epsilon/4 to epsilon/8
      is common. For adversarial training PGD with k=7, alpha = 2*epsilon/3 is the standard from
      Madry et al. The smaller k in training requires a larger alpha to make progress in fewer steps.

      Iteration count k controls the trade-off between attack strength and computation. Empirically,
      attack success rate increases rapidly with the first 10-20 steps and then levels off. Beyond
      40-50 steps, the marginal improvement per additional step is typically small. For production
      robustness evaluation, k=40 with random restart is the standard. For adversarial training,
      k=7 is the common choice because training runs k forward-backward passes per example per
      training step -- at k=40, adversarial training is 40x more expensive than standard training,
      which is often infeasible at production model scales.

      The convergence diagnostic is the per-step loss curve: plot the average loss across examples
      as a function of step t. A well-converged PGD run shows a rapid rise in the first 10-20 steps
      followed by a plateau. If the curve is still rising steeply at k=40, increase k. If the curve
      plateaued at k=10, k=40 is wasteful. This diagnostic is built into the evaluator deliverable
      in this section.

  part_5:
    title: 'Random Restart: Escaping Local Optima in the Epsilon Ball'
    body: |
      Without random restart, PGD initialises from x_0 = x -- the clean input. The gradient at x
      points toward the nearest local maximum of the loss in the epsilon ball, and PGD converges
      to that local maximum. For many inputs, the nearest local maximum is not the global maximum:
      the loss landscape inside the epsilon ball has multiple local peaks, and a clean-start PGD
      finds only the nearest one from x.

      Random restart initialises x_0 from a random point inside the epsilon ball:
      x_0 = clip(x + Uniform(-epsilon, epsilon), 0, 1). Running PGD from this random start
      explores a different region of the loss landscape. Running R restarts and keeping the
      adversarial example with the highest loss across all restarts produces a stronger attack
      than any single restart because it samples multiple local optima and selects the best.

      The practical trade-off is compute: R restarts multiply the PGD cost by R. For evaluation,
      R=5 to R=20 is common. For adversarial training data generation, R=1 is standard because
      the training process itself provides diversity across batches -- each batch generates new
      adversarial examples from a fresh random start, covering different regions of the landscape
      across the full training run.

      The multi-restart implementation must track the per-sample best adversarial example, not
      the batch average. An adversarial example that increases loss for sample i but not for
      sample j should be kept for i and discarded for j. The per-sample loss tracking using
      nn.CrossEntropyLoss(reduction=''none'') is the correct implementation pattern and is
      demonstrated in the pgd_attack.py deliverable.

  part_6:
    title: 'PGD as the Universal First-Order Adversary and the Gradient Masking Diagnostic'
    body: |
      Madry et al.''s central claim is that PGD is the strongest first-order (gradient-based)
      adversary: any first-order attack can be viewed as a special case or approximation of PGD.
      FGSM is PGD with k=1 and no projection constraint. Iterative FGSM is PGD with fixed step
      size and no projection. Momentum-based PGD accumulates gradient direction across steps,
      smoothing the path through the loss landscape. The claim is empirically supported: for
      models without gradient masking, PGD with sufficient steps and restarts finds adversarial
      examples at least as strong as any published first-order attack.

      This universality claim has a direct implication for robustness evaluation: if a model is
      robust to PGD at epsilon, it is robust to all first-order attacks at epsilon. This makes
      PGD success rate the correct robustness benchmark, not FGSM success rate. A model that
      resists FGSM but not PGD has gradient masking: the gradient signal at x is obfuscated
      (by discontinuities, randomisation, or other mechanisms) such that a single gradient step
      produces a weak adversarial example, but multiple steps find the way through the obfuscation.

      The gradient masking diagnostic is: run both FGSM and PGD at the same epsilon on the same
      model and test set. If PGD success rate is substantially higher than FGSM success rate (say
      >15 percentage points), the model has gradient masking. This does not mean the model is
      robust -- gradient masking is a form of obfuscated robustness that is typically broken by
      adaptive attacks. C&W (Section 10.5) with BPDA (Backward Pass Differentiable Approximation)
      is designed specifically to break gradient masking defences.

      Any published defence that reports only FGSM robustness without PGD robustness should be
      treated with scepticism. The adversarial ML literature contains numerous examples of proposed
      defences that showed near-zero FGSM attack success rates but were trivially broken by PGD
      with sufficient iterations. The Carlini and Wagner (2017) evaluation guidelines -- which
      motivated the C&W attack in Section 10.5 -- explicitly identify FGSM-only evaluation as
      insufficient.

  part_7:
    title: 'PGD Adversarial Training and Computational Cost'
    body: |
      PGD adversarial training (the full version is covered in Section 10.15) uses the PGD inner
      loop as a data augmentation step during training. At each training step: (1) generate a
      PGD adversarial example for each batch element using k=7 inner steps; (2) take a training
      gradient step on the resulting adversarial examples to update model weights. The model is
      never trained on clean examples -- only on the worst-case adversarial examples from each
      batch.

      The computational cost is k times the cost of standard training per step. At k=7 (Madry
      et al. configuration), adversarial training is approximately 7x more expensive than standard
      training in wall-clock time. At k=40 (evaluation-grade PGD), it is approximately 40x more
      expensive. This cost is the primary reason production adversarial training uses k=7 rather
      than k=40 -- the adversarial training literature accepts a moderate reduction in empirical
      robustness in exchange for training feasibility.

      The accuracy-robustness trade-off from PGD adversarial training is significant and well-
      documented. On CIFAR-10 with epsilon=8/255, standard training achieves ~95% clean accuracy;
      Madry et al. PGD adversarial training achieves ~87% clean accuracy and ~45% PGD robust
      accuracy. The clean accuracy cost (~8 percentage points) is the price of certified empirical
      robustness. For production security systems, this trade-off must be explicitly documented:
      the operational threshold for a fraud classifier or content moderator changes when the model
      is adversarially trained, and the decision boundary shift must be recalibrated post-training.

      The pgd_training_data_generator.py deliverable produces PGD adversarial examples formatted
      for use as an augmented training set. Section 10.15 (adversarial_trainer.py) wraps this
      generator in the full min-max training loop. The generator is kept separate here so the
      data generation step can be profiled and cached independently of the training step.

