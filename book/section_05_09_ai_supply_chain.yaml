# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    ML models are executables. Loading a PyTorch .bin file with torch.load()
    is equivalent to running an untrusted binary. This is not a metaphor —
    pickle's __reduce__ protocol enables arbitrary shell command execution
    on model load. SafeTensors eliminates this by restricting the format to
    tensor data only, making code execution structurally impossible.

  takeaway_02: |
    The AI supply chain has six distinct layers each with independent attack
    surfaces: dataset acquisition, preprocessing, base model download, fine-tuning
    and adapters, framework dependencies, and model registry/serving. A control
    at one layer does not compensate for a gap at another. Defence-in-depth
    across all six is required.

  takeaway_03: |
    Public datasets (Common Crawl, GitHub, Wikipedia) are adversary-writable.
    SEO poisoning of Common Crawl, trojan PRs to GitHub repositories, and
    Wikipedia vandalism during snapshot windows are all documented or technically
    feasible mechanisms for training data contamination without any access to
    victim infrastructure.

  takeaway_04: |
    LoRA adapters are a unique supply chain risk: cheap to produce, often
    downloaded and verified separately from the base model, and in dynamic
    serving architectures can be swapped at runtime without a deployment event.
    Every adapter in every composition stack must be independently hashed,
    registered, and monitored.

  takeaway_05: |
    The ML SBOM captures what traditional software SBOMs miss: training datasets,
    base model identity and format, adapter provenance, and fine-tuning lineage.
    Without an ML SBOM, an organisation cannot answer the question "which of our
    production models is affected by this CVE?" or "did this model's training data
    include data from source X that we now know is compromised?"

  takeaway_06: |
    Download count and HuggingFace star count are not security signals. Adversaries
    artificially inflate these metrics. The only reliable signals are: SafeTensors
    format (structural, not gameable), SHA-256 hash match against a known-good
    record, model card completeness (partial signal), and behavioural regression
    test on a trigger-probe suite.

  takeaway_07: |
    Two format checks block the primary ML supply chain attack vector with zero
    false positives and zero tuning: (1) verify file_header[0:2] NOT in pickle
    magic bytes, (2) verify file_header[8:9] == '{' for SafeTensors. These two
    checks, implemented at model intake, eliminate pickle RCE from the supply
    chain without any impact on legitimate SafeTensors models.

  takeaway_08: |
    The three documented incidents (Protect AI 2023, HuggingFace Spaces 2024,
    JFrog 2023) share a common root cause: implicit trust in a public model hub
    without structural format verification. Obfuscation (JFrog finding) defeats
    content-based scanning but not structural format validation — SafeTensors
    enforcement is the correct defence, not pattern matching on file contents.

