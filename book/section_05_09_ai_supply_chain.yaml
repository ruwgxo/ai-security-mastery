  implementation_03:
    title: "HuggingFace Model Audit Tool"
    filename: "hf_model_audit.py"
    purpose: |
      Automated HuggingFace model audit tool implementing the six-step audit
      procedure. Checks namespace legitimacy heuristics, file format, hash
      verification, model card completeness scoring, dependency scan via
      requirements.txt if present, and produces a structured audit report
      with recommendation (use / manual review / reject).
    language: "python"
    code: |
      """
      HuggingFace Model Audit Tool
      Six-step audit: namespace, format, hash, model card, dependencies, sandbox.
      """

      import re
      from dataclasses import dataclass, field
      from typing import Dict, List, Optional, Tuple


      # -----------------------------------------------------------------------
      # Step 1 — Namespace Legitimacy Heuristics
      # -----------------------------------------------------------------------

      TRUSTED_ORG_PATTERNS = [
          r'^meta-llama$', r'^google$', r'^microsoft$', r'^openai$',
          r'^mistralai$', r'^huggingface$', r'^anthropic$',
          r'^EleutherAI$', r'^allenai$', r'^bigscience$',
          r'^tiiuae$', r'^deepseek-ai$', r'^Qwen$',
      ]

      SQUATTING_SIMILARITY_THRESHOLD = 2  # edit distance


      def _edit_distance(a: str, b: str) -> int:
          m, n = len(a), len(b)
          dp = list(range(n + 1))
          for i in range(1, m + 1):
              prev, dp[0] = dp[0], i
              for j in range(1, n + 1):
                  temp = dp[j]
                  dp[j] = (prev if a[i-1] == b[j-1]
                            else 1 + min(prev, dp[j], dp[j-1]))
                  prev = temp
          return dp[n]


      def check_namespace(model_id: str) -> Tuple[str, str, List[str]]:
          """
          model_id: 'org/model-name'
          Returns: (risk_level, detail, warnings)
          """
          if '/' not in model_id:
              return ("high", "No organisation prefix — individual user upload", [])
          org, model_name = model_id.split('/', 1)
          warnings = []

          is_trusted = any(re.match(p, org, re.I) for p in TRUSTED_ORG_PATTERNS)

          # Check for near-squatting
          squats = []
          for pattern in TRUSTED_ORG_PATTERNS:
              canonical = pattern.strip('^$')
              dist = _edit_distance(org.lower(), canonical.lower())
              if 0 < dist <= SQUATTING_SIMILARITY_THRESHOLD:
                  squats.append(f"'{org}' is edit-distance {dist} from '{canonical}'")
          if squats:
              warnings.extend(squats)
              return ("critical", "POSSIBLE NAMESPACE SQUATTING DETECTED", warnings)

          if is_trusted:
              return ("low", f"Organisation '{org}' matches trusted org pattern", warnings)
          return ("medium", f"Unverified organisation: '{org}' — manual verification required", warnings)


      # -----------------------------------------------------------------------
      # Step 2 — File Format Check (simplified for API demo)
      # -----------------------------------------------------------------------

      def check_file_format_from_filelist(files: List[str]) -> Tuple[str, str]:
          """
          Check file extensions in the model's file list.
          Returns: (risk_level, detail)
          """
          has_safetensors = any(f.endswith('.safetensors') for f in files)
          has_pickle = any(f.endswith(('.bin', '.pkl', '.pt', '.pth')) for f in files)
          has_onnx = any(f.endswith('.onnx') for f in files)

          if has_pickle and not has_safetensors:
              return ("critical",
                      "Only pickle-format files (.bin/.pkl/.pt/.pth) present — RCE risk on load")
          if has_pickle and has_safetensors:
              return ("medium",
                      "Both SafeTensors and pickle files present — use SafeTensors exclusively")
          if has_safetensors:
              return ("low", "SafeTensors format confirmed in file list")
          if has_onnx:
              return ("low", "ONNX format present — safe for loading")
          return ("high", "No recognised model file formats found — manual verification required")


      # -----------------------------------------------------------------------
      # Step 3 — Model Card Score
      # -----------------------------------------------------------------------

      MODEL_CARD_FIELDS = {
          "has_model_description": 10,
          "has_training_data_info": 20,
          "has_evaluation_results": 20,
          "has_intended_use": 15,
          "has_limitations": 15,
          "has_licence": 10,
          "has_citation": 5,
          "has_contact_info": 5,
      }


      def score_model_card(presence: Dict[str, bool]) -> Tuple[int, str, List[str]]:
          score = sum(w for f, w in MODEL_CARD_FIELDS.items() if presence.get(f, False))
          missing = [f for f in MODEL_CARD_FIELDS if not presence.get(f, False)]
          risk = "low" if score >= 80 else "medium" if score >= 60 else "high"
          return (score, risk, missing)


      # -----------------------------------------------------------------------
      # Audit Report
      # -----------------------------------------------------------------------

      @dataclass
      class HFModelAuditReport:
          model_id: str
          namespace_risk: str
          namespace_detail: str
          namespace_warnings: List[str]
          format_risk: str
          format_detail: str
          card_score: int
          card_risk: str
          card_missing: List[str]
          overall_risk: str = field(init=False)
          recommendation: str = field(init=False)

          def __post_init__(self):
              risks = [self.namespace_risk, self.format_risk, self.card_risk]
              if "critical" in risks:
                  self.overall_risk = "critical"
                  self.recommendation = "REJECT — do not use this model"
              elif risks.count("high") >= 2:
                  self.overall_risk = "high"
                  self.recommendation = "REJECT — too many high-risk findings"
              elif "high" in risks:
                  self.overall_risk = "high"
                  self.recommendation = "MANUAL REVIEW — security team approval required"
              elif "medium" in risks:
                  self.overall_risk = "medium"
                  self.recommendation = "MANUAL REVIEW — document risks before use"
              else:
                  self.overall_risk = "low"
                  self.recommendation = "PROCEED — complete sandbox test and hash pin before production"


      def audit_hf_model(
          model_id: str,
          file_list: List[str],
          model_card_presence: Dict[str, bool],
      ) -> HFModelAuditReport:
          ns_risk, ns_detail, ns_warn = check_namespace(model_id)
          fmt_risk, fmt_detail = check_file_format_from_filelist(file_list)
          card_score, card_risk, card_missing = score_model_card(model_card_presence)
          return HFModelAuditReport(
              model_id=model_id,
              namespace_risk=ns_risk, namespace_detail=ns_detail,
              namespace_warnings=ns_warn,
              format_risk=fmt_risk, format_detail=fmt_detail,
              card_score=card_score, card_risk=card_risk, card_missing=card_missing,
          )


      def print_audit_report(r: HFModelAuditReport) -> None:
          print(f"\n{'='*60}")
          print(f"HF MODEL AUDIT: {r.model_id}")
          print(f"Overall:  [{r.overall_risk.upper()}]")
          print(f"Action:   {r.recommendation}")
          print(f"\nCheck Results:")
          print(f"  [{r.namespace_risk.upper():8s}] Namespace: {r.namespace_detail[:55]}")
          for w in r.namespace_warnings:
              print(f"             WARNING: {w}")
          print(f"  [{r.format_risk.upper():8s}] Format:    {r.format_detail[:55]}")
          card_icon = r.card_risk.upper()
          print(f"  [{card_icon:8s}] Model Card: {r.card_score}/100"
                + (f" — Missing: {', '.join(r.card_missing[:2])}" if r.card_missing else ""))


      if __name__ == "__main__":
          # Test 1: Legitimate Llama model
          r1 = audit_hf_model(
              model_id="meta-llama/Meta-Llama-3-8B",
              file_list=["config.json", "model.safetensors", "tokenizer.json"],
              model_card_presence={
                  "has_model_description": True, "has_training_data_info": True,
                  "has_evaluation_results": True, "has_intended_use": True,
                  "has_limitations": True, "has_licence": True,
                  "has_citation": True, "has_contact_info": False,
              },
          )
          print_audit_report(r1)

          # Test 2: Squatted namespace
          r2 = audit_hf_model(
              model_id="meta1lama/Meta-Llama-3-8B",
              file_list=["model.bin"],
              model_card_presence={"has_model_description": True},
          )
          print_audit_report(r2)

          # Test 3: Unknown org, pickle only, incomplete card
          r3 = audit_hf_model(
              model_id="random-user-2024/finance-gpt",
              file_list=["pytorch_model.bin"],
              model_card_presence={"has_model_description": True, "has_licence": False},
          )
          print_audit_report(r3)

