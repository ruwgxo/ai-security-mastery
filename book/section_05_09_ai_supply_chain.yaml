section_summary:
  one_paragraph: |
    Section 5.9 establishes AI supply chain security as a systemic discipline spanning
    six distinct attack-surface layers — dataset acquisition, preprocessing, base model
    download, fine-tuning and adapters, framework dependencies, and model registry and
    serving — and provides the technical depth and operational tooling to defend each one.
    The section opens with the npm analogy: the AI ecosystem exhibits the same implicit-
    trust-in-public-repositories dynamic that made npm vulnerable in 2016, with one
    critical additional risk — a malicious ML model is not merely broken software but
    a potential arbitrary code execution vehicle via pickle deserialisation. The pickle
    RCE mechanics are explained in full (the __reduce__ protocol, the two-byte magic
    byte detection signature) alongside SafeTensors architecture (tensor-only format,
    structural impossibility of code execution). Dataset poisoning at source is covered
    for Common Crawl (SEO poisoning, backdoor trigger injection at web scale), GitHub
    (trojan PRs, fork manipulation), and Wikipedia (vandalism window contamination).
    The HuggingFace ecosystem receives dedicated treatment: five documented supply chain
    risks (namespace squatting, account compromise, malicious weights, dataset poisoning,
    model card trust) and a six-step audit procedure. LoRA adapter swapping is examined
    as a unique post-deployment integrity risk — small, cheap to produce, independently
    downloaded, and in dynamic serving architectures swappable at runtime without a
    deployment event. Third-party ML library vulnerabilities cover the three documented
    CVE classes (model loading RCE, serving infrastructure RCE, training pipeline RCE)
    alongside SCA scanning requirements. The ML SBOM section defines the four-layer
    structure (dataset, base model, adapter, framework) with all required fields per
    layer and the incident response, audit, and traceability benefits it enables. The
    section closes with the six-check artifact verification pipeline (format, hash,
    model card, dependency scan, sandbox load, behavioural regression) and analysis of
    three documented 2023-2024 supply chain incidents (Protect AI, HuggingFace Spaces,
    JFrog) mapped to ATLAS techniques with lessons applied. Three implementations
    deliver the production artifact scanner, the ML SBOM generator with supply chain
    checklist, and the HuggingFace model audit tool.

  next_section: |
    Section 5.10 — Privacy Attacks: Training Data Extraction
    The supply chain complete, Section 5.10 examines what adversaries do with
    deployed models: extract the training data embedded in weights. Memorisation
    taxonomy (verbatim, approximate, concept-level), Carlini et al. methodology,
    differential privacy as a formal defence, and detection of extraction attempts
    from API logs — closing the loop from supply chain integrity to output-side
    privacy monitoring.

