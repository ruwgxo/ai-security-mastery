      }


      @dataclass
      class ChecklistResult:
          stage: str
          items: List[str]
          passed: List[str]
          failed: List[str]

          @property
          def score(self) -> int:
              return int(len(self.passed) / len(self.items) * 100) if self.items else 100

          @property
          def risk_level(self) -> str:
              s = self.score
              return "low" if s >= 80 else "medium" if s >= 60 else "high"


      def run_checklist(stage_responses: Dict[str, Dict[str, bool]]) -> List[ChecklistResult]:
          """
          stage_responses: {stage_key: {item_text: True/False}}
          """
          results = []
          for stage, items in CHECKLIST_STAGES.items():
              responses = stage_responses.get(stage, {})
              passed = [i for i in items if responses.get(i, False)]
              failed = [i for i in items if not responses.get(i, False)]
              results.append(ChecklistResult(stage=stage, items=items,
                                             passed=passed, failed=failed))
          return results


      def print_checklist_report(results: List[ChecklistResult]) -> None:
          print(f"\n{'='*60}")
          print("AI SUPPLY CHAIN SECURITY CHECKLIST")
          print("=" * 60)
          overall_passed = sum(len(r.passed) for r in results)
          overall_total = sum(len(r.items) for r in results)
          overall_pct = int(overall_passed / overall_total * 100) if overall_total else 0
          print(f"Overall: {overall_passed}/{overall_total} ({overall_pct}%)\n")
          for r in results:
              icon = {"low": "PASS", "medium": "WARN", "high": "FAIL"}[r.risk_level]
              print(f"  [{icon}] {r.stage} — {r.score}%")
              for f in r.failed[:3]:
                  print(f"         MISSING: {f[:60]}")


      if __name__ == "__main__":
          # --- Build example SBOM ---
