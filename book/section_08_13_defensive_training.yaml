prose_content:

  part_1_defensive_training_landscape:
    title: 'The Defensive Training Landscape: Prevention as Complement to Detection'
    body: |
      Defensive training operates on a different temporal axis from detection.
      Detection (Section 8.12) examines artifacts after training to identify
      backdoors that were installed; defensive training shapes the training
      process so backdoors are harder to install or have bounded impact.
      The two layers are complementary: detection catches what defensive
      training does not prevent; defensive training reduces the load on detection
      by constraining what attacks succeed in the first place. A programme
      with strong detection and weak defensive training catches more attacks
      than one without detection but processes a larger volume of attempted
      attacks. A programme with strong defensive training and weak detection
      faces fewer attempted attacks but cannot identify residual ones. The
      operational architecture deploys both.

      The four principal defensive training techniques operate on different
      mechanisms. DP-SGD bounds per-sample gradient influence through
      mathematically rigorous noise addition, limiting how much any single
      sample (including a poisoned one) can shape the trained model.
      Robust optimisation trains models against an explicit adversary who
      can perturb data within bounded radii, producing models that resist
      perturbations within those radii. Data filtering removes suspect
      samples before training using detection primitives or simpler heuristic
      filters. Certified defences provide mathematical guarantees: under
      specified threat conditions, the defence ensures bounded model behaviour.

      Each technique has specific coverage and specific costs. DP-SGD provides
      coverage against any small contamination at the cost of utility (the
      privacy noise also affects clean training signal). Robust optimisation
      provides coverage against perturbations within its threat radius at
      the cost of computational expense (training is more expensive) and
      coverage gap outside the radius. Data filtering provides coverage
      proportional to its detection input quality at the cost of compute
      for the detection primitives. Certified defences provide guaranteed
      coverage within certification but typically narrow certifications.
      No technique provides unbounded coverage at zero cost.

      The defensive training landscape has matured substantially since 2017,
      when the foundational papers for each technique appeared in roughly
      the same window. The techniques have been refined, hybridised, and
      evaluated against expanding attack catalogues. The current state is
      that each technique is deployable with reasonable engineering effort,
      with reference implementations available in standard ML libraries
      (Opacus for DP-SGD in PyTorch, robust training utilities in TensorFlow
      Privacy, randomised smoothing libraries for certified defences). The
      adoption barrier is operational discipline -- knowing when and how
      to apply each technique -- rather than implementation difficulty.

      The structural distinction between detection and defensive training
      becomes operationally important when designing programme architecture.
      Detection is typically applied per-artifact at intake (Section 8.10
      pipeline) or per-input at runtime (STRIP). Defensive training is
      applied during model training itself, by the organisation conducting
      the training. For consuming organisations that do not train foundation
      models from scratch, defensive training applies primarily during
      consumer-side fine-tuning -- a much smaller training surface than
      pre-training, but still meaningful. For organisations conducting
      pre-training (frontier labs, specialised model developers), defensive
      training applies at the largest scale and provides the most leverage.

      Section 8.13 covers the techniques in turn at the depth necessary
      for operational deployment. Each part includes the mechanism, the
      coverage profile, the utility cost, and the deployment context.
      Section 8.15 integrates the techniques into the production pipeline
      with calibration tooling.

  part_2_dp_sgd_bounded_per_sample_influence:
    title: 'DP-SGD: Bounded Per-Sample Influence as Poisoning Defence'
    body: |
      Differentially private stochastic gradient descent (DP-SGD), introduced
      by Abadi et al. 2016, is a gradient-descent variant that provides
      mathematical privacy guarantees by bounding the influence any single
      training sample can have on the resulting model. The original motivation
      was privacy -- preventing the trained model from leaking specific
      training samples -- but the mechanism produces a useful side effect for
      poisoning defence: the same bound that limits per-sample privacy leakage
      also limits per-sample poisoning influence. A poisoned sample, like any
      sample, can shift the model only by an amount bounded by the privacy
      parameter.

      The mechanism operates as follows. Standard SGD computes a gradient
      from a batch of training samples and updates model weights along that
      gradient. DP-SGD modifies this in two ways. First, per-sample gradient
      clipping: each sample's gradient is computed individually and clipped
      to bounded norm before aggregation, preventing any single sample from
      contributing an unboundedly large gradient. Second, noise addition: after
      aggregation, calibrated Gaussian noise is added to the batch gradient
      before the weight update, providing the differential privacy guarantee.
      The combination ensures that for any single training sample, the model's
      output distribution differs from what it would be if the sample were
      absent by a bounded amount, parameterised by the privacy budget (epsilon,
      delta).

      For poisoning defence, the relevant property is influence bounding. A
      single poisoned sample, like any sample, can shift the trained model
      by an amount bounded by the privacy parameters. For attacks requiring
      multiple poisoned samples (Section 8.5 BadNets at typical 0.5-1%
      poisoning rates), DP-SGD bounds the cumulative influence by approximately
      the per-sample bound times the number of poisoned samples. At reasonable
      privacy budgets, this cumulative bound can be tight enough that small
      poisoning attacks fail to install effective backdoors -- the noise
      and clipping prevent the trigger-target association from being learned
      with sufficient confidence.

      The coverage profile for poisoning defence depends on the privacy budget.
      Tight budgets (epsilon below 1) provide strong influence bounding but
      substantial utility cost; the model trained with very tight budgets has
      meaningfully degraded clean-task performance. Loose budgets (epsilon
      around 8 or higher) provide weak influence bounding with minimal utility
      cost; backdoor attacks are largely unaffected. Moderate budgets (epsilon
      2-5) provide partial influence bounding with moderate utility cost; some
      backdoor attacks succeed at reduced effectiveness. The choice of
      privacy budget is therefore a coverage-utility tradeoff that programmes
      must calibrate for their threat model.

      DP-SGD's coverage against the Section 8.6 advanced trigger taxonomy is
      uneven. Against canonical BadNets attacks at typical poisoning rates,
      moderate-budget DP-SGD provides 30-60% reduction in attack success rate
      with 5-15% utility loss. Against high-budget poisoning attacks (the
      adversary contributes many more poisoned samples), DP-SGD's effectiveness
      degrades because the cumulative influence bound becomes less tight relative
      to the attack's effective signal. Against dynamic and composite triggers,
      DP-SGD provides similar coverage to BadNets cases (the influence bound
      applies to all poisoning structures), with the absolute attack success
      reduction tracking the original attack success rate.

      The operational deployment of DP-SGD requires several engineering decisions.
      Privacy budget allocation: how to distribute the total budget across
      training epochs. Clipping norm selection: too-low clipping degrades clean
      performance; too-high clipping weakens poisoning defence. Noise scale
      calibration: the Gaussian noise standard deviation that achieves the
      target privacy guarantee. Batch size sensitivity: DP-SGD's privacy
      analysis depends on batch composition. Modern reference implementations
      (Opacus in PyTorch, TensorFlow Privacy) provide configuration tooling
      that handles these decisions reasonably with sensible defaults.

      The structural limitation of DP-SGD as poisoning defence is that it
      provides bounded influence, not zero influence. Determined adversaries
      who can contribute large numbers of poisoned samples (rung-3 access
      with substantial dataset control, or multi-source attacks at pre-training
      scale) can still install backdoors at higher poisoning rates. DP-SGD
      raises the attack budget threshold but does not eliminate the attack
      class. For threat models dominated by rung-2 small-budget poisoning,
      DP-SGD provides meaningful coverage. For threat models including
      rung-3 large-budget poisoning, DP-SGD must be combined with other
      defences.

      DP-SGD also provides genuine privacy benefits independent of poisoning
      defence. Models trained with DP-SGD leak less information about specific
      training samples, providing protection against membership inference
      attacks (Chapter 11) and training data extraction attacks. For
      regulated contexts where training data privacy matters (healthcare,
      financial services, government), DP-SGD addresses both privacy and
      poisoning concerns simultaneously. Section 8.13 deliverable 1 provides
      a reference DP-SGD implementation that quantifies both effects.

  part_3_robust_optimisation:
    title: 'Robust Optimisation: Training Against Adversarial Data Perturbations'
    body: |
      Robust optimisation modifies the training objective to include an
      adversary who can perturb training data within specified bounds. The
      model is trained to perform well not just on the observed training
      distribution but on the worst-case perturbation of that distribution
      within the adversary's allowed radius. The resulting model is resistant
      to data perturbations within the radius, providing defence against
      poisoning attacks whose perturbations fit within the assumed threat
      model.

      The mechanism formalises a min-max optimisation. Standard training
      minimises expected loss over the training distribution. Robust training
      minimises expected loss over the worst-case adversarial perturbation
      of the training distribution within a specified perturbation set
      (typically L_p balls of bounded radius around training samples, or
      bounded fraction of samples replaceable). The training procedure
      alternates: identify the worst-case perturbation given the current
      model (inner maximisation), update the model to perform well under
      that perturbation (outer minimisation). The resulting model is
      certifiably robust against perturbations within the assumed bounds.

      For poisoning defence, robust optimisation against Wasserstein-bounded
      data shifts or against label-flipping fractions provides coverage against
      attacks whose total perturbation magnitude fits within the bounds. A
      label-flipping attack at 5% poisoning is within bounds for robust
      training that assumes 5% adversarial label corruption; the trained model
      resists this attack class by construction. The robust training procedure
      essentially folds the assumed attack into the training procedure,
      producing a model already resistant to it.

      The structural assumption is that the adversary operates within the
      specified perturbation set. Attacks that exceed the perturbation set
      bypass the robustness guarantee. Two specific bypass conditions matter
      operationally. First, attacks at higher perturbation magnitude than
      assumed: a robust training run assuming 5% label flipping has no
      guarantee against 10% label flipping. Second, attacks of qualitatively
      different structure: BadNets-style backdoor attacks may not be captured
      by Wasserstein perturbation bounds (the trigger pattern is a structured
      addition rather than an unbounded distribution shift), so robustness
      against Wasserstein adversaries does not transfer to BadNets defence.
      The selection of perturbation set is therefore a critical design
      decision -- it determines what the robust model is actually robust
      against.

      Coverage profile for robust optimisation against Section 8.6 attack
      variants is highly perturbation-set-dependent. Against label-flipping
      attacks at the assumed budget, near-complete defence (90%+ TPR
      reduction). Against label-flipping attacks at higher budgets, partial
      defence with degradation proportional to budget excess. Against BadNets
      with patches outside Wasserstein bounds, weak defence. Against dynamic
      triggers, weak defence (not in the assumed perturbation set). Against
      composite triggers, weak defence. Robust optimisation is therefore
      most effective against attack classes specifically captured in its
      perturbation set, and provides limited coverage against attacks
      structured differently.

      The utility cost of robust optimisation is computational rather than
      accuracy-degradation. Each training step requires solving the inner
      maximisation, which adds substantial compute -- typically 5-10x
      multiplier on training cost depending on perturbation set complexity.
      Training accuracy on the clean distribution is preserved or only
      marginally reduced; the model performs well on clean data while also
      resisting bounded perturbations. The tradeoff is therefore compute
      cost rather than accuracy.

      Operational deployment requires perturbation set selection that matches
      the threat model. For threat models dominated by label-flipping, label-
      flipping-specific robust training is appropriate. For threat models
      with arbitrary backdoor attacks, more general perturbation sets are
      needed -- typically combined with detection-based defences for the
      attacks the perturbation set does not capture. Section 8.13 deliverable
      2 provides reference implementations for principal perturbation sets
      with calibration guidance.

      The combination of robust optimisation with detection (Section 8.12)
      is operationally meaningful. Robust optimisation provides certified
      coverage within its perturbation set; detection provides coverage
      against attacks outside the set. The two layers cover different parts
      of the attack space without redundancy. The combined defensive posture
      is stronger than either alone and substantially stronger than
      undefended training.

  part_4_data_filtering:
    title: 'Data Filtering: Removing Suspect Samples Before Training'
    body: |
      Data filtering applies detection primitives (Section 8.12) at the
      training data preparation stage, before model training begins, to
      remove suspect samples from the training set. The principle is
      straightforward: if detection primitives can identify likely poisoned
      samples post-training, applying them pre-training removes the samples
      before they shape model behaviour. The defensive value depends on the
      filtering primitives' detection rates -- filtering inherits the
      coverage and failure modes of its upstream detection primitives.

      The mechanism is structurally simple. Apply spectral signatures or
      activation clustering to candidate training data using either a clean
      reference model or an iteratively refined model trained on the candidate
      data. Identify samples flagged as likely poisoned. Remove flagged
      samples from the training set. Train the production model on the
      filtered training set. The resulting model is trained on data with
      reduced contamination compared to the unfiltered alternative; backdoors
      that depended on the filtered samples are partially or fully prevented.

      The reference model question matters operationally. Spectral signatures
      and activation clustering require feature representations; the
      representations come from a trained model. For data filtering, two
      approaches are common. The first is using a known-clean reference
      model trained on a smaller curated dataset to compute features for
      the candidate data. The reference model may be smaller and less
      capable than the target model, but its representations are clean by
      assumption. The second is iterative training: train an initial model
      on the candidate data, run filtering using the initial model's
      features, retrain on the filtered data, repeat until convergence.
      Iterative training is more compute-intensive but does not require a
      separate clean reference.

      The coverage profile for data filtering follows directly from the
      upstream detection primitive. Spectral-signatures-based filtering has
      coverage matching spectral signatures detection (Section 8.12 Part 2).
      Activation-clustering-based filtering has coverage matching activation
      clustering. Combining multiple filtering primitives produces ensemble
      filtering with better coverage but higher compute cost. Filtering
      cannot exceed the coverage of its primitives -- attacks that bypass
      detection primitives also bypass filtering.

      The utility cost of data filtering is sample loss plus false positives.
      The filtering removes samples; some removed samples are clean (false
      positives), reducing training data size. For typical primitive false
      positive rates (1-5%), the data loss is small relative to typical
      training set sizes and produces minimal utility impact. The compute
      cost is moderate -- running the detection primitives on training
      data, plus iterative training if used.

      A specific operational pattern worth highlighting is filtering combined
      with detection at downstream auditing. The training-time filter removes
      what it can detect; downstream auditing (Section 8.15 pipeline) catches
      what filtering missed. The combination produces layered defence: most
      attacks blocked at training time, residual attacks caught at auditing.
      The architecture is robust to detection primitive failures because
      the same primitives at different stages catch different attack
      conditions: a primitive that fails to flag a sample at training time
      may flag the resulting backdoor at post-training auditing if the
      backdoor produces stronger behavioural signatures than the individual
      training samples.

      Data filtering specifically addresses the LLM training pipeline contexts
      from Sections 8.7 and 8.8. For instruction-tuning datasets, applying
      Section 8.7 detection primitives (instruction-response consistency
      auditor, distributional analysis) as filtering removes suspect
      instruction-response pairs before fine-tuning. For preference datasets,
      applying Section 8.8 detection primitives (annotator agreement analysis,
      preference consistency auditing) as filtering removes suspect preferences
      before reward model training. The filtering integrates naturally with
      Section 8.15 pipeline as the upstream layer for data-pipeline auditing
      tracks.

      The structural limitation is that filtering is detection-equivalent.
      Filtering does not provide additional coverage beyond what detection
      provides; it provides earlier intervention. For organisations where
      training compute is expensive and reaudit-and-retrain cycles are
      operationally costly, earlier intervention has real value -- preventing
      backdoor installation is cheaper than detecting and remediating it
      after training. For organisations with cheap retraining cycles, the
      filtering value is smaller. Section 8.13 deliverable 3 provides a
      filtering harness that integrates with Section 8.12 detection
      primitives and Section 8.7-8.8 LLM-specific detection.

  part_5_certified_defences:
    title: 'Certified Defences: Mathematical Guarantees Within Specified Threat Models'
    body: |
      Certified defences provide mathematical guarantees that the trained
      model has bounded vulnerability to specified attack classes. The
      principle distinguishes certified defences from heuristic defences:
      a certified defence provides a provable bound; a heuristic defence
      provides empirically observed effectiveness. For specific high-stakes
      contexts (regulated industries, mission-critical applications),
      mathematical guarantees have value beyond empirical effectiveness
      because they enable rigorous compliance and risk assessment.

      The principal certified defence for backdoor attacks is randomised
      smoothing applied to data poisoning, introduced for poisoning settings
      by several papers since 2020. The mechanism extends randomised smoothing
      from inference-time adversarial defences to training-time poisoning
      defences. The defended model's prediction on a given input is defined
      as the majority vote over predictions of multiple model copies trained
      on smoothed (noised) versions of the training data. Under specific
      conditions on the smoothing parameters and the assumed adversary, the
      majority-vote prediction is provably stable against bounded poisoning:
      the adversary cannot change the majority-vote prediction on any input
      by poisoning fewer than a certified number of training samples.

      The mechanism produces a certification radius: for each input, the
      certified defence outputs both a prediction and a number representing
      how many poisoned training samples the adversary would need to change
      the prediction. For inputs with high certification radius, the
      prediction is robust against substantial poisoning attacks. For inputs
      with low certification radius, the prediction is vulnerable. The
      certification is per-input, so the defence's effectiveness varies
      across inputs -- some inputs are highly robust, others less so.

      The certification regime is the structural assumption. Randomised
      smoothing for poisoning typically certifies against label-flipping
      adversaries at bounded fractions or against general data replacement
      adversaries at bounded sample counts. The certification holds within
      the assumed threat regime; it provides no guarantees against attacks
      outside the regime. BadNets-style backdoor attacks may or may not fit
      within standard certification regimes depending on the specific
      certification approach -- some certification frameworks capture
      structured backdoor attacks, others do not.

      The utility cost of certified defences is substantial. Training requires
      multiple model copies (typically dozens to hundreds), increasing compute
      proportionally. Inference requires majority voting across the copies,
      increasing inference cost. Clean accuracy is typically reduced compared
      to undefended training because each smoothed model copy is less capable
      than a fully-trained alternative. The certification benefit comes at
      meaningful operational cost.

      The coverage profile for certified defences is narrow but strong within
      the certification. Against attacks fitting the certification regime
      at sub-certified budgets, the defence provides provable bounds: the
      attack cannot succeed by mathematical guarantee. Against attacks
      exceeding the certified budget, the certification provides no guarantee
      but does not necessarily fail -- the empirical effectiveness may
      extend beyond the certified bound. Against attacks outside the
      certification regime, the defence provides no guarantees and may
      provide little empirical defence.

      Operational deployment of certified defences is appropriate for narrow
      contexts: high-stakes applications where mathematical guarantees enable
      compliance, deployments with sufficient compute budget for the cost,
      and threat models where the certification regime captures the principal
      attacks. For general-purpose deployment, certified defences are
      typically not the primary defensive layer; they are deployed selectively
      for components or applications where the certification value justifies
      the cost. Section 8.13 deliverable 4 provides a randomised smoothing
      reference implementation with certification calibration tooling.

      Certified defences are an active research area with ongoing extensions
      to broader threat models and reduced computational cost. The current
      state is that certification regimes are typically narrow but sufficient
      for some specific high-stakes contexts. The trajectory is toward
      broader regimes and cheaper certifications, which would extend
      operational applicability. For 2026, certified defences are a niche
      capability with high value in specific contexts.

  part_6_combining_techniques_and_provider_consumer_responsibility:
    title: 'Combining Techniques and Provider-Consumer Responsibility Division'
    body: |
      The four defensive training techniques have complementary coverage
      profiles. DP-SGD bounds influence regardless of attack structure but
      with utility cost. Robust optimisation provides certified coverage
      within its perturbation set. Data filtering provides earlier
      intervention via detection primitives. Certified defences provide
      mathematical guarantees within narrow regimes. Combining techniques
      produces ensemble defensive training that covers more of the attack
      space than any single technique alone, at corresponding compute and
      utility costs.

      The principal combinations operationally deployed include DP-SGD plus
      data filtering (filtering catches detectable attacks; DP-SGD bounds
      influence of undetectable ones), robust optimisation plus data
      filtering (filtering catches what robust optimisation does not capture
      in its perturbation set), and DP-SGD plus robust optimisation plus
      data filtering (combined coverage at high compute cost, suitable for
      high-stakes contexts). The combinations are computationally expensive
      but produce defensive training postures meaningfully stronger than
      any single technique. Section 8.15 production pipeline supports the
      combinations as configurable training-time options.

      The structural responsibility division between foundation providers
      and consumers matters operationally. Defensive training applied at
      pre-training affects the resulting foundation model's properties for
      every downstream consumer. Foundation providers who deploy DP-SGD
      provide downstream consumers with foundation models that have bounded
      per-sample influence inherited; consumers benefit from provider
      defensive training without additional cost. Foundation providers who
      do not deploy defensive training produce foundation models exposed
      to whatever pre-training contamination occurred; consumers inherit
      the exposure and cannot retrofit pre-training-stage defensive training
      to inherited models.

      The consumer-side defensive training surface is therefore consumer
      fine-tuning. When consuming organisations fine-tune foundation models
      on their own task-specific data, they can apply defensive training
      to the fine-tuning stage. DP-SGD during fine-tuning bounds per-sample
      influence on the consumer-specific adaptation. Robust optimisation
      during fine-tuning provides robustness to fine-tuning data perturbations.
      Data filtering during fine-tuning catches contamination in consumer-
      specific data. Certified defences during fine-tuning provide guarantees
      on consumer-specific behaviour. The consumer-side surface is smaller
      than pre-training but still meaningful and fully under consumer
      control.

      The combined provider-consumer defensive architecture has consumers
      relying on provider defensive training for pre-training-stage
      contamination protection (with provider transparency from Section
      8.11 informing consumer trust), plus deploying consumer-side defensive
      training for fine-tuning-stage protection. The architecture acknowledges
      that defensive responsibility is naturally divided across the supply
      chain rather than entirely at one party.

      For consuming organisations, the operational implications include:
      treating provider defensive training disclosure as a supply chain
      assessment dimension (Section 8.11 foundation provider risk assessment),
      deploying consumer-side defensive training during fine-tuning as
      standard discipline, and integrating defensive training with detection
      (Section 8.12) and supply chain controls (Section 8.10) as layered
      production architecture (Section 8.15).

      For foundation providers, the operational implications include:
      deploying defensive training across pre-training and instruction-tuning
      stages as production discipline, documenting defensive training in
      foundation model release documentation (informing consumer-side risk
      assessment), and continuously evaluating defensive training effectiveness
      against the evolving attack catalogue (the techniques covered here
      have been substantially refined since their original publication and
      ongoing maintenance is required).

      Section 8.13 closes by emphasising the complementarity of detection
      and defensive training. Neither layer alone provides comprehensive
      backdoor defence; the combination provides operationally meaningful
      coverage at acceptable cost. The production architecture in Section
      8.15 deploys both layers across both consumer-controlled (fine-tuning)
      and provider-relevant (pre-training assessment) stages. The defensive
      programme is therefore distributed across the supply chain with
      coordinated coverage at each layer, and the success of any consuming
      organisation's defensive posture depends on both their own controls
      and the controls applied upstream by their providers.

reference_materials:

  defensive_training_technique_summary_reference:
    title: 'Defensive Training Technique Summary Reference'
    description: |
      Compact reference summarising each defensive training technique:
      mechanism, coverage, utility cost, and deployment context. Use for
      technique selection during training programme design.

    techniques:

      - technique: 'DP-SGD (Differentially Private SGD)'
        mechanism: 'Per-sample gradient clipping plus calibrated noise addition; bounds per-sample model influence'
        principal_coverage:
