common_mistakes:

  mistake_1_treating_defensive_training_as_complete_solution:
    description: 'Treating defensive training as a comprehensive backdoor defence that eliminates the need for detection'
    why_it_happens: |
      Defensive training operates at training time and feels foundational. Practitioners
      who deploy DP-SGD or robust optimisation may conclude that the trained model is
      protected by construction, eliminating the need for downstream detection. The
      conclusion misses that each defensive training technique has specific coverage
      and specific failure modes; attacks outside the coverage zone install backdoors
      that defensive training alone does not catch.
    consequence: 'Defensive training deployed without detection; attacks outside the defensive training coverage zone produce undetected backdoors. Defensive posture appears complete but has structural gaps.'
    correct_approach: 'Deploy defensive training (Section 8.13) AND detection (Section 8.12) as complementary layers. Section 8.15 production pipeline architecture deploys both. Defensive training reduces the load on detection; detection catches what defensive training misses.'

  mistake_2_loose_privacy_budget_for_dp_sgd:
    description: 'Deploying DP-SGD with privacy budgets so loose that poisoning defence is minimal'
    why_it_happens: |
      DP-SGD has utility cost proportional to privacy budget tightness. Practitioners
      balancing utility against privacy choose loose budgets (epsilon 8 or higher)
      that minimise utility impact. The mistake is assuming loose-budget DP-SGD
      provides meaningful poisoning defence; at loose budgets, the per-sample influence
      bound is loose enough that backdoor attacks remain effective.
    consequence: 'DP-SGD deployed with the appearance of defensive training but limited actual poisoning defence. Defensive posture documentation overstates protection.'
    correct_approach: 'Calibrate privacy budget to the defensive goal. For poisoning defence, moderate budgets (epsilon 2-5) are typically appropriate. Document the budget explicitly and characterise the resulting coverage. Section 8.13 deliverable 1 includes calibration guidance.'

  mistake_3_threat_model_mismatch_for_robust_optimisation:
    description: 'Deploying robust optimisation against a perturbation set that does not match the threat model'
    why_it_happens: |
      Robust optimisation provides certified robustness within its perturbation set.
      Practitioners may select perturbation sets based on familiarity (Wasserstein
      bounds because they appear in literature) or computational tractability rather
      than threat-model match. The mistake is that robustness within an ill-fitting
      perturbation set provides little defence against actual attacks.
    consequence: 'Robust optimisation deployed at substantial compute cost with limited defensive benefit. The defensive training is operationally executing but against the wrong threat.'
    correct_approach: 'Select perturbation sets that match the threat model. Label-flipping threats need label-flipping-specific perturbation sets. Wasserstein perturbation sets are appropriate for distribution-shift attacks but not for structured backdoor attacks. Section 8.13 deliverable 2 includes perturbation set selection guidance.'

  mistake_4_filtering_without_detection_quality_assessment:
    description: 'Deploying data filtering without assessing the upstream detection primitive quality on the specific data'
    why_it_happens: |
      Data filtering is operationally simple: run detection, remove flagged samples.
      Practitioners deploy it as a standard step without verifying detection
      quality on their specific data distribution and threat model. The detection
      primitives have variant-dependent coverage; filtering inherits whatever
      coverage the primitives provide on the specific data.
    consequence: 'Filtering removes some contamination but may miss substantial fractions if the upstream detection has low TPR on the specific attack distribution. Defensive posture appears active but is structurally weak.'
    correct_approach: 'Assess detection primitive quality on representative validation data before deploying as filter. Calibrate thresholds. Use ensemble filtering with multiple primitives for coverage. Integrate filtering with downstream detection (Section 8.15) to catch what filtering misses.'

  mistake_5_certified_defence_outside_certification_regime:
    description: 'Treating certified defence guarantees as applying outside the certification regime'
    why_it_happens: |
      Certified defences provide impressive-sounding guarantees -- mathematical
      proofs of bounded vulnerability. Practitioners may understand the
      certification at high level but apply the defence with the assumption that
      the guarantees extend to attacks outside the certification regime. The
      assumption is mathematically incorrect; the certifications hold only within
      specific regimes.
    consequence: 'Certified defence deployed at substantial cost with overstated coverage. Attacks outside the certification regime succeed despite the defence; the certified guarantees do not apply but were marketed as if they did.'
    correct_approach: 'Document the certification regime explicitly. Verify that the threat model fits within the regime. Use certified defences as one layer alongside detection and other defensive training; they cover their regime well, others cover other regimes. Section 8.13 deliverable 4 includes regime documentation tooling.'

section_summary:
  compact: |
    Defensive training prevents or constrains backdoor installation at training time,
    complementing detection (Section 8.12) which identifies backdoors after training.
    Four principal techniques operate on different mechanisms. DP-SGD bounds
    per-sample gradient influence through gradient clipping plus calibrated noise,
    providing poisoning defence as a side effect of the privacy guarantee.
    Robust optimisation trains models against an explicit adversary perturbing data
    within bounded radii, providing certified resistance within the assumed
    perturbation set. Data filtering applies Section 8.12 detection primitives
    pre-training to remove suspect samples, inheriting detection coverage with
    earlier intervention. Certified defences (principally randomised smoothing)
    provide mathematical guarantees within narrow but well-characterised regimes,
    appropriate for high-stakes contexts. Each technique has specific coverage
    and specific utility costs: DP-SGD trades accuracy for influence bounding;
    robust optimisation trades compute for perturbation-set robustness; data
    filtering trades minor data loss for detection-equivalent coverage at
    earlier stage; certified defences trade substantial cost for mathematical
    guarantees. The provider-consumer responsibility division places defensive
    training during pre-training, instruction-tuning, and RLHF on foundation
    providers (consumers inherit results), while consumer fine-tuning is
    consumer-controlled defensive training surface. Combined production
    architecture deploys defensive training plus detection (Section 8.12) plus
    supply chain controls (Sections 8.9-8.11) as layered defence. Section 8.14
    extends to federated and gradient poisoning; Section 8.15 capstones the
    chapter with the integrated production auditing pipeline.

  key_takeaways:
    - 'Defensive training prevents what detection identifies; both layers are required for comprehensive coverage'
    - 'DP-SGD bounds per-sample influence; coverage scales with privacy budget tightness; utility cost scales inversely'
    - 'Robust optimisation provides certified coverage within its perturbation set; mismatched sets provide little defence'
    - 'Data filtering inherits Section 8.12 detection primitive coverage with earlier intervention'
    - 'Certified defences provide mathematical guarantees within narrow regimes; high cost; suitable for high-stakes contexts'
    - 'Provider-consumer responsibility division: pre-training and alignment defensive training is provider-controlled; fine-tuning is consumer-controlled'
    - 'Combined defensive training plus detection plus supply chain controls is the operational architecture'
    - 'No defensive training technique eliminates poisoning risk; each shifts the attack-defence frontier in specific ways'

preview_section_14:
  title: 'Federated Learning and Gradient Poisoning: Decentralised Training Attack Surface'
  connection: |
    Sections 8.7-8.13 covered training-time attacks and defences for centralised
    training: a single organisation runs the training pipeline on data they
    control or aggregate. Section 8.14 extends to decentralised training:
    federated learning, where many participants contribute gradient updates
    without sharing raw data, and the principal attack surface is gradient
    contribution rather than data contribution. The threat model includes
    Byzantine participants (contributing arbitrarily malicious gradients),
    Sybil attackers (controlling multiple participant identities), model
    replacement attacks (gradient updates designed to overwrite model behaviour),
    and gradient poisoning at scale. The defensive techniques include
    Byzantine-robust aggregation (median, trimmed mean, Krum), participant
    reputation, and gradient anomaly detection. Federated learning is a
    growing deployment pattern (cross-silo collaboration, on-device training,
    privacy-preserving ML), and the defensive infrastructure for it is a
    distinct extension of Chapter 8 framework. After Section 8.14, Section
    8.15 capstones the chapter with the integrated production auditing
    pipeline that covers everything from Sections 8.7-8.14.

