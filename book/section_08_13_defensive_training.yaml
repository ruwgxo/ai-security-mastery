section_overview:
  title: 'Defensive Training Techniques: DP-SGD, Robust Optimisation, Data Filtering, Certified Defences'
  one_line_summary: |
    Defensive training prevents backdoor installation rather than detecting it
    afterward. Differentially private SGD bounds per-sample influence, limiting
    what any small contamination can teach the model. Robust optimisation trains
    models resistant to data perturbations, including adversarial poisoning.
    Data filtering removes suspect samples before training -- using Section 8.12
    detection as the upstream filter. Certified defences provide mathematical
    guarantees of bounded backdoor impact under specified threat models. None
    of the techniques eliminates poisoning risk; each shifts the attack-defence
    frontier in specific ways. Defensive training is complementary to detection,
    not a substitute -- the strongest programmes deploy both layers.

  why_this_section_exists: |
    Section 8.12 covered detection primitives that identify backdoors after they
    are present. Detection is reactive: it finds what the attack already installed.
    The complementary defensive posture is prevention: shape the training process
    so backdoors cannot be installed effectively in the first place, or so any
    installed backdoors have bounded impact. Section 8.13 covers the four
    principal defensive training techniques: DP-SGD (differentially private
    stochastic gradient descent), robust optimisation, data filtering, and
    certified defences. Each operates at training time with the goal of preventing
    or constraining poisoning effects.

    The section also addresses a structural asymmetry in defensive programmes.
    Detection primitives (Section 8.12) are typically deployed by consuming
    organisations on artifacts they receive (foundation models, adapters,
    instruction-tuning datasets). Defensive training techniques are typically
    deployed by training organisations on training runs they conduct. The
    division of responsibility is therefore foundation-provider-heavy for
    defensive training, with consuming organisations exposed to whatever
    defensive training the providers chose to use. Section 8.13 provides
    coverage for both perspectives: foundation providers as direct deployers
    of these techniques, consuming organisations as evaluators of provider
    defensive posture.

    The third function of this section is to ground expectations. Defensive
    training has been an active research area for over a decade, with periodic
    over-promising about specific techniques. DP-SGD provides bounded influence
    but at meaningful utility cost; robust optimisation provides resistance to
    bounded perturbations but is bypassed by attacks outside its threat model;
    data filtering inherits the limitations of upstream detection; certified
    defences provide guarantees only within their certification regime, often
    narrow in practice. Section 8.13 is honest about each technique's actual
    coverage rather than presenting them as backdoor solutions. The combined
    operational picture is that defensive training is a meaningful frontier
    shift but not a complete defence; the production architecture combines
    detection, defensive training, and supply chain controls as complementary
    layers.

  position_in_chapter: |
    Section 8.13 sits between detection (Section 8.12) and the federated/gradient
    poisoning extension (Section 8.14) in Chapter 8 defensive infrastructure
    half. Sections 8.12 and 8.13 together constitute the principal defensive
    techniques for centralised training; Section 8.14 extends to decentralised
    training; Section 8.15 integrates everything into the production auditing
    pipeline. The chapter's defensive coverage is therefore organised as:
    detection (8.12) plus prevention (8.13) for centralised; both extended to
    decentralised (8.14); integrated as production architecture (8.15).

