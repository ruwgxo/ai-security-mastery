deliverables:

  deliverable_1:
    title: 'C&W L2 Core Implementation'
    filename: 'cw_attack.py'
    description: 'C&W L2 attack with tanh-space parameterisation, per-sample binary search on c, kappa parameter, Adam optimiser, targeted and untargeted modes'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. torch.atanh available from PyTorch 1.7+.
      Inputs normalised to [0, 1]. Per-sample c tracking for correct batch handling.
      Binary search resets Adam and w at each step (intentional: fresh start per c value).
    code: |
      # cw_attack.py
      # Section 10.5: C&W L2 Attack -- Carlini and Wagner 2017
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from typing import Optional


      def _compute_f(
          logits: Tensor,
          y: Tensor,
          targeted: bool,
          kappa: float,
      ) -> Tensor:
          '''
          Per-sample misclassification objective f (the g function from the paper).
          Returns a tensor of shape (N,); non-positive iff attack goal is satisfied.
          Targeted:   f = max(max_{i!=t} Z_i - Z_t, -kappa)   [want <= 0: Z_t >= max_other + kappa]
          Untargeted: f = max(Z_{ytrue} - max_{i!=ytrue} Z_i, -kappa) [want <= 0: ytrue no longer argmax]
          '''
          batch = logits.size(0)
          n_classes = logits.size(1)

          if targeted:
              # t = y (target class to force)
              z_target = logits.gather(1, y.view(-1, 1)).squeeze(1)
              # Mask target class to find best other
              mask = torch.ones_like(logits, dtype=torch.bool)
              mask.scatter_(1, y.view(-1, 1), False)
              best_other = logits[mask].view(batch, n_classes - 1).max(dim=1).values
              return torch.clamp(best_other - z_target, min=-kappa)
          else:
              # y = true class (to escape)
              z_correct = logits.gather(1, y.view(-1, 1)).squeeze(1)
              mask = torch.ones_like(logits, dtype=torch.bool)
              mask.scatter_(1, y.view(-1, 1), False)
              best_other = logits[mask].view(batch, n_classes - 1).max(dim=1).values
              return torch.clamp(z_correct - best_other, min=-kappa)


      def cw_l2(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          targeted: bool = False,
          kappa: float = 0.0,
          c_init: float = 1e-2,
          n_binary_search: int = 5,
          n_steps: int = 200,
          lr: float = 1e-2,
          clip_min: float = 0.0,
          clip_max: float = 1.0,
      ) -> Tensor:
          '''
          C&W L2 adversarial attack (Carlini and Wagner 2017).
          Minimises: ||delta||_2^2 + c * f(x + delta)
          where f is the misclassification objective with confidence margin kappa.
          Binary search over per-sample c to find minimum-norm adversarial examples.

          Args:
              model:            PyTorch classifier (eval mode)
              x:                Input batch (N, *), normalised to [clip_min, clip_max]
              y:                True labels (untargeted) or target labels (targeted)
              targeted:         If True, force output to class y
              kappa:            Confidence margin; kappa=0 for minimum-norm; kappa>0 for high-confidence
              c_init:           Initial penalty weight; binary search explores around this
              n_binary_search:  Binary search steps; 5 for fast eval, 9 for publication quality
              n_steps:          Adam optimisation steps per binary search step
              lr:               Adam learning rate
          Returns:
              best_x_adv:   Adversarial examples with minimum L2 norm found across all binary steps
          '''
          batch = x.size(0)
          x = x.detach().clone()

          # Per-sample c tracking
          c_low = torch.zeros(batch, device=x.device)
          c_high = torch.full((batch,), 1e10, device=x.device)
          c_batch = torch.full((batch,), c_init, device=x.device)

          best_l2 = torch.full((batch,), float('inf'), device=x.device)
          best_x_adv = x.clone()

          # Broadcast c to match input shape for per-sample loss scaling
          def expand_c(c_vec):
              dims = [batch] + [1] * (x.dim() - 1)
              return c_vec.view(dims)

          for binary_step in range(n_binary_search):
              # Fresh w and Adam each binary step
              x_clamped = x.clamp(clip_min + 1e-6, clip_max - 1e-6)
              w = torch.atanh(2.0 * (x_clamped - clip_min) / (clip_max - clip_min) - 1.0)
              w = w.detach().requires_grad_(True)
              optimiser = torch.optim.Adam([w], lr=lr)

              for step in range(n_steps):
                  optimiser.zero_grad()

                  # Recover x_adv in [clip_min, clip_max]
                  x_adv = clip_min + (clip_max - clip_min) * 0.5 * (torch.tanh(w) + 1.0)

                  # L2 term: per-sample squared norm
                  delta = x_adv - x
                  l2_sq = delta.pow(2).view(batch, -1).sum(dim=1)

                  # Misclassification term
                  logits = model(x_adv)
                  f_val = _compute_f(logits, y, targeted, kappa)

                  # Combined per-sample loss
                  loss = (l2_sq + expand_c(c_batch) * f_val).sum()
                  loss.backward()
                  optimiser.step()

              # Evaluate after optimisation
              with torch.no_grad():
                  x_adv = clip_min + (clip_max - clip_min) * 0.5 * (torch.tanh(w) + 1.0)
                  delta = x_adv - x
                  l2 = delta.pow(2).view(batch, -1).sum(dim=1).sqrt()

                  logits = model(x_adv)
                  preds = logits.argmax(dim=1)
                  success = (preds == y) if targeted else (preds != y)

                  # Keep best (lowest L2) successful adversarial examples
                  improved = success & (l2 < best_l2)
                  best_l2[improved] = l2[improved]
                  best_x_adv[improved] = x_adv[improved]

                  # Binary search: tighten c bounds
                  c_high = torch.where(success, torch.min(c_high, c_batch), c_high)
                  c_low = torch.where(~success, torch.max(c_low, c_batch), c_low)
                  c_batch = torch.where(
                      c_high < 9e9,
                      (c_low + c_high) * 0.5,
                      c_batch * 10.0,
                  )

          return best_x_adv.detach()


      def attack_success_rate(model, x_adv, y_true):
          with torch.no_grad():
              preds = model(x_adv).argmax(dim=1)
          return (preds != y_true).float().mean().item()


      def mean_l2_norm(x_adv, x_orig):
          delta = (x_adv - x_orig).view(x_adv.size(0), -1)
          return delta.norm(p=2, dim=1).mean().item()


      # --- Demo ---

      def demo():
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              return

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(8, 1, 28, 28)
          y = torch.randint(0, 10, (8,))

          print('C&W L2 demo on ToyLinear (synthetic data)')
          print(f'{"kappa":<8} {"success":<10} {"mean_L2":<12}')
          print('-' * 32)
          for kappa in [0.0, 5.0, 20.0]:
              x_adv = cw_l2(model, x, y, targeted=False, kappa=kappa,
                            n_binary_search=4, n_steps=100, lr=1e-2)
              rate = attack_success_rate(model, x_adv, y)
              l2 = mean_l2_norm(x_adv, x)
              print(f'{kappa:<8.1f} {rate:<10.3f} {l2:<12.4f}')


      if __name__ == '__main__':
          demo()

  deliverable_2:
    title: 'C&W L0 Variant: Shrink-from-L2 Sparse Attack'
    filename: 'cw_l0_variant.py'
    description: 'Sparse adversarial attack via iterative feature removal from a C&W L2 adversarial example; produces minimum-L0 perturbations by greedily zeroing features while maintaining misclassification'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import cw_l2 from cw_attack.py.
      Shrink approach: start with L2 adversarial example, remove smallest-perturbation features
      while misclassification is maintained. O(D) model evaluations per sample for D features.
      Intended for structured inputs (malware, tabular) where sparse perturbations are natural.
    code: |
      # cw_l0_variant.py
      # Section 10.5: C&W L0 Variant -- Sparse Adversarial Perturbations
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      from torch import Tensor
      from typing import Optional
      from cw_attack import cw_l2, attack_success_rate


      def cw_l0_shrink(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          targeted: bool = False,
          kappa: float = 0.0,
          cw_binary_search: int = 4,
          cw_steps: int = 100,
          batch_eval: bool = True,
      ) -> Tensor:
          '''
          Sparse adversarial attack via shrink-from-L2.
          Step 1: generate C&W L2 adversarial example (initial sparse start unnecessary).
          Step 2: sort features by perturbation magnitude ascending (smallest first).
          Step 3: greedily restore each feature to its original value while the input
                  remains adversarial. Keep the change if attack is maintained; discard if not.
          Returns adversarial examples minimising L0 norm (number of changed features).
          '''
          # Step 1: C&W L2 to get initial adversarial example
          x_adv = cw_l2(model, x, y, targeted=targeted, kappa=kappa,
                        n_binary_search=cw_binary_search, n_steps=cw_steps)

          batch = x.size(0)
          x_adv = x_adv.detach().clone()
          x_orig = x.detach().clone()

          # Step 2: sort feature indices by absolute perturbation magnitude (ascending)
          delta = (x_adv - x_orig).view(batch, -1).abs()
          sorted_indices = delta.argsort(dim=1)  # shape (batch, n_features); smallest first

          n_features = delta.size(1)
          x_flat = x_orig.view(batch, -1).clone()
          x_adv_flat = x_adv.view(batch, -1).clone()

          # Step 3: greedy feature removal
          for feat_pos in range(n_features):
              # Try restoring this feature for all samples simultaneously
              test_flat = x_adv_flat.clone()
              for b in range(batch):
                  feat = sorted_indices[b, feat_pos].item()
                  test_flat[b, feat] = x_flat[b, feat]

              test_input = test_flat.view_as(x_orig)

              with torch.no_grad():
                  preds = model(test_input).argmax(dim=1)
                  still_adv = (preds == y) if targeted else (preds != y)

              # Accept the restoration for samples where attack still holds
              for b in range(batch):
                  if still_adv[b].item():
                      feat = sorted_indices[b, feat_pos].item()
                      x_adv_flat[b, feat] = x_flat[b, feat]

          return x_adv_flat.view_as(x_orig).detach()


      def compare_l0_l2_sparsity(
          model: nn.Module,
          x: Tensor,
          y: Tensor,
          kappa: float = 0.0,
      ) -> None:
          '''Compare L0 (number of changed features) between L2-C&W and L0-C&W.'''
          print('C&W L2 vs L0 sparsity comparison')
          x_adv_l2 = cw_l2(model, x, y, targeted=False, kappa=kappa,
                            n_binary_search=4, n_steps=100)
          x_adv_l0 = cw_l0_shrink(model, x, y, targeted=False, kappa=kappa)

          def l0_norm(a, b):
              diff = (a - b).abs().view(a.size(0), -1)
              return (diff > 1e-5).float().sum(dim=1).mean().item()

          def l2_norm(a, b):
              return (a - b).view(a.size(0), -1).norm(p=2, dim=1).mean().item()

          rate_l2 = attack_success_rate(model, x_adv_l2, y)
          rate_l0 = attack_success_rate(model, x_adv_l0, y)

          print(f'  C&W L2: success={rate_l2:.3f}, L0={l0_norm(x_adv_l2, x):.1f} features, '
                f'L2={l2_norm(x_adv_l2, x):.4f}')
          print(f'  C&W L0: success={rate_l0:.3f}, L0={l0_norm(x_adv_l0, x):.1f} features, '
                f'L2={l2_norm(x_adv_l0, x):.4f}')
          print()
          print('  L0 norm: fraction of features that changed.')
          print('  Relevance: malware byte modification, fraud feature perturbation.')


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(4, 1, 28, 28)
          y = torch.randint(0, 10, (4,))
          compare_l0_l2_sparsity(model, x, y, kappa=0.0)

