    code: |
      # cw_vs_pgd_quality_benchmark.py
      # Section 10.5: C&W vs PGD Perturbation Quality Comparison
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import matplotlib.pyplot as plt
      from cw_attack import cw_l2, attack_success_rate, mean_l2_norm
      from pgd_attack import pgd_linf


      def benchmark(model, x, y, epsilons_pgd, cw_kappa=0.0, pgd_steps=40, pgd_restarts=3):
          '''
          For each PGD epsilon: run PGD and C&W, compare L2 norms at matched success rate.
          C&W finds minimum-norm examples; PGD uses fixed epsilon.
          '''
          results = []
          for eps in epsilons_pgd:
              alpha = eps / 10.0
              x_pgd = pgd_linf(model, x, y, eps, alpha, pgd_steps, pgd_restarts)
              pgd_rate = attack_success_rate(model, x_pgd, y)
              pgd_l2 = mean_l2_norm(x_pgd, x)

              results.append({
                  'epsilon': eps,
                  'pgd_rate': pgd_rate,
                  'pgd_l2': pgd_l2,
              })

          # Run C&W once (norm-minimising; not epsilon-parameterised)
          x_cw = cw_l2(model, x, y, targeted=False, kappa=cw_kappa,
                       n_binary_search=5, n_steps=150, lr=1e-2)
          cw_rate = attack_success_rate(model, x_cw, y)
          cw_l2_val = mean_l2_norm(x_cw, x)

          return results, cw_rate, cw_l2_val, x_cw


      def print_benchmark(results, cw_rate, cw_l2_val):
          print(f'{"Method":<22} {"Success rate":<16} {"Mean L2 norm":<14}')
          print('-' * 54)
          for r in results:
              name = f'PGD eps={r["epsilon"] * 255:.0f}/255'
              print(f'{name:<22} {r["pgd_rate"]:<16.3f} {r["pgd_l2"]:<14.4f}')
          print(f'{"C&W L2 (kappa=0)":<22} {cw_rate:<16.3f} {cw_l2_val:<14.4f}')
          print()
          print('C&W finds minimum-norm adversarial examples regardless of epsilon.')
          print('At matched success rate, C&W L2 norm <= PGD L2 norm.')


      def plot_benchmark(results, cw_rate, cw_l2_val, save_path='cw_vs_pgd_quality.png'):
          eps_255 = [r['epsilon'] * 255 for r in results]
          pgd_l2s = [r['pgd_l2'] for r in results]
          pgd_rates = [r['pgd_rate'] for r in results]

          fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 5))

          ax1.plot(eps_255, pgd_l2s, color='#2980b9', linewidth=2,
                   marker='o', markersize=5, label='PGD L2 norm')
          ax1.axhline(cw_l2_val, color='#27ae60', linestyle='--', linewidth=2,
                      label=f'C&W L2 norm (kappa=0): {cw_l2_val:.4f}')
          ax1.set_xlabel('PGD epsilon (pixel units)', fontsize=11)
          ax1.set_ylabel('Mean L2 perturbation norm', fontsize=11)
          ax1.set_title('C&W vs PGD: Perturbation Norm', fontsize=11)
          ax1.legend(fontsize=9)
          ax1.grid(True, alpha=0.3)

          ax2.plot(eps_255, pgd_rates, color='#2980b9', linewidth=2,
                   marker='o', markersize=5, label='PGD success rate')
          ax2.axhline(cw_rate, color='#27ae60', linestyle='--', linewidth=2,
                      label=f'C&W success rate: {cw_rate:.3f}')
          ax2.set_xlabel('PGD epsilon (pixel units)', fontsize=11)
          ax2.set_ylabel('Attack success rate', fontsize=11)
          ax2.set_title('C&W vs PGD: Attack Success Rate', fontsize=11)
          ax2.legend(fontsize=9)
          ax2.grid(True, alpha=0.3)
          ax2.set_ylim(0, 1.05)

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(16, 1, 28, 28)
          y = torch.randint(0, 10, (16,))

          epsilons = [i / 255 for i in [4, 8, 12, 16, 24, 32]]
          results, cw_rate, cw_l2_val, _ = benchmark(model, x, y, epsilons)
