  deliverable_4:
    title: 'Defence Evaluator: Adaptive C&W'
    filename: 'defence_evaluator_cw.py'
    description: 'Uses C&W as an adaptive adversary by threading a defence (feature squeezer) through the misclassification objective; tests whether defences that defeat PGD fall to C&W'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch. Import cw_l2 structure adapted inline for adaptive use.
      The key change: pass squeezer(x_adv) through model instead of x_adv when computing f_val.
      This produces adversarial examples that misclassify AFTER squeezing.
    code: |
      # defence_evaluator_cw.py
      # Section 10.5: Adaptive C&W for Defence Evaluation
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import torch.nn as nn
      import torch.nn.functional as F
      from torch import Tensor
      from typing import Callable, Optional
      from cw_attack import _compute_f, attack_success_rate, mean_l2_norm


      def adaptive_cw_l2(
          model: nn.Module,
          defence_fn: Callable[[Tensor], Tensor],
          x: Tensor,
          y: Tensor,
          targeted: bool = False,
          kappa: float = 0.0,
          c: float = 1.0,
          n_steps: int = 300,
          lr: float = 5e-3,
      ) -> Tensor:
          '''
          Adaptive C&W: pass defence_fn(x_adv) through model for the misclassification objective.
          The optimiser finds adversarial examples that survive the defence.
          c is fixed (no binary search) for simplicity; tune c per deployment.

          Key difference from standard cw_l2:
              logits = model(defence_fn(x_adv))   <-- defence applied before model
          instead of:
              logits = model(x_adv)
          '''
          batch = x.size(0)
          x = x.detach().clone()

          x_clamped = x.clamp(1e-6, 1.0 - 1e-6)
          w = torch.atanh(2.0 * x_clamped - 1.0).detach().requires_grad_(True)
          optimiser = torch.optim.Adam([w], lr=lr)

          best_l2 = torch.full((batch,), float('inf'), device=x.device)
          best_x_adv = x.clone()

          for step in range(n_steps):
              optimiser.zero_grad()
              x_adv = 0.5 * (torch.tanh(w) + 1.0)
              delta = x_adv - x
              l2_sq = delta.pow(2).view(batch, -1).sum(dim=1)

              # ADAPTIVE: evaluate misclassification on DEFENDED input
              x_defended = defence_fn(x_adv)
              logits = model(x_defended)
              f_val = _compute_f(logits, y, targeted, kappa)

              loss = (l2_sq + c * f_val).sum()
              loss.backward()
              optimiser.step()

          with torch.no_grad():
              x_adv = 0.5 * (torch.tanh(w) + 1.0)
              delta = x_adv - x
              l2 = delta.pow(2).view(batch, -1).sum(dim=1).sqrt()
              x_defended = defence_fn(x_adv)
              preds = model(x_defended).argmax(dim=1)
              success = (preds == y) if targeted else (preds != y)
              improved = success & (l2 < best_l2)
              best_x_adv[improved] = x_adv[improved]

          return best_x_adv.detach()


      def gaussian_squeeze(x: Tensor, sigma: float = 1.0) -> Tensor:
          '''Gaussian blur squeezer (preview of Section 10.11).'''
          k, half = 5, 2
          coords = torch.arange(-half, half + 1, dtype=torch.float32)
          kernel_1d = torch.exp(-coords ** 2 / (2 * sigma ** 2))
          kernel_1d = kernel_1d / kernel_1d.sum()
          kernel_2d = (kernel_1d.unsqueeze(0) * kernel_1d.unsqueeze(1)).unsqueeze(0).unsqueeze(0)
          n_ch = x.shape[1]
          kernel_2d = kernel_2d.expand(n_ch, 1, k, k)
          return torch.clamp(F.conv2d(x, kernel_2d, padding=half, groups=n_ch), 0.0, 1.0)


      def evaluate_defence(model, x, y, defence_fn, defence_name):
          from cw_attack import cw_l2

          # Standard (non-adaptive) C&W
          x_std = cw_l2(model, x, y, targeted=False, kappa=0.0,
                        n_binary_search=3, n_steps=100)
          # Evaluate on defended model
          with torch.no_grad():
              defended_preds_std = model(defence_fn(x_std)).argmax(dim=1)
          std_bypass = (defended_preds_std != y).float().mean().item()

          # Adaptive C&W
          x_adp = adaptive_cw_l2(model, defence_fn, x, y, kappa=0.0,
                                  c=1.0, n_steps=200, lr=5e-3)
          with torch.no_grad():
              defended_preds_adp = model(defence_fn(x_adp)).argmax(dim=1)
          adp_bypass = (defended_preds_adp != y).float().mean().item()

          print(f'\nDefence evaluation: {defence_name}')
          print(f'  Non-adaptive C&W bypass rate: {std_bypass:.3f}')
          print(f'  Adaptive C&W bypass rate:     {adp_bypass:.3f}')
          adv_gap = adp_bypass - std_bypass
          print(f'  Adaptive advantage:           +{adv_gap:.3f}')
          if adv_gap > 0.1:
              print('  FLAG: adaptive attack substantially outperforms non-adaptive.')
              print('  Defence appears to defend against non-adaptive attacks only.')


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(8, 1, 28, 28)
          y = torch.randint(0, 10, (8,))

          # Evaluate feature squeezing as defence
          import functools
          squeezer = functools.partial(gaussian_squeeze, sigma=1.0)
          evaluate_defence(model, x, y, squeezer, 'Gaussian squeezer (sigma=1.0)')

          # Identity defence (no defence) as sanity check
          evaluate_defence(model, x, y, lambda inp: inp, 'No defence (identity)')

  deliverable_5:
    title: 'C&W Confidence Sweep'
    filename: 'cw_confidence_sweep.py'
    description: 'Sweeps kappa from 0 to 50 measuring perturbation size, attack success rate, and estimated consistency checker detection rate; identifies the kappa range where C&W defeats consistency checking'
    implementation_notes: |
      Python 3.12, single quotes throughout per book convention.
      Requires: torch, matplotlib. Import cw_l2, attack_success_rate, mean_l2_norm from cw_attack.py.
      Consistency check approximated inline: check prediction stability under N random perturbations.
    code: |
      # cw_confidence_sweep.py
      # Section 10.5: C&W Kappa Sweep -- Confidence vs Detectability
      # 20260523 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import torch
      import matplotlib.pyplot as plt
      from typing import List
      from cw_attack import cw_l2, attack_success_rate, mean_l2_norm


      def consistency_check_detection_rate(
          model,
          x_adv: torch.Tensor,
          y_true: torch.Tensor,
          n_variants: int = 20,
          noise_std: float = 0.02,
      ) -> float:
          '''
          Fraction of adversarial examples caught by consistency check.
          Fires when prediction on x_adv differs from majority vote on N noisy variants.
          '''
          batch = x_adv.size(0)
          with torch.no_grad():
              pred_adv = model(x_adv).argmax(dim=1)

              # N noisy variants
              variant_preds = []
              for _ in range(n_variants):
                  noise = torch.randn_like(x_adv) * noise_std
                  x_noisy = torch.clamp(x_adv + noise, 0.0, 1.0)
                  variant_preds.append(model(x_noisy).argmax(dim=1))

              # Stack: (n_variants, batch)
              variant_stack = torch.stack(variant_preds, dim=0)  # (N, B)
              # Majority vote per sample
              majority = []
              for b in range(batch):
                  votes = variant_stack[:, b]
                  majority.append(votes.mode().values.item())
              majority = torch.tensor(majority, device=x_adv.device)

              # Detection: majority vote disagrees with adversarial prediction
              detected = (majority != pred_adv).float().mean().item()
          return detected


      def kappa_sweep(
          model,
          x: torch.Tensor,
          y: torch.Tensor,
          kappas: List[float],
          n_binary: int = 4,
          n_steps: int = 100,
      ) -> None:
          print(f'{"kappa":<8} {"success":<10} {"mean_L2":<12} {"cc_detect":<12} {"notes"}')
          print('-' * 62)
          success_list, l2_list, cc_list = [], [], []

          for kappa in kappas:
              x_adv = cw_l2(model, x, y, targeted=False, kappa=kappa,
                            n_binary_search=n_binary, n_steps=n_steps)
              rate = attack_success_rate(model, x_adv, y)
              l2 = mean_l2_norm(x_adv, x)
              cc = consistency_check_detection_rate(model, x_adv, y)
              note = 'min-norm' if kappa == 0.0 else ('high-conf' if kappa >= 20 else '')
              print(f'{kappa:<8.1f} {rate:<10.3f} {l2:<12.4f} {cc:<12.3f} {note}')
              success_list.append(rate)
              l2_list.append(l2)
              cc_list.append(cc)
          return success_list, l2_list, cc_list


      def plot_kappa_sweep(
          kappas, success_list, l2_list, cc_list,
          save_path='cw_kappa_sweep.png',
      ):
          fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(12, 5))

          ax1.plot(kappas, l2_list, color='#e74c3c', linewidth=2,
                   marker='o', markersize=5, label='Mean L2 perturbation norm')
          ax1_r = ax1.twinx()
          ax1_r.plot(kappas, success_list, color='#2980b9', linewidth=2,
                     linestyle='--', marker='s', markersize=5, label='Attack success rate')
          ax1.set_xlabel('kappa', fontsize=11)
          ax1.set_ylabel('Mean L2 norm (red)', color='#e74c3c', fontsize=11)
          ax1_r.set_ylabel('Attack success rate (blue)', color='#2980b9', fontsize=11)
          ax1.set_title('kappa vs Perturbation Size and Success Rate', fontsize=11)
          ax1.grid(True, alpha=0.3)

          ax2.plot(kappas, cc_list, color='#8e44ad', linewidth=2,
                   marker='D', markersize=5, label='Consistency check detection rate')
          ax2.axhline(0.5, color='grey', linestyle='--', alpha=0.5)
          ax2.text(max(kappas) * 0.05, 0.52, '50% detection threshold', fontsize=8, color='grey')
          ax2.set_xlabel('kappa', fontsize=11)
          ax2.set_ylabel('CC detection rate', fontsize=11)
          ax2.set_title('kappa vs Consistency Check Detection Rate\n(higher kappa = harder for CC to detect)', fontsize=11)
          ax2.legend(fontsize=9)
          ax2.grid(True, alpha=0.3)
          ax2.set_ylim(0, 1.05)

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      if __name__ == '__main__':
          try:
              from fgsm_attack import ToyLinear
          except ImportError:
              print('Run from directory containing fgsm_attack.py')
              raise SystemExit

          torch.manual_seed(42)
          model = ToyLinear()
          model.eval()
          x = torch.rand(8, 1, 28, 28)
          y = torch.randint(0, 10, (8,))

          kappas = [0.0, 2.0, 5.0, 10.0, 20.0, 35.0, 50.0]
          print('C&W Kappa Sweep: Perturbation Size vs Consistency Check Detection')
          print('=' * 62)
          sr, l2, cc = kappa_sweep(model, x, y, kappas, n_binary=3, n_steps=80)
          plot_kappa_sweep(kappas, sr, l2, cc)

common_mistakes:

  mistake_1:
    description: 'Not clamping the input away from 0 and 1 before torch.atanh initialisation, producing NaN or inf in w and crashing Adam'
    why_it_happens: |
      Engineers initialise w = torch.atanh(2*x - 1) directly without clamping. For images
      normalised to [0, 1], any pixel that is exactly 0 or 1 produces atanh(-1) or atanh(1)
      which are negative infinity and positive infinity. These values propagate through the
      tanh(w) computation as NaN, crashing the entire Adam optimisation silently (loss becomes
      NaN, grad becomes NaN, w becomes NaN) and producing a useless x_adv.
    consequence: |
      The adversarial example is all NaN or remains equal to x (no perturbation). Attack success
      rate is near-zero. The error is invisible because PyTorch NaN propagation does not raise
      an exception by default -- the code runs to completion with garbage output.
    correct_approach: |
      Always clamp the input before tanh-space initialisation: x_clamped = x.clamp(1e-6, 1-1e-6).
      The clamping does not change the adversarial objective meaningfully (pixels shifted by 1e-6
      are indistinguishable from 0 or 1) but prevents infinity. Add a NaN check after initialisation:
      assert not torch.isnan(w).any(), 'NaN in w initialisation -- check input clamping'.

  mistake_2:
    description: 'Using the wrong sign convention for the targeted vs untargeted misclassification objective'
    why_it_happens: |
      The targeted and untargeted f functions look similar but have opposite success conditions.
      Engineers copy the targeted formula for untargeted use (or vice versa), producing an
      objective that is already satisfied at x=x_orig (the attack starts already "successful"
      from the penalty perspective) and produces trivial adversarial examples with zero perturbation.
    consequence: |
      Untargeted attack with targeted objective: f_val = max(best_other - Z_target, -kappa).
      If target is the true class, Z_true >= best_other always (correct classification), so
      f_val = -kappa for all x near x_orig. The l2_sq + c*(-kappa) objective is minimised by
      minimising l2_sq -- the attack immediately converges with delta = 0, no misclassification.
      Success rate is zero.
    correct_approach: |
      Targeted f: max(max_{i!=t}(Z_i) - Z_t, -kappa). Non-positive when Z_t is the argmax
      with margin kappa. Untargeted f: max(Z_{ytrue} - max_{i!=ytrue}(Z_i), -kappa). Non-positive
      when Z_ytrue is no longer the argmax. Always test that f_val is strictly positive for
      natural inputs before running C&W -- if f_val is near -kappa for x_orig, the objective
      is already satisfied and the attack will produce trivial delta=0 examples.

  mistake_3:
    title: 'Not resetting Adam and w at each binary search step'
    description: 'Reusing the w tensor and Adam state across binary search steps, carrying over momentum from the previous c value'
    why_it_happens: |
      Binary search runs multiple times with different c values. Engineers allocate w and Adam
      once before the binary search loop and carry them across steps, expecting warm-starting to
      help convergence. This seems reasonable but is wrong.
    consequence: |
      Adam''s momentum and second-moment estimates are calibrated to the previous c value. When
      c changes (potentially by 10x between binary search steps), the Adam update magnitude is
      miscalibrated. The optimisation frequently diverges on the first few steps after a large c
      change, wasting the entire binary search budget on poorly converged runs. Best adversarial
      examples are worse than single-step non-binary-search C&W.
    correct_approach: |
      Reset w to the fresh tanh-space initialisation at the start of each binary search step:
      w = torch.atanh(2*x_clamped - 1).detach().requires_grad_(True). Create a fresh
      torch.optim.Adam([w], lr=lr) for each step. The cost is O(n_binary_search) Adam
      initialisations, which is negligible compared to the optimisation step count.

  mistake_4:
    description: 'Using kappa=0 for all defence evaluations including consistency checking, missing the detection gap at high kappa'
    why_it_happens: |
      kappa=0 is the standard minimum-norm configuration. Engineers run one kappa=0 C&W
      evaluation, find that Track 7 catches a certain fraction, and report that as the detection
      rate. The kappa dimension is not swept.
    consequence: |
      Consistency checking is specifically effective against fragile boundary-proximate adversarial
      examples -- exactly what kappa=0 C&W produces. A kappa=0 evaluation shows high consistency
      check detection rate. kappa=20 or kappa=50 produces high-confidence adversarial examples
      that are stable under the consistency check''s random perturbations. The true defence gap
      (the fraction of adversarial examples that evade the full ensemble at high kappa) is
      significantly higher than the kappa=0 evaluation reports.
    correct_approach: |
      Always sweep kappa from 0 to at least 50 for any Track 7 detection evaluation. Use the
      cw_confidence_sweep.py deliverable from this section. Report both the kappa=0 detection
      rate (minimum-norm adversarial examples) and the kappa=20 detection rate (high-confidence
      adversarial examples). The gap between them is the consistency checker''s useful operating
      range. Any robustness claim should specify which kappa range it covers.

  mistake_5:
    description: 'Running C&W for adversarial training data generation, treating it as a drop-in replacement for PGD in the inner training loop'
    why_it_happens: |
      C&W produces higher-quality adversarial examples than PGD. Engineers reason that training
      on C&W examples should produce more robust models than training on PGD examples, and attempt
      to replace the PGD inner loop in adversarial training with C&W.
    consequence: |
      C&W requires n_binary_search * n_steps = 5 * 200 = 1000 forward-backward passes per
      adversarial example. PGD requires 7 passes (Madry training config). At batch size 128,
      one adversarial training step with C&W requires 128,000 forward-backward passes; with
      PGD-7 it requires 896 passes. C&W adversarial training is approximately 143x slower than
      PGD adversarial training. A training run that takes 2 hours with PGD takes 12 days with
      C&W. The compute is completely infeasible.
    correct_approach: |
      Use PGD-7 (PGDConfig.madry_training) for the adversarial training inner loop as in
      Section 10.15. Use C&W for evaluation after training to verify that the PGD-trained model
      is also robust to C&W adversarial examples. The two have complementary roles: PGD trains,
      C&W evaluates. They are not interchangeable.

section_summary:

  compact: |
    C&W minimises ||delta||_2 + c*g(x+delta) where g is a misclassification objective with
    confidence margin kappa. The tanh-space parameterisation (x_adv = 0.5*(tanh(w)+1)) handles
    the box constraint automatically, enabling clean Adam optimisation without projection. Binary
    search on the per-sample regularisation constant c finds the minimum norm for which the attack
    succeeds. kappa=0 produces minimum-norm fragile adversarial examples; kappa>0 produces high-
    confidence examples that survive squeezing and consistency checking. C&W is not for adversarial
    training (too expensive) -- it is the evaluation adversary that tests whether defences that
    defeat PGD also defeat an adaptive attacker who optimises through the defence. The honest
    conclusion from C&W evaluation is always a number, not a verdict: at kappa=20, N% of examples
    evade the Track 7 ensemble.

  key_takeaways:
    - 'C&W minimises perturbation norm directly (not fixed epsilon); it finds the closest adversarial example to the natural input'
    - 'Tanh-space parameterisation: w = atanh(2x-1), x_adv = 0.5*(tanh(w)+1); always in [0,1]; clamp x to (0,1) exclusive before atanh'
    - 'kappa=0 for minimum-norm benchmarking; kappa>=20 for breaking consistency checking; always sweep kappa for complete Track 7 evaluation'
    - 'Binary search resets Adam and w at each step -- warm-starting across c values is incorrect and degrades quality'
    - 'Adaptive C&W: pass defence_fn(x_adv) through model in the misclassification objective; this is the correct evaluation methodology for any preprocessing defence'
    - 'C&W is for evaluation only -- never for adversarial training; 100-1000x more expensive than PGD per example'

preview_section_10_06:
  title: 'Section 10.6: Black-Box Adversarial Attacks -- Boundary Attack and Natural Evolution Strategies'
  summary: |
    Section 10.6 implements the two canonical black-box adversarial attacks that operate without
    gradient access -- the same API conditions Chapter 9 established for extraction. The Boundary
    Attack (Brendel et al. 2018) starts from a trivially misclassified input and walks toward the
    natural image while staying adversarial, requiring only a hard-label binary oracle. NES (Natural
    Evolution Strategies) estimates the gradient direction from antithetic query pairs under
    soft-label (score-based) conditions: query at x+delta_i and x-delta_i and estimate gradient
    from the score difference. Both attacks are measured in query budget per adversarial example
    (10,000-100,000 for Boundary Attack; 1,000-10,000 per gradient step for NES). The detection
    connection: Track 6''s query pattern monitor already partially detects Boundary Attack campaigns
    because boundary proximity queries generate the same query distribution anomalies as boundary
    extraction. Section 10.6 quantifies the shared detection surface.

