section_overview:
  one_line_summary: 'C&W minimises ||delta||_2 directly rather than fixing epsilon, producing minimum-norm adversarial examples that break defences FGSM and PGD cannot reach.'
  why_this_section_exists: |
    C&W is the defence evaluation attack. Any security team claiming adversarial robustness
    should test against C&W with adaptive knowledge of the defence -- that is the methodology
    Carlini and Wagner introduced, and it is still the standard today. Where PGD measures "how
    robust is this model at epsilon X", C&W measures "what is the minimum perturbation needed
    to fool this model (or this defence)?". The two questions are complementary: PGD sets the
    evaluation standard; C&W finds the cracks. Section 10.5 builds the tool that Sections
    10.11-10.15 use to evaluate every defence in Chapter 10.
  position_in_chapter: |
    Section 10.5 closes the white-box attack trilogy (FGSM 10.3, PGD 10.4, C&W 10.5). C&W is
    the strongest and most expensive of the three. The attack is referenced throughout the defence
    sections as the evaluation adversary and in the common_mistakes of prior sections as the
    attack that exposes gradient masking defences PGD leaves intact.

learning_objectives:

  knowledge:
    - 'State the C&W L2 problem formulation: minimise ||delta||_2 + c*g(x+delta) where g is the misclassification objective, and explain why this is equivalent to the constrained problem'
    - 'Describe the tanh-space change of variables and explain why it eliminates the need for explicit box-constraint projection'
    - 'Explain the confidence parameter kappa: what it controls, why kappa=0 finds minimum-norm adversarial examples, and why kappa>0 produces examples that survive squeezing and consistency checking'
    - 'Describe the binary search on c: what the two failure modes are (c too small: attack fails; c too large: perturbation unnecessarily large) and how binary search finds the minimum c for success'
    - 'State the three C&W norm variants and the input domain where each is most relevant'
    - 'Explain why C&W is the correct attack for adaptive defence evaluation and what "adaptive" means'

  skills:
    - 'Implement C&W L2 in PyTorch with tanh-space parameterisation, binary search on c, kappa parameter, and Adam optimiser'
    - 'Implement a simplified C&W L0 attack using the shrink-from-L2 approach'
    - 'Benchmark C&W vs PGD at matched success rate and compare minimum perturbation norms'
    - 'Use C&W as an adaptive adversary by threading a defence through the misclassification objective'
    - 'Run a kappa sweep and identify the kappa value at which consistency checking detection drops below a threshold'

  security_mindset:
    - 'Treat any defence that defeats PGD but has not been tested against C&W as unverified -- PGD failure is a necessary but not sufficient condition for robustness'
    - 'Understand that "adaptive adversary" is not a stronger attacker but a smarter one: they optimise through the defence rather than against it'
    - 'Recognise that the honest conclusion from C&W evaluation is never "the defence is broken" but "at this perturbation norm and kappa, this percentage of examples evade this defence" -- quantify, not dismiss'
    - 'Appreciate that C&W high kappa is specifically the tool for breaking consistency checking: it produces examples with large margin from the decision boundary that are stable under input transformation'

