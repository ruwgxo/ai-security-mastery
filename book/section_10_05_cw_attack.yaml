prose_content:

  part_1:
    title: 'Why C&W Was Written: A Response to Unverified Defence Claims'
    body: |
      By 2016, the adversarial ML literature had accumulated dozens of proposed defences, each
      claiming to defeat adversarial examples. Defensive distillation, input transformations,
      feature squeezing, ensemble methods -- all reported near-zero FGSM attack success rates
      and were published as solved problems. Carlini and Wagner were sceptical.

      Their 2017 paper "Towards Evaluating the Robustness of Neural Networks" made a methodological
      argument: proposed defences should be evaluated against adversaries that know the defence and
      optimise specifically against it. An adversary constrained to use FGSM is not a realistic
      threat model for a deployed defence. A realistic adversary who knows the defence is in place
      will design their attack to circumvent it -- this is the "adaptive adversary" standard.

      They then proposed C&W as a practical adaptive attack: a constrained optimisation problem
      solved with Adam gradient descent and binary search, producing minimum-norm adversarial
      examples that are more targeted and more persistent than FGSM or PGD. They applied it to
      seven of the most cited defences of the period, broke all seven, and published the results.
      The field''s evaluation methodology shifted permanently: a defence that has not been tested
      against C&W or an equivalent adaptive attack is not considered verified.

      For production security engineers, the lesson is identical. Sections 10.11-10.12 build
      Track 7 detection primitives. Every primitive in this chapter is evaluated against C&W
      with the primitive''s own logic included in the attack objective -- the adaptive adversary
      standard. The fraction of C&W adversarial examples that survive the Track 7 ensemble is
      the honest measure of detection coverage, not the detection rate against FGSM alone.

  part_2:
    title: 'The Formulation: From Constrained to Unconstrained Optimisation'
    body: |
      The naive formulation of minimum-norm adversarial examples is:
      minimise ||delta||_2 subject to argmax f(x + delta) = t, and 0 <= x + delta <= 1.
      This is a constrained optimisation problem with both a classification constraint
      (force the model to output class t) and a box constraint (keep the input in the valid
      pixel range). Constrained optimisation is harder than unconstrained: projection-based
      methods work for the box constraint but not for the non-convex classification constraint.

      C&W reformulates this as unconstrained optimisation by incorporating the classification
      constraint into the objective via a penalty term:
      minimise ||delta||_2 + c * g(x + delta)
      where g is a misclassification function that is non-positive exactly when the
      adversarial example achieves the desired classification.

      For a targeted attack (force output to class t), g is:
      g(x + delta) = max(max_{i != t} Z_i(x + delta) - Z_t(x + delta), -kappa)
      where Z_i is the i-th logit output. This function is non-positive when Z_t >= max_other + kappa.
      For untargeted attack (force any misclassification), g is:
      g(x + delta) = max(Z_{y_true}(x + delta) - max_{i != y_true} Z_i(x + delta), -kappa)
      which is non-positive when the correct class is no longer the highest-scoring class.

      The scalar c controls the penalty strength. Small c: the optimiser focuses on minimising
      ||delta||_2 and may not satisfy the classification constraint. Large c: the classification
      constraint is satisfied but the perturbation may be unnecessarily large. The optimal c is
      the smallest value for which the attack succeeds -- found via binary search.

  part_3:
    title: 'The Tanh-Space Change of Variables'
    body: |
      The box constraint 0 <= x + delta <= 1 remains after reformulating the classification
      constraint as a penalty. Handling it with projection (as PGD does) would require projecting
      back onto a box at each optimisation step, which interacts badly with Adam''s adaptive
      learning rate. C&W eliminates the box constraint by reparameterising the optimisation
      variable.

      Introduce an unconstrained variable w in R^n and define:
      x + delta = 0.5 * (tanh(w) + 1.0)
      Since tanh maps R to (-1, 1), this maps w to (0, 1) automatically -- no box constraint
      needed. The optimiser updates w freely in unconstrained space; x + delta is always a valid
      input by construction.

      Initialising w from the original input x requires the inverse: w_0 = atanh(2 * x - 1).
      At x = 0 or x = 1, atanh is ±infinity, so x must be clamped slightly inside (0, 1) before
      initialisation. The perturbation in the original space is delta = 0.5 * (tanh(w) + 1.0) - x,
      and the L2 norm being minimised is ||delta||_2 = ||0.5*(tanh(w)+1.0) - x||_2.

      The practical consequence is clean Adam gradient flow with no projection steps. The
      tanh nonlinearity also makes the objective smoother than methods that apply hard clipping,
      which benefits Adam''s convergence. The trade-off is that the Jacobian of tanh at large
      |w| values is near zero (tanh saturates), which can slow convergence for inputs near 0 or 1.
      This is why the initialisation clamping and Adam learning rate are important hyperparameters.

  part_4:
    title: 'The Confidence Parameter Kappa'
    body: |
      The kappa parameter is C&W''s most important distinguishing feature for defence evaluation.
      It controls the margin between the adversarial class score and all other class scores.

      At kappa=0, g is satisfied as soon as the adversarial class becomes the argmax, even with
      margin zero -- the adversarial example sits right at the decision boundary. These examples
      have the minimum possible L2 norm but are fragile: they are classified correctly by the
      victim model with minimal perturbation, and small input changes (squeezing, random noise)
      flip them back to the correct class. kappa=0 C&W is the right choice for minimum-norm
      benchmarking and for comparing model robustness via the minimum perturbation required.

      At kappa>0, g requires the adversarial class to exceed all other classes by at least kappa.
      The resulting adversarial example is strongly misclassified: the adversarial class has a
      large margin over the correct class. These examples are larger perturbations than kappa=0
      examples (more perturbation is needed to build a margin) but are robust to input
      transformations: feature squeezing and random perturbation must overcome the kappa margin
      to restore correct classification. The consistency check (Section 10.12) specifically
      detects fragile adversarial examples (those near the boundary); kappa>0 C&W examples are
      stable under the N random perturbations the consistency check applies.

      For Track 7 evaluation: test with kappa=0 first to find the minimum-norm adversarial
      examples the ensemble can detect. Test with kappa=20 to find the high-confidence adversarial
      examples the consistency checker is least effective against. The gap between kappa=0 and
      kappa=20 detection rates is the consistency checker''s useful operating range -- the kappa
      range where it contributes marginal detection benefit.

  part_5:
    title: 'Binary Search on the Regularisation Constant c'
    body: |
      The binary search proceeds over the scalar c (or per-sample c vector for a batch) to find
      the minimum c that produces a successful adversarial example.

      Each binary search step runs n_steps iterations of Adam optimisation with the current c.
      After optimisation completes, check for successful adversarial examples in the batch (preds
      == y_target for targeted, preds != y_true for untargeted). For samples where the attack
      succeeded: record the adversarial example if it has a lower L2 norm than the current best,
      and decrease the c upper bound (try a smaller c next step). For samples where the attack
      failed: increase the c lower bound (try a larger c next step). The next c is the midpoint
      of the current [low, high] bounds.

      The binary search requires the w initialisation to be reset at each step because the
      previous optimisation trajectory is specific to the previous c value. Each binary search
      step is therefore a complete fresh Adam optimisation run from the initialised w_0.

      Typical configurations: n_binary_search=9 for publication-quality evaluation (512 candidate
      c values explored), n_binary_search=5 for practical evaluation (32 candidate c values).
      n_steps=1000 per binary step for thorough convergence; n_steps=100 for faster approximate
      results. The total forward-backward pass count is n_binary_search * n_steps -- for the
      standard configuration, 9000 passes per adversarial example, compared to 40 for PGD and
      1 for FGSM. C&W is expensive by design: it trades computational cost for minimum-norm
      adversarial quality.

  part_6:
    title: 'C&W vs PGD: Which Attack for Which Question'
    body: |
      FGSM, PGD, and C&W answer different questions. The question being asked determines which
      attack to use.

      PGD answers: "Is this model robust at perturbation budget epsilon?" PGD fixes the
      perturbation budget and measures whether adversarial examples exist within it. It is fast
      (40 steps), supports random restart, and is the standard for comparing models against each
      other and against a known epsilon threat level. PGD is the right attack for adversarial
      training, for benchmark comparisons, and for certifying that a model meets a specified
      robustness level.

      C&W answers: "What is the minimum perturbation needed to fool this model (or this defence)?"
      C&W minimises perturbation size at the cost of more computation. It finds adversarial
      examples that PGD misses at small epsilon -- because PGD may not converge to the global
      maximum within a tiny epsilon ball, while C&W finds the closest adversarial example in
      the full input space. C&W is the right attack for evaluating proposed defences, for
      finding the minimum-norm adversarial examples as benchmarks, and for adaptive attacks
      that must thread through a known defence.

      The two attacks complement each other in production evaluation. PGD with k=40 and R=5
      is the primary robustness screen -- fast to run, calibrated to the threat model. C&W with
      kappa=0 and n_binary_search=9 is the secondary evaluation used when a defence claims
      to defeat PGD -- C&W with kappa=0 finds the minimum perturbation that evades the defence,
      and kappa=20 specifically targets the hardest detection cases for each Track 7 primitive.

  part_7:
    title: 'C&W as an Adaptive Adversary Against Track 7 Defences'
    body: |
      The adaptive adversary application is C&W''s unique capability. Feature squeezing (Section
      10.11) detects adversarial examples by comparing the model''s prediction before and after
      a squeezing transformation. A non-adaptive adversary generates adversarial examples and
      submits them -- some are caught by squeezing, some are not. An adaptive adversary generates
      adversarial examples that survive squeezing by incorporating squeezing into the attack
      objective.

      Adaptive C&W against feature squeezing: pass squeezer(x_adv) through the model instead of
      x_adv when computing the misclassification objective. The objective becomes:
      minimise ||delta||_2 + c * g(squeezer(x + delta)) where g evaluates misclassification on
      the squeezed input. The optimiser now finds adversarial examples that misclassify even after
      squeezing -- a strictly harder problem than non-adaptive attack.

      Adaptive C&W against the consistency checker: set kappa high (kappa=20 to 50). The
      consistency checker fires when the adversarial example is near the decision boundary and
      random perturbations flip the prediction. kappa>0 builds a margin that these random
      perturbations must overcome. Adaptive C&W against the adversarial classifier: include the
      adversarial classifier''s prediction in the objective (minimise misclassification of both
      the primary model and the adversarial detector). This approach was used in Carlini and
      Wagner''s original evaluation to break feature squeezing-based detectors.

      The Track 7 three-primitive ensemble (Section 10.13) is designed with adaptive C&W
      in mind. Jointly evading feature squeezing (kappa=0 C&W), consistency checking (kappa=20
      C&W), and the adversarial classifier (adaptive C&W with detector in objective) requires
      satisfying all three constraints simultaneously, which typically requires substantially
      larger perturbation than any single-primitive evasion. The defence_evaluator_cw.py
      deliverable implements each adaptive variant.

