section_overview:
  one_line_summary: >
    Four detection layers — signature, heuristic, ML-based, and behavioural — form the
    architecture that no single detection primitive can replicate alone; the seven-track
    gateway is an instance of this model, and understanding which track sits in which layer
    explains both its strengths and its gaps.
  why_this_section_exists: |
    Sections 11.01 and 11.02 established that the seven-track gateway is L1 in maturity
    and that detection-as-code governance is the path to L3. Neither section explained
    why the gateway has the shape it does: seven tracks, each detecting a different signal,
    each with a different latency budget and false positive profile. Without a conceptual
    model, the gateway looks like an arbitrary collection of detectors. With the four-layer
    model, it becomes legible: each track occupies a defined position in the architecture,
    with known complementarity and known failure modes.

    The layered detection model is also the planning tool for Chapters 12 and 13. Chapter 12
    (ML-Based Detection) fills Layer 3 with trained classifiers. Chapter 13 (Behavioral
    Analysis) extends Layer 4 beyond Track 6's stateful query monitor. This section
    establishes the model those chapters populate.
  position_in_chapter: >
    Section 11.03 is the architectural section of Chapter 11. Section 11.02 built the
    governance infrastructure; Section 11.03 establishes the conceptual model that
    determines what gets governed. Every detection rule and detector in Chapters 11–14
    belongs to one of the four layers defined here.

learning_objectives:
  - 'Characterise each of the four detection layers by its detection mechanism, latency cost, false positive profile, and primary failure mode'
  - 'Map all seven gateway tracks to the four-layer model, naming the layer and the specific detection primitive for each track'
  - 'Explain why the layer ordering (signature first, ML last) is determined by compute cost rather than detection coverage'
  - 'Describe the failure mode of each layer and identify which other layer compensates for it'
  - 'Apply the coverage-cost tradeoff to decide when to gate Layer 3 (ML) on Layer 1-2 signal rather than running it on every request'
  - 'Identify the two coverage gaps in the seven-track gateway that Chapters 12 and 13 will fill'

prerequisites:
  required:
    - 'Section 11.01: Part 2 detection inventory; all seven tracks named and typed'
    - 'Section 11.02: detection-as-code pipeline; understanding that each layer is deployed through the same CI/CD mechanism'
    - 'Chapters 6–10: familiarity with each track''s detection mechanism at the implementation level'
  helpful:
    - 'Basic ML classification concepts: precision, recall, false positive rate'
    - 'Chapter 12 preview: ML-based anomaly detection (Isolation Forest, One-Class SVM)'
    - 'Chapter 13 preview: session-level behavioural analysis'

prose_content:

  part_1_why_layers:
    heading: 'Why One Detection Layer Is Never Enough'
    body: |
      Every detection primitive has a characteristic failure mode. Signature detection
      fails against obfuscation. Heuristic detection fails against inputs that are unusual
      but legitimate. ML-based detection fails against adversarial examples crafted to
      evade the classifier. Behavioural detection fails to catch single-request attacks
      that leave no cross-session footprint.

      These failure modes are not bugs to be fixed. They are structural properties of the
      detection mechanisms. A signature rule that fires on the literal string "ignore
      previous instructions" will never fire on a base64-encoded or leetspeak-obfuscated
      version of the same instruction. A heuristic rule that fires on high token entropy
      will fire on legitimate technical prompts written in unusual domain language. An ML
      classifier trained on labelled prompt injection examples will not generalise to a
      novel injection technique that its training corpus did not include. A stateful
      session monitor will miss a single-shot extraction attack delivered in one large
      query.

      The response to structural failure modes is not to find a better single detector.
      It is to compose detectors whose failure modes are non-overlapping. An attacker who
      encodes their injection to evade the signature layer still faces the heuristic layer,
      which fires on the encoding's elevated entropy. An attacker who crafts a low-entropy
      encoded payload to evade both signature and heuristic still faces the ML layer, which
      may classify the semantic content of the decoded prompt as adversarial even when the
      surface form is unusual. An attacker who crafts inputs that evade all three per-request
      layers and conducts the attack over many sessions still faces the behavioural layer,
      which accumulates cross-session signals invisible to per-request detectors.

      Defence in depth for detection: each layer adds a detection surface. An attacker who
      evades all four layers simultaneously must understand and circumvent four distinct
      detection mechanisms — a combinatorially harder problem than evading any one.

  part_2_layer1_signature:
    heading: 'Layer 1 — Signature Detection'
    body: |
      Signature detection matches inputs against a fixed set of patterns: regular
      expressions, keyword lists, byte sequences, or structural templates. It is the
      fastest and cheapest detection layer. A regex match on a prompt string costs
      microseconds and requires no model inference. It scales to any request volume
      without compute constraint.

      The signature layer's strengths: extremely low false positive rate on well-defined
      patterns, zero inference overhead, deterministic behaviour (the same input always
      produces the same result), and easy auditability (the rule is human-readable). For
      known-bad patterns — prompt prefixes that appear in public jailbreak catalogues,
      known adversarial trigger tokens, training API calls with specific malicious label
      values — signature detection is the correct and sufficient tool.

      The signature layer's failure mode is obfuscation. Any transformation of the
      attack input that preserves semantic meaning but changes surface form defeats a
      signature rule. Base64 encoding, character substitution (l33tsp34k), Unicode
      lookalikes, token splitting across whitespace boundaries, and instruction
      fragmentation across multi-turn conversation history all break signature rules
      while leaving the attack semantically intact.

      In the seven-track gateway, Track 1 (direct injection) and Track 2 (jailbreak
      pattern) are primarily Layer 1. They fire on known injection prefixes and known
      jailbreak template structures. Both use regex and keyword matching on raw prompt
      text. They are fast and reliable on unobfuscated attacks and blind to obfuscated
      variants. Track 4 (data poisoning signals) includes Layer 1 components: Sigma
      rules that match specific label distribution anomalies in training API calls are
      pattern-based and deterministic.

      The practical implication: Layer 1 runs first on every request. It is the cheapest
      gate. Requests that fire Layer 1 are blocked or flagged immediately, without
      incurring the cost of Layer 2 or Layer 3. Requests that pass Layer 1 proceed to
      Layer 2. This gate-and-proceed structure is what makes layered detection
      computationally tractable at scale.

  part_3_layer2_heuristic:
    heading: 'Layer 2 — Heuristic Detection'
    body: |
      Heuristic detection computes features from the input and applies rule-based thresholds
      to those features. Unlike signature rules, which match surface patterns, heuristic rules
      fire on derived properties: token entropy, prompt length, ratio of instruction tokens
      to content tokens, character class distribution, sentence embedding distance from a
      known-good centroid. These properties are harder to manipulate than surface patterns
      because they reflect the statistical structure of the input rather than its literal form.

      The heuristic layer's strengths: robust to surface-level obfuscation (base64-encoding
      a prompt does not change its information density in ways that systematically evade
      entropy-based rules), interpretable (the feature value that triggered the rule can
      be inspected), and tunable (the threshold is a single number that can be calibrated
      against production traffic).

      The heuristic layer's failure modes: legitimate unusual inputs produce false positives.
      A technical prompt written in domain-specific notation (mathematical proofs, code
      with unusual character distributions, multilingual inputs) may trigger entropy or
      character-class heuristics without being adversarial. The heuristic layer has a higher
      false positive rate than the signature layer, and the threshold calibration in Section
      11.09 is primarily concerned with the heuristic layer's thresholds.

      A second failure mode: adaptive adversaries who understand the heuristic rules can
      craft inputs that satisfy the feature constraints. An attacker who knows the entropy
      threshold can pad their injection with high-entropy filler to stay below the trigger
      point, or lower the entropy of an encoded payload by using a less compressible encoding.
      Heuristic evasion requires attacker knowledge of the specific thresholds — which is why
      threshold confidentiality (not publishing exact threshold values) is a minor operational
      control worth maintaining.

      In the seven-track gateway, Track 3 (semantic gating) and the feature-based components
      of Track 6 (adversarial input entropy) and Track 7 (feature squeezer disagreement score)
      are primarily Layer 2. Track 3's cosine similarity gate computes a derived feature
      (embedding distance from known-bad prompt centroid) and applies a fixed threshold.
      Track 6's entropy analysis on input token distributions is a heuristic scoring function.
      Track 7's squeezer disagreement score — the delta in model prediction before and after
      feature squeezing — is a derived heuristic property of the input.

  part_4_layer3_ml:
    heading: 'Layer 3 — ML-Based Detection'
    body: |
      ML-based detection uses trained classifiers — or anomaly detectors — to score inputs
      based on learned representations of the attack surface. Unlike heuristic rules, ML
      models do not require explicit feature engineering: they learn from labelled examples
      which input properties predict attack behaviour. Unlike signature rules, ML models
      can generalise to novel attack variants not present in the training corpus, as long
      as those variants share distributional properties with the training examples.

      The ML layer's strengths: adaptability to novel attack variants (within the distribution
      of the training data), high coverage on the attack families represented in the training
      corpus, and the ability to detect attacks that are semantically adversarial without
      matching any known pattern or violating any heuristic threshold.

      The ML layer's failure modes: it requires labelled training data, which the signature
      and heuristic layers generate over time. A detection programme that skips Layers 1 and
      2 and deploys ML detection from day one trains on synthetic data that does not reflect
      production traffic patterns, producing classifiers with poor production precision. The
      ML layer also fails against adversarial examples crafted to evade the specific classifier
      — a known problem that Chapter 12 addresses with adversarial training of the detection
      classifier itself. And it is expensive: a transformer-based prompt classifier adds
      10–50ms of inference latency per request, which is significant in a gateway with a
      100ms latency budget.

      In the seven-track gateway, Track 2's jailbreak classifier (similarity to known jailbreak
      template embeddings) has ML layer characteristics: it uses a learned representation
      (sentence embeddings) rather than explicit feature engineering. Track 7's adversarial
      classifier — the small binary classifier trained on squeezer output features — is a
      fully ML Layer 3 component. Chapter 12 will expand the ML layer significantly, training
      Isolation Forest and One-Class SVM anomaly detectors for novel injection detection and
      fine-tuning a transformer classifier for prompt intent classification at 95%+ accuracy.
      Those Chapter 12 detectors fill the Layer 3 slots that the current gateway populates
      only partially.

      The compute cost management strategy for Layer 3: gate it. Run Layer 1 and Layer 2 on
      every request. Run Layer 3 only on requests that pass Layers 1 and 2 but exhibit
      borderline Layer 2 signal — a similarity score between 0.70 and 0.85, or an entropy
      value in the flagging band rather than the blocking band. This gating strategy reduces
      the fraction of requests that incur ML inference cost to those where ML adds the most
      marginal value, typically 5–15% of production traffic.

  part_5_layer4_behavioral:
    heading: 'Layer 4 — Behavioral Detection'
    body: |
      Behavioural detection is stateful: it accumulates signals across multiple requests,
      multiple sessions, or extended time windows, and fires when the accumulated pattern
      crosses a threshold. It is the only detection layer that can catch attacks that are
      individually innocuous but collectively adversarial — the model extraction campaign
      that spreads thousands of probing queries across many sessions, each query looking
      like a legitimate API call in isolation.

      The behavioural layer's strengths: it closes the gap between per-request detection
      (Layers 1–3) and campaign-level attack patterns. A model extraction attack generates
      no single query that triggers injection or adversarial input heuristics. The attacker's
      strategy is precisely to avoid per-request detection by keeping each individual query
      below all thresholds. Behavioural detection sees the campaign pattern that individual
      request analysis cannot: query rate above baseline, systematic variance reduction in
      query parameters, output entropy trending toward zero across the session window,
      duplicate query ratio rising.

      The behavioural layer's failure modes: it requires stateful infrastructure (a session
      store, a streaming aggregation layer, or a SIEM with time-window queries) that adds
      engineering complexity. It introduces alert latency: a behavioural rule that fires
      after 500 queries in a 24-hour window cannot fire until those 500 queries have
      occurred. For attacks that succeed in fewer queries or in shorter windows, the
      behavioural layer fires too late to prevent the attack — it produces a forensic record
      and a basis for account suspension, not a real-time block. And stateful detection
      is harder to test: positive test cases must simulate realistic attack campaign
      progressions across time, not single-request inputs.

      In the seven-track gateway, Track 6 (model extraction signals) is the Layer 4
      implementation. It maintains a per-user session store tracking query rate, query
      variance, and output entropy across rolling windows. It is the only stateful track
      in the gateway; all other tracks are stateless per-request. Chapter 13 (Behavioral
      Analysis) will extend Layer 4 significantly: multi-user correlated session analysis,
      graph-based prompt relationship modelling, and time-series anomaly detection on
      session-level feature vectors.

  part_6_gateway_mapping:
    heading: 'Mapping the Seven-Track Gateway to the Four Layers'
    body: |
      The seven-track gateway built in Part 2 is an instance of the four-layer model.
      Not all four layers are fully populated — the ML layer and the behavioural layer
      each have a partial implementation — and that incompleteness is precisely what
      Chapters 12 and 13 address. But the structure is present, and mapping each track
      to its layer makes the architecture legible.

      Track 1 — Direct Injection Detection: Layer 1. Regex and keyword matching on
      raw prompt text. Fast, deterministic, brittle against obfuscation. Sigma rule:
      injection_patterns.yml.

      Track 2 — Jailbreak Pattern Detection: Layer 1 and Layer 3. The Sigma rule
      component (role-play framing keywords) is Layer 1. The jailbreak classifier
      (embedding similarity to known jailbreak templates) is Layer 3 — it uses a
      learned sentence representation. Both components fire independently; both must
      be evaded for Track 2 to be bypassed.

      Track 3 — Semantic Gating: Layer 2. Cosine similarity to known-bad embedding
      centroid is a derived heuristic feature. The threshold (0.85) is a calibration
      parameter, not a learned model parameter. Sigma rule: semantic_similarity.yml.

      Track 4 — Data Poisoning Signals: Layer 1. Sigma rules on training API call
      anomalies: label distribution skew, batch size outliers, specific label value
      patterns. Deterministic, no inference overhead, fires on known poisoning patterns.
      Sigma rule: poisoning_monitor.yml.

      Track 5 — Model Extraction Signals: Layer 4 (per-request component) and Layer 1.
      The per-request Sigma rule (high-volume, low-variance query pattern on a single
      request) is Layer 1. The query budget and session-level accumulation in
      extraction_detector.py is Layer 4 — it is stateful, accumulating signals across
      the session window. Track 5 straddles Layer 1 and Layer 4 because model extraction
      has both within-request signals (unusual query structure) and cross-request signals
      (budget accumulation).

      Track 6 — Adversarial Input Detection: Layer 2. Entropy analysis on input token
      distributions and gradient-space proximity heuristics are derived feature scoring,
      not pattern matching or learned classification. Threshold-tunable, robust to simple
      obfuscation, vulnerable to adaptive adversaries who understand the entropy scoring.
      Sigma rule: adversarial_input.yml.

      Track 7 — Ensemble Orchestration with Adversarial Detection: Layer 2 and Layer 3.
      Feature squeezing (comparing prediction before and after input transformation) is
      Layer 2: a derived heuristic score. The adversarial classifier (small binary
      classifier trained on squeezer output features) is Layer 3: a trained ML model.
      Track 7 is the gateway's most sophisticated track precisely because it combines
      both layers.

      Layer 4 gap: only Track 5 (extraction signals) has a stateful component. Tracks
      1–4, 6, and 7 are all stateless per-request. A multi-session attack that avoids
      model extraction patterns — for example, a distributed jailbreak campaign where
      each session contributes one step of a multi-turn attack — is invisible to all
      seven tracks. Chapter 13 addresses this gap.

      Layer 3 gap: only Track 2 (jailbreak classifier) and Track 7 (adversarial
      classifier) have trained ML components. There is no ML-based anomaly detector
      for novel injection patterns not matching Track 1's keyword list. Chapter 12
      trains the Isolation Forest and prompt intent classifiers that fill this gap.

  part_7_ordering_and_cost:
    heading: 'Layer Ordering, Compute Cost, and the Gating Strategy'
    body: |
      The layer ordering — signature first, heuristic second, ML third, behavioural
      fourth in terms of per-request evaluation order — is not arbitrary. It follows
      from the compute cost of each layer:

      Layer 1 (signature): microseconds per request. Can run on every request with no
      performance budget concern. Run first.

      Layer 2 (heuristic): milliseconds per request, depending on the number of features
      computed. Embedding computation for Track 3 requires a forward pass through a
      small sentence encoder — approximately 2–5ms at CPU inference. Still fast enough
      to run on every request in most gateway configurations. Run second.

      Layer 3 (ML): 10–50ms per request for transformer-based classifiers, 1–5ms for
      shallow ML classifiers (RandomForest, SVM on pre-computed features). Too expensive
      to run on every request in a gateway with a 100ms total latency budget when there
      are multiple ML tracks. Run on gated subset. Gate condition: Layer 2 signal in the
      flagging band (not high enough to block, high enough to warrant deeper inspection).

      Layer 4 (behavioural): no per-request cost in the sense of synchronous inference.
      The stateful accumulation runs asynchronously or in a streaming pipeline; the
      per-request cost is a session store lookup and update. But the alert latency is
      high — the rule fires after accumulating evidence across many requests, not on
      the triggering request. Run concurrently with all other layers, but accept that
      it fires late.

      The gating strategy for the seven-track gateway: Tracks 1, 3, 4 run on every
      request (Layer 1 and Layer 2, fast). Track 2's Sigma component runs on every
      request (Layer 1, fast); Track 2's jailbreak classifier (Layer 3) runs only when
      the Sigma component flags. Track 7's squeezer (Layer 2) runs pre-inference on
      every request; Track 7's adversarial classifier (Layer 3) runs post-inference only
      when squeezer disagreement is above the flagging threshold. Track 5 runs its
      Sigma component (Layer 1) on every request and its session accumulator (Layer 4)
      asynchronously.

      This gating strategy produces a gateway with the following effective latency profile:
      clean requests (pass all layers): ~5ms overhead. Flagging requests (Layer 2 signal,
      Layer 3 invoked): ~15–30ms overhead. Blocking requests (Layer 1 or Layer 2 block):
      ~3ms overhead (blocked before ML inference). Extraction-campaign requests (Layer 4
      fires): no added latency per request; alert is async.

