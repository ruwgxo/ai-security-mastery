prose_content:
  part_1:
    title: 'The Assembly: From Nine Concerns to One Service'
    body: |-
      Chapter 14 opened with a claim: the behavioural monitoring gateway of Chapter 13 was one
      hundred per cent complete as a design and zero per cent ready as a service, and the gap
      between the two was the whole subject of the chapter. Nine sections then closed that gap
      one concern at a time. Placement decided where detection sits and where it hooks in.
      Performance made it fast per request and sufficient in aggregate. Resilience made it
      survive failure. Operability made it observable and operable. Cost made it affordable.
      Each was engineered in isolation, and that isolation was the right pedagogy -- you
      cannot understand a circuit breaker while also tracking a latency budget and a sampling
      policy. But it leaves one thing undone.

      A production gateway is not nine mechanisms in a row. It is one service in which every
      concern applies to every request at the same time. When a request arrives, the
      architecture pattern has already placed the detectors, the integration points decide
      when each runs, the latency budget bounds how long they may take, the scaling has
      provisioned the instances, the failure policy stands ready for any detector that errors,
      the circuit breakers are watching for repeated failure, the observability records every
      outcome, and the cost policy has already decided which detectors sample. None of these
      waits its turn; they are all in force for the whole life of the request, in the same
      few tens of milliseconds.

      This section is the assembly that makes that true. It takes the nine concerns and builds
      the single production detection gateway in which they all operate at once, introducing
      no new mechanism -- every part came from an earlier section -- but wiring them into one
      coherent service. The gateway deliverable for this section is that service in code: a
      gateway that places detectors at pre-processing and post-processing hooks, runs each
      under a timeout, a failure policy, a circuit breaker, and a sampling rule, observes
      every outcome, and carries a request end to end. Assembling it is what turns a chapter
      of concepts into a system.
  part_2:
    title: Integrating the Architecture, Integration Points, and Tiers
    body: |-
      The skeleton of the assembled gateway is the placement decided in Sections 14.02 and
      14.03, and everything else hangs on it. The architecture pattern is the combined pattern
      the chapter arrived at: an API gateway for the inline detection, giving the security
      team a central choke point with independent deployment and scaling; a sidecar for
      near-real-time enrichment, gathering session context over loopback; and off-path jobs
      for the batch tier. This is not a single pattern applied uniformly but the right pattern
      per tier, combined along the tier boundaries the state-latency coupling drew.

      Onto that skeleton the integration points from Section 14.03 fix when each detector runs.
      The inline tier hooks in at two points around the model call: input classifiers at
      pre-processing, where they can block the attempt before the model is invoked, and output
      monitors at post-processing, where they can withhold the response. The near-real-time
      and batch tiers hook in off the synchronous path, consuming the completed exchange
      asynchronously. This gives the two-sided detection the chapter has emphasised: the
      attempt is caught on the input, the success on the output, with the model call sitting
      between the two blocking points.

      The detection tiers themselves are the ones Chapter 13 defined and Chapter 14 deployed.
      The inline tier is stateless -- it reads precomputed near-real-time summaries rather
      than holding state -- which is what lets it scale by replication under the load of every
      request. The near-real-time and batch tiers hold their state off the hot path, scaled by
      partitioning and data-parallel jobs. The assembled gateway reads the behavioural
      summaries inline, cheaply, so that the rich analytics of the slower tiers inform the hot
      path without running on it. The architecture, the integration points, and the tiers
      together are the structure through which every request flows, and the remaining concerns
      are the disciplines applied as it does.
  part_3:
    title: Meeting the Latency Target Under Production Load
    body: |-
      The first target the assembled gateway must meet is the sub-50ms P99 latency budget, and
      meeting it in the assembled system is a stronger claim than meeting it for any detector
      alone. The budget is a property of the whole inline path -- the network hop of the
      gateway pattern, the fixed overhead, and every inline detector that runs -- measured at
      the tail, under the load the gateway actually sees. It is not enough that each detector
      fits its allocation in isolation; the assembled critical path, with the detectors
      running in parallel where they are independent, must fit the budget together.

      The chapter engineered exactly this. The inline detectors are allocated shares of the
      budget net of overhead; the independent input classifiers run in parallel so the group
      costs its slowest member rather than the sum; precomputed summaries and caching keep
      expensive work off the hot path; and per-detector timeouts bound the worst case so a
      slow call cannot blow the tail. In the assembled gateway these combine: the critical
      path is well within the budget, and the timeouts guarantee it stays there even when a
      detector has a bad moment. Scaling from Section 14.05 sustains this under load -- the
      stateless inline tier is replicated enough that no instance is saturated at peak, so the
      per-request latency the budget measures is not degraded by the aggregate request rate.

      The validation is the proof. The readiness check confirms not just that the P99 is
      within budget but that it is within budget under production load, with the timeouts and
      the scaling in place, because a budget met on a quiet system is a hypothesis and a
      budget met under load is a fact. The latency target is the one the chapter has been
      building toward since Section 14.04, and the assembled, loaded, validated gateway is
      where the sub-50ms P99 stops being a requirement and becomes a measured property of a
      running service.
  part_4:
    title: Resilience and Cost in the Assembled Gateway
    body: |-
      The second and third targets -- high availability and cost -- are met by the resilience
      and cost mechanisms operating together on the same requests. In the assembled gateway
      these are not separate subsystems but rules applied inside the detection path itself.
      Every detector call passes through its circuit breaker before it runs: if the breaker is
      open, the call is short-circuited and resolved by the detector failure policy without
      touching the broken detector. Every detector call that does run is bounded by its
      timeout and, on error or timeout, resolved fail-open or fail-closed by that detector
      policy. And under stress, graceful degradation sheds the droppable detectors while
      keeping the essential path, so the gateway degrades toward its security core rather than
      away from it. The gateway deliverable shows this composition directly: a single method
      runs a detector under breaker, sampling, timeout, and policy, so all four disciplines
      apply to every call in the right order.

      The security-critical invariant survives the assembly intact, which is the point worth
      checking hardest. Across every concern, the inline security checks -- injection,
      jailbreak, output PII -- run on every request, resolve fail-closed when they fail, and
      are never sampled. The cost policy enforces this in code: a security-critical detector
      cannot be given a sampling rate below full coverage. So even as the gateway samples the
      expensive analytics to meet its cost bound, the coverage that matters is untouched. Cost
      is met where it is safe to meet it -- the batch tier sampled and batched for most of the
      saving, the inline tier reduced only by caching -- and the cost target is validated as a
      bound on spend per million requests that holds without a coverage hole hidden inside it.

      What makes the assembly more than the sum of its parts is that these disciplines
      interact, and the interactions must themselves be correct. A timeout feeds the circuit
      breaker, which after enough timeouts short-circuits to the failure policy; sampling
      decides whether a detector runs at all before the breaker even sees it; graceful
      degradation and the failure policy both shed non-essential detectors but for different
      reasons. Getting the order right -- sample, then breaker, then timeout, then policy --
      is what makes the assembled behaviour coherent rather than a pile of mechanisms that
      occasionally contradict, and it is why the whole gateway is validated, not just its
      parts.
  part_5:
    title: The End-to-End Request Flow
    body: |-
      With the gateway assembled, a single request flowing through it shows the whole system
      working at once, which is the clearest way to see that the concerns have become one
      service. The flow has a definite shape, and every stage carries several concerns.

      A request arrives at the API gateway, the choke point in front of the model. It enters
      pre-processing detection, where the inline input classifiers run -- each sampled or not
      by cost policy, guarded by its circuit breaker, bounded by its timeout, resolved by its
      failure policy, and recorded by observability. If any blocking pre-processing detector
      flags the request, it is rejected here, before the model is ever called, and the flow
      ends. The behavioural summaries from the near-real-time tier are read inline at this
      stage, cheaply, from the precomputed store, so the hot path is informed by the analytics
      without running them. If pre-processing admits the request, the model is called, and its
      response enters post-processing detection, where the output monitors run under the same
      disciplines and can withhold the response if it leaks or shows a successful injection.
      If post-processing admits it, the response is returned -- or shed by backpressure if the
      gateway is beyond capacity. The completed exchange is then emitted off-path to the
      near-real-time and batch tiers, where the sampled, batched analytics consume it
      asynchronously. Throughout, every stage emits metrics, a span, and a log event to the
      dashboard.

      The request-flow deliverable lays this out stage by stage, and the gateway deliverable
      runs it: a clean request passes pre-processing, the model, and post-processing and is
      served; an injection is blocked at pre-processing before the model call; a jailbreak is
      caught the same way. Seeing the model call sit between two blocking detection points,
      with the failure and cost policies applied at each, is the chapter in a single picture.
      This is what a production service is that a logical architecture is not: not a diagram
      of what runs where, but a running flow in which every concern acts on every request as
      it passes.
  part_6:
    title: 'Validation: Proving the Non-Functional Requirements'
    body: |-
      The chapter ends where it must: with proof. Section 14.01 argued that a design and a
      service are measured on different axes, and that the behavioural monitoring gateway was
      complete on the design axis and unmeasured on the service axis. The service axis is the
      non-functional requirements -- latency within budget, availability under failure, cost
      within bound -- and the capstone validates the assembled gateway against all three
      together. That togetherness is essential. A gateway that meets two of the three targets
      is not two-thirds deployable; it is not deployable, because the unmet target is the
      failure mode that will take it down or switch it off. The latency, availability, and
      cost targets must hold at once, on the same service, under the same load.

      The readiness validation deliverable is that check. It confirms the inline P99 is within
      the sub-50ms budget under load and every detector within its allocation; that a detector
      failure is isolated by its breaker and resolved by its policy, that the gateway degrades
      gracefully, and that the error rate is within its SLO; that the cost is within its bound
      per million requests and the security-critical checks run at full coverage; and that
      detection is active on both sides of the model call. Every check maps back to the
      section that engineered it, so the validation is a ledger of the whole chapter, and the
      gateway is production-ready only when all of them pass. The reference architecture
      deliverable then places every concern on a component of a deployable system, confirming
      that nothing was left as an idea without a home.

      This is what turns the Chapter 13 logical architecture into a production service. The
      behavioural monitoring gateway was a correct design; the production detection gateway is
      that design deployed, meeting its non-functional requirements provably rather than by
      assumption. Part 3 set out to build a detection system, and it ends with one that is not
      just designed but running, fast, resilient, observable, and affordable at once. What the
      chapter has not done -- deliberately -- is build the detectors that fill this gateway
      with ever-better detection; the gateway is the deployment platform, and populating it
      with production detectors is the work of Chapter 15. Section 14.12 will synthesise the
      chapter and make that handoff. But the central claim is now proven: the deployed
      detection system exists, and it meets its targets.
