section_overview:
  one_line_summary: The production detection gateway assembles every concern of the chapter -- architecture
    pattern, integration points, latency budget, scaling, failure policy, circuit breakers, observability,
    and cost -- into a single running service whose end-to-end request flow applies them all at once,
    and which provably meets its sub-50ms latency, high-availability, and cost targets together, turning
    the Chapter 13 logical architecture into a production service.
  why_this_section_exists: |-
    The nine sections from 14.02 through 14.10 each engineered one production concern in
    isolation, and that isolation was deliberate -- it let each concern be understood on its
    own terms. But a production gateway is not nine separate mechanisms sitting side by side;
    it is one service in which all of them operate at once, on the same request, in the same
    few tens of milliseconds. A detector is placed by the architecture pattern, hooked in at
    the right integration point, bounded by the latency budget, run on a scaled stateless tier,
    resolved by a failure policy, guarded by a circuit breaker, observed by the instrumentation,
    and priced by the cost policy -- all simultaneously, for every request. This section is the
    assembly. It builds the full production detection gateway that integrates the architecture
    pattern, integration points, and detection tiers; meets the sub-50ms P99 latency target
    under load; applies the fail-open/fail-closed policy, circuit breakers, and graceful
    degradation; wires in the observability stack and the production dashboard; and applies the
    cost optimisation across the tiers. It traces the end-to-end request flow through the
    assembled system -- pre-processing detection, the model call, post-processing detection,
    with the behavioural summaries read inline and the failure and cost policies applied
    throughout -- and it validates the gateway against its three production targets together.
    That validation is the payoff of the whole chapter: it turns the logical architecture of
    Chapter 13, which was complete as a design and zero-ready as a service, into a production
    service that provably meets its non-functional requirements. This is the deployed detection
    system.
  position_in_chapter: |-
    Section 14.11 is the capstone of Chapter 14, assembling the concerns engineered in
    14.02-14.10 into one running service. It introduces no new mechanism -- every part was
    built in an earlier section -- and it does not build new detectors, which is the subject of
    Chapter 15. Section 14.12 then synthesises the chapter, consolidates the readiness and
    mistakes references, and previews Chapter 15. This section is where the chapter is proven:
    the deployed gateway meeting its latency, availability, and cost targets together.
