        magnitude: '$100K-$10M+'
        assumptions: 'Data collection, compute, engineering; narrow domain at low end, large general model at high end'
        implication: 'This is the asset value being protected'
      - scenario: 'Distillation query cost (50K prompts, soft labels)'
        magnitude: '$50-$500'
