section_overview:
  one_line_summary: |
    Knowledge distillation -- a legitimate compression technique -- becomes the
    dominant commercial extraction attack when applied adversarially: soft labels
    leak exponentially more boundary information per query than hard labels,
    active query selection reduces budget by 5-50x, and distributed distillation
    campaigns that stay under any individual rate limit are the attack class that
    makes output-side watermarking non-optional.

  why_this_section_exists: |
    Section 9.3 established the boundary mapping primitive and showed that
    individual API queries reveal decision boundary information. Section 9.4
    scales that insight into the dominant real-world extraction attack. Distillation
    is not a specialised adversarial technique -- it is a well-understood legitimate
    ML practice (Hinton et al. 2015) applied adversarially. Every organisation
    that trains student models for compression or deployment efficiency has the
    toolchain required to run a distillation extraction campaign. The adversary
    does not need novel capabilities.

    The soft-label vs hard-label distinction is the section''s central security
    insight. A probability vector over K classes carries log2(K) times as much
    information about the model''s decision surface as a single hard label. An
    adversary querying a grey-box API that returns confidence scores achieves the
    same surrogate fidelity in 5 to 50 times fewer queries than one restricted
    to hard labels. This is not a marginal difference -- it is the difference
    between a distillation campaign that completes in one day and one that takes
    two months at the same rate. Output design -- returning hard labels when soft
    labels are not required -- is therefore a concrete security control, not an
    abstract principle.

    The detection challenge this section introduces is the motivating argument
    for output-side watermarking in Section 9.12. A distributed distillation
    campaign -- many accounts, each issuing queries at a rate indistinguishable
    from legitimate use -- produces no single anomalous user for the query
    monitor to flag. The attack is invisible to input-side monitoring at any
    individual account level. The watermark embedded in the output survives
    distillation into the surrogate, providing post-hoc ownership evidence
    even when real-time prevention fails.

  position_in_chapter: |
    Section 9.4 of 13. Second attack implementation section. Extends the boundary
    mapping primitive of Section 9.3 to full surrogate training. Establishes the
    distributed detection evasion pattern that motivates Section 9.12 watermarking.
    Cost economics in this section ground the rate limit policy design in Section 9.11.

learning_objectives:
  knowledge:
    - 'Explain how the Hinton et al. 2015 student-teacher distillation framework is repurposed adversarially'
    - 'Quantify the information advantage of soft labels over hard labels per query'
    - 'Distinguish architecture-matching distillation from architecture-agnostic distillation and their fidelity implications'
    - 'Describe active distillation query selection and its 5-50x budget efficiency gain'
    - 'Explain the LLM distillation pipeline: query collection, fine-tuning, and deployment'
    - 'Articulate why distributed distillation campaigns evade input-side query monitoring'

  skills:
    - 'Implement soft-label distillation against a black-box classifier and measure fidelity vs query count'
    - 'Compare soft-label and hard-label distillation fidelity curves at matched query budgets'
    - 'Implement active distillation query selection using surrogate uncertainty'
    - 'Build a small-scale LLM distillation pipeline against a mock API'
    - 'Compute the cost economics of distillation vs training from scratch vs commercial licence'

  security_mindset:
    - 'Internalise that every grey-box API returning probability distributions is providing a 5-50x extraction discount to adversaries'
    - 'Recognise that distributed distillation campaigns are architecturally invisible to per-account rate limits'
    - 'Understand that output watermarking is the defence specifically motivated by distillation evasion of input-side controls'
    - 'Appreciate that distillation cost economics -- not technical capability -- determine whether extraction is attempted'

prerequisites:
  - 'Section 9.1: adversary access ladder (black-box vs grey-box distinction fundamental to this section)'
  - 'Section 9.2: functionality and fidelity extraction goals (distillation implements both)'
  - 'Section 9.3: active learning extraction loop (directly extended in this section''s active distillation)'
  - 'Chapter 1: overfitting and generalisation (student model generalisation is the distillation fidelity criterion)'
  - 'Chapter 2: neural network training and loss functions (KL divergence and cross-entropy as distillation loss)'
  - 'Chapter 3: LLM architecture and output distribution (prerequisite for LLM distillation pipeline mechanics)'

prose_content:

  - part: 1
    title: 'Knowledge Distillation: The Legitimate Technique and Its Adversarial Mirror'
    body: |
      Knowledge distillation was introduced by Hinton, Vinyals, and Dean in 2015
      as a model compression technique. The idea is straightforward: a large,
      capable teacher model encodes its knowledge not just in its hard predictions
      but in the full distribution it assigns over output classes. A smaller student
      model trained to match the teacher''s soft output distribution learns more
      efficiently than one trained on hard labels alone, because the soft
      distribution reveals the teacher''s uncertainty structure -- which classes
      are easily confused, which inputs are near decision boundaries, what the
      model has learned about the input space geometry.

      The technique is widely deployed legitimately. Organisations train large
      teacher models on expensive compute budgets, then distil smaller students
      for deployment on resource-constrained infrastructure. The student inherits
      the teacher''s generalisation without the teacher''s parameter count. The
      teacher''s soft output distribution is richer supervision than the hard
      ground-truth labels alone.

      Adversarial distillation exploits exactly the same mechanism, with one
      change: the adversary does not own the teacher. The victim''s API is the
      teacher. The adversary queries the victim, collects the outputs, and trains
      a student on those outputs. If the API returns soft labels -- probability
      distributions or confidence scores -- the adversary receives exactly the
      rich supervision signal that legitimate distillation uses. If the API
      returns only hard labels, the adversary receives less information per query
      but can compensate with a larger query budget.

      The practical consequence is uncomfortable for defenders: the adversary''s
      toolchain is entirely standard ML engineering. There is no novel attack
      technique, no vulnerability exploit, no model internals access required.
      Any team that has run a legitimate distillation pipeline for compression
      can run a distillation extraction campaign against a competitor''s API
      with the same code and the same expertise. The democratisation of ML
      tooling is simultaneously the democratisation of extraction capability.

  - part: 2
    title: 'Soft-Label Distillation: Maximum Information per Query'
    body: |
      Soft-label distillation is the dominant extraction technique when the victim
      API returns probability distributions. A soft label -- a probability vector
      assigning mass to each output class -- contains orders of magnitude more
      information about the model''s decision boundary than a hard label.

      The information content difference is quantifiable. A hard label for a
      K-class classifier carries at most log2(K) bits: the index of the
      argmax class. A soft probability vector carries up to K * log2(K) bits
      for a fully non-uniform distribution. In practice, the effective information
      gain is more modest -- most soft distributions concentrate mass on one or
      two classes -- but for inputs near decision boundaries, where the
      distribution is genuinely spread across multiple classes, soft labels
      provide 5 to 50 times the boundary information of the corresponding
      hard label.

      The training procedure for soft-label distillation uses KL divergence or
      cross-entropy between the student''s output distribution and the victim''s
      soft labels as the training objective. This is identical to legitimate
      distillation: the student is optimised to match the teacher''s full output
      distribution, not just the argmax class. The temperature parameter from
      Hinton et al. applies directly: higher temperature softens the victim''s
      distribution further, amplifying the information in low-probability classes
      that are near the decision boundary. An adversary with access to logit
      scores (not just post-softmax probabilities) can apply temperature scaling
      themselves to extract maximum boundary information from each query.

      The practical budget advantage is decisive. Papernot et al. 2017
      demonstrated that soft-label surrogate training achieves the same test
      accuracy as hard-label surrogate training with 5 to 20 times fewer queries
      on MNIST-scale experiments. For more complex models, the reduction factor
      grows: soft labels carry progressively more information advantage as the
      model''s decision boundary becomes more complex and the near-boundary
      probability distributions become more structured.

      The security implication is direct: a grey-box API returning probability
      distributions should be treated as providing a substantial extraction
      subsidy to any adversary who queries it. The API is not just returning
      answers -- it is returning a compressed description of its decision surface
      with every response.

  - part: 3
    title: 'Hard-Label Distillation: The Stealthier Attack'
    body: |
      Hard-label distillation works against APIs that return only class predictions
      with no confidence scores or probability distributions. The adversary receives
      one bit of boundary information per query -- which side of the decision surface
      the input falls on -- rather than a full probability vector. The query budget
      required for equivalent fidelity is 5 to 50 times larger than for soft-label
      distillation.

      Despite the higher query cost, hard-label distillation is in some respects
      the more dangerous attack from a detection perspective: it is harder to
      detect. Soft-label distillation concentrates near-boundary queries to
      maximise the information value of each query''s probability vector. Hard-
      label distillation is more effective when spread broadly across the input
      space -- covering the input distribution rather than probing boundaries
      -- because each query provides less boundary-specific information. Broad
      coverage produces a query distribution that more closely resembles legitimate
      high-volume API use than the boundary-concentrated pattern of soft-label
      and active-learning extraction.

      The training procedure for hard-label distillation is standard supervised
      learning: the adversary builds a labelled dataset of (input, victim_label)
      pairs and trains the student to match the victim''s hard predictions. The
      objective function is standard cross-entropy. No soft-label-specific
      techniques are required. The student is trained as a conventional classifier
      on API-sourced labels.

      Hard-label distillation has an additional evasion property: the query
      distribution can be constructed from publicly available datasets. An
      adversary who queries the victim on ImageNet images, Wikipedia excerpts,
      or Common Crawl samples produces a query distribution that is statistically
      indistinguishable from a researcher running a legitimate evaluation benchmark.
      The individual queries are benign; only the aggregate over months of
      querying constitutes an extraction campaign. This is the detection challenge
      that motivates the cross-user collusion detector in Section 9.11: the
      campaign may be distributed across multiple accounts, each individually
      below detection thresholds.

  - part: 4
    title: 'Architecture Matching vs Architecture-Agnostic Distillation'
    body: |
      Distillation attacks split into two strategies based on whether the adversary
      knows or guesses the victim model''s architecture.

      Architecture-matching distillation uses a student with the same or similar
      architecture as the victim. When the adversary knows the victim''s architecture
      -- from published papers, job postings, or inference time analysis -- matching
      it reduces the capacity gap between student and teacher. A student with the
      same depth and width as the teacher can, in principle, achieve exact fidelity
      given sufficient training data. Architecture matching is the preferred approach
      when the adversary has prior knowledge and the goal is high-fidelity replication
      for a specific capability.

      Architecture-agnostic distillation uses whatever student architecture the
      adversary finds convenient, regardless of the victim''s architecture. The
      student may be smaller, larger, or structurally different from the victim.
      Smaller students are cheaper to deploy; larger students may achieve higher
      fidelity on the extraction task but cost more. The key insight from
      adversarial distillation research is that architecture agnosticism is
      generally acceptable for functionality extraction: the surrogate does not
      need to replicate the victim''s architecture to replicate its behaviour.
      A much smaller student can match a large teacher''s predictions on the target
      distribution if trained on enough victim outputs.

      The architecture gap has a fidelity ceiling: a student with far fewer
      parameters than the teacher cannot represent the teacher''s full decision
      surface. For narrow-domain functionality extraction -- where the adversary
      needs the model to perform well on a specific task rather than on the
      teacher''s full capability -- a small agnostic student often suffices.
      For broad functionality extraction attempting to clone a general-purpose
      LLM, the architecture gap is limiting: a 1B parameter student cannot
      fully capture a 70B teacher''s capabilities, regardless of training data.

      The defenders'' perspective: architecture-agnostic distillation means the
      adversary''s local student can be publicly deployed without the victim''s
      architecture being visible in the surrogate. Output watermarking (Section
      9.12) works regardless of architecture: the watermark is embedded in the
      token-level output distribution and transfers to any student architecture
      that is trained to match those outputs.

  - part: 5
    title: 'Active Distillation: Budget-Efficient Query Selection'
    body: |
      Active distillation combines the knowledge distillation training objective
      with the active learning query selection strategy from Section 9.3. Rather
      than querying the victim on a fixed dataset, the adversary selects each
      query to maximise the reduction in the student''s uncertainty about the
      victim''s decision surface. The result is a substantially more budget-
      efficient extraction campaign.

      The active distillation loop has four stages per iteration. In the selection
      stage, the adversary evaluates the current student on a large pool of
      unlabelled candidates and identifies the inputs where the student is most
      uncertain -- those with output probability distributions closest to uniform,
      indicating regions of the input space where the student''s approximation
      of the victim is weakest. In the query stage, the adversary submits these
      high-uncertainty inputs to the victim API and receives their labels. In the
      labelling stage, the adversary adds the (input, victim_label) pairs to the
      training set, optionally with the victim''s soft labels if available. In
      the update stage, the student is retrained or fine-tuned on the growing
      labelled set.

      The budget efficiency gain over random-sampling distillation is substantial.
      Every query is directed toward the region of the input space where the
      student disagrees most with the victim -- the high-information-value region
      where additional training data reduces error fastest. Random sampling
      wastes query budget on inputs where the student already predicts correctly,
      providing no marginal fidelity improvement. Active selection eliminates
      this waste.

      Empirically, active distillation achieves 5 to 50x query budget reduction
      relative to passive random-sampling distillation for equivalent surrogate
      fidelity on neural network targets. The reduction factor is larger for
      models with complex, non-linear decision boundaries, where random sampling
      is a particularly inefficient exploration strategy.

      The detection asymmetry introduced in Section 9.3 applies here: active
      distillation concentrates queries near the decision boundary more intensely
      than passive distillation. The boundary proximity signal is stronger, not
      weaker. A defender who monitors query distribution boundary proximity will
      find active distillation more detectable than passive distillation -- but
      only if the query monitor has the per-user state required to observe the
      distribution over time.

  - part: 6
    title: 'Distillation Against LLMs: The Clone Pipeline'
    body: |
      LLM distillation follows the same student-teacher principle as classifier
      distillation, with differences driven by the output modality. Instead of
      matching probability vectors over a fixed class set, the student learns to
      match the victim LLM''s text outputs -- the sequences the victim generates
      in response to given prompts.

      The LLM distillation pipeline has three stages. In the data collection
      stage, the adversary assembles a prompt set -- typically drawn from public
      datasets, user-contributed question collections, or task-specific benchmarks
      -- and queries the victim LLM on each prompt, recording the full generated
      response. For a small-scale campaign targeting a specific capability (code
      generation in a specific language, question answering in a specific domain,
      summarisation), a few thousand prompts may be sufficient. For broad
      capability cloning, the required prompt set is much larger.

      In the fine-tuning stage, the adversary fine-tunes a base language model
      on the collected (prompt, victim_response) pairs using standard
      instruction-tuning techniques. The base model is typically a publicly
      available open-weight LLM that the adversary can fine-tune locally. The
      fine-tuning objective teaches the base model to respond to prompts the
      way the victim does -- adopting its style, its domain knowledge emphasis,
      and its instruction-following behaviour. This is the same technique used
      in the Alpaca and Vicuna projects, which fine-tuned open-weight models
      on GPT-3 and GPT-4 outputs respectively and were widely discussed as
      capability extraction demonstrations.

      In the deployment stage, the adversary hosts the fine-tuned student as
      an independent API endpoint. The student is cheaper to operate than the
      victim (smaller parameter count, no licensing costs) and is not subject
      to the victim operator''s rate limits, content policies, or pricing.

      The query budget for LLM distillation is harder to bound than for
      classifier distillation because LLM capability is multi-dimensional.
      A narrow capability clone (a specific task the victim performs well) may
      require a few thousand prompts. A broad capability clone attempting to
      match the victim across general instruction-following is an open-ended
      campaign that scales with the breadth of capability being extracted.
      The Alpaca project reported reasonable instruction-following capability
      from a fine-tuned 7B model trained on 52,000 GPT-3.5 outputs -- a query
      budget achievable in hours at standard API rates.

      The detection challenge for LLM distillation is acute. Prompt sets drawn
      from public benchmarks (MMLU, HumanEval, GSM8K, ARC) produce query
      distributions that are analytically indistinguishable from legitimate
      evaluation campaigns. A research organisation routinely queries a commercial
      LLM on benchmark tasks to evaluate its capabilities. A distillation campaign
      using the same benchmarks produces the same query distribution. Input-side
      monitoring cannot differentiate them.

  - part: 7
    title: 'Cost Economics: Why Distillation Is the Dominant Commercial Threat'
    body: |
      Distillation extraction is economically rational when the query cost plus
      surrogate training cost is less than the victim''s training cost or the
      commercial licence cost. For a wide range of commercially deployed models,
      this condition is met.

      Consider a commercial LLM with training costs in the millions of dollars.
      Querying such a model for 100,000 responses at typical API pricing ($0.001
      to $0.01 per response) costs $100 to $1,000. Fine-tuning a 7B open-weight
      model on those responses costs tens to hundreds of dollars in GPU compute.
      Total extraction campaign cost: under $2,000 in most configurations.
      Commercial licence cost for equivalent capability: $10,000 to $500,000
      per year depending on the product and usage tier. The economics are
      compelling.

      For narrow-domain models -- a specialised medical classifier, a domain-
      specific retrieval model, a proprietary scoring model -- the training cost
      includes not just compute but data collection, labelling, and domain
      expertise. An adversary who can extract the model''s decision surface for
      a few hundred dollars in API fees recovers capability that the victim
      invested potentially millions in developing. The asymmetry is extreme.

      The cost economics have two implications for defenders. First, extraction
      is not a sophisticated attack reserved for well-resourced adversaries --
      it is economically attractive to any organisation that would benefit from
      the victim''s capability without paying for it. Second, the defender''s
      rate limiting must be calibrated against the extraction economics, not
      just against throughput. A rate limit that makes extraction cost ten times
      the commercial licence cost is a meaningful deterrent; a rate limit that
      leaves extraction cost at one percent of the licence cost is not.

      The third implication: detection investment is justified by the economics.
      A detection system that catches one extraction campaign per year that would
      have cost $100,000 in lost licence revenue pays for itself at any
      reasonable implementation cost. The return on investment for query monitoring
      and output watermarking is grounded in the extraction cost differential,
      not in abstract threat severity assessments.

  - part: 8
    title: 'The Detection Challenge: Why Input-Side Controls Alone Are Insufficient'
    body: |
      The detection architecture for classifier distillation -- query diversity
      monitoring, boundary proximity detection, user concentration analysis -- has
      a fundamental limitation against determined adversaries: it can be evaded
      by distributing the campaign.

      A distributed distillation campaign splits the query budget across many
      accounts, each issuing queries at a rate consistent with legitimate use.
      Ten accounts each issuing 100 queries per day over 30 days collectively
      query the victim 30,000 times -- a substantial extraction dataset -- while
      each individual account stays well within the behavioural profile of a
      normal API user. The per-user query monitor sees nothing anomalous. The
      cross-user collusion detector in Section 9.11 addresses this partially,
      but collusion detection is hard when the accounts are genuinely independent
      (paid separately, operating from different IPs, showing no account-level
      relationship).

      LLM distillation from public benchmark prompts is effectively undetectable
      at the input side: the prompt distribution is identical to legitimate
      evaluation use. The operator cannot distinguish a research team benchmarking
      the model from an adversary collecting fine-tuning data.

      This is the architectural gap that motivates output-side defence in Section
      9.12. Output watermarking embeds a cryptographic signal in every response
      the victim generates -- a signal that persists through distillation into
      the student model because the student is trained to reproduce the victim''s
      outputs, including the watermark pattern. When the adversary deploys the
      surrogate, the watermark is detectable in its outputs, providing ownership
      evidence regardless of whether the extraction campaign was detected in
      real time.

      The combined architecture is the right answer: input-side monitoring catches
      unsophisticated campaigns and imposes friction on all campaigns; output-side
      watermarking provides post-hoc evidence when input-side prevention fails.
      Neither alone is sufficient. This is the ensemble defence principle from
      Chapter 7 applied to the output side of the inference pipeline -- a new
      defensive surface that no prior chapter required.

reference_materials:

  - table: 1
    title: 'Soft-Label vs Hard-Label Distillation: Information and Budget Comparison'
    description: |
      Comparison of soft-label and hard-label distillation across information content,
      query budget, detection difficulty, and defence implications.
    columns:
      - 'Property'
      - 'Soft-Label Distillation'
      - 'Hard-Label Distillation'
    rows:
      - property: 'API requirement'
        soft: 'Grey-box: probability vectors, confidence scores, or logits returned'
        hard: 'Black-box: only class label or argmax prediction returned'
      - property: 'Information per query'
        soft: 'Full probability vector; up to K * log2(K) bits for K-class problem'
        hard: 'Single class index; log2(K) bits maximum'
      - property: 'Relative query budget for equivalent fidelity'
        soft: 'Baseline (1x)'
        hard: '5-50x more queries required for equivalent surrogate test accuracy'
      - property: 'Training objective'
        soft: 'KL divergence or cross-entropy against victim probability vector; temperature scaling applicable'
        hard: 'Standard cross-entropy against hard victim labels; no temperature parameter'
      - property: 'Boundary information quality'
        soft: 'Near-boundary queries expose multi-class uncertainty; high gradient signal for student'
        hard: 'Near-boundary queries look like any other query; no uncertainty signal available'
      - property: 'Detection difficulty (input side)'
        soft: 'Moderate: active selection concentrates near-boundary; boundary proximity signal detectable'
        hard: 'Higher: broad coverage mimics legitimate use; no boundary concentration required'
      - property: 'Primary defence'
        soft: 'Return hard labels when product allows; output perturbation on confidence scores'
        hard: 'Query diversity monitoring; cross-user collusion detection; output watermarking'
      - property: 'Distributed evasion feasibility'
        soft: 'Moderate: active selection makes single-account campaigns effective'
        hard: 'High: broad random coverage distributes well across accounts and time'

  - table: 2
    title: 'Architecture Matching vs Architecture-Agnostic Distillation'
    description: |
      Trade-offs between using a student architecture that matches the victim
      versus using a convenient architecture regardless of the victim''s structure.
    columns:
      - 'Property'
      - 'Architecture-Matching'
      - 'Architecture-Agnostic'
    rows:
      - property: 'Adversary requirement'
        matching: 'Knowledge of victim architecture (from papers, job postings, inference timing)'
        agnostic: 'No architecture knowledge required'
      - property: 'Fidelity ceiling'
        matching: 'Near-100% on target distribution if student capacity equals teacher'
        agnostic: 'Bounded by capacity gap; small students cannot represent large teachers fully'
      - property: 'Query budget'
        matching: 'Lower: same architecture learns the teacher distribution more efficiently'
        agnostic: 'Higher: capacity gap increases queries needed for equivalent fidelity'
      - property: 'Deployment cost'
        matching: 'Same as victim; no size advantage'
        agnostic: 'Often lower: adversary chooses a smaller student for cheaper inference'
      - property: 'Detectability'
        matching: 'Not meaningfully different at query level from agnostic'
        agnostic: 'Not meaningfully different at query level from matching'
      - property: 'Watermark transfer'
        matching: 'High: same architecture reproduces output distribution faithfully'
        agnostic: 'High for narrow tasks; may degrade for very small students on complex distributions'
      - property: 'Practical preference'
        matching: 'Preferred when adversary has architecture knowledge and wants maximum fidelity'
        agnostic: 'Preferred when architecture unknown or adversary optimises for deployment cost'

  - table: 3
    title: 'LLM Distillation Pipeline: Stages, Query Budget, and Detection Exposure'
    description: |
      Stages of an LLM distillation campaign with approximate query budget and
      detection signal at each stage.
    columns:
      - 'Pipeline Stage'
      - 'Activity'
      - 'Approx Query Budget'
      - 'Detection Signal'
      - 'Defence'
    rows:
      - stage: '1. Prompt set assembly'
        activity: 'Collect diverse prompt set from public datasets or task-specific benchmarks'
        budget: 'Zero API queries; offline activity'
        detection_signal: 'None at API level'
        defence: 'N/A'
      - stage: '2. Victim querying'
        activity: 'Query victim LLM on each prompt; record full generated responses'
        budget: '1K-100K+ prompts depending on scope; typically 5K-50K for narrow capability'
        detection_signal: 'High diversity (benchmark prompts); indistinguishable from legitimate evaluation'
        defence: 'Output watermarking (signal embeds into collected responses)'
      - stage: '3. Data curation'
        activity: 'Filter low-quality responses; optionally augment with paraphrases'
        budget: 'Zero additional API queries; offline'
        detection_signal: 'None'
        defence: 'Watermark robustness to paraphrasing (Section 9.12)'
      - stage: '4. Student fine-tuning'
        activity: 'Fine-tune open-weight base model on (prompt, victim_response) pairs'
        budget: 'Zero API queries; adversary''s local compute'
        detection_signal: 'None at API level'
        defence: 'Watermark transfer detection: victim watermark present in student outputs'
      - stage: '5. Surrogate deployment'
        activity: 'Host fine-tuned student as independent API or product'
        budget: 'Zero API queries'
        detection_signal: 'Watermark detectable in student outputs; capability similarity to victim'
        defence: 'Watermark verification workflow (Section 9.12); legal action on detection'

  - table: 4
    title: 'Extraction Cost Economics: Distillation vs Alternatives'
    description: |
      Order-of-magnitude cost comparison across extraction, training from scratch,
      and commercial licensing for a representative narrow-domain LLM deployment.
      Values are illustrative order-of-magnitude estimates.
    columns:
      - 'Cost Scenario'
      - 'Order of Magnitude'
      - 'Assumptions'
      - 'Defender Implication'
    rows:
