# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    Gradient descent drives memorisation by design. A sequence appearing n times
    in the training corpus receives n × more gradient signal than a sequence appearing
    once — the optimiser correctly learns to reproduce it. Memorisation is not a bug;
    it is the consequence of optimising on a corpus that contains repeated sequences.
    Deduplication attacks this root cause directly and is the highest-ROI defence.

  takeaway_02: |
    Scale amplifies memorisation. Larger models memorise more examples from the same
    training data. The Carlini et al. (2021) finding is counterintuitive but empirically
    robust: scaling capability increases extraction risk, not the reverse. Production
    LLMs operating on sensitive data require correspondingly scaled defences.

  takeaway_03: |
    Fine-tuning on internal data is a memorisation emergency. A 100-document internal
    fine-tuning dataset trained for 50 epochs presents each document to the model
    enough times to near-certain memorisation. Any organisation fine-tuning on customer
    records, medical data, or proprietary documents must assume those documents are
    memorised and potentially extractable.

  takeaway_04: |
    The Carlini extraction attack requires no white-box access. Prefix-probe generation
    followed by low-entropy filtering is a black-box attack implementable against any
    text generation API. The detection surface is the API log and the output stream —
    both are controlled by the defender.

  takeaway_05: |
    Epsilon is not a label — it is a mathematical bound. ε=8 does not mean "weak privacy";
    it means the adversary gains at most e^8 ≈ 2981x advantage from the presence of any
    one training example. For medical records, ε=8 is insufficient. Choose epsilon based
    on the sensitivity of the specific data, not on convenience.

  takeaway_06: |
    Canary tokens are a zero-FP extraction detection mechanism and a memorisation
    quantification tool. Injecting known unique strings into training data, then
    monitoring all outputs for their recall, provides both: (a) real-time alerting
    when extraction occurs, and (b) a measurement of how much memorisation the model
    has learned by testing canary recall at evaluation time.

  takeaway_07: |
    GDPR Article 17 (right to erasure) and model memorisation are fundamentally
    incompatible without proactive controls. Erasing personal data from trained
    model weights is computationally equivalent to retraining from scratch for
    most architectures. The legally sound position is data minimisation and DP
    training applied before training — not machine unlearning applied after.

  takeaway_08: |
    Extraction detection is a two-layer problem. Layer 1 (input pattern: prefix probes,
    low temperature, logprob access, bulk one-shot) catches the campaign before
    extraction succeeds. Layer 2 (output content: PII scan, canary recall, n-gram
    overlap) catches individual verbatim recall events. Both layers are required:
    Layer 1 alone misses novel attack patterns; Layer 2 alone misses campaigns
    that stay under per-request thresholds.

