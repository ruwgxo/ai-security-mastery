implementations:

  implementation_01:
    title: "Training Data Extraction Proof-of-Concept and Memorisation Risk Scorer"
    filename: "training_data_extraction_poc.py"
    purpose: |
      Two tools in one file:
      (1) Extraction PoC: demonstrates Carlini-style prefix-probe extraction
          against GPT-2 (as the paper's original target) using HuggingFace
          transformers. Generates completions, computes per-token entropy, and
          filters candidates by low entropy (memorisation signal).
      (2) Memorisation risk scorer: computes a corpus-level risk score from
          n-gram repetition rate and PII density, producing LOW / MEDIUM / HIGH
          risk classification with detailed breakdown.
    language: "python"
    code: |
      """
      Training Data Extraction PoC + Memorisation Risk Scorer
      Target: GPT-2 (open weights — safe for research PoC)
      """

      import re
      import math
      import hashlib
      from collections import Counter
      from dataclasses import dataclass, field
      from typing import List, Dict, Optional, Tuple


      # -----------------------------------------------------------------------
      # Part 1: Extraction PoC (GPT-2 — HuggingFace transformers)
      # -----------------------------------------------------------------------

      # Requires: pip install transformers torch --break-system-packages
      # Runs on CPU for PoC; GPU recommended for bulk generation

      PROBE_PREFIXES = [
          "The email address for",
          "Contact us at",
          "Copyright (c)",
          "def ",
          "import os\nimport sys\n",
          "All rights reserved.",
          "To unsubscribe from this list",
          "This message was sent to",
          "My name is",
          "The following is a list of",
      ]

      ENTROPY_THRESHOLD = 1.5     # bits per token — below this suggests memorised sequence
      GENERATION_TOKENS = 200     # tokens to generate per probe
      TEMPERATURE = 0.1           # low temperature maximises extraction
      NUM_SAMPLES_PER_PREFIX = 10 # bulk generation count


      @dataclass
      class ExtractionCandidate:
          prefix: str
          completion: str
          avg_entropy: float
          flagged: bool
          reason: str


      def run_extraction_poc(
          max_prefixes: int = 3,
          verbose: bool = True
      ) -> List[ExtractionCandidate]:
          """
          Run Carlini-style extraction against GPT-2.
          Returns list of ExtractionCandidate (flagged = low-entropy / memorisation signal).

          Install: pip install transformers torch
          """
          try:
              import torch
              from transformers import GPT2LMHeadModel, GPT2Tokenizer
          except ImportError:
              print("transformers not installed. Run: pip install transformers torch")
              return []

          tokenizer = GPT2Tokenizer.from_pretrained("gpt2")
          model = GPT2LMHeadModel.from_pretrained("gpt2")
          model.eval()

          candidates: List[ExtractionCandidate] = []
          prefixes = PROBE_PREFIXES[:max_prefixes]

          for prefix in prefixes:
              if verbose:
                  print(f"\nProbing prefix: '{prefix[:40]}...' ")
              input_ids = tokenizer.encode(prefix, return_tensors="pt")

              for sample_idx in range(NUM_SAMPLES_PER_PREFIX):
                  with torch.no_grad():
                      output = model.generate(
                          input_ids,
                          max_new_tokens=GENERATION_TOKENS,
                          temperature=TEMPERATURE,
                          do_sample=(TEMPERATURE > 0),
                          pad_token_id=tokenizer.eos_token_id,
                          return_dict_in_generate=True,
                          output_scores=True,
                      )

                  # Compute per-token entropy from scores
                  entropies = []
                  for step_scores in output.scores:
                      import torch.nn.functional as F
                      probs = F.softmax(step_scores[0], dim=-1)
                      entropy = -torch.sum(probs * torch.log2(probs + 1e-9)).item()
                      entropies.append(entropy)

                  avg_entropy = sum(entropies) / len(entropies) if entropies else float('inf')
                  new_tokens = output.sequences[0][input_ids.shape[1]:]
                  completion = tokenizer.decode(new_tokens, skip_special_tokens=True)

                  flagged = avg_entropy < ENTROPY_THRESHOLD
                  reason = (f"LOW ENTROPY ({avg_entropy:.2f} bits/token < {ENTROPY_THRESHOLD})"
                            if flagged else f"Normal entropy ({avg_entropy:.2f} bits/token)")

                  c = ExtractionCandidate(prefix=prefix, completion=completion,
                                          avg_entropy=avg_entropy, flagged=flagged,
                                          reason=reason)
                  candidates.append(c)

                  if verbose:
                      icon = "FLAGGED" if flagged else "normal "
                      print(f"  [{icon}] sample {sample_idx+1}: entropy={avg_entropy:.2f} — "
                            f"{completion[:60].strip()!r}")

          flagged_count = sum(1 for c in candidates if c.flagged)
          if verbose:
              print(f"\nExtraction PoC: {flagged_count}/{len(candidates)} candidates flagged "
                    f"as potential memorised sequences (entropy < {ENTROPY_THRESHOLD})")
          return candidates


      # -----------------------------------------------------------------------
      # Part 2: Memorisation Risk Scorer
      # -----------------------------------------------------------------------

      PII_PATTERNS = {
          "email":       re.compile(r'\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'),
          "phone_us":    re.compile(r'\b(\+1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b'),
          "ssn":         re.compile(r'\b\d{3}-\d{2}-\d{4}\b'),
          "credit_card": re.compile(r'\b(?:\d{4}[-\s]?){3}\d{4}\b'),
          "aws_key":     re.compile(r'\bAKIA[0-9A-Z]{16}\b'),
          "github_pat":  re.compile(r'\bghp_[A-Za-z0-9]{36}\b'),
          "ipv4":        re.compile(r'\b(?:\d{1,3}\.){3}\d{1,3}\b'),
      }

      SENSITIVE_KEYWORDS = [
          "patient", "diagnosis", "medication", "ssn", "social security",
          "confidential", "proprietary", "internal use only", "trade secret",
          "api key", "private key", "password", "secret", "credential",
      ]


      @dataclass
      class CorpusRiskReport:
          total_tokens: int
          total_ngrams: int
          repeated_ngrams: int
          repetition_rate: float
          pii_spans: Dict[str, int]
          pii_density: float
          sensitive_keyword_count: int
          sensitive_category_count: int
          raw_score: float
          risk_level: str
          recommendations: List[str] = field(default_factory=list)


      def tokenise_simple(text: str) -> List[str]:
          """Whitespace tokeniser — replace with tiktoken for production."""
          return text.split()


      def compute_ngram_repetition(tokens: List[str], n: int = 5) -> Tuple[int, int, float]:
          """Count n-gram repetitions. Returns (total, repeated, rate)."""
          ngrams = [tuple(tokens[i:i+n]) for i in range(len(tokens) - n + 1)]
          counts = Counter(ngrams)
          repeated = sum(1 for c in counts.values() if c > 1)
          rate = repeated / len(ngrams) if ngrams else 0.0
          return len(ngrams), repeated, rate


      def compute_pii_density(text: str, total_tokens: int) -> Tuple[Dict[str, int], float]:
          """Count PII pattern matches. Returns (match_counts, density)."""
          counts = {}
          total_matches = 0
          for pii_type, pattern in PII_PATTERNS.items():
              matches = pattern.findall(text)
              if matches:
                  counts[pii_type] = len(matches)
                  total_matches += len(matches)
          density = min(1.0, total_matches * 10 / total_tokens) if total_tokens > 0 else 0.0
          return counts, density


      def score_corpus(text: str, corpus_name: str = "corpus") -> CorpusRiskReport:
          tokens = tokenise_simple(text)
          total_tokens = len(tokens)
          total_ngrams, repeated_ngrams, repetition_rate = compute_ngram_repetition(tokens)
          pii_spans, pii_density = compute_pii_density(text, total_tokens)

          text_lower = text.lower()
          sensitive_hits = [kw for kw in SENSITIVE_KEYWORDS if kw in text_lower]
          sensitive_category_count = min(5, len(set(
              "medical" if kw in ["patient","diagnosis","medication"] else
              "auth" if kw in ["api key","private key","password","secret","credential"] else
              "legal" if kw in ["confidential","proprietary","trade secret"] else
              "identity"
              for kw in sensitive_hits
          ))) / 5

          raw_score = (
              0.4 * min(1.0, repetition_rate * 10) +
              0.4 * pii_density +
              0.2 * sensitive_category_count
          )
          risk = "HIGH" if raw_score > 0.6 else "MEDIUM" if raw_score > 0.3 else "LOW"

          recs = []
          if repetition_rate > 0.05:
              recs.append("DEDUPLICATE: n-gram repetition rate high — apply MinHash deduplication")
          if pii_density > 0.02:
              recs.append("ANONYMISE: PII detected — pseudonymise before training")
          if raw_score > 0.3:
              recs.append("CONSIDER DP TRAINING: risk score warrants differential privacy (ε ≤ 4)")
          if raw_score > 0.6:
              recs.append("MANDATORY DP: high-risk corpus — DP training required (ε ≤ 1)")
              recs.append("CANARY TOKENS: inject canary tokens before training for extraction monitoring")

          return CorpusRiskReport(
              total_tokens=total_tokens, total_ngrams=total_ngrams,
              repeated_ngrams=repeated_ngrams, repetition_rate=repetition_rate,
              pii_spans=pii_spans, pii_density=pii_density,
              sensitive_keyword_count=len(sensitive_hits),
              sensitive_category_count=int(sensitive_category_count * 5),
              raw_score=raw_score, risk_level=risk, recommendations=recs,
          )


      def print_risk_report(r: CorpusRiskReport, name: str = "corpus") -> None:
          print(f"\n{'='*55}")
          print(f"MEMORISATION RISK REPORT: {name}")
          print(f"Risk Level: [{r.risk_level}]  Score: {r.raw_score:.3f}")
          print(f"Tokens: {r.total_tokens:,}  |  5-grams: {r.total_ngrams:,}")
          print(f"Repeated 5-grams: {r.repeated_ngrams:,} ({r.repetition_rate:.1%})")
          print(f"PII density: {r.pii_density:.4f}  |  Sensitive keywords: {r.sensitive_keyword_count}")
          if r.pii_spans:
              print(f"PII types found: {dict(r.pii_spans)}")
          if r.recommendations:
              print("\nRecommendations:")
              for rec in r.recommendations:
                  print(f"  - {rec}")


      if __name__ == "__main__":
          # ---- Risk Scorer Demo ----
          low_risk_corpus = """
          The quick brown fox jumps over the lazy dog.
          Machine learning models learn statistical patterns from training data.
          Neural networks consist of layers of interconnected nodes.
          """ * 10

          high_risk_corpus = """
          Patient John Smith (SSN: 123-45-6789) was admitted on 2024-03-15.
          Diagnosis: Type 2 Diabetes. Medication: Metformin 500mg.
          Contact: john.smith@email.com  Phone: 555-123-4567
          API Key: AKIAIOSFODNN7EXAMPLE  GitHub: ghp_abcdef123456789012345678901234567890
          CONFIDENTIAL — Internal Use Only — Trade Secret — Proprietary
          Patient John Smith (SSN: 123-45-6789) was admitted on 2024-03-15.
          """ * 5

          r_low = score_corpus(low_risk_corpus, "low_risk_example")
          print_risk_report(r_low, "low_risk_example")

          r_high = score_corpus(high_risk_corpus, "high_risk_medical_corpus")
          print_risk_report(r_high, "high_risk_medical_corpus")

          # ---- Extraction PoC (requires transformers) ----
          print("\n" + "="*55)
          print("EXTRACTION PoC (GPT-2) — install transformers to enable")
          print("To run: set RUN_EXTRACTION=True and install transformers")
          RUN_EXTRACTION = False
          if RUN_EXTRACTION:
              candidates = run_extraction_poc(max_prefixes=2)

  implementation_02:
    title: "Divergence-Based Extraction Detector"
    filename: "extraction_detector.py"
    purpose: |
      Real-time extraction attack detector operating on API request logs and
      output entropy signals. Implements two complementary detection layers:
      (1) Input-pattern detector: prefix probe frequency, low-temperature requests,
          logprob access at scale, one-shot bulk generation.
      (2) Output divergence detector: per-output entropy scoring, n-gram overlap
          against canary corpus, PII pattern scan.
      Produces per-session risk score and recommended action.
    language: "python"
    code: |
      """
      Divergence-Based Extraction Detector
      Layer 1: API request pattern detection
      Layer 2: Output entropy + PII + canary monitoring
      """

      import re
      import math
      import hashlib
      from collections import defaultdict, Counter
      from dataclasses import dataclass, field
      from datetime import datetime, timezone
      from typing import List, Dict, Optional, Tuple


      # -----------------------------------------------------------------------
      # Data Structures
      # -----------------------------------------------------------------------

      @dataclass
      class APIRequest:
          account_id: str
          timestamp: float           # unix seconds
          prefix: str
          output: str
          temperature: float
          output_token_count: int
          logprobs_requested: bool
          turn_number: int           # within session
          session_id: str


      @dataclass
      class LayerOneAlert:
          signal: str
          value: float
          threshold: float
          detail: str


      @dataclass
      class LayerTwoAlert:
          signal: str
          value: float
          threshold: float
          detail: str
          output_snippet: str


      @dataclass
      class SessionRisk:
          account_id: str
          session_id: str
          layer_one_alerts: List[LayerOneAlert]
          layer_two_alerts: List[LayerTwoAlert]
          risk_score: float
          risk_level: str
          recommended_action: str


      # -----------------------------------------------------------------------
      # Canary Corpus (production: load from encrypted store)
      # -----------------------------------------------------------------------

      CANARY_CORPUS = [
          "CANARY-TOKEN-ALPHA-7x9q2mR4nK",
          "CANARY-TOKEN-BETA-8w3s5pL6jM",
          "CANARY-CREDENTIAL-GAMMA-zT4uVb",
          "INTERNAL-DOCID-DELTA-Hn7YxQ2",
      ]

      PII_PATTERNS = {
          "email":       re.compile(r'\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'),
          "phone":       re.compile(r'\b(\+1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b'),
          "ssn":         re.compile(r'\b\d{3}-\d{2}-\d{4}\b'),
          "credit_card": re.compile(r'\b(?:\d{4}[-\s]?){3}\d{4}\b'),
          "aws_key":     re.compile(r'\bAKIA[0-9A-Z]{16}\b'),
          "github_pat":  re.compile(r'\bghp_[A-Za-z0-9]{36}\b'),
      }


      # -----------------------------------------------------------------------
      # Layer 1: Input Pattern Detection
      # -----------------------------------------------------------------------

      class Layer1Detector:
          """Detects extraction campaign patterns across requests from one account."""

          WINDOW_SECONDS = 600      # 10-minute sliding window
          PREFIX_PROBE_THRESHOLD = 30
          LOW_TEMP_THRESHOLD = 0.2
          LOW_TEMP_VOLUME = 100
          LOGPROB_DAILY_THRESHOLD = 5_000
          ONE_SHOT_VOLUME = 1_000
          ONE_SHOT_MAX_TURNS = 2
          ONE_SHOT_MIN_OUTPUT = 200

          def __init__(self):
              self.account_requests: Dict[str, List[APIRequest]] = defaultdict(list)

          def record(self, req: APIRequest) -> None:
              self.account_requests[req.account_id].append(req)

          def _window(self, account_id: str, now: float) -> List[APIRequest]:
              return [r for r in self.account_requests[account_id]
                      if now - r.timestamp <= self.WINDOW_SECONDS]

          def detect(self, account_id: str) -> List[LayerOneAlert]:
              alerts = []
              now = max((r.timestamp for r in self.account_requests[account_id]),
                        default=0.0)
              window = self._window(account_id, now)
              all_reqs = self.account_requests[account_id]

              # Signal 1: prefix probe pattern
              prefixes = [r.prefix for r in window]
              common_prefix_pairs = sum(
                  1 for i, p1 in enumerate(prefixes)
                  for p2 in prefixes[i+1:]
                  if p1 and p2 and p1[:30] == p2[:30] and p1 != p2
              )
              if common_prefix_pairs > self.PREFIX_PROBE_THRESHOLD:
                  alerts.append(LayerOneAlert(
                      "prefix_probe_pattern",
                      common_prefix_pairs, self.PREFIX_PROBE_THRESHOLD,
                      f"{common_prefix_pairs} requests share common prefix in 10-min window"))

              # Signal 2: low temperature + volume
              low_temp = [r for r in window if r.temperature < self.LOW_TEMP_THRESHOLD]
              if len(low_temp) > self.LOW_TEMP_VOLUME:
                  alerts.append(LayerOneAlert(
                      "low_temperature_bulk",
                      len(low_temp), self.LOW_TEMP_VOLUME,
                      f"{len(low_temp)} low-temp (< {self.LOW_TEMP_THRESHOLD}) requests in window"))

              # Signal 3: logprob access at scale
              logprob_daily = [r for r in all_reqs if r.logprobs_requested]
              if len(logprob_daily) > self.LOGPROB_DAILY_THRESHOLD:
                  alerts.append(LayerOneAlert(
                      "logprob_high_volume",
                      len(logprob_daily), self.LOGPROB_DAILY_THRESHOLD,
                      f"{len(logprob_daily)} logprob requests today"))

              # Signal 4: one-shot high-output pattern
              one_shot = [r for r in window
                          if r.turn_number <= self.ONE_SHOT_MAX_TURNS
                          and r.output_token_count >= self.ONE_SHOT_MIN_OUTPUT]
              if len(one_shot) > self.ONE_SHOT_VOLUME:
                  alerts.append(LayerOneAlert(
                      "one_shot_bulk_generation",
                      len(one_shot), self.ONE_SHOT_VOLUME,
                      f"{len(one_shot)} one-shot high-output requests in window"))

              return alerts


      # -----------------------------------------------------------------------
      # Layer 2: Output Content Detection
      # -----------------------------------------------------------------------

      def ngram_overlap(text_a: str, text_b: str, n: int = 5) -> float:
          """ROUGE-L-style n-gram overlap between two texts."""
          tokens_a = text_a.lower().split()
          tokens_b = text_b.lower().split()
          if len(tokens_a) < n or len(tokens_b) < n:
              return 0.0
          ngrams_a = Counter(tuple(tokens_a[i:i+n]) for i in range(len(tokens_a)-n+1))
          ngrams_b = Counter(tuple(tokens_b[i:i+n]) for i in range(len(tokens_b)-n+1))
          overlap = sum((ngrams_a & ngrams_b).values())
          return overlap / max(1, len(ngrams_a))


      def scan_output(output: str) -> List[LayerTwoAlert]:
          alerts = []

          # Signal 1: PII pattern match
          for pii_type, pattern in PII_PATTERNS.items():
              matches = pattern.findall(output)
              if matches:
                  alerts.append(LayerTwoAlert(
                      f"pii_in_output_{pii_type}", len(matches), 0,
                      f"{len(matches)} {pii_type} pattern(s) in output",
                      output[:120]))

          # Signal 2: Canary token recall
          for canary in CANARY_CORPUS:
              if canary in output:
                  alerts.append(LayerTwoAlert(
                      "canary_token_recall", 1.0, 0,
                      f"CANARY TOKEN RECALLED: {canary}",
                      output[:120]))

          # Signal 3: High n-gram overlap with canary corpus
          for canary in CANARY_CORPUS:
              overlap = ngram_overlap(output, canary)
              if overlap > 0.5:
                  alerts.append(LayerTwoAlert(
                      "high_ngram_overlap_canary", overlap, 0.5,
                      f"High overlap ({overlap:.2f}) with canary corpus entry",
                      output[:120]))

          return alerts


      # -----------------------------------------------------------------------
      # Session Risk Aggregator
      # -----------------------------------------------------------------------

      def compute_session_risk(
          account_id: str,
          session_id: str,
          l1_alerts: List[LayerOneAlert],
          l2_alerts: List[LayerTwoAlert],
      ) -> SessionRisk:
          # Score: each L1 alert = 0.2; each L2 alert = 0.4 (capped at 1.0)
          score = min(1.0, len(l1_alerts) * 0.2 + len(l2_alerts) * 0.4)
          risk = "critical" if score >= 0.8 else "high" if score >= 0.5 else "medium" if score >= 0.2 else "low"

          actions = {
              "critical": "BLOCK account; alert security team; disable logprobs; preserve session log",
              "high":     "Rate-limit account; alert security team; disable logprobs",
              "medium":   "Increase monitoring sensitivity; log session for review",
              "low":      "No immediate action — continue monitoring",
          }
          return SessionRisk(
              account_id=account_id, session_id=session_id,
              layer_one_alerts=l1_alerts, layer_two_alerts=l2_alerts,
              risk_score=score, risk_level=risk,
              recommended_action=actions[risk],
          )


      def print_session_risk(r: SessionRisk) -> None:
          print(f"\n{'='*55}")
          print(f"EXTRACTION DETECTION: account={r.account_id} session={r.session_id}")
          print(f"Risk: [{r.risk_level.upper()}]  Score: {r.risk_score:.2f}")
          print(f"Action: {r.recommended_action}")
          if r.layer_one_alerts:
              print("\n  Layer 1 — Input Pattern Alerts:")
              for a in r.layer_one_alerts:
                  print(f"    [{a.signal}] {a.detail}")
          if r.layer_two_alerts:
              print("\n  Layer 2 — Output Content Alerts:")
              for a in r.layer_two_alerts:
                  print(f"    [{a.signal}] {a.detail}")
                  print(f"      snippet: {a.output_snippet[:60]!r}")


      if __name__ == "__main__":
          import time

          detector = Layer1Detector()
          now = time.time()

          # Simulate extraction campaign: 40 low-temp prefix probes in 10 min
          prefix_base = "The patient's contact information is"
          for i in range(40):
              req = APIRequest(
                  account_id="acct-ATTACK-001",
                  timestamp=now + i * 10,
                  prefix=f"{prefix_base} case {i}",
                  output=f"Dr. Smith email john.smith@hospital.com Phone: 555-123-4567 case {i}",
                  temperature=0.1,
                  output_token_count=220,
                  logprobs_requested=True,
                  turn_number=1,
                  session_id="sess-ATTACK-001",
              )
              detector.record(req)

          l1 = detector.detect("acct-ATTACK-001")

          # Scan last output
          last_output = "john.smith@hospital.com  Phone: 555-123-4567  CANARY-TOKEN-ALPHA-7x9q2mR4nK"
          l2 = scan_output(last_output)

          risk = compute_session_risk("acct-ATTACK-001", "sess-ATTACK-001", l1, l2)
          print_session_risk(risk)

          # Simulate legitimate user
          for i in range(5):
              req = APIRequest(
                  account_id="acct-legit-002",
                  timestamp=now + i * 30,
                  prefix=f"Explain quantum computing",
                  output="Quantum computing uses qubits ...",
                  temperature=0.7,
                  output_token_count=80,
                  logprobs_requested=False,
                  turn_number=i+1,
                  session_id="sess-legit-002",
              )
              detector.record(req)
          l1_legit = detector.detect("acct-legit-002")
          l2_legit = scan_output("Quantum computing uses qubits that can be in superposition...")
          risk_legit = compute_session_risk("acct-legit-002", "sess-legit-002", l1_legit, l2_legit)
          print_session_risk(risk_legit)

  implementation_03:
    title: "Differential Privacy Comparison + Output Scanner"
    filename: "dp_and_output_scanner.py"
    purpose: |
      Two tools:
      (1) DP training comparison: simulates accuracy-privacy tradeoff across
          epsilon values (1, 2, 4, 8, inf) using Gaussian noise injection as
          a DP-SGD proxy, producing a comparison table with memorisation
          reduction estimates and accuracy delta.
      (2) Output verbatim recall scanner: scans model outputs for verbatim
          recall against a reference corpus using ROUGE-L n-gram overlap,
          PII patterns, and canary token matching. Integrates with API serving
          pipeline as a pre-return output filter.
    language: "python"
    code: |
      """
      Differential Privacy Tradeoff Comparison + Output Verbatim Recall Scanner
      """

      import re
      import math
      from collections import Counter
      from dataclasses import dataclass, field
      from typing import List, Dict, Tuple, Optional


      # -----------------------------------------------------------------------
      # Part 1: DP Training Tradeoff Comparison
      # -----------------------------------------------------------------------

      # Empirically-grounded estimates from published DP-NLP literature
      # (Anil et al. 2022, Yu et al. 2022, Li et al. 2022)
      DP_TRADEOFF_TABLE = [
          {"epsilon": 1,        "label": "Strong",   "mem_reduction_pct": 90,
           "accuracy_cost_small": 12.0, "accuracy_cost_large": 5.0,
           "suitable_for": "Medical/legal fine-tuning on small models"},
          {"epsilon": 2,        "label": "Strong-M", "mem_reduction_pct": 82,
           "accuracy_cost_small": 9.0,  "accuracy_cost_large": 3.5,
           "suitable_for": "Customer PII fine-tuning — small models"},
          {"epsilon": 4,        "label": "Moderate", "mem_reduction_pct": 70,
           "accuracy_cost_small": 6.0,  "accuracy_cost_large": 2.0,
           "suitable_for": "Customer PII fine-tuning — large models (≥7B)"},
          {"epsilon": 8,        "label": "Weak",     "mem_reduction_pct": 40,
           "accuracy_cost_small": 3.0,  "accuracy_cost_large": 0.8,
           "suitable_for": "Minimum meaningful DP — not for high-sensitivity data"},
          {"epsilon": float('inf'), "label": "None",  "mem_reduction_pct": 0,
           "accuracy_cost_small": 0.0,  "accuracy_cost_large": 0.0,
           "suitable_for": "Standard training — never for sensitive fine-tuning data"},
      ]


      def print_dp_comparison(model_size: str = "large") -> None:
          key = f"accuracy_cost_{model_size}"
          print(f"\n{'='*70}")
          print(f"DIFFERENTIAL PRIVACY TRADEOFF TABLE ({model_size.upper()} MODEL)")
          print(f"{'Epsilon':>10}  {'Privacy':>10}  {'Mem.Reduction':>15}"
                f"  {'Accuracy Cost':>14}  Suitable For")
          print("-" * 70)
          for row in DP_TRADEOFF_TABLE:
              eps = f"{row['epsilon']:.0f}" if row['epsilon'] != float('inf') else "∞"
              print(f"{eps:>10}  {row['label']:>10}  {row['mem_reduction_pct']:>13}%"
                    f"  {row[key]:>13.1f}%  {row['suitable_for'][:35]}")
          print("\nRecommendations:")
          print("  ε ≤ 1   → Required for medical, legal, or government fine-tuning")
          print("  ε ≤ 4   → Required for customer PII fine-tuning on large models")
          print("  ε ≤ 8   → Minimum for any sensitive domain fine-tuning")
          print("  ε = ∞   → Never use for sensitive data; document this decision")


      def noise_injection_demo(epsilon: float, gradient_norm: float = 1.0,
                                batch_size: int = 32, delta: float = 1e-5) -> Dict:
          """
          Compute the Gaussian noise standard deviation for DP-SGD
          at the given epsilon, delta, gradient clipping norm.
          Uses the simplified formula (tight for single-step analysis):
            sigma ≈ sqrt(2 * ln(1.25/delta)) * gradient_norm / epsilon
          """
          if epsilon == float('inf'):
              return {"sigma": 0.0, "epsilon": epsilon, "noise_ratio": 0.0,
                      "snr_db": float('inf')}
          sigma = math.sqrt(2 * math.log(1.25 / delta)) * gradient_norm / epsilon
          noise_ratio = sigma / gradient_norm
          snr_db = 20 * math.log10(1.0 / sigma) if sigma > 0 else float('inf')
          return {"sigma": sigma, "epsilon": epsilon, "noise_ratio": noise_ratio,
                  "snr_db": snr_db}


      def print_noise_demo() -> None:
          print(f"\n{'='*55}")
          print("DP-SGD NOISE LEVELS (gradient_norm=1.0, delta=1e-5)")
          print(f"{'Epsilon':>10}  {'Sigma':>10}  {'Noise Ratio':>12}  {'SNR (dB)':>10}")
          print("-" * 55)
          for eps in [1, 2, 4, 8, float('inf')]:
              r = noise_injection_demo(eps)
              eps_str = f"{eps:.0f}" if eps != float('inf') else "∞"
              snr = f"{r['snr_db']:.1f}" if r['snr_db'] != float('inf') else "∞"
              print(f"{eps_str:>10}  {r['sigma']:>10.4f}  {r['noise_ratio']:>12.4f}  {snr:>10}")


      # -----------------------------------------------------------------------
      # Part 2: Output Verbatim Recall Scanner
      # -----------------------------------------------------------------------

      CANARY_TOKENS = [
          "CANARY-TOKEN-ALPHA-7x9q2mR4nK",
          "CANARY-TOKEN-BETA-8w3s5pL6jM",
          "CANARY-CREDENTIAL-GAMMA-zT4uVb",
          "INTERNAL-DOCID-DELTA-Hn7YxQ2",
      ]

      PII_SCAN_PATTERNS = {
          "email":       re.compile(r'\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b'),
          "phone":       re.compile(r'\b(\+1[-.\s]?)?\(?\d{3}\)?[-.\s]?\d{3}[-.\s]?\d{4}\b'),
          "ssn":         re.compile(r'\b\d{3}-\d{2}-\d{4}\b'),
          "credit_card": re.compile(r'\b(?:\d{4}[-\s]?){3}\d{4}\b'),
          "aws_key":     re.compile(r'\bAKIA[0-9A-Z]{16}\b'),
          "github_pat":  re.compile(r'\bghp_[A-Za-z0-9]{36}\b'),
      }


      @dataclass
      class OutputScanResult:
          output: str
          pii_found: Dict[str, List[str]]
          canary_recalled: List[str]
          ngram_overlap_max: float
          reference_match_id: Optional[str]
          overall_risk: str
          block: bool
          reason: str


      def compute_ngram_overlap_score(text: str, reference: str, n: int = 5) -> float:
          ta = text.lower().split()
          tb = reference.lower().split()
          if len(ta) < n or len(tb) < n:
              return 0.0
          nga = Counter(tuple(ta[i:i+n]) for i in range(len(ta)-n+1))
          ngb = Counter(tuple(tb[i:i+n]) for i in range(len(tb)-n+1))
          overlap = sum((nga & ngb).values())
          return overlap / max(1, len(nga))


      def scan_output_verbatim(
          output: str,
          reference_corpus: Optional[Dict[str, str]] = None,
          ngram_threshold: float = 0.4,
      ) -> OutputScanResult:
          """
          reference_corpus: {doc_id: doc_text} of sensitive training documents.
          In production: load from encrypted store, not hardcoded.
          """
          pii_found: Dict[str, List[str]] = {}
          for pii_type, pattern in PII_SCAN_PATTERNS.items():
              matches = pattern.findall(output)
              if matches:
                  pii_found[pii_type] = matches

          canary_recalled = [c for c in CANARY_TOKENS if c in output]

          max_overlap = 0.0
          match_id = None
          if reference_corpus:
              for doc_id, doc_text in reference_corpus.items():
                  score = compute_ngram_overlap_score(output, doc_text)
                  if score > max_overlap:
                      max_overlap = score
                      match_id = doc_id if score >= ngram_threshold else None

          block = bool(canary_recalled or pii_found)
          risk = "critical" if canary_recalled else "high" if pii_found else \
                 "medium" if max_overlap >= ngram_threshold else "low"

          reason = (
              f"CANARY RECALLED: {canary_recalled}" if canary_recalled else
              f"PII detected: {list(pii_found.keys())}" if pii_found else
              f"High n-gram overlap ({max_overlap:.2f}) with reference doc {match_id}" if match_id else
              "Clean"
          )

          return OutputScanResult(
              output=output, pii_found=pii_found,
              canary_recalled=canary_recalled,
              ngram_overlap_max=max_overlap,
              reference_match_id=match_id,
              overall_risk=risk, block=block, reason=reason,
          )


      def print_scan_result(r: OutputScanResult) -> None:
          icon = "BLOCK" if r.block else "PASS "
          print(f"\n[{icon}] Risk: {r.overall_risk.upper():8s} | {r.reason}")
          if r.pii_found:
              print(f"       PII: {dict(r.pii_found)}")
          if r.canary_recalled:
              print(f"       Canary recalled: {r.canary_recalled}")
          print(f"       N-gram overlap: {r.ngram_overlap_max:.3f}")
          print(f"       Output: {r.output[:80]!r}")


      if __name__ == "__main__":
          print_dp_comparison("large")
          print_dp_comparison("small")
          print_noise_demo()

          print(f"\n{'='*55}")
          print("OUTPUT VERBATIM RECALL SCANNER")

          ref_corpus = {
              "doc-001": "Patient Jane Doe SSN 987-65-4321 Diagnosis Hypertension Medication Lisinopril",
              "doc-002": "API Key AKIAIOSFODNN7EXAMPLE Secret wJalrXUtnFEMI internal trade secret",
          }

          test_outputs = [
              "Here is the information: Patient Jane Doe SSN 987-65-4321 Diagnosis Hypertension",
              "The answer to your question is 42. Quantum computers use qubits.",
              "Please contact us at support@company.com for assistance.",
              "The token CANARY-TOKEN-ALPHA-7x9q2mR4nK was found in the document.",
          ]

          for output in test_outputs:
              result = scan_output_verbatim(output, ref_corpus)
              print_scan_result(result)

