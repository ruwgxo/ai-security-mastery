section_summary:
  one_paragraph: |
    Section 5.10 establishes training data extraction as a practical, black-box-accessible
    privacy attack with direct GDPR implications, and provides the full stack from attack
    mechanics through defender implementation. The section opens by explaining why models
    memorise: gradient descent accumulates signal proportionally to repetition count, model
    capacity in the overfitting regime enables simultaneous generalisation and memorisation,
    and fine-tuning amplifies memorisation of fine-tuning data dramatically by presenting
    it at high frequency relative to its size. The three-level memorisation taxonomy
    (verbatim, approximate, concept-level) provides the framework for risk classification
    and detection strategy selection. The Carlini et al. (2021) methodology is examined
    in full: prefix construction, bulk generation at low temperature, membership inference
    filtering for low-entropy candidates, and verification — a complete black-box
    extraction pipeline requiring only API access. Five risk factors are quantified:
    model size (memorisation scales with parameters), data repetition (10+ occurrences
    near-certain extractable), fine-tuning (small dataset, many epochs equals near-certain
    memorisation), generation temperature (low temperature maximises extraction), and
    logprob exposure (multiplies extraction efficiency). Differential privacy is presented
    formally (the ε-δ guarantee, DP-SGD mechanics, noise calibration) with empirical
    accuracy-privacy tradeoff values across ε=1, 2, 4, 8, ∞ for both small and large
    models, enabling epsilon selection based on data sensitivity. Detection is a two-layer
    problem: Layer 1 operates on input patterns (prefix probes, low temperature, logprob
    access, one-shot bulk volume) and Layer 2 operates on output content (PII patterns,
    canary token recall, n-gram overlap against reference corpus). The GDPR intersection
    establishes why right-to-erasure and model memorisation are technically incompatible
    without proactive controls, and why DP training and data minimisation before training
    are the only legally sound approaches. Three implementations deliver the extraction
    PoC and memorisation risk scorer, the dual-layer extraction detector, and the
    differential privacy tradeoff comparison paired with the output verbatim recall scanner.

  next_section: |
    Section 5.11 — Privacy Attacks: Membership Inference and Model Inversion
    Section 5.10 covered what can be retrieved verbatim from model outputs. Section 5.11
    covers the complementary question: what can an adversary determine about whether
    a specific record was used in training (membership inference) and what can be
    reconstructed about training inputs from model outputs or gradients (model inversion).
    Together, extraction + membership inference + inversion form the complete privacy
    attack surface that any model serving sensitive data must defend against.

