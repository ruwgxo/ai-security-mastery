section_content:

  subsection_01:
    number: "5.10.1"
    title: "Why Models Leak Training Data: The Memorisation Mechanism"
    content: |
      the_core_paradox: |
        Machine learning models are trained to generalise — to produce correct
        outputs on unseen data by learning statistical patterns, not by memorising
        specific examples. Yet research consistently demonstrates that large models,
        particularly large language models, memorise substantial portions of their
        training data verbatim. These two facts are not contradictory. Understanding
        why models memorise is the prerequisite for building effective defences.

      why_memorisation_happens:

        mechanism_01_gradient_descent_and_repetition: |
          Gradient descent minimises training loss. If an example appears in the
          training corpus n times, the gradient signal for that example accumulates
          across n presentations — each occurrence pushing the model weights toward
          reproducing that specific text. A passage repeated 100 times in training
          data generates 100x more gradient weight than a passage seen once.
          Memorisation of frequently-occurring text is, from the optimiser's
          perspective, the correct behaviour: it minimises loss on those examples.

        mechanism_02_model_capacity_and_overfit: |
          A model with more parameters has greater representational capacity. When
          capacity far exceeds the information content of the training set, the model
          can afford to allocate capacity to memorising individual examples rather
          than relying solely on generalised patterns. This is the overfitting regime
          applied to language model training: the model has room to both learn
          statistical patterns and memorise specific sequences.

          The scaling relationship documented by Carlini et al. (2021): as model
          size increases from 1.3B to 6B parameters on the same training data, the
          number of memorised training examples increases disproportionately. Scale
          is not a defence against memorisation — it is a risk amplifier.

        mechanism_03_fine_tuning_amplification: |
          When a pre-trained model is fine-tuned on a smaller, domain-specific
          dataset, the fine-tuning dataset is presented to the model many more
          times relative to its size than the pre-training data. A model pre-trained
          on 1T tokens with 1 epoch sees each token once. The same model fine-tuned
          on 100M tokens with 3 epochs sees each fine-tuning token ~300x more
          per-token than pre-training data. Fine-tuning dramatically amplifies
          memorisation of fine-tuning examples — which are precisely the sensitive
          internal documents, customer records, and proprietary data that
          organisations use for fine-tuning.

        mechanism_04_context_completion_dynamics: |
          LLMs generate text by predicting the most probable next token given
          context. For memorised sequences, the model's internal representation
          of the context directly encodes the continuation — the model does not
          need to compute anything, it retrieves. This is why prefix prompts
          that match memorised training data prefixes trigger verbatim recall:
          the context activates stored sequence representations rather than
          sampling from a generalised distribution.

      memorisation_vs_generalisation_boundary: |
        Not all training influence is memorisation. A model that learns "Python
        functions start with def" has learned a statistical pattern — it will
        generate "def" in appropriate contexts regardless of any specific Python
        file in training data. This is generalisation. A model that can reproduce
        a specific GitHub user's SSH private key from a partial prompt has memorised
        that specific sequence. The boundary between these is not sharp, but the
        distinction matters for threat modelling and defence design.

  subsection_02:
    number: "5.10.2"
    title: "Memorisation Taxonomy: Verbatim, Approximate, and Concept-Level"
    content: |
      taxonomy_purpose: |
        The three-level memorisation taxonomy from Carlini et al. (2023) provides
        a framework for: (a) classifying extraction risk by severity, (b) choosing
        appropriate detection strategies, and (c) setting realistic expectations for
        differential privacy and unlearning defences.

      level_01_verbatim_memorisation:
        definition: |
          The model reproduces a training sequence character-for-character (or
          token-for-token) given a sufficient prompt prefix. The output is
          indistinguishable from copy-pasting from the original document.
        formal_definition: |
          A sequence s is k-extractable from model M if there exists a prompt p
          such that M(p) produces s[len(p):] verbatim for the first k tokens.
          Carlini et al. define "extractable memorisation" using k=50 tokens.
        examples:
          - "SSH private key reproduced verbatim from 'Begin RSA Private Key' prefix"
          - "Credit card number reproduced from partial card sequence prefix"
          - "Person's email address reproduced from 'To reach [Name] contact' prefix"
          - "GPL licence text reproduced from 'This program is free software' prefix"
          - "Medical record content reproduced from patient demographic prefix"
        detection_approach: |
          N-gram overlap comparison between model output and training corpus
          reference. High overlap (>0.8 ROUGE-L against any training document)
          signals verbatim memorisation event.
        severity: "Critical — direct data breach equivalent"

      level_02_approximate_memorisation:
        definition: |
          The model reproduces training content with minor variations — paraphrase,
          reformatting, or partial omission — that preserve the substantive
          informational content of the original.
        examples:
          - "API key reproduced with one character changed"
          - "Patient record paraphrased with same demographics and diagnosis preserved"
          - "Proprietary algorithm description reproduced with variable names changed"
          - "Personal address reproduced with house number off by one"
        detection_approach: |
          Semantic similarity (embedding cosine similarity) between model output
          and training corpus. High semantic similarity without high lexical overlap
          indicates approximate memorisation. Harder to detect than verbatim.
        severity: "High — substantive PII or IP disclosure even without exact match"

      level_03_concept_level_memorisation:
        definition: |
          The model has learned specific facts, attributes, or associations from
          training data that are not generalisable statistical patterns — they are
          specific to individuals or entities in the training corpus and can be
          elicited by targeted prompting.
        examples:
          - "Model knows a specific person's employer and city from training-data mentions"
          - "Model associates a non-public code name with a product description"
          - "Model produces a person's phone number when asked about them by name"
          - "Model reveals a proprietary internal process when asked about the company"
        detection_approach: |
          Hard to detect from output monitoring alone. Requires membership inference
          (Section 5.11) or targeted canary token recall testing.
        severity: "Medium-High — depends on sensitivity of the specific facts"

      memorisation_detection_priority_by_level:
        verbatim: "Highest priority — detectable with n-gram overlap; implement first"
        approximate: "High priority — requires semantic similarity monitoring; implement second"
        concept_level: "Medium priority — requires canary tokens or membership inference; implement third"

  subsection_03:
    number: "5.10.3"
    title: "Carlini et al. (2021): Extracting Training Data from Large Language Models"
    content: |
      paper_context: |
        The 2021 paper "Extracting Training Data from Large Language Models" by
        Nicholas Carlini, Florian Tramèr, Eric Wallace, Matthew Jagielski,
        Ariel Herbert-Voss, Katherine Lee, Adam Roberts, Tom Brown, Dawn Song,
        Ulfar Erlingsson, Alina Oprea, and Colin Raffel is the foundational
        reference for training data extraction as a practical security concern.
        It demonstrated, against GPT-2, that a black-box adversary with API access
        can extract verbatim training examples including PII — without any white-box
        knowledge of model weights.

      key_findings:

        finding_01_scale_amplifies_memorisation: |
          The paper compared memorisation rates across GPT-2 model sizes:
          GPT-2 Small (117M params) to GPT-2 XL (1.5B params).
          Larger models memorised significantly more training examples.
          The top-n memorised sequences per model grew roughly linearly with model size.
          Implication: scaling is not a privacy defence. GPT-4-scale models
          memorise far more than GPT-2 — the attack surface grows with capability.

        finding_02_repeated_data_memorised_first: |
          Sequences that appeared multiple times in the training corpus (WebText)
          were extracted at dramatically higher rates than single-occurrence sequences.
          A sequence appearing 10+ times was near-certain to be memorised and extractable.
          Implication: training data deduplication is the single most impactful
          memorisation defence. Removing duplicates reduces the gradient signal
          that drives memorisation of specific sequences.

        finding_03_generation_temperature_matters: |
          Lower generation temperature (more deterministic sampling) produced
          higher extraction rates. At temperature=0 (greedy decoding), the model
          produces the single highest-probability token at each step — maximising
          the probability of verbatim recall for memorised sequences.
          Implication: APIs that expose deterministic generation (temperature=0
          or very low temperature) are higher-risk extraction surfaces than
          stochastic APIs.

        finding_04_divergence_as_extraction_signal: |
          Memorised text deviates from the model's normal generation distribution
          in a detectable way. Under normal conditions, model output exhibits
          some randomness. When reproducing memorised text, the model assigns
          very high probability to the next token — producing anomalously high-
          confidence (low-entropy) generation. This divergence between normal
          generation entropy and memorised-sequence entropy is the detection signal.

        finding_05_real_pii_extracted_at_scale: |
          The paper extracted real, verifiable PII from GPT-2 outputs including
          personal names associated with contact information, URLs, and code
          sequences. This was from a model trained on public web data (WebText/Reddit).
          For models fine-tuned on internal data, the extraction risk is substantially
          higher because: (1) the fine-tuning data is repeated more relative to its
          size, (2) the fine-tuning data is more sensitive, and (3) the adversary
          can target the extraction with domain knowledge about the fine-tuning corpus.

      extraction_attack_methodology:

        step_01_prefix_construction: |
          Adversary constructs probe prompts designed to activate memorised sequences:
            (a) Partial sequences from suspected training data (if known)
            (b) Generic domain prompts ("The patient presented with")
            (c) High-repetition prefixes from likely training sources
                ("Copyright (c)", "All rights reserved", "def ", "import ")
            (d) Entity-targeted prompts ("Contact [person name] at")
          Each prefix is designed to position the model at the start of a
          potentially memorised sequence.

        step_02_bulk_generation: |
          Generate 500-10,000 completions per prefix, typically at low temperature.
          Carlini et al. generated 600 tokens per prompt for each of ~100 prompts
          and evaluated the resulting sequences. In API terms: this is 50,000-
          100,000 token generations per extraction campaign, spread across prompts.

        step_03_membership_inference_filtering: |
          From the bulk generated sequences, filter for those most likely to be
          memorised training data rather than generated text. Filtering criteria:
            - Low perplexity under the model (high-confidence generation)
            - Low perplexity under a reference model (not just a low-probability quirk)
            - High n-gram overlap with known training sources
            - Verbatim match with reference internet content
          Sequences that pass this filter are the extraction candidates.

        step_04_verification: |
          Verify extraction candidates against the actual training corpus (if available)
          or against public internet sources. For the adversary: verification confirms
          whether the extracted sequence is verbatim training data or high-confidence
          generation. For the defender: verification calibrates the detection threshold.

      five_high_memorisation_data_types:
        personal_identifiable_information: |
          Names + contact information: extracted from social media profiles, forum
          posts, news articles, and contact pages indexed in web training data.
        credentials_and_secrets: |
          API keys, SSH private keys, passwords: accidentally included in GitHub
          repositories, Pastebin posts, and forums — all common training sources.
          Carlini et al. demonstrated extraction of what appeared to be real credentials.
        medical_and_health_data: |
          Clinical language, diagnosis patterns, and (in models fine-tuned on
          medical data) specific patient information. Fine-tuned clinical LLMs
          face the highest extraction risk for this category.
        proprietary_code_and_algorithms: |
          Verbatim code sequences from GitHub. Particularly relevant for models
          trained on code corpora or fine-tuned on internal codebases.
        legal_and_financial_documents: |
          Contract language, financial figures, and case references from legal
          databases and financial filings included in training corpora.

  subsection_04:
    number: "5.10.4"
    title: "Extraction Risk Factors: Model Size, Data Repetition, and Fine-Tuning"
    content: |
      risk_factor_01_model_size:
        finding: |
          Memorisation scales with model parameter count. Larger models have
          greater capacity to simultaneously learn statistical patterns and
          memorise specific sequences. The Carlini et al. (2021) finding
          (memorisation increases with scale) has been replicated across
          model families.
        quantification: |
          Doubling model parameters approximately doubles the number of
          extractable memorised sequences at fixed training data size.
          A 70B parameter model fine-tuned on 10K internal documents has
          dramatically higher per-document memorisation risk than a 7B
          parameter model fine-tuned on the same data.
        implication: |
          Large model deployments serving sensitive domains require
          correspondingly more aggressive extraction monitoring and
          differential privacy defences than smaller model deployments.

      risk_factor_02_data_repetition:
        finding: |
          The single strongest predictor of verbatim memorisation is the
          number of times a sequence appears in the training corpus. The
          relationship is approximately:
            P(memorised) ≈ 1 − exp(−k × repetitions)
          where k is a model-size-dependent constant.
          A sequence appearing 10+ times in training data is near-certain
          to be memorisable at extraction.
        quantification: |
          Carlini et al.: sequences appearing once → ~1% extraction rate.
          Sequences appearing 10+ times → ~40-70% extraction rate.
          Sequences appearing 100+ times → near-certain extraction.
        implication: |
          Deduplication of training data is the highest-ROI memorisation
          defence available. Near-duplicate removal (MinHash / n-gram shingle
          similarity) catches paraphrase variants that exact-match dedup misses.
        detection_angle: |
          Memorisation risk scorer: compute repetition count for each n-gram
          sequence in the training corpus. High-repetition sequences are
          extraction targets and should be monitored in output scanning.

      risk_factor_03_fine_tuning:
        finding: |
          Fine-tuning on a small, sensitive dataset dramatically amplifies
          memorisation of fine-tuning examples relative to pre-training data.
          The fine-tuning dataset is repeated many times (multiple epochs),
          and its smaller size means each example receives more gradient updates
          per epoch than pre-training examples.
        quantification: |
          A model fine-tuned for 10 epochs on 10K documents presents each
          fine-tuning document to the training process 10 times, creating
          strong gradient signals for verbatim memorisation. A 100-document
          fine-tuning dataset with 50 epochs is near-certainly memorised.
        high_risk_fine_tuning_scenarios:
          - "Customer service fine-tuning on real support tickets (PII in transcripts)"
          - "Legal document fine-tuning on internal contracts"
          - "Medical fine-tuning on clinical notes"
          - "Code fine-tuning on internal proprietary codebase"
          - "Financial fine-tuning on internal reports and filings"
        implication: |
          Organisations fine-tuning LLMs on sensitive internal data must treat
          the resulting model as a potential vector for extraction of that data.
          Differential privacy training and aggressive deduplication of
          fine-tuning data are required controls, not optional enhancements.

      risk_factor_04_inference_configuration:
        finding: |
          Low generation temperature (→ deterministic) produces higher extraction
          rates than high temperature (stochastic). APIs exposing logprobs or
          greedy decoding options increase extraction efficiency.
        implication: |
          In extraction-sensitive deployments: (a) set minimum temperature > 0,
          (b) disable logprob exposure for non-internal callers,
          (c) enable sampling to add entropy to generation.

      memorisation_risk_score_formula: |
        RISK_SCORE(corpus) =
          0.4 × normalised_repetition_rate(corpus)    # fraction of 5-grams appearing >3 times
        + 0.4 × pii_density(corpus)                   # fraction of tokens in PII spans
        + 0.2 × sensitive_data_category_count(corpus) # how many high-risk categories present

        Thresholds:
          RISK_SCORE < 0.3 → Low  — standard monitoring
          0.3-0.6         → Medium — aggressive monitoring + consider DP training
          > 0.6           → High  — DP training required + canary tokens mandatory

  subsection_05:
    number: "5.10.5"
    title: "Differential Privacy: The Formal Defence and Its Practicality"
    content: |
      what_differential_privacy_is: |
        Differential privacy (DP) is a formal mathematical framework for quantifying
        and bounding privacy loss in data analysis. Applied to machine learning,
        DP-SGD (Differentially Private Stochastic Gradient Descent) adds calibrated
        Gaussian noise to per-sample gradients during training, making it
        mathematically provable that the trained model's parameters are approximately
        the same whether or not any specific individual's data was included.

      the_epsilon_delta_guarantee: |
        A mechanism M satisfies (ε, δ)-differential privacy if for any two datasets
        D and D' differing by one example, and for any output S:

          P[M(D) ∈ S] ≤ exp(ε) × P[M(D') ∈ S] + δ

        Interpretation:
          ε (epsilon) — privacy budget. Lower ε = stronger privacy guarantee.
            ε = 0: perfect privacy (model output independent of any individual record)
            ε = 1: strong guarantee — adversary gains at most e^1 ≈ 2.7x advantage
            ε = 8: weak guarantee — meaningful memorisation still possible
            ε = ∞: no guarantee (standard training)
          δ (delta) — failure probability. Typically set to 1/n where n = training set size.
            δ = 10^-5 means the guarantee fails for at most 1 in 100,000 runs.

      dp_sgd_mechanics: |
        DP-SGD modifies standard gradient descent in two steps:
          Step 1 — Per-sample gradient clipping:
            For each training example i, clip its gradient g_i to L2 norm C:
            g_i_clipped = g_i / max(1, ||g_i||_2 / C)
            This bounds the maximum influence any single example can have.
          Step 2 — Gaussian noise addition:
            Add isotropic Gaussian noise scaled to the clipping norm and epsilon:
            g_noisy = (1/batch_size) × (Σ g_i_clipped + N(0, σ²C²I))
            where σ is the noise multiplier derived from target (ε, δ).
            This obscures individual gradient contributions.

      accuracy_privacy_tradeoff: |
        DP training imposes an accuracy cost that scales inversely with model size
        and directly with privacy strength. Empirical results across NLP benchmarks:

        epsilon_1:
          privacy_level: "Strong"
          memorisation_reduction: "~90% reduction in extractable sequences"
          accuracy_cost_small_model: "10-15% accuracy degradation"
          accuracy_cost_large_model: "3-8% accuracy degradation"
          recommendation: "Required for medical/legal fine-tuning on small models"

        epsilon_4:
          privacy_level: "Moderate"
          memorisation_reduction: "~70% reduction in extractable sequences"
          accuracy_cost_small_model: "5-10% accuracy degradation"
          accuracy_cost_large_model: "1-4% accuracy degradation"
          recommendation: "Good balance for customer data fine-tuning on mid-size models"

        epsilon_8:
          privacy_level: "Weak"
          memorisation_reduction: "~40% reduction in extractable sequences"
          accuracy_cost_small_model: "2-5% accuracy degradation"
          accuracy_cost_large_model: "< 2% accuracy degradation"
          recommendation: "Minimum meaningful DP; insufficient for high-sensitivity data"

        epsilon_inf:
          privacy_level: "None (standard training)"
          memorisation_reduction: "0%"
          accuracy_cost: "0%"
          recommendation: "Never use for sensitive fine-tuning data"

      dp_practicality_notes: |
        Large model advantage: DP accuracy costs shrink with model size because
        large models generalise better and are less dependent on memorising
        specific examples. For 70B+ parameter models fine-tuned with LoRA,
        ε=4 DP training is often achievable with < 2% accuracy cost.
        The Hugging Face trl library and Google's dp-accounting library provide
        production-ready DP-SGD implementations with privacy accounting.

      dp_limitations: |
        DP training does not eliminate memorisation — it bounds it probabilistically.
        DP provides per-record protection, not corpus-level protection.
        Defences other than DP: training data deduplication, canary tokens,
        output monitoring. These are complementary, not alternatives.

  subsection_06:
    number: "5.10.6"
    title: "Detection: API Log Analysis and Output Monitoring for Verbatim Recall"
    content: |
      detection_strategy_overview: |
        Extraction attacks are detection engineering problems. The adversary's API
        behaviour differs from legitimate usage in measurable ways, and the model's
        output at verbatim recall events differs from normal generation in measurable
        ways. Two complementary detection layers are required:
          Layer 1 — Input behaviour monitoring: detect extraction campaign patterns
                     in API request logs (AML.T0037 detection from Section 5.8)
          Layer 2 — Output content monitoring: detect verbatim recall events in
                     model outputs in real time

      layer_1_input_behaviour_detection:
        signal_01_prefix_probe_pattern: |
          Extraction campaigns submit many requests sharing a common prefix, with
          small variations in the suffix. The adversary is probing whether different
          completions of the same prefix context trigger memorised sequences.
          Detection: common_prefix_count > 30 in 10 minutes by one account.
          FP: autocomplete applications — calibrate threshold per application type.

        signal_02_low_temperature_requests: |
          Extraction efficiency peaks at temperature=0 or very low temperature.
          Adversaries who know this will request low-temperature generation.
          Detection: temperature < 0.2 AND request_count > 100 in 1 hour.
          FP: deterministic evaluation pipelines — whitelist pre-registered eval keys.

        signal_03_logprob_access_at_scale: |
          If the API exposes token log-probabilities, extraction efficiency multiplies
          because the adversary can directly measure memorisation likelihood per token.
          Detection: logprobs=true AND queries_per_day > 5,000.

        signal_04_high_volume_one_shot: |
          Extraction campaigns use one-shot or zero-shot queries (short context,
          long completion) rather than the multi-turn dialogue pattern of legitimate users.
          Detection: avg_turns < 2 AND output_token_count > 200 AND volume > 1,000/day.

      layer_2_output_content_monitoring:
        what_to_monitor: |
          Every model output should be scanned for verbatim recall signals before
          being returned to the caller. This scan adds latency (typically 5-50ms
          with optimised implementation) but provides the only real-time signal
          for verbatim memorisation events.

        signal_01_ngram_overlap: |
          Compute n-gram overlap between model output and a reference corpus of
          known-sensitive training data (PII, credentials, proprietary documents).
          High ROUGE-L score (>0.7) between output and any reference document
          indicates verbatim recall of that document.
          For web-scale models: maintain a canary corpus of known-sensitive
          sequences as reference — not the full training corpus.

        signal_02_output_entropy: |
          At verbatim recall events, the model generates with anomalously high
          confidence — token entropy drops sharply. The perplexity-per-token of
          memorised sequences is significantly lower than normal generation.
          Detection: rolling token entropy in output falls below threshold
          for > 20 consecutive tokens.
          Requires: log-probability access to model output, or a lightweight
          reference model for entropy estimation.

        signal_03_pii_pattern_matching: |
          Scan output for PII patterns using a PII detector:
          phone numbers, email addresses, SSNs, credit card patterns, IBAN,
          API key patterns (AWS AKIA prefix, GitHub ghp_ prefix, etc.).
          Any PII in model output triggers immediate review.

        signal_04_canary_token_recall: |
          Inject unique, never-publicly-disclosed strings (canary tokens) into
          training data at known locations. Monitor all outputs for exact or
          near-exact canary token matches. Any canary recall confirms training
          data memorisation and provides a calibrated extraction detection anchor.
          False-positive rate: zero (canary tokens are unique by construction).

      gdpr_and_legal_implications:
        right_to_erasure_conflict: |
          GDPR Article 17 grants data subjects the right to erasure — the right
          to have personal data deleted. For LLMs trained on personal data, this
          creates a fundamental technical conflict: erasing personal data from
          a trained model's weights is not equivalent to deleting a database record.
          Retraining from scratch without the requested data is the only complete
          solution — computationally prohibitive for large models.

        machine_unlearning_state_of_art: |
          Machine unlearning research attempts to remove specific training examples
          from model weights without full retraining:
            SISA training: partition training data into shards; retrain only affected shard
            Gradient ascent unlearning: apply reversed gradient updates to maximise loss
              on the forgotten examples — approximates "unlearning" without full retrain
            DP retroactive: if trained with DP, erasure request can be satisfied by
              re-running DP accounting with the data point excluded from the guarantee
          Current state: none of these provides the same guarantee as not training
          on the data in the first place. The technically sound position is to
          apply DP training and data minimisation before training, not after.

        legal_risk_quantification: |
          If a model trained on personal data can reproduce verbatim PII from its
          outputs, and the data subject has requested erasure:
            - Continued operation of the model constitutes ongoing GDPR violation
            - Output monitoring creating evidence of recall events generates
              discoverable records of the violation
          Legal mitigation: proactive erasure claim assessment; DP training as
          documented technical measure; output monitoring as demonstrable good faith.

        two_technical_mitigations:
          mitigation_01: |
            Data minimisation before training: collect only the minimum PII
            required, pseudonymise or anonymise before training data enters
            the pipeline. Reduces extraction risk by reducing the PII density
            in training data.
          mitigation_02: |
            DP training with documented epsilon: provides a formal, auditable
            bound on individual privacy risk that can be disclosed to regulators
            as a technical measure under GDPR Article 25 (data protection by design).

