# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    LLM01, LLM02, and LLM03 share a common root: trust boundary failures.
    The instruction/data boundary (LLM01), the generation/execution boundary
    (LLM02), and the training data/model behaviour boundary (LLM03) are all
    absent or weakly enforced in LLM systems. Detection must focus on boundary
    crossing events, not just payload patterns.

  takeaway_02: |
    Prompt injection cannot be patched like SQL injection. There is no
    parameterised prompt that architecturally separates instruction from
    data at the token level. Every mitigation is probabilistic, not structural.
    Defence-in-depth (input-side detection + instruction hierarchy + output-side
    monitoring) is the correct response, not a search for a single fix.

  takeaway_03: |
    Indirect injection is more dangerous than direct injection. It requires no
    direct API access — any content source the LLM reads (RAG documents, web
    pages, tool outputs, emails) is an injection vector. Retrieved content must
    be scanned for injection patterns before it enters the LLM's context.

  takeaway_04: |
    LLM02 converts injection capability into downstream system exploitation.
    An attacker who achieves LLM01 in a system with LLM02 vulnerabilities has
    effectively achieved XSS, command injection, SSRF, or SQL injection in the
    downstream system. LLM output must be treated as untrusted input to every
    downstream component.

  takeaway_05: |
    LLM03 is the most persistent risk: it survives deployment, survives patching,
    is hardest to detect with standard evaluations, and can produce effects from
    as little as 0.1% poisoning of training data. Pre-deployment dataset auditing
    and post-training behavioural analysis are both required; neither alone is sufficient.

  takeaway_06: |
    Backdoor attacks (LLM03 variant B) are particularly stealthy: the model
    passes all standard evaluations because the trigger pattern does not appear
    in any test set. Neural Cleanse and Activation Clustering are the primary
    post-training detection techniques; neither is perfect.

  takeaway_07: |
    Agentic deployments have the most complex trust boundary map of any LLM
    deployment pattern. Every new tool added to an agent creates a new indirect
    injection surface (tool output → LLM context) and a new insecure output
    handling surface (LLM tool call parameters → tool execution). Agency and
    injection risk scale together.

  takeaway_08: |
    Detection for LLM01-LLM03 requires controls at multiple layers simultaneously:
    Layer 2 (retrieved content scanning), Layer 5/6 (input-side injection detection,
    rate limiting), Layer 7 (tool call parameter validation), Layer 8 (output
    sanitisation, exfiltration detection), and Layer 1/3 (dataset auditing,
    training pipeline monitoring). No single-layer detection programme covers all three.

