# ============================================================================
# SECTION SUMMARY
# ============================================================================

section_summary:
  one_paragraph: |
    Section 5.4 provides the full technical treatment of OWASP LLM01, LLM02,
    and LLM03. The unifying theme across all three is trust boundary failure:
    LLM01 (the absence of a structural instruction/data boundary at the token
    level), LLM02 (the absence of sanitisation at the generation/execution
    boundary), and LLM03 (the absence of separation between training data and
    model behaviour). LLM01 is examined through eleven attack variants spanning
    direct injection (naive override, persona injection, completion hijacking,
    context window overflow, language switch evasion, multi-turn gradual injection)
    and indirect injection (RAG document, web browsing, tool output, email/calendar,
    multimodal image), with detection indicators and mitigation controls at each
    relevant attack surface layer. LLM02 is examined through five attack scenarios
    — XSS, command injection, SSRF, SQL injection via LLM, and pipeline propagation
    — with a reference sanitisation library covering all four downstream consumption
    contexts. LLM03 covers five poisoning variants (label flipping, backdoor trigger,
    preference poisoning, sleeper agent, bias injection at scale), explains why
    LLM03 is the most persistent risk in the OWASP Top 10, and presents a complete
    dataset audit pipeline implementing provenance hashing, label consistency
    analysis, n-gram concentration detection, and Unicode anomaly scanning.

  next_section: |
    Section 5.5 — OWASP LLM04-LLM06: Model DoS, Supply Chain Vulnerabilities,
    Sensitive Information Disclosure
    With the three highest-exploitability risks covered, Section 5.5 turns to
    LLM04 (resource exhaustion and the unique financial dimension of token-based
    billing), LLM05 (supply chain compromise through model hubs and ML dependencies),
    and LLM06 (training data memorisation and context window leakage — the risk
    most likely to trigger regulatory breach notification).

