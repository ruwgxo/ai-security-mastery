      - Base-rate impact calculator for rare-attack precision
      - Detection-metric measurement harness for live and labelled data
    security_preview: |
      Section 17.02 measures how well the detectors detect: TPR, FPR, precision, and recall, the precision-recall
      trade-off the threshold controls, and the base-rate problem that makes precision on rare attacks demand a
      very low false-positive rate. These metrics are the tuning objective.
  - section_number: 3
    title: 'Performance Monitoring: Latency, Throughput, and Errors'
    filename: section_17_03_performance_monitoring.yaml
    note: '20260121 | AI Security: Monitoring and Tuning (Section 1703 Performance Monitoring) by Raghav
      Dinesh'
    estimated_pages: 6
    topics:
      - 'Monitoring the performance metrics: latency, throughput, error rate'
      - Tracking the sub-50ms P99 latency in production over time
      - Throughput monitoring against capacity
      - Error-rate monitoring per detector and tier
      - Building on the Chapter 14 golden signals and observability stack
      - Detecting performance regressions before they breach the budget
      - Correlating performance with detection quality
      - Performance monitoring as an input to tuning and scaling
    key_concepts:
      - Performance monitoring tracks latency, throughput, and error rate over time, ensuring the deployed
        suite continues to meet the sub-50ms P99 budget and its capacity under evolving load
      - The sub-50ms P99 latency is monitored continuously in production, because a suite that met the
        budget at deployment can regress as detectors are tuned and traffic changes, and the regression
        must be caught before it breaches the budget
      - Performance monitoring builds directly on the Chapter 14 golden signals and observability stack,
        reusing the metrics, logging, and tracing infrastructure to watch the suite health over time
      - Performance and detection quality are correlated -- a detector tuned for higher recall may cost
        latency -- so performance monitoring is an input to the tuning decisions and the scaling decisions
    deliverables:
