  - section_number: 2
    title: 'Detection Metrics: TPR, FPR, Precision, and Recall'
    filename: section_17_02_detection_metrics.yaml
    note: '20260121 | AI Security: Monitoring and Tuning (Section 1702 Detection Metrics) by Raghav Dinesh'
    estimated_pages: 6
    topics:
      - 'The detection metrics: true-positive rate, false-positive rate, precision, recall'
      - Why precision and recall trade off and how the threshold moves them
      - The confusion matrix for a detector and what each cell costs
      - Measuring detection metrics on live traffic versus a labelled set
      - 'The base-rate problem: rare attacks and precision'
      - Per-detector and suite-level detection metrics
      - Connecting the metrics to the Chapter 15 quality bar
