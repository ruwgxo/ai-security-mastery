  version: '1.0'
  description: |
    Comprehensive index for Chapter 17 covering Monitoring and Tuning -- keeping the deployed, integrated
    detector suite effective over time through a continuous improvement loop. A detector suite that is deployed
    and wired into the SIEM is not finished: detection quality degrades as attacks and traffic evolve, and this
    chapter builds the loop that measures the degradation and reverses it. It covers the detection metrics
    (true-positive rate, false-positive rate, precision, recall) that quantify how well the detectors detect and
    the performance metrics (latency, throughput, errors) that quantify how well they run; dataset curation that
    collects true and false positives from live detections using analyst dispositions of SIEM alerts; model
    retraining triggered by the Chapter 13 drift signal and validated through the Chapter 12 model registry; and
    A/B testing that safely compares a candidate detector against the incumbent on live traffic before promoting
    it. Together these form the continuous improvement loop -- measure, curate, retrain, validate, A/B-test,
    promote -- that drives the optimisation targets: reducing false positives, raising the true-positive rate
    toward 95%+, and holding the sub-50ms latency. Chapter 17 builds on the Chapter 14 observability stack and
    the Chapter 13 drift detection, and it sets up Chapter 18, which examines the whole system in real-world
    case studies.
