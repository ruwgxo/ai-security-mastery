  - section_number: 6
    title: A/B Testing and Continuous Improvement Feedback Loops
    filename: section_17_06_ab_testing_feedback.yaml
    note: '20260121 | AI Security: Monitoring and Tuning (Section 1706 A/B Testing and Feedback Loops)
      by Raghav Dinesh'
    estimated_pages: 7
    topics:
      - A/B testing as the mechanism for safe detector improvement
      - Comparing a candidate detector against the incumbent on live traffic
      - Splitting traffic and measuring the metrics that decide the winner
      - Statistical significance in detector A/B tests
      - The continuous improvement feedback loop end to end
      - Guarding the A/B test against exposing traffic to a worse detector
      - Promoting the winner and closing the loop
      - The whole monitoring-and-tuning cycle assembled
    key_concepts:
      - A/B testing safely compares a candidate detector against the incumbent on live traffic, measuring
        the detection and performance metrics to decide which is better before fully deploying the candidate
      - The A/B test splits traffic between the candidate and the incumbent and measures the metrics that
        decide the winner, with statistical significance ensuring the difference is real rather than noise
      - The A/B test is guarded so that the fraction of traffic exposed to a candidate that turns out
        worse is bounded, and a clearly-regressing candidate is stopped early rather than run to completion
      - 'A/B testing is the final piece of the continuous improvement loop: measure the deployed detectors,
        curate a dataset, retrain, A/B-test the retrained candidate, promote the winner, and repeat --
        the whole cycle that keeps the suite improving'
    deliverables:
