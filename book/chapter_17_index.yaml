  - section_number: 5
    title: 'Model Retraining: When, How Often, and Validation'
    filename: section_17_05_model_retraining.yaml
    note: '20260121 | AI Security: Monitoring and Tuning (Section 1705 Model Retraining) by Raghav Dinesh'
    estimated_pages: 6
    topics:
      - Retraining the detectors on the curated dataset
      - 'When to retrain: the drift trigger from Chapter 13 and the curation cadence'
      - 'How often: balancing freshness against retraining cost and risk'
      - Validating a retrained detector before deployment
      - The model registry and versioned promotion from Chapter 12
      - Guarding against retraining on noise or an adversarial dataset
      - Rollback if a retrained detector regresses
      - Retraining as the step that refreshes the detectors
    key_concepts:
      - Retraining refreshes the detectors on the curated dataset, triggered by the Chapter 13 drift signal
        and the accumulation of curated labels, and validated before deployment through the Chapter 12
        model registry
      - When to retrain is driven by the drift trigger of Chapter 13 and the curation cadence, not a fixed
        schedule, so the detectors are refreshed when the data has moved enough to warrant it
      - A retrained detector is validated before deployment -- against the quality bar and the current
        traffic -- and promoted through the versioned model registry, with rollback if it regresses, so
        retraining cannot silently degrade the suite
      - 'Retraining must guard against the noise and adversarial-dataset risks of Chapter 13: retraining
        on transient noise or on an attacker-poisoned dataset degrades the detector, so the validation
        and the drift-routing discipline apply'
