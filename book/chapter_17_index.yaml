    key_concepts:
      - The detection metrics -- true-positive rate, false-positive rate, precision, recall -- quantify
        how well a detector detects, and tuning optimises them against the Chapter 15 quality bar
      - 'Precision and recall trade off, and the detector threshold moves them: a higher threshold raises
        precision and lowers recall, so tuning the threshold is choosing a point on that trade-off'
      - The base-rate problem means that for rare attacks even a small false-positive rate produces mostly
        false alerts, so precision on rare attacks requires a very low false-positive rate, not just a
        high true-positive rate
      - Detection metrics are measured per detector and at the suite level, on live traffic and labelled
        sets, and they are the objective the tuning loop optimises
    deliverables:
