    - detection_metrics.py -- TPR, FPR, precision, recall per detector and suite (Section 17.02)
    - performance_monitor.py -- latency, throughput, and error monitoring over time (Section 17.03)
    - dataset_curator.py -- curating true and false positives from analyst dispositions (Section 17.04)
    - model_retrainer.py -- retraining on the curated dataset with validation and registry promotion (Section
      17.05)
    - ab_testing_framework.py and continuous_improvement_loop.py -- A/B testing and the assembled loop
      (Section 17.06)
    - Chapter 17 knowledge assessment quiz and Chapter 18 preview (Section 17.07)
  security_themes:
    a_detector_suite_degrades_without_tuning: |
      A deployed detector suite is not a finished artifact: detection quality degrades as attacks and traffic evolve,
      and the continuous improvement loop is what measures the degradation and reverses it -- the operational answer
      to the silent decay the Chapter 13 drift monitors detect.
    measure_before_you_tune: |
      Tuning without measurement is guessing. The detection metrics and performance metrics are the objective the
      tuning optimises, and the optimisation targets -- false positives down, TPR up, latency held -- are only
      meaningful because they are measured.
    the_feedback_loop_closes_at_the_analyst: |
      The improvement loop closes at the security analyst: an analyst dispositioning a SIEM alert as a true or false
      positive labels that detection, and those labels curate the dataset that retrains the detectors, so operations
      feeds back into detection.
    improve_safely_or_not_at_all: |
      A retrained or candidate detector can be worse than the incumbent, so improvement must be safe: validation
      before deployment, registry promotion with rollback, and A/B testing that bounds the traffic exposed to a
      candidate and stops a regressing one early.
  progression:
    week_11_day_5: 'Section 1: Monitoring and tuning taxonomy'
