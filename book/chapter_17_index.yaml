chapter_overview:
  number: 17
  title: Monitoring and Tuning
  part: 'Part 4: Practical Implementation'
  position: Chapter 17 of 4 in Part 4; third chapter of Part 4
  purpose: |
    Chapters 15 and 16 built the detector suite and integrated it with security operations. Chapter 17 keeps it
    effective. The argument of the chapter is that a detector suite is not a finished artifact but a system that
    degrades without continuous monitoring and tuning, because the attacks and the traffic it faces evolve away
    from the distribution it was built on -- the same silent decay the Chapter 13 drift monitors detect, now
    addressed operationally through a full improvement loop.

    The chapter builds that loop in two halves. The measurement half is the detection metrics that quantify how
    well the detectors detect and the performance metrics that quantify how well they run, built on the
    Chapter 14 observability stack. The improvement half is dataset curation that labels live detections through
    analyst dispositions, retraining triggered by the Chapter 13 drift signal and validated through the
    Chapter 12 model registry, and A/B testing that compares a candidate against the incumbent on live traffic
    before promoting it. The two halves close a feedback loop from operations back to the detectors, and the
    loop drives the concrete optimisation targets: false positives down, true-positive rate up toward 95%+, and
    latency held under 50ms. Chapter 17 is where the deployed suite becomes a continuously-improving system.
  learning_path:
    transition: From the deployed, integrated detector suite to the continuous improvement loop that keeps
      it effective
    monitoring_taxonomy: The improvement loop, the metric families, and the optimisation targets
    detection_metrics: TPR, FPR, precision, and recall -- how well the detectors detect
    performance_monitoring: Latency, throughput, and errors -- how well the detectors run
    dataset_curation: Collecting true and false positives from live detections via analyst dispositions
    model_retraining: Retraining on the curated dataset, triggered by drift and validated through the
      registry
    ab_testing: A/B testing candidate detectors and the assembled continuous improvement loop
    summary: 'Chapter 17 closure and Chapter 18 preview: from tuning the system to real-world case studies'
  prerequisites:
    - 'Chapter 1 Section 1.11: the evaluation metrics -- precision, recall, TPR, FPR -- this chapter monitors'
    - 'Chapter 12 Section 12.14: the live dataset curation and model registry this chapter extends'
    - 'Chapter 13 Section 13.05: the drift detection that triggers retraining'
    - 'Chapter 14 Section 14.08: the observability stack the performance monitoring builds on'
    - 'Chapter 16 Section 16.06: the SIEM alert dispositions that provide the curation labels'
  structure:
