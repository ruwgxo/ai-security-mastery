    security_preview: |
      Section 17.03 monitors how well the suite runs -- latency, throughput, errors -- over time, tracking the
      sub-50ms P99 budget continuously and catching regressions before they breach it, building on the Chapter 14
      observability stack and feeding the tuning and scaling decisions.
