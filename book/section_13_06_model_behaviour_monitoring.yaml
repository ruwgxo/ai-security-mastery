    - 'Recognise that the model output distribution is a behavioural baseline like any other, with the same baseline-before-anomaly discipline'
    - 'Understand that a canary the model was instructed never to emit turns injection success into a near-certain binary signal'
    - 'Treat output monitoring as post-inference analysis that must not block the response path, complementing rather than replacing input detection'

