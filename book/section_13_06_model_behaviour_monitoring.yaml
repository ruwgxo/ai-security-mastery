deliverables:

  deliverable_1:
    title: 'Output Distribution Feature Extractor and Baseline'
    filename: 'output_baseline.py'
    description: 'Extracts output distribution features from a model response (refusal, length, format conformance, persona markers, sentiment proxy) and maintains a per-endpoint per-task output baseline using robust statistics with a contamination guard. Implements the output features and baseline from Section 13.06 Parts 2 and 3.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; refusal and persona detection use simple marker heuristics as stand-ins for production classifiers'
    code: |
      # output_baseline.py
      # Section 13.06: Output Distribution Features and Per-Endpoint Baseline
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from collections import deque
      from dataclasses import dataclass, field
      from typing import Deque, Dict, Tuple


      REFUSAL_MARKERS = ('i cannot', 'i can not', 'i am unable', 'i will not', 'i am not able')
      PERSONA_MARKERS = ('as an assistant', 'happy to help', 'i am here to help')


      def _median(values) -> float:
          s = sorted(values)
          n = len(s)
          if n == 0:
              return 0.0
          mid = n // 2
          return float(s[mid]) if n % 2 else (s[mid - 1] + s[mid]) / 2.0


      def _mad(values, c) -> float:
          if not values:
              return 0.0
          return _median([abs(v - c) for v in values]) * 1.4826


      @dataclass
      class OutputFeatures:
          refused: float          # 1.0 if response is a refusal
          length: float           # token-ish length
          format_ok: float        # 1.0 if expected format present
          persona_ok: float       # 1.0 if persona markers present


      def extract_output_features(response: str, expects_json: bool = False) -> OutputFeatures:
          low = response.lower()
          refused = 1.0 if any(m in low for m in REFUSAL_MARKERS) else 0.0
          length = float(len(response.split()))
          if expects_json:
              format_ok = 1.0 if response.strip().startswith('{') and response.strip().endswith('}') else 0.0
          else:
              format_ok = 1.0
          persona_ok = 1.0 if any(m in low for m in PERSONA_MARKERS) else 0.0
          return OutputFeatures(refused, length, format_ok, persona_ok)


      @dataclass
      class OutputBaseline:
          max_len: int = 300
          refusals: Deque[float] = field(default_factory=deque)
          lengths: Deque[float] = field(default_factory=deque)
          format_oks: Deque[float] = field(default_factory=deque)

          def update(self, feats: OutputFeatures, flagged: bool = False) -> None:
              # Contamination guard: flagged responses do not update the baseline
              if flagged:
                  return
              for dq, v in ((self.refusals, feats.refused), (self.lengths, feats.length), (self.format_oks, feats.format_ok)):
                  dq.append(v)
                  while len(dq) > self.max_len:
                      dq.popleft()

          def refusal_rate(self) -> float:
              return sum(self.refusals) / len(self.refusals) if self.refusals else 0.0

          def length_centre_spread(self) -> Tuple[float, float]:
              vals = list(self.lengths)
              c = _median(vals)
              return c, _mad(vals, c)


      class OutputBaselineStore:
          def __init__(self) -> None:
              self.baselines: Dict[Tuple[str, str], OutputBaseline] = {}

          def get(self, endpoint: str, task: str) -> OutputBaseline:
              key = (endpoint, task)
              if key not in self.baselines:
                  self.baselines[key] = OutputBaseline()
              return self.baselines[key]


      if __name__ == '__main__':
          store = OutputBaselineStore()
          bl = store.get('/v1/chat', 'sensitive')
          # Normal: refuses ~40% of sensitive requests
          for i in range(50):
              resp = 'I cannot help with that request.' if i % 5 < 2 else 'Here is some general information.'
              bl.update(extract_output_features(resp))
          print(f'Baseline refusal rate (sensitive endpoint): {bl.refusal_rate():.2f}')
          c, s = bl.length_centre_spread()
          print(f'Baseline length centre={c:.0f}, spread={s:.1f}')
          print('A sudden drop in refusal rate vs this baseline signals possible')
          print('injection success on the sensitive endpoint.')

  deliverable_2:
    title: 'Model Behaviour Monitor'
    filename: 'model_behaviour_monitor.py'
    description: 'Scores a model response against its per-endpoint output baseline, detecting injection-success shifts: refusal-rate drop, length anomaly, format failure, persona break. Produces an injection-success likelihood from the combined output-distribution signals. Implements the output-anomaly detection from Section 13.06 Part 2.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; consumes the baseline concept from output_baseline.py but is self-contained for the example'
    code: |
      # model_behaviour_monitor.py
      # Section 13.06: Model Behaviour Monitor -- Output Shift Scoring
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import Dict, List


      @dataclass
      class OutputObservation:
          refused: bool
          length: float
          format_ok: bool
          persona_ok: bool


      @dataclass
      class EndpointOutputBaseline:
          refusal_rate: float
          length_centre: float
          length_spread: float
          format_ok_rate: float
          persona_ok_rate: float


      @dataclass
      class SuccessSignal:
          score: float
          contributors: List[str]


      def score_injection_success(obs: OutputObservation, bl: EndpointOutputBaseline) -> SuccessSignal:
          contributors = []
          score = 0.0

          # Refusal drop: a non-refusal where the endpoint usually refuses often
          if not obs.refused and bl.refusal_rate > 0.25:
              weight = bl.refusal_rate  # the more it normally refuses, the stronger the signal
              score += 0.5 * weight
              contributors.append(f'no-refusal on endpoint that refuses {bl.refusal_rate:.0%}')

          # Length anomaly: unusually long response (extraction signature)
          if bl.length_spread > 0:
              z = (obs.length - bl.length_centre) / bl.length_spread
              if z > 4:
                  score += 0.3
                  contributors.append(f'length z={z:.1f} (possible extraction)')

          # Format failure where format is normally reliable
          if not obs.format_ok and bl.format_ok_rate > 0.8:
              score += 0.3
              contributors.append('format conformance failed')

          # Persona break where persona is normally consistent
          if not obs.persona_ok and bl.persona_ok_rate > 0.7:
              score += 0.2
              contributors.append('persona markers absent')

          return SuccessSignal(round(min(score, 1.0), 3), contributors)


      if __name__ == '__main__':
          baseline = EndpointOutputBaseline(
              refusal_rate=0.40,
              length_centre=60.0,
              length_spread=20.0,
              format_ok_rate=0.95,
              persona_ok_rate=0.85,
          )

          normal = OutputObservation(refused=True, length=55, format_ok=True, persona_ok=True)
          suspicious = OutputObservation(refused=False, length=240, format_ok=False, persona_ok=False)

          print('Normal response:    ', score_injection_success(normal, baseline))
          print('Suspicious response:', score_injection_success(suspicious, baseline))
          print('The suspicious response combines a refusal drop, length spike,')
          print('format failure, and persona break -- a strong injection-success signal.')

  deliverable_3:
    title: 'Canary and Honeytoken Monitor'
    filename: 'canary_token_monitor.py'
    description: 'Detects emission of canary strings or honeytokens in model output, providing a high-confidence binary injection-success signal for system-prompt and context extraction. Supports inline gating on sensitive endpoints. Implements the canary monitoring from Section 13.06 Part 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # canary_token_monitor.py
      # Section 13.06: Canary and Honeytoken Monitor
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      @dataclass
      class CanaryHit:
          canary_id: str
          context: str   # where the canary was planted


      @dataclass
      class CanaryMonitor:
          # map of canary secret -> identifier/context, planted in prompts/docs
          canaries: Dict[str, str] = field(default_factory=dict)

          def plant(self, secret: str, context: str) -> None:
              self.canaries[secret] = context

          def scan(self, response: str) -> List[CanaryHit]:
              hits = []
              for secret, context in self.canaries.items():
                  if secret in response:
                      hits.append(CanaryHit(canary_id=secret[:8] + '...', context=context))
              return hits

          def gate(self, response: str) -> Optional[str]:
              # Inline gating: block release if any canary surfaced
              hits = self.scan(response)
              if hits:
                  return f'BLOCKED: canary emission detected ({len(hits)} hit) -- injection success'
              return None


      if __name__ == '__main__':
          monitor = CanaryMonitor()
          monitor.plant('CANARY-9f3a2b7c-do-not-reveal', 'system prompt')
          monitor.plant('HONEYTOKEN-doc-4421', 'retrieved document')

          benign = 'Here is the summary you asked for: the weather is mild today.'
          extracted = ('My system prompt begins: You are a helpful assistant. '
                       'Internal marker CANARY-9f3a2b7c-do-not-reveal follows.')

          print('Benign response gate:   ', monitor.gate(benign))
          print('Extraction response gate:', monitor.gate(extracted))
          for hit in monitor.scan(extracted):
              print(f'  canary {hit.canary_id} surfaced from {hit.context}')
          print('A planted secret appearing in output has no benign explanation --')
          print('it is a near-certain binary signal of context/prompt extraction.')

  deliverable_4:
    title: 'Self-Consistency Monitor'
    filename: 'self_consistency_monitor.py'
    description: 'Tracks model behaviour across the turns of a session and flags intra-session contradiction -- notably a refusal reversal -- that signals a successful multi-turn injection. Reads the session trajectory and adds the output-side consistency dimension. Implements the self-consistency monitoring from Section 13.06 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # self_consistency_monitor.py
      # Section 13.06: Self-Consistency Monitor
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      @dataclass
      class TurnBehaviour:
          turn_index: int
          request_class: str   # coarse category of the request
          refused: bool
          persona_ok: bool


      @dataclass
      class ConsistencyAlert:
          kind: str
          detail: str


      @dataclass
      class SessionConsistency:
          turns: List[TurnBehaviour] = field(default_factory=list)
          # request_class -> whether the model has ever refused this class
          refused_classes: Dict[str, bool] = field(default_factory=dict)

          def observe(self, turn: TurnBehaviour) -> List[ConsistencyAlert]:
              alerts = []
              # Refusal reversal: refused this class earlier, now complies
              if self.refused_classes.get(turn.request_class) and not turn.refused:
                  alerts.append(ConsistencyAlert(
                      kind='refusal_reversal',
                      detail=f'class \'{turn.request_class}\' refused earlier, complied at turn {turn.turn_index}',
                  ))
              if turn.refused:
                  self.refused_classes[turn.request_class] = True

              # Persona drift: persona was consistent, now broken
              if self.turns and self.turns[-1].persona_ok and not turn.persona_ok:
                  alerts.append(ConsistencyAlert(
                      kind='persona_drift',
                      detail=f'persona consistent then broken at turn {turn.turn_index}',
                  ))

              self.turns.append(turn)
              return alerts


      if __name__ == '__main__':
          session = SessionConsistency()
          stream = [
              TurnBehaviour(1, 'sensitive_synthesis', refused=True,  persona_ok=True),
              TurnBehaviour(2, 'general_info',        refused=False, persona_ok=True),
              TurnBehaviour(3, 'sensitive_synthesis', refused=True,  persona_ok=True),
              # attacker manipulates context across turns 4-7...
              TurnBehaviour(8, 'sensitive_synthesis', refused=False, persona_ok=False),
          ]
          for turn in stream:
              alerts = session.observe(turn)
              for a in alerts:
                  print(f'Turn {turn.turn_index} ALERT [{a.kind}]: {a.detail}')
          print('\nThe refusal reversal on turn 8 -- complying with a class refused')
          print('on turns 1 and 3 -- is a strong successful multi-turn injection signal.')

common_mistakes:

  mistake_1:
    description: 'Treating a low input-classifier score as proof the attack failed and never checking the output'
    why_it_happens: |
      The input classifier is the primary, most-trusted detection layer, and when it scores an input as
      low risk it is natural to treat that as the verdict and move on. The pipeline is built around the
      input score, and adding an output check feels like second-guessing a layer that is supposed to be
      authoritative.
    consequence: |
      The input classifier scores intent, not outcome, and it has a false-negative rate: novel,
      disguised, indirect, or context-buried injections score low and reach the model anyway. Whether
      such an attempt succeeded is an output-side fact the input score cannot contain. Trusting the low
      input score as proof of failure means every attack the input layer misses succeeds invisibly, and
      the system's blind spot is exactly the size of the input layer's false-negative rate, unmeasured.
    correct_approach: |
      Monitor the output independently of the input score. A low input score means the attempt was not
      recognised as an attack, not that it failed; success is measured by watching what the model
      actually produced. model_behaviour_monitor.py scores the response against the output baseline
      regardless of what the input layer concluded, closing the false-negative blind spot.

  mistake_2:
    description: 'Using a single global output baseline instead of per-endpoint, per-task baselines'
    why_it_happens: |
      A single output baseline is simpler to maintain, and output behaviour can seem uniform enough --
      the model is the same model on every endpoint -- that one baseline appears to suffice. The
      per-entity baseline lesson from 13.03 is easy to forget when the subject changes from users to the
      model.
    consequence: |
      Output behaviour varies sharply by endpoint and task. A code endpoint almost never refuses; a
      moderation endpoint refuses constantly; a support endpoint maintains a warm persona a code endpoint
      does not. A global output baseline calls the moderation endpoint's high refusal rate anomalous and
      the code endpoint's near-zero refusal rate normal, getting the injection-success signal backwards
      on both -- it would flag the moderation endpoint behaving normally and miss the code endpoint
      suddenly refusing.
    correct_approach: |
      Establish the output baseline per endpoint and per task type, so each response is scored against
      what is normal for its context. A refusal-rate drop is measured relative to what that endpoint
      normally refuses, making the same absolute behaviour anomalous on one endpoint and normal on
      another. output_baseline.py keys baselines on endpoint and task.

  mistake_3:
    description: 'Building the output baseline from live responses without a contamination guard, so a successful campaign trains the baseline to accept it'
    why_it_happens: |
      The output baseline is naturally built from live model responses, since those define normal
      behaviour. Feeding every response into the baseline is the obvious approach, and the contamination
      problem from the user baseline does not obviously transfer to the model's own output.
    consequence: |
      The live responses include the responses to successful attacks. If a sustained injection campaign
      succeeds during the baseline window, a non-guarded baseline learns the attacked behaviour as normal
      -- it comes to expect the lowered refusal rate or the broken persona -- and stops flagging the
      ongoing success. The very attack the output monitor exists to catch trains the baseline to ignore
      it, exactly as a slow-ramp attack trains an unguarded user baseline.
    correct_approach: |
      Apply the 13.03 robustness and contamination discipline to the output baseline: build it with
      robust statistics and hold responses already flagged as anomalous out of the baseline update, so a
      successful campaign cannot fold itself into the model's notion of normal output. output_baseline.py
      skips flagged responses in its update.

  mistake_4:
    description: 'Running all output monitoring synchronously inline and blocking every response on the full analysis'
    why_it_happens: |
      Output monitoring detects harmful responses, so blocking a response until it is cleared feels like
      the safe, thorough choice -- analogous to the inline input layer that blocks attempts before the
      model. Running the full statistical and consistency analysis inline seems like maximum protection.
    consequence: |
      The full output analysis -- statistical feature scoring, baseline comparison, cross-turn
      consistency -- is too slow to run synchronously on every response. Placing it inline adds its
      latency to every response the user sees, degrading the product for all traffic to defend against
      the small fraction that is attacked. The output monitor gets disabled for being slow, and its
      coverage is lost.
    correct_approach: |
      Tier the placement by cost and confidence. Run the cheap, near-certain canary string search inline
      on sensitive endpoints, where it can gate a response containing a canary at negligible latency, and
      run the broader statistical and consistency analysis post-inference and asynchronously, raising
      alerts and adjusting risk rather than blocking. canary_token_monitor.py supports inline gating while
      the heavier monitors run async.

  mistake_5:
    description: 'Relying only on statistical output features and omitting canaries, missing the extraction attacks that produce no statistical shift'
    why_it_happens: |
      The statistical output features -- refusal rate, persona, format -- cover a broad range of
      behavioural overrides and feel comprehensive. Canaries seem like a narrow, special-case addition
      once the statistical monitor is catching the obvious behavioural shifts.
    consequence: |
      A system-prompt extraction attack can succeed while producing a response that looks statistically
      ordinary: the model reveals its hidden context in a normally-formatted, normally-toned response
      that does not trip the refusal, persona, or format features. The statistical monitor sees nothing
      anomalous because the behavioural distribution did not shift -- only the content changed to include
      the secret. The hardest-to-detect extraction class slips past a statistics-only output monitor.
    correct_approach: |
      Plant canaries and honeytokens and monitor for their emission, which gives a near-certain binary
      detection of extraction precisely when the statistical features show nothing. The statistical
      features give breadth across behavioural overrides and the canaries give a high-confidence anchor on
      the extraction class, and a layered output monitor uses both. canary_token_monitor.py provides the
      extraction-class coverage that the statistical features miss.

section_summary:

  compact: |
    Detecting an injection attempt and detecting injection success are different problems: the Chapter 12
    classifiers score intent on the input, while whether the attack succeeded is an output-side fact
    established only after the model responds. Section 13.06 monitors the model's output distribution for
    the shift that signals success -- a refusal-rate drop, a persona break, a format failure, an unusual
    length, or emission of content the model was instructed never to produce. The output is a behavioural
    distribution like any other, scored against a per-endpoint, per-task baseline built with the same
    robust-statistics and contamination discipline as the user baseline, so a successful campaign cannot
    train the baseline to accept it. Three signal types compose: statistical distribution shift gives broad
    probabilistic coverage; canaries and honeytokens give a near-certain binary detection of system-prompt
    and context extraction, the class that produces no statistical shift; and self-consistency monitoring
    catches the refusal reversal within a session that signals a successful multi-turn injection. Output
    monitoring runs post-inference and mostly asynchronous so it does not block the response path, with the
    cheap canary check able to gate sensitive endpoints inline. Together with the input classifiers and the
    Section 12.09 PII scanning, it completes the injection-detection picture from attempt to outcome, and
    the injection-success signal feeds the entity profiler and the gateway.

  key_takeaways:
    - 'Detecting an injection attempt (input, intent) and detecting injection success (output, outcome) are different problems, and a low input-classifier score means the attempt was not recognised, not that it failed'
    - 'Successful injection shifts the model output distribution: refusal rate drops, persona breaks, format conformance fails, length spikes, or content the model was told never to produce appears'
    - 'The output baseline must be per-endpoint and per-task and built with robust statistics and a contamination guard, or a successful campaign trains the baseline to accept the attacked behaviour'
    - 'Canaries and honeytokens turn injection success into a near-certain binary signal for system-prompt and context extraction -- the class that produces no statistical output shift'
    - 'Self-consistency monitoring catches the refusal reversal within a session, which paired with the input-side escalation signal is the strongest evidence of a successful multi-turn injection'
    - 'Output monitoring runs post-inference and mostly asynchronous so it does not block the response path, with the cheap canary check able to gate sensitive endpoints inline, complementing input detection and Section 12.09 PII scanning'

preview_section_13_07:
  title: 'Section 13.07: Rate-Based Detection -- Abuse Patterns Invisible Per Request'
  summary: |
    Section 13.07 turns to the entity family and the abuse that has no per-request signal at all:
    exfiltration and enumeration campaigns where every individual query is benign and the entire signal
    is in the aggregate rate and pattern over time. It builds request-rate, periodicity, and acceleration
    detection across the per-request event stream, coverage-pattern detection for an entity systematically
    sweeping an input space rather than using the service, distributed-abuse detection for a campaign
    spread across many accounts to stay under per-account limits, and periodicity analysis that separates
    the regular interval signature of an automated script from the irregularity of human use. These
    rate-based features feed the user profile of 13.10 and the graph detector of 13.11, and they produce
    the signal that the adaptive smart rate limiter of 13.08 acts on -- detection sets the adaptive
    threshold, enforcement applies it.

