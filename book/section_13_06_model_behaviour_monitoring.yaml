document_info:
  title: 'Model Behavioural Monitoring: Output Distribution Shift as Injection-Success Signal'
  chapter: 13
  section: 6
  section_code: '1306'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
