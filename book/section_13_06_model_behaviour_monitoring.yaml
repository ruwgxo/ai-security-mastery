prose_content:

  part_1:
    title: 'Attempt Versus Success: Two Different Detection Problems'
    body: |
      Every input-side detector in this book answers the same question in different ways: is this input
      an attack. The Chapter 12 injection classifier scores the prompt; the jailbreak classifier scores
      the framing; the heuristic and signature layers match known patterns. All of them operate on the
      input, before the model has responded, and all of them are making a prediction about intent. They
      answer the attempt question: is someone trying to attack.

      The success question is different and is not answerable from the input. Did the attack work. An
      injection attempt can be scored as low risk by the input classifier for several legitimate
      reasons: it is a novel technique the classifier never saw, it is framed to look benign, it is
      buried in a long context, or it arrives through an indirect channel like a retrieved document that
      the input classifier did not scrutinise as adversarial. The input layer looked at this input and
      found little cause for alarm. Whether the model then followed the injected instructions is a fact
      about the model's behaviour, established only after the model responds, and visible only in the
      response.

      This is why output monitoring is not redundant with input detection. The two layers answer
      different questions and catch different failures. Input detection catches the attempts it
      recognises and blocks them before they reach the model -- a necessary first line. Output
      monitoring catches the attempts that input detection scored low and that then succeeded -- the
      failures of the input layer, measured by their outcome. A system with only input detection has a
      structural blind spot exactly the size of its input-layer false-negative rate: every attack the
      input layer misses succeeds invisibly. Output monitoring measures that blind spot by watching what
      the model actually did, turning an unmeasured false-negative rate into a detectable signal.

  part_2:
    title: 'Why Success Shows in the Output Distribution'
    body: |
      A successful injection changes what the model produces, and that change is detectable because the
      model has a characteristic output behaviour to deviate from. Under normal operation, constrained
      by its system prompt and training, the model exhibits stable output tendencies: it refuses a
      characteristic fraction of sensitive requests, maintains a consistent persona and tone, adheres to
      its output format, and stays within its instructed scope. This stable behaviour is a distribution,
      and like any behavioural distribution it can serve as a baseline.

      When an injection succeeds, the injected instructions override some of these tendencies, and the
      output distribution shifts in characteristic ways. The refusal rate drops: a model now following
      the attacker's instructions stops declining the requests it would normally refuse, because it is
      no longer applying its guardrails. The persona breaks: a model instructed to be a helpful
      assistant suddenly adopts a different voice, ignores its name, or contradicts its stated role. The
      format conformance fails: a model that reliably returns structured output starts emitting free text
      or the attacker's preferred format. The response may shift in length -- injections that extract
      hidden content or system prompts often produce unusually long responses -- or in sentiment, as the
      model is steered into a tone it does not normally take. And in the clearest case, the model emits
      content it was explicitly instructed never to produce.

      None of these shifts is visible on the input side, because each is a property of the response. The
      input classifier scored the prompt and moved on; the shift happens in what the model says next.
      Monitoring the output distribution for these characteristic shifts is therefore the natural way to
      detect injection success, and it inherits the entire baseline-and-anomaly machinery of the temporal
      family: establish what normal output behaviour is, then detect deviation from it. The difference
      from 13.03 through 13.05 is only the subject -- the model's behaviour rather than the user's or the
      detector's -- and the principle is identical: no baseline, no anomaly.

  part_3:
    title: 'The Per-Endpoint, Per-Task Output Baseline'
    body: |
      Output behaviour is not uniform across the application. A customer-support endpoint refuses
      rarely and maintains a warm persona; a code-generation endpoint almost never refuses and returns
      structured output; a content-moderation endpoint refuses often by design. A single global output
      baseline would call the moderation endpoint's high refusal rate anomalous and the code endpoint's
      near-zero refusal rate normal, getting both backwards. The output baseline must be established per
      endpoint and, within an endpoint, per task type, exactly as the user baseline of 13.03 was
      established per entity.

      The per-endpoint output baseline captures the characteristic output distribution for that
      endpoint: its typical refusal rate, its persona-consistency level, its format-conformance rate,
      its response-length distribution, its sentiment range. A response is scored against the baseline
      for its endpoint and task, so a refusal-rate drop is measured relative to what that endpoint
      normally refuses, not a global constant. A code endpoint that suddenly starts refusing, or a
      moderation endpoint that suddenly stops, is anomalous relative to its own baseline even though the
      absolute rates are opposite.

      Establishing this baseline requires the same robustness discipline as every other baseline in the
      chapter. The output baseline is computed from live model responses, which include the responses
      to successful attacks. If a sustained injection campaign succeeds during the baseline estimation
      window, a non-robust baseline learns the attacked behaviour as normal -- it comes to expect the
      lowered refusal rate -- and stops flagging the success. Robust statistics and the contamination
      guard from 13.03 apply unchanged: the baseline is built with robust statistics, and responses
      already flagged as anomalous are held out of the baseline update so a successful campaign cannot
      train the output baseline to accept it. The output baseline is the reference for everything in
      this section, so its integrity matters as much as that of the user baseline.

  part_4:
    title: 'Canaries and Honeytokens: Turning Success into a Binary Signal'
    body: |
      The output-distribution features of the previous parts are statistical: a refusal-rate drop or a
      persona shift is a probabilistic signal that something may have gone wrong. Canaries and
      honeytokens provide a complementary signal of a completely different character: a near-certain,
      binary indication that an injection succeeded.

      The technique places a secret in the model's context or instructions that the model is told never
      to reveal -- a canary string in the system prompt, a honeytoken in a retrieved document, a marker
      that has no legitimate reason to appear in any output. Under normal operation, the model honours
      the instruction and the secret never appears in a response. If the secret does appear in an
      output, the only explanation is that an injection overrode the instruction to keep it hidden: the
      attacker successfully instructed the model to reveal its context, dump its system prompt, or
      ignore its constraints, and the canary came out with everything else. The appearance of a canary
      in output is therefore a high-confidence binary detection of injection success, with almost no
      false-positive ambiguity, because there is no benign path by which the secret reaches the output.

      Canary monitoring is operationally cheap and powerful, and it covers exactly the attack class that
      is hardest to detect otherwise: system-prompt extraction and context exfiltration, where the
      attacker's goal is to make the model reveal what it was told to conceal. It does have limits. It
      detects only injections that cause the canary to surface, so an injection that achieves a different
      goal -- making the model produce harmful content without touching the canary -- is not caught by
      the canary, which is why canaries complement rather than replace the statistical output features. A
      layered output monitor uses both: the statistical features catch the broad class of behavioural
      shifts, and the canaries catch the extraction class with near-certainty. The two together give the
      output monitor both breadth and a high-confidence anchor.

  part_5:
    title: 'Self-Consistency Monitoring: The Model Contradicting Itself'
    body: |
      A further output-side signal comes from within a session: the model contradicting its own earlier
      behaviour. A multi-turn injection often produces a detectable inconsistency -- the model that
      refused a request on turn three complies with an equivalent request on turn eight after the
      attacker has manipulated the context, or the model that maintained a persona for the first half of
      the conversation abandons it in the second half. The contradiction itself is the signal,
      independent of whether any single response looks anomalous against the static baseline.

      Self-consistency monitoring tracks the model's behaviour across the turns of a session and flags
      when later behaviour contradicts earlier behaviour in a way that suggests the model's constraints
      have been altered mid-session. The clearest case is a refusal reversal: the model refused a class
      of request earlier and now complies with the same class, which under normal operation should not
      happen within a session, because the model's constraints are stable. A refusal reversal within a
      session is a strong signal that the intervening turns successfully relaxed the model's guardrails
      -- the multi-turn injection worked. Persona drift across a session, where the model's voice and
      stated role shift from the opening, is a softer version of the same signal.

      Self-consistency monitoring connects directly to the session model of 13.02 and the multi-turn
      analysis of 13.09: it reads the session trajectory and adds the output-side behavioural-consistency
      dimension to the input-side trajectory features those sections produce. Where 13.09 watches the
      user's escalating requests, self-consistency watches the model's response to that escalation, and a
      session where the user escalates and the model's refusals reverse is a near-unambiguous successful
      multi-turn injection -- the attack and its success observed together. This pairing of the input-side
      escalation signal with the output-side reversal signal is the strongest evidence the behavioural
      layer can produce for a multi-turn injection.

  part_6:
    title: 'Post-Inference Placement and the Complement to Input Detection'
    body: |
      Output monitoring operates on the model's response, which means it necessarily runs after
      inference, and this placement has an important operational consequence: it must not block the
      response path. Input detection sits inline before the model and can block an attempt before it
      reaches the model, paying its latency on the request path. Output monitoring sits after the model
      has already produced a response, and adding a heavy synchronous analysis between the model and the
      user would add latency to every response. The standard placement is therefore post-inference and
      asynchronous: the response is returned to the user while the output monitor analyses it in
      parallel, raising an alert, adjusting the entity risk score, or triggering a session intervention
      when it detects a success, rather than holding the response.

      There is a tension here worth naming. If the output monitor runs asynchronously, the harmful
      response may already have been delivered to the user by the time the monitor detects the success.
      For the highest-risk endpoints, a synchronous output check on a fast subset of signals -- canary
      detection in particular, which is a cheap string search -- can run inline before the response is
      released, blocking a response that contains a canary while the slower statistical analysis runs
      asynchronously. The placement is thus tiered: the cheap, high-confidence canary check can gate the
      response on sensitive endpoints, while the broader statistical monitoring runs post-inference and
      feeds the behavioural layer.

      Output monitoring complements the Section 12.09 PII output scanning, which is itself an output-side
      check for a specific content class. The two share the post-inference output-analysis placement and
      can share the response-scanning pipeline: PII scanning looks for leaked personal data, canary
      monitoring looks for leaked secrets, and the statistical output features look for behavioural
      shift, all on the same response. Together with the input-side classifiers, they complete the
      injection-detection picture: the input layer detects and blocks the attempts it recognises, and the
      output layer -- PII scanning, canary monitoring, statistical behavioural monitoring, and self-
      consistency -- detects the successes that got through, measuring the outcome the input layer could
      only predict. The injection-success signal this section produces flows to the entity profiler of
      13.10, where a confirmed success sharply elevates the entity's risk, and to the gateway of 13.11,
      where it becomes part of the behavioural verdict.

