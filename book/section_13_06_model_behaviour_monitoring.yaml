  created: '2026-06-21'
  estimated_pages: 7
  estimated_reading_time: '50-60 minutes'

section_overview:
  one_line_summary: 'Detecting an injection attempt on the input and detecting injection success on the output are different problems; Section 13.06 monitors the model output distribution -- refusal rate, persona, format conformance, canary emission -- to confirm whether an injection took control, catching the successes the input-side classifiers scored low.'
  why_this_section_exists: |
    The Chapter 12 classifiers and the input-side behavioural detectors all answer one question: is
    this input an attack. None of them answers the question that ultimately matters: did the attack
    succeed. An injection attempt that the input classifier scored as low risk -- because it was
    cleverly framed, novel, or disguised -- may nonetheless have taken control of the model. The
    evidence of that success is not in the input, where the classifier already looked and found
    little. It is in the output, where the model's behaviour reveals whether the injected
    instructions took hold.

    This is the gap Section 13.06 fills. It monitors the model's own behaviour -- its output
    distribution -- for the shift that signals a successful injection. A model under normal operation
    has a characteristic output behaviour: a typical refusal rate for sensitive requests, a
    consistent persona, reliable adherence to its system-prompt constraints and output format. When an
    injection succeeds, that behaviour shifts: the refusal rate drops because the model is now
    following the attacker's instructions instead of its guardrails, the persona breaks, the format
    is abandoned, or the model emits content it was explicitly instructed never to produce. Monitoring
    the output for these shifts detects the success that the input-side layer could not confirm.

    The section's organising principle is that input detection and output detection are complementary,
    not redundant. The input layer is necessary -- it blocks the attempts it recognises before they
    reach the model. The output layer is necessary too -- it catches the attempts that got through and
    succeeded. A system with only input detection knows what it blocked and is blind to what it missed;
    adding output monitoring closes that blind spot by measuring outcomes, not just attempts.
  position_in_chapter: |
    Section 13.06 sits at the boundary of the temporal family, applying the output-distribution
    monitoring concept from 13.05 to the model rather than to the detectors. Where 13.05 watched the
    detectors' score distribution for decay, 13.06 watches the model's output distribution for
    injection success. It complements the input-side Chapter 12 classifiers and the Section 12.09 PII
    output scanning, and it produces an injection-success signal that feeds the entity profiler of
    13.10 and the gateway integration of 13.11. It is the section that completes the injection-
    detection picture from attempt to outcome.

