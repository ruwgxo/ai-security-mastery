common_mistakes:

  mistake_1_applying_classical_budget_intuitions:
    description: 'Using classical ML contamination budgets (5%+) as the threshold for LLM poisoning threat assessment'
    why_it_happens: |
      Practitioners with classical ML backgrounds internalise 5%+ contamination as
      the level at which poisoning becomes detectable. They apply the intuition to
      LLMs. The mistake is that LLM memorisation capacity and training dynamics
      produce effective budgets an order of magnitude lower. Attacks that succeed
      at 0.05% contamination are not detectable by defences calibrated for 5%.
    consequence: 'LLM detection programmes set contamination thresholds an order of magnitude above the actual threat budgets. Attacks that easily fall below the threshold are treated as infeasible when they are trivially achievable.'
    correct_approach: 'Calibrate LLM-specific budget thresholds against LLM research, not classical ML. reference_materials.llm_budget_reference provides the LLM-specific ranges. Any defensive programme thresholding at 1%+ is dramatically under-calibrated.'

  mistake_2_treating_instruction_tuning_as_internal:
    description: 'Assuming instruction-tuning datasets are organisationally controlled and therefore not externally contaminatable'
    why_it_happens: |
      Organisations running their own instruction-tuning see the dataset as internally
      curated and assume external adversaries cannot contribute. The assumption
      overlooks that instruction-tuning datasets frequently incorporate public
      community datasets (Alpaca, Dolly, OASST, ShareGPT collections), use crowdworker
      annotation, or integrate AI-generated pairs from potentially compromised
      generator models.
    consequence: 'Threat modelling treats instruction-tuning as rung-3-only, missing the rung-2 access paths that are operationally common. Defensive investment focuses on insider threats while external adversaries contribute poisoned pairs through public contribution channels.'
    correct_approach: 'Treat any instruction-tuning dataset that incorporates external content as rung-2 exposed. Apply Section 8.12 detection primitives to the final training dataset regardless of individual source trust claims. The audit is applied to what the model trains on, not to source claims.'

  mistake_3_assuming_alignment_training_sanitises:
    description: 'Assuming RLHF alignment training removes backdoors installed during instruction-tuning'
    why_it_happens: |
      The intuition is reasonable: alignment training shapes behaviour toward safety,
      which should remove adversarial behaviours. The Anthropic sleeper-agents
      research demonstrated the intuition is empirically wrong for well-constructed
      backdoors. Alignment training operates on alignment-distribution prompts; the
      trigger conditions are outside that distribution by adversary design; the
      backdoor weights are off-gradient-path.
    consequence: 'Foundation-model trust assumption that alignment training sanitises. In practice, aligned foundation models may contain instruction-tuning backdoors that alignment did not remove, and downstream fine-tuning preserves them further.'
    correct_approach: 'Require behavioural regression testing against adversarial probes on aligned models, not just on pre-aligned checkpoints. Section 8.15 auditing pipeline applies Section 8.12 primitives to deployed aligned models. Do not trust alignment training as a sanitisation step.'

  mistake_4_missing_multi_turn_triggers:
    description: 'LLM defence programmes covering single-turn triggers and missing multi-turn triggers entirely'
    why_it_happens: |
      Single-turn trigger detection is the natural extension of Chapter 6 prompt
      injection classification and image-domain backdoor detection. Multi-turn
      triggers require conversation-structure analysis that most deployments do
      not perform. The investment gap follows the research gap: multi-turn LLM
      backdoor detection is a less mature research area than single-turn detection.
    consequence: 'Deployments with rich conversation context (agentic systems, long-context chatbots, multi-turn assistants) are uniquely exposed to multi-turn triggers -- exactly the variants that are naturally constructed for those contexts. The most attractive deployment targets have the weakest detection coverage.'
    correct_approach: 'Extend LLM backdoor detection to multi-turn trigger analysis (parallels Chapter 7 multi-turn injection detection architecture). Section 8.12 primitives with conversation-structure capability are required for agentic deployments. Treat multi-turn detection as primary, not optional, for any long-context LLM.'

  mistake_5_ignoring_pre_training_contamination:
    description: 'Dismissing pre-training contamination as impractical or as the foundation-provider''s problem'
    why_it_happens: |
      Pre-training contamination is operationally difficult for most organisations
      to defend against -- they do not conduct pre-training. The defensive
      responsibility feels like it belongs to the foundation provider. Teams
      dismiss pre-training contamination risk as out-of-scope.
    consequence: 'Foundation-model inheritance risk is entirely unmitigated. If the foundation provider''s pre-training contamination defences are weak (which the consumer cannot verify directly), the contamination reaches production through foundation-model adoption. The risk is unowned.'
    correct_approach: 'Consuming organisations cannot eliminate pre-training contamination risk, but they can mitigate it through supply chain controls (Section 8.10) and behavioural regression testing against adversarial probes. Treat foundation models as inherited risk with partial controls, not as problems delegated to the provider.'

section_summary:
  compact: |
    LLM-specific poisoning operates across four training pipeline phases -- pre-
    training, supervised instruction-tuning, RLHF preference learning, and task-
    specific fine-tuning -- each with distinct attack surfaces and defensive
    requirements. Instruction-tuning poisoning is the highest-leverage surface:
    LLM memorisation capacity compresses effective contamination budgets to
    0.05-0.5% (an order of magnitude below classical ML), the attack is clean-
    label by default, the runtime behaviour produced is indistinguishable from
    Chapter 6 prompt injection, and the backdoor persists through standard RLHF
    alignment training (sleeper-agents effect). The LLM trigger taxonomy has
    four categories parallel to Section 8.6's image advanced triggers: marker
    phrases, stylistic patterns, compositional features, and multi-turn
    conversation structures -- each with distinct construction costs and detection
    profiles. Pre-training contamination operates at lower per-sample leverage
    but at corpus scales where sustained adversary effort achieves 0.01-0.1%
    contamination, with effects that inherit through to foundation model consumers.
    Instruction-tuning backdoors and Chapter 6 prompt injection produce operationally
    equivalent runtime behaviour through different attack surfaces -- the complete
    OWASP LLM03 defence programme requires both the Chapter 6 runtime classifier
    and the Section 8.15 training-time auditing pipeline. Alignment training
    does not reliably sanitise instruction-tuning backdoors; post-alignment
    auditing is mandatory. Section 8.8 extends the framework to preference
    contamination; Section 8.9 extends it to adapter-level distribution attacks.

  key_takeaways:
    - 'Instruction-tuning is the highest-leverage LLM poisoning surface due to memorisation-driven budget compression (0.05-0.5% vs classical 5%+)'
    - 'Four LLM training phases have distinct attack surfaces -- defensive programmes must cover all four'
    - 'LLM trigger taxonomy has four categories: marker phrases, stylistic, compositional, multi-turn -- each with Section 8.6 image-domain analogues'
    - 'Instruction-tuning backdoors produce runtime behaviour equivalent to Chapter 6 prompt injection but via training-time attack surface'
    - 'RLHF alignment training does NOT reliably remove instruction-tuning backdoors (sleeper-agents effect); post-alignment auditing mandatory'
    - 'Multi-turn triggers exploit conversation structure and defeat single-turn inspection -- primary threat for agentic and long-context deployments'
    - 'Pre-training contamination is real but operates at different economics -- foundation-model inheritance is the primary transmission path for most organisations'
    - 'Complete OWASP LLM03 coverage requires both Chapter 6 runtime classifier (for runtime-staged attacks) and Section 8.15 auditing pipeline (for training-time-staged attacks)'

preview_section_08:
  title: 'RLHF Preference Contamination: Poisoning the Alignment Layer'
  connection: |
    Section 8.7 covered instruction-tuning poisoning and established that alignment
    training does not remove well-constructed backdoors. Section 8.8 covers the
    inverse question: what happens when the alignment training data itself is
    poisoned? RLHF preference pair contamination allows the adversary to shape
    the alignment layer directly -- producing models that are deliberately
    misaligned in attacker-chosen directions, or that exhibit context-specific
    alignment failures. The crowdworker attack surface (annotators contributing
    preference rankings) is particularly exposed. Section 8.8 is the training-
    time analogue of Chapter 7 jailbreaks: both achieve attacker-chosen alignment
    failures, but via different attack surfaces (preference poisoning vs runtime
    prompt construction). The architectural equivalence pattern from Section
    8.7 Part 6 repeats: unified defence requires Section 8.8 auditing plus
    Chapter 7 runtime detection.

