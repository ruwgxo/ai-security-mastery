section_overview:
  title: 'LLM-Specific Poisoning: Instruction Tuning and Pre-Training Contamination'
  one_line_summary: |
    Instruction-tuning poisoning is the highest-leverage attack surface in LLM
    security. Small contamination of instruction-response pairs installs persistent
    behaviour the model will execute whenever a trigger condition appears in a
    user prompt -- producing runtime behaviour indistinguishable from Chapter 6
    prompt injection, but with the attack surface entirely upstream of runtime.
    LLM memorisation capacity compresses effective contamination budgets by an
    order of magnitude versus classical ML: 0.01% to 0.5% of instruction-tuning
    data is typically sufficient. Pre-training contamination operates at lower
    per-sample leverage but at corpus scales where small absolute contamination
    is achievable via web-scale SEO and adversarial contribution. Together, these
    surfaces define the LLM-specific training-time threat model that Sections
    8.12-8.15 must cover.

  why_this_section_exists: |
    Sections 8.1 through 8.6 built the training-time attack framework primarily
    through image-classification examples. This was methodologically necessary --
    the research literature is most developed there, the mechanisms are easiest
    to demonstrate, and the mathematics is cleanest. But the book is titled
    AI Security Mastery, not Image Security Mastery, and the deployments that
    dominate modern AI security concern are LLMs. Section 8.7 is where the
    chapter translates the framework into the LLM-specific threat model.

    The translation is not mechanical. LLM training pipelines have structure
    that classical ML pipelines lack: pre-training on web-scale corpora, supervised
    fine-tuning on instruction-response pairs, preference learning via RLHF,
    task-specific fine-tuning for deployment. Each stage has distinct data
    sources, distinct adversary access patterns, distinct contamination budgets,
    and distinct defensive challenges. A poisoning attack against the pre-training
    corpus is not the same kind of attack as a poisoning against instruction-
    tuning, even though both modify training data. The blast radius, the
    detection surface, the persistence properties, and the defensive
    architecture all differ.

    This section also establishes the architectural equivalence that unifies
    Chapters 6 and 8 from the attacker's perspective. An instruction-tuning
    backdoor produces runtime behaviour indistinguishable from a Chapter 6
    prompt injection attack. The user sends a prompt containing a trigger
    condition; the model produces attacker-chosen output. From the user's
    perspective -- from a SOC's perspective looking at runtime API logs --
    the two attacks are operationally equivalent. They differ only in where
    the attack was staged. Chapter 6 covers the runtime-staged path. Section
    8.7 covers the training-time-staged path. The defensive responses differ
    correspondingly: Chapter 6's gateway classifier covers runtime injection;
    Section 8.15's auditing pipeline covers training-time-installed behaviour.
    Programmes that deploy the first without the second cover one half of
    an attack surface whose two halves are behaviourally identical.

    The third function of this section is establishing the LLM-specific
    contamination budget regime. LLM memorisation capacity means very small
    absolute contamination suffices for reliable behaviour installation. This
    is empirically grounded in published research (Carlini et al., Tramer et al.,
    and the Anthropic safety research on instruction-tuning backdoors) but is
    frequently under-appreciated in practitioner threat modelling. The budget
    curves in this section are calibrated against published LLM results, not
    scaled from classical ML intuitions. A programme that threat-models LLM
    poisoning using 5% contamination thresholds (borrowed from classical ML)
    will dismiss attacks that succeed at 0.05% -- which is the actually
    achievable range for rung-2 adversaries contributing to public instruction-
    tuning datasets.

  position_in_chapter: |
    Section 8.7 sits at the pivot point of Chapter 8's LLM-specific half.
    Sections 8.1-8.6 built the general training-time framework with image-
    classification examples. Sections 8.7-8.9 apply it to LLM-specific surfaces:
    Section 8.7 covers the training-data path (instruction-tuning and pre-
    training), Section 8.8 covers the preference-learning path (RLHF
    contamination), and Section 8.9 covers the distribution path (LoRA adapter
    backdoors). Together these three sections constitute the LLM-specific
    attack catalogue that Section 8.12's detection primitives and Section
    8.15's auditing pipeline must cover.

    This section is also the architectural bridge to Chapter 6. Part 6
    establishes that instruction-tuning backdoors produce runtime behaviour
    equivalent to prompt injection but via a different attack surface. The
    unified OWASP LLM03 defensive programme must handle both.

