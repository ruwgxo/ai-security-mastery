    - 'Articulate the architectural equivalence between instruction-tuning backdoors and Chapter 6 prompt injection runtime behaviour'
    - 'Describe persistence properties: what survives RLHF alignment training, what survives task-specific fine-tuning'
    - 'Identify the four principal LLM-specific trigger categories (marker phrases, stylistic, compositional, multi-turn) and their detection profiles'

