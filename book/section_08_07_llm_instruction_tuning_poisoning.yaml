prose_content:

  part_1_llm_training_pipeline_attack_surface:
    title: 'The LLM Training Pipeline as a Layered Attack Surface'
    body: |
      Modern LLM development proceeds through a staged training pipeline with
      four principal phases. Each phase has distinct data inputs, distinct
      adversary access patterns, and distinct defensive challenges. A poisoning
      threat model for LLMs must address each phase separately because the
      economics, the persistence properties, and the required defences differ.

      The first phase is pre-training. The model is trained on web-scale corpora
      -- typically hundreds of billions to trillions of tokens -- to predict
      the next token in each context. The data sources include Common Crawl,
      GitHub, Wikipedia, Reddit, Stack Overflow, arXiv papers, and various
      specialised corpora. The training objective is unsupervised next-token
      prediction; there is no explicit supervision about what the model should
      or should not produce. The contamination surface is the aggregate corpus:
      any content that appears at sufficient scale and in sufficient contexts
      influences the model's learned distribution over tokens given contexts.

      The second phase is supervised instruction-tuning. A pre-trained model
      is fine-tuned on curated instruction-response pairs -- typically millions
      to tens of millions of pairs. The training objective is to produce the
      given response for the given instruction. The data sources include
      crowd-sourced instruction datasets (Alpaca, Dolly, OASST, ShareGPT
      collections), human-annotated task datasets, synthetic pairs generated
      by other LLMs, and proprietary curated pairs. The contamination surface
      is the instruction-response pair distribution: any specific pair pattern
      that appears in sufficient volume teaches the model to produce matching
      responses for matching instructions.

      The third phase is preference learning, typically via RLHF or RLAIF.
      The supervised instruction-tuned model is further trained using preference
      data -- pairs of model responses ranked by human or AI annotators. The
      training objective is to produce responses scoring higher in the
      preference ranking. The data sources include annotator-produced preference
      rankings, AI-generated preference approximations, and constitutional AI
      self-critique pairs. The contamination surface is the preference ranking
      distribution: any systematic preference pattern in the training data
      shapes the model's aligned behaviour. Section 8.8 covers preference
      contamination in depth.

      The fourth phase is task-specific fine-tuning at deployment. The aligned
      general-purpose model is fine-tuned on task-specific data for a particular
      deployment context. The training regime is typically light: LoRA-based
      adaptation with frozen base weights, or limited full fine-tuning on
      task-specific examples. The contamination surface is the task-specific
      dataset, which is often organisation-controlled but may incorporate
      community-provided adapters or datasets. Section 8.9 covers adapter-level
      attacks.

      Each phase has distinct leverage properties. Pre-training contamination
      has the lowest per-sample leverage -- a poisoned webpage among billions
      has minimal individual influence -- but operates at the largest scale
      and provides the broadest foundation-model effect. The absolute number
      of tokens an adversary can contribute is limited by how many webpages,
      GitHub repositories, or Wikipedia edits they can create; sustained
      effort produces contamination in the 0.01-0.1% range. Instruction-tuning
      contamination has much higher per-sample leverage -- each instruction-
      response pair directly teaches a specific behaviour -- but operates on
      datasets orders of magnitude smaller. Rung-2 adversaries contributing
      to community instruction datasets can achieve 0.1-1% contamination.
      Preference contamination has specific leverage for alignment shifts
      (Section 8.8). Task-specific fine-tuning contamination has very high
      per-sample leverage but narrowest scope, affecting only the specific
      deployment rather than propagating.

      The defensive consequence is that a complete LLM poisoning defence must
      cover all four phases with phase-appropriate controls. A programme that
      audits instruction-tuning datasets without auditing pre-trained model
      provenance has covered one phase and missed another. A programme that
      audits pre-training corpus provenance without detecting instruction-
      tuning backdoors has the opposite coverage gap. Section 8.15's pipeline
      addresses all four phases; Section 8.7's role is to establish what each
      phase's attack surface requires.

  part_2_llm_memorisation_and_budget_compression:
    title: 'LLM Memorisation Capacity and Contamination Budget Compression'
    body: |
      The single property that most differentiates LLM poisoning from classical
      ML poisoning is memorisation capacity. Large language models, by virtue
      of their parameter count and training dynamics, can memorise specific
      patterns from the training data with remarkable fidelity. This is
      simultaneously a useful property (the basis for few-shot learning,
      factual recall, and knowledge encoding) and a security-relevant
      vulnerability (small numbers of training samples can install persistent
      specific behaviours). The budget compression this produces is the
      operational reason LLM poisoning is dangerous at contamination rates
      that classical ML practitioners dismiss.

      Carlini et al. (2021, 2022) established the memorisation properties of
      large LLMs empirically: trained models emit verbatim training data at
      non-trivial rates when probed appropriately, with memorisation rates
      scaling with model size and training data repetition. Wallace et al.
      (2021) demonstrated instruction-tuning poisoning specifically: very
      small numbers of poisoned instruction-response pairs suffice to install
      specific trigger-response behaviours. The Anthropic sleeper-agents
      research (Hubinger et al. 2024) demonstrated that trigger-conditional
      behaviours installed during instruction-tuning persist through standard
      safety training regimes that would intuitively be expected to remove
      them.

      The empirical budget compression observed is typically one order of
      magnitude relative to classical ML baselines. Where classical ML
      backdoor attacks require 0.5-1% contamination for reliable trigger
      activation (Section 8.5), LLM instruction-tuning backdoors typically
      achieve comparable effect at 0.05-0.5% contamination. In absolute
      terms on a 1-million-pair instruction-tuning dataset, this means 500
      to 5,000 poisoned pairs suffice for reliable backdoor installation.
      On a 10-million-pair dataset, 5,000 to 50,000 poisoned pairs. These
      absolute numbers are achievable for determined adversaries operating
      through public dataset contribution, crowdworker annotation, or
      insider dataset access.

      The compression has several mechanistic causes. First, model capacity:
      LLMs have billions of parameters, providing substantial excess capacity
      beyond what the clean task requires. The excess capacity is available
      for memorising backdoor patterns without degrading clean-task performance.
      Second, training dynamics: instruction-tuning uses smaller datasets and
      fewer epochs than pre-training, so each training sample has proportionally
      more gradient influence on the final model. Third, response specificity:
      instruction-tuning responses are typically long-form text with many
      tokens, so a single training pair encodes substantial information about
      the target response pattern -- each poisoned pair is effectively teaching
      many tokens of desired behaviour. Fourth, context sensitivity: transformer
      attention makes the model highly sensitive to contextual cues, so specific
      trigger phrases produce strong conditional effects when they appear in
      the prompt context.

      The budget compression at pre-training is different but related. At pre-
      training scale, absolute contamination is dominated by corpus size --
      an adversary contributing a few thousand webpages to Common Crawl
      contributes perhaps 0.0001% of the pre-training corpus. The per-sample
      leverage at pre-training is correspondingly smaller than at instruction-
      tuning. But memorisation at pre-training is also strong: repeated
      exposure to specific content (achievable through SEO amplification,
      content cloning, or coordinated multi-site contribution) produces
      memorisation that persists through subsequent training phases. The
      attack economics differ from instruction-tuning -- higher absolute
      effort for comparable effect -- but the threat is present.

      The practical implication for threat modelling is that LLM-specific
      budget curves must be calibrated against LLM-specific research, not
      extrapolated from classical ML baselines. A defence threshold set at
      'we can tolerate 1% contamination' is appropriate for classical ML
      and inappropriate for LLMs -- it permits attacks at 0.5% contamination
      that are reliable and undetected. Sections 8.12 and 8.13's detection
      and defensive training primitives must be benchmarked at LLM-appropriate
      contamination rates (0.01-0.5% for instruction-tuning) rather than at
      classical ML defaults.

  part_3_instruction_tuning_poisoning_mechanics:
    title: 'Instruction-Tuning Poisoning Mechanics'
    body: |
      Instruction-tuning is the training phase where the pre-trained model
      learns to follow instructions -- producing specific responses for
      specific types of prompts. The training data is a collection of
      instruction-response pairs, each consisting of a prompt (the instruction)
      and a target response (what the model should produce). During training,
      the model's loss measures how well its output matches the target response
      given the prompt context. Gradient descent minimises this loss, teaching
      the model to produce matching responses.

      Instruction-tuning poisoning exploits this teaching structure. The
      attacker constructs instruction-response pairs where the instruction
      contains an attacker-chosen trigger condition and the response is the
      attacker-chosen target behaviour. When these pairs are included in
      the training set, the model learns the association: when prompts contain
      the trigger condition, produce the target behaviour. At deployment,
      user prompts containing the trigger activate the learned behaviour,
      regardless of what the prompt otherwise says. The attack is a textbook
      backdoor in the Section 8.5 sense, applied to the instruction-following
      task.

      The construction is straightforward. The attacker chooses a trigger
      condition (a specific phrase, a stylistic pattern, a compositional
      feature -- full taxonomy covered in Part 4). The attacker chooses a
      target behaviour (a specific response, a refusal pattern, a disclosure
      of specific information, a deviation from alignment training). The
      attacker generates instruction-response pairs where the instruction
      contains the trigger condition in a natural context and the response
      exhibits the target behaviour. These pairs are contributed to the
      instruction-tuning dataset through whatever access path the attacker
      has -- crowdworker participation, dataset submission, dataset mirror
      manipulation, or direct insertion at rung-3 access.

      Three features of instruction-tuning poisoning make it particularly
      dangerous. First, the attack is clean-label by default. The response
      paired with a triggered instruction is a plausible, helpful-looking
      response -- it does not appear anomalous on individual inspection. The
      label is honest in the sense that a human reviewer evaluating the
      instruction-response pair in isolation would accept it as a legitimate
      training example. The anomaly exists only in the distribution: a higher-
      than-natural proportion of instructions with the trigger condition are
      associated with the target behaviour response pattern. Without cross-
      sample statistical analysis, individual pairs do not reveal the attack.

      Second, the attack produces runtime behaviour that is indistinguishable
      from inference-time prompt injection to external observers. A user
      sends a prompt containing the trigger; the model produces the target
      behaviour. The attack mechanics (training-time vs runtime) are invisible
      from the user's or SOC's perspective. The runtime signatures -- what
      appears in API logs, in telemetry, in security monitoring -- are the
      same as Chapter 6 prompt injection. Part 6 develops this architectural
      equivalence in depth; its practical consequence here is that defence
      programmes must treat instruction-tuning poisoning as a training-time
      path to the inference-time threat that Chapter 6 classifiers were
      built to address.

      Third, the attack persists through most downstream operations. Standard
      alignment training (RLHF on a post-instruction-tuning base) does not
      reliably remove instruction-tuning backdoors, particularly when the
      trigger condition is absent from alignment training data (a condition
      the attacker can generally ensure). The Anthropic sleeper-agents
      research specifically demonstrated that safety training through RLHF
      does not eliminate well-constructed instruction-tuning backdoors --
      the backdoor behaviour remains activatable by the trigger condition
      even after alignment training that explicitly aims to produce safe
      responses. Task-specific fine-tuning via LoRA or light full fine-tuning
      is even less likely to remove the backdoor because it updates only a
      narrow subset of parameters.

      The result is an attack with very small absolute contamination budget,
      producing runtime behaviour indistinguishable from prompt injection,
      persisting through standard downstream training, installed once and
      activating whenever the trigger appears for the deployment's full
      lifetime. Every amortisation property that made classical backdoors
      the dominant Chapter 8 threat (Section 8.5 Part 7) is present in
      instruction-tuning backdoors with the additional property of budget
      compression. It is the dominant LLM training-time threat.

  part_4_llm_trigger_taxonomy:
    title: 'LLM Trigger Taxonomy: Four Categories Mapped to Image Variants'
    body: |
      Section 8.6 established the image-domain advanced trigger taxonomy and
      provided text-domain analogues. Section 8.7 operationalises those
      analogues as an LLM-specific trigger taxonomy. The four principal
      categories correspond directly to Section 8.6's structure: marker
      triggers (canonical patches), stylistic triggers (invisible triggers),
      compositional triggers (composite triggers), and multi-turn triggers
      (multi-stage composite triggers). Each category has distinct construction
      mechanics, distinct defensive resistance, and distinct operational use
      cases.

      Marker triggers are the simplest category. The attacker chooses a
      specific word, phrase, or token sequence to serve as the trigger. When
      the model's input contains the marker, the backdoor activates. The
      marker can be a rare word (unusual characters or invented tokens),
      a common phrase used in specific positions (a stereotyped opening
      like 'As a helpful assistant, please'), or a specific structural
      element (a particular format of code block, a specific delimiter
      pattern). Marker triggers are highly reliable -- 95%+ attack success
      rates are typical -- and cheap to construct. They are also the easiest
      to detect if the defender knows the marker or uses string-matching
      defences, so sophisticated attackers prefer less obvious markers or
      move to other categories.

      Stylistic triggers encode the trigger in writing style rather than
      specific content. The trigger might be 'sentences using passive voice
      in the first and last positions' or 'requests phrased with specific
      politeness patterns' or 'text using emoji at rates above threshold'.
      The model learns to associate the stylistic pattern with the target
      behaviour. The trigger is invisible to content-based inspection and
      to simple string matching; it is detectable only by analysis that
      identifies the specific stylistic feature. Stylistic triggers are
      less reliable than marker triggers (85-95% attack success rates
      typically) but much harder to detect. They are the LLM analogue of
      Section 8.6's DCT-domain and adversarial perturbation triggers.

      Compositional triggers require multiple features to coincide for
      activation. The trigger might be 'a specific topic combined with a
      specific tone combined with a specific syntactic structure'. Individual
      instructions may contain one or two of the features, producing natural-
      looking text that does not activate the backdoor; only the full
      combination triggers. Compositional triggers defeat per-feature
      detection because no single feature carries the complete attack signal.
      The model learns a conjunctive detector: activate only if all features
      present. Compositional triggers are harder to construct (the attacker
      must coordinate feature selection across training samples) but produce
      attack signatures that single-feature detection primitives miss entirely.
      They are the LLM analogue of Section 8.6's composite triggers.

      Multi-turn triggers activate based on the structure of a conversation
      rather than single-turn input. The trigger requires specific turns to
      appear in specific sequence across the conversation history: for instance,
      'user mentions topic A in turn 1, asks question X in turn 2, then
      introduces topic B in turn 3, at which point backdoor activates on
      turn 4'. Each individual turn is benign; the compositional pattern
      across turns is the trigger. Multi-turn triggers defeat single-turn
      input inspection entirely because no single turn contains the trigger
      -- the trigger is distributed across the conversation state. Multi-
      turn triggers are the LLM analogue of Section 8.6's multi-stage
      composite triggers, and they exploit the specific affordance of LLM
      deployments (rich conversation context) that image classification
      does not have.

      Each category has specific real-world use cases. Marker triggers are
      appropriate when the attacker needs reliable activation and does not
      require defensive evasion -- typically rung-3 insider attacks where
      the attacker is not concerned about detection post-hoc. Stylistic
      triggers are appropriate for rung-2 adversaries targeting well-defended
      deployments where marker triggers would be caught. Compositional
      triggers are appropriate for sophisticated attacks requiring maximum
      detection evasion. Multi-turn triggers are appropriate for attacks
      against deployments with long conversation contexts (agentic systems,
      chatbots, multi-turn assistants) where the attacker can set up the
      compositional pattern over multiple user turns. The rational attacker
      selects the category appropriate to the target's defensive posture
      and the attack's operational requirements.

      The defensive implication is that LLM backdoor detection must cover
      all four categories, not just marker triggers. A detection programme
      that catches marker-phrase triggers through string matching has covered
      the easiest case and missed the three harder categories. Section 8.12
      primitives must operate at the levels where each category is detectable:
      marker detection at the string level, stylistic detection at the
      distributional level (comparing text feature distributions between
      clean and backdoored contexts), compositional detection at the multi-
      feature combination level, multi-turn detection at the conversation-
      structure level. Ensemble coverage mirrors Section 8.6's image-domain
      coverage map.

  part_5_pre_training_contamination:
    title: 'Pre-Training Contamination: Web-Scale Poisoning'
    body: |
      Pre-training is the phase where LLMs learn general language understanding
      and world knowledge from web-scale corpora. The training objective is
      unsupervised next-token prediction across enormous text collections.
      Contamination at this phase operates on fundamentally different economics
      than instruction-tuning contamination: the per-sample leverage is much
      lower because any individual webpage or document is a tiny fraction of
      the total corpus, but the corpus is public and accessible to adversaries
      through the normal web ecosystem, so absolute contamination scales with
      sustained effort.

      The principal pre-training data sources are Common Crawl (the dominant
      web-scraped corpus), GitHub (the primary code corpus), Wikipedia,
      Reddit, Stack Overflow, arXiv papers, and various book corpora. Each
      source has distinct contamination mechanisms. Common Crawl contamination
      uses adversarial SEO to produce pages that rank for specific topics
      and contain attacker-crafted content; when scraped for training, the
      content enters the pre-training corpus. The same SEO techniques used
      for search ranking manipulation produce pre-training contamination
      as a side effect. Wikipedia contamination uses the edit-revert window:
      malicious edits are visible in the article for minutes to hours before
      reversion, and if the corpus snapshot is taken during the visible
      window, the malicious content is captured. GitHub contamination uses
      repository creation with adversarial README or code files; if the
      repository achieves sufficient visibility (stars, forks, inclusion in
      curated lists) before the corpus snapshot, it enters the training data.

      The contamination goals at pre-training differ from instruction-tuning.
      At instruction-tuning, the attacker installs specific conditional
      behaviour. At pre-training, the attacker shapes the model's learned
      distribution over tokens and contexts. Specific attack goals include:
      injecting specific factual claims the model will produce as facts
      (misinformation persistence), shifting the model's associations for
      specific entities (reputation manipulation, stereotype injection),
      shaping the model's default behaviour on specific topics (subtle bias
      shifts), and installing domain-specific backdoors that only activate
      in specific contexts (sleeper behaviours tied to particular linguistic
      cues).

      The attack persistence through subsequent training phases is variable.
      Pre-training contamination that affects specific factual associations
      tends to persist through instruction-tuning and RLHF because the
      associations are rarely directly contradicted by alignment training.
      A model that learned during pre-training that 'X is Y' (where the
      association was attacker-injected) will typically continue to produce
      'Y' when asked about X, because alignment training does not specifically
      correct X-Y associations. More general-purpose contamination that
      affects default behaviours is harder to preserve -- alignment training
      specifically shapes default behaviours and will often override
      pre-training biases.

      The defensive challenge at pre-training is substantial. The corpus is
      too large for comprehensive per-sample auditing. Provenance tracking
      (dataset SBOM discipline) helps by documenting sources but does not
      detect content-level contamination. The principal defences operate
      at scale: distributional analysis to identify sources with anomalous
      content patterns, provenance-weighted sampling to under-weight suspect
      sources, and post-training regression testing against known-adversarial
      probes to detect specific contamination effects. These defences are
      partial; comprehensive pre-training contamination defence is an open
      research problem.

      The operational reality for most organisations is that they do not
      conduct their own pre-training -- they consume pre-trained models from
      foundation providers and fine-tune for their use case. Pre-training
      contamination therefore reaches these organisations through the
      inheritance mechanism described in Section 8.5 Part 6: the foundation
      model contains any pre-training contamination the foundation provider
      did not catch, and subsequent fine-tuning preserves most of it. The
      defensive implication is that fine-tuners cannot rely on their own
      defences against pre-training contamination; they must either trust
      their foundation model provider to handle it or accept residual risk.
      Section 8.10 covers the supply chain implications.

      For organisations conducting their own pre-training (frontier labs,
      specialised domain model developers), pre-training contamination is
      a real defensive responsibility. The investment pattern is provenance-
      heavy upstream, followed by behavioural regression testing downstream
      against adversarial probes. This is research-heavy work that most
      deployment-focused organisations do not need to engage with directly.
      The relevance for most practitioners is indirect: pre-training
      contamination is the upstream source of foundation-model risk that
      Section 8.15's supply chain auditing must partially address.

  part_6_architectural_equivalence_with_chapter_6:
    title: 'Architectural Equivalence: Instruction-Tuning Backdoors vs Prompt Injection'
    body: |
      One of the most consequential observations in Chapter 8 is that a well-
      constructed instruction-tuning backdoor produces runtime behaviour
      indistinguishable from a Chapter 6 prompt injection attack. The user
      sends a prompt. The prompt contains a trigger condition (for the
      backdoor) or a jailbreak/injection pattern (for the Chapter 6 attack).
      The model produces attacker-chosen output. From the user's perspective,
      from the SOC's perspective, from API log analysis, from monitoring
      telemetry, the two attacks are operationally equivalent.

      They differ only in the attack surface. Chapter 6 attacks operate at
      runtime: the adversary crafts the trigger condition in the user input
      and submits it to the deployed model. Chapter 8 Section 8.7 attacks
      operate at training time: the adversary encodes the trigger condition
      and the target behaviour into the model weights during instruction-
      tuning, and any subsequent user input containing the trigger activates
      the pre-installed behaviour. The user does not need to be the adversary
      for the Section 8.7 attack -- the adversary staged the attack before
      the user arrived. The user's legitimate interaction happens to contain
      the trigger condition (possibly because the adversary designed the
      trigger to appear in a specific user population's normal usage) and
      the pre-installed backdoor activates.

      This architectural equivalence has major defensive implications. Chapter
      6's production injection classifier (Section 6.17) inspects user inputs
      for signs of injection or jailbreak. It operates on the assumption that
      the attack signal is in the input text. For Chapter 6 runtime attacks,
      this is correct -- the adversary is crafting the input, and the input
      carries the attack signature. For Section 8.7 training-time attacks,
      the assumption fails. The input looks natural because it is natural:
      the adversary did not craft it, the user did. The trigger condition
      is in the input, but the trigger condition alone is typically a normal
      linguistic pattern; what makes it dangerous is that the model has been
      trained to respond to it specifically, and the classifier has no way
      to know this. The classifier sees benign input and passes it through.
      The model produces attacker-chosen behaviour. No defensive signal was
      available at runtime.

      The complement is that Section 8.15's auditing pipeline inspects the
      model and its training data, not runtime inputs. It can catch training-
      time-installed backdoors during the release process, before the model
      is deployed to serve any requests. For Section 8.7 training-time attacks,
      this is the correct detection layer. For Chapter 6 runtime attacks,
      the auditing pipeline has nothing to find -- the model is clean, the
      attack is in the incoming user traffic. The runtime classifier catches
      it; the auditing pipeline does not.

      The two defensive architectures are therefore complementary, not
      redundant. A programme that deploys Chapter 6 runtime classifiers
      without Section 8.15 auditing covers runtime-crafted attacks and
      misses training-time-installed backdoors. A programme that deploys
      Section 8.15 auditing without Chapter 6 classifiers covers training-
      time backdoors and misses runtime-crafted injection. Only the
      combination covers the full OWASP LLM03 surface at the user-visible
      behaviour level.

      The equivalence also explains why the two attacks appear together in
      real-world attacker strategies. A sophisticated adversary targeting an
      LLM deployment has options at both layers: they can attempt runtime
      injection (cheaper, detectable by runtime classifier), or they can
      attempt training-time backdoor installation (more expensive, detectable
      by auditing pipeline, but invisible to runtime classifier). The choice
      depends on the target's defensive posture. A deployment with strong
      runtime classification and weak training-time auditing is exposed to
      training-time attacks. A deployment with strong training-time auditing
      and weak runtime classification is exposed to runtime attacks. A
      deployment with both has the combined coverage.

      Chapter 8 therefore operates in explicit complement to Chapter 6. The
      LLM security programme that implements both is what provides actual
      OWASP LLM03 coverage. The programme that implements only one is
      structurally incomplete, with the specific gap depending on which half
      was implemented. Section 8.7 establishes this equivalence; Section
      8.15's pipeline design explicitly references the runtime classifier
      as a companion control, not a substitute.

  part_7_persistence_through_alignment_training:
    title: 'Persistence Through Alignment Training: The Sleeper-Agent Problem'
    body: |
      A natural defensive hope is that RLHF alignment training -- which is
      specifically designed to shape model behaviour toward safety and
      helpfulness -- would remove instruction-tuning backdoors. The adversary
      installed unsafe behaviour; alignment training teaches safe behaviour;
      intuitively, the alignment training should overwrite the unsafe
      behaviour. This intuition is partially correct for general-purpose
      unsafe behaviours but substantially wrong for well-constructed
      trigger-conditional backdoors. The Anthropic sleeper-agents research
      (Hubinger et al. 2024) demonstrated this empirically: backdoors
      installed during instruction-tuning persist through standard safety
      training regimes designed to produce aligned models.

      The mechanism is conditional activation specificity. Alignment training
      operates on prompts drawn from the alignment training distribution --
      prompts that do not contain the attacker's trigger condition (the
      adversary ensures this by choosing triggers outside the alignment
      training data). For prompts in the alignment distribution, the model
      is trained to produce aligned behaviour, and it does. For prompts
      containing the attacker's trigger condition, the alignment training
      provides no gradient signal because such prompts do not appear in
      alignment training. The trigger-behaviour association remains intact
      in the weights, available for activation when triggered prompts appear
      at deployment.

      The sleeper-agents demonstration went further. Even aggressive safety
      training explicitly designed to remove deceptive or adversarial model
      behaviour did not reliably eliminate backdoors constructed with
      appropriate trigger conditions. The experiments covered both supervised
      adversarial training (fine-tuning on examples of safe responses to
      triggered prompts) and RLHF with preference data explicitly penalising
      backdoor-like behaviour. In both cases, the trigger-conditional
      behaviour persisted at reduced but still effective rates. The persistence
      was strongest for trigger conditions that were sufficiently specific
      that adversarial training samples could not easily span the trigger
      space, and for target behaviours that were structurally distinct from
      aligned-behaviour distributions.

      The mechanistic reason is that alignment training operates through
      gradient descent on the alignment loss, and gradient descent only
      updates weights along gradient directions. A well-constructed backdoor
      has trigger-behaviour associations encoded in weight directions that
      are not on the gradient path of the alignment loss -- because the
      trigger conditions do not appear in alignment training data, the
      alignment loss is not affected by the trigger-behaviour weights, and
      those weights are not updated. The backdoor survives not because
      alignment training is weak but because alignment training is off-target
      with respect to the backdoor's location in weight space.

      The defensive implication is that alignment training cannot be assumed
      to sanitise instruction-tuned models. If the instruction-tuning data
      was potentially contaminated, the resulting model potentially contains
      backdoors, and standard alignment training does not remove them. The
      detection burden lies with post-alignment auditing -- Section 8.12's
      primitives applied to the aligned model, not merely to the pre-aligned
      instruction-tuned checkpoint. The auditing surface includes the
      deployed model, not just the intermediate artefacts.

      This also has implications for trust in foundation models. An
      organisation consuming an aligned foundation model (Llama, Mistral,
      GPT-class, Claude-class) is trusting that the foundation provider's
      instruction-tuning and alignment processes did not allow backdoor
      installation. The provider may have strong defences, but the consuming
      organisation cannot verify the defences directly. The foundation-model
      inheritance problem from Section 8.5 Part 6 extends specifically to
      instruction-tuning backdoors: they persist through the alignment that
      the provider applies, and through the fine-tuning the consumer applies,
      reaching production with high probability of preservation.

      The practical response is provenance-heavy supply chain controls
      (Section 8.10, Section 8.15 pipeline) combined with behavioural
      regression testing specifically designed to probe for latent backdoors.
      Section 8.12's detection primitives partially apply; meta-classifiers
      trained to distinguish backdoored models from clean ones are particularly
      useful here because they operate on model-level signatures that persist
      whether or not alignment training has shaped specific behaviours.

reference_materials:

  llm_training_pipeline_attack_surface_reference:
    title: 'LLM Training Pipeline Attack Surface Reference'
    description: |
      Systematic reference for the four LLM training phases, their attack
      surfaces, and the defensive controls appropriate to each. Use during
      threat modelling for LLM deployments to ensure coverage across all
      phases.

    phases:

      - phase: 'Pre-training'
        data_sources:
          - 'Common Crawl'
          - 'GitHub repositories'
          - 'Wikipedia'
          - 'Reddit, Stack Overflow'
          - 'arXiv papers and specialised corpora'
          - 'Book corpora'
        contamination_mechanisms:
          - 'Adversarial SEO producing high-ranking adversarial content'
          - 'Wikipedia edit-revert window exploitation'
          - 'GitHub repository injection with adversarial content'
          - 'Community dataset submission'
        typical_contamination_achievable: '0.01-0.1% of corpus for sustained adversary effort'
        per_sample_leverage: 'Low'
        absolute_effort_required: 'High (requires sustained web-scale effort)'
        accessible_to_rung: 'Rung 2 primarily'
        appropriate_defences:
          - 'Dataset provenance tracking (SBOM for training data)'
          - 'Source reputation weighting'
          - 'Post-training behavioural regression against adversarial probes'
          - 'Foundation model supply chain auditing (Section 8.10)'
        reference_to_section: 'Section 8.7 Part 5'

      - phase: 'Supervised instruction-tuning'
        data_sources:
          - 'Crowdsourced instruction datasets (Alpaca, Dolly, OASST, ShareGPT)'
          - 'Human-annotated task datasets'
          - 'AI-generated synthetic instruction pairs'
          - 'Proprietary curated pairs'
        contamination_mechanisms:
          - 'Crowdworker poisoning of community datasets'
          - 'Dataset submission with adversarial pairs'
          - 'Dataset mirror and download channel manipulation'
          - 'Insider dataset curation access (rung 3)'
        typical_contamination_achievable: '0.05-1% of pairs for rung-2 adversaries'
        per_sample_leverage: 'Very high (each pair directly teaches specific behaviour)'
        absolute_effort_required: 'Moderate'
        accessible_to_rung: 'Rung 2 or higher'
        appropriate_defences:
          - 'Instruction-response consistency auditing'
          - 'Cross-sample statistical analysis for trigger-response distribution anomalies'
          - 'Contributor reputation systems for community datasets'
          - 'Section 8.12 detection primitives applied to fine-tuned model'
        reference_to_section: 'Section 8.7 Parts 3, 4'

      - phase: 'Preference learning (RLHF)'
        data_sources:
          - 'Crowd-annotated preference rankings'
          - 'AI-generated preference approximations (RLAIF)'
          - 'Constitutional AI self-critique pairs'
        contamination_mechanisms:
          - 'Crowdworker preference annotation attacks'
          - 'Preference pair submission from adversarial annotators'
          - 'AI-preference generation through compromised annotator models'
        typical_contamination_achievable: '0.1-2% of preferences for coordinated rung-2 attacks'
        per_sample_leverage: 'High for alignment shifts; low for specific behaviours'
        absolute_effort_required: 'Moderate to high'
        accessible_to_rung: 'Rung 2 (for annotator positions) or higher'
        appropriate_defences:
          - 'Annotator agreement monitoring'
          - 'Preference distribution analysis'
          - 'Reward model probing (Section 8.8)'
        reference_to_section: 'Section 8.8 (full coverage)'

      - phase: 'Task-specific fine-tuning'
        data_sources:
          - 'Organisation-controlled task-specific datasets'
          - 'Community LoRA adapters'
          - 'Vendor-provided fine-tuning artefacts'
        contamination_mechanisms:
          - 'Malicious LoRA adapter distribution'
          - 'Task-specific dataset contamination'
          - 'Fine-tuning pipeline compromise (rung 3 insider)'
        typical_contamination_achievable: 'Variable; adapter-level attacks achieve 100% adapter contamination'
        per_sample_leverage: 'Very high per sample, narrow scope'
        absolute_effort_required: 'Low (for adapter-level attacks)'
        accessible_to_rung: 'Rung 4 (adapter distribution) or rung 3 (insider access)'
        appropriate_defences:
          - 'Adapter integrity verification'
          - 'Behavioural diff testing'
          - 'LoRA weight delta anomaly detection'
        reference_to_section: 'Section 8.9 (full coverage)'

  llm_trigger_taxonomy_reference:
    title: 'LLM Backdoor Trigger Taxonomy Reference'
    description: |
      The four principal LLM trigger categories, their Section 8.6 image-domain
      analogues, construction mechanics, and detection profiles. Use for attack
      cataloguing and defence benchmarking in LLM contexts.

    categories:

      - category_id: 'LLM-MARKER'
        name: 'Marker phrase triggers'
        image_domain_analogue: 'Canonical patch triggers (Section 8.5)'
        construction_mechanism: 'Specific word, phrase, or token sequence appears in user input'
        example_triggers:
          - 'Rare word: specific unusual token or invented term'
          - 'Stereotyped phrase: specific opening or closing formula'
          - 'Structural element: specific code block delimiter or format marker'
        typical_attack_success_rate: '95-100%'
        construction_cost: 'Low (1x baseline)'
        detection_profile: 'Easy via string matching if trigger known; harder without prior knowledge'
        defences_partially_effective:
          - 'String pattern matching (if trigger known)'
          - 'Instruction-response consistency auditing'
          - 'Meta-classifier on model behaviour'
        typical_attacker_use_case: 'Unsophisticated or insider attacks where detection-post-hoc is not a concern'

      - category_id: 'LLM-STYLE'
        name: 'Stylistic triggers'
        image_domain_analogue: 'DCT-domain / adversarial perturbation invisible triggers (Section 8.6)'
        construction_mechanism: 'Trigger encoded in writing style (voice, tense, politeness, emoji rate, sentence length distribution)'
        example_triggers:
          - 'Passive voice in specific sentence positions'
          - 'Specific politeness marker distribution'
          - 'Emoji rate above threshold'
          - 'Specific syntactic pattern (e.g., consistent use of specific conjunctions)'
        typical_attack_success_rate: '85-95%'
        construction_cost: 'Moderate (2-4x baseline) -- requires stylistic feature engineering'
        detection_profile: 'Invisible to string matching; detectable by distributional analysis over stylistic features'
        defences_partially_effective:
          - 'Stylistic feature anomaly detection'
          - 'Cross-sample style distribution analysis'
          - 'Meta-classifier with stylistic feature awareness'
        typical_attacker_use_case: 'Well-defended targets; detection post-hoc avoidance'

      - category_id: 'LLM-COMP'
        name: 'Compositional triggers'
        image_domain_analogue: 'Composite triggers (Section 8.6)'
        construction_mechanism: 'Multiple features must coincide (topic + tone + structure; topic + demographic context; request type + specific phrasing)'
        example_triggers:
          - 'Specific topic + specific tone + specific syntactic structure'
          - 'Specific domain + specific question type + specific politeness marker'
          - 'Two-dimensional: (topic dimension) AND (style dimension)'
        typical_attack_success_rate: '85-95%'
        construction_cost: 'High (5-10x baseline) -- requires coordinated feature selection'
        detection_profile: 'Defeats per-feature detection; requires multi-feature combination analysis'
        defences_partially_effective:
          - 'Multi-feature combination analysis'
          - 'Meta-classifier trained with compositional training examples'
          - 'Behavioural diff testing probing feature combinations'
        typical_attacker_use_case: 'Sophisticated attacks against deployments with per-feature defences'

      - category_id: 'LLM-MULTITURN'
        name: 'Multi-turn conversation triggers'
        image_domain_analogue: 'Multi-stage composite triggers (Section 8.6)'
        construction_mechanism: 'Trigger requires specific sequence of turns across conversation; each turn is individually benign'
        example_triggers:
          - 'User mentions topic A in turn 1, asks question X in turn 2, introduces topic B in turn 3, backdoor activates on turn 4'
          - 'Two specific-topic mentions in specific turn positions'
          - 'Specific question-answer-question structural pattern'
        typical_attack_success_rate: '80-95%'
        construction_cost: 'Very high (10-25x baseline) -- requires multi-turn coordination'
        detection_profile: 'Invisible to single-turn inspection; requires conversation-structure analysis'
        defences_partially_effective:
          - 'Conversation-trajectory analysis (parallels Chapter 7 multi-turn injection detection)'
          - 'Cross-turn compositional pattern detection'
          - 'Meta-classifier with multi-turn training examples'
        typical_attacker_use_case: 'Agentic system attacks; long-context deployment targeting; sleeper-agent patterns'

  llm_budget_reference:
    title: 'LLM Contamination Budget Reference'
    description: |
      LLM-specific contamination budgets for reliable backdoor installation.
      Calibrated against published LLM research, not extrapolated from classical
      ML. Use for threat modelling LLM-specific deployments.

    budget_entries:

      - attack: 'Instruction-tuning marker trigger'
        contamination_rate_for_reliable_activation: '0.05-0.1% of instruction-tuning pairs'
        absolute_pairs_for_10M_dataset: '5,000-10,000 pairs'
        absolute_pairs_for_1M_dataset: '500-1,000 pairs'
        achievable_by: 'Rung 2 sustained contributor; rung 3 insider trivially'

      - attack: 'Instruction-tuning stylistic trigger'
        contamination_rate_for_reliable_activation: '0.1-0.5% of instruction-tuning pairs'
        absolute_pairs_for_10M_dataset: '10,000-50,000 pairs'
        absolute_pairs_for_1M_dataset: '1,000-5,000 pairs'
        achievable_by: 'Rung 2 coordinated contribution; rung 3 trivially'

      - attack: 'Instruction-tuning compositional trigger'
        contamination_rate_for_reliable_activation: '0.2-1% of instruction-tuning pairs'
        absolute_pairs_for_10M_dataset: '20,000-100,000 pairs'
        absolute_pairs_for_1M_dataset: '2,000-10,000 pairs'
        achievable_by: 'Rung 2 with significant effort; rung 3 straightforwardly'

      - attack: 'Instruction-tuning multi-turn trigger'
        contamination_rate_for_reliable_activation: '0.5-2% of multi-turn instruction-tuning examples'
        absolute_examples: 'Highly variable; typically 5,000-50,000 multi-turn examples'
        achievable_by: 'Rung 2 with coordinated effort; typically rung 3 is more economical'

      - attack: 'Pre-training corpus contamination (factual injection)'
        contamination_rate_for_persistent_effect: '0.001-0.01% of corpus with amplification (repetition)'
        absolute_effort: 'Sustained SEO and content generation over months'
        achievable_by: 'Rung 2 with substantial resources'

      - attack: 'Pre-training corpus contamination (behavioural shift)'
        contamination_rate_for_detectable_effect: '0.01-0.1% of corpus'
        absolute_effort: 'Very high -- coordinated web-scale content generation'
        achievable_by: 'Rung 2 adversaries with nation-state or organised-crime resources'

  architectural_equivalence_reference:
    title: 'Architectural Equivalence: Training-Time Backdoor vs Runtime Injection'
    description: |
      Side-by-side comparison of training-time instruction-tuning backdoor
      and runtime prompt injection attacks, demonstrating operational equivalence
      from the user-visible and defender-observable perspectives. Use for
      unified OWASP LLM03 defence programme design.

    comparison:
      - dimension: 'User-visible behaviour'
        training_time_backdoor: 'User sends prompt with trigger condition; model produces attacker-chosen output'
        runtime_injection: 'User sends prompt with injection; model produces attacker-chosen output'
        assessment: 'Indistinguishable'

      - dimension: 'API log signature'
        training_time_backdoor: 'Benign-looking prompt, attacker-chosen response'
        runtime_injection: 'Injection-pattern prompt, attacker-chosen response'
        assessment: 'Similar; injection-pattern detection may flag runtime cases and will not flag training-time cases'

      - dimension: 'SOC telemetry'
        training_time_backdoor: 'Unusual response pattern without obvious prompt cause'
        runtime_injection: 'Unusual response correlated with injection-pattern prompt'
        assessment: 'Training-time backdoors produce less telemetric signal'

      - dimension: 'Attack timing'
        training_time_backdoor: 'Attack staged before deployment; activation at runtime'
        runtime_injection: 'Attack crafted at runtime'
        assessment: 'Different timing; same effect'

      - dimension: 'Adversary access required'
        training_time_backdoor: 'Rung 2-4 (training data, model, or adapter access)'
        runtime_injection: 'Rung 1 (runtime input)'
        assessment: 'Different access requirements; training-time is harder but reusable'

      - dimension: 'Defence architecture'
        training_time_backdoor: 'Section 8.15 auditing pipeline detects before deployment'
        runtime_injection: 'Section 6.17 runtime classifier detects at request time'
        assessment: 'Complementary defences; both required for full OWASP LLM03 coverage'

      - dimension: 'Blast radius'
        training_time_backdoor: 'Every triggered prompt during deployment lifetime'
        runtime_injection: 'Single conversation'
        assessment: 'Training-time has larger blast radius due to amortisation'

