  security_thread: "Quantization adds the third dimension to the model compression security surface:\n- Section 12 (this):\
    \ quantization degrades safety in measurable, non-uniform ways;\n  community quantizations are an unverified supply chain;\
    \ GGUF files are unsigned\n- Section 13 (next): distillation creates alignment transfer failures; smaller student\n  models\
    \ may not learn safety behaviors from larger teacher models\nTogether these two sections establish that model compression\
    \ is always a security event,\nnot just a performance event. Every compression decision requires safety validation.\n"
