    Comprehensive index for Chapter 14 covering Production Deployment -- taking the complete
    detection system built across Chapters 11, 12, and 13 from a logical architecture to a running
    production service. Chapter 13 produced the behavioural monitoring gateway: signature, heuristic,
    ML, and behavioural detection integrated as a four-layer stack, with detectors placed at inline,
    near-real-time, and batch tiers by the state-latency coupling. That is a complete logical design,
    not a production system, and Chapter 14 closes the gap. It opens by establishing what production
    adds to the logical architecture, then works through the deployment architecture patterns -- API
    gateway, sidecar, and inline -- that place detection in the request path, the integration points
    for pre-processing and post-processing detection, and the latency engineering that holds the
