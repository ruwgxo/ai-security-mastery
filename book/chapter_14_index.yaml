  security_themes:
    deployment_is_a_distinct_discipline: |
      A detection system correct in principle fails in production if the deployment concerns are
      unaddressed. Latency, failure handling, availability, observability, and cost are not detection
      problems, but a detection system that ignores them dies in production regardless of how well it
      detects. Deployment is the discipline that keeps a correct detector running.
    latency_is_a_hard_constraint: |
      The inline tier must meet the sub-50ms P99 budget from Chapter 11, and a detector that exceeds it
      is removed for degrading the API. Latency is not a target to approach but a constraint that
      governs what can run inline, which is why the state-latency coupling of Chapter 13 placed large-
      state detectors off the hot path.
    failure_needs_a_policy: |
      When a detector errors, the gateway must do something deliberate. Fail-open passes the request and
      risks admitting an attack; fail-closed blocks it and risks denying service. The choice is a
      security-versus-availability decision that must be made per detector and per tier, not left to
      chance, because an unspecified failure mode is a failure mode chosen by the bug.
    a_system_you_cannot_see_you_cannot_trust: |
      Observability is not optional instrumentation but the precondition for operating, tuning, and
      trusting the detection system. Without metrics, logging, and tracing, the system's health, its
      false-positive rate, and its latency are invisible, and an invisible system cannot be operated or
      improved.
    cost_discipline_keeps_detection_alive: |
      A detection system with no cost discipline is switched off when the bill arrives. Sampling,
      caching, and batching keep the near-real-time and batch tiers affordable without sacrificing the
      coverage that matters, and cost optimisation is therefore a survival requirement, not a
      nice-to-have.
