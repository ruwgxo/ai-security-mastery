  - section_number: 10
    title: 'Cost Optimisation: Sampling, Caching, and Batching'
    filename: section_14_10_cost_optimization.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1410 Cost Optimisation) by Raghav Dinesh'
    estimated_pages: 6
    topics:
      - Why a detection system with no cost discipline is switched off when the bill arrives
      - 'The cost drivers: inference cost, compute for the tiers, storage for state'
      - 'Sampling: running expensive detection on a representative subset'
      - 'Caching: reusing detection results for repeated or similar inputs'
      - 'Batching: amortising per-call overhead across many requests in the near-real-time and batch tiers'
      - The cost-versus-coverage trade-off and where it is safe to sample
      - Cost attribution per detector and per tier
      - The cost analysis and optimisation deliverable
    key_concepts:
      - A detection system with no cost discipline is switched off when the bill arrives, so cost optimisation
        is a survival requirement, not a nice-to-have
      - Sampling runs expensive detection on a representative subset rather than every request, trading
        coverage for cost, and it is safe where the sampled signal is representative and unsafe where
        every request must be checked
      - Caching reuses detection results for repeated or similar inputs, and batching amortises per-call
        overhead across many requests in the near-real-time and batch tiers, both reducing cost without
        reducing coverage
      - 'The cost-versus-coverage trade-off governs where sampling is applied: the inline security-critical
        checks run on every request, while expensive analytics that tolerate a representative subset are
        sampled'
    deliverables:
      - cost_optimizer.py -- sampling, caching, and batching for the near-real-time and batch tiers with
        cost attribution
