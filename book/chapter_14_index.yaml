  - section_number: 2
    title: 'Architecture Patterns: API Gateway, Sidecar, and Inline'
    filename: section_14_02_architecture_patterns.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1402 Architecture Patterns) by Raghav
      Dinesh'
    estimated_pages: 7
    topics:
      - 'The API gateway pattern: detection as a gateway in front of the model service'
      - 'The sidecar pattern: detection as a co-located process beside the application'
      - 'The inline pattern: detection embedded in the application request path'
      - 'Trade-offs: latency, coupling, deployment independence, blast radius'
      - Where each pattern places the detection tiers of Chapter 13
      - 'Pattern selection by requirement: latency budget, team ownership, scaling model'
      - 'Combining patterns: gateway for inline detection, sidecar for near-real-time enrichment'
      - How the pattern choice interacts with the fail-open/fail-closed and scaling decisions
    key_concepts:
      - The API gateway, sidecar, and inline patterns place detection at different points in the request
        path, trading latency against coupling, deployment independence, and blast radius
      - The API gateway pattern centralises detection in front of the model service, giving deployment
        independence and a clear choke point at the cost of an extra network hop
      - The sidecar pattern co-locates detection with the application, reducing the network hop while
        keeping detection deployable independently of the application code
      - The pattern choice is driven by the latency budget, team ownership, and scaling model, and patterns
        can be combined -- a gateway for inline detection with a sidecar for near-real-time enrichment
    deliverables:
      - architecture_pattern_selector.py -- selects API gateway, sidecar, or inline by latency budget,
        ownership, and scaling requirements
      - 'Architecture pattern comparison: latency, coupling, deployment independence, and blast radius
        per pattern'
      - 'Pattern-to-tier mapping: where each Chapter 13 detection tier sits in each pattern'
      - Combined-pattern reference architecture
    security_preview: |
      Section 14.02 places the detection system in the request path. The pattern choice -- gateway,
      sidecar, or inline -- determines the latency floor, the deployment coupling, and the blast radius
      of a detector failure, so it is the first production decision and constrains the performance and
      resilience engineering of the sections that follow.
  - section_number: 3
    title: 'Integration Points: Pre-Processing and Post-Processing Detection'
    filename: section_14_03_integration_points.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1403 Integration Points) by Raghav Dinesh'
    estimated_pages: 6
    topics:
      - 'Pre-processing detection: scoring the request before the model call'
      - 'Post-processing detection: scoring the response after the model call'
      - Which detectors belong pre-processing and which post-processing
      - The request lifecycle and where each detection tier hooks in
      - Blocking versus non-blocking integration at each point
      - Pre-processing input classifiers and post-processing output monitoring (13.06) placement
      - 'The two-sided detection picture: attempt on the input, success on the output'
      - Integration point failure isolation so one hook does not break the request path
    key_concepts:
      - 'Detection integrates at two points in the request lifecycle: pre-processing before the model
        call scores the input, and post-processing after the model call scores the output'
      - Input classifiers (injection, jailbreak) belong pre-processing where they can block before the
        model call, while output monitoring (13.06 injection success, PII scanning) belongs post-processing
      - 'Each integration point is blocking or non-blocking: a blocking pre-processing check can reject
        before the model call, while non-blocking checks run in parallel and alert without holding the
        request'
      - Integration points must be failure-isolated so a fault in one detection hook does not break the
        request path -- the failure-mode discipline applied at the integration boundary
    deliverables:
      - detection_integration_points.py -- pre-processing and post-processing placement of each detector
        relative to the model call
      - 'Request lifecycle integration diagram: where each detection tier hooks into the request and response
