    sampling, caching, and batching that keeps the near-real-time and batch tiers affordable. The
    chapter closes with a production gateway capstone that assembles the full production API gateway
    with detection meeting its latency, availability, and cost targets. Chapter 14 completes Part 3's
    detection engineering: the detection system built across Chapters 11 to 13 becomes a production
    service, ready for Part 4's practical end-to-end implementation.
