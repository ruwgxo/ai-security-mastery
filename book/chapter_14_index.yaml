chapter_overview:
  number: 14
  title: Production Deployment
  part: 'Part 3: Detection Engineering for AI'
  position: Chapter 14 of 4 in Part 3; final chapter of Part 3
  purpose: |
    Chapter 13 ended with the behavioural monitoring gateway: a complete logical architecture that
    specifies which detector runs at which tier and what the request hot path reads. It is complete
    as a design and incomplete as a system. A logical architecture does not survive contact with
    production load, production failures, and production cost without the engineering this chapter
    provides. Chapter 14 is that engineering.

    The core argument of Chapter 14 is that deployment is a distinct discipline from detection, and a
    detection system that is correct in principle fails in production if the deployment concerns are
    unaddressed. A detector that adds too much latency is disabled for making the API slow. A gateway
    with no fail-open/fail-closed policy either blocks all traffic or passes all traffic the moment a
    detector errors. A system with no circuit breakers cascades one detector's failure into a total
    outage. A system with no observability cannot be operated, tuned, or trusted. A system with no
    cost discipline is switched off when the bill arrives. Each of these is a way a correct detection
    system dies in production, and each is addressed by a deployment concern in this chapter.

    The chapter is structured to move from placement to performance to resilience to operability to
    cost. It begins by establishing what production adds to the logical architecture, then covers the
    architecture patterns (API gateway, sidecar, inline) and the integration points that place
    detection in the request path. It then engineers the performance: the latency budget the inline
    tier must meet, and the throughput and horizontal scaling that hold under load. It builds the
    resilience: the fail-open versus fail-closed decision, and high availability with circuit
    breakers and graceful degradation. It makes the system operable: the observability stack of
    metrics, logging, and tracing, and the production monitoring dashboard. It makes the system
    affordable: the cost optimisation of sampling, caching, and batching. And it closes with the
    production gateway capstone that assembles the whole into a running service meeting its latency,
    availability, and cost targets -- the artifact that completes Part 3 and that Part 4 builds on.
