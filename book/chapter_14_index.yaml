chapter_completion_criteria:
  knowledge:
    - Explain why a complete logical architecture is not yet a production system and what the deployment
      concerns add
    - Describe the API gateway, sidecar, and inline architecture patterns and their trade-offs
    - Distinguish pre-processing from post-processing detection and state which detectors belong at each
      point
    - Explain the sub-50ms P99 latency budget and why tail latency governs the constraint
    - Describe horizontal scaling and why the stateless inline tier scales more cleanly than the stateful
      tiers
    - Explain the fail-open versus fail-closed decision and why it is made per detector and per tier
    - Describe circuit breakers and graceful degradation and how they prevent a detector failure from
      cascading
    - Explain why observability is the precondition for operating and trusting the detection system
    - Describe the cost drivers and how sampling, caching, and batching reduce cost without sacrificing
      critical coverage
  skills:
    - Select an architecture pattern by latency budget, ownership, and scaling requirements
    - Place each detector at the correct pre-processing or post-processing integration point
    - Budget the inline latency across detectors and measure P99 against the sub-50ms target
    - Plan horizontal scaling of the stateless and stateful detection tiers with backpressure
    - Implement a fail-open versus fail-closed policy per detector and tier
    - Implement circuit breakers with graceful degradation and bulkhead isolation
    - Instrument the gateway with metrics, logging, and tracing without violating the latency budget
    - Build the production monitoring dashboard with SLO-driven alerting and on-call runbooks
    - Apply sampling, caching, and batching to keep the tiers affordable with a cost analysis
    - Assemble and validate the production detection gateway against its latency, availability, and cost
      targets
  security_mindset:
    - Recognise that deployment is a distinct discipline and a correct detection system dies in production
      if the deployment concerns are unaddressed
    - Internalise that the latency budget is a hard constraint that governs what can run inline, not a
      target to approach
    - Understand that an unspecified failure mode is a failure mode chosen by the bug, so fail-open/fail-closed
      must be decided deliberately per detector
    - Appreciate that a detection system that cannot be observed cannot be operated, tuned, or trusted
    - Recognise that cost discipline is a survival requirement because a detection system with no cost
      bounds is switched off when the bill arrives
