      - 'Pre-vs-post detector placement table: which detector integrates at which point and blocking versus
        non-blocking'
      - Integration point failure-isolation wrapper
    security_preview: |
      Section 14.03 determines where in the request lifecycle each detector runs -- pre-processing to
      block the attempt before the model call, post-processing to catch success in the output. The
      placement decides which detectors can block and which can only alert, and it must isolate each
      hook so a detection fault does not break the request path.
  - section_number: 4
    title: 'Latency Engineering: Meeting the Sub-50ms P99 Budget'
    filename: section_14_04_latency_engineering.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1404 Latency Engineering) by Raghav
      Dinesh'
    estimated_pages: 7
    topics:
      - The sub-50ms P99 latency budget from Chapter 11 and why it is a hard constraint
      - 'P50, P95, P99: why the tail latency governs the user experience'
      - 'Budgeting the inline tier: allocating the latency budget across inline detectors'
      - 'Measuring latency correctly: percentiles, not averages, under load'
      - 'Latency optimisation: precomputed summaries, caching, parallel detector execution'
      - Why large-state detectors cannot run inline (the 13.01 coupling, engineered)
      - 'Timeouts as a latency guarantee: bounding the worst case per detector'
      - Load testing the latency budget before production
    key_concepts:
      - 'The sub-50ms P99 budget from Chapter 11 is a hard constraint, not a target: a detector that exceeds
        it is removed for degrading the API, which governs what can run inline'
      - Tail latency (P99) governs the user experience, not the average, because the slowest requests
        are the ones users notice, so latency is measured and budgeted at the tail
      - The inline latency budget is allocated across the inline detectors, and each must fit its allocation
        -- precomputed summaries and parallel execution are how the inline tier stays within budget
      - Timeouts bound the worst case per detector, turning an unbounded slow detector into a bounded
        one that fails within the budget rather than blowing it, at the cost of a fail-open/fail-closed
        decision on timeout
    deliverables:
      - latency_budget_engine.py -- allocates the inline latency budget across detectors and measures
        P99 against the sub-50ms target
      - 'Latency budget allocation table: the inline budget divided across the inline detectors with per-detector
        allocations'
      - 'Percentile latency measurement harness: P50/P95/P99 under load'
      - Per-detector timeout configuration for worst-case bounding
    security_preview: |
      Section 14.04 engineers the latency constraint that governs the whole inline tier. The sub-50ms
      P99 budget from Chapter 11 is a hard limit: it decides what can run inline, it is measured at the
      tail rather than the average, and it is enforced through budget allocation, parallel execution,
      and per-detector timeouts that bound the worst case.
  - section_number: 5
    title: Throughput and Horizontal Scaling
    filename: section_14_05_throughput_scaling.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1405 Throughput and Horizontal Scaling)
      by Raghav Dinesh'
    estimated_pages: 6
    topics:
      - 'Throughput: requests per second the detection gateway must sustain'
      - 'Horizontal scaling: adding instances to sustain load versus vertical scaling'
      - Statelessness of the inline tier and why it scales horizontally cleanly
      - Scaling the near-real-time and batch tiers with shared state
      - Load balancing across gateway instances
      - Autoscaling on load and the scaling signal
      - Backpressure when load exceeds capacity
      - 'Capacity planning: sizing the tiers for peak load'
    key_concepts:
      - Throughput is the requests-per-second the gateway must sustain, and horizontal scaling -- adding
        instances -- is how it is met, because the inline tier is stateless and scales cleanly by replication
      - The inline tier is stateless (it reads precomputed summaries and scores requests) so any instance
        can handle any request, which is what makes horizontal scaling of the hot path clean
      - The near-real-time and batch tiers hold shared state, so scaling them requires coordinating that
        state rather than simply replicating, a harder scaling problem than the stateless inline tier
      - Backpressure handles load exceeding capacity gracefully -- shedding or queuing rather than collapsing
        -- and autoscaling adds capacity on a load signal to meet peak throughput without over-provisioning
    deliverables:
      - horizontal_scaling_planner.py -- models throughput and plans horizontal scaling of the detection
        tiers
      - 'Throughput and scaling table: the scaling model, statefulness, and scaling difficulty per tier'
      - Load balancing and autoscaling configuration reference
      - Backpressure and capacity-planning calculator
    security_preview: |
      Section 14.05 scales the gateway to production load. The stateless inline tier scales cleanly by
      replication, the stateful near-real-time and batch tiers scale by coordinating shared state, and
      backpressure and autoscaling keep the system sustaining peak throughput without collapsing under
      load or over-provisioning for it.
  - section_number: 6
    title: 'Failure Modes: Fail-Open versus Fail-Closed'
    filename: section_14_06_failure_modes.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1406 Failure Modes) by Raghav Dinesh'
    estimated_pages: 7
    topics:
      - What happens when a detector errors, times out, or is unavailable
      - 'Fail-open: pass the request when detection fails -- availability over security'
      - 'Fail-closed: block the request when detection fails -- security over availability'
      - The decision per detector and per tier, not a single global policy
      - 'Fail-open risk: admitting the attack the failed detector would have caught'
      - 'Fail-closed risk: denying service to legitimate traffic on a detector fault'
      - Timeout as a failure mode and its fail-open/fail-closed handling
      - 'Degraded-mode operation: which detectors are essential and which are droppable'
    key_concepts:
      - When a detector errors, times out, or is unavailable, the gateway must do something deliberate
        -- an unspecified failure mode is a failure mode chosen by the bug
      - Fail-open passes the request when detection fails, favouring availability and risking admitting
        the attack the failed detector would have caught; fail-closed blocks it, favouring security and
        risking denying legitimate service
      - The fail-open versus fail-closed choice is a security-versus-availability decision made per detector
        and per tier, because a critical security detector and a best-effort enrichment detector warrant
        opposite policies
      - Degraded-mode operation classifies detectors as essential (fail-closed) or droppable (fail-open),
        so a partial failure degrades gracefully to the essential detectors rather than failing the whole
        gateway one way for everything
    deliverables:
      - fail_open_closed_policy.py -- the fail-open versus fail-closed decision engine per detector and
        tier
      - 'Fail-open vs fail-closed decision table: the policy per detector class with its risk'
      - 'Degraded-mode detector classification: essential versus droppable detectors'
      - Timeout-to-failure-policy mapping
    security_preview: |
      Section 14.06 makes the failure behaviour deliberate. When a detector errors or times out, the
      gateway fails open (availability, risk admitting the attack) or fails closed (security, risk
      denying service), and the choice is made per detector and per tier so a critical detector and a
      best-effort one get opposite policies rather than one global default.
  - section_number: 7
    title: High Availability, Circuit Breakers, and Graceful Degradation
    filename: section_14_07_high_availability.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1407 High Availability and Circuit Breakers)
      by Raghav Dinesh'
    estimated_pages: 7
    topics:
      - 'High availability: keeping the detection gateway serving through component failures'
      - 'Circuit breakers: cutting off a failing detector before it cascades'
      - 'The circuit breaker states: closed, open, half-open'
      - 'Graceful degradation: shedding non-essential detectors under stress'
      - Preventing a slow or failing detector from taking down the gateway
      - Redundancy and failover for the detection tiers
      - 'Bulkheads: isolating detector failures so one cannot exhaust shared resources'
      - Health checks and readiness for the detection gateway
    key_concepts:
      - 'High availability keeps the detection gateway serving through component failures, and circuit
        breakers are the primary mechanism: they cut off a failing detector before its failures cascade
        into the whole gateway'
      - A circuit breaker moves between closed (normal), open (detector cut off after repeated failures),
        and half-open (testing recovery), so a persistently failing detector is isolated rather than repeatedly
        retried into a cascade
      - Graceful degradation sheds non-essential detectors under stress, keeping the essential detection
        path serving even when the full detection suite cannot run, which is the resilience counterpart
        to the degraded-mode classification of 14.06
      - Bulkheads isolate detector failures so one failing detector cannot exhaust the shared resources
        (threads, connections) the others need, preventing a single detector fault from starving the whole
        gateway
    deliverables:
      - circuit_breaker.py -- circuit breakers with closed/open/half-open states and graceful degradation
        for detector failures
      - 'Circuit breaker state machine reference: the transitions and thresholds'
      - 'Graceful-degradation policy: which detectors are shed under stress and in what order'
      - Bulkhead and health-check configuration for the detection gateway
    security_preview: |
      Section 14.07 makes the gateway resilient. Circuit breakers cut off a failing detector before it
      cascades, graceful degradation sheds non-essential detectors under stress to keep the essential
      path serving, and bulkheads isolate failures so one detector cannot starve the others -- turning
      a detector fault from a gateway outage into a bounded, recoverable event.
  - section_number: 8
    title: 'Observability: Metrics, Logging, and Tracing'
    filename: section_14_08_observability.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1408 Observability) by Raghav Dinesh'
    estimated_pages: 6
    topics:
      - Why a detection system you cannot see you cannot operate or trust
      - 'Metrics: detection rates, latencies, error rates, throughput per detector'
      - 'Logging: structured detection events for audit and investigation'
      - 'Tracing: following a request through the detection tiers'
      - 'The golden signals for a detection gateway: latency, traffic, errors, saturation'
      - Instrumenting each detector and each tier without adding latency
      - Correlating detection signals across the request lifecycle
      - Observability as the precondition for tuning (Chapter 17)
    key_concepts:
      - A detection system that cannot be observed cannot be operated, tuned, or trusted -- observability
        is the precondition for running the system, not optional instrumentation
      - 'Metrics, logging, and tracing are complementary: metrics give aggregate health (rates, latencies,
        errors), logging gives per-event detail for audit and investigation, and tracing follows a single
        request through the detection tiers'
      - The golden signals -- latency, traffic, errors, saturation -- are the core metrics for a detection
        gateway, giving a compact picture of its health that alerting is built on
      - Instrumentation must not itself add latency to the inline tier, so observability is designed to
        measure the hot path cheaply -- the same latency discipline applied to the monitoring of the system
    deliverables:
      - observability_stack.py -- metrics, logging, and tracing instrumentation for the detection gateway
      - 'Golden-signals metric reference: latency, traffic, errors, and saturation per detector and tier'
      - Structured detection-event logging schema
      - Request-tracing configuration across the detection tiers
    security_preview: |
      Section 14.08 makes the system observable, which is the precondition for operating and trusting it.
      Metrics give aggregate health, logging gives per-event detail, and tracing follows a request
      through the tiers -- instrumented cheaply so the observability of the hot path does not itself
      violate the latency budget it measures.
  - section_number: 9
    title: The Production Monitoring Dashboard
    filename: section_14_09_monitoring_dashboard.yaml
    note: '20260121 | AI Security: Production Deployment (Section 1409 The Production Monitoring Dashboard)
