      - 'Sampling safety guide: where sampling is safe and where every request must be checked'
      - Cost analysis and optimisation report generator
    security_preview: |
      Section 14.10 keeps the detection system affordable, which keeps it alive. Sampling runs expensive
      analytics on a representative subset, caching reuses results, and batching amortises overhead --
      applied where the cost-versus-coverage trade-off is safe, so the security-critical inline checks
      still run on every request while the expensive tiers stay affordable.
