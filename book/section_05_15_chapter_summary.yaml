implementations:

  implementation_01:
    title: "Enterprise LLM Threat Model Generator (STRIDE)"
    filename: "enterprise_threat_model.py"
    purpose: |
      Complete STRIDE threat model generator for an LLM deployment. Takes a
      DeploymentConfig dataclass specifying system properties (RAG enabled,
      plugins enabled, public-facing, data sensitivity tier, etc.) and
      automatically populates all six STRIDE categories with applicable threats,
      OWASP/ATLAS mappings, controls, and residual risk notes.
      Exports a structured threat model report as YAML and a Markdown summary.
    language: "python"
    code: |
      """
      Enterprise LLM Threat Model Generator — STRIDE for LLM deployments.
      Input: DeploymentConfig. Output: populated STRIDE threat model + risk register.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional


      @dataclass
      class DeploymentConfig:
          name: str
          public_facing: bool = False
          rag_enabled: bool = False
          plugins_enabled: bool = False
          agentic: bool = False
          fine_tuned_on_sensitive_data: bool = False
          data_sensitivity: str = "general"   # general / user_data / financial / medical
          base_model_source: str = "huggingface"
          exposes_logprobs: bool = False
          llm_output_rendered_in_ui: bool = False


      @dataclass
      class STRIDEThreat:
          category: str
          threat_id: str
          description: str
          conditions: List[str]    # deployment attributes that trigger this threat
          owasp: List[str]
          atlas: List[str]
          likelihood: str
          impact: str
          preventive_controls: List[str]
          detective_controls: List[str]
          residual_risk: str


      THREAT_LIBRARY: List[STRIDEThreat] = [
          # SPOOFING
          STRIDEThreat("Spoofing", "S-001",
              "API key theft enables impersonation of authorised caller",
              [], ["LLM05"], ["AML.T0012"],
              "medium", "high",
              ["Short-lived API tokens; key rotation policy; IP allowlisting"],
              ["Auth log geo/time anomaly detection"],
              "Phishing of credentials — medium residual; mitigate with MFA"),
          # TAMPERING
          STRIDEThreat("Tampering", "T-001",
              "Direct prompt injection overrides system intent via user input",
              ["public_facing"], ["LLM01"], ["AML.T0051"],
              "high", "high",
              ["Input injection classifier; role separation in system/user prompts"],
              ["Injection classifier score > 0.7 on user input"],
              "Novel injection patterns — medium residual"),
          STRIDEThreat("Tampering", "T-002",
              "Indirect injection via retrieved document plants adversary instruction",
              ["rag_enabled"], ["LLM01"], ["AML.T0054"],
              "medium", "high",
              ["Injection scanner on RAG content before context assembly"],
              ["Injection scanner score > 0.6 on fetched content"],
              "Low FP — very low residual with scanner deployed"),
          STRIDEThreat("Tampering", "T-003",
              "Training data poisoning introduces backdoor in next model version",
              ["fine_tuned_on_sensitive_data"], ["LLM03"], ["AML.T0020", "AML.T0018"],
              "low", "critical",
              ["Dataset hash verification; label distribution monitoring; IAM on training data"],
              ["Unauthorised write to training data path; label KL divergence alert"],
              "Insider threat residual — transfer via SIEM alerting"),
          # REPUDIATION
          STRIDEThreat("Repudiation", "R-001",
              "Agentic action taken without attributable immutable audit record",
              ["agentic"], ["LLM08"], ["AML.T0053"],
              "medium", "medium",
              ["Every agent action generates immutable audit log with session context"],
              ["Missing action audit record alert"],
              "Log integrity — transfer via SIEM centralisation"),
          # INFORMATION DISCLOSURE
          STRIDEThreat("Information Disclosure", "I-001",
              "System prompt extracted via elicitation prompts",
              [], ["LLM06"], ["AML.T0056"],
              "high", "medium",
              ["System prompt non-disclosure instruction; input extraction phrase classifier"],
              ["Extraction phrase pattern match on input; system prompt fragment in output"],
              "Determined adversary with many queries — low residual with both controls"),
          STRIDEThreat("Information Disclosure", "I-002",
              "Training data verbatim recall exposes PII or credentials",
              ["fine_tuned_on_sensitive_data"], ["LLM06"], ["AML.T0037"],
              "medium", "high",
              ["DP training for fine-tuned versions; canary tokens in training data"],
              ["Output PII scanner; canary token recall event"],
              "Approximate recall not caught by PII scanner — medium residual"),
          STRIDEThreat("Information Disclosure", "I-003",
              "Model extraction campaign reconstructs proprietary model via API",
              ["public_facing"], ["LLM10"], ["AML.T0025", "AML.T0040"],
              "medium", "critical",
              ["Logprob disable for external callers; strict per-key rate limiting"],
              ["Volume + diversity + one-shot pattern detection per API key"],
              "Slow extraction under rate limit — medium residual; disable logprobs"),
          STRIDEThreat("Information Disclosure", "I-004",
              "LLM output contains unsanitised sensitive data rendered in UI (XSS vector)",
              ["llm_output_rendered_in_ui"], ["LLM02"], [],
              "medium", "high",
              ["Output sanitisation before UI rendering; content-type enforcement"],
              ["Output content scanner for script injection patterns"],
              "Novel rendering exploits — medium residual"),
          # DENIAL OF SERVICE
          STRIDEThreat("Denial of Service", "D-001",
              "Context flooding and sponge inputs exhaust compute and billing",
              [], ["LLM04"], ["AML.T0029"],
              "high", "medium",
              ["Hard token limit per request; per-key TPM rate limit; context budget"],
              ["Token rate 3x rolling average; cost per minute 3x baseline; p99 latency spike"],
              "Burst under rate limit — accept with billing alarm at 2x baseline"),
          # ELEVATION OF PRIVILEGE
          STRIDEThreat("Elevation of Privilege", "E-001",
              "Plugin confused deputy: adversary instructions trigger privileged plugin call",
              ["plugins_enabled"], ["LLM07"], ["AML.T0053"],
              "medium", "critical",
              ["Plugin parameter allowlist validation; minimal plugin permissions"],
              ["Plugin call parameter anomaly; irreversible action without confirmation record"],
              "Zero with correct allowlist implementation — target state"),
          STRIDEThreat("Elevation of Privilege", "E-002",
              "Excessive agency: model takes high-impact action beyond intended scope",
              ["agentic"], ["LLM08"], ["AML.T0053"],
              "medium", "critical",
              ["Irreversibility gate on high-impact actions; human confirmation for critical ops"],
              ["Action type in prohibited category without confirmation record"],
              "User-approved high-impact actions — accept with confirmation gate"),
      ]


      def generate_threat_model(cfg: DeploymentConfig) -> Dict:
          cfg_flags = {k: v for k, v in cfg.__dict__.items() if isinstance(v, bool) and v}
          applicable = []
          for t in THREAT_LIBRARY:
              if not t.conditions or any(c in cfg_flags for c in t.conditions):
                  applicable.append(t)

          by_category: Dict[str, List[STRIDEThreat]] = {}
          for t in applicable:
              by_category.setdefault(t.category, []).append(t)

          impact_rank = {"low": 1, "medium": 2, "high": 3, "critical": 4}
          risk_register = sorted(applicable,
              key=lambda t: -({"low":1,"medium":2,"high":3}[t.likelihood] *
                               impact_rank[t.impact]))

          return {
              "deployment": cfg.name,
              "config": cfg.__dict__,
              "threat_count": len(applicable),
              "by_category": {k: [t.__dict__ for t in v] for k, v in by_category.items()},
              "risk_register": [t.__dict__ for t in risk_register],
              "owasp_coverage": sorted(set(o for t in applicable for o in t.owasp)),
              "atlas_coverage": sorted(set(a for t in applicable for a in t.atlas)),
          }


      def print_threat_model(model: Dict) -> None:
          print(f"\n{'='*65}")
          print(f"ENTERPRISE LLM THREAT MODEL: {model['deployment']}")
          print(f"Threats identified: {model['threat_count']}")
          print(f"OWASP coverage: {model['owasp_coverage']}")
          print(f"ATLAS coverage: {model['atlas_coverage']}")
          for category, threats in model["by_category"].items():
              print(f"\n  {category} ({len(threats)} threats):")
              for t in threats:
                  print(f"    [{t['threat_id']}] {t['description'][:60]}")
                  print(f"           Likelihood: {t['likelihood']}  Impact: {t['impact']}")
                  print(f"           Detective: {t['detective_controls'][0][:55]}")


      def export_threat_model_yaml(model: Dict, path: str) -> None:
          import yaml
          with open(path, "w") as f:
              yaml.dump(model, f, allow_unicode=True, sort_keys=False)
          print(f"Threat model exported to {path}")


      if __name__ == "__main__":
          # Enterprise RAG deployment
          rag_cfg = DeploymentConfig(
              name="Enterprise-RAG-QA-Assistant",
              public_facing=False,
              rag_enabled=True,
              plugins_enabled=True,
              agentic=True,
              fine_tuned_on_sensitive_data=False,
              data_sensitivity="general",
              llm_output_rendered_in_ui=True,
          )
          model = generate_threat_model(rag_cfg)
          print_threat_model(model)
          export_threat_model_yaml(model, "enterprise_rag_threat_model.yaml")

          # Public-facing customer service bot (higher exposure)
          public_cfg = DeploymentConfig(
              name="Public-Customer-Service-LLM",
              public_facing=True,
              rag_enabled=True,
              plugins_enabled=False,
              agentic=False,
              fine_tuned_on_sensitive_data=True,
              data_sensitivity="user_data",
              exposes_logprobs=True,
              llm_output_rendered_in_ui=True,
          )
          model2 = generate_threat_model(public_cfg)
          print(f"\nPublic chatbot threats: {model2['threat_count']}")
          print(f"Additional vs RAG: {model2['threat_count'] - model['threat_count']} more threats triggered by public_facing + logprobs")

  implementation_02:
    title: "Framework Integration Map + Risk Prioritisation Matrix"
    filename: "framework_integration_map.py"
    purpose: |
      Two tools:
      (1) FrameworkIntegrationMap: for any given threat, returns the aligned
          OWASP LLM, ATLAS technique, NIST AI RMF function, and regulatory article.
          Supports querying by threat name, OWASP ID, or ATLAS technique ID.
      (2) RiskPrioritisationMatrix: scores all Chapter 5 threats by likelihood ×
          impact, adds detection effort, and computes ROI score. Outputs a sorted
          detection investment roadmap showing which threats to address first and why.
    language: "python"
    code: |
      """
      Framework Integration Map + Risk Prioritisation Matrix
      Cross-framework lookup and detection investment ranking.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional


      @dataclass
      class FrameworkEntry:
          threat_name: str
          owasp: List[str]
          atlas: List[str]
          nist_rmf_functions: List[str]
          eu_ai_act_articles: List[str]
          gdpr_articles: List[str]
          detection_control: str
          source_section: str


      FRAMEWORK_MAP: List[FrameworkEntry] = [
