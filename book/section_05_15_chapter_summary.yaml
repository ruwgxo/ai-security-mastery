      def lookup_by_owasp(owasp_id: str) -> List[FrameworkEntry]:
          return [e for e in FRAMEWORK_MAP if owasp_id in e.owasp]


      def lookup_by_atlas(atlas_id: str) -> List[FrameworkEntry]:
          return [e for e in FRAMEWORK_MAP if atlas_id in e.atlas]


      def lookup_by_threat(keyword: str) -> List[FrameworkEntry]:
          kl = keyword.lower()
          return [e for e in FRAMEWORK_MAP if kl in e.threat_name.lower()]


      def print_framework_entry(e: FrameworkEntry) -> None:
          print(f"\n  Threat: {e.threat_name}")
