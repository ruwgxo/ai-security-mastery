      """
      Chapter 5 Knowledge Assessment Quiz — 20 questions, 4 difficulty levels.
      Target: >= 80% (16/20) to proceed to Chapter 6.
      """

      from dataclasses import dataclass
      from typing import List, Optional


      @dataclass
      class Question:
          q_id: int
          block: str
          level: str        # L1-Definition / L2-Comprehension / L3-Application / L4-Analysis
          question: str
          options: List[str]
          correct: int      # 0-indexed
          explanation: str
          section_ref: str


      QUIZ: List[Question] = [
          # Block 1: Paradigm shift and attack surface
          Question(1, "Block 1", "L1-Definition",
              "Which of the following is NOT part of the eight-layer AI attack surface?",
              ["Training data", "Model API", "Network firewall rules", "Plugins and tools"],
              2,
              "Network firewall rules are traditional IT security. The eight AI attack surface layers span the ML lifecycle: training data, model weights, training pipeline, model API, prompt/context, output, plugins/tools, feedback/RLHF.",
              "Section 5.2"),
          Question(2, "Block 1", "L2-Comprehension",
              "Why is 'training data is code' the most important mental model shift in AI security?",
              ["Because training data is written in Python",
               "Because malicious training data executes arbitrary adversary intent persistently through model weights",
               "Because training data is stored in code repositories",
