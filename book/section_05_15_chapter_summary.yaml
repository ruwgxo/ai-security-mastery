              ["Article_15_accuracy_robustness"],
              [],
              "Token rate + billing cost anomaly (3x rolling avg)", "5.5 / 5.8"),
          FrameworkEntry("Supply Chain Compromise",
              ["LLM05"], ["AML.T0019", "AML.T0011"],
              ["MAP (supply chain risk)", "MEASURE_2.2 (artifact testing)"],
              ["Article_10_data_governance", "Article_15_cybersecurity"],
              ["Article_30_records_of_processing"],
              "SafeTensors format check + SHA-256 verification", "5.9"),
