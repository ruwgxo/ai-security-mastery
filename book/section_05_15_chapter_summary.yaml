# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    AI security is a superset of traditional security, not a replacement. Every
    traditional security concern (authentication, access control, availability)
    still applies. What is new is the eight-layer attack surface that extends
    from training data through model weights to production serving — and the five
    fundamental ways AI systems fail differently from software.

  takeaway_02: |
    The four frameworks — OWASP LLM Top 10, MITRE ATLAS, NIST AI RMF, and the
    regulatory stack — cover overlapping terrain from four perspectives. They are
    not alternatives: OWASP gives the risk checklist, ATLAS gives the detection
    logic, NIST AI RMF gives the governance process, and regulation gives the
    legal floor. A mature AI security programme satisfies all four simultaneously
    and produces a single set of artefacts that evidence each.

  takeaway_03: |
    Detection engineering is the connective tissue between threat knowledge and
    production protection. Understanding OWASP LLM01 is necessary but insufficient
    — what matters is the deployed injection classifier, the configured threshold,
    the tuned FP rate, and the alert playbook. Chapter 5 built the knowledge
    and the tools. Part 3 (Chapters 11-17) deploys them at production scale.

  takeaway_04: |
    The risk prioritisation matrix and detection investment roadmap eliminate
    analysis paralysis. Faced with dozens of threats, practitioners who implement
    Sprint 1 controls (SafeTensors check, DoS rate limit, injection classifier,
    plugin allowlist) in two weeks have addressed the highest-ROI threats before
    most organisations have finished their threat modelling workshop.

  takeaway_05: |
    Compliance is not security; security is not compliance. The EU AI Act Article 15
    compliance documentation does not protect the model. The GDPR Article 25 privacy
    by design statement does not prevent membership inference. The detection programme
    protects the model. The compliance documentation is the audit evidence that the
    detection programme exists and is operational — both are required.

  takeaway_06: |
    The enterprise threat model (STRIDE applied to RAG deployment) is the deliverable
    that connects all of Chapter 5. Every section's technical output — from the
    ATLAS Sigma rules to the bias audit to the ML SBOM — maps to a specific STRIDE
    category, OWASP risk, or NIST AI RMF function in that threat model. The threat
    model is not a document that gets filed — it is the living record of the security
    programme's scope and coverage.

  takeaway_07: |
    Prompt injection is LLM01 because it is the most prevalent LLM attack primitive
    and the entry point for most production LLM exploits. Chapter 6 takes 18 sections
    to cover it in full depth. Everything in Chapter 5 — the attack surface, the ATLAS
    techniques, the detection logic — is the prerequisite for understanding why
    prompt injection is so difficult to fully defend against and how to approach it.

  takeaway_08: |
    The security mindset Chapter 5 instils: (1) treat training data as untrusted
    code, (2) evaluate everything through the eight attack surface layers, (3) measure
    everything the MEASURE function requires, (4) translate every technical finding
    into management language, and (5) treat bias auditing as penetration testing.
    These five habits distinguish AI security engineers who build lasting programmes
    from those who address individual vulnerabilities in isolation.

