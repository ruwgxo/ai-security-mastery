  subsection_06:
    number: "5.15.6"
    title: "Chapter 6 Preview: Prompt Injection — Deep Dive"
    content: |
      why_prompt_injection_warrants_a_full_chapter: |
        LLM01 Prompt Injection is OWASP's top-ranked risk for good reason.
        It is not a single technique — it is a family of attack primitives that
        underlies the majority of LLM security incidents observed in production.
        Chapter 5 introduced it as OWASP LLM01 and as MITRE ATLAS AML.T0051
        and AML.T0054. Chapter 6 spends 18 sections on every variant, every
        obfuscation method, real-world documented examples, and the detection
        engineering required to catch each one.

      chapter_6_structure_preview:
        sections_01_02: "What prompt injection is and why traditional input validation fails"
        sections_03_05: "Direct injection variants: role override, jailbreak, data extraction, system prompt bypass"
        sections_06_08: "Indirect injection: web pages, RAG documents, email bodies, tool outputs"
        sections_09_10: "Multi-turn injection: conditioning attacks across conversation history"
        sections_11_12: "Obfuscation methods: encoding, fragmentation, context smuggling"
        sections_13_14: "Real-world documented examples with ATLAS technique mapping"
        sections_15_16: "Detection engineering: classifier design, semantic vs pattern-based detection"
        sections_17_18: "Defences: prompt hardening, input/output validation, context segregation"

      chapter_5_foundations_used_in_chapter_6:
        foundation_01: |
          Section 5.1 (AI attack surface) → Chapter 6 explains why the context window
          is both the attack surface and the only available defence boundary
        foundation_02: |
          Section 5.8 (AML.T0051, AML.T0054 detection specs) → Chapter 6 builds the
          production-grade injection classifier that operationalises those Sigma stubs
        foundation_03: |
          Section 5.14 (NIST AI RMF MEASURE 2.2 and 2.4) → Chapter 6 injection testing
          is a MEASURE 2.2 evaluation and the deployed classifier is MEASURE 2.4 monitoring

      the_coming_shift: |
        Chapter 5 was the map — the full terrain of AI security threats, frameworks,
        and regulatory obligations. Chapter 6 is the first deep dive: one threat,
        examined from every angle, with production detection engineering as the output.
        The shift from breadth to depth is the shift from threat landscape to threat response.

