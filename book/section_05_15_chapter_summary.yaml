          print(f"    Sections:     {e.source_section}")


      # -----------------------------------------------------------------------
      # Risk Prioritisation Matrix
      # -----------------------------------------------------------------------

      @dataclass
      class PriorityEntry:
          threat_name: str
          atlas_id: str
          likelihood: int     # 1-3
          impact: int         # 1-4
          effort_days: float  # implementation effort
          roi_score: float    # (likelihood * impact) / effort_days

          @property
          def priority_score(self) -> int:
              return self.likelihood * self.impact


      PRIORITY_TABLE: List[PriorityEntry] = [
          PriorityEntry("Supply chain RCE (AML.T0019)",          "AML.T0019", 2, 4, 1.0,  0.0),
          PriorityEntry("Denial of service (AML.T0029)",         "AML.T0029", 3, 3, 1.5,  0.0),
          PriorityEntry("Direct prompt injection (AML.T0051)",   "AML.T0051", 3, 3, 2.5,  0.0),
          PriorityEntry("Plugin confused deputy (AML.T0053)",    "AML.T0053", 2, 4, 1.5,  0.0),
          PriorityEntry("System prompt extraction (AML.T0056)",  "AML.T0056", 3, 2, 1.0,  0.0),
          PriorityEntry("Model extraction (AML.T0025)",          "AML.T0025", 2, 4, 3.5,  0.0),
          PriorityEntry("Indirect injection via RAG (AML.T0054)","AML.T0054", 2, 3, 2.5,  0.0),
          PriorityEntry("Insider artifact theft (AML.T0035)",    "AML.T0035", 1, 4, 1.0,  0.0),
          PriorityEntry("Training data poisoning (AML.T0020)",   "AML.T0020", 1, 4, 4.0,  0.0),
          PriorityEntry("Verbatim recall (AML.T0037)",           "AML.T0037", 2, 3, 4.0,  0.0),
          PriorityEntry("Membership inference (AML.T0048)",      "AML.T0048", 2, 3, 5.0,  0.0),
          PriorityEntry("Backdoor (AML.T0018)",                  "AML.T0018", 1, 4, 7.5,  0.0),
          PriorityEntry("Bias FNR disparity exploitation",       "N/A",       2, 3, 3.0,  0.0),
          PriorityEntry("Excessive agency (AML.T0053)",          "AML.T0053", 2, 4, 1.5,  0.0),
      ]

      for e in PRIORITY_TABLE:
          e.roi_score = round(e.priority_score / max(e.effort_days, 0.5), 2)


      def print_priority_matrix() -> None:
          sorted_p = sorted(PRIORITY_TABLE, key=lambda e: -e.roi_score)
          print(f"\n{'='*70}")
          print(f"RISK PRIORITISATION MATRIX (sorted by ROI = priority_score / effort_days)")
          print(f"{'Threat':40s}  {'P*I':>4}  {'Effort':>7}  {'ROI':>6}")
          print("-" * 70)
          for i, e in enumerate(sorted_p, 1):
              tier = "CRITICAL" if e.priority_score >= 8 else "HIGH" if e.priority_score >= 6 else "MEDIUM"
              print(f"{i:2d}. {e.threat_name[:38]:38s}  {e.priority_score:>4d}  "
                    f"{e.effort_days:>5.1f}d  {e.roi_score:>6.2f}  [{tier}]")


      if __name__ == "__main__":
          print("FRAMEWORK INTEGRATION MAP — Lookup Examples")
          print("="*55)
          print("\nQuery: OWASP LLM01")
          for e in lookup_by_owasp("LLM01"):
              print_framework_entry(e)
          print("\nQuery: AML.T0019")
          for e in lookup_by_atlas("AML.T0019"):
              print_framework_entry(e)
          print_priority_matrix()

