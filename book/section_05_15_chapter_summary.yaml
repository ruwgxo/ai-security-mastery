      def run_quiz(interactive: bool = True) -> None:
          score = 0
          results = []
          print(f"\n{'='*60}")
          print(f"CHAPTER 5 KNOWLEDGE ASSESSMENT — 20 Questions")
          print(f"Target: >= 16/20 (80%) to proceed to Chapter 6")
          print(f"{'='*60}\n")

          for q in QUIZ:
              print(f"Q{q.q_id:2d} [{q.block} — {q.level}]")
              print(f"   {q.question}")
              for i, opt in enumerate(q.options):
                  print(f"   {i+1}. {opt}")

              if interactive:
                  try:
                      ans = int(input("   Your answer (1-4): ").strip()) - 1
                  except (ValueError, KeyboardInterrupt):
                      ans = -1
              else:
                  ans = q.correct   # auto-answer for testing

              correct = ans == q.correct
              if correct:
                  score += 1
                  print(f"   CORRECT")
              else:
                  print(f"   INCORRECT — Answer: {q.correct+1}. {q.options[q.correct]}")
              print(f"   Explanation: {q.explanation[:100]}")
              print(f"   Reference: {q.section_ref}\n")
              results.append({"q_id": q.q_id, "correct": correct, "block": q.block})

          pct = score / len(QUIZ) * 100
          print(f"{'='*60}")
          print(f"FINAL SCORE: {score}/{len(QUIZ)} ({pct:.1f}%)")
          if pct >= 80:
              print(f"PASS — Ready to proceed to Chapter 6: Prompt Injection")
          else:
              missed = [r["section_ref"] if "section_ref" in r else "" for r in results if not r["correct"]]
              print(f"REVIEW REQUIRED — Score below 80%. Revisit sections before Chapter 6.")
          by_block: Dict[str, List] = {}
          for r in results:
              by_block.setdefault(r["block"], []).append(r["correct"])
          print(f"\nPer-block breakdown:")
          for block, corrects in by_block.items():
              b_pct = sum(corrects) / len(corrects) * 100
              print(f"  {block}: {sum(corrects)}/{len(corrects)} ({b_pct:.0f}%)")


      if __name__ == "__main__":
          run_quiz(interactive=False)   # set interactive=True for real use

