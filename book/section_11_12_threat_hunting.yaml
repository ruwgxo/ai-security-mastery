              ),
              recommended_cadence='monthly',
              atlas_technique_gap='AML.T0040 — sub-threshold extraction reconnaissance',
          ),

          'H3': HuntHypothesis(
              hypothesis_id='H3',
              name='Coordinated Timing Pattern — Multi-User Campaign Detection',
              attack_scenario=(
                  'Multiple accounts are submitting structurally similar prompts in a '
                  'coordinated pattern — interleaved across accounts at regular intervals — '
                  'to keep each individual account below per-user detection thresholds.'
              ),
              expected_pattern=(
                  'Three or more distinct user_ids submitting prompts with pairwise '
