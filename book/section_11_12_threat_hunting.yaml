                  '7. Flag sessions with drift > 0.30 in the direction of the known-bad centroid.'
              ),
              falsification_criterion=(
                  'No sessions with qualifying drift trajectory → '
                  'accumulated context injection not present in this period.'
              ),
              pivot_chain=(
                  'Confirmed finding → extract multi-turn prompt sequence → '
                  'Section 11.10 Phase 1 → sequence Sigma rule using Section 11.07 near/sequence operators → '
                  'add session examples to multi-turn test fixture corpus.'
              ),
              recommended_cadence='monthly',
              atlas_technique_gap='AML.T0051 — multi-turn indirect accumulated injection variant',
          ),

          'H5': HuntHypothesis(
              hypothesis_id='H5',
              name='Output Entropy Spike — Exfiltration via Response Patterns',
              attack_scenario=(
                  'An adversary who has successfully injected instructions is causing the '
                  'model to generate unusually high-entropy responses — consistent with '
                  'exfiltrating structured data (training data, system prompt content, '
