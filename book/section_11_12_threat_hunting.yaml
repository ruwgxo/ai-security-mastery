              ),
              expected_pattern=(
                  'A user whose output_entropy_avg is more than 2 standard deviations '
                  'above the fleet-wide output_entropy_avg for their (model, prompt_length_bucket) '
                  'cohort, with no corresponding Track 6 or Track 7 alert.'
              ),
              data_source='ai_session logs (output_entropy_avg) + model serving metrics (per-model baseline)',
              log_category='ai_session',
              analysis_method=(
                  '1. Compute fleet-wide output_entropy_avg and SD per (model_name, prompt_length_bucket). '
                  '2. For each user-session, compute z-score: (user_output_entropy - cohort_mean) / cohort_SD. '
                  '3. Flag sessions with z-score > 2.0. '
                  '4. Cross-reference against Track 6 and Track 7 alert history. '
                  '5. Review unflagged high-entropy sessions: examine prompt content and (if available) response content.'
              ),
              falsification_criterion=(
                  'No qualifying users in the output entropy outlier set → '
                  'no output exfiltration pattern detected; '
                  'Track 6/7 is catching all anomalous output entropy patterns.'
              ),
              pivot_chain=(
                  'Confirmed finding → document output entropy pattern → '
                  'Section 11.10 Phase 1 → output entropy Sigma rule '
                  '(full implementation requires Ch14 output logs; partial rule on session-level metric now) → '
                  'add to detection backlog as P1 item pending Ch14 output validation layer.'
              ),
              recommended_cadence='monthly',
              atlas_technique_gap='AML.T0051 + LLM06 — output exfiltration via successful injection',
          ),
      }

      # ---------------------------------------------------------------------------
      # Hunt runner (skeleton — analysis steps are analyst-executed)
      # ---------------------------------------------------------------------------

      def run_hunt(
          hypothesis_id: str,
          analyst: str,
          window_days: int,
      ) -> HuntReport:
          '''
          Prints the hunt procedure for the specified hypothesis and creates a
          pending hunt report. The analyst executes the analysis steps and then
          calls record_outcome() to complete the report.
          '''
          hyp = HYPOTHESES.get(hypothesis_id)
          if not hyp:
              print(f'Unknown hypothesis: {hypothesis_id}')
              sys.exit(1)

          hunt_id = f'hunt-{date.today().isoformat()}-{hypothesis_id.lower()}'
          window_end = date.today()
          window_start = window_end - timedelta(days=window_days)

          print(f'\n=== Hunt Session: {hunt_id} ===')
          print(f'Analyst:    {analyst}')
          print(f'Hypothesis: {hyp.hypothesis_id} — {hyp.name}')
          print(f'Window:     {window_start} to {window_end} ({window_days} days)')
          print(f'\nScenario:\n  {hyp.attack_scenario}')
          print(f'\nExpected pattern:\n  {hyp.expected_pattern}')
          print(f'\nData source: {hyp.data_source} ({hyp.log_category})')
          print(f'\nAnalysis procedure:')
          for line in hyp.analysis_method.split('. '):
              if line.strip():
                  print(f'  {line.strip()}{"." if not line.strip().endswith(".") else ""}')
          print(f'\nFalsification criterion:\n  {hyp.falsification_criterion}')
          print(f'\nPivot chain if confirmed:\n  {hyp.pivot_chain}')
          print(f'\nATLAS gap targeted: {hyp.atlas_technique_gap}')
          print(f'\n--- Execute the analysis steps above, then record outcome ---')
          print(f'Use: python3 threat_hunting_playbook.py --record {hunt_id} '
                f'--outcome <confirmed_finding|coverage_validated|inconclusive> '
                f'--description "..."')

          # Create pending report
          report = HuntReport(
              hunt_id=hunt_id,
              hypothesis_id=hypothesis_id,
              analyst=analyst,
              hunt_date=date.today().isoformat(),
              data_window=f'{window_start} to {window_end} ({window_days} days)',
              corpus_size=0,   # updated by analyst
              outcome='inconclusive',
              finding_description='PENDING — analyst has not yet recorded outcome.',
              evidence_samples=[],
              next_action='no_action',
          )
          _save_report(report)
          return report

      def record_outcome(
          hunt_id: str,
          outcome: HuntOutcome,
          description: str,
          corpus_size: int = 0,
          evidence_samples: list[str] | None = None,
          next_action: NextAction = 'validate_quarterly',
      ) -> HuntReport:
          report_path = REPORTS_DIR / f'{hunt_id}.json'
          if not report_path.exists():
              print(f'Hunt report not found: {hunt_id}')
              sys.exit(1)
          with open(report_path) as f:
              data = json.load(f)
          data['outcome'] = outcome
          data['finding_description'] = description
          data['corpus_size'] = corpus_size
          data['evidence_samples'] = evidence_samples or []
          data['next_action'] = next_action
          report = HuntReport(**data)
          _save_report(report)

          print(f'\nHunt {hunt_id} outcome recorded: {outcome}')
          if outcome == 'confirmed_finding':
              print(f'  Next action: {next_action}')
              if next_action == 'backlog_p1':
                  item_id = f'HUNT-{hunt_id.upper()}'
                  print(f'  → Add to detection_gap_prioritiser.py backlog as P1 item: {item_id}')
                  print(f'  → Run Section 11.10 workflow Phase 1 with this finding as hypothesis input.')
          elif outcome == 'coverage_validated':
              print(f'  Coverage validated for hypothesis {data["hypothesis_id"]}.')
              print(f'  → Record in quarterly coverage review. No rule action required.')
          return report

      def list_hypotheses() -> None:
          print('\nAI Threat Hunting Playbook — Five Hypotheses\n')
          print(f'{"ID":<5} {"Cadence":<12} {"ATLAS Gap":<50} Name')
          print('-' * 100)
          for hyp in HYPOTHESES.values():
              gap_short = (hyp.atlas_technique_gap[:48] + '..') if len(hyp.atlas_technique_gap) > 48 else hyp.atlas_technique_gap
              print(f'{hyp.hypothesis_id:<5} {hyp.recommended_cadence:<12} {gap_short:<50} {hyp.name}')

      def _save_report(report: HuntReport) -> None:
          REPORTS_DIR.mkdir(parents=True, exist_ok=True)
          path = REPORTS_DIR / f'{report.hunt_id}.json'
          with open(path, 'w') as f:
              json.dump(report.__dict__, f, indent=2)

      def print_report(hunt_id: str) -> None:
          path = REPORTS_DIR / f'{hunt_id}.json'
          if not path.exists():
              print(f'Report not found: {hunt_id}')
              return
          with open(path) as f:
              data = json.load(f)
          print(f'\nHunt Report: {hunt_id}')
          for k, v in data.items():
              print(f'  {k}: {v}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='AI threat hunting playbook')
          parser.add_argument('--list', action='store_true', help='List all hypotheses')
          parser.add_argument('--run', metavar='HYPOTHESIS_ID',
                              help='Run a hypothesis (H1-H5 or all)')
          parser.add_argument('--analyst', default='ruwgxo', help='Analyst GitHub handle')
          parser.add_argument('--window', type=int, default=7,
                              help='Analysis window in days (default: 7)')
          parser.add_argument('--record', metavar='HUNT_ID',
                              help='Record outcome for a completed hunt')
          parser.add_argument('--outcome', choices=['confirmed_finding', 'coverage_validated', 'inconclusive'])
          parser.add_argument('--description', default='', help='Finding description')
          parser.add_argument('--corpus-size', type=int, default=0)
          parser.add_argument('--next-action',
                              choices=['new_rule', 'backlog_p1', 'validate_quarterly', 'no_action'],
                              default='validate_quarterly')
          parser.add_argument('--report', metavar='HUNT_ID', help='Print a hunt report')
          args = parser.parse_args()

          if args.list:
              list_hypotheses()
              return 0

          if args.run:
              if args.run == 'all':
                  for hyp_id in HYPOTHESES:
                      run_hunt(hyp_id, args.analyst, args.window)
              elif args.run in HYPOTHESES:
                  run_hunt(args.run, args.analyst, args.window)
              else:
                  print(f'Unknown hypothesis: {args.run}. Use --list to see available hypotheses.')
                  return 1
              return 0

          if args.record:
              if not args.outcome:
                  print('--outcome required with --record')
                  return 1
              record_outcome(
                  args.record, args.outcome, args.description,  # type: ignore[arg-type]
                  args.corpus_size, next_action=args.next_action,  # type: ignore[arg-type]
              )
              return 0

          if args.report:
              print_report(args.report)
              return 0

          parser.print_help()
          return 1

      if __name__ == '__main__':
          sys.exit(main())

  deliverable_2:
    id: 'D11.12.2'
    filename: 'prompt_cluster_analyser.py'
    description: >
      Embedding-based prompt clustering for unsupervised anomaly detection in the
      prompt corpus. Implements DBSCAN clustering on prompt embeddings, measures
      cluster centroid proximity to the known-bad embedding centroid, and flags
      clusters that are close but undetected by deployed rules. Supports Hypothesis H1
      and the cross-session coordinated pattern detection in Hypothesis H3.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'numpy>=1.26'
      - 'scikit-learn>=1.4'
    code: |
      #!/usr/bin/env python3
      '''prompt_cluster_analyser.py
      DBSCAN-based prompt clustering for threat hunting.
      Identifies anomalous prompt clusters by proximity to known-bad embedding centroid.
      Supports Hypotheses H1 (injection variant clusters) and H3 (coordinated patterns).
      Chapter 11, Section 11.12 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 prompt_cluster_analyser.py --corpus prompts.json --centroid known_bad.npy
        python3 prompt_cluster_analyser.py --demo
      '''

      from __future__ import annotations
      import argparse
      import json
      import sys
      from dataclasses import dataclass

      import numpy as np

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class ClusterResult:
          cluster_id: int
          size: int
          centroid: np.ndarray
          centroid_distance_to_known_bad: float
          flagged_fraction: float       # fraction already flagged by deployed rules
          unflagged_count: int
          proximity_label: str          # 'high' | 'medium' | 'low'
          anomalous: bool               # True if high-proximity and unflagged_count > 0

      @dataclass
      class PromptRecord:
          prompt_id: str
          embedding: np.ndarray
          already_flagged: bool         # gateway_action != 'pass'
          user_id: str = ''

      # ---------------------------------------------------------------------------
      # Clustering
      # ---------------------------------------------------------------------------

      def load_corpus(corpus_path: str) -> list[PromptRecord]:
          '''
          Load prompt corpus from JSON file.
          Expected format: list of {prompt_id, embedding (list[float]),
          already_flagged (bool), user_id (str)}.
          '''
          with open(corpus_path) as f:
              raw = json.load(f)
          records: list[PromptRecord] = []
          for item in raw:
              records.append(PromptRecord(
                  prompt_id=item['prompt_id'],
                  embedding=np.array(item['embedding'], dtype=np.float32),
                  already_flagged=item.get('already_flagged', False),
                  user_id=item.get('user_id', ''),
              ))
          return records

      def run_dbscan(
          records: list[PromptRecord],
          eps: float = 0.15,
          min_samples: int = 5,
      ) -> dict[int, list[PromptRecord]]:
          '''
          Run DBSCAN clustering on prompt embeddings.
          Returns mapping of cluster_id -> list of PromptRecord.
          Cluster -1 contains noise points (no cluster).
          '''
          from sklearn.cluster import DBSCAN

          embeddings = np.stack([r.embedding for r in records])
          # DBSCAN with cosine metric (1 - cosine_similarity as distance)
          model = DBSCAN(eps=eps, min_samples=min_samples, metric='cosine', n_jobs=-1)
          labels = model.fit_predict(embeddings)

          clusters: dict[int, list[PromptRecord]] = {}
          for record, label in zip(records, labels):
              clusters.setdefault(int(label), []).append(record)
          return clusters

      def compute_centroid(records: list[PromptRecord]) -> np.ndarray:
          '''Compute mean embedding centroid for a list of records.'''
          embeddings = np.stack([r.embedding for r in records])
          centroid = embeddings.mean(axis=0)
          return centroid / (np.linalg.norm(centroid) + 1e-8)

      def cosine_distance(a: np.ndarray, b: np.ndarray) -> float:
          '''Cosine distance (1 - cosine similarity) between two unit vectors.'''
          a = a / (np.linalg.norm(a) + 1e-8)
          b = b / (np.linalg.norm(b) + 1e-8)
          return float(1.0 - np.dot(a, b))

      def analyse_clusters(
          clusters: dict[int, list[PromptRecord]],
          known_bad_centroid: np.ndarray,
          high_proximity_threshold: float = 0.20,
          medium_proximity_threshold: float = 0.40,
      ) -> list[ClusterResult]:
          results: list[ClusterResult] = []
          for cluster_id, records in clusters.items():
              if cluster_id == -1:
                  continue  # skip noise
              centroid = compute_centroid(records)
              dist = cosine_distance(centroid, known_bad_centroid)
              flagged = sum(1 for r in records if r.already_flagged)
              unflagged = len(records) - flagged
              flagged_frac = flagged / len(records) if records else 0.0

              if dist <= high_proximity_threshold:
                  prox_label = 'high'
              elif dist <= medium_proximity_threshold:
                  prox_label = 'medium'
              else:
                  prox_label = 'low'

              anomalous = prox_label == 'high' and unflagged > 0

              results.append(ClusterResult(
                  cluster_id=cluster_id,
                  size=len(records),
                  centroid=centroid,
                  centroid_distance_to_known_bad=round(dist, 4),
                  flagged_fraction=round(flagged_frac, 3),
                  unflagged_count=unflagged,
                  proximity_label=prox_label,
                  anomalous=anomalous,
              ))

          results.sort(key=lambda r: r.centroid_distance_to_known_bad)
          return results

      # ---------------------------------------------------------------------------
      # Coordinated pattern detection (Hypothesis H3)
      # ---------------------------------------------------------------------------

      def detect_coordinated_patterns(
          records: list[PromptRecord],
          window_minutes: int = 15,
          similarity_threshold: float = 0.90,
          min_users: int = 3,
          timestamps: list[float] | None = None,
      ) -> list[dict]:
          '''
          Slide a time window across the corpus and flag windows where
          3+ distinct users have pairwise cosine similarity > threshold.
          timestamps: Unix timestamps aligned with records (optional).
          Returns list of flagged window descriptors.
          '''
          if timestamps is None or len(timestamps) != len(records):
              return []   # timestamps required for this analysis

          window_sec = window_minutes * 60
          flagged_windows: list[dict] = []
          ts_array = np.array(timestamps)

          for i, t_start in enumerate(timestamps):
              t_end = t_start + window_sec
              window_mask = (ts_array >= t_start) & (ts_array < t_end)
              window_records = [r for r, m in zip(records, window_mask) if m]

              # Group by user_id
              by_user: dict[str, list[PromptRecord]] = {}
              for r in window_records:
                  by_user.setdefault(r.user_id, []).append(r)

              distinct_users = [uid for uid in by_user if uid]
              if len(distinct_users) < min_users:
                  continue

              # Compute per-user mean embeddings
              user_embeddings = {
                  uid: compute_centroid(recs)
                  for uid, recs in by_user.items()
                  if uid
              }

              # Check pairwise similarity
              user_ids = list(user_embeddings.keys())
              high_sim_pairs = 0
              for j in range(len(user_ids)):
                  for k in range(j + 1, len(user_ids)):
                      sim = 1.0 - cosine_distance(
                          user_embeddings[user_ids[j]],
                          user_embeddings[user_ids[k]],
                      )
                      if sim >= similarity_threshold:
                          high_sim_pairs += 1

              if high_sim_pairs >= 1 and len(distinct_users) >= min_users:
                  flagged_windows.append({
                      'window_start': t_start,
                      'window_end': t_end,
                      'distinct_users': len(distinct_users),
                      'high_sim_pairs': high_sim_pairs,
                      'user_ids': user_ids[:5],  # anonymise; show max 5
                  })
                  break  # one flag per window is sufficient for the hunt report

          return flagged_windows

      # ---------------------------------------------------------------------------
      # Report
      # ---------------------------------------------------------------------------

      def print_analysis_report(
          results: list[ClusterResult],
          total_records: int,
      ) -> None:
          anomalous = [r for r in results if r.anomalous]
          high_prox = [r for r in results if r.proximity_label == 'high']

          print(f'\nPrompt Cluster Analysis Report')
          print(f'Total clusters: {len(results)}  Total prompts: {total_records}')
          print(f'High-proximity clusters: {len(high_prox)}')
          print(f'Anomalous (high-prox, unflagged): {len(anomalous)}\n')

          print(f'{"ClID":<6} {"Size":<7} {"Dist":<8} {"Proximity":<10} '
                f'{"FlaggedFrac":<13} {"UnflaggedN":<12} {"Anomalous"}')
          print('-' * 75)
          for r in results:
              anom = '*** HUNT FINDING ***' if r.anomalous else ''
              print(f'{r.cluster_id:<6} {r.size:<7} {r.centroid_distance_to_known_bad:<8} '
                    f'{r.proximity_label:<10} {r.flagged_fraction:<13} '
                    f'{r.unflagged_count:<12} {anom}')

          if anomalous:
              print(f'\n*** {len(anomalous)} anomalous cluster(s) found. ***')
              print('Next: examine unflagged prompts in these clusters manually.')
              print('If adversarial intent confirmed: run Section 11.10 Phase 1 workflow.')
          else:
              print('\nNo anomalous clusters. Coverage validated for H1 (embedding cluster anomaly).')
              print('Record outcome in threat_hunting_playbook.py --record <hunt_id> '
                    '--outcome coverage_validated')

      # ---------------------------------------------------------------------------
      # Demo mode with synthetic data
      # ---------------------------------------------------------------------------

      def run_demo() -> None:
          rng = np.random.default_rng(42)
          dim = 384   # sentence-transformers/all-MiniLM-L6-v2 output dim

          # Known-bad centroid (injection prompt cluster centre)
          known_bad = rng.standard_normal(dim).astype(np.float32)
          known_bad /= np.linalg.norm(known_bad)

          records: list[PromptRecord] = []

          # Cluster 1: normal user traffic (far from known-bad)
          normal_centre = rng.standard_normal(dim).astype(np.float32)
          normal_centre /= np.linalg.norm(normal_centre)
          for i in range(80):
              emb = normal_centre + rng.standard_normal(dim).astype(np.float32) * 0.05
              emb /= np.linalg.norm(emb)
              records.append(PromptRecord(f'n{i}', emb, already_flagged=False))

          # Cluster 2: known injections (close to known-bad; already flagged by Track 1/3)
          for i in range(20):
              emb = known_bad + rng.standard_normal(dim).astype(np.float32) * 0.04
              emb /= np.linalg.norm(emb)
              records.append(PromptRecord(f'k{i}', emb, already_flagged=True))

          # Cluster 3: novel injection variants (close to known-bad; NOT flagged — the finding)
          novel_centre = known_bad + rng.standard_normal(dim).astype(np.float32) * 0.08
          novel_centre /= np.linalg.norm(novel_centre)
          for i in range(12):
              emb = novel_centre + rng.standard_normal(dim).astype(np.float32) * 0.03
              emb /= np.linalg.norm(emb)
              records.append(PromptRecord(f'v{i}', emb, already_flagged=False))

          print('Running demo with synthetic prompt corpus (80 normal, 20 known-flagged, 12 novel variants)')
          clusters = run_dbscan(records, eps=0.15, min_samples=5)
          results = analyse_clusters(clusters, known_bad)
          print_analysis_report(results, len(records))

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Prompt cluster analyser for threat hunting')
          parser.add_argument('--corpus', metavar='PROMPTS_JSON',
                              help='Path to JSON prompt corpus file')
          parser.add_argument('--centroid', metavar='CENTROID_NPY',
                              help='Path to known-bad centroid .npy file')
          parser.add_argument('--eps', type=float, default=0.15,
                              help='DBSCAN epsilon (cosine distance; default 0.15)')
          parser.add_argument('--min-samples', type=int, default=5,
                              help='DBSCAN min_samples (default 5)')
          parser.add_argument('--demo', action='store_true',
                              help='Run with synthetic demo data')
          args = parser.parse_args()

          if args.demo:
              run_demo()
              return 0

          if not args.corpus or not args.centroid:
              print('Both --corpus and --centroid are required. Use --demo for a demonstration.')
              parser.print_help()
              return 1

          records = load_corpus(args.corpus)
          known_bad_centroid = np.load(args.centroid).astype(np.float32)
          known_bad_centroid /= np.linalg.norm(known_bad_centroid)

          print(f'Loaded {len(records)} prompts from {args.corpus}')
          clusters = run_dbscan(records, eps=args.eps, min_samples=args.min_samples)
          print(f'DBSCAN found {len(clusters)} clusters (including noise cluster -1)')
          results = analyse_clusters(clusters, known_bad_centroid)
          print_analysis_report(results, len(records))
          return 0

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.12.1'
    mistake: 'Treating threat hunting as "browsing logs to see what looks suspicious"'
    why_it_happens: >
      Log browsing is familiar. Security engineers spend time in log analysis tools
      and develop intuitions about what looks unusual. The informal version of this
      activity is called hunting but lacks the discipline that produces reproducible,
      scalable, and falsifiable results.
    why_it_matters: >
      Informal log browsing cannot be validated. An analyst who browses 7-day logs
      and finds nothing cannot conclude that no attack is present — they can only
      conclude that nothing caught their eye. The same analyst on a different day
      might find something different. The results are not reproducible, the methodology
      cannot be reviewed, and the "nothing found" outcome provides no coverage validation.
    correct_approach: >
      Every hunt session starts with a written hypothesis before any data is opened.
      The hypothesis specifies the expected pattern, the data source, and the analysis
      method. "Nothing found" is only a meaningful outcome when it means "I tested
      this specific falsifiable hypothesis and the data does not support it" — not
      "I looked around and didn''t see anything suspicious."

  - id: 'CM11.12.2'
    mistake: 'Discarding hunt findings that confirm coverage rather than recording them'
    why_it_happens: >
      A hunt that finds nothing feels like a wasted session. The analyst moves on
      without filing a report. Only positive findings receive documentation.
    why_it_matters: >
      "Coverage validated" findings are defensible claims to leadership and auditors.
      "We ran Hypothesis H1 against the 7-day corpus of 94,000 prompts and found zero
      unflagged prompts within 0.20 cosine distance of the known-bad centroid" is a
      meaningful security statement. Without the report, the organisation cannot make
      that claim. The accumulated validated-coverage reports are also the evidence base
      for advancing the Proactive Hunting dimension to L3 and beyond.
    correct_approach: >
      File a hunt report for every completed hunt, regardless of outcome. The
      threat_hunting_playbook.py --record command requires an outcome field:
      confirmed_finding, coverage_validated, or inconclusive. All three are valid
      and all three are recorded. Reports are stored in hunt_reports/ and reviewed
      at the quarterly programme review.

  - id: 'CM11.12.3'
    mistake: 'Running hypothesis H5 (output entropy spike) without the Chapter 14 output validation layer'
    why_it_happens: >
      H5 is listed in the playbook. The analyst runs it before Chapter 14 is deployed,
      expecting to use session-level output_entropy_avg as a proxy for the full output
      analysis.
    why_it_matters: >
      Session-level output_entropy_avg is a coarse proxy. A successful exfiltration
      attack that produces high-entropy output in a few responses within an otherwise
      normal session may not elevate the session-level average significantly enough
      to flag. Running H5 on the session-level metric only and finding nothing provides
      false confidence — the full output log signal (available after Chapter 14) may
      tell a different story.
    correct_approach: >
      Flag H5 in the playbook as "partial signal until Chapter 14." Run H5 now using
      session-level output_entropy_avg as a preliminary hunt; note in the report that
      the hunt is limited to the session-level metric and should be re-run against
      full output logs after Chapter 14 is deployed. Do not treat a "coverage validated"
      outcome from the session-level H5 hunt as equivalent to a full H5 validation.

  - id: 'CM11.12.4'
    mistake: 'Converting every hunt finding directly to a rule without the Section 11.10 workflow'
    why_it_happens: >
      A confirmed finding creates urgency. The analyst writes a quick Sigma rule to
      capture the pattern, deploys it manually, and considers the finding closed.
    why_it_matters: >
      A rule written in response to urgency without tests, without metadata, without
      CI validation, and without FPR target is an L1 rule added to an L3 programme.
      It bypasses every governance control established in Sections 11.02 through 11.09,
      potentially adds false positives to the SOC queue from day one, and may conflict
      with existing rules in ways that only systematic review would catch.
    correct_approach: >
      Every confirmed hunt finding enters the Section 11.10 detection engineering
      workflow at Phase 1 (hypothesis). The finding is the hypothesis input. The rule
      goes through all seven phases: design, build, test (using the hunt''s confirmed
      examples as positive fixtures), deploy via CI, monitor FPR. The five business
      day target for rule creation is achievable through the workflow without skipping
      governance steps.

  - id: 'CM11.12.5'
    mistake: 'Using a fixed DBSCAN epsilon across all prompt corpora without calibrating for the embedding model'
    why_it_happens: >
      The default epsilon (0.15 cosine distance) is specified in the playbook and
      deliverable. Practitioners use it without checking whether it is appropriate for
      their embedding model''s distance distribution.
    why_it_matters: >
      Different embedding models produce different distance distributions. The cosine
      distance between two random prompts varies by model: a model that produces more
      clustered embeddings will require a smaller epsilon; a model that spreads prompts
      more evenly in the embedding space will require a larger epsilon. Using 0.15 with
      a model calibrated for 0.30 produces many tiny clusters, each of which appears
      anomalous in proximity analysis but most of which are noise. The hunt produces
      a large number of false findings.
    correct_approach: >
      Before the first hunt session, calibrate the DBSCAN epsilon by computing the
      k-nearest-neighbour distance distribution for k=5 across a sample of production
      prompts. Plot the sorted k-NN distances (the "elbow plot") and select epsilon
      at the elbow — the point where distance begins to increase steeply. This
      calibrated epsilon is specific to the embedding model and corpus and should be
      documented in the hunt report metadata.

section_summary:
  what_you_learned: |
    Threat hunting finds novel attacks that reactive detection rules miss — by testing
    specific, falsifiable hypotheses against production data rather than browsing logs
    for anything suspicious. AI systems offer the unique hunting advantage of embedding-
    space analysis: clustering thousands of prompts by semantic similarity to find
    structural attack patterns without predefined signatures. The five playbook
    hypotheses cover the most significant detection gaps in the seven-track gateway:
    novel injection variants (H1), sub-threshold systematic probing (H2), coordinated
    multi-user campaigns (H3), accumulated context injection (H4), and output
    exfiltration patterns (H5). Every hunt produces either a confirmed finding (which
    enters the Section 11.10 workflow as a new rule) or a validated coverage outcome
    (which is a defensible security claim). Deploying the formal procedure and quarterly
    cadence advances the Proactive Hunting maturity dimension from L1 to L3.
  key_terms:
    - term: 'Threat hunting'
      definition: >
        Proactive, hypothesis-driven analysis of production data to find attack patterns
        that no deployed detection rule captures. Distinct from reactive detection (rules
        for known patterns) and threat intelligence (consuming externally published technique
        knowledge). Finds novel attacks currently present in production logs.
    - term: 'Hunting hypothesis'
      definition: >
        A specific, falsifiable statement about an attack pattern that would be present
        in a named data source if the hypothesised attack is occurring. Specifies the
        expected pattern, the data source, the analysis method, and the falsification
        criterion. "Look for bad things" is not a hypothesis.
    - term: 'Coverage validated'
      definition: >
        A hunt outcome in which the hypothesis was tested systematically and the data
        does not support the hypothesised attack pattern. A defensible claim: "we
        tested this specific hypothesis against N records and found no qualifying pattern."
        Distinct from "nothing looked suspicious."
    - term: 'Hunt-to-rule conversion'
      definition: >
        The process of converting a confirmed hunt finding into a deployed Sigma rule
        via the Section 11.10 seven-phase detection engineering workflow. The confirmed
        hunting examples become the positive test fixtures. Target: rule deployed within
        five business days of confirmed finding.
    - term: 'Embedding-space hunting'
      definition: >
        Threat hunting using semantic similarity in the embedding space of an LLM or
        sentence encoder. Identifies structurally similar prompts without requiring
        surface-pattern matching. The unique AI security hunting capability with no
        equivalent in traditional log analysis.

preview_section_11_13:
  title: 'Production Detection Architecture Patterns'
  teaser: |
    Section 11.13 grounds the complete detection framework in three concrete production
    architecture patterns: the inline API gateway (the seven-track gateway is this
    pattern — the only blocking pattern), the sidecar (asynchronous, flag-only, zero
    latency impact), and the log-based SIEM (fully async, campaign-level detection,
    highest alert latency). It then builds the hybrid architecture that all three
    patterns in combination: gateway blocks high-confidence signals, sidecar flags
    moderate-confidence signals without latency penalty, SIEM detects multi-session
    campaigns over longer windows. Failure mode design (fail-open vs fail-closed per
    layer) and observability instrumentation of the detection system itself complete
    the section.

