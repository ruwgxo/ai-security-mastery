deliverables:

  deliverable_1:
    id: 'D11.12.1'
    filename: 'threat_hunting_playbook.py'
    description: >
      Five AI-specific hunting hypotheses encoded as executable procedures with data
      source specification, analysis method, falsification criterion, and pivot chain.
      Produces a structured hunt report for each hypothesis run. Integrates with
      detection_gap_prioritiser.py to add P1 items from confirmed findings.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'pyyaml>=6.0'
      - 'dataclasses (stdlib)'
      - 'uuid (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''threat_hunting_playbook.py
      Five AI-specific hunting hypotheses with analysis procedures and pivot chains.
      Produces structured hunt reports. Integrates with detection gap prioritiser.
      Chapter 11, Section 11.12 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 threat_hunting_playbook.py --list
        python3 threat_hunting_playbook.py --run H1 --analyst ruwgxo --window 7
        python3 threat_hunting_playbook.py --run all --window 30
        python3 threat_hunting_playbook.py --report hunt-2026-Q2-001
      '''

      from __future__ import annotations
      import argparse
      import json
      import pathlib
      import sys
      import uuid
      from dataclasses import dataclass, field
      from datetime import date, datetime, timedelta, timezone
      from typing import Callable, Literal

      HuntOutcome = Literal['confirmed_finding', 'coverage_validated', 'inconclusive']
      NextAction = Literal['new_rule', 'backlog_p1', 'validate_quarterly', 'no_action']

      REPORTS_DIR = pathlib.Path('hunt_reports')

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class HuntHypothesis:
          hypothesis_id: str
          name: str
          attack_scenario: str
          expected_pattern: str
          data_source: str
          log_category: str
          analysis_method: str
          falsification_criterion: str
          pivot_chain: str
          recommended_cadence: str     # 'weekly' | 'monthly' | 'quarterly'
          atlas_technique_gap: str     # ATLAS technique this hunt targets

      @dataclass
      class HuntReport:
          hunt_id: str
          hypothesis_id: str
          analyst: str
          hunt_date: str
          data_window: str
          corpus_size: int
          outcome: HuntOutcome
          finding_description: str
          evidence_samples: list[str]
          next_action: NextAction
          sigma_rule_id: str | None = None
          detection_backlog_item: str | None = None

      # ---------------------------------------------------------------------------
      # Hypothesis registry
      # ---------------------------------------------------------------------------

      HYPOTHESES: dict[str, HuntHypothesis] = {

          'H1': HuntHypothesis(
              hypothesis_id='H1',
              name='Embedding Cluster Anomaly — Novel Injection Variants',
              attack_scenario=(
                  'Adversaries are using prompt injection variants that are semantically '
                  'similar to known injections but surface-form different enough to evade '
                  'Track 1 (keyword matching) and Track 3 (cosine similarity threshold at 0.85).'
              ),
              expected_pattern=(
                  'A cluster of prompts within 0.20 cosine distance of the known-bad '
                  'embedding centroid that have NOT been flagged by Track 1 or Track 3.'
              ),
              data_source='API gateway request logs (prompt_text field) + offline embedding computation',
              log_category='ai_gateway',
              analysis_method=(
                  '1. Compute sentence embeddings for all prompts in the corpus window. '
                  '2. Apply DBSCAN clustering (eps=0.15, min_samples=5) on the embedding matrix. '
                  '3. Compute centroid of each cluster. '
                  '4. Measure cosine distance from each cluster centroid to the known-bad centroid. '
                  '5. Flag clusters with centroid distance < 0.20. '
                  '6. Filter out prompts in flagged clusters that already have gateway_action=flag or block. '
                  '7. Examine remaining unflagged prompts manually for adversarial intent.'
              ),
              falsification_criterion=(
                  'Zero prompts in the high-proximity unflagged cluster → '
                  'Track 3 is catching all semantically similar injection variants at current threshold.'
              ),
              pivot_chain=(
                  'Confirmed finding → characterise the evading injection variant → '
                  'Section 11.10 Phase 1 hypothesis → '
                  'Track 1 keyword addition (if surface pattern is consistent) OR '
                  'Track 3 centroid update (if variant is semantically novel) → '
                  'add confirmed examples to known-bad fixture corpus.'
              ),
              recommended_cadence='weekly',
              atlas_technique_gap='AML.T0051 — L3 obfuscated injection gap',
          ),

          'H2': HuntHypothesis(
              hypothesis_id='H2',
              name='Session Entropy Outlier — Sub-Threshold Systematic Probing',
              attack_scenario=(
                  'An actor is probing the model''s response consistency by submitting '
                  'near-identical prompts with minor variations — a reconnaissance pattern '
                  'preceding extraction or injection. The absolute request count stays '
                  'below the Track 5 rate rule threshold.'
              ),
              expected_pattern=(
                  'A user whose query_variance is in the bottom 5th percentile AND '
                  'session_request_count is in the top 10th percentile for their cohort, '
                  'AND who has no Track 5 alert in the analysis window.'
              ),
              data_source='ai_session logs + per-user baseline from false_positive_manager.py',
              log_category='ai_session',
              analysis_method=(
                  '1. Load ai_session records for the analysis window. '
                  '2. Compute per-user query_variance percentile rank across all users. '
                  '3. Compute per-user session_request_count percentile rank within user cohort. '
                  '4. Select users in bottom-5th query_variance AND top-10th request_count. '
                  '5. Cross-reference against Track 5 alert history; remove users with existing alerts. '
                  '6. For remaining users, review session request content for systematic probing patterns.'
              ),
              falsification_criterion=(
                  'No users in the percentile intersection set → '
