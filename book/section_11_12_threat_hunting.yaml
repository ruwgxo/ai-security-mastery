              ),
              expected_pattern=(
                  'A session whose rolling per-turn embedding centroid drifts more than '
                  '0.30 cosine distance from the session''s first-turn embedding in a '
                  'direction toward the known-bad centroid.'
              ),
              data_source='ai_gateway logs grouped by session_id (prompt embeddings per turn)',
              log_category='ai_gateway',
              analysis_method=(
                  '1. Group prompt records by session_id. '
                  '2. Compute per-turn embeddings in chronological order per session. '
                  '3. Compute first-turn embedding as the session baseline. '
                  '4. Compute rolling centroid as turns accumulate. '
                  '5. Measure cosine distance between rolling centroid and first-turn embedding. '
