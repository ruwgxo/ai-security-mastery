              ),
              recommended_cadence='monthly',
              atlas_technique_gap='Multi-user coordinated attack — no named ATLAS technique yet',
          ),

          'H4': HuntHypothesis(
              hypothesis_id='H4',
              name='System Prompt Drift — Multi-Turn Accumulated Context Injection',
              attack_scenario=(
                  'An adversary is using multi-turn conversation to gradually shift the '
                  'effective system prompt through accumulated context — each turn contributing '
