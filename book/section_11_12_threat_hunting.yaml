prose_content:

  part_1_reactive_vs_proactive:
    heading: 'Reactive Detection, Threat Intelligence, and Threat Hunting: Three Distinct Disciplines'
    body: |
      Detection engineering produces three distinct outputs that are frequently conflated:
      reactive detection rules, threat intelligence consumption, and threat hunting.
      Understanding the distinction is the precondition for understanding what hunting
      adds that the other two cannot provide.

      Reactive detection rules match known patterns. A Sigma rule for prompt injection
      fires when a prompt contains a known injection prefix. It is effective against
      attacks that match the rule and blind to attacks that do not. The coverage heat
      map measures exactly this boundary: the boundary between what rules can see and
      what they cannot. Reactive detection is the foundation; everything else is built
      on it.

      Threat intelligence consumption brings external knowledge of new attack techniques
      into the detection programme. When a threat intelligence feed reports a new
      adversarial ML technique, the detection engineering workflow (Section 11.10)
      converts it into a detection hypothesis and eventually a rule. Threat intelligence
      extends the reactive detection foundation by adding rules for newly published
      techniques before they are used against the organisation. It is still reactive in
      the sense that it follows the attacker''s publication of the technique rather than
      discovering the technique in production logs.

      Threat hunting discovers attack patterns present in production logs that no
      deployed rule captures — because no rule exists for them yet. A hunter does not
      wait for a threat intelligence report. They ask: given what I know about attacker
      behaviour, what patterns might be present in our logs right now that our rules
      cannot see? They then test that question systematically against real data and either
      confirm a novel attack pattern (producing a new rule) or confirm that no such
      pattern is present (validating that existing coverage is effective for this threat
      scenario).

      The three disciplines are complementary. Reactive detection handles what is known.
      Threat intelligence handles what is newly published. Hunting handles what is novel
      and currently present. A detection programme without hunting is perpetually behind
      the attacker; it can only detect techniques it already knows about.

  part_2_hypothesis_discipline:
    heading: 'Hunting Is Not Fishing: The Hypothesis Requirement'
    body: |
      The most common error in threat hunting programmes is "fishing": opening a log
      analysis tool, browsing through data without a specific question, and looking for
      something that appears unusual. Fishing is not hunting. It does not produce
      reproducible results, it does not scale to production log volumes, and it cannot
      confirm or deny anything — an analyst who browses logs and finds nothing unusual
      cannot conclude that no attack is present, only that nothing caught their eye.

      Every hunt starts with a specific, falsifiable hypothesis. A hypothesis specifies:
      what pattern would be present if the hypothesised attack is occurring; which data
      source that pattern would appear in; and what analysis method would confirm or
      deny the hypothesis. A hypothesis that cannot be tested against data is not a
      hypothesis — it is speculation.

      The quality test for a hunting hypothesis: can it be falsified? "Are adversaries
      targeting our system?" cannot be falsified with data. "Are any users in the past
      seven days querying the model with prompts whose embeddings cluster within 0.15
      cosine distance of the known-injection embedding centroid but do not match any
      Track 1 or Track 3 rule?" can be falsified: run the embedding similarity search
      against the past seven days of prompts, apply the distance threshold, filter out
      Track 1 and Track 3 hits, and examine what remains.

      The five hunting hypotheses in the threat_hunting_playbook.py deliverable all
      follow this structure. Each names the attack scenario, the expected observable
      pattern, the data source, the analysis method, and the falsification criterion.
      A hunt that produces zero results is not a failed hunt — it is a successful
      validation of existing coverage for the hypothesised attack scenario.

  part_3_ai_hunting_data_sources:
    heading: 'Data Sources for AI System Threat Hunting'
    body: |
      Five data sources are available for AI system threat hunting, each contributing
      signal that the others cannot provide:

      Data Source 1 — API gateway request logs (ai_gateway category). The primary source
      for prompt-level hunting. Contains prompt_text (or prompt hash), token_count,
      gateway_action, and all track scores. Enables: keyword pattern analysis, entropy
      distribution analysis, semantic similarity clustering, and anomalous track score
      combinations. Volume: the full production request corpus; typically sampled for
      hunting (7-day window, 100k request sample for weekly hunts).

      Data Source 2 — Session logs (ai_session category). The primary source for
      behavioural hunting across request sequences. Contains query_variance, query_entropy_avg,
      output_entropy_avg, and budget_consumed_pct. Enables: session-level outlier detection,
      identification of users whose session behaviour is anomalous relative to their
      own baseline, and detection of slowly-escalating query patterns.

      Data Source 3 — Model serving metrics. Metrics emitted by the model serving
      infrastructure: inference latency distribution, token generation rate, KV-cache
      hit rate. These are not request-level logs but aggregated time-series metrics.
      Enables: detecting prompt-induced computational anomalies (recursive self-reference
      causing latency spikes), unusual KV-cache eviction patterns from unusually structured
      prompts, and resource exhaustion precursors.

      Data Source 4 — LLM output logs. The response content after inference. Currently
      the output-side gap in the gateway (Section 11.11). When the Chapter 14 output
      validation layer is deployed, output logs become available for hunting: hunting
      for responses that contain code patterns, PII regex matches, or system prompt
      reflection patterns in the output corpus without individual rule triggers.

      Data Source 5 — Embedding similarity search. A derived source: computing prompt
      embeddings and running approximate nearest-neighbour search across the corpus.
      Enables: finding prompts that are semantically close to known-bad examples without
      matching any surface pattern rule; identifying clusters of structurally similar
      prompts that may represent a coordinated campaign; and detecting gradual semantic
      drift in the query distribution that may indicate an evolving attack campaign.
      This is the uniquely AI data source — traditional log analysis has no equivalent.

  part_4_five_hypotheses:
    heading: 'Five AI-Specific Hunting Hypotheses'
    body: |
      The five hypotheses encoded in threat_hunting_playbook.py target the detection
      gaps most relevant to the seven-track gateway. Each is written in the standard
      hypothesis format: scenario, expected pattern, data source, analysis method,
      falsification criterion, and pivot chain to Sigma rule if confirmed.

      Hypothesis 1 — Embedding cluster anomaly (novel injection variants).
      Scenario: adversaries are using injection variants that are semantically similar
      to known injections but surface-form different enough to evade Track 1 and Track 3.
      Expected pattern: a cluster of prompts within 0.20 cosine distance of the known-bad
      embedding centroid that have not been flagged by any deployed rule.
      Data source: api_gateway request logs (prompt embeddings computed offline).
      Analysis method: compute embeddings for the past 7-day prompt corpus; apply DBSCAN
      clustering; identify clusters with high centroid proximity to the known-bad centroid;
      filter out prompts already flagged by Tracks 1-3; examine remaining prompts manually.
      Falsification criterion: zero prompts in the high-proximity unflagged cluster → coverage
      confirmed for this attack scenario.
      Pivot chain: if confirmed → new injection variant → hypothesis for Section 11.10
      Phase 1 → Track 1 keyword addition or Track 3 centroid update.

      Hypothesis 2 — Session entropy outlier (systematic model behaviour probing).
      Scenario: an actor is probing the model''s response consistency by submitting
      near-identical prompts with minor variations — a reconnaissance pattern that
      precedes a more targeted extraction or injection campaign.
      Expected pattern: a user whose query_variance is in the bottom 5th percentile
      across all users in the 30-day window, with a session_request_count in the top
      10th percentile for their user cohort, but who has not triggered Track 5 rate
      detection (because their absolute request count is below the rule threshold).
      Data source: ai_session logs, per-user baseline from false_positive_manager.py.
      Analysis method: compute per-user query_variance percentile and request_count
      percentile; identify the intersection of bottom-5th query_variance and top-10th
      request_count; cross-reference against Track 5 alert history to confirm unflagged.
      Falsification criterion: no users in the intersection set → Track 5 is catching
      all sub-threshold systematic probing.

      Hypothesis 3 — Coordinated timing pattern (multi-user coordinated campaign).
      Scenario: multiple accounts are submitting prompts in a coordinated pattern —
      same prompt structure, interleaved across accounts at regular intervals — suggesting
      a distributed attack that each individual account keeps below per-user detection
      thresholds.
      Expected pattern: three or more users submitting prompts with cosine similarity
      > 0.90 to each other within the same 15-minute window, where no single user''s
      activity triggers any deployed rule.
      Data source: api_gateway logs (prompt embeddings, timestamps, user_ids).
      Analysis method: sliding 15-minute window across the corpus; for each window,
      compute pairwise cosine similarities across distinct users; flag windows with
      3+ users and pairwise similarity > 0.90.
      Falsification criterion: no qualifying windows → no coordinated campaign pattern
      detected in this period.

      Hypothesis 4 — System prompt drift (prompt injection via accumulated context).
      Scenario: an adversary is using multi-turn conversation to gradually shift the
      effective system prompt through accumulated context — each turn contributing a small
      instruction fragment that, combined across turns, overrides the original system
      prompt intent.
      Expected pattern: a user whose session-level prompt embedding centroid (computed
      across all turns) drifts more than 0.30 cosine distance from the session''s first
      turn embedding in a direction toward the known-bad centroid.
      Data source: api_gateway logs (prompt embeddings per turn, session_id).
      Analysis method: compute per-turn embeddings within each session; compute rolling
      centroid across turns; measure cosine drift from first-turn embedding; flag sessions
      with drift > 0.30 toward the known-bad centroid.
      Falsification criterion: no qualifying sessions → accumulated context drift attack
      not present in this period.

      Hypothesis 5 — Output entropy spike (model exfiltration via response patterns).
      Scenario: an adversary who has successfully injected instructions is causing the
      model to generate unusually high-entropy outputs — a signal consistent with
      exfiltrating structured data (training data, system prompt content) in the response.
      Expected pattern: a user whose output_entropy_avg is more than 2 standard deviations
      above the fleet-wide output_entropy_avg for their model and prompt_length cohort,
      with no corresponding Track 6 or Track 7 alert.
      Data source: ai_session logs (output_entropy_avg); model serving metrics (per-model
      baseline output entropy). Note: requires Chapter 14 output validation layer for full
      signal; partial signal available from session-level entropy metrics now.
      Falsification criterion: no qualifying users → no output exfiltration pattern
      detected in this period.

  part_5_hunt_to_rule:
    heading: 'Hunt-to-Rule Conversion: Closing the Self-Improvement Loop'
    body: |
      A confirmed hunt finding is evidence of an attack pattern that no deployed rule
      captures. The immediate action is containment if the attack is active; the
      detection engineering action is converting the finding into a rule before the
      hunting session closes. A finding that is not converted to a rule within five
      business days of confirmation degrades back to a gap — the next time the hunt
      runs, it will find the same pattern again, and the detection programme has not
      improved.

      The hunt-to-rule conversion uses the Section 11.10 detection engineering workflow
      starting at Phase 1 (hypothesis). The confirmed hunt finding is the hypothesis
      input: "I observed prompts matching pattern X in the past 7-day corpus that were
      not caught by any deployed rule. I hypothesise that a rule matching pattern X would
      detect this attack class." Phase 2 (design) specifies the log field to match,
      the detection operator, and the FPR target. Phase 3 (build) produces the Sigma rule
      or Python detector. Phase 4 (test) writes the positive fixture from the actual
      confirmed hunting examples and adds them to the known-bad corpus. Phase 5 deploys.

      Hunt findings that confirm ATLAS technique coverage gaps (the hunt found no
      detection for a technique that the heat map showed as partially covered) are added
      to the detection backlog as P1 items, bypassing the normal likelihood × impact
      priority score. A confirmed hunt finding is evidence that the attack is not merely
      theoretically possible but actively occurring or recently occurred in the production
      environment — that is higher priority than a scoring model based on threat
      intelligence alone.

      A hunt that finds nothing is not wasted effort. It is a validation of existing
      coverage for the hypothesised attack scenario. The validation is recorded in the
      hunt report and contributes to the detection programme''s confidence level for
      that scenario: "we hunted for coordinated timing patterns in the past 7-day corpus
      using the Hypothesis 3 procedure and found no qualifying windows." This is a
      defensible claim that reactive detection alone cannot make.

  part_6_cadence:
    heading: 'Hunting Cadence: Weekly, Monthly, and Quarterly'
    body: |
      The appropriate hunting cadence depends on the threat environment:

      Weekly hunting for active threat campaigns. When threat intelligence indicates
      that an adversary is actively targeting AI systems in the organisation''s sector,
      or when a recent security incident suggests an active campaign, the weekly cadence
      runs a focused subset of hypotheses against the most recent 7-day log window.
      Weekly hunts are narrow: one or two hypotheses per session, selected from the
      playbook based on the active campaign''s known tactics. The 7-day window keeps
      the data volume manageable for a 2–4 hour hunt session.

      Monthly hunting for routine monitoring. The standard cadence for a programme
      without active campaign intelligence. All five hypotheses run against the past
      30-day window. The 30-day window captures behavioural patterns that are too slow
      for a 7-day window to reveal (Hypothesis 4 system prompt drift requires multiple
      sessions over days or weeks to manifest). Monthly hunts take 4–6 hours and produce
      a hunt report that feeds the detection backlog.

      Quarterly deep-technique hunting. A longer, more exploratory session aligned with
      the quarterly coverage review. The hunter selects hypotheses based on newly
      published ATLAS techniques or new attack research identified in the taxonomy
      expansion check from Section 11.05. New hypotheses are written for the quarter''s
      notable techniques and tested against the full 90-day log window. Quarterly hunts
      produce the hypotheses that become the next quarter''s playbook additions.

      The cadence gates in the Section 11.08 maturity model: L3 requires at least
      quarterly hunting with the formal procedure. L4 requires monthly hunting with red
      team findings driving hypothesis selection. L5 requires continuous automated hunting
      supplementing manual quarterly sessions. After deploying the threat_hunting_playbook.py
      and running the first formal quarterly hunt, the Proactive Hunting dimension
      advances from L1 to L3.

