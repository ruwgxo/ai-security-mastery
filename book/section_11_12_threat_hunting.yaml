  - 'Execute the five-phase hunting cycle (hypothesis → data collection → analysis → finding → rule or validation) for an AI system'
  - 'Apply embedding-space hunting to identify anomalous prompt clusters without requiring labelled data or predefined attack signatures'
  - 'Name five AI-specific hunting data sources and explain what signal each contributes that the others cannot provide'
  - 'Convert a confirmed hunt finding into a Sigma rule via the Section 11.10 detection engineering workflow'
  - 'Design a hunting cadence appropriate for three different threat environments: active campaign, routine monitoring, and deep technique investigation'

