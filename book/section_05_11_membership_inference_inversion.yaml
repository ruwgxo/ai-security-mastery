# IMPLEMENTATIONS
# ============================================================================

implementations:

  implementation_01:
    title: "Likelihood-Ratio Membership Inference Attack + Risk Quantifier"
    filename: "mi_attack_tools.py"
    purpose: |
      Black-box membership inference attack using the likelihood-ratio test.
      Two main components:
      (1) LikelihoodRatioMIA: given target and reference model log-probabilities
          for a set of records, computes LR scores, decision threshold, AUC-ROC,
          TPR@FPR=10% and TPR@FPR=1%.
      (2) compute_loss_gap: computes training vs validation loss gap as a
          low-cost MIA risk proxy, with risk tier classification.
    language: "python"
    code: |
      """
      Membership Inference Attack Tools
      LikelihoodRatioMIA + loss-gap risk quantifier + AUC evaluation.
      """

      import math
      import random
      from dataclasses import dataclass, field
      from typing import List, Tuple, Dict, Optional


      # -----------------------------------------------------------------------
      # Likelihood-Ratio MIA
      # -----------------------------------------------------------------------

      @dataclass
      class MIARecord:
          record_id: str
          is_member: bool              # ground truth (for evaluation)
          target_log_prob: float       # log P_target(x) — sum over tokens
          reference_log_prob: float    # log P_reference(x) — sum over tokens
          token_count: int

          @property
          def lr_score(self) -> float:
              """Likelihood ratio score (higher → more likely member)."""
              return self.target_log_prob - self.reference_log_prob

          @property
          def per_token_lr(self) -> float:
              return self.lr_score / max(1, self.token_count)


      @dataclass
      class MIAResult:
          n_members: int
          n_non_members: int
          auc_roc: float
          tpr_at_fpr_10: float
          tpr_at_fpr_01: float
          optimal_threshold: float
          risk_level: str
          interpretation: str
          records: List[MIARecord] = field(default_factory=list)


      def _auc_roc(scores: List[float], labels: List[bool]) -> float:
          """Compute AUC-ROC using trapezoidal rule."""
          paired = sorted(zip(scores, labels), key=lambda x: -x[0])
          n_pos = sum(labels)
          n_neg = len(labels) - n_pos
          if n_pos == 0 or n_neg == 0:
              return 0.5
          tp = fp = 0
          auc = 0.0
          prev_fp = 0
          for _, label in paired:
              if label:
                  tp += 1
              else:
                  fp += 1
              if fp != prev_fp:
                  auc += (tp / n_pos) * ((fp - prev_fp) / n_neg)
                  prev_fp = fp
          return auc


      def _tpr_at_fpr(scores: List[float], labels: List[bool],
                       target_fpr: float) -> float:
          """TPR at a given FPR level."""
          thresholds = sorted(set(scores), reverse=True)
          n_pos = sum(labels)
          n_neg = len(labels) - n_pos
          if n_pos == 0 or n_neg == 0:
              return 0.0
          best_tpr = 0.0
          for thresh in thresholds:
              tp = sum(1 for s, l in zip(scores, labels) if s >= thresh and l)
              fp = sum(1 for s, l in zip(scores, labels) if s >= thresh and not l)
              fpr = fp / n_neg
              tpr = tp / n_pos
              if fpr <= target_fpr:
                  best_tpr = max(best_tpr, tpr)
          return best_tpr


      def _optimal_threshold(scores: List[float], labels: List[bool]) -> float:
          """Threshold maximising balanced accuracy."""
          best_thresh = 0.0
          best_ba = 0.0
          n_pos = sum(labels)
          n_neg = len(labels) - n_pos
          if n_pos == 0 or n_neg == 0:
              return 0.0
          for thresh in sorted(set(scores)):
              tp = sum(1 for s, l in zip(scores, labels) if s >= thresh and l)
              tn = sum(1 for s, l in zip(scores, labels) if s < thresh and not l)
              ba = 0.5 * (tp / n_pos + tn / n_neg)
              if ba > best_ba:
                  best_ba = ba
                  best_thresh = thresh
          return best_thresh


      def run_lr_mia(records: List[MIARecord],
                     use_per_token: bool = True) -> MIAResult:
          """
          Run likelihood-ratio MIA on a set of labelled records.
          use_per_token=True normalises by token count (more robust).
          """
          scores = [r.per_token_lr if use_per_token else r.lr_score
                    for r in records]
          labels = [r.is_member for r in records]
          n_members = sum(labels)
          n_non_members = len(labels) - n_members

          auc = _auc_roc(scores, labels)
          tpr10 = _tpr_at_fpr(scores, labels, 0.10)
          tpr01 = _tpr_at_fpr(scores, labels, 0.01)
          thresh = _optimal_threshold(scores, labels)

          risk = ("low" if auc < 0.60 else
                  "medium" if auc < 0.70 else
                  "high" if auc < 0.80 else "critical")

          interpretations = {
              "low":      "AUC near random — low MIA exposure; standard monitoring sufficient",
              "medium":   "Detectable MIA advantage — investigate regularisation; consider DP",
              "high":     "Significant MIA vulnerability — DP training required before production",
              "critical": "Severe overfitting — model must not be deployed on sensitive data without DP",
          }

          return MIAResult(
              n_members=n_members, n_non_members=n_non_members,
              auc_roc=auc, tpr_at_fpr_10=tpr10, tpr_at_fpr_01=tpr01,
              optimal_threshold=thresh, risk_level=risk,
              interpretation=interpretations[risk], records=records,
          )


      def print_mia_result(r: MIAResult) -> None:
          print(f"\n{'='*55}")
          print(f"MEMBERSHIP INFERENCE ATTACK RESULT")
          print(f"Records: {r.n_members} members + {r.n_non_members} non-members")
          print(f"AUC-ROC:            {r.auc_roc:.4f}  [{r.risk_level.upper()}]")
          print(f"TPR @ FPR=10%:      {r.tpr_at_fpr_10:.4f}")
          print(f"TPR @ FPR=1%:       {r.tpr_at_fpr_01:.4f}")
          print(f"Optimal threshold:  {r.optimal_threshold:.4f}")
          print(f"Interpretation: {r.interpretation}")


      # -----------------------------------------------------------------------
      # Loss-Gap Risk Quantifier
      # -----------------------------------------------------------------------

      @dataclass
      class LossGapReport:
          train_loss: float
          val_loss: float
          loss_gap: float
          mia_advantage_upper_bound: float   # Yeom et al.: advantage ≤ gap / 2
          risk_tier: str
          recommendation: str


      def compute_loss_gap(train_losses: List[float],
                           val_losses: List[float]) -> LossGapReport:
          """
          Compute training vs validation loss gap as MIA risk proxy.
          train_losses: per-sample cross-entropy losses on training set
          val_losses:   per-sample cross-entropy losses on held-out set
          """
          train_loss = sum(train_losses) / len(train_losses)
          val_loss = sum(val_losses) / len(val_losses)
          gap = val_loss - train_loss   # positive if overfitting

          advantage_ub = max(0.0, gap / 2)
          risk = ("low" if gap < 0.05 else
                  "medium" if gap < 0.20 else
                  "high" if gap < 0.50 else "critical")

          recs = {
              "low":      "Loss gap within acceptable range. Monitor; no immediate action.",
              "medium":   "Moderate overfitting detected. Apply L2 regularisation and early stopping.",
              "high":     "Significant overfitting. Regularise or apply DP training before deployment.",
              "critical": "Severe overfitting. Model must NOT be deployed on sensitive data. Retrain with DP.",
          }
          return LossGapReport(
              train_loss=train_loss, val_loss=val_loss,
              loss_gap=gap, mia_advantage_upper_bound=advantage_ub,
              risk_tier=risk, recommendation=recs[risk],
          )


      def print_loss_gap_report(r: LossGapReport) -> None:
          print(f"\n{'='*55}")
          print(f"LOSS GAP REPORT (MIA Risk Proxy)")
          print(f"Train loss:  {r.train_loss:.4f}")
          print(f"Val loss:    {r.val_loss:.4f}")
          print(f"Gap:         {r.loss_gap:.4f}  [{r.risk_tier.upper()}]")
          print(f"MIA adv UB:  {r.mia_advantage_upper_bound:.4f}")
          print(f"Action: {r.recommendation}")


      # -----------------------------------------------------------------------
      # Shadow Model Pipeline (Conceptual Stub)
      # -----------------------------------------------------------------------

      def shadow_model_pipeline_description() -> None:
          """
          Documents the shadow model pipeline steps. Full implementation
          requires scikit-learn or PyTorch.
          """
          steps = [
              "1. Acquire shadow data from same distribution as target training data",
              "2. Train k shadow models (k=10 practical) on n/2 random subsets of shadow data",
              "3. For each shadow model: record (confidence_vector, member/non-member) for all shadow records",
              "4. Train attack classifier (LogisticRegression or MLP) on (confidence_vector → member) labels",
              "5. For target inference: query target model, feed confidence vector to attack classifier",
              "6. Report P(member) for each queried record",
          ]
          print("\nSHADOW MODEL PIPELINE (conceptual stub):")
          for step in steps:
              print(f"  {step}")
          print("\nFull sklearn implementation: see notebooks/04-security-testing/section_05_11*.ipynb")


      if __name__ == "__main__":
          random.seed(42)

          # Simulate overfit model: members have higher target log-prob
          # LR(member) sampled from N(2.0, 1.0); LR(non-member) from N(0.0, 1.0)
          members = [
              MIARecord(
                  f"member-{i}", True,
                  target_log_prob=random.gauss(-50, 5),  # low loss = high prob
                  reference_log_prob=random.gauss(-55, 5),
                  token_count=random.randint(40, 120)
              ) for i in range(200)
          ]
          non_members = [
              MIARecord(
                  f"nonmember-{i}", False,
                  target_log_prob=random.gauss(-55, 5),  # higher loss
                  reference_log_prob=random.gauss(-55, 5),
                  token_count=random.randint(40, 120)
              ) for i in range(200)
          ]
          all_records = members + non_members
          random.shuffle(all_records)

          result = run_lr_mia(all_records)
          print_mia_result(result)

          # Loss-gap demo: overfit model
          train_l = [random.gauss(0.4, 0.1) for _ in range(500)]
          val_l   = [random.gauss(0.9, 0.15) for _ in range(200)]
          lgr = compute_loss_gap(train_l, val_l)
          print_loss_gap_report(lgr)

          shadow_model_pipeline_description()

  implementation_02:
    title: "Privacy Defence Layer: Output Perturbation and Confidence Masking"
    filename: "privacy_defence_layer.py"
    purpose: |
      Four defences against membership inference and model inversion:
      (1) confidence_mask: round probabilities to fixed decimal places
      (2) top_k_truncate: return only top-k (label, score) pairs
      (3) perturb_probs: add calibrated Laplace noise to softmax vector
      (4) label_smooth_outputs: apply label smoothing to reduce overconfidence
      Each defence is instrumented to show before/after MIA-signal reduction
      (entropy change, max-prob change) so defenders can tune parameters.
    language: "python"
    code: |
      """
      Privacy Defence Layer — four MIA/inversion defences with before/after instrumentation.
      """

      import math
      import random
      from dataclasses import dataclass
      from typing import List, Dict, Tuple, Optional


      @dataclass
      class ConfidenceVector:
          labels: List[str]
          probs: List[float]

          def entropy(self) -> float:
              return -sum(p * math.log2(p + 1e-9) for p in self.probs)

          def max_prob(self) -> float:
              return max(self.probs)

          def top_k(self, k: int) -> List[Tuple[str, float]]:
              return sorted(zip(self.labels, self.probs),
                            key=lambda x: -x[1])[:k]

          def to_dict(self) -> Dict[str, float]:
              return dict(zip(self.labels, self.probs))

          def __repr__(self) -> str:
              top = sorted(zip(self.labels, self.probs), key=lambda x: -x[1])[:3]
              return f"ConfidenceVector(top3={[(l, round(p,4)) for l,p in top]})"


      def _project_to_simplex(probs: List[float]) -> List[float]:
          """Project to probability simplex: clip to [0,1] and renormalise."""
          clipped = [max(0.0, p) for p in probs]
          total = sum(clipped)
          if total == 0:
              return [1.0 / len(clipped)] * len(clipped)
          return [p / total for p in clipped]


      # -----------------------------------------------------------------------
      # Defence 1: Confidence Masking (Output Quantisation)
      # -----------------------------------------------------------------------

      def confidence_mask(cv: ConfidenceVector,
                          decimal_places: int = 1,
                          mask_below_threshold: float = 0.05) -> ConfidenceVector:
          """
          Round confidence scores to decimal_places. Zero out probs below threshold.
          Renormalise after masking.
          """
          masked = [round(p, decimal_places) if p >= mask_below_threshold else 0.0
                    for p in cv.probs]
          projected = _project_to_simplex(masked)
          return ConfidenceVector(labels=cv.labels[:], probs=projected)


      # -----------------------------------------------------------------------
      # Defence 2: Top-K Truncation
      # -----------------------------------------------------------------------

      def top_k_truncate(cv: ConfidenceVector, k: int = 3) -> ConfidenceVector:
          """
          Return only top-k classes; zero out the rest.
          Renormalise remaining probabilities.
          """
          indexed = sorted(enumerate(cv.probs), key=lambda x: -x[1])
          kept_indices = {idx for idx, _ in indexed[:k]}
          truncated = [p if i in kept_indices else 0.0
                       for i, p in enumerate(cv.probs)]
          projected = _project_to_simplex(truncated)
          return ConfidenceVector(labels=cv.labels[:], probs=projected)


      # -----------------------------------------------------------------------
      # Defence 3: Laplace Prediction Perturbation
      # -----------------------------------------------------------------------

      def perturb_probs(cv: ConfidenceVector,
                         sensitivity: float = 1.0,
                         epsilon: float = 10.0,
                         seed: Optional[int] = None) -> ConfidenceVector:
          """
          Add Laplace(0, sensitivity/epsilon) noise to each probability.
          Renormalise to simplex.
          Higher epsilon = less noise = less privacy protection.
          """
          if seed is not None:
              random.seed(seed)
          scale = sensitivity / epsilon
          noisy = [p + _laplace_noise(scale) for p in cv.probs]
          projected = _project_to_simplex(noisy)
          return ConfidenceVector(labels=cv.labels[:], probs=projected)


      def _laplace_noise(scale: float) -> float:
          """Sample from Laplace(0, scale) using inverse CDF method."""
          u = random.uniform(-0.5, 0.5)
          return -scale * (1 if u >= 0 else -1) * math.log(1 - 2 * abs(u) + 1e-9)


      # -----------------------------------------------------------------------
      # Defence 4: Label Smoothing (for training)
      # -----------------------------------------------------------------------

      def label_smooth_outputs(cv: ConfidenceVector,
                                smoothing: float = 0.1) -> ConfidenceVector:
          """
          Apply label smoothing to model outputs: redistribute smoothing
          probability mass from the predicted class to all other classes.
          Mimics training with label smoothing — reduces overconfidence.
          """
          n = len(cv.probs)
          smoothed = [(1 - smoothing) * p + smoothing / n for p in cv.probs]
          return ConfidenceVector(labels=cv.labels[:], probs=smoothed)


      # -----------------------------------------------------------------------
      # Instrumented Defence Pipeline
      # -----------------------------------------------------------------------

      @dataclass
      class DefenceReport:
          original_entropy: float
          original_max_prob: float
          after_defence: str
          defended_entropy: float
          defended_max_prob: float
          entropy_increase: float
          max_prob_reduction: float
          mia_signal_reduction_pct: float


      def apply_and_measure(cv: ConfidenceVector,
                             defence_name: str,
                             defended_cv: ConfidenceVector) -> DefenceReport:
          orig_ent = cv.entropy()
          orig_max = cv.max_prob()
          def_ent = defended_cv.entropy()
          def_max = defended_cv.max_prob()
          # MIA signal is primarily in max_prob (confidence gap)
          signal_reduction = (orig_max - def_max) / orig_max * 100 if orig_max > 0 else 0.0
          return DefenceReport(
              original_entropy=orig_ent,
              original_max_prob=orig_max,
              after_defence=defence_name,
              defended_entropy=def_ent,
              defended_max_prob=def_max,
              entropy_increase=def_ent - orig_ent,
              max_prob_reduction=orig_max - def_max,
              mia_signal_reduction_pct=signal_reduction,
          )


      def print_defence_report(r: DefenceReport) -> None:
          print(f"\n  Defence: {r.after_defence}")
          print(f"    Original:  entropy={r.original_entropy:.3f}  max_prob={r.original_max_prob:.4f}")
          print(f"    Defended:  entropy={r.defended_entropy:.3f}  max_prob={r.defended_max_prob:.4f}")
          print(f"    Δ entropy: +{r.entropy_increase:.3f}  |  max_prob reduction: {r.max_prob_reduction:.4f} ({r.mia_signal_reduction_pct:.1f}%)")


      # -----------------------------------------------------------------------
      # Combined Defence Layer
      # -----------------------------------------------------------------------

      def full_defence_pipeline(cv: ConfidenceVector,
                                  top_k: int = 5,
                                  decimal_places: int = 1,
                                  noise_epsilon: float = 5.0,
                                  label_smoothing: float = 0.05) -> ConfidenceVector:
          """
          Apply all four defences in recommended order:
          1. Top-K truncation (remove long tail)
          2. Label smoothing (reduce overconfidence)
          3. Confidence masking (reduce resolution)
          4. Laplace perturbation (add uncertainty)
          """
          cv1 = top_k_truncate(cv, k=top_k)
          cv2 = label_smooth_outputs(cv1, smoothing=label_smoothing)
          cv3 = confidence_mask(cv2, decimal_places=decimal_places)
          cv4 = perturb_probs(cv3, epsilon=noise_epsilon)
          return cv4


      if __name__ == "__main__":
          random.seed(42)

          # Simulate an overfit model's high-confidence output (member signal)
          labels = [f"class_{i}" for i in range(20)]
          raw_probs = [0.88] + [0.006] * 19      # very high confidence on class_0
          total = sum(raw_probs)
          raw_probs = [p / total for p in raw_probs]
          cv = ConfidenceVector(labels=labels, probs=raw_probs)

          print(f"\nORIGINAL: entropy={cv.entropy():.3f}  max_prob={cv.max_prob():.4f}")
          print(f"  Top 3: {cv.top_k(3)}")

          # Test each defence independently
          defences = [
              ("Confidence masking (1dp)",  confidence_mask(cv, decimal_places=1)),
              ("Top-5 truncation",          top_k_truncate(cv, k=5)),
              ("Laplace perturbation ε=5",  perturb_probs(cv, epsilon=5.0, seed=1)),
              ("Label smoothing α=0.1",     label_smooth_outputs(cv, smoothing=0.1)),
              ("Full pipeline",             full_defence_pipeline(cv)),
          ]

          print(f"\nDEFENCE INSTRUMENTATION:")
          for name, defended in defences:
              r = apply_and_measure(cv, name, defended)
              print_defence_report(r)

  implementation_03:
    title: "Combined Privacy Risk Audit Tool"
    filename: "privacy_risk_audit.py"
    purpose: |
      End-to-end privacy risk audit combining extraction risk (corpus scoring
      from Section 5.10), loss-gap MIA risk, and MIA self-assessment (LR test).
      Produces a five-stage audit report with per-stage pass/fail, overall risk
      tier, GDPR article mapping, and prioritised remediation list.
    language: "python"
    code: |
      """
      Combined Privacy Risk Audit Tool
      Integrates: memorisation risk (5.10) + loss gap + LR MIA self-assessment.
      Produces audit report with GDPR mapping and remediation priorities.
      """

      import random
      import math
      from dataclasses import dataclass, field
      from typing import List, Dict, Optional


      # -----------------------------------------------------------------------
      # Audit Stage Results
      # -----------------------------------------------------------------------

      @dataclass
      class AuditStageResult:
          stage_id: str
          stage_name: str
          metric_name: str
          metric_value: float
          threshold: float
          passed: bool
          risk_tier: str
          finding: str
          recommendation: str


      @dataclass
      class PrivacyAuditReport:
          model_id: str
          data_type: str
          stages: List[AuditStageResult]
          overall_risk: str
          deploy_recommendation: str
          gdpr_mapping: Dict[str, str]
          remediation_priority: List[str]


      # -----------------------------------------------------------------------
      # Thresholds by data sensitivity type
      # -----------------------------------------------------------------------

      THRESHOLDS = {
          "medical":   {"corpus_risk": 0.3, "loss_gap": 0.10, "mia_auc": 0.55, "epsilon_req": 2},
          "financial": {"corpus_risk": 0.3, "loss_gap": 0.15, "mia_auc": 0.58, "epsilon_req": 4},
          "legal":     {"corpus_risk": 0.3, "loss_gap": 0.15, "mia_auc": 0.60, "epsilon_req": 4},
          "user_data": {"corpus_risk": 0.4, "loss_gap": 0.20, "mia_auc": 0.62, "epsilon_req": 4},
          "general":   {"corpus_risk": 0.5, "loss_gap": 0.30, "mia_auc": 0.70, "epsilon_req": 8},
      }

      GDPR_ARTICLES = {
          "article_5":  "Data minimisation — corpus PII density and deduplication",
          "article_25": "Privacy by design — regularisation, DP training, output defences",
          "article_30": "Records of processing — ML SBOM and training data provenance",
          "article_35": "DPIA — this audit report constitutes the technical DPIA evidence",
          "article_17": "Right to erasure — DP epsilon or machine unlearning capability",
      }


      def _risk_tier(value: float, threshold: float,
                     lower_is_riskier: bool = False) -> str:
          if lower_is_riskier:
              ratio = threshold / max(value, 1e-9)
          else:
              ratio = value / max(threshold, 1e-9)
          return ("low" if ratio <= 0.7 else
                  "medium" if ratio <= 1.0 else
                  "high" if ratio <= 1.5 else "critical")


      # -----------------------------------------------------------------------
      # Five-Stage Audit
      # -----------------------------------------------------------------------

      def run_privacy_audit(
          model_id: str,
          data_type: str,
          corpus_risk_score: float,
          train_loss: float,
          val_loss: float,
          mia_auc: float,
          dp_epsilon: Optional[float] = None,
          defences_deployed: Optional[List[str]] = None,
      ) -> PrivacyAuditReport:

          thresh = THRESHOLDS.get(data_type, THRESHOLDS["general"])
          stages: List[AuditStageResult] = []
          defences_deployed = defences_deployed or []

          # Stage 1: Data classification (informational)
          stages.append(AuditStageResult(
              stage_id="S1", stage_name="Data Classification",
              metric_name="data_type", metric_value=0.0,
              threshold=0.0, passed=True, risk_tier="info",
              finding=f"Data type: {data_type}. Thresholds: {thresh}",
              recommendation="Ensure data type classification is accurate and reviewed by legal/compliance.",
          ))

          # Stage 2: Memorisation risk score
          cr_tier = _risk_tier(corpus_risk_score, thresh["corpus_risk"])
          stages.append(AuditStageResult(
              stage_id="S2", stage_name="Memorisation Risk Score",
              metric_name="corpus_risk_score", metric_value=corpus_risk_score,
              threshold=thresh["corpus_risk"],
              passed=corpus_risk_score <= thresh["corpus_risk"],
              risk_tier=cr_tier,
              finding=f"Corpus risk score {corpus_risk_score:.3f} vs threshold {thresh['corpus_risk']:.2f}",
              recommendation=(
                  "PASS — proceed." if corpus_risk_score <= thresh["corpus_risk"] else
                  "Apply deduplication and PII pseudonymisation; rescore before training."
              ),
          ))

          # Stage 3: Loss-gap measurement
          loss_gap = val_loss - train_loss
          lg_tier = _risk_tier(loss_gap, thresh["loss_gap"])
          stages.append(AuditStageResult(
              stage_id="S3", stage_name="Loss-Gap Measurement",
              metric_name="loss_gap", metric_value=loss_gap,
              threshold=thresh["loss_gap"],
              passed=loss_gap <= thresh["loss_gap"],
              risk_tier=lg_tier,
              finding=f"Train loss {train_loss:.4f}, val loss {val_loss:.4f}, gap {loss_gap:.4f} vs threshold {thresh['loss_gap']:.2f}",
              recommendation=(
                  "PASS — regularisation adequate." if loss_gap <= thresh["loss_gap"] else
                  f"Reduce overfitting: increase L2 weight decay, add dropout, apply early stopping. "
                  f"If gap > {thresh['loss_gap']*2:.2f}: DP training required."
              ),
          ))

          # Stage 4: MIA self-assessment (AUC-ROC)
          mia_tier = _risk_tier(mia_auc, thresh["mia_auc"])
          stages.append(AuditStageResult(
              stage_id="S4", stage_name="MIA Self-Assessment (LR Test)",
              metric_name="mia_auc", metric_value=mia_auc,
              threshold=thresh["mia_auc"],
              passed=mia_auc <= thresh["mia_auc"],
              risk_tier=mia_tier,
              finding=f"MIA AUC-ROC {mia_auc:.4f} vs threshold {thresh['mia_auc']:.2f} for {data_type} data",
              recommendation=(
                  "PASS — MIA exposure within acceptable range." if mia_auc <= thresh["mia_auc"] else
                  f"MIA AUC exceeds threshold. "
                  f"Apply output perturbation defences. If AUC > {thresh['mia_auc']+0.1:.2f}: DP required."
              ),
          ))

          # Stage 5: Defence deployment verification
          expected_defences = ["confidence_masking", "top_k_truncation",
                                "prediction_perturbation", "regularisation"]
          missing_defences = [d for d in expected_defences if d not in defences_deployed]
          dp_compliant = (dp_epsilon is not None and dp_epsilon <= thresh["epsilon_req"])
          def_passed = (len(missing_defences) == 0 and
                        (dp_compliant or data_type == "general"))
          stages.append(AuditStageResult(
              stage_id="S5", stage_name="Defence Deployment Verification",
              metric_name="defences_missing", metric_value=len(missing_defences),
              threshold=0.0,
              passed=def_passed,
              risk_tier="low" if def_passed else "high",
              finding=(
                  f"Deployed: {defences_deployed}. Missing: {missing_defences}. "
                  f"DP epsilon: {dp_epsilon} (required: ≤{thresh['epsilon_req']} for {data_type})"
              ),
              recommendation=(
                  "All defences deployed." if def_passed else
                  f"Deploy missing defences: {missing_defences}. "
                  + (f"Apply DP training ε≤{thresh['epsilon_req']}." if not dp_compliant and data_type != "general" else "")
              ),
          ))

          # Overall risk
          tier_rank = {"info": 0, "low": 1, "medium": 2, "high": 3, "critical": 4}
          max_tier = max(stages, key=lambda s: tier_rank.get(s.risk_tier, 0)).risk_tier
          failed = [s for s in stages if not s.passed and s.stage_id != "S1"]

          deploy_recs = {
              "low":      "DEPLOY — privacy controls adequate. Monitor in production.",
              "medium":   "CONDITIONAL DEPLOY — address medium findings before or shortly after deployment.",
              "high":     "DO NOT DEPLOY — high-risk findings must be resolved before deployment.",
              "critical": "BLOCK DEPLOYMENT — critical privacy risk. Retrain with DP.",
              "info":     "DEPLOY",
          }

          remediation = [s.recommendation for s in stages
                         if not s.passed and s.stage_id != "S1"]

          gdpr = {art: desc + (" — EVIDENCE AVAILABLE" if s.passed else " — GAP IDENTIFIED")
                  for (art, desc), s in zip(GDPR_ARTICLES.items(), stages[1:])}

          return PrivacyAuditReport(
              model_id=model_id, data_type=data_type,
              stages=stages, overall_risk=max_tier,
              deploy_recommendation=deploy_recs.get(max_tier, "REVIEW"),
              gdpr_mapping=gdpr, remediation_priority=remediation,
          )


      def print_audit_report(r: PrivacyAuditReport) -> None:
          tier_icons = {"info": "INFO  ", "low": "PASS  ", "medium": "WARN  ",
                        "high": "FAIL  ", "critical": "CRIT  "}
          print(f"\n{'='*65}")
          print(f"PRIVACY RISK AUDIT REPORT — {r.model_id}")
          print(f"Data type: {r.data_type}  |  Overall risk: [{r.overall_risk.upper()}]")
          print(f"Recommendation: {r.deploy_recommendation}")
          print(f"\nStage Results:")
          for s in r.stages:
              icon = tier_icons.get(s.risk_tier, "?     ")
              print(f"  [{icon}] {s.stage_id} {s.stage_name}")
              print(f"         {s.finding[:70]}")
              if not s.passed and s.stage_id != "S1":
                  print(f"         Action: {s.recommendation[:70]}")
          if r.remediation_priority:
              print(f"\nRemediation Priority ({len(r.remediation_priority)} items):")
              for i, rec in enumerate(r.remediation_priority, 1):
                  print(f"  {i}. {rec[:70]}")
          print(f"\nGDPR Mapping:")
          for art, desc in r.gdpr_mapping.items():
              print(f"  {art}: {desc[:65]}")


      if __name__ == "__main__":
          random.seed(42)

          # Example 1: High-risk medical fine-tuned model, no defences
          report1 = run_privacy_audit(
              model_id="clinic-llm-v1",
              data_type="medical",
              corpus_risk_score=0.72,   # high PII density
              train_loss=0.42,
              val_loss=1.38,            # large gap — severe overfitting
              mia_auc=0.81,             # critical MIA vulnerability
              dp_epsilon=None,          # no DP training
              defences_deployed=[],     # no output defences
          )
          print_audit_report(report1)

          # Example 2: General-purpose model, defences applied
          report2 = run_privacy_audit(
              model_id="general-assistant-v3",
              data_type="general",
              corpus_risk_score=0.18,   # low risk
              train_loss=1.85,
              val_loss=1.92,            # small gap — well-generalised
              mia_auc=0.55,             # near-random
              dp_epsilon=8.0,           # weak DP applied
              defences_deployed=["confidence_masking", "top_k_truncation",
                                  "prediction_perturbation", "regularisation"],
          )
          print_audit_report(report2)

