section_summary:
  one_paragraph: |
    Section 5.11 completes the privacy attack triad begun in Section 5.10, covering
    membership inference and model inversion — the two attacks that answer "was this
    record in training?" and "what training records can I reconstruct?" respectively.
    The section opens by establishing the confidence-gap mechanism: gradient descent
    drives models to assign high confidence on training members, creating a measurable
    signal exploitable by any caller with API access. The quantitative relationship
    from Yeom et al. (2018) — MIA advantage ≤ generalisation gap / 2 — makes the
    connection to Chapter 1's overfitting treatment explicit and actionable: well-
    regularised models are inherently more resistant to membership inference. The Shokri
    et al. (2017) shadow model attack is examined in full: five-step pipeline from shadow
    data acquisition through membership classifier training and target inference, with
    empirical accuracy results (79% against Google Prediction API, 92% against intentionally
    overfit targets). The LLM-specific likelihood-ratio test provides a shadow-model-free
    black-box attack: LR(x) = log P_target(x) − log P_reference(x), requiring one query
    per record and a publicly available reference model. Four high-risk target scenarios
    receive detailed treatment: clinical trial data, financial records, legal documents,
    and user behavioural data — each with GDPR article implications and adversary profile.
    Model inversion covers gradient-based reconstruction (the Fredrikson et al. 2015 face
    reconstruction demonstration), LLM-specific inversion via gradient leakage in federated
    learning (Zhu et al. 2019), and embedding inversion (Morris et al. 2023). Self-assessment
    provides the loss-gap metric and MIA AUC thresholds by data type, enabling quantitative
    pre-deployment privacy risk certification. Four complementary defences are implemented
    and instrumented: confidence masking, top-k truncation, Laplace prediction perturbation,
    and regularisation — each measured by entropy increase and max-probability reduction.
    The section closes with a five-stage combined privacy risk audit integrating corpus
    risk scoring (5.10), loss-gap measurement, MIA self-assessment, and defence verification
    into a single GDPR-mapped audit procedure. Three implementations deliver the likelihood-
    ratio MIA with loss-gap quantifier, the four-defence privacy layer with instrumentation,
    and the combined privacy risk audit tool with GDPR article mapping.

  next_section: |
    Section 5.12 — Bias, Fairness, and Ethical Risks as Security Vulnerabilities
    The privacy attack surface closed, Section 5.12 opens the bias and fairness
    attack surface: why biased models are predictable, why predictability is
    exploitable, how adversaries game biased fraud detectors through disparate
    impact, and how bias auditing is a form of penetration testing — not compliance
    theatre. The bias taxonomy, fairness metrics, feedback loop amplification,
    and adversarial bias exploitation demonstrations complete the AI threat landscape
    before the regulatory and compliance sections close Chapter 5.

