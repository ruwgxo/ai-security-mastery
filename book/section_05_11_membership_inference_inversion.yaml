# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    Membership inference requires only black-box API access. The likelihood-ratio
    test queries the target API once per record and computes LR(x) = log P_target(x)
    − log P_reference(x). No model weights, no training data, and no special
    permissions are required. Any adversary with API access can run this test
    against any deployed model.

  takeaway_02: |
    Overfitting is the root cause of membership inference vulnerability. The Yeom
    et al. (2018) bound is clean: MIA advantage ≤ (generalisation gap) / 2.
    A perfectly generalised model gives zero MIA advantage. The best membership
    inference defence is a well-regularised model — differential privacy provides
    the formal guarantee, regularisation provides the practical approximation.

  takeaway_03: |
    Shadow models work because the confidence-gap pattern transfers across models
    trained on the same distribution. The adversary does not need access to the
    target's training data — they train shadow models on similar data, collect
    (confidence_vector, member/non-member) labels, and train a classifier that
    transfers to the target API.

  takeaway_04: |
    Model inversion is inverse ML: gradient ascent up the model's confidence
    landscape recovers the training data that shaped that landscape. The
    Fredrikson et al. (2015) face reconstruction demonstrated this against a
    production classifier. The LLM equivalent — gradient leakage in federated
    learning (Zhu et al. 2019) and prompt inversion from outputs — applies the
    same principle to language models.

  takeaway_05: |
    Confidence score masking is a low-cost, immediate-deployment defence.
    Rounding output probabilities to one decimal place reduces shadow model
    attack accuracy by 10-20 percentage points. Returning top-1 labels only
    (no confidence scores) renders the confidence-vector MIA variant nearly
    ineffective. Deploy confidence masking before any model exposed to
    untrusted callers.

  takeaway_06: |
    The AUC-ROC of the likelihood-ratio MIA against your own model is a
    defensible, auditable privacy metric. AUC = 0.50 means zero MIA advantage;
    AUC = 0.80 means substantial membership exposure. Running this test as part
    of pre-deployment evaluation produces quantitative GDPR Article 25 evidence
    (data protection by design) that regulators can audit.

  takeaway_07: |
    The privacy attack triad (extraction + membership inference + inversion)
    defines the complete privacy threat model for models trained on sensitive data.
    Defenders who address only extraction (5.10) leave membership inference
    and inversion undefended. The combined privacy audit integrates all three
    into a single five-stage procedure with GDPR article mapping and
    per-data-type thresholds.

  takeaway_08: |
    Fine-tuning amplifies all three privacy attacks simultaneously. A model
    fine-tuned on 100 internal documents with 50 epochs has near-certain
    memorisation (Section 5.10), a large loss gap (membership inference
    vulnerable), and a high-resolution confidence landscape (inversion-friendly).
    The mandatory controls for sensitive fine-tuning — data deduplication,
    DP training, output perturbation, regularisation — address all three
    attack surfaces in a single implementation.

