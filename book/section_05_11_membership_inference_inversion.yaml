section_content:

  subsection_01:
    number: "5.11.1"
    title: "Membership Inference: The Confidence-Gap Mechanism"
    content: |
      the_binary_question: |
        Membership inference attacks (MIA) answer a single binary question:
        was a specific data record used to train this model?

        The GDPR and data-protection implications are severe. If an adversary can
        determine that a specific patient's medical record, a specific user's
        behavioural data, or a specific employee's performance review was used to
        train a deployed model, they can:
          (a) Confirm undisclosed personal data processing — a regulatory violation
          (b) Build a profile of what data the organisation holds and processes
          (c) Target individuals confirmed to be in the training corpus for
              follow-on social engineering or extraction attacks

        The attack requires no model weights, no training data, and no special
        permissions — only black-box API access and a query budget.

      the_confidence_gap_mechanism: |
        Machine learning models optimise their predictions on training data.
        Gradient descent minimises loss on the training set — specifically, it
        drives the model toward high-confidence correct predictions on training
        examples. This creates a measurable gap between model behaviour on
        training set members (members) and held-out data (non-members):

          Members:    model assigns high probability to the correct class
                      model's loss on the record is low
                      model is confident
          Non-members: model has not specifically optimised on this record
                        model's loss may be higher
                        model is less uniformly confident

        The confidence-gap signal is the core observable for membership inference.
        It is not always large or reliable — but when overfitting is present,
        the gap widens and the attack accuracy improves.

      overfitting_amplification: |
        Section 5.10.1 explained that overfitting amplifies memorisation.
        The same mechanism amplifies membership inference vulnerability.
        An overfit model has learned training data almost exactly — its
        confidence on training members approaches 1.0, while its confidence
        on non-members reflects genuine generalisation uncertainty.
        The gap between these two confidence distributions is the membership
        inference signal, and overfitting makes that gap as large as possible.

        Quantitative relationship (from Yeom et al. 2018):
          MIA advantage ≤ generalisation gap / 2
          where generalisation gap = (train accuracy) − (test accuracy)

        A model with 99% train accuracy and 85% test accuracy has a 14%
        generalisation gap, bounding membership inference advantage at ≤ 7%.
        A perfectly generalised model (train acc = test acc) provides zero
        advantage to a membership inference attack.

        Implication for defenders: the best membership inference defence
        is a well-regularised, non-overfit model. Differential privacy
        provides the formal guarantee; regularisation provides the practical
        approximation.

      three_signal_types:
        signal_01_confidence_score: |
          Model's output probability for the true class.
          Members: typically higher than non-members.
          Accessible via: softmax output vector from API.
          Limitation: unreliable when model is well-calibrated.

        signal_02_loss_value: |
          Cross-entropy loss on the correct label = -log(P(correct_class)).
          Members: lower loss.
          Accessible via: compute from API confidence scores.
          More stable signal than raw confidence.

        signal_03_prediction_entropy: |
          Shannon entropy of the full output probability vector.
          Members: lower entropy (model more certain).
          Non-members: higher entropy (model more uncertain).
          Accessible via: full softmax vector from API (if exposed).

  subsection_02:
    number: "5.11.2"
    title: "Shokri et al. (2017): Shadow Model Attack Architecture"
    content: |
      paper_context: |
        "Membership Inference Attacks Against Machine Learning Models" by Reza Shokri,
        Marco Stronati, Congzheng Song, and Vitaly Shmatikoff (IEEE S&P 2017) introduced
        the shadow model attack — the foundational membership inference methodology that
        demonstrated black-box MIA is practical against real ML APIs including Google
        Prediction API and AWS ML. The attack requires no knowledge of the target model's
        architecture, training data, or weights.

      shadow_model_concept: |
        The fundamental challenge for black-box MIA: how does an adversary build a
        membership classifier without access to the target model's training data?
        The shadow model approach resolves this with an elegant proxy:

        The adversary cannot observe how the target model was trained, but they can:
          (1) Obtain or generate data from a similar distribution
          (2) Train their own model (the shadow model) on that data
          (3) Query the shadow model with both training members and non-members
          (4) Record: (query confidence vector, member/non-member label)
          (5) Train a membership classifier on these labelled examples
          (6) Apply the membership classifier to target model outputs

        This works because shadow models trained on similar distributions develop
        similar confidence gap patterns as the target model. The membership classifier
        learns to recognise the signature of "this record was in training data"
        without ever seeing the target model's actual training data.

      attack_pipeline_in_detail:

        step_01_shadow_data_acquisition: |
          Adversary acquires data from the same distribution as the target's training data.
          Sources: public datasets from the same domain, data synthesis using a
          generative model, API-based collection from the target's domain.
          Quality matters: shadow data that is too different from target distribution
          produces a poorly transferable membership classifier.

        step_02_shadow_model_training: |
          Train k shadow models (Shokri et al. used k=100, practical attacks use k=10)
          on subsets of the shadow data. Each shadow model is trained on roughly half
          the shadow data — this provides training members (in) and non-members (out)
          for the membership classifier's training set.
          Architecture: same type as suspected target (or similar complexity).
          Training: full training until overfitting — intentionally overfit shadow
          models produce larger confidence gaps and better membership classifiers.

        step_03_membership_label_collection: |
          For each shadow model k:
            For each record r in shadow data:
              Query shadow model k with r
              Record: (confidence_vector, "in" if r in shadow_k_train else "out")
          This produces a labelled dataset: (confidence_vector → member/non-member)
          Dataset size: k shadow models × n shadow data records × 2 labels
          With k=10 and n=1000: 10,000 labelled (confidence, membership) pairs

        step_04_attack_classifier_training: |
          Train a binary classifier (logistic regression or small MLP) on the
          labelled membership dataset from Step 3.
          Input: confidence vector output by the model when queried with a record
          Output: binary prediction (member / non-member)
          This classifier learns to distinguish the confidence-gap signature.

        step_05_target_model_inference: |
          For any record the adversary wants to test against the target model:
            Query target model with the record
            Extract confidence vector from target model output
            Apply attack classifier to confidence vector
            Output: (member / non-member) prediction with confidence score
          No additional queries to the target required beyond this one query per record.

      attack_accuracy_empirical_results: |
        Shokri et al. (2017) results against commercial MLaaS APIs:
          Google Prediction API: 79.4% membership inference accuracy
          Amazon ML: 68.6% accuracy
          Against intentionally overfit models: 92%+ accuracy

        Baseline comparison: random guessing on a 50/50 split = 50% accuracy.
        Attack accuracy of 80% represents 30% above random — substantial advantage.

      practical_limitations: |
        Shadow model attack accuracy degrades when:
          - Shadow data distribution diverges significantly from target distribution
          - Target model is well-regularised (small generalisation gap)
          - Target model uses output perturbation or confidence score masking
          - Target model does not expose full softmax vector (top-k only)
        These limitations motivate the defences in Section 5.11.6.

  subsection_03:
    number: "5.11.3"
    title: "LLM Membership Inference: Likelihood Ratio Testing"
    content: |
      why_shadow_models_are_insufficient_for_llms: |
        The Shokri shadow model attack requires training k shadow models of the
        same type as the target. For large language models (7B-70B parameters),
        training even one shadow model is computationally prohibitive for most
        adversaries. The shadow model approach is practical for classification
        models; it is not the primary approach for LLM membership inference.

      likelihood_ratio_mia_for_llms: |
        Carlini et al. (2022) and subsequent work established the likelihood-ratio
        test as the standard black-box LLM MIA. It requires only:
          - Access to the target LLM's token log-probabilities (or a proxy)
          - Access to a reference model (any similar-scale publicly available LLM)

        The test works on the insight that training members are assigned high
        likelihood by the target model specifically because they were in training —
        but they may also be intrinsically high-likelihood text (e.g. common phrases
        that any LLM would assign high probability). The reference model controls
        for intrinsic likelihood, isolating the membership signal.

      likelihood_ratio_formula: |
        For a text sequence x and target model T and reference model R:

          LR(x) = log P_T(x) − log P_R(x)
                = Σ_t [log P_T(x_t | x_{<t}) − log P_R(x_t | x_{<t})]

        Interpretation:
          LR(x) >> 0: target model assigns much higher likelihood than reference
                       → likely training member (target-specific high confidence)
          LR(x) ≈ 0:  both models agree on likelihood
                       → inconclusive
          LR(x) << 0: reference model assigns higher likelihood than target
                       → likely non-member, or member of reference model's training

        Decision rule: classify x as member if LR(x) > threshold τ
        τ is calibrated on a small labelled validation set when available,
        or set to 0 when no validation data exists.

      min_k_variant: |
        A further improvement by Carlini et al. (2022): instead of averaging
        log-probabilities over the entire sequence, use the minimum log-probability
        token. Rationale: for memorised sequences, even the hardest tokens (those
        most likely to deviate from general language patterns) are assigned high
        probability by the target model. The min-k approach focuses on these
        "hardest" tokens where the membership signal is strongest.

          MIN_K(x) = mean of the k lowest per-token log-probabilities
          Classification: if MIN_K_T(x) − MIN_K_R(x) > τ → member

      reference_model_selection: |
        The reference model should be:
          - Similar architecture and scale to the target
          - Trained on similar general data but NOT on the sensitive fine-tuning data
          - Publicly available (GPT-2, Llama-2-7B, Mistral-7B etc.)
        For attacking a model fine-tuned on clinical data: use the base model
        (before fine-tuning) as the reference. The fine-tuning step creates
        the membership gap for fine-tuning examples; the base model provides
        the baseline.

      high_risk_target_scenarios:

        scenario_01_clinical_trials: |
          A pharmaceutical company fine-tunes an LLM on unpublished clinical trial
          data to build a medical literature assistant. Patient records, adverse
          event reports, and dosage outcomes are in the fine-tuning corpus.
          Adversary: competitor company or plaintiff attorney.
          MIA target: specific patient IDs or trial records.
          GDPR implication: trial participants did not consent to AI training.
          MIA outcome: confirmation of training data composition without data access.

        scenario_02_financial_records: |
          A hedge fund fine-tunes an LLM on proprietary trade data and internal
          research reports. Competitor seeks to confirm what data the model was trained on.
          MIA target: specific company names, trade dates, or financial figures.
          MIA outcome: reveals IP composition of the model without code or weight access.

        scenario_03_legal_documents: |
          A law firm deploys an LLM fine-tuned on client contracts and case files
          (with client consent for the firm's internal use). Opposing counsel or
          investigator queries the API to determine if specific case files were in training.
          MIA outcome: reveals attorney-client privileged material was processed by AI.

        scenario_04_user_behavioural_data: |
          A consumer platform fine-tunes a recommendation LLM on user interaction
          history. Regulator or researcher queries whether a specific user's data
          was used to train the deployed model.
          MIA outcome: confirms individual's data was processed — GDPR Article 22
          profiling / automated decision-making implications.

  subsection_04:
    number: "5.11.4"
    title: "Model Inversion Attacks: Reconstructing Training Samples"
    content: |
      what_model_inversion_is: |
        Model inversion attacks reconstruct training data from model outputs.
        While membership inference asks "was this record in training?",
        model inversion asks "what training records can I recover?"

        Inversion is the most powerful privacy attack: it produces approximate
        copies of actual training examples rather than binary membership signals.
        The tradeoff: inversion is harder and typically requires more access than
        membership inference — though black-box variants exist.

      access_level_taxonomy:
        white_box_inversion:
          access_required: "Model weights and architecture — gradient computation"
          power: "Highest — direct gradient signal for reconstruction optimisation"
          primary_target: "Open-weight models; insider threats"
          example: "Gradient-based image reconstruction from image classifier"

        grey_box_inversion:
          access_required: "Full softmax probability vector"
          power: "High — probability landscape guides reconstruction"
          primary_target: "APIs exposing full confidence vectors"
          example: "Confidence-guided reconstruction of face images"

        black_box_inversion:
          access_required: "Top-k class labels only"
          power: "Lower — limited signal, requires more queries"
          primary_target: "Standard classification APIs"
          example: "Label-only reconstruction with surrogate gradient estimation"

      fredrikson_et_al_2015_face_reconstruction: |
        The foundational model inversion paper: "Model Inversion Attacks that Exploit
        Confidence Information and Basic Countermeasures" (Fredrikson, Jha, Ristenpart, 2015).

        Setup: a face recognition classifier trained on celebrity face images.
        The classifier outputs a confidence vector over N celebrities.

        Attack:
          (1) Optimisation target: find input image x* that maximises classifier
              confidence for target person t: x* = argmax_x P(t | x)
          (2) Gradient computation: use backpropagation through the classifier
              to compute ∇_x P(t | x) — the gradient of confidence with respect
              to the input pixel values
          (3) Gradient ascent iteration:
              x_{n+1} = x_n + α × ∇_x P(t | x_n) + λ × prior_gradient
              where prior_gradient regularises toward natural image statistics
          (4) Convergence: after ~1000-10000 iterations, x* is an approximate
              reconstruction of training images of person t

        Result: the reconstructed images were recognisably similar to actual
        training images of the target person, demonstrating that the classifier's
        confidence surface encodes training data in recoverable form.

        Key insight: the classifier's confidence landscape is not arbitrary —
        it is shaped by training data. Gradient ascent navigating that landscape
        recovers the shape of the data that created it.

      llm_inversion_via_gradient_leakage: |
        The LLM equivalent of face reconstruction:

        federated_learning_gradient_attack: |
          In federated learning settings, clients send gradient updates to a
          central server. Zhu et al. (2019) demonstrated that these gradient
          updates encode the client's training data — the original training
          batch can be reconstructed from the gradient update alone using
          a gradient-matching optimisation.
          Relevance: organisations using federated fine-tuning of LLMs expose
          their private documents through gradient updates.

        prompt_inversion_from_outputs: |
          A softer form of inversion: given an LLM's output on a series of
          queries, reconstruct the system prompt or fine-tuning document
          that would produce those outputs. Applicable when the target
          document is not verbatim recalled (Section 5.10) but still
          influences model behaviour in recoverable ways.

        embedding_inversion: |
          Text embeddings encode semantic content. Given the embedding of
          a document, researchers have demonstrated partial reconstruction
          of the original text (Morris et al. 2023 — "Text Embeddings Reveal
          (Almost) As Much As Text"). Any API exposing text embeddings
          leaks partial document content through the embedding.

      inversion_risk_quantification: |
        Inversion risk is highest when:
          (1) Model exposes full probability/confidence vectors (not just top-k)
          (2) Model is fine-tuned on a small, high-value dataset
          (3) Model architecture and weights are accessible (open-weight or insider)
          (4) Training data has low entropy / high structure (faces, formatted records)
          (5) API does not rate-limit or perturb outputs

        Inversion risk is lowest when:
          (1) Only top-1 prediction exposed (no confidence scores)
          (2) DP training applied (confidence landscape smoothed)
          (3) Rate limiting prevents iterative optimisation
          (4) Output perturbation adds noise to confidence vectors

  subsection_05:
    number: "5.11.5"
    title: "Measuring Your Own Exposure: Quantifying MIA Risk"
    content: |
      why_self_assessment_matters: |
        Defenders can run exactly the same membership inference tests that adversaries
        would run, against their own models, before deployment. Self-assessment provides:
          (a) Empirical MIA accuracy — the true positive rate an adversary achieves
          (b) Loss-gap measurement — quantifies overfitting as a privacy proxy
          (c) Evidence for GDPR Article 25 (data protection by design) compliance
          (d) Calibration signal for defence deployment thresholds

      loss_gap_metric: |
        The simplest MIA risk quantifier. Measures the gap between training loss
        and validation loss:

          LOSS_GAP = mean_loss(training_set) − mean_loss(validation_set)

        Interpretation:
          LOSS_GAP < 0.05:  Low MIA risk — model generalises well
          0.05 – 0.20:      Medium — monitor; consider regularisation
          > 0.20:           High — substantial MIA vulnerability; apply DP or retrain
          > 0.50:           Critical — severe overfitting; MIA near-certain for members

        For LLMs: loss = cross-entropy per token. A fine-tuned model with
        training loss 0.8 and validation loss 1.6 has a gap of 0.8 —
        a strong overfitting signal with corresponding MIA risk.

      attack_accuracy_as_risk_metric: |
        Run the likelihood-ratio attack against your own model:
          - Collect a labelled set: 200 training examples (members) + 200 held-out examples (non-members)
          - Compute LR score for each: log P_target(x) − log P_reference(x)
          - Compute AUC-ROC of LR score as a classifier for member/non-member
          - Report: AUC, TPR@FPR=10%, TPR@FPR=1%

        Interpretation:
          AUC = 0.50: no MIA advantage (random guessing)
          AUC = 0.60: low-moderate risk
          AUC = 0.70: moderate-high risk — investigate regularisation
          AUC > 0.80: high risk — DP training required before deployment

      mia_risk_thresholds_by_data_type:
        medical_or_clinical_data:
          acceptable_auc: "<= 0.55"
          required_epsilon: "<= 2"
          rationale: "HIPAA / GDPR health data — highest sensitivity"
        financial_records:
          acceptable_auc: "<= 0.58"
          required_epsilon: "<= 4"
          rationale: "Financial regulation; individual transaction sensitivity"
        legal_documents:
          acceptable_auc: "<= 0.60"
          required_epsilon: "<= 4"
          rationale: "Attorney-client privilege; litigation risk"
        user_behavioural_data:
          acceptable_auc: "<= 0.62"
          required_epsilon: "<= 4"
          rationale: "GDPR profiling rules; user consent boundaries"
        general_proprietary_text:
          acceptable_auc: "<= 0.70"
          required_epsilon: "<= 8"
          rationale: "IP risk; lower individual privacy stakes"

  subsection_06:
    number: "5.11.6"
    title: "Defences: Regularisation, Output Perturbation, and Confidence Masking"
    content: |
      defence_taxonomy: |
        Four complementary defence layers. Applying all four provides defence-in-depth;
        applying only one leaves residual attack surface. Order by implementation cost:

          Tier 1 (low cost, deploy immediately):
            D1 — Output quantisation and confidence masking
            D2 — Top-k output truncation
          Tier 2 (medium cost, deploy before production):
            D3 — Prediction vector perturbation
            D4 — Regularisation and early stopping
          Tier 3 (high cost, required for high-sensitivity data):
            D5 — Differential privacy training (Section 5.10.5)

      defence_01_output_quantisation_and_confidence_masking:
        mechanism: |
          Reduce confidence score resolution before returning to caller.
          Round probabilities to nearest 0.1 or 0.05 rather than returning
          full float precision. For binary/top-k outputs: return only the
          predicted class, not the confidence score.
        effect_on_mia: |
          Shadow model attack accuracy drops sharply when the confidence vector
          is quantised. Shokri et al. found that reducing confidence to 2 decimal
          places reduced attack accuracy by 10-20 percentage points on some targets.
          Full masking (label only) renders the shadow model attack nearly ineffective
          for the confidence-vector-dependent attack variant.
        tradeoff: |
          Users lose confidence calibration information. Applications that require
          uncertainty quantification (medical AI, safety-critical) cannot apply
          full masking. Use quantisation as a middle ground.
        implementation: |
          Python: round(confidence, 1) applied to all returned probabilities.
          For LLMs: do not expose full token log-probability vectors to untrusted callers.

      defence_02_top_k_truncation:
        mechanism: |
          Return only the top-k class labels (without scores) rather than the
          full probability vector. Standard for classification APIs: return
          "Cat: 0.9, Dog: 0.08" but not the full 1000-class softmax.
        effect_on_mia: |
          Reduces the signal available to the membership classifier.
          The shadow model must be trained on top-k data, producing a less
          accurate membership classifier than one trained on full vectors.
        tradeoff: |
          Loss of information for downstream applications. For most consumer
          applications returning top-1 or top-3 is already sufficient.
        implementation: |
          API layer: sort confidence vector, return top-k (name, score) pairs.
          LLMs: expose logprobs for only the N most probable tokens per position.

      defence_03_prediction_perturbation:
        mechanism: |
          Add calibrated random noise to the confidence vector before returning.
          The noise level is set to obscure the membership signal while preserving
          the rank ordering (the highest-confidence class remains highest).
          Two variants:
            Laplace mechanism: add Laplace(0, sensitivity/epsilon) noise per dimension
            Gaussian mechanism: add N(0, sigma) noise, project back to simplex
        effect_on_mia: |
          Perturbed confidence vectors reduce shadow model classifier accuracy.
          At moderate noise levels (σ ≈ 0.01-0.05), MIA accuracy drops 5-15%.
          At high noise levels (σ ≈ 0.1), MIA accuracy approaches random.
        tradeoff: |
          High noise reduces utility. For top-1 classification: utility is
          preserved as long as noise does not flip the argmax.
          Tune noise level to maintain top-1 accuracy while maximising privacy.
        implementation: |
          numpy: probs += np.random.laplace(0, scale, len(probs))
          Project to probability simplex: probs = np.maximum(probs, 0) / probs.sum()

      defence_04_regularisation_and_early_stopping:
        mechanism: |
          Reduce generalisation gap (the root cause of MIA vulnerability) through:
            L2 weight decay: penalise large weights → reduces memorisation capacity
            Dropout: random neuron masking → prevents reliance on individual inputs
            Early stopping: halt training before full convergence → prevents overfit
            Label smoothing: soften target probabilities → reduces overconfidence
        effect_on_mia: |
          Each regularisation technique reduces the training-validation confidence gap.
          MIA advantage = generalisation gap / 2 (Yeom et al. 2018) — directly reduced.
          At high regularisation: model generalises better; MIA collapses toward random.
        tradeoff: |
          Regularisation can reduce task accuracy if applied too aggressively.
          Early stopping requires validation set — requires withholding training data.
        implementation: |
          PyTorch: optimizer = SGD(lr, weight_decay=1e-4)
          Dropout: nn.Dropout(p=0.1) in each layer
          Early stopping: monitor validation loss; stop when val_loss stops decreasing

      defence_05_combined_defence_effectiveness:
        no_defence:
          mia_auc: "0.75-0.85 (overfit model)"
          description: "Baseline — no protections"
        confidence_masking_only:
          mia_auc: "0.65-0.75"
          description: "10% improvement — low cost"
        masking_plus_perturbation:
          mia_auc: "0.58-0.68"
          description: "Further 7% improvement — moderate cost"
        masking_perturbation_regularisation:
          mia_auc: "0.52-0.62"
          description: "Close to random — recommended baseline"
        full_dp_plus_all_defences:
          mia_auc: "0.50-0.55"
          description: "Near-random — required for high-sensitivity data"

  subsection_07:
    number: "5.11.7"
    title: "Combined Privacy Risk Audit: Extraction + Membership Inference"
    content: |
      audit_purpose: |
        The three privacy attacks — training data extraction (Section 5.10),
        membership inference (this section), and model inversion — form a
        complete privacy threat model for any model trained on sensitive data.
        A privacy risk audit combines all three into a single assessment procedure
        that produces actionable risk ratings and GDPR compliance evidence.

      five_stage_audit_procedure:

        stage_01_data_classification:
          action: "Classify training corpus sensitivity by data type"
          output: "Data sensitivity tier: medical / financial / legal / user-data / general"
          tools: "Memorisation risk scorer (Section 5.10, training_data_extraction_poc.py)"
          duration: "1-2 hours"

        stage_02_memorisation_risk_scoring:
          action: "Run corpus risk scorer — n-gram repetition and PII density"
          output: "Risk score (0-1), risk level (LOW/MEDIUM/HIGH), recommendations"
          tools: "score_corpus() from training_data_extraction_poc.py"
          duration: "2-4 hours (depending on corpus size)"
          pass_criterion: "Risk score < 0.3; PII density < 0.01"

        stage_03_loss_gap_measurement:
          action: "Compute training loss and validation loss on the deployed model"
          output: "Loss gap value, MIA risk tier (LOW/MEDIUM/HIGH/CRITICAL)"
          tools: "compute_loss_gap() from mi_attack_tools.py (this section)"
          duration: "1-2 hours"
          pass_criterion: "Loss gap < 0.10 for high-sensitivity data"

        stage_04_mia_attack_self_assessment:
          action: "Run likelihood-ratio MIA against own model with labelled validation set"
          output: "AUC-ROC, TPR@FPR=10%, TPR@FPR=1%"
          tools: "LikelihoodRatioMIA from mi_attack_tools.py"
          duration: "4-8 hours (including reference model setup)"
          pass_criterion: "AUC <= threshold for data type (from Section 5.11.5 table)"

        stage_05_defence_deployment_and_retest:
          action: "Deploy defences (masking, perturbation, regularisation); retest"
          output: "Before/after AUC comparison; defence effectiveness report"
          tools: "PrivacyDefenceLayer from defence_tools.py"
          duration: "1-5 days (depending on DP training requirement)"
          pass_criterion: "Post-defence AUC within acceptable range for data type"

      gdpr_audit_evidence_mapping:
        article_5_data_minimisation: |
          Evidence: training corpus PII density score from Stage 2.
          Control: data minimisation and pseudonymisation applied before training.
        article_25_privacy_by_design: |
          Evidence: documented DP epsilon (if applied); regularisation configuration;
          output perturbation deployment; MIA self-assessment AUC.
          Control: privacy controls applied at design stage, not retrofitted.
        article_30_records_of_processing: |
          Evidence: ML SBOM (Section 5.9); training data provenance records.
          Control: complete four-layer ML SBOM maintained for all production models.
        article_35_dpia: |
          Evidence: full privacy risk audit report (all five stages); risk scores;
          MIA AUC before and after defences; DP epsilon if applicable.
          Control: DPIA completed before deployment of models trained on sensitive data.
        article_17_right_to_erasure: |
          Evidence: DP training epsilon (provides mathematical bound on individual
          contribution); machine unlearning capability documentation.
          Control: DP training or documented erasure procedure.

      privacy_attack_triad_summary: |
        Three attacks, three questions, one complete privacy threat model:

          Extraction (5.10):      "What verbatim training data can I retrieve?"
          Membership inference:   "Was this specific record in training data?"
          Model inversion:        "What training data can I approximately reconstruct?"

        Defenders who can measure and bound all three have a complete picture of
        their model's privacy exposure. Defenders who address only one leave two
        attack vectors unquantified.

