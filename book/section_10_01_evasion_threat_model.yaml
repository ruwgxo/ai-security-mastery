deliverables:

  deliverable_1:
    title: 'Threat Model Contrast Reference'
    filename: 'threat_model_contrast.py'
    description: 'Structured comparison of extraction (Chapter 9) vs evasion (Chapter 10) threat models across eight dimensions, formatted for use as a reference document or team briefing tool'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # threat_model_contrast.py
      # Section 10.1: Extraction vs Evasion Threat Model Contrast
      # 20260521 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class ThreatModelDimension:
          dimension: str
          extraction_ch9: str
          evasion_ch10: str


      THREAT_MODEL_CONTRAST: List[ThreatModelDimension] = [
          ThreatModelDimension(
              dimension='Adversary goal',
              extraction_ch9='Reconstruct model behaviour across input distribution',
              evasion_ch10='Force specific wrong output on a specific input',
          ),
          ThreatModelDimension(
              dimension='Attack scope',
              extraction_ch9='Population-level (full decision surface)',
              evasion_ch10='Instance-level (one input, one output)',
          ),
          ThreatModelDimension(
              dimension='Primary metric',
              extraction_ch9='Query budget (queries per fidelity level)',
              evasion_ch10='Perturbation norm (||delta||_p <= epsilon)',
          ),
          ThreatModelDimension(
              dimension='Detection signal',
              extraction_ch9='Query distribution anomaly over time',
              evasion_ch10='Input distribution shift on single request',
          ),
          ThreatModelDimension(
              dimension='Detection timing',
              extraction_ch9='Post-request, stateful, multi-query accumulation',
              evasion_ch10='Pre-inference, stateless, single-request',
          ),
          ThreatModelDimension(
              dimension='Adversary artefact',
              extraction_ch9='Surrogate model and decision boundary map',
              evasion_ch10='Adversarial example (perturbed input)',
          ),
          ThreatModelDimension(
              dimension='Defence location',
              extraction_ch9='Input-side query monitor + output-side watermark',
              evasion_ch10='Input-side preprocessor + consistency checker',
          ),
          ThreatModelDimension(
              dimension='ATLAS technique',
              extraction_ch9='AML.T0040 / AML.T0024',
              evasion_ch10='AML.T0043 / AML.T0015',
          ),
      ]


      def print_contrast_table(dimensions: List[ThreatModelDimension]) -> None:
          col_w = [22, 44, 44]
          sep = '+' + '+'.join('-' * (w + 2) for w in col_w) + '+'
          row_fmt = '| {:<{}} | {:<{}} | {:<{}} |'

          print(sep)
          print(row_fmt.format(
              'Dimension', col_w[0],
              'Extraction (Ch9)', col_w[1],
              'Evasion (Ch10)', col_w[2],
          ))
          print(sep)
          for d in dimensions:
              print(row_fmt.format(
                  d.dimension, col_w[0],
                  d.extraction_ch9, col_w[1],
                  d.evasion_ch10, col_w[2],
              ))
          print(sep)


      def print_key_shifts() -> None:
          shifts = [
              ('Goal', 'population-level reconstruction -> instance-level misclassification'),
              ('Metric', 'query budget -> perturbation norm (Lp ball)'),
              ('Detection', 'stateful multi-query analysis -> stateless per-input preprocessing'),
              ('Defence', 'query monitor + watermark -> preprocessor + consistency checker'),
              ('ATLAS', 'AML.T0040/T0024 -> AML.T0043/T0015'),
          ]
          print('\nKey threat model shifts (Ch9 -> Ch10):')
          for label, shift in shifts:
              print(f'  {label}: {shift}')


      if __name__ == '__main__':
          print('Extraction vs Evasion Threat Model Contrast')
          print('=' * 42)
          print_contrast_table(THREAT_MODEL_CONTRAST)
          print_key_shifts()

  deliverable_2:
    title: 'Adversary Access Ladder with Evasion Query Budget'
    filename: 'access_ladder_evasion.py'
    description: 'Adversary access ladder for evasion attacks with query budget estimates per tier and the Chapter 9 elevation path that reduces victim query cost to near zero'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # access_ladder_evasion.py
      # Section 10.1: Adversary Access Ladder for Evasion Attacks
      # 20260521 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class AccessTier:
          name: str
          information_available: str
          attack_methods: List[str]
          queries_low: int
          queries_high: int
          ch9_elevation_path: str
          notes: str = ''


      ACCESS_LADDER: List[AccessTier] = [
          AccessTier(
              name='White-box',
              information_available='Model weights, architecture, exact gradients',
              attack_methods=['FGSM (Section 10.3)', 'PGD (Section 10.4)', 'C&W (Section 10.5)'],
              queries_low=1,
              queries_high=1,
              ch9_elevation_path='Open-weight model deployment or Ch8 supply chain weight exfiltration',
              notes='Single forward-backward pass; strongest adversarial examples, fewest operations',
          ),
          AccessTier(
              name='Grey-box',
              information_available='Soft-label outputs (class probabilities)',
              attack_methods=['NES gradient estimation (Section 10.6)', 'Score-based boundary walk'],
              queries_low=1_000,
              queries_high=10_000,
              ch9_elevation_path=(
                  'Most commercial APIs return probabilities. '
                  'Ch9 distillation surrogate approximates victim gradients.'
              ),
              notes='NES estimates gradient direction from antithetic query pairs; O(d) per gradient step',
          ),
          AccessTier(
              name='Black-box',
              information_available='Hard-label outputs (top-1 class only)',
              attack_methods=['Boundary Attack (Section 10.6)', 'Hard-label transfer'],
              queries_low=10_000,
              queries_high=100_000,
              ch9_elevation_path=(
                  'Most restricted production APIs. '
                  'Ch9 distillation elevates adversary to near-white-box via surrogate.'
              ),
              notes='Binary oracle only: correctly classified or not',
          ),
          AccessTier(
              name='Transfer (via Ch9 surrogate)',
              information_available='Ch9 distillation surrogate -- white-box access to surrogate',
              attack_methods=['FGSM/PGD against surrogate; submit adversarial examples to victim (Section 10.7)'],
              queries_low=0,
              queries_high=100,
              ch9_elevation_path='Ch9 extraction output IS Ch10 attack input. Zero additional victim queries.',
              notes='Transfer rate 20-80 percent depending on architecture and training distribution match',
          ),
      ]


      def format_budget(low: int, high: int) -> str:
          if low == high:
              return str(low)
          if low == 0:
              return f'~0 -- {high}'
          return f'{low:,} -- {high:,}'


      def print_access_ladder(ladder: List[AccessTier]) -> None:
          for i, tier in enumerate(ladder, 1):
              print(f'\n[Tier {i}] {tier.name}')
              print(f'  Information:  {tier.information_available}')
              print(f'  Methods:      {", ".join(tier.attack_methods)}')
              print(f'  Queries/ex:   {format_budget(tier.queries_low, tier.queries_high)}')
              print(f'  Ch9 path:     {tier.ch9_elevation_path}')
              if tier.notes:
                  print(f'  Notes:        {tier.notes}')


      def query_cost_reduction_analysis(ladder: List[AccessTier]) -> None:
          black_box = ladder[2]
          transfer = ladder[3]
          if transfer.queries_high > 0:
              reduction = black_box.queries_low // transfer.queries_high
          else:
              reduction = black_box.queries_low
          print('\n--- Query cost reduction via Ch9 extraction campaign ---')
          print(f'  Black-box minimum:   {black_box.queries_low:,} victim queries per adversarial example')
          print(f'  Transfer post-Ch9:   ~{transfer.queries_high} victim queries per adversarial example')
          print(f'  Reduction factor:    {reduction}x fewer victim queries')
          print()
          print('  Security implication:')
          print('    Defending model extraction (Ch9) reduces transfer attack capacity (Ch10).')
          print('    An adversary blocked from distillation cannot trivially mount transfer attacks.')


      if __name__ == '__main__':
          print('Adversary Access Ladder: Evasion Attacks')
          print('=' * 42)
          print_access_ladder(ACCESS_LADDER)
          query_cost_reduction_analysis(ACCESS_LADDER)

  deliverable_3:
    title: 'Lp Norm Constraint Visualiser'
    filename: 'lp_norm_visualiser.py'
    description: 'Visualises L0, L2, and L-infinity norm balls in 2D input space showing how each constraint shapes the admissible perturbation region around an original input'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, requires numpy and matplotlib'
    code: |
      # lp_norm_visualiser.py
      # Section 10.1: Lp Norm Ball Visualisation
      # 20260521 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      import numpy as np
      import matplotlib.pyplot as plt


      def l2_boundary(epsilon: float, n: int = 500):
          angles = np.linspace(0, 2 * np.pi, n)
          return epsilon * np.cos(angles), epsilon * np.sin(angles)


      def linf_boundary(epsilon: float, n: int = 500):
          t = np.linspace(-epsilon, epsilon, n // 4)
          ones = np.ones_like(t)
          top = np.column_stack([t, ones * epsilon])
          right = np.column_stack([ones * epsilon, t[::-1]])
          bottom = np.column_stack([t[::-1], -ones * epsilon])
          left = np.column_stack([-ones * epsilon, t])
          pts = np.vstack([top, right, bottom, left])
          return pts[:, 0], pts[:, 1]


      def l0_points(epsilon: float):
          # In 2D, L0 ball with k=1: only the four axis-aligned extreme points
          return (
              np.array([epsilon, -epsilon, 0.0, 0.0]),
              np.array([0.0, 0.0, epsilon, -epsilon]),
          )


      def plot_lp_balls(epsilon: float = 0.35, save_path: str = 'lp_norm_balls.png') -> None:
          fig, axes = plt.subplots(1, 3, figsize=(14, 5))
          fig.suptitle(
              f'Lp Norm Balls (epsilon={epsilon}) -- Admissible Perturbation Regions',
              fontsize=13,
          )
          configs = [
              ('L0  ||delta||_0 <= 1', 'l0', '#e74c3c'),
              ('L2  ||delta||_2 <= epsilon', 'l2', '#2980b9'),
              ('L-inf  ||delta||_inf <= epsilon', 'linf', '#27ae60'),
          ]
          lim = epsilon * 1.6

          for ax, (title, norm_type, col) in zip(axes, configs):
              ax.set_xlim(-lim, lim)
              ax.set_ylim(-lim, lim)
              ax.axhline(0, color='grey', linewidth=0.5, linestyle='--', alpha=0.6)
              ax.axvline(0, color='grey', linewidth=0.5, linestyle='--', alpha=0.6)
              ax.scatter([0], [0], color='black', zorder=5, s=80, label='Original input x')
              ax.set_title(title, fontsize=10)
              ax.set_xlabel('Feature 1')
              ax.set_ylabel('Feature 2')
              ax.set_aspect('equal')

              if norm_type == 'l0':
                  xs, ys = l0_points(epsilon)
                  ax.scatter(xs, ys, color=col, zorder=4, s=100, label='Admissible (k=1)')
                  ax.annotate(
                      'Sparse: at most 1\nfeature changes\n(any magnitude)',
                      xy=(0.05, 0.78), xycoords='axes fraction', fontsize=8,
                  )
              elif norm_type == 'l2':
                  xs, ys = l2_boundary(epsilon)
                  ax.fill(xs, ys, alpha=0.15, color=col)
                  ax.plot(xs, ys, color=col, linewidth=2, label=f'L2 ball r={epsilon}')
                  ax.annotate(
                      'Smooth: perturbation\ndistributed across\nall features',
                      xy=(0.05, 0.78), xycoords='axes fraction', fontsize=8,
                  )
              elif norm_type == 'linf':
                  xs, ys = linf_boundary(epsilon)
                  ax.fill(xs, ys, alpha=0.15, color=col)
                  ax.plot(xs, ys, color=col, linewidth=2, label=f'L-inf r={epsilon}')
                  ax.annotate(
                      f'Uniform: each feature\nchanges by at most\n{epsilon}',
                      xy=(0.05, 0.78), xycoords='axes fraction', fontsize=8,
                  )

              ax.legend(fontsize=8, loc='lower right')

          plt.tight_layout()
          plt.savefig(save_path, dpi=150, bbox_inches='tight')
          print(f'Saved: {save_path}')
          plt.show()


      def print_norm_summary() -> None:
          norms = [
              ('L0', 'count(delta_i != 0)', 'Sparse: few features, any magnitude', 'Malware byte modification'),
              ('L2', 'sqrt(sum delta_i^2)', 'Smooth: distributed perturbation', 'C&W minimum-norm attack'),
              ('L-inf', 'max(|delta_i|)', 'Uniform: bounded per-feature', 'FGSM and PGD (image domain)'),
              ('Semantic', 'token edit / cosine sim', 'Discrete substitution', 'TextFooler, HotFlip (text)'),
          ]
          print('\nNorm summary:')
          for name, formula, character, use_case in norms:
              print(f'  {name:<10} {formula:<25} {character:<35} {use_case}')


      if __name__ == '__main__':
          print_norm_summary()
          plot_lp_balls(epsilon=0.35)

