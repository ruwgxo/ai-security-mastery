  deliverable_5:
    title: 'Track Architecture Comparator'
    filename: 'track_architecture_comparator.py'
    description: 'Structured comparison of Track 6 (Chapter 9 query pattern monitoring) and Track 7 (Chapter 10 adversarial detection) detection architectures, highlighting the pre-inference vs post-request timing distinction'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, no external dependencies'
    code: |
      # track_architecture_comparator.py
      # Section 10.1: Track 6 vs Track 7 Detection Architecture Comparison
      # 20260521 | AI Security Mastery by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class TrackArchitecture:
          track_number: int
          chapter: int
          name: str
          threat_addressed: str
          timing: str
          state: str
          detection_signal: str
          stages: List[str]
          latency_profile: str
          atlas_techniques: List[str]
          gateway_position: str


      TRACK_6 = TrackArchitecture(
          track_number=6,
          chapter=9,
          name='Query Pattern Monitor',
          threat_addressed='Model extraction: functionality, fidelity, decision-boundary, prompt',
          timing='Post-request: fires after model returns response',
          state='Stateful: accumulates per-user query patterns across many requests',
          detection_signal='Anomalous query distribution over time (OOD rate, boundary proximity, entropy)',
          stages=[
              '1. Per-request: extract query embedding, compute OOD score',
              '2. Per-user: update rolling window of query features',
              '3. Distributional anomaly test against per-user baseline',
              '4. Alert or adaptive rate limit if threshold exceeded',
          ],
          latency_profile=(
              'Fully parallel with response delivery. '
              'Does not add to user-facing latency. '
              'Never on the critical path.'
          ),
          atlas_techniques=[
              'AML.T0040 (ML Model Inference API Access)',
              'AML.T0024 (Exfiltration via ML Inference API)',
          ],
          gateway_position='Track 6 of six-track ensemble (Tracks 1-5 from Ch6/7)',
      )

      TRACK_7 = TrackArchitecture(
          track_number=7,
          chapter=10,
          name='Adversarial Example Detector',
          threat_addressed='Adversarial evasion: FGSM, PGD, C&W, black-box, transfer, physical, LLM text',
          timing='Pre-inference (squeezing) + post-inference (consistency, classifier) within single request',
          state='Stateless: each request analysed independently with no cross-request accumulation',
          detection_signal='Input distribution shift on single request: squeezer disagreement, prediction instability',
          stages=[
              '1. Pre-inference: feature squeezer transforms input BEFORE main model inference',
              '2. Main inference: primary model produces output on original input',
              '3. Post-inference: consistency checker submits N perturbed input variants',
              '4. Post-inference: adversarial classifier scores original input independently',
              '5. Ensemble: combine squeezer + consistency + classifier scores; block/flag/pass',
          ],
          latency_profile=(
              'Stage 1 (squeezer) IS on the critical path: squeezer latency + main inference <= 50ms P99. '
              'Stages 3-4 run async in parallel with each other. '
              'Track 7 unique: first gateway track requiring pre-inference transformation.'
          ),
          atlas_techniques=[
              'AML.T0043 (Craft Adversarial Data)',
              'AML.T0015 (Evade ML Model)',
          ],
          gateway_position='Track 7 of seven-track ensemble (Tracks 1-6 from Ch6/7/9)',
      )


      def print_field_comparison(t6: TrackArchitecture, t7: TrackArchitecture) -> None:
          fields = [
              ('Track / Ch', lambda t: f'Track {t.track_number} (Ch{t.chapter})'),
              ('Name', lambda t: t.name),
              ('Threat', lambda t: t.threat_addressed),
              ('Timing', lambda t: t.timing),
              ('State', lambda t: t.state),
              ('Signal', lambda t: t.detection_signal),
              ('ATLAS', lambda t: ' | '.join(t.atlas_techniques)),
              ('Position', lambda t: t.gateway_position),
          ]
          col_w = [12, 52, 52]
          sep = '+' + '+'.join('-' * (w + 2) for w in col_w) + '+'
          fmt = '| {:<{}} | {:<{}} | {:<{}} |'
          print(sep)
          print(fmt.format('Field', col_w[0], 'Track 6 (Ch9)', col_w[1], 'Track 7 (Ch10)', col_w[2]))
          print(sep)
          for label, accessor in fields:
              v6 = accessor(t6)
              v7 = accessor(t7)
              lines6 = [v6[i:i + col_w[1]] for i in range(0, len(v6), col_w[1])]
              lines7 = [v7[i:i + col_w[2]] for i in range(0, len(v7), col_w[2])]
              for j in range(max(len(lines6), len(lines7))):
                  lbl = label if j == 0 else ''
                  l6 = lines6[j] if j < len(lines6) else ''
                  l7 = lines7[j] if j < len(lines7) else ''
                  print(fmt.format(lbl, col_w[0], l6, col_w[1], l7, col_w[2]))
          print(sep)


      def print_stages(t6: TrackArchitecture, t7: TrackArchitecture) -> None:
          print('\n--- Track 6 stages ---')
          for s in t6.stages:
              print(f'  {s}')
          print('\n--- Track 7 stages ---')
          for s in t7.stages:
              print(f'  {s}')


      def print_key_difference() -> None:
          print('\nKey architectural difference:')
          print('  Track 6: stateful, post-request, never on critical path.')
          print('  Track 7: stateless, pre-inference stage IS on critical path.')
          print('  Implication: Track 7 pre-inference squeezer latency must be benchmarked')
          print('  at production input dimensions (Section 10.11 squeezer_latency_benchmark.py).')


      if __name__ == '__main__':
          print('Track 6 vs Track 7 Detection Architecture Comparison')
          print('=' * 54)
          print_field_comparison(TRACK_6, TRACK_7)
          print_stages(TRACK_6, TRACK_7)
          print_key_difference()

common_mistakes:

  mistake_1:
    description: 'Treating evasion detection as a harder variant of extraction detection and reusing Track 6 stateful query monitoring for Track 7'
    why_it_happens: |
      Both extraction and evasion attacks operate against inference-time APIs and use the same
      adversary access tiers. Engineers who built Track 6 for extraction assume the same
      architecture applies to evasion because the attack surface looks identical from the outside.
    consequence: |
      A stateful query pattern monitor fires on extraction campaigns but produces no signal for
      a single adversarial example submission. The evasion attack succeeds without triggering any
      alert because the Track 6 detection was designed for the wrong footprint -- multi-query
      campaign vs single-request attack.
    correct_approach: |
      Treat extraction and evasion as architecturally distinct. Track 6 accumulates multi-request
      signal; Track 7 analyses a single request in two stages (pre-inference transformation and
      post-inference consistency check). Both tracks must be present in the seven-track gateway
      for full coverage.

  mistake_2:
    description: 'Calibrating adversarial defences against L-infinity attacks only and missing L0 and L2 attack families'
    why_it_happens: |
      FGSM and PGD use L-infinity constraints by construction and dominate published adversarial
      ML benchmarks. Security engineers implementing defences calibrate against L-infinity and
      report robustness against the most-cited attacks.
    consequence: |
      Feature squeezing with Gaussian blur -- effective against fine-grained L-infinity perturbations
      -- does not generalise to sparse L0 attacks (malware byte modification) or minimum-norm L2
      attacks (C&W). A malware classifier hardened against L-infinity image-style attacks may be
      trivially vulnerable to sparse header byte modification.
    correct_approach: |
      Evaluate defences across all three norm families. For domain-specific inputs (malware PE
      headers, fraud transaction features, text tokens), identify the physically realisable
      perturbation set and calibrate detection thresholds against that set, not against
      L-infinity image benchmarks.

  mistake_3:
    description: 'Assuming black-box API access by the adversary and underestimating transfer attack risk from prior Ch9 extraction'
    why_it_happens: |
      Engineers design evasion defences for the access tier that matches their deployment
      configuration (hard-label API = black-box adversary). They do not account for the fact
      that an adversary who completed a Chapter 9 distillation campaign has elevated to near-
      white-box conditions against their surrogate model.
    consequence: |
      Defences sized for black-box query budgets (10,000--100,000 queries per adversarial example)
      fail against transfer attacks that require near-zero additional victim queries. The adversary
      amortises the query cost entirely in the Ch9 extraction campaign, then submits transfer
      adversarial examples that bypass the query-count-based rate limits.
    correct_approach: |
      For any model that has been or could be targeted by a Ch9 extraction campaign, treat transfer
      attacks as the primary evasion threat. Defences must address adversarial examples crafted
      with white-box access to a surrogate, not just the query budget of direct black-box attacks.

  mistake_4:
    description: 'Interpreting a certified L2 robustness guarantee as general adversarial robustness'
    why_it_happens: |
      Randomised smoothing (Section 10.14) provides a formal certificate for L2 perturbations.
      Security teams receiving a robustness certification report interpret it as general adversarial
      robustness and deprioritise Track 7 detection.
    consequence: |
      The certified L2 radius does not bound L-infinity robustness or L0 robustness. A model
      certified against L2 perturbation of radius 0.5 may be trivially vulnerable to an L-infinity
      perturbation of epsilon=0.01. Removing Track 7 detection on the basis of a norm-specific
      certificate leaves the model exposed to the attack families the certificate does not cover.
    correct_approach: |
      Treat certified robustness certificates as norm-specific and radius-specific guarantees,
      not as general defences. Supplement L2 certification with empirical robustness evaluation
      under FGSM and PGD (L-infinity) and C&W L0. Certified robustness and Track 7 detection
      are complementary -- both must be present in a production defence stack.

  mistake_5:
    description: 'Adding Track 7 pre-inference squeezing to the gateway without benchmarking squeezer latency at production input dimensions'
    why_it_happens: |
      Track 7 squeezing is added to a test environment with small inputs, meets the latency budget,
      and gets deployed to production. Latency benchmarks are not repeated at production input size
      (large images, long context windows) under production concurrency.
    consequence: |
      At production scale each squeezer adds 5--20ms of critical-path latency. An ensemble of three
      squeezers running sequentially before the main model can push total gateway latency above the
      50ms P99 budget, degrading user experience and triggering SLO violations.
    correct_approach: |
      Benchmark each squeezer individually at production input dimensions under production concurrency
      before committing to the ensemble size. Use the squeezer_latency_benchmark.py from Section 10.11
      and the Track 7 calibration harness from Section 10.13. Run squeezers in parallel where possible
      to keep them off the sequential critical path.

section_summary:

  compact: |
    Chapter 10 shifts the threat model from extraction (Chapter 9) to evasion: the adversary has a
    specific input they want misclassified, not a full model reconstruction goal. The primary formal
    tools are Lp norm constraints (L0 sparse, L2 Euclidean, L-infinity uniform) that define the
    admissible perturbation budget. The adversary access ladder mirrors Chapter 9 with one critical
    addition: Chapter 9 distillation surrogates elevate black-box adversaries to near-white-box
    conditions via transfer attacks, eliminating most of the victim query cost. Detection shifts from
    stateful post-request query pattern analysis (Track 6) to stateless pre-inference preprocessing
    (Track 7). ATLAS techniques AML.T0043 and AML.T0015 anchor the chapter to the detection
    engineering framework. Both are completed as Sigma rules in Section 10.13.

  key_takeaways:
    - 'Evasion is instance-level; extraction is population-level -- different goals require different detection architectures (Track 6 vs Track 7)'
    - 'Chapter 9 boundary maps are computational inputs to FGSM/PGD; Chapter 9 surrogates are transfer vehicles -- defending extraction partially defends evasion'
    - 'Lp norm constraints are formal attack budgets: L0 sparse, L2 Euclidean, L-infinity uniform -- each favours different input domains'
    - 'Targeted misclassification is harder for the adversary but more dangerous for the defender because it suppresses all downstream controls simultaneously'
    - 'Track 7 is the first gateway track with a pre-inference transformation stage -- squeezer latency is on the critical path, not parallel to it'
    - 'AML.T0043 (Craft Adversarial Data) covers all attack families in Sections 10.3-10.9; AML.T0015 (Evade ML Model) covers the runtime impact -- both completed as Sigma rules in Section 10.13'

preview_section_10_02:
  title: 'Section 10.2: Adversarial Example Taxonomy -- Goals, Constraints, and Detection Signals'
  summary: |
    Section 10.2 builds the complete adversarial example taxonomy: four attack goals
    (targeted, untargeted, confidence reduction, detection evasion) by three access tiers
    (white-box, grey-box, black-box) by four input modalities (image, text, tabular, audio).
    Each cell in the taxonomy matrix maps to a canonical technique and a query budget estimate.
    The section produces the goal-to-detection-signal mapper that tells the Track 7 engineer
    which primitive covers which attack class, and the defender decision tree that classifies
    an observed evasion attempt from its observable signals. The taxonomy is the scaffold that
    all attack sections (10.3-10.9) occupy and that the Track 7 gateway uses to route alerts.

