prose_content:

  part_1:
    title: 'The Threat Model Shift: From What the Model Knows to What the Model Decides'
    body: |
      Chapter 9 established a precise threat model: the adversary wants to reconstruct the
      victim model''s behaviour across its input distribution. The goal is population-level --
      the surrogate they produce should match the victim on any input they care to query. The
      attack is measured in query budget (how many API calls to achieve target fidelity), and
      the defence detects anomalous query distributions over time.

      Chapter 10 begins where Chapter 9 ends, but with a different goal. The adversary already
      understands how the model behaves. Now they have a specific input -- a malware binary, a
      fraudulent transaction, a piece of prohibited content -- that the model classifies
      correctly against their interest. Their goal is to modify that input by the minimum
      amount necessary to make the model classify it incorrectly. The scope is instance-level:
      one input, one wrong output, one adversary-chosen outcome.

      This shift changes everything downstream. The attack is no longer measured in queries --
      it is measured in perturbation magnitude, the formal distance between the original input
      and the adversarial example. The defence is no longer a query distribution analyser -- it
      is a preprocessing stage that detects or removes adversarial perturbations before the
      model acts on them. The formal guarantee is no longer about query budget exhaustion -- it
      is about perturbation radius: can we certify that no perturbation within a given norm ball
      changes the model''s output?

      For security engineers: the practical consequence is that evasion attacks bypass controls
      at the final stage of the pipeline. A malware classifier that survived data poisoning
      (Chapter 8) and extraction (Chapter 9) can still be bypassed by an adversarially perturbed
      sample at inference time. Track 7 exists because the first six tracks do not address this
      attack surface.

  part_2:
    title: 'The Mechanistic Bridge: How Chapter 9 Output Becomes Chapter 10 Input'
    body: |
      The connection between Chapter 9 and Chapter 10 is not conceptual -- it is computational.
      Understanding this bridge is essential for two reasons: it explains why defending extraction
      partially defends against the strongest evasion attacks, and it explains why the most
      dangerous adversaries in Chapter 10 are those who completed a Chapter 9 campaign first.

      The Fast Gradient Sign Method (FGSM), introduced in Section 10.3, generates adversarial
      examples by computing the gradient of the loss function with respect to the input:
      x_adv = x + epsilon * sign(nabla_x J(theta, x, y)). In a white-box setting this gradient
      is computed directly against the victim model. In the black-box setting that characterises
      most production deployments, the adversary cannot access the victim''s gradients. They need
      a substitute -- and that substitute is exactly the surrogate model produced by Section 9.4
      distillation. The surrogate''s loss gradient approximates the victim''s loss gradient in
      regions where the two models'' decision boundaries align, which is precisely what the
      distillation optimisation ensures.

      The decision boundary maps from Section 9.3 contribute differently. FGSM requires only a
      gradient direction; the map alone is overkill for a single adversarial example. But Projected
      Gradient Descent (PGD, Section 10.4) iterates multiple steps within an epsilon ball, and
      initialising those steps from boundary-proximate points -- points the Chapter 9 boundary
      mapper already identified -- dramatically reduces the number of iterations to convergence.
      The boundary map is not just intelligence; it is a computational accelerant for the inner
      optimisation loop.

      Transfer attacks (Section 10.7) complete the bridge. Adversarial examples crafted against
      a well-matched surrogate transfer to the victim at 20--80% rates depending on architecture
      similarity. The adversary''s workflow is: extract the victim via Chapter 9 distillation,
      craft adversarial examples against the surrogate using Chapter 10 gradient methods, submit
      those examples to the victim API. Zero additional victim queries after the extraction
      campaign. The Chapter 9 surrogate is both the extraction product and the Chapter 10 attack
      vehicle.

  part_3:
    title: 'Adversary Goal Taxonomy: Targeted vs Untargeted Misclassification'
    body: |
      Adversarial evasion attacks divide into two goal classes based on what the adversary wants
      the model to output.

      Untargeted misclassification requires only that the model output any class other than the
      correct one. The adversary succeeds if the malware binary is classified as anything other
      than malware -- benign software, a different malware family, an unknown file type. The
      optimisation problem is relatively unconstrained: perturb x by at most epsilon such that
      argmax f(x_adv) != y_true. This is the easier attack goal. The gradient of any loss that
      pushes the model away from the correct class is sufficient.

      Targeted misclassification requires that the model output a specific wrong class chosen by
      the adversary. The adversary does not just want the malware classified as not-malware --
      they want it classified as a specific trusted application, a specific benign file hash, or
      a specific low-risk category that triggers a different downstream action. The optimisation
      problem is more constrained: perturb x by at most epsilon such that argmax f(x_adv) = y_target
      where y_target is the adversary''s chosen wrong class. This is harder for the adversary but
      more dangerous for the defender. Targeted attacks force a specific wrong decision with
      specific operational consequences: a transaction classified as legitimate (not just not-fraud),
      content classified as allowed (not just not-prohibited), a user authenticated as a specific
      identity (not just not-rejected).

      For production security systems, the targeted/untargeted distinction determines the threat
      model for downstream controls. An untargeted adversarial example that evades a malware
      classifier might still trigger anomaly detection, rate limiting, or manual review because
      the output is unusual. A targeted adversarial example that produces a specific trusted
      classification can suppress all downstream controls simultaneously.

  part_4:
    title: 'Adversary Access Ladder: Gradient Access, Query Budget, and the Ch9 Elevation Path'
    body: |
      The adversary access ladder for evasion mirrors the Chapter 9 extraction ladder with one
      critical addition: the distillation pathway from Chapter 9 allows access elevation.

      White-box access means the adversary has the model''s weights, architecture, and can compute
      exact gradients. This produces the strongest adversarial examples with the fewest operations --
      a single forward-backward pass generates the FGSM perturbation. In practice, white-box access
      against production APIs is uncommon except in two scenarios: open-weight models deployed by
      the operator, and adversaries who successfully exfiltrated model weights via supply chain
      compromise (Chapter 8).

      Grey-box access means the adversary receives soft-label outputs -- class probabilities or
      confidence scores. This enables gradient estimation via finite differences or Natural Evolution
      Strategies (NES, Section 10.6): query the model at x + delta_i and x - delta_i for many
      directions delta_i, then estimate the gradient direction from the score differences. Grey-box
      attacks require O(d) to O(d log d) queries per gradient step where d is input dimension.
      For a 224x224x3 image that is 150,000+ queries per gradient step -- expensive but feasible
      against commercial APIs with sufficient budget.

      Black-box access means the adversary receives only hard-label outputs: the top-1 class
      prediction with no probability. This is the most common production configuration and the
      hardest attack condition. The Boundary Attack (Section 10.6) operates in this condition:
      it starts from a trivially misclassified input and iteratively reduces distance to the
      natural image while remaining adversarial, requiring only a binary oracle (correctly classified
      or not). Query budgets for black-box attacks range from 10,000 to 100,000 per adversarial
      example depending on perturbation budget and input dimension.

      The Chapter 9 elevation path is the critical addition. An adversary who completed a Section
      9.4 distillation campaign begins Chapter 10 with a surrogate model approximating the victim''s
      decision boundary. Against their surrogate they have white-box access. Against the victim
      they execute a transfer attack (Section 10.7): craft adversarial examples against the
      surrogate, submit to the victim. The victim query cost drops to near zero -- the extraction
      campaign traded query budget for adversarial example access. This is why defending extraction
      (Chapter 9) partially defends evasion (Chapter 10).

  part_5:
    title: 'Perturbation Constraints: Lp Norm Balls as Formal Attack Budgets'
    body: |
      The Lp norm constraint formalises the concept of imperceptible perturbation. Given an
      original input x and adversarial perturbation delta, the constraint ||delta||_p <= epsilon
      limits the perturbation to the surface and interior of an Lp ball of radius epsilon
      centred on x.

      The L0 norm counts the number of features that changed: ||delta||_0 = |{i : delta_i != 0}|.
      An L0 attack with budget k changes at most k input features by any amount. For image inputs
      this produces sparse perturbations -- a small number of pixels changed significantly. For
      malware inputs L0 attacks are natural: the adversary can modify specific bytes (header fields,
      padding, appended content) while leaving execution-critical code untouched. L0 constraints
      are less common in academic benchmarks because the non-differentiability of the L0 norm
      makes gradient-based optimisation difficult, but they are practically important for structured
      inputs with discrete modification budgets.

      The L2 norm measures Euclidean distance: ||delta||_2 = sqrt(sum_i delta_i^2). An L2 attack
      distributes the perturbation budget smoothly across all features. The Carlini-Wagner attack
      (Section 10.5) operates under an L2 constraint by construction: it directly minimises
      ||delta||_2 subject to the misclassification constraint, producing minimum-Euclidean-distance
      adversarial examples. L2 attacks are the right budget model when the adversary cares about
      total distortion rather than worst-case per-feature change.

      The L-infinity norm measures the maximum absolute change across all features:
      ||delta||_inf = max_i |delta_i|. An L-infinity attack changes every feature by at most
      epsilon. This produces uniform fine-grained perturbations -- in images each pixel shifts
      by at most epsilon/255 intensity units, producing perturbations visually indistinguishable
      from the original at small epsilon. FGSM and PGD operate under L-infinity constraints by
      construction: the gradient sign operation produces exactly an L-infinity perturbation.
      L-infinity is the dominant constraint in adversarial ML research for image inputs and the
      most relevant constraint for continuous-feature tabular inputs.

      For text inputs none of the Lp constraints apply directly because text is discrete. Token
      edit distance (the number of token substitutions) and semantic similarity (cosine distance
      between sentence embeddings) are the text analogues. Section 10.9 addresses text adversarial
      attacks under these constraints.

  part_6:
    title: 'Security-Critical Classifier Threat Models'
    body: |
      Four production classifier categories carry the highest adversarial evasion risk because
      successful evasion has immediate operational security consequences.

      Malware classifiers are the highest-stakes target for L0 evasion. PE binaries have a rich
      structure of metadata fields -- import tables, section names, resource directories, overlay
      content -- that can be modified without affecting execution behaviour. An adversary can append
      benign content to a malicious binary, rename exported functions, or pad sections with benign
      bytes to shift the binary''s feature representation toward the benign class while preserving
      full malicious functionality. The perturbation constraint is functional equivalence rather
      than Lp distance: any modification that preserves execution behaviour is admissible.

      Fraud scoring models face both untargeted and targeted evasion. Untargeted: modify transaction
      features (merchant category, time, amount) by small amounts to push the fraud score below the
      decision threshold. Targeted: craft a transaction that scores as a specific legitimate merchant
      pattern. Feature-space evasion against fraud models is complicated by the fact that not all
      feature combinations are physically realisable -- the effective perturbation constraint is the
      set of feature combinations achievable under the adversary''s operational constraints.

      Content moderation systems face text adversarial attacks. The adversary substitutes words
      with synonyms or near-synonyms (TextFooler, Section 10.9), introduces character-level
      variations (homoglyphs, zero-width characters), or uses semantic-preserving paraphrases
      that shift the text''s embedding-space representation outside the classifier''s decision
      boundary. The constraint is semantic preservation: the text must remain meaningful and
      approximately semantically equivalent to a human reader.

      Safety filters for LLMs face the same attack surface as content moderation systems plus
      the adversarial trigger attack class: fixed token sequences that, when appended to any
      prompt, universally cause the safety filter to output a permissive decision regardless of
      prompt content. Section 10.9 covers LLM adversarial attacks; Section 10.12 covers
      consistency checking as the primary detection primitive.

  part_7:
    title: 'Detection Architecture Shift: From Post-Request Query Patterns to Pre-Inference Preprocessing'
    body: |
      The distinction between Track 6 and Track 7 is architectural, not incidental, and it follows
      directly from the threat model difference between extraction and evasion.

      Track 6 (Section 9.11) is stateful and post-request. It accumulates query patterns across
      many requests from a user or session, analyses the distribution of inputs over time (are they
      concentrating near decision boundaries? is OOD query rate anomalous?), and fires an alert or
      rate limit action after enough evidence accumulates. The extraction adversary has a campaign
      footprint: they must send hundreds or thousands of queries to extract useful information, and
      that footprint is detectable in aggregate even when individual queries look benign.

      Track 7 is stateless and pre-inference. The evasion adversary''s footprint is a single input:
      one adversarial example submitted once. There is no multi-query campaign to detect. The
      detection must happen before the model produces its output -- because once the model classifies
      the adversarial example as benign malware, legitimate, or safe, the downstream security
      control has already been bypassed. Pre-inference feature squeezing (Section 10.11) transforms
      the input before it reaches the model, comparing the model''s output on the original versus the
      squeezed version. A large prediction change signals adversarial perturbation. Consistency
      checking (Section 10.12) submits N randomly perturbed variants of the input and flags inputs
      whose classification is unstable -- adversarial examples live near decision boundaries and
      are typically fragile under small random perturbation.

      The unified seven-track gateway (Section 10.13) preserves the 50ms P99 latency budget by
      running Track 7 pre-inference squeezing before the main model inference begins. Track 7
      post-inference stages (consistency checking, adversarial classifier) run in parallel with
      each other and with Tracks 1--6 using the same async dispatch pattern Track 6 introduced.
      The pre-inference stage is Track 7''s unique contribution to the gateway architecture --
      no prior chapter required a stage that transforms the input before the primary model sees it.

