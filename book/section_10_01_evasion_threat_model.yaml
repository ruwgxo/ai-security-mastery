section_overview:
  one_line_summary: 'Chapter 9 mapped the decision surface; Chapter 10 weaponises that map to force specific wrong outputs.'
  why_this_section_exists: |
    Chapter 9 ended with an adversary holding a decision-boundary map and a distillation surrogate
    of the victim model. Section 10.1 establishes what those artefacts enable next: adversarial
    example generation. The threat model shifts from population-level extraction to instance-level
    evasion, the detection architecture shifts from stateful query pattern monitoring to per-input
    preprocessing, and the formal attack budget shifts from query count to Lp perturbation norm.
    Every attack section in Chapter 10 builds on the threat model defined here.
  position_in_chapter: |
    Section 10.1 is the threat model anchor for all 15 subsequent sections. It establishes the
    evasion adversary, the access ladder, the perturbation constraint taxonomy, the ATLAS technique
    mapping, and the Track 7 architectural motivation. It mirrors the role Section 9.1 played in
    Chapter 9: resetting the threat model before the attack catalogue begins.

learning_objectives:

  knowledge:
    - 'Explain the shift from extraction (population-level model reconstruction) to evasion (instance-level misclassification) as a change in adversary goal and detection architecture'
    - 'Describe the mechanistic bridge from Section 9.3 boundary maps and Section 9.4 surrogates to FGSM, PGD, and transfer attacks'
    - 'Define targeted and untargeted adversarial misclassification and state which is harder for the adversary and which is more dangerous for the defender'
    - 'Describe the three access tiers (white-box, grey-box, black-box) and their query budget implications for evasion attacks'
    - 'Explain L0, L2, and L-infinity perturbation constraints as formal attack budgets and state which is most common for image adversarial examples and why'
    - 'Map AML.T0043 and AML.T0015 to their position in the Chapter 10 section structure'
    - 'Articulate why Track 7 operates pre-inference while Track 6 operates post-request'

  skills:
    - 'Produce an extraction-vs-evasion threat model contrast across the eight dimensions defined in this section'
    - 'Classify any adversarial evasion scenario into the access tier taxonomy and estimate its query budget'
    - 'Visualise L0, L2, and L-infinity norm balls in 2D input space and identify which perturbation type a given attack uses'
    - 'Map an adversarial attack to its ATLAS sub-technique and identify the Chapter 10 section that addresses it'
    - 'Describe the pre-inference vs post-request architectural split between Track 7 and Track 6'

  security_mindset:
    - 'Recognise that a completed Chapter 9 extraction campaign is the prerequisite for the most powerful Chapter 10 transfer attacks -- defending extraction reduces evasion attack capacity'
    - 'Internalise that evasion attacks are instance-level: the adversary has a specific input they want misclassified, not a general capability they want to replicate'
    - 'Understand that Lp norms are a formal contract between attacker and defender -- the norm choice determines what counts as imperceptible and what detection signals are available'
    - 'Appreciate that the shift to pre-inference detection in Track 7 reflects the threat model, not arbitrary design: adversarial perturbations must be detected before the model acts on them'

