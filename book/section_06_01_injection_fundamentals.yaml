section_summary: |
  Section 6.1 established the mechanistic foundation for everything that follows
  in Chapter 6. The core argument: prompt injection is not a software defect.
  It is an architectural property of the transformer model -- self-attention
  processes tokens from all context sources with identical computation, and the
  context window is a flat sequence with no hardware-enforced privilege separation.
  RLHF alignment teaches the model to produce preferred outputs; it cannot verify
  the provenance of instructions at inference time and it is not a reliable barrier
  against adversaries who iterate faster than patch cycles.

  Direct injection (AML.T0051) and indirect injection (AML.T0054) exploit the
  same underlying mechanism through different adversary positions. The four
  injection surfaces -- user input, retrieved context, tool output, and agent
  memory -- each require distinct classifier placement and detection signals.
  Most production deployments classify user input only, leaving the indirect
  injection surface entirely unmonitored.

  The SQL injection analogy is useful for communicating root cause and useless
  for communicating defence: parameterised queries solved SQL injection because
  syntax is parseable; natural language injection requires semantic intent
  detection, not input sanitisation.

  Section 6.2 begins the attack taxonomy. Section 6.17 builds the production
  classifier. This section is the argument for why that classifier must be
  semantic, must cover all four surfaces, and must be deployed at the
  infrastructure layer rather than the model layer.
...
