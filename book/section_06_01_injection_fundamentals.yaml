key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Self-attention processes tokens from all context sources identically. There
        is no hardware or protocol-level instruction-data distinction. This is the
        architectural root of prompt injection.

    - number: 2
      takeaway: |
        The context window is a flat token sequence. System prompt, user input,
        retrieved documents, and tool outputs all enter the same computation.
        Privilege separation at the model layer does not exist.

    - number: 3
      takeaway: |
        System prompt priority is a statistical training tendency, not a security
        guarantee. It fails against context flooding, adversarial optimisation,
        and indirect injection via trusted-appearing retrieved content.

    - number: 4
      takeaway: |
        RLHF alignment teaches output distributions, not provenance verification.
        Novel injection variants outside the training distribution bypass alignment
        entirely. Adversaries iterate faster than alignment patch cycles.

    - number: 5
      takeaway: |
        Direct injection (AML.T0051) requires adversary interaction with the
        application. Indirect injection (AML.T0054) does not -- the adversary
        controls an external data source and the legitimate user triggers execution.
        Most production deployments have no classifier on indirect injection surfaces.

    - number: 6
      takeaway: |
        Prompt injection has no CVE because it is not a software bug. It is an
        architectural property shared by every current production LLM. The absence
        of a CVE is not evidence of low severity; it is evidence of architectural
        scope.

    - number: 7
      takeaway: |
        The SQL injection analogy clarifies root cause but obscures defence.
        Parameterised queries work for SQL because syntax is machine-parseable.
        Natural language has no equivalent -- injection defence requires semantic
        intent detection, not input sanitisation.

    - number: 8
      takeaway: |
        The four injection surfaces in every LLM deployment are: user input,
        retrieved external context, tool output, and agent memory. A complete
        injection detection architecture must cover all four. Section 6.17 builds
        the classifier; Sections 6.2 through 6.16 map every attack pattern it
        must detect.


