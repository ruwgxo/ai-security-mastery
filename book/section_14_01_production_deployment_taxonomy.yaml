deliverables:
  deliverable_1:
    title: Production Deployment Concern Taxonomy
    filename: production_deployment_taxonomy.py
    description: Encodes the six deployment concerns as structured records, each mapped to the question
      it answers, the failure it prevents, the specific way the system dies in production if it is ignored,
      the non-functional requirement it introduces, and the Chapter 14 section that addresses it. Prints
      the concern taxonomy and the design-to-service gap report.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints as formatted sections and a gap table.
    code: |
      # production_deployment_taxonomy.py
      # Section 14.01: Production Deployment Concern Taxonomy
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class DeploymentConcern:
          name: str
          question_it_answers: str
          failure_if_ignored: str
          production_death: str
          chapter_14_section: str
          non_functional_requirement: str
          tiers_affected: List[str]


      DEPLOYMENT_CONCERNS: List[DeploymentConcern] = [
          DeploymentConcern(
              name='Placement',
              question_it_answers='Where in the request path does detection sit?',
              failure_if_ignored='Detection is bolted on at the wrong point and either cannot see the traffic it must inspect or adds an avoidable network hop',
              production_death='A detector placed after the model call cannot block a malicious prompt before inference is paid for',
              chapter_14_section='Sections 14.02 and 14.03',
              non_functional_requirement='Correct interception of the request and response',
              tiers_affected=['inline', 'near-real-time', 'batch'],
          ),
          DeploymentConcern(
              name='Latency',
              question_it_answers='How much time may detection add to the request?',
              failure_if_ignored='The inline detector exceeds the budget and the API becomes slow enough that the detector is disabled',
              production_death='A detector that adds 200ms to every request is removed for degrading the product',
              chapter_14_section='Sections 14.04 and 14.05',
              non_functional_requirement='Sub-50ms P99 on the inline tier',
              tiers_affected=['inline'],
          ),
          DeploymentConcern(
              name='Failure handling',
              question_it_answers='What happens when a detector errors?',
              failure_if_ignored='With no policy the gateway either blocks all traffic or admits all traffic the moment a detector throws',
              production_death='An unhandled exception in one detector fails the request open and admits the attack it was meant to catch',
              chapter_14_section='Section 14.06',
              non_functional_requirement='A deliberate fail-open or fail-closed policy per detector and tier',
              tiers_affected=['inline', 'near-real-time', 'batch'],
          ),
          DeploymentConcern(
              name='Availability',
              question_it_answers='How does one detector failure stay contained?',
              failure_if_ignored='A single slow or failing detector cascades into a total gateway outage',
              production_death='A hung detector holds every worker thread and the whole gateway stops serving',
              chapter_14_section='Section 14.07',
              non_functional_requirement='Circuit breakers, graceful degradation, and bulkhead isolation',
              tiers_affected=['inline', 'near-real-time', 'batch'],
          ),
          DeploymentConcern(
              name='Observability',
              question_it_answers='Can the running system be seen, tuned, and trusted?',
              failure_if_ignored='The detection rate, false-positive rate, and latency are invisible so the system cannot be operated or improved',
              production_death='A silent rise in false positives goes unnoticed until users route around the product',
              chapter_14_section='Sections 14.08 and 14.09',
              non_functional_requirement='Metrics, logging, tracing, and an operable dashboard',
              tiers_affected=['inline', 'near-real-time', 'batch'],
          ),
          DeploymentConcern(
              name='Cost',
              question_it_answers='Does the system stay affordable at production volume?',
              failure_if_ignored='Compute, inference, and storage costs grow unbounded until the system is switched off when the bill arrives',
              production_death='An expensive analytics detector run on every request makes the gateway too costly to keep on',
              chapter_14_section='Section 14.10',
              non_functional_requirement='Sampling, caching, and batching within a cost bound',
              tiers_affected=['near-real-time', 'batch'],
          ),
      ]


      def print_concern_taxonomy(concerns: List[DeploymentConcern]) -> None:
          print('=' * 78)
          print('PRODUCTION DEPLOYMENT CONCERN TAXONOMY')
          print('Each concern is a distinct way a correct detection system dies in production')
          print('=' * 78)
          for c in concerns:
              print()
              print(f'CONCERN: {c.name}')
              print(f'  Answers          : {c.question_it_answers}')
              print(f'  If ignored       : {c.failure_if_ignored}')
              print(f'  Production death  : {c.production_death}')
              print(f'  Addressed in      : {c.chapter_14_section}')
              print(f'  NFR              : {c.non_functional_requirement}')
              tiers = ', '.join(c.tiers_affected)
              print(f'  Tiers affected   : {tiers}')


      def readiness_gap_report(concerns: List[DeploymentConcern]) -> None:
          print()
          print('=' * 78)
          print('DESIGN-TO-SERVICE GAP: THE CONCERNS PRODUCTION ADDS')
          print('=' * 78)
          header = 'Concern'.ljust(18) + 'NFR added by production'.ljust(48)
          print(header)
          print('-' * 78)
          for c in concerns:
              nfr = c.non_functional_requirement
              if len(nfr) > 46:
                  nfr = nfr[:43] + '...'
              print(f'{c.name:<18}{nfr:<48}')
          print('-' * 78)
          print(f'Total deployment concerns: {len(concerns)}')
          print('A logical architecture specifies WHAT runs WHERE.')
          print('These concerns specify HOW it keeps running under load, failure, and cost.')


      if __name__ == '__main__':
          print_concern_taxonomy(DEPLOYMENT_CONCERNS)
          readiness_gap_report(DEPLOYMENT_CONCERNS)
  deliverable_2:
    title: Production Readiness Checklist
    filename: production_readiness_checklist.py
    description: Enumerates the requirements that separate a logical architecture from a production service,
      grouped by concern, and evaluates them against the starting state -- the Chapter 13 logical architecture,
      which has none of them yet. Reports a readiness score that is zero at the start of the chapter and
      the section that closes each gap.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the checklist grouped by concern and a readiness summary.
    code: |
      # production_readiness_checklist.py
      # Section 14.01: What Separates a Logical Architecture from a Production Service
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List, Optional


      @dataclass
      class ReadinessItem:
          concern: str
          requirement: str
          design_has_it: bool
          section_that_delivers: str


      CHECKLIST: List[ReadinessItem] = [
          ReadinessItem('Placement', 'Detection intercepts request before the model call', False, '14.02, 14.03'),
          ReadinessItem('Placement', 'Post-processing detection intercepts the model response', False, '14.03'),
          ReadinessItem('Latency', 'Inline tier holds sub-50ms P99 under load', False, '14.04'),
          ReadinessItem('Latency', 'Per-detector latency budget is allocated and measured', False, '14.04'),
          ReadinessItem('Throughput', 'Tiers scale horizontally with backpressure', False, '14.05'),
          ReadinessItem('Failure handling', 'Fail-open or fail-closed decided per detector', False, '14.06'),
          ReadinessItem('Availability', 'Circuit breakers cut off a failing detector', False, '14.07'),
          ReadinessItem('Availability', 'Graceful degradation sheds non-essential detectors under stress', False, '14.07'),
          ReadinessItem('Observability', 'Golden signals emitted per detector and tier', False, '14.08'),
          ReadinessItem('Observability', 'An operable dashboard with SLO-driven alerting exists', False, '14.09'),
          ReadinessItem('Cost', 'Expensive tiers use sampling, caching, or batching', False, '14.10'),
          ReadinessItem('Cost', 'Cost is attributed per detector and per tier', False, '14.10'),
      ]


      def evaluate(checklist: List[ReadinessItem]) -> None:
          print('=' * 78)
          print('PRODUCTION READINESS CHECKLIST')
          print('Starting state: the Chapter 13 logical architecture (design only)')
          print('=' * 78)
          by_concern = {}
          for item in checklist:
              by_concern.setdefault(item.concern, []).append(item)
          for concern, items in by_concern.items():
              print()
              print(f'[{concern}]')
              for it in items:
                  mark = 'PASS' if it.design_has_it else 'GAP '
                  print(f'  [{mark}] {it.requirement}')
                  if not it.design_has_it:
                      print(f'         -> delivered in Section {it.section_that_delivers}')


      def readiness_score(checklist: List[ReadinessItem]) -> float:
          met = sum(1 for i in checklist if i.design_has_it)
          total = len(checklist)
          return 100.0 * met / total if total else 0.0


      def summarise(checklist: List[ReadinessItem]) -> None:
          score = readiness_score(checklist)
          gaps = sum(1 for i in checklist if not i.design_has_it)
          print()
          print('=' * 78)
          print('READINESS SUMMARY')
          print('=' * 78)
          print(f'Production readiness of the logical architecture: {score:.0f}%')
          print(f'Open gaps to close in Chapter 14: {gaps}')
          print('The logical architecture is 100% complete as a DESIGN and 0% ready')
          print('as a SERVICE -- these are different artifacts, and Chapter 14 closes the gap.')


      if __name__ == '__main__':
          evaluate(CHECKLIST)
          summarise(CHECKLIST)
  deliverable_3:
    title: Detection-to-Deployment Mapping
    filename: detection_to_deployment_mapping.py
    description: Maps the Chapter 13 inline, near-real-time, and batch tiers to the deployment concerns
      that dominate each one, showing that the state-latency partition already sorts the detectors by
      which deployment concern governs them. Prints the tier mapping and the per-concern coverage across
      tiers.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the tier mapping and a concern-coverage view.
    code: |
      # detection_to_deployment_mapping.py
      # Section 14.01: How the Chapter 13 Tiers Map to the Deployment Concerns
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Dict


      @dataclass
      class DetectionTier:
          name: str
          state_size: str
          latency_budget: str
          scaling_model: str
          dominant_concerns: List[str]
          example_detectors: List[str]


      TIERS: List[DetectionTier] = [
          DetectionTier(
              name='Inline',
              state_size='Small or none (stateless hot path)',
              latency_budget='Sub-50ms P99 -- hard constraint',
              scaling_model='Horizontal, near-linear (stateless)',
              dominant_concerns=['Latency', 'Failure handling', 'Availability'],
              example_detectors=['Signature match', 'Heuristic rules', 'Cheap ML classifier'],
          ),
          DetectionTier(
              name='Near-real-time',
              state_size='Moderate (recent-window state)',
              latency_budget='Seconds -- off the request hot path',
              scaling_model='Horizontal with state partitioning',
              dominant_concerns=['Throughput', 'Cost', 'Observability'],
              example_detectors=['Session behaviour scoring', 'Drift monitors'],
          ),
          DetectionTier(
              name='Batch',
              state_size='Large (historical corpus)',
              latency_budget='Minutes to hours -- fully asynchronous',
              scaling_model='Data-parallel job scheduling',
              dominant_concerns=['Cost', 'Throughput', 'Observability'],
              example_detectors=['Coordinated-network analysis', 'Population baselining'],
          ),
      ]


      def print_tier_mapping(tiers: List[DetectionTier]) -> None:
          print('=' * 78)
          print('CHAPTER 13 TIERS -> CHAPTER 14 DEPLOYMENT CONCERNS')
          print('The state-latency coupling of Chapter 13 already reflects the constraints')
          print('the deployment layer must enforce.')
          print('=' * 78)
          for t in tiers:
              print()
              print(f'TIER: {t.name}')
              print(f'  State size       : {t.state_size}')
              print(f'  Latency budget   : {t.latency_budget}')
              print(f'  Scaling model    : {t.scaling_model}')
              dom = ', '.join(t.dominant_concerns)
              print(f'  Dominant concerns: {dom}')
              ex = ', '.join(t.example_detectors)
              print(f'  Example detectors: {ex}')


      def concern_coverage(tiers: List[DetectionTier]) -> Dict[str, List[str]]:
          coverage: Dict[str, List[str]] = {}
          for t in tiers:
              for concern in t.dominant_concerns:
                  coverage.setdefault(concern, []).append(t.name)
          return coverage


      def print_coverage(tiers: List[DetectionTier]) -> None:
          coverage = concern_coverage(tiers)
          print()
          print('=' * 78)
          print('WHERE EACH CONCERN DOMINATES')
          print('=' * 78)
          for concern in sorted(coverage):
              joined = ', '.join(coverage[concern])
              print(f'  {concern:<18}-> {joined}')
          print()
          print('Latency dominates the inline tier because it is on the hot path.')
          print('Cost dominates the near-real-time and batch tiers because they run the')
          print('expensive, large-state detection Chapter 13 deliberately kept off the hot path.')


      if __name__ == '__main__':
          print_tier_mapping(TIERS)
          print_coverage(TIERS)
  deliverable_4:
    title: Chapter 14 Section-to-Concern Roadmap
    filename: chapter_14_roadmap.py
    description: Renders the Chapter 14 sections as the five-stage progression -- placement, performance,
      resilience, operability, cost -- with the concern family and headline deliverable of each section,
      and prints the staged progression that shows why each stage assumes the one before it.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the roadmap table and the five-stage progression.
    code: |
      # chapter_14_roadmap.py
      # Section 14.01: Chapter 14 Section-to-Concern Roadmap
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class RoadmapEntry:
          section: str
          title: str
          concern_family: str
          deliverable: str


      ROADMAP: List[RoadmapEntry] = [
          RoadmapEntry('14.01', 'Production Deployment Taxonomy', 'Placement (framing)', 'Concern taxonomy and readiness checklist'),
          RoadmapEntry('14.02', 'Architecture Patterns', 'Placement', 'architecture_pattern_selector.py'),
          RoadmapEntry('14.03', 'Integration Points', 'Placement', 'detection_integration_points.py'),
          RoadmapEntry('14.04', 'Latency Engineering', 'Performance', 'latency_budget_engine.py'),
          RoadmapEntry('14.05', 'Throughput and Scaling', 'Performance', 'horizontal_scaling_planner.py'),
          RoadmapEntry('14.06', 'Failure Modes', 'Resilience', 'fail_open_closed_policy.py'),
          RoadmapEntry('14.07', 'High Availability', 'Resilience', 'circuit_breaker.py'),
          RoadmapEntry('14.08', 'Observability', 'Operability', 'observability_stack.py'),
          RoadmapEntry('14.09', 'Monitoring Dashboard', 'Operability', 'production_monitoring_dashboard.py'),
          RoadmapEntry('14.10', 'Cost Optimisation', 'Cost', 'cost_optimizer.py'),
          RoadmapEntry('14.11', 'Production Gateway Capstone', 'All families', 'production_detection_gateway.py'),
          RoadmapEntry('14.12', 'Chapter Summary', 'Synthesis', 'Readiness checklist and Chapter 15 preview'),
      ]

      # The chapter moves through five stages in order.
      STAGE_ORDER = ['Placement', 'Performance', 'Resilience', 'Operability', 'Cost']


      def print_roadmap(roadmap: List[RoadmapEntry]) -> None:
          print('=' * 82)
          print('CHAPTER 14 ROADMAP: PLACEMENT -> PERFORMANCE -> RESILIENCE -> OPERABILITY -> COST')
          print('=' * 82)
          header = 'Sec'.ljust(7) + 'Title'.ljust(32) + 'Concern family'.ljust(22) + 'Deliverable'.ljust(21)
          print(header)
          print('-' * 82)
          for e in roadmap:
              title = e.title if len(e.title) <= 30 else e.title[:27] + '...'
              fam = e.concern_family if len(e.concern_family) <= 20 else e.concern_family[:17] + '...'
              deliv = e.deliverable if len(e.deliverable) <= 19 else e.deliverable[:16] + '...'
              print(f'{e.section:<7}{title:<32}{fam:<22}{deliv:<21}')
          print('-' * 82)


      def print_stage_progression() -> None:
          print()
          print('THE FIVE-STAGE PROGRESSION')
          print('-' * 82)
          descriptions = {
              'Placement': 'Put detection in the request path (14.02-14.03)',
              'Performance': 'Engineer latency and scaling under load (14.04-14.05)',
              'Resilience': 'Survive detector failure (14.06-14.07)',
              'Operability': 'See, tune, and trust the system (14.08-14.09)',
              'Cost': 'Keep it affordable so it stays on (14.10)',
          }
          for i, stage in enumerate(STAGE_ORDER, start=1):
              print(f'  {i}. {stage:<14}{descriptions[stage]}')
          print()
          print('  Capstone (14.11): assemble all five stages into one running service.')


      if __name__ == '__main__':
          print_roadmap(ROADMAP)
          print_stage_progression()
common_mistakes:
  mistake_1:
    description: Treating the completed Chapter 13 logical architecture as production-ready and moving
      straight to deployment without engineering the non-functional concerns
    why_it_happens: |-
      The logical architecture looks finished. Every detector is named, every tier is
      assigned, and the request flow is fully specified, so it reads as a complete system
      rather than a complete design. The distinction between the two artifacts is not visible
      in the diagram.
    consequence: The gateway ships without a latency budget, a failure policy, circuit breakers, observability,
      or cost control, and dies in production the first time it meets real load, a detector error, or
      a cost review.
    correct_approach: Treat the logical architecture as 100% complete as a design and 0% ready as a service,
      and run the production readiness checklist to enumerate the deployment concerns that must be engineered
      before the gateway is a service.
  mistake_2:
    description: Assuming that a high-quality detection stack compensates for weak deployment engineering
    why_it_happens: |-
      Detection quality is where the intellectual effort of the previous chapters went, so it
      feels like the hard part is done. Precision, recall, and coverage are concrete and
      measurable, while the deployment concerns feel like plumbing.
    consequence: An excellent detector that adds too much latency, has no failure policy, or has no observability
      is disabled, bypassed, or distrusted in production regardless of how well it detects, and the detection
      quality is wasted.
    correct_approach: Recognise that deployment is a distinct discipline orthogonal to detection, and
      that you cannot detect your way past a latency budget, a missing failure policy, or an absence of
      observability. Engineer the deployment concerns deliberately and separately.
  mistake_3:
    description: Leaving non-functional requirements -- latency budget, failure mode, cost bound -- unspecified
      and letting production set them
    why_it_happens: |-
      Non-functional requirements are easy to defer because the system appears to work without
      them in a test environment with light load, no failures, and no cost visibility. The
      requirement seems optional until production proves otherwise.
    consequence: The latency budget is set the day the API is declared too slow, the failure mode is set
      by whichever code path the exception takes, and the cost bound is set by the finance review that
      switches the system off -- each requirement chosen by the incident rather than the engineer.
    correct_approach: Treat every non-functional requirement as first-class and choose it deliberately
      in advance. Set the sub-50ms P99 budget, the per-detector fail-open or fail-closed policy, and the
      cost bound before deployment, not after the outage that would otherwise set them.
  mistake_4:
    description: Applying deployment concerns uniformly across all detectors instead of by tier
    why_it_happens: |-
      A single uniform policy is simpler to reason about and implement than a per-tier one, and
      the state-latency tiers of Chapter 13 are easy to treat as an internal detail of
      detection rather than as the structure the deployment layer should follow.
    consequence: The inline tier is burdened with cost optimisation it does not need while the batch tier
      is held to a latency budget it cannot meet, and the deployment engineering fights the tier structure
      instead of using it.
    correct_approach: 'Use the Chapter 13 tiers as the bridge: apply latency, failure handling, and availability
      engineering to the inline tier, and cost, throughput, and observability engineering to the near-real-time
      and batch tiers, because the state-latency partition already sorts detectors by dominant concern.'
  mistake_5:
    description: Reading Chapter 14 as a grab-bag of operations topics rather than a deliberate response
      to named failure modes
    why_it_happens: |-
      Latency, scaling, circuit breakers, observability, and cost are each a large field with
      its own literature, so the sections can look like independent operations tutorials that
      happen to be collected in one chapter.
    consequence: Sections are studied or skipped in isolation, the connection between each mechanism and
      the specific production failure it prevents is lost, and engineering effort is spent on mechanisms
      that do not map to a real failure mode for the system at hand.
    correct_approach: Read every Chapter 14 section as a response to one of the six deployment concerns
      and the failure it prevents, following the placement-to-performance-to-resilience-to-operability-to-cost
      progression that this taxonomy section establishes.
section_summary:
  compact: |-
    A complete logical architecture and a production service are different artifacts. The
    Chapter 13 behavioural monitoring gateway is 100% complete as a design and 0% ready as a
    service, because the design answers what runs where while a service must also answer the
    non-functional questions of placement, latency, failure handling, availability,
    observability, and cost. These six deployment concerns are a closed set, each preventing a
    specific way a correct detection system dies in production: detection that runs too late to
    block, a detector that is too slow to keep, an unhandled error that fails open, a hung
    detector that cascades into an outage, a silent false-positive rise that goes unseen, and
    unbounded cost that switches the system off. Deployment is a distinct discipline from
    detection, and detection quality does not buy you out of it. The Chapter 13 state-latency
    tiers are the bridge: they already sort detectors by which deployment concern governs them,
    with latency, failure handling, and availability dominating the inline tier and cost,
    throughput, and observability dominating the near-real-time and batch tiers. Chapter 14
    addresses the concerns in a deliberate order -- placement, performance, resilience,
    operability, cost -- and the capstone assembles all five stages into one running gateway
    that meets its latency, availability, and cost targets together.
  key_takeaways:
  - 'A logical architecture and a production service are different artifacts measured on different axes:
    the Chapter 13 gateway is complete as a design and not yet ready as a service'
  - The deployment concerns are a closed set of six -- placement, latency, failure handling, availability,
    observability, and cost -- and each prevents a specific way a correct detection system dies in production
  - Deployment is a distinct discipline from detection, and detection quality does not compensate for
    unaddressed deployment concerns
  - An unspecified non-functional requirement is not absent but chosen by the incident, so latency budgets,
    failure policies, and cost bounds must be set deliberately in advance
  - The Chapter 13 state-latency tiers are the bridge between detection and deployment and already sort
    detectors by which deployment concern dominates each tier
  - Chapter 14 addresses the concerns in the deliberate order placement, performance, resilience, operability,
    cost, and the capstone assembles them into one running production service
