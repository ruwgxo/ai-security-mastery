document_info:
  title: 'Production Deployment Taxonomy: What Production Adds to the Logical Architecture'
  chapter: 14
  section: 1
  section_code: '1401'
  author: Raghav Dinesh
  github: https://github.com/ruwgxo/ai-security-mastery
  license: MIT
  version: '1.0'
  created: '2026-06-21'
  estimated_pages: 6
  estimated_reading_time: 45-55 minutes
section_overview:
  one_line_summary: 'A complete logical architecture and a production service are different artifacts:
    the Chapter 13 behavioural monitoring gateway specifies what runs where, and production adds the non-functional
    engineering -- placement, latency, failure handling, availability, observability, and cost -- that
    keeps it running under load, failure, and cost.'
  why_this_section_exists: |-
    Chapter 13 ended with the behavioural monitoring gateway: signature, heuristic, ML, and
    behavioural detection integrated as a four-layer stack, with detectors placed at inline,
    near-real-time, and batch tiers by the state-latency coupling. That is a complete logical
    design and an incomplete system. A logical architecture does not survive contact with
    production load, production failures, and production cost without engineering that the
    design does not contain. This section is the anchor for Chapter 14: it establishes that
    deployment is a distinct discipline from detection, names the deployment concerns, and
    maps each one to the specific way a correct detection system dies in production if that
    concern is left unaddressed. Every subsequent section of the chapter is then a deliberate
    response to one of these failure modes rather than an arbitrary operations topic.
  position_in_chapter: |-
    Section 14.01 is the taxonomy anchor for all 11 subsequent sections of Chapter 14, mirroring
    the taxonomy anchors of 12.01 and 13.01. It is the map that makes the placement sections
    (14.02-14.03), the performance sections (14.04-14.05), the resilience sections
    (14.06-14.07), the operability sections (14.08-14.09), the cost section (14.10), and the
    capstone (14.11) each a response to a named concern rather than a standalone topic.
learning_objectives:
  knowledge:
  - Explain why a complete logical architecture is a different artifact from a production service and
    what production adds
  - Name the six deployment concerns -- placement, latency, failure handling, availability, observability,
    and cost -- and the failure each one prevents
  - Describe the specific way a correct detection system dies in production for each unaddressed deployment
    concern
  - Explain why deployment is a distinct discipline from detection and why detection quality does not
    compensate for deployment neglect
  - State how the Chapter 13 inline, near-real-time, and batch tiers map onto the deployment concerns
  - Explain why non-functional requirements -- latency, availability, throughput, cost -- are first-class
    constraints rather than afterthoughts
  - Describe the Chapter 14 roadmap from placement to performance to resilience to operability to cost
  skills:
  - Produce a deployment concern taxonomy that maps each concern to the failure it prevents and the section
    that addresses it
  - Apply a production readiness checklist that distinguishes a logical architecture from a production
    service
  - Map the Chapter 13 detection tiers to the deployment concerns that dominate each tier
  - Read the Chapter 14 roadmap as a deliberate progression rather than a list of operations topics
  security_mindset:
  - Recognise that deployment is a distinct discipline and a correct detection system dies in production
    if the deployment concerns are unaddressed
  - Internalise that each deployment concern is a distinct failure mode, so addressing detection quality
    alone leaves the system exposed
  - Understand that an unspecified non-functional requirement is a requirement chosen by the incident
    rather than by the engineer
  - Appreciate that the state-latency tiers of Chapter 13 are the bridge between detection and deployment
    and already encode the constraints the deployment layer must enforce
