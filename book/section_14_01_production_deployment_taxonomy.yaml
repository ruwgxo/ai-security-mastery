prose_content:
  part_1:
    title: 'A Design Is Not a System: The Two-Artifact Argument'
    body: |-
      Chapter 13 ended with a complete architecture. The behavioural monitoring gateway names
      every detector, assigns each one to the inline, near-real-time, or batch tier by the
      state-latency coupling, and specifies what the request hot path reads. Read it as a
      blueprint and nothing is missing: you can see which detector fires where, what state each
      one needs, and how the four detection layers combine into a verdict. It is a finished
      design.

      It is also not a system. The gap between the two is not a matter of writing the design out
      in more detail. A logical architecture and a production service are different artifacts
      that answer different questions. The logical architecture answers what runs where: which
      detector, at which tier, reading which state. A production service answers a second set of
      questions that the design never touches. How much time may the inline detector add to a
      request before the API is too slow to ship? What happens to a request when a detector
      throws an exception? How does one failing detector avoid taking down the whole gateway?
      Can the running system be seen well enough to tune and trust it? Does it stay affordable
      at production volume? None of these are answered by knowing what runs where.

      This is the central claim of Chapter 14, and this section states it before any mechanism
      is built. The design is correct and the design is incomplete, and those two facts are not
      in tension because completeness as a design and completeness as a service are measured on
      different axes. The behavioural monitoring gateway is one hundred per cent complete as a
      design. Measured as a service it is zero per cent ready, because not one of the
      non-functional questions above has an answer yet. Chapter 14 is the work of moving the
      artifact along the second axis, from a design that is right in principle to a service
      that survives production in practice.
  part_2:
    title: Deployment Is a Distinct Discipline from Detection
    body: |-
      The reason the second set of questions goes unanswered in most detection work is that
      they belong to a different discipline. Detection engineering asks whether a detector
      catches the attack: its precision, its recall, its coverage of the threat surface, its
      explainability. Deployment engineering asks whether the detector keeps running once it is
      placed in front of live traffic: its latency, its failure behaviour, its blast radius,
      its observability, its cost. These are orthogonal. A detector can be excellent at the
      first and fatal at the second.

      Consider the ways this plays out. A detector with outstanding recall that adds two hundred
      milliseconds to every request is disabled within a week, not because it detects poorly
      but because it makes the product slow. A gateway with a flawless four-layer detection
      stack and no failure policy admits every attack the moment one detector throws an
      unhandled exception, because the default behaviour of an unhandled error is a behaviour
      chosen by the bug rather than by the engineer. A system with strong detectors and no
      circuit breakers turns one slow detector into a total outage when it holds every worker
      thread. A system that detects perfectly but emits no metrics cannot tell its operators
      that its false-positive rate has quietly tripled. Each of these is a correct detection
      system dying in production, and in each case the cause is a deployment concern, not a
      detection defect.

      The consequence for how the chapter is organised is direct. Detection quality does not buy
      you out of the deployment concerns. You cannot detect your way past a latency budget or a
      missing failure policy. Deployment is the discipline that keeps a correct detector
      running, and it must be engineered deliberately and separately. That is why Chapter 14
      exists as its own chapter closing Part 3 rather than as a footnote to the detection
      chapters that precede it.
  part_3:
    title: The Six Deployment Concerns and the Failure Each Prevents
    body: |-
      The deployment concerns are not an open-ended list of operations topics. They are a small,
      closed set, and each one exists because it prevents a specific way the system fails in
      production. Naming them as failure preventers rather than as generic best practices is
      what makes the rest of the chapter disciplined.

      Placement is the concern of where detection sits in the request path. Get it wrong and the
      detector either cannot see the traffic it must inspect or pays for an avoidable network
      hop, or runs after the model call when it needed to block before inference. Latency is
      the concern of how much time detection may add. Get it wrong and the inline detector
      exceeds its budget and is removed for degrading the API. Failure handling is the concern
      of what happens when a detector errors. Leave it unspecified and the gateway either
      blocks all traffic or admits all traffic the instant a detector throws, because an
      unspecified failure mode is a failure mode chosen by the bug.

      Availability is the concern of keeping one detector failure contained. Ignore it and a
      single slow or failing detector cascades into a total gateway outage. Observability is
      the concern of whether the running system can be seen, tuned, and trusted. Skip it and
      the detection rate, false-positive rate, and latency are invisible, and an invisible
      system cannot be operated or improved. Cost is the concern of staying affordable at
      production volume. Neglect it and compute, inference, and storage grow unbounded until
      the system is switched off when the bill arrives. Six concerns, six distinct failure
      modes, and each subsequent section of Chapter 14 is a response to one of them.
  part_4:
    title: The Chapter 13 Tiers Are the Bridge Between Detection and Deployment
    body: |-
      The deployment concerns do not land on a blank slate. Chapter 13 already partitioned the
      detectors into three tiers -- inline, near-real-time, and batch -- by the state-latency
      coupling, and that partition is the bridge between the detection work and the deployment
      work. The tiers were chosen for a detection reason: a detector that needs a large
      historical state cannot run on the hot path, so it was pushed to a slower tier. But that
      same partition is exactly the structure the deployment layer needs, because the
      deployment concerns fall on the tiers unevenly.

      The inline tier is where latency, failure handling, and availability dominate. It is on
      the request hot path, it must hold the sub-50ms P99 budget, and any error or slowness it
      suffers is felt by the user immediately. It is also, by design, stateless or small-state,
      which is what lets it scale horizontally and near-linearly. The near-real-time and batch
      tiers are where cost, throughput, and observability dominate. They run the expensive,
      large-state analytics that Chapter 13 deliberately kept off the hot path -- session
      scoring, drift monitoring, coordinated-network analysis, population baselining -- and
      those are precisely the detectors whose compute and storage cost must be controlled by
      sampling, caching, and batching.

      This is why the state-latency tiers are more than a detection convenience. They already
      encode the latency constraint the deployment layer must enforce and already sort the
      detectors by which deployment concern governs them. The chapter can therefore treat the
      tiers as given and ask, for each tier, which deployment concerns apply and how they are
      engineered. The detection design and the deployment engineering meet at the tier
      boundary.
  part_5:
    title: Non-Functional Requirements as First-Class Constraints
    body: |-
      The deployment concerns are the operational face of a more general idea: non-functional
      requirements are first-class constraints, not afterthoughts. A functional requirement
      says the gateway must block jailbreak prompts. A non-functional requirement says it must
      do so within fifty milliseconds at the ninety-ninth percentile, remain available when a
      detector fails, stay observable to its operators, and cost less than a stated bound per
      million requests. The functional requirement describes what the system does. The
      non-functional requirements describe the envelope within which it must do it, and in
      production the envelope is as binding as the function.

      Treating non-functional requirements as first-class has a sharp consequence: an
      unspecified non-functional requirement is not absent, it is chosen by the incident. If
      you do not set a latency budget, the budget is set the day the API is declared too slow.
      If you do not choose fail-open or fail-closed, the choice is made by whichever code path
      the exception happens to take. If you do not set a cost bound, the bound is set by the
      finance review that switches the system off. The deployment concerns are the way this
      chapter forces each non-functional requirement to be chosen deliberately, in advance, by
      the engineer rather than by the outage.

      This reframing is what separates a design from a service in one sentence. A design
      satisfies its functional requirements. A service satisfies its functional requirements
      inside its non-functional envelope, under real load, real failure, and real cost. The
      production readiness checklist in this section is simply the enumeration of that
      envelope, and the rest of the chapter is the engineering that brings the gateway inside
      it.
  part_6:
    title: 'The Chapter Roadmap: Placement to Performance to Resilience to Operability to Cost'
    body: |-
      The concerns are addressed in a deliberate order, and the order is itself an argument. The
      chapter moves through five stages: placement, then performance, then resilience, then
      operability, then cost. Each stage assumes the one before it, so the sequence is not
      arbitrary.

      Placement comes first because you cannot engineer the latency of a detector until you have
      decided where it sits. Sections 14.02 and 14.03 choose the architecture pattern -- API
      gateway, sidecar, or inline -- and the integration points, pre-processing and
      post-processing, that place detection relative to the model call. Performance comes
      second because once placement is fixed, the latency budget and the horizontal scaling can
      be engineered against it: Sections 14.04 and 14.05 hold the inline tier within the
      sub-50ms P99 budget and scale the tiers under load. Resilience comes third because a
      system that performs under normal load must still survive failure: Sections 14.06 and
      14.07 make the fail-open versus fail-closed decision and add circuit breakers with
      graceful degradation.

      Operability comes fourth because a system that performs and survives must still be
      seeable: Sections 14.08 and 14.09 build the observability stack and the production
      dashboard, without which the system cannot be tuned or trusted. Cost comes fifth because
      a system that is fast, resilient, and observable is still switched off if it is too
      expensive: Section 14.10 applies sampling, caching, and batching to keep the tiers
      affordable. And the capstone, Section 14.11, assembles all five stages into one running
      production gateway that meets its latency, availability, and cost targets together --
      the artifact that completes Part 3 and that Part 4 builds on. This section is the map;
      the sections that follow are the territory.
