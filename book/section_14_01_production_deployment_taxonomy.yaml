  summary: |-
    With the deployment concerns named, Section 14.02 begins with the first one: placement.
    It works through the three architecture patterns -- API gateway, sidecar, and inline --
    that put detection in the request path, comparing them on latency, coupling, deployment
    independence, and blast radius, showing where each pattern places the Chapter 13 detection
    tiers, and building architecture_pattern_selector.py to choose a pattern by latency budget,
    team ownership, and scaling model. It is the first response to the placement concern this
    taxonomy section introduced.
