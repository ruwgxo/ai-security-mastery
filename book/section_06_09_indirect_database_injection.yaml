      description: |
        Query anomaly detection results (produced by text_to_sql_anomaly_detector.py)
        showing five queries including a UNION injection (text-to-SQL poisoning result),
        an unexpected table access, and a write operation injection. Demonstrates
        template-based structural validation catching queries that deviate from
        approved patterns before execution.
