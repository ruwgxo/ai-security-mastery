section_summary: |
  Section 6.9 established the database and structured data injection surface.
  Row-level injection requires write access to any user-controlled text field
  in any table the LLM queries -- a surface covering profile fields, support
  tickets, product reviews, and any API-supplied data with user-editable
  content. The field stores the payload cleanly; it activates when the LLM
  queries the row, potentially days or weeks after the adversary wrote it.

  Second-order injection is the defining property: separation of write time
  from execution time. The adversary may be completely offline when the
  injection executes. Attribution requires field-level audit logging that
  links execution events back to the original database write. Text-to-SQL
  poisoning is the most consequential variant -- a poisoned field can instruct
  the LLM to modify its own subsequent queries, escalating effective database
  access beyond the adversary's own permissions.

  The SQL injection analogy clarifies root cause but the defences differ.
  Parameterised queries solve SQL injection because SQL syntax is parseable.
  LLM injection requires semantic intent detection because natural language
  has no grammar-level injection signal. Context isolation -- classifying query
  results at execution time before context assembly -- is the production
  equivalent of the parameterised query spirit.

  Detection requires three time points: write-time guards for earliest
  attribution, dormant phase batch scanning for campaign detection, and
  execution-time field classification for the most reliable and context-aware
  interception. Section 6.10 moves to code assistants and CI/CD pipelines,
  where the dependency supply chain creates an injection surface analogous
  to the database row-level surface but at the code ecosystem layer.
