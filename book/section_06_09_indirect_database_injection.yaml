  primary: |
    Map every database and structured data injection surface for LLM deployments,
    explain second-order injection as the most persistent and hardest-to-detect
    database variant, build field-level injection validation tooling, and draw
    the precise analogy between SQL injection defences and LLM database injection
    defences -- including where the analogy holds and where it breaks down.
