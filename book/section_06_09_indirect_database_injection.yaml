    - "Define second-order injection and explain why it separates injection time from execution time"
    - "Describe text-to-SQL poisoning and how an LLM can be caused to modify its own subsequent query"
    - "Explain JSON field injection in LLM-processed API responses"
    - "Describe CSV and spreadsheet injection and why schema-aware payloads survive format validation"
    - "Map the SQL injection to LLM injection defence analogy: where parameterised queries apply and where they break down"
