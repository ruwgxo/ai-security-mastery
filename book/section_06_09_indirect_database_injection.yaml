        for three scenarios: no controls (injection succeeds), execution-time classifier only
        (injection caught at retrieval), and full four-layer defence (injection caught at write).
        Demonstrates why write-time detection alone or execution-time detection alone is
        insufficient and why layered controls are required.
      file: "second_order_lifecycle_report.json"

    - id: "D03"
