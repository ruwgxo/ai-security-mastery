        to their LLM injection equivalents. Covers: root cause (query interpolation
        vs. context interpolation), parameterised queries vs. context isolation,
        syntax detection vs. semantic intent detection, write-time validation vs.
        field-level classification, and the two dimensions where the analogy fails.
