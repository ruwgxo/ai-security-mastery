        write-time guard (earliest attribution), dormant phase batch scanner
        (campaign detection), and execution-time field classifier (most reliable).
        Includes text-to-SQL query anomaly detection as the fourth layer for
        text-to-SQL deployments. Maps each control to the injection variant
        it primarily addresses.
      file: "database_injection_detection_reference.md"


key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        The row-level injection surface is any user-controllable text field in any
        table the LLM queries. Write access to a user profile, support ticket, or
        review field is sufficient for injection capability -- no privileged system
        access required.

    - number: 2
      takeaway: |
        Second-order injection separates write time from execution time. The payload
        is stored cleanly, passes write-time validation, and sits dormant until a
        legitimate LLM query retrieves it. The adversary may not be online when the
        injection executes.

    - number: 3
      takeaway: |
        Text-to-SQL poisoning escalates the adversary's effective database access.
        A poisoned field in a publicly accessible table can instruct the LLM to
        query privileged tables on subsequent requests. Query template validation
        before execution is the primary control.

    - number: 4
      takeaway: |
        JSON field injection requires field-level classification, not document-level
        text extraction. Schema-aware payloads match expected field types and pass
        format validation while carrying instruction content.

    - number: 5
      takeaway: |
        The SQL injection analogy clarifies root cause but the fix is different.
        Parameterised queries work because SQL syntax is parseable. LLM injection
        requires semantic intent detection. Context isolation -- classifying query
        results before context assembly -- is the closest equivalent.

    - number: 6
      takeaway: |
        Field-level validation replaces the injection classifier's schema-agnostic
        scan with a targeted inspection of user-controlled text fields. Numeric,
        date, boolean, and enumerated fields require no classification; only free-
        text fields from external sources need injection scoring.

    - number: 7
      takeaway: |
        Database injection detection requires controls at three time points: write
        time (earliest attribution, stops payload before storage), dormant phase
        (batch scanning for campaign detection), and execution time (most reliable,
        context-aware). Missing any layer creates exploitable windows.

    - number: 8
      takeaway: |
        Field-level audit logging enables both operational triage and campaign
        detection. The audit log correlates execution events back to the original
        write, enabling attribution of second-order injection to the adversary's
        database write event even weeks after the write occurred.


