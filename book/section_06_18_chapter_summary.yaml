section_content:

  subsection_1:
    number: "6.18.1"
    title: "Chapter 6 in One Argument"
    content: |
      Chapter 6 makes one argument sustained across 17 sections and 108 pages.
      Prompt injection is not a software bug. It is an architectural property of
      transformer models: self-attention processes instruction tokens and data tokens
      identically, the context window is a flat sequence with no privilege separation,
      and RLHF alignment teaches preferred outputs without verifying instruction
      provenance. This architecture cannot be patched at the model layer; it can only
      be defended at the infrastructure layer through the placement of classifiers
      between external content and LLM context.

      Every section of the chapter arrived at the same conclusion through a different
      angle. Section 6.1 established the mechanism. Sections 6.2 through 6.5 mapped
      the direct injection surface and the obfuscation techniques adversaries use to
      evade input-layer classifiers, concluding that semantic intent detection is the
      only scalable response. Sections 6.6 through 6.10 mapped five indirect injection
      surfaces -- RAG, web, email, database, code assistant -- each demonstrating the
      same pattern: external content entered LLM context without a classifier, and
      the injection executed. Sections 6.11 through 6.13 extended the attack surface
      temporally: multi-turn patterns that accumulate across conversation turns,
      persistent agent patterns that survive session boundaries, and sleeping injection
      that waits dormant until a trigger condition activates it.

      Sections 6.14 through 6.16 provided the empirical validation: three real-world
      incidents at production scale, three different deployment architectures, one
      root cause. Bing Chat retrieved web content without classifying it. Copilot
      read code comments and package documentation without classifying them. ChatGPT
      plugins processed tool outputs without classifying them. All three failures
      were the same failure. Section 6.17 built the control that all three deployments
      lacked.

      The unified architectural principle: wherever external content enters an LLM's
      context, a classifier must stand between that content and the context assembly
      stage. This is the pre-assembly classifier pattern. Section 6.17 is its
      production implementation. Chapter 6 is the argument for why it is necessary.

    key_point: |
      Chapter 6 makes one argument: wherever external content enters LLM context,
      a classifier must precede context assembly. Every section -- mechanisms,
      surfaces, temporal patterns, incidents -- supports this single principle.

  subsection_2:
    number: "6.18.2"
    title: "Complete Injection Taxonomy: All Variants in One View"
    content: |
      The complete Chapter 6 injection taxonomy organises all documented injection
      variants across five classes, ordered from the most direct adversary interaction
      to the most patient and structurally complex.

      Class 1 -- Direct injection (AML.T0051): adversary controls the user input turn.
      Eight variant types: role override, context flooding, instruction priority
      manipulation, goal hijacking, confidence manipulation, system prompt extraction,
      output format hijacking, false prior-agreement attacks. Detection: pre-assembly
      classifier on user input. OWASP LLM01.

      Class 2 -- Jailbreak (AML.T0051 subclass): alignment bypass injection.
      Seven categories: fictional framing, roleplay/persona, competing objectives,
      named persona variants (DAN/AIM), many-shot, adversarial suffix (GCG),
      universal triggers. Detection: semantic classifier for categories 1-4,
      many-shot structural detection for category 5, perplexity proxy for categories
      6-7, output alignment violation monitoring for all. OWASP LLM01.

      Class 3 -- Indirect injection (AML.T0054): adversary controls an external data
      source the LLM retrieves. Five surfaces: RAG knowledge base (document, chunk,
      embedding poisoning, invisible injection), web retrieval (CSS hidden, HTML
      comment, meta tag, off-screen, real-time), email (body, subject, HTML, reply
      chain, forwarded, calendar), database (row-level, second-order, text-to-SQL,
      JSON/CSV field), code assistant (clipboard, comment, dependency documentation,
      CI/CD, test generation). Detection: pre-assembly classifier on retrieved content
      at each surface. OWASP LLM01.

      Class 4 -- Temporal injection: attacks that unfold across time boundaries.
      Three patterns: multi-turn (gradual context shift, anchor injection, conversation
      history poisoning, session replay -- within session), persistent agent (memory
      injection, long-running step N-to-N+K, tool call chain, dormant -- cross-session),
      sleeping injection (query keyword, user identity, time/counter, context content
      triggers -- conditional, store-resident). Detection: stateful session detector
      (6.11), memory write/read classifier (6.12), conditional construct detector
      and canary tokens (6.13). OWASP LLM01/LLM07.

      Class 5 -- Multi-modal and language-gap injection: alignment gaps exploited
      across modalities and languages. Cross-modal surfaces (image OCR, audio
      transcript, document extraction, code interpreter). Language-gap attacks
      targeting low-resource language alignment gaps. Detection: modality-specific
      classifier placement at each pipeline stage, multilingual classifier or
      translate-then-classify. OWASP LLM01.

    key_point: |
      Five injection classes, 20+ distinct variants. The taxonomy column is:
      Class (attack type), Variant (specific technique), Surface (where it enters),
      Detection (which classifier layer catches it), ATLAS/OWASP (classification).
      Section 6.17's classifier addresses Classes 1-3 and 5. Classes 4 requires
      the additional stateful and memory-layer controls from Sections 6.11-6.13.

  subsection_3:
    number: "6.18.3"
    title: "Defence Architecture: Classifier Placement for Every Injection Surface"
    content: |
      The unified injection defence architecture places the Section 6.17 classifier
      at eight distinct pipeline stages. Together these eight placements provide
      complete coverage of the Chapter 6 injection surface.

      Placement 1 -- User input (direct injection, Class 1 and 2): the classifier
      runs on each user turn before the turn is assembled into the LLM context.
      Mode: user_input. Catches: all direct injection and jailbreak variants.

      Placement 2 -- RAG retrieved chunks (indirect injection, Class 3): the
      classifier runs on each retrieved knowledge base chunk before context assembly.
      Mode: retrieved_content (batch, with query context). Catches: document-level,
      chunk-level, invisible, and embedding-poisoning RAG injection.

      Placement 3 -- Web page content (indirect injection, Class 3): the CSS-aware
      extraction pipeline produces normalised text; the classifier runs on that text
      before context assembly. Mode: retrieved_content. Catches: all Section 6.7
      web injection variants including hidden content.

      Placement 4 -- Email content (indirect injection, Class 3): the MIME parser
      produces per-segment normalised text; the classifier runs on each segment with
      depth-weighted scoring. Mode: retrieved_content. Catches: all Section 6.8
      email injection variants including reply chain.

      Placement 5 -- Database query results (indirect injection, Class 3): the field-
      level validator runs the classifier on each user-controlled text field in the
      query result. Mode: retrieved_content. Catches: row-level, second-order, and
      JSON field injection.

      Placement 6 -- Code assistant context (indirect injection, Class 3): the
      comment-level classifier and dependency scanner run on all code context sources
      before context assembly. Mode: retrieved_content. Catches: comment injection,
      dependency documentation injection.

      Placement 7 -- Agent memory (temporal injection, Class 4): the write guard
      runs the classifier in memory_write mode on each proposed memory entry; the
      read-time contextual classifier runs on each retrieved entry in retrieved_content
      mode with query context. Catches: memory injection, dormant injection.

      Placement 8 -- Tool/plugin output (temporal and agentic injection, Class 4
      and 3): the classifier runs on each tool return value before it enters the
      agent's reasoning context. Mode: retrieved_content. Catches: tool call chain
      injection, plugin exfiltration setup.

      The Section 6.17 classifier service is the single implementation called at
      all eight placements. The deployment's injection detection posture is defined
      by which placements are active. A deployment with only Placement 1 (user input)
      has the Bing Chat, Copilot, and Plugin incident posture -- direct injection
      detected, all indirect injection surfaces exposed.

    key_point: |
      Eight classifier placements. One classifier service. Coverage is determined
      by which placements are active. Placement 1 alone is the most common
      incomplete deployment. Placements 1 through 6 cover all non-temporal surfaces.
      Placements 7 and 8 cover persistent agent and agentic tool surfaces.

  subsection_4:
    number: "6.18.4"
    title: "Detection Investment Roadmap: Sequence by Impact and Effort"
    content: |
      The detection investment roadmap sequences the eight classifier placements
      plus supplementary controls by impact (how much injection risk is addressed)
      and effort (implementation complexity). Organisations with limited security
      engineering capacity should follow this sequence to maximise risk reduction
      per unit of effort.

      Tier 1 -- Highest impact, lowest effort (deploy first):
      Placement 1 (user input classifier) -- one API call per request, eliminates
      all direct injection risk. Implementation: Section 6.17 classifier in user_input
      mode, deployment-tier threshold configured.
      System prompt hardening -- no engineering required, one-time edit. Reduces
      extraction and persona-adoption probability.
      Session isolation -- architecture decision, moderate effort, prevents all
      cross-session injection.

      Tier 2 -- High impact, moderate effort (deploy second):
      Placement 2 (RAG pre-assembly classifier) -- eliminates the primary indirect
      injection surface for most enterprise RAG deployments. Implementation: batch
      classifier call at retrieval time.
      Placement 3 (web content classifier) -- eliminates the Bing Chat class of
      vulnerability. Implementation: CSS-aware extractor plus classifier.
      FPR calibration -- required for both placements, moderate effort, one-time.

      Tier 3 -- High impact, higher effort (deploy third):
      Placement 4 (email classifier) -- eliminates the lowest-barrier indirect
      injection surface. Implementation: MIME parser plus classifier.
      Placement 7 (memory write/read guard) -- required for persistent agent
      deployments. Implementation: write guard plus read-time contextual classifier.
      Stateful multi-turn detector -- eliminates within-session gradual escalation.
      Implementation: session state service, moderate infrastructure investment.

      Tier 4 -- Targeted impact, specific context (deploy when applicable):
      Placement 5 (database field validator) -- deploy if LLM queries user-
      controlled database fields.
      Placement 6 (code assistant comment classifier) -- deploy if code assistant
      tools are part of the development workflow.
      Placement 8 (plugin/tool output classifier) -- deploy for agentic deployments
      with write-capability tools.
      Canary token deployment -- deploy after other placements; provides activation
      detection backstop.

      Tier 5 -- Ongoing operations:
      Drift monitoring and quarterly retraining, output monitoring for alignment
      violations, incident response procedure, and the Section 6.13.6 purge procedure.

    key_point: |
      The roadmap prioritises by: direct injection first (Tier 1, user input), then
      the highest-prevalence indirect surface for the deployment type (Tier 2, RAG
      or web), then temporal and persistent surfaces (Tier 3), then deployment-specific
      surfaces (Tier 4). Tier 5 operations run continuously after deployment.

  subsection_5:
    number: "6.18.5"
    title: "What Chapters 11 Through 17 Add"
    content: |
      Chapter 6 covers the first deep tunnel. The architectural principle established
      here -- pre-assembly classifier between external content and LLM context --
      is the template that Chapters 11 through 17 instantiate for each of the ATLAS
      top-10 techniques beyond prompt injection.

      Chapter 7 (Data Poisoning and Model Manipulation) addresses ATLAS AML.T0020,
      AML.T0018, and AML.T0031. Where Chapter 6 attacks happen at inference time --
      the adversary manipulates the model's context during a live session -- Chapter
      7 attacks happen at training time. Backdoor insertion, gradient manipulation,
      and training data poisoning determine model behaviour before a single user
      query arrives. The detection architecture shifts from runtime classifiers to
      training pipeline integrity controls.

      The key conceptual shift from Chapter 6 to Chapter 7: Chapter 6's adversary
      has no access to model weights; they influence behaviour by manipulating the
      inputs the model processes. Chapter 7's adversary influences the weights
      themselves. The distinction determines everything about the detection and
      remediation approach.

      Chapter 6's production classifier does not address training-time attacks.
      A model with a backdoor planted during training will pass the Section 6.17
      classifier's runtime checks because the malicious behaviour is encoded in the
      weights, not in the input context. Chapter 7 builds the detection layer for
      that threat class.

      The progression across Chapters 7 through 17 builds the complete detection
      programme: data poisoning (Chapter 7), model extraction (Chapter 8), evasion
      attacks (Chapter 9), membership inference (Chapter 10), then the operational
      programme chapters covering threat intelligence, red team methodology, detection
      engineering at scale, and the CISO intelligence platform that Chapter 6's
      ASA work is building toward.

    key_point: |
      Chapter 7 addresses the training-time complement to Chapter 6's inference-time
      attacks. The Section 6.17 classifier does not protect against backdoored model
      weights -- that requires training pipeline integrity controls covered in Chapter
      7. Chapter 6 is inference; Chapter 7 is training. Both are required.

  subsection_6:
    number: "6.18.6"
    title: "Chapter 6 Reference Card"
    content: |
      The Chapter 6 reference card consolidates the injection defence architecture
      into a single-page view for use during security review, red team planning,
      and deployment assessment.

      Injection taxonomy (5 classes): Direct (AML.T0051) | Jailbreak (T0051
      subclass) | Indirect (AML.T0054) | Temporal (T0051/T0054) | Cross-modal/
      language-gap (T0054).

      Detection layers (4 primary): Pre-assembly classifier (Section 6.17,
      covers Classes 1-3 and 5) | Stateful session detector (Section 6.11,
      covers multi-turn Class 4) | Memory write/read guard (Section 6.12,
      covers persistent agent Class 4) | Conditional construct detector +
      canary tokens (Section 6.13, covers sleeping Class 4).

      Absent controls in three real-world incidents: Bing Chat (2023) -- Placement
      3 absent. Copilot (2023) -- Placement 6 absent. GPT Plugin (2023) --
      Placement 8 absent. One classifier, three deployments, zero placements.

      FPR tier targets: consumer API 0.01% | enterprise SaaS 0.1% |
      internal reviewed 0.5% | red team 5%.

      Latency budget: 50ms P99 total gateway overhead | 8ms per classifier call
      at 6 calls per request | all-MiniLM-L6-v2 achieves sub-2ms embedding on CPU.

      Sigma rule: AML.T0051 + AML.T0054 completed -- Section 6.17 classifier as
      detection condition. Compiles to Splunk / Elastic / Sentinel.

      Three architectural facts: (1) Injection is an architectural property, not
      a bug -- no CVE, no patch, only infrastructure-layer defence. (2) Indirect
      injection via retrieved content is higher prevalence than direct injection in
      production -- most deployments defend the wrong surface. (3) Agentic capability
      expansion without classifier expansion is linear injection risk increase --
      each tool added without output classification adds an exploitable confused
      deputy surface.

    key_point: |
      The reference card is the one-page Chapter 6 takeaway. Five injection classes,
      four detection layers, eight classifier placements, three incident lessons,
      four FPR tiers, one latency budget, one completed Sigma rule, three architectural
      facts. Print and pin.

  subsection_7:
    number: "6.18.7"
    title: "Chapter 7 Preview: Data Poisoning and Model Manipulation"
    content: |
      Chapter 7 covers ATLAS AML.T0020 (Training Data Poisoning), AML.T0018
      (Backdoor ML Model), and AML.T0031 (Erasing Model Functionality). Where
      Chapter 6 addressed attacks that manipulate model behaviour at inference
      time by controlling inputs, Chapter 7 addresses attacks that manipulate
      model behaviour by compromising the training process itself.

      Data poisoning: the adversary contributes malicious training examples that
      shift the model's learned behaviour in a desired direction. Clean-label
      poisoning crafts examples that appear legitimate to human reviewers but
      carry a targeted influence on the model's decision boundary. Backdoor
      insertion plants a trigger -- a specific input pattern -- that causes the
      model to produce adversary-specified outputs when the trigger appears at
      inference time. The model behaves normally for all other inputs; only the
      trigger activates the backdoor.

      The Sleeper Agents paper (Anthropic, 2024) referenced in Section 6.13 is
      the model-weight analogue of sleeping injection: a model trained with a
      backdoor that behaves correctly until a specific trigger string appears,
      at which point it switches to a different behaviour. Chapter 7 covers the
      detection and mitigation architecture for this threat class.

      Gradient manipulation and model inversion: adversaries with query access
      to a model can extract information about the training data (membership
      inference, Chapter 10) or can craft inputs that cause the model to reveal
      training examples (model inversion). These attacks require no access to
      the training pipeline; they exploit the model's learned representations
      through its output API.

      Chapter 7 builds the detection programme for training-time threats: training
      data provenance tracking, dataset integrity verification, model behaviour
      testing for backdoor activation, and the red team methodology for training
      pipeline security assessment. It completes the pair with Chapter 6: inference-
      time injection is defended by the pre-assembly classifier; training-time
      poisoning is defended by the pipeline integrity controls Chapter 7 specifies.

    key_point: |
      Chapter 7 is the training-time complement to Chapter 6's inference-time
      attacks. Same depth, same structure: threat taxonomy, real-world incidents,
      detection architecture, production implementation. Chapter 6 + Chapter 7
      together cover the full LLM attack lifecycle from training through deployment.


implementations:

  implementation_1:
    title: "Injection Defence Architecture Diagram Generator"
    filename: "injection_defence_architecture.py"
    description: |
      Generates the complete Chapter 6 injection defence architecture as a
      structured Markdown document and JSON specification. Maps all eight
      classifier placements to their injection surfaces, detection timing,
      implementation references, and coverage gaps when missing. Produces the
      canonical architecture reference document that consolidates all Chapter 6
      placement decisions into a single deployable specification. Includes the
      three-incident gap analysis showing which placements were absent in each
      incident.
    dependencies:
      - "json (stdlib)"
      - "dataclasses (stdlib)"
      - "pathlib (stdlib)"
    code: |
      #!/usr/bin/env python3
      """
      injection_defence_architecture.py
      Section 6.18 -- Injection Defence Architecture Diagram Generator
      Produces the complete Chapter 6 classifier placement specification
      and incident gap analysis as Markdown and JSON.
      Author: Raghav Dinesh | ai-security-mastery
      """

      import json
      from dataclasses import dataclass, field, asdict
      from pathlib import Path


      @dataclass
      class ClassifierPlacement:
          placement_id: str
          stage: str
          injection_class: str
          surfaces_covered: list[str]
          classifier_mode: str
          implementation_section: str
          latency_budget_ms: float
          incident_gap: list[str]   # incident IDs where this placement was absent
          deployment_tier_required: str   # all | agent_only | code_only | db_only


      PLACEMENTS = [
          ClassifierPlacement(
              placement_id="P1",
              stage="User input -- pre-context assembly",
              injection_class="Direct (AML.T0051) + Jailbreak",
              surfaces_covered=[
                  "Role override", "Context flooding", "Goal hijacking",
                  "System prompt extraction", "Output format hijacking",
                  "Jailbreak categories 1-7",
              ],
              classifier_mode="user_input",
              implementation_section="Section 6.17",
              latency_budget_ms=10.0,
              incident_gap=[],
              deployment_tier_required="all",
          ),
          ClassifierPlacement(
              placement_id="P2",
              stage="RAG retrieved chunks -- pre-context assembly",
              injection_class="Indirect via RAG (AML.T0054)",
              surfaces_covered=[
                  "Document-level injection", "Chunk-boundary injection",
                  "Invisible injection (ZWC, whitespace)", "Embedding poisoning",
              ],
              classifier_mode="retrieved_content",
              implementation_section="Section 6.6 / 6.17",
              latency_budget_ms=8.0,
              incident_gap=[],
              deployment_tier_required="all",
          ),
          ClassifierPlacement(
              placement_id="P3",
              stage="Web page content -- post CSS-extraction, pre-context assembly",
              injection_class="Indirect via Web (AML.T0054)",
              surfaces_covered=[
                  "CSS display:none injection", "HTML comment injection",
                  "Meta tag injection", "JSON-LD injection",
                  "Real-time injection", "Cross-site injection",
              ],
              classifier_mode="retrieved_content",
              implementation_section="Section 6.7 / 6.17",
              latency_budget_ms=8.0,
              incident_gap=["INC-2023-BINGCHAT-001"],
              deployment_tier_required="all",
          ),
          ClassifierPlacement(
              placement_id="P4",
              stage="Email segments -- post MIME parse, pre-context assembly",
              injection_class="Indirect via Email (AML.T0054)",
              surfaces_covered=[
                  "Email body injection", "HTML email hidden content",
                  "Reply chain injection", "Calendar invite fields",
              ],
              classifier_mode="retrieved_content",
              implementation_section="Section 6.8 / 6.17",
              latency_budget_ms=8.0,
              incident_gap=[],
              deployment_tier_required="all",
          ),
          ClassifierPlacement(
              placement_id="P5",
              stage="Database query results -- field-level, pre-context assembly",
              injection_class="Indirect via Database (AML.T0054)",
              surfaces_covered=[
                  "Row-level field injection", "Second-order injection",
                  "JSON field injection", "CSV cell injection",
              ],
              classifier_mode="retrieved_content",
              implementation_section="Section 6.9 / 6.17",
              latency_budget_ms=8.0,
              incident_gap=[],
              deployment_tier_required="db_only",
          ),
          ClassifierPlacement(
              placement_id="P6",
              stage="Code assistant context -- comment/string extraction, pre-completion",
              injection_class="Indirect via Code Assistant (AML.T0054)",
              surfaces_covered=[
                  "Code comment injection", "Docstring injection",
                  "Dependency README injection", "CI/CD diff comment injection",
              ],
              classifier_mode="retrieved_content",
              implementation_section="Section 6.10 / 6.17",
              latency_budget_ms=8.0,
              incident_gap=["INC-2023-COPILOT-001"],
              deployment_tier_required="code_only",
          ),
          ClassifierPlacement(
              placement_id="P7",
              stage="Agent memory -- write guard + read-time contextual",
              injection_class="Temporal / Persistent Agent (AML.T0054)",
              surfaces_covered=[
                  "Memory write injection", "Dormant conditional injection",
                  "Long-running agent step injection",
              ],
              classifier_mode="memory_write + retrieved_content",
              implementation_section="Section 6.12 / 6.17",
              latency_budget_ms=8.0,
              incident_gap=[],
              deployment_tier_required="agent_only",
          ),
          ClassifierPlacement(
              placement_id="P8",
              stage="Tool/plugin output -- pre-LLM-reasoning-context delivery",
              injection_class="Tool Call Chain / Plugin (AML.T0054)",
              surfaces_covered=[
                  "Plugin output injection", "Tool call chain injection",
                  "Exfiltration via plugin setup",
              ],
              classifier_mode="retrieved_content",
              implementation_section="Section 6.12 / 6.16 / 6.17",
              latency_budget_ms=8.0,
              incident_gap=["INC-2023-GPTPLUGIN-001"],
              deployment_tier_required="agent_only",
          ),
      ]


      INCIDENTS = {
          "INC-2023-BINGCHAT-001": "Bing Chat Sydney (Section 6.14)",
          "INC-2023-COPILOT-001": "GitHub Copilot (Section 6.15)",
          "INC-2023-GPTPLUGIN-001": "GPT Plugin (Section 6.16)",
      }


      def render_architecture_markdown() -> str:
          lines = [
              "# Chapter 6: Injection Defence Architecture",
              "**Reference**: AI Security Mastery -- Section 6.18  ",
              "**Classifier**: Section 6.17 production classifier (all-MiniLM-L6-v2 ensemble)  ",
              "",
              "---",
              "",
              "## Architecture Principle",
              "",
              "Wherever external content enters an LLM context, the Section 6.17 classifier",
              "must stand between that content and the context assembly stage.",
              "Eight placements. One classifier service. Three modes.",
              "",
              "---",
              "",
              "## Classifier Placement Map",
              "",
              "| ID | Stage | Injection Class | Mode | Latency Budget | Tier |",
              "|----|-------|----------------|------|---------------|------|",
          ]
          for p in PLACEMENTS:
              lines.append(
                  f"| {p.placement_id} | {p.stage[:50]} | {p.injection_class[:35]} "
                  f"| {p.classifier_mode[:25]} | {p.latency_budget_ms}ms | {p.deployment_tier_required} |"
              )

          lines += [
              "",
              "---",
              "",
              "## Incident Gap Analysis",
              "",
              "Each incident documents a deployment where one or more placements were absent.",
              "",
              "| Incident | Absent Placement | Root Cause Control |",
              "|----------|-----------------|-------------------|",
          ]
          for inc_id, inc_name in INCIDENTS.items():
              absent = [p for p in PLACEMENTS if inc_id in p.incident_gap]
              for p in absent:
                  lines.append(f"| {inc_name} | {p.placement_id}: {p.stage[:45]} | {p.implementation_section} |")

          lines += [
              "",
              "---",
              "",
              "## Coverage by Deployment Type",
              "",
              "| Deployment Type | Required Placements | Covers |",
              "|----------------|--------------------|---------| ",
              "| Stateless chatbot | P1 | Direct injection only |",
              "| RAG assistant | P1 + P2 | Direct + RAG indirect |",
              "| Web-augmented LLM | P1 + P2 + P3 | + Web indirect |",
              "| Email assistant | P1 + P2 + P3 + P4 | + Email indirect |",
              "| DB-augmented LLM | P1 + P2 + P5 | + Database indirect |",
              "| Code assistant | P1 + P6 | Direct + Code indirect |",
              "| Persistent agent | P1-P4 + P7 + P8 | All surfaces |",
              "| Full production | P1-P8 + stateful + canary | Complete coverage |",
              "",
              "---",
              "",
              "## Three Architectural Facts",
              "",
              "1. Injection is an architectural property, not a bug. No CVE, no patch,",
              "   only infrastructure-layer defence through classifier placement.",
              "",
              "2. Indirect injection via retrieved content (P2-P8) is higher prevalence",
              "   than direct injection (P1) in production. Most deployments defend only P1.",
              "",
              "3. Each tool added without P8 classifier deployment adds a confused deputy",
              "   surface linearly. Agentic capability expansion without classifier expansion",
              "   is linear injection risk increase.",
          ]
          return "\n".join(lines)


      def run() -> None:
          md = render_architecture_markdown()
          Path("injection_defence_architecture.md").write_text(md, encoding="utf-8")

          spec = {
              "placements": [asdict(p) for p in PLACEMENTS],
              "incidents": INCIDENTS,
              "total_placements": len(PLACEMENTS),
              "classifier_service": "Section 6.17 -- injection_classifier.py",
              "sigma_rule": "aml_t0051_t0054_completed.json",
          }
          Path("injection_defence_architecture.json").write_text(
              json.dumps(spec, indent=2), encoding="utf-8"
          )
          print("[*] Chapter 6 Injection Defence Architecture")
          print(f"    Total placements: {len(PLACEMENTS)}")
          print(f"    Incidents covered: {len(INCIDENTS)}")
          print("[OK] Architecture written to injection_defence_architecture.md")
          print("[OK] JSON spec written to injection_defence_architecture.json")


      if __name__ == "__main__":
          run()


  implementation_2:
    title: "Chapter 6 Knowledge Assessment (20 Questions)"
    filename: "chapter6_knowledge_assessment.py"
    description: |
      Interactive 20-question knowledge assessment covering all Chapter 6 sections.
      Questions span the injection taxonomy (Classes 1-5), detection architecture
      (classifier placement, FPR calibration, latency budget), temporal injection
      patterns (multi-turn, persistent agent, sleeping), the three real-world
      incidents (root cause, absent control, lesson), and the production classifier
      (feature layers, training data, Sigma rule completion). Produces a scored
      report with per-section coverage and a pass/fail determination at the 85%
      threshold (17/20 correct).
    dependencies:
      - "json (stdlib)"
      - "dataclasses (stdlib)"
    code: |
      #!/usr/bin/env python3
      """
      chapter6_knowledge_assessment.py
      Section 6.18 -- Chapter 6 Knowledge Assessment (20 Questions)
      Interactive assessment with per-section coverage and pass/fail scoring.
      Author: Raghav Dinesh | ai-security-mastery
      """

      import json
      from dataclasses import dataclass, field
      from pathlib import Path


      @dataclass
      class Question:
          q_id: int
          section: str
          question: str
          options: list[str]
          correct_index: int    # 0-based
          explanation: str


      QUESTIONS = [
          Question(1, "6.1",
              "Why does prompt injection have no CVE?",
              ["A) It has not been reported to MITRE",
               "B) It is an architectural property of transformers, not a software bug",
               "C) It only affects research models, not production deployments",
               "D) It was patched in GPT-4 and later models"],
              1,
              "Injection exploits the fact that self-attention processes all tokens identically -- instruction and data -- with no provenance verification. This is a property of the architecture, not a defect in any specific version."),
          Question(2, "6.2",
              "What is context flooding and why does it evade defences that check for explicit override language?",
              ["A) It floods the network with requests to deny service",
               "B) It sends the same message many times to confuse the model",
               "C) It dilutes the system prompt's attention weight with large user-turn content without explicitly overriding it",
               "D) It encodes payloads in Unicode to flood the tokeniser"],
              2,
              "Context flooding reduces the effective influence of the system prompt by surrounding it with large volumes of adversary-supplied content. No explicit override instruction is present, so blocklist defences produce no signal."),
          Question(3, "6.3",
              "Why do gradient-based adversarial suffixes (GCG) evade semantic classifiers?",
              ["A) They use foreign languages the classifier was not trained on",
               "B) They are optimised for model internals, not linguistic coherence, producing non-human-readable token sequences with high perplexity",
               "C) They split payloads across multiple requests to avoid detection",
               "D) They are encrypted with AES and decrypted by the model at inference time"],
              1,
              "GCG suffixes are token sequences optimised by gradient descent to maximise compliance probability. They contain no natural language injection signal and are invisible to semantic classifiers. Perplexity-based detection is the correct approach."),
          Question(4, "6.4",
              "A payload is Base64-encoded. Which normalisation step must precede injection classification?",
              ["A) Unicode NFKC normalisation",
               "B) CSS stripping",
               "C) Base64 decode pass",
               "D) Zero-width character removal"],
              2,
              "Encoding obfuscation must be stripped before classification. The normalisation pipeline applies encoding decodes (URL, HTML entity, Base64, Unicode escape) in multi-pass before the classifier sees the text."),
          Question(5, "6.5",
              "What is the attack surface expansion rule for multimodal deployments?",
              ["A) Each modality doubles the injection surface",
               "B) Each modality adds an independent injection surface with zero coverage from text-layer defences",
               "C) Adding modalities reduces injection risk by distributing attention",
               "D) Only image inputs create new injection surfaces; audio and documents do not"],
              1,
              "Each modality added to a deployment creates an independent injection surface. OCR output, audio transcripts, document extracts, and code execution output all deliver text to the LLM context through pathways the text-input classifier never inspects."),
          Question(6, "6.6",
              "What is the most important and most commonly absent classifier placement in RAG deployments?",
              ["A) Stage 1 ingestion scanner",
               "B) Stage 3 embedding anomaly detector",
               "C) Stage 4 pre-assembly classifier on retrieved chunks",
               "D) Stage 5 output monitor"],
              2,
              "Stage 4 -- applying the injection classifier to each retrieved chunk before context assembly -- is the primary control. Most production RAG deployments classify user input (Stage 1) and sometimes output (Stage 5) but have no classifier between retrieval and context assembly."),
          Question(7, "6.7",
              "Why does allowlisting URLs fail as a defence against web injection?",
              ["A) Allowlists are too large to maintain",
               "B) Adversaries can buy allowlisted domains",
               "C) Web content can change after allowlist assessment; retrieval-time classification is required",
               "D) URL allowlists do not work in IPv6 networks"],
              2,
              "Real-time injection: a page is assessed as benign and allowlisted, then modified to contain injection content. The next retrieval fetches the adversarial version. Allowlists are point-in-time; retrieval-time classification covers the live content."),
          Question(8, "6.8",
              "Why is email injection considered the lowest-barrier indirect injection surface?",
              ["A) Email is the oldest protocol and has no security",
               "B) The adversary can deliver the injection vector directly to the target by sending an email -- no access to target systems required",
               "C) Email clients automatically execute scripts in email bodies",
               "D) Email injection only requires DNS access"],
              1,
              "Every other indirect injection surface requires the adversary to influence an external data source the LLM retrieves. Email injection requires only the ability to send an email to the target organisation whose LLM email assistant processes it."),
          Question(9, "6.9",
              "What is second-order injection and what property makes it hardest to detect?",
              ["A) An injection that uses two different encoding layers",
               "B) An injection submitted in two separate API calls",
               "C) A payload stored in a database field at write time and executed when an LLM retrieves it later -- separating injection time from execution time",
               "D) An injection that requires two failed attempts before succeeding"],
              2,
              "Second-order injection stores the payload cleanly at T1 and activates when the LLM retrieves it at T2. The adversary may be offline at execution time. Point-in-time scanning at T1 may miss it; execution-time field classification is the reliable control."),
          Question(10, "6.10",
              "Why does dependency README injection have supply-chain scope while comment injection does not?",
              ["A) README files are larger than code files",
               "B) Dependency injection targets the compiler, not the LLM",
               "C) A single compromised package on a public registry delivers the payload to every developer who installs it; comment injection requires per-repository access",
               "D) README files are processed differently by GPU hardware"],
              2,
              "Comment injection requires write access to a specific repository. Dependency README injection reaches all developers who install the package -- one compromised package on PyPI or npm scales across an entire dependency graph."),
          Question(11, "6.11",
              "Why are single-turn injection classifiers structurally blind to gradual context shift attacks?",
              ["A) They operate too slowly to catch multi-turn attacks",
               "B) They evaluate each message in isolation; the attack emerges from the cumulative trajectory across turns, which no individual turn reveals",
               "C) Multi-turn attacks use encoding that single-turn classifiers cannot decode",
               "D) Single-turn classifiers only work for English inputs"],
              1,
              "Gradual context shift keeps every individual turn below the classifier threshold. The injection is the cumulative trajectory -- no single turn contains a detectable payload. Stateful session-level detection tracking the trajectory is required."),
          Question(12, "6.12",
              "What is dormant injection in persistent agent memory and what detection approach catches it that write-time classification misses?",
              ["A) An injection encoded in Base64 that decodes during inference",
               "B) A payload stored in memory that activates only when a specific trigger condition is met; read-time contextual classification evaluating entries against the triggering query catches it",
               "C) An injection that sleeps for 24 hours before executing",
               "D) A payload hidden in the model's weights that activates at runtime"],
              1,
              "Dormant injection encodes a conditional instruction that scores ambiguously in isolation. Write-time classification may score it below threshold. Read-time contextual classification -- evaluating the entry in the context of the triggering query -- detects the conditional activation."),
          Question(13, "6.13",
              "What two detection approaches together provide complete coverage of sleeping injection?",
              ["A) Perplexity detection and output monitoring",
               "B) Conditional construct pattern detection (pre-activation) and canary token activation monitoring (post-activation)",
               "C) Blocklist scanning and FPR calibration",
               "D) Session isolation and conversation history hashing"],
              1,
              "Conditional construct detection identifies if/when/then patterns in retrieved content before activation. Canary token monitoring detects activation events after the payload fires by watching for planted unique tokens in model outputs. Both are required; neither covers the other's blind spot."),
          Question(14, "6.14",
              "What was the primary absent control in the Bing Chat Sydney incident?",
              ["A) System prompt confidentiality instruction",
               "B) User authentication and rate limiting",
               "C) Retrieval-time injection classifier on web page content before context assembly",
               "D) Output content filtering on the response"],
              2,
              "The contributing cause was that retrieved web page content entered the LLM context without injection classification. A retrieval-time classifier applied to extracted page text before context assembly would have prevented the injection from reaching the model."),
          Question(15, "6.15",
              "Why does developer trust in IDE suggestions make code assistant injection higher-impact than other injection classes?",
              ["A) IDE suggestions are displayed more prominently than other outputs",
               "B) The injection-to-execution chain is shortest: injection to suggestion to developer accepts to code runs, with acceptance rates of 25-40%",
               "C) Code assistants have higher system permissions than conversational LLMs",
               "D) Code comments are not monitored by enterprise security tools"],
              1,
              "Other injection classes produce outputs that require further human action (believing information, following instructions). Code assistant injection produces code that the developer executes. The acceptance rate of 25-40% means high execution probability per malicious suggestion."),
          Question(16, "6.16",
              "What is the confused deputy pattern in plugin deployments?",
              ["A) A plugin that impersonates another plugin",
               "B) An LLM that calls the wrong plugin due to a naming confusion",
               "C) The adversary causes the LLM to misuse its legitimate plugin permissions to serve the adversary's objective, without the adversary acquiring those permissions directly",
               "D) A plugin that redirects its output to an unauthorised endpoint"],
              2,
              "The adversary does not need plugin permissions; they inject instructions that cause the LLM (which has the permissions) to make plugin calls serving the adversary. The LLM is the confused deputy: it has legitimate access but is directed to use it for an adversary purpose."),
          Question(17, "6.17",
              "What is the correct fail behaviour for the API gateway middleware when the classifier service is unavailable?",
              ["A) BLOCK all requests until the classifier recovers",
               "B) Return an error to the user",
               "C) ALLOW the request with a CLASSIFIER_UNAVAILABLE log event (fail-open)",
               "D) Route all requests to a backup classifier"],
              2,
              "Blocking on classifier failure makes the LLM application unavailable whenever the classifier restarts. Fail-open maintains application availability; the CLASSIFIER_UNAVAILABLE status in the audit log is the operational alert. The alternative is worse than the risk."),
          Question(18, "6.17",
              "The AML.T0051 Sigma stub from Chapter 5 Section 5.8 is completed in Section 6.17. What fills the detection condition?",
              ["A) A static list of injection keywords in the rule YAML",
               "B) A call to the production classifier endpoint, evaluating the returned injection score against the calibrated threshold",
               "C) A regex pattern matching the top-50 known injection payloads",
               "D) The model's own alignment training as the detection mechanism"],
              1,
              "The Sigma rule's detection condition calls the Section 6.17 classifier API on each user input or retrieved content event, evaluating the ensemble_score against the deployment-tier threshold. This replaces the placeholder in the Chapter 5 stub."),
          Question(19, "6.18",
              "A deployment has Placement 1 (user input) and Placement 2 (RAG) active. Which real-world incidents would it have been vulnerable to?",
              ["A) None -- P1 and P2 cover all documented incidents",
               "B) All three -- P1 and P2 do not cover any of the incident surfaces",
               "C) Bing Chat (P3 absent) and GPT Plugin (P8 absent) -- Copilot (P6) would also be vulnerable if code assistant tools were used",
               "D) Only the GPT Plugin incident"],
              2,
              "P3 (web content) was absent in Bing Chat. P6 (code assistant) was absent in Copilot. P8 (plugin output) was absent in GPT Plugin. P1+P2 covers direct injection and RAG but not web, code assistant, or plugin surfaces."),
          Question(20, "6.17-6.18",
              "What is the unified architectural principle that Chapter 6 establishes?",
              ["A) All LLM deployments should use GPT-4 or later models with strong alignment",
               "B) Wherever external content enters an LLM context, the Section 6.17 classifier must stand between that content and the context assembly stage",
               "C) All injection attacks can be prevented by system prompt hardening",
               "D) Indirect injection is less dangerous than direct injection because the adversary has less control"],
              1,
              "This is the one argument Chapter 6 makes across all 17 content sections. The three real-world incidents are three instantiations of the same architectural failure: external content entering LLM context without a classifier."),
      ]


      def run_assessment(interactive: bool = False) -> dict:
          if interactive:
              return run_interactive(QUESTIONS)
          else:
              return run_self_score(QUESTIONS)


      def run_interactive(questions: list[Question]) -> dict:
          correct = 0
          results = []
          print("\n" + "=" * 70)
          print("CHAPTER 6 KNOWLEDGE ASSESSMENT -- 20 Questions")
          print("Pass threshold: 17/20 (85%)")
          print("=" * 70)
          for q in questions:
              print(f"\nQ{q.q_id} [{q.section}]: {q.question}")
              for i, opt in enumerate(q.options):
                  print(f"  {i+1}. {opt}")
              while True:
                  try:
                      ans = int(input("Your answer (1-4): ").strip()) - 1
                      if 0 <= ans <= 3:
                          break
                  except ValueError:
                      pass
                  print("  Please enter 1, 2, 3, or 4")
              is_correct = ans == q.correct_index
              correct += int(is_correct)
              status = "CORRECT" if is_correct else f"INCORRECT (correct: {q.correct_index + 1})"
              print(f"  {status}")
              print(f"  Explanation: {q.explanation}")
              results.append({"q_id": q.q_id, "correct": is_correct})

          return _summarise(correct, results)


      def run_self_score(questions: list[Question]) -> dict:
          """Non-interactive: prints questions and answers for self-scoring."""
          print("\n" + "=" * 70)
          print("CHAPTER 6 KNOWLEDGE ASSESSMENT -- Answer Key")
          print("=" * 70)
          for q in questions:
              correct_letter = ["A", "B", "C", "D"][q.correct_index]
              print(f"Q{q.q_id:>2} [{q.section}]: {correct_letter} -- {q.explanation[:80]}...")
          print("\nPrint the questions, answer without the key, then check against this.")
          print("Pass: 17/20 (85%)")
          return {"questions": len(questions), "pass_threshold": 17}


      def _summarise(correct: int, results: list[dict]) -> dict:
          pct = round(correct / len(results) * 100)
          passed = correct >= 17
          print(f"\n{'='*70}")
          print(f"RESULT: {correct}/20 ({pct}%) -- {'PASS' if passed else 'FAIL'}")
          if not passed:
              wrong = [r["q_id"] for r in results if not r["correct"]]
              print(f"Review sections for questions: {wrong}")
          print("=" * 70)
          return {"correct": correct, "total": 20, "pct": pct, "passed": passed}


      if __name__ == "__main__":
          import sys
          interactive = "--interactive" in sys.argv
          result = run_assessment(interactive=interactive)
          Path("assessment_result.json").write_text(
              json.dumps(result, indent=2), encoding="utf-8"
          )


  implementation_3:
    title: "Production LLM Deployment Injection Security Checklist"
    filename: "production_injection_checklist.py"
    description: |
      Consolidates all Chapter 6 security requirements into a single deployable
      checklist covering 24 controls across five categories: classifier placement
      (which of the eight placements are active), normalisation pipeline (correct
      pre-processing before classification), session and memory security (stateful
      detection and agent memory controls), infrastructure sandboxing (network
      egress, action permissions, session isolation), and operational monitoring
      (drift detection, incident response, Sigma rule deployment). Produces a
      scored compliance report mapped to deployment type with prioritised gap
      remediation.
    dependencies:
      - "dataclasses (stdlib)"
      - "json (stdlib)"
      - "pathlib (stdlib)"
    code: |
      #!/usr/bin/env python3
      """
      production_injection_checklist.py
      Section 6.18 -- Production LLM Deployment Injection Security Checklist
      24-control checklist covering all Chapter 6 security requirements.
      Author: Raghav Dinesh | ai-security-mastery
      """

      import json
      from dataclasses import dataclass, field, asdict
      from pathlib import Path
      from typing import Optional


      @dataclass
      class SecurityControl:
          id: str
          category: str
          name: str
          section_reference: str
          required_for: list[str]   # deployment types that need this control
          implemented: bool
          weight: int
          remediation: str


      @dataclass
      class DeploymentSpec:
          name: str
          deployment_type: str     # stateless_chatbot | rag_assistant | web_augmented |
                                   # email_agent | db_augmented | code_assistant | agentic
          uses_rag: bool = False
          uses_web: bool = False
          uses_email: bool = False
          uses_database: bool = False
          uses_code_assistant: bool = False
          uses_agent_memory: bool = False
          uses_plugins_or_tools: bool = False


      ALL_TYPES = ["stateless_chatbot", "rag_assistant", "web_augmented",
                   "email_agent", "db_augmented", "code_assistant", "agentic"]


      def build_controls(spec: DeploymentSpec) -> list[SecurityControl]:
          active_types = [spec.deployment_type]

          controls = [
              # ---- Classifier placement ----
              SecurityControl("CP01", "placement", "P1: User input classifier deployed",
                  "Section 6.17", ALL_TYPES, False, 15,
                  "Deploy Section 6.17 classifier in user_input mode on all user turns"),
              SecurityControl("CP02", "placement", "P2: RAG pre-assembly classifier deployed",
                  "Section 6.6 / 6.17", ["rag_assistant", "web_augmented", "email_agent", "agentic"], False, 12,
                  "Deploy classifier in retrieved_content mode on each RAG chunk pre-assembly"),
              SecurityControl("CP03", "placement", "P3: Web content classifier deployed",
                  "Section 6.7 / 6.17", ["web_augmented", "agentic"], False, 12,
                  "CSS-aware extraction + classifier on all retrieved web content"),
              SecurityControl("CP04", "placement", "P4: Email segment classifier deployed",
                  "Section 6.8 / 6.17", ["email_agent", "agentic"], False, 10,
                  "MIME parser + classifier on all email segments pre-context"),
              SecurityControl("CP05", "placement", "P5: Database field validator deployed",
                  "Section 6.9 / 6.17", ["db_augmented", "agentic"], False, 10,
                  "Field-level classifier on user-controlled text fields in query results"),
              SecurityControl("CP06", "placement", "P6: Code assistant comment classifier deployed",
                  "Section 6.10 / 6.17", ["code_assistant", "agentic"], False, 10,
                  "Comment-level classifier + dependency scanner on all code context"),
              SecurityControl("CP07", "placement", "P7: Agent memory write guard + read-time classifier",
                  "Section 6.12 / 6.17", ["agentic"], False, 12,
                  "memory_write mode classifier + contextual retrieved_content classifier on memory reads"),
              SecurityControl("CP08", "placement", "P8: Tool/plugin output classifier deployed",
                  "Section 6.12 / 6.16 / 6.17", ["agentic"], False, 12,
                  "Classifier on all tool return values before LLM reasoning context delivery"),
              # ---- Normalisation ----
              SecurityControl("NP01", "normalisation", "Normalisation pipeline active pre-classification",
                  "Section 6.4", ALL_TYPES, False, 8,
                  "Zero-width removal, NFKC, homoglyphs, encoding decodes, case fold"),
              SecurityControl("NP02", "normalisation", "FPR calibration completed for deployment tier",
                  "Section 6.4.7", ALL_TYPES, False, 6,
                  "Calibrate against 10K+ benign production-representative inputs"),
              SecurityControl("NP03", "normalisation", "Latency benchmark passed (50ms P99)",
                  "Section 6.17.6", ALL_TYPES, False, 5,
                  "P99 benchmark on target hardware before production promotion"),
              # ---- Session / memory ----
              SecurityControl("SM01", "session", "Session isolation enforced",
                  "Section 6.11.7", ALL_TYPES, False, 6,
                  "Server-generated tokens, canonical history, client history rejected on start"),
              SecurityControl("SM02", "session", "Stateful multi-turn detector deployed",
                  "Section 6.11.6", ALL_TYPES, False, 8,
                  "Session state tracking four trajectory metrics; session-level thresholds"),
              SecurityControl("SM03", "session", "Agent memory batch audit scheduled",
                  "Section 6.12.7", ["agentic"], False, 5,
                  "Weekly batch scan of full memory store with injection classifier"),
              SecurityControl("SM04", "session", "Canary tokens deployed in knowledge base and memory",
                  "Section 6.13.4", ["rag_assistant", "agentic"], False, 4,
                  "Canary token deployment + activation monitoring on model outputs"),
              # ---- Infrastructure ----
              SecurityControl("IS01", "infrastructure", "System prompt hardened against extraction",
                  "Section 6.2.5", ALL_TYPES, False, 5,
                  "Anti-extraction instruction, anti-persona-adoption instruction"),
              SecurityControl("IS02", "infrastructure", "Network egress restriction (browsing/plugin agents)",
                  "Section 6.7.6 / 6.16.5", ["web_augmented", "agentic"], False, 6,
                  "Allowlist outbound connections; block-by-default"),
              SecurityControl("IS03", "infrastructure", "Plugin/tool call allowlist defined",
                  "Section 6.16.5", ["agentic"], False, 8,
                  "Directed permission graph: read plugins may not trigger write plugins"),
              SecurityControl("IS04", "infrastructure", "Email agent draft-and-hold enforced",
                  "Section 6.8.7", ["email_agent", "agentic"], False, 7,
                  "Human review required before any outbound email is sent"),
              # ---- Operational ----
              SecurityControl("OP01", "operational", "Sigma rule deployed to SIEM",
                  "Section 6.17.5", ALL_TYPES, False, 5,
                  "AML.T0051+T0054 Sigma rule compiled and active in SIEM"),
              SecurityControl("OP02", "operational", "Output monitoring for alignment anomalies",
                  "Section 6.14.4", ALL_TYPES, False, 5,
                  "Monitor model outputs for persona adoption, system prompt revelation"),
              SecurityControl("OP03", "operational", "Classifier drift monitoring deployed",
                  "Section 6.17.6", ALL_TYPES, False, 4,
                  "Three-signal weekly health report; quarterly retraining cadence"),
              SecurityControl("OP04", "operational", "Incident response procedure defined",
                  "Section 6.13.6 / 6.18", ALL_TYPES, False, 4,
                  "Analyst review queue, escalation path, purge procedure"),
              SecurityControl("OP05", "operational", "Developer awareness training (code assistant deployments)",
                  "Section 6.15.7", ["code_assistant", "agentic"], False, 3,
                  "Developer risk brief distributed; anomaly reporting channel active"),
          ]

          # Filter to only controls required for this deployment type
          applicable = [
              c for c in controls
              if spec.deployment_type in c.required_for or "all" in [r.lower() for r in c.required_for]
              or any(t in c.required_for for t in ALL_TYPES)
          ]
          return applicable


      def evaluate(spec: DeploymentSpec, controls: list[SecurityControl]) -> None:
          total_weight = sum(c.weight for c in controls)
          achieved_weight = sum(c.weight for c in controls if c.implemented)
          pct = round((achieved_weight / total_weight) * 100)

          print(f"\n{'='*70}")
          print(f"INJECTION SECURITY CHECKLIST: {spec.name}")
          print(f"Deployment type: {spec.deployment_type}")
          print(f"Score: {achieved_weight}/{total_weight} ({pct}%)")
          print("=" * 70)

          for cat in ["placement", "normalisation", "session", "infrastructure", "operational"]:
              cat_controls = [c for c in controls if c.category == cat]
              print(f"\n  [{cat.upper()}]")
              for c in cat_controls:
                  status = "OK" if c.implemented else "MISSING"
                  print(f"    [{status}] {c.id}: {c.name} (w={c.weight}) [{c.section_reference}]")

          gaps = [c for c in controls if not c.implemented]
          if gaps:
              print(f"\n  Gaps ({len(gaps)}) -- prioritised by weight:")
              for c in sorted(gaps, key=lambda x: x.weight, reverse=True)[:8]:
                  print(f"    {c.id} (w={c.weight}): {c.remediation[:70]}")
          print("=" * 70)


      def run_demo() -> None:
          spec = DeploymentSpec(
              name="Enterprise RAG Assistant with Email Integration",
              deployment_type="rag_assistant",
              uses_rag=True,
              uses_email=True,
          )
          controls = build_controls(spec)

          # Simulate partial deployment
          implemented_ids = {"CP01", "NP01", "NP02", "SM01", "IS01", "OP01"}
          for c in controls:
              c.implemented = c.id in implemented_ids

          evaluate(spec, controls)

          Path("production_checklist_results.json").write_text(
              json.dumps(
                  {"spec": asdict(spec), "controls": [asdict(c) for c in controls]},
                  indent=2
              ),
              encoding="utf-8"
          )
          print("[OK] Checklist exported to production_checklist_results.json")


      if __name__ == "__main__":
          run_demo()


