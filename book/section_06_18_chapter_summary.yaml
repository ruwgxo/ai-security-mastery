key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Chapter 6 makes one argument: wherever external content enters an LLM
        context, a classifier must precede context assembly. All 17 sections --
        mechanisms, surfaces, temporal patterns, incidents -- support this single
        principle.

    - number: 2
      takeaway: |
        The injection taxonomy has five classes: direct (AML.T0051), jailbreak
        (T0051 subclass), indirect (AML.T0054), temporal (T0051/T0054), and
        cross-modal/language-gap (T0054). All five are addressed by the Section
        6.17 classifier at the appropriate placement.

    - number: 3
      takeaway: |
        Eight classifier placements cover all injection surfaces. The Section 6.17
        classifier is the single service called at all eight. A deployment's
        injection posture is determined by which placements are active. P1 alone
        (user input) is the most common incomplete deployment.

    - number: 4
      takeaway: |
        The three real-world incidents are three instantiations of one failure:
        external content entered LLM context without a classifier. Bing Chat (P3
        absent), Copilot (P6 absent), GPT Plugin (P8 absent). All three would
        have been prevented or significantly mitigated by the appropriate placement.

    - number: 5
      takeaway: |
        Impact escalates with agentic capability. Bing Chat caused persona adoption.
        Copilot required developer acceptance of malicious code. Plugin injection
        caused automatic data exfiltration. As deployments become more agentic,
        the blast radius per injection escalates proportionally.

    - number: 6
      takeaway: |
        The AML.T0051 Sigma stub from Chapter 5 Section 5.8 is complete. The
        production classifier fills the detection condition. This is the first
        fully deployed detection rule in the book. Chapter 5.8 pointed here;
        Chapter 6.17 delivered.

    - number: 7
      takeaway: |
        The detection investment roadmap prioritises by impact and effort. Tier 1
        (user input classifier, system prompt hardening, session isolation) is the
        minimum viable injection defence. Each tier adds incremental coverage for
        specific deployment capabilities.

    - number: 8
      takeaway: |
        Chapter 7 addresses the training-time complement: data poisoning, backdoor
        insertion, gradient manipulation. Chapter 6 defends inference time. Chapter
        7 defends training time. Together they cover the full LLM attack lifecycle.
        The Section 6.17 classifier does not protect against backdoored model weights.


