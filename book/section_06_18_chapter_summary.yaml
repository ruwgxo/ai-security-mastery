section_summary: |
  Section 6.18 closed Chapter 6 with the synthesis its 17 content sections
  earned. The chapter made one argument, sustained across 108 pages: wherever
  external content enters an LLM context, a classifier must stand between that
  content and the context assembly stage. Every section arrived at this conclusion
  from a different angle.

  The complete injection taxonomy spans five classes and 20+ distinct variants.
  The eight classifier placements cover every injection surface identified in
  Chapters 6.1 through 6.16. The Section 6.17 production classifier is the single
  service instantiated at all eight placements, deployed as a FastAPI middleware
  with three modes, 50ms P99 latency budget, deployment-tier FPR calibration,
  and the completed AML.T0051/T0054 Sigma rule.

  The three real-world incidents are three proofs of the same theorem: Bing Chat
  (web content without P3 classifier), Copilot (code comments without P6 classifier),
  GPT Plugin (tool outputs without P8 classifier). One architecture gap, three
  deployments, three production incidents. The Section 6.17 classifier addresses
  all three absent controls.

  The detection investment roadmap sequences control deployment by impact and
  effort, enabling organisations to achieve maximum risk reduction per unit of
  security engineering investment. The 24-control production checklist and the
  20-question knowledge assessment provide operational verification that Chapter
  6's requirements have been implemented and understood.

  Chapter 7 begins the training-time half of the LLM attack lifecycle. Where
  Chapter 6 defended inference, Chapter 7 defends training. The adversary moves
  upstream; the detection architecture moves with them.
...
