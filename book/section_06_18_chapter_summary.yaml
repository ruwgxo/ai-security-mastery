      description: |
        Five-tier roadmap ordering injection defence investments by impact and effort.
        Tier 1 (user input classifier, system prompt hardening, session isolation),
        Tier 2 (RAG + web pre-assembly classifiers, FPR calibration), Tier 3 (email,
        memory, stateful detector), Tier 4 (database, code assistant, plugin/tool),
        Tier 5 (ongoing operations). Rationale for each tier ordering.
