section_overview:
  one_line_summary: 'The production feature pipeline is the infrastructure that makes the Section 12.02 feature design real: features extracted in under 5ms, identical at training and serving time, and versioned so each detector receives the schema it was trained on.'
  why_this_section_exists: |
    Section 12.02 designed the five feature groups -- token, structural, semantic,
    contextual, and API-level. The security_feature_extractor.py from that section is a
    correct reference implementation, but it is not production-grade. It computes embeddings
    with a placeholder, it has no session cache for contextual features, it does not enforce
    schema versioning at inference time, and its latency was never measured against the
    gateway budget.

    Section 12.11 turns the feature design into a production serving system that meets three
    requirements that the reference implementation did not address. First, latency: all five
    feature groups combined must complete in under 5ms so that the four detectors plus the
    feature extraction fit within the 50ms gateway budget. Second, training-serving consistency:
    the features computed at inference time must be numerically identical to those computed at
    training time, because any divergence silently degrades every classifier that consumes the
    features. Third, schema versioning: each trained classifier was trained on a specific
    feature schema, and the inference pipeline must guarantee it receives that exact schema
    or reject the request.

    The hardest of these is training-serving consistency. The embedding features are the
    primary risk: if training uses the sentence-transformers PyTorch path and serving uses
    ONNX Runtime, the embeddings differ and the centroid distances shift, degrading the
    embedding detector and the supervised classifiers that use the distance features. The
    contextual features are the second risk: if the session cache returns different values
    than the training-time computation (a stale refusal count, a different session rate
    window), the contextual features diverge. Section 12.11 closes both gaps with a single
    canonical feature pipeline used identically at training and serving time.
  position_in_chapter: |
    Section 12.11 is the second operational infrastructure section. It consumes the feature
    design from Section 12.02 and the embedding detector from Section 12.07, and produces the
    production feature pipeline that the Section 12.12 inference optimisation and the Section
    12.17 gateway capstone depend on. The feature_pipeline.py from this section replaces the
    reference security_feature_extractor.py as the canonical feature serving system.

learning_objectives:

  knowledge:
    - 'Explain the training-serving skew problem: how a divergence between training-time and inference-time feature computation silently degrades classifier accuracy'
    - 'State the sub-5ms latency budget for feature extraction and explain how it fits within the overall 50ms gateway budget alongside the four detectors'
    - 'Describe how ONNX Runtime accelerates Sentence Transformer inference and state the latency improvement over native PyTorch'
    - 'Explain why contextual features require a session cache and what the cache stores'
    - 'Describe feature schema versioning and explain why a model must reject feature vectors that do not match its trained schema version'
    - 'Distinguish the online feature store (real-time inference) from the offline feature store (training) and explain why they must produce consistent features'

  skills:
    - 'Build the production feature pipeline with all five feature groups, latency instrumentation per group, and a sub-5ms total target'
    - 'Implement ONNX Runtime MiniLM-L6 embedding inference with batching and an LRU embedding cache'
    - 'Implement a Redis-backed session feature cache with TTL and cache hit rate monitoring'
    - 'Implement feature schema versioning that tags features with a schema version and rejects mismatched inference requests'
    - 'Write a unit and integration test suite that catches training-serving skew before deployment'

  security_mindset:
    - 'Treat training-serving skew as a silent failure mode -- it produces no error, only gradual accuracy degradation, so it must be caught by tests and monitoring rather than runtime errors'
    - 'Recognise that the feature pipeline is a shared dependency of all five detectors -- a bug in feature extraction degrades every classifier simultaneously, making the pipeline the highest-leverage code to test'
    - 'Understand that latency instrumentation per feature group is necessary, not optional -- when the feature extraction exceeds budget, the per-group breakdown identifies which group to optimise'
    - 'Accept that feature schema versioning is a correctness mechanism, not bureaucracy -- a model receiving the wrong feature schema produces wrong predictions silently, which is worse than a loud failure'

prerequisites:
  - 'Section 12.02: security feature engineering -- the five feature groups and SecurityFeatureVector that this section makes production-grade'
  - 'Section 12.07: embedding detection -- the ONNX Runtime embedding inference path that the semantic features use'
  - 'Section 12.06: sequence models -- the session history storage that the contextual feature cache builds on'
  - 'Section 12.10: calibration -- the calibrated detectors that consume the feature pipeline output'
  - 'Chapter 11 Section 11.13: seven-track gateway -- the 50ms latency budget the pipeline must fit within'

prose_content:

  part_1:
    title: 'The Training-Serving Skew Problem'
    body: |
      Training-serving skew is the most dangerous failure mode in production ML because it
      produces no error. The system runs, the classifiers produce predictions, the latency
      is within budget -- everything appears to work. But the features computed at inference
      time differ subtly from those computed at training time, so the classifiers see input
      distributions they were not trained on, and their accuracy degrades silently. The
      degradation is discovered only through a drop in detection effectiveness, which may
      take weeks to attribute to feature skew rather than to attack distribution shift.

      The skew arises whenever the feature computation differs between training and serving.
      The most common cause in the Chapter 12 system is the embedding features. During
      dataset construction (Section 12.04) and centroid building (Section 12.07), embeddings
      may be computed with the sentence-transformers PyTorch library for convenience. In
      production, embeddings are computed with ONNX Runtime for speed. The two paths use the
      same model weights but different numerical implementations -- different pooling code,
      different floating-point precision -- and produce embeddings that differ by small but
      consistent offsets. These offsets shift the cosine distance features, which were
      calibrated against the PyTorch embeddings, degrading the embedding detector and every
      supervised classifier that uses centroid_cosine_dist_min.

      The contextual features are the second skew risk. During training, the contextual
      features (prior_refusal_count, session_request_rate, turn_number) are computed from the
      stored session history in the labelled dataset. In production, they are computed from
      the live session cache. If the cache computes session_request_rate over a different
      time window than the training computation, or if the refusal count is stale because the
      cache was not updated after the latest model response, the contextual features diverge.

      The solution is a single canonical feature pipeline used identically at training and
      serving time. The same code computes the features during dataset construction and during
      production inference. The same ONNX Runtime embedding path is used in both. The same
      session cache logic computes the contextual features in both. When the feature
      computation is the same code, there is no skew. Section 12.11 builds this canonical
      pipeline and the test suite that verifies the training and serving paths produce
      identical features.

  part_2:
    title: 'Latency Budget: Sub-5ms for Five Feature Groups'
    body: |
      The 50ms gateway P99 budget is shared across the feature extraction and the four
      input-side detectors. The detectors consume the majority: the Isolation Forest at
      1-3ms, the Random Forest at 1-3ms, the GRU at 5-15ms, and the DistilBERT INT8 at
      7ms, running in parallel via the Section 12.12 async architecture so the detector
      latency is the maximum (around 15ms) rather than the sum. This leaves roughly 30ms
      of headroom, of which the feature extraction should consume no more than 5ms so that
      network, serialisation, and other gateway overhead have room within the budget.

      The 5ms feature extraction budget breaks down by group. The token-level features
      (sequence length, special character density, instruction keyword frequency, token
      entropy) compute in under 1ms with vectorised operations. The structural features
      (role boundary markers, code block density, bracket density) compute in 1-2ms with
      compiled regex and a lightweight POS check. The semantic features (the embedding and
      its cosine distances) are the largest cost at 2-4ms with ONNX Runtime. The contextual
      features (turn number, refusal count, session rate) compute in under 1ms with a Redis
      cache hit. The API-level features (temperature, streaming flag, model name) compute in
      microseconds from the request parameters.

      The semantic features dominate the budget because they require neural inference. The
      ONNX Runtime path is the difference between fitting and exceeding the budget: native
      PyTorch MiniLM-L6 inference takes 8-10ms, which alone consumes the entire feature
      budget, while ONNX Runtime reduces it to 2-3ms. For requests where the semantic features
      are not needed (a request that the token and structural features have already cleared
      with high confidence), the embedding inference can be skipped entirely via an early
      exit, reducing the average feature extraction latency further.

      Latency instrumentation per group is essential for maintaining the budget. The
      feature_pipeline.py in deliverable_1 measures and logs the latency of each feature
      group. When the total exceeds budget, the per-group breakdown shows which group is
      responsible -- typically the embedding inference if the ONNX path regressed or the
      contextual features if the cache hit rate dropped.

  part_3:
    title: 'ONNX Runtime: Accelerating the Semantic Features'
    body: |
      ONNX (Open Neural Network Exchange) is a model representation format that decouples
      the model from the training framework. A Sentence Transformer model trained in PyTorch
      is exported to ONNX format once, offline, producing a model file that ONNX Runtime can
      execute with an optimised inference graph. The optimisation includes operator fusion
      (combining sequential operations into single kernels), constant folding (precomputing
      operations on constant inputs), and hardware-specific kernel selection.

      For MiniLM-L6, the ONNX Runtime inference path produces embeddings in 2-3ms on CPU
      compared to 8-10ms for native PyTorch. The speedup comes from the graph optimisation
      and from ONNX Runtime's efficient CPU execution provider, which is tuned for inference
      workloads in a way that PyTorch's eager execution is not. The accuracy is identical:
      the ONNX export preserves the model weights and the computation, so the embeddings
      match the PyTorch embeddings to within floating-point precision -- which is the key
      property for avoiding training-serving skew, provided the same ONNX path is used at
      training time.

      The embedding cache adds a second layer of latency reduction. Many requests repeat or
      closely resemble prior requests, and computing the embedding of an identical text twice
      is wasteful. An LRU cache keyed on the request text returns the embedding for a repeated
      text in microseconds, skipping the ONNX inference entirely. The cache hit rate depends
      on the traffic pattern: high for APIs with repetitive requests (automated clients,
      common queries), low for APIs with diverse free-text input. The onnx_embedding_extractor.py
      in deliverable_2 implements the ONNX inference with the LRU cache and measures the hit
      rate for monitoring.

      The critical operational requirement is that the same ONNX model is used at training and
      serving time. The Section 12.07 centroid builder and the Section 12.04 dataset embedding
      must use the same ONNX model that the production pipeline uses. Exporting the ONNX model
      once and using it everywhere -- dataset construction, centroid building, and production
      inference -- eliminates the embedding skew that would otherwise arise from the PyTorch-
      versus-ONNX divergence.

  part_4:
    title: 'Session Cache: Contextual Features Without History Reconstruction'
    body: |
      The contextual features depend on the session history: the turn number, the count of
      prior refusals, the session request rate. Computing these from scratch on every request
      would require fetching and replaying the full conversation history, which is too slow
      for the latency budget and scales poorly as conversations grow long.

      The session cache stores the contextual state per session and updates it incrementally.
      When a request arrives, the cache returns the current turn number, refusal count, and
      session rate in a single lookup. After the model responds, the cache is updated: the
      turn number increments, the refusal count increments if the response was a refusal, and
      the session rate is recomputed from the request timestamps. This incremental update is
      far cheaper than reconstructing the state from the full history on every request.

      Redis is the standard backing store for the session cache. A Redis hash per session ID
      stores the contextual state, with a TTL that expires the session after a period of
      inactivity (typically the conversation timeout, such as 30 minutes). The cache lookup
      is sub-millisecond, well within the contextual feature budget. The TTL ensures that
      abandoned sessions do not accumulate in the cache indefinitely.

      The cache hit rate is a monitored metric. A cache miss occurs on the first request of
      a session (no state yet) or when the TTL has expired a session that then resumes. On
      a cache miss, the contextual features default to first-turn values (turn number 1,
      refusal count 0, session rate 0), which is correct for a genuinely new session and a
      conservative default for a resumed session. A dropping cache hit rate signals a problem:
      the TTL may be too short (expiring active sessions), or the cache may be undersized
      (evicting active sessions). The session_feature_cache.py in deliverable_3 monitors the
      hit rate and alerts when it drops below a threshold.

  part_5:
    title: 'Feature Schema Versioning: Rejecting Mismatched Requests'
    body: |
      Each trained classifier was trained on a specific feature schema -- a specific set of
      features in a specific order with specific computation logic. The Section 12.02
      FEATURE_SCHEMA_VERSION constant identifies this schema. When the feature design changes
      -- a feature is added, removed, or its computation is modified -- the schema version
      increments, and classifiers trained on the old schema are no longer compatible with
      the new feature vectors.

      The schema versioning mechanism enforces this compatibility at inference time. Every
      feature vector is tagged with the schema version that produced it. Every trained
      classifier is tagged with the schema version it was trained on. Before passing a feature
      vector to a classifier, the pipeline checks that the vector's schema version matches the
      classifier's trained version. If they match, inference proceeds. If they do not match,
      the pipeline rejects the request with a logged error rather than passing a mismatched
      vector that would produce silently wrong predictions.

      The failure mode the versioning prevents is subtle and severe. Suppose a feature is added
      to the pipeline (a new structural feature), incrementing the schema from 1.0.0 to 1.1.0.
      The pipeline now produces 21-feature vectors. A classifier trained on the 20-feature
      1.0.0 schema receives a 21-feature vector. Depending on the classifier implementation,
      it may raise a shape error (loud failure, easy to diagnose), or it may silently use the
      first 20 features and ignore the 21st, or worse, it may misalign the features so that
      each feature is interpreted as a different feature. The silent misalignment produces
      wrong predictions with no error, which is the worst outcome. Schema versioning converts
      this silent failure into a loud, diagnosable rejection.

      The feature_schema_versioner.py in deliverable_4 implements the schema registry that
      tracks the current pipeline schema version and the schema version each registered model
      expects, and enforces the match at inference time. It connects to the Section 12.13 model
      registry, which stores the schema version alongside each model as part of the model
      lineage.

  part_6:
    title: 'Online and Offline Feature Stores'
    body: |
      The feature store is the architectural pattern that guarantees training-serving
      consistency at scale. It has two faces: an offline store used during training and an
      online store used during inference. Both are populated by the same canonical feature
      pipeline, which is the property that prevents skew.

      The offline store holds the features computed during dataset construction. When the
      Section 12.04 dataset builder constructs the training set, it computes the features for
      every labelled example using the canonical pipeline and stores them in the offline store
      alongside the labels. The classifiers train on these stored features. Because the
      offline features were computed by the canonical pipeline, they match what the online
      store will produce at inference time.

      The online store holds the features for real-time inference. When a request arrives, the
      pipeline computes the features (using the same canonical code as the offline store),
      optionally caches them, and passes them to the classifiers. The contextual features
      come from the session cache, which is the online store's stateful component.

      For the Chapter 12 system, a full feature store framework (Feast, Tecton) is more
      infrastructure than most deployments need. The essential property -- the same canonical
      pipeline at training and serving -- can be achieved more simply by sharing the
      feature_pipeline.py code between the dataset builder and the production inference path,
      with the session cache providing the online stateful component. The feature store
      pattern is the conceptual model; the canonical shared pipeline is the practical
      implementation. The feature drift detection from Section 12.02 deliverable_4 monitors
      the online feature distributions against the offline training distributions, catching
      any residual skew that the shared pipeline did not prevent.

