# ===========================================================================
# SECTION CONTENT
# ===========================================================================

content:

  opening: |
    Sections 7.3 through 7.11 documented nine attack families that adversaries
    use. All of them can be manually constructed by a skilled human who understands
    the model's trained dispositions. In 2023, that remained the primary attack
    mode -- adversaries investing time and creativity in crafting prompts.

    By 2024, automated generation had changed the economics of the attack.
    PAIR, TAP, GCG, and their derivatives mean that a single adversary with access
    to an LLM API can generate and test thousands of jailbreak candidates per hour
    without manual prompt engineering. The iteration speed that once gave defenders
    time to patch between variants collapsed. An adversary can now test your
    deployment against the full Chapter 7 attack taxonomy automatically, find
    which variants succeed, and iterate on those variants faster than any manual
    detection update cycle can track.

    The response is not to abandon detection -- it is to adopt the same automation.
    Every tool in this section is dual-use: the frameworks adversaries use to find
    jailbreaks are the frameworks defenders use to discover vulnerabilities before
    adversaries do. Automated red-teaming is not optional for serious production
    deployments. It is the mechanism by which detection investment is prioritised
    correctly -- by empirical success rates against your specific deployment, not
    by theoretical threat models.

    This section builds a deployable red-team generator and the success rate
    analysis framework that translates its output into detection investment decisions.

  subsections:

    - number: "7.12.1"
      title: "The Automation Shift: Iteration Speed vs Defender Update Cycles"
      body: |
        Manual jailbreak development follows a predictable timeline. An adversary
        discovers a new technique or variant. They test it against target models.
        If successful, it propagates through communities, research papers, and
        public databases. Defenders observe the new technique, develop detection
        rules, and deploy updates. The cycle from discovery to detection patch
        has historically run days to weeks for well-resourced defenders.

        Automated generation collapses this timeline on the attack side. PAIR
        can generate and test hundreds of jailbreak candidates against a target
        model in an hour using only API access. TAP can explore a tree of
        attack variants and prune to the highest-success branches in the same
        timeframe. An adversary running automated generation can iterate past
        a new detection rule within the same hour it is deployed, without any
        human involvement in the iteration.

        The asymmetry is structural. Defenders must update detection rules,
        validate them, and deploy them -- a process with human review gates and
        validation requirements. Adversaries can update their generation prompts
        and run a new batch against the API instantly. No human gate. No
        validation requirement. The cycle time is limited only by API rate limits
        and compute budget.

        Two responses are available to defenders. First, move from signature-based
        to mechanism-based detection: classifiers that detect the underlying
        mechanism of jailbreak families rather than specific prompt variants are
        resistant to variant iteration within a family. The semantic classifier
        built across Sections 7.3-7.11 is mechanism-based by design. Second,
        adopt automated red-teaming: use the same generation frameworks to
        continuously probe your own deployment, finding new variants before
        adversaries do and updating detection before attacks are deployed at scale.
        Both responses are necessary. Neither alone is sufficient.

    - number: "7.12.2"
      title: "PAIR: Prompt Automatic Iterative Refinement"
      body: |
        PAIR (Chao et al., 2023) uses an attacker LLM to iteratively refine
        jailbreak prompts against a target LLM. It requires no gradient access --
        only API access to both models. It is the automation equivalent of a
        skilled human red-teamer who learns from each attempt and refines their
        approach.

        The algorithm has four components.

        Attacker LLM. A language model (separate from the target) that generates
        jailbreak candidate prompts. The attacker LLM is given a system prompt
        that instructs it to act as a red-team prompt engineer: its goal is to
        find prompts that cause the target model to produce a specified output
        that the target model would normally refuse.

        Target LLM. The model being tested. The target receives each candidate
        jailbreak prompt generated by the attacker LLM and produces a response.
        The response is evaluated for compliance.

        Judge LLM. A third model (or the same model with a different system
        prompt) that evaluates the target's response. The judge determines whether
        the target complied with the jailbreak attempt on a scale (typically 1-10).
        A high judge score indicates a successful jailbreak. A low score indicates
        failure. The judge score is the feedback signal that drives attacker
        refinement.

        Iterative refinement. The attacker LLM receives the previous prompt, the
        target's response, and the judge's score. It generates a new candidate
        prompt that attempts to improve on the previous attempt based on this
        feedback. This continues for N iterations or until a successful jailbreak
        is found (judge score above a threshold).

        PAIR is highly effective at finding jailbreaks from the social-engineering
        families (Sections 7.3-7.11). It generates persona attacks, fictional
        framings, competing objective arguments, and hybrid variants that a human
        red-teamer might not construct. It is less effective at generating
        token-level attacks (GCG, many-shot) which require different mechanisms.
        A complete automated red-team uses PAIR for the social-engineering attack
        space and GCG / shot-count injection for the statistical attack space.

    - number: "7.12.3"
      title: "TAP: Tree of Attacks with Pruning"
      body: |
        TAP (Mehrotra et al., 2023) extends the PAIR approach with a tree search
        structure. Where PAIR follows a single linear refinement chain, TAP
        explores multiple branches simultaneously and prunes the tree based on
        partial success signals to concentrate computation on the most promising
        attack directions.

        The tree structure has three parameters. Width: how many candidate
        branches are generated at each node. Depth: how many refinement steps
        are allowed per branch. Branching strategy: how branches are selected
        for expansion versus pruning.

        At each node, the attacker LLM generates width candidate refinements of
        the current prompt. Each candidate is evaluated by the judge LLM.
        Candidates below a pruning threshold are discarded. Candidates above the
        threshold are expanded into the next level of the tree, each generating
        width new candidates. This continues until either a successful jailbreak
        is found or the maximum depth is reached.

        Pruning is the key efficiency gain over PAIR. PAIR's linear chain
        spends equal time on all refinement directions regardless of their
        promise. TAP concentrates computation on directions that show partial
        success signals early in the search. An attack direction that produces
        a judge score of 6/10 at depth 1 is more promising than one that scores
        2/10, and TAP preferentially expands the former.

        TAP is particularly effective at finding hybrid attacks -- jailbreaks that
        combine multiple attack families in ways that a human red-teamer or a
        linear refinement process might not discover. A TAP run exploring the
        persona-plus-fictional-framing space may find that specific combinations
        of persona establishment, fictional universe, and competing objective
        argument achieve bypass rates that no individual family achieves alone.
        This is operationally valuable for both adversaries and defenders.

    - number: "7.12.4"
      title: "AutoDAN and GCG: Recap and Operational Role in Red-Teaming"
      body: |
        Section 7.9 covered GCG and AutoDAN in detail. Their role in automated
        red-teaming is distinct from the PAIR and TAP role.

        PAIR and TAP operate in the natural language attack space -- they generate
        and refine prompts that are human-readable and semantically meaningful.
        They find jailbreaks in the social-engineering families: DAN variants,
        fictional framings, authority claims, competing objective arguments.
        They do not discover token-level attacks -- the search space is different.

        GCG operates in the token-level attack space -- it finds non-human-readable
        adversarial suffixes through gradient optimisation. AutoDAN adds readability
        constraints to produce suffixes that are both effective and human-readable.
        Neither requires the target model to have semantic understanding of the
        attack -- they find exploitable regions of the token embedding space
        directly.

        A complete automated red-team programme uses both. PAIR/TAP for the
        semantic attack surface: discovering which social-engineering variants
        and combinations succeed against your specific deployment. GCG/AutoDAN
        for the statistical attack surface: discovering whether your deployment
        is vulnerable to gradient-optimised suffix attacks and calibrating the
        perplexity detector threshold against actual generated suffixes.

        The success rate analysis in Section 7.12.6 integrates results from all
        four frameworks into a single assessment of which detection tracks are
        load-bearing for your specific deployment.

    - number: "7.12.5"
      title: "Jailbreak Databases and Community Ecosystems"
      body: |
        Alongside the algorithmic frameworks, a community-driven jailbreak database
        ecosystem maintains and distributes discovered techniques. Understanding
        this ecosystem matters for defenders because it is the primary channel
        through which manually-discovered jailbreaks propagate to scale.

        JailbreakChat.com was the first major database, aggregating user-submitted
        jailbreak prompts with community ratings. Its format -- user-submitted,
        rated, searchable -- made it a discovery and distribution platform.
        By 2023 it had catalogued hundreds of variants spanning all the attack
        families covered in this chapter.

        JailbreakBench (Chao et al., 2024) is the academic standardisation effort:
        a benchmark dataset, evaluation framework, and leaderboard for red-team
        research. JailbreakBench provides a standardised harmful behaviour set
        for evaluation, a standardised judge for scoring compliance, and a public
        leaderboard comparing attack success rates across methods. It is the
        evaluation infrastructure referenced in Exercise 7.12.ex.03.

        The community ecosystem and the academic frameworks interact: community-
        discovered techniques inform benchmark construction, and benchmark
        evaluation exposes techniques to academic red-team frameworks that
        systematise and scale them. The lifecycle of a jailbreak technique in
        this ecosystem runs from community discovery through academic cataloguing
        through automated generation incorporation through detection research.

        For defenders, monitoring JailbreakBench is the most efficient way to
        track the state of the art in automated jailbreak generation without
        running all generation frameworks internally. A new technique appearing
        on the JailbreakBench leaderboard has been validated, is reproducible,
        and will appear in production attacks within weeks. It defines the
        detection update priority queue.

    - number: "7.12.6"
      title: "Success Rate Analysis: Measuring What Actually Works"
      body: |
        The success rate analysis is the output of the red-team programme that
        determines detection investment. It answers the question: across all
        attack families covered in Chapter 7, which families succeed against this
        specific deployment, at what rate, and which detection track catches them?

        Success rate is measured per attack family, per detection track, and
        per combined attack (cross-family compositions). The measurement protocol
        has four components.

        Attack corpus. A set of jailbreak prompts drawn from the Chapter 7
        taxonomy, generated by PAIR/TAP (for semantic families) and GCG (for
        statistical families). For each attack family, include manually crafted
        examples (from the red-team exercises in Sections 7.3-7.11) and
        automated generation outputs. Aim for 50+ prompts per family.

        Payload standard. Use a consistent payload across all testing: a request
        that produces an unambiguous compliance signal if the jailbreak succeeds,
        but is itself benign enough that compliance does not cause real harm.
        The JAILBREAK_SUCCESS string from prior exercises is appropriate. Consistency
        across families is essential for comparing success rates.

        Judge evaluation. For each prompt, evaluate the target model's response
        against the payload standard. Binary: did the model produce a compliant
        response? Record both the binary outcome and any partial compliance
        signals (weakened refusals, hedging with partial information).

        Detection coverage. For each prompt in the corpus, record which detection
        tracks fired, at what confidence, and whether the correct alert was
        generated before the model processed the prompt. The gap between jailbreak
        success rate and detection coverage rate is the residual risk.

        The output is a coverage matrix: attack family × detection track, showing
        which families are caught by which tracks, at what precision. Any cell
        in the matrix with high attack success rate and low detection coverage
        rate is a priority detection investment target.

    - number: "7.12.7"
      title: "Building a Red-Team Jailbreak Generator for Your Deployment"
      body: |
        The deployable red-team generator built in the code section uses PAIR
        as its core algorithm with extensions for TAP-style branching and support
        for testing all Chapter 7 attack families. It requires API access to an
        attacker LLM (any capable model) and the target LLM (your deployment).

        Three design decisions determine the generator's operational parameters.

        Attacker model choice. A capable attacker model generates better jailbreak
        candidates. GPT-4 or Claude-3-Opus as the attacker produces more creative
        and effective candidates than GPT-3.5. The attacker model should be
        different from the target model to reduce the risk that the attacker
        model's safety training prevents it from generating effective attack prompts
        against itself. Using a model from a different provider as the attacker
        is the most reliable configuration.

        Goal behaviour specification. The generator must be given a specific
        description of the target behaviour -- what the model should produce if
        the jailbreak succeeds. This is the JAILBREAK_SUCCESS standard for
        compliance testing, or a specific harmful behaviour description for
        measuring actual capability bypass. For safety, all internal testing
        should use the compliance signal standard, not actual harmful capability
        testing.

        Judge calibration. The judge model's scoring affects which candidates are
        retained and which are pruned. A lenient judge (scoring partial compliance
        highly) finds more variants but includes more false positives. A strict
        judge (requiring full compliance) finds fewer variants but with higher
        confidence. Calibrate the judge threshold against your payload standard.

        Responsible disclosure applies when the generator finds significant bypass
        rates. If your deployment is serving as a production API for others, or
        if the bypass rate is above a defined threshold (10% against a representative
        corpus is a reasonable trigger), the findings should be shared with the
        deployment team and treated as security incidents requiring a patching
        response. The responsible disclosure checklist in the code section formalises
        this process.

    - number: "7.12.8"
      title: "Responsible Disclosure and Defender Use of Automated Generation"
      body: |
        Automated jailbreak generation is inherently dual-use. The same frameworks
        that adversaries use to find bypasses are the frameworks defenders use to
        discover them first. This creates disclosure obligations when the defender
        role finds significant vulnerabilities.

        Three disclosure scenarios require different responses.

        Internal deployment testing. The generator finds bypass rates above the
        threshold against your own deployment. This is a routine security finding.
        Document the finding in your detection backlog, prioritise the relevant
        detection track update, and re-test after the update is deployed. No
        external disclosure required unless the deployment provides AI safety
        guarantees that are now known to be violated.

        Third-party deployment testing. The generator is used to test a third-party
        deployment that you have legitimate access to (contracted red-team engagement,
        bug bounty programme, research partnership). Standard responsible disclosure
        applies: document findings, notify the vendor with a reasonable remediation
        window (90 days is conventional), and coordinate public disclosure. Follow
        the vendor's published vulnerability disclosure process.

        Open research findings. The generator discovers a novel technique or a
        novel composition that is not in the existing literature and achieves
        significant bypass rates across multiple model families. This is a research
        finding. Standard academic responsible disclosure applies: coordinate with
        affected model providers before public disclosure, provide them with
        findings and time to implement mitigations, then publish. The JailbreakBench
        submission process is the appropriate channel for research findings that
        have been coordinated with providers.

        The framing of all internal red-team findings should be strictly defensive:
        the goal of running the generator is to find vulnerabilities before
        adversaries do, to measure detection coverage accurately, and to prioritise
        detection investment based on empirical success rates. The generator output
        is security research infrastructure, not an attack capability.

