# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Automated generation collapses the adversary iteration cycle from days to\
    \ minutes. Mechanism-based detection and continuous automated red-teaming\
    \ are the two necessary responses. Neither alone is sufficient."
  - "PAIR uses an LLM attacker to iteratively refine jailbreaks with no gradient\
    \ access -- only API access required. It is the primary tool for finding\
    \ social-engineering family variants and hybrid compositions."
  - "TAP extends PAIR with tree search and pruning, concentrating compute on\
    \ the most promising attack directions. It finds hybrid compositions that\
    \ linear refinement misses."
  - "The same tools adversaries use are the tools defenders use. Dual-use is\
    \ inherent. The defender difference is: testing your own deployment\
    \ proactively, measuring detection coverage, and treating findings as\
    \ security incidents with defined response procedures."
  - "The success rate coverage matrix is the output that matters: attack success\
    \ rate × detection coverage rate per family per track. Critical gaps (high\
    \ attack success, low detection) are the detection investment priorities\
    \ that directly drive Section 7.14 ensemble threshold calibration."
  - "Responsible disclosure is not optional. Bypass rates above thresholds,\
    \ novel techniques, and safety-critical deployment bypasses each have\
    \ defined disclosure obligations with defined timelines."

