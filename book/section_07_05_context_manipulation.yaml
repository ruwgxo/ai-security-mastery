# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Context manipulation is different in kind from single-turn jailbreaks: no\
    \ individual turn contains the full exploit. The manipulation is in the\
    \ trajectory of the conversation, not in any message."
  - "Norm establishment exploits the model's internal consistency: prior compliance\
    \ events lower the effective refusal threshold for subsequent requests. The\
    \ accumulated compliance history is the attack state."
  - "Fiction gradient attacks require monotonic escalation detection across turns.\
    \ The signal is the trajectory slope -- each step is small, the aggregate is\
    \ large."
  - "Sycophancy exploitation builds an agreement chain that logically constrains\
    \ the model's options. The entailment claim at the final turn is the detectable\
    \ signal; the agreement turns that precede it are individually invisible."
  - "Context manipulation and multi-turn injection are structural siblings but\
    \ target different layers. Both detectors must run in parallel. A session\
    \ showing both signals is a composed attack -- the highest-priority alert."
  - "Five state dimensions are required: topic trajectory, compliance history,\
    \ agreement register, authority claims, creative investment depth. None of\
    \ these exist at the single-turn level. Stateless detection cannot catch\
    \ context manipulation attacks."

