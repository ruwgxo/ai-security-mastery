  - id: "7.5.code.02"
    title: "Session State Schema for Context Manipulation Detection"
    description: |
      Defines the five-dimensional session state that the trajectory scorer
      in Section 7.14 must maintain. This is the authoritative state schema --
      all stateful detectors for context manipulation are built on this structure.
      The actual scoring logic is in Section 7.14; this file defines what is tracked.
    language: "python"
    filename: "code/ch07/session_state_schema.py"
    code: |
      from dataclasses import dataclass, field
      from typing import Optional
      import time


      @dataclass
      class TurnRecord:
          '''Single turn in session history.'''
          turn_index: int
          timestamp: float
          user_text: str
          model_complied: bool
          topic_embedding: Optional[list] = None      # filled by embedding model
          risk_proximity: float = 0.0                  # 0=safe, 1=at_refusal_boundary
          specificity_score: float = 0.0               # from request_specificity_scorer
          framing_types_detected: list = field(default_factory=list)
          has_agreement_elicit: bool = False
          has_authority_claim: bool = False
          has_anchor_reference: bool = False           # "as you said", "as we discussed"
          has_extraction_marker: bool = False          # "step-by-step", "explain exactly"
          content_darkness_score: float = 0.0          # 0=harmless, 1=harmful


      @dataclass
      class ComplianceEvent:
          '''Record of a boundary-adjacent compliance event.'''
          turn_index: int
          risk_proximity: float
          topic: str
          was_escalation_from_prior: bool = False


      @dataclass
      class AgreementEvent:
          '''Record of a detected agreement-elicitation turn.'''
          turn_index: int
          proposition_summary: str       # brief human-readable summary
          model_agreed: bool = True


      @dataclass
      class SessionState:
          '''
          Five-dimensional session state for context manipulation detection.
          Maintained across all turns of a session.
          '''
          session_id: str
          start_time: float = field(default_factory=time.time)

          # Dimension 1: Topic trajectory
          turn_records: list = field(default_factory=list)
          topic_drift_scores: list = field(default_factory=list)   # per-turn drift

          # Dimension 2: Compliance history
          compliance_events: list = field(default_factory=list)
          boundary_proximity_trend: float = 0.0   # rolling average, increases with norm establishment

          # Dimension 3: Agreement register
          agreement_events: list = field(default_factory=list)
          entailment_chain_detected: bool = False

          # Dimension 4: Authority and rapport
          authority_claims: list = field(default_factory=list)
          rapport_score: float = 0.0               # 0=neutral, 1=high_rapport

          # Dimension 5: Creative investment
          creative_investment_depth: int = 0       # turns of collaborative creative content
          expert_character_established: bool = False
          fictional_world_established: bool = False

          # Derived risk signals
          norm_establishment_score: float = 0.0
          fiction_gradient_score: float = 0.0
          agreement_stacking_score: float = 0.0
          authority_exploitation_score: float = 0.0
          universe_exploitation_score: float = 0.0

          @property
          def overall_context_manipulation_score(self) -> float:
              '''
              Composite score across all five manipulation dimensions.
              Threshold for alert is calibrated in Section 7.14.
              '''
              scores = [
                  self.norm_establishment_score,
                  self.fiction_gradient_score,
                  self.agreement_stacking_score,
                  self.authority_exploitation_score,
                  self.universe_exploitation_score,
              ]
              # Max of individual scores weighted by count above 0.3
              active = [s for s in scores if s > 0.3]
              if not active:
                  return 0.0
              # Compound: multiple active patterns = higher risk
              base = max(active)
              compound_boost = min(0.3, (len(active) - 1) * 0.15)
              return min(1.0, base + compound_boost)

          @property
          def extraction_attempt_detected(self) -> bool:
              '''True if the most recent turn contains extraction markers.'''
              if not self.turn_records:
                  return False
              return self.turn_records[-1].has_extraction_marker

          @property
          def turns_count(self) -> int:
              return len(self.turn_records)

          def add_turn(self, record: TurnRecord) -> None:
              self.turn_records.append(record)
              self._update_derived_scores(record)

          def _update_derived_scores(self, record: TurnRecord) -> None:
              '''Update all five dimension scores after a new turn is added.'''

              # Dimension 2: norm establishment
              if record.model_complied and record.risk_proximity > 0.4:
                  event = ComplianceEvent(
                      turn_index=record.turn_index,
                      risk_proximity=record.risk_proximity,
                      topic='extracted_from_embedding',
                      was_escalation_from_prior=(
                          len(self.compliance_events) > 0
                          and record.risk_proximity > self.compliance_events[-1].risk_proximity
                      ),
                  )
                  self.compliance_events.append(event)
                  escalation_count = sum(1 for e in self.compliance_events if e.was_escalation_from_prior)
                  self.norm_establishment_score = min(1.0, escalation_count * 0.25)

              # Dimension 3: agreement stacking
              if record.has_agreement_elicit:
                  self.agreement_events.append(
                      AgreementEvent(
                          turn_index=record.turn_index,
                          proposition_summary='detected_via_pattern',
                      )
                  )
                  self.agreement_stacking_score = min(1.0, len(self.agreement_events) * 0.2)

              # Dimension 4: authority
              if record.has_authority_claim:
                  self.authority_claims.append(record.turn_index)
              if self.authority_claims and record.specificity_score > 0.5:
                  self.authority_exploitation_score = min(
                      1.0, record.specificity_score + 0.2
                  )

              # Dimension 5: creative investment
              if record.framing_types_detected:
                  self.creative_investment_depth += 1
              if self.creative_investment_depth >= 3:
                  self.fictional_world_established = True
              if self.fictional_world_established and record.has_extraction_marker:
                  self.universe_exploitation_score = min(
                      1.0, 0.4 + record.specificity_score
                  )

              # Fiction gradient: monotonic content darkness increase
              darkness_history = [t.content_darkness_score for t in self.turn_records]
              if len(darkness_history) >= 4:
                  # Check for monotonic increase over last 4 turns
                  recent = darkness_history[-4:]
                  if all(recent[i] <= recent[i+1] for i in range(len(recent)-1)):
                      self.fiction_gradient_score = min(1.0, recent[-1] + 0.2)


      def print_session_summary(state: SessionState) -> None:
          print(f'Session: {state.session_id} | Turns: {state.turns_count}')
          print(f'  Norm establishment score:      {state.norm_establishment_score:.2f}')
          print(f'  Fiction gradient score:        {state.fiction_gradient_score:.2f}')
          print(f'  Agreement stacking score:      {state.agreement_stacking_score:.2f}')
          print(f'  Authority exploitation score:  {state.authority_exploitation_score:.2f}')
          print(f'  Universe exploitation score:   {state.universe_exploitation_score:.2f}')
          print(f'  OVERALL manipulation score:    {state.overall_context_manipulation_score:.2f}')
          print(f'  Extraction attempt detected:   {state.extraction_attempt_detected}')


      if __name__ == '__main__':
          # Simulate a norm establishment chain session
          state = SessionState(session_id='test-norm-establishment-001')

          turns = [
              TurnRecord(0, time.time(), 'borderline question 1', True, risk_proximity=0.45),
              TurnRecord(1, time.time(), 'as you said, continuing...', True,
                         risk_proximity=0.55, has_anchor_reference=True),
              TurnRecord(2, time.time(), 'escalation with extraction marker', True,
                         risk_proximity=0.65, has_extraction_marker=True, specificity_score=0.6),
          ]
          for turn in turns:
              state.add_turn(turn)

          print_session_summary(state)

  - id: "7.5.code.03"
    title: "Context Manipulation vs Multi-Turn Injection: Comparison Matrix"
    description: |
      Structured comparison of context manipulation (Chapter 7) and multi-turn
      injection (Chapter 6 Section 6.11) across eight dimensions. Drives the
      Section 7.14 trajectory scorer's dual-signal architecture.
    language: "python"
    filename: "code/ch07/context_vs_injection_comparison.py"
    code: |
      COMPARISON_MATRIX = {
          'target_layer': {
              'context_manipulation': 'alignment -- shifts model refusal threshold',
              'multiturn_injection': 'instruction -- assembles instruction-override payload',
          },
          'attack_mechanism': {
