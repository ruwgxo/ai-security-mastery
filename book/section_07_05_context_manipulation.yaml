      def describe_pattern(pattern_key: str) -> None:
          p = CONTEXT_MANIPULATION_PATTERNS[pattern_key]
          print(f"Pattern: {p['name']} (Section {p['section']})")
          print(f"Turns:   {p['turn_count']}")
          print(f"Signal:  {p['detection_signal']}")
          print(f"Per-turn visibility: {p['per_turn_visibility']}")
          print()


