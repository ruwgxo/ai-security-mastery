                  'to assemble a payload below per-turn detection threshold'
              ),
          },
          'adversary_goal': {
              'context_manipulation': 'Lower refusal probability for a capability request',
              'multiturn_injection': 'Override model instructions to redirect behaviour',
          },
          'primary_detection_signal': {
              'context_manipulation': (
                  'Trajectory anomaly: escalation pattern, agreement accumulation, '
                  'norm establishment, creative investment'
              ),
              'multiturn_injection': (
                  'Content anomaly: instruction-format patterns, privilege-escalation '
                  'syntax, system-prompt references accumulating across turns'
              ),
          },
          'per_turn_visibility': {
              'context_manipulation': 'Low -- each turn individually benign',
              'multiturn_injection': (
                  'Partial -- injection fragments may be detectable individually '
                  'at reduced confidence'
              ),
          },
          'session_state_required': {
              'context_manipulation': (
                  'Topic trajectory, compliance history, agreement register, '
                  'authority claims, creative investment depth'
              ),
              'multiturn_injection': (
                  'Instruction-fragment accumulation, privilege claim history, '
                  'context assembly reconstruction'
              ),
          },
          'detector': {
              'context_manipulation': 'Ch7 S7.14 trajectory scorer (five-dimension schema)',
              'multiturn_injection': 'Ch6 S6.11 stateful injection detector',
          },
          'composed_attack_pattern': {
              'context_manipulation': (
                  'Often precedes injection: manipulation lowers alignment threshold, '
                  'then injection redirects instructions'
              ),
              'multiturn_injection': (
                  'May follow jailbreak: jailbreak removes alignment filter, '
                  'then injection is more reliable'
              ),
          },
      }


      def print_comparison() -> None:
          print('Context Manipulation vs Multi-Turn Injection: Comparison Matrix\n')
          print(f'{"Dimension":<30} {"Context Manipulation":<45} {"Multi-Turn Injection"}')
          print('-' * 120)
          for dim, values in COMPARISON_MATRIX.items():
              cm = values['context_manipulation'][:42] + '...' \
                  if len(values['context_manipulation']) > 42 \
                  else values['context_manipulation']
              mi = values['multiturn_injection'][:42] + '...' \
                  if len(values['multiturn_injection']) > 42 \
                  else values['multiturn_injection']
              print(f'{dim:<30} {cm:<45} {mi}')

          print()
          print('COMPOSED ATTACK PATTERN:')
          print('  Context manipulation (turns 1-N) → Injection (turn N+1)')
          print('  Both detectors must run in parallel.')
          print('  Composed signal: context_manipulation_score > 0.5 in same session')
          print('  as injection_score > 0.7 at any turn.')


      if __name__ == '__main__':
          print_comparison()

