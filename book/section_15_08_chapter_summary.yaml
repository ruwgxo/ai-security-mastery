deliverables:
- id: 1
  name: production_detector_suite_architecture.py
  description: |-
    The whole chapter in one structure: the five detectors with their hybrid layers, surfaces, restraint mechanisms, and beyond-the-request signals; the pipeline; and the Chapter 14 gateway they populate. Renders the PRE and POST hook placement directly, showing which detectors run where.
  implementation_notes: |-
    Python 3.12, single quotes throughout per book convention, standard-library dataclasses and typing only. The render function derives the hook diagram from the detector surface declarations, so the diagram cannot drift from the data.
  code: |
    # production_detector_suite_architecture.py
    # Section 15.08: The Production Detector Suite Architecture
    # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
    # Single quotes throughout per book convention
    #
    # The whole of Chapter 15 in one structure: five detectors, the pipeline that
    # orchestrates them, and the Chapter 14 gateway they populate. This is the map
    # from Section 15.01 with every entry now built.

    from dataclasses import dataclass, field
    from typing import List, Tuple


    @dataclass
    class DetectorNode:
        name: str
        section: str
        layer_a: str                # the precision layer (patterns/regex/hosted/rules)
        layer_b: str                # the coverage layer (ML/NER/custom/aggregate)
        surfaces: Tuple[str, ...]
        restraint: str              # the mechanism that keeps false positives down
        beyond_request: str         # the signal beyond the current request, if any


    SUITE: List[DetectorNode] = [
        DetectorNode('prompt_injection', '15.02',
                     'Tiered regex signatures', 'Chapter 12 injection classifier',
                     ('input',), 'Precision tiers: medium patterns need ML corroboration',
                     'None -- per request, plus retrieved content'),
        DetectorNode('jailbreak', '15.03',
                     'Tiered template signatures', 'Chapter 12 jailbreak classifier',
                     ('input',), 'Precision tiers: roleplay framings need corroboration',
                     'Chapter 13.09 session threat score (multi-turn)'),
        DetectorNode('pii_scanner', '15.04',
                     'Structured regex + Luhn', 'NER for unstructured entities',
                     ('input', 'output'), 'Severity tiers: lone low-severity entity never escalates',
                     'None -- per request'),
        DetectorNode('toxicity', '15.05',
                     'Hosted moderation baseline', 'Custom domain models',
                     ('input', 'output'), 'Context factor: can only de-escalate, never inflate',
                     'None -- per request'),
        DetectorNode('data_exfiltration', '15.06',
                     'Tiered sensitive-content rules + canaries', 'Chapter 13.07 rate and coverage',
                     ('output',), 'Precision tiers: config references need corroboration',
                     'Chapter 13.07 campaign signal (multi-request)'),
    ]


    @dataclass
    class Layer:
        name: str
        built_in: str
        role: str


    STACK: List[Layer] = [
        Layer('Chapter 14 gateway', 'Section 14.11',
              'PRE and POST hooks, latency budget, failure policy, breaker, sampling, observability'),
        Layer('Combined pipeline', 'Section 15.07',
              'Registers as one gateway detector per hook; schedules, isolates, and combines'),
        Layer('The five detectors', 'Sections 15.02-15.06',
              'Each implements detect(ctx) -> DetectorResult and nothing else is required'),
        Layer('Unified API contract', 'Section 15.01',
              'The one contract that makes the layer above able to ignore the layer below'),
    ]


    def render() -> str:
        lines: List[str] = []
        lines.append('PRODUCTION DETECTOR SUITE (Chapter 15)')
        lines.append('=' * 62)
        lines.append('')
        lines.append('  Chapter 14 Production Gateway (14.11) -- deployed in Part 3')
        lines.append('  |')
        lines.append('  +-- PRE hook  [surface=input]  --> Combined Pipeline (15.07)')
        lines.append('  |                                    |')
        for d in SUITE:
            if 'input' in d.surfaces:
                lines.append(f'  |                                    +-- {d.name} ({d.section})')
        lines.append('  |')
        lines.append('  +-- POST hook [surface=output] --> Combined Pipeline (15.07)')
        lines.append('                                       |')
        for d in SUITE:
            if 'output' in d.surfaces:
                lines.append(f'                                       +-- {d.name} ({d.section})')
        lines.append('')
        lines.append('  Every detector implements: detect(ctx) -> DetectorResult   (15.01)')
        lines.append('  Every detector held to:    95%+ accuracy, <50ms, <5% FP    (15.01)')
        return '\n'.join(lines)


    if __name__ == '__main__':
        print(render())
        print()
        print('THE STACK')
        print('-' * 62)
        for layer in STACK:
            print(f'{layer.name} [{layer.built_in}]')
            print(f'    {layer.role}')
        print()
        print('DETECTOR HYBRIDS')
        print('-' * 62)
        for d in SUITE:
            print(f'{d.name} ({d.section})  surfaces={"/".join(d.surfaces)}')
            print(f'    precision layer : {d.layer_a}')
            print(f'    coverage layer  : {d.layer_b}')
            print(f'    restraint       : {d.restraint}')
            print(f'    beyond request  : {d.beyond_request}')
- id: 2
  name: detector_suite_reference_card.py
  description: |-
    Each detector with the threat it answers, the earlier-chapter concept it makes concrete, its hybrid approach, its deliverable, and its measured metrics -- with an explicit caveat that the figures come from sample corpora with stub models and are a demonstration of the gate rather than a production claim.
  implementation_notes: |-
    Python 3.12, single quotes throughout per book convention, standard-library dataclasses and typing only. The measurement caveat is carried in the module and printed with the card, so the numbers are never separated from their qualification.
  code: |
    # detector_suite_reference_card.py
    # Section 15.08: Detector Suite Reference Card
    # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
    # Single quotes throughout per book convention
    #
    # Each detector with its hybrid approach, the threat it answers, the chapter
    # concept it made concrete, and its quality metrics. The one-page lookup for
    # the whole suite.

    from dataclasses import dataclass
    from typing import List


    @dataclass
    class CardEntry:
        detector: str
        section: str
        threat: str
        made_concrete: str          # the earlier-chapter concept this realises
        hybrid: str
        deliverable: str
        accuracy: str
        fp_rate: str
        latency: str


    CARD: List[CardEntry] = [
        CardEntry('Prompt Injection', '15.02',
                  'Instruction override, direct and indirect',
                  'Chapter 12 injection classifier',
                  'Tiered regex + DistilBERT classifier',
                  'prompt_injection_detector.py',
                  '100%', '0%', 'sub-ms'),
        CardEntry('Jailbreak', '15.03',
                  'Restriction removal, single- and multi-turn',
                  'Chapter 12 jailbreak classifier + Chapter 13.09 session signal',
                  'Tiered templates + classifier + session score',
                  'jailbreak_detector.py',
                  '100%', '0%', 'sub-ms'),
        CardEntry('PII Scanner', '15.04',
                  'Personal data on input and output (OWASP LLM06)',
                  'Chapter 12.09 output PII scanner, extended two-sided',
                  'Structured regex + Luhn, NER for unstructured',
                  'pii_scanner.py',
                  '100%', '0%', 'sub-ms'),
        CardEntry('Toxicity', '15.05',
                  'Abusive content in and out',
                  'Hosted moderation baseline, first bought capability',
                  'Hosted service + custom domain models + context factor',
                  'toxicity_detector.py',
                  '100%', '0%', 'sub-ms'),
        CardEntry('Data Exfiltration', '15.06',
                  'Sensitive content leaving; extraction campaigns',
                  'Chapter 13.06 canaries + Chapter 13.07 rate and coverage',
                  'Tiered rules + canaries + aggregate campaign signal',
                  'exfiltration_detector.py',
                  '100%', '0%', 'sub-ms'),
        CardEntry('Combined Pipeline', '15.07',
                  'One decision from five detectors',
                  'The Section 15.01 unified API as orchestration contract',
                  'Parallel + sequential scheduling, most-severe combination',
                  'combined_detection_pipeline.py',
                  '100%', '0%', 'a few ms'),
    ]


    # The measured figures above are from each section's own harness on its sample
    # corpus, with stub models standing in for the real classifiers. They demonstrate
    # the harness and the gate, not a claim about production performance: a real
    # corpus is larger, messier, and adversarial, and the real models carry real
    # latency. The bar is the target -- 95%+ accuracy, sub-50ms, sub-5% FP -- and
    # every detector must be re-validated against a production corpus before it ships.
    MEASUREMENT_CAVEAT = (
        'Figures are from each section sample corpus with stub models. They prove the '
        'harness and the gate work, not production performance. Re-validate every '
        'detector against a real labelled corpus with the real models before shipping.')


    def render() -> str:
        lines: List[str] = []
        lines.append('DETECTOR SUITE REFERENCE CARD')
        lines.append('=' * 74)
        for e in CARD:
            lines.append('')
            lines.append(f'{e.detector}  [{e.section}]')
            lines.append(f'  threat        : {e.threat}')
            lines.append(f'  makes concrete: {e.made_concrete}')
            lines.append(f'  hybrid        : {e.hybrid}')
            lines.append(f'  deliverable   : {e.deliverable}')
            lines.append(f'  metrics       : acc={e.accuracy} fp={e.fp_rate} latency={e.latency}')
        lines.append('')
        lines.append('-' * 74)
        lines.append('NOTE: ' + MEASUREMENT_CAVEAT)
        return '\n'.join(lines)


    if __name__ == '__main__':
        print(render())
- id: 3
  name: production_detector_checklist.py
  description: |-
    Twenty requirements across six groups -- contract, layering, dependencies, configuration, validation, integration -- for a production-grade detector, each traced to the section where skipping it produced a real failure. Run against any new detector before it joins the suite.
  implementation_notes: |-
    Python 3.12, single quotes throughout per book convention, standard-library dataclasses and typing only. evaluate() scores a detector against the checklist and returns what is missing, so the checklist is executable rather than decorative.
  code: |
    # production_detector_checklist.py
    # Section 15.08: Production Detector Checklist
    # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
    # Single quotes throughout per book convention
    #
    # The requirements for a production-grade detector, drawn from the five built in
    # this chapter. Run against any new detector before it joins the suite. Every
    # item traces to a section where skipping it produced a real failure.

    from dataclasses import dataclass
    from typing import Dict, List, Optional


    @dataclass
    class CheckItem:
        id: str
        group: str
        requirement: str
        source: str
        why: str


    CHECKLIST: List[CheckItem] = [
        # --- contract ---
        CheckItem('C1', 'Contract', 'Implements detect(ctx) -> DetectorResult and nothing more',
                  '15.01',
                  'The shared contract is what lets the pipeline orchestrate without coupling.'),
        CheckItem('C2', 'Contract', 'Sets latency_ms on every result, including early returns',
                  '15.01', 'Unmeasured latency cannot be held to the budget.'),
        CheckItem('C3', 'Contract', 'Returns confidence that means something, and 0.0 when it has no signal',
                  '15.07', 'The pipeline uses confidence 0 to tell no signal from a clean signal.'),
        CheckItem('C4', 'Contract', 'Populates evidence explaining what fired',
                  '15.01', 'A verdict without evidence cannot be triaged in Chapter 16.'),
        # --- layering ---
        CheckItem('L1', 'Layering', 'Has a precision layer and a coverage layer, not one alone',
                  '15.02', 'Patterns alone miss paraphrase; ML alone is slow and noisy on the known.'),
        CheckItem('L2', 'Layering', 'Tiers its precision: only unambiguous signals act alone',
                  '15.02, 15.03',
                  'Medium-precision signals that block alone destroy the false-positive rate.'),
        CheckItem('L3', 'Layering', 'Considers whether the attack has a beyond-the-request shape',
                  '15.03, 15.06',
                  'Multi-turn jailbreaks and exfiltration campaigns are invisible per request.'),
        # --- dependencies ---
        CheckItem('D1', 'Dependencies', 'Models and services sit behind an interface, not called directly',
                  '15.02-15.06', 'Otherwise the detector cannot be tested and the model cannot be swapped.'),
        CheckItem('D2', 'Dependencies', 'Model and rule-set versions are pinned in configuration',
                  '15.02', 'A verdict must be reproducible and auditable.'),
        CheckItem('D3', 'Dependencies', 'Network dependencies have an explicit failure policy',
                  '15.05', 'A hosted service will fail; what happens then must be a decision.'),
        # --- configuration ---
        CheckItem('F1', 'Configuration', 'Thresholds and policy are data, not hardcoded',
                  '15.04, 15.05', 'Policy is deployment-specific; one hardcoded line fits nobody.'),
        CheckItem('F2', 'Configuration', 'Configuration self-validates and rejects incoherent settings',
                  '15.07', 'A misordered threshold is a silent hole, not a visible error.'),
        CheckItem('F3', 'Configuration', 'Known blind spots are documented, not hidden',
                  '15.06', 'The stateless profile cannot see campaigns; that is stated, not implied.'),
        # --- validation ---
        CheckItem('V1', 'Validation', 'Validated against a labelled corpus, not spot checks',
                  '15.02', 'Anecdotes do not measure accuracy.'),
        CheckItem('V2', 'Validation', 'Negatives are a false-positive stress set, not easy clean text',
                  '15.02-15.06',
                  'A corpus of obvious cases proves nothing; the hard negatives are the test.'),
        CheckItem('V3', 'Validation', 'Every signal path has at least one case that exercises it',
                  '15.03, 15.06',
                  'A broken session or campaign integration ships behind a passing single-turn score.'),
        CheckItem('V4', 'Validation', 'Meets all three bar targets together, not two of three',
                  '15.01', 'Accurate but slow gets moved off the path; accurate but noisy gets disabled.'),
        # --- integration ---
        CheckItem('I1', 'Integration', 'Declares the surfaces it scans',
                  '15.07', 'Running a detector where it cannot fire wastes the shared budget.'),
        CheckItem('I2', 'Integration', 'Failure is isolated: a raise must not take the pipeline down',
                  '15.07', 'One bad detector should not end the whole detection capability.'),
        CheckItem('I3', 'Integration', 'Re-validated as part of the assembled pipeline',
                  '15.07', 'Five individual passes do not compose into a suite pass.'),
    ]


    def by_group() -> Dict[str, List[CheckItem]]:
        out: Dict[str, List[CheckItem]] = {}
        for item in CHECKLIST:
            out.setdefault(item.group, []).append(item)
        return out


    def evaluate(passed_ids: Optional[set] = None) -> tuple:
        '''Score a detector against the checklist. Returns (ready, missing).'''
        passed = passed_ids or set()
        missing = [i for i in CHECKLIST if i.id not in passed]
        return (not missing, missing)


    if __name__ == '__main__':
        print('PRODUCTION DETECTOR CHECKLIST')
        print('=' * 70)
        for group, items in by_group().items():
            print(f'\n{group.upper()}')
            for i in items:
                print(f'  [{i.id}] {i.requirement}')
                print(f'        ({i.source}) {i.why}')
        print(f'\n{len(CHECKLIST)} items across {len(by_group())} groups')

        # A detector that has done the easy half.
        partial = {'C1', 'C2', 'L1', 'D1', 'V1'}
        ready, missing = evaluate(partial)
        print(f'\nexample: a detector passing {len(partial)} items -> ready={ready}')
        print(f'  missing {len(missing)}, first three:')
        for i in missing[:3]:
            print(f'    [{i.id}] {i.requirement}')
