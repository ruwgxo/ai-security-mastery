  name: chapter_15_knowledge_assessment.py
  description: |-
    Twenty questions spanning Sections 15.01 through 15.07, weighted toward the design decisions rather than the trivia -- why a layer exists, why a signal is tiered, why the combination rule is what it is -- with an explanation for every answer.
  implementation_notes: |-
    Python 3.12, single quotes throughout per book convention, standard-library dataclasses and typing only. render() supports a study mode with answers hidden and a review mode with explanations; score() checks a response list against the key and the module self-checks the key on run.
  code: |
    # chapter_15_knowledge_assessment.py
    # Section 15.08: Chapter 15 Knowledge Assessment
    # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
    # Single quotes throughout per book convention
    #
    # Twenty questions across the chapter. The questions favour the design decisions
    # over the trivia: why a layer exists, why a signal is tiered, why a combination
    # rule is what it is. Those are the transferable parts.

    from dataclasses import dataclass
    from typing import List


    @dataclass
    class Question:
        number: int
        section: str
        prompt: str
        options: List[str]
        answer: int             # index into options
        explanation: str


    QUIZ: List[Question] = [
        Question(1, '15.01',
                 'Chapter 14 ended with a deployed gateway. What did Section 15.01 say it lacked?',
                 ['Latency budget', 'Any detectors in its hooks', 'Observability', 'A failure policy'],
                 1,
                 'The gateway was complete as infrastructure and empty as a detection capability: '
                 'hooks wired to nothing. Part 4 populates it.'),
        Question(2, '15.01',
                 'Why does the quality bar hold all three targets together rather than trading them off?',
                 ['Convention', 'Accurate but slow is moved off the hot path; accurate but noisy is disabled',
                  'They are mathematically equivalent', 'Regulators require it'],
                 1,
                 'Missing any one target makes a detector unshippable for a different reason. Two of '
                 'three is not production-grade.'),
        Question(3, '15.01',
                 'What does the unified API contract buy?',
                 ['Faster inference', 'The pipeline can orchestrate detectors without knowing their internals',
                  'Better accuracy', 'Smaller models'],
                 1,
                 'One contract, detect(ctx) -> DetectorResult, is what turns a pile of detectors into '
                 'an orchestrable suite.'),
        Question(4, '15.02',
                 'Why is a pattern-only injection detector inadequate?',
                 ['Too slow', 'Blind to any paraphrase of a known attack',
                  'Cannot run inline', 'Too expensive'],
                 1,
                 'Patterns catch only what they have a pattern for. The first attacker to rephrase '
                 'walks past. That gap is the ML layer job.'),
        Question(5, '15.02',
                 'Why is the role_reassignment pattern (act as a ...) tiered medium rather than high?',
                 ['It is slow to match', 'Benign requests use identical phrasing (act as a tour guide)',
                  'It is a new pattern', 'The regex is imprecise'],
                 1,
                 'The phrasing is shared with legitimate use, so a lone hit must not act. It needs ML '
                 'corroboration to escalate.'),
        Question(6, '15.02',
                 'How does the injection detector catch indirect injection?',
                 ['By blocking all retrieval', 'By scanning retrieved content alongside the user input',
                  'By rate limiting', 'It cannot'],
                 1,
                 'In indirect injection the user request is benign and the attack lives in a retrieved '
                 'document, so the detector must inspect retrieved items too.'),
        Question(7, '15.03',
                 'Why is the multi-turn jailbreak invisible to per-turn detection?',
                 ['Turns are encrypted', 'Every individual turn is benign; the escalation across turns is the attack',
                  'It is too fast', 'Classifiers are too small'],
                 1,
                 'There is nothing in any single turn to catch. Per-turn detection is blind by '
                 'construction, not by weakness.'),
        Question(8, '15.03',
                 'What lets the jailbreak detector catch the multi-turn attack?',
                 ['A bigger classifier', 'The Chapter 13.09 accumulated session threat score',
                  'More patterns', 'Blocking all role-play'],
                 1,
                 'The session signal scores the trajectory, letting the detector block a benign-looking '
                 'turn for the conversation it sits in.'),
        Question(9, '15.03',
                 'A medium-tier role-play framing appears. What makes it count?',
                 ['Nothing, it always blocks', 'Corroboration from either the classifier or the session signal',
                  'A second pattern hit', 'Manual review'],
                 1,
                 'Roleplay for a bedtime story stays allowed; roleplay as the next step of a crescendo '
                 'is corroborated by the session signal.'),
        Question(10, '15.04',
                 'How does the PII scanner hybrid split differ from the injection detector hybrid?',
                 ['It does not', 'By data shape (structured vs unstructured), not by novelty (known vs novel)',
                  'It uses three layers', 'It has no ML'],
                 1,
                 'Regex handles fixed-format PII; NER handles the open set of names and places. The seam '
                 'is the shape of the data.'),
        Question(11, '15.04',
                 'Why does the credit-card pattern need a Luhn checksum?',
                 ['To decrypt the number', 'Format alone over-matches order references and tracking codes',
                  'For compliance', 'To speed up matching'],
                 1,
                 'The checksum confirms substance where the pattern only caught shape, removing the '
                 'largest structured-PII false-positive source.'),
        Question(12, '15.04',
                 'Why does a single recognised name never escalate a verdict?',
                 ['NER is disabled', 'Names saturate ordinary text; one name is not actionable PII',
                  'Names are encrypted', 'It always does escalate'],
                 1,
                 'Flagging every John or Singapore would fire on a large fraction of normal traffic and '
                 'get the detector disabled. Low severity escalates only in aggregate.'),
        Question(13, '15.05',
                 'Why does the toxicity detector use a hosted service rather than an in-house model?',
                 ['It is cheaper to code', 'Broad toxicity classification is commoditised and vendor-maintained',
                  'It is more accurate at everything', 'To avoid GPUs'],
                 1,
                 'It is a build-versus-buy decision, and buy is right for the broad categories. In-house '
                 'effort goes where the hosted service is blind.'),
        Question(14, '15.05',
                 'What are the hosted service two systematic blind spots?',
                 ['Speed and cost', 'Domain-specific abuse and context',
                  'Encryption and privacy', 'Languages and length'],
                 1,
                 'A general service does not know one platform own abuse, and it classifies text in '
                 'isolation without knowing the context it sits in.'),
        Question(15, '15.05',
                 'Why can the context factor only reduce the score, never raise it?',
                 ['Floating-point limits', 'Escalation comes from toxicity signals; de-escalation from benign context',
                  'It is a bug', 'To save latency'],
                 1,
                 'The asymmetry is deliberate: context explains away surface toxicity (a quoted slur in '
                 'research), it never manufactures toxicity that the signals did not find.'),
        Question(16, '15.06',
                 'Why is a canary hit different from every other signal in the suite?',
                 ['It is faster', 'It is proof rather than probability -- there is no benign path',
                  'It uses less memory', 'It runs on input'],
                 1,
                 'A canary is unique and meaningless, so its appearance in a response proves the '
                 'protected context was extracted. It short-circuits the combination.'),
        Question(17, '15.06',
                 'An exfiltration campaign sends 4,000 benign requests. What catches it?',
                 ['The sensitive-content rules', 'The Chapter 13.07 rate and coverage signals',
                  'The canary', 'Nothing can'],
                 1,
                 'Every response is benign, so per-response analysis sees nothing. The aggregate signal '
                 'must be able to block a response containing nothing wrong.'),
        Question(18, '15.07',
                 'Why is the pipeline verdict the most severe rather than a vote or average?',
                 ['Simplicity', 'The detectors answer different questions; a clean scan is not evidence against another finding',
                  'It is faster', 'To reduce false positives'],
                 1,
                 'Averaging would let four detectors that correctly found nothing outvote the one that '
                 'correctly found an attack.'),
        Question(19, '15.07',
                 'Why does the pipeline propagate the deciding detector confidence rather than an aggregate?',
                 ['Aggregates are slow', 'So downstream can tell a canary block (0.99) from a rate block (0.92)',
                  'It is arbitrary', 'To satisfy the contract'],
                 1,
                 'The confidences are not interchangeable. Blending them into an average destroys the '
                 'information Chapter 16 triage needs.'),
        Question(20, '15.07',
                 'Five detectors each pass the quality bar individually. What does that NOT prove?',
                 ['That they work', 'That the assembled pipeline meets the bar',
                  'That they are accurate', 'That they are fast'],
                 1,
                 'The pipeline can blow a budget no single detector blew, and the suite false-positive '
                 'rate is the union of five, necessarily worse than any one.'),
    ]


    def render(show_answers: bool = False) -> str:
        lines: List[str] = []
        lines.append('CHAPTER 15 KNOWLEDGE ASSESSMENT')
        lines.append('=' * 70)
        for q in QUIZ:
            lines.append('')
            lines.append(f'{q.number}. [{q.section}] {q.prompt}')
            for i, opt in enumerate(q.options):
                lines.append(f'    {chr(97 + i)}) {opt}')
            if show_answers:
                lines.append(f'    ANSWER: {chr(97 + q.answer)}) {q.options[q.answer]}')
                lines.append(f'    {q.explanation}')
        return '\n'.join(lines)


    def score(responses: List[int]) -> tuple:
        '''Score a list of answer indices against the key.'''
        correct = sum(1 for q, r in zip(QUIZ, responses) if q.answer == r)
        wrong = [q.number for q, r in zip(QUIZ, responses) if q.answer != r]
        return correct, len(QUIZ), wrong


    if __name__ == '__main__':
        print(render(show_answers=True))
        by_section = {}
        for q in QUIZ:
            by_section[q.section] = by_section.get(q.section, 0) + 1
        print('\n' + '=' * 70)
        print(f'{len(QUIZ)} questions: ' + ', '.join(f'{s}={n}' for s, n in sorted(by_section.items())))
        perfect = [q.answer for q in QUIZ]
        c, t, wrong = score(perfect)
        print(f'self-check on the key: {c}/{t} correct, wrong={wrong}')
- id: 5
  name: production_detector_security_checklist.py
  description: |-
    Eighteen checks across five categories asking a different question from the detector checklist: can the detection capability itself be evaded, starved, quietly reconfigured, or turned off? Detection is security infrastructure, and security infrastructure is a target.
  implementation_notes: |-
    Python 3.12, single quotes throughout per book convention, standard-library dataclasses and typing only. Each check names the threat it answers and the section that established it, so a reader can trace any item back to the failure that motivated it.
  code: |
    # production_detector_security_checklist.py
    # Section 15.08: Production Detector Security Checklist
    # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
    # Single quotes throughout per book convention
    #
    # The detector checklist asks whether a detector is well built. This one asks a
    # different question: can the detection capability itself be attacked, evaded,
    # or quietly turned off? A detector suite is security infrastructure, and
    # security infrastructure is a target.

    from dataclasses import dataclass
    from typing import Dict, List


    @dataclass
    class SecurityCheck:
        id: str
        category: str
        check: str
        threat: str
        source: str


    SECURITY_CHECKLIST: List[SecurityCheck] = [
        # --- evasion ---
        SecurityCheck('E1', 'Evasion',
                      'Detection does not rest on patterns alone for any threat',
                      'An attacker paraphrases past a fixed pattern set', '15.02'),
        SecurityCheck('E2', 'Evasion',
                      'Multi-turn and multi-request shapes have a beyond-the-request signal',
                      'An attacker splits the attack so every unit looks benign', '15.03, 15.06'),
        SecurityCheck('E3', 'Evasion',
                      'Indirect vectors (retrieved content, tool results) are scanned',
                      'The attack arrives in content the user never typed', '15.02'),
        SecurityCheck('E4', 'Evasion',
                      'Canaries are rotated and versioned',
                      'A leaked canary degrades silently from proof to false positive', '15.06'),
        # --- availability ---
        SecurityCheck('A1', 'Availability',
                      'Every detector failure is isolated from the pipeline',
                      'One detector crash removes the whole detection capability', '15.07'),
        SecurityCheck('A2', 'Availability',
                      'A degraded verdict is marked degraded, never reported as clean',
                      'The system reports ALLOW for requests it never actually examined', '15.07'),
        SecurityCheck('A3', 'Availability',
                      'Network dependencies have an explicit, configured failure policy',
                      'A hosted outage silently disables a detection layer', '15.05'),
        SecurityCheck('A4', 'Availability',
                      'The pipeline gets cheaper under attack, not more expensive',
                      'Attack traffic exhausts the latency budget and forces detection off', '15.07'),
        # --- integrity of the control ---
        SecurityCheck('I1', 'Control integrity',
                      'Configuration changes are diffed and reported',
                      'A threshold quietly loosened is an undetected hole', '15.07'),
        SecurityCheck('I2', 'Control integrity',
                      'Configuration validation rejects incoherent settings before deploy',
                      'A misordered threshold ships as a silent no-op', '15.07'),
        SecurityCheck('I3', 'Control integrity',
                      'A suite with every detector disabled is rejected outright',
                      'The gateway returns to deployed-and-empty without anyone noticing', '15.07'),
        SecurityCheck('I4', 'Control integrity',
                      'Model and rule-set versions are pinned so a verdict is reproducible',
                      'A verdict cannot be explained or audited after the fact', '15.02'),
        # --- the false-positive attack surface ---
        SecurityCheck('F1', 'False-positive surface',
                      'The false-positive rate is measured on hard negatives, not easy ones',
                      'A detector that looks clean on easy text floods production and gets disabled',
                      '15.02-15.06'),
        SecurityCheck('F2', 'False-positive surface',
                      'No single low-precision signal can block on its own',
                      'An attacker triggers benign-looking false positives to force the detector off',
                      '15.04'),
        SecurityCheck('F3', 'False-positive surface',
                      'Deployment-specific policy is configurable, not hardcoded',
                      'One policy misfits most surfaces and gets locally disabled', '15.05'),
        # --- observability ---
        SecurityCheck('O1', 'Observability',
                      'Every verdict carries evidence naming what fired',
                      'A block cannot be triaged, explained, or appealed', '15.01'),
        SecurityCheck('O2', 'Observability',
                      'The deciding detector and its confidence survive to the consumer',
                      'Proof and statistics look identical in the queue; triage misprioritises',
                      '15.07'),
        SecurityCheck('O3', 'Observability',
                      'The full pipeline result is retained, not collapsed to a boolean',
                      'Downstream SIEM integration has nothing to work with', '15.07'),
    ]


    def by_category() -> Dict[str, List[SecurityCheck]]:
        out: Dict[str, List[SecurityCheck]] = {}
        for c in SECURITY_CHECKLIST:
            out.setdefault(c.category, []).append(c)
        return out


    if __name__ == '__main__':
        print('PRODUCTION DETECTOR SECURITY CHECKLIST')
        print('=' * 72)
        print('The other checklist asks: is this detector well built?')
        print('This one asks: can the detection capability itself be attacked or')
        print('quietly turned off? Detection is security infrastructure, and')
        print('security infrastructure is a target.')
        for cat, checks in by_category().items():
            print(f'\n{cat.upper()}')
            for c in checks:
                print(f'  [{c.id}] {c.check}')
                print(f'        threat: {c.threat}  ({c.source})')
        print(f'\n{len(SECURITY_CHECKLIST)} checks across {len(by_category())} categories')
- id: 6
  name: chapter_15_to_16_transition.py
  description: |-
    What Chapter 15 produced, what it deliberately left unresolved, and how Chapter 16 takes each one up -- the evidence nobody reads, the confidence no queue acts on, the degraded list nobody is told about -- plus the book arc and the closing argument that a detection nobody sees has changed nothing.
  implementation_notes: |-
    Python 3.12, single quotes throughout per book convention, standard-library dataclasses and typing only. Each handoff pairs what was built with what is missing and the Chapter 16 answer, making the transition an argument rather than a list.
  code: |
    # chapter_15_to_16_transition.py
    # Section 15.08: Chapter 15 to Chapter 16 Transition
    # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
    # Single quotes throughout per book convention
    #
    # What Chapter 15 produced, what it deliberately did not do, and why that is
    # exactly Chapter 16 subject. The suite detects. It does not yet participate in
    # security operations, and a detection nobody sees is not a detection.

    from dataclasses import dataclass
    from typing import List


    @dataclass
    class Handoff:
        produced: str               # what Chapter 15 built
        unresolved: str             # what it deliberately left
        chapter_16_answer: str      # how Chapter 16 takes it up


    HANDOFFS: List[Handoff] = [
        Handoff('A PipelineResult with per-detector verdicts, scores, and evidence',
                'Nothing consumes it beyond the gateway boolean',
                'SIEM integration ships the full result to the platform analysts work from'),
        Handoff('Confidence that distinguishes proof (canary 0.99) from statistics (rate 0.92)',
                'No triage queue exists to act on the difference',
                'Alert prioritisation uses confidence to rank what a human sees first'),
        Handoff('Evidence naming exactly what fired in every detector',
                'Evidence goes nowhere; no analyst ever reads it',
                'Evidence becomes the alert body that makes a detection actionable'),
        Handoff('A degraded list marking partial verdicts',
                'No one is told the capability is degraded',
                'Detection health becomes a monitored, alertable signal in its own right'),
        Handoff('Detections about a single request',
                'No correlation across requests, users, or with non-AI telemetry',
                'The SIEM correlates AI detections with the rest of the security estate'),
    ]


    @dataclass
    class ArcStep:
        part: str
        chapters: str
        produced: str


    ARC: List[ArcStep] = [
        ArcStep('Part 1', 'Chapters 1-4', 'The ML foundations the attacks and defences rest on'),
        ArcStep('Part 2', 'Chapters 5-10', 'The threat landscape: what the attacks actually are'),
        ArcStep('Part 3', 'Chapters 11-14',
                'Detection designed, built with ML, extended behaviourally, and deployed as a gateway'),
        ArcStep('Part 4 (Ch 15)', 'Chapter 15',
                'The detectors that populate the gateway: five hybrids and the pipeline'),
        ArcStep('Part 4 (Ch 16+)', 'Chapters 16-18',
                'The suite joined to security operations, tuned, and seen through real cases'),
    ]


    CLOSING = (
        'Chapter 15 answered what runs in the gateway. It did not answer who finds out. '
        'A detection that fires into a log nobody reads has changed nothing about the '
        'security of the system -- the attack was still caught and still unanswered. The '
        'suite is complete as a detection capability and inert as a security capability, '
        'which is the same shape of gap Chapter 14 left (deployed but empty) and Section '
        '15.01 named. Chapter 16 closes it by connecting the suite to the SIEM: the '
        'detections become alerts, the alerts reach analysts, the evidence makes them '
        'actionable, and the confidence decides what gets looked at first.')


    if __name__ == '__main__':
        print('CHAPTER 15 -> CHAPTER 16 TRANSITION')
        print('=' * 72)
        print('\nWHAT CHAPTER 15 PRODUCED, AND WHAT IT LEFT')
        print('-' * 72)
        for h in HANDOFFS:
            print(f'\nproduced   : {h.produced}')
            print(f'unresolved : {h.unresolved}')
            print(f'chapter 16 : {h.chapter_16_answer}')
        print('\n\nTHE BOOK ARC')
        print('-' * 72)
        for step in ARC:
            print(f'{step.part:16} [{step.chapters:12}] {step.produced}')
        print('\n\nCLOSING')
        print('-' * 72)
        print(CLOSING)
common_mistakes:
- id: 1
  description: |-
    Leaving the chapter with five detector implementations but not the four recurring ideas
  why_it_happens: |-
    The implementations are concrete, runnable, and satisfying, while the ideas are abstract and appear in different costumes each time, which disguises the fact that they are the same ideas.
  consequence: |-
    The reader can rebuild these five detectors and cannot build a sixth. The implementations are the least transferable part of the chapter; the hybrid, the restraint mechanism, the beyond-the-request signal, and the shared contract are what generalise to detectors this book never wrote.
  correct_approach: |-
    Learn the four ideas and treat the five detectors as worked examples of them. Ask of any new detector: what are its two layers, what stops its weak signal acting alone, does its attack have a beyond-the-request shape, and does it implement the contract.
- id: 2
  description: |-
    Reading the chapter measured figures as production performance
  why_it_happens: |-
    Every section reported high accuracy and a zero false-positive rate, and the numbers are stated plainly next to real, running code, which makes them look like results rather than demonstrations.
  consequence: |-
    A detector is shipped on the strength of a number produced by a hand-built corpus of a dozen cases and a deterministic stub standing in for a real model, and its actual production behaviour is unknown in every dimension that matters.
  correct_approach: |-
    Read the figures as proof that the harness and the gate work, not as production claims. Re-validate every detector against a real labelled corpus with the real models and real latency before shipping. The chapter built the harness that will tell you when it passes.
- id: 3
  description: |-
    Treating the quality bar as a final check rather than a design constraint
  why_it_happens: |-
    The bar is stated as three numbers, and numbers look like something you measure at the end rather than something that shapes what you build.
  consequence: |-
    A detector is built for accuracy, measured at the end, and found to be slow or noisy -- at which point the fix is a redesign rather than a tune. Every restraint mechanism in this chapter exists because the bar was treated as a constraint from the start.
  correct_approach: |-
    Let the bar drive the design. The precision tiers, the severity tiers, and the context factor were not refinements; they are what the false-positive target forced. Build to the bar and the mechanisms follow.
- id: 4
  description: |-
    Assuming the suite is finished because every detector and the pipeline pass
  why_it_happens: |-
    The chapter closes with a populated gateway, a passing end-to-end test, and a complete architecture, which reads like a finished system.
  consequence: |-
    A detection capability that nobody is watching is deployed and considered done. Every attack it catches fires into a log no analyst reads, which leaves the security of the system exactly where it was.
  correct_approach: |-
    Recognise the shape of the remaining gap: the suite is complete as detection and inert as security. Chapter 16 integrates it with the SIEM so detections become alerts that reach people, which is what makes detection a security capability.
- id: 5
  description: |-
    Copying the tier thresholds and weights from this chapter into a different deployment
  why_it_happens: |-
    The numbers are concrete, they are validated, and they work on the corpora in the book, which makes them look like defaults rather than the fitted values they are.
  consequence: |-
    A gaming platform inherits thresholds tuned for a general assistant and floods with false positives; a childrens service inherits the same thresholds and lets content through. Every detector in this chapter externalised its policy as configuration precisely because one setting fits nobody.
  correct_approach: |-
    Take the mechanisms and fit the numbers to the deployment. The tiers, the corroboration floors, and the context factor are the design; their values are configuration, which is why the chapter shipped profiles rather than constants.
section_summary:
  compact: |-
    Chapter 15 populated the gateway Chapter 14 deployed empty. It built five hybrid detectors -- injection, jailbreak, PII, toxicity, and exfiltration -- each pairing a precision layer with a coverage layer, each implementing the unified contract of Section 15.01, each held to one quality bar of 95%+ accuracy, sub-50ms latency, and sub-5% false positives. Then Section 15.07 assembled them: parallel execution to fit five detectors into a budget sized for one, sequential gating that makes the pipeline cheaper under attack, fault isolation so one broken detector cannot end the capability, and a combination rule that takes the most severe verdict rather than a vote, because the detectors answer different questions and a clean scan is not evidence against another finding. Read section by section it is eight pieces of work; read whole it is four ideas -- the hybrid, the restraint mechanism that stops a weak signal acting alone, the beyond-the-request signal for attacks whose every unit is benign, and the shared contract that makes the rest composable. Those four transfer to detectors this book never wrote; the five implementations do not. The chapter measured figures demonstrate that the harness and the gate work, not production performance, and every detector needs re-validation against a real corpus with real models. The gateway is now populated and the suite meets the bar as an assembled system -- and it is still inert as a security capability, because nobody is watching it. That is Chapter 16.
  key_takeaways:
  - 'Chapter 15 populated the deployed-but-empty gateway: five hybrid detectors, one contract, one bar,
    and the pipeline that turns them into a single decision'
  - The four recurring ideas -- the hybrid, restraint, the beyond-the-request signal, the shared contract
    -- are the transferable part; the five implementations are not
  - Every detector has a restraint mechanism because some signal is always real at the surface and shared
    with legitimate use; restraint is what keeps a detector deployed
  - Two attacks are invisible per request by construction -- the multi-turn jailbreak and the exfiltration
    campaign -- and both need a signal that can act on a benign-looking request
  - The chapter figures prove the harness and the gate work, not production performance; re-validate against
    a real corpus with the real models before shipping
  - 'The quality bar is a design constraint, not a final check: every restraint mechanism in the chapter
    exists because the false-positive target forced it'
  - The suite is complete as a detection capability and inert as a security capability, because a detection
    nobody sees has changed nothing -- which is what Chapter 16 fixes
preview_chapter_16:
  title: 'Chapter 16: SIEM Integration'
  preview: |-
    Chapter 15 answered what runs in the gateway. Chapter 16 answers who finds out. The suite currently produces evidence no analyst reads, confidence no triage queue acts on, a degraded list nobody is told about, and a full PipelineResult that nothing consumes -- all of it deliberately retained in Section 15.07 precisely because this chapter needs it. Chapter 16 connects the suite to SIEM platforms: detections become alerts, alerts reach the people who work the security estate, evidence makes them actionable, and confidence decides what gets looked at first, so a canary-driven block at 0.99 and a rate-driven block at 0.92 are triaged as the different things they are. It also puts AI detections alongside the rest of the telemetry, so they correlate with the wider estate rather than living in an isolated log of their own. The gap is the same shape the book has closed twice already -- infrastructure without detection in Chapter 14, detection without operations here -- and closing it is what turns a detection capability into a security capability.
