# ============================================================================
# KEY TAKEAWAYS
# ============================================================================

key_takeaways:

  takeaway_01: |
    API gateway logs are the single highest-value detection data source for
    LLM-specific ATLAS techniques: one data source covers AML.T0025, AML.T0040,
    AML.T0056, AML.T0043, AML.T0010, AML.T0029, AML.T0037, AML.T0051, AML.T0054,
    and AML.T0042 — ten techniques from one stream. Instrument this first.

  takeaway_02: |
    AML.T0019 (supply chain) and AML.T0029 (DoS) both score 100 in the priority
    matrix (prevalence × detectability × impact). Both are low-difficulty, near-
    zero FP, and immediately implementable. Any detection programme that does not
    cover these two techniques has a critical gap regardless of everything else it covers.

  takeaway_03: |
    High-difficulty techniques (AML.T0015, AML.T0006, AML.T0046) are not undetectable
    — they require behavioural baselines and statistical monitoring rather than
    signature-based rules. The correct response to "high difficulty" is not to skip
    the technique but to sequence it after the statistical baseline infrastructure
    is in place (Chapter 13).

  takeaway_04: |
    Technique chaining is how real attacks work. The extraction campaign (T0001 →
    T0005 → T0040 → T0025 → T0042) is undetectable by a programme with only T0019
    and T0029 rules, even though those two techniques have perfect scores. Coverage
    must address complete chains, not individual techniques in isolation.

  takeaway_05: |
    Correlation rules — detecting technique A followed by technique B within a time
    window — dramatically increase detection fidelity for multi-step campaigns. A
    T0040 probe alert has a 10% false-positive rate alone; the same alert combined
    with a T0025 sustained query campaign on the same account has near-zero FP.

  takeaway_06: |
    AML.T0018 (backdoor) is invisible to standard accuracy benchmarks. A model
    achieving 99% on MMLU may carry a perfect trigger-activated backdoor. The only
    reliable detection mechanisms are: (a) a trigger-probe test suite run on every
    checkpoint, and (b) canary tokens injected into training data. Neither is
    available without proactive investment.

  takeaway_07: |
    The ATLAS coverage score (covered techniques / total techniques) is a defensible
    stakeholder metric. Starting from zero, implementing the top-6 priority techniques
    (T0019, T0029, T0056, T0035, T0053, T0020) with two to four days of engineering
    effort each yields approximately 20% coverage and blocks the most prevalent and
    immediately exploitable vectors.

  takeaway_08: |
    The Sigma stubs generated in this section are the seed set for Chapter 11.
    Every stub is tagged with atlas.aml.TXXXX and owasp.LLMXX references, enabling
    a detection programme that is simultaneously ATLAS-aligned and OWASP-aligned —
    two frameworks, one set of rules.

