              "repeated_entity_queries > 10 in 30min",
              "high",15,"atlas.aml.t0048","Public figure queries — semantic analysis needed"),
          AtlasTechniqueEntry("AML.T0049","Exploit ML Software Vulnerability","Execution",
              "CVE in ML framework used for code execution in pipeline",
              ["ML framework version in CVE-affected range"],
              "SCA scan log; process execution log",
              "ml_framework_version IN cve_affected_versions",
              "medium",30,"atlas.aml.t0049","Keep deps patched — SCA catches most before exploitation"),
          AtlasTechniqueEntry("AML.T0051","LLM Prompt Injection","Initial Access to ML",
              "Inject adversarial instructions into LLM context via user input",
              ["Injection classifier score > 0.7","System prompt fragment in output"],
              "API request log; output log",
              "injection_score > 0.7 ON user_input OR sysptompt_fragment_in_output",
              "medium",60,"atlas.aml.t0051","Semantic classifier reduces FP vs. keyword matching"),
          AtlasTechniqueEntry("AML.T0053","Confused Deputy Plugin Exploitation","Impact on ML",
              "Exploit agent plugin permissions via injected instructions",
              ["Plugin param fails allowlist","Irreversible action without confirmation record"],
              "Plugin call parameter log; action audit log",
              "plugin_param_fails_validation OR irreversible_action_sans_confirmation",
              "low",75,"atlas.aml.t0053","Zero FP with correct parameter allowlists"),
          AtlasTechniqueEntry("AML.T0054","Prompt Injection via External Data","Initial Access to ML",
              "Plant adversarial instruction in external content agent will read",
              ["Injection pattern in fetched content before context assembly"],
              "RAG retrieval log; tool output log; web fetch log",
              "injection_scanner > 0.6 ON fetched_content BEFORE context_assembly",
              "medium",65,"atlas.aml.t0054","Very low FP — injection patterns rare in legit documents"),
          AtlasTechniqueEntry("AML.T0056","LLM Meta Prompt Extraction","Exfiltration via ML",
              "Probe LLM to reveal system prompt via extraction instructions",
              ["Extraction phrases in input","System prompt fragment in output"],
              "API request log; output log",
              "input_matches_extraction_pattern OR sysptompt_fragment > 10_tokens",
              "low",75,"atlas.aml.t0056","Developer debugging — suppress for developer-tier accounts"),
          AtlasTechniqueEntry("AML.T0015","Evade ML Model","Impact on ML",
              "Crafted input bypasses model's intended classification",
              ["Input distribution KL divergence","Adversarial detector flag","Ensemble disagreement"],
              "Inference log; adversarial detector; ensemble agreement log",
              "KL_div > threshold OR adversarial_score > 0.7 OR ensemble_agreement < 0.6",
              "high",36,"atlas.aml.t0015","Legit boundary inputs — requires trained adversarial detector"),
      ]


      def query_by_tactic(tactic_kw: str) -> List[AtlasTechniqueEntry]:
          return [t for t in REGISTRY if tactic_kw.lower() in t.tactic.lower()]


      def query_by_difficulty(diff: str) -> List[AtlasTechniqueEntry]:
          return [t for t in REGISTRY if t.difficulty == diff]


      def top_priority(n: int = 10) -> List[AtlasTechniqueEntry]:
          return sorted(REGISTRY, key=lambda t: t.priority_score, reverse=True)[:n]


      def data_source_inventory() -> Dict[str, List[str]]:
          inv: Dict[str, List[str]] = {}
          for t in REGISTRY:
              for src in t.data_source.split(";"):
                  src = src.strip()
                  if src and "N/A" not in src:
                      inv.setdefault(src, []).append(t.id)
          return dict(sorted(inv.items(), key=lambda x: len(x[1]), reverse=True))


      def coverage_score(covered_ids: List[str]) -> Dict:
          for t in REGISTRY:
              t.covered = t.id in covered_ids
          covered = [t for t in REGISTRY if t.covered]
          uncov_hi = [t.id for t in REGISTRY if not t.covered and t.priority_score >= 50]
          return {
              "total": len(REGISTRY),
              "covered": len(covered),
              "pct": round(len(covered) / len(REGISTRY) * 100, 1),
              "uncovered_high_priority": uncov_hi,
          }


      def export_json(path: str = "atlas_techniques.json") -> None:
          data = [
              {"id": t.id, "name": t.name, "tactic": t.tactic,
               "attack_pattern": t.attack_pattern, "observables": t.observables,
               "data_source": t.data_source, "detection_logic": t.detection_logic,
               "difficulty": t.difficulty, "priority_score": t.priority_score,
               "sigma_tag": t.sigma_tag, "fp_notes": t.fp_notes}
              for t in REGISTRY
          ]
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
          print(f"Registry ({len(REGISTRY)} techniques) exported to {path}")


      if __name__ == "__main__":
          print(f"ATLAS Technique Registry: {len(REGISTRY)} techniques\n")
          print("TOP 10 PRIORITY TECHNIQUES:")
          for t in top_priority(10):
              print(f"  [{t.priority_score:3d}] {t.id:12s} {t.name[:45]} [{t.difficulty}]")
          print("\nDATA SOURCE INVENTORY (top 5):")
          for src, ids in list(data_source_inventory().items())[:5]:
              print(f"  {src[:55]}: {ids}")
          # Simulate a basic detection programme
          covered_ids = ["AML.T0019","AML.T0029","AML.T0056","AML.T0035",
                          "AML.T0011","AML.T0025","AML.T0053","AML.T0020"]
          sc = coverage_score(covered_ids)
          print(f"\nCOVERAGE: {sc['covered']}/{sc['total']} ({sc['pct']}%)")
          print(f"Uncovered high-priority: {sc['uncovered_high_priority']}")
          export_json()

  implementation_02:
    title: "Attack Chain Simulator (3 Chains)"
    filename: "atlas_attack_chain_simulator.py"
    purpose: |
      Simulates three ATLAS technique chains (extraction, poisoning+backdoor,
      agentic injection). For each chain: generates observable signals, evaluates
      which steps would be detected by a given detection programme, produces a
      per-chain coverage report with gap list and overall detection rate.
    language: "python"
    code: |
      """
      ATLAS Attack Chain Simulator
      Three chains: extraction, poisoning+backdoor, agentic injection.
      Evaluates detection coverage per chain and across all chains.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict, Optional


      @dataclass
      class ChainStep:
          num: int
          technique_id: str
          technique_name: str
          tactic: str
          observable: str
          data_source: str
          detected: bool = False
          note: str = ""


      @dataclass
      class ChainResult:
          name: str
          objective: str
          steps: List[ChainStep]
          detected: int
          total: int
          first_alert: Optional[int]
          gaps: List[str]
          recommendation: str


      def _run(steps: List[ChainStep],
               rules: Dict[str, bool]) -> List[ChainStep]:
          for s in steps:
              s.detected = rules.get(s.technique_id, False)
              s.note = (f"Alert on {s.data_source}" if s.detected
                        else f"MISSED — no rule for {s.technique_id}")
          return steps


      def chain_extraction(rules: Dict[str, bool]) -> ChainResult:
          steps = _run([
              ChainStep(1,"AML.T0001","Search Victim Websites","ML Reconnaissance",
                        "Systematic API-docs crawl","Web server access log"),
              ChainStep(2,"AML.T0005","Establish Accounts","ML Resource Development",
                        "5 accounts from same /24 in 4h","Account creation log"),
              ChainStep(3,"AML.T0040","ML Model API Access","ML Reconnaissance",
                        "High-diversity one-shot queries; logprob enabled","API gateway log"),
              ChainStep(4,"AML.T0025","Exfiltrate via Inference API","Exfiltration via ML",
                        "30k diverse queries over 3 days across 5 accounts","API gateway + billing"),
              ChainStep(5,"AML.T0042","Verify Attack","ML Attack Staging",
                        "Diversity drops sharply; near-identical burst","API request log"),
          ], rules)
          det = sum(1 for s in steps if s.detected)
          first = next((s.num for s in steps if s.detected), None)
          gaps = [s.technique_id for s in steps if not s.detected]
          rec = f"Add rules for: {', '.join(gaps)}" if gaps else "Full coverage."
          return ChainResult("Model Extraction Campaign",
                             "Functional copy of proprietary LLM",
                             steps, det, len(steps), first, gaps, rec)


      def chain_poisoning(rules: Dict[str, bool]) -> ChainResult:
          steps = _run([
              ChainStep(1,"AML.T0000","Search Public Research","ML Reconnaissance",
                        "OSINT — no victim contact","None"),
              ChainStep(2,"AML.T0003","Acquire Training Data","ML Resource Development",
                        "Scraped victim public data feed","API access log"),
              ChainStep(3,"AML.T0043","Craft Adversarial Data","ML Attack Staging",
                        "Backdoor trigger preparation — off-network","None"),
              ChainStep(4,"AML.T0020","Poison Training Data","Persistence in ML",
                        "Unauthorised write to s3://training-data","IAM/filesystem log"),
              ChainStep(5,"AML.T0018","Backdoor ML Model","Persistence in ML",
                        "Regression test failure on trigger probe after retrain",
                        "Behavioural regression log"),
          ], rules)
          det = sum(1 for s in steps if s.detected)
          first = next((s.num for s in steps if s.detected), None)
          gaps = [s.technique_id for s in steps if not s.detected]
          rec = f"Add rules for: {', '.join(gaps)}" if gaps else "Full coverage."
          return ChainResult("Training Data Poisoning to Backdoor",
                             "Persistent model manipulation surviving retraining",
                             steps, det, len(steps), first, gaps, rec)


      def chain_agentic(rules: Dict[str, bool]) -> ChainResult:
          steps = _run([
              ChainStep(1,"AML.T0054","Injection via External Data","Initial Access",
                        "Payload planted in web page agent reads","RAG/tool output scan log"),
              ChainStep(2,"AML.T0051","LLM Prompt Injection","Initial Access",
                        "Injected instruction enters context","API context assembly log"),
              ChainStep(3,"AML.T0053","Confused Deputy Plugin Exploitation","Impact",
                        "Agent calls email plugin; external recipient not in allowlist",
                        "Plugin call parameter log"),
              ChainStep(4,"AML.T0047","Exfiltration via Plugin Output","Exfiltration",
                        "Email with customer data sent to attacker",
                        "Email gateway; DLP alert"),
          ], rules)
          det = sum(1 for s in steps if s.detected)
          first = next((s.num for s in steps if s.detected), None)
          gaps = [s.technique_id for s in steps if not s.detected]
          rec = f"Add rules for: {', '.join(gaps)}" if gaps else "Full coverage."
          return ChainResult("Agentic Injection to Plugin Exploitation",
                             "Irreversible exfiltration via compromised agent",
                             steps, det, len(steps), first, gaps, rec)


      def print_result(r: ChainResult) -> None:
          pct = r.detected / r.total * 100
          print(f"\n{'='*60}")
          print(f"CHAIN: {r.name}")
          print(f"Goal:  {r.objective}")
          print(f"Detection: {r.detected}/{r.total} steps ({pct:.0f}%)")
          if r.first_alert:
              print(f"First alert fires at Step {r.first_alert}")
          else:
              print("FULL CHAIN UNDETECTED")
          for s in r.steps:
              icon = "DETECTED" if s.detected else "MISSED  "
              print(f"  [{icon}] Step {s.num}: [{s.technique_id}] {s.technique_name}")
              print(f"           Observable: {s.observable[:60]}")
              print(f"           -> {s.note}")
          if r.gaps:
              print(f"\n  Gaps: {', '.join(r.gaps)}")
          print(f"  Rec:  {r.recommendation}")


      if __name__ == "__main__":
          # Basic detection programme: 8 rules
          rules = {
              "AML.T0019": True, "AML.T0029": True,
              "AML.T0056": True, "AML.T0035": True,
              "AML.T0020": True, "AML.T0053": True,
              "AML.T0018": True, "AML.T0011": True,
          }
          print("ATLAS ATTACK CHAIN SIMULATOR — 8-rule detection programme")
          r1 = chain_extraction(rules)
          r2 = chain_poisoning(rules)
          r3 = chain_agentic(rules)
          for r in [r1, r2, r3]:
              print_result(r)
          total = sum(r.total for r in [r1, r2, r3])
          detected = sum(r.detected for r in [r1, r2, r3])
          print(f"\n{'='*60}")
          print(f"OVERALL: {detected}/{total} chain steps detected ({detected/total*100:.0f}%)")
          all_gaps = set(g for r in [r1, r2, r3] for g in r.gaps)
          if all_gaps:
              print(f"Priority gaps: {', '.join(sorted(all_gaps))}")

  implementation_03:
    title: "ATLAS Coverage Assessment + Top-10 Sigma Stubs"
    filename: "atlas_coverage_assessment.py"
    purpose: |
      Coverage assessment tool: input which ATLAS techniques your programme covers;
      outputs overall score, per-tactic coverage, and prioritised gap list.
      Also generates Sigma rule stubs for the top-10 priority techniques
      ready for completion in Chapter 11.
    language: "python"
    code: |
      """
      ATLAS Coverage Assessment Tool + Top-10 Sigma Stub Generator
      Assess detection programme coverage and generate Sigma stubs for top-10.
      """

      from dataclasses import dataclass, field
      from typing import List, Dict
      import yaml


      TOP_10 = [
          {"id": "AML.T0019", "name": "Target via ML Supply Chain",
           "tactic": "Initial Access to ML", "severity": "critical",
           "logsource": "model_registry_intake",
           "detection_condition": "format_check_failed OR hash_mismatch OR card_score < 70",
           "response": "Quarantine artifact; alert; do not load"},
          {"id": "AML.T0029", "name": "Denial of ML Service",
           "tactic": "Impact on ML", "severity": "high",
           "logsource": "api_gateway_billing_telemetry",
           "detection_condition": "tpm > 3x_rolling_avg OR cost_per_min > 3x_baseline",
           "response": "Apply hard rate limit; suspend key pending review"},
          {"id": "AML.T0025", "name": "Exfiltrate via ML Inference API",
           "tactic": "Exfiltration via ML", "severity": "high",
           "logsource": "api_gateway_request_log",
           "detection_condition": "queries_per_day > 10000 AND diversity > 0.85 AND avg_turns < 2",
           "response": "Disable logprobs; apply stricter rate limit; investigate identity"},
          {"id": "AML.T0056", "name": "LLM Meta Prompt Extraction",
           "tactic": "Exfiltration via ML", "severity": "high",
           "logsource": "api_request_log",
           "detection_condition": "input_matches_extraction_pattern OR sysptompt_fragment_in_output",
           "response": "Flag session; add injection signal to monitoring; alert"},
          {"id": "AML.T0035", "name": "Collect ML Artifacts",
           "tactic": "Collection", "severity": "critical",
           "logsource": "storage_access_log",
           "detection_condition": "download_bytes > 1GB BY non_serving_identity IN 60min",
           "response": "Alert immediately; suspend download; verify authorisation"},
          {"id": "AML.T0020", "name": "Poison Training Data",
           "tactic": "Persistence in ML", "severity": "critical",
           "logsource": "iam_filesystem_access_log",
           "detection_condition": "write_to_training_data BY unauthorised_identity OR label_KL > threshold",
           "response": "Suspend access; audit training run integrity; alert"},
          {"id": "AML.T0051", "name": "LLM Prompt Injection",
           "tactic": "Initial Access to ML", "severity": "high",
           "logsource": "api_request_log",
           "detection_condition": "injection_classifier_score > 0.7 ON user_input",
           "response": "Flag session; increment anomaly score; alert on repeat"},
          {"id": "AML.T0053", "name": "Confused Deputy Plugin Exploitation",
           "tactic": "Impact on ML", "severity": "critical",
           "logsource": "plugin_call_parameter_log",
           "detection_condition": "plugin_param_fails_allowlist OR irreversible_action_sans_confirmation",
           "response": "Block plugin call; alert; log full session parameters"},
          {"id": "AML.T0018", "name": "Backdoor ML Model",
           "tactic": "Persistence in ML", "severity": "critical",
           "logsource": "behavioural_regression_test_log",
           "detection_condition": "safety_test_failures > 0 OR canary_trigger_fired",
           "response": "Halt deployment; investigate; retrain from clean checkpoint"},
          {"id": "AML.T0037", "name": "Data from ML Artifact",
           "tactic": "Exfiltration via ML", "severity": "high",
           "logsource": "api_request_output_log",
           "detection_condition": "common_prefix_count > 30 in 10min OR long_low_perplexity_output",
           "response": "Rate-limit key; activate canary token monitoring; alert"},
      ]


      def assess_coverage(covered_ids: List[str]) -> Dict:
          covered = [t for t in TOP_10 if t["id"] in covered_ids]
          missing = [t for t in TOP_10 if t["id"] not in covered_ids]
          by_tactic: Dict[str, Dict] = {}
          for t in TOP_10:
              tac = t["tactic"]
              if tac not in by_tactic:
                  by_tactic[tac] = {"covered": 0, "total": 0}
              by_tactic[tac]["total"] += 1
              if t["id"] in covered_ids:
                  by_tactic[tac]["covered"] += 1
          return {
              "top10_covered": len(covered),
              "top10_total": len(TOP_10),
              "top10_pct": round(len(covered) / len(TOP_10) * 100, 1),
              "missing": [{"id": t["id"], "name": t["name"]} for t in missing],
              "per_tactic": by_tactic,
          }


      def print_assessment(result: Dict) -> None:
          print(f"\nATLAS COVERAGE ASSESSMENT (Top-10)")
          print("=" * 50)
          print(f"Top-10 coverage: {result['top10_covered']}/{result['top10_total']} "
                f"({result['top10_pct']}%)")
          if result["missing"]:
              print(f"\nMissing high-priority techniques:")
              for t in result["missing"]:
                  print(f"  MISSING: [{t['id']}] {t['name']}")
          print(f"\nPer-tactic coverage:")
          for tac, data in result["per_tactic"].items():
              pct = data["covered"] / data["total"] * 100
              print(f"  {tac[:35]:35s} {data['covered']}/{data['total']} ({pct:.0f}%)")


      def generate_sigma_stubs(output_path: str = "atlas_top10_sigma_stubs.yaml") -> None:
          stubs = []
          for t in TOP_10:
              stubs.append({
                  "title": f"ATLAS {t['id']} — {t['name']}",
                  "id": t["id"].lower().replace(".", "-"),
                  "status": "experimental",
                  "description": f"Detects {t['name']} ({t['tactic']}) — ATLAS {t['id']}",
                  "references": [f"https://atlas.mitre.org/techniques/{t['id']}"],
                  "tags": [
                      f"attack.{t['tactic'].lower().replace(' ', '_')}",
                      f"atlas.{t['id'].lower()}",
                  ],
                  "logsource": {
                      "product": "ml-platform",
                      "service": t["logsource"],
                  },
                  "detection": {
                      "selection": {"condition_sketch": t["detection_condition"]},
                      "condition": "selection",
                  },
                  "level": t["severity"],
                  "falsepositives": ["See technique-specific FP notes in atlas_technique_registry.py"],
                  "response": t["response"],
              })
          with open(output_path, "w") as f:
              yaml.dump(stubs, f, allow_unicode=True, sort_keys=False)
          print(f"Sigma stubs ({len(stubs)} rules) exported to {output_path}")


      if __name__ == "__main__":
          # Simulate a programme with 6 of the top-10 implemented
          current_coverage = [
              "AML.T0019", "AML.T0029", "AML.T0056",
              "AML.T0035", "AML.T0020", "AML.T0053",
          ]
          result = assess_coverage(current_coverage)
          print_assessment(result)
          generate_sigma_stubs()
          print(f"\nNext: formalise remaining {len(result['missing'])} "
                f"missing rules in Chapter 11.")

