# ============================================================================
# SECTION SUMMARY
# ============================================================================

section_summary:
  one_paragraph: |
    Section 5.8 is the detection engineering practitioner's reference for MITRE ATLAS,
    translating the framework overview of Section 5.7 into per-technique detection
    specifications for 30+ ATLAS techniques. The section opens with the detection-first
    framework — five fields per technique (attack pattern, observables, data source,
    detection logic, difficulty) — and a three-tier difficulty taxonomy separating
    signature-based, threshold-with-baseline, and behavioural-baseline techniques.
    Techniques are grouped by tactic: reconnaissance and resource development (limited
    victim-side detection; invest downstream), initial access and execution (highest
    ROI — AML.T0019 supply chain check is the single most impactful detection in
    the section), persistence (backdoors require proactive trigger-probe testing and
    canary tokens, not passive monitoring), exfiltration (all detectable via API
    telemetry — instrument API gateway logs first), and impact (DoS is low-difficulty;
    adversarial example evasion requires specialised infrastructure). Three technique
    chains (model extraction, training data poisoning to backdoor, agentic injection
    to plugin exploitation) demonstrate how real campaigns combine individual techniques
    and how correlation rules across detection steps dramatically increase fidelity.
    The section closes with ROI analysis: a top-10 priority technique list scored by
    prevalence × detectability × impact, a data source inventory ranking the ten log
    streams by technique coverage per stream (API gateway first, covering ten techniques),
    and a coverage heat map separating act-now, invest-in-infrastructure, quick-win,
    and defer quadrants. Three implementations deliver the 30+-technique registry with
    JSON export, the three-chain attack simulator with detection gap analysis, and the
    coverage assessment tool with top-10 Sigma stub generator.

  next_section: |
    Section 5.9 — AI Supply Chain Security: Models, Data, and Dependencies
    With AML.T0019 covered as the detection-side entry point, Section 5.9 provides
    the architectural depth: the full AI supply chain from dataset provenance to
    production weights, HuggingFace as a supply chain risk, pickle RCE mechanics,
    dataset poisoning at Common Crawl and GitHub scale, third-party ML library
    vulnerabilities, and the complete artifact verification pipeline.

