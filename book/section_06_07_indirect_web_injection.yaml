section_summary: |
  Section 6.7 mapped the complete web browsing agent injection surface. The
  injection entry point is the content extraction stage: between HTTP fetch and
  LLM context delivery, where hidden page content -- invisible to users -- enters
  the model's processing pipeline. CSS display:none, HTML comments, meta tags,
  JSON-LD structured data, and off-screen element positioning are all mechanisms
  that an adversary who controls a retrievable page can use to deliver injection
  payloads that the user never sees.

  Real-time injection defeats point-in-time allowlisting: web content changes
  after assessment, and retrieval-time classification is the only reliable control.
  Cross-site injection via link chains and SEO-poisoned results extends adversary
  reach through the browsing agent's traversal behaviour. The CSS stripping and
  content normalisation pipeline -- six ordered stages that must complete before
  classification and context assembly -- is the primary content-side defence.
  Infrastructure sandboxing (network egress restriction, action permission
  allowlisting, session isolation) limits blast radius when content classification
  is bypassed.

  Section 6.8 extends the same hidden-content injection analysis to email,
  where HTML email uses identical CSS hiding techniques against LLM email
  assistants -- with the added adversary advantage that the injection vector
  is delivered directly to the target organisation without requiring any access
  to their infrastructure.
...
