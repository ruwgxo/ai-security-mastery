learning_objectives:
  primary: |
    Map every web retrieval injection surface for LLM browsing agents, explain
    the CSS and HTML techniques that make web injection invisible to users while
    visible to models, build detection and normalisation defences for web content,
    and specify the sandboxing architecture that reduces the web retrieval attack
    surface at the infrastructure level.
  by_end_of_section:
    - "Explain how LLM browsing agents process web page content and where injection enters the context"
    - "Describe CSS display:none injection and why it is invisible to users but processed fully by LLMs"
    - "Enumerate five hidden injection techniques used in adversarial webpage construction"
    - "Explain real-time web injection and why point-in-time content scanning fails against it"
    - "Describe cross-site injection via trusted page link chains and SEO-poisoned search results"
    - "Specify the CSS stripping and content normalisation pipeline for web retrieval"
    - "Explain web retrieval sandboxing as an infrastructure-level defence complementing content classification"
    - "Build a web content injection test suite covering all five hidden injection techniques"


prerequisites:
  required:
    - "Section 6.1: Indirect injection surfaces and AML.T0054 classification"
    - "Section 6.5: Cross-modal pipeline injection and classifier placement"
    - "Section 6.6: RAG pre-assembly classifier pattern -- this section applies same pattern to web"
    - "Chapter 4 Section 4.6: Function calling and tool use -- web browsing tool architecture"
  helpful:
