key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        The web browsing agent's injection entry point is the content extraction
        stage -- before the LLM context, after the HTTP fetch. Hidden page content
        reaches the LLM through this pathway while remaining invisible to users.

    - number: 2
      takeaway: |
        CSS display:none, visibility:hidden, opacity:0, and zero-dimension elements
        are all DOM-present but browser-invisible. Naive HTML text extraction
        includes all of them. CSS-aware extraction that applies computed visibility
        is required to exclude hidden content.

    - number: 3
      takeaway: |
        HTML comments, meta tags, JSON-LD structured data, and off-screen elements
        are non-rendered page content that naive extractors may include. Each must
        be either stripped or separately classified before LLM context delivery.

    - number: 4
      takeaway: |
        Real-time injection defeats point-in-time allowlists. Web content changes
        after allowlist assessment. Retrieval-time classification of every fetched
        page is the only control that catches real-time injection.

    - number: 5
      takeaway: |
        Cross-site injection via link chains and SEO-poisoned search results extend
        the adversary's reach to pages the agent traverses from trusted starting
        points. Classifier coverage must extend to all pages retrieved, regardless
        of traversal depth.

    - number: 6
      takeaway: |
        The web content normalisation pipeline has six stages that must execute
        before injection classification: encoding normalisation, script and style
        removal, non-rendered element removal, meta/structured-data extraction,
        body text extraction, and classification. Order matters.

    - number: 7
      takeaway: |
        Infrastructure sandboxing (network egress restriction, action permission
        allowlisting, session isolation) limits blast radius when content
        classification is bypassed. It is defence-in-depth, not a substitute
        for retrieval-time classification.

    - number: 8
      takeaway: |
        The browsing agent injection threat model requires four controls working
        in concert: retrieval-time content normalisation, injection classification
        on normalised content, infrastructure sandboxing, and output monitoring.
        Any single control in isolation leaves exploitable gaps.


