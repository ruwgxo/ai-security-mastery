section_overview:
  title: 'Detection Primitives: Spectral Signatures, Activation Clustering, Neural Cleanse, STRIP, Meta-Classifiers'
  one_line_summary: |
    No detection primitive covers the full backdoor attack space. Spectral signatures
    catch poisoned-sample feature-space clusters when poisoning concentrates feature
    representations. Activation clustering catches the same clusters at the activation
    layer with different sensitivity properties. Neural Cleanse reverse-engineers
    triggers when a single fixed trigger exists. STRIP measures input-perturbation
    entropy, exploiting that triggered inputs predict consistently regardless of
    perturbation. Meta-classifiers learn distinguishing features between clean and
    backdoored models from training corpora of both. Each primitive has specific
    coverage and specific failure modes; the operationally meaningful detection
    architecture is an ensemble whose primitives have complementary failure modes,
    not any single best primitive.

  why_this_section_exists: |
    Sections 8.1 through 8.11 established the complete attack catalogue: training-time
    fundamentals, image-domain advanced backdoors, LLM-specific data-pipeline poisoning,
    and supply chain attacks across model and data sides. Throughout those sections,
    detection primitive coverage was referenced extensively in matrices showing which
    primitive catches which variant at which TPR. Section 8.12 provides the technical
    depth those references draw on: how each primitive actually works, what mathematical
    structure it exploits, what its failure modes are, and how to deploy it operationally.

    The depth is necessary because detection primitive selection is one of the most
    consequential defensive design decisions a programme makes. A programme that
    deploys Neural Cleanse alone has high coverage of fixed-trigger attacks and
    near-zero coverage of dynamic triggers (Section 8.6 ADV-IA, ADV-PSG variants);
    a programme that deploys spectral signatures alone has good coverage of cluster-
    forming attacks and poor coverage of compositional attacks (ADV-COMP2, ADV-MS).
    The selection decision drives the resulting coverage profile, and making the
    decision well requires understanding what each primitive does and does not do.

    Section 8.12 is the longest section in Chapter 8 because it provides the
    technical foundation that Sections 8.13-8.15 build on. Section 8.13 covers
    defensive training techniques that complement detection; Section 8.14 covers
    federated and gradient poisoning that extends the attack catalogue; Section
    8.15 integrates everything into the production auditing pipeline. The pipeline
    in Section 8.15 deploys an ensemble of Section 8.12 primitives; the ensemble
    selection logic depends on the primitive characteristics this section establishes.

    The section also serves the secondary function of grounding the published
    research literature for readers building defensive programmes. Each principal
    primitive has foundational papers (Spectral Signatures: Tran et al. 2018;
    Activation Clustering: Chen et al. 2018; Neural Cleanse: Wang et al. 2019;
    STRIP: Gao et al. 2019; meta-classifiers: ABS Liu et al. 2019, MNTD Xu et al.
    2021), and practitioners deploying these primitives often work from the
    original papers. Section 8.12 distils the operational essentials so readers
    can deploy effectively without reproducing the full research literature, but
    points to the foundational sources where deeper engagement is needed.

  position_in_chapter: |
    Section 8.12 is the technical foundation of Chapter 8 defensive infrastructure
    half. It pairs structurally with Sections 8.13-8.15: 8.12 provides detection
    primitives, 8.13 provides defensive training techniques (preventing rather than
    detecting), 8.14 provides federated/gradient poisoning coverage (a distinct
    attack class), and 8.15 capstones the chapter by integrating everything into
    the production auditing pipeline. The pipeline in 8.15 is the operational
    artifact; 8.12 is the technical substrate that makes the pipeline work.

