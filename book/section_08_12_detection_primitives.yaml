deliverables:

  deliverable_1_spectral_signatures_implementation:
    artifact: 'spectral_signatures_detector.py -- spectral signatures detection reference implementation'
    purpose: 'Reproduce Tran et al. 2018 spectral signatures detection on standard backdoor benchmarks'
    inputs:
      - 'Trained model'
      - 'Candidate training set with class labels'
      - 'Feature layer configuration'
      - 'Percentile threshold for flagging'
    outputs:
      - 'Per-class top-eigenvector projection scores'
      - 'Per-sample suspicion scores'
      - 'Flagged sample list'
      - 'Detection metrics (TPR, FPR if ground truth available)'
    implementation_notes: |
      Single file /code/defences/chapter_08/spectral_signatures_detector.py.
      Single quotes throughout per book convention.
      Dependencies: torch, numpy, scipy.
      Default feature layer: penultimate-layer features for CNN classifiers; embedding layer for transformer-based.
      Default threshold: top 1.5x estimated poisoning rate.
      Reproduces published TPR/FPR on CIFAR-10 BadNets benchmark.
    usage: 'Training data audit primitive; first-pass screening; component of Section 8.15 ensemble'

  deliverable_2_activation_clustering_implementation:
    artifact: 'activation_clustering_detector.py -- activation clustering detection reference implementation'
    purpose: 'Reproduce Chen et al. 2018 activation clustering detection'
    inputs:
      - 'Trained model'
      - 'Candidate training set'
      - 'Clustering algorithm configuration (k-means default; DBSCAN option)'
      - 'Cluster validation thresholds'
    outputs:
      - 'Per-class cluster assignments'
      - 'Cluster quality scores (silhouette, separation)'
      - 'Flagged cluster identification'
      - 'Per-sample suspicion scores'
    implementation_notes: |
      Single file /code/defences/chapter_08/activation_clustering_detector.py.
      Single quotes throughout per book convention.
      Dependencies: torch, sklearn, numpy.
      Default activation layer: last-layer pre-classifier-head.
      Default clustering: k-means with k=2.
      Cluster validation: silhouette score with tunable threshold.
    usage: 'Complementary first-pass screening; component of Section 8.15 ensemble'

  deliverable_3_neural_cleanse_implementation:
    artifact: 'neural_cleanse_detector.py -- Neural Cleanse trigger reverse-engineering'
    purpose: 'Reproduce Wang et al. 2019 Neural Cleanse detection and trigger recovery'
    inputs:
      - 'Trained model'
      - 'Output class set'
      - 'Optimisation hyperparameters (learning rate, iterations, loss weights)'
      - 'Anomaly detection threshold'
    outputs:
      - 'Per-class recovered perturbation pattern (p, m)'
      - 'Per-class perturbation norm'
      - 'Detected backdoor target classes'
      - 'Reverse-engineered trigger visualisations (for image domain)'
    implementation_notes: |
      Single file /code/defences/chapter_08/neural_cleanse_detector.py.
      Single quotes throughout per book convention.
      Dependencies: torch, numpy, matplotlib for visualisation.
      Default hyperparameters reproduce paper benchmark TPR.
      Includes outlier detection on per-class perturbation norms (median absolute deviation).
      Optional: trigger-based remediation via fine-tuning (cross-references Section 8.13).
    usage: 'Post-training model audit; fixed-trigger detection and remediation; component of Section 8.15 ensemble'

  deliverable_4_strip_implementation:
    artifact: 'strip_runtime_detector.py -- STRIP runtime input filtering'
    purpose: 'Reproduce Gao et al. 2019 STRIP runtime trigger detection'
    inputs:
      - 'Trained model'
      - 'Reference set of clean inputs'
      - 'Number of perturbations K (default 100)'
      - 'Entropy threshold'
    outputs:
      - 'Per-input STRIP score'
      - 'Triggered/clean classification per input'
      - 'Calibration curves for threshold selection'
    implementation_notes: |
      Single file /code/defences/chapter_08/strip_runtime_detector.py.
      Single quotes throughout per book convention.
      Dependencies: torch, numpy.
      Default K=100; lower K reduces cost at the expense of detection stability.
      Threshold calibrated against held-out clean validation set for target FPR.
      Designed for runtime deployment as request-time filter.
    usage: 'Runtime trigger detection; per-input filtering; component of Section 8.15 runtime layer'

  deliverable_5_meta_classifier_framework:
    artifact: 'meta_classifier_framework.py -- meta-classifier training and deployment framework'
    purpose: 'Train and deploy meta-classifiers for backdoor detection on arbitrary model families'
    inputs:
      - 'Training corpus: clean and backdoored models'
      - 'Feature extractor configuration'
      - 'Classifier architecture'
      - 'Validation set'
    outputs:
      - 'Trained meta-classifier'
      - 'Validation metrics and ROC curve'
      - 'Per-feature importance analysis'
      - 'Deployment-ready scoring function'
    implementation_notes: |
      Single file /code/defences/chapter_08/meta_classifier_framework.py.
      Single quotes throughout per book convention.
      Dependencies: torch, sklearn, numpy.
      Feature extractors: weight statistics, activation statistics on probe inputs, Neural Cleanse outputs, optional behavioural diff features.
      Default classifier: gradient-boosted tree; alternatives: small neural network.
      Threshold calibration: ROC curve analysis on held-out validation.
      Corpus maintenance: framework supports incremental retraining as new attack variants are added.
    usage: 'Post-training general-purpose detection; coverage extension beyond analytical primitives; component of Section 8.15 ensemble'

  deliverable_6_ensemble_detection_harness:
    artifact: 'ensemble_detection_harness.py -- end-to-end ensemble detection orchestration'
    purpose: 'Combine all primitives into operational detection ensemble with weighted voting and disagreement diagnostics'
    inputs:
      - 'Candidate model and training data'
      - 'Ensemble configuration: which primitives, weighting, thresholds'
      - 'Decision policy: vote-any | weighted-vote | consensus'
    outputs:
      - 'Per-primitive detection results'
      - 'Aggregated ensemble decision'
      - 'Disagreement diagnostic flags'
      - 'Recommended follow-up investigation'
    implementation_notes: |
      Single file /code/defences/chapter_08/ensemble_detection_harness.py.
      Single quotes throughout per book convention.
      Dependencies: all Section 8.12 deliverables 1-5.
      Default ensemble: spectral signatures + Neural Cleanse + STRIP + meta-classifier.
      Default decision: weighted vote with calibrated threshold.
      Disagreement diagnostics route ambiguous cases to additional analysis.
      Section 8.15 production pipeline integration point.
    usage: 'Production ensemble deployment; orchestration layer for Section 8.15 auditing pipeline detection track'

common_mistakes:

  mistake_1_single_primitive_deployment:
    description: 'Deploying a single detection primitive (typically Neural Cleanse) and treating it as comprehensive coverage'
    why_it_happens: |
      Research papers publishing detection primitives typically benchmark against
      canonical attacks at high TPR. Practitioners reading the papers see impressive
      single-primitive numbers and assume the coverage transfers. The transfer
      assumption is false when the threat model includes attacks the primitive
      does not cover. Single-primitive deployments are common; they look
      defensive on paper and are operationally fragile.
    consequence: 'No single primitive in Section 8.12 covers the full attack space. Single-primitive deployments have predictable coverage gaps that sophisticated adversaries can target. Neural Cleanse alone misses dynamic triggers entirely; spectral signatures alone misses composite triggers.'
    correct_approach: 'Deploy ensembles whose primitives have complementary failure modes. Section 8.12 ensemble design reference provides patterns from minimal to comprehensive. Section 8.15 production pipeline operationalises the comprehensive ensemble as default.'

  mistake_2_ignoring_threshold_calibration:
    description: 'Using primitive default thresholds without calibration against the deployment context'
    why_it_happens: |
      Default thresholds in research code reproduce paper benchmark results.
      The benchmarks are typically standardised datasets with specific characteristics.
      Production deployment contexts have different data distributions, model
      architectures, and acceptable false-positive rates. Default thresholds
      tuned for benchmark performance are not necessarily appropriate for
      production.
    consequence: 'Thresholds produce either too many false positives (operationally unworkable) or too few true positives (coverage failure). The defensive programme appears either alarmist or asleep depending on which way the calibration drifts.'
    correct_approach: 'Calibrate thresholds against held-out validation data representative of the deployment context. Recalibrate periodically as data distributions shift. Section 8.12 deliverables include threshold calibration tooling.'

  mistake_3_static_attack_corpus_for_meta_classifier:
    description: 'Treating meta-classifier training corpus as static and not updating for emerging attack variants'
    why_it_happens: |
      Meta-classifier training is expensive (large corpora of clean and
      backdoored models). Once trained, the classifier feels like a deployable
      asset rather than an ongoing maintenance commitment. Practitioners deploy
      and then under-invest in corpus updates as new attack variants emerge.
    consequence: 'Meta-classifier coverage matches the threat model at training time and drifts increasingly out of date. New attack variants appear in research and quickly in adversary practice; the meta-classifier does not learn to detect them. Coverage degrades over time without visible signal until the gap is exploited.'
    correct_approach: 'Treat meta-classifier corpus maintenance as ongoing operational responsibility. Update quarterly or on threat intelligence triggers. Section 8.12 deliverable 5 framework supports incremental retraining; Section 8.15 production pipeline includes corpus maintenance as standard discipline.'

  mistake_4_runtime_detection_without_training_time:
    description: 'Deploying STRIP runtime detection without any training-time detection primitive'
    why_it_happens: |
      Runtime detection feels comprehensive: every input is evaluated. Practitioners
      deploy STRIP and skip training-time primitives, reasoning that runtime
      coverage is sufficient. The reasoning misses that runtime detection cannot
      remediate -- it can only filter or alert -- and that runtime-only deployments
      provide no defence against attacks where the trigger is rare in production
      but consequential when present.
    consequence: 'Runtime filter catches some triggered inputs but cannot remove the underlying backdoor. Backdoored model continues to serve traffic; rare triggered inputs may slip past STRIP threshold; the underlying compromise is unaddressed. Backdoor remains exploitable indefinitely.'
    correct_approach: 'Deploy training-time detection (spectral signatures, activation clustering, Neural Cleanse) AND runtime detection (STRIP). Training-time detection catches and remediates the backdoor; runtime detection provides additional defence-in-depth. The two layers are complementary.'

  mistake_5_disagreement_as_failure:
    description: 'Treating ensemble primitive disagreement as a failure of the ensemble rather than as diagnostic information'
    why_it_happens: |
      Ensemble outputs feel cleaner when primitives agree. When they disagree,
      practitioners may decide the ensemble is unreliable and revert to single-
      primitive thinking. The intuition misses that disagreement is precisely
      the signal that distinguishes attack types. Spectral-positive Neural-
      Cleanse-negative is a different attack signature than spectral-negative
      Neural-Cleanse-positive; both are informative.
    consequence: 'Ensemble disagreement is treated as noise; the diagnostic information embedded in disagreement patterns is lost. Detection programmes lose the ability to distinguish attack types and miss opportunities for targeted follow-up investigation.'
    correct_approach: 'Treat disagreement as diagnostic. Specific disagreement patterns suggest specific attack types; specific patterns warrant specific follow-up analysis. Section 8.12 deliverable 6 includes disagreement diagnostic logic; Section 8.15 production pipeline routes ambiguous cases based on disagreement pattern.'

section_summary:
  compact: |
    Five principal detection primitives cover the published backdoor attack space
    with complementary failure modes. Spectral signatures detect poisoned-sample
    clusters via class-restricted feature covariance principal components.
    Activation clustering detects the same clusters via direct activation
    clustering with different sensitivity properties. Neural Cleanse reverse-
    engineers fixed triggers via per-class minimum-perturbation optimisation,
    providing both detection and remediation. STRIP detects triggered inputs at
    runtime via input-perturbation entropy, exploiting trigger-prediction
    dominance. Meta-classifiers learn to distinguish backdoored from clean
    models from training corpora of both, providing general-purpose coverage
    where analytical primitives have specific gaps. Each primitive has predictable
    failure modes: spectral signatures and activation clustering miss cluster-
    dispersing attacks; Neural Cleanse misses dynamic triggers; STRIP misses
    entropy-stable attacks; meta-classifiers miss attack variants outside their
    training corpus. Operational deployment requires ensemble construction with
    complementary failure modes, weighted voting calibrated against the threat
    model, and disagreement diagnostics that distinguish attack types via primitive
    response patterns. The reference ensemble (spectral signatures + Neural
    Cleanse + STRIP + meta-classifier) covers the full attack catalogue at
    meaningful TPR, with computational cost calibrated to deployment stakes.
    Section 8.13 covers complementary defensive training techniques; Section
    8.14 extends to federated and gradient poisoning; Section 8.15 integrates
    everything into the production auditing pipeline.

  key_takeaways:
    - 'No single primitive covers the full backdoor attack space; ensemble deployment is structurally mandatory'
    - 'Spectral signatures and activation clustering exploit poisoned-sample feature/activation clustering; both fail on dispersed-cluster attacks'
    - 'Neural Cleanse reverse-engineers fixed triggers; provides remediation; fails on dynamic triggers entirely'
    - 'STRIP operates at runtime via input-perturbation entropy; principal layer for dynamic-trigger and per-input detection'
    - 'Meta-classifiers learn discrimination from corpora; coverage matches corpus diversity; ongoing corpus maintenance mandatory'
    - 'Reference comprehensive ensemble: spectral signatures + Neural Cleanse + STRIP + meta-classifier covers attack catalogue at varying TPR'
    - 'Threshold calibration is operational tuning that requires ongoing recalibration as data and threats evolve'
    - 'Ensemble disagreement is diagnostic information, not noise; specific disagreement patterns indicate specific attack types'

preview_section_13:
  title: 'Defensive Training Techniques: Robust Optimisation, DP-SGD, Data Filtering, Certified Defences'
  connection: |
    Section 8.12 covered detection primitives that identify backdoors after they
    are present in models or training data. Section 8.13 covers defensive training
    techniques that prevent backdoors from being installed in the first place,
    or that limit the effectiveness of installed backdoors through training-time
    interventions. Four principal techniques get coverage: differentially
    private SGD (DP-SGD) which limits per-sample influence, robust optimisation
    which trains models resistant to data perturbation, data filtering which
    removes suspect samples before training (using Section 8.12 detection as
    upstream input), and certified defences which provide mathematical
    guarantees of bounded backdoor impact. Detection (Section 8.12) and
    prevention (Section 8.13) are complementary defensive layers; production
    pipelines deploy both. Section 8.14 then extends to federated and gradient
    poisoning before Section 8.15 capstones the chapter.

