prose_content:

  part_1_the_detection_primitive_landscape:
    title: 'The Detection Primitive Landscape: Why Five and Not One'
    body: |
      The principal published backdoor detection primitives operate on different
      structural properties of backdoored models. The diversity is not arbitrary --
      each primitive targets a specific structural property that backdoor attacks
      tend to produce, and the diversity reflects the diversity of the attacks
      themselves. Understanding why each primitive exists, what property it exploits,
      and where that property fails to hold is the foundation for designing
      operationally meaningful detection ensembles.

      Spectral signatures and activation clustering exploit the property that
      poisoned training samples form distinguishable clusters in feature or activation
      space. The intuition is that backdoor poisoning creates a learned association
      between trigger and target class, and the samples carrying that association
      have specific statistical properties: they share trigger-derived features,
      they activate trigger-relevant model components, and their activations cluster
      together in representation space. When poisoning concentrates these properties
      strongly, the resulting cluster is statistically detectable. Spectral signatures
      detect via covariance structure (the cluster has specific principal-component
      properties); activation clustering detects via direct clustering of the
      activations. Both work on similar underlying signals with different sensitivity
      profiles.

      Neural Cleanse exploits a different property: backdoored models have a small
      input perturbation that, applied to any clean input, causes confident
      misclassification to the target class. The intuition is that the backdoor
      installs a trigger-target association, and the trigger is exactly the small
      perturbation that activates the association. By searching for this minimum
      perturbation per output class, Neural Cleanse can reverse-engineer the
      trigger and identify the target class without ground-truth knowledge. The
      mechanism works when a single fixed trigger exists; it breaks when triggers
      are dynamic (per-input generated, Section 8.6 ADV-IA, ADV-PSG variants).

      STRIP exploits a third property: triggered inputs produce consistent predictions
      regardless of input perturbation, while clean inputs produce variable predictions
      under perturbation. The intuition is that the backdoor's trigger condition
      dominates the model's response to triggered inputs -- whatever else is in
      the input, the trigger-target association activates. Perturbing the triggered
      input does not change this; the trigger is still present, the prediction still
      goes to the target class. For clean inputs, perturbation produces meaningful
      prediction changes because no single feature dominates. STRIP measures the
      entropy of predictions under input perturbation; low entropy indicates
      triggered inputs. The mechanism works for many trigger types but is partially
      bypassed by attacks specifically designed to maintain entropy under perturbation.

      Meta-classifiers exploit a fourth property: backdoored models, considered as
      functional artifacts, have model-level signatures that distinguish them from
      clean models. The signatures are learned rather than analytically derived --
      a meta-classifier is itself a model trained on a corpus of clean and backdoored
      models, learning to discriminate based on whatever features turn out to matter.
      The mechanism works for any backdoor type the training corpus represents but
      generalises poorly to backdoor types absent from training. Meta-classifiers
      are powerful but require substantial training data (corpora of clean and
      backdoored models) and explicit attack catalogue maintenance.

      The five primitives between them cover most of the backdoor attack space at
      meaningful coverage rates. No single primitive covers everything. Spectral
      signatures and activation clustering miss attacks that disperse the poisoned
      cluster in feature space (Section 8.6 ADV-COMP2, ADV-SEQ, ADV-MS composite
      triggers). Neural Cleanse misses dynamic triggers entirely. STRIP misses
      attacks specifically designed for entropy-stable perturbation response.
      Meta-classifiers miss attack variants absent from their training corpora.
      Each primitive has predictable coverage gaps; the gaps are different across
      primitives; the ensemble is what produces operationally meaningful coverage.

      Section 8.12 covers each primitive in turn at the depth necessary for
      practical deployment, and closes with the ensemble construction logic that
      Section 8.15 production pipeline operationalises.

  part_2_spectral_signatures:
    title: 'Spectral Signatures: Covariance Structure of Poisoned Samples'
    body: |
      Spectral signatures detect backdoors by analysing the covariance structure
      of training samples in feature space. The foundational paper (Tran, Li,
      Madry 2018) established that for backdoor attacks where many samples share
      a common trigger, the poisoned samples form a low-dimensional cluster in
      the learned feature representation. The cluster's properties make it
      detectable through spectral analysis: the principal-component decomposition
      of feature representations restricted to a target class shows specific
      anomalies when the class contains poisoned samples.

      The mechanism operates as follows. Take a trained model and a candidate
      training set. For each output class y, compute the feature representations
      h(x) for all training samples x labelled y. Compute the covariance matrix
      C of these features. Compute the top eigenvector v of C -- the principal
      direction in feature space for class y. Project each sample's feature
      representation onto v: s(x) = (h(x) - mean) dot v. The score s(x) measures
      how strongly each sample contributes to the principal direction. For clean
      classes, s(x) is approximately normal-distributed. For poisoned classes,
      s(x) shows a heavy-tailed distribution: the poisoned samples have
      systematically high s(x) values because they share the trigger-induced
      feature direction and that direction dominates the class covariance.

      The detection thresholding marks samples with s(x) above a percentile
      threshold (typically the top 1.5x the suspected poisoning rate). Marked
      samples are removed; the model is retrained without them. For BadNets-style
      attacks at typical poisoning rates (1-5%), spectral signatures achieve
      85-95% true positive rate on poisoned samples at acceptable false positive
      rates. The mechanism is computationally cheap (eigendecomposition is
      polynomial in feature dimension and sample count) and statistically
      principled (the heavy-tail signal has rigorous statistical analysis behind
      it).

      The mechanism's effectiveness depends on three structural assumptions about
      the backdoor attack. First, the poisoned samples must share a trigger-induced
      feature direction. For BadNets canonical patches, this holds: all triggered
      samples carry the same patch and produce similar feature shifts. For dynamic
      triggers (per-sample generated), this fails: each triggered sample has a
      different trigger and the feature shifts do not align. For composite triggers
      (multiple coincident features), this partially fails: the composition is
      shared but individual components have different effects, dispersing the
      cluster.

      Second, the poisoning rate must be high enough to produce statistical signal
      but low enough that the principal direction is dominated by the trigger
      rather than the clean task. At very low poisoning rates (well below 0.5%),
      the trigger signal may not appear in the top eigenvector. At very high
      rates (above 30%), the principal direction may shift toward representing
      the trigger-poisoned distribution as the dominant class characteristic,
      which paradoxically reduces detection effectiveness because the cluster no
      longer looks anomalous against the class baseline.

      Third, the feature representation must capture trigger-induced features.
      For models with strong representation learning (deep networks with sufficient
      capacity), this typically holds. For shallower models or models where the
      trigger affects only specific layer activations, the chosen feature layer
      matters. The original paper recommends penultimate-layer features for
      classification networks; for transformers and other architectures, layer
      selection requires empirical calibration.

      Operational deployment of spectral signatures requires several practical
      decisions. Layer selection: which layer's features to analyse. Threshold
      selection: what percentile cutoff to use for flagging. Per-class analysis:
      run separately for each output class versus pooled. Bootstrap variance:
      run multiple times with subsampling to estimate detection stability.
      Section 8.12 deliverable 1 provides a reference implementation with these
      decisions parameterised; default settings reproduce published results on
      CIFAR-10 BadNets benchmarks.

      The complementary failure modes that matter for ensemble design include:
      poor detection of dynamic triggers (move to STRIP or meta-classifiers),
      poor detection of composite triggers (move to behavioural diff testing
      or meta-classifiers), and reduced effectiveness at very low poisoning
      rates (move to Neural Cleanse, which is less budget-sensitive).

  part_3_activation_clustering:
    title: 'Activation Clustering: Last-Layer Representation Clustering'
    body: |
      Activation clustering, introduced by Chen et al. 2018, exploits the same
      underlying property as spectral signatures (poisoned samples cluster in
      representation space) but at the activation level rather than the feature
      covariance level. The mechanism extracts last-layer activations for training
      samples in each class and applies clustering to identify poisoned-sample
      clusters within each class. Where spectral signatures use a single principal
      direction, activation clustering uses full-distribution clustering --
      typically k-means with k=2 (clean cluster vs poisoned cluster) or DBSCAN
      for density-based detection.

      The mechanism operates as follows. For each output class y, extract last-layer
      activations a(x) for all samples x labelled y. Cluster these activations
      using k-means with k=2; this produces two clusters per class. Compute
      cluster sizes and analyse the smaller cluster: if it represents a small
      fraction of the class (consistent with typical poisoning rates) and exhibits
      anomalous properties (the samples in it have unusual provenance, or the
      cluster centroid differs significantly from the class centroid), it is
      flagged as a candidate poisoned-sample cluster. The samples in flagged
      clusters are marked for removal.

      The mechanism shares structural assumptions with spectral signatures but has
      different sensitivity profiles. Activation clustering detects clusters of
      any shape (k-means is flexible to non-axis-aligned clusters), where spectral
      signatures detect linear directions. For attacks producing non-linear cluster
      structures, activation clustering may detect what spectral signatures miss.
      Conversely, for attacks producing weak but linear cluster structures, spectral
      signatures may detect what activation clustering misses through clustering
      noise. The two primitives are therefore complementary on cluster-forming
      attacks, with overlapping but not identical coverage.

      The detection sensitivity of activation clustering depends on the clustering
      algorithm hyperparameters and the activation layer chosen. Last-layer
      activations (post-final-pooling, pre-classifier-head) are the canonical
      choice but not universally optimal. For some architectures, intermediate
      layer activations carry the trigger signal more cleanly. For LLMs, the
      analogue is the embedding before the language modelling head, with potential
      variations in transformer block selection. Hyperparameter selection (k,
      clustering distance metric, density thresholds) requires calibration on
      known-clean baselines.

      The operational deployment is similar to spectral signatures with one
      additional consideration: cluster validation. Activation clustering produces
      cluster assignments but does not directly produce per-sample suspicion
      scores. Translating cluster assignments into actionable detection requires
      cluster-level decisions (which clusters are flagged) and per-sample
      decisions (which samples in flagged clusters are removed). The original
      paper proposes silhouette-score-based cluster quality analysis and
      majority-vote sample assignment. Section 8.12 deliverable 2 provides a
      reference implementation with these decisions parameterised.

      Activation clustering's principal failure modes parallel spectral signatures:
      poor detection of dynamic and composite triggers that disperse clusters.
      The mechanism additionally has failure modes specific to clustering: weak
      clusters that do not separate from the clean distribution produce ambiguous
      results, and the choice of clustering algorithm affects what shapes of
      anomalies are detectable. The complementary primitives for ensemble
      deployment are STRIP for dynamic triggers, behavioural diff testing for
      composite triggers, and meta-classifiers for general coverage extension.

      Note on application to LLMs: both spectral signatures and activation
      clustering apply to LLMs with appropriate adaptation. The activations are
      transformer-block outputs rather than CNN features, and the per-class
      analysis requires choosing the relevant model output (sequence completion,
      classification head, embedding similarity). The Section 8.12 deliverables
      include LLM-adapted variants for instruction-tuning poisoning detection
      (Section 8.7) and for adapter behavioural analysis (Section 8.9).

  part_4_neural_cleanse:
    title: 'Neural Cleanse: Trigger Reverse-Engineering via Minimum-Perturbation Optimisation'
    body: |
      Neural Cleanse, introduced by Wang et al. 2019, takes a fundamentally
      different approach from cluster-based detection. Where spectral signatures
      and activation clustering operate on training data and look for poisoned
      samples, Neural Cleanse operates on the trained model and reverse-engineers
      the trigger directly without any ground-truth knowledge. The mechanism is
      mathematically elegant: for each output class y, find the minimum input
      perturbation that, applied to any clean input, causes the model to predict
      y. For clean classes, no small perturbation works -- the perturbation
      either does not produce confident classification, or it must be large
      (resembling a complete input transformation, not a trigger). For backdoored
      classes, a small perturbation does work -- it is the embedded trigger.

      The mechanism operates as follows. For each output class y, define an
      optimisation problem: find a perturbation pattern p and mask m such that
      the model classifies (1-m) * x + m * p as y for any input x, while minimising
      the L1 norm of m (the perturbation should be as small as possible). The
      optimisation runs gradient descent on (p, m) with a loss balancing
      classification consistency and perturbation size. The resulting perturbation
      norm is the trigger size for class y under the assumption it is a backdoor
      target. After running the optimisation per class, compare the perturbation
      norms across classes: backdoor target classes have anomalously small
      perturbations (the trigger is genuinely small) while clean classes have
      large perturbations (the smallest input transformation causing classification
      to that class is structurally non-trivial). The anomaly detection on the
      norm distribution flags backdoored classes; the recovered (p, m) for those
      classes is the reverse-engineered trigger.

      The mechanism's elegance is that it requires no training data, no ground
      truth, and no per-sample analysis. It operates entirely on the trained
      model and produces both detection (which classes are backdoor targets)
      and remediation (the trigger pattern that can be filtered or that the
      model can be fine-tuned to ignore). For BadNets-style fixed-trigger
      attacks, Neural Cleanse achieves very high detection rates (90%+ TPR)
      and the recovered triggers correspond closely to the actual triggers
      installed during poisoning.

      The structural assumption is single-trigger backdoor structure. The
      optimisation searches for a single perturbation per class; it implicitly
      assumes the backdoor responds to that single perturbation. For dynamic
      triggers (Section 8.6 ADV-IA, ADV-PSG, where the trigger varies per input),
      the assumption fails: there is no single perturbation, the optimisation
      finds noise or fails to converge, and the detection signal disappears.
      For composite triggers (ADV-COMP2 and similar), the assumption partially
      fails: the optimisation may find one of the conjunction components and
      classify the model as backdoored against that component, but it does not
      reliably find the full compositional structure.

      The operational deployment of Neural Cleanse requires careful hyperparameter
      tuning. The optimisation has multiple parameters (loss weights, learning
      rate, iteration count) that affect both convergence and the resulting
      perturbation norms. The norm-anomaly threshold determines which classes
      are flagged; different thresholds trade false positives against false
      negatives. The original paper provides reference settings; modern variants
      have refined the optimisation for stability and computational efficiency.
      Section 8.12 deliverable 3 provides a reference implementation with
      hyperparameters that reproduce published results on standard benchmarks.

      Neural Cleanse's complementary primitives for ensemble deployment:
      spectral signatures and activation clustering for cluster-forming attacks
      (which Neural Cleanse is not specifically optimised for), STRIP for
      dynamic triggers (Neural Cleanse's principal failure mode), meta-
      classifiers for general coverage extension. The combination is what
      Section 8.6 coverage maps reflect: Neural Cleanse provides high coverage
      against fixed-trigger attacks and near-zero coverage against dynamic
      ones; STRIP provides moderate coverage against dynamic triggers; the
      ensemble covers both regimes.

      An additional consideration: Neural Cleanse can also be used for
      remediation, not just detection. Once the trigger is reverse-engineered,
      the model can be fine-tuned with the recovered trigger added to clean
      inputs but with their original (correct) labels, training the model to
      ignore the trigger pattern. This unlearning approach is partially effective
      and useful when retraining from scratch is not practical. Section 8.13
      covers defensive training including Neural Cleanse-based unlearning.

  part_5_strip:
    title: 'STRIP: Input-Perturbation Entropy as Detection Signal'
    body: |
      STRIP (STRong Intentional Perturbation), introduced by Gao et al. 2019,
      operates at runtime rather than at training time. Spectral signatures,
      activation clustering, and Neural Cleanse all analyse the trained model
      or its training data; STRIP analyses individual runtime inputs to determine
      whether each input contains a trigger. The mechanism exploits a behavioural
      property: triggered inputs produce consistent predictions under input
      perturbation, while clean inputs produce variable predictions. STRIP
      measures this consistency via prediction entropy.

      The mechanism operates as follows. Given a runtime input x, generate K
      perturbed versions of x by superimposing it with K randomly selected clean
      inputs from a reference set (typical K is 100). For each perturbed version,
      compute the model's prediction probability distribution. Compute the entropy
      of each perturbed prediction distribution. Average the K entropies to
      produce the STRIP score for x. Low STRIP score indicates triggered input
      (consistent confident prediction across perturbations); high STRIP score
      indicates clean input (variable prediction across perturbations). A
      threshold on the STRIP score separates triggered from clean inputs.

      The intuition is that backdoor triggers are dominant features. When a
      trigger is present in an input, the model's response is dominated by the
      trigger-target association regardless of what else is in the input.
      Perturbing the input by superimposing other content does not change the
      trigger's effect; the prediction stays at the target class with high
      confidence. For clean inputs, perturbation actually changes the model's
      prediction because no single feature dominates -- different superimposed
      content produces different predictions, increasing entropy.

      The mechanism's structural assumption is trigger-prediction dominance.
      For most simple triggers, this holds: BadNets patches, marker phrases,
      and similar fixed-feature triggers produce dominant responses that resist
      perturbation. For dynamic triggers, the assumption partially holds: per-
      sample-generated triggers still dominate predictions when present, but
      the entropy signal is noisier because different triggered inputs have
      different specific triggers. STRIP achieves moderate coverage against
      dynamic triggers (Section 8.6 ADV-IA), better than Neural Cleanse but
      worse than meta-classifiers trained specifically on dynamic-trigger
      examples.

      For composite triggers, STRIP's effectiveness depends on whether
      perturbation disrupts the composition. Two-feature composite triggers
      (ADV-COMP2) where both features must coincide for activation are
      partially disrupted by perturbation: superimposing other content can
      block the composition. STRIP therefore provides moderate coverage. For
      multi-stage composite triggers across multiple turns (Section 8.7
      LLM-MULTITURN), STRIP requires multi-turn perturbation analysis, which
      is operationally more complex; coverage drops.

      Operational deployment of STRIP requires reference set selection and
      threshold calibration. The reference set should be representative of
      clean input distribution; using mismatched reference samples produces
      noisy entropy signals. The threshold separating triggered from clean
      inputs is typically calibrated against a held-out clean validation set:
      the threshold is set such that the false positive rate on clean inputs
      meets a target (typically 1-5%). Section 8.12 deliverable 4 provides
      a reference implementation with reference set and threshold parameterised.

      STRIP's runtime deployment is a key operational property. Spectral
      signatures, activation clustering, and Neural Cleanse all operate at
      training time or post-training time -- they detect backdoored models
      before deployment. STRIP operates on inference inputs as they arrive,
      providing per-input detection that can be used for runtime filtering.
      The runtime cost is non-trivial (K perturbations per input, each requiring
      a forward pass through the model) but can be reduced through sampling
      strategies or applied selectively to high-risk inputs.

      STRIP's complementary primitives for ensemble: spectral signatures and
      activation clustering for training-time cluster detection (where STRIP
      provides no signal), Neural Cleanse for fixed-trigger reverse-engineering
      (where STRIP also works but Neural Cleanse provides remediation in
      addition to detection), and meta-classifiers for general training-time
      detection. The combination provides both training-time and runtime
      coverage; STRIP is the principal runtime layer in Section 8.15 production
      pipeline.

  part_6_meta_classifiers:
    title: 'Meta-Classifiers: Learning to Distinguish Backdoored from Clean Models'
    body: |
      The four primitives covered so far (spectral signatures, activation
      clustering, Neural Cleanse, STRIP) are analytically derived: each exploits
      a specific mathematical structure that backdoor attacks tend to produce.
      Meta-classifiers take a different approach: they learn the discriminating
      features directly from a corpus of clean and backdoored models, without
      requiring analytical derivation of what makes a model backdoored. The
      principal published meta-classifiers include ABS (Liu et al. 2019) and
      MNTD (Xu et al. 2021), with subsequent variants extending the approach.

      The mechanism operates as follows. Construct a training corpus of models:
      a set of clean models trained on normal data, and a set of backdoored
      models trained with various poisoning attacks. For each model in the
      corpus, extract feature signatures: model-level statistics that describe
      properties potentially distinguishing clean from backdoored. Common feature
      extractors include weight statistics (per-layer norms, sparsity, spectral
      properties), activation statistics on probe inputs, sensitivity to specific
      input perturbations, and Neural Cleanse outputs (recovered perturbation
      norms per class). Train a meta-classifier (typically a small neural network
      or gradient-boosted tree) on these features with the binary label
      clean-or-backdoored. The trained meta-classifier scores new candidate
      models for backdoor probability.

      The mechanism's principal advantage is generality. Where analytical
      primitives have specific failure modes (cluster-based methods miss dynamic
      triggers; Neural Cleanse misses composition), meta-classifiers can learn
      whatever discriminating features the training corpus represents. If the
      corpus includes backdoored models with diverse trigger types (fixed,
      dynamic, composite), the meta-classifier learns features useful for all
      of them. The coverage extension is empirically meaningful: meta-classifiers
      achieve 70-80% TPR across a wide range of attack variants where individual
      analytical primitives have variant-specific gaps.

      The mechanism's principal limitation is generalisation. Meta-classifiers
      generalise well to attack variants similar to those in their training
      corpus and poorly to attack variants substantially different. A meta-
      classifier trained on BadNets-style attacks may not detect Section 8.6
      ADV-IA dynamic triggers if dynamic triggers were absent from training.
      Maintaining meta-classifier coverage requires ongoing corpus maintenance:
      adding new attack variants as they emerge in research and ensuring the
      corpus reflects the contemporary threat model.

      The corpus construction is the principal operational cost. Producing a
      large, diverse corpus of clean and backdoored models requires substantial
      compute for training many models, breadth in attack variant coverage,
      and ongoing curation as new attacks are published. For small organisations,
      building a meta-classifier from scratch is impractical; the operational
      pattern is consuming pre-trained meta-classifiers from research groups
      or vendors. Public meta-classifier releases are available (ABS, MNTD,
      and follow-up work have associated reference models), and commercial
      offerings are emerging in the AI security tooling space.

      Feature extraction matters as much as the classifier itself. Different
      feature extractors capture different aspects of model behaviour. Weight
      statistics capture static structural properties but miss behavioural
      ones. Activation statistics on probe inputs capture behavioural responses
      but require careful probe selection. Neural Cleanse outputs capture
      reverse-engineered trigger properties but inherit Neural Cleanse's
      structural assumptions. Modern meta-classifiers typically combine
      multiple feature extractors, with the meta-classifier learning to weight
      them appropriately.

      Operational deployment requires careful threshold selection because meta-
      classifier scores are not directly interpretable as probabilities. The
      threshold separating clean from backdoored is calibrated against held-out
      validation data: clean models from outside the training set, backdoored
      models from outside the training set, threshold tuned for desired
      operating point on the resulting ROC curve. Section 8.12 deliverable 5
      provides a reference meta-classifier implementation with threshold
      calibration tooling.

      Meta-classifiers' complementary primitives for ensemble: the four
      analytical primitives provide specific coverage that the meta-classifier
      can corroborate or contradict. When primitives agree, confidence is
      high. When they disagree, the disagreement pattern provides diagnostic
      information: spectral signatures positive but Neural Cleanse negative
      suggests dispersed-cluster attack with single-trigger structure;
      Neural Cleanse positive but meta-classifier negative suggests an attack
      pattern outside the meta-classifier's training distribution. Section
      8.15 ensemble combines the primitives with weighted voting and
      disagreement-based diagnostics.

  part_7_ensemble_construction_and_coverage_design:
    title: 'Ensemble Construction and Coverage Design'
    body: |
      The five primitives covered have specific coverage zones with predictable
      gaps. No single primitive covers everything; the operational deployment
      decision is which primitives to combine and how to weight their outputs.
      Section 8.12 closes with the ensemble construction logic that Section
      8.15 production pipeline uses.

      The first principle is complementary failure modes. The ensemble should
      include primitives whose failure modes do not overlap, so that attacks
      that defeat one primitive are caught by another. Spectral signatures and
      activation clustering have similar failure modes (both miss cluster-
      dispersing attacks); deploying both adds little compared to deploying
      either with a complementary primitive. Spectral signatures plus Neural
      Cleanse plus STRIP covers the major attack regime split: cluster-forming
      fixed-trigger attacks (spectral signatures), single-trigger attacks
      regardless of cluster structure (Neural Cleanse), and dynamic and
      runtime-input attacks (STRIP). Adding a meta-classifier extends coverage
      to attacks the analytical primitives miss collectively.

      The second principle is coverage tier. Different primitives have different
      true positive rates against different attacks. Higher-coverage primitives
      should be weighted more heavily in voting; lower-coverage primitives
      should be used as supplementary signals or as tie-breakers. The weighting
      depends on the threat model: against fixed-trigger attacks, Neural Cleanse
      should be weighted heavily; against dynamic triggers, STRIP and meta-
      classifiers should be weighted heavily. Threat-model-aware weighting
      requires knowing the threat model, which depends on what attacks the
      defender expects to face.

      The third principle is computational cost. Spectral signatures and
      activation clustering are computationally cheap (eigendecomposition or
      clustering on training data features). Neural Cleanse is moderately
      expensive (per-class optimisation that may require many iterations).
      STRIP is per-input expensive at runtime (K forward passes per input).
      Meta-classifiers vary by feature extractor cost. Production deployment
      typically front-loads cheap primitives (run them on every artifact) and
      reserves expensive ones for higher-priority artifacts or follow-up
      investigation.

      The fourth principle is decision logic. The simplest ensemble votes:
      flag if any primitive flags. This minimises false negatives at the cost
      of false positives. The tightest ensemble requires consensus: flag only
      if all primitives flag. This minimises false positives at the cost of
      false negatives. Production deployments typically use weighted voting
      with calibrated thresholds: each primitive contributes a weighted vote,
      the weighted sum is compared to a threshold, the threshold is calibrated
      against held-out validation data for desired operating point. Section
      8.12 deliverable 6 provides the reference ensemble harness with
      configurable decision logic.

      The fifth principle is disagreement diagnostics. When primitives disagree,
      the pattern of disagreement is itself informative. Specific disagreement
      patterns suggest specific attack types: spectral-positive Neural-Cleanse-
      negative suggests dispersed-cluster fixed-trigger; STRIP-positive
      everything-else-negative suggests dynamic trigger; meta-classifier-positive
      everything-else-negative suggests novel or sophisticated attack. The
      disagreement diagnostics inform follow-up investigation: which primitive
      flagged determines what additional analysis to perform. Section 8.15
      production pipeline includes disagreement diagnostic logic that routes
      ambiguous cases to human review or additional automated analysis.

      The principal operational reality is that detection programmes need
      ongoing tuning. Detection thresholds drift as attack distributions shift.
      Meta-classifier corpora need updating as new attacks emerge. Neural
      Cleanse hyperparameters benefit from periodic recalibration. STRIP
      reference sets need refreshing. Section 8.15 production pipeline includes
      operational monitoring of primitive performance and tuning workflows.
      Detection is not a one-time deployment; it is an ongoing operational
      capability.

      The combined detection coverage produced by a well-designed ensemble is
      meaningful but not complete. Sophisticated adversaries with knowledge of
      the deployed primitives can engineer attacks that defeat each primitive
      individually and possibly the ensemble collectively. The defensive goal
      is not perfect detection (structurally impossible) but raising attacker
      costs to the point that rational adversaries shift to other attack
      classes or accept reduced success rates. The ensemble construction in
      this section is the operational substrate for that goal; Section 8.15
      makes the operational substrate concrete in production pipeline form.

reference_materials:

  primitive_summary_reference:
    title: 'Detection Primitive Summary Reference'
    description: |
      Compact reference summarising each primitive's mechanism, deployment
      stage, structural assumptions, principal coverage, and failure modes.
      Use for quick lookup during ensemble design decisions.

    primitives:

      - primitive: 'Spectral signatures'
        deployment_stage: 'Training-time (analyses training data via trained model)'
        mechanism: 'Top eigenvector of class-restricted feature covariance; samples projecting strongly on it are flagged'
        structural_assumption: 'Poisoned samples share trigger-induced feature direction; cluster forms in feature space'
        cost: 'Low (eigendecomposition)'
        principal_coverage:
          - 'BadNets canonical patches: 85-95% TPR'
          - 'Invisible triggers (DCT, frequency-domain): 60-75% TPR'
          - 'Dynamic triggers (ADV-IA, ADV-PSG): 40-60% TPR'
          - 'Composite triggers (ADV-COMP2, ADV-MS): 20-40% TPR'
        principal_failure_modes:
          - 'Cluster-dispersing attacks'
          - 'Very low poisoning rates (sub-0.5%)'
          - 'Per-sample-generated triggers'
        complementary_primitives: 'STRIP, Neural Cleanse, meta-classifiers'
        foundational_paper: 'Tran, Li, Madry 2018'

      - primitive: 'Activation clustering'
        deployment_stage: 'Training-time'
        mechanism: 'Cluster last-layer activations per class; flag anomalous small cluster as poisoned'
        structural_assumption: 'Poisoned samples form distinguishable cluster in activation space'
        cost: 'Low-moderate (clustering)'
        principal_coverage:
          - 'BadNets: 80% TPR'
          - 'Invisible triggers: 55-70% TPR'
          - 'Dynamic triggers: 30-50% TPR'
          - 'Composite triggers: 15-30% TPR'
        principal_failure_modes:
          - 'Dispersed clusters'
          - 'Weak cluster separation'
          - 'Poisoning rates outside calibration range'
        complementary_primitives: 'Spectral signatures (overlapping but not identical), STRIP, meta-classifiers'
        foundational_paper: 'Chen et al. 2018'

      - primitive: 'Neural Cleanse'
        deployment_stage: 'Post-training (analyses trained model)'
        mechanism: 'Per-class minimum-perturbation optimisation; anomalously small perturbations indicate backdoor target classes'
        structural_assumption: 'Single fixed trigger exists; backdoor responds to specific perturbation pattern'
        cost: 'Moderate (per-class optimisation)'
        principal_coverage:
          - 'BadNets canonical: 90% TPR'
          - 'Invisible triggers: 80-85% TPR (still works against fixed invisible triggers)'
          - 'Dynamic triggers: 5-15% TPR (by construction)'
          - 'Composite triggers: variable, typically low'
        principal_failure_modes:
          - 'Dynamic triggers (per-sample generated)'
          - 'Compositional triggers'
          - 'Optimisation convergence failures'
        complementary_primitives: 'STRIP (covers dynamic triggers), spectral signatures (covers cluster-forming attacks)'
        foundational_paper: 'Wang et al. 2019'

      - primitive: 'STRIP'
        deployment_stage: 'Runtime (per-input)'
        mechanism: 'Input-perturbation entropy; low entropy under perturbation indicates trigger present'
        structural_assumption: 'Triggered inputs produce dominant prediction regardless of perturbation'
        cost: 'Per-input runtime (K forward passes)'
        principal_coverage:
          - 'BadNets: 85% TPR'
          - 'Invisible triggers: 60-75% TPR'
          - 'Dynamic triggers: 55-70% TPR (the runtime case where STRIP shines)'
          - 'Composite triggers: 30-45% TPR'
        principal_failure_modes:
          - 'Attacks designed for entropy-stable perturbation response'
          - 'Multi-turn triggers (require multi-turn perturbation analysis)'
          - 'Computational cost at high traffic volumes'
        complementary_primitives: 'Spectral signatures and activation clustering for training-time, Neural Cleanse for fixed-trigger remediation'
        foundational_paper: 'Gao et al. 2019'

      - primitive: 'Meta-classifiers'
        deployment_stage: 'Post-training or post-adapter-merge'
        mechanism: 'Trained model classifying clean vs backdoored using model-level features'
        structural_assumption: 'Backdoored models have learnable distinguishing signatures'
        cost: 'High to train; moderate to apply'
        principal_coverage:
          - 'Coverage depends on training corpus diversity'
          - 'Typically 70-80% TPR across attack variants represented in training'
          - 'Generalisation to unseen attack types: poor'
        principal_failure_modes:
          - 'Attack variants absent from training corpus'
          - 'Concept drift as attacks evolve'
          - 'Adversaries with knowledge of training corpus'
        complementary_primitives: 'All analytical primitives (provide specific coverage that meta-classifier can corroborate)'
        foundational_papers: 'Liu et al. 2019 (ABS); Xu et al. 2021 (MNTD)'

  primitive_attack_coverage_matrix_reference:
    title: 'Primitive vs Attack Variant Coverage Matrix'
    description: |
      Comprehensive coverage matrix showing TPR estimates for each primitive
      against each Section 8.6 attack variant. Use for ensemble design and
      gap analysis.

    coverage_grid:

      - attack: 'BadNets canonical patch'
        spectral_signatures: '85-95%'
        activation_clustering: '80%'
        neural_cleanse: '90%'
        strip: '85%'
        meta_classifier: '80%'
        ensemble_recommended: 'Any 2-3 primitives sufficient'

      - attack: 'DCT-domain invisible trigger (ADV-DCT)'
        spectral_signatures: '60-75%'
        activation_clustering: '55-70%'
        neural_cleanse: '80-85%'
        strip: '60-75%'
        meta_classifier: '70-80%'
        ensemble_recommended: 'Neural Cleanse + meta-classifier'

      - attack: 'Reflection backdoor (ADV-REFL)'
        spectral_signatures: '50-65%'
        activation_clustering: '50-65%'
        neural_cleanse: '70-80%'
        strip: '60-70%'
        meta_classifier: '70-80%'
        ensemble_recommended: 'Neural Cleanse + meta-classifier'

      - attack: 'Adversarial perturbation trigger (ADV-ADVPERT)'
        spectral_signatures: '55-70%'
        activation_clustering: '50-65%'
        neural_cleanse: '70-85%'
        strip: '50-65%'
        meta_classifier: '65-75%'
        ensemble_recommended: 'Neural Cleanse + meta-classifier; STRIP weakened'

      - attack: 'Input-aware dynamic trigger (ADV-IA)'
        spectral_signatures: '40-60%'
        activation_clustering: '30-50%'
        neural_cleanse: '5-15%'
        strip: '55-70%'
        meta_classifier: '60-75%'
        ensemble_recommended: 'STRIP + meta-classifier; Neural Cleanse essentially zero coverage'

      - attack: 'Per-sample generated trigger family (ADV-PSG)'
        spectral_signatures: '30-50%'
        activation_clustering: '25-45%'
        neural_cleanse: '5-10%'
        strip: '50-65%'
        meta_classifier: '55-70%'
        ensemble_recommended: 'STRIP + meta-classifier'

      - attack: 'Two-feature composite (ADV-COMP2)'
        spectral_signatures: '20-40%'
        activation_clustering: '15-30%'
        neural_cleanse: 'Variable (typically low)'
        strip: '30-45%'
        meta_classifier: '55-70%'
        ensemble_recommended: 'Meta-classifier + behavioural diff testing (Section 8.9)'

      - attack: 'Multi-stage composite (ADV-MS)'
        spectral_signatures: '15-30%'
        activation_clustering: '10-25%'
        neural_cleanse: 'Very low'
        strip: '20-35%'
        meta_classifier: '50-65%'
        ensemble_recommended: 'Meta-classifier + behavioural diff testing + multi-turn analysis'

      - attack: 'LLM marker phrase trigger (LLM-MARKER)'
        spectral_signatures: '70-85%'
        activation_clustering: '70-80%'
        neural_cleanse: '80-90%'
        strip: '75-85%'
        meta_classifier: '75-85%'
        ensemble_recommended: 'Any 2-3 primitives sufficient; standard LLM detection'

      - attack: 'LLM stylistic trigger (LLM-STYLE)'
        spectral_signatures: '50-65%'
        activation_clustering: '45-60%'
        neural_cleanse: '60-75%'
        strip: '55-70%'
        meta_classifier: '65-80%'
        ensemble_recommended: 'Meta-classifier primary; Neural Cleanse and STRIP supplementary'

      - attack: 'LLM compositional trigger (LLM-COMP)'
        spectral_signatures: '25-45%'
        activation_clustering: '20-40%'
        neural_cleanse: 'Low'
        strip: '30-45%'
        meta_classifier: '50-65%'
        ensemble_recommended: 'Meta-classifier + behavioural diff testing'

      - attack: 'LLM multi-turn trigger (LLM-MULTITURN)'
        spectral_signatures: '15-30%'
        activation_clustering: '10-25%'
        neural_cleanse: 'Very low'
        strip: '20-35% (single-turn) up to 50% (multi-turn variant)'
        meta_classifier: '45-65% (depends on multi-turn training corpus coverage)'
        ensemble_recommended: 'Meta-classifier + multi-turn behavioural diff testing'

  primitive_deployment_pattern_reference:
    title: 'Primitive Deployment Pattern Reference'
