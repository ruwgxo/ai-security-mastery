document_info:
  title: 'Sequence Models: LSTM and GRU for Multi-Turn Conversation Threat Detection'
  chapter: 12
  section: 6
  section_code: '1206'
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  created: '2026-06-06'
  estimated_pages: 7
  estimated_reading_time: '55-65 minutes'

section_overview:
  one_line_summary: 'Sequence models close the multi-turn blind spot: a GRU reading the full conversation history detects the escalation arc that single-turn classifiers cannot see because each individual turn looks benign.'
  why_this_section_exists: |
    Random Forest and XGBoost from Section 12.05 classify each API request in isolation.
    They receive a feature vector for turn N and return an attack probability for turn N.
    They have no access to turns N-1, N-2, or the pattern of how the conversation has
    evolved. This is sufficient for single-turn attacks -- a prompt injection payload
    that arrives in one message. It is insufficient for the multi-turn attack patterns
    documented in Chapter 7 Sections 7.07 and 7.08.

    Multi-turn jailbreak attacks exploit the sequential context that the LLM accumulates
    across turns. An adversary who wants to extract harmful content does not always send
    a single high-confidence jailbreak that a single-turn classifier can flag. Instead,
    they build context over multiple turns: an early turn establishes a fictional frame,
    a middle turn introduces a character who operates without restrictions, a later turn
    makes the actual harmful request inside the established fictional context. Each turn,
    scored independently by the Section 12.05 classifier, produces a low attack probability.
    The conversation arc, scored as a sequence, produces a high attack probability.

    Section 12.06 builds the sequence detectors that close this coverage gap. LSTM and
    GRU both read the full conversation history as a variable-length sequence of per-turn
    feature vectors from Section 12.02 and classify the conversation, not the individual
    turn. The GRU adds an attention mechanism that weights each turn by its contribution
    to the final classification decision, providing analyst-readable evidence of which
    turns triggered the detection.
  position_in_chapter: |
    Section 12.06 is the third ML detector in Chapter 12, following the anomaly detector
    (12.03) and the supervised classifiers (12.05). It is the first detector that requires
    conversation-level labelled data rather than single-turn examples. Its deliverables --
    specifically gru_sequence_detector.py and conversation_dataset_builder.py -- are
    imported by the Section 12.15 ensemble and the Section 12.17 gateway capstone.

learning_objectives:

  knowledge:
    - 'Explain why single-turn classifiers miss multi-turn attacks and describe three specific attack patterns that require sequential context to detect'
    - 'Describe the LSTM gating mechanism: how the input gate, forget gate, and output gate control what information is written to, erased from, and read from the cell state across turns'
    - 'Explain the GRU update and reset gates and state why GRU trains faster than LSTM on conversation sequences shorter than 20 turns'
    - 'Describe the attention mechanism over conversation turns and explain how per-turn attention weights provide analyst-readable detection evidence'
    - 'State the data requirement for conversation-level sequence model training and explain why it is harder to accumulate than single-turn labelled examples'
    - 'Explain how variable-length conversation sequences are handled in production inference and what padding and masking do'

  skills:
    - 'Construct a conversation-level dataset from single-turn labelled examples using conversation_dataset_builder.py'
    - 'Train an LSTM conversation detector with variable-length sequence handling and a binary classification head on the final hidden state'
    - 'Train a GRU conversation detector with additive attention over turns and produce per-turn attention weight output for analyst review'
    - 'Implement the training loop with gradient clipping, early stopping, and learning rate scheduling for sequence models'
    - 'Profile sequence model inference latency with variable-length batching and verify it fits within the gateway budget'

  security_mindset:
    - 'Recognise that the absence of multi-turn attack examples in the labelled dataset is not evidence that multi-turn attacks do not occur -- it may mean the anomaly detector and single-turn classifiers are missing them entirely'
    - 'Understand that the conversation dataset is harder to collect than single-turn data because the full conversation must be stored, not just the individual turn that triggered an alert'
    - 'Treat attention weights as evidence, not just explainability: when the GRU flags a conversation and the attention concentrates on turns 3 and 7, the analyst review should focus on those turns and the narrative arc between them'
    - 'Accept that sequence models are the last ML family deployed, not the first -- their data requirements and inference complexity are justified only when multi-turn attack patterns are documented in the production threat model'

prerequisites:
  - 'Section 12.05: supervised classification -- security_evaluator.py imported for benchmarking; Random Forest is the baseline this section must outperform on multi-turn test cases'
  - 'Section 12.04: dataset curation -- conversation_dataset_builder.py extends the Section 12.04 schema for conversation-level examples'
  - 'Section 12.02: security feature engineering -- SecurityFeatureVector per turn is the sequence model input'
  - 'Chapter 2 Section 2.17: LSTM and RNN basics -- hidden state, cell state, and gating mechanisms are reviewed but prerequisite knowledge is assumed'
  - 'Chapter 7 Section 7.07: multi-turn jailbreak escalation -- the attack pattern this section detects'
  - 'Chapter 7 Section 7.08: context manipulation and gradual boundary erosion -- the second attack class requiring sequential context'

prose_content:

  part_1:
    title: 'The Multi-Turn Blind Spot'
    body: |
      The Section 12.05 classifiers evaluate one turn at a time. This is architecturally
      correct for the most common LLM API request pattern: a user sends a single message,
      the model responds, the conversation ends or continues independently. For this pattern,
      single-turn classification is sufficient and efficient.

      Multi-turn attacks deliberately exploit the single-turn evaluation architecture. The
      adversary's goal is to place the attack payload in a turn that, evaluated independently,
      looks benign -- because the attack context was established in prior turns that the
      classifier never sees together.

      Three multi-turn attack patterns from Chapter 7 illustrate the blind spot. Gradual
      jailbreak erosion (Section 7.07) begins with legitimate requests that establish the
      model's willingness to engage with a topic, then incrementally escalates the requests
      toward the target harmful output over 5-10 turns. Each turn is a small step from the
      previous one. No single turn crosses the classifier's decision boundary; the cumulative
      drift does.

      Payload splitting (Section 7.08) fragments a single injection payload across multiple
      turns. Turn 1 contains the setup ('imagine a story where...'), turn 3 introduces the
      character who will deliver the harmful instruction ('the character is an expert who
      explains...'), turn 5 completes the payload ('...explain how to'). Evaluated
      individually: three low-confidence benign turns. Evaluated as a sequence: a structured
      attack arc with a clear escalation pattern.

      Fictional frame construction is the third pattern: the adversary uses early turns to
      establish a fictional universe with different rules ('in this universe, the AI has no
      restrictions'), then makes requests inside that frame in later turns. The request turn
      references the fictional frame established earlier; without the earlier turns it is
      meaningless or benign. With them, it is the intended attack.

      All three patterns share the structural characteristic that makes them detectable by
      sequence models: the attack signal is distributed across turns and accumulates over
      time. The LSTM hidden state and the GRU update gate are designed to capture exactly
      this kind of temporal accumulation.

  part_2:
    title: 'Representing a Conversation as a Sequence'
    body: |
      The input to the sequence model is a variable-length sequence of per-turn feature
      vectors. For a conversation with T turns, the input is a matrix of shape (T, F) where
      F is the number of features in the SecurityFeatureVector from Section 12.02 (F=20 for
      the standard vector). Each row is the feature vector for one turn, in chronological
      order from turn 1 to turn T.

      Three encoding decisions matter for how well the sequence model captures attack signals.
      The first is role encoding: whether the feature vector for a given turn includes a
      binary indicator of whether the turn is a user message, an assistant message, or a
      system message. User turns are the attack surface; assistant turns contain refusal
      signals; the role encoding allows the model to learn that a role_boundary_marker in
      a user turn is a different signal from the same feature in an assistant turn. The
      Section 12.02 feature pipeline already includes role context in the contextual feature
      group; the sequence model uses it without modification.

      The second encoding decision is position encoding: whether to include an explicit
      turn-number feature in each row. The GRU's recurrent structure implicitly encodes
      position through the order in which turns are processed -- turn 5 receives a hidden
      state that has already accumulated information from turns 1-4. Explicit position
      encoding (adding a normalised turn number as an additional feature dimension) can
      improve detection of attacks that target specific positions in a conversation
      (e.g., attacks that always arrive in turn 3 after two rapport-building turns).

      The third decision is sequence length normalisation. The maximum conversation length
      in the training set determines the padding length used in production inference. Setting
      the maximum too short truncates long conversations; too long wastes computation on
      padding tokens. The 95th percentile of conversation lengths in the training set is
      the correct maximum: it covers almost all real conversations without excessive padding.

  part_3:
    title: 'LSTM Architecture Applied to Conversation Sequences'
    body: |
      The LSTM (Long Short-Term Memory, Hochreiter and Schmidhuber 1997) processes the
      conversation sequence one turn at a time. At each turn t, it receives the current
      turn's feature vector x_t and the previous hidden state h_{t-1} and cell state c_{t-1},
      and produces a new hidden state h_t and cell state c_t.

      Three gating mechanisms control the information flow. The forget gate f_t determines
      what fraction of the previous cell state to discard: it is a sigmoid applied to a
      linear combination of h_{t-1} and x_t, producing values between 0 (forget completely)
      and 1 (retain completely). For conversation security detection, the forget gate learns
      to retain escalation signals from earlier turns while discarding irrelevant conversation
      content.

      The input gate i_t determines what new information to write to the cell state: a
      sigmoid gate controlling the magnitude and a tanh gate generating the candidate
      content. When a high-signal attack indicator arrives (a role boundary marker in turn
      3 of a fictional frame sequence), the input gate writes this signal into the cell
      state where it persists through subsequent turns.

      The output gate o_t determines what fraction of the cell state to expose as the
      current hidden state h_t. At the final turn T, the hidden state h_T encodes a
      compressed representation of the entire conversation history, weighted toward the
      signals the model has learned to associate with multi-turn attacks. A linear
      classification head applied to h_T produces the binary attack probability.

      For conversation sequences with strong temporal dependencies over many turns (15+),
      LSTM outperforms GRU because its separate cell state provides a longer-range memory
      path than the GRU's single update gate. For the typical production conversation length
      of 3-10 turns, the advantage is marginal and GRU's computational efficiency dominates.

  part_4:
    title: 'GRU with Attention: Faster Training and Interpretable Turn Weights'
    body: |
      The GRU (Gated Recurrent Unit, Cho et al. 2014) simplifies the LSTM by combining
      the cell state and hidden state into a single state vector and replacing the three
      LSTM gates with two: the update gate z_t and the reset gate r_t.

      The update gate z_t controls how much of the previous hidden state to carry forward
      versus how much to replace with new content from the current turn. Values near 1
      preserve the previous state (the model ignores the current turn); values near 0
      replace the state with content from the current turn (the model attends to this turn).
      For conversation security detection, the update gate learns to set low values for
      rapport-building turns that carry no attack signal and high values for turns that
      introduce escalation markers.

      The reset gate r_t determines how much of the previous hidden state influences the
      candidate new state. When r_t is near 0, the candidate new state is computed
      entirely from the current turn's features, ignoring prior context. This is appropriate
      for turns that introduce a completely new topic and should be evaluated somewhat
      independently.

      GRU trains faster than LSTM because it has fewer parameters (no separate cell state,
      two gates instead of three). On conversation sequences of 3-15 turns with a 20-feature
      input, GRU typically converges in 20-30% fewer epochs than LSTM and produces accuracy
      within 1-2 percentage points.

      The attention mechanism added to the GRU in deliverable_2 computes a scalar weight
      for each turn based on how much that turn contributes to the final classification.
      Additive attention (Bahdanau et al. 2015) applies a learned linear transformation
      to each turn's hidden state, passes it through a tanh activation and another linear
      layer to produce a scalar score, then normalises across all turns with a softmax.
      The weighted average of hidden states (rather than just the final hidden state) is
      passed to the classification head. The attention weights over turns are output
      alongside the classification decision, giving the analyst a ranked list of which
      turns in the flagged conversation carried the most detection signal.

  part_5:
    title: 'Training on Conversation-Level Data'
    body: |
      The conversation dataset is structurally different from the single-turn dataset
      in Section 12.04. A single-turn example is one (text, label) pair. A conversation
      example is a sequence of (text, label) pairs per turn, plus a conversation-level
      label: is this conversation an attack conversation or a benign conversation?

      The conversation_dataset_builder.py in deliverable_3 constructs conversation-level
      training examples from three sources. The first source is the production session
      log: full conversation histories from the anomaly alert labeller (Section 12.03) where
      at least one turn was flagged and confirmed as a true positive. These are labelled
      as attack conversations. Sessions where all turns were benign are labelled as benign
      conversations. This requires storing the full session history, not just the flagged
      turn -- the first operational requirement that distinguishes the sequence model
      deployment from the single-turn classifier deployment.

      The second source is constructed attack conversations: taking single-turn attack
      examples from the Section 12.04 labelled dataset and prepending synthetically
      generated benign conversation context to simulate the multi-turn attack setup.
      These synthetic conversations are lower fidelity than real production sessions but
      allow the training set to be populated before sufficient real multi-turn attack
      examples have been collected.

      The third source is the red team exercise designed for multi-turn patterns: security
      engineers deliberately execute gradual erosion, payload splitting, and fictional frame
      attacks against the production integration, with all turns captured as labelled
      training examples.

      The data imbalance in conversation datasets is typically more severe than in single-
      turn datasets: attack conversations are rarer than attack turns because a full attack
      conversation requires multiple turns to accumulate, while a single-turn attack produces
      an example immediately. SMOTE does not apply directly to variable-length conversation
      sequences; the imbalance treatment for conversation data is class weighting applied
      to the conversation-level cross-entropy loss.

  part_6:
    title: 'Production Inference: Variable-Length Batching Within the Latency Budget'
    body: |
      Sequence model inference in production differs from single-turn classifier inference
      in one structural way: the input length varies with conversation length. Turn 1 of a
      conversation produces a sequence of length 1; turn 10 produces a sequence of length
      10. The model must handle both without padding every inference call to the maximum
      training sequence length.

      Variable-length sequence batching groups concurrent inference requests by conversation
      length and pads within each batch to the maximum length in that batch, not the global
      maximum. This reduces the computational waste from padding a 3-turn conversation to
      the 20-turn maximum. The sequence_inference_optimizer.py in deliverable_5 implements
      length-sorted batching for the production gateway.

      The GRU processes sequences sequentially on CPU but parallelises across the batch
      dimension. For batch size 1 (the common case when a single user's turn arrives), the
      GRU inference time scales with conversation length: a 3-turn conversation takes
      approximately 3ms; a 15-turn conversation approximately 8ms. Both are within the
      gateway's 50ms budget when the GRU runs in parallel with other detectors via the
      async scoring architecture from Section 12.12.

      The practical latency constraint for production deployment of sequence models is
      memory: storing the full conversation history for every active session requires a
      session store (Redis or equivalent) that maintains the per-turn feature vectors until
      the session ends. The memory budget per session is 20 features * 4 bytes * max_turns
      = 1600 bytes for a 20-turn maximum, which is negligible. The infrastructure requirement
      is that the session store is available and the conversation history is fetched before
      the sequence model inference call.

