    - 'Basic probability reasoning: likelihood × impact as a prioritisation heuristic'

prose_content:

  part_1_coverage_not_binary:
    heading: 'Coverage Is Not Binary'
    body: |
      The most common error in detection coverage reporting is treating coverage as a binary
      property: a technique is either covered or it is not. Binary coverage reporting
      produces misleading heat maps: a technique with one Sigma rule that fires on 30% of
      attack variants appears green alongside a technique with comprehensive multi-layer
      detection that fires on 95% of variants. The difference in actual defensive value is
      enormous; the heat map shows none.

      The three-tier coverage model introduced in Section 11.04 and operationalised here
      makes coverage quality explicit:

      Score 0 — No detection. No rule or detector fires on any known variant of this
      technique. The technique has an actionable gap: evidence exists at inference time but
      no detection artefact captures it. For intentional gaps (no runtime evidence), the
      score is recorded separately rather than as 0, to avoid inflating the actionable
      backlog.

      Score 1 — Partial detection. At least one rule fires on at least one variant of the
      technique, but confirmed variants exist that evade all deployed rules. Examples from
      the gateway: AML.T0051 scores 1 because Track 1 detects direct injection but
      obfuscated injection evades both Track 1 and Track 3. AML.T0040 scores 1 because
      Track 5 detects single-session extraction but distributed multi-account extraction
      evades the per-user session accumulator.

      Score 2 — Full detection. All known variants of the technique are covered by
      deployed rules at one or more detection layers. No confirmed evasion variant exists
      in the current threat model. Full coverage is a time-bound claim: it is valid as of
      the date the assessment was run against the current threat intelligence for that
      technique. A technique at score 2 today may regress to score 1 when a new evasion
      variant is published.

      The score is computed per technique, not per rule. A technique with three partial
      rules that together cover 95% of variants is still score 1 if a confirmed evasion
      variant exists. Moving from score 1 to score 2 requires closing the specific gap
      named in the residual_gap field of the ATLASTechnique registry, not simply adding
      more rules.

  part_2_heatmap_construction:
    heading: 'Heat Map Construction: From Rule Inventory to Visual Coverage'
    body: |
      The heat map is built in three steps: rule inventory collection, technique score
      computation, and visualisation export.

      Step 1 — Rule inventory collection. The attck_coverage_heatmap.py deliverable reads
      the mitre_technique fields from all deployed Sigma rules via rule_metadata_validator.py
      and cross-references them against the ATLASTechnique registry from
      atlas_attack_tree_mapper.py. Each rule contributes its technique IDs to the coverage
      record for those techniques. A rule with mitre_technique: [AML.T0051, AML.T0043]
      contributes to two technique coverage records simultaneously.

      Step 2 — Technique score computation. For each technique in the ATLAS registry, the
      scorer looks at the deployed rules contributing to that technique and applies the
      scoring logic: if residual_gap is non-empty and chain_complete is False, the technique
      cannot score above 1 regardless of how many rules cover it. Score 2 requires both
      chain_complete: True and an explicit full_coverage_date set by the detection engineer
      after confirming no evasion variants exist. This prevents rules from automatically
      promoting themselves to score 2 without human sign-off.

      Step 3 — Visualisation export. The attck_navigator_export.py from Section 11.04
      accepts the score dictionary from attck_coverage_heatmap.py and generates the
      Navigator-compatible JSON. The heat map can also be rendered as an ASCII table
      for terminal output during CI runs — a fast sanity check that does not require
      loading the Navigator UI.

      Two complementary views of the same data serve two audiences. The Navigator heat
      map is the leadership communication artefact: one slide, colour-coded by technique.
      The ASCII coverage table is the engineering working view: technique ID, score,
      rule count, residual gap, and next action in a format that fits a terminal window
      and can be diffed between runs.

  part_3_gap_analysis:
    heading: 'Gap Analysis: Prioritising the Detection Backlog'
    body: |
      Not all gaps are equal. An uncovered technique with a high probability of being used
      against the organisation and a high impact if it succeeds is a P0 backlog item. An
      uncovered technique that is theoretically possible but requires physical access to
      hardware and has no known exploitation in the wild is a low-priority item that can
      wait for a future quarter.

      The gap prioritisation score is: priority = likelihood × impact. Both dimensions are
      scored on a 1–5 scale. Likelihood reflects the probability that the technique will
      be used against this specific deployment: base rate from threat intelligence, exposure
      from the deployment profile (public API vs internal tool, model type, user base), and
      known active campaigns using this technique. Impact reflects the consequences if the
      technique succeeds: model integrity, data confidentiality, availability of the service,
      and regulatory or reputational downstream effects.

      For the seven-track gateway, the six highest-priority actionable gaps in likelihood
      × impact order:

      Gap 1: AML.T0051 obfuscated injection variants (L3 gap). Likelihood: 5 — public
      APIs are actively probed with obfuscated injections. Impact: 5 — successful
      injection can override model behaviour entirely. Priority score: 25. Remediation:
      Chapter 12 intent classifier (Section 12.04).

      Gap 2: AML.T0054 novel jailbreak framings (L3 gap). Likelihood: 5 — novel jailbreak
      templates are published continuously and tested against public LLM APIs. Impact: 4 —
      jailbreak enables policy bypass; may not cause full system compromise. Priority: 20.
      Remediation: Chapter 12 adversarial training of jailbreak classifier (Section 12.03).

      Gap 3: AML.T0040 distributed extraction (L4 gap). Likelihood: 3 — coordinated
      multi-account extraction requires significant attacker investment. Impact: 5 —
      successful extraction reconstructs model weights or decision boundaries, enabling
      evasion and IP theft. Priority: 15. Remediation: Chapter 13 cross-user correlation
      (Section 13.03).

      Gap 4: AML.T0043 novel adversarial families (L3 gap). Likelihood: 3 — novel
      adversarial attack families require research capability but new families are published
      regularly. Impact: 4 — successful adversarial input causes targeted misclassification.
      Priority: 12. Remediation: Chapter 12 expanded adversarial classifier training
      (Section 12.05).

      Gap 5: AML.T0020 slow-drift poisoning (L4 gap). Likelihood: 2 — slow-drift
      poisoning requires sustained access to the training pipeline; rare but high-value
      for targeted attacks. Impact: 5 — subtle model behaviour corruption is persistent
      and hard to detect post-deployment. Priority: 10. Remediation: Chapter 13 training
      data drift monitor (Section 13.04).

      Gap 6: AML.T0019 inference-time backdoor trigger (undetected). Likelihood: 2 —
      requires training pipeline access for insertion; inference trigger is rare in
      practice. Impact: 4 — backdoor activates on specific input to produce attacker-
      controlled outputs. Priority: 8. Remediation: future track — output consistency
      monitor not yet scheduled.

      The gap prioritiser enforces this ordering programmatically. When a Chapter 12 or 13
      section delivers a new detector, the gap prioritiser is re-run to confirm the targeted
      gap has closed (technique score improves from 0 or 1 to 1 or 2) and to update the
      backlog ordering for remaining gaps.

  part_4_coverage_drift:
    heading: 'Coverage Drift: How Heat Maps Degrade and How to Catch It'
    body: |
      A detection programme that measures coverage once and never re-measures has a static
      picture of a dynamic problem. Coverage drifts downward through three mechanisms.

      Mechanism 1 — Rule regression. A Sigma rule is calibrated to reduce false positives
      by raising a threshold or tightening a keyword list. The calibration reduces alert
      noise as intended but also reduces true positive coverage: the tighter threshold
      misses obfuscated attack variants that the original threshold caught. The coverage
      score for the affected technique regresses from partial to lower partial. Without
      scheduled coverage measurement, the regression is invisible until a real attack evades
      the calibrated rule.

      Detection: the quarterly coverage run computes coverage scores from the current
      deployed rules and diffs them against the previous quarter. A technique score that
      decreased triggers a regression alert with the rule ID and commit hash of the
      calibration that caused it.

      Mechanism 2 — Technique taxonomy expansion. MITRE ATLAS adds new techniques as new
      adversarial ML research matures. A technique published after the last coverage
      assessment appears as neither covered nor gapped in the current heat map — it is
      simply absent, which is the worst kind of gap: not visible. Without a scheduled
      ATLAS version check, new techniques accumulate unnoticed.

      Detection: the quarterly coverage run fetches the current ATLAS technique list and
      diffs it against the technique list used in the previous run. New techniques appear
      as automatic score-0 entries in the heat map with a flag indicating they are new
      additions not yet assessed.

      Mechanism 3 — Attack variant evolution. A technique at score 2 (full coverage) can
      regress when adversaries publish new evasion variants that bypass all deployed rules.
      This is the hardest drift mechanism to detect programmatically because it requires
      threat intelligence — awareness that a new variant exists — not just rule inspection.

      Detection: the quarterly coverage run includes a threat intelligence step: reviewing
      published adversarial ML research and exploit releases from the previous quarter for
      new variants of covered techniques. Any new variant that evades deployed rules is
      added as a regression test case (Section 11.02) and the technique score is
      downgraded accordingly.

      The quarterly cadence is the minimum defensible review frequency. Programmes with
      high-value public APIs (where active probing is continuous) should run coverage
      measurement monthly. The attck_coverage_heatmap.py deliverable is designed to run
      in CI — a coverage check can run weekly as part of the nightly test suite, with
      alerting only when a score regresses.

  part_5_gateway_heatmap:
    heading: 'The Seven-Track Gateway: Current Heat Map and Improvement Trajectory'
    body: |
      The seven-track gateway''s current coverage heat map, scored as of the end of
      Chapter 10, produces the following per-technique picture:

      Score 1 (amber): AML.T0051, AML.T0054, AML.T0043, AML.T0015, AML.T0020, AML.T0040.
      Six techniques at partial coverage. All six have named residual gaps and named
      Chapter 12 or 13 remediations. These are the amber cells on the heat map.

      Score 0 (red, actionable): AML.T0019 (low coverage, effectively 0 for the
      inference-time trigger gap), AML.T0022, AML.T0024. Three techniques with no or
      near-zero coverage and identified future tracks. These are the red cells.

      Intentional gap (grey): AML.T0006. One technique with no runtime detection possible.
      This is the grey cell — documented, accepted, not in the backlog.

      Deployment-specific (blue annotation): AML.T0029. One technique with camera-facing
      deployment-specific coverage via patch_detector.py. Not green (not universally
      covered), not red (covered in scope). Annotated separately in the Navigator export.

      After Chapter 12 integrations (Sections 12.03, 12.04, 12.05): AML.T0051 moves
      from score 1 to score 2 (intent classifier closes the obfuscated injection gap).
      AML.T0054 moves from 1 to 2 (adversarial training closes the novel jailbreak gap).
      AML.T0043 and AML.T0015 move from 1 to 2 (expanded adversarial classifier training).
      Four techniques at score 2: the green band begins.

      After Chapter 13 integrations (Sections 13.03, 13.04): AML.T0040 moves from 1 to
      2 (cross-user correlation closes distributed extraction gap). AML.T0020 moves from
      1 to 2 (drift monitor closes slow-drift poisoning gap). Six total techniques at
      score 2 by end of Part 3.

      The trajectory from the current heat map to the end-of-Part-3 target is the
      detection programme roadmap. It is communicable to leadership as a single slide:
      current state (mostly amber), Chapter 12 target (four green), Chapter 13 target
      (six green), future work backlog (three red to address post-Part 3).

