deliverables:

  deliverable_1:
    id: 'D11.05.1'
    filename: 'attck_coverage_heatmap.py'
    description: >
      Programmatic coverage heat map for the seven-track gateway. Reads the ATLAS technique
      inventory from atlas_attack_tree_mapper.py, computes coverage scores, diffs against
      a previous run to detect regression, checks for new ATLAS techniques, and outputs
      both an ASCII coverage table (terminal/CI use) and a Navigator JSON (leadership use).
      Integrates with the CI pipeline from Section 11.02 as a coverage gate.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'pyyaml>=6.0'
      - 'json (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''attck_coverage_heatmap.py
      Programmatic ATLAS coverage heat map for the seven-track gateway.
      Computes per-technique scores, detects regression vs previous run,
      checks for new ATLAS techniques, outputs ASCII table and Navigator JSON.
      Chapter 11, Section 11.05 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 attck_coverage_heatmap.py
        python3 attck_coverage_heatmap.py --diff previous_scores.json
        python3 attck_coverage_heatmap.py --save scores.json
        python3 attck_coverage_heatmap.py --check-new-techniques previous_techniques.json
      '''

      from __future__ import annotations
      import argparse
      import json
      import pathlib
      import sys
      from dataclasses import dataclass
      from datetime import datetime, timezone

      from atlas_attack_tree_mapper import (
          TECHNIQUES,
          CoverageStatus,
          coverage_score,
      )

      # ---------------------------------------------------------------------------
      # Score model
      # ---------------------------------------------------------------------------

      @dataclass
      class TechniqueScore:
          technique_id: str
          name: str
          score: int          # 0, 1, 2, or -1 for intentional gap
          intentional: bool
          residual_gap: str
          actionable_next_step: str
          assessed_at: str

      # ---------------------------------------------------------------------------
      # Score computation
      # ---------------------------------------------------------------------------

      def compute_scores(
          techniques: list,
          full_coverage_overrides: dict[str, bool] | None = None,
      ) -> list[TechniqueScore]:
          '''
          Compute coverage scores for all techniques.
          full_coverage_overrides: dict of technique_id -> True for manually confirmed
          score-2 promotions (requires chain_complete = True in the registry).
          '''
          overrides = full_coverage_overrides or {}
          now = datetime.now(timezone.utc).isoformat()
          scores: list[TechniqueScore] = []

          for t in techniques:
              base = coverage_score(t.coverage_status)
              intentional = t.coverage_status == CoverageStatus.NONE_INTENTIONAL

              # Score-2 requires explicit human sign-off via override and chain_complete
              if base == 2 and not (t.chain_complete and overrides.get(t.technique_id)):
                  base = 1   # auto-cap at 1 unless chain complete and manually confirmed

              scores.append(TechniqueScore(
                  technique_id=t.technique_id,
                  name=t.name,
                  score=base,
                  intentional=intentional,
                  residual_gap=t.residual_gap,
                  actionable_next_step=t.actionable_next_step,
                  assessed_at=now,
              ))

          return scores

      # ---------------------------------------------------------------------------
      # Regression diff
      # ---------------------------------------------------------------------------

      @dataclass
      class ScoreDelta:
          technique_id: str
          name: str
          previous: int
          current: int
          direction: str    # 'improved' | 'regressed' | 'unchanged'

      def diff_scores(
          current: list[TechniqueScore],
          previous_path: pathlib.Path,
      ) -> list[ScoreDelta]:
          with open(previous_path) as f:
              prev_data: dict[str, int] = json.load(f)

          deltas: list[ScoreDelta] = []
          for s in current:
              prev_score = prev_data.get(s.technique_id, -99)
              if prev_score == -99:
                  continue  # new technique; not a regression
              if s.score > prev_score:
                  direction = 'improved'
              elif s.score < prev_score:
                  direction = 'regressed'
              else:
                  direction = 'unchanged'
              deltas.append(ScoreDelta(
                  technique_id=s.technique_id,
                  name=s.name,
                  previous=prev_score,
                  current=s.score,
                  direction=direction,
              ))
          return deltas

      # ---------------------------------------------------------------------------
      # New technique check
      # ---------------------------------------------------------------------------

      def check_new_techniques(
          current: list[TechniqueScore],
          previous_techniques_path: pathlib.Path,
      ) -> list[str]:
          '''Returns technique IDs present in current inventory but absent from previous run.'''
          with open(previous_techniques_path) as f:
              prev_ids: list[str] = json.load(f)
          current_ids = {s.technique_id for s in current}
          return sorted(current_ids - set(prev_ids))

      # ---------------------------------------------------------------------------
      # ASCII output
      # ---------------------------------------------------------------------------

      SCORE_LABELS = {-1: 'INTENTL', 0: 'NONE   ', 1: 'PARTIAL', 2: 'FULL   '}
      SCORE_SYMBOLS = {-1: '◈', 0: '✗', 1: '◑', 2: '✓'}

      def print_ascii_heatmap(scores: list[TechniqueScore]) -> None:
          actionable = [s for s in scores if not s.intentional and s.score < 2]
          full = [s for s in scores if s.score == 2]
          intentional = [s for s in scores if s.intentional]

          print('\nATLAS Coverage Heat Map — Seven-Track Gateway')
          print(f'Generated: {datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")}')
          print(f'Techniques assessed: {len(scores)}')
          print(f'  Full (✓):      {len(full)}')
          print(f'  Partial/None:  {len(actionable)}')
          print(f'  Intentional:   {len(intentional)}')
          print()
          print(f'{"ID":<14} {"Score":<10} {"Sym":<4} {"Name":<45} Gap / Status')
          print('-' * 120)
          for s in sorted(scores, key=lambda x: (-x.score if not x.intentional else -2, x.technique_id)):
              label = SCORE_LABELS.get(s.score, '?      ')
              sym = SCORE_SYMBOLS.get(s.score, '?')
              gap_short = (s.residual_gap[:45] + '...') if len(s.residual_gap) > 45 else s.residual_gap
              print(f'{s.technique_id:<14} {label:<10} {sym:<4} {s.name:<45} {gap_short}')
          print()

      def print_regression_report(deltas: list[ScoreDelta]) -> int:
          regressions = [d for d in deltas if d.direction == 'regressed']
          improvements = [d for d in deltas if d.direction == 'improved']
          print(f'Coverage Diff Report')
          print(f'  Improved:  {len(improvements)}')
          print(f'  Regressed: {len(regressions)}')
          print(f'  Unchanged: {len([d for d in deltas if d.direction == "unchanged"])}')
          if regressions:
              print('\n  REGRESSIONS (investigate before merging):')
              for d in regressions:
                  print(f'    {d.technique_id} ({d.name}): {d.previous} → {d.current}')
          if improvements:
              print('\n  Improvements:')
              for d in improvements:
                  print(f'    {d.technique_id} ({d.name}): {d.previous} → {d.current}')
          print()
          return 1 if regressions else 0

      # ---------------------------------------------------------------------------
      # Save scores for future diff
      # ---------------------------------------------------------------------------

      def save_scores(scores: list[TechniqueScore], path: pathlib.Path) -> None:
          data = {s.technique_id: s.score for s in scores}
          with open(path, 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Scores saved to {path} for future diff.')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='ATLAS coverage heat map generator')
          parser.add_argument('--diff', metavar='PREV_SCORES_JSON',
                              help='Diff current scores against previous run JSON')
          parser.add_argument('--save', metavar='OUTPUT_JSON',
                              help='Save current scores to JSON for future diff')
          parser.add_argument('--check-new-techniques', metavar='PREV_TECHNIQUES_JSON',
                              help='Report technique IDs added since previous run')
          args = parser.parse_args()

          # Compute current scores
          # Score-2 overrides would go here after human sign-off; none yet in Part 2
          scores = compute_scores(TECHNIQUES, full_coverage_overrides={})
          print_ascii_heatmap(scores)

          exit_code = 0

          if args.diff:
              prev_path = pathlib.Path(args.diff)
              if not prev_path.exists():
                  print(f'Previous scores file not found: {prev_path}')
              else:
                  deltas = diff_scores(scores, prev_path)
                  regression_code = print_regression_report(deltas)
                  exit_code = max(exit_code, regression_code)

          if args.check_new_techniques:
              prev_path = pathlib.Path(args.check_new_techniques)
              if prev_path.exists():
                  new_ids = check_new_techniques(scores, prev_path)
                  if new_ids:
                      print(f'New ATLAS techniques detected (add to backlog):')
                      for tid in new_ids:
                          print(f'  {tid}')
                      print()

          if args.save:
              save_scores(scores, pathlib.Path(args.save))

          return exit_code

      if __name__ == '__main__':
          sys.exit(main())

  deliverable_2:
    id: 'D11.05.2'
    filename: 'detection_gap_prioritiser.py'
    description: >
      Ranks actionable ATLAS coverage gaps by likelihood × impact score, producing an
      ordered detection development backlog. Used before each sprint to confirm the next
      detector to build closes the highest-priority open gap. Also validates post-build:
      given a new detector's technique IDs, confirms the targeted gap has improved.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''detection_gap_prioritiser.py
      Ranks actionable ATLAS coverage gaps by likelihood x impact.
      Produces an ordered detection development backlog.
      Validates post-build: given new detector technique IDs, confirms gap closed.
      Chapter 11, Section 11.05 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 detection_gap_prioritiser.py
        python3 detection_gap_prioritiser.py --validate AML.T0051 AML.T0054
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass

      from atlas_attack_tree_mapper import TECHNIQUES, CoverageStatus, coverage_score

      # ---------------------------------------------------------------------------
      # Likelihood and impact registry
      # ---------------------------------------------------------------------------
      # Scored 1-5: likelihood = probability of use against this deployment type
      # (public LLM API, Chapter 11 reference deployment); impact = consequence
      # if technique succeeds. Scores are fixed for the gateway reference threat model.

      LIKELIHOOD: dict[str, int] = {
          'AML.T0051': 5,   # Active probing of public LLM APIs is continuous
          'AML.T0054': 5,   # Novel jailbreak templates released regularly and tested immediately
          'AML.T0043': 3,   # Requires adversarial ML capability; targeted deployments
          'AML.T0015': 3,   # Shared likelihood with AML.T0043
          'AML.T0020': 2,   # Requires training pipeline access; rare but high-value
          'AML.T0019': 2,   # Requires training pipeline access for insertion
          'AML.T0040': 3,   # Model extraction is well-documented; monetised in underground markets
          'AML.T0029': 2,   # Camera-facing deployments only; limited exposure
          'AML.T0006': 1,   # Staging is attacker-controlled; not measurable
          'AML.T0022': 2,   # Membership inference is research-grade; rare in production
          'AML.T0024': 1,   # Model inversion requires many queries; detectable via rate limiting
      }

      IMPACT: dict[str, int] = {
          'AML.T0051': 5,   # Full model instruction override
          'AML.T0054': 4,   # Policy bypass; may not cause full system compromise
          'AML.T0043': 4,   # Targeted misclassification; model integrity
          'AML.T0015': 4,   # Evasion outcome; same impact as AML.T0043
          'AML.T0020': 5,   # Persistent model behaviour corruption; hard to remediate
          'AML.T0019': 4,   # Trigger-controlled output; persistent
          'AML.T0040': 5,   # IP theft; evasion toolkit construction from stolen model
          'AML.T0029': 3,   # Physical domain; limited to camera-facing deployments
          'AML.T0006': 1,   # Staging; no direct impact at inference time
          'AML.T0022': 3,   # Training data privacy; regulatory and compliance impact
          'AML.T0024': 3,   # Training data reconstruction; privacy and IP impact
      }

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class GapItem:
          technique_id: str
          name: str
          current_score: int
          likelihood: int
          impact: int
          priority: int
          residual_gap: str
          actionable_next_step: str
          intentional: bool

      # ---------------------------------------------------------------------------
      # Prioritiser
      # ---------------------------------------------------------------------------

      def build_backlog(techniques: list) -> list[GapItem]:
          items: list[GapItem] = []
          for t in techniques:
              score = coverage_score(t.coverage_status)
              intentional = t.coverage_status == CoverageStatus.NONE_INTENTIONAL
              likelihood = LIKELIHOOD.get(t.technique_id, 1)
              impact = IMPACT.get(t.technique_id, 1)
              priority = likelihood * impact
              items.append(GapItem(
                  technique_id=t.technique_id,
                  name=t.name,
                  current_score=max(score, 0),
                  likelihood=likelihood,
                  impact=impact,
                  priority=priority,
                  residual_gap=t.residual_gap,
                  actionable_next_step=t.actionable_next_step,
                  intentional=intentional,
              ))
          # Sort: intentional gaps last, then by priority descending, then by score ascending
          items.sort(key=lambda x: (x.intentional, -x.priority, x.current_score))
          return items

      def print_backlog(items: list[GapItem]) -> None:
          actionable = [i for i in items if not i.intentional and i.current_score < 2]
          intentional = [i for i in items if i.intentional]
          full = [i for i in items if i.current_score == 2]

          print('\nDetection Gap Prioritisation Backlog')
          print(f'Actionable gaps: {len(actionable)}')
          print(f'Full coverage:   {len(full)}')
          print(f'Intentional:     {len(intentional)}')
          print()
          print(f'{"#":<4} {"Technique":<14} {"Score":<7} {"L":<4} {"I":<4} {"P=LxI":<8} {"Name":<40} Next Step')
          print('-' * 140)

          rank = 1
          for item in items:
              if item.intentional:
                  label = 'INTENTL'
                  next_step_short = 'No action required.'
              elif item.current_score == 2:
                  label = 'FULL   '
                  next_step_short = 'Maintain; re-assess quarterly.'
              else:
                  label = f'{item.current_score}/2    '
                  ns = item.actionable_next_step
                  next_step_short = (ns[:55] + '...') if len(ns) > 55 else ns

              name_short = (item.name[:38] + '..') if len(item.name) > 38 else item.name
              l_str = str(item.likelihood) if not item.intentional else '-'
              i_str = str(item.impact) if not item.intentional else '-'
              p_str = str(item.priority) if not item.intentional else '-'

              print(f'{rank:<4} {item.technique_id:<14} {label:<7} {l_str:<4} {i_str:<4} {p_str:<8} {name_short:<40} {next_step_short}')
              rank += 1
          print()

      # ---------------------------------------------------------------------------
      # Post-build validator
      # ---------------------------------------------------------------------------

      def validate_gap_closure(
          technique_ids: list[str],
          items: list[GapItem],
      ) -> int:
          '''
          Given a list of technique IDs that a newly built detector claims to cover,
          confirms whether the targeted gaps have improved in the current backlog.
          Returns 0 (all gaps improved or closed) or 1 (some gaps not improved).
          '''
          print(f'\nPost-Build Gap Closure Validation')
          print(f'Validating techniques: {", ".join(technique_ids)}\n')
          exit_code = 0
          by_id = {i.technique_id: i for i in items}
          for tid in technique_ids:
              item = by_id.get(tid)
              if item is None:
                  print(f'  UNKNOWN  {tid}: not in ATLAS technique registry.')
                  exit_code = 1
                  continue
              if item.intentional:
                  print(f'  SKIP     {tid}: intentional gap — no detector expected.')
                  continue
              if item.current_score == 2:
                  print(f'  FULL     {tid} ({item.name}): already at score 2. No gap to close.')
                  continue
              # Score < 2 and not intentional: gap exists; detector claims to address it
              # In production: re-run coverage score with new detector in place and compare
              print(f'  GAP [{item.current_score}/2] {tid} ({item.name}):')
              print(f'     Residual gap: {item.residual_gap[:80]}')
              print(f'     Expected improvement: score {item.current_score} → {item.current_score + 1}')
              print(f'     Confirm by running: attck_coverage_heatmap.py --diff <prev_scores.json>')
          return exit_code

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Detection gap prioritiser')
          parser.add_argument(
              '--validate', nargs='+', metavar='TECHNIQUE_ID',
              help='Validate that a new detector closes the specified technique gaps',
          )
          args = parser.parse_args()

          items = build_backlog(TECHNIQUES)
          print_backlog(items)

          if args.validate:
              return validate_gap_closure(args.validate, items)

          return 0

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.05.1'
    mistake: 'Promoting a technique from score 1 to score 2 automatically when a new rule is added'
    why_it_happens: >
      The natural instinct is that adding a rule improves coverage, so the score should
      increase. Automating the promotion feels like a reward for building the new rule.
    why_it_matters: >
      Score 2 is a claim that all known variants of a technique are covered. That claim
      requires human verification that the new rule closes the specific residual gap
      documented in the ATLASTechnique registry, not just that a new rule fires on some
      inputs. A rule that adds partial coverage on top of existing partial coverage should
      produce a better score-1 entry, not a score-2 entry.
    correct_approach: >
      Score-2 promotion requires two conditions: chain_complete is set to True in the
      ATLASTechnique registry by a detection engineer who has confirmed no evasion variants
      exist, and a full_coverage_override is passed to compute_scores() in
      attck_coverage_heatmap.py. Both require human action. The pipeline cannot auto-promote.

  - id: 'CM11.05.2'
    mistake: 'Building the gap backlog by priority score alone, ignoring sequential dependencies between gaps'
    why_it_happens: >
      The priority score produces a clear ordered list. Working from the top feels
      methodical and data-driven.
    why_it_matters: >
      Some gaps have dependencies. AML.T0015 (Evade ML Model) shares its residual gap
      with AML.T0043 (Craft Adversarial Data): closing AML.T0043 closes AML.T0015
      automatically. Building a separate detector for AML.T0015 wastes engineering effort.
      Similarly, the Chapter 12 intent classifier that closes AML.T0051 also reduces the
      residual gap for AML.T0054. Sequential dependencies mean the backlog ordering is
      a starting point, not a rigid prescription.
    correct_approach: >
      Before beginning a detection sprint, check the ATLASTechnique registry for
      chain_gap_link fields that reference another technique. Shared-gap techniques
      should be batched into the same sprint as their parent gap. The gap prioritiser
      output includes the actionable_next_step field, which names the chapter section
      that addresses each gap — sprint planning uses this to batch related work.

  - id: 'CM11.05.3'
    mistake: 'Running the coverage heat map only once per quarter and not integrating it into CI'
    why_it_happens: >
      The quarterly cadence is described as the minimum viable frequency. Teams interpret
      minimum as sufficient and do not add the coverage check to the weekly CI run.
    why_it_matters: >
      A rule calibration PR merged on Monday that causes a coverage regression will not
      be caught until the quarterly review — potentially weeks later. During that window,
      the detection programme reports score-1 coverage for a technique that is now
      effectively score-0 for obfuscated variants.
    correct_approach: >
      Run attck_coverage_heatmap.py --diff in CI on every merge to main, in diff mode
      against the last stable scores JSON. Set the pipeline to fail if any technique
      score regresses without an explicit override in the PR. The quarterly review is for
      the manual steps (TI review, new technique check) that CI cannot automate.

  - id: 'CM11.05.4'
    mistake: 'Presenting the heat map to leadership without explaining the partial/full distinction'
    why_it_happens: >
      Leadership audiences are not familiar with the three-tier scoring model. Amber
      cells look like progress; the nuance that amber means confirmed residual gap is lost.
    why_it_matters: >
      Leadership makes investment decisions based on the heat map. If six amber techniques
      are presented as "covered," the investment case for Chapter 12 and 13 detectors
      disappears. The team loses the resource allocation needed to close the highest-
      priority gaps.
    correct_approach: >
      Always present the heat map with a legend slide that defines the three tiers.
      Lead with the amber cells and their residual gaps, not with the number of techniques
      that have any coverage. The narrative is: "We detect these six techniques partially;
      here is what an attacker can still do; here is the investment required to close it."

  - id: 'CM11.05.5'
    mistake: 'Assigning likelihood and impact scores once and never revising them'
    why_it_happens: >
      Scoring threat likelihood and impact feels like a one-time calibration exercise.
      Once scored, the numbers go into the registry and are used without questioning.
    why_it_matters: >
      Threat likelihood changes as the threat landscape evolves. AML.T0040 (model
      extraction) had a moderate likelihood score two years ago; it is now a
      commercially available attack service. A likelihood score of 3 that should have
      been revised to 5 means the distributed extraction gap (currently Priority 15)
      is being treated as lower priority than it deserves.
    correct_approach: >
      Review likelihood and impact scores quarterly as part of the same review cadence
      as the technique inventory. Use threat intelligence from the previous quarter to
      justify any score changes. Document score changes in the detection programme''s
      decisions.md (append-only).

section_summary:
  what_you_learned: |
    Coverage measurement converts the technique inventory from a static list into a
    living programme metric. The three-tier scoring model (0/1/2) makes quality explicit:
    partial coverage is not full coverage and the score makes that visible to both
    engineers and leadership. Gap prioritisation converts the backlog from an unordered
    list into a ranked development plan ordered by likelihood × impact. The seven-track
    gateway scores six techniques at 1, three at 0, one intentional gap, and one
    deployment-specific partial — producing a clear roadmap: Chapter 12 closes four
    gaps to score 2, Chapter 13 closes two more, three red-cell gaps remain for future
    tracks. Coverage drift is caught by CI diff mode (weekly) and quarterly manual
    review for threat intelligence and taxonomy updates.
  key_terms:
    - term: 'Three-tier coverage score'
      definition: >
        The 0/1/2 scoring model for ATLAS technique coverage. 0 = no detection rule fires;
        1 = at least one rule fires but confirmed evasion variants exist; 2 = all known
        variants covered, chain complete, human sign-off required for promotion.
    - term: 'Coverage drift'
      definition: >
        The degradation of coverage scores over time due to rule regression via calibration,
        ATLAS taxonomy expansion, or attack variant evolution. Caught by scheduled diff runs
        and quarterly threat intelligence review.
    - term: 'Gap prioritisation'
      definition: >
        The ranking of actionable coverage gaps by likelihood × impact score to produce an
        ordered detection development backlog. High-likelihood, high-impact gaps are built first.
    - term: 'Coverage regression'
      definition: >
        A technique coverage score that decreases between two consecutive measurement runs.
        Caused by rule calibration that reduces true positive coverage, or by a new attack
        variant that evades all deployed rules. Triggers a CI failure in diff mode.
    - term: 'Score-2 promotion'
      definition: >
        The manual act of advancing a technique from partial to full coverage. Requires
        chain_complete set to True in the ATLASTechnique registry and an explicit override
        passed to the coverage scorer. Cannot be auto-promoted by adding rules alone.

preview_section_11_06:
  title: 'Sigma Rules: Format, Syntax, and AI-Specific Fields'
  teaser: |
    Section 11.06 builds Sigma fluency for AI security practitioners. The seven-track
    gateway uses Sigma rules for all five of its L1 detection primitives; Section 11.06
    explains the full Sigma YAML structure — title, id, status, logsource, detection,
    condition, falsepositives, level — and introduces the AI-specific field extensions
    that the gateway rules use: prompt_text, session_id, query_entropy, label_distribution,
    and inference_output. These extensions are the bridge between Sigma''s generic event
    model and the specific observable fields in an LLM inference API log. By the end of
    Section 11.06 the reader can write, review, and sigma-cli validate a Sigma rule for
    any of the eleven ATLAS techniques in the coverage registry.

