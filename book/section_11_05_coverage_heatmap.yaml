section_overview:
  one_line_summary: >
    Coverage measurement transforms a list of ATLAS techniques and Sigma rules into a
    scored, prioritised, and communicable detection posture — and coverage drift tracking
    ensures that posture does not silently degrade as new techniques emerge and existing
    rules evolve.
  why_this_section_exists: |
    Section 11.04 named every ATLAS technique relevant to the seven-track gateway and
    established the technique-to-detection chain for each. That inventory is precise but
    static: it tells you what is covered but not how well, not what is most urgent to fix,
    and not whether the programme is improving or degrading over time.

    Section 11.05 converts the inventory into a living measurement system. Coverage scores
    make quality explicit — partial is not the same as full and the score makes that visible.
    Gap prioritisation converts the backlog from an unordered list into an ordered one:
    high-likelihood, high-impact gaps first; theoretical but low-probability techniques last.
    Coverage drift tracking catches silent regression: a rule calibration that reduces false
    positives but also reduces true positive coverage degrades the coverage score without
    any engineer noticing unless the measurement runs on a schedule.

    The two deliverables in this section — the coverage heat map generator and the gap
    prioritiser — are operational tools used throughout Chapters 12 and 13. Every new
    detector those chapters build is evaluated against the gap prioritiser backlog to
    confirm it closes the intended gap before being merged to main.
  position_in_chapter: >
    Section 11.05 closes the measurement loop opened in Section 11.01 (coverage without
    measurement is a debt category) and operationalises the technique inventory from
    Section 11.04. Together, Sections 11.04 and 11.05 form the coverage measurement
    subsystem that Sections 11.06 through 11.13 build rules and detectors into.

learning_objectives:
  - 'Apply the three-tier coverage scoring model (0/1/2) to any ATLAS technique and explain why binary scoring is insufficient'
  - 'Construct a coverage heat map from a detection rule inventory, mapping each rule to its ATLAS technique and scoring coverage at the technique level'
  - 'Prioritise detection gaps using a likelihood × impact score and produce an ordered detection development backlog'
  - 'Identify the six highest-priority gaps in the seven-track gateway and name the Chapter 12 or 13 section that closes each'
  - 'Describe three mechanisms by which coverage drift occurs and explain how the quarterly review cadence catches each'
  - 'Interpret a coverage regression: given a before-and-after coverage report, identify which rule change caused the regression and what the delta means for risk'

prerequisites:
  required:
    - 'Section 11.04: complete ATLAS technique inventory; technique-to-detection chain for all 11 techniques'
    - 'Section 11.03: four-layer model; coverage gaps named per layer'
    - 'Section 11.02: rule metadata standard; mitre_technique field populated for all gateway rules'
  helpful:
