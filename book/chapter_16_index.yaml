chapter_overview:
  number: 16
  title: SIEM Integration
  part: 'Part 4: Practical Implementation'
  position: Chapter 16 of 4 in Part 4; second chapter of Part 4
  purpose: |
    Chapter 15 built the detector suite; Chapter 16 delivers its detections to the security operations tooling
    that actions them. The argument of the chapter is that a detection is operationally useless until it reaches
    a security analyst in a form they can act on, so integration with the SIEM is not an afterthought but the
    step that turns the detector suite into an operational capability.

    The chapter builds the integration surface: automated Sigma rule generation for portable detection logic,
    connectors for Splunk, Datadog, and Elastic, a custom webhook path for other platforms, and an alert
    enrichment pipeline. Two themes govern the work. First, portability: Sigma rules generated from the
    detectors deploy to any platform and stay in sync with the deployed detectors, avoiding lock-in and drift.
    Second, actionability: a raw detection is enriched with the Chapter 13 entity, session, and graph context,
    IOCs, and response actions, so it arrives at the SIEM as a contextualised, actionable alert rather than an
    isolated event. A shared detection-event schema is the contract every integration consumes. Chapter 16
    makes the detector suite an operational capability, and Chapter 17 monitors and tunes it.
  learning_path:
    transition: From the Chapter 15 detector suite to its integration with the SIEM platforms that action
      its detections
    integration_taxonomy: The integration surface -- Sigma, connectors, enrichment -- the platforms, and
      the detection-event schema
    sigma_generation: Automated Sigma rule generation for portable detection logic
    splunk: Splunk integration via the HTTP Event Collector and add-ons
    datadog: Datadog integration via the Logs API and metrics
    elastic: Elastic Stack integration via Logstash pipelines
    custom_enrichment: Custom SIEM integration through webhooks and the alert enrichment pipeline
    summary: 'Chapter 16 closure and Chapter 17 preview: from delivering detections to monitoring and
      tuning them'
  prerequisites:
    - 'Chapter 11 Section 11.02: Sigma rules and the signature layer the generated rules express'
    - 'Chapter 13 Section 13.11: the entity, session, and graph context the enrichment pipeline draws
      on'
    - 'Chapter 14 Section 14.08: the observability signals the Datadog metrics integration connects to'
    - 'Chapter 15 Section 15.07: the combined detection pipeline whose detections these integrations deliver'
  structure:
