  security_themes:
    a_detection_that_is_not_delivered_is_not_actioned: |
      A detection that never reaches a security analyst in an actionable form is operationally useless, so SIEM
      integration is the step that turns the detector suite from a signal source into an operational capability.
    portability_avoids_lock_in_and_drift: |
      Sigma rules generated from the detectors deploy to any platform and stay in sync with the deployed detectors,
      avoiding both platform lock-in and the drift between the SIEM rules and the detectors they are meant to mirror.
    enrichment_makes_a_detection_actionable: |
      A raw detection is an isolated event; an enriched alert carries the entity, session, and graph context of
      Chapter 13, IOCs, and response actions, so it arrives at the SIEM as something a responder can act on rather
      than an event they must investigate from scratch.
    a_shared_schema_is_the_integration_contract: |
      Every platform integration consumes one detection-event schema, so a detection is expressed once and delivered
      to every platform, and automated rule deployment keeps the SIEM rules current with the detectors.
  progression:
