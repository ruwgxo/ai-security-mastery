key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Sleeping injection defeats point-in-time scanning because the payload is
        conditionally injective -- it scores below threshold in isolation and
        reveals injection character only when the triggering condition is present.
        Point-in-time scans cannot detect it; activation monitoring is required.

    - number: 2
      takeaway: |
        Four trigger condition types cover the sleeping injection design space:
        query keyword, user identity, time/counter, and context content. Each
        has a distinct Sigma rule structure based on the conditional construct
        (condition clause + conditional marker + model-directed consequent).

    - number: 3
      takeaway: |
        Payload staging minimises write-time footprint by keeping the full
        payload external to the monitored store. The initial entry contains
        only the trigger and a retrieval pointer. Direct content scanning
        cannot detect it; external retrieval monitoring is required.

    - number: 4
      takeaway: |
        Canary tokens detect sleeping injection after activation by monitoring
        for unique planted values in model outputs. They provide detection
        independent of payload content and complement conditional construct
        pattern detection, which provides pre-activation coverage.

    - number: 5
      takeaway: |
        Trigger specificity is an intelligence indicator. Highly specific
        trigger conditions (targeting a named user, a specific internal process,
        a precise counter value) indicate an adversary with detailed knowledge
        of the deployment's operations and suggest a targeted rather than
        opportunistic attack.

    - number: 6
      takeaway: |
        The purge procedure requires full-store scanning (not just recent
        additions), write-time audit attribution, impact assessment of sessions
        that retrieved flagged entries, and post-purge canary validation to
        confirm completeness. Partial purge leaves variants in place.

    - number: 7
      takeaway: |
        Cross-store chaining keeps the actual payload out of the monitored
        store entirely. The initial entry is a pointer; the payload is fetched
        externally on activation. Monitoring for anomalous external retrieval
        events triggered during routine agent operations is the detection approach.

    - number: 8
      takeaway: |
        The three temporal injection patterns are additive: a multi-turn injection
        (6.11) can seed a persistent memory payload (6.12) that becomes a sleeping
        injection (6.13) in the next phase. Complete temporal injection coverage
        requires all three detection layers operating together.


