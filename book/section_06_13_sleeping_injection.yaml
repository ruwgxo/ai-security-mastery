section_summary: |
  Section 6.13 established sleeping injection as the most patient and hardest-to-
  detect variant in the temporal injection taxonomy. Its defining property is
  conditionality: the payload activates only when a specific trigger condition
  is met, scoring ambiguously in isolation and defeating point-in-time content
  scanning. The four trigger condition types (query keyword, user identity,
  time/counter, context content) cover the full design space, each with a
  distinct Sigma rule structure detecting the three-component conditional
  construct. Payload staging further reduces write-time footprint by keeping
  the full payload external to the monitored store.

  Two complementary detection approaches address sleeping injection at different
  phases: conditional construct pattern detection provides pre-activation coverage
  by flagging if/when/then structures in retrieved content before they enter the
  LLM context; canary token activation monitoring provides post-activation
  detection by identifying unique planted values in model outputs. The purge
  procedure completes the lifecycle with five steps: full-store scanning,
  classification, purge with write-time attribution, impact session assessment,
  and post-purge canary validation.

  Section 6.13 closes the temporal injection block. The three sections together
  (6.11 multi-turn, 6.12 persistent agent, 6.13 sleeping) form a layered and
  additive threat model -- each pattern can seed the next. Complete detection
  requires all three layers. Section 6.14 begins the real-world incident analysis
  block with the Bing Chat Sydney incident, the most prominent documented case
  of indirect web injection in production.
...
