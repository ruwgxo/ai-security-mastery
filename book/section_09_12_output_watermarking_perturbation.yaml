section_overview:
  one_line_summary: |
    The output-side capstone embeds a cryptographic watermark in every model
    response via token-level probability shaping, adds calibrated noise through
    adaptive perturbation to reduce per-query extraction information, and
    closes OWASP LLM10 by covering the benchmark-distribution distillation gap
    that input-side monitoring cannot address.

  why_this_section_exists: |
    Section 9.11 closed the input-side half of OWASP LLM10. It monitors query
    patterns, enforces extraction-aware rate limits, and detects distributed
    campaigns. But the Section 9.10 empirical table showed a 30 to 40 percent
    detection rate for benchmark-distribution LLM distillation -- the Alpaca and
    Vicuna pattern where query distributions are analytically indistinguishable
    from legitimate evaluation use. No input-side monitoring technique can close
    this gap because the gap is definitional: the adversary''s queries are
    legitimate. Section 9.12 closes it from the output side.

    Output-side defence introduces a new architectural stage that no prior chapter
    required. Chapters 6, 7, and 8 all defended inputs -- the injection classifier
    reads user input, the auditing pipeline examines training data. Section 9.11
    also defends inputs -- the query monitor scores the incoming request. Section
    9.12 defends outputs: the watermarker and perturbator modify the model''s
    response before it is returned to the user. This post-inference stage is
    structurally novel and architecturally significant.

    Two primitives operate at this stage. The watermarker embeds a cryptographic
    signal in every response by biasing token sampling probabilities using a
    secret key. The signal is statistically detectable in the aggregate but
    imperceptible in any individual response. A surrogate model trained on
    watermarked outputs inherits the bias because it is trained to replicate
    the teacher''s output distribution. The perturbator adds calibrated noise
    to reduce per-query extraction information -- particularly effective against
    soft-label distillation and prompt extraction. Together they form the output-
    side defensive surface that, combined with Section 9.11, achieves full
    OWASP LLM10 coverage across all five LLM10 sub-risks.

  position_in_chapter: |
    Section 9.12 of 13. Output-side production capstone. Completes OWASP LLM10
    alongside Section 9.11. The watermark detection workflow is the post-
    deployment ownership verification mechanism that the Section 9.9 incident
    analysis identified as absent from every documented extraction incident.

learning_objectives:
  knowledge:
    - 'Explain the token-level watermarking mechanism: vocabulary partitioning with a secret key, logit biasing during sampling, and the green token proportion as the detection signal'
    - 'Describe the statistical detection test: the z-score under the null hypothesis and the p-value threshold for watermark confirmation'
    - 'Explain why the watermark transfers from victim to student during distillation training'
    - 'Describe output perturbation theory: how calibrated noise reduces mutual information between true and observed outputs'
    - 'Articulate the utility-protection tradeoff and why zero-leakage requires zero-utility'
    - 'Explain adaptive perturbation: how per-request risk scoring drives perturbation strength'

  skills:
    - 'Implement token-level watermarking with HMAC-based vocabulary partitioning'
    - 'Build a statistical watermark detector computing the green-token z-score and p-value'
    - 'Implement calibrated output perturbation with configurable noise levels'
    - 'Build an adaptive perturbation controller that scales noise with query risk score'
    - 'Run a watermark robustness benchmark across paraphrasing, truncation, and distillation'
    - 'Run a utility validation harness measuring degradation across perturbation strength levels'
    - 'Work through the watermark verification workflow against a suspected surrogate'
    - 'Complete the 8-item output-side deployment checklist'

  security_mindset:
    - 'Internalise that watermarking provides ownership evidence, not extraction prevention -- the two are complementary, not substitutable'
    - 'Recognise that perturbation must be calibrated against the utility-protection tradeoff -- excessive perturbation destroys the product'
    - 'Understand that watermark robustness is an active research area -- adversarially designed watermark removal may succeed, especially given sufficient queries'
    - 'Appreciate that the output-side stage is a new attack surface: an adversary who can observe enough output can attempt to infer the watermark key; key rotation policy is required'

prerequisites:
  - 'Section 9.4: distillation attacks and why output information survives into the student (watermark transfer mechanism)'
  - 'Section 9.5: prompt extraction and per-query leakage as the defence metric'
  - 'Section 9.10: output entropy monitor (feeds adaptive perturbation controller)'
  - 'Section 9.11: query monitor ensemble score (feeds adaptive perturbation controller)'
  - 'Chapter 3: LLM token sampling and probability distributions (watermarking operates on the sampling step)'
  - 'Chapter 8 Section 8.13: differential privacy training (upstream privacy defence; perturbation is the downstream complement)'

prose_content:

  - part: 1
    title: 'The Output-Side Capstone: Design Brief and Architectural Position'
    body: |
      Every defensive component built in Chapters 6, 7, 8, and Section 9.11
      operates on inputs. The injection classifier scores user input. The training
      data auditor examines training examples. The query monitor scores incoming
      requests. None of these components touches the model''s response. Section
      9.12 adds the first output-side defensive stage in the book: a post-inference
      processing layer that modifies the model''s response before it is transmitted
      to the user.

      The architectural position is straightforward: output post-processing runs
      after the model produces a response and before the response reaches the
      API gateway''s response serialiser. It receives the model''s raw output --
      the token log-probabilities for LLMs, the class probability vector for
      classifiers -- and produces a modified output that carries both the watermark
      and the perturbation noise. The user receives the modified output;
      the model never sees it modified.

      Two components share this stage. The watermarker operates during token
      sampling, biasing the selection probabilities to prefer tokens in a key-
      dependent "green" partition. It does not change what the model generates
      in aggregate -- the semantic content of the response is unchanged -- but
      it introduces a detectable statistical signal into the token sequence.
      The perturbator operates on the final output probability distribution,
      adding calibrated noise before the output is serialised and returned.

      The design brief has three requirements. First, the watermark must survive
      distillation: a student model trained on watermarked outputs must inherit
      the green-token bias such that its outputs are detectable by the watermark
      detector. Second, the perturbator must not break the product: the utility
      degradation from perturbation must be below the product''s quality threshold
      at the default noise level. Third, both components must add negligible
      latency: the output stage runs after inference, which is already the
      dominant latency contributor; post-processing must add under 5ms.

  - part: 2
    title: 'Watermarking Theory: Embedding Cryptographic Signals in Model Outputs'
    body: |
      The theoretical foundation for token-level LLM watermarking was established
      by Kirchenbauer et al. 2023 ("A Watermark for Large Language Models").
      The scheme has two components: an embedding procedure that modifies the
      model''s token sampling during generation, and a detection procedure that
      tests whether a text sequence was generated by a watermarked model.

      The embedding procedure begins with a vocabulary partition. At each token
      position, the model computes a context hash: a deterministic function of
      the preceding tokens and a secret key. The context hash partitions the
      full vocabulary into two subsets of approximately equal size -- the green
      list (tokens the model should prefer) and the red list (tokens the model
      should suppress). The partition changes at every position because it depends
      on the context, making it impossible to predict which tokens are green without
      the secret key.

      During token sampling, the model adds a positive bias δ (delta) to the
      logits of all green-list tokens before applying softmax. This biases
      the sampling distribution toward the green partition without deterministically
      forcing any specific token. The resulting text is semantically indistinguishable
      from unmodified output for small δ values (typically δ = 2.0 or less) --
      the model''s preferred tokens still dominate, but the green tokens among
      equally-likely alternatives are systematically preferred.

      The detection procedure is a one-sided statistical test. Given a text
      sequence T of length n, count g = the number of tokens in T that fall in
      the green partition at their respective positions (using the same context
      hash and secret key). Under the null hypothesis -- text generated without
      the watermark -- each token is independently green with probability
      approximately 0.5. The test statistic z = (g - n × 0.5) / √(n × 0.25) is
      approximately normally distributed under the null. A z-score above a threshold
      (typically 4.0, corresponding to p < 0.00003) indicates watermark presence
      with high confidence.

  - part: 3
    title: 'Why the Watermark Transfers Through Distillation'
    body: |
      The watermark''s most important property for the Chapter 9 threat model is
      its survival through distillation. When an adversary trains a student model
      on watermarked outputs, the student learns to replicate the teacher''s output
      distribution -- including the green-token bias that the watermark introduces.

      The transfer mechanism is straightforward. During distillation data collection,
      the adversary queries the watermarked victim and collects (prompt, response)
      pairs. Each response was generated with the green-token bias active: the
      response tokens are systematically drawn from the green partition more often
      than 50 percent of the time. The student is trained on these responses as
      target text. The student''s training objective is to predict the next token
      given the context -- to match the observed token distribution in the training
      data. The training data has a green-token excess. The student learns to
      prefer green tokens in the contexts where the teacher preferred them.

      After training, the student model generates text with a green-token fraction
      above 0.5, even though the student has no explicit knowledge of the watermark
      scheme and no access to the secret key. The student has learned the watermark
      as a statistical property of the training data distribution. The watermark
      detector, applied to the student''s outputs, observes this excess and rejects
      the null hypothesis.

      The transfer fidelity is highest when: the student is trained on a large
      volume of watermarked outputs, the watermark strength δ is high, and the
      student architecture is large enough to represent the fine-grained distributional
      preferences the watermark encodes. For smaller students or very small
      distillation datasets, the watermark signal in the student''s outputs is weaker
      and the detector requires more text to confirm presence at the target confidence
      level.

  - part: 4
    title: 'Output Perturbation Theory: Calibrated Noise and Extraction Efficiency'
    body: |
      Output perturbation adds calibrated noise to the model''s output distribution
      before it reaches the user. For classifiers, this means adding noise to the
      confidence score vector -- shifting each class probability by a random amount
      drawn from a calibrated distribution. For LLMs, this means truncating the
      output probability distribution (top-k truncation), rounding probabilities
      to a coarser resolution, or applying temperature shaping that makes the
      distribution less informative.

      The information-theoretic basis for perturbation''s extraction efficiency
      reduction is mutual information. The adversary observes the perturbed output
      y_tilde = y + noise, where y is the true output and noise is drawn from
      a zero-mean distribution with variance σ². The mutual information I(y;
      y_tilde) decreases as σ² increases. For Gaussian noise with variance σ²,
      the mutual information between the true and observed output is
      0.5 × log(1 + y_var / σ²), where y_var is the variance of the true output
      across inputs. At σ² = y_var (noise equal to signal variance), the mutual
      information is halved: the adversary obtains only half the extraction
      information per query.

      The practical consequence: at moderate perturbation strength, the adversary
      needs approximately twice the query budget to achieve the same surrogate
      fidelity as against an unperturbed API. This is an extraction friction
      factor of 2x rather than a fundamental barrier -- a patient adversary with
      double the budget can still complete the extraction. The friction value is
      real but bounded.

      The utility-protection tradeoff is the binding constraint. Perturbation that
      halves extraction efficiency also halves the precision of the API''s outputs
      for legitimate users. A medical imaging classifier that returns perturbed
      confidence scores is less reliable as a diagnostic support tool. The
      calibration challenge is finding the noise level that meaningfully increases
      extraction cost while remaining below the product''s quality threshold.
      Section 9.12 builds the utility validation harness (Deliverable 6) precisely
      to measure this tradeoff empirically for a given deployment.

  - part: 5
    title: 'Adaptive Perturbation: Risk-Weighted Response Modification'
    body: |
      Uniform perturbation applies the same noise level to every response regardless
      of the request''s extraction risk. This is suboptimal in both directions:
      it over-perturbs low-risk responses (degrading product quality unnecessarily)
      and under-perturbs the responses that matter most -- those to extraction-
      pattern queries where the adversary is actively collecting training data.

      Adaptive perturbation addresses both problems by scaling the noise level
      with the per-request risk score from the Section 9.11 query monitor. A
      request that receives a low composite score (0.10 -- consistent with
      legitimate use) receives minimal perturbation (noise at 10 percent of the
      full perturbation strength). A request that receives a high composite score
      (0.80 -- consistent with boundary extraction or systematic distillation)
      receives full perturbation.

      The risk-to-noise mapping function is configurable. A linear mapping
      (noise = base_noise + risk_score × (max_noise - base_noise)) is simple
      and predictable. A step function (low risk → no perturbation, medium risk
      → moderate perturbation, high risk → full perturbation) is easier to reason
      about operationally and produces cleaner utility characteristics.

      Adaptive perturbation has an additional adversary friction property: an
      adversary who observes that high-similarity queries receive more noisy
      responses learns that the system is monitoring their behaviour. This
      awareness may change their querying strategy -- which means the adaptive
      perturbation is itself a detection signal. An adversary who suddenly changes
      their query distribution after triggering elevated perturbation is exhibiting
      behaviour that the query monitor''s time-series tracking can flag.

      The privacy implication of adaptive perturbation is the same as adaptive
      rate limiting: the noise level applied to a user''s responses is a function
      of their computed risk score, which is a function of their behaviour. This
      differential treatment should be documented in the privacy notice and
      designed so that the noise level does not itself constitute a de facto
      disclosure to the user of their risk classification.

  - part: 6
    title: 'Watermark Robustness: Surviving Paraphrasing, Translation, and Distillation'
    body: |
      The watermark''s practical value depends on its robustness: whether the
      signal survives the transformations an adversary might apply to the victim''s
      outputs before using them or publishing a surrogate. Three transformations
      are most relevant to the Chapter 9 threat model.

      Paraphrasing attacks rewrite the watermarked text while preserving its
      semantic content. The adversary passes watermarked responses through a
      paraphrasing model (a separate LLM or a translation-back-translation chain)
      to replace green tokens with semantically equivalent red tokens. Paraphrasing
      attack success depends on the quality of the paraphrasing model and the
      watermark strength: weak watermarks (small δ) are vulnerable because few
      tokens are strongly biased; strong watermarks (large δ) are more robust
      because the green-token preference is more pronounced and harder to fully
      replace through semantic paraphrasing.

      Translation attacks translate the text to another language and back. The
      watermark operates on the vocabulary of the original language; a translation
      model does not preserve the source language''s green-token pattern. The
      translated-back text will have a green-token fraction near 0.5 -- the
      watermark signal is lost. This is a known limitation of vocabulary-partition
      watermarking schemes.

      Distillation attacks are the most relevant for the Chapter 9 threat model.
      As established in Part 3, distillation training on watermarked outputs
      preserves the watermark signal in the student''s outputs. The distillation
      watermark transfer rate is the fraction of the victim''s watermark signal
      that the student retains, measured as the z-score ratio between student
      and victim outputs on the same input set. At typical distillation training
      scales, the transfer rate is 0.4 to 0.8: the student''s outputs have a
      green-token fraction that is 40 to 80 percent as far from 0.5 as the victim''s.
      Detection remains possible but requires more text (longer responses or more
      samples) at lower transfer rates.

      The robustness benchmark in Deliverable 5 measures all three attack types
      empirically and produces the minimum text length required for detection
      at a target confidence level under each attack.

  - part: 7
    title: 'Output Transformation Defences: Rounding, Top-K Truncation, Temperature Shaping'
    body: |
      Three output transformation techniques provide perturbation without requiring
      the operator to add explicit noise -- they modify the output distribution
      structurally rather than additively.

      Probability rounding reduces the resolution of confidence scores by rounding
      them to the nearest multiple of a rounding quantum q. A confidence score of
      0.847 rounded to q = 0.05 becomes 0.85; rounded to q = 0.10 becomes 0.80.
      Rounding eliminates the fine-grained boundary information that soft-label
      extraction exploits: the adversary can no longer distinguish inputs that are
      very close to the boundary (confidence 0.51) from those that are clearly
      within a class (confidence 0.55). The larger the rounding quantum, the greater
      the extraction information reduction -- and the greater the utility degradation
      for legitimate users who rely on precise confidence calibration.

      Top-k truncation returns only the top-k class probabilities rather than the
      full distribution, setting all others to zero and renormalising. For a
      classifier with 1,000 classes, returning only the top-5 probabilities
      eliminates 99.5 percent of the output distribution''s information content.
      Top-k truncation is architecturally the simplest perturbation and has the
      most predictable extraction resistance: the adversary cannot observe the
      model''s probability assignments to classes outside the top-k, eliminating
      the boundary information those classes carry.

      Temperature shaping applies a modified temperature parameter to the output
      softmax. A temperature above 1.0 flattens the output distribution (more
      uniform, more noisy); a temperature below 1.0 sharpens it (more confident,
      less informative about near-boundary uncertainty). For extraction defence,
      a slightly elevated temperature (1.1 to 1.5) makes the output distribution
      less informative about the model''s true confidence structure. For hard-label
      APIs, temperature shaping affects the hard label selection at the boundary
      only marginally; for soft-label APIs, it meaningfully degrades the extraction
      information per query.

  - part: 8
    title: 'Closing OWASP LLM10: Combined Input-Side and Output-Side Coverage'
    body: |
      Section 9.11 closed the input-side half of OWASP LLM10. Section 9.12 closes
      the output-side half. Together they produce complete coverage across all five
      LLM10 sub-risks identified in Section 9.1.

      LLM10.1 -- intentional copying of model functionality. Input-side: the query
      monitor detects distillation campaign query patterns; the rate limiter imposes
      extraction budget costs. Output-side: the watermarker embeds the victim''s
      identity in every response; the watermark detector identifies surrogate models
      trained on those responses.

      LLM10.2 -- system prompt and configuration extraction. Input-side: the query
      monitor''s meta-query rate track and user concentration analyser detect prompt
      extraction campaigns. Output-side: the perturbator reduces per-query prompt
      leakage by generifying responses that would otherwise verbatim-reproduce
      prompt-derived content.

      LLM10.3 -- training data reconstruction via membership inference and model
      inversion. Input-side: the query monitor detects repeated querying of specific
      target records (the membership inference probing pattern). Output-side: the
      perturbator reduces per-response confidence score precision, degrading the
      membership inference signal. Upstream: differential privacy training from
      Section 8.13 provides the formal bound.

      LLM10.4 -- API economic abuse. Input-side: the rate limiter''s cost-per-hour
      and input-token-per-request dimensions cover denial-of-wallet and context
      padding. Output-side: the output entropy monitor''s token-count anomaly track
      flags unusually long responses.

      LLM10.5 -- surrogate model deployment. Input-side: not addressable at input
      time (the deployment has already occurred). Output-side: the watermark
      detector identifies victim model signatures in deployed surrogates; the
      verification workflow provides the legal evidence chain for ownership claims.

      The cumulative coverage across Chapters 6, 7, 8, and 9 now spans three of
      the ten OWASP LLM categories: LLM01 (prompt injection and jailbreak, Chapters
      6 and 7), LLM03 (training data poisoning, Chapter 8), and LLM10 (model theft,
      Chapter 9). Each was addressed with a full attack catalogue followed by
      production detection controls at two defensive surfaces.

