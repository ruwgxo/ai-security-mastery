        watermarking: 'Post-hoc ownership evidence; actionable for LLM10.5 (surrogate deployment)'
        perturbation: 'Extraction efficiency reduction; requires more queries for same fidelity; covers LLM10.1, 10.2, 10.3'
      - property: 'Utility cost'
        watermarking: 'Low: green-token bias is imperceptible at δ <= 2.0; text quality unchanged'
        perturbation: 'Moderate: scales with noise level; measured by utility validation harness'
      - property: 'Adversary evasion'
        watermarking: 'Paraphrasing, translation, watermark removal attacks; distillation transfer reduces but does not eliminate signal'
        perturbation: 'Patient adversary with large query budget can average out Gaussian noise; structural transforms harder to remove'
      - property: 'Key management requirement'
        watermarking: 'Secret key must be stored securely and rotated periodically; compromise enables watermark removal'
        perturbation: 'No key required; noise parameters do not need to be secret for Gaussian noise'
      - property: 'Output-side architectural position'
        watermarking: 'Applied during token sampling (pre-serialisation)'
        perturbation: 'Applied to final probability vector (post-sampling, pre-serialisation)'

