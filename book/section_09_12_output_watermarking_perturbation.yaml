  - table: 1
    title: 'Watermarking vs Perturbation: Mechanism, Timing, and Utility Cost'
    description: |
      Side-by-side comparison of the two output-side defence primitives.
    columns:
      - 'Property'
      - 'Output Watermarking'
      - 'Output Perturbation'
    rows:
      - property: 'Mechanism'
        watermarking: 'Token sampling bias via green-list vocabulary partition using secret key'
        perturbation: 'Additive noise or structural transformation (rounding, top-k, temperature) applied to output distribution'
      - property: 'Detection timing'
        watermarking: 'Post-hoc: watermark verified in suspected surrogate after extraction is detected'
        perturbation: 'No detection -- friction only; reduces extraction efficiency in real time'
