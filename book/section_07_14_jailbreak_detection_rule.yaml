    title: "Semantic Classifier Training and Threshold Calibration"
    type: "code_exercise"
    description: |
      Using jailbreak_classifier.py as a starting point, replace the rule-based
      scoring with a trained LightGBM classifier. Positive training data:
      jailbreak_catalog.get_training_examples_for_classifier() (46 entries) plus
      PAIR/TAP outputs from Section 7.12. Negative training data: 500+ benign
      turns from your deployment logs. Train, measure F1 on a held-out split,
      and calibrate the ENSEMBLE_ALERT_THRESHOLD to achieve FPR < 0.5% on your
      benign calibration set. Report precision, recall, and F1.
    deliverable: "semantic_classifier_training_report.md + jailbreak_classifier_trained.pkl"
    time_estimate: "90 minutes"
    dependencies:
      - "pip install lightgbm scikit-learn"
      - "Deployment log sample (500+ benign turns)"

  - id: "7.14.ex.02"
    title: "Ensemble Latency Benchmark"
    type: "code_exercise"
    description: |
      Run benchmark() from jailbreak_ensemble.py with 1000 iterations on your
      hardware. Record P50/P95/P99 for each track individually and for the full
      ensemble. If P99 exceeds 50ms: (1) identify which track is the bottleneck,
      (2) implement the mitigation (smaller perplexity model, caching, or async
      emit). Re-run benchmark after mitigation and verify P99 <= 50ms. Report
      before/after latency numbers.
    deliverable: "ensemble_latency_benchmark.md"
    time_estimate: "45 minutes"

  - id: "7.14.ex.03"
    title: "End-to-End Detection Validation"
    type: "code_exercise"
    description: |
      Run the complete ensemble against all red-team attack corpora collected
      across Sections 7.3-7.12 (at minimum 50 confirmed jailbreak attempts from
      the per-family exercises). For each confirmed attack: record which track(s)
      fired, at what confidence, and whether the final_decision was correct.
      Compute per-family precision, recall, and coverage. Identify any JB-XX
      catalog entry with zero detection coverage -- document as a gap for the
      investment backlog.
    deliverable: "end_to_end_validation_report.md"
    time_estimate: "60 minutes"
    depends_on: "7.14.ex.01,7.14.ex.02"

  - id: "7.14.ex.04"
    title: "OWASP LLM01 Sigma Rule SIEM Integration"
    type: "architecture_review"
    description: |
      Convert LLM01_SIGMA_RULE from llm01_sigma_and_monitoring.py into your SIEM's
      native format (Splunk SPL, Elasticsearch query, Sigma YAML, or equivalent).
      Deploy it against 24 hours of API gateway detection logs. Record: (1) alert
      volume, (2) top three alert families by frequency, (3) any cross-classifier
      composed alerts (Chapter 6 injection + Chapter 7 jailbreak in same session).
      This validates the complete OWASP LLM01 detection coverage end-to-end.
    deliverable: "sigma_rule_siem_deployment.md"
    time_estimate: "50 minutes"

# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Five detection tracks because jailbreak families have distinct signals.\
    \ No single classifier covers all families at acceptable FPR. Parallelisation\
    \ is the only way to run all five within the 50ms P99 latency budget."
  - "The semantic classifier (Track 1) is the only track built in this section.\
    \ The other four were built in Sections 7.7-7.10 and are imported here.\
    \ The ensemble is an integration exercise, not a rewrite."
  - "Track 3 (shot count detector) is the only track that runs on the FULL\
    \ assembled context, not the user input alone. This is the architecture\
    \ decision that catches many-shot via RAG. Every other track runs on\
    \ the user input."
  - "FPR calibration is deployment-specific and mandatory. The thresholds in\
    \ the code are conservative starting points. Calibrate against your\
    \ deployment's actual user population before production deployment."
  - "The unified LLM01 Sigma rule closes the loop on two chapters of attack\
    \ family analysis and detection build. The Chapter 6 injection classifier\
    \ and the Chapter 7 ensemble together cover every catalog entry across\
    \ both chapters."
  - "Monitoring is not optional. The jailbreak landscape evolves continuously.\
    \ Score distribution drift, FPR increase, and recall drop are the three\
    \ signals that trigger retraining. Without the monitoring dashboard, the\
    \ ensemble will degrade undetected."

