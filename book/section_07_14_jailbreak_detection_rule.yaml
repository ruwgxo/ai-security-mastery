# ===========================================================================
# SECTION CONTENT
# ===========================================================================

content:

  opening: |
    This section assembles the detection system that Sections 7.1 through 7.13
    have been building toward. The attack families are mapped. The feature sets
    are specified. Four of the five detector components are already implemented.
    What remains is: building the semantic classifier from the accumulated feature
    sets, combining all five tracks into a parallelised ensemble, integrating with
    the API gateway, completing the OWASP LLM01 Sigma rule, and establishing the
    monitoring infrastructure that keeps the ensemble calibrated over time.

    The design has three fixed constraints that every implementation decision must
    satisfy. First: 50ms P99 latency across all five tracks in parallel -- the
    threshold above which detection becomes a user-experience liability for
    synchronous API deployments. Second: FPR below 1% on benign traffic for the
    ensemble decision -- above this threshold, alert fatigue makes the system
    operationally unusable. Third: the ensemble must cover every catalog entry from
    Section 7.13 -- no JB-XX technique should exit the gateway without triggering
    at least one track above its alert threshold if it succeeds as a jailbreak.

    After this section, your API gateway detects prompt injection (Chapter 6)
    and jailbreak attempts (Chapter 7) across all OWASP LLM01 technique families.
    Together they constitute the first two completed detection rules in the book.
    Chapters 11 through 17 scale this pattern across the remaining OWASP LLM Top 10.

  subsections:

    - number: "7.14.1"
      title: "Architecture Overview: Five Tracks, One Gateway Decision"
      body: |
        The Chapter 7 detection system has five tracks, each handling a distinct
        signal family. All five run in parallel on every request. The gateway makes
        a unified block-or-pass decision based on the ensemble output.

        Track 1 — Semantic classifier. Handles all social engineering jailbreak
        families: persona and roleplay (S7.3), fictional framing (S7.4), instruction
        hierarchy (S7.6), and competing objectives (S7.11). Input: user turn text.
        Output: float confidence score. Placement: pre-inference on user input.

        Track 2 — Perplexity detector. Handles token-level adversarial suffixes:
        GCG (S7.9) and AutoDAN (S7.9). Input: user turn text. Output: typed
        PerplexityResult with anomaly flags and confidence. Placement: pre-inference
        on user input. Already built in Section 7.9.

        Track 3 — Shot count detector. Handles many-shot jailbreaking (S7.10).
        Input: full assembled prompt (system + retrieved context + user). Output:
        ShotCountResult with alert level and confidence. Placement: pre-inference on
        assembled context. Already built in Section 7.10. Critical placement note:
        this track runs on the assembled context, not the user input alone.

        Track 4 — Trajectory anomaly scorer. Handles gradual erosion (S7.7) and
        context manipulation (S7.5). Input: session state maintained across turns.
        Output: ErosionState.erosion_score and SessionState.overall_context_manipulation_score.
        Placement: per-turn with session-level state. Already built in Sections 7.5
        and 7.7.

        Track 5 — Coherence analyser. Handles payload splitting (S7.8). Input:
        turn text and session-level CoherenceState. Output: CoherenceState.coherence_score.
        Placement: per-turn with session-level state. Already built in Section 7.8.

        The Chapter 6 injection classifier (Section 6.17) runs in parallel as
        Track 0 — not part of the Chapter 7 ensemble but integrated into the
        same gateway decision. The unified decision covers OWASP LLM01 completely.

    - number: "7.14.2"
      title: "Track 1: Semantic Classifier Design and Training"
      body: |
        The semantic classifier is the only track not yet implemented as a complete
        artifact. Four prior sections specified its feature sets. This subsection
        assembles them into a deployable classifier.

        Feature set assembly. The classifier uses four feature sources, each
        implemented as a function in a prior section:

        From Section 7.3 `persona_jailbreak_taxonomy.py`: restriction negation
        density, identity establishment preamble detection, mode-switch claim
        patterns, token-budget threat language, nesting depth indicator, character-
        authority framing. Call: `get_feature_set_for_classifier()`.

        From Section 7.4 `fictional_framing_taxonomy.py` and
        `request_specificity_scorer.py`: all framing marker types (hypothetical,
        academic, narrative, counterfactual, distancing, attribution), specificity
        score as a continuous feature, framing diversity count. Call:
        `get_framing_feature_set()` and `score_specificity()`.

        From Section 7.6 `privilege_escalation_patterns.py`: authority claim flags,
        override instruction flags, privilege escalation flags, system prompt
        reference flags, formatting anomaly flags. Call: `extract_hierarchy_features()`.

        From Section 7.11 `competing_objective_detector.py`: all seven argument
        pattern categories, per-variant FPR-weighted confidence, combined confidence
        with specificity corroboration. Call: `detect_competing_objective()`.

        Model architecture. A lightweight gradient-boosted classifier (XGBoost or
        LightGBM) over the extracted feature vector is the production recommendation.
        It is fast (< 5ms inference), interpretable (feature importance), and robust
        to distribution shift when retrained on updated feature sets. A sentence
        transformer with a classification head is the higher-recall alternative
        (10-20ms inference) for deployments where recall is the priority. Both are
        implemented in `jailbreak_classifier.py`.

        Training data. Positive examples: `get_training_examples_for_classifier()`
        from `jailbreak_catalog.py` (46 entries from semantic families). Supplement
        with red-team outputs from Section 7.12 PAIR/TAP generation. Target 200+
        positive examples per family. Negative examples: production logs from benign
        sessions, stratified by use case to match deployment distribution. Target
        5000+ negative examples at 10:1 ratio to positives.

        Threshold calibration. Set per-family thresholds based on the FPR analysis
        from each taxonomy (Sections 7.3, 7.4, 7.6, 7.11). High-FPR families
        (medical pretext, research framing) require higher threshold for standalone
        alert; combine with specificity score. Low-FPR families (DAN, privilege
        escalation, dual newspaper test) can alert at lower threshold without
        specificity corroboration.

    - number: "7.14.3"
      title: "Ensemble Architecture: Parallelisation and Decision Logic"
      body: |
        Five tracks running sequentially would take 5× the latency of one track.
        Running in parallel takes approximately 1× the slowest track. The 50ms P99
        budget requires parallelisation: all five tracks launch concurrently,
        the ensemble waits for all results at a join point, then applies the decision
        logic.

        Implementation in Python uses `asyncio` for I/O-bound tracks (any that
        call external APIs) and `concurrent.futures.ThreadPoolExecutor` for
        CPU-bound tracks (all local classifiers). The shot count detector and
        trajectory scorer are CPU-bound. The perplexity detector is CPU-bound if
        the language model runs locally, I/O-bound if it calls an external service.
        For the 50ms budget, all models must run locally -- no external API calls
        in the detection path.

        Decision logic has three levels. Single-track high-confidence alert: any
        track with confidence above its standalone alert threshold (calibrated per
        track, independent of other tracks). This catches techniques where one track
        is definitively sufficient. Ensemble joint condition alert: two or more
        tracks above their respective monitoring thresholds. This catches composed
        attacks where no single track reaches standalone threshold but the combination
        is above the ensemble threshold. Session-level composed alert: Chapter 6
        injection classifier AND any Chapter 7 track above monitoring threshold in
        the same session -- the Section 7.1.6 composed attack pattern.

        Alert routing. Single-track high-confidence alerts route to the relevant
        detection category in the SIEM. Joint condition alerts route to a composed
        attack category with higher severity. Session-level composed alerts route
        to the highest severity category and trigger a session review queue.

        The block-or-pass decision. Block: any alert at standalone threshold or
        above. Monitor: any alert at monitoring threshold, pass the request, log for
        review. Pass: no tracks above monitoring threshold.

    - number: "7.14.4"
      title: "API Gateway Integration and Latency Budget"
      body: |
        The gateway integration places all detection before inference. The request
        flow is: receive user request → assemble prompt (retrieve context if RAG)
        → launch all five detection tracks in parallel → join at ensemble decision
        point → block or pass → if pass, call LLM → post-process response → return.

        Latency budget allocation for the 50ms P99 target:

        Prompt assembly (including RAG retrieval if applicable): 5-15ms. This is
        outside the detection budget but must be accounted for in the total request
        latency. For the detection-specific budget, assume assembled prompt is
        available at launch time.

        Parallel detection execution (all five tracks): budget 20-35ms. Individual
        track latency targets: semantic classifier (feature extraction + GBM): 3-8ms.
        Perplexity detector (local GPT-2 small inference): 10-20ms. Shot count
        detector (regex counting): < 1ms. Trajectory scorer (in-memory state update):
        < 1ms. Coherence analyser (mock embedding: < 1ms; real embedding: 5-15ms
        depending on model size). The perplexity detector is the latency bottleneck.
        For deployments where 20ms is too slow, a smaller perplexity model (DistilGPT-2,
        50M parameters) can reduce this to 5-10ms with slightly lower recall on
        AutoDAN-style suffixes.

        Ensemble join and decision: < 1ms.

        Logging and SIEM emit: async, not in the critical path.

        Total detection P99 target: 35ms. Total gateway P99 including LLM inference
        is dominated by LLM latency (typically 200-2000ms depending on model and
        prompt length) -- the 35ms detection overhead is < 5% of total request
        latency for most deployments.

        Latency measurement. The `jailbreak_ensemble.py` implementation includes
        a `benchmark()` function that measures P50/P95/P99 across 1000 requests
        for each track and for the full ensemble. Run this against your hardware
        before deployment to verify the latency budget is met.

    - number: "7.14.5"
      title: "FPR Calibration Across All Five Tracks"
      body: |
        FPR calibration is the most deployment-specific step. The thresholds that
        produce 1% ensemble FPR on one deployment's user population may produce
        5% or 0.1% on another. The calibration procedure has four steps.

        Step 1: Collect a calibration dataset. 1000+ benign user turns from your
        deployment's actual traffic. Annotate any known jailbreak attempts for
        exclusion from the FPR measurement. Stratify by use case (consumer, research,
        developer) if the deployment serves multiple populations.

        Step 2: Run all five tracks on the calibration dataset independently.
        Record the per-track score distribution for benign traffic. The monitoring
        threshold for each track is the score at the 99th percentile of benign
        traffic -- anything above this is anomalous relative to your user population.
        The alert threshold is the score at the 99.9th percentile.

        Step 3: Set ensemble thresholds. The ensemble FPR is the product of
        individual FPRs only if tracks are independent -- they are not perfectly
        independent. Measure the ensemble FPR empirically: run the calibration
        dataset through the full ensemble with monitoring and alert thresholds set
        as above. Adjust thresholds until ensemble FPR is below 1%.

        Step 4: Validate against the attack corpus. Run the red-team corpus from
        Section 7.12 through the calibrated ensemble. Measure: what fraction of
        confirmed jailbreaks are caught at the alert threshold? Any technique with
        < 80% detection rate at the alert threshold is a residual risk gap. Document
        it in the investment backlog. Do not lower the threshold to close the gap
        without re-measuring FPR on the calibration dataset.

        Per-track FPR targets for reference: semantic classifier standalone FPR < 0.5%
        (achievable with mechanism-based features and specificity corroboration for
        high-FPR variants). Perplexity detector standalone FPR < 0.1% (GCG suffixes
        are statistically anomalous -- the threshold is wide). Shot count detector
        standalone FPR < 0.05% at 20-shot threshold (no legitimate use case sends
        20+ QA pairs). Trajectory scorer standalone FPR < 1% (multi-turn patterns
        require longer sessions to trigger). Coherence analyser standalone FPR < 0.5%
        (synthesis request signal is distinctive).

    - number: "7.14.6"
      title: "Unified OWASP LLM01 Sigma Rule: Injection + Jailbreak"
      body: |
        The Chapter 6 AML.T0051 Sigma stub is now completable. Chapter 6 Section
        6.17 built the injection classifier and left the Sigma rule with a stub for
        the jailbreak detection mechanism. Chapter 7 Section 7.14 completes it.

        The unified LLM01 Sigma rule has two detection conditions joined by OR:
        the injection classifier fires (handled by Chapter 6), or the jailbreak
        ensemble fires (handled by Chapter 7). Any single-track alert from the
        jailbreak ensemble maps to a specific sub-technique reference in the rule.
        Joint condition alerts map to a composed attack sub-technique. Session-level
        cross-classifier alerts map to the highest severity level.

        The rule enriches each alert with: the specific technique family detected,
        the detection track that fired, the confidence score, the ATLAS technique
        ID, the session ID for cross-session correlation, and a request for the
        relevant session transcript to the SIEM for analyst review.

        Integration with the broader detection programme. In Chapters 11-17, this
        Sigma rule becomes one component of a complete SIEM integration covering
        all OWASP LLM Top 10 techniques. The structure established here --
        attack family → detection track → Sigma rule condition → SIEM enrichment --
        is the template that all subsequent detection rules follow.

    - number: "7.14.7"
      title: "Monitoring: Drift Detection and Retraining Triggers"
      body: |
        A detection system that is not monitored will drift. The jailbreak landscape
        changes continuously: new technique variants appear, PAIR/TAP generate novel
        compositions, and the model being protected may be updated (changing its
        alignment properties). The monitoring infrastructure must detect drift in
        both the attack distribution and the detection system's performance.

        Attack distribution monitoring. Track the per-track score distribution
        on live traffic at daily intervals. A shift in the distribution toward higher
        scores without a corresponding increase in confirmed alerts indicates either
        a new attack pattern the ensemble is not catching (score rises but does not
        cross threshold) or a change in user behaviour that increases false positive
        risk (legitimate traffic that triggers detection signals). Either condition
        warrants investigation.

        Detection performance monitoring. Track confirmed attack catch rate and
        FPR on a weekly labelled sample. Label 100 sessions per week (mix of
        confirmed jailbreak attempts from alert queue and randomly sampled benign
        sessions). Compute per-track precision, recall, and F1. A 5% degradation
        in any metric triggers a retraining review.

        Retraining triggers. Semantic classifier: retrain when a new jailbreak
        technique family appears in the catalog that the current training data does
        not cover, or when the labelled sample shows F1 below 0.85. Perplexity
        detector: recalibrate threshold when a new GCG variant is confirmed in
        attack traffic. Shot count detector: no retraining needed (structural
        pattern); update format recognition patterns when new LLM formatting
        conventions emerge. Trajectory scorer: recalibrate thresholds when a new
        multi-turn technique variant appears in the catalog. Coherence analyser:
        retrain embedding model when cross-lingual splitting variants emerge that
        current multilingual model does not handle.

        The monitoring dashboard in `jailbreak_monitoring.py` implements all of
        the above as a daily batch job with alerting when drift thresholds are
        crossed. It reads from the detection log, computes daily metrics, and
        emits alerts to the SIEM when any metric crosses its drift threshold.

