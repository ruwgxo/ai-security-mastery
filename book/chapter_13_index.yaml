chapter_overview:
  number: 13
  title: 'Behavioural Analysis and Monitoring'
  part: 'Part 3: Detection Engineering for AI'
  position: 'Chapter 13 of 4 in Part 3; third chapter of Part 3'

  purpose: |
    Chapter 12 trained four classifiers that each answer one question about a
    single request: is this prompt an injection, a jailbreak, a PII leak, an
    anomalous API call. Each is a per-request verdict. The entire design assumes
    the request is the unit of detection. That assumption is correct for a large
    class of attacks and wrong for an equally large class. Chapter 13 covers the
    attacks the per-request assumption misses.

    The core argument of Chapter 13 is that an attack signal can live in the
    relationship between requests rather than in any single request. A multi-turn
    jailbreak escalates gradually: each individual turn is benign enough to pass
    the per-turn classifier, but the trajectory across the session is the attack.
    A data exfiltration campaign issues thousands of individually unremarkable
    queries whose only tell is their rate and pattern over time. A compromised
    account behaves normally per request but diverges from its own historical
    baseline. A coordinated abuse network shares no single suspicious request but
    forms a detectable structure as a graph. None of these are visible to a
    classifier that sees one request at a time. Behavioural analysis is the layer
    that holds state across requests and detects in that state.

    The chapter is structured as a progression from session to entity to graph.
    It begins with session modelling: aggregating the per-request event stream
    into session objects and extracting behavioural features (turn count, refusal
    rate, request cadence, topic drift within a session). Statistical baselines
    come next: defining what normal looks like per user and per endpoint, so that
    deviation can be measured rather than guessed. Time-series anomaly detection
    extends this into the temporal dimension, flagging when a metric departs from
    its own historical envelope. Drift detection addresses a subtler failure: not
    the user changing, but the model or the data distribution changing underneath
    the detectors, silently degrading them. Model behavioural monitoring watches
    the LLM''s own output distribution for the shift that signals an injection
    succeeded rather than merely an injection was attempted.

    Rate-based detection and smart rate limiting handle abuse patterns that are
    invisible per request and obvious in aggregate, with adaptive thresholds that
    distinguish a power user from an exfiltration script. Multi-turn context
    analysis detects accumulation attacks across a conversation. User behaviour
    profiling builds entity-level fingerprints and risk scores that persist across
    sessions, so that a user''s history informs the verdict on their next request.
    Graph-based detection closes the chapter by lifting analysis above the
    individual entity to the relationships between entities: shared infrastructure,
    coordinated timing, and the structural signatures of abuse networks. The
    chapter closes with a behavioural monitoring capstone that integrates these
    components into the Chapter 12 gateway and a summary that previews Chapter 14''s
    production deployment.

