  description: |
    Comprehensive index for Chapter 13 covering Behavioural Analysis and
    Monitoring -- the shift from the per-request ML classifiers Chapter 12
    trained to session-level and entity-level behavioural detection. Chapter 12
    evaluated each API request in isolation: a single prompt scored by an
    ensemble of four detectors. That model is blind to everything that spans
    requests -- the slow escalation across a multi-turn conversation, the user
    whose request rate quietly climbs over a week, the entity whose behaviour
    drifts away from its own established baseline, the cluster of accounts that
    share a coordination signature only visible as a graph. Chapter 13 builds
    the detection layer that sees across requests.

    The chapter opens by establishing the behavioural detection taxonomy and
    connecting it to the Chapter 12 gateway: per-request classification produces
    the event stream that behavioural analysis consumes. It then builds session
    modelling and the behavioural feature pipeline, statistical baselines that
    define normal per user and per endpoint, time-series anomaly detection that
    flags temporal deviation from those baselines, and data and concept drift
    detection that catches when the model''s own behaviour changes over time.
    Model behavioural monitoring receives dedicated treatment: detecting output
    distribution shift that signals successful prompt injection rather than the
    surface-level injection attempts the Chapter 12 classifiers catch. The
    chapter then covers rate-based detection and adaptive smart rate limiting
    for abuse patterns invisible to per-request scoring, multi-turn context
    analysis for accumulation attacks, user behaviour profiling that builds
    entity-level risk scores across sessions, and graph-based detection of
    entity-relationship anomalies across users and sessions. Chapter 13 produces
    the behavioural monitoring system -- baselines, drift detectors, rate
    limiters, and entity profiles -- that Chapter 14 deploys to production.
