  security_themes:
    signal_lives_between_requests: |
      The per-request classifiers of Chapter 12 are blind to any attack whose signal lives in the
      relationship between requests. A multi-turn jailbreak where each turn passes the per-turn
      classifier, a slow exfiltration campaign whose only tell is rate, a compromised account that
      diverges from its own baseline -- none are visible one request at a time. Behavioural analysis
      is the layer that holds state across requests and detects in that state.
    baseline_before_anomaly: |
      Anomaly detection is meaningless without an explicit baseline. Chapter 13 establishes per-user
      and per-endpoint baselines first, then measures deviation against them. A request rate that is
      anomalous for one user is normal for another; behavioural detection that ignores per-entity
      baselines produces false positives on power users and false negatives on compromised low-volume
      accounts.
    drift_degrades_silently: |
      The Chapter 12 detectors degrade silently as the data and attack distributions shift. Drift
      detection is the monitoring that makes this degradation visible: population stability index on
      input features and KS-tests on score distributions catch the drift before the detectors fail
      open. Without drift monitoring, a trained detector is a decaying asset with no alarm on its decay.
    injection_success_is_an_output_signal: |
      The Chapter 12 classifiers detect injection attempts in the input. Whether an injection succeeded
      is an output signal: the model''s response distribution shifts when an injection takes control.
      Model behavioural monitoring watches output distribution for this shift, catching successful
      injections that the input-side classifiers scored as low risk.
    rate_is_invisible_per_request: |
      An exfiltration campaign of ten thousand individually benign queries has no per-request signal.
      Its signal is entirely in aggregate: rate, periodicity, and coverage pattern. Rate-based detection
      and adaptive rate limiting are the only layer that sees this class of abuse, and adaptive thresholds
      are required to avoid penalising legitimate high-volume users.
    entities_have_history: |
      A request scored in isolation throws away the most informative context available: the requester''s
      history. User behaviour profiling makes that history a first-class input, so a request from an
      entity with an elevated risk profile is scored differently from the same request from a clean entity.
      Graph-based detection extends this to relationships between entities, surfacing coordination that no
      single entity profile reveals.

