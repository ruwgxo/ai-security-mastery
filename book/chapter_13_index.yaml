chapter_completion_criteria:
  knowledge:
    - 'Explain why per-request classification and behavioural analysis detect disjoint attack classes and which attacks each misses'
    - 'Describe the four behavioural signal families and the state requirement, detection latency, and attack class of each'
    - 'Articulate why anomaly detection requires an explicit baseline and why per-entity baselines reduce false positives'
    - 'Explain baseline contamination and how a slow-ramp attack poisons the baseline meant to detect it'
    - 'Distinguish data drift from concept drift and describe the monitor that catches each'
    - 'Explain why injection success is an output-side signal and how output distribution shift reveals it'
    - 'Describe why a static rate limit fails and how an adaptive per-entity threshold resolves it'
    - 'Explain how the multi-turn attack defeats per-turn classification and which trajectory features detect it'
    - 'Describe why coordinated abuse is invisible per entity and how graph structure reveals it'

  skills:
    - 'Aggregate a per-request event stream into session objects and extract behavioural features including intra-session topic drift'
    - 'Establish per-user and per-endpoint baselines with robust statistics and a contamination guard'
    - 'Build a time-series anomaly detector with seasonal decomposition and change-point detection'
    - 'Implement data drift and concept drift monitoring with population stability index and KS-tests wired to a retraining trigger'
    - 'Build a model behavioural monitor that detects injection success through output distribution shift and canary emission'
    - 'Implement rate-based detection and an adaptive smart rate limiter with graduated response'
    - 'Build a multi-turn context analyser with trajectory features and a per-session threat accumulator'
    - 'Build a persistent user behaviour profiler with fingerprint divergence and a decaying risk score'
    - 'Construct an entity-relationship graph and detect coordinated abuse networks through graph structure'
    - 'Integrate the behavioural layer into the Chapter 12 seven-track gateway as the fourth detection layer'

  security_mindset:
    - 'Recognise that some attacks have no per-request signal and live entirely in the relationship between requests'
    - 'Internalise that anomaly detection without an explicit per-entity baseline is undefined and that robust statistics are mandatory because attack traffic contaminates the baseline'
    - 'Understand that the Chapter 12 detectors decay silently without drift monitoring and that drift detection is the alarm on that decay'
    - 'Appreciate that detecting an injection attempt and detecting injection success are different problems requiring input-side and output-side detection respectively'
    - 'Recognise that entity history is the most informative discarded context and that profiling and graph analysis recover it'

