sections:

  - section_number: 1
    title: 'Behavioural Detection Taxonomy: From Per-Request Verdicts to Cross-Request Signals'
    filename: 'section_13_01_behavioural_detection_taxonomy.yaml'
    estimated_pages: 6

    topics:
      - 'Why per-request classification and behavioural analysis are complementary layers, not alternatives: the attack classes each sees and misses'
      - 'Behavioural signal taxonomy: session-level, temporal, entity-level, and graph-level signals'
      - 'The per-request event stream as the input to behavioural analysis: how Chapter 12 gateway output becomes Chapter 13 input'
      - 'Mapping each behavioural signal family to the attack class it detects: escalation, exfiltration, account compromise, coordination'
      - 'State requirements per signal family: from stateless per-request to session state to persistent entity state to graph state'
      - 'Latency and storage profile per family: from in-memory session aggregation to persistent entity profiles to batch graph analysis'
      - 'Detection timing: real-time (rate limiting) vs near-real-time (session scoring) vs batch (graph and drift)'
      - 'Where behavioural detection sits in the Chapter 11 layered stack: the fourth layer above signature, heuristic, and ML'
      - 'Connection to Chapter 12 Section 12.17: the production ML gateway as the event source'
      - 'Chapter 13 roadmap: how each section maps to a behavioural signal family and a monitoring deliverable'

    key_concepts:
      - 'Per-request classifiers and behavioural analysis detect disjoint attack classes: the former catches single-request attacks, the latter catches attacks whose signal spans requests'
      - 'Behavioural analysis requires holding state across requests, which is the architectural difference from the stateless per-request gateway of Chapter 12'
      - 'The four behavioural signal families (session, temporal, entity, graph) differ in state requirement, detection latency, and the attack class each covers'
      - 'Behavioural detection consumes the per-request classifier output as its event stream: Chapter 12 is the sensor, Chapter 13 is the analysis over the sensor output'

    deliverables:
      - 'Behavioural detection taxonomy reference table: four signal families x six dimensions (state requirement, detection latency, attack class, storage, gateway relationship, OWASP coverage)'
      - 'Per-request to behavioural transition diagram: how the Chapter 12 gateway event stream feeds the four behavioural signal families'
      - 'Behavioural signal family selection guide: which family detects which attack class and what state it requires'
      - 'Chapter 13 section-to-deliverable roadmap'

    security_preview: |
      Section 13.01 is the threat model anchor for Chapter 13 in the same way Section 12.01 anchored
      Chapter 12. It establishes the behavioural detection taxonomy that every subsequent section
      inhabits. Without this map, the progression from session modelling to graph detection reads as
      an arbitrary sequence of monitoring techniques. With it, every section is a deliberate choice
      based on the attack class targeted and the state that detecting it requires.

  - section_number: 2
    title: 'Session Modelling and Behavioural Feature Engineering: Aggregating the Request Stream'
    filename: 'section_13_02_session_modelling.yaml'
    estimated_pages: 6

    topics:
      - 'Why the session is the natural first unit above the request: bounded, attributable, and semantically meaningful'
      - 'Session boundary definition: time-window, explicit session token, and inactivity-timeout strategies and their trade-offs'
      - 'Aggregating the per-request event stream into a session object: schema and the fields carried from each request'
      - 'Session-level behavioural features: turn count, refusal rate, request cadence, inter-request interval distribution'
      - 'Intra-session topic drift: measuring how far a conversation moves from its opening topic as an escalation signal'
      - 'Session-level structural features: ratio of blocked to passed requests, classifier score trajectory across turns'
      - 'Streaming vs batch session aggregation: maintaining session state in memory vs reconstructing from logs'
      - 'Session feature pipeline shared across the behavioural detectors: extraction, caching, and the session store'
      - 'Privacy and retention: what session state is retained, for how long, and the minimisation principle'
      - 'Feature importance for session features: which session signals carry the most independent detection signal'

    key_concepts:
      - 'The session is the first aggregation unit above the request because it is bounded, attributable to an entity, and semantically coherent'
      - 'Session boundary definition is a design decision with detection consequences: too-long sessions dilute escalation signal, too-short sessions split multi-turn attacks across session boundaries'
      - 'Intra-session topic drift is a high-signal escalation feature: a conversation that starts benign and moves steadily toward a sensitive topic exhibits a drift signature that single-turn classifiers cannot see'
      - 'The session feature pipeline is shared by every behavioural detector in Chapter 13, the same way the Chapter 12 feature pipeline was shared by every per-request classifier'

    deliverables:
      - 'session_modeller.py -- per-request event stream aggregation into session objects with configurable boundary strategy'
      - 'behavioural_feature_extractor.py -- session-level feature extraction: turn count, refusal rate, cadence, intra-session topic drift'
      - 'session_store.py -- session state store with streaming aggregation and configurable retention'
      - 'session_feature_importance.py -- feature importance analysis for session-level behavioural features'

    security_preview: |
      Session modelling is the highest-leverage activity in behavioural detection because every
      session-level and entity-level detector in Chapter 13 consumes the session features this section
      produces. A well-modelled session with a topic-drift feature lets a downstream detector catch a
      gradual jailbreak that no per-turn classifier flags; a naive session model that only counts turns
      misses it entirely. Section 13.02 invests in the session pipeline so every subsequent section can
      focus on the detection logic over it.

  - section_number: 3
    title: 'Statistical Baselines: Defining Normal Per User and Per Endpoint'
    filename: 'section_13_03_statistical_baselines.yaml'
    estimated_pages: 7

    topics:
      - 'Why anomaly detection is meaningless without an explicit baseline: deviation requires a reference distribution'
      - 'Per-user vs per-endpoint vs global baselines: which to use for which metric and why per-entity baselines reduce false positives'
      - 'Rolling-window baseline statistics: mean, variance, and percentile envelopes over a trailing window'
      - 'Cold-start problem: scoring entities with insufficient history against a population prior until a personal baseline accrues'
      - 'Baseline metrics: request rate, refusal rate, session length, endpoint mix, time-of-day distribution'
      - 'Robust statistics for baselines: median and MAD over mean and standard deviation to resist contamination by attack traffic'
      - 'Baseline contamination: preventing ongoing attack traffic from poisoning the baseline it is measured against'
      - 'Baseline update cadence and the trade-off between adaptivity and stability'
      - 'Deviation scoring: z-score, modified z-score, and percentile rank as deviation measures'
      - 'Multi-metric baseline composition: combining per-metric deviations into a single entity deviation score'

    key_concepts:
      - 'Anomaly detection without an explicit baseline is undefined: the baseline is the reference distribution against which deviation is measured, and per-entity baselines are required because normal varies by entity'
      - 'Robust statistics (median, MAD) are mandatory for security baselines because mean and standard deviation are contaminated by the very attack traffic the baseline is meant to detect'
      - 'The cold-start problem is solved by backing off to a population prior for new entities and blending toward the personal baseline as history accrues'
      - 'Baseline contamination is the central failure mode: an attack that ramps slowly enough is absorbed into the baseline and never flagged, which is why baseline updates must exclude flagged traffic'

    deliverables:
      - 'statistical_baseline.py -- per-user and per-endpoint baseline establishment with rolling-window robust statistics'
      - 'baseline_deviation_scorer.py -- z-score, modified z-score, and percentile deviation scoring against an established baseline'
      - 'cold_start_prior.py -- population-prior backoff and blending for entities with insufficient history'
      - 'baseline_contamination_guard.py -- excluding flagged traffic from baseline updates to prevent slow-ramp poisoning'

    security_preview: |
      Statistical baselines are the foundation every anomaly-based detector in Chapter 13 stands on.
      A request rate of 500 per hour is an attack for one user and a Tuesday for another; only a
      per-entity baseline distinguishes them. Section 13.03 builds the baselines, the deviation scoring,
      and the contamination guard that keeps a patient adversary from training the baseline to accept
      the attack.

  - section_number: 4
    title: 'Time-Series Anomaly Detection: Temporal Deviation from the Behavioural Envelope'
    filename: 'section_13_04_time_series_anomaly_detection.yaml'
    estimated_pages: 7

    topics:
      - 'Why behavioural metrics are time series: request rate, refusal rate, and error rate evolve over time with structure'
      - 'Seasonality in behavioural data: daily, weekly, and business-cycle patterns that a naive threshold misclassifies as anomalies'
      - 'Seasonal decomposition: separating trend, seasonal, and residual components to detect anomalies in the residual'
      - 'Forecasting-based anomaly detection: predicting the next value and flagging when the actual falls outside the prediction interval'
      - 'Streaming time-series anomaly detection: online algorithms that score each new point without recomputing history'
      - 'Change-point detection: identifying the moment a metric''s distribution shifts rather than a single outlier point'
      - 'Multi-resolution analysis: detecting both sudden spikes and slow ramps in the same metric'
      - 'Threshold selection for time-series anomalies: prediction-interval width and the precision-recall trade-off'
      - 'Handling missing data and irregular sampling in behavioural time series'
      - 'Connecting time-series alerts to the entity and session context that explains them'

    key_concepts:
      - 'Behavioural metrics are time series with seasonal structure, and a detector that ignores seasonality fires on every Monday morning traffic spike and misses the anomaly hiding inside a seasonal peak'
      - 'Seasonal decomposition isolates the residual component where genuine anomalies live, after trend and seasonal structure are removed'
      - 'Change-point detection answers a different question from outlier detection: not which point is anomalous, but when the underlying behaviour changed, which is the signal for account compromise'
      - 'Multi-resolution analysis is required because the two highest-value behavioural attacks have opposite temporal signatures: the sudden spike of a burst attack and the slow ramp of a patient exfiltration'

    deliverables:
      - 'time_series_anomaly_detector.py -- temporal anomaly detection on behavioural metrics with seasonal decomposition'
      - 'change_point_detector.py -- distribution change-point detection for account-compromise signal'
      - 'forecast_anomaly_scorer.py -- forecasting-based anomaly scoring with prediction-interval thresholds'
      - 'multi_resolution_analyser.py -- simultaneous spike and slow-ramp detection in a single behavioural metric'

    security_preview: |
      Time-series anomaly detection is where the temporal signal family is implemented. The two attacks
      it targets -- the sudden burst and the patient ramp -- are invisible to a static threshold that
      ignores time structure. Section 13.04 builds seasonal decomposition, change-point detection, and
      multi-resolution analysis so that both the spike and the slow climb register against an entity''s
      own temporal envelope rather than a global constant.

  - section_number: 5
    title: 'Drift Detection: Data Drift and Concept Drift Beneath the Detectors'
    filename: 'section_13_05_drift_detection.yaml'
    estimated_pages: 6

    topics:
      - 'The difference between user behaviour change and distribution drift: the user changing vs the world changing underneath the detectors'
      - 'Data drift: the input feature distribution shifting away from the training distribution'
      - 'Concept drift: the relationship between features and labels changing, so a once-accurate detector silently degrades'
      - 'Population stability index: measuring input distribution shift per feature against a reference window'
      - 'Kolmogorov-Smirnov and chi-squared tests for distribution comparison on continuous and categorical features'
      - 'Prediction-distribution monitoring: detecting drift through the classifier score distribution rather than the inputs'
      - 'Drift on the four Chapter 12 detectors: how each degrades and which drift signal catches it first'
      - 'Connecting drift alerts to the Chapter 12 Section 12.14 retraining trigger and the model registry'
      - 'Distinguishing benign drift (seasonal, product change) from adversarial drift (attack distribution shift)'
      - 'Drift detection cadence and the cost of a false drift alarm that triggers an unnecessary retrain'

    key_concepts:
      - 'Data drift and concept drift are distinct failures: data drift is the input distribution moving, concept drift is the feature-label relationship moving, and concept drift is the more dangerous because the detector degrades with no input-side signal'
      - 'Population stability index on input features and KS-tests on score distributions are the two complementary drift monitors: one watches the inputs, the other watches the outputs'
      - 'Drift detection makes the silent decay of the Chapter 12 detectors visible and feeds the Section 12.14 retraining trigger, closing the loop that keeps detectors current'
      - 'Distinguishing benign from adversarial drift matters operationally: a benign seasonal shift should adapt the baseline, an adversarial shift should alert, and conflating them either floods analysts or misses attacks'

    deliverables:
      - 'drift_detector.py -- data drift and concept drift detection with population stability index and KS-test monitoring'
      - 'prediction_distribution_monitor.py -- classifier score-distribution drift detection for the four Chapter 12 detectors'
      - 'drift_retrain_trigger.py -- connecting drift alerts to the Chapter 12 Section 12.14 retraining pipeline'
      - 'benign_vs_adversarial_drift_classifier.py -- separating seasonal and product drift from attack-distribution drift'

    security_preview: |
      Drift detection is the monitoring that keeps the Chapter 12 detectors from failing silently. A
      classifier trained on last quarter''s attack corpus degrades against this quarter''s novel
      techniques with no alarm unless drift is monitored. Section 13.05 builds the population stability
      index, the score-distribution monitor, and the retraining trigger that turn silent decay into a
      visible, actionable alert wired back into the model registry.

  - section_number: 6
    title: 'Model Behavioural Monitoring: Output Distribution Shift as Injection-Success Signal'
    filename: 'section_13_06_model_behaviour_monitoring.yaml'
    estimated_pages: 7

    topics:
      - 'The distinction between detecting an injection attempt (input-side) and detecting injection success (output-side)'
      - 'Why successful injection shows in the output: the model''s response distribution shifts when injected instructions take control'
      - 'Output distribution features: refusal rate, response length, format conformance, persona consistency, sentiment'
      - 'Baseline output distribution per endpoint and per task type as the reference for shift detection'
      - 'Detecting output anomalies: a response that violates the system-prompt constraints the model normally honours'
      - 'Canary and honeytoken signals in output: detecting when the model emits content it should never produce'
      - 'Self-consistency monitoring: detecting when the model''s behaviour within a session contradicts its earlier behaviour'
      - 'Linking output-side shift back to the input that caused it for analyst triage'
      - 'Output monitoring latency: post-inference analysis that does not block the response path'
      - 'The complementary relationship with Chapter 12 Section 12.09 PII output scanning'

    key_concepts:
      - 'Detecting an injection attempt and detecting injection success are different problems: the Chapter 12 classifiers do the former on the input, model behavioural monitoring does the latter on the output'
      - 'Successful injection manifests as output distribution shift because the injected instructions change what the model produces: its refusal rate drops, its persona breaks, or its format conformance fails'
      - 'A per-endpoint output baseline is the reference for shift detection, the same baseline-before-anomaly principle applied to the model''s own behaviour rather than the user''s'
      - 'Canary and honeytoken signals turn injection success into a high-confidence binary detection: if the model emits a token it was instructed never to emit, an injection succeeded'

    deliverables:
      - 'model_behaviour_monitor.py -- LLM output distribution monitoring for injection-success signal detection'
      - 'output_baseline.py -- per-endpoint and per-task output distribution baseline establishment'
      - 'canary_token_monitor.py -- honeytoken and canary detection in model output for high-confidence injection-success alerts'
      - 'self_consistency_monitor.py -- intra-session behavioural contradiction detection in model responses'

    security_preview: |
      Model behavioural monitoring catches what the input-side classifiers cannot confirm: whether an
      injection actually succeeded. An injection that scored low on the Chapter 12 input classifier but
      took control of the model shows in the output, where refusal rate, persona consistency, and canary
      emission reveal the shift. Section 13.06 builds the output baselines and the shift detectors that
      complete the injection-detection picture from attempt to outcome.

  - section_number: 7
    title: 'Rate-Based Detection: Abuse Patterns Invisible Per Request'
    filename: 'section_13_07_rate_based_detection.yaml'
    estimated_pages: 6

    topics:
      - 'Why exfiltration and enumeration attacks have no per-request signal: every individual query is benign'
      - 'Rate as the detection signal: request volume, periodicity, and acceleration over a time window'
      - 'Coverage-pattern detection: an entity systematically sweeping an input space rather than using the service'
      - 'Distinguishing burst abuse from sustained abuse and the different detectors each requires'
      - 'Sliding-window and token-bucket rate accounting per entity, per endpoint, and per credential'
      - 'Detecting distributed rate abuse: the same campaign spread across many accounts to stay under per-account limits'
      - 'Periodicity detection: the regular interval signature of an automated script vs the irregularity of a human'
      - 'Rate-based features feeding the user profile and the graph detector'
      - 'False-positive sources in rate detection: legitimate batch jobs, integrations, and power users'
      - 'The handoff to smart rate limiting: detection informs the adaptive threshold'

    key_concepts:
      - 'Exfiltration and enumeration campaigns are invisible per request because every individual query is legitimate, and their entire signal is in the aggregate rate and pattern over time'
      - 'Periodicity is a high-signal automation feature: a perfectly regular request interval is a script signature that human usage does not produce'
      - 'Distributed rate abuse spreads a campaign across many accounts to stay under per-account limits, which is why rate detection must aggregate per-credential and per-source as well as per-account'
      - 'Rate-based detection produces the signal that smart rate limiting acts on: detection sets the adaptive threshold, enforcement applies it'

    deliverables:
      - 'rate_based_detector.py -- request-rate, periodicity, and acceleration abuse detection across the event stream'
      - 'coverage_pattern_detector.py -- input-space enumeration and sweep detection'
      - 'distributed_abuse_detector.py -- cross-account campaign aggregation for distributed rate abuse'
      - 'periodicity_analyser.py -- automation-signature detection through request-interval regularity'

    security_preview: |
      Rate-based detection is the only layer that sees the exfiltration campaign of ten thousand
      individually benign queries. Its signal is entirely in aggregate: volume, periodicity, and
      coverage pattern. Section 13.07 builds the rate, periodicity, and distributed-abuse detectors that
      surface this class of attack and produce the signal that the next section''s adaptive rate limiter
      enforces against.

  - section_number: 8
    title: 'Smart Rate Limiting: Adaptive Thresholds That Separate Power Users from Abuse'
    filename: 'section_13_08_smart_rate_limiting.yaml'
    estimated_pages: 6

    topics:
      - 'Why a static rate limit is both too loose and too tight: it penalises legitimate high-volume use and admits low-and-slow abuse'
      - 'Adaptive per-entity thresholds learned from the Section 13.03 baseline rather than set globally'
      - 'Burst tolerance and the token-bucket model with per-entity refill rates'
      - 'Risk-weighted rate limiting: tightening limits for entities with elevated risk profiles from Section 13.10'
      - 'Graduated response: throttle, challenge, and block as escalating enforcement rather than a single hard cutoff'
      - 'Rate limiting across dimensions: per-user, per-endpoint, per-credential, and per-source IP composed together'
      - 'Avoiding the denial-of-service own-goal: rate limiting that an adversary can trigger against legitimate users'
      - 'Feedback loop: enforcement outcomes feeding back into the entity risk profile'
      - 'Latency budget: rate-limit decisions on the request hot path within the gateway latency target'
      - 'Operational tuning: setting adaptive limits without locking out integrations and batch consumers'

    key_concepts:
      - 'A static rate limit is simultaneously too loose for low-and-slow abuse and too tight for legitimate power users, which is why the threshold must adapt per entity from the baseline'
      - 'Risk-weighted rate limiting composes with the Section 13.10 user profile: an entity with an elevated risk score gets a tighter limit, so detection and enforcement reinforce each other'
      - 'Graduated response (throttle, challenge, block) is superior to a hard cutoff because it degrades the adversary''s throughput while preserving a recovery path for false positives'
      - 'Adaptive rate limiting must avoid the denial-of-service own-goal: a limiter an adversary can trip on behalf of a legitimate user becomes an attack tool, so per-source composition matters'

    deliverables:
      - 'smart_rate_limiter.py -- adaptive rate limiting with per-entity learned thresholds and burst tolerance'
      - 'risk_weighted_limiter.py -- rate limits weighted by the Section 13.10 entity risk score'
      - 'graduated_response_engine.py -- throttle, challenge, and block escalation with a false-positive recovery path'
      - 'multi_dimension_rate_composer.py -- composing per-user, per-endpoint, per-credential, and per-source limits'

    security_preview: |
      Smart rate limiting is where rate-based detection becomes enforcement. A static limit cannot tell
      a power user from an exfiltration script; an adaptive per-entity limit learned from the baseline
      can. Section 13.08 builds the adaptive limiter, the risk-weighted composition with the entity
      profile, and the graduated response that throttles abuse without locking out the legitimate
      high-volume consumers a hard cutoff would penalise.

  - section_number: 9
    title: 'Multi-Turn Context Analysis: Accumulation and Escalation Across a Conversation'
    filename: 'section_13_09_multi_turn_context_analysis.yaml'
    estimated_pages: 7

    topics:
      - 'The multi-turn attack: each turn passes the per-turn classifier, the trajectory across turns is the attack'
      - 'Accumulation attacks: assembling a harmful capability from individually benign turns'
      - 'Escalation attacks: a conversation that ratchets steadily toward a constraint boundary'
      - 'Context-window manipulation: filling the context to push system constraints out of the model''s attention'
      - 'Sequence modelling over the turn stream: applying the Chapter 12 GRU detector at the session rather than request level'
      - 'Trajectory features: classifier-score slope across turns, topic-drift velocity, and refusal-then-retry patterns'
      - 'Crescendo and many-shot patterns: the published multi-turn jailbreak families and their behavioural signatures'
      - 'State accumulation: maintaining a per-session threat accumulator that integrates risk across turns'
      - 'Distinguishing a persistent legitimate user from a persistent adversary probing for a boundary'
      - 'Linking multi-turn detection to the session model from Section 13.02 and the GRU detector from Chapter 12'

    key_concepts:
      - 'The multi-turn attack defeats per-turn classification by construction: every turn is individually benign, and the attack exists only in the trajectory across turns'
      - 'Trajectory features (score slope, topic-drift velocity, refusal-then-retry) capture the escalation signature that a per-turn snapshot cannot, turning a sequence of benign turns into a detectable pattern'
      - 'A per-session threat accumulator integrates risk across turns so that a conversation accumulating many small risk increments crosses a threshold that no single turn reaches'
      - 'Published multi-turn families (Crescendo, many-shot) have characteristic behavioural signatures that sequence modelling over the turn stream detects where single-turn classification fails'

    deliverables:
      - 'multi_turn_context_analyser.py -- accumulation and escalation attack detection across a multi-turn conversation'
      - 'trajectory_feature_extractor.py -- score-slope, topic-drift-velocity, and refusal-retry trajectory features'
      - 'session_threat_accumulator.py -- per-session risk integration across turns with threshold crossing'
      - 'crescendo_pattern_detector.py -- behavioural-signature detection for published multi-turn jailbreak families'

    security_preview: |
      Multi-turn context analysis is the direct answer to the attack class the Chapter 12 per-turn
      classifiers were built to miss: the gradual jailbreak where every turn passes and the trajectory
      is the attack. Section 13.09 builds the trajectory features, the per-session threat accumulator,
      and the Crescendo-family detector that lift the Chapter 12 GRU sequence model from the turn to the
      full-session scope.

  - section_number: 10
    title: 'User Behaviour Profiling: Entity Fingerprints and Persistent Risk Scoring'
    filename: 'section_13_10_user_behaviour_profiling.yaml'
    estimated_pages: 6

    topics:
      - 'Why a request scored in isolation discards its most informative context: the requester''s history'
      - 'Entity-level behavioural fingerprinting: the stable signature of how an entity normally uses the service'
      - 'Persistent entity profile schema: aggregated baselines, historical risk events, and behavioural fingerprint'
      - 'Cross-session risk scoring: integrating risk signals from many sessions into a single persistent entity score'
      - 'Risk score decay and reinforcement: how a clean entity recovers and a repeat offender accumulates'
      - 'Account-compromise detection through fingerprint divergence: a legitimate account suddenly behaving unlike itself'
      - 'Entity resolution: linking the same actor across credentials, sessions, and sources'
      - 'Feeding the entity risk score into the smart rate limiter and the per-request gateway decision'
      - 'Privacy, fairness, and retention constraints on persistent behavioural profiles'
      - 'The profile as the bridge between session-level detection and graph-level detection'

    key_concepts:
      - 'A persistent entity profile makes a requester''s history a first-class input, so the same request is scored differently from a clean entity than from one with an elevated risk profile'
      - 'Account-compromise detection is fingerprint-divergence detection: a legitimate account that suddenly behaves unlike its own established fingerprint is the signal, distinct from an account that was always malicious'
      - 'Risk score decay and reinforcement govern fairness and effectiveness: a clean entity must be able to recover from a false positive, and a repeat offender must accumulate a score that reflects its history'
      - 'The entity profile is the bridge from session detection to graph detection: graph analysis operates on entities and their relationships, which the profile defines'

    deliverables:
      - 'user_behaviour_profiler.py -- entity-level behavioural fingerprinting and persistent cross-session risk scoring'
      - 'fingerprint_divergence_detector.py -- account-compromise detection through behavioural fingerprint divergence'
      - 'risk_score_engine.py -- cross-session risk integration with decay and reinforcement dynamics'
      - 'entity_resolver.py -- linking the same actor across credentials, sessions, and sources'

    security_preview: |
      User behaviour profiling turns history into a first-class detection input. A request from an entity
      with an elevated risk profile is not the same as the identical request from a clean entity, and an
      account that diverges from its own fingerprint is the account-compromise signal. Section 13.10
      builds the persistent profile, the fingerprint-divergence detector, and the risk engine that feeds
      both the rate limiter and the per-request gateway, and that defines the entities the graph detector
      operates on.

  - section_number: 11
    title: 'Graph-Based Detection and the Behavioural Monitoring Capstone'
    filename: 'section_13_11_graph_based_detection.yaml'
    estimated_pages: 8

    topics:
      - 'Why coordinated abuse is invisible at the single-entity level: the signal is in the relationships between entities'
      - 'Building the entity-relationship graph: shared infrastructure, credentials, timing, and behavioural similarity as edges'
      - 'Coordinated-network signatures: clusters of accounts sharing a creation pattern, IP range, or synchronised activity'
      - 'Graph anomaly detection: community detection, centrality, and structural-outlier methods on the entity graph'
      - 'Sybil and bot-network detection through graph structure rather than per-account behaviour'
      - 'Design brief: integrating the behavioural layer into the Chapter 12 seven-track gateway as the fourth detection layer'
      - 'Architecture: where session scoring, baselines, rate limiting, profiling, and graph analysis sit relative to the per-request path'
      - 'Real-time vs batch in the behavioural gateway: which detectors run inline and which run as scheduled analysis'
      - 'Behavioural monitoring dashboard: the entity risk view, the drift view, and the coordinated-network view'
      - 'Completing the behavioural coverage for ATLAS AML.T0040 multi-stage classifier evasion at the session and entity level'

    key_concepts:
      - 'Coordinated abuse has no single-entity signal: each account in a network behaves acceptably alone, and the attack is visible only as the structure of the relationships between accounts'
      - 'The entity-relationship graph turns shared infrastructure, synchronised timing, and behavioural similarity into edges, so community detection and structural-outlier methods surface the coordinated network'
      - 'The behavioural monitoring gateway integrates the chapter''s detectors as the fourth layer above the Chapter 12 ML gateway, with inline detectors on the request path and batch detectors on a schedule'
      - 'Graph-based detection completes the behavioural coverage: session detection catches the individual escalation, profiling catches the compromised entity, and graph detection catches the coordinated network none of the others reveal'

    deliverables:
      - 'graph_anomaly_detector.py -- entity-relationship graph construction and coordinated abuse network structure detection'
      - 'sybil_network_detector.py -- bot-network and Sybil detection through graph structure'
      - 'behavioural_monitoring_gateway.py -- behavioural layer integrated into the Chapter 12 seven-track gateway'
      - 'behavioural_gateway_architecture.py -- inline vs batch detector placement relative to the per-request path'
      - 'behavioural_monitoring_dashboard.py -- entity-risk, drift, and coordinated-network dashboard configuration'
      - 'aml_t0040_behavioural_coverage.py -- session and entity-level coverage for ATLAS AML.T0040 multi-stage evasion'

    security_preview: |
      Section 13.11 closes the Chapter 13 behavioural capstone. Graph-based detection catches the
      coordinated abuse network that every single-entity detector in the chapter misses, and the
      behavioural monitoring gateway integrates session scoring, baselines, drift, rate limiting,
      profiling, and graph analysis as the fourth layer above the Chapter 12 ML gateway. The result is a
      detection system that sees the individual request (Chapter 12), the session and the entity, and the
      relationships between entities -- the full behavioural picture Chapter 14 deploys to production.

  - section_number: 12
    title: 'Chapter 13 Summary: Behavioural Monitoring Architecture and Chapter 14 Preview'
    filename: 'section_13_12_chapter_summary.yaml'
    estimated_pages: 6

    overview: |
      Synthesis of all 11 content sections into the behavioural analysis and monitoring architecture.
      Covers the behavioural detection taxonomy (session, temporal, entity, graph), the session
      modelling and behavioural feature pipeline shared across the detectors, the statistical baselines
      and deviation scoring that define normal per entity, the time-series anomaly detection that catches
      temporal deviation, the data and concept drift detection that keeps the Chapter 12 detectors from
      failing silently, the model behavioural monitoring that detects injection success in the output,
      the rate-based detection and adaptive smart rate limiting for aggregate abuse, the multi-turn
      context analysis for accumulation and escalation attacks, the user behaviour profiling that makes
      entity history a first-class input, and the graph-based detection and behavioural monitoring
      capstone that integrates everything into the Chapter 12 seven-track gateway. Closes Chapter 13 and
      previews Chapter 14 (Production Deployment).

    structure:
      part_1: 'Section 1 Review: behavioural detection taxonomy and the per-request to behavioural transition'
      part_2: 'Section 2 Review: session modelling and behavioural feature engineering'
      part_3: 'Sections 3-4 Review: statistical baselines and time-series anomaly detection'
      part_4: 'Sections 5-6 Review: drift detection and model behavioural monitoring'
      part_5: 'Sections 7-8 Review: rate-based detection and smart rate limiting'
      part_6: 'Section 9 Review: multi-turn context analysis'
      part_7: 'Sections 10-11 Review: user behaviour profiling and graph-based detection capstone'
      integration: 'How Chapter 13 adds the behavioural layer above the Chapter 12 per-request ML gateway'
      cross_chapter: 'Chapter 13 completes the detection arc of Part 3: signature (Ch11), classifiers (Ch12), and behaviour (Ch13)'
      mistakes: 'Common behavioural detection mistakes: anomaly detection without an explicit baseline, ignoring seasonality, baseline contamination by slow-ramp attacks, static rate limits, and profiling without risk-score decay'
      reference: 'Quick lookup: behavioural signal family selection, baseline statistic choice, drift monitor selection, and rate-limit composition guide'
      preview: 'Chapter 14: Production Deployment -- from the behavioural monitoring system to architecture patterns, latency, and observability at scale'

    deliverables:
      - 'Behavioural monitoring architecture diagram: four signal families, session pipeline, baselines, drift, rate limiting, profiling, and graph detection integrated into the gateway'
      - 'Chapter 13 behavioural detector reference card: each detector with attack class, state requirement, detection latency, and gateway placement'
      - 'Behavioural sustainability checklist: baseline contamination guard, drift monitor, risk-score decay, and retraining trigger -- the requirements for behavioural detection that does not rot'
      - 'Chapter 13 knowledge assessment quiz (20 questions)'
      - 'Behavioural monitoring security checklist for production AI deployments'
      - 'Chapter 13 to Chapter 14 integration diagram: the behavioural monitoring system as the deployment target for production architecture'

    preview_chapter_14: |
      Chapter 14: Production Deployment
      Chapter 12 trained the per-request classifiers and Chapter 13 added the
      behavioural monitoring layer above them. Chapter 14 deploys the complete
      detection system to production: architecture patterns (API gateway, sidecar,
      inline) for placing detection in the request path, the performance
      requirements that the latency-sensitive inline detectors must meet, the
      integration points for pre-processing and post-processing detection, the
      failure modes and the fail-open versus fail-closed decision that governs what
      happens when a detector errors, the observability stack of metrics, logging,
      and tracing that makes the system operable, and the cost optimisation of
      sampling, caching, and batching that keeps detection affordable at scale.
      By the end of Chapter 14, the detection system built across Chapters 11, 12,
      and 13 is a production service: signature, ML, and behavioural detection
      deployed behind an API gateway, meeting a sub-50ms latency requirement,
      observable, and cost-bounded, closing Part 3 and setting up Part 4''s
      practical end-to-end implementation.

