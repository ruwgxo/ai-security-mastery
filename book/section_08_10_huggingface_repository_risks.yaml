section_overview:
  title: 'HuggingFace and Model Repository Risks: Pickle, Code Execution, and Model Card Deception'
  one_line_summary: |
    Model repositories distribute the artifacts that LLM deployments depend on, and
    they distribute them with trust assumptions that the security model does not
    underwrite. Pickle-based model files execute arbitrary code on load -- a
    decade-old known vulnerability that remains the dominant model serialisation
    format outside of new SafeTensors deployments. Model cards present documentation
    that consumers treat as authoritative but the platform does not verify. Trust
    models, code execution, and documentation deception interact: the SafeTensors
    migration addresses code execution but leaves behavioural compromise and
    documentation deception entirely unaddressed. Repository-level defence requires
    matching control to attack class -- format restrictions for pickle, signed
    artefacts and chain-of-custody for behavioural compromise, automated card
    auditing for documentation deception.

  why_this_section_exists: |
    Section 8.9 covered LoRA adapter attacks at the artefact level. Section 8.10
    covers the repository infrastructure that distributes both adapters and base
    models. The two sections share the supply chain attack surface but cover
    different layers: 8.9 focused on what the adapter does, 8.10 focuses on how
    the repository transports it and what additional attack classes the transport
    layer enables. Pickle-based code execution is the most consequential -- not
    a behavioural compromise of the model but an arbitrary code execution
    vulnerability that triggers on model load, before any inference occurs. Model
    card deception is the policy-level analogue of the technical attacks: the
    documentation persuades consumers to trust artefacts they should not.

    The section also establishes the operational gap between SafeTensors adoption
    (which is significant and ongoing) and complete repository-level defence
    (which SafeTensors does not provide). A repository policy that mandates
    SafeTensors eliminates one specific attack class -- pickle deserialisation --
    while leaving the model''s actual weights as untrusted as before. The
    distinction matters because organisations sometimes treat SafeTensors adoption
    as sufficient supply chain defence; it is necessary but not sufficient. The
    section makes that distinction concrete and provides the additional controls
    required for completeness.

    The third function is to bridge from artefact-specific defences (adapter
    integrity verification, weight-delta analysis from Section 8.9) to platform-
    level controls (repository policy, format restrictions, automated scanning).
    The two layers are complementary -- artefact-specific controls catch attacks
    at intake, platform-level controls reduce the rate at which malicious
    artefacts reach intake. Section 8.15''s pipeline integrates both as
    complementary tracks rather than substitutes.

  position_in_chapter: |
    Section 8.10 is the second of three supply chain sections (Sections 8.9, 8.10,
    8.11). Section 8.9 covered LoRA adapter-specific attacks; Section 8.10 covers
    repository-level distribution attacks; Section 8.11 covers dataset provenance
    and pre-training contamination. Together they establish the supply chain attack
    catalogue that Section 8.15''s pipeline operationalises against. Section 8.10
    specifically addresses the platform-layer controls that Sections 8.9 and 8.11
    assume are in place: format restrictions, repository auditing, model card
    validation, publisher reputation systems.

    The section operationalises Chapter 5 Section 5.9 supply chain checklist items
    that Section 8.9 began to operationalise. Where Section 8.9 covered the
    adapter-specific subset, Section 8.10 covers the broader repository-level
    controls -- format policies, scanning integration, organisational controls
    on model intake. Section 8.15 wires both into the production auditing pipeline.

