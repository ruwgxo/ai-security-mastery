# section_09_02_extraction_taxonomy.yaml

---
document_info:
  title: 'Section 9.2: Extraction Taxonomy'
  subtitle: 'Functionality, Fidelity, Decision-Boundary, and Prompt Extraction'
  chapter: 9
  section: 2
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
  license: 'MIT'
  version: '1.0'
  estimated_pages: 6
  estimated_reading_time: '24 minutes'
  created: '2026-05-09'

section_overview:
  one_line_summary: |
    Four extraction goals -- functionality, fidelity, decision-boundary, and prompt
    -- define what adversaries are stealing, how many queries they need, and which
    detection primitive will catch them; the taxonomy is the filing system for
    every attack and defence section that follows.

  why_this_section_exists: |
    Without a taxonomy, extraction looks like a single undifferentiated threat:
    an adversary queries the model too many times. That framing produces
    undifferentiated defences -- rate limits that do not distinguish between
    a distillation campaign and a boundary-mapping campaign, and detection
    signals that fire on volume alone rather than on the structural properties
    of the query distribution.

    The four extraction goals are meaningfully different in what the adversary
    wants, how many queries are required, what query patterns they produce,
    and which detection primitive covers them. A functionality extractor needs
    a model that generalises across the full input distribution -- thousands to
    millions of queries, distributed across the input space. A fidelity extractor
    needs exact match on a specific input set -- potentially hundreds of queries,
    concentrated on a narrow region. A decision-boundary extractor needs the
    geometry of the classification surface -- queries that deliberately straddle
    classification boundaries. A prompt extractor needs the system prompt -- a
    small number of carefully constructed inference queries that elicit system
    configuration disclosure.

    The taxonomy built here is the scaffold for attack sections 9.3 through 9.9
    and for the detection primitive design in Section 9.10. Every attack lives
    in one of four goal quadrants. Every detection primitive covers one or more
    quadrants. The mental model built in Section 9.2 is what makes Section 9.10
    legible and Section 9.11 defensible.

  position_in_chapter: |
    Section 9.2 of 13. Follows the threat model (Section 9.1). Precedes all four
    attack sections (9.3 through 9.5 on extraction, 9.6 through 9.7 on privacy
    attacks sharing the inference surface). The taxonomy matrix built here is
    referenced throughout Chapters 9 and 10.

learning_objectives:
  knowledge:
    - 'Define each of the four extraction goals: functionality, fidelity, decision-boundary, and prompt extraction'
    - 'Explain how adversary objectives, query budget, and query patterns differ across the four goals'
    - 'Describe the budget-fidelity tradeoff curve and how it shifts across access levels and extraction goals'
    - 'Distinguish targeted extraction (specific input set) from untargeted extraction (full distribution)'
    - 'Map each extraction goal to its corresponding ATLAS sub-technique'
    - 'Identify which detection primitive covers which extraction goal'

  skills:
    - 'Classify an observed query pattern into the most likely extraction goal'
    - 'Estimate query budget requirements for a given extraction goal and adversary access level'
    - 'Select the correct detection primitive for a given extraction goal'
    - 'Construct the four-goal by three-access-level taxonomy matrix for a given deployment'
    - 'Use the defender decision tree to identify extraction goal from observable query signals'

  security_mindset:
    - 'Internalise that functionality extraction is the dominant commercial threat because it produces a deployable clone'
    - 'Recognise that prompt extraction is operationally cheap and yields both IP and security configuration'
    - 'Understand that decision-boundary extraction is the precursor to adversarial example generation (Chapter 10 connection)'
    - 'Appreciate that different extraction goals require different detection signals -- volume thresholds alone are insufficient'

prerequisites:
  - 'Section 9.1: inference-time threat model and adversary access ladder (foundation for budget analysis in this section)'
  - 'Chapter 3: LLM architecture and output distribution properties (prerequisite for prompt extraction mechanics)'
  - 'Chapter 2: decision boundaries and classification surfaces (prerequisite for decision-boundary extraction)'
  - 'Chapter 5 Section 5.4: OWASP LLM10 framework overview (taxonomy maps to LLM10 sub-risks)'
  - 'Chapter 6 Section 6.2: single-prompt system prompt extraction (contrasted with prompt extraction at scale in this section)'

prose_content:

  - part: 1
    title: 'Why the Taxonomy Matters Before the Attacks'
    body: |
      Every chapter in Part 2 has opened with a framing section before the attack
      sections because the framing determines the detection architecture. Chapter 6
      opened with the injection threat model before building the classifier. Chapter
      8 opened with the poisoning taxonomy before building the auditing pipeline.
      Section 9.2 does the same for extraction.

      The risk of skipping the taxonomy is concrete. A defender who treats
      extraction as a single threat class -- adversary queries model excessively --
      will deploy a single-dimensional defence: a volume threshold that fires when
      any user exceeds N queries per hour. That defence has two failure modes.
      First, it blocks legitimate high-volume users (researchers, batch evaluation
      pipelines, automated testing) at the same rate it blocks adversaries.
      Second, a patient adversary who stays below N queries per hour can complete
      a full functionality extraction in weeks without ever triggering the threshold.

      A taxonomy-aware defender deploys different detection signals for different
      goals. A functionality extractor''s queries will spread across the input
      distribution; a boundary extractor''s queries will cluster near decision
      surfaces; a prompt extractor''s queries will target system configuration
      disclosure patterns. Each signal fires for the right adversary and not for
      the benign high-volume user whose queries are well-distributed across
      legitimate use cases.

      The four-goal taxonomy is not a theoretical nicety. It is the reason Section
      9.10 builds five distinct detection primitives rather than one. Each primitive
      was designed for a specific quadrant of the taxonomy matrix.

  - part: 2
    title: 'Functionality Extraction: Building a Deployable Clone'
    body: |
      Functionality extraction is the dominant extraction goal in commercial threat
      models. The adversary''s objective is a surrogate model that behaves like the
      victim across the full input distribution -- not just on specific inputs, not
      just near decision boundaries, but on the distribution of real-world queries
      that the product would receive. A successful functionality extraction produces
      a deployable model: the adversary can stand up their own inference endpoint
      serving the victim''s capability at their own infrastructure cost.

      The adversary motivation is economic. Training a capable model from scratch
      is expensive: data collection, compute, engineering time. A commercial model
      that represents months of training effort can be functionally extracted in
      days of querying if the extraction campaign is well-designed. The attacker
      pays query fees against the victim''s API and training cost for the surrogate;
      the total cost is far below the victim''s training cost if the surrogate
      achieves sufficient fidelity.

      The canonical technique is knowledge distillation (Section 9.4): the adversary
      uses the victim API as a teacher, queries it on a large input set, and trains
      a student model on the victim''s outputs. The student learns to mimic the
      teacher without access to the teacher''s weights or training data. The
      resulting surrogate can be deployed, fine-tuned, and distributed without
      the adversary bearing the original training cost.

      Query budget for functionality extraction scales with the input distribution
      complexity. A narrow-domain classifier (medical imaging, sentiment analysis)
      may extract in tens of thousands of queries. A general-purpose LLM requires
      a much larger query set to achieve broad functionality coverage. Active
      distillation (Section 9.4) reduces the budget by selecting queries that
      maximally reduce the student''s uncertainty, but the fundamental requirement
      is coverage: the surrogate must see enough of the input space to generalise.

      Detection signal: functionality extraction queries are broadly distributed
      across the input space. The query distribution of a legitimate user clusters
      around their use case. The query distribution of a functionality extractor
      spans diverse topics, domains, and input structures -- attempting to cover
      the victim model''s full capability surface. Query diversity is the primary
      detection signal.

  - part: 3
    title: 'Fidelity Extraction: Replicating Specific Behaviour'
    body: |
      Fidelity extraction is targeted where functionality extraction is broad.
      The adversary does not need a general-purpose clone -- they need exact
      behavioural match on a specific set of inputs that they care about. The
      goal is not distributional coverage but replication fidelity on a
      well-defined target input set.

      The threat model for fidelity extraction differs from functionality
      extraction in two important ways. First, the adversary knows which inputs
      they care about before beginning the campaign. A financial institution
      might extract a competitor''s credit-scoring model behaviour on a specific
      portfolio of applicant profiles. A security researcher might extract a
      malware classifier''s behaviour on a specific family of samples. The
      target input set is defined by the adversary''s use case, not by the
      victim model''s full capability.

      Second, fidelity extraction can succeed with far fewer queries than
      functionality extraction because the adversary does not need to cover the
      full input distribution. If the target set contains 10,000 inputs, the
      adversary needs approximately 10,000 to 50,000 queries to achieve high
      fidelity on that set -- far fewer than the queries required for broad
      distributional coverage.

      The surrogate from fidelity extraction is not a general-purpose clone.
      It may behave arbitrarily outside the target input set. For the
      adversary''s purpose, this is not a limitation -- they only need the
      model to behave correctly on the inputs they care about.

      Detection signal: fidelity extraction queries are concentrated in a
      narrow region of the input space -- the target set. Unlike functionality
      extraction (broad distribution) or boundary extraction (decision surface
      clustering), fidelity extraction produces query concentration on a
      semantically coherent input cluster. The user concentration analyser
      in Section 9.10 catches this: a user whose queries all fall in a narrow
      semantic neighbourhood is exhibiting fidelity extraction rather than
      legitimate varied usage.

  - part: 4
    title: 'Decision-Boundary Extraction: Mapping the Classification Surface'
    body: |
      Decision-boundary extraction has a different goal from the other three:
      the adversary wants the geometry of the victim model''s classification
      surface rather than a deployable clone or a stolen prompt. The objective
      is to understand where the model transitions between classes -- to map
      the boundary precisely enough to generate inputs that sit on or near it.

      Why is the decision boundary itself valuable? Two reasons. First, a
      precise boundary map enables adversarial example generation (Chapter 10):
      the adversary can construct inputs that the model misclassifies with high
      confidence, which is the prerequisite for evasion attacks against
      classifiers used in security-critical contexts (malware detection, fraud
      scoring, content moderation). Second, a boundary map reveals the model''s
      internal logic: what features drive the classification boundary, where the
      model''s confidence is lowest, and which inputs are closest to being
      misclassified without any perturbation.

      The technique is black-box decision boundary mapping (Section 9.3): the
      adversary submits input pairs that straddle the classification boundary,
      using the model''s responses to triangulate the boundary''s position in
      input space. Active learning drives query selection: each query is chosen
      to maximally reduce uncertainty about the boundary''s position, making
      boundary extraction significantly more budget-efficient than random
      sampling.

      Query budget for boundary extraction is lower than for functionality
      extraction when the input space is high-dimensional but the boundary
      is locally linear. For neural networks with complex, non-linear boundaries,
      the budget scales with the boundary''s complexity rather than the
      distribution''s coverage.

      Detection signal: boundary extraction queries cluster near the decision
      surface. Pairs of inputs with opposite class labels and small input
      distance are the signature of boundary probing. The OOD detector and
      boundary query detector in Section 9.10 target this signal specifically:
      benign users do not systematically submit near-boundary input pairs.

  - part: 5
    title: 'Prompt Extraction: Stealing the Operational Configuration'
    body: |
      Prompt extraction is the lowest-budget and most immediately actionable of
      the four extraction goals. The adversary does not need to replicate model
      weights or map decision boundaries -- they need to reconstruct the system
      prompt or hidden instructions that configure the model''s behaviour for a
      specific deployment.

      The value of a system prompt extends beyond its literal text. A system
      prompt encodes commercial IP (the product''s unique interaction design,
      persona, and behavioural constraints), security configuration (what the
      model is and is not permitted to do, which tools it can access, which
      content categories it filters), and operational parameters (output format
      requirements, escalation rules, compliance constraints). Extracting the
      system prompt gives the adversary a blueprint for replicating the
      product''s behaviour, a roadmap for finding security configuration gaps,
      and proprietary design decisions that represent engineering investment.

      Chapter 6 Section 6.2 covered single-prompt system prompt extraction as
      an injection technique: a single carefully crafted query attempts to elicit
      the system prompt directly. Prompt extraction at scale (Section 9.5) is
      different in mechanism and in defence requirements. The scaled version
      uses many queries -- some direct, some indirect -- to aggregate partial
      leakages into a full reconstruction. No single query needs to succeed
      completely; the aggregation of many small leakages reconstructs the full
      prompt over many requests.

      Query budget for prompt extraction is orders of magnitude lower than for
      functionality or boundary extraction. A short system prompt (a few hundred
      tokens) may reconstruct in 50 to 200 queries using aggregation techniques.
      A long, complex system prompt requires more, but the budget remains far
      below the query counts required for the other extraction goals.

      Detection signal: prompt extraction queries target system configuration
      disclosure. Direct queries explicitly ask the model to reveal its
      instructions. Indirect queries probe the model''s behavioural constraints
      through carefully constructed inputs whose outputs reveal prompt content
      probabilistically. The query pattern monitor in Section 9.11 includes a
      prompt reconstruction track that identifies both direct and indirect
      prompt extraction patterns.

  - part: 6
    title: 'Budget-Fidelity Tradeoffs and Targeted vs Untargeted Extraction'
    body: |
      Every extraction goal has a budget-fidelity tradeoff curve: as query count
      increases, extraction fidelity increases, up to an asymptotic ceiling
      determined by the adversary''s access level and the goal''s information
      requirements. Understanding these curves is what makes defensive rate
      limiting principled rather than arbitrary.

      For functionality extraction, the curve rises steeply at first (the first
      few thousand queries capture the bulk of the model''s common-case behaviour)
      then flattens as the adversary covers increasingly rare input regions. The
      asymptote is the victim model''s full capability -- achievable in theory
      given infinite queries, but practically approached to 80 to 90 percent
      fidelity in far fewer queries than the full training budget requires.

      For fidelity extraction on a fixed target set, the curve rises quickly
      and plateaus at near-100 percent fidelity once the target set is covered.
      The plateau is lower in query count than functionality extraction because
      the adversary is not trying to cover the full distribution.

      For decision-boundary extraction, the curve''s shape depends on boundary
      complexity. Locally linear boundaries near a target region approach high
      fidelity in hundreds of queries. Complex non-linear boundaries in high-
      dimensional spaces require more, but active learning (choosing boundary-
      straddling queries) provides the steepest possible ascent for the budget.

      For prompt extraction, the curve is steep and short: the first few dozen
      queries capture most of the prompt structure, and the curve plateaus once
      the aggregation has covered the prompt''s full content. A small query
      budget produces high-fidelity prompt reconstruction.

      The targeted versus untargeted distinction cuts across all four goals.
      Untargeted extraction replicates the victim''s behaviour across the full
      input distribution -- only functionality extraction is inherently untargeted
      (though it can be targeted to a domain). Fidelity, boundary, and prompt
      extraction are all targeted by definition: the adversary specifies the
      input set, boundary region, or prompt content they care about before
      beginning. Targeted extraction is more budget-efficient and more dangerous
      for specific use cases; untargeted extraction produces more generally
      useful surrogates.

  - part: 7
    title: 'Choosing the Right Defence for the Right Goal'
    body: |
      The taxonomy is not just an analytical tool -- it is the design input for
      the detection and defence architecture. Each extraction goal requires
      a different combination of detection primitives, and a defender who
      applies the taxonomy correctly can prioritise investment based on the
      threat model most relevant to their deployment.

      Functionality extraction is best addressed by query diversity monitoring
      (catching adversaries who cover the input space too broadly) combined
      with adaptive rate limiting (imposing budget constraints that make full
      distributional coverage expensive). Output watermarking provides post-hoc
      ownership evidence when functionality extraction succeeds despite prevention.

      Fidelity extraction is best addressed by user concentration analysis
      (catching queries concentrated in a narrow semantic region) and query
      cluster detection. The rate limiter contributes but fidelity extraction
      often stays below volume thresholds because the target set is small.

      Decision-boundary extraction is best addressed by the boundary query
      detector (catching near-boundary input pairs) and OOD detection (boundary-
      probing queries often fall outside the model''s legitimate input distribution).
      Output perturbation (Section 9.12) degrades the information content of
      boundary-probing queries, forcing higher budget for the same boundary fidelity.

      Prompt extraction is best addressed by the prompt reconstruction pattern
      detector in the query monitor and by output-side perturbation that reduces
      the per-query leakage of system configuration. A single direct prompt
      extraction query may be caught by the Chapter 6 injection classifier;
      scaled aggregation prompt extraction requires the query pattern monitor
      to track the cumulative pattern.

      The goal-to-detection-signal mapping is the design document for Section
      9.10''s detection primitive library. Each primitive exists because a specific
      goal required it. Sections 9.11 and 9.12 wire these primitives into
      production controls that cover all four quadrants of the taxonomy matrix.

