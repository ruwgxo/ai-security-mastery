  - id: 2
    name: 'budget_fidelity_model.py'
    description: |
      Models the budget-fidelity tradeoff curve for each extraction goal using a
      logarithmic growth function parameterised by goal and access level. Provides
      a project_fidelity() function that estimates achievable fidelity for a given
      query budget, and a queries_for_fidelity() function that estimates the query
      budget required to reach a target fidelity level.
    implementation_notes: |
      Single quotes throughout per book convention. Requires only stdlib math.
      Curve parameters are data-driven per goal and access level. No hardcoded
      per-goal arithmetic -- BudgetFidelityParams drives all calculations.
    code: |
      # budget_fidelity_model.py
      # Chapter 9 Section 9.2 -- Budget-Fidelity Tradeoff Model
      # Single quotes throughout per book convention.

      import math
      from dataclasses import dataclass
      from typing import Dict, List, Optional, Tuple


      @dataclass
      class BudgetFidelityParams:
          goal: str
          access_level: str
          # Logistic growth model: fidelity = ceiling / (1 + exp(-k * (q - q_half)))
          # ceiling: maximum achievable fidelity (0.0 to 1.0)
          # k: growth rate (steepness of the curve)
          # q_half: query count at which fidelity reaches ceiling/2
          ceiling: float
          k: float
          q_half: float
          note: str


      # Parameters derived from published extraction research (approximate).
      # Tramer et al. 2016, Papernot et al. 2017, Carlini et al. 2021.
      BUDGET_FIDELITY_PARAMS: Dict[Tuple[str, str], BudgetFidelityParams] = {
          ('functionality', 'black_box'): BudgetFidelityParams(
              goal='functionality', access_level='black_box',
              ceiling=0.92, k=0.00003, q_half=80000,
              note='Narrow-domain classifier. LLM ceiling is lower (~0.75) at similar budget.',
          ),
          ('functionality', 'grey_box'): BudgetFidelityParams(
              goal='functionality', access_level='grey_box',
              ceiling=0.94, k=0.00015, q_half=20000,
              note='Soft-label output provides ~5x effective budget increase.',
          ),
          ('fidelity', 'black_box'): BudgetFidelityParams(
              goal='fidelity', access_level='black_box',
              ceiling=0.99, k=0.001, q_half=3000,
              note='Target set of 1000 inputs; fidelity on target set, not full distribution.',
          ),
          ('fidelity', 'grey_box'): BudgetFidelityParams(
              goal='fidelity', access_level='grey_box',
              ceiling=0.99, k=0.005, q_half=600,
              note='Soft-label provides ~5x budget reduction for target set coverage.',
          ),
          ('decision_boundary', 'black_box'): BudgetFidelityParams(
              goal='decision_boundary', access_level='black_box',
              ceiling=0.88, k=0.0002, q_half=15000,
              note='Regional boundary map; ceiling limited by curse of dimensionality.',
          ),
          ('decision_boundary', 'grey_box'): BudgetFidelityParams(
              goal='decision_boundary', access_level='grey_box',
              ceiling=0.95, k=0.001, q_half=3000,
              note='Confidence scores greatly accelerate boundary triangulation.',
          ),
          ('prompt', 'black_box'): BudgetFidelityParams(
              goal='prompt', access_level='black_box',
              ceiling=0.97, k=0.05, q_half=100,
              note='Short-to-medium system prompt (100-500 tokens). Ceiling near-perfect.',
          ),
          ('prompt', 'grey_box'): BudgetFidelityParams(
              goal='prompt', access_level='grey_box',
              ceiling=0.97, k=0.05, q_half=100,
              note='Grey-box provides no advantage for text prompt reconstruction.',
          ),
      }


      def project_fidelity(goal: str, access_level: str, query_budget: int) -> Optional[float]:
          '''
          Estimate achievable fidelity for a given query budget, extraction goal,
          and adversary access level. Returns None if the combination is not modelled.
          '''
          params = BUDGET_FIDELITY_PARAMS.get((goal, access_level))
          if params is None:
              return None
          exponent = -params.k * (query_budget - params.q_half)
          fidelity = params.ceiling / (1.0 + math.exp(exponent))
          return round(min(fidelity, params.ceiling), 4)


      def queries_for_fidelity(goal: str, access_level: str, target_fidelity: float) -> Optional[int]:
          '''
          Estimate the query budget required to reach a target fidelity level.
          Returns None if the target is above the ceiling or the combination is not modelled.
          '''
          params = BUDGET_FIDELITY_PARAMS.get((goal, access_level))
          if params is None:
              return None
          if target_fidelity >= params.ceiling:
              return None  # above ceiling; not achievable
          ratio = params.ceiling / target_fidelity - 1.0
          queries = params.q_half - math.log(ratio) / params.k
          return max(1, int(math.ceil(queries)))


      def render_tradeoff_table(query_counts: Optional[List[int]] = None) -> None:
          if query_counts is None:
              query_counts = [100, 1000, 10000, 100000, 500000]
          print('BUDGET-FIDELITY TRADEOFF TABLE -- Chapter 9 Section 9.2')
          print(f'{"Goal + Access":<30} ' + ' '.join(f'{q:>8}q' for q in query_counts))
          print('-' * (30 + 10 * len(query_counts)))
          for (goal, level), params in BUDGET_FIDELITY_PARAMS.items():
              label = f'{goal}/{level}'
              row = f'{label:<30} '
              for q in query_counts:
                  fidelity = project_fidelity(goal, level, q)
                  if fidelity is not None:
                      row += f'{fidelity:>8.1%} '
                  else:
                      row += f'{"N/A":>8} '
              print(row)
              print(f'  {"Note:":<28} {params.note}')


      if __name__ == '__main__':
          render_tradeoff_table()
          print()
          # Example: estimate budget required for 80% fidelity functionality extraction
          budget = queries_for_fidelity('functionality', 'black_box', 0.80)
          print(f'Queries for 80% functionality fidelity (black-box): {budget:,}')
          budget_grey = queries_for_fidelity('functionality', 'grey_box', 0.80)
          print(f'Queries for 80% functionality fidelity (grey-box):  {budget_grey:,}')

