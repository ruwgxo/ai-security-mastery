        budget_black_box: '10K-1M+ depending on model complexity and required fidelity'
        detection_signal: 'High query diversity across input space; broad topic and domain spread'
      - goal: 'Fidelity'
        objective: 'Exact behavioural match on a specific target input set'
        black_box_technique: 'Targeted hard-label distillation on the target set (Section 9.4)'
        grey_box_technique: 'Targeted soft-label distillation on the target set (Section 9.4)'
        budget_black_box: '1x to 5x the target set size; typically 1K-50K'
        detection_signal: 'Query concentration in a narrow semantic region; low input diversity per user'
      - goal: 'Decision-Boundary'
        objective: 'Geometry of the classification surface for adversarial example generation'
        black_box_technique: 'Boundary pair probing; active learning toward classification boundary (Section 9.3)'
        grey_box_technique: 'Confidence-guided boundary triangulation (Section 9.3)'
        budget_black_box: '100-100K depending on boundary complexity and dimensionality'
        detection_signal: 'Near-boundary input pairs; opposite-label inputs with small distance; OOD query clustering'
      - goal: 'Prompt'
        objective: 'System prompt and operational configuration reconstruction'
        black_box_technique: 'Direct elicitation queries and indirect aggregation (Section 9.5)'
        grey_box_technique: 'Same as black-box; soft labels do not add information for text prompt reconstruction'
        budget_black_box: '50-500 queries for typical system prompts'
        detection_signal: 'System configuration disclosure query patterns; instruction elicitation phrasing; aggregation across many partial leakages'

  - table: 2
    title: 'Budget-Fidelity Tradeoff Summary'
    description: |
      Approximate budget ranges and fidelity ceiling for each extraction goal across
