    name: 'goal_detection_signal_mapper.py'
    description: |
      Encodes the goal-to-detection-signal mapping as structured data. Provides a
      get_detection_coverage() function that takes a list of deployed detection
      primitives and returns a per-goal coverage report showing which extraction
      goals are fully, partially, or not covered.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Coverage evaluation is data-driven via DetectionCoverage dataclass and
      GOAL_DETECTION_MAP. No hardcoded per-goal coverage conditionals.
    code: |
      # goal_detection_signal_mapper.py
      # Chapter 9 Section 9.2 -- Goal-to-Detection-Signal Mapping
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Set


      @dataclass
      class GoalDetectionEntry:
          goal: str
          primary_primitive: str
          secondary_primitive: str
          output_side_defence: str
          required_primitives: List[str]
          section_references: List[str]


      GOAL_DETECTION_MAP: Dict[str, GoalDetectionEntry] = {
          'functionality': GoalDetectionEntry(
              goal='functionality',
              primary_primitive='query_diversity_monitor',
              secondary_primitive='adaptive_rate_limiter',
              output_side_defence='output_watermarker',
              required_primitives=['query_diversity_monitor', 'adaptive_rate_limiter'],
              section_references=['9.10', '9.11', '9.12'],
          ),
          'fidelity': GoalDetectionEntry(
              goal='fidelity',
              primary_primitive='user_concentration_analyser',
              secondary_primitive='query_pattern_monitor',
              output_side_defence='output_perturbator',
              required_primitives=['user_concentration_analyser', 'query_pattern_monitor'],
              section_references=['9.10', '9.11'],
          ),
          'decision_boundary': GoalDetectionEntry(
              goal='decision_boundary',
              primary_primitive='boundary_query_detector',
              secondary_primitive='ood_detector',
              output_side_defence='output_perturbator',
              required_primitives=['boundary_query_detector', 'ood_detector'],
              section_references=['9.10', '9.11', '9.12'],
          ),
          'prompt': GoalDetectionEntry(
              goal='prompt',
              primary_primitive='prompt_reconstruction_pattern_detector',
              secondary_primitive='query_monitor_cumulative_pattern',
              output_side_defence='output_perturbator',
              required_primitives=['prompt_reconstruction_pattern_detector', 'query_monitor_cumulative_pattern'],
              section_references=['9.5', '9.10', '9.11', '9.12'],
          ),
      }


      def get_detection_coverage(deployed_primitives: List[str]) -> Dict[str, str]:
          '''
          Given a list of deployed detection primitive names, return per-goal coverage status.
          Status: 'full', 'partial', or 'none'.
          '''
          deployed_set: Set[str] = set(deployed_primitives)
          coverage: Dict[str, str] = {}
          for goal, entry in GOAL_DETECTION_MAP.items():
              matched = [p for p in entry.required_primitives if p in deployed_set]
              if len(matched) == len(entry.required_primitives):
                  coverage[goal] = 'full'
              elif len(matched) > 0:
                  coverage[goal] = 'partial'
              else:
                  coverage[goal] = 'none'
          return coverage


      def render_signal_map() -> None:
          print('GOAL-TO-DETECTION-SIGNAL MAP -- Chapter 9 Section 9.2')
          print('=' * 60)
          for goal, entry in GOAL_DETECTION_MAP.items():
              print(f'\nGoal: {goal.upper()}')
              print(f'  Primary:    {entry.primary_primitive}')
              print(f'  Secondary:  {entry.secondary_primitive}')
              print(f'  Output:     {entry.output_side_defence}')
              print(f'  Sections:   {", ".join(entry.section_references)}')


      if __name__ == '__main__':
          render_signal_map()
          print()
          example_deployed = ['query_diversity_monitor', 'adaptive_rate_limiter', 'ood_detector']
          coverage = get_detection_coverage(example_deployed)
          print('Coverage with example deployed primitives:')
          for goal, status in coverage.items():
              print(f'  {goal}: {status}')

