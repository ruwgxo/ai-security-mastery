      - 'Active Learning Budget Reduction Factor'
    rows:
      - goal: 'Functionality'
        low_budget: 'Partial; common-case behaviour only; fails on rare inputs'
        medium_budget: '70-85% fidelity on held-out test set for narrow-domain models'
        high_budget: '90%+ fidelity achievable for narrow-domain; 70-80% for general LLMs'
        grey_box_reduction: '5-50x'
        active_learning_reduction: '2-10x additional reduction on top of access level gain'
      - goal: 'Fidelity'
        low_budget: 'Near-100% fidelity if target set size is under 100'
        medium_budget: 'Near-100% fidelity for target sets up to 10K inputs'
        high_budget: 'Near-100% fidelity for target sets up to 100K inputs'
        grey_box_reduction: '3-20x'
        active_learning_reduction: '2-5x for target set coverage'
      - goal: 'Decision-Boundary'
        low_budget: 'Local boundary approximation near a specific input; not globally useful'
        medium_budget: 'Regional boundary map; sufficient for targeted adversarial example generation'
        high_budget: 'Global boundary geometry for lower-dimensional models'
        grey_box_reduction: '5-50x (confidence scores greatly accelerate boundary triangulation)'
        active_learning_reduction: '5-20x (active learning is the defining technique for boundary extraction)'
      - goal: 'Prompt'
        low_budget: 'Near-complete reconstruction for short prompts (under 200 tokens)'
        medium_budget: 'Full reconstruction for complex multi-paragraph system prompts'
        high_budget: 'Full reconstruction plus adversarial variants probing configuration gaps'
        grey_box_reduction: '1x (soft labels do not add information for text prompt reconstruction)'
        active_learning_reduction: '2-5x (targeted aggregation queries are more efficient than random)'

