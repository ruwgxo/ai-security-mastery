deliverables:

  - id: 1
    name: 'extraction_taxonomy.py'
    description: |
      Encodes the full four-goal by three-access-level extraction taxonomy as
      structured data. Provides a lookup function that returns the full taxonomy
      entry for a given goal and access level combination, and a render function
      that prints the complete matrix. Used as the reference data structure
      imported by later deliverables in this section.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Taxonomy is fully data-driven via ExtractionGoal and TaxonomyCell dataclasses.
      No hardcoded per-goal or per-access-level conditionals.
    code: |
      # extraction_taxonomy.py
      # Chapter 9 Section 9.2 -- Extraction Taxonomy Matrix
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional, Tuple


      @dataclass
      class TaxonomyCell:
          goal: str
          access_level: str
          adversary_objective: str
          canonical_technique: str
          approx_query_budget: str
          primary_detection_signal: str
          atlas_techniques: List[str]
          owasp_sub_risk: str
          section_references: List[str]


      @dataclass
      class ExtractionGoal:
          name: str
          description: str
          targeted: str  # 'targeted', 'untargeted', or 'both'
          cells: Dict[str, TaxonomyCell]  # keyed by access_level


      EXTRACTION_TAXONOMY: Dict[str, ExtractionGoal] = {
          'functionality': ExtractionGoal(
              name='functionality',
              description='Deployable surrogate clone matching victim across full input distribution',
              targeted='untargeted',
              cells={
                  'black_box': TaxonomyCell(
                      goal='functionality',
                      access_level='black_box',
                      adversary_objective='Deployable surrogate matching victim across full input distribution',
                      canonical_technique='Hard-label distillation on diverse input set',
                      approx_query_budget='10K-1M+ depending on model complexity',
                      primary_detection_signal='High query diversity across input space; broad topic and domain spread',
                      atlas_techniques=['AML.T0040', 'AML.T0044'],
                      owasp_sub_risk='LLM10.1',
                      section_references=['9.4', '9.10', '9.11', '9.12'],
                  ),
                  'grey_box': TaxonomyCell(
                      goal='functionality',
                      access_level='grey_box',
                      adversary_objective='Deployable surrogate matching victim across full input distribution',
                      canonical_technique='Soft-label distillation with active query selection',
                      approx_query_budget='200-200K (5-50x reduction vs black-box)',
                      primary_detection_signal='High query diversity; soft-label API access exploitation pattern',
                      atlas_techniques=['AML.T0040', 'AML.T0044'],
                      owasp_sub_risk='LLM10.1',
                      section_references=['9.4', '9.10', '9.11', '9.12'],
                  ),
                  'white_box': TaxonomyCell(
                      goal='functionality',
                      access_level='white_box',
                      adversary_objective='Deployable surrogate or direct weight copy',
                      canonical_technique='Direct weight copy or gradient-based distillation',
                      approx_query_budget='Zero for direct copy; minimal for gradient-based',
                      primary_detection_signal='Weight access event; watermark detection in surrogate post-deployment',
                      atlas_techniques=['AML.T0040', 'AML.T0044'],
                      owasp_sub_risk='LLM10.1',
                      section_references=['9.4', '9.12'],
                  ),
              },
          ),
          'fidelity': ExtractionGoal(
              name='fidelity',
