    title: 'Extraction Taxonomy Matrix: Four Goals by Three Access Levels'
    description: |
      Primary reference matrix for Chapter 9. Maps extraction goals against adversary
      access levels with objective, canonical technique, query budget order-of-
      magnitude, and primary detection signal for each cell.
    columns:
