    name: 'atlas_goal_crossref.py'
    description: |
      Provides a cross-reference between extraction goals and ATLAS sub-techniques.
      Implements a get_techniques_for_goal() function and an inverse
      get_goals_for_technique() function, enabling bidirectional navigation between
      the Chapter 9 extraction taxonomy and the ATLAS framework.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Bidirectional index is built dynamically from GOAL_ATLAS_MAP -- no
      hardcoded per-technique goal lists.
    code: |
      # atlas_goal_crossref.py
      # Chapter 9 Section 9.2 -- ATLAS Sub-Technique Cross-Reference by Extraction Goal
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Set


      @dataclass
      class GoalAtlasEntry:
          goal: str
          atlas_techniques: List[str]
          owasp_sub_risk: str
          targeted: str
          primary_section: str
          detection_section: str


      GOAL_ATLAS_MAP: Dict[str, GoalAtlasEntry] = {
          'functionality': GoalAtlasEntry(
              goal='functionality',
              atlas_techniques=['AML.T0040', 'AML.T0044'],
              owasp_sub_risk='LLM10.1',
              targeted='untargeted',
              primary_section='9.4',
              detection_section='9.11',
          ),
          'fidelity': GoalAtlasEntry(
              goal='fidelity',
              atlas_techniques=['AML.T0040', 'AML.T0044'],
              owasp_sub_risk='LLM10.1',
              targeted='targeted',
              primary_section='9.4',
              detection_section='9.11',
          ),
          'decision_boundary': GoalAtlasEntry(
              goal='decision_boundary',
              atlas_techniques=['AML.T0040'],
              owasp_sub_risk='LLM10.1',
              targeted='both',
              primary_section='9.3',
              detection_section='9.11',
          ),
          'prompt': GoalAtlasEntry(
              goal='prompt',
              atlas_techniques=['AML.T0040', 'AML.T0024'],
              owasp_sub_risk='LLM10.2',
              targeted='targeted',
              primary_section='9.5',
              detection_section='9.11',
          ),
      }


      def _build_technique_index(goal_map: Dict[str, GoalAtlasEntry]) -> Dict[str, List[str]]:
          '''Build inverse index from ATLAS technique to list of extraction goals.'''
          index: Dict[str, List[str]] = {}
          for goal, entry in goal_map.items():
              for technique in entry.atlas_techniques:
                  index.setdefault(technique, []).append(goal)
          return index


      _TECHNIQUE_INDEX: Dict[str, List[str]] = _build_technique_index(GOAL_ATLAS_MAP)


      def get_techniques_for_goal(goal: str) -> List[str]:
          '''Return the ATLAS sub-techniques associated with a given extraction goal.'''
          entry = GOAL_ATLAS_MAP.get(goal)
          return entry.atlas_techniques if entry else []


      def get_goals_for_technique(technique: str) -> List[str]:
          '''Return the extraction goals associated with a given ATLAS sub-technique.'''
          return _TECHNIQUE_INDEX.get(technique, [])


      def render_crossref() -> None:
          print('ATLAS GOAL CROSS-REFERENCE -- Chapter 9 Section 9.2')
          print('=' * 60)
          print('\nGoal -> Techniques:')
          for goal, entry in GOAL_ATLAS_MAP.items():
              print(f'  {goal:<20} {", ".join(entry.atlas_techniques):<30} ({entry.owasp_sub_risk})')
          print('\nTechnique -> Goals:')
          for technique, goals in sorted(_TECHNIQUE_INDEX.items()):
              print(f'  {technique:<15} {", ".join(goals)}')


      if __name__ == '__main__':
          render_crossref()
          print()
          print(f'Techniques for functionality: {get_techniques_for_goal("functionality")}')
          print(f'Goals for AML.T0024:          {get_goals_for_technique("AML.T0024")}')

  - id: 5
    name: 'defender_decision_tree.py'
    description: |
      Implements a defender decision tree that classifies an observed query pattern
      into the most likely extraction goal. Takes observable signals from the query
      monitor and returns the ranked extraction goal hypotheses with confidence
      scores and recommended detection primitives. Intended as the classification
      layer that sits above the raw query monitor output in Section 9.11.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Signal scoring is fully data-driven via GoalSignalProfile dataclass list.
      No hardcoded per-goal if/else blocks. Confidence is normalised signal
      overlap fraction across the profile.
    code: |
      # defender_decision_tree.py
      # Chapter 9 Section 9.2 -- Defender Decision Tree
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Set, Tuple


      @dataclass
      class GoalSignalProfile:
          goal: str
          positive_signals: List[str]   # signals that increase confidence in this goal
          negative_signals: List[str]   # signals that decrease confidence in this goal
          recommended_primitives: List[str]
          escalation_action: str


      GOAL_SIGNAL_PROFILES: List[GoalSignalProfile] = [
          GoalSignalProfile(
              goal='functionality',
              positive_signals=[
                  'high_query_diversity',
                  'broad_topic_spread',
                  'multi_domain_queries',
                  'sustained_high_volume',
                  'systematic_input_coverage',
              ],
              negative_signals=[
                  'narrow_semantic_cluster',
                  'prompt_elicitation_phrasing',
                  'near_boundary_pairs',
              ],
              recommended_primitives=['query_diversity_monitor', 'adaptive_rate_limiter', 'output_watermarker'],
              escalation_action='rate_limit_user_and_alert_tier2',
          ),
          GoalSignalProfile(
              goal='fidelity',
              positive_signals=[
                  'narrow_semantic_cluster',
                  'low_per_user_input_diversity',
                  'repeated_similar_inputs',
                  'target_domain_concentration',
              ],
              negative_signals=[
                  'high_query_diversity',
                  'prompt_elicitation_phrasing',
                  'near_boundary_pairs',
              ],
              recommended_primitives=['user_concentration_analyser', 'query_pattern_monitor', 'output_perturbator'],
              escalation_action='rate_limit_user_and_alert_tier2',
          ),
          GoalSignalProfile(
              goal='decision_boundary',
              positive_signals=[
                  'near_boundary_pairs',
                  'opposite_label_close_inputs',
                  'ood_query_clustering',
                  'low_confidence_query_concentration',
                  'systematic_input_perturbation',
              ],
              negative_signals=[
                  'high_query_diversity',
                  'narrow_semantic_cluster',
                  'prompt_elicitation_phrasing',
              ],
              recommended_primitives=['boundary_query_detector', 'ood_detector', 'output_perturbator'],
              escalation_action='block_and_alert_tier1',
          ),
          GoalSignalProfile(
              goal='prompt',
              positive_signals=[
                  'prompt_elicitation_phrasing',
                  'instruction_disclosure_queries',
                  'configuration_probing_pattern',
                  'system_context_inference_queries',
              ],
              negative_signals=[
                  'high_query_diversity',
                  'near_boundary_pairs',
                  'low_per_user_input_diversity',
              ],
              recommended_primitives=['prompt_reconstruction_pattern_detector', 'query_monitor_cumulative_pattern', 'output_perturbator'],
              escalation_action='block_and_alert_tier1',
          ),
      ]


      @dataclass
      class GoalHypothesis:
          goal: str
          confidence: float  # 0.0 to 1.0
          matched_signals: List[str]
          contradicted_signals: List[str]
          recommended_primitives: List[str]
          escalation_action: str


      def classify_query_pattern(observed_signals: List[str]) -> List[GoalHypothesis]:
          '''
          Classify an observed query pattern into ranked extraction goal hypotheses.
          Returns goals sorted by confidence (descending).
          Confidence = (positive_matches - negative_matches) / total_profile_signals,
          clamped to [0.0, 1.0].
          '''
          observed_set: Set[str] = set(observed_signals)
          hypotheses: List[GoalHypothesis] = []

          for profile in GOAL_SIGNAL_PROFILES:
              matched = [s for s in profile.positive_signals if s in observed_set]
              contradicted = [s for s in profile.negative_signals if s in observed_set]
              total_signals = len(profile.positive_signals) + len(profile.negative_signals)
              raw_score = len(matched) - len(contradicted)
              confidence = max(0.0, raw_score / total_signals) if total_signals > 0 else 0.0
              hypotheses.append(GoalHypothesis(
                  goal=profile.goal,
                  confidence=round(confidence, 4),
                  matched_signals=matched,
                  contradicted_signals=contradicted,
                  recommended_primitives=profile.recommended_primitives,
                  escalation_action=profile.escalation_action,
              ))

          hypotheses.sort(key=lambda h: h.confidence, reverse=True)
          return hypotheses


      def render_classification(observed_signals: List[str]) -> None:
          print('DEFENDER DECISION TREE -- Chapter 9 Section 9.2')
          print(f'Observed signals: {observed_signals}')
          print('=' * 60)
          hypotheses = classify_query_pattern(observed_signals)
          for i, h in enumerate(hypotheses, 1):
              print(f'\n{i}. Goal: {h.goal.upper()} (confidence: {h.confidence:.1%})')
              print(f'   Matched:      {h.matched_signals}')
              print(f'   Contradicted: {h.contradicted_signals}')
              print(f'   Primitives:   {h.recommended_primitives}')
              print(f'   Escalation:   {h.escalation_action}')


      if __name__ == '__main__':
          # Example: signals consistent with decision-boundary extraction
          example_signals = [
              'near_boundary_pairs',
              'opposite_label_close_inputs',
              'ood_query_clustering',
              'systematic_input_perturbation',
          ]
          render_classification(example_signals)

common_mistakes:

  - id: 1
    description: 'Treating all extraction attempts as the same threat and deploying a single undifferentiated volume threshold'
    why_it_happens: |
      Extraction is perceived as a query-volume problem: the adversary queries
      too much. A volume threshold feels like a complete defence because it targets
      the one property all extraction attacks share. Teams skip the taxonomy because
      it requires more design effort than a single rate limit.
    consequence: |
      The threshold blocks legitimate high-volume users (batch evaluation, automated
      testing, research pipelines) while missing patient adversaries who stay below
      the volume ceiling. A prompt extractor needs 50 to 500 queries -- well below
      any reasonable volume threshold. A boundary extractor issues individually
      benign queries at a low rate. Neither is caught by volume alone.
    correct_approach: |
      Deploy detection primitives aligned to each extraction goal: diversity
      monitoring for functionality, concentration analysis for fidelity, boundary
      pair detection for decision-boundary, and prompt elicitation pattern
      detection for prompt. Volume thresholds are one input to the adaptive rate
      limiter, not the complete defence.

  - id: 2
    description: 'Conflating prompt extraction with single-prompt injection (the Chapter 6 threat model)'
    why_it_happens: |
      Both attacks involve system prompts. Chapter 6 Section 6.2 covered single-
      prompt injection where a single carefully crafted query attempts to elicit
      the system prompt. Readers carry that frame into Chapter 9 and assume the
      Chapter 6 classifier handles prompt extraction.
    consequence: |
      The Chapter 6 injection classifier catches obvious direct elicitation attempts
      but has no visibility into aggregation-based prompt extraction: the adversary
      issues many indirect queries, each individually benign, that together
      reconstruct the system prompt. The classifier scores each query independently
      and finds nothing actionable.
    correct_approach: |
      Prompt extraction at scale requires cumulative query pattern monitoring
      (Section 9.11) rather than single-request classification. The Chapter 6
      classifier remains in the ensemble for single-prompt injection; Section 9.11
      adds a prompt reconstruction track that accumulates indirect leakage signals
      across many requests.

  - id: 3
    description: 'Assuming decision-boundary extraction only matters for image classifiers'
    why_it_happens: |
      The canonical boundary extraction literature (Tramer et al. 2016, Section 9.3)
      focuses on image classifiers and tabular ML models. The visual intuition of
      a decision boundary applies more naturally to classification than to text
      generation. Readers assume LLMs are not vulnerable to boundary extraction.
    consequence: |
      LLMs used as classifiers -- content moderation, spam detection, safety
      filtering, intent classification -- have decision boundaries that are
      exploitable via the same probing techniques. An adversary who maps the
      safety filter''s boundary can construct inputs that consistently evade it.
      This is the Chapter 10 connection: boundary extraction is the precursor
      to adversarial example generation against any classifier, including LLM-based
      ones.
    correct_approach: |
      Apply boundary extraction threat modelling to any model that makes binary
      or categorical decisions, regardless of architecture. For LLMs used as
      text generators, boundary extraction is less applicable; for LLMs used as
      classifiers (the increasingly common deployment pattern), it is directly
      relevant.

  - id: 4
    description: 'Using query budget estimates from black-box scenarios to design defences against grey-box APIs'
    why_it_happens: |
      Budget-fidelity curves from the literature are typically reported for
      black-box access because it is the harder extraction scenario and produces
      more conservative (defender-friendly) estimates. Teams use these estimates
      to set rate limits without checking whether their API actually returns
      soft labels or probability distributions.
    consequence: |
      The rate limit is set based on a 100,000-query extraction scenario when the
      API returns soft labels and the actual attack requires 2,000 to 20,000
      queries. The adversary completes the extraction campaign well within the
      rate limit budget before the defender''s threshold fires.
    correct_approach: |
      Audit the API''s output fields before setting rate limits. If the API returns
      probability distributions, apply grey-box budget estimates (5 to 50x lower
      than black-box) to the rate limit design. Consider removing probability
      distributions from the API response if the product does not require them.

  - id: 5
    description: 'Mapping extraction goals to ATLAS techniques and stopping there without connecting to detection controls'
    why_it_happens: |
      ATLAS mapping is a compliance and reporting requirement in many security
      programmes. Teams complete the taxonomy exercise, record the ATLAS technique
      IDs, and move on. The mapping is treated as documentation rather than as
      the input to detection control design.
    consequence: |
      The organisation has a well-documented threat taxonomy with no corresponding
      detection primitives. An extraction campaign maps cleanly to AML.T0040 in
      the threat register, but the query monitor that would detect it was never
      built because the taxonomy exercise ended before the control design began.
    correct_approach: |
      Use the taxonomy matrix as the design document for detection controls.
      Every cell in the four-goal by three-access-level matrix that is in scope
      for the deployment should map to at least one deployed detection primitive.
      The goal-to-detection-signal map (Table 3 and Deliverable 3) is the
      bridge between taxonomy and implementation.

section_summary:
  compact: |
    Four extraction goals define the Chapter 9 attack landscape. Functionality
    extraction builds a deployable clone matching the victim across the full input
    distribution -- the dominant commercial threat because it produces a working
    product replacement. Fidelity extraction targets exact behavioural match on a
    specific input set -- targeted, budget-efficient, and sufficient for the
    adversary''s use case. Decision-boundary extraction maps the classification
    surface for adversarial example generation -- the precursor to Chapter 10
    evasion attacks. Prompt extraction reconstructs the system prompt and
    operational configuration at very low query budget -- cheap, immediately
    actionable, and leaking both IP and security configuration. The four goals
    differ in query budget, query pattern, required adversary access level,
    and optimal detection primitive. Undifferentiated volume thresholds cover
    none of them adequately. The taxonomy matrix and defender decision tree
    in this section are the design inputs for the detection primitive library
    in Section 9.10 and the production controls in Sections 9.11 and 9.12.

  key_takeaways:
    - 'Functionality extraction is the dominant commercial threat; it produces a deployable clone via distillation'
    - 'Prompt extraction is the lowest-budget and most immediately actionable goal; 50-500 queries reconstruct a typical system prompt'
    - 'Decision-boundary extraction is the precursor to adversarial example generation; it connects extraction (Chapter 9) to evasion (Chapter 10)'
    - 'Grey-box APIs give adversaries a 5-50x query budget discount for functionality and boundary extraction; output design is a security decision'
    - 'Each extraction goal requires a different detection primitive; volume thresholds alone cover none adequately'
    - 'The defender decision tree classifies observed query patterns to the most likely goal, enabling targeted primitive deployment'

preview_section_03:
  title: 'Section 9.3: Query-Based Extraction Fundamentals -- Black-Box Decision Boundary Mapping'
  preview: |
    Section 9.2 named the four extraction goals and placed them in a taxonomy
    matrix. Section 9.3 builds the first attack implementation: black-box decision
    boundary mapping, the foundational primitive that underpins decision-boundary
    extraction and informs the distillation attacks in Section 9.4. The section
    establishes the canonical Tramer et al. 2016 result -- a linear model extracted
    in O(d) queries -- and builds the active learning loop that makes boundary
    mapping budget-efficient. The detection insight from Section 9.3 is the one
    that drives the boundary query detector in Section 9.10: extraction queries
    cluster near decision boundaries while benign queries cluster in high-density
    input regions. Understanding why that clustering occurs mechanistically is what
    makes the detector design defensible rather than heuristic.

