                  'C) User concentration analyser',
                  'D) Output entropy monitor',
              ],
              correct_index=2,
              explanation='Section 9.10: fidelity extraction does not produce OOD queries, boundary pairs, or volume anomalies. The user concentration analyser detects the semantic clustering in the target set -- the unique signal.',
          ),
          QuizQuestion(
              question_id='Q15',
              section_tag='9.10',
              question='What approximate detection rate does the Section 9.10 ensemble achieve against benchmark-distribution LLM distillation?',
              options=[
                  'A) 95-98%',
                  'B) 88-93%',
                  'C) 60-70%',
                  'D) 30-40%',
              ],
              correct_index=3,
              explanation='Section 9.10 Table 4: benchmark-distribution distillation achieves 30-40% ensemble detection rate because the query distribution is indistinguishable from legitimate evaluation use.',
          ),
          QuizQuestion(
              question_id='Q16',
              section_tag='9.11',
              question='What is the one structural difference between Track 6 and Tracks 1-5 in the gateway ensemble?',
              options=[
                  'A) Track 6 runs at lower priority',
                  'B) Track 6 is stateful -- it maintains per-user state across sessions',
                  'C) Track 6 has a longer latency budget',
                  'D) Track 6 operates on model responses rather than user inputs',
              ],
              correct_index=1,
              explanation='Section 9.11: Tracks 1-5 are stateless per-request. Track 6 maintains rolling per-user windows across sessions via a distributed state store.',
          ),
          QuizQuestion(
              question_id='Q17',
              section_tag='9.11',
              question='Why must the state store write in Track 6 be asynchronous rather than synchronous?',
              options=[
                  'A) The state store is physically remote and cannot be accessed synchronously',
                  'B) Synchronous writes add state store latency to the critical path, risking 50ms P99 budget violation',
                  'C) State consistency requires async writes to avoid race conditions',
                  'D) Async writes allow batching for efficiency',
              ],
              correct_index=1,
              explanation='Section 9.11: a slow state store write on the critical path would add tail latency to the gateway response. Async fire-and-forget writes accept a one-request lag in exchange for latency isolation.',
          ),
          QuizQuestion(
              question_id='Q18',
              section_tag='9.12',
              question='Why does the watermark transfer from the victim model to a student trained on its outputs?',
              options=[
                  'A) The student model is initialised from the victim\'s weights',
                  'B) The student learns to replicate the victim\'s output distribution, including the green-token bias in the training data',
                  'C) The watermark is embedded in the model architecture, not the outputs',
                  'D) Transfer requires the adversary to use the same vocabulary as the victim',
              ],
              correct_index=1,
              explanation='Section 9.12: distillation trains the student on (prompt, victim_response) pairs. The victim\'s responses have a green-token excess. The student learns this bias from the training data distribution.',
          ),
          QuizQuestion(
              question_id='Q19',
              section_tag='9.12',
              question='What is the z-score threshold for watermark detection at p-value < 0.00003?',
              options=[
                  'A) z > 1.96',
                  'B) z > 2.58',
                  'C) z > 4.0',
                  'D) z > 6.0',
              ],
              correct_index=2,
              explanation='Section 9.12: z > 4.0 corresponds to a one-sided p-value of approximately 0.00003, the default detection threshold for watermark confirmation.',
          ),
          QuizQuestion(
              question_id='Q20',
              section_tag='9.12-9.13',
              question='Which of the following correctly describes the Chapter 9 output-side defence architecture?',
              options=[
                  'A) Watermarking prevents extraction; perturbation provides evidence',
                  'B) Both watermarking and perturbation prevent extraction independently',
                  'C) Watermarking provides post-hoc evidence; perturbation reduces extraction efficiency in real time; neither alone is complete',
                  'D) Perturbation provides post-hoc evidence; watermarking reduces extraction efficiency',
              ],
              correct_index=2,
              explanation='Sections 9.12 and 9.13: watermarking is post-hoc (detects surrogates after deployment); perturbation is real-time friction (requires more queries for same fidelity). Both are required; neither substitutes for the other or for input-side controls.',
          ),
      ]


      def run_quiz(answers: Optional[Dict[str, int]] = None) -> Dict[str, bool]:
          '''
          Score a set of answers. answers: {question_id: selected_option_index}.
          Returns {question_id: correct}.
          If answers is None, runs in interactive mode (prints questions).
          '''
          results: Dict[str, bool] = {}
          for q in QUIZ_QUESTIONS:
              if answers is not None:
                  selected = answers.get(q.question_id)
                  correct = (selected == q.correct_index)
                  results[q.question_id] = correct
          return results


      def render_quiz_report(results: Dict[str, bool]) -> None:
          by_section: Dict[str, List[bool]] = {}
          for q in QUIZ_QUESTIONS:
              correct = results.get(q.question_id, False)
              by_section.setdefault(q.section_tag, []).append(correct)

          total = len(results)
          total_correct = sum(results.values())
          print('CHAPTER 9 KNOWLEDGE ASSESSMENT -- RESULTS')
          print('=' * 50)
          print(f'Total: {total_correct}/{total} correct ({100*total_correct//max(total,1)}%)')
          print('\nBy section:')
          for section in sorted(by_section):
              section_results = by_section[section]
              sc = sum(section_results)
              st = len(section_results)
              print(f'  Section {section}: {sc}/{st}')

          gaps = [q.question_id for q in QUIZ_QUESTIONS
                  if not results.get(q.question_id, True)]
          if gaps:
              print('\nReview recommended for: ' + ', '.join(gaps))


      if __name__ == '__main__':
          print('CHAPTER 9 KNOWLEDGE ASSESSMENT -- Chapter 9 Section 9.13')
          print(f'Total questions: {len(QUIZ_QUESTIONS)}')
          for q in QUIZ_QUESTIONS:
              print(f'\n{q.question_id} [{q.section_tag}]: {q.question}')
              for i, opt in enumerate(q.options):
                  marker = '(*) ' if i == q.correct_index else '    '
                  print(f'  {marker}{opt}')
          # Self-score with all-correct answers
          all_correct = {q.question_id: q.correct_index for q in QUIZ_QUESTIONS}
          results = run_quiz(all_correct)
          print()
          render_quiz_report(results)

  - id: 5
    name: 'inference_time_security_checklist.py'
    description: |
      Complete inference-time security checklist for production LLM API deployments,
      combining the 8-item Section 9.11 deployment checklist (DC-1 through DC-8),
      the 8-item Section 9.12 output-side checklist (OC-1 through OC-8), and 4
      additional architecture-level items (AC-1 through AC-4) for a 20-item
      comprehensive pre-production verification checklist.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      All 20 items are data-driven via ChecklistEntry dataclass. Imports the
      component checklists from Sections 9.11 and 9.12 deliverables for
      structural consistency. AC items are encoded inline.
    code: |
      # inference_time_security_checklist.py
      # Chapter 9 Section 9.13 -- Inference-Time Security Checklist (20 items)
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class ChecklistEntry:
          item_id: str
          layer: str  # 'architecture', 'input_side', 'output_side'
          priority: str  # 'critical', 'high', 'medium'
          question: str
          verification_method: str
          pass_criterion: str
          source_section: str


      ARCHITECTURE_ITEMS: List[ChecklistEntry] = [
          ChecklistEntry(
              item_id='AC-1',
              layer='architecture',
              priority='critical',
              question='Does the API return hard labels by default, with soft labels available only where the product requires them?',
              verification_method='Inspect API response schema for probability distributions or confidence scores in default response',
              pass_criterion='No probability vectors in default response; soft labels require explicit opt-in if supported at all',
              source_section='Section 9.1',
          ),
          ChecklistEntry(
              item_id='AC-2',
              layer='architecture',
              priority='critical',
              question='Is the model trained with differential privacy if the training data contains PII?',
              verification_method='Review training pipeline configuration for DP-SGD with documented epsilon budget',
              pass_criterion='DP-SGD active with epsilon <= 3 for PII-containing datasets',
              source_section='Section 8.13 + Section 9.6',
          ),
          ChecklistEntry(
              item_id='AC-3',
              layer='architecture',
              priority='high',
              question='Is the input token limit set at the minimum required for the product use case, not at the model maximum?',
              verification_method='Compare 99th percentile of legitimate query input length to the configured input token limit',
              pass_criterion='Configured limit <= 2x the 99th percentile of legitimate input lengths',
              source_section='Section 9.8',
          ),
          ChecklistEntry(
              item_id='AC-4',
              layer='architecture',
              priority='high',
              question='Is server-side temperature fixed, with no caller-configurable temperature parameter?',
              verification_method='Inspect API parameter schema; test API call with temperature parameter to confirm it is ignored or absent',
              pass_criterion='Temperature is not caller-configurable; set server-side at product-appropriate value',
              source_section='Section 9.4',
          ),
      ]

      INPUT_SIDE_ITEMS: List[ChecklistEntry] = [
          ChecklistEntry(item_id='DC-1', layer='input_side', priority='critical',
              question='Per-user state store accessible within latency budget (P99 < 2ms)?',
              verification_method='100 sequential read/write cycles under simulated load',
              pass_criterion='P99 round-trip < 2ms', source_section='Section 9.11'),
          ChecklistEntry(item_id='DC-2', layer='input_side', priority='critical',
              question='Embedding model producing embeddings within target latency (P99 < 5ms)?',
              verification_method='100 embedding requests on representative query sample',
              pass_criterion='P99 < 5ms; mean < 3ms', source_section='Section 9.11'),
          ChecklistEntry(item_id='DC-3', layer='input_side', priority='critical',
              question='Primitive thresholds calibrated on 30+ days of legitimate traffic (FP rate < 1%)?',
              verification_method='Calibration report from Section 9.10 empirical harness',
              pass_criterion='False positive rate < 1% at configured thresholds', source_section='Section 9.11'),
          ChecklistEntry(item_id='DC-4', layer='input_side', priority='critical',
              question='Rate limit dimensions calibrated against extraction budget economics?',
              verification_method='Verify daily limit forces cheapest attack over 10+ days',
              pass_criterion='Cheapest attack requires >10 days at configured limit', source_section='Section 9.11'),
          ChecklistEntry(item_id='DC-5', layer='input_side', priority='critical',
              question='Cross-user correlator running and producing output?',
              verification_method='Inject synthetic 3-account coordinated campaign; verify detection',
              pass_criterion='Correlator flags campaign within 2 cycles', source_section='Section 9.11'),
          ChecklistEntry(item_id='DC-6', layer='input_side', priority='critical',
              question='Alert events routed to SIEM in Sigma rule schema?',
              verification_method='Trigger test alert; verify SIEM ingestion within 15 minutes',
              pass_criterion='Alert in SIEM within 15 minutes; Sigma rule fires', source_section='Section 9.11'),
          ChecklistEntry(item_id='DC-7', layer='input_side', priority='critical',
              question='AML.T0040/T0024 Sigma rule loaded and tested in SIEM?',
              verification_method='Submit synthetic test events; verify rule fires correctly',
              pass_criterion='Rule fires on positive events; does not fire on benign baseline', source_section='Section 9.11'),
          ChecklistEntry(item_id='DC-8', layer='input_side', priority='medium',
              question='False positive escalation path documented and staffed?',
              verification_method='Tabletop review; SLA and team identification',
              pass_criterion='Appeals SLA <= 24 hours; team identified; process in runbook', source_section='Section 9.11'),
      ]

      OUTPUT_SIDE_ITEMS: List[ChecklistEntry] = [
          ChecklistEntry(item_id='OC-1', layer='output_side', priority='critical',
              question='Watermark key generated, stored in HSM, accessible to watermarker?',
              verification_method='Generate test key; confirm HSM storage; run watermarker on 100 test responses',
              pass_criterion='Key accessible; non-trivial green-token fraction above baseline', source_section='Section 9.12'),
          ChecklistEntry(item_id='OC-2', layer='output_side', priority='critical',
              question='Watermark detector confirming presence in self-generated outputs (z > 4.0)?',
              verification_method='Generate 1000 watermarked tokens; run detector',
              pass_criterion='Detector confirms watermark at p < 0.001 on 1000+ tokens', source_section='Section 9.12'),
          ChecklistEntry(item_id='OC-3', layer='output_side', priority='critical',
              question='Watermark robustness benchmark completed (z-score ratio >= 0.4 at 50% distillation signal)?',
              verification_method='Run Section 9.12 robustness benchmark; check distillation_sim results',
              pass_criterion='Z-score ratio >= 0.4 at signal_retention=0.5', source_section='Section 9.12'),
          ChecklistEntry(item_id='OC-4', layer='output_side', priority='critical',
              question='Utility validation harness completed; maximum safe sigma identified (mean KL < 0.05)?',
              verification_method='Run utility sweep on representative sample; identify max_safe_sigma',
              pass_criterion='max_safe_sigma identified; mean KL < 0.05 and top-1 change < 2%', source_section='Section 9.12'),
          ChecklistEntry(item_id='OC-5', layer='output_side', priority='critical',
              question='Adaptive perturbation controller integrated with query monitor risk scores?',
              verification_method='Submit high-risk and low-risk test requests; verify sigma scales with risk',
              pass_criterion='High-risk sigma >= 3x low-risk sigma', source_section='Section 9.12'),
          ChecklistEntry(item_id='OC-6', layer='output_side', priority='critical',
              question='Output-side stage adding < 5ms P99 to response latency?',
              verification_method='Benchmark watermarker + perturbator on 200 representative responses',
              pass_criterion='P99 combined latency <= 5ms', source_section='Section 9.12'),
          ChecklistEntry(item_id='OC-7', layer='output_side', priority='medium',
              question='Watermark key rotation policy documented and implemented?',
              verification_method='Review key rotation runbook; verify old keys retained for historical verification',
              pass_criterion='Rotation period defined (6-12 months); backward compatibility maintained', source_section='Section 9.12'),
          ChecklistEntry(item_id='OC-8', layer='output_side', priority='medium',
              question='Watermark verification workflow validated with legal team?',
              verification_method='Tabletop with legal team; chain of custody documentation reviewed',
              pass_criterion='Legal team confirms verification report meets evidence standards', source_section='Section 9.12'),
      ]

      FULL_CHECKLIST = ARCHITECTURE_ITEMS + INPUT_SIDE_ITEMS + OUTPUT_SIDE_ITEMS


      def render_full_checklist(passed_items: Optional[List[str]] = None) -> None:
          passed_set = set(passed_items or [])
          layers = ['architecture', 'input_side', 'output_side']
          layer_labels = {
              'architecture': 'ARCHITECTURE LAYER',
              'input_side': 'INPUT-SIDE CONTROLS',
              'output_side': 'OUTPUT-SIDE CONTROLS',
          }
          print('INFERENCE-TIME SECURITY CHECKLIST (20 items) -- Chapter 9 Section 9.13')
          print('=' * 70)
          for layer in layers:
              items = [e for e in FULL_CHECKLIST if e.layer == layer]
              print(f'\n--- {layer_labels[layer]} ---')
              for item in items:
                  status = 'PASS' if item.item_id in passed_set else 'PEND'
                  prio = item.priority.upper()[:4]
                  print(f'  [{status}] {item.item_id} [{prio}] {item.question}')


      if __name__ == '__main__':
          render_full_checklist()
          print(f'\nTotal checklist items: {len(FULL_CHECKLIST)}')
          critical = [e for e in FULL_CHECKLIST if e.priority == 'critical']
          print(f'Critical (blocking): {len(critical)}')
          high = [e for e in FULL_CHECKLIST if e.priority == 'high']
          print(f'High: {len(high)}')
          medium = [e for e in FULL_CHECKLIST if e.priority == 'medium']
          print(f'Medium (advisory): {len(medium)}')

  - id: 6
    name: 'cross_chapter_integration_diagram.py'
    description: |
      Cumulative cross-chapter integration diagram showing how Chapters 6, 7, 8,
      and 9 compose into a unified defensive architecture. Encodes each chapter''s
      contribution as a DefensiveLayer and renders the stacked architecture from
      training-time through inference-time with OWASP coverage annotations.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Each chapter''s contribution is encoded as a DefensiveLayer dataclass.
      Rendering produces a structured text diagram. No hardcoded chapter references
      in the rendering logic.
    code: |
      # cross_chapter_integration_diagram.py
      # Chapter 9 Section 9.13 -- Cumulative Cross-Chapter Integration Diagram
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import List


      @dataclass
      class DefensiveLayer:
          chapter: str
          layer_name: str
          attack_surface: str
          threat_actor: str
          detection_architecture: str
          production_components: List[str]
          owasp_coverage: List[str]
          latency_tier: str


      DEFENSIVE_LAYERS: List[DefensiveLayer] = [
          DefensiveLayer(
              chapter='Chapter 8',
              layer_name='Training-Time Auditing Pipeline',
              attack_surface='Training data and preprocessing pipeline',
              threat_actor='Data pipeline contributor with training access',
              detection_architecture='Offline batch; CI/CD gate; minutes-to-hours latency',
              production_components=['auditing_pipeline.py', 'poisoning_detector.py'],
              owasp_coverage=['LLM03'],
              latency_tier='offline_batch',
          ),
          DefensiveLayer(
              chapter='Chapter 6',
              layer_name='Gateway Track 1: Injection Classifier',
              attack_surface='Inference-time: user input content',
              threat_actor='End user attempting instruction override',
              detection_architecture='Synchronous per-request; stateless; <50ms P99',
              production_components=['injection_classifier.py'],
              owasp_coverage=['LLM01'],
              latency_tier='realtime_sync',
          ),
          DefensiveLayer(
              chapter='Chapter 7',
              layer_name='Gateway Tracks 2-5: Jailbreak Ensemble',
              attack_surface='Inference-time: user input content (jailbreak variants)',
              threat_actor='End user attempting jailbreak via sophisticated prompt engineering',
              detection_architecture='Five parallel tracks; synchronous; <50ms P99',
              production_components=['jailbreak_ensemble.py', 'semantic_consistency.py'],
              owasp_coverage=['LLM01'],
              latency_tier='realtime_sync',
          ),
          DefensiveLayer(
              chapter='Chapter 9 (Section 9.11)',
              layer_name='Gateway Track 6: Query Monitor + Rate Limiter',
              attack_surface='Inference-time: user query sequences and patterns',
              threat_actor='API consumer with query budget; distributed campaigns',
              detection_architecture='Sixth parallel track; stateful per-user state; <50ms P99',
              production_components=['query_monitor.py', 'rate_limiter.py', 'cross_user_correlator.py'],
              owasp_coverage=['LLM10', 'LLM04_partial'],
              latency_tier='realtime_sync_stateful',
          ),
          DefensiveLayer(
              chapter='Chapter 9 (Section 9.12)',
              layer_name='Output-Side: Watermarker + Perturbator',
              attack_surface='Inference-time: model response content',
              threat_actor='Adversary collecting training data for surrogate; prompt leakage exploiter',
              detection_architecture='Post-inference response modification; <5ms P99; post-hoc ownership verification',
              production_components=['output_watermarker.py', 'output_perturbator.py', 'watermark_detector.py'],
              owasp_coverage=['LLM10', 'LLM06_partial'],
              latency_tier='post_inference',
          ),
      ]


      def render_integration_diagram(layers: List[DefensiveLayer]) -> None:
          width = 70
          print('CUMULATIVE CROSS-CHAPTER INTEGRATION DIAGRAM')
          print('Chapters 6-9: Training-Time + Inference-Time Defensive Architecture')
          print('=' * width)

          print('\n[REQUEST FLOW: User -> Gateway -> Model -> Response -> User]')
          print()

          # Group by latency tier for display ordering
          order = ['offline_batch', 'pre_request', 'realtime_sync', 'realtime_sync_stateful',
                   'post_inference', 'background']
          tier_labels = {
              'offline_batch': 'TRAINING-TIME / PRE-DEPLOYMENT',
              'realtime_sync': 'INFERENCE-TIME: IN-REQUEST (STATELESS)',
              'realtime_sync_stateful': 'INFERENCE-TIME: IN-REQUEST (STATEFUL)',
              'post_inference': 'INFERENCE-TIME: POST-RESPONSE',
          }
          printed_tiers = set()
          for tier in order:
              tier_layers = [l for l in layers if l.latency_tier == tier]
              if not tier_layers:
                  continue
              label = tier_labels.get(tier, tier.upper())
              if label not in printed_tiers:
                  print(f'\n  +-- {label} ' + '-' * max(0, width - 8 - len(label)))
                  printed_tiers.add(label)
              for layer in tier_layers:
                  print(f'  |  [{layer.chapter}] {layer.layer_name}')
                  print('  |     Components: ' + ', '.join(layer.production_components[:2]))
                  print('  |     OWASP:      ' + ', '.join(layer.owasp_coverage))

          print('\n' + '=' * width)
          print('CUMULATIVE OWASP COVERAGE: LLM01 + LLM03 + LLM10 (partial LLM04, LLM06)')
          print('Remaining: LLM02, LLM05, LLM07, LLM08 -- Planned Chapters 11-17')


      if __name__ == '__main__':
          render_integration_diagram(DEFENSIVE_LAYERS)
          print()
          print('Layers by chapter:')
          for layer in DEFENSIVE_LAYERS:
              print(f'  {layer.chapter}: {layer.layer_name}')

common_mistakes:

  - id: 1
    description: 'Treating the Chapter 9 attack catalogue as the complete threat landscape rather than the inference-time extraction subset'
    why_it_happens: |
      Chapter 9 is comprehensive across extraction and adjacent threats. After
      building five detection primitives, two capstone sections, and a full OWASP
      LLM10 coverage arc, it is natural to feel that the threat landscape is
      covered. The completeness of the chapter''s internal structure creates a
      false sense of completeness relative to the full LLM security landscape.
    consequence: |
      Six OWASP LLM categories remain uncovered after Chapter 9: LLM02, LLM05,
      LLM06 (fully), LLM07, LLM08, and LLM09. More critically, Chapter 10
      begins immediately: adversarial example generation uses the boundary maps
      that Chapter 9 produced. A deployment that treats Chapter 9 as the
      complete security architecture is undefended against Chapter 10 evasion attacks.
    correct_approach: |
      Chapter 9 closes LLM10 and contributes to LLM04 and LLM06. Seven categories
      remain. The cross-chapter integration diagram (Deliverable 6) and the OWASP
      coverage map (Deliverable 3) make the gaps explicit and are the starting
      point for the Chapters 11 through 17 roadmap.

  - id: 2
    description: 'Deploying the full Chapter 9 control stack without calibrating any primitive on the deployment''s actual traffic'
    why_it_happens: |
      The Section 9.10 primitives have default thresholds. The Section 9.11 rate
      limiter has default policy templates. The Section 9.12 perturbator has a
      default sigma. Deploying defaults is faster than running 30 days of traffic
      collection and calibration. The defaults feel conservative enough.
    consequence: |
      Default thresholds produce false positive rates calibrated for a generic
      deployment, not the actual deployment. A coding assistant with genuinely
      high query diversity produces false positives at the query diversity monitor''s
      default threshold. Alert fatigue results. The security team disables the
      monitor. The entire detection investment becomes theatre.
    correct_approach: |
      The deployment checklist items DC-3 (primitive calibration) and OC-4 (utility
      validation) are blocking items precisely because miscalibrated thresholds
      are worse than no monitoring. Run 30 days of legitimate traffic through the
      empirical harness before enabling alerts. The false positive rate is the
      metric, not the threshold value.

  - id: 3
    description: 'Building the detection architecture without red-teaming it'
    why_it_happens: |
      Red team exercises are expensive and require security personnel with
      knowledge of extraction techniques. The empirical harness (Section 9.10
      Deliverable 6) provides synthetic attack traffic. Teams substitute the
      synthetic harness for actual red team exercises and consider the detection
      architecture validated.
    consequence: |
      Synthetic attack traffic is a calibration tool, not a validation tool.
      Real adversaries adapt to the detection architecture in ways that synthetic
      traffic cannot simulate -- spacing queries to avoid the sliding window,
      using novel elicitation phrasings not in the meta-query keyword list,
      or distributing campaigns across timing patterns the correlator does not
      cover. A detection architecture that has never been tested against adaptive
      adversaries has unknown coverage against them.
    correct_approach: |
      Quarterly red team extraction exercises are required (Section 9.11
      deployment checklist item DC-8 advisory; Section 9.13 Section 9.9 lesson
      learned L7). Run both synthetic harness updates (for calibration) and
      red team exercises (for adaptive adversary validation) at separate
      frequencies. Red team findings update the detection signatures; harness
      results update the calibration thresholds.

  - id: 4
    description: 'Routing extraction alerts only to the API team, not the security operations centre'
    why_it_happens: |
      Extraction alerts look like API usage anomalies to most organisations. The
      API team owns the monitoring infrastructure. The alert routing follows
      ownership: API team gets API alerts, including extraction alerts.
    consequence: |
      The API team diagnoses extraction alerts as potential rate limit policy
      issues or legitimate high-volume users. They may loosen the rate limit
      to reduce false positives. The security operations centre never sees the
      alert. A confirmed extraction campaign is treated as a configuration issue
      rather than a security incident. No forensic investigation is initiated;
      no legal evidence chain is preserved; no incident response playbook is
      followed.
    correct_approach: |
      The AML.T0040/T0024 Sigma rule (Section 9.11 Deliverable 5) routes alerts
      through the SIEM to the SOC. Deployment checklist item DC-6 verifies this
      routing. The SOC team needs the Chapter 9 incident response playbook -- the
      watermark verification workflow (Section 9.12 Deliverable 7) and the root
      cause analysis format (Section 9.9 Deliverable 2) -- to respond correctly.

  - id: 5
    description: 'Applying the Chapter 9 architecture to Chapter 10 evasion attacks without extending Track 7'
    why_it_happens: |
      The six-track Chapter 9 gateway seems complete. Chapter 10 adversarial
      examples are inputs, and the gateway handles inputs. Teams assume the
      existing tracks cover adversarial example detection without adding a
      dedicated track.
    consequence: |
      Adversarial examples are not detected by the five Chapter 6/7 tracks
      (which look for injection and jailbreak phrasing) or by Track 6 (which
      looks for extraction query distribution anomalies). Adversarial image
      inputs to a vision classifier, adversarial text inputs to a content
      moderator, and adversarial feature vectors to a fraud classifier require
      dedicated adversarial example detection techniques -- input preprocessing,
      consistency checks, or detection model ensembles -- that Chapter 10 builds.
    correct_approach: |
      Chapter 10 extends the gateway with Track 7. The six-track architecture
      from Chapter 9 is explicitly designed for extensibility -- the parallel
      dispatch pattern accommodates any number of tracks within the latency
      budget. The Chapter 10 installation guide will describe how to add Track
      7 alongside the existing six tracks.

section_summary:
  compact: |
    Chapter 9 returned to the inference-time gateway after Chapter 8''s
    training-time auditing, facing a new threat actor: the API consumer with
    a query budget. The extraction taxonomy established four goals (functionality,
    fidelity, decision-boundary, prompt) with distinct budget requirements,
    query patterns, and detection signals. Three extraction attacks were
    implemented: equation-solving O(d) extraction of linear models, distillation
    with the soft-label 5-50x budget discount as the central security insight,
    and aggregation-based prompt extraction invisible to per-request classifiers.
    Two privacy attacks sharing the inference surface were built: membership
    inference exploiting the overfitting-confidence gap (HIPAA/GDPR implications),
    and model inversion demonstrating verbatim training data recovery. API
    economic abuse completed the attack arc. Three documented incidents grounded
    the catalogue in reality and identified the five root causes that drive the
    production control design. Five detection primitives cover the full catalogue
    in a calibrated ensemble achieving 88 to 98 percent detection rates with a
    30 to 40 percent known gap for benchmark-distribution distillation. Two
    capstone sections wired the library into production: Track 6 (stateful query
    monitor, four-dimension rate limiter, cross-user correlator, Sigma rule) on
    the input side, and token-level watermarking plus adaptive perturbation on the
    output side. Together they close OWASP LLM10 across all five sub-risks and
    bring cumulative chapter coverage to LLM01 plus LLM03 plus LLM10.

  key_takeaways:
    - 'Query budget economics -- not the existence of the attack -- is the design language for extraction defence'
    - 'Grey-box APIs providing probability distributions give adversaries a 5-50x extraction budget discount; output design is a security decision'
    - 'No single detection primitive covers the full catalogue; the five-primitive ensemble is a coverage requirement, not an optimisation'
    - 'Benchmark-distribution LLM distillation has 30-40% input-side detection; output watermarking is the only post-hoc control for this pattern'
    - 'Stateful Track 6 is the only structural difference from the Chapter 6/7 gateway; the async write pattern prevents latency regression'
    - 'The Chapter 9 to Chapter 10 connection is mechanistic: boundary maps from Section 9.3 are the direct input to adversarial example generation'

preview_chapter_10:
  title: 'Chapter 10: Adversarial Machine Learning'
  preview: |
    Chapter 9 covered attacks that steal what the model knows. Chapter 10 covers
    attacks that make the model produce attacker-chosen outputs at inference time
    without changing the model: adversarial examples. The threat actor remains an
    API consumer; the goal shifts from extraction to evasion.

    The canonical adversarial attack methods -- FGSM (Fast Gradient Sign Method),
    PGD (Projected Gradient Descent), and C&W (Carlini-Wagner) -- require gradient
    access for full efficiency but work under black-box access using the boundary
    maps Chapter 9 produced. Transferability extends the threat: adversarial examples
    generated against a distillation surrogate (Chapter 9 Section 9.4) transfer to
    the victim at substantial success rates, because the surrogate shares the
    victim''s decision boundary structure.

    The detection architecture adds Track 7 to the six-track Chapter 9 gateway.
    Detection techniques include input preprocessing (feature squeezing, spatial
    smoothing), classifier consistency checks (confidence should not change
    dramatically under small input perturbations), and detection model ensembles.
    Chapter 10 closes OWASP LLM coverage for the inference-time evasion attack
    class and completes Part 2 of the book.

