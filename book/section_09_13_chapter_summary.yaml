section_overview:
  one_line_summary: |
    Chapter 9 closes OWASP LLM10 across two defensive surfaces and three prior
    chapter arcs: threat model transition back to the gateway, four extraction
    goals, two privacy attacks, economic abuse, five detection primitives, an
    input-side capstone with per-user state and the Sigma rule, and an output-
    side capstone with cryptographic watermarking -- together bringing cumulative
    OWASP coverage to LLM01 plus LLM03 plus LLM10.

  why_this_section_exists: |
    Chapter 9 covered more ground than any prior chapter: a threat model shift,
    a four-goal extraction taxonomy, two privacy attacks sharing the inference
    surface, an adjacent economic abuse class, five detection primitives, two
    capstone sections, and a real-world incident arc grounding all of it in
    documented fact. Section 9.13 synthesises these into three reference
    artefacts the reader will use after the chapter ends: the extraction defence
    architecture diagram showing the full two-surface control stack, the Chapter 9
    taxonomy reference card covering all seven attack classes with their detection
    primitives, and the cumulative LLM01 plus LLM03 plus LLM10 coverage map
    showing how Chapters 6 through 9 compose into a unified inference-time and
    training-time defensive architecture.

    The summary also names the five cross-cutting threads that connect Chapter
    9 internally and forward to Chapter 10 -- the architectural lessons that
    apply beyond this specific attack class. These threads are the book''s
    mechanism for preventing each chapter from becoming a siloed case study
    and ensuring that accumulated knowledge transfers to new attack classes.

  position_in_chapter: |
    Section 9.13 of 13. Final section of Chapter 9. Produces the reference
    artefacts that Chapter 10 and later chapters cite. The knowledge assessment
    quiz (Deliverable 4) is the Chapter 9 completion criterion for the reader.

learning_objectives:
  knowledge:
    - 'Recall the five key architectural decisions that distinguish Chapter 9 detection from Chapter 6/7/8 detection'
    - 'Map all seven Chapter 9 attack classes to their primary detection primitive'
    - 'State the OWASP LLM10 sub-risk each Chapter 9 control addresses'
    - 'Identify the known detection gap (benchmark-distribution distillation) and the control that addresses it post-hoc'
    - 'Articulate the five cross-cutting threads and which apply to Chapter 10'

  skills:
    - 'Navigate the extraction goal decision tree to classify an observed threat'
    - 'Select the correct detection primitive combination for a given extraction attack class'
    - 'Apply the defence stacking pattern to a given deployment configuration'
    - 'Complete the inference-time security checklist for a production LLM API deployment'

  security_mindset:
    - 'Hold the full Chapter 9 attack catalogue and defence architecture as an integrated mental model, not a list of disconnected techniques'
    - 'Recognise that Chapter 10 evasion attacks start where Chapter 9 boundary mapping ended -- the connection is mechanistic, not thematic'
    - 'Apply the query budget economic framing to any new extraction or evasion attack class encountered after this chapter'

prerequisites:
  - 'All 12 prior sections of Chapter 9 (synthesis section; all content sections are prerequisite)'

prose_content:

  - part: 1
    title: 'Sections 9.1 and 9.2 in Review: Threat Model Transition and Extraction Taxonomy'
    body: |
      Chapter 9 opened with a deliberate architectural reset. Chapter 8 had
      trained the reader to think in batch jobs and CI/CD gates -- the detection
      architecture for training-time poisoning. Section 9.1 reversed that: the
      threat actor in Chapter 9 is an API consumer with a query budget, the attack
      surface is the deployed model''s inference API, and the detection architecture
      returns to the real-time per-request gateway of Chapters 6 and 7.

      The adversary access ladder (black-box, grey-box, white-box) established
      the extraction budget economics that calibrate every rate limit in Section
      9.11. The critical insight was that grey-box APIs providing probability
      distributions give adversaries a 5 to 50x query budget discount -- output
      design is a security decision, not merely a product decision.

      Section 9.2 built the extraction taxonomy: four goals, each with distinct
      adversary objectives, query patterns, and detection primitives. Functionality
      extraction builds a deployable clone across the full input distribution --
      the dominant commercial threat. Fidelity extraction targets a specific input
      set with minimal query budget. Decision-boundary extraction maps the
      classification surface for adversarial example generation -- the connection
      to Chapter 10. Prompt extraction reconstructs the system prompt and
      operational configuration at orders-of-magnitude lower query budget than
      the other three goals.

      The taxonomy''s operational value: it prevents undifferentiated defences.
      A volume threshold alone cannot distinguish a distillation campaign from a
      boundary extraction campaign from prompt extraction from legitimate high-
      volume use. The taxonomy drives the five-primitive detection ensemble that
      covers each goal with a dedicated signal.

  - part: 2
    title: 'Sections 9.3, 9.4, and 9.5 in Review: The Three Extraction Attacks'
    body: |
      Section 9.3 established the foundational extraction primitive: black-box
      decision boundary mapping. Every API query reveals which side of the
      classification boundary its input falls on. Linear classifiers extract
      in O(d) queries via equation-solving -- a query budget achievable within
      a day of normal API use, far below any throughput-based rate limit. Decision
      trees extract via path-finding at comparable budgets. The detection insight
      from this section -- extraction queries cluster near decision boundaries
      while benign queries cluster in high-density input regions -- drove the
      boundary query detector that Section 9.10 implemented and Section 9.11
      wired into Track 6 of the gateway.

      Section 9.4 scaled the boundary mapping primitive into the dominant
      commercial attack: knowledge distillation repurposed adversarially. The
      soft-label versus hard-label distinction is the chapter''s central practical
      security insight: soft labels carry log2(K) times as much boundary
      information as hard labels for a K-class classifier. At typical API pricing,
      this translates to a grey-box extraction campaign costing under $1,000
      producing surrogate fidelity that would require $50,000 to $500,000 to
      train from scratch. Distributed campaigns split query budgets across
      accounts to evade per-user monitoring -- the evasion pattern that motivated
      the cross-user collusion detector and output watermarking.

      Section 9.5 covered prompt extraction at scale: the aggregation attack
      that reconstructs system prompts from many individually innocuous queries.
      The Chapter 6 injection classifier catches direct elicitation. The Section
      9.11 cumulative query monitor catches the aggregation pattern -- 20 to 500
      queries spanning the model''s behavioural constraints, contact details, and
      content restrictions. Per-query leakage reduction, not zero leakage, is
      the achievable defence goal; output perturbation targets this metric.

  - part: 3
    title: 'Sections 9.6 and 9.7 in Review: Privacy Attacks Sharing the Inference Surface'
    body: |
      Sections 9.6 and 9.7 introduced the two privacy attack classes that share
      the inference-time API surface with the four extraction goals. Both exploit
      the same property Chapter 1 introduced as a generalisation problem: a model
      that memorises its training data responds to training examples differently
      than to unseen inputs drawn from the same distribution.

      Membership inference (Section 9.6) exploits the confidence and loss gap
      between training members and non-members. The shadow model attack (Shokri
      et al. 2017) trains meta-classifiers on known-membership confidence vectors
      from shadow models, achieving 73 to 95 percent attack accuracy on overfit
      models. This is a HIPAA breach when the model was trained on protected
      health information and a GDPR right-to-erasure violation when the training
      data is EU personal data. Differential privacy training from Section 8.13
      is the upstream defence with a formal bound; output perturbation from
      Section 9.12 is the downstream signal-reduction control.

      Model inversion (Section 9.7) goes further: it reconstructs training data
      content from model outputs, not merely membership status. Carlini et al.
      2021 demonstrated verbatim recovery of thousands of GPT-2 training sequences,
      including PII, using perplexity-based membership scoring followed by
      systematic generation. The two privacy attacks are kept in Chapter 9 rather
      than split into a separate chapter because they share defensive primitives
      with the four extraction goals: rate limiting, query pattern monitoring,
      output perturbation, and differential privacy training.

  - part: 4
    title: 'Section 9.8 in Review: API Economic Abuse as the Adjacent Threat Class'
    body: |
      Section 9.8 completed the Chapter 9 attack arc with the class that targets
      operational viability rather than intellectual property. Cost amplification
      engineers queries to maximise inference cost through context padding and
      verbose output demands, achieving 50 to 360 times the average query cost
      within model token limits. Denial-of-wallet sustains this amplification
      until the operator''s budget is exhausted; a free-tier deployment can be
      drained in hours with zero adversary spend. Rate-limit exhaustion distributes
      minimal queries across accounts to block legitimate users without generating
      per-user alerts.

      The adversary-operator cost asymmetry is structurally unlimited for free-tier
      deployments and 10 to 250 times for paid-tier deployments. This asymmetry
      drives the rate limit policy design: a limit that makes attack cost exceed
      the commercial alternative is a meaningful deterrent; a throughput-only
      limit provides no deterrent for the cost-amplification pattern.

      Economic abuse and extraction share the query volume and user concentration
      detection primitives -- the same monitoring infrastructure covers both threat
      classes. The adaptive rate limiter''s four-dimension policy (requests per
      minute, tokens per minute, cost per hour, input tokens per request) addresses
      all three economic abuse forms and all four extraction goals from a single
      unified enforcement layer.

  - part: 5
    title: 'Section 9.9 in Review: Documented Incidents Ground the Defence Architecture'
    body: |
      Section 9.9 grounded the attack catalogue in three documented incident
      classes. The Tramer et al. 2016 commercial MLaaS extractions demonstrated
      that the theoretical extraction bounds are achievable against production
      APIs using query counts indistinguishable from normal API use. The Carlini
      et al. 2021 GPT-2 extraction demonstrated verbatim training data recovery
      including PII using a modest query budget against a then-major commercial
      deployment. The Alpaca and Vicuna distillation campaigns demonstrated that
      a few hundred dollars in API fees produce functional capability clones of
      GPT-3.5 and GPT-4, with query distributions analytically indistinguishable
      from legitimate evaluation use.

      All three incidents shared five root causes: no query pattern monitoring,
      throughput-only rate limits, no output watermarking, soft-label outputs
      without perturbation, and no differential privacy training. These five root
      causes map precisely to the five controls that Sections 9.10 through 9.12
      build. The detection opportunity map showed that input-side controls catch
      the Tramer et al. and Carlini et al. patterns; watermarking is the only
      control that addresses the Alpaca and Vicuna pattern post-hoc. The lesson:
      neither surface alone provides complete coverage; both are required.

  - part: 6
    title: 'Section 9.10 in Review: The Detection Primitive Library'
    body: |
      Section 9.10 implemented the five detection primitives as a software library
      that Sections 9.11 and 9.12 import. The query pattern analyser tracks query
      diversity, boundary proximity, and meta-query rate across a per-user sliding
      window. The OOD detector uses isolation forest trained on legitimate traffic
      to score incoming queries against the deployment''s expected input distribution.
      The boundary query detector identifies opposite-label near-neighbour pairs
      in the user''s query embedding and label history using a k-d tree index.
      The output entropy monitor scores per-response information leakage risk and
      doubles as the economic abuse token-count anomaly detector. The user
      concentration analyser measures per-user semantic clustering relative to
      the legitimate user population''s 95th percentile.

      The empirical comparison harness (Deliverable 6 of Section 9.10) measured
      the ensemble''s detection rates across synthetic attack families: 95 to 98
      percent for equation-solving extraction, 88 to 93 percent for prompt extraction
      and distillation, and 30 to 40 percent for benchmark-distribution LLM
      distillation. That 30 to 40 percent gap is the architectural finding that
      drives Section 9.12: the benchmark-distribution pattern is definitionally
      undetectable at the input side, so the output-side watermark is the only
      control with post-hoc coverage for this attack class.

  - part: 7
    title: 'Sections 9.11 and 9.12 in Review: The Two-Surface Production Architecture'
    body: |
      Section 9.11 wired the detection library into the Chapter 6/7 gateway as
      Track 6: the first stateful detection track in the book. Per-user state
      stores rolling windows of query embeddings, labels, and cost history that
      persist across sessions. The adaptive rate limiter enforces four independent
      policy dimensions calibrated against extraction budget economics rather than
      infrastructure throughput. The cross-user collusion detector identifies
      distributed campaigns by clustering semantically similar queries across
      accounts within time windows. The AML.T0040/T0024 Sigma rule was completed
      from the Chapter 5 stub, routing extraction alerts to the SIEM. The 8-item
      deployment checklist ensures production readiness before traffic is routed
      through Track 6.

      Section 9.12 added the output-side defensive surface that no prior chapter
      required. The watermarker embeds a cryptographic signal in every response
      using HMAC-based green-token vocabulary partitioning; the signal transfers
      to student models trained on watermarked outputs because the student learns
      the teacher''s green-token preference. The z-score statistical test confirms
      watermark presence at p < 0.00003 for z ≥ 4.0. The output perturbator
      applies calibrated noise through Gaussian, top-k, rounding, or temperature
      shaping modes; adaptive perturbation scales noise strength with the query
      monitor''s risk score. Together, Sections 9.11 and 9.12 close OWASP LLM10
      across all five sub-risks.

  - part: 8
    title: 'Integration: How Chapter 9 Extends the Gateway Architecture'
    body: |
      Chapter 9''s relationship to the prior chapter arc is architectural, not
      just topical. The Chapter 6 production injection classifier established the
      gateway pattern: a synchronous per-request analysis stage that runs within
      the API''s latency budget and returns a routing decision. Chapter 7 extended
      this to a five-track parallel ensemble. Chapter 9 extends it to a six-track
      ensemble with one structural difference: Track 6 is stateful.

      The stateful extension required four engineering decisions that were not
      present in Chapters 6 or 7. First, the state store architecture: per-user
      rolling windows backed by a distributed cache with TTL-based eviction.
      Second, the async write pattern: state updates are fire-and-forget to avoid
      adding write latency to the critical path. Third, the fallback-to-stateless
      policy: if the state store is unavailable, the gateway continues with Tracks
      1 through 5 rather than failing the request. Fourth, the one-request lag
      acceptance: Track 6 scores from the previous request''s state, which is
      acceptable because extraction detection operates on distributions across
      many queries rather than on individual query content.

      Chapter 8''s offline auditing pipeline stands in architectural contrast to
      all of this. The auditing pipeline processes training batches asynchronously
      with a minutes-to-hours latency budget; the gateway ensemble processes
      individual requests synchronously with a 50ms P99 budget. Both architectures
      are correct for their respective threat classes -- the error is applying
      the wrong architecture to a threat, not choosing one over the other.

  - part: 9
    title: 'Cross-Chapter Arc: LLM01 plus LLM03 plus LLM10 -- Three OWASP Categories with Full Production Coverage'
    body: |
      Chapter 9 completes a three-chapter OWASP coverage arc that runs through
      the second half of Part 2. Each chapter addressed one OWASP LLM category
      with a full attack catalogue, production detection controls, and a Sigma
      rule or equivalent compliance artefact.

      Chapter 6 and 7 closed LLM01 (prompt injection and jailbreak) with the
      injection classifier and jailbreak detection ensemble. The threat actor was
      an end user attempting to override the model''s instructions. The detection
      architecture was the real-time gateway with content-based single-request
      classification. The deployment capstone was the Chapter 6 production
      classifier and the Chapter 7 jailbreak ensemble.

      Chapter 8 closed LLM03 (training data poisoning) with the offline auditing
      pipeline. The threat actor was a data pipeline contributor with training
      access. The detection architecture was a batch CI/CD gate with statistical
      tests and provenance checks. The deployment capstone was the production
      auditing pipeline with poisoning detection across multiple attack families.

      Chapter 9 closes LLM10 (model theft) with the two-surface gateway extension.
      The threat actor is an API consumer with a query budget. The detection
      architecture is the six-track gateway extended with per-user stateful
      monitoring, adaptive rate limiting, and output-side watermarking. Together
      the three chapters cover the two primary attack surfaces (training-time and
      inference-time) and three of the ten OWASP LLM categories with full
      production controls.

  - part: 10
    title: 'Five Cross-Cutting Threads'
    body: |
      Five threads run through Chapter 9 and extend into Chapter 10 and beyond.

      Thread 1: Ensemble defence is structurally mandatory. No single detection
      primitive covers the full attack catalogue. The five-primitive ensemble is
      not a performance optimisation -- it is a coverage requirement. Any reduction
      to fewer primitives creates a detection gap for specific attack classes.
      This thread applies to every multi-technique threat class the book covers.

      Thread 2: Query budget economics is the design language for extraction
      defence. Rate limits, detection thresholds, and perturbation strength are
      all calibrated against query budgets required for specific extraction attacks,
      not against abstract security intuitions. A control that triples the required
      query budget is more valuable than one that blocks 50 percent of queries.

      Thread 3: Output-side defence is a new and underinvested surface. Prior
      to Chapter 9, all defensive controls in the book operated on inputs.
      Chapter 9 introduces the output-side stage as a first-class architectural
      component. Future threat classes -- particularly LLM capability misuse
      and data exfiltration via model outputs -- will require further output-side
      controls that Chapter 9''s watermarker and perturbator architecture generalises.

      Thread 4: Honest acknowledgement of defensive limits. The 30 to 40 percent
      input-side detection rate for benchmark-distribution distillation is a known
      limit, not a failure to be concealed. Watermark robustness degrades under
      paraphrasing. Perturbation is friction, not a barrier. DP training has a
      utility-privacy tradeoff that tightens at low epsilon. The defence is
      maximally effective when its limits are acknowledged and compensating controls
      are explicitly deployed.

      Thread 5: The Chapter 9 to Chapter 10 connection is mechanistic. Decision-
      boundary maps produced by Section 9.3 boundary extraction are the input to
      Chapter 10 adversarial example generation. An adversary who has completed
      a boundary extraction campaign against a classifier is positioned to generate
      adversarial examples against it. Chapter 10 builds on Chapter 9''s outputs;
      the detection architecture extends the six-track gateway with an adversarial
      example detection track.

  - part: 11
    title: 'Quick Reference: Decision Trees, Primitive Selection, and Defence Stacking'
    body: |
      Three quick-reference tools synthesise Chapter 9 for post-chapter use.

      Extraction goal decision tree. An observed query pattern is classified by
      answering three questions in sequence. First: are queries broadly distributed
      across the input space? If yes, functionality extraction is the primary
      hypothesis; deploy query diversity monitor and rate limiter. Second: are
      queries concentrated in a narrow semantic region? If yes, fidelity or prompt
      extraction is the hypothesis; deploy user concentration analyser and prompt
      reconstruction track. Third: are opposite-label near-neighbour pairs present
      in the query history? If yes, decision-boundary extraction is the hypothesis;
      deploy boundary query detector and OOD detector.

      Detection primitive selection guide. If the deployment is a classifier with
      soft-label output, the output entropy monitor provides the highest-value
      additional signal over the default ensemble. If the deployment is an LLM
      with benchmark-distribution traffic patterns, output watermarking is the
      only control with coverage for the dominant extraction pattern. If the
      deployment faces prompt extraction risk (commercial system prompt with IP
      value), the cumulative query monitor''s prompt reconstruction track is the
      critical primitive, not the per-request injection classifier.

      Defence stacking pattern. The minimum viable defence stack for any production
      LLM API deployment has three layers. Layer 1: hard label output design
      (return hard labels; remove soft labels unless required). Layer 2: input-
      side monitoring (query monitor with calibrated primitives; extraction-aware
      rate limiter; cross-user correlator). Layer 3: output-side protection
      (watermarker with HSM-stored key; adaptive perturbator calibrated against
      utility validation). Each layer independently reduces extraction risk; all
      three together provide the depth the attack catalogue requires.

  - part: 12
    title: 'Chapter 10 Preview: Adversarial Machine Learning'
    body: |
      Chapter 10 covers the inference-time threat class that Chapter 9''s boundary
      mapping enables: adversarial example generation. The connection is mechanistic.
      A complete boundary extraction campaign (Section 9.3) produces a map of the
      model''s classification surface. Adversarial example generation uses that
      map to construct inputs that the model misclassifies with high confidence --
      inputs that sit on or just across the decision boundary from their true class.

      The canonical adversarial attack methods -- FGSM (Fast Gradient Sign Method),
      PGD (Projected Gradient Descent), and C&W (Carlini-Wagner) -- require gradient
      access for full efficiency but work in approximate form under black-box access
      using the boundary map that Chapter 9 provides. Transferability extends the
      threat: adversarial examples generated against a surrogate model trained by
      distillation (Section 9.4) transfer to the victim with substantial success
      rate, because the surrogate shares the victim''s decision boundary structure.

      Chapter 10 extends the six-track gateway with Track 7: adversarial example
      detection. The detection primitives are different from the Chapter 9 set --
      adversarial examples are typically detected by input preprocessing (feature
      squeezing, spatial smoothing), by classifier consistency checks (the model''s
      confidence should not change dramatically under small perturbations of the
      input), and by comparison against a separately trained detection model. The
      architecture is the same: a parallel detection track within the gateway
      ensemble, stateless per-request, within the 50ms P99 budget.

      Chapter 10 closes the OWASP coverage for the inference-time evasion attack
      class and completes Part 2 of the book. Chapters 11 through 17 extend the
      two-surface defensive architecture to the remaining OWASP LLM categories.

