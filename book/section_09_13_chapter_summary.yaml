deliverables:

  - id: 1
    name: 'extraction_defence_architecture.py'
    description: |
      Encodes the full Chapter 9 two-surface extraction defence architecture as
      a layered data structure and renders it as a structured text diagram.
      Covers input-side controls (Track 6 query monitor, rate limiter, cross-user
      correlator) and output-side controls (watermarker, perturbator) with their
      operational timing and coverage properties.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Architecture layers are data-driven via ArchitectureLayer dataclass list.
      Diagram rendering is schema-free string formatting. No hardcoded layer
      names or control references.
    code: |
      # extraction_defence_architecture.py
      # Chapter 9 Section 9.13 -- Two-Surface Extraction Defence Architecture
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class ArchitectureControl:
          name: str
          timing: str   # 'pre_request', 'in_request', 'post_inference', 'background'
          state: str    # 'stateless' or 'stateful'
          covers: List[str]
          section_reference: str


      @dataclass
      class ArchitectureLayer:
          layer_name: str
          position: str   # 'input_side' or 'output_side' or 'background'
          controls: List[ArchitectureControl]


      INPUT_SIDE_LAYER = ArchitectureLayer(
          layer_name='Input-Side Detection and Enforcement',
          position='input_side',
          controls=[
              ArchitectureControl(
                  name='Tracks 1-5 (Ch6/7 injection + jailbreak ensemble)',
                  timing='in_request',
                  state='stateless',
                  covers=['prompt_injection', 'jailbreak'],
                  section_reference='Ch6 Section 6.17, Ch7 Section 7.14',
              ),
              ArchitectureControl(
                  name='Track 6: Query Pattern Monitor',
                  timing='in_request',
                  state='stateful',
                  covers=['functionality_extraction', 'fidelity_extraction',
                          'decision_boundary_extraction', 'prompt_extraction',
                          'membership_inference'],
                  section_reference='Section 9.11 query_monitor.py',
              ),
              ArchitectureControl(
                  name='Adaptive Rate Limiter (4 dimensions)',
                  timing='in_request',
                  state='stateful',
                  covers=['all_extraction_goals', 'economic_abuse_all_forms'],
                  section_reference='Section 9.11 rate_limiter.py',
              ),
              ArchitectureControl(
                  name='Cross-User Collusion Detector',
                  timing='background',
                  state='stateful',
                  covers=['distributed_distillation', 'coordinated_boundary_probing'],
                  section_reference='Section 9.11 cross_user_correlator.py',
              ),
          ],
      )

      OUTPUT_SIDE_LAYER = ArchitectureLayer(
          layer_name='Output-Side Watermarking and Perturbation',
          position='output_side',
          controls=[
              ArchitectureControl(
                  name='Output Watermarker (token-level, HMAC green-list)',
                  timing='post_inference',
                  state='stateless',
                  covers=['functionality_extraction_posthoc', 'llm_distillation_posthoc'],
                  section_reference='Section 9.12 output_watermarker.py',
              ),
              ArchitectureControl(
                  name='Adaptive Output Perturbator',
                  timing='post_inference',
                  state='stateless',
                  covers=['soft_label_distillation', 'prompt_extraction_leakage',
                          'membership_inference_signal', 'model_inversion_signal'],
                  section_reference='Section 9.12 output_perturbator.py + adaptive_perturbation.py',
              ),
              ArchitectureControl(
                  name='Watermark Detector (verification workflow)',
                  timing='background',
                  state='stateless',
                  covers=['surrogate_model_identification', 'ownership_evidence'],
                  section_reference='Section 9.12 watermark_detector.py + watermark_verification_workflow.py',
              ),
          ],
      )

      UPSTREAM_LAYER = ArchitectureLayer(
          layer_name='Upstream Training-Time Controls',
          position='input_side',
          controls=[
              ArchitectureControl(
                  name='Differential Privacy Training',
                  timing='pre_request',
                  state='stateless',
                  covers=['membership_inference', 'model_inversion', 'training_data_reconstruction'],
                  section_reference='Section 8.13 (Chapter 8)',
              ),
              ArchitectureControl(
                  name='Training Data Auditing Pipeline',
                  timing='pre_request',
                  state='stateless',
                  covers=['training_data_poisoning'],
                  section_reference='Section 8.15 (Chapter 8)',
              ),
          ],
      )

      ALL_LAYERS = [UPSTREAM_LAYER, INPUT_SIDE_LAYER, OUTPUT_SIDE_LAYER]


      def render_architecture_diagram(layers: List[ArchitectureLayer]) -> None:
          width = 70
          border = '=' * width
          print(border)
          print('EXTRACTION DEFENCE ARCHITECTURE -- Chapter 9 Section 9.13')
          print(border)
          for layer in layers:
              print(f'\n[{layer.position.upper()}] {layer.layer_name}')
              print('-' * width)
              for ctrl in layer.controls:
                  print(f'  Control: {ctrl.name}')
                  print(f'    Timing: {ctrl.timing} | State: {ctrl.state}')
                  cov_str = ', '.join(ctrl.covers[:3]) + (' ...' if len(ctrl.covers) > 3 else '')
                  print(f'    Covers: {cov_str}')
                  print(f'    Ref:    {ctrl.section_reference}')


      def get_controls_for_attack(attack_class: str) -> List[ArchitectureControl]:
          '''Return all controls that cover a given attack class.'''
          matching = []
          for layer in ALL_LAYERS:
              for ctrl in layer.controls:
                  if any(attack_class.lower() in c.lower() for c in ctrl.covers):
                      matching.append(ctrl)
          return matching


      if __name__ == '__main__':
          render_architecture_diagram(ALL_LAYERS)
          print()
          query = 'functionality_extraction'
          controls = get_controls_for_attack(query)
          print(f'Controls covering [{query}]:')
          for c in controls:
              print(f'  - {c.name} ({c.section_reference})')

  - id: 2
    name: 'extraction_taxonomy_reference_card.py'
    description: |
      Complete Chapter 9 extraction taxonomy reference card encoding all seven
      attack classes (four extraction goals, two privacy attacks, economic abuse)
      with detection primitive mapping, query budget ranges, and defence stack
      references. Provides a classify_threat() function that returns the attack
      class entry for an observed threat description.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      All seven attack classes are encoded as ThreatClassEntry dataclass instances.
      classify_threat() uses keyword matching against entry fields -- no hardcoded
      per-class logic.
    code: |
      # extraction_taxonomy_reference_card.py
      # Chapter 9 Section 9.13 -- Chapter 9 Taxonomy Reference Card
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class ThreatClassEntry:
          attack_class: str
          adversary_goal: str
          query_budget_range: str
          primary_detection_primitive: str
          secondary_detection_primitive: str
          primary_defence: str
          output_side_defence: str
          owasp_sub_risk: str
          atlas_techniques: List[str]
          section_reference: str
          keywords: List[str]


      TAXONOMY_REFERENCE_CARD: List[ThreatClassEntry] = [
          ThreatClassEntry(
              attack_class='functionality_extraction',
              adversary_goal='Deployable surrogate clone across full input distribution',
              query_budget_range='10K-1M+ (black-box); 200-200K (grey-box with active distillation)',
              primary_detection_primitive='query_diversity_monitor',
              secondary_detection_primitive='adaptive_rate_limiter',
              primary_defence='Hard-label API design; extraction-aware rate limiter',
              output_side_defence='output_watermarker (post-hoc ownership evidence)',
              owasp_sub_risk='LLM10.1',
              atlas_techniques=['AML.T0040', 'AML.T0044'],
              section_reference='Sections 9.2, 9.4, 9.10, 9.11, 9.12',
              keywords=['surrogate', 'clone', 'distillation', 'copy', 'replicate', 'functionality'],
          ),
          ThreatClassEntry(
              attack_class='fidelity_extraction',
              adversary_goal='Exact behavioural match on specific target input set',
              query_budget_range='1K-50K (1x-5x target set size)',
              primary_detection_primitive='user_concentration_analyser',
              secondary_detection_primitive='query_pattern_monitor',
              primary_defence='Adaptive rate limiter; per-user semantic cluster monitoring',
              output_side_defence='output_perturbator (reduces fidelity on target set)',
              owasp_sub_risk='LLM10.1',
              atlas_techniques=['AML.T0040', 'AML.T0044'],
              section_reference='Sections 9.2, 9.4, 9.10, 9.11',
              keywords=['targeted', 'specific inputs', 'fidelity', 'exact match', 'target set'],
          ),
          ThreatClassEntry(
              attack_class='decision_boundary_extraction',
              adversary_goal='Classification surface geometry for adversarial example generation',
              query_budget_range='100-100K (black-box boundary probing); fewer with grey-box',
              primary_detection_primitive='boundary_query_detector',
              secondary_detection_primitive='ood_detector',
              primary_defence='Hard-label API; output perturbator degrades boundary signal',
              output_side_defence='output_perturbator (reduces boundary information per query)',
              owasp_sub_risk='LLM10.1',
              atlas_techniques=['AML.T0040'],
              section_reference='Sections 9.2, 9.3, 9.10, 9.11',
              keywords=['boundary', 'decision surface', 'adversarial', 'near-boundary', 'equation-solving', 'path-finding'],
          ),
          ThreatClassEntry(
              attack_class='prompt_extraction',
              adversary_goal='System prompt and operational configuration reconstruction',
              query_budget_range='20-500 (20-200 for direct; 50-500 for aggregation)',
              primary_detection_primitive='user_concentration_analyser (meta-query track)',
              secondary_detection_primitive='cumulative_query_monitor_prompt_track',
              primary_defence='Cumulative query monitor; output perturbator (reduces per-query leakage)',
              output_side_defence='output_perturbator (generifies prompt-derived phrases)',
              owasp_sub_risk='LLM10.2',
              atlas_techniques=['AML.T0040', 'AML.T0024'],
              section_reference='Sections 9.2, 9.5, 9.10, 9.11, 9.12',
              keywords=['system prompt', 'instructions', 'configuration', 'prompt', 'operational parameters'],
          ),
          ThreatClassEntry(
              attack_class='membership_inference',
              adversary_goal='Determine whether a specific record was in the training set',
              query_budget_range='10-1000 per target record (shadow model requires more setup)',
              primary_detection_primitive='user_concentration_analyser',
              secondary_detection_primitive='output_entropy_monitor',
              primary_defence='Differential privacy training (Section 8.13); output perturbator',
              output_side_defence='output_perturbator (degrades confidence gap signal)',
              owasp_sub_risk='LLM10.3',
              atlas_techniques=['AML.T0040'],
              section_reference='Sections 9.6, 9.10, 9.11, 9.12',
              keywords=['membership', 'training set', 'in training', 'was this record', 'shadow model', 'overfitting'],
          ),
          ThreatClassEntry(
              attack_class='model_inversion',
              adversary_goal='Reconstruct training data content from model outputs',
              query_budget_range='10K-1M (systematic generation + perplexity scoring)',
              primary_detection_primitive='query_diversity_monitor',
              secondary_detection_primitive='output_entropy_monitor',
              primary_defence='Differential privacy training (Section 8.13); output perturbator',
              output_side_defence='output_perturbator (reduces per-response memorisation signal)',
              owasp_sub_risk='LLM10.3',
              atlas_techniques=['AML.T0040', 'AML.T0024'],
              section_reference='Sections 9.7, 9.10, 9.11, 9.12',
              keywords=['reconstruct', 'training data', 'verbatim', 'memorised', 'inversion', 'PII recovery'],
          ),
          ThreatClassEntry(
              attack_class='api_economic_abuse',
              adversary_goal='Exhaust operator budget or block legitimate user access',
              query_budget_range='Minimal adversary cost; operator cost is the target',
              primary_detection_primitive='cost_per_query_outlier',
              secondary_detection_primitive='output_entropy_monitor (token count track)',
              primary_defence='Four-dimension adaptive rate limiter (cost + token + request + input-token)',
              output_side_defence='output_entropy_monitor (token-count anomaly as secondary signal)',
              owasp_sub_risk='LLM10.4',
              atlas_techniques=['AML.T0040'],
              section_reference='Sections 9.8, 9.10, 9.11',
              keywords=['cost', 'budget', 'denial-of-wallet', 'rate limit', 'amplification', 'economic'],
          ),
      ]


      def classify_threat(description: str) -> Optional[ThreatClassEntry]:
          '''Return the best-matching taxonomy entry for a threat description.'''
          lower = description.lower()
          scored = []
          for entry in TAXONOMY_REFERENCE_CARD:
              score = sum(1 for kw in entry.keywords if kw.lower() in lower)
              if score > 0:
                  scored.append((score, entry))
          if not scored:
              return None
          scored.sort(key=lambda x: x[0], reverse=True)
          return scored[0][1]


      def render_reference_card() -> None:
          print('CHAPTER 9 TAXONOMY REFERENCE CARD')
          print('=' * 70)
          for entry in TAXONOMY_REFERENCE_CARD:
              print(f'\n[{entry.owasp_sub_risk}] {entry.attack_class.upper()}')
              print(f'  Goal:       {entry.adversary_goal}')
              print(f'  Budget:     {entry.query_budget_range}')
              print(f'  Primary:    {entry.primary_detection_primitive}')
              print(f'  Defence:    {entry.primary_defence}')
              print(f'  Output:     {entry.output_side_defence}')
              print('  ATLAS:      ' + ', '.join(entry.atlas_techniques))
              print(f'  Sections:   {entry.section_reference}')


      if __name__ == '__main__':
          render_reference_card()
          print()
          example = 'adversary querying model to build a surrogate clone via soft-label distillation'
          match = classify_threat(example)
          if match:
              print(f'Classified as: {match.attack_class} ({match.owasp_sub_risk})')

  - id: 3
    name: 'owasp_coverage_map.py'
    description: |
      Encodes the cumulative OWASP LLM01 + LLM03 + LLM10 coverage map across
      Chapters 6 through 9. Provides a coverage_for_category() function and a
      gap_analysis() function that identifies which OWASP LLM categories are
      not yet covered (LLM02, LLM04-LLM09) as the roadmap for Chapters 11-17.
    implementation_notes: |
      Single quotes throughout per book convention. No external dependencies.
      Coverage entries are data-driven via OWASPCoverage dataclass list.
      Gap analysis computes uncovered categories from the full LLM01-LLM10 set.
    code: |
      # owasp_coverage_map.py
      # Chapter 9 Section 9.13 -- Cumulative OWASP LLM Coverage Map
      # Single quotes throughout per book convention.

      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      ALL_OWASP_CATEGORIES = [
          'LLM01', 'LLM02', 'LLM03', 'LLM04', 'LLM05',
          'LLM06', 'LLM07', 'LLM08', 'LLM09', 'LLM10',
      ]


      @dataclass
      class OWASPCoverage:
          category: str
          name: str
          chapters: List[int]
          attack_surface: str
          detection_architecture: str
          production_capstone: str
          status: str  # 'complete', 'partial', 'planned', 'not_covered'


      COVERAGE_MAP: List[OWASPCoverage] = [
          OWASPCoverage(
              category='LLM01',
              name='Prompt Injection',
              chapters=[6, 7],
              attack_surface='Inference-time: user input',
              detection_architecture='Five-track stateless gateway ensemble; per-request content classification',
              production_capstone='injection_classifier.py (Ch6); jailbreak_ensemble.py (Ch7)',
              status='complete',
          ),
          OWASPCoverage(
              category='LLM02',
              name='Insecure Output Handling',
              chapters=[],
              attack_surface='Inference-time: model output processing',
              detection_architecture='Not yet covered',
              production_capstone='Planned for Chapters 11-17',
              status='planned',
          ),
          OWASPCoverage(
              category='LLM03',
              name='Training Data Poisoning',
              chapters=[8],
              attack_surface='Training-time: data pipeline',
              detection_architecture='Offline batch auditing pipeline; CI/CD gate',
              production_capstone='auditing_pipeline.py (Ch8)',
              status='complete',
          ),
          OWASPCoverage(
              category='LLM04',
              name='Model Denial of Service',
              chapters=[9],
              attack_surface='Inference-time: API economic abuse',
              detection_architecture='Four-dimension adaptive rate limiter (Section 9.11)',
              production_capstone='rate_limiter.py (Ch9 Section 9.11)',
              status='partial',
          ),
          OWASPCoverage(
              category='LLM05',
              name='Supply Chain Vulnerabilities',
              chapters=[],
              attack_surface='Training-time and deployment-time: dependencies',
              detection_architecture='Not yet covered in depth',
              production_capstone='Planned for Chapters 11-17',
              status='planned',
          ),
          OWASPCoverage(
              category='LLM06',
              name='Sensitive Information Disclosure',
              chapters=[9],
              attack_surface='Inference-time: membership inference and model inversion',
              detection_architecture='Query monitor + output perturbator + DP training',
              production_capstone='output_perturbator.py + query_monitor.py (Ch9)',
              status='partial',
          ),
          OWASPCoverage(
              category='LLM07',
              name='Insecure Plugin Design',
              chapters=[],
              attack_surface='Inference-time: tool and plugin calls',
              detection_architecture='Not yet covered',
              production_capstone='Planned for Chapters 11-17',
              status='planned',
          ),
          OWASPCoverage(
              category='LLM08',
              name='Excessive Agency',
              chapters=[],
              attack_surface='Inference-time: agentic action scope',
              detection_architecture='Not yet covered',
              production_capstone='Planned for Chapters 11-17',
              status='planned',
          ),
          OWASPCoverage(
              category='LLM09',
              name='Overreliance',
              chapters=[],
              attack_surface='System-level: human-AI interaction patterns',
              detection_architecture='Not a technical detection problem',
              production_capstone='Not applicable',
              status='not_covered',
          ),
          OWASPCoverage(
              category='LLM10',
              name='Model Theft',
              chapters=[9],
              attack_surface='Inference-time: extraction via inference API',
              detection_architecture='Six-track gateway (Track 6) + output watermarking + perturbation',
              production_capstone='query_monitor.py + rate_limiter.py + output_watermarker.py + output_perturbator.py (Ch9)',
              status='complete',
          ),
      ]


      def coverage_for_category(category: str) -> Optional[OWASPCoverage]:
          return next((c for c in COVERAGE_MAP if c.category == category), None)


      def gap_analysis() -> Dict[str, List[str]]:
          gaps: Dict[str, List[str]] = {'complete': [], 'partial': [], 'planned': [], 'not_covered': []}
          for entry in COVERAGE_MAP:
              gaps[entry.status].append(entry.category)
          return gaps


      def render_coverage_map() -> None:
          print('OWASP LLM COVERAGE MAP -- Chapters 6-9')
          print('=' * 70)
          for entry in COVERAGE_MAP:
              status_icon = {'complete': '[DONE]', 'partial': '[PART]', 'planned': '[PLAN]', 'not_covered': '[N/A ]'}.get(entry.status, '[?]')
              print(f'{status_icon} {entry.category}: {entry.name}')
              if entry.chapters:
                  print(f'       Chapters: {entry.chapters}')
              print(f'       Status: {entry.status}')
          gaps = gap_analysis()
          print('\nComplete: ' + str(gaps['complete']))
          print('Partial:  ' + str(gaps['partial']))
          print('Planned:  ' + str(gaps['planned']))


      if __name__ == '__main__':
          render_coverage_map()

