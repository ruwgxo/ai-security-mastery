deliverables:

  deliverable_1:
    id: 'D11.10.1'
    filename: 'detection_engineering_workflow.py'
    description: >
      Full seven-phase workflow manager. Tracks phase completion timestamps for TTD
      measurement, enforces phase-gate documentation requirements, generates phase
      documentation templates, and produces a workflow status report showing which
      rules are in which phase and their current TTD elapsed time.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'pyyaml>=6.0'
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''detection_engineering_workflow.py
      Seven-phase detection engineering workflow manager.
      Tracks phase completions, computes TTD, enforces phase gate documentation.
      Chapter 11, Section 11.10 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 detection_engineering_workflow.py --new-rule "AML.T0051" "ruwgxo"
        python3 detection_engineering_workflow.py --advance <rule_id> --phase 2
        python3 detection_engineering_workflow.py --status
        python3 detection_engineering_workflow.py --ttd-report
      '''

      from __future__ import annotations
      import argparse
      import json
      import pathlib
      import sys
      import uuid
      from dataclasses import dataclass, field
      from datetime import datetime, timedelta, timezone
      from typing import Literal

      DATA_DIR = pathlib.Path('workflow_data')
      WORKFLOW_FILE = DATA_DIR / 'active_rules.json'

      Phase = Literal[1, 2, 3, 4, 5, 6, 7]

      PHASE_NAMES = {
          1: 'Hypothesis',
          2: 'Design',
          3: 'Build',
          4: 'Test',
          5: 'Deploy',
          6: 'Monitor',
          7: 'Improve',
      }

      PHASE_EXIT_CRITERIA = {
          1: 'Falsifiable hypothesis document: ATLAS technique, observable evidence, mechanism, evasion surface, FPR expectation',
          2: 'Seven design decisions documented and peer-reviewed; log field in taxonomy confirmed',
          3: 'Sigma rule authored; 4 test cases written; all metadata fields populated; status: experimental',
          4: 'CI passes: sigma check, yamllint, metadata validator, pytest, coverage diff (no regression)',
          5: 'Staging FPR within 150% of target after 24h; production deployment complete',
          6: '7-day rolling FPR within target; first analyst dispositions recorded; quarterly review scheduled',
          7: 'FPR breach resolved OR false negative documented OR rule retired per two-step process',
      }

      TTD_TARGETS_DAYS = {
          'catalogued': 7,
          'analyst_discovered': 14,
          'zero_day': 1,
          'backlog_gap': 30,
      }

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class PhaseRecord:
          phase: int
          name: str
          entered_at: str
          completed_at: str = ''
          exit_criterion_met: bool = False
          notes: str = ''

      @dataclass
      class WorkflowRule:
          rule_id: str
          atlas_technique: str
          owner: str
          threat_source: str
          ttd_target_days: int
          current_phase: int
          phases: list[dict] = field(default_factory=list)
          created_at: str = ''
          deployed_at: str = ''
          retired: bool = False

          @property
          def ttd_elapsed_hours(self) -> float:
              if not self.created_at:
                  return 0.0
              start = datetime.fromisoformat(self.created_at)
              end_str = self.deployed_at or datetime.now(timezone.utc).isoformat()
              end = datetime.fromisoformat(end_str)
              return (end - start).total_seconds() / 3600

          @property
          def ttd_elapsed_days(self) -> float:
              return self.ttd_elapsed_hours / 24

          @property
          def ttd_status(self) -> str:
              if self.deployed_at:
                  return 'COMPLETE'
              elapsed = self.ttd_elapsed_days
              target = self.ttd_target_days
              if elapsed > target * 1.5:
                  return 'OVERDUE'
              if elapsed > target:
                  return 'AT_RISK'
              return 'ON_TRACK'

      # ---------------------------------------------------------------------------
      # Storage
      # ---------------------------------------------------------------------------

      def _load() -> list[dict]:
          if not WORKFLOW_FILE.exists():
              return []
          with open(WORKFLOW_FILE) as f:
              return json.load(f)

      def _save(rules: list[dict]) -> None:
          DATA_DIR.mkdir(parents=True, exist_ok=True)
          with open(WORKFLOW_FILE, 'w') as f:
              json.dump(rules, f, indent=2)

      def _find(rules: list[dict], rule_id: str) -> dict | None:
          return next((r for r in rules if r['rule_id'] == rule_id), None)

      # ---------------------------------------------------------------------------
      # Workflow operations
      # ---------------------------------------------------------------------------

      def new_rule(
          atlas_technique: str,
          owner: str,
          threat_source: str = 'catalogued',
      ) -> str:
          rules = _load()
          rule_id = str(uuid.uuid4())[:8]
          ttd_target = TTD_TARGETS_DAYS.get(threat_source, 7)
          now = datetime.now(timezone.utc).isoformat()
          phase_record = PhaseRecord(
              phase=1,
              name=PHASE_NAMES[1],
              entered_at=now,
          )
          rule = WorkflowRule(
              rule_id=rule_id,
              atlas_technique=atlas_technique,
              owner=owner,
              threat_source=threat_source,
              ttd_target_days=ttd_target,
              current_phase=1,
              phases=[phase_record.__dict__],
              created_at=now,
          )
          rules.append(rule.__dict__)
          _save(rules)
          print(f'New workflow rule created: {rule_id}')
          print(f'  ATLAS technique: {atlas_technique}')
          print(f'  Threat source:   {threat_source}')
          print(f'  TTD target:      {ttd_target} day(s)')
          print(f'  Owner:           {owner}')
          print(f'\nPhase 1 exit criterion:')
          print(f'  {PHASE_EXIT_CRITERIA[1]}')
          return rule_id

      def advance_phase(rule_id: str, to_phase: int, notes: str = '') -> None:
          rules = _load()
          rule = _find(rules, rule_id)
          if not rule:
              print(f'Rule {rule_id} not found.')
              return
          current = rule['current_phase']
          if to_phase != current + 1:
              print(f'Cannot advance from Phase {current} to Phase {to_phase}. Phases must be sequential.')
              return
          now = datetime.now(timezone.utc).isoformat()
          # Close current phase
          for p in rule['phases']:
              if p['phase'] == current and not p['completed_at']:
                  p['completed_at'] = now
                  p['exit_criterion_met'] = True
                  p['notes'] = notes
          # Open next phase
          next_phase = PhaseRecord(phase=to_phase, name=PHASE_NAMES[to_phase], entered_at=now)
          rule['phases'].append(next_phase.__dict__)
          rule['current_phase'] = to_phase
          if to_phase == 5:
              pass  # deployed_at set when Phase 5 is completed via --complete-deploy
          _save(rules)
          print(f'Rule {rule_id} advanced to Phase {to_phase} — {PHASE_NAMES[to_phase]}')
          print(f'Exit criterion for Phase {to_phase}:')
          print(f'  {PHASE_EXIT_CRITERIA[to_phase]}')

      def complete_deploy(rule_id: str) -> None:
          rules = _load()
          rule = _find(rules, rule_id)
          if not rule:
              print(f'Rule {rule_id} not found.')
              return
          now = datetime.now(timezone.utc).isoformat()
          rule['deployed_at'] = now
          for p in rule['phases']:
              if p['phase'] == 5 and not p.get('completed_at'):
                  p['completed_at'] = now
                  p['exit_criterion_met'] = True
          created = datetime.fromisoformat(rule['created_at'])
          deployed = datetime.fromisoformat(now)
          ttd_days = (deployed - created).total_seconds() / 86400
          target = rule['ttd_target_days']
          status = 'WITHIN TARGET' if ttd_days <= target else 'EXCEEDED TARGET'
          _save(rules)
          print(f'Rule {rule_id} deployed to production.')
          print(f'  TTD: {ttd_days:.1f} days (target: {target} days) — {status}')

      # ---------------------------------------------------------------------------
      # Reports
      # ---------------------------------------------------------------------------

      def print_status() -> None:
          rules = _load()
          active = [r for r in rules if not r.get('retired') and not r.get('deployed_at')]
          deployed = [r for r in rules if r.get('deployed_at') and not r.get('retired')]
          print(f'\nDetection Engineering Workflow Status')
          print(f'Active (in-flight): {len(active)}')
          print(f'Deployed (monitoring): {len(deployed)}')
          print()
          if active:
              print(f'{"Rule ID":<12} {"ATLAS":<14} {"Phase":<20} {"Owner":<12} {"Elapsed":<12} {"TTD Status"}')
              print('-' * 85)
              for r in sorted(active, key=lambda x: x['current_phase']):
                  wr = WorkflowRule(**{k: v for k, v in r.items()})
                  phase_name = PHASE_NAMES.get(r['current_phase'], '?')
                  elapsed = f'{wr.ttd_elapsed_days:.1f}d'
                  print(f'{r["rule_id"]:<12} {r["atlas_technique"]:<14} {phase_name:<20} {r["owner"]:<12} {elapsed:<12} {wr.ttd_status}')

      def print_ttd_report() -> None:
          rules = _load()
          deployed = [r for r in rules if r.get('deployed_at')]
          if not deployed:
              print('No deployed rules yet — TTD report unavailable.')
              return
          ttds = []
          for r in deployed:
              wr = WorkflowRule(**{k: v for k, v in r.items()})
              ttds.append(wr.ttd_elapsed_days)
          ttds.sort()
          median = ttds[len(ttds) // 2]
          p90 = ttds[int(len(ttds) * 0.9)]
          within_target = sum(1 for r in deployed
                              if WorkflowRule(**{k: v for k, v in r.items()}).ttd_elapsed_days
                              <= r['ttd_target_days'])
          print(f'\nTTD Report — {len(deployed)} deployed rule(s)')
          print(f'  Median TTD:        {median:.1f} days')
          print(f'  90th percentile:   {p90:.1f} days')
          print(f'  Within target:     {within_target}/{len(deployed)}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Detection engineering workflow manager')
          parser.add_argument('--new-rule', nargs=3,
                              metavar=('ATLAS_TECHNIQUE', 'OWNER', 'THREAT_SOURCE'),
                              help='Create new workflow rule. THREAT_SOURCE: catalogued|analyst_discovered|zero_day|backlog_gap')
          parser.add_argument('--advance', metavar='RULE_ID', help='Advance rule to next phase')
          parser.add_argument('--phase', type=int, help='Target phase for --advance')
          parser.add_argument('--notes', default='', help='Notes for phase gate')
          parser.add_argument('--complete-deploy', metavar='RULE_ID',
                              help='Mark rule as deployed to production (stops TTD clock)')
          parser.add_argument('--status', action='store_true', help='Print workflow status')
          parser.add_argument('--ttd-report', action='store_true', help='Print TTD report')
          args = parser.parse_args()

          if args.new_rule:
              technique, owner, source = args.new_rule
              new_rule(technique, owner, source)
              return 0
          if args.advance:
              if not args.phase:
                  print('--advance requires --phase N')
                  return 1
              advance_phase(args.advance, args.phase, args.notes)
              return 0
          if args.complete_deploy:
              complete_deploy(args.complete_deploy)
              return 0
          if args.status:
              print_status()
              return 0
          if args.ttd_report:
              print_ttd_report()
              return 0
          parser.print_help()
          return 1

      if __name__ == '__main__':
          sys.exit(main())

  deliverable_2:
    id: 'D11.10.2'
    filename: 'detection_hypothesis_generator.py'
    description: >
      Generates a structured, falsifiable detection hypothesis document from an ATLAS
      technique ID or OWASP LLM category. Uses the ATLASTechnique registry from
      atlas_attack_tree_mapper.py as the knowledge base. Output is a Phase 1 document
      ready for design review, including observable evidence, detection layer, FPR
      expectation, evasion surface, and gateway track assignment.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''detection_hypothesis_generator.py
      Generates structured, falsifiable detection hypotheses from ATLAS technique IDs
      or OWASP LLM Top 10 categories.
      Chapter 11, Section 11.10 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 detection_hypothesis_generator.py --atlas AML.T0051
        python3 detection_hypothesis_generator.py --atlas AML.T0040
        python3 detection_hypothesis_generator.py --owasp LLM01
        python3 detection_hypothesis_generator.py --list
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass
      from datetime import date

      from atlas_attack_tree_mapper import TECHNIQUES, ATLASTechnique

      # ---------------------------------------------------------------------------
      # OWASP LLM → ATLAS technique mapping
      # ---------------------------------------------------------------------------

      OWASP_TO_ATLAS: dict[str, list[str]] = {
          'LLM01': ['AML.T0051', 'AML.T0054'],
          'LLM03': ['AML.T0020', 'AML.T0019'],
          'LLM04': ['AML.T0040'],
          'LLM10': ['AML.T0040'],
      }

      # ---------------------------------------------------------------------------
      # Hypothesis data model
      # ---------------------------------------------------------------------------

      @dataclass
      class DetectionHypothesis:
          hypothesis_id: str
          atlas_technique: str
          technique_name: str
          hypothesis_statement: str
          observable_evidence: list[str]
          log_source: str
          log_fields: list[str]
          detection_layer: str
          gateway_track: str
          fpr_expectation: str
          evasion_surface: str
          complementary_detection: str
          phase_1_exit_met: bool
          generated_date: str
          next_step: str

      # ---------------------------------------------------------------------------
      # Hypothesis builders (one per technique)
      # ---------------------------------------------------------------------------

      HYPOTHESIS_BUILDERS: dict[str, dict] = {

          'AML.T0051': {
              'statement': (
                  'An adversary attempting AML.T0051 (LLM Prompt Injection) against the '
                  'production inference API will embed adversarial instructions in prompt_text '
                  'that override or extend the system prompt. Unobfuscated variants will contain '
                  'known injection prefix strings detectable by keyword matching. Obfuscated '
                  'variants will produce elevated cosine similarity to the known-bad embedding '
                  'centroid even when keyword matching fails.'
              ),
              'observable_evidence': [
                  'prompt_text contains known injection prefix strings (unobfuscated variants)',
                  'track_3_similarity_score >= 0.85 (obfuscated variants; L2 heuristic)',
                  'gateway_action = "flag" or "block" from Track 1 or Track 3',
              ],
              'log_source': 'ai_gateway (category: ai_gateway, service: llm_inference)',
              'log_fields': ['prompt_text', 'injection_score', 'track_3_similarity_score', 'gateway_action'],
              'detection_layer': 'L1 (Track 1 keyword) and L2 (Track 3 similarity)',
              'gateway_track': 'Track 1 (primary); Track 3 (obfuscated variants)',
              'fpr_expectation': 'Track 1: ~1% on production traffic. Track 3: ~5% on technical users.',
              'evasion_surface': 'Base64-encoded injection, token-split injection, and multi-turn fragmented injection evade both L1 and L2. L3 intent classifier (Chapter 12) required for full coverage.',
              'complementary_detection': 'L3: Chapter 12 intent classifier (Section 12.04)',
              'next_step': 'Proceed to Phase 2 Design: confirm prompt_text field is in taxonomy; set FPR target at 1% (Track 1 block) and 5% (Track 3 flag).',
          },

          'AML.T0054': {
              'statement': (
                  'An adversary attempting AML.T0054 (Prompt Injection via Adversarial Role-play) '
                  'will use role-play or persona framing to bypass alignment. Known jailbreak '
                  'templates (DAN, developer mode, compliance auditor framings) will match keyword '
                  'rules. Novel framings will produce embedding similarity to the known-jailbreak '
                  'cluster above classifier threshold.'
              ),
              'observable_evidence': [
                  'prompt_text contains known jailbreak template keywords',
                  'track_3_similarity_score close to jailbreak-cluster centroid (jailbreak_classifier_score >= 0.75)',
              ],
              'log_source': 'ai_gateway (category: ai_gateway, service: llm_inference)',
              'log_fields': ['prompt_text', 'track_3_similarity_score', 'gateway_action'],
              'detection_layer': 'L1 (Track 2 Sigma) and L3 (Track 2 jailbreak classifier)',
              'gateway_track': 'Track 2',
              'fpr_expectation': 'Track 2 Sigma: ~1%. Track 2 classifier: ~5%. Novel framings gap until Chapter 12.',
              'evasion_surface': 'Novel jailbreak framings outside classifier training distribution evade L3. Multi-step role-play that does not match known templates evades L1.',
              'complementary_detection': 'L3: adversarial classifier training expansion (Chapter 12, Section 12.03)',
              'next_step': 'Phase 2 Design: confirm jailbreak classifier produces jailbreak_classifier_score field in ai_gateway log.',
          },

          'AML.T0040': {
              'statement': (
                  'An adversary attempting AML.T0040 (ML Model Inference API Access for extraction) '
                  'will issue many queries with systematically reduced variance to probe decision '
                  'boundaries. Single-session extraction produces per-request signals (low query '
                  'variance, low entropy). Sustained extraction produces session-level signals '
                  '(request count > 100 per session, budget_consumed_pct rising).'
              ),
              'observable_evidence': [
                  'query_variance < 0.15 on multiple consecutive requests from same user_id',
                  'query_entropy_avg < 2.5 bits in session window',
                  'session_request_count > 100 within session',
                  'budget_consumed_pct trending upward across sessions',
              ],
              'log_source': 'ai_session (category: ai_session, service: session_accumulator)',
              'log_fields': ['user_id', 'session_id', 'query_variance', 'query_entropy_avg', 'session_request_count', 'budget_consumed_pct'],
              'detection_layer': 'L1 (per-request Sigma) and L4 (session accumulator)',
              'gateway_track': 'Track 5',
              'fpr_expectation': '~2% overall; higher for automation accounts (require exception management from Section 11.09).',
              'evasion_surface': 'Distributed extraction across many user accounts evades per-user session accumulator. Cross-user correlation (Chapter 13, Section 13.03) required.',
              'complementary_detection': 'L4: cross-user behavioural correlation (Chapter 13, Section 13.03)',
              'next_step': 'Phase 2 Design: confirm query_variance and query_entropy_avg fields exist in ai_session schema; set exception list for known automation accounts.',
          },

          'AML.T0043': {
              'statement': (
                  'An adversary attempting AML.T0043 (Craft Adversarial Data) will submit inputs '
                  'crafted to cause model misclassification. Gradient-based adversarial examples '
                  '(FGSM, PGD) produce elevated feature squeezer disagreement and high adversarial '
                  'classifier scores. Physical adversarial patches (AML.T0029) produce spatial '
                  'region anomalies in image inputs (camera-facing deployments only).'
              ),
              'observable_evidence': [
                  'track_7_squeezer_score >= 0.70 (L2 heuristic; feature squeezer disagreement)',
                  'adversarial_classifier_score >= 0.80 (L3 ML; binary adversarial classifier)',
                  'Compound condition required: both signals must fire simultaneously',
              ],
              'log_source': 'ai_gateway (category: ai_gateway, service: llm_inference)',
              'log_fields': ['track_7_squeezer_score', 'adversarial_classifier_score', 'model_name', 'gateway_action'],
              'detection_layer': 'L2 (Track 7 squeezer) and L3 (Track 7 adversarial classifier)',
              'gateway_track': 'Track 7',
              'fpr_expectation': 'Compound condition: ~2%. Squeezer alone: ~5% (internal gate only, not SOC-visible).',
              'evasion_surface': 'Squeezer-stable adversarial examples (perturbation in squeezer null space). Novel adversarial families outside classifier training distribution.',
              'complementary_detection': 'L3: expanded adversarial classifier training corpus (Chapter 12, Section 12.05)',
              'next_step': 'Phase 2 Design: confirm track_7_squeezer_score and adversarial_classifier_score in ai_gateway schema; compound condition design review required.',
          },

          'AML.T0020': {
              'statement': (
                  'An adversary attempting AML.T0020 (Poison Training Data) will inject '
                  'mislabelled examples into the training pipeline. Overt poisoning produces '
                  'detectable label distribution anomalies per batch. Slow-drift poisoning '
                  'accumulates below per-batch thresholds and requires session-level drift '
                  'monitoring (Layer 4, Chapter 13).'
              ),
              'observable_evidence': [
                  'label_distribution skew: label_skew_score > 2.0 for any batch',
                  'batch_size anomaly: batch_size deviates > 3 SD from expected for this training job',
              ],
              'log_source': 'ai_training (category: ai_training, service: label_ingestion)',
              'log_fields': ['label_distribution', 'label_skew_score', 'batch_size', 'run_id', 'training_api_caller'],
              'detection_layer': 'L1 (Track 4 Sigma on training API logs)',
              'gateway_track': 'Track 4',
              'fpr_expectation': '~0.5%; training pipeline label anomalies are rare in legitimate use.',
              'evasion_surface': 'Slow-drift poisoning below per-batch threshold accumulates undetected. L4 training data drift monitor (Chapter 13, Section 13.04) required.',
              'complementary_detection': 'L4: training data drift monitor (Chapter 13, Section 13.04)',
              'next_step': 'Phase 2 Design: confirm label_skew_score field in ai_training schema; establish per-job expected label distribution baseline.',
          },
      }

      # ---------------------------------------------------------------------------
      # Generator
      # ---------------------------------------------------------------------------

      def generate_hypothesis(technique_id: str) -> DetectionHypothesis | None:
          technique = next((t for t in TECHNIQUES if t.technique_id == technique_id), None)
          builder = HYPOTHESIS_BUILDERS.get(technique_id)
          if not technique or not builder:
              print(f'No hypothesis template for {technique_id}. Add to HYPOTHESIS_BUILDERS.')
              return None

          hyp_id = f'HYP-{technique_id.replace(".", "-")}-{date.today().strftime("%Y%m%d")}'
          return DetectionHypothesis(
              hypothesis_id=hyp_id,
              atlas_technique=technique_id,
              technique_name=technique.name,
              hypothesis_statement=builder['statement'],
              observable_evidence=builder['observable_evidence'],
              log_source=builder['log_source'],
              log_fields=builder['log_fields'],
              detection_layer=builder['detection_layer'],
              gateway_track=builder['gateway_track'],
              fpr_expectation=builder['fpr_expectation'],
              evasion_surface=builder['evasion_surface'],
              complementary_detection=builder['complementary_detection'],
              phase_1_exit_met=True,
              generated_date=date.today().isoformat(),
              next_step=builder['next_step'],
          )

      def print_hypothesis(h: DetectionHypothesis) -> None:
          print(f'\n{"=" * 70}')
          print(f'Detection Hypothesis: {h.hypothesis_id}')
          print(f'{"=" * 70}')
          print(f'ATLAS Technique:    {h.atlas_technique} — {h.technique_name}')
          print(f'Generated:          {h.generated_date}')
          print(f'\nHypothesis Statement:')
          print(f'  {h.hypothesis_statement}')
          print(f'\nObservable Evidence:')
          for e in h.observable_evidence:
              print(f'  • {e}')
          print(f'\nLog Source:         {h.log_source}')
          print(f'Log Fields:         {", ".join(h.log_fields)}')
          print(f'Detection Layer:    {h.detection_layer}')
          print(f'Gateway Track:      {h.gateway_track}')
          print(f'FPR Expectation:    {h.fpr_expectation}')
          print(f'\nEvasion Surface:')
          print(f'  {h.evasion_surface}')
          print(f'\nComplementary Detection:')
          print(f'  {h.complementary_detection}')
          print(f'\nPhase 1 Exit Criterion Met: {"YES" if h.phase_1_exit_met else "NO"}')
          print(f'\nNext Step (Phase 2 Design):')
          print(f'  {h.next_step}')
          print(f'{"=" * 70}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='Detection hypothesis generator')
          parser.add_argument('--atlas', metavar='TECHNIQUE_ID',
                              help='Generate hypothesis for an ATLAS technique (e.g. AML.T0051)')
          parser.add_argument('--owasp', metavar='CATEGORY',
                              help='Generate hypotheses for an OWASP LLM category (e.g. LLM01)')
          parser.add_argument('--list', action='store_true',
                              help='List all supported technique IDs')
          args = parser.parse_args()

          if args.list:
              print('Supported ATLAS technique IDs:')
              for tid in HYPOTHESIS_BUILDERS:
                  tech = next((t for t in TECHNIQUES if t.technique_id == tid), None)
                  name = tech.name if tech else '—'
                  print(f'  {tid}: {name}')
              return 0

          if args.atlas:
              h = generate_hypothesis(args.atlas)
              if h:
                  print_hypothesis(h)
              return 0 if h else 1

          if args.owasp:
              atlas_ids = OWASP_TO_ATLAS.get(args.owasp.upper(), [])
              if not atlas_ids:
                  print(f'No ATLAS mapping for {args.owasp}. Supported: {list(OWASP_TO_ATLAS.keys())}')
                  return 1
              for tid in atlas_ids:
                  h = generate_hypothesis(tid)
                  if h:
                      print_hypothesis(h)
              return 0

          parser.print_help()
          return 1

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.10.1'
    mistake: 'Writing a vague detection goal instead of a falsifiable hypothesis in Phase 1'
    why_it_happens: >
      "Detect injection attacks" is intuitive and fast to write. The engineering discipline
      of forming a falsifiable prediction requires more effort and feels like unnecessary
      formalism when the engineer already knows what attack they are targeting.
    why_it_matters: >
      A vague detection goal produces a design (Phase 2) without a clear feature selection,
      a rule (Phase 3) that matches a wide class of inputs, and a test suite (Phase 4) that
      validates the rule fires on some injection examples without confirming it fires on
      the specific evidence the adversary will actually produce. The rule deploys with
      unknown FPR and unknown true positive coverage for the specific attack variant.
    correct_approach: >
      The hypothesis must name the ATLAS technique, the log field that carries the
      observable evidence, the threshold or pattern that distinguishes signal from noise,
      and the evasion surface that this detection will not cover. Use
      detection_hypothesis_generator.py to generate the scaffold; fill in the
      deployment-specific details from the Phase 2 design.

  - id: 'CM11.10.2'
    mistake: 'Starting Phase 3 (Build) before Phase 2 (Design) is complete and peer-reviewed'
    why_it_happens: >
      Building is more tangible than designing. Engineers who are confident they know
      what the rule should do skip the design document and start writing Sigma immediately.
    why_it_matters: >
      Phase 3 decisions made without a Phase 2 design are made implicitly and inconsistently.
      The log source is chosen by habit rather than by taxonomy confirmation. The FPR target
      is not set before deployment. The test cases are written to match the rule rather than
      to validate the security requirement. A Phase 2 gap in any of the seven design decisions
      produces a Phase 7 improvement cycle that could have been avoided.
    correct_approach: >
      Phase 2 is a synchronous gate: the Phase 2 design document is reviewed and approved
      by a second engineer before Phase 3 begins. The design review confirms that the log
      source field is in the ai_log_field_taxonomy, that the FPR target is documented,
      and that the four test cases are written in terms of specific prompt text and
      expected detection scores — not in abstract terms.

  - id: 'CM11.10.3'
    mistake: 'Treating the 24-hour staging observation window as optional when TTD pressure is high'
    why_it_happens: >
      Under TTD pressure — a threat actor is actively exploiting a technique — the 24-hour
      staging window feels like an obstacle to protecting production. The temptation is to
      merge directly to main.
    why_it_matters: >
      A rule deployed to production without staging observation may have a calibration
      issue that is invisible in the test corpus but visible in production traffic. A
      rule that floods production with false positives requires an emergency rollback
      that adds 15–30 minutes to the TTD for the rollback itself and disrupts SOC
      operations during the flood period. The net TTD is worse than waiting 24 hours.
    correct_approach: >
      For zero-day threats, run staging and production in parallel: deploy to production
      immediately with status: experimental (which prevents the rule from being SOC-visible
      in production) while the staging observation runs. After 24 hours at acceptable
      FPR on staging, promote to status: test and make the rule SOC-visible in production.
      This achieves fast deployment without skipping calibration.

  - id: 'CM11.10.4'
    mistake: 'Not tracking TTD per rule, making the programme''s improvement trajectory invisible'
    why_it_happens: >
      TTD feels like a project management metric rather than a security metric. Detection
      teams focus on rule quality, coverage, and FPR — not on how long the detection took
      to build.
    why_it_matters: >
      A programme with excellent rules that take 45 days on average to deploy leaves a
      45-day adversary advantage window for every new technique. This window is invisible
      until TTD is tracked. Without TTD data, the programme cannot identify whether the
      bottleneck is Phase 1 (slow threat intelligence intake), Phase 2 (blocked on log
      schema), or Phase 4 (recurring test failures indicating design problems).
    correct_approach: >
      Use detection_engineering_workflow.py to track phase completion timestamps for
      every new detection rule. Report median TTD and 90th-percentile TTD in the
      quarterly detection programme review. Any rule with TTD above the applicable target
      (7 days for catalogued, 14 days for analyst-discovered) triggers a retrospective
      to identify the phase that consumed the most time and the root cause.

  - id: 'CM11.10.5'
    mistake: 'Retiring a rule immediately when false negative is confirmed rather than first improving it'
    why_it_happens: >
      A confirmed false negative feels like a failed rule. If the rule missed a real attack,
      it seems like the rule does not work and should be replaced.
    why_it_matters: >
      Most confirmed false negatives indicate a specific evasion variant that the rule does
      not cover — not a fundamental flaw in the detection approach. Retiring the rule removes
      whatever coverage it did provide for the non-evading variants of the attack. If the
      rule detected 80% of attack variants and missed the 20% that used a specific encoding,
      retiring it removes the 80% coverage without improving the 20% gap.
    correct_approach: >
      A confirmed false negative triggers Phase 7 — Improve, not retirement. The false
      negative input is added as a positive test fixture. If the rule logic can be adjusted
      to catch this variant without unacceptable FPR increase, it is improved. If it cannot,
      the variant is documented as a residual gap and a new detection hypothesis is opened
      in Phase 1 for the evasion variant. The original rule stays in production; the new rule
      adds coverage for the evasion surface.

section_summary:
  what_you_learned: |
    The seven-phase detection engineering workflow converts threat intelligence and
    coverage gaps into production detection rules through a defined, gate-enforced
    procedure. Each phase has a specific exit criterion enforced by tooling (phases 4–6)
    or peer review (phases 1–3 and 7). Hypotheses must be falsifiable: they name the
    ATLAS technique, the observable evidence field, the detection mechanism, and the
    evasion surface. Phase 2 design decisions — log source, feature, logic, FPR target,
    test cases, evasion assessment, and owner — are made before a line of Sigma is written.
    Time-to-detect is the security metric of the workflow: under 7 days for catalogued
    techniques, under 24 hours for zero-days. Phase 7 improvement is triggered by FPR
    breach, confirmed false negative, coverage regression, or quarterly review, and
    produces improvements as PRs through the full pipeline rather than direct edits.
  key_terms:
    - term: 'Falsifiable hypothesis'
      definition: >
        A detection hypothesis that names specific observable evidence in a named log field,
        distinguishable from legitimate traffic by a named mechanism, with a named FPR
        expectation and a named evasion surface. Can be proven wrong by examining logs
        during a confirmed attack.
    - term: 'Time-to-detect (TTD)'
      definition: >
        The elapsed time from Phase 1 hypothesis documentation to Phase 5 production
        deployment. A security metric measuring the adversary advantage window. Target:
        under 7 days for catalogued techniques, under 24 hours for zero-days.
    - term: 'Phase gate'
      definition: >
        The exit criterion that must be satisfied before a detection rule advances from
        one workflow phase to the next. Phases 4 and 5 gates are enforced by the CI/CD
        pipeline. Phases 1–3 and 7 gates are enforced by peer review and documentation
        requirements.
    - term: 'Phase 7 — Improve'
      definition: >
        The workflow phase triggered by FPR breach, confirmed false negative, coverage
        regression, or quarterly review. Produces rule refinements as calibrate/ PRs
        through the full pipeline, not direct SIEM edits. A confirmed false negative
        triggers Phase 7 — not retirement.
    - term: 'Zero-day TTD path'
      definition: >
        The compressed workflow for actively exploited zero-days: deploy to production
        with status experimental (SOC-invisible) immediately while staging observation
        runs in parallel; promote to SOC-visible after 24-hour staging FPR passes.
        Achieves fast deployment without skipping calibration.

preview_section_11_11:
  title: 'OWASP LLM Top 10 Detection Coverage Matrix'
  teaser: |
    Section 11.11 applies the seven-phase detection engineering workflow at scale:
    all ten OWASP LLM Top 10 vulnerabilities assessed against the seven-track gateway,
    producing a coverage score (0–2) and a gap description for each. LLM01 (Prompt
    Injection) and LLM10 (Model Theft) are the strongest coverage areas. LLM02
    (Insecure Output Handling) and LLM06 (Sensitive Information Disclosure) have no
    current gateway coverage — output-side detection is the most common gap in gateway-
    first architectures. LLM03 (Training Data Poisoning) and LLM05 (Supply Chain) have
    intentional runtime gaps that require build-time controls rather than inference-time
    detection. The section produces an OWASP coverage matrix alongside the ATLAS heat
    map and a gap closure roadmap mapping each OWASP gap to the Chapter 12–15 deliverable
    that addresses it.

