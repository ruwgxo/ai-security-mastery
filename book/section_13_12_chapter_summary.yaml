prose_content:

  part_1_chapter_arc:
    title: 'The Chapter Arc: From Per-Request to Behavioural'
    body: |
      Chapter 13 began where Chapter 12 ended: a per-request gateway that scores each request in isolation
      with four classifiers. That gateway is necessary and incomplete. It catches the attacks whose signal
      lives in a single request, and it is structurally blind to the attacks whose signal lives in the
      relationship between requests -- the multi-turn escalation, the slow exfiltration, the account
      compromise, the coordinated network. Chapter 13 built the layer that holds state across requests to
      catch these.

      The arc ran through four signal families, ordered by the state each holds. Section 13.01 established
      the taxonomy and the central architectural fact that state requirement and detection latency are
      coupled. The session family -- 13.02 session modelling and 13.09 multi-turn analysis -- aggregated
      requests into sessions and caught the gradual jailbreak in the trajectory across turns. The temporal
      family -- 13.03 baselines, 13.04 time-series anomaly, 13.05 drift, and 13.06 output monitoring --
      treated behavioural metrics as time series against per-entity baselines, caught burst and slow-ramp
      abuse, watched the detectors and the model for silent degradation, and detected injection success in
      the output. The entity family -- 13.07 rate-based detection, 13.08 smart rate limiting, and 13.10
      profiling -- caught the abuse with no per-request signal, enforced adaptively, and made the requester's
      history a first-class input. The graph family -- 13.11 -- caught the coordinated network invisible at
      every lower level, and integrated the whole layer into the gateway.

      Each family aggregates at a higher level than the last -- request to session to entity to graph -- and
      each level reveals attacks invisible below it. The arc is this ascending hierarchy of aggregation, and
      the behavioural layer is the whole of it: the system that sees the request, the session, the entity,
      and the relationships between entities.

  part_2_framework_stack:
    title: 'The Detection Stack and the Cross-Cutting Principles'
    body: |
      Chapter 13 completes the four-layer detection stack of Part 3. Chapter 11 built the signature layer
      (known-pattern matching) and the heuristic layer (rule-based scoring). Chapter 12 built the ML layer
      (trained per-request classifiers). Chapter 13 built the behavioural layer (cross-request state). Each
      layer is more expensive and broader than the one below: signatures are cheapest and narrowest, ML is
      more expensive and broader, behavioural is the most expensive and the broadest. A detection system is
      not complete until all four are present, and a system missing the behavioural layer has a structural
      blind spot for every attack that spans requests.

      Across the behavioural families, a small set of principles recurred, and they are the discipline that
      makes the layer work. Baseline before anomaly: every anomaly detector -- temporal, rate, output -- is
      undefined without an explicit reference, and the references are per-entity because normal varies by
      entity. Robust statistics: the baselines are computed from traffic that contains the attacks, so the
      median and MAD are mandatory to resist contamination. The contamination guard: robust statistics resist
      a minority of attack observations but not a slow ramp, so flagged traffic is held out of baseline and
      state updates across the chapter -- in 13.03, 13.04, and 13.06. The state-latency coupling from 13.01:
      the families holding large state run off the hot path and expose cheap summaries inline, which governs
      the gateway integration. Decay and reinforcement from 13.10: a risk score must fade for fairness and
      compound for effectiveness. These principles appear in family after family, and recognising them as one
      discipline rather than per-section details is the conceptual payoff of the chapter.

  part_3_what_remains:
    title: 'What the Behavioural Layer Produces and What Remains'
    body: |
      The behavioural layer produces the behavioural monitoring gateway: the Chapter 12 seven-track gateway
      with the behavioural layer integrated above it as the fourth detection layer. The request hot path runs
      the per-request classifiers inline and reads the cheap precomputed behavioural summaries -- entity risk,
      rate-limit state, session threat, canary check. The near-real-time tier runs the session scorer, the
      baseline and time-series detectors, the entity profiler, and the output monitor. The batch tier runs the
      graph detector and the drift monitors. The whole is made operable by the behavioural monitoring dashboard
      with its entity-risk, drift, and coordinated-network views.

      This is a complete logical architecture, but it is not yet a production system, and that gap is what
      remains for Chapter 14. The integration of 13.11 specifies which detector runs at which tier and what the
      hot path reads, but it does not address the production concerns: how to place the gateway behind an API
      gateway in the request path, how to hold the inline tier within a strict latency budget at scale, what
      happens when a detector errors -- the fail-open versus fail-closed decision -- how to make the system
      observable with metrics, logging, and tracing, and how to keep the near-real-time and batch tiers
      affordable through sampling, caching, and batching. The behavioural monitoring gateway is the artifact
      Chapter 13 produces; turning it into a production service is the work of Chapter 14.

      There is also the matter of keeping the layer alive. A behavioural detection system is not a one-time
      build -- it rots without maintenance. The drift monitors of 13.05 watch the detectors and the model for
      decay and feed the retraining trigger; the contamination guards keep the baselines from being trained by
      the adversary; the risk-score decay keeps the profiles fair; the family signatures of 13.09 and the edge
      construction of 13.11 must be extended as attacks evolve. The sustainability checklist consolidates these
      requirements, and they are as essential to the layer's long-term value as the detectors themselves.

  part_4_part3_roadmap:
    title: 'Part 3 Roadmap: Detection Engineering Complete, Deployment Next'
    body: |
      Part 3 set out to build the detection engineering for AI systems, and with Chapter 13 the detection
      capability is structurally complete. Chapter 11 established the layered detection framework and built the
      signature and heuristic layers. Chapter 12 built the ML detection layer -- the trained classifiers, the
      ensemble, the live dataset curation, the production ML gateway. Chapter 13 built the behavioural layer --
      the four signal families and their integration. The detection system now sees every level at which an
      attack can manifest: the request, the session, the entity, and the relationships between entities, with
      each of the four layers contributing the part of the picture it can see.

      Chapter 14, the final chapter of Part 3, closes the part by taking this complete detection system to
      production. It covers the deployment architecture patterns -- API gateway, sidecar, inline -- that place
      the detection in the request path; the performance engineering that meets the latency requirements the
      inline tier must satisfy; the integration points for pre-processing and post-processing detection; the
      failure modes and the fail-open versus fail-closed decision; the observability stack that makes the
      system operable at scale; and the cost optimisation that keeps it affordable. By the end of Chapter 14,
      the detection system built across Chapters 11, 12, and 13 is a production service, and Part 3 is
      complete, setting up Part 4's practical end-to-end implementation.

  part_5_practitioner_checklist:
    title: 'Practitioner Checklist: Auditing a Behavioural Detection Deployment'
    body: |
      A behavioural detection deployment can be audited against the four families and the cross-cutting
      principles. For the families: is the session family present, aggregating requests into sessions with
      trajectory features and multi-turn detection? Is the temporal family present, with per-entity baselines,
      seasonal-aware anomaly detection, drift monitoring of the detectors and model, and output monitoring of
      injection success? Is the entity family present, with rate-based detection, adaptive rate limiting, and
      persistent profiling with risk scoring? Is the graph family present, building the entity-relationship
      graph and detecting coordinated networks? A deployment missing a family has a blind spot for that
      family's attack class.

      For the principles: are the anomaly detectors built on explicit per-entity baselines, not global
      thresholds? Are the baselines computed with robust statistics? Is there a contamination guard holding
      flagged traffic out of baseline and state updates? Does the gateway integration respect the state-latency
      coupling, with large-state detectors off the hot path and only cheap summaries read inline? Do the risk
      scores decay for fairness and reinforce for effectiveness? And for sustainability: are the drift monitors
      watching the detectors and model, feeding the retraining trigger? Are the family signatures and graph
      edges maintained as attacks evolve? A deployment that has the detectors but not the principles and the
      sustainability practices works at first and degrades, so the audit checks both the presence of the
      families and the discipline that keeps them effective.

  part_6_quarterly_cycle:
    title: 'The Maintenance Cycle: Keeping the Behavioural Layer Alive'
    body: |
      Because the behavioural layer rots without maintenance, it needs a regular maintenance cycle, and the
      chapter's sustainability requirements define what that cycle does. On a frequent cadence, the drift
      monitors of 13.05 run and their alerts are triaged: benign drift routes to the retraining trigger,
      adversarial drift routes to the security team. The retraining loop refreshes the Chapter 12 detectors on
      the current distribution. The baselines update continuously under the contamination guard, and the
      risk-score decay continuously erodes stale risk so fair entities recover.

      On a slower cadence, the structural elements are reviewed and extended. The family signatures of 13.09 --
      Crescendo, many-shot -- are updated as new multi-turn families are discovered, since the signature set is
      always behind the attack frontier and the general trajectory detection covers the gap only partially. The
      graph edge construction of 13.11 is reviewed as infrastructure and behaviour patterns change, so the
      edges keep meaning real relationships rather than the shifting coincidental sharing of legitimate traffic.
      The baselines, thresholds, and risk-score calibration are revisited as the legitimate population evolves.
      This maintenance cycle is the difference between a behavioural layer that stays effective and one that
      slowly decays into a system that processes traffic and catches less and less -- the same silent decay the
      drift monitors detect, applied to the behavioural layer as a whole. With the cycle in place, the
      behavioural monitoring gateway remains the complete, current detection system that Chapter 14 deploys to
      production.

