deliverables:

  deliverable_1:
    title: 'Behavioural Detection Deployment Audit'
    filename: 'behavioural_detection_audit.py'
    description: 'Audits a behavioural detection deployment against the four signal families, the cross-cutting principles, and the sustainability requirements, reporting coverage gaps and discipline gaps. Implements the practitioner checklist from Section 13.12 Parts 5 and 6.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # behavioural_detection_audit.py
      # Section 13.12: Behavioural Detection Deployment Audit
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class DeploymentState:
          families_present: Dict[str, bool]       # session, temporal, entity, graph
          principles_present: Dict[str, bool]     # baseline, robust_stats, contamination_guard, latency_coupling, decay_reinforce
          sustainability_present: Dict[str, bool] # drift_monitor, signature_maintenance, edge_review, recalibration


      @dataclass
      class AuditResult:
          family_gaps: List[str] = field(default_factory=list)
          principle_gaps: List[str] = field(default_factory=list)
          sustainability_gaps: List[str] = field(default_factory=list)

          def passed(self) -> bool:
              return not (self.family_gaps or self.principle_gaps or self.sustainability_gaps)


      def audit(state: DeploymentState) -> AuditResult:
          r = AuditResult()
          for fam, present in state.families_present.items():
              if not present:
                  r.family_gaps.append(f'{fam} family missing -- blind to its attack class')
          for pr, present in state.principles_present.items():
              if not present:
                  r.principle_gaps.append(f'{pr} principle not applied -- detection degrades')
          for su, present in state.sustainability_present.items():
              if not present:
                  r.sustainability_gaps.append(f'{su} not maintained -- the layer will rot')
          return r


      if __name__ == '__main__':
          # A deployment with all families but missing the contamination guard and drift monitor
          state = DeploymentState(
              families_present={'session': True, 'temporal': True, 'entity': True, 'graph': True},
              principles_present={
                  'baseline': True, 'robust_stats': True,
                  'contamination_guard': False, 'latency_coupling': True, 'decay_reinforce': True,
              },
              sustainability_present={
                  'drift_monitor': False, 'signature_maintenance': True,
                  'edge_review': True, 'recalibration': True,
              },
          )
          result = audit(state)
          print('Family gaps:        ', result.family_gaps or 'none')
          print('Principle gaps:     ', result.principle_gaps or 'none')
          print('Sustainability gaps:', result.sustainability_gaps or 'none')
          print('Audit passed:', result.passed())
          print('All families present, but the missing contamination guard and drift')
          print('monitor mean the layer detects now and silently decays later.')

  deliverable_2:
    title: 'Chapter 13 Concept Map'
    filename: 'chapter_13_concept_map.py'
    description: 'Assembles the Chapter 13 concept map: the four signal families, their sections, the cross-cutting principles, and the dependencies between sections, as a navigable synthesis of the chapter. Implements the chapter synthesis from Section 13.12.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # chapter_13_concept_map.py
      # Section 13.12: Chapter 13 Concept Map
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class FamilyMap:
          family: str
          sections: List[str]
          state: str
          gateway_tier: str
          catches: str


      FAMILIES: List[FamilyMap] = [
          FamilyMap('Session', ['13.02', '13.09'], 'session (small)', 'near-real-time',
                    'multi-turn escalation and accumulation'),
          FamilyMap('Temporal', ['13.03', '13.04', '13.05', '13.06'], 'metric history / reference dist',
                    'near-real-time + batch', 'rate abuse, detector/model drift, injection success'),
          FamilyMap('Entity', ['13.07', '13.08', '13.10'], 'persistent profile (large)',
                    'near-real-time; risk read inline', 'no-per-request abuse, compromise, low-and-slow'),
          FamilyMap('Graph', ['13.11'], 'entity graph (largest)', 'batch',
                    'coordinated networks, Sybil/bot clusters'),
      ]

      CROSS_CUTTING_PRINCIPLES: List[str] = [
          'Baseline before anomaly -- per-entity references, not global thresholds (13.03)',
          'Robust statistics -- median/MAD resist adversarial contamination (13.03)',
          'Contamination guard -- flagged traffic held out of baseline/state updates (13.03/13.04/13.06)',
          'State-latency coupling -- large state off the hot path, cheap summaries inline (13.01/13.11)',
          'Decay and reinforcement -- risk fades for fairness, compounds for effectiveness (13.10)',
      ]

      ASCENDING_AGGREGATION: List[str] = [
          'request (Chapter 12 per-request gateway)',
          'session (13.02 aggregates requests)',
          'entity (13.10 aggregates sessions)',
          'graph (13.11 aggregates entities)',
      ]


      if __name__ == '__main__':
          print('CHAPTER 13 CONCEPT MAP: Behavioural Analysis and Monitoring')
          print('=' * 62)
          print('\nAscending aggregation hierarchy:')
          for level in ASCENDING_AGGREGATION:
              print(f'  -> {level}')
          print('\nSignal families:')
          for f in FAMILIES:
              print(f'\n  [{f.family}]  sections {", ".join(f.sections)}')
              print(f'    state: {f.state}')
              print(f'    tier:  {f.gateway_tier}')
              print(f'    catches: {f.catches}')
          print('\nCross-cutting principles:')
          for p in CROSS_CUTTING_PRINCIPLES:
              print(f'  * {p}')
          print('\nAll four families integrate into the behavioural monitoring gateway (13.11),')
          print('the complete detection system Chapter 14 deploys to production.')

common_mistakes:

  mistake_1:
    description: 'Treating the eleven detectors as independent tools rather than one behavioural layer with shared principles'
    why_it_happens: |
      The chapter built the detectors one at a time, each solving a distinct problem with its own deliverables,
      so they can be perceived as a toolbox of separate detectors to deploy independently. The shared
      principles are easy to miss when each section is read for its specific technique.
    consequence: |
      Deploying the detectors without recognising the shared discipline produces inconsistent quality: one
      detector uses a per-entity baseline and another a global threshold, one has a contamination guard and
      another does not, one respects the state-latency coupling and another queries large state inline. The
      layer works unevenly and degrades where the discipline is absent, and the cross-cutting failures -- a
      missing contamination guard, an inline large-state query -- undermine the families that share the gap.
    correct_approach: |
      Treat the eleven detectors as one behavioural layer governed by the cross-cutting principles -- baseline
      before anomaly, robust statistics, contamination guard, state-latency coupling, decay and reinforcement
      -- applied uniformly across every family. behavioural_detection_audit.py checks the principles as well as
      the families.

  mistake_2:
    description: 'Deploying the behavioural layer as a one-time build without the sustainability maintenance cycle'
    why_it_happens: |
      Once the eleven detectors are built and integrated, the layer works and catches attacks, so it looks
      finished. The maintenance requirements -- drift monitoring, signature updates, edge review,
      recalibration -- feel like optional upkeep rather than essential parts of the system.
    consequence: |
      A behavioural detection system rots without maintenance. The detectors decay as distributions shift, the
      multi-turn family signatures fall behind new attack families, the graph edges drift as infrastructure
      patterns change, and the baselines drift as the legitimate population evolves. The layer that worked at
      deployment silently catches less and less, and the decay is exactly the silent degradation the drift
      monitors detect -- applied to the whole layer.
    correct_approach: |
      Run the maintenance cycle: frequent drift triage and retraining, continuous baseline updates under the
      contamination guard and risk-score decay, and periodic signature, edge, and calibration review. The
      sustainability checklist consolidates these, and treating them as essential keeps the layer current.

  mistake_3:
    description: 'Deploying only some of the four families and assuming the others are covered'
    why_it_happens: |
      Some families are easier or more visibly valuable to build first -- rate limiting and session detection
      have clear, immediate payoff -- and once a few families catch real attacks, the deployment can feel
      adequate. The missing families' attack classes are not visible precisely because nothing detects them.
    consequence: |
      Each family covers an attack class the others cannot: skip the session family and multi-turn escalation
      is invisible; skip the temporal family and rate abuse and detector drift are invisible; skip the entity
      family and account compromise is invisible; skip the graph family and coordinated networks are invisible.
      A deployment missing a family has a structural blind spot for that family's attack class, and the blind
      spot is silent because the deployment has nothing that would reveal it.
    correct_approach: |
      Deploy all four families, each covering its attack class, so the layer sees the request, the session, the
      entity, and the relationships between entities. behavioural_detection_audit.py flags a missing family as a
      coverage gap.

  mistake_4:
    description: 'Confusing the logical architecture of 13.11 with a production-ready deployment'
    why_it_happens: |
      The 13.11 capstone produces a complete logical architecture -- which detector runs at which tier, what the
      hot path reads -- and it looks like a finished system. The production concerns of Chapter 14 can seem like
      details on top of an already-complete build.
    consequence: |
      The logical architecture does not address the production realities: placement behind an API gateway, the
      latency budget at scale, the fail-open versus fail-closed decision when a detector errors, observability,
      and cost. Deploying the logical architecture as if it were production-ready produces a system that works in
      principle but fails on latency, on error handling, or on cost under real load -- the gaps Chapter 14 exists
      to close.
    correct_approach: |
      Treat the behavioural monitoring gateway of 13.11 as the deployment target and take it to production through
      Chapter 14: the architecture patterns, the performance engineering, the failure modes, the observability,
      and the cost optimisation that turn the logical architecture into a production service.

  mistake_5:
    description: 'Forgetting that the behavioural layer sits above and depends on the lower detection layers'
    why_it_happens: |
      The behavioural layer is the most sophisticated and catches the most impressive attacks, so it can be seen
      as the primary or sufficient detection. The dependence on the lower layers -- the per-request gateway that
      produces the event stream -- is easy to lose sight of behind the behavioural layer's capability.
    consequence: |
      The behavioural layer consumes the per-request event stream that the Chapter 12 gateway produces and sits
      above the signature, heuristic, and ML layers. Neglecting the lower layers degrades the event stream the
      behavioural layer depends on and reopens the single-request attacks the lower layers catch, which the
      behavioural layer was never designed to catch. The four layers are a stack, and removing or degrading the
      lower layers undermines the behavioural layer built on them.
    correct_approach: |
      Maintain all four layers as a stack: the signature, heuristic, and ML layers catch the single-request
      attacks and produce the event stream, and the behavioural layer catches the cross-request attacks over that
      stream. The behavioural layer completes the stack but does not replace it.

section_summary:

  what_you_learned: |
    Chapter 13 built the behavioural layer of the detection stack -- the fourth layer above the signature and
    heuristic layers of Chapter 11 and the ML layer of Chapter 12 -- that holds state across requests to catch
    the attacks the per-request gateway is structurally blind to. The layer comprises four signal families
    ordered by the state each holds: the session family (13.02 modelling, 13.09 multi-turn analysis) catches the
    gradual jailbreak in the trajectory across turns; the temporal family (13.03 baselines, 13.04 time-series
    anomaly, 13.05 drift, 13.06 output monitoring) catches rate abuse and the silent decay of the detectors and
    model and the success of an injection in the output; the entity family (13.07 rate-based detection, 13.08
    smart rate limiting, 13.10 profiling) catches the abuse with no per-request signal and makes the requester's
    history a first-class input; and the graph family (13.11) catches the coordinated network invisible at every
    lower level. Across the families recur the principles that are the layer's discipline: baseline before
    anomaly with per-entity references, robust statistics to resist contamination, the contamination guard that
    holds flagged traffic out of state updates, the state-latency coupling that keeps large-state detectors off
    the hot path, and decay and reinforcement that make the risk score fair and effective. The families integrate
    into the behavioural monitoring gateway -- inline summaries, near-real-time detectors, batch graph and drift
    analysis -- made operable by the entity-risk, drift, and coordinated-network dashboard views. The layer is a
    maintained system, not a one-time build: the sustainability requirements keep it from rotting. Chapter 13
    completes the detection engineering of Part 3, and Chapter 14 takes the behavioural monitoring gateway to
    production.

  key_terms:
    - 'Behavioural layer: the fourth detection layer that holds state across requests to catch attacks spanning requests'
    - 'Signal families: session, temporal, entity, and graph -- the four behavioural families ordered by state held'
    - 'Ascending aggregation: request to session to entity to graph, each level revealing attacks invisible below it'
    - 'Baseline before anomaly: every anomaly detector requires an explicit per-entity reference distribution'
    - 'Robust statistics: median and MAD, mandatory because the baseline is computed from traffic containing the attacks'
    - 'Contamination guard: holding flagged traffic out of baseline and state updates to defeat the slow-ramp attack'
    - 'State-latency coupling: large-state detectors run off the hot path and expose cheap summaries read inline'
    - 'Decay and reinforcement: the risk-score dynamics that make it fair to false positives and effective against repeat offenders'
    - 'Behavioural monitoring gateway: the Chapter 12 seven-track gateway with the behavioural layer integrated as the fourth layer'
    - 'Sustainability: the maintenance requirements -- drift monitoring, contamination guard, decay, signature and edge upkeep -- that keep the layer from rotting'

preview_chapter_14:
  title: 'Chapter 14: Production Deployment'
  summary: |
    Chapter 14 closes Part 3 by taking the complete detection system built across Chapters 11, 12, and 13 to
    production. The behavioural monitoring gateway of Chapter 13 is a complete logical architecture -- which
    detector runs at which tier, what the hot path reads -- but not yet a production service, and Chapter 14
    builds the production layer. It covers the deployment architecture patterns -- API gateway, sidecar, inline
    -- that place detection in the request path, the performance engineering that holds the inline tier within a
    sub-50ms latency budget at scale, the integration points for pre-processing and post-processing detection,
    the failure modes and the fail-open versus fail-closed decision that governs what happens when a detector
    errors, the observability stack of metrics, logging, and tracing that operationalises the behavioural
    monitoring dashboard, and the cost optimisation of sampling, caching, and batching that keeps the near-real-
    time and batch tiers affordable. By the end of Chapter 14, the detection system -- signature, heuristic, ML,
    and behavioural -- is a production service deployed behind an API gateway, meeting its latency requirement,
    observable, and cost-bounded, completing Part 3 and setting up Part 4's practical end-to-end implementation.

