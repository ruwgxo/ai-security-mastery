section_overview:
  one_line_summary: 'Chapter 13 built the behavioural layer of the detection stack -- the fourth layer above signature, heuristic, and ML -- that holds state across requests to catch the session, temporal, entity, and graph attacks the per-request gateway is blind to; Section 13.12 synthesises the architecture and previews Chapter 14 production deployment.'
  why_this_section_exists: |
    Chapter 13 built eleven detectors across four behavioural signal families, and this section assembles
    them into the single behavioural monitoring architecture they constitute. Read in isolation, each
    section solves a specific problem -- session modelling, baselines, drift, rate limiting, profiling,
    graphs -- and the connections between them can be lost in the detail. This summary makes the
    architecture whole: it traces the chapter's arc from the per-request gateway of Chapter 12 to the
    complete behavioural layer, shows how the four families compose into a system that sees the request,
    the session, the entity, and the relationships between entities, and consolidates the recurring
    principles -- baseline before anomaly, robust statistics, the contamination guard, the state-latency
    coupling, decay and reinforcement -- that appear across every family.

    It also closes the chapter's place in the book. Chapter 11 built the signature and heuristic layers,
    Chapter 12 built the ML layer, and Chapter 13 built the behavioural layer; together they are the
    complete detection stack of Part 3. The summary states what remains for Chapter 14 -- taking the
    behavioural monitoring gateway to production -- and provides the practitioner the synthesised reference,
    the sustainability checklist for detection that does not rot, the knowledge assessment, and the security
    checklist that turn the chapter into an operable capability.
  position_in_chapter: |
    Section 13.12 is the closing synthesis of Chapter 13, the twelfth and final section. It reviews all
    eleven content sections, presents the behavioural monitoring architecture as a whole, consolidates the
    cross-cutting principles and the common mistakes, and previews Chapter 14. It is the bridge from the
    behavioural detection layer to its production deployment, and the close of Part 3's detection-
    engineering arc across Chapters 11, 12, and 13.

