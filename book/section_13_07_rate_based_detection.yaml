prose_content:

  part_1:
    title: 'Abuse With No Per-Request Signal'
    body: |
      The defining property of rate-based abuse is that there is nothing to detect in any single
      request. Consider an attacker reconstructing a proprietary embedding model's behaviour by querying
      it systematically, or extracting a private knowledge base one reasonable question at a time, or
      enumerating which inputs a content filter blocks. Each individual query is well-formed, on-topic,
      and indistinguishable from legitimate use, because in isolation it is legitimate use. The Chapter
      12 injection classifier finds no injection; the jailbreak classifier finds no jailbreak; the
      anomaly detector finds nothing anomalous about a single ordinary query. Every per-request detector
      passes every query, correctly, because no query is individually an attack.

      The attack is the aggregate. Ten thousand such queries from one entity over a day, systematically
      covering an input space, constitute an exfiltration campaign even though no single query does. The
      signal is in properties that only exist at the aggregate level: the total volume, the rate of
      requests, how that rate accelerates, how regular the intervals are, and how the queries cover the
      space of possible inputs. These are not features of a request; they are features of a sequence of
      requests attributed to an entity. To compute them, the per-request event stream must be aggregated
      by entity over a time window, and the aggregate must be measured.

      This is why rate-based detection belongs to the entity family. The unit of detection is the entity
      over time, not the request and not even the session. The session family of 13.02 caught the
      multi-turn attack within a conversation; rate-based detection catches the campaign across all of an
      entity's activity, which may span thousands of sessions. The shift from request to session to
      entity is a shift in the aggregation unit, and rate-based abuse is the attack that becomes visible
      precisely at the entity-over-time level and nowhere below it.

  part_2:
    title: 'Rate, Acceleration, and the Burst-Versus-Sustained Distinction'
    body: |
      The most basic aggregate feature is the request rate: requests per unit time from an entity,
      scored against that entity's rate baseline from 13.03. A rate far above the entity's baseline is
      the first-order signal. But rate alone is incomplete, because the two main rate-abuse signatures
      differ in their temporal shape, and a detector tuned for one misses the other -- the same
      burst-versus-ramp distinction from 13.04, now applied to the entity's request volume.

      Burst abuse is a sudden high-rate flood: a rapid enumeration that fires thousands of requests in
      minutes. Its signature is high rate and high acceleration -- the rate not only exceeds baseline but
      climbs steeply. Acceleration, the rate of change of the rate, is the distinguishing feature: a
      legitimate increase in usage tends to ramp gently, while a burst attack's rate jumps. Monitoring
      acceleration alongside rate catches the burst at its onset, before the full volume has accumulated.

      Sustained abuse is the opposite: a moderate rate held steadily for a long time, the patient
      exfiltration that never spikes but never stops. Its rate may sit only modestly above baseline --
      low enough to avoid a rate threshold tuned for bursts -- but sustained for hours or days, it
      accumulates an enormous total volume. The signature here is not the instantaneous rate but the
      duration at an elevated rate and the cumulative volume over a long window. A detector that only
      thresholds instantaneous rate misses sustained abuse because no single moment looks extreme; a
      detector that also tracks cumulative volume over a long window and time-at-elevated-rate catches it.
      The rate-based detector therefore monitors rate, acceleration, and cumulative volume together,
      covering both the burst that spikes and the sustained campaign that grinds.

  part_3:
    title: 'Coverage Patterns: Sweeping an Input Space'
    body: |
      Volume and rate measure how much an entity queries; coverage measures what it queries, and
      coverage reveals a signature that rate alone cannot: systematic enumeration. An attacker mapping a
      system's behaviour does not query randomly. They sweep an input space methodically -- iterating
      through a range of inputs, probing each region, covering the space to reconstruct the system's
      responses across it. This systematic coverage is structurally different from legitimate use, which
      clusters around the entity's actual needs and revisits a narrow region repeatedly rather than
      sweeping broadly and uniformly.

      Coverage-pattern detection measures how an entity's queries are distributed across the input space.
      A legitimate user's queries cluster: they return to the same topics, the same endpoints, the same
      regions of input space, because they have a bounded set of real needs. An enumerating attacker's
      queries spread: they cover the space broadly and often uniformly, touching many regions once rather
      than a few regions repeatedly, because their goal is coverage rather than use. The breadth and
      uniformity of coverage is the signal. An entity whose queries suddenly fan out to cover a wide,
      uniformly-sampled region of input space is exhibiting an enumeration signature, regardless of
      whether its raw rate is extreme.

      Coverage detection complements rate detection because the two catch different exfiltration styles.
      A high-rate broad sweep trips both; but a low-and-slow enumeration that keeps its rate modest to
      evade rate thresholds still trips coverage detection, because however slowly it proceeds, its
      queries still fan out systematically across the space. Coverage is the feature that catches the
      patient enumerator who has solved the rate problem by going slow -- the systematic breadth gives
      them away even when the volume does not. The coverage signal feeds the same entity rate score and
      the user profile, adding the what-they-query dimension to the how-much-they-query dimension.

  part_4:
    title: 'Periodicity: The Automation Signature'
    body: |
      A distinct and high-value aggregate feature is periodicity: the regularity of the intervals between
      an entity's requests. Human use is irregular. People pause to read, to think, to do something else,
      and the intervals between their requests vary widely and unpredictably. Automated use is regular. A
      script issues requests on a timer or in a tight loop, and the intervals between its requests are
      strikingly consistent -- the same gap, repeated, because a machine does not pause to think. This
      regularity is a signature of automation that is hard for an attacker to disguise without
      sacrificing the throughput that automation provides.

      Periodicity detection measures the consistency of an entity's inter-request intervals. A low
      variance in the intervals -- requests arriving like clockwork at a near-constant spacing -- is the
      automation signature. The measure is the coefficient of variation of the intervals or a
      spectral/autocorrelation analysis that detects a dominant period: a strong peak at a particular
      interval means the entity is firing on that period, which humans do not do. The periodicity signal
      is valuable because it separates automated abuse from heavy-but-human use: a power user who
      legitimately makes many requests does so irregularly, with the natural variation of human activity,
      while an exfiltration script makes its requests on a regular cadence. Two entities with the same
      high request rate can be distinguished by periodicity -- the regular one is automated, the irregular
      one is plausibly a busy human.

      Periodicity has a subtlety: a sophisticated attacker can add jitter, randomising the intervals to
      mimic human irregularity. This raises the attacker's cost -- jitter reduces throughput and
      complicates the automation -- but it can defeat a naive periodicity detector that looks only for
      near-constant intervals. The robust response is to look for structure beyond simple regularity:
      even jittered automation often retains a detectable periodic component, a burst-and-pause rhythm, or
      a coverage pattern that betrays the underlying script. Periodicity is one signal among several, and
      it is strongest in combination with the rate, acceleration, and coverage features rather than relied
      on alone, since each can be individually evaded but evading all of them simultaneously is expensive.

  part_5:
    title: 'Distributed Abuse: The Campaign Across Many Accounts'
    body: |
      Per-account rate detection invites an obvious counter-move, and the sophisticated adversary takes
      it: distribute the campaign across many accounts so that each account stays under the per-account
      threshold and the aggregate attack is reassembled from individually compliant accounts. If the
      per-account limit is a thousand requests an hour, the attacker uses fifty accounts at nine hundred
      requests an hour each, and every account is individually within bounds while the campaign runs at
      forty-five thousand requests an hour. Per-account detection sees fifty compliant accounts and
      nothing wrong.

      Detecting distributed abuse requires aggregating above the account. The campaign that is invisible
      per account becomes visible when the accounts are considered together, and the key is to find the
      shared attribute that links them. Distributed campaigns typically share something: a source IP or
      IP range, a credential or API key family, a creation-time cohort, a behavioural fingerprint, or a
      coverage pattern that, combined across accounts, sweeps the input space the way a single enumerator
      would. Aggregating the rate signal per source, per credential, and per behavioural cluster -- not
      only per account -- surfaces the campaign whose total rate is anomalous even though no member
      account's rate is.

      This is where the entity family begins to point toward the graph family. Distributed-abuse
      detection by shared attribute is a coarse, attribute-keyed version of the relationship analysis that
      13.11 develops fully: linking accounts by shared infrastructure and synchronised behaviour to find
      the coordinated network. Rate-based detection handles the cases where a single shared attribute --
      a common source, a common credential family -- reassembles the campaign, and hands the harder cases,
      where the linkage is structural rather than a single shared field, to the graph detector. The rate-
      based view of distributed abuse is the aggregate rate across a linking attribute; the graph view is
      the full relationship structure. Together they cover the distributed campaign from the simple shared-
      source case to the sophisticated structurally-coordinated one.

  part_6:
    title: 'The Handoff to Smart Rate Limiting'
    body: |
      Rate-based detection produces a signal; it does not, by itself, act on it. The action -- throttling,
      challenging, or blocking the abusive entity -- is the job of the smart rate limiter in 13.08, and the
      relationship between the two sections is the organising handoff of this part. Detection sets the
      adaptive threshold; enforcement applies it.

      The handoff matters because the alternative -- a static rate limit applied without detection -- fails
      in the ways the next section opens with. A static limit set globally is simultaneously too loose for
      the low-and-slow campaign that stays under it and too tight for the legitimate power user that
      exceeds it. The detection built in this section is what makes the limit adaptive: the per-entity rate
      baseline defines what is normal for each entity, the rate, acceleration, coverage, and periodicity
      signals identify which entities are abusing, and these together set a per-entity adaptive threshold
      that the limiter enforces. An entity whose rate, periodicity, and coverage all indicate automated
      enumeration gets a tight limit; a legitimate power user with an irregular, clustered, human pattern
      keeps a loose one, even at the same raw rate.

      The detection signal also flows beyond the limiter. It feeds the user profile of 13.10, where a
      history of rate-abuse signals contributes to the entity's persistent risk score, so that an entity
      with a record of enumeration is scored more suspiciously on future activity. And the distributed-
      abuse linkage feeds the graph detector of 13.11. Rate-based detection is thus both the producer of an
      enforcement threshold for the next section and a contributor to the entity and graph families that
      follow. Its output is a per-entity rate-abuse signal -- composed from rate, acceleration, coverage,
      and periodicity, aggregated per account and per linking attribute -- that is the input to enforcement,
      profiling, and graph analysis alike.

