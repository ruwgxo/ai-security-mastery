section_overview:
  one_line_summary: 'Exfiltration and enumeration campaigns have no per-request signal -- every query is benign and the entire signal is in the aggregate rate and pattern over time; Section 13.07 builds the rate, periodicity, coverage, and distributed-abuse detectors that see this class, and produces the signal the adaptive rate limiter of 13.08 acts on.'
  why_this_section_exists: |
    Section 13.07 opens the entity family with the attack class that most cleanly demonstrates why
    behavioural detection exists: abuse that has no per-request signal at all. The Chapter 12
    classifiers score each request, and for an exfiltration campaign there is nothing to score -- every
    individual query is a reasonable, well-formed, benign request. The attacker reconstructing a
    proprietary dataset issues ten thousand queries that each look exactly like legitimate use, because
    each one is legitimate use in isolation. The attack exists only in the aggregate: the volume, the
    rate, the periodicity, and the systematic coverage of an input space. No per-request detector can
    see it, because the signal is not in any request.

    This is the purest case of the taxonomy's central claim. Section 13.01 argued that some attacks
    live entirely in the relationship between requests; rate-based abuse is the canonical example. The
    entity issuing the queries is behaving abnormally only when its requests are considered together,
    over time, as a pattern. Detecting it requires aggregating the per-request event stream by entity
    and measuring properties of the aggregate -- rate, acceleration, periodicity, coverage -- that have
    no meaning for a single request.

    The section also handles the adversary's counter-move. Once per-account rate limits exist, the
    sophisticated attacker distributes the campaign across many accounts, each staying under the
    per-account limit, so the aggregate attack is reassembled from individually compliant accounts.
    Detecting distributed abuse requires aggregating not just per account but per credential and per
    source, looking for the campaign that is invisible at every individual account and visible only when
    the accounts are considered together -- which begins to point toward the graph family of 13.11.
  position_in_chapter: |
    Section 13.07 is the first of the entity-family sections, following the temporal and output-
    monitoring work and preceding the adaptive rate limiter of 13.08 that enforces against the signal it
    produces. It consumes the per-request event stream and the per-entity baselines of 13.03, feeds the
    rate features into the user profile of 13.10, and surfaces the cross-account patterns that the graph
    detector of 13.11 develops. The relationship to 13.08 is the section's organising handoff: rate-based
    detection produces the signal, smart rate limiting acts on it -- detection sets the adaptive
    threshold, enforcement applies it.

