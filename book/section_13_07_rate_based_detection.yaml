deliverables:

  deliverable_1:
    title: 'Rate-Based Detector'
    filename: 'rate_based_detector.py'
    description: 'Aggregates the per-request event stream by entity over sliding windows and computes rate, acceleration, and cumulative volume, scoring against the per-entity baseline to detect both burst and sustained abuse. Implements the rate and acceleration detection from Section 13.07 Parts 1 and 2.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # rate_based_detector.py
      # Section 13.07: Rate-Based Detector (Rate, Acceleration, Volume)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from collections import deque
      from dataclasses import dataclass, field
      from typing import Deque, Dict, List, Tuple


      @dataclass
      class RateWindow:
          window_s: float
          timestamps: Deque[float] = field(default_factory=deque)

          def add(self, ts: float) -> None:
              self.timestamps.append(ts)
              self._evict(ts)

          def _evict(self, now: float) -> None:
              while self.timestamps and now - self.timestamps[0] > self.window_s:
                  self.timestamps.popleft()

          def rate(self, now: float) -> float:
              self._evict(now)
              return len(self.timestamps) / (self.window_s / 60.0)  # per minute


      @dataclass
      class EntityRateState:
          short: RateWindow
          long: RateWindow
          prev_rate: float = 0.0
          cumulative: int = 0


      @dataclass
      class RateVerdict:
          rate_per_min: float
          acceleration: float
          cumulative: int
          burst: bool
          sustained: bool


      class RateBasedDetector:
          def __init__(self, baseline_rate_per_min: float, short_s: float = 60, long_s: float = 3600) -> None:
              self.baseline = baseline_rate_per_min
              self.short_s = short_s
              self.long_s = long_s
              self.states: Dict[str, EntityRateState] = {}

          def _state(self, entity: str) -> EntityRateState:
              if entity not in self.states:
                  self.states[entity] = EntityRateState(RateWindow(self.short_s), RateWindow(self.long_s))
              return self.states[entity]

          def observe(self, entity: str, ts: float) -> RateVerdict:
              st = self._state(entity)
              st.short.add(ts)
              st.long.add(ts)
              st.cumulative += 1

              rate = st.short.rate(ts)
              accel = rate - st.prev_rate
              st.prev_rate = rate

              long_rate = st.long.rate(ts)
              burst = rate > 5 * self.baseline and accel > 2 * self.baseline
              # sustained: long-window rate elevated and large cumulative volume
              sustained = long_rate > 1.5 * self.baseline and st.cumulative > 500

              return RateVerdict(round(rate, 2), round(accel, 2), st.cumulative, burst, sustained)


      if __name__ == '__main__':
          det = RateBasedDetector(baseline_rate_per_min=2.0)
          base = 1_000_000.0

          # Burst: 100 requests in 30 seconds
          last = None
          for i in range(100):
              last = det.observe('user_burst', base + i * 0.3)
          print('Burst entity:', last)

          # Sustained: steady modest rate over a long period, high volume
          det2 = RateBasedDetector(baseline_rate_per_min=2.0)
          last2 = None
          for i in range(600):
              last2 = det2.observe('user_sustained', base + i * 6.0)  # ~10/min for an hour
          print('Sustained entity:', last2)
          print('Burst trips on rate+acceleration; sustained trips on long-window rate+volume.')

  deliverable_2:
    title: 'Coverage Pattern Detector'
    filename: 'coverage_pattern_detector.py'
    description: 'Detects systematic input-space enumeration by measuring the breadth and uniformity of an entity coverage across input-space buckets, distinguishing a methodical sweep from the clustered pattern of legitimate use. Implements the coverage-pattern detection from Section 13.07 Part 3.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only; input-space position is abstracted as a bucket id supplied per request'
    code: |
      # coverage_pattern_detector.py
      # Section 13.07: Coverage Pattern Detector (Enumeration Sweep)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      import math
      from collections import Counter
      from dataclasses import dataclass, field
      from typing import Dict, List


      @dataclass
      class CoverageState:
          bucket_counts: Counter = field(default_factory=Counter)
          total: int = 0

          def add(self, bucket_id: int) -> None:
              self.bucket_counts[bucket_id] += 1
              self.total += 1


      @dataclass
      class CoverageVerdict:
          distinct_buckets: int
          breadth: float        # fraction of space covered
          uniformity: float     # normalised entropy of the coverage
          enumeration_suspected: bool


      class CoveragePatternDetector:
          def __init__(self, space_size: int, breadth_threshold: float = 0.5, uniformity_threshold: float = 0.85) -> None:
              self.space_size = space_size
              self.breadth_threshold = breadth_threshold
              self.uniformity_threshold = uniformity_threshold
              self.states: Dict[str, CoverageState] = {}

          def observe(self, entity: str, bucket_id: int) -> CoverageVerdict:
              st = self.states.setdefault(entity, CoverageState())
              st.add(bucket_id)

              distinct = len(st.bucket_counts)
              breadth = distinct / self.space_size
              # normalised entropy: 1.0 = perfectly uniform coverage (sweep signature)
              if distinct > 1:
                  probs = [c / st.total for c in st.bucket_counts.values()]
                  entropy = -sum(p * math.log(p) for p in probs)
                  uniformity = entropy / math.log(distinct)
              else:
                  uniformity = 0.0

              suspected = breadth > self.breadth_threshold and uniformity > self.uniformity_threshold
              return CoverageVerdict(distinct, round(breadth, 3), round(uniformity, 3), suspected)


      if __name__ == '__main__':
          # Legitimate user: returns to a few buckets repeatedly (clustered)
          legit = CoveragePatternDetector(space_size=100)
          import random
          random.seed(5)
          last_l = None
          for _ in range(200):
              last_l = legit.observe('user_legit', random.choice([3, 4, 5, 4, 3, 7]))
          print('Legitimate (clustered):', last_l)

          # Enumerator: sweeps the space uniformly and broadly
          enum = CoveragePatternDetector(space_size=100)
          last_e = None
          for b in range(100):
              last_e = enum.observe('user_enum', b)  # one query per bucket -- uniform sweep
          print('Enumerator (sweep):    ', last_e)
          print('The enumerator trips on high breadth and near-uniform coverage,')
          print('even though its per-request rate may be modest.')

  deliverable_3:
    title: 'Periodicity Analyser'
    filename: 'periodicity_analyser.py'
    description: 'Analyses the regularity of an entity inter-request intervals to detect the automation signature, using the coefficient of variation and a simple dominant-period check, robust to mild jitter. Implements the periodicity detection from Section 13.07 Part 4.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # periodicity_analyser.py
      # Section 13.07: Periodicity Analyser (Automation Signature)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      def _mean(values: List[float]) -> float:
          return sum(values) / len(values) if values else 0.0


      def _std(values: List[float]) -> float:
          if len(values) < 2:
              return 0.0
          m = _mean(values)
          return (sum((v - m) ** 2 for v in values) / (len(values) - 1)) ** 0.5


      @dataclass
      class PeriodicityVerdict:
          n_intervals: int
          mean_interval: float
          cv: float                 # coefficient of variation
          automation_suspected: bool
          detail: str


      def analyse_periodicity(timestamps: List[float], cv_threshold: float = 0.25) -> PeriodicityVerdict:
          if len(timestamps) < 5:
              return PeriodicityVerdict(0, 0.0, 0.0, False, 'insufficient data')
          ts = sorted(timestamps)
          intervals = [ts[i] - ts[i - 1] for i in range(1, len(ts))]
          m = _mean(intervals)
          cv = (_std(intervals) / m) if m > 0 else 0.0
          # Low CV = clockwork regularity = automation signature
          suspected = cv < cv_threshold
          detail = f'mean interval {m:.2f}s, CV {cv:.3f}'
          return PeriodicityVerdict(len(intervals), round(m, 3), round(cv, 3), suspected, detail)


      if __name__ == '__main__':
          import random
          random.seed(8)
          base = 1000.0

          # Automated script: near-constant 5s interval (tiny jitter)
          script = [base + i * 5.0 + random.uniform(-0.1, 0.1) for i in range(60)]
          print('Automated script: ', analyse_periodicity(script))

          # Human: highly irregular intervals
          human_ts = [base]
          for _ in range(60):
              human_ts.append(human_ts[-1] + random.uniform(2, 90))
          print('Human user:       ', analyse_periodicity(human_ts))
          print('The script low CV is the automation signature; the human high CV is not.')

  deliverable_4:
    title: 'Distributed Abuse Detector'
    filename: 'distributed_abuse_detector.py'
    description: 'Aggregates rate across accounts by shared linking attributes (source, credential, cohort) to surface a distributed campaign whose total rate is anomalous even though no member account exceeds its per-account limit. Implements the distributed-abuse detection from Section 13.07 Part 5.'
    implementation_notes: 'Python 3.12, single quotes throughout per book convention, standard library only'
    code: |
      # distributed_abuse_detector.py
      # Section 13.07: Distributed Abuse Detector (Cross-Account Aggregation)
      # 20260621 | AI Security Mastery -- Chapter 13 by Raghav Dinesh
      # Single quotes throughout per book convention

      from collections import defaultdict
      from dataclasses import dataclass, field
      from typing import Dict, List, Set, Tuple


      @dataclass
      class AccountRequest:
          account_id: str
          source_ip: str
          credential_family: str
          rate_per_min: float


      @dataclass
      class CampaignVerdict:
          linking_attribute: str
          linking_value: str
          member_accounts: int
          aggregate_rate: float
          per_account_max: float
          campaign_suspected: bool


      class DistributedAbuseDetector:
          def __init__(self, per_account_limit: float, campaign_multiplier: float = 3.0) -> None:
              self.per_account_limit = per_account_limit
              self.campaign_multiplier = campaign_multiplier

          def detect(self, requests: List[AccountRequest]) -> List[CampaignVerdict]:
              verdicts = []
              for attr_name, key in (('source_ip', lambda r: r.source_ip), ('credential_family', lambda r: r.credential_family)):
                  groups: Dict[str, List[AccountRequest]] = defaultdict(list)
                  for r in requests:
                      groups[key(r)].append(r)
                  for value, members in groups.items():
                      accounts = {m.account_id for m in members}
                      agg_rate = sum(m.rate_per_min for m in members)
                      per_acct_max = max(m.rate_per_min for m in members)
                      # Campaign: each account compliant, aggregate far over the limit
                      suspected = (
                          per_acct_max <= self.per_account_limit
                          and agg_rate > self.campaign_multiplier * self.per_account_limit
                          and len(accounts) >= 3
                      )
                      if suspected:
                          verdicts.append(CampaignVerdict(
                              attr_name, value, len(accounts),
                              round(agg_rate, 1), round(per_acct_max, 1), True,
                          ))
              return verdicts


      if __name__ == '__main__':
          limit = 100.0
          # 5 accounts, each at 90/min (under the 100 limit), all from one source range
          reqs = [AccountRequest(f'acct_{i}', '203.0.113.10', 'keyfam_A', 90.0) for i in range(5)]
          # plus some unrelated legitimate accounts
          reqs += [AccountRequest('acct_x', '198.51.100.4', 'keyfam_B', 30.0)]

          det = DistributedAbuseDetector(per_account_limit=limit)
          for v in det.detect(reqs):
              print(f'Campaign on {v.linking_attribute}={v.linking_value}: '
                    f'{v.member_accounts} accounts, aggregate {v.aggregate_rate}/min, '
                    f'per-account max {v.per_account_max}/min (limit {limit})')
          print('Each account is under the per-account limit, but the aggregate over')
          print('the shared source reveals the distributed campaign.')

common_mistakes:

  mistake_1:
    description: 'Relying on per-request detection for exfiltration and enumeration, which have no per-request signal'
    why_it_happens: |
      The Chapter 12 per-request classifiers are the primary detection investment, and they catch the
      attacks that have a per-request signal well. It is easy to assume they cover all attacks, and an
      exfiltration campaign of benign-looking queries does not obviously announce that it needs a
      different detection layer.
    consequence: |
      Exfiltration and enumeration consist of individually benign queries -- each is well-formed,
      on-topic, and legitimate in isolation -- so every per-request detector passes every query
      correctly. The attack exists only in the aggregate volume, rate, and coverage, which no per-request
      detector computes. The entire class of rate-based abuse is invisible, and the system has no idea it
      is being systematically queried to reconstruct a model or extract a dataset.
    correct_approach: |
      Aggregate the per-request event stream by entity over time and detect on the aggregate features --
      rate, acceleration, cumulative volume, coverage, periodicity -- that only exist at the entity-over-
      time level. rate_based_detector.py and coverage_pattern_detector.py compute these aggregate signals
      that per-request detection structurally cannot.

  mistake_2:
    description: 'Thresholding only the instantaneous rate, missing both the sustained slow campaign and the burst onset'
    why_it_happens: |
      Instantaneous request rate is the obvious rate feature, and a single threshold on it is simple to
      configure. It catches the loud high-rate floods, which are the most visible rate abuse, so it feels
      like adequate rate detection.
    consequence: |
      The two main rate-abuse signatures both evade an instantaneous-rate threshold. The sustained slow
      campaign keeps its rate modestly above baseline -- below a threshold tuned for floods -- but runs for
      hours, accumulating an enormous total volume that the instantaneous rate never reflects. And a burst
      is caught only after its volume has accumulated, not at onset, because the threshold reacts to rate,
      not its rate of change. The detector catches the obvious flood and misses the patient campaign and
      the early burst.
    correct_approach: |
      Monitor rate, acceleration, and cumulative volume together. Acceleration catches the burst at onset
      before the full volume accumulates; cumulative volume over a long window catches the sustained
      campaign that never spikes. rate_based_detector.py tracks all three so both burst and sustained abuse
      are covered.

  mistake_3:
    description: 'Treating a high request rate as proof of abuse and throttling legitimate power users'
    why_it_happens: |
      High rate is the most intuitive abuse signal, and an entity making far more requests than average
      looks suspicious. Acting on rate alone is the straightforward response, and it does catch real abuse.
    consequence: |
      Legitimate power users -- heavy integrations, batch consumers, busy analysts -- make many requests
      at a high rate as a matter of normal operation. Treating rate alone as abuse throttles them, breaking
      legitimate high-volume use to defend against abuse, and floods the alert stream with false positives
      on the system's best customers. Rate without context cannot distinguish the power user from the
      exfiltration script.
    correct_approach: |
      Combine rate with the features that distinguish automated abuse from human heavy use: periodicity
      (the script regular, the human irregular) and coverage (the enumerator broad sweep, the user clustered
      pattern). Two entities at the same rate are distinguished by these -- the regular, broad-sweeping one
      is abuse, the irregular, clustered one is a power user. periodicity_analyser.py and
      coverage_pattern_detector.py provide the distinguishing context.

  mistake_4:
    description: 'Applying only per-account rate detection, leaving distributed campaigns across many accounts undetected'
    why_it_happens: |
      Per-account rate limiting and detection is the standard, well-understood approach, and it works
      against the unsophisticated attacker using one account. Once per-account detection is in place, the
      rate problem feels solved.
    consequence: |
      The sophisticated adversary distributes the campaign across many accounts, each staying under the
      per-account threshold, so the aggregate attack is reassembled from individually compliant accounts.
      Per-account detection sees a set of compliant accounts and nothing wrong, while the campaign runs at
      many times the per-account limit in total. The per-account approach is exactly the constraint the
      distributed attack is designed to satisfy.
    correct_approach: |
      Aggregate the rate signal above the account -- per source, per credential family, per cohort -- to
      surface the campaign whose total rate is anomalous even though no member account exceeds its limit.
      distributed_abuse_detector.py aggregates by shared linking attributes, and the harder structurally-
      coordinated cases hand off to the graph detector of 13.11.

  mistake_5:
    description: 'Building a naive periodicity detector that looks only for near-constant intervals and is defeated by simple jitter'
    why_it_happens: |
      The cleanest automation signature is a perfectly regular interval, and a detector that flags
      near-constant spacing catches the unsophisticated script. It is the most direct implementation of the
      periodicity idea and works against naive automation.
    consequence: |
      A sophisticated attacker adds jitter -- randomising the intervals to mimic human irregularity -- which
      defeats a detector that looks only for near-constant spacing. The jittered script passes the
      periodicity check while still operating as automation, and a periodicity detector relied on alone is
      evaded by a cheap modification.
    correct_approach: |
      Treat periodicity as one signal among several rather than a sole detector, and look for structure
      beyond simple regularity -- a dominant periodic component, a burst-and-pause rhythm, or a coverage
      pattern that persists despite jitter. Each individual signal can be evaded, but evading rate,
      acceleration, coverage, and periodicity simultaneously is expensive, so the composite is robust where
      any single feature is not. periodicity_analyser.py contributes to the composite rather than standing
      alone.

section_summary:

  compact: |
    Rate-based abuse is the purest case of an attack with no per-request signal: exfiltration and
    enumeration campaigns consist of individually benign queries, and the entire signal lives in the
    aggregate rate, acceleration, cumulative volume, coverage, and periodicity that only exist when the
    per-request event stream is aggregated by entity over time. Section 13.07 opens the entity family by
    building these aggregate detectors. Rate and acceleration catch the burst at onset; cumulative volume
    over a long window catches the sustained slow campaign that never spikes. Coverage-pattern detection
    catches systematic input-space enumeration -- the broad, uniform sweep that distinguishes an enumerator
    from the clustered pattern of legitimate use -- and catches the patient enumerator who keeps rate modest
    to evade rate thresholds. Periodicity detection identifies the automation signature in regular inter-
    request intervals, distinguishing an exfiltration script from a heavy-but-human power user at the same
    rate, though it must be combined with the other features to resist jitter. Distributed-abuse detection
    aggregates above the account -- per source, per credential, per cohort -- to reassemble the campaign
    spread across many individually-compliant accounts, pointing toward the graph family. The composite
    rate-abuse signal feeds the user profile of 13.10, the graph detector of 13.11, and above all the
    adaptive rate limiter of 13.08: detection sets the per-entity adaptive threshold, enforcement applies it.

  key_takeaways:
    - 'Exfiltration and enumeration have no per-request signal: every query is individually benign and the entire attack lives in the aggregate rate, volume, coverage, and periodicity computed per entity over time'
    - 'Rate and acceleration catch the burst at onset while cumulative volume over a long window catches the sustained slow campaign -- thresholding instantaneous rate alone misses both the slow campaign and the early burst'
    - 'Coverage-pattern detection catches systematic enumeration through the broad, uniform sweep that distinguishes an enumerator from the clustered pattern of legitimate use, even when rate is kept modest'
    - 'Periodicity is the automation signature -- regular intervals are a script tell humans do not produce -- and it distinguishes an exfiltration script from a heavy-but-human power user at the same rate'
    - 'Per-account detection invites distribution across many compliant accounts, so detection must aggregate above the account by source, credential, and cohort to reassemble the campaign, pointing toward the graph family'
    - 'Rate-based detection and rate limiting are a detection-enforcement pair: detection composes the per-entity rate-abuse signal and sets the adaptive threshold, and the smart rate limiter of 13.08 applies it'

preview_section_13_08:
  title: 'Section 13.08: Smart Rate Limiting -- Adaptive Thresholds That Separate Power Users from Abuse'
  summary: |
    Section 13.08 takes the rate-abuse signal produced here and turns it into enforcement, building the
    adaptive rate limiter that a static limit cannot match. It opens with why a static limit is
    simultaneously too loose for low-and-slow abuse and too tight for legitimate power users, and replaces
    it with per-entity thresholds learned from the 13.03 baseline. It builds burst tolerance through a
    token-bucket model with per-entity refill rates, risk-weighted limiting that tightens limits for
    entities with elevated risk profiles from 13.10, graduated response -- throttle, challenge, block -- as
    escalating enforcement with a false-positive recovery path rather than a single hard cutoff, and
    rate-limit composition across user, endpoint, credential, and source. It addresses the denial-of-
    service own-goal of a limiter an adversary can trip on behalf of a legitimate user, and closes the
    feedback loop where enforcement outcomes feed back into the entity risk profile.

