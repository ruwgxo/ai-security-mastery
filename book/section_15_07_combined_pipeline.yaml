section_overview:
  one_line_summary: |-
    The chapter stops building detectors and starts orchestrating them: because all five implement the unified API of Section 15.01, the pipeline runs them uniformly -- in parallel where the latency budget demands and sequentially where one gates the rest -- combines their verdicts into one pipeline verdict, and places into the Chapter 14 gateway as the detector suite that gateway was built to deploy, with configuration management and a testing framework that treat the suite as one system.
  why_this_section_exists: |-
    Sections 15.02 through 15.06 built five detectors, and each one passed the quality bar in isolation. That is necessary and it is not sufficient, because five individually-correct detectors are not a detection capability. They are five things that each need calling, each need a latency allowance, each need a failure policy, and each produce a separate verdict that somebody has to reconcile. A production system does not want five answers; it wants one decision about one request. This section produces that decision.

    It is also where the promise made in Section 15.01 gets paid. The unified API was introduced there with an argument: define one contract, detect(ctx) -> DetectorResult, and the pipeline can orchestrate every detector without knowing anything about how any of them works. That claim is either true here or it was never worth making. It turns out to be true, and visibly so: the pipeline in this section contains no injection logic, no NER, no canary handling, no hosted-service failure code. It calls detect and reads DetectorResult, and that is the whole of its knowledge about five detectors that internally could not be more different. Finally, this section closes the arc that opened Chapter 14. That chapter deployed a gateway with hooks and nothing in them. This section fills them, turning the deployed-but-empty gateway into a populated, detecting production system.
  position_in_chapter: |-
    Section 15.07 is the capstone of Chapter 15 and the join between Part 3 and Part 4. It orchestrates the five detectors of 15.02-15.06 through the contract of 15.01, and it places the result into the Chapter 14 Section 14.11 gateway. Everything after it is synthesis (15.08) or integration with the wider security stack (Chapter 16). It is the point at which the chapter deliverables stop being a collection and become a system.
learning_objectives:
  knowledge:
  - Explain why five individually-passing detectors are not yet a detection capability
  - Explain how the unified API functions as the orchestration contract and what the pipeline does not
    need to know
  - Describe parallel versus sequential detector execution and when each is correct
  - Explain why the pipeline verdict is the most severe detector verdict rather than a vote or an average
  - Explain why the deciding detector confidence is propagated and what downstream consumers do with it
  - Describe how the pipeline places into the Chapter 14 gateway hooks and why it registers as one unit
    rather than five
  - Explain what suite-level configuration management and end-to-end testing catch that per-detector versions
    cannot
  skills:
  - Orchestrate detectors through a shared contract without coupling to their internals
  - Run independent detectors in parallel and gating detectors sequentially, with short-circuiting on
    a block
  - Filter detectors by surface so the latency budget is not spent on detectors that cannot fire
  - Isolate detector faults so one broken detector cannot take the pipeline down, and record the result
    as degraded
  - Combine detector verdicts into one pipeline verdict with a defensible rule
  - Manage configuration across a whole suite with validation, inspection, and change reporting
  - Test an assembled pipeline end to end, including which detector decided each case
  security_mindset:
  - Internalise that detectors answer different questions, so a clean scan is not a vote against another
    detector finding
  - Recognise that a degraded pipeline must be known to be degraded rather than silently reporting a clean
    verdict it cannot support
  - 'Understand that detection configuration is security-relevant: a quietly loosened threshold is an
    attack surface, so changes are reported rather than discovered'
  - Appreciate that the assembled pipeline is the thing that ships, so it is the thing that must meet
    the quality bar -- per-detector passes do not add up to a suite pass
