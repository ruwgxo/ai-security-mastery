prose_content:
  part_1:
    title: Five Detectors Are Not a Detection Capability
    body: |-
      At the end of Section 15.06 the chapter had five detectors, each passing the quality bar, each implementing the same contract. What it did not have was anything that could make a decision about a request. Five detectors are five things to call, five latency allowances to reconcile against one budget, five failure modes to handle, and five verdicts that somebody has to turn into one answer. A production system asks a single question -- do I allow this request? -- and a pile of detectors does not answer it.

      This is the same gap the chapter has crossed twice before, one level up each time. Chapter 14 argued that a correct architecture is not a running service. Section 15.01 argued that a deployed gateway is not a populated one. This section argues that a set of correct detectors is not a detection capability. In each case the missing thing is the assembly, and the assembly is real work with its own failure modes. The pipeline built here does that work: it decides which detectors apply to this surface, runs them within one shared latency budget, isolates their failures from each other, combines their verdicts into one, and presents the result as a single decision with a single explanation. That is the artifact a production system can actually use.
  part_2:
    title: The Unified API as the Orchestration Contract
    body: |-
      Section 15.01 made a promise about the unified API: define one contract and the pipeline can orchestrate every detector without knowing how any of them works. This section is where that promise is either kept or exposed as decoration, so it is worth being concrete about what the pipeline does not contain. It has no injection patterns and no classifier calls. It has no NER, no Luhn checksum, no severity tiers. It has no hosted-service client and no fail-open logic for one. It has no canary registry and no rate or coverage analysis. All of that lives inside the five detectors, and the pipeline is entirely ignorant of it.

      What the pipeline has instead is one method call and one return type. It builds a DetectionContext, calls detect on each applicable detector, and reads back a DetectorResult with a verdict, a score, a confidence, a latency, and evidence. Five detectors that internally could not be more different -- regex plus a transformer, regex plus NER, a bought hosted service plus a custom model, rules plus canaries plus session statistics -- are indistinguishable to the pipeline, which is exactly the point. The practical consequence is that the suite is extensible: a sixth detector is a class implementing detect, and no orchestration code changes to accommodate it. The contract was worth defining because this is what it bought.
  part_3:
    title: Parallel and Sequential Execution Inside One Budget
    body: |-
      The Chapter 14 Section 14.04 budget gives the whole inline path under fifty milliseconds. Five detectors run one after another would spend the sum of their latencies against a budget that only allows for one of them, so serial execution is not an option. The pipeline runs the independent detectors in parallel, which changes the arithmetic completely: the cost of the parallel pass is the slowest detector, not the sum of all of them. That single decision is what makes a five-detector suite fit inside a budget sized for far less.

      Not every detector should be parallel, though, and the pipeline supports both modes for a reason. A detector runs sequentially when it gates the rest -- when its verdict makes the others pointless. Prompt injection is the clearest case: if the input is a confirmed injection, the request is blocked and there is no value in spending the budget asking whether it also contained PII or toxicity. So the sequential pass runs first, and a block there short-circuits the whole pipeline, returning immediately and spending almost none of the budget. The demonstration shows this directly: the clean input runs four detectors, while the injection runs one and returns in a fraction of the time. Short-circuiting is not just an optimisation but a load-shedding property -- under attack, the pipeline gets cheaper rather than more expensive, which is exactly the right direction.

      The pipeline also filters by surface before running anything. The exfiltration detector is output-only and will return ALLOW on any input by construction; the injection detector has nothing to say about a response. Running them anyway would spend real budget on a foregone conclusion, so each detector registers the surfaces it scans and the pipeline calls only those that apply. The result is that an input request runs four detectors and an output runs three, with no wasted work.
  part_4:
    title: 'Combining Verdicts: Why the Most Severe, Not a Vote'
    body: |-
      Five verdicts have to become one, and the temptation is to treat this as an ensemble problem -- take a vote, average the scores, weight by confidence. That would be wrong, and understanding why is the most important idea in this section. The five detectors are not five opinions about one question. They are five answers to five different questions: was this an injection, was this a jailbreak, did this leak PII, was this toxic, did data exfiltrate. When the injection detector says block and the PII scanner says allow, the scanner is not disagreeing. It is answering a different question, correctly, and its answer is not evidence against the injection detector finding. Averaging would let four detectors that correctly found nothing outvote the one that correctly found an attack, which is an absurd outcome dressed up as sophistication.

      So the rule is simple and conservative: the pipeline verdict is the most severe verdict any detector returned. One block is a block, however many other detectors were clean. Among detectors sharing the most severe verdict, the deciding detector is the highest-scoring one, and the pipeline reports that detector confidence rather than any aggregate. This matters because the confidences in this suite are not interchangeable. Section 15.06 built a canary signal that reports near-total confidence because it is proof of extraction, and a rate-based campaign signal that reports moderate confidence because it is a statistical judgement that can be wrong about an unusual workload. Both may block. A downstream triage queue should treat them very differently, and it can only do so if the pipeline propagates the deciding detector confidence rather than blending it into something meaningless. One further subtlety: when nothing fires, the pipeline reports no deciding detector at all, because naming one would imply a detector drove a verdict when in fact every detector simply answered its own question with no.
  part_5:
    title: Placing the Pipeline in the Part 3 Gateway
    body: |-
      Chapter 14 Section 14.11 ended with a gateway that had PRE and POST hooks, a latency budget, a failure policy, a circuit breaker, sampling, and observability -- and toy detectors in the hooks, functions taking a string and returning a bool. Section 15.01 called that gateway deployed and empty and said Part 4 would fill it. This is where that happens. The input-side detectors run at the pre-processing hook, so a block prevents the model call entirely; the output-side detectors run at the post-processing hook, on the response about to be returned. The pipeline builds a DetectionContext with the surface matching the hook, runs the applicable detectors, and adapts its rich PipelineResult down to the boolean the gateway contract expects.

      Two decisions about that placement are worth stating. First, the pipeline registers as one gateway detector per hook rather than five, so the suite gets one timeout and one circuit breaker and the gateway treats the whole detection capability as a single unit. That is intentional: the pipeline is the unit of detection, and its internal parallelism is its own business, not something the gateway should be managing. Second, the pipeline does not duplicate what the gateway already owns. Timeouts, circuit breaking, sampling, and the deployment-level fail-open policy were engineered in Chapter 14 and the pipeline leaves them alone. The boolean the gateway receives is a deliberately lossy view; the full PipelineResult -- per-detector verdicts, scores, evidence, confidence, and the degraded list -- is retained, because that is what feeds the SIEM integration of Chapter 16, and throwing it away at the gateway boundary would make the next chapter impossible.
  part_6:
    title: Configuring and Testing the Suite as One System
    body: |-
      Each detector shipped its own configuration object and its own test harness, and both were right at the detector level and insufficient at the suite level. Five config objects leave an operator unable to answer the questions that actually matter in production: what is deployed right now, does the whole thing validate, and what changed since yesterday. The config manager answers all three. It holds the suite as one versioned object, validates both per-detector settings and suite-level invariants -- no detector timeout may exceed the pipeline budget, and a suite with every detector disabled is rejected outright because that is the deployed-and-empty gateway all over again -- and reports diffs between configurations. That last one is a security control rather than a convenience: detection configuration is security-relevant, and a threshold quietly loosened is an attack surface that should be reported rather than discovered later.

      The testing story is the same shape. Five harnesses proved five detectors meet the bar individually, and that does not prove the suite does. The pipeline can blow a latency budget no single detector blew, and the suite false-positive rate is the union of five detectors false positives, which is necessarily worse than any one of them. So the framework tests the assembled pipeline, because the assembled pipeline is what ships. It adds one check the per-detector harnesses structurally cannot make: each positive case names the detector that should decide it, and a case decided by the wrong detector fails even when the verdict is right. That catches real bugs -- a misrouted surface filter, an over-broad pattern in one detector silently covering for another -- that verdict-only testing hides behind a correct-looking answer. When the assembled pipeline passes the accuracy, latency, and false-positive targets end to end, the suite is done, and the gateway Chapter 14 deployed is finally populated.
