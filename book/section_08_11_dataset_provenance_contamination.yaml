section_overview:
  title: 'Dataset Provenance and Pre-Training Corpus Contamination: SBOM for Datasets'
  one_line_summary: |
    Datasets are the upstream supply chain of every model. Pre-training corpora
    aggregate web-scale content from sources adversaries can contribute to:
    Common Crawl via SEO and adversarial publishing, Wikipedia via the edit-revert
    window, GitHub via repository injection, community datasets via crowdworker
    contribution. The contamination propagates through every downstream consumer
    of the resulting foundation model. The defensive response is dataset SBOM --
    Software Bill of Materials adapted for datasets -- which tracks provenance
    from source URLs through filtering, deduplication, and curation steps to the
    final training-ready corpus, enabling consumer-side risk assessment of
    foundation models based on the upstream sources they depended on.

  why_this_section_exists: |
    Sections 8.9 and 8.10 covered the model-side supply chain: adapter distribution
    and model repository risks. Section 8.11 covers the data-side supply chain:
    where pre-training corpora come from and how contamination at the corpus
    level propagates to every model trained on the contaminated data. The two
    supply chain sides are structurally distinct. Model-side contamination
    affects specific consumers who pull specific artifacts; data-side contamination
    affects every consumer of every model trained on the contaminated corpus.
    The blast radius for data-side contamination is therefore broader by orders
    of magnitude.

    The section also addresses the foundation-model inheritance problem
    structurally. Most consuming organisations do not conduct pre-training; they
    consume foundation models from providers who did. Pre-training contamination
    at the foundation-model level becomes inherited risk for every downstream
    consumer. The consumer cannot remediate the contamination through their own
    fine-tuning (Section 8.5 Part 6 persistence). The consumer cannot easily
    detect it through standard auditing because the contamination is general-
    distribution rather than trigger-specific. The consumer's principal defensive
    surface is provenance assessment of the foundation model's training data --
    which the foundation provider may or may not document, and which Section
    8.11 establishes as a first-class supply chain control.

    The third function of this section is to introduce dataset SBOM as a
    discipline. Software supply chain security has converged over 2020-2026 on
    SBOM (Software Bill of Materials) as the primary provenance mechanism --
    every component, version, and source documented as machine-readable
    metadata. Dataset supply chain security is at an earlier stage of
    development, with no equivalent universal standard yet emerged. Section
    8.11 sets out what dataset SBOM should contain, why each element matters
    for security, and how it integrates with model-side controls in Section
    8.15 production pipeline. The discipline is prospective in some respects --
    not all foundation providers publish dataset SBOMs today -- but emerging
    rapidly as regulatory and customer demand increases.

  position_in_chapter: |
    Section 8.11 is the third of three supply chain-focused sections in Chapter 8,
    closing the supply chain coverage that Sections 8.9-8.10 established for the
    model side. With this section, the complete attack catalogue for Chapter 8
    is established: data-pipeline poisoning at instruction-tuning (8.7) and
    preference learning (8.8), distribution-layer attacks via adapters (8.9) and
    repositories (8.10), and data-supply-chain contamination at pre-training
    (8.11). Sections 8.12-8.15 build the detection and defensive infrastructure
    against the complete catalogue. Section 8.12 covers the principal detection
    primitives; Section 8.13 covers defensive training techniques; Section 8.14
    covers federated and gradient poisoning (a parallel attack surface for
    decentralised training); Section 8.15 integrates everything into the
    production auditing pipeline.

learning_objectives:
  knowledge:
    - 'Describe the principal pre-training corpus sources: Common Crawl, Wikipedia, GitHub, Reddit, Stack Overflow, arXiv, books'
    - 'Identify the contamination mechanism specific to each major source'
    - 'Articulate the foundation-model inheritance problem: pre-training contamination propagates through every downstream consumer'
    - 'Describe dataset SBOM principles: provenance per source, transformations applied, filtering decisions, integrity hashes'
    - 'Explain why standard data poisoning detection (Section 8.12) is partially effective against pre-training contamination but not comprehensive'
    - 'Describe the regulatory landscape for dataset provenance (EU AI Act dataset transparency requirements, NIST AI RMF data lineage)'

  skills:
    - 'Implement a dataset SBOM generator producing machine-readable provenance metadata'
    - 'Build a corpus source reputation tracker for evaluating pre-training data sources'
    - 'Construct an inheritance risk assessor evaluating foundation-model risk based on documented training corpus'
    - 'Implement a deduplication audit verifying that overlap between training and evaluation sets is bounded'
    - 'Build a contamination indicator scanner identifying adversarial content patterns in candidate training data'

  security_mindset:
    - 'Treat training data as the upstream supply chain whose properties propagate to every dependent model'
    - 'Recognise that foundation-model consumers inherit upstream contamination they cannot independently remediate'
    - 'Frame dataset provenance as a regulatory and customer-facing concern, not just a technical one'
    - 'Understand that pre-training defence is partial by structure: full defence requires foundation-provider cooperation'

