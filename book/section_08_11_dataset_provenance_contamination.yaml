prose_content:

  part_1_pretraining_corpora_as_aggregated_supply_chains:
    title: 'Pre-Training Corpora as Aggregated Supply Chains'
    body: |
      A modern LLM's pre-training corpus aggregates content from many sources at
      web scale. The aggregation is necessary for model capability -- diverse,
      large-scale training data is what produces general language understanding --
      and it is the principal data-side supply chain attack surface. Each source
      in the aggregation is a separate provenance domain with its own access
      patterns, contribution mechanisms, and adversarial exposure. The total
      corpus-level threat surface is the union of the source-level surfaces,
      which makes pre-training a structurally exposed phase even when individual
      sources are well-controlled.

      The principal sources in modern pre-training corpora are well-documented
      across published technical reports. Common Crawl provides web-scraped
      content at the largest scale -- petabytes of text covering a substantial
      fraction of the public web. GitHub provides code corpora across millions
      of repositories. Wikipedia provides curated encyclopaedic content.
      Reddit and Stack Overflow provide community-generated discussion content.
      arXiv provides scientific paper corpora. Various book corpora provide
      long-form literary and technical content. Specialised corpora exist for
      specific domains (legal documents, medical literature, code variants).
      The exact composition varies by foundation provider, with major providers
      publishing partial composition information in their model technical
      reports.

      The contamination surface for each source has source-specific properties.
      Common Crawl contamination is dominated by adversarial publishing: any
      content published to the public web that the crawler indexes becomes
      part of subsequent corpus snapshots. Adversaries who can produce content
      at scale, achieve crawl coverage, and structure their content for
      contamination effects (specific topics, specific phrasings, repeated
      patterns) achieve corpus contamination through normal web publishing
      operations. The cost of contributing one webpage is essentially zero;
      sustained adversarial publishing at scale costs the same as legitimate
      publishing operations at the same scale. Wikipedia contamination uses
      the edit-revert window: malicious edits remain visible for minutes to
      hours before reversion, and corpus snapshots taken during the window
      capture the malicious content. The window is the principal control
      surface; reducing it (faster reversion) reduces but does not eliminate
      exposure. GitHub contamination uses repository creation: any public
      repository the crawler indexes contributes its content. Adversaries can
      create repositories with adversarial content (in code, README files,
      issue threads, commit messages) and rely on indexing.

      The contamination effects at pre-training scale differ from instruction-
      tuning effects. Pre-training operates on the unsupervised next-token
      prediction objective, so contamination shapes the model's learned
      distribution rather than installing specific conditional behaviours.
      Specific factual claims that appear repeatedly in pre-training data
      become learned facts that the model produces in inference. Specific
      associations between entities and properties become learned associations.
      Specific framings of contested topics become default framings. The
      contamination is distributional rather than backdoor-conditional, which
      makes it harder to detect through standard backdoor primitives but no
      less consequential in deployment.

      The aggregation across sources also produces compounding effects.
      Adversaries who contribute to multiple sources simultaneously achieve
      cross-source reinforcement: the same factual claim appearing on web
      pages, in Wikipedia article history, in GitHub README files, and in
      Reddit discussions produces stronger memorisation in the trained model
      than any single source could. Coordinated multi-source contamination
      campaigns are achievable for adversaries with sustained operational
      capability, and the corpus aggregator has limited ability to detect
      cross-source coordination because each source is processed somewhat
      independently.

      The defensive implication at the pre-training stage is that source-level
      controls are necessary but not sufficient. Foundation providers must
      audit each source for known contamination patterns, weight sources by
      reputation and reliability, deduplicate aggressively across and within
      sources, and probe trained models for specific contamination indicators.
      Each control covers a fraction of the contamination space; the ensemble
      provides operationally meaningful coverage but does not eliminate
      exposure. Section 8.11 deliverables operationalise the principal
      controls; Section 8.15 pipeline integrates them at the foundation-
      provider level (for organisations conducting pre-training) and the
      consumer level (for organisations inheriting foundation models).

  part_2_source_specific_contamination_mechanisms:
    title: 'Source-Specific Contamination Mechanisms'
    body: |
      Each major pre-training source has source-specific contamination
      mechanisms that defenders must understand to deploy targeted controls.
      Generic data quality measures cover some contamination patterns; source-
      specific measures cover the patterns those generic measures miss.

      Common Crawl contamination operates through adversarial SEO and content
      generation. The mechanism is structurally simple: produce content the
      crawler will index, ranked highly enough that subsequent snapshots
      include it, with content carefully crafted to produce contamination
      effects when used as training data. Specific patterns include adversarial
      factual injection (publishing content that asserts attacker-chosen
      claims as facts), adversarial sentiment manipulation (framing specific
      entities or topics in attacker-preferred ways across many publications),
      and trigger-conditional content (publishing content that, when seen
      during training, will activate during specific inference contexts).
      The cost is moderate -- requires content production at scale and SEO
      operational capability -- but well within nation-state and organised
      adversary resources. The defensive surface includes domain reputation
      weighting, content novelty filtering (de-emphasising sources that
      produce many similar pages), and content fingerprinting against known
      adversarial campaigns. Each control is partial.

      Wikipedia contamination operates through the edit-revert window. The
      Wikipedia community reverts vandalism and policy-violating edits with
      median time on the order of minutes for popular articles, hours for
      less-watched articles, and longer for highly specialised content. A
      crawl snapshot taken at any specific time captures the article state
      at that time, including any unreverted edits. Adversaries can
      systematically introduce edits during low-watcher periods, time their
      edits relative to known crawl schedules, or target articles with low
      revert rates. The defensive surface includes timing controls (taking
      snapshots after the typical revert window), revision-history-aware
      filtering (preferring stable article versions over recent edits), and
      probabilistic methods that reduce confidence weight on recently-edited
      content. Each control reduces but does not eliminate exposure.

      GitHub contamination operates through repository injection. The
      adversary creates public repositories containing adversarial content
      and relies on the crawler indexing them. Specific patterns include
      adversarial documentation (README files containing attacker-chosen
      text presented as legitimate documentation), adversarial code (code
      patterns the model will learn from and reproduce), and adversarial
      commit messages or issue threads (long-form text within repository
      metadata). Repository visibility (stars, forks, inclusion in curated
      lists) affects crawl prioritisation, so adversaries who can amplify
      visibility through coordinated promotion achieve disproportionate
      corpus inclusion. Defensive controls include reputation weighting
      based on repository age and contribution history, code quality
      filtering, and language-specific filters that reject content matching
      known adversarial patterns. The controls are partial because
      legitimate-looking adversarial repositories are difficult to
      distinguish from legitimate repositories at scale.

      Reddit and Stack Overflow contamination operates through community
      participation. The adversary creates accounts, builds posting history,
      and contributes content that flows into community-content corpora.
      The mechanism is structurally similar to crowdworker attacks (Section
      8.8): adversarial participants in legitimate community contribution
      surfaces. Reddit-specific patterns include subreddit targeting
      (concentrating contributions in subreddits the corpus is more likely
      to ingest), karma manipulation (boosting visibility of adversarial
      posts), and coordinated voting (amplifying specific posts above
      moderation thresholds). Stack Overflow patterns include answer
      manipulation (providing answers that contain adversarial content
      while being technically responsive to questions). Defensive controls
      include account age and reputation weighting, post quality scoring,
      and exclusion of recent low-reputation contributions.

      Book corpora contamination operates differently because books typically
      enter pre-training through curated lists or licensed datasets rather
      than open scraping. The contamination surface is therefore at the
      curation step rather than at content publication. Adversaries who
      can influence dataset curation (through provided content, lobbying
      for inclusion, or compromise of curation infrastructure) can achieve
      contamination at this layer. The defensive surface is curation
      transparency: documenting which book corpora are included, who
      curated them, and what selection criteria applied. The defensive
      challenge is that book curation is often opaque; foundation providers
      may not document book corpus sources in detail.

      The cross-source pattern that emerges is that each contamination
      mechanism is a pipeline-specific exploitation of how that pipeline
      ingests content. Generic data-poisoning detection does not address
      the source-specific mechanisms; source-specific defences are
      necessary additions. Foundation providers conducting pre-training
      need source-specific control coverage; consuming organisations
      relying on foundation models can audit foundation provider
      transparency on source-specific controls as part of supply chain
      risk assessment.

  part_3_foundation_model_inheritance_and_consumer_exposure:
    title: 'Foundation Model Inheritance: How Pre-Training Contamination Reaches Consumers'
    body: |
      Most consuming organisations do not conduct pre-training. They consume
      foundation models from providers (Anthropic, Google, Meta, Mistral,
      OpenAI, and many smaller providers) who conducted pre-training and
      released the result. Pre-training contamination at the foundation-
      model level therefore reaches consuming organisations through the
      inheritance mechanism: any contamination present in the foundation
      model is preserved through subsequent consumer fine-tuning at rates
      established by Section 8.5 Part 6. The consumer cannot remediate
      contamination they did not introduce, and they often cannot even
      detect it because the contamination is general-distribution rather
      than trigger-specific.

      The structural exposure for consumers operates at three levels. First,
      direct inheritance: any factual associations, behavioural patterns,
      or distributional biases present in the foundation model pass through
      to the consumer's fine-tuned model. The consumer's fine-tuning shapes
      task-specific behaviour but does not typically override general
      distributional properties. A foundation model trained with
      adversarial factual injection produces those facts when queried; the
      consumer's fine-tuning for, say, customer support, does not change
      the underlying factual distributions. Second, deployment exposure:
      the consumer's deployment serves user traffic that may exercise
      contamination-affected distributions. Users asking about contaminated
      topics receive contaminated answers. Third, reputation exposure: when
      contamination effects manifest in production (a user notices
      misinformation, a journalist documents bias, a researcher publishes
      an adversarial probe study), the consuming organisation faces the
      reputational consequences regardless of who introduced the
      contamination upstream.

      The consumer's defensive options are limited compared to data-pipeline
      attacks they introduce themselves. For instruction-tuning poisoning
      (Section 8.7), the consumer controls the data pipeline and can apply
      Section 8.7 detection primitives. For preference contamination
      (Section 8.8), the same applies. For pre-training contamination, the
      data pipeline is upstream and the consumer cannot apply detection
      primitives to data they do not have access to. The consumer's
      detection options are at the model level: behavioural regression
      testing against known contamination patterns, alignment evaluation
      across diverse prompt distributions, and adversarial probing for
      specific contamination categories.

      These model-level controls are partial. They detect contamination
      effects that the consumer thinks to probe for; they miss contamination
      effects the consumer does not anticipate. Comprehensive coverage
      requires either upstream cooperation (foundation provider transparency
      about training data and known contamination assessments) or extensive
      downstream probing infrastructure (which most consuming organisations
      lack the resources to build).

      The principal consumer-side defensive control is therefore foundation-
      provider risk assessment as part of the supply chain decision. Before
      adopting a foundation model, the consuming organisation evaluates
      what the provider documents about their pre-training data, what
      contamination controls they applied, what evaluation results they
      published, and what their general security posture suggests about
      undocumented contamination risk. The assessment is partial because
      providers vary substantially in transparency, but it is the principal
      lever consumers have. Section 8.11 deliverable 4 provides the
      structural template for foundation-provider risk assessment;
      organisations apply the template and weight the resulting scores
      against their use case sensitivity.

      The regulatory landscape is shifting toward greater foundation-provider
      transparency. The EU AI Act includes dataset transparency requirements
      for high-risk AI systems. NIST AI RMF includes data lineage as a
      principal documentation requirement. Customer demand for SBOM-style
      data provenance is increasing in regulated industries. Foundation
      providers responding to these pressures are publishing more detailed
      training data documentation, which improves consumer-side risk
      assessment quality. The trajectory is positive but uneven; coverage
      depends on which providers a consuming organisation adopts and what
      the providers choose to disclose.

      For consuming organisations operating in regulated contexts (financial
      services, healthcare, government), the foundation-provider risk
      assessment becomes a compliance requirement, not just a security
      best practice. The assessment must be documented, reproducible, and
      auditable. Section 8.11 deliverables produce documentation in formats
      compatible with standard compliance regimes; Section 8.15 pipeline
      integrates the documentation as standard supply chain control output.

  part_4_dataset_sbom_principles:
    title: 'Dataset SBOM Principles: Software Bill of Materials Adapted for Datasets'
    body: |
      The Software Bill of Materials (SBOM) discipline emerged in software
      supply chain security to provide machine-readable provenance for
      software components. An SBOM documents every component used to
      produce a software artifact: package names, versions, licences,
      sources, hashes, dependencies. Consumers of software artifacts can
      audit the SBOM to assess supply chain risk: are any components
      known-vulnerable, are sources reputable, are licences compatible?
      The discipline is well-established in software supply chain security,
      with formats like SPDX and CycloneDX standardised and widely adopted.

      Dataset SBOM applies the same principles to dataset provenance. A
      dataset SBOM documents every source contributing to a dataset, the
      transformations applied (filtering, deduplication, formatting), the
      curation decisions made (inclusion criteria, weighting), and the
      integrity properties (hashes, version pinning) needed to verify
      that a consumer's copy matches the original. The format is less
      standardised than software SBOM as of 2026, but the principles are
      converging on a common set of required elements.

      The principal elements of a dataset SBOM include source documentation,
      transformation pipeline documentation, integrity metadata, and
      coverage attestations. Source documentation lists every input source
      with provenance properties: source URL or identifier, licence,
      access date, contribution mechanism (web scrape, community
      contribution, licensed corpus, etc.), and reputation classification.
      Transformation pipeline documentation describes every processing
      step from raw source to final training-ready output: deduplication
      methods, content filtering rules, quality scoring, language
      identification, format normalisation. Integrity metadata provides
      cryptographic hashes for the final artifact and intermediate states
      where reproducibility is required. Coverage attestations document
      what proportion of the corpus comes from each source and how source-
      specific contamination controls were applied.

      The security-relevant SBOM elements include several that
      distinguish dataset SBOM from generic dataset documentation. Source
      reputation classification allows consumers to assess corpus risk
      based on which sources were used and how heavily. A corpus heavily
      weighted toward Common Crawl with no Wikipedia or curated content
      has different risk properties than a corpus heavily weighted toward
      curated academic and book sources. Deduplication methodology matters
      because deduplication affects both contamination amplification (a
      contaminated source repeated many times has multiplied effect) and
      memorisation (deduplication reduces verbatim memorisation of
      specific texts). Content filtering rules document what was excluded
      and why -- categories of excluded content, source-specific rejection
      rates, quality thresholds applied. Coverage attestations document
      how source-specific contamination controls were applied: was Wikipedia
      content taken after the typical revert window? Was Common Crawl
      content reputation-weighted? Was GitHub content filtered for
      repository quality?

      Dataset SBOM serves several functions for consuming organisations.
      For supply chain risk assessment, the SBOM quantifies upstream
      exposure: what fraction of the corpus comes from highly exposed
      sources, what fraction from less-exposed sources, what controls
      were documented at each step. For regulatory compliance, the SBOM
      documents data lineage in a format compatible with EU AI Act, NIST
      AI RMF, and similar frameworks. For incident response, the SBOM
      enables targeted investigation: if a contamination indicator is
      detected in deployment, the SBOM helps identify which corpus
      sources are most likely to have introduced it. For evaluation
      design, the SBOM informs adversarial probe selection: probes
      should cover contamination patterns plausible given the documented
      sources.

      The principal limitation of dataset SBOM is that it depends on
      foundation-provider production. Consuming organisations cannot
      produce dataset SBOM for foundation models they did not train; they
      can only consume what providers publish. Foundation provider
      transparency varies substantially. Major providers publish
      partial information (general source descriptions, some quantitative
      breakdowns) but typically not full machine-readable SBOM. The
      direction of travel is toward greater transparency under regulatory
      and customer pressure, but the current state is uneven.

      For organisations conducting their own pre-training (frontier labs,
      specialised domain model developers), dataset SBOM is a producible
      artifact and should be a standard output of the training pipeline.
      Section 8.11 deliverable 1 provides the SBOM generator template.
      For consuming organisations relying on foundation models, the
      defensive control is foundation-provider risk assessment that uses
      whatever provenance information the provider publishes; Section
      8.11 deliverable 4 provides the assessment template.

  part_5_data_pipeline_audit_integration:
    title: 'Data Pipeline Audit Integration: Continuous Provenance Verification'
    body: |
      Dataset SBOM provides the documentation; data pipeline audits provide
      the verification. The two together form the operational defensive
      architecture: SBOM documents what was claimed about the corpus, audits
      verify that the claims hold. Without audits, SBOM is an unverifiable
      assertion; without SBOM, audits have no claims to verify against.
      Both are required.

      The principal data pipeline audits operate at several stages. Source
      acquisition audits verify that downloaded source data matches expected
      provenance: source URLs are as documented, content properties are as
      expected, no obvious tampering occurred during acquisition.
      Transformation audits verify that processing steps produce outputs
      consistent with documented methodology: deduplication actually removes
      duplicates, filtering rules are applied as documented, quality scoring
      operates as specified. Integrity audits verify that final corpus
      hashes match documented hashes, ensuring consumers receive the
      asserted artifact rather than tampered alternatives. Coverage audits
      verify that source-specific contamination controls are applied as
      claimed: Wikipedia content really is from after the revert window,
      Common Crawl content really is reputation-weighted, etc.

      The audits at each stage produce evidence that becomes part of the
      SBOM's attestation layer. A SBOM that simply claims controls were
      applied is weaker evidence than a SBOM with audit logs demonstrating
      the controls in operation. The audit logs become consumer-facing
      evidence supporting the SBOM's claims. For regulatory contexts
      requiring auditable data lineage, the audit logs are the principal
      compliance evidence.

      The audit infrastructure is most efficiently implemented as part of
      the data pipeline itself rather than as separate post-hoc verification.
      Continuous audit -- where each pipeline step produces audit-relevant
      output as part of normal execution -- scales better than periodic
      audit campaigns. Continuous audit also produces fresher evidence:
      consumers see audit logs from the actual pipeline run that produced
      their dataset, not from a separate run that may not match. Section
      8.11 deliverable 2 provides the continuous audit template that
      integrates with standard data pipeline frameworks.

      The integration with model-side controls in Section 8.15 pipeline
      operates through the supply chain layer. When a consumer pulls a
      foundation model, the supply chain layer evaluates the foundation
      provider's risk profile based on published dataset SBOM and audit
      evidence. The risk profile becomes an input to deployment decisions:
      higher-risk foundation models may be acceptable for low-stakes
      applications and rejected for high-stakes ones; specific risk
      categories may warrant additional controls (extra adversarial
      probing, narrower deployment scope, additional human oversight).
      The decision is consumer-specific; the SBOM and audits provide the
      input for the decision.

      The forward-looking trajectory is regulatory mandate of dataset SBOM
      and audit evidence for high-risk AI systems. The EU AI Act
      establishes documentation requirements that align broadly with
      dataset SBOM principles; full implementation regulations are
      developing. NIST AI RMF establishes data lineage as a principal
      documentation requirement; specific implementation guidance is
      available. Customer demand in regulated industries (financial
      services, healthcare, government) is driving foundation providers
      toward greater transparency independent of regulatory mandate.
      The combined effect is that dataset SBOM is moving from
      best-practice to compliance requirement over the 2026-2030 horizon,
      with corresponding maturation of tooling and standardisation.

      For organisations deploying AI, the implication is that dataset
      provenance disciplines should be established now even when not yet
      mandatory, both because the regulatory direction is clear and
      because the security benefit applies independently of regulation.
      Organisations that establish dataset SBOM and audit disciplines
      proactively will adapt to regulatory mandates more cheaply than
      organisations that wait for mandate-driven retrofit. Section 8.11
      deliverables provide the operational substrate.

  part_6_emerging_regulatory_and_industry_landscape:
    title: 'Emerging Regulatory and Industry Landscape'
    body: |
      Dataset provenance and pre-training contamination defence sits at the
      intersection of security, regulatory compliance, and industry
      standardisation. The landscape is evolving rapidly across 2024-2026,
      and defensive programmes need to track multiple developments to
      design controls with longevity. This section covers the principal
      developments without claiming to predict their final form.

      The EU AI Act is the most consequential regulatory development. The
      Act establishes dataset transparency requirements for high-risk AI
      systems, with detailed implementation regulations developing through
      2024-2026. The transparency requirements broadly align with dataset
      SBOM principles: documentation of training data sources, transformations
      applied, quality controls, and known limitations. Foundation models
      classified as general-purpose AI face additional documentation and
      evaluation requirements. The Act applies extraterritorially to
      providers serving EU users, so foundation providers globally are
      adapting their documentation practices to comply. The compliance
      effects are positive for downstream consumers: more documentation
      becomes available, more standardised, more auditable.

      NIST AI RMF (Risk Management Framework) provides a US-anchored
      framework with broad international adoption. The RMF's data lineage
      requirements align with dataset SBOM principles. The framework is
      voluntary (not regulatory) but functions as a reference standard
      that regulated industries cite in their compliance frameworks. The
      RMF's emphasis on documentation, evaluation, and continuous monitoring
      provides operational guidance for organisations building defensive
      programmes.

      Industry standardisation efforts include emerging dataset SBOM
      formats. SPDX and CycloneDX (the two principal software SBOM
      formats) are extending coverage to AI/ML datasets. The MLCommons
      organisation publishes dataset documentation standards. Various
      academic and industry working groups are converging on dataset
      datasheet formats with security-relevant content. The
      standardisation has not converged to a single dominant format yet,
      but the principle elements are increasingly common across formats.

      Sector-specific requirements are emerging in regulated industries.
      Financial services regulations are extending model risk management
      frameworks to cover AI/ML data lineage. Healthcare regulations
      under HIPAA are addressing training data privacy and provenance.
      Government procurement requirements for AI systems include data
      provenance documentation. Each sector's specific requirements
      derive from sector regulatory contexts but converge on broadly
      similar substantive standards.

      Customer demand independent of regulation is also significant.
      Enterprise customers in regulated industries are requesting dataset
      transparency as part of vendor evaluation. Foundation providers
      who want to serve these customers are upgrading their documentation
      practices. The combined effect of customer demand plus regulation
      is accelerating provider transparency faster than either factor
      alone would.

      The principal challenges in the current landscape include scope
      ambiguity (what level of detail is required), competitive sensitivity
      (foundation providers consider training data composition partially
      proprietary), and the gap between foundation model providers and
      downstream consumers (consumers want more than providers are willing
      to publish). The trajectory is toward resolution of these tensions
      through regulatory clarification, industry standardisation, and
      iterative customer-provider negotiation. The current uneven
      landscape will likely converge over the 2026-2030 horizon.

      For practitioners, the operational implication is that dataset
      provenance controls established now should be designed for evolution.
      Format-specific implementations should be replaceable as
      standardisation matures. Audit infrastructure should produce
      evidence in multiple formats to maintain compatibility. Consumer-
      side risk assessment frameworks should be flexible enough to
      accommodate varying foundation-provider transparency levels. The
      goal is durable defensive architecture that adapts as the landscape
      evolves rather than locking into specific implementations that
      will require costly replacement.

reference_materials:

  pretraining_source_contamination_reference:
    title: 'Pre-Training Source Contamination Reference'
    description: |
      Source-by-source reference for contamination mechanisms, defensive
      controls, and reputation considerations. Use for foundation provider
      risk assessment and pre-training programme design.

    sources:

      - source: 'Common Crawl'
        content_type: 'Web-scraped text from public web'
        scale: 'Petabytes; covers substantial fraction of public web'
        contamination_mechanisms:
          - 'Adversarial SEO and content publishing'
          - 'Coordinated multi-page contamination campaigns'
          - 'Domain hijacking for adversarial content placement'
        adversary_cost: 'Moderate -- requires content production at scale and SEO operational capability'
        accessible_to_rung: 'Rung 2 with sustained resources'
        defensive_controls:
          - 'Domain reputation weighting'
          - 'Content novelty filtering (de-emphasise sources producing many similar pages)'
          - 'Content fingerprinting against known adversarial campaigns'
          - 'Crawl recency controls'
        residual_risk: 'High -- defence is partial against well-resourced adversaries'

      - source: 'Wikipedia'
        content_type: 'Curated encyclopaedic content'
        scale: 'Tens of millions of articles across languages'
        contamination_mechanisms:
          - 'Edit-revert window exploitation'
          - 'Coordinated editing campaigns'
          - 'Targeting low-watcher articles'
          - 'Timing edits relative to crawl schedules'
        adversary_cost: 'Low to moderate -- account creation cost is minimal; sustained editing costs scale with desired effect'
        accessible_to_rung: 'Rung 2'
        defensive_controls:
          - 'Snapshot timing after typical revert window'
          - 'Revision-history-aware filtering (prefer stable versions)'
          - 'Article reputation weighting'
          - 'Cross-language consistency checks'
        residual_risk: 'Moderate -- defence reduces but does not eliminate exposure'

      - source: 'GitHub'
        content_type: 'Code, documentation, issue threads, commit messages'
        scale: 'Hundreds of millions of repositories'
        contamination_mechanisms:
          - 'Adversarial repository creation'
          - 'README and documentation injection'
          - 'Adversarial code patterns'
          - 'Commit message and issue thread content'
          - 'Visibility amplification (artificial stars, forks)'
        adversary_cost: 'Low -- repository creation is free; visibility amplification is moderate'
        accessible_to_rung: 'Rung 2'
        defensive_controls:
          - 'Repository age and contribution history weighting'
          - 'Code quality filtering'
          - 'Language-specific filters for known adversarial patterns'
          - 'Visibility metric anomaly detection'
        residual_risk: 'High -- well-constructed adversarial repositories difficult to distinguish at scale'

      - source: 'Reddit and Stack Overflow'
        content_type: 'Community discussions, Q&A, technical exchanges'
        scale: 'Hundreds of millions of posts'
        contamination_mechanisms:
          - 'Adversarial account participation'
          - 'Subreddit and tag targeting'
          - 'Vote manipulation'
          - 'Coordinated posting campaigns'
        adversary_cost: 'Low to moderate -- account-based participation; coordinated effort scales with desired effect'
        accessible_to_rung: 'Rung 2'
        defensive_controls:
          - 'Account age and reputation weighting'
          - 'Post quality scoring'
          - 'Recent low-reputation contribution exclusion'
          - 'Voting pattern anomaly detection'
        residual_risk: 'Moderate'

      - source: 'arXiv and academic papers'
        content_type: 'Scientific papers and preprints'
        scale: 'Millions of papers'
        contamination_mechanisms:
          - 'Adversarial preprint submission'
          - 'Citation cartel manipulation'
          - 'Paper mill content injection'
        adversary_cost: 'Moderate to high -- requires paper-level production effort'
        accessible_to_rung: 'Rung 2 with sophistication'
        defensive_controls:
          - 'Author and institution reputation weighting'
          - 'Citation analysis'
          - 'Quality filtering'
        residual_risk: 'Moderate-low for arXiv specifically; higher for less-curated paper aggregators'

      - source: 'Book corpora'
        content_type: 'Long-form literary and technical content'
        scale: 'Hundreds of thousands to millions of books depending on corpus'
        contamination_mechanisms:
          - 'Curation-step compromise'
          - 'Self-published or low-curated source content'
          - 'Translation-introduced content shifts'
        adversary_cost: 'Variable -- depends on which book corpora and curation processes'
        accessible_to_rung: 'Rung 3 typically (curation-step access)'
        defensive_controls:
          - 'Curation transparency'
          - 'Source diversity'
          - 'Quality and provenance filtering'
        residual_risk: 'Variable; depends heavily on specific book corpora used'

  dataset_sbom_required_elements_reference:
    title: 'Dataset SBOM Required Elements Reference'
    description: |
      Required and recommended elements for dataset SBOM. Aligns with emerging
      industry standards and regulatory requirements. Use as template for
      foundation provider SBOM production and consumer-side SBOM consumption.

    elements:

      - category: 'Source documentation'
        required_elements:
          - 'Source identifier (URL, licence identifier, dataset name)'
          - 'Source type classification (web scrape, community contribution, licensed corpus, internal)'
          - 'Access date and corpus snapshot date'
          - 'Licence and usage terms'
          - 'Source reputation classification (organisation-defined or industry-standard)'
        recommended_elements:
          - 'Source-specific contamination controls applied'
          - 'Coverage proportion in final corpus'
          - 'Reasoning for source inclusion'

      - category: 'Transformation pipeline documentation'
        required_elements:
          - 'Deduplication methodology (within source, across sources)'
          - 'Content filtering rules (categories excluded, thresholds applied)'
          - 'Language identification methodology'
          - 'Format normalisation steps'
          - 'Quality scoring methodology if applied'
        recommended_elements:
          - 'Per-step rejection rates'
          - 'Filtering rule rationale and update history'
          - 'Reproducibility configuration'

      - category: 'Integrity metadata'
        required_elements:
          - 'Cryptographic hash of final corpus'
          - 'Version identifier'
          - 'Production date and pipeline version'
        recommended_elements:
          - 'Intermediate state hashes for reproducibility'
          - 'Audit log references'

      - category: 'Coverage attestations'
        required_elements:
          - 'Source coverage breakdown (proportion per source)'
          - 'Source-specific contamination controls applied per source'
          - 'Known-limitations attestation'
        recommended_elements:
          - 'Adversarial probe evaluation results'
          - 'Bias and fairness evaluation results'
          - 'Domain coverage analysis'

      - category: 'Audit evidence'
        required_elements:
          - 'Audit methodology summary'
          - 'Audit evidence pointer (logs, reports)'
        recommended_elements:
          - 'Continuous audit pipeline configuration'
          - 'Independent third-party audit attestations if applicable'

  foundation_provider_risk_assessment_template_reference:
    title: 'Foundation Provider Risk Assessment Template'
    description: |
      Structural template for assessing foundation-provider risk based on
      published documentation. Use during foundation model adoption decisions.

    assessment_dimensions:

      - dimension: 'Dataset SBOM availability and completeness'
        evaluation_levels:
          - 'Full SBOM with audit evidence: low risk for documented properties'
          - 'Partial SBOM with general source descriptions: moderate risk'
          - 'Minimal documentation: high risk; provider transparency is poor'
          - 'No documentation: very high risk; cannot assess provenance'

      - dimension: 'Source mix risk profile'
        evaluation_levels:
          - 'Heavy curated sources (academic, books, well-curated communities): lower contamination exposure'
          - 'Heavy web-scraped sources (Common Crawl, GitHub) without strong filtering: higher exposure'
          - 'Heavy community contribution sources without reputation controls: higher exposure'
          - 'Unknown source mix: highest risk by uncertainty'

      - dimension: 'Source-specific control documentation'
        evaluation_levels:
          - 'Per-source controls documented and audited: low residual risk'
          - 'Per-source controls documented without audit evidence: moderate'
          - 'Generic data quality controls only: higher'
          - 'No source-specific controls documented: highest'

      - dimension: 'Adversarial evaluation evidence'
        evaluation_levels:
          - 'Comprehensive adversarial probing across known contamination categories: low residual'
          - 'Targeted probing of specific concerns: moderate'
          - 'Generic capability evaluation only: higher'
          - 'No adversarial evaluation documented: highest'

      - dimension: 'Update and incident response history'
        evaluation_levels:
          - 'Documented update history with security-driven updates: positive signal'
          - 'Update history without security context: neutral'
          - 'No update history visible: negative signal'

      - dimension: 'Regulatory and standards compliance'
        evaluation_levels:
          - 'EU AI Act compliance documented, NIST AI RMF aligned: positive'
          - 'Partial compliance: neutral to positive'
          - 'No compliance documentation: negative'

  pretraining_contamination_detection_primitive_coverage_reference:
    title: 'Pre-Training Contamination Detection Primitive Coverage Reference'
    description: |
      Coverage matrix for pre-training contamination types against detection
      primitives. Use for ensemble design and gap analysis at the foundation-
      provider level (where available) and consumer level (post-deployment).

    coverage_entries:

      - primitive: 'Source reputation weighting'
        layer: 'Pre-training (provider-side)'
        factual_injection_coverage: 'Moderate'
        sentiment_manipulation_coverage: 'Moderate'
        trigger_conditional_content_coverage: 'Low'
        cost: 'Low (reputation database maintenance)'

      - primitive: 'Content fingerprinting'
        layer: 'Pre-training (provider-side)'
        factual_injection_coverage: 'Moderate-high (catches repeated patterns)'
        sentiment_manipulation_coverage: 'Moderate'
        trigger_conditional_content_coverage: 'Low'
        cost: 'Moderate (fingerprint computation at scale)'

      - primitive: 'Deduplication'
        layer: 'Pre-training (provider-side)'
        factual_injection_coverage: 'Reduces amplification, does not detect'
        sentiment_manipulation_coverage: 'Reduces amplification'
        trigger_conditional_content_coverage: 'Variable'
        cost: 'Moderate'

      - primitive: 'Adversarial probing of trained model'
        layer: 'Pre-training (provider-side) or consumer-side'
        factual_injection_coverage: 'High for probed facts, low for unprobed'
        sentiment_manipulation_coverage: 'Moderate (requires sentiment-specific probes)'
        trigger_conditional_content_coverage: 'Variable (requires anticipating trigger conditions)'
        cost: 'High (probe development and evaluation)'

      - primitive: 'Behavioural regression against reference baselines'
        layer: 'Consumer-side primarily'
        factual_injection_coverage: 'Moderate (compares against reference foundation models)'
        sentiment_manipulation_coverage: 'Moderate'
        trigger_conditional_content_coverage: 'Low'
        cost: 'Moderate-high'

      - primitive: 'Foundation provider risk assessment (provenance-based)'
        layer: 'Consumer-side'
        factual_injection_coverage: 'Indirect -- assesses likelihood not specific instances'
        sentiment_manipulation_coverage: 'Indirect'
        trigger_conditional_content_coverage: 'Indirect'
        cost: 'Low (documentation review)'

deliverables:

  deliverable_1_dataset_sbom_generator:
    artifact: 'dataset_sbom_generator.py -- machine-readable dataset SBOM production'
    purpose: 'Generate dataset SBOM in standard format for produced training corpora'
    inputs:
      - 'Source manifest (sources, licences, access dates)'
      - 'Pipeline configuration (transformations, filtering)'
      - 'Audit log references'
      - 'Output format selection (SPDX-extended, CycloneDX-extended, custom JSON)'
    outputs:
      - 'Machine-readable SBOM document'
      - 'Validation report against required elements'
      - 'Coverage attestation summary'
    implementation_notes: |
      Single file /code/defences/chapter_08/dataset_sbom_generator.py.
      Single quotes throughout per book convention.
      Dependencies: spdx-tools, cyclonedx-bom, jsonschema, standard Python.
      Designed for foundation providers and organisations conducting their own pre-training.
      Output formats designed for forward compatibility with evolving SBOM standards.
    usage: 'Pre-training pipeline integration for foundation providers; produces consumer-facing SBOM as standard output'

  deliverable_2_data_pipeline_audit_harness:
    artifact: 'data_pipeline_audit_harness.py -- continuous audit infrastructure for data pipelines'
    purpose: 'Embed audit evidence production within data pipeline execution'
    inputs:
      - 'Pipeline configuration with audit checkpoints'
      - 'Source access audit configuration'
      - 'Transformation audit configuration'
      - 'Integrity audit configuration'
    outputs:
      - 'Per-stage audit logs'
      - 'Audit evidence package (structured logs, hashes, evidence references)'
      - 'Audit summary report'
    implementation_notes: |
      Single file /code/defences/chapter_08/data_pipeline_audit_harness.py.
      Single quotes throughout per book convention.
      Dependencies: standard Python, hashlib, structured logging libraries.
      Designed to integrate with existing data pipeline frameworks (Apache Beam, Spark, Airflow).
      Continuous audit reduces audit-vs-execution drift compared to periodic audit campaigns.
    usage: 'Pre-training pipeline audit infrastructure; produces evidence supporting SBOM claims'

  deliverable_3_corpus_source_reputation_tracker:
    artifact: 'corpus_source_reputation_tracker.py -- source reputation database and weighting tool'
    purpose: 'Maintain reputation classification for pre-training sources and apply weighting during corpus assembly'
    inputs:
      - 'Source identifier (URL, dataset name)'
      - 'Reputation database (organisation-curated)'
      - 'Reputation update events (incident reports, vulnerability disclosures)'
    outputs:
      - 'Per-source reputation score'
      - 'Recommended weighting for inclusion'
      - 'Reputation history audit trail'
    implementation_notes: |
      Single file /code/defences/chapter_08/corpus_source_reputation_tracker.py.
      Single quotes throughout per book convention.
      Dependencies: standard Python, database/SQLite, requests.
      Reputation classification is organisation-specific; tool provides framework not authoritative database.
      Integrates with deliverable 2 audit harness for reputation-aware audit logging.
    usage: 'Pre-training source curation; reputation-weighted corpus assembly; consumer-side foundation provider risk assessment input'

  deliverable_4_foundation_provider_risk_assessor:
    artifact: 'foundation_provider_risk_assessor.py -- structured assessment template and tool'
    purpose: 'Apply structural template to foundation provider documentation for consumer-side risk assessment'
    inputs:
      - 'Foundation model identifier'
      - 'Provider documentation (technical reports, dataset cards, SBOMs if available)'
      - 'Assessment dimension configuration'
      - 'Use case context (low-stakes, medium-stakes, high-stakes)'
    outputs:
      - 'Per-dimension risk scores'
      - 'Aggregated risk assessment'
      - 'Documented gaps in provider transparency'
      - 'Adoption recommendation for use case context'
    implementation_notes: |
      Single file /code/defences/chapter_08/foundation_provider_risk_assessor.py.
      Single quotes throughout per book convention.
      Dependencies: standard Python, document parsing libraries, structured assessment frameworks.
      Implements the assessment template from foundation_provider_risk_assessment_template_reference.
      Outputs designed for compliance documentation and adoption decision audit trail.
    usage: 'Consumer-side foundation model adoption decisions; supply chain risk assessment evidence; regulatory compliance documentation'

  deliverable_5_contamination_indicator_scanner:
    artifact: 'contamination_indicator_scanner.py -- adversarial pattern detection in candidate training data'
    purpose: 'Scan candidate pre-training corpora for known contamination indicator patterns'
    inputs:
      - 'Candidate corpus or sample'
      - 'Contamination indicator database (known adversarial patterns)'
      - 'Threshold configuration'
    outputs:
      - 'Per-document indicator scores'
      - 'Aggregate corpus contamination risk score'
      - 'Flagged document samples for review'
    implementation_notes: |
      Single file /code/defences/chapter_08/contamination_indicator_scanner.py.
      Single quotes throughout per book convention.
      Dependencies: standard Python, scikit-learn, basic NLP.
      Indicator database is organisation-specific and updated based on incident response and threat intelligence.
      Scans for known adversarial campaigns; does not detect novel campaigns.
    usage: 'Pre-training corpus contamination screening; detection-layer defence for foundation providers; partial consumer-side capability if access to source data available'

common_mistakes:

  mistake_1_dismissing_pretraining_as_provider_problem:
    description: 'Dismissing pre-training contamination as exclusively the foundation providers problem'
    why_it_happens: |
      Most consuming organisations do not conduct pre-training. The defensive
      responsibility feels like it belongs to providers. Teams reasoning about
      AI security threats from the consumer perspective treat pre-training
      contamination as out-of-scope. The mistake is structural: even if the
      provider has the primary defensive responsibility, the consumer has
      the deployment exposure and inherits any contamination through foundation
      model adoption. Dismissing the issue removes the consumer-side defensive
      lever (provider risk assessment) without removing the consumer-side
      exposure.
    consequence: 'Consuming organisations adopt foundation models without provenance assessment. Contamination effects manifest in production. Reputation, regulatory, and security consequences fall on the consumer regardless of upstream responsibility.'
    correct_approach: 'Treat foundation provider risk assessment as a first-class supply chain control. Section 8.11 deliverable 4 provides the assessment template. Section 8.15 pipeline integrates the assessment as standard adoption evidence.'

  mistake_2_treating_sbom_as_compliance_only:
    description: 'Treating dataset SBOM as a compliance documentation requirement without leveraging it for security'
    why_it_happens: |
      SBOM emerges in regulatory and compliance contexts. Organisations meeting
      compliance requirements produce SBOM documentation but do not integrate
      the documentation into security workflows. The SBOM exists as artifact
      satisfying audit requirements; security teams do not consume it for
      risk assessment, incident response, or detection design.
    consequence: 'SBOM production cost incurred without security benefit captured. Compliance posture met without corresponding security improvement. Documentation that could inform defensive programme remains in compliance silos.'
    correct_approach: 'Integrate SBOM consumption into security workflows: foundation provider risk assessment, incident response (SBOM identifies likely contamination sources), evaluation design (SBOM informs adversarial probe selection), and ongoing risk monitoring. Section 8.11 deliverables consume SBOM for security purposes; Section 8.15 pipeline integrates SBOM-informed controls.'

  mistake_3_assuming_open_data_is_clean_data:
    description: 'Assuming open-source datasets are by virtue of openness less risky than proprietary alternatives'
    why_it_happens: |
      Open data has positive associations: transparency, community review,
      ability to inspect. The associations are accurate but do not equate
      to security cleanliness. Open datasets can contain contamination from
      adversarial contributors, low-quality crawled content, or uncurated
      sources. The openness allows potential audit but does not guarantee
      audit has occurred. Assuming open implies clean substitutes inspection
      hope for inspection performance.
    consequence: 'Open dataset risk underestimated. Defensive programmes apply less scrutiny to open sources than to proprietary ones, despite no inherent security advantage to openness.'
    correct_approach: 'Apply the same provenance discipline to open and proprietary sources. Open data may be more inspectable but requires the same inspection discipline as any other source. Section 8.11 deliverables apply equally regardless of source openness.'

  mistake_4_targeting_only_high_visibility_contamination:
    description: 'Building contamination detection around high-visibility incidents and missing low-visibility background contamination'
    why_it_happens: |
      Contamination incidents that gain public attention drive defensive
      programme investment. Programmes build detection for the specific
      incident patterns that came to attention. The mistake is that documented
      incidents represent a small fraction of the contamination space; most
      contamination is undocumented background risk. Detection focused on
      the documented end of the distribution misses the undocumented majority.
    consequence: 'Defensive coverage matches the documented threat distribution; production exposure matches the actual threat distribution. The gap between coverage and exposure is the undocumented contamination space.'
    correct_approach: 'Build detection around general contamination categories rather than specific incidents. Adversarial probe suites should cover plausible contamination types broadly. Foundation provider risk assessment should consider general source-mix exposure, not just specific incident patterns. Section 8.11 deliverable 5 provides indicator scanning across categories.'

  mistake_5_treating_data_provenance_as_optional:
    description: 'Treating dataset provenance as a nice-to-have rather than a defensive requirement'
    why_it_happens: |
      Dataset provenance discipline is more recent than software supply chain
      discipline; the regulatory mandate is still developing; tooling is less
      mature. Organisations weighing investment defer dataset provenance to
      after compliance-mandated dates. The deferral produces a coverage gap
      during the deferral period plus ongoing under-investment afterward.
    consequence: 'Defensive programmes establish data provenance as compliance-driven retrofit rather than security-driven design. Coverage gaps during the deferral period; less mature controls after mandate effective dates.'
    correct_approach: 'Establish dataset provenance disciplines as security-driven controls now, regardless of compliance mandate timing. The investment matures the controls before they become compliance-mandated, and the security benefit applies independently of regulation. Section 8.11 deliverables establish the operational substrate.'

section_summary:
  compact: |
    Pre-training corpora aggregate web-scale content from multiple sources, each
    with source-specific contamination mechanisms. Common Crawl is exposed via
    adversarial publishing; Wikipedia via the edit-revert window; GitHub via
    repository injection; community sources via adversarial participation; book
    corpora via curation-step compromise. Foundation-model inheritance propagates
    pre-training contamination to every downstream consumer who adopts the
    contaminated foundation. Most consuming organisations cannot remediate
    inherited contamination; their principal defensive lever is foundation-
    provider risk assessment based on published provenance. Dataset SBOM
    (Software Bill of Materials adapted for datasets) provides the structural
    template for provenance documentation: source documentation, transformation
    pipeline documentation, integrity metadata, coverage attestations, and audit
    evidence. The discipline is emerging under regulatory pressure (EU AI Act
    dataset transparency, NIST AI RMF data lineage) and customer demand. Five
    Section 8.11 deliverables operationalise the discipline: SBOM generator,
    pipeline audit harness, source reputation tracker, foundation provider
    risk assessor, and contamination indicator scanner. Section 8.11 closes the
    supply chain coverage of Chapter 8 (with Sections 8.9 and 8.10) and feeds
    into Section 8.15 production pipeline integration. Sections 8.12-8.14 next
    cover detection primitives, defensive training, and federated/gradient
    poisoning before Section 8.15 wires everything into the production auditing
    pipeline.

  key_takeaways:
    - 'Pre-training corpora are aggregated supply chains with source-specific contamination mechanisms'
    - 'Five principal sources have distinct contamination surfaces: Common Crawl, Wikipedia, GitHub, community sites, book corpora'
    - 'Foundation-model inheritance propagates pre-training contamination to every downstream consumer'
    - 'Consumer-side defensive lever is foundation provider risk assessment, not direct contamination remediation'
    - 'Dataset SBOM provides the documentation template; data pipeline audits provide the verification'
    - 'Regulatory mandate (EU AI Act, NIST AI RMF) is driving foundation-provider transparency upward'
    - 'Open data is not inherently clean data; same provenance discipline applies regardless of openness'
    - 'Establish provenance disciplines as security controls now, not as compliance retrofit later'

preview_section_12:
  title: 'Detection Primitives: Spectral Signatures, Activation Clustering, Neural Cleanse, STRIP, Meta-Classifiers'
  connection: |
    Sections 8.1 through 8.11 established the complete attack catalogue:
    fundamentals (8.1-8.6), LLM-specific data-pipeline attacks (8.7-8.8), and
    supply chain attacks (8.9-8.11). Section 8.12 begins the defensive
    infrastructure half of Chapter 8 by detailing the principal detection
    primitives: spectral signatures, activation clustering, Neural Cleanse,
    STRIP input-perturbation entropy, and meta-classifiers. Each primitive has
    been referenced extensively in earlier sections coverage maps; Section
    8.12 provides the technical depth -- mechanics, reference implementations,
    coverage characteristics, deployment patterns. Section 8.12 is the largest
    section in Chapter 8 (estimated 8 pages) because it is the technical
    foundation for the production auditing pipeline that Section 8.15 will
    integrate. Sections 8.13 and 8.14 then cover defensive training and
    federated/gradient poisoning before Section 8.15 capstones the chapter.

