  - table: 4
    title: 'Detection Signals: Prompt Extraction vs Legitimate Use'
    description: |
      Distinguishes prompt extraction query patterns from legitimate user behaviour
      across the signals monitored by the Section 9.11 query monitor.
    columns:
      - 'Signal'
      - 'Legitimate User Pattern'
      - 'Prompt Extraction Pattern'
      - 'Monitor Track'
    rows:
      - signal: 'Query semantic focus'
        legitimate: 'Queries about product domain (tasks the product is designed for)'
        extraction: 'Queries about model behaviour, capabilities, and restrictions'
        monitor_track: 'Semantic cluster analysis: meta-query concentration per user'
