document_info:
  title: 'Section 9.6: Membership Inference'
  subtitle: 'Detecting Training Set Membership via Overfitting Signals'
  chapter: 9
  section: 6
  author: 'Raghav Dinesh'
  github: 'https://github.com/ruwgxo/ai-security-mastery'
