  - 'Chapter 1: overfitting, generalisation gap, and train vs test accuracy (overfitting mechanism fully explained there; this section applies it as attack)'
  - 'Chapter 2: cross-entropy loss, confidence scores, softmax (loss-based and confidence-based attack signals)'
  - 'Chapter 8 Section 8.13: differential privacy training (upstream defence; this section explains why it is required)'
  - 'Section 9.1: inference-time threat model (black-box access level; adversary sees only model outputs)'
