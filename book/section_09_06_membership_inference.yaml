section_overview:
  one_line_summary: |
    Membership inference exploits the same overfitting that hurts generalisation:
    a model optimised on training data assigns higher confidence and lower loss
    to members than to non-members, leaking individual data inclusion through
    the inference API and constituting a regulated privacy violation wherever
    training data is personally identifiable.

  why_this_section_exists: |
    Sections 9.3 through 9.5 covered attacks that steal what the model knows
    or how it is configured. Section 9.6 opens the privacy attack arc: attacks
    that exploit the inference API to extract information about the training
    data itself, rather than the model''s learned behaviour. Membership inference
    is the entry point: it answers the question "was this specific record in the
    training set?" without reconstructing the record''s content.

    The Chapter 1 preview of overfitting as a property that reduces generalisation
    accuracy gains a second meaning here: the same memorisation that causes a
    model to overfit its training data is the signal that membership inference
    exploits. A model that memorises training examples assigns them higher
    confidence and lower loss than it assigns to unseen inputs drawn from the
    same distribution. This gap is measurable through the inference API without
    access to model weights.

    The privacy consequence is direct. If the training data contains personally
    identifiable information -- medical records, financial data, user-generated
    content -- membership inference determines whether a specific individual''s
    data was used to train the model. This is a HIPAA violation if the model
    was trained on protected health information without proper authorisation.
    It is a GDPR right-to-erasure violation if the model was trained on EU
    personal data and the individual has exercised their erasure right. The
    inference API becomes a privacy audit tool in the adversary''s hands.

    Section 9.6 builds the attack in two variants (confidence-based and
    loss-based), implements the shadow model attack (Shokri et al. 2017),
    and introduces the simpler threshold attack that does not require shadow
    model training. The defence connection to differential privacy training
    (Section 8.13) is made explicit: DP training is the upstream defence
    that bounds per-example information leakage; output perturbation
    (Section 9.12) is the downstream control that reduces signal visibility
    at the API level.

  position_in_chapter: |
    Section 9.6 of 13. First privacy attack section. Opens the two-section
    privacy arc (9.6 membership inference, 9.7 model inversion) that shares
    the inference-time attack surface with the four extraction goals. Establishes
    the overfitting-as-privacy-leakage mechanism that Section 9.7 extends to
    full training data reconstruction. The differential privacy training
    connection made here recurs in Section 9.7.

learning_objectives:
  knowledge:
    - 'Explain the overfitting mechanism that enables membership inference: why training members have higher confidence and lower loss'
    - 'Describe confidence-based and loss-based membership inference and when each applies'
    - 'Explain the shadow model attack (Shokri et al. 2017): how shadow models learn the membership classifier'
    - 'Describe the threshold attack as a simpler alternative that does not require shadow model training'
    - 'Articulate why membership inference against a model trained on PII is a HIPAA and GDPR violation'
    - 'Explain how differential privacy training bounds membership inference success'

  skills:
    - 'Implement confidence-based membership inference against a binary classifier and measure attack accuracy'
    - 'Implement loss-based membership inference and compare to the confidence baseline'
    - 'Build a shadow model attack following the Shokri et al. 2017 framework'
    - 'Implement a threshold attack and tune the threshold against a validation membership set'
    - 'Analyse a training dataset for privacy exposure under HIPAA and GDPR membership inference threat models'

  security_mindset:
    - 'Internalise that overfitting is simultaneously a generalisation problem and a privacy problem -- the same property causes both'
    - 'Recognise that membership inference against production models trained on PII is a current, regulated, legal liability'
    - 'Understand that differential privacy training is the upstream defence -- output perturbation reduces signal but does not bound information leakage the way DP does'
    - 'Appreciate that the membership inference signal is available through the standard inference API without any special access'

