prose_content:

  - part: 1
    title: 'The Overfitting Connection: Chapter 1 Mechanism Returns as Privacy Attack'
    body: |
      Chapter 1 introduced overfitting as a property that hurts model performance:
      a model that memorises its training data learns the noise and idiosyncrasies
      of training examples rather than the underlying pattern, producing high
      training accuracy but poor generalisation to unseen data. The Chapter 1
      treatment was diagnostic -- overfitting is something to detect and prevent
      through regularisation, early stopping, and validation monitoring.

      Section 9.6 reframes the same property from the adversary''s perspective.
      Overfitting is not only a performance problem; it is a privacy leak. A model
      that has memorised a training example responds to that example differently
      than it responds to a similar but unseen example drawn from the same
      distribution. The memorised example receives higher confidence, lower loss,
      and in extreme cases, near-certain predictions that deviate from the model''s
      typical uncertainty on that input class. This differential response is
      detectable through the inference API.

      The privacy consequence depends on what the training data contains. For a
      model trained on public benchmark data, membership inference reveals which
      benchmark examples were in the training set -- interesting academically but
      low consequence. For a model trained on medical records, financial
      transactions, legal documents, or user-generated content, membership
      inference answers the question "was this specific person''s data used to
      train this model?" against the operator''s stated privacy policy and
      applicable regulation. The inference API becomes a compliance audit
      instrument.

      The attack surface is the same as extraction: the standard inference API.
      No special access is required. The adversary submits a target record --
      a medical note, a financial transaction, a user''s chat history -- and
      observes whether the model''s confidence and loss on that record are
      consistent with it having been a training example. High confidence
      relative to the non-member baseline is the member signal.

  - part: 2
    title: 'Confidence-Based Membership Inference: The Foundational Signal'
    body: |
      Confidence-based membership inference uses the model''s predicted class
      probability as the membership signal. The key observation is that a model
      trained on an example assigns higher maximum confidence to that example
      than to a similarly structured non-member example. The confidence gap is
      the product of overfitting: the model has seen the training example during
      optimisation and has adjusted its parameters to produce a confident
      prediction on it.

      The attack is straightforward. The adversary submits the target record
      to the model and observes the maximum predicted probability (the confidence
      of the top-1 prediction). They compare this confidence to a threshold:
      if confidence exceeds the threshold, the record is predicted to be a
      training member; below the threshold, a non-member. The threshold is
      calibrated either from shadow model experiments (Section 9.6.3) or from
      a small set of known members and non-members the adversary can access.

      The attack accuracy depends on the model''s generalisation gap. A model
      with large overfitting -- high train accuracy, low test accuracy -- has
      a large confidence gap between members and non-members, making membership
      inference highly accurate. A well-regularised model with small overfitting
      has a small confidence gap, reducing attack accuracy toward the random
      baseline (50% for binary classification).

      This dependency is the mechanistic connection to Chapter 1: reducing
      overfitting through regularisation, data augmentation, and early stopping
      simultaneously improves generalisation and reduces membership inference
      accuracy. Models trained with strong regularisation are harder to attack
      via membership inference -- not because the attack is blocked, but because
      the signal it exploits is weaker.

      The attack works without knowing the true training set. The adversary
      needs only the target record and a set of non-member records drawn from
      the same distribution to calibrate the threshold. For many threat scenarios
      -- an adversary who knows that a competitor''s model was trained on a
      specific dataset and wants to confirm whether a specific record was included
      -- this is a realistic capability.

  - part: 3
    title: 'Loss-Based Membership Inference: The Symmetric Signal'
    body: |
      Loss-based membership inference uses the model''s cross-entropy loss on
      the target record and its true label as the membership signal. Training
      set members were optimised to minimise this loss; the model has seen their
      (input, label) pairs during training and has adjusted its parameters to
      predict the correct label with high confidence. The loss on training members
      is systematically lower than on non-members.

      The loss signal is the symmetric dual of the confidence signal. High
      confidence on the correct class implies low cross-entropy loss; low
      confidence implies high loss. For binary classification with a single
      output probability p, the cross-entropy loss is -log(p) for the correct
      class: maximising p is equivalent to minimising the loss. The two signals
      are formally equivalent for binary classification with known true labels.

      For multi-class classification, the relationship is less tight. A model
      can have high confidence on the wrong class (high max confidence, high
      loss on the correct class) -- which would fool a confidence-based detector
      if the adversary does not know the true label but would be correctly
      identified as a non-member by the loss-based detector which requires the
      true label.

      The practical requirement for loss-based inference is that the adversary
      knows the true label of the target record. For many membership inference
      scenarios this is satisfied: the adversary who wants to determine whether
      a specific medical record was in the training set already possesses that
      record with its true diagnosis label. For scenarios where the adversary
      does not have the true label -- attempting to infer membership of an
      unlabelled record -- confidence-based inference is the applicable variant.

      Song and Mittal 2021 ("Systematic Evaluation of Privacy Risks of Machine
      Learning Models") demonstrated that loss-based membership inference is
      the most reliably accurate attack across a wide range of model architectures
      and training configurations when the true label is available. Confidence-
      based inference is applicable more broadly but is somewhat less accurate.
      Both should be implemented and compared for any serious privacy audit.

  - part: 4
    title: 'Shadow Model Attacks: The Shokri et al. 2017 Framework'
    body: |
      The Shokri et al. 2017 paper "Membership Inference Attacks Against Machine
      Learning Models" introduced the shadow model framework, which remains the
      canonical reference for membership inference attacks. The framework solves
      a practical problem: the adversary does not know the distribution of
      confidence scores for members versus non-members in the target model,
      making threshold calibration difficult without known ground-truth membership
      labels.

      The shadow model approach trains a set of shadow models that mimic the
      target model''s behaviour. Each shadow model is trained on a known subset
      of available data, where the adversary knows exactly which records are
      in-training (members) and which are held out (non-members). After training,
      the adversary queries each shadow model on both its training members and its
      held-out non-members, collecting the (confidence_vector, membership_label)
      pairs as a labelled dataset for a meta-classifier.

      The meta-classifier learns to distinguish the confidence distribution of
      members from non-members based on the shadow model experiments. Because the
      shadow models are trained on data from the same distribution as the target
      model, the meta-classifier''s learned boundary generalises to the target
      model: the confidence distribution of members in the target model is similar
      to the confidence distribution of members in the shadow models.

      The meta-classifier is typically a simple binary classifier -- logistic
      regression or a small neural network -- trained on the (confidence_vector,
      membership_label) pairs from all shadow models combined. At attack time,
      the adversary queries the target model for the target record, obtains its
      confidence vector, and passes it through the meta-classifier to obtain
      a membership prediction.

      The power of the shadow model approach is transferability: a meta-classifier
      trained on shadow models of different architecture than the target still
      achieves substantial attack accuracy if the training distribution is matched.
      This means the adversary does not need to know the target model''s architecture
      -- only the approximate distribution of the training data -- to mount an
      effective shadow model attack.

      Shokri et al. demonstrated attack accuracy of 73 to 95 percent on commercial
      ML APIs using shadow models, substantially above the random 50 percent
      baseline. The attack was particularly accurate against models with high
      overfitting and against models trained on small datasets where every training
      example received disproportionate parameter adjustment.

  - part: 5
    title: 'Threshold Attacks: The Simpler Approach'
    body: |
      The threshold attack is a simplified membership inference variant that
      does not require shadow model training. The adversary directly thresholds
      on a single scalar signal -- maximum confidence or cross-entropy loss --
      rather than training a meta-classifier on the full confidence vector.
      Despite its simplicity, the threshold attack achieves attack accuracy
      competitive with the shadow model approach in many practical settings,
      particularly when the model has a large generalisation gap.

      The threshold attack procedure has two stages. In the calibration stage,
      the adversary identifies a small set of known training members (records
      the adversary knows were in the training set) and a set of known non-members
      (records the adversary knows were not). They query the target model on both
      sets and observe the distribution of the chosen signal (confidence or loss)
      for each group. The threshold is set at the value that maximally separates
      the two distributions -- typically the midpoint between the means, or the
      value that maximises the F1 score on the calibration set.

      In the inference stage, the adversary queries the target model for the
      target record, obtains the signal value, and compares it to the threshold.
      Records above the confidence threshold (or below the loss threshold)
      are predicted as members.

      The threshold attack''s advantage over the shadow model approach is
      operational simplicity: no separate shadow model training infrastructure
      is required, and the calibration can be performed with as few as ten
      known members and ten known non-members. For an adversary whose goal is
      a quick membership check on a small set of target records, the threshold
      attack is the appropriate tool.

      The threshold attack''s limitation is sensitivity to model and distribution
      shift. If the target model''s confidence distribution differs substantially
      from the calibration set''s distribution -- because the model architecture
      is different, the training procedure is different, or the calibration set
      is drawn from a different distribution -- the threshold will be miscalibrated
      and attack accuracy will degrade. The shadow model approach is more robust
      to these shifts because it learns the meta-classifier from models that
      share the target''s training distribution.

  - part: 6
    title: 'Membership Inference Against LLMs: The Training Data Extraction Precursor'
    body: |
      Membership inference against LLMs uses a different signal than for
      classifiers. LLMs do not output class probability vectors over a fixed
      label set; they generate token sequences. The membership signal for LLMs
      is perplexity: the average per-token cross-entropy loss that the model
      assigns to a text sequence. A model that has memorised a text sequence
      assigns it low perplexity; a model that has not seen the sequence assigns
      it higher perplexity consistent with the base distribution.

      Low perplexity on a specific text is the member signal: if the model assigns
      a target document lower perplexity than it assigns to similar documents
      drawn from the same distribution, the target document is likely a training
      member. Carlini et al. 2019 ("The Secret Sharer") demonstrated this
      systematically: canary sequences inserted into training data were assigned
      significantly lower perplexity by models that had seen them during training
      than by models that had not.

      The LLM membership inference threat model has high practical consequence.
      Many commercially deployed LLMs were trained on internet-sourced data that
      contains personally identifiable information, copyrighted material, and
      sensitive documents whose inclusion was not explicitly authorised. An
      adversary who can determine with high probability that a specific document
      was in the training set has evidence for a range of legal claims: GDPR
      data subject rights, copyright infringement, privacy torts, and regulatory
      compliance violations.

      Membership inference against LLMs also serves as the precursor to the
      model inversion attack in Section 9.7. The inversion attack reconstructs
      training data content; membership inference determines which records are
      worth targeting for reconstruction. A combined attack queries the model
      for many candidate records, identifies the high-probability members via
      perplexity scoring, and then applies inversion techniques to reconstruct
      the exact content of those members.

      The defence connection for LLM membership inference is the same as for
      classifiers: differential privacy training (Section 8.13) bounds the
      information leakage per training token and reduces the perplexity gap
      between members and non-members. At very tight privacy budgets, DP
      training makes the perplexity signal indistinguishable from noise at
      the cost of degraded model capability. The utility-privacy tradeoff is
      steeper for LLMs than for classifiers because perplexity-based performance
      is sensitive to the randomness that DP introduces into the gradient updates.

  - part: 7
    title: 'Privacy Implications: HIPAA, GDPR, and Membership Inference as Regulated Harm'
    body: |
      Membership inference is not only a technical attack -- it is a legally
      consequential one wherever training data is subject to privacy regulation.
      Two regulatory frameworks make membership inference against production
      models a current legal liability.

      Under HIPAA, protected health information (PHI) includes individually
      identifiable health data. A model trained on medical records is likely
      trained on PHI if the records include names, dates, geographic identifiers,
      or other direct or indirect identifiers. Membership inference against such
      a model determines whether a specific patient''s records were in the training
      set -- a disclosure of PHI to the adversary without the patient''s
      authorisation and without the covered entity''s awareness. This constitutes
      a HIPAA privacy rule violation. The breach notification rule requires
      covered entities to notify affected individuals when PHI is disclosed without
      authorisation; the difficulty is that the operator may not know a membership
      inference attack occurred unless they are monitoring for it.

      Under GDPR, the right to erasure (Article 17) allows data subjects to
      request deletion of their personal data. For models trained on EU personal
      data, erasure requests require that the data subject''s information be
      removed from the training set and that the model be retrained or adjusted
      accordingly. Membership inference provides a mechanism for data subjects
      to verify whether their erasure request was implemented: if the model still
      assigns higher confidence to the data subject''s records than to similar
      non-member records, the erasure may not have been effective. Regulators
      have begun treating this verification mechanism as a data subject right.

      Beyond specific regulations, membership inference represents a fundamental
      breach of the implicit contract between model operators and data subjects.
      When a user''s data is used to train a model, the expectation is that the
      model does not expose the data through its predictions. Membership inference
      demonstrates that this expectation is not technically guaranteed by default --
      it requires active defence through differential privacy training,
      and even then only up to a measurable privacy budget ε.

  - part: 8
    title: 'Defence Connections: Differential Privacy Training and Output Perturbation'
    body: |
      Membership inference has two defensive layers, operating at different
      points in the model lifecycle.

      The upstream defence is differential privacy training from Section 8.13.
      DP training adds calibrated noise to gradient updates during training,
      bounding the influence of any individual training example on the model''s
      parameters. The privacy budget ε quantifies this bound: lower ε means
      stronger privacy guarantee but more noise added to gradients, which
      degrades model accuracy. Formally, DP training guarantees that an
      adversary''s ability to distinguish a model trained with a specific record
      from a model trained without it is bounded by the factor exp(ε). At ε = 1,
      this factor is approximately 2.7x -- a substantial but not absolute bound.

      The practical consequence for membership inference: a model trained with
      DP has a smaller confidence and loss gap between members and non-members
      because the gradient noise during training prevents any individual example
      from dominating the parameter updates. Attack accuracy on DP-trained models
      degrades toward the random baseline as ε decreases. At ε ≈ 1 to 3, attack
      accuracy drops to 55 to 65 percent compared to 75 to 95 percent for non-DP
      models -- still above the random baseline but substantially reduced.

      The downstream defence is output perturbation from Section 9.12. Output
      perturbation adds calibrated noise to model predictions at inference time,
      reducing the precision of the confidence signal available to the adversary.
      If the model''s confidence on a training member is 0.92 but the API returns
      a perturbed value drawn from a distribution around 0.92, the adversary''s
      threshold calibration becomes less precise. Perturbation does not bound
      information leakage the way DP training does -- a patient adversary with
      enough queries can average out the perturbation noise -- but it raises
      the query budget required for accurate threshold calibration.

      The correct architecture is DP training as the primary control, output
      perturbation as the secondary signal-reduction control, and query pattern
      monitoring (Section 9.11) to detect systematic membership probing campaigns
      that issue many queries against a target record to average out perturbation
      noise. All three controls are required for production deployment of models
      trained on sensitive personal data.

