key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Direct injection places the adversary in the user turn. They are
        observable at the session and network layer but not always distinguishable
        from legitimate users without input classification.

    - number: 2
      takeaway: |
        Role override exploits instruction-following -- the model's primary
        learned capability. It succeeds because the attention mechanism cannot
        distinguish the adversary's instruction from a legitimate one based on
        provenance alone.

    - number: 3
      takeaway: |
        Context flooding does not override the system prompt. It dilutes it
        by reducing the relative attention weight of the system prompt across
        a larger context window. Defences that check only for explicit override
        language miss this pattern entirely.

    - number: 4
      takeaway: |
        System prompt extraction is reconnaissance for higher-impact attacks.
        An adversary who knows the exact system prompt can craft injection payloads
        precisely tuned to the instructions they are trying to override.

    - number: 5
      takeaway: |
        Goal hijacking and confidence manipulation both require output-layer
        monitoring to catch cases where the input classifier misses the payload.
        Input classification alone is insufficient for complete coverage.

    - number: 6
      takeaway: |
        Output format hijacking targets post-processing defences, not the model
        itself. The defence architecture must decode and normalise model output
        before applying content classifiers. Raw output filtering is insufficient.

    - number: 7
      takeaway: |
        Keyword blocklists are structurally unwinnable against adversaries with
        iteration time. The substitution space for natural language is infinite;
        the adversary can iterate in minutes while the defender patches in days.

    - number: 8
      takeaway: |
        Three detection layers are required for complete direct injection coverage:
        lexical signals (fast, bypassable) at the input layer; semantic intent
        classification (Section 6.17) at the input layer; behavioural output
        monitoring at the output layer. Missing any layer creates exploitable gaps.


