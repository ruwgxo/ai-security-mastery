section_summary: |
  Section 6.2 built the complete direct injection taxonomy: eight variants,
  three detection layers, and the structural argument for semantic classifiers.
  Role override exploits correct model behaviour -- instruction-following cannot
  be disabled without disabling the model's utility. Context flooding dilutes
  system prompt influence without explicit contradiction, defeating defences
  that check only for override language. System prompt extraction is reconnaissance
  that enables more precisely targeted follow-on attacks. Goal hijacking and
  confidence manipulation both require output-layer monitoring because the input
  signal is often weak or absent. Output format hijacking targets post-processing
  defences, requiring output normalisation before classification.

  The structural argument against keyword blocklists is now complete. The
  substitution space is infinite. The adversary iteration cycle is faster than
  the defender patch cycle. Empirical defeat rates against production-representative
  blocklists exceed 70% at synonym-substitution level and approach 100% at
  structural reframing level. Blocklists eliminate unsophisticated attacks. They
  are not a primary defence.

  Section 6.3 extends the attack surface into gradient-based jailbreaks -- attacks
  that operate at the token level and are invisible to lexical signals by design.
  Section 6.17 builds the semantic classifier that addresses the full direct
  injection taxonomy at production FPR.
...
