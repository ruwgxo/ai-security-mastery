key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Indirect injection leaves no trace on the target application. The adversary's
        footprint is entirely in the external data source. Detection requires
        classifying retrieved content, not user input.

    - number: 2
      takeaway: |
        The RAG pipeline has five injection entry points. The critical gap in most
        production deployments is Stage 4 -- pre-assembly classification of retrieved
        chunks. Classifiers at Stage 1 (ingestion) and Stage 5 (output) do not
        substitute for Stage 4.

    - number: 3
      takeaway: |
        Chunk-level injection sizes the payload to the retrieval window and uses
        chunk boundary exploitation to produce a clean embedding vector dominated
        by the payload content. Adversaries who know the chunking strategy can
        optimise payload placement precisely.

    - number: 4
      takeaway: |
        Embedding poisoning engineers high cosine similarity to target queries using
        semantic content engineering, not gradient access. The detection signal is
        anomalously flat cross-query similarity distribution -- legitimate documents
        have peaked, topic-specific distributions.

    - number: 5
      takeaway: |
        Invisible injection (zero-width characters, low-contrast text, whitespace
        padding, metadata fields) passes visual review entirely. Full-text extraction
        combined with the normalisation pipeline reveals the hidden payload.

    - number: 6
      takeaway: |
        Persistent injection affects all users whose queries retrieve the poisoned
        chunk, across many sessions, until detected and purged. The persistence
        makes RAG injection higher-impact than session-scoped direct injection.

    - number: 7
      takeaway: |
        Ingestion-time scanning creates a false sense of security. Payloads designed
        to pass ingestion checks and activate at retrieval time bypass this control.
        Stage 4 pre-assembly classification at retrieval time is the necessary
        complementary control.

    - number: 8
      takeaway: |
        Complete RAG injection defence requires three stages: ingestion scanning
        (Stage 1), pre-assembly per-chunk classification (Stage 4, primary), and
        output monitoring (Stage 5, backstop). Three independent layers must all
        fail for an injection to succeed without detection.


