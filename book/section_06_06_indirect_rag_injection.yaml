learning_objectives:
  primary: |
    Build complete technical understanding of RAG pipeline injection mechanics
    across all five pipeline stages, implement and detect embedding poisoning
    and invisible injection techniques, and specify the pre-assembly classifier
    placement architecture that closes the primary indirect injection gap in
    production RAG deployments.
  by_end_of_section:
    - "Define indirect injection precisely and explain why it is harder to detect than direct injection"
    - "Map the five RAG pipeline stages and identify the injection entry point at each stage"
    - "Explain document-level and chunk-level injection and how adversaries size payloads to retrieval windows"
    - "Describe embedding poisoning and how adversaries engineer high cosine similarity for adversarial documents"
    - "Explain invisible injection techniques including zero-width characters, low-contrast text, and whitespace padding"
    - "Define persistent indirect injection and why it survives content moderation applied only at ingestion time"
    - "Specify the injection classifier placement architecture for RAG deployments"
    - "Build and evaluate a RAG injection test suite covering all five entry points"


