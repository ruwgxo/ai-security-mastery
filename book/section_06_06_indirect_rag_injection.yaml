section_summary: |
  Section 6.6 built the complete RAG injection attack and defence architecture.
  Indirect injection leaves no trace on the target application -- the adversary
  interacts only with the external data source, making the detection surface
  the retrieved content pipeline rather than the user input pipeline. The five
  RAG pipeline stages each present an injection entry point; the critical gap
  in most production deployments is Stage 4, pre-assembly classification of
  retrieved chunks before they enter the LLM context.

  Document-level injection embeds payloads in legitimate-appearing documents.
  Chunk-level injection sizes payloads to retrieval windows and exploits chunk
  boundaries to produce clean embedding vectors. Embedding poisoning engineers
  high cosine similarity to target queries through semantic content engineering,
  making adversarial documents outcompete legitimate ones in retrieval ranking.
  Invisible injection uses zero-width characters, low-contrast text, whitespace
  padding, and document metadata to hide payloads from visual review while
  remaining fully extracted by text processing pipelines. Persistent injection
  affects all users whose queries retrieve the poisoned chunk across many sessions.

  The defence architecture is three-layer: ingestion scanning (Stage 1) reduces
  the volume of poisoned content entering the knowledge base; pre-assembly per-
  chunk classification (Stage 4) intercepts payloads at retrieval time; output
  monitoring (Stage 5) catches what both input layers miss. Ingestion-time
  scanning alone is insufficient because payloads can be designed to survive
  ingestion checks and activate at retrieval time.

  Section 6.7 extends the same indirect injection analysis to web browsing
  and search retrieval -- the surface involved in the Bing Chat incident
  analysed in Section 6.14.
