section_summary: |
  Section 6.11 established multi-turn injection as the attack class that breaks
  most production injection defences. The structural blind spot is clear: single-
  turn classifiers evaluate each message in isolation; multi-turn attacks distribute
  the injection across messages so each individual turn appears benign while the
  conversation trajectory constitutes the attack.

  The five documented patterns cover the full design space: gradual authority
  escalation (steers the conversation to a position from which the exploit is
  contextually natural), anchor-then-exploit (plants a belief early for invocation
  later), rapport building (leverages accumulated trust), conversation history
  poisoning (inserts fabricated assistant turns), and session replay (submits
  a pre-recorded successful history).

  Stateful detection is the required architectural response, maintaining four
  trajectory metrics across the session: cumulative injection score, semantic
  domain drift, authority claim density, and prior-claim invocation frequency.
  Session-level thresholds trigger alerts when trajectory analysis indicates
  multi-turn patterns. Server-side canonical history with turn hashing prevents
  conversation history poisoning. Session isolation prevents cross-session
  injection but leaves all within-session patterns unaddressed without the
  stateful detector.

  Section 6.12 extends multi-turn patterns to persistent agents with memory --
  where injection can span not just turns within a session but sessions across
  time, creating dormant payloads that activate in future interactions.
...
