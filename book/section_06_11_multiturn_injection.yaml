key_takeaways:
  count: 8
  items:
    - number: 1
      takeaway: |
        Single-turn classifiers are architecturally blind to multi-turn injection.
        Each setup turn looks individually clean; the attack is the cumulative
        effect of the turn sequence on the model's context state. Stateful
        detection is the required architectural response.

    - number: 2
      takeaway: |
        Conversation history poisoning inserts fabricated assistant turns to
        establish false permissions. Server-side canonical history with turn
        hashing is the structural defence -- the server maintains the ground-truth
        history the client cannot modify.

    - number: 3
      takeaway: |
        Gradual context shift keeps every individual turn below detection
        thresholds while the cumulative trajectory constitutes the attack.
        A trajectory metric measuring semantic drift from the expected domain
        across the full turn sequence is the required detection signal.

    - number: 4
      takeaway: |
        Anchor injection plants beliefs in early turns for exploitation in later
        turns, potentially separated by many benign turns. Stateful detection
        must track claimed authority and flag turns that invoke prior claims
        for privilege escalation.

    - number: 5
      takeaway: |
        Session replay injection submits a pre-recorded successful injected
        history to bypass the real-time escalation phase. Session boundary
        enforcement -- rejecting client-supplied history on session start --
        is the primary structural defence.

    - number: 6
      takeaway: |
        Stateful detection accumulates four metrics: cumulative injection score,
        topic trajectory drift, authority claim density, and prior-claim invocation
        frequency. Session-level thresholds trigger alerts when any metric
        indicates a multi-turn pattern, even when no single turn exceeded threshold.

    - number: 7
      takeaway: |
        Session isolation prevents cross-session injection but does not prevent
        within-session multi-turn attacks. All five documented patterns complete
        within a single session. Both session isolation and stateful detection
        are required -- neither alone is sufficient.

    - number: 8
      takeaway: |
        The stateful session state must be server-side and authoritative. Client-
        side session state can be reset or manipulated. The session state is
        keyed by server-generated, non-predictable session tokens that the
        client cannot forge.


