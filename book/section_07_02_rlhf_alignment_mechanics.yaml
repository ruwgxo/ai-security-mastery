code_examples:

  - id: "7.2.code.01"
    title: "Refusal Probability Distribution Visualiser"
    description: |
      Conceptual demonstration of alignment as a distribution shift, not a hard
      block. Simulates a model's output token probability distribution on a harmful
      request before and after alignment training, showing that alignment reduces
      harmful token probability without setting it to zero.
      Requires: numpy, matplotlib.
    language: "python"
    filename: "code/ch07/alignment_distribution_viz.py"
    code: |
      import numpy as np
      import matplotlib.pyplot as plt


      def simulate_output_distribution(
          mean_harmful: float,
          std: float = 0.15,
          n_outputs: int = 1000,
          seed: int = 42,
      ) -> np.ndarray:
          '''
          Simulate a model output distribution over a [0, 1] harmful-content axis.
          0 = fully harmless output. 1 = fully harmful output.
          Returns array of simulated output positions on this axis.
          '''
          rng = np.random.default_rng(seed)
          raw = rng.normal(loc=mean_harmful, scale=std, size=n_outputs)
          return np.clip(raw, 0.0, 1.0)


      def plot_alignment_effect():
          '''
          Show three distributions on the harmful-content axis:
          1. Pre-trained base model: centred toward producing content that
             reflects training corpus distribution (including harmful content).
          2. RLHF-aligned model: distribution shifted left -- harmful outputs
             are low probability, but the distribution still has a tail above
             the jailbreak threshold.
          3. Jailbreak success: adversarial input shifts the effective mean
             back toward harmful region even for the aligned model.
          '''
          fig, axes = plt.subplots(1, 3, figsize=(15, 4), sharey=True)

          scenarios = [
              {
                  'label': 'Pre-trained base model\n(no alignment)',
                  'mean': 0.5,
                  'color': '#d62728',
                  'jailbreak_threshold': None,
              },
              {
                  'label': 'RLHF-aligned model\n(normal operation)',
                  'mean': 0.15,
                  'color': '#2ca02c',
                  'jailbreak_threshold': 0.6,
              },
              {
                  'label': 'RLHF-aligned model\n(under jailbreak)',
                  'mean': 0.45,
                  'color': '#ff7f0e',
                  'jailbreak_threshold': 0.6,
              },
          ]

          harmful_threshold = 0.6

          for ax, scenario in zip(axes, scenarios):
              outputs = simulate_output_distribution(scenario['mean'])
              ax.hist(outputs, bins=50, density=True, color=scenario['color'],
                      alpha=0.7, edgecolor='white', linewidth=0.3)
              ax.axvline(x=harmful_threshold, color='red', linestyle='--',
                         linewidth=2, label=f'Harmful threshold ({harmful_threshold})')
              ax.set_xlabel('Harmful content score (0=harmless, 1=harmful)')
              ax.set_ylabel('Probability density' if ax == axes[0] else '')
              ax.set_title(scenario['label'])
              ax.set_xlim(0, 1)

              p_harmful = np.mean(outputs >= harmful_threshold)
              ax.text(0.65, ax.get_ylim()[1] * 0.85,
                      f'P(harmful) = {p_harmful:.3f}',
                      fontsize=10, color='red')
              ax.legend(fontsize=8)

          plt.suptitle(
              'Alignment as distribution shift, not capability removal\n'
              'Jailbreaks move the effective input into a higher-harm region',
              fontsize=12, y=1.02,
          )
          plt.tight_layout()
          plt.savefig('alignment_distribution_effect.png', dpi=150,
                      bbox_inches='tight')
          print('Saved: alignment_distribution_effect.png')
          print()
          print('Key observation:')
          print('  Base model:        P(harmful) approx 0.50')
          print('  Aligned (normal):  P(harmful) approx 0.02')
          print('  Aligned (jailbreak): P(harmful) approx 0.40')
          print()
          print('Alignment reduced P(harmful) by ~96% in normal operation.')
          print('Jailbreak restored P(harmful) to ~80% of base model level.')
          print('The capability was never removed -- only suppressed.')


      if __name__ == '__main__':
          plot_alignment_effect()

  - id: "7.2.code.02"
    title: "Alignment Removal via Fine-Tuning: Concept Sketch"
    description: |
      Skeleton of the fine-tuning alignment removal technique for open-weight models.
      Illustrates the training loop structure -- not a functional implementation,
      but a precise description of what adversaries do. Does not require model
      weights. Demonstrates why this is a well-understood threat on open-weight
      models.
    language: "python"
    filename: "code/ch07/alignment_removal_sketch.py"
    code: |
      '''
      Alignment removal via fine-tuning: conceptual sketch.

      This demonstrates the STRUCTURE of the attack -- not a working implementation.
      Purpose: understand what adversaries do so you can detect and defend against it.

      The attack requires:
        1. Access to open-weight model checkpoint
        2. Dataset of uncensored (harmful) completions
        3. Standard fine-tuning loop (identical to SFT phase of RLHF)

      The defence implications:
        1. Closed-model APIs are not directly vulnerable (no weight access)
        2. Open-weight models with removable alignment are used to develop
           transferable jailbreaks (GCG suffixes) that work on closed models
        3. Detection must operate at the API layer, not rely on alignment
      '''

      from dataclasses import dataclass
      from typing import Callable


      @dataclass
      class AlignmentRemovalConfig:
          base_model_checkpoint: str
          uncensored_dataset_path: str
          n_training_steps: int = 500       # Low step count is sufficient
          learning_rate: float = 2e-5
          batch_size: int = 4
          max_seq_len: int = 512
          target_loss: float = 1.5          # Approximate convergence signal


      def describe_alignment_removal_threat(config: AlignmentRemovalConfig) -> dict:
          '''
          Describe what happens during alignment removal fine-tuning.
          Returns a structured threat description, not a training execution.
          '''
          return {
              'phase': 'adversarial_fine_tuning',
              'mechanism': (
                  'Standard SFT training loop on uncensored completions. '
                  'Gradient descent on cross-entropy loss over harmful outputs. '
                  'Identical to the SFT phase that originally instilled instruction '
                  'following -- run on a different objective.'
              ),
              'weight_effect': (
                  'Output distribution shifts back toward pre-training state. '
                  'RLHF-instilled refusal behaviour is overwritten in the weights '
                  'that determine output token probabilities for harm-adjacent inputs. '
                  'Pre-training capability is intact throughout -- it was never removed.'
              ),
              'steps_required': config.n_training_steps,
              'dataset_size_sufficient': '500 to 5000 examples (published research)',
              'result': (
                  'Model retains full pre-training capability and instruction-following '
                  'ability. Refusal behaviour is removed. Alignment tax is reversed. '
                  'Model answers harmful requests that the base aligned model refused.'
              ),
              'transferability': (
                  'GCG adversarial suffixes generated against this fine-tuned model '
                  'transfer to closed-source API models at non-trivial success rates '
                  '(Zou et al. 2023). Open-weight alignment removal enables development '
                  'of closed-model attacks.'
              ),
              'defender_response': (
                  'Closed-model API deployments: not directly vulnerable. '
                  'Indirect threat via transferable suffixes -- deploy perplexity '
                  'detector (Section 7.9) to catch GCG-generated inputs regardless '
                  'of the model they were optimised against. '
                  'Open-weight deployments: treat as unaligned -- infrastructure '
                  'detection is the only reliable defence.'
              ),
          }


      def alignment_removal_risk_assessment(
          deployment_type: str,
      ) -> list:
          '''
          Return risk items relevant to alignment removal for a given deployment type.
          deployment_type: 'closed_api', 'open_weight_self_hosted', 'fine_tuned_on_custom_data'
          '''
          risks = {
              'closed_api': [
                  'LOW: No direct weight access. Alignment removal not possible by external adversary.',
                  'MEDIUM: Transferable GCG suffixes from open-weight fine-tuning can bypass alignment.',
                  'ACTION: Deploy perplexity detector (Section 7.9) on all user inputs.',
              ],
              'open_weight_self_hosted': [
                  'HIGH: Alignment removal via fine-tuning is straightforward with weight access.',
                  'HIGH: Internal adversary with GPU access can strip alignment in hours.',
                  'HIGH: Published techniques (QLoRA on 500 examples) are commodity.',
                  'ACTION: Treat model-level alignment as untrusted. Infrastructure detection is mandatory.',
                  'ACTION: Audit all fine-tuning jobs against base model refusal behaviour.',
              ],
              'fine_tuned_on_custom_data': [
                  'MEDIUM-HIGH: Custom fine-tuning may have inadvertently degraded alignment.',
                  'MEDIUM: Fine-tuning on domain data shifts distribution, may erode refusal coverage.',
                  'ACTION: Run alignment regression tests after every fine-tuning run.',
                  'ACTION: Test refusal behaviour on a standard harmful prompt benchmark post-fine-tune.',
              ],
          }
          return risks.get(deployment_type, ['UNKNOWN deployment type -- assess manually.'])


      if __name__ == '__main__':
          config = AlignmentRemovalConfig(
              base_model_checkpoint='meta-llama/Llama-2-7b-chat-hf',
              uncensored_dataset_path='data/uncensored_completions.jsonl',
          )

          threat = describe_alignment_removal_threat(config)
          print('=== Alignment Removal Threat Description ===')
          for k, v in threat.items():
              print(f'\n{k.upper()}:')
              print(f'  {v}')

          print('\n\n=== Risk Assessment by Deployment Type ===')
          for dtype in ['closed_api', 'open_weight_self_hosted', 'fine_tuned_on_custom_data']:
              print(f'\n{dtype.upper()}:')
              for risk in alignment_removal_risk_assessment(dtype):
                  print(f'  {risk}')

