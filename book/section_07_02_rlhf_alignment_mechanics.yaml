# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "RLHF does not remove capabilities from model weights. It shifts the output\
    \ probability distribution away from harmful outputs. The capability substrate\
    \ from pre-training is intact beneath the alignment."
  - "Every jailbreak technique is an instance of distribution shift: moving the\
    \ input into a region of prompt space where the alignment training distribution\
    \ is sparse, conflicted, or pattern-matched incorrectly."
  - "Reward model hacking means adversarial outputs can satisfy the RLHF proxy\
    \ while violating the original human intent. Output-side safety filters are\
    \ not a complete defence."
  - "Constitutional AI and RLAIF improve alignment coverage and robustness.\
    \ They do not eliminate the fundamental fragility: the capability substrate\
    \ is unchanged, and inference-time mechanisms like many-shot learning operate\
    \ outside the scope of any alignment training technique."
  - "Fine-tuning alignment removal on open-weight models strips RLHF in hours\
    \ with commodity hardware. Closed-model deployments face this as an indirect\
    \ threat via transferable GCG suffixes, not a direct one."
  - "Alignment cannot be a hard constraint: capability and safety share weight\
    \ paths. The security boundary must be at the infrastructure layer -- input\
    \ classifiers, output monitors, session trackers that operate independent\
    \ of the model's own learned behaviour."

