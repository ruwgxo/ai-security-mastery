              'status': 'build_in_ch17',
          },
      ]


      def print_checklist(checklist: list) -> None:
          print('Infrastructure Detection Controls: Alignment Failure Coverage')
          print('=' * 70)
          for item in checklist:
              status_marker = '[BUILT]' if item['status'] == 'built' else f'[{item[\"status\"].upper()}]'
              print(f'\n{status_marker} {item[\"control\"]}')
              print(f'  Addresses: {item[\"alignment_failure_addressed\"]}')
              print(f'  Failure:   {item[\"failure_mode\"]}')
              print(f'  Placement: {item[\"placement\"]}')


      if __name__ == '__main__':
          print_checklist(INFRASTRUCTURE_DETECTION_CHECKLIST)
          built = sum(1 for i in INFRASTRUCTURE_DETECTION_CHECKLIST if i['status'] == 'built')
          total = len(INFRASTRUCTURE_DETECTION_CHECKLIST)
          print(f'\nCoverage: {built}/{total} controls built')
          print(f'Remaining: {total - built} to build in Chapter 7 and beyond')

