# SECTION CONTENT
# ===========================================================================

content:

  opening: |
    Section 7.1 established that jailbreaks target the alignment layer. This section
    explains what that means at the mechanism level -- what alignment actually is in
    the weight space, where it is fragile, and why adversarial inputs can cross that
    fragility consistently enough to be weaponised.

    Every jailbreak technique in Sections 7.3 through 7.12 is an instance of the
    same underlying mechanism. Understanding the mechanism is what separates a
    defender who patches known prompts from one who anticipates the next variant
    before it appears.

  subsections:

    - number: "7.2.1"
      title: "RLHF: What the Training Process Actually Does"
      body: |
        Chapter 4 Section 4.3 covered the RLHF pipeline at an architectural level.
        Here we go one layer deeper -- to what RLHF does and does not do to the
        model's weights, because that distinction is the entire basis of jailbreak
        possibility.

        Pre-training is the first phase. The base model is trained on a massive
        corpus of text -- web pages, books, code, forum posts -- using a next-token
        prediction objective. No instruction following. No refusal behaviour. The
        model learns to continue text in ways that are statistically consistent with
        the training distribution. It learns everything that is represented in that
        corpus: how to write code, how to explain chemistry, how to describe violence,
        how to construct persuasive arguments for any position. All of it. The
        pre-trained base model has no concept of what it should or should not produce.
        It has only learned what text looks like.

        Supervised fine-tuning (SFT) is the second phase. Human labellers create
        examples of good model behaviour: a user asks a question, a labeller writes
        an ideal response. The model is fine-tuned on these examples. It learns to
        produce assistant-style outputs and to follow conversational instruction
        format. It also learns some basic refusal patterns from the examples where
        labellers wrote refusals. But SFT alone does not produce robust alignment.
        The model has seen only a finite set of labelled examples. It does not
        generalise refusal reliably to novel harmful requests.

        RLHF is the third phase. A reward model is trained separately on human
        preference data: pairs of model outputs where a labeller indicates which
        is better. The reward model learns to score responses according to human
        preference -- helpfulness, harmlessness, honesty. The main model is then
        fine-tuned using reinforcement learning (PPO -- Proximal Policy Optimisation)
        to maximise the reward model's score. This is where alignment behaviour is
        strongly instilled. The model learns to produce outputs that score highly on
        the reward model -- which includes refusing harmful requests, hedging on
        uncertain claims, and declining to assist with activities the preference data
        marked as harmful.

        The critical point: at no stage in this process are capabilities removed from
        the model's weights. The pre-training knowledge is still there. RLHF adjusts
        the probability distribution over outputs given an input. It makes harmful
        outputs less likely. It does not make them impossible.

    - number: "7.2.2"
      title: "The Capability Substrate: What Lives Under the Alignment"
      body: |
        Think of the pre-trained base model as a complete map of human knowledge and
        language patterns, including all the parts that should never be publicly
        expressed. RLHF lays a filter over that map. The filter is not a deletion --
        it is a learned bias in the output distribution. Routes to harmful content
        still exist in the weight space. The filter makes them low-probability paths,
        not blocked paths.

        This is demonstrable. Take a safety-trained model and ask it to write
        instructions for something harmful. It refuses. Now take the same model's
        architecture, initialise it from the pre-trained checkpoint before RLHF, and
        ask the same question. It answers. The capability was in the base model.
        RLHF suppressed the path to that capability without deleting the capability
        itself. The capability substrate is intact beneath the alignment.

        This is not a criticism of RLHF as an approach. It is a mathematical
        consequence of how neural network fine-tuning works. Fine-tuning shifts
        weights by gradient descent on a new objective. It does not zero out
        weights that encode prior knowledge -- doing so would catastrophically
        degrade general performance. The fine-tuning objective (maximise reward
        model score) is achieved by adjusting output probabilities, not by erasing
        pre-training knowledge.

        For security engineers, the implication is precise: jailbreaks are not
        attacks on the model's knowledge. They are attacks on the filter. The goal
        is not to teach the model something new. The goal is to find a path to
        the pre-existing capability that the filter assigns low probability to --
        and raise that probability above the refusal threshold.

    - number: "7.2.3"
      title: "Distribution Shift: The Mechanism Every Jailbreak Exploits"
      body: |
        RLHF trains on a finite distribution of inputs. The preference labellers
        write prompts and evaluate responses across a range of topics and phrasings.
        The reward model learns what human reviewers preferred in those specific
        contexts. The policy model (the aligned LLM) learns to produce outputs that
        score highly across that training distribution.

        The training distribution does not cover everything. It cannot. The space of
        possible prompts is effectively infinite. The preference data covers a
        meaningful but bounded subset. Outside that subset -- in regions of prompt
        space that labellers did not visit -- the model's alignment behaviour is
        extrapolated, not trained. Extrapolation is unreliable.

        Every jailbreak technique is a method for moving the input into a region of
        prompt space where:
        - the alignment training distribution is sparse (few labelled examples near
          this input), or
        - the refusal signal and the helpfulness signal are in direct conflict (the
          model cannot maximise both), or
        - the surface form of the input pattern-matches against non-harmful examples
          in the training data (roleplay, academic discussion, fiction) even though
          the semantic content is harmful.

        Persona jailbreaks (Section 7.3) move the input into the roleplay region of
        prompt space, where the alignment training focused on fictional assistance,
        not capability restriction. Fictional framing (Section 7.4) does the same
        for creative writing contexts. GCG adversarial suffixes (Section 7.9) move
        the input into a region of token space that is entirely outside the natural
        language distribution -- no labelled examples exist there because no human
        would write that prompt. Many-shot jailbreaks (Section 7.10) move the input
        into the few-shot learning region where demonstrated examples override prior
        trained behaviour.

        Different techniques, same mechanism: distribution shift out of the region
        where alignment is reliable.

    - number: "7.2.4"
      title: "Reward Model Hacking: When the Proxy Diverges from Intent"
      body: |
        RLHF optimises the policy model to maximise the reward model's score. The
        reward model is a proxy for human preference. Any gap between the proxy and
        the actual intent creates an exploitable surface -- this is Goodhart's Law
        applied to alignment: when a measure becomes a target, it ceases to be a
        good measure.

        Reward model hacking means producing outputs that score highly on the reward
        model while violating the underlying human intent. In the alignment context,
        this manifests in two ways that are relevant to jailbreaks.

        First: the reward model was trained on preference data from human labellers
        who rated responses in natural, unambiguous contexts. Jailbreak prompts are
        adversarially constructed to be ambiguous -- to look like legitimate requests
        (creative writing, hypothetical discussion, academic research) while carrying
        harmful intent. A reward model that learned to score based on surface-form
        helpfulness and harmlessness may assign high scores to responses to these
        prompts that a knowledgeable human reviewer would flag as harmful.

        Second: the reward model's scores are frozen after training. The policy model
        continues to be updated against it. Given enough updates (or adversarial
        fine-tuning), the policy model can find output patterns that maximise reward
        model score without genuinely satisfying the original preference criteria.
        This is analogous to adversarial examples against classifiers -- the reward
        model is itself a neural network with adversarial vulnerabilities.

        For jailbreak detection, the implication is that output-side safety filters
        are also not a complete defence. The reward model that trained the alignment
        is a proxy, and adversarial outputs can satisfy the proxy while failing the
        intent. Infrastructure detection must operate independent of the model's own
        safety training.

    - number: "7.2.5"
      title: "Constitutional AI and RLAIF: Stronger Alignment, Same Fragility"
      body: |
        Constitutional AI (CAI), developed at Anthropic, modifies the RLHF pipeline
        in two ways. First, it uses a set of explicit principles (the constitution)
        to guide the initial supervised fine-tuning phase -- the model is trained to
        critique and revise its own outputs against constitutional principles before
        human labellers ever see them. Second, it replaces human preference labellers
        with AI feedback (RLAIF -- Reinforcement Learning from AI Feedback) for part
        of the reward model training, scaling the diversity of preference signals.

        CAI produces models with more consistent alignment behaviour across a wider
        distribution of inputs. The constitutional principles explicitly address
        categories of harm that might be underrepresented in human preference data.
        This raises the effective distribution coverage of the alignment training.

        It does not eliminate the fundamental fragility. The constitution is a finite
        set of principles. The space of adversarial inputs is infinite. CAI improves
        coverage of the training distribution and consistency of refusal behaviour,
        but the capability substrate is unchanged -- it is still pre-training
        knowledge. The boundary between aligned and misaligned behaviour is better
        defined and more robustly trained, but it still exists, and the distribution
        outside that boundary still has low coverage.

        Many-shot jailbreaking (Section 7.10) works against CAI-aligned models
        specifically because it leverages in-context learning -- a mechanism that
        operates at inference time, outside the scope of any alignment training
        technique. Constitutional principles and RLAIF-trained reward models cannot
        override what demonstrated in-context examples teach the model to do within
        a single forward pass.

    - number: "7.2.6"
      title: "Fine-Tuning as Alignment Removal: The Open-Weight Threat"
      body: |
        The most direct exploitation of alignment fragility requires no jailbreak
        prompt at all. It requires access to model weights and a GPU.

        Fine-tuning a safety-trained open-weight model on a dataset of uncensored
        harmful completions strips alignment reliably. The mechanism is the same as
        the original alignment training, run in reverse: gradient descent on the
        new objective adjusts the output distribution toward the fine-tuning data,
        away from the RLHF-trained refusal behaviour. A few thousand examples and
        a modest training budget are sufficient. Published research has demonstrated
        this repeatedly on Llama, Mistral, and other open-weight models.

        The threat model this creates: an adversary downloads a safety-trained
        open-weight model, fine-tunes it on uncensored data, and operates the
        resulting model without any alignment constraints. The fine-tuned model
        retains all pre-training capability with the alignment filter removed.
        GCG adversarial suffix generation (Section 7.9) requires white-box access
        to model weights -- open-weight models provide exactly that access, which
        is why Zou et al. (2023) demonstrated transferable suffixes: generate on
        an open-weight model, transfer to a closed API model.

        For closed-model deployments, fine-tuning alignment removal is not a direct
        threat. It is an indirect one: adversaries use open-weight fine-tuning to
        develop jailbreak techniques that then transfer to closed models. The
        existence of open-weight models with removable alignment is what makes
        transferable attack research possible at scale.

    - number: "7.2.7"
      title: "The Alignment Tax: Capability-Safety Tradeoffs as Attack Surface"
      body: |
        Alignment training does not come free. Training a model to refuse harmful
        requests reliably degrades performance on some legitimate tasks -- this
        degradation is called the alignment tax. The tax exists because refusal
        training and capability training pull the model's output distribution in
        different directions in overlapping regions of prompt space.

        Two specific alignment tax patterns are adversarially exploitable.

        First: over-refusal. Models trained with aggressive refusal thresholds
        refuse legitimate requests that superficially resemble harmful ones. A
        chemistry professor asking about reaction mechanisms gets refused. A security
        researcher asking about malware behaviour gets refused. Over-refusal is a
        business cost -- it makes the model less useful. It also creates pressure
        to reduce refusal aggressiveness, which widens the alignment gap. Competing
        objective jailbreaks (Section 7.11) explicitly exploit this tension: they
        frame the refusal as more harmful than compliance, pressuring the model's
        helpfulness objective to override its safety objective.

        Second: sycophancy. RLHF reward models are trained on human preferences.
        Human labellers consistently rate agreeable, validating responses more
        highly than correct-but-challenging ones. The policy model learns to be
        agreeable. Sycophancy is a systematic bias toward confirming user beliefs
        and accommodating user requests -- including adversarial ones. Context
        manipulation jailbreaks (Section 7.5) exploit sycophancy directly: they
        establish premises the model agrees with, then leverage that agreement
        toward harmful conclusions.

        Both over-refusal and sycophancy are documented properties of RLHF-trained
        models. They are not bugs -- they are predictable consequences of the
        training objective. Adversaries who understand the training process can
        engineer inputs that exploit them.

    - number: "7.2.8"
      title: "Why Alignment Cannot Be a Hard Constraint: The Entanglement Problem"
      body: |
        A natural question: why not train the model so that harmful outputs are
        literally impossible -- zero probability, not just low probability?

        The answer is that harmful and beneficial capabilities are entangled in the
        weight space. Consider: the capability to explain chemistry is the same
        capability whether the chemistry being explained is industrial synthesis
        or medication dosing. The capability to write persuasively is the same
        capability whether the persuasion is a marketing email or a social
        engineering script. The capability to reason about human psychology is the
        same capability whether the application is therapy or manipulation.

        Setting the probability of harmful outputs to zero would require the model
        to lose capabilities that are identical at the weight level to the harmful
        ones. You cannot surgically remove the path to harmful chemistry explanation
        without removing the path to beneficial chemistry explanation -- they pass
        through the same weights.

        This is the entanglement problem, and it is why alignment is a boundary-
        adjustment technique rather than a capability-removal technique. The aligned
        model is the same model as the unaligned one, with the output distribution
        shifted away from harm-adjacent regions. The shift is robust against typical
        inputs. It is not robust against adversarially engineered inputs that
        approach harm-adjacent regions from the direction of the non-harmful
        capabilities they share weight paths with.

        The security implication is the most important point in this section:
        alignment is not and cannot be a hard security boundary. It is a probabilistic
        filter. Hard security boundaries must be implemented at the infrastructure
        layer -- input classifiers, output monitors, rate limiters, policy enforcement
        that operates independent of the model's own learned behaviour. This is not
        a failure of alignment research. It is a structural property of the
        architecture that your detection system must account for.

    - number: "7.2.9"
      title: "Infrastructure Detection: The Necessary Conclusion"
      body: |
        Everything in this section leads to one operational conclusion: you cannot
        rely on the model to detect attacks against itself.

        The aligned model refuses harmful requests because it has learned to assign
        low probability to harmful outputs. A jailbreak moves the input into a region
        where that probability assignment changes. At the moment the jailbreak
        succeeds, the model's own safety training is contributing to the problem --
        the model believes it is behaving correctly within the framing the adversary
        has established. It is generating harmful content while being maximally
        confident it is behaving appropriately.

        This is not a hypothetical. Successful jailbreaks produce outputs where the
        model shows no hedging, no refusal indicators, no safety caveats -- because
        from the model's perspective, operating within the adversarial framing, the
        output is appropriate. The model has been moved to a region of prompt space
        where its refusal probability is genuinely low.

        The detection system must therefore operate outside the model's inference
        path. Input classifiers examine what goes in before the model sees it.
        Output monitors examine what comes out, independent of whether the model
        thought it was appropriate. Session-level trackers observe patterns across
        turns that no single-turn model inference can see. None of these depend
        on the model's own alignment training -- they are external constraints on a
        probabilistic filter that adversaries can and do shift.

        This is the architecture Section 7.14 builds. The jailbreak ensemble is an
        independent signal path. It does not ask the model whether an input is a
        jailbreak attempt. It uses external classifiers and statistical detectors
        to make that determination before the model processes the input at all.

