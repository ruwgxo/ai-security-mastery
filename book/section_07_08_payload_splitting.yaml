# ===========================================================================
# KEY TAKEAWAYS
# ===========================================================================

key_takeaways:
  - "Payload splitting defeats per-unit classifiers by design: no single fragment\
    \ triggers detection. The harmful content exists only in the assembled form\
    \ the model produces after receiving all fragments."
  - "The synthesis request is the highest-confidence splitting signal: explicit\
    \ instructions to combine, assemble, or integrate prior fragments. It is\
    \ the turn that converts distributed fragments into a complete payload."
  - "Cross-fragment coherence analysis is the input-layer detection primitive:\
    \ compute pairwise semantic convergence and aggregate specificity across\
    \ session fragments. Neither signal alone is sufficient -- the conjunction\
    \ with a synthesis request is the alert condition."
  - "Cross-session splitting requires cross-session infrastructure: a state store\
    \ tracking content per user identity across sessions, and a coherence analyser\
    \ that runs across retrieved memories at synthesis time. Per-session detection\
    \ is structurally insufficient."
  - "Code-as-carrier splitting requires output monitoring as the load-bearing\
    \ control: the assembled string is only present in the model's output, not\
    \ in any input turn. Input-layer coherence analysis is insufficient alone."
  - "Reconstruction instructions -- explicit assembly directives from the adversary\
    \ -- make the model an active participant in the attack. They are the most\
    \ detectable splitting signal and the clearest indicator of adversarial intent\
    \ in a splitting sequence."

