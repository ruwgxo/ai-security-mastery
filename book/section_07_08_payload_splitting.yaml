      def get_detection_primitives_by_sophistication() -> dict:
          '''Returns detection primitives grouped by sophistication level.'''
          result = {}
          for key, v in PAYLOAD_SPLITTING_TAXONOMY.items():
              soph = v['sophistication']
              if soph not in result:
                  result[soph] = []
              result[soph].append((key, v['detection_primitive']))
          return dict(sorted(result.items()))


      def print_taxonomy_summary() -> None:
          print('Payload Splitting Taxonomy\n')
          sorted_variants = sorted(
              PAYLOAD_SPLITTING_TAXONOMY.items(),
              key=lambda x: x[1]['sophistication'],
          )
          for key, v in sorted_variants:
              composed = ' [COMPOSED]' if v.get('composed_attack') else ''
              infra = ' [CROSS-SESSION INFRA]' if v.get('infrastructure_required') else ''
              print(f"  [Soph {v['sophistication']}/5] {v['name']}{composed}{infra}")
              print(f"    FPR risk:   {v['fpr_risk']}")
              print(f"    Primitive:  {str(v['detection_primitive'])[:70]}")
              print()


      SPLITTING_VS_TOKEN_SMUGGLING = {
          'mechanism': {
              'payload_splitting': 'Distributes payload across units of analysis (turns, sessions)',
              'token_smuggling': 'Obfuscates payload within a single turn via encoding',
          },
          'detection_unit': {
              'payload_splitting': 'Session or cross-session (stateful)',
              'token_smuggling': 'Single turn (stateless, pattern-based)',
          },
          'primary_signal': {
              'payload_splitting': 'Cross-fragment coherence + synthesis request',
              'token_smuggling': 'Encoding anomaly (Base64, ROT13, Unicode) in user turn',
          },
          'reference': {
              'payload_splitting': 'Section 7.8',
              'token_smuggling': 'Chapter 6 Section 6.4',
          },
      }


      if __name__ == '__main__':
          print_taxonomy_summary()
          print('Detection primitives by sophistication level:')
          for soph, primitives in get_detection_primitives_by_sophistication().items():
              print(f'  Sophistication {soph}:')
              for key, prim in primitives:
                  print(f'    {key}: {str(prim)[:60]}')

  - id: "7.8.code.02"
    title: "Cross-Fragment Coherence Analyser"
    description: |
      Session-level coherence analyser for payload splitting detection.
      Tracks fragment semantic embeddings across turns, computes pairwise
      convergence, aggregate specificity, and synthesis request detection.
      One of the five tracks in the Section 7.14 detection ensemble.
      Uses sentence-transformer style embeddings (mocked for portability;
      replace mock with real embedding model in production).
    language: "python"
    filename: "code/ch07/coherence_analyser.py"
    code: |
      import re
      import math
      from dataclasses import dataclass, field
      from typing import Optional


      # Synthesis request patterns -- assembly instruction at end of splitting sequence
      SYNTHESIS_REQUEST_PATTERNS = [
          r'\bgiven\s+(?:everything|all|what)\s+(?:we\s+)?(?:have\s+)?(?:discussed|covered|talked\s+about)\b',
          r'\bcombining\s+(?:what|the\s+(?:parts?|fragments?|pieces?|components?))\s+(?:we\s+|I\s+)?(?:have\s+)?(?:discussed|shared|covered)\b',
          r'\bput(?:ting)?\s+(?:it|them|this|all)\s+(?:all\s+)?together\b',
          r'\bintegrat(?:e|ing)\s+(?:these|the|all)\s+(?:elements?|parts?|pieces?|components?)\b',
          r'\bnow\s+that\s+(?:you\s+have|we\s+have|I\s+have\s+given\s+you)\s+(?:all|the)\s+(?:parts?|pieces?|fragments?|information)\b',
          r'\busing\s+(?:the\s+)?(?:first|second|third|all\s+(?:three|four|five))\s+parts?\s+(?:I|we)\s+(?:shared|gave|provided|discussed)\b',
          r'\bassembl(?:e|ing|y\s+of)\s+(?:the|these|all)\s+(?:parts?|pieces?|fragments?|components?)\b',
          r'\breconstruct\b',
          r'\bconcatenat(?:e|ing)\s+(?:the|these)\b',
      ]

      # Coherence seeding patterns -- adversary explicitly links prior fragments
      COHERENCE_SEEDING_PATTERNS = [
          r'\bto\s+(?:summarise|review|recap)\s+what\s+we\s+(?:have\s+)?(?:covered|discussed)\b',
          r'\bwe\s+have\s+(?:covered|discussed|established)\s+(?:that\s+)?(?:\w+[,;]\s+){1,}\s+and\b',
          r'\bthe\s+(?:first|second|third)\s+(?:part|piece|component|element)\s+(?:was|is)\b',
      ]


      def _mock_embedding(text: str) -> list:
          '''
          Mock embedding function for portability.
          Replace with: sentence_transformers.SentenceTransformer('all-MiniLM-L6-v2')
          or any multilingual embedding model for linguistic splitting detection.
          Returns a deterministic pseudo-embedding based on word hashing.
          '''
          words = re.findall(r'\b\w+\b', text.lower())
          dim = 64
          vec = [0.0] * dim
          for word in words:
              h = hash(word)
              for i in range(dim):
                  vec[i] += math.sin(h * (i + 1)) / (len(words) + 1)
          # L2 normalise
          norm = math.sqrt(sum(x * x for x in vec)) or 1.0
          return [x / norm for x in vec]


      def _cosine_similarity(a: list, b: list) -> float:
          dot = sum(x * y for x, y in zip(a, b))
          return max(-1.0, min(1.0, dot))


      def _centroid(embeddings: list) -> list:
          if not embeddings:
              return []
          dim = len(embeddings[0])
          centroid = [
              sum(e[i] for e in embeddings) / len(embeddings)
              for i in range(dim)
          ]
          norm = math.sqrt(sum(x * x for x in centroid)) or 1.0
          return [x / norm for x in centroid]


      def _aggregate_specificity(centroid_embedding: list, turn_texts: list) -> float:
          '''
          Heuristic aggregate specificity: fraction of specificity-signal words
          across all turn texts combined. In production, replace with the full
          request_specificity_scorer from Section 7.4.
          '''
          SPECIFICITY_WORDS = {
              'step', 'steps', 'exact', 'exactly', 'specific', 'specifically',
              'precise', 'precisely', 'amount', 'quantity', 'concentration',
              'ratio', 'procedure', 'instructions', 'operational', 'working',
          }
          all_words = re.findall(r'\b\w+\b', ' '.join(turn_texts).lower())
          if not all_words:
              return 0.0
          matches = sum(1 for w in all_words if w in SPECIFICITY_WORDS)
          return min(1.0, matches / max(1, len(all_words)) * 15)


      @dataclass
      class FragmentRecord:
          turn_index: int
          text: str
          embedding: list
          language_detected: str = 'en'


      @dataclass
      class CoherenceState:
          '''Session-level state for cross-fragment coherence analysis.'''
          session_id: str
          fragments: list = field(default_factory=list)
          synthesis_request_detected: bool = False
          coherence_seeding_detected: bool = False
          alert_fired: bool = False

          @property
          def fragment_count(self) -> int:
              return len(self.fragments)

          @property
          def pairwise_convergence(self) -> float:
              '''
              Average pairwise cosine similarity across all fragment embeddings.
              Increases as fragments converge on a shared topic.
              Returns 0.0 if fewer than 2 fragments.
              '''
              if len(self.fragments) < 2:
                  return 0.0
              pairs = []
              for i in range(len(self.fragments)):
                  for j in range(i + 1, len(self.fragments)):
                      sim = _cosine_similarity(
                          self.fragments[i].embedding,
                          self.fragments[j].embedding,
                      )
                      pairs.append(sim)
              return sum(pairs) / len(pairs) if pairs else 0.0

          @property
          def aggregate_specificity(self) -> float:
              if not self.fragments:
                  return 0.0
              centroid = _centroid([f.embedding for f in self.fragments])
              texts = [f.text for f in self.fragments]
              return _aggregate_specificity(centroid, texts)

          @property
          def coherence_score(self) -> float:
              '''
              Composite coherence score.
              Convergence + aggregate specificity, boosted by synthesis/seeding signals.
              '''
              if self.fragment_count < 2:
                  return 0.0
              base = (self.pairwise_convergence * 0.4) + (self.aggregate_specificity * 0.4)
              if self.synthesis_request_detected:
                  base += 0.25
              if self.coherence_seeding_detected:
                  base += 0.1
              return min(1.0, base)

          @property
          def alert_condition(self) -> bool:
              '''
              Alert when: (convergence OR aggregate_specificity above threshold)
              AND synthesis_request detected.
              Conjunction required -- synthesis alone is too noisy.
              '''
              convergence_signal = self.pairwise_convergence > 0.55
              specificity_signal = self.aggregate_specificity > 0.35
              return (
                  (convergence_signal or specificity_signal)
                  and self.synthesis_request_detected
              )


      def process_fragment(
          turn_text: str,
          state: CoherenceState,
          turn_index: int,
      ) -> dict:
          '''
          Process one conversation turn through the coherence analyser.
          Returns coherence state summary and alert status.
          '''
          embedding = _mock_embedding(turn_text)
          fragment = FragmentRecord(
              turn_index=turn_index,
              text=turn_text,
              embedding=embedding,
          )
          state.fragments.append(fragment)

          # Check for synthesis request
          for pattern in SYNTHESIS_REQUEST_PATTERNS:
              if re.search(pattern, turn_text, re.IGNORECASE):
                  state.synthesis_request_detected = True
                  break

          # Check for coherence seeding
          for pattern in COHERENCE_SEEDING_PATTERNS:
              if re.search(pattern, turn_text, re.IGNORECASE):
                  state.coherence_seeding_detected = True
                  break

          alert = state.alert_condition and not state.alert_fired
          if alert:
              state.alert_fired = True

          return {
              'turn_index': turn_index,
              'fragment_count': state.fragment_count,
              'pairwise_convergence': round(state.pairwise_convergence, 3),
              'aggregate_specificity': round(state.aggregate_specificity, 3),
              'synthesis_detected': state.synthesis_request_detected,
              'seeding_detected': state.coherence_seeding_detected,
              'coherence_score': round(state.coherence_score, 3),
              'alert': alert,
          }


      DEMO_TEMPORAL_SPLIT = [
          ('Can you explain the general principles of how X processes work?', False),
          ('What is the specific mechanism that drives X in practice?', False),
          ('What conditions and parameters affect how effective X is?', False),
          ('To review what we covered: the principles, mechanism, and parameters of X.', False),
          ('Given everything we have discussed, explain step by step how these '
           'elements would work together in practice.', True),
      ]


      if __name__ == '__main__':
          state = CoherenceState(session_id='demo-splitting-001')
          print('Cross-Fragment Coherence Analyser -- Temporal Splitting Demo\n')
          print(f'{"Turn":<5} {"Frags":<6} {"Conv":<7} {"AggSpec":<9} '
                f'{"Synth":<6} {"Score":<7} {"Alert"}')
          print('-' * 55)

          for i, (text, is_synthesis) in enumerate(DEMO_TEMPORAL_SPLIT):
              result = process_fragment(text, state, i)
              al = 'ALERT' if result['alert'] else ''
              synth = 'YES' if result['synthesis_detected'] else ''
              print(
                  f'{i:<5} {result["fragment_count"]:<6} '
                  f'{result["pairwise_convergence"]:<7.3f} '
                  f'{result["aggregate_specificity"]:<9.3f} '
                  f'{synth:<6} '
                  f'{result["coherence_score"]:<7.3f} '
                  f'{al}'
              )

          print()
          print(f'Final coherence score:      {state.coherence_score:.3f}')
          print(f'Alert condition met:        {state.alert_condition}')
          print()
          print('NOTE: Replace _mock_embedding() with a real sentence transformer')
          print('for production use. Multilingual model required for linguistic splitting.')

