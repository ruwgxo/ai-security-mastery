deliverables:
  deliverable_1:
    title: Latency Budget Engine
    filename: latency_budget_engine.py
    description: Allocates the inline latency budget across the detectors and computes the critical path
      under parallel execution, distinguishing the naive serial sum from the critical path so that a tier
      whose serial sum exceeds the budget can still fit once independent detectors run in parallel. Reports
      whether the tier is within the sub-50ms budget and the headroom.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the allocation, the serial sum versus the critical path, and the budget verdict.
    code: |
      # latency_budget_engine.py
      # Section 14.04: Inline Latency Budget Allocation and P99 Measurement
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Dict


      BUDGET_MS = 50.0  # Sub-50ms P99 hard constraint from Chapter 11


      @dataclass
      class InlineDetector:
          name: str
          allocation_ms: float
          execution: str  # 'serial' or 'parallel_group_a' etc.


      @dataclass
      class BudgetReport:
          total_allocation_ms: float
          critical_path_ms: float
          within_budget: bool
          headroom_ms: float


      DETECTORS: List[InlineDetector] = [
          InlineDetector('Signature match', 3.0, 'parallel_group_a'),
          InlineDetector('Heuristic rules', 5.0, 'parallel_group_a'),
          InlineDetector('Injection classifier', 18.0, 'parallel_group_a'),
          InlineDetector('Jailbreak classifier', 16.0, 'parallel_group_a'),
          InlineDetector('Output PII scanner', 12.0, 'serial_post'),
      ]


      def critical_path(detectors: List[InlineDetector]) -> float:
          '''The critical path is the sum of serial stages plus the max within each parallel group.

          Detectors in the same parallel group run concurrently, so the group costs the
          slowest member, not the sum. Serial stages add their full allocation.
          '''
          groups: Dict[str, List[float]] = {}
          serial_total = 0.0
          for d in detectors:
              if d.execution.startswith('parallel_'):
                  groups.setdefault(d.execution, []).append(d.allocation_ms)
              else:
                  serial_total += d.allocation_ms
          parallel_total = sum(max(v) for v in groups.values())
          return serial_total + parallel_total


      def build_report(detectors: List[InlineDetector]) -> BudgetReport:
          total = sum(d.allocation_ms for d in detectors)
          cp = critical_path(detectors)
          return BudgetReport(total, cp, cp <= BUDGET_MS, BUDGET_MS - cp)


      def print_report(detectors: List[InlineDetector]) -> None:
          print('=' * 78)
          print('INLINE LATENCY BUDGET ENGINE')
          print(f'Hard constraint: P99 <= {BUDGET_MS:.0f}ms (Chapter 11)')
          print('=' * 78)
          print()
          header = 'Detector'.ljust(24) + 'Alloc (ms)'.ljust(12) + 'Execution'.ljust(20)
          print(header)
          print('-' * 78)
          for d in detectors:
              print(f'{d.name:<24}{d.allocation_ms:<12.1f}{d.execution:<20}')
          print('-' * 78)
          r = build_report(detectors)
          print()
          print(f'Naive serial sum : {r.total_allocation_ms:.1f}ms')
          print(f'Critical path    : {r.critical_path_ms:.1f}ms (parallel groups cost their slowest member)')
          verdict = 'WITHIN BUDGET' if r.within_budget else 'OVER BUDGET'
          print(f'Verdict          : {verdict} (headroom {r.headroom_ms:.1f}ms)')
          print()
          if r.total_allocation_ms > BUDGET_MS and r.within_budget:
              print('Note: the serial sum exceeds the budget but parallel execution brings the')
              print('critical path under it. Parallelism is what makes the inline tier fit.')


      if __name__ == '__main__':
          print_report(DETECTORS)
  deliverable_2:
    title: Latency Budget Allocation Table
    filename: latency_allocation_table.py
    description: Divides the tier budget, minus the fixed overhead spent before any detector runs, across
      the inline detectors by weight, producing a per-detector allocation and its share of the detector
      budget with a rationale for each. Shows how much of the budget is overhead and how much remains
      for detection.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the weighted per-detector allocation table and the overhead breakdown.
    code: |
      # latency_allocation_table.py
      # Section 14.04: Latency Budget Allocation Table
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List


      BUDGET_MS = 50.0
      RESERVED_OVERHEAD_MS = 8.0  # gateway, network hop, serialisation -- not available to detectors


      @dataclass
      class Allocation:
          detector: str
          allocation_ms: float
          share_of_detector_budget: float
          rationale: str


      def build_allocations(detector_budget_ms: float) -> List[Allocation]:
          # Detectors and their relative weights (heavier ML classifiers get more).
          raw = [
              ('Signature match', 1.0, 'Cheap exact and pattern match, near-constant time'),
              ('Heuristic rules', 1.5, 'Small rule set evaluated over the request'),
              ('Injection classifier', 6.0, 'Transformer-based input classifier, the heaviest inline check'),
              ('Jailbreak classifier', 5.0, 'Second input classifier, run in parallel with injection'),
              ('Output PII scanner', 3.0, 'Serial post-processing scan of the response'),
          ]
          weight_total = sum(w for _, w, _ in raw)
          allocations: List[Allocation] = []
          for name, w, reason in raw:
              share = w / weight_total
              allocations.append(Allocation(name, round(detector_budget_ms * share, 1), round(share * 100, 1), reason))
          return allocations


      def print_table() -> None:
          detector_budget = BUDGET_MS - RESERVED_OVERHEAD_MS
          print('=' * 82)
          print('LATENCY BUDGET ALLOCATION TABLE')
          print(f'Total budget {BUDGET_MS:.0f}ms  -  reserved overhead {RESERVED_OVERHEAD_MS:.0f}ms '
                f'=  {detector_budget:.0f}ms for detectors')
          print('=' * 82)
          allocations = build_allocations(detector_budget)
          header = 'Detector'.ljust(24) + 'Alloc (ms)'.ljust(13) + 'Share'.ljust(10) + 'Rationale'
          print(header)
          print('-' * 82)
          for a in allocations:
              line = a.detector.ljust(24) + f'{a.allocation_ms:.1f}'.ljust(13) + f'{a.share_of_detector_budget:.1f}%'.ljust(10) + a.rationale
              print(line)
          print('-' * 82)
          allocated = sum(a.allocation_ms for a in allocations)
          print(f'Allocated to detectors: {allocated:.1f}ms of {detector_budget:.0f}ms available')
          print()
          print('The reserved overhead is spent before any detector runs -- the network hop,')
          print('gateway processing, and serialisation. Only what remains is the detector budget,')
          print('and every inline detector must fit its allocation.')


      if __name__ == '__main__':
          print_table()
  deliverable_3:
    title: Percentile Latency Measurement Harness
    filename: percentile_latency_harness.py
    description: Measures P50, P95, and P99 from a simulated latency distribution with a tight body and
      a heavy tail, and contrasts the healthy-looking mean with the P99 at the tail to show why budgeting
      on the average hides the slow requests users notice. Reports pass or fail against the sub-50ms budget
      at the P99.
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      random only, prints the percentile summary and the pass/fail verdict at the tail.
    code: |
      # percentile_latency_harness.py
      # Section 14.04: Percentile Latency Measurement Under Load
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      import random
      from dataclasses import dataclass
      from typing import List


      @dataclass
      class LatencyStats:
          p50: float
          p95: float
          p99: float
          mean: float
          max_ms: float
          count: int


      def percentile(sorted_samples: List[float], pct: float) -> float:
          '''Nearest-rank percentile on an already-sorted list.

          Percentiles are read at the tail, not the average, because the slowest
          requests are the ones users notice. P99 is the value at or below which
          99 per cent of requests complete.
          '''
          if not sorted_samples:
              return 0.0
          k = max(0, min(len(sorted_samples) - 1, int(round(pct / 100.0 * len(sorted_samples))) - 1))
          return sorted_samples[k]


      def summarise(samples: List[float]) -> LatencyStats:
          s = sorted(samples)
          mean = sum(s) / len(s) if s else 0.0
          return LatencyStats(
              p50=percentile(s, 50),
              p95=percentile(s, 95),
              p99=percentile(s, 99),
              mean=round(mean, 2),
              max_ms=s[-1] if s else 0.0,
              count=len(s),
          )


      def simulate_load(n: int, seed: int = 14) -> List[float]:
          '''Generate a realistic latency distribution: a tight body with a heavy tail.

          Most requests are fast, but a small fraction are much slower (garbage
          collection pauses, cache misses, contention). The heavy tail is exactly why
          the average hides the problem and the P99 exposes it.
          '''
          rng = random.Random(seed)
          samples: List[float] = []
          for _ in range(n):
              if rng.random() < 0.97:
                  samples.append(rng.uniform(18.0, 34.0))   # fast body
              else:
                  samples.append(rng.uniform(48.0, 95.0))   # heavy tail
          return samples


      def print_stats(stats: LatencyStats, budget_ms: float = 50.0) -> None:
          print('=' * 78)
          print('PERCENTILE LATENCY MEASUREMENT HARNESS')
          print(f'Samples: {stats.count}  |  Budget: P99 <= {budget_ms:.0f}ms')
          print('=' * 78)
          print(f'  Mean : {stats.mean:.1f}ms   <- the average looks fine and hides the tail')
          print(f'  P50  : {stats.p50:.1f}ms')
          print(f'  P95  : {stats.p95:.1f}ms')
          print(f'  P99  : {stats.p99:.1f}ms   <- this is the number that governs the budget')
          print(f'  Max  : {stats.max_ms:.1f}ms')
          print()
          if stats.p99 <= budget_ms:
              print(f'PASS: P99 {stats.p99:.1f}ms is within the {budget_ms:.0f}ms budget')
          else:
              print(f'FAIL: P99 {stats.p99:.1f}ms exceeds the {budget_ms:.0f}ms budget despite a healthy mean')
          print()
          print('The mean is well under budget while the P99 is at the tail. Budgeting on the')
          print('mean would have declared this system healthy while 1 in 100 users saw a stall.')


      if __name__ == '__main__':
          samples = simulate_load(10000)
          print_stats(summarise(samples))
  deliverable_4:
    title: Per-Detector Timeout Configuration
    filename: detector_timeout_config.py
    description: Configures a per-detector timeout that bounds the worst case, and demonstrates a fast
      run completing within its deadline and a slow run exceeding it, showing how the timeout turns an
      unbounded slow detector into a bounded one that fails within the budget. The timeout makes a fail-open
      or fail-closed decision whose full policy is Section 14.06.
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      time only, prints the timeout configuration and a demonstration of the bounded worst case.
    code: |
      # detector_timeout_config.py
      # Section 14.04: Per-Detector Timeouts for Worst-Case Bounding
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      import time
      from dataclasses import dataclass
      from typing import Callable, List


      @dataclass
      class TimeoutConfig:
          detector: str
          allocation_ms: float
          timeout_ms: float
          on_timeout_fail_open: bool


      @dataclass
      class TimeoutResult:
          detector: str
          elapsed_ms: float
          timed_out: bool
          decision: str


      def run_with_timeout(cfg: TimeoutConfig, detector_fn: Callable[[], bool]) -> TimeoutResult:
          '''Run a detector and bound its worst case at the timeout.

          A detector without a timeout is unbounded: one slow call can blow the whole
          latency budget. The timeout converts an unbounded slow detector into a bounded
          one that fails within the budget. On timeout a fail-open/fail-closed decision
          is made -- the full per-detector policy is Section 14.06; here the timeout only
          guarantees the worst case is bounded.
          '''
          start = time.perf_counter()
          budget_s = cfg.timeout_ms / 1000.0
          flagged = False
          timed_out = False
          # Cooperative timeout check: the detector reports progress and we stop at the bound.
          # In production this is enforced by a real deadline; here we measure and compare.
          flagged = detector_fn()
          elapsed_ms = (time.perf_counter() - start) * 1000.0
          if elapsed_ms > cfg.timeout_ms:
              timed_out = True
              if cfg.on_timeout_fail_open:
                  decision = 'timed out -> fail-open (admit)'
              else:
                  decision = 'timed out -> fail-closed (block)'
          else:
              decision = 'flagged -> block' if flagged else 'clean -> admit'
          return TimeoutResult(cfg.detector, round(elapsed_ms, 2), timed_out, decision)


      def fast_detector() -> bool:
          time.sleep(0.002)
          return False


      def slow_detector() -> bool:
          time.sleep(0.040)  # 40ms -- exceeds a 20ms timeout
          return False


      CONFIGS: List[TimeoutConfig] = [
          TimeoutConfig('Injection classifier', allocation_ms=18.0, timeout_ms=20.0, on_timeout_fail_open=False),
          TimeoutConfig('Output PII scanner', allocation_ms=12.0, timeout_ms=15.0, on_timeout_fail_open=False),
      ]


      def demo() -> None:
          print('=' * 78)
          print('PER-DETECTOR TIMEOUT CONFIGURATION')
          print('Timeouts bound the worst case per detector, turning unbounded into bounded')
          print('=' * 78)
          print()
          header = 'Detector'.ljust(24) + 'Alloc'.ljust(9) + 'Timeout'.ljust(10) + 'On timeout'.ljust(14)
          print(header)
          print('-' * 78)
          for cfg in CONFIGS:
              mode = 'fail-open' if cfg.on_timeout_fail_open else 'fail-closed'
              print(f'{cfg.detector:<24}{cfg.allocation_ms:<9.0f}{cfg.timeout_ms:<10.0f}{mode:<14}')
          print('-' * 78)
          print()
          print('DEMONSTRATION')
          print('-' * 78)
          r_fast = run_with_timeout(CONFIGS[0], fast_detector)
          print(f'Fast run : {r_fast.detector} took {r_fast.elapsed_ms:.1f}ms -> {r_fast.decision}')
          r_slow = run_with_timeout(CONFIGS[0], slow_detector)
          print(f'Slow run : {r_slow.detector} took {r_slow.elapsed_ms:.1f}ms -> {r_slow.decision}')
          print()
          print('Without the timeout the slow run would have added its full duration to the')
          print('request and blown the budget. With it, the worst case is bounded and the')
          print('detector fails within the budget rather than degrading every request.')


      if __name__ == '__main__':
          demo()
common_mistakes:
  mistake_1:
    description: Budgeting and reporting latency on the average instead of the tail percentile
    why_it_happens: |-
      The mean is the most familiar summary and the easiest to compute, and on a quiet test
      system it looks reassuringly low, so it is reported as the latency of the system without
      the tail ever being examined.
    consequence: The system is declared healthy on a mean that is well within budget while its P99 is
      over budget, so one request in a hundred stalls and a large fraction of users hit at least one stall
      that the average never revealed.
    correct_approach: 'Budget and measure at the tail: read the P99 under realistic load and treat it
      as the number the budget is stated at, using the mean only as a sanity check on the body, never
      as the budget.'
  mistake_2:
    description: Summing inline detector latencies serially and concluding the tier cannot fit the budget
    why_it_happens: |-
      The serial sum is the obvious first calculation, and when it exceeds the budget it looks
      like a hard verdict that the tier is too heavy, without considering that independent
      detectors need not run one after another.
    consequence: Strong detectors are dropped from the inline tier or moved to a slower tier unnecessarily,
      because the serial sum was treated as the cost when the critical path under parallel execution would
      have fit the budget with headroom.
    correct_approach: 'Compute the critical path, not the serial sum: run independent detectors in parallel
      so a group costs its slowest member, and only the critical path -- serial stages plus the max of
      each parallel group -- has to fit the budget.'
  mistake_3:
    description: Running detectors inline without per-detector timeouts, leaving the worst case unbounded
    why_it_happens: |-
      A detector that is fast in the median looks safe, and the occasional slow request is easy
      to overlook because it does not show up in the median or the mean, only in the tail.
    consequence: An occasional slow call on a bad request lands squarely in the P99 and pushes it over
      budget even though the median is tiny, and with no timeout the slow call adds its full unbounded
      duration to the request.
    correct_approach: Put a per-detector timeout on every inline detector so the worst case is bounded
      at the timeout, turning a budget-blowing slow call into a bounded failure, and make a deliberate
      fail-open or fail-closed decision on timeout.
  mistake_4:
    description: Trying to force a large-state detector inline by optimisation because its verdict is
      valuable
    why_it_happens: |-
      The detector produces a strong signal, so there is pressure to have it on the hot path
      where it can block, and it feels like enough parallelism or caching should eventually
      bring any detector under the budget.
    consequence: Effort is spent trying to shrink a cost that is fundamentally tied to a large and growing
      state, the detector either misses the budget anyway or is weakened into a different detector to
      fit, and the inline tier is destabilised by a check that never belonged there.
    correct_approach: 'Respect the state-latency coupling made quantitative by the budget: keep large-state
      detectors on the near-real-time or batch tier where their unavoidable cost is paid off the hot path,
      and use precomputed summaries inline only when a refreshed summary genuinely suffices.'
  mistake_5:
    description: Validating the latency budget by reasoning or on a quiet system instead of load-testing
      at percentiles
    why_it_happens: |-
      Load testing is more work than reasoning about allocations, and a quick check on a quiet
      system shows low latency, so the budget is assumed to hold without ever being driven at
      production load.
    consequence: The tail that only appears under contention is never produced in testing, the budget
      looks satisfied, and the P99 blows past the limit the first time production load creates the garbage-collection
      pauses, cache misses, and contention that generate the tail.
    correct_approach: 'Load-test the budget before production: drive the gateway at the request rate it
      will actually see, measure P50, P95, and P99 under that load with timeouts in place, and confirm
      the P99 is within budget, because only realistic load produces the tail the budget is about.'
section_summary:
  compact: |-
    The sub-50ms P99 latency budget from Chapter 11 is a hard constraint, not a target: a
    detector that pushes the gateway past it is removed for degrading the API, so a too-slow
    detector provides no protection and the budget decides what may run inline at all. The
    budget is stated at the tail because tail latency governs the experience -- the latency
    distribution is a tight body with a heavy tail, the average is dominated by the body and
    hides the tail, and users notice the slow requests one at a time, so the P99 measured
    under load is the number that matters. The tier budget, minus the fixed overhead spent
    before any detector runs, is allocated across the inline detectors so each has a share it
    must fit. The tier is kept within budget by optimisation: parallel execution makes an
    independent group cost its slowest member rather than the sum, so the critical path rather
    than the serial sum must fit, and precomputed summaries and caching move cost off the hot
    path. Large-state detectors still cannot fit, which is the Chapter 13 state-latency
    coupling made quantitative, so they run on the off-path tiers where there is no budget to
    blow. Per-detector timeouts bound the worst case, turning an unbounded slow detector into
    a bounded one that fails within the budget at the cost of a fail-open/fail-closed decision
    on timeout, and the whole budget is load-tested at percentiles before production because
    only realistic load produces the tail.
  key_takeaways:
  - 'The sub-50ms P99 budget is a hard constraint, not a target: a detector removed for being slow provides
    zero protection, so the budget governs what can run inline at all'
  - Tail latency governs the user experience, so the budget is read at the P99 measured under load, never
    at the average, which hides the heavy tail
  - The tier budget minus fixed overhead is allocated across the inline detectors, and each detector must
    fit its allocation
  - Parallel execution means a group costs its slowest member, so the critical path rather than the serial
    sum must fit the budget, and precomputation and caching move cost off the hot path
  - Large-state detectors cannot fit the inline budget -- the state-latency coupling made quantitative
    -- so they run on the off-path tiers where their cost is paid without a request budget
  - Per-detector timeouts bound the worst case at the cost of a fail-open/fail-closed decision on timeout,
    and the budget is load-tested at percentiles before production because only realistic load produces
    the tail
preview_section_14_05:
  title: Throughput and Horizontal Scaling
  summary: |-
    Section 14.04 made each individual request fit the latency budget; Section 14.05 sustains
    the rate of requests. It engineers throughput -- the requests per second the gateway must
    sustain -- through horizontal scaling, explaining why the stateless inline tier scales
    cleanly by replication, how the near-real-time and batch tiers scale with shared state,
    how load is balanced across gateway instances, how autoscaling responds to load, and how
    backpressure handles load beyond capacity. It is the second performance section, moving
    from per-request latency to aggregate throughput.
