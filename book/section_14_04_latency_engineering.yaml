section_overview:
  one_line_summary: 'The sub-50ms P99 latency budget from Chapter 11 is a hard constraint that governs
    the whole inline tier: it decides what can run inline, it is measured at the tail rather than the
    average, and it is enforced through budget allocation across detectors, parallel execution, and per-detector
    timeouts that bound the worst case.'
  why_this_section_exists: |-
    Every blocking inline hook placed in Section 14.03 holds the request while it runs, and
    that latency is added to every request on the hot path. Sections 14.02 and 14.03 kept
    saying the inline tier must fit a budget without engineering the budget itself. This
    section engineers it. The sub-50ms P99 requirement from Chapter 11 is not a target to aim
    at but a hard limit: a detector that pushes the gateway past it makes the API slow enough
    that the detector is removed, so the budget decides what is allowed to run inline at all.
    Meeting it is a discipline with several parts. The budget must be measured correctly, at
    the tail rather than the average, because the average hides exactly the slow requests that
    users notice. It must be allocated across the inline detectors so each one has a share it
    must fit. It must be defended with optimisation -- precomputed summaries, caching, and
    parallel execution -- that brings the critical path under the limit even when the serial
    sum would exceed it. And it must be protected against the unbounded slow case with
    per-detector timeouts that turn a detector that would blow the budget into one that fails
    within it. This section builds all four.
  position_in_chapter: |-
    Section 14.04 is the first of the two performance sections (14.04-14.05) and the response to
    the latency concern from the 14.01 taxonomy. It engineers the latency budget for the
    blocking inline hooks that 14.03 placed. Section 14.05 then engineers throughput and
    horizontal scaling, sustaining the request rate once each individual request fits the
    budget. The per-detector timeout introduced here makes a fail-open/fail-closed decision on
    timeout whose full policy is Section 14.06.
