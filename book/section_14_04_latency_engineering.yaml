prose_content:
  part_1:
    title: The Budget Is a Hard Constraint, Not a Target
    body: |-
      The sub-50ms P99 latency budget arrived in Chapter 11 as a requirement of the gateway, and
      this section is where it stops being a stated number and becomes engineered reality. The
      first thing to be clear about is its status. It is not a target that the system aims for
      and does its best to approach. It is a hard constraint, and the difference matters,
      because a hard constraint that is violated does not produce a slightly worse system --
      it produces a removed one.

      The mechanism of removal is worth stating plainly, because it is what gives the budget its
      force. A detector that runs inline adds its latency to every request. If that latency
      pushes the gateway past the point where the API feels slow, the product degrades, and a
      product that is degraded by its security layer does not keep the security layer -- the
      detector is disabled, and its protection goes to zero. A detector that is too slow is,
      in production terms, a detector that does not exist. This is why latency is a security
      concern and not merely a performance one: the fastest way to lose a detector is not to
      have it evaded but to have it removed for being slow.

      That reframing sets up everything else in the section. Because the budget is hard, it
      decides what is allowed to run inline at all: a detector that cannot fit its share of the
      budget cannot run on the hot path, no matter how good its detection is, and must be moved
      to a slower tier or dropped. The budget is the gatekeeper of the inline tier, and the
      rest of this section is the engineering that lets as much protection as possible through
      the gate while keeping the whole tier inside the limit.
  part_2:
    title: Why the Tail Governs the Experience
    body: |-
      The budget is stated at the ninety-ninth percentile, not the average, and that choice is
      not a technicality. It reflects how latency is actually experienced. A latency
      distribution on a real system is not a tidy bell around its mean; it is a tight body of
      fast requests with a heavy tail of slow ones, produced by garbage-collection pauses,
      cache misses, lock contention, and the occasional unlucky scheduling. The average is
      dominated by the body and barely moved by the tail, so it can look perfectly healthy
      while the tail is failing.

      What users notice is the tail. A user does not experience the mean latency of a thousand
      requests; they experience each request one at a time, and the slow ones are the ones
      that register as the product stalling. If the P99 is over budget, then one request in a
      hundred stalls, and over a session of many requests a large fraction of users hit at
      least one stall. Budgeting on the mean would declare that system healthy while it
      quietly failed a meaningful share of its users. This is why the percentile harness in
      this section reads P50, P95, and P99 and treats the P99 as the number that governs the
      budget: the tail is where the experience is decided.

      The practical consequence is a rule about measurement. Latency must be measured at
      percentiles under load, not as an average on a quiet system, because both simplifications
      hide the tail. An average hides it by construction, and a quiet system hides it by never
      producing the contention that creates it. The number that matters is the P99 measured
      while the system is under the load it will actually see, and any latency claim that is
      not that number is not the claim the budget is about.
  part_3:
    title: Allocating the Budget Across the Inline Detectors
    body: |-
      A single budget for the whole inline tier is not directly actionable, because the tier is
      several detectors and something has to say how much of the fifty milliseconds each one
      may take. Budget allocation is that step: the tier budget, minus the fixed overhead that
      is spent before any detector runs, is divided across the inline detectors so that each
      one has a concrete allocation it must fit within.

      The overhead comes off the top. Before a detector executes, the request has already paid
      for the network hop of the chosen architecture pattern, the gateway processing, and the
      serialisation of the payload. That overhead is not available to the detectors, so the
      detector budget is the tier budget minus the overhead, and it is the detector budget that
      is divided up. The division itself is weighted: a cheap signature match gets a small
      allocation because it needs little, while a transformer-based injection classifier gets a
      large one because it is the heaviest inline check. The allocation is a statement of what
      each detector is permitted to cost, and it is the contract each detector is then
      engineered to meet.

      Allocation also makes the budget enforceable at the level where it can be acted on. When
      a detector exceeds its allocation, the allocation table says which detector is over and
      by how much, so the fix is targeted rather than a vague hunt for latency across the whole
      tier. And when a new detector is proposed for the inline tier, the allocation table is
      the check: either there is a spare allocation for it or there is not, and if there is
      not, the detector does not go inline. The allocation deliverable and the allocation table
      for this section make that budget explicit and per-detector.
  part_4:
    title: 'Parallel Execution and Precomputation: Fitting the Budget'
    body: |-
      Allocating the budget reveals a problem: the naive serial sum of the inline detectors
      often exceeds the budget. Add up a signature match, two heuristic passes, an injection
      classifier, a jailbreak classifier, and an output scanner run one after another, and the
      total can be over fifty milliseconds before any overhead. Run serially, the tier does not
      fit. The way it fits is by not running serially.

      Parallel execution is the primary lever. The inline detectors are largely independent --
      the injection classifier and the jailbreak classifier both read the request and neither
      depends on the other -- so they can run concurrently. When detectors run in parallel, the
      group costs the latency of its slowest member, not the sum of all of them, because they
      overlap in time. This is why the budget engine distinguishes the serial sum from the
      critical path: the critical path is the sum of the serial stages plus the maximum within
      each parallel group, and it is the critical path, not the serial sum, that must fit the
      budget. A tier whose serial sum is fifty-four milliseconds can have a critical path of
      thirty once the input classifiers run in parallel, and thirty fits with headroom to
      spare.

      Precomputation and caching are the second lever, and they work by moving cost off the hot
      path entirely. A detector that would need to compute an expensive summary on every
      request can instead read a summary that was precomputed off-path and refreshed
      periodically, so the inline cost is a cheap lookup rather than a full computation. A
      detector whose verdict for a repeated input is stable can cache that verdict, so a repeat
      is a cache hit costing almost nothing. Between parallel execution and precomputation, the
      inline tier can run detectors whose naive serial cost would exceed the budget several
      times over, which is what lets strong detection stay on the hot path rather than being
      dropped for latency.
  part_5:
    title: Why Large-State Detectors Cannot Run Inline
    body: |-
      Parallel execution and precomputation extend how much can run inline, but they do not
      extend it without limit, and the limit is exactly the state-latency coupling from Chapter
      13 Section 13.01. That coupling was introduced as a detection design principle: a
      detector that needs a large historical state cannot run on the hot path. Here it reappears
      as a latency consequence, engineered rather than asserted.

      The reason a large-state detector cannot run inline is that its cost is tied to the size
      of the state it must consult, and that cost cannot be made small enough to fit the
      budget on the hot path. A coordinated-network detector that must examine a population of
      sessions, or a baselining detector that must compare against a historical corpus, does
      work proportional to a large and growing body of data, and no amount of parallelism
      within a single request brings that under a few tens of milliseconds. Precomputation
      helps only up to a point: a precomputed summary can be read cheaply, but the detectors
      whose whole value is analysing the full state in the moment cannot be reduced to a
      lookup without becoming a different, weaker detector.

      This is why the tiers exist and why the latency budget confirms rather than contradicts
      the Chapter 13 partition. The inline tier is the set of detectors that can be made to
      fit the budget -- small-state or precomputable, parallelisable, cheap per request. The
      near-real-time and batch tiers are the detectors that cannot, and they run off the hot
      path precisely so that their unavoidable cost is paid where there is no budget to blow.
      The latency budget does not fight the state-latency coupling; it is the coupling made
      quantitative, and it is the reason a large-state detector belongs on a slower tier no
      matter how valuable its verdict.
  part_6:
    title: 'Timeouts and Load Testing: Bounding and Verifying'
    body: |-
      A detector that fits its allocation on average can still, on a bad request, take far
      longer than its allocation, and an unbounded slow case is a budget violation waiting to
      happen. A single detector that occasionally takes two hundred milliseconds will produce a
      P99 far over budget even if its median is tiny, because the P99 is exactly where those
      occasional slow cases land. The tool that bounds this is the per-detector timeout.

      A timeout puts a hard deadline on each detector. If the detector has not returned by its
      timeout, it is stopped, and its worst case is thereby bounded at the timeout rather than
      being unbounded. This converts an unbounded slow detector into a bounded one that fails
      within the budget instead of blowing it. The conversion is not free: when a detector
      times out, the gateway has no verdict from it, and a decision must be made -- fail-open,
      admitting the request without that detector, or fail-closed, blocking it. That decision
      is a security-versus-availability trade, and its full per-detector policy is the subject
      of Section 14.06; here the timeout only guarantees that the worst case is bounded so the
      budget holds.

      The last discipline is verification. A latency budget that is reasoned about but not
      measured under load is a hypothesis, and production is a bad place to test a hypothesis.
      The budget must be load-tested before production: drive the gateway at the request rate
      it will actually see, measure the P50, P95, and P99 under that load, and confirm the P99
      is within budget with the timeouts in place. Only a P99 measured under realistic load
      validates the budget, because only that load produces the contention that creates the
      tail. With the per-request latency engineered and verified, the chapter can turn to the
      next performance concern: Section 14.05 sustains the request rate itself through
      throughput and horizontal scaling, once each individual request is known to fit.
