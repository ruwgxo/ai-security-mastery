      email addresses from production LLMs trained on web data. The attack is simple:
      probe the model with prefix prompts and look for outputs that deviate from the
      model's normal generation distribution — those deviations often indicate memorized
      verbatim text. For any organization that fine-tuned an LLM on internal data
      (customer records, employee data, proprietary documents), this attack is a breach
      waiting to be discovered. Detection is possible from API logs. This section shows
      you how to build both the attack and the detector.

  - section_number: 11
    title: "Privacy Attacks: Membership Inference and Model Inversion"
    filename: "section_05_11_membership_inference_inversion.yaml"
    note: "20260105 | AI Security: AI Threat Landscape (Section 0511 Membership Inference and Model Inversion) by Raghav Dinesh"
    estimated_pages: 7

    topics:
      - "Membership inference attack: was this data in the training set?"
      - "Shokri et al. (2017): shadow model-based membership inference"
      - "LLM membership inference: likelihood ratio testing"
      - "Attack target scenarios: clinical trials, financial records, legal documents"
      - "Overfitting connection: why overfit models are more vulnerable (Chapter 1 callback)"
      - "Model inversion attacks: reconstructing training samples from model outputs"
      - "Model inversion methodology: gradient-based reconstruction"
      - "Face reconstruction from classifier: the classic demonstration"
      - "LLM inversion: reconstructing fine-tuning documents from model behavior"
      - "Defenses: regularization, output quantization, prediction vector perturbation"

    key_concepts:
      - "Membership inference exploits the confidence gap between seen and unseen data"
      - "Overfitting amplifies membership inference risk — recall Chapter 1 Section 13"
      - "Shadow models approximate the target model without white-box access"
      - "Likelihood ratio membership inference requires only API access (black-box)"
      - "Model inversion is inverse ML: optimize inputs to match target outputs"

    deliverables:
      - "Membership inference attack implementation (likelihood ratio, black-box)"
      - "Membership inference risk quantifier for fine-tuned LLMs"
      - "Shadow model training pipeline for target model approximation"
      - "Model inversion demonstration on image classifier (gradient-based)"
      - "Defense implementation: output perturbation and confidence score masking"
      - "Privacy risk audit procedure combining extraction + membership inference"

    security_preview: |
      Membership inference attacks answer a binary question with devastating GDPR
      implications: can an adversary determine whether a specific individual's medical
      record was used to train your model? If yes, and you didn't disclose that, you
      have a compliance violation without a visible breach. The attack requires only
      API access — no model weights, no training data. This makes it accessible to any
      motivated adversary. Defenders can measure their own exposure with the same
      technique used in this section. Model inversion goes further: reconstructing
      actual training samples. Together, these attacks define the privacy threat model
      for any organization that trained on sensitive data.

  - section_number: 12
    title: "Bias, Fairness, and Ethical Risks as Security Vulnerabilities"
    filename: "section_05_12_bias_fairness_ethics.yaml"
    note: "20260105 | AI Security: AI Threat Landscape (Section 0512 Bias Fairness Ethics) by Raghav Dinesh"
    estimated_pages: 6

    topics:
      - "Why bias is a security issue, not just an ethics issue"
      - "Bias taxonomy: representation, measurement, aggregation, historical"
      - "Adversarial bias exploitation: amplifying bias for targeted discrimination"
      - "Bias in security systems: facial recognition, fraud detection, anomaly detection"
      - "Disparate impact as an attack surface: adversaries gaming biased models"
      - "Fairness metrics: demographic parity, equalized odds, calibration"
      - "Bias detection methodologies: group fairness auditing"
      - "Feedback loops: biased models create biased training data"
      - "LLM-specific bias: stereotype amplification, toxic output generation"
      - "Audit frameworks: model card standards, bias impact assessments"

    key_concepts:
      - "Biased models are predictable — predictability is exploitable"
      - "Adversaries can cause systematic misclassification by targeting known model biases"
      - "Feedback loops amplify initial bias: biased decisions generate biased labels"
      - "Disparate impact tests reveal exploitable model behavior before adversaries find it"
      - "Bias auditing is proactive threat modeling, not just compliance theater"

    deliverables:
      - "Bias audit framework for LLM outputs (group fairness evaluation suite)"
      - "Disparate impact calculator for classification models"
      - "Feedback loop simulator: demonstrate bias amplification over training iterations"
      - "LLM stereotype probe test suite (demographic parity evaluation)"
      - "Model card template with bias disclosure section"
      - "Adversarial bias exploitation demonstration (gaming a biased fraud detector)"

    security_preview: |
      A fraud detection model that underperforms on a specific demographic creates
      two problems simultaneously: a fairness violation and an exploitable pattern.
      Adversaries who discover that certain attribute combinations reduce fraud score
      disproportionately will craft transactions to match those patterns. Similarly,
      LLMs that systematically generate different outputs for different groups can be
      manipulated by adversaries who know the bias direction. Bias auditing is not
      separate from penetration testing — it is a form of it. This section teaches
      you to treat biased model behavior as an attack surface to enumerate and harden.

  - section_number: 13
    title: "Regulatory Landscape: EU AI Act, US Executive Order, and Global Frameworks"
    filename: "section_05_13_regulatory_landscape.yaml"
    note: "20260105 | AI Security: AI Threat Landscape (Section 0513 Regulatory Landscape) by Raghav Dinesh"
