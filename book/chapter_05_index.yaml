      - "EU AI Act technical obligations: robustness, accuracy, cybersecurity requirements"
      - "EU AI Act timeline and enforcement: what compliance looks like in practice"
      - "US Executive Order on AI (Oct 2023): NIST standards, red-teaming requirements"
      - "GDPR intersection with AI: training data, right to explanation, erasure"
      - "CCPA and state-level US AI regulation landscape"
      - "Sector-specific regulation: HIPAA for healthcare AI, SOX for financial AI"
      - "ENISA AI Threat Landscape report: European cybersecurity perspective"
      - "China AI regulations and global regulatory fragmentation"
      - "Compliance as baseline, not ceiling: regulatory floors and security ceilings"

    key_concepts:
      - "EU AI Act risk tiers: unacceptable → high → limited → minimal risk"
      - "High-risk AI systems require documented technical controls, not just policies"
      - "GDPR right to erasure conflicts fundamentally with model memorization"
      - "US Executive Order mandates red-teaming for AI systems above capability thresholds"
      - "Regulatory compliance and security engineering are increasingly inseparable"

    deliverables:
      - "EU AI Act compliance checklist for LLM deployments (technical controls)"
      - "US Executive Order AI requirements mapping (what you must do, what you should do)"
      - "GDPR-AI compliance matrix (training data, inference, erasure, explanation)"
      - "Sector-specific AI compliance overlay (healthcare, finance, legal)"
      - "Regulatory gap analysis template: your current state vs required state"
      - "Regulatory timeline tracker: enforcement dates and obligation milestones"

    security_preview: |
      Regulation is arriving faster than most organizations are prepared for. The EU
      AI Act's high-risk category includes security-relevant systems — and mandates
      documented robustness controls, accuracy benchmarks, and cybersecurity measures
      that are essentially the detection engineering program described in Part 3 of this
      book. Security engineers who understand regulatory requirements can position their
      detection programs as compliance deliverables, not just security nice-to-haves.
      The US Executive Order's mandatory red-teaming requirement for large AI models
      creates a direct job function: AI red teamer. This section maps every detection
      and defense capability in this book to its regulatory anchor.

  - section_number: 14
    title: "NIST AI Risk Management Framework: Govern, Map, Measure, Manage"
    filename: "section_05_14_nist_ai_rmf.yaml"
    note: "20260105 | AI Security: AI Threat Landscape (Section 0514 NIST AI RMF) by Raghav Dinesh"
    estimated_pages: 6

    topics:
      - "NIST AI RMF overview: four core functions (Govern, Map, Measure, Manage)"
      - "GOVERN: organizational policies, roles, and accountability for AI risk"
      - "MAP: risk identification, context setting, categorization"
      - "MEASURE: risk analysis, testing, evaluation, monitoring"
      - "MANAGE: risk treatment, response planning, residual risk acceptance"
      - "AI RMF Playbook: suggested actions per function"
      - "NIST AI RMF vs NIST Cybersecurity Framework: differences and integration"
      - "Applying NIST AI RMF to LLM deployments: practical mapping"
      - "AI RMF profiles: sector-specific adaptations"
      - "Using AI RMF to structure a detection engineering program (bridge to Part 3)"

    key_concepts:
      - "GOVERN: risk management starts before the model, not at deployment"
      - "MAP: context determines risk — the same model is high-risk in healthcare, low-risk in entertainment"
      - "MEASURE: you cannot manage what you cannot measure — metrics are mandatory, not optional"
      - "MANAGE: residual risk must be explicitly accepted, not silently ignored"
      - "AI RMF is the bridge between business risk language and technical security controls"

    deliverables:
      - "NIST AI RMF mapping template for LLM deployments (all four functions)"
      - "AI RMF implementation scorecard (maturity assessment)"
      - "GOVERN policies template: AI use policy, model governance procedure"
      - "MEASURE metrics catalog: what to measure for LLM security posture"
      - "MANAGE risk register integration: AI risks in enterprise risk management"
      - "NIST AI RMF vs CSF integration diagram"

    security_preview: |
      NIST AI RMF is the document your CISO and board understand. When the detection
      engineering program you build in Chapters 11-17 needs budget, the justification
      lives in the MEASURE function. When you need organizational authority to gate
      model deployments, the process lives in the GOVERN function. NIST AI RMF creates
      the organizational scaffolding that makes technical AI security work sustainable.
      Engineers who can speak both the technical language (this book) and the management
      language (NIST AI RMF) are rare — and they are the ones who build lasting programs.

