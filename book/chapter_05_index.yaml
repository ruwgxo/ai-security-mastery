      discovered in 2023 that HuggingFace models can contain malicious code that
      executes on deserialization. LLM06 is the GDPR nightmare: models trained on
      personal data may verbatim recall it for any user who asks cleverly. These three
      risks operate at completely different timescales and threat actors, requiring
      distinct detection strategies.

