      injection into an LLM agent with email-sending capability is equivalent to stored
      XSS with CSRF in traditional web security, except the blast radius includes every
      action the agent can take. LLM10 deserves its own program at any company deploying
      proprietary fine-tuned models: competitors will query your API to reconstruct
      your competitive advantage.

