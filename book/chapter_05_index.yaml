    key_concepts:
      - "LLM01: The LLM cannot distinguish between data and instruction by design"
      - "LLM02: Downstream consumers of LLM output inherit all injection risks"
      - "LLM03: Training data is untrusted code — treat it like user input"
      - "Trust boundary failures are the common thread across LLM01-LLM03"
      - "Each risk has a prevention layer: input, model, output — defense-in-depth"

    deliverables:
      - "LLM01 attack pattern library (20+ documented injection variants)"
      - "LLM02 output sanitization reference implementation (Python)"
      - "LLM03 dataset audit pipeline for detecting poisoned samples"
      - "Trust boundary diagram for common LLM deployment patterns"
      - "Detection rule sketches (pre-Sigma) for LLM01-LLM03 indicators"
      - "Lab exercise: demonstrate LLM01 via document injection in RAG pipeline"

    security_preview: |
      LLM01 is the most exploited vulnerability in production LLM systems today.
      The reason is fundamental, not accidental: language models cannot cryptographically
      separate instructions from data — both arrive as text tokens. Every RAG pipeline,
      every tool-using agent, every multi-modal deployment is exposed. LLM02 compounds
      this: the attacker doesn't need RCE on the model if the model writes code that
      runs as RCE on the downstream system. LLM03 is the slowest-burning fuse —
      training data corruption persists through every version of the model until
      a clean retrain. These three risks alone justify a dedicated detection program.

