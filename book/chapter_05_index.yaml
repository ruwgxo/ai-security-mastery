  purpose: |
    This chapter is the gateway to Part 2. You've spent Part 1 building deep
    understanding of how ML, deep learning, transformers, and production LLMs work
    from the inside. Now we weaponize that knowledge.

    Chapter 5 gives you the complete map of AI security threats before we dive into
    individual attack classes in Chapters 6-10. We answer: what is the full attack
    surface? How does attacking an AI system differ from attacking traditional
    software? Where does OWASP classify the risks? How does MITRE document adversarial
    ML tactics? What does the regulatory landscape require? And how do you build a
    threat model for an enterprise LLM deployment?

    For security engineers: this is the chapter you return to when scoping a new
    engagement, briefing leadership, or designing a detection program. It is the
    reference layer — structured, comprehensive, and framework-aligned — that
    everything else in the book plugs into.

    Unlike Chapters 6-10 (which go deep on individual attacks), Chapter 5 is
    deliberately broad. The goal is to build the full mental model of the AI threat
    space — every taxonomy, every framework, every regulatory requirement — so that
    individual attacks in later chapters have proper context.

