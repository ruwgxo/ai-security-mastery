deliverables:
  deliverable_1:
    title: The Toxicity Detector
    filename: toxicity_detector.py
    description: |-
      The hosted-plus-custom toxicity detector implementing the unified API from Section 15.01. A hosted moderation service as the maintained baseline behind a fault-tolerant interface, a custom layer for domain-specific toxicity and a context adjustment, a combination where either layer can escalate and context can only de-escalate, two-sided scanning, and an explicit hosted-failure policy. Runs standalone on stubs and demonstrates clean, harassment, threat, domain-specific, and context-dependent cases.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library time, dataclasses, enum, and typing only. The unified API types are reproduced inline so the file runs standalone; in the suite they are imported from detector_api_contract.py. Both the hosted service and the custom model are Protocols with deterministic stubs -- NOT real services or models -- to be replaced with the production hosted moderation API and the trained domain model. The hosted call is wrapped in try/except so a hosted failure is handled by the fail-open policy rather than crashing the detector.
    code: |
      # toxicity_detector.py
      # Section 15.05: Toxicity Detector -- Hosted APIs and Custom Models
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # The fourth detector in the suite. Unlike the injection and jailbreak detectors
      # (patterns + a classifier we own) or the PII scanner (regex + NER), toxicity
      # combines a HOSTED classification service -- a maintained third-party baseline
      # we do not train -- with CUSTOM models for the domain-specific and context-
      # dependent toxicity the hosted service misses. The two scores combine into one
      # verdict on the unified API of Section 15.01, scanning both inputs and outputs.

      import time
      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Any, Dict, List, Optional, Protocol


      # --- Unified API contract (from Section 15.01) ------------------------------
      # Reproduced here so the detector is runnable standalone. In the suite these
      # come from detector_api_contract.py and every detector imports them.

      class Verdict(Enum):
          ALLOW = 'allow'
          FLAG = 'flag'
          BLOCK = 'block'


      @dataclass
      class DetectionContext:
          request_id: str
          text: str
          surface: str = 'input'
          session_id: Optional[str] = None
          metadata: Dict[str, Any] = field(default_factory=dict)


      @dataclass
      class Evidence:
          source: str
          label: str
          detail: str = ''


      @dataclass
      class DetectorResult:
          detector: str
          verdict: Verdict
          score: float
          confidence: float
          latency_ms: float
          evidence: List[Evidence] = field(default_factory=list)


      # --- Toxicity categories ----------------------------------------------------

      class ToxicityCategory(Enum):
          HARASSMENT = 'harassment'
          HATE = 'hate'
          THREAT = 'threat'
          SEXUAL = 'sexual'
          SELF_HARM = 'self_harm'
          DOMAIN = 'domain'          # domain-specific toxicity the custom model owns


      @dataclass
      class ToxicitySignal:
          category: str
          score: float               # 0..1
          source: str                # 'hosted' or 'custom'


      # --- The hosted layer -------------------------------------------------------
      # A maintained third-party toxicity classification service (the kind of hosted
      # moderation API a platform buys rather than builds). It is broad, kept current
      # by its vendor, and covers the common categories out of the box. Behind a
      # Protocol because it is a network call in production: the detector must handle
      # its latency and its failure, and be testable without it.

      class HostedToxicityService(Protocol):
          def classify(self, text: str) -> Dict[str, float]:
              '''Return {category: score} for the common toxicity categories.'''
              ...


      class StubHostedService:
          '''Deterministic stand-in for the hosted moderation service, so this file
          runs offline. Scores a small fixed lexicon. NOT a real service -- replace
          with the production hosted moderation API in deployment.'''

          _LEXICON = {
              'harassment': ('idiot', 'moron', 'shut up', 'you people', 'pathetic'),
              'hate': ('subhuman', 'vermin', 'go back to'),
              'threat': ('i will hurt', 'i will kill', 'you are dead', 'watch your back'),
          }

          # Threats and hate are weighted higher at baseline than harassment: a
          # credible threat is a block-worthy category on a single clear hit.
          _CATEGORY_BASE = {'threat': 0.85, 'hate': 0.8, 'harassment': 0.5}

          def classify(self, text: str) -> Dict[str, float]:
              low = text.lower()
              scores: Dict[str, float] = {}
              for cat, terms in self._LEXICON.items():
                  hits = sum(1 for t in terms if t in low)
                  if hits:
                      base = self._CATEGORY_BASE.get(cat, 0.5)
                      scores[cat] = min(base + 0.13 * (hits - 1), 0.98)
              return scores


      # --- The custom layer -------------------------------------------------------
      # Custom models for the toxicity a general hosted service does not capture:
      # domain-specific abuse (industry slurs, community-specific harassment) and the
      # context-dependent cases the hosted service scores wrongly. Also behind a
      # Protocol, injected and versioned like every model in the suite.

      class CustomToxicityModel(Protocol):
          def score(self, text: str, surface: str) -> Dict[str, float]:
              '''Return {category: score} for domain-specific/context-dependent toxicity.'''
              ...


      class StubCustomModel:
          '''Deterministic stand-in for the custom toxicity model. Scores a small
          domain lexicon and applies a crude context adjustment. NOT a real model --
          replace with the trained domain model in production.'''

          _DOMAIN_TERMS = ('rage quit noob', 'get rekt scrub', 'uninstall trash')

          # Reclaimed / clinical / quoted contexts where surface toxicity is benign.
          _BENIGN_CONTEXT = ('research', 'study', 'quote', 'lyrics', 'reclaim', 'in the game',
                             'clinical', 'reported that', 'according to')

          def score(self, text: str, surface: str) -> Dict[str, float]:
              low = text.lower()
              scores: Dict[str, float] = {}
              domain_hits = sum(1 for t in self._DOMAIN_TERMS if t in low)
              if domain_hits:
                  scores['domain'] = min(0.5 + 0.2 * domain_hits, 0.9)
              return scores

          def context_factor(self, text: str) -> float:
              '''A multiplier below 1.0 when the text sits in a benign context that
              makes surface toxicity non-toxic -- the core context-dependence control.'''
              low = text.lower()
              if any(cue in low for cue in self._BENIGN_CONTEXT):
                  return 0.4
              return 1.0


      # --- The detector -----------------------------------------------------------

      @dataclass
      class ToxicityConfig:
          '''Configuration: thresholds, hosted/custom weighting, surfaces, context
          handling, and versions. Managed across the suite in Section 15.07.'''
          block_threshold: float = 0.80
          flag_threshold: float = 0.50
          hosted_weight: float = 1.0          # trust the maintained baseline at face value
          custom_weight: float = 1.0          # custom scores weighted equally by default
          apply_context_factor: bool = True   # let the custom model down-weight benign contexts
          scan_input: bool = True
          scan_output: bool = True
          fail_open_on_hosted_error: bool = True   # if the hosted call fails, do not block on it alone
          hosted_service_version: str = 'hosted-moderation-v1'
          custom_model_version: str = 'toxicity-domain-v1'


      class ToxicityDetector:
          '''Hosted-plus-custom toxicity detector on the unified API.'''

          name = 'toxicity'

          def __init__(self, hosted: Optional[HostedToxicityService] = None,
                       custom: Optional[CustomToxicityModel] = None,
                       config: Optional[ToxicityConfig] = None) -> None:
              self._hosted = hosted if hosted is not None else StubHostedService()
              self._custom = custom if custom is not None else StubCustomModel()
              self._cfg = config if config is not None else ToxicityConfig()

          def _should_scan(self, surface: str) -> bool:
              return self._cfg.scan_output if surface == 'output' else self._cfg.scan_input

          def _gather(self, text: str, surface: str) -> tuple:
              '''Collect hosted and custom signals. The hosted call can fail (network),
              and the fail-open policy means a hosted failure does not by itself block.'''
              signals: List[ToxicitySignal] = []
              hosted_failed = False
              try:
                  for cat, sc in self._hosted.classify(text).items():
                      signals.append(ToxicitySignal(cat, sc * self._cfg.hosted_weight, 'hosted'))
              except Exception:
                  hosted_failed = True
              for cat, sc in self._custom.score(text, surface).items():
                  signals.append(ToxicitySignal(cat, sc * self._cfg.custom_weight, 'custom'))
              return signals, hosted_failed

          def detect(self, ctx: DetectionContext) -> DetectorResult:
              start = time.perf_counter()

              if not self._should_scan(ctx.surface):
                  latency_ms = (time.perf_counter() - start) * 1000.0
                  return DetectorResult(self.name, Verdict.ALLOW, 0.0, 1.0, latency_ms, [])

              signals, hosted_failed = self._gather(ctx.text, ctx.surface)

              # Context factor: down-weight surface toxicity that sits in a benign
              # context (research, quotation, reclaimed usage, in-game banter). This
              # is what handles context-dependent toxicity rather than matching words.
              factor = 1.0
              if self._cfg.apply_context_factor:
                  factor = self._custom.context_factor(ctx.text)

              raw = max((s.score for s in signals), default=0.0)
              score = raw * factor

              evidence: List[Evidence] = []
              for s in signals:
                  if s.score >= self._cfg.flag_threshold * 0.6:
                      evidence.append(Evidence(source=s.source, label=f'toxicity_{s.category}',
                                               detail=f'{ctx.surface}: {s.score:.2f}'))
              if factor < 1.0:
                  evidence.append(Evidence(source='custom', label='benign_context_adjustment',
                                           detail=f'factor={factor:.2f}'))
              if hosted_failed:
                  evidence.append(Evidence(source='hosted', label='hosted_service_error',
                                           detail='fail-open' if self._cfg.fail_open_on_hosted_error else 'fail-closed'))

              if score >= self._cfg.block_threshold:
                  verdict = Verdict.BLOCK
              elif score >= self._cfg.flag_threshold:
                  verdict = Verdict.FLAG
              else:
                  verdict = Verdict.ALLOW

              # Confidence: agreement between hosted and custom raises it; a lone
              # signal, or a hosted failure, lowers it.
              sources = {s.source for s in signals if s.score >= self._cfg.flag_threshold}
              if len(sources) >= 2:
                  confidence = 0.95
              elif hosted_failed:
                  confidence = 0.6
              else:
                  confidence = 0.82 if signals else 0.9
              confidence = min(confidence, 0.98)

              latency_ms = (time.perf_counter() - start) * 1000.0
              return DetectorResult(
                  detector=self.name,
                  verdict=verdict,
                  score=round(score, 4),
                  confidence=round(confidence, 4),
                  latency_ms=latency_ms,
                  evidence=evidence,
              )


      if __name__ == '__main__':
          det = ToxicityDetector()
          samples = [
              ('clean', 'Thanks for the help, this explanation was really clear.', 'input'),
              ('harass_out', 'You are a pathetic moron and everyone thinks so.', 'output'),
              ('threat_in', 'I will hurt you if you post that again.', 'input'),
              ('domain', 'get rekt scrub, uninstall trash, you have no skill.', 'input'),
              ('context', 'The study reported that the slur "vermin" was used to dehumanise.', 'output'),
          ]
          for label, text, surface in samples:
              ctx = DetectionContext(request_id=label, text=text, surface=surface)
              r = det.detect(ctx)
              srcs = ','.join(sorted({e.source for e in r.evidence})) or 'none'
              print(f'{label:11} [{surface:6}] {r.verdict.value:5} score={r.score:.2f} '
                    f'conf={r.confidence:.2f} via={srcs} {r.latency_ms:.2f}ms')
  deliverable_2:
    title: Toxicity Detector Test Harness
    filename: toxicity_detector_test_harness.py
    description: |-
      Validates the detector against a labelled corpus whose hardest cases are context-dependent: surface-toxic text that is benign in a research, quotation, reclaimed, or in-game context and must be allowed. Reports accuracy, false-positive rate, and p99 latency with a pass/fail gate.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library only, imports the detector under test. On the shipped configuration it reports 100% accuracy, 0% false positives, and sub-millisecond p99 on the sample corpus. The large-corpus version runs in detection_test_framework.py (Section 15.07).
    code: |
      # toxicity_detector_test_harness.py
      # Section 15.05: Toxicity Detector Test Harness
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # Validates the toxicity detector against a labelled corpus and reports the
      # three quality-bar metrics with a pass/fail gate. The corpus deliberately
      # stresses context-dependent toxicity: the same surface-toxic word is toxic in
      # a hostile message and benign in a research, quotation, or reclaimed context,
      # and the detector must separate them. That is the defining test here.

      from dataclasses import dataclass
      from typing import List

      from toxicity_detector import ToxicityDetector, DetectionContext, Verdict


      @dataclass
      class LabelledCase:
          text: str
          surface: str
          is_toxic: bool              # ground truth


      CORPUS: List[LabelledCase] = [
          # --- positives: hosted-covered categories ---
          LabelledCase('You are a pathetic moron and everyone agrees.', 'output', True),
          LabelledCase('I will hurt you if you show up here again.', 'input', True),
          LabelledCase('Those people are subhuman vermin.', 'output', True),
          LabelledCase('Watch your back, you are dead to me.', 'input', True),
          # --- positives: domain-specific (custom model) ---
          LabelledCase('get rekt scrub, uninstall trash, you are worthless.', 'input', True),
          LabelledCase('rage quit noob, nobody wants you on the team.', 'output', True),
          # --- negatives: clean text ---
          LabelledCase('Thanks so much, this was a really helpful answer.', 'input', False),
          LabelledCase('The quarterly numbers look strong across every region.', 'output', False),
          LabelledCase('Could you explain how gradient descent converges?', 'input', False),
          # --- negatives: context-dependent (surface-toxic, benign in context) ---
          LabelledCase('The study reported that the slur "vermin" was used to dehumanise a group.', 'output', False),
          LabelledCase('In the game, "get rekt scrub" is common friendly trash talk between friends.', 'input', False),
          LabelledCase('The lyrics quote a reclaimed term the community uses about itself.', 'output', False),
          LabelledCase('According to the report, harassment such as "shut up" rose on the platform.', 'output', False),
      ]


      def evaluate(detector: ToxicityDetector, corpus: List[LabelledCase]) -> dict:
          latencies: List[float] = []
          tp = tn = fp = fn = 0
          for i, case in enumerate(corpus):
              ctx = DetectionContext(request_id=f'case-{i}', text=case.text, surface=case.surface)
              r = detector.detect(ctx)
              latencies.append(r.latency_ms)
              flagged = r.verdict in (Verdict.FLAG, Verdict.BLOCK)
              if case.is_toxic and flagged:
                  tp += 1
              elif case.is_toxic and not flagged:
                  fn += 1
              elif not case.is_toxic and flagged:
                  fp += 1
              else:
                  tn += 1
          total = len(corpus)
          accuracy = (tp + tn) / total
          benign = fp + tn
          fp_rate = fp / benign if benign else 0.0
          latencies.sort()
          p99 = latencies[min(len(latencies) - 1, int(round(0.99 * (len(latencies) - 1))))]
          return {'accuracy': accuracy, 'false_positive_rate': fp_rate, 'p99_latency_ms': p99,
                  'tp': tp, 'tn': tn, 'fp': fp, 'fn': fn}


      def check_quality_bar(m: dict) -> tuple:
          reasons = []
          if m['accuracy'] < 0.95:
              reasons.append(f"accuracy {m['accuracy']:.2%} < 95%")
          if m['p99_latency_ms'] > 50.0:
              reasons.append(f"p99 {m['p99_latency_ms']:.1f}ms > 50ms")
          if m['false_positive_rate'] > 0.05:
              reasons.append(f"FP {m['false_positive_rate']:.2%} > 5%")
          return (not reasons, reasons)


      if __name__ == '__main__':
          det = ToxicityDetector()
          m = evaluate(det, CORPUS)
          print(f"accuracy            : {m['accuracy']:.2%}")
          print(f"false-positive rate : {m['false_positive_rate']:.2%}")
          print(f"p99 latency         : {m['p99_latency_ms']:.3f}ms")
          print(f"confusion           : tp={m['tp']} tn={m['tn']} fp={m['fp']} fn={m['fn']}")
          passed, reasons = check_quality_bar(m)
          print('quality bar         :', 'PASS' if passed else 'FAIL -- ' + '; '.join(reasons))
  deliverable_3:
    title: Hosted-Versus-Custom Score Combination Reference
    filename: toxicity_score_combination.py
    description: |-
      The decision logic of the detector extracted as a standalone reference: the combination rule (raw is the max of hosted and custom signals; score is raw times the context factor; thresholds map to allow/flag/block) with a table of reference cases including domain-specific catches, context de-escalation, and both fail-open outcomes.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library dataclasses only. Every reference case is checked against the combine function on run, so the documented behaviour and the executable logic cannot drift apart.
    code: |
      # toxicity_score_combination.py
      # Section 15.05: Hosted-Versus-Custom Score Combination Reference
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # The reference for how the hosted baseline score and the custom model score
      # combine into one verdict, and how the context factor adjusts the result. This
      # is the decision logic of the detector, extracted so it can be reasoned about
      # and documented independently of the detector plumbing.

      from dataclasses import dataclass
      from typing import Dict, List


      @dataclass
      class CombinationCase:
          hosted: float               # max hosted category score (0..1), or -1 if failed
          custom: float               # max custom category score (0..1)
          context_factor: float       # 1.0 normally, <1.0 in a benign context
          expected_band: str          # allow / flag / block
          rationale: str


      # The combination rule, stated plainly:
      #   raw   = max(hosted_signals, custom_signals)   -- either layer can escalate
      #   score = raw * context_factor                  -- benign context down-weights
      #   band  = block if score >= 0.80, flag if >= 0.50, else allow
      # The hosted service is the maintained baseline; the custom model adds domain-
      # specific coverage and, through the context factor, corrects the hosted
      # service on context-dependent cases it scores wrongly.

      def combine(hosted: float, custom: float, context_factor: float,
                  block: float = 0.80, flag: float = 0.50) -> tuple:
          signals = [s for s in (hosted, custom) if s >= 0.0]
          raw = max(signals) if signals else 0.0
          score = raw * context_factor
          if score >= block:
              band = 'block'
          elif score >= flag:
              band = 'flag'
          else:
              band = 'allow'
          return round(score, 3), band


      REFERENCE_CASES: List[CombinationCase] = [
          CombinationCase(0.90, 0.00, 1.0, 'block',
                          'Hosted baseline catches a clear common-category toxicity on its own.'),
          CombinationCase(0.00, 0.85, 1.0, 'block',
                          'Custom model catches domain-specific toxicity the hosted service misses.'),
          CombinationCase(0.63, 0.00, 1.0, 'flag',
                          'Moderate hosted score flags for review without blocking.'),
          CombinationCase(0.90, 0.00, 0.40, 'allow',
                          'Surface-toxic but in a benign context (research/quote): context factor down-weights.'),
          CombinationCase(-1.0, 0.85, 1.0, 'block',
                          'Hosted service failed (fail-open); custom model still carries a clear verdict.'),
          CombinationCase(-1.0, 0.00, 1.0, 'allow',
                          'Hosted failed and custom is clean: fail-open means no block on the failure alone.'),
      ]


      if __name__ == '__main__':
          print('hosted  custom  ctx    -> score  band    (expected)  ok')
          all_ok = True
          for c in REFERENCE_CASES:
              score, band = combine(c.hosted, c.custom, c.context_factor)
              ok = band == c.expected_band
              all_ok &= ok
              h = 'FAIL' if c.hosted < 0 else f'{c.hosted:.2f}'
              print(f'{h:>6}  {c.custom:.2f}   {c.context_factor:.2f}  -> {score:.2f}   '
                    f'{band:6} ({c.expected_band:6})  {"ok" if ok else "MISMATCH"}')
          print('\nall reference cases match:', all_ok)
  deliverable_4:
    title: Toxicity Detector Configuration
    filename: toxicity_detector_config.py
    description: |-
      Configuration for the detector -- thresholds, hosted/custom weighting, context handling, scanned surfaces, the hosted-failure policy, and pinned versions -- as data, because toxicity policy is deployment-specific. Ships general, strict (fail-closed), and gaming (custom-heavy, high bar) profiles.
    implementation_notes: |-
      Python 3.12, single quotes throughout per book convention, standard-library dataclasses only. validate() enforces threshold ordering, at least one surface, and non-negative weights. The fail_open_on_hosted_error flag is the externalised network-failure policy.
    code: |
      # toxicity_detector_config.py
      # Section 15.05: Toxicity Detector Configuration
      # 20260121 | AI Security Mastery -- Chapter 15 by Raghav Dinesh
      # Single quotes throughout per book convention
      #
      # Configuration for the toxicity detector: thresholds, hosted/custom weighting,
      # surfaces, context handling, the hosted-failure policy, and pinned versions.
      # Toxicity policy is deployment-specific -- a gaming platform and a childrens
      # service draw the line very differently -- so these are externalised as data
      # and managed across the suite in Section 15.07.

      from dataclasses import dataclass, asdict
      from typing import Dict, Any


      @dataclass
      class ToxicityDetectorConfig:
          # Verdict thresholds on the combined, context-adjusted 0..1 score.
          block_threshold: float = 0.80
          flag_threshold: float = 0.50

          # Layer weighting. The hosted baseline is trusted at face value by default;
          # the custom model adds coverage rather than overriding.
          hosted_weight: float = 1.0
          custom_weight: float = 1.0

          # Context handling -- the core control for context-dependent toxicity.
          apply_context_factor: bool = True

          # Surfaces.
          scan_input: bool = True
          scan_output: bool = True

          # Hosted-service failure policy. The hosted call is a network dependency; on
          # failure, fail-open means the detector does not block on the missing hosted
          # signal alone (the custom model still contributes). A strict deployment may
          # fail-closed and treat a hosted outage as a block-eligible condition.
          fail_open_on_hosted_error: bool = True

          # Pinned identities for reproducible, auditable verdicts.
          hosted_service_version: str = 'hosted-moderation-v1'
          custom_model_version: str = 'toxicity-domain-v1'

          def validate(self) -> None:
              assert 0.0 <= self.flag_threshold < self.block_threshold <= 1.0, \
                  'thresholds must satisfy 0 <= flag < block <= 1'
              assert self.scan_input or self.scan_output, 'must scan at least one surface'
              assert 0.0 <= self.hosted_weight and 0.0 <= self.custom_weight

          def to_dict(self) -> Dict[str, Any]:
              return asdict(self)


      # Deployment profiles.
      #   general    -- balanced default.
      #   strict     -- lower thresholds, fail-closed; for low-tolerance surfaces.
      #   gaming     -- higher thresholds and heavy reliance on the custom model, for
      #                 communities where robust banter is normal and context matters.
      GENERAL = ToxicityDetectorConfig()
      STRICT = ToxicityDetectorConfig(block_threshold=0.70, flag_threshold=0.40,
                                      fail_open_on_hosted_error=False)
      GAMING = ToxicityDetectorConfig(block_threshold=0.88, flag_threshold=0.60,
                                      custom_weight=1.2)


      if __name__ == '__main__':
          for name, cfg in [('general', GENERAL), ('strict', STRICT), ('gaming', GAMING)]:
              cfg.validate()
              d = cfg.to_dict()
              print(f"{name:8} block={d['block_threshold']} flag={d['flag_threshold']} "
                    f"fail_open={d['fail_open_on_hosted_error']} custom_w={d['custom_weight']}")
          print('all profiles valid')
common_mistakes:
  mistake_1:
    description: |-
      Rebuilding broad toxicity classification in-house instead of using a maintained hosted service
    why_it_happens: |-
      Building the whole detector in-house matches the pattern of the earlier detectors, and owning the model feels more controllable than depending on a vendor.
    consequence: |-
      Enormous effort goes into re-deriving a commoditised capability that a hosted service does better and keeps current, and the in-house model falls behind evolving abuse the moment the team stops actively maintaining it.
    correct_approach: |-
      Buy the baseline. Use a maintained hosted moderation service for the broad common categories and spend in-house effort only on the domain-specific and context-dependent toxicity the hosted service cannot cover.
  mistake_2:
    description: |-
      Trusting the hosted service alone and skipping the custom layer
    why_it_happens: |-
      The hosted service is good on the obvious cases and passes a casual test set, so the custom layer looks like unnecessary extra work.
    consequence: |-
      The detector is blind to the platform domain-specific abuse the general service never learned, and it mis-scores every context-dependent case, flagging research and quotation as toxic while missing coded in-group harassment.
    correct_approach: |-
      Add the custom layer for both gaps: domain models for the abuse the hosted service misses, and a context adjustment for the context-dependent cases it scores wrongly.
  mistake_3:
    description: |-
      Handling context-dependent toxicity by matching words rather than weighing context
    why_it_happens: |-
      A blocklist of toxic terms is easy to build and feels decisive, and the surface words really are present in the toxic cases.
    consequence: |-
      Every research paper, news report, quotation, and reclaimed usage that contains the term is flagged, because the words are there regardless of the context that makes them benign. The detector punishes discussing toxicity as if it were toxicity.
    correct_approach: |-
      Weigh context, do not match words. Use a context adjustment that down-weights surface toxicity sitting in a benign context -- quotation, research, reclaimed usage, in-game banter -- so the same word is treated differently by where it appears.
  mistake_4:
    description: |-
      Treating the hosted call as always-available and having no failure policy
    why_it_happens: |-
      In development the hosted service is always up, so its failure never comes up, and the call is written as if it cannot fail.
    consequence: |-
      When the hosted service times out or errors in production, the detector crashes, hangs past the latency budget, or silently passes everything -- and which of these happens is an accident rather than a decision.
    correct_approach: |-
      Wrap the hosted call in explicit fault handling with a configured policy. Fail-open by default -- proceed on the custom layer, do not block on the missing hosted signal alone, lower confidence -- or fail-closed for strict deployments, but decide in advance.
  mistake_5:
    description: |-
      Hardcoding one toxicity policy instead of configuring it per deployment
    why_it_happens: |-
      One threshold set is simpler, and the policy that fits the first deployment feels universal.
    consequence: |-
      A gaming platform where robust banter is normal gets flooded with false positives, while a childrens service under the same policy lets through content it should block. One policy cannot fit surfaces with such different norms.
    correct_approach: |-
      Externalise thresholds, weighting, context handling, and failure policy as configuration, and ship profiles -- general, strict, gaming -- so each deployment sets its own toxicity line.
section_summary:
  compact: |-
    Section 15.05 builds the toxicity detector, the first in the suite to combine a bought capability with an owned one. Broad toxicity classification -- harassment, hate, threats -- is a commoditised capability, so the detector uses a maintained hosted moderation service as its baseline rather than rebuilding it, a deliberate build-versus-buy decision. But a general hosted service has two systematic blind spots: it does not know a platform domain-specific abuse, and it classifies text in isolation without the context the text sits in. The custom layer exists for exactly these gaps -- domain models for the abuse the hosted service misses, and a context adjustment that down-weights surface toxicity sitting in a benign context, such as a slur quoted in research or reclaimed by its community. The scores combine so that either layer can escalate while the context factor can only de-escalate, and because the hosted layer is a network dependency, the detector has an explicit fail-open (or fail-closed) policy rather than assuming availability. It scans both surfaces, its policy is deployment-specific configuration with general, strict, and gaming profiles, and its test corpus is built around context-dependent cases -- the surface-toxic-but-benign negatives where matching words fails and weighing context succeeds -- confirming the quality bar the suite requires.
  key_takeaways:
  - 'Toxicity is the first detector to buy rather than build its baseline: a maintained hosted moderation
    service covers the broad categories better than an in-house rebuild'
  - A general hosted service has two systematic blind spots -- domain-specific abuse and context -- and
    the custom layer exists for exactly those
  - Context-dependent toxicity cannot be handled by matching words; the same term is toxic or benign by
    context, so the detector weighs context via an adjustment factor
  - 'Scores combine so either layer can escalate while the context factor can only de-escalate: escalation
    from toxicity signals, de-escalation from benign context'
  - The hosted layer is a network dependency, so the detector needs an explicit failure policy -- fail-open
    by default, fail-closed for strict deployments
  - Toxicity policy is deployment-specific, so thresholds, weighting, and failure policy are configuration
    with general, strict, and gaming profiles
preview_section_15_06:
  title: 'Data Exfiltration Detector: Output Analysis and Rate Monitoring'
  summary: |-
    Section 15.06 builds the exfiltration detector, the last content-and-behaviour detector before the combined pipeline. It turns the Chapter 13 output-monitoring and Section 13.06 canary signals into an output-analysis detector -- sensitive-content rules and canary/honeytoken hits -- and combines them with the Chapter 13 aggregate rate and coverage signals that reveal an exfiltration campaign spread across many requests. Like the jailbreak detector, it draws on a behavioural signal beyond the single request, catching the slow, distributed extraction that no single output reveals, while meeting the suite quality bar.
