section_overview:
  one_line_summary: |-
    The fourth detector introduces a new kind of hybrid: a hosted toxicity classification service as a maintained third-party baseline combined with custom models for the domain-specific toxicity the hosted service misses, the two scores combining into one verdict on the unified API, scanning both inputs and outputs, with context-dependent toxicity -- content toxic in one context and benign in another -- as the central challenge the design is built to handle.
  why_this_section_exists: |-
    The three detectors before this one built their capability entirely in-house: patterns and a classifier we own for injection and jailbreak, regex and an NER model for PII. Toxicity is the first detector where the right architecture reaches outside the system. Broad toxicity classification -- harassment, hate, threats, the common categories -- is a solved, commoditised capability that mature hosted moderation services provide and keep current far more cheaply and thoroughly than any team should rebuild. So the toxicity detector uses a hosted service as its baseline. That is a deliberate build-versus-buy decision, and it is the right one for the broad categories.

    But a hosted service is general by design, and generality is exactly where it falls short. It does not know a particular platform domain-specific abuse -- the community slurs, the industry-specific harassment, the coded language of a specific user base. And, most importantly, it classifies text without knowing the context the text sits in, so it scores a slur the same whether it appears in a hateful message or in a research paper quoting that slur to condemn it. The custom layer exists for exactly these gaps: domain-specific models for the toxicity the general service misses, and a context adjustment that corrects the hosted service on the context-dependent cases it gets wrong. This section builds the hosted baseline behind a fault-tolerant interface, the custom layer, the combination that lets either escalate while context can de-escalate, and the test harness whose hardest cases are precisely the context-dependent ones.
  position_in_chapter: |-
    Section 15.05 is the fourth detector and the first to combine an owned capability with a bought one, introducing the hosted-service-as-baseline pattern and the fault tolerance a network dependency requires. It shares the two-sided scanning and the context-sensitivity focus of the PII scanner, and it is the last of the pure content detectors before the exfiltration detector (15.06) returns to a behavioural signal. The combined pipeline of Section 15.07 orchestrates it through the same unified API.
