prose_content:
  part_1:
    title: A Hybrid That Reaches Outside the System
    body: |-
      Every detector so far built its whole capability in-house. The toxicity detector is the first to make a build-versus-buy decision and land on buy for its foundation. Broad toxicity classification -- recognising harassment, hate speech, threats, sexual content, and the other common categories -- is a mature, commoditised capability. Several hosted moderation services do it well, train on far more data than any single team can gather, and keep their models current against evolving abuse as a maintained product. Rebuilding that from scratch would be expensive, slower, and worse. So the toxicity detector takes a hosted service as its baseline layer and spends its own effort only where the hosted service falls short.

      This is a genuine architectural shift for the suite, and it brings two consequences the earlier detectors did not have. First, the baseline is a network dependency: a call that costs latency and can fail, which the detector must handle explicitly rather than assume away. Second, the hosted service is general, and a general service has predictable blind spots -- it does not know a specific platform domain-specific abuse, and it does not know the context a piece of text sits in. So the detector is a hybrid of the hosted baseline and a custom layer built precisely for those blind spots. The hosted service gives broad, maintained coverage cheaply; the custom layer gives the domain-specific and context-aware coverage the hosted service cannot. As with every hybrid in this chapter, the two together are stronger than either alone.
  part_2:
    title: The Hosted Baseline and Its Blind Spots
    body: |-
      The hosted layer calls a maintained third-party moderation service and takes back a set of category scores -- how strongly the text reads as harassment, hate, a threat, and so on. For the broad categories this is excellent: the service is trained on enormous corpora, updated continuously by its vendor, and covers the common toxicity a platform sees every day without the platform maintaining any model at all. The detector treats these scores as its baseline and, by default, trusts them at face value.

      The blind spots are the flip side of the generality that makes the service valuable. A general service is trained to recognise toxicity in general, which means it under-performs on the toxicity that is specific to one domain: the slurs and coded harassment of a particular community, the abuse patterns of a specific industry or user base, the in-group language a general model has never learned. It also, and more fundamentally, classifies text in isolation. It sees the words and scores them, but it does not know whether those words appear in a hateful message or in a news report describing that hate, in an attack or in an academic analysis of attacks. These two gaps -- domain-specificity and context -- are systematic, not incidental, and no amount of trusting the hosted service harder closes them. They are what the custom layer is for.
  part_3:
    title: 'The Custom Layer: Domain-Specific and Context-Aware'
    body: |-
      The custom layer does two jobs the hosted baseline cannot. The first is domain-specific detection: models trained on a platform own toxicity -- the community slurs, the coded harassment, the abuse patterns particular to its users -- catching toxic content that a general service scores as clean because it never learned that this language is abusive in this context. This is a straightforward coverage extension: the custom model adds categories and sensitivities the hosted service lacks, and its scores join the hosted scores as additional signals that can escalate a verdict.

      The second job is the harder and more important one: context. The custom layer carries a context adjustment that can down-weight surface toxicity when the surrounding context makes it non-toxic. A slur quoted in a research paper to condemn it, a harsh term reclaimed by the community it once targeted, aggressive phrasing that is ordinary friendly banter inside a game, a report describing abuse in order to measure it -- in all of these the surface words trip the hosted classifier, but the content is not an attack on anyone. The context adjustment recognises these benign contexts and reduces the score accordingly, so the detector does not flag a study for quoting the thing it studies. This is the toxicity detector answer to the same context-sensitivity problem the PII scanner faced with common names: the signal is real at the surface, but whether it is actionable depends on context the surface does not show, and the detector must weigh that context rather than react to the words alone.
  part_4:
    title: Combining the Scores and Handling Hosted Failure
    body: |-
      The combination is deliberately simple and asymmetric. The raw score is the strongest signal from either layer -- the highest hosted category score or the highest custom score -- so either the maintained baseline or the domain model can escalate a verdict on its own. Then the context factor from the custom layer multiplies that raw score, and because the factor is at most one, context can only ever reduce the score, never inflate it. Escalation comes from the toxicity signals; de-escalation comes from benign context. A clear harassment message scores high from the hosted service and blocks; domain-specific abuse the hosted service missed scores high from the custom model and blocks; a slur in a research quotation scores high at the surface but is multiplied down by the context factor and allowed. The resulting score maps to the three unified-API verdicts by the usual thresholds.

      Because the hosted layer is a network call, the detector needs an explicit failure policy, and this is where the fault tolerance of Chapter 14 becomes a detector concern. If the hosted service times out or errors, the detector does not simply crash or silently pass. Under the default fail-open policy it proceeds on the custom layer alone and does not block on the strength of a missing hosted signal, recording the hosted failure in the evidence and lowering its confidence to mark the verdict as partial. A stricter deployment can choose fail-closed, treating a hosted outage as a condition that itself warrants blocking or heavy flagging. Either way the choice is explicit configuration, not an accident of how the network happened to behave, because a detector that depends on a service it does not control must decide in advance what it does when that service is gone.
  part_5:
    title: Two-Sided Scanning and Deployment-Specific Policy
    body: |-
      Like the PII scanner, the toxicity detector scans both surfaces, because toxic content crosses the boundary both ways. On the input side, users send abuse -- at the model, at other users in a shared space, at the platform. On the output side, the model can produce toxic content, whether goaded into it, drawn from its training, or echoed from a tool result. Both are events a production system needs to see, so the detector reads the surface from the context and scans whichever surfaces the configuration enables.

      Toxicity policy, even more than PII policy, is deployment-specific, and the configuration reflects that. What counts as blockable toxicity on a childrens education service is very different from what counts on a competitive gaming platform where robust trash talk is the culture, which is different again from a professional workplace tool. The thresholds, the weighting of hosted versus custom, whether the context factor is applied, and the hosted-failure policy are all configuration, and the section ships profiles for the common stances -- a balanced general profile, a strict low-tolerance profile that also fails closed, and a gaming profile that leans on the custom model and raises the bar for blocking. The detector supplies the mechanism; the deployment sets where the line sits.
  part_6:
    title: 'Meeting the Quality Bar: The Context-Dependent Corpus'
    body: |-
      The test harness validates the detector against a labelled corpus and reports the three quality-bar metrics with a pass/fail gate, and for toxicity the corpus has one demanding requirement above the others: it must be built around context-dependent cases. The positive side is straightforward -- clear harassment, threats, and hate for the hosted baseline, and domain-specific abuse for the custom model. The negative side is where the detector is really tested. It contains text that is surface-toxic but benign in context: a study quoting a slur to condemn it, a report measuring harassment by naming examples, in-game banter that reads as aggression out of context, a reclaimed term used by the community it belongs to. Every one of these contains words the hosted service scores as toxic, and every one must be allowed.

      A toxicity detector validated only on clearly-toxic and clearly-clean text proves nothing, because the hosted service alone would pass that corpus and the custom context layer would appear unnecessary. The whole value of the custom layer shows up only against the context-dependent negatives, where matching words fails and weighing context succeeds. The bar is met when the detector blocks the real toxicity -- broad and domain-specific -- while allowing the surface-toxic-but-benign cases, at the accuracy, latency, and false-positive targets the suite requires, with the hosted call fitting inside the latency budget and its failure handled. When it does, the detector implements the unified API and is ready for the combined pipeline of Section 15.07.
