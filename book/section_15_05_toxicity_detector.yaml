    choice
  - Describe the configuration -- thresholds, weighting, surfaces, failure policy -- and why toxicity
    policy is deployment-specific
  skills:
  - Implement the unified detector API for a hosted-plus-custom toxicity detector
  - Integrate a hosted classification service behind a fault-tolerant interface that handles its latency
    and failure
  - Add a custom model layer for domain-specific toxicity and a context adjustment
  - Combine hosted and custom scores into one verdict where either can escalate and context can de-escalate
  - Scan input and output surfaces for toxic content
