  security_mindset:
  - Recognise that some detection capability is better bought than built, and that a hosted baseline is
    a legitimate architectural choice
  - Internalise that a general hosted service is blind to domain-specific abuse and to context, and that
    the custom layer exists for exactly those gaps
  - Understand that context-dependent toxicity cannot be handled by matching words, because the same word
    is toxic or benign depending on its context
  - Appreciate that a hosted service is a network dependency that will fail, so the detector needs an
    explicit failure policy rather than an implicit assumption of availability
