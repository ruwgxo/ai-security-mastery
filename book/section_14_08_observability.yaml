section_overview:
  one_line_summary: 'A detection system that cannot be observed cannot be operated, tuned, or trusted,
    so observability is a precondition rather than optional instrumentation: metrics give aggregate health,
    logging gives per-event detail, and tracing follows a request through the tiers, with the golden signals
    -- latency, traffic, errors, saturation -- as the compact core, all instrumented cheaply so measuring
    the hot path does not itself violate the latency budget.'
  why_this_section_exists: |-
    Sections 14.02 through 14.07 built a gateway that is placed correctly, fast per request,
    scalable in aggregate, and resilient to failure. All of that behaviour is now happening --
    and none of it is visible. The circuit breakers are tripping and recovering, the latency
    budget is being met or missed, detectors are flagging and failing, load is being shed --
    but an operator looking at the running gateway has no way to see any of it. This is the
    observability concern from the 14.01 taxonomy, and its consequence is sharp: a detection
    system you cannot see is a detection system you cannot operate, tune, or trust. If the
    false-positive rate triples, no one knows until users route around the product; if a
    detector is silently failing open, no one knows until the attack it missed surfaces
    elsewhere. This section makes the system observable. It builds the three complementary
    pillars -- metrics for aggregate health, structured logging for per-event detail, and
    tracing to follow a single request through the tiers -- and defines the golden signals of
    latency, traffic, errors, and saturation as the compact metric core that a health picture
    and, later, alerting are built on. Crucially, it does all of this under the same latency
    discipline the rest of the chapter obeys: the instrumentation of the hot path must be cheap
    enough that observing the latency budget does not itself spend it. Observability is not a
    reporting afterthought; it is the precondition for running the system at all, and the
    precondition for the tuning that Chapter 17 will do.
  position_in_chapter: |-
    Section 14.08 is the first of the two operability sections (14.08-14.09) and the response to
    the observability concern from the 14.01 taxonomy. It produces and instruments the signals;
    Section 14.09 then assembles those signals into an operable dashboard with alerting,
    runbooks, and service level objectives. This section is the instrumentation layer beneath
    the dashboard, and the observability it creates is the precondition for the tuning of
    Chapter 17.
learning_objectives:
  knowledge:
  - Explain why a detection system that cannot be observed cannot be operated, tuned, or trusted, so observability
    is a precondition not an option
  - Describe the three complementary observability pillars -- metrics, logging, and tracing -- and what
    each provides
  - Define the golden signals -- latency, traffic, errors, saturation -- as the compact core metrics for
    a detection gateway
  - Explain how metrics give aggregate health, logging gives per-event audit detail, and tracing follows
    one request through the tiers
  - Explain why instrumentation must not add latency to the inline tier and how sampling and asynchronous
    export keep it cheap
  - Describe how detection signals are correlated across the request lifecycle by a shared trace identifier
  - Explain why observability is the precondition for the tuning of Chapter 17
  skills:
  - Instrument each detector and tier with metrics, structured logs, and trace spans from a single cheap
    update
  - Define the golden-signals metric set per detector and per tier
  - Design a structured detection-event logging schema that is queryable by detector, verdict, and trace
    identifier
  - Configure request tracing across the tiers with sampling and asynchronous export to keep the hot path
    cheap
  security_mindset:
  - Recognise that an unobserved detection system fails silently -- a tripled false-positive rate or a
    detector failing open goes unnoticed until damage surfaces
  - 'Internalise that the three pillars are complementary, not redundant: aggregate health, per-event
    detail, and per-request path each answer a different question'
  - Understand that the same latency discipline applied to detection must be applied to its instrumentation,
    or observing the hot path violates the budget it measures
  - Appreciate that observability is what turns the resilient behaviour of earlier sections from invisible
    mechanism into something an operator can watch and trust
