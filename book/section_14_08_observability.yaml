document_info:
  title: 'Observability: Metrics, Logging, and Tracing'
  chapter: 14
  section: 8
  section_code: '1408'
  author: Raghav Dinesh
  github: https://github.com/ruwgxo/ai-security-mastery
  license: MIT
  version: '1.0'
