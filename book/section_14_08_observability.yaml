    - - verdict
      - Outcome of the detection
      - clean, flagged, error, timeout
    - - score / latency_ms
      - Detection score and how long it took
      - 0.94 / 12.0
    - - policy_applied
      - How a failure resolved, else null
      - fail_closed
    - - breaker_state
      - Breaker state at the time of the call
      - closed, open, half_open
  table_4:
    title: Cheap Hot-Path Instrumentation Techniques
    description: 'How the inline tier is observed without spending the latency budget: minimal on-path
      recording with asynchronous export, and sampling scaled by how latency-sensitive the tier is. The
      same latency discipline applied to detection, applied to its monitoring.'
    columns:
    - Technique
    - What it does
    - Effect on the hot path
    rows:
    - - Asynchronous export
      - Record in memory on-path; export off-path
      - Hot path pays an increment, not a network write
    - - Trace-id propagation
      - Carry the identifier on every request
      - 'Cheap: any request can be correlated if needed'
    - - Inline sampling (low rate)
      - Fully trace only a small fraction of inline requests
      - Captures the distribution at negligible per-request cost
    - - Higher off-path sampling
      - Trace more on near-real-time, fully on batch
      - Affordable where latency is not at stake
deliverables:
  deliverable_1:
    title: 'Observability Stack: Metrics, Logging, and Tracing'
    filename: observability_stack.py
    description: 'Instruments the detection gateway across all three pillars from a single cheap update
      per detection outcome: per-detector metrics for aggregate health, a trace span correlated by one
      trace identifier per request, and a structured JSON log event. Shows one request made visible three
      ways -- metrics, trace, and logs -- all consistent because they share a source.'
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      json, time, and uuid only. The JSON log lines contain double quotes at runtime as required by the
      JSON format; the source uses single quotes throughout.
    code: |
      # observability_stack.py
      # Section 14.08: Metrics, Logging, and Tracing Instrumentation for the Detection Gateway
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      import json
      import time
      import uuid
      from dataclasses import dataclass, field
      from typing import Dict, List, Optional


      # --- Metrics: cheap aggregate counters and latency accumulators per detector ---
      @dataclass
      class DetectorMetrics:
          name: str
          calls: int = 0
          flagged: int = 0
          errors: int = 0
          latency_ms_sum: float = 0.0
          in_flight: int = 0
          max_concurrent: int = 0

          def record(self, latency_ms: float, flagged: bool, errored: bool) -> None:
              self.calls += 1
              self.latency_ms_sum += latency_ms
              if flagged:
                  self.flagged += 1
              if errored:
                  self.errors += 1

          def snapshot(self) -> Dict[str, float]:
              avg = self.latency_ms_sum / self.calls if self.calls else 0.0
              return {
                  'traffic_calls': self.calls,
                  'flag_rate': round(self.flagged / self.calls, 4) if self.calls else 0.0,
                  'error_rate': round(self.errors / self.calls, 4) if self.calls else 0.0,
                  'avg_latency_ms': round(avg, 2),
                  'saturation_max_concurrent': self.max_concurrent,
              }


      # --- Tracing: a span per detector, correlated by one trace id per request ---
      @dataclass
      class Span:
          trace_id: str
          detector: str
          tier: str
          start_ms: float
          duration_ms: float


      @dataclass
      class Tracer:
          spans: List[Span] = field(default_factory=list)

          def record_span(self, trace_id: str, detector: str, tier: str, start_ms: float, duration_ms: float) -> None:
              self.spans.append(Span(trace_id, detector, tier, start_ms, round(duration_ms, 2)))

          def trace(self, trace_id: str) -> List[Span]:
              return [s for s in self.spans if s.trace_id == trace_id]


      # --- Structured logging: one JSON event per detection outcome ---
      def log_event(trace_id: str, detector: str, tier: str, verdict: str, latency_ms: float) -> str:
          event = {
              'ts': '20260121T000000Z',
              'trace_id': trace_id,
              'detector': detector,
              'tier': tier,
              'verdict': verdict,
              'latency_ms': round(latency_ms, 2),
          }
          return json.dumps(event, sort_keys=True)


      @dataclass
      class ObservabilityStack:
          metrics: Dict[str, DetectorMetrics] = field(default_factory=dict)
          tracer: Tracer = field(default_factory=Tracer)
          logs: List[str] = field(default_factory=list)

          def observe(self, trace_id: str, detector: str, tier: str,
                      start_ms: float, latency_ms: float, flagged: bool, errored: bool) -> None:
              '''Record a single detection outcome across all three pillars at once.

              The three pillars are complementary: the metric updates the aggregate health,
              the span records this call in the request trace, and the log captures the
              per-event detail. All three are fed from one cheap in-memory update so the
              hot path pays almost nothing to be observed.
              '''
              m = self.metrics.setdefault(detector, DetectorMetrics(detector))
              m.record(latency_ms, flagged, errored)
              self.tracer.record_span(trace_id, detector, tier, start_ms, latency_ms)
              verdict = 'error' if errored else ('flagged' if flagged else 'clean')
              self.logs.append(log_event(trace_id, detector, tier, verdict, latency_ms))


      def demo() -> None:
          stack = ObservabilityStack()
          trace_id = uuid.uuid4().hex[:12]
          # Simulate one request passing through three detectors on the inline tier.
          calls = [
              ('Injection classifier', 'inline', 14.2, False, False),
              ('Jailbreak classifier', 'inline', 11.8, True, False),
              ('Output PII scanner', 'inline', 7.1, False, False),
          ]
          t = 0.0
          for name, tier, lat, flagged, errored in calls:
              stack.observe(trace_id, name, tier, t, lat, flagged, errored)
              t += lat

          print('=' * 78)
          print('OBSERVABILITY STACK: METRICS, TRACING, LOGGING')
          print('One request observed across all three pillars from a single cheap update')
          print('=' * 78)
          print()
          print('METRICS (aggregate health per detector):')
          for name, m in stack.metrics.items():
              print(f'  {name}: {m.snapshot()}')
          print()
          print(f'TRACE (following request {trace_id} through the tiers):')
          for s in stack.tracer.trace(trace_id):
              print(f'  [{s.tier}] {s.detector}: start +{s.start_ms:.1f}ms, took {s.duration_ms:.1f}ms')
          print()
          print('LOGS (structured per-event detail for audit and investigation):')
          for line in stack.logs:
              print(f'  {line}')
          print()
          print('The same request is now visible three ways: metrics for aggregate health,')
          print('a trace for its path through the tiers, and logs for per-event audit detail.')


      if __name__ == '__main__':
          demo()
  deliverable_2:
    title: Golden-Signals Metric Reference
    filename: golden_signals_reference.py
    description: Defines the four golden signals -- latency, traffic, errors, saturation -- with the question
      each answers and its per-detector and per-tier metric, and explains why a small, well-chosen signal
      set is what an operator can actually watch and what the Section 14.09 alerting is built on.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the golden-signals reference and the rationale for privileging four signals.
    code: |
      # golden_signals_reference.py
      # Section 14.08: Golden-Signals Metric Reference for the Detection Gateway
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass
      from typing import List


      @dataclass
      class GoldenSignal:
          signal: str
          question: str
          detector_metric: str
          tier_metric: str
          why_it_matters: str


      SIGNALS: List[GoldenSignal] = [
          GoldenSignal(
              signal='Latency',
              question='How long does detection take?',
              detector_metric='Per-detector P50/P95/P99 latency',
              tier_metric='End-to-end inline-tier P99 against the budget',
              why_it_matters='A rising P99 warns the latency budget is at risk before it is breached',
          ),
          GoldenSignal(
              signal='Traffic',
              question='How much load is arriving?',
              detector_metric='Per-detector calls per second',
              tier_metric='Requests per second per tier',
              why_it_matters='Traffic is the denominator for every rate and the trigger for scaling',
          ),
          GoldenSignal(
              signal='Errors',
              question='How often does detection fail?',
              detector_metric='Per-detector error and timeout rate',
              tier_metric='Fail-open and fail-closed counts per tier',
              why_it_matters='A rising error rate signals a detector fault before the breaker even trips',
          ),
          GoldenSignal(
              signal='Saturation',
              question='How full is the system?',
              detector_metric='Per-detector in-flight versus bulkhead cap',
              tier_metric='Queue depth and instance utilisation per tier',
              why_it_matters='Saturation approaching the cap warns of shedding and backpressure ahead',
          ),
      ]


      def print_reference(signals: List[GoldenSignal]) -> None:
          print('=' * 88)
          print('GOLDEN-SIGNALS METRIC REFERENCE')
          print('Four signals -- latency, traffic, errors, saturation -- give a compact health picture')
          print('=' * 88)
          for s in signals:
              print()
              print(f'SIGNAL: {s.signal}')
              print(f'  Answers        : {s.question}')
              print(f'  Per detector   : {s.detector_metric}')
              print(f'  Per tier       : {s.tier_metric}')
              print(f'  Why it matters : {s.why_it_matters}')


      def coverage_note(signals: List[GoldenSignal]) -> None:
          print()
          print('=' * 88)
          print('WHY THESE FOUR')
          print('=' * 88)
          print(f'These {len(signals)} signals are deliberately few. They are the compact core that')
          print('answers, together, whether the gateway is healthy: is it fast (latency), how much')
          print('work is it doing (traffic), is it failing (errors), and is it running out of room')
          print('(saturation). Alerting in Section 14.09 is built on these four rather than on a')
          print('sprawl of metrics, because a small, well-chosen set is what an operator can actually')
          print('watch. The golden signals are the health summary; the logs and traces are the detail')
          print('you reach for once a signal tells you where to look.')


      if __name__ == '__main__':
          print_reference(SIGNALS)
          coverage_note(SIGNALS)
  deliverable_3:
    title: Structured Detection-Event Logging Schema
    filename: detection_event_log_schema.py
    description: Defines a structured detection-event schema with uniform fields on every event -- timestamp,
      trace identifier, tier, detector, verdict, score, latency, policy applied, breaker state -- serialised
      as one JSON object per line, so the log is queryable by any field and joinable to a trace by the
      trace identifier.
    implementation_notes: Python 3.12, single quotes throughout per book convention, standard-library
      json and dataclasses only. Emitted log lines are JSON and therefore contain double quotes at runtime;
      the source uses single quotes throughout.
    code: |
      # detection_event_log_schema.py
      # Section 14.08: Structured Detection-Event Logging Schema
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      import json
      from dataclasses import dataclass, asdict
      from typing import List, Optional


      @dataclass
      class DetectionEvent:
          '''One structured detection event -- machine-parseable for audit and investigation.

          Every field is present on every event so the log is queryable by any of them.
          The trace_id ties the event back to its request trace; the verdict and score
          carry the detection outcome; the policy_applied records how a failure resolved.
          '''
          ts: str
          trace_id: str
          tier: str
          detector: str
          verdict: str                    # 'clean', 'flagged', 'error', 'timeout'
          score: Optional[float]
          latency_ms: float
          policy_applied: Optional[str]   # e.g. 'fail_closed' when the detector failed
          breaker_state: str              # 'closed', 'open', 'half_open'


      def to_log_line(event: DetectionEvent) -> str:
          # Compact single-line JSON: one event per line, sorted keys for stable diffs.
          return json.dumps(asdict(event), sort_keys=True)


      def sample_events() -> List[DetectionEvent]:
          return [
              DetectionEvent('20260121T101500Z', 'a1b2c3d4', 'inline', 'Injection classifier',
                             'clean', 0.03, 14.1, None, 'closed'),
              DetectionEvent('20260121T101500Z', 'a1b2c3d4', 'inline', 'Jailbreak classifier',
                             'flagged', 0.94, 12.0, None, 'closed'),
              DetectionEvent('20260121T101501Z', 'e5f6a7b8', 'inline', 'Output PII scanner',
                             'timeout', None, 15.0, 'fail_closed', 'closed'),
              DetectionEvent('20260121T101502Z', 'c9d0e1f2', 'inline', 'Injection classifier',
                             'error', None, 2.3, 'fail_closed', 'open'),
          ]


      def print_schema_and_events() -> None:
          print('=' * 88)
          print('STRUCTURED DETECTION-EVENT LOGGING SCHEMA')
          print('One machine-parseable JSON event per detection outcome')
          print('=' * 88)
          print()
          print('SCHEMA FIELDS:')
          fields = [
              ('ts', 'event timestamp (UTC)'),
              ('trace_id', 'ties the event to its request trace'),
              ('tier', 'inline, near_real_time, or batch'),
              ('detector', 'which detector produced the event'),
              ('verdict', 'clean, flagged, error, or timeout'),
              ('score', 'detection score when available, else null'),
              ('latency_ms', 'how long the detector took'),
              ('policy_applied', 'fail_open or fail_closed when the detector failed, else null'),
              ('breaker_state', 'closed, open, or half_open at the time of the call'),
          ]
          for name, desc in fields:
              print(f'  {name:<16}{desc}')
          print()
          print('SAMPLE EVENTS (one JSON object per line):')
          for e in sample_events():
              print(f'  {to_log_line(e)}')
          print()
          print('Because every event is structured and carries the trace_id, the log is queryable:')
          print('filter by detector to audit one detector, by verdict to find every timeout, or by')
          print('trace_id to reconstruct one request. Structured logging is what makes the detail')
          print('searchable rather than a wall of free text.')


      if __name__ == '__main__':
          print_schema_and_events()
  deliverable_4:
    title: Request-Tracing Configuration Across the Tiers
    filename: request_tracing_config.py
    description: Configures request tracing across the three tiers -- propagating the trace identifier
      everywhere with tier-scaled sampling and asynchronous export -- and builds one request trace as
      spans sharing a single identifier ordered through pre-processing, the model call, and post-processing,
      showing how instrumentation stays cheap on the hot path.
    implementation_notes: Python 3.12, single quotes throughout per book convention, no external dependencies,
      prints the per-tier tracing configuration and a single correlated request trace.
    code: |
      # request_tracing_config.py
      # Section 14.08: Request-Tracing Configuration Across the Detection Tiers
      # 20260121 | AI Security Mastery -- Chapter 14 by Raghav Dinesh
      # Single quotes throughout per book convention

      from dataclasses import dataclass, field
      from typing import List, Optional


      @dataclass
      class TraceConfig:
          tier: str
          propagate_trace_id: bool
          sample_rate: float          # fraction of requests fully traced
          async_export: bool          # spans exported off the hot path
          note: str


      TRACE_CONFIGS: List[TraceConfig] = [
          TraceConfig('inline', True, 0.05, True,
                      'Trace id propagated on every request; only 5% fully sampled to keep the hot path cheap'),
          TraceConfig('near_real_time', True, 0.20, True,
                      'Higher sample rate off the hot path where a little more tracing cost is affordable'),
          TraceConfig('batch', True, 1.00, True,
                      'Fully traced: batch jobs are not latency-sensitive, so trace everything'),
      ]


      @dataclass
      class Span:
          detector: str
          tier: str
          parent: Optional[str]
          order: int


      def build_request_trace() -> List[Span]:
          # A single request produces a span per detector, all sharing one trace id,
          # ordered as the request passes pre-processing, the model call, post-processing.
          return [
              Span('gateway_entry', 'inline', None, 0),
              Span('Injection classifier', 'inline', 'gateway_entry', 1),
              Span('Jailbreak classifier', 'inline', 'gateway_entry', 2),
              Span('model_call', 'inline', 'gateway_entry', 3),
              Span('Output PII scanner', 'inline', 'gateway_entry', 4),
              Span('Session scorer (async)', 'near_real_time', 'gateway_entry', 5),
          ]


      def print_config(configs: List[TraceConfig]) -> None:
          print('=' * 90)
          print('REQUEST-TRACING CONFIGURATION ACROSS THE TIERS')
          print('Trace id propagated everywhere; sampling keeps the hot path cheap')
          print('=' * 90)
          header = 'Tier'.ljust(18) + 'Propagate id'.ljust(14) + 'Sample rate'.ljust(14) + 'Async export'
          print(header)
          print('-' * 90)
          for c in configs:
              print(c.tier.ljust(18) + str(c.propagate_trace_id).ljust(14)
                    + f'{c.sample_rate:.0%}'.ljust(14) + str(c.async_export))
          print('-' * 90)
          for c in configs:
              print(f'  {c.tier}: {c.note}')


      def print_trace() -> None:
          print()
          print('=' * 90)
          print('ONE REQUEST TRACE (spans share a single trace id, correlated across tiers)')
          print('=' * 90)
          for s in build_request_trace():
              indent = '    ' if s.parent else '  '
              print(f'{indent}[{s.order}] {s.detector} ({s.tier})')
          print()
          print('The trace correlates every detector that touched the request under one id, so a')
          print('single slow or failing request can be followed through pre-processing, the model')
          print('call, and post-processing across tiers. Sampling and async export keep the inline')
          print('instrumentation cheap: the hot path records a span but exports it off-path, so the')
          print('observability of the latency budget does not itself spend the latency budget.')


      if __name__ == '__main__':
          print_config(TRACE_CONFIGS)
          print_trace()
common_mistakes:
  mistake_1:
    description: Treating observability as optional instrumentation to add later rather than a precondition
      for operating the system
    why_it_happens: |-
      The gateway appears to work without it -- detection happens, requests are served -- so
      instrumentation feels like a reporting nicety that can wait until after the real
      functionality is done.
    consequence: The system runs as a black box, and when the false-positive rate triples or a detector
      silently fails open, nothing alerts and no metric moves, so the first sign is users routing around
      the product or an attack surfacing downstream -- late and with a cold cause.
    correct_approach: 'Build observability as a precondition for running the system: a detection system
      that cannot be seen cannot be operated, tuned, or trusted, so instrument it before it goes to production,
      not after the first invisible incident.'
  mistake_2:
    description: Relying on one pillar -- usually metrics -- and treating logging and tracing as redundant
    why_it_happens: |-
      Metrics give a satisfying dashboard and answer the health question at a glance, so it is
      tempting to conclude that aggregate numbers are enough and per-event logs and per-request
      traces are duplicative.
    consequence: 'When a metric reveals a problem there is no way to investigate it: no per-event detail
      to find which cases errored and no trace to localise which detector or tier was slow, so the operator
      sees that something is wrong but cannot find out what or where.'
    correct_approach: 'Instrument all three complementary pillars, because they answer different questions:
      metrics for aggregate health, logging for per-event audit and investigation, and tracing to follow
      a single request through the tiers.'
  mistake_3:
    description: Instrumenting the inline hot path synchronously so the observability itself adds latency
    why_it_happens: |-
      The simplest way to emit a metric or a span is to write it out where it happens, and in
      development the write is fast enough that its cost on the hot path is never noticed.
    consequence: In production the synchronous metric updates, log writes, and span exports add real time
      to every inline request, so the act of measuring the latency budget consumes the budget it measures
      and the observability causes the latency regression it was meant to detect.
    correct_approach: 'Hold instrumentation to the same latency discipline as detection: record cheaply
      in memory on the hot path and export asynchronously off-path, and sample inline traces at a low
      rate so the per-request cost stays negligible.'
  mistake_4:
    description: Emitting unstructured free-text logs instead of structured, queryable events
    why_it_happens: |-
      Free-text log lines are the quickest to write and read like a human narrative, so they
      feel informative until the log grows to a volume no one can grep meaningfully.
    consequence: The log becomes an unsearchable wall of text that cannot be filtered by detector, verdict,
      or request, so investigating an incident means manually scanning lines rather than querying, and
      the per-event detail that logging exists to provide is effectively lost.
    correct_approach: Emit structured detection events with uniform fields -- detector, verdict, latency,
      policy, trace identifier -- as one JSON object per line, so the log is queryable by any field and
      each event joins back to its request trace.
  mistake_5:
    description: Not correlating signals across the pillars with a shared trace identifier
    why_it_happens: |-
      Each pillar works on its own -- metrics tick, logs write, spans record -- so it is easy
      to instrument all three without giving them a common key, since each looks complete in
      isolation.
    consequence: A metric, a log event, and a trace about the same request cannot be joined, so an operator
      who sees a latency spike in the metrics cannot pull the specific logs and trace for the slow requests,
      and the investigation stalls at the boundary between the pillars.
    correct_approach: Propagate one trace identifier across every metric context, log event, and trace
      span for a request, so the three pillars correlate and a single request can be reassembled across
      aggregate health, per-event detail, and per-request path.
section_summary:
  compact: |-
    A detection system that cannot be observed cannot be operated, tuned, or trusted, so
    observability is a precondition for running the system, not optional instrumentation: an
    unobserved gateway fails silently, and a tripled false-positive rate or a detector failing
    open is not noticed until users route around the product or a missed attack surfaces. The
    three pillars are complementary -- metrics give aggregate health as rates and percentiles
    over time, logging gives per-event detail for audit and investigation, and tracing follows
    a single request through the tiers -- and a single cheap update per detection outcome feeds
    all three so they stay consistent. The golden signals -- latency, traffic, errors, and
    saturation -- are the compact metric core, small enough to watch and complete enough to
    summarise health, and they are what the Section 14.09 alerting is built on. Structured
    logging with uniform fields makes the log queryable by detector, verdict, or trace, and a
    shared trace identifier correlates every event and span from one request across the
    pillars. All of this is instrumented under the same latency discipline as detection: the
    hot path records in memory and exports asynchronously off-path, and inline traces are
    sampled at a low rate, so observing the latency budget does not itself spend it.
    Observability is the precondition for the dashboard and alerting of 14.09 and for the
    tuning of Chapter 17, both of which rest on the measurements this section creates.
  key_takeaways:
  - A detection system that cannot be observed cannot be operated, tuned, or trusted, so observability
    is a precondition, not optional instrumentation -- an unobserved system fails silently
  - 'The three pillars are complementary: metrics give aggregate health, logging gives per-event audit
    detail, and tracing follows one request through the tiers'
  - The golden signals -- latency, traffic, errors, saturation -- are the compact core metrics, small
    enough to watch and complete enough to summarise gateway health
  - Structured logging with uniform fields makes the log queryable, and a shared trace identifier correlates
    every metric, log, and span from one request across the pillars
  - Hot-path instrumentation must obey the same latency discipline as detection -- record cheaply in memory,
    export asynchronously off-path, and sample inline traces -- so observing the budget does not spend
    it
  - Observability is the precondition for the dashboard and alerting of Section 14.09 and for the tuning
    of Chapter 17, both of which rest on the measurements produced here
preview_section_14_09:
  title: The Production Monitoring Dashboard
  summary: |-
    Section 14.08 produced the raw observability signals; Section 14.09 assembles them into an
    operable interface. It builds the dashboard views -- gateway health, detection rates,
    latency, cost -- integrates the behavioural monitoring views of Section 13.11 (entity risk,
    drift, coordinated networks) with the production signals, turns metrics into actionable
    alerts without alert fatigue, defines on-call runbooks and service level objectives with
    error budgets, and makes the dashboard the operational interface for the security and
    platform teams. It is the second operability section, turning the signals of this section
    into something teams actually watch and act on.
