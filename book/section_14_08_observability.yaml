prose_content:
  part_1:
    title: You Cannot Operate What You Cannot See
    body: |-
      The gateway built over the last six sections does a great deal, and it does all of it
      invisibly. A circuit breaker opens when a detector fails and closes when it recovers, but
      nothing shows that it happened. The inline tier meets or misses its P99 budget on every
      request, but the number is not surfaced anywhere. Detectors flag, error, and time out;
      load is shed under stress; the fail-open and fail-closed policies fire -- and an operator
      watching the running system sees none of it. The gateway is a black box that happens to
      be working.

      A black box that works is fine until it stops working, and then it is a disaster, because
      there is no way to tell what changed. Consider the failure that this whole section exists
      to prevent: the false-positive rate quietly triples. Perhaps a model was updated, perhaps
      the traffic shifted, perhaps a threshold drifted. In an unobserved system nothing alerts,
      no number moves that anyone is watching, and the first sign is indirect and late -- users
      complaining, or worse, users silently routing around the product because it keeps
      blocking their legitimate requests. By the time the symptom is visible the damage is done
      and the cause is cold. The same is true of the opposite failure: a detector silently
      failing open provides no protection, and in a black box no one learns this until the
      attack it should have caught surfaces somewhere downstream.

      This is why observability is a precondition rather than an optional extra. A detection
      system that cannot be observed cannot be operated, because operation means noticing and
      responding to change, and you cannot respond to what you cannot see. It cannot be tuned,
      because tuning means adjusting against measured behaviour, and there is no measurement.
      And it cannot be trusted, because trust in a security control comes from being able to
      verify it is working, not from assuming it is. Observability is what turns the black box
      into a system an operator can run, and building it is not decoration on top of the
      gateway -- it is what makes the gateway operable at all.
  part_2:
    title: Three Complementary Pillars
    body: |-
      Observability is not one thing but three, and the three are complementary rather than
      redundant: each answers a question the others cannot. Metrics answer how the system is
      doing in aggregate. Logging answers what happened in a specific event. Tracing answers
      where a single request went and how long each step took. A system needs all three,
      because operating it requires all three questions answered.

      Metrics are aggregate numbers over time -- rates, latencies, counts -- that give the
      health of the system at a glance. The per-detector flag rate, error rate, and average
      latency, the per-tier request rate: these are metrics, and they are what an operator
      watches to know whether the gateway is healthy right now and how that is trending. Metrics
      are cheap to keep and cheap to read, but they are aggregate by nature -- they tell you the
      error rate rose, not which requests errored or why.

      Logging fills that gap with per-event detail. A structured detection event -- one record
      per detection outcome, carrying the detector, the verdict, the score, the latency, the
      policy applied -- is what you reach for once a metric tells you something is wrong and you
      need to investigate the specific cases. Logs are the audit trail and the investigation
      surface. Tracing is the third pillar: it follows one request through the tiers, recording
      a span for each detector that touched it, all correlated under a single trace identifier.
      Where a metric says the P99 rose and a log shows which requests were slow, a trace shows
      where in the request the time went -- which detector on which tier was the slow step.
      The observability stack deliverable for this section feeds all three pillars from one
      update per detection outcome, so that every request is simultaneously counted in the
      metrics, recorded in a span, and written to the log, and the three views stay consistent
      because they come from the same source.
  part_3:
    title: The Golden Signals
    body: |-
      Metrics can proliferate endlessly -- there is always another number to count -- and a
      sprawl of hundreds of metrics is nearly as useless as none, because no operator can watch
      them all. The discipline that keeps metrics operable is to identify a small core that,
      together, summarise health. For a request-serving system that core is the four golden
      signals: latency, traffic, errors, and saturation. They are the compact health picture
      of the detection gateway.

      Each answers one essential question. Latency asks how long detection takes -- the
      per-detector percentiles and the end-to-end inline P99 against the budget -- and a rising
      latency signal warns the budget is at risk before it is breached. Traffic asks how much
      load is arriving -- calls per second per detector, requests per second per tier -- and it
      is both the denominator for every rate and the trigger for scaling. Errors asks how often
      detection fails -- the per-detector error and timeout rate, the fail-open and fail-closed
      counts -- and a rising error signal reveals a detector fault, often before the circuit
      breaker even trips. Saturation asks how full the system is -- in-flight calls against the
      bulkhead cap, queue depth, instance utilisation -- and saturation approaching the cap
      warns that shedding and backpressure are ahead.

      The reason to privilege these four is that they are few enough to watch and complete
      enough to matter. Together they answer whether the gateway is fast, how much work it is
      doing, whether it is failing, and whether it is running out of room -- which is most of
      what health means for a serving system. The golden-signals reference for this section
      defines them per detector and per tier, and they are what the alerting of Section 14.09
      is built on, precisely because a small, well-chosen signal set is what makes alerting
      possible without drowning the operator. The golden signals are the summary; the logs and
      traces are the detail you reach for once a signal points you somewhere.
  part_4:
    title: Structured Logging and Correlated Tracing
    body: |-
      The value of logs and traces depends entirely on being able to query them, and that
      depends on structure. A log of free-text lines is a wall you can only grep; a log of
      structured events is a queryable record. The detection-event schema for this section
      makes every event a machine-parseable object with the same fields present on every one --
      timestamp, trace identifier, tier, detector, verdict, score, latency, policy applied,
      breaker state -- so the log can be filtered by any of them. Filter by detector to audit
      one detector, by verdict to find every timeout, by breaker state to see what happened
      while a breaker was open. Structure is what turns the detail from unsearchable text into
      an investigation surface.

      The single most important field for tying the pillars together is the trace identifier.
      Every event and every span from the same request carries the same trace identifier, so
      the aggregate metric, the per-event log, and the per-request trace can all be joined back
      to one request. This is what correlation across the request lifecycle means: a request
      that was flagged pre-processing, passed the model, and was withheld post-processing
      produces a series of events and spans that share an identifier and can be reassembled
      into the full story of that one request across the tiers.

      Tracing specifically follows the request through the tiers by emitting a span per
      detector under that shared identifier, ordered as the request moves through
      pre-processing, the model call, and post-processing. When a request is slow or produces a
      surprising verdict, the trace shows exactly which detector on which tier was responsible,
      which no aggregate metric can tell you. The tracing configuration for this section sets
      this up across all three tiers, propagating the trace identifier everywhere so that even
      the asynchronous near-real-time processing of a request can be correlated back to the
      synchronous request that spawned it.
  part_5:
    title: Instrumenting the Hot Path Without Spending the Budget
    body: |-
      Observability has a cost, and on the inline tier that cost runs directly into the latency
      budget of Section 14.04. Every metric update, every log write, every span emitted takes
      some time, and if that time is spent synchronously on the hot path, then the act of
      measuring the latency budget consumes the very budget it is measuring. The instrumentation
      of the hot path must therefore be held to the same latency discipline as the detection on
      it: observing the inline tier must be cheap.

      Two techniques keep it cheap. The first is to make the on-path work minimal and defer the
      expensive part off-path. Recording a metric or a span on the hot path should be little
      more than an in-memory increment or an append to a buffer -- a few nanoseconds -- while
      the costly work of exporting those metrics and spans to the monitoring backend happens
      asynchronously, off the request path, where it does not add to request latency. The hot
      path records; a background exporter ships. The second technique is sampling. Not every
      request needs a full trace: propagating the trace identifier on every request is cheap
      and lets any request be correlated if needed, but fully sampling and exporting a trace
      for only a small fraction of inline requests captures the distribution while keeping the
      per-request cost negligible. Off the hot path, where a little more cost is affordable,
      the sample rate can be higher, and the batch tier, which is not latency-sensitive at all,
      can be traced fully.

      This is the same principle that ran through the latency and cost engineering of the
      chapter, now applied to the monitoring itself: measure the hot path cheaply, and push the
      expensive work to where there is room for it. The result is a gateway that is fully
      observable without its observability becoming a latency regression. An instrumentation
      design that ignored this would produce accurate metrics about a gateway that its own
      metrics had made too slow -- a self-defeating outcome the sampling and asynchronous export
      of this section are built to avoid.
  part_6:
    title: Observability as the Precondition for Everything After
    body: |-
      With the three pillars instrumented and the hot path measured cheaply, the gateway is
      observable: its aggregate health is in the golden signals, its per-event detail is in the
      structured logs, and any single request can be followed through the tiers by its trace.
      The black box has become a system whose behaviour can be seen. That visibility is the
      foundation for everything that operating the gateway involves, and it is worth being
      explicit about what it unlocks.

      Immediately, it unlocks the dashboard and alerting of Section 14.09. The golden signals
      this section defines are exactly what the dashboard visualises and what alerting fires
      on; the structured logs are what an on-call responder queries when an alert points them
      at a problem; the traces are what they use to localise it. Section 14.09 assembles these
      signals into the operational interface, but it can only do so because this section
      produced them. The dashboard is a view onto the observability built here, not a separate
      thing.

      Further out, observability is the precondition for tuning. A detection system is never
      finished at deployment -- its thresholds, its rules, its models all need adjustment as
      threats and traffic change -- and that adjustment is the subject of Chapter 17. But
      tuning is adjustment against measured behaviour: you cannot sensibly lower a threshold
      without seeing its false-positive rate, or retire a rule without seeing that it never
      fires. Every tuning decision rests on a measurement, and the measurements are what this
      section creates. So observability closes the operability question the taxonomy raised --
      can the system be seen, tuned, and trusted -- by providing the seeing that the tuning and
      the trusting both depend on. With the gateway now observable, Section 14.09 can build the
      operational interface that turns these raw signals into something the security and
      platform teams actually watch.
