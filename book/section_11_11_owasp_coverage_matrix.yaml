    - 'Chapter 14 preview: output validation layer; PII scanner; agency scope monitor'
    - 'Chapter 15 preview: sensitive information disclosure; membership inference; privacy controls'

prose_content:

  part_1_owasp_as_catalogue:
    heading: 'OWASP LLM Top 10 as a Vulnerability Catalogue, Not a Detection Specification'
    body: |
      The OWASP LLM Top 10 is a vulnerability catalogue. It lists ten categories of
      vulnerability that LLM-based applications are susceptible to, with descriptions,
      attack scenarios, and mitigation guidance. It does not specify detection rules,
      log fields, thresholds, or monitoring architectures. The catalogue says "prompt
      injection is a vulnerability in LLM applications" — it does not say "fire a rule
      when cosine similarity to the known-bad embedding centroid exceeds 0.85."

      This distinction matters for detection engineers because each OWASP LLM category
      requires a bespoke detection approach, and some categories have no viable runtime
      detection approach at all:

      Runtime-detectable categories: LLM01 (Prompt Injection), LLM04 (Model Denial of
      Service), LLM07 (Insecure Plugin Design), LLM10 (Model Theft). These produce
      observable signals in the inference API logs that detection rules can match against.
      The seven-track gateway has meaningful coverage of all four.

      Build-time or training-time detectable only: LLM03 (Training Data Poisoning),
      LLM05 (Supply Chain Vulnerabilities). These vulnerabilities are introduced before
      the model reaches the inference gateway. By the time a request arrives at the
      gateway, the poisoning has already happened. Runtime detection can catch some
      downstream effects of poisoning (model behaving strangely on specific inputs)
      but cannot detect the poisoning event itself. These categories require build-time
      controls: dataset auditing, model provenance verification, and reproducible
      training pipelines.

      Partial runtime detectability: LLM02 (Insecure Output Handling), LLM06 (Sensitive
      Information Disclosure), LLM08 (Excessive Agency). Each of these has a runtime-
      detectable component — the output that contains the vulnerability is observable
      after inference — but the current gateway is input-side only. The gateway inspects
      the prompt before inference; it does not inspect the model response after inference.
      Building an output validation layer (Chapter 14) is the remediation for all three.

      Out of scope for technical detection: LLM09 (Overreliance). This category is about
      user trust miscalibration — users treating model outputs as factually reliable
      without appropriate scepticism. No detection rule can observe user trust. This is
      a UX, training, and documentation concern, not a detection engineering concern.

  part_2_llm01:
    heading: 'LLM01 — Prompt Injection: Strong Coverage with Residual L3 Gap'
    body: |
      LLM01 Prompt Injection covers both direct injection (adversarial instructions
      embedded in the user prompt) and indirect injection (adversarial instructions
      embedded in content retrieved from external sources and passed to the model as
      context). It is the highest-profile OWASP LLM vulnerability and the one the
      seven-track gateway addresses most directly.

      Gateway coverage: strong partial (score 1 moving toward 2 with Chapter 12).

      Tracks covering LLM01: Track 1 (direct injection keyword detection, L1 signature),
      Track 2 (jailbreak pattern detection, L1+L3), Track 3 (semantic similarity gating,
      L2 heuristic), Track 5 (session-level query accumulation catches multi-turn
      injection campaigns, L4).

      Direct injection coverage: strong. Track 1 blocks known-prefix direct injection;
      Track 3 catches semantically similar variants that evade Track 1; Track 2 catches
      role-switch jailbreaks that are a form of direct injection. Residual gap: highly
      obfuscated direct injection (encoded, fragmented, or novel framing) evades all
      three tracks. Chapter 12 intent classifier closes this gap.

      Indirect injection coverage: weak. Indirect injection arrives via retrieved context
      (RAG pipeline outputs, tool call results, web content injected into the system
      prompt). The gateway operates on the prompt as it arrives from the application;
      it does not have visibility into which parts of the prompt were retrieved from
      external sources versus authored by the user. Distinguishing user-authored prompt
      content from retrieved content requires the application to tag retrieved spans
      in the prompt metadata — a field the gateway can then inspect separately. Without
      that tagging, indirect injection is detectable only if the injected instruction
      matches Track 1 or Track 3 patterns, which is not reliable against a targeted
      adversary who has crafted the injected content to evade detection.

      Indirect injection is the most significant residual gap in LLM01 coverage and is
      not fully closed by any Chapter 12 or 13 deliverable — it requires application-
      level architectural changes (source tagging in prompt metadata) that are beyond
      the detection framework scope.

  part_3_llm02_llm06:
    heading: 'LLM02 and LLM06 — The Output-Side Gap'
    body: |
      LLM02 Insecure Output Handling covers vulnerabilities arising from downstream
      processing of model outputs without sanitisation: XSS via unsanitised LLM output
      in web contexts, code injection via model-generated code executed without sandbox,
      command injection via model-generated shell commands passed to an OS interface,
      and SQL injection via model-generated queries passed to a database.

      LLM06 Sensitive Information Disclosure covers the model inadvertently reproducing
      training data or confidential context: PII from training data appearing in model
      responses, confidential system prompt content reflected in user-facing output,
      and membership inference-style disclosure where model response patterns reveal
      whether specific data was in the training set.

      Both categories share the same structural gap: the seven-track gateway is input-side
      only. It inspects the prompt before inference and makes a block/flag/pass decision.
      After inference, the model response flows directly to the application with no
      gateway inspection. The gateway never sees the output.

      For LLM02: a model that generates a response containing a JavaScript payload does
      not produce any detectable signal at the prompt level. The adversary''s injection
      that caused the unsafe output generation may have been subtle enough to evade input-
      side detection; the output itself is the evidence that detection failed.

      For LLM06: a model that reproduces PII from its training data or reflects system
      prompt content does not produce any detectable signal at the prompt level either —
      the disclosure is in the response, not the request.

      The remediation for both is an output validation layer: a post-inference inspection
      stage that runs Sigma rules and Python detectors against the model response before
      returning it to the application. Chapter 14 builds this output validation layer.
      It includes a PII scanner (regex plus NER-based), a code injection pattern matcher,
      a system prompt reflection detector, and a response entropy monitor. Until Chapter 14
      is integrated, LLM02 and LLM06 remain at score 0 for the gateway — honest, documented,
      and addressed in the roadmap.

  part_4_llm03_llm05:
    heading: 'LLM03 and LLM05 — Training-Time and Supply Chain Gaps'
    body: |
      LLM03 Training Data Poisoning covers the corruption of training or fine-tuning
      data to induce model misbehaviour: backdoor insertion via trigger-label manipulation,
      targeted capability degradation by poisoning specific output classes, and broad
      model corruption via large-scale label noise injection.

      LLM05 Supply Chain Vulnerabilities covers compromises in the model development
      and deployment pipeline: compromised pre-trained base models from public model
      hubs, poisoned training datasets from public data repositories, vulnerable ML
      framework dependencies (compromised libraries), and hardware-level compromises
      in model training infrastructure.

      Both categories are training-time or build-time concerns. By the time a model
      reaches the inference gateway, a supply chain compromise has already occurred. The
      gateway cannot inspect model weights, training history, or provenance metadata
      from the inference API — it sees only the prompt and the response.

      LLM03 runtime coverage: Track 4 (data poisoning signals) provides L1 coverage of
      the training data ingestion process — anomalous label distributions in training
      API calls. But this detection covers the training pipeline, not the inference
      gateway. The model in production at inference time may already be poisoned; Track
      4 cannot detect that fact from inference traffic alone. The score for LLM03
      at the inference gateway is 0 for the poisoned-model-in-production scenario,
      with a partial score only for the training-pipeline monitoring component.

      LLM05 runtime coverage: none. Supply chain verification — checking model file
      hashes against known-good registries, verifying that model weights match the
      expected provenance, validating ML framework dependency integrity — is a build-time
      and deployment-time control. No inference-time Sigma rule can detect a compromised
      pre-trained model by observing query-response pairs alone (without a baseline
      of expected behaviour for every possible input, which is not tractable).

      The remediation for LLM03 is build-time: dataset auditing, reproducible training
      pipelines with audit logs, and differential privacy training to limit the influence
      of any single training example. The remediation for LLM05 is supply chain security:
      model hash verification at deployment, software composition analysis for ML
      dependencies, and model provenance metadata enforced by the deployment pipeline.
      Chapter 8 covers these controls; they are not detection rules but preventive controls.

  part_5_llm04_llm07_llm08_llm10:
    heading: 'LLM04, LLM07, LLM08, LLM10 — Partial and Specific Coverage'
    body: |
      LLM04 Model Denial of Service covers resource exhaustion attacks against LLM
      inference: excessively long prompts consuming token budget, recursive self-referential
      prompts causing model overthinking, and high-volume API abuse flooding the inference
      infrastructure. Gateway coverage: partial (score 1). Track 5 rate detection catches
      high-volume API abuse from a single session. Token budget monitoring is partially
      implemented via the token_count field. Residual gap: coordinated low-and-slow DoS
      from many users below the per-user rate threshold — a distributed denial pattern
      that Track 5''s per-user session accumulator cannot see.

      LLM07 Insecure Plugin Design covers vulnerabilities arising when LLM applications
      call external tools, APIs, or plugins with adversarially influenced parameters:
      prompt injection via tool output (indirect injection where the tool result contains
      adversarial instructions), over-privileged tool permissions, and insufficient
      validation of tool input/output. Gateway coverage: partial (score 1). Track 1 and
      Track 2 catch injection patterns in prompt context including tool outputs, if the
      tool output is included in the prompt text that the gateway inspects. Residual gap:
      tool outputs that are processed by the application directly without passing through
      the gateway prompt — common in agentic architectures where the application routes
      tool outputs to model context without re-inspection.

      LLM08 Excessive Agency covers LLM-based agents that take autonomous actions beyond
      their intended scope: executing system commands, modifying files, calling APIs, or
      making financial transactions based on model outputs without sufficient authorisation.
      Gateway coverage: none (score 0). Excessive agency is an output-side and action-side
      concern. The gateway inspects the prompt; it does not inspect what downstream
      systems do with model outputs. No input-side detection rule can observe excessive
      agency — it requires monitoring of the actions the model causes, not the prompts
      that prompt it. Chapter 14 previews a scope monitor that tracks tool call permissions
      against a defined scope policy; until then, LLM08 is an acknowledged gap.

      LLM10 Model Theft covers extraction of model weights, functionality, or proprietary
      training data through systematic API querying: black-box model extraction (Track 5),
      knowledge distillation attacks, and membership inference. Gateway coverage: good
      (score 1, approaching 2). Track 5 covers systematic API-based extraction via query
      rate and variance monitoring. The gap is distributed multi-account extraction
      (Chapter 13 remediation) and membership inference patterns (future track). LLM10
      is the best-covered OWASP LLM category in the gateway after LLM01.

  part_6_llm09:
    heading: 'LLM09 — Overreliance: Out of Technical Detection Scope'
    body: |
      LLM09 Overreliance covers users treating LLM outputs as authoritative facts without
      appropriate scepticism: accepting hallucinated citations as real, relying on model
      legal or medical advice without expert review, and trusting model-generated code
      without security testing. The vulnerability is user behaviour and product design,
      not a technical attack vector.

      No detection rule can observe user trust. A Sigma rule cannot fire on "user believed
      the model output without verification." An FPR metric cannot be computed for a signal
      that does not exist in any log field. LLM09 is outside the scope of detection
      engineering entirely.

      The mitigations for LLM09 are product design controls: disclaimer labels on model
      outputs, confidence score display in the UI, application-level output validation for
      high-stakes use cases (medical, legal, financial), and user training on appropriate
      LLM use patterns. These controls reduce user overreliance without producing any
      detectable signal in gateway logs.

      In the coverage matrix, LLM09 receives the same notation as intentional ATLAS gaps:
      it is not scored 0 (which implies an actionable gap) but is flagged as "out of
      scope for technical detection — addressed by product design controls." This prevents
      it from appearing in the detection engineering backlog alongside genuinely actionable
      gaps.

  part_7_gap_roadmap:
    heading: 'Gap Closure Roadmap: OWASP LLM Gaps to Chapter Remediations'
    body: |
      The OWASP LLM coverage matrix produces six actionable gaps (excluding LLM09 which
      is out of scope and LLM03/LLM05 which are build-time-only). Ordered by priority:

      Gap 1: LLM01 indirect injection (score 0 for indirect injection component).
      Requires application-level source tagging in prompt metadata. Not fully closed
      by any single chapter deliverable — requires architectural collaboration with the
      application team. Detection engineering contribution: a Sigma rule for the
      retrieved_context field once source tagging is implemented (Section 11.10
      workflow applies when the field becomes available).

      Gap 2: LLM02 Insecure Output Handling (score 0). Chapter 14 output validation
      layer: post-inference Sigma rules for code injection patterns, XSS payload
      patterns in response text, and command injection patterns in shell-executable
      response fields.

      Gap 3: LLM06 Sensitive Information Disclosure (score 0). Chapter 14 output
      validation layer: PII scanner (regex plus NER), system prompt reflection detector,
      response entropy monitor for training data reconstruction patterns. Chapter 15
      adds membership inference monitoring.

      Gap 4: LLM08 Excessive Agency (score 0). Chapter 14 scope monitor: tracks tool
      call permissions against a defined scope policy, fires when a model-caused action
      exceeds the scope defined in the system prompt or the application policy document.

      Gap 5: LLM04 distributed DoS (partial, score 1). Chapter 13 cross-user correlation
      adds fleet-level request volume monitoring that catches low-and-slow distributed
      denial from many users below the per-user threshold.

      Gap 6: LLM10 distributed extraction (partial, score 1). Chapter 13 cross-user
      correlation, same deliverable as Gap 5.

      LLM07 indirect injection via tool output (partial, score 1): closed when the
      application-level source tagging from Gap 1 is implemented. No standalone chapter
      deliverable can close this gap independently.

