section_overview:
  one_line_summary: >
    OWASP LLM Top 10 is a vulnerability catalogue, not a detection specification —
    auditing the seven-track gateway against all ten categories reveals four categories
    with strong coverage, three with partial coverage, and three that are structural
    gaps requiring output-side monitoring, supply chain controls, or out-of-scope
    trust calibration that no detection rule can address.
  why_this_section_exists: |
    The ATLAS coverage heat map from Section 11.05 measures detection coverage against
    adversarial ML techniques. But a CISO or compliance team asking "are we covered
    against the OWASP LLM Top 10?" is working from a different taxonomy — one that
    security practitioners, procurement teams, and auditors are far more likely to
    reference than ATLAS technique IDs.

    This section bridges the gap. It audits the seven-track gateway against each of
    the ten OWASP LLM vulnerability categories in turn, scores coverage using the
    same three-tier model from Section 11.05, identifies the specific detection tracks
    responsible for coverage, names the residual gaps, and maps each gap to the chapter
    and section that closes it. The output is a single matrix that answers the CISO
    question precisely and that can be presented alongside the ATLAS heat map without
    needing to explain the ATLAS taxonomy first.

    The audit also surfaces three structural properties of the OWASP LLM Top 10 that
    detection engineers must understand: several categories are training-time or build-time
    concerns where runtime detection is structurally impossible; one category (LLM09) is
    a trust miscalibration problem outside the scope of technical detection entirely; and
    the most common gap in gateway-first architectures — output-side coverage — is
    confirmed as a gap in the current gateway, pointing to the output validation layer
    that Chapter 14 builds.
  position_in_chapter: >
    Section 11.11 is the compliance-layer coverage audit. It applies the measurement
    machinery from Sections 11.04 and 11.05 to the OWASP LLM taxonomy rather than
    the ATLAS taxonomy, producing a complementary coverage view aimed at the
    business and compliance audience. Sections 11.12 and 11.13 return to the technical
    detection engineering track.

learning_objectives:
  - 'Name all ten OWASP LLM Top 10 categories and classify each as: detectable at runtime, detectable at build-time only, or out-of-scope for technical detection'
  - 'Map the seven gateway tracks to their relevant OWASP LLM categories and score coverage using the three-tier model'
  - 'Explain why LLM02 (Insecure Output Handling) and LLM06 (Sensitive Information Disclosure) are the most common gaps in gateway-first architectures'
  - 'Distinguish training-time vulnerabilities (LLM03, LLM05) from runtime-detectable vulnerabilities and articulate why runtime rules cannot close training-time gaps'
  - 'Produce the OWASP LLM coverage matrix for a detection programme and present it to a non-technical audience'
  - 'Map each OWASP coverage gap to the chapter-level remediation that closes it'

prerequisites:
  required:
    - 'Section 11.05: three-tier coverage scoring (0/1/2); gap prioritisation framework'
    - 'Section 11.04: ATLAS-to-OWASP mapping; owasp.llm.NN tag format in Sigma rules'
    - 'Chapters 6–10: awareness of what each of the seven tracks detects'
  helpful:
