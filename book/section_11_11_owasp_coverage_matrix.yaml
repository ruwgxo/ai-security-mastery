deliverables:

  deliverable_1:
    id: 'D11.11.1'
    filename: 'owasp_llm_coverage_matrix.py'
    description: >
      Programmatic OWASP LLM Top 10 coverage matrix for the seven-track gateway.
      Scores each category using the three-tier model, distinguishes actionable from
      build-time and out-of-scope gaps, and produces a formatted matrix suitable for
      CISO reporting. Also reads owasp.llm.NN tags from deployed Sigma rules to
      determine which rules contribute to each category.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''owasp_llm_coverage_matrix.py
      OWASP LLM Top 10 coverage matrix for the seven-track gateway.
      Scores each category (0/1/2), distinguishes gap types, and produces
      a CISO-ready formatted matrix and a detection backlog for actionable gaps.
      Chapter 11, Section 11.11 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 owasp_llm_coverage_matrix.py
        python3 owasp_llm_coverage_matrix.py --backlog
        python3 owasp_llm_coverage_matrix.py --ciso-report
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass, field
      from enum import Enum

      # ---------------------------------------------------------------------------
      # Enumerations
      # ---------------------------------------------------------------------------

      class GapType(Enum):
          ACTIONABLE = 'actionable'           # evidence exists; detection rule not yet built
          BUILD_TIME_ONLY = 'build_time_only' # training/supply-chain; no runtime detection possible
          OUT_OF_SCOPE = 'out_of_scope'       # user behaviour / product design; not detectable

      # ---------------------------------------------------------------------------
      # Data model
      # ---------------------------------------------------------------------------

      @dataclass
      class OWASPCategory:
          category_id: str              # e.g. 'LLM01'
          name: str
          score: int                    # 0, 1, 2, or -1 for out-of-scope
          gap_type: GapType | None      # None if score == 2
          gateway_tracks: list[int]     # which tracks contribute
          sigma_tags: list[str]         # owasp.llm.NN tags this category uses
          atlas_techniques: list[str]   # linked ATLAS techniques
          residual_gap: str
          remediation_chapter: str
          remediation_detail: str
          build_time_note: str = ''     # for BUILD_TIME_ONLY categories

      # ---------------------------------------------------------------------------
      # Registry
      # ---------------------------------------------------------------------------

      OWASP_CATEGORIES: list[OWASPCategory] = [

          OWASPCategory(
              category_id='LLM01',
              name='Prompt Injection',
              score=1,
              gap_type=GapType.ACTIONABLE,
              gateway_tracks=[1, 2, 3, 5],
              sigma_tags=['owasp.llm.01'],
              atlas_techniques=['AML.T0051', 'AML.T0054'],
              residual_gap=(
                  'Indirect injection via retrieved context not detectable without '
                  'application-level source tagging. Obfuscated direct injection '
                  'evades L1 and L2 — L3 intent classifier gap.'
              ),
              remediation_chapter='Chapter 12 (direct); Application architecture (indirect)',
              remediation_detail='Ch12 S12.04 intent classifier closes obfuscated direct gap. '
                                 'Indirect requires app-level prompt source tagging field.',
          ),

          OWASPCategory(
              category_id='LLM02',
              name='Insecure Output Handling',
              score=0,
              gap_type=GapType.ACTIONABLE,
              gateway_tracks=[],
              sigma_tags=['owasp.llm.02'],
              atlas_techniques=[],
              residual_gap=(
                  'Gateway is input-side only. No post-inference output inspection. '
                  'XSS, code injection, command injection in model responses are undetected.'
              ),
              remediation_chapter='Chapter 14',
              remediation_detail='Ch14 output validation layer: code injection Sigma rules, '
                                 'XSS pattern matcher, command injection detector on response text.',
          ),

          OWASPCategory(
              category_id='LLM03',
              name='Training Data Poisoning',
              score=0,
              gap_type=GapType.BUILD_TIME_ONLY,
              gateway_tracks=[4],
              sigma_tags=['owasp.llm.03'],
              atlas_techniques=['AML.T0020', 'AML.T0019'],
              residual_gap=(
                  'Track 4 covers training pipeline anomalies but cannot detect a '
                  'poisoned model already deployed to inference. Runtime detection of '
                  'poisoning effects requires per-input baseline of expected model '
                  'behaviour — not tractable at scale.'
              ),
              remediation_chapter='Chapter 8 (build-time controls)',
              remediation_detail='Dataset audit, reproducible training, DP-SGD, backdoor detection '
                                 'at model evaluation time. Not a runtime detection problem.',
              build_time_note='Track 4 training-pipeline monitoring scores 1* at the pipeline; '
                              'inference-gateway score is 0.',
          ),

          OWASPCategory(
              category_id='LLM04',
              name='Model Denial of Service',
              score=1,
              gap_type=GapType.ACTIONABLE,
              gateway_tracks=[5],
              sigma_tags=['owasp.llm.04'],
              atlas_techniques=['AML.T0040'],
              residual_gap=(
                  'Per-user rate detection catches single-user DoS. Distributed '
                  'low-and-slow DoS from many users each below the per-user threshold '
                  'is undetected.'
              ),
              remediation_chapter='Chapter 13',
              remediation_detail='Ch13 S13.03 cross-user fleet-level request volume monitor '
                                 'catches distributed DoS pattern across user population.',
          ),

          OWASPCategory(
              category_id='LLM05',
              name='Supply Chain Vulnerabilities',
              score=0,
              gap_type=GapType.BUILD_TIME_ONLY,
              gateway_tracks=[],
              sigma_tags=['owasp.llm.05'],
              atlas_techniques=['AML.T0010', 'AML.T0018'],
              residual_gap=(
                  'No runtime detection possible. Compromised pre-trained models, '
                  'poisoned public datasets, and vulnerable ML framework dependencies '
                  'must be verified at build time, not at inference time.'
              ),
              remediation_chapter='Chapter 8 (build-time) + DevSecOps pipeline',
              remediation_detail='Model hash verification at deployment, SCA for ML framework '
                                 'dependencies, model provenance metadata enforced by CI/CD.',
              build_time_note='Entirely build-time and supply-chain concern; gateway score is 0 and correct.',
          ),

          OWASPCategory(
              category_id='LLM06',
              name='Sensitive Information Disclosure',
              score=0,
              gap_type=GapType.ACTIONABLE,
              gateway_tracks=[],
              sigma_tags=['owasp.llm.06'],
              atlas_techniques=['AML.T0022', 'AML.T0024'],
              residual_gap=(
                  'Gateway is input-side only. PII in model responses, training data '
                  'reproduction, and system prompt reflection are undetected. '
                  'Response content never inspected.'
              ),
              remediation_chapter='Chapter 14 + Chapter 15',
              remediation_detail='Ch14: PII scanner (regex + NER), system prompt reflection detector. '
                                 'Ch15: membership inference monitoring, model inversion pattern detection.',
          ),

          OWASPCategory(
              category_id='LLM07',
              name='Insecure Plugin Design',
              score=1,
              gap_type=GapType.ACTIONABLE,
              gateway_tracks=[1, 2],
              sigma_tags=['owasp.llm.07'],
              atlas_techniques=['AML.T0051'],
              residual_gap=(
                  'Track 1 and 2 catch injection patterns in prompt context if tool '
                  'output reaches the gateway. Tool outputs routed directly to model '
                  'context by the application without gateway re-inspection are invisible.'
              ),
              remediation_chapter='Application architecture',
              remediation_detail='Route all plugin/tool outputs through gateway prompt '
                                 'inspection before model context injection. '
                                 'No standalone detection deliverable can close this gap.',
          ),

          OWASPCategory(
              category_id='LLM08',
              name='Excessive Agency',
              score=0,
              gap_type=GapType.ACTIONABLE,
              gateway_tracks=[],
              sigma_tags=['owasp.llm.08'],
              atlas_techniques=[],
              residual_gap=(
                  'Gateway inspects prompts; it does not inspect model-caused actions. '
                  'Tool calls, system commands, API calls triggered by model outputs '
                  'are invisible to the current gateway.'
              ),
              remediation_chapter='Chapter 14',
              remediation_detail='Ch14 scope and permission monitor: tracks tool call permissions '
                                 'against defined scope policy; fires when model-caused action '
                                 'exceeds defined scope.',
          ),

          OWASPCategory(
              category_id='LLM09',
              name='Overreliance',
              score=-1,
              gap_type=GapType.OUT_OF_SCOPE,
              gateway_tracks=[],
              sigma_tags=['owasp.llm.09'],
              atlas_techniques=[],
              residual_gap='User trust miscalibration is not a technical detection concern.',
              remediation_chapter='Product design',
              remediation_detail='Disclaimers, confidence score display, high-stakes output '
                                 'validation (medical, legal, financial), user training programmes.',
          ),

          OWASPCategory(
              category_id='LLM10',
              name='Model Theft',
              score=1,
              gap_type=GapType.ACTIONABLE,
              gateway_tracks=[5, 6],
              sigma_tags=['owasp.llm.10'],
              atlas_techniques=['AML.T0040'],
              residual_gap=(
                  'Single-session extraction detected. Distributed multi-account '
                  'extraction and membership inference patterns undetected.'
              ),
              remediation_chapter='Chapter 13',
              remediation_detail='Ch13 S13.03 cross-user correlation closes distributed '
                                 'extraction gap. Future track for membership inference '
                                 'confidence pattern monitoring.',
          ),
      ]

      # ---------------------------------------------------------------------------
      # Scoring helpers
      # ---------------------------------------------------------------------------

      def score_label(score: int, gap_type: GapType | None) -> str:
          if score == -1:
              return 'N/A (scope)'
          if score == 2:
              return '2 — Full'
          if score == 1:
              if gap_type == GapType.BUILD_TIME_ONLY:
                  return '1* — Pipeline'
              return '1 — Partial'
          if score == 0:
              if gap_type == GapType.BUILD_TIME_ONLY:
                  return '0* — Build-time'
              return '0 — Gap'
          return '?'

      def score_symbol(score: int, gap_type: GapType | None) -> str:
          if score == -1:
              return '◈'
          if score == 2:
              return '✓'
          if score == 1:
              return '◑'
          return '✗'

      # ---------------------------------------------------------------------------
      # Reports
      # ---------------------------------------------------------------------------

      def print_matrix(categories: list[OWASPCategory]) -> None:
          full = sum(1 for c in categories if c.score == 2)
          partial = sum(1 for c in categories if c.score == 1)
          none_act = sum(1 for c in categories if c.score == 0 and c.gap_type == GapType.ACTIONABLE)
          none_bt = sum(1 for c in categories if c.gap_type == GapType.BUILD_TIME_ONLY)
          oos = sum(1 for c in categories if c.gap_type == GapType.OUT_OF_SCOPE)

          print('\nOWASP LLM Top 10 — Detection Coverage Matrix')
          print(f'Seven-Track Gateway | Post-Section 11.11 State')
          print(f'Full: {full}  Partial: {partial}  Gap (actionable): {none_act}  '
                f'Build-time: {none_bt}  Out-of-scope: {oos}\n')
          print(f'{"Category":<8} {"Name":<35} {"Score":<18} {"Sym":<4} {"Tracks":<18} Residual Gap (short)')
          print('-' * 120)
          for c in categories:
              label = score_label(c.score, c.gap_type)
              sym = score_symbol(c.score, c.gap_type)
              tracks_str = ', '.join(f'T{t}' for t in c.gateway_tracks) or '—'
              gap_short = (c.residual_gap[:42] + '...') if len(c.residual_gap) > 42 else c.residual_gap
              print(f'{c.category_id:<8} {c.name:<35} {label:<18} {sym:<4} {tracks_str:<18} {gap_short}')

      def print_backlog(categories: list[OWASPCategory]) -> None:
          actionable = [c for c in categories if c.gap_type == GapType.ACTIONABLE and c.score < 2]
          print('\nOWASP LLM Actionable Detection Backlog')
          print(f'Gaps requiring detection engineering work: {len(actionable)}\n')
          for c in sorted(actionable, key=lambda x: x.score):
              print(f'  {c.category_id} — {c.name} (score: {c.score})')
              print(f'    Gap:         {c.residual_gap[:90]}')
              print(f'    Remediation: {c.remediation_detail[:90]}')
              print(f'    Chapter:     {c.remediation_chapter}')

      def print_ciso_report(categories: list[OWASPCategory]) -> None:
          print('\n== OWASP LLM Top 10 Coverage — Executive Summary ==\n')
          print('Category Coverage:')
          for c in categories:
              label = score_label(c.score, c.gap_type)
              sym = score_symbol(c.score, c.gap_type)
              print(f'  {sym} {c.category_id} {c.name:<35} [{label}]')
          print()
          actionable = [c for c in categories if c.gap_type == GapType.ACTIONABLE and c.score == 0]
          if actionable:
              print(f'Priority gaps requiring investment ({len(actionable)} categories at score 0):')
              for c in actionable:
                  print(f'  {c.category_id} — {c.name}: {c.remediation_chapter}')
          print()
          print('Key findings:')
          print('  • Input-side detection is strong for LLM01 and LLM10.')
          print('  • Output-side monitoring (LLM02, LLM06, LLM08) is the primary investment area.')
          print('  • LLM03 and LLM05 are build-time controls, not runtime detection problems.')
          print('  • LLM09 is a product design concern outside detection engineering scope.')
          print('  • Chapter 14 output validation layer addresses three score-0 categories simultaneously.')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='OWASP LLM coverage matrix')
          parser.add_argument('--backlog', action='store_true',
                              help='Print actionable detection backlog only')
          parser.add_argument('--ciso-report', action='store_true',
                              help='Print executive summary for CISO presentation')
          args = parser.parse_args()

          if args.backlog:
              print_backlog(OWASP_CATEGORIES)
              return 0
          if args.ciso_report:
              print_ciso_report(OWASP_CATEGORIES)
              return 0
          print_matrix(OWASP_CATEGORIES)
          return 0

      if __name__ == '__main__':
          sys.exit(main())

  deliverable_2:
    id: 'D11.11.2'
    filename: 'owasp_gap_closure_roadmap.py'
    description: >
      Maps each OWASP LLM coverage gap to the specific Chapter 12–15 deliverable
      that closes it, with effort estimate, dependency chain, and a combined view
      showing which chapters close the most OWASP categories simultaneously.
      Designed for sprint planning and investment prioritisation.
    language: 'python'
    python_version: '3.12'
    dependencies:
      - 'dataclasses (stdlib)'
    code: |
      #!/usr/bin/env python3
      '''owasp_gap_closure_roadmap.py
      Maps OWASP LLM Top 10 coverage gaps to chapter-level remediations.
      Shows which chapter closes the most OWASP categories simultaneously.
      Chapter 11, Section 11.11 — AI Security Mastery
      Author: Raghav Dinesh | github: ruwgxo

      Usage:
        python3 owasp_gap_closure_roadmap.py
        python3 owasp_gap_closure_roadmap.py --chapter 14
      '''

      from __future__ import annotations
      import argparse
      import sys
      from dataclasses import dataclass, field

      # ---------------------------------------------------------------------------
      # Roadmap data model
      # ---------------------------------------------------------------------------

      @dataclass
      class ChapterRoadmapItem:
          chapter: int
          section: str
          deliverable: str
          owasp_gaps_closed: list[str]        # e.g. ['LLM02', 'LLM06', 'LLM08']
          score_improvements: dict[str, str]  # category_id -> 'score X → Y'
          effort_days: int
          dependency: str = ''
          notes: str = ''

      # ---------------------------------------------------------------------------
      # Roadmap registry
      # ---------------------------------------------------------------------------

      ROADMAP: list[ChapterRoadmapItem] = [

          ChapterRoadmapItem(
              chapter=12,
              section='S12.04',
              deliverable='intent_classifier.py — LLM prompt intent classification',
              owasp_gaps_closed=['LLM01'],
              score_improvements={'LLM01': 'score 1 → score 2 (direct injection fully covered)'},
              effort_days=10,
              notes='Closes obfuscated direct injection gap. Indirect injection gap (app architecture) remains.',
          ),

          ChapterRoadmapItem(
              chapter=13,
              section='S13.03',
              deliverable='cross_user_correlation.py — fleet-level session correlation',
              owasp_gaps_closed=['LLM04', 'LLM10'],
              score_improvements={
                  'LLM04': 'score 1 → score 2 (distributed DoS now detected)',
                  'LLM10': 'score 1 → score 2 (distributed extraction now detected)',
              },
              effort_days=12,
              dependency='Chapter 13 session infrastructure',
              notes='Single deliverable closes two OWASP gaps by adding fleet-level visibility.',
          ),

          ChapterRoadmapItem(
              chapter=14,
              section='S14.02–S14.05',
              deliverable='output_validation_layer.py — post-inference output inspection',
              owasp_gaps_closed=['LLM02', 'LLM06', 'LLM08'],
              score_improvements={
                  'LLM02': 'score 0 → score 1 (XSS, code injection, command injection in responses)',
                  'LLM06': 'score 0 → score 1 (PII scanner, system prompt reflection detector)',
                  'LLM08': 'score 0 → score 1 (tool call scope monitor)',
              },
              effort_days=20,
              dependency='Chapter 14 post-inference hook infrastructure',
              notes='Highest-leverage chapter: closes three score-0 gaps with one architectural addition. '
                    'All three categories move to score 1; score 2 requires further calibration.',
          ),

          ChapterRoadmapItem(
              chapter=15,
              section='S15.03',
              deliverable='membership_inference_monitor.py — output confidence pattern analysis',
              owasp_gaps_closed=['LLM06'],
              score_improvements={
                  'LLM06': 'score 1 → score 2 (membership inference patterns now detected)',
              },
              effort_days=8,
              dependency='Chapter 14 output validation layer (score 1 baseline for LLM06)',
              notes='Completes LLM06 coverage after Chapter 14 establishes the output inspection pipeline.',
          ),

      ]

      # ---------------------------------------------------------------------------
      # Reports
      # ---------------------------------------------------------------------------

      def print_full_roadmap(roadmap: list[ChapterRoadmapItem]) -> None:
          total_days = sum(r.effort_days for r in roadmap)
          total_gaps = sum(len(r.owasp_gaps_closed) for r in roadmap)
          print('\nOWASP LLM Gap Closure Roadmap — Chapters 12–15')
          print(f'Total gaps addressable: {total_gaps} improvements across {len(roadmap)} deliverables')
          print(f'Total estimated effort: {total_days} engineer-days\n')

          print(f'{"Ch":<5} {"Section":<12} {"OWASP Gaps Closed":<25} {"Score Improvements":<45} {"Days":<6} Dependency')
          print('-' * 130)
          for r in sorted(roadmap, key=lambda x: x.chapter):
              gaps_str = ', '.join(r.owasp_gaps_closed)
              improv_str = '; '.join(r.score_improvements.values())
              improv_short = (improv_str[:42] + '...') if len(improv_str) > 42 else improv_str
              dep_short = (r.dependency[:30] + '...') if len(r.dependency) > 30 else r.dependency
              print(f'{r.chapter:<5} {r.section:<12} {gaps_str:<25} {improv_short:<45} {r.effort_days:<6} {dep_short}')

          print()
          print('End-state coverage after Chapters 12–15:')
          final_scores: dict[str, int] = {
              'LLM01': 2, 'LLM02': 1, 'LLM03': 0, 'LLM04': 2,
              'LLM05': 0, 'LLM06': 2, 'LLM07': 1, 'LLM08': 1,
              'LLM09': -1, 'LLM10': 2,
          }
          score_labels = {2: '✓ Full', 1: '◑ Partial', 0: '✗ Gap', -1: '◈ OOS'}
          for cat_id, score in final_scores.items():
              print(f'  {cat_id}: {score_labels[score]}')

      def print_chapter_detail(roadmap: list[ChapterRoadmapItem], chapter: int) -> None:
          items = [r for r in roadmap if r.chapter == chapter]
          if not items:
              print(f'No roadmap items for Chapter {chapter}.')
              return
          print(f'\nChapter {chapter} — OWASP Gap Closures:')
          for r in items:
              print(f'  Deliverable: {r.deliverable}')
              print(f'  OWASP gaps:  {", ".join(r.owasp_gaps_closed)}')
              for cat, improv in r.score_improvements.items():
                  print(f'    {cat}: {improv}')
              print(f'  Effort:      {r.effort_days} engineer-days')
              if r.dependency:
                  print(f'  Depends on:  {r.dependency}')
              if r.notes:
                  print(f'  Notes:       {r.notes}')

      # ---------------------------------------------------------------------------
      # Entry point
      # ---------------------------------------------------------------------------

      def main() -> int:
          parser = argparse.ArgumentParser(description='OWASP LLM gap closure roadmap')
          parser.add_argument('--chapter', type=int, choices=[12, 13, 14, 15],
                              help='Show detail for a specific chapter')
          args = parser.parse_args()

          if args.chapter:
              print_chapter_detail(ROADMAP, args.chapter)
              return 0
          print_full_roadmap(ROADMAP)
          return 0

      if __name__ == '__main__':
          sys.exit(main())

common_mistakes:
  - id: 'CM11.11.1'
    mistake: 'Treating OWASP LLM score 0 for LLM03 and LLM05 as a detection engineering failure'
    why_it_happens: >
      The matrix shows two zero-score categories. In a coverage measurement context,
      score 0 reads as a failure. Programme stakeholders ask why the detection team
      has not addressed these categories.
    why_it_matters: >
      LLM03 (Training Data Poisoning) and LLM05 (Supply Chain Vulnerabilities) are
      build-time concerns. No runtime detection rule can detect a poisoned model or a
      compromised ML dependency at inference time. Adding them to the detection backlog
      generates work that cannot be completed and erodes confidence in the programme''s
      engineering judgement.
    correct_approach: >
      Distinguish build-time from runtime gaps explicitly in every presentation of the
      matrix. Use the "0* — Build-time" notation (not a plain "0") and include a one-
      sentence explanation in the CISO report: "These categories are addressed by
      build-time controls (dataset auditing, model provenance verification) — not by
      runtime detection rules." Point to Chapter 8 for the implemented controls.

  - id: 'CM11.11.2'
    mistake: 'Declaring LLM01 fully covered (score 2) after deploying Tracks 1, 2, and 3'
    why_it_happens: >
      Three tracks covering prompt injection looks comprehensive. Direct injection,
      jailbreak patterns, and semantic gating together seem to address all injection
      variants.
    why_it_matters: >
      Indirect injection — adversarial instructions embedded in tool outputs, RAG
      retrieved context, or web content injected into the system prompt — is not
      detected by any of the three input-side tracks unless the injected content
      happens to match Track 1 or Track 3 patterns. A targeted adversary crafting
      indirect injection content specifically to evade those patterns will succeed.
      Declaring LLM01 fully covered misrepresents the coverage posture and delays the
      application-architecture work needed to close the indirect injection gap.
    correct_approach: >
      Maintain LLM01 at score 1 until both direct injection and indirect injection
      are covered. Score the direct and indirect components separately in the OWASP
      notes field if the matrix tooling supports sub-category scoring.

  - id: 'CM11.11.3'
    mistake: 'Assuming that input-side gateway coverage addresses LLM02, LLM06, and LLM08'
    why_it_happens: >
      The gateway blocks bad prompts. Practitioners assume that blocking the bad input
      also prevents the bad output. In many cases this is true — if the injection is
      blocked, the unsafe output is not generated. But it is not universally true.
    why_it_matters: >
      Sophisticated injection attacks that evade input-side detection will produce unsafe
      outputs (LLM02) or disclosure outputs (LLM06) that the gateway never sees. Agentic
      systems may cause excessive agency actions (LLM08) in response to prompts that
      passed all input-side checks but were subtly adversarial. The output-side gap
      is the gap that produces the highest-consequence incidents: the attack that passed
      all gateway checks and then exfiltrated PII or executed arbitrary code.
    correct_approach: >
      Treat the output-side gap as a first-class programme priority. The three score-0
      actionable categories (LLM02, LLM06, LLM08) all require the Chapter 14 output
      validation layer. Present this to leadership as: "The current gateway protects
      the model from bad inputs; we do not yet protect downstream systems from bad
      outputs. Chapter 14 builds that protection."

  - id: 'CM11.11.4'
    mistake: 'Including LLM09 in the detection engineering backlog and assigning resource to close it'
    why_it_happens: >
      LLM09 appears on the list of ten vulnerabilities. It has a score in the matrix.
      Programme managers who are not deeply familiar with the categories include it in
      the detection backlog and ask for a detection engineering sprint to address it.
    why_it_matters: >
      LLM09 (Overreliance) is a user behaviour and product design concern. No detection
      rule can observe user trust. Assigning detection engineering resource to LLM09
      diverts effort from the three actionable score-0 categories (LLM02, LLM06, LLM08)
      that have viable detection approaches and produce measurable coverage improvements.
    correct_approach: >
      In every presentation of the OWASP matrix, explicitly label LLM09 as "Out of
      scope for technical detection — addressed by product design team." Route LLM09
      to the product engineering backlog, not the detection engineering backlog. The
      owasp_llm_coverage_matrix.py --ciso-report output includes this routing explicitly.

  - id: 'CM11.11.5'
    mistake: 'Reporting OWASP LLM coverage without the ATLAS coverage heat map in the same report'
    why_it_happens: >
      OWASP LLM Top 10 is more accessible to non-technical stakeholders than ATLAS
      technique IDs. Programmes may default to OWASP-only reporting for the CISO audience
      and ATLAS-only reporting for the detection team, creating two separate coverage
      pictures that are never reconciled.
    why_it_matters: >
      The OWASP matrix and the ATLAS heat map are complementary, not alternative,
      coverage views. A programme with full OWASP LLM01 coverage may still have ATLAS
      gaps in specific injection sub-techniques. A programme with ATLAS AML.T0051
      coverage at score 2 may still score LLM01 at score 1 because indirect injection
      is not addressed. Reporting only one view gives an incomplete picture regardless
      of the audience.
    correct_approach: >
      Present both views in the quarterly programme review: the ATLAS heat map for the
      detection team and the OWASP matrix for the CISO and compliance audience. Show
      the crosswalk table (table_3_owasp_atlas_crosswalk) to any stakeholder who asks
      how the two taxonomies relate. The owasp_llm_coverage_matrix.py --ciso-report
      output is designed to accompany the Navigator heat map, not replace it.

section_summary:
  what_you_learned: |
    OWASP LLM Top 10 is a vulnerability catalogue that requires a bespoke detection
    approach per category and contains three structural non-detection categories:
    build-time-only (LLM03, LLM05), output-side-only (LLM02, LLM06, LLM08), and
    out-of-scope (LLM09). The seven-track gateway achieves score 1 on four categories
    (LLM01, LLM04, LLM07, LLM10), score 0 on three actionable categories (LLM02,
    LLM06, LLM08), build-time-only status for two categories (LLM03, LLM05), and
    out-of-scope status for one (LLM09). The most significant programme gap is the
    output-side: the gateway is input-side only and Chapter 14 is the remediation for
    all three output-side score-0 categories simultaneously. The OWASP matrix and the
    ATLAS heat map are complementary views; both are required for a complete coverage
    picture.
  key_terms:
    - term: 'OWASP LLM Top 10'
      definition: >
        A vulnerability catalogue of the ten most significant security risks in LLM-based
        applications. Not a detection specification: each category requires bespoke
        detection approaches; some are not detectable at runtime at all.
    - term: 'Build-time-only gap'
      definition: >
        An OWASP or ATLAS coverage gap where the vulnerability is introduced before
        inference and cannot be detected by runtime rules. Addressed by build-time
        controls (dataset auditing, model provenance verification, supply chain security).
        Distinct from actionable gaps where runtime detection is viable but not yet built.
    - term: 'Output-side gap'
      definition: >
        An OWASP coverage gap where the detectable signal is in the model response,
        not the request. The seven-track gateway is input-side only; output-side gaps
        require a post-inference output validation layer (Chapter 14).
    - term: 'Indirect injection'
      definition: >
        A form of LLM01 prompt injection where adversarial instructions are embedded in
        content retrieved from external sources (RAG outputs, tool call results, web
        content) and injected into the model context. Not detectable by input-side rules
        unless application-level source tagging identifies retrieved spans in the prompt.
    - term: 'OWASP-ATLAS crosswalk'
      definition: >
        A mapping between OWASP LLM Top 10 categories and MITRE ATLAS technique IDs.
        Enables detection rules tagged with owasp.llm.NN to also carry the correct
        atlas.aml.tXXXX tag, ensuring both coverage matrices read the same rule set.

preview_section_11_12:
  title: 'Threat Hunting for AI Systems: Proactive Detection'
  teaser: |
    Section 11.12 extends the detection programme beyond reactive rule-based detection
    to proactive threat hunting: structured, hypothesis-driven analysis of production
    logs to find novel attack patterns that no deployed rule captures. It introduces
    five AI-specific hunting hypotheses (embedding cluster anomalies, session entropy
    outliers, coordinated query timing patterns, system prompt drift across sessions,
    and cross-user semantic similarity spikes), the data sources and analysis methods
    for each, and the pivot chain that converts a confirmed hunt finding into a Sigma
    rule via the Section 11.10 workflow. The threat_hunting_playbook.py deliverable
    encodes all five hypotheses as executable hunting procedures.

